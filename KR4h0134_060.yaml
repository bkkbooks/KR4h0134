body:
  text: 漢魏六朝百三家集卷六十晉王獻之集題詞右軍七子五人知名子猷子敬尤稱不羈子敬先亡子猷直上靈牀悲歎人琴亦頓絶徂化友于情深攜手地下鶺鴒之詩於此增重子敬生平少過其臨沒自懴者惟與郗道茂離婚耳别妻一帖俯仰嗚咽既篤伉儷何不為宋大夫之却湖陽乎身尚公主女為帝后烏衣貴遊寵榮過盛獨惜年命不長門無男子五福在天文人當之固難有全理也桃葉歌詞江南盛傳其答歌則緑珠懊儂翾風怨詩之類也子敬通昏帝胄豪貴自喜復纒綿妾侍發其謳吟中書風流上掩季倫但無顔對郗姊耳法書簡帖間有偽書翰墨足傳字貴尺璧大文絶少獨表明安石言得其平較之摯虞理茂先盧諶訟越石並晉室陽秋矣目録書帖辭中令書與郗超論袁宏書玄度帖又鄱陽帖又又鐵石帖又德遠帖祖希帖授衣帖衛軍帖府君帖領軍帖參軍帖冠軍帖又别郗氏妻與兄徽之書歲終帖礜石帖又違遠帖草九帖又鵝還帖又又又散情帖使君帖承姑帖阿姑帖東陽帖敬祖帖永嘉帖又天寶帖仲宗帖黃門帖秀順帖靜婢帖豹奴帖江州帖二妹帖諸女帖阮新婦帖又郗新婦帖范新婦帖新婦帖慰意帖東近諸帖又又又又又又又相過帖夏日帖慕容帖薄冷帖益部帖思戀帖轉勝帖消息帖集聚帖近豫帖復面帖西問帖月終帖安和帖餘杭帖晴快帖珍重帖尊體何如帖中秋帖日寒帖南中佳音帖白鮓帖服黃芪帖湯酒帖鴨頭丸帖服油帖送梨帖鏡湖帖疏明謝安忠勳疏表啓琅琊王為中書監表又墓志保母志詩桃葉歌二首漢魏六朝百三家集卷六十目録欽定四庫全書漢魏六朝百三家集卷六十明張溥輯晉王獻之集書帖辭中令書獻之自吳興內史徵拜中書令外出謂公私可安耳勳賞既湊亦巳息望但使明公不遺有會不忘亦何憂便餒耶民志不慕高情不忘榮懇懇祈訴惟願離今任井餘無所擇伏度朝恩不過存愍故舊使蓬莤與蘭蕙齊榮耳明詔爰發恩巳被矣榮實厚矣必何須拜而治順許而弛今日君臣之際差可得適願樂也若民有纎芥少裨聖化亦當求自策效而能臨殊寵必欲免耶思之實熟萬無此理古來亦未有量力而致深罪者蔡司徒立帝主於御牀詔驛數反其不祗順正止於免黜耳此外希不矜體者違命誠為深愆曲從實復過此伏度天海容納必當哀許仰憑仁眷惟願垂救動成塵穢轉難為顔乃欲覲謁忽患齒痛疼慘無賴語迫罔知所厝冒復啓訴謹草上呈罄竭欵實謂為粗盡一豪虛矯神明殛之若民可作尚書令而使四海推懕者亦人誰不堪勳德蓋世尚當有讓況民凡鄙而可冦竊耶王懷祖先輩名流作此職可謂僉允桓宣武窺尚書門猶言此中無人固知當之未易也齒既不便彌不自宣故寄之翰墨益增繁忤飢渴還旨願不作悠悠常誨耳獻之死罪州民王獻之呈與郗超論袁宏書宏為吏部郎獻之與超書彥伯已入殊足頓興往之氣故知捶撻自難為人冀小卻當復差耳巳入尺牘作巳久誤王敬美云足窺子敬狹中玄度帖玄度時往來以此為慰興公使適還數日具都下問人情所憂良可歎息諸從數問齡前來經日極為差云仁祖欲請為軍司不知行不從一作賢為黃云玄度時來一帖米以無名人作僕謂此真晉人語但筆勢疏緩多失落耳謂大令書則非蓋中云仁祖欲請為軍司案獻之以晉孝武太元十一年年四十三卒謝尚於穆帝升平元年卒時獻之方年十三請軍司又在升平前大令是時才十許歲安得巳作書論時事殆是穆帝時他人書玄度何來遲亦此類又二王作使還帖玄度何來遲深令人憂懸耶常謂有理因祠監多感足下共事甚善然所造極難想足下每思先後卿豈須言親親不巳意耳安石停此過半日猶得一宿送近道所以致歎何物喻之一十當浦陽諸懷兒不可言且不復得卿送有諸歎今此貪上道淳化誤摹何物一行在前送近一行在後常淳化作當卿二王帖作公貪一作奕作黃云亦似逸少語張長史輩偽鄱陽帖獻之白不謂鄱陽一門艱故至此追尋悲惋益不自勝奈何奈何政坐視其滅盡使人悲熟賴子高在此不爾無可成獻之熟尺牘作熱不爾作下爾誤又二王作散騎帖鄱陽書停諸舍便有月未具散騎書知情至草草未發遣奉去月餘承婦等復不能差深憂慮耳又鄱陽歸鄉承修東轉有理吾賢畢欲事必俟勝歡慰於懷耶吾終權宜至承今年飢饉仰惟年支都乏絶不謂乖又至於此耶吾腳尚未差極憂也鐵石帖近與鐵石共書令致之想久逹不得君問以復經月懸情豈可言頃更寒不適頗有時氣君頃各可耳遲旨問僕大都小佳然疾根聚在右髀腳重痛不得轉動左腳又腫疾候極是不佳幸食眠意事為復可可冀非臟病耳又二王作散還帖知鐡石前往快作樂諸君善處世一達於當年不復過此僕端坐將百日為尸居解日耳不知那得一散懷何其相思之深臨書意塞二王帖云東坡詩有巳將鐡石充逸少之句蓋坡疑以為殷鐡石故云按詩注殷鐡石梁人非及與右軍父子同時今所謂與鐡石共書豈兩子張耶德逺帖前告先以陳事意必是更有家信未知斯説見德遠書所致人耶何可足下今耶下今施作卒念祖希帖張玄字祖希知祖希佳為慰慰數不得書其云至水門增深欵之授衣帖獻之死罪授衣諸感悲情伏惟哀慕兼慟痛毒難居見徐俊并使君書承比極勝但承此凶問當復大頓耳比日憂馳無復意不審尊體云何腳氣及耳痛得此哀號何如先大惡時灸創特不堪此不乃為患眠食幾許使君今地實難為識然所以為識政在此耳當今可復使不萬全不願其以多算難易得之便自可令不為因絫耳比者忉怛當不可言當不可言獻之死罪衛軍帖衛軍猶未平和而哀勞殊未得盡消息理常以不寧僕射得散力甚慰表解臺職不知得恕不復冠軍告懸企復一作後府君帖二王作極熱帖獻之白極熱敬惟府君此月內得書來時幾得問希此消息極悶悶軍中復如何患膿不能潰意甚無賴君有好藥必時復與府中多少極濟事耶黃云極熱敬惟府君帖云來時幾得問希此消息極悶悶又云意甚無賴君有好藥云云極濟事耶又服油帖云不至絶艱辛也皆近世俗言字勢亦不至佳非王氏帖明甚領軍帖還此今有書何以至不知諸舍故多患念勞以今差也得領軍書故在風丹楊書常疾動耿耿亦云得鄱陽近書為慰丹楊疾者不果來甚悵恨云一作足參軍帖東家尚未欲下李參軍無政日有此議能自來此方寸無使聞上極不妙之事獻之頓首冠軍帖委曲前書具想勝常也諸人悉何如承冠軍定入計今向達都汝奉見欣慶但恐停日不多耳又承冠軍故爾不覺轉勝灸無所覺憂馳深汝燋悚可言又一帖憔㥩可耳别郗氏妻郗曇女名道茂獻之初娶郗氏女為祕書丞尚新安公主及獻之遇疾道家上章法應首過對曰不覺餘事惟憶與郗家離婚帖王氏譜咸寧中尚餘姚公主黃云奉對當是與郗家離婚也郗氏自太尉鑒後為江左名族其姓讀如絺繡之絺而世人以俗書郗字作郤因讀為卻詵之卻非也卻詵乃晉大夫卻縠之㣪郗鑒乃漢御史大夫郗慮之後在原既異音讀逈殊亦近代氏族及小學二家之學不講故也陸魯望博古矣其詩云一假清香染郗郎亦誤讀也雖奉對積年可以為盡日之歡常苦不盡觸類之暢方欲與姊極當年之足以之偕老豈謂乖别至此諸懷悵塞實深當復何繇日夕見姊耶俯仰悲咽實無已無已唯當絶氣耳俯仰施作纒綿當一作常與兄徽之書兄伯蕭索寡會遇酒則酣暢忘反乃自可矜嵗終帖獻之白節過歲終衆感纒心伏惟同之奉月初告承極不平復頭眼半體疹恆惡兄告説姊故殊黃瘦憂馳可言寒切不審尊體復何如眠食轉進不氣力漸復充耳遲復旨告獻之故爾獻之充一作先礜石帖獻之白兄靜息應佳何以復小惡耶伏想此消息理盡轉勝耳礜石深是可疑事兄喜服散輒發癕勢為積乃不易願復更思獻之惟賴消息內外極生冷而心腹中恆無他此一事是差但疾源不除自不得佳論事當隨宜思之也獻之白勢一作熱為積尺牘作為治礜黃云散者寒食散之類散中蓋用石是性極熱有毒故云深可疑也劉表在荆州與王粲登障山見一岡不生百草粲曰此必古冢其人在世服生礜石熱蒸出外故草木焦滅鑿看果礜石滿塋又今洛水冬月不冰古人謂之溫洛下亦有礜石今取此石置甕水中水亦不冰又鸛伏卵以助暖氣其烈酷如此固不宜餌服子敬之語實然聊附于此又云賴消息內外極生冷內外二字本行旁注故字差小而昧者摹填著行中非也當依本為勝諸帖中此例甚多如十七帖中遠想慨然孔琳之帖恨恨腳中轉劇等字本皆側注後人摹以入行又姊性舊合礜石為一帖姊性纒綿觸事殊當不可獻之方當長愁耳違逺帖吾十一日發吳興違逺兄姊感戀無喻慶等别不可言比奉告故多患姊經感極頓憂馳益深適咨議十六日告風疾故爾反側餘可行未東動靜不寧吾宜速吳與丞别兄進猶戀罔勞亦極惡馳情二女晚生皆佳未復華薑疏比來得直疏故惡故足當視華也汝兒女並可不吾一作五草九帖草九日獻之白昨遂不奉恨深體中復何如弟甚頓勿勿不具獻之再拜黃云此近世人語非子敬書帖二王帖云黃以為昨遂不奉恨深有秦漢篆筆中令自言故自不同真不虛爾書中有相勞苦語極佳讀之了不可解者當箋素敗逸觀其可讀者知其爾爾二奉下一有别悵字又獻之白承姊故常惡不審得春氣復何如冬馳情餘安和至寧此故耳獻之白鵝還帖二王作諸舍帖淳化及二王帖鵝還云云并合上為一今按其刻鵝還原提作行首則此當别為一帖王氏尺牘以鵝還鵝差名鵝還帖而無崇虛一條今並仍鵝還之名其舊名各附注諸舍亦載於前諸舍復何如吾家多患憂面以問慰情不知可耳承永嘉比復患下上下諸疾患乃爾燋馳豈可懷不審今復何如嫂即平和耳貞壽不成病不憂一作望又鵝還慰姊意今己嘗向發分張諸懷可言殊嘗復憂懸婢腹痛見差不劉家疾患即差秀已還也已嘗陳作已當又二王作慶至帖慶等已至也鵝差不甚懸心宜道尋去奴定西諸分張少言道一作還一作送又鵝羣帖獻之等再拜不審海鹽諸舍上下動靜比復常憂之姊告無他事崇虛劉道士鵝羣並復歸也獻之等當須向彼謝之獻之等再拜鹽劉作監須一作便誤猶黃云鵝者王氏子姓之小字耳袁羊顧虎之類或以此鵝即逸少所愛之鵝甚可鄙笑又帖云崇虛劉道士鵝羣並復歸也獻之寄須向彼謝之亦非當時尺牘體蓋以大令父逸少嘗書道德經換鵝而山隂曇􅙓村道士舉羣贈之故以此事傅會作是帖耳案崇虛館乃宋明帝泰始四年建子敬晉人何得已稱之又按魏收釋老志太和十五年詔立道家寺宇於桑乾之隂名崇虛寺去晉愈逺矣也王云此乃黃長睿東觀餘論而楊引為已辨亦可笑然書家頗重鵝羣帖按此明載法帖辨誤不必餘論能二王帖注黃云右軍寫經换鵝時子敬尚幼少未必作此簡好事者為之耳如貞觀初楊師道輩可作此字恐不其然人之善書蓋有自幼天成者况子敬耶米云偽散情帖獻之白不審疾得損未極憂及更能出入未前書云至於散情嫂疾苦療得所深喜慰想必為問敬和晚際似差耶諸舍也能向諸弟各也使君帖嫂等承更惡不審頃痊復不必須散時終得力耶此藥甚佳想姊舉體不能行履服遂差安西且無恙府君屬有和稀久滯行路同人絶得此心故當攜其長幼詣汝上下知彼駱驛有書示不足以慰吾意耶冬間必欲至足下所居承使君明練不謂漸有勝也君數集聚然其大都可耳吾止於月半間耶黃云嫂等帖亦非大令書可詣一作諸數一作闕可耳作可承姑帖獻之白承姑比日復小進退其爾不得一極和憂悚猶深不審以服散未必得力耳比驎相聞故云惡懸懷使君數得書也以一作比阿姑帖二王作平安帖近奉阿姑告知平安極慰人意獻之遂不堪暑氣力恆惙恐是惡風大都將息近似小却東陽帖不審阿姨所患得差否極令懸惻想東陽諸妹當復平安不審頃者情事漸差耶彼郡今載甚不能佳不知早晚至當遂至郡深相望敬祖帖敬祖日夕還山隂與嚴使君聞頗多嵗月今屬天寒擬適逺為當奈何奈何爾豈不令念姊逺路不能追求耳君劉作知誤永嘉帖願餘上下安和知婢日夕疏慰意育故羸懸心倪比健也適奉永嘉去月十一日動靜故常患不寧諸女無復消息獻之又育等可不轉思見之知恩慕不中天寶帖白東告具天寶疾患問何其倉卒乏子孫當欣倫早成家以此娛上下豈謂奄失此女愍惜深至惻切心懷嫂哀念當可為心情願不可保使人惋惋悲政當隨事豁之耳嫂先積弊復有此痛心不審不乃惡不甚以憂馳眠食復多少願遣無益盡消息理仲宗帖一月草九日告仲宗奉世諸兒禍變無常黃門帖黃門隕背哀痛摧剝不自勝任奈何奈何及書感塞父姑告黃門兄徽之也大黃云亦王氏帖而非令書秀順帖何必不耳企遲此大都如常秀順至慰意順心痛委頓焦勞靜婢帖諸舍不能集會深哽塞仰料靜婢自常不和知從事甚簡致此佳也豹奴帖豹奴此月惟省一書亦不足慰懷深悉足下情素耳豹劉作歝誤桓嗣小字豹奴王氏甥故二王帖中時及之江州帖知汝決欲來下是至願然嫂當得供養冀郡固有理若宣城琅琊不果南有空缺可作者此信還具白當與在事論為不可須留者便可決作來下記也上方大枋想汝不過數枋足彼故當足合偶此耳人方當粗足不果耳可白吾當辨桓江州助汝此不託得遣人船迎汝當具東攻枋三四吾小可者當自力無湖迎汝故可得五六十人小枋諸謝當有便是見今當語之大理盡此信還一一白胛痛不可堪而比作書欲不能成之淳化帖四十云吾當託桓江州助汝吾此不辨得遣人船迎汝當具東攻枋三四吾小可者當自力無湖迎汝故可得五六十人小枋諸謝當有便是見今當語之大理盡此信還具白胛痛可堪而以作書絶欲不可識黃辨云吾當託桓江州助汝帖米以為張長史書雖未必然要非大令書也桉此帖不至惡但縱任近俗無晉世清韻真非大令書殊不知亦寫右軍帖詞耳張彥逺右軍帖録有此語此卷亡其半續帖逸少部中有前假結字殊應模矩蓋王氏子弟臨逸少書勝此逺矣字二王帖云桉法書要録此帖前有知汝欲來等數十內吾字作五字不可識作不能成之乃在逸少帖中當以彥逺為是王著以逸少無大草書故置獻之帖中耳攻劉施作改可者黃諫作云無湖劉作無御迎諌作仰小枋諫作小楊皆非當有下六十帖多一有字二妹帖忽動小行多晝夜十三四起所去多又風不差腳更腫轉欲書疏自不可已惟絶歎於人理耳二妹復平平昨來山下差靜岐當還岐一作政諸女帖想彼悉佳汝復見諸女不此近下故爾耳近一作上阮新婦帖一帖下後有君白二字諸女無日事懸心阮新婦何日至慰妹目下又阮新婦勉身得雄甚善散騎殊常喜也常陳作當郗新婦帖令外甥欲問郗新婦更篤憂慮深令一作念欲一作知范新婦帖謝范新婦得闕富春過諸道路安隱甚慰懸心比日涼即至平安也上下集聚欣慶也華等佳不小婢比小下大都可耳新婦舍其行更憐之不可言范新婦省米云余收子敬范新婦唐模帖題詩曰正觀欵書丈二紙不許兒竒專父美而絳帖誤以為右軍東書堂帖佳不後云自新婦母子去寂漠難言思子輩不可言新婦帖新婦服地黃湯來似減眠食尚未佳憂懸不去心君等前所論事想必及謝生未還何爾進退不可解吾當書問也何一作可慰意帖得諸慰意吾故冀惡尋視汝又告東近諸帖未復東近動靜馳情昨即遣行為不至耶又二十三日獻之問得十九日書之間後何如吾故劣力不一一王獻之問又向聞遊諸懸作今退念時事缺覽之後復慨然又五月十二日獻之白節過感懷深至念痛傷難勝得五日告知君轉勝甚慰甚慰雨過此復何如想消息日平復也謹僕近暴不佳如惡氣當時極惡賴即退耳故虛劣勿勿還不多王獻之白又思想轉思省告知君亦同如今未知面期近遠此慨可言惟深保愛數音問尋故旨取君消息又信明還東有還書願送來已今分明至著都上又慰之吾故沈頓思見之故想時能問疾得來先報之不能得自致者旨取車王獻之答又獻之白奉承問近雪寒患面疼腫腳中更急痛兼少下甚馳情轉和佳不審尊體復何如得此諸患小差不復思何如幸能復散故鎮益久藥何以不更將之遲尋復旨若獻之弊於淡飰飲得春風氣惛亂言故欲熱復食酒為腹可耳獻之白相過帖相過終無復日悽切在心未嘗暫撥一日臨坐目想勝風但有感慟當復如何常謂人之相得古今洞盡此處殆無恨于懷但痛神理與此而窮耳盡此感深殆無冥處常恨況相遇之難而乖其所同省告不覺滻流既已往矣亦復何言獻之黃云相過無復日借匪獻之韻自可賞夏日帖夏日感思兼悼切割心懷痛當奈何奈何得思道書慰意薄熱汝比各可不吾並故諸惡勞益勿勿獻之白疏慕容帖慕容有易賴意耶米云無名人偽薄冷帖薄冷足下沈痼已經嵗月豈宜觸此寒耶人生稟氣各有攸處想示消息薄冷益部二帖米以為歐率更書益部帖黃云借陳壽所著益部耆舊傳也益部耆舊傳今送想催驅寫取耳慎不可過淹留吾去月從孫家求信次頓爾頻為亂反側餳大佳栁六惠言餳可常餌亦覺有益耳思戀帖獻之白思戀轉不可言瞻近而未得奉見但有歎息遲諸信還具動靜獻之白信一作攸又作作轉勝帖黃云疾不退至分張語類江表人疾不退潛處當日深豈可以常理待之此豈常憂闕不審食復何如飢色可可所堪轉勝復以此慰馳竦耳羲之有此帖潛處作潛損當作亦當消息帖消息亦不可不恆精以經心向秋冷疾下亦應防也獻之下斷來恆患頭項痛復小爾耳項施作頂集聚帖省前書故有集聚意當能果不足下小大佳不聞官前逼遣足下甚急想以相體恕耳足下兄子已至廣州耶當有得集理不念懸心也耳近豫帖白承舍內分違近豫遂就難以喻通濟理獻之白復面帖復面悲積蕃首以不佳耿耿僕近動散委頓雖轉折猶惙然發止尚以未定日冀以言首力還不復耳黃云復面悲積宋齊人語西問帖得西問不寇復云何令人邑邑具示寇劉釋作寖月終帖獻之言月終伏惟哀傷不可任不審尊體諸患復何如悚息謹言疏不備獻之言西問月終米云皆偽安和帖獻之白奉别告承安和慶慰極冷不審尊體復何如獻之比日如復小勝因夜行忽復下如欲作帶今服藥盡溫燥理冀當可耳然異極都不得復小失和卿惡亦不得妄近生冷體氣頓至此令人絶歎行有佳酒便服何如一作何必卿黃諫作已行陳作何酒劉作治者大觀帖此下有獻之二字施謂别用摹入此帖餘杭帖獻之白思戀觸事彌至獻之既欲過餘杭州將若比還京必視之來月十左右便當發奉見無復日比告可喻願復盡珍重理獻之白見劉作兄晴快帖再拜夏節近感思深惟窮號崩絶不可忍處晴怏不審體中何似食噉復多少甚馳情不審諸舍復何如未復西動靜不寧此多患反側願深寬勉故承問多一作知珍重帖思戀無往不慰省告對之悲塞未知何日復得奉見何以喻此心惟願盡珍重理遲此信反復知動靜尊體何如帖獻之白不審尊體復何如昨夜眠多少願盡寬喻理憂馳可復言若得消息者獻之者劉作告一作去中秋帖十二月割至不中秋不復不得想未復還慟理為即甚省如何然勝人何慶等慶等大軍日寒帖日寒涼得告承諸惡闕復灸極嘗慘痛悲灼僕病正自不差疾久自闕目深悲企甚積既慘塞居疾係以罪黜二三不出職門近疑所敘似不闕益企恨秋牽借請有人當復敘耳米云日寒帖後有兩行謝安批所謂批後為答也唐太宗不收獻之帖上刮去不次獻之白字謂之羊欣以應募而蘭亭帖亦以為羊欣書南中佳音帖南中佳音一一小慰解數月也吾甚憂慮卿君何如耶獻之白鮓帖適得元直二十三日疏送白鮓今送十裹似並猶堪噉獻之白服黃芪帖承服腎氣丸故以為佳獻之比服黃芪甚勤平平耳亦欲至十齊當可知齊劑通用劉釋作齋誤湯酒帖得書為慰吾先夜遂大得服湯酒諸治漸折故頓極難勞知足下便去不得靣别怏恨深保愛臨書增懷王獻之怏一作悵鴨頭丸帖鴨頭丸故不佳明當必集當與君相見服油帖服油得力更能停噉麵只五六日停也不至絶艱辛也足下明當必果想即日如何深相憶送梨帖今送梨三百顆晚雪殊不能佳淳熙所刻及賜書堂皆右軍米以為大令鏡湖帖鏡湖澄徹清流瀉注山川之美使人應接不暇王右軍云每行山隂道上如鏡中遊與此可互觀父子高致如此王云按世説稱子敬云不言尺牘疏明謝安忠勳疏故太傅臣安少振玄風道譽滋溢弱冠遐棲則契齊箕皓應運釋褐而王猷允塞及至載宣威靈強猾消殄功勳既融投韍髙讓且服事先帝眷隆布衣陛下踐阼陽秋尚富盡心竭智以輔聖明考其潛躍始終事情繾綣實大晉之雋輔義篤於曩臣矣伏惟陛下留心宗臣澄神於省察表啓琅琊王為中書監表中書重職掌詔命當否是寄自大晉建國常令宰相參領中興以來益重其任故非輕才所可獨任也又中書職掌詔命非輕才所能獨任自晉建國嘗命宰相參領中興以來益重其任故能王言彌徽德音四塞者也墓志保母志琅琊王獻之保母姓李名意如廣漢人也在母家志行髙秀歸王氏柔順恭勤善屬文能草書解釋老旨趣年七十興寧三年嵗在乙丑二月六日無疾而終仲冬季望葬會稽山隂之黃閼岡下殉以曲水小硯交螭方壺樹雙松於墓上立貞石而志之悲夫後八百餘載知獻之保母宫於兹土者尚焉詩桃葉歌二首古今樂録云桃葉歌晉王子敬所作也桃葉子敬妾緣於篤愛所以歌之隋書五行志曰陳時江南盛歌王獻之桃葉詞桃葉復桃葉渡江不用楫但渡無所苦我自迎接汝後隋晉王廣伐陳置將桃葉山下及韓擒虎渡江大將任蠻奴至新亭以𨗳北軍之應桃葉復桃葉渡江不用楫但渡無所苦我自來迎接藝文作我自迎接汝桃葉復桃葉桃樹連桃根相憐兩樂事獨使我殷勤藝文作纒綿漢魏六朝百三家集卷六十
