body:
  text: 漢魏六朝百三家集卷四十八晉陸機集題詞陸氏為吳世臣士衡才冠當世國亡主辱顛沛圖濟成則張子房敗則姜伯約斯其人也俯首入洛竟縻晉爵身事仇讐而欲髙語英雄難矣太康末年釁亂日作士衡豫誅賈謐佹得通侯俗人謂福君子謂禍趙王誅死羈囚廷尉秋風尊鱸可早决幾復戀成都活命之恩遭孟玖青蠅之譛黑幰告夢白帢受刑畫獄自投其誰戚哉張茂先博物君子昧於知止身族分滅前車不逺同堪痛哭然寃結亂朝文懸萬載弔魏武而老奸掩袂賦豪土而驕王喪魄辨亡懷宗國之憂五等陳建侯之利北海以後一人而巳排沙簡金興公造喻子患才多司空歎美尚屬輕今賤目非深知平原者也目録賦文賦遂志賦祖德賦述先賦思親賦别賦懷土賦思歸賦行思賦感時賦歎逝賦愍思賦述思賦大暮賦感丘賦又列仙賦凌霄賦幽人賦應嘉賦豪士賦浮雲賦白雲賦鼓吹賦又漏刻賦羽扇賦桑賦瓜賦鱉賦表謝平原內史表薦賀循郭訥表見原後謝表薦張暢表箋與趙王倫薦戴淵箋同前至洛與成都王潁箋書與弟雲書四首又又又七七徵連珠演連珠五十首論五等諸侯論辨亡論上辨亡論下議大田議頌漢髙祖功臣頌贊孔子贊王子喬贊針丞相針策文策秀才文六首又又又又又傳顧談傳碑晉平西將軍孝侯周處碑誄吳大帝誄愍懷太子誄吳大司馬陸公誄吳貞獻處士陸君誄弔文弔魏武帝文弔蔡雍文哀辭吳大司馬陸公少女哀辭漢魏六朝百三家集卷四十八目録欽定四庫全書漢魏六朝百三家集卷四十八明張溥輯晉陸機集賦文賦有序余每觀才士之所作竊有以得其用心夫其放言遣辭良多變矣妍蚩好惡可得而言每自屬文尤見其情恆患意不稱物文不逮意蓋非知之難能之難也故作文賦以述先士之盛藻因論作文之利害所由他日殆可謂曲盡其妙至於操斧伐柯雖取則不逺若夫隨手之變良難以辭逮蓋所能言者具於此云爾佇中區以𤣥覽頤情志於典墳遵四時以歎逝瞻萬物而思紛悲落葉於徑秋喜柔條於芳春心凛凛以懷霜志眇眇而臨雲詠世德之駿烈誦先人之清芬游文章之林府嘉麗藻之彬彬慨投篇而援筆聊宣之乎斯文其始也皆收視反聽耽思傍訊精騖八極心遊萬仞其致也情瞳朧而彌鮮物昭晰而互進傾羣言之瀝液潄六藝之芳潤浮天淵以安流濯下泉而濳浸於是沈辭怫悅若游魚銜鈎而出重淵之深浮藻聨翩若翰鳥纓繳而墜層雲之峻收百世之闕文採千載之遺韻謝朝華於已披啓夕秀於未振觀古今於須㬰撫四海於一瞬然後選義按部考辭就班抱景者咸仰懷響者畢彈或因枝以振葉或㳂波以討源或本隱以之顯或求易而得難或虎變而獸擾或龍見而鳥瀾或妥帖而易施或岨峿而不安罄澄心以凝思眇衆慮而為言籠天地於形內挫萬物於筆端始躑躅於燥吻終流離於濡翰理扶質以立幹文垂條而結繁信情貌之不差故每變而在顔思涉樂其必笑方言哀而已歎或操觚以率爾或含毫而邈然伊兹事之可樂固聖賢之所欽課虛無以責有叩寂寞而求音函綿邈於尺素吐滂沛乎寸心言恢之而彌廣思按之而逾深播芳㽔之馥馥發青條之森森粲風飛而飈竪鬱雲起乎翰林體有萬殊物無一量紛紜揮霍形難為狀辭程才以效伎意司契而為匠在有無而僶俯當淺深而不讓雖離方而遁圓期窮形而盡相故夫誇目者尚奢愜心者貴當言窮者無隘論違者唯曠詩緣情而綺靡賦體物而瀏亮碑披文以相質誄纒綿而悽愴銘博約而溫潤針頓挫而清壯頌優游以彬蔚論精微而朗暢奏平徹以間雅說煒燁而譎誑雖區分之在兹亦禁邪而制放要辭達而理舉故無取乎冗長其為物也多姿其為體也屢遷其㑹意也尚巧其遣言也貴妍暨音聲之迭代若五色之相宣雖逝止之無常固﨑錡之難便荀達變而識次猶開流以納泉如失機而後㑹常操末以續巔謬𤣥黃之秩叙故淟涊而不鮮或仰逼於先條或俯侵於後章或辭害而理比或言順而義妨離之則雙美合之則兩傷考殿最於錙銖定去留於毫芒茍銓衡之所裁固應繩其必當或文繁理富而意不措適極無兩致盡不可益立片言而居要乃一篇之警策雖衆辭之有條必待兹而效績亮功多而纍寡故取足而不易或藻思綺合清麗芊眠炳若縟繡悽若繁絃必所擬之不殊乃暗合乎曩篇雖杼軸於豫懷怵他人之我先茍傷亷而愆義亦雖愛而必捐或苕發穎竪離衆絶致形不可逐響難為係塊孤立而特峙非常音之所緯心牢落而無偶意徘徊而不能揥石韞玉而山暉水懷珠而川媚彼榛楛之勿翦亦䝉榮於集翠綴下里於白雪吾亦濟夫所偉或託言於短韻對窮迹而孤興俯寂寞而無友仰寥廓而莫承譬偏絃之獨張含清唱而靡應或寄辭於瘁音言徒靡而弗華混妍蚩而成體纍良質而為瑕象下管之偏疾故雖應而不和或遺理以存異徒尋虛以逐微言寡情而鮮愛辭浮漂而不歸猶絃么而徽急故雖和而不悲或奔放以諧合務嘈囋而妖冶徒悅目而偶俗固聲髙而曲下寤防露與桑間又雖悲而不雅或清虛以婉約每除煩而去濫闕大羮之遺味同朱絃之清汜雖一唱而三嘆固既雅而不豔若夫豐約之裁俯仰之形因宜適變曲有微情或言拙而喻巧或理朴而詞輕或襲故而彌新或㳂濁而更清或覽之而必察或研之而後精譬猶舞者赴節以投袂歌者應絃而遣聲是蓋輪扁所不得言故亦非華說之所能精普辭條與文律良余膺之所服練世情之常尤識前修之所淑雖濬發於巧心或受嗤於拙目彼璚敷與玉藻若中原之有菽同槖籥之罔窮與天地乎並育雖紛藹於此世嗟不盈於豫掬患挈瓶之屢空病昌言之難屬故踸踔於短韻放庸音以足曲恆遺恨以終篇豈懷盈而自足懼䝉塵於叩缶顧取笑乎鳴玉若夫感應之㑹通塞之紀來不可遏去不可止藏若景滅行猶響起方夭機之駿利夫何紛而不理思風發於胸臆言泉流於唇齒紛葳蕤以馺遝唯毫素之所擬文徽徽以溢目音泠泠以盈耳及其六情底滯志往神留兀若枯木豁若涸流攬營魂以探頤頓精爽而自求理翳翳而愈伏思軋軋其若抽是以或竭情而多悔或率意而寡尤雖兹物之在我非余力之所勠故時撫空懷而自惋吾未識夫開塞之所由也伊兹文之為用固衆理之所因恢萬里使無閡通億載而為津俯貽則於來葉仰觀象於古人濟文武於將墜宣風聲於不泯塗無逺而不彌理無微而弗綸配霑潤於雲雨象變化乎鬼神被金石而德廣流管絃而日新遂志賦有序昔崔篆作詩以明道述志而馮衍又作顯志賦班固作幽通賦皆相依倣焉張衡思𤣥蔡雍𤣥表張叔哀系此前世之可得言者也崔氏簡而有情顯志壯而泛濫哀系俗而時靡𤣥表雅而微素思𤣥精練而和惠欲麗前人而優游清典漏幽通矣班生彬彬切而不絞哀而不怨矣崔蔡冲虛溫敏雅之屬也衍抑揚頓挫怨之徒也豈亦窮達異事而聲為情變乎余備托作者之末聊復用心馬武定鼎於洛汭胡受瑞於汝墳繇鳴鳯於百祀啓敬仲乎方震茍天光之所照豈舜族其必陳厭禋祀於故墟饗禴祭於東鄰禰八葉而松茂舞九韶乎降神系姜叟於海曲表滄流於逺震仰前蹤之綿邈豈孤人之能胄匪世祿之敢懷傷兹堂之不搆理或暌而後合道有夷而弗順傳棲嵓而神交伊荷鼎以自進蕭綢繆於豐沛故攀龍而先躍陳頓委於楚魏亦凌霄以自濯伍被刑而伏劍魏和戎而擁樂彼殊塗而並致此同川而偏溺禍無景而易逢福有時而難學惟萬物之運動雖紛糾而相襲隨性類以曲成故圓行而方立要信心而委命援前修以自程擬遺跡於成軌詠新曲於故聲任窮達以逝止亦進仕而退耕庶斯言之不渝抱耿介以成名祖德賦咨時文之懿祖膺降神之靈曜棲九德以𢎞道振風烈以增劭彼劉公之矯矯固雲網之逸禽既憑形以傲物諒傅翼而棲林伊我公之秀武思無幽而弗昶形鮮烈於懷霜澤溫惠乎挾纊收希世之洪捷固山谷而為量西夏坦其無塵帝命赫而大壯登具瞻於太階濯長纓乎天漢解戎衣以髙揖正端冕而大觀戢靈武於既曜恢時文於未煥騰絶風以逸騖庶遐蹤於公旦述先賦仰先后之顯烈懿暉祚之允輯應逺期於己曠昭前光於未戢抱朗節以遐慕振竒迹而峻立在虐臣之貪禍據西山而作違招長轂於河畔飲冀馬乎江湄頓雲網而濳泳揮神戈而外臨敵罔隆而弗夷逆無微而不禽茂德韡其既休元勳曄而洊舉龍衮服於太階配三台乎其所是故其生也榮雖萬物咸被其仁其亡也哀雖天網猶失其綱嬰國命以逝止亮身沒而吳亡思親賦悲桑梓之悠曠愧蒸嘗之弗營指南雲以寄欵望歸風而效誠年嵗俄其聿暮明星爛而將清回飈肅以長赴零雪紛其下穨羡纎枝之在幹悼落葉之去枝存顧復之遺志感明發之所懷居辭安而厭苦養引約而摧豐忘天命之晚暮願鞠子之速融兄瓊芳而蕙茂弟蘭發而玉暉感瑰姿之晚就痛慈景之先違天步悠長人道短矣異途同歸無早晚矣别賦伊公子之可懷悲永别之局期悼同居之無樂曾不踰乎一朞經春秋之寒暑常戚戚而不怡登九層而修觀超臨逺以相思懷土賦有序余去家漸久懷土彌篤方思之殷何物不感曲街委巷罔不興詠水泉草木咸足悲焉故述斯賦背故都之沃衍適新邑之丘墟遵黃川以葺宇被蒼林而卜居悼孤生之已晏恨親沒之何速排虛房而永念想遺塵其如玉眇綿邈而莫覯徒佇立其焉屬感亡景於存沒惋隤年於拱木悲顧盻而有餘思俯仰而自足留兹情於江介寄瘁貌於河曲玩通川以悠想撫征轡而躑躅伊命駕之徒勤慘歸途之良難愍棲烏於南枝弔離禽於别山念庭樹以悟懷憶路草以解顔甘堇荼於飴芘締蕭艾其如蘭神何寢而不夢形何興而不言思歸賦有序余以元康六年冬取急歸而王師外征職典中兵與聞軍政懼兵革未息宿願有違懷歸之思憤而成篇節運代序四時相推寒風肅殺白露霑衣嗟行邁之彌留感時逝而懷悲彼離思之在人恆戚戚而無歡悲緣情以自誘憂觸物而生端畫輟食而發憤宵假寐而興言羡歸鴻以矯首挹谷風而如蘭嵗靡靡而薄暮心悠悠而增楚風霏霏而入室響泠泠而愁豫既遨遊乎川沚亦改駕乎山林伊我思之沉鬱愴感物而增深歎隨風而上逝涕承纓而下尋冀王事之暇豫庶歸寧之有時候凉風而警策指孟冬而為期願靈暉之促景恆立表以望之行思賦背洛浦之遙遙浮廣川之裔裔遵河曲以悠逺觀通流之所會啓石門而東縈㳂汴渠其如帶託飄風之習習冒沉雲之藹藹商秋肅其發節𤣥雲沛而埀隂凉風凄其薄體零雨鬱而下淫覩川禽之遵渚看山鳥之歸林揮清波以濯羽翳緑葉而弄音行彌久而情勞途愈近而思深羡品物以獨感悲綢繆而在心嗟逝官之永久年荏苒而厯兹越河山而託景眇四載而逺期孰歸寧之弗樂獨抱感而弗怡感時賦悲夫冬之為氣亦何憯凛以蕭索天悠悠其彌髙霧鬱鬱而四幕夜綿邈其難終日晼晚而易落敷層雲之葳㽔墜零雪之揮霍冰冽冽而寢興風謖謖而妄作鳴枯條之冷冷飛落葉之漠漠山崆巄以含瘁川蜲蛇而抱涸望八極以曭漭普宇宙而寥廓伊天時之方慘曷萬物之能歡魚徴徴而求偶獸嶽嶽而相攢猿長嘯於林杪鳥髙鳴於雲端矧余情之含瘁恆覩物而增酸厯四時之迭感悲此嵗之已寒撫傷懷以嗚咽望永路而泛瀾歎逝賦冇序昔每聞長老追計平生同時親故或雕落已盡或僅有存者余年方四十而懿親戚屬亡多存寡昵交密友亦不半在或所曾共遊一塗同宴一室十年之內索然已盡以是思哀哀可知矣乃為賦曰伊天地之運流紛升降而相襲日望空以駿驅節循虛而警立嗟人生之短期孰長年之能執時飄忽其不再老晼晚其將及懟瓊蘂之無徵恨朝霞之難挹望暘谷以企豫惜此景之屢戢悲夫川閲水以成川水滔滔而日度世閲人而為世人冉冉而行暮人何世而弗新世何人之能故野每春其必華草無朝而遺露經終古而常然率品物其如素譬日及之在條恆雖盡而不悟雖不悟而可悲心惆焉而自傷亮造化之若兹吾安取夫久長痛靈根之夙殞怨具爾之多喪悼堂構之頽瘁愍城闕之丘荒親彌懿其已逝交何戚而不亡咨余命之方殆何視天之茫茫傷懷悽其多念蹙貌瘁而鮮歡幽情發而成緒滯思叩而興端慘此世之無樂詠在昔而為言居充堂而愆宇行連駕而比軒彌年時其詎幾夫何往而不殘或冥邈而既盡或寥廓而僅半信松茂而柏悅嗟芝焚而蕙歎茍性命之弗殊豈同波而異瀾瞻前軌之既覆知此路之良難啓四體而深悼懼兹形之將然毒娛情之寡方怨感目之多顔諒多顔之感目神何適而獲怡尋平生於響像覽前物而懷之步寒林以悽惻玩春翹而有思觸萬物以生悲歎同節而異時年彌往而念廣塗薄暮而意迮親落落而日稀友靡靡而愈索顧舊要於遺存得十一於千百樂隤心其如忘哀緣情而來宅託未契於後生余將老而為客然後弭節安懷妙思天造精浮神淪忽在世表寤大暮之同寐何矜晚以怨早指彼日之方除豈兹情之足攪感秋華於衰木瘁零露於豐草在殷憂而弗違夫何云乎識道將頤天地之大德遺聖人之洪寶解心纍於末迹聊優游以娛老愍思賦有序豫屢抱孔懷之痛而奄復喪同生娣銜恤哀傷一載之間而喪制便過故作此賦以紓慘惻之感時方至其倐忽嵗既去其晼晚樂來日之有繼傷頽年之莫纂覽萬物以澄念怨伯娣之已逺尋遺塵之思長瞻日月之何短升降乎階際顧盻兮屏營雲承宇兮藹藹風入室兮泠泠僕從為我悲孤鳥為我鳴述思賦情易感於己攬思難戢於未忘嗟伊思之且爾夫何往而弗臧駭中心於同氣分戚貌於異方寒鳥悲而饒音衰林愁而寡色嗟余情之屢傷負大悲之無力茍彼塗之信險恐此日之行昃亮相見之幾何又離居而别域觀尺景以傷悲撫寸心而悽惻大暮賦有序夫死生是得失之大者故樂莫甚焉哀莫深焉使死而有知乎安知其不如生如遂無知耶又何生之足戀故極言其哀而終之以達庶以開夫近俗云夫何天地之遼濶而人生之不可久長日引月而並隕時維嵗而俱喪知自壯而得老體自老而得亡顧黃壚之杳杳悲泉路之翳翳挫千乘猶一毫當何數乎智慧徒假願於須臾指夕景而為誓忽呼吸而不振奄神徂而形斃顧萬物而遺恨收百慮而長逝於是六親雲起姻族如林爭塗淹淚望門舉音敷幄席以悠想陳備物而虞靈仰寥廓而無見俯寂寞而無聲肴饛饛其不毁酒湛湛而每盈屯送客於山足伏埏道而哭之扄幽户以大畢訴𤣥闕而長辭歸無塗兮往不反年彌去兮逝彌逺彌逺兮日隔無塗兮曷因庭樹兮葉落暮草兮根陳感丘賦泛輕舟於西川背京室而電飛遵伊洛之坻渚㳂黃河之曲湄覩墟墓於山梁託崇山以自綏見兆域之藹藹羅魁封之纍纍於是徘徊洛涯弭節河干佇盻留心慨爾遺歎仰終古以逺念窮萬緒乎其端伊人生之寄世猶水草乎山河應甄陶以嵗改順通川而日過爾乃申舟人以遂往橫大川而有悲傷年命之倐忽怨天步之不幾雖履信而思順曾何足以保兹普天壤其弗免寧吾人之所辭願靈根之晚墜指嵗暮而為期又生矜跡於當世死同宅乎一丘翳形骸以下淪兮漂營魂而上浮隨隂陽以融冶託山原以為疇妍媸混而為一孰云識其所修必眇代以逺覽兮夫何徇乎區陬列仙賦夫何列仙𤣥妙超攝生乎世表因自然以為基仰造化而聞道性冲虛以易足年緬邈其難老爾乃呼翕九陽抱一含元引新吐故雲飲露餐違品物以長盻妙羣生而為言爾其嘉㑹之仇息宴遊棲則昌客弄玉洛宓江妃觀百化於神區覲天皇於紫微過太華以息駕越流沙而來歸凌霄賦挾至道之容微狹流俗之紛沮揚余節以逺模風扶搖而相豫削陋跡於分丘省遊仙而投軌凱情纍以遂濟豈時俗之云阻判煙雲之騰躍半天步而無旅詠凌霄之飄飄永終焉而弗悔昊蒼煥而運流日月翻其代序下霄房之靡迄卜良晨而復舉陟瑤臺以投轡步玉除而容與幽人賦世有幽人漁釣乎𤣥渚彈雲冕以辭世披霄褐而延佇是以物外莫得窺其奧舉世不足揚其波徑秋不能雕其葉芳春不能發其華超塵冥以絶緒豈世網之能加應嘉賦有序友人有作嘉遁賦與余者作賦應之號曰應嘉云傲世公子體逸懷遐意邈澄霄神夷靜波仰羣軌以遙企頓駿羽以婆娑寄冲氣於大象解心纍於世羅襲三閭之竒服詠南榮之清歌濯下泉於浚澗泝凱風於卷阿指千秋以厲響俟寂寞之來和懷前修之倣佛覿幽人乎所過抱𤣥景以獨寐含清風而寤語發蘭音以清唱操玉懷而喻豫於是葺宇中陵築室河曲軌絶千途而門瞻百族假妙道以達觀考賁龜而貞卜茍形骸之可忘豈投簮其必谷方介丘於尺阜託雲林乎一木佇鳴條以招風聆哀音其如玉窮覽物以盡齒將弭跡於餘足豪士賦有序夫立德之基有常而建功之路不一何則循心以為量者存乎我因物以成務者繫乎彼存夫我者隆殺止乎其域繫乎物者豐約唯所遭遇落葉俟微風以隕而風之力蓋寡孟嘗遭雍門以泣而琴之感以末何者欲隕之葉無所假烈風將墜之泣不足繁哀響也是故茍時啓於天理盡於民庸夫可以濟聖賢之功斗筲可以定烈士之業故曰才不半古而功已倍之蓋得之於時勢也厯觀古今徼一時之功而居伊周之位者有矣夫我之自我智士猶嬰其纍物之相物昆蟲皆有此情夫以自我之量而挾非常之勳神器暉其顧盻萬物隨其俯仰心玩居常之安耳飽從諛之說豈識乎功在身外任出才表者哉且好榮惡辱有生之所大期忌盈害上鬼神猶且不免人主操其常柄天下服其大節故曰天可讎乎而時有袨服荷㦸立乎廟門之下援旗誓衆奮於阡陌之上况乎代主制命自下裁物者哉廣樹恩不足以敵怨勤興利不足以補害故曰代大匠斫者必傷其手且夫政由寧氏忠臣所為慷慨祭則寡人人主所不久堪是以君奭鞅鞅不悅公旦之舉髙平師師側目博陸之勢而成王不遣嫌吝於懷宣帝若負芒刺於背非其然者歟嗟乎光于四表德莫富焉王曰叔父親莫昵焉登帝天位功莫厚焉守節沒齒忠莫至焉而傾側顛沛僅而自全則伊生抱明允以嬰戮文子懷忠敬而齒劍固其所也因斯以言夫以篤聖穆親如彼之懿大德至忠如此之盛尚不能取信於人主之懷止謗於衆多之口過此以往惡覩其可安危之理斷可識矣又况乎叨大名以冒道家之忌運短才而易聖哲所難者哉身危由於勢過而不知去勢以求安禍積起於寵盛而不知辭寵以招福見百姓之謀己則申宫警守以崇不畜之威懼萬民之不服則嚴刑峻制以賈傷心之怨然後威窮乎震主而怨行乎上下衆心日陊危機將發而方偃仰瞪眄謂足以夸世笑古人之未工忘己事之己拙知曩勳之可矜暗成敗之有㑹是以事窮運盡必於顛仆風起塵合而禍至常酷也聖人忌功名之過己惡寵祿踰量蓋為此也夫惡欲之大端賢愚所共有而游子徇髙位於生前志士思埀名於身後受生之分唯此而已夫蓋世之業名莫大焉震主之勢位莫盛焉率意無違欲莫順焉借使伊人頗覽天道知盡不可益盈難久持超然自引髙揖而退則巍巍之盛仰邈前賢洋洋之風俯冠來籍而大欲不乏於身至樂無愆乎舊節彌效而德彌廣身愈逸而名愈劭此之不為彼之必昧然後河海之迹堙為窮流一簣之釁積成山嶽名編凶頑之條身厭荼毒之痛豈不謬哉故聊賦焉庶使百世少有寤云世有豪士兮遭國顛沛攝窮運之歸期當衆通之所㑹茍時至而理盡譬摧枯而振敗因天地以運動恆才瑣而功大於是禮極上典服盡暉崇儀北辰以葺宇實蘭室而桂宫撫玉衡於樞極運萬物乎掌中伊天道之剛健猶時至而必愆日罔中而弗昃月何盈而不闕襲覆車之危軌笑前乘之去穴若知險而退止趨歸蕃而自戢推璇璣以長謝顧萬物而髙揖訖浮雲以邁志豈咎吝之能集擠為山以自隕歎禍至於何及浮雲賦有輕虛之艷象無實體之真形厚厥本初浮沉混并六律籥應八風時邁𤣥隂觸石甘澤雱霈勢不崇朝覆彼無外若層臺髙觀重樓疊閣或如鐘首之鬱律乍似寒門之寥廓金柯分玉葉散緑翹明嵓英煥鸞翔鳯翥鴻驚鶴奮鯨鯢泝波鮫鰐衝遁朱絲亂紀羅袿失領飛仙凌虛隨風遊聘有若芙蓉羣披蕣華總㑹車渠繞理瑪瑙縟文白雲賦攄神景於八幽合洪化乎烟煴充宇宙以播象協元氣而齊勳發憤靈石擢性洪流興曜曾泉升迹融丘盈八紘以餘憤雖彌天其未泄豈假期於遷晷遇崇朝而倐忽紅蘃發而菡蓞金翹援而合葩神收鬼化弼性違序鳥殊類而比棲獸異迹而同處蛟引翳而並濳龍攀鴻而雙舉鸞舞角以軒罷鷙企翮而延佇長城曲蜿采閣相扶聳瑤臺之嶻嶭構瓊闥之離婁雄虹矯而垂天翠鳥軒而扶日鼓吹賦原鼓吹之伊始蓋禀命於黃軒播威靈於兹樂亮聖器而成文騁逸氣而憤壯繞煩手乎曲折舒飄颻以遐洞卷徘徊其如結及其悲唱流音倣徨依違合歡嚼弄乍數乍稀音躑躅於唇吻舌將舒而復回鼓砰砰以輕投簫嘈嘈而微吟詠悲翁之流思怨髙臺之難臨顧穹谷以含哀仰歸雲而落音節應氣以舒卷響隨風而浮沉馬頓迹而增鳴士嚬蹙而霑襟若乃巡郊澤戲野坰奏君馬詠南城慘巫山之遐險歡芳樹之可榮又宫備衆聲體僚君器飾聲成文雕音作蔚響以形分曲以和綴放嘉樂於㑹通宣萬變於觸類適清響以定奏期要妙於豐㑹邈拊摶之所管務戞厯之為最漏刻賦偉聖人之制器妙萬物而為基形罔隆而弗包理何逺而不之寸管俯而隂陽效其誠尺表仰而日月與之期𤣥鳥懸而八風以情應玉衡立而天地不能欺既窮神以盡化又設漏以考時爾乃挈金壺以南羅藏幽水而北戢擬洪殺於編鍾順卑髙而為級激懸泉以逺射跨飛途而遙集伏隂蟲以承波吞恆流其如挹是故來象神造去猶鬼幻因勢相引乘靈自薦口納胸吐水無滯咽形微獨繭之緒逝若垂天之電偕四時以合最指昏明乎無殿籠八極於千分度晝夜乎一箭抱百刻以駿浮仰胡人而利見夫其立體也簡而效績也誠其假物也粗而致用也精積水不過一鍾導流不過一筳而用天者因其敏分地者賴其平徵聽者假其察貞觀者借其明考計厯之濳慮測日月之幽情信探頤之妙術雖無神其若靈羽扇賦昔楚襄王㑹於章臺之上山西與河右諸侯在焉大夫宋玉唐勒侍皆操白鶴之羽以為扇諸侯掩麈尾而笑襄王不悅宋玉趨而進曰敢問諸侯何笑諸侯曰昔者武王𤣥覽造扇於前而五明安衆庶繁於後各有託於方圓蓋受則於􅝍甫舍兹器而不用顧奚取於鳥羽宋玉曰夫創始者恆朴而飭終者必妍是故烹飪起於熱石玉輅基於椎輪安衆方而氣散五明圓而風煩未若兹羽之為麗固體俊而用鮮彼凌霄之偉鳥播鮮輝之輕蒨隱九臯以鳯鳴游芳田而龍見醜靈龜而逺期超長年而久眄纍懷璧於美羽挫千載乎一箭委曲體以受制奏雙翅而為扇則其布翮也差洪細秩長短稠不逼稀不簡於是鏤巨獸之齒裁竒木之幹憲靈朴於造化審貞則而妙觀移圓根於正體因天秩乎舊貫鳥不能别其是非人莫敢分其真贋翩姗姗以微振風􅥝􅥝以埀婉妙自然以為言故不積而能散其執手也安其應物也誠其招風也利其播氣也平混貴賤而一節風無往而不清諸侯曰善宋玉遂言曰伊兹羽之駿敏似南箕之啓扉垂皓曜之奕奕含鮮風之微微襄王仰而拊節諸侯伏而引非皆委扇於楚庭執鳥羽而言歸屬唐勒而為之辭曰伊鮮禽之令羽夫何翩翩與眇眇反寒暑於一掌之末回八風乎六翮之杪桑賦皇太子便坐蓋本將軍直廬也初世祖武皇帝為中壘將軍植桑一株世更二代年漸三紀扶踈豐衍抑有瑰異焉夫何佳樹之洪麗超託居乎紫庭羅萬根以下洞矯千條而上征豈民黎之能植乃世武之所營故其形瑰族類體豔衆木黃中爽理滋榮煩縟緑葉興而盈尺崇條蔓而層尋希太極以延峙映承明而廣臨革飛梟之流響想鳴鳥之遺音唯厯數之有紀恆依物以表德豈神明之所相將我皇之先識誇百世而勿剪超長年以永植瓜賦佳哉瓜之為德邈衆果而莫賢殷中和之淳祐播滋榮於甫田背芳春以初載迎朱夏而自延奮修系之莫莫邁秀瓞之綿綿赴廣武以長蔓粲煙接以雲連感佳時而促節䝉惠露而增鮮若乃紛敷雜錯鬱悅婆娑發彼適此迭相經過煕朗日以熠耀扇和風其如波有葛虆之覃及相椒聊之衆多發金榮於秀翹結玉實於柔柯蔽翠景以自育綴修莖而星羅夫其種族類數則有括蔞定桃黃㼐白傅金文密筒小青太斑𤣥骭素碗貍首虎蹯東陵出於秦谷桂髓起於巫山五色比象殊形異端或濟貌以表內或惠心而醜顔或攄文而抱緑或披素而懷丹氣洪細而俱芬體修短而必圓芳郁烈其充堂味窮理而不䬼德𢎞濟於飢渴道殷流乎貴賤若夫濯以寒水淬以夏凌越氣外斂溫液密凝體猶握虛離若剖冰鱉賦有序皇太子幸于釣臺漁人獻鱉命侍臣作賦其狀也窮脊運脅𤣥甲四周遁方圓於規矩徒廣狹以妨循盈尺而腳寸又取具於指掌鼻嘗氣而忌脂耳無聽而受響是以棲居多逼出處寡便尾不副首足不運身於是從容澤畔肆志汪洋朝戲蘭渚夕息中塘越髙波以燕逸竄洪流而潜藏咀蕙蘭之芳荄翳華藕之埀房表謝平原內史表陪臣陸機言今月九日魏郡太守遣兼丞張含齎板詔書印綬假臣為平原內史拜受祗竦莫知所裁臣機頓首死罪死罪臣本吳人出自敵國世無先臣宣力之效才非丘園耿介之秀皇澤廣被惠濟無逺擢自羣萃纍䝉榮進入朝九載厯官有六身登三閣宦成兩宫服冕乘軒仰齒貴遊振景拔迹顧邈同列施重山嶽義足灰沒遭國顛沛無節可紀雖䝉曠蕩臣獨何顔俯首頓膝憂愧若厲而橫為故齊王冏所見枉陷誣臣與衆人共作禪文幽執囹圄當為誅始臣之微誠不負天地倉卒之際慮有逼迫乃與弟雲及散騎侍郎袁瑜中書侍郎馮熊尚書右丞崔基廷尉正顧榮汝隂太守曹武思所以獲免隂䝉避迥回﨑嶇自列片言隻字不關其間事蹤筆跡皆可推校而一朝翻然更以為罪蕞爾之生尚不足吝區區本懷實有可悲畏逼天威即罪惟謹鉗口結舌不敢上訴所天莫大之釁日經聖聽肝血之誠終不一聞所以臨難慷慨而不能不恨恨者唯此而己重䝉陛下愷悌之宥回霜收電使不隕越復得扶老攜幼生出獄戶懷金拖紫退就散輩感恩惟咎五情震悼局天蹐地若無所容不悟日月之明遂埀曲照雲雨之澤播及朽瘁忘臣弱才身無足采哀臣零落罪有可察荀削丹書得夷平民則塵洗天波謗絶衆口臣之始望尚未至是猥辱大命顯授符虎使春枯之條更與秋蘭垂芳陸沉之羽復與翔鴻撫翼雖安國免徒起紆青組張敞亡命坐致朱軒方臣所荷未足為泰豈臣䝉垢含吝所宜忝竊非臣毁宗夷族所能上報喜懼參并悲慙哽結拘守常憲當便道之官不得束身奔走稽顙城闕瞻係天衢馳心輦轂臣不勝屏榮延仰謹拜表以聞薦賀循郭訥表伏見武康令賀循德量邃茂才鑒清逺服膺道素風操凝峻厯試二城刑政肅穆前蒸陽令郭訥風度簡曠器識朗拔通濟敏悟才足幹事循守下縣編名凡悴訥歸家巷棲遲有年皆出自新邦朝無知己居在遐外志不自營年時倐忽而邈無階緒實州黨愚智所為恨恨臣等伏思臺郎所以使州州有人非徒以均分顯路惠及外州而己誠以庶土殊風四方異俗壅隔之害逺國益甚至於荆揚二州户各數十萬今揚州無郎而荆州江南乃無一人為京城職者誠非聖朝待四方之本心至於才望資品循可尚書郎訥可太子洗馬舍人此乃衆望所積非但企及清塗茍充方選也謹條資品乞䝉簡察吳志顧榮陸機陸雲薦賀循表其後云臣等並以凡才纍授飾進被服恩澤忝豫朝末知良士後時而守局無言懼有蔽賢之咎是以不勝愚管謹冒死表聞見原後謝表趙王倫以陸士衡為中書侍郎齊王收士衡付廷尉出後謝表臣以職在中書制命所出而臣本以筆札見知辭不獲己乃詐發內妹喪出就弟雲哭泣受弔片言隻字文不關其間薦張暢表伏見司徒下諫議大夫張暢除當為豫州內史丞暢才思清敏志節貞勵秉心立操早有名譽其年時舊比多厯郡守惟暢陵遲未齒而佐下蕃遂蹈碎獨於暢名實損愚以為宜解舉試以近縣牒與趙王倫薦戴淵箋蓋聞繁弱登御然後髙墉之功顯孤竹在肆然後降神之曲成是以髙世之主必假逺邇之器藴匱之才思託大音之和伏見處士廣陵戴若思年三十清冲履道德量允塞思理足以研幽才鑒足以辨物安窮樂志無風塵之慕砥節立行有井泄之潔誠東南之遺寶宰朝之竒璞也若得託跡康衢則能結軌驥騄曜質廊廟必能垂光璵璠矣惟明公垂神採察不使忠允之言以人而廢同前出虞預晉書與今本稍異今并載之蓋聞繁弱登御然後髙墉之功顯孤竹在肆然後降神之曲成伏見處士戴淵砥節立行有井泄之潔安窮樂志無風塵之慕誠東南之遺寶朝廷之貴璞也若得寄跡康衢必能結軌驥騄耀質廊廟必能垂光瑜璠夫枯岸之民果於輸珠潤山之客烈於貢玉蓋明暗呈形則庸識所甄也至洛與成都王頴箋王室多故禍難存有羊𤣥之乘寵凶豎専記朝政姦臣賊子是為比周皇甫商同惡相求共為亂階至令天子飄颻甚於贅旒伏惟明公匡濟之舉義命方宣元戎既啓風威電赫機以駑暗文武寡施猥䝉橫授委任外閫輒承嚴教董率諸軍惟力是視書與弟雲書仁壽殿前有大方銅鏡髙五尺餘廣三尺二寸立著庭中向之便寫人形體了了亦怪也又天淵池南角有果各作一株無處不有縱橫成行一果之間輒作一堂又云天淵池養山雞甚可嬉又監徒武庫建始殿諸房中見有兩足候真怪物也又聽訟觀東作百尺許廊屋又此間有一傖父欲作三都賦須其成以覆酒甕耳七七徵𤣥虛子耽性冲素雍容𤣥泊棄時俗而弗徇甘漁釣於一壑乃有通微大夫怨皇居之失寶傷鴻誓之後聞策𤣥黃於榛險憑穴嵓而放言通微大夫曰竒膳玉食窮滋致豐簡犧羽族考牲毛宗俯出沉鮪仰落歸鴻剖柔胎於孕豹宰潜肝乎豢龍拾朝陽之遺卵納丹穴之飛凰神宰竒稔嘉禾之穗含滋發馨素頴玉鋭灼若皓雪之頽𤣥雲皎若明珠之積緇匱素蟣踊而瀺灂滋芬溢而相徽味雖濃而弗爽氣既惠而復竒介景福於眉壽裕溫克乎齊聖子能饗之乎通微大夫曰豐居華殿竒搆磊落萬宇雲覆千楹林錯仰綏瑰木俯積瑌石敷延袤之廣廡矯凌霄之髙閣秀清暉乎雲表騰藻䕃之奕奕珍觀清榭嶽立連行雲階飛升仰陟穹蒼聳浮柱而虬立施飛檐以龍翔回房旋室綴珠襲玉圖畫神仙延祐承福懸闥髙達長廊回屬於是登漸臺理俊音鏡𤣥沚望長林逐狡獸弋輕禽覽壯藝以悅觀聆和樂而怡心子能居之乎通微大夫曰金石諧而齊響塤箎協而和鳴於是才人進羽籥𤣥辨被藻襲俯縈領以鴻歸仰矯首而鶴立激長歌於丹唇發鏗鏘乎柔木合清商以絶節揮流徵而赴曲奏南荆之髙歎詠易水之清角爾乃覩蛾眉之羣麗容既都而又間矯纎腰以逐節頓皓足於鼓盤舒妍暉以妖韶若陵危之未安通微大夫曰蓋聞沫北有采唐之思淇上有送豫之歎關雎以寤寐為戚溱洧以謔浪為歡若夫妖嬪艷女搜羣擢俊穆藻儀於令表茂當年之柔嫚罄妍規之約綽體每變而增間秀芳蕤其愈愈若餘頴之可餐若夫靈晷潜祖顔退羽觴升清琴厲因清明以宣誠流徽睇而授愛纎手揮而鳴佩鏗華襟被則芳塵萃子其納之乎通微大夫曰塗有殊而一致業有殊而名約各因姿以效績期寄響於天人也孰與顯竒蹤於萬邦撫六轡而髙遊瞰八宇以攄眄齊清風乎諸侯言成否泰氣作溫涼弭侵略於强暴綜墜紀乎危邦子豈不願斯之雍容乎通微大夫曰明主應期撫民以德配仁風於黃唐齊威靈乎宸極彛倫幸序庶績咸乂蕩流風於雍俗給天民乎齊泰是以𤣥靈感而表應嘉神繁而畢覿舞唐庭之來儀鳴岐陽之鸑鷟應天監之休命荷神聽之介福然聖主達持盈之寶術寤經國之在賢各畢榮於分局期贊化於大鈞吾子豈不欲縻好爵於天宇顯列業乎帝臣歟𤣥虛子作而言曰甚哉鄙人之惑也猶窮繩自逸於井幹憑河盜本於黃川欽至論敷敝衽謹聞命於王孫連珠演連珠五十首臣聞日薄星迥回穹天所以紀物山盈川冲后地所以播氣五行錯而致用四時違而成嵗是以百官恪居以赴八音之離明君執契以要克諧之㑹臣聞任重于力才盡則困用廣于器應博則凶是以物勝權而衡殆形過鏡則照窮故明王程才以效業貞臣底力而辭豐臣聞髦俊之才世所希乏丘園之秀因時則揚是以大人基命不擢才於后土明主聿興不降佐於昊蒼臣聞世之所遺未為非寶主之所珍不必適治是以俊乂之藪希䝉翹車之招金碧之嵓必辱鳳舉之使臣聞祿放于寵非隆家之舉官私於親非興邦之選是以三卿世及東國多衰弊之政五侯並軌西京有陵夷之運臣聞靈輝朝覯稱物納照時風夕灑程形賦音是以至道之行萬類取足於世大化既洽百姓無匱於心臣聞頓網探淵不能招龍振綱羅雲不必招鳯是以巢箕之叟不眄丘園之幣洗渭之民不發傅嵓之夢臣聞鑑之積也無厚而照有重淵之深目之察也有畔而視周天壤之際何則應事以精不以形造物以神不以器是以萬邦凱樂非悅鐘鼓之娛天下歸仁非感玉帛之惠臣聞積實雖微必動於物崇虛雖廣不能移心是以都人冶容不悅西施之影乘馬班如不輟太山之隂臣聞應物有方居難則易藏器在身所乏者時是以充堂之芳非幽蘭所難繞梁之音實縈絃所思臣聞智周通塞不為時窮才經夷險不為世屈是以凌颷之羽不求反風曜夜之目不思倒日臣聞忠臣率志不謀其報貞士發憤期在明賢是以柳莊黜殯非貪瓜衍之賞禽息碎首豈要先茅之田臣聞利眼臨雲不能埀照朗璞䝉垢不能吐暉是以明哲之君時有蔽壅之纍俊乂之臣屢抱後時之悲臣聞郁烈之芳出於委灰繁㑹之音生於絶絃是以貞女要名於沒世烈士赴節於當年臣聞良宰謀朝不必借威貞臣衛主修身則足是以三晉之强屈於齊堂之爼千乘之勢弱於陽門之哭臣聞赴曲之音洪細入韻蹈節之容俯仰依詠是以言茍適事精粗可施士茍適道修短可命臣聞因雲灑潤則芬澤易流乘風載響則音徽自逺是以德教俟物而濟榮名緣時而顯臣聞覽影偶質不能解獨指跡慕逺無救於遲是以循虛器者非應物之具玩空言者非致治之機臣聞鑽燧吐火以續𤾉谷之晷揮翮生風而繼飛亷之功是以物有微而毗著事有瑣而助洪臣聞春風朝煦蕭艾蒙其溫秋霜宵墜芝蕙被其凉是以威以齊物為肅德以普濟為𢎞臣聞性之所期貴賤同量理之所極卑髙一歸是以准月禀水不能加凉晞日引火不必增輝臣聞巧盡於器習數則貫道繫於神人亡則滅是以輪匠肆目不乏奚仲之妙瞽史清耳而無伶倫之察臣聞絶節髙唱非凡耳所悲肆義芳訊非庸聽所善是以南荆有寡和之歌東野有不釋之辨臣聞尋煙染芬薰息猶芳徵音録響操終則絶何則垂於世者可繼止乎身者難結是以𤣥晏之風恆存動神之化已滅臣聞託暗藏形不為巧密倚智隱情不足自匿是以重光發藻尋虛捕景大人貞觀探心昭忒臣聞披雲看霄則天文清澄風觀水則川流平是以四族放而唐劭二臣誅而楚寧臣聞音以比耳為美色以悅目為歡是以衆聽所傾非假北里之操萬夫婉孌非俟西子之顔故聖人隨世以擢佐明主因時而命官臣聞出乎身者非假物所隆牽乎時者非克己所最是以利盡萬物不能睿童昏之心德表生民不能救棲遑之辱臣聞動循定檢天有可察應無常節身或難照是以望景揆日盈數可期撫臆論心有時而謬臣聞傾耳求音視優聽苦澄心徇物形逸神勞是以天殊其數雖同方不能分其戚理塞其通則並質不能共其休臣聞遁世之士非受瓠瓜之性幽居之女非無懷春之情是以名勝欲故偶影之操矜窮愈達故凌霄之節厲臣聞聽極於音不慕鈞天之樂身足於䕃不假垂天之雲是以蒲密之黎遺時雍之世豐沛之士忘桓撥之君臣聞飛轡西頓則離朱與矇瞍收察懸景東秀則夜光與碔砆匿耀是以才換世則俱困功偶時而並劭臣聞示應於近逺有可察託驗於顯微或可包是以寸管下傃天地不能以氣欺尺表逆立日月不能以形逃臣聞絃有常音故曲終則改鏡無畜影故觸形則照是以虛己應物必究千變之容挾情適事不觀萬殊之妙臣聞柷敔希聲以諧金石之和􅤯鼓踈擊以節繁絃之契是以經治必宣其通圖物恆審其㑹臣聞目無常音之察耳無照景之神故在乎我者不誅之於己存乎物者不求備於人臣聞放身而居體逸則安肆口而食屬厭則充是以王鮪登爼不假吞波之魚蘭膏停室不思銜燭之龍臣聞衝波安流則龍舟不能以漂震風洞發則夏屋有時而傾何則牽乎動則靜凝係乎靜則動貞是以淫風大行貞女䝉冶容之誨淳化殷流盜跖挾曾史之情臣聞達之所服貴有或遺窮之所接賤而必尋是以江漢之君悲其墜屨少原之婦哭其亡簮臣聞觸非其類雖疾不應感以其方雖微則順是以商颷漂山不興盈尺之雲谷風乘條必降彌天之潤故暗於治者唱繁而和寡審乎物者力約而功峻臣聞煙出於火非火之和情生於性非性之適故火壯則煙微性充則情約是以殷墟有感物之悲周京無佇立之跡臣聞適物之技俯仰異用應事之器通塞異任是以鳥棲雲而繳飛魚藏淵而網沉賁鼓密而含響朗笛踈而吐音臣聞理之所守勢所常奪道之所閉權所必開是以生重於利故據圖無揮劍之痛義重於身故臨川有投跡之哀臣聞圖形於影未盡纎麗之容察火於灰不覩洪赫之烈是以問道存乎其人觀物必造其質臣聞通於變者用約而利博明其要者器淺而應𤣥是以天地之頤該於六位萬殊之曲窮於五絃臣聞情見於物雖逺猶踈神藏於形雖近則密是以儀天步晷而修短可量臨淵揆水而淺深難察臣聞虐暑熏天不减堅冰之寒涸隂凝地無纍陵火之熱是以吞縱之强不能反蹈海之志漂鹵之威不能降西山之節臣聞理之所開力所常達數之所塞威有必窮是以烈火流金不能焚景沉寒凝海不能結風臣聞足於性者天損不能入貞於期者時纍不能淫是以迅風陵雨不謬晨禽之察徑隂殺節不凋寒木之心論五等諸侯論夫體國經野先王所慎創制垂基思隆後葉然而經略不同長世異術五等之制始於黃唐郡縣之治創自秦漢得失成敗備在典謨是以其詳可得而言夫先王知帝業至重天下至曠曠不可以偏制重不可以獨任任重必於借力制曠終乎因人故設官分職所以輕其任也並建五長所以𢎞其制也於是乎立其封疆之典裁其親踈之宜使萬國相維以成磐石之固宗庶雜居而定維城之業又有以見綏世之長御識人情之大方知其為人不如厚己利物不如圖身安上在於悅下為己在乎利人故易曰悅以使民民忘其勞孫卿曰不利而利之不如利而後利之之利也是以分天下以厚樂而己得與之同憂饗天下以豐利而我得與之共害利博則恩篤樂逺則憂深故諸侯享食土之實萬國受世及之祚矣夫然則南面之君各務其治九服之民知有定主上之子愛於是乎生下之體信於是乎結世治足以敦風道衰足以禦暴故强毅之國不能擅一時之勢雄俊之士無所寄霸國之志然後國安由萬邦之思治主尊賴羣后之圖身譬猶衆目營方則天網自昶四體辭難而心膂獲乂三代所以直道四王所以隆業也夫盛衰隆敝理所固有教之廢興繫乎其人原法期於必凉明道有時而暗故世及之制敝於强禦厚下之典漏於末折侵弱之釁遘自三季陵夷之禍終於七雄昔者成湯親照夏后之鑒公旦目涉商人之戒文質相濟損益有物故五等之禮不革於時封畛之制有隆焉爾者豈玩二王之禍而暗經世之算乎固知百世非可懸御善制不能無敝而侵弱之辱愈於殄祀土崩之困痛於陵夷也是以經始權其多福慮終取其少禍非謂侯伯無可亂之符郡縣非致治之具也故國憂賴其釋位主弱憑其翼戴及承微積敝王室遂卑猶保名位祚垂後嗣皇統幽而不輟神器否而必存者豈非置勢使之然歟降及亡秦棄道任術懲周之失自矜其得尋斧始於所庇制國昧於弱下國慶獨饗其利主憂莫與其害雖速亡趣亂不必一道顛沛之釁實由孤立是蓋思五等之小怨忘經國之大德知陵夷之可患暗土崩之為痛也周之不兢有自來矣國乏令主十有餘世然片言勤王諸侯必應一朝振矜逺國先叛故强晉收其請隧之圖暴楚頓其觀鼎之志豈劉項之能窺關勝廣之敢號澤哉借使秦人因循周制雖則無道有與共弊覆滅之禍豈在曩日漢矯秦枉大啓侯王境土踰溢不遵舊典故賈生憂其危朝錯痛其亂是以諸侯阻其國家之富憑其士民之力勢足者反疾土狹者逆遲六臣犯其弱綱七子衝其漏網皇祖夷於黥徒西京病於東帝是蓋過正之災而非建侯之纍也然吕氏之難朝士外顧宋昌策漢必稱諸侯逮至中葉忌其失節割削宗子有名無實天下曠然復襲亡秦之軌矣是以五侯作威不忌萬邦新都襲漢易於拾遺也光武中興纂隆皇統而猶遵覆車之遺轍養喪家之宿疾僅及數世姦軌充斥卒有强臣専朝則天下風靡一夫縱橫則城池自夷豈不危哉在周之衰難興王室放命者七臣干位者三子嗣王委其九鼎凶族據其天邑鉦􅤯震於閫宇鋒鏑流乎絳闕然禍止畿甸害不覃及天下晏然以治待亂是以宣王興於共和襄惠振於晉鄭豈若二漢階闥暫擾而四海己沸孽臣朝入而九服夕亂哉逺惟王莽篡逆之事近覽董卓擅權之際億兆悼心愚智同痛然周以之存漢以之亡夫何故哉豈世乏曩時之臣士無匡合之志歟蓋逺績屈於時異雄心挫於卑勢爾故烈士扼腕終委冦讎之手中人變節以助虐國之桀雖復時有鳩合同志以謀王室然上非奧主下皆市人師旅無先定之班君臣無相保之志是以義兵雲合無救劫弒之禍民望未改而已見大漢之滅矣或以諸侯世位不必常全昏主暴君有時比跡故五等所以多亂今之牧守皆以官方庸能雖或失之其得固多故郡縣易以為治夫德之休明黜陟日用長率連屬咸述其職而淫昏之君無所容過何怪其不治哉故先代有以之興矣茍或衰陵百度自悖鬻官之吏以貨凖才則貪殘之萌皆如羣后也安在其不亂哉故後王有以之廢矣且要而言之五等之君為己思治郡縣之長為利圖物何以徵之蓋企及進取士子之常志修已安民良士之所希及夫進取之情鋭而安民之譽遲是故侵百姓以利己者在位所不憚損實事以養名者官長所夙夜也君無卒嵗之圖臣挾一時之志五等則不然知國為己土衆皆我民民安已受其利國傷家嬰其病故前人欲以垂後後嗣思其堂構為上無茍且之心羣下知膠固之義使其並賢居治則功有厚薄兩愚處亂則過有深淺然則探八代之制幾可以一理貫秦漢之典殆可以一言蔽矣辨亡論上昔漢氏失御姦臣竊命禍基京畿毒遍宇內皇綱弛紊王室遂卑於是羣雄蜂駭義兵四合吳武烈皇帝慷慨下國電發荆南權略紛紜忠勇伯世威稜則夷羿震蕩兵交則醜虜授馘遂掃清宗祊蒸禋皇祖於時雲興之將帶州飈起之師跨邑哮口闞之羣風驅熊羆之衆霧集雖兵以義合同盟戮力然皆苞藏禍心阻兵怙亂或師無謀律喪威稔冦忠規武節未有如此其著者也武烈既沒長沙桓王逸才命世弱冠秀發招攬遺老與之述業神兵東驅奮寡犯衆攻無堅城之將戰無交鋒之虜誅叛柔服而江外底定飭法修師則威德翕赫賓禮名賢而張昭為之雄交御豪俊而周瑜為之傑彼二君子皆𢎞敏而多竒雅達而聰哲故同方者以類附等契者以氣集而江東蓋多士矣將北伐諸華誅鉏干紀旋皇輿於夷庚反帝座乎紫闥挾天子以令諸侯清天步而歸舊物戎車既次羣雄側目大業未就中世而殞用集我大皇帝以竒蹤襲於逸軌睿心因於令圖從政咨於故實播憲稽乎遺風而加之以篤固申之以節儉疇咨俊茂好謀善斷束帛旅於丘園旌命交於塗巷故豪彥尋聲而響臻志士希光而景騖異人輻輳猛士如林於是張昭為師傅周瑜陸公魯肅吕䝉之疇入為腹心出作股肱甘寧凌統程普賀齊朱桓朱然之徒奮其威韓當潘璋黃蓋蔣欽周泰之屬宣其力風雅則諸葛瑾張承步騭以聲名光國政事則顧雍潘濬吕範吕岱以器任幹職竒偉則虞翻陸績張溫張惇以風議舉政奉使則趙咨沈珩以敏達延譽術數則吳範趙達以禨祥協德董襲陳武殺身以衛主駱統劉基强諫以補過謀無遺計舉不失策故遂割據山川跨制荆吳而與天下爭衡矣魏氏常藉戰勝之威率百萬之師浮鄧塞之舟下漢隂之衆羽楫萬計龍躍順流鋭騎千里虎步原隰謨臣盈室武將連衡喟然有吞江滸之志一宇宙之氣而周瑜驅我偏師黜之赤壁喪旗亂轍僅而獲免收跡逺遁漢王亦憑帝室之號帥巴漢之民乘危騁變結壘千里志報關侯之敗圖收湘西之地而我陸公亦挫之西陵覆師敗績困而後濟絶命永安續以濡須之冦臨川摧鋭蓬龍之戰孑輪不反由是二邦之將喪氣挫鋒勢衄財匱而吳莞然坐乘其弊故魏人請好漢氏乞盟遂躋天號鼎峙而立西屠庸益之郊北裂淮漢之涘東包百越之地南括羣蠻之表於是講八代之禮搜三王之樂告類上帝供揖羣后武臣毅卒循江而守長棘徑鎩望飈而奮庶尹盡規於上四民展業於下化協殊裔風衍遐圻乃俾一介行人撫巡外域巨象逸駿擾於外間明珠瑋寶耀於內府珍瑰重跡而至竒玩應響而赴輶軒騁於南荒衝輣息於朔野齊民免干戈之患戎馬無晨服之虞而帝業固矣大皇既沒幼主蒞朝姦回肆虐景皇聿興䖍修遺憲政無大闕守文之良主也降及歸命之初典刑未滅故老猶存大司馬陸公以文武熙朝左丞相陸凱以謇諤盡規而施績范慎以威重顯丁奉離斐以武毅稱孟宗丁固之徒為公卿樓𤣥賀邵之屬掌機事元首雖病股肱猶存爰及末葉羣公既喪然後黔首有瓦解之患皇家有土崩之釁厯命應化而微王師躡運而發卒散于陳民奔于邑城池無藩籬之固山川無溝阜之勢非有公輸雲梯之械智伯灌激之害楚子築室之圍燕人濟西之隊軍未浹辰而社稷夷矣雖忠臣孤憤烈士死節將奚救哉夫曹劉之將非一世所選向時之師無曩日之衆戰守之道抑有前符險阻之利俄然未改而成敗貿理古今詭趣何哉彼此之化殊授任之才異也辨亡論下昔三方之王也魏人據中夏漢氏有岷益吳制荆揚而奄有交廣曹氏雖功濟諸華虐亦深矣其民怨矣劉公因險以飭智功己薄矣其俗陋矣夫吳桓王基之以武太祖成之以德聰明睿達懿度𢎞逺矣其求賢如不及恤民如稚子接士盡盛德之容親仁罄丹府之愛拔吕䝉於戎行識潘濬於係虜推誠信士不恤人之我欺量能授器不患權之我逼執鞭鞠躬以重陸公之威悉委武衛以濟周瑜之師卑宫菲食以豐功臣之賞披懷虛已以納謨士之算故魯肅一面而自托士燮䝉險而致命髙張公之德而省游田之娛賢諸葛之言而割情欲之歡感陸公之規而除刑法之煩竒劉基之議而作三爵之誓屏氣局蹐以伺子明之疾分滋損甘以育凌統之孤登壇慷慨歸魯子之功削投惡言信子瑜之節是以忠臣競盡其謨志士咸得肆力洪規逺略固不厭夫區區者也故百官茍合庶務未遑初都建業羣臣請備禮秩天子辭而不許曰天下其謂朕何宫室輿服蓋慊如也爰及中葉天人之分既定百度之闕粗修雖醲化懿綱未齒乎上代抑其體國經民之具亦足以為政矣地方幾萬里帶甲將百萬其野沃其兵練其器利其財豐東負滄海西阻險塞長江制其區宇峻山帶其封域國家之利未巨有𢎞於兹者矣借使中才守之以道善人御之有術敦率遺典勤民謹政循定策守常險則可以長世永年未有危亡之患也或曰吳蜀唇齒之國也蜀滅吳亡理則然矣夫蜀蓋藩援之與國而非吳人之存亡也何則其郊境之接重山積險陸無長轂之徑川厄流迅水有驚波之艱雖有鋭師百萬啓行不過千夫舳艫千里前驅不過百艦故劉氏之伐陸公喻之長蛇其勢然也昔蜀之初亡朝臣異謀或欲積石以險其流或欲機械以禦其變天子總羣議而咨之大司馬陸公公以四瀆天地之所以節宣其氣固無可遏之理而機械則彼我之所共彼若棄長技以就所屈即荆揚而爭舟楫之用是天贊我也將謹守峽口以待擒耳逮步闡之亂憑寶城以延强冦重資幣以誘羣蠻于時大邦之衆雲翔電發懸旍江介築壘遵渚襟帶要害以止吳人之西而巴漢舟師㳂江東下陸公以偏師三萬北據東坈深溝髙壘案甲養威反虜踠跡待戮而不敢北窺生路强寇敗績宵遁喪師大半分命鋭師五千西禦水軍東西同捷獻俘萬計信哉賢人之謀豈欺我哉自是烽燧罕警封域寡虞陸公沒而濳謀兆吳釁深而六師駭夫太康之役衆未盛乎曩日之師廣州之亂禍有愈乎向時之難而邦家顛覆宗廟為墟嗚呼人之云亡邦國殄瘁不其然歟易曰湯武革命順乎天𤣥曰亂不極則治不形言帝王之因天時也古人有言也天時不如地利易曰王侯設險以守其國言為國之恃險也又曰地利不如人和在德不在險言守險之由人也吳之興也參而由焉孫卿所謂合其參者也及其亡也恃險而己又孫卿所謂捨其參者也夫四州之萌非無衆也大江之南非乏俊也山川之險易守也徑利之器易用也先政之策易循也功不興而禍遘者何哉所以用之者失也是故先王達經國之長規審存亡之至數謙己以安百姓敦厚以致人和寬冲以誘俊乂之謀慈和以結士民之愛是以其安也則黎元與之同慶及其危也則兆庶與之共患安與衆同慶則其危不可得也危與下共患則其難不足恤也夫然故能保其社稷而固其土宇麥秀無悲殷之思黍離無愍周之感矣議大田議臣聞隆古之主不改法而下治陵夷之世不易術而民怠夫商人逸而利厚農人勞而報薄導農以利則耕夫勤節商以法則游子歸頌漢髙祖功臣頌相國酇文終侯沛蕭何相國平陽懿侯沛曹參太子少傅留文成侯韓張良丞相曲逆獻侯陽武陳平楚王淮隂韓信梁王昌彭越淮南王六黥布趙景王大梁張耳韓王韓信燕王豐盧綰長沙文王吳芮荆王沛劉賈太傅安國懿侯王陵左丞相絳武侯沛周勃相國舞陽侯沛樊噲右丞相曲周景侯髙陽酈商太僕汝隂文侯沛夏侯嬰丞相潁隂懿侯睢陽灌嬰代丞相陽陵景侯魏傅寬車騎將軍信武肅侯靳歙大行廣野君髙陽酈食其中郎建信侯齊劉敬大中大夫楚陸賈太子太傅稷嗣君薛叔孫通魏無知護軍中尉隨何新成三老董公轅生將軍紀信御史大夫沛周苛平國君侯公右三十一人與定天下安社稷者也頌曰茫茫宇宙上墋下黷波振四海塵飛五嶽九服徘徊三靈改卜赫矣髙祖肇載天祿沉跡中鄉飛名帝籙慶雲應輝皇階授木龍興泗濱虎嘯豐谷彤雲晝聚素靈夜哭金精仍頽朱光以渥萬邦宅心駿民效足堂堂蕭公王跡是因綢繆睿后無競惟人外濟六師內撫三秦拔竒夷難邁德振民體國垂制上穆下親名蓋羣后是謂宗臣平陽樂道在變則通爰𤣥爰默有此武功長驅河朔電擊壤東協策淮隂亞跡蕭公文成作師通幽洞冥永言配命因心則靈窮神觀化望影揣情鬼無隱謀物無遁形武關是闢鴻門是寧隨難滎陽即謀下邑銷印惎廢推齊勸立運籌固陵定策東襲三王從風五侯允集霸楚實喪皇漢凱入怡顔髙覽弭翼鳯戢託跡黃老辭世却粒曲逆宏達好謀能深游精杳漠神跡是尋重𤣥匪奧九地匪沉伐謀先兆擠響於音竒謀六奮嘉慮四回規主以足離項于懷格人乃謝楚翼實摧韓王窘執胡馬洞開迎文以謀哭髙以哀灼灼淮隂靈武冠世䇿出無方思入神契奮臂雲興騰跡虎噬凌險必夷摧堅則脆肇謀漢濱還定渭表京索既扼引師北討濟河夷魏登山滅趙威亮火烈勢踰風掃拾代如遺偃齊猶草二州肅清四邦咸舉乃眷北燕遂表東海克滅龍且爰取其旅劉項懸命人謀是與念功惟德辭通絶楚彭越觀時韜跡匿光民具爾曕翼爾鷹揚威凌楚域質委漢王靖難河濟即宫舊梁烈烈黥布耽耽其眄名冠强楚鋒猶駭電覩幾蟬蛻悟主革面肇彼梟風翻為我扇天命方輯王在東夏矯矯三雄至于垓下元凶既夷寵祿來假保大全祚非德孰可謀之不臧舍福取禍張耳之賢有聲梁魏士也罔極自貽伊愧俯思舊恩仰察五緯脫跡違難披榛來洎改策西秦報辱北冀悴葉更輝枯條以肄王信韓孽宅土開疆我圖爾才越遷晉陽盧綰自微婉孌我皇跨功喻德祚爾輝章人之貪禍寧為亂亡吳芮之王祚由梅鋗功微勢弱世載忠賢肅肅荆王董我三軍我圖四方殷薦其勛庸親作勞舊楚是分往踐厥宇大啓淮濆安國違親悠悠我思依依哲母既明且慈引身伏劍永言固之淑人君子實邦之基義形於色憤發於辭主亡與亡永命是期絳侯質木多略寡言曾是忠勇惟帝攸歎雲騖靈丘景逸上蘭平代禽豨奄有燕韓寧亂以武斃吕以權滌穢紫宫徵帝太原實惟太尉劉宗以安挾功震主自古所難勳耀上代身終下藩舞陽道迎延帝幽藪宣力王室匪惟厥武總于鴻門披闥帝宇聳顔誚項掩淚寤主曲周之進于其哲兄俾率爾徒從王于征振威龍蛻攄武墉城六師實因克荼禽黥猗歟汝隂綽綽有裕戎軒肇跡荷策來附馬煩轡殆不釋擁樹皇儲時乂平城有謀頴隂鋭敏屢為軍鋒奮戈東城禽項定功乘風藉響髙步長江收吳引淮光啓于東陽陵之勛元帥是承信武薄伐揚節江陵夷王殄國俾亂作懲恢恢廣野誕節令圖進謁嘉謀退守名都東規白馬北距飛狐即倉敖庾據險三塗輶軒東踐漢風載徂身死于齊非說之辜我皇實念言祚爾孤建信委輅被褐獻寶指明周漢銓時論道移帝伊洛定都鄷鎬柔逺鎮邇實敬攸考抑抑陸生知言之貫往制徑越來訪皇漢附㑹平勃夷凶剪亂所謂伊人邦家之彥百王之極舊章靡存漢德雖朗朝儀則昏稷嗣制禮下肅上尊穆穆帝典煥其盈門風晞三代憲流後昆無知睿敏獨昭竒跡察侔蕭相貺同師錫隨何辨達因資於敵紓漢披楚維生是績皤皤董叟謀我平隂三軍縞素天下歸心袁生秀朗沉心善照漢斾南振楚威自撓大略淵回元功響效邈哉惟人何識之妙紀信誑項軺軒是乘攝齊赴節用死孰懲身與烟消名與風興周苛慷愾心若懷氷形可以暴志不可凌貞軌偕沒亮跡雙升帝疇爾庸後嗣是膺天地雖順王心有違懷親望楚永言長悲侯公伏軾皇媪來歸是謂平國寵命有輝震風過物清濁效響大人于興利在攸往𢎞海者川崇山惟壤韶濩錯音衮龍比象明明衆哲同濟天網劍宣其利鑒獻其朗文武四充漢祚克廣悠悠遐風千載是仰贊孔子贊孔子睿聖配天𢎞道風扇𤣥流思探神寶明發懷周興言謨老靈魄有行言觀蒼昊清歌先誡丹書有造王子喬贊遺形靈嶽顧景忘歸乘雲倐忽飄飄紫微針丞相針夫導民在簡為政以仁仁實生愛簡亦易遵網疏下睦禁密巧繁深文碎教伊何能存故人不可以不審任不可以不忠捨賢昵讒則喪爾邦且偏見則昧専聽悔疑耳目之用亦各有期夫豈不察而帷牆隔之矜己任智是蔽是欺德無逺而不復惡可適而不追存亡日鑒成敗代陳人咸知鏡其貌而莫能照其身策文策秀才文昔三代明王啓建洪業文質殊制而令名一致然夏人尚忠忠之弊也朴救朴莫若敬殷人革而修焉敬之弊也鬼救鬼莫若文周人而變焉文之弊也薄救薄則又反之於忠然則王道之反覆其無一定邪亦所祖之不同而功業各異也自無聖王人散久矣三代之損益百姓之變遷其故可得而聞邪今將反古以救其弊明風以蕩其穢三代之制將何所從太古之化有何異道又又聞在昔哲王象事備物明堂所以崇上帝清廟所以寧祖考辟雍所以班禮教太學所以講藝文此蓋有國之盛典為邦之大司亡秦廢學制度荒闕諸儒之論損益異物漢氏遺作居為異事而蔡雍月令謂之一物將何所從又又問庶明亮采故時雍穆唐有命既集而多士隆周故書稱明良之歌易貴金蘭之美此長世所以廢興有邦所以崇替夫成功之君勤於求才立名之士急於招世理無世不對而事千載恆背古之興王何道而如彼後之衰世何闕而如此又又問昔唐虞垂五刑之教周公明四罪之制故世歎清問而時歌緝煕姦究既殷法物滋有叔世崇三辟之文暴秦加族誅之律淫刑淪胥虐濫已甚漢魏遵承因而弗革亦由險泰不同而救世異術不得已而用之故也寬尅之中將何立而可族誅之法足為永制與不又又問曰夫五行迭代隂陽相須二儀所以陶育四時所以化生易稱在天成象在地成形形象之作相須之道也若隂陽不調則大數不得不否一氣偏廢則萬物不得獨成此應同之至驗不偏之明證也今有溫泉而無寒火其故何也思聞辨之以釋不同之理又又問曰夫窮神知化才之盡稱備物致用功之極目以之為政則黃羲之規可踵以之革亂則𤣥古之風可紹然而唐虞密皇人之濶網夏殷繁帝者之約法機心起而日進淳德往而莫返豈太朴一離理不可振將聖人之道稍有降殺邪傳顧談傳宣太子正位東宫天子方隆訓導之義妙簡俊彥講學左右時四方之傑畢集太傅諸葛恪等雄竒蓋衆而談以清識絶倫獨見推重自太尉范慎謝景羊徽之徒皆以秀稱其名而悉在談下碑晉平西將軍孝侯周處碑君諱處字子隱義興陽羡人也氏胄曩興煥乎墳典華宗往茂鬱其簡書啓三十之洪基源流定鼎運八百之逺祚枝葉封桐軒蓋列於漢庭蟬冕播於陽羡二南之價傳不朽而紛敷大頀之音聲無微而必顯山髙海濶其在斯焉祖賓少折節早亡吳初召咨議參軍舉郡上計轉為州辟從事别駕步兵挍尉光祿大夫廣平太守父魴少好學舉孝亷吳寧國長奮威長史懷安錢塘縣侯丹陽西部屬國都尉立節挍尉拜禆將軍三部都督大中大夫臨川豫章鄱陽太守君晉故散騎常侍新平廣漢二郡太守封關內侯簪紱揚名臺閣摽著風化之美奏最為能亭亭孤美灼灼橫劭狥髙位於生前思垂名於身後遂以罕言不違應期出輔洋洋之風俯冠來葉巍巍之盛仰繼前賢君初早孤不𢎞禮制年未弱冠膂力絶于天下妙氣挺於人間騎獵無疇時英式慕縱情寡偶俗弊不欣鄉曲誣其害名改節播其聲譽遂來吳事余闕弟謹然受誨向道朝聞方勵志而淫詩書便好學而尋子史文章綺合藻思羅開吳朝州縣交辟太子洗馬東觀左丞中書右丞五官郎中左右國史靖恭夙夜恪居官次遷尚書僕射東觀令太常卿無難督匡熙庶績朝廷謐寧使持節大都督塗中京下諸軍事封章浦亭侯國猶多士君實得賢汪洋廷闕之傍昻藏寮寀之上射獸功猶見顯刺蛟名乃逺揚忠烈道自克修義節情還永布琳琅梓杞圭璧棟梁君著默語三十篇及風土記并撰吳書於是吳平入晉王渾登建業官釃酒既酣因謂君曰諸人亡國之餘得無戚乎君對曰漢末分崩三方鼎立魏滅於前吳亡於後亡國之戚豈惟一人渾乃大慙仕晉稍遷總統初入拜咨議郎除討虜護軍新平太守撫和戎狄叛羌歸附雍土美之轉為廣漢太守郡多滯訟有經三十年不决者處立評其枉直一朝决遣以母年老罷歸尋除楚內史未之官徵散騎常侍處曰古人辭大不辭小乃先之楚而郡既經喪亂新舊雜居風俗未一處敦以教義又撿尸無主及白骨在野收而葬之然後就徵逺近稱嘆及居近侍多所規諷遷御史中丞正繩直筆凡所糾劾不避寵戚梁王彤違法處深文案之及氐人齊萬年反朝臣惡其强直皆曰處吳之名將子也忠烈果毅庶僚振肅英情天逸逺性霞騫陜北留棠遂有二天之詠荆南渡虎猶標十部之書尋轉散騎常侍輕車將軍回輪出於新平士女揮淚褰帷望于廣漢雞犬靡喧振兹威略宣其惠和晉京遙仰部從迎欽是時氐賊作逆有衆七萬屯於梁山朝廷推賢以君才兼文武詔授建威將軍以五千兵奉辭西討忠槩盡節不顧身命乃賦詩曰去去世事已策馬觀西戎藜藿甘梁黍期之克令終言畢而戰自旦及暮斬首萬級弦絶矢盡番系不救左右勸退處按劍怒曰此是吾效節授命之日何以退為大臣以身狥國不亦可乎韓信背水之軍未遑得喻工輸縈帶之勢早擬連蹤莫不梯山架壑襁負來歸戎士杆其封疆農人展其耕織秋風才起追戰勇於雷霆春水方生揮􅓩同於雲雨立功立事名將名臣者乎元康九年舊疾增加奄捐館舍春秋六十有二天子以大臣之葬師傅之禮親臨殯壤建武元年冬十一月甲子追贈平西將軍封清流亭侯諡曰孝禮也賜錢百萬葬地一頃京城地五十畝為第又賜王家田五頃詔曰處母年老加以逆旅逺人朕每憫念給其醫藥酒米賜以終年以太興二年嵗在已卯正月十日葬於義興舊原南瞻荆嶽崇峻極之巍峩北睇蚊川濬清流之澄徹娶同郡盛氏有四子靖玘札碩並皆志性純孝過禮喪親墳前之樹染淚先枯庭際之禽聞悲乃下遂作銘曰周南著美岐山表靈葉繁漢室枝茂晉庭皎皎夫子竒特播名幼有異行世存風烈早馳問望晚懷耿節頗尚豪雄升名楚闥捨爵策勳允歸明哲輝赫大晉封豕多故式揚廟略克清天步海濱既折江淮並泝漢水作藩條章斯布俗歌揆日人謡何暮忠貞作相追蹤絳侯將亭嘉茂據掩芳猷潜光陽甸返斾吳丘舊闕雖入鄉路冥浮從榮制墓終非晝遊春墟以緑清淮自流深沈素幰繚繞朱旒𤣥堂寂寂黃泉悠悠書方易折家揭難留鐫兹幽石萬代千秋此碑據舊集抄之中多訛謬文理不接且孝侯既戰沒而云舊疾增加奄捐館舍尤可笑也考常州志此碑尚藏于廟而所載亦是如此當是古碑殘滅後人取斷簡以意補凑之用勒于石遂沿以為真耳尚須博考誄吳大帝誄我皇明明固天實生體和二合以察三精濯暉育慶懷祥載榮率性而和因心則靈厥靈伊何克聖克仁茂對四象克配乾坤齊明日月考祥鬼神誕自幼冲睿哲宿照甄化無形探景絶曜巍巍聖姿文武既俊有覺德徽兆民欣順將熙景命經營九圍登跡岱宗班瑞舊圻上𤣥匪惠早零聖暉神廬既考史臣獻貞龍輴啓殯霄載紫庭辰旒飛藻凶旗舉銘崇華熠爍翠蓋繁纓千乘結駟萬騎重營簫鼓振響和鸞流聲動軫閶闔永背承明顯步萬官幽驅百靈隨化太素即宫杳冥億兆同慕泣血如零愍懷太子誄明明皇子成命既駿保乂皇家載生淑𦙍茂德克廣仁姿朗㒞當克無疆光紹有晉如何不弔暴離咎艱曾是遘愍匪降自天肇傾運祚遂喪華年嗚呼哀哉沉雲既袪日月增暉靈寵可增寃魂難追舊物東反靈柩西歸傷我惠后寂焉翳滅銜哀駿奔凶服就列追慕徽塵興言斷絶敢誄遺風庶存芳烈其辭曰巍巍皇基奕奕紫微有命既集天祿永綏篤生太子纂德承茂平紹大烈時惟洪胄竒潁發翹清藻在秀誕自幼䝉逮事武皇展矣太子播此瓊芳允矣聖祖無言不臧婉孌乘輿名裕德昌龍集庚戍日月改度赫赫明明我皇登祚厥登伊何皇統是荷華紱重采翠蓋垂葩鸞旗阿那玉衡吐和聿來在宫體亮而誠肅雍皇極思媚紫庭亦既涉學遵師盛道何年之妙而察之早讜言必復乖義則考惟天有命太子膺之惟皇有慶太子承之當究遐年登兹胡耉緝煕有晉克構帝宇如何晨牝穢我朝聽仰索皇家惟塵明聖惴惴太子終溫且敬銜辭即罪掩淚祗命顯加放流潜肆鴆毒痛矣太子乃離斯酷謂天蓋髙訴哀靡告鞠躬引分顧景摧剝嗚呼哀哉凡民之喪有戚有姻太子之殁傍無昵親局蹐嚴宫絶命禁闈幽柩偏寄孤魂曷歸嗚呼太子生寃殁悲匹夫有怨尚或殞霜矧乃太子萬邦攸望普天扼腕率土懷傷精感六沴咎徵紫房爰兹元輔啓我令圖王赫斯怒天誅靡逋攙搶叱掃元凶服辜仁詔引咎哀策東徂光復寵祚紹建藐孤於時暉服粲焉畢陳庭旅舊物堂有故臣孰云太子不見其人嗚呼哀哉既濟洛川靈斾左迥回三軍悽裂都邑如隤慨矣寤歎念我愍懷吳大司馬陸公誄我公承軌髙風肅邁明德繼體徽音奕世昭德昭德伊何克俊克仁德周能事體合機神禮交徒候敬睦白屋踧踖曲躬吐食揮沐爰及鰥寡賑此惸獨孚厥惠和脫驂分祿乃命我公誕作元輔位表百辟名茂羣后因是荆人造我寧宇備物典策主冠及斧龍旗飛藻靈鼓樹羽質文殊塗百行異轍人玩其華鮮識其實於穆我公因心則哲經綸至道終始自結德與行滿美與言溢吳貞獻處士陸君誄我聞有命天祿有秩如斯古人而有斯疾兄弟之恩離形合氣矧我與君年相亞逮綢繆之遊自矇及朗孩不二音抱或同襁撫髫並育擕手相長行焉比跡誦必共響庶君偕老靈根克固附翼雲霄雙飛天路人皆年長君獨短祚榖則同朝遊矣先暮弔文弔魏武帝文元康八年機始以臺郎出補著作游乎祕閣而見魏武帝遺令慨然歎息傷懷者久之客曰夫始終者萬物之大歸死生者性命之區域是以臨喪殯而後悲覩陳根而絶哭今乃傷心百年之際興哀無情之地意者無乃知哀之可有而未識情之可無乎機答之曰夫日蝕由乎交分山崩起於朽壞亦云數而己矣然百姓怪焉者豈不以資髙明之質而不免卑濁之纍居常安之勢而終嬰傾離之患故乎夫以回天倒日之力而不能振形骸之內濟世夷難之智而受困魏闕之下已而格乎上下者藏於區區之木光於四表者翳乎蕞爾之土雄心摧於弱情壯圖終于哀志長算屈於短日逺跡頓於促路嗚呼豈特瞽史之異闕景黔黎之怪頺岸乎觀其所以顧命冢嗣貽謀四子經國之略既逺隆家之訓亦𢎞又云吾在軍中持法是也至於小忿怒大過失不當效也善乎達人之讜言矣持姬女而指季豹以示四子曰以纍汝因泣下傷哉曩以天下自任今以愛子託人同乎盡者無餘而得乎亡者無存然而婉孌房闥之內綢繆家人之務則幾乎密與又曰吾媫妤妓人皆著銅雀臺於臺堂上施八尺牀繐帳朝晡上脯糒之屬月朝十五日輒向帳作妓汝等時時登銅雀臺望吾西陵墓田又云餘香可分與諸夫人諸舍中無所為學作履組賣也吾歷官所得綬皆著藏中吾餘衣裘可别為一藏不能者兄弟可共分之既而竟分焉亡者可以勿求存者可以勿違求與違不其兩傷乎悲夫愛有大而必失惡有甚而必得智慧不能去其惡威力不能全其愛故前識所不用心而聖人罕言焉若乃繫情纍於外物留曲念於閨房亦賢俊之所宜廢乎於是遂憤悶而獻弔云爾接皇漢之末緒值王塗之多違佇重淵以育鱗撫慶雲而遐飛運神道以載德乘靈風而扇威摧羣雄而電擊舉勍敵其如遺指八極以逺略必翦焉而後綏釐三才之闕典啓天地之禁闈舉修網之絶紀紐大音之解徽掃雲物以貞觀要萬塗而來歸丕大德以宏覆援日月而齊暉濟元功於九有固舉世之所推彼人事之大造夫何往而不臻將覆簣於浚谷擠為山乎九天苟理窮而性盡豈長算之所研悟臨川之有悲固梁木其必顛當建安之三八實大命之所艱雖光昭於曩載將稅駕於此年惟降神之綿邈眇千載而逺期信斯武之未喪膺靈符而在兹雖龍飛於文昌非王心之所怡憤西夏以鞠旅泝秦川而舉旗踰鎬京而不豫臨渭濱而有疑冀翼日之云瘳彌四旬而成災詠歸塗以反斾登崤澠而朅來次洛汭而大漸指六軍曰念哉伊君王之赫奕實終古之所難威先天而蓋世力蕩海而拔山厄奚險而弗濟敵何强而不殘每因禍以禔福亦踐危而必安迄在兹而䝉昧慮噤閉而無端委軀命以待難痛沒世而永言撫四子以深念循膚體而頽歎逮營魄之未離假餘息乎音翰執姬女以嚬瘁指季豹以漼焉氣衝襟以嗚咽涕垂睫而氿瀾違率土以靜寐戢彌天乎一棺咨𤣥度之峻邈壯大業之允昌思居終而恤始命臨沒而肇揚援貞吝以惎悔雖在我而不臧惜內顧之纒綿恨末命之微詳紆廣念於履組塵清慮於餘香結遺情於婉孌何命促而意長陳法服於帷座陪窈窕於玉房宣備物於虛器發哀音於舊倡矯戚容以赴節掩零淚而薦觴物無微而不存體無慧而不亡庶聖靈之響像想幽神之復光茍形聲之翳沒雖音景其必藏徽清絃而獨奏進脯糒而誰嘗悼繐帳之冥漠怨西陵之茫茫登雀臺而羣悲眝美目其何望既睎古以遺纍信簡禮而薄葬彼裘紱於何有貽塵謗於後王嗟大戀之所存故雖哲而不忘覽遺籍以慷慨獻兹文而悽傷弔蔡雍文彼洪川之方割豈一簣之所堙故尼父之惠訓智必愚而後賢諒知道之已妙曷信道之未堅忽寧子之保己效萇叔之違天冀澄河之逺日忘朝露之短年哀辭吳大司馬陸公少女哀辭冉冉晞陽不遂其茂暉暉芳華雕芳落秀遵堂涉室髣佛興想人皆有聲爾獨無響漢魏六朝百三家集卷四十八
