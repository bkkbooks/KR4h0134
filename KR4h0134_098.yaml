body:
  text: 漢魏六朝百三家集巻九十八梁劉孝威集題詞劉士章文章談義領袖後進七子三女多擅才學孝綽品藻羣弟嘗云三筆六詩三謂孝儀六謂孝威也第五弟孝勝第七弟孝先無預焉侯景宼亂孝儀遣子入援身受賊逼失郡病亡孝威困躓危城自拔得出崎嶇西上亦抱疾不起假使時清國晏兄弟連騎續𤣥圃之舊遊領高齋之述作扶風世業鄴苑清吟重篇大帙必偉觀聽而長鯨疾驅迯死不暇林焚池竭遺章濶如就所披涉則孝儀筆勝孝威詩勝伯兄之言良不謬也士章掌齊詔誥孝綽年十四輒使代草父子相知異於謝方明之有謝惠連然士章知子孝綽知弟二者固並美天倫焉目錄啓謝賚宫紙啓謝賚錦被啓謝勑賚畫屏風啓謝賚熊白啓謝東宫賜聖僧餘饌啓謝東宫賜淨饌啓謝晉安王賜婚錢啓謝東宫賚炭啓謝東宫賚鹿脯等啓謝東宫賚藕啓為皇太子謝勑賚功徳馬啓謝南康王饟牛啓書謝賚林檎書贊辟厭青牛畫贊正旦春雞贊樂府隴頭水驄馬驅公無渡河塘上行苦辛篇東西門行怨詩採蓮曲小臨海思歸引妾簿命篇鬬雞篇結客少年塲行行行且遊獵篇雀乳空井中半渡溪獨不見行幸甘泉宫歌箜篌謡驄馬驅和王竟陵愛妾換馬擬古應教一首鷄鳴篇烏生八九子蜀道難詩重光詩侍宴樂遊林光殿曲水奉和簡文帝太子應令三日侍皇太子曲水宴奉和六月壬午應令登覆舟山望湖北帆渡吉陽洲同孝儀賦出新林郄縣遇見人織率爾寄婦侍宴賦得龍沙宵明月奉和晚日和皇太子春林晚雨行還值雨又為清道所駐望雨苦暑奉和逐涼望棲烏和簡文帝卧疾賦得曲澗奉和湘東王應令二首春宵冬曉詠織女七夕穿針九月酌菊酒賦得鳴蝀應令和定襄侯初笄古體雜意詠佳麗望隔墻花枯葉竹和簾裏燭詠剪綵花褉飲嘉樂殿詠曲水中燭影賦得香出衣漢魏六朝百三家集巻九十八目録欽定四庫全書漢魏六朝百三家集巻九十八明張漙輯梁劉孝威集啓謝賚宫紙啓臣與謝嘏俱慙具聖臣之衝梯實愧魯般之巧嘏之城壘特無禽子之守攻弱侮亡其勞甚薄策勲行賞為渥過隆雖復鄴殿鳳銜漢朝魚網平凖桃花中宫榖樹固以慙兹靡滑謝此鮮華謝賚錦被啓色豔蒲桃采踰聯璧鄂君慙繡楚侍羞珠雖復帝賜鶴綾客贈鴛綺高懸麗藻逺謝鮮明漢老悦其怪文魏馬驚其香氣謝勑賚畫屏風啓昔紀亮所隔惟珍雲母武秋所顧止貴琉璃豈若寫帝臺之基拂崑山之碧畫巧吳筆素踰魏賜馮啇莫能賦李尢誰敢銘謝賚熊白啓竊以館有射熊之名臺無走狗之號上林絶胡人之摶禁地無張京之犯而突出羽川來攀御檻光踰厚璧殆惑朱公之價色麗燭銀將堪穆王之寳謝東宫賜聖僧餘饌啟齊桓柏寢之器周穆軒宫之寳乳糜香飯素漿五杏七桃靈𤓰仙棗莫不氣馥上天薰流下界石崇芳果金谷僅於萬株陳湯木滋杜陵幾於千樹猶自高謝珍奇多慙品族謝東宫賜淨饌啓糜獻牛牧飯出龍宫千品甘露之食百花珍藥之果餅兼髓乳漿苞蔗雕盤流其滋㫖寳器委其包香足使五世長者羞彼識味一角仙人恥其呪術微物多幸叨奉曲恩性命可捐殊私難答謝晉安王賜婚錢啓孝威問吉已通請期有日而賢夫之譽多愧張耳非壻之才偶同王粲睠言前事良以自羞曲降隆慈俯垂珍錫便使禽贄獲舉纁幣有資佩服寵靈殞越非報謝東宫賚炭洛城雪深不見海神之跡滹沱冰合無待王覇之覘聚而為岳大壯黑山稱之以舩將重牙獸鑪生烽熖室滿紅光雉裘入而識奢䑕布焚而無汚謝東宫賚鹿脯等啓上林絶胡人之搏禁地無張京之犯而猶有班超游獵李廣馳射逺歸於厨吏入貢於腊人形圖三事之車影入九仙之鏡謝東宫賚藕啓色華玉樹味奪瓊漿根出楊池聞之僮約子為靈㪚得自莊篇楚后江萍秦公海棗凡厥水羞莫敢相輩為皇太子謝勑賚功徳馬啓伏惟忘我狥物屈己濟民該天地而大捨總日月而為施既脱􅦫於金輪又解驂於紺馬出余吾之水服騊駼之廄名高夏后之龍價倍田方之贖謹當秣以柏葉飴以丹棗加之玉鞍飾之金絡謝南康王饟牛啓雖復蜀守神牛秦公怒特穆王白角何氏瑩蹄無以逾其勁力邁其致逺直宿九重獲免疏歩路休三逕且息徒行從祀甘泉方無假於丞相騎至清廟又永笑於博陽書謝賚林檎書勇聞齊國止錫二桃逺至仙方裁蒙數棗豈如恩豐漢篋賜廣魏奩姹女數而僅通筭郎計而方得生於玉井之側出自金膏之地上靈所貴下土希逢贊辟厭青牛畫贊泰山怒特吳渚神牛氣噓風噴精廻電流詎牽和鞅不入裴鞦狡力難京肆怒横行朗陵瑩角介葛瞻聲遁仙託稱妖㓂馮名名震八區威陵五都蓄勇槽側息憤埸隅仇覽獻豆滕嬰進芻雄兒楷式悍士規模曹興拂采徐邈成圖正旦春雞贊寳雞陳倉祠光表神雄飛帝漢雌飛霸秦排膺激怒礴翅張瞋電鞭失熖雷車折輪助摽魏教擅塲齊珍名流晉㦸歌傳漢臣竊脂善盗摶榖難馴綠鸚智淺蒼鷹害深兼姿五徳歸於翰音樂府隴頭水從軍戍隴頭隴水帶沙流時觀胡騎飲常為漢國羞釁妻成雨劍殺子祀雙鈎頓取樓蘭頸就解郅支裘勿令如李廣功多遂不酬一作功遂不封侯驄馬驅十五宦期門二十屯邊徼犀羈玉鏤鞍寳刀金錯鞘一隨驄馬驅分受青蠅弔且令都䕶知願被將軍照誓使氊衣鄉掃地無遺噍公無渡河請公無渡河河廣風威厲檣偃落金烏舟傾沒犀枻紺葢空嚴祠白馬徒生祭銜石傷寡心崩城掩孀袂劍飛猶共水魂沉理俱逝君為川后臣妾作江妃娣塘上行苦辛篇蒲生伊何陳曲中多苦辛黄金坐銷鑠白玉遂緇磷裂衣工毁嫡掩袖切讒新嫌成跡易已愛去理難申秦雲猶變色魯日尚廻輪妾歌已膓斷君心終未親東西門行此似應詔餞贈之作廣津寒欲歇聯檣宻䌫收天高匝近岫江濶少方舟餞淚留神眷離欷切私儔佇變齊兒俗當傳楚獻囚徒然頌並命秪恧思如抽怨詩退寵辭金屋見譴斥甘泉枕席秋風起房櫳明月懸燭避忩中影香廻爐上煙丹庭斜草徑素壁㸃苔錢歌起蒲生曲樂奏下山絃新聲昔廣宴餘杯今自傳王嬙向絶漠宗女入祈連鴈書猶未返馬角無歸年昭臺有媵御曾坂無棄捐後薪隨復積前魚誰更憐採蓮曲金漿木蘭船戲採江南蓮蓮香隔浦渡荷葉滿江鮮房垂易入手柄曲自臨盤露花時濕釧風莖乍拂鈿小臨海碣石望山海留連降尊極秦帝枉鈎陳漢家增禮秩石橋終不成桑田竟難測蜃氣逺生樓鮫人近潛織空勞帝女填詎動波神色思歸引胡地慿良馬懷驕負漢恩甘泉烽火入囘中宫室燔錦車勞逺駕繡衣疲屢奔貳師巳喪律都尉亦銷魂龍堆求援急狐塞請先屯櫪下驅雙駿腰邊帶兩鞬乘障無期限思歸安可論一作言妾薄命篇去年從越障今歳沒胡庭嚴霜封碣石驚沙暗井陘玉篸久落鬢羅衣長挂屏浴蠶思漆水條桑憶鄭坰寄書朝鮮吏留釧武安亭勿言戎夏隔但令心契㝠不見豐城劍干祀復同形鬬雞篇丹雞翠翼張妬敵復専塲翅中含芥粉距外耀金芒氣踰上黨烈名貫下韝良祭橋愁魏后食跖忌齊王願賜淮南藥一使雲間翔結客少年塲行少年本六郡遨遊遍五都挿腰銅匕首障日錦屠蘇鷙羽裝銀鏑犀膠飾象弧近發連雙兎高彎落九烏邊城多警急節使滿郊衢居延箭箙盡疎勒井泉枯正蒙都䕶接何由憚險途千金募惡少一揮擒骨都勇餘聊蹴踘戰罷暫投壺昔為北方將今為南靣孤邦君行負弩縣令且前驅行行且遊獵篇之罘講射所上林娛獵塲選徒驕楚客召狩誇胡王䍐車已戒道風烏復起行佽飛具矰繳材官命蹶張高置掩月兎勁矢射天狼蹠地不遑逸排虛豈及翔日暮勾陳轉風清鐃吹颺歸來宴平樂寧肯滯禽荒雀乳空井中晉傳𤣥詩曰鵲巢丘城側雀乳空井中逺去條支國心知漢徳休一作優聊栖丞相府過令黄霸羞挾子須閒地空井共尋求轆轤絲綆絶桔橰冬蘚周將憐羽翼張誰辭各背遊半渡溪本厠偏伍伴一戰殄凶渠制賜文犀節驛報紫泥書入營陳御葢還家乘紫車皇恩知已重丹心恨不紓渡瀘且不畏凌溪嗟有餘獨不見夫婿結纓簪偏蒙漢寵深中人引卧内副車遊上林綬染瑯琊草蟬鑄武威金分家移甲第留妾住河陰獨寢鴛鴦被自理鳳凰琴誰憐雙玉筯流靣復流衿行幸甘泉宫歌漢家迎夏畢避暑甘泉宫棧車鳴里鼓駟馬駕相風挍尉烏桓騎待制樓煩弓後旌猶五柞前笳度九嵕才人豹尾内御酒屬車中輦迴百子閣扇動七輪風鳴鍾休衞士披圖召後宫材官促挍獵涼秋一作秋來戲射熊箜篌謡結交在相得骨肉何必親甘言無忠實世薄多蘇秦從風暫靡草富貴上升天不見山巔樹摧扤下為薪豈甘井中泥上出作埃塵一云時至出作塵驄馬驅翩翩驄馬驅横行復斜趨先救遼城危後拂燕山霧風傷易水湄日入隴西樹未得報君恩聯翩終不住和王竟陵愛妾換馬驄馬出樓蘭一歩九盤桓小史贖金絡良工送玉鞍龍驂來甚易烏孫去實難麟膠妾猶有請為急弦彈擬古應教一首七言勞樂府作孝威詩題云東飛伯歌英華作簡文帝非也簡文别有二首雙棲翡翠兩鴛鴦巫雲洛月乍相望誰家妖冶折花枝蛾眉曼睇使情移青鋪綠璅琉璃扉瓊筵玉笥金縷衣美人年幾可十餘含羞轉笑歛風裾珠丸出彈不可追空留可憐持與誰鷄鳴篇以下雜言帝藝文作簡文塒鷄識將曙長鳴高樹巔啄葉疑彰羽排花彊欲前意氣多驚舉飄揚獨無侣陳思助鬬協狸膏郈昭妬敵安金距丹山可愛有鳯凰金門飛舞有鴛鴦何如五徳美豈勝千里翔烏生八九子城上烏一年生九雛枝輕巢本狹風多葉早枯氄毛不自暖張翼强相呼金析嚴兮翠樓肅蜃壁光兮椒泥馥虞機衡網不得施猜鷹鷙隼無繇逐永願共棲曽氏同瑞周王屋莫啼城上寒猶賢野中宿羽成翮備各西東丁年賦命有窮通不見高飛帝輦側逺託日輪中尚逢王吉箭猶嬰后羿弓豈如變彩救燕質入夢祚昭一作周公流聲表師退集幕示營空靈臺已鑄像流蘇時候風蜀道難玉壘高無極銅梁不可攀雙流逆巇道九坂澁陽關鄧侯䇿馬度王生斂轡還斂轡懼身尤叱馭奉王猷若恡千金重誰為萬里侯戱馬吞珠界揚舲濯錦流沉犀厭怪水握鏡表靈丘禺山金碧有光輝遷亭車馬尚輕肥彌想王褒擁節反更憶相如乘傳歸君平子雲閴不嗣江漢英靈信已衰詩重光詩并序言以下四重光儲后宣制義也赫赫重光明明二聖帝作儲述禮和樂正中衢置樽高堂懸鏡其酌不窮其明逾盛徳音孔昭民胥攸詠明明二聖赫赫重光風神灑落容止汪洋瞻彼談扇載抑載揚何斯天辯如圭如璋顏閔函席游夏升堂以卿以士惟公惟王思媚儲君顧哉樂康芄芄黍苗陰雨膏之詵詵纓冕儲王導之道之以禮齊之以仁禮則探聖言則窮神訓於四國覃於萬民侍宴樂遊林光殿曲水蒸哉軒頊赫矣堯心女媧補石重華絫一作棄金湯羅禹扇羲瑟農琴皇乎備矣受命君臨試舟五反和樂九成鈎楯秘戱協律新聲丹杯水激縫彩葩榮天吳還往海若逢迎奉和簡文帝太子應令以下五言太子天下本元良萬國貞周朝推上嗣漢代紀重明前星涵瑞彩洊雷揚逺聲三善傳樂正百行紀司成九流遍已辨七經咸所精博聞强子政高才陵長卿禮尊逾屈己徳盛益卑情仙氣貽一作胎鍾相儒道推桓榮延賢博望苑視膳長安城園綺隨金輅浮丘侍玉笙智嚢前斂笏端士後垂纓九仙良所重四海更誰傾班輸同䇿乘甲館齊蓬瀛三日侍皇太子曲水宴二龍廵夏代八駿馭周朝豫遊光帝則樂飲盛民謠皇儲遵洛褉濫觴追灞橋掌袚開神籞司馬動鑾鑣周旗交采眊晉鼓雜清簫旌宫臨廣隰藻衞爍巖椒蘭樽沿曲岸靈若泝迴潮奉和六月壬午應令𤣥圃棲金碧靈澗挹琨瑶築山圖碣岫穿池控海潮雷奔石鯨動水濶牽牛遙乘黿猶却渡鞭石詎成橋岸崩下生窟壁峭上干霄噪蛙常獨沸游魚或自跳荒徑横臨浦空舟斜挿橈愁䲭集古樹白鷺隱青苖神心重丘壑㪚步懷漁樵石累元卿徑枝挂許繇瓢伊臣本寂寞繇來畏市朝為貪止山水所競惟逍遥寄言周伯況勞君擅縠綃登覆舟山望湖北紫川通太液丹岑連少華堂皇更隱映松灌雜交加荇蒲浮新葉漁舟繞落花浴童爭淺岸漂女擇平沙極望傷春目迴車歸狹斜帆渡吉陽洲同孝儀賦江風一作潮凌曉急鉦鼓候晨催幸息榜人唱聊望高帆開聯村倐忽盡循汀俄頃囘疑是傍洲退似覺前山來將與圖南競誰與勞泝洄出新林芒山眂洛邑函谷望秦京遥分承露掌逺見長安城故鄉已可識遊子必勞情霧罷前林見一作曠風息涌川平坐觀暮潮落漸見夕煙生無由一羽化徒想御風輕郄縣遇見人織率爾寄婦妖姬含怨情織素起秋聲度梭環玉動踏躡珮珠鳴經稀疑杼澁緯斷恨絲輕葡萄始欲罷鴛鴦猶未成雲棟共徘徊紗窻相向開窻疎眉語度紗輕眼笑來籠籠隔淺紗的的見粧華鏤玉同心藕一作帶雜寳連枝花紅衫向後結金簪臨鬢斜機頂挂流蘇機傍垂結珠青絲引伏兎黄金繞轆轤豔彩裙邊出芳脂口上渝百城交問遺五馬共踟蹰直為閨中人守故不要新夢啼漬花枕覺淚濕羅巾獨眠真自難重衾猶覺寒逾憶凝脂緩彌想横陳歡行驅金絡騎歸就城南端城南稍有期想子亦勞思羅衣久應罷花釵堪更治新粧莫㸃黛余還自畫眉侍宴賦得龍沙宵明月鵲飛空繞樹月輪殊未圓嫦娥望不出桂枝稍隱殘落照移樓影浮光動塹瀾櫪馬悲笳吹城烏啼塞寒傳聞機杼妾愁余衣服單當秋絡已脆銜啼織復難斂眉雖不樂舞劍强為歡請謝函關吏行當封一丸奉和晩日虬簷挂珠箔虹梁巻霜綃迷迭涵香長芙蓉逐浪揺飛輪摶羽扇翻車引落潮甘泉推激水迎風慙逺颷寄言王待詔因聲張子僑吾君安已樂無勞誦洞簫和皇太子春林晚雨雲樹交為宻雨日共成虹雷舒長男氣枝揺少女風葉珠隨滴水簷繩下溜空蝶濡飛不颺花沾色更紅明離信養徳能事畢春宫誰堪偶鳯吹唯有浮丘公行還值雨又為清道所駐齊楚磐石貴韓吳異姓王俱乘早朝罷相隨出建章喧呼驚里閈呌咷駭康莊皁騶同隼擊青槖似鷹揚掖門南北逺複道東西長旛旗爭絡繹官騎鬱相望微風生棨傳輕雨潤帷裳油衣分競道小葢列成行八舍便繁宻五營輿服光迴車避司𨽻俄軒揖内郎況余白屋士自依卑路傍日月雖臨照仄陋難明敭早榮羞日及晚知慙豫章徒抱凌雲志終愧摩天翔安能久淪辱圖南㑹有方望雨清陰蕩暄濁飛雨入階廊瞻空亂無緒望霤耿成行交枝含曉潤雜葉帶新光浮芥離還聚沿漚滅復張浴禽飄落毳風荇㪚餘香璚綃挂繡幕象簟列華牀侍童拂羽扇厨人奉濫漿寄言楚臺客雄風詎獨涼苦暑暮日苦炎溽遷坐接階廊月麗姮娥影星含織女光棲禽動夜竹流螢出闇墻香盤糅鮮粉雕壺承玉漿白羽徒垂握綠水自周堂弱紈猶覺重纎絺尚少涼弄風思漢朔戲雨憶吳王𤣥冰術難驗赤道漏猶長誰能更吹律還令黍谷涼奉和逐涼鐘鳴夜未央避暑起徬徨長河似曳素明星若㪚璫倚巖欣石冷臨池愛水涼月纎張敞畫荷妖韓夀香對此遊清夜何勞娛洞房望棲烏夕鳥飛參差單雄雜寡雌聯翩歸葉裏出沒噪林垂爭棲時易樹驚飛忽度枝雖無繫書重亦有含纓疲以兹憔悴力重逢輕薄兒珠丸蘇合彈金繳青絲縻豈意翩翾羽遂免更羸危入懷欣得地依林竊願知和簡文帝卧疾玉躬耗寒暑羣望崇珪璧仁祀盛黄縑禮壇優紺席憊均楚疾愈俄同宋年益豈勞誦賦臣寧用觀濤客賦得曲澗澗流急易轉溪竹暗難開近樓俄已失前洲忽復迴石岸生寒蘚沈根漬水苔菱舟失道去歸鳬迷徑來奉和湘東王應令二首春宵花開人不歸節暖衣須變迴釵挂反環拭淚繩春線今夜月輪圓胡兵必應戰冬曉妾家邊洛城慣識曉鐘聲鐘聲猶未盡漢使報應行天寒硯冰凍心悲書不成詠織女玉臺初學作孝儀金鈿已照耀白日未蹉跎欲待黄昏至含嬌度淺河七夕穿針和簡文縷亂恐風來衫輕羞指現故穿雙眼針持縫合歡扇九月酌菊酒露花疑始摘羅衣似適薰餘杯度不取欲持嬌使君賦得鳴蝀應令雜扇雖俱斂交行忿自分轉袖時繞腕揚履自開裾和定襄侯初笄合鬟仍昔髮畧鬢即前絲從今一梳罷無復更縈時古體雜意朝日大風霜寄事足交傷葉落枝柯淨常自起棊張詠佳麗可憐將可念可念直千金唯言有一恨恨不遂人心望隔墻花隔墻花半隱猶見動花枝當由美人摘詎止春風吹枯葉竹枯楊猶更綠卧桞尚還生勿嫌鳯不至終當待聖明和簾裏燭開關簾影出參差風熖斜浮光燭綺帶凝滴汗垂花詠剪綵花葉舒非漸大花發是初開無論人訝似蜂見也爭來褉飲嘉樂殿詠曲水中燭影七言火浣花心猶未長金枝宻熖已流芳芙蓉池畔涵停影桃花水胍引行光賦得香出衣雜言香出衣步近氣逾飛博山登高用鄴錦含情動靨比洛妃香纓麝帶縫金縷瓊花玉勝綴珠徽蘇合故年㣲恨歇都梁路逺恐非新猶賢漢君芳千里尚笑荀令止三旬漢魏六朝百三家集巻九十八
