body:
  text: 漢魏六朝百三家集卷四十五晉潘嶽集題詞余讀潘安仁馬汧督誄惻然思古義士猶班孟堅之傳蘇子卿也及悼亡詩賦哀永逝文則又傷其閨房辛苦有古落葉哀蟬之嘆史云善為哀誄誠然哉籍田賦客舍議並以典則見稱陸海潘江無不善也獨惜其愍懷詐書呈身牝后屈長卿之典冊行江充之告變重汙泥以自辱耳間居一賦板輿輕軒浮杯髙歌天倫樂事足起愛慕孰知其仕宦情重方思熱客慈母拳拳非所念也楊駿被誅綱紀當坐安仁賴河陽舊客得脫軀命而好進不休舉家糜滅害由小吏生之者公孫宏殺之者孫秀禍福何常古人所以畏蜂蠆也二陸屠門戎毒相類天下哀之遂騰討檄安仁東市獨無憐者士之賢愚至死益見余深為彼美惜焉目録賦西征賦籍田賦滄海賦登虎牢山賦間居賦狹室賦秋興賦懷舊賦悼亡賦寡婦賦笙賦相風賦又射雉賦螢火賦河陽庭前安石榴賦有序蓮花賦芙蓉賦橘賦秋菊賦表上關中詩表書詐作愍懷太子書議九品議上客舍議頌許由頌贊故太常任府君畫贊針答摯虞新婚針訓兩階銅人訓碑司空鄭衮碑荆州刺史東武戴侯楊使君碑哀文景獻皇后哀策文哀永逝文為楊長文作弟仲武哀祝文京陵公主女王氏哀辭陽城劉氏妹哀辭金鹿哀辭傷弱子辭悲邢生辭為任子咸妻作孤女澤蘭哀辭祭文弔孟嘗君文為諸婦祭庾新婦文哭弟文誄世祖武皇帝誄太宰魯武公誄楊荆州誄夏侯常侍誄馬汧督誄楊仲武誄宜城宣君誄庾尚書誄南陽長公主誄皇女誄賈充誄詩關中詩十六章為賈謐作贈陸機十一章北芒送别王世胄家風詩於賈謐坐講漢書離合金谷集作詩河陽縣作二首在懷縣作二首內顧詩二首悼亡詩三首哀詩思子詩别詩閣柱謡漢魏六朝百三家集卷四十五目録欽定四庫全書漢魏六朝百三家集卷四十五明張溥輯晉潘嶽集賦西征賦嵗次𤣥枵月旅㽔賓丙丁統日乙未御辰潘子憑軾西征自京徂秦乃喟然而歎曰古往今來邈矣悠哉寥廓惚恍化一氣而甄三才此三才者天地人道唯生與位謂之大寶生有修短之命位有通塞之遇鬼神莫之要聖智弗能豫當休明之盛世兮託菲薄之陋質納旌弓於鉉台讃庶績於帝室嗟鄙夫之常絫兮固既得而患失無柳季之直道佐士師而三黜武皇忽其升遐八音遏於四海天子寢於諒暗兮百官聽於冢宰彼負荷之殊重兮雖伊周其猶殆窺七貴於漢庭疇一姓之或在無危明以安位秪居逼以示專陷亂逆以受戮匪降禍之自天孔隨時以行藏蘧與國而舒卷茍蔽微以謬彰患過辟之未遠悟山潜之逸士卓長往而不反陋吾人之拘攣飄蓱浮而蓬轉寮位儡其隆替名節漼以隳落危素卯之絫殼甚𤣥燕之巢幕心戰懼以兢悚如臨深而履薄夕獲歸於都外宵未中而難作匪擇木以棲集鮮林焚而鳥存遭千載之嘉㑹皇合德於乾坤弛秋霜之嚴威流春澤之渥恩甄大義以明責反初服於私門皇鑒揆余之忠誠俄命余以未班牧疲人於西夏擕老幼而入關丘去魯而顧歎季過沛而涕零伊故鄉之可懷疚聖達之幽情矧匹夫之安土邈投身於鎬京猶犬馬之戀主竊託慕於闕庭眷鞏洛而淹涕思纒綿於墳塋余乃越平樂過街郵秼馬臯門稅駕西周逺矣姬德興自髙辛思文后稷厥初生民率西水滸化流岐豳祚隆昌發舊邦惟新旋牧野而厯兹愈守柔以執競夜申旦而不寐憂天保之未定惟泰山其猶危祀八百而餘慶覽亡王之驕淫竄南巢以投命坐積薪以待然方指日而比盛人度量之乖舛何相越之遼迥考中土於斯邑成建都而營築既定鼎于郟鄏遂鑽龜而啓繇平失道而來遷繄二國而是祐豈時王之無僻賴先哲以長懋望圉北之兩門感虢鄭之納惠討子頽之樂禍尤闕西之效戾重戮帶以定襄𢎞大順以霸世靈壅川以止鬭晉演義以獻說咨景悼以迄丐政淩遲而彌季俾庶朝之遘逆厯兩王而干位踰十葉以逮赧邦分崩而為二竟橫噬於虎口輸文武之神器澡孝水而濯纓嘉美名之在兹夭赤子於新安坎路側而瘞之亭有千秋之號子無七旬之期雖勉勵於延吳實潛慟乎余慈眄山川以懷古悵攬轡於中塗虐項氏之肆暴坑降卒之無辜激秦人之歸德成劉后之來蘇事洄泬而好還卒宗滅而身屠經澠池而長想停余車而不進秦虎狼之彊國趙侵弱之餘燼超入險而髙㑹杖命世之英藺耻東瑟之偏鼓提西缶而接刃辱十城之虛壽奄咸陽以取俊出申威於河外何猛氣之咆勃入屈節於廉公若四體之無骨處智勇之淵偉方鄙吝之忿悁雖改日而易嵗無等級以寄言當光武之䝉塵致王誅於赤眉異奉辭以伐罪初垂翅於回溪不尤眚以掩德終奮翼而髙揮建佐命之元勳振皇綱而更維登崤坂之威夷仰崇嶺之嵯峩臯託墳於南陵文違風於北阿蹇哭孟以審敗襄墨縗而授戈曾隻輪之不反緤三帥以濟河值庸主之矜愎殆肆戮於朝市任好綽其餘裕獨引過以歸已明三敗而不黜卒凌晉以雪耻豈虛名之可立良致霸其有以降曲崤而憐虢託與國於亡虞貪誘賂以賣鄰不及臘而就拘垂棘反於故府屈産服于晉輿德不逮而民無援仲雍之祀忽諸我徂安陽言陟陜郛行乎漫瀆之口憩乎曹陽之墟美哉邈乎兹土之舊也固乃周召之所分二南之所交麟趾信於關雎騶虞應乎鵲巢慜漢氏之剝亂朝流亡以離析卓滔天以大滌劫宮廟而遷跡俾萬乘之盛尊降遙思於征役顧請旋於傕泛既獲許而中惕追皇駕而驟戰望玉輅而縱鏑痛百僚之勤王咸畢力以致死分身首於鋒創洞胸腋以流矢有褰裳以投岸或攘𬒮以赴水傷桴楫之褊小撮舟中之掬指升曲沃而惆悵惜兆亂而兄替枝末大而本披都偶國而禍結臧札飄其髙厲委曹吳而成節何莊武之無耻徒利開而義閉躡函谷之重阻看天險之襟帶跡諸侯之勇怯算嬴氏之利害或開關以延敵競遁逃以奔竄有噤門而莫啓不窺兵於山外連雞互而不棲小國合而成大豈地勢之安危信人事之否泰漢六世而拓畿縣𢎞農而逺關厭紫極之間敞甘微行以遊盤長傲賓於柏谷妻覩貌而獻餐疇匹婦其已泰胡厥夫之謬官昔明王之巡幸固清道而後往懼銜橛之或變峻徒御以誅賞彼白龍之魚服挂豫且之密網輕帝重於天下奚斯漸之可長弔戾園於湖邑諒遭世之巫蠱探隱伏於難明委讒賊之趙虜加顯戮於儲二絶肌膚而不顧作歸來之悲臺徒望思其何補紛吾既邁此全節兮又繼之以盤桓問休牛之故林感徵名於桃園發閿鄉而警策遡黃巷以濟潼眺華嶽之隂崖覿髙掌之遺蹤憶江使之反璧告亡期於祖龍不語怪以徵異吾聞之於孔公愠韓馬之大憝阻關谷以稱亂魏武赫以霆震奉義辭以伐叛彼雖衆其焉用故制勝於廟算砰揚桴以振塵繣瓦解而冰泮超遂遁而奔狄甲卒化為京觀倦狹路之迫隘軌﨑嶇以低仰蹈秦郊而始闢豁爽塏以宏壯黃壤千里沃野彌望華實紛敷桑麻條暢邪界褒斜右濵汧隴寶雞前鳴甘泉後涌面終南而背雲陽跨平原而連嶓冡九嵕嶻嶭太一巃嵸吐清風之飂戾納歸雲之鬱蓊南有𤣥灞素滻湯井溫谷北有清渭濁涇蘭池周曲浸決鄭白之渠漕引淮海之粟林茂有鄠之竹山挺藍田之玉班述陸海珍藏張叙神臯隩區此西賔所以言於東主安處所以聽於憑虛也可不謂然乎徑松彰於嵗寒貞臣見於國危入鄭都而抵掌義桓友之忠規竭股肱於昏主赴塗炭而不移世善職於司徒緇衣敝而改為履犬戎之侵地疾幽后之詭惑舉僞烽以沮衆淫嬖褒以縱慝軍敗戲水之上身死驪山之北赫赫宗周滅為亡國又有繼於此者異哉秦始皇之為君也傾天下以厚葬自開闢而未聞匠人勞而弗圖俾生埋以報勤外離西楚之禍內受牧豎之焚語曰行無禮必自及此非其效歟乾坤以有親可久君子以厚德載物觀夫漢髙之興也非徒聰明神武豁達大度而已也乃實慎終追舊篤誠欵愛澤靡不漸恩無不逮率土且猶弗遺而况於鄰里乎而况於卿士乎于斯時也乃摹寫舊豐制造新邑故社易置枌榆遷立街衢如一庭宇相襲渾雞犬以亂放各識家而競入籍含怒於鴻門沛局踳而來王范謀害而弗許隂授劍以約莊撛白刃以萬舞危冬葉之待霜履虎尾而不噬實要伯於子房樊抗憤以巵酒咀彘肩以激揚忽蛇變而龍攄雄霸上而髙驤增遷怒而橫撞碎玉斗其何傷嬰罥組於軹塗投素車而肉袒疏飲餞於東門畏極位之盛滿金墉鬱其萬雉峻嵃峭以繩直戾飲馬之陽橋踐宣平之清閾都中雜沓户千人億華夷士女駢闐逼側展名京之初儀即新館而蒞職勵疲鈍以臨朝朂自彊而不息於是孟秋爰謝聽覽餘日巡省農功周行廬室街里蕭條邑居散逸營宇寺署肆鄽管庫蕞芮於城隅者百不一處所謂尚冠修成黃棘宣明建陽昌隂北煥南平皆夷漫滌蕩無其處而有其名爾乃階長樂登未央泛太液凌建章縈馺娑而欵駘蕩枍詣而轢承光徘徊桂宫惆悵柏梁鷩雉雊於臺陂狐兔窟於殿傍何黍苗之離離而余思之芒芒洪鐘頓於毁廟乘風廢而不懸禁省鞠為茂草金狄遷於霸川懷夫蕭曹魏邴之相辛李衛霍之將銜使則蘇屬國震逺則張博望教敷而彛倫序兵舉而皇威暢臨危而智勇奮投命而髙節亮暨乎秺侯之忠孝淳深陸賈之優遊宴喜長卿淵雲之文子長政駿之史趙張三王之尹京定國釋之之聽理汲長孺之正直鄭當時之推士終童山東之英妙賈生洛陽之才子飛翠緌拖鳴玉以出入禁門者衆矣或被髮左袵奮迅泥滓或從容傅㑹望表知裏或著顯績而嬰時戮或有大才而無貴仕皆揚清風於上列垂令聞而不巳想珮聲之遺響若鏗鏘之在耳當音鳳恭顯之任勢也乃熏灼四方震耀都鄙而死之日曽不得與夫十餘公之徒𨽻齒名才難不其然乎望漸臺而扼腕梟巨猾而餘怒揖不疑於北闕軾樗里於武庫酒池鑒於商辛追覆車而不寤曲陽僣於白虎化奢淫而無度命有始而必終孰長生而久視武雄略其焉在近惑文成而溺五利侔造化以制作窮山海之奧袐靈若翔於神島奔鯨浪而失水曝鱗骼於漫沙隕明月以雙墜擢仙掌以承露干雲漢而上至致卭蒟其奚難惟余欲而是恣縱逸遊於角抵絡甲乙以珠翠忍生民之減半勒東嶽以虛美超長懷以遐念若循環之無賜較面朝之煥炳次後庭之猗靡壯當熊之忠勇深辭輦之明智衛鬒髮以光鑒趙輕體之纎麗咸善立而聲流亦寵極而禍侈津便門以右轉究吾境之所暨掩細栁而撫劒快孝文之命帥周受命而忘身明戎政之果毅距華蓋於壘和案乘輿之尊轡肅天威之臨顏率軍禮以長撎輕棘霸之兒戲重條侯之倨貴索杜郵其焉在云孝里之前號惘輟駕而容與哀武安以興悼爭伐趙以狥國定廟算之勝負扞矢言而弗納反推怨以歸咎未十里於遷路尋賜劒以刎首嗟主暗而臣嫉禍于何而不有窺秦墟於渭城冀闕緬其堙盡覓陛殿之餘基裁岥𡊇以隱嶙想趙使之抱璧瀏睨楹以抗憤燕圖窮而荆發紛絶袖而自引筑聲厲而髙奮徂潜鉛以脫臏據天位其若兹亦狼狽而可愍簡良人以自輔謂斯忠而鞅賢寄苛制於捐灰矯扶蘇於朔邉儒林填於坑穽詩書煬而為煙國滅亡以斷後身刑轘以啓前商法焉得以宿黃犬何可復牽野蒲變而成脯苑鹿化以為馬假讒賊以天權鉗衆口而寄坐兵在頸而顧問何為不早而告我願黔黎其誰聽惟請死而獲可逮子嬰之果決敢討賊以舒禍勢土崩而莫振作降王於路左蕭收圖以相劉料險易與衆寡羽天與而不取冠沐猴而縱火貫三光而洞九泉曾未足以喻其髙下感市閭之菆井歎尸韓之舊處丞屬號而守闕人百身以納贖豈生命之易投誠惠受之洽著訐望之以求直亦余心之所惡思夫人之政術實幹時之良具茍明法以釋憾不愛才以成務𢎞大體以髙貴非所望於蕭傅造長山而慷慨偉龍顏之英主胸中豁其洞開羣善湊而必舉存威格乎天區亡墳掘而莫禦臨掩坎而絫抃步毁垣以延佇越安陵而無譏諒惠聲之寂寞弔爰絲之正議伏梁劒於東郭訊景皇於陽丘奚信讒而矜謔殞吳嗣於局下蓋發怒於一博成七國之稱亂翻助逆以誅錯恨過聽之無討兹沮善而勸惡呰孝元於渭塋執奄尹以明貶褒夫君之善行廢園邑以崇儉過延門而責成忠何辜而為戮陷社稷之王章俾幽死而莫鞠忕淫嬖之凶忍勦皇統之孕育張舅氏之奸漸貽漢宗以傾覆刺哀主於義域僣天爵於髙安欲法堯而承禪永終古而不刋瞰康園之孤墳悲平后之專潔殃厥父之篡逆䝉漢耻而不雪激義誠而引決赴丹熖以明節投宫火而焦糜從灰熛而俱滅騖橫橋而旋軫厯弊邑之南垂門礠石而梁木蘭兮構阿房之屈竒疏南山以表闕倬樊川以激池役鬼傭其猶否矧人力之所為工徒斫而未息義兵紛以交馳宗祧汚而為沼豈斯宇之獨隳由僞新之九廟誇宗虞而祖黃驅吁嗟而妖臨搜佞哀以拜郎誦六藝以飾奸焚詩書而面牆心不則於德義雖異術而同亡宗孝宣於樂遊紹衰緒以中興不獲事于敬養盡加隆於園陵兆惟奉明邑號千人訊諸故老造自帝詢隱王母之非命縱聲樂以娛神雖靡率於舊典亦觀過而知仁慿髙望之陽隈體川陸之汚隆開襟乎清暑之館遊目乎五柞之宮交渠引漕激湍生風乃有昆明池乎其中其池則湯湯汗汗滉漾彌漫浩如河漢日月麗天出入乎東西旦似暘谷夕類虞淵昔豫章之名宇披𤣥流而特起儀景星於天漢對牛女以雙峙圖萬載而不傾奄摧落於十紀擢百尋之層觀今數仞之餘址振鷺于飛鳬躍鴻漸乘雲頡頏隨流淡淡瀺灂驚波唼喋菱芡華蓮爛於緑沼青蕃蔚乎翠㶑伊兹池之肇穿肄水戰於荒服志勤逺以極武良無邀於後福而菜蔬芼實水物惟錯乃有贍乎原陸在皇代而物土故毁之而又復凡厥寮司既富而教咸帥貧惰同整楫棹收罟課獲引繳舉效鰥夫有室愁民以樂徒觀其鼓柂回輪灑鉤投網垂餌出入挺扠來往纖經連白鳴桹厲響貫鰓􅙏尾掣三牽兩於是弛青鯤於網巨解頳鯉於黏徽華魴躍鱗素鱮揚鬐饔人縷切鸞刀若飛應創落爼靃靃霏霏紅鮮紛其初載賔旅竦而遲御既餐服以屬厭泊恬靜以無欲回小人之腹為君子之慮爾乃端策拂茵彈冠振衣徘徊酆鄗如渴如饑心翹勤以仰止不加敬而自祗豈三聖之敢夢竊十亂之或希經始靈臺成之不日惟鄗及酆仍京其室庶民子來神降之吉積德延祚莫二其一永惟此邦云誰之識越可略聞而難臻其極子嬴鋤以借父訓秦法而著色耕讓畔以閒田沾姬化而生棘蘇張喜而詐騁虞芮愧而訟息由此觀之士無常俗而教有定式上之遷下猶鈞之埏埴雖五方雜㑹風流溷淆惰農好利不昏作勞密邇獫狁戎馬生郊而制者必割實存操刀人之升降隨政隆㬱伏信則莫不用情無欲則賞之不竊雖智不能理明不能察信此心也庶免夫戻如其禮樂以俟來哲籍田賦伊晉之四年正月丁未皇帝親率羣后籍於千畝之甸禮也於是乃使甸師清畿野廬掃路封人壝宫掌舍設枑青壇蔚其嶽立兮翠幕黕以雲布結崇基之靈址兮啓四塗之廣阼沃野墳腴膏壤平砥清洛濁渠引流激水遐阡繩直邇陌如矢䓤犗服於縹軛兮紺轅綴於黛耜儼儲駕於㕓左兮俟萬乘之躬履百僚先置位以職分自上下下具惟命臣襲春服之萋萋兮接游車之轔轔微風生於輕幰兮纎埃起於朱輪森奉章以階列兮望皇軒而肅震若湛露之晞朝陽兮衆星之拱北辰也於是前驅魚麗屬車鱗萃閶闔洞啓參塗方駟常伯陪乘太僕秉轡后妃獻穜稑之種司農撰播殖之器挈壺掌升降之節宫正設門閭之蹕天子乃御玉輦䕃華蓋衝牙錚鎗綃紈綷䌨金根照耀以炯晃兮龍驥騰驤而沛艾表朱𤣥於離坎飛青縞於震兌中黃曄以發暉兮方綵紛其繁㑹五輅鳴鑾九旗揚斾瓊鈒入蘂雲罕暗藹簫管嘲􅑜以啾嘈兮鼓鞞硡隱以砰礚筍虡嶷以軒翥兮洪鍾越乎區外震震填填塵騖連天以幸乎籍田蟬冕頻以灼灼兮碧色肅其芊芊似夜光之剖荆璞兮若茂松之依山巔也於是我皇乃降靈壇撫御耦坻場染屨洪縻在手三推而舍庶人終畝貴賤以班或五或九于斯時也居靡都鄙民無華裔長幼雜遝以交集士女頒斌而咸戾被褐振裾垂髫總髻躡踵側肩掎裳連袂黃塵為之四合兮陽光為之潜翳動容發音而觀者莫不抃舞乎康衢謳吟乎聖世情欣樂乎昏作兮慮盡力乎樹藝靡推督而常勤兮莫之課而自勵躬先勞以悅使兮豈嚴刑而猛制哉有邑老田父或進而稱曰蓋損益隨時理有常然髙以下為基民以食為天正其末者端其本善其後者愼其先夫九土之宜弗任四人之務不一野有菜蔬之色朝靡代耕之秩無儲稸以虞灾徙望嵗以自畢三季之衰皆此物也今聖上昧旦丕顯夕惕若栗圖匱於豐防儉於逸欽哉欽哉惟榖之恤展三時之𢎞務致倉廪於盈溢固堯湯之用心而存救之要術也若乃廟祧有事祝宗諏日簠簋普淖則此之自實縮鬯蕭茅又於是乎出黍稷馨香㫖酒嘉栗宜其民和年登而神降之吉也古人有言曰聖人之德無以加於孝乎夫孝者天地之性人之所由靈也昔者明王以孝理天下其或繼之者鮮哉希矣逮我皇晉實光斯道儀刑孚於萬國愛敬盡於祖考故躬稼以供粢盛所以致孝也勸穡以足百姓所以固本也能本而孝盛德大業至矣哉此一役也而二美具焉不亦逺乎不亦重乎敢作頌曰思樂甸畿薄採其茅大君戾止言藉其農其農三推萬方以祗耨我公田實及我私我簠斯盛我簋斯齊我倉如陵我庾如坻念兹在兹永言孝思民力普存祝史正辭神祗攸歆逸豫無期一人有慶兆民賴之滄海賦徒觀其狀也則湯湯蕩蕩瀾漫形沈流沫千里懸水萬丈測之莫量其深望之不見其廣無逺不集靡幽不通羣溪俱息萬流來同含三河而納四瀆朝五湖而夕九江隂霖則興雲降雨陽霽則吐霞曜日煮水而鹽成剖蚌而珠出其中有蓬萊名嶽青丘竒山阜陵别島㟪環其間其山則山纍崔嵬崒嵯峩降屈披滄流以特起擢崇基而秀出其魚則有吞舟鯨鯢鰞鱡龍鬚蜂目豺口狸斑雉軀怪體異名不可勝圖其蟲獸則素蛟丹虬元龜靈鼉修黿巨鱉紫貝螣蛇𤣥螭蚴虬赤龍焚藴遷體改角推舊納新舉扶搖以抗翼泛陽侯以濯鱗其禽鳥則鷗鴻鷫鸘鴐鵝鵁鶄朱背煒燁縹翠葱青詳察波浪之來往遍聽奔激之音響力勢之所回薄潤澤之所彌廣信普天之極大橫率土而莫兩登虎牢山賦辭京輦兮遙邁將逺遊兮東夏朝發軔兮帝墉夕結軌兮中野憑修坂兮停車臨寒泉兮飲馬眷故鄉之遼隔思紆軫以鬱陶步玉趾以升降凌泛水兮登虎牢覽河洛之二川眺成平之雙臯崇嶺驫以崔崒幽谷豁以窙寥路逶迤以迫隘林廓落以蕭條爾乃仰䕃嘉木俯藉芳卉青烟鬱其相望棟宇凛以鱗萃彼登山而臨水固先哲之所哀矧去鄉而離家邈長辭而逺乖望歸雲以歎息腸一日而九回良勞者之詠事爰寄言以表懷間居賦嶽嘗讀汲黯傳至司馬安四至九卿而良史題之以巧宦之目未嘗不慨然廢書而歎曰嗟乎巧誠有之拙亦宜然顧常以為士之生也非至聖無軌微妙𤣥通者則必立功立事效當年之用是以資忠履信以進德修辭立誠以居業僕少竊鄉曲之譽沗司空太尉之命所奉之主即太尉魯武公其人也舉秀才為郎逮事世祖武皇帝為河陽懷令尚書郎廷尉平今天子諒暗之際領太傅主簿府主誅除名為民俄而復官除長安令遷博士未召拜親疾輒去官閲自弱冠涉乎知命之年八徙官而一進階再免一除名一不拜職遷者三而已矣雖通塞有遇抑亦拙者之效也昔通人和長輿之論余也固謂拙於用多稱多則吾豈敢言拙信而有徴方今俊乂在官百工惟時拙者可以絶意乎寵榮之事矣太夫人在堂有羸老之疾尚何能違膝下色養而屑屑從斗筲之役乎於是覽止足之分庶浮雲之志築室種樹逍遙自得池沼足以漁釣春稅足以代耕灌園鬻蔬以供朝夕之膳牧羊酤酪以俟伏臘之費孝乎惟孝友于兄弟此亦拙者之為政也乃作間居之賦以歌事遂情焉其辭曰傲墳素之長圃步先哲之髙衢雖吾顏之云厚猶內愧於寧蘧有道吾不仕無道吾不愚何巧智之不足而拙艱之有餘也於是退而間居于洛之涘身齊逸民名綴下士陪京泝伊面郊後市浮梁黝以徑度靈臺傑其髙峙窺天文之祕奧究人事之終始其西則有元戎禁營𤣥幕緑徽溪子巨黍異絭同機炮石雷駭激矢虻飛以先啓行曜我皇威其東則有明堂辟雍清穆敞間環林縈映圓海回淵聿追孝以嚴父宗文考以配天祗聖敬以明順養更老以崇年若乃背冬涉春隂謝陽施天子有事於柴燎以郊祖而展義張鈞天之廣樂備千乘之萬騎服振振以齊𤣥管啾啾而並吹煌煌乎隱隱乎兹禮容之壯觀而王制之巨麗也兩學齊列雙宇如一右延國胄左納良逸祁祁生徒濟濟儒術或升之堂或入之室教無常師道在則是故髦士投紱名王懷璽訓若風行應如草靡此里仁所以為美孟母所以三徙也爰定我居築室穿池長楊映沼芳枳樹籬遊鱗瀺灂菡蓞敷披竹木蓊藹靈果參差張公大谷之梨梁侯烏椑之柿周文弱枝之棗房陵朱仲之李靡不畢殖三桃表櫻胡之别二奈曜丹白之色石榴蒲萄之珍磊落蔓衍乎其側梅杏郁棣之屬繁榮麗藻之飾華實照爛言所不能極也菜則葱韭蒜芋青筍紫薑堇薺甘㫖蓼荽芬芳蘘荷依隂時藿向陽緑葵含露白薤負霜於是凛秋暑退熙春寒往微雨新晴六合清朗太夫人乃御板輿升輕軒逺覽王畿近周家園體以行和藥以勞宣常膳載加舊痾有痊席長筵列孫子柳垂隂車結軌陸摘紫房水挂頳鯉或宴於林或禊於汜昆弟斑白兒童稚齒稱萬壽以獻觴咸一懼而一喜壽觴舉慈顔和浮杯樂飲絲竹駢羅頓足起舞抗音髙歌人生安樂孰知其他退求已而自省信用薄而才劣奉周任之格言敢陳力而就列幾陋身之不保尚奚擬於明哲仰衆妙而絶思終優游以養拙狹室賦厯甲第以遊觀旋陋巷而言歸伊余館之褊狹良窮弊而極微閣寥戾以互掩門﨑嶇而外扉室側户以攢楹檐接櫃而交榱當祝融之御節熾朱明之隆暑沸體惄其如鑠珠汗揮其如雨若乃重隂晦冥天威震曜漢潦沸騰叢溜奔激臼竈為之沉溺器用為之浮漂彼處貧而不怨嗟生民之攸難匪廣厦之足榮有切身之近患青陽萌而畏暑白藏兆而懼寒獨味道而不悶喟然向其時歎秋興賦晉十有四年余春秋三十有二始見二毛以太尉掾兼虎賁中郎將寓直于散騎之省髙閣連雲陽景罕曜珥蟬冕而襲紈綺之士此焉遊處僕野人也偃息不過茅屋茂林之下談話不過農夫田父之客攝官承乏猥厠朝列夙興晏寢匪遑底寧譬猶池魚籠鳥而有江湖山藪之思於是染翰操紙慨然而賦于時秋也故以秋興命篇其辭曰四運忽其代序兮萬物紛以回薄覽花蒔之時育兮察盛衰之所託感冬索而春敷嗟夏茂而秋落雖末士之榮悴兮伊人情之美惡善乎宋玉之言曰悲哉秋之為氣蕭瑟兮草木搖落而變衰憀栗兮若在逺行登山臨水送將歸夫送歸懷慕徒之戀兮逺行有羇旅之憤臨川感流以歎逝兮登山懷逺以悼近彼四戚之疚心兮遭一塗其難忍嗟秋日之可哀兮良無愁而不盡野有歸燕隰有翔隼游氛朝興槁葉夕殞於時乃屏輕箑釋纎絺藉莞蒻御夾衣庭樹摵以灑落徑風戾而吹帷蟬嘒嘒以寒吟雁飄飄而南飛天晃朗以彌髙日悠陽而浸微何微陽之短晷覺涼夜之方永月朣朧以含光兮露淒清以凝冷熠耀粲於階闥兮蟋蟀鳴乎軒屏聽離鴻之晨吟望流火之餘景宵耿介而不寐兮獨展轉於華省悟時嵗之遒盡兮慨俯首而自省班鬢髟以承辨兮素髮颯以垂領仰羣俊之逸軌兮攀雲漢以遊騁登春臺之熙熙珥金貂之炯炯茍趨捨之殊途兮庸詎識其躁靜聞至人之休風兮齊天地於一指彼知安而忘危兮固出生而入死行投趾於容跡兮殆不踐而獲底闕側足以及泉兮雖猴猿而不履龜祀骨於宗祧兮思反身於緑水且斂袵以歸來兮忽投紱以髙厲耕東皋之沃壤兮輸黍稷之餘稅泉涌湍於石間兮菊揚芳乎崖澨澡秋水之涓涓兮玩游鯈之潎潎逍遙乎山川之阿放曠乎人間之世優哉游哉聊以卒嵗懷舊賦余十二而獲見於父友東武戴侯楊君始見知名遂申之以婚姻而道元公嗣亦隆世親之愛不幸短命父子凋殞余既有私艱且尋役於外不厯嵩丘之山者九年于兹矣今而經焉慨然懷舊乃作賦曰啓開陽而朝邁濟清洛以徑度晨風淒以激冷夕雪皓以掩路轍含氷以滅軌水漸軔以凝沍塗艱屯其難進日晼晚而將暮仰晞歸雲俯鏡泉流前曕太室傍眺嵩丘東武托焉建塋啓疇巖巖雙表列列行楸望彼楸矣感于豫思既興慕於戴侯亦悼元而哀嗣墳纍纍以接隴柏森森以攢植何逝沒之相尋曽舊草之未異余總角而獲見承戴侯之清塵名余以國士眷余以嘉姻自祖考而隆好逮二子而世親觀擕手以偕老庶報德之有鄰今九載而一來五臣作來歸空館閴其無人陳荄被於堂除舊圃化而為薪步庭廡以徘徊涕泫流而霑巾宵展轉而不寐驟長嘆以達晨獨鬱結其誰語聊綴思於斯文悼亡賦伊良嬪之初降幾二紀以迄兹遭兩門之不造僃荼毒而嘗之嬰生艱之至極又薄命而早終含芬華之芳烈翩零落而從風神飄忽而不反形安得而久安襲時服於遺質表鉛華於餘顔問筮賓之何期宵過兮而參闌詎幾時而見之目眷戀以相屬聽轍人之唱籌來聲呌以連續聞冬夜之恆長何此夕之一促且伉儷之片合垂明哲乎嘉禮茍此義之不謬乃全身之半體吾聞喪禮之在妻謂制重而哀輕既履氷而知寒吾今信其緣情夕既昏兮朝既清延爾族兮臨後庭入空室兮望靈座帷飄飄兮燈熒熒燈熒熒兮如故帷飄飄兮若存物未改兮人已化饋生塵兮酒停樽春風兮泮水初陽兮戒溫逝逍遙兮浸遠嗟焭焭兮孤魂寡婦賦樂安任子咸有韜世之量與余少而歡焉雖兄弟之愛無以加也不幸弱冠而終良友既沒何痛如之其妻又吾姨也少喪父母適人而所天又殞孤女藐焉始孩斯亦生民之至囏而荼毒之極哀也昔阮瑀既沒魏文悼之竝命知舊作寡婦之賦余遂擬之以作叙其孤寡之心焉其辭曰嗟余生之不造兮哀天難之匪忱少伶俜而偏孤兮痛忉怛以摧心覽寒泉之遺歎兮詠蓼莪之餘音情長戚以永慕兮思彌逺而逾深伊女子之有行兮爰奉嬪於髙族承慶雲之光覆兮荷君子之惠渥顧葛藟之蔓延兮託微莖於樛木懼身微而施重兮若履氷而臨谷遵義方之明訓兮憲女史之典戒奉蒸嘗以效順兮供灑掃以彌載彼詩人之攸歎兮徒願言而心痗何遭命之竒薄兮遘天禍之未悔榮華燁其始茂兮良人忽以捐背靜闔門以窮居兮塊焭獨而靡依易錦茵以苫席兮代羅幬以素帷命阿保而就列兮覽巾箑以舒悲口嗚咽以失聲兮淚橫迸而霑衣愁煩寃其誰告兮提孤孩於坐側時曖曖以向昏兮日杳杳以西匿雀羣飛而赴楹兮雞登棲而斂翼歸空館而自憐兮撫衾禱而嘆息思纒綿以瞀亂兮心摧傷以愴惻曜靈曄而遄邁兮四節運而推移天凝露以降霜兮木葉落而隕枝仰神宇之寥寥兮瞻靈衣之披披退幽悲於堂隅兮進獨拜於牀垂耳傾想於疇昔兮目倣佛乎平素雖冥冥而罔覿兮猶依依以慿附痛存亡之殊制兮將遷神而安厝龍轜儼其星駕兮飛旐翩以啓路輪按軌以徐進兮馬悲鳴而局顧潜靈邈其不反兮殷憂結而靡訴晞形影於几筵兮馳精爽於丘墓自仲秋而在疚兮踰履霜以踐氷雪霏霏而驟落兮風瀏瀏而夙興霤泠泠而夜下兮水五臣作氷非溓溓以微凝意惚恍以遷越兮神一夕而九升庶浸逺而哀降兮情惻惻而彌甚願假夢以通靈兮目炯炯而不寢夜漫漫以悠悠兮寒淒淒以凛凛氣憤薄而乘胸兮涕交橫而流枕亡魂逝而永逺兮時嵗忽其遒盡容貌儡以頓悴兮左右淒其相慜感三良之殉秦兮甘捐生而自引鞠稚子於懷抱兮嗟低徊而不忍獨指景而心誓兮雖形存而志殞重曰仰皇穹兮嘆息私自憐兮何極省微身兮孤弱顧稚子兮未識如涉川兮無梁若凌虛兮失翼上瞻兮遺像下臨兮泉壤窈冥兮潜翳心存兮目想奉靈坐兮肅清訴空宇兮曠朗廓孤立兮顧影塊獨言兮聽響顧影兮傷摧聽響兮增哀遙逝兮逾逺緬邈兮長乖四節流兮忽代序嵗云暮兮日西頽霜被庭兮風入室夜既分兮星漢回夢良人兮來遊若閶闔兮洞開怛驚悟兮無聞超惝恍兮慟懷慟懷兮奈何言陟兮山阿墓門兮肅肅修隴兮峩峩孤鳥嚶嚶兮悲鳴長松萋萋兮振柯哀鬱結兮交集淚橫流兮滂沱蹈共姜兮明誓詠柏舟兮清歌終歸骨兮山足存慿託兮餘華要吾君兮同穴之死矢兮靡他笙賦河汾之寶有曲沃之懸匏焉鄒魯之珍有汶陽之孤篠焉若乃綿蔓紛敷之麗浸潤靈液之滋隅隈夷險之勢禽鳥翔集之嬉固衆作者之所詳余可得而略之也徒視其制器也則審洪纖面短長􅗇生簳裁熟簧設宫分羽經徵列商泄之反謐厭焉乃揚管攢羅而表列音要妙而含清各守一以司應統大魁以為笙基黃鐘以舉韻望儀鳳以擢形寫皇翼以插羽摹鸞音以厲聲如鳥斯企翾翾跂跂明珠在咮若銜若垂修檛內辟餘簫外逶駢田獵攦魻鰈參差於是乃有始泰終約前榮後悴激憤於今賤永懷乎故貴衆滿堂而飲酒獨向隅而掩淚援鳴笙而將吹先嗢噦以理氣初雍容以安暇中佛鬱以怫㥜終嵬峩以蹇諤又颯遝而繁沸罔浪孟以惆悵若欲絶而復肆懰憿糴以奔邀似將放而中匱愀愴惻淢虺韡煜熠泛淫泛艷霅燁岌岌或案衍夷靡或竦勇剽急或既往不反或已出復入徘徊布濩渙洐葺襲舞既蹈而中輟節將撫而不及樂聲發而盡室歡悲音奏而列坐泣􅩞纖翮以震幽簧越上筒而通下管應吹吸以往來隨抑揚以虛滿勃慷慨以憀亮顧躊躇以舒緩輟張女之哀彈流廣陵之名散詠園桃之夭夭歌棗下之纂纂歌曰棗下纂纂朱實離離宛其死矣化為枯枝人生不能以行樂死何以虛諡為爾乃引飛龍鳴鵾雞雙鴻翔白鶴飛子喬輕舉明君懷歸荆王喟其長吟楚妃歎而增悲夫其悽唳辛酸嚶嚶關關若離鴻之鳴子也含㗅嘽諧雍雍喈喈若羣雛之從母也郁捋劫悟泓宏融裔哇咬嘲􅑜一何察慧訣厲悄切又何磬折若夫時陽初暖臨川送離酒酣徒擾樂闋日移疏客始闌主人微疲弛絃韜籥徹塤屛篪爾乃促中筵擕友生解嚴顔擢幽情披黃苞以授甘傾縹瓷以酌醽光歧儼其偕列雙鳳嘈以和鳴晉野悚而投琴况齊瑟與秦箏新聲變曲竒韻橫逸縈纒歌鼓網羅鐘律爛熠爚以放豔鬱蓬勃以氣出秋風詠於燕路天光重於朝日大不踰宫細不過羽唱發章夏導揚韶武協和陳宋混一齊楚邇不逼而逺無攜聲成文而節有叙彼政有失得而化以醇薄樂所以移風於善亦所以易俗於惡故絲竹之器未改而桑濮之流已作惟簧也能研羣聲之清惟笙也能總衆清之林衛無所措其邪鄭無所容其淫非天下之和樂不易之德音其孰能與於此乎相風賦混元恍其初判二氣變而無窮動靡微而不兆象有始而必終思先天而不違立成器以相風棲靈烏於帝庭似月離乎紫宫飛輕羽於竿杪若鸞翔乎雲中廣莫興而習坎景風發而遡離閶闔揚而曲指明庶起而東移又採修竹于層城厯寒暑而靡凋踞神獸於下趾棲靈烏于上標射雉賦涉青林以游覽兮樂羽族之羣飛聿采毛之英麗兮有五色之名翬厲耿介之專心兮奓雄豔之姱姿巡丘陵以經略兮畫墳衍而分畿於是青陽告謝朱明肇授靡木不滋無草不茂初莖蔚其曜新陳柯摵以改舊天泱泱以垂雲泉涓涓而吐澑麥漸漸以擢芒雉鷕鷕而朝雊眄箱籠以揭驕睨驍媒之變態奮徑骹以角搓瞵悍目以旁睞鶯綺翼而頳撾灼繡頸而衮背鬱軒翥以餘怒思長鳴以效能爾乃搬場拄翳停僮䓤翠緑柏參差文翮鱗次蕭森繁茂婉轉輕利𠂻料戾以徹鑒表厭躡以密緻恐吾游之晏起慮原禽之罕至甘疲心於企想分倦目以寓視何調翰之喬桀邈疇類而殊才候扇舉而清呌野聞聲而應媒褰微罟以長眺已踉蹡而徐來摛朱冠之赩赫敷藻翰之陪鰓首藥緑素身拖黼繪青鞦莎靡丹臆蘭綷或蹶或啄時行時止斑尾揚翹雙角特起良遊厄喔引之規裏應叱愕立擢身竦峙捧黃閒以密彀屬剛罫以潜擬倒禽紛以迸落機聲振而未巳山鷩悍害猋迅已甚越壑淩岑飛鳴薄廪鯨牙低鏃心平望審毛體摧落霍若碎錦逸羣之俊擅場挾兩櫟雌妬異倐來忽往忌上風之餮切畏映日之儻朗屏發布而纍息徒心煩而伎懩伊義鳥之應機啾擭地以厲響彼聆音而徑進忽交距以接壤彤盈忩以美發紛首頽而臆仰或乃崇墳夷靡農不易壠稊菽叢糅翳薈菶茸鳴雄振羽依于其冢㨛降丘以馳敵雖形隱而草動瞻挺穟之傾掉意淰躍以振踊暾出苗以入場愈情駭而神悚望黶合而翳晶雉脥肩而旋踵俽余志之精鋭擬青顱而㸃項亦有目不步體邪眺旁剔靡聞而驚無見自䳮周環回復繚繞盤辟戾翳旋把縈隨所厯彳亍中輟馥焉中鏑前􅗇重膺傍截疊翮若夫多疑少決膽劣心狷內無固守出不交戰來若處子去如激電窺覘􅀢葉幎厯乍見於是計分銖啇逺邇揆懸刀騁絶伎如如軒不髙不埤當咮值胸裂膆破觜夷險殊地馴粗異變妟不暇食夕不告倦昔賈氏之如臯始解顔於一箭醜夫為之改貌憾妻為之釋怨彼遊田之致獲咸乘危以馳鶩何斯藝之安逸嗟禽從其已豫清道而行擇地而住尾飾鑣而在服肉登爼而永御豈唯皂𨽻此焉君舉若乃耽盤流遁放心不移忘其身恤司其雄雌樂而無節端操或虧此則老氏之所誡而君子之所不為螢火賦喜熠耀之精將與衆類乎超殊東山感而增嘆行士慨而懷憂翔太隂之𤣥昧抱夜光以清遊熲若飛電之宵逝嘒似移星之雲流動集陽暉灼如隋珠熠熠熒熒若丹英之照葩飄飄熲熲若流金之在沙載飛載止光色孔嘉無聲無臭明影暢遐歃朝霞於曠野庇一葉之垂柯無干欲於萬物豈顧恤于網羅至夫重隂之夕風雨晦暝萬物眩惑翩翩獨征竒姿燎朗在隂益榮猶賢哲之處時時昏昧而道明若蘭香之在幽越群臭而彌馨隨隂陽以飄飄非飲食之是營問螽斯之無忌希夷惠之清貞羡微蟲之琦瑋援彩筆以為銘河陽庭前安石榴賦有序石榴者天下之竒樹九州之名果也是以屬文之士叙而賦之仰天路而髙睇顧鄰國以相望位莫微於宰邑館莫陋于河陽雖小縣陋館可以遨遊實有嘉木曰安石榴修條外暢榮幹內樛扶疏偃蹇冉弱紛柔於是暮春告謝朱夏戒初新莖擢潤膏葉垂腴曾華曄以先起含榮􅀈其方敷丹暉綴於朱房緗的㸃乎紅鬚煌煌煒煒熠爚委纍似琉璃之棲鄧林若珊瑚之映緑水光明燐爛含丹耀紫味滋芳神色麗瓊蘂遙而望之煥若隋珠擢重淵詳而察之灼若列星出雲間千房同模千子如一御渴療饑解酲止疾既乃攢乎狹庭載厄載褊土階無等肩牆惟淺壁衣蒼苔瓦被駁蘚處悴而榮在幽彌顯其華可玩其實可珍羞于王公薦于鬼神豈伊仄陋用渝厥貞果猶如之而况於人蓮花賦偉𤣥澤之普衍嘉植物之並敷遊莫美于春臺華莫盛于芙蕖於是惠風動冲氣和眄清池玩蓮花舒緑葉挺纎阿結緑房列紅葩仰含清液俯濯素波修柯婀娜柔莖苒蒻流風徐轉回波微激其望之也曄若皎日燭崑山其即之也晃若盈尺映藍田芙蓉賦䕃蘭池之豐沼育沃野之上腴課衆榮而比觀煥卓犖而獨殊狎獵雲布窋咤星羅光擬燭龍色奪朝霞丹輝拂紅飛鬚垂的紛披赩赫散煥熠爚流芬賦采風靡雲旋布濩磊落蔓衍夭間發清陽而增媚潤白玉而加鮮橘賦余齊前橘樹冬夏再熟聊為賦云爾嗟嘉卉之芬華信氛氲而芬馥既蓊茸而萎蕤且參差而橚矗已鬱鬱而冬茂亦離離而夏熟至如廣命賓客厯覽遊觀三清既設百味星爛炫熀乎玉案照曜於金盤故成都美其家園江陵重其千樹既見稱於陸言亦標名乎馬賦秋菊賦垂采煒於芙蓉流芳越乎蘭林遊女望榮而巧笑鵷雛遙集而弄音若乃真人採其實王母接其葩或克虛而養氣或增妖而揚娥既延期以永夀又蠲疾而弭痾表上關中詩表詔臣作關中詩輒奉詔竭愚作詩一篇案漢記孝明時護羌校尉竇林上降羌顚岸以為羌豪岸兄顛吾復降問事狀林對前後兩屈坐誣罔下獄死齊萬年編户𨽻屬為日久矣而死生異辭必有詭謬故引證喻以懲不恪書詐作愍懷太子書陛下宜自了不自了吾當入了之中宫又宜速自了不了吾當手了之并謝妃共要尅期而兩發勿疑猶豫致後患茹毛飲血於三辰之下皇天許當掃除患害立道文為王蔣為內主願成當三牲祠北君大赦天下要疏如律令議九品議天生蒸民而樹之君使司牧之勿失其性君不獨治於是乎建牧立監陳其輔佐故曰天工人其代之然則髙官厚祿非明崇賢所以興治卑位下役非為鄙愚所以供職雖或開榮辱之門有爭競之弊而百王莫之能易者此道不可以二故也方今天下隆平四海攸同薦賢達善各以類進夫觀民宣化為治之本雖實小邑猶須其人又中正之身優劣懸殊茍知人者智則不知者謬矣莫如達官各舉其屬方嶽九列朝所取信郡守雖輕有刺史存舉之當否實司其事考績纍名施黜陟焉進賢受賞不進賢甘戮沮勸既明則人自為謀庶公道大行而私謁息矣上客舍議謹按逆旅久矣其所由來行者賴以頓止居者薄收其直交易貿遷各得其所官無役賦因人成利惠加百姓而公無末費語曰許由辭帝堯之命而舍於逆旅春秋外傳曰晉陽處父過寧戚於逆旅魏武皇帝亦以為宜其詩曰逆旅整設以通啇賈然則自堯到今未有不得客舍之法唯啇鞅尤之此固非聖世所言也乃今四海㑹同九服納貢八方翼翼公私滿路近畿輻輳客舍亦稠冬有溫廬夏有凉䕃芻秣成行器用取給疲牛必投乘凉近進發楅寫鞍皆有所聒又諸劫盜皆起於逈絶而止乎人衆十里蕭條則奸軌生心連陌接館則寇情震懾且聞聲有救已發有追不救有罪不追有戮禁暴捕亡恆有司存凡此皆客舍之益而官㰚之所乏也又行者貪路告糴炊㸑皆以昏晨盛夏晝熱又兼星夜既限早閉不及攡門或避晚關迸逐路隅祗是慢藏誨盜之原茍以客舍多敗法教官守棘㰚獨復何人彼河橋孟津解劵輸錢髙第督察數入校出品郎兩岸相檢猶懼或失之故懸以祿利許以功報今賤吏疲人獨專㰚稅管開閉之權藉不校之勢此道路之蠧奸利所殖也率厯代之舊俗獲行留之歡心使客舍灑掃以待征旅擇家而息豈非衆庶顒顒之望頌許由頌邈哉許公執真履貞辭堯天下抱朴隱形川停嶽峙淡泊無營棲遲髙山與世靡爭虛薄忝任來宰斯城愧無惠化豹産之政峩峩治所樂慕景名登箕逍遙來過墓庭逼於時憲傾筐不盈恨無㫖酒奠公之靈死而不朽公其有榮聊述雅美揚公馨聲贊故太常任府君畫贊堂堂我君鑒象開慶逸德宣猷含真履素味道無悶守終純固弓輿爰集撫翼清舉翰飛公庭龍升天路初長方國流化千里遂管祕籍辨章舊史入登常伯出作卿士外內惟允庶績咸理中節日新令聞不已濟濟儒林翼翼國子針答摰虞新婚針先王制禮隨時為正俯從企及豈乖物性女無二歸男有再聘女實存色男實存德德在居正色在不惑新舊兼𢎞義申理得然性情之際誠難處心君子過慮爰獻明針防微測顯文麗㫖深敬納嘉誨敢酬德音訓兩階銅人訓言之有臧託乎多士言之不臧絶之由已無曰莫傳宣于四海無曰莫聞響振萬里樞機之發榮辱之徴怨豈在大纖介是興碑司空鄭衮碑陳謨台階翼和鼎實顯績成於臺省清風暢於所蒞故能老安少懷逺至邇親凡厥縉紳之士所以挹酌洪流含咀英芳者猶旱苗之仰膏雨湛露之晞朝陽也銘曰於鑠元侯則天垂象𢎞操嶽峻宇量深廣允恭克讓宣哲清朗有始有卒可大可久言由忠信行履孝友光光金貂再冠其首赫赫皇符仍折其部義格皇穹德冠羣后清風顯烈沒而不朽荆州刺史東武戴侯楊使君碑肇字季初榮陽人封東武伯薨諡曰戴君誕保靈和繼期載德宣哲清朗直道髙尚若乃嘉號推賢博愛濟衆邦黨服其義而縉紳慕其風于時文后厯數在躬相國幕府實允華夏九德咸事俊乂在官成君名器納字參軍宏略被於南國美化行乎江漢西陵之役懸軍深入親薄冦壘躬行天誅既而救兵不進糧盡道窮因乃憮然回慮殿其衆而返雖為法受黜勳庸未崇而天下伏其勇世主思其忠哀文景獻皇后哀策文於穆先后儷皇協運世宗之𦙍德博化光用儉禮峻任姒隆周后亦母晉終溫且惠其儀淑慎既慎其儀克明禮教撫翼齊藩訓成𢎞操其慈有威不舒不暴乃家乃邦是則是效嗟余艱屯仍遭不造靡恃惟妣景命弗保心之云痛痛貫穹昊襲龜筮之良辰啓幽房之濳隧整武駕之隆牡結龍輈之縞駟望旗常而崩摧披輼輬以增欷口嗚咽以失聲目橫迸以灑淚邈兩絶於宫闈長無覿於倣佛哀永逝文啓夕兮宵興悲絶緒兮莫承俄龍轜兮門側嗟俟時兮將升嫂姪兮慞惶慈姑兮垂矜聞雞鳴兮戒朝咸驚號兮撫膺逝日長兮生年淺憂患衆兮歡樂鮮彼遙思兮離居歎河廣兮宋逺今奈何兮一舉邈終天兮不反盡余哀兮祖之晨揚明燎兮援靈輴撤房帷兮席庭筵舉酹觴兮造永遷悽切兮增欷俯仰兮揮淚想孤魂兮眷舊宇視倐忽兮若髣佛徒髣佛兮在慮靡耳目兮一遇停駕兮淹留徘徊兮故處周求兮何獲引身兮當去去華輦兮初邁馬回首兮旋斾風泠泠兮入帷雲霏霏兮承蓋鳥俯翼兮忘林魚仰沫兮失瀨悵悵兮遲遲遵吉路兮凶歸思其人兮已滅覽餘跡兮未夷昔同塗兮今異世憶舊歡兮增新悲謂原隰兮無畔謂川流兮無岸望山兮寥廓臨水兮浩汗視天日兮蒼茫面邑里兮蕭散匪外物兮或改固歡哀兮情換嗟濳隧兮既敞將送形兮長往委蘭房兮繁華襲窮泉兮朽壤中慕呌兮劈摽之子降兮宅兆撫靈櫬兮訣幽房棺冥冥兮埏窈窈户闔兮燈滅夜何時兮復曉歸反哭兮殯宫聲有止兮哀無終是乎非乎何遑趣一遇兮目中既遇目兮無兆曾寤寐兮弗夢既顧瞻兮家道長寄心兮爾躬重曰已矣此蓋新哀之情然耳渠懷之其幾何庶無愧兮莊子為楊長文作弟仲武哀祝文悠悠上天我獨何辜祖考早世昆弟幼孤備嘗艱毒同集蓼荼父兮生我過庭靡聞母兮鞠我寧一苦辛日顧日復我弟我身竝自垂髮越于成人濬哲聰朗純粹溫良烈烈清風邦族之望母氏劬勞庶爾之報彼蒼者天子何不弔殲我令弟窮泉是造無父何怙無弟何友焭焭此身哀哀慈母煩寃痛毒撫心思咎哀爾薄祐逢家多阻弱冠未室盛年絶緒喪庭寥廓廬位無主冥冥長夜窈窈𤣥宇當復何時見我仲武于以祔之于其王父魂而有靈神其寧處京陵公主女王氏哀辭猗歟公子季女惟王生自洪胄禀兹義方盼倩粲麗窈窕淑良如彼春蘭吐葩含芳葩以霜隕芳以歇盡彼蒼者天胡寧斯忍曾未弱笄無疾而隕官朝震驚靡人不愍嗟爾母氏劬勞撫鞠恩斯勤斯是長是育帷屏媚子奄離顧復哀無廢心涕不輟目于以祖之于掖庭閨于以送之陵岡崔嵬僕馬回眷旗旐旋飛夕陽失映晴鳥忘歸皎皎宵月載盈載微冥冥公子一往不追長夜無旦孤魂曷依陽城劉氏妹哀辭鳥鳴于柏鳥號于荆徘徊躑躅立聞其聲相彼羽族矧伊人情叩心長呌痛我同生誕育聖善發竒稚齒如彼名駒昻昻千里劉氏懷寶未曜隋和伊豫輕弱弗克負荷祿微于朝貯匱于家俾我令妹勤儉備加珍羞罕御器服靡華撫膺恨毒逝矣奈何哀哀母氏蒸蒸聖慈震動劈摽何痛如之魂而有靈豈不慕思嗟哉往矣當復何時金鹿哀辭嗟我金鹿天姿特挺鬒髮凝膚蛾眉蠐領柔情和泰朗心聰警嗚呼上天胡忍我門良嬪短世令子夭昏既披我幹又剪我根塊如瘣木枯荄獨存捐子中野遵我歸路將反如疑回首長顧傷弱子辭豫之長安次于新安千秋亭而弱子夭感嬴博之哀乃傷之曰奈何兮弱子邈棄爾兮丘林還眺兮墳瘞草莽莽兮木森森伊邃世之遐胄逮祖考之永延咨吾家之不嗣羌一適之未甄仰崇堂之遺搆若無津而涉川葉落永離覆水不收赤子何辜罪我之由悲邢生辭周文王之苗裔豫元舅之洪胄厲操確其不拔鄉譽著而且就妙邦畿而髙察雄州閭以擢秀茂實暢矣而休名未衍其財至貧其位至賤而死之日奔者盈庭停豫車而在郊撫靈櫬以增悲瞻轜容而想像曾無覿乎餘輝送子兮境垂永訣兮路岐一别兮長絶盡哀兮告離為任子咸妻作孤女澤蘭哀辭澤蘭者任子咸之女也涉三齡未沒衰而殞余聞而悲之遂為其母辭茫茫造化爰啓英淑猗猗澤蘭應靈誕育鬒髮蛾眉巧笑美目顔耀榮苕華茂時菊如金之精如蘭之馨淑質彌暢聰慧日新朝夕顧復夙夜盡勤彼蒼者天哀此矜人胡寧不惠忍豫眇身俾爾嬰孺微命弗振俯覽衾襚仰訴穹旻弱子在懷既生不遂存靡託躬沒無遺類耳存遺響目想餘顔寢席伏枕摧心割肝相彼鳥矣和鳴嚶嚶矧伊蘭子音影冥冥倣徨丘隴徒倚墳塋祭文弔孟嘗君文人罔貴賤士無真僞延入如歸望賔若企出握秦機入專齊政右盼而嬴强左顧而田競且以造化為水天地為舟樂則齊喜哀則同憂豈區區之國而大邦是謀瑣瑣之身而名利是求畏首畏尾東奔西囚志撓於木偶命懸於狐裘為諸婦祭庾新婦文濳形幽櫬寧神舊宇室虛風生牀塵帷舉自我不見載離寒暑雖則乖隔哀亦時叙啓殯今夕祖行明朝雨絶華庭埃滅大宵儷執箕帚偕奉夕朝髣佛未行顧瞻弗獲伏膺飲淚感今懷昔懷昔伊何祁祁娣姒感今伊何冥冥吾子形未廢目音猶在耳哭弟文視不見兮聽不聞逝日逺兮憂彌殷終皓首兮何時忘情楚惻兮常苦辛誄世祖武皇帝誄粵若稽古帝皇誕受休命作我晉室赫赫文皇配天竝日大行龍飛創制改物沉恩汪濊流澤洋溢上齊七政下綏萬邦四門穆穆五典克從惟清緝熙於變時雍愛盡事親教加百姓于喪過哀在祭餘敬后蠶冕服躬籍粢盛六代畢奏九功咸詠行敦醇朴思貫𤣥妙蒞政瑞位臨朝光曜胄子入學辟雍宗禮國老恂恂貴遊濟濟莫孝匪子莫悌匪弟化自外明訓法以禮獷彼吳楚稱亂三代世厯五僞年幾百載邊垂䖍劉王化阻閡羽檄星馳鉦鼓日戒帝御羣帥奉辭奪旅腹心庭爭爪牙疑沮天監獨照聖策乃舉朝服濟江止戈曜武野無交兵役不淹月僭號歸命稽顙晉闕邪界蠻流傍納百越表閭旌善德音爰發虞人獻針周書垂誥酒懼其彞獸戒其冒於我大行縱心所好動不踰矩性與道奧厭厭酣飲樂不辨顔桓桓振旅田無遊盤我德如風民應如蘭靡不夙夜無敢宴安務農望嵗時或不稔小心翼翼恤民以甚御坐不怡撤膳賑廪西流垂精南金抑施永言孝思天經地義問誰贊事英彥髦士問誰翼侍博物君子濳明神鑒從衆屈已道濟羣生為而不恃先天弗違後天降時萬物熙熙懷而慕思顒顒縉紳不謀同辭巖巖岱宗想望翠旗恭惟大行功成不居議寢封禪心棲冲虛策告不足太平有餘七十二君方之蔑如思樂天德等壽嵩華如何寢疾背世登遐遷幸梓宮孤我邦家龜筮既襲吉日惟良永指太極寧神峻陽群后僻踴長訣輼輬聖靈斯顧豈伊不傷家無逺邇邦靡小大四海供職同軌畢㑹茫茫原野亭亭素蓋縞輅解駕白虎弭斾龍輴即定𤣥闥載扄如天斯崩如地斯傾哀哀庶寮㷀㷀自愍彼蒼者天胡寧斯忍聖君不返我獨旋軫太宰魯武公誄昻昻公侯實天誕育八元斯九五臣兹六掩討逆節折衝江湖走欽擒儉梟誕弊吳公于出征爰整其旅壘未越郊麾不及舉秦凉獲乂西戎即叙他人之賢譬彼丘陵邈矣公侯如日之升泰山其頽寢疾不興遐邇曷仰社稷焉慿生則榮易終哀實難靡不春華鮮克嵗寒於呼公隕率土含酸趙喪望諸列國同傷秦亡蹇叔舂者不相桃李不言下自成行德之休明沒能彌彰楊荆州誄有序維咸寧元年夏四月乙丑晉故折衝將軍荆州刺史東武戴侯滎陽楊使君薨嗚呼哀哉夫天子建國諸侯立家選賢與能政是以和周賴尚父殷慿太阿矯矯楊侯晉之爪牙忠節克明茂績維嘉將宏王略肅清荒遐降年不永𤣥首未華銜恨沒世命也奈何嗚呼哀哉自古在昔有生必死身沒名垂先哲所韙行以號彰德以述美敢託旒旗爰作斯誄其辭曰邈矣逺祖系自有周昭穆繁昌枝庶分流族始伯喬氏出楊侯奕世丕顯允迪大猷天厭漢德龍戰未分伊君祖考方事之殷鳥則擇木臣亦簡君投心外朝策名委身奮躍淵塗跨騰風雲或統驍騎或據領軍篤生戴侯茂德繼期纂戎洪緒克構堂基弱冠味道無競惟時孝實蒸蒸友亦怡怡多才豐藝彊記洽聞目睇毫末心算無垠草𨽻兼善尺牘必珍足不輟行手不釋文翰動若飛紙落如雲學優則仕乃從王政散璞發輝臨軹作令化行邑里惠洽百姓越登司官肅我朝命惟此大理國之憲章君蒞其任視民如傷庶獄明慎刑辟端詳聽參臯吕稱侔于張改授農政于彼野王倉盈庾億國富兵彊煌煌文后鴻漸晉室君以兼資參戎作弼用錫土宇膺兹顯秩青社白茅赤朱其紱魏氏順天聖皇受終烈烈楊侯實統禁戎司管閶闔清我帝宫苛慝不作穆如和風謂督勳勞班命彌崇茫茫海岱𤣥化未周滔滔江漢疆場分流秉文兼武時惟楊侯既守東莞乃牧荆州折衝萬里對揚王休聞善若驚疾惡如讐示威示德以伐以柔吳夷凶侈僞師畏逼將乘讐釁席卷南極繼褰糧盡神謀不忒君子之過引曲推直如彼日月有時則食負執其咎功讓其力亦既旋斾為法受黜退守丘塋杜門不出游目典墳縱心儒術祁祁縉紳升堂入室靡事不咨無疑不質位貶道行身窮志逸弗慮弗圖乃寢乃疾昊天不弔景命其卒嗚呼哀哉子囊佐楚遺言城郢史魚諫衛以尸顯政伊君臨終不忘忠敬寢伏床蓐念在朝廷朝達其辭夕隕其命聖王嗟悼寵贈衾襚誄德策勳考終定諡羣辟動懷邦族揮淚孤嗣在疚寮屬含悴赴者同哀路人增欷嗚呼哀哉余以頑蔽覆露重隂仰追先考執友之心俯感知已識達之深承諱忉怛涕淚霑襟豈忘載奔憂病是沈在疾不省於亡不臨舉聲增慟哀有餘音嗚呼哀哉夏侯常侍誄夏侯湛字孝若譙國譙人也少知名弱冠辟太尉府掾賢良方正徵為太子舍人尚書郎野王令中書郎南陽相家艱乞還頃之選為太子僕未就命而世祖崩天子以為散騎常侍從班列也春秋四十有九元康元年夏五月壬辰寢疾卒於延熹里第嗚呼哀哉乃作誄曰禹錫𤣥圭實曰文命克明克聖光啓夏政其在于漢邁勳惟嬰思𢎞儒業小大雙名顯祖曜德牧兗及荆父守淮岱治亦有聲英英夫子灼灼其俊飛辨摛藻華繁玉振如彼隨和發彩流潤如彼錦繢列素㸃絢人見其表莫測其裏徒謂吾生文勝則史心照神交唯我與子且厯少長逮觀終始子之承親孝齊閔參子之友悌和如琴琴事君直道與朋信心雖實唱髙猶賞爾音弱冠厲翼羽儀初升公弓既招皇輿乃徵內贊兩宫外宰黎蒸忠節允著清風載興泱彼樂都寵子惟王設官建輔妙簡邦良用取㗋舌相爾南陽惠訓不倦視人如傷乃眷北顧辭祿延熹余亦偃息無事明時疇昔之游二紀于兹班白擕手何歎如之居吾語汝衆實勝寡人惡俊異俗疵文雅執㦸疲楊長沙投賈無謂爾髙恥居物下子乃洗然變色易容慨然歎曰道固不同為人由已匪我求䝉誰毁誰譽何去何從莫涅匪緇莫磨匪磷子獨正色居屈志申雖不爾以猶致其身獻替盡規媚兹一人讜言忠謀世祖是嘉將僕儲皇奉轡承華先朝末命聖烈顯加入侍帝闥出光厥家我聞積善神降之吉宜享遐紀長保天秩如何斯人而有斯疾曾未知命中年隕卒嗚呼哀哉惟爾之存匪爵而貴甘食美服重珍兼味臨終遺誓永錫爾類斂以時襲殯不簡器誰能拔俗生盡其養孰是養生而薄其葬淵哉若人縱心條暢傑操明達困而彌亮柩輅既祖容體長歸存亡永訣逝者不追望子舊車覽爾遺衣愊抑失聲迸涕交揮非子為慟吾慟為誰嗚呼哀哉日往月來暑退寒襲零露霑凝徑風凄急慘爾其傷念我良執適子素館撫孤相泣前思未弭後感仍集積悲滿懷逝矣安及嗚呼哀哉馬汧督誄惟元康七年秋九月十五日晉故督守關中侯扶風馬君卒嗚呼哀哉初雍部之內屬羌反未弭而編户之氐又肆逆焉雖王旅致討終於殄滅而蜂蠆有毒驟失小利俾百姓流亡頻於塗炭建威喪元於好畤州伯宵遁乎大溪若夫偏師裨將之隕首覆軍者蓋以十數剖符專城紆青拖墨之司奔走失其守者相望於境秦隴之僭鞏更為魁既已襲汧而館其縣子以眇爾之身介乎重圍之裏率寡弱之衆據十雉之城羣氐如蝟毛而起四面雨射城中城中鑿穴而處負户而汲木石將盡樵蘇乏竭芻蕘罄絶於是乎發梁棟而用之􅙏以鐵鎖機關既縱礧而又升焉㸑陳焦之麥柿梠桷之松用能薪芻不匱人畜取給青煙傍起櫪馬長鳴凶醜駭而疑懼乃闕地而攻子命穴浚塹置壺鐳瓶甒以偵之將穿城響作因焚穬火薰之濳氐殲焉久之安西之救至竟免虎口之厄全數百萬石之積文契書於幕府聖朝疇咨進以顯秩殊以幢蓋之制而州之有司乃以私𨽻數口榖數十斛考訊吏兵以檟楚之辭連之大將軍屢抗其疏曰敦固守孤城獨當羣寇以少禦衆載離寒暑臨危奮節保榖全城而雍州從事忌敦勳效極推小疵非所以褒奬元功宜解敦禁劾假授詔書遽許而子固以下獄發憤而卒也朝廷聞而傷之策書曰皇帝咨故督守關中侯馬敦忠勇果毅率屬有方固守孤城危逼獲濟寵秩未加不幸喪亡朕用悼焉今追贈牙門將軍印綬祠以少牢魂而有靈嘉兹寵榮然潔士之聞穢其庸致思乎若乃下吏之肆其噤害則皆妬之徒也嗟乎妬之欺善抑亦貿首之讐也語曰或戒其子慎無為善言固可以若是悲夫昔乘丘之戰縣賁父御魯莊公馬驚敗績賁父曰他日未嘗敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也乃誄之漢明帝時有司馬叔持者白日於都市手劒父讐視死如歸亦命史臣班固為之誄然則忠孝義烈之流慷慨非命而死者綴辭之士未之或遺也天子既已策而贈之微臣託乎舊史之末敢闕其文哉乃作誄曰知人未易人未易知嗟兹馬生位末名卑西戎猾夏乃奮其竒保此汧城救我邊危彼邊奚危城小粟富子以眇身而裁其守兵無加衛墉不增築婪婪羣狄豺虎競逐鞏更恣睢濳跱官寺齊萬虓闞震驚台司聲勢沸騰種落煽熾旌旗電舒戈矛林植彤珠星流飛矢雨集惴惴士女號天以泣㸑麥而炊負户以汲纍卵之危倒懸之急馬生爰發在險彌亮精貫白日猛烈秋霜稜威可厲懦夫克壯霑恩撫循寒士挾纊蠢蠢犬羊阻衆陵寡濳隧密攻九地之下愜愜窮城氣若無假昔命懸天今也惟馬惟此馬生才博智贍偵以瓶壺􅗇以長塹鍤未見鋒火以起熖薰尸滿窟掊穴以斂木石匱竭萁稈空虛瞷然馬生傲若有餘􅙏梁為􅓓柿松為芻守不乏械櫪有鳴駒哀哀建威身伏斧質悠悠烈將覆軍喪器戎釋我徒顯誅我帥以生易死疇克不二聖朝西顧關右震惶分我汧庾化為寇糧實賴夫子思謨彌長咸使有勇致命知方我雖未學聞之前典十世宥能表墓旌善思人愛樹甘棠勿翦矧乃君子功深疑淺兩造未具儲𨽻蓋鮮孰是勳庸而不獲免猾哉部司其心反側斫善害能醜正惡直牧人逶迤自公退食聞穢鷹揚曾不戢翼忘爾大勞猜爾小利茍莫開懷于何不至慨慨馬生硠硠髙致發憤囹圄沒而猶視嗚呼哀哉安平出竒破齊克完張孟運籌危趙獲安汧人賴子猶彼談單如何吝嫉搖之筆端傾倉可賞矧云私粟狄𨽻可頒况曰家僕剔子雙龜貫以三木功存汧城身死汧獄凡爾同圍心焉摧剝扶老㩦幼街號巷哭嗚呼哀哉明明天子旌以殊恩光光寵贈乃牙其門司勳班爵亦兆後昆死而有靈庶慰寃魂嗚呼哀哉楊仲武誄楊經字仲武滎陽宛陵人也中領軍肅侯之曽孫荆州刺史戴侯之孫東武康侯之子也八嵗喪父其母鄭氏光祿勳密陵成侯之元女操行甚髙恤養幼孤以保乂夫家而免諸艱難戴侯康侯多所論著又善草𨽻之藝子以妙年之秀固能綜覽義㫖而軌式模範矣雖舅氏隆盛而孤貧守約心安陋巷體服菲薄余甚竒之若乃清才雋茂盛德日新吾見其進未見其已也既藉三葉世親之恩而子之姑豫之伉儷焉往嵗卒於德宮里喪服周次綢繆纍月茍人必有心此亦欵誠之至也不幸短命春秋二十九元康九年夏五月已亥卒嗚呼哀哉乃作誄曰伊子之先奕葉熙隆惟祖惟曾載揚休風顯考康侯無祿早終名器雖光勳業未融篤生吾子誕茂淑姿克岐克㠜知章知微鈎深探賾味道研幾匪直也人邦家之輝子之遘閔曾未齓髫如彼危根當此衝飈德之休明靡幽不喬弱冠流芳俊聲清劭爾舅惟榮爾宗惟瘁幼秉殊操違豐安匱撰録先訓俾無隕墜舊文新藝罔不必肄潘揚之穆有自來矣矧乃今日慎終如始爾休爾戚如實在已視豫猶父不得猶子敬亦既篤愛亦既深雖殊其年實同厥心日昃景西望子朝隂如何短折背世湮沈嗚呼哀哉寢疾彌留守兹孝友臨命忘身顧戀慈母哀哀慈母痛心疾首噭噭同生悽悽諸舅春蘭擢莖方茂其華荆寶挺璞將剖於和含芳委曜毁璧摧柯嗚呼仲武痛哉奈何德宫之艱同次外寢惟我與爾對筵接枕自時迄今曾未盈稔姑姪繼隕何痛斯甚嗚呼哀哉披帙散書屢覩遺文有造有寫或草或真執玩周復想見其人紙勞于手涕霑于巾龜筮既襲埏隧既開痛矣揚子與世長乖朝濟洛川夕次山隈歸鳥頡頏行雲徘徊臨穴永訣撫櫬盡哀遺形莫紹增慟余懷魂兮往矣梁木實摧嗚呼哀哉宜城宣君誄行成于已名生于人考終定諡實曰宣君祝宗蒞事卿相奉引輕車整駕介士列陳鸞輅依容輼車升櫬庾尚書誄寬而能懷威而不猛化行如形民應如影曀曀虛坐翩翩𤣥幕几席生塵空館寥廓南陽長公主誄昔唐女嬪媯書叙釐降之美周姬適齊詩詠肅雍之歌漢之新野以節義垂號千載伊晉之獻主以聰明睿智考終定諡兹可謂母儀純備邁蹤古烈者已惜乎不永背世湮沈爰託素旗式章徽音主之誕育既纂洪胄德之休明亦固天授思心婉孌淑質純茂母儀不忒內則靡疚肇自弱笄有馥其芬言告言歸作合於荀在貴思降處逸能勤上䖍諸姑傍接支嬪內諧閨閾外和族姻終溫且惠淑慎其身積善餘慶啓兹名𦙍勵以惠肅誨以柔順主實體化不言而信二子遵式匪嚴而峻於穆獻后奕代熙盛重作大司黎牧火正國之仁姑家之慈母天道輔賢宜享遐壽如何短命曽不華首寢疾弗興繁榮摧朽嗚呼哀哉容車戒路祖奠在庭騑驂躊躇服馬悲鳴皇輿親臨望旗失聲列辟咸起灑淚霑纓嗚呼哀哉既次墓門降柩升輴靈衣從風素幕生塵明燎守夜竦紼俟晨噭噭遺嗣焭焭孤臣號無廢音涕不輟巾皇女誄厥初在鞠玉盾華繁𤣥髮修曜蛾眉連娟清顱橫流明眸朗鮮迎時夙智望嵗能言亦既免懷提携紫庭聰惠機警授色應聲亹亹其進好曰之經辭令容止間於幼齡猗猗春蘭柔條含芳落英雕矣從風飄揚妙好弱媛窈窕淑良孰是人斯而離斯殃靈殯既祖次此暴廬披覽遺物徘徊舊居手澤未改領膩如初孤魂遐逝存亡永殊嗚呼哀哉賈充誄年踰知命位極人臣家無餘祿貴而食貧詩關中詩十六章元康六年氐賊齊萬年於關中反亂既平帝命諸臣作關中詩於皇時晉受命既固三祖在天聖皇紹祚德博化光刑簡枉錯微火不戒延我寶庫蠢爾戎狄狡焉思肆虞我國眚窺我利器嶽牧慮殊威懷理二將無專策兵不素肄翹翹趙王請徒三萬朝議惟疑未逞斯願桓桓梁征髙牙乃建旗蓋相望偏師作援虎視耽耽威彼好畤素甲日曜𤣥幕雲起誰其繼之夏侯卿士惟系惟處别營棊跱夫豈無謀戎士承平守有完郛戰無全兵鋒交卒奔孰免孟明飛檄秦郊告敗上京周殉師令身膏氐斧人之云亡貞節克舉盧播違命投畀朔土為法受惡誰謂荼苦哀此黎元無罪無辜肝腦塗地白骨交衢夫行妻寡父出子孤俾我晉民化為狄俘亂離斯瘼日月其稔天子是矜旰食宴寢主憂臣勞孰不祗凛愧無獻納尸素以甚皇赫斯怒爰整精鋭命彼上谷指日遄逝親奉成規稜威遐厲首陷中亭揚聲萬計兵固詭道先聲後實聞之有司以萬為一紂之不善我未之必虛皛湳德繆彰甲吉雍門不啓陳汧危逼觀遂虎奮感恩輸力重圍克解危城載色豈曰無過功亦不測情固萬端于何不有紛紜齊萬亦孔之醜曰納其降曰梟其首疇真可掩孰僞可久既徵爾辭既蔽爾訟當乃明實否則證空好爵既縻顯戮亦從不見竇林伏尸漢邦周人之詩實曰采薇北難獫狁西患昆夷以古况今何足曜威徒愍斯民我心傷悲斯民如何荼毒于秦師旅既加饑饉是因疫癘淫行荆棘成榛絳陽之粟浮于渭濵明明天子視民如傷申命羣司保爾封疆靡暴于衆無陵于疆惴惴寡弱如熙春陽為賈謐作贈陸機十一章肇自初創二儀絪緼粵有生民伏羲始君結繩闡化八象成文芒芒九有區域以分神農更王軒轅承紀畫野離疆爰封衆子夏􅎋既襲宗周繼祀綿綿瓜瓞六國互峙彊秦兼并吞滅四隅子嬰面櫬漢祖膺圖靈獻微弱在涅則渝三雄鼎足孫啓南吳南吳伊何僣號稱王大晉統天仁風遐揚僞孫銜璧奉土歸疆婉婉長離凌江而翔長離云誰咨爾陸生鶴鳴九臯猶載厥聲况乃海隅播名上京爰應旌招撫翼宰庭儲皇之選實簡惟良英英朱鸞來自南岡曜藻崇正𤣥冕丹裳如彼蘭蕙載採其芳藩嶽作鎮輔我京室旋反桑梓帝弟作弼或云國宦清塗攸失吾子洗然恬淡自逸廊廟惟清俊乂是延擢應嘉舉自國而遷齊轡羣龍光讚納言優游省闥珥筆華軒昔余與子繾綣東朝雖禮以賔情通友僚嬉娛絲竹撫鞞舞韶修日朗月擕手逍遙自我離羣二周于今雖簡其面分著情深子其超矣實慰我心發言為詩俟望好音欲崇其髙必重其層立德之柄莫匪安恆在南稱甘度北則橙崇子鋒頴不頽不崩北芒送别王世胄朱既揚四轡既整駕言餞行告離芒嶺情有遷延日無餘影回轅南翔心焉北騁家風詩綰髮綰髮髮亦鬒止日祗日祗敬亦慎止靡專靡有受之父母鳴鶴匪和析薪弗荷隱憂孔疚我堂靡構義方既訓家道頴頴豈敢荒寧一日三省於賈謐坐講漢書治道在儒𢎞儒由人顯允魯侯文質彬彬筆下摛藻席上敷珍前疑惟辨舊史惟新惟新爾史既辨爾疑延我寮友講此微辭離合佃漁始化人民穴處意守醇撲音應律呂桑梓被原卉木在野鍚鸞未設金石弗舉害咎蠲消吉德流普溪谷可安奚作棟宇嫣然以喜焉懼外侮熙神委命已求多祜嘆彼季未口出擇語誰能默識言喪厥所壟畝之諺龍濳巖阻鮮義崇亂少長失叙金谷集作詩王生和鼎實石子鎮海沂親友各言邁中心悵有違何以叙離思擕手游郊畿朝發晉京陽夕次金谷湄回溪縈曲阻峻阪路威夷緑池泛淡淡青栁何依依濫泉龍鱗瀾一作澗激波連珠揮前庭樹沙棠後園植烏椑靈囿繁石善作若榴茂林列芳梨飲至臨華沼遷坐登隆坻𤣥醴染朱顔但訴杯行遲楊桴撫靈鼓簫管清且悲春榮誰不慕五臣作耀嵗寒良獨希投分寄石友白首同所歸河陽縣作二首微身輕蟬翼弱冠忝嘉招在疚妨賢路再升上宰朝猥荷公叔舉連陪厠王寮長嘯歸東山擁耒耨時苗幽谷茂纎葛峻巖敷榮條落英隕林趾飛莖秀陵喬卑髙亦何常升降在一朝徒恨良時泰小人道遂消譬如野田蓬斡流隨風飄昔倦都邑游今掌河朔徭登城眷南顧凱風揚微綃洪流何浩蕩修芒鬱岧嶤誰謂晉京逺室邇身實遼誰謂邑宰輕令名患不劭人生天地間百年孰能要歘如敲石火瞥若截道飈齊都無遺聲桐鄉有餘謡福謙在純約害盈由矜驕雖無君人德視民庶不恌日夕隂雲起登城望洪河川氣冒山嶺驚湍激巖阿歸鴈映蘭畤五臣作洔游魚動圓波鳴蟬厲寒音時菊耀秋華引領望京室南路在伐柯大厦五臣作夏緬無覿崇芒鬱嵯峨總總都邑人擾擾俗化訛依水類浮萍寄松似懸蘿朱博糾舒慢楚風被琅邪曲蓬何以直託身以叢麻黔黎竟何常政成在民和位同單父邑愧無子賤歌豈敢陋微官但恐沗所荷在懷縣作二首南陸迎修景朱明送末垂初伏啓新節隆暑方赫曦朝想慶雲興夕遲白日移揮汗辭中宇登城臨清池凉飈自逺集輕襟隨風吹靈囿耀華果通衢列髙椅瓜瓞蔓長苞薑芋紛廣畦稻栽肅芊芊黍苗何離離虛薄乏時用位微名日卑驅役宰兩邑政績竟無施自我違京輦四載迄于斯器非廊廟姿屢出固其宜徒懷越鳥志眷戀想南枝春秋代遷逝四運紛可喜寵辱易不驚戀本難為思我來冰未泮時暑忽隆熾感此還期淹歎彼年往駛登城望郊甸游目厯朝寺小國寡民務終日寂無事白水過庭激緑槐夾門植信美非吾土祗攪懷歸志眷然顧鞏洛山川邈離異願言旋舊鄉畏此簡書忌祗奉社稷守恪居處職司內顧詩二首靜居懷所歡登城望四澤春草鬱青青桑柘何奕奕芳林振朱榮渌水激素石初征氷未泮忽焉袗絺綌漫漫三千里迢迢逺行客馳情戀朱顔寸隂過盈尺夜愁極清晨朝悲終日夕山川信悠永願言良弗獲引領訊歸期沈思不可釋獨悲安所慕人生若朝露綿邈寄絶域眷戀想平素爾情既來追我心亦還顧形體隔不達精爽交中路不見山下松隆冬不易故不見澗邊柏嵗寒守一度無謂希見疏在逺分彌固悼亡詩三首荏苒冬春謝寒暑忽流易之子歸窮泉重壤永幽隔私懷誰克從淹留亦何益僶俯恭朝命回心反初役望廬思其人入室想所厯幃屏無髣佛翰墨有餘跡流芳未及歇遺挂猶在壁悵恍如或存周遑忡驚惕如彼翰林鳥雙栖一朝隻如彼游川魚比目中路析春風緣隟來晨霤承簷滴寢息何時忘沉憂日盈積庶幾有時衰莊缶猶可擊皎皎窗中月照我室南端清商應秋至溽暑隨節䦨凛凛凉風升始覺夏衾單豈曰無重纊誰與同嵗寒嵗寒無與同朗月何朧朧展轉盻枕席長簟竟牀空牀空委清塵室虛來悲風獨無李氏靈髣佛覩爾容撫襟長歎息不覺涕霑胸霑胸安能已悲懷從中起寢興目存形遺音猶在耳上慚東門吳下愧䝉莊子賦詩欲言志此志難具紀命也可奈何長戚自令鄙曜靈運天機四節代遷逝凄凄朝露凝烈烈夕風厲奈何悼淑儷儀容永潜翳念此如昨日誰知已卒嵗改服從朝政哀心寄私制茵幬張故房朔望臨爾祭爾祭詎幾時朔望忽復盡衾裳一毁撤千載不復引亹亹朞月周戚戚彌相愍悲懷感物來泣涕應情隕駕言陟東阜望墳思紆軫徘徊墟墓間欲去復不忍徘徊不忍去徙倚步踟蹰落葉委埏側枯荄帶墳隅孤魂獨㷀㷀安知靈與無投心遵朝命揮涕强就車誰謂帝宮逺路極悲有餘哀詩漼如葉落樹邈若雨絶天雨絶有歸雲葉落何時連山氣冒岡嶺長風鼓松柏堂虛聞鳥聲室暗如日夕晝愁奄逮昏夜思忽終昔展轉獨悲窮泣下沾枕席人居天地間飄若逺行客先後詎能幾誰能弊金石思子詩造化甄品物天地代虛盈奈何念稚子懷竒隕幼齡追想存髣佛感道傷中情一往何時還千載不復生别詩王堪為成都王軍司馬嶽送至北邙别作詩微微髮膚受之父母峩峩王矦中外之首子親伊姑我父唯舅閣柱謠閣東有大牛王濟鞅裴楷鞦和嶠刺促不得休世說作和嶠鞅裴楷鞦王濟剔嬲不得休云漢魏六朝百三家集卷四十五
