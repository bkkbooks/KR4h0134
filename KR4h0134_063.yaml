body:
  text: 漢魏六朝百三家集卷六十三何承天集題詞謝晦起兵拒宋文東海何承天為畫計謀造表檄晦敗自歸徼恩全宥復賦性剛褊侮慢同列天子咨訪疑義輒戒使者善候顔色恐逢彼怒斯人竟得老夀亦幸耳禮論三百卷久亡不傳今所存者僅有安邊論宋書稱為博而且篤晉世郭欽江統疏論徙戎顯名方䇿此亦其支流也厯數最精大略微見于表奏猶恨未全雜議出刑入禮原諸忠恕為漢廷平或所優乎逹性論申權教析報應與顔光祿宗居士反覆送難皆儒者中正之言王道蕩蕩姬釋無殊何必别門建旌劉項博戰也鼓吹鐃歌十五篇造于晉義熙時家居私撰上升樂志遂能前抗韋昭木瓜賦心淡泊則郭璞蚍蜉類耳仰思周天旁辨威斗當口閎覽博物卒未或先東海云目録賦木瓜賦表上厯新法表議厯議陳滿罪議尹嘉罪議薄代公等補兵議孔邈名議丁况等久喪不葬議奏請改漏刻奏議公主服母奏論安邊論有表逹性論論王蕃渾天體又論祠武帝於建始殿論立諸葛亮廟論旄頭論郊祀不設樂又問報應問書答顔永嘉書重答顔永嘉書與宗居士論釋慧琳白黑論書又答宗居士書重答宗居士書答江氏問頌上白鳩頌有表社頌釋奠頌贊天贊地贊詩鼓吹鐃歌十五首朱路篇思悲公篇雍離篇戰城南篇巫山高篇上陵者篇將進酒篇君馬篇芳樹篇有所思篇雉子遊原澤篇上邪篇臨高臺篇逺期篇石流篇漢魏六朝百三家集卷六十三目録欽定四庫全書漢魏六朝百三家集卷六十三明張溥輯何承天集賦木瓜賦美中州之嘉樹表閒冶之麗姿結靈根以誕秀傾朝日以揚輝擢叢柯之冉冉布翠葉而蕤葳惟兹木之在林亦超類而獨劭方朝華而繁實比沙棠而有耀當大厦之方隆愧惟幹之纎撓豈隱朴以幸全固呈才而不效離用衆而獲寧永端已以勵操願佳人之豫投思同歸以託好顧衛風之攸珍雖瓊琚而匪報表上厯新法表臣授性頑惰少所關解自昔幼年頗好厯數耽情注意迄於白首臣亡舅故祕書監徐廣素善其事有既往七曜厯每記其得失自太和至泰元之末四十許年臣因比嵗考挍至今又四十載故其疏密差㑹皆可知也夫圓極常動七曜運行離合去來雖有定勢以新故相涉自然有毫末之差連日纍嵗積微成著是以虞書著欽若之典周易明治厯之訓言當順天以求合非為合以驗天也漢代雜候清臺以昏明中星課日所在雖不可見月盈則蝕必當其衝以月推日則躔次可知焉捨易而不為役心於難事此臣所不解也堯典云日永星火以正仲夏今季夏則火中又宵中星虛以殷仲秋今季秋則虛中爾來二千七百餘年以中星撿之所差二十七八度則堯冬令至日在須女十度左右也漢之太初厯冬至在牽牛初後漢四分及魏景初法同在斗二十一臣以月蝕撿之則景初今之冬至應在斗十七又史官受詔以土圭測景考挍二至差三日有餘從來積嵗及交州所上撿其增減亦相符驗然則今之二至非天之二至也天之南日在斗十三四矣此則十九年七閏數微多差復改法易章則用算滋繁宜當隨時遷革以取其合案後漢志春分日長秋分日短差過半刻尋二分在二至之間而有長短因識春分近夏至故長秋分近冬至故短也楊偉不悟即用之上厯表云自古及今凡諸厯數皆未能竝已之妙何此不曉亦何以云是故臣更建元嘉厯以六百八為一紀半之為度法七十五為室分以建寅之月為嵗首雨水為氣初以諸法閏餘一之嵗為章首冬至從上三日五時日之所在移舊四度又月有遲疾合朔月蝕不在朔望亦非厯意也故元嘉皆以盈縮定其小餘以正朔望之日伏惟陛下允迪聖哲先天不違劬勞庶政寅亮鴻業究淵思於往籍探妙㫖於未聞窮神知化罔不該覽是以愚臣欣遇盛明效其管穴伏願以臣所上元嘉法下史官考其疏密若謬有可採庶或補正以備萬分議厯議夫厯數之術若心所不達雖復通人前識無救其為敝也是以多厯年嵗未能有定四分於天出三百年而益一日積代不悟徒云建厯之本必先立元假言䜟緯遂關治亂此之為蔽亦巳甚矣劉歆三統法尤復疏闊方於四分六千餘年又益一日揚雄心惑其說采為太𤣥班固謂之最密著於漢志司彪因曰自太初元年始用三統厯施行百有餘年曾不憶劉歆之生不逮太初二三君子言厯幾乎不知而妄言歟陳滿罪議獄貴情斷疑則從輕昔驚漢文帝乘輿馬者張釋之劾以犯蹕罪止罰金何者明其無心於驚馬也故不以乘輿之重加以異制今滿意在射鳥非有心於中人按律過誤傷人三嵗刑况不傷乎微罰可也尹嘉罪議被府宣令普議尹嘉大辟事稱法吏葛滕籖母告子不孝欲殺者許之法云謂違犯教令敬恭有虧父母欲殺皆許之其所告惟取信於所求而許之謹尋事原心嘉母辭自求質錢為子還責嘉雖虧犯教義而熊無請殺之辭熊求所以生之而今殺之非隨所求之謂始以不孝為劾終於和賣結刑倚㫄兩端母子俱罪滕籖法文為非其條嘉所存者大理在難申但明教爰發矜其愚蔽夫明德慎罰文王所以恤下議獄緩死中孚所以垂化言情則母為子隱語敬則禮所不及今捨乞宥之評依請殺之條責敬恭之節於饑寒之𨽻誠非罰疑從輕寧失有罪之謂也愚以謂降嘉之死以普春澤之恩赦熊之愆以明子隱之宜則蒲亭雖陋可比德於盛明豚魚微物不獨遺於今化薄代公等補兵議尋劫制同籍期親補兵大功不在例婦人三從既嫁從夫夫死從子今道舉為劫若其叔尚存制應補謫妻子營居固其宜也但為劫之時叔父已沒代公道生竝是從弟大功之親不合補謫今若以叔母為期親令代公隨母補兵既違大功不謫之制又失婦人三從之道繇於主者守期親之文不辨男女之異逺嫌畏負以生疑懼非聖朝恤刑之㫖謂代公等母子竝宜見原孔邈名議既沒之名不合奏者非有它義正嫌於近不祥爾奏事一郤動經嵗時盛明之世事從簡易曲嫌細忌皆應蕩除丁况等久喪不葬議禮所云還葬當謂荒儉一時故許其稱財而不求僃丁况三家數年中葬輒無棺櫬實繇淺情薄恩同於禽獸者爾竊以為丁寶等同伍積年未嘗勸之以義繩之以法十六年冬既無新科又未申明舊制有何嚴切歘然相紏或繇鄰曲分爭以興此言如聞在東諸處比例既多江西淮北尤為不少若但謫此三人殆無整肅開其一端則互相恐動里伍縣司競為姦利財賂既逞獄訟必繁懼虧聖明烹鮮之美臣愚謂况等三家且可勿問因此附定制㫖若民人葬不如法同伍當即糾言三年除服之後不得追相告列於事為宜奏請改漏刻奏上尚書今既改用元嘉厯刻漏與先不同宜應改革按景初厯春分日長秋分日短相承所用漏刻冬至後晝漏率長於冬至前且長短增減進退無漸非唯先法不精亦各傳寫謬誤今二至二分各據其正則至之前後無復差異更增損舊刻參以晷影刪定為經改用二十五箭請臺勒漏郎將考驗施用議公主服母奏元嘉二十三年白衣領御史中丞何承天奏詔叔敬白衣領職餘如奏尚書刺海鹽公主所生母蔣美人喪海鹽公主先離婚今應成服撰儀注參詳宜下二學禮官博士議公主所服輕重太學博士顧雅議今既咸用士禮便宜同齊衰削杖布帶疏履期禮畢心喪三年博士周野王議又云今諸王公主咸用士禮譙王衡陽王為所生太妃皆居重服則公主情禮亦宜家中期服為允其博士庾邃之顔測殷明王淵之四人同雅議何惔王羅雲二人同野王議如所上臺案今之諸王雖行士禮是施於傍親及自已以下至於為帝王所厭猶一依古典又永初三年九月符修議亡廣德三主以餘尊所厭猶服大功海鹽公主體自宸極當上厭至尊豈得遂服臺據經傳正文并引事例依源責失而博士顧雅周野王等捍不肯帖方稱自有宋以來皇子蕃王皆無厭降同之士禮著於故事緦功之服不廢於末戚顧獨貶於所生是申其所輕奪其所重奪其所重豈緣情之謂臺伏尋聖朝受終於晉凡所施行莫不上􅮘禮文兼用晉事又太元中晉恭帝時為皇子服其所生陳氏練冠縓緣此則前代施行故事謹依禮文者也又廣德三公主為所生母符修儀服大功此先君餘尊之所廢者也元嘉十三年第七皇子不服曹媫妤止於麻衣此厭乎至尊者也博士既不據古又不依今背違施行見事而多作浮辭自衛乃云五帝之時三王之季又言長子去斬衰除禫杖皆是古禮不少今世博士雖復引此諸條無救於失又詰臺云蕃國得遂其私情此義出何經記臣案南譙衡陽太妃竝受朝命為國小君是以二王得遂其服豈可為美人比例尋蕃王得遂者聖朝之所許也皇子公主不得申者繇有厭而然也臺登重更責失制不得過十日而復不酬答既被催攝二三日甫輸怗辭雖理屈事窮猶聞義恥服臣聞喪紀有制禮之大經降殺攸宜家國舊典古之諸侯衆子猶以尊厭况在王室而欲同之士庶此之僻謬不俟言而顯太常統寺曾不研却所謂同乎失者亦未得之宜加裁正𢎞明國典謹案太學博士顧雅國子助教周野王博士王羅雲顔測殷明何惔王淵之前博士遷員外散騎侍郎庾邃之等咸䝉抽飾備位前疑既不謹守舊文又不審據前准遂上背經典下違故事率意妄作自造禮章太常臣叔敬位居宗伯問禮所司騰述往反了無研却混同兹失亦宜及咎請以見事竝免今所居官解野王領國子助教雅野王初立議乖舛中執捍愆失未違十日之限雖起一事合成三愆羅雲掌押捍失三人加禁固五年論上安邊論冇表伏見北藩上事虜犯青兖天慈降鑑矜此黎元博逮羣策經綸戎政臣以愚陋預聞訪及竊尋獫狁告難爰自上古有周之盛南仲出車漢氏方隆衛霍宣力雖飲馬瀚海揚旍祁連事難役繁天下騷動委興負海資及舟車凶狡倔强未肯受弱得失報復裁不相補宣帝末年值其乖亂推亡固存始獲稽服自晉喪中原戎狄侵擾百餘年間未暇以北虜為念大宋啓祚兩耀靈武而懷德畏威用自欵納陛下臨御以來羈縻遵養十餘年中貢譯不絶去歲三王出鎮思振逺圖獸心易駭遂生猜懼背違信約深搆攜隙貪禍恣毒無因自反恐烽熢之警必自此始臣素庸懦才不經武率其管窺謹撰安邊論意極淺末懼無可採若得詢之朝列辨核同異庶或開引羣慮研盡衆謀短長畢陳當否可見漢世言備胸奴之䇿不過二科武夫盡征伐之謀儒生講和親之約課其所言互有逺志加塞漠之外胡敵掣肘必未能摧鋒引日規自開張當繇往年冀土之民附化者衆二州臨境三王出藩經略既張宏圖將舉士女延望華夷慕義故昧於小利且自矜侈外示餘力內堅僞衆今若務存遵養許其自新雖未可羈致北闕猶足鎮靜邊境然和親事重當盡廟笇誠非愚短所能究言若追蹤衛霍瀚海之志時事不等致功亦殊寇雖習戰未久又全據燕趙跨帶秦魏山河之險終古如一自非大田淮泗內實青徐使民有贏儲野有積榖然後分命方召總率虎旅精卒十萬使一舉蕩夷則不足稍勤王師以勞天下何以言之今遺黎習亂志在偷安非皆恥為左袵逺慕冠冕徒以殘害剝辱視息無寄故繦負歸國先後相尋虜既不能挍勝循理攻城略地而輕兵掩襲急在驅殘是其所以速怨召禍滅亡之日今若遣兵追討報其侵暴大翦幽冀屠城破邑則聖朝愛育黎元方濟之以道若但欲撫其歸附伐罪弔民則駿馬奔走不肯來征徒興巨費無損於彼復竒兵深入殺敵破軍茍陵患未盡則困獸思鬭報復之役將遂無巳斯秦漢之末䇿輪臺之所悔也安邊固守於計為長臣以安邊之計備在史䇿李牧言其端嚴尤申其要大略舉矣曹孫之霸才均智敵江淮之間不居各數百里魏捨合肥退保新城江陵移民南涘濡須之戍家停羡溪及夷陵之屯民夷散雜晉宣王以為宜從江南以北岸曹爽不許果亡祖中此皆前代之殷鑒也何者斥堠之郊非畜牧之地非耕桑之邑故堅壁清野以俟其來整甲繕兵以乘其敝雖時有古今勢有强弱保民全境不出此塗要而歸之有四一曰移逺就近二曰浚復城隍三曰纂偶車牛四曰計丁課仗良守疆其田土驍帥振其風略搜獵宣其號令俎豆訓其亷恥縣爵以縻之設禁以威之徭稅有程寬猛相濟比及十載民知義方然後簡將授竒揚旌雲朔風卷河冀電掃嵩恆燕弧折郤代馬摧足秦首斬其右臂吳蹄絶其左肩銘功於燕然之阿饗徒於金微之曲寇雖亂亡有徵昧弱易取若天時人事或未盡符抑鋭俟機宜審其算若邊戍未增星居布野勤惰異教貧富殊資疆埸之民多懷彼此虜在去就不根本業難可驅率易在振蕩又狡虜之性食肉衣皮以馳騁為儀容以游獵為南畝非有車輿之安宫室之衛櫛風沐雨不以為勞露宿草寢維其常性勝則競利敗不羞走彼來或驟而此已奔疲且今春踰濟既獲其利乘勝忸􅏸未虞天誅比及秋末容更送死猋騎蟻聚輕兵鳥集竝踐禾稼焚爇閭井雖邊將多略未審何以禦之若盛師連屯廢農必衆馳車奔驛起役必遲散金行賞損費必大換土客戍怨曠必繁孰若因民所居竝修農戰無動衆之勞有扞衛之實其為利害優劣相縣也一曰移逺就近以實內地今青兖舊民冀州新附在界首者二萬家此寇之資也今悉河內徙青州民移東萊平昌北海諸郡太山以南南至下邳左沭右沂田良野沃西阻蘭陵北厄大峴四塞之內其號險固民性重遷暗於圖始無虜之時喜生咨怨今新被鈔掠餘懼未息若曉示安危居以樂土宜其歌忭就路視遷如歸二曰浚復城隍以增阻防舊秋冬收斂民人入保所以警備暴客使防衛有素也古之城池處處皆有今雖頽毁猶可修治粗計戶數量其所容新徙之家悉著城內假其經用為之閭伍納稼築場還在一處婦子守家長吏為師丁夫匹婦春夏佃牧寇至之時一城千室堪戰之士不下二千其餘羸弱猶能登陴鼓噪十則圍之兵家舊說戰士二干足抗羣虜三萬矣三曰纂偶車牛以飾戎械計千家之資不下五百耦牛為車五百兩參合鉤連以衛其衆設使城不可固平行趨險賊所不能干既巳族居易可撿括號令先明民知夙戒有急徵發信宿可聚四曰計丁課仗勿使有闕千家之邑戰士二千隨其便能各自有仗素所服習銘刻繇已還保輸之於庫出行請以自衛弓幹利鐡民不辦得者官以漸充之數年之內軍用粗備矣臣聞軍國異容施於封畿之內兵農竝修在於疆埸之表攻守之宜皆因其習任其勇怯山陵川陸之形寒暑溫涼之氣各繇本性易則害生是故戍申作師逺屯清濟功費既重嗟怨亦深以臣料之未若即用彼衆之易也管子治齊寄令在民商君為秦設以耕戰終申威定霸行其志業非茍任强實繇有數梁用走卒其邦自滅齊用技擊厥衆亦離漢魏以來兹制漸絶搜田非復先王之禮治兵徒逞耳目之欲有急之日民不知戰至乃廣延賞募奉以厚秩發遽奔救天下騷然方伯刺史拱手坐聽自無經略唯望朝廷遣軍此皆忘戰之害不教之失也今移民實內浚治城隍族居聚處課其騎射長吏簡試差品能不甲科上第漸就優别明其勳才表言州郡如此則屯部有常不遷其業內護老弱外通官塗朋曹素定同憂等樂情由習親藝因事著晝戰見貌足相識夜戰聞聲足相救斯教戰之一隅先哲之遺術論者必以古城荒毁難可修復今不謂頓便加功整麗如舊但欲先定民營其閭術墉壑存者因而即之其有毁缺權時栅斷足以禦彼輕兵防遏游騎假以方將漸就只立車牛之賦課仗之宜攻守所資軍國之要今因民所利導而率之耕農之器為府庫之寶田蠶之氓兼城之用千家總倍旅之兵萬户具全軍之衆兵强而敵不戒國富而民不勞比於優復隊伍坐食廪糧者不可同年而較矣今承平來久邊令弛縱弓簳利鐡既不都斷往嵗棄甲垂二十年課其所住理應消壞謂宜申明舊科嚴加禁塞諸商賈往來幢隊挾藏者皆以軍法治之又畍上嚴立關候杜廢閒蹊城保之境諸所課仗竝加雕鐫别造程式若有遺鏃亡刃及私為竊盜者皆可立驗於事為長又巨野湖澤廣大南通洙泗北連青齊有舊縣城正在澤內宜立式修復舊堵利其埭遏給輕艦百艘寇若入境引艦出戰左右隨宜應接據其師津毁其航漕此以利制車運我所長亦微徹敵之要也達性論夫兩儀既位帝王參之宇中莫尊焉天以隂陽分地以剛柔用人以仁義立人非天地不生天地非人不靈三材同體相須而成者也故能禀氣清和神明特達情綜古今制周萬物妙思窮幽賾制作侔造化歸仁與能是為君長撫養黎元助天宣德日月淑清四靈來格祥風協律玉燭揚輝九榖芻豢陸産水育酸鹹百品僃其膳産棟宇舟車銷金合土絲紵𤣥黃供其器服文以禮度娛以八音庇物殖生罔不僃設夫民用儉則易足易足則力有餘力有餘則志情泰樂治之心於是生焉事簡則不擾不擾則神明靈神明靈則謀慮審濟治之務於是成焉故天地以儉素訓民乾坤以易簡示人所以訓示殷勤若此之篤也安得與夫飛沈蠉蠕竝為衆生哉若夫衆生者取之有時用之有道行火俟風暴畋漁候豺獺所以順天時也大夫不麛卵庶人不數罟行葦作歌霄魚垂化所以愛人用也庖厨不邇五犯是翼殷后改祀孔釣不綱所以明仁道也至於生必有死形斃神散猶春榮秋落四時代换奚有於更受形哉詩云愷悌君子求福不回言𢎞道之在已也三后在天言精靈之升遐也若乃內懷嗜欲外憚權教慮深方生施而望報在昔先師未之或言余固不敏罔知請事焉矣論王蕃渾天體詳尋前說因觀渾儀研求其意有以悟天形正員而水周其下言四方者東暘谷日之所出西至濛汜日之所入莊子又云北溟之魚化而為鳥將徙於南溟斯亦古之遺記四方皆水證也四方皆水謂之四海凡五行相生於金是故百川發源皆自山出繇高趣下歸於注海日為陽精光耀炎熾一夜入水所經燋竭百川歸注足於補復故旱不為減浸不為益徑天之數蕃說近之又周天三百六十五度三百四分之七十五天常西轉一日一夜過周一度南北二極相去一百一十六度三百四分度之六十五彊即天經也黃道邪帶赤道春分交於奎七度秋分交於軫十五度冬至斗十四度半彊夏至井十六度半從北極扶天而南五十五度彊則居天四維之中最高處也即天頂也其下則地中也論祠武帝於建始殿魏文帝黃初二年六月以洛京宗廟未成乃祠武帝於建始殿親執饋奠如家人禮案禮將營宫室宗廟為先庶人無廟故祭於寢帝者行之非禮甚矣論立諸葛亮廟劉禪景耀六年詔為丞相諸葛亮立廟於沔陽先是所居各請立廟不許百姓遂私祭之而言事者或以為可立於京師乃從人意皆不納步兵校尉習隆中書侍郎向允等言於禪曰昔周人懷邵伯之美草棠為之不伐越小王思范蠡之德鑄金以存其象自漢興以來善小德而圖形立廟者多矣况亮德範遐邇勳蓋李世興王室之不壞實斯人是賴而蒸嘗止於私門廟象闕而莫立百姓巷祭戎夷野祀非所以存德念功述追在昔也今若盡從人心則瀆而無典建之京師又逼宗廟此聖懷所以惟欵也愚以為宜因近其墓立之於沔陽使所屬以時賜祭凡其故臣欲奉祠者限至廟斷其私祀以崇正禮於是從之周禮凡有功者祭於大蒸故後代遵之以元勳配饗允等曾不是式禪又從之竝非禮也論旄頭戰國竝爭師旅數出懸烏之設務察風䘲宜是秦矣論郊祀不設樂世咸傳吳朝無雅樂案孫皓迎父喪明陵唯云倡伎晝夜不息則無金石登歌可知矣又或云今之神絃孫氏以為宗廟登歌也問報應問西方說報應其枝末雖明而根本常昧其言奢而寡要其譬迂而無徵乖背五經故見棄於先聖誘掖近情故得信於季俗夫欲知日月之行故假察於璇璣將申幽冥之信宜取符於見事故鑑燧懸而水火降雨宿離而風雲作斯皆遠繇近驗幽以顯著者也夫鵝之為禽浮清池咀春草衆生蠢動弗之犯也而庖人執焉鮮有得免刀俎者燕翻翔求食唯飛蟲是草而人皆愛之雖巢幕而不懼非直鵝燕也羣生萬有往往如之是知殺生者無惡報為福者無善應所以為訓者如彼所以示世者如此余甚惑之若謂燕非蟲不甘故罪所不及民食芻豢奚獨嬰辜若謂禽豕無知而人識經教斯則未有經教之時畋漁網罟亦無罪也無故以科法入中國乃所以為民陷穽也彼仁人者豈其然哉故余謂佛經但是假設權教勸人為善耳無關實叙是以聖人作制推德翳物我將我享實膺天祐田獲三品賔庖豫焉若乃見生不忍死聞聲不食肉固君子之所務也竊願高明更加三思書答顔永嘉書南藏作顔光祿敬覽芳訊研復淵㫖區别三才步驗精粹宣演道心褒賞施士貫綜幽明推誠及物行之於巳則美敷之於教則𢎞殆無所聞退尋嘉誨之來將欲令參觀斗極復迷反徑思或昧然未全曉洽故復重伸本懷足下所謂共成三才者是必合德之稱上哲之人亦何為其然夫立人之道取諸仁義惻隱為仁者之表恥惡為義心之端牛山之木剪性於鑿斧恬漠之想汨慮於利害誠宜滋其萌蘖援其善心遂乃存而不算得無過與又云議三才者無取於氓隸言衆生者亦何濫於聖智既已聞命獨未知二塗當以何為判將伊顔下麗寧僑札上附企望不倦以袪未了必令兩籍俱舉宫和符合豈不盡善又曰大德日生有萬之所同同於所方萬豈得生之可異非謂不然人生雖均被大德不可謂之衆生譬聖人雖同禀五常不可謂之衆人奚取於不異之生必宜為衆哉來告云人則役物以為養物則見役以養人大判如此便是顧同圖議至於情嗜不禁害生慘物所謂甚者泰者聖人固已去之又云以道為心者或不劑此而止請問不止者將自已不殺邪令受教咸同邪若自已不殺取足市鄽故是逺庖厨意必欲推之於編户吾見雅論之不可立矣又云若同草木便當煙盡精靈在天將何慿以立夫神魄惚恍游魂為變發揚悽愴亦於何不之仲由屈於知死賜也失於所問不更受形前論之所明言所慿之方請附夫子之對及施報之道必然之符當謂于氏高門俟積善之慶博陽不伐膺公侯之祚何關於後身乎又云經世恆談施者勿憶士子服義惠而弗有誠哉斯言微恨設報以要惠說徒之所先悅報而為惠舉世之常務疑經受纍劫之罪勤施獲積倍之報不似吾黨之為道者是以怏怏耳知欲引之上濟亦甚所不惜但丈夫處實者頗陋前識之華故不為也若此施非周急惠存功譽揆諸高明亦有恥乎此吾率其恆心久而不化內慚璩豫未暇有所誚也何承天白重答顔永嘉書吾少信管見老而彌篤既言之難云將湮腐方寸故願慿流揚以託鱗融厚故意垂懷惠以重釋稽證周明華辭博贍夫良玉時玷賤夫指其瑕望舒抱魂野人睨其缺豈伊好辨未獲云已復進請益之問庶以研盡所滯來告云三才之論故當本諸三畫三畫既陳中稱君德所以神致太上崇一元首若如論㫖以三畫為三才則初擬地爻三議天位然而遁世無悶非厚載之目君子乾乾非蒼蒼之稱果兩儀罔託亦何取於立人但爻在中和宜應君德耳又云惻隱窮博愛之量恥惡盡祐直之方則為上仁上義便是計體仁義者為三才尋又云僑札未獲上附伊顔宜其下麗則黃裳之人其猶弗及雖賾之㫖高下無准故惑者未悟也夫隂陽陶氣剛柔賦性圓首方足容貌匪殊惻隱恥惡悠悠皆是但參體二儀必舉仁義為端取知欲限以名器慎其所假遂令惠人潔士比性於毛羣庶幾之賢同氣於介族立象之意豈其然哉又云巳均被同衆復何諱衆同故當殊其特靈不應異其得生夫特靈之神既異於衆得生之理何嘗暫同生本於理而理異焉同衆之生名將安附若執此生名必使從衆則混成之物亦將在例邪又云謹為垣防猶患踰盜况乃罔不設僃以充侈志方開所泰何議去甚足下始云皇聖設候物之教謹順時之經將以反漸息泰今復以方開所泰為難未詳此將難鄙議將譏聖人也又云市庖之外豈無御養神農所書中散所述何必以刲刳為禀和爓㵸為翼善夫禋瘞繭栗宗社三牲膮膷豆俎以供賔客七十之老俟肉而飽豈得唯陳列草石取僃上藥而已吾所憂不立者非謂洪論難持退嫌此事不可頓去於世耳又云天下寧有無形之有顧此惟疑宜見正定尋來㫖似不嫌有鬼當謂鬼宜有質得無求天竺之書說鬼别為生類故邪昔人以鬼神為教乃列于典經布在方䇿鄭僑吳札亦以為然是以雲和六變實降天神龍門九成人鬼或格足下雅秉周禮近忽此義方詰無形之有為支離之辨乎又云後身著戒可不敬與慈護之人深見此數未詳所謂慈護者誰氏之子若據外書報應之說皆吾所謂權教者耳凡講求至理曾不析以聖言多採譎怪以相扶翼得無似以水濟水邪又云物無妄然必以類感常善以救善亦從之勢猶影表不慮自來斯言果然則類感之物輕重必侔影表之勢修短有度制飾土木不發慈愍之心順時搜守未根慘虐之性天宫華樂焉賞而上升地獄幽苦奚罰而淪陷唱言窮軒輊立法無衡石一至於此且阿保傅愛慎及溷腴良庖提刀情怵介族彼聖人者明竝日月化關三統若令報應必符亦何妨於教而緘扄羲唐之紀埋閉周孔之世肇結網罟興纍億之罪仍制牲牢開長夜之罰遺彼天厨草此芻豢曾無拯溺之仁橫成納隍之酷其為不然宜簡淵慮若謂窮神之知猶有所不盡雖高情愛竒想亦未至於侮聖也足下論仁義則云情之者少利之者多言施惠則許其遺賢忘報在情既少孰能遺賢利之者多曷云忘報若能推樂施之士以期欲仁之疇演忘報之意引向義之心則義實在斯求仁不逺至於濟有生之類入無死之地慶周兆物尊冠百神斯㫖宏誕非本論所及無乃秦師將遁行人言肆乎豈其相迫居吾語子聖人在上不與百神爭長有始有卒焉得無死之地夫辨章幽明研精庶物反初結繩終繁文教性以道率故絶親譽之名範圍造化無傷博愛之量以畋以漁養兼賢鄙三品之獲實充賔庖金石發華笙籥協節醉酒飽德介兹萬年處者𢎞日親之業仕者數先王之教誠著明君澤被萬年龍章表觀鳴玉節趨斯亦堯孔之樂地也及其不遇考槃阿澗以善其身殺雞為黍聊寄懷抱或負鼎割烹揚隆名於長世或屠羊鼓刀陵高志於浮雲此又君子之處心也何必陋積善之延祚希無驗於來世生背當年之真權徒疲役而靡歸繫風捕影非中庸之美慕夷眩妖違通人之致蹲膜揖讓終不竝立竊願吾子捨兼而遵一也及蜀梁二叔草人驛胥之譬非本義所繼故不復具云與宗居士論釋慧琳白黑論書即均善論近得賢從中郎書說足下勤西方法事賢者志其大豈以萬劫為奢但恨短生無以測冥靈耳冶城慧琳道人作白黑論乃為衆僧所排擯賴䝉值明主善救得免波羅夷耳既作比丘乃不應明此白徒亦何為不言足下試尋二家誰為長者吾若昧然望有以佳悟何承天白又答宗居士書首句何承天下當有白字何承天前送均善論并咨求雅㫖來答周至及以為兹理興喪宜明不可但處以可否之間吾雖不能一切依附亦不甚執偏見但求夜光於巨海正自未得耳以為佛經者善九流之别家雜以道墨慈悲愛施與中國不異大人君子仁為巳任心無憶念且以形像彩飾將諧常人耳目其為糜損尚微其所宏益或著是以兼而存之至于好事者遂以為超孔越老唯此為䝿斯未能求立言之本而眩惑於末說者也知其言者當俟忘言之人若唯取信天堂地獄之應因緣不滅之驗抑情菲食盡勸禮拜庶幾廕羅帳之蓋升彌鐙之座淳于生所以大謔也論云衆聖老莊皆云有神明復何以斷其不如佛言答曰明有禮樂幽有鬼神聖王所以為教初不昧其有也若果有來生報應周孔寧當緘默而無片言邪若夫嬰兒之臨坑凡人為之駭怛聖者豈獨不仁哉又云人形至粗人神實妙以形從人豈得齊終答曰形神相資古人譬以薪火薪弊火微薪盡火滅雖有其妙豈有獨傳又云心之所感崩城隕霜白虹貫日太白入昴氣禁之醫冷暖輒應專誠妙感以受身更生七寶之土何為不可哉答曰崩城隕霜貫日入昴不明來生之譬非今論所宜引也又見水火之禁冀其能生七寶之鄉猶觀大冶銷金冀其能自陶鑄終不能亦可知也又曰有諦無諦此唱居然甚安自古千變萬化有俄然皆已空矣當其盛有之時豈不常必有空之實愚者不知其理唯見其有答曰如論云當其盛有之時已必有空之實然則即物常空空物為一矣今空有未殊而賢愚異稱何哉昔之所謂道者於形為無形於事為無事恬漠沖粹養智怡神豈獨愛欲未除宿緣是畏唯見其有豈復是過以此嗤齊侯猶五十步笑百步耳又云舟壑濳謝佛經所謂見在不住誠能明之則物我常虛答曰濳謝不住豈非自生入死自有入無之謂乎故其言曰有駭形而無損心有旦宅而無憤死賈生亦云化為異物又何足患此達乎死生之變者也而區區去就在生慮死心繫無量志生天堂吾黨之常虛異於是焉又云神光靈變及無量之夀皆由誠信幽竒故映其明今沒於邪見理固天隔答曰今亦不從慢化者求其光明但求之於誠信者耳尋釋迦之教以善權救物若果應驗若斯何為不見其靈變以曉邪見之徒豈獨不愛數十百萬之說而吝俄項神光徒為化聲之辨竟無明於真智終年疲疫而不知所歸豈不哀哉又云內懷䖍仰故拜禮悔罪逹夫無常故情無所吝委妻子而為施豈有邀於百倍答曰繁巧以興事未若除貪欲而息競遵戒以洗悔未若剪榮冀以全朴况乃誘所尚以祈利忘天屬以要譽謂之無邀吾不信也又云泥洹以無樂為樂法身以無身為身若誠能餐仰則耽逸稍除獲利於無利矣答曰泥洹以離苦為樂法身以接苦為身所以使餐仰之徒不能自絶耳果歸於無利勤者何獲而云獲於無利邪此乃形神俱盡之證恐非雅論所應明言也又云欲此道者可謂有欲於無欲矣至若啓導粗近者有影響之實亦猶于公以仁活致封嚴氏以好殺致誅厲妙行以希天堂謹五戒以逺地獄雖有欲於可欲實踐日損之塗此亦西行而來郢何患其不至答曰謂粗近為啓導比報應於影響不亦善乎但影響所因必稱形聲尋常之形安得八萬由旬之影乎所滯若有欲於無欲猶是常滯於所欲夫耳目殊司工藝異業末技所存慮信不竝是以金石克諧泰山不能呈其高鴻鵠方集冥秋不能傳其㫖而欲以有欲成無欲希望就日損雖云西行去郢滋逺如之何又云若身死神滅是物之真性但當與周孔并力致教何為誑以不滅欺以物理使燒祝髮膚絶其􅀈合以盡傷性之美答曰華戎自有不同何者中國之人秉氣清和合仁抱義故周孔明性習之教外國之徒受性剛弱貪欲忿戾故釋氏嚴五戒之科來論所謂聖無常心就物之性者也懲暴之戒莫苦乎地獄誘善之勸莫美乎天堂將盡殘害之根非中庸之謂周孔則不然順其天性去其甚泰淫盜著於五刑酒辜明於周誥春田不圍澤見生不忍死五犯三驅釣而不綱是以仁愛暜洽澤及㹠魚嘉禮有常俎老者得食肉春耕秋收蠶織以時三靈格思百神咸秩方彼之所為者豈不𢎞哉又甄供灌之賞嚴疑法之罰述蒲宰之問為勸化之本演焄蒿之答明來生之驗袨服盱衡而矜斯說者其處心亦悍矣論又稱耆陀尸梨之屬神理風操不在琳比丘後足下既明常人不能料度近事今何以了其勝否於百年之前數千里之外邪若琳比丘者僧貌而天虛似夫深識真僞殊不肯忌經護師崇飾巧說吾以是敬之孫興公論云竺法護之淵逺于法蘭之純博足下欲比中土何士也及楚英之修仁寺笮融之賙行饉寧復有清真風操乎昔在東邑有道含沙門自吳中來深見勸譬甚有㦝誠因留三宿相為說練形澄神之緣罪福起滅之驗皆有條貫吾拱聽讜言申旦忘寢退以為士所以立身揚名著信行道者實賴周孔之教子路稱聞之而未之能行唯恐有聞吾所行者多矣何遽捨此而務彼又尋稱情立文之制知來生之為奢䆒終身不巳之哀悟受形之難再稱聖人我師周公豈欺我哉緣足下情篤故具陳始末想耆舊大智誨人不倦於此未默耳前巳遣取明佛論遲尋至冀或朗然於心何承天白重答宗居士書重告并省大論置陳如項籍既足下以賤漢祖况弱士乎證譬堅明文詞淵富誠欲廣其利澤施及凡民深知君子之用心也足下方欲影響以神其教故宜緘默成人之美但當為外國之事或非中華所務是以有前言耳果令中外宜同余則陋矣敢謝不敏雖然猶有所懷夫明天地之性者不致惑于迂怪識盛衰之徑者不役心於理表儻令雅論不因善權篤誨皆繇情發豈非通人之蔽哉未緣言對聊以代面何承天白答江氏問問甲兒先亡甲後亡嫡孫傳重未及中祥嫡孫又亡有次孫今當應服三年不甲既有孫不得無服三年者謂次孫宜持重也但次孫先以制齊縗今得便易服當須中祥乃服練居堊室耳昔有問范宣云人有二兒大兒無子小兒有子疑於傳重宣答小兒之子應服三年亦粗可依頌上白鳩頌有表宋文帝元嘉十八年八月庚午㑹稽山隂商世寶獲白鳩眼足並赤揚州刺史始興王濬以獻太子率更令何承天上表謹考尋先典稽之前志王德所覃物以應顯是以𤣥扈之鳯昭帝軒之鴻烈鄷宫之雀徵姬文之徽祚伏惟陛下重光嗣服永言祖武洽惠和於地絡燭皇明於天區故能九服混心萬邦含愛員神降祥方祗薦裕休珍雜㳫景瑞畢臻去七月上旬時在昧旦黃暉洞照宇宙開朗徽風協律甘液灑津雖朱晃瑰瑋於運衡榮光圖靈於河紀蔑以尚兹臣不量卑懵竊慕擊轅有作相杵成謳近又豫白鳩之觀目玩竒偉心歡盛烈謹獻頌一篇野思古拙意及庸陋不足以發揮清英敷讚幽㫖瞻前顧後亦各其志謹冒以聞三極協情五靈㑹一理感冥符道實𤣥聖於赫有皇先天配命朝景升躔八維同映休祥載臻榮光播慶宇宙照爛日月光華陶山練澤是生柔嘉回龍表粹離穗合柯翩翩者鳩亦皎其暉理翮台領揚鮮帝畿闕四字匪德莫歸暮從儀鳳棲閣廕闈蒸哉明后昧旦乾乾惟德之崇其峻如山惟澤之瞻其潤如淵禮樂四逹頌聲遐宣窮髮納貢九譯導言伊昔唐萌愛逢慶祚余生既辰而年之暮提心命耋式歌王度晨晞永風久潄甘露思樂靈基不遐有固社頌余以永初三年八月大社聊為此文實惟隂祗稷為榖先率育萬類協靈昊乾霸德方將世號共工厥有才子實曰句龍稱物平賦百姓熙雍唐堯救災決河流江棄亦播植作乂萬邦克配二祀以報勳庸勳庸伊何厚載生民倉廩既實禮節斯行人亦有言因物思人矧乃大德功被陶鈞豈伊百世萬代不泯蒸哉帝王肇建皇極體國經野設官分職峨峨二社列幹比殖嵗云其秋晷漏均程牲牢既潔嘉薦惟馨乃家乃國是奉是尊釋奠頌乃昔孔顔夢周希虞自天繇美異代同符經修講治研幾識理道貴崇業降尊尚齒贊天贊軒轅改物以經天人容成造厯大撓創辰龍集有次星紀乃分地贊九州攸同時惟禹跡爰及後代疆分里析貢則屢遷名猶不易詩鼓吹鐃歌十五首有序宋書樂志曰鼓吹鐃歌十五篇何承天晉義熙中私造聲音抑揚精妙瑰瑋世亦不易言也朱路篇朱路揚和鸞翠蓋耀金華𤣥牡飾樊纓流旌拂飛霞雄㦸闢曠塗班劍翼高車三軍且莫喧聽我奏鐃歌清鞞驚短簫朗鼓節嗚笳人心惟愷豫兹音亮且和輕風起紅塵渟瀾發微波逸韻騰天路穨響結城阿仁聲被八表威震振九遐嗟嗟介胄士朂哉念皇家思悲公篇思悲公懷衮衣東國何悲公西歸公西歸流二叔幼主既悟偃禾復偃禾復聖志申營都新邑從斯民從斯民德惟明制禮作樂興頌聲興頌聲致嘉祥鳴鳯爰集萬國康萬國康猶弗已握髮吐餐下羣士惟我君繼伊周親覩盛世復何求雍離篇雍士多離心荆民懷怨情二凶不量德搆難稱其兵王人銜朝命正辭糾不庭上宰宣九伐萬里舉長旌樓船掩江濆駟介飛重英歸德戒後夫賈勇尚先鳴逆徒既不濟愚智亦相傾霜鋒未及染鄢郢忽巳清西川無潛鱗北渚有奔鯨凌威致天府一戰夷三城江漢被美化宇宙歌太平惟我東郡民曾是深推誠戰城南篇戰城南衝黃塵丹旌電烻鼓雷震勍敵猛戎馬殷橫陳亘野若屯雲仗大順應三靈義之所感士忘生長劍擊繁弱鳴飛鏑炫晃亂奔星虎騎躍華眊旋朱火延起騰飛烟驍雄斬高旗搴長角浮呌響清天夷羣寇殪逆徒餘黎霑惠詠來蘇奏愷樂歸皇都班爵獻俘邦國娛巫山高篇巫山高三峽峻青壁千尋深谷萬仞崇巖冠靈林冥冥山禽夜響晨猿相和鳴洪波迅澓載逝載停悽悽商旅之客懷苦情在昔陽九皇綱微李氏竊命宣武耀靈威蠢爾逆縱復踐亂機王旅薄伐傳首來至京師古之為國惟德是貴力戰而虐民鮮不顛墜矧乃叛戾伊胡能遂咨爾巴子無放肆上陵者篇上陵者相追攀被服纎麗振綺紈攜童幼升崇巒南望城闕鬱盤桓王公第通衢端高甍華屋列朱軒臨濬谷掇秋蘭士女悠奕映隰原指營丘感牛山爽鳩既沒景君歎嗟嵗聿逝不還志氣衰沮𤣥鬢斑野莽宿墳土乾顧此纍纍中心酸生死亦何怨取樂今日展情歡將進酒篇將進酒慶三朝備繁禮薦嘉肴榮枯換霜霧交緩春帶命朋僚車等旗馬齊鑣懷溫克樂林濠士失志愠情勞思㫖酒寄遊遨敗德人甘醇醪耽長夜惑淫妖興屢舞厲哇謡形傞傞聲號呶首既濡志亦荒性命夭國家亡嗟後生節酣觴匪酒辜孰為殃君馬篇君馬麗且間揚鑣騰逸姿駿足躡流景高步追輕飛冉冉六轡柔奕奕金華暉輕霄翼羽蓋長風靡淑旗願為范氏驅雍容步中畿豈效詭遇子馳騁趣危機鉛陵䇿良駟造父為之悲不怨吳坂峻但恨伯樂稀赦彼岐山盜實濟韓原師奈何漢魏主縱情營所私疲民甘藜藿廄馬患盈肥人畜眢厥養蒼生將焉歸芳樹篇芳樹生北庭豐隆正排徊翠穎凌冬秀紅葩迎春開佳人閒幽室惠心婉以諧蘭房掩綺幌緑草被長階日夕遊雲際歸禽命同棲皓月盈素景涼風拂中閨哀絃理虛堂要妙清且凄嘯歌流激楚傷此碩人懷梁塵集丹帷微飈揚羅袿豈怨嘉時暮徒惜良願乖有所思篇有所思思昔人曾閔二子善養親和顔色奉昏晨至誠蒸蒸通明神鄒孟軻為齊卿稱身受祿不貪榮道不用獨擁楹三徙既誶禮義明飛鳥集猛獸附功成事畢乃更娶哀我生遘凶閔幼罹荼毒僃艱辛慈顔絶見無因長懷永思託丘墳雉子遊原澤篇雉子遊原澤幼懷耿介心飲啄雖勤苦不願棲園林古有避世士抗志青霄岑浩然寄卜肆揮棹通川隂逍遙風塵外散髮撫鳴琴卿相非所眄何况於千金功名豈不美寵辱亦相尋氷炭結六府憂虞纒胸襟當世須大度量巳不克任三復泉流誡自警良巳深上邪篇上邪下難正衆枉不可矯音和響必清端景緣直表大化揚仁風齊人猶偃草聖王既巳沒誰能𢎞至道開春湛柔露代終肅嚴霜承平貴孔孟政弊侯申商孝公明賞罰六世猶克昌李斯肆濫刑秦民所以亡漢宣隆中興魏祖寧三方譬彼針與石效疾而稱良行葦非不厚悠悠何詎央琴瑟時未調改絃當更張矧乃治天下此要安可忘臨高臺篇臨高臺望天衢飄然輕舉凌太虛攜列子超帝鄉雲衣雨帶乘風翔肅龍駕㑹瑶臺清暉浮景溢蓬萊濟西海濯洧盤佇立雲嶽結幽蘭馳迅風遊炎州願言桑梓思舊遊傾霄蓋靡電旌降彼天塗頽窈冥辭仙族歸人羣懷忠抱義奉明君任窮逹隨所遭何為逺想令心勞逺期篇逺期千里客肅駕候良辰近命城郭友具爾惟懿親高門啓雙闈長筵列嘉賓中唐儛八佾三廂羅樂人簫管激悲音羽毛揚華文金石響高宇絃歌動梁塵修標多巧捷九劍亦入神遷善自雅調成化繇清均主人垂隆慶羣士樂亡身願我聖明君遐期保萬春石流篇石上流水湔湔其波發源幽岫永歸長河瞻彼逝者嵗月其偕子在川上惟以增懷嗟我殷憂載勞寤寐遘此百罹有志不遂行年倐忽長勤是嬰永言沒世悼兹無成幸遇開泰沐浴嘉運緩帶安寢亦又何愠古之為仁自求諸巳虛情遙慕終於徒已漢魏六朝百三家集卷六十三
