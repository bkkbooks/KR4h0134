body:
  text: 漢魏六朝百三家集巻二十六魏曹植集題詞余讀陳思王責躬應詔詩泫然悲之以為伯竒履霜崔子渡河之屬既讀升天逺逰仙人飛龍諸篇又何翩然遐征覽思方外也王初䝉寵愛幾為太子任性章釁中受拘攣名為懿親其朝夕縱適反不若一匹夫徒步慷慨請試求通親戚賈誼奮節于匈奴劉勝低首于聞樂斯人感概豈空云爾哉司馬氏睥睨神器魏忽不祀彼所綢繆者藩防而取代者他族思王之言不再世而驗然則審舉諸文固魏宗之磐石也集備羣體世稱繡虎其名不虛即自然深致少遜其父而才大思麗兄似不如人但見文帝居髙陳王伏地遂謂帝王人臣文體有分恐淮南中壘不為武成受屈也黄初二令省愆悔過詩文怫鬱音成于心當此時而猶泣金枕賦感甄必非人情論者又云禪代事起子建發服悲泣使其嗣爵必終身臣漢若然則王之心其周文王乎余將登箕山而問許由焉目録賦登臺賦節遊賦臨觀賦游觀賦東征賦有序藉田賦述行賦感節賦娛賔賦潜志賦𤣥暢賦有序閒居賦九愁賦叙愁賦有序離思賦有序釋思賦有序幽思賦愁思賦懷親賦有序慰子賦静思賦歸思賦洛神賦有序愍志賦有序出婦賦感婚賦大暑賦愁霖賦又喜霽賦寳刀賦有序九華扇賦有序迷迭香賦車渠椀賦酒賦有序植橘賦芙蓉賦槐賦神龜賦有序白鶴賦鸚鵡賦離􅌳鴈賦有序鶡賦有序鷂雀賦蟬賦蝙蝠賦遷都賦序騷九詠令黄初五年令黄初六年令寫灌均上事令表求自試表求通親親表陳審舉表諌取諸國士息表諫伐遼東表慶文帝受禪表慶受禪上禮表龍見賀表初封安鄉侯表封甄城王謝表轉封東阿王謝表謝妻改封陳妃表謝入覲表又謝周觀表謝明帝賜食表謝賜柰表謝鼓吹表答明帝詔表上責躬詩表上卞太后誄表上先帝賜鎧表冬至獻襪履表獻璧表獻馬表獻牛表請招降江東表請用賢表望恩表請祭先王表請赴元正表作車帳表乞田表獵表歐冶表上銀鞍表謝賜榖表章改封陳王謝章封二子為公謝恩章書與楊德祖書與吳質書與司馬仲達書與陳琳書與丁敬禮書答崔文始書序前録自序桞頌序酈生頌序七七啓七咨論魏德論漢二祖優劣論成王漢昭論相論辯道論又令禽惡鳥論仁孝論輔臣論征蜀論又魏德論略説籍田説二首髑髏説畫説説疫氣又謳魏德論謳甘露連理木榖禾鵲鳩碑制命宗聖侯孔羡奉家祀碑頌皇子生頌承露盤頌有序孔廟頌有序社頌有序湯妃頌姜后頌𤣥俗頌冬至獻襪頌宜男花頌贊畫贊有序庖犧贊女媧贊神農贊黄帝贊黄帝三鼎贊少昊贊顓頊贊帝嚳贊帝堯贊帝舜贊夏禹贊禹治水贊禹渡河贊殷湯贊湯禱桑林贊周文王贊周文王赤雀贊周武王贊周公贊周成王贊漢髙帝贊漢文帝贊漢景帝贊漢武帝贊姜嫄簡狄贊禹妻贊班媫妤贊吹雲贊巢父贊務光贊商山四皓贊長樂觀畫贊古冶子等贊銘寳刀銘文誥咎文有序釋愁文誄武帝誄文帝誄卞太后誄任城王誄大司馬曹休誄光禄大夫荀侯誄王仲宣誄平陽懿公主誄蒼舒誄哀辭仲雍哀辭金瓠哀辭行女哀辭漢魏六朝百三家集巻二十六目録欽定四庫全書漢魏六朝百三家集巻二十六眀張溥輯魏曹植集賦登臺賦從眀后而嬉遊兮登層臺以娱情見太府之廣開兮觀聖徳之所營建髙門之嵯峨兮浮雙闕乎太清立中天之華觀兮連飛閣乎西城臨漳水之長流兮望園果之滋榮仰春風之和穆兮聴百鳥之悲鳴天雲恒其既立兮家願得而獲呈揚仁化於宇内兮盡肅恭於上京雖桓文之為盛兮豈足方乎聖眀休矣美矣恵澤逺揚翼佐皇家兮寜彼四方同天地之矩量兮齊日月之輝光永貴尊而無極兮等年夀于東王節遊賦覽宫宇之顯麗實大人之攸居建三臺於前處飄飛陛以凌虛連雲閣以逺徑營觀榭於城隅亢髙軒以迥眺緣雲霓而結疏仰西嶽之崧岑臨漳滏之清渠觀靡靡而無終何𣺌𣺌而難殊亮靈后之所處非吾人之所廬於是仲春之月百卉叢生萋萋藹藹翠葉朱莖竹林青葱珍果含榮凱風發而時鳥讙微波動而水蟲鳴感氣運之和順樂時澤之有成遂乃浮素盖御驊驑命友生攜同儔誦風人之所歎遂駕言而出逰歩北園而馳騖庶翺翔以解憂望洪池之滉瀁遂降集乎輕舟浮沈蟻於金罍行觴爵於好仇絲竹發而響厲悲風激於中流且容與以盡觀聊永日而忘愁嗟羲和之奮迅怨曜靈之無光念人生之不永若春日之微霜諒遺名之可紀信天命之無常愈志蕩以淫㳺非經國之大綱罷曲宴而旋服遂言歸乎舊房臨觀賦登髙墉兮望四澤臨長流兮送逺客春風暢而氣通靈草含幹兮木交莖丘陵崛兮松栢青南園薆兮果載榮樂時物之逸豫悲予志之長違歎東山之遡勤歌式微以詠歸進無路以効功退無隠以營私俯無鱗以逰遁仰無翼以飜飛遊觀賦静閒居而無事將逰目以自娱登北觀而啓路陟雲際之飛除從羆熊之武士荷長㦸而先驅罷若雲歸㑹如霧聚車不及回塵不獲舉奮袂成風揮汗如雨東征賦有序建安十九年王師東征吳寇余典禁兵衛宫省然神武一舉東夷必克想見振旅之盛故作賦一篇登城隅之飛觀兮望六師之所營幡旗轉而心異兮舟楫動而傷情顧身微而任顯兮愧責重而命輕嗟我愁其何為兮心遥思而懸旌師旅憑皇穹之靈佑兮亮元勲之必舉揮朱旗以東指兮横大江而莫御循戈櫓於清流兮氾雲梯而容與禽元帥於中舟兮振靈威於東野藉田賦營疇萬畆厥田上上竒栁夾路名果被園司農實掌是謂公田述行賦尋曲路之南隅觀秦政之驪墳哀黔首之罹毒酷始皇之為君濯余身於秦井偉湯液之若焚感節賦攜友生而游觀盡賓主之所求登髙墉以永望冀消日以忘憂欣陽春之潛潤樂時澤之恵休望候雁之翔集想𤣥鳥之來游嗟征夫之長勤雖處逸而懷愁懼天河之一迴沒我身乎長流豈吾鄊之足顧戀祖宗之靈丘唯人生之忽過若鑿石之末燿慕牛山之哀泣懼平仲之我笑折若華之翳日庶朱光之常照願寄軀於飛蓬乗陽風而逺飄亮吾志之不從乃拊心以歎息青雲鬱其西翔飛鳥翩而上匿欲縱體而從之哀余身之無翼大風隠其四起揚黄塵之㝠㝠鳥獸驚以求羣草木紛其揚英見遊魚之涔灂感流波之悲聲内紆曲而潛結心怛惕以中驚匪榮德之累身恐年命之早零慕歸全之明義庻不忝乎所生娱賓賦遂衎賓而髙㑹兮丹幃曄以四張辦中厨之豐膳兮作齊鄭之妍倡文人騁其玅說兮飛輕翰而成章談在昔之清風兮總賢聖之紀綱欣公子之髙義兮徳芬芳其若蘭揚仁恩於白屋兮踰周公之棄餐聴仁風以忘憂兮美酒清而肴甘潛志賦潛大道以逰志希往昔之遐烈矯貞亮以作矢當苑囿乎呈藝驅仁義以為禽必忠信而後發退隠身以㓕跡進出世而取容且摧剛而和謀接䖍肅以静恭亮知榮而守辱惟天路以為通𤣥暢賦有序夫富者非財也貴者非寳也或有輕爵禄而重榮聲者或有反性命而狥功名者是以孔老異情楊墨殊義聊作斯賦名曰𤣥暢夫何希世之大人罄天壤而作皇該仁聖之上義據神位以統方補五常之漏闕綴三代以維綱僥余生之倖禄遘九二之嘉祥上同契於稷卨降合頴於伊望思薦寳以繼佩怨和璞之始鐫思黄鐘以協律怨伶䕫之不存嗟所圖之莫合悵藴結而延佇希鵬舉以摶天蹶青雲而奮羽舎余駟而改駕任中才之展御望前軌而致䇿顧後乗而安驅匪逞邁之短修取全貞而保素𢎞道徳以為宇築無怨以作藩播慈恵以為圃耕柔順以為田不媿景而慚魄信樂天之何欲逸千載而流聲超遺黎而度俗閒居賦何吾人之介特去朋匹而無儔出靡時以娱志入無樂以消憂何嵗月之若騖復生民之無常感陽春之發節聊輕駕而逺翔登髙丘以延企時薄暮而起雨仰歸雲以載犇遇蘭蕙之長圃冀芬芳之可服結春蘅以延佇入虛廊之閒館歩生風之髙廡踐密邇之修除即蔽景之𤣥宇翡翠翔於南枝𤣥鶴鳴於北野青魚躍於東沼白鳥戯於西渚遂乃背通谷對緑波藉文菌翳春華丹轂更馳羽騎相過九愁賦嗟離思之難忘心慘毒而含哀踐南畿之末境越引領之徘徊眷浮雲以太息顧攀登而無階匪狥榮而愉樂信舊都之可懷恨時王之謬聴受奸枉之虛辭揚天威以臨下忽放臣而不疑登髙陵而反顧心懷愁而荒悴念先寵之既隆哀後施之不遂雖危亡之不豫亮無逺君之心刈桂蘭而秣馬舎余車於西林願接翼於歸鴻嗟髙飛而莫攀因流景而寄言響一絶而不還傷時俗之趨險獨悵望而長愁感龍鸞而匿跡如吾身之不留竄江介之曠野獨渺渺而汎舟思孤客之可悲愍予身之翩翔豈天監之孔眀將時運之無常謂内思而自䇿筭乃昔之愆殃以忠言而見黜信無負於時王俗參差而不齊豈毁譽之可同競昏瞀以營私害予身之奉公共朋黨而妬賢俾予濟乎長江嗟大化之移易悲性命之攸遭愁慊慊而繼懷怛慘慘而情挽曠年載而不回長去君兮悠逺御飛龍之蜿蜒揚翠霓之華旌絶紫霄而髙騖飄弭節於天庭披輕雲而下觀覽九土之殊形顧南郢之邦壤咸蕪穢而倚傾驂盤桓而思服仰御驤以悲鳴紆予𬒮而長涕僕夫感以失聲履先王之正路豈淫徑之可遵知犯君之招咎恥干媚而求親顧旋復之無軏長自棄於遐濱與麋鹿以為羣宿林藪之葳蓁野蕭條而極望曠千里而無人民生期於必死何自苦以終身寜作清水之沈泥不為濁路之飛塵踐蹊隧之危阻登岧嶤之高岑見失羣之離獸覿偏棲之孤禽懷憤激以切痛苦回忍之在心愁戚戚其無為逰綠林而逍遥臨白水以悲嘯猿驚聴而失條亮無怨而棄逐乃余行之所招叙愁賦有序時家二女弟故漢皇帝聘以為貴人家母見二弟愁思故令予作賦曰嗟妾身之微薄信未逹乎義方遭母氏之聖善奉恩化之彌長迄盛年而始立修女職於衣裳承師保之眀訓誦六列之篇章觀圖像之遺形竊庶幾乎英皇委微軀於帝室充末列於椒房荷印紱之令服非陋才之所望對牀帳而太息慕二親以増傷揚羅袖以掩涕起出户而彷徨顧堂宇之舊處悲一别之異鄉離思賦有序建安十六年大軍西討馬超太子留監國植時從焉意有憶戀遂作離思賦云在肇秋之嘉月將曜師而西旗余抱疾以賓從扶衡軫而不怡慮征期之方至傷無階以告辭念慈君之光恵庶没命而不疑欲畢力於旌麾將何心而逺之願我君之自愛為皇朝而寳巳水重深而魚悦林修茂而鳥喜釋思賦有序家弟出養族父郎中伊予以兄弟之愛心有戀然作此賦以贈之彼朋友之離别猶求思乎白駒况同生之義絶重背親而為踈樂鴛鴦之同池羨比翼之共林亮根異其何戚痛别幹之傷心幽思賦倚髙臺之曲隅處幽僻之閒深望翔雲之悠悠羌朝霽而夕隂顧秋華而零落感嵗暮而傷心觀躍魚於南沼聆鳴鶴於北林搦素筆而慷慨揚大雅之哀吟仰清風以歎息寄余思於悲絃信有心而在逺重登髙以臨川何余心之煩錯寜翰墨之能傳愁思賦四節更王兮秋氣悲遥思惝怳兮若有遺原野蕭條兮煙無依雲髙氣静兮露凝璣野草變色兮莖葉稀鳴蜩抱木兮雁南飛歸室解裳兮歩庭前月光照懷兮星依天居一世兮芳景遷松喬難慕兮誰能仙長短命也兮獨何愆懷親賦有序濟陽南澤有先帝故營遂停馬住駕造斯賦焉獵平原而南騖覩先帝之舊營歩壁壘之常制識旌麾之所停在官曹之典列心髣髴於平生回驥首而永㳺赴修途以尋逺情眷戀而顧懷魂須㬰而九反慰子賦彼凡人之相親小離别而懷戀况中殤之愛子乃千秋而不見入空室而獨倚對孤幃而切歎痛人亡而物在心何忍而復觀日晼晚而既沒月代照而舒光仰列星以至晨衣霑露而含霜惟逝者之日逺愴傷心而絶腸静思賦夫何美女之爛妖紅顔曄而流光卓特出而無匹呈才好其莫當性通暢以聰恵行孊密而妍詳䕃髙岑以翳日臨綠水之清流秋風起於中林離鳥鳴而相求愁慘慘以増傷悲予安能乎淹留歸思賦背故鄉而遷徂將遥憩乎北濱經平常之舊居感荒壞而莫振城邑寂以空虛草木穢而荆蓁嗟喬木之無隂處原野其何為信樂土之足慕忽并日之載馳洛神賦有序黄初三年余朝京師還濟洛川古人有言斯水之神名曰宓妃感宋玉對楚王神女之事遂作斯賦其詞曰余從京師言歸東藩背伊闕越轘轅經通谷陵景山日既西傾車殆馬煩爾廼稅駕乎蘅臯秣駟乎芝田容與乎陽林流眄乎洛川於是情移神駭忽焉思散俯則未察仰以殊觀覩一麗人於巖之畔廼援御者而告之曰爾有覿於彼者乎彼何人斯若此之艷也御者對曰臣聞河洛之神名曰宓妃則君王之所見也無迺是乎其狀若何臣願聞之余告之曰其形也翩若驚鴻婉若游龍榮曜秋菊華茂春松髣髴兮若輕雲之蔽月飄颻兮若流風之迴雪逺而望之皎若太陽升朝霞迫而察之灼若芙蕖出淥波穠纎得中修短合度肩若削成腰如約素延頸秀項皓質呈露芳澤無加鉛華不御雲髻峩峩修眉聨娟丹脣外朗皓齒内鮮明眸善睞靨輔承權瓌姿豔逸儀静體閑柔情綽態媚於語言竒服曠世骨像應圖披羅衣之璀粲兮珥瑤碧之華琚戴金翠之首飾綴眀珠以耀軀踐逺游之文履曳霧綃之輕裾微幽蘭之芳藹兮歩踟蹰於山隅於是忽焉縱體以遨以嬉左倚采旄右䕃桂旗攘皓腕於神滸兮采湍瀨之𤣥芝余情悅其淑美兮心振蕩而不怡無良媒以接歡兮託微波而通辭願誠素之先達兮解玉佩而要之嗟佳人之信修兮羌習禮而明詩抗瓊珶以和予兮指潛淵而為期執眷眷之欵實兮懼斯靈之我欺感交甫之棄言兮悵猶豫而狐疑收和顔而静志兮申禮防以自持於是洛靈感焉徙倚傍徨神光離合乍隂乍陽竦輕軀以鶴立若將飛而未翔踐椒塗之郁烈歩蘅薄而流芳超長吟以永慕兮聲哀厲而彌長爾迺衆靈雜遝命儔嘯侣或戲清流或翔神渚或採眀珠或拾翠羽從南湘之二妃攜漢濱之游女歎匏瓜之無匹詠牽牛之獨處揚輕袿之綺靡翳修袖以延佇體迅飛鳬飄忽若神陵波微歩羅韈生塵動無常則若危若安進止難期若往若還轉盼流精光潤玉顔含辭未吐氣若幽蘭華容婀娜令我忘餐於是屏翳收風川后静波馮夷鳴鼓女媧清歌騰文魚以警乗鳴玉鸞以偕逝六龍儼其齊首載雲車之容裔鯨鯢踊而夾轂水禽翔而為衛於是越北沚過南岡紆素領迴清揚動朱脣以徐言陳交接之大綱恨人神之道殊怨盛年之莫當抗羅袂以掩涕兮淚流襟之浪浪悼良㑹之永絶兮哀一逝而異鄉無微情以效愛兮獻江南之眀璫雖潛處於太隂長寄心於君王忽不悟其所舎悵神宵而蔽光於是背下陵髙足往神留遺情想像顧望懷愁冀靈體之復形御輕舟而上泝浮長川而忘反思緜緜而増慕夜耿耿而不寐霑繁霜而至曙命僕夫而就駕吾將歸乎東路攬騑轡以抗䇿悵盤桓而不能去記曰植初求甄逸女不遂後太祖回與五官中郎將植晝思夜想廢寢與食黄初中入朝帝示植甄后玉鏤金帶枕植見之不覺泣下時已為郭后䜛死帝仍以枕賚植植還度轘轅息洛水上因思甄氏忽若有見遂述其事作感甄賦後眀帝見之改為洛神賦燮按植在黄初猜嫌方劇安敢于帝前思甄泣下帝又何至以甄枕賜植此國章家典所無也若事因感甄而名托洛神間有之耳豈待眀帝始改皆傅㑹者之過矣愍志賦有序或人有好鄰人之女者時無良媒禮不成焉彼女遂行適人有言之於子者予心感焉乃作賦曰竊托音於往昔迄來春之不從思同逰而無路情壅隔而靡通哀莫哀於永絶悲莫悲於生離豈良時之難俟痛予質之日虧登髙樓以臨下望所歡之攸居去君子之清宇歸小人之蓬廬欲輕飛而從之廹禮防之我拘出婦賦以才薄之陋質奉君子之清塵承顔色以接意恐疏賤而不親悅新婚而忘妾哀愛恵之中零遂摧頽而失望退幽屏於下庭痛一旦而見棄心忉忉以悲驚衣入門之初服背床室而出征攀僕御而登車左右悲而失聲嗟寃結而無訴乃愁苦以長窮恨無愆而見棄悼君施之不終感婚賦陽氣動兮淑清百卉鬱兮含英春風起兮蕭條蟄蟲出兮悲鳴顧有懷兮妖嬈用搔首兮屏營登清臺以蕩志伏髙軒而游情悲良媒之不顧懼歡媾之不成慨仰首而太息風飄飄以動纓大暑賦炎帝掌節祝融司方羲和按轡南雀舞衡蛇折鱗於靈窟龍解角於皓蒼遂乃温風赫戲草木垂榦山折海沸沙融礫爛飛魚躍渚潛黿浮岸鳥張翼而近栖獸交遊而雲散于時黎庶徙倚棊布葉分機女絶綜農夫釋耘背暑者不羣而齊跡向隂者不㑹而成羣於是大人遷居宅幽綏神育靈雲屋重構閒房肅清寒泉涌流𤣥木奮榮積素氷於幽館氣飛結而為霜奏白雪於琴瑟朔風感而増涼愁霖賦迎朔風而爰邁兮雨微微而逮行悼朝陽之隠曜兮怨北辰之潛精車結轍以盤桓兮馬躑躅以悲鳴攀扶桑而仰觀兮假九日於天皇瞻沈雲之泱漭兮哀吾願之不將又愁霖賦夫季秋之淫雨兮既彌日而成霖瞻𤣥雲之晻晻兮聴長空之淋淋中宵卧而歎息起飾帶而撫琴喜霽賦禹身逝於暘旰卒錫圭而告成湯感旱於殷時造桑林而敷誠動玉朝而雲披鳴鑾鈴而日陽指北極以為期吾將倍道而兼行寳刀賦有引建安中家父魏王乃命有司造寳刀五枚三年乃就以龍虎熊馬雀為識太子得一余及余弟饒陽侯各得一焉其餘二枚家王自仗之賦曰有皇漢之眀后思潛達而𤣥通飛文藻以博致揚武備以禦凶乃熾火炎爐鐵融挺英烏獲奮椎歐冶是營扇景風以激氣飛光鑑於天庭爰告祠於太乙乃感夢而通靈然後礪以五方之石鑿以中黄之壤規員景以定環攄神思而造象垂華紛之葳蕤流翠采之晃陸斬犀革水斷龍角輕擊浮截刅不瀐削踰南越之巨闕超有楚之太阿寔真人之攸御永天禄而是荷九華扇賦有引昔吾先君常侍得幸漢桓帝賜尚方扇不方不圓其中結成文名曰九華其辭曰有神區之名竹生不周之髙岑對綠水之素波背𤣥澗之重深體虛暢以立榦播翠葉以成林形五離而九折篾氂解而縷分效虬龍之蜿蜒法虹霓之氤氲因形致好不常厥儀方不應矩圓不中規隨皓腕以徐轉發恵風之微寒時氣清以方厲紛飄動兮綺紈迷迭香賦播西都之麗草兮應青春而凝暉流翠葉於纎柯兮結微根於丹墀信繁華之速實兮弗見凋於嚴霜方暮秋之幽蘭兮麗崑崙之芝英既經時而收采兮遂幽殺以増芳去枝葉而特御兮入綃縠之霧裳附玉體以行止兮順微風而舒光車渠椀賦惟新椀之所生於凉風之浚湄采金光之定色擬朝陽而發輝豐𤣥素之暐曄帶朱榮之葳㽔藴絲綸以肆采藻繁布以相追翩飄颻而浮景若驚鵠之雙飛隠神璞於西野彌百葉而莫希於時乃有篤厚神后廣被仁聲夷慕義而重使獻茲寳於斯庭命公輸之巧匠窮妍麗之殊形華色燦爛文若㸃成鬱蓊雲蒸蜿蜒龍征光如激電影若浮星何神怪之巨偉信一覽而九驚雖離朱之聰目内炫耀而失精何明麗之可悦超羣寳而特章俟君子之閒燕酌甘醴於斯觥既娱情而可貴故永御而不忘酒賦有序余覽揚雄酒賦辭甚瑰瑋頗戲而不雅聊作酒賦粗究其終始賦曰嘉儀氏之造思亮茲美之獨珍仰酒旗之景曜協嘉號於天辰穆生以醴而辭楚侯嬴感爵而輕身其味有宜城醪醴蒼梧縹清或秋藏冬發或春醖夏成或雲沸潮涌或素蟻浮萍爾乃王孫公子遊俠翺翔將承歡以接意㑹陵雲之朱堂獻酬交錯宴笑無方於是飲者並醉縱横諠譁或揚袂屢舞或扣劍清歌或嚬噈辭觴或奮爵横飛或歌驪駒既駕或稱朝露未晞於斯時也質者或文剛者或仁卑者忘賤窶者忘貧於是矯俗先生聞之而歎曰噫夫言何容易此乃淫荒之源非作者之事若耽於觴酌流情縱逸先王所禁君子所斥植橘賦有朱橘之珍樹於鶉大之遐鄉禀太陽之烈氣嘉杲日之休光體天然之素分不遷徙於殊方播萬里而遥植列銅爵之園庭背江洲之煖氣處𤣥朔之肅清邦換壤别爰幾喪生處彼不凋在此先零朱實不御焉得素榮惜寒暑之不均嗟華實之永乖仰凱風以傾葉冀炎氣之可懷颺鳴條以流響希越鳥之來栖夫靈徳之所感物無微而不和神盖幽而易激信地道之不訛既萌根而弗幹諒結葉而不華漸𤣥化而弗變非彰徳於邦家拊微條以歎息哀草木之難化芙蓉賦覽百卉之英茂無斯華之獨靈結修根於重壤泛清流而擢莖其始榮也皦若夜光尋扶桑其揚暉也晃若九陽出暘谷芙蓉蹇産菡萏星屬絲條垂珠丹榮吐綠焜焜韡韡爛若龍燭觀者終朝情猶未足於是狡童媛女相與同逰擢素手於羅袖接紅葩於中流槐賦羡良木之華麗爰獲貴於至尊慿文昌之華殿森列峙乎端門觀朱欀以振條據文陛而結根暢沈隂以溥覆似明后之垂恩在季春以初茂踐朱夏而乃繁覆陽精之炎景散流耀以増鮮神龜賦有序龜夀千嵗時有遺余龜者數日而死肌肉消盡唯甲存焉余感而賦之曰嘉四靈之建徳各潛位乎一方蒼龍虬於東嶽白虎嘯於西岡𤣥武集於寒門朱雀棲於南鄊順仁風以消息應聖時而後翔嗟神龜之竒物體乾坤之自然下夷方以則地上規隆而法天順隂陽以呼吸藏景曜於重泉餐飛塵以實氣飲不竭於朝露歩容趾以俯仰時鸞回而鶴顧忽萬載而不恤周無疆於太素感白龍之翔翥卒不免乎豫且雖見珍於宗廟罹刳剥之重辜欲愬怨於上帝將等愧乎㳺魚懼沈泥之逢殆赴芳蓮以巢居安𤣥雲而好静不淫翔而改度昔嚴周之抗節援斯靈而托喻嗟禄運之屯蹇終遇獲於江濱歸籠檻以幽處遭淳美之仁人晝顧瞻以終日夕撫順而接晨遘淫災以殞越命勦絶而不振天道昧而未分神明幽而難燭黄氏没於空澤喬松化於株木蛇折鱗於平臯龍蛻骨於深谷亮物類之遷化疑斯靈之解殻白鶴賦嗟皓麗之素鳥兮含竒氣之淑祥薄幽林以屏處兮䕃重景之餘光狹單巢於弱條兮懼衝風之難當無沙棠之逸志兮欣六翮之不傷承邂逅之僥倖兮得接翼於鸞凰同毛衣之氣類兮信休息之同行痛美㑹之中絶兮遘嚴災而逢殃共太息而祗懼兮抑吞聲而不揚傷本規之違忤悵離羣而獨處恒竄伏以窮栖獨哀鳴而戢羽冀大網之難結得奮翅而逺遊聆雅琴之清韻記六翮之末流鸚鵡賦美中州之令鳥越衆類之殊名感陽和而振翼遁太隂以存形遇旅人之嚴網殊六翮之無遺身挂滯於重籠孤雌鳴而獨歸豈予身之足惜憐衆雛之未飛分糜軀以潤鑊何全濟之敢希蒙含育之厚徳奉君子之光輝怨身輕而施重恐徃恵之中虧常戢心以懷懼雖處安其若危永哀鳴其報徳庶終來而不疲離繳雁賦有引余遊於武陵中有雁離繳不能復飛顧命舟人追而得之故憐而賦焉憐孤雁之偏特情惆焉而内傷尋淑類之殊異兮禀上天之休祥含中和之純氣赴四節而征行逺𤣥冬於南裔兮避炎夏於朔方白露凄以飛兮秋風發乎西商感節運之復至兮假魏道而翺翔接羽翮以南北兮情逸豫而永康望范氏之發機兮播纎繳以凌雲挂微軀之輕翼兮忽頽落而離羣旅暗驚而鳴逝兮徒矯首而莫聞甘充君之下厨膏函牛之鼎鑊䝉生全之顧覆何恩施之隆博於是縱軀歸命無慮無求饑食稻粱渇飲清流鶡賦有引鶡之為禽猛氣共鬭終無勝負期於必死遂賦之焉美遐圻之偉鳥生太行之巖阻體貞剛之烈性亮金徳之所輔戴毛角之雙立揚𤣥黄之勁羽其沈隕而重辱有節俠之儀矩降居檀澤髙處保岑遊不同嶺棲必異林若有翻雄駭逝孤雌驚翔則長鳴挑敵鼓翼専場踰髙越壑雙不隻僵階侍斯珥俯耀文墀成武官之首飾増庭燎之髙輝鷂雀賦鷂欲取雀雀自言雀微賤身體些小肌肉瘠瘦所得盖少君欲相噉實不足飽鷂得雀言初不敢語頃來轗軻資糧乏旅三日不食畧思死䑕今日相得寜復置汝雀得鷂言意甚怔營性命至重雀鼠貪生君得一食我命是傾皇天降監賢者是聼鷂得雀言意甚怛惋當死斃雀頭如果蒜不早首服烈頸大喚行人聞之莫不往觀雀得鷂言意甚不移目如擘椒跳蕭二翅我當死矣畧無可避鷂乃置雀良久方去二雀相逢似是公嫗相將入草共上一樹仍叙本末辛苦相語向者近出為鷂所捕賴我翻㨗體素便附說我辨語千條萬句欺恐舎長令兒大怖我之得免復勝於兎自今徙意莫復相妬蟬賦唯夫蟬之清素兮潛厥類乎太隂在盛陽之仲夏兮始逰豫乎芳林實澹泊而寡慾兮獨怡樂而長吟聲皦皦而彌厲兮似貞士之介心内含和而弗食兮與衆物而無求棲髙枝而仰首兮潄朝露之清流隠柔桑之稠葉兮快啁號以遁暑苦黄雀之作害兮患螳蜋之勁斧冀飄翔而逺托兮毒蜘蛛之網罟欲降身而卑竄兮懼草蟲之襲予免衆難而弗獲兮遥遷集乎宫宇依名果之茂隂兮托修幹以静處有翩翩之狡童兮歩容與於園圃體離朱之聰視兮姿才㨗於獼猿條罔葉而不挽兮樹無榦而不緣翳輕軀而奮進兮跪側足以自閑恐余身之驚駭兮精曾睨而目連持柔竿之冉冉兮運㣲黏而我纒欲翻飛而逾滯兮知性命之長捐委厥體於庖夫熾炎炭而就燔秋霜紛以宵下晨風烈其過庭氣憯怛而薄軀足攀木而失莖吟嘶啞以沮敗狀枯槁以喪形亂曰詩歎鳴蜩聲嘒嘒兮盛陽則來太隂逝兮皓皓貞素侔夷節兮帝臣是戴尚其潔兮蝙蝠賦吁何姦氣生茲蝙蝠形殊性詭每變常式行不由足飛不假翼眀伏暗動盡似䑕形謂鳥不似二足為毛飛而含齒巢不哺鷇空不乳子不容毛羣斥逐羽族下不蹈陸上不馮木遷都賦序余初封平原轉出臨淄中命鄄城遂徙雍丘改邑浚儀而末將適于東阿號則六易居實三遷連遇瘠土衣食不繼騷九詠芙蓉車兮桂衡結萍盖兮翠旌駟蒼虬兮翼轂駕陵魚兮驂鯨茵薦兮蘭席蕙幬兮苓牀抗南箕兮簸瓊蘃挹天河兮滌玉觴靈既降兮泊静黙登文階兮坐紫房服春榮兮猗靡雲裾繞兮容裔冠北辰兮岌峩帶長虹兮陵厲蘭肴御兮玉俎陳雅音奏兮文虞羅感漢廣兮羨游女揚激楚兮詠湘娥臨迴風兮浮漢渚目牽牛兮眺織女交有際兮㑹有期嗟痛吾兮來不時來無見兮進無聞泣下雨兮歎成雲先後悔其靡及冀后王之一悟猶搦轡而繁䇿馳覆車之危路羣秉舟而無檝將何川而能度何世俗之䝉昧悼邦國之未靜焚椒蘭其望治由倒裳而求領尋湘漢之長流採芳岸之靈芝遇逰女於水裔探菱花而結詞野蕭條以極望曠千里而無人民生期於必死何自苦以終身寜作清水之沈泥不為濁路之飛塵令黄初五年令夫逺不可知者天也近不可知者人也傳曰知人則哲堯猶病諸諺曰人心不同若其面焉唯女子與小人為難養也近之則不遜逺之則有怨詩云憂心悄悄愠于羣小自世間人或受寵而背恩或無故而入叛違顧左右曠然無信大嚼者咋斷其舌右手執斧左手親鉞傷夷一身之中尚有不可信况於人乎唯無深瑕潛釁隠過匿愆乃可以為人諺曰榖千駑不如養一驢又曰榖駑養虎大無益也乃知韓昭侯之敝袴良有以也使臣有三品有可以仁義化者有可以恩恵驅者不足以導之則當以刑罰使之刑罰復不足以率之則眀主所不畜故唐堯至仁不能容無益之子湯武至聖不能養無益之臣九折臂知為良醫吾知所以待下矣諸吏各敬爾在位推一槩之平功之宜賞於䟽必與罪之宜戮在親不赦此令之行有若皓日於戲羣臣其覽之哉黄初六年令身輕於鴻毛而謗重於泰山賴䝉帝王天地之仁違百司之典議舎三千之首戾反我舊居襲我初服雲雨之施焉有量哉孤以何功而納斯貺富而不恡寵至不驕者則周公其人也孤小人爾身更以榮為戚何者將恐簡易之尤出於細微脫爾之愆一朝復露也故欲修吾往業守吾初志欲使皇帝恩在摩天使孤心常存此地將以全陛下厚徳究孤犬馬之年此難能也然固欲行衆之難詩曰徳輶如毛鮮克舉之此之謂也寫灌均上事令孤前令寫灌均所上孤章三臺九府所奏事及詔書一通置之座隅孤欲朝夕諷詠以自警誡表求自試表臣植言臣聞士之生世入則事父出則事君事父尚於榮親事君貴於興國故慈父不能愛無益之子仁君不能畜無用之臣夫論徳而授官者成功之君也量能而受爵者畢命之臣也故君無虛授臣無虛受虛授謂之謬舉虛受謂之尸禄詩之素餐所由作也昔二虢不辭兩國之任其徳厚也旦奭不讓燕魯之封其功大也今臣䝉國重恩三世於今矣正值陛下升平之際沐浴聖澤潛潤徳教可謂厚幸矣而位竊東藩爵在上列身被輕煖口厭百味目極華靡耳倦絲竹者爵重禄厚之所致也退念古之受爵禄者有異於此皆以功勤濟國輔主恵民今臣無徳可述無功可紀若此終年無益國朝將挂風人彼其之譏是以上慙𤣥冕俯愧朱紱方今天下一統九州晏如顧西尚有違命之蜀東有不臣之吳使邊境未得脫甲謀士未得髙枕者誠欲混同宇内以致太和也故啓滅有扈而夏功昭成克商奄而周徳著今陛下以聖眀統世將欲卒文武之功繼成康之隆簡良授能以方叔召虎之臣鎮衛四境為國爪牙者可謂當矣然而髙鳥未挂於輕繳淵魚未懸於鈎餌者恐釣射之術或未盡也昔耿弇不俟光武亟擊張步言不以賊遺於君父也故車右伏劍於鳴轂雍門刎首於齊境若此二子豈惡生而尚死哉誠忿其慢主而凌君也夫君之寵臣欲以除患興利臣之事君必殺身静亂以功報主也昔賈誼弱冠求試屬國請係單于之頸而制其命終軍以妙年使越欲得長纓纓其王羈致北闕此二臣者豈好為夸主而曜世俗哉志或鬱結欲逞其才力輸能於明君也昔漢武為霍去病治第辭曰匃奴未滅臣無以家為夫憂國忘家捐軀濟難忠臣之志也今臣居外非不厚也而寢不安席食不遑味者以二方未尅為念伏見先帝武臣宿兵年耆即世者有聞矣雖賢不乏世宿將舊卒猶習戰陣竊不自量志在效命庶立毛髮之功以報所受之恩若使陛下出不世之詔效臣錐刀之用使得西屬大將軍當一校之隊若東屬大司馬統偏師之任必乘危蹈險騁舟奮驪突刃觸鋒為士卒先雖未能擒權馘亮庶將虜其雄率殱其醜類必效須㬰之㨗以滅終身之愧使名挂史筆事列朝䇿雖身分蜀境首懸吳闕猶生之年也如微才弗試沒世無聞徒榮其軀而豐其體生無益於事死無損於數虛荷上位而忝重祿禽息鳥視終於白首此徒圏牢之養物非臣之所志也流聞東軍失備師徒小衂輟食棄餐奮袂攘袵撫劍東顧而心已馳於吳㑹矣臣昔從先武皇帝南極赤岸東臨滄海西望玉門北出𤣥塞伏見所以行師用兵之勢可謂神妙矣故兵者不可豫言臨難而制變者也志欲自効於明時立功於聖世每覽史籍觀古忠臣義士出一朝之命以狥國家之難身雖屠裂而功銘著於景鍾名稱垂於竹帛未嘗不撫心而歎息也臣聞眀主使臣不廢有罪故犇北敗軍之將用而秦魯以成其功絶纓盗馬之臣赦而楚趙以濟其難臣竊感先帝早崩威王棄世臣獨何人以堪長久常恐先朝露填溝壑墳土未乾而身名並滅臣聞騏驥長鳴伯樂昭其能盧狗悲號韓國知其才是以效之齊楚之路以逞千里之任試之狡兎之㨗以驗搏噬之用今臣志狗馬之微功竊自惟度終無伯樂韓國之舉是以於悒而竊自痛者也夫臨博而企竦聞樂而竊抃者或有賞音而識道也昔毛遂趙之陪𨽻猶假錐囊之喻以寤主立功何况巍巍大魏多士之朝而無慷慨死難之臣乎夫自衒自媒者士女之醜行也干時求進者道家之明忌也而臣敢陳聞於陛下者誠與國分形同氣憂患共之者也冀以塵露之微補益山海螢燭末光増輝日月是以敢冒其醜而獻其忠必知為朝士所笑聖主不以人廢言伏惟陛下少垂神聴臣則幸矣求通親親表臣植言臣聞天稱其髙者以無不覆地稱其廣者以無不載日月稱其眀者以無不照江海稱其大者以無不容故孔子曰大哉堯之為君惟天為大惟堯則之夫天徳於萬物可謂𢎞廣矣盖堯之為教先親後疎自近及逺其傳曰克眀峻徳以親九族九族既睦平章百姓及周之文王亦崇厥化其詩曰刑于寡妻至于兄弟以御于家邦是以雍雍穆穆風人詠之昔周公弔管蔡之不咸廣封懿親以藩屏王室傳曰周之宗盟異姓為後誠骨肉之恩爽而不離親親之義寔在敦固未有義而後其君仁而遺其親者也伏惟陛下資帝唐欽眀之徳體文王翼翼之仁恵洽椒房恩昭九族羣臣百僚番休遞上執政不廢於公朝下情得展於私室親理之路通慶弔之情展誠可謂恕已治人推恵施恩者矣至於臣者人道絶緒禁錮眀時臣竊自傷也不敢過望交氣類修人事叙人倫近且婚媾不通兄弟永絶吉凶之問塞慶弔之禮廢恩紀之違甚於路人隔閡之異殊於胡越今臣以一切之制永無朝覲之望至於注心皇極結情紫闥神眀知之矣然天實為之謂之何哉退省諸王常有戚戚具爾之心願陛下沛然垂詔使諸國慶問四節得展以叙骨肉之歡恩全怡怡之篤義妃妾之家膏沐之遺嵗得再通齊義於貴宗等恵於百司如此則古人之所歎風雅之所詠復存於聖世矣臣伏自惟省無錐刀之用及觀陛下之所拔授若以臣為異姓竊自料度不後於朝士矣若得辭逺遊戴武弁解朱組佩青紱駙馬奉車趣得一號安宅京室執鞭珥筆出從華盖入侍輦轂承答聖問拾遺左右乃臣丹情之至願不離於夢想者也逺慕鹿鳴君臣之宴中詠棠棣匪他之誡下思伐木友生之義終懷蓼莪罔極之哀每四節之㑹塊然獨處左右唯僕𨽻所對唯妻子髙談無所與陳發義無所與展未嘗不聞樂而拊心臨觴而歎息也臣伏以為犬馬之誠不能動人譬人之誠不能動天崩城隕霜臣初信之以臣心况徒虛語耳若葵藿之傾葉太陽雖不為之迴光然終向之者誠也臣竊自比葵藿若降天地之施垂三光之眀者寔在陛下臣聞文子曰不為福始不為禍先今之否隔友于同憂而臣獨唱言者何也竊不願於聖代使有不䝉施之物有不䝉施之物必有惨毒之懷故栢舟有夭只之怨谷風有棄予之歎伊尹恥其君不為堯舜孟子曰不以舜之所以事堯事其君者不敬其君者也臣之愚蔽固非虞伊至於欲使陛下崇光被時雍之美宣緝熙章眀之徳者是臣慺慺之誠竊所獨守寔懷鶴立企佇之心敢復陳聞者冀陛下儻發天聰而垂神聴也陳審舉表臣聞天地協氣而萬物生君臣合徳而庶政成五帝之世非皆智三季之末非皆愚用與不用知與不知也既時有舉賢之名而無得賢之實必各援其類而進矣諺曰相門有相將門有將夫相者文徳昭者也將者武功烈者也文徳昭則可以匡國朝致雍熙稷契䕫龍是也武功烈則可以征不庭威四夷南仲方叔是矣昔伊尹之為媵臣至賤也吕尚之處屠釣至陋也及其見舉於湯武周文誠道合志同𤣥謨神通豈復假近習之薦因左右之介哉書曰有不世之君必能用不世之臣用不世之臣必能立不世之功殷周二王是矣若夫齷齪近歩遵常守故安足為陛下言哉故隂陽不和三光不暢官曠無人庶政不整者三司之責也疆埸騒動方隅内侵没軍喪衆干戈不息者邊將之憂也豈可虛荷國寵而不稱其任哉故任益隆者負益重位益髙者責益深書稱無曠庶官詩有職思其憂此其義也陛下體天真之淑聖登神機以繼統冀聞康哉之謌偃武行文之美而數年以來水旱不時民困衣食師徒之發嵗嵗増調加東有覆敗之軍西有殪沒之將至使蚌蛤浮翔於淮泗鼲鼬讙譁於林木臣每念之未嘗不輟食而揮餐臨觴而搤腕矣昔漢文發代疑朝有變宋昌曰内有朱虛東牟之親外有齊楚淮南琅琊此則磐石之宗願王勿疑臣伏惟陛下逺覽姬文二虢之援中慮周成召畢之輔下存宋昌磐石之固昔騏驥之於吳阪可謂困矣及其伯樂相之孫郵御之形體不勞而坐致千里盖伯樂善御馬眀君善御臣伯樂馳千里眀君致太平誠任賢使能之眀效也若朝司惟良萬機内理武將行師方難克弭陛下可得雍容都城何事勞動鑾駕暴露於邊境哉臣聞羊質虎皮見草則悅見豺則戰忘其皮之虎也今置將不良有似於此故語曰患為之者不知知之者不得為也昔樂毅奔趙心不忘燕亷頗在楚思為趙將臣生乎亂長乎軍又數承教於武皇帝伏見行師用兵之要不必取孫吳而闇與之合竊揆之於心常願得一奉朝覲排金門蹈玉陛列有職之臣賜須㬰之問使臣得一散所懷攄舒藴積死不恨矣被鴻臚所下發士息書期㑹甚急又聞豹尾已建戎軒騖駕陛下將復勞玉躬擾挂神思臣誠竦息不遑寜處願得䇿馬執鞭首當塵露撮風后之竒接孫吳之要追慕卜商起予左右效命先驅畢命輪轂雖無大益冀有小補然天髙聴逺情不上通徒獨望青雲而拊心仰髙天而歎息耳屈平曰國有驥而不知乗焉皇皇而更索昔管蔡放誅周召作弼叔魚䧟刑叔向匡國三監之釁臣自當之二南之輔求不必逺華宗貴族藩王之中必有應斯舉者故傳曰無周公之親不得行周公之事唯陛下少留意焉近者漢氏廣建藩王豐則連城數十約則饗食祖宗而巳未若姬周之樹國五等之品制也若扶蘇之諫始皇淳于越之難周青臣可謂知時變矣夫能使天下傾耳注目者當權者是矣故謀能移主威能懾下豪右執政不在親戚權之所在雖疏必重勢之所去雖親必輕盖取齊者田族非吕宗也分晉者趙魏非姬姓也惟陛下察之茍吉専其位凶離其患者異姓之臣也欲國之安祈家之貴存共其榮没同其禍者公族之臣也今反公族疏而異姓親臣竊惑焉臣聞孟子曰君子窮則獨善其身達則兼善天下今臣與陛下踐冰履炭登山浮澗寒温燥濕髙下共之豈得離陛下哉不勝憤懣拜表陳情若有不合乞且藏之書府不便滅棄臣死之後事或可思若有毫釐少挂聖意者乞出之朝堂使夫博古之士糾臣表之不合義者如是則臣願足矣諌取諸國士息表臣聞古者聖君與日月齊其眀四時等其信是以戮凶無重賞善無輕怒若驚霆喜若時雨恩不中絶教無二可以此臨朝則臣下知所死矣受任在萬里之外審主之所以受官必已之所以投命雖有搆㑹之徒泊然不以為懼者盖君臣相信之眀效也昔章子為齊將人有告之反者威王曰不然左右曰王何以眀之王曰聞章子不改𦵏其母彼尚不欺死父顧當叛生君乎此君之信臣也昔管仲親射桓公後幽囚從魯檻車載使少年挽而送齊管仲知桓公之必用巳懼魯之悔謂少年曰吾為汝唱汝為和聲和聲宜走於是管仲唱之少年走而和之日行數百里宿昔而至至則相齊此臣之信君也臣初受封䇿書曰植受兹青社封於東土以屏翰皇家為魏藩輔而所得兵百五十人皆年在耳順或不踰矩虎賁官騎及親事凡二百餘人正復不老皆使年壯備有不虞檢校乗城顧不足以自救况皆復耄耋罷曳乎而名為魏東藩使屏翰王室臣竊自羞矣就之諸國國有士子合不過五百人伏以為三軍益損不復賴此方外不定必當須辦者臣願將部曲倍道奔赴夫妻負襁子弟懷糧蹈鋒履刃以狥國難何但習業小兒哉愚誠以揮涕増河鼷䑕飲海於朝萬無損益於臣家計甚有廢損又臣士息前後三送兼人巳竭惟尚有小皃七八嵗巳上十六七巳還三十餘人今部曲皆年耆卧在牀席非糜不食眼不能視氣息裁屬者凡三十七人疲瘵風靡疣盲聾瞶者二十三人惟正須此小兒大者可備宿衛雖不足以禦宼粗可以警小盜小者未堪大使為可使耘鉏穢草驅䕶鳥雀休候人則一事廢一日獵則衆業散不親自經營則功不攝常自躬親不委下吏而巳陛下聖仁恩詔三至士子給國長不復發眀詔之下有若皦日保金石之恩必眀神之信畫然自固如天如地今習業者並復見送晻若晝晦悵然失圖伏以為陛下既爵臣百寮之右居藩國之任為置卿士屋名為宫冢名為陵不使其危居獨立無異於凡庶若柏成欣於野耕子仲樂於灌園蓬戸茅牖原憲之宅也陋巷簞瓢顔子之居也臣才不見效用常慨然執斯志焉若陛下聴臣悉還部曲罷官屬省監官使解璽釋紱追柏成子仲之業營顔淵原憲之事居子臧之廬宅延陵之室如此雖進無成功退有可守身死之日猶松喬也然伏度國朝終未肯聴臣之若是固當羈絆於世繩維繫於禄位懷屑屑之小憂執無巳之百念安得蕩然肆志逍遥於宇宙之外哉此願未從陛下必欲崇親親篤骨肉潤白骨而榮枯木者惟遂仁徳以副前恩諌伐遼東表臣伏以遼東負阻之國勢便形固帶以遼海今輕車逺攻師疲力屈彼有其備所謂以逸待勞以飽制饑者也以臣觀之誠未易攻也若國家攻之而必克屠襄平之城懸公孫之首得其地不足以償中國之費虜其民不足以補三軍之失是我所獲不如所喪也若其不拔曠日持久暴師於野然天時不測水濕無常彼我之兵連於城下進則有髙城深池無所施其功退則有歸途不通道路瀐洳東有待釁之吳西有伺隙之蜀吳起東南則荆揚騷動蜀應西境則雍凉三分兵不解於外民罷困於内促耕不解其饑疾蠶不救其寒夫渇而後穿井饑而後殖種可以圖逺難以應卒也臣以為當今之務在於省徭役薄賦歛勤農桑三者既備然後令伊管之臣得施其術孫吳之將得奮其力若此則太平之基可立而待康哉之歌可坐而聞曽何憂於二敵何懼於公孫乎今不息邦畿之内而勞神於蠻貊之域竊為陛下不取也慶文帝受禪表陛下以聖徳龍飛順天革命允答神符誕作民主乃祖先后積徳累仁世濟其美以暨於先王勤恤民隠劬勞戮力以除其害經營四方不遑啓處是用隆茲福慶光啓於魏陛下承統贊成前緒克廣徳音綏静内外紹先周之舊跡襲文武之懿徳保大定功海内為一豈不休哉慶受禪上禮表陛下以眀聖之徳受天顯命良辰即祚以臨天下洪化宣流洋溢宇内是以普天率土莫不承風欣慶執贄奔走奉賀闕下况臣親體至戚懷歡踊躍龍見賀表臣聞鳯凰復見於鄴南黄龍雙出於清泉聖徳至理以致嘉瑞將棲鳯於林囿豢龍於陂池為百姓旦夕之所觀初封安鄉侯表臣抱罪即道憂惶恐怖不知刑罪當所限齊陛下哀愍臣身不聴有司所執待之過厚即日於延津受安鄉侯印綬奉詔之日且懼且悲懼於不修始違憲法悲於不慎速此貶退上増陛下垂念下遺太后見憂臣自知罪深責重受恩無量精魄飛散忘軀殞命封甄城王謝表臣愚駑垢穢才質疵下過受陛下日月之恩不能摧身碎首以答陛下厚徳而狂悖發露始干天憲自分放棄抱罪終身茍貪視息無復晞幸不悟聖恩爵以非望枯木生葉白骨更肉非臣罪戾所當宜䝉俯仰慙惶五内戰悸奉詔之日悲喜㕘至雖因拜章陳答聖恩下情未展轉封東阿王謝表奉詔太皇太后念雍丘下濕少桑欲轉東阿當合王意可遣人按行知可居不奉詔之日伏増悲喜臣以無功虛荷國恩爵尊禄厚用無益於時脂車秣馬志在黜放不圖陛下天父之恩猥宣皇太后慈母之念遷之陛下幸為久長計聖㫖惻隠恩過天地臣在雍丘劬勞五年左右罷怠居業向定園果萬株枝條始茂私情區區實所重棄然桑田無業左右貧窮食裁餬口形有躶露臣聞古之仁君必有棄國以為百姓况乃轉居沃土人從蒙福江海所流無地不潤雲雨所加無物不茂若陛下念臣入從五年之勤少見佐助此枯木生華白骨更肉非臣之敢望也饑者易食寒者易衣臣之謂矣謝妻改封陳妃表璽書今以東阿王妃為陳王妃并下印綬因故上前所假印以其拜授書以即日到臣輒奉詔拜其才質低下謬同受私遇寵素餐臣為其首陛下體乾坤育物之徳東海含容之大乃復隨例顯封大國光揚章灼非臣負薪之才所宜克當非臣穢釁所宜䝉獲夙夜憂歎念報罔極洪施遂隆既榮枝榦猥復正臣妃為陳妃光耀宣朗非妾婦惷愚所當蒙被葵藿草物猶感恩養况臣含氣銜佩𢎞恵殁而後巳誠非翰墨屢辭所能報答謝入覲表臣得出幽屏之城獲覲百官之美此一喜也背茅茨之陋登閶闔之闥此二喜也必以有靦之容瞻見穆穆之顔此三喜也將以檮杌之質禀受崇聖之訓此四喜也又不世之命非所致思有若披浮雲而覩白日出幽谷而登喬木目希庭燎心存泰極謝周觀表詔使周觀初玩雲盤北觀䟽圃遂歩九華神眀特處譎詭天然誠可謂帝室皇居者矣雖崑崙閬風之麗文昌之居不是過也謝眀帝賜食表近得賜御食拜表謝恩尋奉手詔愍臣瘦弱奉詔之日涕泣横流雖文武二帝所以愍憐於臣不復過於眀詔謝賜柰表即夕殿中虎賁宣詔賜臣等冬柰一奩詔賜使温啖夜非食時而賜見及柰以夏熟今則冬至物以非時為珍恩以絶口為厚非臣等所宜荷之謝鼓吹表許以簫管之樂榮以田游之嬉陛下仁重有虞恩過周旦濟世安宗實在聖徳答眀帝詔表奉詔所作故平原公主誄文義相扶章章殊興句句感切上責躬詩表臣植言臣自抱釁歸藩刻肌刻骨追思罪戾晝分而食夜分而寢誠以天網不可重罹聖恩難可再恃竊感相䑕之篇無禮遄死之義形影相弔五情愧赧以罪棄生則違古賢夕改之勸忍垢茍全則犯詩人胡顔之譏伏惟陛下徳象天地恩隆父母施暢春風澤如時雨是以不别荆棘者慶雲之恵也七子均養者鳲鳩之仁也舎罪責功者眀君之舉也矜愚愛能者慈父之恩也是以愚臣徘徊於恩澤而不敢自棄者也前奉詔書臣等絶朝心離志絶自分黄耉永無執圭之望不圖聖詔猥垂齒召至止之日馳心輦轂僻處西館未奉闕廷踊躍之懷瞻望反側不勝犬馬戀主之情謹拜表并獻詩二首詞㫖淺末不足採覽貴露下情冒顔以聞上卞太后誄表大行皇太后資坤元之性體載物之仁齊美姜嫄等徳任姒佐政内朝恵加四海草木荷恩含氣受潤庶鍾元吉承育萬祚何圖一旦早棄眀朝背絶臣庶悲痛靡告臣聞銘以述徳誄尚及哀是以冒越諒闇之禮作誄一篇知不足讃揚眀貴以展臣蓼莪之思憂荒情散不足觀采上先帝賜鎧表先帝賜臣鎧黒光眀光各一領兩當鎧一領今代巳昇平兵革無事乞悉以付鎧曹自理冬至獻襪履表伏見舊儀國家冬至獻履貢襪所以迎福踐長先臣或為之頌臣既玩其嘉藻願述朝慶千載昌期一陽嘉節四方交泰萬彚昭蘇亞歲迎祥履長納慶不勝感節情繫帷幄拜表奉賀并獻紋履七量襪若干副茅茨之陋不足以入金門登玉臺也獻璧表臣聞玉不隠瑕臣不隠情伏知所進非和氏之璞萬國之幣璧為充貢獻馬表臣於先武皇帝世得大宛紫騂一疋形法應圖善持頭尾教令習拜今輒巳能又能行與鼓節相應謹以表奉獻獻牛表臣聞物以洪珍細亦或貴故不見僬僥之微不知泱漭之泰不見果下之乗不别龍馬之大髙下相懸所以致觀也謹奉牛一頭不足追遵大小之制形少有殊敢不獻上請招降江東表臣聞士之羨永生者非徒以甘食麗服宰割萬物而巳將有以補益羣生尊主恵民使功存於竹帛名光於後嗣今臣文不昭於俎豆武不習於干戈而竊位藩王施禄東夏消損天日無益聖朝淮南尚有山竄之賊吳㑹猶有潛江之虜使戰士未獲歸於農畝五兵未得收於武庫盖善論者不恥謝善戰者不羞走夫凌雲者泥蟠者也後伸者先屈者也是以神龍以為徳尺蠖以昭義昔湯事葛文王事昆夷固仁者能以大事小若陛下遣眀哲之使繼能陸賈之蹤者使之江南發愷悌之詔眀日月之信開以降路權必奉承聖化斯不疑也請用賢表舊集割裂審舉表蒙此之前名曰又請自試表今正之昔叚干木修徳於閭閻秦師為之輟攻而文侯以安穰苴授節於邦境燕晉為之退師而景公無患皆簡徳尊賢之所致也願陛下垂髙宗傅巖之眀以顯中興之功望恩表臣聞寒者不貪尺玉而思短褐饑者不願千金而美一餐夫千金尺玉至貴而不若一餐短褐者物有所急也請祭先王表自計違逺以來有踰旬日垂竟夏節方到臣悲傷有心先王公夏至日終是以家俗不以夏日祭至於先王自可以今辰告祠臣雖卑鄙實禀體於先王自臣雖貧窶䝉陛下厚賜足供太牢之具臣欲祭先王於北河之上羊猪牛臣能自辦者臣縣自有先王喜鰒臣前以表得徐州臧霸二鰒百枚足自供事請水𤓰五枚計先王崩來未能半嵗臣實欲告敬且欲復盡哀請赴元正表欣豫百官之美想見朝覲之禮耳存九成目想率舞作車帳表欲遣人到鄴市上黨布五十疋作車上小帳帷謁者不聽乞田表乞城内及城邊好田盡所賜百年力者臣雖生自至尊然心甘田野性樂稼穡獵表於七月伏鹿鳴塵四月五月射雉之際此正樂獵之時歐冶表昔歐冶改視鉛刀易價伯樂所盼駑馬百倍上銀鞍表於先武帝世勅此銀鞍一具初不敢乗謹奉上謝賜穀表詔書念臣經用不足以船河邸閣榖五千斛賜臣章改封陳王謝章臣既弊陋守國無効自分削黜以彰衆誡不意天恩滂霈潤澤横流猥蒙加封茅土既優爵賞必重非臣虛淺所宜奉受非臣灰身所能報答封二子為公謝恩章詔書封臣息男苗為髙陽鄉公志為穆鄉公臣伏自惟文無升堂廟勝之功武無摧鋒接刃之効天時運幸得生貴門遇以親戚少荷光寵竊位列侯榮曜當世顧影慚形流汗反側洪恩罔極雲雨増加既榮本榦枝葉并蒙苖志小豎既頑且稚猥荷列爵並佩金紫施崇所加恵及父子書與楊徳祖書植白數日不見思子為勞想同之也僕少小好為文章迄至於今二十有五年矣然今世作者可畧而言也昔仲宣獨歩於漢南孔璋鷹揚於河朔偉長擅名於青土公幹振藻於海隅徳璉發跡於北魏足下髙視於上京當此之時人人自謂握靈蛇之珠家家自謂抱荆山之玉吾王於是設天網以該之頓八紘以掩之今悉集茲國矣然此數子猶復不能飛軒絶跡一舉千里也以孔璋之才不閑於辭賦而多自謂能與司馬長卿同風譬畫虎不成反為狗者也前有書嘲之反作論盛道僕讃其文夫鍾期不失聴於今稱之吾亦不能妄歎者畏後世之嗤余也世人著述不能無病僕常好人譏彈其文有不善者應時改定昔丁敬禮嘗作小文使僕潤飾之僕自以才不過若人辭不為也敬禮謂僕卿何所疑難文之佳惡吾自得之後世誰相知定吾文者邪吾常歎此達言以為美談昔尼父之文辭與人通流至於制春秋游夏之徒乃不能措一辭過此而言不病者吾未之見也盖有南威之容乃可以論於淑媛有龍淵之利乃可以議於㫁割劉季緒才不能逮於作者而好詆訶文章掎摭利病昔田巴毁五帝罪三王呰五霸於稷下一旦而服千人魯連一說使終身杜口劉生之辯未若田氏今之仲連求之不難可無歎息乎人各有好尚蘭茝蓀蕙之芳衆人之所好而海畔有逐臭之夫咸池六莖之發衆人所共樂而墨翟有非之之論豈可同哉今徃僕少小所著辭賦一通相與夫街談巷說必有可采擊轅之歌有應風雅匹夫之思未易輕棄也辭賦小道固未足以揄揚大義彰示來世也昔揚子雲先朝執㦸之臣耳猶稱壯夫不為也吾雖薄徳位為藩侯猶庶幾戮力上國流恵下民建永世之業流金石之功豈徒以翰墨為勲績辭賦為君子哉若吾志未果吾道不行則將採史官之實録辨時俗之得失定仁義之衷成一家之言雖未能藏之於名山將以傳之於同好非要之皓首豈以今日之論乎其言之不慚恃恵子之知我也眀早相迎書不盡懷曹植白與吳質書植白季重足下前日雖因常調得為宻坐雖讌飲彌日其於别逺㑹稀猶不盡其勞積也若夫觴酌陵波於前簫笳發音於後足下鷹揚其體鳯觀虎視謂蕭曹不足儔衛霍不足侔也左顧右眄謂若無人豈非君子壯志哉過屠門而大嚼雖不得肉實且快意當斯之時願舉泰山以為肉傾東海以為酒伐雲夢之竹以為笛斬泗濱之梓以為箏食若填巨壑飲若灌漏巵其樂固難量豈非大丈夫之樂哉然日不我與曜靈急節面有逸景之速别有參商之濶思欲抑六龍之首頓羲和之轡折若木之華閉濛氾之谷天路髙邈良無由縁懷戀反側如何如何得所來訊文采委曲曄若春榮瀏若清風申詠反覆曠若復面其諸賢所著文章想還所治復申詠之也可令憙事小史諷而誦之夫文章之難非獨今也古之君子猶亦病諸家有千里驥而不珍焉人懷盈尺和氏而無貴矣夫君子而不知音樂古之達論謂之通而蔽墨翟不好伎何為過朝歌而迴車乎足下好伎而正值墨氏迴車之縣想足下助我張目也又聞足下在彼自有佳政夫求而不得者曰有之矣未有不求而自得者也且改轍而行非良樂之御易民而治非楚鄭之政願足下勉之而巳矣適對嘉賓口授不悉往來數相聞曹植白與司馬仲達書今賊徒欲保江表之城守區區之吳爾無有争雄於宇内角勝於平原之志也故其俗盖以洲渚為營壁江淮為城塹而巳若可得挑致則吾一旅之卒足以敵之矣盖弋鳥者矯其矢釣魚者理其綸此皆度彼為慮因象設宜者也今足下曽無矯矢理綸之謀徒欲候其離舟伺其登陸乃圖并吳㑹之地収東野之民恐非主上授節將軍之心也與陳琳書夫披翠雲以為衣戴北斗以為冠帶虹蜺以為紳連日月以為佩此服非不美也然而帝王不服者望殊於天志絶於心矣與丁敬禮書頃不相聞覆相聲音亦為怪故乘興為書含欣而秉筆大笑而吐辭亦歡之極也答崔文始書臨江直釣不獲一鱗非江魚之不食其所餌之者非也是以君子慎舉擢序前録自序故君子之作也儼乎若髙山勃乎若浮雲質素也如秋蓬摛藻也如春葩氾乎洋洋光乎皜皜與雅頌爭流可也余少而好賦其所尚也雅好慷慨所著繁多雖觸類而作然蕪穢者衆故刪定别撰為前録七十八篇栁頌序予以閒暇駕言出遊過友人楊徳祖之家視其屋宇寥廓庭中有一柳樹聊戲刋其枝葉故著斯文表之遺翰遂因辭勢以譏當今之士酈生頌序余道經酈生之墓聊駐書此文于其碑側七七啓昔枚乗作七發傅毅作七激張衡作七辯崔駰作七依辭各美麗予有慕之焉遂作七啓并命王粲作焉𤣥微子隠居大荒之庭飛遯離俗澄神定靈輕禄傲貴與物無營耽虛好静羨此永生獨馳思乎天雲之際無物象而能傾於是鏡機子聞而將往說焉駕超野之駟乗追風之輿經逈漠出幽墟入乎泱漭之野遂届𤣥微子之所居其居也左激水右髙岑背洞壑對芳林冠皮弁被文裘出山岫之潛穴倚峻崖而嬉游志飄飄焉嶤嶤焉似若狹六合而隘九州若將飛而未逝若舉翼而中留於是鏡機子攀葛藟而登距嵒而立順風而稱曰予聞君子不遯俗而遺名智士不背世而滅勲今吾子棄道藝之華遺仁義之英耗精神乎虛廓廢人事之紀經譬若畫形於無象造響於無聲未之思乎何所規之不通也𤣥微子俯而應之曰嘻有是言乎夫太極之初混沌未分萬物紛錯與道俱隆盖有形必朽有跡必窮茫茫元氣誰知其終名穢我身位累我躬竊慕古人之所志仰老莊之遺風假靈龜以托喻寧掉尾於塗中鏡機子曰夫辯言之艷能使窮澤生流枯木發榮庶感靈而激神况近在乎人情僕將為吾子說遊觀之至娱演聲色之妖靡論變化之至妙敷道徳之𢎞麗願聞之乎𤣥微子曰吾子整身倦世探隠拯沈不逺遐路幸見光臨將敬滌耳以聴玉音鏡機子曰芳菰精粺霜蓄露葵𤣥熊素膚肥豢膿肌蟬翼之割剖纎析微累如疊縠離若散雪輕隨風飛刃不轉切山鵽斥鷃珠翠之珍搴芳蓮之巢龜膾西海之飛鱗臛江東之潛鼉臇漢南之鳴鶉糅以芳酸甘和既醇𤣥㝠適鹹蓐收調辛紫蘭丹椒施和必節滋味既殊遺芳射越乃有春清縹酒康狄所營應化則變感氣而成彈徴則苦發扣宫則甘生於是盛以翠樽酌以雕觴浮蟻鼎沸酷烈馨香可以和神可以娛腸此肴饌之妙也子能從我而食之乎𤣥微子曰予甘藜藿未暇此食也鏡機子曰歩光之劍華藻繁縟飾以文犀雕以翠綠綴以驪龍之珠錯以荆山之玉陸㫁犀象未足稱雋隨波截鴻水不漸刃九旒之冕散曜垂文華組之纓從風紛紜佩則結緑懸黎寳之妙微符采照爛流景揚輝黼黻之服紗縠之裳金華之舄動趾遺光繁飾參差微鮮若霜緄佩綢繆或彫或錯薰以幽若流芳肆布雍容閒步周旋馳耀南威為之解顔西施為之巧笑此容飾之妙也子能從我而服之乎𤣥微子曰予好毛褐未暇此服也鏡機子曰馳騁足用蕩思逰獵可以娱情僕將為吾子駕雲龍之飛駟飾玉輅之繁纓垂宛虹之長緌抗招摇之華旍揷忘歸之矢秉繁弱之弓忽躡景而輕騖逸犇驥而超遺風於是磎填谷塞榛藪平夷緣山置罝彌野張罘下無漏跡上無逸飛鳥集獸屯然後㑹圍獠徒雲布武騎霧散丹旗燿野戈殳晧旰曳文狐掩狡兎捎鷫鷞拂振鷺當軌見藉值足遇踐飛軒電逝獸隨輪轉翼不暇張足不及騰動觸飛鋒舉挂輕罾捜林索險探薄窮阻騰山赴壑風厲焱舉機不虛發中必飲羽於是人稠網宻地逼勢脇哮闞之獸張牙奮鬛志在觸突猛氣不慴乃使北宫東郭之儔生抽豹尾分裂貙肩形不抗手骨不隠拳批熊碎掌拉虎摧斑野無毛類林無羽羣積獸如陵飛翮成雲於是駴鐘鳴鼓收旌弛斾頓綱縱網羆獠回邁駿騄齊驤揚鑾飛沫俯倚金較仰撫翠盖雍容暇豫娱志方外此羽獵之妙也子能從我而觀之乎𤣥微子曰予性樂恬静未暇此觀也鏡機子曰閒宫顯敞雲屋晧旰崇景山之髙基迎清風而立觀彤軒紫柱文榱華梁綺井含葩金墀玉廂温房則冬服絺綌清室則中夏含霜華閣縁雲飛陛凌虚俯眺流星仰觀八隅升龍攀而不逮𦕈天際而髙居繁巧神怪變名異形班輸無所措其斧斤離婁為之失睛麗草交植殊品詭類綠葉朱榮熙天曜日素水盈沼叢木成林飛翮陵髙鱗甲隠深於是逍遥暇豫忽若忘歸乃使任子垂釣魏氏發機芳餌沈水輕繳弋飛落翳雲之翔鳥援九淵之靈龜然後採菱花擢水蘋弄蛛蜯戲鮫人諷漢廣之所詠覿遊女於水濱燿神景於中沚被輕縠之纎羅遺芳烈而静步抗皓手而清歌歌曰望雲際兮有好仇天路長兮往無由佩蘭蕙兮為誰修嬿婉絶兮我心愁此宫館之妙也子能從我而居之乎𤣥微子曰予耽巖穴未暇此居也鏡機子曰既遊觀中原逍遥閒宫情放志蕩淫樂未終亦將有才人妙妓遺世越俗揚北里之流聲紹陽阿之妙曲爾乃御文軒臨洞庭琴瑟交揮左篪右笙鐘鼔俱振簫管齊鳴然後姣人乃被文縠之華袿振輕綺之飄颻戴金摇之熠燿揚翠羽之雙翹揮流芳燿飛文歴盤鼔煥繽紛長裾隨風悲歌入雲蹻㨗若飛蹈虛逺蹠陵躍超驤蜿蟬揮霍翔爾鴻翥濈然鳬没縱輕體以迅赴景追形而不逮飛聲激塵依違厲響才㨗若神形難為象於是為歡未渫白日西頽散樂變飾微步中閨𤣥眉弛兮鉛華落收亂髮兮拂蘭澤形媠服兮揚幽若紅顔宜笑睇眄流光時與吾子攜手同行踐飛除即閒房華燭爛幄幕張動朱脣發清商揚羅袂振華裳九秋之夕為歡未央此聲色之妙也子能從我而逰之乎𤣥微子曰予願清虛未暇此逰也鏡機子曰予聞君子樂奮節以顯義烈士甘危軀以成仁是以雄俊之徒交黨結倫重氣輕命感分遺身故田光伏劍於北燕公叔畢命於西秦果毅輕斷虎步谷風威慴萬乗華夏稱雄詞未及終而𤣥微子曰善鏡機子曰此乃逰俠之徒耳未足稱妙也若夫田文無忌之儔乃上古之俊公子也皆飛仁揚義騰躍道藝逰心無方抗志雲際陵轢諸侯驅馳當世揮袂則九野生風慷慨則氣成虹蜺吾子若當此之時能從我而友之乎𤣥微子曰予亮願焉然方於大道有累如何鏡機子曰世有聖宰翼帝霸世同量乾坤等曜日月𤣥化參神與靈合契恵澤播於黎苗威靈振乎無外超隆平於殷周踵羲皇而齊泰顯朝惟清王道遐均民望如草我澤如春河濱無洗耳之士喬嶽無巢居之民是以俊乂來仕觀國之光舉不遺材進各異方讃典禮於辟雍講文徳於明堂正流俗之華說綜孔氏之舊章散樂移風國富民康神應休臻屢獲嘉祥故甘露紛而晨降景星宵而舒光觀遊龍於神淵聆鳴鳯於高岡此霸道之至隆而雍熙之盛際然主上猶尚以沈恩之未廣懼聲教之未厲采英竒於仄陋宣皇眀於巖穴此寗子商歌之秋而吕望所以投綸而逝也吾子為太和之民不欲仕陶唐之世乎於是𤣥微子攘袂而興曰偉哉言乎近者吾子所述華淫欲以厲我祗攪子心至聞天下穆清眀君莅國覽盈虚之正義知頑素之迷惑令予廓爾身輕若飛願反初服從子而歸七咨素氷象玉難可磨蕩結土成龍遭雨則傷論魏徳論元氣否塞𤣥黄噴薄辰星亂逆隂陽舛錯四海鼎沸蕭條沙漠武皇之興也以道陵殘義氣風發神戈退指則妖氛順制靈旗一舉則朝陽播越惟我聖后神武盖天威光佐掃辰彗北蠻首尾爭擊氣齊率然乃電北席巻千里隠乎若崩嶽旰乎若潰海愠彼蠻夏蠢爾弗恭脂我蕭斧簡武練鋒星陳而天運振耀乎南封荆人風靡交益影從軍藴餘勢襲利乗權蕩鬼區於白水擒矯制乎遐川仰屬目於條支睎弱水之潺湲薄張騫於大夏笑驃騎於祁連其化之也如神其養之也如春柔逺能邇誰敢不賓憲度増飾日曜月光跡存乎建安道隆乎延康於是漢氏歸義顧音孔昭顯禪天位希唐效堯上猶謙謙弗納也發不世之明詔薄皇居而弗泰蹈北人之清節美石戸之髙介義貫金石神眀巳興神祇致祥乾靈効祜於是羣公卿士功臣列辟率爾而進曰昔文王三分居二以服事殷非能之而弗欲盖欲之而弗能况天網弗禁皇綱圯紐侯民非復漢萌尺土非復漢有故武皇創迹於前陛下光美於後盖所謂勲成於彼位定於此者也將使斯民播秬鬯植靈芝鋤岐穂挹醴滋遂乃凱風回焱甘露匝時農夫詠於田隴織婦欣而綜絲黄吻之齓含哺而怡鮐背之老擊壤而嬉古雖稱乎赫胥曷若斯之大治乎於時上富於春秋聖徳汪濊竒志妙思神鑒靈察方將審御隂陽爭耀日月極禎祥於遐奥飛仁風以樹恵既逰精於萬機探幽洞深復逍遥乎六藝兼覽儒林抗思乎文藻之場囿容與乎道術之疆畔超天路而髙峙階清雲以妙觀將參跡於三皇豈徒論功於大漢天地位矣九域清矣皇化四逹帝猷成矣眀哉元首股肱貞矣禮樂既作興頌聲矣因封泰山禪梁甫歴名山以祈福周五方之靈宇越八九於往素踵帝王之靈矩流餘祚於黎烝鍾元吉乎聖主漢二祖優劣論有客問予曰夫漢二帝髙祖光武俱為受命撥亂之君比時事之難易論其人之優劣孰者為先予應之曰昔漢之初興髙祖因暴秦而起遂誅强楚光有天下功齊湯武業流後嗣誠帝王之元勲人君之盛事也然而名不繼徳行不純道身没之後崩亡之際果令凶婦肆酖酷之心嬖妾被人豕之刑亡趙幽囚禍殃骨肉諸吕専權社稷幾移凡此諸事豈非髙祖寡計淺慮以致然彼之雄材大畧俶儻之節信當世至豪健壯傑士也又其梟將畫臣皆古今之鮮有歴世之希覩彼能任其才而用之聴其言而察之故兼天下有帝位流巨勲而遺元功也世祖體乾靈之休徳禀貞和之純精通黄中之妙理韜亞聖之懿才其為徳也通達而多識仁智而眀恕重慎而周宻樂施而愛人值陽九無妄之世遭炎光厄㑹之運殷爾雷發赫然神舉用武畧以攘暴興義兵以掃殘神光前驅威風先逝軍未出於南京莽巳斃於西都夫其蕩滌凶穢勦除醜類若順迅風而縱烈火曬白日而掃朝雲也爾乃廟勝而後動衆計定而後行師故攻無不陷之壘戰無犇北之卒是以羣下欣欣歸心聖徳宣仁以和衆邁徳以來逺故竇融聞聲而影附馬援一見而歎息股肱有濟濟之美元首有穆穆之容敦睦九族有唐虞之稱髙尚純樸有羲皇之素謙虛納下有吐握之勞留心庶事有日昃之勤乃規𢎞跡而造皇極創帝道而立徳基是以計功則業殊比隆則事異旌徳則靡愆言行則無穢量力則勢微論輔則力劣卒能握乾圖之休徴應五百之顯期立不刋之遐迹建不朽之元功金石播其休烈詩書載其勲懿故曰光武其優也成王漢昭論周公以天下初定武王既終而成王尚㓜未能定南靣之事是以推以忠誠稱制假號二弟流言召公疑之發金縢之匱然後用寤亦未決也至於昭帝所以不疑於霍光亦縁武帝有遺詔於光使光若周公踐天子之位行周公之事吾恐叛者非徒二弟疑者非徒召公也且賢者固不能知聖賢自其宜耳昭帝固可不疑霍光成王自疑周公也若以昭帝勝成王霍光當踰周公邪若以堯舜為成王湯禹作管蔡召公周公之不見疑必也相論世固有人身瘠而志立體小而名髙者於聖則否是以堯眉八彩舜目重瞳禹耳參漏文王四乳然則世亦有四乳者此則駑馬一毛似驥耳宋臣有公孫吕者長七尺靣長三尺廣三寸若此之狀盖逺代而求非一世之異也使形殊於外道合其中名震天下不亦宜乎語云無憂而戚憂必及之無慶而歡樂必隨之此心有先動而神有先知則色有先見也故扁鵲見桓公知其將亡申叔見巫臣知其竊妻而逃也辯道論世有方士吾王悉所招致甘陵有甘始廬江有左慈陽城有郤儉始能行氣導引慈曉房中之術儉善辟穀悉號三百嵗卒所以集之於魏國者誠恐斯人之徒接姦宄以欺衆行妖慝以惑民豈復欲觀神仙於瀛洲求安期於海島釋金輅而履雲輿棄文驥而求飛龍哉自家王與太子及余兄弟咸以為調笑不信之矣然始等知上遇之有恒奉不過於員吏賞不加於無功海島難得而逰六黻難得而佩終不敢進虛誕之言出非常之語余嘗試郤儉絶穀百日躬與之寢處行歩起居自若也夫人不食七日則死而儉乃如是然不必益夀可以療疾而不憚饑饉焉左慈善修房内之術差可終命然自非有志至精莫能行也甘始者老而有少容自諸術士咸共歸之然始辭繁寡實頗有怪言余常辟左右獨與之談問其所行温顔以誘之美辭以導之始語余吾本師姓韓字世雄嘗與師於南海作金前後數四投數萬斤金於海又言諸梁時西域胡來獻香罽腰帶割玉刀時悔不取也又言車師之西國兒生擘背出脾欲其食少而努行也又言取鯉魚五寸一雙合其一煑藥俱投沸膏中有藥者奮尾鼓鰓㳺行沈浮有若處淵其一者巳熟而可噉余時問言率可試不言是藥去此逾萬里當出塞始不自行不能得也言不盡於此頗難悉載故粗舉其巨怪者始若遭秦始皇漢武帝則復為徐福欒大之徒也夫帝者位殊萬國富有天下威尊彰眀齊光日月宫殿闕庭等曜紫微何顧乎王母之宫崑崙之域哉夫三烏備役不如百官之美也素女姮娥不若椒房之麗也雲衣羽裳不若黼黻之飾也駕螭載霓不若乗輿之盛也瓊蘂玉華不若玉圭之潔也而顧為匹夫所罔納虛妄之辭信眩惑之說隆禮以招弗臣傾産以供虛求散王爵以榮之清閒館以居之經年累稔終無一驗雖復誅其身滅其族紛然足為天下笑矣若夫𤣥黄所以娱目鏗鏘所以樂耳媛妃所以紹先芻豢所以說口也何必甘無味之味聴無聲之樂觀無采之色乎又辯道論此篇出廣𢎞明集只數語與魏志及舊集畧同餘文俱不載今另存之夫神仙之書道家之言乃云傅說上為辰尾宿嵗星降為東方朔淮南王安誅於淮南而謂之獲道輕舉鉤弋死於雲陽而謂之屍逝柩空其為虛妄甚矣哉中興篤論之士有桓君山者其所著述多善劉子駿嘗問人言誠能抑嗜欲闔耳目可不衰竭乎時庭中有一老榆君山指而謂曰此樹無情欲可忍無耳目可闔然猶枯槁腐朽而子駿乃言可不衰竭非談也君山援榆喻之未是也何者余前為王莽典樂大夫樂記云文帝得魏文侯樂人竇公年百八十兩目盲帝竒而問之何所施行對曰臣年十三而失眀父母哀其不及事教臣鼓琴臣又能導引不知夀得何力君山論之曰頗得少盲専一内視情不外鑒之助也先難子駿以内視無益退論竇公便以不鑒證之吾未見其定論也君山又曰方山有董仲君者繫獄佯死數日目陷蟲出死而復生然後竟死生之必死君子所達夫何喻乎夫至神不過天地不能使蟄蟲夏潛震雷冬發時變則物動氣移而事應彼仲君者乃能藏其氣屍其體爛其膚出其蟲無乃大怪乎世有方士吾王悉所招致甘陵有甘始廬江有左慈陽城有郄儉始能行氣導引慈曉房中之術儉善辟榖悉號三百嵗本所以集之於魏國者誠恐斯人之徒接姦詭以欺衆行妖慝以惑人故聚而禁之甘始者老而有少容自餘術士咸共歸之然始辭繁寡實頗竊有怪言若遭秦始皇漢武帝則復徐福欒大之徒矣桀紂殊世而齊惡姦人異代而等偽乃如此邪又世虛傳有仙人之說仙人者儻猱猨之屬與世人得道化為仙人乎夫雉入海為蜃燕入海為蛤當夫徘徊其翼差池其羽猶自識也忽然自投神化體變乃更與黿鼈為羣豈復自識翔林薄巢垣屋之娱乎而顧為匹夫所誷納虛妄之詞信眩惑之說隆禮以招弗臣傾産以供虛求散王爵以榮之清閑館以居之經年累稔終無一效或殁於沙丘或崩乎五柞臨時雖誅其身滅其族紛然足為天下笑矣然夀命長短骨體强劣各有人焉善養者終之勞擾者半之虛用者殀之其斯之謂歟令禽惡鳥論國人有以伯勞生獻者王召見之侍臣曰世人同惡伯勞之鳴敢問何謂也王曰昔尹吉甫用後妻之說殺孝子伯竒吉甫後悟追傷伯竒出逰於田見鳥鳴於桑間其聲噭然吉甫動心曰伯勞乎乃撫翼其音尤切吉甫乃顧謂曰伯勞乎是吾子棲吾輿非吾子飛勿居鳥尋聲而棲於盖吉甫遂射殺後妻以謝之故俗惡伯勞之鳴言所鳴之家必有尸也此好事者附名為之說而今普傳惡之斯實否也伯勞以五月而鳴應隂氣之動隂為賊害盖賊害之鳥也其聲鵙鵙然故俗憎之若其為人灾害愚民之所信通人之所畧也鳥鳴之惡自取憎人言之惡自取滅不能有累於當世也而凶人之行弗可易梟鳥之鳴不可更者天性然也昔荆人之梟將巢於吳鳩遇之曰何去荆而巢吳乎梟曰荆人惡予之聲鳩曰子不能革子之音則吳楚之民不異情也為子計者莫若宛頸戢翼終身勿復鳴也昔㑹朝議者有人問曰寜有聞梟食其母乎有答之者曰嘗聞烏反哺未聞梟食母也問者慙唱不善也得蟢者莫不馴而放之為利人也得蚤者莫不糜之齒牙為害身也鳥獸昆蟲猶以名聲見異况夫吉士之與凶人乎仁孝論且禽獸悉知愛其母知其孝也唯白虎通麒麟稱仁獸者以其眀盛衰知治亂也孝者施近仁者及逺輔臣論盖精微聴察理析毫分䂓矩可則阿保不傾羣言系于口而研摭是非典謨總乎心而唯所用之者鍾太傅也清素寡欲眀敏特達志存太虛安心𤣥妙處平則以和養徳遭變則以㫁蹈義華太尉歆之謂也文武並亮權智時發奢不過制儉不損禮入毗皇家帝之股肱出則侯伯實撫東夏者曹大司馬也辨博通幽見傳異慶徳實充塞于内知謀縱横于外解疑釋滯剖散盤錯王司徒也至徳純粹進吐善謀者陳司空也智慮深奥淵然難測執節平敵中表條暢恭以奉上愛以接下納言左右為帝㗋舌曹大將軍也魁傑雄特秉心平直威嚴足憚風行草靡我昭果毅折衝厭難者司馬驃騎也征蜀論今將以謀謨為劍㦸以䇿畧為旌旗又云下礨成雷榛殘木碎魏徳論畧孟春之旦從太陽方貴放鳥雀者加其禄也得者莫不馴而放之為利人也得蚤者莫不靡之齒牙為害身也説籍田說昔者神農氏始嘗萬草教民種植今寡人之興此田將欲以擬乎治國非徒娱耳目而巳也夫營疇萬畆厥田上下經以大陌帶以横阡此亦寡人之封疆也日殄沒而歸館晨未昕而即野此亦寡人之先下也菽雚特疇禾黍異田此亦寡人之政理也及其息沸涌庇重隂懷有虞撫素琴此寡人之所習樂也蘭蕙荃蘅植之近疇此亦寡人之所親賢也藜蓬臭蔚棄之乎逺疆此亦寡人之所逺佞也若年豐嵗登果茂菜滋則臣僕小人咸取驗焉又封人有能以輕鑿修鉤去樹之蝎者樹得以繁茂中舎人曰不識治天下者亦有蝎乎寡人告之曰昔三苗共工鯀驩兠非堯之蝎與問曰諸侯之國亦有蝎乎寡人告之曰齊之諸田晉之六卿魯之三桓非諸侯之蝎與然三國無輕鑿修鉤之任終於齊簒魯弱晉國以分不亦痛乎曰不識為君子者亦有蝎乎寡人告之曰固有之也富而慢貴而驕殘仁賊義甘財悦色亦君子之蝎乎天子勤耘以收一國大夫勤耘以收世禄君子勤耘以顯令徳夫農者始於種終於穫澤既時矣苗既美矣棄而不耘則譬為荒疇盖豐年者期於必收譬修道亦期於没身也髑髏說曹子逰乎陂塘之濱歩乎蓁穢之藪蕭條潛虚經幽踐阻顧見髑髏塊然獨居於是伏軾而問之曰子將結纓首劍殉國君乎將被堅執鋭斃三軍乎將嬰兹錮疾命殞傾乎將夀終數極歸幽㝠乎叩遺骸而歎息哀白骨之無靈慕嚴周之適楚儻託夢以通情於是怦若有來怳若有存影見容隠厲聲而言曰子何國之君子乎既枉輿駕愍其枯朽不惜咳唾之音慰以苦言子則辯於辭矣然未達幽㝠之情死生之說也夫死之為言歸也歸也者歸於道也道也者身以無形為主故能與化推移隂陽不能更四時不能虧是故洞於纎微之域通於怳惚之庭望之不見其象聴之不聞其聲挹之不充注之不盈吹之不凋噓之不榮激之不流凝之不停寥落㝠漠與道相拘偃然長寢樂莫是踰曹子曰予將請之上帝求諸神靈使司命輟籍反子骸形於是髑髏長呻廓然歎曰甚矣何子之難語也太素氏不仁勞我以形苦我以生今也幸變而之死是反吾真也何子之好勞而我之好逸子則行矣予將歸於太虛於是言卒響絶神光霧除顧將旋軫乃命僕夫拂以𤣥塵覆以縞巾爰將藏彼路濱覆以丹土翳以綠榛夫存亡之異世乃宣尼之所陳何神憑之虛對云死生之必均畫說觀畫者見三皇五帝莫不仰戴見三季暴主莫不悲惋見簒臣賊嗣莫不切齒見髙節妙士莫不忘食見忠節死難莫不抗首見忠臣孝子莫不歎息見淫夫妬婦莫不側目見令妃順后莫不嘉貴是知存乎鑒者何如也説疫氣建安二十二年癘氣流行家家有僵尸之痛室室有號泣之哀或闔門而殪或覆族而喪或以為疫者鬼神所作夫罹此者悉被褐茹藿之子荆室蓬戸之人耳若夫殿處鼎食之家重貂累蓐之門若是者鮮焉此乃隂陽失位寒暑錯時是故生疫而愚民懸符厭之亦可笑也又鹹水之魚不逰于江淡水之魚不入于海謳魏徳論謳甘露𤣥徳洞幽飛化上承甘露以降密淳水凝觀陽弗晞瓊爵是承獻之帝朝以眀貴徴連理木皇樹嘉徳風靡雲披有木連理别幹同枝將承大同應天之規穀於穆聖皇仁暢恵渥辭獻減膳以服鰥獨和氣致祥時雨洒沃野草萌芽變化嘉榖禾猗猗嘉禾惟榖之精其洪盈箱協穂殊莖昔生周朝今植魏庭獻之朝堂以昭祖靈鵲鵲之疆疆詩人取喻今存聖世呈質見素饑食苕華渇飲清露異於儔匹衆鳥是騖鳩班班者鳩爰素其質昔翔殷邦今為魏出朱目丹趾靈姿詭類載飛載鳴彰我皇懿碑制命宗聖侯孔羨奉家祀碑維黄初元年大魏受命𦙍軒轅之髙蹤紹虞氏之遐統應厯數以改物揚仁風以作教於是輯五瑞班宗彛鈞衡石同度量秩羣祀於無文順天時以布化既乃緝熈聖緒紹顯上世追存三代之禮兼紹宣尼之後以魯縣百户命孔子二十一世孫議郎孔羨為宗聖侯以奉孔子之祀制詔三公曰昔仲尼負大聖之才懷帝王之器當衰周之末而無受命之運在魯衛之朝教化洙泗之上栖栖焉皇皇焉欲屈巳以存道貶身以救世於是王公終莫能用之乃退考五代之禮修素王之事因魯史而制春秋就太師而正雅頌俾千載之後莫不宗其文以述作仰其聖以謀咨可謂命世大聖億載之師表者也遭天下大亂百祀堕壞舊居之廟毁而不修褒成之後絶而莫繼闕里不聞講誦之聲四時不睹蒸嘗之位斯豈所謂崇禮報功盛徳必百世祀者哉嗟乎朕甚憫焉其以議郎孔羨為宗聖侯邑百戸奉孔子之祀令魯郡修起舊廟置百戸卒吏以守衛之又於其外廣為屋宇以居學者於是魯之父老諸生遊士睹廟堂之始復觀俎豆之初設嘉聖靈於髣髴想禎祥之來集乃慨然而歎曰大道衰廢禮樂絶滅三十餘年皇上懷仁聖之懿徳兼二儀之化育廣大包於無方淵深淪於不測故自受命以來天人咸和神氣氤氲嘉瑞踵武休徴屢臻殊俗解編髮而慕義遐夷越險阻而來賔雖太皥遊龍以君世虞氏儀鳯以臨民伯禹命𤣥宫而為夏后西伯由岐社而為周文尚何足稱於大魏哉若乃紹繼微絶興修廢官疇咨稽古崇配乾坤况神眀之所福作宇宙之所觀欣欣之色豈徒魯邦而巳哉爾乃感殷人路寢之義嘉先民泮宫之事以為髙宗僖公盖嗣世之王諸侯之國耳猶著徳於三頌騰聲於千載况今聖王肇造區夏創業垂綂受命之日曾未下輿而褒美大聖隆化如此能無頌乎乃作頌曰煌煌大魏受命溥將繼體黄唐包夏含商降釐下土廓清三光羣祀咸秩靡事不綱嘉彼𤣥聖有赫其靈遭世霿亂莫顯其榮褒成既絶寢廟斯傾闕里蕭條靡韶靡馨我皇悼之尋其世武乃建宗聖以紹厥後修復舊堂豐其甍宇莘莘學徒爰居爰處王教既新羣小遄沮魯道以興永作憲矩洪聲豈遐神祗來和休徴雜遝瑞我邦家内光區域外被荒遐殊方慕義搏拊揚歌於赫四聖運世應期仲尼既沒文亦在茲彬彬我后越而五之垂於億載如山之基頌皇子生頌於我聖后憲章前志克纂二皇三靈昭事祗肅郊廟眀徳敬恵陽和積吉鍾天之釐嘉月令辰篤生聖嗣慶由一人萬國作喜喁喁萬國岌岌羣生禀命我后綏之則榮長為臣妾終天之經仁聖奕代永載眀眀同年上帝休祥淑禎藩臣作頌光流徳聲吁嗟卿士祗承予聴承露盤頌有序一作銘皇帝鑄承露盤莖長十二丈大十圍上盤逕四尺下盤逕五尺銅龍遶其根龍身長一丈背負兩子自立於芳林園甘露乃降使臣為頌頌曰岧岧承露峻極太清神若礧磈洪基嶽停下潛醴泉上受雲英和氣四充翔風所經匪我眀后孰能經營近歴躔度三光朗眀殊俗歸義祥瑞混并鸞鳯晨棲甘露宵零神物攸協髙而不傾奉天戴巍恭統神器固若露盤長存永貴賢聖繼跡奕世明德不忝先功保兹皇極垂作億兆永荷天秩孔廟頌有序自五帝典絶三皇禮廢應期命世齊賢等聖者莫髙於孔子也故有若曰出乎類拔乎萃誠所謂性與天道不可得而聞矣由也務學名在前志宰予晝寢糞土作誡過庭子弟詩禮明記歌以詠言文以騁志予今不述后賢曷識於鑠尼父生民之傑性與天成該聖備藝徳倫三五配皇作烈𤣥鏡獨鑑神明昭晰仁塞宇宙志凌雲霓學者三千莫不俊乂唯仁是憑唯道足恃鑚仰彌髙請益不巳舊集摘宗聖侯碑頌中數語作孔子頌更名此篇為學宫頌今正之社頌有序余前封鄄城侯轉雍丘皆欲為社宅宇初造以府庫尚豐志在善公家務完圃而巳農桑一無所營經離十載塊然守空饑寒備嘗聖朝愍之故封此縣田則一州之膏腴桑則天下之甲第故封此桑以為田社乃作頌云於惟太社官名后土是曰勾龍功著上古徳配帝王實為靈主克眀播植農正日舉尊以作稷豐年是與義與社同方神北宇建國承家莫不攸叙湯妃頌殷湯令妃有莘之女仁教内修度儀以處清謐后宫九嬪有序伊為媵臣遂作元輔姜后頌於鑠姜后光配周宣非禮不動非禮不言晏起失朝永巷告愆王用勤政萬國以䖍𤣥俗頌𤣥俗玅識饑餌神頴在隂倐逝即陽無景逍遥北嶽凌霄引領揮霧昊天含神自静冬至獻襪頌玉趾既御履和蹈貞行與禄邁動以祥并南闚北戸西巡王城翺翔萬域聖體浮輕宜男花頌草號宜男既曄且貞其貞伊何惟乾之嘉其曄伊何緑葉丹花光采晃曜配彼朝日君子耽樂好和琴瑟固作螽斯惟立孔臧福濟太姒永世克昌贊畫贊盖畫者鳥書之流昔明徳馬后美於色厚於徳帝用嘉之嘗從觀畫過虞舜廟見娥皇女英帝指之戲后曰恨不得如此為妃又前見陶唐之像后指堯曰嗟乎羣臣百寮恨不得為君如是帝顧而笑故夫畫所見多矣庖犧贊木徳風姓八卦創焉龍瑞名官法地象天庖厨祭祀網罟漁佃瑟以象時神徳通𤣥女媧贊古之國君造簧作笙體物未就軒轅纂成或云二皇人首蛇形神化七十何徳之靈神農贊少典之𦙍火徳承木造為耒耜導民播穀正為雅琴以暢風俗黄帝贊少典之孫神明聖哲土徳承火赤帝是滅服牛乗馬衣裳是制氏雲名官功冠五帝黄帝三鼎贊鼎質之精古之神器黄帝是鑄以像太乙能輕能重知凶識吉世衰則隠世和則出少昊贊祖自軒轅青陽之裔金徳承土儀鳯帝世官鳥號名殊職別系農正扈氏各有品制顓頊贊昌意之子祖自軒轅始誅九黎水徳統天以國為號風化神宣威暢八極靡不祗䖍帝嚳贊祖自軒轅𤣥囂之裔生言其名木徳帝世撫寜天地神聖靈察教彌四海明並日月帝堯贊火徳統位父則髙辛克平共工萬國同塵調適隂陽其恵如春巍巍成功配天則神帝舜贊顓頊之族重瞳神聖克協頑瞽應唐涖政除凶舉俊以齊七政應厯受禪顯天之命夏禹贊吁嗟天子拯世濟民克卑宫室致孝鬼神疏食薄服黻冕乃新厥徳不回其誠可親亹亹其徳温溫其仁尼稱無間何徳之純禹治水贊嗟夫夏禹實勞水功西鑿龍門疏河道江梁岐既闢九州以同天錫𤣥圭奄有萬邦禹渡河贊禹濟於河黄龍負船舟人並懼禹歎仰天予受大運勤功恤民死亡命也龍乃弭身殷湯贊殷湯伐夏諸侯振仰放桀鳴條南面以王桑林之禱炎災克償伊尹佐治可謂賢相湯禱桑林贊惟殷之世炎旱七年湯禱桑林祈福於天剪髮離爪自以為牲皇靈感應時雨以零周文王贊於赫聖徳實惟文王三分有二猶服事商化加虞芮旁開四方王業克昭武嗣遂光周文王赤雀贊西伯積徳天命攸顧赤雀銜書爰集昌户瑞為天使和氣所致嗟爾後王昌期而至周武王贊桓桓武王繼世滅殷咸任尚父且作商臣功冒四海救世濟民天下宗周萬國是賓周公贊成王即位年尚幼稚周公居攝四海慕利罰叛柔服祥應乃至誦書反政達天忠義周成王贊成王繼武聖賢保傅年雖幼稚岐嶷有素初疑周公終焉克寤旦奭佐治遂致刑錯漢髙帝贊屯雲斬蛇靈母告祥朱旗既抗九野披攘禽嬰克羽掃滅英雄承機帝世功著武湯漢文帝贊孝文即位愛物儉身驕吳撫越匈奴和親納諌赦罪以徳讓民殆至刑錯萬國化淳漢景帝贊景帝眀徳繼文之則肅清王室克滅七國省役薄賦百姓殷昌風移俗易齊美成康漢武帝贊世宗光光文武是攘威振百蠻恢拓土疆簡定律歴辯修舊章封天禪土功越百王姜嫄簡狄贊嚳有四妃子皆為王帝摯且崩堯承天綱𤣥鳥大跡殷周美祥稷契既生翊化虞唐禹妻贊禹娶塗山土功是急聞啓之生過門不入女能達義眀勲是執成長聖嗣天禄以襲班媫妤贊有徳有言實惟班媫盈冲其驕窮其厭恱在夷貞艱在晉正接臨飈端幹衝霜振葉吹雲贊天地變化是生神物吹雲吐潤浮氣蓊鬱巢父贊堯禪許由巢父是恥穢其溷聴臨河洗耳池主是讓以水為濁嗟此三士清足厲俗務光贊湯將伐桀謀於卞子既聞讓位隨以為恥薄於殷世著自汙巳自投潁水清風邈矣商山四皓贊嗟爾四皓避秦隠形劉項之爭養志弗營不應朝聘保節全貞應命太子漢嗣以寜長樂觀畫贊玅哉平生才巧若神辭賦之作華若望春古冶子等贊齊姜接子勇節狥名虎門之博忽晏置釁矜而日伐輕死重分銘寶刀銘造兹寶刀既礱既礪匪以尚武予身是衛麟角是觸鸞距匪蹶文誥咎文有序五行致灾先史咸以為應政而作天地之氣自有變動未必政治之所興致也於時大風發屋拔木意有感焉聊假天帝之命以誥咎祈福辭曰上帝有命風伯雨師夫風以動氣雨以潤時隂陽協和氣物以滋亢陽害苗暴風傷條伊周是遇在湯斯遭桑林既禱慶雲克舉偃禾之復姬公去楚况我皇徳承天統民禮敬川嶽祈肅百神享兹元吉釐福日新至若炎旱赫曦颷風扇發嘉卉以委良木以拔何谷宜填何山應伐何靈宜論何神宜謁於是五靈振悚皇祗赫怒招揺驚怯攙搶奮斧河伯典澤屏翳司風迴呵飛亷顧叱豐隆息颷遏暴元勑華嵩慶雲是興效厥年豐遂乃沈隂坱圠甘澤微微雨我公田爰暨於私黍稷盈疇芳草依依靈禾重穗生彼邦畿年登歲豐民無餒饑釋愁文予以愁慘行吟路邊形容枯悴憂心如醉有𤣥靈先生見而問之曰子将何疾以至於斯答曰吾所病者愁也先生曰愁是何物而能病子乎答曰愁之為物惟惚惟恍不召自來推之弗徃尋之不知其際握之不盈一掌寂寂長夜或羣或黨去來無方亂我情爽其來也難退其去也易追臨餐困於哽咽煩寃毒於酸嘶加之以粉飾不澤飲之以兼肴不肥温之以金石不消麾之以神膏不希授之以巧笑不悦樂之以絲竹增悲醫和絶思而無措先生豈能為我蓍龜乎先生作色而言曰予徒辯子之愁形未知子愁所由而生我獨為子言其發矣方今大道既隠子生末季沉溺流俗眩惑名位濯纓彈冠諮趣榮貴坐不安席食不終味遑遑汲汲或憔或悴所鬻者名所拘者利良由華薄凋損正氣吾将贈子以無為之藥給子以淡薄之湯刺子以𤣥虚之針炙子以淳朴之方安子以恢廓之宇坐子以寂寞之床使王喬與子遨遊而逝黄公與子詠歌而行荘子與子具養神之撰老聃與子致愛性之方趣避路以棲跡乗輕雲以翺翔於是精駭魂散改心回趣願納至言仰崇𤣥㫖衆愁忽然不辭而去誄武帝誄於惟我王乗運之衰神武震發羣雄戡夷拯民於下登帝太微徳美旦奭功越彭韋九徳光備萬國作師寝疾不興聖體長違華夏飲淚黎庶含悲神翳功顯身沈名飛敢揚聖徳表之素旗乃作誄曰於穆我王胄稷𦙍周賢聖是紹元懿允休先侯佐漢實維平陽功成績著徳昭二皇民以寧一興詠有章我王承統天姿特生年在志學謀過老成奮臂舊邦翻身上京袁與我王兵交若神張陳背誓傲帝虐民擁徒百萬虎視朔濱我王赫怒戎車列陳武卒虓闞如雷如震攙搶北掃舉不浹辰紹遂犇北河朔是賓振旅京師帝嘉厥庸乃位丞相總攝三公光受上爵君臨魏邦九錫昭備大路火龍𤣥鑑靈察探幽洞微下無偽情姦不容非敦儉尚古不玩珠玉以身先下民以純樸聖性嚴毅平修清一惟善是嘉靡疏靡昵怒過雷霆喜踰春日萬國肅䖍望風震慄既總庶政兼覽儒林窮著雅頌被之瑟琴茫茫四海我王康之微微漢嗣我王匡之羣傑扇動我王服之喁喁黎庶我王育之光有天下萬國作君䖍奉本朝徳美周文以寛克衆每征必舉四夷賓服功夷聖武翼帝王世神武鷹揚左鉞右旄威凌伊吕年踰耳順體愉志肅乾乾庻事氣過方叔宜並南嶽君國無窮如何不弔禍鍾聖躬棄離臣子背世長終兆民號咷仰愬上穹既以約終令節不衰既即梓宫躬御綴衣璽不存身唯紼是荷明器無飾陶素是嘉既次西陵幽閨啟路羣臣奉迎我王安厝窈窕𤣥宇三光不晰幽闥一扄尊靈永蟄聖上臨穴哀號靡及羣臣陪臨佇立以泣去此昭昭於彼㝠㝠永棄兆民下君百靈千代萬葉曷時復形文帝誄惟黄初七年五月七日大行皇帝崩鳴呼哀哉於時天震地駭崩山隕霜陽精薄景五緯錯行百姓吁嗟萬國悲悼若喪考妣恩過慕唐擗踊郊埜仰想穹蒼僉曰何辜早世隕喪嗚呼哀哉悲夫大行忽焉光滅永棄萬民雲徃雨絶承問慌惚惛懵哽咽袖鋒抽刅欲自僵斃追慕三良甘心同穴感彼南風惟以鬱滯終於偕没指景自誓考諸先紀尋之哲言生若浮寄惟徳可論朝聞夕逝孔志所存皇雖殪殁天禄永延何以述徳表之素旃何以詠功宣之管絃乃作誄曰皓皓太素兩儀始分中和産物肇有人倫爰暨三皇實秉道真降逮五帝繼以懿純三代製作踵武立勲季嗣不綱網漏於秦崩樂滅學儒坑禮焚二世而殱漢氏乃因弗求古訓嬴政是遵王綱帝典閴爾無聞末光幽昧道究運遷乾坤回厯簡聖授賢乃眷大行屬以黎元龍飛啟祚合契上𤣥正行定紀改號革年明明赫赫受命於天風偃物化徳以禮宣詳惟聖質岐嶷㓜齡研幾六典學于過庭潛心無妄亢志清㝠才秀藻朗如玉之瑩聽察無響瞻睹未形其剛如金其貞如瓊如氷之潔如砥之平爵功無重戮違無輕心鏡萬機鑒照下情思良股肱嘉昔伊吕搜揚側陋舉湯代禹㧞才巖穴取士蓬户惟徳是縈弗拘襧祖宅土之中道義是圖弗營厥險六合是虞齊契共檢導下以純恢拓規矩克紹前人科條品制褒貶以因乗殷之輅行夏之辰金根黄屋翠葆龍鱗紼冕崇麗衡紞維新尊肅禮容矚之若神方牧妙舉欽於恤民虎將荷節鎮彼四隣朱旗所勦九壤被震疇克不若孰敢不臣縣旌海表萬里無塵虜備罔徹鳥殪江岷摧若涸魚乾腊脯鱗肅慎納貢越裳效珍條支絶域獻欵内賓徳濟先王功侔太古上靈降瑞黄初俶祜河龍洛龜陵波逰下平均應繩神鸞翔舞數莢階除系風扇暑皓獸素禽飛走郊野神鐘寶鼎形自舊土雲英甘露瀐塗被宇靈芝冒沼朱華䕃渚回回凱風祁祁甘雨稼穯豐登我稷我黍家佩恵君户䝉慈父圖致太和洽徳全義将登泰山先皇作儷鐫石紀勲兼録衆瑞方隆封禪歸功天地賓禮百靈勲命視規望祭四嶽燎封奉柴肅於南郊宗祀上帝三牲既供夏禘秋嘗元侯佐祭獻璧奉璋鸞輿幽藹龍旂太常爰迄太廟鐘鼓鍠鍠頌徳詠功八佾鏘鏘皇祖既饗烈考來享神具醉止降兹福祥天地震蕩大行康之三辰暗昩大行光之皇紘絶維大行綱之神器莫統大行當之禮樂廢弛大行張之仁義陸沉大行揚之潛龍隠鳳大行翔之疏狄遐康大行匡之在位七載元功仍舉將永太和絶迹三五宜作物師長為神主夀終金石等算束父如何奄息摧身后土俾我㷀㷀靡瞻靡顧嗟嗟皇穹胡寧忍務嗚呼哀哉明監吉凶體達存亡深垂典制申之嗣皇聖上䖍奉是順是将乃創𤣥宇基於首陽擬迹榖林追堯纂唐合山同陵不樹不疆塗車芻靈珠玉靡蔵百神警侍來賓幽堂耕禽田獸望魂之翔於是俟大隧之致功兮練元辰之淑禎潛華體於梓宫兮馮正殿以居靈顧皇嗣之號咷兮存臨者之悲聲悼晏駕之既徃兮感容車之速征浮飛魂於輕霄兮就黄墟以蔵形背三光之昭晣兮歸𤣥宅之㝠㝠嗟一徃之不返兮痛閟闥之長扄咨逺臣之眇眇兮成凶諱以恒驚心孤絶而靡告兮紛流涕而交頸思恩榮以横奔兮閡闕塞之嶤崢顧衰絰以輕舉兮念闗防之我嬰欲高飛而遥憩兮憚天網之逺經遥投骨於山足兮報恩養於下庭慨拊心而自悼兮懼施重而命輕嗟微軀之是效兮甘九死而忘生幾司命之役籍兮先黄髪而隕零天葢高而察卑兮冀神明於我聴獨鬱伊而莫告兮追顧景而憐形奏斯文以寫思兮結翰墨以敷誠嗚呼哀哉卞太后誄失表率土噴薄三光改度陵頽谷踊五行錯互皇室蕭條羽檄四布百姓欷歔嬰兒號慕若喪考妣天下縞素聖者知命殉道寶名義之攸在亦棄厥生敢揚后徳表之旐旌光垂罔極以慰我情乃作誄曰我皇之生坤靈是輔作合於魏亦光聖武篤生文帝紹虞之緒龍飛紫宸奄有九土詳惟聖善岐嶷秀出徳配姜嫄不忝先哲𤣥覽萬機兼才備藝汎納容衆含垢蔵疾仰奉諸姑降接儔列隂處陽潛外明内察乃踐大位母養萬國温温其人不替明徳悼彼邊氓未遑宴息恒勞庻事兢兢翼翼親桑蠶館為天下式樊姬霸楚書載其庸武王有亂孔歎其功我后齊聖克暢丹聰不出房闥心照萬邦年踰耳順乾乾匪倦珠玉不玩躬御綈練日旰忘饑臨樂勿讌去奢即儉曠世作顯慎終如始蹈和履貞㳟事神祗昭奉百靈跼天踳地祗畏神明敬微慎獨報禮幽㝠䖍肅宗廟蠲薦三牲降福無疆祝云其誠宜享斯祜䝉祉自天何圖凶咎不免斯年嘗禱盡禮有篤無痊豈命有終神食其言遺孤在疚承諱東藩擗踊郊甸洒淚中原追號皇妣棄我何遷昔垂顧復今何不然空宫寥廓棟宇無煙巡省階塗髣髴櫺軒仰瞻帷幄俯察几筵物不毁故而人不存痛莫酷斯彼蒼者天遂臻魏都游魂舊邑大隧開塗靈魄斯戢歎息霧興揮淚雨集徘徊輀柩號咷弗及神光既幽佇立以泣任城王誄昔二虢佐文旦奭翼武於休我王魏之元輔将崇懿跡等號齊魯如何奄忽命不是與仁者悼没兼彼殊類矧我同生能不憯悴目想宫墀心存平素彷彿魂神馳情陵墓凡夫愛命逹者狥名王雖薨徂功著丹青人誰不没徳有遺聲乃作誄曰㓜有令徳光耀珪璋孝殊閔氏義逹參商温温其恭爰柔克剛心存建業王室是匡矯矯元戎雷動雨徂横行燕代威慴北胡奔虜無竄還戰高栁王率壮士常為軍首宜究長年永保皇家如何奄忽景命之遐同盟飲淚百寮咨嗟大司馬曹休誄於穆公侯魏之宗室明徳繼踵奕世純粹闡𢎞汎愛仁以接物藝以為華體斯亮實年没弱冠志在雄英高揖名師發言有章東夏翕然稱曰龍光貧而無怨孔子為難嗟我公侯屢空是安不耽世禄親悦為歡好彼蓬樞甘此瓢簞味道忘憂踰憲超顔矯矯公侯不撓其厄呵叱三軍躬奮雉㦸足蹴白刃手按飛鏑終弭淮南保我疆埸光禄大夫荀侯誄如氷之清如玉之潔法而不威和而不爇百寮欷歔天子霑纓機女投杼農夫輟耕輪結轍而不轉馬悲鳴而倚衡王仲宣誄建安二十二年正月二十四日戊申魏故侍中闗内侯王君卒嗚呼哀哉皇穹神察喆人是恃如何靈祗殱我吉士誰謂不痛早世即㝠誰謂不傷華繁中零存亡分流夭遂同期朝聞夕没先民所思何用誄徳表之素旗何以贈終哀以送之遂作誄曰猗歟侍中逺祖彌芳公高建業佐武伐商爵同齊魯邦祀絶亡流裔畢萬勲績惟光晉獻賜封於魏之疆夭開之祚末胄稱王厥姓斯氏條分葉散世滋芳烈揚聲秦漢㑹遭陽九炎光中曚世祖撥亂爰建時雍三台樹位履道是鍾寵爵之加匪惠惟恭自君二祖為光為龍僉曰休哉宜翼漢邦或統太尉或掌司空百揆惟叙五典克從天靜人和皇教遐通伊君顯考奕葉佐時入管機密朝政以治出臨朔代庻績咸熈君以淑懿繼此洪基既有令徳材技廣宣强記洽聞幽讚㣲言文若春華思若涌泉發言可詠下筆成篇何道不洽何藝不閑棊局逞巧博奕惟賢皇家不造京室隕顛宰臣專制帝用西遷君乃羈旅離此阻艱翕然鳳舉逺竄荆蠻身窮志逹居鄙行鮮振冠南嶽濯纓清川濳處蓬室不干勢權我公奮鉞耀威南楚荆人或違陳戎講武君乃義發算我師旅高尚霸功投身帝宇斯言既發謀夫是與是與伊何嚮我明徳投戈編郡稽顙漢北我公實嘉表揚京國金龜紫綬以彰勲則勲則伊何勞謙靡已憂世忘家殊畧卓峙乃署祭酒與君行止算無遺䇿畫無失理我王建國百司俊又君以顯舉秉機省闥戴蟬珥貂朱衣皓帶入侍帷幄出擁華葢榮耀當世芳風晻藹嗟彼東夷憑江阻湖騷擾邊境勞我師徒光光戎輅霆駭風徂君侍華轂輝耀王塗思榮懐附望彼來威如何不濟運極命衰寢疾彌留吉徃凶歸嗚呼哀哉翩翩孤嗣號慟崩摧發軫北魏逺迄南淮經厯山河泣涕如頹哀風興感行雲徘徊游魚失浪歸鳥忘棲嗚呼哀哉吾與夫子義貫丹青好和琴瑟分過友生庻㡬遐年攜手同征如何奄忽棄我夙零感昔宴㑹志各高厲予戯夫子金石難弊人命靡常吉凶異制此歡之人孰先隕越何寤夫子果乃先逝又論死生存亡數度子猶懐疑求之明據儻獨有靈游魂泰素我將假翼飄颻高舉超登景雲要子天路喪柩既臻將反魏京靈輀迴軌白驥悲鳴虚廓無見蔵影蔽形孰云仲宣不聞其聲延首歎息雨泣交頸嗟乎夫子永安幽㝠人誰不殁逹士狥名生榮死哀亦孔之榮嗚呼哀哉平陽懿公主誄俯振地紀仰錯天文悲風激興霜猋雪雰凋蘭夭蕙良榦以冺於惟懿主瑛瑶其質協䇿應期含英秀出岐嶷之姿實朗實極在生十旬察人識物儀同聖表聲協音律驤眉識徃俛瞳知來求顔必笑和音則該阿保接手侍御充傍常在襁褓不停幃牀專愛一宫取玩聖皇何圖奄忽罹天之殃魂神遷移精爽翺翔號之不應聴之不聆帝用吁嗟嗚呼哀哉憐爾早没不逮隂光改封大郡惟帝舊疆建土開家邑移藩王琨珮惟鮮朱紱斯煌國號既崇哀爾孤獨配爾君子華宗貴族爵以列侯銀艾優渥成禮於宫靈輀交轂生雖異室殁同山嶽爰構𤣥宫玉石交連朱房皓壁晧曜電鮮飾終備衛法生象存長埏繕修神閨掩扉二柩並降雙魂孰依人誰不殁憐爾尚微阿保激摧上聖傷悲城闕之詩以日踰歲况我愛子神光長滅扃闗一闔曷其復晰蒼舒誄建安十二年五月甲戍童子曹蒼舒卒乃作誄曰於惟淑弟懿矣純良誕豐令質荷天之光既哲且仁爰柔克剛彼徳之容兹我聿行宜逄分祚以永無疆如何昊天凋斯俊英嗚呼哀哉惟人之生忽若朝露促促百年亹亹行暮矧爾既夭十三而卒何辜於天景命不遂哀辭仲雍哀辭曹喈字仲雍魏太子之仲子也三月而生五月而亡昔后稷之在寒氷鬭榖之在楚澤咸依鳥馮虎而無風塵之灾今之𤣥綈文茵無寒氷之慘羅幃綺帳暖於翔鳥之翼幽房閒宇密於雲夣之野慈母良保仁乎鳥虎之情卒不能延期於暮載雖六旬而夭殃彼孤蘭之𦕈𦕈亮成幹其畢榮哀綿綿之弱子早背世而濳形且四孟之未周将願足乎一齡隂雲回於素葢悲風動其扶輪臨埏闥以欷歔淚流射而沾巾金瓠哀辭金瓠予之首女雖未能言固已授色知心矣生十九旬而夭折乃作此辭辭曰在襁褓而撫育尚孩笑而未言不終年而夭絶何見罰於皇天信吾罪之所招悲弱子之無諐去父母之懐抱滅微骸於糞土天長地久人生幾時先後無覺從爾有期行女哀辭行女生於季秋而終於首夏三年之中二子頻喪伊上帝之降命何短修之難裁或華髪以終年或懐姙而逢灾感前哀之未闋復新殃之重來方朝華而晚敷比辰露而先晞感逝者之不追悵情忽而失度天葢高而無階懐此恨其誰訴漢魏六朝百三家集巻二十六
