body:
  text: 漢魏六朝百三家集卷八十一梁蕭統集題詞梁武八男唯豫章性殊餘各有文武才略昭明簡文同母令德文學友于曹子桓兄弟弗如也昭明夭薨簡文敘其遺集頌德十四合之史傳俱非虛美南史所云埋鵝啓釁蕩舟寢疾世疑其誣於是論昭明者斷以姚書為質矣昭明述作文選最有名後人見其選即可以知其志集中諸篇笵金合土雖天趣微損而章程頗密亦文家之善慮彼已者也潯陽陶潛宋之逸民昭明既為立傳又特序之以萬乘元良恣論山澤唐堯汾陽子晉洛濵若有同心擲譏閒情示戒麗淫用申繩墨游於方內不得不然然洛神放蕩未嘗刪之而偏訿此賦於孔子存鄭衛豈有當焉二諦法身解義詳析即𢎞宣未及厥考而清淨實出胸懷識者以為則賢乎爾目録賦殿賦銅博山香爐賦扇賦鸚鵡賦芙蓉賦疏止三郡民丁就役疏令與晉安王令與殷藝令貽明山賔令答𤣥圃園講頌令詳東宫禮絶傍親議令書答晉安王書答湘東王求文集及詩苑英華書與何𦙍書與張纘論張緬書與殷鈞書答法雲請開講書重答法雲師書啓謝敕賚地圖啓謝敕賚水犀如意啓謝敕賚制㫖大涅槃經講疏啓謝敕賚看講啓謝敕參解講啓謝敕賚制㫖大集經講疏啓東宫掘得慈覺寺鐘啓十二月啓太蔟正月夾鍾二月姑洗三月中呂四月蕤賓五月林鍾六月夷則七月南呂八月無射九月應鍾十月黃鍾十一月大呂十二月序文選序陶靖節集序七七契贊弓矢贊制法則贊蟬贊傳陶靖節傳義解二諦義并問答解法身義樂府有所思相逢狹路間三婦豔飲馬長城窟行長相思將進酒上林詩示徐州弟詒明山賓春日宴晉熙王美人晨粧宴闌思舊詠山濤王戎詩二首并序和武帝遊鍾山大愛敬寺開善寺法㑹同泰僧正講并序鍾山解講𤣥圃講東齊聽講講席將訖賦三十韻詩依次用林下作妓詩擬古賦書帙詠同心蓮詠彈筝人餞庾仲容貌雪示雲麾弟擬古大言細言漢魏六朝百三家集卷八十一目録欽定四庫全書漢魏六朝百三家集卷八十一明張溥輯梁蕭統集賦殿賦觀華䂄之美者莫若高殿之麗也高殿博敞華色照朗內備雜藻外發珍象延脰觀之欣然俯仰闌檻參差棟宇齊畟𤣥黃既具鮮麗亦發椽并散節若山若谷或象翔鳥或擬森竹藻棁鮮華而粲色山節珍形而曜目旅視刑則委纍嵯峨雕丹文於簷際鏤華形以列羅若乃日照珠簾彪炳灼爍輕風吹幌乍揚乍薄接長棟之耿耿簷垂溜於四隅建廂廊於左右造金墀於前廡卷高帷於玉楹且散志於琴書銅博山香爐賦禀至精之純質産靈嶽之幽深經般倕之妙㫖運公輸之巧心有薰帶而巖隱亦霓裳而升仙寫嵩山之巃嵸象鄧林之芊眠方夏鼎之瓌異類山經之俶詭制一器而備衆質諒兹物之為侈於時青女司寒紅光繄景吐圓舒於東嶽匿丹曦於西嶺翠帷已低蘭膏未屏爨松柏之火焚蘭麝之芳熒熒內曜芬芬外揚似慶雲之呈色如景星之舒光齊姬合歡而流盼燕女巧笑而蛾揚超公聞之見錫粵文若之留香信名嘉而器美永服玩於華堂扇賦匠人之巧製女工之妙織九折翠竹之枝直截飛禽之翼雖復草木燋枯金沙銷鑠火山熾寒泉涸能使凄兮似秋隆暑斯却鸚鵡賦有能言之竒鳥每知來而發聲乍青質而翠映或體白而雪明喙前鈎而趨步翼高舞而翩翾足若丹而三布目如金而雙圓芙蓉賦色兼列綵體繁衆號初榮夏芬晚花秋曜興澤陂之徽章結江南之流調疏止三郡民丁就役疏伏聞當發王辨等上東三郡民丁開漕溝渠導泄震澤使吳興一境無復水災誠矜恤之至仁經略之逺㫖暫勞永逸必獲後利未萌難覩竊有愚懷所聞吳興纍年失收民頗流移吳郡十城亦不全熟唯義興去秋有稔復非常役之民即日東境榖稼猶貴劫盜屢起在所有司不皆聞奏今征戍未歸彊丁疏少此雖小舉竊恐難合吏一呼門動為民蠧又出丁之處逺近不一比得齊集已妨蠶農去年稱為豐嵗公私未能足食如復今兹失業慮恐為弊更深且草竊多伺候民間虛實若善人從役則抄盜彌增吳興未受其益內地已罹其弊不審可得權停此功待優實以行聖心垂矜黎庶神量久已有在臣意見庸淺不識事宜茍有愚心願得上啓令與晉安王令明北兖到長史遂相係凋落傷怛悲惋不能已巳去歲陸太常殂歿今兹二賢長謝陸生資忠履貞冰清玉潔文該四始學遍九流高情勝氣逌然直上明公儒學稽古淳厚篤誠立身行道始終如一儻值夫子必升孔堂到子風神開爽文義可觀當官蒞事介然無私皆海內之俊乂東序之祕寶此之嗟惜更復何論但遊處周旋並淹歲序造膝忠規豈可勝說幸免祗悔實二三子之力也談對如昨音言在耳零落相仍皆成異物每一念至何時可言天下之寶理當惻愴近張新安又致故其人文筆𢎞雅亦足嗟惜隨弟府朝東西日久尤當傷懷也比人物零落特可傷惋屬有今信乃復及之與殷藝令北兖信至明常侍遂至殞逝聞之傷怛此賢儒術該通志用稽古溫厚淳和倫雅𢎞篤授經以來迄今二紀若其上交不諂造膝忠規非顯外迹得之胸懷者蓋亦積矣攝官連率行當言歸不謂長往眇成疇日追憶談緒皆為悲端往矣如何昔經聯事理當酸愴也貽明山賔令明祭酒雖出撫大藩擁旄推轂珥金拖紫而恆事屢空聞構宇未成今送薄助答𤣥圃園講頌令得書并所製講頌首尾可觀殊成佳作辭典文豔既溫且雅豈直斐然有意可謂卓爾不羣覽以回環良同愈疾至於雙因八辨彌有法席之致銀草金雲殊得物色之美吾在原之意甚用欣懌遲面乃悉此不盡言統報詳東宫禮絶傍親議令張鏡儀記云依士禮終服月稱慕悼又云凡三朝發哀者踰月不舉樂劉僕射議云傍絶之義義在去服服雖可奪情豈無悲卒哭之後依常舉樂稱悲竟此理例相符尋情悲之說非止卒哭之後緣情為論此自難一也用張鏡之舉樂棄張鏡之稱悲一鏡之言取捨有異此自難二也陸家令止云多歷年所恐非事證雖復纍稔所用意常未安近亦常經以此問外由來立意謂猶應有慕悼之言張豈不知舉樂為大稱悲事小所以用小而忽大良亦有以至如元正六佾事為國章雖情或未安而禮不可廢鐃吹軍樂比之亦然書疏方之事則成小差可緣心聲樂自外書疏自內樂自他書自巳劉僕射之議即情未安可令諸賢更共詳衷書答晉安王書得五月二十八日疏并詩一首省覽周環慰同促膝汝本有天才加以愛好無忘所能日見其善首尾裁淨可為佳作吟玩反覆欲罷不能相如奏賦孔璋呈檄曹劉異代並號知音發歎凌雲興言愈病嘗謂過差未以信然一見來章而樹萱忘痗方證昔談非為妄作炎凉始貿觸興自高覩物興情更向篇什昔梁王好士淮南禮賢逺致賔游廣招英俊非唯籍甚當時故亦傳聲不朽必能虗已自來慕義含毫屬意差有起豫攝養得宜與時無爽耳既責伐有寄居多暇日殽核墳史漁獵詞林上下數千年間無人致足樂也知少行游不動亦靜不出户庭觸地丘壑天游不能隱山林在目中冷泉石鏡一見何必勝於傳聞松塢杏林知之恐有逾就吾靜然終日披古為事泛觀六籍雜玩文史見孝友忠烈之跡覩治亂驕奢之事足以自慰足以自言人師益友森然在目嘉言誠至無俟旁求舉而行之念同乎此但清風朗月思我友于各事藩維未克棠棣興言屆此夢寐增勞善護風寒以慰懸想指復立此促遲還書某疏答湘東王求文集及詩苑英華書得疏知須詩苑英華及諸文製發函伸紙閲覽無輟雖事涉烏有義異擬倫而清新卓爾殊為佳作夫文典則纍野麗則傷浮能麗而不浮典而不野文質彬彬有君子之致吾嘗欲為之但恨未遒耳觀汝諸文殊與意㑹至於此書彌見其美逺兼邃古傍槩典墳學以聚益居焉可賞吾少好斯文迄兹無倦談經之暇斷務之餘陟龍樓而靜拱掩鶴關而高卧與其飽食終日寧游思於文林或日因春陽其物韶麗樹花發鶯鳴和春泉生暄風至陶嘉月而熙游籍芳草而眺矚或朱炎受謝白藏紀時玉露夕流金風時扇悟秋山之心登高而逺託或夏條可結倦於邑而屬詞冬雪千里覩紛霏而興詠密親離則手為心使昆弟宴則墨以硯露又愛賢之情與時而篤冀同市駿庶匪畏龍不追子晉而事似洛濵之游多愧子桓而興同漳川之賞漾舟𤣥圃必集應阮之儔徐輪博望亦招龍淵之侶校核仁義源本山川㫖酒盈罍嘉殽益俎曜靈既隱繼之以朗月高舂既夕申之以清夜並命連篇在兹彌博又往年因暇搜採英華上下數十年間未易詳悉猶有遺恨而其書已傳雖未為精核亦粗足諷覽集乃不工而並作多麗汝既須之皆遣送也某啓與何𦙍書某叩頭叩頭昔園公道勝漢盈屈節春卿經明漢莊北面况乃義兼乎此而顧揆不肖哉但經途千里眇焉莫因何嘗不夢姑胥而鬱陶想具區而杼軸心往形留於兹有年載矣方今朱明受謝清風戒寒想攝養得宜與時休適耽精義味𤣥理息囂塵玩泉石激揚碩學誘接後進志與秋天競高理與春泉爭溢樂可言乎豈與口厭芻豢耳聆絲竹之娛者同年而語哉方今泰階端平天下無事修日養夕差得從容鑽閲六經泛濫百氏研尋物理領略清言既以自慰且以自警而才性有限思力匪長熱疹惛憒多慙過目釋卷便忘是以䝉求之懷於兹彌軫聊遣典書陳顯宗申其藴結想敬缺宜此豈盡意與張纘論張緬書賢兄學業該通蒞事明敏雖倚相之讀墳典郤縠之敦詩書惟今望古蔑以斯過自列宫朝二紀將及義惟僚屬情實親友文筵講席朝遊夕宴何曽不同兹勝賞共此言寄如何長謝奄然不追且年甫强仕方申才力摧苗落穎彌可傷惋念天倫素睦一旦相失如何可言言及增哽攬筆無次與殷鈞書鈞為臨川內史母憂去職居喪過禮太子憂之手書戒諭知比諸德哀頓為過又所進殆無一溢甚以酸耿迥然一身宗奠是寄毁而滅性聖教所不許宜微自遣割俯存禮制饘粥果蔬少加勉彊憂懷既深指故有及并令繆道臻口具答法雲請開講書統覽近示知欲見令道義夫釋教凝深至理淵粹一相之道杳然難測不二之門寂焉無響自非深逹𤣥宗精解妙義若斯之處豈易輕辨至於宣揚正教在乎利物耳弟子之於內義誠自好之樂之然鉤深致逺多所未悉為利之理蓋何足論諸僧並入法門游道日廣至於法師彌不俟說云欲見餐稟良所未喻想得此意不復多云統和南重答法雲師書重覽來示知猶欲令述義不辨為利具如前言井露之開彌慙來說若止是略標義宗無為不爾但愧以魚目擬法師之夜光耳統和南啓謝敕賚地圖啓漢氏輿地形兹未擬晉世方丈比此非妙匹之長樂惟畫古賢儔之未央止圖將帥未有洞該八藪混觀六合域中天外指掌可求地角河源户庭不出豈問千秋自識烏桓之地脫逢壯武方著博物之書謝敕賚水犀如意啓臣統啓應敕左右伯佛掌奉宣敕㫖垂賚水犀如意一柄式是道義所須白玉照彩方斯非貴珊瑚挺質匹此未珍雕剞既成先被庸薄如䝉漢帝之簮似獲趙堯之印謹仰承威神陳諸講席方使歡喜羅漢懷棄鉢之嗟王式碩儒欣驪駒之辨熊飾寶刀子桓恧其大賚犛牛輕拂張敞慙其舊儀殊恩特降伏深荷躍不任下情謹啓事以聞謹啓謝敕賚制㫖大涅槃經講疏啓臣統啓後閣應敕木佛子奉宣敕㫖垂賚制㫖大般涅槃經講疏一部十袠合目百一卷寒鄉覩日未足稱竒採藥逢仙曽何譬喜臣伏以六爻所明至邃窮於幾象四書所總施命止於域中豈有牢籠因果辨斯寶城之教網羅真俗開兹月滿之文方當道洽大千化均百億雲彌識種雨遍身田豈復論唐帝龜書周王策府何待刋寢孟津屛黜丘索甘露妙典先降殊恩揣已循愚不勝慶荷不任頂戴之至謹奉啓謝敕賚看講啓臣統啓主書管萬安奉宣敕㫖以臣今講竟曲垂勞問伏以正言深奧總一羣經均斗杓以命四時等太陽而照萬國臣不涯庸淺輕敢奉宣莫測天文徒觀玉府慙悚交并寢興無置仰降中使俯賚光臨榮荷殊慈靡知啓處不任下情謹附啓事謝聞謹啓謝敕參解講啓臣統啓主書周昻奉宣敕㫖垂參臣今解講伏以至理希夷微言淵奧非所能鑽仰遂以蕪庸叨兹宣釋將應讓齒反降教胄之恩允宜尚學翻荷說經之詔竊以挾八威之䇿則神物莫干服九丹之華則仙徒可役臣仰承皇威訓兹學侶奉揚聖㫖洞曉羣儒鼓冶異師陶鈞久滯方使惠施恧其短長公孫罷其堅白王生挫辨既盡神氣法開受屈永隱東峰中使曲臨彌光函席仰戴殊慈不知啓處不任下情謹奉啓事謝聞謹啓謝敕賚制㫖大集經講疏啓臣統啓宣詔王慧寶奉宣敕㫖垂賚制㫖大集經講疏二袠十六卷甘露入頂慧水灌心似暗遇明如饑獲飽伏以非色非欲二界同坊匪文匪理三詮雲集四辨言而未極八聲闡而莫窮俯應天機垂兹聖作同真如而無盡與日月而俱懸但觀寶舂山獲珠大海臣實何能恆䝉誘被張奏含筆豈足陳心抗袖長言未伸歌舞不任喜荷之至謹奉啓謝聞謹啓東宫掘得慈覺寺鐘啓竊以白亭舊室絶顯禎祥之氣闕里故堂暫聞鐘石之響猶復存諸良史汗彼篆素豈如杏梁遺飾回成紺殿椒墀昔處仍構寶階啓彞鐘於殊里記靈文於福地雖魏廟出璽魯祠現璧固以推兹孝感恧此禎契將郭令鄙其開金羊田陋其産玉豈直季武庭樹愧韓起之譽蜀相宅基慙孝安之碣伏惟覽啓增思撫瑞深悲慟切視奩哀喻封篋十二月啓太蔟正月伏以北斗周天送𤣥英之故節東風拂地啓青陽之芳辰梅花舒兩歲之􅏻柏葉泛三元之酒飄颻餘雪入簫管以成歌皎潔清冰對蟾光而寫鏡敬想足下神游書帳性縱琴堂談叢發流水之源筆陳引崩雲之勢昔時文㑹長思風月之交今日言離永歎參商之隔但某執鞭賤品耕鑿庸流沈形南畝之間滯迹東臯之上長懷盛德聊吐愚衷謹慿黃耳之傳佇望白雲之信夾鍾二月伏以節應佳辰時登令月和風拂逈淑氣浮空走野馬於桃源飛少女於李徑花明麗月光浮竇氏之機鳥哢芳園韻響王喬之管敬想足下優游泉石放曠煙霞尋五栁之先生琴尊雅興謁孤松之君子鸞鳳騰翩成萬世之良規實百年之令範但某席户幽人蓬門下客三冬勤學慕方朔之雄才萬卷常披習鄭𤣥之逸氣既而風塵頓隔仁智並乖非無衰侣之憂誠有離羣之恨謹伸數字用寫寸誠姑洗三月伏以景逼徂春時臨變節啼鶯出谷爭傳求友之音翔蘂飛林競散佳人之靨魚游碧沼疑呈遠道之書燕語雕梁狀對幽閨之語鶴帶雲而成蓋遙籠大夫之松虹跨澗以成橋遠現美人之影對兹節物寧不依然敬想足下聲馳海內名播雲間持郭璞之毫鸞詞瑒月白吞羅含之彩鳳辨囿日新某山北逸人墻東隱士龍門退水望冠冕以何年鷁路頽風想簪纓於幾載既違語默且阻江湖聊寄八行之書代申千里之契中吕四月節屆朱明晷鍾丹陸依依聳蓋俱臨帝女之桑鬱鬱丹城並挂陶潛之栁梅風拂户牖之內麥氣擁宫闕之前敬想足下聲聞九臯詩成七步涵蚌胎於學海卓爾超羣藴鵲抵于文山儼然孤秀但某窮途異縣岐路他鄉非無阮籍之悲誠有楊朱之泣每遇秋風振響鶉驚子夏之衣夜月流輝鵲繞將軍之樹既乖連璧之契終隔斷金之情中心藏之卑誠至矣今因去鴈聊寄芻蕘如遇回鱗希垂玉翰蕤賓五月麥隴移秋桑律漸暮蓮花泛水豔如越女之腮蘋葉漂風影亂秦臺之鏡炎風以之扇户暑氣于是盈樓涷雨洗梅樹之中火雲燒桂林之上敬想足下追涼竹徑托蔭松間彈伯牙之素琴酌嵇康之緑酒縱橫流水酩酊頽山實君子之佳游乃王孫之雅事某沈疴漳浦卧病泉山頓懷劉幹之勞鎮抱相如之酷是知枯榮莫測生死難量驗風燭之不停如水泡之易滅聊伸弊札以代勞人佇觀芳詞希垂愈病林鍾六月三伏漸終九夏將謝螢飛腐草光浮帳裏之書蟬噪繁柯影入機中之鬢濯枝遷而潦溢芳槿茂而發榮山土焦而流金海水沸而漂爍敬想足下藏形月府遁跡冰床披莊子之七篇逍遙物外玩老聃之兩卷恍惚懷中但某白社狂人青緗末學不從州縣之職聊立松篁之間時假德以為鄰或借書而取友三千年之獨鶴暫逐雞羣九萬里之孤鵬權潛燕侣既非得意正可忘言諸不具伸應俟面㑹夷則七月素商驚辰白藏屆節金風曉振偏傷征客之心玉露夜凝真泫仙人之掌桂吐花于小山之上梨翻葉於大谷之中故知節物變衰草木搖落敬想足下時稱獨步世號無雙萬頃澄波黃叔度之器量千尋聳幹嵇中散之楷模但某一介庸才三隅頑學懷經問道不遇披雲負笈尋師罕逢見日俯仰興歎形影自憐不知龍前不知牛後鷽鵬雖異風月是同幸矣擇交希垂影拂南吕八月一歎分飛三秋限隔遐思盛德將何以伸白雲斷而音信稀青山暝而江湖逺敬想足下羽儀勝眷領褎嘉賔傾玉醅于風前弄瓊駒于月下但某登山失路涉海迷津聞猿嘯而寸寸斷腸聽鳥聲而雙雙下淚當以黃花笑冷白羽悲秋既傳蘇子之書更泛陶公之酌聊因三鳥略叙二難面㑹取書不能盡述或叨風念不黜魚緘無射九月宿昔親朋平生益友不謂窮通有分雲雨將乖既深伐木之聲更問採葵之詠屬以重陽變叙節景窮秋霜抱樹而擁柯風拂林而下葉金堤翠栁帶星彩而均調紫塞蒼鴻追風光而結陳敬想足下秀標東箭價重南金才過吞鳥之聲德邁懷蛟之智但某衡門賤士甕牖微生既無白馬之談且乏碧雞之辨歎分飛之有處嗟㑹面以無期聊申布復之言用述併糧之志應鍾十月節屆𤣥靈鍾應陰律愁雲拂岫帶枯葉以飄空翔氣浮川映危樓而疊迥胡風起截耳之凍趙日興曝背之思敬想足下山嶽鍾神星辰挺秀潛明晦跡隱於朝市之間縱法化人不混鄉閭之下某陋巷孤游穿牆自活終朝息爨若孔子之為貧竟日停炊如范生之在職牛衣常被畏見王章犢鼻親操恐逢犬子雖此慙賤而不羞貧綺服有時此言何述黃鍾十一月日往月來灰移火變暫乖語默頓隔秦吳既傳蘇李之書更共范張之志冷風盛而結鼻寒氣切而凝脣虹入漢而藏形鶴臨橋而送語彤雲垂四面之葉玉雪開六出之花敬想足下世號冰壺時稱武庫命長袂而留客施大被以招賢酌醇酒而攄切骨之寒溫獸炭而袪透心之冷某攜戈日久荷㦸年深揮白創而萬定死生引虹旗而千決成敗退龍劒而却步月下開營進鯨鼓而橫行雲前起陳徒勞斬斫豈用功勳諸不具陳謹伸微意大吕十二月分手未遙翹心且積引領企踵朝夕不忘眷友思仁行坐未捨既屬嚴風極冷苦霧添寒冰堅漢地之池雪積袁安之宅敬想足下棲神鶴駕眷想龍門披玩之間願無捐德某種瓜賤士賣餅貧生入爨竈以揚聲不逢蔡子駕鹽車而顯跡罕遇孫陽徒懷叩角之心終想暴腮之患既為久要聊吐短章紙盡墨窮何能懇露序文選序式觀元始眇覿𤣥風冬穴夏巢之時茹毛飲血之世世質民淳斯文未作逮乎伏羲氏之王天下也始畫八卦造書契以代結繩之政由是文籍生焉易曰觀乎天文以察時變觀乎人文以化成天下文之時義逺矣哉若夫椎輪為大輅之始大輅寧有椎輪之質增冰為積水所成積水曽微增冰之凛何哉蓋踵其事而增華變其本而加厲物既有之文亦宜然隨時變改難可詳悉嘗試論之曰詩序云詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌至於今之作者異乎古昔古詩之體今則全取賦名荀宋表之於前賈馬繼之於末自兹以降源流實繁述邑居則有慿虛亡是之作戒畋遊則有長楊羽獵之制若其紀一事詠一物風雲草木之興魚蟲禽獸之流推而廣之不可勝載矣又楚人屈原含忠履潔君匪從流臣進逆耳深思逺慮遂放湘南耿介之意既傷一鬱之懷靡訴臨淵有懷沙之志吟澤有憔悴之容騷人之文自兹而作詩者蓋志之所之也情動於中而形於言關雎麟趾正始之道著桑間濮上亡國之音表故風雅之道粲然可觀自炎漢中葉厥塗漸異退傅有在鄒之作降將著河梁之篇四言五言區以别矣又少則三字多則九言各體互興分鑣並驅頌者所以游揚德業褒讃成功吉甫有穆若之談季子有至矣之歎舒布為詩既言如彼總成為頌又亦若此次則針興於補闕戒出於弼匡論則析理精微銘則序事清潤美終則誄發圖像則讃興又詔誥教令之流表奏箋記之列書誓符檄之品弔祭悲哀之作答客指事之制三言八字之文篇詞引序碑碣志狀衆制鋒起源流間出譬陶匏異器並為入耳之娛黼黻不同俱為悅目之玩作者之致蓋云備矣余監撫餘閒居多暇日歷觀文囿泛覽辭林未嘗不心遊目想移晷忘倦自姫漢以來眇焉悠邈時更七代數逾千祀詞人才子則名溢於縹囊飛文染翰則卷盈乎緗帙自非略其蕪穢集其清英蓋欲兼功大半難矣若夫姬公之籍孔父之書與日月俱懸鬼神爭奧孝敬之准式人倫之師友豈可重以芟夷加之剪截老莊之作管孟之流蓋以立意為宗不以能文為本今之所選又亦略諸若賢人之美詞忠臣之抗直謀夫之話辨士之端冰釋泉湧金相玉振所謂坐狙丘議稷下仲連之却秦軍食其之下齊國留侯之發八難曲逆之吐六竒蓋乃事美一時語流千載概見墳籍旁出子史若斯之流又亦繁博雖傳之簡牘而事異篇章今之所集亦所不取至於記事之史繫年之書所以褒貶是非紀别異同方之篇翰亦已不同若其讃論之綜緝辭采序述之錯比文華事出於沈思義歸乎翰藻故與夫篇什雜而集之逺自周室迄於聖代都為三十卷名曰文選云爾凡次文之體各以彚聚詩賦體既不一又以類分類分之中各以時代相次陶靖節集序夫自衒自媒者士女之醜行不忮不求者明達之用心是以聖人韜光賢人遁世其故何也含德之至莫踰於道親已之切無重於身故道存而身安道亡而身害處百齡之內居一世之中倐忽比之白駒寄遇謂之逆旅宜乎與大塊而盈虛隨中和而任放豈能戚戚勞於憂畏汲汲役於人間齊謳趙女之娛八珍九鼎之食結駟連騎之榮侈袂執圭之貴樂既樂矣憂亦隨之何倚伏之難量亦慶弔之相及智者賢人居之甚履薄冰愚夫貪士競之若泄尾閭玉之在山以見珍而終破蘭之生谷雖無人而自芳故莊周垂釣於濠伯成躬耕於野或貨海東之藥草或紡江南之落毛譬彼鴛雛豈競鳶鴟之肉猶斯雜縣寧勞文仲之牲至於子常寧喜之倫蘇秦衛鞅之匹死之而不疑甘之而不悔主父偃言生不五鼎食死則五鼎烹卒如具言豈不痛哉又楚子觀周受折於孫滿霍矦驂乘禍起於負芒叨餮之徒其流甚衆唐堯四海之主而有汾陽之心子晉天下之儲而有洛濵之志輕之若脫屣視之若鴻毛而况於他人乎是以至人達士因以晦迹或懷釐而謁帝或被褐而負薪鼓枻清潭棄機漢曲情不在於衆事寄衆事以忘情者也有疑陶淵明詩篇篇有酒吾觀其意不在酒亦寄酒為迹者也其文章不羣辭彩精拔跌宕昭彰獨超衆類抑揚爽朗莫之與京橫素波而傍流干青雲而直上語時事則指而可想論懷抱則曠而且真加以貞志不休安道苦節不以躬耕為恥不以無財為病自非大賢篤志與道汚隆孰能如此乎余素愛其文不能釋手尚想其德恨不同時故加搜校粗為區目白璧微瑕惟在間情一賦揚雄所謂勸百而諷一者卒無諷諌何足搖其筆端惜哉亡是可也并粗㸃定其傳編之於録嘗謂有能觀淵明之文者馳競之情遣鄙吝之意祛貪夫可以廉懦夫可以立豈止仁義可蹈抑乃爵祿可辭不必傍游泰華逺求柱史此亦有助於風教也七七契奚斯逸士肥遁棄榮蓮峰於焉剗跡灌木是用庇形口不悅於五味心不娛於八聲鄙巢父之稱哲笑蘇門之為英鵠蓋龍旗初不關意鳳吹鼉鼓終不屑情跨四海而擅美邁三古而振名居山林而不返終無慮而無營於是辨博君子詞若湧泉言踰却秦之魯辨超稷下之田欲抑則大鵬垂趐欲抗則尺鷃冲天聞逸士之懷寶乃拂衣而造焉駕兩驂之如手乘輕車之若流爰自畿甸徑造山周傍瞻虹見俯眺雲浮鳴禽聒耳零霧蔽眸唯一壑之為阻無三徑之可求於是披榛陟路援蘿踐崿雖跋涉而不休覩逸士之所託其為居也寂焉而靡所聽瞑然而無所瞻三椿蔓户八桂攢簷蓽門鳥宿圭竇狐潛風來室搖露下窗霑實人跡之罕至逸士於此而獨淹君子曰蓋聞智士不希狷介仁者莫有迷邦傅說終受殷爵吕望遂啓齊封余敬吐誠而畢慮子能留志而見從乎逸士曰鄙人固陋自潛幽藪必枉話言敬聆金口君子曰若夫夾鍾之節春景依遲碧樹初蘂緑草含滋春臺之樂信矣熙熙於是百金之士萬鍾之家招搖隆富徵集豪華駕紫騮之馬乘青蓋之車出自高宇行無狹斜陶嘉月而結交遊藉芳辰而宴朋友望宜春以隨肩入長楊以攜手金盤薦美藉之珍玉杯沈縹清之酒義曰和神事非爽口於是娛樂未終留光將夕飛觴引滿奮袖舉白投轄安坐歡甚促席以㑹雕蟲之賔加有清談之客論同炙輠藻若凌雲戴憑不能高其說相如不能擅其文無𤣥不折無細不分搦簡玉振下筆蘭芬乃亦六郡莫擬非直三蜀蔑聞屬虞泉氣晚朗月潛曜清巵未闌宵景方照竒舞遞作名謳斯召約綽妍姿嬋嫣宜笑綺縠風吹珠璣星耀齊竽揚參差之響趙瑟奏鏗鏘之妙兹亦遊宴之至娛子能偕此而為樂乎逸士曰輕蕩遊觀非豫所耽得性行樂從好山南君子曰輔性和神實惟至味非直方今見重乃亦自古攸貴不周之和調腸補胃雜以龍肝玃炙豹舌猩脣劉氏之醢范公之麟鶬出雲際鱘來江岷蒲俎芬馥古聖所珍其酒則蒼梧九醖中山千日取譬湛露擬之飴蜜百味交馳三雅間出若其珍異則修筵斯溢千品萬類不可詳悉西母靈桃南楚萍實東陵之瓜北燕之栗湖畔之柿江隂之橘張掖白奈恆陽黃梨河東洗犬隴蜀蹲鴟並怡神甘口窮美極滋加以伊公調和易氏燔爨傳車渠之碗置青玉之案瑶俎既已麗竒雕盤復為美玩子能與豫而享之乎逸士曰甘膬腸腐五味口爽伊人素蓄無羡方丈君子曰千里之駒出自余吾伯樂所選伏波所模通肩合相平腹應圖激電比速躡景競驅騰黃弗敢擬駿赤兔莫與爭途異態蹥踡竒姿猗倚逸足驟反遊雲移駛形函遊華日不暇徙乃飾金羈之昭晰加以玉鞍之輝煥連乾麗靡輕蘇燦爛逸氣既為勝矚美飾重成壯觀蹄蹶紅塵膺流絳汗風起龍驤灰聲鳥散自古迄今人誰不玩逸士能就豫而乘之乎逸士曰遊逸輕佻策馬爭驅粵今樂靜豈能感娛君子曰光形飾體莫過解衣冠鵕䴊之長纓若曽雲之零霏琅玕珩珮言飾于背飄揚輕裾是用曜軀方空之綬弱紈之蕉暑才炙而已却風未至而先搖既唯照麗兼以輕鏘似朝霞之發彩若夕景之舒光至夫杪秋既謝寒緒中人則輕狐稱美豐貂表珍斯乃赤也所以去魯孟嘗所以出秦步光之妙櫑具之華君子武備所用禦邪標以珠玉飾以蓮花其任則百冶精鋭利擬秋霜豈止在身為美服襲稱臧固乃龍躍於襄水見氣於南昌幽通神化其妙難詳將與逸士服之以相羊逸士曰袗絺避暑緼袍禦冬鮮麗綺靡未之或從君子曰實有喬桐抽葉青葱結根善地擢幹華嵩栖鳳曽山之側藏龍平陵之東拂靉靆之高雲鼓捎殺之雄風岧亭萬仞實造天中乃使匠石運斤班輸琢錘製起𤣥修形踰緑綺與金石而鏗鏘共絲竹而曼靡托北方之佳人命高樓之杞氏間以巴隴才僮邯鄲妙妓騁獸為之輟馳飛禽為之不徙加以荆和之飾照耀柘絲之絃激揚三聲吐韻四結流唱辭高薰奏響溢芝房竹來嶰谷律寫歸昌再鼓而𤣥鶴集九成而儀鳳翔初音魚踊餘妙繞梁何止田文慨慷劉靖心傷而已哉中山青曲若折而和揚美目以流眄啓玉齒而安歌歌曰陽阿奏兮激楚流望洛水兮有好仇縱輕櫂兮泛龍舟將與逸士陟彼華堂憩諸閎館玉宇明華文階燦爛璇題昭晰珠簾彪煥身託玳瑁之筵目寓瓊華之玩且以悅諸和性之樂豈非綺麗之觀哉逸士曰居兹四郭寧辨五音靡曼不極君子弗欽雖聞贍辭之鋭無㑹野人之心君子曰白藏肅殺天高野清玉樹始落金蘂初榮幕燕北反沙鴈南征實秋收之美節將校獵以娛情使櫪無伏馬巷靡遺行執戈於芊眠之野彎弧於曠浪之隂養由輕盼則林摧鷙獸蒲且效技則虛下翔禽騰猿蹶其足虓虎不擇音掩兔轔鹿既蔑古之烏有填坑滿谷亦眇昔之上林至於輕繳才飛則連鴻解羽微纎始放則並鱗失波豈論𤣥泉之則寧願將遨之歌弭節言旋禽不可算周旋眺覽足為京觀子雖山栖其從此玩逸士曰解網垂仁殷王美則聞聲不食孔聖淑音害蠢類而為樂豈君子之用心君子曰蓋聞地美養禾君人愛士澤被無垠光照郊鄙蒲輪必鄒魯之儒宗紆青必洛陽之才子大漢愧得人之盛有周慙以寧之美萬國若翕從四海同使指刑措弗用囹圄斯虛既講禮於太學亦論詩於石渠戈有載戢史無絶書銅律應度玉燭調和黃髮擊壤青襟興歌元帥竒士庠序鴻生求禮義之汲汲行仁義之明明隆采椽之義却玳瑁之榮當朝有仁義之睦邊境無煙塵之驚信如四氣明並三光厨萐挺茂階蓂吐芳瑞鹿摛素祥熊耀黃靈禽樂囿儀鳳栖堂太平之瑞寶鼎樂協之應玉羊丹烏表色玉露呈瀼野絲垂木嘉苗貫桑固以德苞子姒道邁虞唐六合寧泰四宇咸康不煩一㦸東甌膜拜詎勞一卒西域獻琛鹿蠡稽顙以悛惡樓蘭面縛而革音吾皆去鼻飲之穴棄烏舉之深固己澤流無外恩被遐方福比嵩岱道則穹蒼豈有聞若斯之化而藏其皮冠哉逸士曰鄙人寡識守節山隅不聞智士之教將自潛以糜軀請伏道而從命願開志以滌慮贊弓矢贊弓用筋角矢製良工亦以觀德非止臨戎楊葉命中猿墮長空制法則贊惟斯法則信如四時嚴此刑政刑輕罪疑霜威以振民不敢欺蟬贊兹蟲清潔惟露是餐寂寞秋序咽哳夏闌豈伊不美曜彼華冠傳陶靖節傳陶淵明字元亮或云潛字淵明潯陽柴桑人也曽祖侃晉大司馬淵明少有高趣博學善屬文穎脫不羣任真自得嘗著五栁先生傳以自况曰先生不知何許人也亦不詳姓氏宅邊有五栁樹因以為號焉間靜少言不慕榮利好讀書不求甚解每有㑹意欣然忘食性嗜酒而家貧不能恆得親舊知其如此或置酒招之造飲輒盡期在必醉既醉而退曽不吝情去留環堵蕭然不蔽風日短褐穿結簞瓢屢空晏如也嘗著文章自娛頗示已志忘懷得失以此自終時人謂之實録親老家貧起為州祭酒不堪吏職少日自解歸州召主簿不就躬耕自資遂抱羸疾江州刺史檀道濟往候之偃卧瘠餒有日矣道濟謂曰賢者處世天下無道則隱有道則至今子生文明之世奈何自苦如此對曰潛也何敢望賢志不及也道濟餽以粱肉麾而去之後為鎮軍建威參軍謂親朋曰聊欲弦歌以為三徑之資可乎執事者聞之以為彭澤令不以家纍自隨送一力給其子書曰汝旦夕之費自給為難今遣此力助汝薪水之勞此亦人子也可善遇之公田悉令吏種秫曰吾常得醉於酒足矣妻子固請種粳乃使二頃五十畝種秫五十畝種粳嵗終㑹郡遣督郵至縣吏請曰應束帶見之淵明歎曰吾豈能為五斗米折腰向鄉里小兒即日解綬去職賦歸去來徴著作郎不就江州刺史王𢎞欲識之不能致也淵明嘗往廬山𢎞命淵明故人龎通之齎酒具於半道栗里之間邀之淵明有腳疾使一門生二兒舁籃輿既至欣然便共飲酌俄頃𢎞至亦無忤也先是顔延之為劉栁後軍功曹在潯陽與淵明情欵後為始安郡經過潯陽日造淵明飲焉每往必酣飲至醉𢎞欲邀延之坐彌日不得延之臨去留二萬錢與淵明淵明悉遣送酒家稍就取酒嘗九月九日出宅邊菊叢中坐久之滿手把菊忽值𢎞送酒至即便就酌醉而歸淵明不解音律而蓄無弦琴一張每酒適輒撫弄以寄其意貴賤造之者有酒輒設淵明若先醉便語客我醉欲眠卿可去其真率如此郡將常候之值其釀熟取頭上葛巾漉酒漉畢還復著之時周續之入廬山事釋慧逺彭城劉遺民亦遁迹匡山淵明又不應徴命謂之潯陽三隱後刺史檀韶苦請續之出州與學士祖企謝景夷三人共在城北講禮加以讐校所住公廨近於馬隊是故淵明示其詩云周生述孔業祖謝響然臻馬隊非講肆校書亦已勤其妻翟氏亦能安勤苦與其同志自以曽祖晉世宰輔恥復屈身後代自宋高祖王業漸隆不復肯仕元嘉四年將復徴命㑹卒時年六十三世號靖節先生義解二諦義并問答二諦理實深𤣥自非虛懷無以通其𢎞遠明道之方其由非一舉要論之不出境智或時以境明義或時以智顯行至於二諦即是就境明義若迷其方三有不絶若達其致萬纍斯遣所言二諦者一是真諦二名俗諦真諦亦名第一義諦俗諦亦名世諦真諦俗諦以定體立名第一義諦世諦以褒貶立目若以次第言說應云一真諦二俗諦一與二合數則為三非直數過於二亦名有前後於義非便真既不因俗而有俗亦不由真而生正可得言一真一俗真者是實義即是平等更無異法能為雜間俗者即是集義此法得生浮僞起作第一義者就無生境中别立美名言此法最勝最妙無能及者世者以隔别為義生滅流動無有住相涅槃經言出世人所知名第一義諦世人所知名為世諦此即文證褒貶之理二諦立名差别不同真俗世等以一義說第一義諦以二義說正言此理德既第一義亦第一世既浮僞更無有義所以但立世名諦者以審實為義真諦審實是真俗諦審實是俗真諦離有離無俗諦即有即無即有即無斯是假名離有離無此為中道真是中道以不生為體俗既假名以生法為體南澗寺慧超咨曰浮僞起作名之為俗離於有無名之為真未審浮僞為當與真一體為當有異令㫖答曰世人所知生法為體出世人所知不生為體依人作論應如是說若論真即有是空俗指空為有依此義明不得别異又咨真俗既云一體未審真諦亦有起動為當起動自動不關真諦令㫖又答真理寂然無起動相凡夫惑識自橫見起動又咨未審有起動而凡夫橫見無起動而凡夫橫見令㫖又答若有起動則不名橫見以無動而見動所以是橫又咨若法無起動則唯應一諦令㫖又答此理常寂此是一諦橫見起動復是一諦唯應有兩不得言一又咨為有橫見為無橫見令㫖又答依人為語有此橫見又咨若依人語故有橫見依法為談不應見動令㫖又答法乃無動不妨橫者自見其動丹陽尹晉安王蕭綱咨曰解㫖依人為辨有生不生未審浮虛之與不生只是一體為當有異令㫖答曰凡情所見見其起動聖人所見見其不生依人為論乃是異體若語相即則不成異具如向釋不復多論又咨若真不異俗俗不異真豈得俗人所見生法為體聖人所見不生為體令㫖答即俗知真即真見俗就此為談自成無異約人辨見自有生不生殊又咨未審俗諦之體既云浮幻何得於真實之中見此浮幻令答真實之體自無浮幻惑者橫構謂之為有無傷真實體自虛𤣥又咨聖人所見見不流動凡夫所見自見流動既流不流異愚謂不得為一令答不謂流不流各是一體正言凡夫於不流之中橫見此流以是為論可得成一又咨真寂之體本自不流凡夫見流不離真體然則但有一真不成二諦令答體恆相即理不得異但凡見浮虛聖覩真寂約彼凡聖可得立二諦名招提寺慧琰咨曰凡夫見俗以生法為體聖人見真以不生為體未審生與不生但見其異復依何義而得辨一令答曰凡夫於無稱有聖人即有辨無有無相即此談一體又咨未審此得談一一何所名令答正以有不異無無不異有故名為一更無異名又咨若無不異有有不異無但見其一云何為二令答凡夫見有聖人見無兩見既分所以成二又咨聖人見無無可稱諦凡夫見有何得稱諦令答聖人見無在聖為諦凡夫審謂為有故於凡為諦栖𤣥寺曇宗咨曰聖人為見世諦為不見世諦令答曰聖知凡人見有世諦若論聖人不復見此又咨聖人既不見世諦云何以世諦教化衆生令答聖人無惑自不見世諦無妨聖人知凡夫所見故曲隨物情說有二諦又咨聖人知凡見世諦即此凡夫不令答此凡即是世諦聖人亦不見此凡又咨聖既不見凡焉知凡見世諦令答聖雖自無凡亦能知有凡自謂為有故曲赴其情為說世諦司徒從事中郎王規咨曰未審真俗既不同豈得相即之義令答聖人所得自見其無凡人所得自見其有見自不同無妨俗不出真外又咨未審既無異質而有二義為當義離於體為當即義即體令答更不相出名為一體愚聖見殊自成異義又咨凡夫為但見俗亦得見真令答止得見俗不得見真又咨體既相即寧不覩真令答凡若見真不應覩俗覩俗既妄焉得見真靈根寺僧遷咨曰若第一以無過為義此是讃歎之名真離於俗亦應是讃歎之名令答曰即此體真不得言歎第一義諦既更立美名所以是歎又咨無勝我者既得稱讃歎我體即真何故非歎令答無勝我者所以得稱讃歎我體即真亦是我真故非讃歎又咨我無過者所以得稱讃歎我是不僞何得非讃令答不僞直是當體之名如人體義謂之解義正足稱其實體豈成讃歎又咨此法無能出者焉得即是讃歎令答既云無出非讃如何羅平矦蕭正立咨曰未審俗諦是生法以不令答曰俗諦之體正是生法又咨俗既橫見何得有生令答橫見為有所以有生又咨橫見為有實自無法實既無法說何為生令答即此生法名為橫見亦即此橫見名為生法又咨若是橫見不應有生若必有生何名橫見令答既云橫見實是無生但橫見為有有此橫生衡山侯蕭恭咨曰未審第一義諦既有義目何故世諦獨無義名令答曰世既浮俗無義可辨又咨若無義可辨何以稱諦令答凡俗審見故立諦名又咨若凡俗見有得受諦名亦應凡俗見有得安義字令答凡俗審見故諦名可立浮俗無義何得強字為義又咨浮俗雖無實義不無浮俗之義既有此浮俗何得不受義名令答正以浮俗故無義可辨若有義可辨何名浮俗中興寺僧懷咨曰令㫖解言真不離俗俗不離真未審真是無相俗是有相有無相殊何得同體令答曰相與無相此處不同但凡所見有即是聖所見無以此為論可得無别又咨既是一法云何得見為兩見既有兩豈是一法令答理乃不兩隨物所見故得有兩又咨見既有兩豈不相違令答法若實兩可得相違法常不兩人見自兩就此作論焉得相乖又咨人見有兩可說兩人理既是一豈得有兩令答理雖不兩而約人成兩始興王第四男蕭映咨曰第一義諦其義第一德亦第一不令答曰義既第一德亦第一又咨直言第一已包德義何得復加義字以致繁復令答直言第一在義猶昧第一見義可得盡美又咨若加以義字可得盡美何不加以德字可得盡美令答第一是德豈待復加但加義字則德義雙美又咨直稱第一足見其美偏加義字似有所局令答第一表德復加義字二美俱陳豈有所局吳平世子蕭勵咨曰通㫖云第一義諦世諦褒貶立名真俗二諦定體立名尋真諦之理既妙絶言慮未審云何有定體之㫖令答曰談其無相無真不真寄名相說以真定體又咨若真諦無體今寄言辨體未審真諦無相何不寄言辨相令答寄言辨體猶恐貶德若復寄言辨相則有纍虛𤣥又咨真諦𤣥虛離於言說今既稱有真豈非寄言辨相令答寄有此名名自是相無傷此理無相虛寂又咨未審此寄言辨體為是當理為不當理令答無名而說名不合當理又咨若寄言辨名名不當理未審此寄將何所說令答雖不當理為接引衆生須名相說宋熙寺慧令咨曰真諦以不生為體俗諦以生法為體而言不生即生生即不生為當體中相即為當義中相即令答云體中相即義不相即又咨義既不即體云何即令答凡見其有聖覩其無約見成異就體恆即又咨體既無兩何事須即令答若體無别兩緣見有兩見既兩異須明體即又咨若如解㫖果是就人明即令答約人見為二二諦所以名生就人見明即此亦何妨始興王第五男蕭曄咨曰真諦稱真是實真不令答曰得是實真又咨菩薩㑹真之時為忘俗忘真不令答忘俗忘真故說㑹真又咨若忘俗忘真故說㑹真忘俗忘真何謂實真令答若存俗存真何謂實真正由兩遣故謂實真又咨若忘俗忘真而是實真亦應忘真忘俗而是實俗令答忘俗忘真所以見真忘真忘俗彌見非俗又咨菩薩㑹真既忘俗忘真今呼實真便成乖理令答假呼實真終自忘真兩忘稱實何謂乖理興皇寺法宣咨曰義㫖云俗諦是有是無故以生法為體未審有法有體可得稱生無是無法云何得有生義令答曰俗諦有無相待而立既是相待故並得稱生又咨若有無兩法並稱為生生義既一則有無無異令答俱是凡夫所見故生義得同是有是無焉得不異又咨若有無果别應有生不生令答既相待立名故同一生義程鄉矦蕭祗咨曰未審第一之名是形待以不令答曰正是形待又咨第一無相有何形待令答既云第一豈得非待又咨第一是待既稱第一世諦待於第一何不名為第二若俗諦是待而不稱第二亦應真諦是待不名第一令答若稱第一是待於義已足無假說俗第二方成相待又咨若世諦之名不稱第二則第一之稱無所形待令答第一褒真既云相待世名是待直置可知光宅寺法雲咨曰聖人所知之境此是真諦未審能知之智為是真諦為是俗諦令答曰能知是智所知是境智來冥境得言即真又咨有智之人為是真諦為是俗諦令答若呼有智之人即是俗諦又咨未審俗諦之人何得有真諦之智令答聖人能忘於俗所以得有真智又咨此人既冥無生亦應不得稱人令答冥於無生不得言人既名相說常自有人霛根寺慧令咨曰為於真諦中見有為俗諦中見有令答曰於真諦中橫見有俗又咨俗諦之有為實為虛令答是虛妄之有又咨為當見妄為當見有令答見於妄有又咨無名相中何得見有名相令答於無名相見有名相所以妄有又咨於無名相妄見為有譬如火熱惑者言冷得就熱中有冷相不若於無相而有名相亦於火中應有此冷令答火自常熱妄見有冷此自惑冷熱不嘗異湘宫寺慧興咨曰凡夫之惑為當但於真有迷於俗亦迷令答曰於真見有此是迷真既見有俗不成迷俗又咨若使解俗便成解真若不解真豈得解俗令答真理虛寂惑心不解雖不解真何妨解俗又咨此心不解真於真可是惑此心既解俗於惑應非惑令答實而為語通自是惑辨俗森羅於俗中各解莊嚴寺僧旻咨曰世俗心中所得空解為是真解為是俗解令答可名相似解又咨未審相似為真為俗令答習觀無生不名俗解未見無生不名真解又咨若能照之智非真非俗亦應所照之境非真非俗若是非真非俗則有三諦令答所照之境既即無生無生是真豈有三諦又咨若境即真境何不智即真智令答未見無生故非真智何妨此智未真而習觀真境豈得以智未真智而使境非真境宣武寺法寵咨曰真諦不生不滅俗諦有生有滅真俗兩義得言有異談其法體只得是一未審體從於義亦得有二不令答曰體亦不得合從於義又咨未審就凡聖兩見得言兩義亦就凡聖兩見得言兩體令答理不相異所以云一就凡聖兩見得有二體之殊又咨若使凡者見有聖人見無便應凡夫但見世諦有聖人應見太虛無令答太虛亦非聖人所見太虛得名由於相待既由待生並凡所見又咨凡夫所見空有得言是一不令答就凡為語有實異無約聖作談無不異有建業寺僧愍咨曰俗人解俗為當解俗參差而言解俗為當見俗虛假而言解俗令答曰只是見俗參差而言解俗又咨俗諦不但參差亦是虛妄何故解參差而不解虛妄令答若使凡夫解虛妄即是解真不解虛妄所以名為解俗光宅寺敬脫咨曰未審聖人見真為當漸見為當頓見令答曰漸見又咨無相虛懷一見此理萬相並寂未審何故見真得有由漸令答自凡之聖解有淺深真自虛寂不妨見有由漸又咨未審一得無相並忘萬有為不悉忘令答一得無相萬有悉忘又咨一得無相忘萬有者亦可一得虛懷窮彼真境不應漸見令答如來㑹寂自是窮真淺行聖人恆自漸見又咨若見真有漸不可頓㑹亦應漸忘萬有不可頓忘令答解有優劣故有漸見忘懷無偏故萬有並寂解法身義并問答法身虛寂逺離有無之境獨脫因果之外不可以智知不可以識識豈是稱謂所能論辨將欲顯理不容默然故隨從言說致有法身之稱天竺云達摩舍利此土謂之法身若以當體則是自性之目若以言說則是相待立名法者軌則為㫖身者有體之義軌則之體故曰法身略就言說粗陳其體是常住身是金剛身重加研核其則不爾若定是金剛即為名相定是常住便成方所所謂常住本是寄名稱曰金剛本是譬說及談實體則性同無生故云佛身無為不墮諸法故涅槃經說如來之身非身是身無量無邊無有足迹無知無形畢竟清淨無知清淨而不可為無稱曰妙有而復非有離無離有所謂法身招提寺慧琰咨曰未審法身無相不應有體何得用體以釋身義令答曰無名無相乃無體可論寄以名相不無妙體又咨若寄以名相不無妙體則寄以名相不成無相令答既云寄以名相足明理實無相又咨若寄以名相而理實無相理既無相云何有體令答寄言軌物何得無體又咨亦應寄言軌物非復無相令答軌物義邊理非無相所言無相本談妙體又咨真實本來無相正應以此軌物何得隱斯真實强生言相令答真實無相非近學所窺是故接諸庸淺必須寄以言相光宅寺法雲咨曰未審法身常住是萬行得不令答曰名相道中萬行所得又咨既為萬行所得豈是無相若必無相豈為萬行所得令答無名無相何曾有得寄以名相假言有得又咨實有萬行實得佛果安可以無相全無所得令答問者住心謂實有萬行今謂萬行自空豈有實果可得又咨現有衆生修習萬行未審何故全謂為無令答凡俗所見謂之為有理而撿之實無萬行又咨經說常住以為妙有如其假說何謂妙有令答寄以名相故說妙有理絶名相何妙何有莊嚴寺僧旻咨曰未審法身絶相智不能知絶相絶知何得猶有身稱令答曰無名無相曽有何身假名相說故曰法身又咨亦應假名相說是智所照何得不可以智知不可以識識令答亦得寄名相慧眼所見又咨若慧眼能見則可以智知若智不能知則慧眼無見令答慧眼無見亦無法可見又咨若云無見有何法身令答理絶聞見實無法身又咨若無法身則無正覺正覺既有法身豈無令答恆是寄言故有正覺正覺既在寄言法身何得定有宣武寺法寵咨曰未審法身之稱為正在妙本金姿丈六亦是法身令答曰通而為論本迹皆是别而為語止在常住又咨若止在常住不應有身若通取丈六丈六何謂法身令答常住既有妙體何得無身丈六亦能軌物故可通稱法身又咨若常住無纍方稱法身丈六有纍何謂法身令答衆生注仰妄見丈六丈六非有有何實纍又咨若丈六非有指何為身令答隨物見有謂有應身又咨既曰應身何謂法身令答通相為辨故兼本迹核求實義不在金姿霛根寺慧令咨曰未審為以極智名曰法身為以絶相故曰法身令答曰無名無相是集藏法身圓極智慧是實智法身又咨無名無相則無身不身既有法身何謂無相令答正以無相故曰法身又咨若以無相故曰法身則智慧名相非復法身令答既是無相智慧豈非法身又咨如其有身何名無相若是無相何得有身令答於無名相假說法身又咨若假說法身正存名相云何直指無相而謂法身令答既於無相假立名相豈得異此無相而說法身靈味寺靜安咨曰未審法身乘應以不令答曰法身無應又咨本以應化故稱法身若無應化何謂法身令答曰本以軌則之體名為法身應化之談非今所軌又咨若無應化云何可軌既為物軌豈無應化令答衆生注仰蒙益故云能為物軌化緣已畢何所應化又咨若能益衆生便成應化若無應化何以益物令答能生注仰軌則自成何勞至人俯應塵俗又咨既生注仰豈無應化若無應化注仰何益令答正由世尊至極神妙特深但令注仰自然蒙祐若應而後益何謂至神不應而益故成窮美若必令實應與菩薩豈殊樂府有所思公子一作佳人遠千隔乃在天一方望望江山阻悠悠道路長别前秋葉落别後春花芳雷歎一聲響雨淚忽成行悵望情無極傾心還自傷相逢狹路間京華有曲巷巷曲不通輿道逢一俠客緣路問君居君居在城北可尋復易知朱門間皓壁刻桷映晨離階植若一作苕華草光景逐飈移輕幰委四屋蘭膏然百枝長子飾青紫中子任以資小子始總角方作啼弄兒三子俱入門赫奕盛羽儀華騮服衡轡白玉鏤鞿羈容止同規矩賔從盡恭卑雅鄭時間作孤竹乍參差雲翔雜水宿弄吭滿清池歡樂無終極流目豈知疲門下非毛遂坐上盡英竒大婦成貝錦中婦飭粉絁一作冶粉施小婦獨無事理曲步簷垂丈人暫徙倚行使流風吹三婦豔大婦舞輕巾中婦拂華茵小婦獨無事紅黛潤芳津良人且高卧方欲薦梁塵飲馬長城窟行一云擬青青河畔草亭亭山上柏悠悠逺行客行客行路遙故鄉日迢迢迢迢不可見長望涕如霰如霰獨留連長路邈綿綿胡馬愛北風越燕見日喜藴此望鄉情沈憂不能止有朋西南來投我用木李并有一札書行止風雲起扣封披書札書札竟何有前言節所愛後言别離久長相思相思無終極長夜起歎息徒見貌嬋姢寧知心有憶寸心無所因願附歸飛翼將進酒洛陽輕薄子長安遊俠兒宜城溢磲碗中山浮羽巵上林千金腰裊騎萬寶流水車爭遊上林裏高蓋逗春華詩示徐州弟四言宴君書室靜眺銅池三墳既覽四始兼摛高宇既清虛堂復靜義府載陳𤣥言斯逞詒明山賓以下五言平仲古稱竒夷齊昔擅美令則挺伊賢東秦固多士築室非道傍置宅歸仁里庚桑方有係原生今易擬必來三徑人將招五經士春日宴晉熙王百六鍾期數三七厄時中國難悲如燬親離歎數窮藩哲遊沮夢揚化撫邊戎幸兹同宴醑引滿愛樽空美人晨粧玉臺作簡文帝北窗向朝鏡錦帳復斜縈嬌羞不肯出猶言粧未成散黛隨眉廣胭脂逐臉生試將持出衆定得可憐名宴䦨思舊孝若明山賔信儒雅稽古文敦淳茂㳂到洽實俊朗文義縱橫陳佐公陸倕持方介才學罕為鄰灌蔬殷藝實溫雅摛藻每清新余非狎異者惟舊且懷仁綢繆似河曲契濶等漳濵如何離災盡眇漠同埃塵一起應劉念泫泫欲沾巾詠山濤王戎詩二首并序顔生五君詠不取山濤王戎余聊詠之焉山公𢎞識量早厠竹林歡聿來值英主身游廊廟端位隆五教職才周五品官為君翻已易居臣良不難濬冲如蕭散薄莫至中台徴神歸鑒景晦行屬聚財嵇生襲𤣥夜阮籍變青灰留連追宴緒壚下獨徘徊和武帝遊鍾山大愛敬寺唐遊薄汾水周載集瑶池豈若欽明后回鑾鷲嶺岐神心鑒無相仁化育有為以兹惠日照復見法雨垂萬邦躋仁壽兆庶滌塵羈望雲雖可識日用豈能知鴻名冠子姒德澤邁軒羲班班仁獸集匹匹翔鳳儀善遊兹勝地兹嶽信靈竒嘉木互紛糾層峯鬱蔽虧丹藤繞垂幹緑竹䕃清池舒華匝長阪好鳥鳴喬枝霏霏慶雲動靡靡祥風吹谷虛流鳳管野緑映丹麾帷宫設㕓外帳殿臨郊垂俯同南風作斯文良在斯伊臣限監國即事阻陪隨顧惟實庸菲冲薄竟奚施至理徒興羡終然類管窺上聖良善誘下愚慚不移開善寺法㑹栖烏猶未翔命駕出山莊詰屈登馬嶺回互入羊腸稍看原藹藹漸見岫蒼蒼落星埋遠樹新霧起朝陽隂池宿早鴈寒風催夜霜兹地信閒寂清曠惟道場玉樹琉璃水羽帳鬱金牀紫柱珊瑚地神幢明月璫牽蘿下石磴攀桂陟松梁澗斜日欲隱煙生樓半藏千祀終何邁百代歸我皇神功照不極睿鏡湛無方法輪明暗室藝文作智日慧海渡慈航塵根久未洗希霑垂露光同泰僧正講并序大正以貞俗兼解鬱為善歌璡師以行有餘力緣情繼響余自法席既闌便思和寂杼軸二年濡翰兩器大正今春復為同泰建講法輪將半此作方成所以物色不同序事或異放光聞鷲嶽金牒祕香城窮源絶有際離照歸無名若人聆至寂寄說表真冥能令梵志遣亦使羣魔驚寶珠分水相須彌㑹色形學徒均染疊遊士譬春英伊豫寡空智徒深愛吝情舒金起祗苑開筵慕肅成年鍾倏從變弦望驟舒盈今聞火林聚淨土接承明掖影連高塔法鼓亂嚴更雷聲芳樹長月出地芝生已知法味樂復悅𤣥言清何因動飛轡暫使塵勞輕鍾山解講清宵出望園詰晨屆鍾嶺輪動文學乘笳鳴賓從靜暾出巖隱光月落林餘影糾紛八桂密坡陀再城永伊豫愛丘壑登高至節景迢遞覩千室迤邐觀萬頃即事已如斯重兹遊勝境精理既已詳𤣥言亦兼逞方知蕙帶人囂虛成易屏眺瞻情未終龍鏡忽遊騁非曰樂逸遊意欲識箕潁𤣥圃講白藏氣已暮𤣥英序方及稍覺螿聲悽轉聞鳴鴈急穿池狀浩汗築峯形嶫岋旰雲緣宇隂晚景乘軒入風來幔影轉霜流樹條濕林際素羽翾漪間頳尾吸試欲遊寶山庶攸信根立名利白巾談筆札劉王給兹樂踰笙磬寧止消涓邑疑作悁悒雖娛慧有三終寡聞知十東齊聽講昔聞孔道貴今覩釋化珍至理乃悟寂承稟實能仁示教雖三徹妙法信平均信言一鄙俗延情方慕真庶兹祛八倒兾此遣六塵良思大車道方願寶船津長延永生肇庶席諒徐陳是節朱明季灼爍治渠新霏雲出翠嶺涼風起清蘋既餐甘露㫖方欲書諸紳講席將訖賦三十韻詩依次用法苑稱嘉奈慈園羡修竹靈覺相招影神仙共棲宿惠義比瑶瓊薰染等蘭菊理𤣥方十算功深似九築華水警銀舟方衢列金軸微言絶已久煩勞多纍蓄因兹闡慧雲欲使心塵伏八水潤焦芽三明啓羣目寶鐸旦參差名香晚芬郁暫捨六龍駕一作驚微祛二鼠蹙意樹發空花心蓮吐輕馥喻斯滄海變譬彼菴羅熟妙智方縟錦深詞同霧縠善學同梵爪真言異銅腹逶迤合蓋城葳蕤布金郁珠華䕃八溪玉流通九谷青禽乍下上雲鴈飛翻覆高談屬時聽寡聞終自恧日麗鴛鴦瓦風度踟蹰屋落花散逺香霏雲卷遙族曠濟同象園中乘如佇獨後焰難堅明初心易驚縮應當離花水無令乖漆木投巖不足貴棘林安可宿器月希留影心灰庶方撲視愛同採蜂遊善如原菽八邑仙人山四寶神龍澳藥樹永繁稠禪枝詎凋槭一作縬以兹悅聞道庶此優馳逐願追露寶車脫屣親推轂林下作妓詩炎光向夕斂徙宴臨前池泉將影相得花與面相宜管聲如鳥弄舞袖寫風枝歡樂不知醉千秋長若斯擬古晨風被庭槐夜露傷階草霧苦瑶池黑霜凝丹墀皓疏條索無隂落葉紛可掃安得紫芝術終然獲難老賦書帙擢影兔園池抽莖淇水側朝映出嶺雲莫聚飛歸翼幸雜緗囊用聊因班女織一合軒羲曲千齡如可即詠同心蓮江南採蓮處照灼本足觀况等連枝樹俱耀紫莖端同踰並根草雙異獨鳴鸞以兹代萱草必使愁人歡詠彈筝人故筝猶可惜應度幾一作新人邊塵多澀移柱風燥脆調絃還信三洲曲誰念九重泉餞庾仲容梁書仲容為太子舍人後除安成王中記室當出隨府太子以舊恩特隆餞宴賜詩時輩榮之孫生陟陽道吳子朝歌縣未若樊林華一作舉置酒臨高殿貌雪六言既同標梅萼散復似大谷花飛密如公超所起皓如淵客所揮無羡崑巖列素豈匹振鷺羣飛示雲麾弟七言白雲飛兮江上阻北流分兮山風舉山萬仞兮多高峯流九派兮饒江渚山岧嶤兮乃逼天雲微濛兮復興雨實覽歷兮此名地故遨遊兮兹勝所爾登陟兮一長望理化顧兮忽憶豫想玉顔兮在目中徒踟蹰兮增延佇擬古窺紅對鏡斂雙眉含愁拭淚坐相思念人一去許多時眼語笑靨近來情心懷心想甚分明憶人不忍語銜恨獨吞聲大言觀修鵾其若轍鮒視滄海之如濫觴經二儀而局蹐跨六合以翺翔細言坐卧鄰空塵憑附蟭螟翼越咫尺而三秋度毫釐而九息漢魏六朝百三家集卷八十一
