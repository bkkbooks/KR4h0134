body:
  text: 漢魏六朝百三家集卷一百九齊邢邵集題詞濟隂溫鵬舉巨鹿魏伯起河間邢子才為北朝文人稱首楊遵彥文德論云古今詞人皆負才遺行唯邢子才王元景溫子升彬彬有德素然則溫邢在當日兼以行顯非伯起驚蛺蝶比也子才讀書五行俱下獨不喜讎校曰天下書至死讀不可遍焉能復校此言頗疏率而後世才士間宗其說余度隋唐以來至今日書籍多子才時更數倍茍欲遍識塗必出此所謂漢髙取天下得意者關中耳置學一奏事關典教餘文無絶殊者漢賈生公孫臣等言正朔服色事君相莫能遵用太史公三致慨焉以元魏靈后之時子才欲伸其志豫竊難之異同交安賢愚並接抱此天資與物無忤然在坐作表袁翻怒為小兒言論相輕崔暹奪其帝聽甚哉入世之不易也目録賦新宫賦詔為齊文宣受禪赦詔表百官賀平石頭表賀老人星表為文襄讓尚書令表又為李衛軍以國子祭酒讓東平王表為彭城王韶讓侍中表為潘司徒樂讓表為司空景讓表奏請置學及修立明堂奏書答袁肇修書遺辛術書序蕭仁祖集序議皇太子東面議宫吏之姓與太子同名議改葬服議訊囚請占議頌甘露頌七首銘文襄金像銘獻武皇帝寺銘碑廣平王碑冀州刺史封隆之碑景明寺碑并州寺碑諡議文宣帝諡議哀䇿文文宣帝哀䇿文墓志太尉韓公墓志李禮之墓志樂府思公子詩三日華林園公宴冬夜酬魏少傅直史館冬日傷志篇七夕齊韋道遜晚春宴應詔甘露詩賀老人星詩漢魏六朝百三家集卷一百九目録欽定四庫全書漢魏六朝百三家集卷一百九明張溥輯齊邢邵集賦新宫賦擬二儀而構路寢法三山而起翼室何大厦之耽耽而斯干之秩秩豈西京之足偉故東都之所匹爾其狀也則瓌譎屈竒瀾漫陸離嵯峨崔嵬巉巖參差若密雲之乍舉似鵬翼之中垂布菱華之與蓮蒂咸反植而倒施若承露而將轉似含風而欲披土成黼黻木化蛟螭布紅紫之融泄間朱黃之赫曦獸狂顧而猶動鳥將鶱而已疲木神水怪海若山祗千變萬化殊形異宜隂梁北注陽鳥南施百楹列倚千櫨代支或據險而形固或居安而勢危詔為齊文宣受禪赦詔無德而稱代刑以禮不言而信先春後秋故知惻隱之化天人一揆𢎞宥之道古今同風朕以寡薄功烈無紀昔先獻武王值魏世不造四海幅裂九鼎行出祭器無歸乃驅御侯伯大號燕趙拯厥顛墜俾亡則存文襄王外挺武功內資明德纂成先業闢土服逺年逾二紀世歷兩都獄訟有適謳歌斯在魏帝俯遵歷數念在褰裳逺取唐虞終同脫屣實幽憂未已志在陽城而羣公卿士誠守愈切遂屬代終居於民上如涉深水有眷終朝始發晉陽九尾呈祥升壇告天赤雀效祉惟爾文武不二之臣股肱瓜牙之將左右先王光隆大業永言誠烈共兹休慶然三皇存教非易可免七名改咒庸可庶幾思共億兆同始兹日其大赦天下表奏百官賀平石頭表大江設隘實限夷華前魏觀濤而退後魏登山而反聲教不通多歷年代今蒼雉奉職靈鼉自梁折葦為舟慿力可渡始知德通於物孟門失險道清將順劒閣自開行舉洞庭之樂放畜長洲之苑㑹玉帛於塗山樹銅柱於南極賀老人星表冥貺未巳靈應猶臻以某夜老人星見達旦揚光經旬未滅雖三星共色五老同遊擬之於此故無與匹自非𤣥風感極聖敬回天何能使休徴祕祉相尋而至故以朝夕相趨史無停筆為文襄讓尚書令表揚職萬機總任百揆懸衡庶物凖納羣僚何以助日月之光華增天地之髙厚反鑒取照匹此何難倒裳求領方之為易又表正以晝覽太山不假秋毫之察夜仰列宿豈藉燭龍之明爵人以世既非盛德之舉公門有私故是陵夷之運為李衛軍以國子祭酒讓東平王表臣聞運舟歸於積水致逺在於逸足未有涓澮之流可成奔飛之用駑蹇之乘而有滅沒之功既列趙衰先人之敏請同虞丘退身之義具官臣某民望時宗聲實攸在斧藻川流雕篆霞蔚蕉蒲既茂枝葉實繁故以學窮齊魯聲髙梁魏詔美司朝僉諧允在伏願回恩徙授以答具瞻為彭城王韶讓侍中表貂鼹映首日月在躬冠蓋庶僚跨躡多士雖智慙量力明闕自知在梁之譏無得喧華之議素飱之責豈須噂􅊱之口何悟天之情眷復延今寵遂總録百揆寅亮萬機文昌治本得失所繫用才長短隆替以之何容以斯寡薄豈得用膺兹忝為潘司徒樂讓表武皇帝運屬繼元事深微禹摧蚩尤之陳破尋邑之師義開金石理朂庸駘遂日奉羈勒有事風塵徒備鳥背之毛曽無馬箠之力為司空景讓表屬平分廣施造物多品長短入用小人見收連采台階堪均鼎足昨者謫見垂象災起潛伏此之為纍非直微躬請置學及修立明堂奏世室明堂顯於周夏一黌兩學盛自虞殷所以宗配上帝以著莫大之嚴宣布下土以彰則天之軌養黃髮以詢哲言育青矜而敷教典用能享國長久風徽萬祀者也爰暨亡秦改革其道坑儒滅學以蔽黔黎故九服分崩祚終二代炎漢勃興更修儒術故西京有六學之義東都有三本之盛逮自魏晉撥亂相因兵革之中學挍不絶仰惟髙祖孝文皇帝禀聖自天道鏡今古列挍序於鄉黨敦詩書於郡國但經始事殷戎軒屢駕未遑多就弓劒弗追世宗統歷聿遵先緒永平之中大興版築續以水旱戎馬生郊雖逮為山還停一簣而明堂禮樂之本乃鬱荆棘之林膠序德義之基空盈牧豎之迹城隍嚴固之重闕磚石之功墉構顯望之要少樓榭之飾加以風雨稍侵漸致虧墜非所謂追隆堂構儀刑萬國者也伏聞朝議以髙祖大造區夏道侔姬文擬祀明堂式配上帝今若基址不修仍同丘畎即使髙皇神享闕於國陽宗事之典有聲無實此臣子所以匪寧億兆所以佇望也臣又聞官方授能所以任事事既任矣酬之以祿如此則上無曠官之譏下絶尸素之謗今國子雖有學官之名無教授之實何異兔絲燕麥南箕北斗哉昔劉向有言王者宜興辟雍陳禮樂以風天下夫禮樂所以養人刑法所以殺人而有司勤勤請定刑法至於禮樂則曰未敢是敢於殺人不敢於養人也臣以為當今四海清平九服寧晏經國要重理應先營脫復稽延則劉向之言徴矣但事不兩興須有進退以臣愚量宜罷尚方雕靡之作頗省永寧土木之功并減瑤光材瓦之力兼分石窟鐫琢之勞及諸事役非世急者三時農隙修此數條使辟雍之禮蔚爾而復興諷誦之音煥然而更作美榭髙墉嚴壯於外槐宫棘寺顯麗於中更明古今重遵鄉飲敦進郡學精課經業如此則元凱可得之於上序游夏可致之於下國豈不休歟書答袁肇修書魏齊世臺郎多交通餉遺肇修在尚書十年未曽受升酒之饋邵時為尚書與肇修有舊每於省中語戲常呼肇修為清郎大寧初肇修以太常少卿出使巡省經歷兖州時邵為兖州刺史别後遣送白紬為信肇修不受與邵書邵答之一日之贈率爾不思老夫忽忽意不及此敬承來㫖吾無間然弟昔為清郎今日復作清卿矣遺辛術書術魏末遷東徐州刺史為淮南經略使齊天保元年睢州刺史及所部郡守俱犯大辟朝廷以其奴婢百口及資財盡賜術三辭不許術乃送所司不復聞奏邵聞遺術書昔鍾離意云孔子忍渴於盜泉便以珠璣委地足下今能如此可謂異代一時序蕭仁祖集序蕭仁祖之文可謂雕章間出昔潘陸齊軌不襲建安之風顔謝同聲遂革太元之氣自漢逮晉情賞猶自不諧河北江南意製本應相詭議皇太子東面議天保元年皇太子監國在西林園冬㑹羣議皆東面二年於北城第內冬㑹又議東面陸卬疑非禮魏收改為西面邢子才議欲依前凡禮有同者不可令異詩說天子至於大夫皆乘四馬况以方面之少何可皆不同乎若太子定西面者王公卿大夫士復何面邪南面人君正位今一官之長無不南面太子聽政亦南面坐議者言皆晉舊事太子在東宫西面為避尊位非為向臺殿也子才以為東晉博議依漢魏之舊太子普臣四海不以為嫌又何疑於東面禮世子絶旁親世子冠於阼冢子生接以太牢漢元著令太子絶馳道此皆禮同於君又晉王公世子攝命臨國乘七旒安車駕用三馬禮同三公近宋太子乘象輅皆有同處不以為嫌况東面者君臣通禮獨何為避明為向臺所以然也近皇太子在西林園在於殿猶且東面於北城非宫殿之處更不得邪諸人以東面為尊宴㑹避案燕禮燕義君位在東賓位則在西君位在阼階故有武王踐阼篇不在西也禮乘君之車不敢曠左君在惡空其位左亦在東不在西也君在阼夫人在房鄭注人君尊東也前代及今皇帝宴㑹接客亦東堂西面若以東面為貴皇太子以儲后之禮監國之重别第宴臣賓自得申其正位禮者皆東宫臣屬公卿接宴觀禮而已若以西面為卑實是君之正位太公不肯北面說丹書西面則道之西面乃尊也君位南面有東有西何可皆避且事雖少異有可相比者周公臣也太子子也周公為冢宰太子為儲二明堂尊於别第朝諸侯重於宴臣賓南面貴於東面臣疏於子冢宰輕於儲二周公攝政得在明堂南面朝諸侯今太子監國不得於别第異宫東面宴客情所未安且君行以太子監國君宴不以公卿為賓明父子無嫌君臣有嫌案儀注親王受詔冠婚皇子皇女皆東面今不約王公南面而獨約太子何所取邪議者南尊改就西面轉君位更非合禮方面既少難為節文東西二面君臣通用太子宜然於禮為允宫吏之姓與太子同名議案曲禮大夫士之子不與世子同名鄭注云其先之生亦不改漢法天子登位布名於天下四海之內無不咸避案春秋經衛石惡奔出晉在衛侯衎卒之前衎卒其子惡始立明石惡於長子同名諸侯長子在一國之內與皇太子於天子禮亦不異鄭言先生不改蓋以此義衛石惡宋向戍皆與君同名春秋不譏皇太子雖有儲二之重未為海內所避何容便改人姓然事有消息不得皆同於古宫吏至微而有所犯朝名從事亦是難安宜聽出宫尚書更補他職改葬服議王元軌子欲改葬祖及祖母列上未知所服子才議曰禮改葬緦麻鄭𤣥注臣為君子為父妻為夫唯三人而已然嫡曾孫孫承重者曾祖父母祖父母改葬既並三年之服皆應服緦而止言三人若非遺漏便是舉其略耳訊囚議凖舊皆評囚取占然後送付廷尉邵以為不可設官分職各有司存丞相不問鬬人虞官弓招不進豈使尸祝兼刀匕之後家長侵雞犬之功頌甘露頌歷選􅍌辟逖聽前聞三才易統五運相君皇極攸序庶類以分乃忠乃敬或質或文赫矣景命蒸哉上聖大德莫名至道無競川停嶽路雲臨水鏡望日齊明瞻天比映功深微禹業隆作周英華內積文教外修廣輪四海提封十洲紫川北注赤水南流宸居兩楹恭已萬國聖教日漸王猷允塞禮有大成樂無慙德用天之道順帝之則政平民豫嵗稔時和九功惟叙九叙惟歌風輪蹍漢毛舟沈河玉龜出沼鳴鳯在阿休徴屢動感極回天流甘委素玉順氷鮮蜜房下結珠琲上懸布濩林野灑散旌㫋日月已明宇宙已廓鼓缶成詠挹水為樂以為𤣥黃猶參沃若取慰天壤用忘溝壑銘文襄金像銘妙形難象至理希詮形之所極理亦在焉悟兹空假勞此蓋纒式圖􅉨祕用結來緣丹青並飾金玉同鐫神儀內瑩寶相外宣圓光照耀映被無邊靈應肸蠁感發大千鍾福旒纊其永如天歸慶怙恃夀等南山凡厥親類宜其永年誠歸妙覺標志上𤣥託銘斯在曠劫方傳獻武皇帝寺銘惟睿作聖有縱自天匡國庇民再造區夏功髙伊吕道邁桓文雖住止域中而神遊方外影響妙法咫尺天人曉夜自分不勞雞鶴之助六時靡惑非待壺箭之功永寄將來傳之不朽詞曰用分行坐以敦戒行苦罪祈福傲狠成敬萬國咸亨一人有慶方傳自久是用成詠碑廣平王碑公分氣氤氲禀靈昭晉基構輪奐源流濬逺積石莫之方委水不能喻山瀆效神辰昴降德自天攸縱鬱為時宗墻宇淹曠標格秀逺道亞生知德均殆庶日月在躬水鏡被物望青松而比秀干白雲而上征侍講金華參遊銅雀出陪芝蓋入奉桂室充㑹友之選當拾遺之舉發言為論受詔成文碧雞自口靈蛇在掘方見建安之體復聞正始之音公年方弱冠而位居寮右道被生民惠漸萬物鬱為雅俗之表峩成社稷之鎮公孫聲動天下已非其倫管子光照鄰國孰云能擬方謂膺斯多福降此永年奪摶風之逸羽窮送日之逺路同岐山之嘉㑹陪岱宗之盛禮而羣飛在辰橫流具及山崩川竭星霣日銷崑嶽既燬玉石俱燼蘭挺則芬玉生則潤泱泱萬源落落千仞我有徽猷金聲玉振志猶學海業比登山踟蹰緹衮絳帳韋編尋微啓奧敷理入𤣥天地或終山河匪夀昔日先民誰堪長久立言立事責之身後式銘景行是為不朽冀州刺史封隆之碑公世載儒雅之風家傳鐘鼎之業出三代而克阜歷兩都而轉盛五世祖游字子孚耻斯鳥獸狹此丘壑濡足焚首念在一匡委質中山並充衮闕故已援墜拯溺大庇生民祖定功業建斾懷藩揚旌冀部耳目相接歌詠獨存父司空孝宣公禀潤玉府承華桂簿望振鷺而齊舉軼歸鴻而並運以茲一德光事三主七登九伯之重再處八元之任必有餘慶事屬才子莫之與京理歸世祿非因原隰之氣詎待河嶽之靈發純粹而成址禀中和而樹質神體秀異志識閒爽幼體成人弱不好弄同鳯凰之五色非豫章之七年太昌初平洛除侍中驃騎大將軍密勿樞功逶迤袞職貂蟬承辨華藻披衣鳴雙璜於峻陛驅六轡於廣路升華輦以弼一人踐泰階而平天下景明寺碑九土殊方四生舛類昏識異受修短共時德表生民不救泰山之朽壤義同列辟豈濟灤水之淪胥漂鹵倒戈之勢浮江駕海之力孰不曠息相催飛馳共盡泡沫不足成喻風電詎可為言而皆遷延愛欲馳逐生死眷彼深塵迷兹大夜坐積薪於火宅負沉石於苦海結習靡倦憂畏延長身世其猶夢想榮辱譬諸幻化未能照彼因緣體兹空假祛洗纍惑擯落塵埃苦器易雕危城難久自發迹有生㑹道無上劫代緬邈朕跡遐長草木不能况塵沙莫之比及日晷停流星光輟運香雨旁注甘露上懸降靈迦衛擁迹忍土智出須彌德踰大地道尊世上義重天中銘曰大道何名至功不器理有罔適法無殊致能以託生降體凡位正覺如逺一念斯在德尊三界神感四大川流自斷火室不然衣生寶樹座踊芳蓮智固有極道暢無邊并州寺碑夫至道密微無跡可覩神功感應有理斯存雖慧日已照而大夜莫曉香雨時流而深塵未息曠劫悠緬歷代遐長眇眇世羅無能免其一目泛泛欲網孰能解其三面自大教遷流行於中土希向之士烟踊沙屬恆沙未足為言積塵所不能喻皆云出沒生死之河浮沉愛欲之海未有矯然獨悟脫落身名望彼岸而攸往泛寶船而利涉諡議文宣帝諡議伏惟聖德光逺神猷𢎞大初自登庸民譽所集把尺持刀成務斯在百揆載清四門唯穆及天眷既屬人謀所歸鳥獸遷情士女革面敬順天人拱揖羣后處無上之尊居域中之大禮盛樂修時和嵗稔海內有截天下泰然猶憂勞億兆經營四國同虞舜之巡省若軒轅之靡寧威武紛紜神功四暢怨西以東化南自北臨瀚海以浴兵登天山而紲馬左縈右拂擬歌成章方朝百神於太華受萬國於稽嶺升中增封髙拱垂衣而天喪黎庶奄捐四海考妣之慕實被含生稱天作誄抑惟恆數故以名追實盡物未臻其美屈道從制一日可以成名哀䇿文文宣帝哀策文皇路啓扉輴菆弛殯八挍案部六卿具引攀蜃輅而雨泣仰穹蒼而撫心悲風發而地駭愁雲興而景沈哲王垂範有訓有則式奉話言光敷令德其辭曰四象更運九天代名通三以王得一為貞是應𤣥德實啓蒼精風后之陳師尚之兵三竒六合七變五成授戈推轂禀律襲行野無完陳邑少堅城經營四海劬勞百姓芝蓋夕臨羽旄晨映地不掩瑞天不愛寶既丹其雀又朱其草莫黑已素莫赤自皓百獸斯蹈五靈載擾甘露瀼瀼青龍矯矯武功已暢文教未窮方偃烽堠銷㦸藏弓齊光日月比祚華嵩而氛祲日下星暗虛中奄捐朝市長棄華戎道宣末命義闡餘風六繂已散九旗方卷見容衛之虛歸知平生之日逺同乘雲而永逝異騎龍之更反清笳奏兮野風急金鼓震兮日光晚千官悲而雨注萬國哀而露泫萬事同盡百慮俱收劒舄永去衣冠自遊音儀已謝神教空留知英聲與至德當無絶兮千秋墓志太尉韓公墓志立事立言是為勿替上公上德實繫不朽雖將相無種而公卿有門是以萬鍾四牡昌奕於往代長組髙冠陸離於前祀及負笈追陪結㕛從師先難後易身佚功倍皆神遊隅隩理合精微非存寧越廢寢食以存道久殊髙鳯忘冠履以成業皎皎獨照旁絶囂滓亭亭孤鶴入自雲霞忘情譽毁同嗣宗之於善惡齊心得喪若叔夜之於愠喜方將受在三九追蹤二八𢎞大道以事一人敷至理以安百姓而天德不厚神聽多愆仁勇一亡辨智同盡李禮之墓志食有竒味相待乃餐衣無常主易之而出樂府思公子綺羅日減帶桃李無顔色思君君未歸歸來豈相識詩三日華林園公宴回鑾自樂野弭蓋屬瑶池五丞接光景七友樹風儀芳春時欲遽覽物惜將移新萍已冒沼餘花尚滿枝草滋徑蕪沒林長山蔽虧芳筵羅玉俎激水漾金巵歌聲斷以續舞䄂合還離冬夜酬魏少傅直史館年病從橫至動息不自安兼豆未能飽重裘詎解寒况乃冬之夜霜氣有餘酸風音響北牖月影度南端燈光明且滅華燭新復殘衰顔依候改壯志與時䦨體羸不盡帶髮落强扶冠夜景將欲近夕息故無寬忽有清風贈辭義婉如蘭先言歎三友次言慙一官麗藻髙鄭衛専學美齊韓審諭一作喻雖有屬筆削少能干一作刋髙足自無限積風良可摶空想青門易寧見赤松難寄語東山道髙駕且盤桓冬日傷志篇昔時惰遊士任性少矜裁朝驅一作馳瑪瑙勒夕銜熊耳杯折花步淇水撫琴望叢臺繁華夙昔改衰病一時來重以三冬月愁雲聚復開天髙日色淺林徑鳥聲哀終風激簷宇餘雪溝條枚遨遊昔宛洛踟蹰今草萊時事方去矣撫已獨傷懷一作懷哉七夕盈盈河水側朝朝長歎息不吝漸衰苦波流詎可測秋期忽云至停梭理容色束襟未解帶回鑾已沾軾不見眼中人誰堪機上織願逐青鳥去暫因希羽翼齊韋道遜晚春宴日斜賔館晚風輕麥候初簷喧巢幕燕池躍戲蓮魚石聲隨流響桐影傍巖疏誰能千里外獨寄八行書應詔甘露詩膏露且漸洽凝液汭旍旗草木盡霑被玉散復珠霏誰謂穹昊逺道合若應機賀老人星詩瑞動星光照化穆月輪重庶徴符祉籙將以贊時雍漢魏六朝百三家集卷一百九
