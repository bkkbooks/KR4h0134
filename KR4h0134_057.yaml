body:
  text: 漢魏六朝百三家集卷五十七晉郭璞集目録讚山海經圖讚桂迷穀狌狌水玉白猿鹿蜀鯥類猼􅑲祝荼草旋龜􅡀鵂魚灌灌鳥赤鱬鴸鳥猾褱長右彘會稽山䍺犀兕象纂雕瞿如鳥虎蛟鳯育隧谷鱄魚顒鳥白䓘以上南山羬羊太華山肥遺蛇蟂渠赤鷩鳥文莖木鴖鳥流赭豪彘黃雚草肥遺鳥囂獸槖􅖦桃枝杜衡蓇容草邊溪獸櫟鳥礜石􅙱如鸚鵡數斯鳥􅣕獸鸓鳥鸞鳥鳬徯鳥朱厭獸蠻蠻丹木玉膏瑾瑜玉鍾山之子鼓欽䲹鰩魚神英招榣木崑崙丘神陸吾土螻獸欽原鳥沙棠鶉鳥沙棠實薲草神長乘西王母積石白帝少昊猙畢方文貝天狗三青鳥江疑獓􅧝獸􅣍鳥神耆童帝江獂獸鵸鵌鳥當扈白狼白虎駮神蠻蠻髯遺魚櫰木鳥鼠同穴山􅛈魮魚丹木窮竒獸螺魚孰湖獸鰠魚以上西山水馬倏魚䑏疏獸鵸鵌鳥何羅魚孟槐鰼鰼魚槖駝耳鼠幽鴳寓鳥孟極足訾獸鵁鳥諸犍獸白鵺竦斯鳥磁石旄牛長蛇山􅏈窫窳諸懷獸䲃魚肥遺蛇鮆魚狍梟狕閭􅖃馬獨𤞞􅜥􅠍居暨獸囂鳥三桑䮝獸天馬鶌居飛鼠䴅䴅象蛇􅗫父魚酸與鴣􅨊黃鳥精衛䍶䍶羆九獸大蛇以上北山鱅鱅魚從從獸𪕊鼠䖺䗤狪狪堪㐨魚軨軨獸珠蟞魚犰狳狸力獸􅝼胡鳥朱獳獙獙蠪蚳獸潔鉤鳥峳峳蠵龜妴胡精精獸鮯鮯魚猲狙獸鬿雀芑木茈魚薄魚合窳當康獸䱻魚蜚以上東山桃林鳴石旋龜人魚修辟帝臺棋若華烏酸草䔄草山膏獸黃棘三足龜嘉榮天楄牛傷文獸鰧魚帝休泰室栯木􅞒草鶡鳥鳴蛇化蛇赤銅神熏池神武羅鴢鳥荀草馬腹獸飛魚神泰逢葪柏橘柚􅚄鮫魚鴆鳥椒神􅥰圍計蒙涉􅥰岷山夔牛猍山􅨓狼雍和􅩰獸蜼熊穴跂踵蛟神耕父九鍾嬰勺獜帝臺漿狙如帝女桑梁渠􅦺即聞􅡁獸䳅鵌鳥神于兒神二女飛蛇以上中山自此山來蟲為蛇蛇號為魚羽民國神人二八歡頭國厭火國三珠樹臷國貫胸交脛攴舌國不死國鑿齒國三首國焦僥國長臂國狄山帝堯葬於陽帝嚳葬於陰視肉南方祝融以上海外南經圖夏后啓三身國一臂國竒肱國形天女祭女戚䳐鳥􅦵鳥丈夫國女丑尸巫咸并封女子國軒轅國乘黃滅蒙鳥大運山雄常樹龍魚西方蓐收以上海外西經圖無䏿國燭龍一目國柔利國共工臣相柳深目國聶耳國夸父尋木跂踵國歐絲野無腸國平丘騊駼北方禺強以上海外北經圖君子國天吳九尾狐竪亥十日毛民國黑齒國雨師妾玄股國勞民國東方勾芒以上海外經圖梟陽狌狌夏后啓臣孟塗建木氐人巴蛇以上海內南經圖二負臣危流黃酆氏國大澤方百里流沙木禾開明文玉玗琪樹不死樹甘水聖木窫窳服常琅玕樹以上海內西經圖吉良蛇巫山鬼神蜪犬羣帝臺大蜂朱蛾闒非據比尸祙戎騶虞氷夷王子夜尸宵明燭光列姑射山大蟹陵魚蓬萊山以上海內北經圖郁州韓雁始鳩雷澤神琅琊臺竪沙居繇埻端璽㬇國大江北江南江浙江廬淮湘漢濛溫潁汝涇渭白沅贑泗鬱肄潢洛汾沁濟潦呼沱漳水以上海內東經圖封豕鼯鼠弱水都廣之野猩猩若木翡翠欵冬鬼草蟒蛇枳首蛇䲃魚飛魚焦堯以上補遺釋天地圖讚星圖讚炎山讚筆讚龜讚蚌讚蟬讚螢火讚芣苡讚杜若讚芙蓉讚麻讚圭讚尺蠖讚菊讚萍讚卷施讚螳蜋讚麟讚比肩獸讚鼎讚金銀讚柚讚梧桐讚燕讚馬讚貔讚鼮鼠讚鼷鼠讚鼫鼠讚記遷州記缺詩贈溫嶠遊仙詩十四首贈潘尼春夏别題墓詩漢魏六朝百三家集卷五十七目録欽定四庫全書漢魏六朝百三家集卷五十七明張溥輯晉郭璞集南山經圗讚桂桂生南裔拔萃岑嶺廣莫熙葩凌霜津潁氣王百藥森然雲挺迷榖爰有竒樹産自招搖厥華流光上映垂霄佩之不惑濳有靈標狌狌狌狌似猴走立行伏櫰木挺力少辛明目蜚廉迅足豈食斯肉水玉水玉沐浴濳映洞淵赤松是服靈蛻乘煙吐納六氣升降九天白猿白猿肆巧繇基撫弓應眄而號神有先中數如循環其妙無窮鹿蜀鹿蜀之獸馬質虎文攘首吟鳴矯足騰羣佩其皮尾子孫如雲鯥魚號曰鯥處不在水厥狀如牛鳥翼蛇尾隨時隱見倚乎生死類類之為獸一體兼二近取諸身用不假器窈窕是佩不知妬忌猼􅑲猼􅑲似羊眼反在背視之則竒推之無怪若欲不恐厥皮可佩祝荼草旋龜􅡀􅝐魚祝荼嘉草食之不飢鳥首虺尾其名旋龜􅡀􅝐六足三翅並翬灌灌鳥赤鱬厥聲如訶厥形如鳩佩之辨惑出自青丘赤鱬之物魚身人頭鴸鳥彗星橫天鯨魚死浪鴸鳴於邑賢士見放厥理至微言之無況猾褱猾褱之獸見則興役膺政而出匪亂不適天下有道幽形匿迹長右彘長右四耳厥狀如猴實為水祥見則橫流彘虎其身厥尾如牛會稽山禹徂會稽爰朝羣臣不虔是討乃戮長人玉匱表夏玄石勒秦䍺有獸無口其名曰䍺害氣不入厥體無間至理之盡出乎自然犀犀頭如豬形兼牛質角則並三分身互出鼓鼻生風壯氣隘溢兕兕推壯獸似牛青黑力無不傾自焚以革及充武備角助文德象象實魁梧體巨貌詭肉兼十牛目不踰豕望頭如尾動若丘徙纂雕瞿如鳥虎蛟纂雕有角聲若兒號瞿如三手厥狀似鵁魚身蛇尾是謂虎蛟鳯鳯皇靈鳥實冠羽羣八象其體五德其文羽翼來儀應我聖君育隧谷育隧之谷爰含凱風青陽既謝氣應祝融炎氛是扇以散鬱隆鱄魚顒鳥顒鳥栖林鱄魚處淵俱為旱徵災延普天測之無象厥數推玄白䓘白䓘睪蘇其汁如飴食之辟榖味有餘滋逍遙忘勞窮生盡期西山經圖讚羬羊月氏之羊其類在野厥髙六尺尾亦如馬何以審之事見爾雅太華山華嶽靈峻削成四方爰有神女是挹玉漿其誰逰之龍駕雲裳肥遺蛇肥遺為物與災合契鼓翼陽山以表亢厲桑林既禱倐忽濳逝蟂渠赤鷩鳥文莖木鴖鳥蟂渠已殃赤鷩辟火文莖愈聾是則嘉果鴖亦衛災厥形惟麼流赭沙則濳流亦有運赭于以求鐵趨在其下蠲牛之癘作采于社豪彘剛鬛之族號曰豪彘毛如攢錐中有激矢厥體兼資自為牝牡黃雚草肥遺鳥囂獸浴疾之草厥子赭赤肥遺似鶉其肉已疫囂獸長臂為物好擲槖􅖦有似人靣一腳孤立性與時反冬出夏蟄帶其羽毛迅雷不入桃枝嶓冢美竹厥號桃枝叢薄幽藹從容鬱猗簟以安寢杖以扶危杜衡狌狌奔人杜衡走馬理固須因體亦有假足駿在感安事御者蓇容草邉溪獸櫟鳥有華無實蓇容之樹邉溪類狗皮厭妖蠱黑文赤翁鳥愈隱痔礜石稟氣方殊舛錯理微礜石殺鼠蠶食而肥物性雖反齊之一歸􅙱如􅙱如之獸鹿狀四角馬足人手其尾則白貌兼三形攀木緣石鸚鵡鸚鵡慧鳥青羽赤喙四指中分行則以觜自貽伊籠見幽坐趾數斯鳥􅣕獸鸓鳥數斯人腳厥狀似鴟􅣕獸大眼有鳥名鸓兩頭四足翔若合飛鸞鳥鸞翔女牀鳯出丹穴拊翼相和以應聖哲擊石靡詠韶音其絶鳬徯鳥朱厭獸鳬徯朱厭見則有兵類異感同理不虛行推之自然厥數難明蠻蠻比翼之鳥似鳬青赤雖云一形氣同體隔延頸離鳥翻飛合翮丹木玉膏丹木煒燁沸沸玉膏黃軒是服遂攀龍豪眇然升遐羣下烏號瑾瑜玉鍾山之寶爰有玉華光彩流映氣如虹霞君子是佩象德間邪鍾山之子鼓欽䲹欽䲹及鼓是殺祖江帝乃戮之崑崙之東二子皆化矯翼亦同鰩魚見則邑穰厥名曰鰩經營二海矯翼間霄唯味之竒見歎伊庖神英招槐江之山英招是主巡逰四海撫翼雲儛實惟帝囿有謂玄圃榣木榣惟靈樹爰生若木重根增駕流光旁燭食之靈化榮名仙録崑崙丘崑崙月精水之靈府惟帝下都西姥之宇嵥然中峙號曰天柱神陸吾肩吾得一以處崑崙開明是對司帝之門吐納靈氣熊熊魂魂土螻獸欽原鳥土螻食人四角似羊欽原類蜂大如鴛鴦觸物則斃其鋭難當沙棠安得沙棠制為龍舟泛彼滄海眇然遐逰聊以逍遙任波去留鶉鳥沙棠實薲草司帝百服其鳥名鶉沙棠之實惟果是珍爰有竒菜厥號曰薲神長乘九德之氣是生長乘人狀豹尾其神則凝妙物自濳世無得稱西王母天帝之女蓬髮虎顔穆王執贄賦詩交歡韻外之事難以具言積石積石之中實生重河夏后是導石門湧波珍物斯備比竒崑阿白帝少昊少昊之帝號曰金天磈氏之宮亦在此山是司日入其景則圎猙章峩之山竒怪所宅有獸似豹厥色惟赤五尾一角鳴如擊石畢方畢方赤文離精是炳旱則髙翔鼓翼陽景集乃流災火不炎正文貝先民有作龜貝為貨貴以文彩賈以小大簡則易資犯而不過天狗乾麻不長天狗不大厥質雖小禳災除害氣之相旺在乎食帶三青鳥山名三危青鳥所憩往來崑崙王母是隸穆王西征旋軫斯地江疑獓􅧝獸􅣍鳥江疑所居風雲是濳獸有獓􅧝毛如披蓑􅣍鳥一頭厥身則兼神耆童顓頊之子嗣作火正鏗鏘其鳴聲如鐘磬處于騩山唯靈之盛帝江質則混沌神則旁通自然靈照聼不以聰強為之名曰惟帝江獂獸鵸鵌鳥鵸鵌三頭獂獸三尾俱禦不祥消凶辟眯君子服之不逢不韙當扈鳥飛以翼當扈則鬚廢多任少沛然有餘輪運於轂至用在無白狼矯矯白狼有道則逰應符變質乃銜靈鉤惟德是適出殷見周白虎甝之虎仁而有猛其質載皓其文載炳應德而擾止我交境駮駮惟馬類實畜之英騰髦驤首噓天雷鳴氣無不凌吞虎辟兵神魑蠻蠻髯遺魚其音如吟一腳人面鼠身鱉頭厥號曰蠻目如馬耳食厭妖變櫰木櫰之為木厥形似槤若能長服拔樹排山力則有之夀亦宜然鳥鼠同穴山鵌二蟲殊類同歸聚不以方或走或飛不然之然難以理推􅛈魮魚形如覆銚包玉含珠有而不積泄以尾閭暗與道會可謂竒魚丹木爰有丹木生彼洧盤厥實如瓜其味甘酸蠲痾辟火用竒桂蘭窮竒獸螺魚孰湖獸窮竒如牛蝟毛自表濛水之螺匪魚伊鳥孰湖之獸見人則抱鰠魚物以感應亦不數動壯士挺劍氣激白虹鰠魚濳淵出則邑悚北山經圖讚水馬馬實龍精爰出水類渥窪之駿是靈是瑞昔在夏后亦有何駟倏魚涸和損平莫慘於憂詩詠萱草帶山則倏壑焉遺岱聊以盤逰䑏疏獸鵸鵌鳥何羅魚厭火之獸厥名䑏疏有鳥自化號曰鵸鵌一頭十身何羅之魚孟槐孟槐似貆其豪則赤列象畏獸凶邪是辟氣之相勝莫見其迹鰼鰼魚鼓翮一揮十翼翩翻厥鳴如鵲鱗在羽端是謂怪魚食之辟燔槖駝駝惟竒畜肉鞍是被迅景流沙顯功絶地濳識泉源微乎其智耳鼠跖實以足排虛以羽翹尾翻飛竒哉耳鼠厥皮惟良百毒是禦幽鴳幽鴳似猴俾愚作智觸物則笑見人佯睡好用小慧終是嬰繫寓鳥孟極足訾獸鼠而傅翼厥聲如羊孟極似豹或倚無良見人則呼號曰足訾鵁鳥毛如雌雉朋翔羣下飛則籠日集則蔽野肉驗針石不勞補寫諸犍獸白鵺竦斯鳥諸犍善吒行則銜尾白鵺竦斯厥狀如雉見人則跳頭文如繡磁石磁石吸鐡玳瑁取芥氣有濳感數亦冥會物之相投出乎意外玳瑁一作琥珀旄牛牛充兵機兼之者旄冠于旌鼓為軍之標匪肉致災亦毛之招長蛇長蛇百尋厥鬛如彘飛羣走類靡不吞噬極物之惡盡毒之厲山􅏈山􅏈之獸見人歡謔厥性善投行如矢激是惟氣精出則風作謔一作虎窫窳諸懷獸䲃魚肥遺蛇窫窳諸懷是則害人䲃之為狀羊鱗黑文肥遺之蛇一頭兩身鮆魚陽鑒動日土蛇致宵微哉鮆魚食則不驕物在所感其用無標狍梟狍梟貪婪其目在腋食人未盡還自齦割圖形妙鼎是謂不若狕閭􅖃馬獨𤞞有獸如豹厥文惟縟閭善躍嶮􅖃馬一角虎狀馬尾號曰獨𤞞􅜥􅠍禦暍之鳥厥名􅜥􅠍昏明是互晝隱夜覿物貴應用安事鸞鵠居暨獸囂鳥三桑居暨豚鳴如彚赤毛四翼一目其名曰囂三桑無枝厥樹唯髙䮝獸䮝獸四角馬尾有距涉歷歸山騰嶮躍岨厥貌惟竒如是旋舞天馬龍馮雲遊騰蛇假霧未若天馬自然凌翥有理懸運天機濳御鶌居鶌居如烏青身黃足食之不飢可以辟榖內厥唯珍配彼丹木飛鼠或以尾翔或以髯凌飛鼠鼓翰翛然皆騰用無常所惟神是馮䴅䴅象蛇􅗫父魚有鳥善驚名曰䴅䴅象蛇似雉自生子孫􅗫父魚首厥體如豚酸與景山有鳥稟形殊類厥狀如蛇腳二翼四見則色恐食之不醉鴣􅨊黃鳥鴣􅨊之鳥食之不瞧爰有黃鳥其鳴自呌婦人是服矯情易操精衛炎帝之女化為精衛沈形東海靈爽西邁乃銜木石以填波害䍶䍶羆九獸大蛇䍶䍶似羊眼在耳後竅生尾上號曰羆九幽都之山大蛇牛詬東山經圖讚鱅鱅魚􅚧􅚧獸𪕊鼠魚號鱅鱅如牛虎駮􅚧􅚧之狀似狗六腳𪕊鼠如雞見則旱涸䖺䗤䖺䗤蛇狀振翼灑光憑波騰逝出入江湘見則歲旱是維火祥狪狪蚌則含珠獸胡不可狪狪如豚被褐懷禍患難無繇招之自我堪㐨魚軨軨獸堪㐨軨軨殊氣同占見則洪水天下昏墊豈伊妄降亦應圖讖珠蟞魚澧水之鮮形如浮肺體兼三才以貨賈害厥用既多何以自衛犰狳犰狳之獸見人佯眠與災協氣出則無年此豈能為歸之於天狸力獸􅝼胡鳥狸力􅝼胡或飛或伏是惟土祥出興功築長城之役同集秦域朱獳朱獳無竒見則色駭通感靡誠維數所在因事而作未始無待獙獙蠪蚳獸潔鉤鳥獙獙如狐有翼不飛九尾虎爪號曰蠪蚳潔鉤似鳬見則民悲峳峳治在得賢亡由失人峳峳之來乃致狡賔歸之冥應誰見其津蠵龜水圓四十濳源溢沸靈龜爰處掉尾養氣莊生是感揮竿傲貴妴胡精精獸鮯鮯魚妴胡之狀似麋魚眼精精如牛以尾自辨鮯鮯所濳厥深無限猲狙獸鬿雀猲狙狡獸鬿雀惡鳥或狼其體或虎其爪安用甲兵擾之以道芑木馬維剛駿塗之芑汁不勞孫陽自然間習厥術無方理有濳執茈魚薄魚有魚十身蘼蕪其臭食之和體氣不下溜薄之躍淵是維災候合窳豬身人面號曰合窳厥性貪殘物為不咀至陰之精見則水雨當康獸䱻魚當康如豚見則歲穰䱻魚鳥翼飛乃流光以出殊應或災或祥蜚蜚則災獸跂踵厲深會所經涉竭水稿林稟氣自然體此殃淫中山經圖讚桃林桃林之谷實惟塞野武王克商休牛風馬厄越三塗作嶮西夏鳴石金石同類濳響是韞擊之雷駭厥聲逺聞茍以數通氣無不運旋龜人魚修辟聲如破木號曰旋龜修辟似黽厥鳴如鴟人魚類䱱出于洛伊帝臺棋茫茫帝臺維靈之貴爰有石棋五彩煥蔚觴禱百神以和天氣若華烏酸草療瘧之草厥實如瓜烏酸之葉三成黃華可以為毒不畏蚖蛇䔄草䔄草黃華實如莵絲君子是佩人服媚之帝女所化其理難思山膏獸黃棘山膏如豚厥性好罵黃棘是食匪子匪化雖無貞操理同不嫁三足龜造物維均靡偏靡頗少不為短長不為多賁能三足何異黿鼉嘉榮霆維天精動心駭目曷以禦之嘉榮是服所正者神用口腸腹天楄牛傷文獸鰧魚牛傷鎮氣天楄弭噎文獸如蜂枝尾反舌鰧魚赤斑處于逵穴帝休帝休之樹厥枝交對竦本少室曾陰雲䨴君子服之匪怒伊愛泰室嵩維嶽宗華岱恆衡氣通天漢神洞幽明巍然中立衆山之英天漢一作元漠栯木爰有嘉樹厥名曰栯薄言采之窈窕是服君子維歡家無反目􅞒草􅞒草赤莖實如櫻薁食之益智忽不自覺殆齊生知功竒於學鶡鳥鶡之為鳥同羣相為畸類被侵雖死不避毛飾武士兼厲以義鳴蛇化蛇鳴化二蛇同類異狀拂翼俱逰騰波漂浪見則並災或淫或亢赤銅昆吾之山名銅所在切玉如泥火炙有彩尸子所歎驗之彼宰彼一作汲神熏池泰逢虎尾武羅人面熏池之神厥狀不見爰有美玉河林如蒨神武羅有神武羅細腰白齒聲如鳴珮以鐻貫耳司帝密都是宜女子鴢鳥鴢鳥似鳬翠羽朱目既麗其形亦竒其肉婦女是食子孫繁育荀草荀草赤實厥狀如菅婦人服之練色易顔夏姫是艷厥媚三遷馬腹獸飛魚馬腹之物人面似虎飛魚如豚赤文無羽食之辟兵不畏雷鼓神泰逢神號泰逢好遊山陽濯足九州出入流光天氣是動孔甲迷惶葪柏葪柏白華厥子如丹實肥變氣食之忘寒物隨所染墨子所歎橘柚厥包橘柚竒者維甘朱實金鮮葉蒨翠藍靈均是詠以為美談􅚄大騩之山爰有蘋草青華白實食之無夭雖不增齡可以窮老鮫魚魚之别屬厥號曰鮫珠皮毒尾匪鱗匪毛可以錯角兼飾劒刀鴆鳥蝮維毒魁鴆鳥是噉拂翼鳴林草瘁木慘羽行隱戮厥罰難犯椒椒之灌植實繁有倫拂穎霑霜朱實芬辛服之不已洞見通神倫一本作榛神􅥰圍計蒙涉􅥰涉􅥰三腳􅥰圍虎爪計蒙龍首獨稟異表升降風雨茫茫渺渺岷山岷山之精上絡東井始出一勺終致渺冥作紀南夏天清地靜夔牛西南巨牛出自江岷體若垂雲肉盈千鈞雖有逸力難以揮輪崍山卭崍峻嶮其坂九折王陽逡巡王尊逞節殷有三仁漢稱二哲􅨓狼雍和􅩰獸􅨓狼之出兵不外擊雍和作恐􅩰乃流疫同惡殊災氣各有適蜼寓屬之才莫過于蜼雨則自懸塞鼻以尾厥形雖隨列象宗彛熊穴熊山有穴神人是出與彼石鼓象殊應一祥雖先見厥事非吉跂踵青耕禦疫跂踵降災物之相反各以氣來見則民咨實為病媒蛟匪蛇匪龍鱗彩炳煥騰躍波濤蜿蜒江漢漢武飲羽飛佽疊斷神耕父清泠之水在乎山頂耕父是遊流光灑景黔首祀禜以弭災眚九鐘嶢崩涇竭麟鬬日薄九鐘將鳴凌霜乃落氣之相應觸感而作嬰勺支離之山有鳥似鵲白身赤眼厥尾如勺維彼有斗不可以酌獜有獸虎爪厥號曰獜好自跳撲鼓甲振奮若食其肉不覺風迅帝臺漿帝臺之水飲蠲心病靈府是滌和神養性食可逍遙濯髮浴泳狙如狙如微蟲厥體無害見則師興兩陳交會物之所感焉有小大帝女桑爰有洪桑生濵淪潭厥圍五丈枝相交參園客是採帝女所蠶梁渠􅦺即聞􅡁獸䳅鵌鳥梁渠致兵􅦺即起災䳅鵌辟火物各有能聞􅡁之見大風乃來神于兒于兒如人蛇頭有兩常遊江淵見于洞廣乍濳乍出神光惚恍神二女神之二女爰宅洞庭遊化五江惚恍窈冥號曰夫人是維湘靈飛蛇騰蛇配龍因霧而躍雖欲登天雲罷陸莫材非所任難以久託海外南經圖讚自此山來蟲為蛇蛇號為魚賤無定貢貴無常珍物不自物名物由人萬事皆然豈伊蛇鱗羽民國鳥喙長頰羽生則卵矯翼而翔龍飛不逺人維倮屬何狀之反神人二八羽民之東有神司夜二八連臂自相羈駕晝隱宵出詭時淪化歡頭國歡國鳥喙行則仗羽濳于海濵維食芑秬實維嘉穀所謂濡黍厭火國有人獸體厥狀怪譎吐絡炎精火隨氣烈推之無竒理有不熱三珠樹三珠所生赤水之際翹葉柏竦美壯若彗濯彩丹波自相霞映臷國不蠶不絲不稼不穡百獸率儛羣鳥拊翼是號臷民自然衣食貫胸交脛支舌國鑠金洪爐灑成萬品造物無私各任所稟歸於曲成是見兆朕不死國有人爰處員邱之上赤泉駐年神木養命稟此遐齡悠悠無竟鑿齒國鑿齒人類實有傑牙猛越九嬰害過長蛇堯乃命羿斃之壽華三首國雖云一氣呼吸異道觀則俱見食則皆飽物形自周造化非巧焦僥國羣籟舛吹氣有萬殊大人三丈焦僥尺餘混之一歸此亦僑如長臂國雙肱三尺體如巾人彼曷為者長臂之民修腳是負捕魚海濵狄山帝堯葬于陽帝嚳葬于陰聖德廣被物無不懷爰乃殂落封墓表哀異類猶然矧乃華黎視肉聚肉有眼而無腸胃與彼馬勃頗相髣佛奇在不盡食人薄味南方祝融祝融火神雲駕龍驂氣御朱明正陽是含作配炎帝列位于南海外西經圖讚夏后啓筮御飛龍果儛九代雲融是揮玉璜是佩對揚帝德稟天靈誨三身國一臂國品物流行以散混沌增不為多減不為損厥變難原請尋其本竒肱國妙哉工巧竒肱之人因風搆思制為飛輪凌頽遂軌帝湯是賔形天爭神不勝為帝所戮遂厥形天臍口乳目仍揮干戚雖化不服女祭女戚彼姝者子誰氏二女曷為水間操魚持爼厥儷安在離羣逸處䳐鳥􅦵鳥有鳥青黃號曰􅦵䳐與妖會合所集會至類則梟鶹厥狀難媚丈夫國陰有偏化陽無産理丈夫之國王孟是始感靈所通桑石無子女丑尸十日並熯女丑以斃暴于山阿揮袖自翳彼美誰子逢天之厲巫咸羣有十巫巫咸所統經技是搜術藝是綜採藥靈山隨時登降并封龍過無頭并封連載物狀相乖如驥分背數得自通尋之愈閡女子國簡狄有吞薑嫄有履女子之國浴于黃水乃娠乃字生男則死軒轅國軒轅之人承天之祐冬不襲衣夏不扇暑猶氣之和家為彭祖乘黃飛黃竒駿乘之難老揣角輕騰忽若龍矯實鑒有德乃集厥皂滅蒙鳥大運山雄常樹青質赤尾號曰滅蒙大運之山百仭三重雄常之樹應德而通龍魚龍魚一角似狸處陵俟時而出神聖攸乘飛騖九域乘雲上升西方蓐收蓐收金神白毛虎爪珥蛇執鉞專司無道立號西阿恭行天討海外北經圖讚無䏿國萬物相傳非子則根無䏿因心構肉生魂所以能然尊形者存燭龍天缺西北龍銜火精氣為寒暑眼作昏明身長千里可謂至神一目國蒼四不多此一不少于野冥瞽洞見無表形逰逆旅所貴維眇柔利國柔利之人曲腳反肘子求之容方此無醜所貴者神形於何有共工臣相栁共工之臣號曰相栁稟此奇表蛇身九首恃力桀暴終禽夏后深目國深目類胡但胡絶縮軒轅道降欵塞歸服穿胸長腳同會異族聶耳國聶耳之國海渚是縣雕虎斯使奇物畢見形有相須手不離面夸父神哉夸父難以理尋傾沙逐目遁形鄧林觸類而化應無常心尋木眇眇尋木生于河邉疏枝千里上干雲天垂陰四極下蓋虞淵跂踵國厥形雖大斯腳則企跳步雀踴踵不閡地應德而臻欵塞歸義歐絲野女子鮫人體近蠶蚌出珠匪甲吐絲匪蛹化出無方物豈有種無腸國無腸之人厥體維洞心實靈府餘則外用得一自全理無不共平丘兩山之間丘號曰平爰有遺玉駿馬維青視肉甘華奇果所生騊駼騊駼野駿産自北域交頸相摩分背翹陸雖有孫陽終不能服北方禺強禺強水神靣色黧黑乘龍踐蛇凌雲附翼靈一玄冥立于此極海外東經圖讚君子國東方氣仁國有君子薰華是食雕虎是使雅好禮讓委蛇論理天吳耽耽水伯號曰谷神八頭十尾人靣虎身龍據兩川威無不震九尾狐青丘奇獸九尾之狐有道翔見出則銜書作瑞周文以標靈符豎亥禹命豎亥青丘之北東盡太遠西窮邠國步履宇宙以明靈德十日十日並出草木焦枯羿乃控弦仰落陽烏可謂洞感天人懸符毛民國牢悲海鳥西子駭麋或貴穴倮或尊裳衣物我相傾孰了是非黑齒國雨師妾玄股國勞民國陽谷之山國號黑齒雨師之妾以蛇挂耳玄股食鷗勞民黑趾東方勾芒有神人面身鳥素服銜帝之命錫齡秦穆皇天無親行善有福海內南經圖讚梟陽佛佛怪獸被髮操竹獲人則笑脣蔽其目終亦號咷反為我戮狌狌狌狌之狀形乍如犬厥性識往為物警辨以酒招災自詒纓罥夏后啓臣孟塗孟塗司巴聼訟是非厥理有曲血乃見衣所請靈斷嗚呼神微建木爰有建木黃實紫柯皮如蛇纓葉有素羅絶蔭弱水異人則過氐人炎帝之苗實生氐人死則復蘇厥身為鱗雲南是託浮遊天津巴蛇象實巨獸有蛇吞之越出其骨三年為期厥大何如屈生是疑海內西經圖讚二負臣危漢擊磐石其中則危劉生是識羣臣莫知可謂博物山海乃奇流黃鄷氏國城圍三百連河比棟動是塵昏蒸氣霧重焉得遊之以遨以縱大澤方百里地號積羽厥方百里羣鳥雲集鼓翅雷起穆王旋軫爰榮騄耳流沙天限內外分以流沙經帶西極頽塘委蛇注于黑水永溺餘波木禾崑崙之陽鴻鷺之阿爰有嘉榖號曰木禾匪植匪藝自然靈播開明開明天獸稟兹乾精虎身人面表此桀形瞪視崑山威懾百靈文玉玗琪樹文玉玗琪方以類叢翠葉猗萎丹柯玲瓏玉光爭煥彩艷火龍不死樹萬物暫見人生如寄不死之樹壽蔽天地請藥西姥烏得如羿甘水聖木醴泉睿木養靈盡性增氣之和祛神之冥何必生知然後為聖窫窳窫窳無罪見害二負帝命羣巫操藥夾守遂淪溺淵變為龍首服常琅玕樹服常琅玕崑山竒樹丹實珠離緑葉碧布三頭是伺遞望遞顧海內北經圖讚吉良金精朱鬛龍行駿跱拾節鴻鶩塵不及起是謂吉良釋聖牖里蛇巫山鬼神蜪犬羣帝臺大蜂朱蛾蛇巫之山有人操杯鬼神蜪犬主為妖災大蜂朱蛾羣帝之臺闒非據比尸祙戎人面獸身是謂闒非被髮折頸據比之尸戎三其角祙豎其睂騶虞怪獸五彩尾參於身矯足千里倏忽若神是謂騶虞詩歎其仁氷夷稟華之精練食八石乘龍隱淪往來海若是謂水仙號曰河伯王子夜尸子夜之尸體分成七離不為疏合不為密茍以神御形歸於一宵明燭光水有佳人宵明燭光流耀河湄稟此奇祥維舜二女别處一方列姑射山大蟹陵魚姑射之山實栖神人大蟹千里亦有陵鱗曠哉溟海含怪藏珍蓬萊山蓬萊之山玉碧構林金臺雲館皓哉獸禽實維靈府玉主甘心海內東經圖讚郁州南極之山越處東海不行而至不動而改維神所運物無常在韓鴈始鳩雷澤神琅琊臺韓鴈始鳩在海之州雷澤之神鼓腹優遊琅琊嶕嶢邈若雲樓豎沙居繇埻端璽㬇國㬇沙居繇埻端璽㬇沙漠之鄉絶地之館或羈于秦或賔于漢大江北江南江浙江廬淮湘漢濛溫潁汝涇渭白沅贑泗鬱肄潢洛汾沁濟潦呼沱漳水川瀆交錯渙瀾流帶通濳潤下經營華外殊出同歸混之東會交一作綺補遺封豕有物貪婪號曰封豕薦食無厭肆其殘毁羿乃飲羽獻帝效伎鼯鼠鼯之為鼠食煙棲林載飛載乳乍獸乍禽皮藉孕婦人為大任弱水弱出崑山鴻毛是沈北淪流沙南映火林惟水之奇莫測其深都廣之野都廣之野珍怪所聚爰有羔榖鸞歌鳯舞后稷託終樂哉斯土猩猩能言之獸是謂猩猩厥狀似猴號音若嚶自然知往頗測物情若木若木之生崑山是濵朱華電照碧葉玉津食之靈知為力為神翡翠翠雀麋鳥越在南海羽不供用肉不足宰懷璧其罪賈害以采欵冬吹萬不同陽煦陰蒸欵冬之生擢頴堅氷物休所安焉知渙凝鬼草焉得鬼草是樹是萟服之不憂樂天儀世如彼滚舟任波流滯蟒蛇蠢蠢萬生咸以類長惟蛇之君是謂巨蟒小則數尋大或百丈枳首蛇夔稱一足蛇則二首少不知無多不覺有雖資天然無異駢拇䲃魚䲃之為狀半鳥半鱗形如雞鯉食之已疣飛魚飛魚如豚赤文無羽服之不雷可以禦兵焦堯焦堯極麼靖人唯小四體具足鬚眉才了讚釋天地圖讚祭地肆瘞郊天致煙氣升太一精淪九泉至敬不文明德惟鮮星圗讚茫茫地理燦爛天文四靈垂象萬類羣分眇觀六沴咎徵惟君炎山讚木含陽氣精構則燃焚之無盡是生火山理見乎微其妙在傳筆讚上古結繩易以書契經緯天地錯綜羣萟日用不知功蓋萬世龜讚天生神物十朋之龜或遊于火或遊于蓍雖云類殊象二一歸亹亹致用極數盡幾蚌讚萬物變蛻其理無方雀雉之化含珠懷璫與月盈虧協氣晦望蟬讚蟲之精潔可貴惟蟬濳蛻棄穢飲露恆鮮萬物皆化人胡不然螢火讚熠耀宵行蟲之微么出自腐草煙若散漂物之相喣孰知其陶芣苡讚車前之草别名芣苡王會之云其實如李名之相亂在乎疑似杜若讚蘼蕪善草亂之蛇牀不隕其實自别以芳佞人似智巧言如簧芙容讚芙容麗草一曰澤芝泛葉雲布映波赮熙伯陽是食饗比靈期麻讚草皮之良莫貴於麻用無不給服無不加至物在邇求之好遐圭讚玉作五瑞辨章有國君子鳴佩亦以表德永觀厥祭時惟文則尺蠖讚貴有可賤賤有可珍嗟兹尺蠖體此屈伸論配龍蛇見歎聖人菊讚菊名白精布華玄月仙客薄采何憂華髮萍讚萍之在水猶卉植地靡見其布漠爾鱗被物無常託孰知所寄卷施讚卷施之草拔心不死屈平嘉之諷詠以比取類雖邇興有逺旨螳螂讚螳蜋飛蟲揮斧奮臂當轍不回可踐可避勇士致斃厲之以義麟讚麟惟靈獸與麏同體智在隱蹤仁表不抵孰為來哉宣尼揮涕比肩獸讚蟨與岠虛乍兔乍鼠長短相濟彼我俱舉有若自然同心共膂鼎讚九牧貢金鼎出夏后和味養賢以無化有赫赫三事鑒干覆餗金銀讚惟金三品揚越作貢五材之珍是謂國用務經軍農爰及雕弄柚讚厥包橘柚精者曰甘實染繁霜葉鮮翠藍屈生嘉歎以為美談梧桐讚桐實嘉木鳯凰所棲爰伐琴瑟八音克諧歌以永言噰噰喈喈燕讚燕燕于飛瑞娥以卵玄玉爰發聖敬日逺商人是頌詠之弦管馬讚馬出明精祖自天駟十間六種各有名類三才五御駑駿異轡貔讚書稱猛士如虎如貔貔蓋豹屬亦曰執夷白狐之云似是而非鼮鼠讚有鼠豹彩厥號為鼮漢朝莫知郎中能名賞以束帛雅業遂盛鼷鼠讚小鼠曰鼷實有螫毒乃食郊牛不恭是告厥譴惟明徵乎其覺鼫鼠讚五能之鼠技無所執應氣而化翻飛鴽集詩人歌之無食我粒詩贈溫嶠人亦有言松竹有林及爾臭味異苔同岑言以忘得交以淡成匪同伊和惟我與生爾神余契我懷子情攜手一豁安知塵冥遊仙詩十四首京華遊俠窟山林隱遁棲朱門何足榮未若託蓬萊臨源挹清波陵岡掇丹荑靈溪可濳盤安事登雲梯漆園有傲吏萊氏有逸妻進則􅍖龍見退為觸藩羝髙蹈風塵外長揖謝夷齊青溪千餘仭中有一道士雲生梁棟間風出􅙘户裏借問此何誰云是鬼谷子翹迹企潁陽臨河思洗耳閶闔西南來濳波渙鱗起靈妃顧我笑粲然啓玉齒蹇修時不存要之將誰使翡翠戲蘭苕容色更相鮮緑蘿結髙林蒙籠蓋一山中有冥寂士靜嘯撫清絃放情凌霄外嚼蘂挹飛泉赤松臨上遊駕鴻乘紫煙左挹浮丘袖右拍洪崖肩借問蜉蝣輩寧知龜鶴年六龍安可頓運流有代謝時變感人思已秋復願夏淮海變微禽吾生獨不化雖欲騰丹溪雲螭非我駕愧無魯陽德回日向三舍臨川哀年邁撫心獨悲吒逸翮思拂霄迅足羡逺遊清源無增瀾安得運吞舟圭璋雖特逹明月難暗投濳頴怨青陽陵苕哀素秋悲來惻丹心零淚緣纓流雜縣寓魯門風暖將為災吞舟涌海底髙浪駕蓬萊神仙排雲出但見金銀臺陵陽挹丹溜容成揮玉杯姮娥揚妙音洪崖頷其頥升降隨長煙飄颻戲九垓奇齡邁五龍千嵗方嬰孩燕昭無靈氣漢武非仙才晦朔如循環月盈已復魄蓐收清西陸朱羲將由白寒露拂陵苕女蘿辭松柏蕣榮不終朝蜉蝣豈見夕圓丘有奇草鍾山出靈液王孫列八珍安期錬五石長揖當途人去來山林客暘谷吐靈曜扶桑森千丈朱霞升東山朝日何晃朗回風流曲櫺幽室發逸響悠然心永懷眇爾自遐想仰思舉雲翼延首矯玉掌嘯傲遺世羅縱情任獨往明道雖若昧其中有妙象希賢宜勵德羡魚當結網採藥遊名山將以救年頽呼吸玉滋液妙氣盈胸懷登仙撫龍駟迅駕乘奔雷鱗裳逐電曜雲蓋隨風回手頓羲和轡足蹈閶闔開東海猶蹄涔崑崙若蟻堆遐邈冥茫中俯視令人哀璇臺冠崑嶺西海濱招搖瓊林籠藻映碧樹疏英翹丹泉漂朱沫黑水鼓玄濤尋仙萬餘日今乃見子喬振髮晞翠霞解褐被絳綃總轡臨少廣盤虬舞雲軺永偕帝鄉侣千齡共逍遙登嶽採五芝涉澗將六草散髮蕩玄溜終年不華皓四瀆流如淚五嶽羅若垤尋我青雲友永與時人絶靜歎亦何念悲此妙齡逝在世無千月命如秋葉蒂蘭生蓬芭間榮曜常幽翳縱酒濛汜濱結駕尋木末翹手攀金梯飛步登玉闕左顧擁方目右眷極朱髮贈潘尼把梓生南荆竒才應世出擢穎蓋漢陽鴻聲駭皇室遂應四科運朱衣耀玉質春青陽暢和氣谷風穆以溫英茝曄林薈昆蟲咸啓門髙臺臨迅流四座列王孫羽蓋停雲陰翠鬱映玉樽夏羲和騁丹衢朱明赫其猛融風拂晨霄陽精一何冏間宇靜無娛端坐愁日永别君如秋日雲妾似突中煙髙下理自殊一乖雨絶天題墓詩北阜烈烈巨海混混壘壘三墳唯母與昆漢魏六朝百三家集卷五十七
