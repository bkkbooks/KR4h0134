body:
  text: 漢魏六朝百三家集卷七十六齊王融集題詞齊世祖禊宴芳林使王元長為曲水詩序有名當世北使欽矚擬於相如封禪梁昭明登之文選玄黃金石斐然盈篇即詞涉比偶而壯氣不沒焜耀一時亦有繇也竟陵王宗子長賢元長投許情分法門贊頌如塤如篪彼此之交謂以淨照相得而傖楚入幕戎服災身蘭室栴崖豈宜若是夫南齊王業太孫壞之孝武多男西昌賊之設元長志遂竟陵當陽蕭氏福祚可世世也謀敗獄死天即惡捶車之躁其不祐齊則久矣人但見王郎年未三十心熱公輔并笑其斷仗一舉僨取瓦裂猶然成敗之見乎元長獄中據答自云上甘露頌銀甕啓及三日詩序接虜使語辭竭思稱揚得非誹謗夫穰侯相印不可遽得終子雲賈長沙才則我自有也又曷不少從容引分資成不朽哉目録賦風賦桐樹賦應竟陵王教疏上北伐圗疏議給虜書疏請習校部曲疏表拜祕書丞謝表為王儉讓國子祭酒表又獄中據答表策問永明九年策秀才文五首永明十一年策秀才文五首啓求自試啓法門頌啓謝勑賜御裘等啓謝勑賜米啓謝竟陵王示法制啓謝竟陵王示扇啓謝竟陵王賜納裘啓謝司徒賜紫鮓啓謝武陵王賜弓啓謝安陸王賜銀鉢啓書為竟陵王與隱士劉虬書序三月三日曲水詩序頌淨行頌三十一首皇覺辨德篇頌開物歸信篇頌滌除三業篇頌修理六根篇頌生老病死篇頌尅責身心篇頌檢覆三業篇頌訶詰四大篇頌出家順善篇頌在家從惡篇頌沈冥地獄篇頌出家懷道篇頌在家懷善篇頌三界內苦篇頌出三界外樂篇頌斷絶疑惑篇頌十種慚愧篇頌極大慚愧篇頌善友奬勸篇頌戒法攝心篇頌自慶畢故止新篇頌大忍惡對篇頌緣境無礙篇頌一志努力篇頌禮舍利寶塔篇頌敬重正法篇頌奉養僧田篇頌勸請增進篇頌隨喜萬善篇頌回向佛道篇頌發願莊嚴篇頌哀策文皇太子哀策文墓銘豫章王墓銘永嘉長公主墓銘樂府齊明王歌辭七首明王曲聖君曲淥水曲採菱曲清楚引長歌引散曲三婦艷詩青青河畔草同沈右率諸公賦鼓吹曲二首巫山髙芳樹臨髙臺望城行法樂辭十二首本起靈瑞下生在宫四遊出國得道雙樹賢衆學徒供具福應少年子江臯曲思公子王孫逰陽翟新聲永明樂十首奉和秋夜長代五雜組奉和兩頭纎纎曲詩贈族叔衛軍從武帝琅琊城講武應詔棲玄寺聽講畢遊邸園七韻應司徒教雜體報范通直别蕭咨議寒晚敬和何徴君點和王友德元古意二首奉和竟陵王郡縣名逰仙詩五首春逰回文詩侍逰方山應詔奉辭鎮西應教餞謝文學離夜和南海王殿下詠秋胡妻七首琵琶詠幔藥名星名奉和月下詠池上梨花詠梧桐詠女蘿移席琴室應司徒教抄衆書應司徒教自君之出矣擬古二首四色詠離合賦物為詠雙聲詩聨句阻雪連句遙贈和漢魏六朝百三家集卷七十六目録欽定四庫全書漢魏六朝百三家集卷七十六明張溥輯齊王融集賦風賦奄兮日采之既移忽兮羣景之將馳靡輕筠之碧葉泛層松之翠枝總髙羽而蕭瑟韻珠露之參差此烈士之英風長寥亮其如斯桐樹賦應竟陵王教梧桐生矣於邸岫之層隈儀龍門而插幹佇鳯羽以抽枝從楚宫而留稱藉溜館以翻聲直不繩而特秀圎匪規而天成同嵗草以萎暮共辰物而滋榮豈逺心以自外寧有志於孤貞疏上北伐圗疏臣聞情慉自中事符則感象構於始機動斯彰莊敬之道可宗會揖讓其彌肅勇烈之士足貴應鼙鐸以增思肇植生民厥詳既緬降及興運維道有徵莫不有所因循而升皇業者也若夫膏腴既稱天乙知五方之富皮幣巳列帝劉測四海之尊異封禪之文則升中之典攸鬯歎輿地之圗乃席捲之庸是立伏惟陛下窮神盡聖總極居中偶化兩儀均明二曜拯玄綱於頽絶反至道於清淳可謂區宇儀刑齊民先覺者也臣亦遭逢生此嘉運鑿飲耕食自幸唐年而識用昏霾經術疏淺將薖且軸豈蕨與薇皇鑒燭幽天髙聽下賞片言之或善矜一物之失時湔拂塵蒙霑飾光價拔足草廬厠身朝序復得拜賀嵗時瞻望日月於臣心願會巳畢矣但千祀一逢休明難再思策鉛駑樂陳涓壒竊習戰陳攻守之術農桑牧藝之書申商韓墨之權伊周孔孟之道常願待詔朱闕俯對青蒲請間宴之私談當世之務位賤人微徒深傾欵方今九服清怡三靈和晏木有附枝輪無異轍東鞮獻舞南辮傳歌羌僰踰山秦屠越海舌象玩委體之勤輶譯厭瞻巡之數固將開桂林於鳯山創金城於西守而蠢爾獯狄敢讎大邦假息關河竊命函谷淪故京之爽塏變舊邑而荒涼息反坫之儒衣久伊川之被髮北地殘民東都遺老莫不茹泣吞悲傾耳戴目翹心仁政延首王風若試馳咫尺之書具甄戎旅之卒徇其墜城納其降虜可弗勞弦鏃無待干戈真皇王之兵征而不戰者也臣乞以執殳先邁式道中原澄瀚渚之恆流掃狼山之積霧係單于之頸屈左賢之膝習呼韓之舊儀拜鑾輿之巡幸然後天移雲動勒封岱宗咸五登三追蹤七十百神肅警萬國具僚璯辨星離玉帛雲聚集三燭於蘭席聆萬嵗之禎聲豈不盛哉豈不韙哉昔桓公志在伐莒郭牙審其幽趣魏后心存去漢德祖究其深言臣愚昧忖誠不足以知微然伏揆聖心規模宏逺既圗載其事必克就其功臣不勝歡喜議給虜書疏虜使遣求書朝議欲不許融上疏請許之臣側聞僉議疑給虜書如臣愚情竊有未喻夫虜人靣獸心狼猛蜂毒暴悖天經虧違地義逋竄燭幽去來豳朔綿周漢而不悛厯晉宋其踰梗豈有愛敬仁智恭讓廉修慙犬馬之馴心同鷹虎之反目設稿秣有儲筋竿足用必以草竊關燧冦擾邊疆寧容欵塞卑辭承衣請朔陛下務存遵養不時侮亡許其膜拜之誠納裘之賮況復願同文軌儻見欵遣思奉聲教方致猜拒將使舊邑遺逸未知所置衰胡餘噍或能自推一令蔓草難鉏涓流泛酌豈直疥癢輕痾容為心腹重患抑孫武之言也困則數罰窘則多賞先暴而後畏其衆者虜之謂乎前中原士庶雖淪懾殊俗至於婚葬之晨猶巾褠為禮而禁令苛刻動加誅轘於時獯粥初遷犬羊尚結即心徒怨困懼成逃自其將卒奔離資峙銷闕北畏勍蠕西逼南胡民背如崩勢絶防斷於是曲從物情偽竊章服厯年將絶隱蔽無聞既南向而泣者日夜以覬北顧而辭者江淮相屬凶謀嵗窘淺慮無方於是稽顙郊門問禮求樂若來之以文德賜之以副書漢家軌儀重臨畿輔司𨽻傳節復入關河無待八百之師不期十萬之衆固且提漿佇俟揮戈願倒三秦大同六漠一統又虜前後奉使不專漢人必介以胸奴備諸覘獲且設官分職彌見其情抑退舊苗扶任種戚師保則后族馮晉國總録則邽姓直勒渴侯台鼎則丘頽茍仁端執政則目凌鉗耳至於東都羽儀西京簮帶崔孝伯程虞蚪久在著作李元和郭季祐上于中書李思沖飾虜清官遊明根泛居顯職今經典逺被詩史北流馮李之徒必欲遵尚直勒等類居致乖阻何則胸奴以氈騎為帷床馳射為糇糧冠方帽則犯沙陵雪服左袵則風驤鳥逝若衣以朱裳戴以玄冕節其揖讓教以翔趨必同艱桎梏等懼冰淵婆娑􅩚躃困而不能前巳及夫春草水生阻散馬之適秋風木落絶驅禽之歡息沸脣於桑墟别醍乳於冀俗聽韶雅如聾瞶臨方丈若爰居馮李之徒固得志矣虜之胸族其如病何於是風土之思深愎戾之情動拂衣者連裾抽鋒者比鏃部落爭於下酋渠危於上我一舉而兼吞卞莊之勢必也且棘寶薦虞晉疆彌盛大鍾出智宿氏以亡帝略逺孚無思不服鑾光幸岱匪暮斯朝臣請收籍伊瀍兹書復掌猶取之內府藏之外籝於理有愜即事何損若狂言足採請決敕施行請習校部曲疏臣每覽史傳見憂國忘家捐生報德者未嘗不撫卷歎息以為今古共情也然或以片言微感一餐小惠參國士之眄同布素之逰耳豈有如臣獨拔無聞之伍過超非分之位名器雙假榮祿兩升而宴安昃罷之晨優遊旰食之日所以敢布丹愚仰聞宸聽今議者或以西夏為念臣竊謂之不爾其故何哉陛下聖明羣臣悉力順以制逆上而御下指開賞黜之言微示生死之路方域之人皆相為敵既兵威逺臨人不自保雖窮鳥必咏固等命於梁鶉困獸斯驚終並懸於厨鹿凱師勞飲固不待晨臣之寸心獨有微願自獫狁薦食荒侮伊瀍天道禍淫危亡日至母后內難兵力外虛謠言物情屬當今會若藉巫漢之歸師騁士卒之餘憤取函谷如反掌陵關塞若摧枯但士非素蓄無以即用不教民戰是實棄之特希私集部曲豫加習校若蒙垂許乞𨽻監省拘食人身權備石頭防衛之數臣少重名節早習軍旅若試而無績伏受面欺之誅用且有功仰酬知人之哲表拜祕書丞謝表臣聞升離戒晨隂牆不照其景膚雲停夕幽草或漏其津至如明兼就日澤深行雨不有聖德誰或其然所以欽至道而出青臯拾布衣而望朱闕懷祿仕在代耕期榮不謀入用豈悟特擢之例事均延祖置左之恩任光元幹踰溢情涯普燭身表畏翹車而必讓誡濡翼之願辭既聖主謂其可施故愚臣默思自勉為王儉讓國子祭酒表竊以庠均義重振古所崇資師道尊有來攸尚匪曰蘭芷疇變入室之情不自朱藍何遷素絲之質況臣仁慙富侶德謝潤身識陋令經器非匣重何以升墜道於殊年反斯文於遙日將使良璣修竹無增瑩羽敬遜務時遂騫星嵗又臣聞修瓦方湛弱露霑而取覆懸衡紀正輕塵委而必移況臣才非應俗用乖知治取其集氷飲水旌懸輪騖方臣之念未足言矣獄中據答表囚實頑蔽觸行多愆但夙忝門素得奉教君子爰自總髮迄將立年州閭鄉黨見許愚慎朝廷衣冠謂無舋咎過蒙大行皇帝奬育之恩又荷文皇帝識擢之重司徒公賜預士林安陸王曲垂眄接既身被國慈必欲以死自效前後陳伐虜之計亦仰簡先朝今段犬羊乍擾紀僧真奉宣先敕賜語北邊動靜令囚草撰符詔于時即因啓聞希侍鑾輿及司徒宣敕招募同例非一實以戎事不小不敢承教續蒙軍號賜使招集銜敕而行非敢虛扇且格取亡叛不限傖楚狡弄聲勢應有形迹專行權利又無贓賄反覆脣齒之間未審悉與誰言傾動頰舌之內不容都無彼此但聖主膺教實所沐浴自上甘露頌及銀甕啓三日詩序接虜使語辭竭思稱揚得非誹謗且王公百司唯賢是與高下之敬等秩有差不敢踰濫豈應訿毁因才分本劣謬被策用悚怍之情夙宵兢惕未嘗誇示里閭彰曝逺邇自循自省並愧流言良由緣淺寡虞致貽囂謗伏惟明皇臨宇普天蒙澤戊寅赦恩輕重必宥首日曠期始蒙旬日一介罪身獨嬰憲劾若事實有徴爰對有在九死之日無恨泉壤策問永明九年策秀才文五首問秀才高第明經朕聞神靈文思之君聰明聖德之后體道而不居見善如不及是以崆洞有順風之請華封致乘雲之拜或揚旌求士或設簴待賢用能敷化一時餘烈千古朕夤奉天命恭惟永圗審聽髙居載懷祗懼雖言事必史而象闕未針寤寐嘉猷延佇忠實子大夫選名升學利用賔王懋陳三道之要以光四科之首鹽梅之和屬有望焉又問昔周宣惰千畝之禮虢公納諫漢文缺三推之義賈生直言良以食為民天農為政本金湯非粟而不守水旱有待而無遷朕式照前經寶兹稼穡祥正而青旗肅事土膏而朱紘戒典將使杏花菖葉耕穫不愆清甽冷風述遵無廢而釋耒佩牛相沿莫反兼貧擅富浸以為俗若爰井開制懼驚擾愚民舄鹵可腴恐時無史白興廢之術矢陳厥謀又問議獄緩死大易深規敬法恤刑虞書茂典自氓俗澆弛法令滋彰胏石少不寃之民棘林多夜哭之鬼朕所以明發動容昃食興慮傷秋荼之密網惻夏日之嚴威永念畫冠緬追刑厝徒以百鍰輕科反行季葉四支重罰爰創前古訪逰禽於絶澗作霸秦基歌雞鳴於闕下稱仁漢牘二途如爽即用兼通昌言所安朕將親覽又問聚人曰財次政曰貨泉流表其不匱懋遷通其有無既龜貝積寢緡專用世代兹多銷漏參倍下貧無兼辰之業中産闕洊嵗之資惟瘼恤隱無捨矜歎上帝溥臨賜朕休寶命卬斜之谷開而出銅且有後命事兹鎔範充都內之金紹圜府之職但赤仄深巧學之患榆莢難輕重之權開塞所宜悉心以對又問治厯明時昭遷革之運改憲勑法審刑德之原分命顯於唐官文條炳於鄒説及嵎夷廢職昧谷虧方漢秉素祗之徵魏稱黃星之驗紛爭空軫疑論無歸朕獲纂洪基思𢎞至道庶令日月休徴風雨玉燭克明之旨弗逺欽若之義復還於子大夫何如哉其驪翰改色寅丑殊建别白書之永明十一年策秀才文五首問秀才朕秉籙御天握樞臨極五辰空撫九序未歌至於思政明臺訪道宣室若墜之惻每勤如傷之念恆軫故恤貧緩賦省徭慎獄幸四境無虞三秋式稔而多黍多稌不興兩穗之謡無褐無衣必盈七月之歎豈布政未優將疲民難業登爾於朝是屬宏議罔弗同心以匡厥辟又問惟王建國惟典命官上叶星象下符川嶽必待天爵具修人紀咸事然後沿才授職揆務分司是以五正置於朱宣下民不忒九工開於黃序庶績其凝周官三百漢位兼倍厯兹以降遊惰實繁若間冗畢棄則橫議無巳冕笏不澄則坐談彌積何則可修善詳其對又問昔者賢牧分陜良守共治下邑必樹其風一鄉可以為績至有旦撫鳴琴日置醇酒文而無害嚴而不殘故能出人於阽危之域躋俗於仁夀之地是以賈誼言天下之有惡吏之罪也頃深汰圭符妙簡銅墨而春雉未馴秋螟不散入在朕前湊其智略出連城守闕爾無聞豈薪槱之道未𢎞為網羅之目尚簡悉意正辭無侵執事又問朕聞上智利民不述於禮大賢強國罔圗惟舊豈非療飢不期於鼎食拯溺無待於規行是以三王異道而共昌五霸殊風而並烈今農戰不修文儒是競棄本徇末厥弊滋多昔宋臣以禮樂為殘賊漢主比文章於鄭衛豈欲非聖無法將以既道而權今欲專士女於耕桑習鄉閭以弓騎五都復而事庠序四民富而歸文學其道奚若爾無面從又問自晉氏不綱關河蕩析宋人失馭淮汴崩離朕思念舊民永言攸濟故選將開邊勞來安集加以納欵通和布德修禮歌皇華而遣使賦膏雨而懷賔所以關洛動南望之懷獯夷遽北歸之念夫危葉畏風驚禽易落無待干戈聊用辭辨片言而求三輔一説而定五州斯路何階人誰或可進謀誦志以沃朕心啓求自試啓臣聞春庚秋蟀集候相悲露木風榮臨年共悅夫惟動植且或有心況在生靈而能無感臣自奉望宫闕沐浴恩私拔迹庸虛參名盛列纓劍紫復趨步丹墀嵗時歸來誇榮邑里然無勤而官昔賢曽議不任而祿有識必譏臣所用慷慨憤悶不遑自安誠以深恩鮮報聖主難逢蒲栁先秋光隂不待貪及明時展悉愚效以酬陛下不世之仁若微誠獲信短才見序文武更法惟所施用夫君道含𢎞臣術無隱翁歸乃居中自見充國曰莫若老臣竊景前修敢蹈輕節以冒不媒之鄙式罄奉公之誠抑又唐堯在上不參二八管夷吾恥之臣亦恥之願陛下裁覽法門頌啓伏以迦文啓聖道冠百靈常住置言理髙萬乘神儀挺發非望雲就日所追睿識獨尊豈生明弱言能企鹿苑金輪𢎞汲引以濟俗鶴林雙樹顯究竟以開氓惜乎只園滅影鷲嶽淪光微辭既遙大義如綴自不宣遊十地擁按九區豈有導覺水之塞源拯法雲於落仭明公覽四諦之必空悟三業之暫有應務屈巳則仁兼旦奭隨方申道則慧一淨名驅率土於福林入蒼黔於正術謝勑賜御裘等啓雲衣降授仙裾曲委榮振素里澤駭蓬心昔漢帝解裘不獨前寵曹王褫帶復降今恩謝勑賜米啓臣無王陽之術計然之智不能負粟百里分地一㕓上虧溫養自取飢切豈悟外恩橫集天私妄委謝竟陵王示法制啓翔慧燭於昏塗灑法水於塵路至夫澄心洗纍之規莊情束影之制解網出界之訓滅惑淨照之旨固以行首霜威字端風厲信可以糟滓五書粳氛百氏升罩聃周筲竿尼旦所謂窺七澤而狹潢汙登太山而小天下謝竟陵王示扇啓竊以六翮風流五明氣重若比圎綃有兼玩實輕踰雪羽潔並霜文子淑賞其如規班姬儷之明月豈直魏王九華漢臣百綺況復動製聖衷垂言炯戒載摹聽視式範樞機謝竟陵王賜納裘啓降飾自尊埀榮及賤玄玉不純曽波奪采南陸方永北風日壯無衣無褐發念聖衷而挾纊之問每流解裘之賜偏委謝司徒賜紫鮓啓東越水羞實罄乘時之美南荆任土方挹鮓魚之最謝武陵王賜弓啓殿下摛藻蕙樓暢藝蘭苑敷積玉於風筵疊連珠於月的兔圍掩秀鄴水慚竒融揖讓未工濫陪升飲之賞操弧反正繆奉招賢之錫文韜鏤景逸幹捎雲玩溢百齡佩流千載謝安陸王賜銀鉢啓素金之貴有訪仙經鐫刻可竒見符神鼎撤膳器於珍羞之席降寶玩於簞瓢之門書為竟陵王與隱士劉虬書玉燭登年金商在律炎涼始貿動靜惟安勤味道腴幸遵雅尚豈不樂哉僕誠幸甚百姓一心衆生不疾比屋可封將又何求但良書獨擁善談無析願言之子實痗我心所以不逺千里尺書道意自淳清既辨澆漓代襲隱顯之術參差默語之途紛互或飾智以警愚或激情以悟俗或穢巳以暗通或謬歌以明道屠牛駔馬未足磷其堅佯狂如愚豈能緇其白官楚蕃魏人外之氣逾邈入漢遊梁區中之韻彌少及推其輕重品其得失則淵懷洞賞寧或符之僕夙養間襟長慕出槩迹塵圭組心逸江湖未面自親聞風如舊而回駕之念徒軫式閭之禮無階固巳佇軸深衷傾筐遐路者矣君矯然獨逺確乎難拔素志與白雲同悠髙情與青松共爽宣習質文緇林枯而重䓲昭辨空有連河壅而復滔所謂忘言之人可論天人之際豈能鳯舉鶴翻有心儀羣髙踰愛海比策禪衢沾濠射之冥遊屈祇鷲之法侣闡三乘於窮子發二諦於困蒙有是因也何其暢歟今皇風具穆至道𢎞被四海不溢五嶽無塵膠序肇修經法敷廣人賤璣璜家習禮讓樵蘇必時郊林全鬱罿網有節鱗羽偕翔至於層山絶澗還帶畿畎膏田沃野亘望廡㕓信可以招往隱淪栖集勝寄故文舉築室治城之阿次宗植援西山之趾葛洪考槃於海岫釋逺肥遁於鍾幽每踐其遺蹤輒深九原之歎若髙步可遷復何懷乎四子昔宣尼之見伯雪師利之往維摩豈不知相忘之道哉諒有以也未敘之間為道自愛一二令凌琚之口具序三月三日曲水詩序臣聞出豫為象鈞天之樂張焉時乘既位御氣之駕翔焉是以得一奉宸逍遙襄城之域體元則大悵望姑射之阿然窅眇寂寥其獨適者巳至如夏后兩龍載驅璿臺之上穆滿八駿如舞瑤水之隂亦有饗云固不與萬民共也我大齊之握機創厯誕命建家接禮二宫考庸太室幽明獻期雷風通饗昭華之珍既徙延喜之玉攸歸革宋受天保生萬國度邑靜鹿丘之歎遷鼎息大坰之慙紹清和於帝猷聨顯懿於王表駿發開其逺祥定爾固其洪業皇帝體膺上聖運鍾下武冠五行之秀氣邁三代之英風昭章雲漢暉麗日月牢籠天地彈壓山川設神理以景俗敷文化以柔逺澤普汜而無私法含𢎞而不殺猶且具明廢寢昃晷忘餐念負重於春氷懷御奔於秋駕可謂巍巍弗與蕩蕩誰名秉靈圗而非泰涉孟門其何險儲后睿哲在躬妙善居質內積和順外發英華斧藻至德琢磨令範言炳丹青道潤金璧出龍樓而問豎入虎闈而齒胄愛敬盡於一人光耀究於四海若夫族茂麟趾宗固磐石跨蹍昌姬蹈軼炎漢元宰比肩於尚父中鉉繼踵乎周南分陜流勿翦之歡來仕允克施之譽莫不如圭如璋令聞令望未茀斯皇室家君王者也本枝之盛如此稽古之政如彼用能免羣生於湯火納百姓於休和草萊樂業守屏稱事引鏡皆明目臨池無洗耳沈冥之怨既缺薖軸之疾巳消興廉舉孝嵗時於外府署行議年日夕於中甸協律總章之司序倫正俗崇文成均之職導德齊禮挈壺宣夜辨氣朔於靈臺書笏珥彤紀言事於仙室褰帷斷裳危冠空履之吏彯搖武猛扛鼎揭旗之士勤恤民隱糾逖王慝射集隼於髙墉􅌳大風於長隧不仁者逺惟道斯行讒莠蔑聞攘爭掩息稀鳴桴於砥路鞠茂草於圜扉耆年闕市井之遊稚齒豐車馬之好宫鄰昭泰荒憬清夷侮食來王左言入侍離身反踵之君髽首貫胸之長屈膝厥角請受纓縻文鉞碧砮之琛竒幹善芳之賦紈牛露犬之玩乘黃兹白之駟盈衍儲邸充牣郊虞匭牘相尋鞮譯無曠一尉候於西東合車書於南北暢轂埋轔轔之轍緌旌卷悠悠之斾四方無拂五戎不距偃革辭軒銷金罷刃天瑞降地符升澤馬來器車出紫脫華朱英秀佞枝植厯草滋雲潤星暉風揚月至江海呈象龜龍載文方握河沈璧封山紀石邁三五而不追踐八九之遙迹功既成矣世既貞矣信可以優遊暇豫作樂崇德者歟于時青鳥司開條風發嵗粵上斯巳惟暮之春同律克和樹草自樂禊飲之日在兹風舞之情咸蕩去肅表乎時訓行慶動於天矚載懷平圃乃眷芳林芳林園者福地奧區之湊丹陵若水之舊殷殷均乎姚澤膴膴尚於周原狹豐邑之未宏陋譙居之猶褊求中和而經處揆景緯以裁基飛觀神行虛簷雲構離房乍設層樓間起負朝陽而抗殿跨靈沼而浮榮鏡文虹於綺疏浸蘭泉於玉砌幽幽叢薄秩秩斯干曲拂邅回潺湲徑復新萍泛沚華桐發岫雜夭采於柔荑亂嚶聲於綿羽禁軒承幸清宫俟宴緹帷宿置帟幕宵懸既而滅宿澄霞登光辨色式道執殳展軨效駕徐鑾警節明鐘暢音七萃連鑣九斿齊軌建旗拂霓揚葭振木魚甲煙聚貝胄星羅重英曲瑵之飾絶景追風之騎昭灼甄部駔駿函列虎視龍超雷駭電逝轟轟隱隱紛紛軫軫羌難得而稱計爾乃回輿駐罕嶽鎮淵停睟容有穆賔儀式序授几肆筵因流波而成次蕙肴芳醴任激水而推移葆佾陳階金匏在席戚奏翹舞籥動邠詩召鳴鳥於弇州追伶倫於嶰谷發參差於王子傳妙靡於帝江清歌有闋羽觴無算上陳景福之賜下獻南山之夀信凱宴之在藻知和樂於食革桑榆之隂不居草露之滋方渥有詔曰今日嘉會咸可賦詩凡四十有五人其辭云爾頌淨行頌三十一首皇覺辨德篇頌紫實昧朱狂斯濫哲舛徑揚鑣分源競枻麗景或幽澄舒每缺水激波生煙深火滅情端徒總理向空徹不有明心誰驅聖轍開物歸信篇頌生浮命舛識罔情違業雲結影慧日潛暉逶迤修道極夜無歸登山小魯泛海難沂參珉見璧辨礫知璣迷其未逺匪正何依滌除三業篇頌樂由生滅患以身全業資意造事假言詮利名畢倚榮辱兹纒燕驥匪躡周鍇徒鐫惑端風緒愛境旌懸不勤一至何階四禪修理六根篇頌傾都麗佳繞梁之曲肥馬輕裘蕙肴芳醁晦黑滋生昏嚚競欲貌蕩魂浮身甘意觸靈龜攝根晴葵衛足蟲草或虞人如不勗生老病死篇頌穠華易遷繁蕉不實星髮鮐肌鄰光愒日二豎潛言十巫空術生之往矣髙松蕭瑟即化翻靈從緣墜質噬臍有譏嗟然何汨尅責身心篇頌瞻彼進德莫敢或遑顧咨小智徒以大康豈無通術跋此榛荒雖有重離迹照螢光循情內負撫事外傷層羅一舉空念髙翔檢覆三業篇頌渾風緬沒旅俗膠加競文內疾誰靦心瑕再惟情反三省身華貴危窮濫貧懾豪奢邅回六蔽紛綸七邪不圗厥始逸馬難罝訶詰四大篇頌迅矣百齡綿兹六入出沒昏疑興居愛習矻矻子求營營爾給匪德日歸惟殃斯集貪人敗類無厭自及昭回不希玄墟何泣出家順善篇頌澡身浴德晦迹埋名將安寶地誰留化城道場曠謐禪徑間清風瓢弗響震㬚徒驚嘯傲焉慮脫落何營長捐有結永置無生在家從惡篇頌石磨則磷玉生雖堅維居必徙豈曰能賢氷開春日蘭敗秋年教隨類反習乃情遷命符三漏生偕十纒兹焉遂往憂畏方延沈冥地獄篇頌冥津殊復曉髙聽亦能卑隂牆雖兩密幽夜有四知炎山翻烈火氷澗匝寒澌羅城振雲幕鋒樹鬱霜枝茹荼非云苦集木豈稱危求仁曽巳得長歎欲何為出家懷道篇頌韞石諒非真飾瓶信為假竊服臯門上濫吹溜軒下鳯祀徒驚心騶交終好野實相豈或照浮雲未能捨迹殊冠冕客事襲馳驅者巳矣歇鄭聲無然亂周雅在家懷善篇頌處塵貴不染被褐重懷珠美玉曜幽石曽蘭挺叢芻四氏不為侣三界豈能渝諒兹親愛染寧以財利拘煩流捨智寶榛路坦夷途萬物竟何匹烈火樹紅芙三界內苦篇頌心怨動紛繞情怡輒遷互歡愛一離逺傷憂坐衰暮連幌結清隂髙臺起風露腐毒緣芳旨夭伐實修嫭欲網必虧生繁罝或全兔眇眇夜何期悠悠終肯悟出三界外樂篇頌端襟測煩海矯步寫埃氛三受猶絶雨入苦若浮雲輸心仰圎極罄質委方墳朝逰淨國侣暮集靈山羣燈祗開逺照香字薦嘉薰俯首睇人俗信矣靜為君斷絶疑惑篇頌生塗非一理識緒固饒津徒駭東陵富空嗟北郭貧國生曾已戾顔氏信為仁逢尤昭往業習善會兹身勤憂永夷泰晏安終苦辛令名且云重豈若樹良因十種慚愧篇頌神膏施惟重玄酒恩未隆明璣隋水上潤玉藍田中稟天性所極資敬道攸崇羽毛共以勢輪軌相為通報德愴前雅酬言愛餘風遵途每多舛顧省能無忡極大慚愧篇頌冬狐理豐毳春蠺緒輕絲形骸翻為阻心識還自欺華容羈丱日生平少年時驅車追俠客酌酒弄妖姬但念目前好安知身後悲惕然一以愧永與情愛辭善友奬勸篇頌蘭室改蓬心栴崖變伊草丹青有必渝絲皪豈常皓曲且繩直詭木遂雕藻一簣或成山百里倦中道隆漢乃王臣失楚信元保勉矣德不孤至言匪虛造戒法攝心篇頌金山嚴寶仞瓊畹烈瑤荑牆狐議不窟簷燕豈能棲淨花莊思序慧沼盥身倪六羣倘未一七衆固恆齊端儀有直景正道無傾蹊維宫超以悟襄野竟何迷自慶畢故止新篇頌春非我春秋非秋一經長夜每悠悠陶形練氣住元造啓蒙夷阻出重幽榮公三樂非為曠箕子五福豈能求靈姿妙境往難集微言至道此云修年逢生幸曽以慶盈愆二過倘知憂畢故斷新别苦海希賢庶善憑智流大忍惡對篇頌春山之下玉抵禽漢水之陽璧千金清業神居德非重潔巳愚侣道巳深愛憎喜怒生而習榮華芳旨世所欽鴻才巨力萬夫敵誰肯制此方寸心逸驥狂兕獷不御繁羈密柙儻能禁遣情遺事復何想寂然無待恣幽尋緣境無礙篇頌恍象惚物終不名龍舉鸞集竟誰辨絶智亡身孰為礙韜名戢曜故能顯匪日匪月灼以懸安飛安翔虛而踐璧石無間恣出沒水火有性任舒卷敷教應俗驚泉流現迹依方迅風轉大哉超世莫與羣希轅慕舜宜自勉一志努力篇頌豫北二山尚有移河中一洲亦可為精誠必至霜塵下意氣所感金石離有子刺掌修名立王生擢髮美譽埀自來勤心少騫墜何不努力出憂危勝幡法鼓縈且擊智師道衆紛以馳有常無我儼既列無明有縛孰能窺禮舍利寶塔篇頌越人鑄金誠有思魏后粧木亦云悲中賢小節猶可戀去聖彌逺情彌滋祇樹蕭條多宿楚王宫寂寞鮮遺基設像居室若有望間儀駐景曖如之連卿共日獨先後道悠命乖將無時傾懷結想惻以慕乖靈寫照拂塵疑敬重正法篇頌出不自戶將何由行不以法欲焉修之燕入楚待駿足陵河越海寄輕舟仁言為利壯巳博聖道𢎞濟邈難求通明洞燭煥曽景深凝廣潤湛淵流翼善開賢敷教義照蒙啓惑滌煩憂功成弗有名弗居淡然無執與化遊奉養僧田篇頌五玉巳潤談而信八桂雖芳風乃掃妙理至言唯聖寶不自伊人孰𢎞道照空觀法識遷流撫俗瞻光厭生老絶滅情嗜斷歡怡縱落豪華棄雕藻親愛倐忽信風煙財利悠悠若塵草測以龍雲豈曰髙濯足江漢更慚皓勸請增進篇頌俟河之清逢聖朝靈智俯接一其遙白日馳光不流照葵藿微志徒傾翹遍盈空有盡三界綿塞宇宙罄入遼德光業逺升至覺寂寞常住獨能超煎灼欲火思雲露沈汨使水望舟橋𢎞慈廣度昔有誓法輪道御且徐鑣隨喜萬善篇頌聞善若已燭良書見賢思齊美通誥感幽動地孝有誠殞首流腸忠為操振禮摛文𢎞憲則機謀飈勇靜姦暴明白入素志沖聞髙論窮微契神奧捐軀濟物不邀名輕財貴義豈期報百行萬善紛塗軌求誠罄想畢歡蹈回向佛道篇頌悠悠九土各異形擾擾四俗非一情驅車秣馬徇世業市交鬻義衒虛名三墨紛紛殊不會七儒委鬱曽未并吉凶拘忌乃數術取與離合實縱橫朝日夕月竟何取投巖赴火空捐生咄嗟失道爾回駕沔彼流水趣東瀛發願莊嚴篇頌心所期兮彼之岸何事浮俗久淹逭照慧日兮駕法雲騰危城兮出塵館芳珠燁兮聞嵗時寶樹飀兮警昏旦清露漙甘永以挹喜園流采常為玩無待殷鼎方丈羞安用秦筝纎指彈勒誠欵願長不渝習苦塵勞從此捍哀䇿文皇太子哀䇿文繡幕啓塗銅池從殯葆鐸既行枚綍且引皇帝痛粢盛之闕奉哀匕鬯之有亡憫含嗟乎崇正顧掩欷於承光式眷元良永懷人寶俾兹史策載餘風道其辭曰居辰北極在日重離誕惟妙善克自生知資神為契合聖如規地維缺位月紀愆期哀纒晦朔燧改嵗時饘粥不溢薑桂無滋俯終心禮昌我帝基思皇下武纘戎上德將叶人神永貽家國用稽嗣典實𢎞儲則庸器改物徽號崇名往辭緑蓋來馭朱纓旗旗旖旎鸞纛聲明守器宣華訪安永福上漏驂軒初晨戒服慶色伊滿夤儀載肅至誠莫感遐福空辭氛程月志祲動年司素妭犯列青雲失滋中楹軫夢當户陳詩楚藥毁方秦醫反轍髙議虛演竒文徒説逺賔上靈長違昭世痛結宸慈哀震華棣嗚呼哀哉軒帷髙寂庭帳深隂鶴關晝掩鳬燈夜沈仍襲未改客饌如臨曖徽儀而可慕標嗣子之純心嗚呼哀哉韋辨告期麻衣請日辨域展圗揚龜獻吉文物充階具僚在側總葭挽之哀淒視風煙之騷瑟嗚呼哀哉飾麾輅而南指轉旌羽而北徂車結軫於雕轂馬緩節於金蘇寄靈心於萬象增戀戀於國都嗚呼哀哉光徙靡而欲沈山荒涼而遂晚城闕緬而何期平原忽而超逺情有望而弗追顧如疑於將反嗚呼哀哉墓銘豫章王墓銘領袖傾淪人綱弛沒半嶽摧峯中河墜月眷然曉隧如何夜臺鯨驂枕慕葆吹徘徊千秋萬祀顧有餘哀永嘉長公主墓銘作儀邦媛取儷漢妃相金陋質穠李慚輝肅穆婦容靜恭女德顧史求針披圖問則慶善郁夷與仁𡨕默宵燧亡明曉挽巳聲松門嚴濶泉帳寒清悠哉白日鬱彼佳城樂府齊明王歌辭七首應司徒教作以下五言明王曲明王日月照至樂天地和幸息雲門吹復歇咸池歌桂序金匏轉瑤軒絲石羅朱騏步躑躅玄鶴舞蹉跎露凝嘉草秀煙度醴泉波皇基方萬祀齊民樂如何聖君曲聖君應昌厯景祚啓休期龍樓神睿道兔園仁義基海蕩萬川集山崖百草滋盤苗成萃止渝韎異來思清明動離軫威惠被殊辭大哉君為后何羡唐虞時渌水曲湛露改寒司交鶯變春旭瓊樹落晨紅瑤塘水初淥日霽沙溆明風泉動華矚遵渚泛蘭觴乘漪弄清曲斗酒千金輕寸隂百年促何用盡歡娛王度式如玉採菱曲炎光銷玉殿涼風吹鳯樓雕輜一作青輅傃平隰朱棹泊安流金華妝翠羽鷁首畫飛一作龍舟荆姬採菱曲越女江南謳騰聲翻葉靜散響谷雲浮良時時一遇佳人難再求清楚引平原數千里飛觀鬱岧岧清月冏將曙晧露零中宵轉葉度沙海别羽自氷遼四靣通寒色左右竟嚴飈崤澠多榛梗京索久塵苗逝將憑神武奮劍蕩遺妖長歌引周雅聽休明齊德覯升平紫煙四時合黃河萬里清翠柳蔭通街朱闕臨髙城方轂雷塵起接袖風雲生酣笑爭日夕絲管互逢迎徂年無促慮長歌有餘聲散曲金枝湛明燎繡幕裂芳然層閨橫緑綺曠席緬珠躔楚調廣陵散瑟柱秋風弦輕裙中山麗長袖邯鄲妍徐歌駐行景迅節渙浮煙言願聖明主永永萬斯年三婦艷詩大婦織綺羅中婦織流黃小婦獨無事挾瑟上髙堂丈人且安坐調弦詎未央青青河畔草容容寒煙起翹翹望行子行子殊未歸寤寐君一作若容輝夜中心愛促覺後阻河曲河曲萬里餘情交襟袖疏珠露春華返璿霜秋照一作桂晚入室怨蛾眉情歸為誰婉同沈右率諸公賦鼓吹曲二首巫山髙諸公詩别見謝沈二集此不載想像一作髣佛巫山髙薄暮陽臺曲煙霞乍舒卷蘅芳自斷續彼美如可期寤言紛在矚憮然坐相思秋風下庭緑芳樹相望早春日煙華雜如霧復此佳麗人含情結芳樹綺羅巳自憐暄風多有趣去來徘徊者佳人不可遇臨髙臺逰人欲騁望積步上髙臺井蓮當夏吐窗桂逐秋開花飛低不入鳥散逺時來還看雲棟影含月共徘徊望城行金城十二重雲氣出表裏萬户如不殊千門反相似車馬若飛龍長衢無極巳簫鼓相逢迎信哉佳城市法樂辭十二首天長命自短世促道悠悠禪衢開逺駕愛海亂輕舟纍塵曽未極心樹豈能籌情埃何用洗正水有清流右歌本起百神肅以虔三靈震且越恆曜掩芳宵薰風動蘭月丹榮藻玉墀翠羽文珠闕皓毳非虛來交輪豈徒發右歌靈瑞韶年春巳仲明星夜未央千祀鍾休厯萬國會嘉祥金容涵夕景翠鬢佩晨光表塵維淨覺泛俗乃輪皇右歌下生襲氣變離宫重柝驚層殿曼響感心神修容轉歡宴生老終巳縈死病行當薦方為淨國逰豈結危城戀右歌在宫春枝多病夭秋葉少欣榮心骸終委滅親愛暫平生長風吹北隴迅瀑急東瀛知三既情暢得一乃身貞右歌四遊飛策辭國門端儀偃郊樹慈愛徒相思閨中空戀慕夙𨽻乘往塗駿足獨歸路舉袂謝時人得道且還去一作顧右歌出國明心𢎞十力寂慮安四禪青禽承逸軌文驪一作鑣鏡重川鷲巖標逺勝鹿野究清玄不有希世寶何以導濛泉右歌得道亭亭雙月流朏朏晨霜結川上不徘徊條間亟渝滅靈知湛常然符應有盈缺感運復來儀且厭人間世音泄右歌雙樹春山玉所府檀林芳所棲引火歸炎燧挹水自清隄菴園無異轍祇館有同躋比肩非今古接武豈燕齊右歌賢衆昔余輕嵗月兹也重光隂閨中屏鉛黛闕下挂纓簪禪恱兼芳旨法言戀一作忘清琴一異非能辨寵辱誰為心右歌學徒峻宇臨層穹岧岧疏逺風騰芳清漢裏響梵高雲中金華紛苒若瓊樹鬱青蔥貞心延淨境邃業嗣天宫右歌供具影響未嘗隔晦明殊復親𢎞慈邈已逺睿后扇髙塵區中禔景福宇外沐深仁萬祀留國祚億兆慶唐民右歌福應少年子聞有東方騎遙見上頭人待君送客返桂叉當自陳江臯曲林斷山更續洲盡江復開雲峯帝鄉起水源桐柏來思公子春盡風颯颯蘭凋木修修王孫久為客思君徒自憂王孫逰玉臺作春逰置酒登廣殿開襟望所思春草行巳歇何事久佳期陽翟新聲隋書翟作澤懷春發下蔡含笑向陽城恥為飛雉曲好作鵾雞鳴永明樂十首玄符昭景厯茂實偶英聲長為南山固永與朝日明靈丘比翼棲芳林合條起兩代分憲章一朝會書軌二難金玉相三衮蘭蕙芳重儀文世子再奉東平王空谷返逸驂隂山響鳴鶴振玉屣丹墀懷芳步青閣崇文晦巳明膠庠雜復整弱臺留折巾沂川詠芳頴定林去喧俗鹿野出埃霞香風流梵琯澤雨散雲花楚望傾澠滌日館仰鑾鈴巳睎五雲發方照兩河清幸哉明盛世壯矣帝王居髙門夜不柝飲帳曉長舒總棹金陵渚方駕玉山阿輕露炫珠翠初風搖綺羅西園抽蕙草北沼掇芳蓮生逢永明樂死日生之年奉和秋夜長玉臺作秋夜秋夜長夜長樂未央舞袖拂花燭歌聲繞鳯梁代五雜組五雜組慶雲發往復還經天月不獲巳生胡越奉和兩頭纎纎曲兩頭纎纎綺上紋半白半黑鷦翔羣腷腷膊膊烏迷曛磊磊落落玉石分詩贈族叔衛軍台曜澄華鉉嶽裁峻經天為象麗地作鎮不器其德有斐斯文質超瑚璉才逸卿雲搖筆泉㵼動詠霙紛德聲伊何如蘭之宣貞筠抽箭潤璧懷山六樂畢該五禮備貫七訓是敷三英有粲惟旦惟公惟公惟旦從武帝琅琊城講武應詔治兵聞魯策訓旅見周篇教民良不棄任智理恆全白日映丹羽頳霞文翠旃淩山炫組甲帶水被戈船凝葭鬱摧愴清管乍聨綿早逢文化洽復屬武功宣願陪玉鑾右一舉掃燕然棲玄寺聽講畢逰邸園七韻應司徒教道勝業兹逺心間地能隟桂橑鬱初裁蘭墀坦將闢虛簷對長嶼髙軒臨廣液芳草列成行嘉樹紛如積流風轉還徑清煙泛喬石日汨山照紅松映水華碧暢哉人外賞遲遲眷西夕雜體報范通直和璧荆山下隋珠漢水濵無雙自昔代有美今為鄰三楚多秀士江上復才人緯蕭非善賈聖德可名臣追飛且學步共子奉清塵紫庭風日好青槐枝葉新徘徊吹樓側欲見心所親峛君蘭蕙草何用以書紳别蕭咨議徘徊將所愛惜别在河梁襟袖三春隔江山千里長寸心無逺近邊地有風霜勉哉勤嵗暮敬矣事玉臺作慎容光山中殊未懌杜若空自芳寒晚敬和何徴君點疏酌候冬序間琴改秋律如何將暮天復值西歸日搖落迎軒牖飛鳴亂繩蓽煙灌共深隂風篁兩蕭瑟虛堂無笑語懷君首如疾早輕北山賦晚愛東臯逸上德可潤身下澤有徐轡叶音必和王友德元古意二首逰禽暮知返行人獨未歸坐銷芳草氣空度明月輝顰容入朝鏡思淚點春衣巫山彩雲沒淇上緑楊稀待君竟不至秋鴈雙雙飛霜氣下盟津秋風度函谷念君淒以寒當軒卷羅縠纎手廢裁縫曲鬢罷膏沐千里不相聞寸心鬱紛藴平聲況復飛螢夜木葉亂紛紛奉和竟陵王郡縣名追芳承荔浦揖道訊虛丘升裾臨廣牧從雲盡平洲曽山臨翠坂方渠緬清流陽臺翻早茂隂館懷名秋嵗宴東光弭景仄西華收端溪慙昔彥測水謝前修往食曲阜盛今屬平臺逰燕棠缺初雅鄭衮息遺謳久傾信都美乃結茂陵儔河間誠可詠南海果難逰逰仙詩五首桃李不奢年桑榆多暮節常恐秋蓬根連翻因風雪習道遍槐岻追仙度瑤碣緑帙啓真詞丹經流妙説長河且巳縈曾山方可礪叶音列獻嵗和風起日出東南隅鳯旍亂煙道龍駕溢雲區結實自員嶠移宴乃方壺金巵浮水翠玉斚挹泉珠徒用霜露改終然天地俱命駕瑤池隈過息嬴女臺長袖何靡靡簫管清且哀璧門涼月舉珠殿秋風回青鳥騖髙羽王母停玉杯舉手暫為别千年將復來湘沅有蘭芷曰吾欲南征遺珮出長浦舉袂望增城朱霞拂綺樹白雲照金楹五芝多秀色八桂常冬榮弭節且夷與參差聞鳯笙命駕隨所即燭龍導輕鑣沙澤振寒草弱水駕冰潮逺翔馳聲響流雪自飄颻忽與若士遇長舉入雲霄羅繹徒有晲蟭螟已寥寥春逰回文詩枝分柳塞北葉暗榆關東垂條逐絮轉落蕊散花叢池蓮照曉月幔錦拂朝風低吹雜綸羽薄粉艷粧紅離情隔逺道歎結深閨中侍逰方山應詔巡躅望登年帳飲臨秋縣日羽鏡霜潯雲旗落風甸四瀛良在目八宇宛如見小臣竊自嘉預奉柏梁宴奉辭鎮西應教未學謝能算髙義幸知逰霤庭參辨奭梁苑豫才鄒徘徊嵗光晚搖落江樹秋風旗縈别浦霜琯迾遙洲餞謝文學離夜所知共歌笑誰忍别笑歌離軒思黃鳥分渚薆青莎翻情結逺斾灑淚與行波春江夜明月還望情如何和南海王殿下詠秋胡妻七首日月共為照松筠俱以貞佩紛甘自逺結鏡待君明且協金蘭好方愈琴瑟情佳人忽千里幽閨積思生景落中軒坐悠悠望城闕髙樹升夕煙層樓滿初月光隂非或異山川屢難越輟泣掩鉛姿搔首亂雲髮傾魄屬徂火搖念待方秋涼氣承宇結明熠傃階流三星亦虛映四屋慘多愁思君如萱草一見乃忘憂杼軸鬱不諧契濶彌新故朔風櫩上發寒鳥林間度客逺乏衣裘嵗晏饒霜露參差興别緒依遲起離慕願言如可信行邁亦云反睇景不告勞瞻途寧遽逺何以淹歸轍蠶妾事春晚送目亂前華馳心迷舊婉椒珮容有結振芳跂路隅黃金徒以賦白圭終不渝明心良自皎安用久踟蹰遄車反枌巷流日下西虞披帷悵有望出門遲所欲彼美復來儀慙顔變欣矚蘭艾隔芳臭涇渭分清濁去去夫人子請殉川之曲琵琶同賦諸公别見抱月如可明懷風殊復清絲中傳意緒花裏寄春情掩抑有竒態悽鏘多好聲芳袖幸時拂龍門空自生詠幔古文苑作謝朓幸得與珠綴羃䍥君之楹月映不辭卷風來輒自輕每聚金爐氣時駐玉琴聲但願置尊酒蘭缸當夜明藥名重臺信嚴敞陵澤乃間荒石蠶終未繭垣衣不可裳秦芎留近詠楚蘅搢逺翔韓原結神草隨庭銜夜光星名眇歎屬辰移端憂臨嵗永久慙入漢客每愧遵河影仙羽誠不退蓬襟良未整誰謂無正心大陵有霜穎奉和月下雕雲度綺錢香風入珠網獨知此夜月依遲慕神賞詠池上梨花翻階沒細草集水間疏萍芳春照流雪深夕映繁星詠梧桐騫鳯影層枝輕虹鏡展緑豈斁龍門幽直慕瑤池曲詠女蘿羃䍥女蘿草蔓衍旁松枝含煙黃且緑因風卷復垂移席琴室應司徒教雪崖似留月蘿徑若披雲潺湲石溜寫綿巒山雨聞抄衆書應司徒教説禮固多才惇詩信為善巖笥發仙華金縢開碧篆自君之出矣自君之出矣芳藇絶瑤巵思君如形影寢興未曽離自君之出矣金爐香不然思君如明燭中宵空自煎擬古二首花蒂今何在亦是林下生何當垂雙髻團扇雲間明鏡臺今何在寸身正相隨何當碎聨玉雲上璧巳虧四色詠赤如城霞起青如松霧徹黑如幽都雲白如瑶池雪離合賦物為詠冰容慙逺鑒水質謝明暉是照相思夕早望行人歸火雙聲詩園蘅眩紅花湖荇燡黃華回鶴橫淮翰逺越合雲霞聨句阻雪連句遙贈和積雪皓隂池北風鳴細枝九逵密如繡何異逺别離謝朓風庭舞流霰冰沼結文澌飲春雖以燠欽賢紛若馳江秀才革珠霙條間響玉溜簷下垂杯酒不相接寸心良共知王丞融飛雲亂無緒結冰明曲池雖乖促席宴白首信勿虧王蘭陵僧孺飄素瑩簷溜巖結噎通歧樽罍如未浣況乃限音儀謝洗馬昊原隰望徙倚松筠竟不移隱憂恧萱樹忘懷待山巵劉中書繪初昕逸翮舉日昃駑馬疲幽山有桂樹嵗暮方參差沈右率約漢魏六朝百三家集卷七十六
