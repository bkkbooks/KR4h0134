body:
  text: 漢魏六朝百三家集卷九十九庾肩吾集題詞庾幼簡志性恬靜風齊臺尚長子子貞孝感北辰次子介清重洗馬一家行義誠足與劉子圭明休烈同傳子慎後出文采尤髙子山繼之宫體競貴豫每讀八關齋夜賦詩深羡少庶府君能陪帝子又怪一時彥聚城門髙唱何偏以病老死沙門為題臺城不祥若有先讖焉子慎避難入東後始還家遺文鮮少唐李長吉所為作還自會稽歌以補其悲也南史又云宋子仙破會稽購得子慎欲殺之賴作詩以免夫髙齋抄撰龍樓應教學士職也亡命江海文焉有罪猶借資七步幸脫劒鋩盜亦能憐才士哉東宫賞遇時共聨詠湘東志墓稱為瑚璉其知子慎實深論文一書謂有踦跖必不然矣書品序論王光祿答齊太祖類也若在梁時則與鍾仲偉詩評同行天壤乎目録表為寧國公讓中書表為南康王讓丹陽尹表章為武陵王拜儀同章啓謝厯日啓謝賚銅硯筆格啓謝賚粳米啓謝賚菱啓謝賚梨啓謝賚橘啓謝賚林檎啓謝賚朱櫻啓謝賚檳榔啓謝東宫賚檳榔啓謝東宫賚米啓謝東宫賚粟啓謝東宫賜宅啓謝東宫示古迹啓謝東宫賚內人春衣啓謝湘東王賚米啓答湘東王賚粳米啓謝湘東王賚米啓謝湘東王賚柑啓答武陵王賚絹啓謝武陵王賚白綺綾啓答陶隱居賚术煎啓答陶隱居賚术蒸啓答餉綾紋啓謝炭啓序書品序書品後序論書品論一書品論二書品論三書品論四書品論五書品論六書品論七書品論八書品論九銘團扇銘玉帳山銘樂府長安有狹斜行賦得有所思有所思洛陽道賦得橫吹曲長安道愛妾換馬隴西行未央才人歌詩侍宴應令侍宴宣猷堂應令侍宣猷堂宴湘東王應令侍宴餞湘州刺史張纘侍宴餞張孝總應令三日侍蘭亭曲水宴九日侍宴樂遊苑應令從皇太子出玄圃應令奉和泛舟漢水往萬山應教山池應令奉使北徐州參丞御和衛尉新渝侯巡城口號遊甑山蔬圃堂應詔尋周處士𢎞讓賦得嵇叔夜和太子重雲殿受戒詠同泰寺浮圖和簡文帝奉和賽漢髙廟亂後經夏禹廟亂後行經吳郵亭經陳思王墓過建章故臺和劉明府觀湘東王書和竹齋從駕喜雨奉和春夜應令奉和武帝苦旱奉和太子納涼梧下應令芝草詠美人送别於建興苑相逢侍宴侍宴餞湘東王應令餞張孝總應令侍宴餞東陽太守蕭子雲和晉安王薄晚逐涼北樓回望應教贈周處士新林送劉之遴奉使江州舟中七夕南苑看人還詠美人看畫應令奉和藥名詩看放市和望月和徐主簿望月詠風詠雪花春日七夕歲盡應令賦得山同蕭左丞詠摘梅花和晉安王詠燕詠胡牀應教暮遊山水應令賦得磧字奉和湘東王應令二首春宵冬曉詠簾燕奉賀便省餘秋被使從渡江登城北望道館賦得轉歌扇詠舞詠舞曲應令詠主人少姬應教詠長信宫中草石崇金谷妓逺看放火舟中寒望石橋詠桂賦得池萍新苔被執作詩三日侍宴詠曲水中燭影聨句曲水聨句八關齋夜賦四城門更作四首第一賦韻東城門病南城門老西城門死北城門沙門第二賦韻東城門病南城門老西城門死北城門沙門第三東城門病南城門老西城門死北城門沙門第四東城門病南城門老西城門死北城門沙門漢魏六朝百三家集卷九十九目録欽定四庫全書漢魏六朝百三家集卷九十九明張溥輯庾肩吾集表為寧國公讓中書表臣聞陟彼太行伯后之車屢怠望兹吳坂少遊之馬難躋是知美非流水立致摧轅駿靡浮雲便期頓轡起登天漢寧培九萬之風坐濟星橋非使千年之翼豈有幼稱辨慧足對元禮弱標俊頴能嘲子叔玉重組長空見休寵深宫邃宇孰知懷憂為南康王讓丹陽尹表臣聞劍鏤七星非有司天之用簾圖五嶽寧識崇朝之雲是知策彼泥龍不能令其逐日乘斯流馬安可使其奔電方今振鷺盈庭白駒空谷惟帝念功惟明克允君子之國幸聞其讓石門之水獲免于貪章為武陵王拜儀同章臣宅慶紫霄聯休皇極地均指日既無迹而成髙仕若乘風故不行而自逺今者四郊無壘天下同文都尉春田猶居塞外單于冬獵不入漁陽臣坐牧三邉非勞士戰豈能屯兵大夏封萬里之矦飛箭遼城受千金之夀論其才望有懼茂𢎞先佩印綬常差叔度啓謝厯日啓凌渠所奏弦望既符鄧平之言錙銖皆合登臺視朔覩雲物之必書拂管移灰識權衡之有度初開卷始暫謂春留未覽篇終便傷冬及裴回厚渥比日為年謝賚銅硯筆格啓煙磨青石巳踐孔氏之壇管插銅龍還笑王生之璧西域胡人卧織成之金簟遊仙童子隱芙蓉之行鄣莫不並出梁園來頒狹室謝賚粳米啓出梁國之闕租兼水陸之殊品伊尹説而不至石崇豪所未及遇處默之得賔同苻朗之舉著長河可塞上德無酬謝賚菱啓上林紫水雜蕰藻而俱浮雲夢清池間芙蓉而外發珍踰百味來薦畫盤恩重千金遂沾菲席凌霜朱橘愧此開顔含露蒲桃慙其不䬼謝賚梨啓睢陽東苑子圍三尺新豐箭谷枝懸六斤未有生因粉水産自桐丘影連鄧橘林交苑柿逺薦中厨爰頒下室事同靈棗有願還年恐似仙桃無因留核謝賚橘啓光分璇宿影接銅峰去青鳥之迢遞服朱闉之爽塏楚原洪筆頌記不遷陳王麗藻賦稱遙植昔朝歌季重才賜海魚大理元常止蒙秋菊謝賚林檎啓丹徒故苑歲綿長而不見岷山舊植路重阻而來難未有徙核圓丘移根閬坂仙厨始摘猶堆青玉之盤下賤爰頒遂入抽蒲之座謝賚朱櫻啓成叢殿側猶連制賦之條結實西園非復粘蟬之樹異合浦之歸來疑藏朱實同秦人之逐彈似得金丸謝賚檳榔啓形均緑竹詎掃山壇色譬青桐不生空井事踰紫奈用兼芳菊方為口實永以蠲痾謝東宫賚檳榔啓無勞朱實兼荔支之五滋能發紅顔類芙蓉之十酒登玉案而上陳出珠盤而下逮澤深溫奈恩均含棗謝東宫賚米啓滍水鳴蟬香聞七里瓊山合穎租歸十縣肩吾人慙振藻徒降雲間之松職濫更繁空撤家丞之俸成珠委地事重逢仙遊玉為糧珍踰入楚雖復激水滄流不待監河之説春風掃地方誚文學之篇謝東宫賚粟啓查或火成鑽以為屑奈稱煎用曝而成糗未若北燕巨實用奪榮枯南國脯山翻慙齒決承恩踴躍對聞喜之河念報屏營問知來之息謝東宫賜宅啓肩吾居異道南才非巷北流寓建春之外寄息靈臺之下豈望地無湫隘里號乘軒巷轉幡旗門容幰蓋况乃交垂五柳若元亮之居夾石雙槐似安仁之縣却瞻鍾阜前枕洛橋池通西舍之流窗映東鄰之棗來歸髙里翻成待封之門夜坐書臺非復通燈之壁才下應王禮加溫阮官成名立無事非恩謝東宫示古迹啓竊以仙巖遺傳入握成塵孔壁藏文隨開巳蠧石書有暗厨畫猶飛豈有迹經四代年踰十紀芝英雲氣之巧未殞松鉛鵲反鸞驚之勢不侵蒲竹必使酒肆人來池流色變將損北海之牘還代西河之簡謝東宫賚內人春衣啓階邉細草猶推綟葉之光戶前桃樹反訝藍花之色遂得裾飛合燕領鬬分鸞試顧採薪皆成留客謝湘東王賚未啓味重新城香踰潦水連舟入浦似彥伯之南歸積地為山疑馬援之西至不待候沙同新渝之再熟無勞拜石均遼倉之重滿前恩未逺次渥仍流墨翟假以故書裴楷暫其國賜答湘東王賚粳米啓竊以農夫力耕時逢儉歲疏賤時澤必取豐年椓斛瀉珠嘉聞陶量翻庭委玉欣見馬圖謝湘東王賚米啓竊以月滿則虧恩來無爽海潮雖大萬江恆注遂使連箱委地不殊陽翟盈倉接宇寧異海陵謝湘東王賚柑啓傳名地理逺自武陵之洲族茂神經遙聞建春之嶺王逸為賦取對荔枝張衡制辭用連石蜜足使萍實非甜蒲萄猶䬼答武陵王賚絹啓肩吾啓蒙賚絹二十匹清河之珍丘園慙其束帛關東之妙潛織陋其卷綃下官謬忝扁舟暫瞻還斾而天人渥眄增餘論之榮江漢安流無沿洄之阻遂使鶴露宵凝輕絺立變雁風朝急治服成溫有謝筆端無辭陳報不任下情謹奉啓事謝聞謹啓謝武陵王賚白綺綾啓圖雲緝鶴鄴市稀逢寫霧傳花叢臺罕遇雖復馬均騁思比巧猶慙虞卿受金方恩未重比扁舟獨反燕路有心載寶言歸銜珠無日答陶隱居賚术煎啓竊以緑葉抽條生於首峰之側紫花摽色出自鄭巖之下百邪外禦六府內充山精見書華神在籙木榮火謝盡採擷之難啓旦移申窮淋漉之劑故能競爽雲珠爭奇水玉自非身疲掌硯役倦攀桃豈可立致還年坐生羽翼臨沅丹井方覺可捐酈縣菊泉無勞復汲庶得遨遊海岸追涓子之塵馳騖霍山共陳王為侣謡俗輕施尚曰難酬出世鴻恩寧知上報答陶隱居賚术蒸啓味重金漿芳踰玉液足使芝慙明麗丹愧芙蓉坐致延生伏深銘戴答餉綾紋啓潔同雪霜華踰紵綺長裾可曵無愧王門之賔廣袖將裁翻有城中之製謝炭啓識慙曼倩似見昆明之灰清愧伯鸞不復因人之熱序書品序玄靜先生曰豫遍求邃古逖訪厥初書名起于玄洛字勢發于倉史故遺結繩取諸文象諸形會諸人事未有廣此緘深兹文契是以一書加大天尊可知二力增土地卑可審日以君道則字勢圓月以臣輔則文體缺及其轉注假借之流指事會意之類莫不狀範毫端形呈字表開篇玩古則千載共朝削簡傅今則萬里對面記善則惡自削書賢則過必改玉厯頒正而化俗帝教陳言而設教變通不極日用無窮與聖同功參神並運爰泊中葉舍繁從省漸失潁川之言竟逐雲陽之字若乃鳥迹孕于古文壁書存于科斗符陳帝璽摹調蜀漆署表宫門銘題禮器魚遊舍鳳鳥已分蟲仁義起于麒麟威形發于龍虎雲氣時飄五色仙人還作兩童龜若浮溪蛇若赴穴流星疑燭垂露似珠芝英轉車飛白掩素參差倒薤既思種栁之謡長短懸針復想定情之製蛟腳傍低鵠頭仰立填飄板上謬起印中波回墮鏡之鸞楷顧雕陵之鵲並以篆籕重復見重昔時或巧能售酒或妙令鬼哭信無味之竒珍非趨時之急務且具録前訓今不復兼論惟草正疏通專行於世其或繼之者雖百代可知尋𨽻體發源秦時𨽻人下邳程邈所作始皇見而重之以奏事繁多篆字難製遂作此法故曰𨽻書今時正書是也草聖起於漢時解散𨽻法用以赴急本因草創之義故曰草書建初中京兆杜操始以善書知名今之草書是也余自少迄長留心兹業澡手謝於臨池鋭意同於削板而蕺山之扇竟未增華凌雲之臺無因誡子求諸故迹或有淺深輒刪善草𨽻者一百二十一人伯英以稱聖居首法髙以追駿處末推能相越小例而九引類相附大等而三復為略論總名書品書品後序今以九例該此衆賢猶如玄圃積玉炎洲聚桂其中實相推謝故有兹多品然終能振此鱗翼俱上龍門倘後之學者更隨點曝云爾論書品論一上之上張芝伯英少鍾繇元常王羲之逸𨽻既發源秦史草乃激流齊相跨七代而彌遵將千載而無革誠開博者也均其文總六書之要指其事籠八體之竒能拔篆籕于繁蕪移楷真于重密分行紙上類出繭之蛾結畫篇中似聞琴之鶴峰崿間起瓊山慚其斂霧漪瀾遞扶碧海愧其下風抽絲散水定其下筆倚刀較尺驗于成字真草既分于星芒烈火復成于珠珮或橫牽豎掣或濃點輕拂或將放而更留或因挑而還置敏思藏于胸中巧意發于毫銛詹尹端策故以迷其變化英韶傾耳無以察其音聲殆善射之不注妙斫輪之不傳是以鷹瓜舍利出彼兔毫龍管潤霜遊兹蠆尾學者鮮能具體窺者罕得其門若探妙測深盡形得勢煙花落紙將動風彩帶字欲飛疑神化之所為非人世之所學惟張有道鍾元常王右軍其人也張工夫第一天然次之衣帛先書稱為草聖鍾天然第一工夫次之妙盡許昌之碑窮極鄴下之牘王工夫不及張天然過之天然不及鍾工夫過之羊欣云貴越羣品古今莫二兼撮衆法備成一家若孔門以書三子入室矣允為上之上書品論二上之中崔瑗子玉張昶文舒杜度伯度敬師宜官王獻之子崔子玉擅名北中迹罕南度世有得其摹者王之敬見之稱美以為功類伯英杜度濫觴于草書取竒於漢帝詔復奏事皆作草書師宜官鴻都為最能大能小文舒聲劣于兄時云亞聖子敬泥帚最驗天骨兼以掣筆復識人工一字不遺兩葉傳妙此五人允為上之中書品論三上之下索靖幼安皇象休明梁鵠孟皇胡昭孔明韋誕仲將鍾會士季衛瓘伯玉阮研文機荀輿長胤幼安斂蔓舅氏抗名衛令孟皇功盡筆力字入帳中仲將不妄染毫必須張筆而左紙孔明動見模楷皆謂胡肥而鍾瘦休明斟酌二家聨駕八絶士季之範元常猶子敬之稟逸少而工拙兼效真草皆成伯玉逺慕張芝近參父迹長胤狸骨方擬而難逮阮研居今觀古盡窺衆妙之門雖復師王祖鍾終成别搆一體此九人允為上之下書品論四中之上張超子並崔實子真郭伯道名劉德升君嗣衛夫人鑠字茂猗李式景則謝安安石庾翼稚恭王珉季琰郗愔方回柏玄敬道羊欣敬元殷鈞季和王僧虔孔琳之彥琳子並崔家州里頗相倣效可謂醬鹹于鹽冰寒于水伯道府問朝廷遠封其迹德升之妙鍾胡各採其美子真俊才門法不墜李妻衛氏自出華宗景則毫素流靡稚恭聲彩遒越郗愔安石草正並驅季琰柏玄筋力俱駿羊欣早隨子敬最得王體孔琳之聲髙宋氏王僧虔雄發齊代殷鈞頗耽愛好終得肩隨此一十五人允為中之上書品論五中之中魏武帝曹操孟德邑吳主元宗孫皓山衛覬伯儒左子伯字衛桓巨杜預元凱韋旭文休王廙世將王修敬仁張彭祖范懷約任靖張永景初施方泰吳休尚魏帝筆墨雄贍吳主體裁綿密伯儒兼敘𨽻草子邑分鏕梁邯巨山三世元凱纍葉王廙為右軍之師彭祖取羲之之道任靖矯名文休題柱敬仁清舉致畏逼之詞張范逢時俱東南之美施吳鄴下後生同年拔萃此十五人允為中之中書品論六中之下羅暉叔景陸機士衡趙襲元嗣朱誕劉輿茂張昭王導𢎞庾亮元規義王洽宋文帝劉隆郗超吳興郗張翼康昕徐秀謝眺玄暉王崇素劉繪陶隱居𢎞景叔景元嗣並稱西州劉輿之筆札張昭之無懈陸機以𢎞才掩迹朱誕以偏藝流聲王導則列聖推能庾亮則羣公挹巧王洽以並通諸法郗超以晚年取譽張翼善效宋帝康昕郗秀孤生謝朓劉繪文宗書範近來少前陶隱居仙才翰采拔于山谷王崇素繪闕靡倫篇筆傳于里閭此十八人允為中之下書品論七下之上薑翊羊忱梁宣帝韋秀晉元景文鍾輿人向泰識道范氏蔚宗薄宋炳敬王會齊謝靈運伯蕭思話紹之叔髙帝紹庾黔婁子費元瑶羊祜叔孫奉伯此十九人並擅毫翰動成楷則殆逼前良見希後彥允為下之上書品論八下之中陽經張輿諸葛融李楊潭王濟夫人張炳之岑淵劉穆道和朱齡石褚元明庾景休孔敬通張融思光王籍文海此十五人雖未窮字奧書尚文情披其叢薄非無香草視其涯岸皆有潤珠故遺斯紙以為世玩允為下之中書品論九下之下衛宣陰光李韞少陳基張傳庭堅任張紹嘉韋熊季暢曹宋裴邈之羊固閭謝晦寶傳夫人仁辟間訓徐羡孔顔光周皓張欣泰人張熾僧嶽道此二十二人皆五味一和五色一彩視其雕文非特刻鵠人人下筆寧止追嚮遺迹見珍餘芳可折誠以驅馳並駕不逮前鋒而中權後殿各盡其美允為下之下銘團扇銘武王玄覽造扇于前班生贍博白綺仍傳裁雲比霧裂素輕蟬片月內掩重規外圓炎隆火正石鑠沙煎清逾蘋末瑩等寒泉恩深難恃愛極則遷秋風颯至篋笥長捐勒銘華扇敢薦夏筵玉帳山銘玉帳寥廓崑山抵鵲總葉成帳連枝起幕玉蘂難徙金花不落隱士彈琴仙人看博巖留故鼎竈聚新荆煮石初爛燒丹欲成桑田屢盡海水頻傾長聞鳯笛永聽簫聲樂府長安有狹斜行長安有曲陌曲陌不容幰路逢雙綺襦問君居近逺我居臨御溝可識不可求長子登麟閣次子侍龍樓少子無髙位聊從金馬遊三子俱來下左右若川流三子俱來入髙軒映彩旒三子俱來宴玉柱擊清甌大婦襞雲裘中婦卷羅幬少婦多豔冶花鈿繫石榴夫君且安坐歡娛方未周賦得有所思佳期竟不歸春日坐芳菲拂匣看離鏡一作扇開箱見别衣井梧生未合宫槐卷復稀不及銜泥燕從來相逐飛有所思佳人逺于隔乃在天一方望望江山阻悠悠道路長别前秋葉落别後春花芳雷歎一聲響雨淚忽成行悵望情無極傾心還自傷洛陽道徼道臨河曲層城傍洛川金門才出柳桐井半含泉日起罘罳外車回雙闕前潘生時未返遙心徒眷然賦得橫吹曲長安道桂宫連復道黃山開廣路逺聽平陵鐘遙識新豐樹合殿生光彩離宫起煙霧日落歌吹還一作回塵飛車馬度愛妾換馬渥水出騰駒湘川實應圖來從西北道去逐東南隅琴聲悲玉匣山路泣蘼蕪似鹿將含笑千金會不俱隴西行借問隴西行何當驅馬征草合前迷路雲濃後暗城寄語幽閨妾羅袖勿空縈未央才人歌從來守未央轉欲訝春芳朝風凌日色夜月奪燈光相逢倘遊豫暫為卷衣裳詩侍宴應令副君時暇豫曽城聊近遊清池寫飛閣疏樹出龍樓北陸冰方壯西園春欲周梅心芳屢動蒲節促難抽徒然欣並命無以厠應劉侍宴宣猷堂應令副君德將聖陳王才掞天歸來宴平樂置酒對林泉爐香雜山氣殿影入池漣豔舞時移節新歌屢上絃聽曲慙回顧思經徒欲眠侍宣猷堂宴湘東王應令陳王驂駕反副后西園遊並命登飛閣列坐對芳洲桂巖逢暮序菊水值窮秋竹徑簫聲發桐門琴曲愁一作幽徒奉文成誦空知思若抽侍宴餞湘州刺史張纘洞庭資善政層城送逺離九歌揚妙曲八桂動芳枝雨足飛春殿雲峯入夏池郢路方遼逺湘山轉蔽虧何當好風日極望長沙垂侍宴餞張孝總應令層臺臨回漲耿耿晴煙上欲送分符人翻似河隄望寒雲暗積水秋雨蒙重嶂别念動神襟華文切離貺慙無寡和曲空陪郢中唱三日侍蘭亭曲水宴策星依夜動鑾