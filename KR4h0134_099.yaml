隨丹聊變水獨揺不須風詠美人絳樹及西施俱是好容儀非關能結束本自細腰肢鏡前難並照相將映渌池看粧畏水動斂袖避風吹轉手齊裾亂横簮歴鬢垂曲中人未取誰堪白日移不分他相識唯聽使君知送别於建興苑相逢相逢小苑北停車問苑中梅新雜柳故粉白映綸紅去影背斜日香衣臨上風雲流階漸黒冰開池半通去馬船難駐啼烏曲未終眷然從此别車西馬復東侍宴沐道逢將聖飛觴屬上賢仁風開美景瑞氣動非烟秋樹翻黄葉寒池墮黑蓮承恩謝命淺念報在身前侍宴餞湘東王應令陳王從遊士髙晏入承華並載同連璧雕文類簡沙落猿時動樹墜雪暫揺花念此離筵促方愁别路賖餞張孝總應令江上早寒生蕭條鐃管清别筵開帳殿離舟巻幔城前山黄葉起對岸白沙驚臨渦同極望竊吹愧才經侍宴餞東陽太守蕭子雲東部資良守北宫敦獻酬新枝漸接樹故凍欲含流早花少餘雪春寒極晩秋徒嗟白岸逺空想赤松遊和晉安王薄晩逐涼北樓回望應敎向夕紛諠屏追涼飛觀中樹影臨城日牕含度水風遥天如接岸逺帆似凌空陪文慙宋玉徒等侍蘭宫贈周處士九丹開石室三徑没荒林仙人翻可見隱士更難尋籬下黄花菊丘中白雪琴方欣松葉酒自和遊山吟新林送劉之遴斾轉黄山路舟纚白馬津送輪時合幰分驂各背塵常山喜臨岱隴頭悲望秦欲持漢中策還以贈征人奉使江州舟中七夕九江逢七夕初弦值早秋天河來映水織女欲攀舟漢使俱為客星槎共逐流莫言相送浦不及穿針樓南苑看人還春花競玉顔俱折復俱攀細腰宜窄衣長釵巧挾鬟洛橋初度燭青門欲上關中人應有望上客莫前還詠美人看畫應令欲知畫能巧喚取真來映並出似分身相看如照鏡安釵等疎密著領俱周正不解平城圍誰與丹青競奉和藥名詩英玉牧荆楚聽訟出池臺督郵稱蝗去亭長説烏來行塘朱鷺響當道赤帷開馬鞭聊冩賦竹葉暫傾杯看放市旗亭出御道遊目暫迴車既非隨舞鶴聊思索枯魚懸龜識季主牓酒見相如日中人已合黄昏故未疎和望月桂殿月徧來留光引上才圓隨漢東蚌暈逐淮南灰渡河光不濕移輪轍詎開此夜臨清景還承終宴杯和徐主簿望月樓上徘徊月牕中愁思人照雪光偏泠臨花色轉春星流時入暈桂長欲侵輪願以重光曲承君歌扇塵詠風宋地鶂飛初湘川燕起餘掃一作拂壇聊動竹吹薤欲成書蒼梧洞猶在一作蒼崦桐猶在合浦樹應疎陽烏一轉翅千里定非虛詠花雪瑞雪墜堯年因風入綺錢飛花灑庭樹凝瑛結井泉寒光晦八極同雲暗九天已飄黄竹路共慶白渠田春日桃紅柳絮白照日復隨風影出朱城外香歸青殿中水映寄生竹山横半死桐頒文知渥重搦札愧才空七夕玉匣巻懸衣針樓開夜扉姮娥隨月落織女逐星移離前忿促夜别後對空機倩語雕陵鵲填河未可飛嵗盡應令嵗序已云殫春心不自安聊開柏葉酒試奠五辛盤金薄圖神燕朱泥却一作印鬼丸梅花應可折倩為雪中看賦得山層雲霾峻嶺絶澗倒危峯刻削臨千仞嵯峨起百重行曦上杳杳結霧下溶溶仁心留此屬休奉愧羣龍同蕭左丞詠摘梅花牕梅朝始發庭雪晩初消折花牽短樹攀叢入細條垂冰溜玉手含刺罥春腰逺道終難寄馨香徒自饒和晉安王詠燕可憐幕上燕差池弄羽衣夜夜同巢宿朝朝相對飛銜泥瞻樂善相賀奉英徽秋蟬行寂寞戀此未辭歸詠胡牀應敎傳名乃外域入用信中京足欹形已正文斜體自平臨堂對逺客命旅誓初征何如淄館下淹留奉盛明暮遊山水應令賦得磧字餘春屬清夜西園恣遊歴入逕轉金輿開橋通畫鷁細藤初上楥新流漸涵磧雲峯沒城柳電影開巖壁奉和湘東王應令二首春宵征人别來久年芳復臨牖燭下夜縫衣春寒偏著手願及歸飛鴈因書寄髙柳冬曉隣雞聲已傳愁人竟不眠月光侵曙後霜明落曉前縈鬟起照鏡誰忍挿花鈿詠簾燕雙燕集蘭閨雙飛髙復低向户疑新箔登巢識故泥依櫩本相賀近幕願同棲奉賀便省餘秋前對金精坂傍臨圓水池照影礙浮葉看山通迥枝鴈行連霧盡雨足帶雲移被使從渡江八陣引佳兵三河總艫舳絳天揚逺斾雷野驅長轂夜劍動星芒秋潮驚箭服登城北望誓師屠六郡登城望九嵕山沈黄霧裏地盡黒雲中霜戈曜壠日哀笳斷塞風道館仙人白鹿上隱士潜溪邊試取西山藥來觀東海田賦得轉歌扇團紗映似月蟬翼望如空迴持掩曲態轉作送聲風詠舞飛鳬袖始拂啼烏曲未終聊因斷續唱記託徃還風詠舞曲應令歌聲臨畫閣舞袖出芳林石城定若逺前谿應幾深詠主人少姬應敎故年齊總角今春半上頭那知夫婿好能降使君留詠長信宫中草委翠似知節含芳如有情全由履迹少併欲上階生石崇金谷妓蘭堂上客至綺席清絃撫自作明君辭還敎緑珠舞逺看放火風前細塵起月裏黑烟生發燄看喬木侵光識逺城舟中寒望日暮敞鳬舟曽冰合駛流雪照齊君履寒入楚王裘石橋秦王金作柱漢帝玉為欄仙人飛徃易道士出歸難詠桂新叢入望苑舊幹别層城倩視今移處何如月裏生賦得池萍風翻乍青紫浪起時疎密本欲嘆無根還驚能有實新苔隨潮染岸石逐沫聚浮查從令阿谷麗停筐不汰沙被執作詩髪與年俱暮愁將罪共深聊持轉風燭暫映廣陵琴三日侍宴詠曲水中燭影七言重燄垂花比芳樹風吹水動俱難住春枝拂岸影上來還柸繞客光中度聨句曲水聨句春色明上已桃花落繞溝波迴巵不進綸下釣時留臣導絳水時迴岸花觴轉更周陳肴渡玉俎垂餌下銀鈎王臺卿迴川入帳殿列俎間芳洲漢艾凌波出江楓拂岸遊庾肩吾王生迴水碓蔡嫗蕩輕舟岸燭斜臨水波光上映樓殿下八關齋夜賦四城門更作四首殿下即簡文帝時為皇太子中庶府君謂肩吾第一賦韻東城門病伏枕愛危光痾纒生易折無因雪岸草慮及山穴徐防消渴腠腸腑疼蹇嬰肢節如何促齡内憂苦無暫缺孔燾南城門老虛蕉誠易犯危藤復將囓一隨柯已微當年信長訣諸葛嵦已同白駒去復類紅花熱妍容一旦罷孤燈行自設君西城門死綏心雖殊用滅景寧優劣一隨業風盡終歸虚妄設王臺卿五陰誠為假六趣寧有截零落竟同歸憂思空相結李鏡逺北城門沙門俗幻生影空憂繞心塵曀於兹排四纒去矣求三湼殿下下學輩留心方從窈㝠别已悲境相空復作泡雲滅中庶府君第二賦韻東城門病空痾誠易愈有病故難痊徒知餌五色終當悲九泉王臺卿已無雲山草沈痗竟誰憐復悲淪苦海何由果淨天諸葛嵦南城門老昔類紅蓮草自玩緑池邊今如白華樹還悲明鏡前殿下壯心欲何在餘日乃西遷清樽不復樂蓬鬢豈還妍徐防西城門死髙堂信逆旅懷業理常牽玉匣方委櫬金臺不復延中庶府君挽聲隨逕逺蘿影帶松懸詎能留十念唯應逐四縁君北城門沙門經行林樹下求道志能堅既有神通力振錫逺乘烟李鏡逺一登四𢎞誓至道莫能先不貪曠刼壽無論促延年孔燾第三東城門病纒痾緬百年自傷無五福長縈畫篋蛇不值仙人鹿殿下習染迷畫瓶卧起求棲宿羅𥜗豈再歡臨岐方土木中庶府君南城門老少年愛紈綺衰暮慙羅縠徒傷嵗冉冉陳詩非郁郁王臺卿鶴髪辭軒冕鮐背烹葵菽松栢稍相依懽愛時睦睦李鏡逺西城門死追念平生時遨遊上苑囿一没松栢下春光徙儵昱孔燾結根素因假枝葉縁骨肉自應螻蟻驅值此風刀逐諸葛嵦北城門沙門俗繭厭纒絲因田抽善縠長披忍辱鎧去此纎羅服徐防願引三塗衆俱令十使伏珠月猶沈首金錍未挑目君第四東城門病紫紈未可得漳濵徒再離一逢犬馬病賁育罷驅馳李鏡逺已無九轉術復闕萬金竒不看授彊掌唯夢蓮花池君南城門老盛年歌吹日顧步惜容儀一朝衰朽至星星白髪垂孔燾已傷萬事盡復念九門枝垂軒意何在獨坐鏡如斯中庶府君西城門死一息於今罷平生詎可規天長曉露促千齡誰復知殿下華堂一相捨松帳杳難窺萬祀藏珠應千年罷玉羈徐防北城門沙門深心不可染正道亦難欹方除五欲累長辭三雅巵王臺卿依空慮難靜習善路猶弛没身竟靡託單盂詎待貲諸葛嵦漢魏六朝百三家集巻九十九
