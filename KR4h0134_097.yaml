body:
  text: 漢魏六朝百三家集卷九十七梁劉潛集題詞劉士章文章談義領袖後進七子三女多擅才學孝綽品藻羣弟嘗云三筆六詩三謂孝儀六謂孝威也第五弟孝勝第七弟孝先無預焉侯景寇亂孝儀遣子入援身受賊逼失郡病亡孝威困躓危城自拔得出崎嶇西上亦抱疾不起假使時清國晏兄弟連騎續𤣥圃之舊遊領高齊之述作扶風世業鄴苑清吟重篇大帙必偉觀聽而長鯨疾驅逃死不暇林焚池竭遺章濶如就所披涉則孝儀筆勝孝威詩勝伯兄之言良不謬也士章掌齊詔誥孝綽年十四輒使代草父子相知異於謝方明之有謝惠連然士章知子孝綽知弟二者固並美天倫焉目録賦歎别賦表為江侍中薦士表為江僕射禮薦士表為雍州柳津請留刺史晉安王表為臨川王解司空表為晉安王讓丹陽尹表為安成王讓江州表又為臨川王解揚州表為南平王讓徐州表為臨川王奉詔班師表為始興王上毛龜表彈文彈賈執傅湛文啓謝女出門官賜紋絹燭等啓除建康令謝啓上東宫啓為晉安王謝東宫賜玉環刀啓為晉安王謝賜鵝鴨啓謝東宫賜橘啓謝東宫賚酒啓謝晉安王賜銀􅑽絲帶啓謝晉安王賜柑啓謝晉安王賚蝦醬啓謝豫章王賜牛啓謝豫章王賜馬啓為武陵王謝賜第啓謝始興王賜車牛啓謝始興王賜花紈簟啓謝始興王賜奈啓謝鄱陽王賜鉢啓為王儀同謝宅啓為王儀同謝國姻啓書北使還與永豐侯書連珠探物作豔體連珠二首碑雍州金像寺無量夀佛像碑銘平等剎下銘有序樂府從軍行詩和昭明太子鍾山解講和簡文帝賽漢高廟行過康王故第苑閨怨帆渡吉陽洲詠簫詠織女詠石蓮和詠舞又和舞就行漢魏六朝百三家集卷九十七目録欽定四庫全書漢魏六朝百三家集卷九十七明張溥輯梁劉潛集賦歎别賦在羈旅兮為思每居常而不樂意難偕於駘蕩情易邀於隕穫愁非招而自來憂試排而不却退求己以自省慨撫襟而太息位不俟於一進髮徒彰於二色各有似於務耕學無均於譬織在初歸之為慶庶因拙而自收保私庭之宴喜共昆弟而嬉遊校小文於搖筆比楷式於臨流止每歡於接膝行如喜於同輈忽一去而數千遂離居而别域阻同被於當寐乖共餐於終食唯慿逺望以代歸負相思其無力表為江侍中薦士表臣聞天道不言資寒暑而成歲宸居垂拱寄守宰以宣風若夜魚不欺朝琴在奏則殘殺自去汾射可追伏見鎮北府水曹參軍濟陽江興字休恭立身貞白操業清廉頗涉書記彌間刀筆前攝縣沮漳無傷錦製巡行淮海不黍繡衣若處以百里之邑使導一鄉之賦必能治文無害迄用有成臣舉不避族非欲異姓居後知人為難實緣所悉而薦為江僕射禮薦士表陛下緝禮裁樂化俗移風當扆思治分宵夢相枯岸之珠既掄潤山之玉已薦伏見兼太學博士㑹稽賀瑒字德璉幼能斧藻長則琢磨結卷就賢擔簦來學鄉孰染其丹采朋友扣其洪鍾聲無愧於東筠材有踰乎西杞如使聯事宗伯握蘭建禮庶用得其才人知自朂臣鑒非止水職豫搜揚前竭諛聞先自鄉曲為雍州栁津請留刺史晉安王表楚備寶臣秦兵不入齊多君子魏珠恥照足使文公懼而側席孟軻歎而廢寢敢言借寇之願切望申耿之恩陛下昔在濳龍因兹或躍固以陋膴膴於周原包蔥蔥之佳氣昔次君出撫近駕班輪喬卿在政遙授衮服焉馮熊軾而督盜御龍章而行部無虧燮理有光司牧為臨川王解司空表臣以庸薄謬竊隆重職班三事任總六條衣衮坐槐既闕論道馳傳憩棠尤慚為政而俯司土地仰燮陰陽棟撓之譏已彰愆伏之咎爰著今水沴乃作旱魃為災山山無薈蔚雲成煙火陛下曲私未垂䇿免臣職是當逃責乞降兹台步協此天人為晉安王讓丹陽尹表臣聞盈尺徑寸易取琢磨南箕北斗難為簸挹何則良工質美在器成珍假名責實涉求必殆為安成王讓江州表臣聞失晨之雞雖不忘於改旦敗駕之馬終取忸於銜鑣臣昔牧淮岱皇風咫尺一變至道易以為政而亂政莫理美錦徒傷豈可復宣六條闡化千里又臣聞六轡沃若不策𤣥黃之馬九成輪奐無求擁腫之材何則跳局之路已窮梁棟之用斯闕為臨川王解揚州表臣自馳傳斗牛作牧淮海政形兩空璿璣六運既昧弛張之要猶慚大小之獄故以結泳濡翼取愧能官每一進思無忘退食誠復恩私可慿而彜倫難紊敢恃慈𢎞冒披心欵乞解州任少弭素餐為南平王讓徐州表竊以淮岱務殷事乖坐嘯枌榆望重非可卧治臣綿頓枕席動移旬晦恆恐尺波易流寸陰難保寧可復冒此寵膺兹恩榮為臨川王奉詔班師表臣自受服廟堂申威塞表既驅熊羆之衆兼禀帷幄之謀登濟河山夷滅趙魏將繫軹道之頸且屈渭橋之膝而𤣥陰届節祁寒方始降此慈𢎞愍兹介胄使燕然之石願勒而不刋函谷之土將封而莫遂雖荷杕杜之恩終慙采薇之㫖為始興王上毛龜表臣聞嘉瑞五靈既著方策故名千載可得而傳是以𤣥蔡赤文來表軒黃之政神龜青純用顯姬公之德出自江安實荷謙夷之慶甲生毳羽寧非銷鏑之徵實皇家之巨瑞庶民之休幸彈文彈賈執傅湛文長兼御史中丞劉孝儀稽首言南康嗣王府行參軍知譜事賈執與前中書舍人傳湛在王座飲酒時上不安人從臺還聖體已和湛乃揚眉瞋目謂執曰卿念天子我不見闕出悖慢言語連及於上共執忿爭湛昔經殺牛誤父自殺近效殘貪賄賂狼藉特逢解網宥其餘命自被棄廢尢懷怨憤謗訕不遜謹按前兼通事舍人臣傅湛才薄駑蹇特荷抽擢自預左右頻蹈極刑押對鞠書纍逢闕過未聞報效反懷恚憤聖體不安臣下憂懼而湛敢生怨望輕肆慢辭醜爭及父心無愛敬戲語連上罪同悖逆未央馬瘦不覩廄令之忠甘泉道蕪遽見扶風之罪宜其狥乎東市尸彼轂門南康嗣王府參軍臣賈執始聞湛語初無逐雀之心末因私忿遂顯懷鴆之逆雖迹似拆奸意由肆憾惡慢於人自彰穢醜見辱父子已㑹季倫之辭爭及其父復入梁蚡之數是使王嬙悲於連纍黑要喜於得用太子舍人始興蕃王臣蕭毅幸因祉祚爵預藩屏而散金失所設醴乖人雍容之賓未遊於雕苑號怒之客日醉於雷池致使博徒跅弛慢醉盈路靦顏受辱曽無發紏並恕伯厚之心俱鳴路粹之責臣等參議請以見事依法免毅所居官解執知譜事請議貶黜付之卿論不得厮預官流刺尚施行輒不禁止啓謝女出門官賜紋絹燭等啓臣孝儀啓左右袁文成奉宣㫖宜知臣私營發遣垂賜紋絹二十匹燭二十挺臣家本貧黻事多蹇闕桓室金縷本非所宜孟姬作具猶苦未周殊澤未臨珍華兼重制為美服雙綺易儔秉而不息三夜有待臣名品卑末事隔榮賜慈渥之墜實見因心小人賤微豈能勝報除建康令謝啓所恐長安少年易為操彈渭城游徼矜其獨勇清路道奴固知難懾輕綏飛駕且見為榮上東宫啓亡從弟遵百行無㸃千里立志同氣三荆之友假寢十起之慈皆體之於自然行之如俯拾自碣宮陪宴釣臺從幸攀附鱗翼三十餘載茫昧與善一旦長辭劍匿光芒璧碎符采躬搖神筆親動妙思雖每想南皮書憶阮瑀行經北館歌悼子侯不足輩此深仁齊兹舊愛為晉安王謝東宫賜玉環刀啓苖密珍鋌利極鉤鋩謹當擁以雄身藉而安體不令北海小雍孤擅穿膝之竒廬江佩刀獨表不欺之驗為晉安王謝賜鵝鴨啓形類沈文經符陶記晉臣羞筮吳覡未占復有背如車蓋胸垂却月口疑犀腳似魚懸出九芝之池去千金之沼謝東宫賜橘啓多置守民晉為厚秩坐入縑素漢譬封君固以俯匹穰橙俯聯楚柚寧似魏瓜借清泉而得冷豈如蜀食待飴蜜而成甜重似倒影陽池垂華金堞信可珍若榴於式乾貴蒲萄於别館謝東宫賚酒啓異五齊之甘非九醖之法屬車未曾載油囊不得酤試儔仙樹葛𤣥泥首才比蒲桃孟他銜璧固知託之養性妙解怡神擬比聖人差得連類謝晉安王賜宜城酒啓孝儀啓奉教垂賜宜城酒四器歲暮不聊在陰即慘惟斯二里總萃一時少府鬬猴莫能致笑大夫落雉不足解顏忽值瓶瀉椒芳壺開玉液漢遵莫遇殷杯未逢方平醉而遁仙羲和耽而廢職仰慿殊塗便申私飲未矚罍恥已觀幘岸傾耳求音不聞霆擊澄神密視豈覿山高愈疾消憂於斯已驗遺榮勿賤即事不欺酩酊之中猶知銘荷謝晉安王賜銀􅑽絲帶啓雕鏤新奇織製精潔越中玉女不得關思上方名匠莫能議巧人情駭觀如見買臣之綬望貌移姿似逢子訓之術謝晉安王賜柑啓便得削彼金衣咽兹玉液甘踰萍實冷亞水圭立消煩䬼頓除酩酊追嗤齊相進不剖之實逺笑魏君逢裂牙之味謝晉安王賚蝦醬啓龍醬傳甘退誠可陋蚳醢稱貴追覺失言上聖聞雷未之能覆嘉賓流啜羞無辭窶謝豫章王賜牛啓觀其毛角相合骨像應圖曳流水而生光驚高限其如接遂使上阜輒駕下澤是驅馮軾修途既獲坐馳之致馴拳廣庭方念載憂之朂謝豫章王賜馬啓出自北冀來從東道儛越兩驂驅同八駿修坂且厲無復良樂之鳴長楸可走不假幽并之䇿為武陵王謝賜第啓竊以南望朱鳥北距蒼龍右帶御溝左回青路卑晏嬰之湫隘同潘嶽之閒居臣幼自宫掖長游城府雖輪奐之美多門而館第之私未暇今輕舟將反高門遽錫遂葺宇築室百堵皆興雲屋連甍一朝𢎞敞謝始興王賜車牛啓下官安於躡屩習以成性乘堅驅駿未所厝心慈渥無涯每垂奬飾無復難載之朋將申共弊之美濯龍望水未足儔光長門聽雷不能均響謝始興王賜花紈簟啓麗兼桃象周洽昏明便覺夏室已寒冬裘可襲雖九日煎沙香粉猶棄三旬沸海團扇可捐謝始興王賜奈啓酒泉之實稱於王賦瓜州之味記自張文亦有太冲嗟其夏成子建暢其寒熟潘園曜白孫井浮朱並見重於昔時而霑恩於兹日謝鄱陽王賜鉢啓珍窮貨貢製極範金用貴寶樽文包龍鼎雕鏤海籍圖載山經閲衆靈於器中弄神姦於掌裏足令任后所欲逺慙漢世少君有覿遙荒齊寢為王儀同謝宅啓昔晏嬰湫隘齊景營其爽塏孫歷無家晉武為之築館或功高千載德重一時故蒙考室之榮以降葺宇之澤並辭而處傳芳前載臣才愧昔人恩同往哲豈宜妄荷重增疵吝但胸奴未滅遽當輪奐之美環堵為室遂得歌哭於斯為王儀同謝國姻啓即日主書王靜民宣勑安吉主降嬪臣第三息實臣素里庸族蓬衡賤品事隔伊緍之理望絶下嫁之姬而聖慈猥洽皇姻曲逮荆布陋飾已膺凡奬負薪微𦙍復降肅雍頻煩叨荷內外榮抃書北使還與永豐侯書足踐寒地身犯朔風暮宿客亭晨炊謁舍飄颻辛苦迄届氈鄉雜種覃化頗慕中國兵傳李緒之法樓擬衛律所治而毳幕難淹酪漿易厭王程有限時及玉關射鹿胡奴乃共歸國刻龍漢節還持入塞馬銜苜蓿嘶疑故墟人獲蒲萄歸種舊里稚子出迎善鄰相勞倦握蟹螯亟覆蝦碗每取朱顔略多自醉用此終日亦以自娛連珠探物作豔體連珠二首妾聞洛妃高髻不姿於芳澤𤣥妻長髮無藉於金鈿故雲名由於自美蟬稱得於天然是以梁妻獨其妖艷衛姬專其可憐妾聞芳性深情雖欲忘而不歇薰芬動慮事逾久而更思是以津亭掩馥抵結秦婦之恨爵臺餘妬追生魏妾之悲碑雍州金像寺無量夀佛像碑昔堯乃則天莫能名其聖丘才譬日無得稱其道况復欲宣五品將歎三法固使迦葉恥其無智龍樹羞其非辨猶聞獻蓋長者頌以七言無學比丘陳其百句至有九輩性生一身補處塵洗玉池神聞金葉樹聲繁㑹趙簡於是未聞地實焜煌周穆之所不見昔者出城石轉還林現疾夢樹既沉梵花獨反猶有香杖疊衣紅爪紺髮可得崇以妙利顯用珍函彼彌陀感化殊攝日輪照曜月靣從容毫散珠輝脣開異色似含微笑俱注日於瞻仰如出軟言咸傾耳於諦聽像復以其夕出住寺門始則映顯巖間猶對鷲山之禮末又徘徊閫外似救毗城之疾空中生樹豈曰難思火內披蓮未為多有銘曰奄有淨國寶應多祉葉産𣑽童花開釋子玉蓮交映銀荷遞起伊尹慙桑伯陽羞李銘平等剎下銘有序香薪已燎花疊盡然頻果絶其軟言綿毫收其廣照紺鉢遺采託慕所依紅爪餘暉申悲是寄因使金表爭構玉剎競修豈止天界飾其四園龍宫陳其七寶樹似菴林峯疑鷲色孕吐仙霧湧漱靈泉燕室緣雲精廬切漢制兼祕殿采美御房羲和假道於罘罳翔鸞回翼於飛棟建章厭勝未及雕礱甘泉避暑豈窮輪奐檻綴玫瑰階填粟玉絡以如意飾用沉檀火齊勝明燭銀揚采釋梵奪其身光日車貶其輪照辭曰惟兹寶塔妙跡可傳盤稱鄴境樓美湆川雙龍虛繞九鳯徒懸豈如神剎耿介凌煙珠含魄月幡垂淨天寶鐸夜響銀地朝鮮檐栖逈霧砌卷香蓮翻蠡下梵墜鶴歸仙洹沙擾擾世界綿綿踐兹勝影袪彼蓋纒樂府從軍行冠軍親挾射長平自合圍木落雕弓燥氣秋征鴈肥賢王皆屈膝幕府復申威何謂從軍樂往返速如飛詩和昭明太子鍾山解講詔一作韶樂臨東序時駕出西園雖窮理遊盛終為塵俗喧豈如𢎞七覺揚鸞啓四門夜氣清簫管曉陳爍郊原山風亂采眊初景麗文轅林開前騎騁徑曲羽旄屯煙壁浮青翠石瀨響飛奔回輿下重閣降道訪真源談空匹泉涌綴藻邁弦繁輕生逢遇誤並作輩龍鵷顧已同偏爵何用挹衢樽和簡文帝賽漢高廟圭幣崇明祀牲樽禮貴神風驚如集廟光至似來陳徘徊靈駕入呌咷倡歌新將言非為已致敬乃祈民多才與多事今古獨為鄰行過康王故第苑入梁逢故苑度薛見餘宫尚識招賢閣猶懷愛士風靈光一超逺衡館亦蒙籠洞門餘舊色甘棠留故藂送禽悲不去過客慕難窮池竹徒如在林堂曖已空逺橋隔樹出回澗隱岸通芳流小山桂塵起大王風具物咸如此是地感余衷空想陵前劍徒悲壟上童閨怨本無金屋寵長作玉階悲一乖西北麗寧復城南期永巷愁無歇玉臺作盡應門閉有時空勞纎素巧徒為團扇辭匡牀終不共何由橫自私帆渡吉陽洲揚帆乘浪華􅋵鼓要風力近樹倏而遐遙山俄已逼欲比驚龍掣將頓陽烏翼客行悲道逺唯須前路極詠簫危聲合鼓吹絶弄混笙箎管饒知氣促叉動覺唇移蕭一作仙史安為貴能令秦女隨詠織女金鈿已照曜白日未蹉跎欲待黃昏後含嬌渡淺河詠石蓮蓮名堪百萬石姓重千金不解無情物那得似人心和詠舞回履裾香散飄衫鈿響傳低叉依促管曼睇入繁絃又和轉袖隨歌發頓履赴絃餘度行過接手回身乍斂裾舞就行依歌移弱步傍竹艷新粧徐來翻應節亂去反成行漢魏六朝百三家集卷九十七
