塵下未息共愛賞心并賦得橋浮梁既衡嶮通波信可陵乘空寫渭石跨岸擬河冰斜䦨隱濁霧布影入清澠方知歌緑水無待榜蒼鷹春日看梅花昨日看梅樹新花已自生今旦聞春鳥何啻兩三聲凍解池開渌雲穿天半晴遊心不應動為此欲逢迎和湘東王陽雲樓簷栁曖曖陽雲臺春栁發新梅栁枝無極軟春風隨意來潭沱青帷閉玲瓏朱扇開佳人有所望車聲非是雷初桃初桃麗新采照地吐其芳枝間留紫燕葉裏發輕香飛花入露井交幹拂華堂若映窗前栁懸疑紅粉妝詠橘萎蕤映庭樹枝葉凌秋芳故條雜新實金翠共含霜攀枝折縹幹甘㫖若瓊漿無假存雕飾玉盤余自嘗香茅銅律與鳴琴俱稱類君子豈若江淮間發葉超衆美珍同自牧歸茅因彚征起豈獨邁秦蘅方知蔑沅芷繫馬青驪沈赭汗緑地懸花蹄未垂青鞙尾猶掛紫障泥蹀足絆中憤搖頭櫪上嘶紫關如未息直去取榆溪賦得舞鶴來自芝田逺飛度武溪深振迅依吳市差池逐晉琴寄聲傳迥澗動翅拂花林欲知情外物伊洛有清潯登板橋詠洲中獨鶴逺霧旦氛氲單飛才可分孤驚思嶼浦羇淚下江濆意惑東西水心迷四面雲誰知獨辛苦江上念離羣雙燕詩雙燕有雄雌照日兩差池銜花落北戶逐蝶上南枝桂棟本曽宿虹梁早自窺願得長如此無令雙燕離聽早蟬草歇鶗鳴初蟬思花落後乍飲三危露時䕃五官栁莊書哂鵬翼衛賦宜螓首桂樹可淹留勿謂山中久詠蛺蝶空園暮烟起逍遙獨未歸翠鬛藏髙栁紅蓮拂水衣復此從風蝶雙雙花上飛寄與相知者同心終莫違詠螢本將秋草并今與夕風輕騰空類星霄拂樹若花生屏疑神火照簾似夜珠明逢君拾光彩不吝此身傾詠筆格英華表玉笈佳麗稱蛛網無如兹制竒雕飾雜衆象仰出寫含花橫抽學仙掌幸因提拾用遂厠璇臺賞詠鏡錙銖恆在側誰言覽鏡稀如冰不見水似扇長含輝全開玳瑁匣併卷織成衣脫入相如手疑言趙璧歸正月八日燃燈詩應令藕樹交無極花雲衣數重織竹能為象縛荻巧成龍落灰然蕊盛垂油濕畫峯天宫倘若見燈王願可逢和蕭東陽祀七里廟萬里實幽宗三神亦天搆豈謂木石精期乃山川守逺來太白旗遙徵青鳥候以兹敬弗怠方知教應富賦詠五隂識枝詩澆淳混神因心形復依色欲浪逐情飄愛網隨心織鑄金雖改狀斬籌方未極鴿歡既無辨猿攀此焉息被幽述志詩恍忽烟霞散颼飂松柏隂幽川白楊古野路黃塵深終無千月命安用九丹金闕里長蕪沒蒼天空照心和湘東王三韻二首春宵花樹含春叢羅帳夜長空風聲隨篠韻月色與池同綵箋徒自襞無信往雲中冬曉冬朝日照梁含怨下前牀帷褰竹葉帶鏡轉菱花光㑹是無人見何用早紅妝詠晚閨珠簾向暮下妖姿不可追花風暗裏覺蘭燭帳中飛何時玉窗裏夜夜更縫衣曉思玉臺作蕭紀晨禽爭學囀朝花亂欲開爐烟入斗帳屏風隱鏡臺紅妝幾盡淚蕩子何當來同庾肩吾四詠二首藝文作昭明按肩吾為簡文宫臣當以玉臺為正蓮舟買荷度採蓮前岸隈舟子屢徘徊荷披衣可識風疏香不來欲知船度處當看荷葉開照流看落叉相隨照緑水意是重涼風流搖妝影壞叉落鬢花空佳期在何許徒傷心不同賦樂名得箜篌捩遲初挑吹弄急時催舞釧響逐絃鳴衫回半障柱欲知心不平君看黛眉聚春日花開幾千葉水覆數重衣蝶揚縈空舞燕作同心飛歌妖弄曲罷鄭女挾琴歸賦得入階雨細雨階前入灑砌復沾帷漬花枝覺重濕鳥羽飛遲儻令斜日照併欲似遊絲詠栁垂隂滿上路結草早知春花絮時隨鳥風枝屢拂塵欲散依依采時要歌吹人詠芙蓉圓花一蒂卷交葉半心開影前光照耀香裏蝶徘徊欣隨玉露㸃不逐秋風催詠梔子花素華偏可喜的的半臨池疑為霜裏葉復類雪封枝日斜光隱見風還影合離賦得薔薇石榴珊瑚蘂木槿懸星葩豈如兹草麗逢春始發花回風舒紫萼照日吐新芽仰和衛尉新渝侯巡城口號帝京風雨中層闕烟霞浮玉署清餘熱金城含暮秋水觀凌却敵槐影帶重樓臨後園隱淪遊少海神仙入太華我有逍遙趣中園復可嘉千株同落葉百丈共尋霞雨後散絲與山氣忽合復俄晴雷音稍入嶺電影尚連城雨餘雲稍薄風收熱復生和㑹三教聚沫多緣假標空非色香漢君雖起夢晉后徒降祥𤣥機昔未辨洞鍳資我皇侍講詩物善渥深慈監撫宣王事英邁八解心髙超七花意登錦堂詩彚作鮑照非孫生酸棗寺王子枝江樓何如登石鏡因閒猶豫遊夜遊北園星芒侵嶺樹月暈隱城樓暗花舒不覺明波動見流遊韋黃門園息車冠蓋里停轡仲長園簷疏逺興積賓至羽觴繁入溆浦泛水入回塘空枝度日光竹垂懸掃浪鳬疑逺避檣罷丹陽郡往與吏民别久歸從事麥非留故吏錢栁栽今尚在棠隂君詎憐示晉陵弟零雨岐路悲送歸臨水節時事雖為舛離憂等閒别夜望浮圗上相輪絶句光中辨垂鳯霧裏見飛鸞定用方諸水持添承露盤愁閨照鏡别來憔悴久他人怪容色只有匣中鏡還持自相識金閨思二首遊子久不返妾身當何依日移孤影動羞覩燕雙飛自君之别矣不復染膏脂南風送歸鴈聊以寄相思寒閨緑葉朝朝黃紅顔日日異譬喻持相此那堪不愁思從頓還城南暫别兩成疑開簾生舊憶都知未有情更似新相識夜遣內人還後舟錦幔扶船列蘭橈拂浪浮去燭猶文水餘香尚滿舟贈麗人腰肢本猶絶眉眼特驚人判自無相比還來有洛神遙望散誕垂紅帔斜柯插玉簮可憐無有比恣許直千金行雨本是巫山來無人覩容色惟有楚王臣曽言夢相識和人渡水婉娩新上頭湔裾出樂遊帶前結香草鬟邉插石榴雜詠被空眠數覺寒重夜風吹羅帷非海水那得度前知詠武陵王左右伍皓傳杯頂分如兩髻簮長驗上頭投杯如欲轉疑殘已復留彈筝彈筝北窗下夜響清音愁張髙絃易斷心傷曲不遒梁塵依帷䝉重翠帶日聚輕紅定為歌聲起非關團扇風遊人遊戲長楊苑攜手雲臺間歡樂未窮巳白日下西山詠朝日團團出天外煜煜上層峯光隨浪髙下影逐樹輕濃望月今夜月光來正上相思臺可憐無逺近光照悉徘徊華月兔絲生雲夜蛾影出漢時欲傳千里意不照十年悲詠雲浮雲舒五色瑪瑙應霜天玉葉散秋影金風飄紫烟浮雲可憐片雲生暫重復還輕欲使襄王夢應過白帝城大同九年七月髙樓闢左扇回望依蘭橈晚風䬙揚來落照參差好詠薔薇燕來枝益軟風飄花轉光氤氲不肯去還來階上香柳凌寒競貞節負雪固難虧無慙雲母桂詎減珊瑚枝詠疏楓萎緑映葭青疏紅分浪白花葉灑行舟仍持送逺客詠藤纎條寄喬木弱影掣風斜標春抽曉翠出霧掛懸花詠飛來鸂鶒飛從何處來似出上林隈口銜長生葉翅染昆明苔詠單鳬銜苔入淺水刷羽向沙洲孤飛本欲去得影更淹留詠寒鳬回水浮輕浪沙場弄羽衣眇眇隨山沒離離傍海飛新燕新禽應節歸俱向吹樓飛入簾驚釧響來窗礙舞衣蜂逐風從泛漾照日乍依微知君不留眄銜花空自飛詠籠燈絶句動焰翠帷裏散影羅帳前花心生復落明銷君詎憐賦得白羽扇可憐白羽扇却暑復來薰終無顧庶子誰為一揮軍詠獨舞因羞强正叉顧影時回袂非關善留客更是嬌夫壻詠舞嬌情因曲動弱步逐風吹懸叉隨舞落飛袖拂鬟垂七夕穿針憐從帳裏出相見夜窗開針欹疑月暗縷散怪風來石橋惠子臨濠上秦王見海神寫虹便欲飲圗星逼似真壞橋虹飛亘林際星度斷山隅斜梁懸水跡畫柱脫輕朱水中樓影水底罘罳出萍間反宇浮風生色不壞浪去影恆留和湘東王後園回文詩枝雲間石峯脈水浸山岸池清戲鵠聚樹秋飛葉散詠雪顛倒使韻鹽飛亂蝶舞花落飄粉奩奩粉飄落花舞蝶亂飛鹽登山馬湘東同賦登山馬一本疊間樹二字間樹識金裝草合宜韀短影轉見鞭長何殊八公岫暫上淮南王和湘東王古意詠燭花中燭似將人意同憶啼流膝上燭焰落花中倡樓怨節六言朝日斜來照戶春鳥爭飛出林片光片影皆麗一聲一轉煎心上林紛紛花落淇水漠漠苔浮年馳節流易盡何為忍憶含羞和蕭侍中子顯春别四首以下七言别觀葡萄帶實垂江南豆蔲生連枝無情無意猶如此有心有恨徒别離可憐淮水去來潮春堤楊栁拂河橋淚痕未燥詎終朝行聞玉珮已相要桃紅李白若朝妝羞持憔悴比新芳不惜暫住君前死愁無西國更生香蜘蛛作絲滿帳中芳草結葉當行路紅臉脈脈一生啼黃鳥飛飛有時度故人雖故昔經新新人雖新復應故藝文作江總閨怨詩玉臺作簡文夜望單飛鴈天霜河白夜星稀一鴈聲嘶何處歸早知半路應相失不如從來本獨飛應令蠡浦急兮川路長白雲重兮出帝鄉平原忽兮逺極目江甸阻兮羇心傷樹廬嶽兮髙且峻瞻派水兮去泱泱逺烟生兮含山勢風散花兮傳馨香臨清波兮望石鏡瞻鶴嶺兮睇仙莊望邦畿兮千里曠悲遙夜兮九回腸顧龍樓兮不可見徒送目兮淚沾裳擬古以下雜言窺紅對鏡斂雙眉含愁拭淚坐相思念人一去許多時眼語笑靨迎來情心懷心想甚分明憶人不忍語含恨獨吞聲春情蝶黃花紫燕相追楊低栁合露塵飛已見垂鈎挂緑樹誠知淇水沾羅衣兩童夾車問不已五馬城南猶未歸鶯啼春欲駛無為空掩扉傷離新體傷離復傷離别後情鬱紆悽悽隱去棹憫憫愴還途戚戚意不申轉顧獨沾襟前驅經御宿後騎歷河漘胡香翼還幰清笳送後塵落日斜飛蓋餘暉承畫輪栁影長橫路槐枝深隱人桂宫夕掩銅龍扉甲館宵垂雲母帷朧朧月色上的的夜螢飛草香襲余袂露灑沾人衣帶堞凌城雲亂聚排枝度葉鳥爭歸碗中浮一作緑蟻不能酌琴間玉徽調别鶴别鶴千里别離聲絃調軫急心自驚試起登南樓還向華池遊前時篠生今欲合近日栽荷尚不抽猶是銜杯共賞處今兹對此獨生愁登樓望曖曖山川自分態偃師雖北連轘轅巳南背逺聽寂無聞遙瞻目有閡含毫意不迷長歎憶無賴漢魏六朝百三家集卷八十三
