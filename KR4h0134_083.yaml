body:
  text: 漢魏六朝百三家集卷八十三梁簡文帝集目録樂府上之回採桑樂府三首蜀國絃歌篇艷歌篇妾薄命篇君子行從軍行長安有狹斜行泛舟橫大江三首鴈門太守行二首京洛篇櫂歌行怨歌行美女篇鬬雞苦熱行茱萸女棗下何纂纂金樂歌行幸甘泉宫有所思和湘東王橫吹曲三首折楊栁洛陽道紫騮馬長安道江南思江南行雞鳴髙樹顛明君詞當置酒詠中婦織流黃艷歌曲怨詩採蓮曲霹靂引雉朝飛操貞女引龍丘引當壚曲升仙篇愛妾換馬半路溪擬沈隱侯夜夜曲獨處怨代樂府三首楚妃歎新成安樂宫雙桐生空井雍州曲三首南湖北渚大堤大垂手小垂手有所思三首蜀道難二首採菱曲别鶴生别離夜夜曲二首春江曲桃花曲樹中草上留田行烏夜啼烏棲曲四首採菊篇東飛伯勞歌二首雞鳴篇度關山從軍行隴西行江南弄三首江南曲龍笛曲採蓮曲詩三日侍皇太子曲水宴九日侍皇太子樂遊苑應令詩愍亂詩上已侍宴林光殿曲水和武帝宴詩二首侍遊新亭應令奉和登北顧樓登烽火樓玩漢水登城山池贈張纘餞廬陵內史王修應令餞臨海太守劉孝儀蜀郡太守劉孝勝經琵琶峽仙客往虎窟山寺望同泰寺浮圗䝉預懴悔詩䝉華林園戒詩旦出興業寺講詩遊光宅寺應令十空六首如幻水月如響如夢如影鏡象和湘東王名士悅傾城和徐録事見內人作卧具戲贈麗人率爾成詠執筆戲書從頓暫還城秋閨夜思詠內人晝眠傷美人孌童倡婦怨情十二韻詠舞二首戲作謝惠連體十三韻和藉田漢髙廟賽神祠伍員廟守東華門開春日想上林喜疾瘳卧疾詠風三月三日率爾成詩晚春和湘東王首夏納涼晚景納涼初秋秋夜秋晚大同八年秋九月大同十年十月戊寅大同十一月庚戌𤣥圃寒夕奉答南平王康賚朱櫻賦棗西齊行馬賦得隴坻鴈初飛藥名詩卦名詩登城北望登琴臺餞别送别晚景出行春閨情詠美人觀畫詠人棄妾美人晨妝和林下妓應令夜聽妓擬落日窗中坐雪裏覔梅花山齊晚日後堂望月開霽同劉咨議詠春雪雪朝詠烟春日𤣥圃納涼薄晚逐涼北樓回望秋夜七夕九日賦韻賦得橋春日看梅花和湘東王陽雲樓簷栁初桃詠橘香茅繫馬賦得舞鶴登板橋詠舟中獨鶴雙燕詩聽早蟬詠蛺蝶詠螢詠筆格詠鏡正月八日燃燈詩應令和蕭東陽祀七里廟賦詠五隂識枝詩被幽述志詩和湘東王三韻二首春宵冬曉詠晚閨曉思同庾肩吾四詠二首蓮舟買荷度照流看落叉賦樂名得箜篌春日賦得入階雨詠栁詠芙蓉詠梔子花賦得薔薇仰和衛尉新渝侯巡城口號臨後園雨後和㑹三教侍講詩登錦堂夜遊北園遊韋黃門園入溆浦罷丹陽郡往與吏民别示晉陵弟夜望浮圗上相輪絶句愁閨照鏡金閨思二首寒閨從頓還城南夜遣內人還後舟贈麗人遙望行雨和人渡水雜詠詠武陵王左右伍皓傳杯彈筝梁塵遊人詠朝日望月華月詠雲浮雲大同九年七月詠薔薇柳詠疏楓詠藤詠飛來鸂鶒詠單鳬詠寒鳬新燕蜂詠籠燈絶句賦得白羽扇詠獨舞詠舞七夕穿針石橋壞橋水中樓影和湘東王後園回文詩詠雪登山馬和湘東王古意詠燭倡樓怨節和蕭侍中子顯春别四首夜望單飛鴈應令擬古春情傷離新體漢魏六朝百三家集卷八十三目録欽定四庫全書漢魏六朝百三家集卷八十三明張溥輯梁簡文帝集樂府上之回前斾拂回中後車臨桂宫輕絲駐雲罕春色繞川風桃林方灼灼桞路日曈曈笳聲駭胡騎清磬讋山戎微臣今拜首願帝永無窮採桑春色映宫來先發院邊梅細萍重疊長新花歷亂開連珂往淇上接幰至叢臺叢臺可憐妾當忩望飛蝶忌跌行衫領尉斗成裙褶下牀著珠珮捉鏡安花鑷薄晚畏蠶饑競採春桑葉寄語採桑伴訝今春日短枝高攀不及葉細籠難滿年年將使君歷亂遣相聞欲知琴裏意還贈錦中文何當照梁日還作入山雲重門皆已閉方知留客袂可憐黃金絡復以青絲繫必也為人時誰令畏夫壻樂府三首蜀國絃歌篇銅梁指斜國玉臺云銅梁望絶國劔道望英華作臨中區通星上分野作固下為都雅歌因良守妙舞自巴渝陽城嬉樂所劔騎鬱相趨五婦行難至百兩好遊娛牲祈望帝祀酒酹蜀侯姝江妃納重聘卓女愛將雛停弦時繫爪息吹更治朱脫衫湔錦浪回扇避陽烏聞君握節返賤妾下城隅豔歌篇凌晨光景麗倡女鳯樓中前瞻削成小傍望卷旌空分妝開淺靨繞臉傅斜紅張琴未調軫飲吹不全終自知心所愛出入仕秦宫誰言連尹屈更是莫敖通輕軺綴皂蓋飛轡轢雲驄金鞍隨繫尾銜璅映纒騣戈鏤荆山玉劔飾丹陽銅左把蘇合彈傍持大屈弓控弦因鵲血挽韁一作彊用牛螉弋獵多登隴酣歌每入豐暉暉隱落日冉冉還房櫳燈生陽燧火塵散鯉魚風流蘇時下帳象簟復韜筒霧暗窗前桞寒疏井上桐女蘿託松際甘瓜蔓井東拳拳恃君寵嵗暮望無窮妾薄命名都多麗質本自恃容姿蕩子行未至秋胡無定期玉貌歇紅臉長顰串一作慣翠眉奩鏡迷朝色縫針脆故絲本異搖舟咎何關竊席疑生離誰拊背溘死詎來遲王嬙貌本絶踉蹌入氊帷盧姬嫁日晚非復少年時轉山猶可遂烏白望難期一作追妾心徒自苦傍人㑹見嗤君子行君子懷琬琰不使涅塵淄從容子雲閣寂寞仲舒帷多謝悠悠子管窺良可悲從軍行二師惜善馬樓蘭貪漢財前年出右地今嵗討輪臺魚雲望旗聚龍沙隨陳開氷城朝浴鐡地道夜銜枚將軍號令密天子璽書催何時反舊里遙見下機來長安有狹斜行長安有徑塗塗徑不通輿道逢雙總丱扶輪問我居我居青門北可憶復易尋大息騫金勒中息綰黃銀小息始得意黃頭作弄臣三息俱入門雅志揚清塵三息俱上堂觴肴滿四陳三息俱入戶照耀光容新大婦舒綺絪中婦拂羅巾小婦最容冶映鏡學嬌顰丈人且安坐清謳出絳脣泛舟橫大江三首魏文帝飲馬長城窟行曰泛舟橫大江討彼犯荆虜滄波白日暉遊子出王畿旁望重山轉前觀逺帆稀廣水浮雲吹江風引夜衣旅鴈同洲宿寒鳬夾浦飛行客誰多病當念早旋歸隴西四戰地羽檄嵗時聞護羌擁漢節校尉立元勳石門留鐵騎氷城息夜軍洗兵逢驟雨送陳出黃雲沙長無止泊水脉屢縈分當思勒彛鼎無用想羅裙悠悠懸斾旌知向隴西行減竈驅前馬銜枚進後兵沙飛朝似幕雲起夜疑城回山時阻路絶水亟稽程往年郅支服今嵗單于平方歡凱樂盛飛蓋滿西京鴈門太守行二首輕霜中夜下黃葉逺辭枝寒苦春難覺邊城秋易知風急旍旗斷塗長鎧馬疲少解孫吳法家本幽并兒非關買鴈肉徒勞皇甫規隴暮風恆急關寒霜自濃櫪馬夜方思邊衣秋未重潛師夜接戰略地曉摧鋒悲笳動胡塞高旗出漢墉勤勞謝功業清白報迎逢非須主人賞寧期定逺封單于如未繫終夜慕前蹤京洛篇樂府作煌煌京洛行列鮑照後而逸作者之名或以為鮑詩非也南遊偃師縣斜上灞陵東回瞻龍首堞遙望德陽宫重門逺照耀天閣復穹窿城傍疑復道樹裏識松風黃沙入洛水丹泉繞射熊夜輪懸素魄朝光蕩碧空秋霜曉驅鴈春雨暮成虹曲陽造甲第高安還禁中劉蒼歸作相竇憲出臨戎此時車馬合兹晨冠蓋通誰知兩京盛觀宴遂無窮櫂歌行妾家住湘川菱歌本自便風生解刺浪水深能捉船葉亂由牽荇絲飄為折蓮濺妝疑薄汗沾衣似故湔浣紗流暫濁汰錦色還鮮參同趙飛燕借問李延年從來入絃管誰在櫂歌前怨歌行十五頗有餘日照杏梁初蛾眉本多嫉掩鼻特成虛持此傾城貌翻為不肖軀秋風吹海水寒霜依玉除月光臨户駛荷花依浪舒望簷悲雙翼窺沼泣前魚苔生履處沒草合行人疏裂紈傷不盡歸骨恨難祛早知長信别不避後園輿美女篇佳麗盡關情風流最有名約黃能效月裁金巧作星粉光勝玉靚衫薄擬蟬輕密態隨流臉嬌歌逐軟聲朱顔半已醉微笑隱香屏鬬雞歡樂良無已東郊春可遊百花非一色新田多異流龍尾橫津漢車箱起戍樓玉冠初警敵介羽忽猜儔十日驕既滿九勝勢恆遒脫使田饒見堪能說魯侯苦熱行六龍騖不息三伏起炎陽寢興煩几案俯仰倦幃牀滂沱汗似鑠微靡風如湯洄池愧玉浪蘭殿非含霜細簾時半卷輕幌乍橫張雲斜花影沒日落荷心香願見洪崖井詎憐河朔觴茱茰女茱茰生狹斜結子復銜花遇逢纎手摘濫得映鉛華雜與鬟簮插偶逐鬢鈿斜東西爭贈玉縱橫來問家不無夫壻馬空駐使君車棗下何纂纂古咄唶歌曰棗下何攢攢榮華各有時垂花臨碧澗結翠依丹巘非直入游宫兼期植靈苑落日芳春暮遊人歌吹晚弱刺引羅衣朱實凌還幰且歡洛浦詞無羡安期逺金樂歌槐香欲覆井楊桞正藏鴉山爐好無比玉構火忩賖牀頭辟繩結鏡上領巾斜鐡鑊種梁子銅樞生棗花開門拋水柱一作信城案特言家行幸甘泉宫雉歸海水寂表來重譯通吉行五十里隨處宿離宫鼓聲恆入地塵飛上暗空尚書隨豹尾太史逐相風銅鳴周國鐩旗曵楚雲虹幸臣射覆罷從妓新歌終董逃拜金紫賢妻侍禁中不羡神仙侣排烟逐駕鴻有所思昔未離長信金翠奉乘輿何言人事異夙昔故恩疏寂寞錦筵靜玲瓏玉殿虛掩閨泣團扇羅幌詠蘼蕪和湘東王橫吹曲三首折楊栁樂府作栁惲者非楊桞亂成絲攀折上春時葉密鳥飛礙風輕花落遲城高短簫發林空畫角悲曲中無别意併是為相思洛陽道洛陽佳麗所大道滿春光遊童初挾彈蠶妾始提筐金鞍照龍馬羅袂拂春桑玉車爭晚入潘果溢高箱紫騮馬賤妾朝下機正值良人歸青絲懸玉鐙朱汗染香衣驟急珂彌響􅘠多塵亂飛雕菰幸可薦故心君莫違長安道神臯開隴右陸海實西秦金槌一作椎輪抵長樂復道向宜春落花依度幰垂桞拂行輪一作人金張及許史夜夜尚留賓江南思江南有妙伎時則應璿樞月暈蘆灰缺秋還懸炭枯含丹和九轉芳樹䕃千株何辭天后誚終是列一作到仙都江南行桂楫晚應旋歷岸扣輕舷紫荷擎釣鯉銀一作銅筐插短蓮人歸浦口暗那得久回船雞鳴高樹顛碧玉好名倡夫壻侍中郎桃花全覆井金門半隱堂時欣一來下復比雙鴛鴦雞鳴天上早東烏定未光明君詞玉豔光瑶質金鈿婉黛紅一去葡萄觀長别披香宫秋簷照漢月愁帳入胡風妙工偏見詆無由情恨通當置酒陸士衡集亦載此詩今從樂府作簡文置酒宴嘉賓矚逈臨飛觀絶嶺隔天餘長嶼橫江半日色花上綺風光水中亂三益既葳蕤四始方䓗粲詠中婦織流黃翻花滿階砌愁人獨上機浮雲西北起孔雀東南飛調絲時繞腕易鑷乍牽衣鳴梭逐動釧紅妝映落暉艷歌曲雲楣桂成戶飛棟杏為梁斜窗通蕊氣細隟引塵光裁衣魏后尺汲水淮南牀青驪暮當返預使羅裙香怨詩秋風與白團本自不相安新人及故愛意氣豈能寬黃金肘後鈐白玉案前盤誰堪空對此還成無嵗寒採蓮曲晚日照空磯採蓮承晚暉風起湖難度蓮多摘未稀棹動芙蓉落船移白鷺飛荷絲傍繞腕菱角逺牽衣霹靂引來從東海上發自南山陽時聞連鼓響乍散投壺光飛車走四瑞繞電發時祥令去於斯表殺來永傳芳雉朝飛操晨光照麥畿平野度春翬避鷹時聳角妬壠或斜飛少年從逺役有恨意多違不如隨蕩子羅袂拂塵衣貞女引借問懷春臺百尺凌雲霧北有嵗寒松南臨女貞樹庭花對帷滿隙月依枝度但使明妾心無嗟坐遲暮龍丘引龍丘一回首楚路蒼無極水照弄珠影雲吐陽臺色浦狹村烟度洲長歸鳥息遊蕩逐春心空憐無羽翼當壚曲十五正團圓流光滿上蘭當壚設夜酒宿客解金鞍迎來挾琴易送别唱歌難欲知心恨急翻令衣帶寬升仙篇少室堪求道明光可學仙丹繒碧林宇緑玉黃金篇雲車了無轍風馬詎須鞭靈桃恆可餌幾回三千年愛妾換馬功名幸多種何事苦生離誰言似白玉定是愧青驪必取匣中釧回作飾金羈