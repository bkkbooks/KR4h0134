body:
  text: 漢魏六朝百三家集巻一百六陳張正見集題詞東海徐隱忍在陳太建時與名士十餘人遊宴賦詩動成巻軸集而叙之至今稱文㑹者輒頌候司空諸記室云隱忍詩不多見惟日出東南隅行與遊鍾山開善寺二詩盛行世間餘客詩文少傳其最多者則推清河張見賾然本集十四巻詩賦間存賦三首又語致蕭條則散騎著作得稱集者恃有詩耳史云見賾詩尤善五言篇中蜀郡隨金馬天津應玉衡天路横秋水星橋轉夜流其著者也夫陳隋詩格風氣開唐五言聲響尤為近之祖孫登蓮調劉刪泛宫亭湖全首唐律固不足道即陰徐江沈陳朝大手其詩亦有類唐者見賾才年適相兄弟堯風鼓吹或假途轍憎者病其雖多奚為喜者謂其聲骨雄整女以悦容豈能自言美惡哉梁陳顯晦隨俗善持當時文士能若此者即云寡過矣目録賦山賦石賦哀桃賦啟謝賜錢啟樂府釣竿篇度関山晨鷄髙樹鳴採桑艶歌行從軍行三婦艶詩置酒髙殿上門有車馬客行白頭吟情詩應龍篇輕薄篇帝王所居篇朱鷺上之囘戰城南君馬黄二首芳樹有所思雉子斑臨髙臺隴頭水二首折楊柳關山月洛陽道梅花落紫騮馬雨雪曲劉生公無渡河對酒銅雀臺長安有狹斜行欽馬長城窘泛舟横大江煌煌京洛行明君嗣神仙篇又前有一樽酒行詩御幸樂遊苑侍宴重陽殿成金石㑹竟上詩征虜亭送新安王應令征籍田應衡陽王教作從永陽王遊虎丘山陪衡陽王遊耆闍寺與錢𤣥智汎舟遊匡山簡寂館和諸葛覽從軍游獵山家閨怨和陽侯送袁金紫𦵏傷韋侍讀後湖泛舟遊龍首城别韋諒賦得江湖汎别舟星名從軍詩賦得韓信行經季子廟賦得落落窮巷士賦得日中市朝滿賦得題新雲賦得白雲臨酒詠雪應衡陽王教賦得雪映夜舟薄帷鑒明月𤣥圃觀春雪秋河曙耿耿浦狹村煙度和衡陽王秋夜賦得山卦名初春賦得池應教賦得垂柳映斜谿賦得岸花臨水發賦得風生翠竹裏應教賦得山中翠竹賦得梅林輕雨應教賦新題得蘭生野徑賦得威鳯棲梧賦得魚躍水花生賦新題得寒樹晩蟬疎賦得秋蟬咽柳應衡陽王教秋日别庾正員賦得佳期竟不歸賦得堦前嫩竹漢魏六朝百三家巻一百六目録欽定四庫全書漢魏六朝百三家集巻一百六明張漙輯陳張正見集賦山賦何神山之峻美諒苞結之所成東垂曰泰南服稱衡西戎所擅北狄標名於是堯値洪流淊天襄陵禹敷水土奠高刋木衆川既導羣嶽自修潜通四瀆鎭壓九州森羅辰象吐吸雲霧深不可測逺不可歩於廓靈山長為作固爾其為狀也則武當太和武功太白崑崙五門扶寧三石峯髙一萬峭峙三百登而眺之則千里無極俯而臨之則萬仭難測暎白鶴而同髙混青天而共色石賦連山蔽虧巨石嶔﨑上興雲而蔚薈下激水而推移舒丹霞於九折混白露於三危鎭方城於濮水固天闕於湯池開五嶽之靈圖集九老之仙都韜神弓於射的産利劍於昆吾魚躍湘鄉之水鴈浮平固之湖墮山鵲之金印碎驪龍之寳珠晻藹披衣氤氲翠微精衛取而塡海天孫用以支機隨西王而不落傍東武而俱飛衰桃賦巖巖秀峯吐桂榮松獨夭桃之灼灼輕擢采於寒蹤爾乃萬株成錦千林似翼苔畵波文花然樹色發秦源而逸氣飄漢綬而流芳譬蘭缸之夜炷似明鏡之朝妝成蹊列逕光崖艶汜間眞定之蒼梨雜房陵之縹李芬芳難歇照曜無儔舒若霞光欲起散似電采將收既而風落新枝霜飛故葉歎垂釣之妖童怨傾城之麗妾啟謝賜錢啟豈期疲痾壁立猥䝉殊賜名稱榆莢非投飲馬之橋價重圓泉寧棄呪鷄之野暫移周府纔經漢鑄始降王門忽光私室青鳬委質笑夷甫之不言赤仄垂緍重河間之能數樂府釣竿篇以下五言結宇長江側垂釣廣川潯竹竿横翡翠桂髓擲黄金人來水鳥没檝度岸花沉蓮揺見魚近綸盡覺潭深渭水終須卜滄浪徒自吟空嗟芳餌下獨見有貪心度關山關山度曉月劍客逺從征雲中出迥陣天外落竒兵輪摧偃去節樹倒礙懸旌沙揚折坂暗雲積榆溪明馬倦時銜草人疲屢看城寒隴胡笳澁空林漢鼓鳴還聽嗚咽水併切斷腸聲晨鷄髙樹鳴阮籍詠懐詩曰晨鷄鳴髙樹命駕起旋歸晨鷄振翮鳴出迥擅竒聲蜀郡隨金馬天津應玉衡摧冠驗逺石繫火出連營用江適事爭棲斜掲暮解翼横飛度試飲淮南藥翻上仙都樹枝低且候潮業淺還承露承露觸嚴霜葉淺伺朝陽猜羣袪寳劍勇戰出花塲當損黄金距誰論白玉璫長鳴逢晉帝恃氣遇周王流名説魯國分影入陳倉不復愁苻朗猶能感孟嘗採桑春樓曙鳥驚蠶妾候初晴迎風金珥落向日玉釵明徙顧移籠影攀鉤動釧聲葉高知手弱枝軟覺身輕人多羞借問年少怯逢迎恐疑夫婿逺聊復答專城艶歌行城隅上朝日斜暉照杏梁併倦茱茰帳爭移翡翠牀縈環聊向牖拂鏡且調妝裁金作小靨散麝起㣲黄二八秦樓婦三十侍中郎執㦸超丹地豐貂入建章未安文史閣獨結少年場彎弧貫葉一作月影學劍動星芒翠葢飛城曲金鞍横道傍調鷹向新市彈雀徃睢陽行行稍有極暮暮歸蘭芳前瞻富羅綺左顧足鴛鴦蓮舒千葉氣燈吐百枝光滿酌胡姬酒多燒荀令香不學幽閨妾生離怨採桑從軍行胡兵屯薊北漢將起山西故人輕百戰聊欲定三齊風前噴畵角雲上舞飛梯鴈塞秋聲逺龍沙雲路迷燕然自可勒函谷詎須泥三婦艶詩大婦織殘絲中婦妬蛾睂小婦獨無事歌罷詠新詩上客何須起為待絶纓時置酒髙殿上曹子建箜篌引日置酒髙殿上親友從我遊陳王門甲第粉壁麗椒塗髙牕侍玉女飛闥敝金鋪名香散綺幕石硯雕金鑪清醪稱玉饋浮蟻擅蒼梧鄒嚴恒接武申白日相趨容與升階玉差池曳履珠千金一巧笑百萬兩鬟姝趙姬未鼓瑟齊客罷吹竽歌喧桃與李琴挑鳯將雛魏君慙舉白晉主媿投壺風雲更代序人事有榮枯長卿病消渇壁立還成都門有車馬客行飛觀霞光啟重門平旦開北闕髙箱過東方連騎來紅塵揚翠轂赭汗染龍媒桃花夾徑聚流水傍池回揮鞭聊接電捐軫暫停雷非關萬里客自有六竒才琴和朝雉操酒泛夜光杯舞袖飄金谷歌聲遶鳯臺良時不可再騶馭鬱相催安知太行道失路車輪摧白頭吟平生懐直道松桂比眞風語黙妍媸際沉浮毁譽中䜛新恩易盡情去寵難終彈珠金市側抵玉春一作崑山東含香老顔駟執㦸異揚雄惆悵崔亭伯幽憂馮敬通王嬙沒胡塞班女棄深宫春苔封履跡秋葉奪妝紅顔如花落槿鬢似雪飄蓬此時積長歎傷年誰復同情詩新豐妖冶地遊俠競嬌奢池臺間羅綺桃李襍烟霞葢影分連騎衣香合並車艶粉驚飛蝶紅妝映落花舞衫飄冶袖歌扇掩團紗玉牀珠帳巻金樓鏡月斜還疑蕭史鳯不及季倫家應龍篇應龍未起時乃在淵底藏非雲足不蹈舉則冲天翔譬彼野蘭草幽居常獨香清風播四逺萬里望芬芳隱居可頥志自見焉得彰輕薄篇洛陽美年少朝日正開霞細蹀連錢馬傍趨苜蓿花揚鞭還却望春色滿東家井桃映水落門柳雜風斜綿蠻弄清綺蛺蝶遶承華欲徃飛廉館遥駐季倫車石榴傳瑪瑙蘭肴奠象牙聊持自娱樂未是鬬豪奢莫嫌龍馭晩扶桑復浴鵶帝王所居篇崤函惟帝宅宛雒壯皇居紫微臨複道丹水亘通渠沉沉飛雨殿藹藹承明廬兩宫分槩日雙闕竝凌虗休氣充青𤨏榮光入綺疎霞明仁壽鏡日照凌雲書鳴鸞背鳷鵲詔蹕幸儲胥長楊飛玉輦御宿徙金輿柳葉飄緹騎槐花影屬車薄暮歸平樂歌鐘滿玉除朱鷺金堤有朱鷺刷羽望滄瀛周詩振雅曲漢鼓發竒聲時將赤鴈竝乍逐彩鸞行别有翻潮處異色不相驚上之囘林光稱避暑囘中乃吉行龍媒躡影駛玉輦御雲輕風烏繞鳷鵲綵鷁照昆明欲知鐘箭逺遥聽寳鷄聲戰城南薊北馳胡騎城南接短兵雲屯兩陣合劍聚七星明旗交無復影角憤有餘聲戰罷披軍䇿還嗟李少卿君馬黄二首幽并重騎射征馬正盤桓風去嘶聲逺冰堅度足寒出關聊變色上坂屢停鞍即令隨御史非復在樓蘭五色乘馬黄追風時滅沒血汗染龍花胡鞍抱秋月唯騰渥洼水不飲長城窟詎待燕昭王千金市駿骨芳樹竒樹舒春苑流芳入綺錢合歡分四照同心影萬年香浮佳氣裏葉映彩雲前欲識揚雄賦金玉滿甘泉有所思深閨久離别積怨轉生愁徒思裂帛鴈空上望歸樓看花憶塞草對月想邊秋相思日日度玉臺作暮淚臉年年流雉子斑陳倉雉未飛歛翮依芳甸朱色尚淺錦臆毛初變雊麥且専場排花聊勇戰唯當渡弱水不怯如臯箭臨髙臺層臺邇清漢出迥架重棼飛棟臨黄鶴髙牕度白雲風前朱幌一作幔色霞處綺疏分此中多怨曲地逺詎能聞隴頭水二首隴頭鳴四注征人逐貳師𦍑笛含流咽胡笳襍水悲湍髙飛轉駛澗淺蕩還遲前旌去不見上路杳無期隴頭流水急流急行難渡逺入隗囂營傍侵酒泉路心交賜寳刀小婦成紈袴欲知别家久戎衣今巳故折楊柳楊柳半垂空裊裊上春中枝疎董澤箭葉碎楚臣弓色映長河水花飛髙樹風莫言限宫掖不閉長楊宫關山月巖間度月華流彩映山斜暈逐連城璧輪隨出塞車唐蓂遥合影秦桂逺分花欲驗盈虗理一作駛方知道路賖洛陽道曽城啟旦扉上路滿春暉柳影縁溝合槐花夾岸飛蘇合彈珠罷黄間負翳歸紅塵暮不息相看連騎稀梅花落芳樹映雪一作雲野發早覺寒侵落逺香風急飛多花逕深周人歎初摽魏帝指前林邊城少灌木折此自悲吟紫騮馬將軍入大宛善馬出從戎影絶乾河上聲流入一作冰窟中似鹿猶依草如龍欲向空須還十萬里試為一追風雨雪曲胡關辛苦地雪路逺漫漫含冰踏馬足襍雨凍旗竿沙漠飛恒暗天山積轉寒無因辭日逐團扇掩齊紈劉生劉生絶名價豪俠恣遊陪金門四姓聚繡轂一作簫鼓五香一作侯來塵飛瑪瑙勒酒映車渠杯别有追遊夜秋牕向月開公無渡河金堤分錦纜白馬渡蓮舟風嚴歌響絶浪湧榜人愁櫂折桃花水颿横竹箭流何言沈壁處千載偶陽侯對酒當歌對玉酒匡坐酌金罍竹葉三清泛蒲萄百味開風移蘭氣入月逐桂香來獨有劉將阮忘情寄羽杯銅雀臺凄凉銅雀晩揺落暮田通雲慘當歌日松吟欲舞風人疏瑶席冷曲罷繐帷空可惜年將淚俱盡望林中長安有狹斜行少年重遊俠長安有狹斜路窄時容馬枝高易度車簷髙同落照巷小共飛花相逢夾繡轂借問是誰家飲馬長城窟行秋草朔風驚飲馬出長城羣驚還怯飲地險更宜行傷冰歛凍足畏冷急寒聲無因度呉坂方復入𦍑城泛舟横大江魏文帝飲馬長城窟行曰泛舟横大江討彼犯荆虜大江修且濶揚舲度迴磯波中畵鷁涌汎上錦花飛舟移歷浦月櫂舉濕春衣王孫定若逺詎待送將歸煌煌京洛行千門儼西漢萬戸擅東京凌雲霞上起鳷鵲月中生風塵暮不息簫管夜恒鳴唯當賣藥處不入長安城明君嗣寒樹暗胡塵霜樓明漢月涙染上春衣憂變華年髪神仙篇襍言瀛洲分渤澥閬苑隔虹蜺欲識三山路須尋千仭溪石梁雲外立蓬丘霧裏迷年深毁丹竈學久棄青泥葛水留還杖天衢鳴去鷄六龍驤首起雲閣萬里一别何寥廓𤣥都府内駕青牛紫葢山中乘白鶴潯陽杏花終難朽武陵桃花未曽落已見玉女笑投壺復覩仙童欣六博同甘玉文棗俱飲流霞藥鸞歌鳯舞集天台金闕銀宫相向開西王已令青鳥去東海還馭赤虬來魏武還車逢漢女荆王因夢識陽臺鳯葢隨雲聊蔽日霓裳雜雨復乘雷神嶽吹笙揺謝手當知福地有神才又見文苑英華樂府作沈約題云樂未央億舜日萬堯年詠湛露歌采蓮願襍百和氣宛轉金爐前前有一樽酒行前有一樽酒主人行壽今日合來坐者當令皆富且壽欲令主人三萬嵗終嵗不知老為吏當髙遷賈市得萬倍桑蠶當大得主人宜子孫詩御幸樂遊苑侍宴以下五言大君臨四表榮光普八埏區中文化洽海外武功宣鳯下書丹篆龜