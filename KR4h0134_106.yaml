籠雲歸仙井暗霧解石橋通影帶臨峯鶴形隨雜雨風尋師不失路咸欲馭飛鴻初春賦得池應教遙天收密雨髙閣映奔曦雪盡青山路冰銷緑水池春光落雲葉花影發晴枝琴樽奉終宴風月豈云疲賦得垂柳映斜溪千仭清溪險三陽弱柳垂葉細臨湍合根空帶石危風翻夾浦絮雨濯倚流枝不分梅花落還同橫笛一作笛裏吹賦得岸花臨水發何遜贈諸遊舊詩岸花臨水發江燕繞檣飛竒樹滿春洲落蘂映江浮影間蓮花石光涵濯錦流漾色隨桃水飄香入桂舟别有仙潭菊含芳獨向秋賦得風生翠竹裏應教金風起燕觀翠竹夾梁池翻花疑鳯下揚水似龍移帶露依深葉飄寒入徑枝聊因萬籟響詎待伶倫吹賦得山中翠竹修竹映巖垂來風異夾池復澗藏髙節重林隱徑枝雲生龍未上花落鳯將移莫言棲嶰谷伶倫不復吹賦得梅林輕雨應教梅樹耿長虹芳林散輕雨蜀郡隨仙去陽臺帶雲聚飄花更濯枝潤石還侵柱詎得零陵燕隨風時共舞賦新題得蘭生野徑披襟出蘭畹命酌動幽心鋤罷還開路歌喧自動琴華燈共影落芳杜雜花深莫言閒徑裏遂不斷黃金賦得威鳯棲梧初學云賦得棲梧桐威鳯丹山下威鳯來集帝梧中欲舞春花落將飛秋葉空影照龍門水聲入洞庭風别有將雛曲翻更合絲桐賦得魚躍水花生漾色桃花水相望濯錦流躍浦疑珠出依池似鏡浮淩波銜落蘂觸餌避沉鈎方遊蓮葉外詎入武王舟賦新題得寒樹晚蟬疏寒蟬噪楊柳朔吹犯梧桐葉迥飛難住枝殘影共空聲疏飲露後唱絶斷絃中還因搖落處寂寞盡秋風賦得秋蟬咽柳應衡陽王教秋鴈寫一作氣爽遙天園柳集驚蟬競噪長枝裏爭飛落木前風髙知響急樹近覺聲連長楊流唱盡詎識蔡雍絃秋日别庾正員英華作徐陵征途愁轉斾連騎慘停鑣朔氣凌疏木江風送上潮青雀離帆逺朱鳶别路遙唯有當秋月夜夜上河橋賦得佳期竟不歸七言庾肩吾有所思日佳期竟不歸春物坐芳菲良人萬里向河源娼婦三愁思柳園路逺寄詩空織錦宵長夢返欲驚魂飛蛾屢繞帷前燭哀草還侵階上玉銜啼拂鏡不成粧促柱繁絃還亂曲時分玉臺後集作特忿年移竟不歸偏憎寒急夜縫衣流螢映月明空帳疏葉從風入斷機自對孤鸞向影絶終無一鴈帶書回賦得階前嫩竹翠竹梢雲自結叢輕花嫩筍欲凌空砌曲橫枝屢解籜階前疏葉强來風欲知抱節成龍處當於山路葛陂中漢魏六朝百三家集卷一百六
