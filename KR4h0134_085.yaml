body:
  text: 漢魏六朝百三家集卷八十五江淹集題詞南史江文通任彥升王僧孺同傳三人俱有長者行詩文新麗頓挫並一時之傑也文通雜體三十首體貌前哲欲兼關西鄴下河外江南總製羣善興會髙逺而深厚不如非其才絀世限之也謝客兒擬魏太子鄴中集詩八首評者謂其氣象不類下遜文通亦意為輕重非謝所服江詩擬臨川遊山又似深知謝者蓋文通之學華少於宋壯盛於齊及梁則為老成人矣身歷三朝辭該衆體恨别二賦音制一變長短篇章能寫胸臆即為文字亦詩騷之意居多余每私論江任二子縱衡駢偶不受羈靮若是生逢漢代奮其才果上可為枚叔谷雲次亦不失馮敬通孔北海而晚際江左馳逐華采卓爾不羣誠有未盡世猶傳文通暮年才退張載問錦郭璞索筆則幾姤口矣目録賦别賦恨賦泣賦去故鄉賦思北歸賦哀千里賦知巳賦有序傷友人賦有序傷愛子賦有序麗色賦水上神女賦娼婦自悲賦有序赤虹賦有序四時賦學梁王兔園賦有序丹砂可學賦有序江上之山賦井賦橫吹賦有序燈賦扇上綵畫賦空青賦蓮華賦有序靈丘竹賦青苔賦有序金燈草賦翡翠賦石􅎕賦有序詔北伐詔遣使巡行詔立學詔斷募士詔慰勞雍州詔賜赦交州詔曲赦丹陽等四郡詔大赦詔王儉為左僕射詔王儉領太子詹事詔王鎮軍為中書令右光祿詔張令為太常領國子祭酒詔為何詹事拜吏部尚書詔王撫軍為安東吳興詔王光祿為征南湘州詔栁僕射為南兖州詔王侍中為南蠻校尉詔王僕射加兵詔禇侍中為征北長史詔封江冠軍等詔蕭冠軍進號征虜詔教為建平王聘隱逸教建平王赦五刑教為蕭太傅東耕教為蕭驃騎發徐州三五教為蕭驃騎築新亭壘埋枯骸教表拜中書郎謝表拜正員外郎表為建平王慶明帝疾和禮上表建平王慶安城王拜封表建平王之南徐州刺史辭闕表建平王讓右將軍荆州刺史表為蕭驃騎讓封第二表為蕭驃騎讓封第三表為蕭驃騎録尚書事到省表為蕭驃騎讓豫司二州表為蕭驃騎上頓表為蕭驃騎謝慰勞表為蕭驃騎慶平賊表為蕭驃騎解嚴輸黃鉞表為蕭驃騎讓油幢表為蕭驃騎謝甲仗入殿表為蕭驃騎讓太尉增封第二表為蕭驃騎讓太尉增封第三表為蕭太尉上便宜表為蕭讓太傅揚州牧表為蕭重讓揚州表為蕭三讓揚州表為蕭太傅謝侍中敦勸表為蕭重讓尚書敦勸表為蕭太傅謝追贈父祖表為蕭讓劒履殊禮表為蕭太傅讓前部羽葆鼓吹表為蕭太傅讓輿駕親幸表謝開府辟召表為蕭上銅鐘芝草衆瑞表為蕭太傅讓相國齊公十郡九錫表為蕭讓九錫第二表為蕭讓謝百僚敦勸表為蕭相國讓進爵為王表為蕭相國拜齊王表為齊王謝冕旒諸法物表為齊王讓禪表章為建平王拜右衛將軍荆州刺史章為始安王拜征虜將軍南兖州刺史章為始安王拜征虜將軍丹陽尹章為建平王慶少帝登祚章為建平王太后正位章為建平王慶江皇后正位章為蕭領軍拜侍中刺史章為蕭拜太尉揚州牧章為蕭拜相國齊公十郡九錫章符尚書符奏記奏記南徐州新安王箋到主簿日詣建平王箋被黜為吳興令辭建平王箋到功曹參軍詣竟陵公子良箋啓為建平王慶改號啓為建平王讓鎮南徐州刺史啓為建平王謝賜石硯等啓為建平王謝玉環刀等啓為蕭領軍讓司空并敦勸啓為蕭太尉子姪拜領軍江州兖州豫州淮南黃門謝啓上書獄中上建平王書書與交友論隱書報袁叔明書敕為朝賢答劉休範書論無為論頌閩中草木頌十五首有序金荆相思豫章栟櫚杉柳楊梅山桃石榴木蓮石菖蒲黃連薯蕷杜若藿香讃銅劒讃有序雲山讃四首有序王太子隂長生白雲秦女誄齊太祖髙皇帝誄傳袁叔明傳自序傳墓銘宋尚書左丞孫緬墓銘宋安成王右常侍劉喬墓銘宋光祿大夫孫敻墓銘齊御史中丞孫詵墓銘齊司徒右長史檀超墓銘行狀建平王太妃周氏行狀祭文蕭太傅東耕祝文蕭驃騎祭石頭戰亡文騷遂古篇雜詞有序構象臺訪道經鏡論語悅曲池愛逺山應謝主簿騷體劉僕射東山集學騷山中楚詞五首漢魏六朝百三家集卷八十五欽定四庫全書漢魏六朝百三家集卷八十五明張溥輯江淹集賦别賦黯然銷魂者唯别而巳矣况秦吳兮絶國復燕宋兮千里或春苔兮始生乍秋風兮暫起是以行子腸斷百感悽惻風蕭蕭而異響雲漫漫而竒色舟凝滯於水濱車逶遲於山側棹容與而詎前馬寒鳴而不息掩金觴而誰御橫玉柱而沾軾居人愁臥恍若有亡日下壁而沈彩月上軒而飛光見紅蘭之受露望青楸之罹霜巡層楹而空掩撫錦幕以虛涼知離夢之躑躅意别魂之飛揚故别雖一緒事乃萬族至若龍馬銀鞍朱軒繡軸帳飲東都送客金谷琴羽張兮簫鼓陳燕趙歌兮傷美人珠與玉兮豔暮秋羅與綺兮嬌上春驚駟馬之素秣聳淵魚之赤鱗造分手而銜涕咸寂寞而傷神乃有劒客慙恩少年報士韓國趙厠吳宮燕市割慈忍愛離邦去里瀝泣共訣抆血相視驅征馬而不顧見行塵之時起方銜感於一劒非買價於泉裏金石震而色變骨肉悲而心死或乃邊郡未和負羽從軍遼水無極鴈山參雲閨中風暖陌上草薰日出天而耀景露下地而騰文鏡朱塵之照爛襲青氣之煙煴攀桃李兮不忍别送愛子兮沾羅裙至如一赴絶國詎相見期視喬木兮故里訣北梁兮永辭顧左右兮魄動視親賓兮淚滋可班荆兮增恨唯樽酒兮敘悲值秋鴈兮飛日當白露兮下時怨復怨兮逺山曲去復去兮長河湄又若君居淄右妾家河陽同瓊珮之晨照共金爐之夕香君結綬兮千里惜瑶草之徒芳慙幽宮之琴瑟晦髙臺之流黃春閨閟此青苔色秋帳含兹明月光夏簟青兮晝不暮冬缸凝兮夜何長織錦曲兮泣已盡回文詩兮影獨傷儻有華隂上士服食還仙術將妙而猶學道巳寂而未傳守丹竈而不顧鍊金鼎而方堅駕鶴上漢驂鸞騰天暫遊萬里少别千年惟世間兮重别謝主人兮依然下有芍藥之詩佳人之歌桑中衛女上宫陳娥春草碧色春水緑波送君南浦傷如之何至乃秋露如珠秋月如圭明月白露光隂往來與子之别思心徘徊是以别方不定别理千名有别必怨有怨必盈使人意奪神駭心折骨驚雖淵雲之墨妙嚴樂之筆精金閨之諸彥蘭臺之羣英賦有凌雲之稱辨有雕龍之聲詎能摹暫離之狀寫永訣之情者乎恨賦試望平原蔓草縈骨拱木斂魂人生到此天道寧論於是僕本恨人心驚不已直念古者伏恨而死至如秦帝按劒諸侯西馳削平天下同文共規華山為城紫淵為池雄圖既溢武力未畢方架黿鼉以為梁巡海右以送日一旦魂斷宮車晚出若乃趙王既虜遷於房陵薄暮心動昧旦神興别豔姬與美女喪金輿及玉乘置酒欲飲悲來填膺千秋萬嵗為恨難勝至如李君降北名辱身寃拔劒擊柱弔影慙魂情往上郡心留雁門裂帛繫書誓還漢恩朝露溘至握手何言若夫明妃去時仰天太息紫臺稍遠關山無極搖風忽起白日西匿隴鴈少飛岱雲寡色望君王兮何期終蕪絶兮異域至乃敬通見抵罷歸田里閉關却掃塞門不仕左對孺人右顧稚子脫略公卿跌宕文史齎志沒地長懷無巳及夫中散下獄神氣激揚濁醪夕引素琴晨張秋日蕭索浮雲無光鬱青霞之竒意入修夜之不㿩或有孤臣危涕孽子墜心遷客海上流戌隴隂此人但聞悲風汨起泣下沾襟亦復含酸茹歎銷落煙沈若乃騎疊迹車屯軌黃塵匝地歌吹四起無不煙斷火絶閍骨泉裏已矣哉春草暮兮秋風驚秋風罷兮春草生綺羅畢兮池館盡琴瑟滅兮丘壠平自古皆有死莫不飲恨而吞聲泣賦秋日之光流兮以傷霧離披而殺草風清泠而繞堂視左右而不臑具衣冠而自涼默而登髙谷坐景山倚桐柏對石泉直視百里處處秋煙閴寂以思情緒留連江之永矣蓮欲紅南有喬木葉以窮心蒙蒙兮恍惚魄漫漫兮卥東詠河兖之故俗眷徐揚之遺風眷徐揚兮阻關梁詠河兖兮路未央道尺折而寸斷魂十逝而九傷欷潺湲兮沫袖泣嗚唈兮染裳若夫景公齊山荆卿燕市孟嘗聞琴馬遷廢史少卿悼躬夷甫傷子皆泣緒如絲詎能仰視鏡終古而若斯况余輩情之所使哉去故鄉賦日色暮兮隱吳山之丘墟非風析兮絳花落流水散兮翠莖疏愛桂枝而不見悵浮雲之離居乃凌大壑越滄淵茫茫積水􅤆􅤆斷山窮隂匝海平蕪帶天於是泣故關之已盡傷故國之無際出汀州而解冠入溆浦而捐袂聽蒹葭之蕭瑟知霜露之流滯對江臯而自憂弔海濱而傷嵗撫尺書而無悅倚樽酒而不持去室宇而逺客遵蘆葦以為期情嬋娟而未罷愁爛漫而方滋切趙瑟以橫涕吟燕笳而坐悲少歌曰芳洲之草行欲暮桂水之波不可渡絶世獨立兮報君子之一顧是時霜翦蕙兮風摧芷平原晚兮黃雲起寧歸骨於松柏不買名於城市若濟河無梁兮沈此心於千里重曰江南之杜蘅兮色以陳願使黃鵠兮報佳人橫羽觴而掩望撫玉琴兮何親瞻層山而蔽日流餘涕以沾巾恐髙臺之易晏與螻蟻而為塵思北歸賦伊小人之薄伎奉君子而輸力接河漢之雄才覽日月之英色絶雲氣而厲響負青天而撫翼德被命而不渝恩潤身而無極何規矩之守任信愚陋而不肖愧金碧之琳琅慙丹雘之照曜樊天網而自離徒夜分而誰弔遭大道之隆盛雖草木而勿履誤銜造於逺國出顛沛之願始去三輔之臺殿辭五都之城市惟江南兮丘墟遙萬里兮長蕪帶封狐兮上景連雄虺兮蒼梧當青春而離散方仲冬而遂徂寒蒹葭於余馬傷霧露於農夫跨金峰與翠巒涉桂水與碧湍雲清冷而多緒風蕭條而無端猿之吟兮日光迥狖之啼兮月色寒究煙霞之繚繞具林石之巑岏於是臨虹霓以築室鑿山楹以為柱上皓皓以臨月下淫淫而愁雨奔水潦於逺谷汨木石於深嶼鷹隼戰而櫓巢黿鼉怖而穴處若季冬之嚴月風搖木而騷屑玄雲合而為凍黃煙起而成雪虎踡局而斂步蛟蚭而失穴至江蘺兮始秀或杜衡兮初滋桂含香兮作葉藕生蓮兮吐絲俯金波兮百丈見碧沙兮來往霧葐蒕兮半出雲雜錯兮飛上石照爛兮各色峰近逺兮異象及回風之搖蕙天潭潭而下露木蕭梢而可哀草林離而欲暮夜燈光之寥迥歷隱憂而不去心湯湯而誰告魄寂寂而何語情枯稿而不反神翻覆而亡據夫以雄才不世之主猶儲精於沛鄉竒略獨出之君尚婉戀於樊陽潘去洛而掩涕陸出吳而增傷况北州之賤士為炎土之流人共魍魎而相偶與蠨蛸而為鄰秋露下兮點劒舄青苔生兮綴衣巾步庭蕪兮多蒿棘顧左右兮絶親賓憂而填骨思兮亂神願歸靈於上國雖坎軻而不惜身哀千里賦蕭蕭江隂兮荆山之岑北繞琅琊碣石南馳九疑桂林山則異嶺竒峰橫嶼帶江雜樹億尺紅霞萬重水則逺天相逼浮雲共色沄沄無底溶溶不測其中險如孟門豁若長河參差巨石縱橫龜鼉若乃夏后未鑿秦皇未闢㟻巖生岸迤邐成迹馳湍走浪漂沙擊石伊孟冬之初立出首夏以歸來自出國而辭友永懷慕而抱哀魂終朝以三奪心一夜而九摧徒望悲其何及銘此恨於黃埃於是鴻鴈既鳴秋光亦窮水黯黯兮蓮葉動山蒼蒼兮樹色紅思雲車兮沅北望霓裳兮澧東惜重華之巳沒念芳草之坐空既而悄愴成憂憫默自憐信規行之未曠知矩步之巳難雖河北之爽塏猶橘柚之不遷及年嵗之未晏願匡坐於霸山知已賦有序陳國之華者故吏部郎殷孚其人也博而能通學無不覽雅賞文章尤愛竒逸雖志隱巖石而名動京師矣才多深見氣有逺度雖安期千里不能尚焉始於北府相值傾蓋無已僕乃得罪嶠外遐路窈然始還舊都會君尋卒故為兹賦以寄深哀順祇效寶瀆靈會昌時雨種祉山雲降祥承瑶葉之餘曖系金枝之末光聳孤韻以風邁騫逸氣以煙翔故學不常師而心鏡羣籍理不啓問而情照諸密採圗辨緯逰璣訪歷濳志百氏沈神六經冥析義象該洽性靈儒不隱迹墨無遁形既含道潤亦發才華采耀秋月文麗冬霞有體有豔光國光家識包上仁義兼髙行如彼清波可挹可鏡又象沖室惟清惟淨氣擬北海情方中散風流未輟盛名猶纂英馳芬激譽流聲滿我筠心而松性君金采而玉相伊邂逅之未遇爰契濶於朱方丹瓊譬而非寶緑蘭比而無芳每賞矜其如契貴懷允而不忘亟間席兮惆悵屢緩帶而從容論十代兮興毁訪五都兮異同談天理之開基辨人道之始終罄龍圖及鳯書傾蒼册與篆字儲西國之闕文採東京之逸記閲歆向之舊旨闡鍾王之新意對楚漢之贍墨覽魏晉之鴻䇿挍逺近之真假削古今之名實每齊韻而等徑輒同懷而共術吐情志而深賞忘年齒而隆眷擬余才兮前華比余文兮後彥余結袂於山石君慿神於寒霰何逺期之未從痛戢景其如電堂酒兮一塵暮燈兮萬春黛草兮永祕朱丹兮何晨聞瑶質兮可變知余采兮一奪唯華名與芳暉兮爭日月而無沫傷友人賦有序僕之神交者嘗有陳郡之袁炳焉有逸才有妙賞博學多聞才明敏而識竒異僕以為天下絶倫黯與秋草同折今不復見矣既而陳書有念橫瑟無從雖乏張范通靈之感庶同嵇向篤徒之哀乃為辭曰泫然沾衣兮悲袁友之英秀系神緒而作氏胤靈枝而啓胄轢四代而式昌洎十葉而克茂友人之生川岫降明峻調迥韻慧志聰情倜儻逺度寂寥靈素文攀淵卿史類遷固譬如冬雪既潔將似秋月至徹乃上代而少雙故叔世而曠絶弔蕙若之暫芳慟琬琰之永闕余既好於斯友乃神交於一顧邈疇年之繾綣窈生平之遊遇既遊遇兮可尋乃協好兮契心懷愛重於素璧結分珍於黃金拾一代而笑淺訪古人而求深故髙術而共徑豈異褎而同襟爾挂情於霜柏我發意於冬桂掔千品之消散鏡百候之衰替帶瑶玉而爭光握隨珠而比麗披圖兮照籍抽經兮閲史共檢兮雒書同析兮河紀既思遊兮百説亦窮精兮萬里愛詩文之綺發賞賦豔兮錦起罄古今之寶賮殫竹素之琛竒信朝日之徒昃屬夜星之空移覽秋實於卥苑摘春華於東池蚤同嵗於上京未滿年於下國爾湘水兮深沈我前山兮眇默惟音華與書酒伊楚越兮南北余結誼兮梁門復從宦兮朱藩何人遙而困阻而天道之匪存凋碧玉之神樹銷紫石之靈根永逺書於江澨結深痛於爾魂魂綿昧其若絶泣縈盈其若結吝妙賞之不留悼知音之已逝金雖重而見鑄桂徒芳而被折百年一盡兮貴揚蕤於後烈傷愛子賦有序江艽字胤卿僕之第二子也生而神俊必為美器惜哉遘閔涉嵗而卒悲至躑躅乃為此文惟秋色之皓皓心結縎兮悲起曽憫憐之慘悽痛掌珠之愛子形惸惸而外施心切切而內圯日月可銷兮悼不滅金石可爍兮念何已緬吾祖之赫羲帝髙陽之玄胄惜衰宗之淪沒恐余人之弗構覬三靈之降福佇弱子之擢秀酷奈何兮胤卿那逢天兮不佑爾誕質於青春攝提貞乎孟陬謂比方於右列望齊英於前修遰髙行之美迹𢎞盛業之清猷白露奄被此百草爾同凋於梧楸憶朱明之在節顧岐嶷之可貴睨爐帳而多怊瞻户牖而有慰奚在今之寂寞失音容之髣佛姊目中而下泣兄嗟季而飲淚感木石而變哀激左右而隕欷奪懷袖之深愛爾母氏之麗人屑丹泣於下壤傃殷憂於上旻視往端而劈栗踐遺緒而苦辛就深悼而誰弭歸末命兮何陳我過幸於時私爰守官於江潯悲薄暮而增甚思纁黃而不禁月接日而為光霞合雲而成隂霧籠籠而帶樹月蒼蒼而架林嗟奈何兮弱子我百艱兮是尋驗纎帶之夜緩察葆鬢之朝侵惟人生之在世恆歡寡而戚饒雖十紀之空名豈百齡之能要迅朱光之映夜湛白露之凝朝指兹譬而取免排此理以自銷然則生之樂兮親與愛內與外兮長與稚傷弱子之冥冥獨幽泉兮而永閟余無愆於蒼祇亦何怨於厚地信釋氏之靈果歸三世之逺致願同升於淨剎與塵習兮永棄麗色賦楚臣既放魂往江南弟子曰玉釋佩解驂濛濛淥水裊裊青衫乃召巫史兹憂何止史曰臣野膠學蔽理臣之所知獨有麗色之説耳夫絶世獨立者信東方之佳人既翠眉而瑶質亦盧瞳而頳脣鍱金花及珠履颯綺袂與錦紳色練練而欲奪光炎炎其若神非氣象之可譬奚影響而能親故仙藻靈豔金華玉儀其始見也若紅蓮鏡池其少進也如綵雲出崖五光徘徊十色陸離寶過珊瑚同樹價值瓊草共枝雖玉堂春姬石室素女張煙霧於海際耀光景於河渚乘天梁而浩蕩叫帝閽而延佇猶比之無色方之非侣於是雕臺繡戶當衢橫術椒庭承月碧幌延日架虬柱之嚴麗亘虹梁之峻密錦幔垂而杳寂桂煙起而清溢女乃耀邯鄲之屣步媚北里之鳴瑟若夫紅華舒春黃鳥飛時紺蕙初嫩頳蘭始滋不攬蘅帶無椅桂旗摘芳拾蘂含詠吐辭笑月出於陳歌感蔓草於衛詩故氣炎日永離明火中槿榮任露蓮華勝風後簷丹奈前軒碧桐笙歌畹右琴儛池東嗟靈王之心悅怨漢女之情空至乃西陸始秋白道月弦金波照戶玉露曖天網絲挂墻綵螢繞梁氣已濕兮曉未半星雖流兮夜何央憶雜珮兮且一欷念錦衾兮以九傷及沍隂凋時冰泉凝莭軒疉厚霜庭澄積雪鳥封魚斂河凝海結紫帷鉿匝翠屏環合麝蜜周彰燈爐重沓恥新臺之青樓想上宮之邃閣若乃水照景而見底煙尋風而無極霧出吳而綺章雲堆趙而碧色露辭楚而容裔風去燕而悽惻莫不輟鏡徙倚攬琴心息於是帳必藍田之寶席必蒲陶之文館圖明月室畫浮雲春蠶度網綺地應紡秋梭鳴機織為褧衣象奩瓊盤神瀝仙丹雕柱彩瑟九華六出翠蕤羽叉緑秀金枝故言必入媚動必應規有光有豔如合如離氣柔色靡神凝骨竒經周歷趙既無其雙尋楚訪蔡不覿其容亦可駐髮還質驂星馭龍蠲憂忘死保其家邦非天下之至麗孰能預於此哉宋大夫耀影汰迹縈魂灑魄賞以雙珠賜以合璧拂巫蕩祝永為上客水上神女賦江上丈人遊宦荆吳首衛國望燕途歷秦關出宋都遍覽下蔡之女具悅淇上之姝未有粉白黛黑鬼神之所無也乃造南中渡炎洲徑玉澗越金流路逶迤而無軌野忽漭而鮮儔山反覆而參錯水繞灌而縈薄石五采而橫峰雲千色而承萼日炯炯而舒光雨屑屑而梢落紫莖繞徑始參差紅荷緑水才灼爍忽而精飛視亂意徙心移綺靡菱蓋悵望蕙枝一麗女兮碧渚之崖曖曖也非雲非霧如煙如霞諸光諸色雜卉雜華的的也象圭象璧若虛若實綾錦共文瑶貝合質遂乃紅唇寫朱真眉學月美目豔起秀色爛發窈窕暫見偃蹇還沒冶異絶俗竒麗不常青琴羞豔素女慙光笑李后於漢主恥西施於越王神翻覆而愈悅志離合而感傷女遂俯整玉車犬仰肅金鑣或採丹葉或拾翠條守明璣而為誓解琅玕而相要情乍合而還散色半親而復嬌聳軿車於水際亭雲霓於山椒奄神祇之倣像共光氣而寂寥於時也綵霞繞繞卿雲縵縵石瓊文而翕赩山龍鱗而照爛苔緑根而攢集草紅葩而舒散日炫晃以朧光樹葳蕤而蔥粲無西海之浩蕩見若木之千尋非丹山之赫曦聞琴瑟之空音理洞徹於俗聽物驚惟於世心恨精影之不滯悼光晷之難惜閲有無於俄頃驗變化於咫尺視空同而失貌察倐忽而亡迹野田田而虛翠水湛湛而空碧乃唱桂棹凌衝波背橘浦向椒阿硉矹木石洪漭蛟鼉顧御僕而情饒巡左右而怨多弔石渚而一欷悵沙洲而少歌茍懸天兮有命永離決兮若何妙聲無形竒色非質麗於嬪牆精於琴瑟尋漢女而空佩觀清角而無匹嬪楊不足聞知夔牙焉能委悉何如明月之忌玄雲秋露之慙白日愁知形有之留滯非英靈之所要術也娼婦自悲賦有序漢有其録而亡其文泣蕙草之飄落憐佳人之埋暮乃為辭焉粵自趙東來舞漢宫瑶序金陳桂枝嬌風素璧翠樓明月徒秋歌聲忽散傷人復愁君王更衣露色未晞侍青鑾以雲聳夾丹輦以霞飛願南山之無隙指夀陵以同歸俄而緑衣坐奪白華卧進屑骨不憐􅀈金誰吝九重已閉髙門自蕪青苔積兮銀閣澀網羅生兮玉梯虛度九冬而廓處遙十秋以分居傷營魄之已盡畏松柏之無餘歸故鄉之末光實夫君之晚滋去柏梁以淹袂出桂苑而斂眉視朱殿以再暮撫巔華而一疑於是怨帝關之遂岨悵平原之何極霜繞衣而葭冷風飄輪而景昃御思趙而不顧馬懷燕而未息泣逺山之異峰望浮雲之雜色若使明鏡前兮碎孤鴈之錦翼乃為詩曰曲臺歌未徙黃壤哭巳親玉玦歸無色羅衣會成塵驕才雄力君何怨徒念薄命之苦辛赤虹賦有序東南嶠外爰有九石之山乃紅壁十里青萼百仞苔滑臨水石險帶溪自非巫咸采藥羣帝上下者皆斂意焉於時夏蓮始舒春蓀未歇肅舲波渚緩栧汀潭正逢巖崖相照雨雲爛色俄而雄虹赫然暈光耀水偃蹇山頂舄奕江湄迫而察之實雨日隂陽之氣信可觀也又憶昔登香爐峰上手接白雲今行九石下親弄絳霓二竒難并感而作賦曰迤邐崎礒兮太極之連山鰅鱅虎豹兮玉虺騰軒孟夏氤氲兮荷葉承蓮悵何意之容與兮冀暫緩此憂年失代上之異人遲山中之虛迹掇仙草於危峰鐫神丹於崩石視鱣岫之吐翕看黿梁之交積於是紫霧上河絳氛下漢白日照餘碧雲卷半殘雨蕭索光煙豔爛水學金波石似瓊岸錯龜鱗之崚崚繞蛟色之漫漫俄而赤霓電出蚴虯神驤曖昧以變依稀不常非虛非實乍隂乍光赩赫山頂照燎水陽雖圖緯之有載曠代識而未逢既咨嗟而躑躅聊周流而從容想畨禺之廣野憶丹山之喬峰稟傅説之一星乘夏后之兩龍彼靈物之詎幾象火滅而山紅餘形可覽殘色未去耀萎蕤而在草映青蔥而結樹昏青苔於丹渚曖朱草於石路霞晃朗而下飛日通曨而上度俯形命之窘局哀時俗之不固定赤舄之易遺乃鼎湖之可慕既以為騂鬐四毳之駕方瞳一角之人帝臺北荒之際弇山西海之濱流沙之野析木之津雲或怪綵煙或異鱗必雜虹霓之氣隂陽之神焉四時賦北客長欷深壁寂思空床流連圭窬淹滯網絲蔽戶青苔繞梁春華虛豔秋月徒光臨飛鳥而魂絶視浮雲而意長測代序而饒感知四時之足傷若乃旭日始暖蕙草可織園桃紅點流水碧色思舊都兮心斷憐故人兮無極至若炎雲峰起芳樹未移澤蘭生坂朱荷出池憶上國之綺樹想金陵之蕙枝若夫秋風一至白露團團明月生波螢火迎寒眷庭中之梧桐念機上之羅紈至於冬隂北邊永夜不曉平蕪際海千里飛鳥何嘗不夢帝城之阡陌憶故都之臺沼是以軫琴情動戞瑟涕落逐長夜而心隕隨白日而形削故秦人秦聲楚音楚奏聞歌更泣見悲巳疚實由魂氣愴斷外物非救參四時而皆難况僕人之末陋也學梁王兔園賦有序或重古輕今者僕曰何為其然哉無知音則已矣聊為古賦以奮枚叔之製焉碧山倚巘﨑兮象海水碣石朝日晨霞兮赩紅壁仰望泬寥兮數千尺陸硬嵺􅲟汨淈成岫谽呀而窟竇哮碻􅲙確紫蕪丹駮苔點綺縟若斷若續如此者百有十處奔水激集瀴溟潔渠潏湟吐汲跳波走浪濺沫而相及􅀈漾長驚澆灌遠注無時息焉青樹玉葉彌望成林亦有輪囷磊硊一枝百頃萬葉共隂縹草丹蘅江離蔓荆酷郁交布原滿隰平於是金塘湎演緑竹被坂繚繞青翠近而復逺白砂如積雪者焉碧石如圓玦者焉水鳥駕鵝􅡝鳿鴻鴈上飛衡陽下宿沅漢十十五五忽合而復散乃有綺雲之館頳霞之臺其樂足以棄國釋位遺死忘歸也若夫墨翟商瞿之倫學兼師術才參道真方駕連軫于沼之濱乃射宿餌魴前繳鷫鷞青黏黃粱矐鱉胾羮臑豚柘漿窮嬉極娛雲翺兮煙翔超然左覽蒼梧右睨鄧林崩石梧岸崱屴藏隂逮至山頂丹壁四平靈木夾道神草列生俯瞰太一下視流星既投冠而棄劒亦抗魄而蕩靈於是大夫之徒稱詩而歸春陽始曉朱華未希卒逢邯鄲之女蕙色玉質命知其麗攢連映日綺裳下見錦衣上出雖復守禮令人意失遂謡曰碧玉作碗銀為盤一刻一鏤化雙鸞乃報歌曰美人不見紫錦衾黃泉應至何所禁妃因别曰見上客兮心歷亂送短詩兮懷長嘆中人望兮蠶既飢躞蹀暮兮思夜半丹砂可學賦有序咸曰金不可鑄僕不信也試為此辭精思云爾惟雲場之少折乃人徑之多憂雖瑶笙及金瑟雜翠帳與丹幬吞悲欣於得失銜哀樂於春秋煥如星絶黯如火滅星絶難光火滅可傷故從師而問道冀幽路之或㿩測神宗之無緩踐雲根之不賖訊名山及石室驗青汞與丹砂撝五難之重滯攬九仙之輕華故抱魄寂處凝神空居泯邈深晝窈鬱重虛覘炫耀而可見聽泬寥而有餘於是乘河漢之光氣騎列星之綵色輟隂陽於形有傳變化於心識浮恍惚而無涯泛靈怪而未極架日月之精照騫蛟龍之毛翼遂乃氣穆肅而神奔骨窈窈而鬼怪綴葳蕤而成冠點雜錯而為珮出湎泫而遐騖貫濛鴻而上厲鳯之來兮蔽日鸞之集兮為羣左昆吾之炎景右崦嵫之卿雲爛七采之照耀漫五色之煙煴非世俗之習見焉鬼神之嘗聞既而曖碧臺之錯落耀金宫之瓏玲幻蓮華於繡闥化蒲桃於錦屏赩丹光而電烻颯翠氛而杳冥軒惝惘於長虹階侘傺於奔鯨惑龍宫之殿稱迷忉利之宫名故靈偃蹇兮姣服女嬋娟兮可觀秀青色之泯靡熳美目之波瀾襞日月之纂組襲星宿之羅紈百味酒兮靈之集河供鯉兮靈之安却交甫之玉質笑陳王之妙顔所以樂精玄於太乙妙宮徴於清都簫含聲而逺近琴吐音而有無奏神鼓於玉袂舞靈衣於金裾韻躑躅而易變律參差而難圖非南方之能擬詎濮水之可摹於是流漾不一遨曹無邊娥眉既散鐘鼓都捐乘綵霞於西海駟行雨於丹淵山差池而鏡壑水淸明而抱天山含玉以永嵗水藏圭以窮年擬若木以寫意拾瑶草而悠然遂乃凝虛斂一守仙閉方智寂術盡魄兀心亡白生不能關其説惠子無以挫其芒原其恥市朝之失道疾讒嬖之不祥却文綵之媱冶去利劒之鏗鎗懅生死於半氣惜百年於一光故以鑄金為器丹砂為漿慙吝既盡妖怨當忘吾師以為可學而公子謂之不良歟江上之山賦潺湲澒溶兮楚水而吳江刻劃嶄崒兮雲山而碧峯挂靑羅兮萬仞豎丹石兮百重嵯峨兮嵒崿如斫兮如削嶤嶷兮尖出巖岍兮空鑿波潮兮吐納􅛲峯兮積沓鰅鱅兮赤尾黿鼉兮匼匝見紅草之交生眺碧樹之四合草自然而千花樹無情而百色嗟世道之異茲牽憂恚而來逼推爐炭於片景抱絲緒於一息每意逺而生短恆輪平而路仄信懸天兮窈昧豈繫命於才力既羣龍之咸疑焉衆狀之所極俗逐事而變化心應物而回旋既歘翕其未悟亦緯繣而已遷伊人壽兮幾何譬流星之殞天悵日暮兮吾有念臨江上之斷山雖不敏而無操願從蘭芬與玉堅亂曰折芙蓉兮蔽日冀以蕩夫憂心不共愛此氣質何獨嗟乎景沈井賦穿重壤之千仞兮搆玉甃之百節營之不日既汲既泄橫吹賦有序驃騎公以劒卒十萬禦荆人於外郊鐡馬煩而人聳色綵旄耀而士銜威軍容有橫吹僕感而為之賦云北隂之竹兮百尺而不見日石硿礲而成象山沓合而為一雲遙遙而孤去風時時而寒出木斂柯而攢抏草騫葉而蕭瑟故左崎嶬右硱磳樹嵓崿水泓澄鎮雄蛟及雌虺􅂒獨鴟與單鷹白山皓赤山赩匝流沙經西極原陸窈灌莽深人聲絶馬迹沈寂然四顧增欷纍吟雖欲止而不能禁此竹方可為器乃出天下之英音於是帶以珉色扣以瓊文潤如沈水華若浮雲赤綬紫駮星含露分其聲也則鞅鬱有意摧萃不羣迢遙衝山崎曲抱津綿羃順序周流銜吕故西骨秦氣悲憾如懟北質燕聲酸極無巳斷絶百意繚繞萬情吟黃煙及白草泣虜軍與漢兵於是海外之雲處處而秋色河中之堆一一而學飛素野黯以風暮金天赩以霜威衣袂動兮霧入冠弓刀徑兮馬毛寒五方軍兮出不及雜色騎兮往來還旃如雲兮幟如星山可動兮石可銘功一豎兮迹不奪魂既英兮鬼亦靈奏此吹兮有曲和歌盡而淚續重一命而若煙知半氣之如燭美人戀而嬋媛壯夫去而躑躅故感魂傷情獲賞彌倍妙器奇製見貴歷代所以韻起西國響流東都浮江繞泗歷楚傳吳故函夏以為寶飾京關以為戎儲至於貝胄象弭之威織文魚服之容鄞山錫刃耶溪銅鋒皆陸斷犀象水斬蛟龍載雲旗之逶迤扈屯騎之溶溶啾寥亮於前衡嘒陸離於後陳視眄眩而或近聽嘹嘈而逺震奏白登之二曲起關山之一引吐哀也則瓊瑕失綵銜樂也則鉛堊生潤採菱謝而自罷緑水慙而不進代能識此聲者長滅淫而何吝燈賦淮南王信自華淫命綵女兮餌丹砂而學鳯音紫霞沒白日沈挂明燈散玄隂顧謂小山儒士斯可賦乎於是泛瑟而言曰若大王之燈者銅華金檠錯質􅍢形碧為雲氣玉為仙靈雙婉百枝艷帳充庭照錦地之文席映繡柱之鴻筝恣靈修之浩蕩釋心疑而永平茲侯服之誇詡而處士所莫營也若庶人之燈者非珠非銀無藻無縟心不貴美器窮於朴是以露泠帷幔風結羅紈螢光别桂蛾命辭蘭秋夜如嵗秋情如絲怨此愁抱傷此秋期必丹燈坐歎欲説忘辭至夫霜封園橘冰裂池蓀雲雪無際河海方昏冬膏既凝冬箭未度悁連冬心寂歷冬暮亦復朱燈空明但為傷故乃知燈之為寶信可賦也王遂讃善澄意斂神屈原才華宋玉英人恨不得與之同時結佩共紳今子凝章挺秀近出嘉賔吐蘅吐蕙含瓊含珉推驂雕輦以愛國之有臣焉扇上綵畫賦臨淄之雅女宋鄭之妙工織素麗於日月傳畫明於綵虹洛陽之伎極江南之巧窮故飾以赤野之玉文以紫山之金空靑出峨嵋之陽雌黃出嶓冢之隂丹石發王屋之岫碧髓挺青蛉之岑粉則南陽鉛澤墨則上黨松心山乃嶄巖鬱峍路必􅺋㟿﨑嶔馭龍所不逺至駕鳯未之前尋乃雜族以為此扇為君翳素女與玉琴玉琴兮散聲素女兮弄情旻天兮舒縹暮雲兮含頳窗中暖兮露始滴池上凝兮月又明玉琴兮珠徽素女兮錦衣促織兮始鳴秋蛾兮載飛識桂莖之就罷知蘭葉之行衰願解珮而捐玦指黃墟而先歸重曰碧臺寂兮無人蔓丹草與朱塵度俄然而一代經半景若九春命幸得為綵扇兮出入玉帶與綺紳空靑賦夫赤瓊以照燎為光碧石以萎蕤為色咸見珍於東國並被貴於西極况空靑之麗寶挺山海之不測其所處則峻巘層石龜穴龍壁素岸成雲頳砂如磧外隱靑苔丹草內伏玉枝瑪瑙銅鉛合生𥒪崔堅英自非索嶮覓危乘鱟履螭倦春厭秋斫異鐫奇能得厠於軒宇接君子之光儀於是寫雲圖氣學靈狀仙寶波麗水華峯豔山陽谷之樹崦嵫之泉卥海之草炎州之煙銀臺之烏穆王之馬都廣之國番禺之野皆咫尺之極鏡見四荒雲煙始出日月既張若夫邃古之世汗漫窈微惟此靑墨所以造之至乃翠燦軒室蔥鬱臺殿雜蛟龍之文章發麟鹿之炳絢騁神形於鐘簴舒怪物與雷電亦有曲帳畫屏素女綵扇錦色􅀢鬱綺質蔓衍點拂濃薄如隱如見山水萬象丹靑曲變咸百溢之可珍亦千金而不賤雖楚之夏姬越之卥施趙妃燕后秦娥吳娃溺愛靡意魂飛心離候靑翳為藻飾方赩紅華與素儀冠衆寶而獨立信求之而無虧蓮華賦有序余有蓮華一池愛之如金宇宙之麗難息絶氣聊書竹素儻不滅焉檢水陸之具品閲山海之異名珍爾秀之不定乃天地之精英殖東國之流詠出西極而擅名方翠羽而結葉比碧石而為莖蘂金光而絶色藕冰折而玉清載紅蓮以吐秀披絳華以舒英故香氛感俗淑氣參靈躑躅人世茵蒀祗冥青桂羞烈沉水慙馨於是生乎澤陂出乎江隂見綵霞之夕照覿雕雲之晝臨既翕赩於洲漲亦映曖於川潯奪夜月及熒光掩朝日與赩火出金沙而延曜被淥波而覃拖冠百草而絶羣出異類之衆夥故仙聖傳圗英隱流記一為道珍二為世瑞發青蓮於王宫驗竒花於陸地若其江淡澤芬則照電爍日池光沼緑則明璧洞室曜長洲而瓊文映青崖而火質或慿天淵之清峭或殖疏圃之蒙密故河北棹歌之姝江南採菱之女春水厲兮楫潺湲秋風駛兮舟容與著縹芰兮出波攬緗蓮兮映渚迎佳人兮北燕送上客兮南楚知荷華之將晏惜玉手之空佇乃為謡曰秋鴈度兮芳草殘琴柱急兮江上寒願一見兮道我意千里逺兮長路難若其華實各名根葉異辭既號芙渠亦曰澤芝麗詠楚賦艷歌陳詩非獨瑞草爰兼上藥味靈丹沙氣驗青㬦乃可棄劒海岫龍舉雲崿畫臺殿兮霞蔚圖縑縞兮炳爍永含靈於洲渚長不絶兮川壑靈丘竹賦登﨑嶇之碧巘入朱宮之瓏玲臨曲江之回蕩望南山之蔥靑鬱春華於石岸赩夏彩於沙汀逺亘紫林祕野近匝玉苑禁坰於是緑筠繞岫翠篁綿嶺參差黛色陸離紺影上謐謐而留間下微微而停靖蒙朱霞之丹氣曖白日之素景故非英非蘂非香非馥而珍跨仙草寶踰靈木夾池水而檀欒繞園塘而橚矗既間霜而無凋亦中暑而增肅每冠名於華戎將擅奇於水陸況有朝雲之館行雨之宫窗崢嶸而緑色戶踟蹰而臨空綺疏蔽而停日朱簾開而留風被箘簵之窈蔚結篠簜之溟濛或産鳷鵲之右或居露寒之東此皆金輿之所出入瑶輦之所周通靑苔賦有序余鑿山楹為室有苔焉意之所之故為是作云嗟青苔之依依兮無色類而可方必居間而就寂以幽意之深傷故其處石則松栝交隂泉雨長注絶澗俯視崩壁仰顧悲凹嶮兮唯流水而馳騖遂能﨑屈上生班駮下布異人貴其貞精道士悅其迥趣咀松屑以髙想捧丹經而永慕若其在水則鏡帶湖沼錦匝池林春塘秀色陽鳥好音靑郊未謝兮白日照路貫千里兮緑草深乃生水而搖蕩遂出波而沈淫假靑條兮總翠借黃華兮舒金遊梁之客徒馬疲而不能去兔園之女雖蠶飢而不自禁至於修臺廣廡幽闔間楹流黃以織琴瑟且鳴户牖祕兮不可見履袂動兮覺人聲乃蕪階翠地繞壁點墻春禽悲兮蘭莖紫秋蟲吟兮蕙實黃晝遙遙而不暮夜永永以空長零露下兮在梧楸有美一人兮欷以傷若乃崩隍千仞毁冢萬年當其志力雄俊才圖驕堅錦衣被地鞍馬耀天淇上相送江南採蓮妖童出鄭美女生燕而頓死豔氣於一旦埋玉玦於窮泉寂兮如何苔積網羅視青䕷之杳杳痛百代兮恨多故其所詣必感所感必哀哀以情起感以怨來魂慮斷絶精念徘徊者也彼木蘭與豫章既中繩而獲夭及薜荔與䕷蕪又懷芬而見表至哉靑苔之無用吾孰知其多少金燈草賦山華綺錯陸葉錦名金燈麗草鑄氣含英若其碧莖凌露玉根升霜翠葉暮媚紫榮晨光非錦罽之可學詎瓊瑾之能方乃御秋風之獨秀值秋露之餘芬出萬枝而更明冠衆花而不羣既豔溢於時暮方照麗於霜分是以移馥蘭畹徙色曲池軼長洲兮杜若跨幽渚兮芳籬映霞光而爍爚懷風氣而參差故植君玉臺生君椒室炎萼耀天朱英亂日永緒恨於君前不遺風霜之蕭瑟藉綺帳與羅袿信草木之願畢翡翠賦彼二鳥之奇麗生金洲與炎山映銅陵之素氣濯碧磴之紅泉石錦質而入海雲綺色而出天峯岑嵒而蔽日樹靜暝而臨泉霞輕重而成彩煙尺寸而作緒熱風翕而起濤丹氣赫而為暑對􅎵流之蛟龍衝汶漻之霧雨耀緑葉於冬岫鏡朱華於寒渚斂慧性及馴心鶱頳翼與青羽終絶命於虞人充南琛於祕府備寶帳之光儀登美女之麗飾雜白玉以成文揉紫金而為色専妙綵於五都擅精華於八極傳貴質於竹素晦深聲於百億嗟乎雞騖以稻粱致憂燕雀以堂構貽愁既銜利之情近又遁害之無由今乃依赮火之絶垠出赤縣之紘州逺人迹而獨立攬天倪而為儔竟同獲於河鴈不俱恕於海鷗必性命兮有當孰能合兮可求石􅎕賦海人有食石􅎕一名紫􅡖蚌蛤類也春而發華有足異者戲書為短賦我海若之小臣具品色於滄溟既爐天而鑄物亦吸化而染靈比文豹而無恤方珠蛤而自寧冀湖濤之蔽迹願洲渚以淪形故其所巡左委羽右窮髮日照水而東升山出波而隱沒光避伏而不耀智埋冥而難發何弱命之不禁遂永至於夭闕已矣哉請去海人之仄陋充公子之嘉客儻委身於玉盤從風雨而可惜詔北伐詔門下朕統厯馭政志包函夏庶惣文軌無思不服而逖焉狡虜久為邊虞及宋末不庭授策乖律北州外淪威風內毁鑒彼隆替慨歎盈懷冕旒濟河翦彼凶狄咸秩中嶽望祀汾隂則聲教鬯矣猶以經綸惟始恩化甫洽勞民擾衆為政所重故方輟六師按經九伐今淮泗告驚羽書馳聞醜羯妖燼送死北垂徴天人之數撫自來之會無勞遠兵剿撲為易蓋因茲大號蕩其巢藪可遣某官組甲十萬鐡騎千馬斜趣潁洛衝其要津某官某虎旅八萬舳艫數千沿淮長驅稜威靑汴某官某舟師五萬直出淮淝某官控江右之鋭絡繹繼進某官某率羽林徑勇為水陸形援某官某甲等並率義勇之衆牙制椅角之機戎車戒路事宜惣一使持節都督南徐兖二州諸軍事後軍將軍南徐州刺史長沙王晃出次江都為衆軍節度驍雄競奮火烈風掃尅定中原肅清河洛便可內外纂嚴以時備辦遣使巡行詔門下昔明王馭世巡嶽采政睿后司朝觀俗調化故生無鬱滯物獲修通釐風拯患於茲為急朕以輶薄昧於大道因璿璣之厯遵三德之運緬鑒前哲寤寐永歎思所以闢訪治蠧詢求民瘼才寡務殷若無津際故以情深危薄心疚夙夜矣可普遣大使分行四方推賢薦能問疾舉滯若其采野不闢犴訟有虧妨民利害擾黷政經者具以奏聞如其讜言嘉話真士智才亦依名騰上隨事均量務取厥中朕將親覽以𢎞逺化立學詔門下夫膠庠之典彞倫攸先所以昭振才端啓發性緒𢎞世字氓納之軌儀是故五禮之迹可傳六樂之容不泯朕自膺厯受圖志闡經訓且有司羣僚奏議橫集以戎車屢警文教未敷思樂辟雍永言多慨今關燧無虞時和歲稔逺邇同風華夷慕義便可式遵前凖修建斆學精選儒官廣延國胄斷募士詔門下詔募取將懸賞購士蓋出權宜非曰經制頃者民罹氛藹世襲艱阻因峕流故浸以成俗斯風蕩而未還且滋長逋逸開罪山湖遂乃黥刑不辱草竊無咎平政察治萌合甄革自今已後可悉斷衆募慰勞雍州詔皇帝謝鎮軍寧蠻二府雍州文武士庶等夫忠為令德或感慨殺軀信實美行或殉義蹈節而沈攸之小豎反覆稱逆西藩袁粲劉秉潛使相扇遂擁據石頭並圖廟社粲秉既從王憲蒼黎同慶攸之孤州蟻聚勢必燼滅刺史張敬義氣雲騰秣馬星驅全羽十萬殄茲氛鯨曾不旋踵彼州南陽白水將相遺風忠烈之士霜戈電發但戎車暫動念原未寧冬寒卿皆無恙賜赦交州詔門下交部昔值時詖負海不朝因迷遂往歸欵莫由今創制萬宇煙煴造物原刑四裔澤浹中畿愍彼邊氓未均王化宣𢎞逺仁蕩以更始可曲赦彼州統內咸同曠泰李叔獻一人即撫南土其股肱文武詳材選推并遣大使宣揚朝旨曲赦丹陽等四郡詔門下朕興言民瘼昧旦求政所以庶存簡惠緝茲治道而玉燭未調祥風尚鬱京輔及三吳昔歲水災秋登既罕今茲厲疾罹患者多納隍之歎為矜良深可曲赦揚州所統丹陽吳興南徐州所統義興等四郡其遭水尤劇之縣自今年以前三調未充而虛例已畢官長局吏應其備償者雖即事為愆情在可亮外詳所除以𢎞優澤大赦詔門下朕思𢎞風教而刑圄猶積永言前烈兢歎載懷今履端告始羣后執贄治洽樂郊華夷同泰雖和慙擊石采愧卿雲然景業初基義深恆典慶動玄靈歡溢都縣憫彼幽黔猶隔茲澤思我兆民共熙至化王儉為左僕射詔門下端二樞祕實惟國楨緝典宣機所寄時彥尚書右僕射領吏部尚書南昌縣開國公儉器懷明亮風情峻逺業積圭璋才兼經緯况乃節亮帷幄譽敷端揆升授之宜蓋允具瞻可左僕射王儉領太子詹事詔門下管司東朝歷代所重自非國華莫允斯任侍中尚書左僕射南昌縣開國公儉鑒識清贍理懷秀徹績亮朝端譽敷僉議贊業攸光物聽斯緝宜惣二官以穆彞序王鎮軍為中書令右光祿詔門下綸言要密歷選為難優秩崇顯允在舊德使持節都督江州豫州之新蔡晉熙二郡諸軍事鎮南將軍江州刺史延之業履沖約秉情間素譽彰頻試績著纍朝自居南服徽庸尅舉宜升寵章管兼樞祕張令為太常領國子祭酒詔門下庠議既敷縉紳攸屬師氏之任宜歸儒素散騎常侍中書令驍騎將軍揚州大中正緒器識淸簡理懷恬約譽洽朝聞聲緝民聽必能闡揚玄宗式範胄子兼掌宗伯望實惟宜為何詹事拜吏部尚書詔門下官人之職實難其選所以弼諧彞品謨明庶績今思治惟急彌不可曠侍中太子詹事戢業履修平體識詳穩自升宮闥美譽咸聞必能無懈於位燮茲流序王撫軍為安東吳興詔門下震澤殷奧撫馭須才都官尚書撫軍潯陽郡開國公敬則志幹貞烈秉情開敏忠勤之至形乎出內必能綏懷大邦尅隆美政可安東將軍吳興太守王光祿為征南湘州詔門下衡嶽名區荆湘奧壤自頃凋弊綏撫須賢侍中光祿大夫丹陽尹僧虔德履淹邃識局詳正沖素之品朝望攸歸歷職之庸載懷僉聽往任沅湘餘惠在民今宜重敷善政申此懿績栁僕射為南兖州詔門下河兖衝要維扞中畿司牧之任宜詳其授後將軍領軍新除尚書左僕射溳陽郡國公世隆業體淹濟思情通敏功書王府績彰纍任必能宣𢎞恩政威懷萬里雖哀疾毁頓而禮有權奪王侍中為南蠻校尉詔門下荆楚殷曠任重寄深毗佐之選非良勿授侍中領祕書監驍騎將軍奐秉心貞元志局開亮績譽之美在公屢彰必能贊政南紀播惠西夏王僕射加兵詔門下散騎常侍尚書左僕射太子詹事南昌縣開國公儉忠欵昭著任寄隆深既光朝猷允屬民聽宜增威飾以崇望實可加兵二百褚侍中為征北長史詔門下蕃佐須才非良莫寄侍中領步兵校尉炫識業淸悟思懷淹暢出內之譽日聞其美宜弼諧親屏以申茂績封江冠軍等詔門下締基緯業序功攸急開厯闡祚酬庸為先故以式藹曩書載炳前軌文仲等或誠亮艱危效彰屯詖皆績幹兩宣勤圖兼立宜各分圭社酬厥勞謐蕭冠軍進號征虜詔門下維翰之重實資名品使持節都督郢州司州之義陽諸軍事冠軍將軍郢州刺史南昌縣開國侯鸞體局𢎞濟器操端敏自蒞任夏首美政殷流必能聿宣國化以庇民瘼宜崇顯秩允茲聲望教為建平王聘隱逸教府州國綱紀夫媯夏巳沒大道不行雖周惠之冨猶有漁潭之士漢教之隆亦見棲山之夫迹絶雲氣意負青天皆待絳螭驤首翠虬來儀是以遺風獨扇百代餘烈激厲後生斯乃王教之助古人之意焉吾稅駕舊楚憩乘汀潭挹於陵之操想漢隂之髙而山川遐久流風無沫養志數人並未徴采善操將棄良用慨然宜速詳舊禮各遣纁招庶暢此幽襟以旌蓬蓽建平王赦五刑教府州國綱紀吾謬紲朝組乃班恩命重渥華蕃踐寵懋甸永言政惠良攪淸寐况舊楚地曠前郢氓殷水帶枉渚山匝魯陽自頃田邑榛故封井萊蕪財賦方屈犴獄實繁思所以厚風釐俗變瑟改調自五歲刑已下未送臺者一皆原遣文武彈坐亦悉復職主局依舊施散薄紓此懷為蕭太傅東耕教三府二州綱紀夫寶農賤貨綵照周縢巡耕去販光炎漢籙故能業滋都野産殷絃縣吾任屬𢎞寄思闡治源慮以晨感情以宵嘆今玄司調氣靑祗佇節陳闕既柔服闕方秀電爍有期桐萌無遠便當躬速紺耦道先列辟事均暫勞迹在永豫可尅日備辦詳典施行為蕭驃騎發徐州三五教府州綱紀沈攸之背慢靈極稽誅之日久矣况稱兵江漢之上圖釁廟闕之下惡熾罪盈民靈所絶朝廷以尅辰纂嚴令輿夙駕吾任先貴近義兼常慨挺創投袂信見其時方當水斬龍蛟陸斷犀兕雖烈士銜志壯夫投槩然雲羅既舒宜廣威防所統郡縣便普三五咸依舊格以赴戎麾主者飛火施行為蕭驃騎築新亭壘埋枯骸教府州綱紀夫汝南稱慈諒由掩胔廣漢流仁實存殯朽近築製兹營崇壘浚塹古墟曩隧時有湮移深松茂草或致刋剃慿軒動懷巡隍增愴宜並為收改勿毁奠祀主局詳辦施行表拜中書郎謝表榮鬱兩臨恩警交鏡悄然攬魂乃懼乃逝臣聞汝潁之金或揚采於四豪江淮之珠已馳光於七貴皆聲不妄美第豈虛立未有伎慙湘輿蒙送目之賞工謝綵輪竊歸風之價臣幼乏篆刻長暌圖史智罕效官志闋從政方遽求振風長憂凌雨不悟遭社鳴之屬際河淸之會玄雲素霞必駕蓬萊白毳騂鱗咸蒙解遂仕通物任官登郎掾此實耀靈之私照而微臣之厚幸也仰惟皇衢大融氣品呈觀西傾棧山東鯷航海故竒士端威異人罄折皆相望北闕待詔南宮而臣學無利博文有忮害乃影裾頓屣伏黃扉之右曳纓轉笏居靑璅之前訪德於姑射聞道於崆洞伊臣之願過為信矣昔望都才麗爵乏上班長岑聞靡身終下秩愚臣方古悠然已泰內燭徘徊眇不識屆拜正貟外郎表臣邁鄉逺迹由學末徒不瑩雕龍之采寧照玄豹之飾自過被光私濫蒙恩幸屢度經冬亟移春序皇緯如紐慙飛塵之效璿基方峻謝寒露之勤故宜伏影軒間卷氣衡下猶蒙供事紫楹奉役丹殿巡魄擎概榮渥不晤震離徹邃阿景洞幽復升官淸閨列版嚴闥識何算爰忝叔則之仕菲質焉樹乃謬仲容之職猥枉靑艧增光空質心懅末塵情慙洞户佇首矯迹以銘以奏為建平王慶明帝疾和禮上表臣聞慶動至玄則昌衢敦序教孚上雲則紫宇交泰故祈寒溽暑無以變其和沴火凝隂不能徙其氣伏惟陛下至德遐穆實天縱聖仁鑄蒼嶽道括寰海故丹陵之君欵金泥而謝賢媯墟之后眷龍圖而慙德頌聲蔽逵歌思匝道而望景暫虧輪光少曖玉櫺違和金幌輟念百祠未遑四嶽匪處吉蠲為慶神御方休瑞廣文齡祥深武日具惟涵教欣愈兼薦臣班戚奉慈實自慶舞不勝悅豫之情建平王慶安城王拜封表麗采繩河映萼璿圃淑問夙孚令儀早晣撰告候辰昭膺輝序國維富禮皇塗凝衛具生屬慶懷識戴躍臣涵悅楚邊魂馳關闕不任下情建平王之南徐州刺史辭闕表臣過承寵靈閔點暇日徒抱皇慈無充橫草而品第乃崇軒服逾峻顧兹靦躬彌覯荒昧今便奉官外甸卷迹徐山託慕宸嚴載惟感戀哀疾不獲詣闕不任窮鯁之情建平王讓右將軍荆州刺史表茂寵乃臨炫奪彞典巡恩鏡飾攪情震慮臣聞該秩詔序匪賢莫能孚其職端維裂陕非功無或濫其選所以輪鞅國典締結民紐五威咸平四精或訓者也臣踐行迷方試業敝緒徒以綴采宗莩承渥帝席執圭戴筆亟荷出內至乃曳組河縣蔑馴羽之化鳴環京轂謝擇鱗之政聲績兩無風化雙缺而龜紐未剔璽書頻降復改册湘區分瑞衡服竟無賈琮交部之亷終乏郭伋并壤之信固以雜沓民眀湫隘身諷不悟皇靈再輝河海重渥遂踰恆采妄賁異等荆門務要方城任積水交沅澧山通岷峨襟帶百縣縈抱七州上德懋勳鮮居斯地寧臣膠固所宜膺荷是以燋薄魂色驚迫心影謹刷睿情置露弱志伏願陛下停旒弛琪暫照瑣曲則鑄才式𢎞練物惟逺王度既清蒙識以泰不勝慙懅屏營之情為蕭驃騎讓封第二表臣某言寫瀝愚丹已續前表猥降前詔未垂鏡恕一省驚慙再悸魂府靜躬自察啓居匪地臣聞日薄星回昊天無以爽其節山盈川沖厚地不能虧其度豈不靈鑄有限神極無爽况世道恆淪人彞剽奪數滿必沿虛飾小故亂大臣才非古賢任鈞左戚祚開山河兼金疊紐爵侈常班寵溢前逹以榮以渥且慙且靦雖嘉銘鼎之恭更懼循墟之速矧乃三司業貴上將地崇惣録務廣河汾寄深圭宇方啓劍衛增肅既驚朝野足震城邑殷周富士猶難其人漢魏多才亦罕兼職且麟閣之臣尚有位不及鉉全器之侯猶或任不並台名爵無假前世之雄規車旗勿濫中葉之英軌况鴻誥鬱集懋册頓萃諒非虛薄輕所膺符今殷夏既聲封國式固故天地燀耀日月更輝陛下停若鏡之眀流如雲之愛方求士於版巖宜思賢於屠肆而私臣以闈廟寵臣以帷鼎位兼文武職惣內外非所以發夢渭濵儲精河藪鐫金刻石既不可詮輿歌里誦其謂臣何仰緣大道方行蒼祗宅氣威靈所燭九功咸詠寧於庸臣獨隔恩耀誓守愚衷重扣雲日如蒙恩宥實生之幸不任慊欵之誠為蕭驃騎讓封第三表臣某言臣再抽慊請辭為理屈側守圭漏伏望衷鑑而宸緯嚴祕襟悰徒懸優奬之降非復常旨肅奉驚懅曛曉如失臣照册訪古誦史稽昔以為敷道之寄管物成務惣録之重匡績毗風莫不下協河嶽上踵光緯先王所以長世後睿所以字民纘金圖之要輔樞厯之機者也臣本瑣姿不慕聞逹昔值英世頻遘時來感激光私未能自返烏可超乘厚任妄據髙圖天道既平鬼神好謙臣亦何人而獨斯處所以不恤色忤頻犯鴻威者正以方圓之景已滿丹彩之色難加政能緯俗匪務傍職坐而燮道必在其人若臣武未屬櫜鞬之分文不藹樽俎之間德非時秀道乖物宗虛飾疲伍空貽上位則天變彰於飛流地眚見於震壓驚蕩民聽蕪沮物議綸言之出不追金石之謬巳逺豈惟敗錦傷經毁鼎覆餗而已哉自非西京上績東都名勳河右羣賢江左諸彥寧有誣叨天爵以為已功者也昔南楚偏君鄢郢小政執圭柱國尚不輕授况車軌共文四溟同宅而以鄙蔽超居金鉉殊任鬱起臣心憂魄悚視丹如緑伏願陛下暫停冕纊少察愚實鑒臣靦情愍臣孤志廣天下之惠可匹夫之諒則國步永清門下永無謬悮不任憂駭之情為蕭驃騎録尚書事到省表臣某言臣自妄蒙異寵輕荷殊爵晝昃猶聳夜艾方驚誠以設器瑶陛取監沖滿懸魄金波徵驗虧闕兹乃天數去盈人經好退后所以裁成萬品下所以各愼百司未有違才易貫克負永業者也且量力之誥實炯前書辭科之誨且昭昔牒况臣徒竭弱質忠貞未對猶叨今恩山嶽非重故慙屬交喪頻煩表疏必謂巡崖之慊不忽俟河之淸可期不悟皇眀神邈鴻奬彌深雖守丹愚競絶蠲恕今輒耀纓上序鏘珮中軒德輕施重左右生華志盡輸謝終愧報效不任下情為蕭驃騎讓豫司二州表臣某言臣傾心駐氣不蒙睿感憂讋交鏡中寐再驚臣聞國厯惟耀則藩伯緝其才朝緯伊序則方率司其度用能璿紐弗虧民教可變者也臣自少器業無聞𢎞大誤變燕鼎超慿吳舟託翰負組假翼要瓊質圖玄素文寫青艧爵富諸公任髙羣彥銓梁既失輻誚所湊雖仄影毗道徇身贊德朝徽不昭民聽具溢豈非性力知限鑒度有崖乘兹而處猶懼紊辱之恥况此以任何堪湧溢之賜且董督條興皆非盛古至乃河襄初授或體兼上才江表廣任或功為物首臣績陋於國不勤睿朝寵集若是非所克取終抱寸襟重露愚見伏願天鑄廣裁地靈厚載特垂蠲渥使不矜盈則藿質蓬性庶無矯奪不任匪晏之情為蕭驃騎上頓表臣某言伏見眀詔鑾輿便御親六師臣又謬惣羣帥竊聞金火告耀昏眀代卷雲電溉湊經綸相襲所以草昧縣宇昭晰區宙况乃逆徒阻兵器掩西服雖蟻衆鼠竊勢必褫散然尋仞難貸原煙易滅臣受算內楹稜威外閫按甲視夕沾襟待旦翦此凶渠庶匪曠旬但遂玉輅躬臨雲蹕親駕悚慨交心實百常憤今便嚴率所統尅此月二十六日出次戎郊故巳望江源以軫歎想荆山而增厲矣進止之宜更聽敕旨不任悚企匪寧之心為蕭驃騎謝慰勞表臣某言即日侍中祕書監臣戢至奉宣詔旨慰勞便受轂中帷練甲外壘旍旄蔽景輿徒競氣人懷秋嚴士蓄霜斷晦魂巳掩氛豎未懸稽鉞佇威寢興震慨今玉人臨郊皇華降庭輝耀望實將激威武戴鶡之夫迎光蹀恩投石之師攀照竦惠楚纊越醪方兹慙潤臣忝屬閫私彌抱渥洽不任下情為蕭驃騎慶平賊表臣某言狂賊沈攸之棄天犯紀毀禮滅緯外陵南畿內奰西夏稟血涵氣咸百讎憤賴皇威遐制璿圖廣馭四海競順其會如林仰綴宗稷之靈俯輯士民之效故嚴敕裁交妖鋒折首凱期既屇樂飲在晨斯乃紫厯方永蒼氓同慶臣僃符寵私時深抃舞不任踴躍之情為蕭驃騎解嚴輸黃鉞表臣某言逆沴電熾凶妖霧舒志大禋天情已類社故乃馳羽江郊騖燧山甸雖藏智審其黥戮涵識判其奔沮然兵扈難輕義險宜備故膺寵無辭奉鉞不讓今元凶既殪醜徒自紊朝靄方卷郢氛已廓樂琯登肆禮衣曳朝不宜復假殊服取缺彞則輒上還王府永戢祕館為蕭驃騎讓油幢表臣某言奉詔賜車一乘竊以國容方穆旗章式序朝禮永清儀服咸貫故象革建鏕尚炯周圖朱箱玄蓋猶照漢篆皆旌羽勿差功庸匪濫臣忝爵山重蒙榮海深襲恩祗册已慙初筮浮祿素位方疚心路鑒古以惕巡世罔然不宜假文丹幰空飾皂轓仰思至道俯恤物僭伏願聖逺特停華渥書愚上請追深纍懼不任下情為蕭驃騎謝甲仗入殿表臣某言臣即日被敕賜給甲仗五十人入禁儀武殿飾冠疇典局荷此盛恩五情銘載臣聞國之利器在祀與戎蘭錡之設實允儲方故官騎辰居羽林天部瞰城龍塞言伏鬼方臣股肱之力不足以染丹靑橫草之勤寧可以鏤金石而魚服象弭一旦虛授誕錫金圭方兹為絢黃河如帶比今非賞故異寵之襲心魄共驚不世之服蒼祗同灼雖攀靈河漢駿奔眀哲慙迹駭衷無情以處為蕭驃騎讓太尉增封第二表臣某言以鉉司崇貴衮位淵嚴非德非功無忝無溢故誓魂肆請舒衷仰謁不能曲流慈照遂乃徒洽恩奬周覽未交靈爽以懼臣歷古沿圖循逺訪繪未嘗不麗選衮台妙簡槐采者也魯鄭之賢戚曹蕭之勳彥吳鄧之盛功王鍾之素業孔眀之居蜀茂𢎞之在晉僉曰伊人是以處無懦色臣官逢昌世運漸時眀頻煩紫渥綢繆璿命身薄施厚感厲愈深遂負機繩之託猥集衡梁之任風軌不樹徽猷罕宣無以式翦寇兆載弭姦萌致虹沴阻於上京霓妖扇於下國實賴藩伯鞠旅侯甸入守欃槍旬始煙袪霧卷故皇道威稜之由神緯昭昌之效臣豈有探敻察幽之智攻城野戰之力哉今迹無小功事貽大賞愧寤終朝慙夢流夜咨此庸弱何以任忝伏惟淮泗猶梗趙魏未賓中原久蕪神州方翳思樂盛猷願厲聲頌將陪雲驂以北狩扈朝服以濟師乃為少雪庸誠微謝天眷耳寧容遽竊茂爵輕頒鴻名者乎伏願聖渥遐覃賜以矜宥霈焉垂仁穆然惠德血祈旦亮慊志夕滿雖蹈疵戾猶深抃躍為蕭驃騎讓太尉增封第三表臣某言撰心求私精衷請亮情不感神理無動天詔飾既降辭表是絶朱紱方臻金鉉未宥魄慮再馳詵然改席臣局志久戰淺概已領具煩寸管備黷尺史曠旬浹景祈指遂宜猶謂設品分職實以仰銓璧緯列寵縣榮故乃俯酌瑶陛迹聨盈缺道協興降上睿所以僉舉前英所以詳能今若第隨私貴爵與私富紊蕩邦經斷折民紀豈可還風中葉逖聽遐代者也臣才乏往賢績謝古烈妖鋒孽火將炎天地幸郊甸或靜江山以閟文軒華劍既榮既峻侯封桂食又盈又滿祿髙誚厚任重責深弱節兼誠誓思不淺伏願隆慈特垂眀愍臣奉國猶家慮公若私秉軸之鈞心希在治不任懇懇之情為蕭太尉上便宜表臣公言臣聞經邦緯治去華為急體國字民循素乃安聖誥遺風具騰丹册賢言流沫僃宣靑史何嘗不翦削浮奢銷遺文繪然後頌音載興澤洽式廣楚駕百馬民雜國雕秦修萬騎教亡業墜刻桷丹楹禮有常序朱轓皂蓋古無濫秩縹衣綸綬漢置前制奇服怪物周設常刑皆節俗約訓反朴還風肅政黎心釐一民志故禮奢寧儉宣尼之髙風以義止利孟軻之宏規若乃文采利劍道鑒其元雕蟲篆刻世照其淺雖儒墨異學名法各治至於遵本捨末其槩一也故荀韓之立典管晏之制書賈陸之鴻筆嚴徐之博辭食貨興志鹽鐵生論莫不異説而同儉乖議而共治然世淪物起道缺事遷蓋源起西秦波被東漢一魏不變二晉未革所從來者逺矣洎高祖武皇帝業髙縣宇化格區宙菲躬謙度方追重華納麓之勤約情撝操乃取文命卑宮之義去金錦之巧無帷帳之飾唯修逺圖綏國之術祈勸力耕濟世之規是以政平刑偃紫階斯廓太祖文皇帝恭巳眀臺之上聽政衢室之下九官咸靜萬績惟凝亦復務抑華詡思裁奓太輿馬翠翟之麗鮮登乎外禁瑶碧綺組之玩罕設於內宮故大德立而五路謐鴻名建而四民寧者也自頃政教日替敦敘月虧誰惟歷稔亦曰淹紀至乃帝臺傾海外之寶王城盡天下之祕象席珠履一躡而即收鏤琴綵瑟再撫而已損褧衣隨塵而罷羅袂從風而棄百民染其聲奢萬姓被其馳蕩故闤闠之里富者竊梁楚之乘伎巧之家豪者襲王公之服於是有文靡虛麗驕邪不典之器精纎空飾妙蠱非常之玩農夫勤耨不充浮伎之資蠶女務織無給點刻之費將恐去實就華未知所屆背源從流不識其止求國富兵強寧可得乎今江南所宅止漢魏兩州之地户口所檢裁文景三郡之民舊齊故魯鞠為茂草全趙盛魏豺狼所嘷陛下方欲鳴鑾中土朝服濟河不改斯術則未見其可也臣謬屬大任竊同憂泰日晏宵分實忘飢寢草治其莠職此為先輒具條便宜可以安邦利民者事事如右率以聞見謹簡聖聽若其咸允謹請敕付外施行為蕭讓太傅揚州牧表崇絶之寵降自白日殊甚之禮墜於靑雲祗畏驗盛若奪魂鑒巡席無容當軒改色臣聞天地之大德曰生聖人之大寶曰位將以啓廓靈緯崇樹神紀百司備列貴賤之分既炳九官咸贊升降之際可眀故皇極不爽國步斯泰雖金媯各政姬華異治未有革序變倫而能流英發耀者也臣才慙右賢功愧上烈平趙夷魏之氣無宣於國書濟河登山之威未亮於左史既罕龍韜金匱之效又乏楹間帷中之績衛主寧謂提橫流匡危不足生細民故小節時顯於艱難大勳無紀乎廊廟而乘軺服冕荷蕭張之賞開城裂域受曹鄧之爵不能翊教緝政釐濟氓隱贊邦𢎞化飾整朝輝是以德少寵多輿人立規才薄位厚處士興議故玉燭未調道治猶鬱者臣之為愧也不悟陛下復停日月之華凝煙露之潤擢臣瑣姿鑒臣陋誠前恩未曠後寵已襲上公祕鉞聲振都鄙文劒雕舄禮殊軒殿深褒之逮方今為絶大賚之降比古為超臣亦何功當處斯忝復願道邈先帝理鏡衆寂被氣順方涵生獲慶特輟策書時停鴻册則人歌僉平物抱至歡為蕭重讓揚州表臣某言臣以功狹賞峻世誥所讟才弱寵隆道經所諱故寫魂誓膽庶留天矚圖驕慮滿護守私吝不能靑蘋引風陽燧要景復降綸册徽采兼明影迹交戰水煙相薄竊聞周夏異章玄素各禮儒道二宗名墨兩教咸以裕俗為急僉以得人為寶於是尊官上品乃貽玉振之賢鴻等懋列為取金聲之彥或有濟世夷難之略輝耀內區導江疏山之勤纒結中宇深德衍溢大功振驚然後超居國右鬱處朝端故九職惟宣六典式序丹靑所以傳其藹磬管所以揚其音也臣才蔽識淺非集譽於鄉曲榮降寵臻乃假翼於皇極遂事等話言之寄任鈞負圖之重職惣表裏地聨機務位班昔良知闕前修居官不聞其風處秩焉見其政寰域之治未緝街縣之訟方興繒販之士無薦管庫之家寂寞四維不闡五教罕敷安可以底慎財賦交正庶土者也今輟和毗道仄身贊業尚據晦曉獲毗璇圖况異禮更飾褒命復崇名超列辟爵擬羣后上仁居之猶涵慙德臣實空儒伊何以勝既誣人文將黷玄緯凌歷飛流之眚懼失正和晦裂霓霧之災且濫世物臣是以寤寐永歎憂國慮私者也伏聞陛下裁天賦品制地平施使曠世之典不遂臻於末躬迥代之軌無頓被於兹日素心丹魄皎然靡疚矣不任憂迫之情為蕭三讓揚州表臣公言臣再辭非謙重讓靡飾實以爵髙中世歷古所難寵冠上台綿代誰易詳圖辨針如鏡如水檢崖覽志匪雕匪文魂祈夢請駐心挂氣陛下猶降以璽書之榮被以丹碧之采頓然變容一慮九逝臣以為寒暑繇乎平分晦明驗乎天道咎譽起於微薄得吝生於小疵故金衡既陳錯髮之異必縣銅墨咸設分撮之殊巳傾聖哲不能爽鬼神莫由避况臣鄙槩早盈陋才久溢第超庶后禮絶羣班仰贊東序之賓平參北宫之政窮盈極滿於斯為甚鑒兹隆替淵冰非譬所以坐洞房而不悟下輕帷而嘆息也古之馭教當有道焉量能而受賞撰智而錫位深乃裂組逺故分圭前人以為稱首昔賢以為美詠自非上德橫乎天地髙績格于區宇烈譽馥於一時茂名鬱乎當世者豈有降今日而莫先哉臣爰蒙殊寄六稔遂交及荷惣任二耀忽周未能塞謗生民獲免僮訟何盛勳之足題詎深烈之可銘乎而因委忝濫踰溢倫等朱軒躍馬光出電入貂冠紫綬寵靄霞照臣聞闔宗奉國猶非報殉方將身侍鑾華雪齊魯之侵地手執羈勒騖燕趙之逺郊然後追迹范張濯纓汾射臣之志也華爵盛典非所敢寧伏照古巡將流聖察無使匹槩血誠不諒於璿扆宏芬英猷遂蕪於里聽豈伊庸臣獨蒙其庇亦曰海隅咸被其利焉為蕭太傅謝侍中敦勸表臣公言即日侍中臣惠基給事黃門侍郎臣僧珍至朱蓋乘雲玄軒肅霧墜髙天之旨集微臣之軀神爽矍然斂影無地臣初長血心未啓素槩辭從意空言隨事盡不能降陛下一時之恩借俄頃之照遂枉近侍貂簮軾庭臣自亮無庸何以集此退咎慊誠悲枉埀光進戒朝訓虧兹盛序感慮躑躅榮結夢寐臣檢古少例巡令逾疑豈有妄叨天功虛竊上賞近謬國華坐取隆貴人見其過外惜皇猷內畏私眚昔西京鼎秩漢世權家丹墀網户擊鐘連騎何嘗不以驕滿貽戾謙沖要福者哉臣不能遵煙洲而謝支伯迎雲山而揖許由激昂榮華之間沈濳圭組之內光飾既超寵靈亦逺江左已來罕見其倫今位冠朝端通侯萬户結象弭於前衡奏金管於後陳都野宗其榮盛視聽驚其炎貴臣一旦居之誰以為不忝者乎而陛下猶崇以異禮者是增臣之戾也况復肅延華勸實深窘迫伏願俯矜單志賜遂前請則世寢橫議臣蒙緩責為蕭重讓尚書敦勸表臣公言臣五寫丹翹宜蒙凝照一降王人遂無蠲察復遣尚書臣岱兼侍中臣奐等奉宣慈靈重賜勉誨鏡伏回環憫默失圖心魄交懅淵谷匪譬臣自初被詔迄於今時載慙載疑以悚以厲豈非深懼鴻典永憂末躬故琴瑟徒鳴不傳廣樂之響燈燼空舉焉續景星之耀何則卓乎小者不足以任大守於蔽者不可以語通臣器乏淵源識暗機務倫濟夷險每慿璿歷之逺龕拆氛霓輒資羣才之效臣寧有採奇鑒隱之能網國提民之功乎不謂過延渥洽謬攀河漢榮宗蒕葐寵華暐映籍聲探議共知其幸况傅保之崇殷周特貴牧司之寄魏晉稱重上昭妙德次擬英勳有踰兹序鮮不紊裂今陛下方闢金門之聽調繡扆之政何得去禮廢雅近於臣始既無前章孰表後世臣才孤位峻待罪無日矣情哀理感事盡於斯伏願一運天景微見藿心則物不逃形臣何恨焉不勝燋憂狼狽之至為蕭太傅謝追贈父祖表臣公言即日兼謁者僕射姓名奉宣詔書追贈臣亡祖某太常卿亡父某為散騎常侍特進左光祿大夫寵輝泉扄恩凝松石奉渥銘心祗光慟慮臣行阻祗玄躬早荼棘如創之痛昃日不遑終身之恤霜露彌戚雖慙曾輿喬木之敬實抱仲路華轂之哀自謬藉圭金空貽組紱爵侈於公祿盈於私何嘗不靜欷其結默慕交深不悟睿孝動天昭性曠古惠被逺紀澤演慶世丹情靡諒峻册愈凝大榮集身尚驚異施况寵洽山柏特振殊造銷骨瀝命猶不勝謝不任鯁泗荷珮之誠為蕭讓劍履殊禮表臣公言近仰局威靈辭移理奪故欲冒忝傳識必避殊禮不悟復凝令詔雕飾非常鏡睇未周金火交慮臣聞寵以昭賢不濫才外之華榮以麗身豈謀分表之渥哲后所以僉授貞臣所以慎荷故行圭行玉尚無輕頒一爵一號猶宜詳品况劍舄升陛贊唱異儀殆為對越神體抗禮天極漢魏舊載唯斯稱重雖英衮簉朝賢武滿世蒙此典者乃曠古特降耳諒由功饒賞結名髙器深金蟬緑綬未足藹其采瓊珮朱紱不足宣其榮方加以履殿優以勿趨雖至第為上公貴為皇王佇望兹禮猶邈如也臣何燀業寵兼昔人受以懼覆悔豈有及復聞殊旨增其憂迮抱此愚欵以賓為請伏願天鑒順臣所守則雖殁九幽傳榮萬葉矣為蕭太傅讓前部羽葆鼓吹表臣聞國容軍禮旌羽昭其華品騎第乘鸞蕤藹其飾所以炎耀仙都崇麗神境世教以之垂彩民聽以之流文故勒岫銘海之功鞞革寫其詠龕難夷邦之業簫管凝其聲朱鷺玄雲既錫上德華山芳樹以頒奇勳爰及台賢位髙藩戚名沿恩照寵垂私賞皆為發吹後陳豈曰兼奏前軒兹典罕行此禮實曠臣竊服巳𢎞叨光無限才局秩逺常銜炯耀安可二葆同整雙弄頓驚覽躬惕然特貽厚謬伏願眀爍日月靡忘情鑒將停盛飾遂臣慊心則涵惠既饒恭錫多矣為蕭太傅謝輿駕親幸表臣公言近以神輿將降昌啓丹辭重被還旨未垂闓允謙尊彌光褒優愈臨慙疚既積敢忘謙請臣乘幸藉私豈曰無僭攀霞鏡月非復常所此必讓德信在於兹但恩嚴交泊固守莫從免默恭典伊榮加戚寧容爰枉鸞駕式驚臣府訪心驗巳諒以不夷求物校迹誓無此義且古今異飾紫靑變禮取諸臣躬未覿其安伏願陛下賜止冕輅時停雲駕則俗踐知方臣蹈厚泰謝開府辟召表臣公言近被詔旨賜令臣府自辟僚賢竊聞治以才為寶教以人為貴激風揚蕤實資山東之英凝華重馥良在關西之彥近以闡耀世經發麗朝序而州䇿郡聘兹禮尚堙台召鉉辟斯文亟曖豈非盛美難嗣故曠寂先芬者哉臣謬贊國機職宜冰鑒未能澄形照藝薦品任官既乖覆業彌戚深寄仰屬皇心遙覃察政洞俗𢎞此懿典崇臣逺寵輒仰睿恩謹宣巖壑庶幽居之士蘿薜可卷奇武異文無絶於古為蕭上銅鐘芝草衆瑞表臣公言臣聞象際玄通豈以眀昧岨運幽崖遙鏡不以人靈異謀威書璧誥既信其綵緑鱗丹字彌驗其文是以業藹鴻經則煙露呈照精昭景緯則川嶽發華故寶鼎白雲瑞集軒世芝房赤鴈祥委漢年玄石鴻鐘逺炳晉室玉璧􅉓器近耀皇宗自大眀乘規泰始疊矩朱鬐素毳之至史不絶書奇葉珍柯之獻府無虛月今懋厯啓圖靈基再固頃歲以來禎應四塞近獲豫州刺史劉懷珍解稱所統建寧郡建寧縣昌村民於萬山中採藥忽聞異響從石上得銅鐘一枚長二尺一寸逺象古鑄近乖今製又州界之內樹生連理二木隔澗縢枝相通越壑跨水合為一幹方之舊説彌復為貴宣城所統臨城縣山中獲草一株交柯攢莖紫蓋黃裏貞潤暐曄自然天華採輟歷時質色不變闕炳據有徵近獲吳興太守臣王奐云十一月二十九日解所統長城縣令臣張撝解稱其月二十五日甘露降縣東界下山之陰又東太守臣腦解所統武進令臣紀法宗云十一月十日解稱其月二十四日甘露降於彭山松樹至九日又降如初臣以祥緯雜沓星燭波連斯乃靈迹深覃睿衷敻感理應寫順祗無涵祕稽往徵古僉欣升泰瑶光日闡玉繩永休謹拜表遣兼長史參軍臣姓名奉銅鐘芝草以聞為蕭太傅讓相國齊公十郡九錫表非常之册分天而降冠古之典開河而出遙然以慙魂交象魏臣聞日月權輿二儀所以克靈君臣設極三統所以式固惟生與位謂之大寶辨諸文而尊卑既炳觀羣龍而貴賤可正雖復殷因於夏王資於帝至乎建侯分職體國經野其揆一焉是以二周之始山河逾廣兩漢之初封賞彌盛然表東海者實牧野之日瞻魯邦者乃負圖之辰西都英相信命世之功關中上宰亦龕亂之力秬鬯彤弓本西伯之賞虎賁戎路又晉公之典若乃衣裳盟會九合一匡猶慙德斯禮也臣實鄙才靡識大體徒以忠貞為槩而勞不足銘雖以丹素為誠而功無可勒豈有經天緯地之略探隱照寂之智哉抑亦何術以堪盛休是以覽雲際而懷古慿軒榥而未寧也伏惟陛下神華馭世理無不鏡賜臣待謗今職守其私滿則天下有道庶人不議矣為蕭讓九錫第二表臣公言臣近厲心罄辭寫情畢議眇望神藻鑒見丹襟而帝閽以祕綸誥方明中外卷容左右軫慮臣以為麗天秉經君上之彝憲儀地執緯臣下之恆軌故皇極載凝庶士交愼昔者重黎效官裁居炎𡨕之職羲叔能任方掌日月之序至乎御龍勤夏未聞冠俗之爵大彭翼商豈見超世之典以古先哲后如兹之愼賞也臣乃謬貽國寄志在靖難若夫野戰虹霓伏順者易為威城攻鯨虺奉國者理必全雲氣薄蝕下民咸貴更明恃險輿馬舟中皆可異議故昌邑有歸邸吳楚無旋師斯激芬楊蕤物同其幸焚惡去醜世共其庇實為仰慿俯順之效臣亦何力之有焉竊謂祿為十郡必俟禹迹之勤錫以九命乃須周公之美况吕梁不鑿而器重玄圭越裳未獻而賦擬千乘京關識其崇貴畿服知其忝冒鏡前修而慙形覿往德而聳慮畏崖之請取譬深水審量之祈呈照皎景伏願陛下逺牽雄範近覽英規憑霞停詔臨風輟恩豈伊愚臣方被昌化具日遺氓咸蒙其賴矣為蕭謝百僚敦勸表臣公言臣欵誠素履頻載縑翰天飾髙奬纍降史筆即日尚書臣某等至重宣詔旨猥辱百僚省睇未交心靈巳悸臣聞良宰謀朝不必惜威貞臣衛主修已則足故驕滿之失取鏡函關謙側之美見照伊闕臣本庸人識無逺度值開闢之辰遭欃槍之運姦回內奰則戮力瓊都諸侯放命則抗節瑶祀秉號仗義幸不辱威皆為冕旒遙鑒之明羣士畫圖之助臣寧望伊摯叔旦之爵吕牙申甫之賞哉方欲謝簮東都濯冠汾陽不悟盛禮華典復臻於茲靜默回環祗畏躑躅猶謂遇聰明之朝當時雍之世陛下詠堯風之化歌卿雲之詩日月華采萬方獲性疊慮仰祈必蒙題品而威嚴窈絶斯冀遂阻鑾輿玉駕復許敦幸重臣愆悔無地自安便當謹恭鴻命竭身為限蕭相國讓進爵為王表臣結慮歸請三辰未鏡傾魂仰視九天彌阻重炳徽䇿再晰光誥理晦情震若涉嚴淵臣業不出世績未逮古謬藉明政陳力就列艱多智寡翊贊罔樹若乃洪範不修鍾綴旒之日九黎亂政當摧軸之辰雖瀝命奉時禍提下亟防明之陋貽慙昔人杜險之蔽取愧前英故十萬之師無集稿街之邸千金之貴恆單白藏之府戈船發於江湖戎車出於石城然後雲徹席卷虔劉巨禍臣實恧焉不悟上賞亟降華爵必集雖延首紫局翹意宸居執為守約之志既謝簡鑒避賢辭智之請終無開允故受任専征逺邇知寵肇封四履侯甸推禮昔虞思勤夏不列殊物之錫晉叔匡周豈頒上公之典燕藩懿親裁蒙衮舄之榮梁國戚屬方忝旌旗之貴而臣包括庶揆惣納儀刑蓋出近古非三代之逺體也乃踰九命爰超五等域中之稱麗天作則探情顧抱豈所允安者哉伏願陛下一檢丹崖遂臣慊心無使怵迫深貽疵戾為蕭相國拜齊王表臣無佐夏匡殷之功威晉服楚之績業不題於宗器聲靡記於彝典而超居上禮邈乘峻爵靜念隆替焦原非譬臣以為衆官咸事帝謨所以式序羣后克讓王猷所以載穆况臣訪德語勤未洎伊稷之能藉靈懷寵仍濫周邵之秩故駐魂仰請瀝意歸聞理竭素牒事罄丹史具徽太微備簡玉繩而才輶志淺隔景絶照朱輪之使日月亟紆金鑾之尊旦夕將拂巡情覽識豈伊寧處今便肅典內軒恭服外屏大夫有命古或無違王假有廟今臣為叨三省空懦震據於心為齊王謝冕旒諸法物表臣王言以軒冕雲蹕既非常之飾宫懸玉戚乃配天之禮故呈襟效慮必期蠲亮重被還旨芳訊愈越鏡伏殊私情影逺震昔大啓營丘未修樹羽之賞光宅曲阜始兼龍旗之貴况道狹慶隆身薄器尊粉繡爭輝藻火競耀夫太常圖列星之采華蓋觀古人之情所以聳絶百縣崇隔萬宇鳯閣因此而神瓊都由茲而麗故醜功慙德違議避榮誠不遙孚理無敻達遂貽器誥爰斷辭表驚栗遲回祈鑒何地便當肅對王休敬昭異寵佩服盛文以慨以懼為齊王讓禪表陛下逺規唐虞永揖之典近暮漢魏高謝之禮既覽金水昏明之數又協雲雷隆替之徵激風太上扇采至公聞命驚爽心靈殞越臣聞天地草昧而樹之君所以平對二儀顯臨萬國膺符受厯惣明司幽軒轅陟祈首出庶物顓頊登庸作為民紀雖五德迭興十代繼運非賢非睿莫預斯位若乃與能之交禪錫之會豈伊虛薄所可遵擬昔傅巖佐商秩終上公磻溪翼周名極列伯臣才非半古功愧逮聖獄訟不往謳歌寧歸河乏馬圖之寶天無乘龍之錫元首股肱誓不可異而曠乘之軌忽臻於兹慙慨憂灼罔識其際伏願陛下遺舜禹之心臣守巢由之節則道耀日月澤浸飛泳聲振開闢仁動今古四三王而六五帝不亦休哉章為建平王拜右衛將軍荆州刺史章圭册停徽車旗寫曜襲禮炫衷迎恩震色臣聞爵以能委命以績降亦有玄雲結吹褎成燻之厚朱箱纍轍崇試宰之髙而臣紐組頒守要玉備政績廢江區聲隘河部浮榮曠年叨光賖日諒以具察輿歌取鏡民誚不悟皇德至凝亭物帷幄復使承官楚封袛秩漳土任班河冀事亞崤陕橫術輻湊殷民訟積寧曰明哲疇克勝寄雖瀝丹局終懼蒙咎不任銘戴匪處之情為始安王拜征虜將軍南兖州刺史章絢服騰照懋册凝芬夤對迷墜慙泣交集臣職右南陽謝蒲鞭之政任重臨淄無遣獄之化自分金帝闕參風尹訟璧緯裁復圭露詎淹不悟旻靈拂采霄景汰色復交書河楚置傳吳江環章淸潤旗文肅路寵艷內維榮炫外圉方梗名慮有陋莩識沖生靦氣安以輸謝不勝荒震屏營之情為始安王拜征虜將軍丹陽尹章既耀軒禮涵蕤龔恩爽泗靦默臣少識猶晦哀辛方襲藉以育采上霄搏華中漢飲惠延光偭爵假息不悟瑶離降映繩河低文遂翊言關禁徙第京部進憲蒙淺塵紊徒盈還迷懅悚風製罔樹循伏憂欷滅慮燋衷不勝荷佩之情為建平王慶少帝登祚章上書皇帝陛下伏承肇嗣天震雲飛璿極戎夏歸服民靈以戴臣聞黃旗紆藻瑞益於姬帝紫雲垂蓋效異於劉后實乃深賜天衷廣映祗迹伏惟陛下騫英駕聖涵靈縱睿矩心明裁繩道哲時遙裔雒符雜沓河紀是以膺符寶宫輯命珍殿誼洗雲密德徽媯夏濬發鴻原長禘偉業方絢聲金圖騰華玉厯波淹下氓炎躔上漢臣沿莩締寵誠兼親屏禮升之日守官楚甸不獲勉躬儲外奉顓行間魂泣江郊心泫京國不任悲仰哽慰之情為建平王慶王太妃正位章上書王太妃殿下伏承以令日淑辰曾光樞景慶芬祗外禮蔚寰中臣聞道懋第昌業廣祉盛藻秩攸臻憲章斯飾伏惟殿下柔明固天夙資龔懿芬惠翔聲端簡散譽冠采摰妊騰耀徽姒丹陵藴德玄丘棲聖煙煴國牒衍溢民聽涵道席教且詠且洽臣忝任蕃圉無由隨例闕廷不勝荒情為建平王慶江皇后正位章上書皇后殿下伏承以嘉月蕙時膺曜宸正翠珩照品褕組在飾休遍函夏譽殷靈昧伏惟殿下嶽曜靜德式懷謙順升降圖傳左右詩史夙鏡茂資早摛芳訓故以騰馥祕閨寫問中帷今靈緯載升崇正輝典衍教紫庭麗軌華屋聲激綺組風偃家邦黎玄湊仁雲祗宅慶逺邇有聞莫不傾渥臣限外任無由恭列軒屏不勝荒情為蕭領軍拜侍中刺史章上書皇帝陛下即日詔書以臣為侍中驃騎大將軍開府儀同三司班劍三十人等持節都督如故峻命在庭光册充軒虹驂聳服朱轓佇蓋夤對以懅心影若傾臣功乏至道不足以題象魏績非振民無可以書廟閣半漏未晏中鐘而驚實忌微庸起乘盛服竊疑國寵頓萃末躬今寰海順典瓊都咸光調御惟新鎔製就始良宜整變獻經詮明典緯九河式耀三辰載晰不悟陛下皇靈曲溢大賚斯降而鴻賞之行乃於臣始非所以騰振遙風激昂品流輿人之誦具聞其黷頻露慊祈未叨鑒順今便虔禮靑軒謹躬丹墀憂符怵愓慙屬兼軫不任屏營之情為蕭拜太尉揚州牧章玄文既降雕牒增輝禮謁前英寵華昔典仰震威容俯慙陋識心魂戰栗若殞若殯臣景能驗才無假外鏡撰已練志久惻內涯故讓不飾迹辭非謙距寸亮尺素頻觸瑶纊丹情實理備塵珠冕而神居寂阻九重嚴絶徒懷漢臣伏闕之誠曾無魯人回日之感所以回懼鴻威後奔殊令者也既而永鑒隆魏緬思宏晉國之大政在功與位故治民紐亂不處輿臺之下去勳捨德寧班衮司之上咸以休對性業裁成器靈詎有移風變範尅耀倫序者乎臣績不照朝忠豈宜國名爵赫曦僶俯優忝陛下久超異禮之榮越次殊常之秩雖寢寐矜戰曲垂哀亮而璽册沖正愈賜砥礪今便肅順天誥恭聞睿典審躬酌私必跋危撓將恐民俗由此方擾軌訓以之交蕪臣豈不勉智罄忠未知所以報奉淵聖輸感霄極取諸微躬長為慙荷為蕭拜相國齊公十郡九錫章殊命寶典鬱降雲天采詔綺軒光流城禦震驚華禮神氣交越臣才謝深英氣慙逺度進寡兵車召陵之盟退靡朝歌河內之會無束馬山戎之績懸車流沙之功故望寵未安踐榮加懼况納陛朱户事絶羣班金璽緑綬儀參鴻典聞命屏營以憂以墜近申微欵日月之鑒既阻方懼難慊蘭芳之旨愈峻遂致百辟卿后踟蹰於衛闕鑾輅旗旗方幸於臣府悵然遙慮將貽厚戾文章徒單迄無蠲省而天威咫尺丹懷罔固輒肅恭文物翹拜榮禮違距以深追憎怵迫德輶寵盛於斯為微非臣鄙虛所能酬對符尚書符侍御史大夫尊冠賤履君臣斯位愛順惡逆成敗可曉未有憑凌我江郊侵軼我河縣而不流魂漂骨丹宗血祀者也沈攸之寂寥無聞起自甲卒邀我百戰之軍乘彼一捷之幸鐫山裂地紐紫要金擁旗藩伯便無北面之禮受符方屏即有專征之釁箕賦深斂毒被南郢枉墨矯繩害著西荆鬼怪其性故從始而遂終狼戾其志乃沿少而得老山陵不奔移殃為慶踐祚無賀按劍稱豫遂乃關馳逆書亭照妖火此而可賖孰不可宥今遣陳承叔彭文之等敢徑三萬前驅電躍呂安國任侯伯桓崇祖曹虎頭等樓艦五萬射蛟中流荀元賓郭文孝程隱雋等輕舸二萬髙旗蔽日周盤龍張文嘉薛道淵等鐡馬五千龍驤後陳凡此諸帥莫不氣薄日月精變虹霓或飲羽石梁或超踰亭樓索鐡拔距孤視萬旅顧盼則前後生風喑嗚則左右激電然鑾戎薄臨驍虎百萬六軍徐軌五輅遲斾丹艦發照素甲生波樓煩白羽投鞍成嶽漁陽黑騎浴鐡為雲於是髙山與深谷共湮紫芝與白艾同滅不亦惜乎符至之日幸加三省其驅逼寢手之人鋒陳塢壁之主若有投命軍門一無所問或能因罪立績賞不示私斬祛射袂唯功是與購募之科具列如上信如白水皎然無二臺明詳旨飛火普加宣下文書千里馳驛奏記奏記南徐州新安王伏惟明公殿下列譽椒璧蜚聲沖漢爰求儒雅傍招異人削赤野之玉翦燕山之金至如淹者東國之徒步耳方斂影逃形匡坐編蓬之下遂遭煙露餘彩日月末光惟恩知泰變色薰心淹聞齊石既撫無待巴人之唱柏臺巳構寧俟不才之木淹幼乏鄉曲之譽長匱芹藻之德豈宜炫璞鄭氏獻鳯楚門哉願避職吏緩其召書箋到主簿日詣建平王箋淹乃庸人素非奇士既慙鄒魯儒生之德又謝燕趙俠客之節徒以結髮衛次暫聞仁義常欲永辭冠劒弋釣畎壑而身輕恩重猥奉末光枉白璧之惠降黑貂之私因兹感激未能自反負金羈於淮吳從後車於河楚竟不能曜丹艧騰英聲絶白雲負蒼梧至可知矣不謂咸池再暉瑶光重照開髙天之慈布厚地之施承命以驚巡走且失淹聞古人為報常有意焉至乃一説之效齊王動色一劍之感趙王解衣孤心回槩有殞自天被黜為吳興令辭建平王箋淹本遷徙之徒非有儒墨之能亦以轉命溝間待殯巖下誤得步修榥循髙軒伏層檻坐曲池承翠河之潤降璇日之光載筆奉后盛飾立朝於山東百姓亦已殊甚雖蓐螻蟻拭黃塵不足以塞惠而小人狼狽為鬼為蜮山淵所容衣劍不貸黥赭幽圉皆非報責仰遭大道之行草木勿踐輟鑊斂火吹魂拾骨濯以河漢之流曝以秋陽之景叢然黔首豈不載天竊思伏皂九載齒録八年以春以秋且恩且顧竟不能抑黑質揚赤文抽精膽報慈光而自為擁腫之異木卒成踴躍之妖金所謂孽由已作匪降自天猶沐造化餘靈宥以遐邑方蒙被霜露裹糧洲島缺鑿山楹為室永與黿鼉為羣猶蹶者不忘起肓者不忘視况罪溢朔方尚駐一等之刑咎過朱崖猶緩再重之施金石無知何以識答昔河濟荆吳必獲陪從京輔關轂長奉帷席德音在耳話言如昨淹乃梁昌自投東極晨鳥不蜚遷骨何日一辭城濠旦夕就逺白雲在天山川間之眷然西顧涕下若屑到功曹參軍詣竟陵公子良箋竊惟明使君鉞下道耀神源德鑄靈極誕涵天聽資河照聖譽拂紘外芳激震中故衡梁孕秀璿璣流品變瑶光之暉贊玉燭之色功邁翊殷績起匡漢是以赤瑕瓊寶之文睇影而敻集青龍遺風之乘晞光而逺至如民者蓋不足算所志不出繒販所學不遺祝筮業異儒墨行乖曾史既乏修短之術又慙啓塞之辨不能伏軾蹲衡驚燕趙之郊黃金橫帶馳澠淄之幣語默罕緒圓方靡樹謬以一氣之微徼百載之會躬奉英睿身蒙青艧故以潤厚纍望恩重兼金不悟懸黎降景靈河瀉潤復獲執羈蘭陳迎笏桂序漏越之琴竊莊文之價缺齧之劍盜項襄之名心羞秦媵志慮楚犢抱魄踴躍憂集如熏鐫感何日銘報焉期啓鳥建平王慶改號啓竊以皇衢永謐則玉厯惟禎國慶方夷則繩澤式茂故五鳯協年甘露應號况今道潤衍溢頌祉載繁嘉生蠲慶風雲瑞節既覯昭晨方鑄昌化延守一隅無以自屆不勝荒情為建平王讓鎮南徐州刺史啓臣言臣誓惟殃釁頻寫曲折慊慊狂愚冀蒙哀弔而聖旨懸嚴便賜斷表神乖意失音影何地吞悲茹號情膽載絶臣荒昧神氣爰自幼稟分踰鼎貴秩髙外州臣乏素能或所不任况在憂年必取黜辱特為開非常之恩借權製之義紊禮滅經實翦治本臣又能身祈命請一感天地躑躅表啓心容巳靦猶疑大道之行墨縗不興孝治天下通喪獲遂陛下覆被仁明品物無漏豈於微臣獨不蠲鑒燋鯁在躬輒復塵觸伏願暫輟聽覽少憐苫草則臣死之日猶生之年臨啓恍惚魂識無主不勝殞越怵息之心為建平王謝賜石硯等啓臣言奉敕賜石硯及法書五卷天旨又以臣書小進更使勤習敬閲籀篆側觀硯功張衛慙奇金瓊羞麗臣夙乏翰能素謝篇伎空賁恩輝徒隆慈飾方停煙墨永砥學玩仰結聖造伏銘私荷不任下情為建平王謝玉環刀等啓奉敕賜玉環刀等五種珍器贐缺伏蒙猥降飾軼采朱跨影懸魄崑岡歸琛關山慙寶謹襲緹素以充握睇垂光既深銘佩更積不任下情為蕭領軍讓司空并敦勸啓臣某言臣沿心之請丹識以傾詔旨沖挹便賜斷表伏聞當遣王人猥垂奬勸仰天光休俯增驚厲中謝臣以為槐鉉之任百王攸先具司是屬冠冕式瞻化曜昌輝連基政務事深崇替迹豫興衰故道富一時則風行明令才乏通權則山摧河泣既澆汨蒼祗將紊毁身國臣進退惟疑再三自顧實以陋情悲忘寵極但畏軼超疲伍乃參鼎軸無德而貴豈敢偷存才怯任重物所不恕故弱識褊槩頻布前辭枯木朽株永隔蠲恕豈特大車方塵小雅有廢而已哉將據致寇之悔取鑒於兹矣且皇華之命居上之鴻私鳯舉之招為下之殊榮國勳必書史不謬牘況臣連牧圉嶽董率職方既鑠近古垂耀中葉揆望揣實為泰巴甚而乃復降朱輪之使方枉青册之勸寤寐悁灼諒無以任輒重素誠冒覬神照伏願皇靈特垂開愍賜停正台之職并免敦勸之使餘所榮忝誓不敢辭肅恭外屏祈回恩授則於臣慊欵復為惠造不任憂戴匪惶之情為蕭太尉子姪拜領軍江州兖州豫州淮南黃門謝啓臣公言臣頻結崇寵亟延上爵休恩動俗烈榮振古鴻品清飾巳藹金圖秀鼎號銘共茂瑶篆永言戚慮鑒寐殷心況乃秩洽朝門慶霑國珮弱息臣諱嶷映晃等文不昭典武不定功出內帷閫升降貂綬或振迹領候職贊禁錡或騰光江甸任鈞屏翼河兖衝要既濫北門之管淮豫險捍又謬西偏之寄兄子臣鸞忝守近畿嫡孫臣某載華省闥皆倐匆晷景頻煩升荷雖咸罄愚識恪居匪替豈足以少塞神渥裁酬皇眷囂黷一盈慙厲彌積談天之辨不能為臣陳辭雕龍之文無以為臣飾愧靜然肅念徘徊交集不任憂感沐浴之情上書獄中上建平王書昔者賤臣叩心飛霜擊於燕地庶女告天振風襲於齊臺下官每讀其書未嘗不廢卷流涕何者士有一定之論女有不易之行信而見疑貞而為戮是以壯夫義士伏死而不顧者也下官聞仁不可恃善不可依謂徒虗語乃今知之伏願大王暫停左右小加憐察下官本蓬户桑樞之民布衣韋帶之士退不飾詩書以驚愚進不買名聲於天下日者謬得升降承明之闕出入金華之殿何嘗不局影凝嚴側身扄禁者乎竊慕大王之義復為門下之賔備鳴盜淺術之餘豫三五賤伎之末大王惠以恩光顧以顔色實佩荆卿黃金之賜竊感豫讓國士之分常欲結纓伏劍少謝萬一剖心摩踵以報所天不圖小人固陋坐貽謗缺迹墜昭憲身限幽圄履影弔心酸鼻痛骨下官聞虧名為辱虧形次之每一念來忽若有遺加以涉旬月迫季秋天光沈隂左右無色身非木石與獄吏為伍此少卿所以仰天捶心泣盡而繼之以血者也下官雖乏鄉曲之譽然嘗聞士君子之行矣其上則隱於簾肆之間卧於巖石之下次則結綬金馬之庭髙議雲臺之上次則虜南越之君係單于之頸俱啓丹册並圖青史寧當爭尺寸之末競錐刀之利哉下官聞積毁銷金積讒糜骨逺則直生取疑於盜金近則伯魚被名於不義彼之二子猶或如是況在下官焉能自免昔上將之恥絳侯幽獄名臣之羞史遷下室至於下官當何言哉夫以魯連之智辭祿而不返接輿之賢行歌而忘歸子陵閉關於東越仲蔚杜門於西秦亦良可知也若使下官事非其虛罪得其實亦當鉗口吞舌伏匕首以殞身何以見齊魯奇節之人燕趙悲歌之士乎方今聖厯欽明天下樂業靑雲浮洛榮光塞河西洎臨洮狄道北距飛狐陽原莫不浸仁沭義昭景飲醴而下官抱痛圜門含憤獄户一物之微有足悲者仰惟大王少垂明白則梧丘之魂不愧於沈首鵠亭之鬼無恨於灰骨不任肝膽之切敬因執事以聞此心既照死且不朽書與交友論隱書淹者海濵窟穴弋釣為伍自度非奇力異才不足聞見於諸侯每承梁伯鸞臥於會稽之墅髙伯逹坐於華隂之山心常慕之而未能及也嘗感子路之言不拜官而仕無青組紫紱龜紐虎符之志但欲史厯巫卜為世俗賤事耳而彯然十載竟不免衣食之敗何則性有所短不可韋弦者有五一則體本疲緩卧不肻起二則人間應修酷懶作書三則賓客相對口不能言四則性甚畏動事絶不行五則愚婞妄發輒被口語有五短而無一長豈可處人間耶知短而不可易者所謂輪椎分定也猶如雞鶩之有毛不能得鸞鳯之光采矣况今年已三十白髮雜生長夜輾轉亂憂非一以溘至之命如星殞天促光半路不攀長意徒自欺取筋駑髓冷殊多災恙心頑質堅偏好𡨕默既信神農服食之言久固天竺道士之説守清淨煉神丹心甚愛之行善業度一世意甚美之今但願拾薇藿誦詩書樂天理性斂骨折步不踐過失之地耳猶以妻孥未奪桃李須隂望在五畝之宅半頃之田鳥赴簷上水匝階下則請從此隱長謝故人若乃登峩嵋度流沙飱金石讀仙經嘗聞其驗非今日之所言也誰謂難知靑鳥明之貴布筆墨然亦焉足道哉報袁叔明書僕知之矣髙臯為别執手未期浮雲色曉悵然魂飛前辱贈書知命僕息心越地採樂稽山友人幸甚去歲迫名茂才冬盡不獲有報引領於邑情詎可及足下推僕者不一二談也僕聞狂士之行有三竊嘗志之其奇者則以紫天為宇環海為池倮身大笑被髮行歌其次則堅坐崩岸僵卧深窟朝餐松屑夜誦仙經其下則辭榮城市退耕巖谷塞徑絶賔杜墻不出然者皆羞為西山之餓夫東國之黜臣而况其鄉黨乎或有社稷之士入而忘歸則爭論南宫之前衛主於邪伏身北闕之下納君於治至乃一説之奇驚畏左右一劍之功震栗鄰國夫能者惟橫議漢庭怒髮燕路且猶不數而况於鄰里乎若僕之行止已無可言矣材不肖文質無所直徒以結髮遊學備聞士大夫言曰在國忠處家孝取與亷交友義故拂衣於梁齊之館抗手於楚趙之門且十年矣容貌不能動人智謀不足自逺竟慙君子之恩卒離飢寒之禍近親不言左右莫教涼秋隂隂獨立間館輕塵入户飛鳥無迹命保琴書而守妻子其可得哉故國史小官也而子長為之執戟下位也而子雲居之僕非有輕車驃騎之略交河雲險之功幸以盜竊文史之末因循卜祝之間故俯首求衣斂眉寄食耳若十口之􅘗去為飢寒從疾舊里斥歸故鄉箕坐髙視舉酒極望雖五侯交書羣公走幣僕亦在南山之南矣此可為智者道難與俗士言也方今仲秋風飛平原彯色水鳥立於孤洲蒼葭變於河曲寂然淵視憂心辭矣獨念賢明蚤世英華殂落僕亦何人以堪久長一旦松柏被地墳壟刺天何時復能銜杯酒者乎忽忽若狂願足下自愛也敕為朝賢答劉休範書昔媯道鼎昌干羽未能戢姬德昭宣長旌猶卷舒焚衣毁冕有自來矣皇宋靈武誕命聖道鬱宏三后連光四聖沓軌或經天緯地搆紫靈之符調風偃海隆黃旗之祚莫不頌滿金石聲彯宇宙者也暨我太宗明皇帝惟嶽降聖重耀函夏延禮壁臺訪道衢室平陽之后卷迹慙靈空同之君斂功謝德是以彩雲祥風之瑞布濩區中梯山棧火之俗欵徼請吏跨商軼夏洗周滌漢道澤優衍猶不道封禪遐靈在天餘惠無泯主上文明金相穆然玉色履璧之禎獲圭之應著在紀嵗仁浸汙河惠愛秋草想亦君之所聞也重以先帝靈略潛通英轡逺馭受話言必忠貞方肅之臣奉風聲必虔恭匪懈之士明時琴瑟鼎鉉之盛且被於寧世而忽覿來書以惋以慨君為齊梁楚越之主鼎貴一時金玉滿堂文馬千駟爵授湯沭冠蓋於道惟名尊崇誰與為雄而出言效尤吐音入戾舉旗類社志竊神禁稱兵斂衆遂窺外關今朝無闕政頓搆凌上之節室無孽豎坐生莫大之疊鴟梟赭衣號興徒黨主萃淵藪寧滋之甚不臧不軌不忠不義未有若斯者也宗枝之釁逺則吳楚見禽於一壁盤石之嬖近則江荆面縛於小將成敗蘭艾之鑒又亦君之所知也聞彼虹飲鼠舞之異早見物徴河北隴上之謡已露童詠所謂妖由人作孽不可逃然桓侯之患良助寒心今羽林黃頭絡驛爭引熊渠佽飛首尾電發伏波樓船掩江蔽泛渡遼甲卒充野布隰加以先天蓋世之略蕩海拔山之威任輔沛陳羽林鷁鵃露動龍驤精騎風驅然後六師雲起九軍星連霓旌外江虹艗中水金甲映平陸鐡馬照長原蹴南嶽而永慨瞰九沠而懷恐伐罪弔民復驗於兹甫刑三千唯此為大僕才等不羈志瀝丹欵故奏禍福行矣悵然袁楮劉蕭等疏論無為論吾曾回向正覺歸依福田友人勸吾仕吾志不改故著無為論焉有奕葉公子者聨蟬七代冠冕組望多素紈黼衣繡裳負長劍而耿耿佩鳴玉而鏘鏘時遊稷下或客於梁間英雄而豹變聽利害以龍驤乃動朱履而馳寶馬振玉勒而曜金羈之無為先生之門問曰先生智德光融嵩華無得以方其峻道義清逺溟海不足以喻其深無學不窺無事不逹容儀間靜言笑溫雅至如釋迦三藏之典李君道德之書宣尼六藝之文百氏兼該之術靡不詳其津要而採托沖玄煥乎若覩於境中炳乎若明於掌內余聞天地之大德曰生何以聚人曰財是故老𣆀以為柱史莊周以為園吏東方持戟而不倦尼父執鞭而不恥實萬古之師範一時之髙士先生嘉遁卷迹飬德不仕乃列子之所待非通天下之至理雖江海以為榮實縉紳之所鄙先生倐爾笑而應之曰富之與貴誰不欲哉乃運而不通也夫忠孝者國家之急務也申生伍貟不得志也懷道抱德玄風之所尚揚雄東方其職未髙也其大學者不過儒墨亦栖栖遑遑多有不遂也子所引之士者情雖欲之志不行也憂喜不移其情故可為道者也過此已往焉足言哉吾聞大人降迹廣樹慈悲破生死之樊籠登涅槃之彼岸闡三乘以誘物去一相以歸真有智者不見其去來有心者莫知其終始使得湛然常住永絶殊塗無變無遷長祛百慮恬然飬神以安志為業欲使自天祐之吉無不利舒卷隨取進退自然遁逸無悶幽居永貞亦何榮乎亦何鄙乎子其得之吾何失之塵內方外於是乎著公子恧然而有慙德逡巡而退頌閩中草木頌十五首有序僕一命之微遭萬代之幸不能鐫心礪骨以報所事擢翼驤首自致丹梯爰乃恭承嘉惠守職閩中且僕生人之樂久已盡矣所愛兩株樹十莖草之間耳今所鑿處前峻山以蔽日後幽晦以多阻飢猿搜索石瀨戔戔庭中有故池水常決雖無魚梁釣臺處處可坐而葉饒冬榮花有夏色茲赤縣之東南乎何其奇異也結莖吐秀數千餘類心所憐者十有五族焉各為一頌以寫勞魂金荆江南之山連障連天既抱紫霞亦潄絳煙金荆嘉樹涵雲宅仙姱節詎及幽意誰傳相思竦枝碧澗卧根石林日月斷色霧雨恆隂緑秀八照丹實四臨公子不至山客徒尋豫章伊南有材匪桂匪椒下貫金壤上籠赤霄盤薄廣結捎瑟曾喬七年乃識非曰終朝栟櫚異木之生疑竹疑草攢叢石徑森蓯山道煙岫相珍雲壑共寶不華不縟何避工巧杉桐梓舊麗松栝稱奇焉如兹品獨秀青崖羣木斂望雜草不窺長入煙氣永參鸞螭柳木貴冬榮柳實寒色停黛峯頂插翠石側碧葉菴藹頳柯翕赩方陋筠檟逺笑荆棘楊梅寶跨荔枝芳軼木蘭懷蘂挺實涵黃糅丹鏡日繡壑照霞綺巒為我羽翼委君玉盤山桃惟園有實惟山有叢丹花驚露紫榮繞風引霧如電映煙成虹伊春之秀乃華之宗石榴美木艷樹誰望誰待縹葉翠萼紅華絳采照列泉石芬披山海奇麗不移霜雪空改木蓮迸采泉壑騰光淵丘緗麗碧巚紅艷桂洲山人結侶靈俗共遊時至不採為子淹留石菖蒲樂實靈品爰乃輔性却痾衛福蠲邪飬正縹色外妍金光內映草經所珍仙圖是詠黃連黃連上草丹砂之次禦孽辟妖長靈久視驂龍行天馴鳯匝地鴻飛以儀順道則利薯蕷華不可炫葉非足憐微根儻餌棄劍為仙黃金共壽青艧爭年君謂無妄我驗衡山杜若山中杜若嘉爾翠質不奇不俗載華載實同銜夕露共炯朝日夷陂無二沈冥如一藿香桂以過冽麝以太芬摧阻天夀夭折人文詎及藿香微馥微薰攝靈百仞飬氣靑氛讚銅劍讚有序永明初始造舊官鑿東北之地皆平岡迤隴尤多古冢墓有人得銅劍長尺五寸余既借看歎其古異客有謂余曰古時乃以銅為兵乎其可得而聞不余笑而應曰此證據甚多殆不俟言卿既欲知輒具言之余按山海經曰昆吾之山其上多赤銅郭璞注曰此山出金如火以之切玉如割泥也周穆王時西戎獻之尸子所謂昆吾之劍也越絶書曰赤堇之山破而出錫若邪之溪涸而出銅歐冶鑄以為純鉤之劍又汲冢中得一銅劍長三尺五及今所記干將者亦皆非鐡眀古者以銅錫為兵器也周書稱穆王時征犬戎得昆吾之劍火浣布長尺有咫又有鍊銅赤刀割玉如泥焉又左傳僖公十八年鄭伯始朝於楚楚賜之金既而悔之盟曰無以鑄兵故以鑄三鐘杜預注云楚金利故也古者以銅為兵故禹貢云荆揚貢金三品余以為古者語質而難解今者語文而易了獨詩云元龜象齒其實象牙也書云厥包橘柚乃黃柑也金品上則黃中則赤下則黑黑金是鐡赤金是銅黃金是金黃金可為寶赤金可為兵黑金可為器韓子稱昔智伯繇之伐趙襄子初晉陽襄子金將盡問於張孟談孟談對曰吾聞董安于治晉陽也公室悉以銅為柱質君可發而用之於是發之有餘金矣謂此據蓋可知焉又昔夏后氏使九牧貢金鑄九鼎於荆山之下于昆吾氏之墟白若甘攙之地圖其山川奇怪以形於鼎使民知神姦不逢其害以定其祥鼎成三足而方不炊而自沸不舁而自藏不遷而自行九鼎既成定之國都桀有昏德鼎遷於商殷紂暴虐鼎遷於周每人主休明鼎雖小而重其姦回昏亂雖大而輕及周顯王三十二年姬德大衰乃淪入泗水秦始皇之初見于彭城二十七年始皇東遊大發徒出之而不能得焉後漢武帝賓禮百神于汾陰得大鼎時人以為九鼎其祥不可得而審也且荆軻刺秦王之日匕首擊銅柱銅柱火出則古者非直以銅為匕首亦以為殿柱也且始皇之世長狄十二見於臨洮身長三丈足迹六尺於是始皇斂天下之兵鑄而象之故西京賦云髙門有閌列坐金狄是也又造阿房之宫其門悉用磁石磁石吸鐡以防外兵之入焉以此推之明知春秋迄於戰國戰國至於秦時攻爭紛亂兵革互興銅既不充給故以鐡足之鑄銅既難求鐡甚易是故銅兵轉少鐡兵轉多年甚一年歲甚一歲漸染流遷遂成風俗所以鐡工比肩而銅工稍絶二漢之世逾見其微及漢建安二十四年魏文帝為太子時鑄三寶刀二匕首天下百錬之精利而悉是鑄鐡不能復鑄銅矣按張華博物志亦稱鑄銅之工不復可得唯蜀地羌中時有解者由此言之斯妙久絶余謂不復能鑄銅者正當不能使利如霜雪光如雲霞陸斬犀兕水斷蛟龍豈復不能鑄銅爐鋺燈耶然今太極殿前兩大銅鏡即周景王鑄也製作精巧獨絶晚世今之作必不及古猶今鏡不及古鏡今鐘不及古鐘矣昔余為吳興令鑿池又獲銅箭鏑數十枚時有人復於彼山中伐木得銅斧一口古銅鑄為兵豈為一據故備言其詳以發子之蒙矣古貴銅賤鐡非獨此事按皇覽帝王冢墓記稱吳王闔閭冢銅槨三重汞池六尺玉鳧之流扁諸之劍三盤郢魚腸之劍在焉秦始皇冢亦以銅槨水銀為江河關東賊發之至銅槨而取銅深大不可多得因此穴塞漢闕思王冢時奢侈皆生葬取愛幸奴婢蓄穀為銅忩以通殉葬者氣息兼以水火守冢給呼召數十年乃不復聞聲矣晚世之葬無復此例然猶自大奢大富大盛或傾一國之財或竭一家之寶或爭為宏麗或競相髙尚前漢奢於後漢魏時富於晉世中原既夷至於江左時天下凋喪制度日衰富貴之家猶或厚葬然論古論曩亦減損千萬倍矣世愈貧狹哀禮愈薄又往古之事棺皆不用釘悉用細腰其細腰之法長七寸廣三寸厚二寸五分狀如木稱兩頭大而中央小仍鑿棺際而安之因普漆其外一棺凡用細腰五十四枚大略如此亦可謂至巧矣其法既絶亦有銅釘銅釘之體皆如今柘釘形也銅釘既滑多被發掘自義熙以來乃以柘代銅爰及明器之屬亦多減省必不得已乃用烏牙焉相與皆用素棺不得施漆及自棺之外一無所設既由貧富之懸兼以避患之及耳故為此讚以明古今銅鐡之兵刃葬送之事焉乃成讚曰悠悠開闢或聖或賢蚩尤鑄銅為兵幾年天生五才實此為先既古既曩誰測誰傳紛綸百代事無不異况乃金鐵國之利器風胡專精歐冶妙思於昔則出於今則祕聞之釋經萬物淡薄在古必厚在今必惡徒侈徒異徒鏟徒削聊舉一槩以明鴻略雲山讚四首有序壁上有雜畫皆作山水好勢仙者五六雲氣生焉悵然會意題為小讚云王太子子喬好輕舉不待錬銀丹控鶴去窈窕學鳯對巑岏山無一春草谷有千年蘭雲衣不躑躅龍駕何時還隂長生隂君惜靈骨圭璧詎為寶日夜名山側果得金丹道憂傷永不至光顔如碧草若渡西海時致意三靑鳥白雲紫煙世不覿赤鱗庖所捐白雲亦海外葐蒀起三山蕭瑟玉池上容裔帝臺前欲知青都裏乘此乃登天秦女靑琴既曠世緑珠亦絶羣猶不及秦女十五乘綵雲璧質人不見瓊光俗詎聞願使洛靈往為我道竒芬誄齊太祖高皇帝誄日月鬱華風雲黯色傷動紫微悲匝璇極嗚呼哀哉粵夏四月辛卯將遷座于泰安陵龍鑾既整羽衛以陳深酸舊物掩咽故臣嗣皇帝永訣丹掖叫號靑墀攀神光之一絶慟逺邇之何期弓劍有慕纂德寫辭僉曰若稽古聖璿圖靈鏡星驅發祥電光啓命誕惟弱齡惠志聰情如金如璧爰秀爰英於鑠冠歲騰華流藝允文允武克眀克睿聿尚登學嚴道尊師宣敷五禮優遊六詩上炫舊滯旁鏡前疑才罄艷采筆盡麗辭在友斯悌于親伊孝儉泰共色夷阻一貌遊情協矩縱心蹈教鄉術式慕州閭是效業優登仕先哲攸懋矧乃寥廓淵規邃構官府天地舟輿宇宙龍靜鳯戢斂奇掩秀昔在帝劉王室放命狡焉偽誕晦朔陵正鋒車北軼爟火南盛太祖時乘爰兹發迹塞井滅勳夷竈龕敵賞鏤王圖功蕤帝册乃厲中葉天未斂難兵百袁曹禍十楚漢吳地前崩越壤首亂街號耀盛火列金斷聚甲如陵獻俘為觀北楚倔強曾未屈膝雲屯被野魚麗亘日廟勇既消國圖方匱神册天開雄略世出凶劍鱗沈醜戈羽逸隻騎不還踦輪無匹厥庸戾止離珮委他榮鬱閶闔寵重山河皇彞有文朝采方藹頻煩金紐左右緹蓋毗戎肅禁參輦侍斾譽馥區中道薆氓外河濟國險淮泗邦塵要藩重設匪賢則親亦既推軷擁土庇民聲稜絶俗威贍殊鄰宋主陵遐紫殿遏密話言之詔貽在英粹寅亮大寶敷綸妙祕世識機鑒物宗淵懿無敻匪鍊靡奧不洎三階既馴五精惟至彭蠡九江地盡襟製亦有劉範衣纓是絶躍馬山岫泛舟河澨縞鏑星流紅旗電結鴆翼競扇豺牙爭礪禍纒紫禁兵交丹衛瑶祀若煙金扆如綴朝野傾儀咸歸上德實賴至公瀉家提國懷險實泰危亡必克機簉朝旦功定曛黑妙物更配具章重則深居撝外遙棲綿默髙秩方臻元禮有序王曰念哉輝寵是與職褒宫閣任卷文武飾華麗貂縈金疉組宏猷溢俗曾芬冠古憬彼朱方亦惟宗秩隂圖食昴潛謀貫日征輪未誓偏旗銜律原燎既寂世囂伊謐爰崇爰貴以望以實鴈縣告靜象郡無虞杳鬱逺域淸麗瓊都國填氓負朝委事虛實翳哲相嶽曜神居功美既損道富去益再紐契訓重匡禹迹方同范張濯情汾射散簮山郊解珮松石頳霞拂朝蒼煙懵夕韻屬玄經恩流金液靈厭霸德少帝告釁滅慈滅飬抵仁抵信枉獄炎爐淫刑霜刃刲忠翦義樊稚斫櫬惵惵萬氓曰怨曰震妖霓將崩災裂昊蒼况乃鼎國資滌資匡臨朝闡命遏昏立綱事綿毗漢義締翼商既綏地職亦懋天工權輿典緯俾作司空黼黻雕戈祐宇升庸徒賜先衮爰永渥沖實曰驃騎卷迹辭功寰宇睦政畿甸綸風沈氏滔天勃逆舊楚氣蹂黃池志轢柏舉裂禮紊度毁經棄序黑騎黔山朱旗頳渚短兵相接長鎩為羣皓如海岸矗似蒸雲合乃霧激離則霰分荆國既軼郢縣方焚袁劉二戾猋馳煒發聨謀制外儲兵襲內釁激瓊殿勢崩金闕志乘玄璽圖矯祕鉞鴻妖逝星髙祲棄月惟時諸侯上脫下競圖服淆蕩實綴仁聖輝耀國靈導揚主命曾規近晰深謨逺鏡左輪朱頳表裏斯定七德飾歌九功綷詠乃陟上鉉寵文方輝誕錫有秩綵吹旌旗贊政瑶光翊教太微實曰太傅爰登相國緝民以禮綜祗以德景福咸湊芳猷允塞羽泳式造紘縣是則金湯無險軌書攸同迥迥寵迹窈窈睿功寶圭黛壤俾王于東絢册是敷懋物既崇設業設簴丹懸碧鏞於穆顯相黎元時雍冰州炎徼來獻其琛鴈海龍關亦柔好音梁黿棧鼉越險浮深逺戎皆覲上靈必臨山吐石靑野降寶露瑞芝麗草珍柯爛樹人崩俗締玄緯幽數眷此妙德跂我王度簉滯炎旻既變至公萎蕤媯華文祖受終大宋有訓髙撝萬邦容豫慶雲遊衍南風正服寶位圓光玉繩御繡懷古負黼夙興丘礙必靜淵漪咸澄勛扆有作黔牖其義矜卑廣慈合賤兼愛綴機剟賊輕章削罰迹去繁奓情歸素一軒靡龍刻楹無丹密越賤申椒楚輟靈橘陵寢起邑池藻誰懸遙館罕御離房空薦惇教路宮淹神正殿斟酌信義左右律禮瑩彼皇維燁兹國體胄業既樹璧流方啓漢求金岫吳寶銅塹寧若睿德讓駟却劍實才為貴唯功是念火職咸允雲官亦熙既臯乃益匪稷伊夔無􅀈巡風寧俟辨詩玉燭調文玄英最節乘山呈瑞航海歸闕不曠景册靡空歲月受緯機衡兼甄詩史孫韓各辨莊墨異理昭政往藹洗鑠前軌逍遙星斗徙倚涼雲春飈方舞秋鴻初分式謡式詠載績載文邈哉我后淪泳賢聖整品作號盡物歸政蒼黎汰歡玄靈刷慶永戬嘉祉方寅景命締詳有文揚沛將掩理昧人詖道懸世險敻略遺圖忌華徇儉文暗陳几翌明告漸霓僪鬬食日月朏精矧在乘輿宇折宙傾祲纒鸞掖悲赴紫扄去璇臺之照襲珠殯之𡨕嗚呼哀哉帷宫低景輦路巇光惻柏門之黯黯泣松帳之茫茫上宫劈而詔御咽羣后慕而侍衛傷攢靈既儼逺日以筮鬱鬯既奠龍酹方撤素月夜橫翠煙曉結摐虛金而下欷吟空簫而增絶嗚呼哀哉於是颯天駕而從綺輿澀神行而撫文輦傍建春而南蹕徑宜陽而東踐尚葐蒀而未散乍眇默而不轉睇千乘之共啜盼萬騎之相泫悲魏后之戀譙惻漢主之懷沛辭金陵之􅀢義降雲陽之杳藹風奇響而駐軒煙異色而低斾怨街邑之綵驂弔原野之縞蓋挽夫愴而征馬凝痛縈盈其如帶嗚呼哀哉復林油雲重山減日御房清凄神路𡨕謐昭徒肅纛幽祗竦蹕攀光灑慟臨泉澍泗璪座長嚴雕宫永閟寂帳寂兮寂已逺夜釭夜兮夜何邃嗚呼哀哉傳袁叔眀傳友人袁炳字叔眀陳郡陽夏人其人天下之士幼有異才學無不覽文章俶儻清贍出一時任心觀書不為章句之學其篤行則信義惠和意整如也常念蔭松柏詠詩書志氣跌宕不與俗人交俯眉暫仕歷國常侍員外郎府功曹臨湘令粟之入者悉散以贍親其為節也如此數百年未有此人焉至乃好妙賞文獨絶於世也又撰晉史奇功未遂不幸卒官春秋二十有八與余有青雲之交非直銜杯酒而已嗟乎斯才也斯命也天之報施善人何如哉何如哉自序傳淹字文通濟陽考城人幼傳家業六歲能屬詩十三而孤邈過庭之訓長遂博覽羣書不事章句之學頗留精於文章所誦詠者蓋二十萬言而愛奇尚異深沈有逺識常慕司馬長卿梁伯鸞之徒然未能悉行也所與神遊者唯陳留袁叔眀而已弱冠以五經授宋始安王劉子真略傳大義為南徐州新安王從事奉朝請始安之薨也建平王劉景素聞風而悅待以布衣之禮然少年嘗倜儻不俗或為世士所嫉遂誣淹以受金者將及抵罪乃上書見意而免焉尋舉南徐州桂陽王秀才對策上第轉巴陵王左常侍右軍建平王主簿賓待纍年雅以文章見遇而宋末多阻宗室有憂生之難王初欲羽檄徴天下兵以求一旦之幸淹嘗從容曉諫言人事之成敗每曰殿下不求宗廟之安如信左右之訃則復見麋鹿霜棲露宿於姑蘇之臺矣終不以納而更疑焉及王移鎮朱方也又為鎮軍參軍事領東海郡丞於是王與不逞之徒日夜搆議淹知禍機之將發又賦詩十五首略明性命之理因以為諷王遂不悟乃慿怒而黜之為建安吳興令地在東南嶠外閩越之舊境也爰有碧水丹山珍木靈草皆淹平生所至愛不覺行路之逺矣山中無事與道書為偶乃悠然獨往或日夕忘歸放浪之際頗著文章自娛在邑三載朱方竟敗焉復還京師值世道已昏守志間居不交當軸之士俄皇帝始有大功於四海聞而訪召之為尚書駕部郎驃騎竟陵公參軍事當沈攸之起兵西楚也人懷危懼髙帝嘗顧而問之曰天下紛紛若是君謂如何淹對曰昔項強而劉弱袁衆而曹寡羽號令諸侯竟受一劍之辱紹跨躡四州終為奔北之虜此所謂在德不在鼎公何疑焉帝曰聞此言者多矣其試為我言之淹曰公雄武有奇略一勝也寬容而仁恕二勝也賢能畢力三勝也民望所歸四勝也奉天子而伐逆叛五勝也攸之志鋭而器小一敗也有威而無恩二敗也士卒解體三敗也搢紳不懷四敗也懸兵數千里而無同惡相濟五敗也故豺狼十萬而終為我獲焉帝笑曰君談過矣是時軍書表記皆為草具逮東霸城府猶掌筆翰相府始置仍為記室參軍事及讓齊王九錫備物凡諸文表皆淹為之受禪之後又為驃騎豫章王記室參軍鎮東武令參掌詔册並典國史既非雅好辭不獲命尋遷正員散騎侍郎中書侍郎淹嘗云人生當適性為樂安能精意苦力求身後之名哉故自少及長未嘗著書惟集十卷謂如此足矣重以學不為人交不茍合又深信天竺緣果之文偏好老氏淸淨之術仕所望不過諸卿二千石有耕織伏臘之資則隱矣常願幽居築宇絶棄人事苑以丹林池以緑水左倚郊甸右帶瀛澤靑春爰謝則接武平臯素秋澄景則獨酌虛室侍姬三四趙女數人不則逍遙經紀彈琴詠詩朝露幾間忽忘老之將至淹之所學盡此而已矣墓銘宋尚書左丞孫緬墓銘光靈維周肇祀伊衛照分上代鏡華中世睿誕降明秀芳嗣烈學惟物範行實士節容與書林優遊史藝素巾峩冠朱紱纍轍來訪詩逸入詢禮缺麗名文質齊影儒哲慶履匪舒沴氣遽結殯帷兮既晦泉火兮巳閉曖遺波於遙緒颯流馨於逺嵗宋安成王右常侍劉喬墓銘丹陽韞聖豐鄉降賢玉葉既積金徽方傳乃育伊人尅廣克宣騰芬中屬飛藻上年杳杳虛素永永沖關雲意霜拍瓊立冰堅家寶以瑩國才未甄參錯報善茫昧雲玄斂魂幽石委氣空山膚若流波身如絶煙芳菲一逝美懋徒鐫宋光祿大夫孫敻墓銘川祗效鏡嶽祥獻眀碧葉獨秀瑶源自淸幼炳器譽夙耀才名體兼遷雲學備儒史紫閣咸趨朱軒既履貴交慕塵素遊企軌騰藻上京振彩下國如彼緑蘭秉芬四塞欷人徑之不平歎天路之冥默貴夫君之為美播靈均與正則齊御史中丞孫詵墓銘筠以霜靄蘭以風薰深哉若人實好斯文系緒承胄激花驚芬才基魏粲學參漢雲覽志上載洽鏡前聞騰名冠俗揚采絶羣方協明世式贊睿君如何不淑天道難分敢雕窆石永晰幽墳齊司徒右長史檀超墓銘惟金有銑惟玉有瑶君實淵哉行為世標髙志灑落逸氣寂寥奧學內溢深文外昭嘉采籍譽登國振朝亦既有美筠傷蕙凋人邇運曠世促道遼永矣仁矣流芳無澆行狀建平王太妃周氏行狀竊聞侯服之譽非黃冠能敷玉食之門寧皂衣所述諒畏褒虛美於君后被空名於鼎貴然有漢臣誄行晉史書德者亦云實而巳焉伏見國太妃稟靈惟嶽集慶自逺世擅淮汝族冠疇代故以載曜聲書式炳縢牒矣太妃誕巽離之正和函雲露之中氣凝采齠嵗賁章笄年若乃彤管女圖之學纂組綺縞之工升降處謙之儀柔靜居順之節莫不中道若性不嚴而成故譽滿闈閾聲聞軒殿以元嘉某年歸於故司徒宣簡王既而第髙恆倫秩踰外品青軒華轂用光國輝素壁丹墀實隆家貴具惟姻娣靡不式瞻而居尊以簡訓卑以𢎞躬謹蘭閨身撝椒第若衛娥之炯行樊嬴之英操方之蔑如也大明二年宣簡王薨太妃藉悲用禮撫孤用慈柔懿之德愈彰肅敬之問日被雖文伯之母言不踰閾莒相之主行存乎勤無以過也大明某年拜建平王太妃是時今王春秋方冨德業未隆藉茲金響終能玉播故綺襦出宰弱冠升朝者亦太妃劬勞之訓也謂天蓋髙降年不永以大豫元年二月三日薨於荆州之內寢凡厥逺邇以哀以歎今祖行有期泉穸無逺素旗望路綵旌思歸所以垂宣徽容髣佛金石者謹詳牒行狀具以申言文蕭太傅東耕祝文敬祝先穡曰攝提方春黍稷未華灼爍發雲昭耀開霞地煦景曖山艷水波側聞農政實惟民天競秬獻嵗務畎上年有淹疏潤興雨導泉崇耕巡索均逸共勞命彼倌人稅于靑臯羽旗銜蕤雄戟耀毫呈典緇耦獻禮翠壇宜民宜稼克降祈年願靈之降解珮停鑾神之行兮氣為軷神之坐兮煙為蓋使嘉穀與玄鬯永爭光而無沫哉蕭驃騎祭石頭戰亡文咸告忠貞之魂曰義為行首雄實士節嗟爾驍驚稟才蹈烈守玉不渝懷冰可折氣彰靡旗情皎亂轍髙墉摧堅巨醜挫鋭深痛克矜寃靈及雪隆恩殊悼臨爾以欷千秋同盡百齡一世魂而有知咸無逺邇嗚呼哀哉騷遂古篇僕嘗為造化篇以學古制今觸類而廣之復有此文兼象天問以遊思云爾問之遂古大火然兮水亦溟涬無涯邊兮女媧煉石補蒼天兮共工所觸不周山兮河洛交戰寧深淵兮黃炎共鬬涿鹿川兮女妓九子為氏先兮蚩尤鑄兵幾千年兮十日並出堯之間兮羿乃斃日事豈然兮嫦娥奔月誰所傳兮豐隆騎雲為靈仙兮夏開乘龍何因緣兮傅説託星安得宣兮夸父鄧林義亦艱兮建木千里烏易論兮穆王周流往復旋兮河宗王母可與言兮青鳥所解路誠亶兮五色玉石出西偏兮崑崙之墟海此間兮去彼宗周萬二千兮山經古書亂編篇兮郭釋有兩未精堅兮上有剛氣道家言兮日月五星皆虛懸兮倒景去地出雲煙兮九地之下如有天兮土伯九約寧若先兮西方蓐收司金門兮北極禺強為常存兮帝之二女遊湘沅兮霄明燭光向焜煌兮太一司命鬼之元兮山鬼國殤為遊魂兮迦維羅衛道最尊兮黃金之身誰能原兮恆星不見頗可論兮其説彬炳多聖言兮六合之內心常渾兮幽明詭性令智惛兮河圖洛書為信然兮孔甲豢龍古共傳兮禹時防風處隅山兮春秋長狄生何邊兮臨洮所見又何緣兮蓬萊之水淺於前兮東海之波為桑田兮山崩邑淪寧幾千兮石生土長必積年兮漢鑿昆明灰炭全兮魏開濟渠螺蚌堅兮白日再中誰使然兮北斗不見藏何間兮建章鳯闕神光連兮未央鐘簴生華鮮兮銅為兵器秦之前兮丈夫衣綵六國先兮周時女子出世間兮班君絲履遊泰山兮人鬼之際有隱淪兮四海之外孰方圓兮沃沮肅愼東北邊兮長臂兩面赤乘船兮東南倭國皆文身兮其外黑齒次裸民兮侏儒三尺並為鄰兮西北丁零又烏孫兮車師月支種類繁兮馬蹄之國善騰奔兮西南烏弋及罽賓兮天竺于闐皆胡人兮條支安息西海漘兮人迹所極至大秦兮珊瑚明珠銅金銀兮琉璃瑪瑙來離陳兮硨磲水精莫非真兮雄黃雌石出山垠兮靑白蓮華被水濱兮宫殿樓觀並七珍兮窮陸溟海又有民兮長股深目豈君臣兮丈夫女子及三身兮結胸反舌一臂人兮跂踵交脛與羽民兮不死之國皆何因兮茫茫造化理難循兮聖者不測况庸倫兮筆墨之暇為此文兮薄暮雷電聊以忘憂又示君兮雜詞有序豫上國不才黜為閩山長吏待罪三載究識煙霞之狀既對道書官又無職筆墨之勢聊為後文構象臺曰上妙兮道之精道之精兮俗為名名可宗兮聖風立立聖風兮兹教生寫經記兮寄圖剎畫影象兮在丹靑起淨法兮出西海流梵音兮至東溟綱紫宙兮洽萬品冠璇宇兮濟羣生余汨阻兮至南國迹巳徂兮心未扄立孤臺兮山岫架半室兮江汀纍靑杉於澗構積紅石於林櫺雲八重兮七色山十影兮九形金燈兮江蘺環軒兮匝池相思兮豫章戴雪兮抱霜栽異木而同秀種雜草而一香苔癬生兮繞石户蓮花舒兮繡池梁伊日月之寂寂無人音與馬迹耽禪情於雲徑守息心於端石永結意於鷲山長憔悴而不惜訪道經百學兮異文錦𣲖兮綺分珍君之言兮皎無際悅子之道兮迥不羣淡深韻於白水儼髙意於浮雲軌賢豪於後學軼望識於前文兹道兮可傳可傳兮皓然挾兹心兮赴絶國懷此書兮坐空山空山隱轔兮窮翠崿水散漫兮涵素壑海外隂兮氣曇曇江上月兮光灼灼東南出兮不一山西北來兮乃雙鶴池中蓮兮十色紅窗前樹兮萬葉落四壁深兮乃泬漻左右虛兮如寂寞寂寞兮山室德經兮道帙蕩魂兮刷氣掩憂兮靜疾信若人兮先覺聊與子兮如一鏡論語巡靑史之殘誥覽朱管之遺册惟魯濱之一叟信銜道而探寂世艱險而多阻君英明而不革講業兮齊衛論精兮洙泗子之説兮義已祕成賈鄭之雄理考黃何之壯思惜古人之取才瞰靑雲而靖意意惆悵兮有端才嶒崚兮可觀憲媯禹而析法襲仁誼而求安不嬿婉於戚施寧踸踔於馬蘭俾後生之庶士鑒明德之音翰惟山中兮寂寞沉憂思兮無從石紅靑兮百疉山濃淡兮萬重日下兮闕月出兮銅峰竹色兮拂户水氣兮繞窗味哲人之遺珍折片句兮忘老嘉石門之埋名憐栁子之耽道書吳伯於衣袖鏤顔子於心抱籌出處之叔仲酌言默之多少若妙行與上靈非積學之所紹至遊夏以升降幸砥心而勿夭悅曲池北山兮黛柏南江兮頳石頳峯兮若虹黛樹兮如畫暮雲兮十里朝霞兮千尺千尺兮綿綿靑氣兮往旋桐之葉兮蔽日桂之枝兮刺天百谷多兮瀉亂波雜澗饒兮鶩叢泉竟長洲兮匝東島縈曲嶼兮繞西山山巒岏兮水環合水環合兮石重沓林中電兮雨冥冥江上風兮木颯颯盟淸泠兮適潺湲白雲起兮弔石蓮客子思兮心斷絶心斷絶兮愁無間步東池兮夜未艾卧西窗兮月向山引一息於魂內擾百緒於眼前意春蘭與秋若願不絶於江邊愛逺山伯鸞兮巳遠名山兮不返逮紺草之可結及朱華之未晚緤余馬於椒阿漾余舟於沙衍臨星朏兮樹暗看日爍兮霞淺淺霞兮駮雲一合兮一分映壑兮為飾綴澗兮成文碧色兮婉轉丹秀兮葐蒀深林寂以窈窈上猿狖之所羣羣猿兮䀨山大林兮蔽天楓岫兮筠嶺蘭畹兮芝田紫蒲兮光水紅荷兮艷泉香枝兮嫩葉翡纍兮翠疉非郢路之遼逺實寸憂之相接欷美人於心底願山與川之可涉若溘死於汀潭哀時命而自愜應謝主簿騷體山櫺靜兮悲凝涼澗軒掩兮酒涵霜層風激兮緑蘋斷積石閉兮紫苔傷芝原寂少色筠庭黯無光沐豫冠於極浦馳豫珮兮江陽弔秋冬之巳暮憂與憂兮不忘使杜蘅可翦而棄夫何貴于芬芳劉僕射東山集學騷含秋一顧眇然山中檀欒循石便姢來風木瑟瑟兮氣葐蒀石戔戔兮水成文擲江崖之素草窺海岫之青雲願芙蓉兮未晦遵江波兮待君山中楚辭五首靑春素景兮白日出之藹藹吾將弭節於江夏見杜若之始大結雕鱗以成車懸雜羽而為蓋草色緑而馬聲悲欷沿袖以流帶豫將禮於太一乃雄劍兮玉鈎日華粲於芳閣月金披於翠樓舞燕趙之上色激河淇之名謳薦西海之異品傾東嶽之庶羞乘文魚兮錦質要靈人兮中洲入橘浦兮容與心敞惘兮迷所識視煙霞如一色深秋窈以虧天上列星之所極桂之生兮山之巒紛可愛兮柯團團溪﨑􅤡兮石架阻䬀飀颼兮木道寒煙色閉兮喬木橈嵐氣暗兮幽篁難忌蟪蛄之蚤吟惜王孫之晚還信於邑兮白露方天病兮秋蘭石篩篩兮蔽泉雪疉疉兮薄樹車蕭條兮山逼舟容與兮水路愍晨夜之摧挫感春秋之欲暮征夫輟而在傍御者局而載顧魂兮歸來異方不可以親蝮蛇九首雄虺戴鱗炎穴一光骨爛魂傷玄狐曳尾赤象為梁至日歸來無往此異方漢魏六朝百三家集卷八十五
