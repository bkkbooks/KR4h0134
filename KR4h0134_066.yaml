body:
  text: 漢魏六朝百三家集卷六十六宋謝靈運集目録樂府善哉行隴西行日出東南隅行長歌行苦寒行豫章行相逢行折楊栁行二首泰山吟君子有所思行悲哉行會吟行緩歌行燕歌行鞠歌行順東西門行上留田行詩三月三日侍宴西池詩述祖德詩二首有序九日從宋公戲馬臺集送孔令從遊京口北固應詔永初三年七月十六日之郡初發都鄰里相送至方山過始寧墅富春渚七里瀨晚出西射堂登池上樓遊南亭遊赤石進帆海登江中孤嶼登永嘉緑嶂山詩郡東山望溟海詩遊嶺門山詩石室山詩登上戍石鼓山詩行田登海口盤嶼山白石巖下徑行田齋中讀書命學士講書種桑詩初去郡田南樹園激流植援石壁精舍還湖中作登石門最高頂石門新營所住四面高山回溪石瀨茂林修竹於南山往北山經湖中瞻眺從斤竹澗越嶺溪行過白岸亭夜宿石門南樓中望所遲客廬陵王墓下作還舊園作見顔范二中書酬從弟惠連五章登臨海嶠初發疆中作與從弟惠連可見羊何共和之四章初發石首城入東道路詩道路憶山中入彭蠡湖口入華子岡是麻源第三谷發歸瀨三瀑布望兩溪初往新安桐廬口擬魏太子鄴中集詩八首並序魏太子王粲陳琳徐幹劉楨應瑒阮瑀平原侯植石壁立招提精舍過瞿溪山僧七夕詠牛女彭城宫中直感歲暮歲暮作離合登廬山絶頂望諸嶠夜發石關亭答惠連初發入南城東陽溪中贈答二首送雷次宗大林峯柟溪詩泉山詩自敘臨終詩漢魏六朝百三家集卷六十六目録欽定四庫全書漢魏六朝百三家集卷六十六明張溥輯宋謝靈運集樂府康樂樂府多闕文姑從茂倩舊次善哉行以下四言陽谷躍升虞淵引落景曜東隅晼晚西薄三春燠敷九秋蕭索涼來溫謝寒往暑却居德斯頥積善嬉謔隂灌陽叢凋華墮萼歡去易慘悲至難鑠擊節樂府作激涕當歌對酒當酌鄙哉愚人戚戚懷瘼善哉達士滔滔處樂隴西行昔在老子至一作志理成篇柱小傾大綆短絶泉鳥之棲遊林檀是間韶樂牢膳豈伊攸便胡為乖枉從表方圓耿耿僚志慊慊丘園善歌以咏言理成篇日出東南隅行以下五言柏梁冠南山桂宫耀北泉晨風拂幨幌朝日照閨軒美人卧屏席懷蘭秀瑤璠皎潔秋松氣淑德春景暄闕長歌行倐爍夕星流昱奕朝露團粲粲烏有停泫泫豈暫安徂齡速飛電頽節騖驚湍覽物起悲緒顧已識憂端朽貌改鮮色悴容變柔顔變改茍催促容色烏盤桓亹亹衰期迫靡靡壯志闌既慙臧孫慨復愧揚子歎寸隂果有逝尺素竟無觀幸賖道念戚且取長歌歡苦寒行二首歲歲層冰合紛紛霰雪落浮陽減清暉寒禽叫悲壑飢爨煙不興渴汲水枯涸又載初學記疑有闕文樵蘇無夙飲鑿冰煮朝餐悲矣採薇唱苦哉有餘酸豫章行短生旅長世恆覺白日欹覽鏡睨頽容華顔豈久期茍無回戈術坐觀落崦嵫闕相逢行樂府作惠連今從藝文作靈運行行即長道道長息班草邂逅賞心人與我傾懷抱夷世信難值憂來傷人平生不可保一解陽華與春渥隂柯長秋稿心慨榮去速情苦憂來早日華難久居憂來傷人諄諄亦至老二解親黨近恤庇昵君不常好九族悲素霰三良怨黃鳥邇朱白即頳憂來傷人近縞潔必造三解水流理就濕火炎同歸燥賞契少能諧斷金斷可寶千計莫適從憂來傷人萬端信紛繞四解巢林宜擇木結友使心曉心曉形迹略略邇誰能了相逢既若舊憂來傷人片言代紵縞五解折楊栁行二首鬱鬱河邊樹青青野田草舍我故鄉客將適萬里道妻妾牽衣袂抆淚沾懷抱還拊幼童子顧托兄與嫂辭訣未及終嚴駕一何早負笮引文舟飢渴常不飽誰令爾貧賤咨嗟何所道騷屑出穴風揮霍見日雪颼颼無久搖皎皎幾時潔未覺泮春冰已復謝秋節空對尺素遷獨視寸隂滅否桑未易繫泰茅難重拔桑茅迭生運語默寄前晢泰山吟岱宗秀維嶽崔崒刺雲天岝崿既嶮巇觸石輒芊綿樂府作千眠登封瘞崇壇降禪藏肅然石閭何暗藹明堂祕靈篇君子有所思行總駕越鍾陵還顧望京畿躑躅周名都遊目倦一作眷忘歸市鄽無厄一作夾室世族有髙闈密親麗華苑軒甍飭通逵孰是金張樂諒由燕趙詩長夜恣酣飲窮年弄音徽盛往速露墜衰來疾風飛餘生不歡娛何以竟暮歸寂寥曲肱子瓢飲療朝飢所秉自天性貧富豈相譏悲哉行陸士衡集亦載此詩誤也陸別有一首萋萋春草生王孫遊有情差池燕始飛夭裊桃一作栁非始榮灼灼桃悅色飛飛燕弄聲簷上雲結隂澗下風吹清幽樹雖改觀終始在初生松蔦歡蔓延樛葛欣藟縈眇然遊宦子晤言時未並鼻感改朔氣眼一作心傷變節榮侘傺豈徒然澶一作緬漫絶音形風來不可托鳥去豈為聽會吟行六引緩清唱三調佇繁音列筵皆靜寂咸共聆會吟會吟自有初請從文命敷敷績壺冀始刋木至江汜列宿炳天文負海橫地理連峯競千仞背流各百里滮池溉粳稻輕雲曖松杞兩京愧佳麗三都豈能似層臺指中天髙墉積崇雉飛燕躍廣途鷁首戲清沚肆呈窈窕容五臣作客路耀㛹娟子自來彌世一作年代賢達不可紀勾踐善廢興越叟識行止范蠡出江湖梅福入城市東方就旅逸梁鴻去桑梓牽綴書土風辭殫意未已緩歌行飛客結靈友凌空萃丹丘習習和風起采采彤雲浮一作流娥皇發湘浦霄明出河洲宛宛連螭轡裔裔振龍旒一作龍輈燕歌行七言孟冬初寒節氣成悲風入閨霜依庭秋蟬噪栁燕辭樂府作棲楹念君行役怨邊城君何崎嶇久徂征豈無膏沐感鸛鳴對君不樂淚沾纓闢窗開幌弄秦箏調絃促柱多哀聲遙夜明月鑒帷屏誰知河漢淺且清展轉思服悲明星鞠歌行以下雜言德不孤兮必有鄰唱和之契冥相因譬如虬虎兮來風雲亦如形聲影響陳心歡賞兮歲易淪隱玉藏彩疇識真叔牙顯夷吾親郢既殁匠寢斤覽古籍信伊人永言知已感良辰順東西門行出西門眺雲間揮斤扶木墜虞泉信道人鑒徂川思樂暫捨誓不旋閔九九傷牛山宿心載違徒昔言競落運務頽年招命儕好相追牽酌芳酤奏繁絃惜寸隂情固然上留田行薄遊出彼東道上留田薄遊出彼東道上留田循聽一何矗矗上留田澄川一何皎皎上留田悠哉逖矣征夫上留田悠哉逖矣征夫上留田兩服上阪電遊彚作雷逝上留田舫舟下遊飈驅上留田此别既久無適上留田此别既久無適上留田寸心繫在萬里上留田尺素遵此千夕上留田秋冬迭相去就上留田秋冬迭相去就上留田素雪紛紛鶴委上留田清風飈飈入袖上留田歲云暮矣增憂上留田歲云暮矣增憂上留田誠知運來詎抑上留田熟視年往莫留上留田詩三月三日侍宴西池詩四言詳觀記牒鴻荒莫傳降及雲鳥曰聖則天虞承唐命周襲商艱江之永矣皇心惟眷矧乃暮春時物芳衍濫觴逶迤周流蘭殿禮備朝容樂闋夕宴述祖德詩二首以下五言序曰大元中王父龕定淮南負荷世業專主隆人逮賢相徂謝君子道消拂衣蕃嶽考卜東山事同樂生之時志期范蠡之舉達人貴自我高情屬天雲兼抱濟物性而不纓垢氛段生藩魏國展季救魯人弦高犒晉舊作㬐誤師仲連却秦軍臨組乍不緤對圭寧肯分惠物辭所賞勵志故絶人苕苕歷千載遙遙播清塵清塵竟誰嗣明哲垂選作時經綸委講綴道論改服康世屯屯難既云康尊主隆斯民中原昔喪亂喪亂豈解已崩騰永嘉末逼迫太元始河外無反正江介有蹙圯萬邦咸震懾橫流賴君子拯溺繇道情龕暴資神理秦趙欣來蘇燕魏遲文軌賢相謝世運逺圖因事止高揖七州外拂衣五湖裏隨山疏濬潭傍巖藝枌梓遺情捨塵物貞觀丘壑美九日從宋公戲馬臺集送孔令季秋邊朔苦旅鴈違霜雪凄凄陽卉腓皎皎寒潭潔潔同良辰感聖心雲旗興暮節鳴葭戾朱宫蘭巵獻時哲餞宴光有孚和樂隆所缺在宥天下理吹萬羣方悅歸客遂海隅脫冠謝朝列弭棹薄枉渚指景待樂闋河流有急瀾浮驂無緩轍豈伊川途念宿心愧將别彼美丘園道喟焉傷薄劣從遊京口北固應詔玉璽戒誠信黃屋示崇高事為名教用道以神理超昔聞汾水遊今見塵外鑣鳴笳發春渚稅鑾登山椒張組眺倒景列筵矚歸潮逺巖映蘭薄白日麗江臯原隰荑緑栁墟囿散紅桃皇心美陽澤萬象咸光昭顧已枉維繫撫志慙場苗工拙各所宜終以反林巢曽是縈舊想覽物奏長謠永初三年七月十六日之郡初發都述職期闌暑理棹變金素秋岸澄夕隂火旻團朝露辛苦誰為情遊子值頽暮愛似莊念昔久敬曽存故如何懷土心持此謝逺度李牧愧長袖郤克慙屣步良時不見遺醜狀不成惡曰余亦支離依方早有慕生幸休明世親蒙英達顧空班趙氏璧徒乖魏王瓠從來漸二紀始得傍歸路將窮山海迹永絶賞心悟鄰里相送至方山祗役出皇邑相期憩甌越解纜及流潮懷舊不能發析析就衰林皎皎明秋月含情易為盈遇物難可歇積痾謝生慮寡欲罕所闕資此永幽棲豈伊年嵗別各勉日新志音塵慰寂蔑過始寧墅束髮懷耿介逐物遂推遷違志似如昨二紀及兹年緇磷謝清曠疲苶慙貞堅拙疾相倚薄還得靜者便剖竹守滄海枉帆過舊山山行窮登頓水涉盡洄沿巖峭嶺稠疊洲縈渚連綿白雲抱幽石緑篠媚清漣葺宇臨回江築觀基曽巔揮手告鄉曲二載期歸旋且為樹枌檟無令孤願言富春渚宵濟漁浦潭旦及富春郭定山緬雲霧赤亭無淹薄遡流觸驚急臨圻阻參錯亮乏伯昏分險過吕梁壑洊至宜便習兼山貴止託平生協幽期淪躓困微弱久露干祿請始果逺遊諾宿心漸申寫萬事俱零落懷抱既昭曠外物徒龍蠖七里瀨羈心積秋晨晨積展遊眺孤客傷逝湍徒旅苦奔峭石淺水潺湲日落山照曜荒林紛沃若哀禽相呌嘯遭物悼遷斥存期得要妙既秉上皇心五臣作情豈屑末代誚目覩嚴子瀨想屬任公釣誰謂古今殊異代可同調晚出西射堂步出西城集作掖門遙望城西岑連障疊巘崿青翠杳深沈曉霜楓葉丹夕曛嵐氣隂節往戚不淺感來念已深羈雌戀舊侣迷鳥懷故林含情尚勞愛如何離賞心撫鏡華緇鬢攬帶緩促襟安排徒空言幽獨賴鳴琴登池上樓潛虬媚幽姿飛鴻響逺音薄霄愧雲浮棲川怍淵沈進德智所絀退耕力不任徇祿反窮海卧痾對空林衾枕昧節候褰開暫窺臨傾耳聆波瀾舉目眺嶇嶔初景革緒風新陽改故隂池塘生春草園栁變鳴禽祁祁傷豳歌萋萋感楚吟索居易永久離羣難處心持操豈獨古無悶徴在今遊南亭時竟夕澄霽雲歸日西馳密林含餘清逺峯隱半規久痗昏墊苦旅館眺郊岐澤蘭漸被徑芙蓉始發池未厭青春好已觀朱明移戚戚感物歎星星白髮垂藥餌情所止衰疾忽在斯逝將候秋水息景偃舊崖我志誰與亮賞心惟良知遊赤石進帆海首夏猶清和芳草亦未歇水宿淹晨暮隂霞屢興沒周覽倦瀛壖況乃凌窮髮川后時安流天吳靜不發揚帆採石華挂席拾海月溟漲無端倪虛舟有超越仲連輕齊組子牟眷魏闕矜名道不足適已物可忽請附任公言終然謝夭伐登江中孤嶼江南倦歷覽江北曠周旋懷新道轉逈尋異景不延亂流趨正絶五臣作孤嶼孤嶼媚中川雲日相輝映空水共澄鮮表靈物莫賞藴真誰為傳想像崑山姿緬邈區中緣始信安期術得盡養生年登永嘉緑嶂山詩裹糧杖輕䇿懷遲上幽室行源徑轉逺距陸情未畢淡瀲結寒姿團欒潤霜質澗委水屢迷林回巖逾密眷西謂初月顧東疑落日踐一作殘夕奄昏曙蔽翳皆周悉蠱上貴不事履二美貞吉幽人常坦步高尚邈難匹頥阿竟何端寂寂寄抱一恬如既已交繕性自此出郡東山望溟海詩一作東山望海開春獻初嵗白日出悠悠蕩志將愈樂瞰海庶忘憂䇿馬步蘭臯緤控息椒丘采蕙遵大薄搴若履長洲白花皓陽林紫虈一作翹曄春流非徒不弭忘覽物情彌遒萱蘇始無慰寂寞終可求遊嶺門山詩西京誰修政龔汲稱良吏君子豈定所清塵慮不嗣早蒞建德鄉民懷虞芮意海岸常寥寥空館盈清思協以上冬月晨遊肆所喜千圻邈不同萬嶺狀皆異威摧三山峭瀄汨兩江駛魚舟一作商豈安流樵拾謝西芘人生誰云樂貴不屈所志石室山詩清旦索幽異放舟越坰郊􅮻㟂蘭渚急藐藐苔嶺高石室冠林陬飛泉發山椒虛泛徑千載崢嶸非一朝鄉村絶聞見樵蘇限風霄微我無逺覽總笄羡升喬靈域久韜隱如與心賞交合歡不容言摘芳弄寒條登上戍石鼓山詩旅人心長久憂憂自相接故鄉路遙逺川陸不可涉汨汨莫與娛發春托登躡歡願既無並戚慮庶有協一作怯極目睞左濶回顧眺右狹日末澗增波雲生嶺逾疊白芷競新苔緑蘋齊初葉摘芳芳靡諼愈樂樂不燮佳期緬無像騁望誰云愜行田登海口盤嶼山羈苦孰云慰觀海藉朝風莫辨洪波極誰知大壑東依稀採菱歌倣佛含嚬容遨遊碧沙渚遊衍丹山峯白石巖下徑行田小邑居易貧災年民無生知淺懼不周愛深憂在情舊業橫海外蕪穢積頽齡飢饉不可久甘心務經營千頃帶逺堤萬里瀉長汀洲流涓澮合連統塍埓並雖非楚宫化荒闕亦黎明雖非鄭白渠每嵗望東京天鑒儻不孤來兹驗微誠齋中讀書昔余遊京華未嘗廢丘壑矧乃歸山川心迹雙寂寞虛館絶諍訟空庭來鳥雀卧疾豐暇豫翰墨時間作懷抱觀古今寢食展戲謔既笑沮溺苦又哂子雲閣執戟亦以疲耕稼豈云樂萬事難並歡達生幸可託命學士講書卧病同淮陽宰邑曠武城弦歌愧言子清淨謝伏生古人不可攀何以報恩榮時往歲易周聿來政無成曽是展豫心招學講羣經鑠金既云刃凝土亦能型望爾志尚隆逺嗣竹箭聲敢謂荀氏訓且布一作有蘭陵情待罪豈久期禮樂俟賢明種桑詩詩人陳條柯亦有美攘剔前修為誰故後事資紡績常佩知方誡愧微富教益浮陽騖嘉月藝桑逮間隙疏欄發近郛長行達廣埸壙流始毖泉緬塗猶跬迹俾此將長成慰我海外役初去郡彭薛裁知恥貢公未遺榮或可優貪競豈足稱達生伊余秉微尚拙訥謝浮名廬園當棲巖卑位代躬耕顧已雖自許心迹猶未並無庸方選作妨周任有疾像長卿畢娶類尚子薄遊似邴生恭承古人意促五臣作俶裝返柴荆牽絲及元興解龜在景平負心二十載於今廢將迎理棹遄還期遵渚騖修坰遡溪終水涉登嶺始山行野曠沙岸淨天高秋月明憩石挹飛泉攀林搴落英戰勝臞者肥鑒止流歸停即是羲唐化獲我擊壤情一作聲田南樹園激流植援樵隱俱在山繇來事不同不同非一事養痾亦園中中園一作園中屏氛雜清曠招逺風卜室倚北阜啓扉面南江激澗代汲井插槿當列墉羣木既羅戶衆山亦當善作對窗靡迤趨下田五臣作岫迢遞瞰高峯寡欲不期勞即事罕人功唯開蔣生徑永懷求羊蹤賞心不可忘妙善冀能同石壁精舍還湖中作昏旦變氣候山水含清暉清暉能娛人遊子淡忘歸出谷日尚早入舟陽已微林壑斂暝色雲霞收夕霏芰荷迭映蔚蒲稗相因依披拂趨南徑愈悅偃東扉慮淡物自輕意愜理無違寄言攝生客試用此道推登石門最高頂晨䇿尋絶壁夕息在山棲疏峯抗高館對嶺臨回溪長林羅戶穴一作庭積石擁階基連巖覺路塞密竹使徑迷來人忘新術去子惑故蹊活活夕流駛噭噭夜猿啼沈冥豈別理守道自不攜心契九秋幹目玩三春荑居常以待終處順故安排惜無同懷客共登青雲梯石門新營所住四面高山回溪石瀨茂林修竹躋險築幽居披雲卧石門苔滑誰能步葛弱豈可捫嫋嫋秋風過萋萋春草繁美人遊不還佳期何繇敦芳塵凝瑤席清醑滿金尊洞庭空波瀾桂枝徒攀翻結念屬霄漢孤景莫與諼俯濯石下潭仰看條上猿早聞夕飈急晚見朝日暾崖傾光難留林深響易奔感往慮有復理來情無存庶持乘日車選作日用得以慰營魂匪為衆人説冀與智者論於南山往北山經湖中瞻眺朝旦發陽崖景落憩隂峯舍舟眺回渚停䇿倚茂松側徑既窈窕環洲亦玲瓏俯視喬木杪仰聆大壑淙石橫水分流林密蹊絶蹤解作竟何感升長皆丰容初篁苞緑籜新蒲含紫茸海鷗戲春岸天雞弄和風撫化心無厭覽物眷彌重不惜去人逺但恨莫與同孤遊非情歎賞廢理誰通從斤竹澗越嶺溪行猿鳴誠知曙谷幽光未顯巖下雲方合花上露猶泫逶迤傍隈隩迢遞陟陘峴過澗既厲急登棧亦陵緬川渚屢徑復乘流玩回轉蘋萍泛沈深菰蒲冒清淺企石挹飛泉攀林摘葉卷想見山阿人薜蘿若在眼握蘭勤徒結折麻心莫展情用賞為美事昧竟誰辨觀此遺物慮一悟得所遣過白岸亭詩拂衣遵沙垣緩步入蓬屋近澗涓密石逺山映疏木空翠難強名漁釣易為曲援蘿聆青崖春心自相屬交交止栩黃呦呦食蘋鹿傷彼人百哀嘉爾承筐樂榮悴迭去來窮通成休戚未若長疏散萬事恆抱朴夜宿石門詩拾遺作石門巖上宿朝搴苑中蘭畏彼霜下歇暝還雲際宿弄此石上月鳥鳴識夜棲木落知風發異音同至聽殊響俱清越妙物莫為賞芳醑誰與伐美人竟不來陽阿徒晞髮南樓中望所遲客杳杳日西頽漫漫長路迫登樓為誰思臨江遲來客與我別所期期在三五夕圓景早已滿佳人殊五臣作猶未適即事怨揆攜感物方悽戚孟夏非長夜晦明如嵗隔瑤華未堪折蘭苕已屢摘路阻莫贈問云何慰離析搔首訪行人引領冀良覿廬陵王墓下作曉月發雲陽落日次朱方含悽泛廣川灑淚眺連岡眷言懷君子沈痛切中腸道消結憤悶運開申悲涼神期恆若存德音初不忘徂謝易永久松柏森巳行延州協心許楚老惜蘭芳解劍竟何及撫墳徒自傷平生疑若人通蔽互相妨理感深情慟定非識所將脆促良可哀夭枉特兼常一隨往化滅安用空名揚舉聲泣已灑長歎不成章還舊園作見顔范二中書辭滿豈多秩謝病不待年偶與張邴合久欲還東山聖靈昔回眷徴尚不及宣何意衝飈激烈火縱炎煙焚玉發崑峯餘燎遂見遷投沙理既迫如卭願亦愆長與歡愛別永絶平生緣浮舟千仞壑總轡萬尋巔流沫不足險石林豈為艱閩中安可處日夜念歸旋事躓兩如直心愜三避賢託身青雲上棲巖挹飛泉盛明蕩氛昏貞休康屯邅殊方感成貸微物豫采甄感深操不固質弱易扳纒曽是反昔園語往實欵然曩基即先築故池不更穿果木有舊行壤石無逺延雖非休憩地聊取永日間衛生自有經息隂謝所牽夫子照情素探懷授往篇酬從弟惠連五章康惠連西陵遇風獻樂詩見本集寢瘵謝人徒滅迹入雲峯巖壑寓耳目歡愛隔音容永絶賞心望長懷莫與同末路值令弟開顔披心胸心胸既云披意得咸在斯凌澗尋我室散帙問所知夕慮曉月流朝忌曛日馳悟對無厭歇聚散成分離分離別西川回景歸東山別時悲已甚別後情更延傾想遲嘉音果枉濟江篇辛勤風波事欵曲洲渚言洲渚既淹時風波子行遲務協華京想詎存空谷期猶復惠來章祗足攬余思儻若果歸言共陶暮春時暮春雖未交仲春善遊遨山桃發紅萼野蕨漸紫苞嚶鳴已悅豫幽居猶鬱陶夢寐佇歸舟釋我吝與勞登臨海嶠初發疆中作與從弟惠連可見羊何共和之四章從集作登臨海嶠與弟惠連一首杪秋尋逺山山逺行不近與子別山阿含酸赴修畛中流袂就判欲去情不忍顧望脰未悁汀曲舟已隱隱汀絶望舟騖棹逐一作逾驚流欲抑一生歡并奔千里遊日落當棲薄繫纜臨江樓豈惟夕情斂憶爾共淹留淹留昔時歡復增今日歎兹情已分慮況乃協悲端秋泉鳴北澗哀猿響南巒戚戚新别心悽悽久念攢攢念攻別心旦發清溪隂暝投剡中宿明登天姥岑高高入雲霓還期那可尋倘遇浮丘公長絶子徽音初發石首城白圭尚可磨斯言易為緇雖抱中孚爻猶勞貝錦詩寸心若不亮徴命察如絲日月垂光景成貸遂兼兹出宿薄京畿晨裝摶曽颸重經平生别再與朋知辭故山日已逺風波豈還時迢迢萬里帆茫茫終何之遊當羅浮行息必廬霍期越海陵三山遊湘歷九嶷欽聖若旦暮懷賢亦悽其皎皎明發心不為歲寒欺入東道路詩整駕辭金門命旅惟詰朝懷居顧歸雲指塗泝行飈屬值清明節榮華感和韶陵隰繁緑杞墟囿粲紅桃鷕鷕翬方雊纎纎麥垂苗隱軫邑里密緬邈江海遼滿目皆古事心賞貴所高魯連謝千金延州權去朝行路既經見願言寄吟謠道路憶山中采陵調易急江南歌不緩楚人心昔絶越客腸今斷斷絶雖殊念俱為歸慮欵在鄉爾思積憶山我憤悶追尋棲息時偃卧任縱誕得性非外求自已為誰纂不怨秋夕長常一作恆苦夏日短濯流激浮湍息隂倚密竿懷故叵新歡含悲忘春暖悽悽明月吹惻惻廣陵散殷勤訴危柱慷慨命促管入彭蠡湖口客遊倦水宿風潮難具論洲島驟回合圻岸屢崩奔乘月聽哀狖浥露馥芳蓀春晚緑野秀巖高白雲屯千念集日夜萬感盈朝昏攀崖照石鏡牽葉入松門三江事多往九派理空存靈物吝珍怪異人祕精魂金膏滅明光水碧綴五臣作輟流溫徒作千里曲絃絶念彌敦入華子岡是麻源第三谷南州實炎德桂樹陵寒山銅陵映碧澗石磴瀉紅泉既枉隱淪客亦棲肥遁賢險徑無測度天路非術阡遂登羣峯首邈若升藝文類聚作騰雲煙羽人絶髣佛丹丘徒空筌圖牒復磨滅碑版誰聞傳莫辨百代後安知千載前且申獨往意乘月弄潺湲恆充俄頃用豈為古今然登歸瀨三瀑布望兩溪我行乘日垂放舟候月圓沫江免風濤涉清弄漪漣積石竦兩溪飛泉倒三山亦既窮登陟荒藹橫目前窺巖不覩景披林豈見天陽烏尚傾翰幽篁未為邅退尋平常時安知巢穴難風雨非攸吝擁志誰與宣倘有同枝條此日即千年初往新安桐廬口絺綌雖淒其授衣尚未至感節良已深懷古亦云一作徒役思不有千里棹孰申百代意逺協尚子心遙得許生計既及泠風善又即秋水駛江山共開一作間曠雲日相照媚景夕羣物清對玩咸可喜擬魏太子鄴中集詩八首并序魏太子建安末余時在鄴宫朝遊夕宴究歡愈之極天下良辰美景賞心樂事四者難并今昆弟友朋二三諸彥共盡之矣古來此娛書籍未見何者楚襄王時有宋玉唐景梁孝王時有鄒枚嚴馬遊者美矣而其主不文漢武帝徐樂諸才備應對之能而雄猜多忌豈獲晤言之適不誣方將庶必賢於今日爾歲月如流零落將盡撰文懷人感往增愴其辭曰百川赴巨海衆星環北辰照灼爛霄漢遙裔起長津天地中橫潰家王五臣作皇拯生民區宇既蕩滌羣英必來臻忝此欽賢性繇來常懷仁況值衆君子傾心隆日新論物靡浮説析理實敷陳羅縷豈闕辭窈窕究天人澄觴滿金罍連榻設華茵急絃動飛聽清歌拂梁塵莫善作何言相遇易此歡信可珍王粲家本秦川貴公子孫遭亂流寓自傷情多幽厲昔崩亂桓靈今板蕩伊洛既燎煙函崤沒無像五臣作象整裝辭秦川秣馬赴楚壤沮漳自可美客心非外奬常歎詩人言式微何繇往上宰奉皇靈侯伯咸宗長雲騎亂漢南宛善作紀郢皆掃蕩排霧屬盛明披雲對清朗慶泰欲重疊公子特先賞不謂息肩願一旦值明兩並載遊鄴京方舟泛河廣綢繆清宴娛寂寥梁棟響既作長夜飲豈顧乘目養陳琳袁本初書記之士故述喪亂事多皇漢逢迍邅天下遭氛慝董氏淪關西袁家擁河北單民五臣作人易周章窘身就羈勒豈意事乖己永懷戀故國相公實勤王信能定蝥賊復覩東郡輝重見漢朝則餘生幸已多矧乃值明德愛客不告疲飲宴遺景刻夜聽極星爛五臣作闌朝遊窮曛黑哀哇動梁埃急觴蕩幽默且盡一日娛莫知古來惑徐幹少無宦情有箕潁之心事故仕世多素辭伊昔家臨淄提攜弄齊瑟置酒飲膠東淹留憩高密此歡謂可終外物始難畢搖蕩箕濮情窮年迫憂栗末塗幸休明棲集建薄質已免負薪苦仍遊椒蘭室清論事究萬美話信非一行觴奏悲歌永夜繫五臣作繼白日華屋非蓬居時髦豈余匹中飲顧昔心悵焉若有失劉楨卓犖偏人而文最有氣所得頗經奇貧居晏里閈少小長東平河兖當衝要淪飄薄許京廣川無逆流招納厠羣英北渡黎陽津南登宛善作紀郢城既覽古今事頗識治亂情歡友相解達敷奏究平生矧荷明哲顧知深覺命輕朝遊牛羊下暮坐括揭鳴終嵗非一日傳卮弄清聲辰事既難諧歡願如今并唯羡肅肅翰繽紛戾髙冥應瑒汝潁之士流離世故頗有飄薄之歎嗷嗷雲中鴈舉翮自委羽求涼弱水湄違寒長沙渚顧我梁五臣作涼川時緩步集潁許一旦逢世難淪薄恆羇旅天下昔未定託身早得所官渡厠一卒烏林預艱阻晚節值衆賢會同庇天宇列坐廕華榱金樽盈清醑始奏延露曲繼以闌夕語調笑輒酬答嘲謔無慙沮傾軀無遺慮在心良已敘阮瑀管書記之任故有優渥之言河洲多沙塵風悲黃雲起金羈相馳逐聨翩何窮已慶雲惠優渥微薄攀多士念昔渤海時南皮戲清沚今復河曲遊鳴葭泛蘭汜屣步陵丹梯並坐侍君子妍談既愈心哀音一作弄信睦耳傾酤係芳醑酌言豈終始自從食蓱來唯見今日美平原侯值公子不及世事但美遨遊然頗有憂生之嗟朝遊登鳯閣日暮集華沼傾柯引弱枝攀條摘蕙草徙倚窮騁望目極盡所討西顧太行山北眺邯鄲道平衢修且直白楊信裊裊副君命飲宴歡娛寫懷抱良遊匪晝夜豈云晚與早衆賓悉精妙清辭灑蘭藻五臣作蘭蒲哀音下回鵠餘哇徹清昊中山不知醉飲德方覺飽願以黃髮期養生念將老石壁立招提精舍四城有頓躓三世無極已浮歡昧眼前沈照貫終始壯齡緩前期頽年追暮齒揮霍夢幻頃飄忽風電起良緣逮未謝時逝不可俟敬擬靈鷲山尚想祗洹軌絶溜飛庭前高林映窗裏禪室棲空觀講宇析妙理過瞿溪山僧迎旭凌絶嶝映泫歸溆浦鑽燧斷山木掩岸墐石戶結架非丹甍藉田資宿莽同遊息心客曖然若可覩清霄揚浮煙空林響法鼓忘懷狎鷗䱔攝生馴兕虎望嶺眷靈鷲延心念淨土若乘四等觀永拔三界苦七夕詠牛女火逝首秋節新明弦月夕月弦光照戶秋首風入隙凌峯步曽藝文作岑崖憑雲肆遙脈徙倚西北庭竦踊東南覿紈綺無報章河漢有駿軛彭城宫中直感歲暮草草眷徂物契契矜嵗殫楚艷起行戚吳趨絶歸歡修帶緩舊裳素鬢改朱顔晚暮悲獨坐藝文作己鳴鶗歇春蘭嵗暮以下五首文闕殷憂不能寐苦此夜難頽明月照積雪朔風徑初學作清且哀運往無淹物年逝覺已藝文作易催作離合古人怨信次十日眇未央加我懷繾綣口脈情亦傷劇哉歸遊客處子勿相忘別字登廬山絶頂望諸嶠積峽忽復啓平塗俄已閉巒隴有合沓往來無蹤轍晝夜蔽日月冬夏共霜雪夜發石關亭隨山踰千里浮溪將十夕鳥歸息舟楫星闌命行役亭亭曉月映泠泠朝露滴答惠連懷人行千里我勞盈十旬別時花灼灼別後葉蓁蓁初發入南城弄波不輟手玩景豈停目雖未登雲峯且以歡水宿東陽溪中贈答二首可憐誰家婦緣流灑一作洗素足明月在雲間迢迢不可得可憐誰家郎緣流乘素舸但問情若為月就雲中墮又按括蒼志曰謝靈運入沐鶴鄉有二女浣紗嘲以詩曰我是謝康樂一箭射雙鶴試問浣紗娘箭從何處落二女不顧又嘲之曰浣紗誰氏女香汗濕新雨兩人默無言何事甘辛苦既而二女答曰我是溪中鯽暫出溪頭食食罷又還潭雲蹤何處覔忽不見按此事頗與東陽贈答相類而詩似不出靈運筆恐屬附會聊載于此送雷次宗符守瑞邊楚感念悽城壕志苦離思結情傷日月滔大林峯積峽忽有起平途俄已絶巒龍有合沓往來無蹤轍柟溪詩淡瀲結寒波檀欒秀霜質洞合水屢迷林回巖愈密泉山詩清旦索幽異方舟越坰郊石室穿林陬飛泉發樹梢自敘宋書本傳曰靈運為孟覬所表帝惜其才不罪以為臨川內史在郡遊放不異永嘉為有司所紏司徒遣隨州從事收之靈運興兵叛逸為詩曰韓亡子房奮秦帝魯連恥本自江海人忠義感君子臨終詩梁書本傳曰靈運既被擒文帝以謝玄勳參微管宜宥及後嗣降死徙廣州又為有司所奏請依法收治詔於廣州棄市臨刑作詩曰龔勝無餘生季業有終盡嵇公理既迫霍生命亦殞悽悽後一作凌霜柏納納衝風菌邂逅竟無時一作幾何修短非所愍恨我君子志不得巖下泯送心正覺前斯痛久已忍唯願乘來生怨親同心朕漢魏六朝百三家集卷六十六
