body:
  text: 漢魏六朝百三家集卷二十八魏陳琳集題詞何進謀誅宦官召兵四方陳孔璋時為主簿讜言禍害其意智豈讓曹操哉棲身冀州為袁本初草檄詆操心誠輕之奮其怒氣辭若江河及窮窘歸操預管記室移書吳㑹即盛稱北方無異劇秦美新文人何常惟所用之茂惡爾矛夷懌相酬固恆態也孔璋詩賦非時所推髙武軍之賦久乃見許於葛稚川今亦不全他賦絶無空羣之名詩則飲馬游覽諸篇稍見寄託然在建安諸子中篇最寂寥子桓兄弟亦少酬贈元瑜傷寡婦仲宣好驢鳴沒而繫思不可得也彼所出塵惟章表書記孟德善用人長鼓厲風雲遂捐宿憾然魏武奸雄生死欺人獨孔璋斥其奄醜士衡笑其香履足令垂頭帖耳後世即有善詈者俱不及也目録賦武軍賦有序又又又又神武賦有序止欲賦神女賦大暑賦瑪瑙勒賦有序迷迭賦栁賦鸚鵡賦上書為袁紹上漢帝書書為袁紹與公孫瓉書更公孫瓉與子書為曹洪與世子書答張紘書箋答東阿王箋檄為袁紹檄豫州文檄吳將校部曲文版文為袁紹拜烏丸三王為單于版文設難應譏樂府飲馬長城窟行詩逰覽二首宴㑹漢魏六朝百三家集卷二十八目録欽定四庫全書漢魏六朝百三家集卷二十八明張溥輯魏陳琳集賦武軍賦有序回天軍於易水之陽以討瓚焉鴻溝參周鹿菰十里荐之以棘為建修櫓干青霄竁深隧下三泉飛雲梯衝神鈎之具不在吳孫之篇三略六韜之術者凡數十事祕莫得聞也乃作武軍賦赫赫哉烈烈矣於此武軍當天符之佐運承斗剛而曜震漢季世之不辟青龍紀乎大荒熊狼競以拏攫神寶播乎鎬京於是武臣赫然揚炎天之隆怒呌諸夏而號八荒爾乃擬北落而樹表睎壘壁以結營百校羅峙千部列陳彌方城掩平原於是啓明戒旦長庚告昏火烈具舉鼓角並震千徒從唱億夫求和聲訇隱而動山光赫奕以燭夜其刃也則楚金越冶棠溪名工清堅皓鍔修刺鋭鋒陸陷蘂犀水截輕鴻鎧則東胡闕鞏百煉精剛函師振旅韋人制縫𤣥𤣥縹甲灼爍流光弩則幽􅚾筋角恆山檿幹通肌暢骨崇緼曲煙大黃沈紫直矢輕弦當鋒摧決貫遐洞堅其弓則烏號越耗繁弱角端象弭繡質哲拊文身矢則申息肅慎箘簵空疏焦銅毒鐵麗轂撻輈馬則飛雲絶景直鬐騧駵駁龍紫鹿文的􅟩魚走駿驚飈步象雲浮若乃清道整列按節徐行龍姿鳳峙灼有遺英又鈎車轇轕九牛轉牽奔雷響激折櫓倒垣其攻也則飛梯行雲臨閣靈構上通紫電下過三壚藴隆既備越有神鉤排雷衝則隳髙城烈炬然則頓名樓又衝鉤競進熊虎爭先墮垣百疊敝樓數千炎燧四舉元戎齊登又整行按律決敵中原八部方置山布星陳干戈森其若林牙旗翻以如繪又南轅反斾爰振其旅胡馬駢足戎車齊軌神武賦有序建安十有二年大司空武平侯曹公東征烏丸六軍被介雲輜萬乘治兵易水次於北平可謂神武奕奕有征無戰者已佇盤桓以淹次乃申命而後征覲狄民之故土追大晉之遐蹤惡先縠之懲冦善魏絳之和戎受金石而弗伐蓋禮樂而思終陵九城而上濟起齊軌乎玉繩車軒轔於雷室騎浮厲乎雲宫暉曜連乎白日旗旐繼於電光斾既軼乎白狼殿未出乎盧龍威凌天地勢括十衝單鼓未伐虜已潰崩克俊馘首梟其魁雄爾乃總輯環珍茵氊幕幄攘瓔帶佩不飾雕琢華璫玉瑶金麟牙琢文貝紫瑛縹碧𤣥緑黼錦繢組罽毼皮服止欲賦媛哉逸女在余東濵色曜春華豔過碩人乃邃古其寡儔固當世之無鄰允宜國而寧家實君子之攸嬪伊余情之是悅志荒溢而傾移宵炯炯以不寐晝舍食而忘飢歎北風之好我美攜手之同歸忽日月之徐邁庶枯楊之生稊道攸長而路阻河廣漾而無梁雖企豫而欲往非一葦之可航展余轡以言歸含憯瘁而就牀忽假暝其若寐夢所歡之來征魂翩翩以遙懷若交好而通靈神女賦漢三七之建安荆野蠢而作仇贊皇師以南假濟漢川之清流感詩人之攸歎想神女之來遊儀營魄於髣佛託嘉夢以通精望陽侯而滉漾覩𤣥麗之軼靈文絳虯之奕奕鳴玉鸞之嚶嚶答玉質於苕華擬豔姿於蕣榮感仲春之和節歎鳴鴈之嗈嗈申握椒以貽豫請同宴乎奧房茍好樂之嘉合永絶世而獨昌既歎爾以豔采又悅我之長期順乾坤以成性夫何若而有辭大暑賦土潤溽以歊蒸時淟涊以溷濁溫風鬱其彤彤譬炎火之陶燭瑪瑙勒賦有序五官將得瑪瑙以為寶勒美其英綵之光豔也使琳賦之託瑶漢之寶岸臨赤水之朱波爾乃他山為錯荆和為理制為寶勒以御君子北堂抄誤寫魏文數語為琳作今據御覽正之迷迭賦立碧莖之娜妸舒綵條之蜿蟺下扶疏以布濩上綺錯而交紛匪荀方之可樂實來儀之麗閒動容飾而發微穆斐斐以承顔栁賦偉姿逸態英豔妙竒緑條縹葉雜遝纖麗龍鱗鳳翼綺錯交施蔚曇曇其杳藹象翠蓋之葳㽔鸚鵡賦咨乾坤之兆物萬品錯而殊形有逸姿之令鳥含嘉淑之哀聲抱振鷺之素質被翠羽之縹精琳人有太荒賦曰假龜筮以貞吉問神諗以休祥上書為袁紹上漢帝書臣聞昔有哀歎而霜隕悲哭而城崩者每讀其書謂為信然於今况之乃知妄作何者臣出身為國破家立事至於懷忠獲釁抱信見疑晝夜長吟剖肝泣血曾無崩城隕霜之應故鄒衍杞婦何能感徹臣以負薪之資拔於陪𨽻之中奉職憲臺擢授戎校常侍張讓等滔亂天常侵奪朝威賊害忠德扇動奸黨故大將軍何進忠國疾亂義心赫怒以臣頗有一介之節可責以鷹犬之功故授臣以督司咨臣以方略臣不敢畏憚强禦避禍求福與進合圗事無違異忠策未盡而元帥受敗太后被質宫室焚燒陛下聖德幼冲新遭厄困時進既被害師徒喪沮臣獨將家兵百餘人抽戈承明竦劒翼室虎叱羣司奮擊凶醜曾不浹辰罪人斯殄此誠愚臣效命之一驗也㑹董卓乘虛所圖不軌臣父兄親從並當大位不憚一室之禍茍惟寧國之義故遂解節出奔創謀河外時卓方貪結外援招說英豪故即臣渤海申以軍號則臣之與卓未有纖芥之嫌若使茍欲淈泥揚波偷榮求利則進可以享竊祿位退無門户之患然臣愚所守志無傾奪故遂引㑹英雄興師百萬欽馬孟津歃血漳河㑹故冀州牧韓馥懷挾逆謀欲専權藝絶臣軍糧不得踵係至使猾虜肆毒害及一門尊卑大小同日并戮鳥獸之情猶知號呼臣所以蕩然忘哀貌無隱戚者誠以忠臣之節道不兩立顧私懷已不能全功斯亦愚臣破家殉國之二驗也又黃巾十萬焚燒青兖黑山張揚蹈藉異域臣乃旋師奉辭伐畔金鼓未震狡敵知亡故韓馥懷懼謝咎歸土張揚黑山同時乞降臣時輒承制竊比竇融以議郎曹操權領兖州牧㑹公孫瓚師旅南馳陸掠北境臣即星駕席卷與瓚交鋒假天之威每戰輒克臣備公族子弟生長京輦頗聞俎豆不習干戈加自乃祖先臣以來世作輔弼咸以文德盡忠得免罪戾臣非與瓚角戎馬之藝爭戰陳之功者也誠以賊臣不誅春秋所貶茍云利國専之不疑故冒踐霜雪不憚劬勤實庶一捷之福以立終身之功社稷未定臣誠恥之太僕趙岐銜命來征宣明陛下含𢎞之施蠲除細故與下更新奉詔之日引師南轅是臣畏怖天威不敢怠慢之三驗也又臣所上將校率皆清英宿德令名顯達登鋒履刃死者過半勤恪之功不見書列而州郡牧守競盜聲名懷持二端優遊顧望皆列土錫圭跨州連郡是以逺近狐疑議論紛錯者也臣聞守文之世德髙者位尊倉卒之時功多者賞厚陛下播越非所洛邑乏祀海內傷心志士憤惋是以忠臣肝腦塗地肌膚橫分而無悔心者義之所感故也今賞加無勞以攜有德杜黜忠功以疑衆望斯豈腹心之逺圖將乃讒慝之邪說使之然也臣爵為通侯位二千石殊恩厚德臣既叨之豈敢窺覬重禮以希彤弓玈矢之命哉誠傷偏裨列校勤不見紀盡忠為國翻成重愆斯䝉恬所以悲號於邊獄白起歔欷於杜郵也太傅日磾位為師保任事東征而耗亂王命寵任非所凡所舉用皆衆所捐棄而容納其䇿以為謀主令臣骨肉兄弟還為讐敵交鋒接刃搆難兹甚臣雖欲釋甲投戈事不得已誠恐陛下日月之明有所不照四聰之聽有所不聞乞下臣章咨之羣賢使三槐九棘議臣罪戾若以臣今行權為釁則桓文當有誅絶之刑若以衆不討賊為賢則趙盾可無書弒之貶矣臣雖小人志守一介若使得申明本心不愧先帝則伏首歐刀褰衣就鑊臣之願也惟陛下垂尸鳩之平絶邪諂之論母令愚臣結恨三泉書為袁紹與公孫瓚書孤與足下既有前盟舊要申之以討亂之誓愛過夷叔分著丹青謂為旅力同仇足踵齊晉故解印釋紱以北帶南分割膏腴以奉執事此非孤赤情之明驗邪豈寤足下棄烈士之髙義尋禍亡之險蹤輟而改慮以好易怨盜遣士馬犯暴豫州始聞甲卒在南親臨戰陳懼於飛矢迸流狂刃橫集以重足下之禍徒增孤子之咎釁也故為薦書懇惻冀可改悔而足下超然自逸矜其威詐謂天罔可吞豪雄可滅果令貴弟殞於鋒刃之端斯言猶在於耳而足下曾不尋討禍源克心罪已茍欲逞其無疆之怒不顧逆順之津匿怨害民騁於余躬遂躍馬控弦處我疆土毒遍生民辜延白骨孤辭不獲已以發界橋之役是時足下兵氣霆震駿馬電發僕師徒肇合機械不嚴彊弱殊科衆寡異論假天之助小戰大克遂陵躡奔兆因壘館榖此非天威棐諶福豐有禮之符表乎足下志猶未厭乃復糾合餘燼率我蛑賊以焚爇渤海孤又不獲寧用及龍河之師羸兵前誘大軍未濟而足下膽破衆散不鼓而敗兵衆優亂君臣並奔此又足下之為非孤之咎也自此以後禍隙彌深孤之師旅不勝其忿遂至積尸為京頭顱滿野愍彼無辜未嘗不慨然失涕也後比得足下書辭意婉約有改往修來之言僕既欣於舊好克復且愍兆民之不寧每輒引師南駕以順簡書弗盈一時而北邊羽檄之文未嘗不至孤是用痛心疾首靡所錯情夫處三軍之帥當列將之任宜令怒如嚴霜喜如時雨臧否好惡坦然可觀而足下二三其德彊弱易謀急則曲躬緩則放逸行無定端言無質要為壯士者固若此乎既乃殘殺老弱幽土憤怨衆叛親離孑然無黨又烏丸濊貃皆與足下同州僕與之殊俗各奮迅激怒爭為鋒鋭又東西鮮卑舉踵來附此非孤德所能招乃足下驅而致之也夫當荒危之世取干戈之險內違同盟之誓外失戎狄之心兵興州壤禍發蕭墻將以定霸不亦難乎前以西山陸梁出兵平討㑹麴義餘殘畏誅逃命故遂住大軍分兵撲蕩此兵孤之前行乃界橋搴旗拔壘先登制敵者也始聞足下鐫金紆紫命以元帥謂當因兹奮發以報孟明之恥是故戰夫引領竦望旌斾怪遂含光匿影寂爾無聞卒臻屠滅相為惜之夫有平天下之怒希長世之功權御師徒帶養戎馬叛者無討服者不收威懷並喪何以立名今舊京克復天罔云補罪人斯亡忠幹翼化華夏儼然望於穆之作將戢干戈放散牛馬足下獨何守區區之土保軍內之廣甘惡名以速朽亡令德之久長壯而籌之非良䇿也宜釋憾除嫌敦我舊好若斯言之玷皇天是聞更公孫瓚與子書瓚夢薊城崩知必敗乃間使與子續書紹候者得之使陳琳更其書蓋聞在昔衰周之世僵尸流血以為不然豈意今日身當其衝袁氏之攻似若神鬼鼓角鳴於地中梯衝舞吾樓上日窮月踧無所聊賴汝當碎首於張燕速致輕騎到者當起烽火於北吾當從內出不然吾亡之後天下雖廣汝欲求安足之地其可得乎為曹洪與世子書十一月五日洪白前初破賊情侈意奢說事頗過其實得九月二十日書讀之喜笑把玩無厭亦欲令陳琳作報琳頃多事不能得為念欲逺以為歡故自竭老夫之思辭多不可一二粗舉大綱以當談笑漢中地形實有險固四嶽三塗皆不及也彼有精甲數萬臨髙守要一夫揮㦸萬人不得進而我軍過之若駭鯨之決細網奔兕之觸魯縞未足以喻其易雖云王者之師有征無戰不義而彊古人常有故唐虞之世蠻夷猾夏周宣之盛亦讐大邦詩書歎載言其難也斯皆憑阻恃逺故使其然是以察兹地勢謂為中材處之殆難倉卒來命陳彼妖惑之罪序王師曠蕩之德豈不信然是夏殷所以喪苗扈所以斃我之所以克彼之所以敗也不然商周何以不敵哉昔鬼方聾昧崇虎讒凶殷辛暴虐三者皆下科也然髙宗有三年之征文王有退修之軍盟津有再駕之役然後殪戎勝殷有此武功焉未有星流景集飈奮霆擊長驅山河朝至暮捷若今者也由此觀之彼固不逮下愚則中才之守不然明矣在中才則謂不然而來示乃以為彼之惡稔雖有孫田墨氂猶無所救竊又疑焉何者古之用兵敵國雖亂尚有賢人則不伐也是故三仁未去武王還師宫竒在虞晉不加戎季梁猶在彊楚挫謀暨至衆賢奔絀三國為墟明其無道有人猶可救也且夫墨子之守縈帶為垣髙不可登折箸為械堅不可入若乃距陽平據石門攄八陳之列騁奔牛之權焉肯土崩魚爛哉設令守無巧拙皆可攀附則公輸已陵宋城樂毅已拔即墨矣墨翟之術何稱田單之智何貴老夫不敏未之前聞蓋聞過髙唐者效王豹之謳遊濉涣者學藻繢之綵閒自入益部仰司馬揚王之遺風有子勝斐然之志故頗奮文辭異於他日怪乃輕其家丘謂為倩人是何言歟夫騄驥垂耳於坰牧鴻雀戢翼於汚池褻之者固以為園囿之凡鳥外廄之下乘也及其整蘭筋揮徑翮陵厲清浮顧盼千里豈可謂其借翰於晨風假足於六駁哉恐猶未信丘言必大噱也洪白文帝序曰上平定漢中族父都護還書與余盛稱彼方土地形勢觀其辭如陳琳所叙為也答張紘書絃見楠榴枕愛其文為作賦時琳在北見之以示人曰此吾鄉張子網所作也後紘見琳作武軍賦應機論與琳書深歎美之琳乃答自僕在河北與天下隔此間率少於文章易為雄伯故使僕受此過差之談非其實也今景興在此足下與子布在彼所謂小巫見大巫神氣盡矣箋答東阿王箋琳死罪死罪昨加恩辱命并示龜賦披覽粲然君侯體髙俗之材秉青萍干將之器刜鐘無聲應機立斷此乃天然異禀非鑽仰者所庶幾也音義既逺清辭妙句焱絶煥炳譬猶飛兔流星超山越海龍驥所不敢追况於駑馬可得齊足哉夫聽白雪之音觀緑水之節然後東野巴人蚩鄙益著載歡載笑欲罷不能謹韜櫝玩耽以為吟頌琳死罪死罪檄為袁紹檄豫州文左將軍領豫州刺史郡國相守蓋聞明主圖危以制變忠臣慮難以立權是以有非常之人然後有非常之事有非常之事然後能立非常之功夫非常者固非常人所擬也曩者彊秦弱主趙髙執柄専制朝權威福由已時人迫脅莫敢正言終有望夷之敗祖宗焚滅汚辱至今永為世鑒及臻吕后季年産祿専政內兼二軍外統梁趙擅斷萬機決事省禁下陵上替海內寒心於是絳侯朱虛興兵奮怒誅夷逆暴尊立太宗故能道化興隆光明顯融此則大臣立權之明表也司空曹操祖父中常侍騰與左悺徐璜並作妖孽叨餮放橫傷化虐民父嵩乞丐攜養因贓假位輿金輦璧輸貨權門竊盜鼎司傾覆重器操贅閹遺醜本無懿德􅘀狡鋒俠好亂樂禍幕府昔統鷹揚掃除凶逆續遇董卓侵官暴國於是提劒揮鼓發命束夏收羅英雄棄瑕取用故遂與操同咨合謀授以禆師謂其鷹犬之才爪牙可任至乃愚佻短略輕進易退傷夷折衄數喪師徒暮府輒復分兵命鋭修完補輯表行東郡領兖州刺史被以虎文奬䠞威柄冀獲秦師一克之報而操遂乘資跋扈肆行凶忒割剝元元殘賢害善故九江太守邊讓英才俊偉天下知名直言正色論不阿諂身首被梟懸之誅妻孥受灰滅之咎自是士林憤痛民怨彌重一夫奮臂舉州同聲故躬破於徐方地奪於吕布倣徨東裔蹈據無所幕府推彊幹弱枝之義且不登叛人之黨故復援旌擐甲席卷赴征金鼓響震布衆奔沮拯其死亡之患復其方伯之位則幕府無德於兖土之民而有大造于操也後㑹鸞駕反斾羣虜寇攻時冀州方有北鄙之警匪遑離局故使從事中郎徐勛就發遣操使繕修郊廟翊衛幼主操使放志専行脅遷當御省禁卑侮王室敗法亂紀坐領三臺専制朝政爵賞由心刑戮在口所愛光五宗所惡滅三族羣談者受顯誅腹議者䝉隱戮百寮鉗口道路以目尚書記朝㑹公卿充員品而已故太尉楊彪典歷二司享國極位操因緣眦睚被以非罪搒楚參并五毒備至觸情任忒不顧憲綱又議郎趙彥忠諌直言義有可納是以聖朝含聽改容加錫操欲迷奪時權杜絶言路擅收立殺不俟報聞又梁孝王先帝母昆墳陵尊顯桑梓松柏猶宜肅恭而操帥將校吏士親臨發掘破棺裸尸掠取金寶至令聖朝流涕士民傷懷操又特置發丘中郎將摸金校尉所過隳突無骸不露身處三公之位而行桀虜之態汗國虐民毒施人鬼加其細政慘苛科防互設矰繳充蹊坑穽塞路舉手挂網羅動足觸機陷是以兖豫有無聊之民帝都有吁嗟之怨歷觀載籍無道之臣貪殘酷烈於操為甚幕府方詰外奸未及整訓加意含容冀可彌縫而操豺狼野心濳包禍謀乃欲摧撓棟梁孤弱漢室除滅忠正専為梟雄往者伐鼓北征公孫瓚彊冦桀逆拒圍一年操因其未破隂交書命外助王師內相掩襲故引兵造河方舟北濟㑹其行人發露瓚亦梟夷故使鋒芒挫縮厥圖不果爾乃大軍過蕩西山屠各左校皆束手奉質爭為前登犬羊殘醜消淪山谷於是操師震懾晨夜逋遁屯據敖倉阻河為固欲以螳蜋之斧禦隆車之隧幕府奉漢威靈折衝宇宙長㦸百萬胡騎千羣奮中黃育獲之士騁良弓徑弩之勢并州越太行青州涉濟漯大軍泛黃河而角其前荆州下宛葉而掎其後雷震虎步並集虜庭若舉炎火以焫飛蓬覆滄海以沃熛炭有何不滅者哉又操軍吏士其可戰者皆自幽冀或故營部曲或怨曠思歸流涕北顧其餘兖豫之民及吕布張揚之遺衆覆亡迫脅權時茍從各被創夷人為讐敵若回斾方徂登髙岡而擊鼓吹揚素揮以啓降路必土崩瓦解不俟血刃方今漢室陵遲綱維弛絶聖朝無一介之輔股肱無折衝之勢方畿之內簡練之臣皆垂頭搨翼莫所憑恃雖有忠義之佐脅於暴虐之臣焉能展其節又操持部曲精兵七百圍守宫闕外託宿衛內實拘執懼其篡逆之萌因斯而作此乃忠臣肝腦塗地之秋烈士立功之㑹可不朂哉操又矯命稱制遣使發兵恐邊逺州郡過聽而給與彊冦弱主違衆旅叛舉以喪名為天下笑則明哲不取也即日幽并青冀四州並進書到荆州便勒見兵與建忠將軍協同聲勢州郡各整戎馬羅落境界舉師揚威並匡社稷則非常之功於是乎著其得操首者封五千户侯賞錢五千萬部曲偏裨將校諸吏降者勿有所問廣宣恩信班揚符賞布告天下咸使知聖朝有拘逼之難如律令檄吳將校部曲文年月朔日子尚書令彧告江東諸將校部曲及孫權宗親中外蓋聞禍福無門惟人所召夫見幾而作不處凶危上聖之明也臨事制變困而能通智者之慮也漸漬荒沈往而不返愚者之蔽也是以大雅君子居安思危以逺咎悔小人臨禍懷佚以待死亡二者之量不亦殊乎孫權小子未辨菽麥要領不足以膏齊斧名字不足以汙簡墨譬猶鷇卵始生翰毛而便陸梁放肆顧行吠主謂為舟楫足以距皇威江湖可以逃靈誅不知天網設張以在綱目爨鑊之魚期於消爛也若使水而可恃則洞庭無三苗之墟子陽無荆門之敗朝鮮之壘不刋南越之旌不拔昔夫差承闔閭之逺跡用申胥之訓兵棲越㑹稽可謂彊矣及其抗衡上國與晉爭長都城屠於勾踐武卒散於黃池終於覆滅身罄越軍及吳王濞驕恣屈彊猖猾始亂自以兵强國富勢凌京城太尉帥師甫下滎陽則七國之軍瓦解氷泮濞之罵言未絶於口而丹徒之刀巳陷其胸何則天威不可當而悖逆之罪重也且江湖之衆不可恃也自董卓作亂以迄於今將三十載其間豪傑縱橫熊據虎跱强如二袁勇如吕布跨州連郡有威有名十有餘輩其餘鋒捍特起鸇視狼顧爭為梟雄者不可勝數然皆伏鈇嬰鉞首腰分離雲散原燎罔有孑遺近者關中諸將復相合聚續為叛亂阻二華據河渭驅率羌胡齊鋒東向氣髙志逺似若無敵丞相秉鉞鷹揚順風烈火元戎啓行未鼓而破伏尸千萬流血漂櫓此皆天下所共知也是後大軍所以臨江而不濟者以韓約馬超逋逸迸脫走還涼州復欲鳴吠逆賊宋建僭號河首同惡相救並為脣齒又鎮南將軍張魯負固不恭皆我王誅所當先加故且觀兵旋斾復整六師長驅西征致天下誅偏師涉隴則建約梟夷旍首萬里軍入散關則羣氐率服王侯豪帥奔走前驅進臨漢中則陽平不守十萬之師土崩魚爛張魯逋竄走入巴中懷恩悔過委質還降巴夷王朴胡賨邑侯杜濩各帥種落共舉巴郡以奉王職鉦鼓一動二方俱定利盡西海兵不鈍鋒若此之事皆上天威明社稷神武非徒人力所能立也聖朝寬仁覆載允信允文大啓爵命以示四方魯及胡濩皆享萬户之封魯之五子各受千室之邑胡濩子弟部曲將校為列侯將軍以下千有餘人百姓安堵四民反業而建約支屬皆為鯨鯢超之妻孥焚首金城父母嬰孩覆尸許市非國家鍾禍於彼降福於此也逆順之分不得不然夫鷙鳥先髙攫擊之勢也牧野之威孟津之退也今者枳棘翦扞戎夏以清萬里肅齊六師無事故大舉天師百萬之衆與胸奴南單于呼完厨及六郡烏桓丁令屠各湟中羌僰霆奮席卷自夀春而南又使征西將軍夏侯淵等率精甲五萬及武都氐羌巴漢鋭卒南臨汶江扼據庸蜀江夏襄陽諸軍橫截湘沅以臨豫章樓船橫海之師直指吳㑹萬里尅期五道並入權之期命於是至矣丞相銜奉國威為人除害元惡大憝必當梟夷至於枝附葉從皆非詔書所特禽疾故每破滅彊敵未嘗不務在先降後誅拔將取才各盡其用是以立功之士莫不翹足引領望風響應昔袁術僭逆王誅將加則廬江太守劉勳先舉其郡還歸國家吕布作亂師臨下邳張遼侯成率衆出降還討眭固薛洪樛尚開城就化官渡之役則張郃髙奂舉事立功後討袁尚則都督將軍馬延故豫州刺史隂䕫射聲校尉郭昭臨陳來降圍守鄴城則將軍蘇游反為內應審配兄子開門入兵既誅袁談則幽州大將焦觸攻逐袁熙舉縣來服凡此之輩數百人皆忠壯果烈有智有仁悉與丞相參圖畫䇿折衝討難芟敵搴旗靜安海內豈輕舉措也哉誠乃天啓其心計深慮逺審邪正之津明可否之分勇不虛死節不茍立屈伸變化惟道所存故乃建丘山之功享不訾之祿朝為讐虜夕為上將所謂臨難知變轉禍為福者也若夫說誘甘言懷寶小惠泥滯茍且沒而不覺隨波漂流與熛俱滅者亦甚衆多吉凶得失豈不哀哉昔歲軍在漢中東西懸隔合肥遺守不滿五千權親以數萬之衆破敗奔走今乃欲當禦雷霆難以冀矣夫天道助順人道助信事上之謂義親親之謂仁盛孝章君也而權誅之孫輔兄也而權殺之賊義殘仁莫斯為甚乃神靈之逋罪下民所同讐辜讐之人謂之凶賊是故伊摰去夏不為傷德飛亷死紂不可謂賢何者去就之道各有宜也丞相深惟江東舊德名臣多在載籍近魏叔英秀出髙峙著名海內虞文繡砥礪清節耽學好古周泰明當世俊彥德行修明皆宜膺受多福保乂子孫而周盛門户無辜被戮遺類流離湮沒林莽言之可為愴然聞魏周榮虞仲翔各紹堂構能負析薪及吳諸顧陸舊族長者世有髙位當報漢德顯祖揚名又諸將校孫權婚親皆我國家良寶利器而並見驅迮雨絶於天有斧無柯何以自濟相隨顛沒不亦哀乎蓋鳳鳴髙岡以逺罻羅賢聖之德也鸋鴂之鳥巢於葦苕苕折子破下愚之惑也今江東之地無異葦苕諸賢處之信亦危矣聖朝開𢎞曠蕩重惜民命誅在一人與衆無忌故設非常之賞以待非常之功乃霸夫烈士奮命之良時也可不勉乎若能翻然大舉建立元勳以膺顯祿福之上也如其未能笇量大小以存易亡亦其次也夫繫蹄在足則猛虎絶其蹯蝮蛇在手則壯士斷其節何則以其所全者重所棄者輕若乃樂禍懷寧迷而忘復暗大雅之所保背先賢之去就忽朝陽之安甘折苕之末日忘一日以至覆沒大兵一放玉石俱碎雖欲救之亦無及已故令往購募爵祿科條如左檄到詳思至言如詔律令版文為袁紹拜烏丸三王為單于版文遼西烏丸大人丘力居上谷烏丸大人難樓各稱王而遼東屬國烏丸大人蘇僕延自稱峭王右北平烏丸大人烏延自稱汗魯王後丘力居死從子踏頓代立總攝三王袁紹與公孫瓚連戰踏頓助紹擊瓚破之紹矯制賜踏頓難峭王汗魯王印綬皆為單于使持節大將軍督幽青并領冀州牧阮鄉矦紹承制詔遼東屬國率衆王頒下烏丸遼西率衆王踏頓右北平率衆王汗盧維乃祖慕義遷善欵塞內附北捍玁狁東拒濊貊世守北陲為百姓保鄣雖時侵犯王略命將徂征厥罪率不旋時悔愆變改方之外夷最又聰慧者也始有千夫長百夫長以相統領用能悉乃心克有勳力於國家稍受王侯之命自我王室多故公孫瓚作難殘夷厥土之君以侮天慢王是以四海之內並執干戈以衛社稷三王奮氣裔土忿奸憂國控弦與漢兵為表裏誠甚忠孝朝所嘉焉然而虎兕長蛇相隨塞路王官爵命否而無聞夫有勳不賞俾勤者怠今遣行謁者楊林齎單于璽綬車服以對爾勞其各綏靜部落教以謹慎無使作凶作慝世復爾祀位長為百蠻長厥有咎有不臧者泯於爾祿而喪於乃庸可不勉乎設難應譏客有譏余者云聞君子動作周旋無所茍而已矣今主君鍾隂陽之美總賢聖之風固非世人所能及遭豺狼肆虐社稷隕傾既不能抗節服義與主存亡而背枉違難耀兹武功徒獨震撲山東剝落元元結疑本朝假拒羣奸使已䝉噂沓之謗而他人受討賊之勳捐功棄力以德取怨今賤文德而貴武勇任權譎而背舊章無乃非至德之純美而有闕於後人哉主人曰是何言也夫兵之設亦久矣所以威不軌而懲淫慝也夫申鳴違父樂羊食子季友䲴兄周公戮弟猶忍而行之王事所不得已也而况將避讒慝之嫌棄社稷之難愛暫勞之民忘永康之樂此庸夫猶所不為何有冠世之士哉昔洪水滔天泛濫中國伯禹躬之過門而不入率萬方之民致力乎溝洫及至簫韶九成百獸率舞垂拱無為而天下宴如夫豈前好勤而後偷樂乎蓋以彼勞求斯逸也夫世治責人以禮世亂則考人以功斯各一時之宜故有論戰陳之權於清廟之堂者狂矣陳俎豆之器於城濮之墟者則悖矣是以達人君子必相時以立功必揆宜以處事孝靈既喪妖宦放禍棟臣殘酷宫室焚火主君乃芟凶族夷惡醜蕩滌朝奸清澄守職也既乃卓為封蛇幽鴆帝后强以暴國非力所討違而去之宜也是故天贊人和無思不至用能合師百萬若運諸掌者義也今人主以寬𢎞為宇仁義為廬若地之載如天之燾故當其聞管籥之聲則恐民之病也見羽毛之美則懼士之勞也察稼穡之不時則推民之匱也臨臺觀之崇髙則恤役之病也是以虛心恭已取人之謨闢四門廣諫路貴讜言賤巧僞慮不専行功不擅美咨事若不及求愆恐不聞用能使賢智者盡其䇿勇敢者竭其身故舉無遺闕而風烈宿宣也樂府飲馬長城窟行樂府瑟調曲飲馬長城窟水寒傷馬骨往謂長城吏慎莫稽留太原卒官作自有程舉築諧汝聲男兒寧當格鬬死何能怫鬱築長城長城何連連連連三千里邊城多健少內舍多寡婦作書與內舍便嫁莫留住善侍新姑嫜時時念我故夫子報書往邊地君今出語一何鄙身在禍難中何為稽留他家子生男慎莫舉生女哺用脯君獨不見長城下死人骸骨相撐拄結髮行事君慊慊心意關明知邊地苦賤妾何能久自全少玉臺作兒往一作與關一作間詩遊覽二首髙㑹時不娛羈客難為心殷懷從中發悲感激清音投觴罷歡坐逍遙步長林肅肅山谷風默默天路隂惆悵忘旋反歔欷涕沾襟默默一作黯黯襟一作巾其二節運時氣舒秋風涼且清閒居心不娛駕言從友生翺翔戲長流逍遙登髙城東望看疇野回顧覽園庭嘉木凋緑葉芳草纖紅榮騁哉日月逝年命將西傾建功不及時鐘鼎何所銘收念還房寢慷慨詠墳經庶幾及君在立德垂功名宴㑹凱風飄隂雲白日揚素暉良友招我逰髙㑹宴中闈𤣥鶴浮清泉綺樹煥青㽔後闕漢魏六朝百三家集卷二十八
