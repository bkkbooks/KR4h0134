香就階猶不進催來上伎床搗衣明月下静夜秋風飄錦石平砧面蓮房接杵腰急節迎秋韻新聲入手調寒衣須及早將寄霍嫖姚出沒看樓殿間闗望綺羅翔禽逐節舞流水赴絃歌細管吹藂竹新杯捲半荷南宫冠蓋下日暮風塵多玉柙珠簾捲金鈎翠幔懸荷香薫水殿閣影入池蓮平沙臨浦口髙栁對樓前上橋還倚望遥看採菱船髙閣千尋跨重簷百丈齊雲度三分近花飛一倍低吹簫迎白鶴照鏡舞山雞何勞愁日暮未有夜烏啼河流值淺岸斂轡暫經過弓衣濕濺水馬足亂横波半城斜出樹長林直枕河今朝遊俠客不畏風塵多度橋猶徙倚坐石未傾壺淺草開長埒行營繞細㕑沙洲兩鶴迥石路一松孤自可尋丹竈何勞憶酒壚上林春逕密浮橋栁路長龍媒逐細草鶴氅映垂楊水似桃花色山如甲煎香白石春一作清泉上誰能待月光白石春泉滿黄金新埒開戚里車先度蘭池馬即來落花承舞席春衫拭酒杯行㕑半路待載妓一雙迴將軍息邊務校尉罷從戎池臺臨戚里絃管入新豐浮雲隨走馬明月逐彎弓比來多射獵唯有上林中三危上鳳翼九坂度龍鱗路髙山裏樹雲低馬上人懸巖泉溜響深谷鳥聲春住馬來相問應知有姓秦聊開鬱金屋暫對芙蓉池水光連岸動花風合樹吹春杯猶雜泛細菓尚連枝不畏歌聲盡先看箏柱欹洞靈開靜室雲氣滿山齋古松裁數樹盤根無半埋愛静魚争樂依人鳥入懐仲春徵隠士蒲輪上計偕今朝好風日園苑足芳菲竹動蟬争散蓮揺魚暫飛面紅新著酒風晩細吹衣跂石多時望蓮船始復歸金鞍聚磧岸玉舳泛中流畫鷁先防水媒龍即負舟沙城疑海氣石岸似江樓崩槎時半沒壊舸或空浮定是汾河上戈船聊試遊竟日坐春臺芙蓉承酒杯水流平澗下山花滿谷開行雲數畨過白鶴一雙來水影揺藂竹林香動落梅直上山頭路羊腸能幾迴鏡玉匣聊開鏡輕灰暫拭塵光如一片水影照兩邊人月生無有桂花開不逐春試挂淮南竹堪能見四隣梅花當年臘月半已覺梅花䦨不信今春晩俱來雪裡看樹動懸氷落枝髙出手寒早知覔不見真悔著衣單詠樹交柯乍百頃擢本或千尋楓子留為式桐孫待作琴殘核移桃種空花植棗林幽居對䝉密蹊徑轉深沈鬭雞以下三首闕文開軒望平子驟馬看陳王狸膏燻鬭敵芥粉壒春場解翅蓮花動猜羣錦臆張應令望别非新館開舟即舊灣浦喧征棹發亭空送客還路塵猶向水征帆獨背闗杏花春色方盈野枝枝綻翠英依稀暎村塢爛漫開山城好折待賓客類苑作旅金盤襯紅瓊集周公處連句市朝一朝變蘭艾本同焚故人相借問平生如所聞寄徐陵故人倘思我及此平生時莫待山陽路空聞吹笛悲寄王琳玉闗道路逺金陵信使疎獨下千行淚開君萬里書奉和趙王花徑日相攜花林鳥未棲比看中郎醉堪聞烏夜啼和劉儀同臻南登廣陵岸迴首落星城不言臨舊浦烽火照江明和庾四離闗一長望别恨幾重愁無妨對春日懐抱只言秋和侃法師三絶一作和侃法師别詩秦闗望楚路灞岸想江潭幾人應落淚看君馬向南客遊經歳月灞旅故情多近學衡陽雁秋分俱渡河迴首河堤望眷眷嗟離絶誰言舊國人到在他鄉别送周尚書𢎞正二首交河望合浦𤣥菟想朱鳶共此無期别知應復幾年離期定已促别淚轉無從惟愁郭門外應足數株松重别周尚書二首陽闗萬里道不見一人歸唯有河邊雁秋來南向飛河橋兩岸絶横岐數路分山川遥不見懐袖逺相聞贈别藏啼留送别拭淚强相參誰言畜衫袖長代手中浛徐報使來止得一相見一面還千里相思那得論更尋終不見無異桃花源行途賦得四更應詔四更天欲曙落月垂闗下深谷暗藏人欹松横礙馬和江中賈客樂府作賈客詞五兩開船頭長橋發新浦懸知岸上人遥振江中鼓奉和平鄴應詔天䇿引神兵風飛掃鄴城陣雲千里散黄河一代清送衛王南征望水初横陣移營冦未降風塵馬足起先暗廣陵江仙山二首金竈新和藥銀臺舊聚神相看但莫怯先師應識人石軟如香飰鉛銷似熟銀蓬莱暫近别海水遂成塵山齋石影横臨水山雲半繞峰遥想山中店懸知春酒濃野步值泉仍飲馬逢花即舉杯稍看城闕逺轉見風雲來山中澗暗泉偏冷巖深桂絶香住中能不去非獨淮南王閨怨明鏡圓花發空房故怨多幾年留織女還應聽渡河和趙王看妓長思浣紗石空想一作定憶搗衣砧臨卭若有便一作使為說解琴心㸔舞鸞迴不假學鳳舉自相闗到嫌衫袖廣恒長礙舉鬟聽歌協律新教罷河陽始學歸但令聞一曲餘聲三日飛暮秋野興賦得傾壺酒劉伶正捉酒中散欲彈琴但使逢秋菊何須就竹林對酒數盃還已醉風雲一作春風不復知唯有龍吟笛桓伊能獨吹春日極飲檻前聞鳥囀園裏對花開就中言不醉紅袖捧金杯春望春望上春臺春窓四面開落花何假拂風吹㑹併來新月鄭環唯半出秦鈎本獨懸若交臨酒影堪言照弩弦秋日蒼茫望落景羇旅對窮秋賴有南園菊殘花足解愁望渭水樹似新亭岸沙如龍尾灣猶言吟暝浦應有落帆還塵鏡明鏡如明月恒常置匣中何須照兩鬢終是一秋蓬和淮南公聽琴聞絃斷嗣宗看月夜中散對行雲一絃雖獨韻猶足動文君弄琴二首雉飛催晩别烏啼驚夜眠若交新曲變惟須促一絃不見石城樂惟聞鳥噪林新聲逐絃轉應得動春心詠羽扇揺風碎朝翮拂汗落毛衣定似回谿路將軍垂翅歸題結綫袋子交絲結龍鳳鏤彩織雲霞一寸同心縷千年長命花賦得鸞臺九成吹玉琯百尺上瑶臺能將秦女去終是鳳凰來賦得集池雁逢風時迥度逐侣乍争飛猶憶方塘水今秋已復歸詠雁初學作周𢎞正非南思洞庭水北想雁門闗稻粱俱可戀飛去復飛還忽見檳榔緑房千子熟紫穂集作穟百花開莫言行萬里曽經相識來賦得荷秋衣行欲製風蓋漸應欹若有千年蔡須巢但見隨移樹酒泉移赤柰河陽徙石榴雖言有千樹何處似封侯奉梨接枝秋轉脆含情落更香擎置仙人掌應添瑞露漿傷往二首見月長垂淚看花定斂眉從今一别後知作幾年悲鏡塵言苦厚蟲絲定幾重還是臨忩月今秋迥照松春日離合二首秦青初變曲未有逐琴心明年花樹下月月來相尋春字田家足閒暇士友暫流連三春竹葉酒一曲鵾雞弦日字和湘東王後園迴文旱蓮生竭鑊嫩菊養秋隣滿池留浴鳥分橋上戲人問疾封中録形骸違學宦狹巷幸為閒虹迴或有雨雲合又含寒横湖韻鶴下迴溪峽猿還懐賢為榮衛和緩恵綺紈疑是何丸示封中録二首似吃語詩貴客居金谷闗扄隔稿街冀君見果顧郊間光景佳髙階既激澗廣閣更交柯葛巾久乖角菊逕簡經過秋夜望單飛雁以下七言失羣寒雁聲可憐夜半單飛在月邊無奈人心復有憶今暝將渠俱不眠代人傷往二首青田松上一黄鶴相思樹下兩鴛鴦無事交渠更相失不及從來莫作雙雜樹本唯金谷苑諸花舊滿洛陽城正是古來歌舞處今日看時無地行漢魏六朝百三家集巻一百十二
