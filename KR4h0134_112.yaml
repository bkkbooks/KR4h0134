body:
  text: 漢魏六朝百三家集巻一百十二庾信集目録樂府周祀圜丘歌十二首昭夏降神皇夏皇帝入門昭夏爼入昭夏奠玉帛皇夏皇帝升壇雲門舞初獻雲門舞初獻配帝登歌初獻及獻配帝畢奏皇夏飲福酒雍夏撤奠皇夏就望燎位皇夏還便殿周祀方澤歌四首昭夏降神昭夏奠玉帛登歌初獻皇夏望坎位周祀五帝歌十二首皇夏奠玉帝皇夏初獻青帝雲門舞以下並初獻奏配帝舞赤帝雲門舞配帝舞黄帝雲門舞配帝舞白帝雲門舞配帝舞黒帝雲門舞配帝舞周宗廟歌十二首皇夏皇帝入廟門昭夏降神皇夏爼入皇帝升階皇夏獻皇髙祖皇夏獻皇曽祖德皇帝皇夏獻皇祖太祖文皇帝皇夏獻文宣皇太后皇夏獻閔皇帝皇夏獻眀皇帝皇夏獻髙祖武皇帝皇夏飲福酒皇夏還便殿周大祫歌二首昭夏降神登歌奠玉帛周五聲調曲二十四首有序宫調曲五首變宫調二首商調曲四首角調曲二首徴調曲六首羽調曲五首對酒歌昭君辭應詔王昭君出自薊北門行結客少年塲行道士步虚詞十首烏夜啼怨歌行舞媚娘烏夜啼燕歌行楊栁歌詩奉和泛江奉和山池陪駕幸終南山和宇文内史和宇文内史春日遊山逰山和宇文京兆逰田奉報寄洛州奉和窮秋寄隐士上益州上柱國趙王二首謹贈司冦淮南公正旦上司憲府任洛州酬薛文學見贈别將命至鄴將命至鄴酬祖正員入彭城館同州還從駕觀講武奉報趙王出師在道賜詩和趙王送峽中軍奉和趙王途中五首侍從徐國公殿下軍行同盧記室從軍伏聞逰獵見征客始還遇獵奉和闡𢎞二教應詔至老子廟應詔奉和趙王逰仙奉和同泰寺浮圖奉和法筵應詔和從駕登雲居寺塔和何儀同講竟述懐奉和趙王隐士擬咏懐二十七首和張侍中述懐奉和示内人奉和趙王美人春日奉和趙王春日夢入堂内和詠舞夜聞搗衣預麟趾殿校書和劉儀同和宇文内史入重陽閣忝在司水看治渭橋北園新齋成應趙王教同㑹河陽公新造山池聊得寓目登州中新閣嵗晚出横門北園射堂新成園庭歸田寒園即目幽居值春卧病窮愁山齋望野蒙賜酒奉報趙王惠酒有喜致酒喜晴應詔同顔大夫初晴奉和趙王喜雨和李司録喜雨郊行值雪奉和趙王西京路春旦奉和夏日應令和樂儀同苦熱和裴儀同秋日詠園花西門豹廟和王少保遥傷周處士傷王司徒褒仰和何僕射還宅懐故過炅法師墓和人日晚景晏昆明池對宴齊使聘齊秋晚館中飲酒奉和濬池初成清晨臨泛和炅法師逰昆明池二首見逰春人别周尚書𢎞正别張洗馬樞别庾七入蜀將命使北始渡𤓰步江反命河朔始入武州冬狩行四韻連句應詔和王内史從駕狩入道士館奉和永豐殿下言志十首率爾成詠慨然成詠奉和賜曹美人和趙王看妓奉答賜酒奉答賜酒鵞正旦䝉趙王賚酒衛王贈桑落酒奉答就蒲州使君乞酒蒲州刺史中山公許乞酒一車未送答王司空餉酒舟中望月望月對雨喜晴詠春近餘雪應詔奉和初秋晩秋和潁川公秋夜詠畫屏風詩一十五首鏡梅花詠樹鬬鷄應令杏花集周公處連句寄徐陵寄王琳奉和趙王和劉儀同臻和庾四和侃法師三絶送周尚書𢎞正二首重别周尚書二首贈别徐報使來止得一相見行途賦得四更應詔和江中賈客奉和平鄴應詔送衛王南征仙山二首山齋野步山中閨怨和趙王看妓看舞聽歌暮春野興賦得傾壺酒對酒春日極飲春望新月秋日望渭水塵鏡和淮南公聽琴聞絃斷㺯琴二首詠羽扇題結綫袋子賦得鸞臺賦得集池鴈詠鴈忽見㯽榔賦得荷移樹奉梨傷往二首春日離合二首和湘東王後園迴文問疾示封中録示封中録二首秋夜望单飛鴈代人傷往二首漢魏六朝百三家集巻一百十二目録欽定四庫全書漢魏六朝百三家集巻一百十二明張溥輯庾信集樂府周祀圜丘歌十二首隋書樂志曰周閔帝受禪居位日淺明帝雖革魏氏之樂而未臻雅正天和元年武帝初造山雲舞以備六代南北郊雩壇太廟禘祫俱用之六舞者大夏大濩大武正徳武徳山雲也於是正定雅音為郊廟樂宣帝嗣位皆循用之昭夏降神重陽禋祀大報天丙午封壇肅且圜孤竹之管雲和弦神光未樂府作來下風肅然王城七里通天臺紫微斜照影徘徊連珠合璧重光來天䇿蹔轉鈎陳開皇夏皇帝入門旌迴外壝蹕靜郊門千乗按轡萬騎雲屯藉茅無咎掃地唯尊揖讓展禮衡璜節步星漢就列風雲相顧取法于天降其永祚昭夏俎入日至大禮豐犧上辰牲牢脩牧繭栗毛純俎豆斯立陶匏以陳大報反命居陽兆日六變鼓鐘三和琴瑟俎竒豆偶惟誠惟質昭夏奠玉帛員玉已奠蒼幣斯陳瑞形成象璧氣含春禮從天數智總圓神為祈為祀至敬咸遵皇夏皇帝升壇七里一作星是仰八陛有慿就陽之位如日之升思䖍肅肅致敬繩繩祀史陳信𤣥象斯格惟類之典唯靈之澤幽顯對揚人神咫尺雲門舞初獻獻以誠鬱以清山罍舉沈齊傾惟尚饗洽皇情降景福通神明雲門舞初獻配帝長丘逺厯大電遥源弓藏髙隴鼎沒寒門人生于祖物本于天奠神配徳迄用康年登歌初獻及獻配帝畢奏歳之祥國之陽蒼靈敬翠雲長象為飾龍為章乗長日坯蟄户列雲漢迎風雨大吕歌雲門舞省滌濯奠牲牷鬱金酒鳳凰樽迴天眷顧中原皇夏飲福酒國命在禮君命在天陳誠唯肅飲福唯䖍洽斯百禮福以千年鈎陳掩映天駟徘徊彫禾飾斚翠羽承罍受斯茂祉從天之來雍夏撤奠禮將畢樂將䦨迴日轡動天闗翠鳳揺和鸞響五雲飛三步上風為馭雷為車無轍迹有烟霞暢皇情休靈命雨留甘雲餘慶皇夏就望燎位六典聨事九司咸則率由舊章于焉允塞掌禮移次燔柴在焉烟升玉帛氣斂牲牷休氣馨香膋芳昭晰翼翼䖍心明明上徹皇夏還便殿玉帛禮畢神人事分嚴承乃睠瞻仰迴雲輦路千門王城九軌式道移候司方迴指得一惟清于萬斯寧受兹景命于天告成周祀方澤歌四首方澤舞辭同圜丘昭夏降神報功隂澤展禮𤣥郊平琮鎮瑞方鼎升庖調歌絲竹縮酒江茅聲舒鐘鼓器質陶匏列燿秀華凝芳都茘川澤茂祉丘陵容衛雲飾山罍蘭浮汎齊日至之禮歆兹大祭昭夏奠玉帛曰若厚載欽明方澤敢以敬恭陳之玉帛徳包含養功藏靈迹斯箱既千子孫則百登歌初獻質明孝敬求隂順陽壇有四陛琮分八方牲牷蕩滌蕭合馨香和鑾戾止振鷺來翔威儀簡簡鐘鼓喤喤聲和孤竹韻入空桑封中雲氣坎上神光下元之主功深蓋藏皇夏望坎位司筵撤席掌禮移次迴顧封壇恭臨坎位瘞玉埋俎藏芬斂氣是曰就幽成斯地意周祀五帝歌十二首皇夏奠玉帛嘉玉惟芳嘉幣惟量成形惟一作依禮稟色隨方神班其次歲禮惟常威儀抑抑率由舊章皇夏初獻惟令之月惟嘉之辰司壇宿設掌史誠陳敢用明禮言功上神鈎陳旦闢閶闔朝分旒垂象冕樂奏山雲將迴霆䇿蹔轉天文五運周環四時代序鱗次玉帛循迴樽俎神其降之介福斯許青帝雲門舞以下並初獻奏甲在日鳥中星禮東后奠蒼靈樹春旗命青史候雁還東風起歌木徳舞震宫泗濱石龍門桐孟之月陽之天億斯慶兆斯年配帝舞帝出于震蒼徳于神其明在日其位居春勞以定國功以施人言從配祀近取諸身赤帝雲門舞招揺指午對南宫日月相㑹實沈中離光布政動温風純陽之月樂炎精赤雀丹書飛送迎朱絃絳鼓罄䖍誠萬物含養各長生配帝舞以炎為政以火為官位司南陸享配離壇三和實俎百味浮蘭神其茂豫天步艱難黄帝雲門舞三光儀表正四氣風雲同戊巳行初厯黄鐘始變宫平琮禮内鎮隂管奏司中齋壇芝曄曄清野桂馮馮夕牢芬六鼎安歌韻八風神光乃超忽嘉氣恒葱葱配帝舞四時咸一徳五氣或同論猶吹鳳凰管尚對梧桐園器圜居土厚位總配神尊始知今奏樂還用我雲門白帝雲門舞肅靈兊景承配秋壇雲髙火落露白蟬寒帝律登年金精行令瑞獸霜耀祥禽雪映司藏肅殺萬寳咸宜厥田上上收功在斯配帝舞金行秋令白帝朱宣司正五雉歌庸九川執文之徳對越彼天介以福祉君子萬年黒帝雲門舞北辰為政𤣥壇北陸之祀員官宿設𤣥璜浴蘭坎徳隂風御寒次律將迴窮紀微陽欲動細泉管猶調于隂竹聲未入于春絃待歸餘于送厯方履慶于斯年配帝舞地始坼虹始藏服𤣥玉居𤣥堂沐蕙氣浴蘭湯匏器潔水泉香陟配彼福無疆君欣欣此樂康周宗廟歌十二首皇夏皇帝入廟門肅肅清廟巖巖寢門欹器防滿金人戒言應􅉧懸鼓崇牙樹羽階變升歌庭紛象舞閑安象設緝熙清奠春鮪初登新萍先薦僾然入室儼乎在位悽愴履之非寒之謂昭夏降神永維祖武慶靈長龍圖革命鳳厯歸昌功移上墋徳耀中陽清廟肅肅猛􅙇煌煌曲髙大夏聲和盛唐牲牷蕩滌蕭合馨香和鑾戾止振鷺來翔永敷萬國是則四方皇夏俎入皇帝升階年祥辨日上協龜言奉酎承列來庭駿奔雕禾飾斚翠羽承樽敬殫如此恭惟執燔皇夏獻皇髙祖慶緒千重秀洪源萬里長無時猶戢翼有道故韜光盛徳必有後仁義終克昌明星初兆慶大電久呈祥皇夏獻皇曽祖徳皇帝克昌光上烈基聖穆西藩崇仁髙涉渭積徳被居原帝圖張往迹王業茂前尊重芬徳陽廟疊慶夀陵園百靈光祖武千年福孝孫皇夏獻皇祖太祖文皇帝雄圖屬天造宏略遇羣飛風雲猶聽命龍躍遂乗機百二當天險三分拒樂推函谷風塵散河陽氛霧晞濟弱淪風起扶危頺運歸地紐崩還正天樞落更追原祠乍超忽畢隴或緜微終封三尺劍長巻一戎衣皇夏獻文宣皇太后月靈興慶沙祥發源功參禹迹徳賛堯門言容典禮䄖狄徽章儀形温徳令問昭陽日月不居歳時晼晩瑞雲纒心閟宫惟逺皇夏獻閔皇帝龍圖基代徳天步屬艱難謳歌還受瑞揖讓乃登壇升輿芒刺重入位據闗寒巻舒雲汎濫游揚日浸微出鄭終無反居桐竟不歸祀夏今惟舊尊霛諡更追皇夏獻明皇帝若水逢降居窮桑屬帷政丕哉馭帝籙鬱矣當天命方定五雲官先齊八風令文昌氣似珠太史河如鏡南宫學已開東觀書還聚文辭金石韻毫翰風飈豎清室桂馮馮齊房芝詡詡寧思玉管笛空見靈衣舞皇夏獻髙祖武皇帝南河吐雲氣北斗降星辰百靈咸仰徳千年一聖人書成紫微動律定鳳凰馴六軍命西土甲子陳東隣戎衣此一定萬里更無塵烟雲同五色日月並重輪流沙既西靜蟠木又東臣凱樂聞朱雁鐃歌見白麟今為六代祀還得九疑賓皇夏飲福酒禮殫祼獻樂極休成長離前掞宗祀文明縮酌浮蘭澄罍合鬯磬折禮容旋迴靈貺受釐撤俎飲福移樽惟光惟烈文子文孫皇夏還便殿庭闋四始筵終三薦顧步堦墀徘徊餘奠六龍矯首七萃警途鼓移行漏風轉相烏翼翼從事緜緜四時惟神降嘏永言保之周大祫歌二首昭夏降神律在夾鍾服居蒼衮杳杳清思緜緜長逺就祭于合班神于本來庭有序助祭有章樂舞六代賓歌二王和鈴以節鞗革斯鏘齊宫饌玉鬱斚浮金洞庭鐘鼓龍門瑟琴其樂已變惟神是臨登歌奠玉帛時餘同宗廟享神惟顯思不言而令玉帛之禮敢陳莊敬奉如弗勝薦如受命交于神明慤于言行周五聲調曲二十四首序曰元正饗㑹大禮賓至食舉稱觴薦玉六律既從八風斯暢以歌大業以舞成功宫調曲五首氣離清濁剖元開天地分三才初辨正六位始成文繼天爰立長安民乃樹君其明廣如日其澤厚如雲惟昔我文祖撥亂拒謳歌三分未撫運八百不陵河禮敷天下信樂正神人和風塵行息警江海欲無波我皇承下武革命在君臨應圖當舜玉嗣徳受堯琴沈首多推運陽城有讓心就日先知逺觀淵早見深𤣥精實委御蒼正乃皆平履端朝萬國年祥慶百靈玉帛咸觀禮華戎各在庭鳳響中夷則天文正玉衡皇基自天保萬物乃由庚握衡平地紀觀象正天樞祺祥鍾赤縣靈瑞炳皇都更受昭華琯還披蘭葉圖金波來白兔若木下蒼烏玉斗調元協金沙富國租青丘還擾圃丹穴更巢梧安樂新城慶長生百福符明明九族序穆穆四門賓隂陵朝北附蟠木引東臣澗途求版築溪源取釣綸多士歸賢戚維城屬茂親貴位連南斗髙榮據北辰迎時乃推䇿司職且班神日月之所照霜露之所均永從文軌一長無外户人鬱盤舒棟宇峥嶸侔大壯拱木詔林衡全模徵梓匠千櫨綺翼浮百栱長虹抗北去邯鄲道南來偃師望龍首載文㮰雲楣承武帳居者非求隘卑宫豈難尚壯麗天下觀是以從蕭相變宫調二首帝遊光出震君明擅在離巖廊惟眷顧欽若尚無為龍穴非難附鸞巢欲可窺具茨應不逺汾陽寧足隨烝民播植重溝洫劬勞多桑林還注雨積石遂開河明徵逢永命平秩值年和更有薫風曲方聞晨露歌移風廣軒厯崇徳盛唐年成文興大雅出豫動鈞天黄鐘六律正閶闔八風宣孤竹調陽管空桑節雅弦舞林鸞更下歌山鳳欲前聞音能辨俗聽曲乃思賢感物觀治亂心恒防未然君子得其道太平何有焉商調曲四首君以宫唱寛大而謨明臣以商應聞義則可行有熊為政訪道于容成殷湯受命委任于阿衡忠其敬事有罪不逃刑誦其箴諫言之無隠情有剛有斷四方可以寧既頌既雅天下乃升平専精一致金石為之開動其兩心妻子恩情乖茍利社稷無有不盡懐昊天降祐元首唯康哉百川俱㑹大海所以深羣材既聚故能成鄧林猛虎在山百獸莫敢侵忠臣處國天下無異心昔我文祖執心且危慮驅剪豺狼經營此天步今我受命又無敢逸豫惟爾弼諧各可知兢懼禮樂既正神人所以和玉帛有序志欲静干戈各分符瑞俱誓裂山河今日相樂對酒且當歌道徳以喻聽撞鐘之聲神姦不若觀鑄鼎之形鄷宫既朝諸侯于是穆岐陽或狩淮夷自此平若涉大川言憑于舟檝如和鼎實有寄于鹽梅君臣一體可以靜氛埃得人則治何世無竒才風力是舉而台階序平重黎既登而天地位成功無與讓銘太常之旌世不失職受騂毛之盟輯瑞班瑞穆穆于堯門惟翰惟屏膴膴于周原功成而治定禮樂斯存復子而明辟姬旦何言角調曲二首止戈見于絶轡之野稱伐聞于丹水之征信義俱存乃先忘食五材並用誰能去兵雖聖人之大寳曰位實天地之大徳曰生涇渭同流清濁異能琴瑟並御雅鄭殊聲擾擾烝人聲教不一茫茫禹迹車軌未并志在四海而尚恭儉心包宇宙而無驕盈言而無文行之不逺義而無立動則無成惻隠其心訓以慈恵流宥其過哀矜典刑匡賛之士或從漁釣雲雨之才乍嘆幽谷尋芳者追深徑之蘭識韻者探一作採窮山之竹克明其徳貢以三事樹之風聲言于九牧協用五紀風若從時農用八政甘作其榖殊風共軌見之周南異畝同穎聞之唐叔祁寒暑雨是無胥怨天覆雲油滋焉滲漉幸無謝上古之淳人庶可以封之于比屋徵調曲六首乾坤以含養覆載日月以貞明照臨達人以四海為務明君以百姓為心水波瀾者源必逺樹扶疎者根必深雲雨所施無不洽廊廟求才多所任淳風布政常無欲至道防人能變俗求仁義急于水火用禮讓多于菽粟屈軼無佞人可指獬豸無繁刑可觸王道蕩蕩用無為天下四人誰不足聖人千年始一生黄河千年始一清攝提以之而從紀玉燭于是而文明東南可以補地缺西北可以正天傾浮黿則東海可厲運鍤則南山可平衆仙就朝于瑶水羣帝受享于明庭懐和則韎任並奉功烈則鐘鼎俱銘三光以記物呈形四時以裁成正位雷風大山岳之響寒暑通隂陽之氣武功則六合攸同文教則二儀經緯有道則咸浴其徳好生則各繁其類白日經天中則移明月横漢滿而虧能虧能缺既無為雖盈雖滿則不危開信義以為苑囿立道徳以為城池周監二代所損益郁郁乎文其可知庖犧之親臨佃漁神農之躬秉耕稼湯則救旱而憂勤禹則正冠而無暇草上之風無不偃君子之甿知可化將欲比徳于三皇未始追蹤于五霸纎纎不絶林薄成涓涓不止江河生事之毫髪無謂輕慮逺防微乃不傾雲官乃垂拱大君鳳厯唯欽明元首類上帝而禋六宗望山川而朝羣后地鏡則山澤俱開河圖則魚龍合負我之天網莫不該閶闔九闗天門開卿相則風雲𤣥感匡賛則星辰下來既興周室之三聖乃舉唐朝之八才莘臣參謀于左相天老教政于中台其宜作則于明哲故無崇信于姦回正陽和氣萬類繁君王道合天地尊黎人耕植于義圃君子翺翔于禮園落其實者思其樹飲其流者懐其源咎繇為謀不仁逺士㑹為政羣盜奔克寛則昆蟲内向彰信則殊俗宅心浮橋有月支抱馬上苑有烏孫學琴赤玉則南海輸賮白環則西山獻琛無勞鑿空于大夏不待蹶角于蹛林羽調曲五首樹君所以牧人立法所以靜亂首惡既其南巢元兇于是北竄居休氣而四塞在光華而兩旦是以雨施作解是以風行唯渙周之文武洪基光宅天下文思千載克聖咸熙七百在我應期實昊天有成命惟四方其訓之運平後親之俗時亂先疎之雄踰桂林而驅象濟弱水而承鴻既浮干吕之氣還吹入律之風錢則都内貫朽倉則常平粟紅火中乃寒乃暑年和一風一雨聽鐘磬念封疆聞笙竽思蓄聚瑶琨篠簜既從怪石鉛松即序長樂善馬成廏水衡黄金為府百川乃宗巨海衆星是仰北辰九州攸同禹跡四海合徳堯臣朝陽栖于鳴鳳靈畤牧于般麟雲玉葉而五色月金波而兩輪涼風迎時北狩小暑戒節南巡山無藏于紫玉地不愛于黄銀雖南征而北怨實西略而東賓既永清于四海終有慶于一人定律零陵玉管調鐘始平銅尺龍門之下孤桐泗水之濱鳴石河靈于是讓珪山精所以奉璧滌九川而賦稅乗三危而納錫北里之禾六穂江淮之茅三脊可以玉檢封禪可以金繩探冊終永保于鴻名足揚光于載籍太上之有立徳其次之謂立言樹善滋于務本除惡窮于塞源冲深其智則厚昭明其道乃尊仁義之財