body:
  text: 漢魏六朝百三家集卷八揚雄集題詞劇秦美新諛文也後世勸進九鍚皆權輿焉元后誄哀思文母盛譽宰衡猶然美新豈有周人申后之思乎豫嘗疑子雲耆老清靜王莽之世身向日景何愛一官自奪玄守班史作傳亦未顯訾其符命之作傳聞真偽尚在龍蛇間或者莽善誑耀頌功德者遍海內莫不高三皇巍五帝子雲美新猶頗醖藉鮮醜孟堅讀而不怪也法言世貴太玄後顯並輔六經而行河東甘泉長楊羽獵四賦絶倫自比諷諫相如不死逐貧賦長於解嘲釋愁送窮文士調脫多原於此十二州二十五官針虞書魯頌之遺也酒針滑稽陳遵見而拊掌寧讓淳于髠説酒哉目録賦太玄賦逐貧賦甘泉賦羽獵賦長楊賦河東賦酒賦上書諫不受單于朝書書答劉歆書答桓談書與桓談書答茂陵郭威書闕設難解嘲解難頌趙充國頌針冀州牧針兖州牧針青州牧針徐州牧針揚州牧針荆州牧針豫州牧針益州牧針雍州牧針幽州牧針并州牧針交州牧針光祿勳針衛尉針太僕針廷尉針大鴻臚針宗正針大司農針少府針執金吾針將作大匠針城門校尉針上林苑令針司空針太常針尚書針博士針酒針針補潤州牧針闕太史令針闕太樂令針闕大官令針闕國三老針闕司針闕符命劇秦美新大有序連珠連珠二首誄元后誄文太玄攡闕難蓋天八事闕騷反離騷序傳自序傳漢魏六朝百三家集卷八目録欽定四庫全書漢魏六朝百三家集卷八明張溥輯揚雄集賦太玄賦觀大易之損益兮覽老氏之倚伏省憂喜之共門兮察吉凶之同域皎皎著乎日月兮何俗聖之暗燭豈愒寵以冒災兮將噬臍之不及若飄風不終朝兮驟雨不終日雷隆隆而輒息兮火猶熾而速滅自夫物有盛衰兮况人事之所極奚貪婪於富貴兮迄喪躬而危族豐盈禍所棲兮名譽怨所集薰以芳而致燒兮膏含肥而見焫翠羽媺而殃身兮蚌含珠而擘裂聖作典以濟時兮驅蒸民而入甲張仁義以為綱兮懷忠貞以矯俗指尊選以誘世兮疾身沒而名滅豈若師由聃兮執玄靜於中谷納傿祿於江淮兮揖松喬於華嶽升崑崙以散髮兮踞弱水以濯足朝發軔於流沙兮夕翺翔乎碣石忽萬里而一頓兮過列仙以託宿役青要與承戈兮舞馮夷以作樂聽素女之清聲兮觀宓妃之妙曲茹芝英以禦餓兮飲玉醴以解渴排閶闔以窺天庭兮騎騂騩以蜘蟵載羡門與儷遊兮永覽周乎八極亂曰甘􅀈含毒難數嘗兮麟而可羈近犬羊兮鸞鳯高翔戾青雲兮不挂網羅固足珍兮斯錯位極罹大戮兮屈子慕清葬魚腹兮伯姬曜名焚厥身兮孤竹二子餓首山兮斷迹屬鏤何足稱兮辟斯數子智若淵兮我異於此執太玄兮蕩然肆志不拘攣兮逐貧賦揚子遁世離俗獨處左鄰崇山右接曠野鄰垣乞兒終貧且窶禮薄義弊相與羣聚惆悵失志呼貧與語汝在六極投棄荒遐好為庸卒刑戮是加匪惟幼稚嬉戲土砂居非近鄰接屋連家恩輕毛羽義薄輕羅進不由德退不受呵久為滯客其意謂何人皆文繡余褐不完人皆稻梁我獨藜飱貧無寶玩何以接歡宗室之燕為樂不槃徒行負賃出處易衣身服百役手足胼胝或耘或耔露體霑肌朋友道絶進官凌遲厥咎安在職汝為之舍汝逺竄崑崙之顛爾復我隨翰飛戾天舍爾登山巖穴隱藏爾復我隨陟彼高岡捨爾入海泛彼柏舟爾復我隨載沈載浮我行爾動我靜爾休豈無他人從我何求今汝去矣勿復久留貧曰唯唯主人見逐多言益嗤心有所懷願得盡辭昔我乃祖宣其明德克佐帝堯誓為典則土階茅茨匪雕匪飾爰及世季縱其昏惑叨餮之羣貪富茍得鄙我先人乃傲乃驕瑶臺瓊榭室屋崇高流酒為池積肉為崤是用鵠逝不踐其朝三省吾身謂豫無愆處君之家福祿如山忘我大德思我小怨堪寒能暑少而習焉寒暑不忒等夀神仙桀跖不顧貪類不干人皆重蔽子獨露居人皆怵惕子獨無虞言辭既罄色厲目張攝齊而興降階下堂誓將去汝適彼首陽孤竹二子與我連行余乃避席辭謝不直請不二過聞義則服長與汝居終無厭極貧遂不去與我遊息甘泉賦孝成帝時客有薦雄文似相如者上方郊祠甘泉泰畤汾隂后土以求繼嗣召雄待詔承明之庭正月從上甘泉還奏甘泉賦以風其辭曰惟漢十世將郊上玄定泰畤擁神休尊明號同符三皇録功五帝恤胤鍚羡拓迹開統於是乃命羣僚歷吉日協靈辰星陳而天行詔招搖與太隂兮伏鈎陳使當兵屬堪輿以壁壘兮梢夔魖而抶獝狂八神奔而警蹕兮振殷轔而軍裝蚩尤之倫帶干將而秉玉戚兮飛蒙茸而走陸梁齊總總撙撙其相膠轕兮猋駭雲迅奮以方攘駢羅列布鱗以雜沓兮柴虒參差魚頡而鳥𦐄翕赫曶霍霧集而蒙合兮半散照爛燦以成章於是乘輿乃登夫鳯凰兮而翳華芝駟蒼螭兮六素虬蠖略蕤綏灕呼慘纚帥爾隂閉霅然陽開騰清霄而軼浮景兮夫何旟旐郅偈之旖旎也流星旄以電爥兮咸翠蓋而鸞旗屯萬騎於中營兮方玉車之千乘聲駍隱以陸離兮輕先疾雷而馺遺風陵高衍之嵱嵷兮超紆譎之清澄登椽欒而羾天門兮馳閶闔而入凌兢是時未臻夫甘泉也乃望通天之繹繹下隂潛以慘懍兮上洪紛而相錯直嶢嶢以造天兮厥高慶而不可乎疆度平原唐其壇漫兮列新夷於林薄攢并閭與茇䒷兮紛被麗其亡鄂崇丘陵之駊騀兮深溝嶔巖而為谷􅉨􅉨離宫般以相爥兮封巒石關施靡乎連屬於是大厦雲譎波詭摧嗺而成觀仰矯首以高視兮目暝眴而無見正瀏濫以𢎞惝兮指東西之漫漫徒徊徊以徨徨兮魂固眇眇而昏亂據軨軒而周流兮忽軮軋而無垠翠玉樹之青蔥兮璧馬犀之璘㻞金人仡仡其承鐘虡兮嵌巗巗其龍鱗揚光曜之燎爥兮垂景炎之炘炘配帝居之懸圃兮象泰一之威神洪臺崛其獨出兮㨖北極之嶟嶟列宿乃施於上榮兮日月才經於柍桭雷鬱律於巗突兮電倐忽於牆藩鬼魅不能自逮兮半長途而下顛歷倒景而絶飛梁兮浮蔑蠓而撇天左欃槍而右玄冥兮前熛闕而後應門蔭西海與幽都兮涌醴汨以生川蛟龍連蜷於東崖兮白虎敦圉乎崑崙覽樛流於高光兮溶方皇於西清前殿崔巍兮和氏瓏玲抗浮柱之飛榱兮神莫莫而扶傾閌閬閬其寥廓兮似紫宫之崢嶸駢交錯而曼衍兮㟎􅟬隗乎其相嬰乘雲閣而上下兮紛蒙籠以混成曳紅采之流離兮揚翠氣之寃延襲璇室與傾宫兮若登高眇逺亡國肅乎臨淵回猋肆其碭駭兮翍桂椒而鬱栘楊香芬茀以穹窿兮擊薄櫨而將榮薌呹肹以掍批兮聲駍隱而歷鐘排玉户而揚金鋪兮發蘭蕙與芎藭帷弸彋其拂汨兮稍暗暗而靚深隂陽清濁穆羽相和兮若夔牙之調琴般倕棄其剞劂兮王爾投其鉤繩雖方征僑與偓佺兮猶倣佛其若夢於是事變物化目駭耳回蓋天子穆然珍臺間館琁題玉英蜵蜎蠖濩之中惟夫所以澄心清魂儲精垂思感動天地逆釐三神者乃搜逑索偶臯伊之徒冠倫魁能函甘棠之惠挾東征之意相與齊乎陽靈之宫靡薜荔而為席兮折瓊枝以為芳吸青雲之流瑕兮飲若木之露英集乎禮神之囿登乎頌祗之堂建光耀之長旓兮昭華覆之威威攀琁璣而下視兮行遊目乎三危陳衆車於東坑兮肆玉釱而下馳漂龍淵而還九垠兮窺地底而上回風傱傱而扶轄兮鸞鳯紛其御蕤梁弱水之濎沸兮躡不周之逶迆想西王母欣然而上夀兮屏玉女而却宓妃玉女亡所眺其清矑兮宓妃曽不得施其蛾眉方攬道德之精剛兮侔神明與之為資於是欽祡宗祈燎薰皇天臯搖泰一舉洪頥樹靈旗樵蒸焜上配藜四施東爥滄海西耀流沙北熿幽都南煬丹崖玄瓉觩䚧秬鬯泔淡肹蠁豐融懿懿芬芬炎感黃龍兮熛訛碩麟選巫咸兮呌帝閽開天庭兮延羣神儐暗藹兮降清壇瑞穰穰兮委如山於是事畢功𢎞回車而歸度三巒兮偈棠梨天閫決兮地垠開八荒協兮萬國諧登長平兮雷鼓磕天聲起兮勇士厲雲飛揚兮雨滂沛于胥德兮麗萬世亂曰崇崇圜丘隆隱天兮登降峛崺單埢垣兮增宫參差駢嵯峨兮嶺巆嶙峋洞無崖兮上天之縡杳旭卉兮聖皇穆穆信厥對兮徠祈郊禋神所依兮徘徊招搖靈屖􅂒兮輝光昡耀降厥福兮子子孫孫長無極兮羽獵賦孝成帝時羽獵雄從以為昔在二帝三王宫館臺榭沼池苑囿林麓藪澤財足以奉宗廟御賔客充庖厨而已不奪百姓膏腴穀土桑柘之地女有餘布男有餘粟國家殷富上下交足故甘露零其庭醴泉流其唐鳯凰巢其樹黃龍遊其沼麒麟臻其囿神爵棲其林昔者禹任益虞而上下和草木茂成湯好田而天下用足文王囿百里民以為尚小齊宣王囿四十里民以為大裕民之與奪民也武帝廣開上林南至宜春鼎湖御宿昆吾旁南山西至長楊五柞北繞黃山濵渭而東周袤數百里穿昆明池象滇河營建章鳯闕神明馺娑漸臺太液象海水周流方丈瀛洲蓬萊遊觀侈靡窮妙極麗雖頗割其三垂以贍齊民然至羽獵田車戎馬器械儲偫禁籞所營尚泰奢麗誇詡非堯舜成湯文武三驅之意也又恐後世復修前好不折中以泉臺故聊因校獵賦以風之其辭曰或稱羲農豈或帝王之彌文哉論者云否各亦並時而得宜奚必同條而共貫則泰山之封烏得七十而有二儀是以創業垂統者俱不見其爽遐邇三五孰知其是非遂作頌曰麗哉神聖處於玄宫富既與地乎侔資貴正與天乎比崇齊桓曾不足使扶轂楚嚴未足以為參乘狹三王之厄僻矯高舉而大興歷五帝之寥廓涉三皇之登閎建道德以為師友仁義與之為朋於是玄冬季月天地隆烈萬物權輿於內殂落於外帝將惟田於靈之囿開北垠受不周之制以終始顓頊玄冥之統乃詔虞人典澤東延昆鄰西馳閶闔儲積共偫戍卒夾道斬叢棘夷野草禦自汧渭經營鄷鎬章皇周流出入日月天與地杳爾乃虎路三嵕以為司馬圍經百里而為殿門外則正南極海邪界虞淵鴻濛沆茫碣以崇山營合圍會然後先置乎白楊之南昆明靈沼之東賁育之倫蒙盾負羽杖鏌鋣而羅者以萬計其餘荷垂天之畢張竟壄之罘靡日月之朱竿曵彗星之飛旗青雲為紛虹霓為繯屬乎崑崙之墟渙若天星之羅浩如濤水之波淫淫與與前後要遮欃槍為闉明月為候熒惑司命天弧發射鮮扁陸離駢衍佖路徽車輕武鴻絧徢獵殷殷軫軫被陵緣坂窮敻極逺者相與列乎高原之上羽騎營營昈分殊事繽紛往來轠轤不絶若光若滅者布乎青林之下於是天子乃以陽朝始出乎玄宫撞鴻鐘建九旒六白虎載靈輿蚩尤並轂蒙公先驅立歷天之旗曵捎星之旃霹靂烈缺吐火施鞭萃傱允溶淋離廓落戲八鎮而開關飛廉雲師吸嚊潚率鱗羅布列攢以龍翰啾啾蹌蹌入西園切神光望平樂徑竹林蹂蕙圃踐蘭唐舉烽烈火轡者施技方馳千駟校騎萬師虓虎之陳從橫膠輵猋泣雷厲驞駢駖磕洶洶旭旭天動地岋羡漫半散蕭條數千里外若夫壯士慷慨殊鄉别趣東西南北騁嗜奔欲扡蒼狶跋犀犛蹶浮麋斫巨狿搏玄猿騰空虗距連卷踔夭蟜娭澗門莫莫紛紛山谷為之風猋林叢為之生塵及至獲夷之徒蹶松柏掌蒺藜獵蒙蘢轔輕飛履般首帶修蛇鈎赤豹牽象犀跇巒坑超唐陂車騎雲會登降暗藹泰華為旒熊耳為綴木仆山還漫若天外儲與乎大浦聊浪乎宇內於是天清日晏逢蒙列眥羿氏控弦皇車幽輵光純天地望舒彌轡翼乎徐至於上蘭移圍徙陳浸淫蹴部曲隊堅重各案行伍壁壘天旋神抶電擊逢之則碎近之則破鳥不及飛獸不得過軍驚師駭刮野掃地及至罕車飛揚武騎聿皇蹈飛豹羂嘄陽追天寶出一方應駍聲擊流光野盡山窮囊括其雌雄沇沇溶溶遙噱乎紘中三軍芒然窮冗閼與亶觀夫剽禽之紲踰犀兕之抵觸熊羆之拏攫虎豹之凌遽徒角槍題注蹙竦讋怖魂亡魄失觸輻關脰妄發期中進退履獲創淫輪夷丘纍陵聚於是禽殫中衰相與集於靖冥之館以臨珍池灌以岐梁溢以江河東瞰目盡西暢亡涯隨珠和氏焯爍其陂玉石嶜崟眩耀青熒漢女水濳怪物暗冥不可殫形玄鸞孔雀翡翠垂榮王雎關關鴻鴈嚶嚶羣嬉乎其中噍噍昆鳴鳬鷖振鷺上下砰磕聲若雷霆乃使文身之伎水格鱗蟲凌堅冰犯嚴淵探巗排崎薄索蛟螭蹈獱獺據黿鼉抾靈蠵入洞穴出蒼梧乘巨鱗騎鯨魚浮彭蠡目有虞方椎夜光之流離剖明月之胎珠鞭洛水之宓妃餉屈原與彭胥於兹乎鴻生巨儒俄軒冕雜衣裳修唐典匡雅頌揖讓於前昭光振耀響忽如神仁聲惠於北狄武誼動於南鄰是以旃裘之王胡貉之長移珍來享抗手稱臣前入圍口後陳盧山羣公常伯楊朱墨翟之徒喟然並稱曰崇哉乎德雖有唐虞大夏成周之隆何以侈兹夫古之覲東嶽禪梁基舍此世也其誰與哉上猶謙讓而未俞也方將上獵三靈之流下決醴泉之滋發黃龍之穴窺鳯凰之巢臨麒麟之囿幸神雀之林奢雲夢侈孟諸非章華是靈臺罕徂離宫而輟觀遊土事不飾木功不雕丞民乎農桑勸之以弗怠儕男女使莫違恐貧窮者不遍被洋溢之饒開禁苑散公儲創道德之囿𢎞仁惠之虞馳弋乎神明之囿覽觀乎羣臣之有亡放雉兔收罝罘麋鹿芻蕘與百姓共之蓋所以臻兹也於是醇洪鬯之德豐茂世之規加勞三皇朂勤五帝不亦至乎乃祗莊雍穆之徒立君臣之節崇賢聖之業未遑苑囿之麗遊獵之靡也因回軫還衡背阿房反未央長楊賦明年上將大誇胡人以多禽獸秋命右扶風發民入南山卥自褒斜東至𢎞農南驅漢中張羅網罝罘捕熊羆豪豬虎豹狖玃狐兔麋鹿載以檻車輸長楊射熊館以網為周阹縱禽獸其中令胡人手摶之自取其獲上親臨觀焉是時農民不得收斂雄從至射熊館還上長楊賦聊因筆墨之成文章故藉翰林以為主八子墨為客卿以諷其辭曰子墨客卿問於翰林主人曰蓋聞聖主之養民也仁霑而恩洽動不為身今年獵長楊先命右扶風左太華而右褒斜椓嶻嶭而為弋紆南山以為罝羅千乘於林莽列萬騎於山隅帥軍踤阹鍚戎獲胡扼熊羆拖豪豬木擁槍纍以為儲胥此天下之窮覽極觀也雖然亦頗擾于農民三旬有餘其勤至矣而功不圖恐不識者外之則以為娛樂之遊內之則不以為乾豆之事豈為民乎哉且人君以玄默為神淡泊為德今樂逺出以露威靈數搖動以疲車甲本非人主之急務蒙竊惑焉翰林主人曰吁客何謂兹耶若客所謂知其一未覩其二見其外不識其內也僕嘗倦談不能一二其詳請略舉其凡而客自覽其切焉客曰唯唯主人曰昔有強秦封豕其士窫窳其民鑿齒之徒相與磨牙而爭之豪俊麋沸雲擾羣黎為之不康於是上帝眷顧高祖高祖奉命順斗極運天關橫巨海漂崑崙提劍而叱之所過麾城摲邑下將降旗一日之戰不可殫記當此之勤頭蓬不暇梳飢不及餐鞮鍪生蟣蝨介胄被霑汗以為萬姓請命乎皇天乃展民之所屈振民之所乏規億載恢帝業七年之間而天下密如也逮至聖文隨風乘流方垂意於至寧躬服節儉綈衣不弊革鞜不穿大厦不居木器無文於是後宫賤玳瑁而疏珠璣却翡翠之飾除雕琢之巧惡麗靡而不近斥芬芳而不御抑止絲竹宴衎之樂憎聞鄭衛幻眇之聲是以玉衡正而太階平也其後熏鬻作虐東夷橫叛羌戎睚眥閩越相亂遐氓為之不安中國蒙被其難於是聖武勃怒爰整其旅乃命驃衛紛紜沸渭雲合電發猋騰波流機駭蜂軼疾如奔星擊如雷霆碎轒輼破穹廬腦沙漠髓余吾遂躐乎王庭驅槖駝燒熐蠡分𠢐單于磔裂屬國夷坑谷拔鹵莽刋山石蹂尸輿厮係纍老弱吮鋋瘢耆金鏃淫夷者數十萬人皆稽顙樹頷扶服蛾伏二十餘年矣尚不敢惕息夫天兵四臨幽都先加回戈邪指南越相夷靡節卥征羌𤏡東馳是以遐方疏俗殊鄰絶黨之域自上仁所不化茂德所不綏莫不蹻足抗首請獻厥珍使海內淡然永無邊城之災金革之患今朝廷純仁遵道顯義并包書林聖風雲靡英華沈浮洋溢八區普天所覆莫不沾濡士有不談王道者則樵夫笑之意者以為事罔隆而不殺物靡盛而不虧故平不肆險安不忘危乃時以有年出兵整輿竦戎振師五莋習馬長楊簡力狡獸校武票禽乃萃然登南山瞰烏弋卥壓月窟東震日域又恐後代迷於一時之事常以此為國家之大務淫荒畋獵陵夷而不禦也是以車不安軔日未靡旃從者倣佛骩屬而還亦所以奉太宗之烈遵文武之度復三王之田反五帝之虞使農不輟耰工不下機婚姻以時男女莫違出愷悌行簡易矜劬勞休力役見百年存孤弱帥與之同苦樂然後陳鐘鼓之樂鳴鞀磬之和建碣磍之虡拮隔鳴球掉八􅍌之舞酌允鑠肴樂胥聼廟中之雍雍受神人之福祜歌投頌吹合雅其勤若此故真神之所勞也方將俟元符以禪梁甫之基增泰山之高延光於將來比榮乎往號豈徒欲淫覽浮觀馳騁粳稻之地周流梨栗之林蹂踐芻蕘誇詡衆庶盛狖玃之收多麋鹿之獲哉且盲者不見咫尺而離婁燭千里之隅客徒愛胡人之獲我禽獸曾不知我亦已獲其王侯言未卒墨客降席再拜稽首曰大哉體乎允非小人之所能及也乃今日發矇廓然已昭矣河東賦伊年暮春將瘞后土禮靈祗謁汾隂於東郊因兹以勒崇垂鴻發祥隤祉欽若神明者盛哉鑠乎越不可載已於是命羣臣齊法服整靈輿乃撫翠鳯之駕六先景之乘掉奔星之流旃彏天狼之威弧張耀日之玄旄揚左纛被雲梢奮電鞭驂雷輜鳴洪鐘建五旗羲和司日顔倫奉輿風發飈拂神騰鬼趡千乘霆亂萬騎屈橋嘻嘻旭旭天地稠嶅簸丘跳巒涌渭躍涇秦神下讋跖魂負沴河靈矍踢爪華蹈襄遂臻隂宫穆穆肅肅蹲蹲如也靈祗既鄉五位時敘絪緼玄黃將紹厥後於是靈輿安步周流容與以覽呼介山嗟文公而愍推兮勤大禹於龍門灑沈災於豁瀆兮播九河於東瀕登厯觀而遙望兮聊遊浮以經營樂往昔之遺風兮喜虞氏之所耕瞰帝唐之嵩高兮眽隆周之大寧汨低回而不能去兮行睨陔下與彭城濊南巢之坎坷兮易豳岐之夷平乘翠龍而超河兮陟卥嶽之嶢崝雲霏霏而來迎兮澤滲灕而下降鬱蕭條其幽藹兮滃泛沛以豐隆叱風伯於南北兮呵雨師於卥東參天地而獨立兮廓蕩蕩其亡雙遵逝乎歸來以函夏之大漢兮彼何足與比功建乾坤之貞兆兮將悉總之以羣龍麗鉤芒與驂蓐收兮服玄冥及祝融敦衆神使式道兮奮六經以攄頌隃於穆之緝熙兮過清廟之雍雍軼五帝之遐迹兮躡三皇之高蹤既發軔於平盈兮誰謂路逺而不能從酒賦子猶瓶矣觀瓶之居居井之湄處高臨深動常近危酒醪不入藏水滿褱不得左右牽於纆徽自用如此不如鴟夷鴟夷滑稽腹大如壺盡日盛酒人復藉酤常為國器託於屬車出入兩宫經營公家由是言之酒何過乎上書諫不受單于朝書臣聞六經之治貴於未亂兵家之勝貴於未戰二者皆微然而大事之本不可不察也今單于上書求朝國家不許而辭之臣愚以為漢與胸奴從此隙矣夫北地之狄五帝所不能臣三王所不能制其不可使隙甚明臣不敢逺稱請引秦以來明之以秦始皇之強蒙恬之威帶甲四十餘萬然不敢窺西河乃築長城以界之會漢初興以高祖之威靈三十萬衆困於平城士或七日不食時竒譎之士石畫之臣甚衆卒其所以脫者世莫得而言也又高皇后嘗忿胸奴羣臣庭議樊噲請以十萬衆橫行胸奴中季布曰噲可斬也妄阿順旨於是大臣權書遺之然後胸奴之結解中國之憂平及孝文時胸奴侵暴北邊候騎至雍甘泉京師大駭發三將軍屯細柳棘門霸上以備之數月乃罷孝武即位設馬邑之權欲誘胸奴使韓安國將三十萬衆徼於便墬胸奴覺之而去徒費財勞師一虜不可得見况單于之面乎其後深惟社稷之計規恢萬載之策乃大興師數十萬使衛青霍去病操兵前後十餘年於是浮西河絶大幕破填顔襲王庭窮極其地追奔逐北封狼居胥山禪於姑衍以臨瀚海虜名王貴人以百數自是之後胸奴震怖益求和親然而未肯稱臣也且夫前世豈樂傾無量之費役無罪之人快心於狼望之北哉以為不一勞者不久佚不暫廢者不永寧是以忍百萬之師以推餓虎之喙運府庫之財填廬山之壑而不悔也至本始之初胸奴有桀心欲掠烏孫侵公主乃發五將之師十五萬騎獵其南而長羅矦以烏孫五萬騎震其西皆至質而還時鮮有所獲徒奮揚威武明漢兵若風雷耳雖空行空反尚誅兩將軍故北狄不服中國未得高枕安寢也逮至元康神爵之間大化神明鴻恩溥洽而胸奴內亂五單于爭立日逐呼韓邪攜國歸死扶伏稱臣然尚羈縻之計不顓制自此之後欲朝者不距不欲者不強何者外國天性忿鷙形容魁健負力怙氣難化以善易𨽻以惡其強難詘其和難得故未服之時勞師逺攻傾國殫貨伏尸流血破堅拔敵如彼之難也既服之後慰薦撫循交接賂遺威儀俯仰如此之備也往時嘗屠大宛之城蹈烏桓之壘探姑繒之壁籍蕩姐之場艾朝鮮之旃拔兩越之旗近不過旬月之役逺不離二時之勞固己犂其庭掃其閭郡縣而置之雲徹席卷後無餘災惟北狄為不然真中國之堅敵也三垂比之懸矣前世重之兹甚未易可輕也今單于歸義懷欵誠之心欲離其庭陳見於前此乃上世之遺策神靈之所想望國家雖費不得已者也奈何距以來厭之辭疏以無日之期消往昔之恩開將來之隙夫欵而隙之使有恨心負前言緣往辭歸怨於漢因以自絶終無北面之心威之不可諭之不能焉得不為大憂乎夫明者視於無形聰者聽於無聲誠先於未然即蒙恬樊噲不復施棘門細柳不復備馬邑之䇿安所設衛霍之功何得用五將之威安所震不然一有隙之後雖智者勞心於內辨者轂擊於外猶不若未然之時也且往者圖西域制車師置城郭都護三十六國費嵗以大萬計者豈為康居烏孫能踰白龍堆而寇西邊哉乃以制胸奴也夫百年勞之一日失之費十而愛一臣竊為國不安也惟陛下留意於未亂未戰以遏邊萌之禍書答劉歆書雄叩頭賜命謹至又告以田儀事事窮竟白案顯出甚厚甚厚田儀與雄同鄉里幼稚為鄰長艾相愛視覬動精采似不為非者故舉至之雄之任也不意淫迹暴于官朝今舉者懷赧而低眉任者含聲而寃舌知人之德堯猶病諸雄何慙焉叩頭叩頭又敕以殊言十五卷君何由知之謹歸誠底裏不敢違信雄少不師章句亦于五經之訓所不解嘗聞先代輶軒之使奏籍之書皆藏於周秦之室及其破也遺棄無見之者獨蜀人有嚴君平臨卭林閭翁孺者深好訓詁猶見輶軒之使所奉言翁孺與雄外家牽連之親又君平過誤有以私遇少而與雄也君平財有千言耳翁孺梗概之法略有翁孺往數嵗死歸蜀郡掌氏子無子而去而雄始能草文先作縣邸銘王佴頌階闥銘及成都城四隅銘蜀人有楊莊者為郎誦之于成帝成帝好之以為似相如雄遂以此得外見此數者皆都水君常見也故不復奏雄為郎之嵗自奏少不得學而心好沈博絶麗之文願不受三嵗之奉且休脫直事之繇得肆心廣意以自克就有詔可不奪奉令尚書賜筆墨錢六萬得觀書于石渠如是後一嵗作繡補靈節龍骨之銘詩三章成帝好之遂得盡意故天下上計孝廉及內郡衛率會者雄常把三寸弱翰齎油素四尺以問其異語歸即以鉛摘次之于槧二十七嵗于今矣而語言或交錯相反覆方論思詳悉集之燕其疑張伯松不好雄賦頌之文然亦有以竒之常為雄道言其父及其先君喜典訓屬雄以此篇目頻示之伯松曰是縣諸日月不刋之書也又言恐雄為太玄經由鼠坻之與牛場也如其用則實五稼飽邦民否則為抵糞棄之于道矣而雄服之伯松與雄獨何德慧而君與雄獨何譖隟而當匿乎哉其不勞戎馬高車令人君坐帷幕之中知絶遐異俗之語典流于昆嗣言列于漢籍誠雄心所絶極至情之所想遘也扶聖朝逺照之明使君求此契君之意誠雄散之之會也死之日則今之榮也不敢有二不敢有愛少而不以行立于鄉里長而不以功顯于縣官著訓于帝籍但言詞博覽翰墨為事誠欲崇而就之不可以遺不可以怠即君必欲脅之以威陵之以武欲令入之于此此又未定未可以見今君又終之則縊死以從命也而可且寬假延期必不敢有愛雄之所為得使君輔貢于明朝則雄無恨何敢有匿惟執事圖之長監于規繡之就死以為小雄敢行之謹因還使叩頭叩頭答桓談書長卿賦不似從人間來其神化所至耶大諦能讀千賦則能為之諺云伏習衆神巧者不過習者之門與桓談書望風景附聲訓自結設難解嘲客嘲揚子曰吾聞上世之士人綱人紀不生則已生則上尊人君下榮父母析人之圭儋人之爵懷人之符分人之祿紆青拖紫朱丹其轂今子幸得遭明盛之世處不諱之朝與羣賢同行歷金門上玉堂有日矣曾不能畫一竒出一䇿上説人主下談公卿目如耀星舌如電光一從一衡論者莫當顧默而作太玄五千文枝葉扶疏獨説十餘萬言深者入黃泉高者出蒼天大者含元氣纎者入無倫然而位不過侍郎擢才給事黃門意者玄得母尚白乎何為官之拓落也揚子笑而應之曰客徒欲朱丹吾轂不知一跌將赤吾之族也往者周網解結羣鹿爭逸離為十二合為六七四分五剖並為戰國士無常君國亡定臣得士者富失士者貧矯翼厲翮恣意所存故士或自盛以橐或鑿壞以遁是故鄒衍以頡亢而取世資孟軻雖連蹇猶為萬乘師今大漢左東海右渠搜前畨禺後陶塗東南一尉西北一候徽以糾墨製以鑕鈇散以禮樂風以詩書曠以嵗月結以倚廬天下之士雷動雲合魚鱗雜襲咸營于八區家家自以為稷契人人自以為咎繇戴縰垂纓而談者皆擬於阿衡五尺童子羞比晏嬰與夷吾當塗者入青雲失路者委溝渠旦握權則為卿相夕失勢則為匹夫譬若江湖之雀渤澥之鳥乘鴈集不為之多雙鳬飛不為之少昔三仁去而殷墟二老歸而周熾子胥死而吳亡種蠡存而粵伯五羖入而秦喜樂毅出而燕懼范雎以折摺而危穰矦蔡澤雖噤吟而笑唐舉故當其有事也非蕭曹子房平勃樊霍則不能安當其亡事也章句之徒相與坐而守之亦亡所患故世亂則聖哲馳鶩而不足世治則庸夫高枕而有餘夫上世之士或解縳而相或釋褐而傅或倚夷門而笑或橫江潭而漁或七十説而不遇或立談間而封侯或枉千乘於陋巷或擁帚篲而先驅是以士頗得信其舌而奮其筆窒隙蹈瑕而無所詘也當今縣令不請士郡守不迎師羣卿不揖客將相不俯眉言奇者見疑行殊者得辟是以欲談者卷舌而固聲欲行者擬足而投迹嚮使上世之士處呼今世策非甲科行非孝廉舉非方正獨可抗疏時道是非高得待詔下觸聞罷又安得青紫且吾聞之炎炎者滅隆隆者絶觀雷觀火為盈為實天收其聲地藏其熱高明之家鬼瞰其室攫拿者亡默默者存位極者宗危自守者身全是故知玄知默守道之極爰清爰靜遊神之廷惟寂惟寞守德之宅世異事變人道不殊彼我易時未知何如今子乃以鴟梟而笑鳯凰執蝘蜓而嘲龜龍不亦病乎子徒笑我玄之尚白吾亦笑子之病甚不遭臾跗與扁鵲也悲夫客曰然則靡玄無所成名乎范蔡以下何必玄哉揚子曰范雎魏之亡命也折脅拉髂免於徽索翕肩蹈背扶服入橐激卬萬乘之主界涇陽抵穰侯而代之當也蔡澤山東之匹夫也頷頥折頞涕唾流沫西揖強秦之相扼其咽而亢其氣拊其背而奪其位時也天下已定金革已平都於雒陽婁敬委輅脫挽掉三寸之舌建不拔之䇿舉中國徙之長安適也五帝垂典三王傳禮百世不易叔孫通起於枹鼓之間解甲投戈遂作君臣之儀得也甫刑靡敝秦法酷烈聖漢權制而蕭何造律宜也故有造蕭何律於唐虞之世則悖矣有作叔孫通儀於夏殷之時則惑矣有建婁敬之䇿於成周之世則繆矣有談范蔡之説於金張許史之間則狂矣夫蕭規曹隨留侯畫䇿陳平出奇功若泰山響若阺隤唯其人之贍知哉亦會其時之可為也故為可為於可為之時則從為不可為於不可為之時則凶夫藺先生收功於章臺四皓采榮於南山公孫創業於金馬驃騎發迹於祁連司馬長卿竊訾於卓氏東方朔割炙於細君僕誠不能與此數子者並故默然獨守吾太玄解難客難揚子曰凡著書者為衆人之所好也美味期乎合口工聲調於比耳今吾子乃抗辭幽説閎意眇指獨馳騁於有亡之際而陶冶大爐旁薄羣生歷覽者兹年矣而殊不寤亶費精神於此而煩學者於彼譬畫者畫於無形弦者放於無聲殆不可乎揚子曰俞若夫閎言崇議幽微之塗蓋難與覽者同也昔人有觀象於天視度於地察法於人者天麗且彌地普而深昔人之辭乃玉乃金彼豈好為艱難哉藝不得已也獨不見夫翠虯絳螭之將登呼天必聳身於蒼梧之淵不階浮雲翼疾風虛舉而上升則不能撠膠葛騰九閎日月之經不千里則不能燭六合耀八紘泰山之高不嶕嶢則不能浡滃雲而散歊蒸是以宓犧氏之作易也綿絡天地經以八卦文王附六爻孔子錯其象而彖其辭然後發天地之藏定萬物之基典謨之篇雅頌之聲不溫純深潤則不足以揚鴻烈而章緝熙蓋胥靡為宰寂寞為尸大味必淡大音必希大語呌呌大道低回是以聲之眇者不可同於衆人之耳形之美者不可混於世俗之目辭之衍者不可齊於庸人之聽今夫絃者高張急徽追趨逐耆則坐者不期而附矣試為之施咸池榆六莖發簫韶詠九成則莫有和也是故鍾期死伯牙絶絃破琴而不肻與衆鼓獶人亡則匠石輟斤而不敢妄斫師曠之調鐘俟知音者之在後也孔子作春秋幾君子之前暏也老聃有遺言貴知我者希此非其操與頌趙充國頌成帝時西羌有警上思將帥之臣追美充國乃召黃門郎揚雄即充國圖畫而頌之明靈惟宣戎有先零先零猖狂侵漢西疆漢命虎臣惟後將軍整我六師是討是震既臨其域喻以威德有守矝功謂之弗克請奮其旅于罕之羌天子命我從之鮮陽營平守節屢奏封章料敵制勝威謀靡亢遂克西戎還師于京鬼方賔服罔有不庭昔周之宣有方有虎詩人歌功乃列于雅在漢中興充國作武赳赳桓桓亦紹厥後針冀州牧針洋洋冀州鴻原大陸嶽陽是都島夷皮服潺湲河流夾以碣石三后攸降列為侯伯降周之末趙魏是宅冀土糜沸炫沄如湯更盛更衰載從載橫陪臣擅命天王是替趙魏相反秦拾其弊北築長城恢夏之場漢興定制改封藩王仰覽前世厥力孔多初安如山後崩如崖故治不忘亂安不遺危周室自怙云焉有豫隳六國奮矯果絶其維牧臣司冀敢告在階兖州牧針悠悠濟河兖州之宇九河既導雷夏攸處草繇木條漆絲絺紵濟漯既通降丘宅土成湯五徙卒都于亳盤庚北渡牧野是宅丁感雊雉祖已伊忠爰正厥事遂緒高宗厥後陵遲顚覆湯緒西伯戡黎祖伊奔走致天威命不恐不震婦言是用牝雞是晨三仁既知武果戎殷牧野之禽豈復能耽甲子之朝豈能復笑有國雖久必畏天咎有民雖長必懼人殃箕子歔欷厥居為墟牧臣司兖敢告執書青州牧針茫茫青州海岱是極鹽鐵之地鉛松怪石羣水攸歸萊夷作牧貢篚以時莫怠莫違昔在文武封吕於齊厥土塗泥在丘之營五侯九伯是討是征馬殆其銜御失其度周室荒亂小白以霸諸侯僉服復尊京師小白既沒周卒凌遲嗟兹天王附命下土失其法度喪其文武牧臣司青敢告執矩徐州牧針海岱伊淮東海是渚徐州之土邑子蕃宇大野既瀦有羽有蒙孤桐蠙珠泗沂攸同實列蕃蔽侯衛東方民好農蠶大野以康帝癸及辛不祗不恪沈湎于酒而忘其東作天命湯武勦絶其緒祚降周任薑鎮于琅琊薑姓絶苗田氏攸都事由細微不慮不圖禍如丘山本在萌牙牧臣司徐敢告僕夫揚州牧針矯矯揚州江漢之滸彭蠡既瀦陽鳥攸處橘柚羽貝瑶琨篠簜閩越北垠沅湘攸往獷矣淮夷蠢蠢荆蠻翩彼昭王南征不旋人咸躓於垤莫躓於山咸跌於汚莫跌於川明哲不云我昭童蒙不云我昏湯武聖而師伊吕桀紂悖而誅逢干蓋邇不可不察逺不可不親靡有孝而逆父罔有義而忘君太伯遜位基吳紹類夫差一誤太伯無祚周室不匡勾踐入霸當周之隆越裳重譯春秋之末侯甸叛逆元首不可不思股肱不可不孳堯崇屢省舜盛欽謀牧臣司揚敢告執籌荆州牧針沓沓巫山在荆之陽江漢朝宗其流湯湯夏君遭鴻荆衡是調雲夢塗泥包匭菁茅金石砥礪象齒元龜貢篚百物世世以饒戰戰栗栗至桀荒溢曰我在帝位若天有日不順庶國孰敢余奪亦有成湯果秉其鉞放之南巢號之以桀南巢茫茫包楚與荆風栗以悍氣鋭以剛有道後服無道先強世雖安平無敢逸豫牧臣司荆敢告執御豫州牧針郁郁荆河伊雒是經榮播枲漆惟用攸成田田相拏廬廬相距夏殷不都成周攸處豫野所居爰在鶉墟四隩咸宅宇內莫如陪臣執命不慮不圖王室陵遲喪其爪牙靡哲靡聖捐失其正方伯不維韓卒擅命文武孔純至厲作昏成康孔寧至幽作傾故有天下者母曰我大莫或余敗母曰我強靡克余亡夏宅九州至於季世放于南巢成康太平降及周微帶蔽屏營屏營不起施于孫子至赧為極實絶周祀牧臣司豫敢告柱史益州牧針巖巖岷山古曰梁州華陽西極黑水南流茫茫洪波鯀堙降陸于時八都厥民不隩禹導江沱岷嶓啓乾逺近底貢磬錯砮丹絲麻條暢有粳有稻自京徂畛民攸溫飽帝有桀紂湎沈頗僻遏絶苗民滅夏殷績爰周受命復古之常幽厲夷業破絶為荒秦作無道三方潰叛義兵征暴遂國于漢拓開疆宇恢梁之野列為十二光羡虞夏牧臣司梁是職是圖經營盛衰敢告士夫雍州牧針黑水西河橫截崑崙邪指閶闔畫為雍垠上侵積石下礙龍門自彼氐羌莫敢不來庭莫敢不來匡每在季主常失厥緒侯紀不貢荒侵其宇陵遲衰微秦據以戾興兵山東六國顚沛上帝不寧命漢作京隴山以徂列為西荒南排徑越北啓強胡并連屬國一護攸都蓋安不忘危盛不諱衰牧臣司雍敢告贅衣幽州牧針蕩蕩平川惟冀之别北厄幽都戎夏交逼伊昔唐虞實為平陸周末荐臻追于獯鬻晉溺其陪周使不阻六國擅權燕趙本都東限穢貊羡及東胡強秦北排蒙公城疆大漢初定介狄之荒元戎屨征如風之騰義兵涉漠偃我邊萌既定且康復古虞唐盛不可不圖衰不可或忘隄潰蟻穴器漏針芒牧臣司幽敢告侍傍并州牧針雍别朔方河水悠悠北辟獯鬻南界涇流畫兹朔土正直幽方自昔何為莫敢不來貢莫敢不來王周穆遐征犬戎不享爰貊伊德侵玩上國宣王命將攘之涇北宗周罔職日用爽蹉既不俎豆又不干戈犬戎作亂斃于驪阿太上曜德其次曜兵德兵俱顚靡不悴荒牧臣司并敢告執綱交州牧針交州荒裔水與天際越裳是南荒國之外爰是開闢不羈不絆周公攝祚白雉是獻昭王陵遲周室是亂越裳絶貢荆楚逆叛四國內侵蠶食周宗臻于季赧遂入滅亡大漢受命中國兼該南海之宇聖武是恢稍稍受羈遂臻黃支杭海三萬來牽其犀盛不可不憂隆不可不懼顧瞻陵遲而忘其規摹亡國多逸豫而存國多難泉竭中虛池竭􅀈乾牧臣司交敢告執憲光祿勳針經兆宫室畫為中外廊殿門闥限以禁界國有周衛民有藩籬各有攸保守以不岐昔在夏殷桀紂淫湎持牛之飲門户荒亂郎雖執戟謁者參差殿中成市或鼓或鞞忘其廊廟而聚夫逋逃四方多罪載號載呶內不可不省外不可不清德人立朝議士充庭祿臣司光敢告執經衛尉針茫茫上天崇高其居設置山險畫為防禦重垠纍垓以難不律闕為城衛以待暴卒國有以固民有以內各保其守永修不敗維昔庶僚官得其人荷戈而歌中外以堅齊桓怵惕宿衛不飭門非其人户廢其職曹子標劔遂成其詐軻挾匕首而衛人不寤二世妄宿敗於望夷閻樂矯搜戟者不誰尉臣司衛敢告執維太僕針肅肅太僕車馬是供鏘鏘和鸞駕彼時龍昔在上帝巡狩四宅王用三驅前禽是射紂作不令武王征殷檀車孔夏四騵孔昕僕夫執鞗載騂載駰我輿云安我馬惟間雖馳雖驅匪逸匪愆昔有淫羿馳騁忘歸景公千駟而淫于齊詩好牡馬牧於坰野輦車就牧而詩人興魯廄焚問人仲尼厚醜孟子蓋惡夫廄多肥馬而野有餓殕僕臣司駕敢告執皂廷尉針天降五刑惟夏之績亂兹平民不回不辟昔在蚩尤爰作淫刑延于苗民夏氏不寧穆王耄荒甫侯伊謀五刑訓天周以阜基厥後陵遲上帝不觚周輕其制秦繁其辜五刑紛紛靡遏靡止寇賊滿山刑者半道昔唐虞象刑天民是全紂作炮烙墜民于淵故有國者無云何謂是刖是劓無云何害是剝是剖惟虐惟殺人莫豫奈殷以刑顚秦以酷敗獄臣司理敢告執謁大鴻臚針蕩蕩唐虞經通垓極陶陶百王天工人力畫為上下羅條百職人有材能寮有級差遷能授官各有攸宜主以不廢官以不隳昔在三代二季不蠲穢德慢道署非其人人失其材職反其官宷寮荒耄國政如漫文不可武武不可文大小上下不可奪倫鴻臣司爵敢告在鄰宗正針巍巍帝堯欽親九族經哲宗伯禮有攸訓屬有攸籍各有育子世以不錯昔在夏時太康不恭有仍二女五子家降晉獻悖統宋宣亂序齊桓不胤而忘其宗緒周譏戎女魯喜子同高作秦崇而扶蘇被凶宗廟荒墟魂靈靡附伯臣司宗敢告執主大司農針時惟大農爰司金榖自京徂荒粒民是斛肇自厥初實施惟食厥僚后稷有無遷易實均實贏惟都作程旁求衣食厥民攸生上稽二帝下閲三王什一而征為民作常逺近貢篚百姓不忘帝王之盛咸在農殖季周爛漫而東作不勑膏腴不獲庶物並荒府藏單虛靡積靡倉陵遲衰微姬卒以癢秦收太半二世不瘳泣血之末海內無聊農民司均敢告執繇少府針實實少府奉養是供紀經九品臣子攸同海內幣帑祁祁如雲家有孝子官有忠臣共僚率舊聖則越遵民以不擾國以不煩昔在帝季癸辛之世酒池糟隄而象箸以噬至於耽樂流湎而妲妹作祟共寮不御不恢夏殷喪其國康而卒以陵遲嗜不可不察欲不可不圖未嘗失之於約嘗失之於奢府臣司共敢告執觚執金吾針溫溫唐虞重襲純孰經表九德張設武官以御寢賊如虎有牙如鷹有爪國以自固獸以自保牙爪葸葸動作宜時用之不理實反生災秦政暴戾播其威虐亡其仁義而思其殘酷猛不可重任威不可獨行堯咨虞舜惟思是尚吾臣司金敢告執璜將作大匠針侃侃將作經構宫室墻以禦風宇以蔽日寒暑攸除鳥鼠攸去王有宫殿民有宅居昔在帝世茅茨土階夏卑宫觀在彼溝洫桀作瑶臺紂為琁室人力不堪而帝業不卒詩詠宣王由儉改奢觀豐上六大屋小家春秋譏刺書彼泉臺兩觀雉門而魯以不恢或作長府而閔子不仁秦築驪阿嬴姓以顚故人君無云我貴榱題是遂母云我富淫作極遊在彼墻屋而忘其國戮作臣司匠敢告執猷城門校尉針幽幽山川徑塞九路磐石唐芒襲險重固國有城溝家有柝匱各有攸堅民以不虞德懷其內險難其外王公設險而承以盤蓋昔在上世有殷有夏癸辛不德而設夫險阻湯武爰征而莫遏莫禦作君之危不可德少而城溝伊保不可德希而城溝是依唐虞長德而四海永懷秦恢長城而天下畔乖尉臣司城敢告侍階上林苑令針茫茫大田芃芃作榖山有陘陸野有林麓夷原汚藪禽獸攸伏魚鱉以時芻蕘咸殖國以殷富民以家給昔在帝羿共田徑遊弧矢是尚而射夫封豬不顧於愆卒遇後憂是以田獲三驅不可過差麀鹿攸伏不如德至衡臣司虞敢告執指司空針普彼坤靈侔天作則分制五服劃為萬國乃立地官空惟是職茫茫九州都鄙盈區綱以羣牧綴以方侯烈烈雋乂翼翼王臣臣當其官官宜其人九一之政七賦以均昔在季葉班祿遺賢掊克充朝而象恭滔天匪人斯力匪政斯勑流貨市寵而苞苴是鬻王路斯浮孰不傾覆空臣司土敢告在側太常針翼翼太常實為宗伯穆穆靈祗寢廟奕奕稱秩元祀班于羣神我祀既祗我粢孔蠲匪愆匪忒公尸攸宜弗祈弗求惟德之報不矯不誣庶無罪悔昔在成湯葛為不弔棄禮慢祖夔子不祀楚師是虜魯人躋僖臧文不悟文隳太室桓納郜賂災降二宫用誥不祧故聖人在位無曰我貴慢行繁祭無曰我材輕身恃巫東鄰之犧牛不如西鄰麥魚秦殞望夷隱斃鍾巫常臣司宗敢告執書尚書針皇皇聖哲允勑百工命作齋栗龍為納言是機是密出入朕命王之喉舌獻善宣美而讒説是折我視云明我聽云聰載夙載夜惟允惟恭故君子在室出言如風動於民人渙其大號而萬國平信春秋譏漏言易稱不密則失臣兊吉其和巽吝其頻書稱其明申申厥鄰昔秦尚權詐官非其人符璽竊發而扶蘇隕身一姦愆命七廟為墟威福同門牀上維辜書臣司命敢告侍隅博士針洋洋三代典禮是修畫為辟雍國有學校侯有泮宫各有攸教德用不陵昔在文王經啓其軌朂于德音而思皇多士多士作楨惟周以寧國人興讓虞芮質成公劉挹行潦而濁亂斯清官操其業士執其經昔聖人之綏俗莫美於施化故孔子觀夫大學而知為王之易易大舜南面無為而袵席平還師階級之間三苗以懷秦作無道斬決天紀漫彼王迹而坑夫術士詩書是泯家言是守爼豆不陳而顚其社稷故仲尼不對問陳而胡簋是遵原伯非學而閔子知周之不振儒臣司典敢告在賔酒針子猶瓶矣觀瓶之居居井之湄處高臨深動常近危酒醪不入口藏水滿懷不得左右牽於纆徽一旦礙為瓽所轠身提黃泉骨肉為泥自用如此不如鴟夷鴟夷滑稽腹大如壺盡日盛酒人復借酤常為國器託於屬車出入兩宫經營公家繇是言之酒何過乎符命劇秦美新文有序諸吏中散大夫臣雄稽首再拜上封事皇帝陛下臣雄經術淺薄行能無異數蒙渥恩拔擢倫比與羣賢並愧無以稱職臣伏惟陛下以至聖之德龍興登庸欽明尚古作民父母為天下主執粹清之道鏡照四海聽聆風俗博覽廣包參天貮地兼並神明配五帝冠三王開闢以來未之聞也臣誠樂昭著新德光之罔極往時司馬相如作封禪一篇以彰漢氏之休臣常有顛眴病恐一旦先犬馬填溝壑所懷不章長恨黃泉敢竭肝膽寫腹心作劇秦美新一篇雖未究萬分之一亦臣之極思也臣雄再拜稽首以聞曰權輿天地未袪睢睢盱盱或玄而萌或黃而牙玄黃剖判上下相嘔爰初生民帝王始存在乎混混茫茫之間舋聞罕漫而不昭察世莫得而云也厥有云者上罔顯於羲皇中莫盛於唐虞邇靡著於成周仲尼不遭用春秋因斯發言神明所祚兆民所託罔不云道德仁義禮智獨秦崛起西戎邠荒岐雍之疆因襄文宣靈之僭迹立基孝公茂惠文奮昭莊至政破縱擅衡并吞六國遂稱乎始皇盛從鞅儀韋斯之邪政馳騖起翦恬賁之用兵剗滅古文刮語燒書弛禮崩樂塗民耳目遂欲流唐漂虞滌殷蕩周㸐除仲尼之篇籍自勒功業改制度軌量咸稽之於秦紀是以耆儒碩老抱其書而逺遜禮官博士卷其舌而不談來儀之鳥肉角之獸狙獷而不臻甘露嘉醴景曜浸潭之瑞濳大茀經霣巨狄鬼信之妖發神歇靈繹海水羣飛二世而亡何其劇與帝王之道競競乎不可離已夫能貞而明之者窮祥瑞回而昧之者極妖愆上覽古在昔有憑應而尚缺焉壞徹而能全故若古者稱堯舜威侮者蹈桀紂况盡汛掃前聖數千載功業專用已之私而能享祐者哉會漢祖龍騰豐沛奮迅宛葉自武關與項羽戮力咸陽創業蜀漢發迹三秦克項山東而帝天下擲秦政慘酷尤煩者應時而蠲如儒林刑辟厯紀圖典之用稍增焉秦餘制度項氏爵號雖違古而猶襲之是以帝典闕而不補王綱弛而未張道極數殫暗忽不還逮至大新受命上帝還資后土顧懷玄符靈契黃瑞涌出滭浡沕潏川流海渟雲動風偃霧集雨散誕彌八圻上陳天庭震聲日景炎光飛響盈塞天淵之間必有不可辭讓云爾於是乃奉若天命窮寵極崇與天剖神符地合靈契創億兆規萬世奇偉倜儻譎詭天祭地事其異物殊怪存乎五威將帥班乎天下者四十有八章登假皇穹鋪衍下土非新家其疇離之卓哉煌煌真天子之表也若夫白鳩丹烏素魚斷蛇方斯蔑矣受命甚易格來甚勤昔帝纘皇王纘帝隨前踵古或無為而治或損益而亡豈如新室委心積意儲思垂務旁作穆穆明旦不寐勤勤懇懇者非秦之為與夫不勤勤則前人不當不懇懇則覺德不愷是以發祕府覽書林遙集乎文雅之囿翺翔乎禮樂之場胤殷周之失業紹唐虞之絶風懿律嘉量金科玉條神卦靈兆古文畢發煥炳照耀靡不宣臻式軨軒旗旗以示之揚和鸞肆夏以節之施黼黻衮冕以昭之正嫁娶送終以尊之親九族淑賢以穆之夫改定神祗上儀也欽修百祀咸秩也明堂雍臺壯觀也九廟長壽極孝也制成六經洪業也北懷單于廣德也若復五爵度三壤經井田免人役方甫刑匡馬法恢崇祗庸爍德懿和之風廣彼搢紳講習言諌針誦之塗振鷺之聲充庭鴻鸞之黨漸階俾前聖之緒布濩流衍而不韞韣郁郁乎渙哉天人之事盛矣鬼神之望允塞羣公先正罔不夷儀姦宄寇賊罔不振威紹少典之苗著黃虞之裔帝典闕者已補王綱弛者已張炳炳麟麟豈不懿哉厥被風濡化者京師沈濳甸內市洽侯衛厲揭要荒濯沐而術前典巡四民迄四嶽增封泰山禪梁父斯受命者之典業也蓋受命日不暇給或不受命然猶有事矣况堂堂有新正丁厥時崇嶽渟海通瀆之神咸設壇場望受命之臻焉海外遐方信延頸企踵回面內嚮喁喁如也帝者雖勤惡可以已乎宜命賢哲作帝典一篇奮三為一襲以示來人摛之罔極令萬世常戴巍巍履栗栗臭馨香含甘實鏡純粹之至精聆清和之正聲則百工伊凝庶績咸熙荷天衢提地釐斯天下之上則已庶可試哉連珠連珠二首臣聞明君取士貴拔衆之所遺忠臣薦善不廢格之所排是以巖穴無隱而側陋章顯也臣聞天下有三樂有三憂焉隂陽和調四時不忒年榖豐遂無有夭折災害不生兵戎不作天下之樂也聖明在上祿不遺賢罰不偏罪君子小人各處其位衆臣之樂也吏不茍暴役賦不重財力不傷安土樂業民之樂也亂則反也故有三憂誄元后誄新室文母太后崩天下哀痛號哭涕泗思慕功德咸上詞誄之銘曰詞一作柩惟我有新室文母聖明皇太后姓出皇帝西陵昌意實生高陽純德虞帝孝聞四方登陟帝位禪受伊唐爰初胙土陳田至王營相厥宇渡河濟旁沙麓之靈太隂之精天生聖姿豫有禪禎作合于漢配元生成孝順皇姑承家尚莊內則純被後烈丕光肇初配元天命是將兆徴顯見新都黃龍漢成既終胤嗣匪生哀帝承祚惟離典經尚是言異大命俄顚厥年天隕大終不盈文母覽之千載不傾博選大智新都宰衡聖明作佐與圖國艱以度厄運徴立中山庶其可濟博采淑女備其姪娣覲禮高禖祈廟嗣繼靡格匪天靡動匪地穆穆明明昭事上帝𢎞漢祖考夙夜匪懈興滅繼絶博立侯王親睦庶族昭穆序明帝致友屬靡有遺荒咸被祚慶冀以金火赤仍有央勉進大聖上下兼該羣祥衆瑞正我黃來火德將滅惟后于斯天之所壞人不敢支哀平夭折百姓分離祖宗之愆終其不全天命有託謫在于前屬遭不造榮極而遷皇天眷命黃虞之孫歷世運移屬在聖新代于漢劉受祚于天漢祖承命赤傳于黃攝帝受禪立為真皇允受厥中以安黎衆漢廟黜廢移定安公皇皇靈祖惟若孔臧降兹圭璧命服有常為新帝母鴻德不忘欽德伊何奉命是行菲薄服食神祗是崇尊不虛統惟祗惟庸隆循人敬先民是從承天祗家允恭虔恪豐阜庶卉旅力不射恤民于留不皇詭作别計十邑國之是度還奉于此以處貧薄罷苑置縣築里作宅以處貧窮哀此嫠獨起常盈倉五十萬斛為諸生儲以勸好學志在黎元是勞是勤春巡灞滻秋臻黃山夏撫鄠杜冬恤涇樊大射饗飲飛羽之門綏宥耆幼不拘婦人刑女歸家以育貞信玄冥季冬搜狩上蘭寅賔出日東秩暘谷鳴鳩拂羽戴勝降桑蠶于繭館躬筐執曲帥導羣妾咸循蠶簇分繭理絲女工是勑遐邇蒙祉中外禔福自京逮海靡不仰德成類存生秉天地經無物不理無人不寧尊號文母與新有成世奉長夀靡墮有傾著德太常注諸旒旌嗚呼哀哉以昭鴻名享國六十殂落而崩四海傷懷劈踊拊心若喪考妣遏密八音嗚呼哀哉萬方不勝德被海表彌流魂精去此昭昭就彼冥冥忽兮不見超兮西征既作下宫不復故庭爰緘伊銘嗚呼哀哉騷反離騷有周氏之蟬嫣兮或鼻祖於汾隅靈宗初諜伯僑兮流于末之揚侯淑周楚之豐烈兮超既離呼皇波因江潭而􅐹記兮欽弔楚之湘纍惟天軌之不辟兮何純栔而離紛紛纍以其淟涊兮暗纍以其繽紛漢十世之陽朔兮招搖紀于周正正皇天之清則兮度后土之方貞圖纍承彼洪族兮又覽纍之昌辭帶鉤矩而佩衡兮履攙槍以為綦纍初貯厥麗服兮何文肆而質資娵娃之珍髢兮鬻九戎而索賴鳯凰翔於蓬渚兮豈駕鵝之能捷騁驊騮以曲囏兮驢騾連蹇而齊足枳棘之榛榛兮猿擬而不敢下靈修既信椒蘭之唼佞兮吾纍忽焉而不蚤睹襟芰茄之緑衣兮被夫容之朱裳芳酷烈而莫聞兮不如襞而幽之離房閨中容競綽約兮相態以麗佳知衆嫭之嫉妬兮何必揚纍之蛾眉懿神龍之淵潛兮俟慶雲而將舉亡春風之被離兮孰焉知龍之所處愍吾纍之衆芬兮揚煜煜之芳苓遭季夏之凝霜兮慶夭悴而喪闕橫江湘以南􅐹兮云走乎彼蒼吾馳江潭之泛溢兮將折𠂻乎重華舒中情之煩或兮恐重華之不纍與陵陽侯之素波兮豈吾纍之獨見許精瓊靡與秋菊兮將以延夫天年臨汨羅而自隕兮恐日薄於西山解扶桑之總轡兮闕令之遂奔馳鸞皇騰而不屬兮豈獨飛廉與雲師卷薜芷與若惠兮臨湘淵而投之棍申椒與菌桂兮赴江湖而漚之費椒稰以要神兮又勤索彼瓊茅違靈氛而不從兮反湛身於江臯纍既闕夫傳説兮奚不信而遂行徒恐鷤鵙之將鳴兮顧先百草為不芳初纍棄彼虙妃兮更思瑤臺之逸女抨雄鴆以作媒兮何百離而曽不一耦乘雲霓之旖柅兮望昆侖以樛流覽四荒而顧懷兮奚必云女被髙丘既亡鸞車之幽藹兮焉駕八龍之委蛇臨江瀕而掩涕兮何有九招與九歌夫聖哲之不遭兮固時命之所有雖增欷以於邑兮吾恐靈修之不纍改昔仲尼之去魯兮婓婓遲遲而周邁終回復於舊都兮何必湘淵與濤瀨溷漁父之餔啜兮潔沐浴之振衣棄由聃之所珍兮跖彭咸之所遺序傳自序傳揚雄字子雲蜀郡成都人也其先出自有周伯僑者以支庶初食采於晉之揚因氏焉不知伯僑周何别也揚在河汾之間周衰而揚氏或稱侯號曰揚侯會晉六卿爭權韓魏趙興而范中行知伯弊當是時逼揚侯揚侯逃於楚巫山因家焉楚漢之興也揚氏遡江上處巴江州而楊季官至盧江太守漢元鼎間避仇復遡江上處岫山之陽曰郫有田一壥有宅一區世世以農桑為業自季至雄五世而傳一子故雄亡它揚於蜀雄少而好學不為章句訓詁通而已博覽無所不見為人簡易佚蕩日吃不能劇談默而好深湛之思清靜亡為少耆欲不汲汲於富貴不戚戚於貧賤不修廉偶以徼名當世家産不過十金之無儋石之儲晏如也自有大度非聖哲之書不好也非其意雖富貴不事也顧嘗好辭賦先是蜀有司馬相如作賦甚𢎞麗溫雅雄心壯之每作賦常擬之以為式又怪屈原文過相如至不容作離騷自投江而死悲其文讀之未嘗不流涕也以為君子得時則大行不得時則龍蛇遇不遇命也何必湛身哉乃作書往往托離騷文而反之自岫山投諸江流以弔屈原名曰反離騷又旁離騷作重一篇名曰廣騷又旁惜誦以下至懷沙一卷名曰畔牢愁畔牢愁廣騷文多不載獨載反離騷孝成帝時客有薦雄文似相如者上方郊祠甘泉泰畤汾陰后土以求繼嗣召雄侍詔承明之庭正月從上甘泉還奏甘泉賦以風甘泉本因秦離宫既奢泰而武帝復增通天明光迎風宫外近則洪崖旁皇儲胥弩阹逺則石關封巒枝鵲露寒棠黎師得遊觀屈竒瑰偉非木摩而不雕牆塗而不畫周宣所考般庚所遷夏卑宫室唐虞探椽三等之制也且其為已久矣非成帝所造欲諫則非時欲默則不能已故遂推而隆之乃上比於帝室紫宫若曰此非人力之所為黨鬼神可也又是時趙昭儀方大幸每上甘泉常法從在屬車間豹尾中故雄聊盛言車騎之衆參麗之駕非所以感動天地逆釐三神又言屏玉女郤虙妃以微戒齊肅之事賦成奏之天子異焉其三月將祭后土上乃帥羣臣橫大河湊汾陰既祭行遊介山回安邑顧龍門覽鹽池登歷觀陟西嶽以望八荒迹殷周之虛眇然以思唐虞之風雄以為臨川羡魚不如歸而結罔還上河東賦以勸十二月羽獵雄從以為昔在二帝三王宫館臺榭沼池苑囿林麓藪澤財足以奉郊廟御賔客充庖厨而已不奪百姓膏腴榖土桑柘之地女有餘布男有餘粟國家殷富上下交足故甘露零其庭醴泉流其唐鳯凰巢其樹黃龍遊其沼麒麟臻其囿神爵棲其林昔者禹任益虞而上下和屮木茂成湯好田而天下用足文王囿百里民以為尚小齊宣王囿四十里民以為大裕民之與奪民也武帝廣開上林南至宜春鼎胡御宿昆吾旁南山而西至長楊五祚北繞黃山瀕渭而東周袤數百里穿昆明池象滇河營建章鳯闕神明馺娑漸臺泰液象海水周流方丈瀛州蓬萊遊觀侈靡窮妙極麗雖頗割其三垂以瞻齊民然至羽獵田車戎馬器械儲偫禁禦所營尚泰奢麗誇詡非堯舜成湯文王三驅之意也又恐後世復修前好不折中以泉臺故聊因校獵賦以風明年上將大誇胡人以多禽獸秋命右扶風發民入南山西自褒斜東至𢎞農南驅漢中張羅罔罝罘捕熊羆豪豬虎豹狖玃狐莵麋鹿載以檻車輸長楊射熊館以罔為周阹縱禽獸其中令胡人手搏之自取其獲上親臨觀焉是時農民不得收斂雄從至射熊館還上長楊賦聊因筆墨成文章故藉翰林以為主人子墨為客卿以風哀帝時丁傅董賢用事諸附離之者或起家至二千石時雄方草太玄有以自守泊如也或嘲雄以玄尚白而雄解之號曰解嘲雄以為賦者將以風也必推髏而言極麗靡之辭閎侈巨衍競於使人不能加也既乃歸之於正然覽者已過矣往時武帝好神仙相如上大人賦欲以風帝反縹縹有凌雲之志繇是言之賦勸而不止明矣又頗似俳優淳于髠優孟之徒非法度所存賢人君子詩賦之正也於是輟不復為而大潭思渾天參摹而四分之極於八十一旁則三摹九據極之七百二十九贊亦自然之道也故觀易者見其卦而名之觀玄者數其畫而定之玄首四重者非卦也數也其用自天元推一晝一夜陰陽數度律歷之紀九九大運與天終始故玄三方九州二十七部八十一家二百四十三表七百二十九贊分為三卷曰一二三與泰初歷相應亦有顓頊之歷焉􅨸之以三策開之以休咎絣之以象髏播之以人事文之以五行擬之以道德仁義禮知無主無名要合五經茍非其事文不虛生為其泰曼漶而不可知故有首衝錯測攡營數文掜圖告十一篇皆以解剝玄體離散其文章句尚不存焉玄文多故不著觀之者難知學之者難成客有難玄大深衆人之不好也雄解之號曰解難雄見諸子各以其知舛馳大氐詆訾聖人即為怪迂析辨詭辭以撓世事雖小辨終破大道而或衆使弱於所聞而不自知其非也及太史公記六國歷楚漢訖麟止不與聖人同是非頗謬於經故人時有問雄者常用法應之撰以為十三卷象論語號曰法言法言文多不著獨著其目漢魏六朝百三家集卷八
