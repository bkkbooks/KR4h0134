body:
  text: 漢魏六朝百三家集巻六十七顔延之集題詞顔延年飲酒袒歌自云狂不可及元凶肆逆子竣賛世祖入討復為孫辭以免玩世如阮籍善對如樂廣其得功名耆壽或非無故也江左詞采顔謝齊名延年文莫長于庭誥詩莫長于五君嵇中散任誕魏朝獨家戒恭謹教子以禮顔誥立言意亦類是名士在世動得顛挫俯循人情以卑致福雖能言之不能行之即不能行之未嘗不深知之也竣既貴重延年輒多謝避觀其笑第宅之拙惡雲霞之傲視謝瞻籬隔謝晦達尤過之然彼雖厭見要人其享榮終也可不謂要人力哉惟有子而不受子累可以不壽而卒壽也狂不可及葢在斯乎三十不昏以文出仕歴四主陪兩王浮沈上下老不改性詆尚之為朽木斥慧琳為刑餘顏彪之呼亦牛馬應之其閲世久矣逺弔屈大夫近友陶徵士風流固可想見云目錄賦赭白馬賦白鸚鵡賦寒蟬賦又行殣賦詔追贈袁淑詔表謝子竣封建城侯表自陳表請立渾天儀表為齊竟陵王世子臨㑹稽表拜永嘉太守辭東宫表書釋何衡陽達性論書重釋何衡陽書又釋何衡陽書與王微書弔張茂度書與王曇生書序三月三日曲水詩序七七繹文庭誥文又頌碧芙蓉頌赤槿頌賛蜀葵賛箴大筮箴連珠範連珠諡議宋武帝諡議哀策文宋文帝元后哀䇿文誄陶徵士誄陽給事誄祭文為湘州祭虞舜文為湘州祭屈原文祭弟文銘家傳銘狀天馬狀樂府宋南郊登歌三首夕牲歌迎送神歌饗神歌從軍行秋胡行九章輓歌詩應詔讌曲水作詩八章皇太子釋奠㑹作九章三月三日詔宴西池詩為皇太子侍宴餞衡陽南平二王應詔詩應詔觀北湖田收車駕幸京口侍遊蒜山作車駕幸京口三月三日侍遊曲阿後湖作拜陵廟作贈王太常夏夜呈從兄散騎車長沙直東宫答鄭尚書和謝監靈運北使洛還至梁城作始安郡還都與張湘州登巴陵城樓作五君詠五首阮歩兵嵇中散劉參軍阮始平向常侍為織女贈牽牛歸鴻除弟服辭難潮溝侍東耕詩發景陽樓漢魏六朝百三家集巻六十七目録欽定四庫全書漢魏六朝百三家集巻六十七明張溥輯顔延之集賦赭白馬賦驥不稱力馬以龍名豈不以國尚威容軍􅤻趫迅而已實有騰光吐圖疇徳瑞聖之符焉是以語崇其靈世榮其至我髙祖之造宋也五方率職四隩入貢秘寶盈於玉府文駟列乎華廐乃有乘輿赭白特禀逸異之姿妙簡帝心用錫聖皁服御順志馳驟合度齒厯雖衰而藝美不忒襲養兼年恩隠周渥嵗老氣殫斃於内棧少盡其力有惻上仁乃詔陪侍奉述中㫖末臣庸蔽敢同獻賦其辭曰維宋二十有二載盛烈光乎重葉武義粤其肅陳文教迄已優洽泰階之平可升興王之軌可接訪國美於舊史考方載於往牒昔帝軒陟位飛黃服皂后唐膺籙赤文候日漢道亨而天驥呈才魏徳懋而澤馬效質伊逸倫之妙足自前代而間出竝榮光於瑞典登郊歌乎司律所以崇衞威神扶䕶警蹕是用精曜叶從靈物咸秩暨明命之初基罄九區而率順有肆險以禀朔或踰遠而納賮聞王㑹之阜昌知函夏之充牣總六服以收賢掩七戎而得駿蓋乘風之淑類實先景之洪𦙍故能代驂象輿歴配鈎陳齒算延長聲價隆振信聖祖之蕃錫留皇情而驟進徒觀其附筋樹骨垂梢植髮雙瞳夾鏡兩權協月異體峰生殊相逸發超攄絶夫塵轍驅騖迅於滅沒簡偉塞門獻狀絳闕旦刷幽燕晝秣荆越教敬不易之典訓人必書之舉惟帝惟祖爰游爰豫飛輶軒以戒道環彀騎而清路勒五營使按部聲八鸞以節步具服金組兼飾丹艧寶鉸星纒縷章霞布進迫遮列却屬輦輅歘聳擢以鴻驚時濩略而龍翥弭雄姿以奉引婉柔心而待御至於露滋月肅霜戾秋登王于興言闡肄威稜臨廣望坐百層料武藝品驍騰流藻周施和鈴重設睨影髙鳴將超中折分馳逈場角壯永埓别輩越羣絢練夐絶捷趫夫之敏手促華鼓之繁節經𤣥蹄而雹散歴素支而氷裂膺門沫赭汗溝走血踠迹迴唐畜怒未洩乾心降而微怡都人仰而朋悦妍變之態既畢凌遽之氣方屬跼鑣轡之牽制隘通都之圏束眷西極而驤首望朔雲而蹀足將使紫燕駢衡綠虵衞轂纖驪接趾秀騏齊亍覲王母於崑墟要帝臺於宣嶽跨中州之轍迹窮神行之軌躅然而盤於遊畋作鏡前王肆於人上取悔義方天子乃輟駕迴慮息徒解装鑒武穆憲文光振民隠修國章戒出豕之敗御惕飛鳥之跱衡故祗慎乎所常忽敬備乎所未防輿有重輪之安馬無泛駕之佚處以濯龍之奥委以紅粟之秩服養知仁從老得卒加弊帷收仆質天情周皇恩畢亂曰惟徳動天神物儀兮於時駔駿充階街兮稟靈月駟祖雲螭兮雄志倜儻精權奇兮既剛且淑服鞿覊兮效足中黄狥驅馳兮願終惠養䕃本枝兮竟先朝露長委離兮白鸚鵡賦余具職崇賢預觀神秘有白鸚鵡焉被素履𤣥性温言達九譯絶區作玩天府同事多士咸竒思賦其辭曰稟儀素域繼體寒門貌履𤣥而被潔性既養而亦溫雖言禽之末品妙六氣而尅生往秘竒於鬼服來充美於華京恨儀鳳之無辨惜晨鷖之徒暄思受命於黄髮獨含辭而採言起交河之榮薄出天山之無垠既達美於天居亦儷景於雲阿漸惠和之方渥綴風土而未訛服璅翮於短衿仰梢雲之曾柯覬天網之一布漏微翰於山阿寒蟬賦始蕭瑟以攢吟終嬋媛而孤引越客發度漳之歌代馬懷首燕之信不假蕤於范冠豈鏤體於人爵折清飈而不淪團髙木以飄落又餐霞之氣神馭乎九仙稟露之清氣精於八蟬行殣賦嗟我來之云逺覩行殣於水隅崩朽棺以掩壙仰枯顙而枕衢資沙礫以含實藉水章之襚儲撫躬中塗太息蘭渚行徘徊於永路時悄愴於川侣詔追贈袁淑詔夫輕道重義亟聞其教世敝國危希遇其人自非達義之士識正之㴱者孰能抗心衞主遺身固節者哉故太子左衞率淑文辯優洽秉尚貞慤當要逼之切意色不撓厲辭道逆氣震匈黨虐刃交至取斃不移古之懷忠隕難未云出其右者興言嗟悼無廢乎心宜在加禮永旌宋有臣焉可贈侍中大尉諡曰忠憲公表謝子竣封建城侯表伏見策書降錫息竣開國建城縣侯爵踰三等戸越兼千生邀洪禮身茂盛世闔宗革聽盡室改觀誠慚末品誤參其泰臣聞子之能仕父教之忠忠教善信臣實負其前誥能仕志政竣固暗於明試徒以數遇㑹昌消憂啓聖幸與靈祚福徳共從義勲分賞執珪登朝析金受邑慶重慮愆恩往懼積非臣髦蔽所任圖報豈竣庸薄所能奉服自陳表臣聞行百里者半於九十言其末路之難也愚心常謂為虚方今乃知其信臣延之人薄寵厚宿塵國言而雪效無從榮牒増廣厯盡身彫日叨官次雖容載有塗而妨穢滋積早欲啓請餘算屏蔽醜老但時制行及歸慕無賒是以㥏冒愆非簡息干黷耗歇難支質用有限自去夏侵暑入此秋變頭齒眩疼根痼漸劇手足冷痺左脾尤甚素不能食頃向减半本猶賴服比倦悸晩年疾所催顧景引日臣班叨首卿位尸封典肅祗朝校尚恧匪任而陵廟衆事有以疾怠宫府覲慰轉闕躬親息㚟庸微過宰近邑回澤爰降實加將監乞解所職隨就藥養伏願聖慈特垂矜許稟恩明世負報㝠暮仰企端闈上戀罔極請立渾天儀表張衡創物蔡邕造論戎夏相襲世重其術臣昔奉使入闗值大軍旋斾渾儀在路肆觀竒秘絶代異寶旋及王府考諸前志誠應夙聞尚書璿璣玉衡以齊七政崔瑗所謂數術窮天地制作侔造化經志所云圖憲所本故體度不渝精測尚矣則七晷運變無匪康時九代貞觀不絶司厯臣夙懷末意懼干非任今忝惟職綂敢昧死以聞為齊竟陵王世子臨㑹稽表此郡歌風蹈雅既髣髴於淹中春誦夏絃實依稀於河上頃者以來稍有訛替可推擇明經式寄儒職使琢玉成器無爽昔談鑄金待價有符舊説拜永嘉太守辭東宫表抗志絶操芼陸謝芻代食賔土何獨匪民書釋何衡陽達性論書前得所論深見𢎞慮崇致人道黜逺生類物有明微事不愆義維情輔教足使異門掃軌况在蘄同豈忘所附徒恐琴瑟專一更失闡諧故略廣數條取盡後報足下云同體二儀共成三才者是必合徳之稱非遭人之目然總庶類同號衆生亦含識之名豈上哲之諡然則議三才者無取於氓𨽻言衆生者亦何濫於聖智雖情在序别自不患亂倫若能兩籍方教俱舉達義節彼離文採此共實則可便倍害自和析符復合何詎怏怏執吕以毁律且大徳曰生有萬之所同同於所方萬豈得生之可異不異之生宜其為衆但衆品之中愚慧羣差人則役物以為養物則見役以養人雖始或因順終至裁殘庶端萌起情嗜不禁生害繁慘天理鬱滅皇聖哀其若此而不能頓奪所滯故設候物之教謹順時之經將以開仁育識反漸息泰耳與道為心者或不劑此而止又知大制生死同之榮落類諸區有誠亦宜然然神理存沒儻異於枯荄變謝就同草木便當煙盡而復云三后升遐精靈在天若精靈必在果異於草木則受形之論無乃更資來説將由三后粹善報在生天邪欲毁後生反立升遐當毁更立固知非立所除若徒有精靈尚無體狀未知在天當何憑以立吾怯於庭斷故務求依倣而進退思索未獲所安凡氣數之内無不感對施報之道必然之符言其必符何猜有望故遺惠者無要在功者有期期存未善去惠乃至人有賢否則意有公私不可見物或期報因謂樹徳皆要且經世恆談貴施者勿憶士子服義猶惠而弗有況在聞道要更不得虛心而動必懷嗜事盡憚權邪曾不能引之上濟每驅之下淪雖㴱誚校責亦已厚言不代足下嬰城素堅難為飛書而吾自居憂患情理無託近辱褒告欲其布意裁往釋慮不或值顔延之白重釋何衡陽書薄從嵗事躬斂山田田家節隙野老為儔言止榖稼務盡耕牧談年計耦無聞達義重獲微辨得用招慰啓告精至愈慚固結今復妄書往懷以輸未述夫藉意探理不若析之聖文三才之論故當本之三畫三畫既陳中稱君徳所以神致太上崇一元首故前謂自非體合天地無以元應斯𢎞知研其清慮未肯存同猶以兼容罔棄廣載不遺篤物之志誠為優贍恐理位雜越疑陽遂衆若惻隠所發窮博愛之量恥惡所加盡祐直之正則上仁上義吾無間然但情之者寡利之者衆預有其分而未臻其極者不得以配擬二儀耳今方使極者為師不極者為資扶其敬讓去其忮爭令䥸斧鑄刀利害寢端驅百代之民出信厚之塗則何萌不滋何善不援而誣以不算未值其意三才等列不得取偏才之器衆生為號不可濫無生之人故此去氓𨽻彼甄聖智兩籍俱舉㫖在於斯若僑札未能道一皇王豈獲上附伊顔猶共賴氣化宜乎下麗二塗之判易於頤指又知以人生雖均被大徳不可謂之衆生譬聖人雖同稟五常不可謂之衆人夫不可謂之衆人以茂人者神明也今已均被同衆復何諱衆同故當殊其特靈不應異其得生徒忌衆名未虧衆實得無似蜀梁逃畏卒不能避所謂役物為養見役養人者欲言愚慧相傾惛算相制事由智出作非天理是以始矜萌起終哀鬱滅豈與足下芻豢百品共其指歸凡動而益流下民之性化而裁之上聖之功謹為坘防猶患踰盜況乃罔不備設以充侈志方開所泰何議去甚故知慘物之談不得與薄夫同憂樂殺意偏好生情博所云與道為心者博乎生情將使虚排率遂跖實莫反利澤通天而不為惠庸適恩止麝卵事法豺獺邪推此往也非惟自已不復往咎市鄽乎庖厨且市庖之外非無御養神農所書中散所述公理美其事仲彦精其業是亦古有其傳今聞其人何必以刲刳為稟和之性爓瀹為翼善之具哉若以編户難齊憂鄙論未立是見二叔不咸慮周徳先亡儻能伸以逺圖要之長世則日計可滿嵗功可期精靈草木果已區别遊魂之答亦精靈之説若雖有無形天下寧有無形之有顧此惟疑宜見正定仲尼不答有無未辨足下既辨其有豈得同不辨之答雖子嗜學懼未獲所附或是曉晦塗隔隠著事懸遂令明月廢照世智限心知謂必符之言體之極於罔講求反意如非相盡或世人守璞受讓玉市將譯胥牽俗還説國情茍未照盡請復具伸近釋報施首稱氣數者以為物無妄然各以類感感類之中人心為大心術之動𨽻厯所不能得及其積致於可勝原而當斷取世見據為髙證莊周云莽鹵滅裂報亦如之孫卿曰報應之勢各以類至後身著戒可不敬與慈䕶之人㴱見此數故正言其本非邀其末長美遏惡反民大順濟有生之類入無死之地令慶周兆物尊冠百神安宜祚極子𦙍福限卿相而已常善以救善亦從之勢猶影表不慮自來何言乎要惠悦報疑罪勤施似由近驗吝情遠猜徳教故方罰矜功而濫咎亡賢遺存異義公私殊意已備前白若不重云想處實陋華者復見其居厚去薄耳若施非周急惠而期譽乃如之人誠道之蠧惟子之恥丘亦恥之又釋何衡陽書聖慮難原神應不測中散所云中人自竭莫得其端豈其淺斥所可深抽徒以魏文大布見刋異世滕脩蝦鬚取愧當時故於度外之事怯以意裁耳足下已審其虛實方書之不朽獨鑒堅精難復疑問聊寫餘懷依答條釋事緯殃福義雜胡華雖存簡章自至煩文過此以往余欲無言答曰若如論㫖以三畫為三才則初擬地爻三議天位然而遯世無悶非厚載之目君子乾乾非蒼蒼之稱果兩儀罔託亦何取於立人但爻在中和宜應君徳耳釋曰聞之前學淳象始於三畫兼卦終於六爻三畫立本三才之位六爻未變羣龍所經是以重卦之後則以出處明之故遯世乾乾潛藏皆行聖人適時之義兼之道也若以初爻非地三位非天以為兩儀罔託立人無取未知足下前論三才同體何因而生若猶受之繫説不軼師訓何獨得之複卦喪之單象如羲文之外更有三才此自春秋新意吾無識焉且遯世乾乾雖非覆載之名一體之中未失卑髙之實豈得以變動之辭廢立本之義又知以爻在中和宜應君徳若徒有中和之爻竟無中和之人則爻將何放若中和在徳則不得人皆中和體合之論固未可殊越答曰上仁上義便是計體仁義者為三才尋又云僑札未獲上附伊顔宜其下麗則黄裳之人其猶弗及雖賾之㫖髙下無准故惑者未悟釋曰所云上仁上義謂兼總仁義之極可以對饗天地者耳非謂少有恥愛便為三才前釋已具怪復是問肆彼域中惟王是體知三此兩儀非聖不居易者同歸可無重惑案東魯階差僑札理不允備何由上附至位依西方凖墨伊顔未獲法身故當下麗生品來論挾姬議釋故兩解此意冀以取了反致辭費聖作君師賢為臣資接暢神功影響大業行藏可共黙語亦同體分至此何負黄裳議者徒見不得等位元首横主誚恨而不知引之極地更非守節之情指斷如斯何謂無凖答曰夫陰陽陶氣剛柔賦性圓首方足容貌匪殊惻隠恥惡悠悠皆是但參體二儀必舉仁義為端耳釋曰若謂圓首方足必同恥惻隠之實容貌匪殊皆可參體二儀蹻跖之徒亦當在三才之數邪若誠不得則不可見横目之同便與大人同列悠悠之論品量難齊既云仁者安仁智者利仁又云力行近仁畏罪强仁若一之正位將真偽相冒莊周云天下之善人寡不善人多其分若此何謂皆是答曰知欲限以名器慎其所假遂令惠人潔士比性於毛羣庶幾之賢同氣於介族立象之意豈其然乎釋曰名器有限良由資體不備雖欲假之疑陽謂何含靈為人毛羣所不能同稟氣成生潔士有不得異象放其靈非象其生一之而已無乃誣漫答曰已均被同衆云云特靈之神既異於衆得生之理何嘗暫同生本於理而理異焉同衆之生名將安附若執此生名必使從衆則混成之物亦將在例邪釋曰吾前謂同於所方豈得生之可異足下答云非謂不然又曰奚取不異之生必宜為衆是則去吾為衆而取吾不異豈有不異而非衆哉所以復云故當殊其特靈不應異其得生耳今答又謂得生之理何嘗蹔同生本於理而理異焉請問得生之理故是陰陽邪吾不見其異而足下謂未嘗蹔同若有異理非復煦蒸邪則陰陽之表更有受生塗趨三世詎宜堅立使混成之生與物同氣豈混成之謂若徒假生名莫見生實則非向言之匹言生非生即是有物不物李叟此説或更有其義以無詰有頗為未類答曰謹為垣坊云云始云皇聖設候物之教謹順時之經將以反漸息泰今復以方開所泰為難未詳此將難鄙議為譏聖人也釋曰前觀本論自九穀以下至孔釣不綱始知髙議謂凡有宰作皆出聖人躬為尸匠以率先下民也孤鄙拙意自謂每所施為動必有因聖人從為之節使不遷越此二懷之大斷彼我所不同吾將節其奢流故有息泰之説足下方明備設未知於何去甚而中答又云所謂甚者聖人固已去之不了此意故近復以所泰為問答云未詳誰難或自忌前報答曰市庖之外云云夫禋瘞繭栗宗社三牲膮膷豆俎以供賓客七十之老俟肉而飽豈得惟陳草石取備上藥而已而憂不立者非謂洪論難持退嫌此事不可頓去於世耳釋曰神農定生周人備教既唱粒食又言上藥既用犧牢又稱蘋蘩祭膳之道故無定方前舉市庖之外復有御養者捐奪刳瀹之滯以明延性不一非謂經世之事皆當取備草石然芻豢之功希至百齡芝术之懿亟聞千嵗由是言之七十之老何必謝恩於肉食但自封一域者捨此無術耳想不可頓去於世猶是前釋所云不能頓奪所滯也始獲符同敢不歸美既知不可頓去或不謂道盡於此答曰天下寧有無形之有云云尋來㫖似不嫌有鬼當謂鬼宜有質得無惑天竺之書説鬼别為生類邪昔人以鬼神為教乃列於典經布在方策鄭僑吳札亦以為然是以雲和六變實降天神龍門九成人鬼咸格足下雅秉周禮近忽此義方詰無形之有為支離之辯乎釋曰非惟不嫌有鬼乃謂有必有形足下不無是同處有復異是以比及質詰欲以求盡請捨天竺之説謹依中土之經又置别為生類共議登遐精靈體狀有無固然宜報定典策之中鬼神累萬所不了者非其名號比獲三論每來益衆萬鬼畢至竟未片答雖啓告周博非解企渴無形之有既不匠立徒謂支離以為通説若以覈正為支離者將以浮漫為直達乎答曰後身著戒云云未詳所謂慈䕶者誰氏之子若據外書報應之説皆吾所謂權教者耳凡講求至理曾不析之聖言多採譎怪以相扶翼得無似以水濟水乎釋曰慈䕶之主計亦久聞其人責以誰子將以文殊釋氏知謂報應之説皆是權教權道隠㴱非聖不盡雖子通識慮亦未見其極吾疲於推求而足下逸於獨了良有惡然若權教所言皆為欺妄則自然之中無復報應吾懦於擊决足下烈於專斷亦又懼焉神髙聽卑庸可誣哉想云聖言者必姬孔之誥今之所談皆其信順之事而謂曾不析之復是未經詳思來論立姬廢釋故吾引釋符姬答不越問未覺多採由金日磾不生華壤何限九服之外不有窮理之人内外為判誠亦難乎若自信其度獨思耳目習識之表皆為譎怪則吾亦已矣答曰又云物無妄然必以類感云云斯言果然則類感之物輕重必侔影表之勢脩短有度致飾土木不發慈愍之心順時蒐狩未根慘虐之性天宮華樂焉賞而上升地獄幽苦奚罰而淪陷唱言窮軒輊立法無衡石一至於此釋曰影表之説以徵感報來意疑不必侔嫌其無度即復除福應也福應非他氣數所生若滅福應即無氣數矣足下功存步驗而還伐所知想信道為心者必不至此若謂不慈於土木之飾有甚於順時之殺者無乃大負夫人之心黃屋玉璽非必堯舜之情崇居麗養豈是釋迦之意責天宫之賞求地獄之罰頗類昔人亞夫之詰英布之問有味乎其言此葢衆息心之所詳吾可得而略之答曰且阿保𫝊愛慎及溷腴良庖提刀情怵介族彼聖人者明並日月化闗三綂若令報應必符亦何妨於教而緘扄羲唐之紀埋閉周孔之世肇結網罟興累億之罪仍制牲牢開長夜之罰遺彼天厨甘此芻豢曾無拯溺之仁横成納隍之酷其為不然宜簡淵慮若謂窮神之智猶有不盡雖髙情愛竒想亦未至於侮聖釋曰知謂報應之義緘羲周之世以此推求為不符之證羲唐邈矣人莫之詳尚書所載不過數篇方言徳刑之美遑記禍福之源今帝典王策猶不書性命之事而微闕文以為古必無之斯亦師心之過也且信順殃慶咸列姬孔之籍謂之埋閉如小逕并但言有逺近教有淺㴱故使智者與此而奪彼邪夫生必有欲欲必有求欲歉則爭求給則恬争則相害恬則相安網罟之設將蠲害以取安乎且畋漁牲牢其事不異足下前答已知牲牢不可頓去於今世復謂畋漁不可獨棄於古未為通類矣好生惡死每下愈篤故宥其死者順其情奪其生者逆其性至人尚矣何為犯順而居逆哉是知不能頓奪所滯故因為之制耳聖靈雖茂無以叡懞惛之心弱喪之民何可勝論罪罰之來將物自取之事逺難致不由天厨見遺物近易躭故常芻豢是甘拯溺出隍衆哲所共但化物不同非道之異不盡之讓亦如過當子長愛竒本不類此答曰足下論仁義則云情之者少利之者多言施惠則許其遺賢忘報在情既少孰能遺賢利之者多曷云亡報若能推樂施之士以期欲仁之疇演忘報之意引向義之心則義寔在斯求仁不逺釋曰情仁義者寡利仁義者衆聞之莊書非直孤説未獲詳校遽見彈責夫在情既少利之者多不能遺賢曷云忘報實吾前後勤勤以為不得配擬二儀者耳復非篤論所應據正若樂施忘報即為體仁忘報而施便為合義可去欲字并除向名在斯不逺誰不是慕答曰濟有生之類云云斯㫖宏誕非本論所及無乃秦師將遁行人言肆乎釋曰足下論挾姬釋吾亦答兼戎周足下以此抑彼謂福及髙門吾伸彼釋此云慶周兆之物足下據此所見謂祚止公侯吾信彼所聞云尊冠百神本議是争曷云不及夫論難之本以易奪為體失之已外輒云宏誕求理之塗幾乎塞矣師遁言肆或不在此答曰豈其相迫居吾語子聖人在上不與百神争長有始有卒焉得無死之地云云釋曰豈其相迫一何務徳居吾語子又何壮辭凡為物之長豈争之所得非惟不争必將下之不可見尊冠百神便謂與百神争長無乃取之滕薛棄之體仁知謂物有始卒無不死之地求之域内實如來趣前釋所謂勝類諸區有誠亦宜然者也至如山經所圖仙傳所記事闗世載已不可原况復道絶恆情理隔常照必以於我不然皆當絶棄此又所不得安答曰夫辯章幽明研精庶物云云釋曰逮省此章盛陳列代文博體周頗善師法歌誦聖世足為繁聲討求道義未是要説耳昔在㓜壯微涉羣紀皇王之軌賢智之迹側聞其略敢辱其詳惠示之篤實勤執事答曰何必陋積慶之延祚希無驗於來生蹲膜揖讓終不竝足竊願吾子捨兼而遵一云云釋曰不陋積慶已伸信順之條貫希來生之驗亦具感報之説藻衮大裘同用一體蹲膜揖讓何為不俱行一世理有可兼無謂宜捨答曰蜀梁二叔甘人譯胥之譬非本論所經故不復具云釋曰近此數條聊發戲端亦猶越人問布見採於前談肄業及之無相多怪然二叔為問欲以却編户之疑沒而不答誠有望焉足下連國雲從宏論風行吾幽生孤説每獲竊議此之不侔事有固然實由通才所共者理歘忘其煩貪復息心與王微書圖畫非止藝行成當與易象同體而工篆𨽻者自以書巧為髙弔張茂度書張敷父喪毁瘠成疾世父茂度每譬止之輒更哀慟未朞而卒延之書弔茂度賢弟子少履貞規長懷理要清風素氣得之天然言面以來便申忘年之好比雖艱隔成阻而情問無暌薄莫之人冀其方見慰説豈謂中年奄為長徃聞問悼心有兼性痛足下門教敦至兼實家寳一旦喪失何可為懷與王曇生書王𢎞之卒延之欲為作誄書與𢎞之子曇生誄竟不就君家髙世之節有識歸重豫染毫翰所應載述況僕託慕末風竊以叙徳為事但恨短筆不足書美序三月三日曲水詩序夫方策既載皇王之迹已殊鐘石畢陳舞詠之情不一雖淵流遂往詳略異聞然其宅天衷立民極莫不崇尚其道神明其位拓世貽綂固萬葉而為量者也有宋函夏帝圖𢎞遠髙祖以聖武定鼎規同造物皇上以叡文承厯景屬宸居隆周之卜既永宗漢之兆在焉正體毓徳於少陽王宰宣哲於元輔晷緯昭應山瀆効靈五方雜遝四隩來暨選賢建戚則擇之於茂典施命發號必酌之於故實大予協樂上庠肆教章程明密品式周偹國容眡令而動軍政象物而具箴闕記言校文講藝之官采遺於内輶車朱軒懷荒振逺之使諭徳於外頳莖素毳并柯共穗之瑞史不絶書棧山航海踰沙軼漠之貢府無虚月烈燧千城通驛萬里穹居之君内首稟朔卉服之酋迴而受吏是以異人慕嚮俊民間出警蹕清夷表裏悦穆將徙縣中宇張樂岱郊增類帝之壇飭禮神之館塗歌邑誦以望屬車之塵者久矣日纒胃維月軌青陸皇祗發生之始后王布和之辰思對上靈之心以惠庶氓之願加以二王于邁出餞戒告有詔掌故爰命司厯獻洛飲之禮具上已之儀南除輦道北清禁林左闗巖隥右梁潮源略亭臯跨芝㕓苑太液懷曾山松石峻峗䓤翠隂煙游泳之所攅萃翔驟之所往還於是離宫設衞别殿周徼旌門洞立延帷接枑閲水環階引池分席春官聨事蒼靈奉塗然後升秘駕𦙍緹騎揺玉鑾發流吹天動神移淵旋雲被以降於行所禮也既而帝暉臨幄百司定列鳳葢俄軫虹旗委斾肴蔌芬藉觴醳泛浮妍歌妙舞之容銜組樹羽之器三奏四上之調六莖九成之曲競氣繁聲合變爭節龍文飾轡青翰侍御華裔殷至觀聽騖集揚袂風山舉袖隂澤靚装藻野袨服縟川故以殷賑外區煥衍都内者矣上膺萬壽下禔百福帀筵稟和闔堂依徳情盤景遽歡洽日斜金駕總駟聖儀載佇悵釣臺之未臨慨鄷宫之不縣方且排鳳闕以髙游開爵園而廣宴竝命在位展詩發志則夫誦美有章陳信無愧者歟七七繹北岳生剗迹埋名身閒事盡道畜山扄東國進士謬與遷焉其居也依隠嵁隂結架清深巖屋橋構磴道相臨寒榮隴首繑飲江潯客曰周以巖廊匝以綵房木冩雲氣土秘羣芳既旋天而倒井又斲員而縷方松丘箭渚藥苑香林梁澗道以髙濟棧巖磴而上尋客曰若夫舟山之奥金門之秘地首岷銅川上汶泗裁石成音調金為器故列真玩其微鳴辭人賦其清懿若乃梓漆簡聲麗容呈才陳舞態開吹臺獵悲風遡秋埃既而昵賔獻壽中人奉膳有悄者顔弗怡髙殿視華鼓之繁桴聽邊笳之嘶囀飛朱鷺以首引逮𤣥雲而終變然後簪珥揺暉莊服流湎抗妍歌以跕躧揚輕袖而翳面雜紛披於巾拂逓間闗乎槃扇庭誥文庭誥者施於閨庭之内謂不遠也吾年居秋方慮先草木故遽以未聞誥爾在庭若立履之方規鑒之明已列通人之規不復續論今所載咸其素畜本乎生靈而致之心用夫選言務一不尚煩密而至於備議者葢以網諸情非古語曰得鳥者羅之一目而一目之羅無時得鳥矣此其積意之方道者識之公情者徳之私公通可以使神明如嚮私塞不能令妻子移心是以昔之善為士者必捐情反道合公屏私尋尺之身而以天地為心數紀之壽常以金石為量觀夫古先垂戒長老餘論雜用細制每以不朽見銘繕築末迹咸以可久承志況樹徳立義收族長家而不思經遠乎曰身行不足遺之後人欲求子孝必先慈將責弟悌務為友雖孝不待慈而慈固植孝悌非期友而友亦立悌夫和之不備或應以不和猶信不足焉必有不信儻知恩意相生情理相出可使家有參柴人皆由損夫内居徳本外夷民譽言髙一世處之逾嘿器重一時體之兹沖不以所能干衆不以所長議物淵泰入道與天為人者士之上也若不能遺聲欲人出已知柄在虚求不可校得敬慕謙通畏避矜踞思廣監擇從其遠猷文理精出而言稱未達論問宣茂而不以居身此其亞也若乃聞實之為貴以辯畫所克見聲之取榮謂争奪可獲言不出於户牖自以為道義久立才未信於僕妾而曰我有以過人於是感茍鋭之志馳傾􅔵之望豈悟已挂有識之裁入修家之誡乎記所云千人所指無病自死者也行近於此者吾不願聞之矣凡有知能預有文論不練之庶士校之羣言通才所歸前流所與焉得以成名乎若呻吟於牆室之内喧囂於黨輩之間竊議以迷寡聞妲語以敵要説是短算所出而非長見所上適值尊朋臨座稠覽博論而言不入於髙聽人見棄於衆視則慌若迷塗失偶黶如深夜撤燭銜聲茹氣腆嘿而歸豈識向之夸慢祗足以成今之沮喪邪此固少壯之廢爾其戒之夫以怨誹為心者未有達無心救得喪多見誚耳此葢臧獲之為豈識量之為事哉是以徳聲令氣愈上每髙忿言懟譏每下愈發有尚於君子者寧可不務勉邪雖曰恒人情不能素盡故當以逺理勝之公笇除之豈可不務自異而取陷庸品乎富厚貧薄事之懸也以富厚之身親貧薄之人非可以一時處然昔有守之無怨安之不悶者葢有理存焉夫既有富厚必有貧薄豈其證然時乃天道若人皆厚富是理無貧薄然乎必不然也若謂富厚在我則宜貧薄在人可乎又不可矣道在不然義在不可而横意去就謬生希幸以為未達至分蠶溫農飽民生之本躬稼難就上以僕役為資當施其情願庀其衣食定其當治遞其優劇出之休饗後之捶責雖有勸恤之勤而無霑曝之苦務前公税以逺吏讓無急傍費以息流議量時發斂視嵗穰儉省贍以奉已損散以及人此用天之善御生之得也率下多方見情為上立長多術晦明為懿雖及僕妾情見則事通雖在畎畝明晦則功博若奪其當然役其煩務使威烈雷霆猶不禁其欲雖棄其大用窮其細瑕或明灼日月將不勝其邪故曰孱焉則差的焉則闇是以禮道尚優法意從刻優則人自為厚刻則物相為薄耕收誠鄙此用不忒所謂野陋而不以居心也含生之氓同祖一氣等級相傾遂成差品遂使業習移其天識世服沒其性靈至夫願欲情嗜宜無間殊或役人而養給然是非大意不可侮也隅奥有竈齊侯蔑寒犬馬有秩管燕輕饑若能服溫厚而知穿弊之苦明周之徳厭滋㫖而識寡嗛之急仁恕之功豈與夫比肌膚於草石方手足於飛走者同其意用哉罰慎其濫惠戒其偏罰濫則無以為罰惠偏則不如無惠雖爾眇末猶扁庸保之上事思反已動類念物則其情得而人心塞矣抃博蒲塞㑹衆之事諧調哂謔適坐之方然失敬致侮皆此之由方其尅瞻彌喪端儼況遭非鄙慮將醜折豈若拒其容而簡其事静其氣而遠其意使言必諍懕賓友清耳笑不傾嫵左右悦目非鄙無因而生侵侮何從而入此亦持徳之管籥爾其謹哉嫌惑疑心誠亦難分豈唯厚貌蔽智之明深情怯剛之斷而已哉必使猜怨愚賢則嚬笑入戾期變犬馬則步顧成妖況動容竊斧束裝濫金又何足論是以前王作典明慎議獄而僭濫易意朱公論璧光澤相如而倍薄異價此言雖大可以戒小游道雖廣交義為長得在可久失在輕絶久由相敬絶由相狎愛之勿勞當扶其正性忠而勿誨必藏其枉情輔以藝業㑹以文辭使親不可䙝疎不可間每存大徳無挾小怨率此往也足以相終酒酌之設可樂而不可嗜嗜而非病者希病而遂𤯝者幾既𤯝既病將蔑其正若存其正性紓其妄發其唯善戒乎聲樂之㑹可簡而不可違違而不背者鮮矣背而非弊者反矣既弊既背將受其毁必能通其礙而節其流意可為和中矣善施者唯發自人心乃出天則與不待積取無謀實竝散千金誠不可能贍人之急雖乏必先使施如王丹愛如杜林亦可與言交矣浮華怪飭滅質之具竒服麗食棄素之方動人勸慕傾人顧盻可以逺識奪難用近欲從若覩其淫怪知生之無心為見竒麗能致諸非務則不抑自貴不禁自止夫數相者必有之徵既聞之術人又驗之吾身理可得而論也人者兆氣二徳稟體五常二徳有竒偶五常有勝殺及其為人寧無叶沴亦猶生有好醜死有夭壽人皆知其懸天至於丁年乖遇中身迂合者豈可易地哉是以君子道命愈難識道愈堅古人恥以身為溪壑者屏欲之謂也欲者性之煩濁氣之蒿蒸故其為害則燻心智耗真情傷人和犯天性雖生必有之而生之徳猶火含煙而妨火桂懷蠧而殘桂然則火勝則煙滅蠧壯則桂折故性明者欲簡嗜繁者氣惛去明即惛難以主一目其以中外羣聖建言所黜儒道衆智發論是除然有之者不患誤深故藥之者恒苦術淺所以毁道多而義寡頓盡誠難每指可易能易每指亦明之末廉嗜之性不同故畏慕之情或異從事於人者無一人我之心不以已之所善謀人為有明矣不以人之所務失我能有守矣已所謂然而彼定不然奕棋之蔽悦彼之可而忘我不可學嚬之蔽將求去蔽者念通怍介而已流言謗議有道所不免況在闕薄難用算防接應之方言必出已或信不素積嫌間所襲或性不和物尤怨所聚有一于此何處迯毁茍能反悔在我而無責於人必有達鑒昭其情逺識迹其事日省吾躬月料吾志寛嘿以居潔静以期神道必在何恤人言喭曰富則盛貧則病矣貧之病也不唯形色麤黶或亦神心沮廢豈但交友疎棄必有家人誚讓非廉深逺識者何能不移其植故欲蠲憂患莫若懷古懷古之志當自同古人見通則憂淺意逺則怨浮昔琴歌于編蓬之中者用此道也夫信不逆彰義必出隠交賴相盡明有相照一面見㫖則情固丘岳一言中志則意入淵泉以此事上水火可蹈以此託友金石可弊豈待充其榮實乃將議報厚之篚筐然後圖終如或與立茂思無忽祿利者受之易易則人之所榮蠶穡者就之艱艱則物之所鄙艱易既有勤倦之情榮鄙又間向背之意此二塗所為反也以勞定國以功施人則役徒屬而擅豐麗自理於民自事其主則督妻子而趨耕織必使陵侮不作懸企不萌所謂賢鄙處宜華野同泰人以有惜為質非假嚴刑有恒為徳不慕厚貴有惜者以理葬有恒者與物終世有位去則情盡斯無惜矣又有務謝則心移斯不恒矣又非徒若此而已或見人休事則懃蘄結納及聞否論則處彰離貳附㑹以從風隠竊以成釁朝吐面譽暮行背毁昔同稽欵今猶叛戾斯為甚矣又非唯若此而已或憑人惠訓藉人成立與人餘論依人揚聲曲存稟仰甘赴塵軌衰沒畏逺忌聞影迹又䝉之毁之無度心短彼能私樹已拙自崇恒輩罔顧髙識有人至此實蠧大倫每思防避無通閭伍覩驚異之事或無涉傳遭卒迫之變反思安順若異從已發將尸謗人迫而又迕愈使失度能夷異如裴楷處逼如裴遐可稱深士乎喜怒者有性所不能無常起於𥚹量而止於𢎞識然喜過則不重怒過則不威能以恬漠為體寛愉為器者大喜蕩心微抑則定甚怒煩性小忍即歇動無愆容舉無失度則物將自懸人將自止習之所變亦大矣豈惟蒸性染身乃將移智易慮故日與善人居如入芝蘭之室久而不聞其芬與之化矣與不善人居如入鮑魚之肆久而不知其臭與之變矣是以古人慎所與處唯夫金真玉粹者乃能盡而不汚爾故曰丹可滅而不能使無赤石可毁而不能使無堅茍無丹石之性必慎浸染之繇能以懐道為人必存從理之心道可懐而理可從則不議貧議所樂耳或云貧何繇樂此未求道意道者瞻富貴同貧賤理固得而自我喪之未為通議茍議不喪夫何不樂或曰溫飽之貴所以榮生饑寒在躬空曰從道取諸其身將非篤論此又通理所用凡生之具豈簡定實或以膏腴夭性有以菽藿登年中散云所足與不繇外是以稱體而食貧嵗愈嗛量腹而炊豐家餘飡非粒實息耗意有盈虚爾況心得復劣身獲仁富明白入素氣志如神雖十旬九飯不能含饑業席三屬不能為寒豈不信然且以已為度者無以自通彼量渾四游而幹五緯天道𢎞也振河海而載山川地道厚也一情紀而合流貫人靈茂也昔之過乎此數者不為剖判之行必廣其風度無挾私殊博其交道無懐曲異故望塵請友則義士輕身一遇拜親則仁人投分此倫序通允禮俗平一上獲其用下得其和世務雖移前休未逺人之適主吾將反本三人至生蹔有之識㓜壯驟過衰耗騖及其間天鬱既難勝言假獲存遂又云無幾柔麗之身亟委土木剛清之才遽為丘壤回遑顧慕雖數紀之中爾以此持榮曾不可留以此服道亦何能平進退我生游觀所達得貴為人將在含理含理之貴惟神與交幸有心靈義無自惡偶信天徳逝不上慙欲使人沈來化志符往哲勿謂是賖日鑿斯密著通此意吾將忘老如固不然其誰與歸值懐所撰畧布衆修若備舉情見顧未書一贍身之經别在田家節政奉終之紀自著燕居畢義又達見同善通辯異科一曰言道二曰論心三曰校理言道者本之於天論心者議之於人校理者取之於物從而别之繇塗參陳要而㑹之終致可一若夫𤣥神之經窮明之説義兼三端至無二極但語出梵方故見猜世學事起殊倫故獲非恒情天之賦道非差胡華人之稟靈豈限外内一以此思可無臆裁為道者葢流出於仙法故以練形為上崇佛者本在於神教故以治心為先練形之家必就深曠反飛靈糇丹石粒芝精所以還年却老延華駐彩欲使體合纁霞軌徧天海此其所長及偽者為之則忌災祟課粗願混士女亂妖正此其巨蠧也治心之術必辭親偶閉身性師浄覺信緣命所以反壹無生尅成聖業智邈大明志狹恒劫此其所貴及詭者為之則藉髮落狎菁華傍榮聲謀利論此其甚誣物有不然事無不弊衡石日陳猶患差忒況神道不形固衆端之所假未能體神而不疑神無者以為靈性密微可以積理知洪變歘怳可以大順待照若鏡天肅若窺淵能以理順為人者可與言有神矣若乃罔其真而𤯝其弊是未加心照耳頌碧芙蓉頌澤芝芳豔擅竒水屬練氣紅荷比符縹玉擢麗滄池飛映雲屋實紀僊方名書靈躅赤槿頌日御北至夏徳南宣玉蒸榮心氣動上𤣥華繅間物受色朱天是謂珍樹含艷丹間賛蜀葵賛井維降精㟭絡升靈物微氣麗卉草之英渝豔衆葩冠冕羣英類麻能直方葵不傾箴大筮箴余因讀易偶意蓍龜友人有請決遊宦務志卦有咎占故作大筮箴以悟焉先王設筮大人盡慮卦遭同人變而之豫先號後笑初暌未遇時至運來當在三五功畢官成幾乎衍數慶在坤宫災在坎路不出户庭獨立無懼違此而動投足失步無惰爾儀靈骨有知無曰余逆神筴不豫南人司箴敢告馳騖連珠範連珠葢聞匹夫履順則天地不違一物投誠則神明可交亊有微而愈著理有闇而必昭是以魯陽傾首離光為之反舍有鳥拂波河伯為之不潮諡議宋武帝諡議以為聖哲同風功美殊稱葢出乎道者無方故刑於物者不一伏維道塞人神信通期運愛敬所稟因心則逺英粹之照正性自天體苞潛躍慮周巻舒龍徳在陰雖艱貞而不悶因時而惕故有來其必亨在晉之季皇塗荐阻欃槍干紀璇璣失馭天鑒靈武民屬聖明不假十室之資不藉百乘之賦首義馳風一鼓静亂滌除泰階消殞薄蝕斯亮登庸之基經綸之始者也内難雖弭外圖未輯河華海岱負固相望荆濮燕亳侯服交侵眷言帝畿思康王路戎不再駕遺氓即序斥堠之所未覊亭徼之所不譯莫不飾誠請罪欵塞來賓故能洒掃中嶽致廟九山神道㑹昌寳命既集損之而益後身愈先既而儀形帝載揖讓天厯改玉乎文祖班瑞於神宗貫革寢機文武搢笏故宸居兩楹坐一八表國訓成均之學家沾撫辜之仁大美配天必終之以儉徳道固萬葉猶申之以話言允所謂教思無窮樹之長世取髙上代顧邈前王矣哀策文宋文帝元后哀策文維元嘉十七年七月二十六日大行皇后崩於顯陽殿粵九月二十七日將遷座於長寧陵禮也龍輁纚綍容翟結驂皇塗昭列神路幽嚴皇帝親臨祖饋躬瞻宵載飾遺儀於組旒淪徂音乎珩珮悲黼筵之移御痛翬褕之重晦降輿客位撤奠殯階乃命史臣累徳述懐其辭曰倫昭儷昇有物有憑圓精初爍方祗始凝昭哉世族祥發慶膺祕儀景胄圖光玉繩昌暉在陰柔明將進率禮蹈和稱詩納順爰自待年金聲夙振亦既有行素章増絢象服是加言觀維則俾我皇風始基嬪徳惠問川流芳猷淵塞方江泳漢載謠南國伊昔不造鴻化中微用集寶命仰陟天機釋位公宫登曜紫闈欽若皇姑允迪前徽孝達寧親敬行宗祀進思才淑傍綜圖史發音在詠動容成紀壼政穆宣房樂韶理坤則順成星軒潤飾徳之所屆惟深必測下節震騰上清朓側有來斯雍無思不極謂道輔仁司化莫晣象物方臻眡祲告沴太和既融收華委世蘭殿長陰椒塗弛衞嗚呼哀哉戒涼在律杪秋即穸霜夜流唱曉月升魄八神警引五輅遷跡噭噭儲嗣哀哀列辟灑零玉墀雨泗丹掖撫存悼亡感念懐昔嗚呼哀哉南背國門北首山園僕人按節服馬顧轅遙酸紫葢眇泣素軒滅綵清都夷體壽原邑野淪靄戎夏悲讙來芳可述往駕弗援嗚呼哀哉誄陶徵士誄夫璿玉致美不為池隍之寶桂椒信芳而非園林之實豈其樂深而好逺哉葢云殊性而已故無足而至者物之籍也隨踵而立者人之薄也若乃巢由之抗行夷皓之峻節故已父老堯禹錙銖周漢而綿世寖遠光靈不屬至使菁華隠沒芳流歇絶不亦惜乎雖今之作者人自為量而首路同塵輟塗殊軌者多矣豈所以昭末景泛餘波乎有晉徵士潯陽陶淵明南嶽之幽居者也弱不好㺯長實素心學非稱師文取指達在衆不失其寡處言每見其嘿少而貧苦居無僕妾井臼弗任藜菽不給母老子㓜就養勤匱逺惟田生致親之議追悟毛子捧檄之懐初辭州府三命後為彭澤令道不偶物棄官從好遂乃解體世紛結志區外定迹㴱棲於是乎逺灌畦鬻蔬為供魚菽之祭織絇緯蕭以充糧粒之費心好異書性樂酒徳簡棄煩促就成省曠殆所謂國爵屛貴家人忘貧者歟有詔徵著作郎稱疾不赴春秋六十有三元嘉四年月日卒於潯陽縣之柴桑里近識悲悼遠士傷情㝠黙福應嗚呼淑貞夫實以誄華名由諡髙茍允徳義貴賤何算焉若其寛樂令終之美好廉克已之操有合諡典無愆前志故詢諸友好宜諡曰靖節徵士其詞曰物尚孤生人固介立豈伊時遘曷云世及嗟乎若士望古遙集韜此洪族蔑彼名級睦親之行至自非敦然諾之信重於布言廉深簡潔貞夷粹溫和而能峻博而不繁依世尚同詭時則異有一於此而兩黙置豈若夫子因心違事畏榮好古薄身厚志世霸虛禮州壤推風孝惟義養道必懐邦人之秉彛不隘不恭爵同下士祿等上農度量難鈞進退可限長卿棄官稚賓自免子之悟之何悟之辯賦辭歸來髙蹈獨善亦既超曠無適非心汲流舊巚葺宇家林晨煙暮靄春煦秋陰陳書綴巻置酒絃琴居備勤儉躬兼貧病人否其憂子然其命隠約就閒遷延辭聘非直也明是惟道性糾纒斡流㝠漠報施孰云與仁實疑明智謂天葢髙胡諐斯義履信曷憑思順何寘年在中身疢維痁疾視化如歸臨凶若吉藥劑弗嘗禱祠非恤傃幽告終懐和長畢嗚呼哀哉敬述清節式遵遺占存不願豐沒無求贍省訃却賻輕哀薄斂遭壤以穿旋葬而窆嗚呼哀哉深心追往遠情逐化自爾介居及我多暇伊好之洽接閻隣舍宵盤晝憇非舟非駕念昔宴私舉觴相誨獨正者危至方則礙哲人巻舒布在前載取鑑不逺吾規子佩爾寔愀然中言而發遺衆速尤迕風先蹶身才非實榮聲有歇徽音永矣誰箴余闕嗚呼哀哉仁焉而終智焉而斃黔婁既沒展禽亦逝其在先生同塵往世旌此靖節如彼康惠嗚呼哀哉陽給事誄惟永初三年十一月十一日宋故寧逺司馬濮陽太守彭城陽君卒嗚呼哀哉瓉少稟志節資性忠果奉上以誠率下有方朝嘉其能故授以邊事永初之末佐守滑臺值國禍薦臻王略中否獯虜間釁劘剝司兗幽并騎弩屯逼鞏洛列營緣戍相望屠潰瓉奮其猛鋭志不違難立乎將卒之間以緝華裔之衆罷困相保堅守四旬上下力屈受陷勍寇士師奔擾棄軍争免而瓉誓命沈城佻身飛鏃兵盡器竭斃於旗下非夫貞壯之氣勇烈之志豈能臨敵引義以死狥節者哉景平之元朝廷聞而傷之有詔曰故寧遠司馬濮陽太守陽瓉滑臺之逼厲誠固守投命狥節在危無撓古之烈士無以加之可贈給事中振䘏遺孤以慰存亡追寵既彰人知慕節河汴之間有義風矣逮元嘉廓祚聖神紀物光昭茂緒旌錄舊勲茍有槩於貞孝者實事感於仁明末臣䝉固側聞至訓敢詢諸前典而為之誄其辭曰貞不常祜義有必甄處父勤君怨在登賢苫夷致果題子行間忠壯之烈宜自爾先舊勲雖廢邑氏遂傳惟邑及氏自溫徂陽狐續既降晉族弗昌之子之生立績宋皇拳猛沈毅溫敏肅良如彼竹柏負雪懐霜如彼騑駟配服驂衡邊兵喪律王略未恢函陜堙阻瀍洛蒿萊朔馬東騖胡風南埃路無歸轊野有委骸帝圖斯艱簡兵授才寔命陽子佐師危臺憬彼危臺在滑之坰周衞是交鄭翟是争昔惟華國今實邊亭憑巘結闗負河縈城金拆夜擊和門畫扄料敵厭難時惟陽生凉冬氣勁塞外草衰逿矣獯虜乘障犯威鳴驥横厲霜鏑髙翬軼我河縣俘我洛畿攅鋒成林投鞍為圍翳翳窮壘嗷嗷羣悲師老變形地孤援闊卒無半菽馬實拑秣守未焚衝攻已濡褐烈烈陽子在困彌達勉慰痍傷拊巡饑渴力雖可窮氣不可奪義立邊疆身終鋒栝嗚呼哀哉賁父隕節魯人是志汧督効貞晉策攸記皇上嘉悼思存寵異於以贈之言登給事疏爵紀庸恤孤表嗣嗟爾義士沒有餘喜嗚呼哀哉祭文為湘州祭虞舜文惟哲化神繼天作聖藏器漁陶致身愛敬是以二妃嬪徳九子觀命在麓不迷御衡以正唐厯既終虞道乃光咨堯授禹素俎采堂百齡厭世萬里陟方敬詢故老欽咨聖君職奉西湘䖍屬南雲神之聽之匪酒伊葷為湘州祭屈原文維有宋五年月日湘州刺史吳郡張邵恭承帝命建旟舊楚訪懐沙之淵得捐珮之浦弭節羅潭􅋈舟汨渚乃遣户曹椽某敬祭故楚三閭大夫屈君之靈蘭薰而摧玉縝則折物忌堅芳人諱明潔曰若先生逢辰之缺溫風迨時飛霜急節嬴芉遘紛昭懐不端謀折儀尚貞蔑椒蘭身絶郢闕迹徧湘干比物荃蓀連類龍鸞聲溢金石志華日月如彼樹芳實穎實發望汨心欷瞻羅思越藉用可塵昭忠難闕祭弟文闔棺窮野啓殯中荒靈影夙滅筵寢虛張人往運來自秋徂陽蕃蘭落色宿草滋長孰云不痛辭家去鄉爾之於役爰適兹邑上秋告來方春佇立如何不弔吉違凶集六親憧心姻朋浩泣我雖載奔伊何云及永懐在昔追亡悼存惟兄及弟瞻母望昆生無榮嬿沒望歸魂令龜吉兆祖櫬東旋靈轅次路嚴舟在川廓然何及痛矣終天銘家傳銘曠彼琅邪實唯海宇誰其来遷時聞逺祖青州隠秀爰始奠居内辭鼎府外秉邦閭建節中平分竹黃初刑清齊右政偃營區葛嶧明懿平陽聰理或薦公庭或登宰士列美霸朝變風千里華萼之茂於昭不已狀天馬狀降靈驥子九方是選白朱文綠蛇紫燕水軼驚鳧陸越飛箭遇山為風值雲成電樂府宋南郊登歌三首宋書樂志曰元嘉二十二年詔顔延之造天地郊夕牲迎送神饗神雅樂登歌三篇夕牲歌夤威寶命嚴恭帝祖表海炳岱選作炳海表岱系唐冑楚靈鑒濬選作睿文民屬睿武奄受敷錫宅中拓宇亘地稱皇罄天作主月竁来賓日際奉土開元首正禮交樂舉六典聯事九官列序有牷在滌有潔在俎以􅏪王衷以答神祜迎送神歌維聖饗帝維孝饗親皇乎備矣有事上春禮行宗祀敬逹郊禋金枝中樹廣樂四陳陟配在京降徳在民奔精照夜髙燎煬晨陰明浮爍沈禜音詠深淪告成大報受釐元神月御按節星驅扶輪遥興逺駕曜曜振振饗神歌營泰畤定天衷思心睿謀筮從建表蕝設郊宫田燭置爟火通厯元旬律首吉飾紫壇坎列室中星兆六宗秩乾宇晏地區謐大孝昭祭禮供牲日展盛自躬具陳器備禮容形舞綴被歌鐘望帝閽聳神蹕靈之来辰光溢潔粢酌娯太乙明煇夜華晳日祼既始獻又終煙薌鬯報清穹饗宋徳祚王功休命永福履充從軍行以下五言苦哉逺征人畢力幹時艱秦初畧揚越漢世爭陰山地廣旁無界嵒阿上虧天嶠霧下髙鳥冰沙固流川秋飈冬未至春液夏不涓閩烽指荆吳胡埃屬幽燕横海咸飛驪絶漠皆控弦馳檄發章表軍書交塞邊接鏑赴陣首巻甲起行前羽驛馳無絶旌旗晝夜懸臥伺金柝響起候亭燧煙逖矣逺征人惜哉私自憐秋胡行九章椅梧傾髙鳳寒谷待鳴律影響豈不懐自逺每相匹婉彼幽閒女作嬪君子室峻節貫秋霜明艷伴朝日嘉運既我從欣願自此畢燕居未及好五臣作歡良人顧有違脱巾千里外結綬登皇畿戒徒在昧旦左右來相依驅車出郊郭行路正威遲存為乆離别沒為長不歸嗟余怨行役三陟窮晨暮嚴駕越風寒解鞍犯霜露原隰多悲凉迴飈巻髙樹離獸起荒蹊驚鳥縱横走悲哉遊宦子勞此山川路超揺行人逺宛轉年運徂良時五臣作人為此别日月方向除孰知寒暑積僶俛見榮枯嵗暮臨空房凉風起坐隅寢興日已寒白露生庭蕪勤役從歸願反路遵山河昔辭秋未素今也嵗載華蠶月歡一作觀時暇桑野多經過佳人從所務窈窕援髙柯傾城誰不顧弭節停中阿年往誠思勞路遠濶音形雖為五載别相與昧平生捨車遵往路鳬藻馳目成南金豈不重聊自意所輕義心多苦調密比金玉聲髙節難久淹朅來空復辭遲遲前途盡依依造門基上堂拜嘉慶入室問何之日暮行來選作采歸物色桑榆時美人望昏至慚歎前相持有懐誰能已聊用申苦難補註作艱離居殊年載一别阻河闗春來無時豫秋至恒早寒明發動愁心閨中起長歎慘悽嵗方晏日落遊子顔髙張生絶弦聲急由調起自昔枉光塵結言固終始如何久為别百行諐善作愆諸已君子失明義誰與偕沒齒愧彼行露詩甘之長川氾輓歌令龜啓明兆撤奠在方昏戒徒赴幽𠖇祖駕出髙門行行去城邑遥遥守丘園息鑣竟平𡑞税駕别巖根詩應詔讌曲水作詩八章言以下四宋畧曰元嘉十一年三月禊飲于樂遊苑祖道江夏王義恭衡陽王義季有詔㑹者賦詩道隠未形治彰既亂帝迹懸衡皇流共貫惟王創物永錫洪筭仁固開周義髙登漢祚融世哲業光烈聖太上正位天臨海鏡制以化裁樹之形性惠浸萌生信及翔泳崇虚非徵積實莫尚豈伊人和寔靈所貺日完其朔月不掩望航琛越水輦賮踰嶂帝體麗明儀辰作貳君彼東朝金昭玉粹徳有潤身禮不愆器柔中淵映芳猷蘭袐昔在文昭今惟武穆於赫王宰方旦居叔有晬叡蕃爰履奠牧寧極和鈞屏京維服朏魄雙交月氣參變開榮灑澤舒虹爍電化際無間皇情爰眷伊思鎬飲每惟洛宴郊餞有壇君舉有禮幙帷蘭甸畫流髙陛分庭薦樂析波浮醴豫同夏諺事兼出濟仰閲豐施降惟微物三妨儲𨽻五塵朝黻途泰命屯恩充報屈有悔可悛滯瑕難拂皇太子釋奠㑹作九章宋畧曰元嘉二十年三月皇太子劭釋奠于國學國尚師位家崇儒門稟道毓徳講藝立言浚明爽曙達義兹昏永瞻先覺顧惟後昆大人長物繼天接聖時屯必亨運䝉則正偃閉武術闡揚文令庶士傾風萬流仰鏡虞庠飾館睿圖炳晬懷仁憬集抱智麕至踵門陳書躡屩獻器澡身𤣥淵宅心道袐伊昔周儲聿光往記思皇世哲體元作嗣資此夙知降從經一作繼志逷彼前文規周矩值正殿虛筵司分簡日尚席函丈丞疑奉帙侍言稱辭惇史秉筆妙識幾微王載有述肆五臣作肄議芳訊大教克明敬躬祀典告奠聖靈禮屬觀盥樂薦歌笙昭事是肅俎實非馨獻終襲吉即宫廣讌堂設象筵庭宿金懸台保兼徽皇戚比彦肴乾酒澄端服整弁六官視命九賓相儀纓笏帀序巾巻充街都莊雲動野馗風馳倫周伍漢超哉邈猗清暉在天容光必照物任其情理宣其奥妄先國胄側聞邦教徒愧微𠖇終謝智效三月三日詔宴西池詩河嶽曜圖聖時利見於赫有皇升中納禪載貞其恒載通其變大哉人文至矣天睠昭哉儲徳靈慶攸繁明兩紫宸景物乾元帝宗罨藹惟城惟蕃衮衣善職彤弓受言飾館春宫税鑣青輅長筵逶迤浮觴㳂泝為皇太子侍宴餞衡陽南平二王應詔詩大儀在御皇聖居貞旁緝民紀仰緯天經物資感變神以瑞形川無遁寶山不閟靈亦既戒裝皇心載遠夕帳亭臯晨儀禁苑神行景騖發自靈閫對宴感分瞻秋悼晩應詔觀北湖田收周御窮轍迹夏載歴山川蓄軫豈明懋善遊皆聖仙帝暉膺順動清蹕巡廣廛樓觀眺豐穎金駕映松山飛奔互流綴緹彀代迴環神行埓浮景争光溢中天開冬眷徂物殘悴盈化先陽陸團精氣陰谷曵寒煙攅素既森藹積翠亦蔥芊息饗報嘉嵗通急戒無年溫渥浹輿𨽻和惠屬後筵觀風久有作陳詩愧未妍疲弱謝陵遽取累非纆牽車駕幸京口侍遊蒜山作元嘉二十六年也元天髙北列日觀臨東溟入河起陽峽踐華因削成巖險去漢宇襟衞徒吳京流池自化造山闗固神營園縣極方望邑社總地靈宅道炳星緯誕曜應辰明睿思纒故里巡駕帀舊坰陟峰騰輦路尋雲抗瑶甍春江壯風濤蘭野茂荑英宣遊𢎞下濟窮遠凝聖情嶽濱有和㑹祥習在卜征周南悲昔老留滯感遺氓空食疲廊肆反税事巖耕車駕幸京口三月三日侍遊曲阿後湖作元嘉二十六年也虞風載帝狩夏諺頌王遊春方動宸駕望幸傾五州山祗蹕嶠路水若警滄流神御出瑶軫天儀降藻舟萬軸𦙍行衞千翼汎飛浮雕雲麗璇葢祥飈被綵斿江南進荆豔河激獻趙謳金練照海浦笳鼔震溟洲藐盼覯青崖衍漾觀綠疇民靈騫都野鱗翰聳淵丘徳禮既普洽川嶽徧懷柔拜陵廟作周徳恭明祀漢道遵光靈哀敬隆祖廟崇樹加園塋逮事休命始投迹階王庭陪厠迴天顧朝讌流聖情早服身義重晩達生戒輕否來王澤竭泰往人悔形敕躬慚積素復與昌運并恩合非漸漬榮㑹在逢迎夙御嚴清制朝駕守禁城束紳入西寢伏軫出東坰衣冠終㝠漠陵邑轉葱青松風遵路急山煙冒壠生皇心慿容物民思被歌聲萬紀載絃吹千嵗託旒旌未殊帝世遠已同淪化萌㓜壯困孤介末暮謝幽貞發軌喪夷易歸軫慎﨑傾贈王太常玉水記芳流璇源載圓折蓄寶每希聲雖秘猶彰徹玲龍􅕉音砌九淵聞鳳窺丹穴歴聽豈多士巋然覯時哲舒文廣國華敷言遠朝列五臣作烈徳輝灼邦懋芳風被鄉耋側同幽人居郊扉常晝閉林閭時晏開亟迴長者轍庭昏見野陰山明望松雪靜惟浹羣化徂生入窮節豫往誠歡歇悲來非樂闋屬美謝繁翰遥懷具短札夏夜呈從兄散騎車長沙炎天方埃鬱暑晏闋塵紛獨静闕偶坐臨堂對星分側聽風薄木遥睇月開雲夜蟬當夏急陰蟲先秋聞嵗候初過半荃蕙豈久芬屏居惻物變慕類抱情殷九逝非空思七襄無成文直東宫答鄭尚書皇居體環極設險祗天工兩闈阻通軌對禁限清風跂予旅東館徒歌屬南墉寢興鬱無已起觀辰漢中流雲藹青闕皓月鑒丹宫踟蹰清防密徙倚恒漏窮君子吐芳訊感物惻余衷惜無丘園秀景行彼髙松知言有誠貫美價難克充何以銘嘉貺言樹絲與桐和謝監靈運弱植慕端操窘歩懼先迷寡立非擇方刻意藉窮棲伊昔遘多幸秉筆待兩閨雖慙丹雘施未謂𤣥素暌徒遭良時詖王道奄昬霾人神幽明絶朋好雲雨乖弔屈汀洲浦謁帝蒼山蹊倚巖聽緒風攀林結留夷跂予間衡嶠曷月瞻秦稽皇聖昭天德豐澤振沈泥惜無雀雉化何用充海淮去國還故里幽門樹蓬藜采茨葺昔宇翦棘開舊畦物謝時既宴年往志不偕親仁敷情眤興玩善作賦究辭悽芬馥歇蘭若清越奪琳珪盡言非報章聊用布所懷北使洛改服飭徒旅首路跼險艱振楫發吳洲秣馬陵楚山塗出梁宋郊道由周鄭間前登陽城路日夕望山川在昔輟期運經始濶聖賢伊濲絶津濟臺館無尺椽宫陛多巢穴城闕生雲煙王猷升八表嗟行方暮年陰風振凉野飛雲瞀窮天臨塗未及引置酒慘無言隠憫徒御悲威遲良馬煩遊役去芳時歸來屢徂諐蓬心既已矣飛薄殊亦然還至梁城作眇黙軌路長憔悴征戍勤昔邁先徂師今來後歸軍振策睠東路傾側不及羣息徒顧將夕極望梁陳分故國多喬木空城凝寒雲丘隴填郛郭銘誌滅無文木石扄幽闥黍苖延髙墳惟彼雍門子吁嗟孟嘗君愚賤同堙滅尊貴誰獨聞曷為久游客憂念坐自殷始安郡還都與張湘州登巴陵城樓作江漢分楚望衡巫奠南服三湘淪洞庭七澤藹荆牧經途延舊軌登闉訪川陸水國周地險河山信重複却倚雲夢林前瞻京一作荆臺囿清雰霽岳陽曽暉薄瀾澳悽矣自逺風傷哉千里目萬古陳往還百代勞起伏存沒竟何人炯介在明淑請從世上人歸來藝桑竹五君詠五首阮步兵阮公雖淪跡識密鑒亦洞沈醉似埋照寓辭類託諷長嘯若懷人越禮自驚衆物故不可論途窮能無慟嵇中散中散不偶世本自餐霞人形解驗黙仙吐論知凝神立俗迕流議尋山洽隠淪鸞翮有時鎩龍性誰能馴劉參軍劉伶善閉闗懐情滅聞見鼓鐘不足歡榮色豈能眩韜精日沈飲誰知非荒宴頌酒雖短章深衷自此見阮始平仲容青雲器實稟生民秀達音何用深識微在金奏郭奕已心醉山公非虛覯屢薦不入官一麾乃出守向常侍向秀甘淡薄深心託毫素探道好淵𤣥觀書鄙章句交吕既鴻軒攀嵇亦鳳舉流連河裏逰惻愴山陽賦為織女贈牽牛婺女儷經星姮娥棲飛月慚無二媛靈託身侍天闕閶闔殊未暉咸池豈沐髮漢陰不夕張長河為誰越雖有促讌期方須凉風發虛計雙曜周空遲三星沒非怨杼軸勞但念芳菲歇歸鴻昧旦濡和風霑露踐朝暉萬有皆同春鴻鴈獨辭歸相鳴去澗氾長引發江畿皦潔登雲侣連綿千里飛長懷河朔路緬與湘漢違除弟服徂沒離二秋掩泣備三冬往辰緬難紀來筭忽易窮升沒淹朞晦灑掃易禮容縞衣變余體長逝歸爾躬辭難潮溝徘徊眷郊甸俛仰引單襟一塗茍不豫百慮畢來侵永懷交在昔有願諐瑟琴寫言勞者事將用慰亡簮侍東耕詩提封經地域辰角麗天篰浮靄起青壇沈腴發紺耦草服薦同穗黄冠獻嘉壽闕登景陽樓詩彚作袁淑非風觀要春景月榭迎秋光㳂波被華若隨山茂貞芳漢魏六朝百三家集巻六十七
