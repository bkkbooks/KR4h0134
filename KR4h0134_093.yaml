body:
  text: 漢魏六朝百三家集卷九十三陸倕集題詞陸佐公為任樂安小友聲譽日進因作感知已賦投贈序懷後奉命出淮泗以詩代書寄京邑僚友劉兄殷弟諸子戚戚漼然于李郭同舟潘夏方駕余每讀之未嘗不重其篤友生厚朋亞也漏刻石闕二銘見美髙祖敕稱佳作昭明宴闌思舊詩云佐公持文介才學罕為儔既沒元帝為其墓銘曰詞鋒颷竪逸氣雲浮一人之身榮知三主亦云遇矣南國興運敦尚詩書梁武起自文人尤勤氣類曲水清漳同逰並唱當時作者但患無才爾長卿凌雲孟陽劒閣寧多慕哉陸集二十卷不能盡見兹所輯録皆麗而能則斯人也斯文也生有蘭臺之聚死傳青鏤之管即謂至今存可也目録賦感知已賦思田賦賦體表為豫章王慶太子出宫表除詹事表拜吏部郎表為王光祿轉太常讓表為張纘謝兄尚書諡靖子表章授潯陽太守章教為豫章王拜後赦教未至潯陽郡教又書與徐僕射薦沈峻書答釋法雲書啓為張侍中謝啓為息纘謝敕賜朝服啓遷吏部郎啓謝敕使行江州事啓銘新漏刻銘石闕銘蠡杯銘碑天光寺碑墓銘志志法師墓志銘祭文釋奠祭孔子文請雨賽蔣王文詩和昭明太子鍾山解講以詩代書别後寄贈京邑僚友贈任昉詩漢魏六朝百三家集卷九十三目録欽定四庫全書漢魏六朝百三家集卷九十三明張漙輯陸倕集賦感知已賦夜申旦而不寐獨匡坐而怨咨命僕夫而夙駕指南館而為期學窮書府文究辭林既耳聞而存口又目見而登心似臨淄之借書類東武之飛翰軫工遲於長卿踰巧速於王粲固乃度平子而越孟堅何論孔璋而與公幹或欲涉其涯涘求其界畔則浩浩淃淃彪彪涆涆譬長鋏於鞘中若龍淵與蜀漢濟濟冠蓋祁祁俊逸有竊風以味道咸交臂而屈膝或望路以窺門空升堂而入室彼春蘭及秋菊尚蕪絶於衆芳矧重仁與襲義信遼遼兮未央言追意而不逮辭欲盡而復忘竊仰髙而希驥忽脂車而秣馬既一顧之我隆亦東璧之余假似延州之如舊同伯喈之倒屣附蒼蠅於驥尾託明鏡於朝光謂虛無而為有布籍甚於遊揚於是柔條颯其成徑白露變而為霜嵗忽忽而遒盡憂與愛兮未忘聚落莖於虛室聽羈雀於枯楊忳鬱悒其誰語獨撫抱而增傷託異人以蠲憂賴竒文而愈疾索黃瓊之寄居造安仁之狹室車出門其巳歡無論銜杯與促膝譬鄒子之吟松故未寒而能栗徒納壤以作髙漏吞舟而為網值墨子之愛兼逄太丘之道廣陪九萬以齊征激三千而同上識公沙於杵臼拔孝相於無名非夫人之為感孰云感於余情指北邙以作誓期鬱鬱於佳城思田賦嵗聿忽其云暮庭草颯以萎黃風飀飀以吹隟燈黯黯而無光獨展轉而不寐何增歎而自傷於是踟蹰徙倚顧景興懷魂煢煢以至曙綴豫想於田萊彼五畝其焉在乃爰洎乎江隈出郭門而東騖入溆浦而南回爾乃觀其水陸物産原隰形便林藪挺直丘陵帶面臨九曲之回江對千里之平甸風去蘋其已開日登桑而先見聽啁唽之寒雞弄差池之春燕臨場圃以築館對櫺軒而鑿池集遊泳於階下引朝派於堂垂瞻巨石之前却玩激水之推移雜青莎之靃靡拂細栁之長枝感風燭與石火嗟民生其如寄茍有胸而無心必行難而言易幸少私而寡欲兼絶仁以棄智忽學步而學趾又追飛而厲翅瞻鹿苑而竊髙仰疆臺而慕義歷四時於逝水馳三稔於申望歸流而載懷情鬱挹其何置賦體奉欽明之睿后沐隆平之玄化參挀鷺之充庭侍長徒之曾舍冀無恨於終南豫告成於芝駕雖就列而陳力終胡顔於長夜表為豫章王慶太子出宫表臣聞周固本支實資明兩漢啓磐石必係元良所以闡𢎞祚鼎光崇守器伏惟皇太子道契生知照均天縱不藉審諭之功無待溫文之輔而冬書秋記夙表睿資春誦夏絃幼彰神度雖復直門守令長壽察微魏贊多容漢稱寬博不足以連輝茂則匹景令圖甲觀惟新桂宫告始朱班徙次翠蓋移隂華裔式瞻人祗蹈舞除詹事表中陽白水徒庇微軀送珥抱薪未成績陳席不棄故劍無遺遂宣時髦升降清顯尊官厚秩無因而至陋卷蓽門鬱成爽塏儲端華重實異恆司南章馬宫已擇儒雅竇嬰許商爰取姻戚自兹巳降名器日隆歷選才賢若何叨越拜吏部郎表銓衡庶品歷選賔寮阮咸貞素屢薦未登陸亮忠心裁居拜職自非季重清識李毅恬正則何以區分管庫式鑒胥史為王光祿轉太常讓表昔者楚德方盛孫叔濯衣漢道克隆王陽結綬故拜命無辭受爵不讓况宗卿清重歷選所難漢晉以降莫非素範辭爵則桓郁張奮讓封則丁鴻劉愷潘尼之文雅深純華表之從容退默自此迄兹風流繼軌以臣况之曾無等級為張纘謝兄尚書諡靖子表亡兄夙搆皇慈早邀靈慶立言著績未酬天寵門衰祚寡遽辭昌運拊心摧恨私懷罔極日月告時幽埏浸逺王人猥集佳册光臨榮溢里庭恩深松檟章授潯陽太守章鏤氷雕脂不見大龍之象課虛叩寂寧聞駕辨之音徒荷容蓋空班推擇不能使府庭生梓橫閣誦經俯睨朱輜仰瞻繒蓋漏上嚴辨伏軾多慙教為豫章王拜後赦教夫議獄緩死著在令圖疑罪惟輕聞之雅誥是以虞經惻隱流涕冬決鍾意垂仁哀矜寒送吾以虛薄夙頒寵章光宅襟險奄有全粵非有沛獻矜嚴空紆青組東平智思徒舉赤帷思所以仰述皇猷導揚𢎞澤遵彼下車譬兹解網未至潯陽郡教第五倫之臨會稽躬斬馬草鄧伯道之蒞吳郡自運家糧故能使吏作頌歌民胥興詠太守薄德謬叨龜組竊願巴祗暗坐接客思匹吳隱被絮對賔常藥自隨式瞻無逺單車入境竊所庶幾舊須發民治道及戍邏揄樵採諸如此類一皆省息又太守家本諸生伏膺典記光武靈臺之籍較涉根基張華聚土之書略見庭户貴郡圖載具存方策挍以山經參諸括象原野城寺宛在心目龍泉鶴嶺不易窮登所撰郡圖可勿親用公孫陛戟既似井蛙延壽執戈實同兒戲書與徐僕射薦沈峻書五經博士庾季逹須換計公家必欲詳擇其人凡聖賢可講之書必以周官立義則周官一書實為羣經源本此學不傳多歷年世北人孫詳蔣顯亦經聽習而音革楚夏故學徒不至惟助教沈峻特精此書比日時聞講肄羣儒劉嵓沈宏沈熊之徒並執經下坐北面受業莫不歎服人無間言弟謂宜即用此人命其專此一學周而復始使聖人正典廢而更興纍世絶業傳於學者答釋法雲書辱告惠示至尊所答臣下審神滅論昔者異學爭途孟子抗周公之法小乘亂道龍樹陳釋迦之教於是楊墨之黨舌舉口張六師之徒轍亂旗靡言神滅者可謂學僻而堅南路求燕北轅首楚以斯適道千里而遙聖上愍其迷途爰奮天藻鉤深致逺盡化知神俾此困蒙均斯氷釋陳兹要道同彼月照弟子並以凡薄沾竊恩紀纓冕則天之朝餐捉稽古之論贊幸之誠獨知踊躍猥頒告逮謹用書紳陸倕呈啓為張侍中謝啓陳力就列不能者止實欲強飯據鞍自窮心力濡足摩頂少報洪私徒課虛無空延鐘箭不悟爰降曲慈復叨清顯職司近切任掌總綸魏選異才漢求髙德官次恪居鮮非民譽仰瞻內省無一可階為息纘謝勑賜朝服啓玄冕素帶出自禁財朱紱青緺隆於皇府輝燭鄰黨震耀街衢姻族移聽朋儕改矚非臣隟弱所能陳報遷吏部郎啓臣器均濩落材同擁腫效非積山勤乖附地自叨榮秩列裁移氣序而坐延曲私遂被洪造自非割蚌識珠覩石知玉寧可以獲名理俗見操就教謝勑使行江州事啓封畛遐曠㕓井奧實陸海神臯偏屬兹境兼以茂親明德維翰作鎮宣述條教匡贊盛猷自非問望兼逄寧可擢膺嘉舉銘新漏刻銘夫自天觀象昏旦之刻未分治厯明時盈縮之度無凖挈壺命氏逺哉義用揆景測辰徼宫戒井守以水火分兹日夜而司􅔦亡官疇人廢業孟陬殄滅攝提無紀衛宏載傳呼之節較而未詳霍融敘分至之差詳而不密陸機之賦虛握靈珠孫綽之銘空擅昆玉𢎞度遺篇承天垂旨布在方册無彰器用譬彼春華同夫海棗寧可以軌物字民作範垂訓者乎且今之官漏出自會稽積水違方導流乖則六日無辨五夜不分嵗躔閹茂月次姑洗皇帝有天下之五載也樂遷夏諺禮變商俗業類補天功均柱地河海夷晏風雲律吕坐朝晏罷每旦晨興屬傳漏之音聽雞人之響以為星火謬中金水違用時乖啓閉箭異錙銖爰命日官草創新器於是俯察旁羅登臺升庫測于地四參以天一建武遺蠧咸和餘舛金筒方圓之制飛流吐納之規變律改經一皆懲革天監六年太嵗丁亥朔十六日壬寅漏成進御以考辰正晷測表候隂不謬圭撮無乖黍纍又可以校運算之暌合分天地之邪正察四氣之盈虛課六律之踈密永世貽則傳之無窮赫矣煥乎無德而稱也昔嘉量微物盤盂小器猶且昭德記功載在銘典况入神之制與造化合符成物之能與坤元等契勳倍楹席事百巾杋寧可使多謝曾水有陋昆吾金字不傳銀書未勒者哉乃詔小臣為其銘曰一暑一寒有明有晦神道無迹天工罕代乃置挈壺是惟熙載氣均衡石晷正權槩世道交喪禮術銷亡遽遷水火爭倒衣裳擊刁舛次聚木乖方爰究爰度時惟我皇方壺外次圓流內襲洪殺殊等髙卑異級靈虬承注隂蟲吐吸倐往忽來鬼出神入微若抽繭逝如激電耳不輟音眼無留眄銅史司刻金徒抱箭履薄非兢臨深罔戰授受靡愆登降弗爽唯精唯一可法可象月不遁來日無藏往分似符契至猶影響合昏暮卷蓂莢晨生尚辨天意猶測地情况我神造通幽洞靈配皇等極為世作程石闕銘昔在舜格文祖禹至神宗周變商俗湯黜夏政雖格命殊乎因襲揖讓異於干戈而晷緯冥合天人啓惎克明峻德大庇生民其揆一也在齊之季昏虐君臨威侮五行怠棄三正刑酷然炭暴踰膏柱民怨神怒衆叛親離蹐地無歸瞻烏靡託於是我皇帝拯之乃操斗極把鉤陳翼百神禔萬福龍飛黑水虎步西河雷動風驅天行地止命旅致屯雲之應登壇有降火之祥龜筮協從人祗響附穿胸露頂之豪箕坐推髻之長莫不援旗請奮執鋭爭先夏首憑固庸岷負阻協彼離心抗兹同德帝赫斯怒秣馬訓兵嚴鼓未通凶渠泥首𢎞舸連軸巨艦接艫鐵馬千羣朱旗萬里折簡而禽廬九傳檄以下湘羅兵不血刃士無遺鏃而樊鄧威懷巴黔底定於是流湯之黨握炭之徒守似藩籬戰同枯朽革車近次師營商牧華夷士女冠蓋相望扶老擕幼一旦雲集壺漿塞野簞食盈塗似夏民之附成湯殷士之窺周武安老懷少伐罪弔民農不遷業市無易賈八方入計四隩奉圖羽檄交馳軍書狎至一日二日非止萬機而尊嚴之度不愆於師旅淵默之容無改於行陳計如投水思若轉規策定帷幄謀成几案曾未浹辰獨夫授首乃焚其綺席棄彼寶衣歸璇臺之珠反諸侯之玉指揮而四海隆平下車而天下大定拯兹塗炭救此橫流功均天地明並日月於是仰協三靈俯從億兆受昭華之玉納龍敘之圖類帝禋宗光有神器升中以祀羣望攝袂而朝諸夏布教都畿班政方外謀協上策刑從中典南服緩耳西羈反舌劍騎穹廬之國同川共穴之人莫不屈膝交臂厥角稽顙鑿空萬里攘地下都幕南罷鄣河西無警於是治定功成邇安逺肅忘兹鹿駭息此狼顧乃止六樂治五禮改章程創法律置博士之職而著録之生若雲開集雅之館而欵關之學如市興建庠序啓設郊丘一介之才必記無文之典咸秩於是天下學士靡然向風人識亷隅家知禮讓教臻侍子化洽期門區宇人安方面靜息役休務簡嵗阜民和􅔦代規模前王典故莫不芟夷翦截允執厥中以為象闕之制其來巳逺春秋設舊章之教經禮垂布憲之文戴記顯遊觀之言周史書樹闕之夢北荒明月西極流精海嶽黃金河庭紫貝蒼龍玄武之制銅爵鐵鳯之工或以聽窮省寃或以布治懸法或以表正王居或以光崇帝里晉氏寖弱宋厯威夷禮經舊典寂寥無記鴻規盛烈湮沒罕稱乃假天闕於牛頭託逺圖於博望有欺耳目無補憲章乃命審曲之官選明中之士陳圭置臬瞻星揆地興復表門草創華闕於是嵗次天紀月旅太簇皇帝御天下之七載也構兹盛則興此崇麗方且趨以表敬觀而知法物覩雙碣之容人識百重之典作範垂訓赫矣壯乎爰命下臣式銘盤石其辭曰惟帝建國正位辨方周營洛涘漢啓岐梁居因業盛文以化光爰有象闕是惟舊章青蓋南洎黃旗東指懸法無聞藏書弗紀大人造物龍德休否建此百常興兹雙起偉哉偃蹇壯矣巍巍旁映重疊上連翠微布教方顯浹日初輝懸書有附委篋知歸鬱崛重軒穹隆反宇形聳飛棟勢超浮柱色法上圓制模下矩周望原隰俯臨煙雨前賔四會却背九房北通二轍南湊五方暑來寒往地久天長神哉華觀永配無疆蠡杯銘用邁羽杯珍踰渠碗實同蠡測形均撲滿伊我疲病獨居無伴所不此挹誰誚誰緩墓志銘志法師墓志銘法師自説姓朱名寶志其生緣桑梓莫能知之齊故特進吳人張緒興皇寺僧釋法義並見法師於宋太始初出入鍾山􅉨來都邑年可五六十嵗未知其異也齊宋之交稍顯靈迹被髮徒跣負杖挾鏡或徴索酒肴或數日不食預言未兆懸識他心一時之中分身數處天監十三年即化於華林門之佛堂先是忽移寺之金剛像出置户外語僧衆云菩薩當去爾後旬日無疾而殞沉舟之痛有切皇心殯葬資須事豐供厚望方墳而隕涕瞻白帳而拊心爰詔有司式刋景行辭曰欲化毗城金粟降靈猗歟大士權迹帝京緒胄莫詳邑居罕見譬彼涌出猶如空現哀兹景像愍此風電將導舟梁假我方便形煩心寂外荒內辨觀往測來覩微知顯動足墟立發言風偃業窮難詔因謝弗援慧雲晝歇慈燈夜昏碑天光寺碑法雲旦聚則浸潤被乎重沙慧日晨登則暉光燭於有頃皇帝乃把神珠握靈鏡擊天鼓撞地鐘驅日月之師勒星辰之陳九流外藉五明內興鳥策餘文龍宫遺教莫不神遊房奧迹遍門墻思洞希微言窮名象珉陛凌虛瓊籬鬱起可使龍城愧飾雁塔慙珍日宇奪暉月宫掩麗昔者姬水壽丘載紀山川之目丹陵負夏僅傳鄉黨之名歌酒故邑賜復窮乎身世塤箎舊里髙會止於當年銘曰被物如露偃民猶草解髻傳珠抽衣受寶化違宅火功超河岸捨我神居興兹靈館八襲豐殿四柱髙廊並陳金璧旁逹玉箱從橫雜樹間厠衆芳祭文釋奠祭孔子文於惟上德是曰聖真克明克峻知化窮神研幾善誘藏用顯仁利同道濟成俗教民道尊功倍德漙化光離經辨志濟濟洋洋請雨賽蔣王文陸周祚胤鍾嶽降精聰明正直得一居貞無方無體不疾不行化馳九縣位冠百靈東掩屢愆西郊巳戢偶龍矯首泥人鶴立神聽孔殷靈應揮霍倏覩翻伊俄聞倒洛樂周祈畢恩洽酒闌靈談抗袖鬼笑投柈推兹且引於萬斯歡詩和昭明太子鍾山解講終南鄰漢闕髙掌跨周京復此虧山嶺穹窿距帝城當衢啓珠館臨下搆山楹南望窮淮溆北眺盡滄溟步簷時中宿飛階或上征網户圖雲氣龕室畫仙靈副君憐世網廣命萃人英道筵終后説鑾轡出郊坰雲峰響流吹松野映風旌睿心嘉杜若神藻茂琳瓊多謝先成敏空頒後乘榮以詩代書别後寄贈京邑僚友余本水鄉士閉門江海隅時逄世道泰蹇足步髙衢名成宦雖立效微功日踈入仕乘肥馬出守擁髙車關門遊昔吏遷亭有故書江派資賢牧宗英出建旟不勞王布鼓無賴露田車弼政非責實求名巳課虛長卿病猶在修齡疾未袪詎知亭長肉寧挂府丞魚不能未能止內訟慚諸巳僶俯從王事纚舟出淮泗朋故逺追尋瞑宿清江隂明旦一分手翻飛各異林歸舟隨岸曲猶聞歌棹音行者日超逺誰見别離心夕次洌洲岸明登慈姥岑水流多回復余歸良未尋江關一作中寒事早夜露傷秋草心屬姑蘇臺目送邯鄲道葭葦日蒼蒼親知慎早涼劉兄消渴病休攝戒無良殷弟癲眩疾行止避風霜劉侯有餘洽宜餌陟一作休釐方伏子多風咳門冬幸易將率更愛雅體體弱思自強吏曹勉玉潤諷議朂金相比部多暇日奚用肆龍章建德何為者無墮無人鄉記室朋從暇露蝎附行商議曹坐朝罷尺板嗣徽芳雙栖成獨宿俱飛忽異翔眷言思親友沉思結中腸追惟疇昔時朝府多歡暇薄暮塵埃靜飛蓋遙相迓李郭或同舟潘夏時方駕娛歡追美景敷文永清夜促膝豈異人戚戚皆朋一作姻婭今者一乖離漼然心事差山川望猶近便似隔天涯玉躬子加護昭質余未虧八行思自勉一札望來儀贈任昉詩昉為御史中丞後進皆宗之時有彭城劉孝綽劉苞劉孺吳郡陸倕張率陳郡殷藝沛國劉顯及到溉到洽車軌日至號曰蘭臺聚和風雜美氣下有真人遊壯矣荀文若賢哉陳太丘今則蘭臺聚萬古信為儔任君本逹識張子復清修既有絶塵到復見黃中劉漢魏六朝百三家集卷九十三
