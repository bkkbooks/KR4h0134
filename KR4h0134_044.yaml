body:
  text: 漢魏六朝百三家集卷四十四晉夏侯湛集題詞潘安仁之誄夏侯孝若也曰執㦸疲楊長沙投賈余讀其詞竊嘆文人相惜死生尤見抵疑之作班固賔戲蔡雍釋誨流也髙才淹躓含文寫懷鋪張問難聊代萱蘇縱觀西晋𤣥居榷論釋勸釋時文皆近是追踪西漢邈乎後塵矣昆弟誥總訓郡子紹聞穆侯人倫長者之書也但規模帝典僅能形似刻鵠畫虎不無譏焉周詩上續白華志猶束晢補亡安仁誦之亦賦家風友朋具爾殆文以情生乎賈謐二十四友安仁居首母氏數誚不知省改白首之䜟貽親以僇孝若連璧未或同熱長歸雖先幸不及禍其離親詠有云茍違親以從利兮匪曽閔之攸寶余為三復泣下孝弟文雅盛名得全者此爾東漢趙威豪猶嘔血未及况他人乎目録賦雷賦春可樂賦秋夕哀賦秋可哀賦大暑賦禊賦梁田賦夜聽笳賦鞞舞賦雀叉賦缸燈賦繳彈賦觀飛鳥賦𤣥鳥賦獵兔賦愍桐賦芙蓉賦石榴賦宜男花賦朝華賦浮萍賦薺賦瓜賦設難抵疑序羊秉序從祖叔權幼權序誥昆弟誥贊東方朔畫贊虞舜贊左丘明贊顔子贊閔子騫贊莊周贊管仲贊鮑叔贊范蠡贊魯仲連贊傳外祖母憲英傳詩周詩山路吟江上泛歌離親詠長夜謠寒苦謠征邁辭漢魏六朝百三家集卷四十四目録欽定四庫全書漢魏六朝百三家集卷四十四明張溥輯晉夏侯湛集賦雷賦伊朱明之季節兮暑燻赫以盛興扶桑煒以揚燎兮雷火曄以南升大明黯其濳曜兮天地鬱以同蒸掣丹霆之皓琰兮奮迅雷之崇崇馳壯音於天上兮激駮響於地中徒觀其霰雹之所種鑿火石之所燒鑠雲雨之所澆沃流潦之所淹濯當衝則擢破遇披則纖溺山林為之崩蕩羣生為之震辟是以大聖變於烈風小雅肅於天髙嗟乾坤之神祗兮信靈化之誕昭故先王之制刑擬雷霆於征伐恢文德以經化兮耀武義以崇烈茍不合於大象兮焉濟道以成哲春可樂賦春可樂兮樂東作之良時嘉新田之啓萊悅中疇之發菑桑冉冉以奮條麥遂遂以揚秀澤苗翳渚原卉耀阜春可樂兮樂崇陸之可娛登夷岡以回眺超矯駕乎山隅綴雜華以為蓋集繁㽔以飾裳散風衣之馥氣納戢懷之潜芳鶯交交以弄音翠翾翾以輕翔招君子以偕樂擕淑人以微行秋夕哀賦秋夕兮遙長哀心兮永傷結帷兮中宇屣履兮間房聽蟋蟀之濳鳴覩遊雁之雲翔尋修廡之飛檐覽明月之流光木蕭蕭以被風階縞縞以受霜玉機兮環轉四運兮驟遷銜恤兮迄今忽將兮涉年日往兮哀深嵗暮兮思繁秋可哀賦秋可哀兮哀秋日之蕭條火回景以西流天既清而氣髙壤含素霜山結𤣥霄月延路以增夜日遷行以收暉屏絺綌於篋笥納綸縞以授衣秋可哀兮哀新物之陳蕪綢篠朔以斂絺密葉摵以隕疏雁擢翼於太清燕蟠形乎榛墟秋可哀兮哀良夜之遙長月翳翳以隱雲時籠籠以投光映前軒之踈幌照後帷之間房拊輕衾而不寐臨虛檻而搴裳感時邁以興思情愴愴以含傷大暑賦惟青春之謝兮接朱明之季月何太陽之赫曦乃鬱陶以興熱於是大呂統律祝融紀節蒸澤外熙太隂內閉若乃三伏相仍徂暑肜肜上無纖雲下無微風扶桑赩其增燌天氣曄其南升爾乃土墳墜坼谷枯川竭寒泉潜沸氷井騰沫洪液蒸於單簟兮珠汗霑乎絺葛溫風翕其至兮若灑湯於玉質沃新水以達夕振輕箑以終日禊賦羡暮春之嘉辰美靈氣之和柔結方軌於泰路敷令節而宣遊爾乃闕鈴鳴擢翠旗垂繁纓微雲乘軒清風卷旌飛輪焱起良馬電驚車駕鱗萃男女霧㑹服煥羅縠翠翳連蓋縈香丸於素襟結九齡乎時外粲爛虺韡焜曄發越若乎朝春挺葩夕霞抱月爾乃臨清流背緑柯雲幕髙接丹組四羅梁田賦嬉於夷寧之廣陸步于大野之長京察田疇之疆畔觀遊雉之逸形夜聽笳賦越鳥戀乎南枝胡馬懷夫朔風惟人情之有思乃否滯而發中南閭兮拊掌北閲兮鳴笳鳴笳兮協節分唱兮相和相和兮諧慘激暢兮清哀奏烽燧之初驚展從由之歎乖伸棄兮更纒遷調兮故顏披凉州之妙操掣飛龍之竒引垂幽蘭之游響來楚妃之絶歎放鵾雞之弄音散白雪之清變鞞舞賦專竒巧於樂府兮苞殊妙乎伶人匪繁手之末流兮乃皇世之所珍在廟則格祖考兮在郊則降天神納和氣於兩儀兮通克諧乎君臣協至美於九成兮等太上乎睿文雀叉賦覽嘉藝之機巧特精思於雀叉收泉珍於八極納瓌異以表竒布太陽而擬法妙團團而應規於是妍姿英妙之徒相與競嬖飛寵並修勑理袿襟整服飾黛𤣥睂之琰琰收紅顏而發色流盼閒步輕袂翼翼恃炫豔以相邈常逍遙而侍側昔先王興道立教崇冲讓以致賢不留志於華好缸燈賦殊珍寶器竒像妙工取光藏烟致巧金銅融冶甄流陶形定容爾乃隱以金翳疏以華籠融素膏於回槃發朱曜於綺窗宣耀蘭堂騰明廣宇焰煜爚于茵筵煥照􅀈乎屏組繳彈賦張弱弓理繁繳望大羣以送丸審追放而必獲觀飛鳥賦見逸遊之髙鳥邈飄揚而殊逝擢華毛以迅鶩回徑翼以揚勢披六翮之聮翩振輕體之迢遞遂乃矜形遼廓馮虛安翔翩翻徘徊上下頡頏動素羽之習習亂白質於日光玩流氣以差池弄長風以抑揚攝雙翅以髙舉舒修頸以儴佯目悅妙勢心嘉羽儀愛惠音之嚶嚶美弱翰之參差暫髙凌於景外又抑身乎雲崕乍來乍往若懸若垂象流星之離天似圓物之墜危何斯遊之自得諒逸豫之可希茍臨川而羡魚亦觀翔而樂飛𤣥鳥賦觀羽族之羣類美𤣥鳥之翔集順隂陽以出處隨寒暑而遊蟄擢翾翾之麗容揮連翩之𤣥翼挺參差之修尾發緇素之鮮色及至大火西景啇風吹衣遂匿形於深穴斂六翮而不飛含靜泊以充肌吸至和之精粹淡恬心以去欲故保生而不匱虞衆物之為害獨棄林而憑人不驚畏以自疏永歸馴而附親有受祥而皇祗故遺卵而生殷惟帝皇之嘉美置髙禖以表神類鸞皇之知德象君子之安仁爾乃銜泥構巢營居傳桷積一喙而不已終纍泥而成屋拾柔草以自藉採懦毛以為蓐吐清惠之泠音永吟鳴而自足獵兔賦爾乃乘露箱御良馬盾戈接於廣漠弓矢連於曠野端眺蒿萊摘盱榛穢落日攢慨傍窺蓊薈視毚兔之所隱乃精望而審發弦絶箭激驚伏並斃搜陵危險覓厯岡阜留罾挂於重林疏罝結於通藪密驚視於草間暫見之於䝉茸擬以鋭殳規以良弓覩毫末而放鏃乃殪之於窟中或紛歘赫以驚騖影跳竦而揚白擢輕足之㷀㷀振遊形之躍躍弓不暇彎罝不及幕爾乃鷹鷂翻以飄揚徑翼謖而下猘馬釋控以長騁鬱騰空而陵厲翕習於回阻之間繚繞於山澤之際盤紆遊田其樂泄泄心既倦兮日遷命輿駕兮將還息徒蘭圃秣驥華田目送歸鴻乎揮五絃優哉游哉聊以永年愍桐賦有南國之陋寢植嘉桐乎前庭闡洪根以誕茂豐修幹以繁生納谷風以疏葉含春雨以濯莖濯莖夭夭布葉藹藹蔚童童以重茂䕃蒙接而相蓋蔽隂淡之南表覆陽阿之北外於是詰朝之暇步趾前廡春以遊目夏以清暑昔詩人之所稱美厥生之攸竒植匪岡其不滋識非條其不儀芙容賦臨清池以遊覽觀芙容之麗華潜靈藕於𤣥泉擢修莖乎清波煥然䕃沼灼爾星羅若乃回縈外散菡蓞內離的出豔發葉恢花披緑房翠蒂紫飾紅敷黃螺圓出垂㽔散舒纓以金牙㸃以素珠固陂池之麗觀尊終世之特殊爾乃採淳葩摘圓質析碧皮食素實味甘滋而清美同嘉異乎橙橘參嘉果以作珍長充御乎口實石榴賦覽華圃之嘉樹兮羡石榴之竒生滋𤣥根於夷壤兮擢繁幹於蘭庭霑靈液之粹色兮含渥霧以深榮若乃時雨新稀微風扇物藹萋萋以鮮茂兮紛扶輿以蓊鬱枝摻稔以環柔兮葉鱗次以周密纎條參差以窈窕兮洪柯流離以相拂於是乎青陽之末朱明之初翕微煥以摛采兮的窟㻧以揚敷接翠蕚於緑蒂兮冒紅芽以丹鬚赩然含㽔璀爾散珠若乃叢紈始裏聚葩方離濳暉蜿豔緑采未披照灼攢列熒熒𤣥垂雪酲解䬼怡神實氣冠百品以竒仰邁衆果而持貴宜男花賦淑大邦之竒草兮應則百之休祥禀至貞之靈氣兮顯嘉名以自彰冠衆卉之挺生兮承木德于少陽體柔性剛蕙潔蘭芳結纎根以立本兮靈渥液於青雲順隂陽於滋茂兮笑含章之有文逺而望之若丹霞照青天近而觀之若芙蓉鑒緑泉萋萋翠葉灼灼朱華曄若珠玉之樹煥若景宿之羅充后妃之盛飾兮登紫微之內庭回日月之暉光兮隨天運以虛盈朝華賦咨神樹之修異實積陽之純精蜿潜根以誕節據川壤以擢莖皎日升而朝華𤣥景逝而夕零逮明晨而繁沸若靜夜之衆星長莖攢起柔條列布濯靈柯於時雨滋逸采於豐露灼煌煌以煒煒獨崇朝而達暮於是茂樹蒼蒼纎枝翩翩潜光玉朗緑葉翠鮮浮萍賦步長渠以遊目兮覽隨波之微草紛漂潎以澄茂兮羌孤生於靈沼因纎根以自滋兮乃逸蕩乎波表散圓葉以舒形兮發翠緑以含縹䕃修魚之華鱗兮翳蘭池之清潦既淡淡以順流兮又雍容以隨風有纒薄於崖側兮或回滯乎湍中紛上下其靡常兮漂往來其無窮仰熙陽曜俯慿緑水渟不安處行無定軌流息則寧濤擾則動浮輕善移勢危易蕩似孤臣之介立隨排擠之所往內一志以奉朝兮外結心以絶黨萍出水而立枯兮士失據而身枉覩斯草而慷慨兮固知直道之難爽薺賦寒冬之日余登乎城跬步乎北園覩衆草之萎悴覽林果之零殘悲纎條之槁摧慜枯葉之飄殫見芳薺之時生被畦疇而獨繁鑽重氷而挺茂䝉嚴霜以發鮮含盛陽而弗萌在太隂而斯育永安性於猛寒羌無寧乎暖燠齊精氣於欵冬均貞固乎松竹瓜賦入果林造瓜田摘虎掌拾黃班落蒂離母潰於清泉設難抵疑當路子有疑夏候湛者而謂之曰吾聞有其才而不遇者時也有其時而不遇者命也吾子童幼而岐嶷弱冠而著德少而流聲長而垂名拔萃始立而登宰相之朝揮翼初儀而受卿尹之舉蕩典籍之華談先王之言入閶闔躡丹墀染雕管吐洪輝干當世之務觸人主之威有效矣而官不過散郎舉不過賢良鳳棲五期龍蟠六年英耀秃落羽儀摧殘而獨雍容藝文蕩駘儒林志不輟著述之業口不釋雅頌之音徒費精而耗力勞神而苦心此術亦已薄矣而終莫之辨宜吾子之陸沈也且以言乎才則吾子優矣以言乎時則子之所與二三公者義則骨肉之固交則明道之觀也富於德貴於官其所發明雖叩牛操築之客傭賃抱關之隸負俗懷譏之士猶將登為大夫顯為卿尹於何有寶咳唾之音愛錙銖之力向若垂一鱗回一翼令吾子攀其飛騰之勢挂其羽翼之末猶奮迅於雲霄之際騰驤於四極之外今乃金口玉音漠然沉默使吾子棲遲窮巷守此困極心有窮志貌有饑色吝江河之流不以濯舟船之畔惜東壁之光不以寓貧婦之目抑亦二三公之蔽賢也實吾子之拙惑也夏侯子曰噫湛也幸有過人必知之矣吾子所以褒飾之大矣斟酌之喻非小醜之所堪也然過承古人之誨抑因子大夫之沗在敝室敢布其腹心豈能隱几以覽其槩乎客曰敢祗以聽夏侯子曰吾聞先大夫孔聖之言德之不修學之不講聞義不能徙不善不能改是吾憂也四德具而名位不至者非吾任也是以君子求諸已小人求諸人僕也承門户之業受過庭之訓是以得接冠帶之末充乎士大夫之列頗窺六經之文覽百家之學弱年而入公朝䝉蔽而當顯舉進不能拔羣出萃却不能抗排當世志則乍顯乍昧文則乍幽乍蔚知之者則謂之欲逍遙以養生不知之者則謂之欲遑遑以求達此皆未是僕之所匱也僕又聞世有道則士無所執其節黜陟明則下不在量其力是以當舉而不辭入朝而酬問僕東野之鄙人頑直之陋生也不識當世之便不達朝廷之情不能倚靡容悅出入﨑傾逐巧㸃妍嘔喁辨佞隨羣班之次伏簡墨之後當此之時若失水之魚喪家之狗行不勝衣言不出口安能干當世之務觸人主之威適足以露狂簡而增塵垢縱使心有至言言有偏直此委巷之誠非朝廷之欲也今天子以茂德臨天下以八方六合為四境海內無虞萬國𤣥靜九夷之從王化猶洪聲之收清響黎苗之樂函夏若遊形之招惠景鄉曲之徒一介之士曽諷急就習甲子者皆奮筆揚文議制論道出草茅起林藪御青瑣入金墉者無日不有充三臺之寺盈中書之閣有司不能竟其文當年不能編其籍此執政之所厭聞也若乃羣公百辟卿士常伯被朱佩紫耀金帶白坐而論道者又充路盈寢黃幄玉階之內飽其尺牘矣若僕之言皆糞土之說消磨灰爛垢辱招穢適可克衛士之㸑盈掃除之器譬猶投盈寸之膠而欲使江海易色燒一羽之毛而欲令大爐增勢若燎原之烟彌天之雲噓之不益其熱吸之不減其氣今子見僕入朝暫對便欲坐望髙位吐言數百便謂陵嶒一世何吾子之失評也僕固脂車以須放秣馬以待却反耕於枳落歸志乎渦瀨從容乎農夫優游乎卒嵗矣古者天子畫土以封羣后羣后受國以臨其邦懸大賞以樂其成列九伐以討其違興衰相形安危相傾故在位者以求賢為務受任者以進才為急今也則九州為一家萬國為百郡政有常道法有恆訓因循而禮樂自定揖讓而天下大順夫道學之貴游閭邑之搢紳皆髙門之子世臣之𦙍𢎞風長譽推成而進悠悠者皆天下之彥也諷詁訓傳詩書講儒墨說𤣥虛僕皆不如也二三公之簡僕於凡庸之肆顯僕於細猥之中則為功也重矣時而清談則為親也周矣且古之君子不知士則不明不安是以居逸而思危對食而肴乾今也則否居位者以善身為靜以寡交為慎以弱斷為重以怯言為信不知士者無公誹不得士者不私愧彼在位者皆稷契咎益伊吕周召之倫叔豹仲熊之儔稽古則踰黃唐經緯則越虞夏蔑昆吾之功嗤桓文之勳抵㧙管仲蹉跎晏嬰其逺則欲升鼎湖近則欲超太平方將保重嗇神獨善其身𤣥白冲虛仡爾養真雖力挾太山將不舉一羽揚波萬里將不濯一鱗咳唾成珠玉揮袂出風雲豈肻䠥􅍷鄙事取才進人此又吾子之失言子獨不聞夫神人乎吸風飲露不食五榖登太清遊山嶽靡芝草弄白玉不因而獨備無假而自足不與人路同嗜欲不與世務齊榮辱故能入無窮之門享不死之年以此言之何待進賢客曰聖人有言曰邦有道貧且賤焉耻也今子值有道之世當太平之㑹不攘袂奮氣發謀出竒使鳴鶴受和好爵見縻抑乃沈身郎署約志勤卑不亦羸哉且伊尹之干成湯寧戚之忤桓公或投已鼎爼或庸身飯牛眀廢興之機歌白水之流德入殷王義感齊侯故伊尹起庖厨而登阿衡寧戚出車下而階大夫外無微介內無請謁矯身擢手徑躡名位吾子亦何不慕賢以自厲希古以慷慨乎夏侯子曰嗚呼是何言歟富與貴是人之所欲非僕之所惡也夫干將之劒陸斷狗馬水截蛟龍而鉛刀不能入泥騏驥驊騮之乘一日而致千里而駑蹇不能邁畝百錬之鑑别鬚眉之數而壁土不見泰山鴻鵠一舉橫四海之區出青雲之外而尺鷃不陵桑榆此利鈍之較優劣之决也夫欲進其身者不過千萬乘而僕已上朝堂答世問不過顯所知而僕已竭心思盡才學意無雅正可凖論無片言可採是以頓於鄙劣而莫之能起也以此言之僕何為其不自衒哉子不嫌僕德之不劭而疑其位之不到是猶反鏡而索照登木而下釣僕未以此為不肖也若乃伊尹負鼎以干湯吕尚隱遊以徼文傅說操築以寤主寧戚擊角以要君此非僕所能也莊周駘蕩以放言君平賣卜以自賢接輿陽狂以蔽身梅福棄家以求仙又非僕之所安也若乃季札抗節於延陵揚雄覃思於太𤣥伯玉和柔於仕懷桞惠三絀於士官僕雖不敏竊頗倣佛其清塵序羊秉序羊秉為撫軍參軍少亡冇令譽夏侯孝若為之叙極相讃悼羊權為黃門侍郎侍簡文坐帝問曰夏侯湛作羊秉序絶可想是卿何物秉字長達太山平陽人漢南陽太守續曽孫大父魏郡府君即車騎掾元子也府君夫人鄭氏無子乃養秉齠齓而佳小心敬慎十嵗而鄭夫人薨秉思容盡哀俄而公府掾及夫人並卒秉羣從父率禮相承人不間其親雍雍如也仕參撫軍將軍事將奮千里之足揮冲天之翼惜乎春秋三十有二而卒昔罕虎死子産以為無與為善自夫子之沒有子産之歎矣亡後有子男又不育是何行善而禍繁也豈非司馬生之所惑歟從祖叔權幼權序稱字叔權自孺子而好合聚童兒為之渠帥戲必為軍旅戰陳之事有違者輒嚴以鞭捶衆莫敢逆淵隂竒之使讀項羽傳及兵書不肯曰能則自為耳安能學人年十六淵與之田見奔虎稱驅馬逐之禁之不可一箭而倒名聞太祖太祖把其手喜曰我得汝矣與文帝為布衣之交每宴㑹氣陵一坐辨士不能屈世之髙名者多從之游年十八卒弟榮字幼權幼聰慧七嵗能屬文誦書日千言經目輒識之文帝聞而請焉賓客百餘人人一奏刺悉書其鄉邑名氏世所謂爵里刺也客示之一寓目使之遍談不謬一人帝深竒之漢中之敗榮年十三左右提之走不肻曰君親在難焉所逃死乃奮劎而戰遂沒陳誥昆弟誥惟正月才生魄湛若曰咨爾昆弟淳琬瑫謨總瞻古人有言孝乎惟孝友于兄弟死喪之威兄弟孔懷又曰周之有至德也莫如兄弟於戲古之載于訓籍傳于詩書者厥乃不思不可不行爾其專乃心一乃聽砥礪乃惟以聽我之格言淳等拜手稽首湛若曰嗚呼惟我皇乃祖滕公肇釐厥德厥功以左右漢祖𢎞濟于嗣君用垂祚于後世世增敷前軌濟其好行美德明允相繼冠冕胥及以逮于皇曽祖愍侯寅亮魏祖用康乂厥世遂啓土宇以大綜厥勳于家我皇祖穆侯崇厥基以允釐顯志用恢闡我令業維我后府君侯祗服哲命欽明文思以熙柔我家道丕隆我先緒欽若稽古訓用敷訓興藉乃綜其微言嗚呼自三墳五典八索九丘圖緯六藝及百家衆流罔不探賾索隱鉤深致逺洪範九疇彛倫攸叙乃命世立言越用繼尼父之大業斯文在兹且九齡而我王母薛妃登遐我后孝思罔極惟以奉于穆侯之繼室蔡姬以致其子道蔡姬登遐隘于穆侯之命厥禮乃不得成用不祔于祖始惟乃用騁其永慕厥乃以疾辭位用遜于厥家布衣席槀以終于三載厥乃古訓無文我后丕孝其心用假于厥制以穆于世父使君侯惟伯后聰明睿智奕世載德用慈友于我后我惟蒸蒸是䖍罔不克承厥誨用增茂我敦篤以播休美于一世厥乃可不遵惟我用夙夜匪懈日鑽其道而仰之彌髙鑽之彌堅我用欲罷不敢豈惟豫躬是懼實令跡是奉厥乃晝分而食夜分而寢豈唯令跡是畏實爾猶是儀嗚呼余其敬哉俞余聞之周之有至德有婦人焉我母氏羊姬宣慈愷悌明粹篤誠以撫訓羣子厥乃我齔齒則受厥教于書學未遑惟寧敦詩書禮樂孳孳弗倦我有識惟與汝服厥誨惟仁義惟孝友是尚憂深思逺祗以防于微翳義形於色厚愛平恕以濟其寬裕用緝和我七子訓迪我五妹惟我兄弟姊妹束修慎行用不辱于冠帶實母氏是憑余其為政蕞爾惟母氏仁之不行是戚余其望色思寬獄之不情教之不泰是訓豫其納戒思詳嗚呼惟母氏信著于不言行感于神明若夫恭事于蔡姬敦穆于九族乃髙于古之人古之人厥乃千里承師矧我惟父惟母世德之餘烈服膺之弗可及景仰之弗可階汝其念哉俾羣弟天祚于我家俾爾咸休眀是履淳英哉文明柔順琬乃沉毅篤固惟瑫厥清粹平理謨茂哉雋哲寅亮總其𢎞肅簡雅瞻乃純鑠惠和惟我䝉蔽極否于義訓嗟爾六弟汝其滋義洗心以補豫之尤余乃亦不敢忘汝之闕嗚呼小子瞻汝其見豫之長于仁未見豫之長于義也瞻曰俞以何如湛若曰我之肇于總角以逮于弱冠暨于今之二毛受學于先載納誨于嚴父慈母豫其敬怠于厥身而匡豫之纎介翼豫之小疵使豫有過未曽不知余知之逌改惟冲子是賴豫親于心愛于中敬于貌厥乃口無擇言柔惠且直廉而不劌肅而不厲厥其成豫哉用集我父母之訓庶明厲翼邇可遠在兹瞻拜手稽首曰俞湛曰都在修身在愛人瞻曰吁惟聖其難之湛曰都厥不行惟難厥行惟易淳曰俞明而昧崇而俾冲而恆顯而賢同而疑厲而柔和而務湛曰俞乃言厥有道淳曰俞祗服訓湛曰來琬汝亦昌言琬曰俞身不及於人不敢墮於勤厥故惟新湛曰俞瑫亦昌言瑫曰俞滋敬于已不滋敬于已惟敬乃恃無忘有耻湛曰俞謨亦昌言謨曰俞無忘於不可不虞形貌以心訪心於虞湛曰俞總亦昌言總曰俞若憂厥憂以休湛曰俞瞻亦昌言瞻曰俞復外惟內取諸內不忘諸外湛曰俞休哉淳等拜手稽首湛亦拜手稽首乃歌曰明德復哉家道休哉世祚悠哉百祿周哉又作歌曰訊德恭哉訓翼從哉內外康哉皆拜曰欽哉贊東方朔畫贊有序大夫諱朔字曼倩平原厭次人也魏建安中分厭次以為樂陵郡故又為郡人焉事漢武帝漢書具載其事先生瓌瑋博達思周變通以為濁世不可以富貴也故薄游以取位茍出不可以直道也故頡頏以傲世傲世不可以垂訓也故正諫以明節明節不可以久安也故詼諧以取容潔其道而穢其迹清其質而濁其文弛張而不為邪進退而不離羣若乃逺心曠度贍智宏材倜儻博物觸類多能合變以明算幽贊以知來自三墳五典八索九丘隂陽圖緯之學百家衆流之論周給敏捷之辨支離覆逆之數經脉藥石之藝射御書計之術乃研精而究其理不習而盡其功經目而諷於口過耳而暗於心夫其明濟開豁包含𢎞大陵轢卿相嘲哂豪傑籠罩靡前跆藉貴勢出不休顯賤不憂戚戲萬乘若寮友視儔列如草芥雄節邁倫髙氣蓋世可謂拔乎其萃游方之外者已談者又以先生噓吸冲和吐故納新蟬蛻龍變棄俗登仙神交造化靈為星辰此又竒怪惚恍不可備論者也大人來守此國僕自京都言歸定省覩先生之縣邑想先生之髙風徘徊路寢見先生之遺像逍遙城郭觀先生之祠宇慨然有懷乃作頌焉其辭曰矯矯先生肥遁居貞退不終否進亦避榮臨世濯足希古振纓涅而無滓既濁能清無滓伊何髙明克柔能清伊何視汚若浮樂在必行處淪罔憂跨世陵時逺蹈獨游瞻望往代爰想遐蹤邈邈先生其道猶龍染迹朝隱和而不同棲遲下位聊以從容我來自東言適兹邑敬問墟墳企佇原隰墟墓徒存精靈永戢民思其軌祠宇斯立徘徊寺寢遺像在圖周旋祠宇庭序荒蕪榱棟傾落草萊弗除肅肅先生豈焉是居是居弗形悠悠我情昔在有德罔不遺靈天秩有禮神監孔明倣佛風塵用垂頌聲虞舜贊有虞愔愔揖讓鼓琴垂拱臨民詠彼南音世澄道𤣥天下混心民思王度如玉如金左丘明贊世亂讒勝君子道憂丘明達聖致志春秋微言逃難旁行不流庶幾斯文希志訓猷顔子贊知章知微體深研機明象介石量同聖師探賾罔滯在言靡遺仰之惟髙瞻之攸希閔子騫贊聖既擬天賢亦希聖蒸蒸子騫立體忠正干祿辭親事親盡敬勉心景迹擢辭流詠莊周贊邁邁莊周騰世獨遊遁時放言齊物絶尤垂釣一壑取戒犧牛望風寄心託志清流管仲贊堂堂管生忘存興仁仁道在已唯患無身包辱逺害思濟彞倫心寄鮑子動成生民鮑叔贊鮑叔愔愔式昭德音綢繆敬叔二人同心厥芳猶蘭其堅如金遙遙景迹君子攸欽范蠡贊悠悠范子求仁在已進報危國退𢎞妙理身與勳偕名與身否逸羣逺遊永齊終始魯仲連贊峩峩先生有邈其節流仁憂亂抗道自潔隨事抑揚與時開闔在幽能泰處悶惟悅傳外祖母憲英傳憲英聰明有才鑒初文帝與陳思王爭為太子既而文帝得立抱毗頸而喜曰辛君知我喜不毗以告憲英憲英歎曰太子代君主宗廟社稷者也代君不可以不戚主國不可以不懼宜戚而喜何以能久魏其不昌乎弟敞為大將軍曹爽參軍司馬宣王將誅爽因爽出閉城門大將軍司馬魯芝將爽府兵犯門斬關出城門赴爽來呼敞俱去敞懼問憲英曰天子在外太傅閉城門人云將不利國家於事可得爾乎憲英曰天下有不可知然以吾度之太傅殆不得不爾明皇帝臨崩把太傅臂以後事付之此言猶在朝士之耳且曹爽與太傅俱受寄託之任而獨專權勢行以驕奢與王室不忠與人道不直此舉不過以誅曹爽耳敞曰然則事就乎憲英曰得無殆就爽之才非太傅之偶也敞曰然則敞可以無出乎憲英曰安可以不出職守人之大義也凡人在難猶或恤之為人執鞭而棄其事不祥不可也且為人死為人任親昵之職也從衆而已敞遂出宣王果誅爽事定之後敞歎曰吾不謀於姊幾不獲於義逮鍾㑹為鎮西將軍憲英為從子羊祜曰鍾士季何故西出祜曰將為滅蜀也憲英曰㑹在事縱恣非特久處下之道吾畏其有他志也祜曰季母勿多言其後㑹請子琇為參軍憲英憂曰他日見鍾㑹之出吾為國憂之矣今日難至吾家此國之大事必不得止也琇固請司馬文王文王不聽憲英語琇曰行矣戒之古之君子入則致孝於親出則致節於國在職思其所司在義思其所立不遺父母憂患而已軍旅之間可以濟者其惟仁恕乎汝其慎之琇竟以全身憲英年至七十有九泰始五年卒詩周詩叙曰周詩者南垓白華華黍由庚崇丘由儀六篇有其義而亡其辭湛續其亡故云周詩也既殷斯䖍仰說洪恩夕定晨省奉朝侍昏宵中告退雞鳴在門孳孳恭誨夙夜是敦山路吟夙駕兮待明陟山路兮遐征冒晨朝兮入大谷道逶迤兮嵐氣清攬轡兮抑馬踟蹰兮曠野曠野􅀈兮遼落崇嶽兮嵬㠋丘陵兮連離卉木兮交錯淥水兮長流驚濤兮拂石江上泛歌悠悠兮逺征倐倐兮暨南荆南荆兮臨長江臨長江兮討不庭江水兮浩浩長流兮萬里洪浪兮雲轉陽侯兮奔起驚翼兮垂天鯨魚兮嶽時䕷蕪紛兮被臯陸修竹鬱兮翳崖趾望江之南兮遨目桂林桂枝蓊鬱兮鵾雞揚音凌波兮願濟舟楫不具兮江水深沈嗟回盼於北夏何歸軫之難尋離親詠剖符兮南荆辭親兮遐征發軔兮皇京夕臻兮泉亭撫首兮內顧按轡兮安步仰戀兮後塗俯歎兮前路既感物以永思兮且歸身乎懷抱茍違親以從利兮匪曾閔之攸寶視微榮之瑣瑣兮知吾志之愈小獨申愧於一心兮慙報德之彌少長夜謡日暮兮初晴天灼灼兮遐清披雲兮歸山垂景兮照庭列宿兮皎皎星稀兮月明亭檐隅以逍遙兮盼太虛以仰觀望閶闔之昭晰兮麗紫微之暉煥寒苦謠惟立冬之初夜天慘凛以降寒霜皚皚以被庭冰溏瀩於井幹草械械以疏葉木蕭蕭以零殘松隕葉於翠條竹槯柯於緑竿征邁辭上伊闕兮臨川拊駿馬兮授鞍中衢兮截歎斂鞚兮盤桓漢魏六朝百三家集卷四十四
