body:
  text: 漢魏六朝百三家集卷三漢董仲舒集題詞史記儒林傳載廣川董氏與胡母生春秋同列無大褒異至漢書始特為立傳贊述劉子政與劉歆劉龔言論抑揚其辭以寄鄭重凡人輕今貴古賢者不免太史公與董生並遊武帝朝或心易之孟堅後生本先儒之説推崇前輩則有叩頭户下耳正誼明道西漢絶學遂為儒宗三䇿三對君臣喜起文章大醇禮記儔也公孫用事同學懷妬出相膠西謝病自免悲哉董生向賦不遇今其然耶然尊孔氏斥百家立學校舉茂才王者制度皆發自董生身雖廢言何嘗不顯哉髙廟燔災間居擬對私家書也主父挾奏吕生妄譏下吏當死漢法失刑與誅腹誹何殊宋儒因武帝好殺窮迹淮南曲罪董生一對上啓殘賊將生罪反居張湯上乎非論之平也目録賦士不遇賦䇿賢良䇿一并制賢良䇿二并制賢良䇿三并制章乞種麥限田章書詣丞相公孫𢎞記室書對髙廟園災對雨雹對郊祀對頌山川頌春秋陰陽漢魏六朝百三家集卷三目録欽定四庫全書漢魏六朝百三家集卷三明張溥輯漢董仲舒集賦士不遇賦嗚呼嗟乎遐哉邈矣時來遏遲去之速矣屈意從人非吾徒矣正身俟時將就木矣悠悠偕時豈能覺矣心之憂歟不期祿矣皇皇匪寧祗增辱矣努力觸藩徒摧角矣不出户庭庶無過矣生不丁三代之聖隆兮而丁三季之末俗以辨詐而期通兮貞士耿介而自束雖日三省於吾身兮猶懷進退之惟谷彼實繁之有徒兮指其白而為黑目信嫮而視眇兮口信辨而言訥鬼神不能正人事之變戻兮聖賢亦不能開愚夫之違惑出門則不可以偕往兮藏器又嗤其不容退洗心而內訟兮亦未知其所從也觀上古之清濁兮廉士亦煢煢而靡歸殷湯有卞隨與務光兮周武有伯夷與叔齊卞隨務光遁迹於深淵兮伯夷叔齊登山而采微使彼聖人其猶周遑兮矧舉世而同迷若伍員與屈原兮固亦無所復顧亦不能同彼數子兮將逺遊而終慕於吾儕之云逺兮疑荒逺而難踐憚君子之于行兮誡三日而不飯嗟天下之偕違兮悵無與之偕返孰若返身於素業兮莫隨世而輪轉雖矯情而獲百利兮復不如正心而歸一善紛既迫而後動兮豈云稟性之惟𥚹同人而大有兮明謙光而務展遵幽昧於默足兮豈舒采而蘄顯茍肝膽之可同兮奚鬚髮之足辨也策賢良策一制曰朕獲承至尊休德傳之無窮而施之罔極任大而守重是以夙夜不遑康寧永惟萬事之統猶懼有闕故廣延四方之豪雋郡國諸侯公選賢良修潔博習之士欲聞大道之要至論之極今子大夫褎然為舉首朕甚嘉之子大夫其精心致思朕垂聽而問焉蓋聞五帝三王之道改制作樂而天下洽和百王同之當虞氏之樂莫盛於韶於周莫盛於勺聖王已沒鐘鼓管絃之聲未衰而大道微缺陵夷至乎桀紂之行王道大壞矣夫五百年之間守文之君當塗之士欲則先王之法以戴翼其世者甚衆然猶不能反日以仆滅至後王而後止豈其所持操或悖謬而失其統與固天降命不可復反必推之於大衰而後息與嗚呼凡所為屑屑夙興夜寐務法上古者又將無補與三代受命其符安在災異之變何緣而起性命之情或夭或壽或仁或鄙習聞其號未燭厥理伊欲風流而令行刑輕而姦改百姓和樂政事宣昭何修何飭而膏露降百穀登德潤四海澤臻草木三光全寒暑平受天之祐享鬼神之靈德澤洋溢施乎方外延及羣生子大夫明先聖之業習俗化之變終始之序講問髙誼之日久矣其明以諭朕科别其條勿猥勿并取之於術慎其所出乃其不正不直不忠不極枉與執事書之不泄興于朕躬毋悼後害子大夫其盡心靡有所隱朕將親覽焉對曰陛下發德音下明詔求天命與性情皆非愚臣之所能及也臣謹按春秋之中視前世已行之事以觀天人相與之際甚可畏也國家將有失道之敗而天乃先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至以此見天心之仁愛人君而欲止其亂也自非大無道之世者天盡欲扶持而安全之事在強勉而已矣強勉學問則聞見博而知益明強勉行道則德日起而大有功此皆可使還至而立有效者也詩曰夙夜匪懈書曰茂哉茂哉皆強勉之謂也道者所繇適於治之路也仁義禮樂皆其具也故聖王已歿而子孫長久安寧數百歲此皆禮樂教化之功也王者未作樂之時乃用先王之樂宜於世者而以深入教化於民教化之情不得雅頌之樂不成故王者功成作樂樂其德也樂者所以變民風化民俗也其變民也易其化人也著故聲發於和而本於情接於肌膚藏於骨髓故王道雖微缺而管絃之聲未衰也夫虞氏之不為政久矣然而樂頌遺風猶有存者是以孔子在齊而聞韶也夫人君莫不欲安存而惡危亡然而政亂國危者甚衆所任者非其人而所繇者非其道是以政日以仆滅也夫周道衰於幽厲非道亡也幽厲不由也至於宣王思昔先王之德興滯補弊明文武之功業周道粲然復興詩人美之而作上天祐之為生賢佐後世稱頌至今不絶此夙夜不解行善之所致也孔子曰人能𢎞道非道𢎞人也故治亂廢興在於己非天降命不可得反其所操持悖謬失其統也臣聞天之所大奉使之王者必有非人力所能致而自至者此受命之符也天下之人同心歸之若歸父母故天瑞應誠而至書曰白魚入于王舟有火復于王屋流為烏此蓋受命之符也周公曰復哉復哉孔子曰德不孤必有鄰皆積善纍德之效也及至後世淫佚衰微不能統理羣生諸侯背畔殘賊良民以爭壤土廢德教而任刑罰刑罰不中則生邪氣邪氣積於下怨惡畜於上上下不和則隂陽繆盩而妖孽生矣此災異所緣而起也臣聞命者天之令也性者生之質也情者人之欲也或天或壽或仁或鄙陶冶而成之不能粹美有治亂之所生故不齊也孔子曰君子之德風小人之德草草上之風必偃故堯舜行德則民仁壽桀紂行暴則民鄙天夫上之化下下之從上猶泥之在鈞惟甄者之所為猶金之在鎔唯冶者之所鑄綏之斯徠動之斯和此之謂也臣謹按春秋之文求王道之端得之於正正次王王次春春者天之所為也正者王之所為也其意曰上承天之所為而下以正其所為正王道之端云爾然則王者欲有所為宜求其端於天天道之大者在隂陽陽為德隂為刑刑主殺而德主生是故陽常居大夏而以生育長養為事隂常居大冬而積於空虛不用之處以此見天之任德不任刑也天使陽出布施於上而主歲功使隂入伏於下而時出佐陽陽不得隂之助亦不能獨成歲終陽以成歲為名此天意也王者承天意以從事故任德教而不任刑刑者不可任以治世猶隂之不可任以成歲也為政而任刑不順於天故先王莫之肯為也今廢先王德教之官而獨任執法之吏治民毋乃任刑之意與孔子曰不教而誅謂之虐虐政用於下而欲德教之被四海故難成也臣謹按春秋謂一元之意一者物之所從始也元者辭之所謂大也謂一為元者視大始而欲正本也春秋深探其本而反自貴者始故為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正逺近莫敢不一於正而亡有邪氣姦其間者是以隂陽調而風雨時羣生和而萬民殖五穀熟而草木茂天地之間被潤澤而大豐美四海之內聞盛德而皆徠臣諸福之物可致之祥莫不畢至而王道終矣孔子曰鳳鳥不至河不出圖吾已矣夫自悲可致此物而身卑賤不得致也今陛下貴為天子富有四海居得致之位操可致之勢又有能致之資行髙而恩厚知明而意美愛民而好士可謂誼主矣然而天地未應而美祥莫至者何也凡以教化不立而萬民不正也夫萬民之從利也如水之走下不以教化隄防之不能止也是故教化立而姦邪皆止者其隄防完也教化廢而姦邪並出刑罰不能勝者其隄防壞也古之王者明於此是故南面而治天下莫不以教化為大務立大學以教於國設庠序以化於邑漸民以仁摩民以誼節民以禮故其刑罰甚輕而禁不犯者教化行而習俗美也聖王之繼亂世也掃除其迹而悉去之復修教化而崇起之教化已明習俗已成子孫循之行五六百歲尚未敗也至周之末世大為亡道以失天下秦繼其後獨不能改又益甚之重禁文學不得挾書棄捐禮義而惡聞之其心欲盡滅先聖之道而顓為自恣茍簡之治故立為天子十四歲而國破亡矣自古以來未嘗有以亂濟亂大敗天下之民如秦者也其遺毒餘烈至今未滅使習俗薄惡人民嚚頑抵冒殊扞孰爛如此之甚者也孔子曰腐朽之木不可雕也糞土之墻不可圬也今漢繼秦之後如朽木糞墻矣雖欲善治之亡可奈何法出而姦生令下而詐起如以湯止沸抱薪救火愈甚亡益也竊譬之琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也當更張而不更張雖有良工不能善調也當更化而不更化雖有大賢不能善治也故漢得天下以來常欲善治而至今不可善治者失之於當更化而不更化也古人有言曰臨淵羡魚不如退而結網今臨政而願治七十餘歲矣不如退而更化更化則可善治善治則災害日去福祿日來詩云宜民宜人受祿於天為政而宜於民者固當受祿於天夫仁義禮智信五常之道王者所當修飭也五者修飭故受天之祐而享鬼神之靈德施於方外延及羣生也賢良䇿二制曰蓋聞虞舜之時遊於巖廊之上垂拱無為而天下太平周文王至於日昃不暇食而宇內亦治夫帝王之道豈不同條共貫與何逸勞之殊也蓋儉者不造玄黃旌旗之飾及至周室設兩觀乘大路朱干玉戚八佾陳於庭而頌聲興夫帝王之道豈指異哉或曰良玉不琢又云非文亡以輔德二端異焉殷人執五刑以督姦傷肌膚以懲惡成康不式四十餘年天下不犯囹圄空虛秦國用之死者甚衆刑者相望耗矣哀哉嗚呼朕夙寤晨興惟前帝王之憲永思所以奉至尊章洪業皆在力本任賢今朕親耕籍田以為農先勸孝弟崇有德使者冠蓋相望問勤勞恤孤獨盡思極神功烈休德未始云獲也今隂陽錯繆氛氣充塞羣生寡遂黎民未濟廉恥貿亂賢不肖渾殽未得其真故詳延特起之士意庶幾乎今子大夫待詔百有餘人或道世務而未濟稽之上古而不同考之於今而難行毋乃牽於文繫而不得騁與將所由異術所聞殊方與各悉對著于篇毋諱有司明其指略切磋究之以稱朕意對曰臣聞堯受命以天下為憂而未以位為樂也故誅逐亂臣務求賢聖是以得舜禹稷卨咎繇衆聖輔德賢能佐職教化大行天下和洽萬民皆安仁樂誼各得其宜動作應禮從容中道故孔子曰如有王者必世而後仁此之謂也堯在位七十載乃遜于位以禪虞舜堯崩天下不歸堯子丹朱而歸舜舜知不可辟乃即天子之位以禹為相因堯之輔佐繼其統業是以垂拱無為而天下治孔子曰韶盡美矣又盡善也此之謂也至於殷紂逆天暴物殺戮賢知殘賊百姓伯夷太公皆當世賢者隱處而不為臣守職之人皆奔走逃亡入於河海天下耗亂萬民不安故天下去殷而從周文王順天理物師用賢聖是以閎夭太巔散宜生等亦聚於朝廷愛施兆民天下歸之故太公起海濱而即三公也當此之時紂尚在上尊卑昏亂百姓散亡故文王悼痛而欲安之是以日昃而不暇食也孔子作春秋先正王而繫萬事見素王之文焉由此觀之帝王之條貫同然而勞逸異者所遇之時異也孔子曰武盡美矣未盡善也此之謂也臣聞制度文采玄黃之飾所以明尊卑異貴賤而勸有德也故春秋受命所先制者改正朔易服色所以應天也然則宫室旌旗之制有法而然者也故孔子曰奢則不遜儉則固儉非聖人之中制也臣聞良玉不琢資質潤美不待刻琢此亡異於達巷黨人不學而自知也然則常玉不琢不成文章君子不學不成其德臣聞聖王之治天下也少則習之學長則材諸位爵祿以養其德刑罰以威其惡故民曉於禮誼而恥犯其上武王行大誼平殘賊周公作禮樂以文之至於成康之隆囹圄空虛四十餘年此亦教化之漸而仁義之流非獨傷肌膚之效也至秦則不然師申商之法行韓非之説憎帝王之道以貪狠為俗非有文德以教訓於下也誅名而不察實為善者不必免而犯惡者未必刑也是以百官皆飾空言虛詞而不顧實外有事君之禮內有背上之心造偽飭詐趣利無恥又好用憯酷之吏賦斂無度竭民財力百姓散亡不得從耕織之業羣盜並起是以刑者甚衆死者相望而姦不息俗化使然也故孔子曰道之以政齊之以刑民免而無恥此之謂也今陛下并有天下海內莫不率服廣覽兼聽極羣臣之知盡天下之美至德昭然施於方外夜郎康居殊方萬里説德歸誼此太平之致也然而功不加於百姓者殆王心未加焉曽子曰尊其所聞則髙明矣行其所知則光大矣髙明光大不在於他在乎加之意而己願陛下因用所聞設誠於內而致行之則三王何異哉陛下親耕籍田以為農先夙寤晨興憂勞萬民思惟往古而務以求賢此亦堯舜之用心也然而未云獲者士素不厲也夫不素養士而欲求賢譬猶不琢玉而求文采也故養士之大者莫大乎太學大學者賢士之所關也教化之本原也今以一郡一國之衆對亡應書者是王道往往而絶也臣願陛下興太學置明師以養天下之士數考問以盡其材則英俊宜可得矣今之郡守縣令民之師帥所使承流而宣化也故師帥不賢則主德不宣恩澤不流今吏既亡教訓於下或不承用主上之法暴虐百姓與姦為市貧窮孤弱寃苦失職甚不稱陛下之意是以隂陽錯繆氛氣充塞羣生寡遂黎民未濟皆長吏不明使至於此也夫長吏多出於郎中郎中吏二千石子弟選郎吏又以富訾未必賢也且古所謂功者以任官稱職為差非所謂積日纍久也故小材雖纍日不離於小官賢材雖未久不害為輔佐是以有司竭力盡致務治其業而以赴功今則不然纍日以取貴積久以致官是以廉恥貿亂賢不肖渾殽未得其真臣愚以為使諸列侯郡守二千石各擇其吏民之賢者歲貢各二人以給宿衛且以觀大臣之能所貢賢者有賞所貢不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也遍得天下之賢人則三王之盛易為而堯舜之名可及也毋以日月為功實試賢能為上量材而授官録德而定位則廉恥殊路賢不肖異處矣陛下加惠寬臣之罪勿牽制於文使得切磋究之臣敢不盡愚賢良䇿三制曰蓋聞善言天者必有徴於人善言古者必有驗於今故朕垂問乎天人之應上嘉唐虞下悼桀紂寢微寖滅寖明寖昌之道虛心以改今子大夫明於隂陽所以造化習於先聖之道業然而文采未極豈惑乎當世之務哉條貫靡竟統紀未終意朕之不明與聽若眩與夫三王之教所祖不同而皆有失或謂久而不易者道也意豈異哉今子大夫既已著大道之極陳治亂之端矣其悉之究之孰之復之詩不云乎嗟爾君子毋常安息神之聽之介爾景福朕將親覽焉子大夫其茂明之對曰臣聞論語曰有始有卒者其惟聖人乎今陛下幸加惠留聽於承學之臣復下明册以切其意而究盡聖德非愚臣之所能具也前所上對條貫靡竟統紀不終辭不别白指不分明此臣淺陋之罪也册曰善言天者必有徴於人善言古者必有驗於今臣聞天者羣物之祖也故遍覆包涵而無所殊建日月風雨以和之經隂陽寒暑以成之故聖人法天而立道亦溥愛而亡私布德施仁以厚之設誼立禮以導之春者天之所以生也仁者君之所以愛也夏者天之所以長也德者君之所以養也霜者天之所以殺也刑者君之所以罰也繇此言之天人之徴古今之道也孔子作春秋上揆之天道下質諸人情參之於古考之於今故春秋之所譏災害之所加也春秋之所惡怪異之所施也書邦家之過兼災異之變以此見人之所為其美惡之極乃與天地流通而往來相應此亦言天之一道也古者修教訓之官務以德善化民民已大化之後天下常亡一人之獄矣今世廢而不修亡以化民民以故棄行誼而死財利是以犯法而罪多一歲之獄以萬千數以此見古之不可不用也故春秋變古則譏之天令之謂命命非聖人不行質朴之謂性性非教化不成人欲之謂情情非度制不節是故王者上謹於承天意以順天也下務明教化民以成性也正法度之宜别上下之序以防欲也修此三者而大本舉矣人受命於天固超然異於羣生入有父子兄弟之親出有君臣上下之誼會聚相遇則有耆老長幼之施粲然有文以相接歡然有恩以相愛此人之所以貴也生五穀以食之桑麻以衣之六畜以養之服牛乘馬圈豹檻虎是其得天之靈貴於物也故孔子曰天地之性人為貴明於天性知自貴於物知自貴於物然後知仁誼知仁誼然後重禮節重禮節然後安處善安處善然後樂循理樂循理然後謂之君子故孔子曰不知命亡以為君子此之謂也册曰上嘉唐虞下悼桀紂寖微寖滅寖明寖昌之道虛心以改臣聞聚少成多積小致巨故聖人莫不以暗致明以微致顯是以堯發於諸侯舜興乎深山非一日而顯也蓋有漸以致之矣言出於已不可塞也行發於身不可掩也言行治之大者君子之所以動天地也故盡小者大慎微者著詩曰惟此文王小心翼翼故堯兢兢日行其道而舜業業日致其孝善積而名顯德章而身尊此其寖明寖昌之道也積善在身猶長日加益而人不知也積惡在身猶火銷膏而人不見也非明乎情性察乎流俗者孰能知之此唐虞之所以得令名而桀紂之可為悼懼者也夫善惡之相從如景響之應形聲也故桀紂暴謾讒賊並進賢知隱伏惡日顯國日亂晏然自以如日在天終陵夷而大壞夫暴逆不仁者非一日而亡也亦以漸至故桀紂雖亡道然猶享國十餘年此其寖微寖滅之道也册曰三王之教所祖不同而皆有失或謂久而不易者道也意豈異哉臣聞夫樂而不亂復而不厭者謂之道道者萬世無弊弊者道之失也先王之道必有偏而不起之處故政有眊而不行舉其偏者以補其弊而已矣三王之道所祖不同非其相反將以救溢扶衰所遭之變然也故孔子曰無為而治者其舜乎改正朔易服色以順天命而已其餘盡循堯道何更為哉故王者有改制之名無變道之實然夏上忠殷上敬周上文者所繼之救當用此也孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也此言百王之用以此三者矣夏因於虞而獨不言所損益者其道如一而所上同也道之大原出於天天不變道亦不變是以禹繼舜舜繼堯三聖相受而守一道亡救弊之政也故不言其所損益也由是觀之繼治世者其道同繼亂世者其道變今漢繼大亂之後若冝少損周之文致用夏之忠者陛下有明德嘉道愍世俗之靡薄悼王道之不昭故舉賢良方正之士論議考問將欲興仁誼之休德明帝王之法制建太平之道也臣愚不肖述所聞誦所學道師之言厪能勿失耳若乃論政事之得失察天下之息耗此大臣輔政之職三公九卿之任非臣仲舒所能及也然而臣竊有怪者夫古之天下亦今之天下今之天下亦古之天下共是天下古亦大治上下和睦習俗美盛不令而行不禁而止吏亡姦邪民無盜賊囹圄空虛德潤草木澤被四海鳯凰來集麒麟來遊以古凖今一何不相逮之逺也安所繆盩而陵夷若是意者有所失於古之道與有所詭於天之理與試迹之古返之於天黨可得見乎夫天亦有所分豫豫之齒者去其角傅之翼者兩其足是所受大者不得取小也古之所豫祿者不食於力不動於末是亦受大者不得取小與天同意者也夫已受大又取小天不能足而况人乎此民之所以囂囂苦不足也身寵而載髙位家溫而食厚祿因乘冨貴之資力以與民爭利於下民安能如之哉是故衆其奴婢多其牛羊廣其田宅博其産業畜其積委務此而亡己以迫蹴民民日削月浚寖以大窮冨者奢侈羡溢貧者窮急愁苦窮急愁苦而上不救則民不樂生民不樂生尚不避死安能避罪此刑罰之所以蕃而姦邪不可勝者也故受祿之家食祿而已不與民爭業然後利可均布而民可家足此上天之理而亦太古之道天子之所宜法以為制大夫之所當循以為行也故公儀子相魯之其家見織帛怒而出其妻食於舍而茹葵愠而拔其葵曰吾已食祿又奪園夫紅女利乎古之賢人君子在列位者皆如是是故下髙其行而從其教民化其廉而不貪鄙及至周室之衰其卿大夫緩於誼而急於利亡推讓之風而有爭田之訟故詩人疾而刺之曰節彼南山維石巖巖赫赫師尹民具爾瞻爾好誼則民鄉仁而俗善爾好利則民好邪而俗敗由是觀之天子大夫者下民之所視效逺方之所四面而內望也近者視而放之逺者望而效之豈可以居賢人之位而為庶人之行哉夫皇皇求財利常恐乏匱者庶人之意也皇皇求仁義常恐不能化民者大夫之意也易曰負且乘致寇至乘車者君子之位也負擔者􅘁人之事也此言居君子之位而為庶人之行者其禍患必至也若居君子之位當君子之行則舍公儀休之相魯亡可為者矣春秋大一統者天地之常經古今之通誼也今師異道人異論百家殊方指意不同是以上亡以持一統法制數變下不知所守臣愚以為諸不在六藝之科孔子之術者皆絶其道勿使並進邪辟之説滅息然後統紀可一而法度可明民知所從矣章乞種麥限田章春秋他穀不書至於麥禾不成則書之以此見聖人於五穀最重麥與禾也今關中俗不好種麥是歲失春秋之所重而損生民之具也願陛下幸詔大農使關中民益種宿麥令毋後時况古者不過什一其求易供使民不過三日其力易足民財內足以養老盡孝外足以事上共稅下足以畜妻子極愛故民説從上至秦用商鞅之法改帝王之制除井田民得賣買冨者田連阡陌貧者無立錐之地又顓川澤之利管山林之饒荒淫越制踰侈以相髙邑有人君之尊里有公侯之富小民安得不困又加月為更卒已復為正一歲屯戍一歲力役三十倍於古田租口賦鹽鐡之利三十倍於古或耕豪民之田見稅什五故貧民常衣牛馬之衣而食犬彘之食重以貪暴之吏刑戮妄加民愁無聊亡逃山林轉為盜賊赭衣半道斷獄歲以千萬數漢興循而未改古井田法雖難卒行冝少近古限民名田以贍不足塞并兼之路鹽鐡皆歸於民去奴婢除專殺之威薄賦斂省繇役以寬民力然後可善治也書詣丞相公孫𢎞記室書江都相董仲舒叩頭死罪再拜上言君侯以周召自然休質擢升三公統理海內總緝百寮未有半言之教郡國翕然望風更思改新以助至治羣衆所占必有成功仲舒叩頭死罪仲舒愚戇素無治名大漢之檢式數蒙君侯哀憐之恩誤被非任無以稱職仲舒竊見宰職任天下之重羣心所重推須賢佐以成聖化願君侯大開蕭相國求賢之路廣選舉之門既得其人接以周公下士之義即竒偉隱世異倫之人各思竭愚歸往盛德英俊滿朝百能僃具即君侯大立則道德𢎞通化流四極仲舒愚陋經術淺薄所識褊陋不能贊揚萬分君侯所棄捐竊聞春秋曰聖賢博觀以章其名擇善者從之無所不聽又曰近而不言為諂逺而不言為怨故輒披心陳誠仲舒叩頭死罪死罪夫堯舜三王之業皆由仁義為本仁者所以理人倫也故聖王以為治首或曰發號出令利天下之民者謂之仁政疾天下之害於人者謂之仁心二者備矣然後海內應以誠惟君侯深觀往古思本仁義至誠而已方今關東五穀咸貴家有飢餓其死傷者半盜賊並起發亡不止良民被害為聖主憂咎皆由仲舒等典職防禁無素當先坐仲舒叩頭死罪死罪仲舒至愚以為扶衰止姦本在吏耳宜一考察天下領民之吏留心署置以明消滅邪枉之迹使百姓各安其産業無有寇盜之患以蠲主憂仲舒叩頭死罪謹奉春秋署置術再拜君侯足下對髙廟園災對春秋之道舉往以明來是故天下有物視春秋所舉與同比者精微眇以存其意通倫類以貫其理天地之變國家之事粲然皆見亡所疑矣按春秋魯定公哀公時季氏之惡已熟而孔子之聖方盛夫以盛聖而易熟惡季氏雖重魯君雖輕其勢可成也故定公二年五月兩觀災兩觀僭禮之物天災之者若曰僭禮之臣可以去已見罪徴而後告可去此天意也定公不知省至哀公三年五月桓宫釐宫災二者同事所為一也若曰燔貴而去不義云耳哀公未能見故四年六月亳社災兩觀桓釐廟亳社四者皆不當立天皆燔其不當立者以示魯欲其去亂臣而用聖人也季氏亡道久矣前是天不見災者魯未有賢聖臣雖欲去季孫其力不能昭公是也至定哀乃見之其時可也不時不見天之道也今髙廟不當居遼東髙園殿不當居陵旁於禮亦不當立與魯所災同其不當立久矣至於陛下時天乃災之者殆亦其時可也昔秦受亡周之弊而亡以化之漢受亡秦之敝又亡以化之夫繼二敝之後承其下流兼受其猥難治甚矣又多兄弟親戚骨肉之連驕揚奢侈恣睢者衆所謂重難之時也也陛下正當大敝之後又遭重難之時甚可憂也故天災若語陛下當今之世雖敝而重難非以太平至公不能治也視親戚貴屬在諸侯逺正最甚者忍而誅之如吾燔遼東髙廟乃可視近臣在國中處旁仄及貴而不正者忍而誅之如吾燔髙園殿乃可云爾在外而不正者雖貴如髙廟猶災燔之况諸侯乎在內而不正者雖貴如髙園殿猶災燔之况大臣乎此天意也罪在外者天災外罪在內者天災內燔甚罪當重燔簡罪當輕承天意之道也雨雹對元光元年二月京師雨雹鮑敞問董仲舒曰雹何物也何氣而生之仲舒曰隂氣脅陽氣天地之氣隂陽相半和氣周回朝夕不息陽德用事則和氣皆陽建已之月是也故謂之正陽之月隂德用事則和氣皆隂建亥之月是也故謂之正隂之月十月隂雖用事而隂不孤立此月純隂疑於無陽故謂之陽月詩人所謂日月陽止者也四月陽雖用事而陽不獨存此月純陽疑於無隂故亦謂之隂月自十月以後陽氣始生於地下漸冉流散故言息也隂氣轉收故言消也日夜滋生遂至四月純陽用事自四月以後隂氣始生於天上漸冉流散故云息也陽氣轉收故言消也日夜滋生遂至十月純隂用事二月八月隂陽正等無多少也以此推移無有差慝運動抑揚更相動薄則薰蒿歊蒸而風雨雲霧電雷雪雹生焉氣上薄為雨下薄為霧風其噫也雲其氣也雷其相擊之聲也電其相擊之光也二氣之初蒸也若有若無若實若虛若方若圓攢聚相合其體稍重故雨乘虛而墜風多則合速故雨大而疏風少則合遲故雨細而密其寒月則雨凝於上體尚輕微而因風相襲故成雪焉寒有髙下上暖下寒則上合為大雨下凝為氷霰雪是也雹霰之流也隂氣暴上雨則凝結為雹焉太平之世則風不鳴條開甲散萌而已雨不破塊潤葉津莖而已雷不驚人號令啓發而已電不眩目宣示光耀而已霧不塞望浸淫被泊而己雪不封條凌殄毒害而已雲則五色而為慶三色而成矞露則結味而成甘結潤而成膏此聖人之在上則隂陽和風雨時也政多紕繆則隂陽不調風發屋雨溢河雪至牛目雹殺驢馬此皆隂陽相蕩而為祲沴之妖也敞曰四月無隂十月無陽何以明隂不孤立陽不獨存耶仲舒曰隂陽雖異而所資一氣也陽用事此則氣為陽隂用事此則氣為隂陽隂之事雖異二體常存猶如一鼎之水而未加火純隂也加火極熱純陽也純陽則無隂氣息火水寒則更隂矣純隂則無陽氣加火水熱則更陽矣然則建已之月為純陽不容都無復隂也但是陽家用事陽氣之極耳薺麥枯由隂殺也建亥之月為純隂不容都無復陽也但是隂家用事隂氣之極耳薺麥始生由陽升也其尤者葶藶死於盛夏欵冬花於嚴寒水極隂而有溫泉火至陽而有涼焰故知隂不得無陽陽不容都無隂也敞曰冬雨必暖夏雨必涼何也曰冬氣多寒陽氣自上躋故人得其暖而下蒸成雪矣夏氣多暖隂氣自下升故人得其涼而上蒸成雨矣敞曰雨既隂陽相蒸四月純陽十月純隂斯則無二氣相薄則不雨乎曰然純陽純隂雖在四月十月但月中之一日耳敞曰月中何日曰純陽用事未夏至一日純隂用事未冬至一日朔旦夏至冬至其正氣也敞曰然則未至一日其不雨乎曰然頗有之則妖也和氣之中自生災沴能使隂陽改節暖涼失度敞曰災沴之氣其常存耶曰無也時生耳猶乎人四肢五臟中也有時及其病也四支五臟皆病也敞遷延負墻俯揖而退郊祀對廷尉臣湯昧死言臣湯承制以郊事問故膠西相仲舒臣仲舒對曰所聞古者天子之禮莫重於郊郊嘗以正月上辛日者所以先百神而最居前禮三年喪不祭其先而不敢廢郊郊重於宗廟天尊於人也王制曰祭天地之牛角繭栗宗廟之牛角握賓客之牛角尺此言德滋美而牲滋微也春秋曰魯祭周公用白牲色白貴純也帝牲在滌三月牲貴肥潔而不貪其大也凡養牲之道務在肥潔而已駒犢未能芻豢之食莫如令食其母便臣湯謹問仲舒魯祀周公用白牲非禮也臣仲舒對曰禮也臣湯問周天子用騂剛羣公不毛周公諸公也何以得用純牲臣仲舒曰武王崩成王幼而在襁褓之中周公繼文武之業成二聖之功德漸天地澤被四海故成王賢而貴之詩曰無德不報故成王使祭周公以白牲上不得與天子同色下有異於諸侯臣仲舒愚以為報德之禮臣湯問仲舒天子祭天諸侯祭土魯何緣以祭郊臣仲舒對曰周公傅成王成王遂及聖功莫大於此周公聖人也有祭於天道成王令魯郊也臣湯問仲舒魯祭周公用白牡其郊何用臣仲舒對曰魯郊用純騂剛周色尚赤魯以天子命郊故以騂臣湯問仲舒祠宗廟或以鶩當鳬鶩非鳬可用否臣仲舒對曰鶩非鳬鳬非鶩也臣聞孔子入太廟每事問慎之至也陛下祭躬親齋戒沐浴以承宗廟甚敬謹奈何以鳬當鶩鶩當鳬名實不相應以承太廟不亦不稱乎臣仲舒愚以為不可臣犬馬齒衰賜骸骨伏陋巷陛下乃幸使九卿問臣以朝廷之事臣愚陋曽不足以承明詔奉大對臣仲舒冒死以聞頌山川頌山則巃嵸􅐑嵬崔嶵巍久不崩陀似夫仁人志士孔子曰山川神祗立寶藏殘器用資曲直合大者可以為宫室臺榭小者可以為舟輿浮灄大者無不中􅘁者無不入持斧則砍折鎌則艾生人立禽獸伏死人多多則功而不言是以君子取辟也且積土成山無損也成其髙無害也成其大無虧也小其上泰其下久長安後世無有去就儼然獨處惟山之意詩云節彼南山惟石巖巖赫赫師尹民具爾瞻此之謂也水則源泉混混汒汒晝夜不竭既似力者盈科後行既似持平者循微赴下不遺小間既似察者循溪谷不迷或奏萬里而必至既似知者鄣防止之能淨淨既似知命者不清而入潔清而出既似善化者赴千仭之壑而不疑既似勇者物皆困於火而水獨勝之既似武者咸得之而生失之而死既似有德者孔子在川上曰逝者如斯夫不舍晝夜此之謂也春秋隂陽桓公十四年八月壬申御廩災先是四國共伐魯大破之於龍門百姓傷者未瘳怨咎未復而君臣未惰內怠政事外侮四鄰非能保守宗廟終其天年者也故天災御廪以戒之釐公二十年五月乙已西宫災釐娶於楚而齊媵之脅公使立以為夫人西宫者小寢夫人之居也若曰妾何為此宫誅去之意也以天災之故大之曰西宫也宣公十六年夏成周宣榭火十五年王札子殺召伯毛伯天子不能誅天戒若曰不能行政令何以禮樂為而臧之成公三年二月甲子新宫災成居喪亡哀戚心數興兵戰代故天災其父廟示失子道不能奉宗廟也襄公三十年五月甲午宋災伯姬如宋五年宋恭公卒伯姬幽居守節三十餘年又憂傷國家之患禍積隂生陽故火生災也昭公九年夏四月陳火陳夏徴舒殺君楚嚴王託欲為陳討賊陳國闢門而待之至因滅陳陳臣子尤毒恨甚極隂生陽故致火災昭公十八年五月壬午宋衛陳鄭災象王室將亂天下莫救故災四國言亡四方也又宋衛陳鄭之君皆荒淫於樂不恤國政與周室同行陽失節則火災出是以同日災也定公二年五月雉門及兩觀災此皆奢僭過度者也先是季氏逐昭公昭公死於外定公即位既不能誅季氏又用其邪説淫於女樂而退孔子天戒若曰去髙顯而奢僭者哀公三年五月辛卯桓釐宫災此二宫不當立違禮者也哀公又以季氏之故不用孔子孔子在陳聞魯災曰其桓釐之宫乎以為桓季氏之所出釐使季氏世卿者也哀公四年六月辛丑亳社災亡國之社所以為戒也天戒若曰國將危亡不用戒矣春秋火災屢於定哀之間不用聖人而縱驕臣將以亡國不明甚也嚴公二十八年冬大水亡麥禾夫人哀薑淫亂逆隂氣故大水也桓公元年秋大水桓弒兄隱公民臣痛隱而賤桓後宋督弒其君諸侯會將討之桓受宋賂而歸又背宋諸侯由是伐魯仍交兵結讐伏尸流血百姓愈怨故十三年夏復大水嚴公七年秋大水亡麥苗嚴母文薑與兄齊襄淫共殺桓公嚴釋父讐復娶齊女未入先與之淫一年再出會於道逆亂臣下賤之之應也嚴公十一年秋宋大水時魯宋比年為乘丘鄑之戰百姓愁怨隂氣盛故二國俱水嚴公二十四年大水夫人哀薑淫亂不婦隂氣盛也宣公十年秋大水飢時比伐邾取邑亦見報復兵讐連結百姓愁怨成公五年秋大水時成幼弱政在大夫前此一年再用師明年復城鄆以強私家仲孫蔑叔孫僑如顓會宋晉隂勝陽襄公二十四年秋大水先是一年齊伐晉襄使大夫帥師救晉後又侵齊國小兵弱數敵強大百姓愁怨隂氣盛成公七年正月鼷鼠食郊牛角改卜牛又食其角鼷鼠食郊牛皆養牲不謹也釐公二十一年夏大旱齊桓既死諸侯從楚釐尤得楚心楚來獻捷釋宋之執外倚強楚炕陽失衆又作南門勞民興役諸雩旱不雨略皆同説桓公十五年春亡氷象夫人不正隂失節也成公元年二月無氷方有宣公之喪君臣無悲哀之心而炕陽作丘甲僖公三十三年十二月李梅實李梅實臣下強也記曰不當華而華易大夫不當實而實易相室冬水王木相故象大臣桓公八年十月雨雪象大夫專恣隂氣盛也昭公四年正月大雨雪季孫宿任政隂氣盛定公元年十月隕霜殺菽菽草之強者天戒若曰加誅於強臣言菽以微見季氏之罰也文公三年秋雨螽于宋宋三世內取大夫專殺殺生不中故螽先死而至宣公十五年冬蝝生蝝螟始生也一曰螟始生是時民患上力役解於公田宣是時初稅畝稅畝就民田畝擇美者稅其什一亂先王制而為貪利故應是而蝝生屬裸蟲之孽釐公十五年九月己卯晦震夷伯之廟夷伯季氏之孚也陪臣不當有廟震者雷也晦者雷擊其廟明當絶去僭差之類也隱公五年秋螟時公觀漁於棠貪利之應也嚴公六年秋螟先是衛侯朔出奔齊齊侯會諸侯納朔許諸侯賂齊人歸衛寶魯受之貪利應也隱公三年二月己已日有食之其後戎執天子之使鄭獲魯隱滅戴衛魯宋咸殺君桓公三年七月壬辰朔日有食之既前事已大後事將至者又大則既先是魯宋弒君魯又成宋亂易許田無事天子之心楚僭稱王後鄭岠王師射桓王又二君相纂桓公十七年十月朔日有蝕之言朔不言日惡魯桓且有夫人之禍將不終日也嚴公十八年三月日有食之宿在東壁魯象也後公子慶父叔牙果通于夫人以弒公嚴公二十五年六月辛未朔日有食之宿在畢主邊兵夷狄象也後狄滅邢衛嚴公二十六年十二月癸亥朔日有食之宿在心心為明堂文武之道廢中國不絶若線之象也嚴公三十年九月庚午朔日有食之魯二君弒夫人誅兩弟死狄滅邢徐取舒晉殺世子楚滅弦僖公五年九月戊申朔日有食之先是齊桓行伯江黃自至南服強楚其後不內自正而外執陳大夫則陳楚不附鄭伯逃盟諸侯將不從桓政故天見戒其後晉滅虢楚圍許諸侯伐鄭晉弒二君狄滅溫楚伐黃桓不能救僖公十二年三月庚午朔日有食之是時楚滅黃狄侵衛鄭莒滅杞僖公十五年五月日有食之後秦獲晉侯齊滅項楚敗徐於婁林文公元年二月癸亥朔日有食之先是大夫始執國政公子遂如京師後楚世子商臣殺父齊公子商人弒君皆自立宋子哀出奔晉滅江楚滅六大夫公孫敖叔彭生並專會盟文公十五年六月辛丑朔日有食之後宋齊莒晉鄭八年之間五君殺死楚滅舒蓼宣公八年七月甲子朔日有食之先是楚商臣弒父而立至於嚴王遂強諸夏大國惟有齊晉齊晉新有篡弒之禍內皆未安故楚乘弱橫行八年之間六侵伐而一滅國伐陸渾戎觀兵周室後又入鄭鄭伯肉袒謝罪北敗晉師于泌流血色水圍宋九月析骸而炊之宣公十年四月丙辰日有食之後陳夏徴舒弒其君楚滅蕭晉滅二國王札子殺召伯毛伯宣公十七年六月癸卯日有食之後邾支解鄫子晉敗王師于貿戎敗齊於鞍成公十六年六月丙寅朔日有食之後晉敗楚鄭於鄢陵執魯侯成公十七年十二月丁已朔日有食之後楚滅舒庸晉弒其君宋魚石因楚奪君邑莒滅鄫齊滅萊鄭伯弒死襄公十四年二月朔日有食之後衛大夫孫寧共逐獻公立孫剽襄公十五年八月丁已日有食之先是晉為雞澤之會諸侯盟又大夫盟後為湨梁之會諸侯在而大夫獨相與盟君若綴斿不得舉手襄公二十年十月丙辰朔日有食之陳慶虎慶寅蔽君之明邾庶其有叛心後庶其以漆閭丘來奔陳殺二慶襄公二十一年九月庚寅朔日有食之晉欒盈將犯君後入于曲沃十月庚辰朔日有食之宿在軫角楚大國象也後楚屈氏譛殺公子追舒齊慶封脅君亂國襄公二十三年二月癸酉朔日有食之後衛侯入陳儀寧喜弒其君剽襄公二十四年八月癸已朔日有食之比食又既象陽將絶夷狄主上國之象也後六君弒楚子果從諸侯伐鄭滅舒鳩魯往朝之卒主中國伐吳封慶封襄公二十七年十二月乙亥朔日有食之禮義將大滅絶之象也時吳子好勇使刑人守門蔡侯通於世子之妻莒不早立嗣後閽戕吳子蔡世子般弒其父莒人亦弒君而庶子爭昭公七年四月甲辰朔日有食之先是楚靈王弒君而立會諸侯執徐子滅賴後陳公子招殺世子楚而滅之又滅蔡後靈王亦弒死昭公十七年六月甲戍朔日有食之時宿在畢晉國象也昭公二十一年七月壬午朔日有食之周景王老劉子單子専權蔡侯朱驕君臣不悅之象也後蔡侯朱果出奔劉子單子立王猛昭公二十二年十二月癸酉朔日有食之宿在心天子之象也後尹氏立王子朝天王居于狄泉昭公二十四年五月乙未朔日有食之宿在胃魯象也後昭公為季氏所逐昭公三十一年十二月辛亥朔日有食之宿在心天子象也時京師微弱後諸侯果相率而城周宋中幾亡尊天子之心而不衰城定公五年三月辛亥朔日有食之後鄭滅許魯陽虎作亂竊寶玉大弓季桓子退仲尼宋三臣以邑叛定公十二年十一月丙寅朔日有食之後晉三大夫以邑叛薛弒其君楚滅頓胡越敗吳衛逐世子定公十五年八月庚辰朔日有食之宿在栁周室大壞夷狄主諸夏之象也明年中國諸侯果纍纍從楚而圍蔡蔡恐遷於州來晉人執戎蠻子歸于楚京師是也嚴公七年四月辛卯夜恆星不見中星隕如雨常星二十八宿者人君之象也衆星萬民之類也列宿不見象諸侯微也衆星隕墜民失其所也夜中者為中國也不及地而復象齊桓起而救存之也鄉亡桓公星遂至地中國其良絶矣文公十四年七月有星孛入于北斗孛者惡氣之所生也謂之孛者言其孛孛有所妨蔽暗亂不明之亂也北斗大國象後齊宋魯莒晉皆弒君昭公十七年冬有星孛于大辰大辰心也心為明堂天子之象後王室大亂三王分爭此其效也哀公十三年冬十一月有星孛于東方不言宿名者不加宿也以辰乘日而出亂氣蔽君明也明年春秋事終釐公十六年正月戊申朔隕石于宋五是月六鶂退飛過宋都象宋襄公欲行伯道將自敗之戒也石陰類五陽類自上而隕此陰而陽行欲髙反下也石與金同類色以白為主近白祥也鶂水鳥六陰數退飛欲進反退也其色青青鳥也屬於貌之不恭天戒若曰德薄國小勿持炕陽欲長諸侯與強大爭必受其害襄公不寤明年齊桓死伐齊喪執滕子圍曺為盂之會與楚爭盟卒為所執後得反國不悔過自責復會諸侯伐鄭與楚戰于泓軍敗身傷為諸侯笑漢魏六朝百三家集卷三
