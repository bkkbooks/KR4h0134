蘭湯浴身垢懴悔淨心靈蔞草獲再鮮落花蒙重榮闕十喻五首幻揮霍變三有恍惚隨六塵蘭園種五果雕案出八珍對見不可信熟視事非真空生四嶽想徒勞七識神著幻是幻者知幻非幻人如炎亂念矚長原例見望遙扄逶迤似江漢泛濫若滄𬈑金波揚素沫銀浪翻緑萍遠思如可取近至了無形熱緣熱惚逼渴愛渴心生靈空物情異所異世心同所同狀如薪遇火亦似草行風迷惑三界裏顚倒六趣中五愛性洞逺十相法靈沖皆從妄所妄無非空對空乾闥婆靈海自已極滄流去無邉蜃蛤生異氣闥婆鬱中天青城接丹霄金樓帶紫煙皆從望見起非是物理然因彼凡俗喻此中𤣥又𤣥夢甘寢隨四坐蓋睡依五衆違從競分諍美惡相戲㺯出家為上首入仕作梁棟色已非真實聞見皆靈洞長眼出長夜大覺和大夢代蘇屬國婦良人如我期不謂當過時秋風忽送節白露凝前基愴愴獨涼枕慅慅孤月帷忽聼西北鴈似從東海湄果銜萬里書中有生離辭惟言長别矣不復道相思胡羊久剽奪漢節故支持帛上看未終臉下淚如絲空懷之死誓逺勞同穴詩古意二首飛鳥起離離驚散忽差池嗷嘈繞樹上翩翩集寒枝既悲征役久偏傷壠上兒寄言閨中妾此心詎能知不見松蘿上葉落根不移當春有一草緑花復垂枝云是忘憂物生在北堂陲飛飛雙蛺蝶低低兩差池差池低復起此芳性不移飛蝶雙復隻此心人莫知搗衣駕言易水北送别河之陽沈思慘行鑣結夢在空牀既寤丹緑謬始知紈素傷中州木葉下邉城應早霜陰蟲日慘烈庭草復藝黃金風徂清夜明月懸洞房嫋嫋同宫女助我理衣裳參差夕杵引哀怨秋砧揚輕羅飛玉腕弱袖低紅粧朱顔日已興盼睇色增光搗以一匪石文成雙鴛鴦制握斷金刀薰用如蘭芳佳期久不歸持此寄寒鄉妾身誰與容思君苦入腸織婦送别出南軒離思沈幽室調梭輟寒夜鳴機罷秋日良人在萬里誰與共成匹願得一回光照此憂與疾君情倘未忘妾心長自畢戲作宓妃生洛浦遊女出漢陽妖間逾下蔡神妙絶高唐綿駒且變俗王豹復移鄉況兹集靈異豈得無方將長袂必留客清哇咸繞梁燕趙羞容止西施慙芬芳徒聞珠可㺯定自泛明璫七夕白露月下團秋風枝上鮮瑶臺含碧霧羅幕生紫烟妙㑹非綺節佳期乃涼年玉壺承夜急蘭膏依曉煎昔悲漢難越今傷河易旋怨咽雙念斷悽悼一作切兩情懸紫蘭始萌種蘭玉臺下氣暖蘭始萌芬芳與時發婉轉迎節生獨使金翠嬌偏動紅綺情二遊何足懷一顧非傾城羞將苓芝似豈畏鶗鴂鳴邉戍秋月出中天遠近無偏異共照一光輝各懷離别思詠舞腕弱復低舉身輕由回縱可謂寫自歡方與心期共詠燭堂中綺羅人席上歌舞兒待我光泛灧為君照參差詠筆昔聞蘭蕙月獨是桃李年春心倘未寫為君照情筵詠笛柯亭有竒竹含情復抑揚妙聲發玉指龍音響鳳凰答蕭琛高祖任西邸早與琛狎每朝宴呼為宗老琛奉陳昔恩以早中陽夙忝同閈雖迷興運猶荷洪慈上答雖云早契濶乃自非同志勿談興運初且道狂奴異賜謝覽王暕詩謝覽侍武帝坐受敕與王暕為詩答贈其文甚工帝賜詩云雙文既後進二少實名家豈伊爾棟隆信乃俱國華賜張率率侍武帝遊宴賦詩帝别賜率詩東南有才子故能服官政余雖慚古昔得人今為盛戲題劉孺手板武帝宴壽光殿詔羣臣賦詩劉孺張率並醉未成帝取孺手板題戲之張率東南美劉孺洛陽才攬筆便應就何事久遲回覺意詩賜江革革精信因果高祖未知謂革不奉佛教賜革覺意詩五百字唯當勤精進自强行勝修豈可作底突如彼必死囚送始安王方略入關帝結好於魏遣始安王方略入關送之作詩如何吾幼子勝衣已别離十日無由宴千里送遠垂聫句清暑殿效柏梁體居中負扆寄纓紱帝言慙輻輳政無術新安太守任昉至德無垠愧違弼侍中徐勉燮贊京河豈微物丹陽丞劉泛竊侍兩宫慙樞密黃門侍郎栁憕清通簡要臣豈泊吏部郎中謝覽出入帷扆濫榮秩侍中張卷復道龍樓歌楙實太子中庶子王峻空班獨坐慙羊質御史中丞陸杲嗣以書記臣敢匹右軍主簿陸倕謬參和鼎講畫一司徒主簿劉沿鼎味參和臣多匱司徒左西屬江曺聫句詩傾城非人美十載難重逢雖懷軒中意愧無鬢髮容漢魏六朝百三家集卷八十
