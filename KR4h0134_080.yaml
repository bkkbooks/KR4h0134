body:
  text: 漢魏六朝百三家集卷八十梁武帝集題詞梁武帝淨業賦序即曹孟德之述志令也孟德奸雄善文自許西伯梁帝亦謬比湯武大言不怍夫長沙酷害樊鄧興兵勢成騎虎延頸為難獨無道既誅鼎新有主忽焉狐盜覆齊宗祀猶總師稱朕妄擬南巢白旗則石勒胡人且笑曹馬矣帝負龍虎之相兼文武之才史贊其恭儉莊敬藝能博學人君罕有惜羯寇滔天臺城煨燼制㫖二百餘卷五禮一千餘卷通史六百卷後世無繇誦讀今得其詔令書敕諸篇置帝王集中則魏晉風烈間有存者雕蟲小伎壯夫不為尚幸見之朝廷未容以河中之水東飛伯勞數詩定帝高下也捨道歸佛躬為教宗顧白衣所急首唱斷肉耳據帝自序絶魚肉斷房室欲天下知其不貪其責賀散騎又云腰瘦二尺救物故也神器至重逆取順守僅欲以黃羸菜味自救不臣為計短矣至今愚夫愚婦身盜賊而口素食即云銷孽滅過率祖帝術也目録賦淨業賦有序孝思賦有序圍棋賦賦體詔遣使巡省詔遣使巡行州郡詔求讜言詔令公卿入陳時政詔令百司各陳損益詔令所在條陳民患詔令所在條陳時政詔令郡縣各陳時政闕失詔命朝堂參議疑事詔命尚書郎奏事詔設謗木肺石二函詔風聞奏事詔用賢詔旁求俊乂詔舊族搜士詔勿限年次詔定梁律詔申敕諸州訊獄詔慎刑詔贖刑詔除贖罪之科詔更開贖刑詔赦詔赦詔停老少連坐詔停祖父連坐詔汝潁建州詔恤新附諸州詔禁止私利詔開山澤常禁詔清公田詔原宥散失官物詔通用足陌錢詔撫流移詔埋枯骨詔罷京觀詔立晉安王為皇太子詔祠南郊恩詔五首改作南北郊詔耕籍田詔豐年恩詔幸蘭陵恩詔推恩六親詔停賀瑞詔罷祈禱詔建學詔遣皇子及王矦子弟入學詔𢎞經術詔二首問羣臣音樂詔罷鳳凰銜書詔放遣後宫詔禁止宫人縱觀郊祀詔南面詔議洗匜詔守視晉宋齊諸陵詔差等品流詔郊廟等令視散騎詔散騎通直詔尚書五都詔牙像詔出阿育王塔下佛舍利詔代牲詔薦蔬詔手詔何㸃徴何㸃為侍中詔徴庾詵庾承先詔臧盾兼領軍詔授江革臨川王長史詔拜范述曽大中大夫詔拜何逺給事黃門侍郎詔與陳慶之手詔以伏暅為豫章內史詔遣豫章王北伐詔授武陵王揚州刺史詔旌沈崇傃詔旌甄恬詔答徐勉修五禮詔答陶𢎞景請解官詔答陶𢎞景進冥通記詔與任昉詔答劉之遴詔答周𢎞正詔贈栁慶逺詔贈王茂詔追封蕭穎胄詔贈范雲詔贈袁昻詔贈蔡道恭詔贈張惠紹詔贈鄭紹叔詔贈馮道根詔贈呂僧珍詔贈昌義之詔贈張𢎞策詔追贈張𢎞籍詔贈孔休源詔贈蕭子顯詔贈裴子野詔贈顧協詔贈周捨詔又恤周捨詔賻陸雲公手詔贈丘仲孚詔恤何㸃詔諡庾詵貞節處士詔贈臨川王宏詔贈南平王偉詔贈鄱陽王恢詔改封南昌公為矦詔齊世王矦降封詔詔許慧詔責蕭昱詔責西豐矦正德詔光宅寺金像詔寬禁志公詔敕手敕何𦙍與何𦙍敕三首敕昭明太子敕報皇太子答皇太子請御講敕又又答晉安王請開講啓敕答晉安王謝開講般若啓敕答菩提樹頌手敕答晉安王謝幸善覺寺啓敕敕貞陽矦淵明手敕劉之遴賜陸倕敕手敕張率責賀㻠敕敕答臣下神滅論敕光祿大夫江蒨敕沈約撰佛記序與周捨論斷肉敕又又又又答曹思文敕喻智藏敕敕答釋明徹敕答僧正南澗寺沙門慧超手敕江革制與羣臣論明堂制又制駁慈母服議制唱斷肉經竟制册諡始興王册璽書賜左丞范鎮璽書令霸府去苛令霸府禁奢令閲武堂大赦令申飭刑政令初封梁王下國中恩令掩骼令檄移京邑檄表申飭選人表請徴補謝朏何𦙍表書喻袁昻手書與蕭寶寅書答蕭穎胄書與何𦙍書答陶𢎞景論書書一答陶𢎞景論書書二答陶𢎞景論書書三答陶𢎞景論書書四答陶隱居書報侯景書又又與始興王憺書腳氣帖曹郢州帖序為亮法師製涅槃經疏序記立神明成佛義記輿駕東行記連珠連珠三首賜到溉連珠一首針凡百針銘硯銘文即位告天文捨道歸佛文金剛般若懴文摩訶般若懴文斷酒肉文四首樂府芳樹有所思臨高臺雍臺長安有狹邪行擬青青河畔草擬明月照高樓閶闔篇邯鄲歌子夜歌二首子夜四時歌春歌四首夏歌四首秋歌四首冬歌四首歡聞歌二首團扇歌碧玉歌上聲歌襄陽白銅鞮歌二楊叛兒白紵辭二首河中之水歌東飛伯勞歌江南弄七曲江南弄龍笛曲採蓮曲鳳笙曲採菱曲遊女曲朝雲曲上雲樂鳳臺曲桐柏曲方丈曲方諸曲玉龜曲金丹曲金陵曲詩逸民直石頭答任殿中宗記室王中書别宴詩首夏泛天池登北顧樓天安寺疏圃堂籍田撰孔子正言竟述懷詩遊仙遊鍾山大愛敬寺㑹三教和太子懴悔十喻五首幻如炎靈空乾闥婆夢代蘇屬國婦古意二首搗衣織婦戲作七夕紫蘭始萌邉戍詠舞詠燭詠筆詠笛答蕭琛賜謝覽王􅌔詩賜張率戲題劉孺手板覺意詩賜江革送始安王方略入關聨句清暑殿效柏梁體聨句詩漢魏六朝百三家集卷八十目録欽定四庫全書漢魏六朝百三家集卷八十明張溥輯梁武帝集賦淨業賦有序少愛山水有懷丘壑身羈俗羅不獲遂志舛獨往之行乖任縱之心因爾登庸以從王事屬時多故世路屯蹇有事戎旅略無寧歲上政昏虐下豎姦亂君子道消小人道長御刀應敕梅蟲兒茹法珍俞靈韻豐勇之如是等多輩志公所謂亂戴頭者也志公者是沙門寶志形服不定示見無方于時羣小疑其神異乃羈之華林外閣公亦怒而言曰亂戴頭亂戴頭各執權軸人出號令威福自由生殺在口忠良被屠馘之害功臣受無辜之誅服色齊同分頭各驅皆稱帝主人主尊極用其詭詐疑亂衆心出入盤逰無忘昏曉屏除京邑不脫日夜屬纊者絶氣道傍子不遑哭臨月者行産路側母不及抱百姓凛凛如崩厥角長沙宣武王有大功於國禮報無聞酷害奄及至於弟姪亦罹其禍遂復遣桓神與杜伯符等六七輕使以至雍州就諸軍帥欲見謀害衆心不與故事無成後遣劉山陽灼然見取壯士貙虎器甲精鋭君親無校便欲束身待戮此之橫暴出自羣小畏壓溺三不弔况復姦豎乎若默然就死為天下笑俄而山陽至荆州為蕭穎胄所執即遣馬驛傳道至雍州乃赫然大號建牙豎旗四方同心如響應聲以齊永元二年正月發自襄陽義勇如雲舳艫翳漢竟陵太守曹宗馬軍主殷昌等各領騎步夾岸迎候波浪逆流亦四十里至朕所乘舫乃止有雙白魚跳入䑽前義等孟津事符冥應雲動天行雷震風馳郢城尅定江州降𣢾姑熟甲胄望風退散新亭李居士稽首歸降獨夫既除蒼生蘇息便欲歸志園林任情草澤下逼民心上畏天命事不獲已遂膺大寶如臨深淵如履薄氷猶欲避位以俟能者若其遜讓必復魚潰非直身死名辱亦負纍幽顯乃作賦曰日夜常思惟循環亦已窮終之或得離離之必不終負扆臨朝冕旒四海昧旦乾乾夕惕若厲朽索御六馬方此非譬世論者以朕方之湯武然朕不得以比湯武湯武亦不得以比朕湯武是聖人朕是凡人此不得以比湯武但湯武君臣義未絶而有南巢白旗之事朕君臣義已絶然後掃定獨夫為天下除患以是二途故不得相比朕布衣之時唯知禮義不知信向烹宰衆生以接賔客隨物肉食不識菜味及至南面富有天下逺方珍羞貢獻相繼海內異食莫不畢至方丈滿前百味盈俎乃方食輟筯對案流泣恨不得以及溫凊朝夕供養何心獨井此膳因爾蔬食不噉魚肉雖自內行不使外知至於禮宴羣臣肴膳按常菜食味習體過黃羸朝中班班始有知者謝朏孔彥穎等屢勸解素乃是忠至未達朕心朕又自念有天下本非宿志杜恕有云刳心擲地數片肉耳所賴明達君子亮其本心誰知我不貪天下唯當行人所不能行者令天下有以知我心復斷房室不與嬪侍同屋而處四十餘年矣於是四體小惡問上省師劉澄之姚菩提疾侯所以劉澄之云澄之知是飲食過所致答劉澄之云我是布衣井肥恣口劉澄之云官昔日食那得及今日食姚菩提含笑搖頭云唯菩提知官房室過多所以致爾于時久不食魚肉亦斷房室以其智非和緩術無扁華默然不言不復詰問猶令為治劉澄之處酒姚菩提處丸服之病逾增甚以其無所知故不復服因爾有疾常自為方不服醫藥亦四十餘年矣本非精進既不食衆生無復殺害障既不御內無復欲惡障除此二障意識稍明內外經書讀便解悟從是巳來始知歸向禮云人生而靜天之性也感物而動性之欲也有動則心垢有靜則心淨外動既止內心亦明始自覺悟患纍無所由生也乃作淨業賦云爾觀人生之天性抱妙氣而清靜感外物以動欲心攀緣而成眚過恆發於外塵纍必由於前境若空谷之應聲似逰形之有影懷貪心而不厭縱內意而自騁目隨色而變易眼逐貌而轉移觀五色之𤣥黃玩七寶之陸離著華麗之窈窕耽冶容之逶迤在寢興而不捨亦日夜而忘疲如英媒之在摘若駿馬之帶羈類白日之麗天乃歷年之不虧觀耳識之愛聲亦如飛鳥之歸林既流連於絲竹亦繁㑹於五音經昏明而不絶歷四時而相尋或亂情而惑慮或慆耳而堙心至如香氣馞起觸鼻發識婉娩追隨氤氲無極蘭麝夾飛如鳥二翼若渴飲毒如寒披棘舌之嗜味衆塵無有大苦鹹酸莫不甘口噉食衆生虐及飛走唯日不足長夜飲酒悖亂明行罔慮幽咎身之受觸以自安怡美目清揚巧笑娥眉細腰纎手弱骨豐肌附身芳潔觸體如脂狂心述惑倒想自欺至如意識攀緣亂念無邊靡懷善想皆起惡筌如是六塵同障善道方紫奪朱如風靡草抱惑而生與之偕老隨逐無明莫非煩惱輪回火宅沈溺苦海長夜執固終不能改迍否相隨災異互起內懷邪信外縱淫祀排虛枉命跖實橫死妄生神祐以招福祉前輪折軸後車覆軌殃國禍家亡身絶祀初不內訟責躬反已皇天無親唯與善人外清眼境內淨心塵不與不取不愛不嗔如玉有潤如竹有筠如芙蓉之在池若芳蘭之生春淤泥不能汙其體重昏不能覆其真霧露集而珠流光風動而生芬為善多而歲積明行動而日新常與德而相隨恆與道而為鄰見淨業之愛果以不殺而為因離欲惡而自修故無障於精神患纍已除障礙亦淨如久澄水如新磨鏡外照多像內見衆病既除客塵又還自性三途長乖八難永滅止善既修行善無缺清淨一道無有異轍唯有哲人乃能披襟如石投水莫逆於心心清冷其若氷志皎潔其如雪在欲結其既除懷憂畏其亦滅與恩愛而長違顧生死而永别覽當今之逸少想後來之英童懷荆玉而未剖藏神器而存躬修聖行其不已信善積而無窮永劫揚其美名萬代流於清風豈伏強而稱勇乃道勝而為雄孝思賦有序想緣情生情緣想起物類相感故其然也每讀孝子傳未嘗不終軸輟書悲恨拊心嗚咽年未髫齔內失所恃餘喘竛竮嬭媪相長齒過弱冠外失所怙限職荆蠻致闕晨昏江途遼敻家無指信髣佛行路先君體有不安晝則輟食夜則廢寢方寸煩亂容身無所便投刺解職以遵歸路于時齊隋郡王子隆鎮撫陜西頻煩信命令停一夕明當早出江津送别心慮迫切不獲承命止得小船望星就路夜冒風浪不遑寧處途次定陵船又損壞于時門賔周仲連為鵲頭戍主借得一舸奔波兼行屢經危險僅而獲濟及至戾止已無逮及五內屠裂肝心破碎便欲歸身山下畢志墳陵長兄哀愍未說獨行續有北問狡虜冦邊朝廷以先君遺愛結民咸思在昔故舊部曲猶有數千武慶宗將領留防彼鎮時便有㫖使扞壽春王事靡盬辭不獲免刺史崔慧景志懷翻覆逺招逋逃多聚姦俠大猾凶醜莫不雲集至如彭盆韓元孫等不可稱數倍道電邁奄至淮淝凶徒疑駭相引離散臺軍主徐𤣥慶房伯玉等欲襲取慧景乃固禁之方得止息是歲齊明作相疑論未决密馳表疏勸徴慧景折簡而召必不違拒即重遣還以安其心姦渠既出緣邊無虞旬朔之間慧景反鎮即便解甲以歸京師因爾驅馳不獲停息數鍾百六時㑹雲雷撥亂反正遂膺四海念子路見於孔丘曰由事二親之時常食藜藿之食為親負米百里之外親沒之後南逰於楚從車百乘積粟萬鍾纍茵而坐列鼎而食願食藜藿之食為親負米不可復得每感斯言雖存若亡父母之恩云何可報慈如河海孝若涓塵今日為天下主而不及供養譬猶荒年而有七寶饑不可食寒不可衣永慕長號何解悲思乃於鍾山下建大愛敬寺於青溪側造大智度寺以表罔極之情逹追逺之心不能遺蓼莪之哀復於宫內起至敬殿竭工匠之巧盡世俗之竒水石周流芳樹雜沓限以國事亦復不能得朝夕侍食唯有朔望親奉饋奠雖復得薦珍羞而無所瞻仰內心崩潰如焚如灼情切於衷事形於言乃作孝思賦云爾感四氣之變易見萬物之化成受天和而異命禀地德而齊榮察蟭螟於蚊睫觀鯤鵬於北溟彼含識而異見同有色而殊形雖萬類之衆多獨在人而最靈禮義别於飛走言語異於鸚猩念過隙之倏忽悲逝川之不停踐霜露而悽愴懷燧榖而涕零掩此哀而不去亦靡日而弗思仲由念枯魚而永慕丘吾感風樹而長悲雖一至而捨生奉二親而何期思因情生情因思起導情源以流澍引思心而無已既懷憂以終身亦銜恤而沒齒當閒居以永念獨拊膺而自傷徒升岵而靡瞻空陟屺其何望涕縱橫以交流血沸涌而沾裳覽地義以自咎懼滅性之乖方仰太極以長懷乃告哀於昊蒼兾皇天之有感何報施之茫茫曉百碎於魏闕夜萬斷於中腸心與心而相續思與思而未央晨孤立而縈結夕獨處而徊徨氣塞哀其似噎念積心其若狂至如獻歲發暉春日載陽木散百華草列衆芳對樂時而無歡乃觸目而感傷朱明啓節白日朝臨木低井果樹接清陰不娛悅於懷抱但罔極而纒心兼葭蒼蒼白露為霜凉氣入衣凄風動裳心無迫而自切情不觸而獨傷若乃寒氷已結寒條已拆林飛黃落山積白雪旅鴈鳴而哀哀朔風鼓而颲颲目觸事而破碎心隨感而斷絶無一息而緩念與四時而長切年揮忽而莫反時瞬睒其如電想慈顔之在昔哀不可而重見痛生育之靡答報顧復而無片悲與恨其俱興涕雜血其如霰䴏青春而差池鴻素秋而翺翔去來候於節物飛鳴應於陰陽何在我而不爾與二氣而乖張常茹酷而輪回歷日夜而不忘既視丹而成緑亦見白而為黃擾性情以翻覆汨神慮而迷荒想鳴鶴而魂斷聽孤雛而心死慟終天而無怙號畢世而靡恃觀休屠之日磾豈教義之所及見井泉之畫像每下拜而垂泣忽心動而不安遽入侍於帝室值何羅之作難乃捨之以投瑟超王臣之稱首冠誠勇而無匹士行已之多方見石他之有權身雖死而名揚乃忠孝而兩全顧丁蘭其何人家河內之野王時舞象而方及始成童而親亡刻木母以供事常朝夕而在傍劉鎮就養而不暇常逺汲而力寡苦節感於幽靈醴泉生於竈下顧長沙之臨湘有古初之道始時父沒而未葬遇鄰火之卒起乃伏棺而長號雨暴至而火死又何琦其亦然獨柩屋而全止至如王祥黃雀入帳隗通橫石特起盛彥之開母目邢渠之生父齒覽斯事而衆多亦難得而具紀靈蛇銜珠以酬德慈烏反哺以報親在蟲鳥其尚爾况三才之令人治本歸於三大生民窮於五孝置天地而德盈橫四海而不撓履斯道而不行吁孔門其何教圍棋賦圍奩象天方局法地枰則廣羊文犀子則白瑶𤣥玉方目無斜直道不曲爾乃建將軍布將士列兩陳驅雙軌徘徊鶴翔差池燕起用忿兵而不顧亦馮河而必危癡無成術而好鬬非智者之所為運疑心而猶豫志無成而必虧今一棋之出手思九事而為防敵謀斷而計屈欲侵地而無方不失行而致冦不助彼而為強不讓他以增地不失子而云亡落重圍而計窮欲佻巧而行促劇疏勒之迍邅甚白登之困辱或龍化而超絶或神變而獨悟勿膠柱以調瑟專守株而待兔或有少棊已有活形失不為悴得不為榮若有苦戰未必能平用折雄威致損令名故城有所不攻地有所不爭東西馳走左右周章善有翻覆多致敗亡雖蓄鋭以將取必居謙以自牧譬猛獸之將擊亦俯耳而固伏若局勢已勝不宜過輕禍起於所忽功墜於垂成至如玉壺銀臺車廂井欄既見知於曩日亦在今之可觀或非劫非持兩懸兩生局有衆勢多不可名或方四聚五花六持七雖涉戲之近事亦臨局而應悉或取結角或營邊鄙或先㸃而亡或先撇而死故君子以之逰神先達以之安思盡有戲之要道窮情理之奧祕賦體草回風以照春木承雲以含化芳競飛於陽和花爭開於日夜樂萬類之得所豈此心之云舍欣分竹其厲精慙戎車之屢駕詔遣使巡省詔觀風省俗哲后𢎞規狩嶽巡方明王盛軌所以重華在上五品聿修文命肇基四載斯履故能物色幽微耳目屠釣致王業於緝熙被淳風於遐邇朕以寡薄昧於治方藉代終之運當符命之重取監前古凛若馭朽思所以振民育德去殺勝殘解網更張置之仁壽而明慙照逺智不周物兼以歲之不易未遑卜征興言夕惕無忘鑒寐可分遣內侍周省四方觀政聽謡訪賢舉滯其有田野不闢獄訟無章忘公徇私侵漁是務者悉隨事以聞若懷寶迷邦藴竒待價蓄響藏真不求聞逹並依名騰奏罔或遺隱使輶軒所届如朕親覽焉遣使巡行州郡詔昔哲王之宰世也每歲卜征躬事巡省民俗政刑罔不必逮末代風凋久曠兹典雖欲肆遠忘勞究臨幽仄而居今行古事未易從所以日晏踟蹰情同再撫總總九州逺近民庶或川路幽遐或貧羸老疾懷寃抱理莫由自申所以東海匹婦致災邦國西土孤魂登樓請訴念此于懷中夜太息可分將命巡行州部其有深寃巨害抑鬱無歸聽詣使者依源自列庶以矜隱之念昭被四方蕩聽逺聞事均親覽求讜言詔政在養民德存被物上令如風民應如草朕以寡德運屬時來撥亂反正倐焉三紀不能使重門不閉守在海外疆場多阻車書未一民疲轉輸士勞邉防徹田為糧未得頓止治道不明政用多僻百辟無沃心之言四聰闕飛耳之聽州輟刺舉郡忘共治致使失理負謗無由聞達侮文㺯法因事生姧胏石空陳懸鐘徒設書不云乎股肱惟人良臣惟聖實賴賢佐匡其不及凡厥在朝各獻讜言政治不便於民者可悉陳之若在四遠刺史二千石長吏並以奏聞細民有言事者咸為申達朕將親覽以紓其過文武在位舉爾所知公侯將相隨才擢用拾遺補闕勿有所隱令公卿入陳時政詔昔公卿面陳載在前史令僕陛奏列代明文所以釐彼庶績成兹羣務晉氏陵替虛誕為風自此相因其失彌遠遂使武帳空勞無汲公之奏丹墀徒闢闕鄭生之履三槐八座應有務之百官宜有所論可入陳啓庶藉周爰少匡寡薄令百司各陳損益詔朕達聽思治無忘日昃而百司羣務其途不一隨時適用各有攸宜若非總㑹衆言無以偹兹親覽自今臺閣省府州郡鎮戍應有職僚之所時共集議各陳損益具以奏聞令所在條陳民患詔皇王在昔澤風未逺故端居𤣥扈拱默巖廊自大道既淪澆波斯逝動競日滋情僞彌作朕負扆君臨百年將半宵漏未分躬勞政事白日西浮不遑飱飯退居猶於布素含咀匪過藜藿寧以萬乘為貴四海為富唯欲億兆康寧下民安乂雖復三思行事而百慮多失凡逺近分置內外條流四方所立屯傳邸治市埭桁渡津稅田園新舊守宰遊軍戍邏有不便於民者尚書州郡各速條上當隨言除省以舒民患令所在條陳時政詔觀時設教王政所先兼而利之實惟務本移風致治咸由此作頃因革之令隨事必下而張弛之要未臻厥宜民瘼猶繁廉平尚寡所以竚旒纊而載懷朝玉帛而興歎可申下四方政有不便於民者所在具條以聞守宰若清潔可稱或侵漁為蠧分别奏上將行黜陟長吏勸課躬履堤防勿有不修致妨農事關市之賦或有未允外時參量優減舊格令郡縣各陳時政闕失詔朕四聰既闕五識多蔽畫可外牒或致紕繆凡是政事不便於民者州郡縣即時皆言勿得欺隱如使怨訟當境任失而今而後以為永准令朝堂參議疑事詔經國有體必詢諸朝所以尚書置令僕丞郎旦旦上朝以議時事前共籌懷然後奏聞頃者不爾每有疑事倚立求决古人有云主非堯舜何得發言便是是故放勛之聖猶咨四嶽重華之睿亦待多士豈朕寡德所能獨斷自今尚書中有疑事前於朝堂參議然後啓聞不得習常其軍機要切前須咨審自依舊典令尚書郎奏事詔自禮闈陵替厯兹永久郎署備員無取職事糠粃文案貴尚虛閒空有趨墀之名了無握䦨之實曹郎可依昔奏事設謗木肺石二函詔商俗甫移遺風尚熾下不上逹由來逺矣升中馭索增其凛然可於公車府謗木肺石傍各置一函若肉食莫言山阿欲有橫議投謗木函若從我江漢功在可策犀兕徒弊龍蛇方縣次身才高妙擯壓莫通懷傅呂之術抱屈賈之歎其理有皎然受困包匭夫大政侵小豪門陵賤四民已窮九重莫逹若欲自申並可投肺石函風聞奏事詔成務𢎞風肅厲內外實由設官分職互相懲糾而頃一拘常式見失方奏多容違惰莫肯執咎憲綱日弛漸以為俗今端右可以風聞奏事依元熙舊制用賢詔學以從政殷勤往哲祿在其中抑亦前事朕思闡治綱每敦儒術軾閭闢館造次以之故負袠成風甲科間出方當置諸周行飾以青紫其有能通一經始末無倦者策實之後選可量加敘録雖復牛監羊肆寒品後門並隨才試吏勿有遺隔旁求俊乂詔為國在於多士寧下寄于得人朕暗於行事尤闕治道孤立在上如臨深谷凡爾在朝咸思匡救獻替可否用相啓沃班下方嶽傍求俊乂窮其屠釣書其巖穴以時奏聞舊族搜士詔在昔周漢取士方國頃代凋訛幽仄罕被人孤地絶用隔聽覽士操淪胥因兹靡勸豈其嶽瀆縱靈偏有厚薄實由知與不知用與不用耳朕以菲德君此兆民而兼明廣照屈於堂户飛耳長目不及四方永言愧懷無忘旦夕凡諸郡國舊族邦內無在朝位者選官搜括使郡有一人勿限年次詔今九流常選年未三十不通一經不得解褐若有才同甘顔勿限年次定梁律詔律令不一實難去弊殺傷有法昏墨有刑此蓋常科易為條例至如三男一妻懸首造獄事非慮內法出恆鈞前王之律後主之令因循創附良各有以若遊辭費句無取於實録者宜悉除之求文指歸可適變者載一家為本用衆家以附丙丁俱有則去丁以存丙若丙丁二事注釋不同則二家兼載咸使百司議其可不取其可安以為標例宜云某等如干人同議以此為長則定以為梁律留尚書比部悉使備文若班下州郡止撮機要可無二門侮法之弊申敕諸州訊獄詔三訊五聽著自聖典哀矜折獄義重前誥蓋所以明愼用刑深戒疑枉成功致治罔不由兹朕自藩部常躬訊録求理得情洪細必盡末運弛綱斯政又闕牢犴沈壅申訴靡從朕屬當期運君臨兆億雖復齊居宣室留心聽斷而九牧遐荒無因臨覽深懼懷寃就鞫匪惟一方可申敕諸州月一臨訊博詢擇善務在確實慎刑詔朕昧旦齊居惟刑是恤三辟五聽寢興載懷故陳肺石於都街增官司於詔獄殷勤親覽小大以情而明愼未洽囹圄尚擁永言納隍在豫興愧凡犴獄之所可遣法官近侍遞録囚徒如有枉滯以時奏聞贖刑詔金作贖刑有聞自昔入縑以免施於中代民悅法行莫尚乎此永言叔世偷薄成風嬰愆入罪厥塗匪一斷弊之書日纒於聽覽鉗􅎂之刑歲積於牢犴死者不可復生生者無因自返由此而望滋實庸可致乎朕夕惕思治念崇政術斟酌前王擇其令典有可以憲章邦國罔不由之釋愧心於四海昭情素於萬物俗僞日久禁網彌繁漢文四百邈焉已逺雖省事清心無忘日用而委銜廢策事未獲從可依周漢舊典有罪入贖外詳為條格以時奏聞除贖罪之科詔設教因時淳薄異政形以世革輕重殊風昔商俗未移民散久矣嬰網陷辟日夜相尋若悉加正法則赭衣塞路並申𢎞宥則難用為國故使有罪入贖以全元元之命令遐邇知禁圄犴稍虛率斯以往庶幾刑措金作權典宜在蠲息可除贖罪之科更開贖刑詔堯舜以來便開贖刑中年依古許罪身入資吏下因此不無姦猾所以一日復敕禁斷川流難壅人心惟危既乖內典慈悲之義又傷外教好生之德書云與殺不辜寧失不經可復開罪身皆聽入贖赦詔民之多幸國之不幸恩澤屢加彌長姦盜朕亦知此之為病矣如不優赦非仁人之心凡厥愆耗逋負起今七年十一月九日昧爽以前在民間無問多少言上尚書督所未入者皆赦除之赦詔大運肇升嘉慶惟始劫賊餘日沒在臺府者悉可蠲放諸流徒之家並聽還本停老少連坐詔夫刑法悼耄罪不收孥禮著明文史彰前事蓋所以申其哀矜故罰有弗及近代相因厥網彌峻髫年華髮同坐入愆雖懲惡勸善宜窮其制而老幼流離良亦可愍自今逋謪之家及罪應質作若年有老少可停將送停祖父連坐詔禽獸知母而不知父無賴子弟過於禽獸至於父母並皆不知多觸王憲致及老人耆年禁執大可傷愍自今有犯罪者父母祖父母勿坐唯大逆不預今恩汝潁建州詔二豫分置其來久矣今汝潁尅定可依前代故事以懸瓠為豫州壽春為南豫改合肥為合州北廣陵為淮州項城為殷州合州為南合州恤新附諸州詔今汝南新復嵩潁載清瞻言遺黎有勞鑒寐宜覃寬惠與之更始應是緣邊初附諸州部內百姓先有負罪流亡逃叛入北一皆曠蕩不問往愆并不得挾以私讐而相報復若有犯者嚴加裁問禁止私利詔古人云一物失所如納諸隍未是切言也朕寒心消志為日久矣每當食投箸方眠撤枕獨坐懷憂憤慨申旦非為一人萬姓故耳州牧多非良才守宰虎而傅翼楊阜是故憂憤賈誼所以流涕至於民間誅求萬端或供厨帳或供廄庫或遣使命或待賔客皆無自費取給於民又復多遣遊軍稱為遏防姦盜不止暴掠繁多或求供設或責腳步又行劫縱更相枉逼良人命盡富室財殫此為怨酷非止一事亦頻禁斷猶自未已外司明加聽採隨事舉奏又復公私傳屯邸冶爰至僧尼當其地界止應依限守視乃至廣加封固越界分斷水陸採捕及以樵蘇遂致細民措手無所凡自今有越界禁斷者禁斷之身皆以軍法從事若是公家創內止不得輒自立屯與公競作以收私利至百姓樵採以供煙爨者悉不得禁及以採捕亦勿訶問若不遵承皆以死罪結正開山澤常禁詔芻牧必往姬文垂則雉兔有刑姜宣致貶藪澤山林育材是出斧斤之用比屋所資而頃世相承並加封固豈所謂與民同利惠兹黔首凡公家諸屯戍見封熂者可悉開常禁清公田詔用天之道分地之利蓋先聖之格訓也凡是田桑廢宅沒入者公創之外悉以分給貧民皆使量其所能以受田分如聞頃者豪家富室多占取公田貴價僦稅以與貧民傷時害政為蠧已甚自今公田悉不得假與豪家已假者特聽不追其若富室給貧民種糧共營作者不在禁例原宥散失官物詔朕思利兆民惟日不足氣象環回每𢎞優簡百官俸祿本有定數前代以來皆多評准頃者因循未遑改革自今以後可長給見錢依時即出勿令逋緩凡散失官物不問多少並從原宥惟事涉軍儲取公私見物不在此例通用足陌錢詔朝四而暮三衆狙皆喜名實未虧而喜怒為用頃聞外間多用九陌錢陌減則物貴陌足則物賤非物有貴賤是心有顛倒至於逺方日更滋甚豈直國有異政乃至家有殊俗徒亂王制無益民財自今可通用足陌錢令書行後百日為期若猶有犯男子謫運女子質作並同撫流移詔夫樂所自生含識之常性厚下安宅馭世之通規朕矜此庶氓無忘待旦亟𢎞生聚之略每布寬恤之恩而編户未滋遷徙尚有輕去故鄉豈其本志資業殆闕自返莫由巢南之心亦何能弭今開元發歲品物惟新思俾黔黎各安舊所將使郡無曠土邑靡游民雞犬相聞桑柘交畛凡天下之民有流移他境在天監十七年正月一日以前可開恩半載悉聽還本蠲課三年其流寓過逺者量加程日若有不樂還者即使著土籍為民准舊課輸若流移之後本鄉無復居宅者村司三老及餘親屬即為詣縣占請村內官地官宅令相容受使戀本者還有所託凡坐為市埭諸職割盜衰滅應被封籍者其田宅車牛是民生之具不得悉以沒入皆優量分留使得自止其商賈富室亦不得頓相兼併遁叛之身罪無輕重並許首出還復民伍若有拘限自還本役並為條格咸使知聞埋枯骨詔掩骼埋胔義重周經槥櫝有加事美漢策朕向隅載懷每勤造次收藏之命亟下哀矜而㝢縣遐深遵奉未洽髐然路隅往往而有言愍沈枯彌勞傷惻可明下逺近各巡境界若委骸不葬或蒢衣莫改即就收斂量給棺具庶夜哭之魂斯慰霑霜之骨有歸罷京觀詔去嵗朐山大殱醜類宜為京觀用旌武功但伐罪弔民皇王盛軌掩骼埋胔仁者用心其下青州悉使收藏立晉安王為皇太子詔非至公無以主天下非博愛無以臨四海所以堯舜克讓惟德是與文王舍伯邑考而立武王格於上下光被四表今岱宗牢落天步艱難淳風猶鬱黎民未乂自非克眀克哲允文允武豈能荷神器之重嗣龍國之尊晉安王綱文義生知孝敬自然威惠外宣德行內敏羣后歸美率土宅心可立綱為皇太子庶百年勝殘方流餘慶必世後仁永固洪業祠南郊恩詔天行彌綸覆燾之功博乾道變化資始之德成朕沐浴齊宫䖍恭上帝祗事槱燎高熛太一大禮克遂感慶兼懷思與億兆同其福惠可大赦天下尤窮者無出即年租調清議禁錮並皆宥釋所討逋叛巧籍隱年暗丁匿口開恩百日各令自首不問往罪流移他鄉聽復宅業蠲課五年孝悌力田賜爵一級居局治事當勞二年可班下遠近博採英異或德茂州閭道行鄉邑或獨行特立不求聞達咸使言上以時招聘祠南郊恩詔朕恭祗明祀昭事上靈臨竹宫而登泰壇服裘冕而奉蒼璧柴望既升誠敬克展思所以對越乾元𢎞宣德教而缺於治道政法多昧實佇羣才用康庶績可班下逺近博採英異若有確然鄉黨獨行州閭肥遁丘園不求聞逹藏器待時未加收採或賢良方正孝悌力田並即騰奏具以名上當擢彼周行試以邦邑庶百司咸事兆民無隱又世輕世重隨時約法前以劓墨用代重辟猶念改悔其路已壅並可省除祠南郊恩詔朕當扆思治政道未明昧旦劬勞亟移星紀今大皥御氣勾芒首節升中就陽禋敬克展務承天休布兹和澤尤貧之家勿收今年三調其無田業者所在量宜賦給若民有産子即依格優蠲孤老鰥寡不能自存咸加賑恤班下四方諸州郡縣時理獄訟勿使寃滯並若親覽祠南郊恩詔春司御氣䖍恭報祀陶匏克誠蒼璧禮備思隨乾覆布兹亭育凡民有單老孤稚不能自存主者郡縣咸加收養贍給衣食每令周足以終其身又於京師置孤獨園孤幼有歸華髮不匱若終年命厚加料理尤窮之家勿收租賦祠南郊恩詔奉時昭事䖍薦蒼璧思承天德惠此下民凡因事去土流移他境者並聽復宅業蠲役五年尤貧之家勿收三調孝悌力田賜爵一級改作南北郊詔夫欽若昊天厯象無違躬執耒耜盡力致敬上協星鳥俯訓民時平秩東作義不在南前代因襲有乖禮制可於震方簡求沃野具兹千畝庶允舊章耕籍田詔夫耕籍之義大矣哉粢盛由之而興禮節因之以著古者哲王咸用此作眷言八政致兹千畝公卿百辟恪恭其儀九推畢禮馨香靡替兼以風雲叶律氣象光華屬覽休辰思加奬勸可班下逺近廣闢良疇公私畎畝務盡地利若欲附農而糧種有乏亦加貸恤每使優遍孝悌力田賜爵一級預耕之司尅日勞酒豐年恩詔今兹逺近雨澤調適其穫已及冀必萬箱冝使百姓因斯安樂凡天下罪無輕重已發覺未發覺討捕未擒者皆赦宥之侵割耗散官物無問多少亦悉原除田者荒廢水旱不作無當時文例應追稅者并作田不登公格者並停各備臺州以文最逋殿罪悉從原其有因饑逐食離鄉去土悉聽復業蠲課五年幸蘭陵恩詔朕自違桑梓五十餘載乃眷東顧靡日不思今四方𣢾關海外有截獄訟稍簡國務小閒始獲展敬園陵但增感慟故鄉老少接踵遠至情貌孜孜若歸於父宜有以慰其此心並可錫位一階并加頒賚所經縣邑無出今年租賦監所責民蠲復二年并普賚內外從官軍主左右錢米各有差推恩六親詔推恩六親義彰九族班以矦爵亦曰惟允凡是宗戚有服屬者並可賜沐食鄉亭矦各隨逺近以為差次其有昵親自依舊章停賀瑞詔王公卿士今拜表賀瑞雖則百辟體國之誠朕懷良有多愧若其澤漏川泉仁被動植氣調玉燭治致太平爰降嘉祥可無慙德而政道多缺淳化未凝何以仰叶辰和逺臻𡨕貺此乃更彰寡薄重增其尤自今可停賀瑞罷祈禱詔夫有天下者義非為已凶荒疾癘兵革水火有一於此責歸元首今祝史請禱繼諸不善以朕身當之永使災害不及萬姓俾兹下民稍䝉寧息不得為朕祈福以增其過特班逺邇咸令遵奉建學詔建國君民立教為首不學將落嘉植靡由朕肇基明命光宅區宇雖耕耘雅業傍闡藝文而成器未廣志本猶闕非所以鎔範貴遊納諸軌度思欲式敦齒讓自家刑國今聲訓所漸戎夏同風宜大啓庠斆博延胄子務彼十倫𢎞此三德使陶鈞逺被微言載表遣皇子及王矦子弟入學詔王子從學著自禮經貴遊咸在實惟前誥所以式廣義方克隆教道今成均大啓元良齒讓自斯以降並宜𨽻業皇太子及王侯之子年在從師者可令入學𢎞經術詔二漢登賢莫非經術服膺雅道名立行成魏晉浮蕩儒教淪歇風節罔樹抑此之由朕日昃罷朝思聞俊異收士得人實惟酬奬可置五經博士各一人廣開館宇招內後進又𢎞經術詔建國君民在教為首砥身礪行由乎經術朕肇基明命光宅區宇雖耕耘雅業傍闡藝文而成器未廣志本猶闕非所以鎔範貴遊納諸軌度思欲式敦讓齒自家刑國今聲訓所漸戎夏同風宜大啓庠斆博延胄子務彼十倫弘此三德使陶鈞遠被微言載表問羣臣音樂詔夫聲音之道與政通矣所以移風易俗明貴下賤而韶濩之稱空傳咸英之實靡記漢魏以來陵替滋甚遂使雅鄭混淆鐘石斯謬天人缺九變之節朝宴失四懸之儀歷年永久將墮於地朕昧爽坐朝思求厥㫖而舊章匪存未獲釐正寤寐有懷所為歎息卿學術通明可陳所見罷鳳凰銜書詔自宋齊以來有鳳凰銜書伎至是罷之朕君臨南面道風蓋闕嘉祥時至為愧已多假令巢侔軒閣集同昌户猶當顧循寡德推而不居况於名實頓爽自欺耳目一日元㑹太樂奏鳳凰銜書伎至乃舍人受書升殿跪奏誠復興平前代率由自逺內省懷慙彌與事篤可罷之放遣後宫詔宋氏以來並恣淫侈傾宫之富遂盈數千推算五都愁窮四海並嬰罹寃橫拘逼不一撫絃命管良家不被蠲織室繡房幽厄猶見役弊國傷和莫斯為甚凡後宫樂府西解暴室諸如此例一皆放遣若衰老不能自存官給廪食禁止宫人縱觀郊祀詔夫禋郊饗帝至敬攸在致誠盡慤猶懼有違而往代多令宫人縱觀兹禮幃宫廣設輜軿耀路非所以仰䖍蒼昊昭感上靈屬車之間見譏前世便可自今停止南面詔頃代以來元日朝畢次㑹羣臣則移就璧下東向坐求之古義王者宴萬國唯應南面何便居東面議洗匜詔祭祀用洗匜中水盥仍又滌爵爵以禮神宜窮精潔而一器之內雜用洗手外可詳議於是御及三公應盥各用一匜守視晉宋齊諸陵詔命世興王嗣賢傳業聲稱不朽人代徂遷二賔以位三恪義在時事浸遠宿草榛蕪望古興懷言念愴然晉宋齊三代諸陵有職司者勤加守護勿令細民妄相侵毁作兵有少補使充足前無守視並可量給差等品流詔禮闈文閣宜率舊章貴賤既位各有差等俯仰拜伏以明王度濟濟洋洋具瞻斯在頃因多難治綱弛落官非積及榮由幸至六軍尸四品之職青紫治白簿之勞振衣朝伍長揖卿相趨步廣闥並驅丞郎遂冠履倒錯圭甑莫辨靜言疚懷思返流弊且玩法惰官動成逋弛罰以常科終未懲革夫檟楚申威蓋代斷趾笞捶有令如或可從外詳共平議務盡厥理郊廟等令視散騎詔南郊明堂陵廟等令與朝請同班於事為輕可改視散騎侍郎散騎通直詔在昔晉初仰惟盛化常侍侍中並奏帷幄員外常侍特為清顯陸始名公之𦙍位居納言曲䝉優禮方有斯授可分門下二局委散騎常侍尚書案奏分曹入集書通直常侍本為顯爵員外之選宜參舊准人數依正員格自是散騎視侍中通直視中丞員外視黃門郎尚書五都詔尚書五都職參政要非但總領衆局亦乃方軌二丞頃雖求才未臻妙簡可革用士流每盡時彥庶同持領秉此羣目於是以都令史視奉朝請牙像詔天慈普覆義無不攝方便利物豈有方所上虞縣民李𦙍之掘地得一牙像方減二寸兩邉雙合俱成獸形其內一邉佛像一十二軀一邉一十五軀刻畫明淨巧迹妙絶將神靈所成非人功也中有真形舍利六焉東州昔經奏上未以為意而𦙍之銜愆縲紲東冶真形舍利降在中署光明顯發示希有相大悲救苦良有以乎宜承佛力𢎞兹寬大凡天下罪無輕重在今月十六日昧爽已前皆赦除之即日散出奉迎法身還臺供養出阿育王塔下佛舍利詔大同四年八月月犯五車老人星見改造長干寺阿育王塔出佛舍利髮爪阿育鐵輪王也王閻浮一天下一日夜役鬼神造八萬四千塔此其一焉乘輿幸長干寺設無礙法喜食詔曰天地盈虛與時消息萬物不得齊其蠢生二儀不得恆其覆載故勞逸異年歡慘殊日去歲失稔斗粟貴騰民有困窮遂臻斯濫原情察咎或有可矜下車問罪聞諸往誥責歸元首實在朕躬若皆以法繩則自新無路書不云乎與殺不辜寧失不經易曰隨時之義大矣哉今真形舍利復現於世逢希有之事起難遭之想今出阿育王寺設無礙㑹耆年童齒莫不欣悅如積饑得食如久别見親幽顯歸心遠近馳仰士女霞布冠蓋雲集因時布德允叶人靈凡天下罪無輕重皆赦除之代牲詔夫神無常饗饗于克誠所以西鄰禴祭實受其福宗廟祭祀猶有牲牢無益至誠有纍冥道自今四時蒸嘗外可量代八座議以大脯代一元大武既停宰殺無復省牲之事請立省饌儀帝從之薦蔬詔今雖無復牲腥猶有脯修之類即之幽明義為未盡可更詳定悉薦時蔬參議大餅代大脯餘悉用蔬菜手詔何㸃昔因多暇得訪逸軌坐修竹臨清池忘今語古何其樂也暫别丘園十有四載人事艱阻亦何可言自應運在天每思相見密邇物色勞甚山阿嚴光排九重踐九等談天人敘故舊有所不臣何傷於高文先以皮辨謁子桓伯况以縠綃見文叔求之往䇿不無前例今賜卿鹿皮巾等後數日望能入也徴何㸃為侍中詔前徴士何㸃高尚其道志安容膝脫落形骸栖志窅冥朕日昃思治尚想前哲况親得同時而不與為政㗋脣任切必俟邦艮誠望惠然屈居獻替可徴為侍中徴庾詵庾承先詔明揚振滯為政所先旌賢求士夢佇斯急新野庾詵止足栖退自事却掃經史文藝多所貫習潁川庾承先學道黃老該涉釋教並不競不營安茲枯槁可以鎮躁敦俗詵可黃門侍郎承先可中書侍郎勒州縣時加敦遣庶能屈志方冀鹽梅臧盾兼領軍詔總一六軍非才勿授御史中丞新除散騎常侍盾志懷忠密識用詳慎當官平允處務勤恪必能緝斯戎政可兼領軍常侍如故授江革臨川王長史詔前貞威將軍鎮北長史廣陵太守江革才思通贍出內有聞在朝正色臨危不撓首佐台鉉實允僉諧可太尉臨川王長史拜范述曽太中大夫詔中散大夫范述曾昔在齊世忠直奉主往蒞永嘉治身廉約宜加禮秩以厲清操可太中大夫賜絹二十匹拜何逺給事黃門侍郎詔何逺前在武康已著廉平復蒞二邦彌盡清白政先治道惠留民愛雖古之良二千石無以過也宜升內榮以顯外迹可給事黃門侍郎與陳慶之手詔慶之轉東宫直閣𨽻領軍伐魏渦陽據其城乘勝前頓城父高祖手詔嘉之本非將種又非豪家􅔵望風雲以至於此可深思奇略善克令終開朱門而待賔揚聲名於竹帛豈非大丈夫哉以伏暅為豫章內史詔國子博士領長水校尉伏暅為政廉平宜加將養勿使恚望致虧士風可豫章內史遣豫章王北伐詔廟謨已定王略方舉侍中領軍將軍西昌侯淵藻可便親戎以前啓行鎮北將軍南兖州刺史豫章王綜董馭雄桀風馳次邁其餘衆軍計日差遣初中後師善得嚴辦朕當六軍雲動龍舟濟江授武陵王揚州刺史詔貞白儉素是其清也臨財能讓是其廉也知法不犯是其慎也庶事無留是其勤也旌沈崇傃詔前軍沈崇傃少有志行居喪踰禮齊制不終未得大葬自以行乞淹年哀典多闕方欲以永慕之晨更為再朞之始雖即情可矜禮有明斷可便令除釋擢補太子洗馬旌彼門閭敦茲風教旌甄恬詔朕虛已欽賢寤寐盈想詔彼羣嶽務盡搜揚恬既孝行殊異聲著邦壤敦風厲俗𢎞益茲多牧守騰聞義同親覽可旌表室閭答徐勉修五禮詔勉表如此因革允釐憲章孔備功成業定於是乎在可以光被八表施諸百代俾萬世之下知斯文在斯主者其按以遵行勿有失墜答陶𢎞景請解官詔卿遺纍郤粒尚想清虛山中閒靜得性所樂當善遂嘉志也若有所須便可以聞仍賜帛十匹燭二十挺答陶𢎞景進冥通記詔省疏并見周氏遣跡真言顯然符驗前誥二三明白益為奇特四卷今留之見淵文并具一二唯增讃歎與任昉詔聊為七夕詩五韻殊不近詠歌卿雖訥於言而辨於才可即制付使者答劉之遴詔周易尚書禮記毛詩並有高祖義疏惟左傳尚闕之遴著春秋大意十科左氏十科三傳同異十科合三十事上之高祖詔答省所撰春秋義比事論書詞微㫖逺編年之教言闡義繁丘明傳洙泗之風公羊禀西河之學鐸椒之解不追瑕丘之說無取繼踵胡母仲舒云盛因修榖梁千秋最篤張蒼之傳左氏賈誼之襲荀卿源本分鑣指歸殊致詳略紛然其來舊矣昔在弱年乃經研味一從遺置迄將五紀兼晚冬晷促機事罕暇夜分求衣未遑搜括須待夏景試取推尋若溫故可求别酬所問也答周𢎞正詔設卦觀象事遠文高作繫表言辭深理奧東魯絶編之思西伯幽憂之作事逾三古人更七聖自商瞿禀承子庸傳授篇簡湮沒歲月遼遠田生表菑川之譽梁丘擅琅琊之學代郡范生山陽王氏人藏荆山之寶各盡𤣥言之趣說或去取意有詳略近縉紳之學咸有稽疑隨答所問巳具别解知與張譏等三百一十二人須釋乾坤文言及二繫萬機小暇試當討論贈栁慶逺詔念往篤終前王令則式隆寵數列代恆規使持節都督雍梁南北秦四州郢州之竟陵司州之隨郡諸軍事安北將軍寧蠻校尉雍州刺史雲杜縣開國矦柳慶遠器識淹曠思懷通雅爰初草昧預屬經綸遠自升平契濶禁旅重牧西藩方𢎞治道奄至殞喪傷慟於懷宜追榮命以彰茂勳可贈侍中中軍將軍開府儀同三司鼓吹矦如故諡曰忠惠賻錢二十萬布二百匹贈王茂詔旌德紀勳哲王令軌念終追遠前典明誥故使持節散騎常侍驃騎將軍開府儀同三司江州刺史茂識度淹廣器宇凝正爰初草昧盡誠宣力綢繆休戚契濶屯夷方賴謀猷永隆朝寄奄至薨殞朕用慟於厥心宜增禮數式昭盛烈可贈侍中太尉加班劍二十人鼓吹一部諡曰忠烈追封蕭穎胄詔念功惟德列代所同追遠懷人彌與事篤齊故侍中丞相尚書令穎胄風格峻遠器㝢深邵清猷盛業聞望斯歸締構義始肇基王迹契濶屯夷載形心事朕膺大改物光宅區宇望岱觀河永言號慟可封巴東郡開國公食邑三千户本官如故贈范雲詔追遠興悼常情所篤况問望斯在事深朝寄者乎故散騎常侍尚書右僕射霄城矦雲器範貞正思懷經遠爰初立志素履有聞脫巾來仕清績仍著燮務登朝具瞻惟允綢繆翊贊義簡朕心雖勤非負靮而舊同論講方騁遠塗永毗庶政奄致喪殞傷悼于懷宜加命秩式備徽典可追贈侍中衛將軍僕射矦如故并給鼓吹一部贈袁昂詔侍中特進左光祿大夫司空昻奄至薨逝惻怛于懷公器宇凝素志誠貞方端朝燮理嘉猷載緝追榮表德實惟令典可贈本官鼓吹一部給東園祕器朝服一具衣一襲錢二十萬絹布一百匹蠟二百斤即日舉哀贈蔡道恭詔持節都督司州諸軍事平北將軍司州刺史漢壽縣開國伯道恭器幹詳審才志通烈王業肇構致力陜西受任邊垂效彰所蒞冦賊慿陵竭誠守禦奇謀間出捷書日至不幸抱疾奄至殞喪遺略所固得移氣朔自非徇國忘已忠果並至何能身沒守存窮而後屈言念傷悼特兼常懷追榮加等抑有恆數可贈鎮西將軍使持節都督刺史伯如故并尋購喪櫬隨宜資給贈張惠紹詔張惠紹志略開濟幹用貞果誠勤義始績聞纍任爰居禁旅盡心朝夕奄至殞喪惻愴于懷宜追寵命以彰勳烈可贈護軍將軍給鼓吹一部布百匹蠟二百斤諡曰忠贈鄭紹叔詔追往念功前王所篤在誠惟舊異代同規通直散騎常侍右衛將軍東興縣開國矦紹叔立身清正奉上忠恪契濶藩朝情績顯著爰及義始實立茂勳作牧疆境效彰所蒞方申任寄協贊心膂奄至殞喪傷痛於懷宜加優典隆兹寵命可贈散騎常侍護軍將軍給鼓吹一部東園祕器朝服一具衣一襲凶事所須隨由資給諡曰忠贈馮道根詔豫寧縣開國伯新除散騎常侍領左軍將軍馮道根奉上能忠有功不伐撫人留愛守邊難犯祭遵馮異郭伋李牧不能過也奄致殞喪惻愴于懷可贈信威將軍左衛將軍給鼓吹一部賻錢十萬布百匹諡曰威贈呂僧珍詔思舊篤終前王令典追榮加等列代通規散騎常侍領軍將軍平固縣開國侯僧珍器思淹通識宇詳濟竭忠盡禮知無不為與朕契濶情兼屯泰大業初搆茂勳克舉及居禁衛朝夕盡誠方參任台槐式隆朝寄奄致喪逝傷慟於懷宜加優典以隆寵命可贈驃騎將軍開府儀同三司常侍鼓吹矦如故給東園祕器朝服一具衣一襲喪事所須隨由備辦諡曰忠敬矦贈昌義之詔護國將軍營道縣開國矦昌義之幹略沈濟志懷寬隱誠著運始效彰邊服方申爪牙寄以禁旅奄至殞喪惻愴于懷可贈散騎常侍車騎將軍并鼓吹一部給東園祕器朝服一具賻錢二萬布二百匹蠟二百斤諡曰烈贈張𢎞策詔亡從舅衛尉慮發所忽殞身祅豎其情理清貞器識淹濟自藩升朝契濶夷阻加外氏凋衰饗嘗屢絶興感渭陽情寄斯在方賴忠勳翼宣寡薄報效無徴永言增慟可贈散騎常侍車騎將軍給鼓吹一部諡曰愍追贈張𢎞籍詔亡舅齊鎮西參軍素風雅猷夙肩名輩降年不永早世潛輝朕少離苦辛情地彌切雖宅相克成輅車靡贈興言永往觸目慟心可追贈廷尉卿贈孔休源詔愼終追遠厯代通規褎德疇庸先王令典宣惠將軍金紫光祿大夫監揚州孔休源風業貞正雅量冲邈升榮建禮譽重縉紳理務神州化覃歌詠方興仁壽穆是彝倫奄然永逝倍用悲惻可贈散騎常侍金紫光祿大夫賻第一材一具布五十匹錢五萬蠟二百斤尅日舉哀喪事所須隨便資給諡曰貞子贈蕭子顯詔仁威將軍吳興太守子顯神韻峻舉宗中佳器分竹未久奄到喪殞惻愴于懷可贈侍中中書令今便舉哀贈裴子野詔鴻臚卿領步兵校尉知著作郎兼中書通事舍人裴子野文史足用廉白自居劬勞通事多厯年所奄致喪逝惻愴空懷可贈散騎常侍賻錢五萬布五十匹即曰舉哀諡曰貞子贈顧協詔員外散騎常侍鴻臚卿兼中書通事舍人顧協廉潔自居白首不衰久在省闥內外稱善奄然殞喪惻怛之懷不能已巳傍無近親彌足哀者大殮既畢即送其喪柩還鄉并營冢槨並皆資給悉使周辦可贈散騎常侍令便舉哀諡曰溫子贈周捨詔太子詹事豫州大中正捨奄至殞喪惻愴于懷其學思堅明志行開敏劬勞機要多厯歲年才用未窮彌可嗟慟宜隆追逺以旌善人可贈侍中護軍將軍鼓吹一部給東園祕器朝服一具衣一襲喪事隨由資給諡曰簡子又恤周捨詔故侍中護軍將軍簡子捨義該𤣥儒博窮文史奉親能孝事君盡忠厯掌機密清貞自居食不重味身靡兼衣終亡之日內無妻妾外無田宅兩兒單貧有過古烈往者南司白渦之劾恐外議謂朕有私致此黜免追愧若人一介之善外可量加褒異以旌善人賻陸雲公手詔給事黃門侍郎掌著作陸雲公風尚優敏後進之秀奄然殂謝良以惻然可尅日舉哀賻錢五萬布四十匹贈丘仲孚詔豫章內史丘仲孚重試大邦責以後效非直悔吝云亡實亦政績克舉不幸殞喪良以傷惻可贈給事黃門侍郎恤何㸃詔新除侍中何㸃栖遲衡泌白首不渝奄至殞喪倍懷傷惻可給第一品材一具賻財二萬布五十匹喪事所須內監經理諡庾詵貞節處士詔旌善表行前王所敦新野庾詵荆山珠玉江陵杞梓靜矦南度固有名德獨貞苦節孤芳素履奄隨運往惻愴于懷宜諡貞節處士以顯高烈贈臨川王宏詔侍中太尉臨川王宏器宇冲貴雅量𢎞通爰初弱齡行彰素履逮於應務嘉猷載緝自皇業啓基地惟介弟久司神甸厯位台階論道登朝物無異議朕友于之至家國兼情方𢎞燮贊儀刑列辟天不憖遺奄焉不永哀痛抽切震慟于厥心宜增峻禮秩式昭懋典可贈侍中大將軍揚州牧假黃鉞王如故贈南平王偉詔旌德紀功前王令典愼終追遠列代通規故侍中中書令大司馬南平王偉器宇宏曠鑒式𢎞簡爰在弱齡清風載穆翼佐草昧勳高樊沔契濶艱難劬勞任寄及贊務論道𢎞兹衮職奄焉薨逝朕用震慟于厥心宜隆寵命式昭茂典可贈侍中太宰王如故贈鄱陽王恢詔故使持節散騎常侍都督荆湘雍梁益寧南北秦八州諸軍事驃騎大將軍開府儀同三司荆州刺史鄱陽王恢風度開朗器情凝質爰在弱歲美譽克宣洎於從政嘉猷載緝方入正論道𢎞燮台階奄焉薨逝朕用傷慟于厥心宜隆寵命以申朝典可贈侍中司徒王如故改封南昌公為侯詔庭堅世祀靡輟於宗周樂毅錫壤乃昭於洪漢齊故太尉南昌公含章履道草昧興齊謨明翌贊同符在昔雖子房之蔚為帝師文若之隆比王佐無以尚也朕膺厯受圖惟新寶命莘莘玉帛升隆有興永言前代敬惟徽烈匪直懋勳義兼懷樹可降封南昌縣公為侯食邑千户齊世王侯降封詔興運升降前代舊章齊世王矦封爵悉皆降省其有效著艱難者别有後命惟宋汝隂王不在除例詔許慧詔大中大夫王敬𦙍卒遺命不得設復魄旌旐一蘆䕠籍下一枚覆上氣絶便沐浴藍輿載尸還隧中敬𦙍外甥許慧詔因阮研以聞詔曰敬𦙍令其息崇素氣絶便沐浴籍以二蘆䕠鑿地周身歸葬忠矦此達生之格言賢夫玉匣石槨遠矣然子于父命亦有所從有所不從今崇素若信遺意土周淺薄屬辟不施一朝見侵狐鼠戮尸已甚父可以訓子子亦不可行之外內易棺此自奉親之情籍土而葬亦通人之意宜兩捨兩取以達父子之志棺周於身土周於槨去其牲奠斂以時服一可以申情二可以稱家禮教無違生死無辱此故當為安也責蕭昱詔昱表如此古者用人必前明試皆須績用既立乃可自退之高昔漢光武兄子章興二人並有名宗室就欲習吏事不過章為平陰令興為緱氏宰政事有能方遷郡守非直政績見稱即是光武猶子昱之才地豈得比類焉往歲處以淮南郡既不肯行續用為招遠將軍鎮北長史襄陽太守又以邊外致辭改除招遠將軍永嘉太守復云內地非願復問晉安臨川隨意所擇亦復不行解巾臨郡事不為薄數有致辭意欲何在且昱諸兄遞居連率相繼推轂未嘗缺歲其同産兄景今正居藩鎮朕豈厚於景而薄於昱正是朝序物議次第若斯於其一門差自無愧無論今日不得如此昱兄弟昔在布衣以處成長於何取立豈得任情反道背天違地孰謂朝廷無有憲章特是未欲致之於理既表解職可聼如啓責西豐矦正德詔武帝初養正德為子及生昭明正德還本心常怏怏為輕車將軍奔魏復逃歸特復本封普通六年隨豫章王北侵棄軍委走下獄帝詔之徙臨海郡汝以猶子情兼常愛故越先汝兄剖符連郡往年在蜀昵近小人猶謂少年情志未定更於吳郡殺戮無辜劫盜財物雅然無畏及還京師專為逋逃乃至江乘要道湖頭斷路遂使京邑士女早閉晏開又奪人妻妾略人子女徐敖非獨失其配匹乃橫尸道路王伯敖列卿之女誘為妾媵我每加掩抑冀汝自新了無悛革怨讐逾甚遂匹馬奔亡志懷反噬遣信慰問冀汝能還果能來歸遂我夙志謂汝不好文史志在武功令汝杖節董戎前驅豈謂汝狠心不改包藏禍胎志欲覆敗國計以快汝心今當宥汝以逺無令房纍自隨敕所在給汝禀餼王新婦見理等當停太尉間汝餘房纍悉許同行光宅寺金像詔銅初不送何緣乃爾豈不以真相應感獨表神竒乎可鐫著花趺以為靈志寬禁志公詔志公迹拘塵垢神遊冥寂水火不能燋濡蛇虎不能侵懼語其佛理則聲聞其上談其隱淪則遁仙高者豈得以俗士常情空相拘制何其鄙狹一至于此自今行來隨意出入勿得復禁敕手敕何𦙍藝文載沈約為高祖作但既係手敕應非代言吾猥當期運膺此樂推而顧已䝉蔽昧於治道雖復劬勞日昃思致隆平而先王遺範尚藴方策息舉之用存乎其人兼以世道澆暮爭詐繁起改俗遷風良有未易自非以儒雅𢎞朝高尚軌物則汨流所至莫知其限治人之與治身獨善之與兼濟得失去取為用孰多吾雖不學頗好博古尚想高塵每懷擊節今世務紛亂憂責是當不得不屈道巖阿共成世美必望深達往懷不吝濡足今遣傾軍司馬王果宣㫖諭意遲面在近與何𦙍敕高祖凡再敕𦙍於是遣何子朗等於東山受學𦙍以若邪迫隘不容生徒遷秦望山頃者學業淪廢儒術將盡閭閻縉紳鮮聞好事吾每思𢎞奬其風未移當扆興言為歎本欲屈卿暫出開導後生既屬廢業此懷未遂延佇之勞載盈夢想理舟虛席須俟來秋所望惠然申其宿抱耳卿門徒中經明行修厥數有幾且欲瞻彼堂堂置此周行便可具以名聞副其勞望又比嵗學者殊為寡少良由無復聚徒故明經斯廢每一念此為之慨然卿居儒宗兼以德素當敕後進有意向者就卿受業想思深誨誘使斯文載興又𦙍兄㸃卒高祖敕與𦙍賢兄徴君弱冠拂衣華首一操心遊物表不滯近跡脫落形骸寄之逺理性情勝致遇興彌高文㑹酒德撫際逾逺朕膺籙受圖思長聲教朝多君子既貴成雅俗野有外臣宜𢎞此難進方賴清徽式隆大業昔在布衣情期早著資以仲虞之秩待以子陵之禮聽覽暇日角巾引見窅然汾射茲焉有託一旦萬古良懷震悼卿友于純至親從凋亡偕老之願致使反奪纒綿永恨伊何可任永矣奈何敕昭明太子太子性至孝母喪水漿不入口每哭輒慟􅑲高祖遣顧協宣㫖曰毁不滅性聖人之制禮不勝喪比於不孝有我在那得自毁如此可即強進飲食雖屢奉敕勸逼日進一溢不嘗菜果之味聞汝所進過少轉就嬴瘵我比更無餘病正為汝如此胸中亦圮塞成疾故應強加饘粥不使我恆爾懸心敕報皇太子武帝鋭意儒雅疏簡刑獄姦吏招權巧文㺯法簡文為皇太子春宫視事見而愍之乃上疏帝手敕報之竟弗之從頃年以來處處之役惟資徒謫逐急充配若科置繁細義同簡約切須之處終不可得引例興訟紛紜方始防杜姦巧自是為難更當别思取其便也答皇太子請御講敕省啓欲須吾講具汝等意書云一日二日惟日萬機今復過之年耆根熟氣力衰耗荷此黼扆有踰重負日中或得一食或不得食周旦吐握未足為勞楚君旰食方今非切未明求衣聿來弗休晝勞夜思精華已竭數術多事未獲垂拱兼國務靡寄豈得坐談須道行民安乃當議耳越敕又省重啓猶欲須吾講說具汝等所懷亦不異前答緣邊未入國度多乏如是等事恆須經計其餘繁碎非可具言率土未寧菜食者衆兼欵附相繼賞與未周怨望者多懷音者少漢世渾并賈誼亦且流慟魏室無虞楊阜猶云可悲况今爪牙腹心不二之臣又論道帷幄之士四聰不開八逹路擁王矦雖多維城靡寄晝厲夕惕如履霜創以朽索馭六馬豈是為喻詩不云乎知我者謂我心憂不知我者謂我何求方今信非談日汝等必欲爾者自可令諸僧於重雲中講道義也越敕又省汝等啓復具所懷汝等未達稼穡之艱難安知天下負重庸主少君所以繼踵顛覆皆由安不思危况復未安者耶殷鍳不逺在於前代吾今所行雖異曩日但知講說不憂國事則與彼人異術同亡易言其亡繫于苞桑斯則乾乾夕惕僅而後免汝等思之一二具如前敕越敕答晉安王請開講啓敕省啓具汝所懷法事既善豈不欣然吾內外衆緣憂勞紛總食息無暇廢事論道是所未遑汝便為未體國也越敕答晉安王謝開講般若啓敕省啓具知為汝講金字般若波羅密經發題始竟四衆雲合華夷畢集連雨纍日深慮廢事景物開明幽顯同慶實相之中本無去來身雖不到心靡不在善自調養慎勿牽勞尚有兩旬日數猶奢今雖不同後㑹未晚也吾始還臺不復多敕越敕答菩提樹頌手敕省啓覽所上菩提樹頌捃採致佳辭味清淨仰譛法王稱歎道樹意思口說乃至手書極得三業之善但所言國美皆非事實不無綺語過也越敕答晉安王謝幸善覺寺啓敕汝所營建慈悲寶剎諸佛威神不營多功才欲運力即便豎立幽顯欣仰我亦隨喜不得與汝同共瞻拜此以為恨耳越敕敕貞陽矦淵明武帝既納矦景大舉北侵以淵明都督諸軍趣彭城淵明師次呂梁作寒山堰以灌彭城水及于堞魏遣將赴救兵敗被執矦景志清鄴洛以雪讐恥其先率大軍隨機撫定汝等衆軍可止於寒山築堰引清水以灌彭城大水一沈孤城自殄慎勿妄動手敕劉之遴之遴領步兵校尉出為郢州行事意不願出固辭高祖手敕遂為有司奏免朕聞妻子具孝衰於親爵祿具忠衰於君卿既內足理忘奉公之節賜陸倕敕太子中舍人陸倕所製石闕銘辭義典雅足為佳作昔虞丘辨物邯鄲獻賦賞以金帛前史美談可賜絹三十匹手敕張率率為司徒謝朏掾直文德待詔省奏待詔賦高祖手敕答之省賦殊佳相如工而不敏枚臯速而不工卿可謂兼二子於金馬矣責賀琛敕琛遷散騎常侍是時皆緣飾姦諂深害時政琛遂啓陳事條封奏高祖大怒召主書口授敕責琛琛但謝過不敢復有指斥謇謇有聞殊稱所期但朕有天下四十餘年公車讜言見聞聽覽所陳之事與卿不異常欲承用無替懷抱每苦倥偬更增惛惑卿珥貂紆組博問洽聞不宜同於闟茸止取名字宣之行路言我能上事明言得失恨朝廷之不能用或誦離騷蕩蕩其無人遂不御乎千里或誦老子知我者希則我貴矣如是獻替莫不能言正旦獸樽皆其人也卿可分别言事啓乃心沃朕心卿云今北邊稽服政是生聚教訓之時而民失安居牧守之過朕無則哲之知觸向多弊四聰不開四明不逹內省責躬無處逃咎堯為聖主四凶在朝况乎朕也能無惡人但大澤之中有龍有蛇縱不盡善不容皆惡卿可分明顯出某刺史橫暴某太守貪殘某官長凶虐尚書蘭臺主書舍人某人姦猾某人取與明言其事得以黜陟向令舜但聽公車上書四凶終自不知堯亦永為暗主卿又云東境户口空虛良由使命繁多但未知此是何使卿云駑困邑宰則拱手聼其漁獵桀黠長吏又因之而為貪殘並何姓名廉平掣肘復是何人朝廷思賢有如饑渴廉平掣肘實為異事宜速條聞當更擢用凡所遣使多由民訟或復軍糧諸所颷急蓋不獲已而遣之若不遣使天下枉直一何綜理事實云何濟辦惡人日滋善人日蔽欲求安卧其可得乎不遣使而得事理此乃佳事無足而行無翼而飛能到在所不威而伏豈不幸甚卿既言之應有深見宜陳祕術不可懷寶迷邦卿又云守宰貪殘皆由滋味過庶貪殘糜費已如前答漢文雖愛露臺之産鄧通之錢布於天下以此而治朕無隗焉若以下民飲食過差亦復不然天監之初思之已甚其勤力營産則無不富饒惰游緩事則家業貧窶勤修産業以營盤案自已營之自已食之何損於天下無賴子弟惰營産業致於貧窶無可施設此何益於天下且又意雖曰同富富有不同慳而富者終不能設奢而富者於事何損若使朝廷緩其刑此事終不可斷若急其制則曲屋密房之中云何可知若家家搜檢其細已甚欲使吏不呼門其可得乎更相恐脅以求財帛足長禍萌無益治道若以此指朝廷我無此事昔之牲牢久不宰殺朝中㑹同菜蔬而已意粗得奢約之節若復減此必有蟋蟀之譏若以為功德事者皆是園中之所産育功德之事亦無多費變一瓜為數十種食一菜為數十味不變瓜菜亦無多種以變故多何損於事亦毫芥不關國家如得財如法而用此不愧乎人我自除公宴不食國家之食多厯年稔乃至宫人亦不食國家之食積纍歲月凡所營造不關材官及以國匠皆資雇借以成其事近之得財頗有方便民得其利國得其利我得其利營諸功德或以卿之心度我之心故不能得知所得財用暴於天下不得曲辭辨論卿又云女妓越濫此有司之責雖然亦有不同貴者多畜妓樂至於勳附若兩掖亦復不聞家有二八多畜女妓者此並宜具言其人當令有司振其霜豪卿又云乃追恨所取為少如復傅翼增其搏噬一何悖哉勇怯不同貪廉各用勇者可使進取怯者可使守城貪者可使捍禦廉者可使牧民向使叔齊守於西河豈能濟事吳起育民必無成功若使吳起而不重用則西河之功廢今之文武亦復如此取其搏噬之用不能得不重更任彼亦非為朝廷為之傅翼卿以朝廷為悖乃自甘之當思致悖所以卿云冝𨗳之以節儉又云至治者必以淳素為先此言大善夫子言其身正不令而行其身不正雖令不從朕絶房室三十餘年無有淫佚朕頗自計不與女人同屋而寢亦三十餘年至於居處不過一床之地雕飾之物不入於宮此亦人所共知受生不飲酒受生不好音聲所以朝中曲宴未嘗奏樂此羣賢之所觀見朕三更出理事隨事多少事少或中前得竟或事多至日昃方得就食日常一食若晝若夜無有定時疾苦之日或亦再食昔腰腹過於十圍今之瘦削裁二尺餘舊帶猶存非為忘說為誰為之救物故也書曰股肱惟人良臣惟聖向使朕有股肱可得中主今乃不免居九品之下不令而行徒虛言耳卿今慊言便罔知所答卿又云百司莫不奏事詭競求進此又是誰何者復是詭事今不使外人呈事於義可否無人廢職職可廢乎職廢則人亂人亂則國安乎以咽廢飱此之謂也若斷呈事誰尸其任事委之人云何可得是故古人云專聽生姦獨任成亂猶二世之委趙高元后之付王莽呼鹿為馬卒有閻樂望夷之禍王莽亦終移漢鼎卿云吹毛求疵復是何人所吹之疵擘肌分理復是何人乎事及深刻繩逐並復是誰又云治署邸肆何者宜除何者宜省國容戎備何者宜省何者未須四方屯傳何者無益何者妨民何處興造而是役民何處費財而是非急若為討召若為徴賦朝廷從來無有此事靜息之方復何者宜各出其事具以奏聞卿云若不及于時大息其民事至方圖知無及也如卿此言即時便是大役其民是何處所卿云國弊民疲誠如卿言終須出其事不得空作漫語夫能言之必能行之富國彊兵之術急民省殺之宜號令逺近之法並宜具列若不具列則是欺罔朝廷空示頰舌凡人有為先須內省惟無瑕者可以戮人卿不得厯詆內外而不極言其事佇聞重奏當後省覽付之尚書班下海內庶亂羊永除害馬長息惟新之美復見今日敕敕答臣下神滅論位現致論要當有體欲談無佛應設賔主標其宗㫖辨其短長來就佛理以屈佛理則有佛之義既躓神滅之論自行豈有不求他意妄作異端運其隔心鼓其騰口虛畫瘡痏空致詆訶篤時之蟲驚疑於往來滯甃之蛙河漢於遠大其故何也淪䝉怠而爭一息抱孤陋而守井幹豈知天地之長久溟海之壯濶孟軻有云人之所知不如人之所不知信哉觀三聖設教皆云不滅其文浩博難可具載止舉二事試以為言祭義云惟孝子為能饗親禮運云三日齊必見所祭若謂饗非所饗見非所見違經背親言語可息神滅之論朕所未詳敕光祿大夫江蒨蒨子䋔幼有孝性父患眼䋔夢一僧云飲慧眼水必差及覺莫能解者草堂寺智者法師曰無量壽經云慧眼見真能渡彼岸蒨乃啓捨同夏縣界牛屯里舍為寺乞賜嘉名敕答云云及就創造泄故井井水清洌依夢取水洗眼及煮藥遂差時人謂之孝感純臣孝子往往感應晉世顔舍遂見冥中送藥近見智者知卿第二息感夢云飲慧眼水慧眼則是五眼之一號若欲造寺可以慧眼為名敕沈約撰佛記序去歲令虞闡等撰佛記并令作序序體不稱頻治改猶未盡致尋佛教因三假以寄法藉二諦以明理達相求宗不著㑹道論其㫖歸似未至極乃不應以此相煩亦是一途善事可得為厝筆不以故指敕闡等結序末體又似小異與周捨論斷肉敕法寵所言慚愧而食衆生此是經中所明羅剎婦女云我念汝我食汝法寵此心即是經之羅剎又僧辨所道自死肉若如此說鴟鴉鳩鴿觸處不死那不見有一自死者麞鹿雉兔充滿野澤亦不曽見有一自死者而覓死肉其就屠殺家覔死魚必就罾網處若非殺生豈有死肉經言買肉與自殺此罪一等我本不自為正為諸僧尼作離苦因緣又衆生所以不可殺生凡一衆生具八萬户蟲經亦說有八十億萬户蟲若斷一衆生命即是斷八萬户蟲命自死衆生又不可食者前所附蟲雖已滅謝後所附蟲其數復衆若煮若炙此斷附蟲皆無復命利舌端少味害無量衆生其中小者非肉眼能觀其中大者灼然共見滅慈悲心增長惡毒此實非沙門釋子所可應行又衆生食肉罪劇白衣白衣食肉乃不免地獄而止是一罪至於衆僧食肉既犯性罪又傷戒律以此為言有兩重罪若是學問衆僧食肉者此為惡業復倍於前所以如此既親逹經教為人講說口稱慈悲心懷毒害非是不知知而故犯言行既違即成詭妄論學問人食肉則罪有三重所以貴於解義正為如說修行反復噉食魚肉侵酷生類作惡知識起衆怨對墜墮地獄疾於䂎矛善惡報應必也不亡凡出家人實宜深思又聲聞受律儀戒本制身口七支一受之後乃至睡眠悶等律儀恆生念念得未曽有律儀所以爾者睡眠等非起惡心故不損不失乃至常生若起欲殺心於聲聞法雖不失身口戒而於戒有損非唯損不殺戒亦兼汙餘戒至於手挾齒齧動身口業則失身口戒爾時律儀無作即斷不續既失不殺戒亦損汙餘戒所以爾者􅏧陀羅人為屠肉時為何等人殺正為食肉者若食肉者即有殺分於不殺戒即成有缺若謂於善律儀受殺生分於不殺戒無所缺者是不善律儀人持八戒齊是惡律儀猶應相續若惡律儀人持八戒齊惡律儀不復相續者是知善律儀人受諸殺分是不殺戒即時便缺别解脫戒不復解脫惡律儀人無論持八戒齊但起一念善心惡律儀即斷若一念不斷多念亦應不斷若多念斷是知一念時斷善律儀人其事亦爾無論受諸殺分有少殺分不殺律儀即時亦斷菩薩人特心戒故自無有食衆生理若缺聲聞戒終不免地獄等苦答曹思文敕具一二縝既背經以起義乖理以致談滅聖難以聖責乖理難以理詰如此則言語之論略成可息喻智藏敕求空自閒依空入慧高蹈養神實是勝樂不違三乘亦以隨喜惟别之際能無恨然岐路贈言古人所重猶勸法師行無礙心大悲為首方便利益隨時用舍不宜頓杜以隔礙心行菩薩道無有是處敕答釋明徹徹受學僧祐隨出陽都住建初寺天監初自荆州還都二宫周供寒暑優洽遘疾將卒奉表告辭武帝答之省疏增其憂耿人誰不病何以遽終過甚法師至性堅明道行純備往來淨土去留安養方除四魔理無五畏惟應正念諸佛不捨大願與般若相應直至種智發菩提心彼我相攝方結來緣敬如所及菩蕯行業非千百年善思至理勿起亂想覽筆悽悶不復多云敕答僧正南澗寺沙門慧超齊隆寺法鏡殂殁慧超啓釋法寵鎮之敕曰法寵法師造次舉動不逾律儀不俠性欲不事形勢慈仁愷悌雅有君子之風匡政寺廟信得其人矣手敕江革世間果報不可不信豈得底突如對元延明邪制與羣臣論明堂制明堂准大戴禮九室八牖三十六户以茅蓋屋上圓下方鄭𤣥據援神契亦云上圓下方又云八窗四達明堂之義本是祭五帝神九室之數未見其理若五堂而言雖當五帝之數向南則背叶光紀向北則背赤熛怒東向西向又亦如此於事殊未可安且明堂之祭五帝則是總義在郊之祭五帝則是别義宗祀所配復應有室若專配一室則是義非配五若皆配五則便成五位以理而言明堂本無有室又制朱异以月令天子居明堂左右個聽朔既在明堂今若無室則於義成闕帝又制曰若如鄭𤣥之義聽朔必在明堂於此則人神混淆莊敬之道有廢春秋云介居二大國之間此言明堂左右個者謂所祀五帝堂之南又有小室亦號明堂分為三處聽朔既三處則有左右之義在營域之內明堂之外則有個名故曰明堂左右個也以此而言聼朔之處自在五帝堂之外人神有别差無相干駁慈母服議制禮言慈母凡有三條一則妾子之無母使妾之無子者養之命為母子服以三年喪服齊衰章所言慈母是也二則嫡妻之子無母使妾養之慈撫隆至雖均乎慈愛但嫡妻之子妾無為母之義而恩深事重故服以小功喪服小功章所以不直言慈母而云庶母慈已者明異於三年之慈母也其三則子非無母正是擇賤者視之義同師保而不無慈愛故亦有慈母之名師保既無其服則此慈亦無服矣內則云擇於諸母與可者使為子師其次為慈母其次為保母此其明文此言擇諸母是擇人而為此三母非謂擇取兄弟之母也何以知之若是兄弟之母其先有子者則是長妾長妾之禮實有殊加何容次妾生子乃退成保母斯不可也又有多兄弟之人於義或可若始生之子便應三母俱闕邪由是推之內則所言諸母是謂三母非兄弟之母明矣子游所問自是師保之慈非三年小功之慈也故夫子得有此對豈非師保之慈母無服之證乎鄭𤣥不辨三慈混為訓釋引彼無服以注慈已後人致謬實此之由經言君子子者此雖起於大夫明大夫猶爾自斯以上彌應不異故傳云君子子者貴人之子也總言曰貴則無所不包經傳互文相顯發則知慈加之義通乎大夫以上矣宋代此科不乖禮意便加除削良是所疑唱斷肉經竟制諸僧道諸小僧輩看經未遍互言無斷肉語今日此經言何所道所以唱此革屣文者本意乃不在此正為此三十三日法雲法師講涅槃斷肉事于時僧正慧超法寵法師難云若經文究竟斷一切肉乃至自死不得食者此則同尼乾斷皮革不得著革屣若開皮革得著革屣者亦應開食肉法雲法師乃巳有通釋而二法師難意未了于時自仍通云若是聖人故自云著此物若中行人亦不著此著此皆是下行人所以不同尼乾者諸有所舍若無麻紵之鄉亦有開皮革義論有麻紵處大慈者乃實應不著但此事與食肉不得頓同凡著一革屣經久不壞若食噉衆生就一食中便害無量身命况日日餐咀數若恆沙亦不可得用革屣以並斷肉于時諸僧乃無復往復恐諸小僧執以為疑方成巨弊所以唱此不受革屣文正欲釋一日所疑非關前制凡噉肉者是大罪障經文道昔與衆生經為父母親屬衆僧那不思此猶忍食噉衆生已不能投身餓虎割肉貿鷹云何反更噉他身分諸僧及領徒衆法師諸尼及領徒衆者各還本寺宣告諸小僧尼令知此意册諡始興王册咨故侍中司徒驃騎將軍始興王夫忠為令德武謂止戈于以用之載在前志王有佐命之元勳利民之厚德契濶二紀始終不渝是用方軌往賢稽擇故訓鴻名美義允臻其極今遣兼大鴻臚程爽諡曰忠武魂而有靈歆茲顯號璽書賜左丞范鎮璽書王亮仕齊義師至新林百官皆送誠欵亮獨不遣高祖踐祚授侍中中書監元日朝㑹亮辭疾不登殿設饌别省語笑自若詔廢為庶人復下璽書詰縝縝答支離而已亮小乏才能無聞時輩昔經冒入羣英相與豈薄晚節諂事江祏為吏部末協附梅蟲兒茹法珍遂執昏政比屋罹禍盡家塗炭四海沸騰天下橫潰此誰之咎食亂君之祿不死於治世亮協固凶黨作威作福靡衣玉食女樂盈房勢危事逼自相吞噬建石首題啓靡請罪朕録其白旗之來貰其既往之咎亮反覆不忠姦賄彰暴有何可論妄相談述具以狀對令霸府去苛令夫樹以司牧非役物以養生視人如傷豈肆上以縱虐廢主棄常自絶宗廟窮凶極悖書契未有征賦不一苛酷滋章緹繡土木菽粟犬馬徴發閭左以充繕築流離寒暑繼以疫厲轉死溝渠曽莫救恤朽肉枯骸烏鳶是厭加以天災人火屢焚宫掖官府臺寺尺椽無遺悲甚黍離痛兼麥秀遂使億兆離心疆徼侵弱斯人何辜離此塗炭今明昏遞運大道公行思治之氓來蘇兹日猥以寡薄屬當大寵雖運距中興艱同草昧思闡皇休與之更始凡昏制謬賦淫刑濫役外可詳檢前源悉皆除蕩其主守散失諸所損耗精立科條咸從原例霸府禁奢令夫在上化下草偃風從世之澆淳恆由此作自永元失德書契未紀窮凶極悖焉可勝言既而琁室外構傾宫內積奇技異服殫所未見上慢下暴淫侈競馳國命朝權政移近習販官鬻爵賄貨公行並甲第康衢漸臺廣室長䄂低昻等和戎之賜珍羞百品同伐氷之家愚人因之浸以成俗驕豔競爽夸麗相高至乃市井之家貂狐在御工商之子緹繡是襲日入之次夜分未反昧爽之朝期之清旦聖明肇運厲精惟始雖曰纘戎殆同創革且淫費之後繼以興師巨橋鹿臺凋整不一孤忝荷大寵務在澄清思所以仰述皇朝大帛之㫖俯厲微躬鹿裘之義解而更張斫雕為朴自非可以奉粢盛修紱冕習禮樂之容繕甲兵之備此外衆費一皆禁絶御府中署量宜罷省掖庭備御妾之數大饗絶鄭衛之音其中有可以率先卿士准的氓庶菲食薄衣請自孤始加羣才並軌九官咸事若能人務退食競存約巳移風易俗庶朞月有成昔毛玠在朝士大夫不敢靡衣偷食魏武歎曰孤之法不如毛尚書孤雖德謝往賢任重先逹實望多士得共此心外可詳為條格閲武堂大赦令皇家不造遘此昏凶禍挻動植虐被人鬼社廟之危蠢焉如綴吾身籍皇宗曲荷先顧受任邊疆推載萬里眷言瞻烏痛心在目故率其尊主之情厲其忘生之志雖寶厯重升明命有紹而獨夫醜縱方煽京邑投袂援戈克弭多難虐政橫流為日既久同惡相濟諒非一族仰禀朝命任在專征思播皇澤被之率土凡厥負亹咸與惟新可大赦天下唯王咺之等四十一人不在赦例申飭刑政令永元之季乾維落紐政實多門有殊衛文之代權移於下事等曹恭之時遂使閹尹有翁媪之稱高安有法堯之㫖鬻獄販官錮山護澤開塞之機奏成小醜直道正義擁抑彌年懷寃抱理莫知誰訴姦吏因之筆削自已豈直賈生流涕許伯哭時而已哉今理運惟新政刑得所矯革流弊實在兹日可通檢尚書衆曹東昏時諸諍訟失理及主者淹停不時施行者精加訊辨依事議奏初封梁王下國中恩令孤以虛昧任執國鈞雖夙夜勤止念在興治而育德振民邈然尚遠聖朝永言舊式隆此眷命侯伯盛典方軌前烈嘉錫隆被禮數昭崇徒守願節終隔體諒羣后百司重兹敦奬勉兹厚顔當此休祚望昆彭以長想欽桓文而歎息思𢎞政塗莫知津濟邦甸初啓藩宇惟新思覃嘉慶被之下國國內殊死以下今月十五日昧爽以前一皆原赦鰥寡孤獨不能自存者賜榖五斛府州所統亦同蠲蕩掩骼令朱爵之捷逆徒送死者特許家人殯葬若無親屬或有貧苦二縣長尉即為埋掩建康城內不逹天命自取淪滅亦同此科檄移京邑檄夫道不常夷時無永化險泰相㳂晦明非一皆屯困而後亨資多難以啓聖故昌邑悖德孝宣聿興海西亂政簡文升厯並拓緒開基紹隆寶命理驗前經事昭往策獨夫擾亂天常毁棄君德姦回淫縱歲月滋甚挺虐於鬌翦之年植險於髫丱之日猜忌凶毒觸途而著暴戾昏荒與事而發自大行告漸喜容前見梓宮在殯靦無哀色歡娛遊宴有過平常奇服異衣更極誇麗至於選采妃殯姊妹無别招侍巾櫛姑姪莫辨掖庭有稗販之名姬姜被干殳之服至乃形體宣露褻衣顚倒斬斫其間以為歡笑騁肆淫放驅屏郊邑老弱波流士女塗炭行産盈路輿尸竟道母不及抱子不遑哭劫掠剽虜以日繼夜晝伏宵遊曽無休息淫酗醟肆酣歌壚邸寵恣愚豎亂惑妖㜸梅蟲兒茹法珍臧獲厮小專制威柄誅翦忠良屠滅卿宰劉鎮軍舅氏之尊盡忠奉國江僕射外戚之重竭誠事上蕭領軍葭莩之宗志存柱石徐司空沈僕射搢紳冠冕人望攸歸或渭陽餘感或勳庸允穆或誠著艱難或劬勞王室並受遺託同參顧命送往事居俱竭心力宜其慶溢當年祚隆後裔而一朝韲粉孩稚無遺人神怨結行路嗟憤蕭令君忠公幹伐誠貫幽顯往年冦賊逰魂南鄭危逼拔刃飛泉孤城獨振及中流逆命慿陵京邑謀猷禁省指授羣帥尅翦鯨鯢清我王度崔慧景奇鋒迅駭兵交象魏武力喪魂義夫奪膽投名送欵比屋交馳負糧景從愚智競赴復誓旅江甸奮不顧身奬厲義徒電掩彊敵尅殱大􅀢以固皇基功出桓文勳超伊呂而勞謙省已事昭心迹功遂身退不祈榮滿敦賞未聞禍酷遄及預禀精靈孰不寃痛而羣孽放命蜂蠆懷毒乃遣劉山陽驅扇逋逃招逼亡命潛圖密構規見掩襲蕭右軍夏矦征虜忠斷夙舉義形於色奇謀宏振應手梟懸天道禍淫罪不容戮至於悖禮違教傷化虐人射天彈路比之猶善刳胎斫脛方之非酷盡㝢縣之竹未足紀其過窮山澤之兔不能盡其罪自草昧以來圖牒所記昏君暴后未有若斯之甚者也既人神乏主宗稷阽危海內沸騰氓庶板蕩百姓凛懍如崩厥角蒼生喁喁投足無地幕府荷眷前朝義均休戚上懷委付之重下惟在原之痛豈可卧薪引火坐觀傾覆至尊體自高宗特鍾慈寵明並日月粹昭靈神祥啓元龜符驗當璧作鎮陜藩化流西夏謳歌攸奉萬有樂推右軍蕭穎胄征虜將軍夏矦詳並同心翼戴即官舊楚二靈再朗九縣更新升平之運此焉復始康哉之盛在乎兹日然帝德雖彰區宇未定元惡未黜天邑猶梗仰禀宸規率前啓路即日遣冠軍竟陵內史曹景宗等二十軍主長槊五萬驥騄為羣鶚視爭先龍驤並驅步出橫江直指朱雀長史冠軍將軍襄陽太守王茂率三十軍主戈船七萬乘流電激推鋒扼險斜趣白城南中郎咨議參軍軍主蕭偉等三十九軍主巨艦迅楫衝波噎水旗鼓八萬焱集石頭南中郎咨議參軍軍主蕭憺等四十二軍主熊羆之士甲楯十萬㳂波馳艓掩據新亭益州刺史劉季連梁州刺史柳惔司州刺史王僧景魏興太守裴師仁上庸太守韋睿新城太守崔僧季並肅奉明詔龔行天罰蜀漢果鋭㳂流而下淮汝徑勇望波遄騖幕府總率貔貅驍勇百萬繕甲燕弧屯兵冀馬樅金沸地鳴鞞聒天霜鋒曜日朱旗絳㝢方舟千里駱驛係進蕭右軍訏謨上才兼資文武英略峻逺執鈞匡世擁荆南之衆督四方之師宣讃中權奉衛輿輦旍麾所指威稜無外龍驤虎步並集建業黜放愚狡均禮海昏廓清神甸掃定京宇譬猶崩泰山而壓蟻壤決懸河而注熛燼豈有不殄滅者哉今資斧所加止梅蟲兒茹法珍而已諸君咸世胄羽儀書勳王府皆俯眉姦黨受制凶威若能因變立功轉禍為福並誓河嶽永紆青紫若執迷不悟距逆王師大衆一臨刑兹罔赦所謂火烈高原芝蘭同泯勉求多福無貽後悔賞罰之科有如白水表申飭選人表臣聞以言取士士飾其言以行取人人竭其行所謂才生於代窮達惟時而風流遂往馳鶩成俗媒孽夸衒利盡錐刀遂使官人之門肩摩轂擊豈直暴蓋露冠不避寒暑遂乃戢屨杖策風雨必至良由鄉舉里選不師古始稱肉度骨遺之管庫加以山河梁畢闕輿徵之恩金張許史忠舊業之替吁可傷哉且夫譜諜訛誤詐僞多緒人物雅俗莫肯留心是以冒襲良家即成冠族妄修邊幅便為雅士負俗深纍遽遭寵擢墓木已拱方被徽榮故前代選官皆立選簿應在貫魚自有銓次胄籍升降行能臧否或素定懷抱或得之輿論故得簡通賔客無事掃門頃代陵夷九流乖失其有勇退忘進懷質抱真者選部或以未經朝謁難於進用或有晦善藏聲自埋衡蓽又以名不素著絶其階緒必須畫刺投狀然後彈冠則是驅迫廉撝奬成澆競愚謂自今選曹宜精隱括依舊立簿使冠履無爽名實不違庶人識崖涘造請自息且聞中間立格甲族以二十登仕後門以過立試吏求之愚懷抑有未達何者設官分職惟才是務若八元立年居皂𨽻而見抑四凶弱冠處鼎族而宜甄是則世祿之家無意為善布衣之士肆心為惡豈所以𢎞奬風流希向後進此實巨蠧尤宜刋革不然將使周人有路傍之泣晉臣興漁獵之歎且俗長浮競人寡退情若限嵗登朝必增年就宦故貌實昏童籍已踰立滓穢名教於斯為甚臣總司內外憂責是任朝政得失義不容隱伏願陛下垂聖淑之姿降聽覽之末則彞倫自穆憲章惟允請徴補謝朏何𦙍表夫窮則獨善達以兼濟雖出處之道其揆不同用捨惟時賢哲是蹈前新除侍中太子少傅朏前新除散騎常侍太子詹事都亭侯𦙍羽儀世胄徽猷冠冕道業德聲康濟雅俗昔居朝列素無宦情賔客簡通公卿罕預簮紱未禠而風塵擺落且文宗儒肆互居其長清規雅裁兼擅其美並逹照深識預覩亂萌見庸質之如初知貽厥之無寄拂衣東山眇絶塵軌雖解組昌運實避昏時家膺鼎食而井兹橡艾世襲青紫而安此懸鶉自澆風肇扇用南成俗淳流素軌餘烈頗存誰其激貪功歸有道康俗振民朝野一致雖在江海而勳同魏闕今泰運甫開賤貧為恥况乎久藴瑚璉暫厭承明而可得求志海隅永追松子臣負荷殊重參贊萬機實賴羣才共成棟幹思挹清源取鏡止水愚欲屈居僚首朝夕咨諏庶足以翼宣寡薄式是王庭書喻袁昻手書夫禍福無門興亡有數天之所棄人就能匡機來不再圖之宜早頃藉聽道路承欲狼顧一隅既未悉雅懷聊申往意獨夫狂悖振古未聞窮凶極虐歲月滋甚天未絶齊聖明啓運兆民有賴百姓來蘇吾荷任前驅掃除京邑方撥亂反正伐罪弔民至止以來前無橫陳今皇威四臨長圍已合遐邇畢集人神同奮鋭卒萬計鐵馬千羣以此攻戰何往不克况建業孤城人懷離阻面縛軍門日夕相繼屠潰之期勢不云逺兼熒惑出端門太白入氐室天文表於上人事符於下不謀同契實在兹辰且范岫申胄久薦誠欵各率所由仍為掎角沈法瑀孫肸朱端已先肅清吳㑹而足下欲以區區之郡禦堂堂之師根本既傾枝葉安附童兒牧豎咸謂其非求之明鑒實所未達今竭力昏主未足為忠家門屠滅非所謂孝忠孝俱盡將欲何依豈若翻然改圖自招多福進則逺害全身退則長守祿位去就之宜幸加詳擇若執迷遂往同惡不悛大軍一臨誅及三族雖貽後悔寧復云補欲布所懷故致今白與蕭寶寅書寶寅本齊建安郡王高祖克建業殺其兄弟寶寅潛逃入魏封齊王高祖遣康絢於浮山堰淮以灌揚徐魏除寶寅為鎮東將軍拒之高祖手書與寶寅寶寅表送其書陳忿毒之意魏朝為之報答謝齊建安王寶寅亡兄長沙宣武王昔投漢中值北冦華陽地絶一隅內無素畜外絶繼援守危疏勒計踰田單卒能全土破敵以弱為强使至之日君臣動色左右相賀齊明帝每念此功未嘗不輟箸咨嗟及至張永崔慧景事大將覆軍於外小將懷二於內事危纍卵勢過綴旒亡兄忠勇奮發旋師大峴重圍纍日一鼓魚潰克定慧景功踰桓文亡弟衛尉兄弟戮力盡心內外大勳不報翻罹荼酷百口幽執禍害相尋朕於齊明帝外有龕敵之力內盡帷幄之誠日自三省曽無寸咎逺身邊外亦復不免遂遣劉山陽輕舟西上來見掩襲時危事迫勢不得已所以誓衆樊鄧㑹踰孟津本欲翦除梅蟲兒茹法珍等以雪寃酷拔濟親屬反身素里屬張稷王珍國已建大事寶眰子晉屢動危機迫樂推之心應上天之命事不獲已豈其始願所以自有天下絶棄房室斷除滋味正欲使四海見其本心耳勿謂今日之位是為可重朕之視此曾不如一芥雖復崆峒之蹤難追汾陽之志何逺而今立此堰卿當未達本意朕於昆蟲猶不欲殺亦何急爭無用之地戰蒼生之命也正為李繼伯在壽陽侵犯邊境歲月滋甚或攻小城小戍或掠一村一里若小相訓答終無寧日邊邑爭桑吳楚連禍所以每抑鎮戍不與較計繼伯既得如此濫竊彌多今修此堰止欲以報繼伯侵盜之役既非大舉所以不復文移北土卿幼有倜儻之心早懷縱橫之氣往日卿於石頭舉事雖不克捷亦丈夫也今止河洛真其時矣雖然為卿計者莫若行率此衆襲據彭城别當遣軍以相影援得捷之後便遣卿兄子屏侍送卿國廟并卿室家及諸姪從若方欲還北更設竒計恐機事一差難重復集勿為韓信受困野雞答蕭穎胄書高祖將起義師東昏以劉山陽為巴陵太守使就蕭穎胄以襲襄陽及至巴陵高祖遣王天獸賫書與穎胄以疑山陽山陽果疑不上穎胄乃斬天獸山陽信之將數十人馳入穎胄伏甲斬之送首高祖仍以南康王尊號之議來告且曰時月未利當須來年遽便進兵恐非廟算高祖答之發襄陽穎胄領兵㑹于軍今坐甲十萬糧用自竭况所藉義心一時驍鋭事事相接猶恐疑怠若頓兵十旬必生悔吝童兒立異便大事不成今太白出西方杖義而動天時人謀有何不利處分已定安可中息昔武王伐紂行逆太嵗復須待年月乎與何𦙍書想恆清豫縱情林壑致足歡也既內絶心戰外勞物役以道養和履候無爽若邪擅美東區山川相屬前世嘉賞是為樂土僕推遷薄宦自東徂西晤言素對用成暌闋傾首東顧曷日無懷疇昔歡遇曵裾儒肆實欲卧遊千載畋漁百氏一行為吏此事遂乖屬以世道威夷仍離屯故投袂數千尅黜舋禍思得矚卷咨欵寓情古昔夫豈不懷事與願謝君清襟素託栖寄不近中居人世殆同隱淪既俯捨青組又脫屣朱黻但理存用捨義貴隨時往識禍萌實為先覺超然獨善有識欽嗟今者為邦貧賤咸恥好仁由已幸無凝滯比别具白此未盡言今遣侯承音息矯首還翰慰其引領答陶𢎞景論書書一近二卷欲少留差不為異紙卷是出裝書既須見前所以付耳無正可取備於此及欲更須細書如論針例逸少書無甚極細書樂毅論乃微粗健恐非真蹟太師針小復方媚筆力過嫩書體乖異二者已經至鑒此外便無可付也答陶𢎞景論書書二又省别疏云故當宜微以著賞此既勝事雖風訓非嫌非嫌然非所習聊試略言夫運筆邪則無芒角執手寬則書緩弱㸃掣短則法臃腫㸃撇長則法離澌畫促則字橫畫疏則字形慢拘則乏勢放又少則純骨無媚純肉無力少墨浮澀多墨笨鈍比並皆然任意所之自然之理也若抑揚得所趣舍無違隨筆廉斷觸勢峰鬱揚波折節中規合矩分間下注濃纎有方肥瘦相和骨力相稱婉婉曖曖視之不足稜稜凜凛常有生氣適眼合心便為甲科衆家可識亦當復貫串耳六義可工亦當復由習耳一聞能持一見能記且古且今不無其人大抵為論終歸是習程邈所以能變書體為之舊也張芝所以能善書工學之積也既舊且積方可以肆其談吾少來乃至不能嘗畫甲子無論於篇紙老而言之亦復何謂正足見嗤於當今貽笑於後代遂有獨冠之言覽之背熱隱真於是乎纍真矣此真一藝之精非吾所謂勝事此道心之塵非吾所謂無欲也答陶𢎞景論書書三省區别諸書良有精賞異同所未可知悉可否耳給事黃門二紙為任靖書觀所送靖書諸字相附近彼二紙靖書體解雜便當非靖書復當以㸃畫波撇論極諸家之致此亦非可倉卒運於毫楮且保拙守中也許任二跡并摹者並付反答陶𢎞景論書書四鍾書乃有一卷傳以為真意謂悉是摹學多不足論有兩三行許似摹微得鍾體逸少學鍾的可知近有二十許首此外字細畫短多是鍾法今欲令人帖裝未便得付來月有竟者當遣送也答陶隱居書知欲徙卜想咨請幽勝謀及蓍龜但遷徙之日為當使人為當使鬼猶躡蹻因地其不滅也報侯景書三首大夫出境尚有所專況始創竒謀將建大業理須適事而行隨方以應卿誠心有本何假詞費又朕與公大義已定豈有成而相納敗而相棄乎今高氏有使求和朕亦更思偃武進退之宜國有常制公但清靜自居無勞慮也又朕為萬乘之主豈可失信於一物想公深得此心不勞復有啓也與始興王憺書蕭子雲書筆力徑駿心手相應巧踰杜度美過崔實當與元常竝驅爭先腳氣帖數朝腳氣轉動不得多有憂懸情也二謝處委曲復當有情故舊數有書問不可復有興也知何時再言話報之曹郢州帖衆軍行人最今封如别曹郢州近遣樊士真領三百人猶在漁湖其應用行合應有四千人故指白序為亮法師製涅槃經疏序非言無以寄言言即無言之纍纍言則可以息言言息則諸見競起所以如來乘本願以託生現慈力以應化離文字以設教忘心相以通道欲使珉玉異價涇渭分流制六師而正四倒反八邪而歸一味折世智之角杜異人之口導求珠之心開觀象之目救燒灼於火宅振沈溺於浪海故法雨降而燋種更榮慧日升而長夜蒙曉發迦葉之悱憤吐真實之誠言雖復二施等於前五大陳於後三十四問參差異辨方便勸引各隨意答舉要論經不出兩塗佛性開其本有之源涅槃明其歸極之宗非因非果不起不作義高萬善事絶百非空空不能測其真際𤣥𤣥不能窮其妙門自非德均平等心答無生金牆玉室豈易入哉記立神明成佛義記夫涉行本乎立信信立由乎正解解正則外邪莫擾信立則內識無疑然信解所依其宗有在何者願神明以不斷為精精神必歸妙果妙果體極常住精神不免無常無常者前滅後生剎那不住者也若心用心於攀緣前識必異後者斯則與境俱往誰成佛乎經云心為正因終成佛果又言若無明轉則變成明案此經意理如可求何者夫心為用本本一而用殊殊用自有興廢一本之性不移一本者即無明神明也尋無明之稱非太虛之目土石無情豈無明之謂故知識慮應明體不免惑惑慮不知故曰無明而無明體上有生有滅生滅是其異用無明心義不改將恐見其用異便謂心隨境滅故繼無明名下加以住地之目此顯無明即是神明神明性不遷也何以知然如前心作無間重惡後識起非想妙善善惡之理大懸而前後相去甚迥斯用果無一本安得如此相續是知前惡自滅惑識不移後善雖生暗心莫改故經言若與煩惱諸結俱者名為無明若與一切善法俱者名之為明豈非心識性一隨緣異乎故知生滅遷變酬於往因善惡交謝生乎現境而心為其本未曽異矣以其用本不斷故成佛之理皎然隨境遷謝故生死可盡明矣輿駕東行記有覆船山酒罌山南次高驪山傳云昔有高驪國女來東海神乘船致酒禮聘之女不肯海神撥船覆酒流入曲阿故曲阿酒美也連珠連珠三首蓋聞水鏡不以妍媸殊照芝蘭寧為貴賤異芳是以𢎞道歸於兼濟至德由乎兩忘蓋聞一眚不足以掩德五刑非可以妄加是以徑寸之珠有時而纇盈尺之寶不能無瑕蓋聞理有漸萌豈須拔嶽之力物有易傷不待凌雲之繳是以微照積而山飄虛弦動而隼落賜到溉連珠一首研磨墨以騰文筆飛毫以書信如飛蛾之赴火豈焚身之可吝必耄年其已及可假之於少藎針凡百針凡百衆庶爾其聽之事之大小先當熟思思之不熟致成反覆其心不定不可施令是曰亂常是曰敗政弗正一作止厥身亦喪厥命惟慈惟恕惟孝惟敬嚴惟率下直惟厥正如彼互鄉如彼暴虎家聲不建有忝爾祖思之既熟决意而行臨難必勇見義忘生門有賢良家有忠貞勿恃爾尊驕慢淫昏勿謂爾貴長夜荒醉日不恆中月盈則虧崇山落峰髙樹折枝履邪念正居安思危莫言爾賤而不受命君子小人本無定性勿謂人微而以自輕張他疑為卒李衡為兵忠信孝友皆以揚名有黃叔度父牛醫者聲高海內名重天下伊尹負鼎太公屠肉寧戚飯牛傅說版築皆王霸師世受爵祿誡爾凡百勿戾勿昏人無貴賤道在則尊余重告爾莫自抑卑疑克家棟梁唯斯為吉水清照净表直影端近取諸身無假遠觀猗與哲人勿謂斯難銘硯銘音模德寫假墨圖心文即位告天文皇帝臣衍敢用黝犢昭告於皇天后帝齊氏以厯運斯既否終則亨欽若天應以命于衍夫任是司牧惟能是授天命不于常帝王非一族唐謝虞受漢替魏升爰及晉宋憲章在昔咸以君德馭四海元功子萬姓故能大庇民黎光宅區宇齊代云季世主昏凶狡焉羣慝是崇是長肆厥姦回暴亂以播虐于我有邦禆溥天惴惴將墜於深壑九服八荒之內連率嶽牧之君蹶角頓顙匡救無術卧薪待然援天靡訴衍投袂星言摧鋒萬里厲其掛冠之情用拯兆民之切銜膽誓衆覆鋭屠堅建立人主克翦昏亂遂因時來宰司邦國濟民康世實有厥勞而晷緯呈祥川嶽效祉朝夕坰牧日月郊畿代終之符既顯革運之期已萃殊俗百蠻重譯獻欵人神逺邇罔不和㑹於是羣公卿士咸致厥誠並以皇乾降命難以謙拒齊帝脫屣萬邦授以神器衍自惟匪德辭不獲許仰迫上𤣥之眷俯惟億兆之心宸極不可久曠民神不可乏主遂藉樂推􅈾此嘉祚以兹寡薄臨御萬方顧求夙志永言祗惕敬簡元辰恭兹大禮升壇受禪告類上帝克播休祉以𢎞盛烈式傳厥後用永保于我有梁惟明靈是饗捨道歸佛文維天監三年四月八日梁國皇帝蘭陵蕭衍稽首和南十方諸佛十方尊法十方聖僧伏見經云發菩提心者即是佛心其餘諸善不得為喻能使衆生出三界之苦門入無為之勝路故如來漏盡智凝成覺至道通機德圓取聖登慧炬以照迷鏡法流以澄垢啓瑞迹於天中爍靈義於象外度羣迷於欲海引含識於涅槃登常樂之高山出愛河之深際言乖四句語絶百非應迹娑婆示生淨飯王宫誕相步三界而為尊道樹成光普大千而流照但以機心淺薄好生厭怠自期二月當至雙林遂乃湛說圓常且復潛輝鶴樹闍王滅罪婆藪除殃若不逢植大聖法王誰能救接在迹雖隱其道無虧弟子經遲迷荒耽事老子厯葉相承染此邪法習因善發棄迷知返今捨舊醫歸慿正覺願使未來世中童男出家廣𢎞經教化度含識同共成佛寧在正法之中長淪惡道不樂依老子教暫得生天涉大乘心離二乘念正願諸佛證明菩薩弟子蕭衍和南金剛般若懴文菩薩戒弟子皇帝稽首和南十方諸佛無量尊法一切賢聖如來以四十年中所說般若本末次第略有五時大品小品枝條分散仁王天王宗源派别金剛道行隨義制名須真法才以人標題雖復前說後說應現不同至理至言其歸一揆莫非無相妙法悉是智慧深經以有取之既為殊失就無求也彌見深乖義異去來道非內外遣之又遣之不能得其真空之以空之未足明其妙真俗同棄本迹俱冥得之於心然後為法是以無言童子妙得不言之妙不說菩薩深見無說之深弟子習學空無修行智慧早窮尊道克已行法方欲以家刑國自近及逺一念之善千里斯應一心之力萬國皆歡恆沙衆生皆為法侶微塵世界悉是道場今謹於某處建如干僧如干日金剛般若懴現前大衆至心敬禮釋迦牟尼佛金剛般若禮長老須菩提願諸佛菩薩以般若因緣同時集會哀憐萬品護念羣生引入慧流同歸佛海得金剛之妙寶見金牒之深經頂戴奉持終不捨離逮得已利盡諸有結心行自在無復塵勞稽首敬禮常住三寶摩訶般若懴文菩薩戒弟子皇帝稽首和南十方諸佛及無量尊法一切賢聖觀夫常樂我淨蓋真常之妙本無常苦空乃世相之纍法而苦樂殊見分别之路興真俗異名計著之情反顚倒我人之所彌見愚癡取舍有無之間轉成專附豈知妙道無相至理絶言實法唯一真如不二諸佛以慈悲之力開方便之門教之以遣蕩示之以冥滅百非俱棄四句皆亡然後無復塵勞解脫清淨但般若之說唯有五時而智慧之㫖終歸一趣莫非第一義諦悉是無上法門弟子頗學空無深知虛假王領四海不以萬乘為尊攝受兆民彌覺萬幾成纍每時丕顯嗟三有之洞然終日乾乾歎四生之俱溺常願以智慧燈照朗世間般若舟航濟渡凡識今謹於某處建如干僧如干日大品懴現前大衆至心敬禮慧命須菩提願諸衆生離染著相回向法喜安住禪悅同到香城共見寶臺般若識諸法之無相見自性之恆空無生法忍自然具足稽首敬禮常住三寶斷酒肉文弟子蕭衍敬白諸大德僧尼諸義學僧尼諸寺三官夫匡正佛法是黑衣人事乃非弟子白衣所急但經教亦云佛法寄囑人王是以弟子不得無言今日諸僧尼開意聽受勿生疑閉內懷忿異凡出家人所以異於外道者正以信因信果信經所明信是佛說經言行十惡者受於惡報行十善者受於善報此是經教大意如是若出家人猶嗜飲酒噉食魚肉是則為行同於外道而復不及何謂同於外道外道執斷常見無因無果無施無報今佛弟子酣酒嗜肉不畏罪因不畏苦果即是不信因不信果與無施無報者復何以異此事與外道見同而有不及外道是何外道各信其師師所言是弟子言是師所言非弟子言非涅槃經言迦葉我今日制諸弟子不得食一切肉而今出家人猶自噉肉戒律言飲酒犯波夜提猶自飲酒無所疑難此事違於師教一不及外道又外道雖復邪僻持牛狗戒既受戒已後必不犯今出家人既受戒已輕於毁犯是二不及外道又外道雖復五熱炙身投淵赴火窮諸苦行未必皆噉食衆生今出家人噉食魚肉是三不及外道又外道行其異學雖不當理各習師法無有覆藏今出家人噉食魚肉於所親者乃自和光於所疏者則有隱避如是為行四不及外道又外道各宗所執各重其法乃自高聲大唱云不如我道真於諸異人無所忌憚今出家人或復年時已長或復素為物宗噉食魚肉極自艱難或避弟子或避同學或避白衣或避寺官懷挾邪志﨑嶇覆藏然後方得一過噉食如此為行五不及外道又復外道直情徑行能長已徒衆惡不能長異部惡今出家人噉食魚肉或為白衣弟子之所聞見內無慚愧方飾邪說云佛教為法本存逺因在於即日未皆悉斷以錢買肉非已自殺此亦非嫌白衣愚癡聞是僧說謂真實語便復信受自行不善增廣諸惡是則六不及外道又外道雖復非法說法法說非法各信經書死不違背今出家人噉食魚肉或云肉非已殺猶得自噉以錢買肉亦復非嫌如是說者是事不然涅槃經云一切肉悉斷及自死者自死者猶斷何况不自死者楞伽經云為利殺衆生以財網諸肉二業俱不善死墮呌呼獄何謂以財網肉陸設罝罘水設網罟此是以網網肉若於屠殺人間以錢買肉此是以財網肉若令此人不以財網肉者習惡律儀捕害衆生此人為當專自供口亦復别有所擬若别有所擬向食肉者豈無殺分何得云我不殺生此是灼然違背經文是七不及外道又復外道同其法者和合異其法者苦治令行禁止莫不率從今出家人或為師長或為寺官自開酒禁噉食魚肉不復能得施其教戒裁欲發言他即譏刺云師向亦爾寺官亦爾心懷內熱默然低頭面赤汗出不復得言身既有瑕不能伏物便復摩何直爾止住所以在寺者乖違受道者放逸此是八不及外道又外道受人施與如已法受烏戒人受烏戒施受鹿戒人受鹿戒施烏戒人終不覆戒受鹿戒施鹿戒人終不覆戒受烏戒施今出家人云我能精進我能苦行一時覆相誑諸白衣出即飲酒開衆惡門入即噉肉集衆苦本此是九不及外道又外道雖復顚倒無如是衆事酒者是何臭氣水榖失其正性成此别氣衆生以罪業因緣故受此惡觸此非正真道法亦非甘露上味云何出家僧尼猶生耽嗜僧尼授白衣五戒令不飲酒令不妄語云何翻自飲酒違負約誓七衆戒八戒齊五篇七聚長短律儀於何科中而出此文其餘衆僧故復可可至學律者彌不宜爾且開放逸門集衆惡本若白衣人井此狂藥出家人猶當訶止云某甲汝就我受五戒不應如是若非受戒者亦應云檀越酒是惡本酒是魔事檀越今日幸可不飲云何出家人而應自飲尼羅浮陀地獄身如段肉無有識知此是何人皆飲酒者出家僧尼豈可不深信經教自棄正法行於邪道長衆惡根造地獄苦習行如此豈不內愧猶服如來衣受人信施居處塔寺仰對尊像若飲酒食肉如是等事出家之人不及居家何故如是在家人雖飲酒噉肉無犯戒罪此一不及居家人在家人雖復飲酒噉肉各有丘窟終不以此仰觸尊像此是二不及居家人在家人雖復飲酒噉肉終不吐泄寺舍此是三不及居家人在家人雖復飲酒噉肉無有譏嫌出家人若飲酒噉肉使人輕賤佛法此是四不及居家人在家人雖復飲酒噉肉門行井竈各安其鬼出家人若飲酒噉肉臭氣薰蒸一切善神皆悉逺離一切衆魔皆悉歡喜此是五不及居家人在家人雖復飲酒噉肉自破財産不破他財出家人飲酒噉肉自破善法破他福田是則六不及居家人在家人雖復飲酒噉肉皆是自力所辦出家人若飲酒噉肉皆他信施是則七不及居家人在家人雖復飲酒噉肉是常業更非異事出家人若飲酒噉肉衆魔外道各得其便是則八不及居家人在家人雖復如此飲酒噉肉猶故不失世業大耽昏者此則不得出家人若飲酒噉肉若多若少皆斷佛種是則九不及居家人不及外道不及居家略出所以各有九事欲論過患條流甚多可以例推不復具言今日大德僧尼今日義學僧尼今日寺官宜自警戒嚴淨徒衆若其懈怠不遵佛教猶是梁國編户一民弟子今日力能治制若猶不依佛法是諸僧官宜依法問京師頃年講大涅槃經法輪相續便是不斷至於聽受動有千計今日重令法雲法師為諸僧尼講四相品四中少分諸僧尼常聽涅槃經為當曽聞此說為當不聞若已曽聞不應逺背若未曽聞今宜憶持佛經中究竟說斷一切肉乃至自死者亦不許食何况非自死者諸僧尼出家名佛弟子云何不從師教經言食肉者斷大慈種何謂斷大慈種凡大慈者皆令一切衆生同得安樂若食肉者一切衆生皆為怨對同不安樂若食肉者是逺離聲聞法若食肉者是逺離辟支佛法若食肉者是逺離菩薩法若食肉者是逺離菩提道若食肉者是逺離佛果若食肉者是逺離大涅槃若食肉者障生六欲天河況涅槃果若食肉者是障四禪法若食肉者是障四空法若食肉者是障戒法若食肉者是障定法若食肉者是障慧法若食肉者是障信根若食肉者是障進根若食肉者是障念根若食肉者是障定根若食肉者是障慧根舉要為言障三十七道品若食肉者是障四真諦若食肉者是障十二因緣若食肉者是障六波羅蜜若食肉者是障四𢎞誓願若食肉者是障四攝法若食肉者是障四無量心若食肉者是障四無礙智若食肉者是障三三昧若食肉者是障八解脫若食肉者是障九次第定若食肉者是障六神通若食肉者是障百八三昧若食肉者是障一切三昧若食肉者是障海印三昧若食肉者是障首楞嚴三昧若食肉者是障金剛三昧若食肉者是障五眼若食肉者是障十方若食肉者是障四無所畏若食肉者是障十八不共法若食肉者是障一切種智若食肉者是障無上菩提何以故若食肉者障菩提心無有菩薩法以食肉故障不能得初地以食肉故障不能得二地乃至障不能得十地以無菩薩法無菩薩法故無四無量心無四無量心故無有大慈大悲以是因緣佛子不續所以經言食肉者斷大慈種諸出家人雖復不能行大慈大悲究竟菩薩行成就無上菩提何為不能忍此臭腥修聲聞辟支佛道鴟鴉嗜鼠蝍蛆井螮以此而推何可嗜著至於豺犬野犴皆知嗜肉人最有知勝諸衆生近與此等同井臭腥豈直常懷殺心斷大慈種凡食肉者自是可鄙諸大德僧諸解義者講涅槃經何可不殷勤此句令聽受者心得悟解又有一種愚癡之人云我止噉魚實不食肉亦應開示此處不殊水陸衆生同名為肉諸聼講者豈可不審諦受持如說修行凡食肉者如前說此皆是逺事未為近切諸大德僧尼當知噉食衆生者是魔行噉食衆生是地獄種噉食衆生是恐怖因噉食衆生是斷命因噉食衆生是自燒因噉食衆生是自煮因噉食衆生是自炮因噉食衆生是自炙因噉食衆生是自割因噉食衆生是自剝因噉食衆生是斷頭因噉食衆生是斷手因噉食衆生是斷足因噉食衆生是破腹因噉食衆生是破背因噉食衆生是刳腸因噉食衆生是碎髓因噉食衆生是抉目因噉食衆生是割鼻因噉食衆生是截耳因噉食衆生是貧窮因噉食衆生是下賤因噉食衆生是凍餓因噉食衆生是醜陋因噉食衆生是聾因噉食衆生是盲因噉食衆生是瘖因噉食衆生是啞因噉食衆玍是跛因噉食衆生是蹇因噉食衆生是瘡因噉食衆生是瘍因噉食衆生是疥因噉食衆生是癬因噉食衆生是瘤因噉食衆生是癭因噉食衆生是瘑因噉食衆生是疵因噉食衆生是癰因噉食衆生是癤因噉食衆生是痔因噉食衆生是疽因噉食衆生是瘻因噉食衆生是癩因噉食衆生是致蚤因噉食衆生是致虱因噉食衆生是致蚊因噉食衆生是致虻因噉食衆生是遭毒蟲因噉食衆生是遭惡獸因噉食衆生是病瘦因噉食衆生是寒熱因噉食衆生是頭痛因噉食衆生是心痛因噉食衆生是腹痛因噉食衆生是胸痛因噉食衆生是背痛因噉食衆生是手痛因噉食衆生是足痛因噉食衆生是髓痛因噉食衆生是腸痛因噉食衆生是筋縮因噉食衆生是胃反因噉食衆生是脈絶因噉食衆生是血流因噉食衆生是咽塞因噉食衆生是喉痛因噉食衆生是風病因噉食衆生是水病因噉食衆生是四大不調適因噉食衆生是五臟不調適因噉食衆生是六腑不調適因噉食衆生是癲因噉食衆生是狂因噉食衆生乃至是四百四病一切衆病因噉食衆生是熱因噉食衆生是惱因噉食衆生是受壓因噉食衆生是遭水因噉食衆生是遭火因噉食衆生是遭風因噉食衆生是遭偷因噉食衆生是遭劫因噉食衆生是遭賊因噉食衆生是鞭因噉食衆生是杖因噉食衆生是笞因噉食衆生是督因噉食衆生是罵因噉食衆生是辱因噉食衆生是繫因噉食衆生是縛因噉食衆生是幽因噉食衆生是閉因噉食衆生是生苦因噉食衆生是老苦因噉食衆生是病苦因噉食衆生是死苦因噉食衆生是怨憎㑹苦因噉食衆生是愛别離苦因噉食衆生是求不得苦因噉食衆生是五受陰苦因噉食衆生是行苦因噉食衆生是壞苦因噉食衆生是苦苦因噉食衆生是想地獄因噉食衆生是黑繩地獄因噉食衆生是衆合地獄因噉食衆生是呌喚地獄因噉食衆生是大呌喚地獄因噉食衆生是熱地獄因噉食衆生是大熱地獄因噉食衆生是阿鼻地獄因噉食衆生是八寒八熱地獄因乃至是八萬四千鬲子地獄因乃至是不可說不可說鬲子地獄因噉食衆生乃至是一切餓鬼因噉食衆生乃至是一切畜生因當知餓鬼有無量苦當知畜生有無量苦畜生暫生暫死為物所害生時有無量怖畏死時有無量怖畏此皆是殺業因緣受如是果若欲具列殺果展轉不窮盡大地草木亦不能容受向來所說雖復多途舉要為言同一苦果但苦中自有輕重所以今日致衆苦果皆由殺業惱害衆生略舉一隅粗言少分諸大德僧尼諸義學僧尼諸寺三官復當應思一大事若使噉食衆生父衆生亦報噉食其父若噉食衆生母衆生亦報噉食其母若噉食衆生子衆生亦報噉食其子如是怨對報相噉食厯劫長夜無有窮已如經說有一女人五百世害狼兒狼兒亦五百世害其子又有女人五百世斷鬼命根鬼亦五百世斷其命根如此皆是經說不可不信其餘相報推例可知諸大德僧尼諸義學僧尼諸寺三官又有一大事當應信受從無始已來至於此生經厯六道僃諸果報一切親緣遍一切處直以經生厯死神明隔障是諸眷屬不復相識今日衆生或經是父母或經是師長或經是兄弟或經是姊妹或經是兒孫或經是朋友而今日無有道眼不能分别還相噉食不自覺知噉食之時此物有靈即生忿恨還成怨對向者至親還成至怨如是之事豈可不思暫爭舌端一時少味永與宿親長為怨對可為痛心難以言說白衣居家未可適道出家學人被如來衣習菩薩行宜應深思諸大德僧尼諸義學僧尼諸寺三官又復當思一事凡噉食衆生是一切衆生惡知識是一切衆生怨家如是怨家遍滿六道若欲修行皆為障難一理中障難二事中障難何者是理中障難以業因緣自生障難令此行人愚癡無慧不知出惡無有方便設值善知識不能信受設復信受不能習行此是理中障難事中障難者此諸怨對或在惡鬼中或在毒獸中或在有大力神中或在大力龍中或在魔中或在天中如是處處來作留難設令修行遇善知識深心信受適欲習行便復難起或引入邪道或惱令心亂修戒修定修慧修諸功德常不清淨常不滿足皆是舊怨起諸對障此是事中障難如是之事又宜深思但以一噉食衆生因緣能逺離一切佛法有如是種種過患貪毒亦如是瞋毒亦如是癡毒亦如是三毒等分皆同過患相與宜深自覺察善思方便斷酒肉文二弟子蕭衍又復敬白諸大德僧尼諸義學僧尼諸寺三官北山蔣帝猶且去殺若以不殺祈願輒得上教若以殺生祈願輒不得教想今日大衆已應聞知弟子巳勒諸廟祝及以百姓凡諸羣祀若有祈報者皆不得薦生類各盡誠心止修蔬供蔣帝今日行菩薩道諸出家人云何反食衆生行諸魔行一日北山為蔣帝齊所以皆請菜食僧者正以幽靈悉能鍳見若不菜食僧作菜食往將恐蔣帝惡賤佛法怪望弟子是諸法師當見此意斷酒肉文三弟子蕭衍又敬白大德僧尼諸義學者一切寺三官弟子蕭衍於十方一切諸佛前於十方一切尊法前於十方一切聖僧前與諸僧尼共伸約誓今日僧衆還寺已後各各檢勒使依佛教若復有飲酒噉肉不如法者弟子當依王法治問諸僧尼若披如來衣不行如來行是假名僧與盜賊不異如是行者猶是弟子國中編户一民今日以王力足相治問若為外司聽察所得若為寺家自相糾舉不問年時老少不問門徒多少弟子當令寺官集僧衆鳴犍捶捨戒還俗著在家服依涅槃經還俗策使唯最老舊者最多門徒者此二種人最宜先問何以故治一無行小僧不足以改革物心治如是一大僧足以驚動視聽推訃名德大僧不應有此設令有此當依法治問其餘小僧故自忘言今日集㑹此是大事因緣非直一切諸佛在此非直一切尊法在此非直一切聖僧在此諸天亦應遍滿虛空諸仙亦應遍滿虛空護世四王亦應在此金剛蜜迹大辨天神功德天神韋䭾天神毗紐天神摩醯首羅散脂大將地神堅牢迦毗羅王孔雀王封頭王富尼跋陀羅迦王阿修羅伽王摩尼跋陀羅伽王金毗羅王十方二十八部夜乂神王一切持咒神王六方大護都使安國如是一切有大神足力有大威德力如是一切善神遍滿虛空五方龍王娑竭龍王阿耨龍王難陀龍王跋難陀龍王伊那滿龍王如是一切菩薩龍王亦應遍滿在此天龍夜乂乾闥婆王阿修羅王迦樓羅王緊那羅王摩睺羅伽王人非人等如是一切有大神足力有大威德力八部神王皆應在此今日土地山川房廟諸神亦應仄塞虛空如是幽顯莫不鑒觀唯無瑕者可以戮人唯自淨者可以淨人弟子今日唱言此事僧尼必當有不平色設令刳心擲地以示僧尼丐數片肉無以取信古人有言非知之難其在行之弟子蕭衍雖在居家不持禁戒今日當先自為誓以明本心弟子蕭衍從今已去至於道場若飲酒放逸起諸淫欲欺誑妄語噉食衆生乃至飲於乳蜜及以酥酪願一切有大力鬼神先當苦治蕭衍身然後將付地獄閻羅王與種種苦乃至衆生皆成佛盡弟子蕭衍猶在阿鼻地獄中僧尼若有飲酒噉魚肉者而不悔過一切大力鬼神亦應如此治問增廣善衆清淨佛道若未為幽司之所治問猶在世者弟子蕭衍當如法治問驅令還俗與居家衣隨時役使願今日二部僧尼各還本寺匡正佛法和合時衆皆令聽經法者如說修行不可復令斷大慈種便弟子不續若有犯法破戒者皆依僧制如法治問若有容受不相舉治者當反任罪又僧尼寺有事四天王迦毗羅神猶設鹿頭及羊肉等是事不可急宜禁斷若不禁斷寺官任咎亦同前科别宣意斷酒肉文四弟子蕭衍敬白諸大德僧尼諸義學僧尼諸寺三官向已粗陳魚肉障纍招致苦果今重復欲通白一言閻浮提夀云百二十至於世間罕聞其人遷變零落亦無宿少經言以一念頃有六十剎那生老無常謝不移時暫有諸根俄然衰滅三途等苦倐忽便及欲離地獄其事甚難戒德清淨猶懼不免況於毁犯安可免乎雖復長齊菜食不勤方便欲免苦報亦無是處何以故爾此生雖可不犯衆罪後報業强現無方便三途等苦不能遮止況復飲酒噉食衆生諸僧尼必信佛語宜自力勵若云菜食為難此是信心薄少若有信心宜應自强有决定心菜食何難菜蔬魚肉俱是一惑心若能安便是井露上味心若不安便是臭穢下食所以涅槃經言受食之時令作子肉想如俱非惑豈須此法且置逺事止借近喻今已能蔬食者厭惡血腥其於不能蔬食者厭惡菜茹事等如此宜應自力回不善惑以為善惑就善惑中重為方便食菜子想以如是心便得决定凡不能離魚肉者皆云菜蔬冷令人虛乏魚肉溫於人補益作如是說皆是倒見今試復粗言其事不爾若久食菜人榮衛流通凡如此人法多患熱榮衛流通則能飲食以飲食故氣力充滿是則菜蔬不冷能有補益諸苦行人亦皆菜蔬多悉患熱類皆堅强神明清爽少於昏疲凡魚為生類皆多冷血腥為法增長百疾所以食魚肉者神明理當昏濁四體法皆沈重無論方招後報有三途苦即時四大交有不及此豈非惑者因心各有所執井魚肉者便謂為溫為補此是倒見事不可信復有一種人食菜以為冷便復解素此是行者未得菜意菜與魚肉如水與火食菜才欲得力復噉魚肉魚肉腥臊能滅菜力所以惑者云菜為性冷凡數解素人進不得菜蔬之力退不得魚肉邪益法多羸冷少有堪能是諸僧尼復當知一事凡食魚肉是魔境界行於魔行心不决定多有留難內外衆魔共相嬈作所以行者思念魚肉酒是魔漿故不待言凡食魚肉嗜飲酒者善神逺離內無正氣如此等人法多衰惱復有一種人雖能菜食恃此憍慢多於瞋恚好生貪求如是之人亦墜魔界多於衰惱又有一種人外行似熟內心粗惡見人勝已常懷忿嫉所行不善皆悉覆相如是等人亦行魔界雖復菜蔬亦多衰惱若心力决正蔬食苦到如是等人多為善力所扶法多堪能有不直者宜應思覺勿以不决定心期决定人諸大德僧尼有行業已成者今日已去善相開導令未得者今去皆得若已習行願堅志力若未曽行願皆改革今日相與共為菩提種子勿怪弟子蕭衍向來所白樂府芳樹緑樹始搖芳芳生非一葉一葉度春風芳華自相接雜色亂參差衆花紛重疊重疊不可思思此誰能愜有所思誰言生離久適意與君别衣上芳猶在握裏書未滅腰間雙綺帶夢為同心結常恐所思露瑶華未忍折臨高臺樂府作簡文今從玉臺作武帝高臺半行雲望望高不極草樹無參差山河同一色髣佛洛陽道道逺難别識玉階故情人情來共相憶雍臺日落登雍臺佳人殊未來綺窗蓮花掩網户琉璃開䒠茸臨紫桂蔓延交青苔月沒光陰盡望子獨悠哉長安有狹邪行帝王集作魏武帝者非洛陽有曲陌曲陌不通驛忽遇二少童扶轡問君宅我宅邯鄲右易憶復可知大息組絪緼中息佩陸離小息尚青綺總轡遊南皮三息俱入門家臣拜門垂三息俱升堂㫖酒盈千巵三息俱入户户內有光儀大婦理金翠中婦事玉觹小婦獨閒暇調笙遊曲池丈人少裴徊鳯吹方參差擬青青河畔草幕幕繡户絲悠悠懷昔期昔期久不歸鄉國曠音徽音徽空結遲半寢覺如至既寤了無形與君隔平生月以雲掩光葉以霜催老當途競自容莫肻為妾道擬明月照高樓圓魄當虛闥清光流思延延思對孤影悽怨還自憐臺鏡早生塵匣琴又無絃悲慕屢傷節離憂亟華年君如東扶景妾似西栁煙相去既路迥明晦亦殊懸願為銅鐵轡以感長樂前閶闔篇西漢本佳妍金馬望甘泉衛尉屯兵上期門曉漏傳猶重河東賦欲知追神仙羽騎凌雲轉閶闔帶空懸長旗掃月窟鳳跡輾星躔但使丹砂就能令憶萬年邯鄲歌回顧灞陵上北指邯鄲道短衣妾不傷南山為君老子夜歌二首恃愛如欲進含羞未肻前朱口發艷歌玉脂㺯嬌絃朝日照綺窗光風動紈羅巧笑蒨兩犀美目揚雙蛾子夜四時歌春歌四首階上香入懷庭中花照眼春心一如此情來不可限蘭葉始滿池梅花已落枝持此可憐意摘以寄心知朱日光素冰黃花映白雪折梅寄佳人共迎陽春月花塢蝶雙飛栁堤鳥百舌不見佳人來徒勞心斷絶夏歌四首江南蓮花開紅光照碧水色同心復同藕異心無異閨中花如繡簾上露如珠欲知有所思停織復踟蹰玉盤著朱李金杯盛白酒雖欲持自親復恐不甘口含桃落花日黃鳥營飛時君住馬已疲妾去蠶欲饑秋歌四首繡帶合歡結錦衣連理文懷情入夜月含笑出朝雲七采紫金柱九華白玉梁但歌雲不去含吐有餘香吹漏未可停絃斷更當續俱作雙絲引共奏同心曲當信抱梁期莫聽回風音鏡中兩人髻分明無兩心冬歌四首寒閨動黻帳密筵重錦席賣眼拂長袖含笑留上客别時鳥啼户今晨雪滿墀過此君不返但恐緑鬢衰果欲結金蘭但看松柏林經霜不墮地歲寒無異心一年漏將盡萬里人未歸君志固有在妾軀乃無依歡聞歌二首豔豔金樓女心如玉池蓮持底報郎恩俱期遊梵天南有相思木合影復同心遊女不可求誰能息空陰團扇歌手中白團扇淨如秋團月清風任動生嬌香承意發碧玉歌杏梁日始照蕙席歡未極碧玉奉金杯緑酒助花色上聲歌花色過桃杏名稱重金瓊名歌非下里含笑作上聲襄陽白銅鞮歌三首陌頭征人去閨中女下機含情不能言送别沾羅衣草樹非一香花葉百種色寄語故情人知我心相憶龍馬紫金鞍翠眊白玉羈照耀雙闕下知是襄陽兒楊叛兒桃花初發紅芳草尚抽緑南音多有㑹偏重叛兒曲白紵辭二首朱絲玉柱羅象筵飛琯促節舞少年短歌流目未肻前含笑一轉私自憐纎腰嫋嫋不任衣嬌怨獨立特為誰赴曲君前未忍歸上聲急調中心飛河中之水歌河中之水向東流洛陽女兒名莫愁莫愁十三能織綺十四採桑南陌頭十