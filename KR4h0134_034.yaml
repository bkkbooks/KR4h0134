body:
  text: 漢魏六朝百三家集卷三十四魏阮籍集題詞嗣宗論樂史遷不如通易達莊則王弼郭象二注皆其環內也以此三論垂諸藝文六家指要網羅精濶曹氏父子詞壇虎步論文有餘言理不足嗣宗視之猶輕塵於泰岱豈特其人褌蝨哉諸賦大言小言清風穆如間覽賦苑長篇爭麗兩京三都讀未終卷觸屏欲睡展觀阮作則一丸消疹胸懷蕩滌惡可謂世無萱草也晉王九錫公卿勸進嗣宗製詞婉而善諷司馬氏孤雛人主豺聲震怒亦無所加正言感人尚愈寺人孟子之詩乎詠懷諸篇文隱指逺定哀之際多微辭蓋斯類也履朝右而談方外羈仕宦而慕真仙大人先生一傳寧子虛亡是公耶步兵厨人可以索酒鄰家當罏可以醉臥哭兵家之亡女慟窮途之車迹處魏晉間如是足矣叔夜日與酣飲而文王復稱至愼人與文皆以天全者哉目録賦東平賦元父賦首陽山賦清思賦獼猴賦鳩賦箋為鄭沖勸晉王箋奏記辭蔣太尉辟命奏記又書與晉王薦盧播書答伏義書論樂論通易論達莊論通老論傳大人先生傳贊老子贊誄孔子誄帖搏赤猿帖文吊某公文詩詠懷詩三首詠懷八十二首采薪者歌大人先生歌漢魏六朝百三家集卷三十四目録欽定四庫全書漢魏六朝百三家集卷三十四明張溥輯魏阮籍集賦東平賦夫九州有方圓九野有形勢區域髙下物有其制開之則通塞之則否流之則行壅之則止崇之則成丘陵汙之則為藪澤逶迤漫衍繞以大壑及至分之國邑樹之表物四時儀其象陰陽暢其氣傍通回蕩有形有德雲升雷動一叫一默或由之安乃用斯惑若觀夫隅隈之缺幽荒之塗沕漠之域窮野之都竒偉譎詭可以勝圖乃有遍遊之士浩養之雅凌驚飈躡浮霄清濁俱逝吉凶相招是以伶倫遊鳯於崑崙之陽鄒子吸溫於黍谷之陰伯髙登降於尚季之上羡門逍遙於三山之岑上遨玄圃下遊鄧林鳯鳥自歌翔鸞自舞嘉榖蕃殖匪我稷黍其厄陋則有橫術之場鹿豕之墟匪修潔之攸麗於穢纍之所如西則首仰阿甄傍通戚蒲桑間濮上淫荒所廬三晉縱橫鄭衛紛敷豪俊凌厲徒屬留居是以強禦橫於戶牖怨毒奮於牀隅仍渺欲而作慝豈待久而發諸厥土惟中劉王是聚髙危臨城窮川帶宇叔氏婚族實在其湄背險向水垢汙多私是以其州閭鄙邑莫言或非殪情戾慮以殖厥資其土田則原壤蕪荒樹藝失時疇畝不辟荆棘不治流潢餘溏洋溢靡之東當三齊西接鄒魯長塗千里受茲商旅力間為率師使以輔驕僕纎邑於焉斯處川澤捷徑洞庭荆楚遺風過焉是徑是宇由而紹俗靡則靡觀非夷罔式導斯作殘是以其唱和矜勢背理向姦尚氣逐利因畏惟愆其居處壅翳蔽塞窕邃弗章倚以陵墓帶以曲房是故居之則心昏言之則志哀悸罔徙易靡所寤懷其外有濁河縈其溏清濟蕩其樊其北有連岡崺􅾆﨑􅀈山陵崔巍雲電相干長風振厲蕭條太原其南則浮汶湛湛行潦成池深林茂樹蓊鬱參差羣鳥翔天百獸交馳雖黔首之不淑兮儻山澤之足彌古哲人之攸貴兮好政教之有儀彼玄真之所寶兮樂寂寞之無知咨閭閻之散感兮因回風以揚聲瞻荒榛之蕪穢兮顧東山之蔥青甘丘里之舊言兮發新詩以慰情信嚴霜之未滋兮豈丹木之再榮北門悲於殷憂兮小辨哀於獨誠鷗端一而慕仁兮何淳朴之靡逞彼羽儀之感志兮矧伊人之匪靈時􅞕悃以遙思兮飈飄颻以欲歸欽丕遊於陵顚兮舉斯羣而競飛物修化而神樂兮寧遐觀之可追乘松舟以載險兮雖無維而自縶騁驊驑於狹路兮顧蹇驢而弗及資章甫以遊越兮見犀光而先入被文繡而賈戎兮識旃裘之必襲奉淳德之平和兮孰斯邦之可集將言歸於美俗兮請王子與俱遊漱玉液之滋怡兮飲白水之清流遂虛心而後已兮又何懷乎患憂重曰嘉年時之淑清兮美春陽以肇夏託颸飈而載行兮因形骸以成駕遵間維而長驅兮問迷罔於苑風玄雲興而四周兮寒雨淪而下降忽一寤而喪軌兮蹈空虛而遂征扶搖蔽於合墟兮咸池照乎增城欣煌熠之朝顯兮喜太陽之炎精測虛舟以逞思兮聊逍遙於清溟謹玄真之諶訓兮想至人之有形繡靡覩其紛錯兮慮彌逺而度逼並旋軫於畎澮兮若空桑之可即言淫衍而莫止兮心綿綿而未息集舒誥以鑒戒兮賜衆誨之難測神遙遙以抒歸兮畏雙環之在側咨禽鳥之不羣兮悼悠悠之無極感藜藿之易修兮攝左右之相譽懼從風而永去兮託顓頊於鮒隅雖琴瑟之畢存兮豈聲曲之復舒慮遨遊以覯竒兮彼上騰其焉如紛暗曖以亂錯兮漫浩漾而未靜理都繆而改據兮竦端委而自整制規矩以儀衡兮占我龜以觀省眺兹輿之所徹兮實斯近而匪逺豈三年之無問兮將一往而九反顧杲日之初開兮馳曲陵而飾容時零落之飄颻兮試枯菀之必從釋遼遙之闊度兮習約結之常契巡襄城之間收兮誦純一之遺誓被風雨之沾濡兮安敢軒翥而遊署竊悄悄之眷貞兮泰恬淡而永世豈淹留以為感兮將易貌乎殊方乃擇髙以登棲兮永欣欣而樂康元父賦吾嘗遊元父登其城使人愁思作賦以記之言不足樂也元父者九州之窮地先代之幽墟者也故其城郭卑小局促危隘不遐其土田則汙除漸淤泥濕槃汙方池邊屬兮容水滂沱穢菜惟産兮不食實多地下沉陰兮受氣匪和太陽不周兮殖物靡嘉故其人民頑嚚檮杌下愚難化其區域壅絶斷塞分迫旋淵終始同貫本末相牽疇昔訖今曠世厯年巨野瀦其後窮濟盡其前甽澮不暢垢濁實臻不肖羣聚屋空無賢故其民放散淆亂藪竄澤居比迹麋鹿齊志豪貙是以其原壤不辟樹藝希疏莧葦彌臯蚊虻慘膚也於其逺險則右金鄉而左髙平崇陵崔巍深溪崢嶸美類不處熊虎是生故人民被害嚼齧禽性獸情爾之近阻則鳴鳩廕其前曲城發其後鴟梟羣翔狐狸萬口故其人民狼風豺氣盩電無厚南望春申東瞻孟嘗袤界薛邑境邊山陽逆旅行舍姦盜所藏北臨平陸齊之西封捷徑燕趙逃遁逍遙故其人民側匿頗僻隱蔽不公懷私抱詐爽慝是從禮義不設淳化匪同先哲遺言有昭有聾如何君子棲遲斯邦首陽山賦正元元年秋余尚為中郎在大將軍府獨往南牆下北首陽山賦曰在兹年之末歲兮端旬首而重陰風飄回以曲至兮雨旋轉而纎襟蟋蟀鳴乎東房兮鶗鴂號乎西林時將暮而無儔兮慮悽愴而感心振沙衣而出門兮纓緌絶而靡尋步徙倚以遙思兮喟歎息而微吟將修飭而欲往兮衆􅚖􅚖而笑人靜寂寞而獨立兮亮孤植而靡因懷分索之情一兮穢羣偽之射真信可實而弗離兮寧髙舉而自儐聊仰首以廣俯兮瞻首陽之岡岑樹叢茂以傾倚兮紛蕭爽而揚音下﨑嶇而無薄兮上洞徹而無依鳯翔過而不集兮鳴梟羣而並棲揚遙逝而逺去兮二老窮而來歸實囚軋而處斯兮焉暇豫而敢誹嘉粟屏而不存兮故甘死而採薇彼背殷而從昌兮投危敗而弗遲此進而不合兮又何稱乎仁義肆壽夭而弗豫兮競毁譽以為度察前載之是云兮何美論之足慕茍道求之在細兮焉子誕而多辭且清虛以守神兮豈慷慨而言之清思賦余以為形之可見非色之美音之可聞非聲之善昔黃帝登仙於荆山之上振咸池於南嶽之岡鬼神其幽而夔牙不聞其章女娃耀榮於東海之濵而翩翻於洪西之旁林石之隕從而瑶臺不照其光是以微妙無形寂寞無聽然後乃可以覩窈窕而淑清故白日麗光則季后不步其容鐘鼓闛鞳則延子不揚其聲夫清虛寥廓則神物來集飄颻恍忽則洞幽貫冥氷心玉質則皎潔思存恬淡無欲則泰志適情伊衷慮之遒好兮又焉處而靡逞寒風邁於黍榖兮誨子而遊鶄申孺悲而毋歸兮吳鴻哀而象生兹感激以達神豈浩漾而弗營志不覬而神正心不蕩而自誠固秉一而內修堪粵止之匪傾惟清朝而夕晏兮指濛泛以永寧是時羲和既頽玄夜始扄望舒整轡素風來征輕帷連揚華禋肅清彭蚌微吟螻蛄徐鳴望南山之崔巍兮顧北林之蔥菁太陰潛乎後房兮明月耀乎前庭乃申展而缺寐兮忽一悟而自驚焉長靈以遂寂兮將有歙乎所之意流蕩而改慮兮心震動而有思若有來而可接兮若有去而不辭心恍忽而失度情散越而靡治豈覺察而明真兮誠雲夢其如兹驚竒聲之異造兮鑑殊色之在斯聞丹山之琴瑟兮聆崇陵之參差始徐唱而微響兮情悄慧以蜲蛇遂招雲以致氣兮乃振動而大駭聲飂飂以洋洋若登崑崙而臨西海超遙茫渺不能究其所在心漾漾而無所終薄兮思悠悠而未半鄧林殪於大澤兮欽邳悲於瑶岸徘徊夷由兮猗靡廣衍遊平圃以長望兮乘修水之華旗長思肅以永至兮滌平衢之大夷循路曠以徑通兮辟閨闥而洞闈羡要眇之飄遊兮倚東風以揚暉沐洧淵以淑密兮體清潔而靡譏厭白玉以為面兮披丹霞以為衣襲九英之曜精兮珮瑤光以發微服倏煜以繽紛兮綷衆采以相綏色熠熠以流爛兮紛雜錯以葳蕤象朝雲之一合兮似變化之相依麾常儀使先好兮命河女以胥歸步容與而特進兮盼兩楹而升墀振瑶溪而鳴玉兮播陵陽之婓婓蹈消漺之危迹兮躡離散之輕微釋安朝之朱履兮踐席假而集帷敷斯來之在室兮乃飄忽之所晞馨香發而外揚兮媚顔灼以顯姿清言竊其如蘭兮辭婉娩而靡違託精靈之運會兮浮日月之餘暉假淳氣之精微兮幸備嬿以自私願申愛於今夕兮尚有訪乎是非被芬芳之夕暢兮將暫往而永歸觀悅懌而未靜兮言未究而心悲嗟雲霓之可憑兮翻揮翼而俱飛棄中堂之局促兮遺戶牖之不處帷幕張而靡御兮几筵設而莫拊載雲輿之奄靄兮乘夏后之兩龍折丹木以蔽陽兮竦芝蓋之三重翩翼翼以左右兮紛悠悠以容容瞻朝霞之相承兮似美人之懷憂采色雜以成文兮忽離散而不留若將言之未發兮又氣變而飄浮若垂髦而失鬋兮飾未集而形消目流盼而自别兮心欲來而貌遼紛綺靡而未盡兮先列宿之規矩時儻莽而陰曀兮忽不識乎舊宇邁黃妖之崇臺兮雷師奮而下雨內英哲與長年兮笞離倫與膺賈摧魍魎而折鬼神兮直徑登乎所期厯四方而縱懷兮誰云顧乎或疑超髙躍而疾騖兮至北極而放之援間維以相示兮臨寒門而長辭既不以萬物纍心兮豈一女子之足思獼猴賦昔禹平水土而使益驅禽滌蕩川谷兮櫛梳山林是以神姦形於九鼎而異物來臻故豐狐文豹釋其表間尾騶虞獻其珍夸父獨鹿袚其豪青馬三騅棄其羣此以其壯而殘其生者也夫熊狚之遊臨江兮見厥功以乘危夔負淵以肆志兮楊震聲而衣皮處間曠而或昭兮何幽隱之罔隨鼷畏逼以潛身兮穴神丘之重深終或餌以求食兮烏鑿之而能禁誠有利而可欲兮雖希覿而為禽故近者不稱歲逺者不厯年大則有稱於萬年細者則為笑於目前夫獼猴直其微者也猶繫纍於下陳體多似而匪類形乖殊而不純外察慧而內無度兮故人面而獸心性褊淺而干進兮似韓非之囚秦揚睂額而驟呻兮似巧言而為真藩從後之繁衆兮猶伐樹而喪鄰整衣冠而偉服兮懷項王之思歸耽嗜欲而盼視兮有長卿之妍姿舉頭吻而作態兮動可增而自新沐蘭湯而滋穢兮匪宋朝之媚人終蚩弄而處泄兮雖近習而不親多才伎其何為固受垢而貌侵姿便捷而好技兮超超騰躍乎岑嵒既投林以東避兮遂中岡而被尋嬰徽纆以拘制兮顧西山而長吟緣榱桷以容與兮志豈忘乎鄧林庶君子之嘉惠設竒視以盡心且須臾以永日焉逸豫而自矜斯伏死於堂下長滅沒乎形神鳩賦嘉平中得兩鳩子常食以黍稷後卒為狗所殺故為作賦伊嘉年之茂惠洪肇恍忽以發蒙有期緣之竒鳥以鳴鳩之攸同翔雕木以胎隅寄增巢於裔松吸雲霧以消息遊朝陽以相從曠踰旬而育類嘉七子之修容始戢翼而樹羽遭金風之蕭瑟既顚覆而靡救又振落而莫弼陵恆山以徘徊臨舊鄉而思入揚哀鳴以相送悲一往而不集終飄搖以流離傷弱子之悼栗何依恃以育養賴兄弟之親戚背草萊以求仁託君子之靜室甘黍稷之芳饎安戶牖之無疾潔文襟以交頸抗華麗之艷溢端妍姿以鑒飾好威儀之如一聊俯仰以逍遙求愛媚於今日何飛翔之羡慕願投報而忘畢值狂犬之暴怒加楚害於微軀欲殘沒以糜滅遂捐棄而淪失箋為鄭沖勸晉王箋沖等死罪伏見嘉命顯至竊聞明公固讓沖等眷眷實有愚心以為聖王作制百代同風褒德賞功有自來矣昔伊尹有莘氏之媵臣耳一佐成湯遂荷阿衡之號周公藉已成之勢據既安之業光宅曲阜奄有龜蒙吕尚磻磎之漁者耳一朝指麾乃封營丘自是以來功薄而賞厚者不可勝數然賢哲之士猶以為美談况今自先相國以來世有明德翼輔魏室以綏天下朝無闕政人無謗言前者明公西征靈州北臨沙漠榆中以西望風震服羌戎東馳回首內向東誅叛逆全軍獨尅禽闔閭之將斬輕鋭之卒以萬萬計威加南海名攝三越宇內康寧苛慝不作是以殊俗畏威東夷獻舞故聖王覽乃昔以來禮典舊章開國光宅顯兹太原明公宜承聖旨受兹介福允當天人元功盛勳光光如彼國土嘉祚巍巍如此內外協同靡愆靡違由斯征伐則可朝服濟江掃除吳會西塞江源望祀岷山回戈弭節以麾天下逺無不服邇無不肅大魏之德光于唐虞明公盛勳超于桓文然後臨滄洲而謝支伯登箕山以揖許由豈不盛乎至公至平誰與為鄰何必勤勤小讓也哉沖等不通大體敢以陳聞奏記辭蔣太尉辟命奏記籍死罪死罪伏惟明公以含一之德據上台之位羣英翹首俊賢抗足開府之日人人自以為掾屬辟書始下下走為首子夏處西河之上而文侯擁篲鄒子居黍谷之陰而昭王陪乘夫布衣窮居韋帶之士王公大人所以屈體而下之者為道存也籍無鄒卜之德而有其陋猥煩大禮何以當之方將耕於東臯之陽輸黍稷之稅以避當塗者之路負薪疲病足力不強補吏之召非所克堪乞回謬恩以光清舉又違由鄙鈍學行固野進無和俗崇譽之髙退無靜默恬沖之操猥見顯飾非所被荷舊素尫瘵守病委劣謁拜之命未敢堪任昔榮期帶索仲尼不易其三樂仲子守志楚王不奪其灌園貪榮塞賢昧進負譏憂望交集五情相愧明公侔蹤魯衛勳隆桓文廣延俊傑恢崇大業乞降期會以避清路畢願家巷惟蒙於許書與晉王薦盧播書蓋聞興化濟治在於得人收竒拔異聖賢髙致是以八士歸周周道以隆虞舜登庸元凱咸事伏惟明公公侯皇靈誕秀九德光被應期作輔論道敷化開闢四門延納羽翼賢士以贊雍熙是以英俊之士願排皇闥䇿名委質真薦之徒輻輳大府誠以鄧林昆吾翔鳯所栖懸黎和肆垂棘所集伏見鄙州别駕同郡盧播年三十二字景宣少有才秀之異長懷淑茂之量耽道悅禮仗義依仁研精墳典升堂覩奧聰鑒物理闕通玄妙貞固足以幹事忠敬足以肅朝明斷足以質疑機密足以應權臨煩不惑在急彌明若得佐時理物則政事之器銜命聘享則專對之才潛心圖籍文學之宗敷藻載𫐠良史之表然而學不為人行不求達故久沉淪未階太清誠後門之秀偉當時之利器宜蒙旌命和味鼎鉉孔子曰如有所譽必有所試播之所能著在巳效不敢虛飾取謗大府答伏義書籍白承音覽旨有心翰迹夫九蒼之髙迅羽不能尋其巔四溟之深幽鱗不能測其底矧無毛分所能論哉且玄雲無定體應龍不常儀或朝濟夕卷翕忽代興或泥潛天飛晨降宵升舒體則八維不足暢迹促節則無間足以從容是又瞽夫所不能瞻璅蟲所不能解也然則𢎞修淵邈者非近力所能究矣靈變神化者非局器所能察矣何吾子之區區而吾真之務求乎人力勢不能齊好尚舛異鸞鳯凌雲漢以舞翼鳩鵷悅蓬林以翺翔螭浮八濵以濯鱗鱉娛行潦而羣逝斯用情各從其好以取樂焉據此非彼胡可齊乎夫人之立節也將舒網以籠世豈樽樽以入罔方開模以範俗何暇毁質以適檢若良運未協神機無準則騰精抗志邈世髙超蕩精舉於玄區之表攄妙節於九垓之外而翺翔之乘景躍踸踔陵忽慌從容與道化同逌逍遙與日月並流交名虛以齊變及英祗以等化上乎無上下乎無下居乎無室出乎無門齊萬物之去留隨六氣之虛盈總玄綱於太極撫天一於寥廓飄埃不能揚其波飛塵不能垢其潔徒寄形軀於斯域何精神之可察雖業無不聞略無不稱而明有所逮未可怪也觀吾子之趨欲衒傾城之金求百錢之售制造天之禮擬膚寸之檢勞玉躬以役物守臊穢以自畢沈牛迹之浥薄慍河漢之無根其陋可愧其事可悲亮規略之懸踰信大道之𢎞幽且局步於常衢無為思逺以自愁比連疹憒力喻不多阮籍白論樂論劉子問曰孔子云安上治民莫善於禮移風易俗莫善於樂夫禮者男女之所以别父子之所以成君臣之所以立百姓之所以平也為政之具靡先於此故安上治民莫善於禮也夫金石絲竹鐘鼓管絃之音干戚羽旄進退俯仰之容有之何益於政無之何損於化而曰移風易俗莫善於樂乎阮先生曰善哉子之問也昔者孔子著其都乎且未舉其略也今將為子論其凡而子自備詳焉夫樂者天地之體萬物之性也合其體得其性則和離其體失其性則乖昔者聖人之作樂也將以順天地之體成萬物之性也故定天地八方之音以迎陰陽八風之聲均黃鐘中和之律開羣生萬物之情氣故律吕協則陰陽和音聲適而萬物類男女不易其所君臣不犯其位四海同其觀九州一其節奏之圜山而天神下奏之方嶽而地祇上天地合其德則萬物合其生刑賞不用而民自安矣乾坤易簡故雅樂不煩道德平淡故五聲無味不煩則陰陽自通無味則百物自樂日遷善成化而不自知風俗移易而同於是樂此自然之道樂之所始也其後聖人不作道德荒壞政法不立智慧擾物化廢欲行各有風俗故造始之教謂之風習而行之謂之俗楚越之風好勇故其俗輕死鄭衛之風好淫故其俗輕蕩輕死故有火焰赴水之歌輕蕩故有桑間濮上之典各歌其所好各詠其所為歌之者流涕聞之者歎息背而去之無不慷慨懷永日之娛抱長夜之歎相聚而合之羣而習之靡靡無已棄父子之親弛君臣之制匱室家之禮廢耕農之業忘終身之樂崇淫縱之俗故江淮之南其民好殘漳汝之間其民好奔吳有雙劍之節趙有扶琴之客氣發於中聲入於耳手足飛揚不覺其駭好勇則犯上淫放則棄親犯上則君臣逆棄親則父子乖乖逆交爭則患生禍起禍起而意愈異患生而慮不同故八方殊風九州異俗乖離分背莫能相通音異氣别曲節不齊故聖人立調適之音建平和之聲制便事之節定順從之容使天下之為樂者莫不儀焉自上以下降殺有等至於庶人咸皆聞之歌謡者詠先王之德俯仰者習先王之容器具者象先王之式度數者應先王之制入於心淪於氣心氣和洽則風俗齊一聖人之為進退俯仰之容也將以屈形體服心意便所修安所事也歌詠詩曲將以宣平和著不逮也鐘鼓所以節耳羽旄所以制目聽之者不傾視之者不衰耳目不傾不衰則風俗移易故移風易俗莫善於樂也故八音有本體五聲有自然其同物者以大小相君有自然故不可亂大小相君故可得而平也若夫空桑之琴雲和之瑟孤竹之管泗濵之磬其物皆調和淳均者聲相宜也故必有常處以大小相君應黃鐘之氣故必有常數有常處故其器貴重有常數故其制不妄貴重故可得以事神不妄故可得以化人其物係天地之象故不可妄造其凡似逺物之音故不可妄易雅頌有分故人神不雜節會有數故曲折不亂周旋有度故俯仰不惑歌詠有主故言語不悖導之以善綏之以和守之以𠂻持之以久散其羣比其文扶其夭助其壽使去風俗之偏習歸聖王之大化先王之為樂也將以定萬物之情一天下之意也故使其聲平其容和下不思上之聲君不欲臣之色上下不爭而忠義成夫正樂者所以屏淫聲也故樂廢則淫聲作漢哀帝不好音罷省樂府而不知制正禮樂法不修淫聲遂起張放淳于長驕縱過度丙疆景武富溢於世罷樂之後下移踰肆身不是好而淫亂愈甚者禮不設也刑教一體禮樂外內也刑弛則教不獨行禮廢則樂無所立尊卑有分上下有等謂之禮人安其生情意無哀謂之樂車服旌旗宫室飲食禮之具也鐘磬鞞鼓琴瑟歌舞樂之器也禮踰其制則尊卑乖樂失其序則親疏亂禮定其象樂平其心禮治其外樂化其內禮樂正而天下平昔衛人求繁纓曲懸而孔子歎息蓋惜禮壞而器崩也夫鐘者聲之主也縣者鐘之制也鐘失其制則聲失其主主制無常則怪聲並出盛衰之代相及古今之變若一故聖教廢毁則聰慧之人並造竒音景王喜大鐘之律平公好師延之曲公卿大夫拊手嗟嘆庶人羣生踴躍思聞正樂遂廢鄭聲大興雅頌之詩不講而妖淫之曲是尋延年造傾城之歌而孝武思孊嫚之色雍門作松柏之音愍王念未寒之服故猗靡哀思之音發愁怨偷薄之辭興則人後有縱欲奢侈之意人後有內顧自奉之心是以君子惡大凌之歌憎北里之舞也昔先王制樂非以縱耳目之觀崇曲房之嬿也必通天地之氣靜萬物之神也固上下之位定性命之真也故清廟之歌詠成功之績賔饗之詩稱禮讓之則百姓化其善異俗服其德此淫聲之所以薄正樂之所以貴也然禮與變俱樂與時化故五帝不同制三王各異造非其相反應時變也夫百姓安服淫亂之聲殘壞先王之正故後王必更作樂各宣其功德於天下通其變使民不倦然但改其名目變造歌詠至於樂聲平和自若故黃帝詠雲門之神少昊歌鳯鳥之迹咸池六英之名既變而黃鐘之宫不改易故達道之化者可與審樂好音之聲者不足與論律也舜命夔龍典樂教胄子以中和之德也詩言志歌詠言聲依詠律和聲八音克諧無相奪倫神人以和又曰豫欲聞六律五聲八音在治曶以出納五言女聽夫煩手淫聲汨湮心耳乃忘平和君子弗聽言正樂通平易簡心澄氣清以聞音律出納五言也夔曰戛擊鳴球搏拊琴瑟以詠祖考來格虞賔在位羣后德讓下管鼗鼓合止柷敔笙鏞以間鳥獸蹌蹌簫韶九成鳯凰來儀夔曰於豫擊石拊石百獸率舞庶尹允諧詩言志歌詠言操磬鳴琴以聲依律𫐠先王之德故祖考之神來格也笙鏞以間正樂聲希治修無害故繁育蹌蹌然也樂有節適九成而已陰陽調達和氣均通故逺鳥來儀也質而不文四海合同故擊石拊石百獸率舞也言天下治平萬物得所音聲不譁漠然未兆故衆官皆和也故孔子在齊聞韶三月不知肉味言至樂使人無欲心平氣定不以肉為滋味也以此觀之知聖人之樂和而巳矣自西陵青陽之樂皆取之竹聽鳯凰之鳴尊長風之象采大林之闕當時之所不見百姓之所希聞故天下懷其德而化其神也夫雅樂周通則萬物和質靜則聽不淫易簡則節制全神靜重則服人心此先王造樂之意也自後衰末之為樂也其物不真其器不固其制不信取於近物同於人間各求其好恣意所存閭里之聲競髙永巷之音爭先童兒相聚以詠富貴芻牧負戴以歌賤貧君臣之職未廢而一人懷萬心也當夏后之末輿女萬人衣以文繡食以粱肉端噪晨歌聞之者憂戚天下苦其殃百姓傷其毒殷之季君亦奏斯樂酒池肉林夜以繼日然咨嗟之音未絶而敵國已收其琴瑟矣滿堂而飲酒樂奏而流涕此非皆有憂者也則此樂非樂也當王居臣之時奏新樂於廟中聞之者皆為之悲咽桓帝聞楚琴悽愴傷心倚房而悲慷慨長息曰善哉乎為琴若此一而已足矣順帝上恭陵過樊衢聞鳥鳴而悲泣下橫流曰善哉鳥聲使左右吟之曰使絲聲若是豈不樂哉夫是謂以悲為樂者也誠以悲為樂則天下何樂之有天下無樂而有陰陽調和災害不生亦已難矣樂者使人精神平和衰氣不入天地交泰逺物來集故謂之樂也今則流涕感動噓唏傷氣寒暑不適庶物不遂雖出絲竹宜謂之哀奈何俯仰歎息以此稱樂乎昔季流子向風而琴聽之者泣下沾襟弟子曰善哉鼓琴亦已妙矣季流子曰樂謂之善哀謂之傷吾謂哀傷非為善樂也以此言之絲竹不必為樂歌詠不必為善也故墨子之非樂也悲夫以哀為樂者胡亥耽哀不變故願為黔首李斯隨哀不返故思逐狡兔嗚呼君子可不鑒之哉通易論阮子曰易者何也乃昔之玄真往古之變經也庖犧氏當天地一終值人物憔悴利用不存法制夷昧神明之德不通萬物之情不類於是始作八卦引而伸之觸類而長之分陰陽序剛柔積山澤連水火雜而一之變而通之終于未濟六十四卦盡而不窮是以天地象而萬物形吉凶著而悔吝生事用有取變化有成南面聽斷向明而治結繩而為網罟致日中之貨修耒耜之利以教天下皆得其所黃帝堯舜應時當務各有攸取窮神知化𫐠則天序庖犧氏布演六十四卦之變後世聖人觀而因之象而用之禹湯之經皆在而上古之文不存至乎文王故係其辭於是歸藏氏逝而周典經興上下無常剛柔相易不可為典要惟變所適故謂之易易之為書也本天地因陰陽推盛衰出自幽微以致明著故乾元初潛龍勿用言大人之德隱而未彰潛而未達待時而興循變而發天地既設屯蒙始生需以待時訟以立義師以聚衆比以安民是以先王以建萬國親諸侯收其心也原而積之畜而制之是以上下和洽裁成天地之道輔相天地之宜以左右民順其理也先王既沒德法乖易上凌下替君臣不制剛柔不和天地不交是以君子一類求同遏惡揚善以致其大謙而光之裒多益寡崇聖善以命雷出於地於是大人得位明聖又興故先王作樂薦上帝昭明其道以答天貺於是萬物服從隨而事之子遵其父臣承其君臨馭統一大觀天下是以先王以省方觀民設教儀之以度也包而有之合而含之故先用之以明罰敕法自上乃下貴復其賤美成亨盡時極日至先王閉關商旅不行后不省方以靜民也季葉既衰非謀之獲應運順天不妄其作故先王茂對時育萬物施仁布澤以樹其德也萬物歸隨如法流承養善反惡利積生害剛過失柄習坎以位上失其道下喪其羣於是大人繼明照于四方顯其德也自乾元以來施平而明盛衰有時剛柔無常或得或失一陰一陽出入吉凶由暗察彰文明以止有翼不飛隨之乃存取之者歸施之以若用之在微貴變愼小與物相追非知來藏往者莫之能審也易之為書也覆燾天地之道囊括萬物之情道至而反事極而改反用應時改用當務應時故天下仰其澤當務故萬物恃其利澤施而天下服此天下之所以順自然惠生類也富貴侔天地功名充六合莫之能傾莫之能害者道不逆也天地易之主也萬物易之心也故虛以受之感以和之男下女上通其氣也柔以承剛久其類也順而持之遁而退之上隆下積剛動大壯正大必用力盛則望明升惟進光大則傷聚以處身異以成類乖離既解緩以為失損益有時察以主使揚于王庭乘五馬敗剛既決柔上索下合令臣遭明君以柔遇剛品物咸亨剛據中正天下大行是以后用施命誥四國貴離教也於是天地萃聚百姓合同升而不已屆極及下井養不窮卑不能通不可弗革改以成器尊卑有分長幼有序主之以震守之以威動不可終敵應而行漸以進之為人求位君子之欲進者也臣之求君陰之從陽委之歸誠乃得其所歸而應之專而一之陽德受歸道豐位大也賢人君子有衆以成其大也窮侈喪大夫之位羣而靡容容而無所卑身下意利見大人巽以申命柔順乎剛入而説之説而教之順天應人渙然成章風行水上有文有光男行不窮女位乎外衆陰承五上同在中從初更始乘木有功故先王以享于帝立廟奉天建國也剛柔分適得中節之以制其道不窮信愛結內剛得中位誠發於心庶物惟類大得則虧甚往則過既應於逺默則不利故君子是以行重乎恭喪重乎哀篤偽薄也小過下泰不宜於上下止上動有飛鳥之象焉初六坎下上六離體飛鳥以凶是以災眚也柔處中剛失位利與時行過而欲遂小亨正象陰皆乘陽陽剛凌替君臣易位亂而不已非中之謂故君子思患而豫防之慮其敗也通變無窮周敗又始剛未出陰在中柔濟不遺遂度不窮則象河洛神物設教而天下服愼辨居方陰陽相求初與之道逺作之由也卦體開闔乾以一為開坤以二為闔乾坤成體而剛柔有位故木老於未水生於申而坤在西南火老於戍木生於亥而乾在西北剛柔之際也故謂之父母陽承震動發而相承專制遂行萬物以興故謂之長男水老於辰金生於已一氣存之終而復起故巽為長女震發於風陰德有紀火中鵙鳴母道將始故離為中女又在西北健戰將升季陰幼昧衰而不勝故兌為少女倉中拔留肇幽為陽在中未達含而未彰故坎為中男周流接合萬物既終造微更始明而未融故艮為少男乾圓坤方女柔男剛健柔時推而禍福是將循化知生從變見亡故吉凶成敗不可亂也大過何也棟橈莫輔大者過也先王之馭世也刑設而不犯罰著而不施習坎剛中惟以心亨王正其德公守厥職上下不疑臣主無惑納約自牖非戶何咎車騎中門劍戟在闥雖置叢棘凶已三歲上六失道刑決也故髙宗伐鬼方柔道中也三年有賞德乃豐也同人先號思其終也旅上之美樂其窮也是以失刑者嚴而不檢喪德者髙而不尊故君子正義以守位固法以威民何衢則亨滅耳而凶也小過何也踰位凌上害正危身小者過也既濟初六終亂何也水加日上三陰乘陽以力求濟不止必亡故初吉終亂也未濟上六飲酒無咎何也過而莫改危而弗間誰咎之也無妄何也無望而至非會合陰陽之違行也六三無妄之災或繫之牛行人得之邑人災何也有國而不收其民有衆而不修其器行人得之不亦災乎九五之疾勿藥何也非常之厚離以為同無妄之疾災以除凶天時成敗何疾之功勿藥有喜不成何試也龍者何也陽健之類盛德尊貴之喻也配天之厚盛德莫髙之謂尊貴大人受命處中當陽德之至也亢龍有悔何也繼守承貴有因而德不充者也欲大而不顧其小甘侈而不思其匱居正上位而無卑有貴勞而無據喪志危身是以悔也先王何也大人之功也故建萬國親諸侯樹其義也作樂薦上帝正其命也省方觀民施其令也明罰敕法督其政也閉關不行靜亂民也茂時育德應顯其福也亨帝立廟昭其祿也稱聖王所造非承平之謂也后者何也成君定位據業修制保教守法畜履治安者也故自然成功濟用已至大通后成天地之道以左右民也成化理決施令誥方因統紹衰中處將正之務非應初受命之事也上者何也日月相易盛衰相及致飾則利之未捷受故王后不稱君子不錯上以厚下道自然也君子者何也佐聖扶命翼教明法觀時而行有道而臣人者也因正德以理其義察危廢以守其身故經綸以正盈果行以遂義飲食以須時辨義以作事皆所以章先王之建國輔聖人之神志也見險慮難思患豫防别物居方愼初敬始皆人臣之行非大君之道也大人者何也龍德潛達貴賤通明有位無稱大以行之故大過滅示天下幽明大人發輝重光繼明照于四方萬物仰生合德天地不為而成故大人虎變天德興也君子曰易順天地序萬物方圓有正體四時有常位事業有所麗鳥獸有所萃故萬物莫不一也陰陽性生性故有剛柔剛柔情生情故有愛惡愛惡生得失得失生悔吝悔吝著而吉凶見八卦居方以正性蓍龜圓通以索情情性交而利害出故立仁義以定性取蓍龜以制情仁義有偶而禍福分是故聖人以建天下之位定尊卑之制序陰陽之適别剛柔之節順之者存逆之者亡得之者身安失之者身危故犯之以别求者雖吉必凶知之以守篤者雖窮必通故寂寞者德之主恣睢者賊之原進往者反之初終盡者始之根也是以未至不可坼也已用不可越也紂有天下之號而比匹夫之類郊周處小侯之細而享于西山之賔外內之德已施而貴賤之名未分何也天道未究善惡未淳也是以明夫天之道者不欲審乎人之德者不憂在上而不凌乎下處卑而不犯乎貴故道不可逆德不可拂也是以聖人獨立無悶大羣不益釋之而道存用之而不可既由此觀之易以通矣達莊論伊單閼之辰執除之歲萬物權輿之時季秋遙夜之月先生徘徊翺翔迎風而遊往遵乎赤水之上來登乎隱坌之丘臨乎曲轅之道顧乎泱漭之州恍然而止忽然而休不識曩之所以行今之所以留悵然而無樂愀然而歸白素焉平晝間居隱几而彈琴於是縉紳好事之徒相與聞之共議撰辭合句啓所當疑乃窺鑒整飭嚼齒先引推年躡踵相隨俱進奕奕然步䐱䐱然視投迹蹈階趨而翔至差肩而坐恭袖而檢猶豫相臨莫肯先占有一人是其中雄桀也乃怒目擊勢而大言曰吾生乎唐虞之後長乎文武之裔遊乎成康之隆盛乎今者之世誦乎六經之教習乎吾儒之迹被裒衣冠飛翮垂曲裙揚雙鶂有日矣而未聞乎至道之要有以異之於斯乎且大人稱之細人承之願聞至教以發其疑先生曰何哉子之所疑者客曰天道貴生地道貴貞聖人修之以建其名吉凶有分是非有經務利髙勢惡死重生故天下安而大功成也今莊周乃齊禍福而一死生以天地為一物以萬類為一指無乃激惑以失真而自以為誠是也於是先王乃撫琴容與慨然而歎俯而微笑仰而流盼噓吸精神言其所見曰昔人有欲觀於閬峰之上者資端冕服驊驑至乎崑崙之下沒而不反端冕者常服之飾驊驑者凡乘之耳非所以矯騰增城之上遊玄圃之中也且燭龍之光不照一堂之上鐘山之口不談曲室之內今吾將墮崔巍之髙杜衍謾之流言子之所由幾其寤而獲及乎天地生於自然萬物生於天地自然者無外故天地名焉天地者有內故萬物生焉當其無外誰謂異乎當其有內誰謂殊乎地流其燥天抗其溼月東出日西入隨以相從解而後合升謂之陽降謂之陰在地謂之理在天謂之文蒸謂之雨散謂之風炎謂之火凝謂之氷形謂之石象謂之星朔謂之朝晦謂之冥通謂之川回謂之淵平謂之土積謂之山男女同位山澤通氣雷風不相射水火不相薄天地合其德日月順其光自然一體則萬物經其常入謂之幽出謂之章一氣盛衰變化而不傷是以重陰雷電非異出也天地日月非殊物也故曰自其異者視之則肝膽楚越也自其同者視之則萬物一體也人生天地之中體自然之形身者陰陽之精氣也性者五行之正性也情者遊魂之變欲也神者天地之所以馭者也以生言之則物無不壽推之以死則物無不夭自小視之則萬物莫不小由大觀之則萬物莫不大殤子為壽彭祖為夭秋毫為大泰山為小故以死生為一貫是非為一條也别而言之則鬚睂異名合而説之則體之一毛也彼六經之言分處之教也莊周之云致意之辭也大而臨之則至極無外小而理之則物有其制夫守什五之數審左右之名一曲之説也循自然性天地者寥廓之談也凡耳目之官名分之施處官不易司舉奉其身非以絶手足裂肢體也然後世之好異者不顧其本各言我而已矣何待於彼殘生害性還為讎敵斷割肢體不以為痛目視色而不顧耳之所聞耳所聽而不待心之所思心奔欲而不適性之所安故疾疢萌則生意盡禍亂作則萬物殘矣至人者恬於生而靜於死生恬則情不惑死靜則神不離故能與陰陽化而不易從天地變而不移生究其壽死循其宜心氣平治消息不虧是以廣成子處􅀢洞之山以入無窮之門軒轅登崑崙之阜而遺玄珠之根此則潛身者易以為活而離本者難以永存也馮夷不遇海若則不以已為小雲將不失於鴻濛則無以知其少由斯言之自是者不章自建者不立守其有者有據持其無者無執月弦則滿日朝則襲咸池不留陽谷之上而懸車之後將入也故求得者喪爭明者失無欲者自足空虛者受實夫山靜而谷深者自然之道也得之道而正者君子之實也是以作智造巧者害於物明著是非者危其身修飾以顯潔者惑於生畏死而榮生者失其真故自然之理不得作天地不泰而日月爭隨朝夕失期而晝夜無分競逐趨利舛倚橫馳父子不合君臣乖離故復言以求信者梁下之誠也克已以為人者郭外之仁也竊其雉經者亡家之子也刳腹割肌者亂國之臣也曜菁華被沆瀣者昏世之士也履霜露蒙塵埃者貪冒之民也潔已以尤世修身以明汙者誹謗之屬也繁稱是非背質追文者迷罔之倫也成非媚悅以容求孚故被珠玉以赴水火者桀紂之終也含菽采薇交餓而死顔夷之窮也是以名利之塗開則忠信之誠薄是非之辭著則醇厚之情爍也故至道之極混一不分同為一體得失無聞伏羲氏結繩神農教耕逆之者死順之者生又安知貪汙之為罰而貞白之為名乎使至德之要無外而已大均淳固不貮其紀清淨寂寞空豁以俟善惡莫之分是非無所爭故萬物反其所而得其情也儒墨之後堅白並起吉凶連物得失在心結徒聚黨辨説相侵昔大齊之雄三晉之士嘗相與瞋目張膽分别此矣咸以為百年之生難致而日月之蹉無常皆盛僕馬修衣裳美珠玉飭帷墻出媚君上入欺父兄矯厲才智競逐縱橫家以慧子殘國以才臣亡故不終其天年而大自割繫其於世俗也是以山中之木本大而莫相吹萬數竅相和忽焉自已夫鴈之不存無其質而濁其文死生無變而龜之見寶知吉凶也故至人清其質而濁其文死生無變而未始有云夫别言者壞道之談也折辨者毁德之端也氣分者一身之疾也二心者萬物之患也故夫裝束馮軾者行以離支慮在成敗者坐而求敵踰阻攻險者趙氏之人也舉山填海者燕楚之人也莊周見其若此故𫐠道德之妙敘無為之本寓言以廣之假物以延之聊以娛無為之心而逍遙於一世豈將以希咸陽之門而與稷下爭辨也哉夫善接人者導焉而已無所逆之故公孟季子衣繡而見墨子弗攻中山子牟心在魏闕而詹子不距因其所以來用其所以至循而泰之使自居之發而開之使自舒之且莊周之書何足道哉猶未聞夫太始之論玄古之微言乎直能不害於物而形以生物無所毁而神以清形神在我而道德成忠信不離而上下平兹客今談而同古齊説而意殊是心能守其本而口發不相須也於是二三子者風搖波蕩相視䐱脈亂次而退􅀈跌失迹隨而望之耳後頗亦以是知其無實喪氣而慙愧於衰僻也通老論聖人明於天人之理達於自然之分通於治化之體審於大愼之訓故君臣垂拱完太素之朴百姓熙怡保性命之和道者法自然而為化侯王能守之萬物將自化易謂之太極春秋謂之元老子謂之道三皇依道五帝仗德三王施仁五霸行義強國任智蓋優劣之異薄厚之降也傳大人先生傳大人先生蓋老人也不知姓字陳天地之始言神農黃帝之事昭然也莫知其生年之數嘗居蘇門之山故世或謂之間養性延壽與自然齊光其視堯舜之所事若手中耳以萬里為一步以千歲為一朝行不赴而居不處求乎大道而無所寓先生以應變順和天地為家運去勢隤魁然獨存自以為能足與造化推移故默探道德不與世同自好者非之無識者怪之不知其變化神微也而先生不以世之非怪而易其務也先生以為中區之在天下曾不若蠅蚊之著帷故終不以為事而極意乎異方竒域遊鑒觀樂非世所見徘徊無所終極遺其書於蘇門之山而去天下莫知其所如往也或遺大人先生書曰天下之貴莫貴於君子服有常色貌有常則言有常度行有常式立則磬折拱若抱鼓動靜有節趨步商羽進退周旋咸有規矩心若懷氷戰戰栗栗束身修行日愼一日擇地而行唯恐遺失誦周禮之遺訓歎唐虞之道德唯法是修唯禮是克手執圭璧足履繩墨行欲為目前檢言欲為無窮則少稱鄉閭長聞邦國上欲圖三公下不失九州牧故挾金玉垂文組享尊位取茅土揚聲名於後世齊功德於往古奉事君上牧養百姓退營私家育長妻子卜吉宅慮乃億祉逺禍近福永堅固已此誠士君子之髙致古今不易之美行也今先生乃被髮而居巨海之中與若君子者逺吾恐世之歎先生而非之也行為世所笑身無由自達則可謂耻辱矣身處困苦之地而行為世俗之所笑吾為先生不取也於是大人先生乃逌然而歎假雲霓而應之曰若之云尚何通哉夫大人者乃與造物同體天地並生逍遙浮世與道俱成變化散聚不常其形天地制域於內而浮明開達於外天地之永固非世俗之所及也吾將為汝言之往者天嘗在下地嘗在上反覆顚倒未之安固焉得不失度式而常之天因地動山陷川起雲散震壞六合失理汝又焉得擇地而行趨步商羽往者羣氣爭存萬物死慮支體不從身為泥土根拔枝殊咸失其所汝又焉得束身修行磬折抱鼓李牧功而身死伯宗忠而世絶進求利以喪身營爵賞而家滅汝又焉得挾金玉萬億祗奉君上而全妻子乎且汝獨不見夫虱之處於禈中逃乎深縫匿乎壞絮自以為吉宅也行不敢離縫際動不敢出禈襠自以為得繩墨也飢則囓人自以為無窮食也然炎丘火流焦邑滅都羣虱死於禈中而不能出汝君子之處區內亦何異夫虱之處禈中乎悲夫而乃自以為逺禍近福堅無窮已亦觀夫陽鳥遊於塵外而鷦鷯戲於蓬艾小大固不相及汝又何以為若君子聞於豫乎且近者夏喪於商周播之劉耿薄為墟豐鎬成丘至人來一顧而世代相酬厥居未定他人已有汝之茅土將誰與久是以至人不處而居不修而治日月為正陰陽為期豈吝情乎世繫纍於一時來東雲駕西風與陰守雌據陽為雄志得欲從物莫之窮又何不能自達而畏夫世笑哉昔者天地開闢萬物並生大者恬其性細者靜其形陰藏其氣陽發其精害無所避利無所爭放之不失收之不盈亡不為夭存不為壽福無所得禍無所咎各從其命以度相守明者不以智勝暗者不以愚敗弱者不以迫畏強者不以力盡蓋無君而庶物定無臣而萬事理保身修性不違其紀惟兹若然故能長久今汝造音以亂聲作色以詭形外易其貌內隱其情懷欲以求多詐偽以要名君立而虐興臣設而賊生坐制禮法束縛下民欺愚誑拙藏智自神強者睽眠而凌暴弱者憔悴而事人假廉以成貪內險而外仁罪至不悔過幸遇則自矜馳此以奏除故循滯而不振夫無貴則賤者不怨無富則貧者不爭各足於身而無所求也恩澤無所歸則死敗無所仇竒聲不作則耳不易聽淫色不顯則目不改視耳目不相易改則無以亂其神矣此先世之所至止也今汝尊賢以相髙競能以相尚爭勢以相君寵貴以相加驅天下以趣之此所以上下相殘也竭天地萬物之至以奉聲色無窮之欲此非所以養百姓也於是懼民之知其然故重賞以喜之嚴刑以威之財匱而賞不供刑盡而罰不行乃始有亡國戮君潰敗之禍此非汝君子之為乎汝君子之禮法誠天下殘賊亂危死亡之術耳而乃目以為美行不易之道不亦過乎今吾乃飄颻於天地之外與造化為友朝餐湯谷夕飲西海將變化遷易與道周始此之於萬物豈不厚哉故不通於自然者不足以言道暗於昭昭者不足與達明子之謂也先王既申若言天下之喜竒者異之慷愾者髙之其不知其體不見其情猜耳其道虛偽之名莫識其真弗達其情雖異而髙之與嚮之非怪者蔑如也至人者不知乃貴不見乃神神貴之道存乎內而萬物運於外矣故天下終而不知其用也逌乎有宗扶搖之野有隱士焉見之而喜自以為均志同行也曰善哉吾得之見而舒憤也上古質朴淳厚之道已廢而未枝遺華並興豺虎貪虐羣物無辜以害為利殞性亡軀吾不忍見也故去而處兹人不可與為儔不若與木石為鄰安期逃乎蓬山角李潛乎丹水鮑焦立以枯稿萊維去而逌死亦由兹夫吾將抗志顯髙遂終於斯禽生而獸死埋形而遺骨不復反余之生乎夫志均者相求好合者齊顔與夫子同之於是先生乃舒虹霓以蕃塵傾雪蓋以蔽明倚瑶廂而徘徊總衆轡而安行顧而謂之曰泰初真人唯大之根専氣一志萬物以存退不見後進不覩先發西北而造制啓東南以為門微道而以德久娛樂跨天地而處尊夫然成吾體也是以不避物而處所覩則寧不以物為纍所逌則成倣徉足以舒其意浮騰足以逞其情故至人無宅天地為客至人無主天地為所至人無事天地為故無是非之别無善惡之異故天下被其澤而萬物所以熾也若夫惡彼而好我自是而非人忿激以爭求貴志而賤身伊禽生而獸死尚何顯而獲榮悲夫子之用心也薄安利以忘生要求名以喪體誠與彼其無詭何枯稿而逌死子之所好何足言哉吾將去子矣乃揚睂而蕩目振袖而撫裳今緩轡而縱策遂風起而雲翔彼人者瞻之而垂泣自痛其志衣草木之皮伏于巖石之下懼不終夕而死先生過神宫而息潄吳泉而行回乎逌而遊覽焉見薪於阜者歎曰汝將焉以是終乎哉薪者曰是終我乎不以是終我乎且聖人無懷何其哀夫盛衰變化常不于兹藏器於身伏以俟時孫刖足以擒龎睢折脅而乃休百里困而相嬴牙既老而弼周既顚倒而更來兮固先窮而後收秦破六國并兼其地夷滅諸侯南面稱帝姱盛色崇靡麗鑿南山以為關表東海以為門門萬室而不絶圖無窮而永存美宫室而盈帷㡩擊鐘鼓而揚其章廣苑囿而深池沼興渭北而建咸陽欐木曽未及成林而荆棘已藂乎阿房時代存而迭處故先得而後亡山東之徒虜遂起而王天下由此視之窮達詎可知耶且聖人以道德為心不以富貴為志以無為用不以人物為事尊顯不加重貧賤不自輕失不自以為辱得不自以為榮木根挺而枝逺葉繁茂而華零無窮之死猶一朝之生身之多少又何足營因歎而歌曰日沒不周方月出丹淵中陽精蔽不見陰光代為雄亭亭在須臾厭厭將復東離合雲霧兮往來如飄風富貴俯仰間貧賤何必終留侯起亡虜威武赫夷荒召平封東陵一旦為布衣枝葉托根柢死生同盛衰得志從命升失勢與時隤寒暑代征邁變化更相推禍福無常主何憂身無歸推兹由斯理負薪又何哀先生聞之笑曰雖不及大庶免小矣乃歌曰天地解兮六合開星辰霣兮日月隤我騰而上將何懷衣弗襲而服美佩弗飾而自章上下徘徊兮誰識吾常遂去而遐浮肆雲輿興氣蓋徜徉回翔兮漭漾之外建長星以為旗兮擊雷霆之􅮥礚開不周而出車兮步九野之夷泰坐中州而一顧兮望崇山而回邁端余節而飛旃兮縱心慮乎荒裔釋前者而弗修兮馳蒙間而逺逌棄世務之衆為兮何細事之足賴虛形體而輕舉兮精微妙而神豐命夷羿使寬日兮召欣來使緩風攀扶桑之長枝兮登扶搖之隆崇躍潛飄之冥昧兮洗光曜之昭明遺衣裳而弗服兮服雲氣而遂行朝造駕乎湯谷兮夕息馬乎長泉時􅛇􅀢而易氣兮輝若華以照冥左朱陽以舉麾兮右玄陰以建旗變客飾而改度遂騰竊以修征陰陽更而代邁四時奔而相逌惟仙化之倐忽兮心不樂乎久留驚風奮而遺樂兮雖雲起而忘憂忽電消而神逌兮歷寥廓而遐遊佩日月以舒光兮登徜徉而上浮壓前進于彼逌兮將步足乎虛州掃紫宫而陳席兮坐帝室而忽會酬萃衆音而奏樂兮聲驚渺而悠悠五帝舞而再屬兮六神歌而代周樂啾啾肅肅洞心達神超遙遙茫茫心往而忘反慮大而志矜粵大人微而弗復兮揚雲氣而上陳召大幽之玉女兮接上王之美人體雲氣之逌暢兮服太清之淑真合歡情而微授兮先艷溢其若神華姿燁以俱發兮采色煥其並振傾玄髦而垂鬢兮曜紅顔而自新時曖曃而將逝兮風飄颻而振衣雲氣解而霧離兮靄奔散而永歸心惝惘而遙思兮眇回目而弗睎揚清風以為旟兮翼旋軫而反衍騰炎陽而出疆分命祝融而使遣驅玄冥以攝堅兮蓐收秉而先戈勾芒奉轂浮驚朝霞寥廓茫茫而靡都兮邈無儔而獨立倚瑶廂而一顧兮哀下土之憔悴分是非以為行兮又何足與比類霓旌飄兮雲旗靄樂遊兮出天外大人先生被髮飛鬢衣方離之衣繞紱陽之帶含竒芝嚼甘華吸浮霧餐霄霞興朝雲揚春風奮乎太極之東遊乎崑崙之西遺轡隤䇿流盼乎唐虞之都惘然而思悵爾若忘慨然而歎曰嗚呼時不若歲歲不若天天不若道道不若神神者自然之根也彼勾勾者自以為貴夫世矣而惡知夫世之賤乎兹哉故與世爭貴貴不足尊與世爭富富不足先必超世而絶羣遺俗而獨往登乎太始之前覽乎沕漠之初慮周流於無外志浩蕩而自舒飄颻於四運翻翺翔乎八隅欲從肆而倣佛滉漾而靡拘細行不足以為毁聖賢不足以為譽變化移易與神明扶廓無外以為宅周宇宙以為廬強八維而處安據制物以永居夫如是則可謂富貴矣是故不與堯舜齊德不與湯武並功王許不足以為匹陽丘豈能與比縱天地且不能越其壽廣成子曽何足與並容激八風以揚聲躡元吉之髙蹤被九天以開除兮來雲氣以馭飛龍專上下以制統兮殊古今而靡同夫世之名利胡足以纍之哉故提齊而踧楚挈趙而蹈秦不滿一朝而天下無人東西南北莫之與鄰悲夫子之修飾以余觀之將焉存乎於兹先王乃去之紛泱莽軌沕洋㳅衍溢厯度重淵跨青天顧而逌覽焉則有逍遙以永年無存忽合散而上臻霍分離蕩漾漾洋洋飈涌雲浮達於搖光直馳騖乎太初之中而休息乎無為之宫太初何如無後無先莫究其極誰識其根邈渺綿綿乃反復乎大道之所存莫暢其究誰曉其根辟九靈而九索曾何足以自隆登其萬天而通觀浴大始之和風􅞎逍遙以逺逌遵大路之無窮遺太乙而弗使陵天地而徑行超濛鴻而逺迹左蕩莽而無涯右幽悠而無方上遙聽而無聲下修視而無章施無有而宅神永太清乎敖翔崔巍髙山勃玄雲朔風橫厲白雪紛積水若陵寒傷人陰陽失位日月隤地坼石裂林木摧火冷陽凝寒傷懷陽和微弱隆陰竭海凍不流綿絮折呼吸不通寒傷裂氣并代動變如神寒倡熱隨害傷人熙與真人懷太清精神専一用意平寒暑勿傷莫不驚憂患靡由素氣寧浮霧凌天恣所經往來微妙路無傾好樂非世又何爭人且皆死我獨生真人遊駕八龍曜日月載雲旗徘徊逌樂所之真人遊太階夷原辟天門開雨濛濛風􅂒􅂒登黃山出栖遲江河清洛無埃雲氣消真人來真人來唯樂哉時世易好樂隤真人去與天回反未央延年壽獨敖世望我何時反趈漫漫路日逺先生從此去矣天下莫知其所終極蓋陵天地而與浮明遨遊無始終自然之至真也鸜鵒不踰濟貉不渡汶世之常人亦由此矣曾不通區域又况四海之表天地之外哉若先生者以天地為卵耳如小物細人欲論其長短議其是非豈不哀也哉贊老子贊陰陽不測變化無倫飄颻太素歸虗反真誄孔子誄養徒三千升堂七十潛神演思因使作書考混元於無形本造化於太初帖搏赤猿帖㒒不想歘爾夢搏赤猿其力甚于貔虎良久反覆余乃觀天背地覩穹亦當不爽但僕之不達安得不憂吉乎報我凶乎詳告三月阮籍白繇君文弔某公文沈漸荼酷仁義同違如何不弔玉碎氷摧詩詩品云阮籍詩其源出於小雅無雕蟲之功而詠懷之作可以陶性靈發幽思言在耳目之內情寄八荒之表洋洋乎會於風雅使人忘其鄙近自致逺大頗多感慨之詞厥旨淵放歸趣難求顔延之注解怯言其志詩譜云天識清虗禮法疏短竹林詩評云阮籍之作如剡溪雪夜孤楫沿流乘興而來興盡而已嚴滄浪云黃初之後惟阮籍詠懷之作極為髙古有建安風骨藝苑巵言云阮公詠懷逺近之間遇境即際興窮即止坐不著論宗佳耳人乃謂陳子昻勝之何必子昂寧無感興乎哉詠懷詩三首天地絪緼元精代序清陽曜靈和風容與明月映天甘露被宇蓊鬱髙松猗那長楚草蟲哀鳴鶬鶊振羽感時興思企首延佇於赫帝朝伊衡作輔才非允文器非經武適彼沅湘託分漁父優哉遊哉爰居爰處其二月明星稀天髙氣寒桂旗翠旌佩玉鳴鸞濯纓醴泉被服蕙蘭思從二女適彼湘沅靈幽聽微誰觀玉顔灼灼春華緑葉含丹日月逝矣惜爾華繁其三清風肅肅修夜漫漫嘯歌傷懷獨寐寤言臨觴拊膺對食忘餐世無萱草令我哀嘆鳴鳥求友谷風刺愆重華登庸帝命凱元鮑子傾蓋仲父佐桓回濵嗟虞敢不希顔志存明規匪慕彈冠我心伊何其芳若蘭詠懷八十二首顔延年云阮公身事亂朝常恐遇禍因兹詠懷雖志在譏刺而文多隱避百代之下難以情測故粗明大意略其幽旨也詩紀云阮集傳之既久頗存訛闕校録者往往肆為補綴作者之旨淆亂甚焉今以諸本恭校其義稍優夜中不能寐起坐彈鳴琴薄帷鑒明月清風吹我襟孤鴻號外野翔鳥鳴北林徘徊將何見憂思獨傷心其二二妃遊江濵逍遙順風翔交甫懷環珮婉孌有芬芳猗靡情歡愛千載不相忘傾城迷下蔡容好結中腸感激生憂思萱草樹蘭房膏沐為誰施其雨怨朝陽如何金石交一旦更離傷其三嘉樹下成蹊東園桃與李秋風吹飛藿零落從此始繁華有憔悴堂上生荆把驅馬舍之去去上西山趾一身不自保何况戀妻子凝霜被野草歲暮亦云已其四天馬出西北由來從東道春秋非有託富貴焉常保清露被臯蘭凝霜霑野草朝為媚少年夕暮成醜老自非王子晉誰能常美好媚五臣作美其五平生少年時輕薄好絃歌西遊咸陽中趙李相經過娛樂未終極白日忽蹉跎驅馬復來歸反顧望三河黃金百鎰盡資用常苦多北臨太行道失路將如何丹鉛餘録云阮籍詠懷詩西遊咸陽市趙李相經過顔延年以為趙飛燕李夫人劉會孟謂安知非實有此人不必求其誰何也不詳詩意咸陽趙李謂遊俠近侍之儔漢谷永傳小臣趙李從微賤貴寵成帝常與微行籍用趙李字正出此若如顔延年之説趙飛燕李夫人豈可言經過如劉會孟言當時實有此人唐王維詩亦有日夜經過趙李家豈唐時亦實有此人乎乃知讀書不詳考深思雖如延年之博學會孟之精鑒亦不免失之况下此者耶詩話補遺云按漢書乃趙季李欵其六昔聞東陵瓜近在青門外連畛距阡陌子母相鈎帶五色曜朝日嘉賔四面會膏火自煎熬多財為患害布衣可終身寵祿豈足賴其七炎暑惟兹夏三旬將欲移芳樹垂緑葉青雲自逶迤四時更代謝日月遞參差徘徊空堂上忉怛莫我知願覩卒歡好不見悲别離參差一作差馳其八灼灼西隤日餘光照我衣回風吹四壁寒鳥相因依周周尚銜羽蛩蛩亦念飢如何當路子磬折忘所歸豈為夸譽名憔悴使心悲寧與燕雀翔不隨黃鵠飛黃鵠遊四海中路將安歸譽一作與其九步出上東門北望首陽岑下有采薇士上有嘉樹林良辰在何許凝霜霑衣襟寒風振山岡玄雲起重陰鳴鴈飛南征鶗鴂發哀音素質遊商聲悽悽傷我心其十北里多竒舞濮上有微音輕薄間遊子俯仰乍浮沈捷徑從狹路僶俯趨荒淫焉見王子喬乘雲翔鄧林獨有延年術可以慰我心以五臣作用其十一湛湛長江水上有楓樹林臯蘭被徑路青驪逝駸駸逺望令人悲春氣感我心三楚多秀士朝雲進荒淫朱華振芬芳髙蔡相追尋一為黃雀哀淚下誰能禁其十二昔日繁華子安陵與龍陽夭夭桃李花灼灼有輝光悅懌若九春磬折似秋霜流盼發姿媚言笑吐芬芳携手等歡愛宿昔同衣裳願為雙飛鳥比翼共翺翔丹青著明誓永世不相忘其十三登髙臨四野北望青山阿松柏翳岡岑飛鳥鳴相過感慨懷辛酸怨毒常苦多李公悲東門蘇子狹三河求仁自得仁豈復歎咨嗟其十四開秋兆涼氣蟋蟀鳴牀帷感物懷殷憂悄悄令心悲多言焉所告繁辭將訴誰微風吹羅𬒮明月耀清暉晨雞鳴髙樹命駕起旋歸其十五昔年十四五志尚好詩書被褐懷珠玉顔閔相與期開軒臨四野登髙望所思丘墓蔽山岡萬代同一時千秋萬歲後榮名安所之乃悟羡門子噭噭令自蚩其十六徘徊蓬池上還顧望大梁緑水揚洪波曠野莾茫茫走獸交橫馳飛鳥相隨翔是時鶉火中日月正相望朔風厲嚴寒陰氣下微霜羇旅無儔匹俯仰懷哀傷小人計其功君子道其常豈惜終憔悴詠言著斯章其十七獨坐空堂上誰可與歡者出門臨永路不見行車馬登髙望九州悠悠分曠野孤鳥西北飛離獸東南下日暮思親友晤言用自寫其十八懸車在西南羲和將欲傾流光耀四海忽忽至夕冥朝為咸池暉濛汜受其榮豈知窮達士一死不再生視彼桃李花誰能久熒熒君子在何許曠世未合并瞻仰景山松可以慰吾情知集作放曠世一作嘆息其十九西方有佳人皎若白日光被服纎羅衣左右珮雙璜修容耀姿美順風振微芳登髙眺所思舉袂當朝陽寄顔雲霄間揮袖凌虗翔飄颻恍惚中流眄顧我傍悅懌未交接晤言用感傷當集作向其二十楊朱泣岐路墨子悲染絲揖讓長離别飄颻難與期豈徒燕婉情存亡誠有之蕭索人所悲禍釁不可辭趙女媚中山謙柔愈見欺嗟嗟塗上士何用自保持其二十一於心懷寸陰羲陽將欲冥揮袂撫長劍仰觀浮雲征雲間有玄鶴抗志揚哀聲一飛沖青天曠世不再鳴豈與鶉鷃遊連翩戲中庭京師曹氏家藏阮步兵詩一卷唐人所書與世所傳多異其一篇云放心懷寸陰羲和將欲冥揮𬒮撫長劍仰觀浮雲行雲間有立鵠抗首揚哀聲一飛沖青天疆世不再鳴安與鶉鷃徒翩翩戲中庭孔宗翰亦有本與此多同其二十二夏后乘靈輿夸父為鄧林存亡從變化日月有浮沈鳯凰鳴參差伶倫發其音王子好簫管世世相追尋誰言不可見青鳥明我心其二十三東南有射山汾水出其陽六龍服氣輿雲蓋切天綱仙者四五人逍遙晏蘭芳寢息一純和呼吸成露霜沐浴丹淵中照耀日月光豈安通靈臺遊漾去髙翔切一作覆通集作邇其二十四殷憂令志結怵惕常若驚逍遙未終宴朱華忽西傾蟋蟀在戶牖蟪蛄號中庭心腸未相好誰云亮我情願為雲間鳥千里一哀鳴三芝延瀛洲逺遊可長生其二十五拔劍臨白刃安能相中傷但畏工言子稱我三江旁飛泉流玉山懸車棲扶桑日月徑千里素風發微霜勢路有窮達咨嗟安可長勢外編作世其二十六朝登洪坡顚日久望西山荆棘被原野羣鳥飛翩翩鸞鷖時棲宿性命有自然建木譙能近射干復嬋娟不見林中葛延蔓相勾連時集作特其二十七周鄭天下交街術當三河妖冶間都子煥耀何芬葩玄髮發朱顔睇眄有光華傾城思一顧遺視來相誇願為三春遊朝陽忽蹉跎盛衰在須臾離别將如何發一作照誇初學作周其二十八若花耀西海扶桑翳瀛洲日月經天塗明暗不相讐窮達自有常得失又何求豈效路上童携手共遨遊陰陽有變化誰云沈不浮朱鱉躍飛泉夜飛過吳洲俯仰運天地再撫四海流繫纍名利場駑駿同一輈豈若遺耳目升遐去殷憂花一作木西一作四讐集作侔其二十九昔余遊大梁登于黃華顚共工宅玄冥髙臺造青天幽荒邈悠悠悽悽懷所憐所憐者誰子明察自照妍應龍沈冀州妖女不得眠肆侈陵世俗豈云永厥年自照妍一作應自然侈一作佞沈詩話補遺云阮籍詩昔余遊大梁登于黃華顚應龍冀州妖女不得眠按戰國䇿趙武靈西至河登黃華之上夢處女鼓琴歌詩因納吳廣女娃嬴孟姚其先七世而兆于簡子之夢及入宫而奪嫡亂國豈非妖女乎張平子應問曰女魃兆而應龍翔合而觀之可見其微意蓋當是時魏明帝郭后毛后妬寵相殺正類武靈王事故隱語怪説亦春秋定哀多微辭意也其三十驅車出門去意欲逺征行征行安所如背棄夸與名夸名不在已但願適中情單帷蔽皎日髙榭隔微聲讒邪使交疏浮雲令晝𡨕嬿婉同衣裳一顧傾人城從容在一時繁華不再榮晨朝奄復暮不見所歡形黃鳥東南飛寄言謝友生其三十一駕言發魏都南向望吹臺簫管有遺音梁王安在哉戰士食糟粳賢者處蒿萊歌舞曲未終秦兵已復來夾林非吾有朱宫生塵埃軍敗華陽下身竟為土灰世説新語云桓玄西下入石頭外白司馬梁王奔叛時事形已濟哉在平乘上笳鼓並作直髙詠云簫管有遺音梁王安在文昌雜録云東京記天清寺繁臺梁孝王按歌吹之臺阮公詩云駕言發魏都南向望吹臺簫管有餘晉梁王安在哉後有繁氏居其側里人呼為繁臺其三十二朝陽不再盛白日忽西幽去此若俯仰如何似九秋人生若塵露天道邈悠悠齊景升丘山涕泗紛交流孔聖臨長川惜逝忽若浮去者余不及來者吾不留願登太華山上與松子遊漁父知世患乘流泛輕舟其三十三一日復一夕一夕復一朝顔色改平常精神自損消胸中懷湯火變化故相招萬事無窮極知謀苦不饒但恐須臾間魂氣隨風飄終身履薄氷誰知我心焦極一作理其三十四一日復一朝一昏復一晨容色改平常精神自飄淪臨觴多哀楚思我故時人對酒不能言悽愴懷酸辛願耕東臯陽誰與守其真愁苦在一時髙行傷微身曲直何所為龍蛇為我鄰其三十五世務何繽紛人道苦不遑壯年以時逝朝露待太陽願攬羲和轡白日不移光天階路殊絶雲漢邈無梁濯髮暘谷濵逺遊崑嶽傍登彼列仙岨採此秋蘭芳時路烏足爭太極可翺翔其三十六誰言萬事囏逍遙可終生臨堂翳華樹悠悠念無形倣徨思親友倐忽復至冥寄言東飛鳥可用慰我情其三十七嘉時在今辰零雨灑塵埃臨路望所思日夕復不來人情有感慨蕩漾焉能排揮涕懷哀傷辛酸誰語哉其三十八炎光延萬里洪川蕩湍瀨彎弓挂扶桑長劍倚天外泰山成砥礪黃河為裳帶視彼莊周子榮枯何足賴捐身棄中野烏鳶作患害豈若雄傑士功名從此大其三十九壯士何慷慨志欲威八荒驅車逺行役受命念自忘良弓挾烏號明甲有精光臨難不顧生身死魂飛揚豈為全軀士效命爭戰場忠為百世榮義使令名彰垂聲謝後世氣節故有常其四十混元生兩儀四象運衡璣曒日布炎精素月垂景暉晷度有昭回哀哉人命微飄若風塵逝忽若慶雲晞修齡適余願光寵非已威安期步天路松子與世違焉得凌霄翼飄颻登雲湄嗟哉尼父志何為居九夷其四十一天網彌四野六翮掩不舒隨波紛綸客泛泛若浮鳬生命無期度朝夕有不虞列仙停修齡養志在沖虗飄颻雲日間邈與世路殊榮名非已寶聲色焉足娛採藥無旋返神仙志不符逼此良可惑令我久躊躇客集作落浮鳬一作鳬鷖其四十二王業須良輔建功俟英雄元凱康哉美多士頌聲隆陰陽有舛錯日月不常融天時有否泰人事多盈沖園綺遁南嶽伯陽隱西戎保身念道真寵耀焉足崇人誰不善始鮮能尅厥終休哉上世士萬載垂清風其四十三鴻鵠相隨飛飛飛適荒裔雙翮臨長風須臾萬里逝朝餐琅玕實夕宿丹山際抗身青雲中網羅孰能制豈與鄉曲士携手共言誓從藝文定正其四十四儔物終始殊修短各異方琅玕生髙山芝英耀朱堂熒熒桃李花成蹊將夭傷焉敢希千術三春表微光自非凌風樹憔悴烏有常烏一作要其四十五幽蘭不可珮朱草為誰榮修竹隱山陰射干臨增城葛藟延幽谷綿綿瓜瓞生樂極消靈神哀深傷人情竟知憂無益豈若歸太清其四十六鸒鳩飛桑榆海鳥運天池豈不識宏大羽翼不相宜招搖安可翔不若棲樹枝下集蓬艾間上遊園圃籬但爾亦自足用子為追隨此首藝文類聚所載與今本不同而義意近優觀李善文選注江文通擬詠懷詩所引與藝文同亦一證也今從藝文定正其四十七生命辰安在憂戚涕沾襟髙鳥翔山岡燕雀棲下林青雲蔽前庭素琴悽我心崇山有鳴鶴豈可相追尋其四十八鳴鳩嬉庭樹焦明遊浮雲焉見孤翔鳥翩翩無匹羣死生自然理消散何繽紛漢魏詩集合前為一首其四十九步遊三衢旁惆悵念所思豈為今朝見恍惚誠有之澤中生喬松萬世未可期髙鳥摩天飛凌雲共遊嬉豈有孤行士垂涕悲故時未一作安其五十清露為凝霜華草成蒿萊誰云君子賢明逹安可能乘雲招松喬呼吸永矣哉其五十一丹心失恩澤重德喪所宜善言焉可長慈惠未易施不見南飛燕羽翼正差池髙子怨新詩三閭悼乖離何為混沌氏倐忽體貌隳其五十二十日出暘谷彌節馳萬里經天耀四海倐忽濳濛汜誰言焱炎久遊沒何行俟逝者豈長生亦去荆與杞千載猶崇朝一餐聊自已是非得失間焉足相譏理計利知術窮哀情遽能止聊自已一作百金子遽一作克其五十三自然有成理生死道無常智巧萬端出大要不易方如何夸毗子作色懷驕腸乘軒驅良馬憑几向膏粱被服纎羅衣深榭設間房不見日夕華翩翩飛路傍其五十四夸談快憤悶情慵發煩心西北登不周東南望鄧林曠野彌九州崇山抗髙岑一餐度萬世千歲再浮沈誰云玉石同淚下不可禁情一作惰其五十五人言願延年延年欲焉之黃鵠呼子安千秋未可期獨坐山嵓中惻愴懷所思王子一何好猗靡相携持悅懌猶今辰計校在一時置此明朝事日夕將見欺今本作濳見安能處山巖在一時置此明朝事日夕將見欺其五十六貴賤在天命窮達在一時婉孌佞邪子隨利來相欺孤思損惠施但為讒夫蚩鶺鴒鳴雲中載飛靡所期焉知傾側士一旦不可持其五十七驚風振四野回雲蔭堂隅牀帷為誰設几杖為誰扶雖非明君子豈暗桑與榆世有此聾隤芒芒將焉如翩翩從風飛悠悠去故居離麾玉山下遺棄毁與譽其五十八危冠切浮雲長劍出天外細故何足慮髙度跨一世非子為我御逍遙遊荒裔顧謝西王母吾將從此逝豈與蓬戶士彈琴誦言誓其五十九河上有丈人緯蕭棄明珠甘彼藜藿食樂是蓬蒿廬豈效繽紛子良馬騁龍輿朝生衢路旁夕瘞橫術隅歡笑不終宴俯仰復欷歔鑒兹二三者憤悶從此舒其六十儒者通六藝立志不可干違禮不為動非法不肯言渴飲清泉流飢食并一簞歲時無以祀衣服常苦寒屣履詠南風緼袍笑華軒信道守詩書義不受一餐烈烈褒貶辭老氏用長歎藝一作義并一作甘其六十一少年學擊刺妙伎過曲城英風截雲霓超世發竒聲揮劍臨沙漠飲馬九野坰旗幟何翩翩但聞金鼓鳴軍旅令人悲烈烈有哀情念我平常時悔恨從此生刺集作劍其六十二平晝整衣冠思見客與賔賔客者誰子倐忽若飛塵裳衣佩雲氣言語究靈神須臾相背棄何時見斯人其六十三多慮令志散寂寞使心憂翺翔觀陂澤撫劍登輕舟但願長間暇後歲復來遊陂一作彼其六十四朝出上東門遙望首陽基松柏鬱森沈鸝黃相與嬉逍遙九曲間徘徊欲何之念我平居時鬱然思妖姬其六十五王子十五年遊衍伊洛濵朱顔茂春華辨慧懷清真焉見浮丘公舉手謝時人輕蕩易恍惚飄颻棄其身飛飛鳴且翔揮翼且酸辛其六十六塞門不可出海水焉可浮朱明不可見奄昧獨無侯持瓜思東陵黃雀誠獨羞失勢在須臾帶劍上吾丘悼彼桑林子涕下自交流假乘汧渭間鞍馬去行遊塞一作寒丹鉛餘録云漢武時事漢武帝崩後忽見形謂陵令薛平曰我雖失勢猶為汝君奈何令吏卒上吾陵磨劍乎因不見推陵旁果有方石可以為礪吏卒嘗盜磨刀劍霍光欲斬之張安世曰神道茫昧不宜為法故阮公詠懷詩曰失勢在須臾帶劍上吾丘其六十七洪生資制度被服止有常尊卑設次序事物齊紀綱容飾整顔色磬折執圭璋堂上置玄酒室中盛稻粱外厲貞素談戶內滅芬芳放口從衷出復説道義方委曲周旋儀姿態愁我腸其六十八北臨乾昧溪西行遊少任遙顧望天津駘蕩樂我心綺靡存亡門一遊不再尋儻遇晨風鳥飛駕出南林漭漾瑶光中忽忽肆荒淫休息晏清都超世又誰禁南一作東超世又誰禁一作起坐復誰禁其六十九人知結交易交友誠獨難險路多疑惑明珠未可干彼求饗太牢我欲并一餐損益生怨毒咄咄復何言其七十有悲則有情無悲亦無思茍非嬰網罟何必萬里畿翔風拂重霄慶雲招所晞灰心寄枯宅曷顧人間姿始得忘我難焉知默自遺無悲亦無思集作無情亦無悲始集作曲其七十一木槿榮丘墓煌煌有光色白日頽林中翩翩零路側蟋蟀吟戶牖蟪蛄鳴荆棘蜉蝣玩三朝采采修羽翼衣裳為誰施俯仰自收拭生命幾何時慷慨各努力其七十二修塗馳軒車長川載輕舟性命豈自然勢路有所繇髙名令志惑重利使心憂親昵懷反側骨肉還相讐更希毁珠玉可用登遨遊其七十三橫術有竒士黃駿服其箱朝起瀛洲野日夕宿明光再撫四海外羽翼自飛揚去置世上事豈足愁我腸一去長離絶千歲復相望其七十四猗歟上世士恬淡志安貧季葉道陵遲馳騖紛垢塵寧子豈不類揚歌誰肯殉棲棲非我偶徨徨非已倫咄嗟榮辱事去來味道真道真信可娛清潔存精神巢由抗髙節從此適河濵殉一作詢其七十五梁東有芳草一朝再三榮色容豔姿美光華耀傾城豈為明哲士妖蠱諂媚生輕薄在一時安知百世名路端便姢子但恐日月傾焉見冥靈木悠悠竟無形其七十六秋駕安可學東野窮路旁綸深魚淵濳矰設鳥髙翔泛泛乘輕舟演漾靡所望吹噓誰以益江湖相捐忘都冶難為顔修容是我常兹年在松喬恍惚誠未央秋駕作稅駕者誤按莊子逸篇尹儒學御三年而無所得夜夢受秋駕明日往朝師師曰今將教子以秋駕注曰秋駕法駕其七十七咄嗟行至老僶俯常苦憂臨川羡洪波同始異支流百年何足言但苦怨與讐讐怨者誰子耳目還相羞聲色為胡越人情自逼遒招彼玄通士去來歸羡遊其七十八昔有神仙士乃處射山阿乘雲御飛龍噓吸嘰瓊華可聞不可見慷慨歎咨嗟自傷非疇類愁苦來相加下學而上達忽忽將如何嘰音機小食也其七十九林中有竒鳥自言是鳯凰清朝飲醴泉日夕棲山岡髙鳴徹九州延頸望八荒適逢商風起羽翼自摧藏一去崑崙西何時復回翔但恨處非立愴悢使心傷其八十出門望佳人佳人豈在兹三山招松喬萬世誰與期存亡有長短慷慨將焉知忽忽朝日隤行行將何之不見入秋草摧折在今時亡一作日其八十一昔有神仙者羡門及松喬吸習九陽間升近嘰雲霄人生樂長久百年自言遼白日隕隅谷一夕不再朝豈若遺世物登明遂飄颻其八十二墓前熒熒者木槿耀朱華榮好未終朝連飈隕其葩豈若西山草琅玕與丹禾垂影臨增城餘光照九阿寧微少年子日夕難咨嗟采薪者歌日沒不周西月出丹淵中陽精蔽不見陰光代為雄亭亭在須臾厭厭將復隆離合雲霧兮往來如飄風富貴俯仰間貧賤何必終留侯起亡虜威武赫荒夷邵平封東陵一旦為布衣枝葉托根柢死生同盛衰得志從命
