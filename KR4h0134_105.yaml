body:
  text: 漢魏六朝百三家集卷一百五陳江總集題詞後主狎客江總持居首國亡主辱竟逃明刑開府隋朝眉壽無恙春秋惡佞人有厚福若是者哉自敘官陳以來流俗怨憎羣小威福摧黜繇命識者笑其言迹乖謬及考之史書後庭荒宴罪薄五鬼自矜淡漠豈猶任質之談耶六宫謝章美人應令艷歌側篇傳誦禁庭餘則山寺穹碑法師龕石標記禪悅寂不聞有廟堂典議關其筆札所謂韋彪樞機李固斗極其晏居則何如也序云未嘗逢迎一物干豫一事又云暮齒官陳與攝山布上人遊欵深悟苦空更復練戒文人髙致或足貶俗其如社稷何後主即不道非有商辛之惡也總持即不肖罪不若飛廉惡來也文昌政本與時低昻朝宴夜遊太康無警即其恬淡亡國有餘矣齊梁以來華虗成風士大夫輕君臣而工文墨髙談法王脫略名節雞足鷲頭適為朝秦暮楚者地耳梁有江總隋有裴矩後唐有馮道三人皆醮婦所羞也目録賦修心賦有序辭行李賦雲堂賦貞女峽賦勞酒賦山水納袍賦有引華貂賦有引瑪瑙碗賦南越木槿賦詔舉士詔表讓尚書令表讓尚書僕射表讓吏部尚書表為沈君理讓僕射領吏部表為衡陽王讓吳郡表為蕭太保謝儀同表謝勑給鼓吹表為陳六宫謝表章為陳六宫謝章啓上毛龜啓除尚書令斷表後啓除尚書謝臺啓謝宫為制讓表啓除太子詹事謝東宫啓序自序陶貞白先生集序碑皇太子太學講碑吳興郡廬陵王德政碑攝山棲霞寺碑大莊嚴寺碑建初寺瓊法師碑明慶寺尚禪師碑銘贊香贊花贊燈贊幡贊頌莊周頌銘永陽王齋後山池銘芳林園天淵池銘有序玄圃石室銘方鏡銘有引鐘銘又優填像銘哀策文陳宣帝哀策文誄梁故度支尚書陸君誄墓志銘廣州刺史歐陽頠墓志特進光祿大夫徐孝穆墓銘司農陳暄墓銘中領軍魯廣達墓銘侍中沈欽墓詺文羣臣請陳武帝讖文樂府雉子班隴頭水二首折楊柳關山月洛陽道二首長安道梅花落二首紫騮馬驄馬驅雨雪曲劉生病婦行置酒髙殿上今日樂相樂簫史曲詠燕燕于飛應詔濟黃河橫吹曲怨詩二首烏棲曲東飛伯勞歌雜曲三首梅花落宛轉歌閨怨篇又姬人怨姬人怨服散篇長相思二首詩秋日侍宴婁苑湖應詔侍宴玄武觀宴樂修堂應令三日侍宴宣猷堂曲水秋日遊昆明池秋日登廣州城南樓贈洗馬袁朗别詒孔中丞奐贈賀左丞蕭舍人遇長安使寄裴尚書别南海賔化侯庚寅年二月十二日遊虎丘山精舍入龍丘巖精舍明慶寺入攝山棲霞寺有序遊攝山棲霞寺有序攝山棲霞寺山房夜坐簡徐祭酒周尚書并同遊羣彥靜卧棲霞寺房望徐祭酒營涅盤懴還塗作有序至德二年十一月十二日升德施山齋三宿決定罪福懴悔詩詠採甘露應詔借陸太常説文賦得一日成三賦應令攝山梁小廟卞山楚廟山庭春日七夕南還尋草市宅和張記室源傷往在陳旦解酲共哭顧舍人侍宴臨芳殿侍宴瑶泉殿别袁昌州二首經始興廣果寺題愷法師山房和衡陽殿下髙樓看妓賦得空閨怨并州羊腸坂歲暮還宅春夜山庭夏日還山庭賦得謁帝承明廬賦得携手上河梁應詔賦得泛泛水中鳬賦得三五明月滿衡州九日賦詠得琴詠雙闕三善殿夜望山燈奉和東宫經故妃舊殿同庾信答林法師詠李詠蟬答王筠早朝守建陽門開侍宴賦得起坐彈鳴琴别永興侯春日於長安歸還揚州九月九日行薇山亭賦韻哭魯廣逹秋日新寵美人應令新入姬人應令內殿賦新詩漢魏六朝百三家集卷一百五目録欽定四庫全書漢魏六朝百三家集卷一百五明張溥輯陳江總集賦修心賦有序太清四年秋七月避地於會稽龍華寺此伽藍者余六世祖宋尚書右僕射州陵侯元嘉二十四年之所搆也侯之王父晉護軍將軍彪昔涖此邦卜居山陰都陽里貽厥子孫有終焉之志寺域則宅之舊基左江右湖靣山背壑東西陵跨南北紆縈聊與苦節名僧同銷日月曉修經戒夕覽圖書寢處風雲馮棲水月不意華戎莫辨朝市傾淪以此傷情情可知矣啜泣濡翰豈攄鬱結庶後生君子憫余此槩焉嘉南斗之分次肇東越之靈祕表檜風於韓什著鎮山於周紀藴大禹之金書鐫暴秦之石字太史來而探穴鍾離去而開笥信竹箭之為殄何碔砆之罕值奉盛德之鴻祀寓安禪之古寺實豫章之舊圃成黃金之勝地遂寂默之幽心若鏡中而逺尋面曾阜之超忽邇平湖之逈深山條偃蹇水葉浸淫挂猿朝落飢鼯夜吟果叢藥苑桃蹊橘林梢雲拂日結暗生陰保自然之雅趣鄙人間之荒雜望島嶼之邅回面江源之重沓泛流月之夜回曵光煙之曉匝風引蜩而嘶噪雨鳴林而翛颯鳥稍狎而知來雲無情而自合爾乃野開靈塔地築禪居喜園超遰樂樹扶疏經行藉草宴坐臨渠持戒振錫庇影甘蔬堅固之林可喻寂滅之場暫如異曲終而悲起非木落而愁如豈降志而辱身不露才而揚已鍾風雨之掩藹倦雞鳴之聒耳辛避地而髙棲馮調御之遺旨折四辨之微言悟三乘之妙理遣十纒之繫縛祛五惑之塵滓久遺榮於勢利庶忘纍於妻子感意氣於疇昔寄知音於來祀何逺客之可悲私自憐其何已辭行李賦維大梁三十有六載神功懋乎開闢垂恩儲祉􅐦子代之盤盂盛德形容陋周年之弇石月窟向風日域仰澤要荒欵塞諸戎重譯輶軒巡履聲芳亥步旌節經過事高禹迹舉皇華之盡美馳珏玉之多事或江夏之無雙匹洛陽之才子訪羽儀於廊廟旌秀異於杞梓引強學之三端賞雕文於四始顧􅘓侗於罕志奉朝章於信次天鳯舉而張􅏧濟龍沙而通贄敏異季札之聼歌譽乘屬國之銜使懷蘇子之抵掌憶千秋之畫地願自勵而飲氷揆無庸而按轡嗟負恩之無力每若置於藂棘倐辭東平之樂善再踐承明而遊息豈異千里之奔踶寧辭一錢之不直諒無期於鴻漸念有似於蟬翼荷德澤之霈然鑒丹愚之匪飾慙借譽於琴柱免長徭於蔥極聊暇日以須臾每長吟以鬱紆異金石之能固若草木之分區進學慙於枝葉綿力謝於康衢搆伯休之蓬户狎仲憲之桑樞徒悅水而非智庶因谷以為愚耻矯名於周客寧濫響於齊竿奉棲遲以偃仰願太素之不汚雲堂賦覽黃圖之棟宇規紫宸於太清何面勢之膠葛信不日之經營仰一時之壯麗跨萬古之威靈吐觸石之竒色混髙臺之舊名若乃三階入户百拱千楹瑩以玉琇飾以金英緑芰懸插紅蕖倒生於時木葉聲寒壺人唱靜承露擎虛相風照迥天子乃下輦開宴出豫娛神文縣日月思革風塵實附鳯之多幸愧屠龍之不真貞女峽賦倦辛苦於嶺表遂沉淪於海外迹飄颻於轉蓬情繚繞於懸斾駭兹峽之珍怪佇竒峯而矖矚或邐迤而四成乍嶵㠕而五曲含照曜之燭銀滴潺湲之膏玉山蒼蒼以墜葉樹索索而搖枝澄碧源之見底聳翠壁以臨危勞酒賦在陽春之仲序覽具物之芳菲帥公卿而播百榖親耒耜而命三推開青壇於回甸列翠幕於清沂乃遵執爵之典爰降食蘋之宴豁朱鳥之髙窗啓黃龍之抗殿奏帝鴻之萬舞動鈞天之九變顧曲私之亭育遞寒暑而徂遷謬陳力而䇿駘豈酬恩於暮年山水納袍賦有引皇儲監國餘辰勞謙終宴有令以納袍降賜何以奉揚恩德因題此賦濫時來之寵沐振長纓以祗肅奉性與之文章侍相娛之絲竹解女蘿之山帶佩流霞之羽服裁縫則萬壑縈體針縷則千巖映目圖島嶼之削成寫淪漣之徑復埒符采於雕煥並芬芳於蘭菊憫四選之徂遷軫百慮之回邅霜飛空而浸霧鴈照月而猜弦聽風鐘之易近對水霤之疏懸若董衣之百結同衛服之十年嗟斑鬢之巳颯愧冶袖之為姦謝銜珠之有報荷墜履之無捐華貂賦有序領軍新安殿下以副貂垂鍚仰銘恩澤謹題小賦貴豐貂於挹婁飾惠文而見求標侍臣之密設曜毛采之溫柔拜文㮰而影度陪武帳而香浮隨玉珩之近逺共金璫之去留仰太山之千仞開谷中之鄙吝撤君子之寶飾榮小人之蓬鬢蔑置醴之殊誇賜田之薄潤顧朽拙之微躬早遊藝而不工逢河間之好古自隗始而恩隆諒維鵜之有愧庶懷昔而克終瑪瑙碗賦翠羽流霞之杯諒無聞於瑋麗豈匹此之竒瓌爰覩殊特臻自西國狀驚鶴之點漬似遊龍之割刻士衡譬之雲采中郎羞其馬勒於時北園清夏東閣浮涼山交枝而影雜水沉葉而流香蟬無風而引短鷺出逈而飛長副君海渟嶽峙紙落金鏘獲阿宗之美寶命河朔之名觴寶出崑崙之仙阜觴即玄洲之玉酒酒既醉而還年碗稍酌而延壽仰天縱之體物銘欹器兮何有南越木槿賦日及多名㽔賔肇生東方記乎夕死郭璞贊以朝榮潘文體其夏盛稽賦憫其秋零此則京華之麗木非於越之舜英南中新草衆花之寶雅什未名騷人失藻雨來翠潤露歇紅燥疊蕚疑檠低莖若倒朝霞映日殊未妍珊瑚照水定非鮮千葉芙蓉詎相似百枝燈花復羞燃暫欲寄根對滄海大願移華厠綺錢井上桃蟲難可雜庭中桂蠧豈見憐乃為歌曰啼妝梁兾婦紅妝蕩子家若持花並笑宜笑不勝花趙女乖金珥燕姬插寶珈誰知紅槿艷無因寄狹邪徒令萬里道攀折自咨嗟詔舉士詔堯施諌鼓禹拜昌言求之異等久著前徽舉以滯淹復聞昔典斯乃治道之深規帝王之切務朕以寡昧丕承洪緒未明虗巳日旰興懷萬機多紊四聰弗達思聞謇諤採其謀計王公以下各薦所知傍詢管庫爰及輿皂一介有能片言可用朕親加聼覽佇兹沃啓表讓尚書令表臣弱歲立朝本無竒志每謂任登常伯足承基緒值梁季不造收拙人間東竄三江南徂百越不知秦漢十有七年心迹退黜平生畢矣但野性疏懶不屑死增俯仰乖時人物多忤天飛踐祚任寄隆重謬以商丘之木遂比舟楫之材燕岱之石混同瑚璉之器當由崇賢使舉早守名節竊以天府文昌萬方之藪天官冢宰無所不統禮遵三獨事昭百揆曠職云久三十餘載一旦開置必資望實豈期廷典私偏濫庸菲薄陛下聽覽餘辰曲垂昭納遂斯反汗髙選具瞻則敝蓋敝帷使臣暮齒歲制月制賖臣皓髮不以一怠讓尚書僕射表藻鏡官方品才人物門驚如市不慚屋漏心抱如氷無欺暗室但屢淹星鳥每知沗素世網拘束事歸僶勉今此召會尤增據蒺竊以端揆副職官稱師長革履升降傳呼寵赫儀刑朝首冠冕彛倫兼復參總衡流匡佐聖治妄膺重責必踐危機讓吏部尚書表竊以漢置五曹方今六尚魏隆八凱擬古六卿近喻喉舌逺膺樞斗至如東京西晉裴王仰首伸眉可得論列此矣但臣門基世縮晉宋以來內侍帷扆入尸衡尺或年甫將立或歲未強仕是以退思弱冠追傷疇昔早塵華任見知名輩常謂忝竊匪朝伊夕豈期梁室多故有志無時平生意氣颯爾零落特由邀奉嘉運千載一時惟奮寵靈遂臻於此為沈君理讓僕射領吏部表辛香以來安石以後遵其軌躅必大厦之棟梁總其寄任亦巨川之舟楫未有綿力薄材輕膺此舉為衡陽王讓吳郡表芝泥馳印發命開函闕頴之誠夏霜易霣兢惶之至春水可涉臨淄回軾即事何取廣川無聲頗知自匹為蕭太保謝儀同表阪泉野戰曾無汗馬之勞代邸運籌又闕前戈之勇薄伐專征早遊邊外執玉奉酎又虧朝則王人降止朝册逺臨奉述勑書曲停表奏滄波敻阻既杜敬仲之辭關路悠長致絶趙襄之讓心馳紫路登文石而莫由目送白雲拜承明而無日謝敕給鼓吹表略尋近古逖聽前事王文憲匡佐革命沈隱侯經綸始運騎吹之榮猶難忝冒以臣况此實非倫輩豈可更崇文物重假名器髙臺迢遞未朱夏而登臨芳樹華滋非青春而奏曲為陳六宫謝表鶴籥晨啓雀叉曉映恭承盛典肅荷微章步動雲桂香飄霧縠愧纒艷粉無情拂鏡愁縈巧黛息意臨窗妾聞漢水贈珠人間絶世洛川拾翠仙處無雙或有風流行雨窈窕初日聲髙一笑價起兩環乃可桂殿迎春蘭房侍寵借班姬之扇未掩驚羞假蔡琰之文寧披悚戴章為陳六宫謝章恭膺禮命愧集丹縷之顔拜奉曲私愁縈翬羽之色魯宫夜火伯媛匪驚楚榭奔濤貞薑何懼豈期日月騰影風雲寫潤乃復位崇九御聲髙六列象服增華丹軿耀采何以弼佐王風克柔陰化兢惶並集追想流荇之詩荷愳相并遂失鳴環之節啓上毛龜啓臣聞聖王受命以代紹興日月精明之狀煙雲爛漫之采神鼎出於汾陰寶玉開於張掖靈山奧澤卉木呈祉靜海澄波鱗介禔福靡不顯符瑞以固鴻基肇徴祥以光永世者也影合四靈光分五色懷星拖月負字銜圖除尚書令斷表後啓司會治本冢宰朝端搢紳所屬儀刑攸在皇代以來無人則闕陛下將偹厥職用穆臣僚不容始自庸菲以歡物議當今藩翰至戚不無其才廊廟重臣亦有其器伏願檢俞往之則闡平章之道臣沿心布欵有理存焉除尚書令謝臺啓竊以昔之冡司今曰端揆頃同台衮無人則闕臣之朽薄安可叨賁謹當奏承夜月冀奉三思之旨聲寄浮雲方祈九天之路謝宫為製讓表啓如攀珠樹徒仰照匣之輝若踐玉田不知照廡之價芙蓉之水亟奉北園迷迭之文屬陪南館久降噓枯之旨許賜凌雲之筆清夜宴斯謂言善戲黃金然諾並遂殊寵年齊柏寢豈報恩榮紙罄蘭臺未書悚戴除太子詹事謝東宫啓庇身修德濫迹端形陳蘿故葛攀附不涯解角蛻鱗超踰非次方辭璽會覬收渥澤序自序歷升清顯備位朝列不邀世利不涉權幸嘗撫躬仰天太息曰莊青翟位至丞相無迹可紀趙元叔為上計吏光乎列傳官陳以來未嘗逢迎一物干豫一事悠悠風塵流俗之士頗致怨憎榮枯寵辱不以介意太建之世權移羣小諂嫉作威屢被摧黜奈何命也後主昔在東朝畹意文藝夙荷昭晉恩紀契濶嗣位之日時寄謬隆儀形天府釐正庶績八法六典無所不統昔晉武帝䇿荀公曽曰周之冢宰今之尚書令也况復才未半古尸素若茲晉太尉陸玩云以我為三公知天下無人矣軒冕倘來之一物豈是豫要乎弱歲歸心釋教年二十餘入鏡山就靈曜寺則法師受菩薩戒暮齒官陳與攝山市上人遊欵深悟苦空更復練戒運善於心行慈於物頗知自勵而不能蔬菲尚染塵勞以此負愧平生耳陶貞白先生集序昔劉向通古今之學馬融見天下之書京房察風雨之占裴楷曉陰陽之術子政傷於簡易季長敝於驕侈君明逐不旋踵公矩才免極誅鮮有盡美之迹罕聞克終之譽若夫德行博敏孔室四科經術深長鄭門六藝丹陽陶先生備斯矣至如紫臺青簡緑帙丹經玉版祕文瑶氊怪牒靡不貫彼精微殫其旨趣蓋非常之絶伎命世之異人焉文集缺亡未有編録門人補輯若逢遼東之本好事研搜如誦河西之篋奉勑校之鉛墨緘以緹緗藏彼鴻都副作延閣碑皇太子太學講碑我大陳之御天下若水渙其長瀾瑶星躔其永歷重華誕睿興於大麓之野敬仲繼業盛矣鳴鳯之占兼以鴻才海富逸思泉瀉含毫落紙動八闋之歌謡隻句片言諧五聲之節奏雲飛風起追壓漢帝之辭髙觀華池逺跨魏王之什爰復建藏書之册開獻書之路帷帳叢殘家壁遺逸紫臺祕典緑帙竒文羽陵蠧迹嵩山落簡外史所掌廣內所司靡不飾以鉛槧雕以緗素此文教之修也吳興郡廬陵王德政碑卓爾吾王天人可擬早成夙智謙懷虗巳偃息流略翺翔文史三雍雅對九師名理好古如斯學兼之矣睢陽肇構碣石初開賜田待士榜道求材剖符彭國述職琅臺去謡曙鼓留歌暮來攝山棲霞寺碑蓋聞天有神宫地云靈府桑欽博記始敘四衢之塔金朔著經因知千步之寺至如峰形甑纍岫勢堂密亦烏足言哉南徐州琅邪郡江乘縣界有攝山者其狀似繖亦名繖山尹先生記曰山多草藥可以攝養故以攝為名焉南瞻舊落顧悌鎮戍之塢北望荒村扈謙卜筮之宅此山西南隅有外道館地俄而疫癘磨滅三清遺法未明五怖之災萬善開宗遂變四禪之境倐見齊居士平原明僧紹空解淵深至理髙妙遺榮軒冕遁迹巖穴宋泰始中嘗遊此山乃有終焉之志村民野老競來諌曰山多狼虎毒蛇所以久絶行踐僧紹曰毒中之毒無過三毒忠信可蹈水火猛獸亦何能為乃刋木駕峰剃草開徑披拂蓁梗結構茅茨草許年不事人世渡河息暴擾篋無立皆曰誠至所感有法度禪師家本黃龍來遊白祉梵行殫苦法性純備與僧紹𡨕契甚善嘗於山舍講無量壽經中夜忽見金光照室光中如有臺館形像豈知一念之間人王照其香蓋八未曽有淵石朗其夜室居士遂捨本宅欲成此寺即齊永明七年正月三日度上人之所搆也山情率易野製疏朴崖簷峻絶澗户幽深卉木滋榮四時助其雕綺煙霞舒卷五色成其藻絢居士嘗夢此巗有如來光彩又因間居依稀目見昔寶海梵志睡覩花臺智猛比丘行逢影窟故知神應非逺靈相斯在居士有懷創造俄而物故其第二子仲璋為臨沂令克荷先業莊嚴龕像首於西峯石壁與度禪師鐫造無量壽佛坐身三丈一尺五寸通座四丈并二菩薩倚髙三丈三寸若乃圖寫瓌竒刻削宏壯蓮花瑩目石鏡沉暉藕絲縈髮雲崖失彩項日流影東方韜其大明面月馳光西照匿其成魄大同二年龕頂放光光色身相晃若炎山林間樹下赩如火殿禪師自識終期欣瞻瑞應以建武四年於此寺順寂豈非六和精進十念允諧向沐寶池方登金地者也齊文惠太子豫章文獻王竟陵文宣始安王等慧心開發信力明悟各捨泉貝共成福業宋太宰江夏王霍姬蕃閨內德齊雍州刺史田奐方牧貴臣深曉正見妙識來果並於此巖阿廣收財施琢磨巨石影擬法身梁太尉臨川靖慧王道契真如心弘檀密見此山製置疏濶功用稀少以天監十年八月爰撤帑藏復加瑩飾繢以丹青鏤之銑璗五分照發干輪啓煥排天堂廡玉露分色接岫軒墀翠微抽影八定之侶步纎草而揚梵三慧之僧挹飛泉而動色喜園凝靜豈傲吏之凡遊深谷虗玄非愚公之俗路是以王公縉紳之輩郎吏胥史之屬步林壑陟臯壤升精舍拜道場莫不洗滌無明浣濯囂暗非直心之砥路孰能如斯者乎慧振法師志業該練心力精確度上人將就遷神深相付囑法師聿修厥緒勸助衆功基業田園多所創置先有名德僧朗法師者去鄉遼水問道京華清規挺出碩學精詣早成波若之性夙植尸羅之本闡方等之指歸𢎞中道之宗致北山之北南山之南不遊皇都將涉三紀梁武皇帝能行四等善悟三空以法師纍降徴書確乎不拔天監十一年帝乃遣中寺釋僧懷靈根寺釋慧今等十僧詣山咨受三論大義賈誼曰學聖道如日之明孫卿云登髙山知天之峻今之探賾其此之謂南蘭陵蕭􅀈幽棲抗志獨法絶羣遁世兹山多歷年所臨終遺言葬法師墓側還符田豫託西門之冡更似梁鴻偶要離之瘞又按神録云楚靳神在今臨沂縣齊永明初神詣法度道人受戒自通曰靳尚即楚大夫之靈也大同元年二月五日神又見形著菩薩巾披袈裟間雅甚都來入禪堂請寺衆説法崑嶺之中百神所在首陽之路八駟並驅未有修淨戒之品詣得道之僧整忍辱之衣入安禪之室是知名山大澤靈異憑依者矣慧布法師幼落煩惱早出塵勞律儀明白貞節峻逺貫綜三乘不自媒衒楷模七衆無所詆訶曩日靜憩鍾巗余便觀止餐仁飲德十有餘年頃於攝阜受持珠戒佩服之敬雖敢怠於斯須汲引之勞且曷伸於報效夫言意難盡鉛槧易凋固比河山莫如金石凡諸徴應并預隨喜並勒於碑左乃為頌曰漫漫心火冥冥世流論生若寄喻死如休三明未了十智難周盡纒癡愛豈離瘡疣敬仰雞足恭聞鷲頭斯風可羡其路何由我開梵宇面壑臨丘我圖靈迹果植因修兼金畫繪泐石雕鎪連雲出沒泄雨沉浮經行松磴禪坐蕙樓澗風長瀉崖溜懸抽花臺似雪夏室疑秋名僧宴息勝侶薰修三乘為筏六度為舟金幢合蓋寶駕驅輈地祗來格天衆追遊五時無爽七處相侔辭題翠琰字勒銀鈎賢乎藥餌過客宜留大莊嚴寺碑蓋聞僧伽水濵波斯創以禪地醍醐山頂舍郍肇其梵域此乃往劫之勝因上方之妙範於是俯察地勢懸之以水仰惟皇極揆之以日百堵咸作千坊洞啓前望則紅塵四合見三市之盈虗後睇則紫閣九重連雙闕之聳峭加以園習歡喜水成功德池溢甘露不因玉掌樹搖音樂無待金奏薰爐夜爇遙來海岓之香法鼓晨歡非動泗濵之石擢莖金表跨八萬之俱成界道銀繩面四衢而拓製厠璧綴珠凌丹霞而結宇雕光縷采望紫極而開軒俯看驚電影徹琉璃之道遙拖宛虹光遍水精之域層楹刻桷風伯走而未升靈橑飛甍雨師攀而不逮銘曰灼爍金莖崔嵬銀表翔鶤仰翥威鳯靈矯木密聫綿香泥繚繞日圖簷外荷披棟杪翠落陰虬珠填陽鳥髙僧纍萃願學兹多𢎞宣方等博綜圍陀皆傷寸晷並悟尺波式旌鏤碣無待雕戈標年剎土比數恆河建初寺瓊法師碑夫智慧精進皆曰第一妙德淨名並稱不二若乃幹五欲之泥解六情之網禦寶車之迹面香城之路荷持像法汲引人倫惟此法師心力備矣東山北山之部貫花散花之句並編柳成簡題蒲就業學非全朔無待冬書師夢尹儒自知秋駕銘曰屑屑人世茫茫大千欲流心火意樹身田老驚靈籥孔惜逝川三空莫辨二諦何詮佛日初照慈雲不偏秋露寂滅莫繫悠然明慶寺尚禪師碑銘百世之上百世之下含章隱璞明真照假空行已無希音和寡不有耆德誰其繼者朗月靈懸髙風獨寫贊香贊海岸相傳香流十千不吹自轉將銷更燃縈空雜霧散逈飛煙還符戒品薰修福田花贊池中寶花葉覆金沙逆風氣亂映水光斜散由天女賣乃王家若生心樹願結因牙燈贊寶燈夜開光遍花臺煙抽細焰燼落輕灰珠慙色並月耻光來一明暗室若遣塵埃幡贊金幡化成搖蕩相明留無定影散乃俱輕光分紺殿采布香城恆知自轉福與之生頌莊周頌玉潔蒙縣蘭薰漆園丹青可久雅道斯存夢中化蝶水外翔鯤出俗靈府師心妙門垂竿自若重聘忘言悠哉天地共是籠樊銘永陽王齋後山亭銘叢臺造日淄館連雲錦墻列繢繡地成文吾王卓爾逸趣不羣梅梁蕙閣桂棟蘭汾竹深蓋雨石暗迎曛激流疑疏搆峰似削苔滑危磴藤攀聳蕚樹影搖窗池中動幕月澄遙溆風清近壑雪岸難消花園易落髙桐百尺垂楊五株開榮九畹結秀三株山條紫的水葉紅鬚抽芳繞霤接翠分衢亭歡旅鶴浦澡驚鳬前列枚馬後招申白諷誦楚詩精微沛易叢桂留賞散金匪惜不羡睢陽還嗤碣石馳聲終古服義無斁芳林園天淵池銘有序歲次執除月維大吕爰命梓匠廣修畚鍤標置舊趾開浚昔基東西彌望雲霧之所澄蕩南北紆縈虹霓之所引曜曉川漾璧似日御之在河宿夜浪浮金疑月輪之馳水府前瞰萬雉列榭參差却拒三襲危巒聳峭瓌鳥異禽自學歌舞神木靈卉不知搖落昔叔皮覽海序螭蛟之泛濫吉甫臨舟美柳松之蓊茸尚復著在吟咏緘彼緹緗况我君門盛事未紀謬頒待詔謹製銘云石溝溜密蘭渚潮平九華閣道百丈層盈液搖殿色殿寫波明玄圃石室銘仙巖石榻􅋖宇石墻地云正域道示修羊紫煙碧露綘雪玄霜廣成不踐王列未翔移華甲觀徙構震方逺跨飛梁俯臨倒景瓊蘂珠樹金階玉井映日分暉搖風共影岫濃翠合林虗桂靜朔去偷桃董來貨杏簷非刻削户恣登臨迎春花近避暑涼深秋雲卷暗冬霰停陰桐棲鳯采竹化龍吟輕飛亂色激溜成音天縱儲睿生知作兩絃誦餘隟仁智為賞河曲停遊洛濵息往祥梨吐秀瑞燕流響一物或鐫萬國斯仰懷安寺剎下銘四聰睿后萬行了因運光玉鏡道茂金輪爰構靈剎地迹重闉迎風雲表承露天津飛甍􅏭􅙙纍棟嶙峋護持七衆警衛百神籌銷草木劫盡沙塵支提永固福業恆新變易東海長久北辰方鏡銘有引此鏡以照著衣鏡背圖刻八卦二十八宿仁壽殿前無以加斯雕麗也玄枵命巧仲吕呈祥金鐫石漢銅鑄丹陽價珍負局影麗髙堂圖星擬蓋寫卦隨方明齊水止照與天長增輝兔苑永侍龍光鐘銘鳬氏之匠狙陽之銅圖欒鑄鎛刻獸鐫蟲聲飛雪裏韻切唇中遙符玉律逺雜金風朝驚鷲嶺夜動龍宫冀憑慧業冥感神功百非洗蕩萬善招通長如五淨永誣三空又篆間鎔刻欒上雕鐫聲齊法鼓響逸鳴楗舟移巨壑火壞初禪優填像銘如花譬像若火疑龍毫光此遇法相今逢眸雲齒雪月貌金容大仙下降避席為恭哀策文陳宣帝哀策文望蜃綍而攀摽拜龍菆而慟絶變五統而凄涼回三辰而慘切感川嶽而地維傾號穹蒼而天柱折千秋茂德萬世鴻名爰詔掌禮式序英聲其辭曰媯水樞宿姚墟大虹謳歌承厯揖讓受終重規帝緒踵武王風名山紀迹清廟傳功我后丕承思𢎞祖業蒞政恭已臨朝凝默煥爛九功葳蕤七德憲章昭著威靈允塞爰兹發迹天步艱難連華滕衛比譽應韓羽儀戚右軒冕朝端祈膺當璧繇顯大橫延喜授玉告善飛旌神器有奉性道無名詩頌唐年樂舞姬日仁聲汪濊武義洋溢理訟總街凝情衢室巡望如禮幽祗咸秩疆垂叛援關徼虔劉治兵丹浦獲醜青丘屠釣且拔管庫方搜如龍駕鼓獻雉焚裘天必呈祥地寧愛寶神禽竒獸嘉榖靈草屈軼抽階飛黃伏皂綺雲舒慶珠星照老廣敷丘索𢎞啓膠庠書林吐馥文囿含鏘南洽侯衛北暢遐荒殷羅自解周圍無傷金英掩色玉床弗豫天駟催鑣王良失御鑄鼎奚益綴衣何處漫漫幽夜𡨕𡨕上仙長違拜日失意祈年寧神卜兆晏駕回天銅驎感泣銀海埋田出德陽之廣殿動繁笳之哀囀渡洛水之浮橋望偃師之近縣背紫陌而未逹隱黃山而不見鐸啓挽而依依馬嘶風而戀戀平原欲晦落照將垂鳯蓋飄而水暗鸞蹕聳而山危曳蛇旗之舒卷間翠野之參差鳥哀哀而驚曙松琴瑟而吟枝異故鄉之絲竹非舊宅之塤篪掃秋葉而無盡薦春櫻而願知北邙已謝西陵何有逺宿蒼梧便乖仁壽聲合韶濩道宜户牗共瀛海而恆流並嵩華而莫朽誄梁故度支尚書陸君誄君諱襄字師卿吳人也祖惠徹宋車騎府法曹行參軍父間揚州别駕齊永元紹厯蕭遙光謀反伏誅間以州職見害子綘其日并命忠孝之道萃此一門襄時年十四號毁殆滅布衣蔬食終於身世起家著作佐郎出為永寧縣令纍遷臨川王廬陵王法曹外兵記室入為太子洗馬掌𬋩記中書舍人𬋩記如故為丹陽尹丞俄遷太子庶子掌管記揚川治中太子家令領國子博士𬋩記如故丁母顧夫人憂廬乎墓所服闋又從家令轉中庶子並掌管記遷中散大夫金華宫家令出為鄱陽內史除尚書吏部郎祕書監領揚州大中正度支尚書太清二年三月京師傾覆君竄迹還鄉吳民陸黯起義民攻郡擾攘之際憂憤而終春秋七十有二余避世河滸暫之吳國百舍不容千里無饋陸公國士之眷惠好之深朝同飦粥夕共瓢飲契濶晤言流連晦朔日月逝矣懷古何忘臨哀能誄久願搖筆時事屯邅不遑削藁梁季適越未戢干戈陳世入仕纍牽物役杼軸於懷四十餘載隋開皇九年於長安致仕懸車已洎就木幾何但東海成田南冠永縶龜山更促空想吹笛之哀馬角徒生絶望通波之水嗚呼哀哉攬涕操觚乃為誄曰媯苗碩茂完裔繁昌賔門穆穆筮士鏘鏘食采命氏遐哉陸鄉四升臺省八辟賢良分柯振葉令聞令望玄㽔朱鞸翠辨金鐺流聲世祀列讃祠堂别駕貞烈志存名教捐生徇主知死不撓暉映泉壤痛此忠孝於鑠夫子積德纍仁韜光戢耀隱璞含真居哀能痛至情通神淚枯瓏樹哀感馴禽永慟家禍長號不辰玄黃絶睇蔬布終身心符屈婞室等原貧分井共戚內族外姻求之今古斯為異人月下奏章螢前讀史給紙蘭臺觀書洛市強學待問潤身為已結髮濯纓登朝入仕昻昻逸驥逐日千里宛宛長離陵江迅起枳棘棲鳯化行乳雉平臺纍陟石扇暫履跧伏不競棼絲自理綺席無譏師訓胄子驥足時務俊民斯俟秋實選能春華備美思媚儲后遊息承華書記策擢爵命增加彈碁擊築沉李浮瓜追隨飛蓋侍從鳴笳二儀回幹四氣淹賖離景遽沉前星奄滅撫已惟舊懷恩守節昔荷故臣攀號聲折登髙能賦大夫就列金華式肇更奉清切修竹貞松含霜抱雪下車軒日求瘼康時良辰坐嘯朗夜卧治懸魚化靜佩犢去思廣𢎞條教精察毫釐典選搜揚操刀密勿不紊朱紫傍無請謁祕署學林得人超忽延閣緗素校文遺闕工妙鉛槧譽成期月鴈行攸序龍作簡才讓珠不拜賜劒恩來帝曰俞往爾行兼該金城失險玉弩流災年臻几杖病息草萊世故天禍臣悲主辱露盡朝陽風驚夜燭黃鵠超遙白駒何促事迫歸魂依然啓足悠悠世路辛苦艱虞尋戈滿道暴骨交衢家無半菽絶地飛芻念君桑梓零落凋枯傷君井邑孑戾﨑嶇喪亂絶卜葵藿荒蕪凄涼故友劈摽遺孤臨穴外野撫棺窮途嗚呼哀哉為善豈懼修名難假德履中和道周文雅不朽之迹非謂泉下亹亹清風泠泠獨寫嗚呼哀哉墓志銘廣州刺史歐陽頠墓志公家習尚書少府儒髙於漢册世居渤海太守文重乎晉原中原喪亂避地南徙公孝敬純深友悌敦睦家積遺財並讓諸季兼賙同壤公含章內映逺識沉通窒嗜欲謹言行資貞幹事廉隅梁室不造凶羯憑陵公被鋭凶凶有志匡復梁孝元帝授散騎常侍東衡州刺史始興縣侯而犬戎弒逆宗社播遷陳纂揖讓悠歸髙祖恩加惟舊授使持節都督南衡二十二州諸軍事廣州刺史進為開府儀同三司山陽郡公進號征南將軍加鼓吹一部巫山逺曲喧騎吹於日南芳樹清音肅軍容於海截追贈車騎將軍司空公涉獵六經優遊百氏寬徭省賦化百越之歸心撫寒投醪感三軍之死力在室如賔寧慚屋漏不貪為寶每畏人知殺青無兼兩之疑薏苡豈懷珠之謗如羊似粟不改夷齊之心遺慶流風方留豹産之德特進光祿大夫徐孝穆墓銘耕耘書圃弋獵文場藻思綺合尺牘繡揚辭奔太史筆利干將心緘武庫口定雌黃奉使巡採絶域遐深市朝遷貿陵谷相侵形寄王績名宣攀附髙排閶闔鬱轉雲路年踰致仕齒及懸車夜漏方盡馳光復斜平原出宿庠序為家隴愁宿霧松悲間鳥地回雲低山重樹小九原孤月三泉送旐疇曩行役共上河梁余因病免君事逺將痛心期之徂謝憫時代之銷亡冀鐫石於玄冢留清風於故鄉司農陳暄墓銘其文䯋骫其筆縱橫背碑即誦據馬俄成誹諧見賞調笑忘情兩宫寵官四主恩榮萬事依息一朝追送疇昔命觴文可吟諷今日酹酒長悲且慟中領軍魯廣達墓銘災流淮海險失金湯時屯運極代革天亡瓜牙背義介胄無良獨標忠勇率禦有方誠貫皎日氣勵嚴霜懷恩感報撫事何忘侍中沈欽墓志早結南陽之親致興沛市之役四埏多難三江屢梗君敦淳化以勵澆風庶滌清流以蕩獨俗早遘紫雲萍濡碧海奮里閈之寵躍車馬之貴哂竇氏之青山耻郭家之金穴文羣臣請陳武帝懺文某位某甲稽首和南十方三世一切諸佛十方三世一切尊法十方三世一切賢聖見前大德僧皇帝某菩薩睿哲聰明廣淵齊聖心若虗空照窮般若發𢎞大誓荷負衆生神道會昌膺兹景業百王既季運屬艱難五嶽維塵六軍日動劬勞在念有切皇心既而深悟苦空極言無我寶臺華柱本非實録賊城樓櫓苦具兹多遂坐道場靜居禪室堅固善本具足檀那石璧山河珍車寶馬頭目髓腦妻子國城鑾輅龍章翠帳玉几福德所感威惠所及莫不肅然大捨共養三尊便欲拂衣崆洞髙步六合到林間而宴坐與釋衆而同遊紫微虗宫黃屋曠位上靈聳動厚土怔惶弟子等身纒愛惑業構煩惱天生蒸民樹以司牧惵惵黔首非后罔戴豈容尊居萬乘而伸獨往之情應在帝王而為布衣之事且蠻夷猾夏冦賊姦宄燧人警職日照甘泉之火四郊多壘未肆樓船之威若使七聖遂迷窅然汾水之上八駿沃若方在瑶池之濵則天下何依羣臣莫奉宗社廟堂有廢彛則弟子不勝狼狽之切謹捨如干錢如干物仰嚫三寶大衆奉贖皇帝及諸王所捨悉還本位伏願十方三寶見前大德僧以慈悲力用無礙心坐道放光顯揚宣説歡喜和合超然降許當使皇帝望雲望日之恣與南山等固乃神乃聖之德與北極同尊中宫后妃之星金禎玉幹之戚窮積善之慶盡萬歲之歡玉鑾回鑣金門洞啓百辟翹首搢紳並列願塵勞與雲沴俱銷億兆與天地同泰慊慊丹愚敢以死請弟子某和南樂府雉子斑麥壠新秋來澤雉屢裴徊依花似協妬拂草乍驚媒三春桃照李二月柳爭梅暫住如臯路當令巧笑開隴頭水二首隴頭萬里外天涯四面絶人將蓬共轉水與啼俱咽驚湍自湧沸古樹多催折傳聞博望矦苦辛提漢節霧暗山中日風驚隴上秋徒傷幽咽響不見東西流無期從此别更度幾年幽遙聞玉關道望入杳悠悠折楊栁萬里音塵絶千條楊柳結不悟倡園花遙同羌嶺雪春心自浩蕩春樹聊攀折共此依依情無奈年年别關山月兔月半輪明狐關一路平無期從此别復欲幾年行映光書漢奏分影照胡兵流落今如此長戍受降城洛陽道二首德陽穿洛水伊闕邇河橋仙舟李膺棹小馬王戎鑣杏堂歌吹合槐路風塵饒緑珠含淚舞孫秀強相邀小路平一作臨四達長楸聽五鐘玉節迎司𨽻錦車歸濯龍弦歌聲不息環珮響相從花障蕩舟笑日映下山逢長安道翠蓋乘輕霧金羈照落暉五侯新拜罷七貴早朝歸轟轟紫陌上藹藹紅塵飛日暮延平客風花拂舞衣梅花落二首縹色動風香羅生知巳長妖姬墜馬髻未插江南璫轉袖花粉落春衣共有芳羞作秋胡婦獨採城南桑胡地少春來三年驚落梅偏疑粉蝶散乍似雪花開可憐香氣歇可惜風相催金鐃且莫韻玉笛幸裴徊紫騮馬春草正萋萋蕩婦出空閨識是東方騎猶帶北風嘶揚鞭向柳市細蹀上金堤願君憐織素殘妝尚有啼驄馬驅長城兵氣寒飲馬詎為難暫解青絲轡行歇縷衢鞍白登圍轉急黃河凍不乾萬里朝飛電論功易走丸雨雪曲雨雪隔榆溪從軍度隴西繞障看孤迹依山見馬蹄天寒旗彩壞地暗鼓聲低漫漫愁雲起蒼蒼别路迷劉生劉生負意氣長嘯且裴徊髙一作辨論明秋水命賞陟春臺干戈倜儻用筆硯縱橫才置驛無年限遊俠四方來病婦行窈窕懷貞室風流挾琴婦唯將角枕臥自影啼妝久羞開翡翠帷懶對葡萄酒深悲在縑素託意忘箕帚夫壻府中趨誰能大垂手置酒髙殿上三清傳旨酒柏梁奉歡宴霜雲動玉葉凍水疏金箭羽籥響鐘石流泉灌金殿盛時不再得光景馳如電今日樂相樂綺殿文雅遒玳筵歡趣密鄭熊逶迤舞齊絃窈窕瑟金壘送縹觴玉井沉朱實願此北堂宴長奉南山日簫史曲㺯玉秦家女簫史仙處童來時兔月滿去後鳯樓空密笑開還斂浮聲咽更通相期紅粉色飛向紫煙中詠燕燕于飛應詔二月春暉暉雙燕理毛衣銜花弄藿靡拂葉隱芳菲或在堂前戲多從幕上飛若作仙人履終向日南歸濟黃河蔥山淪外域鹽澤隱遐方兩源分際逺九道𣲖流長未殫所聞見無待驗詞章留連嗟太史惆悵踐黎陽導波縈地節一作脈疏氣耿天潢憫周沈用寶嘉晉肇為梁橫吹笛簫聲鳯臺曲洞吹龍鐘管鏜鎝漁陽摻怨抑胡笳斷怨詩二首採桑歸路河流深憶昔相期柏樹林奈許新縑傷妾意無由故劍動君心新梅嫩柳未障羞情去恩移那可留團扇篋中言不分拾遺作盡纎腰掌上詎勝愁烏棲曲桃李春水木蘭橈金羈翠蓋聚河橋隴西上計應行去城南美人啼著曙東飛伯勞歌南飛烏鵲北飛鴻㺯玉蘭香時會同誰家可憐出窗牖春心百媚勝楊栁銀牀金屋挂流蘇寶鏡玉叉橫珊瑚年時二八新紅臉宜笑宜歌羞更斂風花一去杳不歸秪為無雙惜舞衣雜曲三首行行春徑蘼蕪緑織素那復解琴心乍愜南階悲緑草誰堪東陌怨黃金紅顔素月俱三五夫壻何在今追虜關山隴月春雪冰一作深誰見人啼花照戶殿內一處起金房併玉臺作便勝餘人白玉堂珊瑚挂鏡臨綱户芙蓉作帳照雕梁房櫳宛轉垂翠幕佳麗逶迤隱珠箔風前花管揚難留舞去花鈿低不落陽臺通夢太非真洛浦凌波復不新曲中唯聞張女調一作曲定有同姓可憐人但願私情賜斜領不願傍人相比並妾門逢春自可榮君面未秋何意冷泰山言應可轉移新寵不信更參差合歡錦帶鴛鴦鳥同心綺袖連理枝皎皎新秋明月開早露飛螢暗裏來鯨燈落花殊未盡虬水銀箭莫相催非是神女期河漢别有仙姬入吹臺未眠解著同心結欲醉那堪連理杯後宫不愜茱茰芳夜夜爭開蘇合房寶叉翠鬢還相似朱脣玉面非一行新人未語言如澀新寵無前判不臧願奉更衣蘭麝氣恐君馬到自驚香梅花落臘月正月早驚春衆花未發梅花新可憐芬芳臨玉臺朝攀晚折還復開長安少年多輕簿兩兩共唱梅花落滿酌金巵催玉柱落梅樹下宜歌舞金谷萬株連綺甍梅花密處藏嬌鶯桃李佳人欲相照摘葉一作蘂牽花來並笑楊柳條青樓上輕梅花色白雪中明橫笛短簫凄復切誰知柏梁聲不絶宛轉歌七夕天河白露明八月濤水秋風驚樓中恆聞哀響曲塘上復有辛苦行不解何意悲秋氣直置無秋悲自生不怨前階促織鳴偏愁别路搗衣聲别燕差池自有返離蟬寂寞詎含情雲聚懷清四望臺月冷相思九重觀欲題芍藥詩不成來採芙蓉花巳散金樽送曲韓娥起玉柱調絃楚妃嘆翠睂結恨不復開寶鬢迎秋度前亂湘妃拭淚灑貞筠莢藥浣衣何處人步步香飛金薄履盈盈扇掩珊瑚脣已言採桑期陌上復能解佩就江濵競入華堂要花枕爭開羽帳奉華茵不惜獨眠前下釣欲許便作後來薪後來暝暝同玉牀可憐顔色無比方誰能巧笑特窺井乍取新聲學繞梁宿處留嬌墮黃珥鏡前含笑弄明璫菤葹摘心心不盡茱茰折葉葉更芳已聞能歌洞簫賦詎是故愛邯鄲倡閨怨篇寂寂青樓大道邊紛紛白雪綺窗前池上鴛鴦不獨自帳中蘇合還空然屏風有意障明月燈火無情照獨眠遼西水凍春應少薊北鴻來路幾千願君關山及早度念妾桃李片時妍又蜘蛛作絲滿帳中芳草結葉當行路紅臉脈脈一生啼黃鳥飛飛有時度故人雖故昔經新新人雖新復應故姬人怨天寒海水慣相知空牀明月不相宜庭中芳桂憔悴葉井上疏桐零落葉寒燈作花羞夜短霜鴈多情恆結伴非為隴水望秦川直置思君腸自斷姬人怨服散篇薄命夫壻好神仙逆愁髙飛向紫煙金丹欲成猶百練玉酒新熟幾千年妾家邯鄲好輕薄特忿仙童一丸藥自悲行處緑苔生何悟啼多紅粉落莫輕小婦狎春風羅襪也得步河宫雲車欲駕應相待羽衣未去幸須同不學簫史還樓上會逐姮娥戲月中長相思二首雜言長相思久離别征夫去逺芳音滅湘水深隴頭咽紅羅斗帳裏緑綺清絃絶逶迤百尺樓愁思三秋結長相思久别離春風送燕入簷窺暗開脂粉弄花枝紅樓千愁色玉筋兩行垂心心不相照望望何由知詩秋日侍宴婁苑湖應詔以下五言翠渚還鑾輅瑶池命羽觴千門響雲蹕四澤動榮光玉軸昆池浪金舟太液張虹旗照島嶼鳯蓋繞林塘野靜重陰濶淮秋水氣涼霧開樓闕近日逈煙波長洛宴諒斯在鎬飲詎能方朽劣叨榮遇簮笏奉周行侍宴玄武觀詰曉三春暮新雨百花朝星宫移渡罕天駟動行鑣斾轉蒼龍闕塵飛飲馬橋翠觀迎斜照丹樓望落潮鳥聲雲裏出樹影浪中搖歌吟奉天詠未必待聞韶宴樂修堂應令肅城通甲觀承華啓畫堂北宫降恩賞西園度羽觴殊私奉玉裕終宴在金房庭暉連樹彩簷影接雲光仙如伊水駕樂似洞庭張彈絲命琴瑟吹竹動笙簧庸疏濫應院衰朽恧連章三日侍宴宣遊堂曲水上巳娛春禊芳辰喜月離北宫命簫鼓南館列旌麾繡柱擎飛閣雕軒傍曲池醉魚沉逺岫浮棗漾清漪落花懸度影飛絲不礙枝樹動丹樓出山斜翠磴危禮周羽爵遍樂闋光陰移秋日遊昆明池靈沼蕭條望遊人意緒多終南雲影落渭北雨聲過蟬噪金隄栁鷺飲石鯨波珠來照似月織處寫成河此時一作詎知臨水歎非復採蓮歌秋日登廣州城南樓秋城韻晚笛危榭引清一作凄風逺氣疑埋劒驚禽似避弓海樹一邊出山雲四面通野火初煙細新月半輪空塞外離羣客顔鬢早如蓬徒懷建鄴水復想洛陽宫不及孤飛鴈獨在上林中贈洗馬袁朗别賈誼登朝日終軍對奏年校文升廣內撫劍入崇賢竒才殊艷逸將别更留連驅車命鐃管拱坐面林泉池寒稍下鴈木落久無蟬露浸山扉月霜開石路煙髙談無與慰遲爾報華篇詒孔中丞奐我行五嶺表辭鄉二十年聞鶯欲動詠披霧即依然疇昔同寮宷今隨年代改借問藏書處唯君故人在故人名宦髙霜簡肅權豪誰知懷九歎徒然泣二毛步出東郊望心遊江海上遇物便今古何為不惆悵初晴原野開宿雨潤條枚叢花曙後發一鳥霧中來淹留蘭蕙苑吟嘯芳菲晚忘懷靜躁間自覺風塵逺白社聊可依青山乍採薇鍾牙乃得性語默豈同歸贈賀左丞蕭舍人輶軒通八表旌節騖三秦聽歌酬敏對繼好佇行人賀生思沉鬱蕭弟學紛綸共有筆端譽皆為席上珍離羣徒悄悄征旅日侁侁黃河分太史一曲悲千里海內平生親中朝流寓士痛哉憫梁祚于焉三十祀鍾儀縶不歸盛憲悲何巳隴頭心斷絶爾為參生死回首望長安猶如蜀道難函關分地軸華嶽接天壇行旜方境逝去棹艤江干蘆花霜外白楓葉水前丹翔鷗方怯凍落鴈不勝彈輝輝盛王道時務嬰疲老九流倦耳目十年變懷抱何以敦岐路凄然綴辭藻江南有桂枝塞北無萱草斗酒未為别垂堂深自保遇長安使寄裴尚書傳聞合浦葉逺向洛陽飛北風尚嘶馬南獨不歸去雲目徒送離琴手自揮秋蓬失處所春草屢芳菲太息關山月風塵客子衣别南海賔化矦石關通越井蒲澗邇靈洲此地何遼敻羣英逐逺遊髙才袁彥伯令譽許文休悠焉值君子復此映芳猷崤函多陟澀星琯壯環周分岐泣世道念别傷邊秋斷山時結霧平海若無流驚鷺一羣起哀猿數處愁是日送歸客為情自可求終謝能鳴鴈還同不繫舟其如江海泣惆悵徒離憂庚寅年二月十二日遊虎丘山精舍縱棹憐回曲尋山靜見聞每從方杜性須與俗人分貝塔涵流動花臺偏領芬蒙蘢出簷桂散漫繞窗雲情幽豈徇物志逺易驚羣何由狎魚鳥不願屈玄纁入龍丘巖精舍法堂猶集鴈仙竹幾成龍聊承丹桂馥逺視白雲峯風窗穿石竇月牖拂霜松暗谷留征鳥空林徹夜鐘陰崖未辨色疊樹豈知重溘此哀時命吁嗟世不容無由訪詹尹何去復何從明慶寺十五讀書日六十軒冕年名山極厯覽勝地殊留連幽崖聳絶壁洞穴瀉飛泉金河知證果石室乃安禪夜梵聞三界朝香徹九天山階步皎日澗戶聽涼蟬市朝霑草露淮海作桑田何言望鍾嶺更復切秦川入攝山棲霞寺有序壬寅年十月十八日入攝山棲霞寺登岸極峭頗暢懷抱至德元年癸卯十月二十六日又再遊此寺布法師施菩薩戒甲辰年十月二十五日奉送金像還山限以時務不得恣情淹留乙巳年十一月十六日更獲拜禮仍停山中宿永夜留連棲神悚聽但交臂不停薪指俄謝率製此篇以記即目俾後來賞者知余山志淨心抱冰雪暮齒逼桑榆太息波川迅悲哉人世拘歲華皆採穫冬晚共嚴枯濯流濟八水開襟入四衢兹山靈妙合當與天地俱石瀨乍深淺崖煙遞有無缺碑橫古隧盤木臥荒塗行行備履歷步步轔一作憐威紆髙僧迹共逺勝地心相符樵隱各有得丹青獨不渝遺風佇芳桂比德喻生芻寄言長往客悽然傷鄙夫遊攝山棲霞寺有序禎明元年太歲丁未四月十九日癸亥入攝山展慧布法師憶謝靈運集還故山入石璧中尋曇隆道人有詩一百十一韻今此拙作仍學康樂之體霡霂時雨霽清和孟夏肇棲宿緑野中登頓丹霞杪敬仰髙人德抗志塵物表三空豁巳悟萬有一何小始從情所寄冥期諒不少荷衣步林泉麥氣涼昏曉乘風面泠泠候月臨皎皎煙崖憩古石雲路排征鳥披徑憐森沉攀條惜杳裊平生忘是非朽謝豈矜矯五淨自此涉六塵庶無擾攝山棲霞寺山房夜坐簡徐祭酒周尚書并同遊羣彥澡身事珠戒非是學金丹月磴時橫枕雲崖宿解鞍梵宇調心易禪庭數息難石澗水流靜山窗葉去寒君思北闕駕我惜東都冠翻愁夜鐘盡同志不盤桓靜臥棲霞寺房望徐祭酒絶俗俗無侶修心心自齋連崖夕氣合虗宇宿雲霾臥藤新接戶欹石久成階樹聲非有意禽戲似忘懷故人市朝狎心期林壑乖唯憐對芳杜可以為吾儕營涅槃懴還塗作有序禎明二年仲冬攝山棲霞寺布法師只爾待終余以此月十七日宿昔入山仰為師氏營涅槃懴還途有此作可否同一貫生死亦一條況期滅盡者豈是俗中要人路離羣愴冥期出世遙留連入澗曲宿昔陟巖椒石溜冰便斷松霜日自銷向崖雲靉靆出谷霧飄颻勿言無大隱歸來即是朝至德二年十一月十二日升德施山齋三宿決定罪福懴悔詩四知無矯志二施啓幽心簡通避人物偃息還山林曲澗停騶響交枝落幔陰池臺聚凍雪欄牖噪歸禽石彩無新故峯形詎古今大車何杳杳奔馬遂駸駸何以修六念虔誠在一音未泛慈舟逺徒令願海深詠採甘露應詔祥露曉氛氲上林朝晃朗千行珠樹出萬葉瓊枝長徐輪動仙駕清宴留神賞丹水波濤泛黃山煙霧上風亭翠斾開雲殿朱絃響徒知恩禮洽自憐名實爽借劉太常説文劉棻慕子雲許愼詢景伯碩學該蟲篆竒文秀鳥迹曰余徒下帷待問垂重席不詣王充市聊投班玩籍三寫遍鑽研六書多補益幽居服藥餌山宇生虗白留連嗣芳杜曠蕩依泉石夫君愛滿堂願言馳下澤賦得一日成三賦應令副君睿賞遒清夜北園遊下筆成三賦傳觴對九秋飛文綺縠采落紙波濤流樹密寒蟬響簷暗雀聲愁緑溆明層殿青山照近樓此時盛禮物顧省良若抽攝官梁小廟梁有小廟太祖太夫人廟也非嫡故别立廟侯景寇建鄴詔以總權兼太常卿守小廟疇昔遊依所今日薦櫻時憲章誠有革歲月遂難思故人獨之子官聨更在兹虗簷靜暮雀洞戶映光絲平生復能幾語事必傷悲卞山楚廟蘋藻祈明德倚棹息岩阿忽聼晨雞曙非復楚宫歌間階剃宿膂古木斷懸蘿帷堂寂易晚桴鼓自相和盛祀流百世英威定幾何山庭春日一作休沐山庭洗沐惟五日棲遲在一作對一丘古楂橫近澗危石聳前洲岸緑開河栁池紅照海榴野花寧待晦山蟲詎識秋人生復能幾夜燭非長遊七夕六朝聲偶作柳顧言者非漢曲天榆冷河邊月桂秋婉孌期今夕飄颻渡淺流輪隨列宿動一作轉路逐彩雲浮橫波翻瀉淚束素反緘愁此時機杼息獨向紅粧羞南還尋草市宅紅顔辭鞏洛白首入轘轅乘春行故里除步采芳蓀徑毁悲求仲林殘憶巨源見桐猶識井看柳尚知門花落空難遍鶯啼靜易喧無人訪語默何處敘寒溫百年獨如此傷心豈復論和張記室源傷往一作傷佳人小婦當壚夜夫壻凱歸年正歌千里曲翻入九重泉機中未斷素琴上本留絃空帳臨窗掩孤燈向壁然還悲寒隴曙松短未生煙在陳旦解酲共哭顧舍人一作傷顧野王獨酌一樽酒髙詠七哀詩何言蒿里别非復竹林期階荒鄭公草戶閴董生帷人隨暮一作朝槿落客共晚鶯悲年髮兩如此傷心詎一作獨幾時侍宴臨芳殿六朝聲偶作柳顧言者非鍾箭自一作且徘徊皇堂薦羽杯橋平疑水落石逈見山開林前暝色靜花處近香來西嵫傷撫夕北閣濫遊陪侍宴瑶泉殿水亭通枍詣石路接堂皇野花不識采旅竹本無行雀驚疑欲曙蟬噪似含涼何言金殿側亟奉瑶池觴别袁昌州二首河梁望隴頭分手路悠悠徂年若驚電别日欲成秋黃鵠飛飛逺青山去去愁不言雲雨散更似東西流客子歎途窮此别異西東關山嗟墜葉岐路憫征蓬别鶴聲聲逺愁雲處處同經始興廣果寺題愷法師山房息舟候香埠悵别在寒林竹近交枝亂山長絶徑深輕飛入定影落照有疏陰不見投雲狀空留折桂心和衡陽殿下髙樓看妓起樓侵碧漢初日照紅妝絃心艷卓女曲誤動周郎並歌時轉黛息舞暫分香挂纓銀燭下莫笑玉叉長賦得空閨怨蕩妻怨獨守盧姬傷獨居瑟上調絃落機中織素餘自羞淚無燥翻覺夢成虗復嗟長信閣寂寂往來疏並州羊腸坂三春别帝鄉五月度羊腸本畏車輪折翻嗟馬骨傷驚風起朔鴈落照盡胡桑關山定何許徒御慘悲涼歲暮還宅悒然想泉石驅駕出城臺玩竹春前筍驚花雪後梅青山殊可對黃卷復時開長繩豈繫日濁酒傾一杯春夜山庭春夜芳時晚幽庭野氣深山疑刻削意樹接縱橫陰戶對忘憂草池驚旅浴禽樽中良得性物外知余心夏日還山庭獨於幽棲地山庭暗女蘿澗漬長低篠池開半卷荷野花朝暝落盤根歲月多停樽無賞慰狎鳥自輕過賦得謁帝承明廬霧開仁壽殿雲繞承明廬輪停紺幰引馬度紅塵餘香貂拜黻衮花綬拂玄除謁帝升清漢何殊入紫虛賦得携手上河梁應詔早秋天氣涼分手關山長雲愁數處黑木落幾枝黃鳥歸猶識路流去不知鄉秦川心斷絶何悟是河梁賦得泛泛水中鳬歸鳬沸卉同亂下芳塘中出沒時銜藻飛鳴忽揚風浮深或不息戲廣若乘空春鸚徒有賦還笑在金籠賦得三五明月滿三五兔輝成浮陰冷復輕隻輪非戰反團扇少歌聲雲前來往色水上動搖明況復髙樓照何嗟攬不盈衡州九日秋日正凄凄茅茨復蕭瑟姬人薦初醖幼子問殘疾園菊抱黃華庭榴割珠實聊以著書情暫遣他鄉日賦詠得琴可憐嶧陽木雕為緑綺琴田文垂睫淚卓女弄絃心戲鶴聞應舞遊魚聽不沉楚妃幸勿歎此異丘中吟一作音詠雙闕象闕連馳道天一作月宇照芳疏刻鳯棲清漢圖龍入紫虗屢逢膏露灑幾遇祥煙初競言百尺麗寧方萬丈餘三善殿夜望山燈六朝聲偶作柳顧言者非百花疑吐夜四照似含春的的連星出亭亭向日新採珠非合浦贈珮異江濵若任扶桑路堪言並日輪奉和東宫經故妃舊殿故殿看看冷空階步步悲猶憶窺窗處還如解佩時苔生無意早燕入有言遲若令歸就月照見不須疑同庾信答林法師藝文作周𢎞正非客行七十嵗歲暮逺徂征塞雲凝不解隴水凍無聲君看日逺征為忖長安城詠李嘉樹春風早春風花落新但見成蹊處幾得正冠人當知露井側復與夭桃鄰詠蟬白露涼風吹朱明落照移鳴條噪林柳流響遍臺池村聲如易得尋忽却難知答王筠早朝守建陽門開金兔猶懸魄銅龍欲啓扉三條息行火百雉照初暉御溝槐影出仙掌露光晞闕侍宴賦得起坐彈鳴琴絲傳園客意曲奏楚妃情罕有知音者空勞流水聲别永新矦詩彚作張正見者非送君張掖郡分悲函谷關欲知腸斷絶浮雲去不還春日水苔宜溜色山櫻助落暉浴鳥沉還戲飄花度不歸於長安歸還揚州九月九日行薇山亭賦韻心逐南雲逝形隨北鴈來故鄉籬下菊今日幾花開哭魯廣逹南史曰廣達陳之良將也至德二年為侍中中領軍賀若弼進軍鍾山廣逹力戰及韓擒虎乘勝破宫城廣違被執入隋以憤慨卒江總撫柩慟哭題其棺曰黃泉雖抱恨白日自留名悲君感義死不作負恩生秋日新寵美人應令以下七言後宫唯聞莫瓊樹絶世復有宋容華皆自爭名進女弟定覺雙飛勝蕩家願並迎春比翼燕常作照日同心花聞道艷歌時易調忖許新恩那久要翠睂未畫自生愁玉臉含啼還似笑角枕千嬌薦芬香若使琴心一曲奏幽蘭度曲不可終陽臺夢裏自應通秋樹相思一枝緑為插賤妾兩鬟中新入姬人應令洛浦流風漾淇水秦樓初日度陽臺玉軑輕輪五香散金燈夜火百花開非是妖姬度江日定言神女隔河來來時向月别姮娥别時清吹悲簫史數錢拾翠爭佳麗拂紅點黛何相似本持纎腰惑楚宫暫回舞袖驚吳市新人羽帳挂流蘇故人網戶織蜘蛛梅花柳色春難遍情來春去在須臾不用庭中賦緑草但願思著弄明珠內殿賦新詩兔影脈脈照金鋪虬水滴滴瀉玉壺綺翼雕甍邇清漢虹梁紫一作桂柱麗黃圖風高暗緑凋殘柳雨駛芳紅濕晚芙三五二八佳年少百萬千金買歌笑遍著故人織素詩願奏秦聲采蓮調織女今夕渡銀河當見新秋停玉梭漢魏六朝百三家集卷一百五
