body:
  text: 漢魏六朝百三家集巻十一漢班固集題詞安陵班叔皮清淨守道有二令子孟堅文章領著作仲升武節威西域天下之竒在其一門漢世無比仲升功名抜傅介子張騫以上孟堅晩節竟蹶不起亡時與蔡中郎同年又以竇氏賔客為洛陽种令所捕繫頓辱更甚私心痛其才同厥考而志耻薄宦冒進失當不若望都長優游以終也叔皮專心史籍欲撰漢史孟堅踵就其業為人誣訟䧟身獄網仲升馳闕分明轉禍為福危哉漢書之得成更兩世閱變故如是其不易也兩都倣上林賔戲儗客難典引居封禪美新之間大體取象前型制以心極而師覆徒奔反在燕然片石夫惟大雅既明且哲豈孟堅亦讀而未之詳乎目録賦兩都賦有序幽通賦終南山賦覽海賦遊居賦竹扇賦表為第五倫薦謝夷吾表奏記奏記東平王蒼牋與竇憲牋又又又又又書與弟超書又又又又又又又又與陳文通書議匈奴和親議符命典引有序註蔡邕設難答賓戲有序頌竇車騎北征頌東巡頌南巡頌銘封燕然山銘髙祖沛泗水亭碑銘十八侯銘鄼侯蕭何將軍舞陽侯樊噲將軍留侯張良太尉綘侯周勃將軍平陽侯曹參丞相户牖侯陳平南宫侯張敖衛尉曲陽侯酈商將軍潁陽侯灌嬰將軍汝隂侯夏嬰將軍陽陵侯傅寛將軍信武侯靳歙丞相安國侯王陵將軍襄平侯韓信將軍棘津侯陳武曲成侯蟲達御史大夫汾隂侯周昌將軍青陽侯王吸論難莊論功徳論哀辭馬仲都哀辭連珠擬連珠五首文奕㫖詩郊祀靈芝歌詠史竹扇詩漢魏六朝百三家集巻十一目録欽定四庫全書漢魏六朝百三家集巻十一明張溥輯漢班固集賦兩都賦有序或曰賦者古詩之流也昔成康沒而頌聲寢王澤竭而詩不作大漢初定日不暇給至於武宣之世乃崇禮官考文章内設金馬石渠之署外興樂府協律之事以興廢繼絶潤色鴻業是以衆庶説豫福應尤盛白麟赤鴈芝房寶鼎之歌薦於郊廟神雀五鳳甘露黄龍之瑞以為年紀故言語侍從之臣若司馬相如虞丘壽王東方朔枚臯王褒劉向之屬朝夕論思日月獻納而公卿大臣御史大夫倪寛太常孔臧大中大夫董仲舒宗正劉德太子太傅蕭望之等時時間作或以抒下情而通諷諭或以宣上德而盡忠孝雍容揄揚著於後嗣抑亦雅頌之亞也故孝成之世論而録之蓋奏御者千有餘篇而後大漢之文章炳焉與三代同風且夫道有夷隆學有麄宻因時而建德者不以逺近易則故臯陶歌虞奚斯頌魯同見采於孔氏列於詩書其義一也稽之上古則如彼考之漢室又如此斯事雖細然先臣之舊式國家之遺美不可闕也臣竊見海内清平朝廷無事京師修宫室浚城隍而起苑囿以備制度西土耆老感懐怨思冀上之睠顧而盛稱長安舊制有陋洛邑之議故臣作兩都賦以極衆人之所眩矅折以今之法度辭曰西都賦有西都賔問於東都主人曰葢聞皇漢之初經營也嘗有意乎都河洛矣輟而弗康寔用西遷作我上都主人聞其故而覩其制乎主人曰未也願賔攄懷舊之蓄念發思古之幽情博我以皇道𢎞我以漢京賔曰唯唯漢之西都在於雍州寔曰長安左據函谷二崤之阻表以大華終南之山右界褒斜隴首之險帶以洪河涇渭之川衆流之隈汧湧其西華實之毛則九州之上腴焉防禦之阻則天地之隩區焉是故横被六合三成帝畿周以龍興秦以虎視及至大漢受命而都之也仰悟東井之精俯協河圖之靈奉春建策留侯演成天人合應以發皇明乃眷西顧寔惟作京於是睎秦嶺睋北阜挾灃㶚據龍首圖皇基於億載度宏規而大起肇自髙而終平世增飾以崇麗厯十二之延祚故窮奢而極侈建金城之萬雉呀周池而成淵披三條之廣路立十二之通門内則街衢洞逹閭閻且千九市開場貨别隧分人不得顧車不得旋闐城溢郭旁流百廛紅塵四合煙雲相連於是既庶且富娛樂無疆都人士女殊異乎五方遊士擬於公侯列肆侈於姬姜鄉曲豪舉遊俠之雄節慕原嘗名亞春陵連交合衆騁騖乎其中若乃觀其四郊浮遊近縣則南望杜霸北眺五陵名都對郭邑居相承英俊之域紱冕所興冠葢如雲七相五公與乎州郡之豪傑五都之貨殖三選七遷充奉陵邑葢以强幹弱枝隆上都而觀萬國封畿之内厥土千里逴躒諸夏兼其所有其陽則崇山隐天幽林穹谷陸海珍藏藍田美玉商陸縁其隈鄠杜濵其足源泉灌注陂池交屬竹林果園芳草甘木郊野之富號為近蜀其隂則冠以九嵕陪以甘泉乃有靈宫起乎其中秦漢之所極觀淵雲之所頌歎於是乎存焉下有鄭白之沃衣食之源提封五萬疆埸綺紛溝塍刻鏤原隰龍鱗決渠降雨荷鍤成雲五榖垂穎桑麻鋪棻東郊則有通溝大漕潰渭洞河泛舟山東控引淮湖與海通波西郊則有上囿禁苑林麓藪澤陂池連乎蜀漢繚以周墻四百餘里離宫别館三十六所神池靈沼徃徃而在其中乃有九真之麟大宛之馬黄支之犀條枝之鳥踰崐崘越巨海殊方異類至于三萬里其宫室也體象乎天地經緯乎隂陽據坤靈之正位放太紫之圓方樹中天之華闕豐冠山之朱堂因瓌材而究竒抗應龍之虹梁列棼橑以布翼荷棟桴而髙驤雕玉瑱以居楹裁金璧以飾璫發五色之渥彩光爓朗以景彰於是左墄右平重軒三階閨房周通門闥洞開列鐘虡於中庭立金人於端闈仍增崖而衡閾臨峻路而啓扉狥以離宫别寢承以崇臺閒館煥若列宿紫宫是環清凉宣温神仙長年金華玉堂白虎麒麟區宇若兹不可殫論增盤業峨登降炤爛殊形詭制每各異觀乘茵步輦惟所息宴後宫則有掖庭椒房后妃之室合歡增成安處常寧􅉅若椒風披香發越蘭林蕙草鴛鸞飛翔之列昭陽特盛隆於孝成屋不呈材墻不露形裛以藻繡絡以綸連隨侯明月錯落其間金釭銜璧是為列錢翡翠火齊流耀含英懸黎垂棘夜光在焉於是𤣥墀釦砌玉階彤庭碝磩綵緻琳珉青熒珊瑚碧樹周阿而生紅羅颯纚綺組繽紛精曜華爥俯仰如神後宫之號十有四位窈窕繁華更盛迭貴處乎斯列者葢以百數左右庭中朝堂百寮之位蕭曹魏邴謀謨乎其上佐命則垂統輔翼則成化流大漢之愷悌蕩亡秦之毒螫故令斯人揚樂和之聲作畫一之歌功德著乎祖宗膏澤洽乎黎庶又有天禄石渠典籍之府命夫惇誨故老名儒師傅講論乎六藝稽合乎同異又有承明金馬著作之庭大雅宏達於茲為羣元元本本殫見洽聞啓發篇章校理秘文周以鉤陳之位衛以嚴更之署總禮官之甲科羣百郡之㢘孝虎賁贅衣閹尹閽寺陛㦸百重各有典司周廬千列徼道綺錯輦路經營修塗飛閣自未央而連桂宫北彌明光而亘長樂陵墱道而超西墉掍建章而連外屬設璧門之鳳闕上觚棱而棲金爵内則别風嶕嶢𦕈麗巧而聳擢張千門而立萬户順隂陽以開闔爾乃正殿崔巍層搆厥髙臨乎未央經駘盪而出馺娑洞枍詣以與天梁上反宇以蓋戴激日景而納光神明鬰其特起遂偃蹇而上躋軼雲雨於大半虹霓廻帶於棼楣雖輕迅與僄狡猶愕貽而不能階攀井幹而未半目眩轉而意迷捨櫺檻而却倚若顛墜而復稽魂怳怳以失度廵迴途而下低既懲懼於登望降周流以彷徨步甬道以縈紆又杳窱而不見陽排飛闥而上出若遊目於天表似無依而洋洋前唐中而後太液覽滄海之湯湯揚波濤於碣石激神岳之嶈嶈濫瀛洲與方壺蓬萊起乎中央於是靈草冬榮神木叢生巖峻崷崪金石崢嶸抗仙掌以承露擢雙立之金莖軼埃壒之混濁鮮顥氣之清英騁文成之丕誕馳五利之所刑庶松喬之羣類時遊從乎斯庭實列仙之攸館非吾人之所寧爾乃盛娯遊之壯觀奮大武乎上囿因兹以威戎夸狄耀威靈而講武事命荆州使起鳥詔梁野而驅獸毛羣内闐飛羽上覆接翼側足集禁林而屯聚水衡虞人修其營表種别羣分部曲有署罘網連紘籠山絡野列卒周匝星羅雲布於是乘鑾輿備法駕帥羣臣披飛㢘入苑門遂繞酆鄗厯上蘭六師發逐百獸駭殫震震爚爚雷奔電激草木塗地山淵反覆蹂躪其十二三乃拗怒而少息爾乃期門佽飛列刃攢鍭要趹追蹤鳥驚觸絲獸駭值鋒機不虚掎弦不再控矢不單殺中必疊雙颮颮紛紛矰繳相纒風毛雨血灑野蔽天平原赤勇士厲猨狖失木豺狼懾竄爾乃移師趨險竝蹈濳穢窮虎奔突狂兕觸蹶許少施巧秦成力折掎僄狡扼猛噬脱角挫脰徒摶獨殺挾師豹拖熊螭曳犀犛頓象羆超洞壑越峻崖蹶嶃巖巨石頽松柏仆叢林摧草木無餘禽獸殄夷於是天子乃登屬玉之館厯長楊之榭覽山川之體勢觀三軍之殺獲原野蕭條目極四裔禽相鎮壓獸相枕藉然後收禽㑹衆論功賜胙陳輕騎以行炰騰酒車以斟酌割鮮野食舉烽命爵饗賜畢勞逸齊大輅鳴鑾容與徘徊集乎豫章之宇臨乎昆明之池左牽牛而右織女似雲漢之無涯茂樹䕃蔚芳草被隄蘭茝發色煜煜猗猗若摛錦與布繡爥燿乎其陂鳥則𤣥鶴白鷺黄鵠鵁鸛鶬鴰鴇鶂鳬鷖鴻鴈朝發河海夕宿江漢沈浮徃來雲集霧散於是後宫乗輚輅登龍舟張鳳葢建華旗祛黼帷鏡清流靡微風澹淡浮櫂女謳鼓吹震聲激越謍厲天鳥羣翔魚窺淵招白鷴下雙鵠投文竿出比目撫鴻罿御矰繳方舟竝鶩俛仰極樂遂乃風舉雲揺浮遊溥覽前乘秦嶺後越九嵕東薄河華西渉岐雍宫館所厯百有餘區行止朝夕儲不改供禮上下而接山川究休佑之所用采遊童之歡謡第從臣之嘉頌於斯之時都都相望邑邑相屬國藉十世之基家承百年之業士食舊德之名氏農服先疇之畎畆商循族世之所鬻工用髙曾之規矩粲乎隱隱各得其所若臣者徒觀迹於舊墟聞之乎故老十分未得其一端故不能徧舉也東都賦東都主人喟然而歎曰痛乎風俗之移人也子實秦人矜夸館室保界河山信識昭襄而知始皇矣烏覩大漢之云為乎夫大漢之開元也奮布衣以登皇位由數朞而創萬代葢六籍所不能談前聖靡得而言焉當此之時攻有横而當天討有逆而順民故婁敬度勢而獻其説蕭公權宜而拓其制時豈泰而安之哉計不得以已也吾子曾不是睹顧曜後嗣之末造不亦暗乎今將語子以建武之治永平之事監于太清以變子之惑志往者王莽作逆漢祚中缺天人致誅六合相滅于時之亂生民幾亡鬼神泯絶壑無完柩郛㒺遺室原野厭人之肉川谷流人之血秦項之災猶不克半書契以來未之或紀故下人號而上訴上帝懐而降監乃致命乎聖皇於是聖皇乃握乾符闡坤珍披皇圖稽帝文赫然發憤應若興雲霆擊昆陽憑怒雷震遂超大河跨北嶽立號髙邑建都河洛紹百王之荒屯因造化之盪滌體元立制繼天而作系唐統接漢緒茂育羣生恢復疆宇勲兼乎在昔事勤乎三五豈特方軌竝跡紛綸后辟治近古之斫務蹈一聖之險易云爾哉且夫建武之元天地革命四海之内更造夫婦肇有父子君臣初建人倫寔始斯乃伏羲氏之所以基皇德也分州土立市朝作舟輿造器械斯乃軒轅氏之所以開帝功也龔行天罸應天順人斯乃湯武之所以昭王業也遷都改邑有殷宗中興之則焉即土之中有周成隆平之制焉不階尺土一人之柄同符乎髙祖克已復禮以奉終始允恭乎孝文憲章稽古封岱勒成儀炳乎世宗按六經而校德𦕈古昔而論功仁聖之事既該而帝王之道備矣至於永平之際重熈而累洽盛三雍之上儀脩衮龍之法服鋪鴻藻信景鑠揚世廟正雅樂人神之和允洽羣臣之序既肅乃動大輅遵皇衢省方巡狩窮覽萬國之有無考聲教之所被散皇明以爥幽然後增周舊脩洛邑扇巍巍顯翼翼光漢京于諸夏總八方而為之極是以皇城之内宫室光明闕庭神麗奢不可踰儉不能侈外則因原野以作苑順流泉而為沼發蘋藻以濳魚豐圃草以毓獸制同乎梁騶誼合乎靈囿若乃順時節而蒐狩簡車徒以講武則必臨之以王制考之以風雅歴騶虞覽駟驖嘉車攻采吉日禮官整儀乘輿乃出於是發鯨魚鏗華鐘登玉輅乘時龍鳳葢棽麗和鸞玲瓏天官景從祲威盛容山靈䕶野屬御方神雨師泛灑風伯清塵千乘雷起萬騎紛紜元戎竟野戈鋋彗雲羽旄掃霓旌旗拂天焱焱炎炎揚光飛文吐爓生風欱野歕山日月為之奪明丘陵為之揺震遂集乎中囿陳師案屯駢部曲列校隊勒三軍誓將帥然後舉烽伐鼓申令三驅輕車霆激驍騎電騖由基發射范氏施御弦不睼禽轡不詭遇飛者不及翔走者不及去指顧倐忽獲車已實樂不極盤殺不盡物馬踠餘足士怒未㳿先驅復路屬車按節於是薦三犠效五牲禮神祗懐百靈覲明堂臨辟雍揚緝熈宣皇風登靈臺考休徵俯仰乎乾坤參象乎聖躬目中夏而布德瞰四裔而抗稜西盪河源東澹海漘北動幽崖南曜朱垠殊方别區界絶而不隣自孝武之所不征孝宣之所未臣莫不陸讋水慄奔走而來賔遂綏哀牢開永昌春王三朝㑹同漢京是日也天子受四海之圖籍膺萬國之貢珍内撫諸夏外綏百蠻爾乃盛禮興樂供帳置乎雲龍之庭陳百僚而贊羣后究皇儀而展帝容於是庭實千品㫖酒萬鍾列金罍班玉觴嘉珍御太牢饗爾乃食舉雍徹太師奏樂陳金石布絲竹鐘鼓鏗鍧管絃煒煜抗五聲及六律歌九功舞八佾韶舞備泰古畢四夷間奏德廣所極僸佅兠離㒺不具集萬樂備百禮暨皇歡浹羣臣醉降烟煴調元氣然後撞鐘告罷百寮遂退於是聖上覩萬方之歡娛又沐浴於膏澤懼其侈心之將萌而怠於東作乃申舊章下明詔命有司班憲度昭節儉示太素去後宫之麗飾損乘輿之服御抑工商之淫業興農桑之盛務遂令海内棄末而反本背偽而歸真女脩織絍男務耕耘器用陶匏服尚素𤣥恥纎靡而不服賤竒麗而不珍捐金於山沈珠於淵於是百姓滌瑕盪穢而鏡至清形神寂寞耳目不營嗜慾之源滅亷恥之心生莫不優游而自得玉潤而金聲是以四海之内學校如林庠序盈門獻酬交錯爼豆莘莘下舞上歌蹈德詠仁登降飫宴之禮既畢因相與嗟歎𤣥德讜言𢎞説咸含和而吐氣頌曰盛哉乎斯世今論者但知誦虞夏之書詠殷周之詩講羲文之易論孔氏之春秋罕能精古今之清濁究漢德之所由唯子頗識舊典又徒馳騁乎末流温故知新已難而知德者鮮矣且夫僻界西戎險阻四塞脩其防禦孰與處乎土中平夷洞達萬方輻凑秦嶺九嵕涇渭之川曷若四瀆五嶽帶河泝洛圖書之淵建章甘泉館御列仙孰與靈臺明堂統和天人太液昆明鳥獸之囿曷若辟雍海流道德之富游俠踰侈犯義侵禮孰與同履法度翼翼濟濟子徒習秦阿房之造天而不知京洛之有制識函谷之可關而不知王者之無外主人之辭未終西都賔矍然失容逡巡降階然意下捧手欲辭主人曰復位今將授子五篇之詩賔既卒業乃稱曰美哉乎斯詩義正乎揚雄事實乎相如匪唯主人之好學葢乃遭遇乎斯時小子狂簡不知所裁既聞正道請終身而誦之其詩曰明堂詩於昭明堂明堂孔陽聖皇宗祀穆穆煌煌上帝宴饗五位時序誰其配之世祖光武普天率土各以其職猗歟緝熈允懐多福辟雍詩乃流辟雍辟雍湯湯聖皇莅止造舟為梁皤皤國老乃父乃兄抑抑威儀孝友光明於赫太上示我漢行洪化惟神永觀厥成靈臺詩乃經靈臺靈臺既崇帝勤時登爰考休徵三光宣精五行布序習習祥風祁祁甘雨百榖蓁蓁庶草蕃廡屢惟豐年於皇樂胥寶鼎詩嶽脩貢兮川效珍吐金景兮歊浮雲寶鼎見兮色紛紜煥其炳兮被龍文登祖廟兮享聖神昭靈德兮彌億年白雉詩啓靈篇兮披瑞圖獲白雉兮效素烏嘉祥阜兮集皇都發皓羽兮奮翹英容潔朗兮於淳精彰皇德兮侔周成永延長兮膺天慶幽通賦系髙頊之𤣥胄兮氏中葉之炳靈颻凱風而蟬蜕兮雄朔野以颺聲皇十紀而鴻漸兮有羽儀於上京巨滔天而泯夏兮考遘愍以行謡終保已而貽則兮里上仁之所廬懿前烈之純淑兮窮與達其必濟咨孤䝉之𦕈𦕈兮將圯絶而㒺階豈余身之足殉兮違世業之可懐靖濳處以永思兮經日月而彌逺匪黨人之敢拾兮庶斯言之不玷魂焭焭與神交兮精誠發於宵寐夢登山而逈眺兮覿幽人之髣髴攬葛藟而授余兮眷峻谷曰勿墜䀛昕寤而仰思兮心矇矇猶未察黄神邈而靡質兮儀遺讖以臆對曰乘髙而遌神兮道遐通而不迷葛緜緜於樛木兮詠南風以為綏葢惴惴之臨深兮乃二雅之所祗既訊爾以吉象兮又申之以炯戒盍孟晉以迨羣兮辰儵忽其不再承靈訓其虗徐兮佇盤桓而且俟惟天地之無窮兮鮮生民之晦在紛屯邅與蹇連兮何艱多而知寡上聖迕而後拔兮豈羣黎之所禦昔衛叔之御昆兮昆為寇而䘮予管彎弧欲斃讎兮讎作后而成已變化故而相詭兮孰云預其終始雍造怨而先賞兮丁因惠而被戮栗取弔于由吉兮王膺慶於所蹙叛迴穴其若兹兮北叟頗識其倚伏單治裏而外凋兮張脩襮而内逼聿中和為庶幾兮顏與冉又不得溺招路以從已兮謂孔氏猶未可安慆慆而不萉兮卒隕身乎世禍遊聖門而靡救兮雖覆醢其何補固行行其必凶兮免盗亂為頼道形氣發于根柢兮柯葉彚而靈茂恐㒺兩之責影兮羌未得其云已黎淳耀于髙辛兮芊彊大於南汜嬴取威於百儀兮姜本支乎三趾既仁得其信然兮仰天路而同軌東鄰虐而殲仁兮王合位乎三五戎女烈而䘮孝兮伯徂歸於龍虎發還師以成命兮重醉行而自耦震鱗漦于夏庭兮匝三正而滅姬巽羽化乎宣宫兮彌五辟而成災道修長而世短兮夐㝠黙而不周胥仍物而鬼諏兮乃窮宙而達幽媯巢姜於孺筮兮旦筭祀于契龜宣曹興敗於下夢兮魯衛名諡於銘謡妣聆呱而劾石兮許相理而鞠條道混成而自然兮術同原而分流神先心以定命兮命隨行以消息斡流遷其不濟兮故遭罹而贏縮三欒同于一體兮雖移易而不忒洞參差其紛錯兮斯衆兆之所惑周賈盪而貢憤兮齊死生與禍福抗爽言以矯情兮信畏犠而忌鵩所貴聖人之至論兮順天性而斷誼物有欲而不居兮亦有惡而不避守孔約而不貳兮乃輶德而無累三仁殊於一致兮夷惠異而齊聲木偃息以蕃魏兮申重繭以存荆紀焚身以衛上兮皓頥志而弗傾候草木之區别兮茍能實其必榮要沒世而不朽兮乃先民之所程觀天網之紘覆兮實棐諶而相訓謨先聖之大猷兮亦隣德而助信虞韶美而儀鳳兮孔忘味於千載素文信而底麟兮漢賔祚於異代精通靈而感物兮神動氣而入微養流睇而猿號兮李虎發而石開非精誠其焉通兮茍無實其孰信操末伎猶必然兮矧耽躬於道真登孔昊而上下兮緯羣龍之所經朝貞觀而夕化兮猶諠已而遺形若𦙍彭而偕老兮訴來哲而通情亂曰天造草昧立性命兮復心𢎞道惟賢聖兮渾元運物流不處兮保身遺名民之表兮舍生取誼亦道用兮憂傷夭物忝莫痛兮皓爾太素曷渝色兮尚越其幾淪神域兮終南山賦伊彼終南巋嶻嶙囷槩青宫觸紫宸嶔崟鬱律萃于霞芬曖㬣晻靄若鬼若神傍吐飛瀬上挺修林元泉落落密隂沉沉榮期綺季此焉恬心三春之季孟夏之初天氣肅清周覽八隅皇鸞鸑鷟警乃前驅爾其珍恠碧玉挺其阿密房澑其巔翔鳳哀鳴集其上清水泌流注其前彭祖宅以蟬蜕安期饗以延年唯至德之為美我皇應福以來臻掃神壇以告誠薦珍馨以祈仙嗟兹介福永終億年覽海賦余有事於淮浦覽滄海之茫茫悟仲尼之乘桴聊從容而遂行馳鴻瀬以漂騖翼飛風而迴翔顧百川之分流煥爛漫以成章風波薄其裔裔邈浩浩以湯湯指日月以為表索方瀛與壺梁曜金璆以為闕次玉石而為堂蓂芝列於階路涌醴漸於中唐朱紫彩潤明珠夜光松喬坐於東序王母處於西廂命韓衆與岐伯講神篇而校靈章願結旅而自託因離世而髙遊騁飛龍之驂駕厯八極而迴周遂竦節而響應忽輕舉以神浮遵霓霧之掩蕩登雲塗以凌厲乘虚風而體景超太清以增逝麾天閽以啓路闢閶闔而望余通王謁於紫宫拜太乙而受符遊居賦夫何事於冀州聊託公以遊居厯九土而觀風亦哲人之所虞遂發軫於京洛臨孟津而北厲想尚父之威武號蒼兕而明誓既中流而歎息美周武之知性謀人神以動作亯烏魚之瑞命瞻淇澳之園林善緑竹之猗猗望常山之峩峩登北嶽而髙遊嘉孝武之乾乾親飾躬於伯姬建封禪於岱宗瘞𤣥玉於此丘徧五岳與四瀆觀滄海以周流鄙臣恨不及事陪後乘之下僚今匹馬之獨征豈斯樂之足娛且休精於敝邑聊卒嵗以須㬰竹扇賦青青之竹形兆直妙華長竿紛寔翼杳篠叢生於水澤疾風時時紛蕭颯削為扇翣成器美託御君王供時有度量異好有圓方來風辟暑致清凉安體定神達消息百王傳之賴功力壽考康寧累萬億表為第五倫薦謝夷吾表臣聞堯登稷契治隆太平舜用皋陶政致雍熈殷周雖有髙宗昌發之君猶賴傅説吕望之策故能克崇其業允恊大中竊見鉅鹿太守㑹稽謝夷吾出自東州厥土塗泥而英資挺特竒偉秀出才兼四科行包九德仁足濟時知周萬物加以少膺儒雅韜含六籍推考星度綜校圖録探賾聖秘觀變厯徵占天知地與神合契據其道德以經王務昔為陪𨽻與臣從事奮忠義之操躬史魚之節董臣嚴剛朂臣懦弱得以免戾寔賴厥勲及其應選作宰惠敷百里降福彌異流化若神爰牧荆州威行邦國奉法作政有周召之風居儉履約紹公儀之操尋功簡能為外臺之表聴聲察實為九伯之冠遷守鉅鹿政合時雍德量績謀有伊吕管晏之任闡𢎞道奥同史蘇京房之倫雖宻勿在公而身出心隠不殉名以求譽不馳騖以要寵念存遜遁演志箕山方之古賢實有倫序採之於今超然絶俗誠社稷之元龜大漢之棟甍宜當拔擢使登鼎司上令三辰順軌於厯象下使五品咸訓於嘉時必致休徵克昌之慶非徒循法奉職而已臣以頑駑器非其儔尸禄負乗夕惕若厲願乞骸骨更授夷吾上以光七曜之明下以厭率土之望庶令微臣塞咎免悔奏記奏記東平王蒼將軍以周召之德立乎本朝承休明之䇿建威靈之號昔在周公今也將軍詩書所載未有三此者也傳曰必有非常之人然後有非常之事有非常之事然後有非常之功固幸得生於清明之世豫在視聽之末私以螻螘竊觀國政誠美將軍擁千載之任躡先聖之蹤體𢎞懿之姿據髙明之埶博貫庶事服膺六蓺白黑簡心求善無厭採擇狂夫之言不逆負薪之議竊見幕府新開廣延羣俊四方之士顛倒衣裳將軍宜詳唐殷之舉察伊皋之薦令逺近無偏幽隱必達期於總攬賢才收集明智為國得人以寧本朝則將軍養志和神優游廟堂光名宣於當世遺烈著於無窮竊見故司空掾桓梁宿儒盛名冠德州里七十從心行不踰矩葢清廟之光輝當世之俊彦也京兆祭酒晉馮結髮修身白首無違好古樂道𤣥黙自守古人之美行時俗所莫及扶風掾李育經明行著教授百人客居杜陵茅室土階京兆扶風二郡更請徙以家貧數辭病去温故知新論議通明亷清修潔行能純備雖前世名儒國家所器韋平孔翟無以加焉宜令考績以叅萬事京兆督郵郭基孝行著於州里經學稱於師門政務之績有絶異之效如得及明時秉事下僚進有羽翮奮翔之用退有杞梁一介之死凉州從事王雍躬卞嚴之節文之以術藝凉州冠葢未有宜先雍者也古周公一舉則三方怨曰奚為而後已宜及府開以慰逺方𢎞農功曹史殷肅達學洽聞才能絶倫誦詩三百奉使專對此六子者皆有殊行絶才德隆當世如䝉徵納以輔髙明此山梁之秋夫子所為歎也昔卞和獻寳以離斷趾靈均納忠終於沈身而和氏之璧千載垂光屈子之篇萬世歸善願將軍隆照微之明信日昃之聽少屈威神咨嗟下問令塵埃之中永無荆山汨羅之恨殷肅固集作段六子惟李育見後漢儒林傳育字元春扶風漆人仕為博士選侍中擁一作膺斷趾作折趾沈身下一有已字歸善一作彌章牋與竇憲牋六首今月中舍以令賜固刀把曰此大將軍少小時所服今賜固伏念大恩且喜且慙又將軍哀憐賜以玉躬所喜駭犀玳瑁簮絳單衣以魯縞之質被服鸞鳳之彩飾尺牘遺鳳字又將軍哀憐賜固手迹告以中軍宜鮮明乃賜以瑇瑁簮絳紗單衣又固於張掖縣受賜虎頭繡鞶囊一雙又復賜犀毗金頭帶此將軍所自帶也又將軍憐固乃賜以玉躬所著瑇瑁襪三具書與弟超書九首傅武仲以能屬文為蘭臺令史下筆不能自休又徐幹字伯章扶風平陵人官至班超軍司馬善章草固與超書稱之得伯章書藁勢殊工知識讀之莫不歎息實亦藝由巳立名自人成又竇侍中遺仲升楚騰陵錯横刀早削一枚金錯半垂刀一枚又竇侍中令載雜綵七百疋市月氏馬蘇合香又竇侍中前寄人錢八十萬市得雜罽十餘張也又月支翕毛大小相雜但細好而已又今賫白素三百疋欲以市月支馬蘇合香闟登又遺仲升虎頭金鞶囊金鉤又今遺仲升瑇瑁黑犀簪與陳文通書奉國威靈信志方外議匈奴和親議竊自惟思漢興以來曠世厯年兵纒夷狄尤事匈奴綏御之方其塗不一或修文以和之或用武以征之或卑下以就之或臣服而致之雖屈伸無常所因時異然未有拒絶棄放不與交接者也故自建武之世復修舊典數出重使前後相繼至於其末始乃暫絶永平八年復議通之而廷爭連日異同紛囘多執其難少言其易先帝聖德逺覽瞻前顧後遂復出使事同前世以此而推未有一世闕而不修者也今烏桓就闕稽首譯官康居月氏自逺而至匈奴離析名王來降三方歸服不以兵威此誠國家通於神明自然之徵也臣愚以為宜依故事復遣使者上可繼五鳳甘露致逺人之㑹下不失建武永平羈縻之義虜使再來然後一往既明中國主在忠信且知聖朝禮義有常豈可逆詐示猜孤其善意乎絶之未知其利通之不聞其害設後北虜稍彊能為風塵方復求為交通將何所及不若因今施惠為策近長符命典引冇序註蔡邕臣固言永平十七年臣與賈逵傅毅杜矩展隆郗萌等召詣雲龍門小黄門趙宣持秦始皇帝本紀問臣等曰太史遷下贊語中寧有非邪臣對此贊賈誼過秦篇云向使子嬰有庸主之才僅得中佐秦之社稷未宜絶也此言非是即召臣入問本聞此論非邪將見問意開寤耶臣具對素聞知狀詔因曰司馬遷著書成一家言揚名後世至以身䧟刑之故反微文刺譏貶損當世非誼士也司馬相如洿行無節但有浮華之詞不周於用至於病疾而遺忠主上求取其書竟得頌述功德言封禪事忠臣效也至是賢遷逺矣臣固常伏刻誦聖論昭明好惡不遺微細緣事斷誼動有規矩雖仲尼之因史見意亦無以加臣固被學最舊受恩浸深誠思畢力竭情昊天㒺極臣固頓首頓首伏惟相如封禪靡而不典揚雄美新典而亡實然皆游揚後世垂為舊式臣固才朽不及前人葢詠雲門者難為音觀隨和者難為珍不勝區區竊作典引一篇雖不足雍容明盛萬分之一猶啓發憤懣覺悟童䝉光揚大漢軼聲前代然後退入溝壑死而不朽臣固愚戇頓首頓首曰太極之元兩儀始分烟烟煴煴易太極是生兩儀烟烟煴煴隂陽和一相扶貌也有沈而奥有浮而清奥濁也言兩儀始分之時其氣和同沈而濁者為地浮而清者為天沈浮交錯庶類混成地體沈而氣升天道浮而氣降升降交錯則衆類同矣肇命民主五德初起民主者天子也尚書曰成湯簡代夏作民主五德五行之德自伏羲已下帝王相代各據其一行始於木終於水則復始也同于草昧𤣥混之中易曰天造草昧混猶溷濁踰繩越契寂寥而亡詔者系不得而綴也言結繩書契已徃其道寂寥無聲莫能以相告故易系不得綴連也綴知鋭切厥有氏號紹天闡繹莫不開元於太昊皇初之首上哉夐乎其書猶可得而修也所依為氏也號功之表也號太昊曰伏羲炎帝曰神農黄帝曰軒轅少昊曰金天顓頊曰髙陽帝嚳曰髙辛堯曰陶唐舜曰有虞紹天闡繹宗紹天地開道人事亞斯之世通變神化函光而未曜若夫上稽乾則降承龍翼而炳諸典謨以冠德卓絶者莫崇乎陶唐陶唐舍𦙍而禪有虞有虞亦命夏后稷契熈載越成湯武股肱既周天迺歸功元首將授漢劉天有五行之序堯與四臣各據其一行而堯為之正四臣已徧故歸功元首之子孫而授漢劉也髙祖始於沛公起兵入關後為漢王以即尊位故遂曰漢也春秋左氏傳曰陶唐氏既衰其後劉累者在夏為御龍氏在商為豕韋氏在周為唐杜氏成王滅唐宣王殺杜伯杜伯之子隰叔奔晉其後士㑹奔秦而復歸其子留秦者為劉氏以是明之漢為堯後俾其承三季之荒末值亢龍之災孽懸象闇而恒文乖彜倫斁而舊章缺故先命𤣥聖使綴學立制宏亮洪業表相祖宗贊揚迪哲相助也始受命為祖繼中為宗皆不毁廟之稱也言仲尼之作亦顯助祖宗揚明其廸喆之德備哉粲爛真聖明之式雖皋䕫衡旦密勿之輔比茲褊矣茲孔子也是以髙光二聖宸居其域言髙祖光武如北辰居其所而衆星共之時至氣動乃龍見淵躍拊翼而未舉則威靈紛紜海内雲蒸雷動電熛胡縊莽分尚不涖其誅言二祖即位胡亥王莽皆先已誅天之所為先除也然後欽若上下恭揖羣后正位度宗度居也宗尊也言二主既除亂諸侯推而尊之然後敬順天地恭揖諸侯正位居尊也有于德不台淵穆之讓淵穆深美之辭也靡號師矢敦奮撝之容矢陳也敦勉也毛氏曰矢於牧野葢以膺當天之正統受克讓之歸運蓄炎上之烈精藴孔佐之𢎞陳云爾謂大漢之德也蓄聚也洋洋乎若德帝者之上儀誥誓所不及已本事曰誥戎事曰誓鋪觀二代洪纖之度其賾可探也洪大也纖細也竝開迹於一簣同受侯甸之服奕世勤民以方伯統牧乘其命賜彤弧黄鉞之威用討韋顧黎崇之不恪韋豕韋顧已姓之國皆夏諸侯黎崇殷諸侯也湯文王誅之毛詩曰韋顧既伐又曰既伐于崇作邑於豐書曰西伯既戡黎至于參五華夏京遷鎬亳遂自北面虎螭其師革滅天邑天邑天子邑也是故誼士華而不敦武稱未盡濩有慙德不其然與武周樂也濩殷樂也孔子曰韶盡美矣又盡善也謂武盡美矣未盡善也舜禪而周伐故未盡善也延陵季子聘魯觀樂見舞大濩者曰聖人之𢎞也而猶有慙德恥於征伐也豈不然乎亦猶於穆猗那翕純皦繹周頌曰於穆清廟商頌曰猗歟那歟孔子曰始作翕如也從之純如也皦如也繹如也以崇嚴祖考殷薦宗配帝發祥流慶對越天地者對答也舄奕乎千載豈不克自神明哉舄奕光曜流行貌誕略有常審言行於篇籍光藻朗而不渝耳矧夫赫赫聖漢巍巍唐基泝測其源乃先孕虞育夏甄殷陶周言測度漢本至唐乃任舜育禹化契成稷皆為之父母模範也然後宣二祖之重光襲四宗之緝熈宣徧也襲因也髙祖光武為二祖孝文曰太宗孝武曰世宗孝宣曰中宗孝明曰顯宗二祖重光天下四宗盛美相因而起也神靈日照光被六幽六幽謂上下四方也尚書曰光被四表格于上下仁風翔乎海表威靈行乎鬼區鬼區絶逺之區也慝亡囘而不泯微胡瑣而不頥故夫顯定三才昭登之績匪堯不興言明定天地人之道明登天之功非堯莫能興也尚書曰昭登於上鋪聞遺策在下之訓匪漢不𢎞厥道至於經緯乾坤出入三光言使日月星辰出以其節入以其期亡朒朓側匿盈縮之異也外運渾元内霑豪芒性類循理品物咸亨其已乆矣盛哉皇家帝世德臣列辟功君百王榮鏡宇宙尊亡與亢四表曰宇徃古來今曰宙乃始䖍鞏勞謙兢兢業業貶成抑定不敢論制作鞏亦勞也至於遷正黜色賓監之事渙揚㝢内漢承周後當就夏正以十二月為年首而秦以十月為年首髙祖又以十月至霸上因而不改至武帝太初始改馬賈誼公孫臣等議以漢土德服色尚黄至光武中乃黜黄而尚赤立殷後曰紹嘉公周後曰承休公以賓而監二代矣於四者宣揚海内制作之事猶未章也而禮官儒林屯用篤誨之士不傳祖宗之髣髴雖云優慎無乃葸與於是三事岳牧之寮僉爾而進曰慎而無禮則葸陛下仰監唐典中述祖則俯蹈宗軌躬奉天經惇睦辨章之化洽巡靖黎蒸懐保鰥寡之惠浹懐安也保養也燔瘞懸沈肅祇羣神之禮備是以來儀集羽族於觀魏貌恭體仁則鳳凰來儀肉角馴毛宗於外囿視明禮修則麒麟來應擾緇文皓質於郊思睿信立則白虎擾升黄輝采鱗於沼聽德知正則黄龍見甘露宵零於豐草德至天則甘露降三足軒翥於茂樹烏反哺之鳥至孝之應也若乃嘉榖靈草竒獸神禽應圖合牒窮祥極瑞者朝夕坰牧天子寰内也日月邦畿卓犖方州洋溢乎要荒昔周姬有素雉朱烏𤣥秬黄􅓿之事耳君臣動色左右相趨濟濟翼翼峨峨如也葢用昭明夤畏承聿懐之福毛詩曰昭事上帝聿懐多福亦以寵靈文武貽燕後昆覆以懿鑠豈其為身而有顓辭也若然受之亦宜勤恁旅力以充厥道恁思也旅陳也啓恭館之金縢御東序之秘寳以流其占恭館宗廟金縢之所在東序牆也尚書曰顓頊河圖雒書在東序流演也雒書皆存亡之事當覽之以演禍福之驗也夫圖書亮章天哲也亮信也章明也言河圖洛書至信至明而出天賜之使視而行之孔繇先命聖孚也繇道也言孔子先定道誠至信也體行德本正性也體行正性習堯所履今天子復蹈之逄吉丁辰景命也言逢此吉當此時者皇天之大命也順命以創制易曰湯武革命順乎天應乎人因定以和神治定作樂以和人神答三靈之蕃祉展放唐之明文兹事體大而允寤寐次於聖心瞻前顧後豈蔑清廟憚勑天命也伊考自遂古乃降戾爰兹作者七十有四人有不俾而假素㒺光度而遺章今其如台而獨闕也是時聖上固以垂精遊神苞舉藝文屢訪羣儒俞咨故老與之斟酌道德之淵源肴覈仁義之林藪以望元符之臻焉斟酌飲也肴覈食也肉曰肴骨曰覈水深曰淵水本曰源叢木曰林澤無水曰藪言六藝者道德之深本而仁誼之叢藪也天子與羣儒故老斟酌肴覈而行以天應之至也詩曰泂酌彼行潦又曰肴覈惟旅既感羣后之讜辭又悉經五繇之碩慮矣讜當也經常也繇占也王者巡狩預卜五年嵗習其祥習則行不則修徳而改卜言天下已舉五卜之占而習吉也將絣萬嗣揚洪輝奮景炎揚奮皆振布之意扇遺風播芳烈乆而逾新用而不竭汪汪乎丕天之大律其疇能亘之哉唐哉皇哉皇哉唐哉言誰能竟此道惟唐堯與漢漢與唐堯而已設難答賓戲有序永平中為郎典校秘書專篤志於儒學以著述為業或譏以無功又感東方朔揚雄自喻以不遭蘇張范蔡之時曾不折之以正道明君子之所守故聊復應焉其辭曰賓戲主人曰葢聞聖人有一定之論烈士有不易之分亦云名而已矣故太上有立德其次有立功夫德不得後身而特盛功不得背時而獨彰是以聖喆之治棲棲遑遑孔席不㬉墨突不黔由此言之取舍者昔人之上務著作者前烈之餘事耳今吾子幸游帝王之世躬帶紱冕之服浮英華湛道德矕龍虎之文舊矣卒不能攄首尾奮翼鱗振㧞洿塗跨騰風雲使見之者影駭聞之者響震徒樂枕經籍書紆體衡門上無所蔕下無所根獨攄意乎宇宙之外鋭思於毫芒之内潜神黙記縆以年嵗然而器不賈於當已用不效於一世雖馳辯如濤波摛藻如春華猶無益於殿最也意者且運朝夕之策定合㑹之計使存有顯號亡有美諡不亦優乎主人逌爾而笑曰若賓之言所謂見世利之華闇道德之實守窔奥之熒燭未仰天庭而覩白日也曩者王塗蕪穢周失其馭侯伯方軌戰國横騖於是七雄虓闞分裂諸夏龍戰虎爭游説之徒風颮電激竝起而救之其餘焱飛景附霅煜其間者葢不可勝載當此之時搦朽磨鈍鈆刀皆能一斷是故魯連飛一矢而蹶千金虞卿以顧盼而捐相印夫啾發投曲感耳之聲合之律度淫䵷而不可聽者非韶夏之樂也因勢合變偶時之㑹風移俗易乖迕而不可通者非君子之法也及至從人合之衡人散之亡命漂説羈旅騁辭商鞅挾三術以鑚孝公李斯奮時務而要始皇彼皆躡風塵之㑹履顛沛之勢據徼乘邪以求一日之富貴朝為榮華夕為顦顇福不盈眥禍溢於世凶人且以自悔况吉士而是賴乎且功不可以虚成名不可以偽立韓設辯以徼君吕行詐以賈國説難既遒其身乃囚秦貨既貴厥宗亦墜是以仲尼抗浮雲之志孟軻養浩然之氣彼豈樂為迂濶哉道不可以貳也方今大漢洒掃羣穢夷險芟荒廓帝紘恢皇綱基隆於羲農規廣於黄唐其君天下也炎之如日威之如神函之如海養之如春是以六合之内莫不同源共流沐浴𤣥德禀仰太和枝附葉著譬猶草木之植山林鳥魚之毓川澤得氣者蕃滋失時者零落叅天地而施化豈云人事之厚薄哉今吾子處皇代而論戰國曜所聞而疑所覿欲從堥敦而度髙乎泰山懐氿濫而測深乎重淵亦未至也賓曰若夫鞅斯之倫衰周之凶人既聞命矣敢問上古之士處身行道輔世成名可述於後者黙而已乎主人曰何為其然也昔者咎繇謨虞箕子訪周言通帝王謀合神聖殷説夢發於傅巖周望兆動於渭濱齊寗激聲於康衢漢良受書於邳垠皆俟命而神交匪詞言之所信故能建必然之策展無窮之勲也近者陸子優游新語以興董生下帷發藻儒林劉向司籍辯章舊聞揚雄譚思法言太𤣥皆及時君之門闈究先聖之壼奥婆娑乎術藝之塲休息乎篇籍之囿以全其質而發其文用納乎聖德烈炳乎後人斯非其亞歟若乃伯夷抗行於首陽栁惠降志而辱仕顏潜樂於簞瓢孔終篇於西狩聲盈塞於天淵真吾徒之師表也且吾聞之一隂一陽天地之方乃文乃質王道之綱有同有異聖哲之常故曰慎修所志守爾天符委命供已味道之腴神之聽之名其舍諸賓又不聞和氏之璧韞於荆石隋侯之珠藏於蚌蛤乎厯世莫眡不知其將含景曜吐英精曠千戴而流光也應龍潜於潢汙魚黿媟之不覩其能奮靈德合風雲超忽荒而躆昊蒼也故夫泥蟠而天飛者應龍之神也先賤而後貴者和隋之珍也時暗而乆章者君子之真也若乃牙曠清耳於管絃離婁眇目於毫分逢䝉絶技於弧矢般輸㩁巧於斧斤良樂軼能於相馭烏獲抗力於千鈞和鵲發精於鍼石研桑心計於無垠走亦不任厠技於彼列故宻爾自娛於斯文難巖周太古之世不車不舟陸足以游不棟不宇巢穴而處頌竇車騎北征頌車騎將軍應昭明之上德該文武之玅姿蹈佐歴握輔㩞翼肱聖上作主光輝資天心謨神明規卓逺圖幽㝠親率戎士巡撫疆城勒邊御之永設奮櫓之逺徑閔遐黎之騷狄念荒服之不庭乃總三選簡虎校勒部隊明誓號援謀夫於永言察武毅於爼豆取可杖於品象㧞所用於仄陋料資器使采用先務民儀響慕羣英影附羌戎相率東胡爭騖不召而集未令而諭於是雷震九原電曜髙闕金光鏡野武旗冒蜺衝雞鹿超黄磧輕選四縱所從莫敵馳颷疾踵蹊迹探梗莽採嶰阨斷温禺分尸逐電激私渠星流霰落名王交手稽顙請服乃收其鋒鏃干鹵甲胄積象如丘阜陳閲滿廣野戢載連百兩散數累萬億放獲驅孥揣城㧞邑擒馘之倡九谷謡譟響聒東夷埃塵戎域然而唱呼鬰憤未逞厥願甘平原之酣戰矜訊捷之累筭何則上將崇至仁行凱易𢎞濃恩降温澤同庖廚之珍饌分裂室之纖帛勞不御輿寒不施襗行無偏勤止無兼役悂䝉識而愎戾順貳者異而懦夫奮遂踰涿邪跨祈連籍庭蹈就彊獦崝嵮轔幽山􅨤凶河臨安侯軼焉居與嘑衍顧衛霍之遺迹睋伊秩之所邈師横騖而庶御士怫㥜以爭先囘萬里而風騰劉殘寇於沂垠糧不賦而師贍役不重而備軍行戎醜以禮敎炘鴻校而昭仁文武炳其竝隆威德兼而兩信清乾鈞之攸冒拓畿畧之所順櫜弓鏃而戢戈囘雙麾以東運於是封燕然以隆髙䄠廣鞬以𢎞曠銘靈陶以勒崇欽皇祇之祐貺宣惠氣盪殘風軻泰幽嘉凝隂飛雪瀼庶其雨洒淋榛枯闕握興嘉卉始濃土膏含養四行分任於是三軍稱曰亹亹將軍克廣德心光光神武𢎞昭德音超兮眇天潜𦕈兮與神參東巡頌竊見巡狩岱宗柴望山虞崇祀明堂上稽帝堯中述世宗遵奉世祖禮儀備具動自聖心是以明神屢應休徵乃降不勝狂簡之情謹上岱宗頌一篇曰若稽古在漢迪哲聿修厥德憲章丕烈翿六龍較五輅齊百僚陶質素命南重以司厯厥中月之六辰備天官之列衛盛輿服而東巡南巡頌惟漢再受命系葉十一恊景和則天經郊髙宗光六幽通神明既禘祖於西都又將祫于南庭是時聖上運天官之法駕建日月之旃旌銘封燕然山銘有序維永元元年秋七月有漢元舅曰車騎將軍竇憲寅亮聖皇登翼皇室納于大麓惟清緝熈乃與執金吾耿秉述職巡禦治兵於朔方鷹揚之校螭虎之士爰該六師暨南單于東胡烏桓西戎氐羌侯王君長之羣驍騎十萬元戎輕武長轂四分雷輜蔽路萬有三千餘乘勒以八陣莅以威神𤣥甲輝日朱旗絳天遂凌髙闕下雞鹿經磧鹵絶大漠斬温禺以釁鼓血尸逐以染鍔然後四校横徂星流彗掃蕭條萬里野無遺寇於是域滅區殫反斾而旋考傳驗圖窮覽其山川遂踰涿邪跨安侯乘燕然躡冒頓之區落焚老上之龍庭將上以攄髙文之宿憤光祖宗之𤣥靈下以安固後嗣恢拓境宇振大漢之天聲茲可謂一勞而乆逸暫費而永寧也乃遂封山刋石昭銘盛德其辭曰鑠王師兮征荒裔勦㓙虐兮截海外右叶志韻夐其邈兮亘地界叶居吏反封神丘兮建隆嵑其例反與碣同熈帝載兮振萬世髙祖沛泗水亭碑銘皇皇聖漢兆自沛豐乾降著符精感赤龍承鬿流裔襲唐末風寸天尺土無竢斯亭建號宣基維以沛公揚威斬蛇金精摧傷渉關陵郊係獲秦王應門造勢斗璧納忠天期乘祚受爵漢中勒陳東征剟擒三秦靈威神佑鴻溝是乘漢軍改歌楚衆易心誅項討羽諸夏以康陳張畫策蕭勃翼終出爵褒賢裂土封功炎火之德彌光以明源清流潔本盛末榮叙將十八賛述股肱休勛顯祚永永無疆國寧家安我君是升根生葉茂舊邑是仍於皇舊亭苖嗣是承天之福祐萬年是興十八侯銘鄼侯蕭何躭躭相國𢎞策不追御國維綱秉統樞機文昌四友漢有蕭何序功第一受封于鄼將軍舞陽侯樊噲黆黆將軍威葢不當操盾千鈞㧞主項堂興漢破楚矯矯忠良卒為丞相帝室以康將軍留侯張良赫赫將軍受兵黄石規圖勝負不出帷幄令惠瞻仰安全正朔國師是封光榮舊宅太尉絳侯周勃懿懿太尉惇厚朴誠輔翼受命應節御營厯位卿相土國兼并見危致命社稷以寧將軍平陽侯曹參蹇蹇相國允忠克誠臨危處險安而匡傾興代之際濟主立名身履國土秉御乾楨丞相户牖侯陳平洋洋丞相勢譎師旅擾攘楚魏爲漢謀主六竒解厄揚名于後南宫侯張敖堂堂張敖耳之遺萌以誠佐國序跡建忠功成德立襲封南宫垂號萬春永保無疆衛尉曲陽侯酈商衍衍衛尉德行循規遭兄食其隕歿於齊横恥愧景刎頸自獻金紫褒表萬世不刋將軍潁陽侯灌嬰煌煌將軍輔漢乆長威震吕氏姦惡不揚寇攘殄盡躬迎代王功顯帝室萬世益章將軍汝隂侯夏嬰斌斌將軍鷹武是揚内康王室外鎮四方諸夏乂安流及要荒聲騁海内苗嗣紀功將軍陽陵侯傅寛休休將軍如虎如羆御師勒陳破敵以威靈金曜楚火流烏飛將命仗節功績永垂將軍信武侯靳歙斤斤將軍忠信孔雅出身六師十二匹旅折衝扞難遂寧天下金龜章德建號傳後丞相安國侯王陵明明丞相天賦挺直剛德正行不枉不曲功業成著榮顯食邑距吕奉主昭然不惑將軍襄平侯韓信桓桓將軍輔主克征奉使全璧身泏項營序功差德履讓以平轉北而遊雲中以傾將軍棘津侯陳武巖巖將軍帶武佩威御雄乘險難困不違仇滅主定四海是楨功成食土德被遐邇曲成侯蟲達晏晏曲成輿從龍騰安危從主赤曜以升赫赫皇皇道彌光明惟德御國流及後萌御史大夫汾隂侯周昌肅肅御史以武以文相趙距吕志安君身徵詣行所如意不全天秩邑土勛乃永存將軍青陽侯王吸邑邑將軍育養烝徒建謀正直行不匿邪入軍討敵頂定天都佩雀雙印百里為家論難莊論衆人之逐世利如青蠅之赴肉汁也青蠅嗜肉汁而忘溺死衆人貪世利而䧟罪禍功德論朱軒之使鳳舉於龍堆之表哀辭馬仲都哀辭并序北堂書鈔載班固馬仲都哀辭按此不似固自序似人為序其事也車騎將軍順文侯馬仲都明帝舅也從車駕於水浮橋馬驚入水溺死帝顧謂侍御史班固於馬上三十歩遂為哀辭闕連珠擬連珠五首臣聞公輸愛其斧故能玅其功明主貴其士故能成其治臣聞良匠度其材而成大厦明主器其士而建功業臣聞聽决價而資玉者無楚和之名因近習而取士者無伯王之功故璵璠之為寶非駔儈之術伊吕之為佐非左右之舊臣聞鸞鳳養六翮以凌雲帝王乘英雄以濟民易曰鴻漸於陸其羽可用為儀臣聞馬伏皁而不用則駑與良而為羣士齊寮而不職則賢與愚而不分文奕㫖大冠言博既終或進而問之曰孔子稱有博奕今博行於世而奕獨絶博義既𢎞奕義不述問之論家師不能説其聲可聞乎曰學不廣博無以應客北方之人謂棊為奕𢎞而説之舉其大畧厥義深矣局必方正象地則也道必正直神明德也棊有白黒隂陽分也駢羅列布效天文也四象既陳行之在人葢王政也成敗臧否為仁由已危之正也夫博懸於投不專在行優者有不遇劣者有僥倖踦拏相凌氣勢力爭雖有雄雌未足以為平也至於奕則不然髙下相推人有等級若孔氏之門囘賜相服循名責實謀以計策若唐虞之朝考功黜陟器用有常施設無期因敵為資應時屈伸續之不復變化日新或虛設豫置以自䕶衛葢象庖羲㒺罟之制隄防周起障塞漏決有似夏后治水之勢一孔有闕壞頺不振有似瓠子汎濫之敗一棊破窐亡地復還曹子之威作伏設詐突圍横行田單之竒要厄相刼割地取償蘓張之姿固本自廣敵人恐懼三分有二釋而不誅周文之德知者之慮也既有過失能量弱强逡巡儒行保角依旁却自補續雖敗不亡繆公之智中庸之方也上有天地之象次有帝王之治中有五霸之權下有戰國之事覽其得失古今畧備及其晏也至於發憤忘食樂以忘憂推而髙之仲尼概也樂而不淫哀而不傷質之詩書關雎類也紕專知柔隂陽代至施之養性彭祖氣也外若無為黙而識淨泊自守以道意隱居放言逺咎悔行象虞仲信可喜感乎大冠論未備故因問者喻其事詩郊祀靈芝歌因露寢兮産靈芝象三德兮瑞應圖延壽命兮光此都配上帝兮象太微參日月兮揚光輝詠史三王德彌薄惟後用肉刑太倉令有罪就逮長安城自恨身無子困急獨㷀㷀小女痛父言死者不可生上書詣闕下思古歌雞鳴憂心摧折裂晨風揚激聲聖漢孝文帝惻然感至情百男何憒憒不如一緹縈竹扇詩供時有度量異好有團方來風堪避暑静夜致清涼漢魏六朝百三家集巻十一
