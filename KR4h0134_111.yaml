body:
  text: 漢魏六朝百三家集卷一百十一上庾信集題詞周滕王逌序庾開府集云子山妙擅文詞尤工詩賦誄潘安而碑蔡雍針揚雄而書阮籍也稱重至矣庾氏家世南陽聲譽獨步子山父子出入禁闥為梁文人雀航之戰倒徒先奔違才易務任非其器後羈長安臣于宇文陳帝通好請還終留不遣雖周宗好士滕趙賞音築宫虛館交齊布素而南冠西河旅人發嘆鄉關之思僅寄于哀江南一賦其視徐孝穆得返舊都奚啻李都尉之望蘇屬國哉子山在梁每一文出京都傳誦初使北方人頗輕之讀枯樹賦始知敬重盛名易地橘枳改觀難為淺見寡聞者道也史評庾詩綺豔杜工部又稱其清新老成此六字者詩家難兼子山備之玉臺瓊樓未易幾及文與孝穆敵體辭生于情氣餘於彩乃其獨優令狐撰史詆為淫放輕險詞賦罪人夫唐人文章去徐庾最近窮形寫態模範是出而敢于毁侮殆將諱所自來先縱尋斧歟目録賦三月三日華林園馬射賦有序哀江南賦有序傷心賦冇序小園賦春賦七夕賦蕩子賦竹杖賦卭竹杖賦象戲賦鏡賦燈賦對燭賦枯樹賦鴛鴦賦表賀傳位皇太子表賀平鄴都表賀新樂表請功臣襲封表為杞公讓宗師驃騎表為閻大將軍乞致仕表代人乞致仕表為晉陽公進玉律稱尺斗升表進象經賦表齊王進蒼烏表齊王進白兔表齊王進赤雀表啓謝滕王集序啓謝周明帝賜絲布等啓答趙王啓謝趙王示新詩啓謝趙王賚絲布等啓謝趙王賚絲布啓又謝趙王賚息絲布啓謝趙王賚犀帶等啓謝滕王賚巾啓謝趙王賚白羅袍袴啓謝趙王賚米啓謝趙王賚乾魚啓謝趙王賚雉啓謝趙王賚馬并繖啓謝滕王賚馬啓謝滕王賚豬啓書為梁上黃侯世子與婦書移文移齊河陽執事文又移齊河陽執事文移虜留使文教答移市教連珠擬連珠四十四首漢魏六朝百三家集卷一百十一目録上欽定四庫全書漢魏六朝百三家集卷一百十一上明張溥輯庾信集賦三月三日華林園馬射賦有序臣聞堯以仲春之月刻玉而遊河舜以甲子之朝披圖而巡洛夏后瑶臺之上或御二龍周王玄圃之前猶驂八駿我大周之創業也南正司天北正司地平九黎之亂定三危之罪雲紀御官鳥司從職皇王有秉厯之符玄圭有成功之瑞豈直天地合德日月光華而已哉皇帝以上聖之姿膺下武之運通乾象之靈啓神明之德夷典秩宗見之三禮夔為樂正聞之九成克己備於禮容威風總於戎政加以卑躬菲食皂帳綈衣百姓為心四海為念西郊不雨即動皇情東作未登彌回天眷兵革無會非有待於丹烏宫觀不移故無勞於白燕銀甕金船山車澤馬豈止竹葦兩草共垂甘露青赤二氣同為景星雕題鑿齒識海水而來王烏弋黃支驗東風而受吏於時玄鳥司厯蒼龍御行羔獻氷開桐華萍合皇帝幸於華林之園玉衡正而泰階平閶闔開而勾陳轉千乘雷動萬騎雲屯落花與芝蓋同飛楊栁共春旗一色乃命羣臣陳大射之禮雖行祓禊之飲即同春搜之儀止立行宫裁舒帳殿階無玉璧既異河間之碑户不金鋪殊非許昌之賦洞庭既張承雲乃奏騶虞九節貍首七章正飾五彩之雲壺寧百福之酒唐弓九合冬幹春膠夏箭三成青莖赤羽于是選朱汗之馬較黃金之埒紅陽飛鵲紫燕晨風唐成公之驌驦海西侯之千里莫不飲羽銜竿吟猿落雁鐘鼓震地埃塵漲天酒以罍行肴繇鼎進綵則錦市俱移錢則銅山合徙太史聽鼓而論功司馬張旃而賞獲上則雲布雨施下則山藏海納實天下之至樂景福之歡欣者也既而若木將低金波欲上天顧惟穆賓歌惟醉雖復暫離北闕聊宴西城即同鄷水之朝更是岐山之會小臣不舉奉詔為文以管窺天以蠡酌海盛德形容豈陳梗概嵗次昭陽月在大梁其日上已其時少陽春史司職青祗效祥徴萬騎於平樂開千門於建章屬車釃酒復道焚香皇帝翊四圉於帝間回六龍於天苑對宣曲之平林望甘泉之長坂華蓋平飛風烏細轉路直城遙林長騎逺帷宫宿設帳殿開筵傍臨細栁斜界祈年開鶴列之陳靡魚鬚之旃行漏抱刻前旌載鳶河湄剃草渭口澆泉堋雲五色的暈重圓陽管既調春絃實撫總章協律成均樹羽翔鳳為林靈芝為圃草銜長帶桐垂細乳鳥囀歌來花濃雪聚玉律調鐘金錞節鼓於是咀銜拉鐵逐日追風并試長楸之埒俱下蘭池之宫鳴鞭則汗赭入埒則塵紅既觀賢於大射乃頒政於司弓變三驅而畫鹿登百尺而懸熊繁弱振地鐵驪踏空禮正六耦詩歌九節七札俱穿五豝同穴弓如明月對堋馬似浮雲向埒雁失羣而行斷猿求林而路絶控玉勒而搖星跨金鞍而動月乃有六郡良家五陵豪選新回馬邑之兵始罷龍城之戰將軍戎服來參武宴尚帶流星猶乘奔電始聽鼓而唱籌即移竿而標箭馬噴沾衣塵驚灑面石堰水而澆園花乘風而繞殿熊耳刻杯飛雲畫罍水衡之錢山積織室之錦霞開司筵賞至酒正杯來至樂則賢乎秋水歡笑則勝上春臺既而日下澤宫筵闌相圃悵徙蹕之留歡眷回鑾之餘舞欲使石梁銜箭銅山飲羽橫弧於楚水之蛟飛鏃於吳亭之虎况復恭己無為南風在斯非有心於蜓翼豈留情於戟枝唯觀揖讓之禮蓋取威雄之儀哀江南賦有序粵以戊辰之年建亥之月大盜移國金陵瓦解余乃竄身荒谷公私塗炭華陽奔命有去無歸中興衟銷窮於甲戌三日哭於都亭三年囚于别館天衟周星物極不反傅燮之但悲身世無處求生袁安之每念王室自然流涕昔桓君山之志事杜元凱之平生並有著書咸能自序潘嶽之文彩始述家風陸機之詞賦先陳世德信年始二毛即逢喪亂藐是流離至于暮齒燕歌逺别悲不自勝楚老相逢泣將何及畏南山之雨忽踐秦庭讓東海之濱遂餐周粟下亭漂泊髙橋羈旅楚歌非取樂之方魯酒無忘憂之用追為此賦聊以記言不無危苦之詞唯以悲哀為主日暮途逺人間何世將軍一去大樹飄零壯士不還寒風蕭瑟荆璧睨柱受連城而見欺載書橫階捧珠盤而不定鍾儀君子入就南冠之囚季孫行人留守西河之館申包胥之頓地碎之以首蔡威公之淚盡加之以血釣臺移栁非玉關之可望華亭鶴唳豈河橋之可聞孫䇿以天下為三分衆才一旅項籍用江東之子弟人唯八千遂乃分裂山河宰割天下豈有百萬義師一朝卷甲芟夷斬伐如草木焉江淮無涯岸之阻亭壁無藩離之固頭會箕斂者合從締交鋤耰棘矜者因利乘便將非江表王氣終於三百年乎是知併吞六合不免軹道之災混一車書無救平陽之嗚呼山嶽崩頽既履危亡之運春秋迭代必有去故之悲天意人事可以悽愴傷心者矣况復舟楫路窮星漢非乘槎可上風颷道阻蓬萊無可到之期窮者欲達其言勞者須歌其事陸士衡聞而撫掌是所甘心張平子見而陋之固其宜矣我之掌庾承周以世功而為族經邦佐漢用論衟而當官稟嵩華之玉石潤河洛之波瀾居負洛而重世邑臨河而晏安逮永嘉之艱虞始中原之乏主民枕倚於牆壁路交橫於豺虎值五馬之南奔逢三星之東聚彼凌江而建國始播遷於吾祖分南陽而賜田裂東嶽而胙土誅茅宋玉之宅穿徑臨江之府水木交運山川崩竭家有直衟人多全節訓子見于純深事君彰於義烈新野有生祠之廟河南有胡書之碣况乃少微真人天山逸民階庭空谷門巷蒲輪移談講樹就簡書筠降生世德載誕貞臣文詞髙于甲觀模楷盛于漳濱嗟有衟而無鳳歎非時而有麟既姦回之奰匿終不悅於仁人王子洛濱之歲蘭成射策之年始含香於建禮仍矯翼於崇賢遊洊雷之講肆齒明離之胄筵既傾蠡而酌海遂側管以窺天方塘水白釣渚池圓侍戎韜于武帳聽雅曲於文絃乃解懸而通籍遂崇文而會武居笠轂而掌兵出蘭池而典午論兵於江漢之君拭玉於西河之主于時朝野歡娛池臺鐘鼓里為冠蓋門成鄒魯連茂苑於海陵跨橫塘于江浦東門則鞭石成橋南極則鑄銅為柱橘則園植萬株竹則家封千户西賮浮玉南琛沒羽吳歈越吟荆豔楚舞草木之藉陽春魚龍之逢風雨五十年中江表無事王歙為和親之侯班超為定逺之使馬武無預于甲兵馮唐不論於將帥豈知山嶽暗然江湖沸漁陽有閭左戍卒離石有將兵都尉天子方刪詩書定禮樂設重雲之講開士林之學談劫燼之灰飛辨常星之夜落地平魚齒城危獸角卧刁斗于滎陽絆龍媒于平樂宰衡以干戈為兒戲搢紳以清談為廟略乘漬水以膠船馭奔駒以朽索小人則將及水火君子則方成猿鶴弊箄不能救鹽池之鹹阿膠不能止黃河之濁既而魴魚頳尾四郊多壘殿狎江鷗宫鳴野雉湛盧去國艅艎失水見被髮于伊川知百年而為戎矣彼姦逆之熾盛久遊魂而放命大則有鯨有鯢小則為梟為獍負其牛羊之力肆其水草之性非玉燭之能調豈璿璣之可正值天下之無為尚有欲于羈縻飲其琉璃之酒賞其虎豹之皮見胡柯于大夏識鳥卵于條支豺牙密厲虺毒吹輕九鼎而欲問聞三川而遂窺始則王子召戎姦臣介胄既官政而離逖遂師言而泄漏望廷尉之逋囚反淮南之窮冦出狄泉之蒼鳥起橫江之困獸地則石鼓鳴山天則金精動宿北闕龍吟東陵麟鬬爾乃桀黠橫扇馮陵畿甸雍狼望于黃圖填盧山于赤縣青袍如草白馬如練天子履端廢朝單于長圍髙宴兩觀當戟千門受箭白虹貫日蒼鷹擊殿竟遭夏臺之禍終視堯城之變官守無奔問之人干戚非平戎之戰陶侃則空爭米船顧榮則虛搖羽扇將軍死綏路絶重圍烽隨星落書逐鳶飛遂乃韓分趙裂鼓卧旗折失羣班馬迷輪亂轍猛士嬰城謀臣卷舌昆陽之戰象走林常山之陳蛇奔穴五郡則兄弟相悲三州則父子離别護軍慷慨忠能死節三世為將終於此滅濟陽忠壯身參末將兄弟三人義聲俱唱主辱臣死名存身喪敵人歸元三軍悽愴尚書多算守備是長雲梯可拒地道能防有齊將之閉壁無燕師之卧牆大事去矣人之云亡申子奮發勇氣咆勃實總元戎身先士卒胄落魚門兵填馬窟屢犯通中頻遭刮骨功業夭枉身名埋沒或以隼翼鷃披虎威狐假沾漬鋒鏑脂膏原野兵弱虜強城孤氣寡聞鶴唳而心驚聽胡笳而淚下拒神亭而亡戟臨橫江而棄馬崩于巨鹿之沙碎于長平之瓦於是桂林顛覆長洲麋鹿潰潰沸騰茫茫墋黷天地離阻人神慘酷晉鄭靡依魯衛不睦競動天關爭回地軸探雀鷇而未飽待熊蹯而詎熟乃有車側郭門筯懸廟屋鬼同曹社之謀人有秦庭之哭爾乃假刻璽于關塞稱使者之酬對逢鄂坂之譏嫌值耐門之征稅乘白馬而不前䇿青騾而轉礙吹落葉之扁舟飄長風于上遊彼鋸牙而鈎爪又巡江而習流排青龍之戰艦鬭飛燕之船樓張遼臨於赤壁王濬下於巴丘乍風驚而射火或箭重而回舟未辨聲於黃蓋已先沈于杜侯落帆黃鶴之浦藏船鸚鵡之洲路已分於湘漢星猶看於斗牛若乃隂陵失路釣臺斜趣望赤岸而沾衣􅋈烏江而不渡雷池柵浦鵲陵焚戍旅舍無煙巢禽失樹謂荆衡之杞梓庶江漢之可恃淮海維揚三千餘里過漂渚而寄食託蘆中而渡水屆於七澤濱於十死嗟天保之未定見殷憂之方始本不達於危行又無情於祿仕謬掌衛於中軍濫尸丞於御史信生世等於龍門辭親同於河洛奉立身之遺訓受成書之顧託昔三世而無慙今七葉而始落泣風雨於梁山惟枯魚之索入欹斜之小徑掩蓬藋之荒扉就汀洲之杜若待蘆葦之單衣於時西楚霸王劒及繁陽鏖兵金匱較戰玉堂蒼鷹赤雀鐵軸牙檣沈白馬而誓衆負黃龍而渡江海潮迎艦江萍送王戎車屯於石城戈船掩乎淮泗諸侯則鄭伯前驅盟主則荀罃暮至剖巢燻穴奔魑走魅埋長狄於駒門斬蚩尤於中冀然腹為燈飲頭為器直虹貫壘長星屬地昔之虎據龍蟠加以黃旗紫氣莫不隨狐兔而窟穴與風塵而殄悴西瞻博望北臨玄圃月榭風臺池平樹古倚弓於玉女窗扉繫馬於鳳凰樓柱仁夀之鏡徒懸茂陵之書空聚若夫立德立言謨明寅亮聲超於繫表道髙於河上更不遇於浮丘遂無言於師曠捐愛子而托人知西陵而誰望非無北闕之兵猶有雲臺之仗司徒之表裏經綸狐偃之惟王實勤橫雕戈而對霸主執金鞭而問賊臣平吳之功壯於杜元凱王室是賴深於溫太真始則地名全節終則山稱枉人南陽較書去之己逺上蔡逐獵知之何晚鎮北之負譽矜前風颷凜然水神遭箭山靈見鞭是以蟄熊傷馬浮蛟沒船才子併命俱非百年中宗之夷凶靖亂大雪寃恥去代邸而承基遷唐郊而纂祀反舊章於司𨽻歸餘風於正始沈猜則方逞其欲藏疾則自矜於已天下之事沒焉諸侯之心搖矣既而齊交北絶秦患西起况背關而懷楚冀端委而開吳驅緑林之散卒拒驪山之叛徒營軍梁溠搜乘巴渝問諸淫昏之鬼求之厭劾之巫荆門遭廩延之戮夏首濫逵泉之誅蔑因親以教愛忍和樂於彎弧既無謀於肉食非所望於論都未深思於五難先自擅於三端登陽城而避險卧砥柱而求安既言多於忌刻實志勇而形殘俱坐觀於時變本無情於急難地惟黑子城猶彈丸其怨則黷其盟則寒豈寃禽之能塞海非愚叟之可移山况以沴氣朝浮妖精夜殞赤烏則三朝夾日蒼雲則七里圍軫亡吳之歲既窮入郢之年斯盡周含鄭怒楚結秦寃有南風之不競值西鄰之責言俄而梯衝亂舞冀馬雲屯棧秦車於暢轂沓漢鼓於雷門下陳倉而連弩渡臨晉而橫船雖復楚有七澤人稱三户箭不麗於六麋雷無驚於九虎辭洞庭兮落木去涔陽兮極浦熾火兮焚旗貞風兮害蠱乃使玉軸揚灰龍文斫柱下江餘城長林故營徒思箝馬之秣未見燒牛之兵章慢支以轂走宫之竒以族行河無氷而馬渡關未曉而雞鳴忠臣解骨君子吞聲章華望祭之所雲夢偽遊之地荒谷縊於莫敖冶父囚於羣帥硎穽摺拉鷹鸇批㩌寃霜夏零憤泉秋沸城崩杞婦之哭竹染湘妃之淚水毒秦涇山髙趙陘十里五里長亭短亭飢隨蟄燕暗逐流螢秦中水黑關上泥青於時瓦解氷泮風飛電散渾然千里淄澠一亂雪暗如沙氷橫似岸逢赴洛之陸機見離家之王粲莫不聞隴水而掩泣向關山而長嘆况復君在交河妾在清波石望夫而逾逺山望子而逾多才人之憶代郡公主之去清河栩揚亭有離别之賦臨江王有愁思之歌别有飄颻武威羈旅金微班超生而望返溫序死而思歸李陵之雙鳬永去蘇武之一雁空飛若江陵之中否乃金陵之始雖借人之外力實蕭牆之內起撥亂之主忽焉中興之宗不祀伯兮叔兮同見戮於猶子荆山鵲飛而玉碎隨岸蛇生而珠死鬼火亂於平林殤魂遊於新市梁故豐徙楚實秦亡不有所廢其何以昌有媯之後將育於薑輸我神器居為讓王天地之大德曰生聖人之大寶曰位用無賴之子弟舉江東而全棄惜天下之一家遭東南之反氣以鶉首而賜秦天何為而此醉且夫天道回旋生民預焉余烈祖於西晉始流播於東川洎余身而七葉又遭時而北遷提挈老幼關河纍年死生契闊不可問天况復零落將盡靈光巋然日窮於紀嵗將復始逼切危慮端憂暮齒踐長樂之神皋望宣平之貴里渭水貫於天門驪山回於地市幕府大將軍之愛客丞相平津侯之待士見鐘鼎於金張聞絃歌於許史豈知灞陵夜獵猶是故時將軍咸陽布衣非獨思歸王子傷心賦有序余五福無徵三靈有譴至於繼體多從夭折二男一女並得勝衣金陵喪亂相繼亡殁羈旅關河倐然白首苖而不秀頻有所悲一女成人長孫孩稚奄然玄壤何痛如之既傷即事追悼前亡唯覺傷心遂以傷心為賦若夫入室生光非復企及夾河為郡前途逾逺婕妤有自傷之賦揚雄有哀祭之文王正長有北郭之悲謝安石有東山之恨斯既然矣至若曹子建王仲宣傅長虞應德璉劉韜之母任延之親書翰傷切文詞哀痛千悲萬恨何可勝言龍門之桐其枝已折卷葹之草其心實傷嗚呼哀哉賦曰悲哉秋氣搖落變衰魂兮逺矣何去何依望思無望歸來不歸未達東門之意空懼西河之譏在昔金陵天下喪亂王室板蕩生民塗炭兄弟則五郡分張父子則三州離散地鼎沸於袁曹人豺狼於楚漢或有擁樹罹災藏衣遭難未設桑弧先空柘館人惟一丘亭遂千秋邊韶永恨孫楚長愁張壯武之心疾羊南城之淚流痛斯傳體尋兹世載天道斯慈人倫此愛膝下龍摧掌中珠碎芝在室而先枯蘭生庭而蚤刈命之修短哀哉已滿鶴聲孤絶猿吟腸斷嬴博之間路似新安藤緘轊櫝掩虞棺不封不樹惟棘惟欒天慘慘而無色雲蒼蒼而正寒况乃流寓秦川飄颻播遷從官非官歸田不田對玉關而羈旅坐長河而暮年巳觸目於萬恨更傷心於九泉至於三虎二龍三珠兩鳯並有山澤之靈各入熊羆之夢望隴首而不歸出都門而長送對寶碗而痛心撫玄經而流慟石華空服犀角虛篸風無少女草不宜男烏毛徒覆獸乳空含震為長男之宫巽為長女之位在我生年先凋此地人生幾何百憂俱至二王奉佛二郗奉道必至有期何能相保凄其零露颯焉秋草去矣黎民哀哉仲仁冀羊祜之前識期張衡之後身一朝風燭萬古埃塵丘陵兮何忍能留兮幾人小園賦若夫一枝之上巢父得安巢之所一壺之中壺公有容身之地况乎管寧藜牀雖穿而可坐嵇康煆竈既暖而堪眠豈必連闥洞房南陽樊重之第緑墀青瑣西漢王根之宅余有數畝弊廬寂寞人外聊以擬伏臘聊以避風霜雖復晏嬰近市不求朝夕之利潘嶽面城且適間居之樂况乃黃鶴戒露非有意於輪軒爰居避風本無情於鐘鼓陸機則兄弟同居韓康則舅甥不别蝸角蚊睫又足相容者也爾乃窮室徘徊聊同鑿坯桐間露落栁下風來琴號珠柱書名玉杯有棠梨而無館足酸棗而非臺猶得欹側八九丈縱橫數十步榆栁兩三行梨桃百餘樹撥蒙密兮見窗行欹斜兮得路蟬有翳兮不驚雉無羅兮何懼草樹溷淆枝格相交山為簣覆地有堂坳藏狸並窟乳鵲重巢連珠細菌長柄寒匏可以療飢可以棲遲佹嶇兮狹室穿漏兮茅茨簷直倚而妨帽戶平行而礙眉坐帳無鶴支牀有龜鳥多間暇花隨四時心則歷陵枯木髮則睢陽亂絲非夏日而可畏異秋天而可悲一寸二寸之魚三竿兩竿之竹雲氣蔭於叢蓍金精養於秋菊棗酸梨酢桃榹李薁落葉半牀狂花滿屋名為野人之家是謂愚公之谷試偃息於茂林乃久羡於抽簮雖有門而長閉實無水而恆沈三春負鋤相識五月披裘見尋問葛洪之藥性訪京房之卜林草無忘憂之意花無長樂之心鳥何事而逐酒魚何情而聽琴加以寒暑異命乖違德性崔駰以不樂損年吳質以長愁養病鎮宅神以薶石厭山精而照鏡屢動莊舄之吟幾行魏顆之命薄晚間閨老幼相攜蓬頭王霸之子椎髻梁鴻之妻燋麥兩甕寒菜一畦風騷騷而樹急天慘慘而雲低聚空倉而雀噪驚懶婦而蟬嘶昔早濫於吹噓藉文言之慶餘門有通德家承賜書或陪玄武之觀時參鳳凰之墟觀受釐於宣室賦垂楊於直廬遂乃山崩川竭氷碎瓦裂大盜移長離永滅摧直轡於三危碎平途於九折荆軻有寒水之悲蘇武有秋風之别關山則風月悽愴隴水則肝腸斷絶龜言此地之寒鶴訝今年之雪百靈兮倐忽菁華兮已晚不雪雁門之踦先念鴻陸之逺非淮海兮可變非金丹兮能轉不暴骨於龍門終低頭於馬坂諒天造兮昧昧嗟生民兮渾渾春賦宜春苑中春已歸披香殿裡作春衣新年鳥聲千種囀二月楊花滿路飛河陽一縣併是花金谷從來滿園樹一叢香草足礙人數尺遊絲即橫路開上林而競入擁河橋而爭渡出麗華之金屋下飛燕之蘭宫叉朵多而訝重髻鬟髙而畏風眉將栁而爭緑面共桃而競紅影來池裏花落衫中苔始緑而藏魚麥才青而覆雉吹簫弄玉之臺鳴佩凌波之水移戚里而家富入新豐而酒美石榴聊泛蒲桃醱醅芙蓉玉碗蓮子金杯新芽竹笋細核楊梅緑珠捧琴至文君送酒來玉管初調鳴絃暫撫陽春渌水之曲對鳳回鸞之舞更炙笙簧還移筝柱月入歌扇花承節鼓協律都尉射雉中郎停車小苑連騎長楊金鞍始被柘弓新張拂塵看馬埒分朋入射堂馬是天池之龍種帶乃荆山之玉梁艷錦安天鹿新綾織鳳皇三日曲水向河津日晚河邊多解神樹下流杯客沙頭渡水人鏤薄窄衫袖穿珠帖領巾百丈山頭日欲斜三晡未醉莫還家池中水影懸勝鏡屋裏衣香不如花七夕賦兔月先上羊燈次安覩牛星之曜景視織女之闌干於是秦娥麗妾趙豔佳人窈窕名燕逶迤姓秦嫌朝妝之半故憐晚飾之全新此時併捨房櫳共往庭中縷條緊而貫矩針鼻細而穿空蕩子賦蕩子辛苦逐征行直守長城千里城隴水恆氷合關山唯月明况復空牀起怨倡婦生離紗窗獨掩羅帳長垂新筝不弄長笛羞吹當年桂苑昔日蘭閨羅敷總髮弄玉初笄新歌子夜舊舞前溪别後關情無復情奩前明鏡不須明合歡無信寄回紋織未成遊塵滿牀不用拂細草橫階隨意生前日漢使著章臺聞道夫壻定應回手巾還欲燥愁眉即剩開逆想行人至迎前含笑來竹杖賦桓宣武平荆州外白有稱楚丘先生來詣門下宣武曰名父之子流離江漢孤之責矣及命引進乃曰噫子老矣鶴髮雞皮蓬頭歷齒乃是江漢英靈衡荆杞梓雖有聞於十室幸無求於千里寡人有銅環靈夀銀角桃枝開木瓜而未落養蓮花而不萎迎仙客於錦市送遊龍於葛陂先生將以養老將以扶危先生笑而言曰中國明於理義暗於知人心之憂矣惟我生民雖復疏條徑柘促節貞筠杖端刻鳥角首圖麟豈能相豫此疾將豫此身若乃世變市朝年移陵谷猿吟鷹厲風霜慘黷楚漢爭衡袁曹競逐獸食無草禽巢無木於時無懼而栗不寒而戰胡馬哀吟羌笳悽囀親友離絶妻孥流轉玉關寄書章臺留釧寒關悽愴羈旅悲涼疏毛抵於矰繳脆骨被於風霜髮種種而逾短眉髟髟而競長是以憂幹扶疏悲條鬱結宿昔僛醜俄然耆耋變田鳳於承宫改陽文於鬷蔑潘嶽秋興嵇生倦遊桓談不樂吳質長愁並皆年華未暮容貌先秋豫此哀矣雖然有以非鬼非魊乃心憂矣未見從心先求順耳伯玉何嗟丘明惟恥拉虎捭熊余猶稚童觀形察貌子實悲翁别有九棘龎眉三槐暮齒孔光謝病袁逢致仕吳濞不朝楊彪喪子明公此贈或非乖理先生乃歌曰秋藜促節白藋同心終堪荷蓧自足驅禽一傳大夏空成鄧林卭竹杖賦沈冥子遊巴山之岑取竹於北隂㛹娟髙節寂歷無心霜風色古露染班深每與龍鍾之族幽翳沈沈文不自殊質而見賞藴諸鳴鳳之律制以成龍之杖枝條徑直璘斌色滋和輪人之不重待羽客以相貽青春欲暮白雲來遲謀於長者操以從之執末而獻無因自持諸蔗雖甘不可以倚彼藜雖實不可以美未若處不材之間當有用之始魯分以爵漢錫以年昔尚爾齒今優我賢書橫几玉塵筵則函之以後拂之以前爾其摘芳林沼行樂軒除間尊卑之垂帨隨上下之遊紆夫寄根江南渺渺幽潭傳節大夏悠悠廣野豈比夫接君堂上之履為君座右之銘而得與綺紳瑶珮出芳房於蕙庭象戲賦觀夫造作權輿皇王厥初法凝隂於厚德仰沖氣於清虛於是緑簡既開丹局直正理洞研幾原窮作聖若扣洪鐘如懸明鏡白鳳遙臨黃雲髙映可以變俗移風可以蒞官行政是以局取諸乾仍圖上玄月輪新滿日暈初圓摸羽林之華蓋寫明堂之璧泉坤以為輿剛柔卷舒若方鏡而無影似空城而未居促成文之畫亡靈龜之圖馬麗千金之馬符明六甲之符於是搢笏當次依辰就席回地理於方圭轉天文於圓璧分荆山之美玉數藍田之珉石南行赤水之珠北使玄山之䇿居東道而龍青出西關而馬白既舒玄象聊定金稱昭日月之光景乘風雲之性靈取四方之正色用五德之相生從月建而左轉起黃鍾而順行隂翻則顧兔先出陽變則靈烏獨明况乃豫遊仁夀行樂徽音水影搖日花光照林乍披圖而久玩或開經而熟尋雖復成之於手終須得之於心乃有龍燭銜花金爐浮氣月落桂垂星斜栁墜猶豫樞機嫌疑涇渭顧望回惑心情怖畏應對坎而衝離忽當申而取未鏡賦天河漸沒日輪將起燕噪吳王烏驚御史玉花簟上金蓮帳裡始摺屏風新開户扇朝光晃眼早風吹面臨桁下而牽衫就箱邊而著釧宿鬟尚捲殘粧已薄無復脣朱才餘眉萼靨上星稀黃中月落鏡臺銀帶本出魏宫能橫却月巧挂回風龍垂匣外鳳倚花中鏡乃照膽照心難逢難值鏤五色之蟠龍刻千年之古字山雞看而獨舞海鳥見而孤鳴臨水則池中月出照日則壁上菱生暫設裝奩還抽鏡屜競學生情爭憐今世鬢齊故略眉平猶剃飛花磚子次第須安朱開錦踏黛蘸油檀脂和甲煎澤漬香蘭量髻鬢之長短度安花之相去懸媚子於搔頭拭叉梁于粉絮梳頭新罷照著衣還從粧處取將歸暫看絃繫懸知纈縵衫正身長裾斜假􅉔真成個鏡特相宜不能片時藏匣裏暫出園中也自隨燈賦九龍將暝三爵行棲瓊鈎半上若木全低窗藏明於粉壁栁助暗於蘭閨翡翠珠被流蘇羽帳舒屈膝之屏風掩芙蓉之行障卷衣秦后之牀送枕荆臺之上乃有百枝同樹四照連盤香添然蜜氣雜燒蘭燼長宵久光青夜寒秀華掩映蚖膏照灼動鱗甲於鯨魚焰光芒於鳴鶴蛾飄則碎花亂下風起則流星細落况復上蘭深夜中山醑清楚妃留客韓娥合聲低歌著節遊絃絶鳴輝輝朱燼焰焰紅榮乍九光而連彩或雙花而並明寄言蘇季子應知餘照情對燭賦龍沙雁塞甲應寒天山月沒客衣單燈前桁衣疑不亮月下穿針覺最難刺取燈花持桂燭還却燈檠下燭盤鑄鳳銜蓮圖龍並眠燼髙疑數翦心濕暫難然銅荷承淚蠟鐵鋏染浮煙本知雪光能映紙復訝燈花今得錢蓮帳寒檠忩拂曙筠籠熏火香盈絮傍垂細溜上繞飛蛾光清寒入焰暗風過楚人纓脫盡燕君書誤多夜風吹香氣隨鬱金苑芙蓉池秦皇辟惡不足道漢武胡香何物竒晚星沒芳蕪歇還持照夜遊詎減西園月枯樹賦殷仲文風流儒雅海內知名代異時移出為東陽太守常忽忽不樂顧庭槐而嘆曰此樹婆娑生意盡矣至如白鹿貞松青牛文梓根柢盤魄山崕表裏桂何事而銷亡桐何為而半死昔之三河徙殖九畹移根開花建始之殿落實睢陽之園聲含嶰谷曲抱雲門將雛集鳳比翼巢鴛臨風亭而唳鶴對月峽而吟猿乃有拳曲擁腫盤坳反覆熊彪顧盼魚龍起伏節豎山連文橫水蹙匠石驚視公輸眩目雕鐫始就剞劂仍加平麟鏟甲落角摧牙重重碎錦片片真花紛披草樹散亂煙霞若夫松子古度平仲君遷森梢百頃槎枿千年秦則大夫受職漢則將軍坐焉莫不苔埋菌壓鳥剝蟲穿低垂於霜露撼頓于風煙東海有白木之廟西河有枯桑之社北陸以楊葉為關南陵以梅根作冶小山則叢桂留人扶風則長松繫馬豈獨城臨細栁之上塞落桃林之下若乃山河阻絶飄零離别拔本垂淚傷根瀝血火入空心膏流斷節橫洞口而欹卧頓山腰而半折文袤者合體俱碎理正者中心直裂戴癭銜瘤藏穿抱穴木魅睗睒山精妖孽况復風雲不感羇旅無歸未能採葛還成食薇沈淪窮巷蕪沒荆扉既傷搖落彌嗟變衰淮南云木葉落長年悲斯之謂矣乃為歌曰建章三月火黃河千里槎若非金谷滿園樹即是河陽一縣花桓大司馬聞而嘆曰昔年移栁依依漢南今看搖落悽愴江潭樹猶如此人何以堪鴛鴦賦虞姬小來事魏王自有歌聲足繞梁何曽織錦未肯挑桑終歸薄命著罷空牀見鴛鴦之相學還欹眼而淚落南陽漬粉不復看京兆新眉遂懶約况復雙心並翼馴狎池籠浮波弄影刷羽乘風共飛詹瓦全開魏宫俱棲梓樹堪是韓馮若乃韓夀欲婚溫嶠願婦玉臺不送胡香未有必見此之雙飛覺空牀之難守表賀傳位皇太子表臣某言伏見二月十九日詔傳位於皇太子昔者降居弱水登庸有優劣之殊來朝櫟陽繼體有君臣之異不得與夫天之兩日日之再中並曜聨輝重明雙照同年而語矣伏惟天元皇帝惟聖作聖惟親尊親降意于與能鳴謙於神器欲令百工相和先聞揖讓之風天下無為早識吾君之子是以運獨見之明行非常之事先天不違後天而奉皇太子身貞萬國道照四門夙膺再命之符實允基天之命非關復子明辟異於遷虞事夏既損既益尚或二天為離為火何妨兩日且平陽蒲坂賢臣則二十五人顓頊髙辛才子則一十六族與此計事何遽無成鼚乎鼓之軒乎舞之自當八風通慶雲聚五老同遊三星運曜豈直雙龍再賜九雉重飛而已哉皇帝藐然姑射正當乘雲馭龍開道崆洞豈復先秋木落臣生預堯年時逢舜日覩維新之慶實倍萬恆情賀平鄴都表泰山梁甫以來即有七十二代龍圖龜書之後又已三千餘年雖復制法樹司禮殊樂異至於文離武落剡木弦弧席卷天下之心包含八荒之志其揆一矣伏惟陛下握天樞秉地軸駕馭風雲驅馳龍虎沈雄內斷不勞謀於力牧天䇿勇決無待問於容成是以威風所振烈火之遇鴻毛旗鼓所臨衝風之卷秋葉竊聞伊洛戎夷幽并僭偽抱圖載籍已歸丞相之府銜玉繫綬並詣中軍之營百年逋誅遂窮巢窟三代敵怨俄然掃蕩昔周王鮪水之師尚勞再駕軒轅上谷之戰猶須九伐未有一朝指麾獨決神慮平定宇內光宅天下二十八宿止餘吳越一星千二百國裁漏麟洲小水若夫咸康之年四方始定建武之代諸侯並朝不得同年而語矣雖復八風並唱未足頌其英聲六樂俱陳無以歌其神武坐釣臺而誓衆姒啓繼夏禹之功入商郊而問罪姬發成周文之志此無改之道大孝也歟當今鹿臺已散離宫已遷兵藏武庫馬入華山立明堂之制奏大武之樂盛矣哉上天降休未之有也政須東南一尉立于比景之南西北一候置于交河之北然後命東后詔蒼冥衢壇琬碑銀繩瓊檢告厥成功差無慚德臣忝竊榮幸蒞政東藩不獲躬到闕庭預觀大慶不勝鳬藻踴躍之至謹遣主簿曹敏奉表以聞賀新樂表臣聞天地順動則雷出為豫聖人成功則風行有節故六德在咸池之宫山谷可調八風入承雲之奏人神不雜我太祖文皇帝體國經野設官分職變魏作周移風正雅衣裳而朝萬國圭璧而會諸侯至如經綸圗籍校讐煙燼樂正無缺章秩宗無廢典豈但商頌十篇得諸太師之室虞書五禮取於恭王之宫伏惟皇帝以下武嗣興中陽繼業運日月之明動淵泉之慮律厯著微無煩于太史隂陽晷度躬定於天官故得參考八音研精六代封晉魏為二王序殷周為三恪雖復朱干玉戚尚識典刑素韍纁裳猶因雄據未若山雲特起八卦成形鳳凰於飛九州觀德改金奏于八列合天元于六舞聲含擊石更入登歌調起初鐘還參玉管足以感天地而通神明康帝德而光玄象昔者齋居玄扈為曲在於雲門師度盟津習舞歸於山立遂乃包括三名克諧一代作者之謂聖天之所啓乎豈惟路鼓靈鼗空桑孤竹廣矣大矣輪焉奐焉是知零陵孝亷空傳玉管始平太守虛稱銅尺臣等並預鈞天同觀張樂軒墀𢎞敞欄檻眺聽崇牙業業猛簴趪趪翠鳳揚旌靈鼉樹鼓杳冥雲霧蕩薄丘陵醴泉與甘露同飛赤雁與斑麟俱下聘魯請觀理當見其盛德適齊忘味定是知其盡美昔淵魚聽曲尚得聳鱗櫪馬聞絃猶能仰秣臣等誠愧知音敢忘悅豫若使詳其音律是所邈然但能記其鏗鏘於兹為幸不勝慶悅之誠謹詣朝堂奉表以聞請功臣襲封表臣聞以法施民必傳祀典以勞定國必有承家孫叔敖祭酹無聞有傷良相女叔齊胤嗣絶沒實貶賢臣謹案大統十六年詔先有封爵死於王事絶嗣者聽以支子繼襲非死王事不許承封前牒五等功臣皆是勤勞王室身當患難扞禦災禍翼贊大猷一日遇疾身捐館舍不幸無胤享祀便絶於禮則不足於義則有傷未求上林之獵已削其侯不服襜褕之衣先除其國伏惟皇帝崇德旌庸興亡繼絶聞鼓鼙而思將帥畫雲臺而念舊臣豈有功存社稷而無後可守事盡忠貞而無祠可祭周於蕃屏為約事在世功漢以山河為誓義存長久臣聞存人之國大於救人之災立人之後重於封人之墓竊以殷朝繼及無廢小宗周室興亡貴存身後紹髙密者纍葉豈専鄧禹之正胤嗣平陽者重世何必曹參之嫡孫愚謂生有其勞死非王事雖在支庶並聽承襲幸使伯有之魂不能為厲若敖之鬼其無餒而幽顯對揚人神咫尺為杞公讓宗師驃騎表臣某言伏見詔書以臣為使持節驃騎大將軍開府儀同三司宗師中大夫伏奉綸言心魂震讋臣聞堯分四嶽是以望秩山川舜命九官是以光華日月必須儀刑以德明試以功乃可協和萬邦咸熙庶績臣幼無學植長闕裁成鴻都之門不能定其章句雞鹿之塞無以名其碑碣憑天潢之派水附若木之分枝東嶽則朝宿有名南宫則門闌有籍在臣庸劣久知滿盈武陽以功臣之重特拜宗師東平以母弟之尊超登上將臣有何德能兼此榮臣早傾庭蔭曽未扶牆母氏慈訓哀矜勞苦甫及成人復垂捐棄几筵如在忍離鞠養之恩終天無報叩地難任欲草土丘陵終身塋域霜露申履時之感燕雀展回翔之心不悟天澤沛然謬垂提拔當今玉燭調和既非金革之世璿璣齊政豈忘松檟之餘况復一枝踡曲終危九層之臺一股涔蹄必傷千里之駕皇帝欽明文思光宅區宇禮格四方無容奪臣此志孝治天下自當哀臣此情大宗為師更求同姓之國元戎參乘别選能賢之臣伏願覽青蒲之奏曲允微誠詔鳳凰之池特收嚴召則天慈無濫私願獲從臣之容身便當有地不任荒悚戰懼之誠謹詣朝堂奉表以聞為閻大將軍乞致仕表臣聞禮云大夫七十致仕於朝傳家於子膳則二珍衣稱時制臣自出身奉國四十餘年遭遇風雲從微至著太祖文皇帝扶危濟難奄有關河臣實無堪中涓從事自洛食風塵河梁旗鼓華隂有白馬之兵河曲有黃沙之陳臣雖用命不能竒䇿功薄賞厚因人成事恩澤年表常以愧心仰逢周朝以揖讓登庸謳歌受命主貴臣遷頻煩榮寵三槐以鑄鼎象物知其神姦五等以桓圭飾瑞守其宫室臣以何德兼而有之况復水土之職王梁以應讖受徵兵戈之王韓信以登壇獨拜語其連類臣又何人當今四海未寧三方鼎峙陛下勞心之日羣公展效之秋而臣甲子既多耄年又及無參賓客之事謬達諸侯之班尸祿素餐久紊彞典負乘致冦徒煩有司加以寒暑乖違節宣失序風木交侵菁華已竭雖復亷頗強飯馬援據鞍求欲報恩何能為役榮啓期之樂適足自貽燭之武之言無能為也特乞解所居官言從初服事符骸骨之請非謀几杖之賜若臣北陵移病東皋歸老山河茅社一反司勳公侯圭璧還封典瑞則朝無冒位之人臣免妨賢之責虞氏養老敢希東序之榮周朝如荼豈望西郊之禮但瞻仰天威方違咫尺徘徊城闕私增悽戀不任知止之情代人乞致仕表臣聞一葉將隕寧待於風露百川皆到自竭者潢汚臣輒感之以悲以咽臣某中謝臣仲春之末舊患漸加雙足頗蹇四支不利扶步有邯鄲之失勉視無離婁之明安可率此留務溷兹恆典陛下恩周曲成未忍捐棄微臣困至于亟轉不堪勝臣所以自咎自傷淚繼之血臣特承先緒進不因人陛下憫臣無用舉直而有戅自奉圖太極宣綍中書陛下收臣於一心任臣以獨掌九年冀登宰輔八歲載踐宗伯出擁干旄入參衡鏡或雲臺之上微臣預疇咨之旨或日觀之下詔臣操刋勒之文美而暢之臣實尤忝明憲不敢以纎負玄造竟微于滴助日月其逾冰炭交集誠懷伏以前陪政事親荷德音謂臣等經侍軒墀子孫尚延保護臣荷螻蟻欻戴丘山臣宜生亦盡命死且陳力竊不知終而不知止朝列三數與臣同儕臣未六十推臣則幼獨臣彌當頓悴病不俟年盈量窮涯滿而招損逾時每乖于勿藥永日猶繫于苞桑覽分必然貪榮所忌伏乞免臣見職退畢餘生察臣榮不可支矜臣分不能強乃臣之幸也豈悟仁夀之闥有此一時承明之廬無緣再謁心神已弊晷刻增悲叨睿鑒則多士莫先違聖顔則小臣何逺惟冀三條啓道萬乘巡京悅西怨之羣黎逮東封之從者危魂倘駐枯骨如存是臣之愜非臣所望臣又聞驅奔效駕先輟于羸駘翔集賀成近遺於鎩翮彼尚知暮而况臣哉聞未遑請臣之懇戀至於隳官臣合書罪為晉陽公進玉律稱尺斗升表臣聞三才既立君臣之道已陳六位時成禮樂之功斯正故以叶和日月測度隂陽悅豫兆人儀刑萬國者也伏惟皇帝應籙馭天披圖受命據太陽而懸像履文昌而建極白環表讓德之符玄圭告成功之瑞太階既平升中可習必當水逮千年山稱萬嵗伏見敕旨刋正音律平章厯象奏黃鐘而歌大吕變孤竹而舞雲門莫不器取疏通聲從安樂四分既明三微是定是以聞鐘洛浦即辨聲乖聽鐸邯鄲先知響韻二分二至行于司厯之官九變九成被於和樂之職足以動天地感鬼神化被風俗平分寒暑豈直吟嘯溪谷回翔鸞鳳而已哉是知零陵廟前徒尋舜管始平城下空論周尺臣聞上製其禮下習其儀君定其法臣行其事謹造玉律一具并玉稱尺斗升合等始得成功至于分粟纍黍量絲數籥實以仰稟聖規參詳神思所冀節移隂管無勞河內之灰氣動陽鍾不待金門之竹而琬琰事輕般倕慮淺不足展采成均增輝度量齎器奉表以聞進象經賦表臣某言臣伏讀聖製象經并觀象戲私心踴躍不勝抃舞伏以性與天道本絶尋求直以懸諸日月遂獲瞻仰九州既奠近對河圖四轍中繩全觀玉䇿未飛玄鶴先聞金石之聲不上赤城獨見煙霞之氣置管而測光景愈髙沈玉而觀淵泉益逺寢不自涯課虛為賦詞非寥亮學無雕刻遂敢陳述誠為厚顔况復日之逺近本非童子所問天之渾蓋豈是書生所談冒用奏聞伏增流汗之至齊王進蒼烏表臣聞飛南陽之雉尚闡霸圖下建章之鵠猶調和氣况乃虞庭告瑞姬社呈祥咸髙識浦之心實貴能知之性伏惟皇帝陛下德教百姓孝刑四海攝提從紀天下文明是以東海輸禽乍改黔質西山度羽或變蒼精臣去月三十日行到陜州獲大都督莫仁回樂列稱於州射堂內見一蒼烏林薄回翔循環不去駐乘木之精轉司風之翼斯實禮敬所覃孝慈之感理宜歸瑞祕圖書祥帝册用光至德取效升平無令赤鳳留止偏為瘞玉之歌玄鶴徘徊獨擅銜珠之舞齊王進白兔表臣聞輿圖欲逺則玉虎晨鳴轍迹方開則銀麞入貢伏惟陛下明明在上翼翼居尊德動天關威移地軸是以風煙照燭毛羽禎祥史不絶書府無虛日臣受脤元戎用綏邊鄙轅門所屆始次熊山前茅慮無乃獲白兔光鮮越雉色麗秦狐月德符徵金精表瑞呈祥輿頌效異披圖尊敬之迹既明應事之機斯兆臣之龔行實從陜略瑞以素質彌雄西氣庶重承廟算方事申威掩代偃齊分韓裂趙不任鳬藻踴躍之情齊王進赤雀表臣聞南陽雉飛尚論秦霸建章鵠下猶明漢德當今天不愛寶地必呈祥自應長樂觀符文昌啓瑞伏惟皇帝欽明文思劬勞成務厯象日月允釐百工海水無波天星不動去四月十三日獲隴右符府參軍李暉牒稱户屬秦州清水郡伯陽縣文谷林在家庭獲一赤雀光同朱鳳色類丹烏降火飛精似入公車之府流金成製若上凌雲之臺謹按赤雀銜書止于鄷户周之受命興乎此祥即事所觀同符合契實可圖形瑞譜書頌儒林事足成臺名堪紀號豈直雲中太守見赤心之奉主蓬萊童子知白環之報恩臣等預觀休徵情迫恆慶不任鳬藻之至啓謝滕王集序啓信啓伏覽制垂賜集序紫微懸映如傳闕里之書青鳥遙蜚似送層城之璧若夫甘泉宫裏玉樹一叢玄武闕前明珠六寸不得譬此光芒方斯燭照有節有度即是能平八風愈唱愈髙殆欲去天三尺殿下雄才蓋代逸氣橫雲濟北顔淵關西孔子譬其毫翰則風雨爭蜚論其文采則魚龍百變蒲桃繞館新開碣石之宫修竹夾池始作睢陽之苑琉璃泛酒鸚鵡承杯鳳穴歌聲鸞林舞曲况復行雲逐雨回雪隨風湖陽之尉既成為喜之因舂陵之侯便是積慶之地信本乏材用無多述作加以建鄴陽九劣免儒硎江陵百六幾從士壠至如殘編落簡並入塵埃赤軸青箱多從灰燼比年痾恙彌留光隂視息桑榆已逼蒲栁方衰不無秋氣之悲實有窮途之恨是以精采瞀亂頗同宋玉言辭蹇吃更甚揚雄一吟一詠其可知矣好事者不求知音者不用非有班超之志遂以棄筆未見陸機之文久同燒硯至于凋零之後殘缺所餘又已雜用補袍隨時覆醬聖慈憐愍遂垂存録始知逾揚過差君子失辭比擬縱橫小人迷惑荆玉抵雀正恐輕用重寶龍淵削玉豈不徒勞神慮匠石回顧朽材變于雕梁孫陽一言奔蹄成於駿馬故知假人延譽重于連城借人羽毛榮於尺玉溟池九萬里無踰此澤之深華山五千仞終愧斯恩之重即日金門細管未動春灰石壁輕雷尚藏冬蟄伏願聖躬與時納豫南陽寶雉幸足觀瞻酈縣菊泉差能延夀伏遲至鄴可期從梁有日同杞子之盟會必欲瞻仰風塵共薛侯而來朝謹當逢迎冠蓋魚腸尺素雁足數行書此謝辭終知不盡謹啓謝周明帝賜絲布等啓臣某啓奉敕垂賜雜色絲布綿絹等三十段銀錢二百文某比年以來殊有闕乏白社之內拂草看氷靈臺之中吹塵視甑懟妻狠妾既嗟且憎瘠子羸孫虛恭實怨王人忽降大賚先臨天帝賜年無踰此樂仙童贈藥未均斯喜張袖而舞玄鶴欲來撫節而歌行雲幾斷所謂舟楫無岸海若為之反風薺麥將枯山靈為之出雨况復全抽素繭雪坂疑傾併落青鳬銀山或動是知青牛道士更延將盡之命白鹿真人能生已枯之骨雖復拔山超海負德未勝垂露懸針書恩不盡蓬萊謝恩之雀白玉四環漢水報德之蛇明珠一寸某之觀此寧無愧心直以物受其生於天不謝謹啓答趙王啓某啓仰承張幕全韓連營上地澠池置陳解鄧禹之圍函谷開關削王元之印蜂旗朝上刁斗夜鳴彌雄壯士之心足起橫行之志况復才人出娉還得賢夫塞外有夫人之城軍中有女子之氣都尉青旗即時春色將軍大樹已復花開雲氣浮壘流星泛枕細舞長歌橫簫直笛當乎此時青雲之上信不學無術本分泥沈忽逢天造搜揚仄陋今者遂總憲司預聞刋鼎獻歲刑書既應懸法上春木鐸方須徇人但年髮已秋性靈久竭嘉石肺石無以測量舌端鼻端惟知繁擁垂展一月遂涉兩年傾首東瞻山河千里風塵未盡霜露沾衣仰願珍宜以為身寶謹啓謝趙王示新詩啓某啓鄭睿至奉手教纍紙并示新詩八體六文足驚毫翰四始六義實動性靈落落詞髙飄飄意逺文異水而湧泉筆非秋而垂露藏之山嵓可使雲霧鬱起濟之江浦必當蛟龍繞船首夏清和聖躬怡裕琉璃雕管鵲顧鸞回婉轉緑沈猿驚雁落下風傾首以日為年犍為舍人實有誠願碧雞主簿無繇遂心寂寞荆扉疏蕪蘭徑驂駕來梁未期卜日遣騎到鄴希垂枉道謝趙王賚絲布等啓某啓鄭睿至蒙賜絲布綾等十段王褎至又賜許賜錢等望外之恩實符大賚非常之錫乃溢生涯曵練且觀無勞白馬之望流泉欲委佇見青鳬之蜚楊池掘荷李園移樹既欣谷利彌思青林陳留下粟有愧深恩櫟陽雨金翻慙曲施靈臺久客從此數炊黍谷長寒於今更暖從雲夢之田不喻此樂得豐城之劍未均斯喜謹啓謝趙王賚絲布啓某啓奉教垂賚雜色絲布三十段去冬凝閉今春嚴徑霰似瓊田淩如鹽浦張超之壁未足障風袁安之門無人開雪覆鳥毛而不暖然獸炭而逾寒逺降聖慈曲垂矜賑諭其蠶月殆罄桑車津實秉杼幾空織室遂令新市數錢忽疑販綵平陵月夜驚聞搗衣妾遇新縑自然心伏妻聞裂帛方當含笑莊周車轍實有涸魚信陵鞭前元非窮鳥仰蒙經濟伏荷深慈謹啓又謝趙王賚息絲布啓某啓某息荀娘昨蒙恩引曲賜絲布等五段南冠獲宥既預禮延稚子勝衣還蒙拜謁關尹津梁之織鄴地雙絲扶風彩文之機仙園獨繭青矜宜襲書生無廢學之詩春服既成童子得雩沂之舞况復栖烏挾子同知桂樹之恩澤雉將雛共喜行春之令根株一潤枝葉俱榮謹啓謝趙王賚犀帶等啓某啓奉教垂賚犀裝帶錢十貫魏君寶帶特賜劉楨趙王國租偏資裴楷貫藏文馬如燒安息之銀帶插通犀似獵雲南之獸北郭騷之長貧是所甘愜南宫敬之載寶殊非念望花開四照惟見其榮鼇戴三山深知其重昔沈羲將盡逢司命而還生士燮行埋值仙人而更活今日慈矜斯之謂矣馬前驅而導路或以識恩雞未曉而開關容能報主謹啓謝滕王賚巾啓某啓奉教垂賜鹿子巾一枚解角新胎戴藤初朵落星交映連珠疏點盤龍之刀既剪長命之縷仍縫翠羽懸推芙蓉髙讓遊斯隱士足笑鼓皮入彼春林方誇筍籜某蓬鬢鬆颯衰容耆朽三秋不沐實荷今恩十年一冠彌欣此賚謹啓謝趙王賚白羅袍袴啓某啓垂賚白羅袍袴一具程據上表空論雉頭王恭入雪虛稱鶴氅未有懸機巧緤變躡竒文鳳不去而恆飛花雖寒而不落披千金之暫暖棄百結之長寒永無黃葛之嗟方見青綾之重對天山之積雪尚得開襟冒廣厦之長風猶當揮汗白龜報主終自無期黃雀謝恩竟知何日謝趙王賚米啓某啓奉教垂賚米十石丹烏銜穟既集西周黃雀隨車還蜚東市漬而為種不無霜雪之精取以論兵即有山川之勢某陋巷簞瓢櫛風沐雨剝榆皮於秋塞握蟄燕于寒山仰費國租遂開塵甑非丹竈而流珠異荆臺而炊玉東方朔之捧米既息長飢西門豹之懇田方慚此賚謝趙王賚乾魚啓某啓蒙賚乾魚十畨醴水朝浮光疑朱鱉文鰩夜觸翼似青鸞况復洞庭鮮鮒溫河美鯽波瀾成雨鱗甲防寒某本吳人常想江湖之味及其飢也惟資藜藿之餘慈賚渥恩膏腴流竈不勞獅子之亭即勝雷池之長翻驚河伯獨不受人足笑任公終年垂釣謹啓謝趙王賚雉啓夏翟秋飛江翬春潤中牟縣之客遂得坐觀賈大夫之妻已應含笑仰費中厨來供下客山川道逺口腹知恩謝趙王賚馬并繖啓某啓奉教垂賚紫騮馬并銀釘乘具紫紬繖一張上天降雨特垂深澤若木流光偏蒙私照回兹翠蓋事重劉基之恩降此青驪榮深李忠之賜北部丹帷便須髙捲西河竹馬即已郊迎在命之輕鴻毛浮于弱水知恩之重鼇背負于靈山况復驚鴻别水但見裴徊黃鶴去關惟知反顧棲戀之心事同於此謝滕王賚馬啓某啓奉教垂賚烏騮馬一匹栁谷未開翻逢紫燕臨源猶逺忽見桃花流電爭光浮雲連影張敞畫眉之暇直走章臺王濟飲酒之歡長驅金埒謹啓謝滕王賚豬啓某啓奉教垂賚肥豕一腔白腹見珍度遼東之水赤欄為重對襄陽之城忽降全恩謹充炮烙孫𢎞牧於淄水惟以求錢卜式養于上林豈知其味謹啓書為梁上黃侯世子與婦書昔仙人導引尚刻三秋神女將梳猶期九日未有龍飛劍匣鶴别琴臺莫不銜怨而心悲聞猿而下淚人非新市何處尋家别異邯鄲那應知路想鏡中看影當不含啼欄外將花居然俱笑分杯帳裡却扇床前故是不思何時能憶當學海神逐潮風而來往勿如織女待填河而相見移文移齊河陽執事文周天和四年四月二十七使持節車騎大將軍儀同三司大都督陜西總管府移齊河陽執事自疆埸卧鼓邊鄙收烽義讓之行未能期月孔誠誨盜即值包藏是以板載之師須時而動自安封域非求拒防雖復風塵暫接旗鼓無侵五將即回雙崤已靜始奉朝旨獲被移書令受叛城使回軍實想彼邊司已奉處分既有此還輒須領納未知何日可遣戍兵指附行人遲能速報盟且不渝鄰境相善顧瞻原野幸甚實多故移又移齊河陽執事文周天和四年十一月十日陜州總管長史梁昕移齊河陽執事自拭玉繼書通關去傳實謂上方銷劍山陽息馬過兹禦客或慢重扄屬司疆隂行善盜君一臣二上穆下乖國家以邊鄙心搖須固備守大司馬齊國公天子介弟中軍元帥駕馭孫吳驅馳貔虎舉因農隙義異城郎師巡我境曽非反鄆縮載之畢前旗已回彼國兵馬不防殿後餘塵遂至相接建旌壘上未及五申安鄴城傍先驚七伏當時鋒刃或膏原野所獲彼將夏州刺史梁老首領今以相還尸鄉不逺無令久客馬驢甲兵鄭人使我掌其北門之管管籥也若潛師以來國可得也穆公訪諸蹇叔秦大夫蹇叔曰勞師以襲逺非所聞也師勞力竭逺主備之無乃不可乎師知所為鄭必知之勤而無所必有悖心且行千里其誰不知公辭焉召孟明名視百里奚之子西乞名術白乙名丙使出師於東門之外蹇叔哭之曰孟子吾見師之出而不見其入也公使謂之曰爾何知中夀中夀百嵗爾墓之木拱矣合手曰拱蹇叔之子與師哭而送之曰晉人禦師必於殽殽在𢎞農澠池縣西殽有二陵焉其南陵夏后臯之墓也臯夏桀之祖父其北陵文王之所辟風雨也此道在二殽之間南谷中谷深委曲兩山相嶔故可以辟風雨古道由此魏武帝西討巴漢惡其險而更開北山髙道必死是間余收爾骨焉秦師遂東秦師自鄭入滑僖公三十三年三十三年春秦師過周北門左右免胄而下超乘者三百乘王孫滿尚幼觀之言于王襄王曰秦師輕而無禮必敗謂過天子門不卷甲束兵超乘示勇輕則寡謀無禮則脫入險而脫又不能謀能無敗乎及滑鄭商人弦髙將市於周遇之以連珠擬連珠四十四首蓋聞經天緯地之才拔山超海之力戰陳勇於風飈謀謨出乎胸臆斬長鯨之鱗截飛虎之翼是以一怒而諸侯懼安居而天下息蓋聞蕭曹贊務雄略所資魯衛前驅威風所假是以黃池之會可以爭長諸侯鴻溝之盟可以中分天下蓋聞解封豕之結塞長蛇之源必須製裳千里喢血轅門是以開百里之圍用陳平之一䇿盟千乘之國須季路之一言蓋聞得賢斯在不藉揮鋒股肱良哉無論應變是以屈完參乘諸侯解方城之圍干木為臣天下無西河之戰蓋聞邯鄲已危徒思馬服薊城去矣空用荆軻是以竹杖扶危不能正武擔之石蘆灰縮水不能救宣房之河蓋聞穴蟻衝泉未知逺慮玄禽巢幕何能支久是以大厦既焚不可灑之以淚長河一決不可障之以手蓋聞膏脣喋喋市井營營或以如簧自進或以狙詐相傾是以子貢使乎五都交亂張儀見用六國縱橫蓋聞謀猷是習權變須長時增齊竈或卧燕牆是以井陘之兵如鴻毛之遇火長平之卒若秋草之中霜蓋聞彼黍離離大夫有喪亂之感麥秀漸漸君子有去國之悲是以建章低昻不得猶瞻灞岸德陽淪沒非復能臨偃師蓋聞市朝遷貿山川悠逺是以狐兔所處由來建始之宫荆棘參天昔日長洲之苑蓋聞天方薦瘥喪亂𢎞多空思説劍徒聞枕戈是以劉琨之英略莫知自免祖逖之慷慨裁能渡河蓋聞榖林長逺蒼梧不從惟桐惟葛無樹無封是以隨殊日月無益驪山之火雀臺絃管空望西陵之松蓋聞雷驚獸駭電激風驅陵歷關塞枕跨江湖是以城形月偃陳氣雲鋪非緑林之散卒即驪山之叛徒蓋聞死别長城生離函谷遼東寡婦之悲代郡孀妻之哭是以流慟所感還崩杞梁之城灑淚所沾終變湘陵之竹蓋聞三世用兵既非貽厥隂謀纍葉必以凶終是以李都尉之風霜上蘭山而箭盡陸平原之意氣登河橋而路窮蓋聞營魂不反磷火宵飛時遭獵夜之兵或斃空亭之鬼是以射聲營之風雨時有寃魂廣莫郡之隂寒偏多夜哭蓋聞江黃戎馬之徼鄢郢風飈之格乍有去而不歸或無期而逺客是以章華之下必有思子之臺雲夢之傍應多望夫之石蓋聞無怨生離恩情中絶空思出水之蓮無復回風之雪是以樓中對酒而緑珠前去帳裏悲歌而虞姬永别蓋聞樹彼司牧既懸百姓之命及乎厭世復傾天下之心是以一馬之奔無一毛而不動一舟之覆無一物而不沈蓋聞嚴霜之零無所不肅長林之斃無所不摽是以楚塹既填遊魚無託吳宫巳火歸燕何巢蓋聞名髙八俊傷於閹豎之黨智周三傑斃于婦女之計是以洪澤之蛟遂挫長飢之虎平皋之蟻能摧失水之龍蓋聞吳艘蜀艇不能無水而浮以紅間緑不能無弦而射是以籠樊之鶴寧有六翮之期骯髒之馬無復千金之價蓋聞性靈屈折鬱抑不揚乍感無情或傷非類是以嗟怨之水特結憤泉感哀之雲偏含愁氣蓋聞遷移白羽流徙房陵離家析里悽恨撫膺是以吳起之去西河潸然出涕荆軻之别燕市悲不自勝蓋聞亷將軍之客館翟廷尉之髙門盈虛倐忽貴賤何論是以平生故人灌夫不去門下賓客任安獨存蓋聞執圭事楚博士留秦晉陽思歸之客臨淄羇旅之臣是以親友會同不妨懷撫悽愴山河離異不妨風月關人蓋聞五十之年壯情久歇憂能傷人故其哀矣是以譬之文讓實半死而言生如彼梧桐雖殘生而猶死蓋聞秋之為氣惆悵自憐耿恭之悲疏勒班超之念酒泉是以韓非客秦避讒無路信陵在趙思歸有年蓋聞懸鶉百結知命不憂十日一炊無時何恥是以素王之業乃東門之貧民孤竹之君實西山之飢士蓋聞胸中無學猶手中無錢今之學也未見能賢是以扶風之髙鳳無故棄麥中牟之寧越徒勞不眠蓋聞十室之邑忠信在焉五步之內芬芳可録是以日南枯蚌猶含明月之珠龍門死樹尚抱咸池之曲蓋聞百尺之髙纍于九碁之上千鈞之重懸于一木之枝是以履虎尾而非險傷龍鱗而未危蓋聞居蘭處鮑在其所習白羽素絲隨其所染是以金性雖質處劒即凶水德雖平經風即險蓋聞豫章七年斃于豐草芳蘭九畹淪于幽谷是以欲求其真晉陽有自埋之蒿若賞其聲吳亭有已枯之竹蓋聞明鏡蒸食未為得所干將補履尤可傷嗟是以氣足凌雲不應止為武騎才堪王佐不應直放長沙蓋聞勢之所歸威之所假必能繫風捕影暴虎馮河是以輕則鴻毛沈水重則磐石陵波蓋聞意氣難干非資扛鼎風神自勇無待翹關是以曹劌登壇汶陽之田遽反相如睨柱連城之璧更還蓋聞卷葹不死誰必有心甘蕉自長故知無節是以螺蚌得路恐異驪淵雀鼠同歸應非丹穴蓋聞北邙之髙魏君不能削榖洛之鬭周王不能改是以愚公何德遂荷鍤而移山精衛何禽欲銜石而塞海蓋聞君子無其道則不能有其財忘其貧則不能恥其食是以顔回瓢飲賢慶葑之玉杯子思銀珮美虞公之垂棘蓋聞水之激也實濁其源木之蠧也將拔其根是以延年之家預論掃墓羊舌之族先知滅門蓋聞磨礪脣吻脂膏齒牙臨風扇毒向影吹沙是以敬而逺之豺有五子吁可畏也鬼有一車蓋聞虛舟不忤令德無虞忠信為琴瑟仁義為庖厨是以從莊生則萬物自細歸老氏則衆有皆無蓋聞三關頓足長城垂翅既羈既旅非才非智是以烏江艤楫知無路可歸白雁抱書定無家可寄漢魏六朝百三家集卷一百十一上欽定四庫全書漢魏六朝百三家集卷一百十一中庾信集目録序趙國公集序碑陜州𢎞農郡五張寺經藏碑溫湯碑銘秦州天水郡麥積崖佛龕銘有序終南山義谷銘有序思舊銘有序梁東宫行雨山銘東宫玉帳山銘吹臺山銘至仁山銘望美人山銘明月山銘刀銘三首贊自古聖帝名賢贊二十七首黃帝見廣成子堯登壇受圖舜舞干戚禹渡江湯解祝網文王見吕尚武丁迎傅説成王刻桐葉封虞漢髙祖置酒沛宫漢武帝聚書袁盎諌文帝朱雲折檻周公戒伯禽五月披裘負薪王祥叩氷魚躍孫叔敖􅑮蛇髙鳯好書不知流麥張良遇黃石公師尚父授丹書榮啓期三樂夫子見程生鉏麑見趙盾蔡澤就唐生相李陵蘇武别樊噲見項王秦穆公飲盜駿馬延陵季子遇徐君鶴贊有引神道碑周上柱國齊王憲神道碑周太子太保步陸逞神道碑周大將軍司馬裔神道碑周柱國大將軍長孫儉神道碑周柱國大將軍紇于𢎞神道碑周大將軍崔諶神道碑周車騎將軍賀婁慈神道碑周上柱國宿國公河州都督辛威神道碑周兖州刺史廣饒公鄭常神道碑周隴右總管長史贈少保豆盧永恩神道碑周柱國大將軍大都督同州刺史段永神道碑周柱國楚國公岐州刺史慕容寧神道碑漢魏六朝百三家集卷一百十一中目録欽定四庫全書漢魏六朝百三家集卷一百十一中明張溥輯庾信集序趙國公集序竊聞平陽擊石山谷為之調大禹吹筠風雲為之動與夫含吐性靈抑揚詞氣曲變陽春光回白日豈得同年而語哉柱國趙國公發言為論下筆成章逸態橫生新情振起風雨爭飛魚龍各變方之圭璧塗山之會萬重譬似雲霞赤城之巖千丈文參厯象即入天官之書韻涉絲桐咸歸總章之觀論其壯也則鵬起半天語其細也則鷦巢蚊睫豈真熊熊旦上增城抱日月之光焰焰霄飛南斗觸蛟龍之氣昔者屈原宋玉始于哀怨之深蘇武李陵生於别離之世自魏建安之未晉太康以來雕蟲篆刻其體三變人人自謂握靈蛇之珠抱荆山之玉矣公斟酌雅頌諧和律吕若使言乖節目則曲臺不顧聲止操縵則成均無取遂得棟梁文囿冠冕詞林大雅扶輪小山承蓋碑陜州𢎞農郡五張寺經藏碑蓋聞如來説法萬萬恆沙菩薩轉輪生生世界豈直優波提舍祇夜修多而已哉是以熙連禪河質多羅樹七處八會三清四説皮紙骨筆木葉山花象負之所未勝龍藏之所不盡雖復銀函東度金㲲南翻秦景遙傳竺蘭私記譬猶海水之一珠不下昆山之片玉若夫法雲深藏師子雷音𣑽志往生聲聞説戒雪山羅漢之論鷲嶺菩提之法本無極際何可勝言𢎞農五張寺者南陽張元髙寓居此地昔者千金之族見徙五陵大姓之民移家六郡蓋其流也元髙五子負荷遺訓離經辨志並是成名入室生光咸能顯德加以尊承慧業敬受法門兄弟同居共捨為寺伽藍肇建即以五張為名是知城居趙信仍名趙信之城殿入蕭何即號蕭何之殿加以象馬無吝衣裘是捨春園栁路變入禪林蠶月桑津回成定水平輿雖盛豈可獨擅二龍扶風最良不得専稱五馬寺主三藏大法師法映邑主洛州刺史張隆等財行法檀身心罄竭兼化鄉邑道俗數千敬造一功德輪見成三百餘部琅笈雲書金繩玉檢削蒸栗之簡裝酸棗之珠並入香城咸封禪閣坐堂伏檻羌非湘水之神緑房紫的足擬恭王之殿髙掌西望長河北臨鼎氣常浮爐煙咸起户牖寥廓吹萬龍門之風梁棟峥嶸落實河源之樹僧徒雲集不逺燉煌之城學侣相奔更合華隂之市兩陜昔分實基王化二陵今阻翻馳羽檄虞公屈産交亂風塵召伯甘棠凋零霜露雖復兼能共治未遣渡河之獸烽柝是警實擾移關之民是以法王御世天人論道汲引四流周圎五怖故能調伏怨憎消除結縛法水津梁得無砥柱之難香山轍迹非復終南之險天子命我試守此邦墨竈未黔孔席無暖才臨都尉之境即有樓船之役既而南風不競北道言旋幕府既開邦君且止鄉俗耆老依然此别屬兹法事須余制文聊以課虛為銘云爾舍衛之國祇樹之園三明極地八會窮源連河競説勝辨爭論波提東度秖夜南翻非空即色離相無言達人止是獨悟重昏身雖繫馬心避騰猿禪樓却月義殿翔鵾回風香蓋反露珠幡西臨砥柱東背轘轅河鳴陽硤山響蘇門翔禽歌囀流澗絃喧度河餘獸移關舊村昔為畿服今成塞垣城疑廣武地似樓煩爟烽並照象馬單奔無鍾襲莒有雨圍原不資十力誰釋三怨風傾地柱火及天元銀鈎永固金牒長存封君馬首方事南蕃言從楊僕請謝劉昆溫湯碑咸池浴日先應緑甲之圗砥柱浮天始受玄夷之命仁則滌蕩埃氛義則激揚清濁勇則負山餘力弱則鴻毛不勝仲春則榆莢同流三月則桃花共下其色變者通為五雲之漿其味美者結為三危之露煙青於銅浦色白於鉛溪非神鼎而長浮異龍池而獨涌灑胃湔腸興羸起瘠秦皇餘石仍為雁齒之階漢武舊陶即用魚鱗之瓦山間湧水實表忠誠室內江流彌彰純孝豈若醴泉消疾聞乎建武之朝神水蠲疴在乎咸康之世嵩嶽三仙之館不孤擅于天池華隂百丈之泉豈獨髙於蓮井銘秦州天水郡麥積崕佛龕銘有序麥積崕者乃隴底之名山河西之靈嶽髙峰尋雲深谷無景方之鷲嶺迹遁三禪譬彼鶴鳴虛飛六甲鳥道乍窮羊腸或斷雲如鵬翼忽已垂天樹若桂華翻能拂日是以飛錫遙來度杯逺至疏山鑿洞鬱為淨土拜燈王于石室乃假馭風禮花首于山龕方資控鶴大都督李允信者籍于宿植深悟法門乃于壁之南崕梯雲鑿道奉為亡父造七佛龕似刻浮檀如攻水玉從容滿月照曜青蓮影現須彌香聞忉利如斯塵野還開説法之堂猶彼香山更對安居之剎昔者如來追福有報恩之經菩薩去家有思親之供敢緣斯義乃作銘曰鎮地鬱盤基乾峻極石關十上銅梁九息百仭崕橫千尋松直隂兔假道陽烏回翼載疏山穿龕架嶺糾紛星漢回旋光景壁纍經文龕重佛影雕輪月殿刻鏡花堂橫鐫石壁暗鑿山梁雷乘法鼓樹積天香嗽泉珉谷吹塵石牀集靈真館藏仙册府芝洞秋房檀林春乳氷谷銀沙山樓石柱異嶺共雲同峰别雨冀城餘俗河西舊風水聲幽咽山勢崆洞法雲常住慧日無窮方域芥盡不變天宫終南山義谷銘有序周保定二年嵗次壬午七月已已朔大冢宰晉國公命鑿石關之谷下南山之材維公匡濟彞倫𢎞敷庶績燮理餘暇披閲山經以為終南惇物日月虧蔽杶幹栝柏椅桐梓漆年代藴積于何不有乃謀山澤之官兼引衡虞之匠東出藍田則控灞乘滻西連子午則據涇浮渭派别八溪流分九谷銅梁四柱石闕雙聳青綺春門溝渠交映緑槐秋市舟楫相通蓄之則為屯雲泄之則為行雨青牛文梓白鶴貞松運以置宫崇斯雲屋千櫨抗殿龍首干雲萬頃疏苖蟬鳴再熟川后讓德山靈景從豈如運石甘泉才通櫟陽之殿穿渠穀水直繞金墉之城將事未勞為功實重國富人殷方傳千載因功立事敢勒山阿銘曰寥廓上浮峥嶸下鎮壁立千丈峰橫萬仞桂月危懸風泉虛韻乘輿嶺阪舉鍤雲根八溪分注九谷通源北涵桐井南浮石門模象大壯規繩百堵膠葛九成徘徊千柱桂棟凌波柏梁乘雨疏川奠谷落實摧柯事均刋木功侔鑿河思舊銘有序歲在攝提星居鶉首梁故觀寧侯蕭永卒嗚呼哀哉人之戚也既非金石所移士之悲也寧有春秋之異髙臺已傾稷下有聞琴之泣壯士一去燕南有擊築之悲項羽之晨起帳中李陵之徘徊岐路韓王孫之質趙楚公子之留秦無假窮秋于時悲矣况復魚飛武庫預有棄甲之徵鳥伏翟泉先見橫流之兆星紀吳亡庚辰楚滅紀侯大去鄅子無歸原隰載馳轘轅長别甲裳失矣艅皇棄焉河傾酸棗杞梓與樗櫟俱流海淺蓬萊魚鱉與蛟龍共盡焚香復道詎斂遊魂載酒屬車寧消愁氣芝蘭蕭艾之秋形殊而共瘁羽毛鱗介之怨聲異而俱哀所謂天乎乃曰蒼蒼之氣所謂地乎其實摶摶之土怨之徒也何能感焉雕殘殺翮無所假于風飈零落春枯不足煩于霜露幕府昔開賢俊翹首為羈終嵗門人謝焉至於東首告辭西陵長往山陽車馬望别郊門潁川賓客遙悲松路嵇叔夜之山庭尚多楊栁王子猷之舊徑唯餘竹林王孫葬地方為長樂之宫烈士埋魂即是將軍之墓昔嘗歡宴風月留連追憶平生宛然心目及乎垂翅秦川關河羇旅降乎悲谷之景實有憂生之情美酒酌焉猶憶建鄴之水鳴琴在操終思華亭之鶴重為此别嗚呼甚哉麟亡星落月死珠傷瓶罄罍恥芝焚蕙歎所望鐘沈德水聲出風雲劒沒豐城氣存牛斗潸然思舊乃作銘曰風雲上慘舟壑移駸駸霜露君子先危紀侯大去懷王不返玉樹長埋風流遂逺荀伯舊縣慶封餘邑萬里歸魂修門詎入城連武庫山枕盧龍思歸道逺返葬無從徒留送雁空靡長松平陵之東無復梧桐松聲蕭瑟長起秋風疇昔隆貴提攜語默託情嵇阮風雲相得有酒如澠終溫且克朝陽落鳳大野傷麟佳城鬱鬱流寓于秦山陽相送唯餘故人孀機嫠緯獨鶴孤鸞閨深夜靜風髙月寒生平已矣懷舊何期匣中絃絶鄰人笛悲昔為幕府今成繐帷梁東宫行雨山銘山名行雨地異陽臺佳人無數神女羞來翠幔朝開新粧旦起樹入牀頭花來鏡裡草緑衫同花紅面似開年寒盡正月遊春俱除錦帔併脫紅綸天絲劇藕蝶粉多塵橫藤礙路垂栁低人誰言洛浦一箇河神東宫玉帳山銘玉帳寥廓昆山抵鵲總葉成帷連珠起幕玉䇿難移金花不落隱士彈琴仙人看博巖留舊鼎雲上新荆煮石初爛燒丹欲成桑田屢變海水頻盈長聞鳳曲永聽簫聲吹臺山銘江寧吹嶺雖山出筠秦簫下鳳此岫為真青槐避日朱少司晨石名新婦樓學仙人吳中字玉城南姓秦比花依樹登榭要春舞能留客聲便度新雕梁數振無復輕塵至仁山銘峰橫鶴嶺水學龍津瑞雲一片仙童兩人三秋雲薄九日寒新真花暫落畫樹常春橫石臨砌飛簷枕嶺壁繞藤苖窗銜竹影菊落秋潭桐疏寒井仁者可樂將由愛靜望美人山銘藝文作徐陵今兩存之髙唐礙雨洛浦無舟何處相望山邊一樓峰因五婦石是三侯嶮踰地肺危陵天柱禁苑斜通春人常聚樹裡聞歌枝中見舞恰對粧臺諸窗晝開斜看已識直喚便回豈同織女非秋不來明月山銘竹亭標嶽四面臨虛山危簷迥葉落窗疏看椽有笛對樹無風風生石洞雲出山根霜朝唳鶴秋夜鳴猿堤梁以堰野路疑村船橫埭下樹夾津門寧殊華蓋詎識桃源刀銘三首風伯吹爐雲師鍊冶鐵焰朝流金精夜下價重十城名髙千馬千金穎合百鍊鋒成光連斗氣焰動山精身文水動刃古珠生斗精遙降山靈下從水文千曲蛇鱗百重燕砥斂刃蜀水開鋒氣生分景環成屈龍讃自古聖帝名賢讃二十七首黃帝見廣成子治身紫府問政青丘龍湖鼎沒丹竈珠流疏雲即雨落木先秋至道須極長生可求堯登壇受圖登壇洛汭沈玉河湄丹圖馭馬緑甲乘龜榮光上幕休氣連帷雖存克讓於見文思舜舞干戚平風變律擊石來儀先齊七政更服三危朱干獨舞玉戚空麾南風一曲拱已無為禹渡江三江初鑿九谷新成風飛鷁涌水起龍驚樂天知命無待憂生危舟遂靜亂楫還平湯解祝網連珠兩起合玉雙沈榖為祥樹桑成樂林三方落網一面驅禽德矣聖政仁乎用心文王見吕尚言歸養老垂釣西川岸止磻石溪唯小船風雲未感意氣怡然有此相望于兹幾年武丁迎傅説虞田路斷辭澗泉飛躬勞版築有弊韋衣賢臣入夢天賜無違千巖之下遂得同歸成王刻桐葉封虞虞叔百里居河之汾帝刻桐葉天書掌文禮以成德樂以歌薰天子無戲唐其有君漢高祖置酒沛宫遊子思舊來歸沛宫還迎故老更召歌童雖欣入沛方念移豐酒酣自舞先歌大風漢武帝聚書獻書路廣藏書柱開秦儒出谷漢簡吹灰芝泥印上玉匣封來坐觀風俗不出蘭臺袁盎諫文帝千乘峻轍六轡危行迹回松坂山敘栁城龍淵地狹華蓋風驚賢臣攬轡可謂忠貞朱雲折檻上書直諫有怙明君先求斬馬遂請魚文身摧欄檻義烈風雲應從御史翻賴將軍周公戒伯禽伯禽居魯鳴玉來朝周公政治為國風謡北山有梓南山有橋禮容雖備俯仰無驕五月披裘負薪披裘當夏俗外為心雖逢季子不拾遺金禽巢欲逺魚沈唯深清聲滅迹何必山林王祥扣冰魚躍王祥之母鮮鱗是求氷連釣浦凍塞寒流精誠有感無假沈鈎二老同膳雙魚共浮孫叔敖逢蛇叔敖朝出容悴還家母氏顧訪知埋怪蛇爾有隂德陽報將加終為楚相卒享榮華高鳯好書不知流麥髙鳳好學専心不回流連經笥對玩書臺石門雲渡銅梁雨來麥流雖逺書卷猶開張良遇黃石公張良取履跪授無辭兵書一卷長者三期昔稱韓相今為漢師榖城餘石還歸舊祠師尚父授丹書尚父一遇周王是親赤雀既下丹書已陳自論秉鉞長别垂綸獨有磻石留名渭濱榮啓期三樂榮期三樂唯人與年夫子相遇即以為賢性靈造化風雲自然雅琴雖古獨有鳴絃夫子見程生程生夫子一遇相知薄言傾蓋桑隂遂移清陽共美賢聖同羈陳詩難别贈絹傷離鉏麑見趙盾趙盾將朝端衣整笏鉏麑受命衝冠怒髮惆悵賢臣顧瞻城闕利劒不抽青槐先絶蔡澤就唐生相蔡澤羇旅唐生決疑無勞神䇿不問靈龜富貴自取年夀須期雖云異相會待逢時李陵蘇武别李陵北去蘇武南旋歸驂欲動别馬將前河橋兩岸臨路悽然故人此别知應幾年樊噲見項王樊噲將軍漢王車右不憚鋒刃何辭巵酒霸上屯軍鴻門固守持謝范增唯留玉斗秦穆王飲盜駿馬駿馬遇盜秦王不嗔先傾美酒翻畏傷人鄰兵向國窮冦侵秦于時大盜還作功臣延陵季子遇徐君徐君有禮季子惟賢經過一遇如舊依然人非别後心許生前長松雖合寶劒猶懸鶴讚武成二年春三月雙白鶴飛集上林園大將鄭偉布弋設罝並皆禽獲六翮已摧雙心俱怨相顧哀鳴孤雄先絶孀妻向影天子愍焉信奏事階墀立使為讃九皋遙集三山逈歸華亭别淚洛浦仙飛不防離繳先遭合圍籠摧月羽弋碎霜衣塞傳餘號關承舊名南遊湘水東入遼城雲飛欲舞露落先鳴六翮摧折九門嚴閉相顧哀鳴肝心斷絶松上長悲琴中永别神道碑周上柱國齊王憲神道碑昔者軒皇受姓十有四人周室先封十有五國自爾承基纂胄保姓受氏雖復千年一聖終是百世同宗故知昔之東京既稱炎漢再受今之周厯即是鄷都中興公諱憲字毗賀突恆州武川人也晉太元之世據有黃龍魏孝昌之初奄荒玄菟太祖以百二諸侯三分天下函谷先登鴻溝大定功業如此人臣以終公含章天挺命世誕生降太一之神下文昌之宿珠角擅竒山庭表德儀範清冷風神軒舉聳動廊廟光華城闕未逾齠齓已議論天下事人或曰是謂若木一枝旁蔭數國長河一直自然千里風颷欲逺光景將升後魏二年封涪城縣開國公時年五歲也虹霓滿野是廢當途之髙鸑鷟鳴岐實始維新之命國家光宅受圖欽明秉厯大風初卷長沙始封周元年進爵安城郡公食邑二千户仍授使持節驃騎大將軍開府儀同三司開府同於馬駿秩擬六卿驃騎等於劉蒼位髙三事宗子維城彼多慚色武成二年授使持節大將軍都督益夀寧等二十四州諸軍事益州刺史改封齊國公食邑萬户公時年十有六王武子以上將開府未滿立年荀中郎為十州都督才踰弱冠方之於公已為老矣加復營丘負海齊桓公受脤之城岷山導江漢武帝求仙之地自非名陵孤竹聲振沈黎豈得南至穆陵西登積石幸無白虎之患寧待黃龍之盟卭筰畏威湄盧仰德生為立廟刻石頌功成都有文翁之祀非謂生前漢陽有諸葛之碑止論身後比之今日豈可同年而語哉保定四年與大司馬蜀國公圍金墉城師臨洛浦則廣武營奔兵上邙山則河橋路斷八川風俗五方名利鐵市銅街風飛塵起天和元年徵還行雍州牧公以日月之明威神其政漆沮既從荆岐即乂少陽用事路不喘牛仲秋以殷民無驚犬二年拜大司馬仍理小冢宰營室殿軍器太監天官以邦國為基是司六典夏官以兵戈為主専謀七德是以器械填委既包吳漢之功宫殿峥嶸彌壯蕭何之法時以白露涼風務間農隙督兵三萬出自宜陽拔伏龍之城平姚萇之壘馬陵削樹魏將路窮平隂聽烏齊師其遁天子冢弟禮絶羣公仁義所往事資道德建德元年進爵為王仍拜大冢宰姬旦封於曲阜不廢居中劉交國於彭陽無妨常從豈直周召二南並居師傳晉鄭兩國俱為卿士而已哉胸奴突於武川爟火通於灞上公述職巡御治兵朔方馬邑星飛龍城月動撓留犂之酒經略不前失燕支之山下馬而去東鄰逆命返道敗德囚箕子於塞庫羈文王於玉門天子將有孟津之師召公獨議公報以誕應天命克成厥勳昔者秦昭起師于蜀直問張儀晉武用兵于吳惟謀羊祜於是中軍無帥僉曰有歸五年拜上柱國元戎東討給王鐵騎二萬先襲太原斗建麾兵天離轉戰虎嘯風騰雲飛電掩林胡棗栗詎得充飢晉陽荻蒿何能拒防又加王精兵六萬長圍晉州然後六軍星陳萬騎雷動中權始及前茅已戰自爾即為前鋒橫行入鄴觀彼車絓槐本馬驚旋濘積甲髙昆陽之城封尸塞富平之水莫不如彼建瓴同斯破竹一朝指揮六合大定是用光昭下武翼亮中都足以攄祖宗之宿憤解生民之怨黷方當待彼石閭部斯玉鼓經緯天地光華日月既而赤烏夾日黃熊入寢實沈無祀桑林不祭宣政元年六月二十八日薨春秋三十有四季友之亡魯可知矣齊喪子雅薑其危哉公器宇淹曠風神透逺璣鏡照林山河容納置樽待酌懸鐘聽扣聲動天下光照四鄰武皇帝以介弟懿親特垂愛友而密謀竒䇿加禮敬焉常謂左右曰孔子云自吾有回門人日親其齊王之謂也用之作宰則萬方協和用之撫軍則四表懾伏豈直皋繇為士國無不仁隨會為卿民無羣盜愛玩書籍敦崇禮樂管絃入耳則溪谷俱調文雅沿心則煙霞並韻養由百發落雁吟猿應奉五行綈緗縹帙雍容舉止抑揚談論當世以為楷模搢紳以為軌範則少有壯志頗校兵書玄水降靈穀城授䇿飛風長栁月角星眉莫不吟誦在心撰成于手所著兵法凡有五卷六韜九法不用吳起舊書三令五申無勞孫武先誡可謂有忠孝焉有壯武焉不自驕矜謙光下物宋人獻玉不貪為寶百成子髙守仁為富不謂以信致欺為善非樂天年不享嗚呼哀哉以某年月日葬于石安縣洪瀆川之里原隰悽愴埋於盛德幾年丘陵搖落藴于才良永矣乃為銘曰悠哉朔方逖矣窮隂山連鳥道地盡龜林重黎業大伯翳功深胄其積德必有君臨太祖撥亂喪君有君功回地軸䇿動天文猶臨赤水尚覆黃雲諸侯八百天下三分公之挺生實惟天假翠微神降文昌星下照于四國充于兩社舟楫江河棟梁華夏水涌詞鋒風飛文雅純深之性地極天經忠貞之道事感百靈君親惟一臣子惟寧忠泉出井孝笋生庭乃宰天官為國之輔是居上將為天之柱乃聖乃神惟文惟武䇿髙開闢威移雲雨九宫神略三術謨明天離轉陳月德回兵黎陽水駭官渡山驚冀州既載東原底平溟波欲運弱木將危中峰嶽斷半海鵬垂鳳沈丹穴龍亡黑陂臨淄廢市東武山移千齡萬古英聲在斯周太子太保步陸逞神道碑公諱逞字季明本姓陸吳郡人也君子至止既紹虞賓鳳凰于飛實興齊國南越使者解漢帝之衣西陵將軍覆吳王之蓋曽祖載為宋王司馬留鎮關中赫連之亂伏劒魏室黃河參陵或亡追路烏江艤船更無歸迹今為河南洛陽人也髙祖冠軍將軍榮州刺史吳人有降附者悉領為别軍自是官帥擁鐸更為吳越之兵君子習流别有樓船之陳父政驃騎大將軍儀同三司恆州刺史中都獻公太祖扶危濟傾經綸夷阻報君之恥逺襲平原以髙平霸業所基委命留事關中餽食非直榮陽之師河內供軍豈但淇園之竹公秉照晉之靈降明神之德猛虎振檻七年不驚羝羊觸藩九齡能對諸兄以公先君愛子稱之曰仁推而襲封雖復季末大成之心守節疑有闕文既遭燻穴翻從壓紐太祖初封函谷始合諸侯以公詞令參謀機密故得戎政克宣師言無漏賜姓步陸孤氏委鹿輅而論都入鴻門而舞劒方之吹律綽有餘榮出身羽林監輕車將軍除尚書右丞官聨會計務殷平隼水衡貫朽常平粟紅授使持節車騎大將軍儀同三司增邑千户尋遷駕部中大夫領吏部中大夫厯藩部御伯東京鼎實先加鄧隲之勳西晉官人多用山濤之啓豈若五王登朝必司賓主之禮六龍御轡取定鸞和之節御正以官觸父名不拜會稽有王會之名其子不為太守博陵有王沈之封其兒不為刺史遷驃騎大將軍開府入掌納言治司宗伯又為軍司馬職居常伯勤問於南宫位管王言連官於北斗豈止郊天祀地龍門嶰谷之聲贊鼓頒旗白露涼風之月暗夜有人餉羅數十匹公閉門不受行人干觸具以聞奏朝野稱之太尉楊震直推故吏之金涼州張奐髙揖羌人之馬清畏人知我無慚德齊國通和封人受使以公有出境之才見命張􅎶之禮既珠盤歃血定楚國之連名匕首登壇反齊人之侵地是謂使乎固稱光國三輔公侯五陵鐘鼎桐街栁市塵起風飛乃授京兆尹增邑通前一千六百户餘官如故上林兵息蘭池盜靜不學王陽平生鑄金之術未同張敞終日章臺之遊家僮暮行還得遺錢於道并白絁十匹公訪得其主即以還之見金於路指以示人得錢於道留持挂樹方之今日異代同風俄遷司會治小司馬重總六軍再操八柄考績入於嵗成論功書之年表尋授都督宜州諸軍事宜州刺史露冕觀風停車待雨百城解印憚朱穆之威千里相迎愛王基之德曽未期月被勑追還眷眷吏民不無河內之請依依故老實念黎陽之别少陽養德前星守器尊師讓齒必俟賢能乃授太子太保方之劉實道髙於大邦譬以山濤榮深於小輦本有消渴之疾常餌金石自理舊疾微增奄捐館舍茂陵之下不留封禪之書校尉之營惟餘服食之器嗚呼哀哉春秋四十有七建德二年五月十一日也天子以大臣之喪躬輟聽訟東朝以師傅之尊親臨攢祭詔贈大將軍諡某公禮也以今三年正月十日葬於京兆之髙陽原夫人郁久閭西遇王姬愛敬肅恭言容令淑有聞針盥無廢絃綎爰在盛年先從大夜今節婦開墳松柏已拱季孫成寢丘陵始同况復圖畫賢妃方在甘泉之室瘞埋才子即用髙陽之原公儀表外明風神內照器量深沈階基不測事君惟忠事親為孝言為世範行為士則留連墳索怊悵文詞霜府録於尚書天官總於司會出入匡贊常帶數職身具六龜腰恆四綬陳平密謀既非天子所見荀彧上䇿又非諸侯所聞其為郡也惟取赤土封書其為州也唯以青鹽换粟留家則千樹無資遺子則一經而已嫡子操至性過禮純孝不遺墳前之樹染淚者先枯庭際之禽聞悲者則下銘曰山連日觀水枕滇機富春沙起開陽柱飛大夫屈節將軍振威南越受吏西陵解圍昔我烈祖垂翅秦中白馬無路烏江不通笛吟鄉里琴哀土風營州恆州擁旄世載壯節旃矜人雄關塞直河穿趙平雲臨代生謂立功沒為留愛降兹嶽瀆誕此貞明祥符雲氣慶合星精宫帷定䇿殿柱書名忠泉暗漏孝笋寒生世屬殷周時逢楚漢天下三分鴻溝一半以我明略來參匡贊日乃再中天成兩旦遞參三事歷副六卿天司光宅地載謨明春官定禮夏官治兵讖言默識溫樹無名謙恭周密言行無乖忠公兕殪隂德蛇埋軍國紛總部領瑱階一作偕馬不入廏金不入懷具瞻惟德髙山惟仰甲觀初登龍樓初上東國桓榮西京疏廣年齡俄頃風電相摧銘旌兩沒池栁雙回煢煢胤子在疚銜哀身彰野火心懼天雷月日其除榮終哀始馬歸司𨽻書還太史厯對天星墳連地市山勢接飛松形蓋起德音無絶平原忽矣周大將軍司馬裔神道碑公諱裔字遵胤河內溫人也昔顓頊之命始則南正司天重黎之後又以羲和掌厯夏陽適晉得隨會而同奔東海避秦與毛公而俱隱其後金行受命玉笥南遷帝系極于輿圖中朝至於江表曽祖楚之晉太傅録尚書揚州牧會稽文孝王之次子元顯之幼弟也元顯見害之後桓玄篡逆之初爰自齠齓客身屠釣河內道左抱劒長號代郡城前慟悲靈祭江淮志節之士汝潁風塵之客感激一言咸多依附既而雲生伏鱉星出鯨魚太白經天蚩尤映野公乃收合餘燼泣血登陴臨武牢之關據成皋之坂擁衆萬家歸於魏室魏明元皇帝遙授平南大將軍荆州刺史襲封琅琊郡王尚河內公主命王承制從賓國之儀于時宋兵憑陵旗鼓侵逼虎牢不封金墉無援魏太武皇帝授王使持節侍中安南大將軍開府儀同三司給前後部鼓吹元戎啓行志雪寃恥登壇慷慨三軍掩泣黃河漕粟已出石門白馬連旗將臨野坂既而雲中柝起代郡烽燃反斾南轅途窮北略贈征西大將軍都督梁益秦寧荆兖青豫郢洛十州諸軍事揚州牧司徒諡貞王祖金龍封琅琊鎮西大將軍儀同三司吏部尚書贈司空諡康王父悅鎮南將軍豫州刺史漁陽莊侯以荆河刺舉時值亂離釁起蕭牆遂終非命公遺腹載誕流離冦逆復壁襁負深山擁樹程嬰之匿趙武從役家臣王成之藏李燮為傭酒市遭太夫人憂苫草墳塋以終灰燧形骸毁瘠逾於喪禮年十有五始幹家事楹前鑿柱即取遺書石上開松仍求故劒出身司徒府參軍除中堅將軍員外散騎常侍值魏室多難所在蜂起孟津以北無復封畿嵩山以南即為鋒鏑公建議修武立柵溫城函谷西封河橋北斷長亭籍馬並入武城百里租車咸輸溫縣太祖文帝締構關都經綸夷阻招攜以禮懷逺以德馬文淵之擇主去隴坻而歸身竇周公之入朝在河西而奉詔大統七年蒙授平東將軍北徐州刺史十年河內故義四千餘家願立忠誠須公衣錦乃授使持節領河內太守加前將軍懷州拓境兩鎮奔波栁泉轉戰三城授首十三年太祖召山東諸立義之將能率衆入關者有加重賞公率先而至領户千室即以為封固辭不受其菽粟之賜或以指囷馬牛之賞將同量谷朝廷以華陽西極漢水東流歎孟達之奔兵怪劉封之失䇿魏前元年移鎮漢中除白馬城主領華陽郡守昔稱導漾今聞上瀦煙沈氷井雨歇雲門其年授大都督加散騎常侍柱國蜀國公開金牛之道通牧馬之關公卷甲北塞懸車束馬遂得䇿預葭萌勳參綿竹封龍門縣開國子蒲州刺史仍領新州尋授使持節車騎大將軍儀同三司大中正隆周授圖天保大定以公才望仍為舊臣遂乃義深追逺恩隆繼絶即改封琅琊縣公邑五百户仍遷驃騎大將軍開府儀同三司都督巴州諸軍事巴州刺史武成二年被勑赴援信州魚復道阻屢却岑彭荆門水急幾沈吳漢公乃月峽先登瞿唐直上天子以公操履忠勤儀刑亮直乃徵為大御伯尋轉大御正邑一千一百户樞機近侍出納絲言所謂多識舊章殿中無雙者矣四年大軍東討公所領義衆先守枳關授都督懷州諸軍事懷州刺史偃師張幕河陽牧馬雖接戰于富平巳連營于官渡五年詔追還拜始州刺史更討信州賊山彰尋寶渝恃險峽路五尺絙約才通縣水三門橋飛齊渡既而風行屮偃谷靜山空前後平十一城獲九千餘口馬歸平樂金輸水衡天保二年除信州刺史都督信州諸軍事朝發白帝暮宿江陵氣振巴丘之兵威警建平之戍五年遷潼州刺史益州柱國公降帝子之重鎮天井之星延閣擬于叢臺岷山方于代郡公仰稟雄謨參謀逺略故得身預舞陽之功位極長平之寵六年授使持節大將軍大都督西寧州諸軍事西寧州刺史方欲關沫若徼牂牁見夜郎之侯習昆彌之戰而飛鳶墮水馬援去而無歸金馬騁光王褒行而不反嗚呼哀哉七年正月十日薨春秋六十有五詔贈使持節大將軍懷邵汾晉四州諸軍事懷州刺史夫人襄城公主魏獻帝之曽孫趙穆王之季女王姬肅恭䄖翟典禮四教兢莊三星令淑有光隆慮之賢足表平陽之盛生則從夫以秩死則同穴以禮建德元年八月十二日合葬于武功三時原大夫墓樹以柏諸侯墳髙于雉吁嗟滕公來居此里詔諡定公禮也公資忠履孝藴義懷仁直幹千尋澄波萬頃逄蒙射法力牧兵書星辰髙下之占風雨逢迎之氣故得師出以律天幸將軍者也至如官曹案牘未常煩壅戎馬交馳不妨餘裕足使四嶽彌峻三台更明在朝四十一年身經一百餘戰凡任四郡歷八州未嘗以貨殖經懷去如始至渭南千畝之竹更懼盈滿池陽二頃之田常思止足身歿之日家無餘財素車白馬狹室﨑嶇黃腸玄甲階庭仄陋有詔冬官為營寢室朱邑祭酹無所漢后是以賜金陳表妻子露立吳王為之開館嗚呼哀哉世子侃孝家忠國揚名顯親是以勒此豐碑懼從陵谷植之松柏不忍凋枯銘曰欽若厯象平秩寅賓少梁奔華地入咸秦族夷興馬書窮獲麟玉鏡云始金行乃構象浦通關龍沙開候上糝石起河陽水鬬五馬南浮三星東宿太傅作牧奄有江沱司徒避亂承制荆河既勞推轂猶思枕戈龍媒被野蒼兕凌波莊侯季年禍機相接誕公遺嗣﨑嶇懷挾山竄趙武家藏李燮伍員道阻燕丹路遙南奔楚塞北避秦橋水流登隴寒風度遼有功都護則重嫖姚懷書上馬習禮從戎陳圖六甲兵占八風藏松寶劒射栁雕弓推誠賈復屈節亷公八翼頻飛六條亟秉勇此仁義行兹寬猛持印山開沈黎盜靜取甲無丘均田不井懋功賜爵上將賞官軍中受詔塞外登壇方屠參合更鏖皋蘭渝川毒水僰道災氛地亡都尉灘悲使君谷寒無日山空足雲北風吹旐秋霖泣軍遺奠雙設銘旌雨布沁水同墳平陽合墓悲哀嗣子攀號靡訴慟甚風枝悲深霜露自此何世從斯幾年麒麟欲鬭華表中燃地形樓起松心蓋圓茫茫丘壠代代英賢周柱國大將軍長孫儉神道碑蓋聞放勛立而羲和升重華登而元凱用思皇多士既成西伯之功俊德克明乃定南巢之伐是知惟賢非后弗食惟后非賢弗乂若夫君臣一德啓心沃心見之昌寧文公矣公諱儉初名慶明恆州髙陸人也北嶽天孫之星燕河帝子之國故多竒節甚茂華風髙闕圖南二王齊軫長城拔本十族分源髙祖太尉北平王光輔五君允釐百揆恆衛既從淮沂其乂祖豹龍驤將軍恆州刺史常山刺舉非無取代之符龍驤總戎或似平吳之號父馘年止弱冠榮終解印公以五常藴智六氣資德乘天則䇿馬秉靈降神則牽狼應象直心于物水火恬然無負于天雷霆不懼富貴自取豈資唐舉之言聲名有聞無勞李膺之識年十八解褐員外散騎侍郎尋授輕車將軍羽林監太祖文皇帝駕馭天綱苞羅英傑選公才德光佐中書諸葛亮之西歸玉壘成三分之業管夷吾之入仕葵丘有一匡之功天水黠羌漁腸羣盜乃遷秦州長史防城大都督封信都縣開國伯三年滑州蟻聚保鄣沈命靡旗亂轍乘氷渡河丞相大行臺授假節撫軍行滑州刺史大統元年授持節西夏州刺史加散騎常侍郅支抱馬如聞耿秉之戰單于願識似畏王商之威五年遷使持節鎮東將軍都督東北三夏諸軍事西夏州刺史增邑千户改伯為公既而江漢遼逺車書寂寞蜀主的顱未出檀溪之水秦王飛雉猶向南陽之城六年以公為使持節都督三荆二襄南雍平信江隨郢浙十二州諸軍事荆州刺史東南道行臺僕射楚城鄰境實有讓田吳人對營無妨贈藥部內屬城為人所訟公遂集文武肉袒自罰兄弟不讓延夀責躬吏民有過翁歸引咎天子異之璽書勞問贈賄加幣王人接踵大丞相書云此之美事耳目之所未經歎賞無極故遣專使公善于撫馭長于接引山藪無棄苞苴不行示人赤心與人顔色盜不敢發民不忍欺至是將校耆老于州城之南起清德之樓勒賢臣之頌杜鎮南之作牧當世樹碑竇車騎之臨戎生年刻石方之今日彼獨何人于時户口日增荒萊畢墾華實紛敷黔黎茂豫但恐衮職有闕待公而補鼎飪未和須公而正是以漢隂民望荆南杞梓並皆上書詣闕連名乞留河內之借冦恂更慙謁帝交州之請士燮還著上表九年授車騎大將軍儀同三司十二年除大行臺尚書仍為大丞相司馬以公識度嚴明志節清儉遂改公名儉字慶明非關書月詎待看碑幸得千畝不同二山無廢十三年加開府餘官如故十四年除尚書右僕射加侍中進驃騎大將軍居上星執法在文昌之位以公才望兼而有之十五年更除東南道行臺僕射都督十五州諸軍事行荆州事十六年大丞相總十六軍尅清河洛公又中分麾下參謀帷幄髙選霸僚公為長史其年加都督南道三十六州諸軍事餘官如故南陽文學更遇王基章華衮衣還迎郭賀昔日伐蜀之謀張儀與秦昭計合平吳之利羊祜與晉武意同太祖始定成都即有江陵之志公密獻其䇿懸符深旨糧運久積梯衝立備一戰而舉鄢郢再戰而燒夷陵遂得席卷三荆此又公之勳也詔賞奴婢三百口太祖與公書云由公立計果如所謀令公作鎮江陵以安蜀地後魏二年改武川昌寧郡開國公歷陽居民非惟景丹之封曲逆户口豈但陳平之國其年授大將軍太和之中曹真于府內受册元封之末衛青于軍中即拜公之此比綽有餘榮詔曰吳人未復須助謀謨今使梁王兵馬受公節度三年加都督東南道五十二州諸軍事增邑萬户維周革命光宅欽明作二天官允諧邦治元年授小冢宰保定二年治蒲州刺史檢校六防諸軍事四年治襄州仍授柱國大將軍餘官如故秩登四嶽階平六府豈不功重昭陽名髙蔡賜控馭五十州風行數千里拔園葵而去織婦無三惑而絶四知一室之中未免虛白日膳之資三杯而已詔賜繒綵一千段粟麥二千斛天和元年陜州刺史都督八州二十防諸軍事解荆州總管餘悉如故路出王宫城臨河曲戍清陜右髙視棠隂部領宴煩晦明為疾天和四年謝病故京薨于私第春秋七十有八鑾蹕降臨軒懸輟樂九旒龍斾之錫三河騎士之送詔贈太保涼夏靈銀長原河鄯甘瓜十州諸軍事涼州刺史諡曰文公狀貌丘墟風神磊落玉山秀立喬松直上煙霞之涯際莫尋江海之波瀾不測少遭荼苦在山服終攀柏樹枯侵松獸死盡忠事國竭力從政其門如市其心若水竒䇿密謀百僚仰止忠貞亮直明王敬焉至如風后隂陽之占力牧星辰之度魏公子之兵書李將軍之射法莫不成誦在心取為時用居常服玩或以布被松牀盤案之間不過桑杯石鼎遺令山陵一無所用公私贈襚並不得受止依太祖陵側無忘事君墩等兄弟並至性善居喪號慕墳埏奉遵遺訓是以衛青之塜仍陪漢武之陵管仲之墳即接齊桓之墓天和六年天子以四海未寧三方鼎峙有懷將帥之志言念封疆之臣既畫雲臺乃題麟閣更贈公為鄶國公邑五千户追崇列辟事極神魂再改銘旌恩隆封墓公在民留愛身後見思吉日良辰郊祠野祭儀同趙超等六百九十七人表求立廟陳請象魏有詔許焉桂棟杏梁緑墀青瑣按歌會舞鳳蓋霓裳南浦送而行雲東風飄而零雨是知漢陽郡前非徒武侯之廟臨淄城下豈獨欒公之社嗚呼哀哉乃為銘曰道鍾屯剝世屬雲雷地軸左轉天關北開容車周室繫馬秦臺乃齊七政爰答三才烈祖燮諧九龔梁棟取才逢獵求賢入夢匡贊官雲謀猷紀鳳律定公族圭分職貢乃惟嗣德實秉英靈身圖斗宿面繞樞星青襟敬業童子離經信陵虛左干木分庭忠孝純深樞機周密孔光不言曹參勿失溫席扇枕承顔悅膝凍浦魚驚寒林笋出肅肅風政沈沈器局直似貞筠溫如瑞玉清不置水明非舉燭馬願如羊金須似粟上將克升元戎即序夏陽三捷夷陵一舉憑軾下齊陵江入楚鼎反厯室鐘歸大吕六卿咸事天官是司二南作伯棠隂實治清風有頌緑竹聞詩贈行之典超然帝師昔侍蘭苑今陪杏林死生契闊無違一心風雲積慘山陳連隂陵田野寂松徑寒深夏嬰之隴橋玄之墓馬見千年車回三步左無長樂前非武庫直望髙碑增悲行路周柱國大將軍紇干𢎞神道碑公諱𢎞字廣略原州長城縣人也本姓田氏虞賓在位基于揖讓之風鳳凰于飛紹于親賢之國論其繼世之功則狄城有廟序其移家之治則長陵有碑况復髙廟上書小車而對漢主聊城祭鳥長嶽而驅燕將公以胎教之月嵗德在寅載誕之辰星精出昴是以月中生樹童子知言水上浮瓜青襟不戲而受書黃石意在王者之師揮劒白猿心存霸國之用魏永安中以任子都督原州軍事受隴西王節度于時洛邑亂離當途危逼禮樂征伐不出于天子舉賢誅暴實在于強臣太祖文皇帝始創霸功初勤王室秣馬搜乘誓衆太原公仗劒轅門粗謀當世隨何逺至實釋漢帝之憂許攸夜來即定曹王之業永熙中奉迎魏武帝入關封鶉隂縣開國子邑五百户太祖以自著鐵甲賜公云天下若定還將此甲示寡人白水良劍罷朝而贈陳寵青驪善馬回軍而賜李忠並經輿服足為連類大統三年轉帥都督進爵為公十四年授使持節都督原州諸軍事原州刺史仙人重返更入桂陽之城龍種復歸還尋白沙之路公此衣錦鄉里榮之侍從太祖戰河橋復𢎞農解華山圍平沙苑陳每有元勳常蒙别賞太祖在同州文武並集號令云人人如紇干𢎞盡心天下豈不早定即授車騎大將軍儀同三司前魏元年轉驃騎大將軍開府祈連猶逺即受冠軍之侯沙幕未開先置長平之府梁信州刺史蕭韶寧州刺史譙淹等猶處永安稱兵漁陽公受命中軍迅流下瀨遂得朝發白帝暮宿江陵猿嘯不驚雞鳴即定西平反羌本有漁陽之勇鳳州叛氐又習仇池之氣公推鋒直上白刃交前萬死一決凶徒多潰身被一百餘箭傷肉破骨者九瘡馬被十槊露布申上朝廷壯焉葛履糾糾魏有去舊之歌零露瀼瀼周受惟新之命乃進爵封雁門郡公食邑通前二千七百户保定元年授使持節都督岷州諸軍事岷州刺史隴頭流水延望秦關川上峨眉猶通蜀道公不發私書不燃官燭獸則相負渡江蟲則相銜出境四年拜大將軍餘官如故衛青受詔未入玉門之關竇憲當官猶在燕山之下公之此受差無慙德渾王叛换梗我西疆巖羌首竄藩籬攜二公受脤于社偏師逺襲揚旍龍涸繫馬甘松二十五王靡旗亂轍七十六柵鶉奔雉竄既蒙用命之賞乃奉旋師之樂天和二年被使南征帶甲百萬舳艫千里江源水起海若乘流船官之城登巢懸爨吳兵習流長驅戰艦風灰箭火倐忽凌城公以白羽麾軍朱絲度水七十餘日始得解衣朝廷以晉尅夏陽先通滅虢之政秦開武遂始問吞韓之謀是以馳傳追公以為仁夀城主齊將段孝先斛律明月出軍定隴以為宜陽之援公背洛水而面熊山陳中軍而疏行首乘機一戰宜陽銜璧增封五百户進柱國大將軍司勳之册也建德元年拜大司空二年遷少保姬朝三列少保為前炎正五官冬官為北頻煩寵命是謂賢能三年授使持節都督襄郢昌豐唐蔡六州諸軍事襄州刺史江漢之間不驚雞犬樊襄之下更多冠蓋既而三湘遼逺時遭鵩入五溪卑濕或見鳶飛舊疾增加薨于州鎮天子畫凌煙之閣言念舊臣出平樂之官實思賢傅有詔贈某官禮也即以四年四月二十五日歸葬于原州髙平之鎮山屬國玄甲輕車介士一依霍驃騎之禮衛將軍之葬嗚呼盛哉公入仕四十五年身經一百六戰通中陷刃疾甚曹參刮骨傅藥事多關羽而風神果勇儀表沈雄事親無隱無犯學不専經略觀書籍兵無師古自得縱橫青烏甲乙之占白馬星辰之變九宫推步三門起伏天弧射法太乙營圖並皆成誦在心若指諸掌虜青犢之兵甚有祕計燒烏巢之米本無遺䇿西陵賊退屈指可知南郡兵回插標而待常願執金鼓而問吳王橫雕戈而返齊地有志不就忠貞死焉世子恭等孝惟純深居喪過禮對其苫寢則梓樹寒生聞其悲泣則巢禽夜下嗚呼哀哉乃為銘曰天齊水合日觀山連兵強東楚地逺西燕五卿咸正三王並賢靈龍更起燧象還燃自天之德乃祖乃父維嶽降神生申及甫北門梁棟西州雲雨勇讋燕城名題漢柱公始青襟風神世載猛獸不驚家禽能對劒學千人書觀六代有竭忠貞無違敬愛乃數軍實乃握兵謀澆沙成壘聚石成圖風雲順逆營陳孤虛靈雨鉦鳴爟火飛狐淮隂受册車騎登壇公為上將有此同官下江燒楚上地吞韓推功玉案定䇿珠盤天有三階公承其命國有六卿公從其政台曜偕輝槐庭重映匡贊七德謨猷八柄腹滿精神心開明鏡伏波受脤樓船推轂東道未從南征不復飲丹有井澆泉無菊功存栁林身在樠木移茵返葬提柩山行芻靈隴水哀挽長城山如北邙樹似東平松門石起碑字金生眇眇山河煢煢胤子泣血徒步奔波千里孝水先枯悲雲即起世數存歿哀榮終始周大將軍崔諶神道碑公諱諶字某博陵郡安平縣人也昔者華陽之野降龍首之神烈山之都啓龜文之繇匡周則盟津有會佐夏則龍門始鑿西遊則起家秦相東入則載世齊卿備乎史籍可得言矣祖辨平逺將軍武邑郡守父楷散騎常侍光祿大夫殷州刺史並厲風霜俱張鋒穎邸史疊迹官曹凜然是謂鮑恢都官百城振懼葛豐握節京師斂手公特稟英靈偏鍾山嶽雄姿俊茂眉目疏朗觀虎于檻齠髮不驚稱象于船勝衣能對至于拉虎羈熊摧班碎掌忘歸繁弱落雁吟猿故得氣蓋關中威申河外解褐領軍府録事轉咨議參軍時當塗失御政在權門始論函谷之兵即起韓陵之戰太師賀拔勝作牧西荆公為假節冠軍將軍防城都督及南陽失守卷甲奔梁樂毅羈旅猶思燕路陳軫愴悽終戀秦聲幸值和鄰言歸舊國授衛將軍都督封安昌縣開國子食邑三百户𢎞農尅復沙苑揮鋒進爵為侯增邑并前一千一百户信圭則更受司勳穀璧則還輸典瑞鐵馬有河橋之戰戈船有汾水之兵除京兆太守移民下邑未學邊韶走馬章臺不同張敞遷帥都督持節撫軍通直散騎常侍大都督尋遷使持節車騎大將軍儀同三司都官尚書定州大中正五曹奏事有朱穆之忠九品論人見楊喬之直改封安國縣侯益邑合前一千四百户賜姓宇文改名為諶漢王改婁敬之族事重論都魏后變程昱之名恩深捧日遷驃騎大將軍開府儀同三司加侍中竇憲連官單于之寶鼎可致張寬固位渭橋之流星可識司木七工既掌丘陵之賦司會六典乃均邦政之才居官得人于斯為盛進爵為公改封萬年縣通前二千四百户除隴州刺史都督隴州諸軍事隴坻路遙秦川望逺鄧仲華之不去馬文淵之願歸尋除涼州刺史總督河西甘瓜諸軍事地似伏龍城如飛鳥燉煌實録宛在胸襟玉門亭障無勞圖畫有馬如羊不以入廏有金如粟不以入懷柱國齊王今上之介弟龔行薄伐問罪河陽以公為行軍長史參謀帷幄中軍之司既舉魏絳上卿之佐實用荀林以公方之差無慙德除使持節大將軍大都督崇德安義建忠九曲安樂三泉伏流周張平泉固安蠻通谷凡十三防禦熊和中三州黃蘆起谷王晏供超牽羊溫狐交河大嶺避雨木柵寺一十戍諸軍事崇德防主宜陽上地更有秦兵熊耳山前還逢積伏用是連營函谷獵騎黎陽威振兩河名陵三晉改封安平縣公淮隂一國韓信之故人户牖萬家陳平之鄉里公此衣錦足為連類建德四年正月十日薨于長安之永貴里私第春秋六十有四詔贈鄜延丹綏長五州諸軍事敷州刺史諡曰莊公禮也即以其年二月二十四日葬于京兆平原鄉之吉遷里北陵追逺大司馬有賜綬之恩西京贈行冠軍侯有詔葬之禮嗚呼哀哉世子儀同𢎞度生事以禮死葬以禮愛親有王祥之孝同氣有薑肱之睦百行之本于斯備焉况復松檟深沈既封青石之墓丘陵標榜須勒黃金之碑乃為銘曰華陽之神厲山之祖鳳野匡周龍門佐禹日浴溟池山浮海浦甫穆霸國營丘樂土胤斯宗邑承此壤王移封東武就君安陽中軍節目鎮北鋒芒商飈獵草電火驅霜公之輪煥繼體貞幹儀表丘墟風神牆岸孝有至德忠能匡贊不廢橫琴無妨欹案既班三事又二六官衛青受詔韓信登壇長城馬窟廣武兵欄軍吏無犯營民不寒乃用六謀乃論三䇿城壘向背星辰主客劒起沈犀弓開伏石楚后讓盟秦君還璧百齡危脆千仞摧藏諸侯地裂邊將星亡輕車騎士玄甲黃腸社如齊地廟似桐鄉銘功贊德碑闕相望周車騎將軍賀婁公神道碑昔者軒丘命氏初分兄弟之姓若水降居始建諸侯之國自是以官為族因地為宗水派枝分其可知矣公諱慈字元達本姓張清河東武城人也仕于周張仲為孝友謀于晉張老為賢臣韓有開地則五世強國趙有孟談則三卿不戰祖慶少習邊將仗智勇雖復五車竹簡不取博士之名一卷兵書即以將軍自許角端在手必無齊魯之侵蓮花插腰甚得蛟龍之氣為車騎大將軍儀同三司散騎常侍霸城縣開國伯贈河州刺史父璨公子公孫有鎡基于天下良弓良冶有世業于家風書則百家可知劒則千人可敵三槐以鼐鼎象物知其神姦五等以桓圭班瑞守其宫室君以才望兼而有之終于使持節車騎大將軍儀同三司散騎常侍武定縣開國公贈河州刺史惟公秉山嶽之靈受星辰之氣年在髫髮甫就勝衣竹馬來迎已知名于郭伋羊車在道即見賞于王澄豈直童子明經書生説卦而已至如禪河清論秋水髙談故以辨折龜林聲馳鹿野國家官族君為首姓起家車騎大將軍儀同三司襲爵為公增邑合一千六百户弱冠登朝傳呼甚寵漢魏台鼎故無此比中朝方伯罕有其年大冢宰任總機衡是勤王略惜君忠壯委以爪牙乃領左廂親信出為梁州防主華陽西極漢水東流巴濮既寧沈黎即靜保定四年王師北伐以君驍勇被召將兵師下宜陽身登函谷將燒白馬之城以覆烏巢之壘既而中途甚雨未獲圍原軍帥聞喪不成侵宋柱國趙王今上之第九弟也文則河間上書武則任城置陳作鎮岷丘揚旍錦水白虎之俗難安黃龍之盟不定以君智略入佐中權天和元年授使持節大都督柱國總管府司録仍轉司馬餘官封如故相如西喻鏤石於靈山武侯南征浮船於濾水方之今日彼獨何人九品課工為上之下四年入朝歸事宰旅即受載師大夫將命齊國尋盟出境即用和鄰之儀入國聞喪仍從會葬之禮可使南面此之謂乎尋以本官入治軍正至如渭水兵書在心為志軒丘陳法聚石成圖既得師不疲勞兵無怨讟入陪中禁更領儀同邸舍城池門闌户籍咸資巡警並用司存帝城近臣公室密戚如逢司𨽻似畏都官既而孤城鄭嫗不相其年巴水涪翁不醫其疾春秋三十有三奄捐官舍吕子明之疾甚歎軫吳王阮元瑜之長逝悲深魏主有詔贈某官禮也以建德四年三月日歸葬于河州苑川郡之禁山公六郡良家西河鼎族地壯金行人雄塞氣兵書七卷河水浮來射法三篇天弧夜下鋒旗不息刁斗恆驚猶得馬上讀書軍中習禮太史子義善於謀䇿諸葛公休長於撫馭四代儀同三司七世河州刺史鐘鼎成列冠蓋連隂所謂生為貴臣死為貴神者也但以遊魂久客反葬途逺道阻山長妻孤子幼哀聲滿野愁氣連雲况復松檟飄颻方臨武威之戍丘陵回逺直對臨洮之城馬援亡于武溪尸柩返于槐里梁鴻死於會計妻子歸于平陵嗚呼哀哉﨑嶇逺矣昔者繁昌祠前即有黃金之碣德陽墓下猶傳青石之碑是謂勒功乃為銘曰七葉佐漢五世相韓忠臣入仕孝友當官青城仙洞黃石祠壇臺堪走馬書足回鸞武定風颷霸城嚴肅並馳雙傳俱分兩竹重世刺舉連鑣衮服草靡青丘風馳赤谷世不乏賢挺兹上嗣孝有三德忠無二志劒足身挺書堪面試旍節既秉髙蟬且珥龜轉印函蛇盤綬笥左右將軍前後常侍繼踵五侯因循三事旍旃九坂艫舳雙流還驅木馬更引金牛江波錦落火井星浮樽酒望帝安歌蜀侯受脤河陽偏師洛浦置陳成皋連旗廣武朝兵減竈夜營多鼓箭起六麋鋒摧九虎倐忽人世俄然今古崇發兩星醫驚二豎遊魂通夢言反舊塋紫泥賜册黃腸贈行途登石紐路入金城寒關樹直秋塞雲平劍埋合柱書藏鑿楹武侯為廟欒公為社雲蓋低臨霓裳紛下碑枕金龜松橫石馬永矣身世留名華夏周上柱國宿國公河州都督辛威神道碑公諱威字某河南洛陽人也舊姓辛隴西人基若水之源纂商丘之胄邑于大亳實定其居封于小辛乃成其姓是以山川被髮辛有得見事之機八卦占爻辛廖有知人之鑒佐治以東都上將魏帝解衣武賢以西國功臣漢王推轂祖大汗渭州刺史考生河州四面總管大都督隴右貴臣河西鼎族公侯踵武嶽牧連鑣並得聲振長榆名雄髙栁公秉靈山嶽誕載星辰結髮嶷然齠年成德澄波萬頃建標千仭鋒穎既髙光芒已逺青襟學劍既為人主所稱童子論兵即在中軍之䇿永熙元年入仕蒙授直蕩都督太祖文皇帝雪舊君之恥連西伯之功始裂鴻溝初登函谷公擢衣沐髮杖劒轅門撤洗足而相迎下賓階而顧問自此即居帳內仍為直寢授寧逺將軍羽林監白土縣開國伯邑五百户大統元年從迎大駕進爵為侯增邑三百户加冠軍將軍散騎常侍轉大都督公善于用兵長于撫御自攻洛陽定𢎞農戰河橋平沙苑冒刃衝鋒前無橫陳况以弦木六鈞函犀七屬門多懸胄箭必中鞍山積器械谷量牛馬軍吏計功司勳賞䇿授使持節銀青光祿大夫進爵為公增邑八百户昔者受律赤符韓信當乎千里治兵白帝張飛擬于萬人比迹今日公之謂也五年授使持節都督揚州諸軍事揚州刺史浮于江海達于淮泗篠簜既敷瑶琨即序十三年授車騎大將軍儀同三司尋遷驃騎大將軍開府仍賜姓普屯即為官族入陪武帳出總戎韜置府于陽關張旃于瀚海故得上書于漢即用同宗爭長于周還無異姓十六年授鄜州諸軍事鄜州刺史公頻領兩牧風政神明虎去西河梟移東郡河湄瑞氣特表亷平鄜畤神光偏明正直及乎魏終天祿周受惟新明命已遷彞倫或革周元年改授大將軍枹罕郡開國公增邑一千户軍中受詔非論北伐之功大將登壇無待東歸之䇿置陳太平開隂晉之道連兵廣武納滎陽之城校戰丹山移營白壁莫不勇冠三軍名凌五將保定四年授寧州總管掌其北門既為鄭國所委捍其西鄙無懼秦亭之逼是以築剛平之城衛人拱手戍滎波之澤梁氏寒心朝廷與公有內外之親令公從戚里之貴乃以魏文帝女為公夫人遂得長門之左别開公主之園濯龍之傍更有王姬之館五年被徵入京拜小司馬期于司武以公為魏絳佐于中軍以公為荀首豈直謂之鶉火稱之縉雲而已哉其年被使領兵出西涼州奉迎突厥皇后紀裂繻來卿為君逆稱族而行尊君命也天和元年授柱國拜大司冦楚之柱國方之南火軒之司冦譬以西雲總授于公能官人也建德二年授少傅四年授寧州總管都督七州諸軍事即為河州大中正公之桑梓本于此地再為連率頻仍衣錦襄城龍種更反池臺桂陽仙人還歸鄉里故老親賓酣歌相慶安車駟馬天下榮之宣政元年授上柱國更加少傅配于上相即陪玄扈之圖居于京師實有圮橋之策改封宿國公食邑并前五千户射鴻舊圃舞鶴餘城既浮酸棗之河聊對淇園之竹來朝建章則天子降席出遊戚里則羣公下階是以行滿天地名聞四海方當光輔五君參謀七政天厲弗戒薨于所居春秋六十有九栁莊告殯傾社稷之臣鄭僑云亡得諸侯之禮詔贈某官諡某公禮也以今開皇元年七月某日反葬于河州金城郡之苑川鄉山行隴底地入塞原望積石以緣河臨崆洞而下坂玄甲黃腸﨑嶇亭鄣及云奠徹方勞榆沈若夫樹反壤也封夏屋焉終須潁川之碑乃見華隂之碣世子儀同永達孝性有聞居喪得禮嗟海變而田成懼山飛而地絶勒石墓田仍銘云爾少典之孫玄王之子虹貫于月金承于水降及于周公侯復始風俗氣候山川表裏河連積石山帶崆洞秦亭北上漢使西通金行氣壯地勢人雄稜稜髙節凜凜疏風祖考藩屏濁河清渭兩地謨明雙流光賁水無别色雲無異氣為吏為民惟懷惟畏公之嗣世實秉英靈降神中嶽回文列星鸞翔鳳顧珠角山庭臣深義本子極天經洛城戰陳河橋旗鼓箭飲石梁劒燃銅樹並麗六麋俱抽雙虎玉門開郡陽關置府再為上台兩為少傅模範帝師經綸國步允襲峻德欽明審諭不吝車茵誰言溫樹天道茫昧年齡倐忽上將星開功臣鼎沒九原陵阜三河甲卒地險龜林營危馬窟西州永别北闕長辭山張虛蓋野祭空帷陵原地迥松路風悲銘于碣石勒以貞龜周兖州刺史廣饒公鄭常神道碑唐朝以元凱並進十有六人周室以昭穆先封十有五國發源纂胄葉派枝分開國承家珠聨璧合是用克明峻德思皇多士盛德有後公其裕哉公諱常字子元豫州滎陽人也周宣中興然後樹賢建戚鄭武有國然後保姓受氏荆衡之賦千乘莫敢加兵虢鄶之封十城翻為獻邑况復郊門致騎先迎內史之賓南宫旦朝獨識尚書之履祖思慶建威將軍山陽太守建威取曹仁之號可以定名山陽有王暢之賢足觀風俗考頊銀青金紫方于溫羡傅祗鎮南征東比于劉𢎞荀顗報功之册則槐路是儀贈行之典則荆河惟牧公弱齡早慧幼學夙成立必正方言無勦説青襟智勇即埋雲夢之蛇童子仁心已愛中牟之雉始遊庠孰不無儒者之榮或見兵書遂有風雲之志出忠入孝事盡于心修身立名理窮于性大統三年起義華陽先登廣武浮逾沔入渭亂河蒙授永安縣開國男輔國將軍自爾長從太祖入為帳內都督河橋接戰秋水則三月不流洛城揮鋒金墉則一月路斷西京不賓羌戎侵軼城如飛鳥地有伏龍公以金僕裁抽靈鉟暫舉蜂目已奔狼心遂革遷平東將軍帥都督十五年襲父封魏昌縣開國伯轉大都督魏後三年授使持節車騎大將軍儀同三司黃權受詔嘉其入魏之功竇憲當官賞其平戎之䇿公之此授勳庸著矣進爵廣饒縣開國公邑五百户保定三年授都督羅州諸軍事羅州刺史仍領金州兵馬應接上庸公于文谷路溪澗峥嶸巖崖豁嶮山窮水斷馬束橋飛中埒既開雙城即欵往者申息盡掩江黃無援涔陽極浦亟犯風塵夏首西浮頻遭鋒鏑公以伏波受脤樓船誓衆入橫江之陳進下瀨之兵越客文身湛盧終去吳人長鬛艅艎遂還建德四年授使持節開府儀同大將軍公孫敖下光祿之塞諸葛誕勒丸都之山公之處焉差無慙德四方雜俗天下殊風以君亷能使兼觀察馳傳擁節揚旍持斧既乘驄馬仍被繡衣羣盜纍足貴戚斂手鄉亭留宿幸無歸忌之疑公車奏事寧有反支之日是使陽球司𨽻無所申威鮑恢都官因人成事髙祖武皇帝以仲春誓衆甲子濟河公仗劒六軍披圖八陳譬彼張遼前鋒而報魏主方之耿弇先戰而待蕭王及乎九州逌同四隩既宅遂得功參勇爵名入司勳授上開府增邑五百户加以舉功行賞推恩分邑兼乘而反光乎譙郡之城載寶而歸照于臨漳之水即日賜姓宇文與國同族婁敬上書于鹿輅項伯舞劒于鴻門公之此榮足為連類以公績著屯險誠貫風霜其年授使持節都督東徐州諸軍事徐州刺史宣政元年授都督南兖州諸軍事南兖州刺史作牧濟河風行于雷澤建旟海岱化被于淮沂襜帷入境貪殘者解印冕旒從政仁義者郊迎豈直白石開渠青鹽換粟祥雲入境行雨隨軒而已哉在任遘疾薨于方鎮皇甫嵩監御斯牧賢能刺史荀中郎連率此則中興方伯英聲茂實公之有焉詔贈某官諡某公禮也以大象二年十一月十日歸葬于滎陽之某山舊墓九原悽愴趙文子其何言駟馬悲鳴滕成公其已逺若夫勒鼎刋碑銘功頌德陳其令範必在生前嗟乎此之樹碑異乎洙泗之水此之勒石異乎燕然之山嗚呼哀哉乃為銘曰髙陽之子少典之孫蒼林逺遘若水遙源公侯復始鍾鼎逾繁承基纂胄建國開藩我壯我武既公既侯緇衣出鄭卿士歸周魚陵北上滎澤東流河移酸棗粟雨陳留祖守南邦考鎮東部兩龜為印雙蛇結綬日察隂陽星占長栁是曰世載其名不朽事親之道孝以立身事君之道忠以立仁今君嗣德一此君親如松之茂如竹之筠功參荆棘職主兵戈北臨青嶺南通白波直雲橫塞長星渡河陳開沙斷師移竈多舉功行賞封疆受位宫室鏤圭山河分地決勝千里謀深計祕建武功成名連星次建旟濟漯擁節龜蒙既蠶桑土實撫梧桐野無異器河無别風吳亭楚塞莫敢彎弓倐忽身世俄然松檟路轉銅魚山回石馬武侯之廟欒公之社望此髙碑悽然淚下周隴右總管長史贈少保豆盧公神道碑君諱永恩字某昌黎徒何人本姓慕容燕文帝皓之後也朝鮮微子之封孤竹伯夷之國漢有四城秦為一候其先保姓受氏初存栁城之功開國承家始靜遼陽之亂自天市星妖連津兵覆尚書府君改姓豆盧筮仕于魏祖代左右將軍魏文皇帝直寢父長少以雄略知名不幸早世周朝以公兄弟佐命義存追逺保定二年有詔贈柱國大將軍涪陵郡公是知春雨潤木自葉流根西伯行慶推存及殁公以山嶽精靈星辰秀異氣侔鍾鼎聲感風雲觀于秦兵尚稱童子對于楚戰猶在青襟太祖文皇帝乘時撥亂奄有霸業潁川從我舊愛無渝舂陵故人相知惟眷普泰二年關西建義授殄冦將軍奉迎大駕賜封新興縣伯邑五百户開新安之鄉還移楊僕之關解𢎞農之圍更入劉昆之郡援桴併轡並預前驅大統三年有沙苑之戰四年河橋之役介胄蟣虱戎馬生郊公靈變愈長風飈更勇隱若敵國差強人意授龍驤將軍中散大夫八年授直寢右親信都督尋轉大都督加通直散騎常侍十六年授使持節車騎大將軍儀同三司魏元年授驃騎大將軍開府儀同三司鄧隲以漢朝親戚始授中台黃權以魏國功臣初登上將公頻煩寵授朝野為榮三年都督成州諸軍事成州刺史尋加侍中外總連帥威振百城內參常伯榮髙八舍于時隴坻黠羌時穿上谷榆中羣賊或聚漁陽公卷甲星馳長驅千騎回洛凶徒望風草靡瓜州豪傑束手歸軍後魏元年改封龍支縣侯三年朝廷使大將安政公隨突厥吐谷渾歸國河鄯二州屬當路首公領騎八千以為戎防南通丹粟西望白蘭關塞無虞公之勳也周元年授都督鄯州諸軍事鄯州刺史其年改封沃野縣公增邑千户二年授隴右總管府長史武成元年都督利涉汶三州諸軍事利州刺史五年兵破文州陽陳蠻仍平瀘水以保定元年將兵破巴州恆獌獠度濾五月葛亮有深入之兵長坂九回王遵有忠臣之路霜雹不驚水草無乏天幸將軍斯之謂矣其年授司會八法斯掌九賦是均事總嵗成功參月要三年還授隴右總管府長史公屢弼英蕃頻相大府北海入朝仰以對問東平謁帝因而定禮遂使馬首懷燕不無樂毅蕃臣疑漢或多田叔兄楚國公以參和挹讓莊贊樂推建國開都奄荒南服求以先封武陽郡三千户益公沃野之封朝廷以兄弟相讓不無前史推恩分邑有詔許焉增邑并前合四千七百户既而六氣相犯五聲相觸靈夀不終遊魂且變薨于官舍春秋五十八詔贈少保幽冀定相等五州諸軍事幽州刺史諡曰敬公禮也天和元年二月六日葬於咸陽洪瀆州大夫墓樹以柏諸侯墳髙于雉嗚呼哀哉公資忠履孝藴義懷仁直幹百尋澄波千頃留心職事愛玩圖籍官曹案牘未嘗煩委戍馬交馳不妨餘裕兄弟公侯國朝親戚宜春有湯沐之盛濯龍無流水之譏渭南千畝之竹尚懼盈滿池陽二頃之田常思止足立身則十世可宥遺子則一經而已刺史賈逵之碑既生金粟將軍衛青之墓方留石麟乃為銘曰朝鮮建國孤竹為君地稱髙栁山名密雲遼陽趙裂武遂秦分寶圭世胄雕戈舊勳名稱賓實言謂身文挺此含璋降兹岐嶷有犯無隱王道正直唯愛唯敬永成恱色枕籍禮闈留連學殖䇿參帷帳功披荆棘韓陳揮戈齊城憑軾豹䇿乃建龍韜同啓校戰岐陽申威隴坻城壘畫地山林聚米上馬論書臨戎習禮賈復開營亷公屈體從容傅會占對造請用此亷平終兹寬猛緑林兵息潢池盜靜名振赤山威髙青嶺玄獸浮河飛螟出境災氛生隴毒水侵涇朝傾地鎮夜落台星石壇承祀豐碑頌靈渭城髙柏昌陵下亭須知地市為讀山銘周柱國大將軍大都督同州刺史段永神道碑公諱永字永賓東燕遼東郡石城縣零泉里人也本姓段昔者昌意降居初分若水之姓共叔出奔始有京城之族西河居士蕃魏而却秦北嶽將軍威胡而奉晉其後居于北代則先封遼水備乎史籍可略而言祖援鎮西將軍馮翊大守父儒平東將軍持節恆燕朔三州諸軍事恆州刺史公年裁弱冠即值亂離驅馳關塞之間早有縱橫之志軍陳方圓無勞聚米山川形勢不待披圖魏正光五年入仕解褐殿中將軍孝昌三年加龍驤將軍永平二年授平東將軍都督中埏建義勳謀是先蒙賞倉泉縣開國男食邑一百户其年淮淝侵軼南鄙徵兵公受脤偏師一月三捷昔張遼奄至有闕文沃陽縣開國伯食邑五百户進爵為侯永熙元年授使持節車騎大將軍左光祿魏武帝特召入任閣內大都督馬武小心侍蕭王于卧內典韋忠壯陪魏后于宫中于時賊帥元伯破掠城市西自潼函東綿鞏洛京畿大都督請士馬五千公曰此賊無他䇿尋為鳥散止請五百騎應手生擒朝廷賞其謀䇿百姓喜其除害既而喪亂𢎞多生民版蕩乘輿西幸宗社北遷公妙識玄象深知厯數乃與昆弟謀為自全斬西中郎將送首關內蒙賞昌平縣開國子食邑三百户大統元年授使持節都督北徐州刺史平竇軍復𢎞農戰沙苑陳河橋公並預先登身當鋒首謨猷應變備在司勳增邑八百户通前合二千户進爵為沃陽縣開國公授南汾州諸軍事南汾州刺史十四年增邑三百户轉大都督其年授車騎大將軍儀同三司加散騎常侍十六年授驃騎大將軍開府加侍中尋受恆州諸軍事恆州刺史又遷雲州刺史昔軒丘分族異姓者十四人鄷邑建侯宗盟者四十國太祖文帝席卷關河三分天下潁川從我並有鄉里之親新豐故人非無布衣之舊更立九十九姓還存三十六國舊胄還姓爾綿增邑一千進爵為廣城郡開國公尋授文州諸軍事文州刺史國家以玉門西拒久勞亭鄣陽關北牧多事風塵武成二年有詔進公都督瓜州諸軍事瓜州刺史是以名馳梓嶺聲振榆關無雷畏威負霜懷惠保定三年還朝授工部中大夫尋遷軍司馬夏官司武待白露而治兵冬官考工紀玄雲而授職四年增邑三百户通前合三千九百户其年授使持節大將軍都督治左八軍總管軍事朝登上將暮會小卒事涉交接觀舋而返天和四年以本官領小司冦三度有星名天獄八封有坎象刑書公繁不秋荼嚴無夏日民知約法未肯以獄吏為尊吏識刑名無敢以死灰相懼又任左廂第三軍總管仍被勑將兵馬北道教習韓信入關即申軍令陳農受詔仍校兵書豈直六郡良家五營騎士懸知正正之旗遙識堂堂之氣蒙犯霜靄旗鼓驅馳俄而遘疾疹至大漸五年六月十六日薨于賀葛城春秋六十有八將軍死綏三軍行哭都護喪還緣邊追祭九月二十三日靈柩至于京師皇帝臨喪百寮赴弔詔遣使持節車騎大將軍儀同三司賀拔軌監護喪事又遣使持節車騎大將軍儀同三司紇豆陵亮册贈使持節柱國大將軍同華宜敷丹五州諸軍事同州刺史諡曰恭公其年十一月五日葬於京城南髙陽原髙司里夫人赫連氏兖州刺史恱之女年十四適爾綿氏册拜魯城縣君遷濟隂郡君又遷廣城國夫人肅恭令淑儀範賢才四德有耀三星增輝三公夫人見于斯矣建德元年十二月亡春秋五十有八二年正月歸于髙司之塋劉荆州之墓合葬于襄水之陽衛將軍之陵同穴于廬山之下嗚呼哀哉世子岋使持節儀同大將軍領兵部大夫純孝事親忠貞事國禮義自立聲名有焉銘曰軒臺受氏若水降居西城仲胤北陸置餘山川雄烈風俗扶疏昔我關塞沿襲干戈時遭拔本世值橫波北封代郡東據遼河地未平一天猶薦瘥我公重光繼文踵武總牧三蕃兼治六輔雅俗觀風都亭待雨不逢問吏無聞桴鼓公以載世挺此令聞孝有三德忠惟一君馬陵釋患聊城解紛兵防滿月戰避迎雲長松都尉細栁將軍既牧淮海且藩恆代髙壁負關長亭穿塞舋鼓司盟闕吏不能欺兵無敢背玉關遺矩汾海留愛大將受册公升其壇六卿咸事公二其官夷陵燒楚上黨分韓營軍參合校戰皋蘭年深厲起福過災生上台裂嶽次將傾星赤蛇悲淚白虎哀鳴懸弓靈幕繫馬寒坰煙凝不動泉凍無聲天子愴然追于贈諡禮官賜册陪陵受地印綬曰䇿衣衾曰襚玄窆就列黃腸在位自此何世從斯幾春樹為櫪社陵成谷神詎知雲閣名在功臣周柱國楚國公岐州刺史慕容寧神道碑昔在殷書懋賞周禮議勳諸侯計功大夫稱伐惟師尚父昆吾載寶鼎之銘王命尸臣栒邑傳雕戈之賜故知太上立德明試以功存有顯爵之榮歿有大名之貴昊天不弔其惟楚國公乎可以旌德景鍾勒勳彞器式昭盛美載揚洪烈者焉公諱寧字永安昌黎徒何人也都尉總六縣之卿名山稱五嶽之佐燕太祖文皇帝慕容皓以當世英雄奄有河朔趙之南境且建王城冀之北土仍為興國公既皓之苗裔家世燕陲髙祖侍中使持節都督中外諸軍事太保録尚書北地王慕容超之世蕃屏王室詳之燕録可得稱焉曽祖尚書府君因魏室之難改姓豆盧仍為官族祖仕魏文成皇帝考早亡朝廷以庸勳攸屬恩深追逺保定三年有詔贈柱國將軍少師涪陵郡開國公食邑二千户公稟氣中和降祥川嶽岐嶷表羈貫之年通禮稱綺紈之歲夙著竒節幼表大成兄弟分果備知推讓賓客解鈴曽無吝色永安元年太宰爾朱天光魏室元輔握兵淮右抗權江南公時任别將便從征伐自是長城峽石必先行陳秦南隴西每當矢石摧堅乘勝莫不前驅䇿勳行賞常居第一永熙元年補子都督并加鼓節軍儀除桑乾太守轉補都督其年以魏皇西幸奉迎大駕賜封河陽縣開國伯增邑三百户俄遷大中大夫改伯為侯增邑合九百户仍授使持節都督顯州諸軍事顯州刺史四年遷鎮東將軍金紫光祿大夫其年秋河橋之役先登破陳遷為車騎大將軍儀同三司五年沙苑之功加封合前二千户俄授敷州刺史加散騎常侍外深推轂內侍集書十五年授右衛將軍十六年授大將軍後魏元年重授敷州刺史公以先經刺舉固辭不就三年改封武陽郡開國公除尚書僕射職惟贊奏任居封掌分左右之儔兼典舉之選屬以江南阻兵渚宫邊敵軍機警急鋒鏑縱橫公奉命星言元戎啓路總秦人之鋭士兼荆尸之廣卒水龍競雙刀之勢步竒陳四分之威夷陵既燒黔中方定旋軍反斾解甲休兵其後鳳州內叛成都外絶公又總督衆軍搜乘即道兵不血刃並皆擒獲遷其酋豪納其降附皇朝受終文祖革命神宗選賢與能改絃創制爰降册書授公柱國增邑四千户二年授同州刺史襟帶關輔唇齒秦晉編户殷積邸閣儲峙藩籬是任親賢勿居公建旟作牧褰帷行部六條斯舉百城咸勸三年授公大司冦又以公勳庸特著册封楚國公食邑一萬户蓋因破侯方仁等於荆陜即其地而封焉逖糾王慝弛張刑政式遏冦虐於是御之以寬猛柔逺能邇然後平之以沖和舜任咎陶不仁者逺晉舉隨會羣盜皆奔保定四年授岐州諸軍事岐州刺史沉涸彌留保定五年三月四日薨於私第春秋六十有二詔贈太保同鄜等十州諸軍事同州刺史諡昭公禮也十月庚申葬於洪瀆之川馳綍毁宗客車専道玄甲被屬國之兵介士陳輕車之騎克善令終生榮死感嗚呼哀哉公經德秉哲體道居貞履貴思沖居盈念損澄波千頃不能變其清濁髙牆百仭無以測其汙隆立身行己居安如墜亡躬殉義視嶮若夷至于將略應變出竒設伏太一風角之占常從星辰之候艛船戰陳之録強弩馳射之書莫不動會機神發符雷電梯衝所向地靡百樓之城長戟所臨野闕三門之陳是以斬將搴旗四十三戰尊官厚祿三十七年武彰七德之義歌誦九功之業迹紀庸器之文行昭易名之典昔臧文既歿穆叔稱其立言鄭僑云亡宣尼泣其遺愛德陽青石之墓千年未平枝江白虎之碑百代無毁敢因斯義乃作銘曰遼水之東冀州之北既曰都尉兼稱屬國斂氣餘勇雄邊遺則孝實天經忠為令德冠冕世祿羽儀祚胤俗被燕丹風慚英藺劬勞行役辛苦行陳勇過溺駿氣踰瓦震王國克生思皇多士溫溫恭人謙謙君子擁旄仗節出蕃入仕闕五朝建旟千里時逢改物名載䇿勳淮隂召拜昭陽破軍職司刑政獄慎深文沈羊不飲萑盜無聞巴庸薄伐江漢専征軍總六校兵兼七營運長擊短後實先聲增壘威敵減竈兵鍾鳴夜漏晞露朝陽邑里蕭索宅帷荒涼豐碑下柩題湊遷喪宫臨樗里臺傾孟嘗卜兆戒期逺辰告筮德遺身後名昭歿世館舍長捐泉扄永閉晏嬰悼齊栁莊悲衛風秋北原日沒川逝葬田舊頃客土新封淚墮片石劒挂孤松清徽令範千載餘蹤漢魏六朝百三家集卷一百十一中欽定四庫全書漢魏六朝百三家集卷一百十一下庾信集目録傳周使持節大將軍廣化郡開國公丘乃敦崇傳墓志銘周大將軍聞喜公栁霞墓志銘周大將軍襄城公鄭偉墓志銘周大將軍琅琊定公司馬裔墓志銘周大將軍上開府廣饒公鄭常墓志銘周大將軍義興公蕭太墓志銘周大將軍懷德公吳明徹墓志銘周大將軍豳國公趙廣墓志銘周驃騎大將軍開府侯莫陳道生墓志銘周車騎大將軍贈小司空宇文顯和墓志銘周譙國公夫人步陸孤氏墓志銘周趙國公夫人紇豆陵氏墓志銘周安昌公夫人鄭氏墓志銘周大將軍隴東郡公侯莫陳君夫人竇氏墓志銘周冠軍公夫人烏石蘭氏墓志銘周太傅鄭國公夫人鄭氏墓志銘後魏驃騎將軍荆州刺史賀拔夫人元氏墓志銘周大都督陽林伯長孫夫人羅氏墓志銘周儀同松滋公拓跋夫人尉遲氏墓志銘周驃騎大將軍冠軍伯柴夫人李氏墓志銘漢魏六朝百三家集卷一百十一目録下欽定四庫全書漢魏六朝百三家集卷一百十一下明張溥輯庾信集傳周使持節大將軍廣化郡開國公丘乃敦崇傳崇恆州代郡鼓城縣廣義鄉孝讓里人也昔夀丘建國賜姓者十二人平陽舉賢登朝者十六族况復大電繞樞流星入昴派分源别幹其嗣興者乎魏道武皇帝以命世雄圗飲馬河洛兄弟十人分為十姓辨風吹律丘氏即其一焉五代祖邈驃騎大將軍開府儀同三司營丘郡開國公于時天道西北既稟謀謨馬首東南實資匡贊因以封名仍為賜氏與夫南公伯即有連類宗則樂正非無準則曽祖雙軌使持節驃騎大將軍司徒青兖二州刺史范陽文昭公洛食之始上馬治國登庸之初升槐論道生則絶席武宫死則配祠清室夫人太原王氏三世為將四代為公社稷大宗鐘鼎貴族伉儷是歸秦晉匹也祖提使持節衛將軍駙馬都督河交二州刺史靈夀縣開國公公子公孫聲名籍甚增輝增耀弱冠升朝夫人清亷郡長公主孝文帝之第二女也王姬有行車服不繫故得衛青上將張耳賢夫父願使持節大都督徐州諸軍事徐州刺史平陽縣開國公食邑四千户少年習象多見兵書澆沙聚石之營却月橫雲之陳彎弧則戟破小支抽劒則泉飛枯井夫人宇文氏周文皇帝之第三妹也母儀令範女師賢哲德髙隆慮義重河陽魏受其終周新其命式墓封墳追旌盛德乃贈使持節大將軍廣化郡開國公食邑一千户夫人贈安德郡長公主遊魂寃結非無廣漢之城久客思歸唯有東平之樹自永安以來魏室大壞海水羣飛天星亂動禮樂征伐不出於人主舉賢誅暴議在于強臣髙丞相驅率風雲奄荒齊晉我舅氏文皇帝駕馭龍虎據有周秦南北渝盟東西敵怨既而各受圖書並當圭璧百姓則父南子北兄東弟西事主則憂親求生則慮禍大周親戚遍鍾荼炭輸之城旦下之織室關河嚴隔三十餘年天厭喪亂人思反德彼之風塵既靜函谷此之冠蓋屢涉漳濱中山寃枉之餘代郡凋殘之澤並遇革音咸蒙禮送崇賓兄弟二人相看氣息親愛凋零方寸久亂恆山殺翮豈望同飛而安國徒中鬱為卿相班超絶域遂得生還天和四年至於新邑朝廷以舅甥之國外內之親乃授賓使持節驃騎大將軍開府儀同三司大都督安樂縣開國公食邑一千户賓得免虎口仍上龍門聲價已髙風焱即逺方欲討論國恥申雪家寃橫尸原野是所甘心時不我與先從朝露春秋若干衛國興文子之慟長安有詔葬之悲乃贈本官加少傅蒲虞勳三州諸軍事蒲州刺史以天和六年某月日葬於長安之洪瀆原妻青州石氏長城郡君胤子孤煢生妻婺矛牙室即能有節還成守義崇蒙授使持節大都督驃騎大將軍開府儀同三司廣化縣開國公食邑一千户昆季二人同年上將彤廷交映棨戟相臨昔二馮同德繼踵當官兩杜齊名夾河為郡比斯榮寵彼將慚色俄然賓疾奄捐館舍崇兄弟勝衣備罹禍酷同氣長養得及全人今者來歸更連凶閔每一悲慟行路傷心撫養愛子情深馬援之慈恭事寡嫂義甚顔含之孝天和六年授大將軍餘如故龍庭賞出塞之功玉門勞旋師之寵異代同和見之今日建德二年授使持節都督宜州諸軍事宜州刺史忽忽橫閣但有誦書曖曖重帷惟聞善政清不置水明非舉燭乃是入境移風非直停車待雨有勑大將軍宜州刺史廣化郡公崇自夏季無雨以迄於今雖靡神不禱仍未降感知彼州內獨蒙滂澤諒由大將軍精誠所至憂念郡人豐稔可希良以為慰又勑廣化公崇知此存心政術治勤黎人受委稱職嘉尚無已古人有言非行之難念加勉勗以致盡善指令宣納抑操賜齊陳物如别宜諭朕懷昔陽平太守别降紅粟之恩荆州刺史偏蒙衮衣之賜治績尤異此之謂乎崇清淨為政亷明為法人不忍背吏不忍欺性不飲酒無所嗜欲深沈牆仭喜愠不形文必正詞絃惟雅曲仁義禮節是所用心緹袟緗素愛玩無巳當今四郊多壘尚有公卿之辱鼓鼙不息猶勞將帥之謀語其讐恥唯願橫行死地思其報國不吝身膏原野但令天假之年時綏之福忠貞之事公其取焉略書梗概陳之直史墓志銘周大將軍聞喜公栁霞墓志銘君諱霞字子升河東解縣人也秦始征晉之地漢開平越之鄉律中夷則星居鶉首况復莊謀於衛既為社稷之臣喜對于齊無廢諸侯之職祖叔珍宋員外散騎常待義陽內史有徐邈之應對居于散騎之省有汲黯之正直理于淮陽之郡父季逺臨川王咨議參軍冝都太守蘭臺石室是所洽聞白馬飛狐逾髙詞氣西都吳融擅名江表言談相會宛如舊焉君膺令德之靈稟沖和之氣齠齓髻髮夙智早成愛敬自天虔恭得性含仁抱義履信居貞世父儀同忠惠公特加器異乃謂公曰吾昔逮事伯父太尉公見語云我昨夢汝登一髙樓樓盡峻麗吾以坐席乞汝汝或富貴恨吾不及見耳吾向聊復晝寢又夢將昔時坐席還復賜汝汝官位當復見及王祥佩刀世為卿族鮑永驄馬家傳司𨽻以此連類差無慚德輕車西昌侯作藩襄漢君時年十二以民禮修謁進止端詳神情雅正侯目送之不輟試遣左右踐君衣裾欲視舉動君徐步稍前曽無顧盼魏侯之見劉廙不覺斂容漢主之觀田鳳遂令題柱比之今日曽何足云驃騎廬陵王帝子出藩懸衡髙選以君華望召為主簿張坦直諫既稱荀令之香鄒湛知言彌見羊公之德咨議府君于都薨背君奔赴六日即屆京師形骸毁瘁不復可識靈柩泝江中川薄晚亂流乘選回風反帆舟中之人相視失色抱棺號慟誓不求生俄爾之間風波即靜咸以君精誠所致成都孝子自赴江流桂陽先賢身彰野火並存靈應咸可傷嗟太夫人乳間發瘡醫云惟得人吮癑血或望可差君方寸已亂應聲即吮旬日之間遂得痊復君於事親可謂至矣從兄右衛擁旌嶺表苦相攜致昔馬遊志氣為馬援所知班嗣才學為班彪見賞復聞於今日矣乃除永化縣令靜尋欹案或吟長岑之逺乍撫鳴琴不以河陽為陋日南金柱合浦珠泉曽莫經懷未嘗留目解巾平西邵陵王法曹參軍仍轉外兵除尚書工部郎始入禮闈即登蘭閣尚書僕射陳郡謝舉人望國華引君言論謂同坐曰江漢英靈見於此矣西中郎嶽陽王以緑車之重臨西河之牧拔用君為本州治中尋遷别駕王叔理以品物流名陳仲舉以題軒馳譽君之展驥兼而有之及乎大盜移國王室騷然月動星搖雲平虹直嶽陽王承制硤左當壁漢南天綱所頓英賢畢集授君吏部員外郎散騎常侍兼太子侍讀監儲甲觀事重史丹侍講桂宫名髙張禹俄遷車騎大將軍大都督賜爵聞喜縣公侍中開府儀同三司餘如故方之驂乘霍去病為侍中譬彼將兵公孫敖為驃騎足以照曜六府謨明九德豈直允諧上將匡贊中軍而已哉既而言從梁國服政鄷都管仲有詞即受下卿之禮臧孫見德還奉嘉賓之宴有詔授使持節驃騎大將軍開府儀同三司霍州諸軍事霍州刺史犀節去關衮衣馳傳迎郊則文學前驅賓衛則邦君負弩直以五溪遼逺馬伏波之思歸三湘卑濕賈長沙之不願是以宜城刺史直會鹿門白沙故地仍留龍種夭厲弗戒奄然終極天和某年歸窆于襄陽白沙之舊塋君器宇詳正風鑒𢎞敏澡身浴德遊藝依仁汝南令望扶風長者不言財利王夷甫之為德不談人物阮嗣宗之為人從容亂離之後保此令名舒卷風雲之際無妨貴仕張衡渾儀之後即賦歸田杜預沈碑巳來遂停鄉里王仲宣有讀書之樓諸葛亮有彈琴之宅實欲因此謝病間居終焉鳴琴在膝或對故人寶劒自隨時遇稚子百年俄頃嗚呼哀哉遂使君子之陵止埋銅劒賢臣之墓唯銘石函銘曰有莊有惠居魯居衛義是隨時才堪濟世北部尚書東京司𨽻必復其始侯君相繼華蓋一嶽文昌一星青襟辨志童子離經義勗非馬書勤映螢往年靈柩漂泊江沱以君哀慟川后停波揚名北海馳譽西河誰登九折不入朝歌蔚炳胥變攀陪遂逺白鹿隨軒丹翬附冕位參上將榮兼本選蛇盤綬結龜回印轉來朝平樂歸政咸陽蕃維即啓軍幕仍張起兹禮數峻此戎章長離宛宛刷羽陵江世急奔流年催驚隼滅沒頓轡扶桑搖軫智士石折賢人星殞西鄂芝枯南陽菊盡愴焉啓手生榮終極相杵輟舂鳴機罷織煢煢胤子視隂餘息霜露履之哀哉欒棘龍巢北望鳳闕前觀松長風逺地厚泉寒書埋簡落琴覆絃寬贈行之册書而納棺周大將軍襄城公鄭偉墓志銘公諱偉字子直滎陽開封人也周宣母弟就封于鄭河洛之地即有民人虢鄶之君非無郡邑其後蛇鬬于門黿嘗于鼎韓侵負黍晉滅陽城其祀忽諸以國為氏祖徹撫軍贈濟州刺史父先護驃騎大將軍儀同三司襄城郡公青州刺史永安中洛城晝掩黃河凌合翟泉會盟之地蒼鳥忽飛武庫兵欄之中鱗魚遂上三帥北絏五馬南浮梁武帝大造中原樹君伊洛公慿軾棧車言歸舊壤起為通直散騎侍郎天厭魏德政在強臣公恥入亂階乃于陳留起義太祖封函谷而待諸侯坐酆宫而朝羣后威懷是接席卷西飛大統三年入朝蒙授武陽縣開國伯食邑六百户尋除龍驤將軍北徐州刺史開河橋之陳解玉璧之圍張旃於富平被練於伊闕探虎穴而揮戈上魚門而懸胄故以䇿名司勳功髙勇爵魏將侯景狼顧荆河天子命我偏師赴援垂餌虎口中途背盟事獲交綏公之力也除中軍將軍散騎常侍大都督襲襄城郡公食邑二千户仍除使持節車騎大將軍儀同三司餘如故遷驃騎大將軍開府加侍中常伯位重霍去病之登朝上將官尊公孫敖之出塞以今方昔異代同榮魏後二年授大將軍江陵防主都督十五州諸軍事吳兵教士艫舳習流島嶼憑陵波瀾衝激公暫臨江界已悉南越之兵裁泛樓船即善昆彌之戰遂得安歌澧浦弭節涔陽留魯侯而宴章臺對齊人而畋雲夢周保定元年授使持節都督宜州諸軍事宜州刺史天和六年授都督華州諸軍事華州刺史餘如故崤函重嶂汧渭分流陽陵之溢既奔華隂之學還聚而消渴連年屢有相如之患至于大漸遂如范增之疾桐君對藥分闕神明李柱侍醫更無方技以天和六年四月十七日薨年五十七詔贈本官加少傅都督司豫洛相冀五州諸軍事司州刺史諡曰肅公禮也天子輟朝彌深大臣之議羣公會葬咸得同盟之禮夫人李氏頓丘貴姓卿相之門賢才之室霜露先侵䇿封郊次以其年十一月六日合葬于咸陽之長安縣某原合葬非古既異三王之前死則同穴還同六載之始雖復銜珠兩鶴同歸紫蓋之松出匣雙龍共沒延平之水嗚呼哀哉乃薦銘曰國有巖邑朝多君子武公莊公平王卿士溫麥渝盟祊田廢祀驂乘停輿來朝識履惟祖惟考既侯既公樞機周密出納清通治繁政簡處亂心雄濟河遺惠海岱餘封世濟其美載誕其器忠無不為孝則不匱幽冀紛梗關河鼎沸自北自南聲聞梁魏揚旌汝潁威震三川擁旄江漢席捲樓船成皋塵起廣武烽燃麋興麗箭雁落驚弦總衛蘭錡申威河外山類鼓樓樹如車蓋都護兩道將軍獨拜梧桐茂苑楊栁倡家千金回雪百日流霞凋零倐忽悽愴榮華河陽古樹金谷殘花隴昏雲暝山深路晚風氣才髙松聲即逺疇昔親友歡愈交結不為平生應為此别周大將軍琅琊定公司馬裔墓志銘公諱裔字遵胤河內溫人也南正司天北正司地是謂羲和之官即嗣重黎之政卭之歸楚與章邯而並封豫之避秦共毛公而俱去祖金龍仍居選部水鏡三臺父悅再牧荆河威風千里而身遭禍機遂為欒布所哭獲存遺嗣實賴程嬰之忠國家追念功臣更撫叔敖之子言思官族還求女齊之胤公始應辟為河內功曹除員外郎常侍汲郡治兵黃河浮馬摧鋒軹關之捷逐北長城之陳授平東將軍北徐州刺史栁泉風塵三城席卷棠隂鋒鏑千室入關遷車騎大將軍儀同三司開國龍門縣伯仍除巴州刺史雖復巴水三回夷歌數曲徒逢白竹之弩已濟青衣之功朝廷以漢之功臣須開上將之府晉之代胄宜紹琅琊之國遷驃騎大將軍開府改封琅琊公食邑一千五百户宫闈近密實俟忠貞詔為大御伯仍除大御正職司常伯任總夔龍王道既平絲言惟允尋除始州刺史都督始州諸軍事蠻夷恃險狼顧鴟張髙山尋雲深谷無景九地縱橫三門起伏峰危馬束水險橋飛遂得谷靜山空氷消霧散仍為信州刺史都督信州諸軍事精兵守于白帝足懼巴州之城船梯下於荆州彌動西陵之戍即授使持節大將軍都督西寧州諸軍事西寧州刺史將啓北户之人向通雲南之國聞寵若驚奄從深夜天和六年正月十八日亡春秋六十五詔贈本官加懷邵汾晉四州刺史諡定公禮也以建德元年七月十三日葬于武功郡之三疇原公愛敬純深有隱無犯忠貞亮直知無不為在戎四十二年身經六十九戰至於多竈唱籌並得成功飛沙擁石未嘗乖律恂恂教義吳起西河之風間間鼓旗李牧長平之政身死之日家無餘財山水所資一由詔葬有始有卒生榮死哀銘曰祝融是命重黎克舉公族乃建天官即序避世于秦承家于楚金行失馭玉鏡淪輝我之烈祖識變乘機黃旗東沒青蓋西飛落星置道長州出圍及我皇父荆河再撫世屬喪亂身沒猾虜嗟我遺嗣﨑嶇趙武寒覆鳥翼飢吞獸乳獲歸河內更襲琅琊年方竹馬怨結長蛇藏兵九地置劒千家雪山埋馬氷河陷車既乃班政超然榮守朱鷺頻飛金龜轉紐築塞長榆營軍髙栁玉案推食河橋勸酒石門氷釋金堤電散蘆水門關茅津成觀馭風逸翮修途始半建武功臣先悲吳漢沈寥搖落遊揚浸微金城路斷郿塢人稀風松雲蓋白水山衣賢已星殞人沒蘭衰周大將軍上開府廣饒公鄭常墓志銘公諱常字子元滎陽人也周宣王之弟初封其國鄭穆公之孫始成其姓祖思慶建威將軍山陽太守考頊儀同三司豫州刺史南陽坐嘯值此邦君西河建隼逢斯刺舉公侯繼踵冠冕連鑣可得而言傳於史籍公髫齓知禮早年馳譽就經黌舍略見書堂習武兵欄偏知劒術雖復年猶小學已為儒者所稱位在偏禆即入將軍之賞大統三年起義華陽授永安縣開國男文皇帝霸迹初基英雄輻輳公拔劍轅門潁川從我洛城逆戰壯於白馬之兵河橋解圍勇于烏林之䇿授平東將軍帥都督襲父封魏後三年授持節車騎大將軍儀同三司車騎用郭淮之勳儀同取王沈之貴公之此授僉曰得人進爵廣饒縣公邑千户保定三年授使持節都督遷州諸軍事遷州神道碑作羅州刺史今墓志作遷州按隋地理志西魏時于竹川縣置羅州宇文後周于房陵郡置遷州至隋并號房州刺史即總領金州兵馬開拓北戎髙山尋雲深谷無景梯繩乃上浮竹裁通閩越影嚮勾吳聲勢公出戰短兵並皆奔北瓦解氷碎山空谷靜授持節開府儀同大將軍柏梁髙宴有大將軍之詩幕府初開有平陵侯之國比之今日豈可同年而語哉自是使車被之繡服風謠是察刑政是觀公露節東驅風奔羣盜埋輪當路威振中原武皇帝有盟津之師以公為中權之徑外從決勝內侍軍謀及文軌既同旃旌已偃司勳行賞軍吏舉功乃授使持節上開府增邑五百户賜姓宇文與國同乘之榮周之宗盟非復異姓之後蕃屏是寄隆寵所歸公室無疏此之謂矣九州都督須得其才千里諸侯實俟其政乃為使持節都督東徐州諸軍事徐州刺史尋遷南兖州諸軍事南兖州刺史公頻總六條再勞十部俗變風移人懷吏畏滯穗遺秉有利疲人山桑野蠶足充貢賦化被殊俗威行鄰境奏事京師四方第一謂真刺史其在斯乎春秋未髙奄然遘疾以大象元年薨于州鎮時年六十三嗚呼哀哉吏人扳慕飛走變色河濟輟舂淮沂罷市以今年歸葬於滎陽之山詔贈某官禮也嗟陵谷之貿遷懼徽猷之永逺地久天長敢鐫貞石銘曰荆河惟豫洛食之本水繞滎波山斜陸渾德星猶照祥風未逺代不乏賢文無闕衮公之生也實降英靈忠為德本孝稟天經觀書虎館學劒龍亭雕弓偃月行馬流星置陳黎陽麾兵官渡平隂聽烏馬陵書樹氣視回津星占飛步火斷羌營沙崩賊路及驅犀節乃牧雄州吏不驚犬人無喘牛西蠶得歲東作逢秋草爛獄户星低市樓五將星亡三台嶽折哀哉天道遂常明哲棟梁崩壞風雲寂滅北郭長悲東都永别幽深此地宅兆斯憑山回虎圈路上魚陵悲風夜烈苦露晨凝蘭芬菊茂終古相承周大將軍義興公蕭太墓志銘昔司徒之敷五教當堯讓之初丞相之總萬機值秦亡之後若殷人受氏乃承微子之封梁運應圖實啓延陵之國公諱太字世怡蘭陵人也太祖文皇帝之孫鄱陽忠烈王之子派别天潢支分若木直幹自髙澄源已逺茂親明德是稱毛畢之功宗子維城乃建邢茅之國大同元年年十六封豐城縣開國侯食邑五百户山臨鶴塞非無陶侃之賓氣連牛斗即有張華之劒解褐給事中仍太子洗馬公子出身非郎官而同品中朝洗馬異式道而前驅以公居之誠為髙選大同元年入直殿省其年轉太子中書舍人南宫宿衛職司蘭錡北閣從班榮參顧問通籍兩宫得賢斯在大同三年授持節仁威將軍譙州刺史褰帷祥氣之境刺舉消憂之地南陽風俗文學更多美稷相迎童兒逾逺既而亂離瘼矣王室騷然大夫有行役之悲君子有無期之怨背關懷楚扁舟而行江漢奉當璧之君華夏歸中興之主承聖元年拜侍中無雙對問實踵武于丁鴻多識舊章足齊衡於王粲二年除持節平西將軍臨川內史仍轉平南將軍桂陽內史尚方鑄劒再轉金龜御史分符雙封銅虎豈直鄧攸清白見稱五鼓之歌劉寵亷能名為一錢之郡遂以天保未定王途多梗還吳不可歸蜀無路臨淄負海翻然改途竄身清漳垂翅渤海蒙授車騎大將軍散騎常侍仍為持節都督永州刺史而秦亭壓境邾柝聞城鼓角地鳴將軍天落雖復瓶缶聽聲無防于地道冠繩柴結不却于雲梯請命受降翻歸都護周朝以楚材晉用不停於平章趙璧秦求無論於羈逺以保定五年除使持節驃騎大將軍開府儀同三司義興郡開國公食邑一千三百户天和二年授使持節都督蔡州諸軍事蔡州刺史楚項襄之愛子既布衣而函谷魏安釐之母弟亦羈旅於邯鄲憂既傷人降年不永春秋五十有一薨於蔡州之鎮送故入關空餘衮服歸軒在道還更垂帷嗚呼哀哉有詔贈官諡某禮也五年十一月葬於長安北原樗里子之墳正臨武庫太史公之墓直對皋門銘曰玄鳥逺烈相土𢎞謨東封宋社西斂秦圖人承佐漢國紹開吳有美令德茂親藩邸建國皇支承家帝弟率由冥會亮直天啓轅固聞詩唐都習禮博望之苑金華之宫文林講德武帳參戎名書柱上䇿滿帷中託身淄右蒞政淮東秦亭西逼楚澤南窮時驚獵火或懼秋風屬斯逺略逢茲應變陳橫十里兵圍一面月暈孤城塵驚虛援春筍非糧秋蒿無箭垂翅卧龍夷矜輟戰時值懷來恩加始賞王爵愈峻戎章更上朱鷺才飛虞歌即響泣子留恨藏書長往炎涼迭運零落山丘霜芬幕月松氣陵秋嗟南國之王子成東陵之故侯周大將軍懷德公吳明徹墓志銘公諱明徹字通昭兖州秦郡人也西都列國長沙王功被山河東京貴臣大司馬名髙霄漢豈直西河有守智足抗秦建平有城威能動晉而已也祖尚南譙太守父樹右軍將軍抗拒淮沂平夷濟漯代為名將見于斯矣公志氣縱橫風情倜儻圮橋取履早見兵書竹林逢猿偏知劍術故得勇爵登朝材官入選起家東宫直後除左軍葛瞻始嗣兵戈仍遭蜀滅陸機才論功業即值吳亡公之在梁未為達也自梁受終齊卿得政禮樂征伐咸歸舜後是以威加四海德被諸侯蕭索煙雲光華日月公以明略佐時雄圖贊務鱗翼更張風飈遂逺冠軍侯之用兵未必師古武安君之養士能得人心擬于其倫公之謂矣為左衛將軍尋遷鎮軍丹陽尹北軍中候總政六師河南京尹冠冕百郡文武是寄公無愧焉瀟湘之役憑陵島嶼風船火艦周瑜有赤壁之兵蓋舳襜艫賀齊有橫江之戰仍為平南將軍開府儀同三司都督湘衡桂武四州刺史遂得左廣回扄轔車反暢長沙楚鐵更入兵欄洞浦藏犀還輸甲庫雖復戎歌屢凱軍幕猶張淮南望廷尉之囚合淝稱將軍之冦莫不失穴驚巢沈水陷火為使持節侍中司空車騎大將軍都督南北兖青譙五州諸軍事南兖州刺史南平郡開國公食邑八千户鼓吹一部中台在玄武之宫上將列文昌之宿髙蟬臨鬢吟鷺陪軒平陽之邑萬家臨淄之馬千駟坐則玉案推食行則中分麾下生平若此功業是焉既而金精氣壯師出有名石鼓聲髙兵交可逺故得艫舳所臨蓋於淮泗旌旗所襲奄有龜蒙魏將已奔猶書馬陵之樹齊師其遁空望平隂之烏俄而南仲出車方叔蒞止暢轂文茵鈎膺鞗革遂以天道在北南風不競昔者裨將失律衛將軍於是待罪中軍爭濟荀桓子於焉受戮心之憂矣胡以事君宣政元年屆于東都之亭有詔釋其鸞鑣蠲其釁社始𢎞就館之禮即受登壇之䇿拜持節大將軍懷德郡開國公邑二千户歸平津之館時聞櫪馬之嘶舍廣成之傳裁見諸侯之客亷頗眷戀寧聞更用之期李廣盤桓無復前驅之望霸陵醉尉侵辱可知東陵故侯生平已矣大象二年七月二十八日氣疾暴增奄然賓館春秋七十七即以其年八月十九日寄瘞于京兆萬年縣之東郊詔贈某官諡某禮也江東八千子弟從項籍而不歸海島五百軍人為田橫而俱死焉嗚呼哀哉毛修之埋于塞表流落不存陸平原敗於河橋死生慙恨反公孫之柩方且未期歸連尹之尸竟知何日遊魂羇旅足傷溫序之心玄夜思歸終有蘇韶之夢遂使廣平之里永滯寃魂汝南之亭長聞夜哭嗚呼哀哉乃為銘曰九河宅土三江貢職彼美中邦君之封殖負才矜智乘危恃力浮磬戢鱗孤桐垂翼五兵早竭一鼓前衰移營減竈空幕禽飛羊皮詎贖畫馬何追荀罃永去隨會無歸存沒俄頃光隂悽愴嶽裂中台星空上將眷言妻子悠然亭障魂或可招喪何可望壯志沈淪雄圖埋沒西隴足抵黃塵碎骨何處池臺誰家風月墳隧羇逺營魂流寓霸岸無封平陵不樹壯士之隴將軍之墓何代何年還成武庫周大將軍豳國公趙廣墓志銘公諱廣字乾歸邵惠公之元孫豳孝公之長子若木拂日長蛇委天龍圖幕河之光神鼎連雲之氣六辨搆字五運徵祥是以維嶽降神自天生德凝脂點漆日角珠庭為子則名髙五都為臣則光照千里華蓋中天之峰未階其峻虞淵浴日之水不盡其源歲在雕車年方竹馬月中桂樹切問能訓石上木生懸思即悟年十一孝公薨煢煢在疚孺慕過禮泉驚孝水竹動寒林三行克宣八翼斯舉大周建國宗子維城設壝封人分司典命開國天水郡公食邑二千户元年授使持節驃騎大將軍開府儀同三司其年四月授都督秦州刺史孝公久牧汧隴遺愛在人今兹見撫我君之子豈獨司𨽻之臺鮑宣纍葉丞相之府韋賢重代二年拜大將軍方衛青之張幕册重元勳譬韓信之登壇榮髙獨拜武成元年遷都督興梁等十九州諸軍事梁州刺史嶓冢導漾乃濟漢之東流蔡蒙旅平實華陽之西極其年九月改封蔡國公食邑萬户地接韓城關鄰楚鄣户封八縣恩深冦恂之功邑啓萬家事極曹參之賞保定元年授小司寇犴户苔生囹關籥動載酒屬車幸無寃氣觀囚軍府或聽鳴琴二年轉守蒲城都督潼關等六防諸軍事其年閏月遷都督秦渭等十二州諸軍事秦州刺史公亟牧冀城頻藩隴坻豪桀斂手貪殘解印加以上谷精兵漁陽噪鼓北臨髙栁南望長榆胸奴下馬之山貴相藏酒之谷莫不逺慕威聲遙承風化二年奉詔向甘州迎皇后有文在手仲子之歸紀裂繻來卿為君逆自非名髙絶國威被和鄰豈得稱族而行尊君之命四年授柱國大將軍昭陽以功髙見用項梁以名將當官以今方之彼有慙德天和三年授都督陜虞等八州甘防諸軍事陜州刺史屈産垂棘既有滅虢之兵王官羈馬非無絶秦之路公以正正鼓旗間間車軌服叛威邊算無遺䇿但以中外久勞積斯災疾山川則並走羣望賓客則諸侯在門是以請謁承明言歸湯沐方詢夏郊之祀或辨桑林之祟更除秦州刺史仍襲父爵豳國公分流之嶺未登晚塞之城空望太夫人以公羸瘠悲泣相守胸氣交衝奄捐館舍公頓伏苫寢水漿不入雖王人勸奪創巨愈增母死于子子死于親慈孝之道一朝總集大漸之辰春秋二十有九四關罷市三軍行哭言尋聽訟猶見寒棠還顧空營惟餘衰栁諡贈某官禮也六年六月歸葬於秦州之某原玄甲啓路追旌驃騎之功龍旗贈行深悼東平之逺公亮直惟忠溫恭惟孝居之仁義飾以禮樂風神機警聰睿精明有仞于宫牆無形于喜愠金版玉䇿之記枕籍忘疲蘭葉芝花之圖膏映必舉碣石秋雲昭陽落月思風含臆言泉流吻翩翩書記則阮瑀陳琳荏荏風流則王濛謝尚語其百發弓絶于猿吟論其百中劍深於雁陳枚乘之望梁苑不憚棄官樂毅之求燕路無辭千里至如應變將略雷電立成帷帳謀猷孫吳暗合有品藻人倫之志有清平天下之心鵬路忽摧龍津遂壅嗚呼哀哉太宰早茂三荆長辭萬始撫養遺孤連枝同氣馬援之誡兄子義存謹飭王况之事世叔情深愛敬同德比義此之謂乎乃為銘曰御乾從紀乘離作聖白環讓德玄圭受命平一地紐增輝天鏡傍廕數國前臨七政地屬先登時逢下武玉璜撥亂金縢光輔衛晉承家邢茅胙土波分建木派流玄扈景命寅序徽猷淵塞忠有令圖孝為全德山節蒞政桓圭守國瀚海將臨燕山行勒平樂髙宴金華説經論儒璧水觀禮明庭相風待賦承露須銘乘舟向日䇿馬隨星德舉克明賢能允淑上將受脤元戎推轂趙失東漁胡亡南牧箭下聊城泥封函谷衮衣頻露丹襜亟卷約法情推繁辭理遣盜烏懸察疑蛇立辨人共官園家同野繭籋雲推景轉風落仞星裂中台山傾左鎮夏楹舍爵殷階啓殯縿幕躐行明旍庭引秦川直望隴水分飛山河滿目容衛靈歸陵圖石馬車畫衮衣小山搖落長林變衰凄愴原隰荒涼宅兆樹密人稀山多路小十里松城千年華表夜臺尤寂窮泉無曉周驃騎大將軍開府侯莫陳道生墓志銘君諱道生字某朔州武川人也本系隂山出自國族降及于魏在秦作劉父少興武川鎮將山河抗拒關塞被邊早擅威聲咸多雄烈君讀書馬上清談劒端獨運六竒専精三略雖復身居末將而勇冠旌門位在支軍而謀參幕府魏正光五年任統軍𨽻天柱爾朱榮征北海王永安三年隨太師賀拔勝入關尋轉别將滑源卷甲關城束馬並皆克捷君有力焉永熙三年補都督太祖文皇帝奄有關河令行天下以君幹略委之爪牙名洽中涓功參上佐兵臨河曲前登白馬之津冦發蒲城先戰黃沙之苑臨晉橫船既禽趙將馬陵削樹復下魏兵班瑞司勳披圖疏爵授驃騎大將軍金紫光祿大夫鄠縣開國公食邑五百户趙儼之為驃騎正駕單車張湛之拜光祿長乘白馬以斯連類朝野榮之大統九年更姓侯莫陳氏隨大將軍拓跋逺經始陽二水長鬬三川無市擐甲搆病死于轅門春秋五十一贈持節都督朔州刺史君在武川文皇帝同鄉里霸功既立王業克成不忘捨講猶論償博今嗣德維新功臣追逺東都馬鳴不無見日之歎北陵車過終憶平生之言有詔更贈使持節驃騎大將軍開府儀同三司都督宜敷絳三州諸軍事敷州刺史諡某公禮也夫人拓跋氏安邑郡夫人庭有鐘鼓家承針誡教容教德言告言歸天和五年六月薨即以其年十月同葬于京兆某縣洪源鄉武子成寢請西階而合葬平陽下嫁即廬山而共墳銘曰凝隂逺寂廣漠平寒沙窮瀚海地盡皋蘭塞鴻秋去胡桑夏乾風土壯氣山河凜然師一作兵旅上谷威雄武川君則繼踵代不乏賢匣有忠劍庭流孝泉魏室多故餘風未殄天保讓德當途廢典上將指蹤中涓力展洛城夜捷河梁朝剪鐵劍金龜榮追玉鉉身胄漢祚門承魏緒並擅華宗俱稱當路伉儷云匹年齡並故趙瑟秦聲同為丘墓小陵石槨洪原鄉土芻靈兩引池栁雙前隧路仍合松城即連霜隨栁白月逐墳圓芝蘭幾代陵谷何年周車騎大將軍贈小司空宇文顯和墓志銘公諱顯和字某上黨武鄉人也自大霧浮河長虹映渚承源于若水纂系于蒼林上黨居衛之西常山在趙之北因地為氏可略而言焉祖求南衛將軍冀州刺史父金殿鎮逺將軍兖州刺史並控鶴兵俱張戎樂聲榮之盛繼踵當年公稟山嶽之靈擅風雲之氣容止矜莊聲名籍甚彎弧挽強左右馳射故得名髙上谷威震樓煩襲爵安吉縣侯食邑五百户永興三年幽并叛換有無君之心帝顧謂公曰天下洶洶將若之何公曰擇善而從之乃誦詩云彼美人兮西方之人兮帝曰是吾心也乃定入關之䇿以公母老家大令預為計公曰今日之事忠孝不並君不密則失臣臣不密則失身帝愴然改容曰卿是我王陵遷朱衣直閣閣內大都督改封長廣縣公邑一千五百户武帝初至潼關太祖親迎溱水太祖素知公名而未之識也目于衆疑而不問直云令此人射水傍小烏應手即著太祖喜云我知卿名矣即用為帳內都督滄州諸軍事滄州刺史增邑并前二千五百户黃公衡之決事魏后是以推心潘承明之忠壯吳王為之降禮異代同榮見之今日東夏邊隅地連荒服井陘塞道飛狐路斷乃以公為使持節衛將軍都督東夏州諸軍事東夏州刺史白波青犢之兵銅馬金繩之亂莫不交臂屈膝牽羊抱馬在州遘疾解任還朝小馬留廏餘牀挂壁吏人攀戀刋石陘山雖非漢陽之城還似扶風之路授使持節車騎大將軍儀同三司加散騎常侍以魏後元年疾甚亡于同州春秋五十七天子輟樂羣公會喪太祖親臨弔祭哀動左右于時兵革交侵普斷贈諡即以本官印綬權葬于同州之北山今建德二年二月二十三日遷喪于咸陽長安縣之洪瀆原時逢禮樂之遷代屬謳歌之變國雖異政人足追榮乃贈使持節驃騎大將軍開府儀同三司小司空丹延綏三州諸軍事延州刺史諡某公禮也夫人髙氏渤海人也柔參晉政拒曹爽之異謀起在漢庭共王陵而俱對况乎針訓有儀言容以德肅恭中饋賢才內則豈直不聽雜樂以變齊國之風不食鮮禽以斷荆王之獵昔之合葬季武子之西寢今之同穴長平侯之北陵世子神舉兄弟至性純孝善居喪禮有終有始于身無改是以宦成名立孝顯忠貞銘曰北嶽二名蔥河兩本其峻惟極其源惟逺俗稟山川人資台衮義烈桓桓才雄悃悃乃祖乃父繼踵威雄摐金北陸鳴玉南宫隱若吳漢賢哉竇融負霜依德無雷向風挺此含章生兹秉德孝實天性忠為人則暢轂鏤膺燕南趙北弱水將通九部可勒帷幄參謀宫闈典職善擇忠言能防變色繁弱已徑淇園乃直戟中小支禽穿左翼建旟赤谷揮戈武州長城萬里河水雙流潁川多恙淮水未瘳義重穿璧恩深置郵于谷之口于渭之陽丘山零落碑闕低昻草銜秋火樹抱春霜書劒俱沒人琴並亡哀哀嗣子純心靡託孝水未枯悲松先落室進巢鵀門通弔鶴功臣身殞會圖麟閣周譙國公夫人步陸孤氏墓志銘夫人諱某字某本姓陸吳郡人也大夫拓境百越來庭丞相勒兵三江席卷髙祖載為劉義真長史留鎮關中既沒赫連因即仕魏臨終誡其子孫曰樂操土風不忘本也言念爾祖無違此心祖政驃騎大將軍儀同三司恆州刺史父通柱國大將軍大司馬文安公匡贊經綸參謀揖讓名髙廣武功重長平夫人七德含章四星連曜敬愛天情言容禮典九日登髙作銘秋菊三元告始或頌春椒年十有四娉于譙國友其琴瑟愈恭節儉之心伐其條枚實秉憂勤之德鄴地登髙之錦自濯江波平陽採桑之津躬勞蠶月天和元年册拜譙國夫人東武亭之妻既稱有秩南城侯之婦還聞受封柱國殿下以若華分照增城峻土揚旌僰道問政卭都白狼之溪途艱黃牛之坂荔枝之山地險蒲萄之國夫人别離親戚關河重阻夷歌一曲未足消憂猿鳴三聲沾衣無已是以夭厲之疾遂成沈痼玉瀝難開金膏實逺建德元年七月九日薨于成都私第春秋二十有一即以其年十一月二十二日歸葬長安之北原詔贈譙國夫人禮也殿下傷神秋月掩淚長松周季直之留書更深冥漠潘安仁之詞藻徒增哀怨豈直西河女子獨見銀臺東海婦人先逢金闕銘曰芟陵反斾椒山止戈金精據嶺昌閣凌波西遊卿相東裂山河華亭冠冕榖水絃歌震維徙族燕垂從宦塞入飛狐關連鳴雁䇿預登阜功參臨澗寶鼎留銘雕戈餘贊應圖淑令秉禮言歸魚軒馮軾澤雉文衣明月照鏡仙石支機行雲細起回雪輕飛北降帝子南麾蜀守若水既開靈山巳鏤月峽猿啼江神牛鬭星機北轉日轡西回陽泉伏氣隂律沈灰鶴辭吳市鳳去秦臺神光離合燈影徘徊雙流反葬百兩回旌少女離位夫人去城帷堂野設帳殿郊營山川竒事風月無情搖落丘隴荒涼封域樹樹秋聲山山寒色草短逾平松長轉直節墳方固園陵永植周趙國公夫人紇豆陵氏墓志銘夫人諱含生本姓竇扶風平陵人魏其朝議列侯則莫能抗禮安豐奉圖功臣則咸推上席外戚列傳既聞建武之書仲山古鼎或表單于之獻祖略少保建昌郡公父熾柱國大將軍大宗伯鄧國公孟津大誓常預同德之臣咸陽違約克贊先登之主並得位入六府功參八柄夫人有文在手有象應圖榮曜夙彰徽華早茂肅恭以禮受教于公宫言容以德有聞于師氏及乎進賢君子內主邯鄲琴瑟在堂輜軿是服長久于節不無秋菊之銘履端于始或有椒花之頌豈止莊姬掩笑楚相知慙定薑問兆齊兵不入武成二年册拜趙國公夫人漢王聞立義之婦邑以延鄉齊侯見有禮之妻封之石窖異代同榮差無慙德柱國殿下居若木之一枝在天潢之别派揚旌玉壘驅傳銅陵南通向日之民東被無雷之國夫人從政月峽贊德雲門錦濯江波還臨織室山明石鏡即對粧樓既而玉律頻移金爐不變胡香四兩嗟西域之使稀靈草一枝恨瓊田之路絶天和五年四月二十二日薨于成都之錦城春秋二十孫子荆之傷逝怨起秋風潘安仁之悼亡悲深長簟况復仙臺永别無復簫聲傅母長歸唯留琴曲七年二月日歸葬於長安之洪瀆原詔贈趙國夫人禮也雲雨去來既留連于楚后光隂離合實惆悵于陳王銘曰河西斗絶觀津孤起章武賢臣安豐貴仕木樓千仭金山萬里紹慶邢姨基昌宋子施襟趙北待姆秦南紘綖禮數䄖狄騑驂義超江汜仁流葛覃玉筐迎燕金籠助蠶敬愛純深端莊淑問有光國史無形喜愠舉案外恭停機下訓馨馥于蘭年華于舜風雨消散神靈離絶婺女還星姮娥歸月左楹夕奠髙堂朝發空揚凌波更無回雪下濕曰隰髙平曰原西臨火井北望塞門猶垂雉服尚駕魚軒平原忽矣天道何言山回地市路沒滕城松悲鶴去草亂螢生新雲别起舊月孤明賢墳永式節隴常貞周安昌公夫人鄭氏墓志銘夫人諱某滎陽陽武人也周宣王之母弟俾侯于鄭鄭莊公之重世卿士于周以國為族自兹而始祖瓊太常恭侯父穆司空貞公西京賦詩奉常參柏梁之宴東都言讖司空為武衛之官籍連帝譜既同盤石門稱通德無廢儒林夫人禮義閨門端莊令淑采采芣苡萋萋葛覃及乎作配君子言事舅姑下氣怡聲承巾奉帚親戚惟禮閨闈以睦保定二年册拜滎陽郡君序戚升榮從夫有秩豈惟立義之婦邑以延鄉有禮之妻封之石窖大將軍沉犀二江夫人聞猿三峽明月靈關之阻秋風蜀道之難掩以瑶華先從春露天和十八年五月二十日薨于成都春秋三十六詔贈安昌國夫人禮也即以其年十一月十六日歸葬于咸陽之白起原遂使山回反壤先封節婦之陵日入虞淵實掩賢姬之墓嗚呼哀哉乃為銘曰天河開國分畿置政地有十城人居九命疇昔之邑今兹成姓識履傳風參輿留慶三星在户百兩言歸虔恭內政榮曜中闈承姑奉盥訓子停機桑園蠶績錦室鸞飛珩璜節步藻火文衣巴水幽咽猿鳴斷絶月落珠傷春枯桂折趙瑟長辭秦簫永别貞姬掩隧節女封墳洛濱無月荆臺失雲鳥悲傷聽松聲愴聞千年遂古百代餘芬周大將軍隴東郡公侯莫陳君夫人竇氏墓志銘夫人諱某扶風平陵人也章武開國名髙外戚之右安豐入朝位在功臣之上祖以孝昌之始主諾淮陽父以正光之初褰帷海岱夫人生于禮義之門宗於針誡之德虔恭惟禮令淑惟儀及乎百兩言歸三星在户針盥始事條枚是則有子從政猶無逸豫之心有夫出征自識山陵之兆大統十六年册授永安郡君婦以夫尊親由子貴朝章家慶兼而有之保定二年改授隴國夫人車服禮數袿褵典則有美河魴足光彤史既而風霜所及灰琯遂侵與善何言至于大漸天和六年四月七日薨春秋六十有六即以其年十月十日遷葬于咸陽萬年縣之杜原山形起伏既符白鶴之祥地勢風煙乃合青烏之氣銘曰觀津世族平陵豪姓四侯登仕三君從政白狼建功丹蛇襲慶漢之廣矣先聞淑令君子朝端賢才家政簮珥以禮軒車以命讓果成亷推珠止競百年超忽千金莫恃室謝賢夫庭辭貴子歸鞍輟露采蘩廢祀室委眠蠶衣留畫雉雲垂下澤日掩髙舂空帷舊館虛幕新封山回廣栁路沒深松遊魂幾變夫人何從周冠軍公夫人烏石蘭氏墓志銘夫人諱某樂陵人也晉司徒樂陵公苞後子孫就封因即家焉扶風舊城猶存鐵市河陽故墅尚餘金谷或寓燕陲仍仕代郡祖行代郡尹父魏司空蘭陵郡公司空佐命魏朝少傅疑丞周室並為大族俱蒙賜姓秦晉匹也是曰通家夫人年十七歸于宇文氏淑令端莊含章貞吉針盥惟儀閨闈已正某年除金鄉郡君某年改授冠軍夫人四德小君宜其家室三事內主翻辭贊務以保定五年四月遘疾薨時年四十有四即以其年某月日歸葬于京兆之某原人世風煙山川超忽陵陂青麥儻逢貞女之墳隴首白楊或表賢姬之墓乃為銘曰三星麗天五嶽鎮地禮有其秩人居其位燕趙多竒山川雄氣挺兹令淑惟此含章玉生庭照蘭開室香邢姨褧服宋子河魴百兩言歸九儀從聘䄖狄七彩軒車六命鼎室辭親槐庭贊政世為閲水人成大夢回帳山門移燈泉洞金棗長含銀蠶永送香填柏槨路閉松城悲鸞獨影雄劒孤鳴留連趙瑟悽愴秦笙周太傅鄭國公夫人鄭氏墓志銘夫人諱某滎陽開封縣逺里人也七子賦詩足光賓客三卿從政實靜諸侯驂乘則晉后停輿來朝則漢君識履華胄蟬聨無虛史籍祖那秦州别駕父茂伯撫軍將軍涼州刺史伯陽縣侯夫人令淑早聞芝蘭獨茂既容既德言告言歸悌實溫凊恭惟針盥太傅弼諧周室股肱攸寄夫人輔佐君子勤勞是司琴瑟既友條枚無伐故得用之邦國成之孝敬某年月日封鄭國夫人䄖狄既加紘綖是務夫有安世之貴躬服浣濯子有文伯之尊無忘機杼表裡惟安閨闈且正醫門有疾藥對無徵天和三年三月二十日薨葬于長安之石安原世子某兄弟並勗慈訓咸遵母儀霜露深悲寒泉增慟銘曰居德圃田當官教府置騎賓來開黌學聚福履家室賢才踵武棠棣之華螽斯之羽人倫七德風化二南采采芣苡萋萋葛覃節行聲玉副笄珈篸栁園秉杼桑津浴蠶春秋超忽零落無時家亡淑女國喪賢姬香墳永送舞鶴長辭山深月暗風急松悲千年開閉將驗靈龜後魏驃騎將軍荆州刺史賀拔夫人元氏墓志銘在河之洲聞君子之配德言采其蕨見夫人之有禮用之風化人倫厚焉夫人諱安字大羅河南洛陽人也祖某京兆康王父昭驃騎大將軍開府儀同三司録尚書司州牧汝陽郡王跗萼雄圖階基霸迹公卿之室將相維國維家夫人能修法度無思犯禮恭儉節用憂在進賢大統五年封樂安公主歸于賀拔氏時年十三思事憂勤化成婦德彤管載暉棠棣早茂及乎謳歌有歸䄖狄降等輔佐君子猶安其室周天和元年乃封章武郡君霜露不居風煙飄忽遘疾纍旬奄捐館舍以周天和四年二月二十六日薨于長安萬年里春秋五十有二詔贈頓丘國夫人禮也即以其年三月二十日歸葬于咸陽之石安原既異乘鸞翻然永去雖非舞鶴即掩泉門欲志佳城乃為銘曰逖矣雄謀悠哉霸轍九服運三川中竭卿相連鑣賢才蕪絶琬琰令淑施襟結褵方之棠棣譬以螽斯既全婦德還稱母儀逝水滔滔危途冉冉問藥無對蒸丹不驗狄服空陳絃機虛掩郭門路轉哀挽途窮隴深結霧松髙聚風春蘭秋菊唯始唯終周大都督陽林伯長孫夫人羅氏墓志銘夫人諱某恆州代郡太平縣人祖某父協周大將軍南陽郡公夫人資於事親躬奉訓誡教於宗室足聞詩禮及乎言歸肅恭如事蘋藻維敬紘綖是勤內位克諧中閨以睦年齡不競霜露先侵更無延夀之杯遂闕長生之枕以周天和四年二月八日薨于長安之洪固鄉時年二十有三其年某月日葬于萬年縣之夀里山非宋國翻為節女之陵地異荆臺遂有賢妃之墓銘曰畢狼建國靈武開都地接天柱山臨寶符人資義烈世襲雄圖葛覃維萋棠棣早盛既安淑德爰從配命四教𢎞宣三星克正霜凋桂苑風落芝田三從闕性五福傷年歸安永絶言告長捐悽切郊野紆回隰原風慘雲愁松悲露泣朗月空嗟傷神何及周儀同松滋公夫人尉遲氏墓志銘夫人諱某河南洛陽人也祖某父太師柱國公魏室喪亂經綸夷阻周朝建國匡翊揖讓圖諜帝系即有內外之親分裂山河仍為舅甥之國夫人容範端莊儀刑淑令六義觀德南風有夫人之詩八卦成形東方有少女之位姆傅習言公宫教業針管線纊佩帨茝蘭年十有二出適儀同拓跋競衣其翟服既得宗婦之儀乘其魚軒還從列國之禮摽梅三實無闕其時夭桃九華能修其政某年某月册拜回洛縣君母金明公主魏文帝長女春則帝女採桑秋則王姬築館夫人出入主家遨遊戚里濯龍園苑長門宫殿既而膏腴美疢華茂傷年沈痼牀帳蒸離寒暑三世之術無乏于醫門百草之本徒窮于藥性建德三年五月七日亡春秋三十昔西河女子值九節之菖蒲東海婦人得三山之芝草無由再遇悲矣如何即以其年十月十五日葬于京兆之北陵原龜筮告辰丘陵啓奠西臨織女之廟南望湘妃之墳嗚呼哀哉乃為銘曰父曰帝師母曰王姬車服不繫江漢無思是生令淑觀禮敦詩聲超宋子德茂邢姨繼世盛德思賢克舉奠雁迎門濡蘋實俎奉盥如事移茵即序春氷浴蠶秋機秉杼帝鄉近親帝城近臣濯龍親戚平陽主人金波回月玉相臨春弄玉鳳皇昌容紫草自此千年無人得道舜華榮曜飄零何早渭水北原平陵故園才通谷口即望寒門吁嗟此地去矣歸魂孟冬十月長松九年親賓掩淚悽愴何言周驃騎大將軍開府儀同三司冠軍伯柴夫人李氏墓志銘夫人諱某隴西狄道人也周有柱史夫子以之猶龍漢有將軍宛城以之輸馬復有西入上書仍為秦國之相東向問計即是韓王之師父宜使持節大將軍南北二華州刺史順陽郡公魏武皇帝之長舅也穰侯魏冉居咸陽之宫曲陽王根借明光之殿語其貴戚差足擬倫論其退謙彼多慙德夫人幼而聰敏早聞令淑彤管有美賢才見稱弄其紙筆懼失諸兄之意剪其齠齡畏傷王母之心年十有一出適驃騎大將軍開府儀同柴烈烈以上將頒朔中台受任軍國忠勤規模繁總夫人輔佐君子言容匡贊增耀三星欽明四德授巾沃盥有謹于事姑斷織停機無忘于訓子保定二年册授大夏縣君既以夫尊又云子貴乃遷順陽改郡君夫人之邑或用鄉名小君之號多從夫秩典册光臨足稱榮寵本有風氣之疾頻年增動略多枕卧飛龜之散遣疾無徵畫龍之符留年不驗以今建德四年三月日薨于館舍春秋四十九即以其年八月日葬于長安之洪瀆原神光離合尚在河湄雲氣徘徊猶歸樓下嗚呼哀哉乃為銘曰上書秦相立功漢將隴水分流秦川遙望秋陸俗勇金行地壯廣武軍中安平河上妻者齊也謂嫁曰歸三星夜照百兩朝飛䄖翟有典容禮無違台庭等秩侯服同衣子奉母儀夫聞家政七族承和九閨連慶紛帨恭肅溫清孝敬杼乘秋成蠶隨春令年華未落電影先過徒餐日氣空飲天河星凋玉井月掩金波虞淵落日薤露哀歌寂寞虛奠荒涼象設幽隴龜封重泉蟻結秋色悽愴松聲斷絶百年何幾歸於此别漢魏六朝百三家集卷一百十一下
