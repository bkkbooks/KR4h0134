body:
  text: 漢魏六朝百三家集巻九十二王僧孺集題詞南史言王僧孺中年遭躓有桑濮之疑而梁書顧稱南康王典籖湯道愍怨僧孺裁抑彼寵遂行謗訟余以其生平攷之出守南海不取越裝入參大選杜絶請謁節槩若此豈不堪託色者哉南史言非也致書何炯自明已意憂患之餘文辭危惻子長流連於少卿文通呌號於建平有同情乎僧孺書藏異本富埒沈任文用新事人多未見今集中諸篇杼軸雲霞激越鐘管新聲代變於此稱極文人不博不能致竒碩學之効其班班者訪砭石譔譜事特豹半耳江侍中少孤貧采薪而得貂蟬竟成休徵王中丞幼避鹵簿墮溝後乃鳴騶清道二事相類虎鼠湏㬰誠達觀者可付之東暾西山弇秉電畫水乎目録賦賦體表吏部郎表為臨川王讓太尉表為南平王讓儀同表為韋雍州致仕表為南平王妃拜改封謝厯表牋逮詣南司辭府牋啟謝除吏部郎啟謝賜于陁利國所獻檳榔啟謝齊竟陵王使撰衆書啟為蕭監利求入學啟答釋法雲啟教南海郡求士教書與何烱書答江琰書與陳居士書序詹事徐府君集序臨海伏府君集序碑中寺碑栖𤣥寺雲法師碑墓誌銘豫州墓誌銘傳太常敬子任府君傳誄從子永寧令誄祭文祭禹廟文佛事文禮佛唱導發願文懴悔禮佛文初夜文樂府朱鷺鼓瑟曲有所思白馬篇古意登髙臺湘夫人詩侍宴又落日登髙中川長望贈顧倉曹秋日愁居答孔主簿至牛渚憶魏少英寄何記室忽不任愁聊示固逺為何庫部舊姬擬蘼蕪之句何生姬人有怨為人傷近而不見月夜詠陳南康新有所納詠擣衣與司馬治書同聞隣婦夜織為人述夢侍宴景陽樓春日寄鄉友夜愁示諸賓送殷何兩記室春閨怨秋閨怨詠寵姬在王晉安酒席數韻為人寵姬有怨為姬人自傷為人有贈見貴者初迎盛姬聊為之詠傷乞人春思絶句為徐僕射妓作漢魏六朝百三家集巻九十二目録欽定四庫全書漢魏六朝百三家集巻九十二明張溥輯王僧孺集賦賦體雜㳫兮翠旌容與兮龍駕新桐兮始華孔雀兮初化思治兮終朝求人兮仄夜竟大徳之未酬何飛光之徒舍表吏部郎表臣生輕飛籜品細疏壤寂寞州閭取淪窐竇不自求於善管寧許人以能官從班隨牒自安疎逺豈望翰飛終知跡滯一逢浸漉幾聞昭晉假拙為心變竒成偶寧為天覆地長復與雨露相滋秋成春發必如暄寒無爽自變泥塗多超嵩鄧屢考固其比越在累誠於可聞方愧朱紫永懵鈞衡固惟許李終非王畢取其清尚同所經企求之碎宻寧可庶幾為臨川王讓太尉表臣聞一匹以長望千里而成累空輪易聘觸三尺而不豋茍曰違方難用適逺安車駟馬望髙闕而朝至繡服緹麾􅀈康衢而暮返行瞻畵虎居對蒼龍陛下海涵春育日鏡雲伸追大道之無私惜㣲臣之宜極為南平王讓儀同表臣聞石瓠難剖用謝缾罍瘣木云疵事乖丹艧逢聖徼天一朝賞至非能聲均呉楚譽埒梁陳故以神夢紫霄心飛丹掖品同儀比愧眩莫殊為韋雍州致仕表一旦攀附遂無涯限排雲矯漢飛捧待翼陸離蟬組照灼旛旗受脤推轂執珪奉酎變狹室於髙門改小冠於侯服况復還周紐其六印歸齊列其五鼎常懼輪輕載積基薄墉髙噐覆巵傾人指鬼瞰老與年并疾隨衰及途遥齒截漏迫鐘鳴髙舂之景一斜不周之風忽至菌蟪夕隂倐駛無幾堇蕣朝采飄零已及仰朱闕而掩涕俯濛谷而自悲豈復式瞻拱黙仰接鐘鼓儻帷葢未親東岳稍駐擊壤鼓腹其賜猶多為南平王妃拜改封表拜妾為南平王妃奉命震慙有灼丹寸妾瞻絲望帨且或多慙鏡史觀圖是焉知愧以兹𦕈薄有儷蕃儀紃組不聞饘􅋳葢闕不悟𤣥造曲被徽渥愈臻改服遞名事華品貴恩深外邸榮照下庭豈期輶弱所能勝荷謝厯表竊以龍馭不爽靡見侵薄鳯職是司曾無昃朓璧聨珠燦輪映階平義實明時事惟均政固以先天候其餘始執杓驗其平分九瀛仰化萬㝢依朔牋逮詣南司辭府牋下官不能避溺山隅而正冠李下既貽疵辱方致徽繩解籙收簮且歸初服竊以董生偉噐止相驕王賈子上才爰傅卑主下官生年有值謬仰清塵假翼西雍竊步東閣多慙袨服取亂長裾髙榻相望直居坐右長階如畫獨在僚端備其從容之詞假以寛和之色恩禮逺過申白榮望多厠應徐厚徳難逄小人易説方謂離腸隕首不足以報一言露膽披誠何能以酬屢顧寧謂罻羅裁舉㣲禽先落閶闔始吹細草仍墜一辭九畹方去五雲縱天網是漏聖恩可恃亦復孰寄心骸何施眉目方當横潭亂海就魚鼈而為羣披榛捫樹從虺虵而相伍豈復仰聽金聲式瞻玉色顧步髙軒悲如霰委踟蹰下席淚若綆縻啟謝除吏部郎啟自一遇休明多逄渥澤出斯溝壤置之霄漢清塗華轍叨厠累仍顯職名階俄來倐至而智効必其無取尤怠忽焉已彰不意涵養更滋霶霈愈此始職樞華紛體恒選知非腆族必待俊民何言賤劣所或叨假循涯測限生所不勝瞻恩奉徳死何能報謝賜于陁利國所獻㯽榔啟竊以文軌一覃充仞斯及入侍請朔航海梯山獻琛奉貢充庖盈府故其取題任賦多述俞書萍實非甘荔葩慙美謝齊竟陵王使撰衆書啟伏惟殿下銅爵始成早摛從后之句柏梁初搆首屬驂駕之辭楚史所受曾不云述沛獻斯陳良未足採徒以願托後車以望西園之客攝齊下坐有糅南皮之游謬服同於魯儒竊吹等乎齊樂為蕭監利求入學啟竊以矯首伺飛不如脩弋踠足念逺莫若驅鑣故樸斲成於丹雘篠簜資於栝羽敢因莩末有志庠均為山資於一簣學海漸其㣲流答釋法雲啟辱告惠示并主上所答羣臣仰諮神㓕論伏覽循環載深鑽奉發䝉袪蔽朗若披雲竊以事藴難形非聖莫闡理寂區位在愚成惑若非神超繫表思越機前豈能燭此㣲言若開金石洞兹玅境曾靡榛蹊喻之以必薦示之以如在使夫持論者不終泥於遥轍專謬者無永沈於惑海預奉淵謩孰不懽肅裁此酬白不申擊舞王僧孺呈教南海郡求士教文舉下車寤夢於根矩長孫入境明發於龍丘此境三閩奥壤百越舊都漢開呉别分星畫部風序泱泱衣簮斯盛其川岳所産豈直明珠大貝桂蠧翠羽而巳哉孝實人經則有羅威唐頌學惟業本又聞陳元士爕至於髙尚獨徃相望於􅛲巗懐仁抱義繼蹤於前史書與何烱書近别之後将隔暄寒思子為勞未能忘弭昔季叟入秦梁生適越猶懐悵恨且或吟謡况岐路之日将離嚴網辭無可憐罪有不測葢畫地刻木昔人所惡叢棘既累於何可聞所以握手戀戀離别珍重弟愛同鄒季滛滛承睫吾猶復抗手分背羞學婦人素鍾肇節金飈戒序起居無恙動静履宜子雲筆札元瑜書記信用既然可樂為甚且使目明能祛首疾甚善甚善吾無昔人之才而有其病癲眩屢動消渴頻增委化任期故不復呼醫飲藥但恨一旦離大辱蹈明科去皎皎而非自汙抱欝結而無誰告丁年蓄積與此銷亡徒竊髙價厚名横叨公噐人爵智能無所報筋力未之酬所以悲至撫膺泣盡而繼之以血顧惟不肖文質無所底葢困於衣食迫於饑寒依隱易農所志不過鍾庾乆為尺板斗食之吏以從皂衣黒綬之役非有竒才絶學雄略髙謨吐一言可以匡俗振民動一議可以固邦興國全璧歸趙飛矢救燕偃息藩魏甘卧安郢腦日逐髓月支擁十萬而横行提五千而深入将使執圭裂壤功勒景鐘錦繡為衣朱丹被轂斯大丈夫之志非吾曹之所能及巳直以章句小才蟲篆末藝含吐緗縹之上翩躚罇爼之側委曲同之鍼縷繁碎譬之米鹽孰致顯榮何能至到加性疎澁拙於進取未嘗去來許史遨遊梁竇俛首脅肩先意承㫖是以三葉靡遘不與運并十年未徙孰非能薄及除舊布新清晷方旦抱樂銜圖訟謳有主而猶限一吏於岑石隔千里於泉亭不得奉板中涓預衣裳之㑹提戈後勁厠龍豹之謀及其投劾歸來恩均舊𨽻升文石豋玉陛一見而降顔色再覩而接話言非藉左右之容無勞羣公之助又非同席共研之夙逄笥餌巵酒之早識一旦陪武帳仰文陛備𣆀佚之柱下充嚴朱之席上入班九棘出專千里據操撮之雄官參人倫之顯職雖古之爵人不次取士無名未有躡景追風奔驟之若此者也葢基薄牆髙塗遥力躓傾蹷必然顛匐可俟竟以福過災生人指鬼瞰将均宥噐有驗傾巵是以不能早從曲影遂乃取疑邪徑故司𨽻懔懔思得應弦譬縣厨之獸如離繳之鳥将充庖鼎以餌鷹鸇雖事異鑽皮文非刺骨猶復因兹舌杪成此筆端上可以投畀北方次可以論輸左校變為丹赭充彼舂薪幸聖主留善貸之徳紆好生之施解網祝禽下車泣罪愍兹恚詬憐其觳􅑌加肉朽胔布葉枯株輟薪止火得不銷爛所謂還魂斗極追氣泰山止復除名為民幅巾家巷此五十年之後人君之賜焉木石感隂陽犬馬識厚薄員首方足孰不戴天而竊自有悲者葢士無賢不肖在朝見嫉女無美惡入宫見妬家貧無苞苴可以事朋類惡其鄉原耻彼戚施何以從人何以狥物外無奔走之友内乏强近之親是以構市之徒隨相媒蘖及一朝捐棄以快怨者之心呼悲可矣葢先貴後賤古富今貧季倫所以發此哀音雍門所以和其悲曲又迫以嚴秋殺氣具物多悲長夜展轉百憂俱至况復霜銷草色風揺樹影寒蟲夕呌合輕重而同悲秋葉晩傷雜黄紫而俱墜蜘蛛絡幕熠燿争飛故無車轍馬聲何聞鳴雞吠犬俛眉事妻子舉手謝賔遊方與飛走為隣永用蓬蒿自沒愾其長息忽不覺生之為重素無一㕓之田而有數口之累豈曰匏而不食方當長為傭保糊口寄身溘死溝渠以實螻蟻悲夫豈復得與二三士友抱接膝之歡履足差肩摛綺縠之清文談希㣲之道徳唯呉馮之遇夏馥范彧之值孔嵩愍其留賃憐此行乞耳儻不以垢累時存寸札則雖先犬馬猶松喬焉去矣何生髙樹芳烈裁書代面筆涙俱下答江琰書猥惠嘉音用蠲疾首發函伸紙朗若披雲等嶰谷之清音比洞庭之髙曲辭則美矣而擬其非倫譬享海鳥以醇醪嘉膳栖林狖以崇楹曾拱茍非其實立有驚怖况復以一離訴棄賔實漼然豈復能使一笥可輕八厨斯引且豋清漢乍棄黄汙望影析支争塗再楫其或蹲林卧石籍卉班荆不過田畯野老漁父樵客酌醴焚枯嗚嗚相勞羹藜含糗果然滿腹寧有幡旗貴客車馬大賔獻書盡先賢之徳作頌罄前皇之美豈不俯拾青紫坐享大夫况復詠髙梧而賦脩竹背清淮而遊長苑留東閤以從容豋石室而髙視豈與夫身沒名隕同年而共毁譽哉與陳居士書雲波遥夐燕越數千行雲欝術征禽難使用隔巾車未能搦札引領南望悵矣心飛幸因劣薄懐章貴壤依然谷口覺子真之咫尺静睇巖灘信子陵之非逺巳入虚白之室用披蓬蒿之徑稟紛綸之髙論承希㣲之妙㫖虚徃實歸用祛塵惑序詹事徐府君集序君稟靈川岳懸精辰象早照珪璋夙表岐嶷孝睦天稟友愛㝠深故以事顯家庭聲著同族年十八見召為國子生曳裾持巻實華庠璧有均閉户靡因餘竈每攝齊函丈左右屬目蓄以鄰幾之性加以入神之資聞一知二師逸功倍遊魏闕而不殊江海入朝廷而靡異山林未嘗投刺權門驅車戚里遨遊梁董去來賈郭時春秋猶少人爵未崇而清風嘉譽震灼朝野非直俯致貴仕故可坐享通侯而緤馬懸車閉門髙枕耻為詭遇試此行藏及皇運聿興重氛載廓君藏噐待時合猶符契陵扶揺而髙騖排閶闔而容與故位隨徳顯任與事隆重以姿儀端潤趨眄淹華寳佩嗚風豐貂映日從容帷扆綽有餘輝自綢繆軒陛十有餘載温樹靡答露事不詶省中之言無漏席下之迹不疑故以主聖臣賢應同􅹗璽以石投水如鱗縱壑行稱表綴言成模楷猶復忘彼豐愉安兹素薄衣同屢補食等三杯車服不事鮮明室宇畏其雕奐九徳無遺百行備舉至於專心六典精賾必深汎遊羣籍菁華無棄搦札含毫必𢎞靡麗摛綺縠之思鬰風霞之情質不傷文麗而有體臨海伏府君集序袁粲領袖一時儀形物右聲逾裴樂譽出王劉士有懐道藴義望塵而趨者或三年而未識乍四旬而一見與君道合神遇投分披衿敷文研理匪晨伊暮至於神經怪牒緑笥丹筒金版玉箱錦文緹帙並藏諸靈府秘在瑶臺而君莫不徧探㝠賾具閲局檢常以前賢徃學亟與聖違賈馬盧鄭非無紕越荀郭何王彌多蹐謬二義可辨未值髙卿之疑九事非難不逢平叔之問其詩賦銘誄所作猶多碑中寺碑夫玉律追天故躔次之期不變緹室候景則發歛之氣㒺踰是以忘言種覺絶累於後心寄像聲形啟機於前教兼真假之雙燭均空有而兩忘藴三明而過十地圓萬行而包四等道周百億化起大千奨𨗳羣有滋濡萬類是用發廣大心吐㣲妙理将同商主取喻醫王開方便門示真實相固以濯之慈水銷以慧刀永言六趣用均一子中寺者晉太元五年㑹稽王司馬道子之所立也斜出旗亭事非湫隘傍超璧水望異狹斜天監十五年上坐僧慈等更揆日禘架赫然霞立信以填金可埒引繩斯擬寫妙金樓模麗瓊閣岧嶤偃蹇故三休而可至􅌄窱周流方中宿而斯盡萬楹百拱合㳫相持繡棁玉題分光争映燭龍夭矯将舉復還威鳯鏗鏘如鳴更戢旁攀鏤檻斜豋鈿砌煜爚金鋪玲瓏綺欂無風自響不沸而净耽耽肅肅信息心之勝地穆穆愔愔固忘想之嘉所銘曰𤣥黄雖弭權輿未測生㓕相輪成壊不極篋虵争赴藤䑕無息情塵莫捨心火方赫是用三明實開五力湛寂無方示現多所踟蹰吉樹殷勤禪渚斯道誰匡蒸哉我王施踰寳鉢供等檀牀蕭宫改構梵宇方壮階飛瑞采地起泥香日流閃爍風度清鏘道踰厥極固與天長栖𤣥寺雲法師碑𣺌𣺌大家茫茫真樸多淪愛有莫辯塵測猗歟息心言髙理邈居之匪絢得之靡學刻情幾種厲想𤣥覺且説且定以披以握來遵北渚至依西岳西岳峩峩北渚廻波庭棲弱羽簷挂輕蘿甘麤衣惡棄厚安薄㓕意囂湫寄心寥廓墓誌銘豫州墓誌銘自姬發系因魏傳緒留路在趙名賢世襲相秦将漢英雄係踵忘寵辱無愠喜靡矜夸慎嗜欲其行軍用武動合竒正乃治邊御衆威裕兼行常懍懍然以中原為巳任或欲十萬而横行乍思五千而深入尅反舊京飲馬函渭然後髙卧閒帷晤言空谷思魯連之辭賞慕田疇之髙蹈而火傳川逝長途巳迫雖景鐘良史有功必書刻板鏤石宜兼不朽銘曰髙勲藹藹長旌髙斾入作爪牙出司襟帯民謡不息王言有㑹功為上等政稱九最日隆寵秩方豋逺大義轡難留濛水易收祕丘𤣥户杳杳悠悠傳太常敬子任府君傳耻一物之不知惜寸隂之徒靡下帷閉户投斧懸梁雖𤣥晏書滛文勝經溢康成之忽忘所徃公叔之顛墜硎岸無以異也若夫天才卓爾動稱絶妙辭賦極其精深筆記尤盡典實若聞金石似注河海少孺速而未工長卿工而未速孟堅辭不逮理平子意不及文孔璋傷於健仲宣病於弱其有集論借書窮文質之敏駐馬停信極亹亹之功莫尚於斯焉君職等曹張聲髙左陸時乃髙闢雪宫廣開雲殿秋忩春户冬燠夏清九醖斯浮百羞並薦雲銷月朗聿兹遊客朋來旅見辭人才子辯圃學林莫不含毫咀思争髙競敏乃整袂端襟翰飛紙落豪人貴仕先逹後進莫不心服貎慚神氣将殫顧余不敏厠夫君子之末可稱㝠契是為神交二三君子唯以從游日暮亭號昭仁庶子雲咫尺康成斯在借此嘉言将無絶乎千載誄從子永寧令誄余之從子謙字㓜光以昭陽紀嵗蕤賔旅月啟足閩喁瞑目泉岫是殱才子實䘮俊民若其孝親睦友故非天墮地出異才絶學如有鬼告神授玉懐瑕而可指桂含蠧其取傷孰與九徳彰於造次百行動為表徴一作綴吐論含毫宣赴鍾琯標心用巳懸符矩彠惠響棲道清心可鏡和而靡屈簡而周爽䆳若凝雲潔如止水無慙座右不愧屋漏蒼苔繞路素塵滿席蕭索庭户靡事鮮明沉淪典籍将絶弔賀室如夏甫状等安期所有清塵唯不能忘懐藝而巳斯美宜乆宜長而驥騄之步中徂鸞鷟之翅未矯一歸寥廓長反虚無雖東隅再瞑鉗丙之御無及北顧相望𨽻首之數不盡而怛化非常人所不免况風雲萬里間此山川客思故鄉次房之念何極輕棺反蜀允南之思可知而魂兮𣺌𣺌扁舟靡靡生人之望已㝠死歸之期又阻痛心傷目豈伊一事無以少寄辛傷故復誄之云爾昭昭洪胄映策光書違嬴避項從衛遷徐基忠踐孝抱約懐虚有顯而黙匪屈伊舒如兹邴魏譬彼董踈入豋髙闕出啟精廬瞻星畫野望閫推車履仁不匱蹈道有餘九世盛矣七葉光諸徃弼睿主來傅英儲峨峨三祖羅室並居前瞻紫闕傍望白渠髙軒霞被四馬龍攎温温司武皎皎秘書義髙松竹價重璠璵元昆世父重規疊矩容與學丘徘徊詞府青紫巳拾大夫斯取盛藩徃相名畿來撫暉光不巳驚生之子謖謖萬尋昻昻千里實鳯匪雜真龍非似均情蘧寗得意荘李室有虚白門無囂滓遺心沮勸忘懐愠喜貧靡斯攝富其無耻險而不峭方而能理徳有潤身學斯為巳逸羽難集孤峰易峙南邁瑶琨西踰杞梓人亦有言名為實使譽傾邦國價鶱州里崇蘭自芳珏玉自光汪汪巨壑曖曖重牆靡造靡請不迎不将乆而愈敬狎而愈荘即無矯資此有循常黙非蓄短顯弗用長豈伊墜岸如彼懸梁唯學巳聚待問則强偏在三篋兼下五行亦税其巾于彼王吏如龍宫楚有斯内侍藴此上才安兹下位儲扉始闢傳府初開爾其戻止辟彼昔才從斯簡帝仍此追陪何以闕自兹翰飛傍佐戎列來攝儒衣儒衣濟濟訪對斯歸是義㒺惑唯禮無違悠悠越嶂泱泱閩海薄言銅墨蒲宻斯在孰云識吏政均舊宰循猛是兼絃韋無怠補袍方服治情莫改增貲匪課歸民自倍十郡為則百城斯採化日未逢政稱異等斯痛斯傷䘮善殱良妖同武擔疾甚清漳闔棺陋邑掩櫬蕪鄉嗚呼哀哉𦕈𦕈輕艫悠悠長塗風生閶闔日去昆吾空歸故國寧識舊都水鳴秋鶴岸集寒烏寒不夜哭惟獨呱呱茫茫大塊杳杳𤣥墟嗚呼哀哉伊吾與爾大别唯名肥泉猶接𤓰瓞未輕義雖子道思實友生歡憂共日險泰均情如菊有芬如蘭有薫别唯慕類居實呼羣盡日持論遥夜披文漸漬羲老祖述淵雲唯昏及旦自旭徂曛人道實難譬彼徂湍驅車崤嶝執手河干三川縈薄七嶺悠漫自兹不見心譬廻瀾嵗佇㑹面日望音翰歡無一緒悲有萬端濛隂遽戢扶景易殘即斯大暮為此一棺山足難曉壟首易寒秋蟲相呌暮羽來摶宿草行沒宰樹方攢昭塗長巳大夜斯安孰知㝠黙徒此汎瀾嗚呼哀哉祭文祭禹廟文惟帝禀圖上昊貽則下民五聲窮聽四乗兼徃輕璧惜景既捨冠履愛人忘我不顧胼胝下車以泣事深罪已慿舟靡懼義存拯物盛業方來遺神如在愛被昆蟲理有好生之徳事安菲素固無厚味之求是用黍稷非馨蘋蘩以薦克誠斯享慿心可答佛事文禮佛唱導發願文夫至覺𤣥湛本絶聲言妙慮虚通固略筌象雖事絶百非而有來斯應理亡四句故無感不燭皇上道照機前思超繫表凝神汾水則心謝寰中屈道軒丘則形勞宇内斯乃法忍降迹示現閻浮之境大權住地俯應娑婆之域故欲洗㧞萬有度脱羣生濯浄水於寳池䕃髙枝於道樹折伏攝受之仁遇縁而咸拯苦言軟語之徳有感而斯唱日用不知利益莫限衆等相與增到奉逮至尊五體歸敬禮云云仰願皇帝陛下至道與四時並運𤣥風與八埏共廣反淳源於三古捨澆波於九代至治已覩於今日大道復屬於此時虎豹蹈而不驚虺蛇蹍而莫噬埋金坻玉毁契焚文嘉禾生醴泉出金車玉馬自相暉曜𤣥鶴丹鳯飛鳴來徃光景之所照燭舟車之所驅汎若不屈膝係頸廻首革音入侍藁街迎拜渭水與天地而長乆等金石而逾固中岳可轉長河有清而我聖皇愈温愈晬不言而化行無為而教肅夫道備監撫望表元良察逺知㣲貫宗勾極不勞斧藻無待審諭况復静悟空有同觀貞俗能行能説既信既持衆等齊誠奉逮儲君殿下歸命敬禮云云仰願皇太子殿下厚徳體於蒼莾廣載侔於磻礴前星照曜東離煥炳淑聞自逺和氣熏天異才争入端人並至玉體怡清金聲妙越夫茂實英聲道周徳廣秉珪襲衮之貴坐槐憇棠之尊猶應共惜東暾俱吝西山弇悟蕉蘆之非實知鏡月之虚衒信秉電之不留鑒畫水之隨合惟宜照之智炬灌以寳瀾增此睿根成斯妙植又各增到奉逮太尉等諸王殿下歸命敬禮云云仰願諸王既明且哲聲跨於河楚令聞令望道均於旦奭徳貫右戚義藹周親作鉉則與二曜相終臨岳則與四維等固若彭涓之遐永譬松筠之貞悦夫天枝峻宻帝葉英芬莫不玉震蘭揺金鏘桂縟覩寸文而驗錦觀一毛而測鳯並能才髙銅爵詞富雲臺彬彬亹亹超超灼灼以斯勝善奉逮諸王殿下歸命敬禮云云仰願諸王殿下穆穆與清風並扇英英将白雲共朗永鍾清祉長享元吉出牧則聲髙民上入朝則譽光物右徳重山王智超海藏鏗鏘麗於珠樹皎鏡光於玉田夫道流雲幄徳感椒闈必以前藉勝因宿禀嘉數况重霑法雨更披慧日雖異姜后解珥請罪於周王不待樊姬捨肉有激於荆后而遵恭儉去嗜欲拚彫璣撤靡麗了心不滯正見無疑衆等齊誠奉為六宫眷屬歸命敬禮云云願六宫眷屬業華姬日聲麗媯辰震彩鐫圖傳芳詩史位齊寳印行等月光具六神通得四無礙夫稟閒明之徳懐深妙之心豈非脩習有本故能依止無倦義興等諸公主忘斯華重甘此翹到並宿世之所記别故現前所以信了影響至真寤寐𤣥極人各增到仰為諸公主歸命敬禮云云願諸公主日增智性彌長慧根四攝四依已遵巳蹈七善七定靡退靡輟盛此王姬光兹帝女長享湯沐與河山而同固永服緹綺貫寒暑而無窮夫三相雷奔八苦電激或方火宅乍擬駛河故以尺波寸景大力所不能駐月御日車雄才莫之能遏其間飲苦餐毒抱痛衘悲身口為十使所由意思乃八疵之主衆等相與彼我齊到懴悔業纒無始巳來至於今日所為十惡自作教他見善不讚聞惡隨善焚林涸澤走犬揚鷹窮鄭衛之響極甘㫖之味戲笑為惡倐忽成非侮慢形像陵踐塔寺不敬方等毁離和合自定權衡棄他斗斛愧心負理昧主欺親雖七尺非他方寸在我而能性其情在人未易恣此心口衆罪所集各運丹懇五體自投歸命敬禮云云願現前衆等身口清浄行願具足消三障業朗三逹智五眼六通得意自在懴悔禮佛文夫有非自有有取所以有無非自無無著所以無故有取之惑興倐成萬累無著之念起一超九刼是知道之所貴空有兼忘行之所重真假雙照禀氣含靈莫聞斯本肖形賦影靡測由來故發兹識窟猶綿䝉其莫辨導此愚相尚窈㝠而未悟茫茫有同暗海幽幽實在危城業風縈薄三有長騖惑水邅廻二死相屬以苦捨苦從暗入暗尋本不離色心即事莫非生㓕是用抱此纒葢輪廻生死恣其六愛興其八邪或徂詐而克昌乍仁義而溘死或才均智等此賤彼豪或共日並時人升我墜唯言報施寂寥不知因對皎徹曩縁今果過現殖成有如符契不謬毫髪而欲以促生運其長術浮命廻其㝠數當知刹那交謝瞬息不留東榑纔吐西崦巳仄譬閲川之駛流若栖葉之輕露偽城易弛毒樹自攻若非假實兩明真俗俱辨豈能寫誠廻向刻意脩習不退不沒愈堅愈固南平大王殿下含辰象之正氣畜海嶽之淳靈宿侍八恒早遊七覺藉妙因於永刼招勝果於兹地若真金之愈鎣美玉之載琢是用未積已散不藏而捨故今式招靈指仰屈神儀建此齊肅譬兹闗楗盛來緇素濟濟洋洋名香遍室寳華覆地髙梵宛轉寧止震木遏雲清桴遥奕非直騰魚御馬仰願四部至誠五體歸命東方云云願大王殿下五畏内遣十力外扶百福荘嚴萬祉周集愕夢無忤其慮甘寝有恬其神更闢寳衢愈興慧業夫𤣥極凝淡非學者所窺妙本難思豈恒人能測是以十地云覩有羅縠之疑三乗見稱懐狂羊之惑自非鑒窮機覺照極㝠虚窮理盡性體元含一安能濟世仁壽拯物阽危道包碧海聲髙赤縣昔堯曜唯在即世舜黒不兼來果四廵疲於禹迹六事倦於湯身並域中之勤勞方内之成益豈有度元元於苦海㧞冗冗於畏途運神刀震法吼究香城之妙理窮金河之奥説慧髙龍樹智出馬鳴必欲洗濯臣民奨導緇白天覆地養水産陸生咸降慈悲悉䝉平等奉為皇帝陛下儲君太子歸命敬禮云云仰願皇帝陛下景祚與七政相齊皇基與二曜均永地平天成樂和禮洽玉燭道正氛氤無爽條風祥雨膏潤相屬却馬偃伯鑄㦸銷戈南泊北臨西被東漸灑甘雨布慧雲唯繩可結在冠巳盡唐哉皇哉為導為首又願皇太子殿下睿業清暉與貞明而並燭粹範温儀從嵩霍而俱峻聲出姬誦道越漢荘永沐智水長照慧日上妙居身至仁在巳自雙樹八枝潛光匿曜寳城不闢慧扇方掩而聖后騖法輪於長路棹寳舟於遥壑道浹人祇福隆祧墠肅事園寢䖍奉宗祏藉斯妙果奉逮七廟聖靈歸命敬禮云云仰願重明累聖僾然如在騰神浄國總駕天宫託化金蕖遨遊寳殿夫誠心内惻則至覺如在形力外殫則法身咫步衆等相與增到為諸王兄弟妃主戚屬歸命敬禮云云願諸王殿下裂壤盛於諸姬磐石過於隆漢徳髙魯衛義重間平論道則百辟依風作翰則羣黎仰化𢎞闡至教紹隆季像第内少長並膺此多福若百華之春麗譬萬寳之秋成信解堅深翹向無怠夫小乗志劣事唯一巳大士意均乃包六趣今日檀主信等明珠無勞傍鏡質同挺玉不待外光常欲物我均心怨親等觀衆等各歸誠為二十八天四王釋梵人間貧病地獄辛楚敬禮尊儀靈像菩提寳塔云云大乗奥藏妙法深經大身無邊身大力無量力四向四果八賢八聖願六氣氛氤四序熈穆至治光萬宇𤣥化洞九幽襲介披鱗濕生卵化八苦六窮三塗五道俱䝉惠利並識遵依刀林輟刃劍樹揺險迷域開道直指四衢闇室生明大啟三曜俱向道塲同豋種覺初夜文夫逺自無始至於有身生死輪騖塵轢莫之比明暗遞來薪火不能譬逝水非駛千月難保蓼蟲習苦桂蠧喜甘大睡劇於據梧長昏甚於枕麯義非他召事實巳招曾不知禀此形骸所由而至将斯心識竟欲何歸唯以勢位相髙争驕華於一旦車徒自盛競馳騖於當年莫不恃其雄心壮齒紅顔緇髪口恣肥醲身安輕靡繁絃促柱極滔湮而不厭玉牀象席窮靡曼而無已謂悲泉若木出沒曾不闗人蹲鳥顧兎升落常自在彼殊不知命均脆草身為苦噐何異犬羊之趣屠肆麋鹿之入膳厨秋蛾拂燄而不疑春蠶縈絲而靡悟未辨先對不識因習及其一觸畏途孟門非險轘裂肢解方斯不臻其痛斷趾鑿肩比兹未極其苦輪廻起伏杳杳悠悠是以天中之天降悲提引壅夏河之長瀉撲秋原之猛燎或同商主乍等醫王形遍三千教傳百億或恣其神力或寂諸梵境言則三塗離苦笑則四生受樂乃應病投機解紛説理制之日夜稱為八闗以八正鑰為法闗楗斯實出世之妙津在家之雄行衆等相與運誠奉逮南平王殿下歸命敬禮云云仰願大王殿下睿業清暉與南嶽而相固貞心峻節等東溟而共廣萬累烟消百災霧㓕巧幻所不惑彊魔莫能嬈逐惨舒而適體隨暄凉而得性自禀儀天之氣永固膳衛之道得六神通力具四無礙智夫日在昆吾則慮繁事擾景落濛氾則神静志怡璧月珠星含華相照輕雲薄霧朗然自戢鳴鐘浮響光燈吐輝法幢巻舒拂髙軒而徐薄名香郁馥出重檐而輕轉金表含映珠柱洞色况復天尊端嶷威光四照煥發青蓮容與珂雪覺祇衛之咫尺若林園之斯在大招離垢之賔廣集應真之侣清梵含吐一唱三嘆宻義抑揚連環不輟南平王體得機之敏資入神之㣲抱徳含和經仁緯義善無細而不窮累有輕而必捨受同虚籥照如懸鏡忘魯衛之尊髙略柎蕚之華重建希有之勝席臨難遇之法場相與五體歸命敬禮云云仰願大王殿下入不二門豋一相道徳階不動智超逺行洋溢惠聲與八風而共逺優游玉體等六律而相調餐雪山之良藥挹露城之甘味衮服瓛珪與四時而永乆朱輪緹幟貫千祀而常然樂府朱鷺因風弄玉水映日上金堤猶持畏羅繳未得異鳬鷖聞君愛白雉兼因重碧雞未能聲似鳯聊變色如珪願識昆明路乗流飲復棲鼓瑟曲有所思夜風吹熠燿朝光照昔耶昔耶瓦松也一作辟邪幾銷䕷蕪葉空落蒲桃一作萄花不堪長織素誰能獨浣沙光隂復何極望促反成賒知君自蕩子奈妾亦倡家白馬篇千里生冀北玉鞘黄金勒散蹄去無巳揺頭意相得豪氣發西山雄風擅東國飛鞚出秦隴長驅繞岷棘承謨若有神禀筭良不惑瀄汨河水黄參差嶂雲黒安能對兒女垂帷弄毫墨兼弱不稱雄後得方為特此心亦何巳君恩良未塞不許誇天山何由報皇徳古意青絲控燕馬紫艾飾呉刀朝風吹錦帯落日映珠袍陸離闗右客照耀山西豪雖非學詭遇終是任逢遭人生㑹有死得處如鴻毛寧能偶雞騖寂寞隱蓬蒿豋髙臺試出金華殿聊豋銅雀臺九路平如掌一作砥千門洞已開軒車映日過簫管逐風來若非邯鄲美便是洛陽才湘夫人桂棟承薜帷𦕈𦕈川之湄白蘋徒可望緑芷竟空滋日暮思公子銜意嘿無辭詩侍宴麗景屬春餘清隂澄夏首交枝隱脩逕廻流影遥阜徙帷轢輕筠移鑾拂髙栁去矣勞茂績勉哉報嘉誘小臣良不才涓塵愧所守何用勝雕斵譬木良如朽又廻輿避暑宫下輦迎風館散漫輕烟轉霏㣲商雲散蔓草亘巖垂髙枝起天半回風稍驚水落光漸斜岸妙儛駐行雲清歌入層漢晬顔暢有懌徳音良已粲落日豋髙慿髙且一望目極不能捨東北指青門西南見白社軫軫河梁上紛紛渭橋下争利亦争名驅車復驅馬寧訪蓬蒿人誰憐寂寞者中川長望長川杳難即四望四無極安流寧可值憤風方未息危帆渡中懸孤光巖下昃岸際樹難辨雲中鳥易識莫恨東復西誰知迂且直故鄉相思者當春愛顔色獨寫千行涙誰同萬里憶贈顧倉曹洛陽十二門樓闕似西崑曖曖罘罳下相望隔畫垣畫垣向阿閣棲鳯復棲鴛五曹均趨奏六尚等便煩朝爐何馥馥夜錦有餘温日中驅上駟驤首遍京宛晨趨魏公子夕宿韓王孫夙昔今何在生平棄不論譬如菤葹草心謝葉空存誰復三乗睫獨念九飛魂秋日愁居答孔主簿首秋雲物善晝暑旦猶清日華隨水汎樹影逐風輕依簾野馬合當户昔耶生物我一無際人鳥不相驚儻過北山北聊訪法髙卿至牛渚憶魏少英楓林曖似畫沙岸浄如掃空籠望懸石回斜見危島緑草閑遊蜂青葭集輕鴇徘徊洞初月浸滛潰春潦非願嵗物華徒用風光好寄何記室思君不得見望望獨長嗟夜風入寒水晩露拂秋花何由假日御暫得寄風車忽不任愁聊示固逺去秋客舊呉今春投故越涙逐東歸水心挂西斜月未應嵗貶顔直以憂殘髪為何庫部舊姬擬蘼蕪之句出户望蘭薫褰簾正逄君歛容裁一訪新知詎可聞新人含笑近故人含涙隱妾意在寒松君心逐朝槿何生姬人有怨寒樹棲羈雌月映風復吹逐臣與棄妾零落心可知寳琴徒七絃蘭燈空百枝顰容不足效啼妝拭復垂同衾成楚越異國非仳離為人傷近而不見嬴女鳯凰樓漢姬栢梁殿詎勝仙将死音容猶可見我有一心人同鄉不異縣異縣不成隔同鄉更胍胍胍胍如牛女何由得一語月夜詠陳南康新有所納二八人如花三五月如鏡開簾一種色當户兩相映重價出秦韓髙名入燕鄭十城屢請易千金幾争聘君意自能專妾心本無競詠擣衣足傷金管遽多愴緹光促露團池上紫風飄庭裏緑下機騖西眺鳴砧遽東旭芳汗似蘭湯雕金辟龍燭散度廣陵音􅋵冩漁陽曲别鶴悲不已離鸞斷還續尺素在魚腸寸心慿鴈足與司馬治書同聞隣婦夜織洞房風巳激長廊月復清藹藹夜庭廣飄飄曉帳輕雜聞百蟲思偏傷一鳥聲鳥聲長不息妾心復何極猶恐君無衣夜夜當忩織為人述夢工知想成夢未信夢如此皎皎無片非的的一皆是以親芙蓉褥方開合歡被雅步極嬌妍含辭恣委靡如言非倐忽不意成俄爾及寤盡空無方知悉虚詭侍宴景陽樓金鋪爍可鏡桂棟儼臨雲沾觴均飲徳服道驗朝聞詎論禹無間非恥堯為君小臣亦何者短翮屢追羣春日寄鄉友旅心巳多恨春至尚離羣翠枝結斜影緑水散圓文戲魚兩相顧遊鳥半藏雲何時不憫黙是日最思君夜愁示諸賔簷露滴為珠池水合成璧萬行朝涙瀉千里夜愁積孤帳閉不開寒膏盡復益誰知心眼亂看朱忽成碧送殷何兩記室掩袖出南浦驅車送上征飄飄曉雲駛瀁瀁旦潮平不肖余何惜無貲爾勿輕倘有還書便一言訪死生春閨怨愁來不理鬢春至更攢眉悲看蛺蝶粉泣望蜘蛛絲月映寒蛩褥風吹翡翠帷飛鱗難託意駛翼不銜辭秋閨怨斜光隱西璧暮雀上南枝風來秋扇屏月出夜燈吹深心起百際遥涙非一垂徒勞妾辛苦終言君不知詠寵姬及君髙堂還值妾妍妝罷曲房褰錦帳廻廊步珠屣玉釵時可挂羅襦詎難解再顧連城易一笑千金買在王晉安酒席數韻窈窕宋華容但歌有清曲轉盼非無以斜眉幸相矚詎減許飛瓊多玉臺作絶勝劉碧玉何因送欵欵半飲杯中醁為人寵姬有怨可憐獨立樹枝輕根易揺已為露所挹復為風所飄錦衾襞不開端坐夜及朝是妾愁成瘦非君重細腰為姬人自傷自知心裏恨還向影中羞廻持昔慊慊變作今悠悠還君與妾扇一作釵歸妾奉君裘斷弦猶可續心去最難留為人有贈碧玉與緑珠張盧復雙女曼聲古難匹長袂世無侣似出鳯凰樓言發瀟湘渚幸有褰裳便含情寄一語見貴者初迎盛姫聊為之詠乆想專房麗未見傾城者千金訪繁華一朝遇容冶家本薊門外來戲叢臺下長卿幸未匹文君復新寡傷乞人少年空扶轍白首竟填溝葦蓆何由足菽藿不能周自顧非好乞行且欲包羞勞君欵曲問冒此殷勤酬春思絶句雪罷枝即青氷開水便緑復聞黄鳥聲全作相思曲為徐僕射妓作日晩應歸去上客强盤桓稍知玉釵重漸見羅襦寒漢魏六朝百三家集巻九十二
