body:
  text: 漢魏六朝百三家集卷十八漢蔡雍集題詞董卓狼戾賊臣折節名士陳留蔡中郎時已六十許人令稱疾堅臥偃蹇遇害不猶愈昔日死洛陽獄乎勉强受官侍中封侯噫嘆之下身名並隕雖王司徒輕戮善人識者知其不長然周厯三臺鼓琴贊事杜欽谷永之誚終不能為中郎解也余揣其徙朔方遁江海囚形毁貌不覩天日幾十五年驟登大官隆遇殆非不欲奮其拳拳之忠補益國家當日公卿滿朝栖遲危亂金章赤芾豈獨中郎但識不鑒於比匪謀不出於討賊噤口牢獄愛莫能助伯喈曠世逸才余獨傷其讀春秋未盡善耳漢史未成願就黥刖子長豈出孟堅下哉若家門清白三世同居却五侯之招陳六事之本憂心虹霓抵觸禁近抱子政之悃愊蹈京房之禍患又班生所望景先逝矣目録賦述行賦有序漢津賦協和婚賦撿逸賦協初賦青衣賦短人賦有序瞽師賦又筆賦琴賦又又彈棊賦又團扇賦胡栗賦蟬賦疏陳政要七事疏幽冀刺史久闕疏上漢書十志疏為陳留縣上孝子狀表上始加元服與羣臣上壽表薦皇甫規表薦太尉董卓表讓髙陽侯印綬符䇿表再讓髙陽侯印綬符䇿表讓尚書乞在閒冗表巴郡太守謝表尚書詰狀自陳表表賀録換誤上章謝罪辭金龜紫紱表闕書與何進薦邊讓書徙翔方報楊復書徙朔方報羊月書辭郡辟讓申屠蟠書與袁公書又與人書又與人書論明堂月令論正交論銘論桓彬論議諫伐鮮卑議厯數議宗廟迭毁議答齊議和熹鄧后諡議朱公叔諡議對問答詔問災異八事封事設論釋誨月令問答連珠廣連珠頌東巡頌有序南巡頌胡廣黃瓊頌京兆樊惠渠頌陳留太守行小黃縣頌考城縣頌祖德頌有序麟頌五靈頌贊太尉陳公贊焦君贊琴贊漢魏六朝百三家集卷十八目録欽定四庫全書漢魏六朝百三家集卷十八明張溥輯漢蔡雍集賦述行賦冇序延熹二年秋霖雨逾月是時梁冀新誅而徐璜左悺五侯擅貴於其處又起顯明苑於城西人徒凍餓不得其命者甚衆白馬令李雲以直言死鴻臚陳君以救雲抵罪璜以余能鼓琴自朝廷敕陳留郡守遣余到偃師病不前得歸心憤此事遂託所過述而成賦余有行於京洛兮遘淫雨之經時塗迍邅其蹇連兮潦汙滯而為災馬桀蹈而不進兮心鬱悒而憤思聊𢎞慮以存古兮宣幽情而屬詞久余宿於大梁兮誚無忌之稱神哀晉鄙之無辜兮忿朱亥之篡軍歷中牟之舊城兮憎佛肹之不臣問寧越之裔胄兮藐髣佛而無聞經圃田而瞰北境兮晤衛康之封疆迄管邑而增感歎兮愠叔氏之啓商過漢祖之所隘兮弔紀信於滎陽降虎牢之曲隂兮路丘墟以盤縈勤諸侯之逺戍兮侈申子之美城稔濤塗之復惡兮陷夫人以大名登長坂以凌髙兮陟葱山之嶤崤建撫體而立洪髙兮經萬世而不傾回峭峻以降阻兮小阜寥其異形岡岑紆以連屬兮溪谷敻其杳冥迫嵯峨以乖邪兮廓巖壑以峥嶸攢棫朴而雜榛楛兮被浣濯而羅布􅚂菼薁與臺莔兮緣層崖而結莖行遊目以南望兮覽太室之威靈顧大河於北垠兮瞰洛汭之始并追劉定之攸儀兮美伯禹之所營悼太康之失位兮愍五子之歌聲尋修軌以增舉兮邈悠悠之末央山風泊以飈涌兮氣懆懆而厲凉雲鬱術而四塞兮雨濛濛而漸唐僕夫疲而劬瘁兮我馬虺頽以𤣥黃格莽丘而稅駕兮隂曀曀而不陽哀衰周之多故兮眺瀕隈而增感忿子帶之淫逆兮唁襄王於壇坎悲寵嬖之為梗兮心惻愴而懷懆乘舫舟而泝湍流兮浮清波以橫厲想宓妃之靈光兮神幽隱以濳翳實熊耳之泉液兮總伊瀍與澗瀨通渠源於京城兮引職貢乎荒裔操吳榜其萬艘兮充王府而納最濟西溪而容與兮息鞏都而後逝愍簡公之失師兮疾子朝之為害𤣥雲黯以凝結兮集零雨之溱溱路阻敗而無軌兮塗濘溺而難遵率陵阿以登降兮赴偃師而釋勤壯田橫之奉首兮義二士之夾墳佇淹留以候霽兮感憂心之殷殷并日夜而遙思兮宵不寐以極晨候風雲之體勢兮天牢湍而無文彌信宿而後闋兮思逶迤以東運見陽光之皓皓兮懷少弭而有欣命僕夫其就駕兮吾將往乎京邑皇家赫而天居兮萬方徂而並集貴寵扇以彌熾兮僉守利而不戢前車覆而未逺兮後乘驅而競入窮變巧於臺榭兮民露處而寢濕清嘉榖於禽獸兮下糠粃而無粒𢎞寬裕於便辟兮紏忠諫其駸急懷伊呂而黜逐兮道無因而獲入唐虞眇其既逺兮常俗生於積習周道鞠為茂草兮哀正路之日淴觀風化之得失兮猶紛拿其多違無亮采以匡世兮亦何為乎此畿甘衡門以寧神兮詠都人而思歸爰結蹤而回軌兮復邦族以自綏亂曰跋涉遐路艱以阻兮終其永懷窘隂雨兮歷觀羣都尋前緒兮考之舊聞厥事舉兮登髙斯賦義有取兮則善戒惡豈云茍兮翩翩獨征無儔與兮言旋言復我心胥兮漢津賦夫何大川之浩浩兮洪流渺以𤣥清配名位乎天漢披厚土而載形登源自乎嶓冢引漾澧而東征納陽谷之所吐兮兼漢沔之殊名總畎澮之羣液兮演西土之隂精過曼山以左回兮旋襄陽而南縈切大别之東山兮與江湘乎通靈嘉清源之體勢兮淡澶湲以安流鱗甲育其萬類兮蛟龍集以嬉遊明珠胎於靈蚌兮夜光濳乎𤣥洲雜神寶其充盈兮豈魚龜之足收於是遊目騁觀南援三州北集京都上控隴坻下接江湖導財運貨懋遷有無既乃風飈蕭瑟勃焉並興陽侯沛以奔騖洪濤涌而沸騰願乘流以上下窮滄浪乎三澨觀朝宗之形兆瞰洞庭之交㑹協和婚賦惟情性之至好歡莫偉乎夫婦受精靈之造化固神明之所使事深微以𤣥妙實人倫之肇始考邃初之原本覽隂陽之綱紀乾坤和其剛柔艮兊感其脢腓葛覃恐其失時摽梅求其庶士唯休和之盛代男女得乎年齒婚姻協而莫違播欣欣之繁祉良辰既至婚禮已舉二族崇飾威儀有序嘉賓僚黨祁祁雲聚車服照路驂騑如舞既臻門屏結軌下車阿傅御竪鴈行蹉跎麗女盛飾曄如春華檢逸賦夫何姝妖之媛女顔煒燁而含榮普天壤其無儷曠千載而特生余心恱於淑麗愛獨結而未并情罔寫而無主意徙倚而左傾晝騁情以舒愛夜託夢以交靈協初賦其在近也若神龍采鱗翼將舉其既逺也若披雲緣漢見織女立若碧山亭亭竪動若翡翠奮其羽衆色燎照視之無主面若明月輝似朝日色若蓮葩肌如凝蜜青衣賦金生砂礫珠出蚌泥歎兹窈窕産於卑微盼倩淑麗皓齒蛾眉𤣥髮光潤領如螬蠐縱橫接髮葉如低葵修長冉冉碩人其頎綺䄂丹裳躡蹈絲扉盤跚􅀈蹀坐起低昻和暢善笑動揚朱唇都冶嫵媚卓躒多姿精慧小心趨事如飛中饋裁割莫能雙追關雎之潔不蹈邪非察其所履世之鮮希宜作夫人為衆女師伊何爾命在此賤微代無樊姬楚莊晉妃感昔鄭季平陽是私故因錫國歷爾邦畿雖得嬿娩舒寫情懷寒雪繽紛充庭盈階兼裳纍鎮展轉倒頽曶昕將曙雞鳴相催飭駕趣嚴將舍爾乖矇冒矇冒思不可排停停溝側噭噭青衣我思逺逝爾思來追明月昭昭當我户扉條風狎獵吹豫牀帷河上逍遙徙倚庭階南瞻井柳仰察斗機非彼牛女隔於河維思爾念爾惄焉且饑短人賦有序侏儒短人僬僥之後出自外域戎狄别種去俗歸義慕化企踵遂在中國形貌有部名之侏儒生則象父唯有晏子在齊辨勇匡景拒崔加刃不恐其餘尫么劣厥僂窶㗲嘖怒語與人相拒矇昧嗜酒喜索罰舉醉則揚聲罵詈恣口衆人患忌難與並侣是以陳賦引譬比偶皆得形象誠如所語其詞曰雄荆雞兮鶩鸊鵜鶻鳩雛分鶉鷃雌冠戴勝兮啄木兒觀短人兮形若斯熱地蝗兮蘆蝍且繭中蛹兮蠶蠕蠕視短人兮形若斯木門閫兮梁上柱敝鑿頭兮斷柯斧鞞􅀈鼓兮補履朴脫椎枘兮搗薤杵視短人兮形如許瞽師賦夫何矇昧之瞽兮心窮忽以鬱伊目冥冥而無睹兮嗟求煩以愁悲撫長笛以攄憤兮氣轟鍠而橫飛又何此聲之悲痛愴然淚以隱惻類離鵾之孤鳴起婺婦之哀泣詠新詩之悲歌舒滯積而宣鬱筆賦惟其翰之所生於季冬之狡兔性精亟以慓悍體遄迅以騁步削文竹以為管加漆絲之纒束形調摶以直端染𤣥墨以定色畫乾坤之隂陽讚宓皇之洪勳叙五帝之休德揚蕩蕩之典文紀三王之功伐兮表八百之肆覲傳六經而綴百氏兮建皇極而序彛倫綜人事於暗昧兮贊幽冥于明神象類多喻靡施不協上剛下柔乾坤位也新故代謝四時次也圎和正直規矩極也𤣥首黃管天地色也琴賦爾乃言求茂木周流四埀觀彼椅桐層山之陂丹華煒煒緑葉參差甘露潤其末凉風扇其枝鸞鳯翔其顚𤣥鶴巢其岐考之詩人琴瑟是宜爰制雅器協之鐘律通理治性恬淡清溢爾乃清聲發兮五音舉韻宫商兮動角羽曲引興兮繁絃撫然後哀聲既發祕㺯乃開左手抑揚右手徘徊指掌反覆抑案藏摧於是繁絃既抑雅韻乃揚仲尼思歸鹿鳴三章梁甫悲吟周公越裳青雀西飛别鶴東翔飲馬長城楚曲明光楚姬遺歎雞鳴高桑走獸率舞飛鳥下翔感激絃歌一低一昻又間關九絃出入律呂屈伸低昻十指如雨又於是歌人恍惚以失曲舞者亂節而忘形哀人塞耳以惆悵轅馬蹀足以悲鳴彈棊賦榮華灼爍蕚不韡韡於是列象雕華逞麗豐腹斂邊中隱四企輕利調博易使馳騁然後我製兵綦夸驚㦯風飄波動若飛若浮不遲不疾如行如留放一弊六功無與儔又夫張局陳棋取法武備因嬉戲以肄業託歡娛以講事設兹矢石其夷如破采若錦繢平若停水肌理光澤滑不可屢乘色行巧據險用智團扇賦裁帛制扇陳象應矩輕徹妙好其輶如羽動角揚徴清風逐暑春夏用事秋冬濳處胡栗賦人有折蔡氏祠前栗者故作斯賦樹遐方之嘉木兮於靈宇之前庭通二門以征行兮夾階除而列生彌霜雪而不雕兮當春夏而滋榮因本心以誕節兮凝育蘖之緑英形猗猗以豔茂兮似翠玉之清明何根莖之豐美兮將蕃熾以悠長適禍賊之災人兮嗟夭折以摧傷蟬賦白露凄其夜降秋風肅以晨興聲嘶嗌以沮敗體枯燥以氷凝雖期運之固然獨濳類乎大隂要眀年之中夏復長鳴而揚音疏陳政要七事疏臣伏讀聖㫖雖周成遇風訊諸執事宣王遭旱密勿祗畏無以或加臣聞天降災異緑象而至霹靂數發殆刑誅繁多之所生也風者天之號令所以教人也夫昭事上帝則自懷多福宗廟致敬則鬼神以著國之大事實先祀典天子聖躬所當恭事臣自在宰府及備朱衣迎氣五郊而車駕稀出四時致敬屢委有司雖有解除猶為疏廢故皇天不恱顯此諸異洪範傳曰政悖德隱厥風發屋折木坤為地道易稱安貞隂氣憤盛則當靜反動法為下叛夫權不在上則雹傷物政有苛暴則虎狼食人貪利傷民則蝗蟲損稼去六月二十八日太白與月相迫兵事惡之鮮卑犯塞所從來逺今之出師未見其利上違天文下逆人事誠當博覽衆議從其安者臣不勝憤悶謹條宜所施行七事表左一事明堂月令天子以四立及季夏之節迎五帝於郊所以導致神氣祈福豐年清廟祭祀追往孝敬養老辟雍示人禮化皆帝者之大業祖宗所祗奉也而有司數以蕃國踈喪宫內産生及吏卒小汙屢生忌故竊見南郊齊戒未嘗有廢至於他祀輒興異議豈南郊卑而他祀尊哉孝元皇帝䇿書曰禮之至敬莫重於祭所以竭心親奉以致肅祗者也又元和故事復申先典前後制書推心懇惻而近者以來更任太史忘禮敬之大任禁忌之書拘信小故以虧大典禮妻妾産者齊則不入側室之門無廢祭之文也所謂宮中有卒三月不祭者謂士庶人數堵之室共處其中耳豈謂皇居之曠臣節之衆哉自今齊制宜如故典庶答風霆災妖之異二事臣聞國之將興至言數聞內知已政外見民情是故先帝雖有聖明之資而猶廣求得失又因災異援引幽隱重賢良方正敦朴有道之選危言極諫不絶於朝陛下親政以來頻年災異而未聞特舉博選之㫖誠當思省述修舊事使抱忠之臣展其狂直以解易傳政悖德隱之言三事夫求賢之道未必一塗或以德顯或以言揚頃者立朝之士曾不以忠信見賞恆被謗訕之誅遂使羣下結口莫圗正辭郎中張文前獨盡狂言聖聼納受以責三司臣子曠然衆庶解恱臣愚以為宜擢文右職以勸忠謇宣聲海內博開政路四事夫司𨽻校尉諸州刺史所以督察姦枉分别白黑者也伏見幽州刺史楊喜益州刺史龎芝涼州刺史劉䖍各有奉公疾姦之心喜等所糾其效尤多餘皆枉撓不能稱職或有抱罪懷瑕與下同疾綱網弛縱莫相舉察公府臺閣亦復默然五年制書議遣八使又令三公謠言奏事是時奉公者欣然得志邪枉者憂悸失色未詳斯議所因寢息昔劉向奏曰夫執狐疑之計者開羣枉之門飬不斷之慮者來讒邪之口今始聞善政旋復變易足令海內測度朝政宜追定八使糾舉非法更選忠清平章賞罰三公嵗盡差其殿最使吏知奉公之福營私之禍則衆災之原庶可塞矣五事臣聞古者取士必使諸侯嵗貢孝武之世郡舉孝亷又有賢良文學之選於是名臣輩出文武並興漢之得人數路而已夫書畫辭賦才之小者匡國理政未有其能陛下即位之初先涉經術聽政餘日觀省篇章聊以游意當代博奕非以為教化取士之本而諸生競利作者鼎沸其高者頗引經訓風喻之言下則連偶俗語有類俳優或竊成文虛冒名氏臣每受詔於盛化門差次録第其未及者亦復隨輩皆見拜擢既加之恩難復收改但守俸祿於義已𢎞不可復使理人及仕州郡昔孝宣㑹諸儒於石渠章帝集學士於白虎通經釋義其事優大文武之道所宜從之若乃小能小善雖有可觀孔子以為致逺則泥君子固當志其大者六事墨綬長吏職典理人皆當以惠利為績日月為勞褒責之科所宜分明而今在任無復能省及其還者多召拜議郎郎中若器用優美不宜處之冗散如有釁故自當極其刑誅豈有伏罪懼考反求遷轉更相倣效臧否無章先帝舊典未嘗有此可皆斷絶以核真僞七事伏見前一切以宣陵孝子為太子舍人臣聞孝文皇帝制喪服三十六日雖繼體之君父子至親公卿列臣受恩之重皆屈情從制不敢踰越今虛僞小人本非骨肉既無幸私之恩又無祿仕之實惻隱思慕情何緣生而羣聚山陵假名稱孝行不安心義無所依至有姦軌之人通容其中恆思皇后祖載之時東郡有盜人妻者亡在孝中本縣追捕乃伏其辜虛僞雜穢難以勝言又前至得拜後輩被遺或經年陵次以暫歸見漏或以人自代亦蒙寵榮爭訟怨恨洶洶道路太子官屬宜搜選令德豈有但取丘墓凶醜之人其為不祥莫與大焉宜遣歸田里以明詐僞幽冀刺史久闕疏臣聞國家置官以職建名臣愚淺小才竊假階級官以議為名職以郎為貴智淺謀陋無所獻替夙夜寤歎憂悸怛惕臣雍頓首死罪伏見幽州奕騎冀州强弩為天下精兵國家贍仗四方有事軍師奮攻未嘗不辦於二州也頃者以來連年饉荒穀價一斛至六七百錢故護烏桓校尉夏育出征鮮卑無功而還士馬死傷者萬數弓兵散亡幾盡生民之本守禦之備無一可恃百姓元元流離溝壑寇賊輩起莫能禁討長吏寒心朝不守夕卒有他方之急則役之不可驅使自為寇虜則誅之不可擒制豈非可憂之難三府選幽冀二州刺史踰月不定臣怪問其故云避三互十一州有禁當取二州而已二州之中少素有威名之士或拘限嵗年不應選用狐疑遲淹兩州空懸萬里蕭條無所管繫每冀州長吏初除詔書治嚴不過五日今者刺史數旬不選誠非其理愚以為三互之禁禁之薄者以陛下威靈申眀禁令在人豈不戒懼而當坐設三互自生留閡邪昔孝景時梁人韓安國坐事被刑起徒中為內史武帝患東越數反拜故待詔㑹稽朱買臣宣帝時患冀州有盜賊故京兆尹張敞有罪逃命上使使就家召為冀州刺史安國徒𨽻買臣郡民皆還治其國張敞亡命擢授劇州豈顧三互拘官簿得救時之便也卒獲其用遺芳不滅此先帝不誤已然之事三公明知二州之要尤宜揀選當越禁取能以救時弊而不顧爭臣之議茍避輕微之科竊見日月拘忌選既稽滯又未必審得其人則二部蠢蠢將為憂念願陛下上則先帝用三臣之法蠲除近禁其諸州刺史器用可换者無拘日月三互以差厥中臣慺慺瞽言惟陛下留神再省三省伏見幽冀舊壤鎧馬所出比年兵饑漸至空耗今者百姓虛縣萬里蕭條闕職經時吏人論者云避三互十一州有禁當取二州而已又二州之士或復限以嵗月狐疑遲淹以失事㑹愚以為三互之禁禁之薄者今但申以威靈明其憲令在任之人豈不戒懼而當坐設三互自生留閉邪昔韓安國起自徒中朱買臣出於幽賤並以才宜還守本邦又張敞亡命擢州授劇州豈復顧循三互繼以末制乎三公明知二之要所宜速定當越禁取能以救時敝而不顧爭臣之義茍避輕微之科選用稽滯以失其人臣願陛下上則先帝蠲除近禁其諸州刺史器用可换者無拘日月三互以差厥中上漢書十志疏朔方髠鉗徒臣雍稽首再拜上書皇帝陛下臣雍被受陛下寵異大恩初由宰府備數典城以親父故依叔父衛尉質時以尚書召拜中郎受詔詣東觀著作遂與羣儒並拜議郎沐浴恩澤承答聖問前後六年質奉機密趨走陛下遂由端右出相外藩還尹輦轂旬日之中登躡上列父子一門兼受恩寵不能輸寫心力以效絲髮之功一旦被章陷沒辜戮陛下天地之德不忍刀鋸截臣首領得就平罪父子家屬徙充邊方完全軀命喘息相隨非臣無狀所敢復望非臣罪惡所當復蒙非臣辭筆所能復陳臣初决罪洛陽詔獄生出牢戶顧念元初中故尚書郎張俊坐漏泄事當伏重刑已出轂門復聽續鞠詔書馳救一等輸作左校俊上書謝恩遂以轉徙臣為郡縣促遣迫於吏手不得頃息含辭抱􅀢無由上達既到徙所乘塞守烽職在候望憂怖焦灼無心復能操筆成草致章闕庭誠知聖朝不責臣謝但懷愚心有所不竟臣自在布衣常以為漢書十志下盡王莽而止世祖以來唯有紀傳無續志者臣所師事故太傅胡廣知臣頗識其門戶略以所有舊事與臣雖未備悉粗見首尾積纍思惟二十餘年不在其位非外吏庶人所得擅述天誘其衷得備著作郎建言十志皆當撰録遂與議郎張華等分受之其難者皆以付臣先治律厯以籌算為本天文為驗請太史田注考校連年往往頗有差舛當有增損乃可施行為無窮法道至深微不可獨議郎中劉洪密於用算故臣表上洪與共參思圗牒尋繹度數適有頭緒㑹臣被罪逐放邊野臣竊自痛一為不善使史籍所闕胡廣所校二十年之思中道廢絶不得究竟慺慺之情猶以結心不能自逹臣初欲須刑竟乃因縣道具以狀聞今年七月九日胸奴攻鹽池縣其時鮮卑連犯雲中五原一月之中𤇺火不絶不意西夷相與合謀所圗廣逺恐遂為變不知所濟郡縣咸悄悄不知所守且臣所在孤危懸命鋒鏑湮滅土灰呼吸無期誠恐所懷隨軀腐朽抱恨黃泉遂不設施輒先顚踣科條諸志臣欲刪定者一所當接續者四前志所無臣欲著者五及經典羣書所宜捃托本奏詔書所當依據分别首目并書章左臣初考逮妻子迸竄亡失文書無所按請加以惶怖愁恐思念荒散十分不得識一所識者又恐謬誤觸冒死罪披瀝愚情願下東觀推求諸奏參以璽書補綴遺闕昭明國體章聞之後雖肝腦流離白骨剖破無所復恨惟陛下留神省察謹因臨戎長霍圉封上臣頓首死罪稽首再拜以聞為陳留縣上孝子狀臣前到官博門掾史孝行卓異者臣門下掾申屠敻稱孝子平丘程未年十四嵗時祖父叔病歿未抱伏叔尸號泣悲哀口乾氣少喘息才屬舅偃哀其羸劣嚼棗肉以哺之未見食噓唏不能吞咽麥飯寒水間用之舅偃誘勸哽咽益甚是後精美異味遂不過口常在柩旁耳聞叔名目應以淚前太守文穆召署孝義童云以叔未葬不能至府舍臣輒核問掾史邑子殷盛宿彥等辭驗皆合臣即召來見未年十四嵗顔色瘦小應對甚詳臣問樂為吏否垂泣求去白歸喪所臣為設食但用麥飯寒水不食肥膩舅本以田作為事家無典學者其至行發於自然非耳目聞見所倣效也雖成人之年知禮識義之士恐不能及伏唯陛下體因心之德當中興之運躬秉萬幾建用皇極神紀騁於無方淑暢洽於羣生故醇行感時而生美義因政以出清風奮揚休徴誕漫太平之萌昭驗已著臣誠伏見幸甚臣聞魯侯能孝命於夷宫張仲孝友侯在左右周宣之興實始於此且烏以反哺託體太陽羔以跪乳為贄國卿禽鳥之微猶以孝寵况未禀純粹之精爽立百行之根源其人隱瘁而德曜彌光其族益章臣不勝願㑹使未美昭顯本朝謹陳狀臣雍頓首表上始加元服與羣臣上壽表伏惟陛下應天淑靈丁期中興誕在幼齡聖􅐾碩義威儀孔備俯仰龍光顔如日星言稽典謨動蹈規矩緝熙光明思齊周成早智夙就參美顯宗令月吉日始加元服進御幘結以章天休臣妾萬國遐邇大小同喜逸豫式歌且舞臣等不勝踊躍鳬藻謹奉生頭酒九鍾稽首再拜上千萬壽陛下享兹吉福永守皇極通遵太和靖綏六合宜民宜人受祿於天書曰一人有慶兆民賴之其寧惟永詩曰顒顒昻昻如圭如璋令聞不忘萬壽無疆薦皇甫規表臣聞唐虞以師師成熙周文以濟濟為寧區區之楚猶用賢臣為寶衛多君子季札知其不危由此言之忠臣賢士國家之元龜社稷之楨固也昔孝文愠胸奴之生事思李牧於前代孝宣忿奸邪之不散舉張敞於亡命况在於當時謙虛為罪而可遺棄臣伏見護羌校尉皇甫規少明經術道為儒宗修身力行忠亮闡著出處抱義皎然不汚藏器林藪之中以辭徴召之寵先帝嘉之羣公歸德盜發東嶽莫能攖討即起家拜為太山太守屠斬桀黠綏撫㷀弱青兖之郊迄用康乂自是以來方外有事戎狄猾華進簡前勳連見委任仗節舉麾威靈盛行演化凶悍使為慤願愛財省穡每有餘資飬士御衆恱以亡死論其武勞則漢室之干城課其文德則皇家之腹心誠宜試用以廣振鷺西雍之美臣以頑愚忝汚顯列輒流汗墨不堪之責不勝區區執心所見越職瞽言罪當殊死唯陛下留神省察臣雍頓首頓首薦太尉董卓表臣某等聞周有流彘之亂而宣王以興漢有昌邑之難而中宗以昭由此觀之天生神聖特以靖亂整殘丕誕洪業輔佐重臣國之楹棟生應期運禀氣山嶽是故申伯山甫列於大雅蕭曹丙魏載於史籍國遭奸臣孽妾制㺯主權纍葉相繼六十餘載火熾流沸浸以不振威移羣下福在㺯臣海內嗷嗷被其傷毒故大將軍愼侯何進盡忠出身圗議蕩滌以清季朝羣凶遘難兵起亂作元舅上卿先寇受害禍至執辱社稷傾危太尉郿侯卓起自東土封畿之外義勇憤發旋赴京師先陳便宜列表奸猾羣慝情狀辭意激切感物悟靈精兵虎臣承持卓勢奮擊醜類漏刻之間靡有孑遺卓聞乘輿已趨河津身率輕騎長驅邙阜上解國家播越之危下救兆民塗炭之禍然後黜廢頑凶爰立聖哲天心聿得萬國賴祉及至差功行賞辭多受少近臣幸臣一人之封戶至萬數今者受爵十有一人總合戶數千不當一封今月七日卓又上書辭疾讓位乞就國土上違聖主嘉寵之至下乖羣生瞻仰之望非所以褒功賞勳也惟陛下益隆委任數加訪問厚其爵賞責以相業之成臣等不勝大願讓高陽侯印綬符䇿表詔制左中郎將蔡雍今封雍陳留雍丘髙陽鄉侯下印綬符䇿假限食五百戶嵗五十萬榖臣稽首受詔怔營喜懼精魄播超恍惚如夢不敢自信臣伏惟糠粃小生學術虛淺少竊方正長歷宰府備數典城著作東觀無狀取罪捐棄朔野蒙恩徙還退伏畎畝復階朝謁進察憲臺遂充機密令守巴郡還備侍中車駕西還執鞭跨馬及看輪轂升輿下軫扶接聖躬既至舊京出備郎將中外所疑對越省闥羣臣之中特見褒異訖無雞犬鳴吠之用常以汗墨愧負恩寵誠不意悟猥與公卿以下録功受賞命服金紫爵至通侯非臣草萊功勞微薄所當被䝉臣十四世祖肥如侯佐命高祖以受爵賞統嗣曠絶除在匹庶臣孑遺苖裔復蒙顯封前功輕重不侔慚惶纍息無心怡寧唐虞之朝猶美三讓臣者何人受而不讓臣不勝戰悼怵惕詣闕拜章上所假高陽侯印綬符䇿伏受罪誅臣得微勞被受爵邑光寵榮華耀熠祖禰非臣小族陋宗器量𥚹狹所能堪勝非臣力用勤勞有所當受誠無安寧甘恱之情國憲上行下不敢逆茍順恩㫖退省金龜紫紱之飾非臣容體所當服佩中讀符策誥戒之詔非臣才量所能祗奉歷日彌久震懼益甚臣聞高祖受命元功翊德者與共天下爵土故曰使黃河若帶太山若礪國以永存爰及苖裔夫山河至大猶謂之小重功輕賞如此其至也是以戰攻之事大有陷堅破敵斬將搴旗之功小有馘截首級履傷涉血之難勤苦軍旅連年纍嵗首如蓬葆體如漆幹勞瘁辛苦如此其重也以受爵土誰曰不宜今者聖朝遷都應順天人奔走之役臣僕職分宜然臣事輕葭莩功薄蟬翼恐史官録書臣等在功臣之列陷恩澤之科垂名後葉作戒末嗣非本朝之德政御臣之長䇿臣是以宵寢晨興叩膺增歎心煩慮亂喘呼息吸且鷦鷯巢林不過一枝鼯鼠飲河不過滿腹小人之情求足而已臣不勝大願再讓髙陽侯印綬符䇿表臣沗自參省資非哲人藩屏之用器非殿邦佐君之才憂心灼煊耳目昏冒忪䝉蔽罔纍息屏氣臣聞稷契之儔以德受命功德靡堪讓所不如晋之范丐不忘禮讓其下化之春秋采焉臣雖小醜不足朂勵以躡髙蹤以詩人斯亡之戒觀見符策君國之誨兩印雙紱並在鞶帶至德元功器量𢎞大猶且踧踖無心寧止况臣螻蟻無功德而散怠茸闒何以居之且晏嬰辭弼殿之邑張良辭三萬之户書籍紀之以為異美夫人君無㺯戲之言憲法有誣罔之劾臣不敢違戾飭虛以距上㫖疑確之誠與神明通謹奉章詣闕頓首敢固以請息伏惟留省讓尚書乞在閒冗表臣流離藏竄十有二年陛下應期中興龍飛踐祚奸臣嬖孽一時殄盡憎疾臣者隨流埋沒太尉郿侯卓收拾洗濯上臣高第補侍御史轉治書御史陛下天地之大德聽納大臣扶飾文舉遂用臣雍充備機密三月之中充厯三臺光榮顯著非臣愚蔽不才所當盜竊非臣碎首糜軀所能補報臣雍頓首頓首死罪死罪聞世宗之時田千秋有神明感動一言以悟聖聽昭發上心故有一日九遷臣雍草萊小臣思謀愚淺生非千秋職不狎練加以新來入朝不更郎署攝省文書其猶面牆陛下統繼大業委政冢宰大傅隗以舊典入録機密事尚書令日磾先輩舊齒德更上公僕射允故司𨽻校尉河南尹某尚書張喜已厯九列侍中魯旭牧守宣藩剖符數郡唯臣官位微賤特單輕匹此六臣臣當自知况於論者將謂臣何是以夙夜寤歎寐息屏營無顔以居無心以寧眀時階級人所勸慕乞在他署抱關執鑰以守漏刻則臣之心厭飫足矣降榮於悴退顯於進臣不勝區區疑戒不敢肅飾巴郡太守謝表臣尚書雍免冠頓首死罪臣猥以頑暗連值盛時超自羣吏入登機密未及輸力盡心日下五府舉臣任巴郡太守陛下不復參論府舉入奏驚惶失守非臣敢安怔營纍息不知所措臣雍頓首死罪知納言任重非臣所得久沗今月丁丑一章自聞乞在閒冗抱關執籥不意録符銀青授任千里求退得進後上先遷為衆所怪不合事宜願乞還詔命盡力他役死而後已臣猥以愚暗盜竊眀時周旋三臺充列機衡出入省闥登踏丹墀承隨同位與在行列以受酒醴嘉幣之賜詔書前後賜石鏡奩禮經素字尚書章句白虎議奏合成二百一十二卷及唾壷彈棋石枰蓮香瓠子黎餳汁器圍盧諸物誠念及下錫惠周至每敇勿謝前後重疊雖父母之於子孫無以加此未得因緣有事答稱萬一不意卒遷荷受非任臨時自陳未蒙省許慘結屏營踧踖受拜命服銀青光寵休顯上耀祖先下榮昆裔誠非所望且巴土長逺江山修隔頃來未悉輯睦劉焉撫寧有方柔逺功著臣以頑蒙不間職政宣暢聖化道遵和風非臣才力所能供給必以黍辱煩汚聖朝幸循舊職當竭肝膽從事肋絶骨破以命繼之臣雍頓首死罪尚書詰狀自陳表議郎糞土臣雍頓首再拜上書皇帝陛下今月十三日臣被尚書召問臣以大鴻臚劉郃前為濟隂太守臣屬史張宛長休百日郃為司𨽻又託河內郡吏李竒為州書佐及營護故河南尹羊陟侍御史胡母班郃不為用致怨之狀臣怔營怖悸肝膽塗地不知死命所在竊自尋按實屬宛竒不及陟班凡休假小吏皆非結恨之本與陟姻家豈敢申助私黨如臣父子欲相傷陷當明言臺閣具陳恨狀所緣內無寸事而謗書外發宜以臣對與郃參驗臣得以學問特蒙褒異執事祕館操管御前姓名貌狀微簡聖心今年七月召詣金商門問以變異齎詔申㫖誘臣使言臣實愚戇惟識忠藎出命忘軀不顧後患譏切公卿內及寵近區區欲答上問救怪異為陛下圗康寧之計而已預知所言者當必怨臣陛下不念忠臣直言宜加掩蔽誹謗卒至便用疑怪豈不負盡忠之吏哉每有災異輒令百官各上封事欲以改政息譴除凶致吉而言者不蒙延納之福旋被陷破之禍羣臣杜口以臣為戒誰敢復為陛下盡忠者乎臣季父質連見拔擢位在上列臣被蒙恩渥數見訪問言事者因此欲陷臣父子破臣門户非復發紏姦伏補益國家者也臣年四十有六孤特一身前無立男得盡節王室託名忠臣死有餘榮然恐陛下不復聞至言矣臣愚以凡冗招致禍患自臣職耳臣對問時質為下邳相不聞臣謀今日橫見逮及使質恨以衰老白首隨臣摧沒并內坑陷以快言事厭副其心誠寃誠痛陛下仁篤之心必不忍此思之未至耳臣一入牢檻當為箠楚所迫趣飲章辭情何緣復逹臣死期垂至冒昧自陳乞身當辜戮免質并坐臣死之日則生之年也唯陛下加餐為百姓自愛臣雍死罪表賀録換誤上章謝罪今月十八日臣以相國兵討逆賊故河內太守王匡等屯陳破壞斬獲首級詣朝堂上賀臣雍奉賀録故羽林郎將李參遷城門校尉而署名羽林左監右衛尉杜衍在朝堂而稱不在録咎在臣不詳省按使參以亡為存衍以存為亡錯奏謬録不可行侍御史劾臣不敬當賜刑書懲戒不恪陛下天地之德不辱收戮丙辰詔書以一月俸贖罪臣雍怔營慙怖屏氣纍息不知所自投處臣雍頓首死罪臣不惟石慶數馬之誤簡忽校讎不謹之愆雖見原宥仰愧先臣傷肌入骨不勝忪蒙流汗臣雍頓首死罪書與何進薦邊讓書明將軍以申甫之德當中興之隆建上將之任膺秉國之權妖寇作孽震驚京師運籌帷幄定䇿廟勝先擒馬元歸近之變天兵致誅兖豫以清冀荆用次雲消席卷克厭衆心王室以寧萬國兆民莫不賴祉伏惟幕府初開博選清英華髮舊德並為元龜成功立事莫不畢舉雖振鷺之集西雍濟濟之在周庭無以或加伏見陳留邊讓字文禮天授逸才聰明賢知纂成伐柯不逺之則齠齓夙孤不墜家訓始任學問便就大業閒不遊嬉初覽諸經見本知義尋端極緒受者不能答其問章句不能遂其意詩書易禮先通大義業以次舉衆傳篇章無術不綜心通性逹剖纎入冥口辨辭長而節之以禮度安詳審固守持內定非禮勿動非法不言若狐疑之論定嫌審之分經典交至檢括並合衆夫嘉焉莫之能奪使讓生於先代在唐虞則元凱之比當仲尼則顔冉之亞豈徒世俗之凡偶兼混是非講論而已哉才藝言行卓逸不羣階級名位亦宜超然不以常制為限長幼為拘若復輩從此郡選舉非所以彰瓌瑋之髙價昭大知之絶明也傳曰函牛之鼎一旦立之以烹雞多汁則淡而不可食少汁則焦而不可熟大器之於小用固有所不宜也雍誠竊悁悒怪此寶鼎未受犧牛大羹之和久佐煎熬臠胾之間願明將軍回謀守慮思垂采納就讓疾病所親察之更以屬缺招延表貢行狀列於正府躋之宗伯納之機密展其力用副其器量若夫以年齒為嫌則顔淵不得冠德行之首子竒不得紀治阿之功茍能其事古今一也密疏特表及期而行邦國其昌雍寢羸匍匐拜寄不敢須通徙朔方報楊復書㫺此徙者故城門校尉梁伯喜南郡太守馬季長㦯至三嵗近者嵗餘多得旋返自甘罪戾不敢慕此徙朔方報羊月書幸得無恙遂至徙所自城以西惟青紫鹽也辭郡辟讓申屠蟠書蟠家貧傭為漆工雍深重蟠及被州辟乃辭讓之申屠蟠禀氣𤣥妙性敏心通喪親盡禮幾於毁滅至行美誼人所鮮能安貧樂濳味道守真不為燥濕輕重方之於雍以齒則長以德則賢與袁公書朝夕游談從學冥飲酌麥醴燔乾欣欣焉樂在其中矣又與人書家祖居常言客有三當死夜半蠶時至人室家也今者一行而犯其兩又與人書雍薄祐早喪二親年踰三十鬢髮二色叔父親之猶若幼童陸則對坐食則比豆論明堂月令論明堂者天子太廟所以崇禮其祖以配上帝者也夏后氏曰世室殷人曰重屋周人曰明堂東曰青陽南曰眀堂西曰總章北曰𤣥堂中央曰太室易曰離也者眀也南方之卦也聖人南靣而聽天下嚮明而治人君之位莫正於此焉故雖有五名而主以明堂也其正中皆曰太廟謹承天順時之令昭令德宗祀之禮明前功百辟之勞起養老敬長之義顯教幼誨稚之學朝諸侯選造士於其中以眀制度生者乘其能而至死者論其功而祭故為大教之宫而四學具焉官司備焉譬如北辰居其所而衆星拱之萬象翼之政教之所由生變化之所由來眀一統也故言眀堂事之大義之深也取其宗祀之貌則曰清廟取其正室之貌則曰太廟取其尊崇則曰太室取其向明則曰明堂取其四門之學則曰太學取其四面周水圓如璧則曰辟雍異名而同事其實一也春秋因魯取宋之奸賂則顯之太廟以明聖王建清廟明堂之義經曰取郜大鼎於宋戊申納於太廟傳曰非禮也君人者將昭德塞違故昭令德以示子孫是以清廟茅屋昭其儉也夫德儉而有度升降有數文物以紀之聲明以發之以臨照百官百官於是乎戒懼而不敢易紀律所以眀大教也以周清廟論之魯太廟皆明堂也魯禘祀周公於太廟明堂猶周宗祀文王於瀆廟明堂也禮記檀弓曰王齊禘於清廟明堂也孝經曰宗祀文王於眀堂禮記眀堂位曰太廟天子曰明堂又曰成王幼弱周公踐天子位以治天下朝諸侯於明堂制禮作樂頒度量而天下大服成王以周公有大勳勞於天下命魯公世世禘祀周公於大廟以天子之禮升歌清廟下管象舞所以異魯於天下也取周清廟之歌歌於魯太廟明魯之太廟猶周之清廟也皆所以昭文王周公之德以示子孫也易傳太初篇曰天子旦入東學晝入南學暮入西學太學在中央天子之所自學也禮記保傅篇曰帝入東學上親而貴仁入西學上賢而貴德入南學上齒而貴信入北學上貴而尊爵入太學承師而問道與易傳同魏文侯孝經傳曰太學者中學明堂之位也禮記古大明堂之禮曰膳夫是相禮日中出南闡見九侯反問於相日側出西闈視五國之事日入出北闈視帝節猷爾雅曰宫中之門謂之闈王居眀堂之禮又别隂陽門東南稱門西北稱闈故周官有門闈之學師氏教以三德守王門保氏教以六藝守王闈然則師氏居東門南門保氏居西門北門也知掌教國子與易傳保傅王居明堂之禮參相發明為學四焉文王世子篇曰凡大合樂則遂養老天子至乃命有司行事興秩節祭先師先聖焉始之養也適東序釋奠於先老遂設三老五更之席位言教學始之於養老由東方嵗始也又春夏學干戈秋冬學羽籥皆習於東序凡祭與養老乞言合語之禮皆小樂正詔之於東序又曰大司成論說在東序然則詔學皆在東序東序東之堂也學者聚焉故稱詔太學仲夏之月令祀百辟卿士之有德於民者禮記太學志曰禮士大夫學於聖人善人祭於眀堂其無位者祭於太學禮記昭穆篇曰祀先賢於西學所以教諸侯之德也即所以顯行國禮之處也太學明堂之東序也皆在明堂辟雍之內月令記曰明堂者所以眀天氣統萬物明堂上通於天象日辰故下十二宫象日辰也水環四周言王者動作法天地德廣及四海方此水也禮記盛德篇曰明堂九室以茅蓋屋上圎下方此水名曰辟雍王制曰天子出征執有罪反釋奠於學以訊馘告樂記曰武王伐殷薦俘馘於京太室詩魯頌云矯矯虎臣在泮獻馘京鎬京也太室辟雍之中明堂太室也與諸侯泮宫俱獻馘焉即王制所謂以訊馘告者也禮記曰祀乎明堂所以教諸侯之孝也孝經曰孝悌之至通於神明光於四海無所不通詩云自西自東自南自北無思不服言行孝者則曰明堂行悌者則曰太學故孝經合以為一義而稱鎬京之詩以明之凡此皆明堂太室辟雍太學事通文合之義也其制度數各有所法堂方百四十四尺坤之策也屋圜屋徑二百一十六尺乾之策也太廟明堂方三十六丈通天屋徑九丈隂陽九六之變也圜蓋方載六九之道也八闥以象八卦九室以象九州十二宫以應辰三十六戶七十二牖以四戶九牖乘九室之數也戶皆外設而不閉示天下不藏也通天屋髙八十一尺黃鍾九九之實也二十八柱列於四方亦七宿之象也堂髙三丈以應三統四鄉五色者象其行外廣二十四丈應一嵗二十四氣也四周以水象四海王者之大禮也月令篇名曰因天時制人事天子發號施令祀神受職每月異禮故謂之月令所以順隂陽奉四時效氣物行王政也成法具備各從時月藏之明堂所以示承祖考神明明不敢泄瀆之義故以明堂冠月令自天地定位有其象聖帝明君世有紹襲蓋以裁成大業非一代之事也易正月之卦曰泰其經曰王用享於帝吉孟春令曰乃擇元日祈榖於上帝顓頊厯衡曰天元正月巳已朔日立春日月俱起於泰建宫室制度月令孟春之月日在營室堯典曰乃命羲和欽若昊天厯象日月星辰敬授人時令曰乃命太史守典奉法司天日月星辰之行易曰不利為寇利用禦寇令曰兵戎不起不可從我始書曰嵗二月同律度量衡中春令曰日夜分則同度量鈞衡石凡此合於大厯唐政其類不可盡稱戴禮夏小正傳曰隂陽生物之後王事之次則夏之月令也殷人無文及周而備文義所說傳衍深逺宜周公之所著也官號職司與周官合周書七十二篇而月令第五十三古者諸侯朝正於天子受月令以歸而藏諸廟中天子藏之於明堂每月告朔朝廟出而行之周室既衰諸侯怠於禮魯文公廢告朔而朝仲尼譏之經曰閠月不告朔猶朝於廟刺舍大禮而徇小儀也自是告朔遂闕而徒用其羊子貢非廢其令而請去之仲尼曰賜也爾愛其羊我愛其禮庶明王復興君人者昭而明之稽而用之耳無逆聽令無逆政所以臻乎大順隂陽和年榖豐太平洽符瑞由此而至矣秦相吕不韋著書取月令為紀號淮南王安亦以取為第四篇改名曰時則故偏見之徒或云月令吕不韋作或云淮南皆非也正交論聞之前訓曰君子以朋友講習而正人無有淫朋是以古之交者其義敦以正其誓信以固逮夫周德始衰頌聲既寢伐木有鳥鳴之刺谷風有棄豫之怨自此以降彌以凌遲或闕其始終或彊其比周是以搢紳患其然而論者諄諄如也疾淺薄而懷携二者有之惡朋黨而絶交遊者有之其論交也曰富貴則人爭趨之貧賤則人爭去之是以君子愼人所以交已審已所以交人富貴則無暴集之客貧賤則無棄舊之賔矣原其所以來則知其所以去見其所以始則觀其所以終彼貞士者貧賤不待夫富貴富貴不驕乎貧賤故可貴也蓋朋友之道有義則合無義則離善則久耍不忘平生之言惡則忠告善誨之否則止無自辱焉故君子不為可棄之行不患人之遺巳也信有可歸之德不病人之逺巳也不幸或然則躬自厚而薄責於人怨其逺矣求諸巳而不求諸人咎其稀矣夫逺怨稀咎之機咸在乎躬莫之致也子夏之問人問交於子張而二子各有聞乎夫子然則以交誨也商也寬故告之以拒人師也褊故誨之以容衆各從其行而矯之至於仲尼之正教則泛愛衆而親仁故非善不喜非仁不親交游以方㑹友以文可無貶也穀梁赤曰心志既通名譽不聞友之罪也今將患其流而塞其源病其未而刈其本無乃未若擇其正而黜其邪與與其彼農皆黍而獨稷焉夫黍亦神農之嘉穀與稷並為粢盛也使交可廢則黍其愆矣括二論而言之則刺薄者博而洽斷交者貞而孤孤有羔羊之節與其不獲巳而矯時也走將從夫孤焉銘論春秋之論銘也曰天子令德諸侯言時計功大夫稱伐昔肅愼納貢銘之楛矢所謂天子令德者也若黃帝有巾几之法孔甲有盤盂之誡殷湯有甘誓之勒冕鼎有丕顯之銘武王踐祚咨於太師作席几楹杖之銘十有八章周廟金人針口以愼亦所以勸導人主朂於令德者也呂尚作周大師封於齊其功銘於昆吾之冶獲寶鼎於美陽仲山甫有補衮闕誠百辟之功周禮司勳凡有大功者銘之太常所謂諸侯言時計功者也有宋大夫正考父三命滋益恭而莫侮衛孔悝之祖莊叔隨難漢陽左右獻公衛國賴之皆銘乎鼎晉魏顆獲杜回於輔氏銘功於景鐘所謂大夫稱伐者也鐘鼎禮樂之器昭德紀功以示子孫物不朽者莫不朽於金石故也近世以來咸銘之於碑桓彬論彬麟之子少與蔡雍齊名仕尚書郎厲志操以忤宦黨免官卒雍等共論序其志乃樹碑而頌焉彬有過人者四夙智早成岐嶷也學優文麗至通也仕不茍祿絶髙也辭隆從窳潔操也議諫伐鮮卑議熹平六年夏護烏桓校尉育上言鮮卑犯諸郡自春三十餘發請徴諸郡兵擊之一冬春足以掃滅時故護羌校尉田晏以他論刑被原行賄王甫求為將詔書遂用為破鮮卑中郎將使胸奴中郎將以下與育晏三道並出大臣多以為不便召百官議中郎蔡雍議曰書戒猾夏易伐鬼方周宣王命南仲吉甫攘獫狁威蠻荆漢有衛霍顔瀚海竇憲燕然之事征討之作所由尚矣然而時有同異勢有可否故謀有得失事有成敗不可齊也自漢興以來胸奴常為邊害而未聞鮮卑之事昔謀臣竭精武夫戮力而所見常異其設不戰之計守禦之因者皆社稷之臣永久之策也孝武皇帝因文景之畜用度饒衍南伐越北伐胡西征大宛東并朝鮮兵出數十年帑藏空竭官民俱匱乃興鹽鐡酤𣙜之利設告緡重稅之令民不堪命及盜賊羣起關東紛然道路不通繡衣直指之使奮鈇鉞而並出然後僅得寧息既而覺悟乃封丞相為富民侯故主父偃曰夫務戰勝窮武事未有不悔者也夫世宗神武將卒良猛財賦充實所拓廣逺而猶有悔况無彼時地利人財之備而欲輕動此其不可一也鮮卑種衆新盛自胸奴北遁以來據其故地稱兵十萬彌地千里意智益生才力徑健加以禁網漏泄善金良鐡出者莫察漢人逋逃為其謀主兵利馬疾過於胸奴㫺假熲良將習兵善戰經營西羌猶十餘年今育晏欲以三年之期專勝必克育晏策慮未能過熲鮮卑種衆又不弱於西羌也乃欲張設近期誘戲朝廷三年不成必迫於害禍結兵連不得中休轉運糧餉不可勝給天無豐嵗官見殫財民人流移於四方不能還其骸骨以此時興議橫發一發不巳必至再三諸夏之內弱者伏尸强者作寇邊郵之患手足之疥瘙也中國之困胸背之瘭疽也其不可二也育云自春以來三十餘發方今郡縣盜賊劫摽人財攻犯官民日月有之冠帶之圻吏調政密猶不能絶况此醜虜羣類抵冒心不受仁膽不畏威而可使斷無盜竊昔者髙祖乃忍平城之恥呂后甘棄嫚書之詬方之於今何者為甚是其不可三也天設山河秦築長城漢起塞垣所以别內外異殊俗也其外則介之夷狄其內則任之良吏後嗣遵業愼奉所遺茍無蹙國內侮之患豈與蟲蟻之虜較往來之數哉乃欲越幕踰域度塞出攻得地不可耕農得民不可冠帶破之不可殄盡而本朝必為之旰食四海必為之焦枯其不可四也夫煎盡府帑之蓄以恣輕事之人專勝者必未克挾疑者必未敗衆所謂危聖人不任朝議有嫌明主不行是其不可五也按育一戰所獲不如所失昔淮南王安諫伐越曰天子之兵有征無戰言其莫敢校也使越人蒙死徼幸以逆執事厮輿之卒有一不備而歸者雖得越王之首猶為大漢之羞威化不行則欲伐之狐疑避難則守為長宜通乎時變且憂萬人饑餓與蠻夷之不討何者為大宗廟之祭凶年不備况避不遜之辱哉今關東大困無以相贍又議動兵非但勞人凶年隨之其罷敝有不可勝言者此先帝所以發德音也夫恤民救患雖成郡列縣尚猶棄之况以障塞之外未嘗為人居者乎臣愚以為宜止征伐之計令諸營甲士循行塞垣屯守衝要以堅牢不動為務若乃守邊之術李牧開其原嚴尤申其要遺業猶在文章具存循二子之策守先帝之規臣曰可矣臣雍愚戇議不足采臣雍頓首頓首書戒猾夏易伐鬼方周有獫狁蠻荆之師漢有闐顔瀚海之事征討殊類所由尚矣然而時有同異藝有可否故謀有得失事有成敗不可齊也武帝情存逺略志關四方南誅百越北討彊胡西伐大宛東并朝鮮因文景之蓄藉天下之饒數十年間官民俱匱乃興鹽鐡酒𣙜之利設告緡重稅之令民不堪命起為盜賊關東紛擾道路不通繡衣直指之使奮鈇鉞而並出既而覺悟乃息兵罷役封丞相為富民侯故主父偃曰夫務戰勝窮武事未有不悔者也夫以世宗神武將帥良猛財富充實所拓廣逺猶有悔焉况今人財並乏事劣昔時乎自胸奴遁逃鮮卑彊盛據其故地稱兵十萬才力徑健意智益生加以闢塞不嚴禁網多漏精金良鐡皆為賊有漢人逋逃為之謀主兵利馬疾過於胸奴昔假熲良將習兵善戰有事西羌猶十餘年今育晏才策未必過熲鮮卑種衆不弱於曩時而虛計二載自許冇成若禍結兵連豈得中休當復徵發衆人轉運無已是為耗竭諸夏并力蠻夷夫邊埀之患手足之疥搔中國之团胸背之瘭疽方今郡縣盜賊尚不能禁况此醜虜而可伏乎昔髙祖忍平城之耻呂后弃慢書之詬方之於今何者為甚天設山河秦築長城漢起塞垣所以别內外異殊俗也茍無䠞國內侮之患則可矣豈與蟲蟻狡寇計爭往來哉雖或破之豈可殄盡而方令本朝為之旰食乎夫專勝者未必克挾疑者未必敗衆所謂危聖人不任朝議有嫌明主不行也昔淮南王安諫伐越曰天子之兵有征無戰言其莫敢校也如使越人䝉死以逆執事厮輿之卒有一不備而歸者雖得越王之首而猶為大漢羞之而欲以齊民易醜虜皇威辱外夷就如其言猶巳危矣况乎得失不可量邪昔珠崖郡反孝元皇帝納賈捐之言而下詔曰珠崖背畔今議者或曰可討或曰棄之朕日夜惟思羞威不行則欲誅之通于時變復憂萬民夫萬民之饑與逺蠻之不討何者為大宗廟之祭凶年猶有不備况避不嫌之辱哉今關東大困無以相贍又當動兵非但勞民而已其罷珠崖郡此元帝所以發德音也夫恤民救急雖成郡列縣尚猶棄之况障塞之外未嘗為民居者乎守邊之術李牧善其略保塞之論嚴尤申其要遺業猶在文章具存循二子之策守先帝之規臣曰可矣厯數議熹平四年五官郎中馮光沛相上計掾陳晃言厯元不正故妖民叛冦益州盜賊相續為厯用甲寅為元而用庚申圖緯無以庚為元者近秦所用代周之元太史治厯郎中郭香劉固意造妄說乞與本庚申元經緯有明受虛欺重誅乙卯詔書下三府與儒林明道者詳議務得道真以羣臣㑹司徒府議太尉耽等以雍議劾光晃不敬正鬼薪法詔勿治罪厯數精微去聖久遠得失更迭其術無常是以承秦厯用顓頊元用乙卯百有二嵗孝武皇帝始改正朔厯用太初元用丁丑行之百八十九嵗孝章皇帝改從四分元用庚申今光晃各以庚申為非甲寅為是按厯法黃帝顓頊夏殷周魯凡六家各自有元光晃所據則殷厯元也他元雖不明於圖䜟各家術皆當有效於其當時武帝始用太初丁丑之元有六家紛錯爭訟是非太史令張壽王挾甲寅元以非漢厯雜候清臺課在下第卒以疏闊連見劾奏太初效驗無所漏失是則雖非圖䜟之元而有效於前者也及用四分以來考之行度密於太初是又新元效於今者也延光元年中謁者亶誦亦非四分庚申上言當用命厯序甲寅元公卿百寮參議正處竟不施行且三光之行遲速進退不必若一術家以算追而求之取合於當時而巳故有古今之術今之不能上通於古亦猶古術之不能下通於今也元命苞乾鑿度皆以為開闢至獲麟二百七十六萬嵗及命厯序積獲麟至漢起庚子蔀之二十三嵗竟已酉戊子及丁卯蔀六十九嵗合為二百七十五嵗漢元年嵗在乙未上至獲麟則嵗在庚申推此以上上極開闢則不在庚申䜟雖無文其數見存而光晃以為開闢至獲麟二百七十五萬九千八百八十六嵗獲麟至漢百六十二嵗轉差少一百一十四嵗云當滿足則上違乾鑿度元命苞中使獲麟不得在哀公十四年下不及命厯序獲麟漢相去四蔀年數與秦記譜注不相應當今厯正月癸亥朔光晃以為乙丑朔乙丑之與癸亥無題勒款識可與衆共别者須以弦望晦朔光魄虧滿可得而見者考其符驗而光晃厯以考靈曜二十八宿度數及冬至日所在與今史官甘石舊文錯異不可考校以今渾天圗儀檢天文亦不合於考靈曜光晃誠能自依其術更造望儀以追天度逺有驗於圗書近有效於三光可以易奪甘石窮服諸術者實宜用之難問光晃但言圗䜟所言不服元和二年二月甲寅制書曰朕聞古先聖王先天而天不違後天而奉天時史官用太初鄧平術冬至之日日在斗二十二度而厯以為牽牛中星先立春一日則四分數之立春也而以折獄斷大刑於氣巳忤用望平和蓋亦逺矣今改行四分以遵於堯以順孔聖奉天之文是始用四分厯庚申元之詔也深引河洛圗䜟以為符驗非史官私意獨所興搆而光晃以為固意造妄說違反經文謬之甚者昔堯命羲和厯象日月星辰舜叶時月正日湯武革命治厯明時可謂正矣且猶遇水遭旱戒以蠻夷猾夏寇賊姦宄而光晃以為隂陽不和姦臣盜賊皆元之咎誠非其理元和二年乃用庚申至今九十二嵗而光晃言秦所用代周之元不知從秦來漢三易元不常庚申光晃區區信用所學亦妄虛無造欺語之愆至於改朔易元往者壽王之術巳課不效亶誦之議不用元和詔書文備義著非羣臣議者所能變易劉昭曰不有君子其能國乎觀蔡雍之議可以言天機矣賢明在朝𢎞益逺哉公卿結正足懲淺妄之徒詔書勿治亦深盍各之致宗廟迭毁議漢承亡秦滅學之後宗廟之制不用周禮每帝即位輒立一廟不止於七不列昭穆不定迭毁孝元皇帝皆以功德茂盛尊崇廟稱孝文曰太宗孝武曰世宗孝宣曰中宗時忠正大臣夏侯勝猶執議欲出世宗至孝成帝議猶不定太僕王舜中壘校尉劉歆據經傳義謂不可毁上從其議古人考據慎重不敢私其君父若此其至也後遭王莽之亂光武皇帝受命中興廟稱世祖孝明皇帝聖德聰明政參文宣廟稱顯宗孝章皇帝至孝蒸蒸仁恩溥大海內賴祉廟稱肅宗比方前事得禮之宜自此以下政事多釁權移臣下嗣帝殷勤各欲褒崇至親而已臣下懦弱莫能執夏侯之直故遂衍溢無有方限今聖朝遵古復禮以求厥中誠合事宜禮傳封儀自依家法今不知國家舊有宗儀聖主賢臣所共創定欲就六廟黜損所宗違先帝舊章未可施行臣謹按禮制七廟三昭三穆與太祖七孝元皇帝世在第八光武皇帝世在第九故以元帝為考廟尊而奉之孝明遵制亦不敢毁元帝於今朝九世以七廟言之則非所宗八月報酬可出元帝主比惠景昭成哀平帝五年一致祭孝章皇帝孝安皇帝孝桓皇帝親在三昭孝和皇帝孝順皇帝孝靈皇帝親在三穆廟親未盡四時常陳孝明以下穆宗敬宗恭宗之號皆宜省去以遵先典殊異祖宗不可參並之義今又總就一堂崇約尚省不復改作惟主及几筵應改而已正數世之所闕為無窮之常典稽禮制之舊則合神明之歡心臣愚戇議不足採臣雍頓首頓首答齊議詔召尚書問立春當齊迎氣東郊尚書左丞馮方毆殺指揮使於尚書西祠可齊否得無不宜具對議郎臣蔡雍博士任敏死罪對按禮上帝之祠無所為廢齊者所以致齊不敢渙散其意宫室至大指使至微不在齊潔之處元和詔禮無免齊宜以自潔靜交神明本無嫌間祠室又寬可齊無疑詩云唯此文王小心翼翼昭事上帝聿懷多福夫齊以恭奉明祀文王所以懷福無所不宜臣雍敏愚戇死罪和熹鄧后諡議孝和鄧皇后崩羣臣謀諡於是尚書陳忠上言以為鄉黨叙孔子威儀俯仰無所遺彤管記君王纎微大小無不舉是以德著圗籍名垂於後伏惟大行皇后規乾則坤兼包日月厥初作合允有休烈貫魚之次加於小媵中饋之叙昭於帷幄遭家不造三元之厄孝殤幼冲國祚中絶海內紛然羣臣纍息加以洪流為災札荒為害西戎蠢動武威侵侮并涼猾夏作寇振驚渤碣家有採薇之思人懷殿㕧之聲皇太后參圗考表求人之瘼度越平原建立聖主垂疇咨之問遵六事之求勞謙克躬菲薄為務是以尚官損服衣不粲英饔人徹羞膳不過擇黃門闕樂魚龍不作織室絶伎纂組不經尚方抑巧雕鏤不為離宮罕幸儲峙不施遐方斷篚侏離不貢罷出宫妾免遣宗室沒入者六百餘人以紓鬱滯奉率舊禮交饗祖廟以展孝子承歡之敬蠲正憲法六十餘事以順漢氏三百之期經藝乖舛恐史闕文命衆儒考校東觀閣學博士一缺廣選十人何有伐檀茅茹不拔屢舉方直顯擢孝子遵忠孝之紀啓大臣喪親之哀疾貪吏受取為姦糾增舊科之罰惡長吏虗僞錮之十年追崇世祖功臣國土或有斷絶封植遺苖以奉其祀爵髙蘭諸國𦙍子以紹三王之後事不稽古不以為政政不惠和不圗於策猶不自專傳謀逺暨允求厥中刑之所加不阿近戚賞之所及不遺側陋終朝反側明發不寢徒以百姓為憂不以天下為樂聖誠著於禁闥而德教被於萬國故自昏墊迄於康乂叛虜蜂集賊害邊陲永元之世以為遺誅今畏服威靈稽顙即斃徼外絶國慕義重譯來獻其琛史官咸賀請作主頌却而不聽郡國咸上瑞應寖而不宣允恭抑損密勿在勤遭疾不豫垂念臣子御輦在殿顧命羣司流恩布澤大赦天下有始有卒同符先聖昔書契所載虞帝二妃夏后塗山高陽有辛姬氏任母徒以正身率內思媚周京為髙未有如大行皇后勤精勞思篤繼國之祚正三元之衡康百六之㑹消無妄之運者也功德巍巍誠不可及漢世后氏無諡至於明帝始建光烈之稱是後轉因帝號加之以諡髙下優劣混而為一違禮大行受大名小行受小名之制諡法有功安人曰熹帝后諡禮亦宜同大行皇太后宜諡為和熹皇后上稽典訓之正下協先帝之稱朱公叔諡議漢益州刺史南陽朱公叔卒門人陳季圭等議所諡云宜曰忠文子陳留蔡雍議曰昔在聖人之制諡也將以勸善彰惡俾民興行賢愚臧否依事從實雖文武之美幽厲之穢罔不具存自王公以降至於列國大夫皆用配號傳於無窮秦以世言溢而黜其事漢興以來惟天子與五等之爵然後有之公卿大臣其禮闕焉歷世彌久莫之或修益州府君貫綜典術率由舊章始與諸儒考禮定議加陳留府君以益州之諡是後覽之者亦無間焉今子亶纂襲前業不忘遺則孝既至矣禮實宜之謹覽陳生之議思忠文之意參之羣典稽之諡法夫萬類莫貴乎人百行莫美乎忠故夏后氏正以人統教以忠德然則忠也者人德之至也而猶有三焉孔子曰進思盡忠又曰臣事君以忠奉上之忠也曰為人謀而不忠乎又曰忠焉能勿誨乎謀誨之忠也春秋左傳曰小大之獄必以情情忠之屬也又曰上思利人曰忠撫下之忠也三者人之則而忠行乎其中益州府君自始事至沒身忠言不輟乎口忠謀不已乎心其在帝室正身危行言如砥矢䇿合神明蹇蹇之諫文章俱存奉上忠矣其在部臣匡救善導出自一心疑不我聽者果有躓覆不測之禍謀誨忠矣爰牧冀州時值凶荒勞心苦思勤恤度事誅斃貪暴糾戢責黨雖則強禦當官能行夫豈淫刑將有利也發墓盜柩議而不罪夫豈漏姦察以情也撫下忠矣位在牧伯職據納言秉權食祿實有年數而居無畜好財貨不益舊糲食布衾槩謂之精麗者昔魯季孫行父卒宰庀家器無衣帛之妾無食粟之馬君子曰相三君矣而無私積可不謂忠乎而諡曰文子春秋外傳曰忠文之實也然則文忠之彰也忠以為實文以彰之事通議合兩名一致是貞儉之稱文也邾子籧篨卜遷於繹史曰利於民不利於君公曰民茍利矣孤亦與焉於是遷而遂卒諡曰文公是危身利民之稱文也衛大夫孔圉諡曰文子子貢疑焉惟敏而好學不恥下問仲尼與之是勤學好問之稱文也府君所在屢以忤違阽以深患茍除民害死生以之前後三黜一罹疾廢於身危矣兼包六典命世作師猶復宗事趙叟示有攸尊能下問矣有一於此猶可以稱况乃忠兼三義文備三德於古志不悖而諡法亦曰宜矣本議曰忠文子按古之以子配諡者魯之季文子孟懿子衛之孫文子公叔文子皆諸侯之臣也至於王室之卿大夫其尊與諸侯並故以公配春秋曰劉卷卒葬劉文公公羊傳曰劉卷者何天子大夫也經又曰王子虎卒左傳曰王叔文公卒而如同盟禮也此皆天子大夫得稱公禮與同盟諸侯敵體故也又禮緣臣子咸欲尊其君父故雖侯伯子男之臣自稱其君咸得曰公及其卒也異國之人稱之皆然是以邾子許男稱公以葬春秋之正義也以例言之則府君王室亞卿也有王叔劉氏之比以臣子之辭言之則有邾許稱公之文雖無土而其位是也今曰公猶可若稱子則降等多矣懼禮廢日久將詭時聽周有仲山甫伯陽嘉父優老之稱也宋有正考父魯有尼父配諡之稱也春秋曰孔父子曰伯某父亡之稱也父雖非爵號與天子諸侯咸用優賢禮同順乎門人臣子所稱之宜可於公父之中擇一處焉使不得稱子而已對問答詔問災異八事光和元年七月十日詔書尺一召光祿大夫楊賜諫議大夫馬日磾議郎張華蔡雍太史令單揚詣金商門引入崇德殿署門內南辟幃中為都座漏未盡三刻中常侍育陽侯曹節冠軍侯王甫從東省出就都座東靣十門劉寵龎訓北靣賜南面日磾華雍揚西面受詔書各一通尺一木板草書兩常侍又諭㫖朝廷以災異憂懼特㫖密問政事所變改施行務令分明賜等稱臣再拜受詔書起就坐五人各一處給筆硯為對臣學識淺薄心慮愚暗不足以答聖問情𠂻變易怔營怖悸謹列狀上臣雍頓首頓首詔問去月二十九日有黑氣墮溫德殿東庭中黑如車蓋降氣奮勢五色有頭體長十餘丈形狀似龍似虹霓雍對虹著於天而降施於庭以臣所聞則所謂天投霓者也不見尾足者不得稱龍易曰霓之比無德以色親也濳潭巴曰虹出后妃隂脅主又曰五色霓迭至照於宫殿有兵革之事演孔圗曰霓者斗之精氣也失度投霓見態主惑於毁譽合䜟圗曰天子外苦兵威內奪臣無忠政變不虛生占不虛言意者陛下關機之內袵席之上獨有以色見進陵尊踰制以招變象若羣臣有所毁譽聖意低回未知誰是兵戎不息威權浸移忠言不聞則虹霓所生也抑內寵任忠賢决毁譽分直邪各得其所嚴守衛整武備威權之機不以假人則其救也易傳曰陽感天不旋日書曰惟辟作威惟辟作福臣或為之謂之凶害是以明主尤務焉詔問正月三日有白衣入德陽殿門辭稱伯夏教我上殿與中黃門桓賢晤言相往來不得入遂亡去不知姓名臣聞凡人為怪皆皇極道失下或謀上故其傳曰皇之不極是謂不建則有下謀上之病孝成綏和二年八月男子王褒衣小冠帶劒入北司馬殿東門上殿入室解帷組佩之招前殿署王業等曰天帝命我居此業收縛考問褒故公車卒病狂不自知入宫乃下獄死是時王莽為司馬遂為篡亂亦卒誅臣竊思之與綏和時相似而有異被服既不同來入雲龍門而稱伯夏教入殿裏與桓賢言伯夏即故大將軍梁商商子冀冀子不疑等皆以罪受戮殘餘非天所祐以往况今將狂狡之人為王氏之禍未至殿省而覺亡不久伏誅夫誠仰見上帝之厚德也濳潭巴曰有人走入宫不知其名大水為戒天子驚羣隂太隆羣下並凑强盛也建大中之道舉賢良而寵祿之則其救也經曰皇建其有極斂時五福用敷錫厥庶民惟時厥庶民於汝極錫汝保極詔問南宫侍中寺雌雞欲化為雄尾身毛已似雄頭尚未變臣聞凡雞為怪皆貌之失也傳曰貌之不恭是謂不肅時即有雞禍孝宣黃龍元年未央宮輅軫中雌雞化為雄不鳴無距是時元帝初即位將立妃王氏為后至初元元年丞相史家雌雞化為雄距而鳴是嵗封后父禁為平陽侯而后正位王氏之寵始盛哀帝晏駕后攝政王莽以后兄子為大司馬由是為亂昔武王伐紂曰牝雞之晨惟家之索易傳曰婦人專政國不靜牝雞雄鳴主不榮夫牝雞但雄鳴尚有索家不榮之名况乃隂陽易體名實變改此誠大異臣竊以意推之頭為元首人君之象今雞身已變未至於頭而聖主知之訪問其故是將有其事而不遂成之象也若應之不精誠無所及頭冠或成即為患災敬愼威儀動作之容斷娶御改興政之原則其救也夫以匹夫顔氏之子有過未嘗不知知之未嘗復行易曰不逺復無祗悔元吉詔問即祚以來災眚屢見頃嵗月蝕地動風雨不時疾癘流行迅風折樹河洛盛溢臣聞陽勝則震隂勝則食思亂則風貌失則雨視暗則疾癘流行簡宗廟則水不潤下河流滿溢明君正上下抑隂尊陽修五事於聖躬致精慮於供御則其救也詔問星辰錯謬臣竊見熒惑變色入太微西門太白正晝而見臣聞熒惑示變主當精明其德而有休慶之色太白當晝而見是隂陽爭明強國弱弱國強皆有失政又失道而見是為嬴長侯王不榮熒惑主禮太白主兵謹禮事治兵政審察中外之言申明守禦之令以杜漸防萌則其救也昔宋景公小國諸侯三有德言而熒惑為之退舍詔問蝗蟲冬出臣聞易傳曰大作不時天降災厥咎蝗蟲來河圗祕徴篇曰帝貪則政暴吏酷則誅深而蝗蟲出息不急之作省役賦之費進清仁黜貪虐介損求安屈省别藏以贍國用則其救也易曰得臣無家言有天下者何私家之有詔問平城門及武庫屋各損壞臣愚以為平城門正陽之門郊祀法駕所從出門之最尊者也武庫禁兵所藏國家之本兵也變此二處異於凡屋易傳曰小人在位上下咸悖厥妖城門內崩濳潭巴曰出宮瓦自隳諸侯強陵主易傳曰一柱泥故法棄其咎宮室傾圮小人在顯位者黜之以尊上整下去暴悖之愆抑諸侯強凌主之漸率由舊章以變柱泥棄法之咎則其救也洪範傳曰六沴作見若時共禦帝用不羞神則不怒五福乃降用彰於下又特詔問朝廷焦心聞災恐懼每訪羣公卿士皆各括囊迷國莫肯建忠規闕以雍博學深奧退食在公故特密問宜披演所懷指陳政要所先後勿有依違顧忌以經術分别皂囊封上勿漏所聞臣雍伏惟陛下聖德允明深悼變異德音懇誠褒臣末學特埀訪及非臣螻蟻所能堪副亦臣輸寫肝膽出命之秋豈可顧患避害復使陛下不聞至戒哉臣雍頓首死罪伏思諸異各應皆亡國之怪也天於大漢殷勤不巳赤帝之精輔或未衰故屢出妖變以當責讓因以感覺則危可為安凶可作吉假使大運已移豈有譴告哉春秋魯定哀公之時周德巳絶故數十年無有日蝕此人為天所棄故也至於今者災眚之發不於他所逺則門垣近在寺署紛降目前欲使陛下豁然大悟可謂至切矣幸陛下深問臣敢不盡情以對霓墮雞化皆婦人干政之所致也即祚以來宫中無地逸竄而乳母趙嬈貴重赫赫生則資富侔於帑藏死則丘墓踰越園陵兩子受封兄弟典郡續以永樂門史霍玉依阻城社大為奸禍盜寵竊權藏晦惑之罪事必積浸然後成形虹霓集庭雌雞變化豈不謂是今者道路紛紛復云有程大人者察其風聲將為國患宜髙其隄防明其禁限深惟趙霍以為至戒論者疑太尉張皓為玉所進暗昧巳成非外臣所能審處如誠有之近者不治無以正逺傾邪在官當有所懲光祿勳偉璋所在尤貪濁九列之中豈宜有此牧守數十選代既不盡由本朝反有異輩無以示四方聖意勤勤欲清流蕩濁扶正黜邪不得但以州郡無課而已長水校尉趙玹屯騎校尉蓋升其貴已足其富已優當以見災之故為升下先羣臣引退以解易傳所載小人在位之咎伏見廷尉郭禧敦重純厚國之老成光祿大夫橋𤣥聰逹方直有山甫之姿故太尉劉寵忠實守固悃愊剛正並宜為謀主數見訪問夫宰相大臣君之四體委任責成優劣已分春秋之義以貴治賤逺間親小加大引在六逆陛階增則堂髙輔位重則上尊不宜聽納小吏雕琢大臣也又尚方工技之作洪都篇賦之文宜且消息以示憂懼詩云畏天之怒不敢戲豫天戒誠不可戲也宰府孝亷士之髙選但當察其真僞以加黜陟近者每以辟召不愼切責三公乃並以書疏小文一介之技超取選舉開請託之門違明王之典衆心不厭莫之敢言臣願陛下聽納忠言忍而絶之側身踊躍思惟萬幾以答天望以導嘉應聖朝既自約厲以身率人左右近臣亦宜戮力從化人自抑損天道虧滿鬼神福謙久髙不危常滿不溢羣公之福諸侯凌主之戒不可不察也臣雍愚戇感激忘身敢觸忌諱手書具對夫君臣不密上有漏言之戒下有失身之禍臣安敢漏所問願寢臣表無使盡忠之吏受怨姦仇封事臣聞天降災異緣象而至霹靂數發殆刑誅繁多之所生設論釋誨有務世公子誨於華顚胡老曰蓋聞聖人之大寶曰位故以仁守位以財聚人然則有位斯貴有財斯富行義逹道士之司也故伊摯有負鼎之衒仲尼設執鞭之言寧子有清商之歌百里有豢牛之事夫如是則聖哲之通趣古人之明志也夫子生清穆之世秉醇和之靈覃思典籍韞櫝六經安貧樂賤與世無營沈精重淵抗志髙冥包括無外綜析無形其已久矣曾不能拔萃出羣揚芳飛文登天庭序彛倫掃六合之穢慝清宇宙之埃塵連光芒於白日屬炎氣於景雲時逝嵗暮默而無聞小子惑焉是以有云方今聖上寬明輔弼賢知崇英逸偉不墜於地德𢎞者建宰相而裂土才羡者荷榮祿而䝉賜盍亦回塗要至俯仰取容輯當世之利定不拔之功榮家宗於此時遺不滅之令蹤夫獨未之思邪何為守彼而不通此胡老慠然而笑曰若公子所謂覩曖昧之利而忘昭晳之害專必成之功而忽蹉跌之敗者已公子謖爾斂𬒮而興曰胡為其然也胡老曰居吾將釋汝昔自太極君臣始基有羲皇之洪寧唐虞之至時三代之隆亦自緝熙五伯扶微勤而撫之於斯已降天網縱人紘㢮王塗壞太極陀君臣土崩上下瓦解於是智者騁詐辨者馳說武夫奮略戰士講鋭電駭風馳霧散雲披變詐乖詭以合時宜或畫一策而綰萬金或談崇朝而錫瑞圭連衡者六印磊落合從者駢組流離隆貴翕習積富無崖據巧蹈機以忘其危夫華離蒂而萎條去幹而枯女冶容而淫士背道而辜人毁其滿神疾其邪利端始萌害漸亦芽速速方穀夭夭是加欲豐其屋乃蔀其家是故天地否閉聖哲濳形石門守晨沮溺耦耕顔歜抱璞蘧瑗保生齊人歸樂孔子斯征雍渠驂乘逝而遺輕夫豈慠主而背國乎道不可以傾也且我聞之日南至則黃鍾應融風動而魚上氷蕤賔統則微隂萌蒹葭蒼而白露凝寒暑相推隂陽代興運極則化理亂相承今大漢紹陶唐之洪烈蕩四海之殘灾隆隱天之髙拆絙地之基皇道惟融帝猷丕顯泜泜庶類含甘吮滋檢六合之羣品濟之乎雍熙羣僚恭巳於職司聖主垂拱乎兩楹君臣穆穆守之以平濟濟多士端委縉綎鴻漸盈階振鷺充庭譬猶鍾山之玉泗濱之石纍圭璧不為之盈採浮磬不為之索曩者洪源辟而四隩集武功定而干戈戢獫狁攘而吉甫宴城濮捷而晉凱入故當其有事也則蓑笠並載擐甲揚鋒不給於務當其無事也則舒紳緩佩鳴玉以步綽有餘裕夫世守閥子􅉏御之族天隆其祐主豐其祿抱膺從容爵位自從攝須理髯餘官委貴其進取也順傾轉圓不足以喻其便逡巡放屣不足以况其易夫夫有逸羣之才人人有優贍之智童子不問疑於老成瞳矇不稽謀於先生心恬淡於守髙意無為於持盈粲乎煌煌莫非華榮明哲泊焉不失所寧狂淫振蕩乃亂其情貪夫殉財夸者死權瞻仰此事體躁心煩暗謙盈之效迷損益之數騁駑駘於修路慕騏驥而增驅卑俯乎外戚之門乞助乎近貴之譽榮顯未副從而顚踣下獲熏胥之辜髙受滅家之誅前車已覆襲軌而騖會不鍳禍以知畏懼豫惟悼哉害其若是天髙地厚局而蹐之怨豈在明患生不思戰戰兢兢必愼厥尤且用之則行聖訓也舍之則藏至順也九河盈溢非一凷所防帶甲百萬非一勇所抗今子責匹夫以清宇宙寧可以水旱而纍堯湯乎懼煙炎之燬􅑒何光芒之敢揚哉且夫地將震而樞星直井無景則日隂食元首寬則望舒朓侯王肅則月側匿是以君子推微逹著尋端見緒履霜知冰踐露知暑時行則行時止則止消息盈沖取諸天紀利用遭泰可與處否樂天知命持神任已羣車方奔乎險路安能與之齊軌思危難而自豫故在賤而不耻方將騁馳乎典籍之崇塗休息乎仁義之淵藪槃旋乎周孔之庭宇揖儒墨而與為友舒之足以光四表收之則莫能知其所有若乃丁千載之運應神靈之符闓閶闔乘天衢擁華蓋而奉皇樞納𤣥策於聖德宣太平於中區計合謀從已之圗也勳績不立豫之辜也龜鳯山翳霧露不除踴躍草萊秪見其愚不我知者將謂之迂修業思真棄此焉如靜以俟命不斁不渝百嵗之後歸乎其居幸其獲稱天所誘也罕漫而已非已咎也昔伯翳綜聲於鳥語葛盧辨音於鳴牛董父受氏於豢龍奚仲洪德於衡輈倕氏興政於巧工造父登御於驊驑非子享土於善圉狼瞫取右於禽囚弓父畢精於筯角佽飛明勇於赴流壽王創基於格五東方要幸於談優上官效力於執蓋𢎞羊據相於運籌僕不能參跡於若人故抱璞而優遊於是公子仰首降階忸怩而避胡老乃揚衡含笑援琴而歌歌曰練余心兮浸太清滌穢濁兮存正靈和液暢兮神氣寧情志泊兮心亭亭嗜欲息兮無由生踔宇宙而遺俗兮眇翩翩而獨征月令問答問者曰子何為著月令說也豫幼讀記以為月令體大經同不宜與記書雜録並行而記家記之又略及前儒特為章句者皆用其意傳非其本㫖又不知月令徴驗布在諸經周官左傳實與禮記通他議橫生紛紛久矣光和元年余被謗章罹重罪徙朔方內有獫狁敵衝之釁外有寇虜鋒鏑之艱危險凛凛死亡無日過被學者聞家就而考之亦自有所覺悟庶幾頗得事情而訖未有注記著於文字也懼顚蹶隕墜無以示後同於朽腐竊誠思之書有隂陽升降天文厯數事物制度可假以為本敦辭托說審求厯象其要者莫大於月令故遂於憂怖之中晝夜密勿昧死成之旁貫五注參互羣書至及國家律令制度遂定厯數盡天地三光之情辭繁多而蔓衍非所謂理約而逹也道長日短危殆兢惕取其心盡而已故不能復加刪省蓋所以探賾辨物庶幾多識前言往行之流茍便學者以為可覽則余死而不朽也問者曰子說月令多類周官左傳假無周官左傳月令為無說乎曰夫根柢植則枝葉必相從也月令與周官並為時王政令之記異文而同體官名百職皆周官解月令甲子沈子所謂似春秋也若夫太昊蓐收勾芒祝融之屬左傳造義立說生名者同是以用之問者曰既用古文於厯數乃不用三統用四分何也曰月令所用參諸厯象非一家之事傳之於世不曉學者宜以當時所施行夫密近者三統巳踈濶廢弛故不用也問者曰既不用三統以驚蟄為孟春春中雨水為二月節皆三統法也獨用之何曰孟春月令曰蟄蟲始震在正月也中春始雨水則雨水二月也以其合故用之問者曰厯云小暑季夏節也而今文見於五月何也曰今不以厯節言據時始暑而記也厯於大雪小雪大寒小寒皆去十五日然則小暑當去大暑十五日不得及四十五日不以節言據時暑也問者曰中秋令不用犧牲以圭璧更皮幣不犧牲何也曰是月獻羔以太牢祝髙禖宗廟之祭以中月安得用犧牲祈者求之祭也著令者豫設水旱疫癘當禱祈用犧牲者是用之助生養傳祈以幣代牲章因於髙禖之事乃造說曰更者刻木代牲如廟有祧更此說自欺極矣經典傳記無刻木代牲之說蓋書有轉誤三豕渡河之類也問者曰中冬令曰奄尹申宮令謹門閭今曰門闈何也曰閹尹者內官也主宫室出入宫中宫中之門曰闈閹尹之職也閭里門非閹尹所主知當作闈也問者曰令曰七騶咸駕今曰六騶何也曰本官職者莫正於周官周官天子馬六種種别有騶故知六騶左氏傳晋程鄭為乘馬御六騶屬焉無言七者知當為六也問者曰令以中秋築城郭於經傳為非其時詩曰定之方中作於楚宫定營室也九月十月之交西南方中故傳曰小昏正而栽築即營室也昏正者昏中也栽築者栽木而始築也今文在前月不合於經傳也問者曰子說三難皆以日行為本古論周官禮記說以為但逐惡而已獨安所取之曰取之於月令而已四時通等而夏無難文由日行也春行少隂秋行少陽冬行太隂隂陽背使不於其類故冬春難以助陽秋難以逹隂至夏節太陽行太隂自得其類無所扶助獨不難取之於是也問者曰反令每行一時轉三旬以應行三月政也春行夏令則雨水不時謂孟夏也草木蚤枯中夏也國乃有恐季夏也今總合為一事不分别施之於三月何也曰說者見其三旬不得傳注而為之說有所滯礙不得通矣孟春反令行冬令則草木枯後乃大水敗其城郭即分為三事後乃大水在誰後也城郭為獨自壞非水所為也季冬令曰行春令則胎夭多傷民多蠱疾命之曰逆即分為三事行季冬令為不感災異但命之曰逆也知不得斷絶分應一月也其類皆如此令之所述略舉其尤者也問春食麥羊夏食菽雞秋食麻犬冬食黍豕之屬但以為時味之宜不合於五行月令服食器械之制皆順五行者也說所食獨不以五行不已略乎曰蓋亦思之矣凡十二辰之禽五時所食者必家人所畜丑牛未羊戍犬酉雞亥豕而已其餘龍虎以下非食也春木王木勝土土王四季四季之禽牛屬季夏犬屬季秋故未羊可以為春食也夏火王火勝金故酉雞可以為夏食也季夏土王土勝水故食豕而食牛土五行之尊者牛五畜之大者四行之牲無足以配土德者故以牛為季夏食也秋金王金勝木寅虎非可食者犬齒而無角虎屬也故以犬為秋食也冬水王水勝火當食馬而禮不以馬為牲故以其類而食豕也然則麥為木菽為金麻為火黍為水各配其牲為食也雖有此說而米鹽精粹不合於易卦所為之禽及洪範傳五事之畜近似卜筮之術故豫略之不以為章句聊以應問見有說而已問記曰三老五更子獨曰五叟周禮曰八十一御妻今曰御妾何也曰字誤也叟長老之稱其字與更相似書者轉誤遂以為更嫂字女旁瘦字從叟今皆以為更矣立字法者不以形聲何得以為字以嫂瘦推之知是更為叟也妻者齊也惟一適人稱妻其餘皆妾位最在下是以不得言妻云也連珠廣連珠臣聞目瞤耳鳴近夫小戒也狐鳴犬嘷家人小妖也猶忌愼動作封鎮書符以防其禍是故天地示異災變橫起則人主恆恐懼而修政道為知者設馬為御者良賢為聖者用辨為知者通頌東巡頌有序竊見巡狩岱宗柴望山川宗祀明堂上稽帝堯中述世宗遵奉光武禮儀備具動自聖心是以神眀屢應休徴乃降不勝狂簡之情謹上岱宗頌一篇曰若稽古在漢迪哲聿修厥德憲章丕烈翿六龍較五輅齊百僚陶質素命南重以司厯厥中月之六辰備天官之列衛盛輿服而東巡按藝文及古文苑俱稱班固作而舊刻中即集亦載是篇姑兩存之南巡頌惟漢再受命系葉十一協景和則天經郊髙宗光六幽通神眀既禘祖於西都又將祫於南庭是時聖上運天官之法駕建日月之旃旌舊集不載此篇而藝文云蔡雍作姑并存之胡廣黃瓊頌巖巖山嶽配天作輔降臣有周生申及甫允兹漢室誕育二后曰胡曰黃方軌齊武惟道之淵惟德之藪股肱元首代作心膂天生蒸人有則有類我胡我黃鍾厥純懿巍巍特進仍踐其位赫赫三事七佩其紱奕奕四牡沃若六轡衮職龍章其文其蔚參曜乾台窮寵極貴功加八荒羣生以遂超哉邈乎莫與為二京兆樊惠渠頌洪範八政一曰食周禮九職一曰農有生之本於是乎出貨殖財用於是乎在九土上沃為大田多稔然而地有埆塉川有墊下溉灌之便行趍不至明哲君子創業農事因髙卑之宜驅自行之勢以盡水利而富國饒人自古有焉若夫西門起鄴鄭國行秦李氷在蜀信臣治穰皆此道也陽陵縣東其地衍隩土氣辛螫嘉榖不植草萊焦枯而涇水長流溉灌維首編戶齊氓庸力不供牧人之吏謀不假給蓋常興役猶不克成光和五年京兆尹樊君諱陵字德雲勤恤人隱悉心政事茍有可以惠斯人者無聞而不行焉遂咨之郡吏申於政府僉以為因其所利之事者不可已者也乃命方略大吏麴遂令伍瓊揣度計慮揆程經用以事上聞付在三府司農遂取財於豪冨借力於黎元樹柱纍石委薪積土基跂工堅體勢強壯折湍流欵曠陂㑹之於新渠疏水門通窬瀆灑之於畎畝清流浸潤泥潦浮游昔日鹵田化為甘壤粳黍稼穡之所入不可勝算農民熙怡恱豫相與謳談疆畔斐然成章謂之樊惠渠云其歌曰我有長流莫或遏之我有溝澮莫或達之田疇斥鹵莫修莫釐饑饉困悴莫恤莫思乃有樊君作人父母立我畎畝黃潦膏凝多稼茂止惠乃無疆如何勿喜我壤既營我疆斯成泯泯我人既富且盈為酒為釀蒸彼祖靈貽福惠君壽考且寧陳留太守行小黃縣頌大皓為政建時春陽我君勤止戾兹小黃濟濟羣吏攝齊升堂乃訓乃厲示之憲方原罪以心察獄以情欽於刑濫惟務求輕有辜小罪放死從生𤣥化洽矣黔首用寧惟以作頌式昭德聲考城縣頌曖曖𤣥路北至考城勸兹穡民東作是營農桑之業為國之經我君勤心德音邈成率爾苖民慎不敬聽女執伊筐男執其耕申戒羣僚務在寬平罪人赦宥囹圄用清祖德頌有序昔文王始受命武王定禍亂至於成王太平乃洽祥瑞畢降夫豈后德熙隆漸浸之所通也是以易嘉積善有餘慶詩稱子孫保之非特王道然也賢人君子修仁履德者亦其有焉昔我烈祖暨于豫考世載孝友重以明德率禮莫違是以靈祇降之休瑞兔擾馴以昭其仁木連理以象其義斯乃祖禰之遺靈盛德之所貺也豈我童䝉孤稚所克任哉乃為頌曰穆穆我祖世篤其仁其德克明惟懿惟醇宣慈惠和無競伊人巖巖我考蒞之以莊增崇丕顯克構其堂是用祚之休徵惟光厥徵伊何於昭于今園有甘棠别幹同心墳有擾兔宅我柏林神不可誣僞不可加析薪之業畏不克荷矧貪靈貺以為已華惟豫小子豈不是欲于有先功匪榮伊辱麟頌皇矣大角降生靈獸視明禮修麒麟來孚春秋既書爾來告就庶士子鉏獲諸西狩五靈頌大梁乘精白虎用生思睿信立繞于垣坰贊太尉陳公贊公在百里有西産之惠賜命方伯分陜餘慶餘慶伊何兆民其觀少者是懷老者是安綱紀文王文王用平東督京輦京輦用清乃登三事三事攸寧契稷之佐具干堯庭今則由古於穆誕成焦君贊猗歟焦君常比𤣥墨衡門之下栖遲偃息泌之洋洋樂以忘食鶴鳴九臯音亮帝側乃徵乃用將受衮職昊天不弔賢人遘慝不遺一老屏此四國如何穹蒼不照斯域惜哉朝廷喪兹舊德恨兹學士將何法則琴贊惟彼雅器載璞靈山體其德真清和自然澡以春雪淡若洞泉溫乎其仁玉潤外鮮漢魏六朝百三家集卷十八
