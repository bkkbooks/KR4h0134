body:
  text: 漢魏六朝百三家集巻七十五齊王儉集題詞王仲寳年六嵗拜受茅土未三十即位令僕身尚公主爵享元侯佩刀淮水徴祥巳極然早痛死父中厄天年福造不完非人力也宋齊議禮家各為説吉凶參會咸禀仲寳即史書所傳可謂非七志之膏腴乎齊臺佐命褚王並推彦回風則同朝欽賞若援論古今宣明朝典必仲寳居前彼雖風流自命欲比安石時論未許抑觀自古宰相議禮通達漢韋𤣥成匡衡以後不多見也褚公貴而善藝徒以别鶴琴曲銀柱琵琶稱説名士其能則樂官伎弄耳寜望王僕射乎且二子皆齊貴戚逢迎興運不臣跡同而世尤惡禇者豈非以羅􅘼負約石頭偷生直犬豕目之於仲寳則猶憐其父死非命或有伍胥乞食之志而不難以國販也目録賦靈丘竹賦和竟陵王髙松賦表諫壞宋明帝紫極殿以材柱起宣陽門表請解僕射表又求解尚書表議郊殷議二郊明堂議日蝕不廢社祠議南郡王昭業冠議公府長史朝服議又議帝后諱議冕旒議皇后遷祔祭奠議奠祭設虞議皇太子妃服議太子妃建銘旌議太子迎車駕議太子妃旒翣議穆妃朔望設祭議穆妃詳議答褚淵難答王逡問君母服議入學釋奠議褚淵拜録議司空椽屬為褚淵服議司徒府史為褚淵服議史條例議奏諒闇親奉蒸甞奏啓先郊後春啓請江斆還本啓章拜儀同三司章牋與豫章王嶷牋書答陸澄經義問答曲禮問答周易問答孝經問答贊竟陵王山居贊碑文太宰文簡褚彦回碑文連珠畼連珠哀策髙帝哀䇿文皇太子妃哀䇿文詩侍皇太子釋奠宴侍太子九日宴𤣥圃詩贈徐孝嗣春日家園春詩其二春夕後園餞從兄豫章失題南郊樂歌髙徳宣烈樂太廟樂歌髙徳宣烈樂穆徳凱容樂明徳凱容樂齊白紵辭漢魏六朝百三家集巻七十五目録欽定四庫全書漢魏六朝百三家集巻七十五明張溥輯齊王儉集賦靈丘竹賦靈丘深沈蔓竹凝隂神根合拱楨榦百尋振芳條乎崑岳敷綠采於髙岑沿淮海而蔚映帶沮漳而蕭森至東南而擅美在淇衛而流音方靈壽而均茂儀菌桂而成林若乃青春受謝九野舒榮綠蘋齊葉白芷抽萌榦葱葱而特秀篠擢影而垂英霜皦鏡於原隰木衰疏於郊阡翠葉與飛雪爭采貞柯與曽氷競鮮和竟陵王髙松賦山有喬松峻極青葱既抽榮於岱嶽亦擢頴於荆峯若乃朔窮於紀嵗亦莫止隆冰峩峩飛雪千里嗟萬有之必衰獨貞華之無巳積皓霰而爭光延微颷而響起表諫壞宋明帝紫極殿以材柱起宣陽門表臣聞徳者身之基儉者徳之輿春臺将立晉卿秉議北宫肇搆漢臣盡規彼二君者或列國常侯或守文中主尚使諌諍在義即悦況陛下聖哲應期臣等職司隆重敢藉前誥竊乃有心陛下登庸宰物節省之教既昭龍衮璇極簡約之訓彌逺乾華外構采椽不斵紫極故材為宣陽門臣等未譬也夫移心疾於股肱非良醫之美畏影迹而馳騖豈静處之方且又三農在日千畛咸事輟望嵗之勤興土木之役非所以宣昭大猷光示遐邇若以門居宫南重陽所屬年月稍久漸就淪胥自可隨宜修理而合度改作之煩於是乎息所啓謬合請付外施行請解僕射表臣逺尋終古近察身事邀恩幸藉未見其倫何者子房之遇漢后公達之逢魏君史籍以為美談君子稱其髙義二臣才堪王佐理非曲私兩主專㐲威武有傷寛裕豈與庸流之人憑含宏之澤者同年而語哉預在有心胡寜無感如使傾宗殞元有益塵露猶當畢志驅馳仰詶萬一豈容稍在形飾以徇常事九流任要風猷所先玉石朱紫由斯而定臣亦不謂文案之間都無微解至於品裁臧否特所未閑雖存自朂識不副意兼竊而任彼此俱壅専情本官庶㡬髣髴且前代掌選未必俱在代来何為於今非臣不可傾心奉國匪復退讓之與預同休戚寜俟位任為親陛下若不以此理賜期豈仰望於殊眷頻冒嚴威分甘尤戾又待臣於常均之外眄臣於代僚之右親乖其章乗非其器霸府方隆超居元佐國朝草昧參贊百揆求解尚書表臣比年辭選具簡天朝欵言彰於侍接丹誠布於朝野物議不以為非聖心未垂矜納臣聞智慧不如明時求之微躬實允斯義妄庸之人沈浮無取命偶休㤗遂踐康衢秋葉辭條不假風颷之力太陽躋景無俟螢爝之暉晦往明来五徳遞運聖不獨治八元亮采臣逢其時而叨其位嘗總端右承管銓衡事涉兩朝嵗綿一紀盛年巳老孫孺巾冠人物徂遷逝者将半三考無聞九流寂寞能官之詠綴響於當時大車之刺方興以来日若夫珥貂衣衮之貴四輔六教之華誠知非服職務差簡端揆雖重猶可勉勵至於品藻之任尤懼其阻夙宵罄竭屢試無庸嵗月之久近世罕比非惟悔吝在身故乃惟塵及國方今多士盈朝羣才競爽選衆而授古亦何人冒陳微翰必希天照至敬無文不敢煩黷議郊殷議南齊髙帝建元元年七月有司奏郊殷之禮未詳郊在何年復以何祖配郊殷復在何時未郊得先殷與不明堂亦應與郊同年而祭不若應祭者復冇配與無配不祀者堂殿職僚毀置云何八座丞郎通闗博士儀曹郎中裴昭明儀曹郎中孔逷議今年七月宜殷祀来年正月宜南郊明堂並祭而無配殿中郎司馬憲議南郊無配饗祠如舊明堂無配宜應廢祀其殷祀同用今年十月右僕射王儉議詔可明堂可更詳有司又奏明堂尋禮無明文唯以孝經為正竊尋設祀之意盖謂文王有配則祭無配則止愚謂既配上帝則以帝為主今雖無配不應闕祀除邈近代碩儒毎所折衷其云郊為天壇則堂非文廟此實明據内外百司立議已定如更詢訪終無異説傍儒依史竭其管見既聖㫖惟疑羣下未敢詳廢置之宜仰由天鑒詔依舊案禮記王制天子先袷後時祭諸侯先時祭後祫春秋魯僖二年祫明年春禘自此以後五年再殷禮緯稽命徴曰三年一祫五年一禘經記所論禘祫與時祭其言詳矣初不以先殷後郊為嫌至於郊配之重事由王迹是故杜林議云漢業特起不因縁堯宜以髙帝配天魏髙堂隆議以舜配天蔣濟云漢時奏議謂堯巳禪舜不得為漢祖舜亦巳禪禹不得為魏之祖今宜以武皇帝配天晉宋因循即為前式又案禮及孝經援神契並云明堂有五室天子毎月於其室聴朔布教祭五帝之神配以有功徳之君大戴禮記曰明堂者所以明諸侯尊卑也許慎五經異義曰布政之宫故稱明堂明堂盛貌也周官匠人職稱明堂有五室鄭𤣥云周人明堂五室帝一室也初不聞有文王之寢鄭志趙商問云説者謂天子廟制如明堂是為明堂即文廟耶鄭答曰明堂主祭上帝以文王配耳猶如郊天以后稷配也袁孝尼云明堂法天之宫本祭天帝而以文王配配其父於天位則可牽天帝而就人鬼則非義也泰元十三年孫耆之議稱郊以祀天故配之以后稷明堂以祀帝故配之以文王由斯言之郊為皇天之位明堂即上帝之廟徐邈謂配之為言必有神主郊為天壇則堂非文廟史記云趙綰王臧欲立明堂于時亦未有郊配漢又祀汾隂五畤即是五帝之祭亦未有郊配議者或謂南郊之日巳旅上帝若又以無配而特祀明堂則一日再祭於義為黷案古者郊本不共日蔡邕獨斷曰祠南郊祀畢次北郊又次明堂髙廟世祖廟謂之五供馬融云郊天之祀咸以夏正五氣用事有休有王各以其時兆以方郊四時合嵗功作相成亦以此月總旅明堂是則南郊明堂各日之證也近代從省故與郊同日猶無煩黷之疑何者其為祭雖同所以致祭則異孔晁云言五帝佐天化育故有従祀之禮旅上帝是也至於四郊明堂則是本祀之所譬有功臣從饗豈復廢其私廟且明堂有配之時南郊亦旅上帝此則不疑於共日今何故致嫌於同辰又禮記天子祭天地四方山川五祀嵗徧尚書堯典咸秩無文詩云昭事上帝聿懐多福據此諸義四方山川猶必享祀五帝大神義不可畧魏文帝黄初二年正月郊天地明帝太和元年正月以武皇帝配天文皇帝配上帝然則黄初中南郊明堂皆無配也又郊日及牲色異議紛然郊特牲云郊之用辛周之始郊也盧植云辛之為言自新絜也鄭𤣥云用辛日者為人當齋戒自新絜也漢魏以来或丁或巳而用辛常多考之典據辛日為允郊特牲又云郊牲幣宜以正色繆襲據祭法云天地騂犢周家所尚魏以建丑為正牲宜尚白白虎通云三王祭一用夏正所以然者夏正得天之數也魏用異朔故牲色不同今大齊受命建寅創厯郊廟用牲一依晉宋謂宜以今年十月殷祀宗廟自此以後五年再殷来年正月上辛有事南郊宜以共日還祭明堂又用次辛饗祀北郊而並無配犧牲之色率有舊章二郊明堂議四年世祖即位其秋有司奏尋前代嗣位或仍前郊年或别始晉宋以来未有畫一今年正月已郊未審明年應南北二郊祀明堂與不依舊通闗八座丞郎博士議尚書令王儉議尚書領國子祭酒張緒等十七人並同儉議詔可案秦為諸侯雜祀諸畤始皇并天下未有定祠漢髙受命因雜四畤而起北畤始祠五帝未定郊丘文帝六年新垣平議初起渭陽五帝廟武帝初至雍郊見五畤後常三嵗一郊祠雍元鼎四年始立后土祠於汾隂明年立太一祠於甘泉自是以後二嵗一郊與雍更祠成帝初即位丞相匡衡於長安定南北郊哀平之際又復甘泉汾隂祠平帝元始五年王莽奏依匡衡議還復長安南北二郊光武建武二年定郊祀兆於洛陽魏晉因循率由漢典雖時或參差而類多間嵗至於嗣位之君參差不一宜有定制檢晉明帝太寕五年南郊其年九月崩成帝即位明年改元即郊簡文咸安二年南郊其年七月崩孝武即位明年改元亦郊宋元嘉三十年正月南郊其年二月崩孝武嗣位明年改元亦郊此則二代明例差可依放謂明年正月宜饗祀二郊䖍祭明堂自茲厥後依舊間嵗日蝕不廢社祠議永明元年十二月有司奏今月三日臘祠太社稷一日合朔日蝕既在致齋内未審於社祠無疑不曹檢未有前准尚書令王儉議詔可禮記曽子問天子嘗禘郊社五禮之祭簠簋既陳唯大喪乃廢至於當祭之日火日蝕則停尋伐鼔用牲由来尚矣而簠簋初陳問所不及據此而言致齋初日仍值薄蝕則不應廢祭又初平四年士孫瑞議以日蝕廢社而不廢郊朝議従之王者父天親地郊社不殊此則前准謂不宜廢南郡王昭業冠議永明五年十月有司奏南郡王昭業冠求儀注未有前准尚書令王儉議僕射王奐等十四人議並同並撰立贊冠醮酒二辭詔可皇孫冠事厯代所無禮雖有嫡子嫡孫然而地居正體下及五世今南郡王體自儲暉實惟國裔元服之典宜異列蕃案士冠禮主人元冠朝服賓加其冠贊者結纓鄭𤣥云主人冠者之父兄也尋其言父及兄則明祖在父不為主也大戴禮記公冠篇云公冠自為主四加𤣥冕以卿為賓此則繼體之君及帝之庶子不得稱子者也小戴禮記冠義云冠於阼以著代也醮於客位三加彌尊加有成也注稱嫡子冠於阼庶子冠於房記又云古者重冠故行之于廟所以自畀而尊先祖也據此而言彌與鄭注儀禮相會是故中朝以来太子冠則皇帝臨軒司徒加冠光禄贊冠諸王則郎中加冠中尉贊冠今同於儲皇則重依於諸王則輕又春秋之義不以父命辭王父命禮父在斯為子君在斯為臣皇太子居臣子之節無専用之道南郡雖處蕃國非支庶之列宜禀天朝之命微申冠阼之禮晉武帝詔稱漢魏遣使冠諸王非古正典此盖謂庶子封王合依公冠自主之義至於國之長孫遣使惟允宜使太常持節加冠大鴻臚為贊醮酒之儀亦歸二卿祝醮之辭附准經記别更撰立不依蕃國常體國官陪位拜賀自依舊章其日内外二品清官以上詣止車集賀並詣東宫南門通牋别日上禮宫臣亦詣門稱賀如上臺之儀既冠之後尅日謁廟以宏尊祖之義此既大典宜通闗八座丞郎並下二學詳議公府長史朝服議後宋廢帝元徽四年上議為沈俁之所駁遂寝春秋國語云貌者情之華服者心之文巖廊盛禮衣冠為大是故軍國異容内外殊序而自頃承用毎有乖違府職掌人教四方是則臣居毘佐志在當官永言先典載懷夕惕案晉令公府長史官品第六銅印墨綬朝服進賢兩梁冠掾屬官品第七朝服進賢一梁冠晉官表注亦與令同而今長史掾屬但著朱服而已此則公違明文積習成謬謂宜依舊制長史兩梁冠掾屬一梁冠並同備朝服中單韋舄率由舊章若所上蒙允並請班司徒二府及諸儀同三府通為永凖又尋舊事司徒公府領步兵者職僚悉同降朝不領兵者主簿祭酒中單韋舄並備令史以下唯著𤣥衣今府既開公謹遵此制其或有署臺位者𤣥服為宜按令稱謹有兼官皆從重官之例㝷内官為重其署臺位者悉宜著位之服不在𤣥服之例若署諸卿寺位兼府職者雖三品而卿寺為卑則宜依公府元衣之制服章事重禮儀所先請臺詳服又議自頃服章多闕有違前凖近議依今文被報不宜改革又稱左丞劉議按今文凡有朝服今多闕亡然則文存服損非唯鉉佐用舍既久即為舊章如下㫖㐲尋皇宋受終毎因晉舊制律令條章同規在昔若事有宜必合懲改則當上闗詔書下由朝議縣諸日月垂則後昆豈得因外府之乖謬以為盛宋之興典用晉氏之律令而謂其儀為穨法哉順違従失非所望於髙議申明舊典何改革之可論又左丞引令史之闕服以為鉉佐之明比夫名位不同禮數異等令史從損或有權宜達官簡畧為失彌重又主簿祭酒備服於王庭長史掾屬朱衣以就列於是倫比自成矛盾此而可忍孰不可安将引令以遵舊臺據失以為例研詳符㫖良所未譬當官而行何强之有制令昭然守以無貳帝后諱議建元元年太常上朝堂諱訓僕射王儉議后諱依舊不立訓禮天子諸侯諱羣祖臣𨽻既有従敬之義宜為太常府君諱至於朝堂榜題本施至極既迨尊所不及禮降於在三晉之京兆宋之東安不列榜題孫毓議稱京兆列在正廟臣下應諱而不上榜宋初博士司馬道敬議東安府君諱宜上榜何承天執不同即為明據其有人名地名犯太常府君及帝后諱者皆改宣帝諱同二名不偏諱所以改承明門為北掖以榜有之字與承並東宫承華門亦改為宣華云冕旒議依漢三公服山龍九章卿華螽七章皇后遷祔祭奠議建元四年髙帝山陵昭皇后應遷祔祠部疑有祖祭及遣啟諸奠九飯之儀不左僕射王儉議從之奠如大歛賀循云従墓之墓皆設奠如将葬廟朝之禮范寗云将窆而奠雖不稱為祖而不得無祭奠墓設虞議有司又奏昭皇后神主在廟今遷祔葬葬有虞以安神神既巳處廟改葬出靈豈應虞祭鄭注改葬云從廟之廟禮宜同從墓之墓事何容異前代謂應無虞左僕射王儉議從之范寗云𦵏必有䰟車若不為其歸神将安舎世中改𦵏即墓所施靈設祭何得不祭而毀也賀循云既窆設奠於墓以終其事雖非正虞亦粗相似晉氏修復五陵宋朝敬后改𦵏皆有虞今設虞非疑皇大子妃服議建元二年皇太子妃薨前宫臣疑所服左僕射王儉議從之禮記文王世子父在斯為子君在斯為臣且漢魏以来宫僚充備臣𨽻之節具體在三昔庾翼妻喪王允滕宏謂府吏宜有小君之服況臣節之重耶宜依禮為舊君妻齊衰三月居官之身並合屬假朝晡臨哭悉繫東宫今臣之未從官在逺者於居官之所屬寜二日半仍行喪成服遺牋表不得赴太子妃建銘旌議太子妃斬草乗黄議建銘旌僕射王儉議禮既塗棺祝取銘置於殯東大歛畢便應建於西階之東太子迎車駕議穆妃薨成服日車駕出臨喪朝議疑太子應出門迎左僕射王儉議尋禮記服問君所主夫人妻太子嫡婦言國君為此三人為主喪也今鑾輿臨降自以主喪而至雖因事撫慰義不在吊南郡以下不應出門奉迎但尊極所臨禮有變草權去杖經移立户外足表情敬無煩止哭皇太子既一宫之主自應以車駕幸宫依常奉候既當成服之日吉凶不相干宜以衰幘行事望拜止哭率繇舊章尊駕不以臨弔奉迎則惟常體求之情禮如為可安太子妃旒翣議宋大明二年太子妃薨建九旒有司又議斬草日建旒與不若建旒應㡬旒及畫龍升降云何又用㡬翣僕射王儉議從之旒本是命服無闗於凶事今公卿以下平存不能備禮故在凶乃建耳東宫秩同上公九命之儀妃與儲君一體義不容異無縁未同常例别立凶旒大明舊事是不經詳議率爾便行耳今宜考以禮典不得效尤從失吉部伍自有桁輅凶部别有銘旌若復立旒復置何處翣自用八穆妃朔望設祭議有司奏穆妃卒哭後靈還在道遇朔望當須設祭否王儉議時議從之既虞卒哭祭之於廟本是祭序昭穆耳未全同卒吉四時之祭也所以有朔望殷事蕃國不行權制宋江夏王妃卒哭以後朔望設祭帝室既以卒哭除喪無縁方有朔望之祭靈筵雖未升廟堂而舫中即成行廟猶如桓𤣥及宋髙祖長沙臨川二國並有移廟之禮豈復謂靈筵在途便設殷事耶推此而言朔望不復俟祭宋懿后時舊事不及此益可知穆妃詳議建元三年有司奏皇太子穆妃以去年七月薨其年閏九月數閏為應以閏附正月若用月數數閏者南郡王兄弟便應以此四月晦􅘁祥至於祥月不為有疑不左僕射王儉議三百六旬尚書明義文公納幣春秋致譏榖梁云積分而成月公羊云天無是月雖然左氏謂告朔為得禮是故先儒咸謂三年朞喪嵗數沒閏大功以下月數數閏夫閏者盖是年之餘日而月之異朔所以吳商云舎閏以正朞允協情理今杖朞之喪雖以十月而小祥至於祥縞必須周嵗凡厭屈之禮要取象正服祥縞相去二月厭降小祥亦以則之又且求之名義則小祥本以年限考之倫例則相去必應二朔今以厭屈而先祥不得謂此事之非期事既同條情無異貫没閏之理固在言先設令祥在此晦則去縞三月依附准例益復為礙謂應須五月晦乃祥此國之大典宜共精詳並通闗八座丞郎研盡異同答禇淵難尚書令禇淵難儉議曰厭屈之典由所尊奪情故祥縞備制而年月不申今以十一月而祥從期可知既計以月數則應數閏以成典若猶含之何以異於縞制疑者正以祥之當閏月數相縣積分餘閏㦄象所宏計月者數閏故有餘月計年者苞含故致盈積稱理従制有何不可儉荅淵難隨事解釋祠部郎中王珪之議謂喪以閏施功衰以下小祥值閏則畧而不言今雖厭祥名猶存異於餘服計月為數屈追慕之心以逺為通日既餘分月非正朔含而全制於情唯允僕射儉議理據詳博謹所附同今司徒淵始雖疑難再經往反未同儉議依舊八座丞郎通共博議為允以來年五月晦小祥其祥禫自依常限奏御班下内外詔可含閏之議通儒所難但祥本應期屈而不遂語事則名體俱存論哀則情無異迹雖數月義實計年閏是年之歸餘故宜總而苞之期而兩祥縁尊故屈祥則没閏象年所申屈甲兼著二途具舉經紀之㫖其左茲乎如使五月小祥六月乃閏則祥之去縞事成二月是為十一月以象前期二朔以放後嵗名有區域不得相參魯襄二十八年十二月乙未楚子卒唯書上月初不言閏此又附上之明義也鄭射王賀唯云期則沒閏初不復區别杖期之中祥将謂不俟言矣成休甫云大祥後禫有閏别數之明杖期之祥不得方於綅縞之末即恩如彼就例如此答王逡問皇太子穆妃服尚書右丞兼著作郎王逡問左僕射王儉中軍南郡王小祥應待聞喜否穆妃七月二十四日薨聞喜公八月發哀訃十一月之限應在六月南郡王為當同取六月則大祥復申一月應用八月非復正月在存親之義若各自為祥廬堊相間𤣥素相糅未審當有此疑不司徒禇淵等二十人並同儉議為允請以為永制詔可送往有巳復生有節㒺極非服制所申祥縞明示終之斷相待之義經記無聞世人多以廬室衰麻不宜有異故相去一二月者或曰以俱除此所謂任情徑行未達禮㫖昔撰喪記巳嘗言之逺還之人自有為而未祭在家之子立何辭以不變禮有除喪而歸者此則經記之遺文不待之明據假使應待則相去彌年亦宜必待乃為衰絰永服以窮生吉蠲長絶於宗廟斯不可矣苟曰非宜則旬月之間亦不容申何者禮有倫序義無徒設今逺則不待近不相須禮例既乖即心無取若疑兄弟同居吉凶乖雜則古有異宫之義設無異宫則逺還之子自應開立别門以終喪事靈筵祭奠同在家之人再朞而毀所以然者奔喪禮云為位不奠鄭𤣥云以其精神不存乎此也聞哀不時實縁在逺為位不奠益有可安此自有為而然不闗嫡庶庶子在家亦不待嫡矣而況儲妃正體王室中軍長嫡之重天朝又行權制進退彌復非疑謂不應相待中軍祥縞之日聞喜致哀而巳不受弔慰及至忌辰變除昆弟亦宜相就寫情而不對客此國之大典宜通闗八座丞郎共盡同議然後奏御君母服議建元三年太子穆妃薨南郡王聞喜公國臣疑制君母服儉又議禮庶人為國君齊衰先儒云庶人在官若府史之屬是也又諸侯之大夫妻為夫人服繐衰七月以此輕微疎逺故不得盡禮今皇孫自是蕃國之王公太子穆妃是天朝之嫡婦宫臣得申小君之禮國官豈敢為夫人之敬當單衣白帢素帶哭於中門外毎臨輒入與宫官同入學釋奠議齊武帝永明三年春詔立學創立堂宇召公卿子弟下及貟外郎之𦙍凡學生二百人其年秋中悉集有司奏宋元嘉舊事學生到先釋奠先聖先師禮又有釋菜未詳今當行何禮用何樂及禮器尚書令王儉上議其冬皇太子講孝經親臨釋奠車駕幸聴周禮春入學釋菜合舞記云始教皮弁祭菜示敬道也又云始入學必祭先聖先師中朝以来釋菜禮廢今之所行釋奠而巳金石爼豆皆無明文方之七廟則輕比之五禮則重陸納車𦙍謂宣尼廟宜依亭侯之爵范寗欲依周公之廟用王者儀范宣謂當其為師則不臣之釋奠日備帝王禮樂此則車陸失於過輕二范傷於太重喻希云若至王者自設禮樂則肆賞於至敬之所若欲嘉美先師則所況非備尋其此説守附情理皇朝屈尊宏教待以師資引同上公即事惟允元嘉立學裴松之議應舞六佾以郊樂未備故權奏登歌今金石巳備宜設軒懸之樂六佾之舞牲牢器用悉依上公禇淵拜録議髙帝崩遺詔以淵為録尚書事江左以来無單拜録者有司疑立優䇿尚書令王儉議從之見居本官别拜録應有䇿書而舊事不載中朝以来三公王侯則優䇿並設官品第二䇿而不優優者褒羨䇿者兼明尚書職居天官委寄政化之本故尚書令品雖第三拜必有䇿録尚書品秩不見而總任彌重前代多與本官同拜故不别有䇿即事縁情不容均之凡僚宜有䇿書用申隆寄既異王侯不假優文司空掾屬為禇淵服議淵改授司空薨掾屬以淵未拜疑應為吏敬不王儉議依禮婦在塗聞夫家喪改服而入今掾屬雖未服勤而吏節禀於天朝宜申禮敬司徒府史為禇淵服議司徒府史又以淵既解職而未恭後授府猶應上服與不儉又議依中朝士孫徳祖從樂陵遷為陳留未入境樂陵郡吏依見君之服陳留迎吏依娶女有吉日齊衰弔司徒府宜依官制服史條例議建元二年初置史官檀超與驃騎記室江淹掌史職上表立條例開元紀號不取宋年封爵各詳本傳無假年表立十志律㦄禮樂天文五行郊祀刑法藝文依班固朝會輿服蔡邕司馬彪州郡依徐爰百官依范曄合州郡班固五星載天文日蝕載五行改日蝕入天文志以建元為始帝女體自皇宗立傳以備甥舅之重又立處士列女傳詔内外詳議僕射王儉議詔日月災𨽻天文餘如儉議金粟之重八政所先食貨通則國富民實宜加編錄以崇務本朝會志前史不書蔡邕稱先師胡廣説漢舊儀此乃伯喈一家之曲碎小儀無煩録宜立食貨省朝會洪範九疇一曰五行五行之本先乎水火之精是為日月五行之宗也今宜憲章前軌無所改革又立帝女傳亦非淺識所安若有髙徳異行自當載在列女若止於常美則仍舊不書奏諒闇親奉蒸甞奏南齊髙帝建元四年尚書令王儉採晉中朝諒闇議奏從之權典既行喪禮斯奪事興漢世而源由甚逺殷宗諒闇非有服之稱周王即吉唯宴樂為譏春秋之義嗣君踰年即位卿出並聘踐修舊好又云諸侯即位小國聘焉以繼好結信謀事補闕禮之大者至於諒闇之内而圗婚三年未終而吉禘齊歸之喪不廢蒐杞公之卒不徹樂皆致譏貶以明鑒戒自斯而談朝聘蒸甞之典卒哭而備行婚禘蒐樂之事三載而後舉通塞興廢各有自然又案大戴禮記及孔子家語並稱武王崩成王嗣位明年六月既葬周公冠成王而朝于祖以見諸侯命祝雍作頌襄十五年十一月晉侯周卒十六年正月葬晉悼公平公既即位改服修官烝于曲沃禮記曽子問孔子曰天子崩國君薨則取羣廟之主而藏諸祖廟禮乎卒哭成事而後主各反其廟春秋左氏傳凡君卒哭而祔祔而後特祀於主蒸甞禘於廟先儒云特祀於主者特以喪禮奉新亡者至於寝則不同於古蒸甞禘於廟者卒哭成事羣廟之主各返其廟則四時之祭皆即吉也三年喪畢吉禘於廟躋羣主以定新主也凡此諸議悉著在經誥昭乎方册所以晉宋因循同規前典卒哭公除親奉蒸甞率禮無違因心允協爰至泰豫元年禮官立議不宜親奉乃引三年之制自天子達又據王制稱喪三年不祭唯祭天地社稷越紼而行事曽不知自天子達本在至情既𦵏釋除事以權奪委衰襲衮孝享宜申越紼之㫖事施未葬卒哭之後何紼可越復依范宣之難杜預譙周之論士祭竝非明據晉武在喪毎欲存寕戚之懷不全依諒闇之典至於四時蒸甞盖以哀疾未堪非便頓改舊式江左以来通儒碩學所㦄多矣守而弗革義豈徒然又宜即心而言公卿大夫則負扆親臨三元告始則朝會萬國雖金石輟響而簨簴充庭情深於恒哀而跡降於凡制豈曰能安國家故也宗廟蒸甞孝敬所先寜容吉事備行斯典獨廢就令必宜廢祭則應三年永闕乃復同之他故有司攝禮進退二年彌乖典衷謂宜依舊親奉啓先郊後春啓南齊武帝永明元年當南郊而立春在郊後世祖欲遷郊尚書令王儉啓從之案禮記郊特牲云郊之祭也迎長日之至也大報天而主日也易説三王之郊一用夏正盧植云夏正在冬至後傳曰啓蟄而郊此之謂也然則圜丘與郊各自行不相害也鄭元云建寅之月晝夜分而日長矣王肅曰周以冬祭天於圜丘以正月又祭天以祈榖祭法稱燔柴太壇則圜丘也春秋傳曰啓蟄而郊則祈穀也謹尋禮傳二文各有其義盧王兩説有若合符中朝省二丘以並二郊即今之郊禮義在報天事兼祈榖既不全以祈農何必俟夫啓蟄史官唯見傳義未達禮㫖又尋景平元年正月三日辛丑南郊其月十一日立春元嘉十六年正月六日辛未南郊其月八日立春此復是近世明例不以先郊後春為嫌若或以元日合朔為礙者則晉成帝咸康元年正月一日加元服二日親祠南郊元服之重百僚備列雖在致齋行之不疑今齋内合朔此即前准若聖心過恭寜在嚴潔合朔之日散官備防非預齋之限者於止車門外别立幔省若日色有異則列於省前望實為允謂無煩遷日請江斆還本啓初宋明帝勅斆出繼從叔愻為從祖渟後于是僕射王儉啓尚書參議謂問世立後禮無其文荀顗無子立孫墜禮之始何期又立此論義無所據於是斆還本家禮無後小宗之文近世縁情皆繇父祖之命未有既孤之後出繼宗族也雖復臣子一揆而義非天屬江忠簡𦙍嗣所寄唯斆一人傍無眷屬斆宜還本若不欲江愻絶後可以斆小兒繼愻為孫章拜儀同三司章臣聞日中則昃盈虚之定分器滿必傾往事之恒理遂乃班同衮章爕和台曜外參論道内總百司物議惟塵自識非據牋與豫章王嶷牋舊楚蕭條仍嵗多故荒民散亡南史作政荒人散寔須緝理公臨蒞甫爾英風惟穆江漢来蘇八荒慕義八荒一作八州自庾亮以来荆州一作楚無復此美南史無美字政古人云期月有成而公旬日成化一作致治豈不休哉書答陸澄易體微逺實貫羣籍施孟異聞周韓殊㫖豈可専據小王便為該備一作輔依舊存鄭髙同来説元凱傳注超邁前儒若不列學官其可廢矣賈氏注經世所罕習榖梁小書無俟兩注存糜畧范率由舊式凡此諸義並同雅論疑孝經非鄭所注僕以此書明百行之首實人倫所先七畧藝文並陳之六藝不與蒼頡凡將之流也鄭注虚實前代不嫌意謂可安仍舊立置經義問答曲禮問答永明五年冬太子臨國學親臨䇿試諸生於坐問少傅王儉曰曲禮云無不敬尋下之奉上可以盡禮上之接下慈而非敬今總同敬名將不為昧儉曰鄭𤣥云禮主于敬便當是尊卑所同太子曰若如来通則忠恵可以一名孝慈不須别稱儉曰尊卑號稱不可悉同愛敬之名有時相次忠恵之異誠以聖㫖孝慈互舉竊有微據禮云不勝喪比於不慈不孝此則其義太子曰資敬事君資愛事親兼此二塗唯在一極今乃移敬接下豈復在三之義儉曰資敬奉君必同至極移敬逮下不慢而已太子曰敬名雖同深淺既異而文無差别彌復増疑儉曰繁文不可備設畧言深淺巳見傳云不忘恭敬民之主也書云奉先思孝接下思恭此又經典明文互相起發周易問答太子問王儉曰周易乾卦本施天位而説卦云帝出乎震震本非天義豈相當儉曰乾徤震動天以運動為徳故言帝出震太子曰天以運動為徳君自體天居位震雷為象豈體天所出儉曰主器者莫若長子故受之以震萬物出乎震故亦帝所與焉孝經問答儉又諮太子曰孝經仲尼居曽子侍夫孝理宏深大賢方盡其致何故不授顔子而寄曽生太子曰曽生雖徳慙體二而色養盡禮去物尚近接引非隔宏宣規教義在於此儉曰接引非隔宏宣雖易去聖轉逺其事彌輕既云人能宏道將恐人輕道廢太子曰理既有位不容以人廢言而況中賢之才宏上聖之教寜有壅塞之嫌贊竟陵王山居贊升堂踐室金暉玉朗亹亹大韶遙遙閒賞道以徳宏聲由業廣義重實歸情深虚往濠梁在茲安事遐想碑文太宰文簡禇彦回碑文夫太上有立徳其次有立功此之謂不朽所以子産云亡宣尼泣其遺愛隨武既没趙文懐其餘風於文簡公見之矣公諱淵字彦回河南陽翟人也微子以至仁開基宋段以功髙命氏爰逮兩漢儒雅繼及魏晉以降奕世重暉乃祖太傅元穆公徳合當時行比州壤深識臧否不以毀譽形言亮采王室毎懷沖虚之道可謂婉而成章志而晦者矣自茲厥後無替前規建官惟賢軒冕相襲公禀川嶽之靈暉含圭璋而挺曜和順内凝英華外發神茂初學業隆弱冠是以仁經義緯敦穆于閨庭金聲玉振寥亮于區宇孝敬淳深率由斯至盡歡朝夕人無間言逍遙乎文囿之圃翺翔乎禮樂之場風儀與秋月齊明音徽與春雲等潤韻宇宏深喜愠莫見其際心明通亮用人必猶於巳汪汪焉洋洋焉可謂澄之不清撓之不濁袁陽源才氣髙竒綜覈精裁宋文帝端明臨朝鑒賞無昧袁既延譽於遐邇文亦定昏於皇家選尚餘姚公主拜駙馬都尉漢結叔髙晉婚武子方斯蔑如也釋褐著作佐郎轉太子舎人濯纓登朝冠冕當世升降兩宫實惟時寳具瞻之範既著台衡之望斯集出參太宰軍事入為太子洗馬俄遷祕書丞贊道槐庭司文天閣光昭諸侯風流藉甚以父憂去職喪過乎哀㡬將毀滅有識留感行路傷情服闋除中書侍郎王言如絲其出如綸恪居官次智效惟穆于時新安王寵冠列蕃越敷邦教毘佐之選妙盡國華出為司徒右長史轉尚書吏部郎執銓以平御煩以簡裴楷清通王戎簡要復存於茲太始之初入為侍中曽不移朔遷吏部尚書是時天步初夷王途尚阻元戎啓行衣寇未緝内贊謀謨外康流品制勝既逺涇渭斯明賞不失勞舉無失徳績簡帝心聲敷物聴事寜贈太子右衛率固讓不拜尋領驍騎將軍以帷幄之功膺庸祇之秩封雩都縣開國伯食邑五百户既秉辭梁之介又懷寢丘之志所受田邑不盈百井久之重為侍中領右衛將軍盡規獻替均山甫之庸緝熙王旅兼方叔之望丹陽京輔逺近攸則呉興襟帶實惟股肱頻作二守並加蟬冕政以禮成民是以息明皇不豫儲后幼冲貽厥之寄允屬時望徴為吏部尚書領衛尉固讓不拜改授尚書右僕射端流平衡外寛内直宏二八之髙謨宣由庚而垂詠太宗即世遺命以公為散騎常侍中書令䕶軍將軍送往事居忠貞永亮秉國之鈞四方是維百官象物而動軍政不戒而備公之登泰階而尹天下君子以為美談亦猶孟軻致欣於樂正羊職説賞於士伯者也丁所生母憂謝職毀疾之重因心則至朝議以有為為之魯侯垂式存公忘私方進明準爰降詔書敦還攝任固請移嵗表奏相望事不我與屈巳宏化屬值三季在辰戚藩内侮桂陽失圖窺窬神器鼔棹則滄波振蕩建旌則日月蔽虧出江派而風翔入京師而雷動鳴控弦於宗稷流鋒鏃於象魏雖英宰臨戎元渠時殄而餘黨實繁宫廟憂逼公乃摠熊羆之士率不貳心之臣戮力盡規克寜禍亂康國祚於綴旒拯王維於巳墜誠由太祖之威風抑亦仁公之翼佐可謂徳刑詳禮信義戰之器也以靖難之功進爵為侯兼授尚書令中軍將軍給班劍二十人功成弗有固秉撝挹改授侍中中書監䕶軍如故又以居母艱去官雖事縁義感而情均天屬顔丁之合禮二連之善喪亦曷以踰天厭宋徳水運告謝嗣主荒怠於天位强臣憑陵於荆楚廢昏繼統之功戡亂寜民之徳公實仰贊宏規參聞神筭雖無受脤出車之庸亦有甘寢秉羽之績乃作司空山川攸序兼授衛軍戎政輯睦既而齊徳龍興順皇髙禪深達先天之運匡贊奉時之業弼諧允正徽猷宏逺樹之風聲著之話言亦猶稷契之臣虞夏荀裴之奉魏晉自非坦懷至公永監崇替孰能光輔五君寅亮二代者哉大啓南康爰登中鉉時膺土宇固辭邦教今之尚書令古之冢宰雖秩輕於衮司而任隆於百辟蹔遂冲㫖改授朝端邇無異言逺無異望帝嘉茂庸重申前册執五禮以正民簡八刑而罕用故能騁績康衢延慈哲后義在資敬情同布衣出陪鑾躅入奉帷殿仰南風之髙詠餐東抒一作野之祕寳雅議於聴政之晨披文於宴私之夕參以酒徳間以琴心曖有餘暉遙然留想君垂冬日之温臣盡秋霜之戒肅肅焉穆穆焉於是見君親之同致知在三之如一太祖升遐綢繆遺寄以侍中司徒錄尚書事禀玉几之顧奉綴衣之禮擇皇齊之令典致聲化於雍熙内平外成實昭舊職増給班劍三十人物有其容徽章斯允位尊而禮卑居髙而思降自夏徂秋以疾陳退朝廷重違謙光之㫖用申超世之尚改授司空領驃騎大將軍侍中録尚書如故景命不永大漸彌留建元四年八月二十一日薨於私第春秋四十有八昔栁莊疾棘衛君當祭而輟禮晏嬰既往齊君趨車而行哭公之云亡聖朝震悼於上羣后恇慟於下豈惟哀纒一國痛深一主而巳哉追贈太宰侍中録尚書如故給節羽葆鼓吹班劍為六十人謚曰文簡禮也夫乗徳而處萬物不能害其貞虚巳以游當世不能擾其度均貴賤於條風忘榮辱於彼我然後可兼善天下聊以卒嵗經始圗終式免祇悔誰云克備公實有焉是以義結君子恵沾庶類言象所未形述詠所不盡故吏某甲等感逝川之無捨哀清暉之眇黙餐輿誦於丘里瞻雅詠於京國思衛鼎之垂文想晉鍾之遺則方髙山而仰止刋𤣥石以表徳其辭曰辰精感運昴靈發祥元首惟明股肱惟良天鑒璿曜踵武前王欽若元輔體微知章永言必孝因心則友仁洽兼濟愛深善誘觀海齊量登嶽均厚五臣茲六八元斯九内謨帷幄外曜台階逺無不肅邇無不懷如風之偃如樂之諧光我帝典緝彼民黎率禮蹈謙諒實身幹跡屈朱軒志隆衡館眇眇元宗萋萋辭翰義既川流文亦霧散嵩構雲頺梁隂載缺徳猷靡嗣儀形長遞怊悵餘徽鏘洋遺烈久而彌新用而不竭連珠畼連珠盖聞王佐之才雖逺豈必見採於當時凌雲之氣徒盛無以自致於雲間是故魏人指玉於外野和氏泣血於荆山哀䇿髙帝哀䇿文並序降階執禮泣血纒心感客臺之罷御哀恭館之不臨仰神儀而邈絶視區物而淒隂俾茲良史敬修舊則敢圖鴻規式揚至徳其辭曰靈源遙裔肇惟商丘聖功寜夏賢識歸周我皇踵武超冠前猷美風允迪徳音孔修月准敷仁日精表孝則地均和體天合炤外宏三至内隆七教水祀将傾乾維晦象韋弁長襲鼓磬屬響聲化巳淪政刑遂往國圗靡緝民規載爽康世以徳撥亂資武威以雷霆潤以風雨六術孔昭四義克舉自東徂北遐方即叙功被河濟化隆江漢帝謨仰式王維佇幹改步藩屏来登翼贊綢繆總章因循陽館昔在保衡君違斯政爰茲博陸亦鑒靈命效昏以忠登明資敬義煥金石功昭舞詠蠢爾荆漢悖亂人經謀連樞禁兵接神埛禦姦以悳禦宄以刑獻捷宗寝飲至王庭政教雲行徽猷天造山鑑紫璇苑茂朱草玉檢騰暉金繩薦寳天鏡既穆地維既肅遐邇一體表裏禔福乃眷斯民昩旦抒軸興文偃武纉禹舊服所向惟簡所保惟賢居尊彌約無善不延膠章載緝風軌克宣上動清儀下達𤣥泉聴覽閒日應物餘景怡慮以文棲心以静鴻章晨映徽言夕永迹庇區服情深箕潁萬㝢飧和百神受職梁甫欣儀云亭望式輔徳伊何奄捐民極嵩嶽長傾宸暉斯昃機炤惟寂達鑒靡傷慎終敬始知微知章立言垂範玉潤金相瞻仰遺式哀結流霜旋玉車犬之皦鏡動雲旗之逶迤振哀笳於八極響清蹕於咸池顧應夜而稍逺視機衡而長離風遲遲而懷暮日憯憯其若垂感衣冠於喬岳追弓劍之在斯悼丁年之薄祐訴窮心於兩儀皇太子妃哀䇿文肇惟初職芳猷夙就翩翻禮園徘徊樂囿視秋齊明方春等茂伊宋之季天衢薦阻咨我儲貳締縃江滸衛女事齊樊姬贊楚美著嬪嗣徽音踵武數盈則反否極斯昌肅膺靈命經緯三光往儀衡館来式椒堂訓組咸事象服有章八演仰則六幽望景悠悠草昧如何不永方方委曜先秋落頴世有遺塵庭無餘影嗚乎哀哉遵三兆之嘉日迨九筮之靈期澄金波而映鑾斾命飛亷而拂瓊輜揚清笳於漢表動嘶挽於雲基詩侍皇太子釋奠宴禮惟國幹義實民端身由業澡世以教安金鎔乃器水術伊瀾漸芳則馥履冰固寒瞽宗務時頖宫善誘咨此含生躋彼仁壽淳移雅闕㦄茲永久逰藝莫師獨學誰友三兆戒晨八鸞警旦風動嵩宫雲棲參館禮邁仁周樂超英漢神保爰格祝史斯贊鬱鬯既終徳馨是與降冕上庠升宴東序槐宰金貞藩維玉譽時彦莘莘國胄楚楚侍太子九日宴𤣥圃詩明明儲后沖黙其量徘徊禮樂優㳺風尚微言外融㡬神内王就日齊暉儀雲等望本茂條榮源澄流潔漢稱間平周云魯衛咨我藩華方軼前軌秋日在房鴻鴈来翔寥寥清景靄靄微霜草木揺落幽蘭獨芳眷言淄苑尚想濠梁既暢㫖酒亦飽徽猷有来斯悦無逺不柔贈徐孝嗣婉婉遊龍載遊載東靡靡行雲並躍齊蹤無類不感有来斯雍之子云邁嗟我莫従嵗云暮止述職戒行崇蘭罷秀孤松獨貞悲風宵逺乗鴈晨征撫初遐想念别書情春日家園徙倚未云暮陽光忽巳收羲和無停晷壯士豈淹留冉冉一作荏苒老将至功名竟不修稷契匡虞夏伊吕翼啇周撫躬謝先哲解紱歸山丘春詩二首蘭生巳匝苑萍開欲半池輕風搖雜蘤細雨亂叢枝其二風光承露照霧色㸃蘭暉青荑結翠藻黄鳥弄春飛春夕露華方照嵗雲彩復經春虚閨稍疊草幽帳日凝塵後園餞從兄豫章茲夕竟何夕念别開曽軒光風轉蘭蕙流月泛虚園失題方軌並茂追情彦輔柔亦不茹剛亦不吐南郊樂歌髙徳宣烈樂饗帝嚴親則天光大舄奕前古榮鏡無外日月宣華卿雲流靄五漢同休六幽成泰太廟樂歌髙徳宣烈樂悠悠草昧穆穆經綸乃文乃武乃聖乃神動戡危亂静比斯民誕膺休命奄有八夤握機肇運光啓禹服義滿天淵禮昭地軸澤靡不懷威無不肅戎夷竭歡象来致福偃風裁化暅日敷祥信星含曜秬草流芳七廟觀徳六樂宣章惟先惟敬是享是将穆徳凱容樂太姒嬪周塗山儷禹我后嗣徽重規疊矩肅肅閟宫翔翔雲舞有享徳馨無絶終古明徳凱容樂多難固業殷憂啓聖帝宗纉武維時執競起栁獻祥百堵興詠義雖祀夏功符受命逺無不懷邇無不肅其儀濟濟其容穆穆赫矣君臨昭哉嗣服允王惟后膺此多福禮以昭事樂以感靈八簋陳室六舞充庭觀徳在廟象徳是形四海来祭萬國咸寜齊白紵辭陽春白日風花香趨步明月舞瑤裳情發金石媚笙簧羅袿徐轉紅袖揚清歌流響繞鳯梁如驚若思凝且翔轉盼流精艷輝光将流将引鴈雙行歡来何晚意何長明君馭世永歌昌漢魏六朝百三家集巻七十五
