body:
  text: 漢魏六朝百三家集巻七十二宋謝莊集題詞謝希逸為殷淑儀哀文孝武流涕都下傳寫及廢帝即位則銜恨堯門幾犯芒刃一文之出禍福懸途即作者詎能先覺乎明帝定亂命作赦詔酌酒立成云子業事穢東陵行汙飛走雖鐘鼓討伐之辭殆直自快胸懷矣文章四百餘巻今僅存此封禪儀注奏藻麗雲漢欲摹長卿捜才定刑二表與索虜互市議雅人之章無忝國器耳食者徒稱陳王之明月河南之舞馬欲以兩賦槩其羣長不幾采春華忘秋實哉典任銓衡不干喧訴居守禁門嚴待墨詔遂令顔瞋讓清郅章比節居風貌之中獲高明之福有㣲子遺則焉左氏經傳分國立篇征南以後當稱奇書竟滅不傳此余所尤抱恨于謝巖也目録賦月賦舞馬賦赤鸚鵡賦悅曲池賦詔宋明帝即位赦詔表上摉才表為八座江夏王請封禪表又改定刑獄表請𢎞風則表太子元服上至尊表太子元服上太后表謝賜貂裘表東海王讓司空表讓中書令表讓吏部尚書表奏上封禪儀注奏封皇弟奏改封長公主奏章為北中郎謝兼司徒章為北中郎拜司徒章啟事與世祖啟事牋與大司馬江夏王義恭牋書為朝士與袁顗書帖昨還帖議索虜互市議贊竹贊哀䇿文宋孝武帝哀䇿文皇太子妃哀䇿文宣貴妃諡册文誄孝武宣貴妃誄黄門侍郎劉琨之誄墓誌銘豫章長公主墓誌銘司空何尚之墓銘樂府宋明堂歌九首迎神歌登歌歌太祖文皇帝歌青帝歌赤帝歌黄帝歌白帝歌黒帝送神歌宋世祖廟歌二首世祖孝武皇帝歌宣太后歌詩烝齋應詔和元日雪花應詔七夕夜詠牛女應制侍宴蒜山侍東耕遊豫章西觀洪崖井自潯陽至都集道里名為詩北宅秘園喜雨江都平解嚴從駕頓上八月侍華林曜靈殿八闗齋懷園引山夜憂聯句華林都亭曲水聯句效栢梁體漢魏六朝百三家集巻七十二目録欽定四庫全書漢魏六朝百三家集巻七十二明張溥輯宋謝莊集賦月賦陳王初喪應劉端憂多暇緑苔生閣芳塵凝榭悄焉疚懷弗怡中夜乃清蘭路肅桂苑騰吹寒山弭葢秋坂臨濬壑而怨遥登崇岫而傷逺于時斜漢左界北陸南躔白露曖空素月流天沈吟齊章殷勤陳篇抽毫進牘以命仲宣仲宣跪而稱曰臣東鄙幽介長自丘樊昧道懵學孤奉明恩臣聞沈潜既義高明既經日以陽徳月以陰靈擅扶光於東沼嗣若英於西㝠引元於帝臺集素娥於后庭朒朓警闕朏魄示沖順辰通燭從星澤風增華台室揚彩軒宫委照而吳業昌淪精而漢道融若夫氣霽地表雲斂天末洞庭始波木葉微脫菊散芳於山椒鴈流哀於江瀨升清質之悠悠降澄暉之藹藹列宿掩縟長河韜映柔祗雪凝圓靈水鏡連觀霜縞周除冰淨君王乃厭晨歡樂宵宴收妙舞弛清縣去爥房即月殿芳酒登鳴琴薦若乃涼夜自淒風篁成韻親懿莫從羈孤逓進聆臯禽之夕聞聽朔管之秋引於是絲桐練響音容選和徘徊房露惆悵陽阿聲林虚籟淪池滅波情紆軫其何託愬皓月而長歌歌曰美人邁兮音塵闕隔千里兮共明月臨風歎兮將焉歇川路長兮不可越歌響未終餘景就畢滿堂變容迴遑如失又稱歌曰月既没兮露欲晞嵗方晏兮無與歸佳期可以還微霜霑人衣陳王曰善乃命執事獻壽羞璧敬珮玉音復之無斁舞馬賦天子馭三光總萬㝢挹雲經之留憲裁河書之遺矩是以徳澤上昭天下漏泉符瑞之慶咸屬榮懷之應必躔月晷呈祥乾維效氣賦景河房承靈天駟陵原郊而漸影躍采淵而泳質辭水穴而南傃去輪臺而東暨乗玉塞而歸寳奄芝庭而獻祕及其養安騏校進駕龍涓輝大馭於國皂賁上襄於帝閑超益野而踰緑地軼蘭池而轢紫燕五王晦其術十氏懵其𤣥東門豈或狀西河不能傳既秣苞以均性又佩蘅以崇躅巻雄神於綺文蓄奔容於帷燭藴籋雲之銳景戢追電之逸足方疊鎔於丹鎬亦聫規於朱駮觀其雙璧應範三封中圖𤣥骨滿燕室虚陽理竟潛䇿紆汙飛赭沫流朱至於肆夏已升采齊既薦始徘徊而龍俛終沃若而鸞盼迎調露於飛鍾赴承雲於驚箭寫秦坰之躡塵狀吳門之曳練窮虞庭之蹈蹀究遺野之環袨若夫蹠實之態未巻凌逺之氣方攄歴岱野而過碣石跨滄流而軼姑餘朝送日於西坂夕歸風於北都尋瓊宫於倐瞬望銀臺於須㬰若乃日宣重光徳星昭衍國稱梁岱佇蹕史言壇場望踐鄗上之瑞彰江間之禎闡榮鏡之運既臻㑹昌之厯已辨感五繇之程符鑒羣后之薦典聖主將有事於東嶽禮也於是順斗極乗次躔戒懸日於昭旦命月題於上年騑騑翼翼泛修風而浮慶煙肅肅雍雍引八神而詔九仙下齊郊而掩配林集嬴里而降祊田蒲軒次巚瑄璧承巒金檢茲發玉牒斯刋盛節之義洽升中之禮殫億兆悅精祗歡聆萬嵗於曾岫燭神光於紫壇是以擊轅之蹈撫埃之舞相與而歌曰聳朝葢兮泛晨霞靈之來兮雲漢華山有壽兮松有茂祚神極兮貺皇家然後悟聖朝之績號慶榮之烈比盛乎天地爭明乎日月茂實冠於胥庭鴻名邁於勛發業底於告成道臻乎報謁巍巍乎蕩蕩乎民無得而稱焉赤鸚鵡賦徒觀其柔儀所踐頳藻所挺華景夕映容光晦鮮惠性昭和天機自曉審國音於寰中逹方聲於裔表及其雲移霞峙霰委雪翻陸離翬漸容裔鴻軒躍林飛岫煥若輕電溢煙門集場棲圃曄若夭桃被玉園至於氣淳體浮霧下崖沈月圖光於緑水雲寫影於青林遡還風而聳翮霑清露而調音悅曲池賦北山兮黛柏南谿兮赬石赬岸兮若虹黛樹兮如畫暮雲兮十里朝霞兮千尺步東池兮夜未久卧西窻兮月向山引一息於䰟内擾百緒於眼前詔宋明帝即位赦詔高祖武皇帝徳洞四瀛化綿九服太祖文皇帝以大明定基世祖孝武皇帝以下武寧亂日月所照梯山航海風雨所均削袵襲帶所以業固盛漢聲溢隆周子業凶嚚自天忍悖成性人面獸心見於齠日反道敗徳著自比年其狎侮五常怠棄三正矯誣上天毒流下國寔開闢所未有書契所未聞再罹遏密而無一日之哀齊斬在躬方深北里之樂虎兕難匣憑河必彰遂誅滅上宰窮釁逆之酷虐害國輔究孥戮之刑子鸞同生以昔憾殄殪敬猷兄弟以睚眦殱夷徴逼義陽將加屠膾陵辱戚藩檟楚妃主奪立左右竊子置儲肆酗於朝宣淫於國事穢東陵行汙飛走積釁罔極日月滋深比遂圖犯𤣥宫志窺題湊將肆梟獍之禍騁商頓之心又欲鴆毒崇憲虐加諸父事均宫閫聲遍國都䲭梟小豎莫不寵暱朝廷忠誠必加戮挫收掩之㫖虓虎結轍掠奪之使白刃相望百僚危氣首領無有全地萬姓崩心妻子不復相保所以鬼哭山鳴星鉤血降神器殆於馭索景祚危於綴旒朕假寐凝憂泣血待旦慮大宋之基於焉而泯武文之業將墜于淵賴七廟之靈藉八百之慶巨猾斯殄鴻沴時褰皇綱絶而復紐天緯缺而更張猥以寡薄屬承乾綂上緝三光之重俯顧庶民之艱業業兢兢若履氷谷思與億兆同此維新可大赦天下改景和元年為泰始元年賜民爵二級鰥寡孤獨不能自存者榖人五斛逋租宿債勿復收犯鄉論清議贓汚淫盜並悉洗除長徒之身特賜原遣亡官失爵禁錮舊勞一依舊典其昬制謬封並皆刋削表上摉才表臣聞功照千里非特燭車之珍徳柔隣國豈徒秘璧之貴故詩稱殄悴誓述榮懐用能道臻無積化至恭已伏惟陛下膺慶集圖締㝢開縣夕爽選政昃旦調風采言厮輿觀謡仄遠斯實辰階告平頌聲方製臣竊惟隆被所漸治亂之由何嘗不興資得才替因失士故楚書以善人為寳虞典以則哲為難進選之軌既弛中代登造之律未闡當今必欲崇本康務庇民濟俗匪更惉懘奚取九成升厯中陽英賢起於徐沛受籙白水茂異出於荆宛寧二都智之所產七隩才之所集實遇與不遇用與不用耳今大道光亨萬務俟徳而九服之曠九流之艱提鈞懸衡委之選部一人之鑒易限而天下之才難原以易限之鑒鏡難原之才使國罔遺授野無滯器其可得乎昔公叔與僎同升管仲取臣於盜趙文非親士疎嗣祁奚豈謟讐比子茹茅以彚作範前經舉爾所知式昭徃牒且自古任薦賞罰𢎞明成子舉三哲而身致魏輔應侯任二士而已捐秦相臼季稱冀缺而疇以田采張㪍進陳湯而坐以褫爵此先事之盛准亦後王之彛鑒如臣愚見宜普命大臣各舉所知以付尚書依分銓用若任得其才據主延賞有不稱職宜及其坐重者免黜輕者左遷被舉之身加以禁錮年數多少隨愆議制若犯大辟則任者刑論又政平訟理莫先親民親民之要寔歸守宰故黃霸治潁川累稔杜畿居河東歴載或就加恩秩或入崇輝寵今私民之職自非公莅必應代換者宜遵六年之制進獲章明庸惰退得民不勤擾如此則下無浮謬之愆上靡棄能之累考績之風載泰槱薪之歌克昌臣生屬亨路身漸鴻猷遂得奉詔左右陳愚於側敢露芻言懼氛恒典為八座江夏王請封禪表惟皇天崇稱大道始行揖讓迄于有晉雖聿修前緒而跡淪言廢蔑記於竹素者焉可殫書紹乾維建徽號流風聲被絲管自無懐以來可傳而不朽者七十有四君罔仁厚而道滅鮮義澆而徳宣鍾律之先曠世綿絶難得而聞丘索著明者尚有遺炳故易稱先天弗違後天奉時葢陶唐姚姒商姬之主莫不由斯道也是以風化大洽光熈於後炎漢二帝亦踵曩則因百姓之心聽輿人之頌龍駕帝服鏤玉梁甫昌言明稱告成上靈况大宋表祥唐虞受終素徳山龍啟符金玉顯瑞異采騰於軫墟紫煙藹於邦甸錫冕兆九五之徴文豹赴天厯之㑹誠二祖之幽慶聖后之㝠休道冠軒堯惠深亭毒而猶執沖約未言封禪之事四海竊以恧焉臣聞惟皇配極惟帝祀天故能上稽乾式照臨黔首協和穹昊膺茲多福高祖武皇帝明並日月光振八區拯已溺之晉濟横流之世撥亂寧民應天受命鴻徽洽于海表威稜震乎沙外太祖文皇帝體聖履仁述業興禮正樂頌作象厯明達通於神祗𤣥澤被乎上下仁孝命世叡武英挺遭運屯否三才湮滅迺龍飛五洲鳯翔九江身先八百之期斷出人鬼之表慶煙應高牙之建風耀符發迹之辰親翦凶逆躬清昏壒天地革始夫婦更造豈與彼承業繼緒拓復禹跡車一其軌書罔異文者同年而議哉今龍麟已至鳯凰已儀北李已實靈茅已茂雕氣降雰於宫榭珍露呈味於禁林嘉禾積穗於殿甍連理合幹於園籞皆耀質離宫植根蘭囿至夫霜毫𤣥文素翮頳羽泉河山嶽之瑞草木金石之祥方畿憬塗之謁抗驛絶祖之奏彪炳雜㳫粤不可勝言太平之應兹焉富矣宜其從天人之誠遵先王之則備萬乗整法駕修封泰山瘞玉岱趾延喬松於東序詔韓岐於西廂麾天閽使啓關謁紫宫朝太一奏鈞天詠雲門贊揚幽奥超聲前古豈不盛哉伏願時命宗伯具兹典度又江淮鄙上之使結軌於璧門西鶼北采之譯相望於道路改定刑獄表臣聞明愼用刑獄存姬典哀矜折獄實輝吕命罪疑從輕既前王之格範寜失弗經亦列聖之恒訓用能化致升平道臻恭已逮漢文傷不辜之罰除相坐之令孝宣倍深文之吏立鞫訊之法當是時也號令刑存陛下踐位親臨聽訟億兆相賀以為無寃民矣而比囹圄未虚頌聲尚缺臣竊謂五聽之慈弗宣於宰物三宥之澤未洽於民謡頃年軍旅餘弊刼掠猶繁監司計獲多非其實或規免咎不慮國患楚對之下鮮不誣濫身遭鈇鑕之誅家嬰孥戮之痛比伍同閈莫不及罪是則一人罰謬坐者數十昔齊女告天臨淄臺殞孝婦寃戮東海愆陽此皆符變靈祗初咸景緯臣近兼訊見重囚八人旋觀其初死有餘罪詳察其理實並無辜恐此等不少誠可怵惕也舊官長竟囚畢郡遣督郵案驗仍就施刑督郵賤吏非能異於官長有案驗之名而無研究之實愚謂此制宜革自今入重之囚縣考正畢以事言郡并送囚身委二千石親臨覈辯必収聲吞釁然後就戮若二千石不能決乃度廷尉神州綂外移之刺史刺史有疑亦歸臺獄必令死者不怨生者無恨庶鬻棺之諺輟歎於終古兩造之察流詠於方今臣學闇申韓才寡治術輕陳庸管懼乖國憲請𢎞風則表詔云貴戚競利興貨廛肆者悉皆禁制此實允㥦民聴其中若有犯違則應依制裁糾若廢法申恩便為令有所屈此處分伏願深思無縁明詔既下而聲實乖爽臣愚謂大臣在禄位者尤不宜與民爭利不審可得在此詔不㧞葵去織實宜深宏太子元服上至尊表㐲惟皇太子殿下明兩承乾元良作貳抗法迂身英華自逺樂以修中禮以治外三善克懋徳成教尊今日昭辰顯加元服對靈祗之望儔上庠之歡率天罄世莫不載躍太子元服上太后表離景承宸樞光陪極毓問東華飛英上序樂正歌風司成頌徳清明神鏡温文在躬練日簡辰顯被元服懋三王之教爥少陽之重謝賜貂裘表臣莊言主衣黄達宣勅賜臣貂裘匭發袵開𤣥華有曜靡毫柔毳黯鑑自凝固以綵越綴翬光逾緝鷰臣聞嚬笑不妄韓裳勿假續有昭庸楚纊爰建臣歡忭自歌而同委衾之澤勤勞未報而叨解裘之寵空荷榮施徒賁微軀承殊恩必識服以淪生銘悅之情罔知所寘臣受假無由躬拜謹遣表東海王讓司空表臣側觀前載與窺洪典三事之授惟帝其難臣乗少籍長久分踰涯量出滿入泰毎究榮光不悟乾燭方逺義路同遺下參𢎞化上尸燮理自非徳仞具瞻聲堪民詠未有妄臻此澤空集兹靈讓中書令表伏惟陛下登取震維臨齊璿政澤與風翔恩從雲動臣聞璧門天邃鳯沼神深絲綸王言出納帝命自非望允當時譽宣庠塾未有謬垂曲寵空席兹榮在於平壯猶不可勉况今綿痼百志俱淪讓吏部尚書表招才琴釣之上取士歌牧之中終能克夷景命榮懐萬宇豈容先私首曲近有經過且不習冠制趙客興鑒未聞綂馭鄭臣有規匪痗身譏奏上封禪儀注奏臣聞崇號建極必觀俗以樹教正位居體必採世以立言是以重代列聖咸由厥道𤣥勳上烈融章未分鳴光委緒歇而罔藏若其顯諡畧騰軌則系厥聲采徴畧聞聽爰洎姬漢風流尚存遺芬餘榮綿映紀緯雖年絶世祀代革精華可得騰金綵奏玉潤鏤迹以燻今鐫徳以麗逺而四望埋禋歌之禮日觀弛修封之容豈非神明之業難崇功基之迹易泯自兹以降訖於季末莫不欲英𢎞徽位詳固洪聲豈徒深黙修文淵幽馭世而已諒以縢非虚奏書匪妄埋擊雨恕神淳廕復樹安得紫壇肅祗竹宫載竚散火投郊流星奔座寳緯初基厭靈命厯徳振弛維功濟淪象𤣥浸紛流華液幽潤規存永馭思詳樹逺太祖文皇帝以啓遘泰運景望震凝采樂調風集禮宣度祖宗相映軌迹重暉聖上韞籙蕃河竚翔衡漢金波掩照華耀停明運動時來躍飛風舉澄氛海岱開景中區歇神還靈頽天重耀儲正凝位於兼明衮嶽蕃華於元列故以祥映昌基繫發篆素重以班朝侍典飾令詳儀纂綜淪蕪摉騰委逸奏玉郊宫禋珪𤣥畤景集天廟脉壤祥農節至昕陽川丘夙禮網威巡䮹表綏中甸史流其詠民挹其風於是涵迹視陰振聲威響歴代之渠沈闕望内安侯之長賢王入侍殊生詭氣奉俗還鄉羽族卉儀懐音革狀邊帛絶書權光弛燭天岱發靈宗河開寳崇丘淪鼎振采泗淵雲皇王嶽摛藻闕漢并角即音栖翔禁籞衮甲霜咮翾舞川肆榮泉流鏡後昭河源故以波沸外闗雲蒸内澤若其雪趾青毳𤣥文朱綵日月郊甸擇木弄音重以榮露騰軒蕭雲掩閣鎬穎孳萌移華淵禁山輿竚衡雲鶼竦翼海鰈泳流江茅吐蔭校書之列仰筆以飾辭濟代之蕃獻邑以待禮豈非神勰氣昌物瑞雲照蒲軒龜軫闕泉淳芳太宰江夏王臣義恭咀道遵英栖奇麗古該潤圖史施詳閟載表以功懋往初徳耀炎昊升文中岱登牒天關耀冠榮名摛振聲號而道謙稱首禮以虚挹將使𤣥祗缺觀幽瑞乖期梁甫無盛徳之容介丘靡升聞之響加窮泉之野獻八代之駟交木之鄉奠絶金之楛肅靈重表珍符兼貺伏惟陛下謨詳淵載衍屬休章依徴聖靈潤色聲業諏辰稽古肅齊警列儒僚展采禮官相儀懸蕤動音洪鍾竦節陽路整衛正途清禁於是績環珮端玉藻鳴鳯竚律騰駕流文閒綵比象之容昭明紀數之服徽焯天陣容藻神行翠葢懷陰羽華列照乃詔聫事掌祭賔客贊儀金支宿縣鏞石潤響命五神以相列闢九關以集靈驚衛兵而開雲先雨祗以灑路霞凝生闕煙起成宫臺冠丹光壇浮素靄爾乃臨中壇備盛禮天降祥錫壽固皇根谷動神音山傳稱響然後辨年問老陳詩觀俗歸薦告神奉遺清廟光美之盛彰乎萬古淵祥之烈溢乎無窮豈不盛歟臣等生接昌辰肅懋明世束教管聞未足言道且章志湮微代往淪絶抱採遺文辯明訓誥闕簉訪鄒魯草縢書堙玉之禮具竦石繩金之儀和芝潤瑛鐫璽乾封懼弗軌屬上徽燀當王則謹奉儀注以聞封皇弟奏臣聞桐圭睦親書河汾之策賜帶懷賢敬東平之祚諒以訓經終始義洽垣墉第某皇弟等器彩明敏令識穎悟並宜憲章前典光啓祚宇作屏王室式雍帝載臣等參議可封郡王改封郡長公主奏臣聞爵厚懿戚國之恒典景祚既新禮與時渥永興等七公主可封郡長公主章為北中郎謝兼司徒章臣聞燮理陰陽寅亮天地弗惟其官無人則闕司徒掌敷五教職擾兆民豈悟乾靈罔匱光渥方闡不次之任殊絶藩岳豈可權尸三事假備六符慙震周迴顧步交悸為北中郎拜司徒章不為震施罔匱鴻慶方稠燮調之重遂臻非據智小謀大周易興規少陽微暄有鑒前史辨其動植布其安擾以倡九牧阜成王教豈臣眇末所能克荷啓事與世祖啓事賊劭自絶於天裂冠毁冕窮弑極逆開闢未聞四海泣血幽明同憤奉三月二十七日檄聖迹昭然伏讀感慶天祚王室叡哲重光殿下文明在嶽神武居陜肅將乾威龔行天罰滌社稷之仇雪華夷之恥使弛墜之構更獲締造垢辱之甿復得眀目伏承所命栁元景司馬文恭宗慤沈慶之等精甲十萬已次近道殿下親董銳旅授律繼進荆鄢之師岷漢之衆舳艫萬里旌斾虧天九土㝠符羣后畢㑹今獨夫醜類曾不盈旅自相暴殄省闥横流百僚屏氣道路以目檄至輒布之京邑朝野同欣里頌塗歌室家相慶莫不望景聳䰟瞻雲佇足先帝以日月之光照臨區㝢風澤所漸無幽不洽况下官世荷寵靈叨恩踰量謝病私門幸免虎口雖志在投報其路無由今大軍近次永清無逺欣悲踊躍不知所裁牋與大司馬江夏王義恭牋下官凢人非有逹槩異識俗外之志實因羸疾常恐奄忽故少來無意於人間豈當有心於崇達邪頃年乗事回薄遂果饕非次既足貽誚明時又亦取愧朋友前以聖道初開未遑引退及此諸夏事寧方陳微請欵志未伸仍荷今授被恩之始具披寸心非惟在已知尤實懼塵穢彛序稟生多病天下所悉兩脅癖疾殆與生俱一月發動不減兩三毎至一惡痛來逼心氣餘如綖利患數年遂成痼疾吸吸惙惙常如行尸恒居死病而不復道者豈是疾痊直以荷恩深重思答殊施牽課尫瘵以綜所忝眼患五月來便不復得夜坐恒閉帷避風日晝夜惛懵為此不復得朝謁諸王慶弔親舊唯被勑見不容停耳此段不堪見賓已數十日持此苦生而使銓綜九流應對無方之訴實由聖慈罔已然當之信自苦劇若才堪事任而體氣休健承寵異之遇處自效之塗豈茍欲思閒辭事邪家素貧弊宅舍未立兒息不免麤糲而安之若命寧復是能忘㣲禄正以復有切於此處故無復他願耳今之所希唯在小閒下官微命於天下至輕在已不能不重屢經披請未蒙哀恕良由誠淺辭訥不足上感家世無年亡高祖四十曾祖三十二亡祖四十七下官新歲便三十五加以疾患如此當復幾時見聖世就其中煎憹若此實在可矜前時曽啓願三吳勅㫖云都不須復議外出莫非過恩然亦是下官生運不應見一閒逸今不敢復言此當付之來生耳但得保餘年無復物務少得養疴此便是志願永畢在衡門下有所懷動止必聞亦無假居職患於不能禆補萬一耳識淺才常羸疾如此孤負主上擢授之恩私心實自哀愧入年便當更申前請以死自固但庸近所訴恐未能仰徹公恩盼𢎞深粗照誠懇願侍坐言次賜垂拯助則苦誠至心庶獲哀允若不蒙降祐下官當於何希冀邪仰憑愍察願不垂恡書為朝士與袁顗書夫夷陂相因興革遞數或多難而固其國或殷憂而啓聖明此既著於前史亦彰於聞見王室不造昏凶肆虐神鼎將淪宗稷幾泯幸天未亡宋乾厯有歸主上體自聖文繼明作睿而辱均牖里屯踰夏臺既天地俱憤義勇同奮尅殄鯨鯢三靈更造應天順民爰集寳命四海屬息肩之歡華戎見來蘇之泰吾等獲免刀鋸僅全首領復身奉惟新命承亨運緩帶談笑擊壤聖世汝雖劬勞于外跡阻京師然心期所寄江漢何逺自九江告變皆謂鄧氏狂惑比日國言籍籍頗塵吾子道路之議豈其或然聞此之日能無駭惋凶人反道敗徳日夜滋深昵近狡慝取謀豺虎非惟毒流外物惡積中朝乃欲毁陵邑虐崇憲燒宗廟鹵御物然後蕩覆京都必使蘭蕕俱盡自非聖上廟筭靈圖俛眉遜避維持内外擁衛臣下則赤縣為戎百姓其魚矣此事此理寧可熟念既天道輔順謳歌有奉高祖之孫文皇之子徳洞九幽功貫三曜匡拯家國提毓黔首若不子民南面將使神器何歸而羣下構慝妄生窺覬成軫惑燕貫高亂趙䜛人罔極自古有之汝中京冠冕儒雅世襲多見前載縣鑒忠邪何遠遺郎中之清軌近忘太尉之純槩相與或羣從舅甥或姻婭周欵一旦胡越能無悵恨若疑誑所至邪詖無窮汝當誓衆奮戈翦此朝食若自延過聽迷塗未遠聖上臨物以仁接下以愛豈直雍齒先封乃當射鈎見相矣當由力窘跡屈丹誠未亮邪跋予南服寤寐延首若反棹㳂流歸誠鳯闕錫圭開㝢非爾而誰吾等竝過荷曲慈俱叨非服紆金拖玉改觀蓬門入奉舜禹之渥出見羲唐之化雍容揄揚信白駒空谷之時也奈何毁擲先基自蹈凶戻山門蕭瑟松庭誰掃言念楚路豈不思父母之邦幸納惡石以蠲羙疢裁書表意爾其圖之帖昨還帖弟昨還方承一日忽患悶當時乃爾大惡殊不易追企怛想諸治昨來已漸勝眠食復云何頃日寒重春節至居患者無不增動今作何治眼風不異耳指遣承問謝莊白呈左僕射議索虜互市議臣愚以為獯獫棄義唯利是視關市之請或以覘國順之示弱無明柔逺拒而觀釁有足表彊且漢文和親豈止彭陽之宼武帝修約不廢馬邑之謀故有餘則經畧不足則閉關何為屈冠帶之邦通引弓之俗樹無益之軌招塵㸃之風交易爽議既應深杜和約詭論尤宜固絶臣庸管多蔽豈識國儀恩誘降逮敢不披盡贊竹贊瞻彼中唐緑竹猗猗貞而不介弱而不虧杳裊夕圃蕭瑟雲崖推名楚潭美質梁池哀策文宋孝武帝哀策文應門洞望馳道南除叢塗已撤鬱鬯將虚哀子嗣皇帝擗摽挽綍周遑旌軫攀七緯之崩淪慟三靈之徂盡百神慕而行雲沈萬國哀而素霜霣衣冠緬邈弓劔不追敢緝謳頌髣髴希夷其辭曰樞電皇根月瑤國緒𦙍裔丹陵蟬聯華渚二后在天大行纂武克睿克聖重規襲矩昭昭金式明明玉温望雲其遠就日其尊雨零露湛冬暖春暄聲芳納麓道昭賓門上徳無稱至功不器怊悵四始優遊六位綴響蘭深緝言瓊秘悠哉梁踐眇焉汾肆敬業開㝢離經作翰鴻起荆河鸞遊楚漢泗濱霑明江區承奐陜左清郊棠陰虛館地維不紐乾綱弛機羲庭薄蝕紫路流飛泣血派涘顧瞻川沂孝貫樞極義震寰圍誓鉞皇郊詔師牧甸七景締華五雲巻煽雪怨園邑掃恥瀛縣啓聖宸葢集寳龍見王室多故國步方蹇淮濟裂冠江荆毁冕東楚亂常西華啓釁動筭揮圖爰戡爰剪浹宙斯澄綿區咸鏡修風曉逸徳星夕映溽露飛甘舒雲結慶禎被動植信泊翔泳缺禮克宣墜章必搆方堂饗極圓流肆胄南聳郊宫北清靈囿瑤軒春藉翠華冬狩經緯窮文克定盡武鄗上呈祥介丘載佇在盈念冗成㓛弗處榮鏡中世舄奕前古睿業初逺鴻化方亭丹雲承日素景媵星玉几去襲綴衣在庭辭重陽之昭昭降大夜之㝠㝠氣貿炎涼史詔龜筮文物空嚴鑾和虚衛動蜃輅之逶迤顧璧羽之容裔出國門而分天地向幽途而異身世龍旌鬱而青槐逺驚葭亂而白楊翳觀初霜之變條聽秋風之下蔕橋山絙雲榖林虧日輦道結寒松庭盡密芝葢迫軨上驤眷轡萬㝢肅其北􅯷靈呵閴其深隘南維有時傾離光不常鏡騰英聲與茂實方流華於舞詠皇太子妃哀策文楹凝桂酒庭肅龍輼風吹國輅雲起郊門皇帝傷總繸之掩綵悼副褘之滅華行光既宴長河又斜顧而言曰璇瑤有毁郁烈無湮翦素裁簡授之史臣其辭曰霍岫虧天灊流凝漢祥發桐珪慶昭金筭毓景帝里飛芳戚閈秘儀施谷升音集灌月晷幾望娣袂維良釋幃春宫承篚少陽五葉衍藻四訓抽光葳蕤蕙振婉孌瓊相清徽就遠䘲沴方搏臨華罷翠當曄收蘭複殿生響長廡結寒節移虛饋氣變容衣中庭草曖階上螢飛傷縈里第痛溢朝闈霜侵燭昧風宻帷凄驚葭夕轉龍驂夜嘶筵既訣兮奠既徹背青闕兮去神閨旌掩鬱而還泛葢逶遲而顧低素紼斂維華軿解馭山燧恒陰松阿不曙離天渥兮就銷沈委白日兮即㝠暮菊有秀兮蘅有芬徳方遠兮聲彌樹宣貴妃諡册文維年月日皇帝曰咨故淑儀殷氏惟爾含徽挺茂爰光素里友琴流荇實華紫掖奉軒景以柔明登譽處椒風以婉孌升名幽閑之範日藹層闈繁祉之慶方崇蕃世而當春掩藻中波滅源朕用震悼傷於厥心松區已翦泉㝠將墜宜有旌徳第行式衍聲芳今遣某官集册告諡曰宣䰟而有靈尚茲寵渥嗚呼哀哉誄孝武宣貴妃誄惟大明六年夏四月壬子宣貴妃薨律谷罷煖龍鄉輟曉照車去魏連城辭趙皇帝痛掖殿之既閴悼泉途之已宫巡步檐而臨蕙路集重陽而望椒風嗚呼哀哉天寵方隆王姬下姻肅雍揆景陟屺爰臻國軫喪淑之傷家凝霣妣之怨敢撰徳於旂旒庶圖芳於鐘萬其辭曰𤣥丘烟煴瑤臺降芬高唐渫雨巫山鬱雲誕發蘭儀光啓玉度望月方娥瞻星比婺毓徳素里棲景宸軒處麗絺綌出懋蘋蘩修詩賁道稱圖昭言翼訓姒幄贊軌堯門綢繆史館容與經闈陳風緝藻臨彖分微游藝殫數撫律窮機躊躇冬愛怊悵秋暉展如之華實邦之媛敬懃顯揚肅恭崇憲奉榮維約承慈以遜逮下延和臨朋違怨祚靈集祉慶藹迎祥皇𦙍璿式帝女金相聨跗齊穎接萼均芳以藩以牧燭代輝梁眡朔書氛觀臺告祲八頌扇和六祈輟沴珩璁滅容翬翟毁衽掩綵瑤光收華紫禁嗚呼哀哉帷軒夕改軿輅晨遷離宫天邃别殿雲懸靈衣虚襲組帳空煙巾見餘軸匣有遺絃嗚呼哀哉移氣朔兮變羅紈白露凝兮歲將闌庭樹驚兮中帷響金釭曖兮玉座寒純孝擗其俱毁共氣摧其同欒仰昊天之莫報怨凱風之徒攀茫昧與善寂寥餘慶喪過於哀棘實滅性世覆沖華國虚淵令嗚呼哀哉題湊既肅龜筮既辰階撤兩奠庭引雙輴維慕維愛曰子曰身慟皇情於容物崩列辟於上旻崇徽章而出寰甸照殊策而去城闉嗚呼哀哉經建春而右轉循閶闔而徑度旌委鬱於飛飛龍逶遲於步步鏘楚挽於槐風遏邊簫於松霧涉姑射而環迴望樂池而顧慕嗚呼哀哉晨輼解鳯曉葢俄金山庭寢日隧路抽陰重扄閉兮燈已黯中泉寂兮此夜深銷神躬於壤末散靈魄於天潯響乗氣兮蘭馭風徳有遠兮聲無窮嗚呼哀哉黄門侍郎劉琨之誄秋風散兮凉葉稀出吳洲兮謝江畿瞻國門兮聳雲路睇舊里兮驚客衣魂終朝而三奪心一夜而九飛過建春兮背闕庭歴承明兮去城輦旌徘徊而北係轜逶遲而不轉挽掩隧而辛嘶驥含愁而鳴俛顧物色之共傷見車徒之相泫墓誌銘豫章長公主墓誌銘稟中樞之照體星軒之華肅恭在國掖庭欽其風恪勤衡館庶族仰其徳神葉靈條爰自帝堯文信啓魯肇京于楚宵燭載照娥英是從婉娩絺綌優柔肅雍蘅蕙有寳金碧不居泉庭一夜里館長蕪司空何尚之墓銘逺源長瀾自晉徂韓潛川韜玉霍岫騰鸞處華民瞻出光帝難寂寞壽仁茫昧報施調於餁歸經難褰寄晻映流芳烟煴作義樂府宋明堂歌九首通典曰建元元年使謝莊造郊廟舞樂明堂諸樂歌詩南齊書樂志曰明堂祠五帝漢郊祀歌皆四言宋孝武使謝莊造辭莊依五行數木數用三火數用七土數用五金數用九水數用六周頌我將祀文王言皆四其一句五一句七莊歌太祖亦無定句迎神歌地紐謐乾樞回華葢動紫微開旌蔽日車若雲駕六龍乗絪緼曄帝京輝天邑聖祖降五靈集構瑶戺聳珠簾漢拂幌月棲檐舞綴暢鍾石融駐飛景鬱行風懋粢盛潔牲牷百禮肅羣司䖍皇徳遠大孝昌貫九幽洞三光神之安解玉鑾景福至萬㝢歡登歌雍臺辨朔澤宫練辰一作服潔火夕照明水朝陳六瑚賁室八羽華庭昭事先聖懷濡上靈肆夏戒敬升歌發徳永固鴻基以綏萬國歌太祖文皇帝維天為大維聖祖是則辰居萬㝢綴旒下國内靈八輔外光四瀛蒿宫仰葢日館希旌複殿留景重檐結風刮楹接緯達響承虹設業設虡在王庭肇禋祀克配乎靈我將我享維孟之春以孝以敬以立我蒸民歌青帝參映夕駟照晨靈乗震司青春鴈將向桐始蕤柔風舞暄光遲萌動達萬品新潤無際澤無垠歌赤帝龍精初見大火中朱光北至圭景同帝在在離寔司衡水雨方降木槿榮庶物盛長咸殷阜恩覃四㝠被九有歌黄帝履建宋書作艮宅中㝢司繩御宋作總四方裁化遍寒燠布政周炎涼景麗條可結霜明氷可折凱風扇朱辰白雲流素節分至乗結宋作涇晷啓閉集恒度帝運緝萬有皇靈澄國步歌白帝百川如鏡天地爽且明雲冲氣舉徳盛在素精木葉初下洞庭始揚波夜光徹地翻霜照懸河庶類收成嵗功行欲寧浹地奉渥罄宇承秋宋作帝靈歌黑帝嵗月既晏方馳靈乗坎徳司規𤣥雲合晦鳥一作歸路白雲一作雪繁亘天涯雷在地時未光飭國典閉關梁四節遍萬物殿福九域祚八鄉晨晷促夕漏延太陰極微陽宣鵲將巢氷已解氣濡水風動泉送神歌蘊禮容餘樂度靈方留景欲暮開九重肅五達鳯參差龍已沬雲既動河既梁萬里照四空香神之車歸清都璇庭寂玉殿虛睿化凝孝風熾顧靈心結皇思宋世祖廟歌二首世祖孝武皇帝歌帝錫二祖長世多祜於穆睿考襲聖承矩𤣥極弛馭乾紐墜緒闢我皇維締我宗一作宋宇刷定四海肇構神京復禮輯樂散馬墮城澤牣九有化浮八瀛慶雲承掖甘露飛甍肅肅清廟徽徽閟宫舞蹈象徳笙磬陳風黍稷非盛明徳惟崇神其歆止降福無窮宣太后歌稟祥月輝毓徳軒光嗣徽媯汭思媚周姜母臨萬㝢訓藹紫房朱絃玉籥式載瓊芳詩烝齋應詔以下五言霜露凝宸感肅僾動天引西郊滅湮揜一作烟弇東溟起昭晉舞風泛龍常輪霞浮玉軔紫階協笙鏞金途展應􅉧方見六詩和永聞九徳潤觀生識幸渥睇服慙輶一作輴悋和元日雪花應詔從候昭神世息燧應頌道𤣥化盡天秘凝功畢地寳笙鏞流七始玉息承三造委霰下璇蕤疊雪翻瓊藻積曙境㝢明聫萼千里杲掩映順雲懸揺裔從風掃發貺燭至前騰瑞光圖表澤厚見身末恩踰悟生眇竦誠岱駕肅側志梁鑾矯七夕夜詠牛女應制輟機起春暮停箱動秋衿璇居照漢右芝駕肅河陰容裔泛星道逶迤濟煙潯陸離迎宵佩倐爍望昏簮俱傾環氣怨共歇浹年心珠殿釭未沬瑤庭露已深夕清豈淹拂弦輝無久臨侍宴蒜山龍旌拂紆景鳯葢起流雲轉蕙方因委層華正氛氲煙竟山郊遠霧罷江天分調石飛延露裁金起承雲侍東耕肅鑣奉晨發恭帶厠朝聞仙鄉降朱靄神郊起青雲陰臺承寒彩陽樹迎初熏觀徳欣臨籍瞻道樂遊汾遊豫章西觀洪崖井幽願平生積野好嵗月彌捨簮神區外整褐靈鄉陲林遠炎天隔山深白日虧游陰騰鵠嶺飛清起鳯池隱曖松霞被容與澗煙移將遂丘中性結駕終在斯自潯陽至都集道里名為詩山經亟旋覽水牒勌敷尋稽榭誠淹留煙臺信遐臨翔州凝寒氣秋浦結清陰眇眇高湖曠遙遙南陵深青溪如委黛黃沙似舒金觀道雷池側訪徳茅堂陰魯顯闕微迹秦良滅芳音訊遠博望崖採賦梁山岑崇館非陳宇茂苑豈舊林北宅袐園夕天霽晩氣輕霞澄暮陰微風清幽幌餘日照青林收光漸牕歇窮園自荒深綠池翻素景秋槐響寒音伊人儻同愛絃酒共棲尋喜雨燕起知風舞礎潤識雲流冽泉承夜湛零雨望晨浮合穎行盛茂分穗方盈疇江都平解嚴肅旗簡廟律聳鉞暢乾靈朝晏推物泰通渥抃身寧擊轅歌至世撫壤頌惟馨從駕頓上中權臨楚路前茅望吳雲冀馬依風蹀邊簫當夜聞八月侍華林曜靈殿八關齋玉桴乗夕遠金枝終夜舒澄淳𤣥化闡希㣲寂理孚懷園引以下雜言鴻飛從萬里飛飛河岱起辛勤越霜霧聫翩遡江汜去舊國違舊鄉舊海悠且長迴首瞻東路延翮向秋方登楚都入楚關楚地蕭瑟楚山寒嵗去氷未巳春來鴈不還風肅幌兮露濡庭漢水初緑柳葉青朱光藹藹雲英英離禽喈喈又晨鳴菊有秀兮松有㽔憂來年去容髪衰流陰逝景不可追臨堂危坐悵欲悲試託意兮向芳蓀心綿綿兮屬荒樊想緑蘋兮既冒沼念幽蘭兮已盈園夭桃晨暮發春鶯旦夕喧青苔蕪石路宿草塵蓬門山夜憂庭光盡山明歸流風乗軒巻明月縁河飛澗鳥鳴兮夜蟬清橘露靡兮蕙煙輕凌别浦兮值泉躍經喬木兮遇猿驚南臯别鶴行佇漢東隣孤管入青天沈疴白髪共急日朝露過隟詎賖年年既去兮髪不還金膏玉液豈留顔迴舲拓繩户收棹掩荆關聫句華林都亭曲水聫句效栢梁體九宫盛事予旒䌙宋孝武帝三輔務根識難亮揚州刺史江夏王臣義恭策拙枌鄉慙恩望南徐州刺史竟陵王臣誕折衝莫效興民謗領軍將軍臣元景侍禁衛儲恩踰量太子右率臣暢臣謬叨寵九流曠吏部尚書臣莊喉脣廢職方思讓侍中臣偃明筆直繩天威諒御史中丞臣顔師伯漢魏六朝百三家集巻七十二
