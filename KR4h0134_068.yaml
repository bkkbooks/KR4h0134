body:
  text: 漢魏六朝百三家集卷六十八鮑照集題詞鮑明逺才秀人微史不立傳服官年月考論鮮據差可慿者虞散騎奉勑一序耳明逺松柏篇自敘危病中讀傅休奕集見長逝辭惻然酸懷草豐人滅憂生良深後掌臨海書記竟死亂兵謝康樂云夭枉兼常其斯人乎臨川好文明逺自恥燕雀貢詩言志文帝矜才又自貶下就之相時投主善用其長非襧正平楊德祖流也集中文章實無鄙言纍句不知當時何以相加江文通遭逢梁武年華望暮不敢以文陵主意同明逺而蒙譏才盡史臣無表而出之者沈休文竊笑後人矣鮑文最有名者蕪城賦河清頌及登大雷書南齊文學傳所謂發唱驚挺操調險急雕藻淫艷傾炫心魂殆指是耶詩篇創絶樂府五言李杜之髙曽也顔延年與康樂齊名私問優劣於明逺誠心折之士顧才何如耳寧論官閥哉目録賦遊思賦觀漏賦有序傷逝賦蕪城賦芙蓉賦園葵賦舞鶴賦野鵝賦有序尺蠖賦飛蛾賦表疏為桞令讓驃騎表謝秣陵令表解褐謝侍郎表謝解禁止表皇孫誕育上表征北世子誕育上表拜侍郎上疏侍郎報滿辭閣疏轉常侍上疏謝隨恩被原疏啓論國制啓謝上除啓謝賜藥啓謝永安令解禁止啓通世子自解啓重與世子啓請假啓又奉始興王白紵舞曲啓書登大雷岸與妹書頌河清頌佛影頌銘凌煙樓銘石帆銘飛白書勢銘藥奩銘文瓜步山褐文漢魏六朝百三家集卷六十八目録欽定四庫全書漢魏六朝百三家集卷六十八明張溥輯鮑照集賦遊思賦雲徑兮海衝上潮兮送風秋水兮駕浦涼煙兮冒虹暮氣起兮逺岸黑陽精滅兮天際紅波沄沄兮無底山森森兮萬重平隰兮亘岸通川兮瀉壑仰盡兮天經俯窮兮地絡望波際兮曇曇眺雲間兮灼灼乃江南之斷山信海上之飛鶴指煙霞而問鄉窺林嶼而訪泊撫身事而識苦念親愛而知樂苦與樂其何言悼人生之長役捨堂宇之密親坐江潭而為客對蒹葭之遂黃視零露之方白鴻晨驚以響湍泉夜下而鳴石結中洲之雲蘿託綿思於遙夕瞻荆吳之遠山望邯鄲之長陌塞風馳兮邉草飛胡沙起兮鴈揚翮雖燕越之異心在禽鳥而同戚悵收情而抆淚遣繁悲而自抑此日中其幾時彼月滿而將蝕生無患於不老奚引憂以自逼物因節以卷舒道與運而升息賤賣卜以當壚隱我耕而子織誠愛秦王之竒勇不願絶筋而稱力已矣哉使豫章生而可知夫何異乎叢棘觀漏賦有序客有觀於漏者退而歎曰夫及逺者箭也而定逺非箭之功為生者我也而制生非我之情故自箭而為心不可憑者絃因生以觀我不可恃者年憑其不可恃故以悲哉况乎沈華密逺輕波潛耗而感神嬰慮者又自外而傷壽以是思生生亦勤矣乃為賦云佩流歎於馳年纓華思於奔月結蘭苕以望楚弄參差以歌越撫凝肌於遷滯鑑雕容於髣佛景有墜而易昏憂無方而難歇歷玫階而升隩訪金壺之盈闕觀騰波之吞寫視驚箭之登沒箭既沒而復登波長瀉而弗歸注沈穴而海漏射懸塗而電飛墐户牖而知天掩雲霧而測暉創百齡於纎隱積千里於空微彼崢崢而行溢此冉冉而逾衰撫寸心而未改指分光而永違昔傷矢之奔禽聞虛弦之顛仆徒嬰創而知懼豈潛機之能覺惟生經之靃靡亦悲長而歡促恆證古而秉心抱空意其如玉波沈沈而東注日滔滔而西屬落繁馨於纎草殞豐華於喬木對昃離而後歌據窮蹊而方哭雖接薪之更傳寧絶明之還續貫古今而并念信寡易而多難時不留乎激矢生乃急於走丸既河源之莫壅又吹波而助瀾神怵逈而多慮心轁而鮮歡望天涯而佇念擢雄劒而長歎嗟生民之永迷躬與後而皆恤死零落而無二生差池之非一理幽分於化前算冥定於天秩與艾骨而招病猶刳腸而興疾情殊用而俱盡事離方而同失聊弭志以髙歌順煙雨而沈逸於是隨秋鴻而泛渚逐春燕而登梁進賦詩而展念退陳酒以排傷物不可以兩大時無得而雙昌薰晚華而後落槿早秀而前亡姑屏憂以愈思樂茲情於寸光從江河之紆直委天地之圓方漏盈兮漏虛長無絶兮芬芳傷逝賦晨登南山望美中阿露團秋槿風卷寒蘿悽愴傷心悲如之何盡若窮煙離若翦絃如影滅地猶星殞天棄華宇於明世閉金扄於下泉永山河以自畢眇千齡而弗旋思一言於向時邈衆代於古年逝稍逺而變體浸幽明而改時覽篇迹之如旦婉遺意而在茲忽若謂其不然自惆悵而驚疑循堂廡而下降歷幃户而升基服委襟而褫帶器蒙管而韜絲志存業而遺績身先物而長辭豈重歡而可覯追前感之無期寒往暑來而不窮哀極樂反而有終燧已遷而禮革月既逾而慶通心微微而就遠迹離離而絶容白日藹而回陰閨館寂而深重冀憑靈於前物佇美目乎房櫳徒望思於永久邈歸來其何從結單心於暮條掩行淚於晨風念沈悼而誰劇獨嬰哀於逝躬草忌霜而逼秋人惡老而逼衰誠衰耄之可忌或甘願而志違彼一息之短景乃纍恨之長暉尋平生之好醜成黃塵之是非將滅耶而尚在何有去而無歸惟桃李之零落生有促而非夭觀龜鶴之千祀年能富而情少反靈質於二塗亂感悅於雙抱日月飄而不留命倐忽而誰保譬明隙之在梁如風露之停草髮迎憂而送華貌先悴而收藻共甘苦其幾人曾無得而偕老拂埃琴而抽思啓陳書而遐討自古來而有之夫何怨乎天道蕪城賦濔迆平原南馳蒼梧漲海北走紫塞鴈門拖以漕渠軸以崑岡重江復關之奧四會五達之莊當昔全盛之時車挂轊人駕肩㕓閈撲地歌吹沸天孶貨鹽田鏟利銅山才力雄富士馬精妍故能侈秦法佚周令劃崇墉刳濬洫圖修世以休命是以板築雉堞之殷井幹烽櫓之勤格髙五嶽袤廣三墳崒若斷岸矗似長雲製磁石以禦衝糊頳壤以飛文觀基扄之固護將萬祀而一君出入三代五百餘載竟瓜剖而豆分澤葵依井荒葛罥途壇羅虺蜮階鬬􅍪鼯木魅山鬼野鼠城狐風嘷雨嘯昏見晨趨飢鷹厲吻寒鴟嚇雛伏􅕝藏虎乳血餐膚崩榛塞路崢嶸古馗白楊早落寒草前衰稜稜霜氣蔌蔌風威孤蓬自振驚沙坐飛灌莽杳而無際叢薄紛其相依通池既已夷峻隅又已頽直視千里外唯見起黃埃凝思寂聽心傷已摧若夫藻扄黼帳歌堂舞閣之基璇淵碧樹弋林釣渚之館吳蔡齊秦之聲魚龍爵馬之玩皆薰歇燼滅光沈響絶東都妙姬南國麗人蕙心紈質玉貌絳唇莫不埋魂幽石委骨窮塵豈憶同輦之愈樂離宫之苦辛哉天道如何吞恨者多抽琴命操為蕪城之歌歌曰邉風起兮城上寒井徑滅兮丘隴殘千齡兮萬代共盡兮何言芙蓉賦感衣裳於楚賦詠憂思於陳詩訪羣英之艷絶標髙名於澤芝會春陂乎夕張搴芙蓉而水嬉抽我襟之桂蘭點子吻之瑜辭選羣芳之徽號闕抱茲性之清芬稟若華之驚絶單蓲陽之妙手測滮池之光潔爍彤輝之明媚粲雕霞之繁悅顧椒丘而非偶豈園桃而能埒彪炳以蒨藻翠莖而紅波青房兮規接紫的兮圓羅樹妖淫之弱幹散菡萏之輕荷上星光而倒景下龍鱗而隱波戲錦鱗而夕映濯繡羽以晨過結遊童之湘吹起榜妾之江歌備日月之溫麗非盛夏而謂何若乃當融風之暄蕩承暑雨之平渥被瑶塘之周流繞金渠之屈曲排積霧而揚芬鏡洞泉而含緑葉折水以為珠條集露而成玉潤蓬山之瓊膏輝蔥河之銀燭冠五華於仙草超四照於靈木雜衆姿於開卷閲羣貌於昏明無長袖之容止信不笑之空城森紫葉以上擢紛湘蘂而不傾根雖割而琯徹柯既解而絲縈感盛衰之可懷質始終而常清故其為芳也綢繆其為媚也奔發對妝則色殊比蘭則香越泛明彩於宵波飛澄華於曉月陋荆姬之朱顔夏女之光髮恨狎世而貽賤徒愛存而賞沒雖凌羣以擅竒終從嵗而零歇園葵賦風暖凌開土昌泉動遊塵曝日鳴雉依隴主人拂黃冠拭藜杖布蔬種平圻壤通畔修直膏畝夷敞白莖紫蒂豚耳鴨掌溝東陌西行三畦兩既區既鉏乃露乃映勾萌欲伸藂牙將放爾乃晨露夕陰霏雲四委沈雷逺震飛雨輕灑徐未及晞疾而不靡柔莩爰秀剛甲以解稚葉萍布弱陰競抽萋萋翼翼沃沃油油下葳蕤而被徑上參差而覆疇承朝陽之麗景得傾柯之所投仕非魯相有不拔之利賓非二仲無逸馬之憂顧堇荼而莫偶豈蘋藻之薦羞若乃鄰老談稼女嫗歸桑拂此葦席炊彼穄粱甃壺援醢曲瓢卷漿乃羹乃瀹堆鼎盈筐甘旨蒨脆柔滑芬芳消淋逐水潤胃調腸於是既飫徹盤投筯回小人之腹為君子之慮近觀物運逺訪師聖聲數後彰律理前定烏非黔黑鶴豈浴淨彼圓行而方止固得之於天性伊冬箑而夏裘無雙功而並盛蕩然任心樂道安命春風夕來秋日晨映獨酌南軒擁琴孤聽篇章間作以歌以詠魚深沈而鳥髙飛孰知美色之為正舞鶴賦散幽經以驗物偉胎化之仙禽鍾浮曠之藻質抱清逈之明心指蓬壺而飛翰望昆閬而揚音匝日域以回􅕽窮天步而髙尋踐神區其既逺積靈祀而方多精含丹而星耀頂凝紫而煙華引圓吭之纎婉頓修趾之洪姱疊霜毛而弄影振玉羽而臨霞朝戲於芝田夕飲乎瑶池厭江海而遊澤掩雲羅而見羈去帝鄉之岑寂歸人寰之喧卑嵗崢嶸而催暮心惆悵而哀離於是窮陰殺節急景凋年涼沙振野箕風動天嚴嚴苦霧皎皎悲泉冰塞長河雪滿羣山既而氛昏夜歇景物澄廓星翻漢回曉月將落感寒雞之早晨憐霜鴈之違漠臨驚風之蕭條對流光之照灼唳清響於丹墀舞飛容於金閣始連軒以鳳蹌終宛轉而龍躍躑躅徘徊振迅騰摧驚身蓬集矯翅雪飛離綱别赴合緒相依將興中止若往而歸颯沓矜顧遷延遲暮逸翮後塵翺翥先路指會規翔臨岐矩步態有遺妍貌無停趣奔機逗節角睞分形長揚一作揚翹緩騖並翼連聲輕迹凌亂浮影交橫衆變繁姿參差洊密煙交霧凝若無毛質風去雨還不可談悉既散魂而蕩目迷不知其所之忽星離而雲罷整神容而自持仰天居之崇絶更惆愓以驚思當是時也燕姬色沮巴童心恥巾拂兩停丸劒雙止雖邯鄲其敢倫豈陽阿之能擬入衛國而乘軒出吳都而傾市守馴養於千齡結長悲於萬里野鵝賦有獻野鵝於臨川王世子愍其樊縶命為之賦其辭曰集陳之隼以自逺而稱神栖漢之雀乃出幽而見珍此瑣禽其何取亦厠景而承仁捨水澤之歡逸對鐘鼓之悲辛豈徇利而輕命將感愛而投身入長羅之逼脅悵髙繳之樊縈邈辭朋而别偶超煙霧而風行跨日月以遙逝忽瞻國而望城踐菲迹於瑶塗升弱羽於丹庭瞰東西之繡户眺左右之金扄貌纎殺而含悴心翻越而慙驚若墜淵而墮谷恍不知其所寧惟君囿之珍麗實妙物之所殷翔海澤之輕鷗巢天宿之鳴鶉鶡程材於梟猛翬薦體之雕文既敷容以照景亦避翮而排雲雖居物以成偶終在我以非羣望征雲而延悼顧委翼而自傷無青雀之銜命乏赤鴈之嘉祥空穢君之園池徒慙君之稻粱願引身而剪迹抱末志而幽藏於是流嵗遂逺慘節方崇雲纒海岱風拂崤潼飛氛馳霰飄沙舞蓬視清池之初涸望緑林之始空立菰蒲之寒渚託隻影而為雙宛拔啄而掩眥悲結悵而滿胸處朝晝而雅念假外見而遷排涉修夜之長寂信專思而知哀風梢梢而過樹月蒼蒼而照臺冰依岸而早結霜託草而先摧斂雙翮於水裔翹孤趾於林隈情無方而雨集事有限而星乖在俄頃而猶悼矧窮生之所懷聞宿世之髙賢澤無微而不均育草木而明義愛禽鳥而昭仁全殞卵而來鳳放乳麑而感麟雖陋生於萬物若沙漠之一塵茍全軀而畢命庶魂報以自申尺蠖賦智哉尺蠖觀機而作伸非向厚屈非向薄當靜泉渟遇躁風驚起軒軀以曠跨伏纍氣而併形冰炭弗觸鋒創靡忤逢嶮蹙蹐值夷舒步忌好退之見猜哀必進而為蠧每驤首以瞰途常佇景而翻露故身不豫託地無前期動靜必觀於物消息各隨乎時從方而應何慮何思是以軍算慕其權國容擬其變髙賢圖之以隱淪智士以之而藏見笑靈蛇之久蟄羞龍德之方戰理害道而為尤事傷生而感賤茍見義而守勇豈專取於弦箭飛蛾賦仙鼠伺暗飛蛾候明均靈舛化詭欲齊生觀齊生而欲詭各會住以憑方凌燋煙之浮景赴煕焰之明光拔身幽草下畢命在此堂本輕死以邀得雖糜爛其何傷豈學山南之文豹避雲霧而巖藏表疏為柳令讓驃騎表臣言伏承詔書加臣驃騎將軍餘如故顧循空薄屢墜成命仰當天寵伏抱慙灼臣素陋人本絶分望適野謝山川之志輟耕無鴻鵠之歎宦希鄉部富期農牧夙當昌朝早值恩洽天綱紛橫皇厯歸聖左輪不殷良馬未汗功半下列爵超上賞奮迹騰光參駕龍服翰起雲飛拂翼虹路雖曩之脫駕拖紫弛擔丹轂方之微臣彼安足齒齊此而歸懼塵王度況遂頻煩重彰濫越伏願天德曲成資始令終雨露之惠自華及殞特屈慈奬降申愚固則綢繆之施復踰造物不勝感躍惶駭之情謹拜表以聞謝秣陵令表臣照言即日被尚書召以臣為秣陵令臣負鍤下農執羈末皂情有局塗志無遠立遘命逢天得汙官牒不悟恩澤無窮謬當奬試用謝刀筆猥承宰職豈是暗懦所能克任今便抵召違離省闥係戀罔極不勝下情謹拜表以聞解褐謝侍郎表臣照言臣孤門賤生操無炯迹鶉棲草澤情不及官不悟天明廣矚騰滯援沈觀光幽節聞道朝年榮多身限思非終報謝解禁止表臣言被宣令解臣禁止天光鄭重不可勝逢飛走知感矧臣人類臣聞獲過于神或憑尸祝以請得罪於君可因左右而謝臣自惟孤賤盜幸榮級暗澀大誼猖狂世禮竒非阮籍無保持之助才愧馮衍有轁之因自非聖朝超然覽臣於視聽之外則今日渥澤更成妄遭來辰萎葉終先朝草小人嵗暮知能何報徒厚恩華憂懼歎息不任下情謹詣拜表以聞皇孫誕育上表兼郎中令侍郎臣照言伏承東儲積慶皇孫誕育國啓昌期民迎福運臺禁稱祉井廬相賀伏惟聖懷載深鴻悆不任下情謹詣閣上表以聞征北世子誕育上表臣等言臣聞本枝無疆布諸前典衆多彌貴信之華封故德積則慶深業昌則祚廣伏承王子以中氣正月鍾靈納和誕躬紫閣膺祚朱紱弧矢夙陳圭璋攸覿雲光麗輝巖澤昭采嘉祥爰孚柔顔載晬凡在氓𨽻莫不忭悅臣霑恩踰物慶倍自中不勝殊歡溢喜謹奉表以聞拜侍郎上疏臣言臣北州衰淪身地孤賤衆善必違百行無一生丁昌運自比人曹操乏端槩業謝成迹徂年空往瑣心靡述褫轡投簮於斯終志束菜負薪期與相畢安此定命忝彼公朝不悟乾羅廣收圓明兼覽雕瓠飾笙備雲和之品潢汙流藻充金鼎之實鎩羽暴鱗復見翻躍枯楊寒炭遂起煙華未識微躬猥能及此未知陋生何以為報祗奉恩命憂愧增灼不勝感荷屏營之情謹詣閣拜疏以聞侍郎報滿辭閣疏臣言臣所居職限滿今便收迹金閨雲路從茲自逺鮪􅀈沈藏方絶光景祗戀遲回結涕濡泗臣嚚杌窮賤情嗜踳昧身弱涓甃地幽井谷本應守業墾畛剿芿牧雞圈豕以給征賦而幼性猖狂因頑慕勇釋擔受書廢耕學文畫虎既敗學步無成反拙歸跂還陋燕雀日晏途逺塊然自喪加以無良根孤伎薄既同馮衍負困之纍復抱相如消渴之疾志逐運離事與衰合束馬埋輪絶遊息世宿福餘慶爰遘聖明煦蒸霜霰莩甲雲露得從下走叨迹人行操勒負羇班榮扈𨽻矜愚訓短哀有弗及奉此而歸足以沒齒雖摩肌髮無報天德更翼營魂還能結草不勝感戀之情謹詣闕拜疏奉辭以聞轉常侍上疏臣言即日被中曹板轉臣為左常侍臣自惟常人觸事無可謬被拔擢實為光榮臣既無髣佛上報殊絶之恩有分每豐其過前後輕重輒得原恕奬以君子之方赦其不間教訓大愆不責矜澤必加是臣所以夙夜自念知遭遇之至深至厚也未冀未望便荷今榮欣喜感悅不敢偽讓庶保終始身命為初不勝下情謹詣閣拜疏謝以聞謝隨恩被原疏臣言即日被曹宣命元統內外五刑以下浩澤蕩汰臣亦預焉得從漢律故謬之辨暗遭周典肆眚之科大喜卒至非願所圖魚愕雞睨且悚且慙臣誠下愚不達義方然君尊臣泰豈同犬馬且常侍臣淵穆疏草即臣所作助人為恭猶加敬憶自已率禮寧敢慢忘繇臣悴賤可侮可誣曽參殺人臣豈無過寢病幽栖無援朝列身孤節卑易成論硋幸大明臨下仁道育物澤泊翾走臣覃末慶然古人有言楊者易生之木也一人植之十人拔之無生楊矣何則植之者難拔之者易况臣一植之功不立衆拔之過屢至同彼風霜異此貞脆書稱天秩有禮易載神福在謙臣之謙禮理謝福秩仰銜俯愧行歎坐戚即欲顛沛拜恩下庭但臣病久柴羸不堪冒涉小得趨馳星駕登路不勝荷佩之誠謹上疏以聞啓論國制啓臣啓臣聞尺之量錦工者裁之袤丈之木繩墨在焉事無巨細非法不行當今世間政睦藩國相望君舉必書動成準式息躬聖壤十有餘載條制節文宜其備矣諸王列封動靜兼該而竊見國之處事未盡善臣之暗蔽私心有措伏見彭城國舊制猶有數卷雖多殊革大綱可依愚謂宜令掌故刋而撰之上著朝典藩邦之度下揆國訓繁簡之誼傍酌州府寬猛之中章程久具永為恆制豈伊今美乃足貴之將來臣忝充直員脫以啓聞煩而非要伏追慙悚謹啓謝上除啓臣言被宣賜臣上除臣伏事日淺蒙荷已豐天澤所及且喜且懼但臣自丁常梪來塗階級非所敢冀今日榮願直爾不少冒乞停止上除伏願重許干穢悚息謝賜藥啓臣衛躬不謹養命無術情淪五難妙謝九法飈落先傷衰疴早及遐澤近臨猥委存恤􅠰同山嶽蒙靈藥之賜惠非河間謬仙使之屈恩逾脯糗惠重帷席荷對銜慙伏抱襟渥謝永安令解禁止啓臣田茅下第質非謝品志終四民希絶三仕邀世逢辰謬及推擇恩成曲積榮秩兼過雖誓投纎生昊天罔極迄無犬馬孤慙星嵗加以淪節雪飈沈誠欵晦值天光燭幽神照廣察澡舋從宥與物更稟遂晞曬陽春湔汰秋水綴翼雲條葺鮮決沼洗膽明目抃手太平重甄再造含氣孰比不悟乾陶彌運復垂埏飾矯迹升等改觀非服振纓珥筆聯承貴寵豈臣浮朽所可恭從實非愚瞢所宜循踐瑣族易灰脆漏已迫空荷載燾終責仰復飲氷肅事懷火畢命不勝屏營之情謹啓事以聞通世子自解啓僕以短梪無用於世遭逢謬幸被受恩榮誠願論畢久宜捐落仁眷篤終復獲淹停感今惟昔銜佩無已但自無堪尸素纍載腹心之愧寤寐為憂今請解所職願蒙矜許自奉清塵于茲六祀墜辰永往遺恩在心執紙哽咽言不自宣重與世子啓奉還誨深承殷勤篤眷之重披讀未終悲愧交集僕以常人所蒙隆厚久應知退非適今日銜恩戀德用缺進心今者之請必願鑒許且僕棲遲無事咫尺館第餐稟風微非旦則夕居職還私兩者無異而於僕無用有以自處豈非仁念始終之惠重致于日彌深慙感請假啓臣啓臣居家之治上漏下濕暑雨將降有懼崩壓比欲完葺私寡功力板鍤綯塗必須躬役冒欲請假三十日伏願天恩賜垂矜許于啓復追悚息謹啓又臣啓臣所患彌留病軀沈痼自近蒙歸頻更頓處日夜間困或數四委然一弊瞻景待化加以凶衰嬰遘慘悼終鮮兄弟仲由所哀臣實百罹孤苦風雨天倫同氣實惟一妹存沒永訣不獲計見封瘞泉壤臨送私懷感恨情痛兼深臣母年老經離憂傷服粗食淡羸耗增疾心計焦迫進退罔躓冒乞申假百日伏願天慈賜垂矜許臣違福履身事屯悴歎息和景掩淚春風執啓涕結伏追惶悚謹啓奉始興王白紵舞曲啓侍郎臣鮑照啓被教作白紵舞歌辭謹竭庸陋裁為四曲附啓上呈識方淟悴思塗猥局言既無雅聲未能文不足以宣贊聖旨抽拔妙實謹遣簡餘慙隨悚盈謹啓書登大雷岸與妹書吾自發寒雨全行日少加秋潦浩汗山溪猥至渡泝無邊險徑遊棧石星飯結荷衣水宿旅客貧辛波路壯闊始以今日食時僅及大雷塗登千里日踰十晨嚴霜慘節悲風斷肌去親為客如何如何向因涉頓憑觀川陸遨神清渚流睇方曛東顧五洲之隔西眺九𣲖之分窺地門之絶景望天際之孤雲長圖大念隱心者久矣南則積山萬狀爭氣負髙含霞飲景參差代雄凌跨長隴前後相屬帶天有匝橫地無窮東則砥原逺隰亡端靡際寒蓬夕卷古樹雲平旋風四起思鳥羣歸靜聽無聞極視不見北則陂池濳演湖脈通連苧蒿攸積菰蘆所繁栖波之鳥水化之蟲智吞愚強捕小號噪驚䀨紛乎其中西則回江永指長波天合滔滔何窮漫漫安竭創古迄今舳艫相接思盡波濤悲滿潭壑煙歸八表終為野塵而是注集長寫不測修靈浩蕩知其何故哉西南望廬山又特驚異基壓江潮峯與辰漢連接上常積雲霞雕錦縟若華夕曜巖澤氣通傳明散綵赫似絳天左右青靄表裏紫霄從嶺而上氣盡金光半山以下純為黛色信可以神居帝郊鎮控湘漢者也若潨洞所積溪壑所射鼓怒之所豗擊湧澓之所宕滌則上窮荻浦下至狶洲南薄燕瓜北極雷澱削長埤短可數百里其中騰波觸天髙浪灌日吞吐百川寫泄萬壑輕煙不流華鼎振涾弱草朱靡洪漣隴蹙散渙長驚電透箭疾穹溘崩聚坻飛嶺覆回沫冠山奔濤空谷砧石為之摧碎崎岸為之齏落仰視大火俯聽波聲愁魄脅息心驚慓矣至於繁化殊育詭質怪章則有江鵝海鴨魚鮫水虎之類豚首象鼻芒鬚針尾之族石蟹土蚌燕箕雀蛤之儔折甲曲牙逆鱗返舌之屬掩沙漲被草渚浴雨排風吹潦弄翮夕景欲沈曉霧將合孤鶴寒嘯逰鴻逺吟樵蘇一歎舟子再泣誠足悲憂不可説也風吹雷飈夜戒前路下弦內外望達所屆寒暑難適汝專自慎夙夜戒護勿我為念恐欲知之聊書所覩臨塗草蹙辭意不周頌河清頌有序臣聞善談天者必徵象於人工言古者先考績於今鴻羲以降遐哉邈乎鏤山嶽雕篆素昭德垂勳可謂多矣而史編唐堯之功載格于上下樂登文王之操稱於昭于天素狐玄玉聿彰符命朴牛文蚓爰定祥厯魚鳥動色禾雉興讓皆物不盈眥而美溢金石詩人於是不作頌聲為之而寢庸非惑歟自我皇宋之承天命也仰符應龍之精俯協河龜之靈君圖帝寶粲爛瑰英固以業光曩代事華前德矣聖上天飛踐極迄兹二十有四載道化周流玄澤汪濊地平天成上下含熙文同軌通表裏禔福曜德中區黎庶知讓觀英遐表夷貊懷惠恤勤秩禮散露臺之金舒國賑民傾巨橋之粟約違迫脅奢去泰甚宴無留飲畋不盤樂物色異人優遊鯁直顯靡失心幽無怨魄精照日月事洞天情故不勞仗斧之臣號令不嚴而自肅無辱鳯舉之使靈怪不召而自彰萬里神行飈塵不起農商野廬邉城偃拆兾馬南金填委內府馴象西爵充羅外囿阿紈纂組之饒衣覆宗國魚鹽杞梓之利傍瞻荒遐士民殷富五陵既有慙德宫宇宏麗三川莫之能比閭閈有盈歌吹無絶朱輪疊轍華冕重肩豈徒世無窮人民獲休息朝呼韓罷酤鐵而已哉是以嘉祥纍仍福應尤盛青丘之狐丹穴之鳥栖阿閣遊禁園金芝九莖木禾六仞秀銅池發膏畝宜以謁薦郊廟和協律吕煙霏霧集不可勝紀然而聖上猶昧旦夙興若有望而未至宏規逺圖如有追而莫及神明之貺推而弗居也是以琬碑鏐檢盛典蕪而不治朝神省方大化抑而未許崇文協律之士蘊儛頌於外坐朝陪宴之臣懷揄揚於內三靈佇眷九壤注心既有日矣嵗宫乾維月躔蒼陸長河巨濟異源同清澄波萬壑潔瀾千里斯誠曠世偉觀昭啓皇明者也語曰影從表瑞從德此其效焉宣尼稱鳳鳥不至河不出圖傳曰俟河之清人壽幾何皆傷不可見者也然則古人所未見者今殫見之矣孟軻曰千載一聖是旦暮也豈不信哉夫四皇六帝樹聲長世大寶也澤浸羣生國富刑清鴻德也制禮裁樂惇風遷俗文教也殊華逋羯束顙絳闕武功也鳴鳥躍魚滌穢河渠至祥也大寶鴻德文教武功其崇如此幽明協贊民祗與能厥應如彼唯天為大堯實則之皇哉唐哉疇與為讓抑又聞之勢之所覃者淺則美之所傳者近道之所感者深則慶之所流者逺是以豐功韙命潤色縢䇿盛德形容藻被歌頌察之上代則奚斯吉甫之徒鳴玉鑾於前視之中古則相如王褒之屬馳金羈於後絶景揚光清埃繼路故班固稱漢成之世奏御者千有餘篇文章之盛與三代同風繇是言之斯乃臣子舊職國家通議不可輟也臣雖不敏敢不勉乎乃作頌曰窺刋崩石捃逸殘竹巢風寂寥羲埃綿邈巨生大年贍學淵聞鞶繡成景粉繢顓軒徒玩井科未覩天河亘古通今明鮮晦多千齡一見書史登歌旋我皇駕揆景方塗凌周躐殷蹶唐轢虞如彼七緯纍璧重珠髙祖撥亂首物定靈更開天地再鑄羣生帝御三傑龍步八坰朔南暨教海北騰聲淪深格髙浹遐洞冥毚鼎遷宋玄圭告成大明方徽鴻光中微聖命誰堪皇厯攸歸謀從筮協神與民推黃旗西映紫蓋東輝納瑞螭玉升政衡璣金輪約飾珠冕龍衣正位北辰垂拱南面天下何思日用罔倦復禮歸仁觀恆通變一物有違戚言毁膳非躬簡法厚下安宅謙德彌光損道滋益孝崇饗祀勤隆耕藉饘酎秋羊封墐春骼嬰耄兼梁鰥孤重帛體由學染俗以教遷禮導刑清樂鬯風宣分衢讓齒折訟推田野旌伏彥朝賞登賢儒訓優柔武節焱鷙文憲精𢎞戎容犀利樞鈐明審程彠周備吏礪平端民羞幸覬桴鼓凝埃烽驛垂轡銷我長劍歸為農器閩外水鄉鄣表炎國隴首西南渤尾東北赩赩嶺丹渾渾泉黑移琛雲勉轉集卬僰狼歌薦功鳥談陳德治博化光民阜財盛班白行謠清綺髙詠雲表幽和物章明慶麗植雕質蠢行藻性仁草晨莩德宿宵映海無隱飈山有黃落牛羊內首閭户外拓瑞木朋生祥禽輩作薰風蕩閨飴露流閣器範神妙劑調象藥匪直也斯偉慶方溱注彼四瀆媚此雙川伏靈遙紀閟貺遐年澄波海嶽鏡流蔥山泉室凝澱水府清涓俯瞰夷都降視驪淵朱宫潛耀紫閣隂鮮昔在爽德王風不昌乃溢乃竭或壅或亡潔源濫壑曾是未央先民永慨大道悠長云何其瑞實鍾我皇聞諸師説天竦聽密介焉如響匪逺惟疾矧是皇心妙夫貞一左右天經户牖人術許謨布簡絲言盈室穢有綿祀清豈崇日一人之慶吹萬稟和靈根方固修源重波副睿二哲帝體皇柯景雲蔚嶽秀星駢羅垂光九野騰響四遐輔車鼎足槃石虎牙世匹周室基永漢家泰階既平洪河既清大人在上區宇文明樵夫議道漁父濯纓臣照作頌鋪德樹聲佛影頌形生麗怪神照潭寂驗幽以明考心者迹六塵煩苦五道綿劇乃炳舟梁爰悟淪溺色丹貌繢留相瓊石金光絶見玉毫遺覿俾昏作朗效順去逆銘凌煙樓銘有序臣聞慿飈薦響唱微效長垂波鑒景功少致深是以冰臺築乎魏邑鳯閣起於漢京皆所以贊生通志感恱幽情者也伏見所製凌煙樓棲置崇逈延瞰平寂即秀神皋因基地勢東臨吳甸西眺楚關奔江永寫鱗嶺相葺重樹窮天通原盡目悲積陳古賞絶舊年誠可以暉曠髙明藻徹逺心矣夫識緣感傾事待言彰匪言匪述綿世罔傳敢作銘曰巖巖崇樓藐藐層隅階基天削户牖雲區瞰江列楹望景延除積清風路合綵煙塗俯窺淮海俯眺荆吳我王結駕藻思神居宜此萬春修靈所扶飛白書勢銘秋毫精徑霜素凝鮮霑此瑶波染彼松煙超工八法盡竒六文鳥企龍躍珠解泉分輕如遊霧重似崩雲絶鋒劍摧驚勢箭飛差池燕起振迅鴻歸臨危制節中險騰機圭角星芒明麗爛逸絲縈髮垂平理端密盈尺錦兩片字金溢故仙芝煩弱既匪足雙蟲虎瑣碎又安能匹君子品之是最神筆藥奩銘歲霣走丸生猒隤墻時無驟得年有遐方水玉出煙靈飛生光龜文電衣龍綵雲裳九芝八石延正蕩斜二脂六體振衰返華毛姬餌葉鳯子藏花景絶翠虬氣隱頳霞深神罕别妙竒不揚或繁虎杖或亂蛇牀故不世不可以服未達不可以嘗眩睛逆目是乃為良石帆銘應風剖流息石橫波下潨地軸上獵星羅吐湘引漢歙蠡吞沱西歷岷冢北瀉淮河眇森𢎞藹積廣連深淪天測際亘海窮隂雲旌未起風柯不吟崩濤山墜鬱浪雷沈在昔鴻荒刋啓源陸表裏民邦經緯鳥服瞻貞視晦坎水巽木乃剡乃鏟既刳既斫飛深浮逺巢潭館谷涉川之利謂易則難臨淵之戒曰危乃安泊潛輕濟冥表勤言穆戎遂畹昭御不還徒悲猿鶴空駕滄煙君子彼想祗心載惕林簡松栝水採龍鷁覘氣涉潮投祭沈璧揆檢含圖命辰定厯二崤虎口周王夙趨九折羊腸漢臣電驅潛鱗浮翼爭景乘虛衡石頳鰩帝子察殂青山斷河后父沈軀川吏掌津敢告訪途瓜步山楬文歲舍龍紀月巡鳥張鮑子辭吳客楚指兖歸揚道出關津升髙問途北眺氊鄉南曬炎國分風代川揆氣閩澤四睨天宫窮曜星絡東窺海門候景落日遊精八表駃視四遐超然永念意類交橫信哉古人有數寸之籥持千鈞之關非有其才施處勢要也瓜步山者亦江中眇小山也徒以因逈為髙據絶作雄而凌清瞰逺擅竒含秀是亦居勢使之然也故才之多少不如勢之多少逺矣仰望穹垂俯視地域涕洟江河痝贅丘嶽雖奮風漂石驚電剖山地綸維陷川鬬毁宫毫盈髮虗曽未注言況乎沈河浮海之髙遺金椎璧之竒四遷八聘之策三黜五逐之疵販交買名之薄吮癕舐痔之卑安足議其是非漢魏六朝百三家集卷六十八
