body:
  text: 漢魏六朝百三家集卷七十宋袁淑集題詞史載袁氏世多忠烈若陽源死於元凶名為風霜松筠不虛也或責彼既志不從亂曷不疾驅告變出君險厄然事發倉猝身閉宫省翹首君門呌呼莫屬儒者雍容亦莫可如何耳陽源俳諧集文皆調笑其於藝苑亦博簺之類也禦虜議世譏其誕然文采遒艷才辨鮮及即不得為儀秦縱橫方諸燕然勒銘廣成作頌意似欲無多讓詩章雖寡其摹古之篇風氣竟逼建安此人不死顔謝未必能出其上也彭城少文情好不接劉湛貴盛未輕襒裾文人寡合其落拓之性固然目録賦桐賦秋晴賦議禦虜議章謝中丞章書與始興王濬書與何尚之書傳真隱傳雜文弔古文雞九錫文賀表驢山公九錫文大蘭王九錫文常山王九錫文遊新亭曲水詩序詩效子建白馬篇效古詠冬至種蘭登宣城郡啄木詩漢魏六朝百三家集卷七十目録欽定四庫全書漢魏六朝百三家集卷七十明張溥輯宋袁淑集賦桐賦越衆木之薰徇勝雜樹之藻縟信爽幹以弱枝實裏素而表緑若乃根荑條茂迹曠心沖貞觀於曾山之陽抽景於少澤之東被籍兮煙霞懷珮兮星虹儀丹丘之瑞羽棲清都之仙宫秋晴賦是月也聲晷合朝夜分霆收耀虹戢文炎都塞埃旻宇滌氛曳悲泉之凝霧轉絶垠之嚴雲議禦虜議淑元嘉末為御史中丞時索虜南侵至瓜步太祖使百官議防禦之術淑上議臣聞函車之獸離山必斃絶波之鱗宕流則枯羯寇遺醜趨致畿甸蟻萃螽集聞已崩殪天險巖曠地限深遐故全魏戢其圖盛晉輟其議情屈力殫氣挫勇竭諒不虞於來臨本無怵於能濟矣乃者燮定攜逺阻違授律由將有弛拙故士少鬬志圍潰之衆匪寇傾淪攻制之師空自班散濟西徑騎急戰蹴旅淮上訓卒簡備靡旗是由綏整寡衷戎昭多昧遂使栲潞入患泉伊來擾紛殄姬風泯毒禹績騰書有渭陰之迫懸鋒均咸陽之警然而切揣虛實伏匿先彰挍索伎能譎詭既顯綿地千里彌行阻深表裏躓硋後先介逼捨陵衍之習競湍沙之利今虹見萍生土膏泉動津陸陷溢痁禍洊興芻藁已單米粟莫係水宇襟帶進必傾霣河溢扁固退亦隳滅所謂栖烏於烈火之上養魚於叢棘之中或謂損緩江右寬繕淮內竊謂拯扼閩城舊史為久棄遠涼土前言稱非限此要荒猶弗委割况連被京國咫尺神甸數州摧掃列邑殱夷山淵反覆草木塗地今丘賦千乘井笇萬集肩摩倍於長安締袂百於臨淄什一而籍實慊民願履畝以稅既協農和戶競戰心人含鋭志皆欲贏糧請奮釋緯乘城謂宜懸金鑄印要壯果之士重幣甘辭招摧決之將舉薦板築之下抽登臺皂之間賞之以焚書報之以相爵俄而招才賀闕異能間至戎貪而無謀肆而不整迷乎向背之次謬於合散之宜犯軍志之極害觸兵家之甚諱咸畜憤矣僉策戰矣稱願影從謠言緍命宜選敢悍數千騖行潛掩偃旗裹甲鉗馬銜枚旝稽而起晨壓未陳旌譟亂軍火鼓四臨使景不暇移塵不及起無不禽鎩獸讋氷解霧散掃洗哨類漂鹵浮山如有決罦漏網逡窠逗穴命淮汝戈船遏其還徑兖部徑卒梗其歸塗必翦元雄懸首麾下乃將隻輪不返戰轊無旋矣於是信臣騰威武士繕力緹組接陰鞞柝聯響若其偽遁羸張出沒無際楚言漢斾顯默如神固已日月蔽虧川谷蕩貿負塞殘孽阻山燼黨收險竊命憑城借土則當因威席卷乘機芟剿泗汴秀士星流電燭徐阜嚴兵雨湊雲集蹶亂桑溪之北搖潰瀚海以南絶其心根勿使能植銜索之枯幾何不蠧是由涸澤而漁焚林而狩若浚風之儛輕籜杲日之拂浮霜既而尉洽荷掠之餘望弔網悲之鬼然後天行樞運猋舉煙升青蓋西巡翠華東幸經啓州野滌一軫策俾高闕再勒燕然復銘方乃奠山沈河創禮輯策闡耀炎昊之遺則貫軼商夏之舊文今衆賈拳勇而將術疏怯意者稔泰日積承平嵗久邑無驚赴之急家緩餽戰之勤闕閲訓之禮簡參屬之飾且亦薦採之法庸未蔇歟若乃邦造里選攉論深切躬擐盡幽斬帶尋遠設有沈明能照俊偉自宣誠感泉雨流通金石氣懾飛賁知窮苴起審邪正順逆之數達昏明損益之宜能揆合民心愚睿物性登丹墀而敷策躡青蒲而揚謀上説辰鑒下弭素言足以安民紓國救災恤患則宜拔過寵貴之上褒升戚舊之右别其旗章榮其班祿出得專譽使不稟命降席折節同廣武之請設壇致禮均淮陰之授必有要盟之功竊符之捷夷裔暴狠內外侮棄始附之衆分茷無序蠱以威利勢必攜離首順之徒靡然自及今淶繹故典瀍土纓緌翦焉幽播折首凶狡是猶眇者願明痿之思步動商遄會功終易感劫晉在於善覘全鄭實寄良諜多縱反間汨惑心耳發險易之前抵興喪之術衝其猜伏拂其嫌嗜汨以連率之貴餌以析壤之資罄筆端之用展辭鋒之鋭振辨則堅圍可解馳羽而巖邑易傾必府鬲土崩枝幹瓦裂故燕樂相侮項范交疑矣或乃言約功深事邇應廣齊圉反駕趙養還君盡輿誦之道畢能事之效臣幸得出內層禁遊心明代澤與身泰恩隨年行無以逢迎昌運潤飾鴻法今塗有遺鏃蠆未息蜂敢思涼識少酬閎施但坐幕既乏昭文免胄不能致果竊觀都護之邊論屬國之兵謨終朝之抗辭杜耿之言事咸云及經之棘猶闕上笇燭郛之敬裁收下策自恥懦木智不綜微敢露昧見無會昭採章謝中丞章竊惟此職昭贊實預損益必須兼資威正刺骨窮文使權家勳族不敢藉強而侮物戚門右姓不得稱雄以掩衆昔傅咸秉治臣僚戢懼孫寶移疾卿尹皆怠書與始興王濬書濬嘗送錢三萬餉淑一宿復遣追取謂使人謬誤欲以戲淑淑與濬書袁司直之視館敢寓書於上國之宫尹日者猥枉泉賦降委弊邑弊邑敬事是遑無或違二懼非郊贈之禮覲饗之資不虞君王惠之於是也是有懵焉弗圖旦夕發咫尺之記藉左右而請以為胥授失旨爰速先幣曾是附庸臣委末學孤聞者如之何弗疑且亦聞之前志曰七年之中一與一奪義士猶或非之况密邇旬次何其裒益之亟也藉恐二三諸侯有以觀大國之政是用敢布心腹弊室弱生砥節清廉好是潔直以不邪之故而貧聞天下寧有昧夫嗟金者哉不腆供賦束馬先璧以俟命惟執事所以圖之與何尚之書尚之為尚書令領太子詹事致仕於方山著退居賦以明所守而議者咸謂尚之不能固志淑為太子左衛率與尚之書詔書敦勸尚之復攝職昨遣修問承丈人已晦志山田雖曰年禮宜遵亦事難斯貴俾疏班邴魏通美於前策龔貢山衛淪慙乎曩篇規逮休告雪滌素懷冀尋幽之歡畢缺玄之適但淑逸操偏迥野性瞢滯果滋沖寂必沈樂忘歸然而已議塗聞者謂丈人徽明未耗譽業方籍儻能屈事康道降節徇務含南瀕之操淑此行求決矣望眷有積約日無誤尚之宅在南澗寺側故云南瀕傳真隱傳鬼谷先生不知何許人也隱居韜智居鬼谷山因以為稱蘇秦張儀師之遂立功名先生遺書責之曰若二君豈不見河邊之樹乎僕御折其枝波浪蕩其根上無徑尺之陰身被數尺之痕此木豈與天地有仇怨所居然也子不見嵩岱之松柏華霍之檀桐乎上枝干於青雲下根通於三泉千秋萬嵗不受斧斤之患此木豈與天地有骨肉哉蓋所居然也雜文弔古文賈誼發憤於湘江長卿愁悉於園邑彥真因文以悲出伯喈衒史而求入文舉疏誕以殃速德祖精密而禍及夫然不患思之貧無苦識之淺士以伐能見斥女以驕色貽遣以往古為鏡鑒以未來為針艾書余言於子紳亦何勞乎蓍蔡雞九錫文維神雀元年歲在辛酉八月已酉朔十三日丁酉帝顓頊遣征西大將軍下雉公王鳯西中郎將白門侯扁鵲咨爾浚雞山子維君天姿英茂乘機晨鳴雖風雨之如晦抗不已之奇聲今以君為使持節金西蠻校尉西河太守以揚州之會稽封君為會稽公以前浚雞山子為湯沐邑君其祗承豫命使西海之水如帶浚雞之山如礪國以永存爰及苗裔賀表浚山侍郎丁鴻舍人鳬亭男梁鴻郎中蘇鵠死罪伏惟君德著朝野勳加鵷鷟故天王鳯皇特錫位封今鳯鵲等在柏外願時拜受不勝欣豫之情謹詣栖下以聞驢山公九錫文若乃三軍陸邁種運艱難謀臣停算武夫吟歎爾乃長鳴上黨慷慨應𨝍崎嶇千里荷囊致餐用捷大勳歷世不刋斯實爾之功者也音隨時興晨夜不默仰契玄象俯協漏刻應更長鳴毫分不忒雖挈壺著稱未足比德斯又爾之智也若乃六合昏晦三辰幽冥猶憶天時用不廢聲斯又爾之明也青脊絳身長頭廣額修尾後垂巨耳雙磔斯又爾之相也嘉麥既熟實須精麵負荷回衡迅若轉電惠我衆庶神祗獲薦斯又爾之能也爾有濟師旅之勳而加之以衆能是用遣中大夫閭丘騾加爾使銜勒大鳴鴻臚班腳大將軍宫亭侯以揚州之廬江江州之廬陵吳國之桐廬合浦之朱廬封爾為驢山公大蘭王九錫文大亥十年九月乙亥朔十三日丁亥北燕伯使使者豪豨册命大蘭王曰咨惟君稟太陰之沈精標羣形於玄質體肥腯而洪茂長無心以遊逸資豢養於人主雖無爵而有秩此君之純也君昔封國殷商號曰豕氏業隆當時名垂于世此君之美也白蹢彰於周詩涉波應乎隆象歌詠出於人口經千載而流響此君之德也君相與野遊唯君為雄顧羣數百自西徂東俯噴沫則成霧仰奮鬛則生風猛毒必噬有敵必攻長驅直突陳無全鋒此君之勇也常山王九錫文及至圖身失所羈束人門馴纓服制惟意所牽登楹而遨抱梁而眠拾托遺餘恣口所便遊新亭曲水詩序離榭修幕陵隧彌阜鑣容斾綵裛野麗雲詩效子建白馬篇詩藪云宋齊之末靡極矣而袁陽源白馬虞子陽北伐大有建安風骨何從得之劒騎何翩翩長安五陵間秦地天下樞八方湊才賢荆魏多壯士宛洛富少年意氣深自負肯事郡邑權籍籍關外來車徒傾國鄽五侯競書幣羣公亟為言義分明於霜信行直如弦交歡池陽下留宴汾陰邊一朝許人諾何能坐相捐彯節去函谷投珮出井泉嗟此務逺圖心為四海懸但營身意遂豈校耳目前俠烈良有聞古來共知然負一作許效古誶此倦遊士本家自遼東昔𨽻李將軍十載事西戎結車高闕下極望見雲中四面各千里從橫起嚴風寒燠豈如節霜雨多異同夕寐北河陰夢還甘泉宫勤役未云已壯年徒為空乃知古時人所以悲轉蓬詠冬至連星貫初厯令月臨首歲薦樂行陰政登金一作歌贊陽滯收涼降天德萌華宣地惠司瑞記初學記作紀夜晞書雲掌朝誓種蘭南史云袁淑從母兄劉湛欲淑附已而淑不為改意由是大相乖失淑乃賦詩尋以病免種蘭忌當門懷璧莫向楚楚少别玉人門非植蘭所登宣城郡悵焉訊舊老兹前乃楚居十代闕州記百祀絶方書闕啄木詩南山有鳥自名啄木飢則啄樹暮則巢宿無干於人唯志所欲性清者榮性濁者辱漢魏六朝百三家集卷七十
