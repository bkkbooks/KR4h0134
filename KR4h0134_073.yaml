body:
  text: 漢魏六朝百三家集巻七十三蕭子良集題詞蕭雲英著内外文筆數十巻史謂其無文采多勸戒及讀任昉行狀則云天才博贍學綜該明沛獻東平淮南陳思方斯蔑如予折衷羣論未得其平比覽遺文斥臺使憂旱沴獄圄泉鑄動見規啓仁哉言乎何其痌瘝乃心也雲英敬信釋氏撰淨住子淨行法門三十一條苦言勤諷愍泣如雨射雉二啟奏告君父不離福業觀其惻隱懇誠身行津渡斷欲以王公努力建道場之幡擊甘露之鼓為黔首先倡而浮魚兆殃外寢大震天年不永其誰為乎齊武二十三男中多賢令文惠竟陵居長表帥皆病短折晉安諸王安能復存父夢曇華子罹刀酖未知西昌毒因在報應何等也王融見殺魏凖破膽實竟陵速殞之繇而湼槃寂滅以死為樂雲龍憂懼得無猶有未化者乎目録啓密啓武帝又車旗啓諫射雉啓又諫斂役塘錢啓上武帝請贈豫章王嶷啓表上讜言表墾田表書與安陸侯緬書答王僧䖍書答張融答顧憲之與法獻書與孔中丞釋疑惑書又答孔中丞書與南郡太守劉景蕤書漢魏六朝百三家集巻七十三目録欽定四庫全書漢魏六朝百三家集巻七十三明張溥輯蕭子良集啟密啟武帝臣思水潦成患良田沃壤變為汙澤農政告祥因高肆務播植既周繼以旱虐黔庶呼嗟相視禠氣夫國資於民民資於食匪食匪民何以能政臣毎一念此寢不便席本始中郡國大旱宣帝下詔除民租今聞所在逋餘尚多守宰嚴期兼夜課切新稅力尚無從故調於何取給政當相驅為盜耳愚謂逋租宜皆原除少降停恩㣲紓民命自宋道無章王風陵替竊官假號駢門連室今左民所撿動以萬數漸漬之來非復始適一朝洗正理致沸騰小人之心罔思前恩董之以威反怨後罰獸窮則觸事在匪輕齊有天下日淺恩洽未布一方或饑當加優養愚謂自可依源削除未宜便充猥役且部曹撿挍誠存精密令史奸黠鮮不容情情既有私理或枉謬耳目有限羣狡無極變易是非居然可見詳而後取於事未遲明詔深矜獄圄恩文累墜今科網嚴重稱為峻察負罪離諐充積牢尸暑時鬱蒸加以金鐵聚憂之氣足感天和民之多怨非國福矣頃土木之務甚為殷廣雖役未及民勤費已積炎旱致災或繇於此皇明載遠書軌未一縁淮帶江數州地耳以魏方漢猶一郡之譬以今比古復為遠矣何得不愛其民緩其政救其危存其命哉湘區奥密蠻寇熾彊如聞南師未能挫戮百姓齊民積年塗炭疽食侵淫邊虞方重交州夐絶一垂寔惟荒服恃遠後賔固亦恒事自青徳啓運欵闗受職置之度外不足絓言今縣軍遠伐經途萬里衆寡事殊客主勢異以逸待勞全勝難必又縁道調兵以足軍力民丁烏合事乖習銳廣州積嵗無年越州兵糧素乏加以發借必致恇擾愚謂叔獻所請不宜聽從取亂侮亡更俟後㑹雖緩嵗月必有可禽之理差息發動費役之勞劉楷見甲以助湘中威力既舉蟻寇自服又啓臣一月入朝六登文陛廣殿稠人裁奉顔色縱有所懷豈敢自達比天𤯝亟見地孽亟臻民下妖訛好生噂􅊱榖價雖和比室饑嗛縑纊雖賤駢門躶質臣一念此毎入心骨三呉奧區地惟河輔百度所資罕不自出宜在蠲優使其全富而守宰相繼務在裒剋圍桑品屋以准資課致令斬樹發瓦以充重賦破民財産要利一時東郡使民年無常限在所相承准令上直毎至州臺使命切求懸急應充猥役必繇窮困乃有畏失嚴期自殘軀命亦有斬絶手足以避徭役生育弗起殆為恒事守長不務先富民而唯言益國豈有民貧於下而國富於上邪又泉鑄嵗遠類多翦鑿江東大錢十不一在公家所受必須輪郭完全遂買本一千加子七百猶求請無地棰革相驅尋完者為用既不兼兩回復遷貿㑹非委積徒令小民毎嬰困苦且錢帛相半為制永久或聞長宰須令輸直進違舊科退容姦利八屬近縣既在京畿發借徴調寔煩他邑民特尤貧連年失稔草衣藿食稍有流亡今農政就興宜蒙賑給若逋課未上許以申原兖豫二藩雖曰舊鎮往屬兵虞累棄鄉土密邇寇庭下無安志編草結菴不違涼暑扶淮聚洛靡有生向俱稟人靈獨絶溫飽而賦歛多少向均失實謂凡在荒民應加蠲減又司市之要自昔所難頃來此役不繇才舉竝條其重貲許以賈衒前人增估求俠後人加稅請代如此輪回終何紀極兼復交闗津要共相脣齒愚野未閑必加陵誑罪無大小横沒貲載凡求試榖帛類非廉謹未解在事所以開容夫獄訟惟平畫一在制雖恩家得罪必宜申憲鼎姓貽諐最合從網若罰典惟加賤下辟書必蠲世族懼非先王立理之本尚書列曹上應乾象如聞命議所出先諮於都都既下意然後付郎謹寫闗行愚謂郎官尤宜推擇宋運告終戎車屢駕寄名軍牒動竊數等故非分充朝資奉殷積廣越邦宰梁益郡邑參差調補寔允事機且此徒亢雜罕遵王憲嚴加廉視隨違彈斥一二年間可減大半車旗啓臣聞車旗有章載自前史器必依禮服無舛法凡葢員象天軫方法地上無二天之儀下設兩葢之飾求之志録恐為乖衷又假為麟首加乎馬頭事不師古鮮或可施諫射雉啓鑾轝亟動天蹕屢巡陵犯風煙驅馳野澤萬乗至重一羽甚㣲從甚㣲之懽忽至重之誡頃郊郛以外科禁嚴重匪直芻牧事罷遂乃窀掩殆廢且田月向登桑時告至士女呼嗟易生噂議棄民從欲理未可安曩時巡幸必盡威防領軍景先詹事赤斧堅甲利兵左右屯衛今馳騖外野交侍疎闊晨出晩還頓遺清道此實愚臣最所震迫狡虜玩威甫獲款闗二漢全富猶加曲待如聞使臣頻亦怨望前㑹東宫遂形言色昔宋氏遣使舊列階下劉纘銜使始登朝殿今既反命宜賜優禮伏謂中堂雲構實惟峻絶檐陛深嚴事隔涼暑而别為一室如或有疑邊帶廣途訛言孔熾毁立之易過於轉圓若依舊制通敞實允觀聽頃市司驅扇租估過刻吹毛求瑕廉察相繼被以小罪責以重僃愚謂宜勅有司更詳優格臣年方朝賢齒未相及以管窺天猶知失得廊廟之士豈闇是非未聞一人開一說為陛下憂國家非但面從亦畏威耳臣若不啓陛下於何聞之又忽聞外議伏承當更射雉臣下情震越心懷憂悚猶謂疑妄事不必然伏度陛下以信心明照所以傾金寳於禪靈仁愛廣洽得使禽魚養命於江澤豈惟國慶民懽乃以翺翔治樂夫衛生保命人獸不殊重軀愛體彼我無異故禮云聞其聲不食其肉見其生不忍其死且萬乗之尊降同匹夫之樂夭殺無辜傷仁害福之本菩薩不殺壽命得長施物安樂自無恐怖不惱衆生身無患苦臣見功徳有此果報所以日夜劬勤厲身奉法實願聖躬康豫若此毎至寢夢脫有異見不覺身心立就燋爛陛下常日捨財修福臣私心顒顒尚恨其少豈可今日見此事一損福業追悔便難臣此啓聞私心實切若是大事不可易改亦願陛下照臣此誠曲垂三思况此嬉遊之間非關當否而動輒傷生寔可深愼臣聞子孝奉君臣忠事主莫不靈祗通感徴祥證登臣近段仰啓賜希受戒天心洞遠誠未逹勝善之途而聖恩遲疑尚未垂履曲降尊極豈可今月復隨此事臣不隱心即實上啓諌斂塘役錢啓伏尋三吳内地國之闗輔百度所資民庶彫流日有困殆蠶農罕獲饑寒尤甚富者稍增其饒貧者轉鍾其弊可為痛心難以辭盡頃錢貴物賤殆欲兼倍凡在觸類莫不如兹稼穡難劬斛直數倍今機杼勤苦匹裁三百所以然者實亦有繇年常嵗調既有定期僮䘏所上咸是見直民間錢多剪鑿鮮復完者公家所受必須員大以兩代一困於所貿鞭捶質繫益致無聊臣昔忝㑹稽粗閑物俗塘丁所上本不入官良由陂湖宜壅橋路須通均夫訂直民自為用若申分毁壞則年一修改若乙限堅完則終嵗無役今郡通課此直悉以還臺租賦之外更生一調致令塘路崩蕪湖源泄散害民損政實此為劇建元初狡虜游䰟軍用殷廣浙東五郡丁稅一千乃有質賣妻兒以充此限道路愁窮不可聞見所逋尚多收上事絶臣登具啓聞即䝉蠲原而此年租課三分逋一明知徒足擾民實自弊國愚謂塘丁一條宜還復舊在所逋䘏優量原除凡應受錢不限大小仍令在所折市布帛若民有雜物是軍國所須者聽隨價准直不必一應送錢於公不虧其用在私實荷其渥昔晉氏初遷江左草創絹布所直十倍於今賦調多少因時增減永初中官布一匹直錢一千而民間所輸聽為九百漸及元嘉物價轉賤私貨則束直六千官受則匹准五百所以毎欲優民必為降落今入官好布匹堪百餘其四民所送猶依舊制昔為損上今為刻下氓庶空儉豈不繇之救民拯弊莫過減賦時和嵗稔尚爾虛乏儻値水旱寧可熟念且西京熾强實基三輔東都全固實賴三河歴代所同古今一揆石頭以外裁足自供府州方山以東深闗朝廷根本夫股肱要重不可不䘏宜䝉寛政少加優養略其目前小利取其長久大益無患民資不殷國財不阜也宗臣重寄咸云利國竊如愚管未見可安上武帝請贈豫章王嶷啓臣聞春秋所以稱王母弟者以尊其所重故也是以禮秩殊品爵命崇異在漢則梁王僃出警入蹕之儀在晉則齊王具殊服九命之贈江左以來尊親是闕故致衮章之典廢而不傳寔繇人缺其位非禮虧省齊王故事與今不殊締構王業功迹不異凡有變革隨時之宜者政縁恩情有輕重徳義有厚薄若事籌前規禮無異則且梁齊闕令終之美猶饗褒贈之榮況故大司馬仁和著於天性孝悌終於立身節義表於勤王寛猛彰於御物奉上無艱劬之貌接下無毁傷之容淡矣止於清貞無喜慍之色悠然栖於静黙絶馳競之聲詩云靡不有初鮮克有終夫終之者理實為難在於今行無廢斯徳東平樂於小善河間悅於詩書勲績無聞艱危不涉尚致卓爾不群英聲萬代況今協贊皇基經綸霸始功業高顯清譽逾彰富貴隆重廉潔彌峻等古形今孰類茲美臣愚忖度未有斯例凡庶族同氣愛睦尚少豈有仰覩陛下垂友于之性若此者乎共起布衣俱登天貴生平遊處何事不同分甘均味何珍不等未嘗覩貌而天心不懽見形而聖儀不悅爰及臨危捨命親瞻喘息萬分之際沒在聖目號哭動乎天地感慟驚乎鬼神乃至撤膳移寢坐泣遷旦神儀損耗隔宿改容奉瞻聖顔誰不悲悚歴古所未聞記籍所不載既有若斯之大徳而典服之贈不彰如其脫致虧忘追改為煩不令千載之下物有遺恨其徳不具美者尚荷嘉隆之命況事光先烈者寧可缺兹盛典臣恐有識之人容致其議且庶族近代桓溫庾亮之類亦降殊命伏度天心已當有在表上讜言表前臺使督逋切調恒聞相望於道及臣至郡亦殊不疎凡此輩使人既非詳愼勤順或貪險﨑嶇要求此役朝辭禁門情態即異暮宿村縣威福便行但令朱鼓裁完鈹槊㣲具顧盼左右叱咤自專擿宗斷族排輕斥重脅遏津埭恐喝傳郵破岡水逆商旅半引逼令到下先過已船浙江風猛公私畏渡脫舫在前驅令俱發呵䠞行民固其常理侮折守宰出變無窮既瞻郭望境便飛下嚴符但稱行臺未顯所督先訶彊寺却攝群曹開亭正㯓便振荆革其次絳標寸紙一日數至徵村切里俄刻十催四鄉所召莫辯枉直孩老士庶具令付獄或尺布之逋曲以當匹百錢餘稅且增為千或誑應質作尚方寄繫東冶萬姓駭迫人不自固遂漂衣敗力競致兼漿値今夕酒諧肉飫即許附申赦格明日禮輕貸薄便復不入恩科筐貢㣲闕箠撻肆情風塵毁謗隨忿而發及其㹠蒜轉積鵞粟漸盈遠則分鬻他境近則託貿吏民反請郡邑助民繇緩回刺言臺推信在所如聞頃者令長守牧離此毎實非復近嵗愚謂凡諸撿課宜停遣使密畿州郡則指賜勅遙外鎭宰明下條源既各奉别㫖人競自罄雖復臺使盈湊㑹取正屬所徒相疑僨反更淹懈凡預衣冠荷恩盛世多以闇緩貽諐少為欺猾入罪若類以宰牧乖政則觸事難委不容課逋上綱偏覺非才但促差降各限一期如乃事速應緩自依違糾坐之坐之之科不必須重但令必行期在可肅且兩裴之船充擬千緒三坊寡役呼訂萬計毎一事之發彌晨方辦粗計近逺率遣一部職散人領無減二十舟船所資皆復稱是長江萬里費固倍之較略一年脫得省者息船優役寔為不少兼折姦減竊遠近暫安墾田表京尹雖居都邑而境壤兼跨廣袤周輪幾將千里縈原抱隰其處甚多舊遏古塘非惟一所而民貧業廢地利久蕪近啓遣五官殷濔典籖劉僧瑗到諸縣循履得丹陽溧陽永世等四縣解并村耆辭列堪墾之田合訃荒熟有八千五百五十四頃修治塘遏可用十一萬八千餘夫一春就功便可成立書與安陸侯緬書緬封安陸侯為五兵尚書出為吳郡太守大著風績子良與書世祖嘉其能轉郢州刺史竊承下風數十年來未有此政南史姑蘇未有此政答王僧䖍書左伯字子邑東萊人特工八分與毛𢎞等列亦擅名漢末又甚能作紙漢興有紙代簡和帝時蔡倫工為之子邑尤得其妙故蕭子良答僧䖍書齊民耍術韋仲將墨法醇煙一斤以膠五兩浸梣皮汁中下雞子白五枚真珠一兩麝香一兩合調下鐵臼搗三萬杵子邑之紙妍妙輝光仲將之墨一㸃如漆伯英之筆窮神盡意妙物逺矣邈不可追張懷瓘書斷法書要録引王僧䖍論書云謝靜謝敷竝善冩經亦入能境居鍾亮之美邁古流今是以征南還有所得辱告竝五紙舉體精雋靈奥執玩反覆不能釋手雖太傅之婉媚玩好領軍之靜逖答緒方之蔑結如也昔杜度殺字甚安而筆體㣲瘦崔瑗筆勢甚快而字小疎居處二者之間亦㒞仲尼方於季孟也夫工欲善其事必先利其器伯喈非流紈體素不妄下筆若子邑之紙研染輝光仲將之墨一㸃如漆伯英之筆窮神靜思妙物遠矣邈不可追遂令思挫於弱毫數屈於陋墨言之使人於邑若三珍尚存四寳斯覿何但尺素信札動見模式將一字徑丈方寸千言也承天涼體豫復欲繕冩一賦傾遲暉采心目俱勞承閱覽袐府備覩羣計跡崔張歸美於逸少雖一代所宗僕不見前古人之跡亦無以過於逸少既妙盡深絶便當得之實録然觀前世稱目竊有疑焉崔杜之後共推張芝仲將謂之筆聖伯玉得其筋巨山得其骨索氏自謂其書銀鈎蠆尾談者誠得其宗劉徳昇為鍾胡所師兩賢並有肥瘦之斷元鳴獲釘壁之翫師宜致酒簡之多此亦不能止長𦙍狸骨右軍以為絶倫其功不可及由此言之而向之論或至投杖聊呈一笑不妄言耳按子良書語在此内豈此即與僧䖍書僧䖍因論書及之耶首有謝靜謝敷數語辱告五紙者當一二謝所書其云征南還有所得考子良但為征北將軍又疑承天涼以下方為書意義未明附註此後答張融竟陵張欣時為諸暨令坐罪當死欣時父興世宋世討南譙王義宣官軍欲殺融父暢興世以袍覆暢而坐得免興世卒融著高履負土成墳至是融啓竟陵王子良乞代欣時死子良答曰此乃是長史美事恐朝有常典不得如長史所懷答顧憲之憲之字士思吳郡吳人歴豫章太守大中大夫憲之為南中郎長史行婺州事時司徒竟陵王於宣城臨成定陵三縣界立屯封山澤數百里禁民樵採憲之固陳不可言甚切直王答之即令無禁非君無以聞此徳音梁書與法獻書遠法師一代名徳志節清高濳山樹美四海餐風弟子闇昧謬䝉師範方欲仰稟仁化用洗煩慮不謂此疾奄成異世悲痛之心特不可忍遠上即既業行圓通曠刼希有弟子意不欲遺形影迹雜處衆僧墓中得别卜餘地是所願也方應樹刹表竒刻石銘徳矣與孔中丞釋疑惑書覽君書具一二毎患浮言之妨正道激烈之傷純和亦已久矣孟子有云君王無好智君王無好勇勇智之過生乎患祸所遵正當仁義為本今因修釋訓始見斯行之所發誓念履行欲卑高同其美且取解脫之喻不得不小失存其大至於形外之間自不足及言眞俗之教其致一耳取之者未達故横起異同君云積業栖信便是言行相舛豈有奉親一毁一敬而云大孝未之前聞夫仁人之行非是殘害加其美廉潔之操不藉貪竊成其徳如此則三歸五戒豈得一念而可捨十善八正寧瞥想之可遺未見輕其本而能重其末所謂本既傾矣而後枝葉從之今云二途雖異何得相順此言故是見其淺近之談耳君非不覩經律所辨何為偏志一方埋沒通路夫士未嘗離俗施訓即世之教可以知之若云斯法空成詭妄更增疑惑應當毁滅就即因而言閨門孝悌者連鄉接黨竟有幾人今可得以無其多絓諸訓誥經史箴誡悉可焚之不君今遲疑於内教亦復與此何殊哉所以歸心勝法者本不以禮敬標其心兢仰祗崇者不以在我故忘物今之慇勤克已者政為君輩之徒耳欲今相與去憍矜除慢慠節情慾制貪求修禮譲習謙恭奉仁義敦孝悌課之以博施廣之以汎愛賞之以英賢㧞之以儁異復何慙於鬼神乎孜孜策勵良在於斯雖未能奉遵亦意不忘之今未有夜光之投而按劍已起欲相望於道徳寧不多愧當繇未見此情故常信斯心耳在懷則不然毎苦其不及司徒之府本五教是勸方共敦斯美行以率無慾使之詭諂佞望門而自殄浮偽蕩逸踐庭而變迹等彼息心之館齊此無慾之臺不亦善乎一則仰順宸極普天之慈二則敬奉儲皇垂愛之善宵旦而警惕者正患此心無遂耳悠悠之語好自多端其云願善政言未知傷化之重儻令詭事以忠孝佞悅以仁義虚設以禮讓假枉以方直乃至一日克已天下歸仁況能旬則有餘所望過矣本自開心所納正若此矯不多如其此煩未廣故鄙薄深慨君正應規諫其乖開發未達云何言傷孝本語損義基於邑有懷非所望也若此事可棄則欣聞餘善又云未必勸人持戒當令善繇下發必如此而𢎞教者放勛須四凶革而啓聖虞舜待商均賢而徳明如斯而遂美其可望乎君之此意則應廣有所折便當詰堯以土階之儉嘉離宫之麗貶禹以茅茨之陋崇阿房之貴恥汲黯之正容榮祝鮀之媚色其餘節義貞信謙恭之徳皆當改途而反面復何行之可修也凡聞於言必察其行覩於行必求於理若理不乖而行不越者請無造於異端眞殊途同歸未必孱然一貫頃亦多有與君此意同者今寄言此紙情不專一者厝心於疑妄國君普宣示之略言其懷無見髣髴翰迹易煩中不盡意比見君别更委悉也又夫人心之不同猶若其貌豈其容一而等其智乎覽有待之參差足見情靈之乖舛矣一得其志者非言談之所盡一背其途者豈游說之所翻見君雖復言面委盡而不及此處者良由彼我之見既異幸可各保其方差無須空構是非横起謗議耳栖心入信者前良不無此志今以效善之為樂故挫憍陵以待物君若以徳越往賢聖逾前修智超羣類位極人貴者自可逍遙世表以道化物髙其懷無求自足而退於前良恐未能懸絶空秉兩塗獨異勝法若悠悠相期本不及言意在不薄為復示斯懷耳比面别一二近聊有此釋滯兩巻想於外巳當見之今送相示若巳覽者付反幸無勞形目脫未覩者為可一歴意本不期他翻正是自釋疑滯耳君見之必當撫掌也答孔中丞書君此書甚佳宜廣示諸未達者與南郡太守劉景蕤書冬去因君與劉居士書今春得其返价辭趣翩翩足有才藻實子雲之筆札元瑜之書記伸復咨嗟彌用欽想此子含眞抱璞比調雲霞背俗居幽寓歡林溆養志南荆可與卞寳爭價韜光梵服固同隋照共明雖顔段之栖遲偃仰揚鄭之寂漠恬淡取之若人信可同日而語矣且道性天悠禪心自謐敦悅九部研味三乘在家菩薩行之而不難白衣居士即之而匪易逝將燭昏霾於慧炬拯淪溺於法橋扇靈㠋之留風鏡貞林之絶影僕栖尚既同情契彌至而悠悠京苑間以江山假復神通逺邇㝠交曉曙疇得寫析深襟辨明幽㫖迹生滅之中談究眞俗之諦義故重有别書招來畿邑居問道之次具為敦請此蘭山桂水既足逍遥儒侶𤣥宗復多朋往非以一爵相加豈其旌蒲為分直闇投誠素庶必能𤣥了脫悠爾來儀想時加資遣也漢魏六朝百三家集巻七十三
