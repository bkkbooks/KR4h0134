body:
  text: 漢魏六朝百三家集卷十九漢蔡雍集目録針衣針銘黃鉞銘東鼎銘中鼎銘西鼎銘朱公叔鼎銘胡太傅祠前銘京兆尹樊德雲銘樽銘盤銘警枕銘碑太尉橋公廟碑太尉橋公碑太傅文恭矦胡公碑太傅胡公碑胡公碑太尉汝南李公碑太尉楊公碑司空文烈矦楊公碑漢太尉楊公碑文烈矦楊公碑司空房楨碑司空袁逄碑荆州刺史庾矦碑朱公叔墳前石碑陳留太守胡公碑太守胡公碑陳太丘碑陳太丘廟碑文範先生陳仲弓碑郭有道林宗碑貞節先生范史雲碑彭城姜伯淮碑翟先生碑汝南周巨勝碑處士圂叔則碑光武濟陽宫碑王子喬碑伯夷叔齊碑九疑山碑陳留東昏庫上里社碑琅琊王傅蔡公碑𤣥文先生李子材碑郡掾史張𤣥祠堂碑袁滿來墓碑童幼胡根碑真定直父碑靈表太傅胡公夫人靈表司徒袁公夫人馬氏靈碑誄濟北相崔君夫人誄神誥漢交趾都尉胡公夫人黃氏神誥哀讚議郎胡公夫人哀讚祝辭宗廟祝嘏辭九祝辭祝社文祖餞祝文禊文弔文弔屈原文文篆勢𨽻勢九惟文詩飲馬長城窟行答對元式詩答卜元嗣詩翠鳥漢魏六朝百三家集卷十九目録欽定四庫全書漢魏六朝百三家集卷十九明張溥輯漢蔡雍集針衣針今人務在奢嚴志好美飾帛必薄細衣必輕暖或一朝之晏再三易衣私居移坐不因故服銘黃鉞銘孝桓之季年鮮卑入塞盜起胸奴左部梁州叛羌逼迫兵誅淫衍東夷高句麗嗣子百固逆謀並發三垂騷然為國憂念西府表橋公昔在涼州柔逺能邇不煩軍師克定及在上谷漢陽連在營郡膂力方剛明集士衆徵拜度遼將軍始受旄鉞鉦鼓之任扞禦三垂公以吏士頻年在外勤於奔命人馬疲羸撓鈍請且息州營橫發之役以補困憊朝廷許之於是儲廪豐饒室罄不懸人逸馬畜弓徑矢利而經用省息官有餘資執事無放散之尤簿書有進入之贏治兵示威戎士踊躍旌旗耀日金鼓雷奮守有山嶽之固攻有必克之勢羌戎授首于西疆百固氷散于東鄰鮮卑收迹烽燧不舉視事三年馬不帶鈌弓不受彄是用鏤石作兹鉦鉞軍鼓陳之東階以昭公文武之勛焉銘曰帝命將軍秉兹黃鉞威靈振耀如火之烈公之在位羣狄斯柔齊斧罔設人士斯休東鼎銘維建寧三年秋八月丁丑延公于玉堂前廷乃詔曰其以大鴻臚橋𤣥為司空再拜稽首以讓帝曰俞往哉三讓然後受命公乃䖍恭夙夜帝采勤施八方旁作穆穆以對揚天子丕顯休命越在先民毗于天子罔不著其股肱畢其思心式率天行式昭德音公亦克紹厥猷鍳于法罔敢不法憲于誡罔敢不誡用總是羣后保乂帝家勛在方冊民咸曰休哉惟帝念功越若來二月丁丑遷於司徒中鼎銘維建寧四年三月丁丑延公登于玉堂前廷乃制詔曰其以司空橋𤣥為司徒公拜稽首以讓帝曰俞往哉三讓然後受命公允迪厥德宣力肆勤戰戰兢兢以役帝事率夫百辟媚于天子天子曰都慎厥身修思永同寅協恭以和天𠂻德則昭之違則塞之回乃不敢不弼枉乃不敢不匡股肱之事既充三事之繇允備災眚作見乃引其責曰凡庶徵不若彛倫不叙是惟臣之職祗以疾告表越十月庚午記此西鼎銘維光和元年冬十二月丁巳延公入崇德殿前乃制詔曰其以光祿大夫𤣥為太尉公拜稽首曰臣聞之三讓莫或克從臣不敢辭臣犬馬齒七十可以生可以死其戮力間私悉心在公以盡為臣之節于時侍從陛階與聞公之昌言者莫不惕厲如履薄氷既乃碑表百代朱公叔鼎銘忠文朱公名穆字公叔有殷之胄微子啓以帝乙元子周武王封諸宋以奉成湯之祀至元子啓生公子朱其孫氏焉後自沛遷于南陽之宛遂大於宋爵位相襲烈祖尚書令肅宗之世守于臨淮考曰實為陳留太守乃及忠文克慎明德以紹服祖禰之遺風悉心臣事用媚天子顯允其勳蹟尋綜六藝契濶馳思所以啓前惑而覺後疑者亹亹焉雖商偃其猶病諸初舉孝亷除郎中尚書侍郎獨念運際存亡之要乃陳五事諫謀深切退處畎畝以察天象驗應著焉孝順晏駕賊發江淮時辟大將軍府實掌其事用拜宛陵令非其好也遂以疾辭復辟大將軍再拜博士髙第作侍御史明司國憲以齊百僚矯枉董直罔肯阿順以黜其位濳于郎中羣公並表乃遷議郎登于東觀纂業前司于時冀州凶荒年饉民匱而貪婪之徒乘之為虐錫命作牧靜其方隅乃攄洪化奮靈武昭令德塞羣違貞良者封植殘戾者芟夷去惡除盜無俾比而作慝用陷于非辜復徵拜議郎病免官徵拜尚書清一以考其素正直以醇其德出納帝命乃無不允雖龍作納言山甫喉舌靡以尚之享年六十有四漢皇二十一世延熹六年夏四月乙巳卒于官天子痛悼詔曰尚書朱穆立節忠亮世篤爾行䖍恪機任守死善道不幸而卒朝廷憫焉今使權謁者中郎楊賁贈穆益州刺史印綬魂而有靈嘉其寵榮嗚呼哀哉肆其孤用作兹寶鼎銘載休功俾後裔永用享祀以知其先之德胡太傅祠前銘天鍳有漢山嶽降靈於肅文恭應期誕生好是懿德柔惠且貞爰在初服皇嘉其聲納于機密機密恪清守于三邦三邦事寧越尹三卿百揆時序七受帝命作此元輔左右六世靖綏土宇蠢彼羣生保賴亶叙紹跡龍夷繼軌山甫遭國不造仍世短祚援立聖嗣得公之謨帝曰文恭朕嘉君功為邑安樂以祐其庸登位特進干異羣公休命丕顯光寵克章公拜稽首是對是揚藹藹惟公民斯攸望春秋既暮倐爾乃喪不憖是遺俾屏於皇新廟奕奕於以蒸嘗子子孫孫承嗣無疆京兆尹樊德雲銘於顯哲尹誕德孔彰膺帝休命謂篤不忘爰納忠式規悟聖皇欽崇園邑大孝允光九命車服昭示采章軒軺四牡承祀蒸嘗多士時貢徭役永息道路孔夷民清險棘同體諸舊兆氓䝉福惠垂無疆守以罔極樽銘酒以成禮弗愆以淫德將無醉過則荒沈盈而不冲古人所針尚鍳兹器懋朂厥心盤銘華盤就用以享嘉賓內納其實外若𤣥真警枕銘應龍蟠蟄濳德保靈制器象物示有其形哲人降鍳居安聞傾碑太尉橋公廟碑橋氏之先出自皇帝帝葬于橋山子孫之紹基立姓者咸以為氏漢興世以禮樂為業高祖諱仁位至大鴻臚列名於儒林祖侍中廣川相考東萊太守公禀性貞純幼有𢎞姿剛而不虐威而不猛聞仁必行睹義斯居文以典術守以純固弱冠從政當官而行刺史周公辟舉從事所部二千石受取有驗公糾發贓罪致之於理時有椒房桂戚之託周公纍息公不為之動史魚之徑直山甫之不阿於是始形舉孝亷除郎中洛陽左尉特進潁王梁不疑為河南尹當事以對是時畏其權寵而為屈辱者多矣公不折節解印綬去辟司徒舉髙第補侍御史以詔書考司𨽻校尉趙祁事廷尉郭貞私與公書非接使御命之宜公封書以聞貞以文章得用鬼薪公離司寇辟大將軍梁公幕府屢以救正干其隆指將軍嘉之無言不酬又以髙第補侍御史在職旬月羌戎匪茹震驚隴漢西府舉公拜涼州刺史威名克宣凶虜革心清風席卷至則無事車師後部阿羅多卑君相與爭國興兵作亂公遣從事牛稱何傳舉輕騎奉辭責罪收阿羅多卑君繫燉煌正處以聞阿羅多為王卑君侯稱以奉使副指除侯部不動干戈揮鞭而定西域之事人以為美談又值饉荒諸郡饑餒公開倉廩以貸救其命主者以舊典宜先請公曰若先請民已死廩訖乃上之詔報曰邊穀不得妄出𤣥擅出於是𤣥有汲黯憂民之心後不以為常公達于事情剖斷不疑皆此類也遷齊相視民如保赤子討惡若赴水火刑明賞遂民知勸懼臨淄令賂財贓多罪正受鞠就刑沒齒無怨竟以不先請免官徴拜上谷太守民有父子俱行凶人人惡言當道曉之不止其子殺人而捕得公以其見悔辨直不舉文書以遇赦令蕃縣有帝舜廟以故事齊祠戶曹史張機有懲罰貨祠巫自託以舜命約公云不得譴公覺其奸態收考首伏即日伏辜遷漢陽太守上邽令皇甫禎贓罪明審收考髠鉗死于冀市後以病去徵拜議郎司徒長史循王悝桓帝同産以懷逆謀黜封癭陶王以公長於襟帶拜巨鹿太守悝畏怖明憲檢于靜息自將作大匠徵未到而章謗先入故轉拜議郎遂用免官徵度遼將軍遷河南尹少府大鴻臚司徒司空託病而去悉引衆災雖非巳負公皆以自劾遜位嵗餘拜尚書令時河間相蓋升以朝廷在藩國時鄰近舊恩歷河南太守太中大夫在郡受取數億以上創毒深刻公表升貪放狼籍不顧天罔損辱國家為上招怨當肆市朝以謝兆民幸遇贖令罪除惡在可免升官禁錮終身沒入財賂非法之物以充帑藏懲戒羣下連表上不納而升遷為侍中公稱病辭徙拜光祿大夫復拜太尉如前遜位復拜少府病不就職拜太中大夫凡所獲祿皆公府所特表選臨難受位自九列之後乃以丕貤公紀綱張弛勇决不回是非明作速於察機燕居從容申申夭夭和樂寬裕愛士親仁凡見公容貌聞公聲音莫不熙怡恱懌思樂模則來者忘歸去者願還雅性謙克不吝於利欲雖衆子羣孫並在仕次曽無順媚一言之求身沒之日無獲大位在百里者莫得好縣比方公孫未有若兹者也初公為舍於舊里弟卒推與其孤至於即世柩殯無所清儉仁與之效於斯為著巍巍乎若德允世之表儀也已公諱𤣥字公祖少辟孝亷辟司徒大將軍府為侍御史牧一州典五郡出將邊營入掌機密歷三卿同三司享年七十五光和七年夏五月甲寅以太中大夫薨于京師朝廷所以弔贈如前傳之儀九月乙酉葬于某所三孤故臣門人相與述公言行咨度禮制文德銘于三鼎武功勒于鉦鉞官簿次第事之實録書于碑隂俾爾昆裔永有仰于碑隂云銘曰光光烈考伊漢元公克明克哲實睿實聰如淵之浚如嶽之嵩威壯虓虎文繁雕龍撫柔疆垂戎狄率從敷教中夏五典攸通帝謂我后朕嘉君功命君三事時亮天工公拜稽首翼翼惟恭左右天子祗厥勳庸庶績既熙黎民時雍上下謐寧八方和同丕顯伊德作憲萬邦大尉橋公碑公諱𤣥字公祖梁國睢陽人也大鴻臚之曾孫廣川相之孫東萊大守之元子也膺受純性誕有特表岐嶷而超等總角而逸羣至於初紳髙明卓異為衆傑雄其性疾華尚朴有百折不撓臨大節而不可奪之風經藝傳記周覽博涉瑰竒在前靡所不識當世是以服重器歸髙名州郡交請待以訪斷歷端首則義可行處爪牙而威以布察孝亷除郎中洛陽左尉以公事去辟司徒舉髙第侍御史直道而往用光其任辟大將軍西府表拜涼州刺史遷齊相以公事去詔書印綬即家拜上谷太守遷漢陽太守徵拜議郎司徒長史巨鹿太守被詔書為將作大匠為受罰者所章拜議郎即徵拜度遼將軍遷河南尹少府大鴻臚遂陟司空司徒託痾遜位起家拜尚書令以疾篤請拜光祿大夫後拜太尉久病自替復為少府太中大夫春秋七十五光和七年五月甲寅薨公性質直不憚强禦在憲臺則有盡規之忠領州郡則有虎疹之威其拔賢如旋流討惡如霆擊每所臨向清風先翔逺近豫震兹可謂超越衆庶彰于逺邇者已于是故吏司徒博陵崔烈廷尉河南吳整等以為至德在已揚之由人茍不皎述夫何考焉乃共勒嘉石永昭芳烈遂作頌曰赫矣橋公秉文握武內為宗幹出為藩輔在憲彈枉竟由厥矩允牧于涼刈彼裔土爰將度遼亦用齊斧敷教四畿旋統京宇敦兹五服衆庶是與膺踐七命翼我哲聖登空補衮陟徒訓敬尹尉清宸熙帝之政終始為貞典章以定遺愛在民皇哀其命立石刋銘莫遁斯聽魂而有靈萬億其盛太傅文恭侯胡公碑公諱廣字伯始交趾都尉之元子也公應天淑靈履性貞固九德咸修百行畢備遭家不造童而夙孤上奉繼親下慈弱弟﨑嶇儉約之中以盡孝友之道及至入學從訓歷觀古今生而知之聞一覩十兼以周覽六經博總羣議旁貫憲法通識國典年二十七察孝亷除郎中尚書侍郎尚書左丞尚書僕射幹練機事綢繆樞極忠亮唯允簡于帝心智略周密冠于庶事遷濟隂太守其為政也寬裕足以容衆和柔足以安物剛毅足以威暴體仁足以勸俗故禁不用刑勸不用賞其下望之如日月從之如影響思不可忘度不可革遺愛結于人心超無窮而垂則徵拜大司農遂作司徒遷太尉以援立之功封安樂鄉侯録尚書事稱疾屢辭䇿賜就第復拜司空功成身退俾位特進又拜太尉復以特進致命休神又拜太尉遜位歸爵旋于舊土徵拜太中大夫尚書令太僕太常司徒永康之初以定䇿元功復封前邑録尚書事疾病就第又授太傅入參機衡五蹈九列七統三事諒暗之際三據冢宰和神人于宗伯理水土于下台訓五品于司徒耀三辰于上階光弼六世歷載三十自漢興以來鼎臣元輔耋袠老成勳被萬方與國終始未有若公者焉春秋八十二建寧五年三月壬戍薨于位天子悼惜羣后傷懷詔五官中郎將任崇奉冊贈以太傅安樂鄉侯印綬拜室家子一人郎中賜東園祕器賜絲帛含斂之備中謁者董詡弔祠護喪錢布賻賜率禮有加賜諡曰文恭昭顯行迹四月丁酉葬于洛陽塋故吏濟陰池喜感公之義率慕黃鳥之哀推尋雅意倣徨舊土休績丕烈宜宣于此乃樹石作頌用揚德音詞曰於皇上德懿鑠孔純大孝昭備思順履信膺期命世保兹舊門淵泉休茂彪炳其文爰贊天機翼翼唯恭夙夜出納紹跡虞龍賦政于外神化𤣥通普被汝南越用熙雍帝曰休哉命公三事乃耀柔嘉式是百司股肱元首庶績咸治二氣燮雍五徵來備勳格皇天澤洽后土封建南藩受兹介祜玉藻在冕毳服艾輔駱車雕驂四牡修扈贊事上帝祗祀宗祖陟降盈虧與時消息既明且哲保身遺則同軌旦奭光充區域生榮死哀流統罔極太傅胡公碑維漢二十有一世建寧五年春三月既生魄八日壬戌太傳安樂鄉侯胡公薨越若來四月辛酉葬我君文恭侯於是掾太原王允鴈門畢整屬扶風曾宙潁川殷歷等僉謂公之德也柔而不犯威而不猛文而不華實而不朴靜而不滯動而不躁總天地之中和覽生民之上操聰明膚敏兼質先覺涉觀憲法契闊文學睹臯陶之闈閫探孔子之房奧然而約之以禮守之以恭寬之以納衆泛愛多容其誘人也恂恂焉怡怡焉能使䝉惑開析僞戻優順逸惰勤信及其創基發跡機密聖朝其知其能夙夜惟寅以允帝命是以頻繁機極三升而不出焉乃還談其舊章彌綸古訓貫萬品研精微用補前臣之所闕十年而無愆强記同乎富平周慎過于博士偶山甫乎喉舌匹虞龍而納言唯帝命公以二郡其為政也導人以德帥物以已敦以忠肅勵以知耻人悅其化天樂其和士相勉于公朝民勸行于私家徽纆縈而靡係鞭朴棄而無加洋洋乎若德豈直嚴以為威寬以為福而已哉五作卿士七蹈相位大僕司農太傅司空各一司徒特進各二太常太尉各三光輔六世歷載三十有餘其致治也通水泉于潤下蕃后土于稼穡訓五品于羣黎參人物于區域耀三辰於渾元協大中於皇極傅聖德於幼冲率旦奭於舊職譬彼四時功成則退在盈思中升隆以順建封域於南土踐殊號於特進榮祚統業垂乎來𦙍公自二郡及登相位凡所辟用遂至大位者故司徒中山祝括其餘登堂閣據賦政䇿勳樹功流化者蓋不可勝載唯我末臣頑蔽無聞仰慕羣賢惡乎可及自公寢疾至于薨斃參與嘗禱列位喪位雖庶物戮力不愆於禮進暏墳塋几筵空設退顧堂廡音儀永闕感悼傷懷心肝若割相與纍次德行撰舉功勳刋之于碑用慰哀思其詞曰煥文德伊朝后應期運作漢輔嘉中興膏民庶澤洪渟亶攸序亘地區充天宇轔髙達踵遐武揚景烈垂不朽仰邃古耀昆後胡公碑公諱廣字伯始南郡華容人也其先自媯姓建國南土曰胡子春秋書焉列于諸侯公其後也考以德行純懿官至交趾都尉公寬裕仁愛覆載博大研道知幾窮理盡性凡聖哲之遺教文武之末墜罔有不綜年二十七察孝亷除郎中尚書侍郎左丞尚書僕射內正機衡允釐其職文敏暢乎庶事密靜周乎樞機帝用嘉之遷濟隂太守公乃布愷悌宣柔嘉通神化導靈和揚惠風以飬真激清流以蕩邪取忠肅于不言消奸宄於爪牙是以君子勤禮小人知耻鞠推息於官曹刑戮廢于朝市餘貨委于路衢餘種棲于畎畝遷汝南大守增修前業考績既明入作司農實掌金穀之淵藪和均關石王府以充遂作司徒昭敷五教進作太尉宣暢渾元人倫輯睦日月重光遭國不造帝祚無主援立孝桓以紹宗緒用首謀定䇿封安樂鄉侯戶邑之數加于羣公入録機事聽納總巳致位就第復拜司空敷土導川俾順其性功遂身退告疾固辭乃為特進爰以休息又拜太常典司三禮敬恭禋祀神明嘉歆永世豐年聿懷多福復拜太尉尋申前業又以特進逍遙致位又拜太常遘疾不夷遜位歸爵遷於舊都徴拜太中大夫延熹末年聖主革正幸臣誅斃引公為尚書令以二千石居官委以閫外之事釐改度量以新國家𢎞綱既整衮闕以補乃拜太僕車正馬間六騶習馴遷太常司徒成宗晏駕推建聖嗣復封故邑與參機密寢疾告退復拜太傅録尚書事于時春秋髙矣繼親在堂朝夕定省不違子道旁無几杖言不稱老居喪致哀率禮不越其接下答賓雖幼賤降等禮從謙厚尊而彌恭勞思萬機身勤心苦雖老萊子嬰兒其服方叔克壯其猷公旦納於台屋正考父俯而循禮曷以尚兹夫蒸蒸至孝德本也體和履忠行極也博聞周覽上通也勤勞王家茂功也用能七登三事篤受介祉亮皇業于六王嘉丕績于九有窮生人之光寵享黃耉之遐紀蹈明德以保身與福祿乎終始年八十有二建寧五年春壬戌薨于位天子悼痛贈䇿賜誄諡曰文恭如前傳之儀而有加焉禮也故吏司徒許詡等相與欽慕嵩髙蒸民之作取言時計功之則論集行跡銘諸琬琰其詞曰伊漢元輔時惟文恭聰明睿哲思心瘁容畢力天機帝休其庸賦政於外有邈其蹤進作卿士粵登上公百揆時序五典克從萬拜黎獻共唯時雍勳烈既建爵土乃封七被三事冉作特進𢎞唯幼冲作傅以訓赫赫猗公邦家之鎮澤被華夏遺愛不倫日與月與齊光並運存榮亡顯沒而不泯太尉汝南李公碑公諱咸字元卓汝南西平人蓋秦將李信之後孝武大將軍廣之胄也枝流葉布家于兹土文武繼踵世為著姓曾祖父江夏太守伯父東郡太守公受純懿之資萃忠清之節夙夜嚴栗孝配大舜敦詩書而悅禮樂觀天文而察地理動與神合契叶乾行操邁伯夷德追孔父舉孝亷除郎中光祿茂才遷衛國公相受髙密令勤恤民隱政成功簡遷徐州刺史百司震肅叨餮風靡惡直醜正恭事法宫帝念其勤屢被榮命漁陽太守還遷度遼將軍協德魏綘和戎綏邉徵河南尹母憂乞行服闋奔命孝和皇帝時機密久缺百僚僉允詔拜尚書歷僕射令納言危行不絀以公事去民神憤怒羣公薦之帝曰俞哉徵作將作大匠大司農大鴻臚大僕射公所蒞任憲天心以教胄激垢濁以揚清懿鑠之美昭登於上丕顯之化宣聞于下及遷台司位太尉補衮闕叙彛倫天人交格終始無疵雖元凱翼虞周召輔姬未之或踰功遂身退以疾自遜求歸田里告老致仕七十有六熹平四年薨海內咨嗟莫不惻焉故吏潁川太守張溫等相與歎曰名莫隆於不朽德莫盛于萬世銘勒顯于鐘鼎清烈光于來裔刋石立碑德載不泯詞曰天垂三台地建五嶽降生我公應鼎之足奕世載德名昭圗録既文且武桓桓紹續外則折衝內則大麓惟清惟敏品物以熙告老懸車天人靡欺曾不百齡圯我國基人之云亡八極悼思申德作頌光寵宣流鐫紀斯石鴻烈顯休太尉楊公碑公諱秉字叔節𢎞農華隂人其先蓋周武王之穆晉唐叔之后也末葉以支子食邑于楊因氏焉周室既微裔胄無緒暨漢興烈祖楊喜佐命征伐封赤泉侯嗣子業紱冕相繼公之丕考以忠蹇亮弼輔孝安登司徒太尉公承夙緒世篤儒教以歐陽尚書京氏易誨授四方學者自逺而至蓋踰三千初辟司空舉髙第拜侍御史遷豫州兖州刺史任城相徵入勸講拜太中大夫左中郎將尚書出補右扶風留拜光祿大夫遭權嬖貴盛六年守靜外戚火燔乃遷太僕寺卿公事絀位浹辰之間俾位河南憤疾豪强見遘姦黨用嬰疾廢起家復拜太常遂陟三司沙汰虛冗料簡貞實抽援表達與之同蘭芳任鼎重從駕南巡為朝碩德然知權過於寵私富侔國大臣苛察望變復還條表以聞啓導上怒其時所免州牧郡守五十餘人叨戾是黜英才是列善否有章京夏清肅在位七載年七十有四延熹八年五月丙戌薨朝廷惜焉寵賜有加公自奉嚴敕動遵禮度量材授任當官而行不為義絀疾是苛政益固其守厨無宿肉器不鏤雕夙喪嬪儷妾不嬖御可謂立身無過之地正直清儉該備者矣昔仲尼嘗垂三戒而公免焉故能匡朝盡直獻可去奸忠侔前後聲塞宇宙非黃中純白窮達一致其惡能立功立事敷聞于下昭升于上若兹巍巍者乎于是門人學徒相與刋石樹碑表勒鴻勳讃懿德傳億年於戲公唯嶽靈天挺德翼赤精氣絪緼仁哲生應台任作邦楨帝欽亮訪典刑道不惑迄有成光遐邇穆其清司空文烈侯楊公碑曰漢有國師司空文烈侯楊公公唯司徒之孫太尉公之𦙍子皇祖考以懿德胥及肄勤式建休勳啓洪範公祗服𢎞業克丕堂構小乃不敢不慎大亦不敢不戒用罔有擇言失行在于其躬洎在辟舉先志載言罔不攸該乃自宰臣以從王事立功不有用辭其祿逮作御史允執國憲納于侍中在帝左右爰董武事王師孔間羣公以舊德碩儒道通術明宜建師保延入華光侍宴露寢敷典誥之精㫖達聖王之聰睿帝以機密齊栗常伯劇任鮮克知臧以釐其采命公再作少府俾率其屬以熙庶績天地作險國家丕承軍門祛禁式遏寇虐命公再作光祿勳總其熊羆之士不二心之臣保乂帝家巖巖大理惟制民命命公作廷尉惟刑之恤旁施四方惟明折獄蔽罪于憲之中亦惟三禮六樂國之元幹命公作太常明德惟馨八音克諧神人以和永世豐年溥天率土而衆莫外命公作司空公唯戢之翊明其政時惟休哉惟天隂隲下民彛倫所由順序命公作司徒而敬敷五教以親百姓父義母慈兄友弟恭子孝時惟休哉昭教于辟雍命公作三老帝躬以祗敬遵有虞于上庠茫茫大運垂光烈曜命公作太尉璇璣運周七精循軌時惟休哉帝欲宣力于四方公則翼之辟道或違公則弼之䖍恭夙夜不敢荒寧用對揚天子丕顯休命天子大簡其勳用授爵賜封侯于臨晉功成化洽景命有傾帝乃震慟執書以泣命于左中郎將郭儀作䇿賜公驃騎將軍臨晉侯印綬兼號特進諡以文烈寵命畢備而後即世肆其孤彪敢儀古式昭銘景烈銘曰天鍳有漢誕生元輔世作三事勛在王府乃及伊公克光前矩悉心畢力𦙍其祖武化洽羣生澤霑區宇帝曰文烈朕嘉君功為邑河渭建兹土封申備九錫以祚其庸位此特進于異羣公昔在申吕匡佐周宣嵩髙作頌大雅揚言今我文烈帝載用熙參光日月比功四時身歿名存永世慕思漢太尉楊公碑公諱賜字伯猷𢎞農華隂人姬姓之國有楊侯者公其後也其在漢室赤泉侯佐髙丞相翼宣咸以盛德㶢于前朝祖司徒考太尉繼跡宰司咸有勛烈公承家崇軌受天醇素欽承奉構間于伐柯烈風維變不易其趣文藝典籍尋道入奧操清行朗濳晦幽閒不答州郡之命辟大將軍府不得已而應之遷陳倉令公乃因是行退居廬公車特徵以病辭司空舉髙第拜侍中越騎校尉帝篤先業將問故訓公以羣公之舉進授尚書于禁中遷少府光祿勳敬揆百事莫不時序庶尹知恤閶闔推清列作司空地平天成隂陽不忒功遂身避託疾告退又以光祿大夫受命司徒敬敷五品宣洽人倫燮和化理股肱耳目之任靡不克明及至太尉四時順動三光耀潤羣生豐遂太和交薄三作六卿五蹈三階受爵開國應位特進非盛德休功假于天人孰能該備寵榮兼包令錫如公之至者乎公體資明哲長於知見凡所辟選升諸帝朝者莫非瑰才逸秀并參諸佐惟我下流二三小臣穢損清風愧于前人乃糾合同寮各述所審紀公勳績刋石立銘以慰永懷銘曰天降純嘏篤生柔嘉俾𦙍祖考光輔國家三業在服帝載用和粵暨我公尤執忠貞在棟伊隆于鼎斯寧德被宇宙華夏以清受兹介福履祚孔成為邑河渭衮冕紱珽以佐天子祗事三靈丕顯伊德萬邦作程爰銘爰贊式昭懿聲文烈侯楊公碑公諱賜字伯猷兼通五典周覽篇籍以為尚書帝王之要政有國之大本也是以三葉相承研其精義五代之微言王政之約綱罔不尋其端源究其條貫凛乎其見聖人之情㫖也蓋以蹈騰餘蹤思髙游夏初濳山澤授誨童冠後生賴以發袪䝉蔽文其材素者蓋不可勝數乃由宰府遂作帝臣于時聖幼將入學羣公以公溫故知新德宜師保乃以越騎校尉援侍華光之內帝坐巳北面以納大誨其教人善誘則恂恂焉罔不伸也引情致喻則誾誾焉罔不釋也迄用有成緝熙光明惟帝念功六在九卿三事勛假皇天澤充區域疆土建封申增戶邑人臣之極位兼而有之然處豐益約九命滋恭可謂髙朗令終有始有卒者已於是門生大將軍何進等瞻仰洙泗公喪之禮糾合朋徒稽諸典制僉以為匡弼之功政事之實詔䇿之文則史臣志其詳若夫道術之美授之方䇿則是門人二三小子所特貫綜敢竭不才撰録所審言于碑乃申頌曰巍巍聖猷匪師不昭士子困䝉匪師不教於皇文父邈哉伊超如玉之固如嶽之喬鑽之斯堅仰之彌髙示我顯德授我無隱正席傳道承帝之問誨兹一人萬邦作順微微我徒實賴遺訓文武作式元勛既奮光啓爵土垂統末𦙍存榮亡哀沒而不泯司空房植碑公言非法度不出于口行非至公不萌于心治身則伯夷之潔也儉嗇則季文之約也盡忠則史魚之直也剛平則山甫之勵也總兹四德式是百辟夙夜匪懈以事一人枉絲髮樹私恩不為也討無禮當彊禦弗避也是以功隆名顯在世孤特不獲愷悌寬厚之譽享年垂老至于積世門無立車堂無宴客衣不變裁食不兼味雖易之貞厲詩之羔羊無以加也明明在公實惟皇后誕應正德式作漢輔邪慝是仇直亭是與剛則不吐柔則不茹媚兹天子以靖土字司空袁逢碑凡所臨君明而先覺故能教不肅而化成政不嚴而事治其惠和也晏晏然其博大也洋洋焉信可謂兼三才而該剛柔無射于人斯矣銘曰天鑒有漢賜兹世輔顯允厥德昭𦙍休序峩峩雍宫禮樂備舉穆穆天子孝敬允叙降拜屏著奉饋西序威儀聿修化溢區宇乃尹京邑總齊禁旅荆州刺史庾侯碑君資天地之正氣含太極之純精明潔鮮於白圭貞操厲乎寒松視鍳出于自然英風發乎天受事親以孝則行侔於曾閔結交以信則契明於黃石溫溫然𢎞裕虛引落落然髙風起世信荆山之良寶靈川之明珠也爰在弱冠英風固以揚于四海矣拜為荆州刺史仗冲靜以臨民施仁義以接物恩惠著于萬里誠信暢于殊俗由是撫亂以治綏擾以靜帝嘉其功錫以車服方將掃除寇逆清一宇宙廓天步之艱難寧陵夷之屯否朱公叔墳前石碑維漢二十一世延熹六年粵四月丁巳忠文公益州刺史朱君名穆字公叔卒于京師其五月丙申葬于宛邑北萬嵗亭之陽舊兆域之南其孤野受顧命曰古者不崇墳不封墓祭服雖三年無不於寢今則易之吾不取也爾其無拘于俗無廢豫誡野欽率遺意不敢有違封墳三板不起棟宇乃作祠堂于邑中南陽舊里備器鑄鼎銘功載德懼墳封彌久夷于平壤於是依德像緣雅則設兹方石鎮表靈域用慰其孤罔極之懷乃申詞曰歆惟忠文時惟朱父實天生德丕承洪緒彌綸典術允迪聖矩好是貞厲疾彼强禦斷剛若仇柔亦不茹仍用明夷遘難受侮帝曰休哉朕嘉乃功命汝納言𦙍汝祖蹤父拜稽首翼翼惟恭篤棐不忘夙夜在公昊天不弔降兹殘殃不遺一父俾屏我皇我皇悼心錫詔孔傷位以益州贈之服章用刋彛器宣昭遺光子子孫孫永載寶藏陳留太守胡公碑君諱碩字季睿交趾都尉之孫太傅安鄉侯少子也其先與楚同姓别封于胡以國為氏臻乎漢奕世載德不替舊勳君幼有嘉表克岐克嶷不見異物習與性成孝于二親飬色寧意蒸蒸雍雍雖曾閔顔萊無以尚也總角入學治孟氏易歐陽尚書韓氏詩博綜古文周覽篇籍言語造次必以經綸加之行已忠儉事施順恕公體所安與衆共之驕吝不萌于內喜慍不形於外可謂無競伊人溫恭淑慎者也初以公在司徒除郎中宿衛十年遭叔父憂以疾自免州郡交辟皆不就後以大將軍髙第拜侍御史遷諫議大夫以將軍事免官舉賢良方正不詣公車建寧元年召拜議郎納忠盡規匪懈于位遷侍中虎賁中郎將是年遭疾屢上印綬詔書聽許以侍中飬疾其年七月被尚書召不任應命詔使謁者劉悝齎印綬即拜陳留太守君聞使者至加朝服拖紳使者致詔君以手自擊陳辭謝恩其明二十一日遣吏奉章報謝意氣精朗是日疾大漸刻漏末分奄忽而卒時年四十一天子憫悼詔使者王謙送葬以中牢具祠賜錢五萬布百匹贈榖三十斛同位畢至赴弔雲集生榮未艾沒有餘哀於是遐邇搢紳爰暨門人相與歎述君德追痛不置恆切情憭無不永懷行由已作名自人成先民既邁賴兹頌聲嗟我明哲如何勿銘乃作辭曰猗歟懿德令聞有彰祗服其訓克構克堂孝思唯則文藝丕光敦厚忠恕衆悅其良綏弱以仁不云我强爰自登朝進退以方見幾而作如鴻之翔乃位常伯恪處左右兼掌虎賁禁戎允理遘兹虐痾帝用悼止俾守陳留庶篤其祉王人既詔景命不俟嗚呼昊天殱我英士如何贖也命不自已哀哉永傷萬年是紀太守胡公碑君諱碩字季睿交趾都尉之孫太傅安樂侯之子也順帝時為郎中桓帝時遭叔父憂以疾自免荆州將軍每辟輒辭疾後以髙等拜侍御史遷諫議大夫舉賢良方正病不詣公車建寧元年七月拜陳留太守病劇不任應召詔使謁者劉悝即授印綬二十一日卒詔遣使者王謙以中牢具祠特賜錢五萬布一百匹贈穀三十斛儔類赴送逺近鱗集於時陳留主簿髙吉蔡軫等咸以郡選充備官屬來迎者三十四人奔驚跋涉願承清化逢天之戚不獲延祚痛心絶望忉怛永慕乃相與衰經庭位號咷靈柩將窆申敕修儀疚在輿服寮御部引各執其職路人感愴觀者歎息遂樹碑作銘以表令德銘曰於藐下國瞻仰俊乂欽見我君爰綏我惠式昭績恩有勞其悴昊天不弔景命顛墜悠悠蒸黎惆悵喪氣政雖未宣古之遺愛祁祁我君習習冠蓋修誠以迓曾不東邁靈魂徘徊靡所瞻逮惟其傷矣胸肝摧碎勒銘告哀傳千萬代陳太丘碑先生諱實字仲弓潁川許昌人也含元精之和應期運之數兼資九德總修百行於鄉黨則恂恂焉斌斌焉善誘善導仁而愛人使夫少長咸安懷之其為道也用行舍藏進退可度不徼訐以干時不遷二以臨下四為郡功曹五辟豫州六辟三府再辟大將軍宰聞喜半嵗太丘一年德務中庸教敦不肅政以禮成化行有謐㑹遭黨事禁錮二十年樂天知命淡然自逸交不諂上愛不黷下見幾而作不俟終日及文書赦宥時年已七十遂隱丘山懸車告老四門備禮間心靜居大將軍何公司徒袁公前後招辟使人曉諭云欲特表便可入踐常伯超補三事紆佩金紫光國垂勳先生曰絶望已久飾巾待期而已皆遂不至𢎞農楊公東海陳公每在衮職羣僚賀之皆舉手曰潁川陳君命世絶倫大位未躋慚于文仲竊位之負故時人髙其德重于公相之位也年八十有三中平三年八月丙子遭疾而終臨沒顧命留葬所卒時服素棺槨財周櫬喪事唯約用過乎儉羣公百僚莫不咨嗟巖藪知名失聲揮涕大將軍弔祠錫以嘉諡曰徵士陳君禀嶽瀆之精苞靈曜之純天不憖遺一老俾屏我王梁崩哲萎于時靡憲縉紳儒林論德謀績諡曰文範先生傳曰郁郁乎文哉書曰洪範九疇彛倫攸叙文為德表範為士則存誨沒號不亦宜乎三公遣令史祭以中牢刺史敬弔太守南陽曹府君命官作誄曰赫矣陳君命世是生含光醇德為士作程資始既正守終有令奉禮終沒休矣清聲遣官屬掾吏前後赴㑹刋石作銘府丞與比縣㑹葬荀慈明韓元長等五百餘人緦麻設位哀以送之逺近㑹葬千人以上河南尹种府君臨郡追歎功德述録髙行以為逺近鮮能及之重部大掾以成斯銘可謂存榮沒哀死而不朽者也乃作銘曰峩峩崇嶽吐符降神於皇先生抱寶懷珍如何昊穹既喪斯文微言圮絶來者曷聞交交黃鳥爰集于棘命不可贖哀何有極陳太丘廟碑維中平五年春三月癸未豫州刺史典以褒功述德政之大經是以作諡封墓興於周禮衛鼎晉銘其昭有實故太丘長潁川許昌陳實字仲弓含聖哲之清和盡人才之上美光明配于日月廣大資乎天地辟四府宰三城神化著於民物形表圗於丹青巍巍乎其不可尚也洋洋乎其不可測也儉約違時懸車致仕徵辟交至遂不屑就春秋八十有三寢疾而終大將軍賜諡羣后建碑國人立廟先生有二子季方元方皆命世希有繼期特立季方盛年早亡亦圗容加諡元方在喪毁瘁消形嘔血純孝過哀率禮不越于時嘉異畫像郡國欽盛德之休明懿鐘鼎之碩義乃樹碑鐫石垂世寵光詞曰於皇先生冠耀八荒闡德之宇探道之綱繼期立表以訓四方惟亮天工羣生之望髙明允實有馥其芳載德奕世休有烈光欽慕在人舊有憲章過牧斯州庶奉清塵棄豫而邁靡瞻靡聞嗟哉懷矣曷所咨詢告哀金石式昭其勤文範先生陳仲弓碑君諱實字仲弓潁川許人也其先出自有虞氏中葉當周之盛德有媯滿者武王配以太姬而封諸太昊之墟是為陳胡公春秋之末失其爵土遂以國氏焉世篤懿德令聞不顯君膺皇靈之清和受明哲之上資憑先民之遐迹秉𤣥妙之淑行投足而襲其軌施舍而合其量夫其仁愛溫柔足以孕育羣生廣大寬裕足以包覆無方剛毅強固足以威暴矯邪正身體化足以陶冶世心先生有四德者故言斯可象靜斯可效是以邦之子弟遐方後生莫不同情瞻仰由其模範從其趣尚戾很斯和爭訟化讓雖嚴威猛政迫以刑戮未若先生潛導之速也其立朝事上也恭順貞厲含章方直無顯諫以彰直不割髙而引長常幹州郡腹心之任義則進之以達道否則退之以光操然後德立名宣蓋于當世辟司徒府納規陳謀匡弼三事人用昭明台階允寧遷聞喜長清風暢於所漸儉節溢於監司郡政有錯爭之不從即解綬去復辟太尉府遷太丘長民之治情斂欲反於端懿者猶草木之偃於翔風百卉之挺于春陽也以所執不協所屬色斯舉矣不俟終日辟大將軍府道之行廢有分於命乃罹密綱以就禁錮濳伏不試十有八年大忌蠲除舉賢良方正大將軍司徒並辟君曰七十有懸車之禮况我過諸遂不應其命容止法度老而彌壯凡所履行事類博審不可勝數略舉首目具實録記在乎其傳春秋八十有三中平三年八月丙子卒大將軍三公使御屬往弔祠㑹葬作誄諡曰文範先生刺史太守樹碑頌德許令以下至于國人立廟舊邑四時蒸嘗歡哀承祀具如祖禰先生存獲重稱亡歆血食修行于巳得斯于人固上世之所罕有前哲之所不過也孤嗣紀御恤在疚敢録言行終始所守乃有二三友生咨度禮則咸曰君化道神速行于有國法施於民祀典所宗鄉人之祠非此遺孤所得專也昔者先生甚樂兹土築室講誨精靈所寧紀順奉雅意遂定兆域宜有銘勒表墳墓俾後生之歌詠德音者如丘封之存斯也乃作銘曰於熙文考天授𢎞造淵𤣥其深巍峩其髙剛而無虐柔而不撓誕鋪模憲示世作教君之誨矣民胥效矣道行斯進廢乃斯止鮮我顯泰既多幽否舍榮取辱涅而不緇德之休明賤不為耻超邈其猷莫與方軌郭有道林宗碑先生名泰字林宗太原界休人也其先出自有周王季之穆有虢叔者實有懿德文王咨焉建國命氏或謂之郭即其後也先生誕膺天衷聰睿明哲孝友溫恭仁篤慈惠夫其器量𢎞深姿度廣大浩浩焉汪汪焉奧乎不可測已若乃砥節勵行直道正辭貞固足以幹事隱括足以矯時遂考覽六籍探綜圗緯周流華夏遊集帝學收文武之將墜拯微言之末絶于時纓緌之徒紳佩之士望形表而景附聆嘉聲而響和者猶百川之歸巨海鱗介之宗龜龍也爾乃濳隱衡門收朋勤誨童䝉賴焉用祛其蔽州郡聞德虛已備禮莫之能致羣公休之遂辟司徒掾又舉有道皆以疾辭將蹈洪崖之遐跡紹巢由之絶軌翔區外以舒翼超天衢以髙峙稟命不融享年四十有三以建寧二年正月乙亥卒凡我四方同好之人永懷哀悼靡所置念乃相與推先生之德以圖不朽之事僉以為先民既沒而德音猶存者亦賴之于紀述也今其如何而闕斯禮于是建碑表墓昭銘景行俾芳烈奮乎百世令聞顯于無窮其詞曰於休先生明德通𤣥純懿淑靈受之自天崇壯幽濬如山如淵禮樂是恱詩書是敦匪惟托華乃尋厥根宫牆重仞允得其門懿乎其純確乎其操洋洋搢紳言觀其髙棲遲泌丘善誘能教赫赫三事幾行其招委辭召貢保此清妙降年不永民斯悲悼爰勒兹銘摛其光耀嗟爾來世是則是效貞節先生范史雲碑先生諱丹字史雲陳留外黃人陶唐氏之後也其在周室有士㑹者為晉大夫以受范邑遂以為氏漢文景之際爰自南陽來家于成安生惠延熹二年官至司農廷尉君則其後也君受天正性志髙行潔在乎幼弱固已藐然有烈節矣時人未之或知屈為縣吏亟從仕進非其好也退不可得乃託死遁去親戚莫知其謀遂隱竄山中涉五經覽書傳尤篤易與尚書學立道通久而後歸遊集太學知人審友茍非其類無所容納介操所在不顧貴賤其鄉黨也事長惟敬飬稚惟愛言行舉動斯為楷式郡縣請召未嘗屈節其有備禮招延虛已迓止亦為謀奏盡其忠直以處士舉孝亷除郎中萊蕪長未出京師喪母行服故事服闋後還郎中君遂不從州郡之政凡其事君過則弼之闕則補之通清夷之路塞邪枉之門舉善不拘階次黜惡不畏強禦其事繁多不可詳載雅性謙儉體勤能苦不樂假借與從事荷負徒行人不堪勞君不勝其逸辟太尉府俄而冠帶或以羣黨見嫉時政用受禁錮君罹其罪閉門靜居九族中表莫見其面晚節禁寬困于屢空而性多檢括不治産業以為卜筮之術得因吉凶道治民情以受薄償且無咎纍乃鬻卦于梁宋之域好事者覺之應時輒去禁既蠲除太尉張公司徒崔公前後四辟皆不就仕不為祿故不牽於位謀不茍合故特立于時是則君之所以立節明行亦其所以後時失途也年七十有四中平二年四月卒太尉張公兖州劉君陳留太守淳于君外黃令劉君僉有休命使諸儒參按典禮作誄著諡曰貞節先生昭其功行録記所履謀于耆舊刋石樹銘光示來世銘曰於顯貞節天授懿度誕兹明哲允迪德譽如淵之清如玉之素溷之不濁涅之不汙用行思忠舍藏思固伯夷是師史鰌是慕榮貧安樂不吝窮忤甘死善道遺名之故身沒譽存休聲載路彭城姜伯淮碑先生諱肱字伯淮彭城廣戚人也其先出自帝𦙍在皇唐蓋與四嶽共葉能禮于神舜命秩宗爰封于吕其裔吕望佐周克殷俾侯齊國姓有姜氏即其後也髙祖祖父皆豫章太守潁隂令先生既蹈先世之純德體英妙之髙姿立性純固百行修備故其平生所能事親惟孝如大舜五十而慕友于兄弟有棠棣之華蕚韡之度體惠理和有上德之素安靜守約恩及嬰兒至操動信邑中化之外戶不閉治藏無隱及其學而知之者三墳五典八索九丘俯仰占候推步隂陽有名物定事之能獨見先覩之效然猶學而不厭誨人不倦童冠自逺方而集者蓋千餘人夫水盈而流德交而形是故德行外著洪聲逺布華夏同稱名振當世凡十辟公府九舉賢良方正公車特徴𤣥纁禮聘又家拜犍為太守大中大夫先生盤桓育德莫之肯就不隕穫于貧賤不充詘于富貴拔乎其萃出乎其類生民之傑也年七十有七熹平二年四月辛巳卒于是從遊弟子陳留申屠蟠等悲悼傷懷懼微言之欲絶感絶倫之盛事乃建碑于墓甄述景行銘曰邈矣先生應天淑靈孝友是備上德是經𢎞此文藝耽怡是寧恂恂善誘童冠來誠有燁其譽有煥其聲顯顯羣公並加辟命赫赫聖皇仍獲其聘委䇿避國守此𤣥靜綽乎其裕確乎其操疇昔洪崖雙名並髙嗟乎殞沒搢紳永悼依依我徒靡則靡效勒銘金石彌逺益曜舊本蔡中郎集載伯淮碑誤書建安二年卒宋人謂雍建安前已先逝因疑此碑為僞不知後漢書伯淮之沒蓋熹平二年也在雍為先輩大儒此碑實出雍筆今改正建安二字為熹平可耳翟先生碑世以仁義為質學問為業爰暨先生固天縱德應運立言繼期五百實行形于州里明哲與聖合契該通五經兼洞墳籍為萬里之場圃九隩之林澤挹之若江湖仰之若華嶽𤣥𤣥焉測之則無源汪汪焉酌之則不竭可謂生民之英者巳國失元傳學失表式凡百搢紳哀矣泣血人百其身匪云來復于是鄉黨乃相與登山伐石而勒銘曰邈矣先生厥德孔貞腹心𢎞道深髙入神王錫三命觀國之賓其視富貴忽若浮雲既不降志亦不辱身汝南周巨勝碑君諱協字巨勝陳留太守之孫光祿勳之子也君應坤乾之淳靈繼命世之期運𤣥懿清朗貞厲精粹體仁足以長人嘉德足以合禮總六經之要括河洛之幾援天心以立釣贊幽明以揆時沉靜微密淪于無內寬裕𢎞博含乎無外巨細洪纎罔不總也是以實繁于華德盈乎譽初以父任拜郎中疾去官察孝亷是時郡守梁氏外戚貴寵非其好也遂以病辭太守復察孝亷乃俯而就之以明可否然猶私存衡門講誨之樂不屑已也又委之而旋故大將軍梁冀專國作威海內從風世之雄材優逸之徒莫不委質從命而顛覆者蓋亦多矣聞君洪名前後三辟卒不降身由是搢紳歸髙羣公事德太尉司徒再辟三辟察賢良方正州舉孝亷皆病不就擾攘之際災眚仍發聖上詢咨師錫䇿命公車特徵君仰瞻天象俯察人事世路多險進非其時乃托疾杜門靜居里巷外無人跡庭生蓬蒿如此者十餘年強禦不能奪其守王爵不能滑其慮至延熹二年乃更闢門延賓享宴娛樂及秋而梁氏誅滅十二月君卒然則識幾知命可觀於斯矣洋洋乎若德雖崇山千仞重淵百尺未足以喻其髙究其深也夫三精垂耀處者有表爰在上世作者七人焉有該百行備九德齊光日月洞靈神明如君之至者與亶所謂天明之秀也享年五十不登期考遐邇歎悼痛心失圗乃相與建碑勒銘以旌休美其辭曰厥初生民天賜之性有龎有醇有否有聖伊惟周君允卜其政誕兹明德自貽哲命煥乎其文如星之布確乎不拔如山之固追踪先緒應期作度濳心大猷覃思德謨遁世無悶屢辭王寮洋洋泌丘于以逍遙蔑爾童䝉是訓是教瞻彼榮寵譬諸雲霄優哉游哉侔此𢎞髙名振華夏光耀昆苖清風丕揚德音孔昭處士圂叔則碑伊漢二十有一世處士有圂典字叔則者夫其生也天真淑性清理條暢精微周密包括道要致思無形深總厯部纎入藝文藻分葩列如春之榮守根據窮不虛其聲偉德若兹惟世之英乃遂隱身髙藪稼穡孔勤童䝉來求彪之用文不義富貴譬諸浮雲州郡禮招休命交集徒加名位而已莫之能起也博士徵舉至孝恥已處而復出若有初而無終潔耿介于丘園慕七人之遺風年七十有五建寧二年六月卒臨沒顧命曰知我者其蔡雍乃為銘載書休美俾來世昆裔永有諷誦于先生之德其辭曰民之齊敏卓時挺生思心精睿綜物通靈術有𤣥妙于時游情聞道睹異惕然若驚守死善操與世無營渾其若濁徐然後清綽其若煥終其益貞有恆實難獨秉其經嗟爾來世是瞻是聽光武濟陽宫碑惟漢再受命曰世祖光武皇帝考南頓君初為濟陽令濟陽有武帝行過宫常封閉帝將生考以令舍下濕開宫後殿居之建平元年十二月甲子夜帝生時有赤光室中皆明使卜者王長卜之長曰此善事不可言嵗有嘉禾一莖生九穗長于凡禾因為尊諱王室中微哀平短祚姦臣王莽偷有神器十有八年罪盈惡熟天人致誅帝乃龍見白水淵躍昆滍破前隊之衆殄二公之師收兵略地經營河朔戮力戎功翼戴更始義不即命帝位闕焉於是羣公諸將據河洛之文叶符瑞之珍僉曰厯數在帝踐祚允宜乃以建武元年六月乙未即位鄗縣之陽五成之陌祀漢配天不失舊物享國三十六年方內乂安蠻夷率服巡狩泰山禪梁父皇代之遐迹帝者之上儀罔不畢舉道德餘慶延于無窮先民有言樂樂其所自生而禮不忘其本是以虞稱媯汭姬美周原皇天乃眷神宫實始于此厥跡邈哉所謂神麗顯融越不可尚小臣河南尹鞏瑋先祖銀艾封侯歷世卿尹受漢厚恩瑋以商箕餘烈郡舉孝亷為大官丞來在濟陽顧見神宫追惟桑梓褒述之義用敢作頌頌曰赫矣炎光爰耀其輝篤生聖皇二漢之微稽度䖍則誕育靈姿黃孽作慝篡握天機帝赫斯怒爰整其師應期濳見扶陽而飛禍亂克定羣凶殄夷匡復帝載萬國以綏巡于四嶽展義省方登封降禪升于中皇爰兹初基天命孔彰子子孫孫保之無疆王子喬碑王孫子喬者蓋上世之真人也聞其仙舊矣不知興于何代博問道家或言潁川或言彥䝉初建斯域則具斯丘傳承先人曰王氏墓紹𦙍不繼荒而不祠歷載彌年莫之能紀暨于永和元年十有二月當臘之夜上有哭聲其音甚哀附居者往聞而怪之明則登其墓察焉時天洪雪下無人踪見一大鳥跡有祭祀之處左右或以為神其後有人著絳冠大衣杖竹䇿立冢前呼樵孺子尹秃謂曰我王子喬也爾勿復取吾先人墓前樹也須㬰忽然不見時令太山萬熙稽古老之言感精瑞之應咨訪其驗信而有徵乃造靈廟以休厥神於是好道之儔自逺來集或絃歌以詠太一或談思以歷丹田其疾病尫瘵者靜躬祈福即獲祚若不䖍恪輒顛踣故知至德之宅兆真人之先祖也延熹八年秋八月皇帝遣使者奉犧牲以致祀祇懼之敬肅如也相國東萊王章字伯義以為神聖所興必有銘表昭示後世是以賴鄉仰伯陽之踪關民慕尹喜之風乃㑹長史邊乾訪及士𨽻遂樹𤣥石紀遺烈俾志道者有所覽焉詞曰伊王君德通靈含光耀秉純貞應大道羡久榮棄世俗飛神形翔雲霄浮太清乘螭龍載鶴軿戴華笠奮金齡揮羽旗曳霓旌歡罔極壽億齡昭篤孝念所生嵗終闋發丹情存墓冢舒哀聲遺鳥跡覺舊城被絳衣垂紫纓呼孺子告姓名由此悟感怖驚修祠宇反几筵饋饎進甘香陳時傾顧馨明禋匡流祉熙帝庭祐邦國相黔民光景福耀無垠伯夷叔齊碑熹平五年天下大旱禱請名山求獲答應時處士平陽蘇騰字𤣥成夢陟首陽有神馬之使在道明覺而思之以其夢陟狀上聞天子開三府請雨使者與郡縣戶曹掾吏登山升祠手書要曰君况我聖主以洪澤之福天尋興雲即降甘雨因樹碑為銘曰惟君之質體清良分昔佐殷姬忠孝彰兮委國捐爵諫國亡兮譏武伐紂欲喻匡兮時不可救歷運蒼兮追念先侯受命皇兮憂懷感兮雖沒不朽名字芳兮九疑山碑巖巖九疑峻極于天觸石膚合興播連雲時風嘉雨浸潤下民芒芒南土實賴厥勛逮于虞舜聖德光明克諧頑傲以孝蒸蒸師錫帝世堯乃授徵受終文祖璇璣是承泰階以平人以有終遂葬九疑解體而升登此崔嵬託靈神仙陳留東昏庫上里社碑社祀之建尚矣昔在聖帝有五行之官而共工子勾龍為后土及其沒也遂為社祀故曰社者土地之主也周禮建為社位左宗廟右社稷戎醜攸行於是受脤土膏恆動於是祈農又頒之于兆民春秋之中命之供祠故自有國至于黎庶莫不祀焉惟斯庫里古陽武之戶牖鄉也春秋時有子華為秦相漢興陳平由此社宰遂佐高帝克定天下為右丞相封曲逆侯永平之世虞延為太尉司空封公至延熹中延弟曾孫放字子卿為尚書令外戚梁冀乘寵作亂首䇿誅之王室以績封召都亭侯太僕大常司空毗天子而維四方克措其功往烈有常于是司監爰暨邦人僉以為宰相繼踵咸出斯里秦一漢三而虞氏世焉雖有積善餘慶修身之致亦斯社之所相也乃相與樹碑作頌以示後昆云唯王建祀明事百神乃顧斯社于我兆民明德惟馨其慶聿彰自嬴及漢四輔代昌爰我虞宗乃世重光元勳既立錫兹土疆乃公乃侯帝載用康神人協祚且巨且長凡我里人盡受嘉祥刋銘金石永世不忘琅琊王傳蔡公碑君諱朗字仲明蓋倉頡之精𦙍姬稷之末胄也昔叔度文王之昭建侯于蔡以國氏焉迄于平襄周祚微缺王室遂卑齊晉交爭強楚侵陵昭侯徙于州來公族分遷氏家于圉奕葉載德常歷官尹以逮于兹君雅操明允威厲不猛履孝悌之性懷文藝之才包洞典籍刋摘沉祕知幾達要通含神契既討三五之術又采二南之業以魯討教授生徒雲集莫不自逺並至栖遲不易其志簞食曲肱不改其樂心棲清虛之域行在玉石之間是以德行儒林智周當代四嶽稱名帝曰豫聞元和元年徵拜博士舒演奧祕贊理闕文所立卓爾度躡雲蹤其選士也抑頑錯枉進聖擢偉極遺逸於九臯揚明德于側陋拔茅以彚幽滯用濟加以清敏廣平好是正直規誨之䇿日諫王庭忠讜著烈令聞流行聖朝以藩國貴胄先帝遺體或以繼絶襲位正于阿保未洽雅訓驕盈僣差或蹈憲理非𢎞直碩儒莫能匡弼蔡君審行修德進退可度遷河間中尉琅琊王傳乃從經術之方示以棐諶之威率禮莫違其國用靖雖安國之輔梁孝仲舒之相江都靡以加焉勳績既盛帝簡其功將授上位遷于紫宫賦壽不永遘此疾凶年五十八永興六年夏卒嗚呼哀哉凡百君子咨痛罔極殷懷傷悼含涕流惻如何昊天喪我師則爰勒斯銘式昭其德天敏明哲於赫我君含𢎞光大𤣥覽孔真潛樂教思韞玉衡門雲龍感應養徒三千珠藏外耀鶴鳴聞天若時徴庸登祚王臣綜彼前疑定此典文參佐七德俾相大藩身沒稱顯永遺令勳表行揚名垂示後昆𤣥文先生李子材碑𤣥文先生名休字子材南陽宛人也其祖李伯陽周柱下史覿衰世而遁焉其後雄俊豪傑往往崛出自戰國及漢名臣繼踵支胄散逸其遷于宛尚矣王莽竊位漢祚中移考翼佐世祖匡復郊廟錫封茅土卿相牧守于時相逐休少以好學游心典謨既宗七經又精羣緯鈎深極奧窮覽妙㫖居則玩其辭動則察其變雲物不顯必考其占故能獨見前識以先神意若古今常難疑義錯繆前人所希論後學所不覽休盡剖判剝散幽暗靡不昭爛猶發憤于目所不覩體所不間遂登東嶽觀百王遺風習容闕里以協禮𠂻退而講誨童冠仰焉僔僔如也郡署五官掾功曹司空胡公顯以儒譽特進大鴻臚仍優禮固請秉讓執虛辭此三命不為利回不為義疚臨寵審已不動其守可謂純潔皓素綽有餘裕者已其於鄉黨細行敦睦九族篤信交友不可得而詳也初娶配出後配未字年既五十苖𦙍不嗣以永壽二年夏五月乙未卒凡其親昭朋徒相與大㑹而葬之鼎爼之禮節文曲備時令戴君臨喪命諡郡遣丞掾冠蓋咸届既定而後罷焉于是故好朋舊僉以仲尼既沒文不在兹韞櫝美玉喪莫賈之求而無繼慺爾永思乃刋斯石懿德是丕吁兹先生秉德恭勤天啓哲心其學孔純經緯是綜雅麗是分行已守道匪禮不遵處約不戚聞寵不欣榮不能華威不能震天淑厥命以讓以仁有惠云載惟邦之珍按典考諡諡以𤣥文身沒名彰配黔作鄰遺譽罔極丕昭億年嗚呼哀哉郡掾史張𤣥祠堂碑掾諱𤣥字伯雅河南偃師人也其先張仲者實以孝友為名左右周室大漢初興張蒼為丞相封北平侯其後自河內遷于兹土世為顯姓掾天姿恭恪宣慈惠和允恭博敏惻隱仁恕正身履道以協閨庭損用節財以贍疏族動中規矩言合典式不知名彰不飾行著可謂仁粹淑貞自然之素者已論者嘉之州郡禮招署致掾史沉靜寡欲不求榮祿是以豐于天爵薄于人位某月日遭疾而卒掾孫翻以貞固之質受過庭之訓獲執㦸出宰相邑遷太守得大夫之祿奉蒸嘗之祀尋原祚之所由而至于此先考積善之餘慶隂德之陽報乃于是立祠堂假碑勒銘式明令德以示乎後辭曰於惟我考允迪懿德治信斯順其儀不忒仁惠周洽行惟模則篤垂餘慶貽此燕翼邈矣遺孫周懷多福刋名金石流于罔極袁滿來墓碑茂德休行曰袁滿來太尉公之孫司徒公之子逸才淑姿實天所授聰逺通敏越齔在闕明習易學從誨如流百家衆氏遇目能識事不再舉問一及三具始知終情性周備夙有竒節孝智所生順而不驕篤友兄弟和而無忿氣决泉達無所凝滯雖冠帶之中士校材考行無以加焉允公族之殊異國家之輔佐衆律其器士嘉其良雖則童稚令聞芬芳降生不永年十有五四月壬寅遭疾而卒既苖而不穗凋殞華英嗚呼悲夫乃假碑旌于墓表嗟其傷矣唯以告哀童幼胡根碑故陳留太守胡君子曰根字仲原生有家表幼而克才角犀豐盈光潤玉顔聰明敏惠好問早識言語所及智思所生雖成人之德無以加焉禀命不長夙罹凶災年七嵗建寧二年遭疾夭逝慈母悼痛昆娣孔懷感襁褓之親愛憐國城之乖離乃權宜就封二祖墓側親屬李陶等相與追慕先君悲悼遺嗣樹碑刋辭以慰哀思辭曰於惟仲原應氣淑靈實有令儀而氣如瑩明之之性與體俱生聞言斯識覩物知名傅者太勤受誨則成柔和順美與人靡爭忿不怨懟喜不驕盈當受福永為光為榮如何昊天降此短齡惜繁華之方曄兮望嚴霜而凋零嗟童孺之夭逝兮傷慈母之肝情從皇祖乎靈兆兮庶神魄之斯寧哀慘戚以流涕兮念汚軫之不停顧永懷于不杇兮乃託辭于斯銘真定直父碑其接友也審辨真僞明于知人度終始而後交情不踈而貌親靈表太傅胡公夫人靈表夫人編縣舊族章氏之長女也字曰顯章令儀小心秉操塞淵仁孝婉順率禮無遺體季蘭之姿蹈思齊之跡永初二年年十有五爰初來嫁誕成家道仰奉慈姑竭歡致敬俯誨膝下化導周悉至德修於幾微徽音暢于神明故能參任姒之功兼生人之榮朝春路寢贊桑蠶宫光寵有祭祭服有珫前後奉斯禮者三十餘載夫人生五男長曰整伯齊次曰千億叔韡次曰寧稚威次曰碩季睿伯仲各未加冠遭厲氣同時夭折叔上郡孝廉季更歷州郡舉茂才葉令京令為議郎季以髙第為侍御史諫議大夫侍中虎賁中郎將陳留太守皆早即世夫人哀悼劬悴由是被疾遭太夫人憂篤年七十七建寧三年薨夫人之存也契濶中饋婉孌供飬依生奉仁紹述雅意其閠月附于太夫人窀穸于兹地魂而有靈欽明定省神心欣焉其實寧之元女金盈追慕永思憯怛罔極遂及斯表鐫著堅珉頌曰悲母氏之不永懷殷恤以摧傷惟子道之無窮惜聞誨之未央庶黃耉以期頥胡委我以夙喪恆思心以溵切亦割肝以絶腸昔先聖之遺辭言仁者其夀長嗟母氏之憂患體愷悌以慈良失延年之報祐獨何棄於穹蒼日月忽以將暮抱長結以含愁尋修念於在昔原疾病之所由遭元子之弱夭心傷悴以自憂暨叔季之殞終哀情結以彌綢皇姑沒而中感遂大漸兮速流疾𦦨𦦨而日遘氣微微以長浮銷精魂以遐翔曾不可乎援留爾乃順缺㫖於冥冥繼存意於不違爰祔靈於皇姑尚魂魄之有依潛幽室之黯漠惜昭明之景輝一往超以末及傾徂邈其彌遲顧新廟以纍欷伏几筵而增悲嗟既逝之益逺耿悠悠而莫追司徒袁公夫人馬氏靈表維光和七年司徒袁公夫人馬氏薨其十一月葬哀子懿達仁達銜恤哀痛靡所寫懷乃撰録母氏之德履示公之門人覩文感義采石于南山咨之羣儒假貞石以書焉夫人右扶風平陵人也曾祖中水侯祖將作大匠考南郡太守中水侯弟伏波將軍女在淑媛作合孝明誕生孝章婚姻帝室世為名族夫人生應靈和德精性妙角犀豐盈實有偉表溫慈惠愛慎而寡言幼從師氏四禮之教早達窈窕德象之儀及笄求匹明哲供治婦業孝敬婉孌畢力中饋後生仰則以為模憲自公歷據王官至宰相夫人營克家道扶翼政事聰明達乎中外隱括及乎無方不出其機化導宣暢童子無驕逸之尤婦妾無捨力之愆故能窮生人之光寵獲福祿之豐報朝春政於王室躬桑繭於蠶宫春秋六十有三寢疾不永懿等追想定省尋思髣佛哀窮念極不知所裁乃申辭曰於穆母氏其德孔休思齊先姑百行聿修宣慈惠和恩澤並周義方之訓如川之流俾我小子䝉昧以滮不享遐年以永春秋往而不返濳淪大幽嗚呼哀哉几筵虛設幃帳空陳品物猶在不見其人魂氣飄颻焉所安神兄弟何依姊妹何親號咷忉怛曾不我聞吁嗟上天何辜而然傷逝不續往者不旋誄濟北相崔君夫人誄維延熹四年故濟北相崔夫人卒嗚呼哀哉世喪母儀宗殞憲師哀哀孝子靡所瞻依凡百赴弔至止增悲投涕歔欷共叙赫姿乃為誄曰清和有鑠時惟哲母令儀令色爰以資始塞淵其心淑慎其止于母斯勤在子斯敏仰覽篇籍俯釐絲枲多才多藝于何不有休譽邈焉允女之英乃及崔君惟德是行其德伊何實粹實明䖍恭事幾契闊中饋敦此婉順疾彼攸遂思齊徽音晨興夜寢穆穆其猷莫之與二天祚明德底之方穀於赫崔君膺兹祉祿夫人有𦙍翼此清淑仁風溫潤義惠優渥推恩中外施浹疏族食不兼膳服不纎縠以儉為榮以奢為辱堂堂其𦙍惟世之良於其令母受兹義方訓以柔和董以嚴剛怒不傷愛喜不亂莊納之軌度終然允臧是用登隮享其寵光雖則崇盛猶匪寧息同其婦子茂帥其職服貴無荒尊不舍力密勿不忘惟德之極昔在共姜陪臣之母勞謙紡績仲尼是紀矧兹夫人帝室命婦猶日孜孜復禮克已人亦有言仁者壽長宜登永年黃耉無疆昊天不弔降此殘殃寢疾彌留精爽悴傷慘怛孝子惴惴其惶靡神不舉無藥不將嗚呼哀哉於是孝子長叫氣絶復蘇號呼告哀不知其辜昊天上帝忍弔遺孤尋想遊靈焉識所徂嗚呼哀哉既殯神柩薄言于歸冢宰喪儀循禮無遺切切喪主瘠羸哀哀情兮長慕涕兮無晞行旅揮涕千里于咨乃謀卜筮言考其良建彼兆域于時翳藏冥冥窀穸無時有陽燈燭既滅馬道納光形景不見定省何望嗟其哀矣不可弭忘日月代序古有如喪由斯夫人榮烈有章配彼哲彥既隆且昌顧景赫奕饋供孔將惟以慰懷庶無永傷嗚呼哀哉神誥漢交趾都尉胡公夫人黃氏神誥夫人江陵黃氏之季女字曰列嬴其先出自伯翳别封于黃以國氏焉髙祖父汝南太守曾祖父延城大尹祖父番禺令父以主簿嘗證太守事奉明君以立臣節漢南之士以為美談初都尉君娶于故豫州刺史即黃君之姊生太傅安樂侯廣及卷令康而卒繼室以夫人生童紀未齔而夭夫人懷聖善之姿韜慈母之仁撫育二孤導以義方思齊先姑神罔時恫故能迄用有成誕膺繁祉廣歷五卿七公再封之祿康亦由孝廉宰牧二城九鼎之義夫人是享爰暨稚孫更仕三宫或典百里或作虎臣銀艾貂蟬近侍顯尊受兹介福于我夫人自郡尉仕于京師及廣兄弟式叙漢朝夫人居京師六十有餘載其乘輅執贄朝皇后採柔桑于蠶宫手三盆于繭館者蓋三十年上有帝室寵光之休下有堂宇斤斤之祚心耽其榮體安其逺圖長慮逈用遺舊居欲留此焉康寧之時亟以為言太夫人年九十一建寧二年薨于太傅府是月辛酉公之季子陳留太守碩卒于洛陽左池里舍公銜哀悼祇慎其屬遵奉遺意不敢失墜乃俾元孫顯咨度羣儒以考其𠂻僉曰昔帝舜沒于蒼梧殯于虞郊二妃薨于江湘不即兆于九疑延陵季子實惟吳人長子道終卜葬嬴博夫遭時而制不逺遷徙魂氣所之不繫丘壠帝舜以之神罔時怨季札以之仲尼嘉焉鍳帝籍之髙論綜精靈之幽情稽先人之遐迹順母氏之所寧兹事體通而義同允不可替於是公乃為辭昭告先考然後卜定宅兆龜筮悉從遂營窀穸之事舉封樹之禮十月既望粵翌日已酉葬我夫人黃氏及陳留太守碩于此髙原雒陽東界關亭之阿天子使中常侍謁者李納弔且送葬時賻錢二十萬布二百匹再以中牢祠羣后畢㑹榮哀孔備于時濟陽故吏舊民中常侍勾陽于肅等二十三人思應慕化推本議銘著斯碑石俾諸昆裔瞻仰以知禮之用是為神誥乃申頌曰於穆夫人家邦之媛昔在嬴代黃國氏建至于近祖亦降于漢天祚明德福祿流衍既作母儀履信思順登壽耄耋用永蕃孌子孫以仁追稽先典厝兹洛濱齊跡湘靈配名古人休矣耀光千億斯年哀讚議郎胡公夫人哀讚議郎夫人趙氏字曰永姜允有令德秉心塞淵舒詳閒雅儀節孔備女師四典窈窕德象罔不習熟以供婦道議郎早世檢誨幼孤義方以導其性中禁以間其情孤皓儉節用免咎悔少辟侍中襲先公之爵以議郎出為濟隂太守是時夫人寢疾未薨而國家方有滎陽寇賊震驚帝師簡選州辟授任進衛不得辭王命親醫藥夫人乃自矜精禀氣力俯起若愈以勸遣皓到官月餘所疾暴盛春秋五十八中平四年薨于京師皓有剖符之寄逼于國典疾篤不得顧親增感氣絶不能自宥慎終之事闕焉永廢雖不毁以隨沒亦困悴而傷懷知我如此不如勿生號咷告哀以乞骸骨踰年然後獲聽追惟考君存時之命迎棺舊土同穴此城孤心摧割靡所底念仰瞻二親或有神誥靈表之文敢曰亮暗叙我憂痛作哀讚書之于碑愍豫小子夙罹孔艱嚴考殞沒我在齠年母氏鞠育載矜載憐殷斯勤斯慈愛備存匪惟驕之範我軌度教誨嚴肅昭示好惡俾我克類畏威忌怒用免咎悔踐繼先祖即爵其土二將是臨與帝剖符守于濟隂夫人寢疾榮此寵休疾用歡痊翊日斯瘳將征將邁從飬陶丘景命徂逝不愍少留疾大漸以危亟兮精微微而浸衰逼王職於憲典兮子孫忽以替違目不臨此氣絶兮手不親夫含飯陳衣衾而不省兮合綆棺而不見昔豫考之即世兮安宅兆于舊邦依存意以奉亡兮遷靈柩而同來考妣痛以慘兮離乖神柩集而移兮增哀黃壚密而無閒兮出入閴其無門舁柩在兹兮不知魂景之所存悼孤𠂻之不遂兮思情憭以傷肝幽情淪于后坤兮精哀達乎昊乾祝辭宗廟祝嘏辭嗣曾孫皇帝某敢昭告于皇祖髙皇帝各以后配昔受命京師都于長安享國十有一世歷年二百一十載遭王莽之亂宗廟隳壞世祖復帝祚遷都洛陽以服土中享國一十一世歷年一百六十五載豫末小子遭家不造早統洪業奉嗣無疆關東吏民敢行稱亂總連州縣擁兵聚衆以圗叛逆震驚王師命將征服股肱大臣推皇天之命以已行之事遷都舊京昔周德缺而斯干作應運變通自古有之於是乃以三月丁亥來自雒越三月丁巳至于長安飭躬不慎寢疾旬日賴祖宗之靈以獲有瘳吉旦齊宿敢用潔牲一元大武柔毛剛鬛商祭明視薌合嘉蔬香萁醎鹺豐本明粢醴酒用告遷來尚饗九祝辭髙皇帝使工祝承致多福無疆于爾嗣曾孫皇帝使爾受祿于天宜此舊都萬國和同兆民康乂眉壽萬年子子孫孫永守民庶勿替引之祝社文元正令午時惟嘉良乾坤交泰太簇運陽乃祀社靈以祈福祥祖餞祝文今嵗淑月日吉時良爽應孔加君當遷行神龜吉兆林氣煌煌蓍卦利貞天見三光鸞鳴雍雍四牡彭彭君既升輿道路開張風伯雨師灑道中央陽遂求福蚩尤辟兵倉龍夾轂白虎扶行朱雀道引𤣥武作侣勾陳居中厭伏四方往臨邦國長樂無疆禊文洋洋暮春厥日除已尊卑煙騖惟女與士自求百福在洛之涘弔文弔屈原文鸋鴂軒翥鸞鳯挫翮啄碎琬琰寶其瓴甋皇車奔而失轄執轡忽而不顧卒壞覆而不振顧抱石其何補文篆勢字畫之始因於鳥跡蒼頡循聖作則制文體有六篆巧妙入神或象龜文或比龍鱗紓體放尾長趐短身頽若黍稷之垂穎藴若蟲蛇之棼緼揚波振擊鷹峙鳥震延頸脅翼勢欲凌雲或輕舉內投微本濃末若絶若連似露緣絲凝垂下端從者如懸衡者如編抄者邪趣不方不圓若行若飛岐岐翾音喧􅘁飛貌翾逺而望之若鴻鵠羣遊絡繹遷延迫而視之湍際不可得見指揮不可勝原研桑不能數其詰屈離婁不能覩其隙間般倕揖讓而辭巧籀誦拱手而韜翰處篇籍之首目粲粲彬彬其可觀摛華豔於紈素為學藝之範間嘉文德之𢎞懿藴作者之莫刋思字體之俯仰舉大略而論旃古文苑起句云鳥遺跡皇頡循聖作則制斯文體有六篆為真形要妙巧入神或龜文斜列櫛比龍鱗餘同𨽻勢鳥跡之變乃惟佐𨽻蠲彼繁文崇此簡易厥用既行體象有度奐若星陳鬱若雲布其大徑尋細不容髮隨事從宜靡有常制或穹窿恢廓或櫛比針列或砥繩平直或蜿蜒繆戾或長邪角趣或規旋矩折修短相副異體同勢奮華輕舉離而不絶纎波濃㸃錯落其間若鍾􅒶設張庭燎飛煙嶄嵓崔嵯髙下屬連似崇臺重宇層雲冠山逺而望之若飛龍在天近而察之心亂目眩竒姿譎誕不可勝原研桑所不能計宰賜所不能言何草篆之足算而斯文之未宣豈體大之難覩將祕奧之不傳聊佇思而詳觀舉大略而論旃九惟文八惟困乏憂心殷殷天之生我星宿值貧六極之厄獨遭斯勤居處浮􅞎無以自存冬日栗栗上下同雲無衣無褐何以自溫六月徂暑炎赫來臻無絺無綌何以蔽身無食不飽永離歡欣詩飲馬長城窟行青青河邊草綿綿思逺道逺道不可思宿昔夢見之夢見在我旁忽覺在他鄉他鄉各異縣展轉不可見枯桑知天風海水知天寒入門各自媚誰肯相為言客從逺方來遺我雙鯉魚呼童烹鯉魚中有尺素書長跪讀素書書中竟何如上有加餐食下有長相憶答對元式詩伊余有行爰戾兹邦先進博學同類率從濟濟羣彥如雲如龍君子博文貽我德音辭之集矣穆如清風答卜元嗣詩斌斌碩人貽我以文辱此休辭非余所希敢不酬答賦誦以歸翠鳥庭陬一作前有若榴緑葉含丹榮翠鳥時來集振翼修形容回顧生碧色動搖揚標青幸脫虞人機得親君子庭馴心托君素雌雄保百齡漢魏六朝百三家集卷十九
