body:
  text: 漢魏六朝百三家集巻五十八晉王羲之集題詞殷洪源與桓温不協王逸少移書苦諫欲畫亷藺于屏風又曲止北伐皆不見聽果敗於姚襄謝豫州邁往不屑才非將帥違逸少之言後亦狼狽世謂其形神在名山滄海之間于天下事抑何觀火也瑯琊南渡江左粗安王謝雖賢未敢以區區吳越經緯天下褚裒殷浩志奢才短動而輒蹶若復不守江東遠慕諸葛伍員之憂為期彌促卒觀喪晉釁發強臣非繇外㓂逸少早識善察百年此數札者誠東晉君臣之良藥非同平原辨亡令升論晉追覽既往奮其縱横也蘭亭詠詩韻勝金谷誓墓不出義取老氏與謝萬書言山水弋釣拊掌開懷又敎子孫退讓彷彿萬石絲竹陶寫恐為兒輩覺則樂而能節矣史云逸少與藍田牴牾愧歎謝病猶逐翰音而未覩登天者也書法冠古今飄雲矯龍亦藝成之一後人寳其筆勢聚字成帖間有斷缺尚圖球奉之誤正可思葢在是乎目録書遺殷浩書報殷浩書與㑹稽王牋與尚書僕射謝安書與謝安書又與桓温牋誡謝萬書與謝萬書與人書又章草帖與所知書飛白帖又又辭舉帖辭郡帖恭命帖殊遇帖㑹稽帖此郡帖上虞縣事帖又又諸暨帖餘姚帖軍府帖湖熟帖郡荒帖斷酒帖又奉法帖簿書帖増運帖又防民帖深情帖從宜帖𤣥同帖誠理帖資生帖慕容帖渭南帖方軌帖羣凶帖送袍帖志嶠帖此聲帖又給船帖功曹帖發詔帖軍使帖仲舒帖尚書帖又荀葛帖文集帖歌章帖戲詠帖月儀書十七帖又又又又又又又又又又又又又又又又又又又又又又又又又又桓公帖又又又又又又雲子帖又又又安西帖又又又又又庾丹陽帖又丹陽帖又又又殷侯帖又又又又又又又又彭祖帖袁彭祖帖孔建安帖與郗家論婚書漢魏六朝百三家集巻五十八目録欽定四庫全書漢魏六朝百三家集巻五十八明張溥輯晉王羲之集書遺殷浩書浩揚州刺史參綜朝權與桓温不協羲之以國家之安在於内外和因與浩書戒之浩不從及浩將北伐羲之以為必敗以書止之言甚切至浩遂行果為姚襄所敗復圖再舉仍遺浩書先是安西將軍謝尚為督統敗績知安西敗䘮公私惋怛不能須臾去懷以區區江左所營綜如此天下寒心固以久矣而加之敗䘮此可熟念徃事豈復可追願思𢎞將來令天下寄命有所自隆中興之業政以道勝寛和為本力爭武功作非所當因循所長以固大業想識其由來也自㓂亂以來處内外之任者未有深謀遠慮括囊至計而疲竭根本各從所志竟無一功可論一事可記忠言嘉謀棄而莫用遂令天下將有土崩之勢何能不痛心悲慨也任其事者豈得辭四海之責追咎往事亦何所復及宜更虛已求賢當與有識共之不可復令忠允之言常屈於當權今軍破於外資竭於内保淮之志非復所及莫過還保長江都督將各復舊鎮自長江以外羈縻而已任國鈞者引咎責躬深自貶降以謝百姓更與朝賢思布平正除其煩苛省其賦役與百姓更始庶可以允塞羣望救倒懸之急使君起於布衣任天下之重尚德之舉未能事事允稱當重統之任而䘮敗至此恐闔朝羣賢未有與人分其謗者今亟修德補闕廣延羣賢與之分任尚未知獲濟所期若猶以前事為未工故復求之於分外宇宙雖廣自容何所知言不必用或取怨執政然當情慨所在正自不能不盡懷極言若必親征未達此㫖果行者愚智所不解也願復與衆共之復被州符增運千石徵役兼至皆以軍期對之䘮氣罔知所厝自頃年割剝遺黎刑徒竟路殆同秦政惟未加慘夷之刑耳恐勝廣之憂無復日矣北堂書鈔載羲之與浩書下官勸令畫亷藺於屏風報殷浩書吾素自無廊廟直王丞相時果欲内吾誓不許之手跡猶存由來尚矣不於足下叅政而方進退自兒婚女嫁便懷尚子平之志數與親知言之非一日也若䝉驅使關隴巴蜀皆所不辭吾雖無專對之能直謹守時命宣國家威德固當不同於凡使必令遠近咸知朝廷留心於無外此所益殊不同居䕶軍也漢末使太傅馬日磾慰撫關東若不以吾輕微無所為疑宜及冬初以行吾惟恭以待命與㑹稽王牋簡文帝初為㑹稽王輔政羲之與王牋陳殷浩不宜北伐并論時事古人耻其君不為堯舜北面之道豈不願尊其所事比隆往代况遇千載一時之運顧智力屈於當年何得不權輕重而處之也今雖有可欣之㑹内求諸已而所憂乃重於所欣傳云自非聖人外寧必有内憂今外不寧内憂已深古之𢎞大業者或不謀於衆傾國以濟一時之功者亦往往而有之誠獨運之明足以邁衆蹔勞之弊終獲永逸者可也求之於今可得擬議乎夫廟算決勝必宜審量彼我萬全而後動功就之日便當因其衆而即其實今功未可期而遺黎殱盡萬不餘一且千里饋粮自古為難况今轉運供繼西輸許洛北入黄河雖秦政之弊未至於此而十室之憂便以交至今運無還期徵求日重以區區吳越經緯天下十分之九不亡何待而不度德量力不弊不已此封内所痛心歎悼而莫敢吐誠往者不可諫來者猶可追願殿下更埀三思解而更張令殷浩荀羡還據合肥廣陵許昌譙郡梁彭城諸軍皆還保淮為不可勝之基須根立勢舉謀之未晚此實當今策之上者若不行此社稷之憂可計日而待安危之機易於反掌考之虛實著於目前願運獨斷之明定之於一朝也地淺而言深豈不知其未易然古人處閭閻行陣之間尚或干時謀國評裁者不以為譏况厠大臣末行豈可黙而不言哉存亡所係決在行之不可復持疑後機不定之於此後欲悔之亦無及也殿下德冠宇内以公室輔朝最可直道行之致隆當年而未允物望受殊遇者所以寤寐長歎實為殿下惜之國家之慮深矣常恐伍員之憂不獨在昔麋鹿之游將不止林藪而已願殿下蹔廢虛遠之懷以救倒懸之急可謂以亡為存轉禍為福則宗廟之慶四海有賴矣與尚書僕射謝安書羲之為㑹稽時東土饑荒輒開倉賑貸朝廷賦役繁重吳㑹尤甚羲之每上疏爭之事多見從又與安書頃所陳論每䝉允納所以令下小得蘇息各安其業若不耳此一郡久以蹈東海矣今事之大者未布漕運是也吾意望朝廷可下定期委之所司勿復催下但當嵗終考其殿最長吏尤殿命檻車送詣天臺三縣不舉二千石必免或可左降令在疆塞極難之地又自吾到此從事常有四五兼以臺司及都水御史行臺文符如雨倒錯違背不復可知吾又瞑目循常推前取重者及綱紀輕者在五曹主者涖事未嘗得十日吏民趨走功費萬計卿方任其重可徐尋所言江左平日揚州一良刺史便足統之况以羣才而更不理正由為法不一牽制者衆思簡而易從便足以保守成業倉督監耗盗官米動以萬計吾謂誅剪一人其後便斷而時意不同近檢校諸縣無不皆爾餘姚近十萬斛重歛以資姦吏令國用空乏良可歎也自軍興以來征役及充運死亡叛㪚不反者衆虚耗至此而補代循常所在凋困莫知所出上命所差上道多叛則吏及叛者席巻同去又有常制輒令其家及同伍課捕課捕不禽家及同伍尋復亡叛百姓流亡户口日減其源在此又有百工醫寺死亡絶滅家户空盡差代無所上命不絶事起或十年十五年彈舉獲罪無懈息而無益實事何以堪之謂自今諸死罪原輕者及五歲刑可以充此其减死者可長充兵役五歲者可充襍工醫寺皆令移其家以實都邑都邑既實是政之本又可絶其亡叛不移其家逃亡之患復如初耳今除罪而充襍役盡移其家小人愚迷或以為重於殺戮可以絶姦刑名雖輕懲肅實重豈非適時之宜邪與謝安書知君嘗得小笙笙是名器徃聞者若令諸君聞之皆當可不言而云見今笙者皆不以為佳恐是不能好也又復與君此章草所得極不為少而筆至惡殊不稱意與謝安書蜀中山水如峨眉山夏含霜雹碑板之所聞崑崙之伯仲也楊云逸少慕蜀中山水之竒見於與周益州及謝東山書不一而足然竟不遂其雅志山水於高人亦有縁及限耶志蜀中舊有石刻今亡見峨眉山故志輿地山水作山川峨眉山作岷山與桓温箋萬再遷豫州刺史領淮南太守監司豫冀并四州軍事羲之與温箋又與萬書温不從萬果敗慙世説萬壽春敗後還書與右軍云負宿顧右軍答書曰此禹湯之戒謝萬才流經通處廊廟叅諷議故是後來一器而今屈其邁往之氣以俯順荒餘近是違才易務矣一器通鑑作之秀誡謝萬書萬為豫州都督羲之遺書誡之萬不能用既受任北伐矜豪慠物兵潰被廢以君邁往不屑之韻而俯同羣辟誠難為意也然所謂通識正自當隨事行藏乃為遠耳願君每與士之下者同則盡善矣食不二味居不重席此復何有而古人以為美談濟否所由實在積小以致高大君其存之羣辟通鑑作羣碎每與士卒之下者同甘苦則盡善矣與吏部郎謝萬書萬字萬石安之弟羲之與王述齊名而志尚不同兩不相能述為㑹稽以母䘮居郡境羲之代為郡累年止一弔竟不顧述及述為揚州刺史檢校㑹稽求其得失主者疲於課對羲之耻慨遂稱疾去郡於父母墓前自誓不復仕朝廷以其誓苦亦不復徵之與東土人士窮諸名山汎滄海優游無事弋釣為娛與萬書古之辭世者或被髪佯狂或汚身穢跡可謂艱矣今僕坐而獲免遂其宿心其為慶幸豈非天賜違天不祥頃東游還修植桑果今盛敷榮率諸子抱弱孫游觀其間有一味之甘割而分之以娛目前雖植德無殊邈猶欲敎養子孫以敦厚退讓戒以輕薄庶令舉策數馬彷彿萬石之風君謂此何如比當與安石東游山海并行田視地利頤養閑曠衣食之餘欲與親知時共歡讌雖不能興言高詠銜杯引滿語田里所行故以為撫掌之資其為得意可勝言耶常依陸賈班嗣楊王孫之處世甚欲希風數子老夫志願盡於此矣閒曠晉書作閒暇此矣作此也法書要録載云老夫志願盡於此也君察此當有二言不真所謂賢者志於大不肖志其小無緣見君故悉心而言以當一面云何如下要録有重熈去視作盡曠作暇直容齋隨筆逸少葢温太真蔡謨謝安石一等人也以抗懷物外不為人役故功名成就無一可言其操履識見議論卓當世亦少其比而為書名所葢後世但以翰墨稱藝之為累大哉與人書羲之毎自稱我書比鍾繇當抗行比張芝草猶當鴈行也曾與人書張芝臨池學書池水盡黒使人耽之若是未必後之也法書要録載王右軍自論書吾書比之鍾張當抗行或謂過之張草猶當鴈行張精熟過人臨池學書池水盡墨若吾躭之若此未必謝之也楊云由此觀之右軍之聖於書亦由積習苦學而能今有妄男子師心狂塗信手繆繞以誑愚俗而張虚名使右軍家奴有靈必見咲於地下矣豈復有書乎又君學書有意今相與草書一巻張懷瓘書斷云右軍草隸八分飛白章行備精諸體自成一家千變萬化得之神功中唐張彦遠法書要録右軍書記至四百六十五帖其如蘭亭之屬多非書記淳化帖所載亦僅什一葢諸蹟宋初巳㪚逸矣今與閣帖各以類次于後章草帖皇象章草㫖信送之勿勿當付良信楊云㫖信送之答其人來㫖欲信送之也勿勿當付良信言此際勿遽不暇後當付良使也信即使也今法帖作勿三非宋太宗淳化中命中書王著集古法書為閣帖右軍父子五巻此前有法書要録其後有建中靖國淳熈績帖清華閣寳晉齋書史東觀餘論里秀萬玉之屬今各類從淳化復注次第以便臨橅訛脱仍舊與所知書王獻之好書觸遇造𤣥嘗日戲北舘取掃帚沾泥汁中以書壁作方丈一字晻曖斐亹極有好勢羲之見而歎其美問誰作答曰七郎羲之於是作書與所知子敬飛白大有意圖書㑹粹載云子敬飛白大有直漢楊云父稱子字亦晉人然鼎按後曹大家女誡述其子曹成之字曰子糓張母呼其子張邵之字曰元伯豈有望耶則漢時母固有稱子字者而鼂錯父呼子為公飛白帖省飛白乃致佳造次尋之乃欲窮本無論小進也稱此將青於藍又致此四紙飛白以為何似能學不又飛白不能乃佳意乃篤好此書至難或作復與卿楊用修注云右軍飛白妙絶今古今不可見矣臨池之士亦不知飛白何體也惟唐順陵碑文中有數字可覘古跡鼎按齊蕭子良古今書體云飛白書熹平年治鴻都門於時蔡邕方撰聖皇篇梁庾元威論書云張芝始作一筆飛白書辭舉帖此下並右軍論事諸帖不詳何與前得君書即有反想至也謂君前書是戲言耳亦或謂君當是舉不失親在安石耳省君今示頗知如何老僕之懷謂君體之方復致斯言愧誠心之不著若僕世懷不盡前者自當端坐觀時直方其道或將為世大明耶政有救其弊缺算之熟悉不因放恕之會得期於奉身而退良有已良有已此共得之心不待多言又餘年㡬何而逝者相尋此最所懷之重者頃勞藥石之資如有萬一方欲思盡頥養過此以往未之敢聞言盡於今也辭郡帖羲之嘗請為宣城朝廷不許因為㑹稽内史篤不喜見客篤不堪煩事此自死不可化而人理所重如此都郡江東所聚自非復弱幹所堪足下未知之耳給領與卿同殊為過差交人士因開門以勉待之無所復言恭命帖六日昨書信未得去時尋復逼或謂不可以不恭命遂不獲已處世之道盡矣何所復言殊遇帖羲之死罪復䝉殊遇求之本心公私愧歎無言以喻去月十一日發都違遠朝廷親舊乖離情懸兼至良不可言且轉遠非徒無諮覲之由音問轉復難通情慨深矣故㫖遣承問還願具告羲之死罪會稽帖會稽亦復與選論卿否吾誠勅勑於論事然於弟尚不惜小宜謂選官前意已佳可不復煩重卿更思必謂宜論者必有違矣此郡帖此郡之弊不謂頓至於此諸逋滯非復一條獨坐不知何以為治自非常才所濟吾無故舎逸而就勞歎恨無所復及耳夏人事請託亦所未免小却冀得小差頃日當何理米云蘇耆書畫記述此帖與内史王述書黄伯思云非也逸少與藍田方隙而為屬郡既檢察苛急主者疲於課對正救過不暇豈復尺牘間自彰其逋滯哉此帖官本傳摹甚失真如以就勞為能勞小却為小都皆轉失草法也作免一作見劉次莊作忽頃須上虞縣事帖賊以還不知遇官軍云何可深憂之欲依上虞初到别上今勑聽之縣事不同直不相連耳又近所示欲依上虞别上申一期尋案臺報不聽上當戮力於事不可但復解㪚君縣乃是今勝縣而復以為難耶又此似即言前事知足下以界内有此事便欲去縣豈有此理此縣弊久因足下始有次第耳便當息意今勅諸處事及縣者馳書於臺中論必釋然故遣㫖信示意諸暨帖諸暨始寧屬事自可得如教丹陽意簡而理通屬所無復逮錄之煩為佳想君不復須言謝丹陽亦云此語君餘姚帖足下所欲餘姚地輒勑驗所須輒告軍府帖此三頃田樂吳舊耳云卿軍府甚多田也宜須一用心吏可差次忠良湖孰帖吾湖孰縣須水田卿都可遣僦之墓不知處去年僦之者似是俞進可問之卿不出停此郡荒帖知郡荒吾前東周旋五千里所在皆爾可歎江東自有大頓勢不知何方以救其弊民事自欲歎復為意卿示聊及斷酒帖斷酒事終不見許然守之尚堅弟亦當思同此懷此郡斷酒一年所省百餘萬斛米乃過於租此救民命當可勝言近復重論相賞有理卿可復論又百姓之命闕倒懸吾夙夜憂此時既不能開倉庾賑之因斷酒以救民命有何不可而刑猶至此使人歎息吾復何在便可放之其罰讁之制宜嚴重可如治日每知卿同在民之主奉法帖省示知足下奉法轉到勝理極此此散蕩滌塵垢研遣滯累可謂盡矣無以復加漆園比之殊誕謾如下言也吾所奉設敎意政同但為形跡小異耳方欲盡心此事所以重增辭世之篤今雖形係於俗誠心終日常在於此足下試觀其終簿書帖恐有簿書之煩益屬所事可立制縣不給下貧而給饒有之家開令治國别許為盛田不平者嚴制如此事省而虛實可知其或非所樂而絶付給者今為不賦得里人遂安黄籍前年皆斯人非復一條可歎今便獨坐令白郗矦求官邈等想必可得君亦當得見書若萬一不樂想可共思得州數十家見經營不爾無坐此理也别當以具慰深共思不待煩言增運帖增運白米來者云必行此無所復云吾於時地甚疏卑致言誠不易然以在大臣之末要為居時任豈可坐視危難今便極言於相并與殷謝書皆封示卿勿廣宣之諸人皆謂盡當今事宜直恐不能行耳足下亦不可思致若言耶人之至誠故當有所回不爾坐待死亡耳然下有太老子三字又知數致苦言於相時弊亦何可不耳頗得應對不吾書未被答得桓䕶軍書云口米增運皆當停為善防民帖行當是防民流逸不以為利耶此於郡為由上守郡更尋詳若不由上命而斷中求絶者此為以利卿絶之是也縱民所之恐有如向者流㪚之患可無善詳具聞又一帖民作臣不以作不當上守郡作耶斷作郎深情帖省足下前後書未嘗不憂欲與事地相與有深情者何能不恨然古人云行其道忘其為身真卿今日之謂政自當豁其胷懷然得公平政直耳未能忘已便自不得行然此皆在足下懷願卿為復廣求於衆所悟故多山之高言次何能不從宜帖省告一一足下此舉由來吾所具卿所云皆是情言然權事慮之重則當廢情以從宜非書所悉見卿一一𤣥同帖論亦不能佳體懷省無所乏然卿供給人士及使役吏人論者亦謂大任意在世中政自不得不小俯仰同異卿復為意卿此懷亦當𤣥同不能勉人耳誠理帖知以智之所無柰何不復稍憂此誠理也然缺之懷何能巳巳乎未能得面書何所悉恒深得近期蹔還故因教初日月資生帖上方寛博多通資生有十備之覺是所委息乃有南眷情足謂何以宻示一勿宣此意為與卿共思之省以付火慕容帖諸人十二日書云慕容乃抄梁下得數缺目下疾疫非常乃以至京極有傷此憂之下者想君勤勤之渭南帖二十三日發至長安云渭南患無他然云苻健衆尚七萬茍及最近雖衆由匹夫耳即今尅此一叚不知歲終云何守之想勝才𢎞之自當有方耳方軌帖賊勢可見此云方軌萬萬如志但守之尚足令智者勞心此回書恒懷湯火處世不易豈惟公道羣凶帖卿事時了甚快羣凶日夕云云此使鄴下一日為戰塲極令人惆悵豈復有慶年之樂耶思卿一面無縁可歎可歎送袍帖可委行使耶遲還具問亦以與尚書諮懷今復遣諮吳興也志嶠帖良深路滯久矣况今季末無所多恠足荒何䘏於此足下志嶠外有由來及然以勢觀之卿入貴於不令耳書政當爾王羲之白此聲帖吾為卿任此聲者但此懷自不復得闕之於時又十四日諸問如昨云西有伐蜀意復是大事速送袍來給船帖君欲船輒勑給所須告之功曹帖省告攝功曹事一一屬以所求寛逋廢守命必欲肅之是以間意其志既立不得不必行發詔帖遂當發詔催吾帝王之命是何等事而辱在草澤憂歎之懷當復何言見足下一一軍使帖直遣軍使者可各差十五人耶合三十人足周事仲舒帖足下似有董仲舒開閉隂陽法可勑令料付不雨憂之深珍重缺謝二侯尚書帖見尚書一二日遣信以具必宜有行者情事恐不足下當為遠慮不可計目前又所欲論事今付荀葛帖羲之死罪荀葛各一國佐命宗臣觀其轍迹實竒士也然荀獲譏於憂卒意長恨恨謂其𢎞濟之心宜被大道諸葛經國達治吾無間然處事而無玷累獲全名於數代至於建鼎足之勢未能忘已所謂命世大才以天下為心者容得爾乎前試論意久欲呈多疾憒憒遂忘致今送願因暇日可埀試省大期賢達興廢之道不審謂粗得阡陌不文集帖比日尋省卿文集雖不能悉周徧尋翫以為佳者名固不虛序述高士所傳小有異同見卿一一問應止楊王孫前以共及意同可誠述叙之耶暇日無為想不忘之歌章帖歌章輒付卿或有寫書人者可寫一道與吾也戲詠帖得君戲詠承念至此年乃未見月儀書此似元㑹詩之屬當非書牋也與索靖月儀帖不同日往月來元正祚太簇告辰微陽始布罄無不宜和神養素十七帖張彦遠法書要録右軍書記云十七帖長一丈二尺即貞觀中内本一百七行九百四十二字是烜赫著名帖也十七帖者以巻首有十七日字故號之二王書後人亦有内一句稍異者標為帖名大約多取巻首三兩字及帖首三兩字也黄伯思云當時書巻首帖有十七日字故諸帖總謂之十七耳非帖數也本二十七條今官法帖有其十五㪚寘逸少書三巻中又續法帖有五而卭竹杖絲布衣漢講堂諸葛顒天䑕膏四果種虞安吉七條不載當是亡軼而世有完巻者傳模殊精非此比也此巻有帖云周益州送此卭竹杖云云案十七帖有云去夏足下致卭竹杖云云以前帖觀之即知此帖葢與周益州矣自昔相傳十七帖乃逸少與蜀太守者未必盡然然其中間蜀事為多是亦應皆與周益州書也但來禽一帖則或以為與桓温而已本朝僧邦者有寄李昌武翰林詩云來禽簡寄桓宣武不知何據案此帖有云今在田里惟以此為事足下致此子者大恵也逸少視桓公位殊遼絶與書不當爾耳然當時真長子猷輩猶嫚侮桓公彼亦能容逸少作書若交友葢無足恠温飛卿詩云畫圖驚畏獸書帖得來禽此帖埀寳非一世也都按周撫永和三年為益州刺史有恵政見成古今記掾黄則十七帖悉與周益州書矣内如來居龍保六日胡母從妹等竝不似與周書六日帖叔當西耶語猶非類楊用修四川總志載七十卭竹諸葛顒譙周山川諸竒講堂嚴君平鹽井八帖為與周益州亦以八帖皆論益州故實耳要録所載數止二十而無絲布衣卭竹杖七十胡母鹽井五條君服食久合積雪凝寒嚴君平併譙周為一帖今傳十七帖講堂以後竝闕然右軍法書此最先出故仍舊統題十七帖若淳化長沙二王有帖名者附往各下米云闗杞嘗謂余曰昔越州一寺修佛殿於梁栱内藏一函古模數十本所可記者王右軍十七帖虞世南枕臥等帖皆有儲氏圖書印黄亦云十七帖必多臨本永禪師及虞世南褚庭誨臨字皆不甚遠故世有數本皆不同此帖全是庭誨筆意十七日先書郗司馬未去即日得足下書為慰先書以具示復數字復一在以下又吾前柬粗足作佳觀吾為逸民之懷久矣足下何以方復及此似夣中語耶無縁言面為歎書何能悉方一作等二王帖云新安所刻至數字而止自吾前柬粗足作佳觀以下自為四行恐是二帖然他本皆合為一長沙帖又誤併來居一帖又瞻近無縁省告但有悲歎足下小大悉平安也云卿當來居此喜慰不可言想必果言告有期耳亦度卿當不居京此既僻又節氣佳是以欣卿來也此信㫖還具示問告一竝作苦僻案刻是避字要録作僻或刻傳久小誤耳二王帖云避與僻皆與辟通用非也避安可通辟又龍保等平安也謝之甚遲見卿舅可早至為簡隔也早疑是耳卿見下有之字無舅以下又今往絲布單衣財一端示致意又尺牘作與周益州足下今年政七十耶知體氣常佳此大慶也想復懃加頥養吾年埀耳順推之人理得爾以為厚幸但恐前路轉欲逼耳以爾要欲一游目汶領非復常言足下但當保䕶以俟此期勿謂虛言得果此縁一叚竒事也楊云汶古岷字見史記又省别具足下小大問為慰多分張念足下懸情武昌諸子亦多遠宦足下兼懷竝數問不老婦頃疾篤救命恒憂慮餘粗平安知足下情至又六日知足下行至吳念違離不可居叔當西耶遲知問淳化帖離不可居叔當西耶遲知問又計與足下别二十六年於今雖時書問不解濶懷省足下先後二書但增歎慨頃積雪凝寒五十年中所無想頃如常冀來夏秋間或復得足下問耳比者悠悠如何可言又吾服食久猶為劣劣大都比之年時為復可耳足下保愛為上臨書但有惆悵淳化帖愛為上臨書但有惆悵知足下行至吳念違又尺牘作答周益州去夏得足下致卭竹杖皆至此士人多有尊老者皆即分布令知足下遠恵之至卭山在蜀生竹高節可作杖見張騫傳又旦夕都邑動靜清和想足下使還具時州將桓公告慰情企足下數使命也謝無奕外任數書問無他仁祖日往言尋悲酸如何可言又諸從竝數有問粗平安唯修載在遠音問不數懸情司州疾篤不果西公私可恨足下所云皆盡事勢吾無間然諸問想足下别具不復乙乙乙乙一作具又胡母氏從妹平安故在永興居去此七十也吾在官諸理極差頃比復勿勿來示云與其婢問來信缺不得也又得足下旃罽胡桃藥二種知足下至戎鹽乃要也是服食所須知足下謂須服食方回近之未許吾此志知我者希此有成言無縁見卿以當一笑須一作頃又省足下别疏具彼土山川諸竒揚雄蜀都左太冲三都殊為不備悉彼故為多竒益令其游目意足也可得果當告卿求迎少人足耳至時示意遲此期真以日為歲想足下鎮彼土未有動理耳要欲及卿在彼登汶領峨眉而旋實不朽之盛事但言此心以馳於彼矣迎一作近又作進又知有漢時講堂在是漢和帝時立此知畫三皇五帝以來備有畫又精妙甚可觀也彼有能畫者不欲因摹取當可得不須具告又云譙周有孫高尚不出今為所在其人有以副此志不令人依依足下具示淳化無為所在至志十字又淳化及要録合譙周一帖嚴君平司馬相如揚子雲皆有後否大觀帖米云真又天䑕膏治耳聾有驗不有驗者乃是要藥又朱處仁今何在往得其書信遂不取答今因足下答其書可令必達黄云謂昔嘗得其書而信人竟不取報書世俗遂誤讀為往得其書信殊不知信者乃使人也又往在都見諸葛顒曾具問蜀中事云成都城池門屋樓觀皆是秦時司馬錯所修令人遠想慨然為爾不信一一示為欲廣異聞又彼鹽井火井皆有不足下目見不為欲廣異聞具示又二王帖足下所疏别為一帖青李來禽櫻桃日給藤子皆囊盛為佳函封多不生足下所疏云此果佳可為致子當種之此種彼胡桃皆生也吾篤喜種果今在田里惟以此為事故遠及足下致此子者大恵也黄伯思跋唐摹十七帖云予嘗見畢文將叔云家有唐初人所摹此帖來禽等四物外又有宻䝉華一種故先相文簡公答王黄門寄宻䝉華詩云多病眼昏書懶讀煩君遠寄宻䝉華愁無内史詞兼筆為覺真方到海涯今諸本竝無此一種法書要録亦不載又後所須此藥艸可示當致又薦虞安吉帖虞安吉者昔與共事常念之今為殿中將軍前過云與足下中表不以年老甚欲與足下為下寮意其資可得小郡足下可思致之耶所念故遠及又吾有七兒一女皆同生婚娶以畢惟一小者尚未婚耳過此一婚便得至彼今内外孫有十六人足慰目前足下情至委曲故具示已上竝十七帖桓公帖凢稱某帖者非與此人也帖言其人耳聊以其名類次如桓公仁祖之屬得都下九日書見桓公當陽去月九日書久當至洛但運遲可憂耳蔡公遂委篤又加㿃下日數十行深可憂慮得仁祖二十六日問疾更委篤深可憂當今人物眇然而艱疾若此令人短氣黄云九日帖云蔡公者蔡謨也仁祖者謝尚也晉穆帝永和十二年秋桓公破姚襄至洛故此云久當至洛是時將以謝尚鎮司州以病止故此云得仁祖二十六日問疾更委篤與陶穀所畜破羌帖事正同䟦云晉穆帝永和十二年秋桓温破姚襄于伊水遂至洛時將以謝尚鎮之屬病不行所云桓公摧破羗賊及仁祖小差正當時事也是時逸少去會稽内史已歲餘方遯跡山水間宜不復以世務經懷而此書乃歎宣武之威畧悲舊都之始平憂國嗟時志猶不息惜其一憤遠引使才猷約結弗光於世獨區區遺翰見寳後人覽之深為興歎又知虞帥云桓公以至洛即摧破羌賊賊重命想必禽之王畧始及舊都使人悲慨深此公威畧實著自當求之於古真可以戰使人歎息知仁祖小差此慰可言適范生書如其語無異故須後問為定今以書示君又得謝范六日書為慰桓公威勲當求之古令人歎息比當集姚襄也又虞義興適送此桓公摧㓂罔不如志今以當平定古人之美不足比蹤使人歎慨無以為喻又數得桓公問疾轉佳也每懸胡云征事未有日佳也以逼勢不知卒云何爾又鄙故勿勿飲日三㪷小行四升至可憂慮如桓公書㫖闕其不去恐不能平又桓公以江州還臺選每事勝也不可當在誰耳雲子帖桓雲字雲子温兄桓公不得叙情不可居處雲子諸人何似耿耿能數省否又云停雲子代萬頃桓公至今令荀臨淮權領其府懷祖都共事已行又羲之死罪前得雲子諸人書竝毁頓胡之惟分推難為心當有分西者否羲之死罪又十四日疏昨信未即取遣適得孔彭祖書得其弟都下七日書説雲子㬥霍亂亡人理乃當可耳惋惋桓公周生之痛豈可為心安西帖庾翼字稚恭安西將軍一昨得安西六日書無他無所知説故不復付送讓都督表亦復常言耳如兄子書道嵩自必果今復與書督之足下勑令至并與遠書也黄云翼鎮荆州以石虎衰暴婁表北伐康帝及朝士皆遣使譬止孫紳輩亦致書諫之則逸少所見之表殆亦論北伐事也翼之此舉朝論弗以為然故逸少以為常言及聞其遷襄陽乃云稚恭遂進鎮東西齊舉想尅定有期也則始雖同羣議而終以為當然翼有志無言徒能奮十倍之氣而蔑一統之功此志士所嗟慨者常知一作大督劉作共誤又一帖云無所知表亦復言耳又羲之死罪伏想朝廷清和稚恭遂進鎮東西齊舉想尅定有期也羲之死罪死罪又伏想清和士人皆佳適桓公十月末書為慰云所在荒甚可憂殷生數問北事勢復云何想安西以至能數面不或云頓厯陽爾耶無縁同為歎遲知問又運民不可得而要當得甚慮叛㪚頃為此足勞人意又安復後問不想必停君諸舎疾苦差也便疾綿篤了不欲食轉側須人憂懷深小妹亦故進退不孤得力煩不得眠食至少疾患經月兼燋勞不可言迎集中表親疏畧盡實望投老得盡田里骨肉之歡此一條不謝二疏而人理難知此不知小却得遂本心不交衰朽羸劣所憂營如此君視是頥養之功當有何理今都絶思此事也冀疾患差末秋初冬必思與諸君一佳集遣無益快共為樂欲以少日補頃者之慘戚也追尋前者意事豈可復得且當率目前及當此急要願諸君各保愛以俟此期未近見君有諸結力聊以當面各間意必欲省安西知今意無前却也想君必俱賊勢可之者必進許洛無可不果相遇于一世豈可度之尋常以此至終故當極盡志氣之所托也君此意𢎞足然决在必行少日一合作省戚一作蹙結下一無力字又得征西近書委悉為慰不得安西許有問不知何久長風書平安今知殷侯不久留之甚善甚善庾丹陽帖庾龢升平中代孔嚴為丹陽尹知庾丹陽差數深深致心致心並法書要録又適知十五日問清和為慰復得南後問不想二庾速王之始興奴長就令人邑邑想無所至耳還具示問庾一作康陳作庚速一作建王作至至作主又昨即得丹陽水上書與足下書同故不送昨諸書付還又想大小皆佳丹陽頃極佳也云自有書不附此信耳大小問多患懸心想二奴母子佳遲卿問也又丹陽旦送吾體氣極佳共在卿故處增思詠又知比得丹陽書甚慰乖離之歎當復可言尋答其書足下反事復行便為索然良不可言此亦分耳遲面具比一作以當一作尚反作友具作一一殷侯帖昨送諸書令示卿想見之恐殷侯必行義望雖宜爾然今此集信為未易卿若便西者良不可言又昨得殷侯答書今寫示君承無怒意既而意謂速思順從或有怨理大小宜盤桓或至嫌也想復深思此二帖似為言浩北伐事小又一帖意作詔速作連怨理大宜作怨望其不宜又孔嚴字彭祖殷浩臨揚州請為别駕得孔彭祖十七日具問為慰云襄經還蠡是反善之誠也於殷必得速還無復道路之憂比者尚懸悒得其去月書省之悲慨也殷浩為中軍將軍北伐時羗帥姚襄降浩使龍驤將軍劉啟守譙遷襄於梁襄遂反浩退保譙城器械軍儲皆為襄所掠又得豫章書為慰想以具問昨得都十七日書賊徑還蠡臺不攻譙是其反善之誠也想殷生必得過此者猶令人憂期諸處分猶未定羊叅軍旦夕至也遲一一即言前書事又殷廢責事便行也令人歎悵無也此言浩廢徙東陽又云殷生得快罔大事數謝生書但有藥耳云彦仁或缺宣城甚佳情事實宜今有云想深復征許也又與殷矦彼此格卿取又與殷矦物示當爾不可不卿定之勿疑又宰相安和殷生無恙時面兄當宣兄懷黄云宰相安和帖乃郗愔書宰相者簡文作相王時殷生者殷浩也然此或是書郗愔帖語耳而結字實近世偽作彭祖帖想清和士人皆佳彭祖諸人得足下慰旦夕也此諸賢平安每面粗有歎慨追恨近日不得本善散無已已度足下還期不乆耳比者數令知問袁彭祖帖袁彭祖何日過江想安穩耳失此諸賢至不可言足下分離如何可言孔建安帖太保思一散知足下歸乃至孔建安家熱乃爾徃還以十實非乏所堪若之不復更剋近道惟命是徃矣與郗家論婚書十一月四日右將軍㑹稽内史瑯邪王羲之敢致書司空高平郗公足下上祖舒散騎常侍撫軍將軍㑹稽内史鎮軍儀同三司夫人右將軍劉缺女誕晏之允之允之建威將軍錢塘令㑹稽都尉義興太守南中郎將江州刺史衛將軍夫人散騎常侍荀文若女誕希之仲之及尊叔廙平南將軍荆州刺史侍中驃騎將軍武陵康侯夫人雍州刺史濟隂郗説女誕頥之胡之耆之美之内兄胡之侍中丹陽尹西中郎將司州刺史妻常侍譙國夏侯女誕茂之承之羲之妻太宰高平郗鑒女誕𤣥之凝之肅之徽之操之獻之肅之授中書郎驃騎諮議太子左率不就徽之黄門郎獻之字子敬少有清譽善隸書咄咄逼人仰與公宿舊通家光隂相接承公賢女淑質直亮確懿純美敢欲使子敬為門閭之賓故具書祖宗職諱可否之言進退惟命羲之再拜張云此是郗家論婚書書迹似夫人漢魏六朝百三家集巻五十八
