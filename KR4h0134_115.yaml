body:
  text: 漢魏六朝百三家集卷一百十五盧思道集題詞盧子行自齊入周作聽蟬詩遷武陽太守作孤鴻賦淪滯官塗作勞生論憂愁所寄並為時稱然譚世變刺炎凉論乃獨出矣劉孝標傷任昉諸子流離著廣絶交論痛言五交三釁世路險巇過于太行孟門子行自慨蹇産詆斥物情榮瘁冰炭足使五侯喪魂六貴飲泣文人之筆鬼魅牛馬皆可畫也論北齊毁武成論後周毁天元暴揚淫昏發露諂惡君百桀紂臣百㢘虎陽秋直筆殆云無隱然生官其朝沒揚其醜搜床席以快見聞貶朽骨以恣河漢良史雖傳臣心未順異乎賈生過秦陸機辯吳矣子行詩兼工七言唐𤣥宗自蜀囘登勤政樓歌曰庭前琪樹已堪攀塞北征人去未還即盧薊北歌詞也唐風近隋盧薛諸體世尤宗尚含蓄意寡而音響無滯自以為昆吾莫邪爾目録賦孤鴻賦并序納涼賦檄為隋檄陳文表北齊為百官賀甘露表書為髙僕射與司馬消難書序從駕大慈照寺詩序論北齊興亡論後周興亡論勞生論誄盧記室誄祭文祭漅湖文文遼陽山寺願文樂府有所思日出東隅行擢歌行美女篇河曲遊升天行神仙篇城南隅讌蜀國弦採蓮曲從軍行詩駕出圜丘贈李若贈别司馬幼之南聘贈劉儀同西聘遊梁城從駕經大慈照寺春夕經行留侯墓上巳禊飲夜聞鄰妓賦得珠簾彭城王挽歌樂平長公主挽歌後園宴聽鳴蟬篇漢魏六朝百三家集卷一百十五目録欽定四庫全書漢魏六朝百三家集卷一百十五明張溥輯盧思道集賦孤鴻賦并序余志學之嵗自鄉里遊京師便見識知音歴受羣公之眷年登弱冠甫就朝列談者過誤遂竊虚名通人楊令君邢特進已下皆分庭致禮倒屣相接翦拂吹嘘長其光價而才本駑拙性實疎嬾勢利貨殖淡然不營雖籠絆朝市且三十載而獨徃之心未始去懷抱也攝生舛和有少氣疾分符坐嘯作守東原洪河之湄沃野彌望嚻務旣屏魚鳥為鄰有離羣之鴻為羅者所獲野人馴養貢之於余置諸池庭朝夕賞翫旣用銷憂兼以輕疾大易稱鴻漸于陸羽儀盛也揚子曰鴻飛㝠㝠鶱翥髙也淮南云東歸碣石違溽暑也平子賦曰南寓衡陽避祁寒也若其雅步清音逺心髙韻鵷鸞以降罕見其儔而鎩翮牆隂偶影獨立唼喋粃粺鷄鶩為伍不亦傷乎余五十之年忽焉已至永言身事慨然多緒乃為之賦聊以自慰云其詞曰惟此孤鴻擅竒羽蟲實禀清髙之氣逺生遼碣之東氄毛將落和鳴順風壯氷云厚矯翅排空出島嶼之緜邈犯霜露之溟濛驚絓魚之宻網畏落鴈之虚弓若其斗柄東指女夷司月乃遥集于寒門遂輕舉于𤣥闕至如天髙氣肅揺落在時旣嘯儔于淮浦亦弄吭於江湄摩赤霄以凌厲乗丹氣之威夷遡商飈之嫋嫋翫陽景之遲遲彭蠡方春洞庭初緑理翮整翰羣浮侣浴振雪羽而臨風掩霜毛而候旭饜江湖之菁藻飫原野之菽粟行離離而髙逝響噰噰而相續絜齊國之氷紈皓宻山之華玉若乃晨沐清露安趾徐步夕息芳洲延頸乗流違寒競逐浮沉水宿避暑言歸絶漢雲飛望𤣥鵠而為侣比朱鷺而相依倦天衢之溟漠降河渚之芳菲忽值羅人設網虞者懸機永辭寥廓蹈迹重圍始則窘束籠樊憂憚刀俎糜軀絶命恨失其所終乃馴狎園庭栖託池籞稻粱為惠恣其容與于是翕羽宛頸屏氣銷聲滅煙霞之髙想閟江海之幽情何時驤首奮翼上凌太清鶱翥鼓舞逺薄層城惡禽視而不貴小鳥顧而相輕安控地而無恥豈冲天之復榮若夫圖南之羽偉而去羨栖睫之蟲㣲而不賤各遂性于天壤弗企懷以交戰不聽咸池之樂不饗太牢之薦匹晨雞而共飲偶野鳬以同膳匪揚聲以顯聞寧校體而求見聊寓形乎沼沚且夷心于溏淀齊榮辱以晏如承君子之餘眄納涼賦祝融司方朱明届序氣乃初伏節惟徂暑積敲蒸於簾櫳流煩溽於園籞陽風淟其長扇火雲赫而四舉爾乃警六御按三條擊鼉鼓吹鳳簫雲車錯轂麟馬齊鑣入雲宮之􅑬嵼登仙觀之岧嶤引雄風于洞穴承清露于丹霄動颼飀于翠帳散霏㣲于綺寮檄為隋檄陳文告三江之表偽署君臣將帥州郡邑落士民等盖聞上𤣥垂象列宿拱辰極之中厚載成形百谷指滄溟之大是以三五以降哲王聖后逺覃聲教大燀威靈日月之所照臨俱荷亭育舟車之所通泊咸附象鞮我大隋積德累功開物成務光宅寰海覆幬蒸民虞夏受終顧有慙德湯武革命未云盡善滄波已東九譯請吏玉門之右萬里無塵諸華冠帶之俗肆勤南畆皮服引弓之渠頓顙北關内外禔福區宇懾然皇上垂拱巖廊司契而已惟夫太伯之後實號勾吳少康之裔是為於越江界湫湄如掌之陋塗泥所集瘴癘自興自昔皇王列壤班瑞春秋之義爵不過子在晉永嘉運北數極司馬氏衆無一旅播越江濱劉蕭已還多歴世祀魏氏奄一神州置之度外且西吞巴蜀北據淮淝善人君子可以為國陳霸先下愚小醜品極輿𨽻屬揚部淪胥之日幸梁人殱敗之秋騁其姦囘妄自尊大等蠻觸之戰爭似鰌魽之跳躍曇頊昏頑賊忍不義不慈剿厥猶子竊其偽位蜂蠆非毒谿壑易滿事甚楚圍之纓理切吳光之劒國小地狹虐用其民坑戮侔于屠伯芟夷過於薙氏加以沈迷麴蘖酣酗終朝澆灌取盡夜以繼晝貨賄公行政刑不立疎棄良士狎近小人守宰蠶漁子弟荒暴頭會箕斂杼軸其空灾異相仍稻蟹不熟江左黎獻戴目而視齊之季世實多凉德江淮之間蹔為頊有便謂三春易求百年可致違卜愎諫黷武窮兵吳明徹程文秀之徒並早經行陣粗有風力彼朝上下繫以存立呂梁之役貫盈惡稔曾未交綏雲巻霧散組練塞垣艅艎噎水顧眄之頃隻輪不歸及周宣馭厯將一淮海荆舒之民奢侈為怨聊命偏裨拯其茶毒長江已北若火焚毛是則揚越之地為陳孤立卒弊壤蹙邦羸政塞乗奔無轡譬兹非險坐薪待燃方此為泰司馬消難切荷特私任居連率猜狂使酒竊地外犇曇頊背恩棄德是信是使引盗納姦無媿無畏天奪其魄慿犯不悛縁邊諸城犬羊荐食聖主以軒開萬國屬盡九州一隅不庭宜置天討爰詔六軍分閫受鉞西徴秦隴之鋭北引燕代之英五校雄兒超乗俱起三河猛士援距爭奮虎夫萬隊豹騎千羣並骨勇肉飛風驤霧合憬彼江黄之衆遏矣彭濮之民巨艦髙艫順流東指江都壽春之域扼喉撫背之兵飛龍赤馬絶水南越漢后昆明未足方其訓旅魏王𤣥武不能比其𨽻師陳以江湖之泥短衣祝髪輕舠利舸便習者多上迷天意下慿地險所以舉尾支山怒臂當轅一作轍今荆門鋭卒致命前驅淮南義師賈勇競入揚舲振􅀈兎走鳬飛然則彼之所長我亦兼有我利涉大川匪旦伊夕江郢運艚吳㑹裔旅東西遏絶通致無由偽朝軍旅或陳誠欵宻使相尋蕞爾危邦表裏攜貳兼弱攻昧今也其時扛鼎䝉輪之卒事均驅兕三禮四義之將俛視韓白正正之旗百道俱進並雲移雷動大㑹金陵牙旂暗山原金鼓沸天地呼吸則江漢迴流叱咤則衡疑可拔運岱山而壓春卵引渤海而濯秋螢當不足等其銷滅譬其虀粉猥以不武謬總戎律上禀廟堂之謀下資素飽之氣使張悌之魂先遊北斗吕嘉之級逺至新鄉漂櫓溺驂孱然已至亂麻積莽可為寒心偽主若天誘其誠去危轉禍審青盖之欲歸知蔣山之應渡銜璧輿襯拜手轅門則上比吳蜀之君不失公侯之寵陳之百辟卿士編户黔庶有能深識逆順因事立功亦當服冕乗軒紆青佩紫疏爵酬庸待以不次王者之師全救為本萬姓毫釐靡所侵軼勉求多福無待噬臍檄之所到咸共申省文苑英華作北齊檄陳文按檄中有齊之季世實多凉德及周宣馭厯等語明是隋檄今正之表北齊為百官賀甘露表竊以河榮洛變授祉於勲華𤣥玉素鱗降靈于湯武其間微禽弱草改狀移形夜宿朝雲星光動色皆以照臨下土發揮帝載千祀一致隔代同符伏惟陛下上總天維傍握河紀持欽翼之小心纂昇平之大業萬靈翹首應三台以西巡兩儀貞觀乗六氣而東指雲卿旣出還聞百辟之歌河清可俟實得萬人之歎而上𤣥乃顧神物荐委飛甘灑潤玉散珠連昔魏明仙掌竟無靈液漢武金盤空望雲表豈若神漿可挹流珠九月之前天酒自零凝照三階之下斯實曠代祥符前王罕遇休矣美矣皇哉唐哉臣等並邀昌運俱沐𤣥造驟聞祕祉亟覩㝠貺振鱗撫翼空馳魚鳥之心瘞玉編金方待云亭之后書為髙僕射與司馬消難書消難妻齊神武女為北豫州刺史文宣末歸周歴交州總管隋文帝輔政消難舉兵應尉遲迥復歸于陳為車騎將軍及陳平免死卒于家按此書乃隋髙熲伐陳時也熲為尚書左僕射名白一成雲雨再歴炎涼引領南望勞眷無已嵗暮寒重想比勝宜羈泊水鄉無乃勤悴公居齊室家實元勲後入周朝爵窮上等富貴榮名時無與二西征南逝盖不獲已且聖主敬于恩舊情期欵到背冰之始曲憲申恩公之妻孥一無所問行李往来想宜知悉陳氏背盟負約事非一緒所以爰詔大將軍龔行天罰靈旗電掃師次江陽延首金陵但增翹注昔龎萌重獲漢主宥其深辜魏洽再歸曹王棄其大𤯝惜其才也今古如一醉飽之過願不自疑兼齊氏王姬宛然在室諸子陸陸如何易忘門生故吏遍于京輔舊友宻親擊鐘鼎食萬里飄然音塵不嗣眷言及此伊何可懷今元戎啓行易為去就承眷有素敢布腹心若使雙舠浮渡三叛獲俘函首長安悔無及也序從駕大慈照寺詩序皇帝以上叡統天大明御極彈壓九代驅駕百王至德上通深仁下漏威稜西被聲教東漸布政合宫孝儀太室張樂洞野㑹計苗山天不愛寶神靡遺貺鱗羽郊異山澤薦社華裔率從幽顯咸秩八政惟序六府告平猶且棲志窅㝠凝神空寂俯陋區域顧遺形有救精民于苦器拯欲界于危城身心澄淨樂之境生靈仰調御之力中宫厚德載物正位儷天道冠邵陵業踰㜪姒慧雲朝起四生佇其寸合慈燈夜爇九服照其餘光乃睠參墟實唯唐舊山川周衛襟帯巖坰東郊勝地爰構寳坊儼闕城瞬如踊出旣而景躔西陸氣中南宫商聲振野白露威寒聖主御辯巡方順時育物六龍進駕七聖齊軫翠旗揚斾雕玉徐輪間百年而拜輦朝萬靈以按節熊渠佽飛之輩入參中壘虎殿金門之侣迴望屬車將届下都遘兹淨域兼悦鷲山之觀共喜龍宮之遊接足栖心俱展誠敬課虚引寂仍發詠歌雖事比擊轅義同叩角亦以雍容盛烈述讃休美豈若皋朔文辭甫陳男祝王谷蟲篆纔譬女工作者二十六人其詞云爾論北齊興亡論或問主人曰徃者魏人失御六合雲擾河朔關右剪為二國永熙西遁天平北巡兩朝先主分陜而霸龍戰虎爭多歴嵗祀旣而水運值竭天禄永終齊室比迹于唐虞周人踵武于漢魏齊有五帝周易四王並纔踰二紀相繼而滅若其元首膺期股肱命世立極補天之業銘常鏤鼎之功至於暴君南面孽臣作輔民怨神怒國殄祀絶易世之由雖傳之耆舊載於史䇿通人雅㫖其詳可得聞乎主人應之曰吾少仕齊朝晩歸周室因而學業歴兹永久雅好博古雖欲擬議近世治亂粤可畧陳在魏正光牝雞司旦爾朱榮乗釁内奰滔天泯夏餘燼跋扈挻禍王城海内生民若崩厥角齊髙祖神武皇帝天縱英明之畧神挺雄武之才龍攄虎變投袂而起四明昆弟大㑹韓陵類蚩尤風雨之兵若新都犀象之陳彼曲我直天實賛之日未移晷大殱醜族然後拔立宗枝入纂皇統羣后成務天下晏如但芒刺成災震逼為梗居鄭流彘去而不入遷鼎舊鄴國命惟新朝章國憲燦然畢舉渭南失律似烏林之喪師洛北先鳴同官渡之凱入雖天命有歸而盡于北面方之魏武具體而㣲文襄嗣業始踰弱冠瓌傑之氣足稱負荷賓禮時秀驅駕羣雄内外肅清朝無粃政侯景背恩棄義狼顧汝潁蕭衍失信幸災蟻聚彭汴于是謀臣運策猛士推鋒渦湯之役兇渠疋馬南逝寒山之戰吳卒隻輪不反王政入掩長安淹歴嵗時神旗蹔臨如風掃籜三秦勍敵閉關自守五湖之長革音請命魏孝靜以天厯有在鼎祚將遺大禮備物率由舊典允恭克讓推而弗居禍生非慮七首竊發爾其夷㓙剪暴剛斷英峙天崩地坼堂搆闕如嗣子幼冲未堪多難文宣雖云外弟少乏令名人望所歸便見推奉于時政有彞倫朝多俊乂爪牙皆韓白之伍心腹盡良平之儔外靜方隅内康庶績主之不才四海弗之覺也洎乎受終文祖燎天改物兵强地廣國富刑清發號施令必師古始信賞必罰如有四時年穀屢登災害不作敵人竄迹郊境無虞天保受命迄于五祀黄初泰始不能逺尚爰及中年誕縱昏德以萬乗之貴為長夜之飲散髮視朝肉袒聽政手行刳剔躬運矛鋋寵狎佞䛕親愛凡鄙出入市門里遊走衢路太保髙降之佐命元功廟廊上宰僕射髙德政龍潛賓友帷幄重臣衛尉卿杜弼碩學偉才拔萃出類光祿大夫元景風流儒雅師範縉紳或赤族見誅或丹頸為戮並直言竊歎斃于讒口自餘名士良臣非罪遭命淫刑以逞不可殫言劉曹以還逮于僭偽受命稱帝未有若斯之慘者也賴有尚書令𢎞農楊遵彦魏太傅津之子也含章秀出希世偉人風鑑俊朗體局貞固學無不縱才靡不通裴樂謝其清言應劉媿其藻麗温良恭儉讓恕惠和髙行異才近古無二有齊建國便預經綸軍國政事一人而已詰旦坐朝諮請填凑千端萬緒令議如流剖斷部領選舉人物滿室盈庭永無凝滯虚襟泛愛禮賢好士聞人之善若已有之智調有餘尤善當世譖言屢入時寄無改每乗輿四巡恒守京邑凡有善政皆遵彦之為是以主昏於上國治于下朝野貴賤至于今稱之俄而文宣不豫弊于趨疑孽儲君繼體纔歴數旬近習預權小人並進楊公慮有危機引身移疾幼主若喪股肱固相敦勉乾明之始難起戚藩變成倐忽殞於殿省詩云人之云亡邦國殄悴君子是以知齊祚之不昌也孝昭地乃宻親位居元輔有姬公之戚無復子之心亦由主弱時艱慮深家國當陽正位事出權道身長八尺腰帶十圍沈深謹厚實有君人之望時甲卒强盛財力殷阜乃睠西顧恒有吞噬之心兼以天保之後懲其淫縱不邇聲色不事晏遊孝於太后篤于昆季慎惜名器愛養黎元後庭嬪嬙皆是藩邸之舊數不盈十竟無私寵特解吏事尤好禮容但政苛碎暗于聽受降年不永期嵗而崩大漸維幾黜其闕子武成母弟之親入主宗祏而少禀凶德不孝不仁龍攅在殯淚不承臉太后之喪亦不哀哭纔及公除便衣縫裘縱侈荒淫不知紀極甘酒嗜音夜以繼晝有和士開者素出和氏之庶孽其面目亦似胡人輕薄凡猥為衣冠所棄武成在田之日引為參將開好彈胡琵琶亦解歌舞一面之後便大相愛悦恒在臥内同食共寢淫穢之事無所不為天保之世文宣知其如此頓鞭二百徒配長城後遇赦得還武成為右丞相久别得還恩盻愈厚信宿之間賞賜巨萬及踐大位親顧彌隆爰自黄門漸至端右盡景娛侍畧不休停就令蹔出便追騎相尋士開作威作福畧無顧憚恩寵勢望燻灼朝野恣性貪淫人倫少例心如谿壑行均大豕甲第當衢侔擬公室富商大賈朝夕盈門朝士無賴者亦競相諂媚或送婢妾或進子女筐篚苞苴烟聚波屬士開葬母傾朝追送諂䛕尤甚者至悲不自勝澆薄邪佞愛踰弟兄名賢素士畧不交言其所薦延奏無不遂榮枯進退定於俄頃於時下陵上替奔競成習士無貴賤風節頓盡趙彦深阿䛕順㫖俛首懐祿元文遥器能先見不敢措言此外羣官靡衣媮食齊室大壞其源始于此河清之末長彗為災太史奏言須用攘救武成便自稱太上傳位後主胡長粲以從舅之親馮子琮以姨夫之戚俱受寄託並當樞要或性識庸近或意懐險薄皆不學無術智能淺短及天統末年武成即世和士開一相處内自擬伊周太尉録尚書事趙郡王叡明德茂親聰爽俊悟藩王之内時望隆重以士開凶醜宜加屏黜入踐青蒲讜言規諫而少主聰察不類成昭母后才明異于馬鄧士開禮於疎行長粲為其謀主遂使宻戚賢王絞縊以戮雖遐邇胥怨愚智同憤而依托城社末如之何數載之間肆其穢行與馮子琮夫婦鬻獄賣官三家府藏賄貨山積凶愚子弟並處髙資更相貨易擇而後授司徒瑯琊王儼年甫十四兼領憲司憤其所為切齒忿咤執送南臺異其身首子琮以搆扇兩端一時依法二凶俱勦朝野晏清京師市里儛蹈成羣梁董之慶不足斯比瑯琊心實去惡跡乃陵上不容于時俄而賜盡自兹已後政道彌昏髙阿那以牧圉之勤重其佞媚韓長鸞以韝紲之能悦其趨走又有女奴陸氏出自掖庭凶智狡算舉世無匹以保母之恩特見尊寵六宫謂之世師人主以為内相舞弄王法淹塞天聽慶賞威刑出于婢口頑嚚弟姪布於列位帝戚皇支不能及也陸子駱提婆者出于皂𨽻本是鞾工愚暗庸短僅辯菽麥與韓髙之徒共持國柄宣淫肆暴甚于和氏窮極富貴轉日迴天愚薄之倫折枝䑛痔輕者進貨賂甚者緒婚婣朝廷混然無復亷恥清貞守道更被嗤恠漢世張趙不能喻其萬一晉朝賈郭未足比其錙銖斛律明月屬鏤之錫寃動天地崔季舒龍逢之戮痛切幽明加以内參年少閹宦之屬親狎寵私盈滿宫室干預政事剽掠生民黔首呼嗟以日為嵗其反道違常速亡趨滅事非一緒不可勝陳後主自生宫闈長于尼婦不接端士不見正人朝夕諮諏罕聞調䕶之客便煩左右莫匪刀鋸之餘飛鷹走狗蕩其心慮麗色淫聲亂其耳目論功德者云羲軒無以尚述欽明者稱堯舜不能踰才智之士棄而不任假有名級備員而已憲章綱紀蕩然無餘魚爛土崩以俟勍宼周武大㨗平陽乗虚深入將有降心士無鬬志前世耿賈之雄俛眉頓顙先朝貔虎之鋭歛氣重足舉晉陽如拾芥攻鄴宫猶振槁萬里百城交臂屈膝南極江淮北盡砂塞西界函谷東至滄溟府帑粟帛之饒兵革士民之衆齊之所畜盡為周有不亦哀哉後周興亡論周太祖文皇帝幼而機警智數過人屬魏末多故召募關隴值二將相屠三軍未一見推為主遂握兵符俄而魏武西巡奉迎車駕挾天子以㑹諸侯萬世所一時也撫養荒餘鳩聚兵甲同心之旅不滿萬人齊神武以大兵數十萬將清灞滻雷動雲移萃於渭曲太祖以數千弊卒振旅而還遂基王業竇泰以勁兵深入一戰喪元髙敖曹以鋭氣先登臨陣受首兵革嵗動敗鮮勝多髙氏雖怙其衆力莫敢先至邙山之舉我師敗績收合亡散退守有餘及蕭氏將亡邊服震擾荆郢内附庸蜀來王器械完整貨財充實帶甲百萬驍將如林晏駕之辰國與齊人相埒矣閔帝以嫡嗣承基應天納禪弱齡厭世未及稱皇以庶長見立纂我鴻緒從容文雅亦守文之良主焉二帝景命不融髙祖始登大位于時大冢宰晉公宇文䕶太祖之猶子也負圖作宰親受顧命國柄朝權頓去王室髙祖髙拱深視彌歴嵗年談議儒𤣥無所關預祭則寡人晉公之不忌也但自下裁物其主不堪累世權强一朝折首其於黨與咸見夷戮惡禽死物掃地無餘爾乃棄奢淫去浮偽施一德布公道屏重肉之饍躬大布之衣始自六宫被于九服令行禁止内外肅然以釋氏立教本貴清淨近世以來靡費財力下詔削除之亦前王所未行也值齊季失德取亂侮亡親御戎軒再舉而滅軍令肅然秋毫莫犯數旬而定不戮一人未及下車革其弊政山東士女欣戴如歸但天性嚴忍果于殺戮血流盈前無廢飲噉行幸四方尤好田獵從禽于外非夜不還飛走之類值無免者識者以此少之雖有武功未遑文德彞章禮教盖闕如也練甲治兵將掃沙漠逺圖不遂暴疾升遐宣帝初在東京已多罪失髙祖每加嚴訓不能修政嗣位之初飾情自勵踰年已後變態轉興躭酒好色常居内寢角抵逸遊不捨晝夜分命使人徴求子女積之後宮以千萬數此石虎之淫風也寵姬四人並立為皇后車服節文與内主無别此劉聰之亂政也少在儲宫頗覽經籍臨朝對衆亦有精神但禀猜狂特好詭異衣冠形色皆與舊制不同文武侍臣屏棄遐裔内外門閤皆别令宦者看守出入去求並録其數殿省以目相視然朋淫于家無所簡擇乃至長樂亦有醜聲大象之末忽焉慘虐鞭撻朝士動至數百背及胸腹一時下手楚毒之理不可忍見祖宗廟號諱不得稱變易官名囘宫姓族車乗輪輻並有貴賤之殊婦女粧㸃亦為上下之異後庭嬪妾房有數人自旦至夕恒令危坐相對有不如法便即捶楚内外命婦朔望朝謁皆令為丈夫拜伏以示肅恭自號為天不復稱朕此外小事異同不可勝紀狂惑妖僻開闢未之有也客曰齊武成荒悸庸暗怨結人神厥嗣不昌理則然矣周祖聰明神武冠世雄竒因愚子以至顛覆豈人事乎抑天道也䝉有惑焉請聞其説主人曰寒暑晦明二儀之不同也賢愚治亂五勝之相形也是以酒池肉林乃周王之締構坑儒滅學亦漢后之驅除齊自天保受終迄于武平喪國孝昭之外竟無令主河清已後國基漸墜昏主慢遊於上黎民怨讟于下逮于末葉君弱臣愚外崩内潰周人取之猶坂上走丸也周武任數矩疑情果敢雄斷擁三秦之鋭屬攻昧之秋削平天下易同俯拾未及三祀宫車晩駕嗣子披猖肆其凶慝真人革命宗廟為墟此盖天所以啓大隋非不幸也勞生論莊子曰大塊勞我以生誠哉斯言也余年五十羸老云至追惟疇昔勤矣厥生乃著兹論因言時云爾罷郡屏居有客造余者少選之頃旴衡而言曰生者天地之大德人者有生之最靈所以作配兩儀稱貴羣品妍蚩愚智之辯天懸壤隔行已立身之異入海登山今吾子生于右地九葉卿族天授俊才萬夫所仰學綜流畧慕孔門之游夏辭窮麗則擬漢日之卿雲行藏有節進退以禮不諂不驕無愠無懌偃仰貴賤之間從容語黙之際何其裕也下走所欣羨焉余莞爾而笑曰未之思也何所言之過也子其清耳請為左右陳之夫人之生也皆未若無生在余之生勞亦勤止紈綺之年伏膺教義規行矩步從善而登巾冠之後濯纓受署繮鏁仁義籠絆朝市失翹陸之本性喪江湖之遠情淪此風波溺于倒躓憂勞總至事非一緒何則地胄髙華旣致嫌于管庫才識美茂亦受嫉于愚庸篤學强記聾瞽于焉側目清言河瀉木訥所以疾心豈徒蠱惜春漿鴟恡腐鼠相江都而永歎傅長沙而不歸固亦魯值臧倉楚逢靳尚趙壹為之哀歌張升于是慟哭有齊之季不遇休明申脰就鞅屏迹無地段珪張讓金貝是視賈謐郭淮腥臊可饜淫刑以逞禍近池魚耳聽惡来之讒足踐龍逢之血周氏末葉仍值僻王斂笏升階汗流浹背莒客之踵躋焦原匹兹非險齊人之手執馬尾方此未危若乃羊腸句注之道據鞍振筴武落雞田之外櫛風沐雨三旬九食不敢稱憊此之為役盖其小小者耳今泰運啓開四門以穆冕旒司契于上䕫龍佐命于下岐伯善巻恥狥幽憂卞隨務光悔從木石余年在秋方已迫知命情禮宜退不獲晏安一葉從風無損鄧林之攅植雙鳬退飛不虧渤澥之游泳耕田鑿井晩息晨興候南山之朝雲擥北堂之明月汜勝九穀之書觀其節制崔寔四民之令奉以周旋晨荷簔笠白屋黄冠之伍夕談穀稼霑體塗足之倫濁酒盈罇髙歌滿席恍兮惚兮天地一指此野人之樂也子或以是羡余乎客曰吾子之事旣聞之矣佗人有心又請論其梗槩余答曰雲飛泥沈卑髙異等圓行方止動息殊致是以摩霄運海輕罻羅于藪澤五衢四照忽斤斧于山林余晩值昌辰遂其弱尚觀人事之隕獲覩時路之邅危𤣥冬修夜靜言長想可以累歎悼心流涕酸鼻人之百年脆促已甚奔駒流電不可為辭顧慕周章數紀之内窮通榮辱事無足道而有識者鮮無識者多褊隘凡近輕險躁薄居家則人面獸心不孝不義出門則諂䛕讒佞無愧無恥退身知足忘伯陽之炯戒陳力就列棄周任之格言悠悠遠古斯患已積迄于近代此蠧尤深范卿撝讓之風搢紳不嗣夏書昬墊之罪執政所安朝露未晞小車盈董石之巷夕陽且落皁盖填閻竇之里皆如脂如韋俯僂匍匐噉惡求媚䑛痔自親美言諂笑助其愉樂詐泣佞哀恤其喪紀近通㫖酒逺貢文蛇艷姬美女委如脱屣金銑玉華棄同遺跡及鄧通失路一簪之賄無餘梁冀就誅五侯之貴將起向之求官買職晚謁晨趨刺促望塵之舊遊伊優上堂之夜客始則亡魂褫魄若牛兄之遇獸心戰色沮似葉公之見龍俄而抵掌揚眉髙視濶步結侣棄廉公之第攜手哭聖卿之門華轂生塵来如激矢雀羅蹔設去等絶絃飴蜜非甘山川未阻千變萬化鬼出神入為此者皆衣冠士族或有藝能不恥不仁不畏不義靡媿友朋莫慙妻子外呈厚貌内藴百心繇是則紆青佩紫牧州典郡冠幘刼人厚自封殖妍歌妙舞列鼎撞鐘耳倦絲桐口飫珍㫖雖素論以為非而時宰之不責末俗蚩蚩如此之敝余則違時薄宦屏息窮居甚恥驅馳深畏乾沒心若死灰不營勢利家無擔石不費囊錢偶影聨官將數十載駑拙致笑輕生所以告勞也真人御宇斵雕為朴人知榮辱時反邕熙風力上宰内敷文教方邵重臣外揚武節被之大道洽以淳風舉必以才爵無濫授禀斯首䑕不預衣簪阿黨比周掃地俱盡輕薄之儔滅影竄迹礫石變成瑜瑾莨莠化為芝蘭曩之扇俗攪時駮耳穢目今悉不聞不見莫余敢侮易曰聖人作而萬物覩斯之謂乎誄盧記室誄齊正統二年秋七月司徒記室參軍事永安鄉男范陽盧詢祖卒先民有言惟德可久抑又聞之惟名為壽爾之無祿沒而不朽乃援弱翰告哀良友遂作誄曰皇虚眇邈師緒蟬聨大儒漢世名公魏年司徒藹藹撫翼冲天尚書亹亹亦稱象賢若人擢秀絶後光前發榮隨浦韞耀春田爰在弱齡孤根迥立内無怙恃外寡朋執行有餘力藝無不習善價斯待香名允集下學上達鑚幽洞㣲九流百氏異軫同歸文成鐘律韻響珠璣麗詞泉涌壯思雲飛雄州擢第言割其楚我實褎然觀國而舉自兹不調多歴年所游泳儒𤣥從容嘿語納于大麓崇建府朝八紘所掩車乗翹翹我有明德乃應嘉招超自幕下来儀鳳條應徐並轍潘顧齊鑣聲華簪帶譽動朋僚逖矣江隂承風請朔莊生喻指季子觀樂立朝所寄俊才優學懸河自口靈珠在握乃參軍事仍贊中鉉大沖所縻德施攸踐同推麗則俱謝蟲篆何才之髙何位之鮮天下士也宜享多福豹變其文鴻漸於陸神之聽之于何不淑營魄遂往音儀在目嗚呼哀哉昔余與子分重契深譬諸投漆如彼斷金余慕大隱子惟陸沈等趨宫閣並綴衣簪春臺共踐秋水偕臨還馬齊轡出盖連隂良書濁酒永嘯長吟美言俱贊闕行同箴娛樂未幾嶮阻相尋忻旣無極憂亦難任云胡不吊亡我知音百年已矣萬事傷心嗚呼哀哉亭伯君山並嗟湮滅荀粲王壽同悲夭折蘭菊無墜鐘皷不絶之子云亡何愧前烈靈衣襲几奠酒盈杯故庭飛籜虚帳凝埃僕流離而涕泗驂顧慕以遲迴出南陽之舊道掩北邙之夜臺趙卿之銘已勒滕公之隴未開臨象設而不囘詎幽魂之可来嗚呼哀哉祭文祭漅湖文維開皇元年十二月朔甲子具位姓名遣某官以清酌庶羞之饋敬祭漅湖之靈曰泱漭澄湖南服之紀斜通海甸旁帶江汜深過百仞潤踰九里彭蠡莫儔具區非擬揚越不庭多歴年紀王師薄伐六軍戾止戒期指日馬首欲東常隂作沴零雨其濛水氣朝合天雲夜同申之若霧繼以嚴闕塗泥已甚軌躅不通有稽天罰用沮元戎唯夫百神受職水靈為大皇王御宇率土無外當使日月貞明天地交泰雨師止其淋瀝雲將巻其蔚薈東渡戈船南聳雕斾收尉佗之黄屋納孫皓之青盖然後革車旋軫戎卒凱歌楚俘霧集冀馬星羅無德不報有酒如河神之聽之斯言匪蹉文遼陽山寺願文齊興二十有三載區宇乂安列聖重光百神受職天平地成禮諧樂暢劍㦸亡鑄江海無波皇帝體膺上哲運鍾下武以至德字黔首大明臨赤縣深仁俯漏惠化潛通榮鏡六幽照蘇八表唐旌已立芻輿不逺而至殷網旣開肖翹咸遂其所壇凝休氣渚幕榮光𤣥扈告符翠琰啓籙阿閣朝諠棘林夜靜西琯協律南鬯迎神衣氣操龜之俗懷音請吏反踵修股之渠膜拜空首四海懾然中外禔福尉候無警書執大同猶以為負扆垂旒人世㣲業功成治定域中小道投心覺海束意𤣥門手執明珠頂文甘露調御天人不徇巖廊之重明行具足寧屑裘冕之尊十力四心東漸西被日月出矣風雨潤之屠門鮑肆化成嚴淨之所蜉蝣蟪蛄綱于仁壽之域參墟奥壤王迹所基宻都是宅别館攸在襟帶遐長原陸爽秀髙巖鬱起作鎮東偏峰羅羣玉鷲頭之狀非美樹列三珠雞足之形可陋洞穴條風生和雅之由圓珠積水流清妙之音于時玉燭調年金商在律職方具禮効駕西巡六龍齊轡七萃按部雷動星移凝鑾佇蹕乃建仁祠于彼勝地成之不日旣麗且康昔周夜初明漢池云鑿事隔荒裔道若存亡哲王馭厯𢎞濟區宇前聖後聖旦慕為期以此勝因仰為武成皇帝及清廟聖靈願西遇彌陀上征兠率雄視三界髙臨四衢百年之神俯輕羣后一音所導遠同佛日皇太后福踰姜水祉邁塗山壽比太隂業均厚載聖主齊明兩曜合德二儀受録錯于靈河開金簡于仙嶽龍官鳥紀未可匹其光大象天任地焉能喻其長久皇太子德茂元良道髙上嗣牢籠啓誦孕育莊丕六宫眷屬諸王昆弟皆智慧莊嚴玉華松茂永侍披香長固磐石以兹博利被于萬品當使法界虚空生靈動植俱沐定水同䕃法雲斯誓或差無取正覺樂府有所思長門與長信憂思並難任洞房明月下空庭綠草深怨歌裁潔素能賦受黄金復聞隔湘水猶言限桂林淒淒日已暮誰見此時心潔一作紈日出東南隅行初月正如鈎懸光入綺樓中有可憐妾如恨亦如羞深情出艷語宻意滿横眸楚腰寧且細孫眉本未愁青玉勿當取雙銀詎可留㑹待東方騎遥居最上頭可一作肯櫂歌行秋江見底清越女復傾城方舟共採摘最得可憐名落花流寶珥㣲吹動香纓帶垂連理濕擢舉木蘭輕順風傳細語因波寄逺情誰能結錦纜薄暮隱長汀美女篇京洛多妖艷餘香愛物華俱臨鄧渠水共採鄴園花時揺五明扇聊駐七香車情疎看笑淺嬌深盼欲斜㣲津染長黛新溜濕輕紗莫言人未解隨君獨問家鄧渠一作梁墱河曲遊魏文帝與吳質書曰時駕而遊北遵河曲鄴下盛風流河曲有名遊應徐託後乗車馬踐芳洲丰茸雞樹宻遥裔鶴煙稠日上疑髙盖雲起類重樓金羈自沃若蘭棹成夷猶懸匏動清吹采菱轉艷謳還珂響金埒歸袂拂銅溝惟畏三春晩勿言千載憂升天行尋師得道訣輕舉厭人羣玉山候王母珠庭謁老君煎為返魂藥刻作長生文飛䇿乗流電彫軒曳彩雲𤣥洲望不極赤野眺無垠金樓旦蹇嵼玉樹曉氛氲擁琴遥可聽吹笙遠詎聞不學蜉蝣子生死何紛紛彩一作白神仙篇浮生厭危促名岳共招攜雲軒遊紫府風駟上丹梯時見遼東鶴屢聽淮南雞玉英持作寶瓊實採成蹊飛䇿揚輕電懸旌耀彩霓瑞銀光似燭靈石髓如泥寥廓鸞山右超越鳳洲西一丸應五色持此救人迷城南隅讌城南氣初新才王邀故人輕盈雲映日流亂鳥啼春花飛北寺道絃散南漳濱舞動淮南袖歌揚齊后塵駢鑣歇夜馬接軫限歸輪公孫飲彌月平原讌浹旬即是消聲地何須逺避秦蜀國弦西蜀稱天府由来擅沃饒雲浮玉壘夕日映錦城朝南尋九折路東上七星橋琴心若易解令客豈難要採蓮曲曲浦戲妖姬輕盈不自持擎荷愛圓水折藕弄長絲珮動裙風入妝消粉汗滋菱歌惜不唱須待暝歸時從軍行朔方烽火照甘泉長安飛將出祁連犀渠玉劒良家子白馬金羈俠少年平明偃月屯右地薄暮魚麗逐左賢谷中石虎經銜箭山上金人曾祭天天涯一去無窮已薊門迢遞三千里朝見馬嶺黄沙合夕望龍城陣雲起庭中竒樹已堪攀塞外征人殊未還白雪初下天山外浮雲直上五原間關山萬里不可越誰能坐對芳菲月流水本自斷人腸堅氷舊來傷馬骨邊庭節物與華異冬霰秋霜春不歇長風蕭蕭渡水来歸鴈連連映天沒從軍行軍行萬里出龍庭單于渭橋今已拜將軍何處覔功名詩駕出圜丘開年簡時日上辛稱天吉平曉禁門開隱隱乗輿出乗輿出九重金根銜六龍章移千乗動斾舉百神從黄麾引朱節靈鼔應華鍾神歌已相續神光復相燭風中颺紫煙壇上埋蒼玉贈李若初發清漳浦春草正萋萋今留素滻曲夏水已成蹊塵起星橋外日落寳壇西庭空野煙合巢深夕羽迷短歌雖製素長吟當執珪寄語當窻婦非關惜馬蹄贈别司馬幼之南聘故交忽千里輶車莅逺盟幽人重離别握手送征行晩霞浮極浦落景照長亭拂霧揚龍節乗風遡鳥旌楚山百重映吳江萬仭清夏雲樓閣起秋濤帷盖生陸侯持寶劒終子繫長纓前修亦何逺君其朂令名贈劉儀同西聘開卭昔柔逺賓越盡招攜豈若馳天使玉節撫遺黎五祠臨渭北雙嶺帶崤西故關看金馬餘壇聽寶雞垂絲被柳陌落錦覆桃蹊分袪俄易慘離思實難齎極野雲峯合遥嶂日輪低塵暗前旌沒風長後騎嘶灞陵行可望函谷久無泥須君勞旋罷春草共萋萋遊梁城揚鑣歴汴浦迴扈入梁墟漢藩文雅地清塵曖有餘賓遊多任俠臺苑盛簪裾歎息徐公劒悲涼鄒子書亭臯落照盡原野沍寒初鳥散空城久煙銷古樹疎東越嚴子陵西蜀馬相如修名竊所慕長謡獨課虚扈一作從駕經大慈照寺北齊時作𤣥風冠東户内範軼西陵大川開寶匣福地下金繩繡栭髙可映畫栱疉相承日馭非難假雲師本易慿陽室疑停燧隂軒類鑿氷迥題飛星沒長楣宿露凝旌門曙光轉輦道夕雲蒸山祗効靈物水若薦休徵薄命叨恩紀㣲軀竊自陵優游徒可恃周賚永難勝春夕經行留侯墓少小期黄石晚年遊赤松應成羽人去何忽掩髙封疎蕪枕絶野邐迤帶斜峯墳荒隧草沒碑碎石苔濃狙秦懐猛氣師漢挺柔容盛烈芳千祀深泉閉九重夕風吟宰樹遲光落下舂遂令懐古客揮淚獨無從上已褉飲山泉好風日城市厭囂塵聊持一樽酒共尋千里春餘光下幽桂夕吹舞青蘋何言出關後重有入林人日一作景夜聞隣妓拾遺作觀妓倡樓對三道吹臺臨九重笙隨山上鶴笛奏水中龍怨歌聲易斷妙舞態難逢誰能暫留客解佩一相從賦得珠簾鑑帷明欲斂照檻色將晨可憐疎復宻隱映當窗人浮清帶逺吹含光動細塵落花時屢拂㑹侍玉階春彭城王挽歌旭日禁門開隱隱靈輿發纔看玉樓迥稍視龍山沒猶陳五營騎尚聚三河卒容衛儼未歸空山照秋月未一作来樂平長公主挽歌粧樓對馳道吹臺臨景舍風入上春朝月滿涼秋夜未言歌笑畢已覺生榮謝何時洛水湄芝田解龍駕後園宴常聞昆閬有神仙雲冠羽佩得長年秋夕風動三珠樹春朝濕露九芝田不如鄴城佳麗所玉樓銀閣與天連太液囘波千丈映上林花樹百枝然流風續洛渚行雲在南楚可憐白水神可念青樓女便妍不羞澁妖艷工言語池苑正芳菲得戲不知歸媚眼臨歌扇嬌香出舞衣纎腰如欲斷側髻似能飛南樓日已暮長簷鳥應度竹殿遥聞鳳管聲虹橋别有羊車路攜手傍花叢徐步入房櫳欲眠衣先解半醉臉逾紅日日相看轉難厭千嬌萬態不知窮欲知妾心無劇已明月流光滿帳中聽鳴蟬篇聽鳴蟬此聽悲無極羣嘶玉樹裏迴噪金門側長風送晩聲清露供朝食晩風朝露實多宜秋日髙鳴獨見知輕身蔽數葉哀鳴抱一枝流亂罷還續酸傷合更離蹔聽别人心即斷纔聞客子淚先垂故鄉已超忽空庭正蕪沒一夕復一朝坐見涼秋月河流帶地從来嶮峭路干天不可越紅塵早蔽陸生衣明鏡空悲潘掾髮長安城裏帝王州鳴鐘列鼎自相求西望漸臺臨太液東瞻甲觀距龍樓説客恒持小冠出越使常懐寶劒遊學仙未成便尚主尋源不見已封侯富貴功名本多豫繁華輕薄盡無憂詎念嫖姚嗟木梗誰憶田單倦土牛歸去来青山下秋菊離離日堪把獨焚枯魚宴林野終成獨校子雲書何如還驅少游馬田單一作蘭􅉝漢魏六朝百三家集巻一百十五
