body:
  text: 漢魏六朝百三家集卷三十魏阮瑀集題詞阮掾為曹操遺書孫權文辭英拔見重魏朝文帝云書記翩翩致足樂也元瑜沒王傑誄之曰簡書如雨強力敏成若是乎行人有辭國家光輝以之折衝禦侮其鄭子産乎豫觀彼書潤澤發揚善辨若轂獨敘赤壁之敗流汗發慚口重語塞固知無情之言即懸幡擊鼓無能助其威靈也文質論雅有徑思若得優遊述作勒成一家亦足與偉長中論翩翻上下乃諸子長逝元瑜最先遺文鬼名撫手痛悒至今傳其焚山應招鼓琴奏曲事亦在有無之間安得起彼九原更談文墨乎悲風涼日明月三星讀其諸詩每使人愁然則元瑜俯首曹氏嗣宗盤桓司馬父子酒歌各有不得已也目録賦鸚鵡賦止欲賦箏賦紀征賦論文質論書為曹公作書與孫權為武帝與劉備書箋謝太祖箋文弔伯夷文詩駕出北郭門琴歌詠史詩二首其一其二雜詩二首其一其二七哀詩隱士苦雨失題公宴怨詩漢魏六朝百三家集卷三十目録欽定四庫全書漢魏六朝百三家集卷三十明張溥輯魏阮瑀集賦鸚鵡賦惟翩翩之艷鳥誕嘉類於京都穢夷風而弗處慕聖惠而來徂被坤文之黃色服離光之朱形配秋英以離緑苞天地以耀榮止欲賦夫何淑女之佳麗顔㶷㶷以流光歷千代其無匹超古今而特章執妙年之方盛性聰惠以和良稟純潔之明節復申禮以自防重行義以輕身志髙尚乎貞薑情私悅其美麗無須臾而有忘思桃夭之所宜願無衣之同裳懷紆結而不暢魂一夕而九翔出房户以躑躅覩天漢之無津傷匏瓜之無偶悲織女之獨勤還伏枕以求寐庶通夢而交神神惚恍而難遇思交錯以繽紛遂終夜而靡見東方旭以既晨知所思之不得乃抑情以自信箏賦惟夫箏之竒妙極五音之幽微苞羣聲以作主冠衆樂而為師稟清和於律吕籠絲木以成資身長六尺應律數也故能清者感天濁者合地五聲並用動靜簡易大興小附重發輕隨折而復扶循覆逆開浮沈抑揚升降綺靡殊聲妙巧不識其為平調足均不疾不徐遲速合度君子之行也慷慨磊落卓礫盤紆壯士之節也曲髙和寡妙伎雖工伯牙能琴於兹為朦皎繹翕純庶配其蹤延年新聲豈比能同陳惠李文曷能是逢紀征賦仰天民之髙衢兮慕在昔之遐軌希篤聖之崇綱兮惟𢎞哲而為紀同天工而人代兮匪賢智其能使五材陳而並序兮靜亂由乎干戈惟蠻荆之作讐兮將治兵而濟河遂臨河而就濟兮瞻禹績之茫茫距疆澤以潛流兮經崑崙之髙岡目幽蒙以廣衍兮遂霑濡而難量論文質論蓋聞日月麗天可瞻而難附羣物著地可見而易制夫逺不可識文之觀也近而易察質之用也文虛質實逺踈近密援之斯至動之應疾兩儀通數固無攸失若乃陽春敷華遇衝風而隕落素葉變秋既究物而定體麗物若偽醜器多牢華璧易碎金鐵難陶故言多方者中難處也術饒津者要難求也意𢎞博者情難足也性明察者下難事也通士以四竒髙人必有四難之忌且少言辭者政不煩也寡知見者物不擾也専一道者思不散也混濛蔑者民不備也質士以四短違人必有四安之報故曹參相齊寄託獄市欲令姦人有所容立及為宰相飲酒而已故夫安劉氏者周勃正嫡位者周勃大臣木強不至華言孝文上林苑欲拜嗇夫釋之前誎意崇敦朴自是以降其為宰相皆取堅強一學之士安用竒才使變典法書為曹公作書與孫權初權兄策并江東魏武力未能逞且欲撫之以弟女配策弟匡為子彰取孫賁女及䇿薨權遂西連蜀漢結好劉備故書與權離絶以來于今三年無一日而忘前好亦猶姻媾之義恩情已深違異之恨中間尚淺也孤懷此心君豈同哉每覽古今所由改趣因緣侵辱或起瑕釁心忿意危用成大變若韓信傷心於失楚彭寵積望於無異盧綰嫌畏於己隙英布憂迫於情漏此事之緣也孤與將軍恩如骨肉割授江南不屬本州豈若淮隂捐舊之恨抑遏劉馥相厚益隆寧放朱浮顯露之奏無匿張勝貸故之變匪有隂構賁赫之告固非燕王淮南之釁也而忍絶王命明棄碩交實為佞人所構會也夫似是之言莫不動聽因形設象易為變觀示之以禍難激之以恥辱大丈夫雄心能無憤發昔蘇秦説韓羞以牛後韓王按劒作色而怒雖兵折地割猶不為悔人之情也仁君年壯氣盛緒信所嬖既懼患至兼懷忿恨不能復逺度孤心近慮事勢遂齎見薄之決計秉翻然之成議加劉備相扇揚事結釁連推而行之想暢本心不願於此也孤以薄德位髙任重幸蒙國朝將泰之運蕩平天下懷集異類喜得全功長享其福而姻親坐離厚援生隙常恐海內多以相責以為老夫包藏禍心隂有鄭武取胡之詐乃使仁君翻然自絶以是忿忿懷慙反側常思除棄小事更申前好二族俱榮流祚後嗣以明雅素忠誠之效抱懷數年未得散意昔赤壁之役遭離疫氣燒船自還以避惡地非周瑜水軍所能抑挫也江陵之守物盡榖殫無所復據徙民還師又非瑜之所能敗也荆土本非已分我盡與君冀取其餘非相侵肌膚有所割損也思計此變無傷於孤何必自遂於此不復還之髙帝設爵以延田橫光武指河而誓朱鮪君之負纍豈如二子是以至情願聞德音往年在譙新造舟船取足自載以至九江貴欲觀湖漅之形定江濵之民耳非有深入攻戰之計也將恐議者大為已榮自謂策得長無西患重以此故未肯回情然智者之慮慮於未形達者所規規於未兆是故子胥知姑蘇之有麋鹿輔果識智伯之為趙禽穆生謝病以免楚難鄒陽北遊不同吳􅍔此四士者豈聖人哉徒通變思深以微知著耳以君之明觀孤術數量君所據相計土地豈勢少力乏不能逺舉割江之表晏安而已哉甚未然也若恃水戰臨江塞要欲令王師終不得渡亦未必也夫水戰千里情巧萬端越為三軍吳曾不禦漢潛夏陽魏豹不意江湖雖廣其長難衛也凡事有宜不得盡言將修舊好而張形勢更無以威脅重敵人之心然有所恐恐書無益何則往者軍逼而自引還今日在逺而興慰納辭遜意狹謂其力盡適以增驕不足相動但明效古當自圖之耳昔淮南信左吳之䇿隗囂納王元之言彭寵受親吏之計三夫不寤終為世笑梁王不受詭勝竇融斥逐張玄二賢既覺福亦隨之願仁君少留意焉若能內取子布外擊劉備以效赤心用復前好則江表之任長以相付髙位重爵坦然可觀上令聖朝無東顧之勞下令百姓保安全之福君享其榮孤受其利豈不快哉若忽至誠以處僥幸婉彼二人不忍加罪所謂小人之仁大人之賊大雅之人不肯為此也若憐子布願言俱存亦能傾心去恨順君之情更與從事取其後善但禽劉備亦足為效開設二者審處一焉聞荆揚諸將並得降者皆言交州為君所執豫章距命不承執事疫旱並行人兵損減各求進軍其言云云孤聞此言未以為悅然道路既逺降者難信幸人之災君子不為且又百姓國家之有加懷區區樂欲崇和庶幾明德來見招副不勞而定於孤益貴是故按兵守次遣書致意古者兵交使在其中願仁君及孤虛心回意是以應詩人補衮之歎而慎周易牽復之義濯鱗清流飛翼天衢良時在兹朂之而已為武帝與劉備書披懷解帶投分寄意箋謝太祖箋一得披玄雲望白日惟力是視敢有二心文弔伯夷文余以王事適彼洛師瞻望首陽敬弔伯夷東海讓國西山食薇重德輕身隱景潛暉求仁得仁報之仲尼沒而不朽身沈名飛詩駕出北郭門談藝録云樂府往往敘事故與詩殊蓋敘事辭緩則兄不精翩翩堂前燕疊字極促乃佳玩瑀駕出北郭門視孤兒行太緩弱不逮矣駕出北郭門馬樊不肯馳下車步踟蹰一作躑躅仰折枯楊枝顧聞丘林中噭噭有悲啼借問啼者出何為乃如斯親母舍我殁後母憎孤兒飢寒無衣食舉動鞭捶施骨消肌肉盡體若枯樹皮藏我空室中父還不能知上塜察故處存亡永別離親母何可見淚下聲正嘶棄我于此間窮厄豈有資傳告後代人以此為明規琴歌魏文士傳云太祖雅聞瑀名辟之不應乃逃入山中太祖使人焚山得瑀太祖時征長安大延賔客怒瑀不與語使就技人列瑀善解音能鼓琴撫絃而歌為曲既捷音聲殊妙太祖大悅按典略文章志瑀建安初辭疾得召即起不得有焚山事太祖征荆州瑀作書十六年入關而云得瑀在長安瑀十七年卒太祖次年為魏公辭稱大魏愈知其妄矣奕奕天門開大魏應期運青蓋巡九州在東西人怨士為知已死女為悅已玩恩義茍潛暢他人焉能亂詠史詩二首其一誤哉秦穆公身沒從三良忠臣不違命隨驅就死亡低頭窺壙户仰觀日月光誰謂此何處恩義不可忘路人為流涕黃鳥鳴髙桑其二燕丹養勇士荆軻為上賔圖盡擢匕首長驅西入秦素車駕白馬相送易水津漸離擊築歌悲聲感路人舉坐同咨嗟嘆氣若青雲雜詩二首其一臨川多悲風秋日苦清涼客子易為戚感一作對此用哀傷攬衣起躑躅上觀心與房三星守故次明月未收光雞鳴當何時朝晨尚未央還坐長嘆息憂憂安可忘其二我行自凛秋季冬乃來歸置酒高堂上友朋集光輝念當復離别涉路險且夷思慮益惆悵淚下沾裳衣七哀詩丁年難再遇富貴不重來良時忽一過身體為土灰冥冥九泉室漫漫長夜臺身盡氣力索精魂靡所能一作回嘉殽設不御旨酒盈觴杯出壙望故鄉但見蒿與萊隱士四皓潛南嶽老萊竄河濵顔回樂陋巷許由安賤貧伯夷餓首陽天下歸其仁何患處貧苦但當守明真苦雨苦雨滋玄冬引日彌且長丹墀自殱殪深樹猶沾裳客行易感悴我心摧已傷登臺望江沔陽侯沛洋洋失題白髮隨櫛墮未寒思厚衣四支易懈倦行步益疏遲常恐時嵗盡魂魄忽髙飛自知百年後堂上生旅葵公宴陽春和氣動賢主以崇仁布惠綏人物降愛常所親上堂相娛樂中外奉時珍五味風雨集杯酒若浮雲闕怨詩民生受天命漂若河中塵雖稱百齡夀孰能應此身猶獲嬰凶禍流落一作流離恆苦心闕漢魏六朝百三家集卷三十
