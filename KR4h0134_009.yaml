body:
  text: 漢魏六朝百三家集巻九漢劉歆集題詞王莽簒漢甄豐劉歆王舜為其腹心豐舜不足道歆宗室宿儒胡為僕僕符命同賣餅兒也甄尋之變劉棻兄弟三人皆死歆始怨懼後與王涉董忠謀誅莽徬徨太白漏言婦人遂自殺也班史謂歆初心輔莽圖富貴謀至加號安漢宰衡而止事不出於居攝即真以後内畏不安懷變有日此固寛為之辭然論歆罪幽州羽山流殛猶小矣子政三子皆好學長子伋以易敎授官至郡守中子賜九卿丞早卒而少子歆最知名令歆繼父業挍秘書領五經死於哀帝之世官以都尉終其名豈不出兩兄上而冐榮國師投跡亂逆悲乎其壽也左傳未立移書責讓子雲為友求索方言至洪範傳著天人七略綜百家三統厯譜考歩日月五星此非古鉅儒耶讀其書益傷其人則有掩巻爾目録賦遂初賦甘泉宫賦燈賦書移太常博士書答文學與揚雄求方言書議武帝廟不宜毁議太上惠景寢園議王莽服母緦縗議奏上鄧析子説三統厯説論新序論傳洪範五行傳漢魏六朝百三家集巻九目録欽定四庫全書漢魏六朝百三家集巻九明張溥輯漢劉歆集賦遂初賦遂初賦者劉歆所作也歆少通詩書能屬文成帝召為黄門侍郎中壘校尉侍中奉車都尉光禄大夫歆好左氏春秋欲立於學官時諸儒不聽歆乃移書太常博士責讓深切為朝廷大臣非疾求出補吏為河内太守又以宗室不宜典三河徙五原太守是時朝政已多失矣歆以論議見排擯志竟不得之官經厯故晉之域感今思古遂作斯賦以歎往事而寄已意昔遂初之顯禄兮遭閶闔之開通蹠三台而上征兮入北辰之紫宫侍列宿於鉤陳兮擁太常之樞極總六龍於駟房兮奉華葢於帝側惟太階之侈濶兮機衡為之難運懼魁杓之前後兮遂隆集於河濵遭陽侯之豐沛兮乘素波以聊戾得𤣥武之嘉兆兮守五原之烽燧二乘駕而既俟僕夫期而在涂馳太行之嚴防兮入天井之喬關厯崗岑以升􅑙兮馬龍騰以起攄舞雙駟以優遊兮濟黎侯之舊居心滌蕩以慕逺兮逥髙都而北征劇彊秦之暴虐兮吊趙括於長平好周文之嘉德兮躬尊賢而下士駕四馬而觀風兮慶辛甲於長子哀衰周之失權兮數困辱而莫扶執孫蒯于屯留兮救王師於余吾過下虒而歎息兮悲平公之作臺背宗周而不䘏兮茍偷樂而情怠板葉落而不省兮公族閴其無人曰不悛而愈甚兮政委棄於家門載約屨而正朝服兮􅑙皮弁以為履寶礫石於廟堂兮面隨和而不眂始建衰而造亂兮公室繇此遂卑憐後君之寄寓兮唁靖公之銅鞮越侯田而長驅兮釋叔向之飛患悦善人之有救兮勞祁奚於太原何叔子之好直兮為羣邪之所惡頼祁子之一言兮幾不免乎徂落䨥美不必為偶兮旹有羞而不相及雖韞寶而求價兮嗟千載其焉合昔仲尼之淑聖兮竟隘窮乎陳蔡彼屈原之貞專兮卒放沉於湘淵何方直之難容兮桞下黜而三辱蘧瑗抑而再犇兮豈材知之不足揚蛾眉而見妒兮固醜女之情也曲木惡直繩兮亦小人之誠也以夫子之博觀兮何此道之必然空下峕而矔世兮自命已之取患悲積習之生常兮固明智之所别叔羣既在皁𨽻兮六卿興而為桀荀寅肆而顓恣兮吉射叛而擅兵憎人臣之若兹兮責趙鞅於晉陽軼中國之都邑兮登句注以陵厲歴㕍門而入雲中兮超絶轍而逺逝濟臨沃而遥思兮忽垂意乎邊都埜蕭條以寥廓兮陵谷錯以盤紆飄寂寥以荒䀛兮沙埃起而杳冥㢠廻風育其飄忽兮㢠廻颭颭之泠泠薄涸凍之凝滯兮茀谿谷之清凉漂積雪之皚皚兮涉凝露之隆霜揚雹霰之復陸兮慨原泉之凌隂激流澌之漻淚兮窺九淵之潜淋䬃悽愴以慘怛兮慽風漻以冽寒獸望浪以宂竄兮鳥脇翼之浚浚山蕭瑟以鵾鳴兮樹木壞而哇唫地坼裂而憤急兮巨石破之嵓嵓天烈烈以厲髙兮廖􅀈牕以梟牢㕍邕邕以遲遲兮埜鸛鳴而嘈嘈望亭隧之皦皦兮飛旂幟之翩翩囘百里之無家兮路脩逺之緜緜於是勒障塞而固守兮奮武靈之精誠攄趙奢之策慮兮威謀完乎金城外折衝以無虞兮内撫民以永寧既邕容以自得兮唯惕懼於竺寒攸潜温之𤣥室兮滌濁穢於太清反情素於寂寞兮居華體之㝠㝠玩書琹以條暢兮考性命之變態運四峕而覽隂陽兮總萬物之珎恠雖窮天地之極變兮曾何足乎留意長恬澹以懽娛兮固聖賢之所喜亂曰處幽潜德含聖神兮抱竒内光自得真兮寵幸浮寄竒無常兮寄之去留亦何傷兮大人之度品物齊兮舍位之過勿若遺兮求位得位固其常兮守信保已比老彭兮甘泉宫賦載萟文軼陵隂之地室過陽谷之秋城廻天門而鳳舉躡黄帝之明庭冠髙山而為居椉崑崙而為宫按軒轅之舊處居北辰之閎中背共工之幽都向炎帝之祝融封巒為之東序縁石闕之天梯桂木襍而成行芳肸蠁之依依翡翠孔雀飛而翶翔鳳皇止而集栖甘醴湧於中庭兮激清流之濔濔黄龍遊而蜿蟺兮神龜沉於玉泥離宫特觀接比相連雲起波駭星布彌山髙巒峻阻臨眺曠衍深林蒲葦涌水清泉芙蓉菡蓞菱荇蘋蘩豫章襍木楩松柞棫女貞烏勃桃李棗檍燈賦載萟文惟茲蒼鶴修麗以竒身體剼削頭頸委虵負斯明燈躬含水池明無不見照察纎微以夜繼晝烈者所依書移太常博士書昔唐虞既衰而三代迭興聖帝明王累起相襲其道甚著周室既微而禮樂不正道之難全也如此是故孔子憂道之不行歴國應聘自衛反魯然後樂正雅頌乃得其所脩易序書制作春秋以紀帝王之道及夫子沒而微言絶七十子終而大義乖重遭戰國棄籩豆之禮理軍旅之陳孔氏之道抑而孫吳之術興陵夷至于暴秦燔經書殺儒士設挾書之法行是古之罪道術由是遂滅漢興去聖帝明王遐逺仲尼之道又絶法度無所因襲時獨有一叔孫通略定禮儀天下唯有易卜未有它書至孝惠之世乃除挾書之律然公卿大臣絳灌之屬咸介胄武夫莫以為意至孝文皇帝始使掌故朝錯從伏生受尚書尚書初出于屋壁朽折散絶今其書見在時師傳讀而已詩始萌芽天下衆書徃徃頗出皆諸子傳説猶廣立於學官為置博士在漢朝之儒惟賈生而已至孝武皇帝然後鄒魯梁趙頗有詩禮春秋先師皆起于建元之間當此之時一人不能獨盡其經或為雅或為頌相合而成泰誓後得博士集而讀之故詔書稱曰禮壞樂崩書缺簡脱朕甚閔焉時漢興已七八十年離於全經固已逺矣及魯恭王壞孔子宅欲以為宫而得古文於壞壁之中逸禮有三十九書十六篇天漢之後孔安國獻之遭巫蠱倉卒之難未及施行及春秋左氏丘明所脩皆古文舊書多者二十餘通藏於秘府伏而未發孝成皇帝閔學殘文缺稍離其真乃陳發秘臧校理舊文得此三事以考學官所傳經或脱簡傳或間編傳問民間則有魯國桓公趙國貫公膠東庸生之遺學與此同抑而未施此乃有識者之所惜閔士君子之所嗟痛也往者綴學之士不思廢絶之闕茍因陋就寡分文析字煩言碎詞學者罷老且不能究其一蓺信口説而背傳記是末師而非往古至於國家將有大事若立辟雍封禪廵狩之儀則幽冥而莫知其原猶欲保殘守缺挾恐見破之私意而無從善服義之公心或懐妬嫉不考情實雷同相從隨聲是非抑此三學以尚書為備謂左氏為不傳春秋豈不哀哉今聖上德通神明繼統揚業亦閔文學錯亂學士若兹雖昭其情猶依違謙讓樂與士君子同之故下明詔試左氏可立不遣近臣奉㫖銜命將以輔弱扶微與二三君子比意同力冀得廢遺今則不然深閉固距而不肯試猥以不誦絶之欲以杜塞餘道絶滅微學夫可與樂成難與慮始此乃衆庶之所為耳非所望士君子也且此數家之事皆先帝所親論今上所考視其古文舊書皆有徴驗外内相應豈茍而已哉夫禮失求之於野古文不猶愈於野乎往者博士書有歐陽春秋公羊易則施孟然孝宣皇帝猶廣立榖梁春秋梁丘易大小夏侯尚書義雖相反猶竝置之何則與其過而廢之也寧過而立之傳曰文武之道未墜於地在人賢者志其大者不賢者志其小者今此數家之言所以兼包大小之義豈可偏絶哉若必專已守殘黨同門妬道真違明詔失聖意以䧟於文吏之議甚為二三君子不取也漢書頌桓公一作伯公誤桓生以禮為大夫貫長卿受詩毛公並見儒林傳十紀文選作記七十子作七十二子終作卒讀作讃三九下有篇字間編作脱編傳問作博問惜閔作歎慜文學作文致考視作考試寧作與答文學誠思拾遺冀以云補李善文選注與揚雄求方言書雄為郎一嵗作繡補靈節龍骨之銘詩三章及天下上計孝㢘雄問異語紀十五卷為輶軒使者絶代語釋别國方言積二十七年成帝時歆與揚雄從取方言歆叩頭昨受詔宓五官郎中田儀與官婢陳徴駱驛等私通盜刷越巾事即其夕竟歸府詔問三代周秦軒車使者逌人使者以嵗八月廵路代語僮謡歌戲欲得其最目因從事郝隆之有日篇中但有其目無見文者歆先君數為孝成皇帝言當使諸儒共集訓詁爾雅所及五經所詁不合爾雅者詁􅯅為病及諸經氏之屬皆無證驗博士至以窮世之博學者偶有所見非徒無主而生是也㑹成帝未以為意先君又不能獨集至於歆身修軌不暇何偟更創屬聞子雲獨采集先代絶言異國殊語以為十五巻其所解畧多矣而不知其目非子雲澹雅之才沈鬱之思不能經年鋭精以成此書良為勤矣歆雖不遘過庭亦克識先君雅訓三代之書藴藏於家直不計耳今聞此甚為子雲嘉之已今聖朝留心典誥發精于殊語欲以驗考四方之事不勞戎馬髙車之使坐知傜俗適子雲攘意之秋也不以是時發倉廪以振贍殊無為明語將何獨挈之寶上以忠信明于上下以置恩于罷朽所謂知蓄積善布施也蓋蕭何造律張倉推歴皆成之于帷幕貢之于王門功列于漢室名流乎無窮誠以隆秋之時收藏不殆饑春之歳散之不疑故至于此也今謹使密人奉手書願頗與其最目得使入籙令聖朝留明明之典歆叩頭叩頭挈一作絜議武帝廟不宜毁議司徒掾班彪曰漢承亡秦絶學之後祖宗之制因時施宜自元成後學者蕃滋貢禹毁宗廟匡衡改郊兆何武定三公後皆數復故紛紛不定何者禮文缺微古今異制各為一家未易可偏定也考觀諸儒之議劉歆博而篤矣此與王舜同議據漢書歆所撰議也臣聞周室既衰四夷竝侵獫狁最彊於今匈奴是也至宣王而伐之詩人美而頌之曰薄伐獫狁至于太原又曰嘽嘽推推如霆如雷顯允方叔征伐獫狁荆蠻來威故稱中興及至幽王犬戎來伐殺幽王取宗器自是之後南夷與北狄交侵中國不絶如綫春秋紀齊桓南伐楚北伐山戎孔子曰微管仲吾其被髮左袵矣是故棄桓之過而録其功以為伯首及漢興冒頓始强破東胡禽月氏并其土地地廣丘彊為中國害南粤尉佗總百粤自稱帝故中國雖平猶有四夷之患且無寧嵗一方有急三面救之是天下皆動而被其害也孝文皇帝厚以貨賂與結和親猶侵暴無已甚者興師十餘萬衆近屯京師及四邊嵗發屯備虜其為患乆矣非一世之漸也諸侯郡守連匈奴及百粤以為逆者非一人也匈奴所殺郡守都尉略取人民不可勝數孝武皇帝愍中國罷勞無安寧之時乃遣大將軍驃騎伏波樓船之屬南滅百粤起七郡北攘匈奴降昆邪十萬之衆置五屬國起朔方以奪其肥饒之地東伐朝鮮起𤣥莵樂浪以斷匈奴之左臂西伐大宛并三十六國結烏孫起敦煌酒泉張掖以鬲婼羌裂匈奴之右肩單于孤特逺遁於幕北四垂無事斥地逺境起十餘郡功業既定乃封丞相為冨民侯以大安天下富實百姓其規橅可見又招集天下賢俊與恊心同謀興制度改正朔易服色立天地之祠建封禪殊官號存周後定諸侯之制永無逆爭之心至今累世頼之單于守藩百蠻服從萬世之基也中興之功未有髙焉者也髙帝建大業為太祖孝文皇帝德至厚也為文太宗孝武皇帝功至著也為武世宗此孝宣帝所以發德音也禮記王制及春秋榖梁傳天子七廟諸侯五大夫三士二天子七日而殯七月而𦵏諸侯五日而殯五月而𦵏此䘮事尊卑之序也與廟數相應其文曰天子三昭三穆與太祖之廟而七諸侯二昭二穆與太祖之廟而五故德厚者流光德薄者流卑春秋左氏傳曰名位不同禮亦異數自上以下降殺以兩禮也七者其正法數可常數者也宗不在此數中宗變也茍有功德則宗之不可預為設數故於殷太甲為太宗太戊曰中宗武丁曰髙宗周公為母逸之戒舉殷三宗以勸成王繇是言之宗無數也然則所以勸帝者之功德博矣以七廟言之孝武皇帝未宜毁以所宗言之則不可謂無功德禮記祀典曰夫聖王之制祀也功施於民則祀之以勞定國則祀之能救大災則祀之竊觀孝武皇帝功德皆兼而有焉凡在於異姓猶將特祀之况於先祖或説天子五廟無見文又説中宗髙宗者宗其道而毁其廟名與實異非尊德貴功之意也詩云蔽芾甘棠勿鬋勿伐邵伯所茇思其人猶愛其樹况宗其道而毁其廟乎迭毁之禮自有常法無殊功異德固以親疎相推及至祖宗之序多少之數經傳無明文至尊至重難以疑文虛説定也孝宣皇帝舉公卿之議用衆儒之謀既以為世宗之廟建之萬世宣布天下臣愚以為孝武皇帝功烈如彼孝宣皇帝崇立之如此不宜毁太上惠景寢園議禮去事有殺故春秋外傳曰日祭月祀時享嵗貢終王祖襧則日祭曾髙則月祀二祧則時享壇墠則嵗貢大禘則終王德盛而游廣親親之殺也彌逺則彌尊故禘為重矣孫居王父之處正昭穆則孫常與祖相代此遷廟之殺也聖人於其祖出於情矣禮無所不順故無毁廟自貢禹建迭毁之議惠景及太上寢園廢而為虚失禮意矣王莽服母緦縗議居攝二年莽母功顯君死意不在哀令太后詔議其服少阿羲和劉歆與博士諸儒七十八人議莽遂行焉居攝之義所以統立天功興崇帝道成就法度安輯海内也昔殷成湯既沒而太子蚤夭其子太甲幼少不明伊尹放諸桐宫而居攝以興殷道周武王既沒周道未成成王幼少周公屏成王而居攝以成周道是以殷有翼翼之化周有刑措之功今太皇太后比遭家之不造委任安漢公宰尹羣僚衡平天下遭孺子幼少未能共上下皇天降瑞出丹石之符是以太皇太后則天明命詔安漢公居攝踐祚將以成聖漢之業與唐虞三代比隆也攝皇帝遂開袐府㑹羣儒制禮作樂卒定庶官茂成天功聖心周悉卓爾獨見發得周禮以明因監則天稽古而損益焉猶仲尼之聞韶日月之不可階非聖哲之至孰能若兹綱紀咸張成在一匱此其所以保佑聖漢安靖元元之效也今功顯君薨禮庶子為後為其母緦傳曰與尊者為體不敢服其私親也攝皇帝以聖德承皇天之命受太后之詔居攝踐祚奉漢太宗之後上有天地社稷之重下有元元萬機之憂不得顧其私親故太皇太后建厥元孫俾侯新都為哀侯後明攝皇帝與尊者為體承宗廟之祭奉共養太皇太后不得服其私親也周禮曰王為諸侯緦縗弁而加環絰同姓則麻異姓則葛攝皇帝當為功顯君緦縗弁而加麻環絰如天子弔諸侯服以應聖制奏上鄧析子中鄧析書四篇臣叙書一篇凡中外書五篇以相校除復重為一篇皆定殺青書可繕寫也鄧析者鄭人也好刑名操兩可之説設無窮之辭當子產之世數難子產之法記或云子產起而戮之於春秋左氏傳昭公二十年而子產卒子太叔嗣為政定公八年太叔卒駟歂嗣為政明年乃殺鄧析而用其竹刑君子謂子歂於是乎不忠茍有可以加于國家棄其邪可也静女之三章取彤管焉竿旄何以告之取其忠也故用其道不棄其人詩之蔽芾甘棠勿剪勿伐召伯所茇思其人猶愛其樹也况用其道不恤其人乎然無以勸能矣竹刑簡法也乆逺世無其書子產卒後二十年而鄧析死傳説或稱子產誅鄧析非也其論無厚者言之異同與公孫龍同類謹第上説三統厯説漢書云初孝成世劉向總六厯列是非作五紀論向子歆究其微眇作三統厯及譜以説春秋推法密要故述焉夫厯春秋者天時也列人事而因以天時傳曰民受天地之中以生所謂命也是故有禮誼動作威儀之則以定命也能者養之以福不能者敗以取禍故列十二公二百四十二年之事以隂陽之中制其禮故春為陽中萬物以生秋為隂中萬物以成是以事舉其中禮取其和厯數以閏正天地之中以作事厚生皆所以定命也易金火相革之卦曰湯武革命順乎天而應乎人又曰治厯明時所以和人道也周道既衰幽王既䘮天子不能班朔魯厯不正以閏餘一之嵗為蔀首故春秋刺十一月乙亥朔日有食之於是辰在申而司厯以為在建戌史書建亥哀十二年亦以建申流火之月為建亥而怪蟄蟲之不伏也自文公閏月不告朔至此百有餘年莫能正厯數故子貢欲去其餼羊孔子愛其禮而著其法於春秋經曰冬十月朔日有食之傳曰不書日官失之也天子有日官諸侯有日御日官居卿以底日禮也日御不失日以授百官於朝言告朔也元典厯始曰元傳曰元善之長也共養三德為善又曰元禮之長也合三體而為之原故曰元於春三月每月書王元之三統也三統合於一元故因元一而九三之以為法十一三之以為實實如法得一黄鍾初九律之首陽之變也因而六之以九為法得林鍾初六呂之首隂之變也皆參天兩地之法也上生六而倍之下生六而損之皆以九為法九六隂陽夫婦子母之道也律取妻而呂生子天地之情也六律六吕而十二辰立矣五聲清濁而十日行矣傳曰天六地五數之常也天有六氣降生五味夫五六者天地之中合而民所受以生也故日有六甲辰有五子十一而天地之道畢言終而復始太極中央元氣故為黄鍾其實一龠以其長自乘故八十一為日法所以生權衡度量禮樂之所繇出也經元一以統始易太極之首也春秋二㠯目嵗易兩儀之中也於春每月書王易三極之統也於四時雖亡事必書時月易四象之節也時月以建分至啟閉之分易八卦之位也象事成敗易吉凶之効也朝聘㑹盟易大業之本也故易與春秋天人之道也傳曰龜象也筮數也物生而後有象象而後有滋滋而後有數是故元始有象一也春秋二也三統三也四時四也合而為十成五體㠯五乗十大衍之數也而道據其一其餘四十九所當用也故蓍以為數㠯象兩兩之又㠯象三三之又以象四四之又歸竒象閏十九及所據一加之因㠯再扐兩之是為月法之實如日法得一則一月之日數也而三辰之位交矣是㠯能生吉凶故易曰天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十几天地之數五十有五此所㠯成變化而行鬼神也并終數為十九易窮則變故為閏法參天九兩地十是為㑹數參天數二十五兩地數三十是為朔望之㑹㠯㑹數乘之則周於朔旦冬至是為㑹月九㑹而復元黄鍾初九之數也經於四時雖亡事必書時月時所以紀啓閉也月所以紀分至也啓閉者節也分至者中也節不必在其月故時中必在正數之月故傳曰先王之正時也履端於始舉正於中歸餘於終履端於始序則不愆舉正於中民則不惑歸餘於終事則不誖此聖王之重閏也以五位乘㑹數而朔旦冬至是為章月四分月法以其一乘章月是為中法參閏法為周至以乘月法以减中法而約之則六扐之數為一月之閏月其餘七分此中月相求之術也朔不得中是為閏月言隂陽雖交不得中不生故曰法乘閏法是為統嵗三統是為元嵗元嵗之閏隂陽災三統閏法易九戹曰初入元百六陽九次三百七十四隂九次四百八十陽九次七百二十隂七次七百二十陽七次六百隂五次六百陽五次四百八十隂三次四百八十陽三凡四千六百一十七嵗與一元終經嵗四千五百六十災嵗五十七是以春秋曰舉正於中又曰閏月不告朔非禮也閏以正時時以作事事以厚生生民之道於是乎在矣不告閏朔棄時正也何以為民故魯僖五年春正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也几分至啟閉必書雲物為備故也至昭二十年二月已丑日南至失閏至在非其月梓慎望氛氣而弗正不履端於始也故傳不曰冬至而曰日南至極於牽牛之初日中之時景最長以此知其南至也斗綱之端連貫營室織女之紀指牽牛之初以紀日月故曰星紀五星起其初日月起其中凡十二次日至其初為節至其中斗建下為十二辰視其建而知其次故曰制禮上物不過十二天之大數也經曰春王正月傳曰周正月火出於夏為三月商為四月周為五月夏數得天得四時之正也三代各據一統明三統常合而迭為首登降三統之首周還五行之道也故三五相包而生天統之正始施於子半日萌色赤地統受之於丑初日肇化而黄至丑半日牙化而白人統受之於寅初日孽成而黒至寅半日生成而青天施復於子地化自丑畢於辰人生自寅成於申故厯數三統天以甲子地以甲辰人以甲申孟仲季迭用事為統首三微之統既著而五行自青始其序亦如之五行與三統相錯傳曰天有三辰地有五行然則三統五星可知也易曰參五以變錯綜其數通其變遂成天地之文極其數遂定天下之象太極運三辰五星於上而元氣轉三統五行於下其於人皇極統三德五事故三辰之合於三統也日合於天統月合於地統斗合於人統五星之合於五行水合於辰星火合於熒惑金合於太白木合於嵗星土合於填星三辰五星而相經緯也天以一生水地以二生火天以三生木地以四生金天以五生土五勝相乘以生小周以乘乾坤之策而成大周隂陽比類交錯相乘故九六之變登降於六體三微而成著三著而成象二象十有八變而成卦四營而成易為七十二參三統兩四時相乘之數也參之則得乾之策兩之則得坤之策以陽九九之為六百四十八以隂六六之為四百三十二凡一千八十隂陽各一卦之微筭策也八之為八千六百四十而八卦小成引而信之又八之為六萬九千一百二十天地再之為十三萬八千二百四十然後大成五星㑹終觸類而長之以乘章嵗為二百六十二萬六千五百六十而與日月㑹三㑹為七百八十七萬九千六百八十而與三統㑹三統二千三百六十三萬九千四十而復於太極上元九章嵗而六之為法太極上元為實實如法得一隂一陽各萬一千五百二十當萬物氣體之數天下之能事畢矣論新序論史記商君傳末注載劉歆新序論秦孝公保崤函之固以廣雍州之地東并河西北收上郡國富兵彊長雄諸侯周室歸籍四方來賀為戰國霸君秦遂以彊六世而并諸侯亦皆商君之謀也夫商君極身無二慮盡公不顧私使民内急耕織之業以富國外重戰伐之賞以勸戎士法令必行内不私貴寵外不偏疏逺是以令行而禁止法出而姦息故雖書云無偏無黨詩云周道如砥其直如矢司馬法之勵戎士周后稷之勸農業無以易此此所以并諸侯也故孫卿曰四世有勝非幸也數也然無信諸侯畏而不親夫霸君若齊桓晉文者桓不倍柯之盟文不負原之期而諸侯畏其彊而親信之存亡繼絶四方歸之此管仲舅犯之謀也今商君倍公子卭之舊恩棄交魏之明信詐取三軍之衆故諸侯畏其彊而不親信也藉使孝公遇齊桓晉文得諸侯之統將合諸侯之君驅天下之兵以伐秦秦則亡矣天下無桓文之君故秦得以兼諸侯衛鞅始自以為知霸王之德原其事不諭也昔周召施善政及其死也後世思之蔽芾甘棠之詩是也嘗舍於樹下後世思其德不忍伐其樹况害其身乎管仲奪伯氏邑三百户無怨言今衛鞅内刻刀鋸之刑外深鈇鉞之誅歩過六尺者有罰棄灰於道者被刑一日臨渭而論囚七百餘人渭水盡赤號哭之聲動於天地畜怨積讐比於丘山所逃莫之隱所歸莫之容身死車裂滅族無姓其去霸王之佐亦逺矣然惠王殺之亦非也可輔而用也使衛鞅施寛平之法加之以恩申之以信庶幾霸者之佐哉洪範五行傳五行伏羲氏繼天而王受河圖則而畫之八卦是也禹治洪水賜雒書法而陳之洪範是也聖人行其道而寶其真降及于殷箕子在父師位而典之周既克殷以箕子歸武王親虛已而問焉故經曰惟十有三祀王訪于箕子王廼言曰烏呼箕子惟天隂隲下民相恊厥居我不知其彛倫逌叙箕子廼言曰我聞在昔鯀陻洪水汨陳其五行帝乃震怒弗畀洪範九疇彛倫逌斁鯀則殛死禹迺嗣興天廼錫禹洪範九疇彛倫逌叙此武王問雒書於箕子箕子對禹得雒書之意也初一曰五行次二曰羞用五事次三曰農用八政次四曰叶用五紀次五曰建用皇極次六曰艾用三德次七曰明用稽疑次八曰念用庶徵次九曰嚮用五福畏用六極凡此六十五字皆雒書本文所謂天廼錫禹大法九章常事所次者也以為河圖雒書相為經緯八卦九章相為表裏昔殷道弛文王演周易周道敝孔子述春秋則乾坤之隂陽效洪範之咎徵天人之道粲然著矣正月雨木氷成公十六年上陽施不下通下隂施不上達故雨而木為之氷雰氣寒木不曲直也八月壬申御廪災桓公十四年御廪公所親耕籍田以奉粢盛者也棄法度亡禮之應也春石言於晉昭公八年金石同類是為金不從革失其性也秋大水桓公元年桓易許田不祀周公廢祭祀之罰也大水嚴公二十四年先是嚴飾宗廟刻桷丹楹以夸夫人簡宗廟之罰也恒雨書貎傳曰有鱗蟲之孽羊旤鼻痾三月癸酉大雨震電庚辰大雨雪隱公九年三月癸酉於厯數春分後一日始震電之時也當雨而不當大雨大雨常雨之罰也於始震電八日之間而大雨雪常寒之罰也八月大雩昭公三年昭公即位年十九矣猶有童心居䘮不哀炕陽失衆八月大雩昭公二十四年左氏傳二十三年邾師城翼還經魯地魯襲取邾師獲其三大夫邾人愬於晉晉人執我行人叔孫婼是春廼歸之七月上辛大雩季辛又雩昭公二十五年時郈氏與季氏有隙又季氏之族有淫妻為讒使季平子與族人相惡皆共讒平子子家駒諫曰讒人以君徼幸不可昭公遂伐季氏為所敗出奔齊恒奥書屬思心不容於易剛而包柔為離離為火為目羊上角下號剛而包柔羊大目而不精明視氣毁故有羊旤闕二字視傳曰有羽蟲之孽雞旤十二月隕霜不殺草僖公三十三年草妖也髙宗祭成湯有蜚雉登鼎耳而雊羽蟲之孽易有鼎卦鼎宗廟之器主器奉宗廟者長子也野鳥自外來入為宗廟器主是繼嗣將易也十二月李梅實僖公三十三年庶徵皆以蟲為孽思心蠃蟲孽也李梅實屬草妖夏有鸜鵒來巢昭公二十五年羽蟲之孽其色黑又黒祥也視不明聽不聰之罰也恒寒聽傳曰有介蟲孽也庶徵之恒寒大雨雪及未當雨雪而雨雪及大雨雹隕霜殺菽草皆常寒之罰也秋螽桓公五年貪虐取民則螽介蟲之孽也與魚同占有蜚嚴公二十九年負蠜也性不食榖食榖為災介蟲之孽秋雨螽於宋文公三年螽為榖災卒遇賊隂墜而死也十二月螽哀公十二年周十二月夏十月也火星既伏蟄蟲皆畢天之見變因物類之宜不得以螽是嵗再失閏矣周九月夏七月故傳曰火猶西流司厯過也冬蝝生宣公十五年蝝螕之有翼者食榖為災黒𤯝也恒風思心傳曰時則有臝蟲之孽謂螟螣之屬也九月已卯晦震夷伯之廟釐公十五年春秋及朔言朔及晦言晦人道所不及則天震之展氏有隱慝故天加誅於其祖夷伯之廟以譴告之也成公十六年六月甲午晦晉侯及楚子鄭伯戰于鄢陵皆月晦云秋螟隱公五年又逆臧釐伯之諫貪利區霿以生臝蟲之孽也夏梁山崩成公五年梁山晉望也崩㢮崩也古者三代命祀祭不越望吉凶禍福不是過也國主山川山崩川竭亡之徵也美惡周必復是嵗嵗在鶉火至十七年復在鶉火欒書中行偃殺厲公而立悼公恒隂皇極傳曰有下體生上之痾秋有蜮嚴公十八年蜮盛暑所生非自越來也敗狄于鹹文公十一年人變屬黄祥二月已已日有食之榖梁傳曰言日不言朔食晦公羊傳曰食二日隱公三年正月二日燕越之分野也凡日所躔而有變則分野之國失政者受之人君能脩政共御厥罰則災消而福至不能則災消而禍生故經書災而不紀其故蓋吉凶亡常隨行而成禍福也周衰天子不班朔魯厯不正置閏不得其月月大小不得其度史記日食或言朔而實非朔或不言朔而實朔或脱不書朔與日皆官失之也七月壬辰朔日有食之既桓公三年六月趙與晉分先是晉曲沃伯再弑晉侯是嵗晉大亂滅其宗國十月朔日有食之桓公十七年楚鄭分三月日有食之嚴公十八年晦魯衛分六月辛未朔日有食之嚴公二十五年五月二日魯趙分十二月癸亥朔日有食之嚴公二十六年十月二日楚鄭分九月庚午朔日有食之嚴公三十年八月秦周分九月戊寅朔日有食之僖公五年七月秦晉分三月庚午朔日有食之僖公十二年三月齊魯分五月日有食之僖公十五年二月朔齊越分二月癸亥日有食之文公元年正月朔燕越分六月辛丑朔日有食之文公十五年四月二日魯衛分七月甲子日有食之既宣公八年十月二日楚鄭分四月丙辰日有食之宣公十年二月魯衛分六月癸卯日有食之宣公十七年三月晦朓魯衛分六月丙寅朔日有食之成公十六年四月二日魯衛分十二月丁已朔日有食之成公十七年九月周楚分二月乙未朔日有食之襄公十四年前年十二月二日宋燕分八月丁已日有食之襄公十五年五月二日魯趙分十月丙辰朔日有食之襄公二十年八月秦周分九月庚戌朔日有食之襄公二十一年七月秦晉分十月庚辰朔日有食之八月秦周分二月癸酉朔日有食之襄公二十三年前年十二月二日宋燕分七月甲子朔日有食之既襄公二十四年五月魯趙分八月癸已朔日有食之六月晉趙分十二月乙亥朔日有食之襄公二十七年九月周楚分四月甲辰朔日有食之昭公七年二月魯衛分六月丁已朔日有食之昭公十五年三月魯衛分六月甲戌朔日有食之昭公十七年六月二日魯趙分七月壬午朔日有食之昭公二十一年五月二日魯趙分十二月癸酉朔日有食之昭公二十二年十月楚鄭分五月乙未朔日有食之昭公二十四年二日魯趙分是月斗建辰十二月辛亥朔日有食之昭公三十一年二月宋燕分三月辛亥朔日有食之定公五年正月二日燕趙分十一月丙寅朔日有食之定公十二年十二月二日楚鄭分八月庚辰朔日有食之定公十五年六月晉趙分五月庚申朔日有食之定公十四年三月二日齊衛分八月戊午晨漏未盡三刻有兩月重見成帝建始元年舒者侯王展意顓事臣下促急故月行疾也肅者王侯縮朒不任事臣下㢮縱故月行遲也當春秋時侯王率多縮朒不任事故食二日仄慝者十八食晦日脁者一此其效也四月辛卯夜恒星不見夜中星隕如雨嚴公七年晝象中國夜象夷狄夜明故常見之星皆不見象中國微也星隕如雨如而也星隕而且雨故曰與雨偕也明雨與星隕兩變相成也洪範曰庶民惟星易曰雷雨作解是嵗嵗在𤣥枵齊分野也夜中而星隕象庶民中離上也雨以解過施復從上下象齊桓行伯復興周室也周四月夏二月也日在降婁魯分野也先是衛侯朔奔齊衛公子黔牟立齊以諸侯伐之天子使使救衛魯公子溺顓政㑹齊以犯王命嚴弗能止卒從而伐衛逐天王所立不義至甚而自以為功民去其上政繇下作尤著故星隕於魯天事常象也七月有星孛入于北斗周史服曰不出七年宋齊晉之君皆將死亂文公十四年北斗有環域四星入其中也斗天之三辰綱紀星也宋齊晉天子方伯中國綱紀彗所以除舊布新也斗七星故曰不出七年至十六年宋人弑昭公十八年齊人弑懿公宣公二年晉趙穿弑靈公冬有星孛于大辰昭公十七年大辰房心尾也八月心星在西方孛從其西過心東及漢也宋大辰虛謂宋先祖掌祀大辰星也陳太昊虛虙羲木德火所生也鄭祝融虛髙辛氏火正也故皆為火所舍衛顓頊虛星為大水營室也天星既然又四國失政相似及為王室亂皆同冬十一月有星孛于東方哀公十三年孛東方大辰也不言大辰旦而見與日爭光星入而彗猶見是嵗再失閏十一月實八月也日在鶉火周分野也冬有星孛哀公十四年不言所在官失之也正月戊申朔隕石于宋五是月六鶂退飛過宋都釐公十六年是嵗嵗在壽星其衝降婁降婁魯分野也故為魯多大䘮正月日在星紀厭在𤣥枵齊分野也石山物齊大嶽後五石象齊桓卒而五公子作亂故為明年齊有亂庶民惟星隕于宗象宋襄將得諸侯之象而治五公子之亂星隕而鶂退飛故為得諸侯而不終六鶂象後六年伯業始退執于盂也民反德為亂亂則妖災生言吉㓙繇人然後隂陽衝厭受其咎齊魯之災非君所致故曰吾不敢逆君故也漢魏六朝百三家集卷九
