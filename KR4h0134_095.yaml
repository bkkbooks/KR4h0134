body:
  text: 漢魏六朝百三家集巻九十五梁王筠集題詞沈隱侯之知王元禮猶蔡伯喈之知王仲宣當日兩人情好相得詩文互賞郊居佳句惟元禮能讀好詩彈丸非隱侯莫為知音也隱侯遺文頗廣元禮則寥寥鮮存無論洗馬以來諸集斷闕即傳中所稱芍藥賦與草木十詠俱歸烏有因歎治亂異數彼此一時國門洛下之書空井寒灰之泣其文傳不傳亦各有命也昭明哀䇿中朝嗟賞然辭麗寡哀風人致短東漢以後文尚聲華漸爽情實誄死之篇應詔公庭尤矜組練即顏延年哀宋元后謝𤣥暉哀齊敬后一代名作皆文過其質何怪後生學步者哉楚妃吟句法雖異未備古體行路難善敘縫婦抑詩所謂摻摻女手也元禮筆法似詩優於文七葉重光人人有集若此者誠足為世家標準矣目錄賦蜀葵花賦表為第六叔讓重除吏部尚書表為從兄讓侍中表為王儀同瑩初讓表上太極表牋答湘東王示忠臣傳牋書與諸兒論家世集書與長沙王别書與東陽盛法師書與雲僧正書答釋法雲書與瑗律師書序自序記雲陽記碑開善寺碑國師草堂寺智者約法師碑哀策文昭明太子哀策文樂府有所思陌上桑俠客篇三婦豔雜曲二首行路難楚妃吟詩侍宴餞臨川王北伐應詔早出廵行矚望山海北寺寅上人房望岫翫前池和衞尉新渝侯廵城口號寓直中庶坊贈蕭洗馬奉和皇太子懴悔應詔有序和皇太子懴悔和吳主簿六首春日二首秋夜二首遊望二首代牽牛答織女苦暑五日望採拾奉酬從兄臨川桐樹摘安石榴贈劉孝威東南射山春遊春日向曉閨情望夕霽和孔中丞雪裏梅花摘園菊贈謝僕射舉答元金紫餉朱李詠輕利舟應臨汝侯教詠燈檠詠蠟燭和蕭子範入元襄王第閨情東陽還經嚴陵瀨贈蕭大夫遊望漢魏六朝百三家集巻九十五目録欽定四庫全書漢魏六朝百三家集巻九十五明張溥輯梁王筠集賦蜀葵花賦惟兹竒草遷花西道凌金坂之威夷跨玉津之浩浩值油雲之廣臨屬光風之長掃仰椒屋而敷榮值蘭房而舒藻邁衆芳而秀出冠雜卉而當闈既扶疎而雲蔓亦灼爍而星微布濩交加蓊葺紛葩疏莖宻葉翠萼丹華表為第六叔讓重除吏部尚書表臣聞剸犀截鴈必俟昆吾之鋒逐日追風信資伯樂之駿未有驂駕蹇足而方騁遥塗採藝鉛刀而求其斷割伏惟則哲為體事艱歴代明别攸寄義重前王必使玉石薰蕕區别靡雜涇渭𤣥黄條流不爽自非伯豪之天下能稱仲子之時人歸徳孝先之㧞真抑偽巨源之黜惡舉善然後可以銓鏡流品平均衡石為從兄讓侍中表至如元勲舊儒之胄積徳累仁之基九世七葉之華相韓事漢之資不然則子駿之學洞古今平子之思侔造化仲宣之辯識無滯次重之解經不窮然後可以喻㫖公卿問對帷扆陪六尺之輿通四方之意求之微臣此塗頓隔為王儀同瑩初讓表執玉獻金卒先五等親冕迎軺光導百辟坐階逺大遂致隆滿自位昇朝首職冠禮闈辭滿之願將際致仕之請方奏而思渥恩皆昭奬必被寵章爰降朝野驚矚是以安石歸禾固請元規終以致讓况臣才質空疎器量庸淺而可以妄參鉉席靦貎槐庭上太極殿表四海為家義存威重萬國來朝事惟壯觀憲北辰之居所正南面之尊貴繡栭鏤檻延曜光輝虬柱虹梁杳㝠雲霧非許鄴之敢倫豈雍豫之能擬且工徒樂業庶民日競一勞永逸不日而成信可以宴饗百神朝覲羣后者矣臣過荷寵勞祿秩優潤謹率丹欵上夫一千不足微申鳬躍伏深慙悚牋答湘東王示忠臣傳牋竊以孝實天經忠為令徳百行攸先一心靡忒昔淮南鴻烈事無的准沛王通論義止儒術東平獲譽良為片言臨淄見稱文辭小道孰若理冠君親義兼臣子謹當宣示遐邇光揚徳音書與諸兒論家世集書史傳稱安平崔氏及汝南應氏並累世有文才所以范蔚宗世擅雕龍然不過父子兩三世耳非有七葉之中名德重光爵位相繼人人有集如吾門世者也沈少傳約語人云吾少好百家之言身為四代之史自開闢已來未有爵位蟬聯文才相繼如王氏之盛者也汝等仰觀堂構思各努力與長沙王别書筠頓首頓首高秋凄爽體中何如願比勝納承入東禮拜用深傾仰昔藩后遨遊不無是事或龍舟水嬉或臨川送逺摐金飛斾汎此安流猶復見重良書以為盛徳未有選日簡辰歸誠繫念尋法城之遊逗祗園之聚翹心讚歎無以譬説僕夙昔増瘵蹇廢蓬門不獲執離彌深傾懣願敬朂白書不次王筠頓首頓首與東陽盛法師書菩薩戒弟子王筠灋名慧炬稽首和南問訊東陽盛法師弟子昔因多幸早蒙覲接嵗月推流踰三十載欽慕風徳獨盈懷抱間以山川無由禮敬司馬參軍仰述存眷曲垂訪憶既荷錄舊之情兼佩慇懃之㫖歡欣頂戴難為譬説仰承垂和履福享年九十有四嗤絳人之未高同殷宗之遐夀且耳長直已過頂齒剛㑹不先落延華駐彩怡神輔性自非宿殖善因何以招斯勝果尊年尚齒之誠懷徳敦舊之欵依風慕道之深欣羡景仰之至興居在念寤寐載懷弟子恨此樊籠迫兹纓繅無由問道撫躬如失庶心期㝠㑹咫尺江山道術相忘棄置形迹惟願敬朂保此期頥赤松朱髪復何足貴飛錫騰軀真在旦夕指陳丹欵殊未伸暢儻惠一言豈不幸甚弟子筠稽首和南與雲僧正書弟子孤子筠頓首稽首和南弟子釁結幽明備嬰荼蓼攀援崩踴肌髓糜潰尋繹煩寃肝膓寸斷號天叩地永隔精誠捨命捐軀終無補益思欲仰福廣為灋事以伸罔極之痛少寄追慕之誠鑄像度僧仰遵法教建齋設㑹務依經典敷説大乘誘度羣生其福不淺仰惟大正法師道心純淑至徳凝深智包空有照通真俗多聞不窮機辯無硋一代師匠四海推崇弟子宿值善因早蒙親眷情同骨肉義等金蘭外書所謂㝠契神交内典則為善友知識敬藉微緣敢陳大願來歳夏中欲仰請講説𢎞法之情既無彼此眷愛之深特希降屈公私道俗要請既多故預諮聞必願允遂豈圖一旦忽有斯白臨紙崩衂厝言無次弟子孤子王筠頓首頓首稽首和南答釋法雲書筠和南辱告垂示上答臣下審神滅論竊聞僾然有見禮典之格言今則不滅法教之𢎞㫖但妙相虛𤣥神功凝靜自非體道者豈能黙領其宗不有知機者無由㝠應其㑹聖主迹同萬機心游七淨哀愍羣生嫗煦庶物滌彼葢纒朂以解慧祛其蒙惑躋之仁夀信大哉為君善於智度者也弟子世奉法言家傳道訓而學淺行疎封累猶軫既得餐稟聖教預聞𢎞誘一音得解萬善可偕抃躍之情無以譬説弟子王筠和南與瑗律師書筠和南至節過念哀慕深至情不可任寒凝道體何如想比清豫弟子羸勞每惡惙弊何理眷請勤御比日來敘遣白王筠和南序自序余少好書老而彌篤雖遇見瞥觀皆即疏記後重省覽懽欣彌深習與性成不覺筆倦自年十三四齊建武二年乙亥至梁大同六年四十載矣幼年讀五經皆七八十遍愛左氏春秋吟諷常為口實廣畧去取凡三過五抄餘經及諸官儀禮國語爾雅山海經本草並再抄子史諸集皆一遍未嘗倩人假手並躬自抄錄大小百餘巻不足傳之好事葢以備遺忘而已記雲陽記車箱阪下有黎園一頃樹數百株青翠繁密望如車蓋碑開善寺碑玅門關鍵闢之者既難法海波瀾游之者未易是以軒稱俊聖堯曰欽明韶濩有美善之風文武致時雍之業地平天成惟事即世移風易俗匪止今身至如訪道峒山乘風獨逺凝神汾水窅然自喪或宗仰黄老之談景慕神僊之術斯蓋不度羣生事局諸已篤而為論道有未𢎞熏風璚露㪚馥流甘璧月珠星聯華颺葉修旛繞於雲根和鈴響於天外玉池動而揚文寳樹揺而成樂銘曰亭亭忉漢耿介凌烟層薨霞聳飛棟星懸國師草堂寺智者約法師碑結宇山椒疏壤幽岫蓄雲泄雨靄映房櫳浴日涵星飜光池沼震居暇豫留思幽微研精經藏探求法寳香城實相之談金河常樂之説䆒竟微妙洞達幽𤣥掖庭為道心之宫華林構重雲之殿師子之座高廣於燈王聽法之筵衆多於方丈開寳函之奥典闡金字之微言顯證一乘宣揚三慧辯才無閡遊戲神通莫不皆悟無生咸知忘想隨類得解俱㑹真如銘曰形在江湖心超祗鷲思恊風雲量包宇宙軒瞰蒼波忩承翠嶺須枕烟露掔持光景哀策文昭明太子哀策文蜃輅俄軒龍驂跼歩羽翿前驅雲旂北傃皇帝哀繼明之寢耀痛嗣徳之殂芳御武帳而悽慟臨甲觀而増傷式稽令典載揚鴻烈詔撰徳於旌旒永傳徽於舞綴其辭曰式載明兩實惟少陽既稱上嗣且曰元良儀天比峻儷景騰光奉祀延福守器傳芳睿哲膺期旦暮斯在外𢎞莊肅内含和愷識洞機深量苞瀛海立徳不器至公弗宰寛綽居心温恭成性循時孝友率由嚴敬咸有種徳惠和齊聖三善逓宣萬國同慶軒緯掩精陰羲弛位纒哀在疚殷夏銜恤孺泣無時蔬饘不溢禫遵踰月哀號未畢實惟監撫亦嗣郊禋問安肅肅視膳恂恂金華玉璪𤣥駟斑輪隆家幹國主祭安民光奉成務萬機是理矜慎庶獄勤恤關市誠存隱惻容無愠喜殷勤博施綢繆恩紀爰初敬業離經斷句奠爵崇師卑躬待傅寧資導習匪勞審諭博約是司時敏斯務辯究空微思探幾賾馳神圖緯硏精爻畫沉吟典禮優遊方冊饜飫膏腴含咀肴核括囊流略包舉藝文遍該緗素殫極丘墳幐帙充積儒墨區分瞻河闡訓望魯揚芬吟詠性靈豈惟薄伎屬辭婉約緣情綺靡字無㸃竄筆不停紙壯思泉流清漳雲委總覽時才網羅英茂學窮優洽辭歸繁富或擅談叢或稱文囿四友推徳七子慙秀望苑招賢華池愛客託乘同舟連輿接席摛文掞藻飛觴汎醳恩隆置醴賞逾賜璧徽風遐被盛業日新仁器非重徳輶易遵澤流兆庶福降百神四方慕義天下歸仁雲物告徵祲沴褰象星霾恒耀山頺朽壤靈儀上賓徳音長往具僚無蔭諮承安仰嗚呼哀哉皇情卓愍忉心纒痛胤嗣長號跗蕚増慟慕結親友悲動氓衆憂若殄邦懼同折棟嗚呼哀哉首夏司開麥秋紀節容衞徒警菁華委絶書幌空張談筵罷設虛饋饛饛孤燈翳翳嗚呼哀哉簡辰請日筮合龜貞幽埏夙啓𤣥宫獻成武校齊列文物増明昔遊漳滏賓從無聲今歸郊郭徒御相驚嗚呼哀哉昔絳闕以逺徂轥青門而徐轉指馳道而拒前望國都而不踐陵脩阪之威夷遡平原之悠緬驥蹀足以酸嘶挽悽鏘而流泫嗚呼哀哉混哀音於簫籟變愁容於天日雖夏木之森陰返寒林之蕭瑟既將反而復疑如有求而遂失謂天地其無心遽永濳於容質嗚呼哀哉即𤣥宫之㝠漠安神寢之清閟傳聲華於懋典觀徳業於徽諡懸忠貞於日月播鴻名於天地惟小臣之紀言實含毫而無媿嗚呼哀哉樂府有所思丹墀生細草紫殿納輕陰曖曖巫山逺悠悠湘水深徒歌鹿盧劍空貽玳瑁簪望君終不見屑淚且長一作微吟陌上桑人傳陌上桑未曉已含光重重相蔭映軟弱一作軟軟自芬芳秋胡始倚馬羅敷未滿筐春蠶朝巳老安得久彷徨俠客篇俠客趨名利劍氣坐相矜黄金塗鞘尾白玉飾鈎膺晨馳逸廣陌日暮返平陵舉鞭向趙李與君方代興三婦艶大婦留芳褥中婦對華燭小婦獨無事當軒理清曲丈人且安卧豔歌方斷續雜曲二首烏還夜已逼蟲飛曉尚賖桂月徒留影蘭燈空結花可憐洛城東芳樹揺春風丹霞映白日細雨帶輕虹行路難千門皆閉夜何央百憂俱集斷人腸林揣箱中取刀尺拂拭機上斷流黄情人逐情雖可恨復畏邊逺乏衣裳已繰一蠒催衣縷復擣百和薰衣香猶憶去時腰大小不知今日身短長裲襠雙心共一袜袙複兩邊作八襊襻帶雖安不忍縫開孔裁穿猶未達胸前却月兩相連本照君心不照天願君分明得此意勿復流蕩不如先含悲含怨判不死封情忍思待明年楚妃吟花早飛林中明鳥早歸庭前日暖春閨香氣亦霏霏香氣漂當軒清唱調獨顧暮含怨復含嬌蝶飛蘭復裊裊輕風入裙春可遊歌聲梁上浮春遊方有樂沉沉下羅慕詩侍宴餞臨川王北伐應詔金版韜英玉牒藴精帝徳乃武王威有征軒習弧矢夏陳干戚周騖戎車漢馳羽檄我皇俊聖千年踵武徳洞十一作千門威加八柱金正圮徳水行失道胡馬南牧戎徒西保薦食伊瀍整居豐鎬金關一作閣揚塵銅臺茂草命彼膳夫爰詔協律樂賦出車絃操吉日玉饌駢羅瓊漿泛溢聖徳温温賓儀秩秩早出廵行矚望山海王生臨廣隰潘子望洪河同軫懷歸思俱興年逝歌曰余異二子承睫淚滂沱剖符瀛海外結綬層山阿因心留惻憫恕已息煩苛繕築循時隟興動藉民和高門惟壯麗修雉亦駢羅層樓亦攀陟複道亦經過昧旦清音上風氣入纎蘿雲起垂天翼水動連山波奔濤延瀾汙積翠逺嵳峩鄉關屢廻曲還顧杳蹉跎曾微肅肅羽望路空如何北寺寅上人房望岫翫前池安期逐長往交甫稱高讓逺跡入滄溟輕舉馳昆閬良田心獨善兼且情由放豈若尋幽棲即目窮清曠激水周堂下屯雲塞檐向閒牖聽奔濤開忩延疊嶂前階復虛㳂濔迤成洲漲雨㸃㪚圓文風生起斜浪游鱗互瀺灂羣飛皆哢吭蓮葉蔓田田菱花動摇漾浮光曜庭廡流芳襲帷帳匡坐足忘懷詎思江海上和衞尉新渝侯廵城口號閶闔曖已昏鈎陳杳將暮棲烏城上返一作喧晚雀林中度屯衞時廵警凝威肆安步閣道趨文昌禁兵連武庫銅烏迎早風金掌承朝露罘罳分曉色睥睨生秋霧維城任寄隆空想靈均賦伊余方病免丘園保恬素寓直中庶坊贈蕭洗馬龍樓實九重薄寒殊復早玉堦泫清露銅池結秋潦霜被守宫槐風驚䕶門草之子擅文華縱横富辭藻舒錦慙光麗握珠謝竒寳媿予非工文何用披懷抱奉和皇太子懴悔應詔有序奉和皇太子懴悔詩仍上皇宸極聖㫖即疏降同所用十韻私心慶躍得未曾有招採餘韻更題鄙拙一聖智比明帝徳光四海荷負誠悠屬度脱實斯在懴説濟蒙愚推心屏欺殆名僧引定慧朝纓列元凱還迷依善導反心由真宰和鈴混吹音勝幡榮雪彩早蒲欲抽葉新篁向舒䈚翹勤諒懇到歸誠信兼倍睿艶似烟霞欄杆若珠琲善誘雖欲繼含毫愧文彩和皇太子懴悔習惡歸禮懴有過稱能改聖徳及羣生唱説信兼採翹心蕩十惡邈誠銷五罪三縳解智門六塵清法海超然故無著逍遙新有待和吳主簿六首春日二首日照鴛鴦殿萍生鴈鶩池游塵隨影入弱桞帶風垂青骹一作鶻逐黄口獨鶴慘羈雌同衾逺逰説結愛久相離於今方溘死寧須萱草枝菤葹心未發蘼蕪葉欲齊春蠶方曳緒新燕正衘泥野雉呼雌雊庭禽挾子棲從君客梁後方晝掩春閨山川隔道里芳草徒萋萋秋夜二首九重依夜館四壁慘無暉招搖顧西落烏鵲向東飛流螢漸收火絡緯欲催機爾時思錦字持製行人衣所望丹心達嘉客倘能歸露華初泥泥桂枝行栜栜煞氣下重軒輕陰滿四屋别寵增修夜逺征悲獨宿愁牽翠羽睂淚滿横波目長門絶往來含情空杼軸遊望二首落日照紅妝挾瑟當忩牖寧復歌蘼蕪唯聞歎楊桞結好在同心離别由衆口徒設露葵羹誰酌蘭英酒㑹日杳無期蕣華安得久相思不安席聊至狹斜東愁眉倣戚里高髻學城中雙眉偏照日獨蕋好縈風自知心所愛獻賦甘泉宫傳聞方鼎食詎憶春閨容代牽牛答織女新知與生别繇來儻相值如何一作豈如寸心中一宵懷兩事歡娛未繾綣倐忽成離異終日遥相望秪益生愁思猶想今春悲尚有故年淚忽遇長河轉獨喜涼颷至奔精翊鳯軫纎阿警龍轡苦暑日坂一作域㪚朱雰天隅歛青靄飛颷一作光煥南陸炎津通北瀨繁星聚若珠密雲屯似蓋月至每開襟風過時解帶五日望採拾裁縫逗早夏㸃畫守初晨綃紈既妍媚脂粉亦香新長絲表良節命一作金縷應嘉辰結蘆同楚客採艾異詩人折花競鮮彩拭露染芳津含嬌起斜盻斂笑動微嚬獻璫依洛浦懷佩似江濵須待恩光接中夜奉衣巾奉酬從兄臨川桐樹伊昔擅羽儀待價龍門垂優游清露㸃徽一作穆惠風吹月上陰陽榦雲覆死生枝公子存高尚聊用影華池棲鸞既不重舞鶴復何施方同㪚木㸑清響竟誰知摘安石榴贈劉孝威中庭有竒樹當户發華滋素莖表朱實綠葉厠紅㽔既標太冲賦復見安仁詩宗生仁夀殿族代疑作茂河陽湄有美清淮北如玉又如龜退書寫蟲篆進對一作封多好辭我家新置側可求不難識相望阻盈盈相思滿胸臆高枝為君採請寄西飛翼東南射山阮籍詠懷詩曰東南有射山汾水出其陽言神仙之事還丹改容質握髓駐流年口含千里霧掌流五色煙瓊漿汎金鼎瑶池溉玉田倐忽整龍駕相遇鳯臺前春遊藂蘭已飛蝶楊柳半藏鴉物色相煎蕩微歩出東家既同翡翠翼復如桃李花欲以千金笑廻君流水車春日金堤草非舊玉池泉已新風生似羊角雲上若魚鱗幽閨多怨思停織坐嬌春芳華既零落方作向隅人向曉閨情北斗行欲沒東方稍已晞晨雞初下棲玉臺作振羽曉露尚作方霑衣衾裯作錦衾徒有設信誓作蘭約果相違詎作誰忍開朝鏡差恨掩空扉望夕霽帝王集作簡文者非連山捲亂一作族雲長林息衆籟宻樹含綠滋遥峯凝翠靄石溜正潨潺一作潺湲山泉始澄汰物華方入賞跂予心期會和孔中丞雪裏梅花水泉猶未動庭樹已先知翻光同雪舞落素混一作汨冰池今春競時發猶是昔年枝惟有長顦顇對鏡不能窺摘園菊贈謝僕射舉霛茅挺三脊神芝曜九明菊花偏可憙碧葉媚金英重九惟嘉節抱一應元貞泛酌宜長久聊薦野人誠答元金紫餉朱李穠華春發彩結實下成蹊潘生詠金谷魏后沉寒溪逢君重妖麗移翫入崇閨慙無瓊玖報徒用萃幽棲詠輕利舟應臨汝侯教君侯飾輕利揺蕩邁飛雲凌波漾鷁彩汎水渙皎文電流已光絶鳥逝復超羣倐忽方千里戀兹岐路分詠燈檠百華曜九枝鳴鶴映冰池朱光本内照丹花復外垂流暉悦嘉容翻影泣生離自銷良不晦明白願君知詠蠟燭執燭引佳期流影度單帷朣朧别繡被依稀見蛾眉莢明不足貴燋燼豈為疑所恐恩情改照君尋履綦和蕭子範入元襄王第昔入睢陽苑連步披風雲今遊故臺處囘望閴無人皓壁留餘篆蕙圃有餘芬行人皆隕涕何獨孟嘗君閨情月出宵將半星流曉未央空閨易成響虛室自生光嬌羞悦人夢猶言君在傍東陽還經嚴陵瀨贈蕭大夫子陵狥高尚超然獨長往釣石宛如新故態依可想遊望晨登黄馬坡遥望白龍堆風威盡撩折路險車輪摧漢魏六朝百三家集巻九十五
