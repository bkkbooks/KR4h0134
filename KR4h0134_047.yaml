body:
  text: 漢魏六朝百三家集巻四十七潘尼集題詞史稱潘正叔著論究人道之綱裁箴懸乗輿之鑒此二文者非徒龍甲鳯毛亦其生平所以自立也元康薦亂八王鬬爭從父安仁一門罹酷正叔知幾歸掃墳墓後得封公顯職壽終塢壁當安仁初任河陽贈詩祖道美其天姿刑僇之後樹碑紀事増慟覆醢其於叔父情篤猶中郎也存没異路榮辱天壤逃死須臾之間垂聲三王之際至今誦閒居者笑黄門之乾没讀安身者重太常之居正人物短長亦懸禍福泉下嘿嘿烏誰雌雄即有不平能更收召魂魄抗睂争列哉傅長虞㑹定九品正叔作詩規之其為人也無詭隨其為文也無戲謔大致類然若琴有八分之書賦著琉璃之盌適文人餘韻也目録賦東武館賦有序西道賦又懷退賦武庫賦釣賦火賦苦雨賦琉璃椀賦瑇瑁椀賦扇賦石榴賦桑樹賦芙蓉賦鼈賦有引朝菌賦序頌釋奠頌有序後園頌箴乗輿箴有序論安身論序送二李郎詩序銘戴侍中銘碑益州刺史楊恭侯碑給事黄門侍郎潘君碑詩七月七日侍皇太子宴𤣥圃贈陸機出為吳王郎中令六章答陸士衡答傅咸詩并序皇太子集應令皇太子社三月三日洛水作贈河陽詩贈侍御史王元貺贈長安令劉正伯贈隴西太守張正治贈滎陽太守吳子仲答楊士安送盧景宣迎大駕逸民吟釋奠詩送大將軍掾盧晏贈汲郡太守李茂彦贈劉佐漢魏六朝百三家集巻四十七目録欽定四庫全書漢魏六朝百三家集巻四十七明張溥輯潘尼集賦東武館賦有序東武館者葢東武陽侯之館也俄而遷居謂余曰吾將老焉故有終焉之心而無移易之志子且為我賦之嘉大雅之洪操美明哲之保身懲都邑之迫險厭里巷之囂塵慕古公之胥宇羡孟氏之審隣將遷居于爽塏乃投迹於里仁前則行旅四湊通衢交㑹水泛輕舟陸方羽葢後則崇山崔嵬茂林幽藹彌望逺覧滉瀁夷泰表裏山河出入襟帶若乃濳流旁注飛渠脉散芙蓉映渚靈芝蔽岸於是逍遥靈沼遊豫華林彎弓撫彈娱志蕩心栝不空縱綸不茍沈遊鱗雙躍落羽相尋膳夫進俎虞人獻鮮春醴九醞嘉豆百籩隨波泝流乍往乍旋西道賦異山河之岨阨倦關谷之盤紆車低佪於濳軌馬侘傺於險塗狗肘還勾羊角互戾葂窟連投十數億計石子之澗坎埳之穴支體為之危竦形骸為之疲曵此亦行者之艱難覊旅之困敝若其名坂則羊腸美人成臯黄馬迴波激浪飛沙飄瓦馬則頓躓狼傍虺頺𤣥黄牛則體疲力竭損食喪膚蹄穿領摩髖脱軀又道深地狹坂峭軌長輪輿顛覆人馬仆僵懐退賦伊疇昔之懐憤思天飛以逺迹望循塗而投軌遡翔風以理翮冀雲霧之可憑希天路之開闢何時願之多違奄就覉以服役困吴坂之峻岨畏鹽車之嚴策嗟遊處之弗遇奚鬱悒之難任背宇宙之寥廓羅網罟之重深常屏氣以斂迹焉遊豫以娱心傅釋板以亮殷望投竿而相姬窮獨善以全質達兼利以濟時聃安志於柱史由抗迹於嵩箕理殊塗而同歸雖百慮其何思敢因虚以託談遂逡廵而造辭武庫賦若夫大刀寳劒曠世絶殊煉質於昆吾之竈定形於薛燭之罏釣賦抗余志於浮雲樂余身於蓬廬尋渭濵之逺跡且游釣以自娱左援脩竹右縱飛綸金鉤厲鉅甘餌埀芬衆鯤奔涌游鱗横集觸餌見擒值鉤被執長繳繽紛輕竿翕熠雲往颷馳光飛電入曜靈未及驚策葢已獲其數十且夫燔炙之鮮煎熬之味百品千變殊芳異氣隨心適好不可勝紀乃命宰夫膾此潛鯉名工習巧飛刀逞伎電剖星流芒散縷解隨風離鍔連翩雪累西戎之蒜南夷之薑醎酸調適齊和有方紅麺之飯糅以菰粱五味道洽餘氣芬芳和神安體易思難忘火賦覽天人之至周嘉火徳之為貴含太陽之靈暉體淳剛之正氣先聖仰觀通神悟靈窮物盡數研幾至精形生於未兆聲發於無象盡之不得其根聽之不聞其響來則莫見其跡去則不知其往似大道之未離而元氣之灝瀁故能博贍羣生資育萬類盛而不暴施而不費其變無方其用不匱鑽燧造火陶冶羣形恊和五味革變羶腥酒醴烹飪于斯獲成爾乃狄牙典膳百品既陳和羮酋醳㫖酒醲醇烹黿煑鼉灼龜臛鱗若乃流金化石鑠鐡融銅造制戎器以戒不恭砥鍊兵械整飾軍容四海康乂邉境無寇韜弓戢劒解甲釋胄銷鏑為耒鑄戈為耨戰士反於耕農戎馬放乎外廐及至焚野燎原一火赫曦林木摧拉沙粒並糜騰光絶覽雲散電披遂及衝風激揚炎光奔逸𤣥煙四合雲蒸霧萃山陵為之崩弛川澤為之涌沸去若風驅疾如電逝芬綸紆轉倐忽横厲蕭條長空野無孑遺無隰不灰無坰不斃震響達乎八㝠流光燭乎四裔榛蕪既除九野謐清蕩枝瘁於凜秋候來春而改生其揚聲發怒則雷電之威也明照逺鍳則日月之暉也甄陶品物則造化之制也濟育羣生則天地之恵也是以上聖人擬火以制禮鄭僑據猛以立政功用關乎古今勲績著乎百姓苦雨賦氣觸石而結蒸兮雲膚合而仰浮雨紛射而下注兮潦波湧而横流豈信宿之云多乃踰月而成霖瞻中唐之浩汗聽長霤之涔涔始濛瀎而徐墜終滂沛而難禁悲列宿之匿景悼太陽之幽沈雲暫披而驟合雨乍息而亟零旦漎漎以達暮夜淋淋以極明黿鼉逰於門闥蛙蝦嬉乎中庭懼二源之并合畏黔首之為魚處者含瘁於窮巷行者歎息於長衢琉璃椀賦覽方貢之彼珍瑋兹椀之獨竒濟流沙之絶險越葱嶺之峻危其由來也阻逺其所託也幽深據重巒之億仞臨洪溪之萬尋接玉樹以瓊瑶鄰沙棠與碧林瞻閬風之崔嵬顧𤣥圃之蕭森於是逰西極望大䝉歴鍾山闚燭龍覲王母訪仙童取琉璃之攸華詔曠世之良工纂𤣥儀以取象准三辰以定容光映日曜圓盛月盈纎瑕罔麗飛塵靡停灼爍旁燭表裏相形凝霜不足方其㓗澄水不能喻其清剛過金石勁勵瓊玉磨之不磷涅之不濁舉兹椀以酬賔榮密坐之曲宴流景炯晃以内澈清醴瑶琰而外見瑇瑁椀賦有瑇瑁之竒寳亦同旅于介蟲下法川以矩夷上擬乾而規隆或歩趾於清源或掉尾於泥中隨隂陽以濳躍與龜龍乎齊風包神藏智備體兼才高下斯處水陸皆能文若綺波背負蓬萊爾乃遐夷效珍越裳貢職横海萬里踰嶺千億挺璞荒巒摛藻辰極光曜炫晃昭爛熻赩嘉斯寳之兼美料衆珍而靡對文不煩於錯􅍢采不假乎藻繢豈翡翠之足儷胡犀象之能逮扇賦夫器有經粗用有踈密安衆以方為體五明以圓為質或託形於竹素或取固於膠漆方圓應於規矩制度由於䋲墨始顯用於荒蠻終表竒于上國石榴賦安石榴者天下之竒樹九州之名果是以屬文之士或叙而賦之葢感時而騁思覩物而興辭余遷舊宇爰造新居前臨曠澤却背清渠實有斯樹植于堂隅華實並麗滋味亦殊可以樂志可以充虚朱芳赫奕紅蕚參差含英吐秀乍合乍披遥而望之煥若隋珠耀重川詳而察之灼若列宿出雲間湘涯二后漢川逰女攜類命疇逍遥避暑託斯樹以栖遲遡祥風而容與爾乃擢纎手兮舒皓腕羅䄂靡分流芳散披緑葉於脩條綴朱華兮弱幹豈金翠之足珍寔兹葩之可翫商秋授氣収華斂實千房同蔕十子如一繽紛磊落垂光耀質滋味浸液馨香流溢桑樹賦從明儲以省膳憇便房以偃息觀兹樹之特偉感先皇之攸植蔚蕭森以四射邈洪傭而端直爾乃徘徊周覽俯仰逍遥俛睨靈根上眺脩條洞芳泉於九壤含溢露於清霄倚増城之飛觀拂綺窻之疏寮下迢逓以極望上扶疏而參差匪衆鳥之攸萃相皇鸞之羽儀理有微而至顯道有隠而應期豈皇晉之貞瑞兆先見而啓兹起尋抱於纎毫崇萬簣於始基芙蓉賦或擢莖以髙立似彫輦之翠葢或委波而布體擬連璧之攢㑹鼈賦有序皇太子逰於𤣥圃遂命釣魚有得鼈而獻之者令侍臣賦之翩銜釣以振掉吁駭人而可惡既顛墜於巖岸方盤跚而雅步或延首以鶴顧或頓足而鷹距或曵尾於塗中或縮頭於殻裏若乃秋水暴駭百川沸流有東海之巨鼈乃負山而吞舟朝菌賦序朝菌者葢朝華而暮落世謂之木槿或謂之日及詩人以為舜華宣尼以為朝菌其物向晨而結建明而布見陽而盛終日而殞不以其異乎何名之多也頌釋奠頌有序元康元年冬十二月上以皇太子富於春秋而人道之始莫先於孝悌初命講孝經於崇政殿實應天縱生知之量㣲言奥義發自聖問業終而體達至三年春閏月將有事於上庠釋奠于先師禮也越二十四日丙申侍祠者既齊輿駕次于太學太傅在前少傅在後恂恂乎𢎞保訓之道宫臣畢從三率備衛濟濟乎肅翼贊之敬乃掃壇為殿懸幕為宫夫子位于西序顔回侍于北墉宗伯掌禮司儀辨位二學儒官搢紳先生之徒垂纓佩玉規行矩步者皆端委而陪於堂下以待執事之命設樽篚於兩楹之閒陳罍洗於阼階之左几筵既布鐘懸既列我后乃躬拜俯之勤資在三之義謙光之美彌劭闕里之教克崇穆穆焉邕邕焉真先王之徽典不刋之美業允不可替已於是牲饋之事既終享獻之禮已畢釋𤣥衣御春服弛齋禁反故式天子乃命内外羣司百辟卿士蕃王三事至于學徒國子咸來觀禮我后皆延而與之燕金石簫管之音八佾六代之舞鏗鏘闛閤般辟俛仰可以澂神滌欲移風易俗者罔不畢奏抑淫哇屏鄭衛逺佞邪釋巧辯是日也人無愚智路無逺邇離鄉越國扶老攜幼不期而俱萃皆延頸以視傾耳以聽希道慕業洗心革志想洙泗之風歌来蘇之恵然後知居室之善著應乎千里之外不言之化洋溢于九有之内於熈乎若典固皇代之壯觀萬載之一㑹也尼昔忝禮官嘗聞俎豆今厠末列親覩盛美瀐漬徽猷沐浴芳潤不知手舞口詠竊作頌一篇義近辭陋不足測盛徳之形容光聖明之遐度其辭曰三元迭運五徳代徽黄精既亢素靈乃暉有皇承天造我晉畿祚以大寳登以龍飛宣基誕命景熈遐緒三分自文受終惟武席巻要蠻蕩定荒阻道濟羣生化流率土後帝承式丕隆曽構奄有萬方光宅宇宙篤生上嗣繼期挺秀聖敬日躋濬哲閎茂留精儒術敦閲古訓遵道讓齒降心下問鋪以金聲光以玉潤如日之升如乾之運乃延台保乃命學臣聖容穆穆侍講誾誾抽演㣲言啓發道真探幽窮賾温故知新講業既終精義既研崇聖重師卜日告奠陳其三牢引其四縣既戒既式乃盥乃薦恂恂孔聖百王攸希亹亹顔生好學無違曰皇儲后體神合機兆吉先見知來洞㣲濟濟二宫藹藹庶寮俊乂鱗萃髦士盈朝如彼和肆莫匪瓊瑶如彼儀鳯樂我雲韶瓊瑶誰剖四門洞開雲韶奚樂神人允諧蟬冕耀庭細珮振階徳以謙光仁以恩懐我酒惟清我肴惟馨舞以六代歌以九成莘莘胄子祁祁學生洗心自百觀國之榮學猶蒔苗化若偃草博我以文𢎞我以道萬邦蟬蜕矧乃俊造鑽蚌瑩珠剖石摛藻絲匪𤣥黄水罔方圓引之斯流染之斯鮮若金受範若埴在甄上好如雲下效如川昔在周興王化之始曰文曰武時惟世子今我皇儲濟聖通理緝熈重光於穆不巳於穆伊何思文哲后媚兹一人實副元首孝洽家邦光照九有純嘏自晉永世昌阜㣲㣲下臣過充近侍猥躡風雲鸞龍是厠身藻芳流目玩盛事竭誠作頌祗詠聖志後園頌芒芒在昔悠悠結繩太樸未散𤣥化霑凝羲皇繼踵三代相承五徳更王文質迭興天命匪諶祐謙輔信乃眷我皇光有大晉應期納祚天人是順和氣四充恵澤旁潤神祗告祥四靈效質㳺龍升雲儀鳯翳日甘露晨流醴泉涌溢華夏既寧八荒静謐人亦有言我何以休乃延卿士從皇以遊長筵逺布廣幕四周嘉肴惟芳㫖酒思柔巖巖峻岳湯湯𤣥流翔鳥鼓翼㳺魚載浮明明天子肅肅庶官文士濟濟武夫桓桓講藝華林肄射後園威儀既具弓矢斯閑恂恂謙徳穆穆聖顔賜以晏飲詔以話言黍稷既登貨財既豐仁風潛運皇化彌隆征夫釋甲戰士罷戎遐夷慕義絶域望風無或慢易在始慮終無或安逸在盈思沖箴乘輿箴易稱有天地然後有人倫有父子然後有君臣傳曰大者天地其次君臣然君臣父子之道天地人倫之本未有以先之者也故天生蒸人而樹之君使司牧之将以導羣生之性而理萬物之情豈以寵一人之身極無量之欲如斯而已哉夫古之為君者無欲而至公故有茅茨土階之儉而後之為君有欲而自利故有瑶臺瓊室之侈無欲者天下共推之有欲者天下共爭之推之之極雖禪代猶脱屣争之之極雖刼殺而不避故曰天下非一人之天下乃天下之天下安可求而得辭而已者乎夫脩諸已而化諸人出乎邇而見乎逺者言行之謂也故人主所患莫甚於不知其過而所美莫美於好聞其過若有君於此而曰予必無過唯其言而莫之違斯孔子所謂其庶幾乎一言而喪國者也葢君子之過如日月之蝕過也人皆見之更也人皆仰之雖以堯舜湯武之盛必有誹謗之木敢諫之鼔盤杅之銘無諱之史所以閑其邪僻而納諸正道其自維持如此之備故箴規之興將以救過補闕然猶依違諷喻使言之者無罪聞之者足以自誡先儒既援古義舉内外之殊而高祖亦序六官論成敗之要義正辭約又盡善矣自虞人箴以至于百官非唯規其所司誠欲人主斟酌其得失焉春秋傳曰命百官箴王闕則亦天子之事也尼以為王者膺受命之期當神器之運總萬機而撫四海簡羣才而審所授孜孜於得人汲汲於聞過雖廷爭面折猶将祈請而求焉至於箴規諫之順者曷為獨闕之哉是以不量其學陋思淺因負擔之餘嘗試撰而述之不敢斥至尊之號故以乘輿目篇葢帝王之事至大而古今之變至衆文繁而義詭意局而辭野將欲希企前賢髣髴崇軌譬猶丘坻之望華岱恒星之繫日月也其不逮明矣頌曰元元遂初芒芒太始清濁同流𤣥黄錯跱上下弗形尊卑靡紀赫胥悠哉大庭尚矣皇極啓建兩儀旣分彞倫永序萬邦已紛國事明王家奉嚴君各有攸尊德用不勤羲農已降暨于夏殷或禪或傳乃質乃文太上無名下知有之仁義不存而人歸孝慈無為無執何欲何思忠信之薄禮刑實滋旣譽旣畏以侮以欺作誓作盟而人始叛疑煌煌四海藹藹萬乗匪誓焉憑左輔右弼前疑後丞一日萬機業業兢兢夫出其言善則千里是應而莫余違亦喪邦有徴樞機之動式以廢興殷監不逺若之何勿徴且厚味腊毒豐屋生災辛作璇室而夏興瑤臺糟丘酒池象筯玉杯厥肴伊何龍肝豹胎惟此哲婦職為亂階殷用喪師夏亦不恢是以帝堯在位茅茨不翦周文日昃昧旦丕顯夫德輶如毛而或舉之者鮮故湯有慙德武未盡善下世道衰末俗化淺耽樂逸遊荒淫沈湎不式古訓而好是佞辯不遵王路而覆車是踐成敗之效載在先典匪唯陵夷厥世用殄故曰樹君如之何將人是司牧視之猶傷而知其寒燠故能撫之斯柔而敦之斯睦無逺不懷靡思不服夫豈厭縱一人而玩其耳目内迷聲色外荒馳逐不脩政事而終於顛覆昔唐氏授舜舜亦命禹受終納祖丕承天序放桀惟湯尅殷伊武故禪代非一姓社稷無常主四嶽三塗九州之阻彭蠡洞庭殷商之旅虞夏之隆非由尺土而紂之百尅卒於絶緒故王者無親唯在擇人傾葢惟舊白首乃新望由釣夫伊起有莘負鼎鼓刀而謀合聖神夫豈借官左右而取介近臣葢有國有家者莫云我聰或此面從莫謂我智聽受未易甘言美疢尠不為累由夷逃寵逺於脫屣奈何人主位極則侈知人則哲惟帝所難唐朝旣泰四族作奸周室旣隆而管蔡不䖍匪我二聖孰弭斯患若九德咸受儁乂在官君非臣莫治臣非君莫安故書美康哉而易貴金蘭有皇司國敢告納言論安身論葢崇德莫大乎安身安身莫尚乎存正存正莫重乎無私無私莫深乎寡欲是以君子安其身而後動易其心而後語定其交而後求篤其志而後行然則動者吉凶之端也語者榮辱之主也求者利病之幾也行者安危之决也故君子不妄動也動必適其道不徒語也語必經於理不茍求也求必造於義不虚行也行必由於正夫然用能免或繫之凶享自天之祐故身不安則殆言不從則悖交不審則惑行不篤則危四者行乎中則患憂接於外矣憂患之接必生於自私而興於有欲自私者不能成其私有欲者不能濟其欲理之至也欲茍不濟能無爭乎私茍不從能無伐乎人人自私家家有欲衆欲並爭羣私交伐爭則亂之萌也伐則怨之府也怨亂旣構危害及之得不懼乎然棄本要末之徒知進忘退之士莫不飾才銳智抽鋒擢穎傾側乎勢利之交馳騁乎當塗之務朝有彈冠之朋野有結綬之友黨與熾於前榮名扇其後握權則赴者鱗集失寵則散者瓦觧求利則託刎頸之懽爭路則構刻骨之隙於是浮偽波騰曲辯雲沸寒暑殊聲朝夕異價駑蹇希奔放之跡鉛刀競一割之用至於愛惡相攻與奪交戰誹謗噂沓毁譽縱横君子務能小人伐技風頺於上俗弊於下禍結而恨爭之不彊患至而悔伐之未辯大者傾國喪家次則覆身滅祀其故何邪豈不始於私欲而終於爭伐哉君子則不然知自私之害公也然後外其身知有欲之傷德也故逺絶榮利知爭競之遘災也故犯而不校知好伐之招怨也故有功而不德安身而不為私故身正而私全慎言而不適欲故言濟而欲從定交而不求益故交立而益厚謹行而不求名故行成而名美止則立乎無私之域行則由乎不爭之塗必將通天下之理而濟萬物之性天下猶我故與天下同其欲已猶萬物故與萬物同其利夫能保其安者非謂崇生生之厚而躭逸豫之樂也不忘危而已有其進者非謂窮貴寵之榮而藉名位之重也不忘退而已存其治者非謂嚴刑政之威而明司察之禁也不忘亂而已故寢蓬室隱陋巷披短褐茹藜藿環堵而居易衣而出茍存乎道非不安也雖坐華殿載文軒服黼繡御方丈重門而處成列而行不得與之齊榮用天時分地利甘布衣安藪澤沾體塗足耕而後食茍崇乎德非不進也雖居高位饗重禄執權衡握機祕功葢當時勢侔人主不得與之比逸遺意慮没才智忘肝膽棄形器貎若無能志若不及茍正乎心非不治也雖繁計䇿廣術藝審刑名峻法制文辯流離議論絶世不得與之爭功故安也者安乎道者也進也者進乎德者也治也者治乎心者也未有安身而不能保國家進德而不能處富貴治心而不能治萬物者也然思危所以求安慮退所以能進懼亂所以保治戒亡所以獲存也若乃弱志虚心曠神逺致徙倚乎不拔之根浮遊乎無垠之外不自貴於物而物宗焉不自重於人而人敬焉可親而不可慢也可尊而不可逺也親之如不足天下莫之能狎也舉之如易勝而當世莫之能困也達則濟其道而不榮也窮則善其身而不悶也用則立於上而非爭也舎則藏於下而非讓也夫榮之所不能動者則辱之所不能加也利之所不能勸者則害之所不能嬰也譽之所不能益者則毁之所不能損也今之學者誠能釋自私之心塞有欲之求杜交爭之原去矜伐之態動則行乎至通之路靜則入乎大順之門泰則翔乎寥廓之宇否則淪乎渾𡨕之泉邪氣不能干其度外物不能擾其神哀樂不能盪其守死生不能易其真而以造化為工匠天地為陶鈞名位為糟粕勢利為埃塵治其内而不飾其外求諸已而不假諸人忠肅以奉上愛敬以事親可以御一體可以牧萬民可以處富貴可以居賤貧經盛衰而不改則庶幾乎能安身矣序贈二李郎詩序元康六年尚書吏部郎汝南李光彦遷汲郡太守都亭矦江夏李茂曽遷平陽太守此二子皆弱冠知名歴職顯要旬月之間繼踵名郡離儉劇之勤就放曠之逸枕鳴琴以俟逺致離别之際各斐然賦詩銘戴侍中銘雅論𢎞博逸藻波騰碑益州刺史楊恭侯碑君乾靈之醇德挺一世之殊量稟天然不渝之操體蘭石芳堅之質夫其器膺𢎞濟知能周達窮不怨否顯不矜泰履行則為模楷吐言則成隱括德實充於内而光華發乎外也君發迹州國委質明主自景皇帝攝政文皇帝繼業值天下多虞疆場未靜以君先帝所拔懷寶後時而深達逺識有經國之量故為腹心謀臣而監度政事焉君出則簡練熊羆職司是圖入則從容諷議盡規帷幄其所以進可替否决疑定䇿者皆言効於旣往而事簡於帝心君再臨司官三撫名郡方将宣文徳以來逺建武功於所牧銘曰天生蒸民有類有則誕育恭表應期秀特文兼六行武備七德忠肅𢎞毅柔嘉温克機事無瑕臨疑不惑我謀旣精我化旣清澤流河朔勲著王庭西南未夷侯其是寧上天不惠早世濳靈給事黄門侍郎潘君碑君遇孫秀之難門受禍故門生感覆醢以增慟乃樹碑以紀事詩七月七日侍皇太子宴𤣥圃商風初授辰火微流朱明送夏少昊迎秋嘉禾茂園芳草被疇於時我后以豫以遊贈陸機出為吳王郎中令六章東南之美曩惟延州顯允陸生於今尠五臣作鮮儔振鱗南海濯翼清流婆娑翰林容與墳丘玉以瑜潤隨以光融乃漸上京羽善作乃儀儲宫玩爾清藻味爾芳風泳之彌廣挹之彌沖崑山何有有瑶有珉及爾同僚具惟近臣予渉素秋子登青春愧無老成厠彼日新祁祁大邦惟桑惟梓穆穆伊人南國之紀帝曰爾諧惟王卿士俯僂從命奚恤奚喜我車旣巾我馬旣秣星陳夙駕載脂載轄婉孌二宫徘徊殿闥醪澄莫饗孰慰饑渇昔子忝私貽我蕙蘭今子徂東何以贈旃寸晷惟寶豈無璵璠彼美陸生可與晤言答陸士衡顧兹蓬蔚厠根蘭陂膏澤雖均華不足披逮春不茂未秋先萎子濯鱗翼我挫羽儀願言難常載合載離昔遊禁闥祗畏夕惕今放丘園縱心夷易口詠新詩目玩文跡予志耕圃爾勤王役慙無琬琰以詶尺璧答傅咸詩并序司徒左長史傅長虞㑹定九品左長史宜得其才屈為此職執天下清議宰割百國而長虞性直而行或有不堪余與之親作詩以規焉悠悠羣吏非子不整嗷嗷衆議非子不靖忽荷畧紐握綱提領矯矯貞臣惟國之屏皇太子集應令聖朝命方岳爪牙司北鄰皇儲延篤愛設餞送逺賔誰應今日宴具惟廊廟臣置酒宣猷庭擊鼓靈沼濵羽觴飛醽醁芳饌備竒珍巴渝二八奏妙舞鼓鐸振長袪一作袂生迴飈曲裾揚輕塵皇太子社太簇恊青陽履端發嵗首孟月渉初旬吉日唯上酉我后邇天休設社祈遐耉三月三日洛水作晷運無窮已時逝焉可追斗酒足為歡臨川胡獨悲暮春春服成百草敷英㽔聊為三日遊方駕結龍旂廊廟多豪俊都邑有艷姿朱軒蔭蘭臯翠幙映洛湄臨崖濯素手步水搴輕衣沈鈎出比目舉弋落雙飛羽觴乘波進素俎隨初學作逐流歸贈河陽詩叔潘岳為河陽令虙生化單父子竒蒞東阿桐鄉建遺烈武城播絃歌逸驥騰夷路潛龍躍洪波弱冠步鼎鉉旣立宰三河流聲馥秋蘭摛藻豔春華徒美天姿茂豈謂人爵多贈侍御史王元貺崑山積瓊玉廣厦構衆材游鱗萃靈沼撫翼希天階膏蘭孰為消濟治由賢能王侯厭崇禮迴迹清憲臺蠖屈固小往龍翔迺大來恊心毘聖世畢力讃康哉贈長安令劉正伯遊鸞慿太虚騰鱗託浮霄過䝉嘉時㑹假翼陵扶摇疲憊克時乏及余再同僚並跡侍儲宫攜手登皇朝劉侯撫西都邁績參豹喬德厚化必深政明姦自消萬尋由積簣千里一步超爾其騁逸軌逺塗固可要贈隴西太守張正治二八由唐顯周以多士隆羣靈感韶運理翤應翔風張生拔幽華蘋蘩登二宫未幾振朱錦剖符撫西戎及子仍同僚贈言貽爾躬威刑有時用唯德可令終贈滎陽太守吳子仲大晉盛得人儲宫畜髦士吳侯降高質剖符授千里垂覆豈他鄉迴光臨桑梓寮類感岐路黎庶思知恥老氏踰小鱗曹參寄獄市無謂敝邑陋覆簣由兹起答楊士安逝將辭儲宫栖遲集南畿不悞百里賤徒惜年志衰躊躇顧城闕怨戀慕端闈俊德貽妙詩敷藻發清徽媿彼褒崇過感此岐路悲送盧景宣楊朱焉所哭岐路重别離屈原何傷悲生離情獨哀知命雖無憂倉卒意低徊歎氣從中發灑淚隨襟頽九重不常鍵閶闔有時開愧無貯衣獻貽言取諸懷迎大駕南山鬱岑崟洛川迅且急青松蔭脩嶺緑蘩被廣隰朝日順長塗夕暮無所集歸雲乗幰浮凄風尋帷入道逢深識士舉手對吾揖世故尚未夷崤函方嶮澁狐狸夾兩轅豺狼當路立翔鳯嬰籠檻騏驥見維縶俎豆昔嘗聞軍旅素未習且少停君駕徐待干戈戢逸民吟我顧傲世自遺舒志六合由巢是追沐浴洪池迅羽衣陟彼名山採此芝薇朝雲靉靆行露未晞遊魚羣戲翔鳥雙飛逍遥博觀日晏忘歸嗟哉四士從我者誰釋奠詩敦書請業研幾通理尊師重道釋奠崇祀德成教倫孰云不祉送大將軍掾盧晏贈物雖陋薄識意在忘言瓊琚尚交好桃李貴往還蕭艾茍見納貽我以芳蘭贈汲郡太守李茂彦離索何惆悵後㑹未可希河朔貴相忘岐路安足悲贈劉佐要言將誰苦聊以貽友生念我二三賢規我無隱情漢魏六朝百三家集巻四十七
