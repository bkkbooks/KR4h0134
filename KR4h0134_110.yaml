body:
  text: 漢魏六朝百三家集卷一百十齊魏收集題詞魏伯起少慚弄戟終免逐兔文章大手激成于調笑一言鄭伯誠有功哉魏書失實穢史流謗然捃托宏博實當時偉作論邢魏者以魏倣任樂安邢倣沈隱侯余謂伯起生平文體得之樂安固多若問史才隱侯宋書亦其兄事也魏帝大射令羣臣賦詩伯起有尺書徴建鄴折簡召長安之句髙文襄壯之稱國光彩侯景寇叛伯起草檄氣雄萬夫至言景竦悖棄若孤雛母戀戀亂臣勤勤賊子直南朝藥石豈止騰聲北土哉魏齊文誥典司最久世罕流傳作賦大才雅自期許乃新殿南狩庭竹離懷諸篇亦未得見使無魏書幾無以表著後代矣且謗深陳夀而福踰崔浩尤從來史官之極幸者也目録詔為武成帝以三臺宫為大興聖寺詔為魏禪齊詔為齊文宣西討詔册文加齊王九錫册文禪齊帝册文啓上魏書十志啓移文為侯景叛移梁朝文為東魏檄梁文書與李德林書重遺李德林書議皇太子西面議文枕中篇為齊即位告天文北齊三部一切經願文祭文祭荆州刺史隂道方文樂府美女篇永世樂棹歌行挾琴歌詩後園宴樂喜雨看栁上鵲晦日泛舟應詔月下秋宴五日庭柏蠟節漢魏六朝百三家集卷一百十目録欽定四庫全書漢魏六朝百三家集卷一百十明張漙輯齊魏收集詔為武成帝以三臺宫為大興聖寺詔門下皇居帝邑揆日瞻星仞雉有常几席斯在雖今古推移文質代變而盛世作範義貴適時朕奄家四海作孚萬國當陽負扆深存庇氓濟下利物無忘懷抱昭仁訓俗不遺造次今臨嚮聽朝咸極崇廣宴息之所不足溫華每謂為之者勞居之者逸至於離宫别館有時遊幸耳目所及聊可忘懷而乃千門洞啓萬柱周架上迫雲漢下臨雷雨巧極金桐麗殫珠璧眷然長想良非宿心三臺並列蕪穢自久天保之末經構甫興仍創棟宇規模宏博有司過實匠人逞功氓庶勞止縻費難量既非殿寢正所便為虛衛之地凝華生白經歷嵗年不剪茅茨事頗逼下卑其宫室有可庶幾顧兹侈麗豈伊寧處自魏朝失政九域崩離人神無主實求明聖我太祖獻武皇帝握兹乾紀執斯地綱懸持日月嘯吒風雲紀忠貞以成務感靈徴而大造爰以克定之初躬圖道場之業神迹冥果理燭幽明朕嗣膺寶祚永惟家祉仰祗先志尚竦玄門忍展聿修之重念歸喜捨之大肌膚匪吝國城何寶期濟率土至於圓極可以三臺宫為大興聖寺此處極土木之壯窮丹素之妍竒怪備於刻削光華畢於圓彩顧使靈心肹蠁神物奔會真覺唯寂有感必通化為淨土廣延德衆心若琉璃法輪常轉灑甘露於大千照慈燈於曠劫為魏禪齊詔三才剖判百王代興治天靜地和神敬鬼庇民造物咸自靈符非一人之大寶實有道之神器昔我祖宗應運奄一區宇歷聖重光暨於九葉德之不嗣仍離屯圯盜名字者遍於九服擅制命者非止三公主殺朝危人神靡繫天下之大將非魏有賴齊獻武王奮揚靈武尅剪多難重懸日月更綴參辰廟以掃除國由再造鴻勳巨業無德而稱逮文襄承搆世業逾廣邇安逺服海內晏如國命已康生生得性迄相國齊王緯文經武統兹大業盡睿窮幾研深測化思隨冥運智與神行恩比春天威同夏日坦至心於萬物被大道於八方故百僚師師朝無秕政網疏澤洽率土歸心外盡江淮風靡屈膝辟地懷人百城奔走關隴慕義而請好瀚漠仰德而致誠伊所謂命世應期實撫千載禎符雜遝異物同途謳頌填委殊方一致代終之迹斯表人靈之契已合天道不逺我不獨知朕入纂鴻休將承世紀籍援立之厚延宗社之算靜言大運欣於避賢逺惟唐虞禪代之典近想魏晉揖讓之風其可昧興替之禮稽神祇之望今便遜於别宫歸帝位於齊國推聖與能眇符前軌王者宣布天下以時施行為齊文宣西討詔朕歷數在躬志清四方蕞爾秦隴久阻風化混一之事期在今日必當訓旅誓衆天動雲臨朕已下甲汾流沈船晉地便當躬率將士平陵王壁徑掩長安梟彼凶首雖藏山沒水終不縱赦朕與梁國舊敦好睦近聞其姦乃欲規謀宜令上黨王渙總勒熊羆星流風卷王者之言明如日月宜宣內外咸使聞知册加齊王九錫册文於戲敬聽朕命夫唯天為大列晷宿而垂象謂地蓋厚疏川嶽以阜物所以四時代序萬類駢羅庶品得性羣形不夭然則皇王統厯深視高居拱默垂衣寄成師相此則夏伯殷尹竭其股肱周成漢昭無為而治頃者天下多難國命如旒則我建國之業將墜於地齊獻武王奮迅風雲大濟艱危爰翼朕躬國為再造經營庶土以至勤憂及文襄承構愈廣前業康邦夷難道格穹蒼王縱德應期千齡一出惟幾惟深乃神乃聖大崇霸德實廣相猷雖冥功妙實藐絶言象摽聲示迹典禮宜宣今申後命其敬虛受王搏風初舉建旟上地庇民立政時雨滂流下識亷耻仁加水陸移風易俗自齊變魯此王之功也仍攝天臺總參戎律䇿出若神威行朔土引弓竄迹松塞無煙此又王之功也逮光統前緒持衡匡合華戎混一風海調夷日月光華天地清晏聲接響隨無思不偃此又王之功也逖矣炎方逋違正朔懷文曜武授略申規淮楚連城漼然桑落此又王之功也關峴襟帶跨躡蕭條腸胃之地嶽立鴟跱偏師才指渙同氷散此又王之功也晉熙之所險薄江雷逈隔聲教迷方未改命將鞠旅覆其巢穴威略風騰傾懾南海此又王之功也羣蠻跋扈世絶南疆搖蕩邊陲亟為塵梗懷德畏威向風請順傾陬盡落其至如雲此又王之功也胡人别種延蔓山谷酋渠萬旅廣袤千里憑險不恭恣其桀黠有樂淳風相攜叩欵粟帛之調王府充積此又王之功也茫茫涉海世敵諸華風行鳥逝倐來忽往既飲醇醪附同膠漆氊裘委仞竒獸銜尾此又王之功也秦川尚阻作我仇讐爰挹椒蘭飛書請好天動其衷辭卑禮厚區宇乂寧遐邇畢至此又王之功也江隂告禍民無適歸蕭宗子弟尚相投庇如鳥還山猶川赴海荆江十部俄而獻割乘此會也將混來方此又王之功也天平地成率土咸茂禎符顯見史不停筆既連百木兼呈九尾素過秦雀蒼比周烏此又王之功也搜揚管庫衣冠獲序禮云樂云銷沉俱振輕徭徹賦矜獄寬刑大信外彰深仁逺洽此又王之功也王有安日下之大勳加以表光明之盛德宣贊洪猷以左右朕言昔旦奭外分毛畢入佐出內之任王宜總之人謀鬼謀兩儀協契錫命之行義申公道以王踐律蹈禮軌物蒼生圓首安志率心歸道是以錫王大路戎路各一玄牡二駟王深重民天唯本是務衣食之用榮辱所由是用錫王衮冕之服赤舄副焉王深廣惠和易調風化神祇且格功德可象是用錫王軒懸之樂六佾之舞王風聲振赫九域咸綏逺人率俾奔走委賮是用錫王朱户以居王求賢選衆草萊以盡陳力就列罔非其人是用錫王納陛以登王英圖猛槩抑揚千品毅然之節肅是非違是用錫王武賁之士三百人王興亡所繫制極幽顯糾行天討罪人咸得是用錫王鈇鉞各一王鷹揚豹變實扶下土狼顧鴟張罔不彈射是用錫王彤弓一彤矢百盧弓十盧矢千王孝悌之至通於神明率民興行感逹區宇是用錫王秬鬯一卣圭瓚副焉往欽哉其祗順往册保弼皇家用終爾休德對揚我太祖之顯命禪齊帝册文咨爾相國齊王夫氣分形化物繫君長皇王遞興人非一姓昔放勳馭世沉璧屬子重華握厯持衡擁璇所以英賢茂實昭晰千古豈盛衰有運興廢在時知命不得不授畏天不可不受是故漢劉告否當塗順民曹厯不永金行納禪此皆重規襲矩率由舊章者也我祖宗光宅混一萬宇迄於正光之末妍孽乘權厥政多僻九域離蕩永安運窮人霛殄瘁羣逆滔天割裂四海國土臣民行非魏有齊獻武王應期授手鳯舉龍驤舉廢極以立天扶傾柱而鎮地剪滅黎毒匡我墜厯有大德於魏室被博利於蒼生及文襄繼軌誕光前業內勦凶權外摧侵叛遐邇肅晏功格上玄王神祗協德舟梁一世體文昭武追變窮微自舉迹藩旟頌歌總集入統機衡風猷𢎞逺及大承世業扶國昌家相德日躋霸風愈邈威靈斯暢則荒逺奔馳聲略所播而鄰敵順欵以富有之資運英特之氣顧盼之間無思不服圖牒潛藴千祀彰明嘉禎幽祕一朝紛委以表代德之期用啓興邦之迹蒼蒼在上照臨不逺朕以虛昧猶未逡巡靜言愧之坐而待旦且時來運往媯舜不暇以當陽世革命改伯禹不容於北面况於寡薄而可踟蹰是以仰協穹昊俯從百姓敬以帝位式授於王天祿永終大命格矣於戲其祗承歷數允執其中對揚天休斯年千萬豈不盛歟啓上魏書十志啓臣收等啓昔子長命世偉才孟堅冠時特秀憲章前哲裁勒墳史紀傳之間中以書志緒言餘迹可得而聞叔峻刪緝後劉紹統削撰季漢十志實範遷固表蓋闕焉曹氏一代之籍了無具體典午終世之筆罕云周洽假復事播四夷盜聽間有小道俗言要竒好異考之雅舊咸乖實録自永嘉喪圯中原淆然偏偽小書殆無可取魏有天下跨蹤前載順末克讓善始令終陛下極聖窮神奉大屈已顧盻百皇指掌萬世深存有魏撫運之業永念神州人倫之緒臣等肅奉明詔刋著魏籍編紀次傳備聞天旨竊謂志之為用網羅遺逸載紀不可附傳非宜理切必在甄明事重尤應標著搜獵上下總括代終置之衆篇之後一統天人之迹褊心未識輒在於此是以晚始撰録彌歷炎涼採舊增新今乃斷筆時移世易理不刻船登閣含毫論敘殊致河溝往時之切釋老當今之重藝文前志可尋官氏魏代之急去彼取此敢率愚心謹成十志二十卷請續於傳末并前例目合一百三十一卷臣等妨官秉筆迄無可採塵黷旒冕墮深氷谷謹啓移文為侯景叛移梁朝文夫化成萬物分界九道紀之以山河照之以日月方足圓首含氣呈形咸總之於聖人畢會之以朝市皇魏應銜甲之祕圖納封金之寶命萬方為宅四海為家卜世靈長將踰八百天壤之間朝不别焉唯夫三江五湖九蠻百濮其地如掌人鳥未分瞻星昧環拱之方托水迷朝宗之義積蠅為衆長蛇稱長石田無菽粟之用衆人非聲教所孚是以年歷三偽棄而不有豈力不足蓋所未徴而陸梁塗泥時軼強鄙天討所遺理存惡殺自二紀及茲中原多故未清區宇文武兼勤偃伯歸戰有懷勞止將令動植俱仰堯心遂冠蓋括途象胥提告推誠蹶然類識王道授衣禮節拜首歸仁舞戚所以為髙止戈故能稱大方知夙沙交臂不待兵車有苖納欵未勞征伐而庸夫為善希能令終狂人克念更知徒語聞利無匹夫之信好虐有助鬼之心白頭為賊曽莫自揆嘉文浮功甘於茍得罔顧榆次之禍詎識江浦之禽侯景一竪微蔑民斯下矣人倫士操本自不倫直以少從羇勒頗習趨走叨黍名器事出爾朱藏情諂笑唯利是視義兵同舉羣胡覆族雖狐祭首丘事非小人而忘恩背本景為先至不義不信自此可知但丁公之戮時有未可也大澤深山龍蛇並育遂容其悔非棄其瑕穢任以將率授以兵符庶其被鞍銜錬盡力馳驟指蹤投緤駑兔或擒而弱才負重折足是慮置之不爭之地虛出韓鄭之間曽無戰伐之勤可言摧陷之績嵗往年徂率無可紀而腹心羣小信納逋亡劫奪行道侵掠民庶流聲逺聞王法有典驄馬將出朱筆且行自貽伊戚了不知咎盜憎主人乃圖逆節拔本塞源委身賊虜逼脅居民翻蕩城池義手曲躬千里唯諾殘賊相依欣同鱗水寵以大位屬以東方外曰臣主內深骨肉安危契濶約以死生拯其鼎鑊之命全其虀粉之福時不暇浹翻然易慮還相掩擊事劇仇讐反覆剽獲莫非此類至於老母暮倚少弟升岡妻望行夫子號出父食毛之屬可為痛心哉景忽之如草芥棄之如塵垢任其斫截之誅安其烹斬之痛放麑食子有以可親觀臧窮否恥其並主獸心人面華裔同讐歸家懼執法之刑赴賊反噬臍之釁首領無地進退數窮遂騁邪説自託左右茍有君子義均逐雀而彼方上下樂禍好亂叛竊之竪獲毒之人圖浮芥之小利忘丘山之大禍乃崇飾土偶被以玄黃馳馬髙蓋載鼷為重委以専征施其爪角驅逼子姓率我叛亡逼厭虐之侣鞠苦役之衆蟻攢蚋集侵竊邊鄙恤患分災本不要於違僻違衆悖禮蓋神明之所誅皇帝垂旒華土則天而動卷覆三古懷佩百王掌握中道崇基增構殊塗同會百慮一歸中外禔福戎華俱庇持秋霜夏震之威以拔山超海之力顧指則風雲總至回眸而山嶽削平雖復旗鼓所臨有征無戰猶以師出而服辱在我世所務者息民所存者文德豈復以擒將威敵漂杵溺驂為功於一時示武於千載且天生五材有聞前古禍非我貽其得已乎遂置壇命將持柯畢禮引營就道分途競馳批熊舉輪之士翹關扛鼎之卒被組橫矛執殳挺劒龍駒並躍驥子千羣沸䀨天壤蒸鬱雲霄一朝指揮倐忽千里候騎羅絡聊逞前驅天兵之鼓未鳴衆軍之旗詎接而荆揚烏合一朝崩解塞州滿野馘耳截鼻以千萬計不可勝數宗親節將咸見擒束委命軍吏憂在釁鼓楚兵吳甲積若山丘青鵲赤烏噎流斷岸千金之貴為我資焉痛辱可哀其利安在覆師喪旅禍本可尋方之噬臍悔之靡及皆侯景叛戾虛相陷誘指成提挈之舉終無犄角之勢景棄本趨末背國違鄉部下數千屈逼羅網離親懷土一日三秋拘網立匏朝不謀夕豈能搖足東上逺赴彭城天奪彼魄信納虛詭使蕭明貴孫面縛於徐泗景為凶藪逡巡而坐觀託人七尺之身居人成敗之地急病讓夷固若此也兩端自見故態未除今知東南滌蕩睢潼清復梁之喪師單輪不返擊援之期終當無日勢窮路盡憂在滅亡事留變生將謀及已且彼軍殱殄江淮屠酷禍源釁迹景實為之上懼金陵君長致請設之責下恐荆吳子弟洗父兄之寃愚小猜驚將興異計乘専任之機藉方面之重必當招結傖楚扇合無賴內自封植外絶防禦因見信而類起出不疑以竊發事比疾雷理同激矢上或憑陵乘疾専擅縱橫下則鴟峙淮淝覬覦叛渙老疾姦回不虛然也而彼土區區厚加崇納置之襟帶之方處以藩籬之所費金帛於烈火罄酒漿於漏巵非乘景虛聲委其實用夫量材授任必原其始考行責成當存其大景豺聲蜂目之首狼心狐魅之徒義無父子棄同即異捐親背德於我尚反目而去在梁則何施可懷且我重傷心尾大不掉魚脫於淵義彰老氏而假威凶險授柄姦回欲求肝膽之誠更啓危亡之兆固智者不為迷者遂去若抽薪止沸剪草除根壺首囊頭義手械足返國姦於司敗歸侵地於玄武非直惡之在今天道人事實棄無禮茍違之者其長世何若悔非知罪恭承德音且欲飛驛合符班師凱入悠悠水鄉有救其死若乃執飾非之辨固遂過之失便當盡常勝之戰極必取之攻飛江南渡深山將恐削壤卑名雖頓顙而不獲亡宗滅廟望喬木而可悲昔田假英人於期壯士窮而歸我許以入懷景竦悖狗子攪亂四國庸可紓難棄若孤雛何足戀戀於亂臣勤勤於賊子也王者之威心厲如霜雪信同寒暑言猶麗天移至深念變通熟量可否幸思大雅無貽後悔為東魏檄梁文觀夫辰象麗天山嶽鎮地方以類聚物以羣分建之以邦國樹之以君長日月於是莫二宇宙所以總一雖五運相推百王革命此道之一作所行孰之能改一作孰云能易而皇家承統光配彼天義洽幽明化周動植崇文德以來逺修禮讓以止訟舞干戚於兩階執玉帛於萬國玄功潛運至德旁通百姓日用而不知兆民受賜而無迹唯彼吳越獨阻聲教匪民之咎責有由焉而元首懷止戈之心上宰薄兵車之會遂解縶南冠喻以好睦舟車遵泝州陸同光亭檄息奔走之勞屯戍無逼卒之變雖嘉謨長算爰自我始而罷兵息氏彼獲其利侯景豎子本無事業乃枉道於人間遂乾沒於世上鳴伏於爾朱之門鎮守於普泰之日曽無為王之識詎有挈瓶之智既而投命義旗歸身幕府殊異雍齒有類丁公時逢寬政得免大戮棄其瑕滓收其力用預在行伍參迹驅馳及秦隴逋誅每事經略以河南是空虛之地漢陽非兵戰之衝薄存犄角聊示旗鼓豈資實效寄以遊聲軍機催勒蓋維景任總兵統旅則有司存而愚褊有積驕憤遂甚屢犯軍紀自生疑二禍心潛搆翻成亂階負恩棄德罔恤天討不義不昵厚而必顛委慈母似脫屣棄寵弟如遺芥龍鍾稚子痛苦成行孌彼諸姬破亡為伍滅伯春之婉轉慕薑兒之爽言不與狼虎同仁而共豺貍等惡及逺託關隴依憑姦異逆主定君臣之分賊臣結兄弟之親解其倒懸仰人鼻息豈曰無恩終成難養俄而易慮躬擐干戈釁暴惡盈側首無託以金陵逋逃之藪江南統御一作流離之地甘辭卑禮進熟圖身讒言浮説抑可知矣叛竪投命豈將擇音而偽朝大小幸災忘義主荒於上臣蔽於下逐雀去草曽不是圖竊寶叛邑椒蘭比好人而無禮其能國乎亦既失信不亡何待今帝道休明皇猷允塞四民樂業百靈效祉故丞相材標國禎道潤時雨義冠伊霍勳蓋桓文大君立德世功世祿作民舟楫為國棟梁內外齊心上下同德蛟騰虎嘯風生雲起摩日則車懸轉舍排山則龍門洞開吞雲夢於胸中運天下於掌內雖有賊臣去國亡卒出境何異一毛之落牛體雙鳬之飛海曲彼既連結姦惡斷絶鄰好追兵保境縱盜侵國蓋物無定方事無常勢或乘利而受害或因得而更失是以吳侵齊境遂致勾踐之師趙納韓地終有長平之役矧乃鞭撻疲民侵軼徐部築壘擁川捨信邀利此而可忍孰不可懷是以援乘麾殞之將投石拔距之士深衛偽主信納亡叛含怒作色如赴私讐意存涉血義不旋踵攻戰之利實若有神徴兵聚衆依山傍水舉螳蜋之斧被蛣蜣之甲當窮轍以待輪坐積薪而候燎及其鋒創暫援埃塵旦接便已亡戟棄戈土崩瓦解貞陽以從一作猶子之親為戎首之任非獨一作但力屈道窮亦將無路還蜀兼亦一作復挾子垂翅俱在籠樊將士以昧禍之心為助亂之事皆掬指舟中披甲鼓下同宗異姓纍纍相望曲直既殊強弱不等父出子孤自取其敗違卜愎諌何以辭責雖復貪利茍得背同即異獲一人而失一國見黃雀而忘深穽食鈎吻以療飢飲鴆毒以救渴智者所不為仁者所不向誠既往之難逮猶將來之可追景以鄙俚之夫遭風雲之會位登三事邑啓萬家揣身量分久當止足而周章向背離披不已天豈徒然意亦可見彼乃示之以利器誨之以慢藏使其勢得容姦令其時堪乘便既南風不競天亡有徴老賊姦謀將復作矣然則摧堅強者難為功拉枯朽者易為力計其雖非孫吳猛將燕趙精兵猶是久涉行陳曽習軍旅豈同輕剽之師不比危脆之衆距一作拒此則作氣不足攻彼則為勢有餘恐尾大於身踵粗於股倔強不掉狼戾難馴呼之則反速而釁小不徴則叛遲而禍大會應遙望廷尉不肯為臣自據淮南亦欲稱帝但恐楚國亡猿禍延林木城門失火殃及池魚橫使漢江一作江黃士子荆揚人物死亡矢石之下支一作夭折露霧之中彼梁主操行無聞輕險有素工用其短以少為多反覆山淵顛倒冠履射爵論功蕩舟稱力年既老矣耄又及之政荒民流禮崩樂壞改換朝章變易官品雖世異漢朝而事同新室加以用捨乖方立廢失所矯情動衆飾智驚愚毒螫滿懷妄敦戒業躁競盈胸謬治清淨內恣鴟靡外逞殘賊人人厭苦家家思亂災異降於上怨讟興於下履霜有漸堅氷且至恃浮一作將險躁之風俗任輕薄之子孫朋黨路開兵權在外必將禍生骨肉難起腹心強弩衝城長戟指闕徒探雀鷇無救府藏之虛空伺熊蹯詎延晷刻之命外崩中潰今實其時鷸蚌相危一作扼我乘其弊方使髙旗舒斾長轂啓行迅騎追風精甲耀日四七並列百萬為羣風飄雲動星羅海運以此赴敵何敵不摧以此攻城何城不陷猶為岸上之虎當作水中之龍以轉石之形為破竹之勢將使鍾山渡江青蓋入洛荆棘生建業之宫麋鹿遊姑蘇之館但恐兵車之所􅞂轢劒騎之所蹈踐杞梓於焉傾折竹箭以此摧殘若吳之王孫蜀之公子順時以動見機而作面縛銜璧肉袒牽羊歸欵軍門委命下吏當使焚櫬而出拂席相待必以楚材將為晉用固乃喜得異度實自利獲士衡士龍即援客卿之族將加驃騎之號斯蓋壯士封侯之日丈夫立節之秋冬氷可折時不再來先事預懷有如皎日王侯無種工拙在人凡百君子勉求多福若不改迷坐待淪沒一旦暴骨草莽流血成川猶且不悟噬臍何及故宣往意馳此簡書檄之到彼咸其申省此作是杜弼所製據藝文稱魏收作今姑存之書與李德林書收與陽休之論齊書起元事敕集百司會議收與德林書前者議文總諸事意小如混漫難可領解今便隨事條列幸為留懷細加推逐凡言或者皆是敵人之議既聞人説因而探論耳重遺李德林書惠示二事感佩殊深以魯公諸侯之事昨小為疑息姑不書即位舜禹亦不言即位息姑雖攝尚得書元舜禹之攝稱元理也周公居攝乃云一年救亂似不稱元自無大傳不得尋討一之與元其事何别更有所見幸請論之議皇太子西面議天保元年皇太子監國在西林園冬會羣議皆東面二年於北城第內冬會又議東面陸卬疑非禮魏收改為西面去天保初皇太子監國冬會羣官於西園都亭坐從東面義取於向中宫臺殿故也二年於宫冬會坐乃東面某竊以為疑前者遂有别議議者同之邢尚書以前定東面之議復申本懷此乃國之大禮無容不盡所見收以為太子東宫位在於震長子之義也案易八卦正位向中皇太子今居北城於宫殿為東北南面而坐於義為背也前者立議據東宫為本人案東宫舊事太子宴會多以西面為禮此又成證非徒言也不言太子常無東南二面之坐但用之有所至如西園東面所不疑也未知君臣車服有同異之議何為而發就如所云但知禮有同者不可令異不知禮有異者不可令同茍别君臣同異之禮恐重紙纍札書不盡也文枕中篇收以子姪少年申以戒厲著枕中篇吾曽覽管子之書其言曰任之重者莫如身途之畏者莫如口期之逺者莫如年以重任行畏途至逺期惟君子為能及矣追而味之喟然長息若夫嶽立為重有潛戴而不傾山藏稱固亦趨負而弗停呂梁獨浚能行歌而匪惕焦原作險或削踵而不驚九陔方集故眇然而迅舉五紀當定想窅乎而上征茍任重也有度則任之而愈固乘危也有術蓋乘之而靡恤彼其逺而能通果應之而可必豈神理之獨爾亦人事其如一嗚呼處天壤之間勞死生之地攻之以嗜欲牽之以名利梁肉不期而其臻珠玉無足而俱致於是乎驕奢仍作危亡旋至然則上智大賢唯幾唯哲或出或處不常其節其舒也濟世成務其卷也聲銷迹滅玉帛子女椒蘭律吕諂諛無所先稱肉度骨膏脣挑舌怨惡莫之前勳名共山河同久志業與金石比堅斯蓋厚棟不撓遊創砉然逮於厥德不常喪其金璞馳騖人世鼓動流俗挾湯日而謂寒包溪壑而未足源不清而流濁表不端而影曲嗟乎膠漆謂堅寒暑甚促反利而成害化榮而就辱欣戚更來得喪仍續至有身禦魑魅魂沉狴獄詎非足力不強迷在當局孰可謂車戒前傾人師先覺聞諸君子雅道之士遊遨經術厭飫文史筆有竒鋒談有勝理孝悌之至神明通矣審道而行量路而止自我及物先人後已情無繫於榮悴心靡滯於愠喜不養望於丘壑不待價於城市言行相顧慎終猶始有一於斯鬱為羽儀恪居喪事知而不為或左或右則髦士攸宜無悔無吝故髙而不危異乎勇進忘退苟得患失射千金之産邀萬鍾之秩投烈風之門趣炎火之室載蹶而墜其貽宴或蹲乃喪其貞吉可不畏歟可不戒歟門有倚禍事不可不密墻有伏寇言不可或失宜諦其言宜端其行言之不善行之不正鬼執強梁人囚徑廷幽奪其魄明天其命不服非法不行非道公鼎為已信私玉非身寶過緇為紺踰藍作青持繩視直置水觀平時然後取未若無欲知止知足庶免於辱是以為必察其幾舉必慎於微知幾慮微斯亡則稀既察且慎福祿攸歸昔蘧瑗識四十九非顔子幾三月不違跬步無已至于千里覆一簣進及於萬仞故云行逺自邇登髙自卑可大可久與世推移月滿如規後夜則虧槿榮於枝望暮而萎夫奚益而非損孰有損而不害益不欲多利不欲大唯居德者畏其甚體真者懼其大道尊則羣謗集任重而衆怨會其達也則尼父栖遑其忠也而周公狼狽無曰人之我狹在我不可而覆無曰人之我厚在我不可而咎如山之大無不有也如谷之虛無不受也能剛能柔重可負也能信能順險可走也能知能愚期可久也周廟之人三緘其口漏巵在前欹器留後俾諸來裔傳之座右為齊即位告天文皇帝臣洋敢用玄牡昭告於皇皇后帝否泰相沿廢興迭用至道無親應運斯輔上覽唐虞下稽魏晉莫不先天揖讓考歷終歸魏氏多難年將三十孝昌已後內外去之世道橫流蒼生塗炭賴我獻武拯其將溺三建元首再立宗祧掃絶羣凶芟夷姦宄德被黔黎勳光宇宙文襄嗣武尅搆鴻基功浹寰宇威陵海外窮髮懷音西寇納欵青丘保候丹穴來庭扶翼危機重匡頽運是則有大造於魏室也魏帝以卜世告終上靈厭德欽若昊天允歸大命以禪於臣洋夫四海至公天下為一總民宰世樹之以君既川嶽啓符人神效祉羣公卿士八方兆庶僉曰皇極乃顧於上魏朝推進於下天位不可以暫虛遂逼羣議恭膺大典猥以寡薄託於兆民之上雖天威在顔咫尺無逺循躬自省實懷秪惕敬簡元辰升壇受禪肆類上帝以答萬國之心永隆嘉祉保祐有齊以被於無窮之祚北齊三部一切經願文三有分區四生稟性共遊火宅俱淪欲海所以法王當洲渚之運覺者應車乘之期導彼沈迷歸兹勝地自寶雲西映法河東瀉甘露橫流隨風感授皇家統天尊道崇法拔羣品於有待驅衆生於不二所以刻檀作繢搆石雕金遍於萬國塵沙數等復詔司存有事緇素精誠踰於皮骨句偈盡於龍官金口所宣總勒繕寫各有二部合若干卷用此功德心若虛空以平等施無思不洽藉我願力同登上果祭文祭荆州刺史隂道方文維太昌元年十二月庚申朔越十二日辛未友人巨鹿魏收謹以清酌少牢之饌敬祭于荆州刺史隂君之靈嗚呼哀哉惟君世載不殞英聲在兹風流有屬自爾𢎞之孝為行本忠實身基既言斯立罄禮窮詩器則清賞才惟英博於暢風雷蕭條丘壑願言朝市忘懷淡薄比契沉冥均情寂寞往塵守官及爾同僚塤箎合韻琴瑟俱調丹墀踵武清道齊鑣迹淪間曠心共津濠乃眷平生相欣同趨殷勤宴喜流連辭賦溘矣不追長違世務詠歌徒在音徽空樹昔猶肢體與子裘裳今其往也生死殊方形骸何促天地何長申兹沃酹贈以哀傷嗚呼哀哉樂府美女篇二首楚襄遊夢去陳思朝洛歸參差結旌斾掩靄頓驂騑變化看臺曲駭散屬川沂仍令賦神女俄聞要虙妃照梁何足艷升霞反奮飛可言不可見言是復言非闕我帝更朝衣擅寵無論賤入愛不嫌微智瓊非俗物羅敷本自稀居然陋西子定可比南威新吳何為誤舊鄭果難依甘言誠易汚得失定因機無憎藥英妒心賞易侵違永世樂綺窗斜影入上客酒須添翠羽方開美鉛華汗不霑關門今可下落珥不相嫌棹歌行雪溜添春浦花水足新流桃發武陵岸柳拂武昌樓挾琴歌春風宛轉入曲房兼送小苑百花香白馬金鞍去未返紅妝玉筯下成行詩後園宴樂束馬輕燕外獵雉陋秦中朝車轉夜轂仁旗指旦風式宴臨平圃展衛寫屠穹積崖疑造化導水逼神功樹靜歸煙合簾疏反照通一逢堯舜日未假北山叢喜雨霞暉染刻棟礎潤上雕楹神山千葉照仙草百花榮瀉溜髙齋響添池曲岸平滴下如珠落波回類璧成氣調登萬里年和欣百靈定知丹甑出何須銅雀鳴看柳上鵲背嵗心能識登春巢自成立枯隨雨霽依枝須月明疑是雕籠出當由抵玉驚間關拂條軟回復振毛輕何獨離婁意傍人但未聽晦日泛舟應詔裊裊春枝弱關關新鳥呼棹唱忽逶迤菱歌時顧慕睿賞芳月色宴言忘日暮遊豫慰人心照臨康國步月下秋宴此夕甘言宴月照露方塗使星疑向蜀劍氣不關吳良交契金水上客慰萱蘇何必應劉輩還來遊鄴都五日麥涼殊未畢蜩鳴早欲聞喧林尚黃鳥浮天已白雲辟兵書鬼字神印題靈文因想蒼梧郡兹日祀東君庭柏古松圖偃蓋新柏寫爐峰凌寒翠不奪迎暄緑更濃茹葉輕沈體咀實化衰容將使中臺麝違山能見從蠟節凝寒迫清祀有酒宴嘉平宿心何所道藉此慰中情漢魏六朝百三家集卷一百十
