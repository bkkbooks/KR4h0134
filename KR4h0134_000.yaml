body:
  text: 漢魏六朝百三家集總集類提要臣等謹案漢魏六朝百三家集一百十八巻明張溥編溥有詩經注疏大全合纂已著録自馮惟訥輯詩紀而漢魏六朝之詩滙于一編自梅鼎祚輯文紀而漢魏六朝之文滙于一編自張燮輯七十二家集而漢魏六朝之遺集滙于一編溥以張氏書為根柢而取馮氏梅氏書中其人著作稍多者排比而附益之以成是集巻帙既繁不免務得貪多失於限斷編録亦往往無法考證亦往往未明有本係經説而入之集者如董仲舒集録春秋隂陽劉向劉歆集録洪範五行傳之類是也有本係史類而入之集者如禇少孫集全録補史記荀悦集全録漢紀論之類是也有本係子書而入之集者如諸葛亮集録心書蕭子雲集録凈住子是也有牴牾顯然而不辨者如張衡集録周天大象賦稱魏武黄星之類是也有是非疑似而臆斷者如陳琳傳中有袁紹使掌書記一語遂以三國志注紹冊烏桓單于文録之琳集是也有偽妄無稽而濫收者如東方朔集録真仙通鑑所載與友人書及十洲記序之類是也有移甲入乙而不覺者如庾信集録楊烱文二篇之類是也有采摭未盡者如束晳集所録餅賦寥寥數語不知祝穆事文類聚所載尚多之類是也有割裂失次者如鍾㑹集成侯命婦傳三國志注截載兩處遂分其首尾各為一篇之類是也有可以成集而遺之者如枚乗七發忘憂館柳賦諫吳王書及玉臺新詠所載古詩可成一巻左思三都賦白髮賦髑髏賦及文選所載咏史詩亦可成一巻而擯落不載之類是也然州分部居以文𨽻人以人𨽻代使唐以前作者遺篇一一畧見其梗概雖因人成事要不可謂之無功也周亮工書影曰西蜀楊升菴太史著書至二百餘種豫章朱鬱儀中尉著書至一百十二種當時未聞有茂陵之求張天如雖一時名流然無多撰著當時至見于章奏求其遺書人有幸有不幸如此云云其于溥頗致不滿今案溥所論著不出當時坊刻之習誠可付之無譏若此一編則原原本本足資檢核實逺勝其他作雖使肩隨于二人固亦無不可矣乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
