外物為念在𤣥蹤朋來握石髓賓至駕輕鴻都令人徑絶惟使雲路通一舉凌倒景無事適華嵩寄言賞心客歲暮爾來同還園宅奉酬華陽先生早欲尋名山期待㛰嫁畢二事雖云已此外復非一忽聞龍圖至仍覩榮光溢副朝首八元開壤賦千室冠纓曾弗露風雨未嘗櫛鳴玉響洞門金蟬映朝日暫無小人報徒叨令尹秩豈忘平生懷靡盬不遑恤華陽先生登樓不復下贈呈側聞上士說尺木乃騰霄雲駢不展地仙居多麗譙卧待三芝秀坐對百神朝銜書必青鳥佳客信龍鑣非止靈桃實方見大椿凋酬華陽陶先生三清未可覿一氣且空存所願回光景拯難拔危魂若䝉九丹贈豈懼六龍奔奉華陽王外兵餐玉駐年齡吞霞反容質渺識青丘樹回見扶桑日爛漫蜃雲舒嶔崟山海出赤松澗松子排煙去英靈眇難測惟有清澗流潺湲終不息神丹在兹化雲軿於此陟願受金液方片言生羽翼渴就華池飲饑向朝霞食何時當來還延佇青巖側八關齊因戒倦輪飄習障從塵染四衢道難闢八正扉猶掩得理未易期失路方知險迷塗既已復豁悟非無漸古意挾瑟叢臺下徙倚愛容光佇立日已暮戚戚苦人腸露葵已堪摘淇水未沾裳錦衾無獨暖羅衣空自香明月雖外照寧知心內傷少年新婚為之詠山隂栁家女薄言出田墅丰容好姿顔便僻巧言語腰肢既軟弱衣服亦華楚紅輪映早寒畫扇迎初暑錦履並花紋繡帶同心苣羅襦金薄厠雲鬢花叉舉我情已鬱紆何用表﨑嶇託意眉間黛申心口上朱莫爭三春價坐喪千金軀盈尺青銅鏡徑寸合浦珠無因逹往意欲寄雙飛鳬裾開見玉趾衫薄映凝膚羞言趙飛燕笑殺秦羅敷自顧雖悴薄冠蓋曜城隅髙門列騶駕廣路從驪駒何慚鹿盧劍詎減府中趨還家問鄉里詎堪持作夫夢見美人夜聞長嘆息知君心有憶果自閶闔開魂交覩顔王臺作容色既薦巫山枕又奉齊眉食立望復橫陳忽覺非在側那知神傷者潺湲淚沾臆直學省愁卧秋風吹廣陌蕭瑟入南闈愁人掩軒卧髙窗時動扉虛館清隂滿神宇曖微微網蟲垂戶織夕鳥傍櫩飛纓珮空為忝江海事多違山中有桂樹歲暮可言歸休沐寄懷雖云萬重嶺所玩終一作惟一丘階墀幸自足安事逺遨遊臨池清溽暑開幌望髙秋園禽與時變蘭根應節抽憑軒搴木末垂堂對水周紫籜開緑篠白鳥映青疇艾葉彌南浦荷花繞北樓送日隱層閣引月入輕幬㸑熟寒蔬翦賓來春蟻浮來往既云倦光景為誰留宿東園陳王鬭雞道安仁採樵路東郊豈異昔聊可閒余步野徑既盤紆荒阡亦交互槿籬疏復密荆扉新且故樹頂鳴風飈草根積霜露驚麏去不息征鳥時相顧茅棟嘯愁鴟平岡走寒兔夕隂帶層阜長煙引輕素飛光忽我遒豈止歲云暮若䝉西山藥頽齡倘能度行園寒瓜方卧壠秋菰亦滿陂紫茄紛爛漫緑芋鬱參差初菘向堪把時韭日離離髙梨有繁實何減萬年枝荒渠集野鴈安用昆明池和左丞庾杲之移病嵗暮豈云聊參差憂與疾匪浣孰能賜持身固無述握蘭空盈把待漏終不溢囂喧滿眼前簿領紛盈膝安用談天辨徒勞夢賜筆挂冠若東都山林寧復出和竟陵王抄書教微因弛轡維峻屬貞期義乖良未逺斯文煥在兹超河綜絶禮冠楚綴淪詩披縢辨蠧冊酌醴訪深疑澄流黜往性泛略引前滋漢壁含遺篆名山多逸詞緑編方委閣素簡日盈輜空幸參鴛鴦比秀恧瓊芝挹流既知廣復道還自嗤奉和竟陵王郡縣名西都富軒冕南宫溢才彥髙闕連朱雉方渠漸遊殿廣川肆河濟長岑繞崤汧曲梁濟危渚平臯騁悠眄清淵皎澄徹曽山鬱葱蒨陽泉濯春藻隂丘聚寒霰西華不可留東光促奔箭望都逰子懷臨戎征馬倦既豫平臺集復齒南皮宴一窺長安城羞言杜陵掾奉和竟陵王藥名丹草秀朱翹重臺架危岊木蘭露易飲射干枝可結陽隰採辛夷寒山望積雪玉泉亟周流雲華乍明滅合歡葉暮卷爵林聲夜切垂景迫連桑思仙慕雲埓荆實剖丹瓶龍芻汗奔血照握乃夜光盈車非玉屑細栁空葳蕤水萍終委絶黃符若可挹長生永昭晳和陸慧曉百姓名建都望淮海樹闕表衡稽井幹風雲出柏梁星漢齊皇王臨萬宇惠化覃黔黎吉士服仁義宿昔秉華圭庸賢起幽谷欽言非象犀端委康國步偃息召邦攜舉政方分策易紀粲金泥伊余沐嘉幸由是别園畦曽微涓露答光景遂雲西方隨煉丹子薄暮矯行迷三月三日率爾成章麗日屬元已年芳具在斯開花已匝樹流嚶復滿枝洛陽繁華子長安輕薄兒東出千金堰西臨鴈騖陂逰絲應空轉髙楊拂地垂緑幘文照耀紫燕光陸離清晨戲伊水薄暮宿蘭池象筵鳴寶瑟金瓶泛羽巵寧憶春蠶起日暮桑欲萎長袂屢已拂雕胡方自炊愛而不可見宿昔減容儀且當忘情去歎息獨何為織女贈牽牛紅粧與明鏡二物本相親用持施㸃畫不照離居人往秋雖一照一照復還塵塵生不復拂蓬首對河津冬夜寒如此寧遽道陽春初商忽云至暫得奉衣巾施襟已成故每聚忽如新應王中丞思逺明月月華臨靜夜夜靜滅氛埃方暉竟戶入圓影隙中來髙樓切思婦西園逰上才網軒映珠綴應門照緑苔洞房殊未曉清光信悠哉和王中書德充詠白雲白雲自帝鄉氛氳屢回沒蔽虧崑山樹含吐瑶臺月秋風西北起飄我過城闕城闕已參差白雲復離離皎潔在天漢倒影入華池將過丹邱野時至碧林垂九重迎飛燕萬里送翔螭詠雪應令思鳥聚寒蘆蒼雲軫暮色夜雪合且離曉風驚復息嬋娟入綺窗徘徊騖情極弱桂不勝枝輕飛屢低翼玉山聊可望瑶池豈難即和劉雍州繪博山香爐範金誠可則摛思必良工凝芳自朱燎先鑄首山銅瓌姿信嵒崿竒態實玲瓏峰嶝互相拒巖岫杳無窮赤松逰其上斂足御輕鴻蛟螭盤其下驤首盻層穹嶺側多竒樹或孤或復叢巖間有佚女垂袂似含風翬飛若未已虎視鬱餘雄登山起重障左右引絲桐百和清夜吐蘭煙四面充如彼崇朝氣觸石繞華嵩詠湖中鴈白水滿春塘旅鴈每回翔唼流牽弱藻斂翮帶餘霜羣浮動輕浪單泛逐孤光懸飛竟不下亂起未成行刷羽同搖漾一舉還故鄉冬節後至丞相第詣世子車中作亷公失權勢門館有虛盈貴賤猶如此况在曲池平髙車塵未滅珠履故餘聲賔階緑錢滿客位紫苔生誰當九原上鬱鬱望佳城奉和竟陵王經劉巘墓表閭欽逸軌軾墓禮真魂化塗終眇默神理曖猶存塵經一作駕未輟幌髙衡已委門日蕪子雲舍徒望董生園華隂無遺布楚席有靈樽𤣥泉倘能慰長夜且勿論悼亡去秋三五月今秋還照梁今春蘭蕙草來春復吐芳悲哉人道異一謝永銷亡簾屏既毁撤一作屏筵空有設帷席更施張遊塵掩虛座孤帳覆空牀萬事無不盡徒令存者傷侍逰方山應詔清漢夜昭晳扶桑曉陸離發歌摐陽下一作發吹垂楊下建羽朝夕池摐金浮水若聳蹕昭山祗一霑九霄露藜藿終自知樂將殫恩未已應詔凄鏘笙管遒參差舞行亂輕肩既屢舉長巾亦徐換雲鬢垂寶花輕粧染微汗羣臣醉又飽聖恩猶未半泛永康江長枝萌紫葉清源泛緑苔山光浮水至春色犯寒來臨睨信永矣望美曖悠哉寄言幽閨妾羅袖勿空裁餞謝文學離夜漢池水如帶巫山雲似蓋瀄汨背吳潮潺湲橫楚瀨一望沮漳水寧思江海㑹以我徑寸心從君千里外别范安成生平少年日分手易前期及爾同衰暮非復别離時勿言一樽酒明日難重持夢中不識路何以慰相思效古可憐桂樹枝單雄憶故雌歲暮異栖宿春至猶别離山河隔長路路逺絶容儀豈云無可玉堂作我匹寸心終不移庭雨應詔出空寧可圖入庭倍難賦非煙復非雲如絲復如霧霡霂裁欲垂霏微不能注雖無千金質聊為一辰趣初春夾道覔陽春相將共携手草色猶自腓林中都未有無事逐梅花空教信楊栁且復共歸來含情寄杯酒春思楊栁亂如絲綺羅不自持春草黃復緑客心傷此時青苔已結洧碧水復盈淇日華照趙瑟風色動燕姬襟前萬行淚故是一相思傷春弱草半抽黃輕條未全緑年芳被禁籞煙花繞層曲寒苔卷復舒冬泉斷方續早花𣪚凝金初露泫成玉秋夜月落宵向分紫煙鬱氛氳曀曀螢入霧離離鴈度雲巴童暗理瑟漢女夜縫裙新知樂如是久要豈相聞同詠樂器詠篪江南簫管地妙響發孫枝殷勤寄玉指含情舉復垂雕梁再三繞輕塵四五移曲中有生意丹誠君詎知同詠坐上玩器詠竹檳榔盤梢風有徑質柔用道非一平織方以文穿成圓且密薦差雖百品所貴浮天實幸成歡醑餘寧辭嘉宴畢簷前竹萌開籜已垂結葉始成枝繁䕃上蓊茸促節下離離風動露滴瀝月照影參差得生君戶牖不願夾華池玩庭栁輕隂拂建章夾道連未央因風結復解霑露柔且長椘妃思欲絶班女淚成行逰人未應去為此還故鄉麥李青玉冠西海碧石彌外區化為中園實其下成路衢在先良足貴因小邈難逾色潤房陵縹味奪寒水朱摘持欲以獻尚食且踟蹰詠桃風來吹葉動風去畏花傷紅英已照灼况復含日光歌童暗理曲遊女夜縫裳詎減當春淚能斷思人腸詠青苔緣階已漠漠泛水復綿綿微根如欲斷輕絲似更聮長風隱細草深堂沒綺錢縈鬱無人贈葳㽔徒可憐十詠二首領邊繡纎手製新竒刺作可憐儀縈絲飛鳳子結縷坐花兒不聲如動吹無風自裊枝麗色倘未歇聊承雲鬢垂腳下履丹墀上颯沓玉殿下趍鏘逆轉珠珮響先表繡袿香裾開臨舞席䄂拂繞歌堂所歎忘懷妾見委入羅牀懷舊詩九首傷王融元長秉竒調弱冠慕前蹤眷言懷祖武一簣望成峰途艱行易跌命舛志難逢折風落迅羽流恨滿青松傷謝朓吏部信才傑文鋒振竒響調與金石諧思逐風雲上豈言陵霜質忽隨人事往尺璧爾何寃一旦同丘壤傷庾杲之左率馥時譽秀出冠朋僚聳兹千仞氣振此百尋條藴藉含文雅散朗溢風飈楸檟今已合容範尚昭昭傷王諶長史體閒任坦蕩無外求持身非詭遇應物有虛舟心從朋好盡形為歡宴留歡宴未終畢零落委山丘傷虞炎東南既擅美洛陽復稱才携手同歡宴比跡共逰陪事隨短秀落言歸長夜臺傷李圭之少府懷貞節忘軀濟所奉吏道勤不息繁文長自擁既闕優孟歌身沒誰為寵傷韋景猷韋叟識前載博物備戎華稅驂止營校淪跡委泥沙始知庸聼局方悟大音賒傷劉渢處和無近纍天然有勝質蕭瑟負髙情耿介懷秋實義貴良為重蘭摧非所恤一罷平生言寧知携手日傷胡諧之豫州懷風範綽然標雅度處約志不渝接廣情無忤頡頏事刀筆紛綸遞朱素美志同山阿浮年迫朝露詠新荷應詔勿言草卉賤幸宅天池中微根才出浪短幹未搖風寧知寸心裏蓄紫復含紅聼蟬鳴應詔輕生宅園籞復得棲嘉樹豈敢擅洪枝輕條遭所遇葉密形易揚風回響難住詠笙彼美實枯枝孤篠定參差鵾雞已啁唽棗下復林離本期王子宴寧待洛濵吹詠筝秦筝吐絶調玉柱揚清曲絃依髙張斷聲隨妙指續徒聞音繞梁寧知顔如玉詠山榴靈園同佳稱幽山有竒質停采久彌鮮含華豈期實長願微名隱無使孤株出大言應令隘此大泛庭方知九垓局窮天豈彌指盡地不容足細言應令開館尺棰餘築榭微塵裏蝸角列州縣毫端建朝市詠餘雪隂庭覆素芷南階褰緑葹玉臺新落構青山已半虧詠帳甲帳垂和璧螭雲張桂宮隋珠既吐曜翠被復含風侍宴詠反舌假容不足觀遺音猶可薦幸䝉喬樹恩得以聞髙殿寒松梢聳振寒聲青蔥標暮色踈葉望嶺齊喬幹臨雲直詠孤桐龍門百尺時一作峙排雲少孤立分根䕃玉池欲待髙鸞集詠梧桐秋還遽已落春曉猶未荑微葉雖可賤一剪或成圭園橘緑葉迎露滋朱苞待霜潤但令入玉柈金衣非所吝詠梨應詔大谷來既重岷山道又難摧折非所吝但令入玉盤西地梨詩彚作簡文非列茂河陽苑蓄紫濫觴隈翻黃秋沃若落葉春徘徊詠芙蓉微風搖紫葉輕露拂朱房中池所以緑待我泛紅光詠杜若生在窮絶地豈與世相親不顧逢采擷本欲芳幽人詠鹿蔥野馬不任騎兔絲不任織既非中野花無堪麕䴥食甘蕉抽葉固盈丈擢本信兼圍流甘掩椰實弱縷冠絺衣詠菰結根布洲渚垂葉滿臯澤匹彼露葵羮可以留上客早行逢故人車中為贈殘朱猶曖曖餘粉尚霏霏昨宵何處宿今晨拂露歸為鄰人有懷不至影逐斜月來香隨逺風入言是定知非欲笑翻成泣阻雪連句初昕逸翮舉日昃駑馬疲幽山有桂樹歲暮方參差和劉中書仙詩二首清旦發𤣥洲日暮宿丹丘崑山西北映流泉東南流霓裳拂流電雲車委輕霰崢嶸上不覩寥廓下無見殊庭不可及風熛多異色霞衣不待縫雲錦不須織華山館為國家營功德沐芳禱靈嶽稽首恭上𤣥帝昔祈萬夀臣今請億年丹方緘洞府河清時一傳錦書飛雲字玉簡黃金編和王衛軍解講妙輪輟往駕寶樹未開音甘露為誰演得一標道心眇眇𤣥塗曠髙義總成林七花屏塵相八解濯芳襟侍宴謝朏宅餞東歸應制皇情悵東艓羽斾拂南㕓夏雲清朝景秋風揚早蟬飲和陪下席論道光上筵酬孔通直蕩懷蓬居閶闔既洞啓龍樓亦髙闢兩宫集南步二闈引通籍伊爾事清途紛吾供賤役石塘瀨聼猿噭噭夜猿鳴溶溶晨霧合不知聲逺近惟見山重㳫既歡東嶺唱復佇西巖答出重圍和傅昭魯連揚一策陳平出六竒邯鄲風雨散白登烟霧維排雲出九地陵定振五巵秋晨羈怨望海思歸分空臨澥霧披逺望滄流八桂曖如畫三桑眇若浮煙極希丹水月逺望青邱侍宴樂游苑餞徐州刺史應詔沃若動龍驂參差凝鳳管金塘草未合玉池泉將滿憩郊園和約法師採藥郭外三千里欲以貿朝饘繁蔬既綺布密果亦星懸四城門老六龍既驚軫二鼠復馳光衰齡難慎輔暮質易凋傷上巳華光殿七言於維盛世即軒媯朝酆宴鎬復在斯朝光灼爍映蘭池春風婉轉入細枝時鶯顧慕聲合離輕波微動漾羽巵河宗海若生蛟螭浮梁徑度跨回漪朱顔始洽景將移安得壯士駐奔曦六憶詩四首以下雜言憶來時灼灼上階墀勤勤叙别離慊慊道相思相看常不足相見乃忘饑憶坐時㸃㸃羅帳前或歌四五曲或弄兩三絃笑時應無比嗔時更可憐憶食時臨盤動容色欲坐復羞坐欲食復羞食含哺如不饑擎甌似無力憶眠時人眠彊未眠解羅不待勸就枕更須牽復恐傍人見嬌羞在燭前八詠詩登臺望秋月望秋月秋月光如練照曜三爵臺徘徊九華殿九華玳瑁梁華榱與璧璫以兹雕麗色持照明月光凝華入黼帳清輝懸洞房先過飛燕戶却映班姬牀桂宮裊裊落桂枝早寒凄凄凝白露上林晚葉颯颯鳴鴈門早鴻離離度湛秀質兮似規委清光兮如素照愁軒之蓬髮影金階之輕步居人臨此笑以歌别客對之傷且慕經衰圃映寒叢凝清夜帶秋風隨庭雪以偕素與池荷而共紅臨玉墀之皎皎含霜靄之濛濛躪天衢而徙度轢長漢而飛空隱巖崖而半出隔帷幌而才通散朱庭之奕奕入青瑣而玲瓏寒階悲寡鵠沙洲怨别鴻文姬泣胡殿昭君思漢宫余亦何為者淹留此山東㑹圃臨春風臨春風春風起春樹逰絲曖如網落花氛似霧先泛天淵池還過細栁枝蝶逢飛搖揚燕值羽差池揚桂斾動芝蓋開燕裾吹趙帶趙帶飛參差燕裾合且離回簮復轉黛顧步惜容儀容儀已照灼春風復回薄氛氳桃李花青附含素蕚既為風所開復為風所落搖緑蒂抗紫莖舞春雪雜流鶯曲房開兮金鋪響金鋪響兮妾思驚梧臺未隂淇川始碧迎行雨於髙唐送歸鴻於碣石經洞房響紈素感幽閨思帷帟想芳園兮可以逰念蘭翹兮漸堪摘拂明鏡之冬塵解羅衣之秋襞既鏗鏘以動佩又絪縕而流射始搖蕩以入閨終徘徊而緣隙鳴珠簾於繡戶散芳塵於綺席是時悵思歸安能久行役佳人不在兹春風誰為惜歲暮愍衰草愍衰草衰草無容色憔悴荒徑中寒荄不可識昔時兮春日昔日兮春風銜花兮佩實垂緑兮散紅氛氳鳷鵲右照曜望仙東送歸顧慕泣淇水嘉客淹留懷上宫巖􅑍兮海岸冰多兮霰積爛漫兮巖根攢幽兮石隟布綿密於寒臯吐纎踈於危石既惆悵於君子倍傷心於行役露縞枝於初旦霜紅夭於始夕雕芳卉之九衢霣靈茅之三脊風急崤道難秋至客衣單既傷簷下菊復悲池上蘭飄落逐風盡方知歲早寒流螢暗明燭鴈聲斷才續委絶長信宫蕪穢丹墀曲霜奪莖上紫風銷葉中緑山變兮青薇水折兮黃葦秋鴻兮踈引寒鳥兮聚飛徑荒寒草合桐長舊巖圍一作草長荒徑微園庭漸蕪沒霜露日霑衣願逐晨征鳥薄暮共西歸霜來悲落桐悲落桐落桐早霜露燕至葉未抽鴻來枝已素本出龍門山長枝仰刺天上峰百丈絶下趾萬尋懸幽根未蟠結孤株復危絶初不照光景終年負霜雪自顧無羽儀不顧生曲池芬芳本自乏華實無所施公子特留盻王孫少見知分取孤生枿徒置北堂陲宿莖抽晚幹新葉生故枝故枝雖遼逺新葉頗離離春風一朝至榮華坐如斯自惟良菲薄君恩徒照灼顧已非嘉樹空用憑阿閣願作清廟琴為君舞𤣥鶴薜荔可為裳文杏堪作梁勿言草木賤徒照君末光末光不徒照為君含噭咷一作䆗窱陽柯渌水絃隂枝苦寒凋厚德非所任敢不虛其心若逢陽春至吐緑照清潯夕行聞夜鶴聞夜鶴夜鶴呌南池對此孤明月臨風振羽儀伊吾人之菲薄無賦命之天爵抱局促之短懷隨冬春而哀樂愍海上之驚鳬傷雲間之離鶴離鶴昔未離迥發天北垂忽遇疾風起暫下昆明池復畏冬氷合水宿非所宜𣣔棲不可往𣣔去飛已疲勢逐疾風舉求溫向衡楚復值南飛鴻參差共成侶海上多雲霧蒼茫失洲嶼自此别故羣獨向瀟湘渚故羣不離散相依江海畔夜止羽相切晝飛影相亂刷羽共浮沉湛淡泛清潯既不經離别安知慕侶心九冬負霜雪六翮飛不任且飬凌雲翅俯仰弄清音所望浮丘子旦夕來相尋晨征聼曉鴻聼曉鴻曉鴻度將旦跨弱水之微瀾發成山之逺岸怵春歸之未幾傷此歲之云半出海漲之蒼茫入雲途之瀰漫無東西之可辨孰遐邇之能算微昔見於洲渚赴秋期於江漢集徑風於弱軀負重雪於輕翰寒溪可以飲荒臯可以竄溪水徒自清微容豈足玩秋蓬飛兮未極塞草寒兮無色吳山髙兮髙難度越水深兮深不可測羡明月之馳光顧征禽之駛翼伊余馬之屢懷知君行之未極一作息夜綿綿而難曉愁參差而盈臆望山川悉無似唯星河猶可識孤鴈夜南飛客淚夜沾衣春鴻旦暮返客子方未歸歲去歡娛盡年來容貌衰一作非攬袵形雖是撫臆事多違青緺雖長復易解白雲誠逺詎難依解佩去朝市去朝市朝市深一作晨歸暮辭北纓而南徂浮東川而西顧逢天地之降祥值日月之重光伊吾行之未已一作伊當仁之菲薄非余情之信芳充待詔於金馬奉髙宴於柏梁觀鬪獸於虎圈望窈窕於披香逰西園兮登銅雀攀青璅兮眺重陽講金華兮議宣室晝武帳兮夕文昌佩甘泉兮屣五柞簮枍栺音詣兮黻承光託後車兮侍華幄游渤海兮泛清漳天道有盈缺寒暑遞炎凉一朝賣玉碗眷眷惜餘香曲池無復處桂枝亦銷亡清廟徒肅肅西陵久茫茫薄暮余多幸嘉運重來昌沗稽郡之南尉典千里之光貴别北芒於濁河戀橫橋於清渭望前軒之早桐對南階之初卉唯余情之屢傷豈兹焉之能慰眷昔日兮懷哉歲將暮兮歸去來被褐守山東守山東山東萬里鬱青蔥兩溪共一瀉水潔望如空岸側青莎被巖間丹桂叢上瞻既隱軫下睇亦溟濛逺林響咆獸近樹聒鳴蟲路帶若溪右澗吐金華東萬仞倒危石百丈注懸淙掣曵瀉流電奔飛似白虹洞井含清氣漏穴吐飛風玉竇膏滴瀝石乳室空籠峭崿塗彌險巖岨步才通余捨平生之所愛歘暮年之此逢𣣔一去而不還悵鄒一作恨邦衣之未褫揖林壑之清曠事氓俗之紛詭幸帝德之方升值天綱之未毁既除舊而就新故化民而俗徙播趙俗以南徂扇齊風以東靡乳雉方可馴流蝗庶能弭清心矯世濁儉政救民侈秩滿撫白雲淹留事芝髓漢魏六朝百三家集卷八十八
