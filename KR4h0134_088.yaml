body:
  text: 漢魏六朝百三家集卷八十八梁沈約集目録樂府梁雅樂十一首皇雅三曲滌雅一曲牷雅一曲諴雅三曲獻雅一曲禋雅二曲梁南郊登歌詩二首梁北郊登歌二首梁明堂登歌五首青帝赤帝黃帝白帝黑帝梁宗廟登歌七首梁三朝雅樂歌六首俊雅三曲𦙍雅一曲寅雅一曲介雅三曲需雅八曲雍雅三曲五引曲五首角引徴引宫引商引羽引梁鼓吹曲十二首木紀謝賢首山桐柏山道亡忱威漢東流鶴樓峻昏主恣淫慝石首局期運集於穆惟大梁梁大壯大觀舞歌二首大壯舞歌大觀舞歌梁鞞舞歌明之君六首日出東南隅行昭君辭長歌行又君子行從軍行豫章行相逢狹路間長安有狹斜行三婦豔江蘺生幽渚却出東西門行飲馬長城窟青青河畔草梁甫吟君子有所思行白馬篇齊謳行前緩聲歌鼓吹曲二首同諸公賦芳樹臨髙臺洛陽道江南曲東武吟行怨歌行悲哉行擕手曲有所思夜夜曲二曲釣竿臨碣石湘夫人貞女引襄陽白銅鞮歌三首永明樂江南弄四首趙瑟曲秦箏曲陽春曲朝雲曲樂未央四時白紵歌五首春白紵夏白紵秋白紵冬白紵夜白紵詩侍皇太子釋奠宴為南郡王侍皇太子釋奠宴二首三日侍鳳光殿曲水宴應制為臨川王九日侍太子宴九日侍宴樂逰苑從齊武帝琅琊城講武應詔三日侍林光殿曲水宴應制侍宴樂逰苑餞呂僧珍應詔正陽堂宴勞凱旋逰鍾山詩應西陽王教五章登髙望春逰金華山劉真人東山還登𤣥暢樓酬謝宣城朓卧疾新安江至清淺深見底貽京邑逰好送别友人去東陽與吏民别早發定山循役朱方道路和竟陵王逰仙詩二首遊沈道士館還園宅奉酬華陽先生華陽先生登樓不復下贈呈酬華陽陶先生奉華陽王外兵赤松澗八關齊古意少年新婚為之詠夢見美人直學省愁卧休沐寄懷宿東園行園和左丞庾杲之病和竟陵王抄書奉和竟陵王郡縣名奉和竟陵王藥名和陸慧曉百姓名三月三日率爾成章織女贈牽牛應王中丞思逺咏月和王中丞德克詠白雪詠雪應令和劉雍州繪博山香罏詠湖中鴈冬節後至丞相第詣世子車中作奉和竟陵王經劉巘墓悼亡侍遊方山應詔樂將殫恩未已應詔泛永康江餞謝文學離夜别范安成效古庭雨應詔初春春思傷春秋夜同詠樂器詠篪同詠坐上玩器詠竹檳榔盤簷前竹玩庭栁麥李詠桃詠青苔十詠二首領邊繡腳下履懷舊詩九首傷王融傷謝朓傷庾杲之傷王諶傷虞炎傷李圭之傷韋景猷傷劉渢傷胡諧之詠新荷應詔聼蟬鳴應詔詠笙詠箏詠山榴大言應令細言應令詠餘雪詠帳侍宴詠反舌寒松詠孤桐詠梧桐園橘詠梨應詔西地梨詠芙蓉詠杜若詠鹿蔥甘蕉詠菰早行逢故人車中為贈為鄰人有懷不至阻雪連句和劉中書仙詩二首華山館為國家營功德和王衛軍解講侍宴謝朏宅餞東歸應制酬孔通直逖懷蓬居石塘瀨聼猿出重圍和傅昭秋晨羈怨望海思歸侍宴樂逰苑餞徐州刺史應詔憩郊園和約法師採藥四城門老上巳華光殿六憶詩四首八詠詩登臺望秋月㑹圃臨東風歲暮愍衰草霜來悲落桐夕行聞夜鶴晨征聼曉鴻解佩去朝市被褐守山東漢魏六朝百三家集卷八十八目録欽定四庫全書漢魏六朝百三家集卷八十八明張漙輯梁沈約集樂俯梁雅樂歌十一首皇雅三曲皇帝出入宋孝建起居注奏永至至是改為皇雅取詩皇矣上帝臨下有赫也帝德實廣運車書靡不賓執瑁朝羣后垂旒御百神八荒重譯至萬國逺來親華蓋拂紫微勾陳繞太一容裔被緹組參差羅罕畢星回昭以爛天行徐且謐清蹕朝萬㝢端冕臨正陽青絇黃金繶衮衣文繡裳既散華蟲采復流日月光滌雅一曲牲出入宋元徽儀注奏引牲至是改為滌雅取禮記帝牛必在滌三月也將修盛禮其儀孔熾有腯斯牲國門是置不黎不㾞靡愆靡忌呈肌獻體永言昭事俯休皇德仰綏靈志百福具膺嘉祥允洎駿奔伊在慶覃遐嗣牷雅一曲薦毛血宋元徽儀注奏嘉薦至是改為牷雅取春秋左氏傳牲牷肥腯也反本興敬復古昭誠禮容宿設祀事孔明華爼待獻崇碑麗牲充哉繭握肅矣簮纓其膋既啓我豆既盈庖丁游創葛盧驗聲多祉攸集景福來并諴雅三曲降神及迎送宋元徽儀注奏昭夏至是改為諴雅取尚書至諴感神也懷忽慌瞻浩蕩盡誠潔致䖍想出杳冥降無象皇情肅具僚仰人禮盛神途敞僾明靈申敬享感蒼極動𤣥壤降神地德漙崑丘峻揚羽翟鼓應􅉧出尊祗展誠信招海瀆羅嶽鎮惟福祉咸昭晉迎神我有明德馨非稷黍牲玉孔備嘉薦惟旅金懸宿設和樂具舉禮達幽明敬行尊爼鐘鼓云送遐福是與送神獻雅一曲皇帝飲福酒宋元徽儀注奏嘉祚梁初改為永祚至是改為獻雅取禮記祭統尸飲五洗玉爵獻卿今之福酒亦古獻爵之義也神宫肅肅天儀穆穆禮獻既同膺兹釐福我有馨明無愧史祝禋雅二曲就燎位宋元徽儀注奏昭逺就埋位齊永明儀注奏𨽻幽至是燎埋俱奏禋雅取周禮大宗伯以禋祀祀昊天上帝也紫宫昭煥太乙微𤣥降臨下土尊髙上天載陳圭幣式備牲牷雲箛清引栒虡髙懸俯昭物象仰致髙煙肅彼靈祉咸達皇䖍就燎用盛樂斯舉協徵調宫靈響慶洽祉積化融八變有序三獻已終坎牲瘞玉酬德報功振垂成吕投壤生風道無虛致事由感通於皇盛烈比祚華嵩就埋用梁南郊登歌詩二首暾既明禮告成惟聖祖主上靈爵已獻罍又盈息羽籥展歌聲僾如在結皇情禮容盛尊爼列𤣥酒陳陶匏設獻清酒致䖍潔王既升樂已闋降蒼昊垂芳烈梁北郊登歌二首方壇既塪地祗已出盛典弗愆羣望咸秩乃升乃獻敬成禮卒靈降無兆神饗載謐允矣嘉祚其升如日至哉坤元實惟厚載躬兹奠饗誠交顯晦或升或降搖珠動珮德表成物慶流皇代純嘏不愆祺福是賚梁明堂登歌五首靑帝帝居在震龍德司春開元布澤含和尚仁羣居既散嵗云陽止飭農分地民粒惟始雕梁繡栱丹楹玉墀靈威以降百福來綏赤帝炎光在離火為威德執禮昭訓持衡受則靡草既凋溫風以至嘉薦惟旅時羞孔備齊醍在堂笙鏞在下匪惟七百無絶終始黃帝鬱彼中壇含靈闡化回環氣象輪無輟駕布德焉在四序將收音宫數五飯稷驂駵宅屏居中旁臨外宇升為帝尊降為神主白帝神在秋方帝居西皓允兹金德裁成萬寶鴻來雀化參見火斜幕無𤣥鳥菊有黃華載列笙磬式陳彞爼靈罔常懷惟德是與黑帝德盛乎水𤣥冥紀節隂降陽騰氣凝象閟隋書作閉司智蒞坎駕鐵衣𤣥祈寒拆地晷度回天悠悠四海駿奔奉職祚我無疆永隆民極梁宗廟登歌七首功髙禮洽德尊樂備三獻具舉百司在位誠敬罔愆幽明同致茫茫億兆無思不遂蓋之如天容之如地殷兆玉筐周始邠王於赫文祖基我大梁肇土七十奄有四方帝軒百祀人思未忘永言聖烈祚我無疆有夏多罪殷人塗炭四海倒懸十室思亂自天命我殱凶殄難既躍乃飛言登天漢爰享爰格福祿攸贊犧象既飾罍爼斯具我鬱載馨黃流乃注峩峩卿士駿奔是務佩上鳴階纓還拂樹悠悠億兆天臨日煦猗歟至德光被黔首鑄鎔蒼昊甄陶區有恪恭三獻對揚萬壽比屋可封含生無咎匪徒七百天長地久有命自天於皇后帝悠悠四海莫不來祭繁祉具膺八神聳衛福至有兆慶來無際播此餘休于彼荒裔祀典昭潔我禮莫違八簋充室六龍解騑神宫肅肅靈寢微微嘉薦既饗景福攸歸至德光被洪祚載輝梁三朝雅樂歌六首梁初郊禋宗廟及三朝之樂並用宋齊儀注唯改嘉祚為永祚又去永至之樂及帝定國並以雅為稱取詩序云言天下之事形四方之風謂之雅雅者正也止於十二則天數也乃去階步之樂增徹食之雅焉詞並沈約所製俊雅三曲衆官出入宋元徽儀注奏肅咸樂至是改為俊雅取禮記司徒論選士之秀者升之學曰俊士也設官分職髦俊攸俟髦俊伊何貴德尚齒唐乂咸事周寧多士區區衛國猶賴君子漢之得人帝猷乃理開我八襲闢我九重珩珮流響纓紱有容衮衣前邁列辟雲從義兼東序事美西雍分階等肅異列齊恭重列北上分庭異陛百司揚職九賓相禮齊宋舅甥魯衛兄弟思皇藹藹羣龍濟濟我有嘉賓實惟愷悌𦙍雅一曲皇太子出入奏𦙍雅取詩君子萬年永錫祚𦙍也自昔殷代哲王迭有降及周成惟器是守上天乃眷大梁既受灼灼重明仰承元首體乾作二命服斯九置保置師居前居後前星比耀克隆萬壽寅雅一曲王公出入奏寅雅取尚書周官三公𢎞化寅亮天地也禮莫違樂具舉延藩辟朝帝所執桓蒲列齊莒垂衮毳紛容與升有儀降有序齊簮紱忘笑語始矜嚴終酣醑介雅三曲上壽酒奏介雅取詩君子萬年介爾景福也百福四象初萬壽三元始拜獻惟衮職同心協卿士北極永無窮南山何足擬壽隨百禮洽慶與三朝升惟皇集繁祉景福互相仍申錫永無遺穰簡必來應百味既含馨六飲莫能尚玉罍信湛湛金巵頗搖漾敬舉發天和祥祉流嘉貺需雅八曲食舉奏需雅取易曰雲上於天需君子以飲食燕樂也實體平心待和味庶羞百品多為貴或鼎或鼒宣九沸楚桂胡鹽芼芳卉加籩列爼雕且蔚五味九變兼六和令芳甘㫖庶且多三危之露九期一作貞禾圓案方丈粲星羅皇舉斯樂同山河九州上腴非一族𤣥芝碧樹壽華木終期采之不盈掬用拂腥膻和九穀既甘且飫致遐福人欲所大味為先興和盡敬咸在旃碧鱗朱尾獻嘉鮮紅毛緑翼墜輕翾臣拜稽首萬斯年擊鐘以俟惟大國况乃御天流至德侑食斯舉揚盛則其禮不愆儀不忒風猷所被深且塞膳夫奉職獻芳滋不麛不夭咸以時調甘適苦别澠淄其德不爽受福釐於焉逸豫永無期備味斯饗惟至聖咸降人神禮為盛或風或雅流歌詠負鼎言歸啓殷命悠悠四海同兹慶䆃我六穗羅八珍洪鼎自㸑匪勞薪荆包海物必來陳滑甘滫􅔱味和神以斯至德被無垠雍雅三曲徹饌奏雍雅取禮記大饗客出以雍徹也明明在上其儀有序終事靡愆收鉶撒爼乃升乃降和樂備舉天德莫違人謀是與敬行禮達兹焉宴語我餕維阜我肴孔庶嘉味既充食㫖斯飫屬厭無爽冲和在御擊壤齊歡懷生等豫蒸庶乃粒實由仁恕百司警列皇在在陛既飲且醑卒食成禮其容穆穆其儀濟濟凡百庶寮莫不愷悌奄有萬國抑由天啓五引曲五首角引萌生觸法嵗在春咸池始奏德尚仁惉懘以息和且均徵引執衡司事宅離方滔滔夏日火德昌八音備舉樂無疆宫引八音資始君五聲興此和樂感百精優游律吕被咸英商引司秋紀兑奏西音激揚鐘石和琴瑟風流福被樂愔愔羽引𤣥英紀運冬冰折一作圻物為音本和且悅窮髙測深長無絶梁鼓吹曲十二首鼓吹宋齊並用漢曲又充庭用十六曲梁祖乃去四曲留其十二合日時也更制新歌以述功德木紀謝漢朱鷺改為木紀謝言齊謝梁升也木紀謝火運昌炳南陸耀炎光民去癸鼎歸梁鮫魚出慶雲翔轥五帝軼三王德無外化漙將仁蕩蕩義湯湯浸金石達昊蒼橫四海被八荒舞干戚垂衣裳對天眷坐巖廊𦙍有錫祚無疆風教逺禮容盛感人神宣舞詠降繁祉延嘉慶賢首山漢思悲翁改為賢首山言武帝破魏軍於司部肇王迹也賢首山險而峻乘峴憑臨胡陳騁竒謀奮卒徒斷白馬塞飛狐殪日逐殱骨都創谷蠡馘林胡草既潤原亦塗輪無反幕有烏掃殘孽震戎逋揚凱奏展歡酺詠枤杜旋京吳桐柏山漢艾如張改為桐柏山言武帝牧司王業彌章也桐柏山淮之首肇基帝迹遂光區有大震邊關殪獯醜農既勸民惟阜穗充庭稼盈畝逮嘉辰薦芳糗納寒場為春酒昭景福介眉壽天斯長地斯久化無極功不朽道亡漢上之回改為道亡言東昏喪道義師起樊鄧也道亡數極歸永元悠悠兆庶盡含寃沈河莫極皆無安赴海誰授矯龍翰自樊漢仙波流水清且瀾救此倒懸拯塗炭誓師劉旅赫靈斷率兹八百驅十亂登我聖明去多難長夜杳冥忽云旦忱威忱一作抗漢擁離改為忱威言破加湖元勳建也忱威授律命蒼兕一作光言薄加湖灌秋水回瀾瀄汩泛增雉爭河投岸掬盈指犯創嬰戈洞流矢資此威一作盛烈齊文軌漢東流漢戰城南改為漢東流言義師克魯山城也漢東流江之汭逆徒蜂聚旌旗紛蔽仰震威靈乘髙騁鋭至仁解網窮鳥入懷因此龍躍言登泰階鶴樓峻漢巫山髙改為鶴樓峻言平郢城兵威無敵也鶴樓峻連翠微因巖設險池永歸唇亡齒懼薄言震耀靈威凶衆稽顙天不能違金湯無所用功烈長巍巍昏主恣淫慝漢上陵改為昏主恣淫慝言東昏政亂武帝起義平九江姑熟大破朱雀伐罪弔民也昏主恣淫慝皆曰自昌盛上仁矜億兆誓師為請命既齊丹浦戰又符甲子辰龕難伐有罪伐罪弔斯民悠悠億萬姓於此覩陽春石首局漢將進酒改為石首局言義師平京城仍廢昏定大事也石首局比墉墐新堞嚴東壘峻共表裏遙相鎮矢未飛鼓方振競銜璧並輿櫬酒池擾象廊震同伐謀兼善陳闢應和掃煨燼翦庶惡靡餘𦙍期運集漢有所思改為期運集言武帝膺籙受禪德盛化逺也期運集惟皇膺寶符龍躍清漢渚鳯起方城隅謳歌共適夏獄訟兩違朱二儀啓嘉祚千載猶旦暮舞蹈流帝功金玉昭王度於穆漢芳樹改為於穆言大梁闡運君臣和樂休祚方逺也於穆君臣君臣和以肅關王道定天保樂均靈囿燕同在鎬前庭懸鼓鐘左右列笙鏞纓佩俯仰有則修一作備禮容翔振鷺騁羣龍隆周何足擬逺與唐比蹤惟大梁漢上邪改為惟大梁言梁德廣運仁化洽也惟大梁開運受籙膺圖君八極冠帶被五都四海並和㑹排闕欵塞無異塗梁大壯大觀舞歌二首梁初猶用凱容宣烈之舞武帝定樂以武舞為大壯舞文舞為大觀舞又大壯舞奏夷則大觀舞奏姑洗取其月望也大壯舞歌大壯舞取易彖云大壯大者壯也正大而天地之情可見也髙髙在上實愛斯人眷求聖德大拯彞倫率土方燎如火在薪惵惵黔首暮不及晨朱光啓耀兆發穹旻我皇鬱起龍躍漢律言届牧野電激雷震闕鞏之甲彭濮之人或貔或武標杵浮輪我邦雖舊其命維新六伐乃止七德必陳君臨萬國遂撫八寅大觀舞歌大觀者取易彖曰大觀在上觀天之神道而四時不忒也皇矣帝烈大哉興聖奄有四方受天明命居上不怠臨下惟敬舉無愆則動無失正物從其本人遂其姓昭播九功肅齊八柄寬以惠下德以為政三趾晨儀重輪夕映棧壑忘阻梯山匪敻如日有恆與天無竟載陳金石式流舞詠咸英韶夏於兹比盛梁鞞舞歌明之君六首明君本漢世鞞舞曲梁武帝時改其辭以歌君德大梁七百始天監三元初聖功澄宇縣帝德總車書熙熙億兆臣其志皆歡愈刑措甫自今隆平亦肇兹神武超楚漢安用道邠岐百拜奄來宅執玉咸在斯象天則地體無為禮緝民用擾樂諧風自移舜琴中已絶堯衣今復垂象天則地體無為治兵戰六獸為邦命九官靈蛇及瑞羽分素復銜丹望就踰軒頊鏗鏘掩咸濩九尾擾成羣八象鳴相顧象天則地化雲布有為臣所執司契君之道運行乃四時無言信蒼昊宸居體冲寂忘懷定天保至德同自然裁成侔𤣥造珍祥委天貺靈物開地寶窈窕降青琴參差秀朱草日出東南隅行以下五言朝日出邯鄲照我叢臺端中有傾城艷顧景織羅紈延軀似纎約遺視若回瀾瑤裝映層綺金服炫雕欒幸有同匡好西仕服秦官寶劍垂玉貝汗馬飾金鞍縈場類轉雪逸控寫騰鸞羅衣夕解帶玉叉暮垂冠昭君辭朝發披香殿夕濟汾隂河於兹懷九逝自此斂雙蛾沾妝疑湛露繞臆狀流波日見奔沙起稍覺轉蓬多胡風犯肌骨非直傷綺羅銜涕試南望關山鬱嵯峨始作陽春曲終成苦寒歌唯有三五夜明月暫經過長歌行連連舟壑改微微市朝變來功嗣往迹莫武徂升彥局塗頓逺䇿留歡恨奔箭拊戚狀驚瀾循休擬回電嵗去芳願違年來苦心薦春貌既移紅秋林豈停蒨一倍茂陵道寧思柏梁宴長戢兔園情永别金華殿聲徽無惑簡丹青有餘絢幽籥且未調無使長歌倦又春隰荑緑栁寒墀積皓雪依依往紀盈霏霏來思結思結纒嵗宴曾是掩初節初節曾不掩浮榮逐弦缺弦缺更圓合浮榮永沈滅色隨夏蓮變態與秋霜耋道迫無異期賢愚有同絶銜恨豈云忘天道無甄别功名識所職竹帛尋摧裂生外茍難尋坐為長歎設君子行良御惑燕楚妙察亂澠淄隄傾由漏壞垣隙自危基囂途或妄踐黨議勿輕持從軍行惜哉征夫子憂恨良獨多浮天出鯷海束馬渡交河雪縈九折嶝風卷萬里波維舟無夕島秣驥乏平莎凌濤富驚沫援木闕垂蘿江颸鳴疊嶼流雲照層阿𤣥埃晦朔馬白日照吳戈寢興動征怨寤寐起還歌晨裝豈輟警夕壘詎淹和苦哉逺征人悲矣將如何豫章行燕陵平而逺易河清且駛一見塵波阻臨途引征思雙劍愛匣同孤鸞悲影異宴言誠易纂清歌信難嗣卧聞夕鐘急坐閲朝光亟往歡墜壯心來戚滿衰志徂芳無再馥淪灰定還熾夏臺尚可忘榮辱亦奚事愧微曠士節徒感鄙生餌勞哉納辰和地逺託聲寄相逢狹路間相逢洛陽道繫聲流水車路逢輕薄子竚立問君家君家誠易知易知復易憶龍馬滿街衢飛蓋交門側大子萬户侯中子飛而食小子始從官朝夕溫省直三子俱入門赫奕多羽翼若若青組紆煙煙金鐺色大婦繞梁歌中婦回文織小婦獨無事閉門聊且即緑綺試一彈𤣥鶴方鼓翼長安有狹斜行靑槐金陵陌丹轂貴遊士方驂萬乘臣炫服千金子咸陽不足稱臨淄孰能擬三婦艷大婦掃玉墀中婦結羅帷小婦獨無事對鏡畫蛾眉良人且安卧夜長方自私江蘺生幽渚一作塘上行澤蘭被荒徑孤芳豈自通幸逢瑶池曠得與金芝叢朝承紫臺露夕潤緑池風既美修嫮女復悅繁華童夙昔玉霜滿旦暮翠條空葉飄儲胥右芳歇露寒東紀化尚盈昃俗志信隆財殫交易絶華落愛難終所惜