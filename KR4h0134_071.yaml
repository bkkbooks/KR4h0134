body:
  text: 漢魏六朝百三家集卷七十一宋謝惠連集題詞謝法曹集文字頗少惟祭古冢文簡而有意曹子建伏軾而問髑髏辭不逮也雪賦雖名高麗與希逸月賦僅鴈序耳詩則秋懷搗衣二篇居最詩品云康樂鋭思無以復加若西陵遇風則非敵矣乘流遵歸路諸篇一生坎壈所繇今逸不存豈自悔失言先絶其傳哉謝客四友尤莫逆者東海何長瑜與從弟阿連長瑜輕啁僚佐黜作流人後殞暴風阿連愛幸小吏淪廢下位命亦不長蓋自康樂失志知已寂寞廷尉論刑目為反叛一二親厚寧免輕薄之誚連即才悟無雙而榮華路絶同時憔悴亦物各以類乎然芝蘭階庭不為父知而賞音慕悅出於昆從嘆張華之重生惜海嶠之初别小謝雖才得兄益顯莊惠濠梁鍾牙流水朋友間事又烏足云目録賦雪賦鸂鶒賦白鷺賦甘賦橘賦贊仙人草贊雪贊四海贊琴贊白羽扇贊松贊針口針目針連珠連珠四首文祭禹廟文祭周居士文祭古冢文樂府秋胡行二首隴西行豫章行塘上行却東西門行代悲哉行燕歌行猛虎行又鞠歌行前緩聲歌長安有狹邪行順東西門行詩三月三日曲水集泛南湖至石帆西陵遇風獻康樂五章代古秋懷搗衣泛湖歸出樓中望月七月七日夜詠牛女喜雨詠冬讀書離合詩二首夜集作離合夜集歎乖與孔曲阿别詩詠螺蚌失題漢魏六朝百三家集卷七十一目録欽定四庫全書漢魏六朝百三家集卷七十一明張溥輯宋謝惠連集賦雪賦嵗將暮時既昏寒風積愁雲繁梁王不悅遊於兔園乃置旨酒命賓友召鄒生延枚叟相如末至居客之右俄而微霰零密雪下王乃歌北風於衛詩詠南山於周雅授簡於司馬大夫曰抽子祕思騁子妍辭侔色揣稱為寡人賦之相如於是避席而起逡巡而揖曰臣聞雪宫建於東國雪山峙於西域岐昌發詠於來思姬滿申歌於黃竹曹風以麻衣比色楚謠以幽蘭儷曲盈尺則呈瑞於豐年袤丈則表沴於陰德雪之時義逺矣哉請言其始若乃玄律窮嚴氣升焦溪涸湯谷凝火井滅溫泉冰沸潭無涌炎風不興北戶墐扉裸壤垂繒於是河海生雲朔漠飛沙連氛絫靄掩日韜霞霰淅瀝而先集雪紛糅而遂多其為狀也散漫交錯氛氲蕭索藹藹浮浮瀌瀌奕奕聨翩飛灑徘徊委積始緣甍而冒棟終開簾而入隙初便娟於墀廡末縈盈於帷席既因方而為圭亦遇圓而成璧眄隰則萬頃同縞瞻山則千巖俱白於是臺如重璧逵似連璐庭列瑤階林挺瓊樹皓鶴奪鮮白鷴失素紈袖慙冶玉顔掩嫮若乃積素未虧白日朝鮮爛兮若爥龍銜曜照崑山爾其流滴垂冰緣霤承隅粲兮若馮夷剖蚌列明珠至夫繽紛繁騖之貌皓汗皎潔之儀回散縈積之勢飛聚凝曜之奇固展轉而無窮嗟難得而備知若乃申娛玩之無已夜幽靜而多懷風觸楹而轉響月承幌而通暉酌湘吳之醇酎御狐狢之兼衣對庭鵾之雙舞瞻雲鴈之孤飛折園中之萱草摘階上之芳薇踐雪霜之交積憐枝葉之相違馳遙思於千里願接手而同歸鄒陽聞之悶然心服有懷妍唱敬接末曲於是乃作而賦積雪之歌歌曰攜佳人兮披重幄援綺衾兮坐芳縟燎薰罏兮炳明爥酌桂酒兮揚清曲又續而為白雪之歌歌曰曲既揚兮酒既陳朱顔􅋳兮思自親願低帷以昵枕念解珮而褫紳怨年嵗之易暮傷後會之無因君寧見階上之白雪豈鮮耀於陽春歌卒王乃尋繹吟玩撫覽扼腕顧謂枚叔起而為亂亂曰白羽雖白質以輕兮白玉雖白空守貞兮未若茲雪因時興滅玄陰凝不昧其潔太陽耀不固其節節豈我名潔豈我貞憑雲升降從風飄零值物賦象任地班形素因遇立汙隨染成縱心皓然何慮何營鸂鶒賦覽水禽之萬類信莫麗乎鸂鶒服昭晰之鮮姿糅玄黃之美色命儔侣以翺遊憩川湄而偃息超神王以自得不意虞人之在側網羅幕而雲布摧羽翮於翩翻乖沈浮之諧豫宛羈畜於籠樊白鷺賦有提樊而見獻實振鷺之鮮禽表弗緇之素質挺樂水之竒心甘賦嘉寒園之麗木美獨有此貞芳質葳蕤而懷風性耿介而凌霜擬夕霞以表色指朝景以齊圓侔萍實乎江介超玉果於崑山傾子節兮湘之區承君玩兮堂之隅濯雨兮冒霜長無絶兮芬敷橘賦園有嘉樹橘柚煌煌圓丹可玩淑氣芬芳受以玉盤升君子堂味既滋而事美實厥包之最良贊仙人草贊余之中園有仙人草焉春穎其苗夏秀其英秋有貞實冬無雕色可謂貫四時而不改者也既嘉其名而美其質染筆作詠庶以攄述云園有嘉草名曰仙人曄曄煒煒莫莫臻臻穎發炎暑苗秀和春竒爾靈質乃植中林雪贊氣遍霜繁年豐雪積彼厲我和爾素子白其德懿矣玩之庭隙權陋瑤臺暫踐盈尺四海贊九夷六蠻八狄七戎雕鏤異質裳裸殊風致之以德車軌斯同琴贊嶧陽孤桐裁為鳴琴體兼九絲聲備五音重華載揮以養民心孫登是玩取樂山林白羽扇贊惟兹白羽體此濺潔涼齊清風素同冰雪其儀可貴是用玩悅揮之襟袖以禦炎熱松贊松惟靈木擬心雲端迹絶玉除形寄青巒子欲我知求之嵗寒針口針宣納之由實伊樞機唯舌是出馳駟安追差釐千里君子愼微何用口爽信在甘肥目針氣之清明雙眸善識惟道是視瞻彼正直連珠連珠四首蓋聞獻技者易忽養德者難致是以子張重趼不獲哀公之祿干木偃息不受文侯之位蓋聞機心難湛不接異類淳德易孚可狎殊方是以高羅舉而雲鳥降海人萃而水禽翔蓋聞春蘭早芳實忌鳴鴂秋菊晚秀無憚繁霜何則榮乎始者易悴貞乎末者難傷是以傅長沙而志沮登金馬而名揚蓋聞修已知足慮得其逸競榮昧進志忘其審是以飲河滿腹而求安愈泰緣木務高而畏下滋甚文祭禹廟文謹遣左曹掾奉水土之羞敬薦夏帝之靈咨聖繼天載誕英徽克明克哲知章知微運此宏謨恤彼民憂身勞五嶽形疲九州呱呱弗顧虔虔是欽物貴尺璧我重寸陰乃錫玄圭以告成功虞數既改夏德乃隆臨朝總政巡國觀風淹留稽嶺乃徂行宫恭司皇役敬屬暉融神且略薦乃昭其忠祭周居士文維君陶造化之純元侔先哲之遐蹤體無事於高尚蹈虛素乎中庸不臣天子不事諸侯公辟弗盼王命匪酬窮歡極樂帶索被裘祭古冢文東府掘城北塹八丈餘得古冢上無封域不用磚甓以木為槨中有二棺正方兩頭無和明器之屬材瓦銅漆有數十種多異形不可盡識刻木為人長三尺可有二十餘頭初開見悉是人形以物棖撥之應手灰滅棺上有五銖錢百餘枚水中有甘蔗節及梅李核瓜瓣皆浮出不甚爛壞銘志不存世代不可得而知也公命城者改埋於東岡祭之以豚酒既不知其名字逺近故假為之號曰冥漠君云爾元嘉七年九月十四日司徒御屬領直兵令史統作城録事臨漳令亭侯朱林具豚醪之祭敬薦𡨕漠君之靈忝總徒旅版築是司窮泉為塹聚壤成基一槨既啓雙棺在兹捨畚悽愴縱鍤漣而芻靈已毁塗車既催几筵糜腐俎豆傾低盤或梅李盎或醢醯蔗傳餘節瓜表遺犀追惟夫子生自何代曜質幾年潛靈幾載為壽為夭寧顯寧晦銘志堙滅姓字不傳今誰子後曩誰子先功名美惡如何蔑然百堵皆作十仞斯齊墉不可轉塹不可回黃腸既毁便房已頽循題興念撫俑增哀射聲垂仁廣漢流渥祠骸府阿掩骼城曲仰羡古風為君改卜輪移北隍窀穸東麓壙即新營棺仍舊木合葬非古周公所存敬遵昔義還袝雙魂酒以兩壺牲以特豚幽靈髣佛歆我犧樽嗚呼哀哉樂府秋胡行二首以下四言春日遲遲桑何萋萋紅桃含夭緑柳舒荑邂逅粲者遵渚戲蹊華顔易改良願難諧係風捕影誠知不得念彼奔波意慮回惑漢女倐忽洛神飄揚空勤交甫徒勞陳王隴西行運有榮枯道有舒屈潛保黃裳顯服朱黻誰能守靜棄華辭榮窮谷是處考槃是營千金不回百代傳名厥包是柚忘憂者萱何為有用自乖中原實摘柯摧葉殞條煩豫章行以下五言軒帆遡遙路薄送瞰遐江舟車理殊緬密友將逺從九里樂同潤二華念分峰集歡豈今發離歎自古鍾促生靡緩期迅景無遲蹤緇髮迫多素憔悴謝華丰婉娩寡留晷窈窕閉淹龍如何阻行止憤愠結心胸既微達者度歡戚誰能封願子保淑愼良訊代徽容塘上行芳萱秀陵阿菲質不足營幸有忘憂用移根託君庭垂穎臨清池擢彩仰華甍霑渥雲雨潤葳蕤吐芳馨願君眷傾葉留景惠餘明却東西門行慷慨發相思惆悵戀音徽四節競闌候六龍引頽機人生隨時變遷化焉可祈百年難必保千慮盈懷之代悲哉行樂府作惠連鮑照集亦載此羈人感淑節緣感欲回轍我行詎幾時華實驟舒結覩實情有悲瞻華意無悅覽物懷同志如何復乖别翩翩翔禽羅關關鳴鳥列翔鳴常疇偶所歎獨乖絶燕歌行七言四時推遷迅不停三秋蕭瑟葉解輕飛霜被野鴈南征念君客遊羈思盈何為淹留無歸聲愛而不見傷心情朝日潛輝華燈明林鵲同栖渚鴻并接翮偶羽依蓬瀛仇依旅類相和鳴余獨何為志無成憂緣物感淚沾纓猛虎行以下雜言貧不攻九嶷玉倦不憩三危峰九嶷有惑號三危無安容美物標貴用志士勵竒蹤如何祗逺役王命宜肅恭伐鼓功未著振旅何時從又猛虎潛深山長嘯自生風人謂客行樂客行苦心傷鞠歌行翔馳騎千里姿伯樂不舉誰能知南荆璧萬金資卞和不斫與石離年難留時易隕厲志莫賞徒勞疲沮齊音溺趙吹匠石善運郢不危古綿眇理參差單心慷慨雙淚垂前緩聲歌羲和纎阿去嵯峩覩物知命使余轉欲悲歌憂戚入心胸處山勿居峰在行勿為公居峰大阻鋭為公遇讒蔽雅琴自疏越雅韻能揚揚滑滑相混同終始福祿豐長安有狹邪行紀郢有通逵通逵並軒車帟帟雕輪馳軒軒翠蓋舒撰策之五尹振轡從三閭推劒馮前軾鳴佩專後輿順東西門行哀朝菌閔頽力遷化常然焉肯息及壯齒遇世直酌酪華堂集親識舒情盡歡遣悽惻詩三月三日曲水集四時著平分三春稟融爍遲遲和景婉夭夭園桃灼攜朋適郊野昧爽辭鄽郭蜚雲興翠嶺芳飊起華薄解轡偃崇丘藉草繞回壑際渚羅時簌託波泛輕爵泛南湖至石帆軌息陸塗初枻鼓川路始漣漪繁波漾參差層峰峙蕭疏野趣生逶迤白雲起登陟苦跋涉睥眄樂心耳即玩玩有竭在興興無已西陵遇風獻康樂五章我行指孟春春仲尚未發趣途逺有期念離情無歇成裝候良辰漾舟陶嘉月瞻途意少悰還顧情多闕哲兄感仳别相送越坰林飲餞野亭館分袂澄湖陰悽悽留子言眷眷浮客心回塘隱艫栧逺望絶形音靡靡即長路戚戚抱遙悲悲遙但自弭路長當語五臣作問誰行行道轉逺去去情彌遲昨發浦陽汭今宿浙江湄屯雲蔽曾嶺驚風湧飛流零雨潤墳澤落雪灑林丘浮氛晦崖巘積素盛原疇曲汜薄停旅五臣作依通川絶行舟臨津不得濟佇楫阻風波蕭條洲渚際氣色少諧和西瞻五臣作矚興遊歎東睇起悽歌積憤成疢痗無萱將如何代古一作擬客從逺方來客從逺方來贈我鵠文綾貯以相思篋緘以同心繩裁為親身服著以俱寢興别來經年嵗歡心不可凌瀉酒置井中誰能辨斗升合如杯中水誰能判淄澠秋懷平生無志意少小嬰憂患如何乘苦心矧復值秋晏皎皎天月明奕奕河宿爛蕭瑟含風蟬寥唳度雲鴈寒商動清閨孤燈曖幽幔耿介繁慮積展轉長宵半夷險難預謀倚伏昧前算雖好相如達不同長卿慢頗悅鄭生偃無取白衣宦未知古人心且從性所玩賔至可命觴朋來當染翰高臺驟登踐清波時陵亂頽魄不再圓傾羲無兩旦金石終銷毁丹青暫雕煥各勉玄髮歡無貽白首歎因歌遂成賦聊用布親串搗衣衡紀無淹度晷運倐如催白露滋園菊秋風落庭槐肅肅莎雞羽烈烈寒螿啼夕陰結空幕宵月皓中閨美人戒裳服端飾相招攜簪玉出北房鳴金步南階櫩高砧響發楹長杵聲哀微芳起兩袖輕汗染雙題紈素既已成君子行未歸裁用笥中刀縫為萬里衣盈篋自余手幽緘候君開腰帶準疇昔不知今是非泛湖歸出樓中望月日落泛澄瀛星羅遊輕橈憩榭面曲汜臨川對回潮輟策共駢筵並坐相招要哀鴻鳴沙渚悲猿響山椒亭亭映江月飀飀出谷飇斐斐氣羃岫泫泫露盈條近矚祛幽蘊逺視蕩喧囂晤言不知罷從夕至清朝七月七日夜詠牛女落日隱櫩楹升月照簾玉臺作房櫳團團滿葉露析析振條風蹀足循廣除瞬目矖曾穹雲漢有靈匹彌年闕相從遐川阻昵愛修渚曠清容弄杼不成藻聳轡騖前蹤昔離秋已兩今聚夕無雙傾河易回斡欵情玉臺作顔難久悰沃若靈駕旋寂寥雲幄空留情顧華寢遙心逐奔龍沈吟為爾感情深意彌重喜雨朱明振炎氣溽暑扇溫飈羡彼明月輝離畢經中宵思此西郊雲既雨盈崇朝上天愍憔悴商羊自吟謡詠冬藝文新本字訛作靈運考舊本正之七宿乘運曜三星與時滅履霜氷彌堅積寒風愈切繁雲起重陰回飈流輕雪園林粲斐皓庭除秀皎潔墀瑣有凝沍逵衢無通轍讀書賁園奚足慕下帷故宜遵山成猶一簣崇積始微塵虞軒雖眇莽顔隰亦何人離合詩二首放棹遵遙途方與情人别嘯歌亦何言肅爾凌霜節各字夫人皆薄離二友獨懷古思篤子襟詩山當作三川何足苦念字夜集作離合四坐宴嘉賔一客自逺臻九言何所戒十善故宜遵夜集歎乖詩人咏踟蹰搔首歌離别誠哉曩日歡展矣今夕切吾生赴進令質明即行轍在貧故宜言贈子保溫惠曷用書諸紳久要亮有誓與孔曲阿别詩淒淒乘蘭秋言餞千里舟塗屆雲陽邑邑宰有昔遊行人雖念路為爾暫淹留詠螺蚌輕羽不高翔自用弦網羅纎鱗惑芳餌故為釣所加螺蚌非有心沈迹在泥沙文無雕飾用味非鼎俎和失題見藝文言志類夕坐苦多慮行歌踐閨中房櫳引傾月步簷結春風漢魏六朝百三家集卷七十一
