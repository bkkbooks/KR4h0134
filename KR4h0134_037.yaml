body:
  text: 漢魏六朝百三家集卷三十七目録杜預集題詞左傳之有杜元凱六經之孔孟也當時論者猶以質直見輕豈真貴古而賤今乎子雲太𤣥不遇桓談幾覆醬瓿元凱釋左非摰虞亦莫知其孤行天地也杜集絶無詩賦意者其雕蟲邪彼惟彌綸經傳自託獲麟下者則薄之誠不欲以此有名也元凱嘗言三不朽庶幾立功立言其事皆踐漢興佐命如鄼侯刀筆髙密書生不免望塵而拜章奏爾雅悉西京風制經術既深凡文皆餘耳不期工而工此學者糞本之說也武庫平吳功堪廟食釋左一書復懸日月之間為世傳習其於聖經為後先疏附也成勞過揚𤣥矣儲君降服議禮興譏是將通世變以就古人檀弓變禮不辭作俑未可與素冠之詩同相笑也目録奏律令注解奏黜陟課法略秦川軍事奏事又又又疏論水利疏又疏表陳伐吳至計表再上伐吳表請署羊祜辟士表舉賢良方正表又又議皇太子釋服議畣盧欽魏舒問皇太子諒暗終制奏又祥祫議書與王濬書與子貺書嵗終帖親故帖序春秋左氏傳序律序論春秋長厯論說春秋長厯說譜宗譜令遺令雜文酒論漢魏六朝百三家集卷三十七目録欽定四庫全書漢魏六朝百三家集卷三十七明張溥輯杜預集奏上律令注解奏法者蓋繩墨之斷例非窮理盡性之書也故文約而例直聽省而禁簡例直易見禁簡難犯易見則人知所避難犯則幾於刑厝厝刑之本在於簡直故必審名分審名分者必忍小理古之刑書銘之鍾鼎鑄之金石所以逺塞異端使無淫巧也今所注皆網羅法意格之以名分使用之者執名例以審趣舍伸繩墨之直去析薪之理也上黜陟課法略臣聞上古之政因循自然虛已委誠而信順之道應神感心通而天下之理得逮至淳朴漸散彰美顯惡設官分職以頒爵祿𢎞宣六典以詳考察然猶倚明哲之輔建忠貞之司使名不得越功而獨美功不得後名而獨隱皆疇咨博詢敷納以言及至末世不能紀逺而求於密微疑諸心而信耳目疑耳目而信簡書簡書愈繁官方愈僞法令滋章巧飾彌多昔漢之刺史亦嵗終奏事不制算課而清濁粗舉魏氏考課即京房之遺意其文可謂至密然繇於纍細以違其體故歷代不能通也豈若申唐堯之舊去密就簡則簡而易從也夫宣盡物理神而明之存乎其人去人而任法則以傷理今科舉優劣莫若委任達官各考所統在官一年以後每嵗言優者一人為上第劣者一人為下第因訃偕以名聞如此六載主者總集採案其六嵗處優舉者超用之六嵗處劣舉者奏免之其優多劣少者敘用之劣多優少者左遷之今考課之品所對不鈞誠有難易若以難取優以易而否主者固當凖量輕重微加降殺不足復曲以法盡也已丑詔書以考課難成聽通薦例薦例之理即亦取於風聲六年頓薦黜陟無漸又非古者三考之意也今每嵗一考則積優以成陟纍劣以取黜以士君子之心相處未有官故六年六黜清能六進否劣者也監司將亦隨而彈之若令上下公相容過此為清議大頽亦無取於黜陟也秦川軍事臣嘗聞邊人說虜專以騎為寇穿塹不如作馬坎馬坎法坑方三尺錯平穿之虜騎非下馬平治則終不得入又其外蹊要路亦可隨作塢施槍坎中訖薄覆其上如此則虜當築地而行不敢輒往來也奏事竊惟籍田令本以籍田千畝十頃之田計其案行周旋不過數里凡宗廟粢盛御用膳羞及羣神之調於是取所籍户口足以當一縣一邑所供至重事貴臨履也又臣前在南聞魏興西北山有野牛野羊牛之大者二千斤羊之大者數百斤試令四求今者各得一枚并頭角蹄按其形不與中土相似然是野獸中所希有又藥杵臼澡槃尉斗釡瓮銚槃鎢鋗皆亦民間之急用也又被勑以臣造新律事律吏杜景李復等造律皆未清本末之意者也疏論水利疏臣輒思惟今者水災東南特劇非但五稼不收居業并損下回所在停汚髙地皆多磽塉此即百姓困窮方在來年雖詔書切告長吏二千石為之設計而不廓開大制定其趨舍之宜恐徒文具所益蓋薄當今秋夏蔬食之時而百姓已有不贍前至冬春野無青草則必指仰官榖以為生命此乃一方之大事不可不豫為思慮者也臣愚謂既以水為困當恃魚菜螺蚌而洪波泛濫貧弱者終不能得今者宜大壞兖豫州東界諸陂隨其所歸而宜導之交令飢者盡得水産之饒百姓不出境界之內旦暮野食此目下日給之益也水去之後填淤之田畝收數鍾至春大種五榖必豐此又明年之益也臣前啓典牧種牛不供耕駕至於老不穿鼻者無益於用而徒有吏士榖草之費嵗送任駕者甚少尚復不調習宜大出賣以易榖及為賞直詔曰孳育之物不宜減散事遂停寢問主者今典虞右典牧種産牛大􅘁相通有四萬五千餘頭茍不益世用頭數雖多其費日廣古者匹馬丘牛居則以耕出則以戰非如猪羊類也今徒養宜用之牛終為無用之費甚失事宜東南以水田為業人無牛犢今既壞陂可分種牛二萬五千頭以付二州將吏士庶使及春耕榖登之後萬頭責三百斛是為化無用之費得運水次成榖七百萬斛此又數年後之益也加以百姓降丘宅土將來公私之饒乃不可計其所留好種萬頭可即令右典牧都尉官屬養之人多畜少可竝佃牧地明其考課此又三魏近旬嵗當復入數千萬斛榖牛又皆當調習動可駕可皆今日之可全者也又疏諸欲修水田者皆以火耕水耨為便非不爾也然此事施於新田草萊與百姓相絶離者耳往者東南草創人稀故得水田之利自頃户口日增而陂堨嵗決良田變生蒲葦人居沮澤之際水陸失宜放牧絶種樹木立枯皆陂之害也陂多則土薄水淺潦不下潤故每有水雨輒復橫流延及陸田言者不思其故因云此土不可陸種臣計漢之户口以驗今之陂處皆陸業也其或有舊陂舊堨則堅完修固非今所謂當為人害者也臣前見尚書胡威啓宜壞陂其言懇至臣中者又見宋侯相應遵上便宜求壞泗陂徙運道時下都督度支共處當各據所見不從遵言臣按遵上事運道東詣壽春有舊渠可不繇泗陂泗陂有遵地界壞地凡萬三千餘頃傷敗成業遵縣領應佃二千六百口可謂至少而猶患地狹不足盡力此皆水之為害也當所共恤而都督度支方復執異非所見之難直以不同害理也人心所見既不同利害之情又有異軍家之與郡縣士大夫之與百姓其意莫有同者此皆偏其利以忘其害者也此理之所以未盡而事之所以多患也臣又按豫州界二度支所領佃者州郡大軍雜士凡用水田七千五百餘頃耳計三年之儲不過二萬餘頃以常理言之無為多積無用之水况於今者水潦瓮溢大為災害臣以為與其失當寧瀉之不滀宜發明詔敕刺史二千石其漢氏舊陂舊堨及山谷私家小陂皆當修繕以積水其諸魏氏以來所造立及諸因雨決溢蒲葦馬腸陂之類皆決瀝之長吏二千石躬親勸功諸食力之人並一時附功令比及水凍得粗枯涸其所修功實之人皆以俾之其舊陂堨溝渠當有所補塞者皆尋求微跡一如漢時故事豫為部分列上須冬東南休兵交代各留一月以佐之夫川瀆有常流地形有定體漢氏居人衆多猶以無患今因其所患而宣寫之跡古事以明近大理顯然可坐論而得臣不勝愚意竊謂最是今日之實益也表陳伐吳至計表自閏月以來賊但敕嚴下無兵上以理勢推之賊之窮計力不兩完必先認上流勤保夏口以東以延視息無緣多兵西上空其國都而陛下過聽便用委棄大計縱敵患生此誠國之逺圖使舉而有敗勿舉可也事為之制務從完牢若或有成則開太平之基不成不過費損日月之間何惜而不一試之若當須後年天時人事不得如常臣恐其更難也陛下宿議分命臣等隨界分進其所禁持東西同符萬安之舉未有傾敗之慮臣心實了不敢以曖昧之見自取後纍唯陛下察之再上伐吳表羊祜與朝臣多不同不先博畫而密與陛下共施此計故益令多異凡事當以利害相較今此舉十有八九利其一二止於無功耳其言破敗之形亦不可得直是計不出已功不在身各恥其前言故守之也自頃朝廷事無大小異意蜂起雖人心不同亦繇特恩不慮後難故輕相同異也昔漢宣帝議趙充國所上事效之後詰責諸議者皆叩頭而謝以塞異端也自秋已來討賊之形頗露若今中止孫皓怖而生計或徙都武昌更完修江南諸城逺其居人城不可攻野無所掠積大船於夏口則明年之計或無所及請署羊祜辟士表祜開府纍年謙讓不辟士始有所命㑹卒不得除署故參佐劉儈等箋詣預預表上不許祜雖開府而不備僚屬引謙之至宜見顯明及扶疾辟士未到而沒家無𦙍嗣官無命士此方之望隱憂載懷夫篤終追逺人德歸厚漢祖不惜四千户之封以慰趙子弟心請議之舉賢良方正表按蘇贊布行於草野著德於閭閻放心直意若得珥筆丹墀推訪格言必有諤諤匪躬之節又若得言論端委太學錯總藝文垂纓玉陛論道紫宫誠帝宫之瑰寶清廟之偉器又長史劉儈修治洛陽以東運渠通舟嘗用赤馬議皇太子服制議泰始十年武元楊皇后崩及將遷于竣陽陵依舊制既葬帝及羣臣除喪即吉先是尚書祠部奏從博士張靖議皇太子亦從制俱釋服博士陳逵議以為今制所依蓋漢帝權制興于有事非禮之正皇太子無有國事自宜終服有詔更詳議預議云古者天子諸侯三年之喪始同齊斬既葬除喪服諒暗以居心喪終制不與士庶同禮漢氏承秦天下為天子修服三年漢文帝見其下不可久行而不知古制更以意制祥禫除喪即吉魏氏直以訖葬為節嗣君皆不服諒暗終制學者非之久矣然竟不推究經傳考其行事專謂王者三年之喪當以衰麻終二十五月嗣君茍若此則天子羣臣皆不得除喪雖志在居篤更通而不行至今世主皆從漢文輕典􅤓處制者非制也今皇太子與尊同體宜復古典卒哭除衰麻以諒暗終制於義既不應不除又無取於漢文乃所以篤喪禮也答盧欽魏舒問時尚書僕射盧欽尚書魏舒問預證據所依預答云于是欽舒遂命預造議奏傳稱三年之喪自天子達此謂天子絶期唯有三年喪也非謂居喪衰服三年與士庶同也故后世子之喪而叔嚮稱有三年之喪二也周公不言髙宗服喪三年而云諒暗三年此釋服心喪之文也叔嚮不譏景王除喪而譏其燕樂已早明既葬應除而違諒暗之節也春秋晉侯享諸侯子産相鄭伯時簡公未葬請免喪以聽命君子謂之得禮宰咺來歸惠公仲子之賵傳曰弔喪不及哀此皆既葬除服諒暗之證先儒舊說往往亦見學者未之思耳喪服諸侯為天子亦斬衰豈可謂終服三年耶上考七代未知王者君臣上下衰麻三年者諸下推將來恐百世之王其理一也非必不能乃事勢不得故知聖人不虛設不行之制仲尼曰禮所損益雖百世可知此之謂也皇太子諒暗終制奏侍中尚書令司空魯公臣賈充侍中尚書僕射奉車都尉大梁侯臣盧欽尚書新沓伯臣山濤尚書奉車都尉平春侯臣胡威尚書劇陽子臣魏舒司尚書堂陽子臣石鑒尚書豐樂亭侯臣杜預稽首言禮官參議博士張靖等議以為孝文權制三十六日之服以日易月道有汚隆禮不得全皇太子亦宜割情除服博士陳逵等議以為三年之喪人子所以自盡故聖人制禮自上逹下是以今制將吏諸遭父母喪皆假寧二十五月敦崇孝道所以風化天下皇太子至孝著于內而衰服除于外非禮所謂稱情者也宜其不除臣欽臣舒臣預謹按靖逵等議各見所學之一端未統帝者居喪古今之通禮也自上及下尊卑貴賤物有其宜故禮有以多為貴者有以少為貴者有以髙為貴者有以下為貴者唯其稱也不然則本末不經行之不逺天子之與羣臣雖哀樂之情若一而所居之宜實異故禮不得同易曰上古之世喪期無數虞書稱三載四海遏密八音其後無文至周公旦乃稱殷之髙宗諒暗三年不言其傳曰諒信也暗默也下逮五百餘嵗而子張疑之以問仲尼仲尼答云何必髙宗古之人皆然君薨百官總已以聽於冢宰三年周景王有后世子之喪既葬除喪而樂晉叔向譏之曰三年之喪雖貴遂服禮也王雖弗遂宴樂已早亦非禮也此皆天子喪事見於古文者也稱髙宗不云服喪三年而云諒暗三年此釋服心喪之文也譏景王不譏其除喪而譏其宴樂已早明既葬應除而違諒暗之節也堯崩舜諒暗三年故稱遏密八音由此言之天子居喪齊斬之制菲杖絰帶當遂其服既葬而除諒暗以終之三年無改父之道故百官總已聽於冢宰喪服已除故稱不言之美明不復寢苫枕土以荒大政也禮記三年之喪自天子達又云父母之喪無貴賤一也又云端衰喪車皆無等此通謂天子居喪衣服之節同於凡人心喪之禮終於三年亦無服喪三年之文然繼體之君猶多荒寧自從廢諒暗之制至令髙宗擅名於往代子張致疑於當時此乃賢聖所以為譏非譏天子不以服終喪也秦燔書籍率意而行亢上抑下漢祖草創因而不革乃至率天下皆終重服旦夕哀臨經罹寒暑禁塞嫁娶飲酒食肉制不稱情是以孝文遺詔斂畢便葬葬畢制紅禫之除雖不合髙宗諒暗之義近於古典故傳之後嗣于時預修陵廟故斂葬得在浹辰之內因以定制近至明帝存無陵寢五旬乃葬安在三十六日此當時經學疏略不師前聖之病也魏氏革命以既葬為節合於古典然不垂心諒暗同譏前代自泰始開元陛下追尊諒暗之禮慎終居篤允臻古制超絶於殷宗天下歌德誠非靖等所能原本也天子諸侯之禮當以具矣諸侯惡其害已而削其籍今其存者唯士喪一篇戴聖之記雜錯其間亦難以取正天子之位至尊萬幾之政至大羣臣之衆至廣不同之於凡人故大行既葬祔祭于廟則因疏而除之已不除則羣臣莫敢除故屈已以除之而諒暗以終制天下之人皆曰我王之仁也屈已以從宜皆曰我王之孝也既除而心喪我王猶若此之篤也凡等臣子亦焉得不自勉以崇禮此乃聖制移風易俗之本髙宗所以致雍熙豈惟衰裳而已哉若如難者更以權制自居疑於屈伸厭降欲以職事為斷則父在為母期父卒三年此以至親屈於至尊之義也出母之喪以至親為屬而長子不得有制體尊之義升降皆從不敢獨也禮諸子之職掌國子之倅國有事則帥國子而致之太子唯所用之傳曰君行則守有守則從從曰撫軍守曰監國不無事矣喪服母為長子妻為夫妾為主皆三年內宫之主可謂無事揆度漢制孝文之喪紅禫既畢孝景即吉於未央薄后竇后必不得齊斬於别宫此可知也况皇太子配二之至尊與國為體固宜逺遵古禮近同時制屈除以寬諸下協一代之成典君子之於禮有直而行曲而報有經而等有順而去之存諸內而已禮云非玉帛之謂喪云惟衰麻之謂乎此既臣等所謂經制大義且即實近言亦有不安今皇太子至孝蒸蒸發於自然號咷之慕匍匐殯宫大行既奠往而不反必想像平故倣徨寢殿若不變從諒暗則東宫臣僕義不釋服此為永福官屬當獨衰麻從事出入殿省亦難以繼今將吏雖䝉同二十五月之事寧至於大臣亦奪其制昔翟方進自以身為漢相居喪三十六日不敢踰國典而况於皇太子臣等以為皇太子宜如前奏除服諒暗制又于是太子遂以厭降之議從國制除衰麻諒暗終制諒暗之制乃自上古是以髙宗無服喪之文而惟文稱不言漢文限三十六日魏氏以降既虞為節皇太子與國為體理宜釋服卒哭便除祥祫議易曰上古之代喪期無數自殷髙宗諒暗三年不稱服喪三年而稱諒暗三年此釋服心喪之謂大戴篇曰昔武王崩成王十三而嗣立周公居冢宰攝政明年六月既葬周公冠成王而朝於祖以見諸侯命祝雍作頌是三年之內時明矣故今礿祀蒸嘗於是行焉昔仲尼之制春秋也因魯史以明王法喪中之祥祫譏貶之文著焉書與王濬書帝初令濬下建平受杜預節度濬至西陵預與濬書濬大悅表陳預書及濬將至秣陵王渾遣信要令暫過論事濬舉帆直指報曰風利不得泊也足下既摧其西藩便當徑取秣陵討纍世之逋寇釋吳人於塗炭自江入淮逾於泗汴泝河而上振旅還都亦曠世一事也秣陵通鑑作建業與子貺書預子錫無名貺者知汝頗欲念學令同還車到副書可按録受之當别置一宅中勿復以借人嵗終帖十一月十四日預頓首嵗忽已終别久益兼其勞道逺書問又簡間得來說知消息中省次若言面米云真親故帖親故數移轉想祖父白具云也祖父如足下來言小大云具絶汝親親也有信數附書信以慰吾心也黃伯思法帖刋誤云道逺書問又簡閒得來說非當時尺牘中語或是江左人書不時親故帖誤也數附書信以慰吾心亦近世流俗語耳此帖米云僞序春秋左傳集解序春秋者魯史記之名也記事者以事繫日以日繫月以月繫時以時繫年所以紀逺近别同異也故史之所記必表年以首事年有四時故錯舉以為所記之名也周禮有史官掌邦國四方之事達四方之志諸侯亦各有國史大事書之於策小事簡牘而已孟子曰楚謂之檮杌晉謂之乘而魯謂之春秋其實一也韓宣子適魯見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王韓子所見蓋周之舊典禮經也周德既衰官失其守上之人不能使春秋昭明赴告䇿書諸所記注多違舊章仲尼因魯史策書成文考其真僞而志其典禮上以遵周公之遺制下以明將來之法其教之所存文之所害則刋而正之以示勸戒其餘則皆即用舊史史有文質辭有詳略不必改也故傳曰其善志又曰非聖人孰能修之蓋周公之志仲尼從而明之左丘明受經於仲尼以為經者不刋之書也故傳或先經以始事或後經以終義或依經以辨理或錯經以合異隨義而發其例之所重舊史遺文略不盡舉非聖人所修之要故也身為國史躬覽載籍必廣記而備言之其文緩其㫖逺將令學者原始要終尋其枝葉䆒其所窮優而柔之使自求之饜而飫之使自趨之若江河之浸膏澤之潤渙然冰釋怡然理順然後為得也其發凡以言例皆經國之常制周公之垂法史書之舊章仲尼從而修之以成一經之統體其微顯闡幽裁成義類者皆據舊例而發義指行事以正褒貶諸稱書不書先書故書不言不稱書曰之類皆所以啓新舊發大義謂之變例然亦有史所不書即以為義者此蓋春秋新義故傳不言凡曲而暢之也其經無義例因行事而言則傳直言其歸趣而已非例也故發傳之體有三而為例之情有五一曰微而顯文見於此而義起於彼稱族尊君命舍族尊夫人梁亡城緣陵之類是也二曰志而晦約言示制推以知例參㑹不地與謀曰及之類是也三曰婉而成章曲從義訓以示大順諸所諱辟璧假許田之類是也四曰盡而不汙直書其事具文見意丹楹刻桷天王求車齊侯獻捷之類是也五曰懲惡而勸善求名而亡欲蓋而章書齊豹盜三叛人名之類是也推此五體以尋經傳觸類而長之附于二百四十二年行事王道之正人倫之紀備矣或曰春秋以錯文見義若如所論則經當有事同文異而無其義也先儒所傳皆不其然答曰春秋雖以一字為褒貶然皆須數句以成言非如八卦之爻可錯綜為六十四也固當依傳以為斷古今言左氏春秋者多矣今其遺文可見者十數家大體轉相祖述進不成為錯綜經文以盡其變退不守丘明之傳於丘明之傳有所不通皆沒而不說而更膚引公羊榖梁適足自亂預今所以為異專修丘明之傳以釋經經之條貫必由於傳傳之義例總歸諸凡推變例以正褒貶簡二傳而去異端蓋丘明之志也其有疑錯則備論而闕之以俟後賢然劉子駿創通大義賈景伯父子許惠卿皆先儒之美者也末有穎子嚴者雖淺近亦復名家故特舉劉賈許穎之違以見同異分經之年與傳之年相附比其義類各隨而解之名曰經傳集解又别集諸例及地名譜第厯數相與為部凡四十部十五卷皆顯其異同從而釋之名曰釋例將令學者觀其所聚異同之說釋例詳之也或曰春秋之作左傳及榖梁無明文說者以為仲尼自衛反魯修春秋立素王丘明為素臣言公羊者亦云黜周而王魯危行言孫以避當時之害故微其文隱其義公羊經止獲麟而左氏經終孔丘卒敢問所安答曰異乎余所聞仲尼曰文王既沒文不在兹乎此制作之本意也歎曰鳯鳥不至河不出圖吾已矣夫蓋傷時王之政也麟鳯五靈王者之嘉瑞也今麟出非其時虛其應而失其歸此聖人所以為感也絶筆於獲麟之一句者所感而起固所以為終也曰然則春秋何始于魯隱公答曰周平王東周之始王也隱公讓國之賢君也考乎其時則相接言乎其位則列國本乎其始則周公之祚𦙍也若平王能祈天永命紹開中興隱公能𢎞宣祖業光啓王室則西周之美可尋文武之迹不墜是故因其厯數附其行事采周之舊以㑹成王義垂法將來所書之王即平王也所用之厯即周正也所稱之公即魯隱也安在其黜周而王魯乎子曰如有用我者吾其為東周乎此其義也若夫制作之文所以章往考來情見乎辭言髙則㫖逺辭約則義微此理之常非隱之也聖人包周身之防既作之後方復隱諱以避患非所聞也子路欲使門人為臣孔子以為欺天而云仲尼素王丘明素臣又非通論也先儒以為制作三年文成致麟既已妖妄又引經以至仲尼卒亦又近誣據公羊經止獲麟而左氏小邾射不在三叛之數故余以為感麟而作作起獲麟則文止於所起為得其實至於反袂拭面稱吾道窮亦無取焉義起于彼五臣作起義在彼諱辟善本作避諱若此五臣作若如有所善作其所公即五臣作公則律序律者以正罪名令者以序事制二者相須為用也論春秋長厯論書稱期三百六旬有六日以閏月定四時成嵗允釐百工庶績咸煕是以天子必置日官諸侯必置日御世修其業以考其術舉全數而言故曰六日其實五日四分之一日日行一度而月日行十三度十九分度之有畸日官當㑹集此之遲疾以考成晦朔錯綜以設閏月閏月無中氣而北斗邪指兩辰之間所以異於他月也積此以相通四時八節無違乃得成嵗其微密至矣得其精微以合天道事敘而不悖故傳曰閏以正時時以作事事以厚生生民之道於是乎在然陰陽之運隨動而差差而不已遂與厯錯故仲尼丘明每於朔閏發文蓋矯正得失因以宣明厯數也桓十七年日食得朔而史闕其日單書朔僖十五年日食而史闕朔與日故傳因其得失竝起時史之謬兼以明其餘日食或厯失其正也莊二十五年經書六月辛未朔日有食之鼓用牲于社周之六月夏之四月所謂正陽之月也而時厯誤實是七月之朔非六月故傳云非常也唯正月之朔慝未作日有食之於是乎有用幣于社伐鼓于朝此非用幣伐鼓常月因變而起厯誤也文十五年經文皆同而更復發傳曰非禮明前傳欲以審正陽之月後傳發例欲以明諸侯之禮也此乃聖賢之微㫖先儒所未喻也昭十七年夏六月日有食之而平子言非正陽之月以誣一朝近於指鹿為馬故傳曰不君矣且因以明此月為得天正也劉子駿造三統厯以修春秋春秋日食有甲乙者三十四而三統厯唯一食厯術比諸家既最疏又六千餘嵗輒益一日凡嵗當纍日為次而無故益之此不可行之甚者班固前代名儒而謂之最密非徒班固也自古以來諸論春秋者多述謬誤或造家術或用黃帝以來諸厯以推經傳朔日皆不得諧合日食於朔此乃天驗經傳又書其朔食可謂得天而劉賈諸儒說皆以為月二日或三日公違聖人明文其蔽在於守一元不與天消息也余感春秋之事嘗著厯論極言厯之通理其大指曰天行不息日月星辰各運其舍皆動物也物動則不一雖行度大量可得而限纍日為月以新故相序不得不有毫毛之差此自然理也故春秋日有頻月而食者曠年不食者理不得一而算守恆數故厯無不有差失也始失於毫毛而尚未可覺積而成多以失弦望朔晦則不得不改憲以從之書所謂欽若昊天厯象日月星辰易所謂治厯明時言當順天以求合非為合以驗天者也推此論之春秋二百餘年其治厯變通多矣雖數術絶滅還尋經傳微㫖大量可知時之違謬則經傳有驗學者固當曲循經傳月日日之食以考朔晦也以推時驗而皆不然各據其學以推春秋此無異度已之跡而欲削他人之足也余為厯論之後至咸寧中善算李修夏顯依論體為術名乾度厯表上朝廷其術合日月四分之數而微增月行用三百嵗改憲之意二元相推七十餘嵗承以强弱强弱之差蓋少而適足以逺通盈縮時尚書及史官以乾度與太始厯參校古今記注乾度厯殊勝今其術具存時又并考古今十厯以驗春秋知三統厯之最疏也今具列其時得失之數又據經傳微㫖證據及失閏㫖考日辰朔晦以相發明為經傳長厯諸經傳證據及失閏時文字謬誤皆甄發之雖未必其得天蓋春秋當時文厯也學者覽焉說春秋長厯說與論略同日行一度月行十三度十七分之七有竒日官當㑹集此之遲疾以考成晦朔以投閏月閏月無中而北斗邪指兩辰之間所以異於他月積此以相通四時八節無違乃得成嵗其微密至矣得其精微以合天道則事敘而不愆故傳曰閏以正時時以作事然陰陽之運隨動而差差而不已遂與厯錯故仲尼丘明每於朔閏發文蓋矯正得失因以宣明厯數也劉子駿造三正厯以修春秋日蝕有甲乙者三十四而三正厯惟得一蝕比諸家既最疏又六千餘嵗輒益一日凡嵗當纍日為次而故益之此不可行之甚者自古以來諸論春秋者多述謬誤或造家術或用黃帝已來諸厯以推經傳朔日皆不諧合日蝕於朔此乃天驗經傳又書其朔蝕可謂得天而劉賈諸儒說皆以為月二日或三日公違聖人明文其弊在於守一元不與天消息也余感春秋之事嘗著厯論極言厯之通理其大指曰天行不息日月星辰各運其舍皆動物也物動則不一雖行度有大量可得而限纍日為月纍月為嵗以新故相涉不得不有毫末之差此自然之理也故春秋日有頻月而蝕者曠年不蝕者理不得一而算守恆數故厯無不有先後也始失於毫毛而尚未可覺積而成多以失弦望晦朔則不得不改憲以從之書所謂欽若昊天厯象日月星辰易所謂治厯明時言當順天之求合非為合以驗天者也推此論之春秋二百餘年其治厯變通多矣雖數術絶滅逺尋經傳微㫖大量可知時之違謬則經傳有驗學者固當曲循經傳月日日蝕以考晦朔以推時驗而皆不然各據其學以推春秋此無異於度已之跡而欲削他人足也余為厯諸論之後至咸寧中善笇者李修夏顯依論體為術名乾度厯表上朝廷其術合日行四分數而微增月術用三百嵗改憲之意二元相推七十餘嵗承以强弱强弱之差蓋少而適足以逺通盈縮時尚書及史官以乾度與泰始厯參校古今記注乾度厯殊勝泰始厯上勝官厯四十五事今其術具存又并考古今十厯以驗春秋知三統之最疏也譜宗譜别子者君之嫡妻之子長子之母弟也君命為祖其子則為大宗常有一主審昭穆之序辨親疏之别是故百代不遷若無子則支子為後雖七十無無主婦若殤死則縗絰加一等以兄弟之列代之殤無為父道兄弟昭穆同故也死皆為之齊縗其月數各隨親疏為限雖尊雖出嫁猶不敢降也屬絶則為之齊縗三月若始封君相傳則自祖始封君其支子孫皆宗太宗然則繼體君為中宗之尊支庶莫敢宗之是以命别子為宗主一宗奉之故曰祖者髙祖也言屬逮於君則就君屬絶於君則適宗子家也而說者或云君代代得立大宗或云别子之母弟亦得為祖或云命妾子為别子其嫡妻子則遷宗於君皆非也别子之弟子孫無貴賤皆宜宗别子之子孫小宗一家之長也同族則宗之其服隨親疏為比姊妹出嫁不敢降之五屬斷服則不宗之矣令遺令古不合葬明於終始之理同於無有也中古聖人改而合之蓋以别合無在更緣生以示教也自此以來大人君子或合或否未能知生安能知死故各以已意所欲也吾往為臺郎嘗以公事使過密縣之邢山山上有冢問耕父云是鄭大夫祭仲或云子産之冢也遂率從者祭而觀焉其造冢居山之頂四望周達連山體南北之正而邪東北向新鄭城意不忘本也其隧道唯塞其後而空其前不填之示藏無珍寶不取於重深也山多美石不用必集洧水自然之石以為冢藏貴不勞工巧而此石不入世用也君子尚其有情小人無利可動歷千載無毁儉之致也吾去春入朝因郭氏喪亡緣陪陵舊義自表營洛陽城東首陽之南為將來兆域而所得地中有小山上無舊冢其髙顯雖未足比邢山然東奉二陵西瞻宫闕南觀伊洛北望夷叔曠然逺覽情之所安也故遂表樹開道為一定之制至時皆用洛水圓石開隧道南向儀制取法於鄭大夫欲以儉自完耳棺器小斂之事皆當稱此達一作逺登耕父御覽作耕者祭作有情作儉雜文酒論重醖醇醴沃土泉清甜苦無常五味相并漢魏六朝百三家集卷三十七
