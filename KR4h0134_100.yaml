body:
  text: 漢魏六朝百三家集巻一百何遜集題詞何仲言文名齊劉孝綽詩名齊陰子堅今集中文頗少為衡山侯與婦一書詞林見賞亦閨房語耳未可方阿士也子堅長於近體安樂宫詩尢稱除八病協五音然風格逺不逮仲言銅雀妓宿南洲浦諸詩又不知何以比肩同聲也秀才對策南鄉所重既恨未見昏鴉接翅歸金粟裹搔頭等語集亦無有今所傳者隠侯讀詩一日三復文集入洛諸賢並贊以此名髙耳少陵佳句多從仲言脱出是以有能詩何水曹之句後世詩人知慕少陵即慕仲言雖顔黄門致譏貧寒無貶聲價蓋古人詩名有因後人而益貴者陰何其類也目録賦窮烏賦牋與建安王謝秀才牋為孔導辭建安王牋書為衡山侯與婦書七七召樂府銅雀妓擬輕薄篇門有車馬客昭君怨詩九日侍宴樂遊苑登石頭城望廨前水竹答崔録事暮秋答朱記室酬范記室雲落日前墟望贈范廣州雲日夕望江山贈魚司馬答丘長史道中贈桓司馬季珪夕望江橋示蕭諮議楊建康江主簿寄江州褚諮議入西塞示南府同僚下直出谿邊望答虞丹徒敎贈諸遊舊贈族人秣陵兄弟秋夕仰贈從兄寘南仰贈從兄興寧寘南贈江長史别送韋司馬别南還道中送贈劉諮議别與崔録事别兼敘擕手别沈助敎與沈助敎同宿湓口夜别與蘇九徳别贈韋記室黯别初發新林渡連圻二首下方山入東經諸暨縣下浙江作還渡五洲春夕早泊和劉諮議落日望水和劉諮議守風宿南洲浦學古贈丘永嘉征還和蕭諮議岑離閨怨嘲劉諮議詠照鏡擬青青河畔草轉韻體為人作其人識節工歌學古三首聊作百一體早朝車中聽望臨行公車秋夕歎白髪夜夢故人從主移西州寓直齋内霖雨不晴懷郡中遊聚劉博士江丞朱從事同顧不值作詩云爾春暮喜晴酬袁户曹苦雨苦熱七夕揚州法曹梅花盛開行經孫氏陵塘邊見古塚哭吳興柳惲登禪岡寺望和虞記室答髙博士贈王左丞敬酬王明府西州直示同員野夕答孫郎擢石頭答庾郎丹日夕出富陽浦口和朗公臨行與故遊夜别與胡興安夜别車中見新林分别甚盛曉發慈姥磯見征人分别同虞記室登樓望逺歸與虞記室諸人詠扇看伏郎新婚詠娼婦詠舞望新月示同羈詠春雪寄族人治書思澄和司馬博士詠雪詠白鷗兼嘲别者行經范僕射故宅王尚書瞻祖日送褚都曹送司馬闕入五城邊城思為人妾思二首為人妾怨閨怨二首南苑苑中見美人詠春風離夜聴琴相送答江革聨句不成又答江革詠雜花聨句擬古三首聨句徃晉陵聨句范廣州宅聨句相送聨句至大雷聨句賦詠聨句臨别聨句増新曲相對聨句照水聨句折花聨句揺扇聨句正釵聨句漢魏六朝百三家集巻一百目錄欽定四庫全書漢魏六朝百三家集巻一百明張漙輯何遜集賦窮烏賦嗟窮烏之小鳥意局促而馴擾聲遇物而知哀翮排空而不矯望絶侣於夕霞聼翔羣於月曉既滅志於雲霄遂甘心於園沼時復搶榆决至觸案窮歸若中氣而自墮似驚弦之不飛同雉塒而共宿啄雁稗以争肥異海鷗之去就無青鳥之是非豈能瑞周徳而丹羽感燕悲而素暉雖有知於理㑹終失悟於心機牋與建安王謝秀才牋州民泥塗何遜死罪即日被板以民充年秀才民謝聲闕非闗右月旦闕名誰録覩物託興乏澹雅之才闕文豈飄然之作伏惟大王殿下令聞令望邁楚逾河好徳好士雲歸海赴若夫選重雄州望隆觀國必使聲高後進徳繼前修民學異扣鐘辯慚炙輠將以允應貢選待問金門上第甲科既慚髣髴管窺錐畫彌畏友朋恩榮忽賁固請無涯便當妄忝魯服濫同齊吹戰荷屏營忻惶共色不任下情謹奉牋以聞為孔導辭建安王牋士實塗泥美非竹箭昔逢際㑹忝申名質悠悠漢水獨鶩輕舟雖慕義如歸而暗投多愳遂禮頻上席愛比後車感此隆遇久知輕死軒葢出内厯念陪遊府朝升進隨事多幸賜餘論於顔色奉徳音於宴和藉此増榮遂延繆價今便除名復闕足在寛身非木石戀同大馬雖朝夕曵裾無違接侍而職務一離有同賔客瞻堦下拜屑涕無從永言僚故載懐罔巳頡頏之禽慚悲於出幕䝉茸之獸結志於首丘書為衡山侯與婦書昔人邀遊洛汭㑹遇陽臺神仙髣髴有如今别雖帳前㣲笑渉想猶存而幄裏餘香從風且歇掩屏為疾引領成勞鏡想分鸞琴悲别鶴心如膏火獨夜自煎思等流波終朝不息始知萋萋萱草忘憂之言不實團團輕扇合歡之用為虛路邇人遐音塵寂絶一日三秋不足為喻聊陳往翰寧寫欵懐遲枉瓊瑶慰其杼軸七七召假氏先生負兹勁挺狀羣飛之喪侣似獨行之迷徑神忽忽而若忘意衝衝而不定監丹綠其無主聞鐘皷以失聼至乃冬霰積庭室靡人聲春花滿野地無行者圜堵常閉曲突無煙同生芻之有束共死灰之曀然篤論公子聞而崛起雖道術之可忘亦切嗟之所恥命徒御以駱驛將有事乎巖中車煜爚而流水馬泮渙以追風乃踰汗漫入朦朧至深潭之澳溟有洞室之穹崇居隐磷而出没望嶔岑而下上竹距石以袤通水韻松而含響地不寒而蕭瑟月無雲而曭朗於是整容投刺屣履排門揚眉就席舉袂而言曰若五秀禀其生靈六情通其愛惡憎共集於鄙老嗜同歸於美樂今足下羣鳥獸以為娯處貧賤而不怍欲賔實於孤介乃貽譏乎隕穫至乃􅵥􅵥死於道邉貿貿填於溝壑削松筆以畫虎皷鉛刀而刻鶴身既勞而不勌事何感而莫懲欲模名於帶索豈知命於泥繩何異走長衢而避影煎流水以求氷今欲導足下以衛生之秘術怡神之妙道譬愈我於沉痾若起尸於仙草寧願聞乎先生曰有為之生巳逼無益之慮常勞若見明於凝滯幸求教於肓膏公子曰千門始搆百常洞啟激渚開渠疏山抗址延袤水陸曠望東西下臨江海上屬雲霓百丈杳㝠以飛跨九層鬱律以階梯歩三休而未半塗中宿而方迷雕墻曲屈以交牙網户周流以重積既隂岑而影響亦叫嘯而迴易沙板金鋪紫柱玉磶煒煌熻赩硱磳搏敝圖雲霧之蔽虧壯神仙之來往璧璫自耀珠綴嘗響蜉蝣動而晝喧熠耀飛而夜朗既臨下以漻泬亦憑髙而泱漭聞疾雷於階枒㺯奔星於帷幌亘以曲堂周以洞房北負連闥南注長廊綺疏交映鏤檻相望燕飛蓮井日照杏梁陽烏鶱其將動雲鳳矯而欲翔若乃凌沼開源延石崇壤疑崐閬之鬱岪侔滄溟之瀇瀁其中則有桂宫栢寢呉臺柘館複道耿介而連雲阿閣穹窿而仰漢望虬欄之映水見丹鶴之出㟁豔草妖色嘉樹珍名長生靈夀男華女貞河栁垂葉山榴發英翫竒花之春滿摘甘實於夏成此實宫苑之壯麗豈能從我而為榮先生曰多言反道辨口傷實懼貽弊於蔀家且自求乎容䣛公子曰銅鉼玉井金釜桂薪六彞九鼎百果千珍熊蹯虎掌雞跖猩唇潛魚兩味立犀五肉拾卵鳳巢剖胎豹腹三臠甘口七葅愜目蒸餅十字湯官五熟海椒魯豉河鹽蜀薑劑水火而和調糅蘇蔱以芬芳脯追復而不盡犢稍割而無傷黿羮流歠蜒醬先嘗鱠温湖之美鮒切丙穴之嘉魴落爼霞散逐刅雪揚輕同曵蠒白似飛霜蔗有盈丈之名桃表兼斤之實杏積魏國之貢菱為巨野所出衡曲黄梨汶垂蒼栗隴西白柰湘南朱橘荔枝沙棠蒲萄石蜜𤓰稱素腕之美棗有細腰之質並抗吻以除煩永咀牙而消疾於是三雅陳席百味開印玉璣星稀蘭英縹潤既夷志於坎壈亦忘懐於鄙吝此盖滋旨之極珍豈從余而並進先生曰不貴媮食豈甘醇酒既深悟於腐腸豈自迷於爽口公子曰秦氏獨立燕姬絶世如短如長不穠不細信耳目之珍冶乃古今之佳麗妍姿艶逸淑性閒華效施朱於宋里結墮馬於梁家析纎腰以㣲歩呈皓腕於輕紗臨池正領拂鏡㸔花觀堵墻以颯杳傾城國以喧譁墨欲歸而抽軫惠將返而迴車至乃鄭衛繁聲抑揚絶調足使風雲變動性靈感召擊哀響則春臺之人愴焉而雪泣起懽情則崩城之婦粲然而㣲笑􅦌谷調鳳之管龍門獨鵠之柯綠珠絳樹宋臈韓娥青春婉娩上客輕過開洞房以命賞召才人而合宴舉輕幔以徐來隔珠簾而可見牀披象簟戸垂羅薦聼促柱之方遒聞度聲之始囀歩想象以頓足腕蹁蹮而拂面託斜視於遺簮寄含情而舉扇俄而夕鶩東返落日西懸綺霞映水蛾月生天解鴛鴦之繡被拂蛩蚷之長氊燭中帷而動爛香出帳而㣲烟願横衾以自昵脱斜領於君前此乃聲色之妖蕩將不從我而流連先生曰滛聲非篤論之旨麗色乃余情所棄伐國不問仁人此言何從而至公子曰嵗晩農收時閒務隙山火已燎野霜初白聊效殺於秋冬將從禽於草澤蜀地五丁齊都二子氣動山漂汗揮雨起渥洼流頳䕶蘭泄血躡飛影於未形奔流星於欲滅革車隐隐轂騎闐闐鼓噪喧而振地烝徒駭而聒天割玉之刀飲石之箭置羅布其一目罟網周其三面犬號驤螭鷹名奔電暫離已合忽隐仍見赴迥趨危衝林䟦援草随足起山從眼轉跨躡谿澗電舉陵阪鳥不及飛獸不遑伏既前躙而後掎亦左排而右蹴蹠實駭而自救騰靈亂而相撲視灑血之丹地見飛毛之暗目傍窮劫欹勢極搜求文皮坐裂膬尾生抽手羈鐡頂足批銅頭象折齒而陵遽貃拉幽而夷猶擒高樓之度索走大樹之神牛鴈聞弦而站墮猿抱木而啾啁􅀈楚王之雲夣耻漢帝之中流此武材之矯猛豈能從我而畋遊先生曰馳騁傷仁好殺非勇幸廣内之豊樂何禽荒之足重公子曰踆烏始照官槐遽而欲舒顧兎纔滿庭英紛而就落譬光影於飛浮比生靈於栖託擾擾摩肩轔轔方駕空怵迫於毁譽獨慇勤於用舍嗟向有而今無歎後榮而前謝清歌雅舞暫同於夣寐廣厦髙堂俄成於幻化若夫洗精服食慕道遊仙尋玉塵於萬里守金竈於千年三尸可度九轉難傳飛騰水陸咀嚼靈𤣥若乃壁上真辭枕中秘要彈壓神鬼吐納靈妙既變醜以成妍亦反老而為少虬駕夭矯而出沒霓裳颯㳫而容與接鵠馭於後乗追鳳簫於前侣雨散漫以霑服雲霏㣲而襲宇瞰芝闕以窈窕見玉臺之相拒盖排煙而漸滅旌拖風而未舉值解佩於江濵逢弄珠於漢渚薄遊𤣥圃弭節太華列神童於羽帳侍玉女於仙車澗採兮危實苑㧞兮迴花聼弱水之晨浪望崑山之夕霞窮北辰而比夀指中岳以為家此神仙之恍惚豈從我而蠲邪先生曰捕影之言莫測擊風之論難盡未嘗留意於死生豈稍論於椿菌公子曰洙泗遺文鄒魯餘烈其道未迷其風不絶方領圓冠金口木舌談章句之逺㫖構紛綸之雅說陳五禮明六詩貫穿㣲妙辯析毫釐既待問於重席亦覃思而下幃醖藉愷悌和樂緝熈生徒肅肅賔友師師並接袵以聞道俱援手而受辭心絶内戰事無外慾横經者比肩擁箒者繼足醜申韓之法令陋桓文之風俗六郡湊其衣冠五陵窮其軌躅信斯文其若水實斯人之如玉若夫珠璣産於蚌蛤珪璧出於山淵未有玉不瑩而為寳人無學而稱賢盖持身之管籥進徳之舟船響如鐘而待叩明似鏡以長懸此其重於經術寧降志於吾賢先生曰誠此言之甚美比斯道之為曠耻見嘲於腐儒豈求珍於席上公子曰我大梁之啟基方䆳古而無匹先天定始比殷周而餘裕揖讓受終考唐虞而不失道徳有序憲章咸秩六府孔修百司盡畢搜求儒雅招拾遺逸旰食思治雖聞之於昔談昧旦臨朝乃見之乎兹日蕩蕩薰風泱泱大典道含𢎞而廣被澤汪濊而傍闡採輿人之片言納匹夫之小善事在㣲而畢照物無幽而不顯若夫下車布徳伐罪弔民風無偃稼雨不破塵覩勝殘於朞月見成俗於浹辰含羣生兮如海飬萬類其猶春鄉無豕食之𨽻野靡狼顧之民樵者目金而知耻耕夫讓畔以成仁何大庭之足競豈栗陸之能隣璧水道庠序之風石渠啟珪璋之盛竒士輻湊而騁足異人間出而効命小大之獄無寃民翾飛之物無天性故能睦之以九世齊之以七政坦坦恢恢巍巍赫赫政徳洽於霜風敎義窮於足迹望雲氣而欵闗候海水而重譯所謂府不輟貢史無虛帛天端磊砢而相尋地符氛氲而不少收六穗於征賦翫九莖於池沼三足應感而來儀一角知時而自擾映景星於初月聆鳳音於將曉若乃亭毒不疵合天地而並施陶鈞日月與造化而齊功故非言辭之可具盡筆札之所能窮懐真獨往之夫犇走而從事滅迹藏名之士顛倒而向風二漢有同於兒戯魏晋無礙於胸中言未畢先生攝衣而起曰子前所説似玉巵之無當徒費辭而難領譬由背日而視秋毫却行而求鄢郢一聞皇王之盛則豁然神悟而理攄志無時而可巻邦有道而宜舒敢以殘智請從後車樂府銅雀妓秋風木葉落蕭瑟管絃清望陵歌對酒向帳舞空城寂寂簷一作簾宇曠飄飄帷幔輕曲終相顧起日暮松栢聲擬輕薄篇城東美少年重身輕萬億柘彈隨珠丸白馬黄金飾一作勒長安九逵上青槐䕃道植轂擊晨巳喧肩排暝不息走狗通西望牽牛亘南直相期百戱傍去來三市側象牀沓繡被玉盤傳綺食倡女掩歌扇小婦開簾織相看獨隱笑見人還斂色黄鵠悲故羣山枝詠新識烏飛過客盡雀聚行龍匿酌羽方厭厭此時懽未極門有車馬客樂府作何妥非門有車馬客言是故鄉來故鄉有書信縱横印撿開開書看未極行客屢相識借問故鄉來潺湲淚不息上言離别乆下言望應歸寸心將夜鵠相逐向南飛昭君怨樂府作何妥非㫺聞白鶴㺯已自軫離情今來昭君曲還悲秋草生詩九日侍宴樂游苑為西豐矦作皇徳無餘讓重規襲帝勛垂衣化比屋睠顧慎為君翾飛悅有道卉木荷平分宸襟動時豫歲序屬涼氛城霞旦晃朗槐霧曉氤氲鸞輿和八襲鳳駕啟千羣羽觴懽湛露佾舞奏承雲禁林終宴晚華池物色曛疏樹翻高葉寒流聚細紋晴軒連瑞氣同一作飛惹御香芬日斜迢遞宇風起嵯峨雲運偶參矦服恩洽厠朝聞於焉藉多幸歲暮仰遊汾登石頭城闗城乃形勢地險差非一馬嶺逐紆囘大牙傍隆窣百雉極襟帶億庾兼量出至理歸無為善守竟何恤眺聽窮耳目逺近備幽悉擾擾見行人暉暉視落日連檣入迴浦飛葢交長術天暮逺山青潮去遥沙出薄宦恧師表屬辭慙愈疾願乗觳􅑌牛還隱䝉籠室望廨前水竹答崔録事拾遺作顧則心詩非蕭蕭藂竹映澹澹平湖淨葉倒漣漪文水漾檀欒影相思不㑹面相望空延頸逺天去浮雲長墟斜落景幽痾與歲積賞心隨事屏鄉念一邅迴白髪生俄頃暮秋答朱記室游揚日色淺騷屑風音勁寒潭見底清風色極天浄寸隂坐銷鑠千里長遼迥桃李爾繁華松柏余本性故心不存此高文徒可詠酬范記室雲林宻户稍隂草滋堦欲暗風光蕋上輕日色花中亂相思不獨懽佇立空為歎清談莫芙理繁文徒可玩髙唱子自輕繼音予可憚落日前墟望贈范廣州雲緣溝緑草蔓扶援雜華舒輕烟澹栁色重霞映日餘遥遥長路逺一作晚寂寂行人疎我心懐碩徳思欲命輕車高門盛遊侣誰肯進畋漁日夕望江山贈魚司馬湓城帶湓水湓水縈如帶日夕望高城耿耿青雲外城中多宴賞絲竹常繁㑹管聲巳流悅弦聲復凄切歌黛慘如愁舞腰凝欲絶仲秋黄葉下長風正騷屑早雁出雲歸故燕辭檐別晝悲在異縣夜夣還洛汭洛汭何悠悠起望西南樓一作登西樓的的帆向浦團團月映一作隱洲誰能一羽化輕舉逐飛浮答丘長史宿昔敦逺遊名分乃異路千里泝波潮一朝披雲霧從容捨宻勿繾綣論襟趣披文極詆訶析理窮章句明鐘信有待巨海誰能喻奔景驟西傾還途忽東鶩黄花發岸草赤葉翻高樹漁舟乍回歸沙禽時獨赴宴年時未㡬離歌倐成賦伊我念幽闗夫君思贊務短翮方息飛長轡日先驅曝鰓闕走逸翮康時務握手異沈浮佳期安可屢道中贈桓司馬季珪晨䌫雖同解晚洲阻共入猶如征鳥飛差池不可及本願申羈旅何言異翔集君渡北江時詎今南浦泣夕望江橋示蕭諮議楊建康江主簿夕鳥已西度殘霞亦半消風聲動宻竹水影漾長橋旅人多憂思寒江復寂寥爾情深鞏洛予念返漁樵何因適歸願分路一揚鑣寄江州褚諮議自與君別離四序紛迴薄分手清江上念别猶如昨追憶邊城遊奚尋平生樂俱登巃嵸嶺共坐逶迤閣清吹或忘歸繁文時間作連鑣戱淺草遊幰遵長薄五載同衣裘一朝異暌索夫君頗留滯驂騑未沃若伊家從入闗終是填溝壑早秋正悽愴餘暉晚銷鑠林葉下仍飛水花披未落如何隔千里無由舉三爵因君奏采蓮為余吟别鶴入西塞示南府同僚露清曉風冷天曙江晃一作光爽薄雲巖際出初月波中上黯黯連嶂隂騷騷急沫響迴楂急礙浪羣飛争戯廣伊余本羈客重暌復心賞望鄉雖一路懐歸成二想在昔愛名山自知懽獨往情游乃落魄得性隨怡飬年事以蹉跎生平任浩蕩方還讓夷路誰知羨魚網下直出谿邊望答虞丹徒教夫君美章句席丈珍梁楚伊余忝攝官含毫亦禁阻直廬去咫尺心期得宴語休沐乃幽棲别離未㡬許佇立日將暮相思忽無緒谿北映初星橋南望行炬九重不可越三爵何由舉贈諸遊舊弱操不能植薄伎竟無依淺智終已矣令名安可希擾擾從役倦屑屑身事㣲少壯輕年月遲暮惜光輝一塗今未是萬緒昨如非新知雖巳樂舊愛盡睽違望鄉空引領極目淚沾衣旅客長憔悴春物自芳菲岸花臨水發江燕遶檣飛無由下征帆獨與暮潮歸贈族人秣陵兄弟何思澄為秣陵令吾宗昔多士文雅高縉紳小子無學術丁寧困負薪傍枝實紛亂領袖寄親姻名價齊兩許閨門比三陳風力咸通邁藝業並紛綸元方振高羽洛令初解巾自爾典名郡所在號清淳齊兒敢為俗蜀物豈隨身祿俸不妻子謳吟乃吏民孰云穢明徳惟在中聖人若能遺酌我稱首當屬仁仲將本特逹坎壈猶賤貧方成天下士豈伊席上珍外情或簡易内鑒甚人倫時然臨下邑摘伏信如神顧余晚脱畧懐抱日湮淪游宦疲年事來往厭江濵十載猶先職一官乃任真土牛竟不進芻狗空重陳羈旅無儔匹形影自相親蕭索髙秋暮砧杵鳴四隣霏霏入窻雨漠漠暗牀塵所思不可見邈若胡與秦願子加餐飯良㑹在何辰秋夕仰贈從兄寘南堦蕙漸翻葉池蓮稍罷花髙樹北風響空庭秋月華寸心懐是夜寂寂漏方賒撫弦乏歡娯臨觴獨歎嗟悽愴戸凉入徘徊櫩影斜無為淹戚里見就還田家仰贈從兄興寧寘南家世傳儒雅貞白仰餘徽宗派已孤狹財産又貧㣲棲息同蝸舍出入共荆扉松筆時臨沼蒲簡得垂帷幸逢四海泰日月耀増輝相顧無羽翮何由總奮飛一朝異言宴萬里就暌違逺江飄素沬髙山鬱翠㣲相思對淼淼相望隔巍巍死灰終不然長岑且未歸當憐此分袂胍胍淚沾衣贈江長史别二紀厯兹辰投分敦遊處况事兼年徳宴交無爾汝中歲多乖違由來難具叙及君相藩牧伊予客梁楚出國乃參差㑹歸同處所以兹篤惠好何用忘羈旅重得申平生何年更暌阻籠禽恨跼促逸翮超容與餞道出郊坰把袂臨洲渚長飈落江樹秋月照沙溆逺送子應歸棹開帆欲舉離舟懽未極别至悲無語安得生羽毛從君入宛許送韋司馬别送别臨曲渚征人慕前侣離言雖欲繁離思終無緒憫憫分手畢蕭蕭行帆舉舉帆越中流望别上高樓予起南枝怨子結北風愁邐邐山蔽日洶洶浪隱舟隱舟邈巳逺徘徊落日晚歸衢並駕奔别館空筵巻想子斂眉去知予銜淚返銜淚心依依薄暮行人稀曖曖入塘港蓬門巳掩扉簾中看月影竹裏見螢飛螢飛飛不息獨愁空轉側北牕倒長簟南鄰夜聞織棄置勿復陳重陳長歎息南還道中送贈劉諮議别一官從府役五稔去京華遽逐春流返歸帆得望家天末静波浪日際斂烟霞岸薺生寒葉村梅落早花遊魚上急水獨烏赴行楂目想平陵柏心憶青門𤓰曲陌背通垣長墟抵狹斜善鄰談榖稼故老述桑麻寢興從間逸視聼絶諠譁夫君日高興為樂坐驕奢室墮傾城佩門交接幰車入塞長雲雨出國暫泥沙握手分岐路臨川何怨嗟與崔録事别兼叙携手去夏予回首言乃重行行今春遊派澨訪予猶武城暫别年逾半同歸月未盈復道中寒食彌留曠不平道術既為務懽悰苦未并及爾沈痾愈值兹秋序明石磧㳂江静沙流繞岸清川平看鳥逺水淺見魚驚逝將窮履厯方欲恣逢迎何言聚易散鄉棹爾孤征我本倦遊客心念似懸旌聞離常屑涕是别盡凄清一作情况此忘懐地相愛猶弟兄脈脈留南浦悠悠返上京欲鑷星星鬢因君示友生别沈助教可憐玉匣劍復此飛鳬舄未覺愛生憎忽見䨇成隻一朝别笑語萬事成疇昔道遒若波瀾人生異金石願君深自愛共念悲無益與沈助教同宿湓口夜别我為潯陽客戒旦乃西游君隨春水駛雞鳴亦動舟共泛湓之浦旅泊次城樓華燭巳消半更人數唱籌行人從此别去去不淹留與蘇九徳别宿昔夢顔色咫尺思言偃疑作宴何况杳來期各在天一面踟躇暫舉酒倐忽不相見春草似青袍秋月如團扇三五出重雲當知我憶君萋萋若被逕懐抱不相聞贈韋記室黯别故人儻送别停車一水東去帆若不見試望白雲中促膝今何在衘杯誰復同水夜看初月江晚泝歸風無因生羽翰千里暫排空初發新林伊昔負薪暇慕義遊梁楚短翮忘連翩追飛散容與優游沐道教漸瀆淹寒暑大徳本無酬輕生竊自許舟歸屬海運風積如鵬舉浮水暗舟艫合岸喧徒侣凛凛窮秋暮初寒入洲渚鐃吹響清江懸旗出長嶼危檣迥不進沓浪高難拒回首泣親賔中天望宛許帝城猶隱約家園無處所去矣方悠悠含意將誰語渡連圻二首此山多靈異峻岨實非恒洑流自洄糾激瀨視奔騰懸崖抱奇崛絶壁駕崚嶒硣磟上争險岞崿下相崩百年積死樹千尺掛寒藤詭怪終不測迴沈意難登願欲書聞見聊以寄親朋連圻連不極極望在雲霞絶壁無走獸窮岸有盤楂糾紛上巃嵸穿豁下巖岈魚遊若擁劍猿掛似懸𤓰隂岸生駮蘚伏水拂澄沙客子行行倦年光處處華石蒲生促節巖樹落高花暮潮還入浦夕鳥飛向家寓目皆鄉思何時見狹斜下方山寒鳥樹間響落星川際浮繁霜白曉岸苦霧黒晨流鱗鱗逆去水瀰瀰急還舟望鄉行復立瞻途近更修誰能百里地縈繞千端愁入東經諸暨縣下浙江作疲身不自量温腹無恒擬未能守封植何能固廉耻一經可人言三冬徒戯爾虚信蒼蒼色未究㝠㝠理得彼既宜然失之良有以常言厭四壁自覺輕千里日夕聊望逺山川空信美歸飛天際没雲霧江邊一作傍起安邑乏主人臨卭多客子鄉鄉自風俗處處皆城市所見無故人含意終何巳還渡五洲我行朔已晦泝水復沿流戎傷初不辨動黙自相求睠言還九派迴艫出五洲蕭散烟霧晚凄清江漢秋沙汀暮寂寂蘆岸晚修修以此南浦夜重此北門愁方圓既齟齬貧賤豈怨尤春夕早泊和劉諮議落日望水旅人嗟倦遊結纜坐春洲日暮江風静中川聞棹謳草光天際合霞影水中浮單艫時向浦獨檝乍乗流孌童泣垂釣妖姬哭盪舟客心自有緒對此空復愁和劉諮議守風彌旬苦凌亂揆景候阡陌晝想汝陽津夜夢邯鄲驛憤風急驚岸屯雲仍觸石蕭條疾帆流磈礧衝波白息榜巳云久維梢晨已積蒼蒼極浦潮杳杳長洲夕本慙佽飛劍寧慕澹臺璧纎羅若不闕跂予中上澤宿南洲浦幽棲多暇豫從役知辛苦解纜及朝風落帆依暝浦違鄉巳信次江月初三五沈沈夜看流淵淵朝聼鼔霜洲渡旅鴈朔飈吹宿莽夜淚坐滛滛是夕偏懐土學古贈丘永嘉征還龍馬魚腸劍躞蹀起風塵結客蔥河返喧喧動四鄰入墟猶憶舊覓巷復疑新窺見應門出遥識下機人相悲淚欲下離别方自陳和蕭諮議岑離閨怨曉河沒高棟斜月半空庭窻中度落葉簾外隔飛螢含悲玉臺作情下翠帳掩泣玉臺作涕閉金屏昔期今未返春草寒復青思君無轉易何異北辰星嘲劉諮議房櫳滅夜火窻戸映朝光妖女褰帷去躞蹀初下牀雀釵横曉鬢蛾眉艶宿粧稍聞玉釧逺猶憐翠被香寧和早朝客差池已鴈行詠照鏡朱簾旦初捲綺機晨未織玉匣開鑑影寳臺静臨飾對影獨含笑看花時轉側聊為出蠒眉試染天桃色寳釵若可間金鈿畏相逼蕩子行未歸啼粧坐沾臆擬青青河畔草轉韻體為人作其人識節工歌春蘭一作園日應好折花望逺道秋夜苦復長抱枕向空牀吹臺一作樓下促節不言於此别歌筵掩團扇何時一相見絃絶猶依軫葉落纔下枝即此雖云别方我未成離學古三首長安美少年羽騎暮連翩玉羈瑪瑙勒金絡珊瑚鞭陣雲横塞起赤日下城圓追兵待都䕶烽火望祁連虎落夜方寢魚麗曉復前平生不可定空信蒼浪天鞏洛上東門薄暮川流側渾渾車馬道行人不相識目夕棲鳥逺浮雲起新色寸心空延佇對面何由即飛輪倘易去易去因風力昔隨張博望辭帝長楊宫獨好西山勇思為北地雄十年事河外雪一作雲鬢别闗中季月邊秋重嚴野散寒蓬日隱龍城霧塵起玉闗風全狐君巳復半菽我猶空欲因上林鴈一見平陵桐聊作百一體靈輒困桑下於陵拾李螬厯齒方嗟賤炙背豈知豪傭畊乏旅力倚市憚劬勞曠日無豆飰方冬缺緼袍清旦開蓬蓽舉目想煎熬樞機慎僕𨽻媒蘖畏朋曹萬途皆自僻一事豈他褒匆匆昨不定負杖出蓬蒿逄施同溝壑值設乃糠糟生途稍冉冉逝水日㴞㴞咸言等木石誰當出羽毛早朝車中聽望詰旦鐘聲罷隱隱禁門通蘧車響北闕鄭履入南宫宿霧開馳道初日照相風胥徒紛絡驛騶御或西東暫喧耳目外還保性靈中方驗遊朝市此説不為空臨行公車擾擾排曙扉鱗鱗驅早駕禁門儼猶閉嚴城方警夜道勝多增榮拙薄終難化以兹畎澮質重與滄溟舍纚舟去濁河揆景辭清灞平生多意緒懐抱皆徂謝念此將如何撫心獨悲咤秋夕歎白髮絲白不難染蓬生直易扶惟見一作此星星鬢獨與衆中殊昔年十四五率性頗亷隅直是安被褐非敢慕懐珠何言志事晚疲拙嬰殊軀逄時乃倐忽失路亦斯湏郊郭勤二頃形體憇一廡涸蚌困魚目籠禽觸四隅宵長壁立静廓處謝懽愉月色臨牕樹蟲聲當户樞飛蛾拂夜火墜葉舞秋株逐物均乗鶴違俗等䨇鳬故人倘未棄求我谷之嵎夜夣故人客心驚夜魂言與故人同開簾覺水動映竹見牀空浦口望斜月洲外聞長風九秋時未晚千里路難窮已如臃腫木復似飄颻蓬相思不可寄直在寸心中從主移西州寓直齋内霖雨不晴懐郡中遊聚寓直慚虎賁沈迷豈職事祈祈寒枝動濛濛秋雨駛不見眼中人空想山南寺䨇桐傍櫩上長楊夾門植夙昔搆良遊接膝同懽志東西忽為阻向隅懐獨思颯颯履聲喧擾擾羣分異卧聞復雷響坐視重扄秘欲寄一行書何解三秋意劉博士江丞朱從事同顧不值作詩云爾故人篤久要新知從暮室﨑嶇枉道過邂逅幽人出心期不㑹面懐之成首疾向夕敞山扉臨窻玩餘帙蜘蛛正網戸落花紛入膝浸滛水上風蔽虧霞中日良辰一携手住坐無儔匹劉矦務屬書江生勤下筆朱君博辭理去去追名實是顧一參差何能更蓬蓽吾人少拘礙得性便遊逸方欲俟寒裳相從懽道術春暮喜晴酬袁戸曹苦雨振衣喜初霽褰裳對晚晴落花猶未捲時鳥故餘聲春芳空悅目游客反傷情鄉園不可見江水獨自清願得同携手歸望對都城苦熱昔聞草木焦今窺一作覩沙石爛曀曀風逾静曈曈日漸旰習静閟一作悶衣巾讀書煩几案卧思清露浥坐待高星燦蝙蝠戸中飛蠛蠓窻間亂實無河朔飲空有臨淄汗遺金不自拾惡木寧無幹願以三伏晨催促九秋換七夕仙車駐七襄鳳駕出天潢月映九㣲火風吹百和香來懽暫巧笑還淚已沾裳一作啼粧依稀如洛汭倐忽似高唐别離未得語河漢漸湯湯揚州法曹梅花盛開兎園標物序驚時最是梅銜霜當路發映雪擬寒開枝横郤月觀花繞凌風臺朝灑長門泣夕駐臨卭杯應知早飄落故逐上春來行經孫氏陵昔在零陵厭神器若無依逐兎爭先㨗掎鹿競因機呼噏開伯道叱咤掩江畿豹變分竒畧虎視肅戎威長虵衂巴漢驥馬絶淮淝交戰無内禦重門豈外扉成功舉已棄凶徳愎而違水龍忽東騖青葢乃西歸朅來巳一作易永久年代曖微微苔石疑文字荆墳失是非山鶯空曙響隴月自秋暉銀海終無浪金鳬㑹不飛閴寂今如此望望沾人衣塘邊見古塜行路一孤墳路成墳欲毁空疑年代積不知陵谷徙幾逄一作經秋葉黄驟見春流瀰金蠶不可織玉樹何時蕋陌上驅馳人笑歌自侈靡今日非明日所念誰憐此哭呉興栁惲南州擅荆梓上國稱羽儀伊人以戴徳李公傷在期逺識内無愠深衷外有規一怍窺清文窮麗則𢎞論盡高竒多能誠所貴小善聊復為百歩均射葉八體妙臨池曲悟同神解龜謀信有知入朝耿長劍出牧盛層麾納言信加首豐貂亦在移霞區兩借寇貪泉一舉巵翰飛矯未極朝露溘先危以兹舊館想况乃西日垂蔓草生車轍枯木卧崩坻樽酒誰為滿靈衣空自披眷言尋惠好慟哭悲路岐含毫徒有屬搦管竟無摛登禪岡寺望和虞記室南望南郭門拱樹稍雲宻北窻北溱一作湊道重樓霧中出接樹隠高蟬交枝承落日光隂不可捨懐抱何由悉答高博士北窻凉夏首幽居多卉木飛蜨一作蝶㺯晚花清池映疎竹為宴得快性安閒聊鼓腹將子厭囂塵就予開耳目贈王左丞櫩外鶯啼罷園裡日光斜游魚亂水葉輕燕逐風花長墟上寒靄曉樹沒歸霞九華暮已隐抱鬱徒交加敬酬王明府星稀初可見月出未成光澄江照逺火夕霞隐連檣賤軀臨不測玉體畏垂堂念别已零涙况乃思故鄉西州直示同員日長禁戸倦即事思短晨漏盡唱聲急此理復傷人矛盾交為論光璧帶成珍誓將收飲啄得得任心神野夕答孫郎擢山中氣色滿墟上生烟露杳杳星出雲啾啾雀隐樹虚館無賔客幽居乏懽趣思君意不窮長如流水注石頭答庾郎丹高樹䕃樓宻細草綠成被黄鸝隐葉飛蛺蝶縈空戯隂岑自爾悅寂寥予罕寄相如阻禁闈何由從簡易日夕出富陽浦口和朗公客心愁日暮徙倚空望歸山烟涵樹色江水映霞暉獨鶴凌空一作風逝雙鳬出浪飛故鄉千餘里兹夕寒無衣臨行與故遊夜别厯稔共追隨一旦辭羣匹復如東注水未有西歸日夜雨滴空堦曉燈暗離室相悲各罷酒何時同一作更促膝與胡興安夜别居人行轉軾客子暫維舟念此一筵笑分為兩地愁露濕寒塘草月映清淮流方抱新離恨獨守故園秋車中見新林分别甚盛金谷賔遊盛青門冠葢多隔林望行幰下阪聽鳴珂於時春未歇麥氣始清和還入平原逕窮巷可張羅曉發早霞麗初日清風消薄霧水底見行雲天邊看逺樹且望沿泝劇暫有江山趣疾兎聊復起爽地豈能賦慈姥磯暮烟起遥㟁斜日照安流一同心賞夕暫解去鄉憂野㟁平沙合連山逺霧浮客悲不自巳江上望歸舟見征人分别凄凄日暮時親賔俱竚立征人㧞劍起兒女牽衣泣候騎出蕭闗追兵赴馬邑且當横行去誰論裹屍入同虞記室登樓望逺歸登樓欲望逺遥遥見白衣白衣猶逺逺言是稍知非對窻看寳瑟入户㺯鳴機無令日光晩門閣掩重扉與虞記室諸人詠扇如珪信非玷學月但為輪機杼蘼蕪妾裁縫篋笥人揺風入素手占曲掩朱唇羅袖幸拂拭微芳聊可因看伏郎新婚霧夕蓮出水霞朝日照梁何如花燭夜輕扇掩紅粧良人復灼灼席上自生光所悲高駕動環珮出長廊詠娼婦曖曖高樓暮華燭帳前明羅帷雀釵影寳瑟鳳雛聲庭花枝上發新月霧中生誰念當窻牖相望獨盈盈詠舞管清羅薦合絃驚雪袖遲逐唱迴纎手聽曲轉蛾睂凝情眄墮珥微睇託含辭日暮留嘉客相看愛此時望新月示同羈初宿長淮上破鏡出雲明今夕千餘里雙蛾映水生的的與沙静灔灔逐波輕望鄉皆下淚非我獨傷情詠春雪寄族人治書思澄可憐江上雪迴風起復滅本欲映梅花翻悲似玉屑朝鶯日弄響暮條行可結咸言不適時安知非矯節和司馬博士詠雪凝堦夜似月拂樹曉疑春蕭散忽如盡徘徊已復新暫蔽巻䊵質復慙施粉人若逐微風起誰言非玉塵詠白鷗兼嘲别者可憐雙白鷗朝夕水上遊玉臺作浮何言異棲息雌住雄不留孤飛出溆浦獨宿下滄洲東西從此别影響絶無由行經范僕射故宅旅葵應蔓井荒藤已上扉寂寂空郊暮無復車馬歸㶑灔故池水蒼茫落日暉遺愛終何極一作閴寂今如此行路獨沾衣王尚書瞻祖日昱昱丹旐振亭亭素葢立金鐸讙巳鳴龍輀將復入華臺日未徙荒墳路行濕巳矣將何如賔馭皆灑泣送褚都曹君隨結客去我乃倦逰歸本願同棲息今成相背飛送司馬闕入五城隨風飄岸葉行雨暗江流居人㑹應返空欲送行舟邊城思柳黄未吐葉水綠半含苔春色邊城動客思故鄉來為人妾思二首魂銷形巳去釵落猶依枕欲去淚無眥不看悲復甚機中刺繡所窗下朝粧處未憶神巳傷欲忘悲不去為人妾怨燕戯還簷際花飛落枕前寸心君不見拭淚坐調絃閨怨二首竹葉響南窻月光照東壁誰知夜獨覺枕前雙淚滴閨閣行人斷房櫳月影斜誰能北窻下獨對後園花南苑苑門闢千扇苑戸開萬扉樓殿聞珠履竹樹隔羅衣苑中見美人羅䄂風中捲玉釵林下耀團扇承落花復持掩餘笑詠春風可聞不可見能重復能輕鏡前飄落粉琴上響餘聲離夜聼琴别離既有緒琴瑟反成悲美人多怨態亦復慘長睂相送客心已百念孤遊重千里江暗雨欲來浪白風初起答江革聨句不成日余乏文幹逄君善草札工拙既不同神氣何由拔又答江革棘端雖非譬至妙安可量要知同罔象然始見毫芒詠雜花井上發新花誰言不經染已如薄紫拂復似濃紅㸃狀錦無裁縫依霞有舒歛聨句擬古三首聯句家本青山下好上青山上青山不可上一上一惆悵遜匣中一明鏡好鑑明鏡光明鏡不可鑑一鑑一情傷范雲少知雅琴曲好聼雅琴聲雅琴不可聼一聼一沾纓劉孝綽往晉陵聨句臨别我傷悲送歸子自適劉金不可散卜葢何由惜遜從來重分隂未曽輕尺璧故任情一異於是望三益髙爽爾自高樓寢予返東臯陌寄語落毛人非復平原客遜問舍且求田音亂無可擇勝門成好事盤紆欲何索范廣州宅聨句洛陽城東西却作經年别昔去雪如花今來花似雪雲濛濛夕烟起奄奄殘暉滅非君愛滿堂寧我安車轍遜相送聯句寸隂常可惜别至倍傷神子瞻天際水予望路中塵韋黯憫憫岐路側去去平生親一朝事千里流涕向三春遜二昔共入門笑今成送别悲君還舊聚處為我一嚬睂王江乗於今還促膝自此客江湄願子俱停駕看我獨解維遜三髙軒雖駐軫餘日久無輝以我辭鄉淚沾君送别衣遜至大雷聨句高談㑹良夕滿酒對羈情閔閔風烟動蕭蕭江雨聲遜宻雲窮浦暗飛電逺洲明若非今宴適詎使客愁輕劉孺遥舟似連鴈逺火若迴星江潭望如此銜巵共君傾桓季珪賦詠聨句弊履常决踵眉高起半額曼倩爾何為獨歎長安索遜工商既慚巧農士聊相易蝘腹有餘資鴻眉方可拍江革攝職媿握蘭濫官悲執㦸連章既不敏髙談豈能劇孺逸翮任奮飛窘歩事羈勒還鳥余能繫流言爾無惑革憂懐乃千載永歡常數刻直是悲别離非闗念通塞遜日照汀沙素山影波浪黑爾限大江南余歸茂陵北孺臨别聨句臨别情多緒送歸涕如霰君望長安城予悲獨不見遜爾來同去國予歸方異縣懐别心獨憂手淚方濺濺孺増新曲相對聨句酒䦨日隱樹上客請調絃嬌人挾瑟至逶迤未肻前劉孝勝舊愛今何在新聲徒自憐有曲無人聼徙倚高樓前何澄徘徊映日照轉側被風吹徒為相思響傷春君不知劉綺月昏樓上坐含悲望别離巳切空牀怨復看花柳枝遜照水聨句挿花行理鬢遷延去復歸雖憐水上影復恐濕羅衣遜臨橋看黛色映渚媚鉛暉不顧春荷動彌畏小禽飛綺折花聯句笑出春園裏望花聯褰纈欲以間珠鈿非為相思折遜日照爛成綺風來聚疑雪試採一枝歸願持因逺别綺揺扇聨句紈扇巳新製蕩婦復新粧欲掩羞中笑還飄袖裏香遜在握時揺動當歌掩抑揚誰云減羅袂影日聊自障綺正釵聯句竹臺歸欲礙花林出未通度簮先分影轉珥忽瞻風遜雙橋耀寳鈿闐闐宻復叢羞令挂一作桂纓闕整挿補餘空綺漢魏六朝百三家集巻一百
