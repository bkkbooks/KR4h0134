body:
  text: 漢魏六朝百三家集巻二十漢王逸集題詞屈原在楚平王時以忠被疎作離騷經頃襄王立放之江南復作九歌天問九章逺遊卜居漁父大招自沈汨羅其後楚宋玉作九辯招魂漢賈誼作惜誓淮南小山作招隠士東方朔作七諫嚴忌作哀時命王褒作九懐劉向作九歎皆擬其文漢武時淮南王安始作離騷傳向典校經書分為十六巻東京班固賈逵各作離騷章句餘十五巻闕而不説至王逸復作十六篇章句又續為九思取班固二序附之為十七篇今世所行離騷皆王本也東漢文苑王叔師父子皆有名文考靈光殿賦與夢賦二篇世共傳誦叔師文少有習者讀離騷乃見之矣文字存亡常有時命或存已集或附他書俱可不敝天壤叔師騷註即不能割本書獨行然自以為與原同産南陽土風哀思有足親者章句諸篇與遺文並録不類巨山詩序康成詩譜哉目録賦機賦荔支賦楚辭序楚辭章句序離騷經章句序九歌章句序天問章句序九章章句序逺遊章句序卜居章句序漁父章句序九辨章句序招魂章句序大招章句序惜誓章句序招隠士章句序七諫章句序哀時命章句序九懐章句序九歎章句序論折武論騷九思逢尤怨上疾世憫上遭厄悼亂傷時哀歳守志詩琴思楚歌漢魏六朝百三家集巻二十目録欽定四庫全書漢魏六朝百三家集巻二十明張溥輯漢王逸集賦機賦帝軒龍躍庶業是昌俯覃聖恩仰覽三光爰制布帛始垂衣裳於是取衡山之孤桐南嶽之洪樟結靈根於盤石託九層於巖傍性條畼以端直貫雲表而剴良儀鳯晨鳴翔其上怪獸羣萃而陸梁於是迺命匠人潛江奮驤踰五嶺越九岡斬伐剖析擬度短長勝復迴轉克像乾形大匡淡泊擬則川平光為日月葢取昭明三軸列布上法台星兩驥齊首儼若將征方圓綺錯微玅窮竒蟲禽品獸物有其宜兎耳跧伏若安若危猛獸相守竄身匿蹄髙樓雙峙下臨清池遊魚銜餌瀺灂其陂鹿盧竝起纎繳俱垂一往一來匪勞匪疲於是莫春代謝朱明達時蠶人告訖舍罷獻絲或黄或白宻蠟凝脂纎纎静女經之絡之爾乃窈窕淑媛美色貞怡解鳴珮釋羅衣披華幕登神機乘輕杼覽牀帷動搖多容俯仰生姿荔支賦曖若朝雲之興森如横天之彗湛若大厦之容鬱如峻嶽之勢修幹紛錯緑葉蓁蓁灼灼若朝霞之映日離離如繁星之着天皮似丹罽膚若明璫潤侔和璧竒喻五黄仰歎麗表俯嘗嘉味口含甘液心受芳氣兼五滋而無常主不知百和之所出卓絶類而無儔超衆果而獨貴楚辭序楚辭章句序序曰昔者孔子叡聖明喆天生不王俾定經術乃刪詩書正禮樂制作春秋以為後王之法門人三千罔不昭達臨終之日則大義乖而微言絶其後周室衰微戰國竝爭道徳陵遲譎詐萌生於是楊墨鄒孟孫韓之徒各以所知著造傳記或以述古或以明世而屈原履忠被譛憂悲愁思獨依詩人之義而作離騷上以諷諌下以自慰遭時暗亂不見省納不勝憤懣遂復作九歌以下凡二十五篇楚人高其行義瑋其文采以相教傳至於孝武帝恢廓道訓使淮南王安作離騷經章句則大義粲然後世雄俊莫不瞻仰攄舒玅思纘述其詞逮至劉向典校經書分以為十六巻孝章即位深𢎞道藝而班固賈逵復以所見改易前疑各作離騷經章句其餘十五巻闕而不説又以壯為狀義多乖異事不要撮今臣復以所識所知稽之舊章合之經傳作十六巻章句雖未能究其微玅然大指之趣略可見矣且人臣之義以中正為高以仗節為賢故有危言以存國殺身以成仁是以伍子胥不恨于浮江比干不悔于剖心然後徳立而行成榮顯而名稱若夫懐道以迷國佯愚而不言顛則不能扶危則不能安婉娩以順上逡巡以避患雖保黄耉終夀百年葢志士之所恥愚夫之所賤也今若屈原膺忠貞之質體清潔之性直若砥矢言若丹青進不隠其謀退不顧其命此誠絶世之行俊彥之英也而班固謂之露才揚巳競於羣小之中怨恨懐王譏刺椒蘭茍欲求進强非其人不見容納忿恚自沈是虧其高明而損其清潔者也昔伯夷叔齊讓國守志不食周粟遂餓而死豈可復謂有求於世而恨怨哉且詩人怨主刺上曰嗚呼小子未知臧否匪面命之言提其耳風諫之語於斯為切然仲尼論之以為大雅引此比彼屈原之詞優游婉順寧以其君不知之故欲提攜其耳乎而論者以為露才揚已怨刺其上强非其人殆失厥中矣夫離騷之文依託五經以立義焉帝高陽之苗裔則詩厥初生民時惟姜嫄也紉秋蘭以為佩則將翺將翔佩玉瓊琚也夕擥洲之宿莽則易潛龍勿用也駟玉虬而乘鷖則易時乘六龍以御天也就重華而敶詞則尚書咎繇之謀謨也登崑崙而涉流沙則禹貢之敷土也故智彌盛者其言博才益劭者其識逺屈原之詞誠博逺矣自孔丘終後以來名儒博達之士著造詞賦莫不擬則其儀表祖式其模範取其要玅竊其華藻所謂金相玉質百嵗無匹名垂罔極永不刋滅者也離騷經章句序離騷經者屈原之所作也屈原與楚同姓仕于懐王為三閭大夫三閭之職掌王族三姓曰昭屈景屈原序其譜屬率其賢良以厲國士入則與王圖議政事決定嫌疑出則監察羣下應對諸侯謀行職修王甚珍之同列大夫上官靳尚妬害其能共譛毁之王乃疏屈原屈原執履忠貞而被讒衺憂心煩亂不知所愬乃作離騷經離别也騷愁也經徑也言以放逐離别中心愁思猶陳直徑以風諌君也故上述唐虞三代之制下序桀紂羿澆之敗冀君覺悟及于正道而還已也是時秦昭王使張儀譎詐懐王令絶齊交又使誘楚請與俱㑹武闗遂脇與俱歸拘畱不遣卒客死于秦其子襄王復用讒言遷屈原于江南而屈原放在山野復作九章援天引聖以自證明終不見省不忍以清白久居濁世遂赴汨淵自沈而死離騷之文依詩取興引類譬諭故善鳥香艸以配忠貞惡禽臭物以比讒佞靈修美人以嫓于君宓妃佚女以譬賢臣虬龍鸞鳯以託君子飄風雲霓以為小人其詞温而雅其義皎而朗凡百君子莫不慕其清髙嘉其文采哀其不遇而閔其志焉九歌章句序九歌者屈原之所作也昔楚南郢之邑沅湘之間其俗信鬼而好祀其祠必作樂鼓舞以樂諸神屈原放逐竄伏其域懐憂苦毒愁思怫鬱出見俗人祭祀之禮歌舞之樂其詞鄙陋因為作九歌之曲上陳事神之敬下以見已之寃結託之以風諫故其文意不同章句雜錯而廣異義焉天問章句序天問者屈原之所作也何不言問天天尊不可問故曰天問也屈原放逐憂心愁悴彷徨山澤經歴陵陸嗟號旻昊仰天嘆息見楚有先王之廟及公卿祠堂圖畫天地山川神靈琦瑋僪佹及古賢聖怪物行事周流罷倦休息其下仰見圖畫因書其壁呵而問之以渫憤懣舒瀉愁思楚人哀惜屈原因共論述故其文義不次敘云敘曰昔屈原所作凡二十五篇世相教傳而莫能説天問以文義不次又多竒怪之事自太史公口論道之多所不逮至於劉向揚雄援引傳記以解説之亦不能詳悉所闕者衆多無聞焉既有解説乃復多連蹇其文濛澒其説故厥義不昭微指不晳自游覽者靡不苦之而不能照也今則稽之舊章合之經傳以相發明為之符驗章決句斷事事可曉俾後學者永無疑焉九章章句序九章者屈原之所作也屈原於江南之壄思君念國憂思罔極故復作九章章者著明也言已所陳忠信之道甚著明也卒不見納委命自沈楚人惜而哀之世論其詞以相傳焉逺遊章句序逺遊者屈原之所作也屈原履方直之行不容于世上為讒佞所譛毁下為俗人所困極章皇山澤無所告訴乃深惟元一修執恬漠思欲濟世則意中憤然文采秀發遂敘玅思託配仙人與俱遊戲周歴天地無所不到然猶懐念楚國思慕舊故忠信之篤仁義之厚也是以君子珍重其志而瑋其辭焉卜居章句序卜居者屈原之所作也屈原履忠貞之性而見嫉妬念讒佞之臣承君順非而䝉富貴已執忠直而身放棄心迷意惑不知所為乃往至太卜之家稽問神明決之蓍龜卜已居世何所宜行冀聞異策以定嫌疑故曰卜居也漁父章句序漁父者屈原之所作也屈原放逐在江湘之間憂愁嘆吟儀容變易而漁父避世隠身釣漁江濵欣然自樂時遇屈原川澤之域怪而問之遂相應答楚人思念屈原因敘其辭以相傳焉九辨章句序九辨者楚大夫宋玉之所作也辨者變也謂敶道徳以變説君也九者陽之數道之綱紀也故天有九星以正璣衡地有九州以成萬邦人有九竅以通精明屈原懐忠貞之性而被讒邪傷君闇蔽國將危亡乃援天地之數列人形之要而作九歌九章之頌以諷諌懐王明已所言與天地合度可履而行也宋玉者屈原弟子也閔惜其師忠而放逐故作九辨以述其志至於漢興劉向王褒之徒咸悲其文依而作詞故號為楚詞亦承其九以立義焉招魂章句序招魂者宋玉之所作也招者召也以手曰招以言曰召魂者身之精也宋玉憐哀屈原忠而斥棄愁懣山澤魂魄放佚厥命將落故作招魂欲以復其精神延其年夀外陳四方之惡内崇楚國之美以諷諫懐王冀其覺悟而還之也大招章句序大招者屈原之所作也或曰景差疑不能明也屈原放流九年憂思煩亂精神越散與形離别恐命將終所行不遂故憤然大招其魂盛稱楚國之樂崇懐襄之徳以比三王能任用賢公卿明察能薦舉人宜輔佐之以興至治因以風諌達已之志也惜誓章句序惜誓者不知誰所作也或曰賈誼疑不能明也惜者哀也誓者信也約也言哀惜懐王與已信約而復背之也古者君臣將共為治必以信誓相約然後言乃從而身以親也葢刺懐王有始無終也招隠士章句序招隠士者淮南小山之所作也昔淮南王安博雅好古招懐天下俊偉之士自八公之徒咸慕其徳而歸其仁各竭才智著作篇章分造辭賦以類相從故或稱小山或稱大山其義猶詩有小雅大雅也小山之徒閔傷屈原又怪其文昇天乘雲役使百神似若仙者雖身沈没名徳顯聞與隠處山澤無異故作招隠士之賦以章其志也七諌章句序七諫者東方朔之所作也諫者正也謂陳法度以諫正君也古者人臣三諌不從退而待放屈原與楚同姓無相去之義故加為七諫慇懃之意忠厚之節也或曰七諫者法天子有争臣七人也東方朔追閔屈原故作此辭以述其志所以昭忠信矯曲朝也哀時命章句序哀時命者嚴夫子之所作也夫子名忌與司馬相如俱好辭賦客遊于梁梁孝王甚竒重之忌哀屈原受性忠貞不遭明君而遇暗世斐然作辭嘆而述之故曰哀時命也九懐章句序九懐者諫議大夫王褒之所作也懐者思也言屈原雖見放逐猶思念其君憂國傾危而不能忘也褒讀屈原之文嘉其温雅藻采敷衍執握金玉委之汚瀆遭世溷濁莫之能識追而愍之故作九懐以裨其詞史官録第遂列于篇九歎章句序九歎者䕶左都水使者光禄大夫劉向之所作也向以博古敏達典校經書辯章舊文追思屈原忠信之節故作九歎歎者傷也息也言屈原放在山澤猶傷念君歎息無已所謂讃賢以輔志騁詞以曜徳者也九思章句序九思者王逸之所作也自屈原終没之後忠臣介士遊覽學者讀離騷九章之文莫不愴然心為悲感髙其節行玅其麗雅至劉向王褒之徒咸嘉其義作賦騁辭以讃其志則皆列于譜録世世相傳逸與屈原同土共國悼傷之情與凡有異竊慕向褒之情作頌一篇號曰九思以裨其辭未有解脱故聊訓誼焉論折武論苞含六藝游覽百家用道徳為弓弩仁義為鎧甲北堂書鈔載王逸臨豫州教云舉遺逸于山藪黜奸邪于邦國騷九思悲兮愁哀兮憂天生我兮當闇時被諑譛兮虛獲尤心煩憒兮意無聊嚴載駕兮出戲遊周八極兮歴九州求軒轅兮索重華世既卓兮逺眇眇握佩玖兮中路躇羨皋繇兮建典謨懿風后兮受瑞圖愍余命兮遭六極委玉質兮於泥塗遽傽遑兮驅林澤步屏營兮行丘阿車軏折兮馬虺頹惷悵立兮涕滂沲思丁文兮聖明哲哀平差兮迷謬愚吕傅舉兮殷周興忌嚭専兮郢吳虚仰長歎兮氣飲結悒殟絶兮活復蘇虎兕争兮於廷中豺狼鬭兮我之隅雲霧㑹兮日暝晦飄風起兮揚塵埃走鬯䟫兮作東西欲竄伏兮其焉如念靈閨兮奥重深輒願竭節兮隔無繇望舊邦兮路委隨憂心悄兮志勤劬魂㷀㷀兮不遑寐日眩眩兮寤終朝右逢尤令尹兮謷謷羣司兮譨譨哀哉兮淈淈上下兮同流菽藟兮蔓衍芳䖀兮挫枯朱紫兮雜亂曾莫兮别諸倚此兮巖穴永思兮窈悠嗟懐兮眩惑用志兮不昭將喪兮玉斗遺失兮鈕樞我心兮煎熬惟是兮用憂集慕兮九旬退顧兮彭務擬斯兮二蹤未知兮所投謠吟兮中野上察兮璇璣大火兮西睨攝提兮運低雷霆兮硠􅐀雹霰兮霏霏奔電兮光晃凉風兮愴悽鳥獸兮驚駭相從兮宿棲鴛鴦兮噰噰狐狸兮哀吾兮介特獨處兮罔依螻蛄兮鳴東蟊􅝺兮號西蛓縁兮我裳蠋入兮我懐蟲豸兮夾余惆悵兮自悲佇立兮忉怛心結縎兮折摧右怨上周徘徊兮漢渚求水神兮靈女嗟此國兮無良謀女詘兮謰謱鷃雀列兮譁讙鴝鵒鳴兮聒余抱昭華兮寳璋欲衒鬻兮莫取言逝邁兮北徂呌我友兮配耦日陰曀兮未光閴睄雿兮靡睹紛載驅兮高馳將諮詢兮皇羲遵河皋兮周流路變易兮時乖濿滄海兮東遊沐盥浴兮天池訪太昊兮道要云靡貴兮仁義志欣樂兮反征就周文兮邠岐秉玉英兮結誓日欲暮兮心悲惟天禄兮不再背我信兮自違踰隴堆兮渡漠過桂車兮合黎赴崑山兮􅎗騄從盧敖兮棲遲吮玉液兮止渴齧芝華兮療飢居嵺廓兮尠疇逺梁昌兮㡬迷望江漢兮濩渃心𦂳絭兮傷懐時朏朏兮且旦塵漠漠兮未晞憂不暇兮寢食吒增歎兮如雷右疾世哀世兮睩睩諓諓兮嗌喔衆多兮阿媚骩靡兮成俗貪枉兮黨比貞良兮㷀獨鵠竄兮枳棘鵜集兮帷幄蕠兮青􅀢藁本兮萎落覩斯兮偽惑心為兮隔錯逡巡兮圃藪率彼兮畛陌川谷兮淵淵山峊兮峉峉叢林兮崯崯林榛兮岳岳霜雪兮漼溰冰凍兮洛澤東西兮南北罔所兮歸薄庇廕兮枯樹匍匐兮巖石踡跔兮寒局數獨處兮志不申年齒盡兮命迫促魁纍擠摧兮常困辱含憂强老兮愁無樂鬚髮蔓顇兮顠鬢白思靈澤兮一膏沐懐蘭英兮把瓊若待天明兮立躑躅雲濛濛兮電儵爍孤鶵驚兮鳴呴呴思怫鬱兮肝切剥忿悁悒兮孰訴告右憫上悼屈子兮遭厄沈玉躬兮湘汨何楚國兮難化迄于今兮不易士莫志兮羔裘競佞諛兮讒䦧䦧指正義兮為曲訿璧玉兮為石鶻鵰遊兮華屋鵕䴊棲兮柴蔟起奮迅兮奔走違羣小兮謑訽載青雲兮上昇適昭明兮所處躡天衢兮長驅踵九陽兮戲蕩越雲漢兮南濟秣余馬兮河鼓霄霓紛兮晻翳參辰回兮顛倒逢流星兮問路顧指我兮從左俓娵觜兮直馳御者迷兮失軌遂踢達兮邪造與日月兮殊道志閼絶兮安如哀所求兮不耦攀天階兮下視見鄢郢兮舊宇意逍遙兮欲歸衆穢盛兮杳杳思哽噎兮詰詘涕流瀾兮如雨右遭厄嗟嗟兮悲夫殽亂兮紛挐茅絲兮同䋴冠履兮共絇督萬兮侍宴周召兮負蒭白龍兮見射靈龜兮執拘仲尼兮困厄鄒衍兮幽囚伊余兮念兹奔遁兮隠居將升兮高山上有兮猴猿欲入兮深谷下有兮虺蛇左見兮鳴鵙右睹兮呼梟惶悸兮失氣踊躍兮距跳便旋兮中原仰天兮增歎菅蒯兮野莽雚葦兮千眠鹿蹊兮􅜓􅜓貒貉兮蟫蟫鸇鷂兮軒軒鶉䳺兮甄甄哀我兮寡獨靡有兮匹倫意欲兮沈吟迫日兮黄昏𤣥鶴兮高飛增逝兮青冥鶬鶊兮喈喈山鵲兮嚶嚶鴻鸕兮振趐歸鴈兮于征吾志兮覺悟懐我兮聖京垂屣兮將起跓竢兮須明右悼亂惟昊天兮昭靈陽氣發兮清明風習習兮和煖百艸萌兮華榮堇荼茂兮敷疏蘅芷彫兮瑩嫇愍貞良兮遇害將夭折兮碎糜時混混兮澆􅀈哀當世兮莫知覽往昔兮俊彦亦詘辱兮係纍管束縛兮桎梏百貿易兮傳賣遭桓繆兮識舉才徳用兮列施且從容兮自慰玩瑟書兮遊戲迫中國兮迮陿吾欲之兮九夷超五嶺兮嵯峨觀浮石兮崔嵬陟丹山兮炎野屯余車兮黄支就祝融兮稽疑嘉已行兮無為乃回朅兮北逝遇神孈兮冥娭欲靜居兮自娛心愁慼兮不能放余轡兮策駟忽風騰兮雲浮蹠飛杭兮越海從安期兮蓬萊縁天梯兮北上登太一兮玉臺使素女兮鼓簧乘戈和兮謳謠聲噭誂兮清和音晏衍兮要謠咸欣欣兮酣樂余眷眷兮獨悲顧章華兮太息志戀戀兮依依右傷時旻天兮清凉𤣥氣兮髙朗北風兮􅕙烈艸木兮蒼唐吚吷兮噍噍蝍蛆兮穰穰歳忽忽兮惟暮余感時兮悽愴傷俗兮泥濁矇蔽兮不章寳彼兮砂礫捐此兮夜光椒瑛兮涅汙葈耳兮充房攝衣兮緩帶操戈兮魯陽昇車兮命僕將馳兮四荒下堂兮見蠆出門兮觸􅑣巷有兮蚰蜒邑多兮螳螂睹斯兮嫉賊心為兮切傷俛念兮子胥仰憐兮比干投劒兮脱冕龍屈兮蜿蟤潛藏兮山澤匍匐兮叢攅窺見兮溪澗流水兮沄沄黿鼉兮欣欣鱣鮎兮延延羣行兮上下駢羅兮列陳自恨兮無友特處兮㷀㷀冬夜兮陶陶雨雪兮冥冥神光兮熲熲鬼火兮熒熒修徳兮困控愁不聊兮遑生憂紆兮鬱鬱惡所兮冩情右哀歳陟玉巒兮逍遙覽髙岡兮嶢嶢桂樹列兮紛敷吐紫華兮布條實孔鸞兮所居今其集兮惟鴞鳥鵲驚兮啞啞余顧瞻兮怊怊彼日月兮闇昧障覆天兮祲氛伊我后兮不聰焉陳誠兮効忠攄羽翮兮超俗遊陶遨兮養神乘六蛟兮蜿蟬遂馳騁兮陞雲揚彗光兮為旗秉電䇿兮為鞭朝晨發兮鄢郢食時至兮增泉繞曲阿兮北次造我車兮南端謁𤣥黄兮納贄崇忠貞兮彌堅歴九宫兮徧觀睹秘藏兮寳珍就傅説兮騎龍與織女兮合婚舉天罼兮掩邪彀天弧兮射姦隨真人兮翺翔食元氣兮長存望太微兮穆穆睨三階兮炳分相輔政兮成化建烈業兮垂勲日瞥瞥兮西没道遐迥兮阻歎志稸積兮未通悵敞罔兮自憐右守志亂曰天庭明兮雲霓藏三光朗兮鏡萬方斥蜥蝪兮進龜龍策謀從兮翼璣衡配稷契兮恢唐功嗟英俊兮未為雙詩琴思楚歌盛陰修夜何難曉思念糾戾腸摧繞時節晩暮年齒老冬夏更運去若頽寒來暑往難逐追形容減少顔色虧時忽晻晻若騖馳意中私喜施用為内無所恃失本義志願不得心肝沸憂懐感結重嘆噫歳月已盡去奄忽亡官失禄去家室思想君命幸復位久處無成卒放棄漢魏六朝百三家集巻二十
