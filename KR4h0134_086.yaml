body:
  text: 漢魏六朝百三家集巻八十六梁江淹集目錄樂府銅爵妓採菱曲齊藉田樂歌二首迎送神升歌饗神歌牲出入歌薦豆呈毛血歌奏宣列之樂歌舞齊鳯皇銜書伎辭詩侍始安王石頭從征虜始安王道中從冠軍建平王登廬山香爐峰從建平王遊紀南城望荆山歩銅臺秋至懐歸渡西塞望江上諸山赤亭渚渡泉嶠出諸山之頂僊陽亭遊黄蘖山還故園劉僕射東山集陸東海譙山集無錫縣歴山集外兵舅夜集貽袁常侍古意報袁功曹寄丘三公臥疾怨别劉長史燈夜和殷長史贈錬丹法和殷長史從蕭驃騎新帝壘惜晚春應劉秘書秋夕納凉奉和刑獄舅郊外望秋答殷博士冬盡難離和丘長史池上酬劉記室呉中禮石佛採石上菖蒲雜體三十首有序古離别李都尉陵從軍班媫妤詠扇魏文帝曹丕遊宴陳思王曹植贈友劉文學楨感遇王侍中粲懐徳嵇中散康言志阮步兵籍詠懐張司空華離情潘黄門岳述哀陸平原機羈宦左記室思詠史張黃門協苦雨劉太尉琨傷亂盧郎中諶感交郭𢎞農璞遊仙孫廷尉綽襍述許徴君詢自叙殷東陽仲文興矚謝僕射混遊覽陶徴君潛田居謝臨川靈運遊山顔特進延之侍宴謝法曹惠連贈别王徴君㣲飬疾袁太尉淑從駕謝光祿莊郊遊鮑參軍昭戎行休上人怨别學魏文帝效阮公詩十五首就謝主簿宿無錫舅相送銜涕别當春四韻同闕左丞感春氷遥和謝中書二首詠美人春遊征怨清思詩傷内弟劉常侍悼室人十首漢魏六朝百三家集巻八十六目録欽定四庫全書漢魏六朝百三家集巻八十六明張溥輯梁江淹集樂府銅爵妓武皇去金閣英威長寂寞雄劍頓無光雜佩亦銷鑠秋至明月圓風傷白露落清夜何湛湛孤燭映蘭幕撫影愴無從惟懐憂不薄瑶色行應罷紅芳幾爲樂徒登歌舞臺終成螻蟻郭採菱曲秋日心容與涉水望碧蓮紫菱亦可採試以緩愁年參差萬葉下泛漾百流前髙彩隘通壑香氛麗廣川歌出櫂一作趙女曲儛入江南絃乘黿非逐俗駕鯉乃懐仙衆美信如此無恨在一作出淸泉齊藉田樂歌二首永明四年藉田詔江淹造歌迎送神升歌羽鑾從動金駕時遊教騰義鏡樂綴前修率先丹藕躬遵緑疇靈之聖之歳殷澤柔饗神歌瓊斝旣飾繡簋以陳方燮嘉種永毓宵民牲出入歌祝詳史具禮備樂薦有牲在陳有鼓在懸騰燭象星奔水類電郊燎夙戒駜彼乘駽以伺質明以佇神晏薦豆呈毛血歌時恭時祀有物有則伊我上聖實抱明德犧象交陳鬱尊四塞黍惟嘉榖酒惟𤣥黙薦通蒼祗慶覃黎黒願靈之降祚家祐國奏宣列之樂歌舞殷崇配天周尊明祀瑞合汾隂慶同泰畤靑幕雲舒丹殿霞起二曜惟新五精告始于以享之景福是履齊鳯皇銜書伎辭宋世有此辭齊初詔中書郎江淹改皇齊啓運從瑶璣靈鳯銜書集紫微和樂旣洽神所依超商巻夏耀英輝永世壽昌聲華飛詩侍始安王石頭緒官承盛世逢恩侍英王結劍從深景撫袖逐曾光暮情鬱無巳流望在川陽平原忽超逺參差見南湘何如塞北隂雲鴻盡來翔擥鏡照愁色徒坐隱憂方山中如未夕無使桂葉傷從征虜始安王道中乘笏從帷幕仄身豫休明君子未獲宴小人亦自營結軒首凉野驅馬傃寒城容裔還鄉櫂逶迤去國旌山氣亘百里山色與雲平喬松日夜竦紅霞旦夕生徒慙恩厚槩空抱春施名仰願光威逺嵗晏返柴荆從冠軍建平王登廬山香爐峯廣成愛神鼎淮南好丹經此山具鸞鶴往來盡仙靈瑶草正翕赩玉樹信蔥青絳氣下縈薄白雲上杳冥中坐瞰蜿虹俛伏視流星不尋遐恠極則知耳目驚日落長沙渚曽隂萬里生藉蘭素多意臨風黙含情方學松栢隱羞逐市井名幸承光誦末伏思託後旌從建平王遊紀南城恭承此嘉㑹末官至南荆歛袵依光采端笏奉仁明再逢綠草合重見翠雲生江甸知禮富漢渚聞教清君王澹以思樹羽望楚城年積衣劒滅地逺宫館平錦帳終寂寞綵瑟秘音英丹沙信難學黄金不可成遷化每如兹安用貴空名流巖慘中懐凝意方自驚願借若木景長照憂人情望荆山奉義至江漢始知楚塞長南闗繞桐栢西嶽出魯陽寒郊無留影秋日懸清光悲風撓重林雲霞肅川漲嵗晏君如何零淚霑衣裳玉柱空掩露金尊坐含霜一聞苦寒奏再使豔歌傷步銅臺客子畏霜雪憂至竟悠哉綺帷生網羅寶刀積塵埃思君出漢北鞍馬登楚臺嵗綵合雲光平原秋色來寂聽積空意凝望信長懐蕙芬自有美光景詎徘徊山中忽緩駕暮雪將盈階秋至懐歸悵然集漢北還望岨山田沄沄百重壑參差萬里山楚闗帶秦隴荆雲冠吳烟草色歛窮水木葉變吳川秋至帝子降客人傷嬋娟試訪淮海使歸路成數千蓬驅未止極旌心徒自懸若華想無慰憂至定傷年渡西塞望江上諸山南國多異山雜樹共冬榮潺湲夕澗急嘈噆晨鵾鳴石林上參錯流沫下縱横松氣鑑青靄霞光鑠丹英望古一凝思留滯桂枝情結友愛逺岳採藥好長生常畏佳人晩秋蘭傷紫莖海外果可學嵗暮誦仙經赤亭渚吳江泛丘墟饒桂復多楓水夕潮波黒日暮精氣紅路長寒光盡鳥鳴秋草窮瑤水雖未合珠霜竊過中坐識物序晏卧視嵗隂空一傷千里極獨望淮海風逺心何所類雲邊有征鴻渡泉嶠出諸山之頂岑崟蔽日月左右信艱哉萬壑共馳騖百谷爭往來鷹隼既厲翼蛟魚亦曝鰓崩壁迭枕卧嶄石屢盤迴伏波未能鑿樓船不敢開百年積流水千嵗生青苔行行詎半景余馬以長懐南方天炎火魂兮可歸來僊陽亭擥袂訪亭候兹地乃閩城萬古通漢使千載連吳兵瑤磵夐嶄崒銅山鬱縱横方水埋金雘圓岸伏丹瓊下視雄虹照俯看綵霞明桂枝空命折烟氣坐自驚劒逕羞前檢岷山慙舊名伊我從霜露僕御復孤征楚客心命絶一願聞越聲逰黄蘗山長望竟何極閩雲連越邉南州饒竒怪赤縣多靈仙金峰各虧日銅石共臨天陽岫照鸞采隂谿噴龍泉殘杌千代木廧崒萬古烟禽鳴丹壁上猿嘯青崖間秦皇慕隱淪漢武願長年皆負雄豪威棄劒為名山况我葵藿志松木横眼前所若同逺好臨風載悠然還故園漢臣泣長沙楚客悲辰陽古今雖不舉兹理亦宜傷山中信寂寥孤景吟空堂北地三變露南簷再逢霜竊值寰海闢仄見圭緯昌浮雲抱山川逰子御故鄉遽發桃花渚適宿春風場紅草涵電色綠樹鑠烟光髙歌傃關國微歎依笙篁請學碧靈草終嵗自芬芳劉僕射東山集蕭蕭雲色滋惟愛起長思喬木嘯山曲征鳥怨水湄共惜玉樽暮願是舊集作使光隂遲紳裳視絶雲銜意方此時誦飾江臯駕終從海濵詩陸東海譙山集杳杳長役思思來使情濃恒忌光氛度藉蕙望春紅青莎被海月朱華冒水松輕風曖長嶽雄虹赫逺峰日暮崦嵫谷參差綵雲重永願白沙渚逰衍遂相從丹山有琴瑟不為憂傷容無錫縣歴山集愁生白露日思起秋風年竊悲杜蘅暮擥涕弔空山落葉下楚水别鶴噪吳田嵐氣隂不極日色半虧天酒至情蕭瑟憑樽還惘然一聞清琴奏歔泣方留連况乃客子念直置絲竹間外兵舅夜集丹林一葉舊碧草從此空烟光拂夜色華舟盪秋風歛意悵何已極望情思中瑶瀾寂以晏若采能幾終暮心亦誰寄江臯桂有叢貽袁常侍昔我别楚水秋月麗秋天今君客吳坂春色縹一作日媚春泉幽冀生碧草沅湘含翠烟鑠鑠霞上景懵懵雲外山涉江竟何望留滯空採蓮駐情光氣下凝怨琴瑟前珠貝性明潤蘭玉好芳堅不以宿昔阻懐愧期暮年古意報袁功曹從軍出隴北長望隂山雲涇渭各異流恩情於此分故人贈寶劒鏤以瑤華文一言鳯獨立再説鸞無羣何得晨風起悠哉凌翠氛黄鵠去千里垂涕為報君寄丘三公昔我學冠劒逢君在三川何意風雨激一訣異東西叶先菊秀空應奪蘭芳幾時堅常恐握手畢黯如光絶天安得明月珠擥涕寄吳山卧疾怨别劉長史四時煎日夜玉露催紫榮始懐未及歎春意秋方驚凉草散螢色衰樹斂蟬聲馮景魂且謐卧堂怨已生承君客江潭先愁鴻鴈鳴吳山饒離袂楚水多别情金堅碧不滅桂華蘭有英無輟代上朝豈惜鏡中明但見一葉落哀恨方未平燈夜和殷長史冬盡綵葉暮金石亦懐傷氷鱗不能起水鳥望川梁客子仿永夜寂寞幽意長卧歇丹丘采坐失曽泉光結眉慘成慮銷憂非羽觴此心兾可緩清芷在沅湘贈錬丹法和殷長史琴髙逰㑹稽靈變竟不還不還有長意長意希童顔身識本爛漫光曜不可攀方驗參同契金竈錬神丹頓捨心知愛永卻平生歡玉牒裁可巻珠蘂不盈簞譬如明月色流采映嵗寒一待黄冶就青氛遲孤鸞從蕭驃騎新帝壘鯢妖毁王度虹氣岨王猷上宰軫靈略宏威肅廣謀緜嶮冒戈堞乘嶠架烽樓燕兵歌越水代馬思吳州金笳夜一逺明月信悠悠雲色被江出烟光帶海浮開襟挾蒼宇拓逺局溟洲折日承丹谷總駕臨青丘仄待飈霧晏方從畎壑遊惜晩春應劉秘書烟景抱空意蘅杜綴幽心心憂望碧葉涵影顧青林風光多樹色露華翻蕙隂水苔方下蔓石蘿日上尋霞衣已具帶仙冠不待簮徒為多委鬱精魄還自臨始獲瓊歌贈一㸃重如金山中有襍桂玉瀝乃共斟秋夕納凉奉和刑獄舅蕭條晩秋景旻雲承景斜虚堂起青靄崦嵫生暮霞空居寂以欷左右自幽歌騎星謝箕尾濯髪慙陽阿年歇𤣥圃壁嵗減天津波金簫哀夜長瑶琴怨暮多四時通信黯春風日夜過楚水徒有蘭憂至竟如何郊外望秋答殷博士白露掩江臯青蒲平地蕪長夜亦何際銜思久踟蹰企余重蘭貝清才富金瑜獨豔始東山擅麗終西都雲精無永滯水碧豈暫濡屬我嵫景半賞爾若光初折麻異離羣紉蕙非索居頻贈既雅歌還懐諒短書冬盡難離和丘長史閒居深悵悵颸寒拂中閨寶禮自千里縑書果君題山川吐幽氣雲景抱長懐兹别亦為逺潮瀾鬱東西汀臯日慘色桂闇猿方啼擥意誰侘傺屑涕在心乖杜蘅念無沫石蘭終不暌兾總嵗暮駕逰衍蒼山蹊池上酬劉記室戚戚憂可結結憂視春暮紫荷漸曲池臯蘭覆徑路蔥蒨亘華堂葐蒀雜綺樹為此久佇立容易光隂度水館次文羽山葉下暝露懐賞入舊襟悦物覽新賦惜我無雕文報章慙復素吳中禮石佛幻生太浮詭長思多沈疑疑思不慙炤詭生寧盡時敬承積劫下金光鑠海湄火宅斂焚炭藥草匝卉滋常願樂此道誦經空山坻禪心暮不雜寂行好無私軒騎久已訣親愛不留遲憂傷漫漫情靈意終不緇誓尋青蓮果永入梵庭期採石上菖蒲瑤琴久蕪沒金鏡廢不看不見空閨裏縱横愁思端緩步遵汀渚揚枻泛春瀾電至烟流綺水綠桂涵丹憑酒竟一作意未悅半景方自歎每為憂見及杜若豈能寛冀採石上草得以駐餘顔赤鯉儻可乘雲霧不復還襍體三十首有序夫楚謠漢風既非一骨魏製晉造固亦二體譬猶藍朱成彩雜錯之變無窮宫商為音靡曼之態不極故蛾眉詎同貎而俱動於魄芳草寧共氣而皆悦於魂不其然歟至於世之諸賢各滯所迷莫不論甘而忌辛好丹而非素豈所謂通方廣恕好逺兼愛者哉乃及公幹仲宣之論家有曲直安仁士衡之評人立矯抗况復殊於此者乎又貴逺賤近人之常情重耳輕目俗之恒蔽是以邯鄲托曲於李竒士季假論於嗣宗此其效也然五言之興諒非夐古但闗西鄴下既已罕同河外江南頗為異法故𤣥黄經緯之辨金碧浮沈之殊僕以為亦各具選作合其美兼善而已今作三十首詩斆其文體雖不足品藻淵流庶亦無乖商㩁云爾古離别逺與君别者乃至鴈門闗黄雲蔽千里逰子何時還送君如胙日簷前露已團不惜蕙草晩所悲道里寒君在天一涯妾身長别離願一見顔色不異瓊樹枝兎絲及水萍所寄終不移李都尉陵從軍樽酒送征人踟蹰在親宴日暮浮雲滋握手淚如霰悠悠清水川嘉魴得所薦而我在萬里結友一作髪不相見袖中有短書願寄雙飛燕班媫妤詠扇紈扇如圓月出自機中素畫作秦王女乘鸞向烟霧彩色世所重雖新不代故竊愁涼風至吹我玉階樹君子恩未畢零落在中路魏文帝曹丕遊宴置酒坐飛閣逍遥臨華池神飈自逺至左右芙蓉披緑竹夾清水秋蘭被幽崖月出照園中冠珮相追隨客從南楚來為我吹參差淵魚猶伏浦聽者未云疲髙文一何綺小儒安足為肅肅廣殿隂雀聲愁北林衆賔還城邑何用慰我心陳思王曹植贈友君王禮英賢不恡千金璧雙闕指馳道朱宫羅第宅從容氷井臺清池映華薄涼風盪芳氣碧樹先秋落朝與佳人期日夕望青閣褰裳摘明珠徙倚拾蕙若眷我二三子辭義麗金雘延陵輕寶劒季布重然諾處富不忘貧有道在葵藿劉文學楨感遇蒼蒼山中桂團團霜露色霜露一何緊桂枝生自直橘柚在南國因君為羽翼謬䝉聖主私託身文墨職丹彩既已過敢不自雕飾華月照芳池列坐金殿側微臣固受賜鴻恩良未測王侍中粲懐徳伊昔值世亂秣馬辭帝京既傷蔓草别方知杕杜情崤函蕩選作復丘墟冀闕緬縱横倚棹泛涇渭日暮山河清蟋蟀依素選作桑野嚴風吹枯莖鸛鷁在幽草客子淚已零去鄉三十載幸遭天下平賢主降嘉賞金貂服𤣥纓侍宴出河曲飛葢遊鄴城朝露竟幾何忽如水上萍君子篤恩義柯葉終不傾福履既所綏千載埀令名嵇中散康言志曰余不師訓潛志去世塵逺想出宏域髙步超常倫靈鳯振羽儀戢景西海濵朝食琅玕實夕飲玉池津處順故無累養徳乃入神曠哉宇宙惠雲羅更四陳哲人貴識義大雅明庇身莊生悟無為老氏守其真天下皆得一名實久相賔咸池饗爰居鐘鼓或愁辛栁惠善直道孫登庶知人寫懐良未逺感贈以書紳阮步兵籍詠懐青鳥海上遊鷽斯蒿下飛浮沈不相宜羽翼各有歸飄颻可終年沆瀁安是非朝雲乘變化光耀世所希精衛銜木石誰能測幽微張司空華離情秋月映簾櫳懸光入丹墀佳人撫鳴琴清夜守空帷蘭徑少行迹玉臺生網絲庭樹發紅彩閨草含碧滋延佇整綾綺萬里贈所思願垂湛露惠信我皎日期潘黄門岳述哀青春速天機素秋馳白日美人歸重泉悽愴無終畢殯宫已肅清松栢轉蕭瑟俯仰未能弭尋念非但一撫衿悼寂寞怳然若有失明月入綺忩髣髴想蕙質銷憂非萱草永懐寄夢寐夢寐復㝠㝠何由覿爾形我慙北海術爾無帝女靈駕言出逺山徘徊泣松銘雨絶無還雲華落豈留英日月方代序寢興何時平陸平原機羈宦儲后降嘉命恩紀被微身明發眷桑梓永歎懐密親流念辭南澨銜怨别西津驅馬遵淮泗旦夕見梁陳服義追上列矯迹厠宫臣朱黻咸髦士長纓皆俊民契濶承華内綢繆踰嵗年日暮聊總駕逍遥觀洛川殂歿選作徂役多拱木宿草凌寒烟遊子易感慨躑躅還自憐願言寄三鳥離思非徒然左記室思詠史韓公淪賣藥梅生隱市門百年信荏苒何用苦心魂當學衛霍將建功在河源珪組賢君盼青紫明主恩終軍才始逹賈誼位方尊金張服貂冕許史乘華軒王侯貴片議公卿重一言太平多歡娛飛葢東都門顧念張仲蔚蓬蒿滿中園張黄門協苦雨丹霞蔽陽景緑泉涌隂渚水鸛巢層甍山雲潤柱礎有渰興春節愁霖貫秋序燮燮凉葉奪戾戾颸風舉髙談翫四時索居慕儔侣青苕一作苔日夜黄芳蕤成宿楚嵗暮百慮交無以慰延佇劉太尉琨傷亂皇晉遘陽九天下横氛霧秦趙值薄蝕幽并逢虎據伊余荷寵靈感激狥馳騖雖無六竒術冀與張韓遇寗戚扣角歌桓公遭乃舉荀息冒險難實以忠貞故空令日月逝愧無古人度飲馬出城濠北望沙漠路千里何蕭條白日隱寒樹投袂既憤懣撫枕懐百慮功名惜未立𤣥髪已改素時哉茍有㑹治亂惟㝠數盧郎中諶感交大厦須異材廊廟非庸器英俊著世功多士濟斯位眷顧成綢繆乃與時髦匹姻媾久不虧契濶豈但一逢厄既已同處危非所恤常慕先逹槩觀古論得失馬服為趙將疆場得清謐信陵佩魏印秦兵不敢出慨無幄中䇿徒慙素絲質羈旅去舊京感遇踰琴瑟自顧非杞梓勉力在無逸更以畏友朋濫吹乖名實郭𢎞農璞遊仙崦山多靈草海濵饒竒石偃蹇尋青雲隱淪駐精魄道人讀丹經方士錬玉液朱霞入忩牖曜靈照空隙傲睨摘木芝陵波採水碧眇然萬里遊矯掌望烟客永得安期術豈愁濛汜迫孫廷尉綽襍述太素既已分吹萬著形兆寂動苟有源因謂殤子夭道喪渉千載津梁誰能了思乘扶瑤翰卓然陵風矯靜觀尺棰義理足未嘗少冏冏秋月明憑軒詠堯老浪迹無蚩妍然後君子道領畧歸一致南山有綺皓交臂久變化傳火乃薪草亹亹𤣥思清胷中去機巧物我俱忘懐可以狎鷗鳥許徴君詢自叙張子闇内機單生蔽外像一時排㝠筌泠然空中賞遣此弱喪情資神任獨往采藥白雲隈聊以肆所養丹葩曜芳蕤綠竹䕃閒敞苕苕寄意勝不覺陵虚上曲櫺激鮮飈石室有幽響去矣從所欲得失非外奬至哉操斤客重明固已朗五難既灑落超迹絶塵網殷東陽仲文興矚晨遊任所萃悠悠藴真趣雲天亦遼亮時與賞心遇青松挺秀萼惠色出喬樹極眺清波深緬映石壁素瑩情無餘滓拂衣釋塵務求仁既自我𤣥風豈外慕直置忘所宰蕭散得遺慮謝僕射混遊覽信矣勞物化憂襟未能整薄言遵郊衢總轡出臺省淒淒節序髙寥寥心悟永時菊耀巖阿雲霞冠秋嶺眷然惜良辰徘徊踐落景巻舒雖萬緒動復歸有静曽是迫桑榆嵗暮從所秉舟壑不可攀忘懐寄匠郢陶徴君潛田居種苖在東臯苖生滿阡陌雖有荷鉏倦濁酒聊自適日暮巾柴車路闇光已夕歸人望烟火稚子候簷隙問君亦何為百年㑹有役但願桑麻成蠶月得紡績素心正如此開逕望三益謝臨川靈運遊山江海經邅迴山嶠備盈缺靈境信淹留賞心非徒設平明登雲峰杳與廬霍絶碧障長周流金潭恒澄澈洞林帶晨霞石壁映初晰乳竇既滴瀝丹井復寥泬嵓㟧轉竒秀岑崟還相蔽赤玉隱瑤溪雲錦被沙汭夜聞猩猩啼朝見鼯䑕逝南中氣候暖朱華凌白雪幸遊建徳鄉觀竒經禹穴身名竟誰辨圖史終磨滅且泛桂水潮映月遊海澨攝生貴處順將為智者説顔特進延之侍宴太微凝帝宇瑤光正神縣揆日粲書史相都麗聞見列漢構仙宫開天製寶殿桂棟留夏飈蘭橑停冬霰青林結㝠濛丹巘被五臣作披蔥蒨山雲備卿靄池卉具靈變重陽集清氛下輦降𤣥宴騖望分寰隧曬曠盡都甸氣生川嶽隂烟滅淮海見中坐溢朱組步櫩簉瓊弁禮登佇睿情樂闋延皇眄測恩躋愉逸沿牒懵浮賤承榮重兼金李善作榮重餽兼金巡華過盈瑱敢飾輿人詠方慙淥水薦謝法曹惠連贈别昨發赤亭渚今宿浦陽汭方作雲峰異豈伊千里别芳塵未歇席零李善作涔淚猶在袂入聲停艫望極浦弭棹阻風雪風雪既經時夜永起懐思汎濫北湖遊苕李善作岧亭南樓期㸃翰詠新賞開袠瑩所疑摘芳愛氣馥拾蘂憐色滋色滋畏沃若人事亦銷鑠子衿怨勿往谷風誚輕薄共秉延州信無慙仲路諾靈芝望三秀孤筠情所託所託已殷勤祗足攪懐人今行嶀嵊外銜思至海濵覿子杳未僝欵睇在何辰雜珮雖可贈疏華竟無陳無陳心悁勞旅人豈遊遨幸及風雪霽青春滿江臯解䌫候前侣還望方鬱陶烟景若離逺末響寄瓊瑤王徴君微養疾窈靄瀟湘空翠澗澹無滋寂歴百草晦歘吸鵾雞悲清隂往來逺月華散前墀錬藥矚虚幌汎瑟卧遥帷水碧驗未黷金膏靈詎緇北渚有帝子蕩瀁不可期悵然山中暮懐痾屬此詩袁太尉淑從駕宫廟禮哀敬枌邑道嚴𤣥恭潔由明祀肅駕在祈年詔徒登季月戒鳯藻行川雲斾象漢徙宸網擬星懸朱櫂麗寒渚金鋄映秋山羽衛藹流景綵吹震沈淵辨詩測京國履籍鑒都鄽甿謡響玉律邑頌被丹絃文軫薄桂海聲教燭氷天和惠頒上笏恩渥浹下筵幸侍觀洛後豈慕巡河前服義方無沬展歌殊未宣謝光禄莊郊遊肅舲出郊際徙樂逗江隂翠山方藹藹青浦正沈沈凉葉照沙嶼秋榮冒水潯風散松架險雲鬱石道深静黙鏡緜野四睇亂層岑氣清知鴈引露華識猿音雲裝信解黻烟駕可辭金始整丹泉術終覿紫芳心行光自容裔無使弱思侵鮑參軍昭戎行豪士枉尺璧宵人重恩光徇義非為利執羈輕去鄉孟冬郊祀月殺氣起嚴霜戎馬粟不煖軍士氷為漿晨上城臯坂磧礫皆羊腸寒隂籠白日大谷晦蒼蒼息徒税征駕倚劒臨八荒鷦䳟不能飛𤣥武伏川梁鎩翮由時至感物聊自傷豎儒守一經未足識行藏休上人怨别西北秋風至楚客心悠哉日暮碧雲合佳人殊未來露彩方泛艶月華始徘徊寶書為君掩瑶瑟詎能開相思巫山渚悵望陽雲臺膏罏絶沈燎綺席生浮埃桂水日千里因之平生懐學魏文帝西北有浮雲繚繞華隂山惜哉時不遇入夜值霜寒秋風刮地起吹我至幽燕幽燕非我國窈窕為誰賢少年歌且止歌聲斷客子效阮公詩十五首嵗暮懐感傷中夕弄清琴戾戾曙風急團團明月隂孤雲出北山宿鳥驚東林誰謂人道廣憂慨自相尋寧知霜雪後獨見松竹心十年學讀書顔華尚美好不逐世間人鬬雞東郊道富貴如浮雲金玉不為寶一旦鶗鴂鳴嚴霜被勁草志氣多感失淚下沾懐抱白露淹庭樹秋風吹羅衣忠信主不合辭意將訴誰獨坐東軒下雞鳴夜已晞總駕命賔僕遵路起旋歸天命誰能見人蹤信可疑飄飄恍惚中是非安所之大道常不驗金火每如斯忼慨少淑貌便娟多令辭宿昔秉心誓靈明將見期願從丹丘駕長弄華池滋隂陽不可知鬼神惟杳㝠暫試武帝貌一見李后靈同情淪異物有體入無形賢聖共草昧仁智焉足明變化未有極恍愡誰能精若木出海外本自丹水隂羣帝共上下鸞鳥相追尋千齡猶旦夕萬世更浮沈豈與異鄉士瑜瑕論淺深夏后乘兩龍髙㑹在帝臺榮光河雒出白雲蒼梧來侍御多賢聖升降有羣才四時有變化盛明不徘徊髙陽邈已逺竚立誰語哉昔余登大梁西南望洪河時寒原野曠風急霜露多仲冬正慘切日月少精華落葉縱横起飛鳥時相過搔首廣川隂懐歸思如何常願反初服閒步潁水阿宵月輝西極女圭映東海佳麗多異色芬葩有竒采綺縞非無情光隂命誰待不與風雨變長共山川在人道則不然消散隨風改少年學擊劒從師至幽州燕趙兵馬地唯見古時丘登城望山水平原獨悠悠寒暑有往來功名安可留擾擾當途子毁譽多埃塵朝生輿馬間夕死衢路濵藜藿應見棄勢位乃為親華屋爭結綬朱門競彈巾徒羨草木利不愛金碧身至徳所以貴河上有丈人華樹曜北林芬芳空自宣秋至白雲起蟪蛄號庭前中心有所思虚堂獨浩然安坐詠琴瑟逍遥可永年假乘試行遊北望髙山岑翩翩征鳥翼蕭蕭松栢隂感時多辛酸覽物更傷心性命有定理禍福不可禁唯見雲際鵠江海自追尋夕雲映西山蟋蟀吟桑梓零露被百草秋風吹桃李君子懐苦心感慨不能止駕言逺行遊驅馬清河涘寒暑更進退金石有終始光色俯仰間英豔難久恃至人貴無為裁魂守寂寥唯有馳騖士風塵在一朝輿馬相誇耀賔從共矜驕天道好盈缺春華故秋凋不知北山民商歌弄場苖就謝主簿宿季月寒氣重滋蘭錯無芳北方漂夜色河凝暠如霜悵哉心神晩燭滅此深堂芰衣如可贈寧濕岨雲梁無錫舅相送銜涕别心逺路已迥意滿辭未陳曽風漂别葢北雲竦征人杯酒憐嵗暮志氣非上春若無孤鳥還瀝泣何所因當春四韻同闕左丞雷萌山中草雲煦江上花流烟漾璇景輕風泛凌霞我有幽蘭念銜意矚里斜友人殊未還獨慰簷前華感春氷遥和謝中書二首江臯桐始華斂衣望邊亭平原何寂寂島暮蘭紫莖芬披好草合流爛新光生氷雪徒皦潔此焉空守貞暮意歌上春悵哉望佳人擥洲之宿莽命為瑶桂因觀書術不變學古道恒真若作商山客寄謝丹水濵詠美人春遊江南二月春東風轉綠蘋不知誰家子看花桃李津白雪凝瓊貌明珠㸃絳脣行人咸息駕爭擬洛川神征怨蕩子從征久鳯樓簫管閒獨枕凋雲鬢孤燈損玉顔何日邊塵淨庭前征馬還清思詩趙后未至麗隂妃非美極情理儻可論形有焉足識帝女在河洲晦映西海側隂陽無定光襍錯千萬色終嵗如瓊草紅華長翕赩師曠操雅操延子聆竒音𤣥鶴徒翔舞清角自浮沈明琯東南逝精絲西北臨白雲瑤池曲止一作上使淚淫淫秋夜紫蘭生湛湛明月光偃蹇靈芝采容裔紫華堂林木不拂葢淇水寧漸裳倐忽南江隂照曜北海陽從此長往來萬世無感傷白露滋金瑟清風蕩玉琴空閨饒逺念虚堂生夜隂兹夕一何哀明月沒西林世人重時暮道士情亦深願乘青鳥翼徑出玉山岑至徳不可傳靈龜不可侣草木還根蔕精靈歸妙理我學杳㝠道誰能測窮已須待九轉成終㑹長沙市傷内弟劉常侍金璧自惠質蘭杜信嘉名丹綵既騰迹華萼故揚聲伊余方罷秀歎息向君榮誰疑春光昃何遽秋露輕逺心惜近路促景怨長情風至衣袖冷况復蟪蛄鳴白露㳂漢沼明月空漢生長悲離短意惻切吟空庭注欷東郊外流涕北山坰悼室人十首佳人永暮矣隱憂遂歴兹寶燭夜無華金鏡晝恒微桐葉生緑水霧天流碧滋蕙弱芳未空蘭深鳥思時湘醽徒有酌意塞不能持適見葉蕭條已復花菴鬱帳裏春風盪簷前還燕拂垂涕視去景摧心向徂物今悲輒流涕昔歡常飄忽幽情一不弭守歎誰能慰夏雲多襍色紅光鑠蕤鮮苒弱屏風草潭沲曲池蓮黛葉鑑深水丹華香碧烟臨綵方自弔擥氣以傷然命知悲不絶恒如注海泉駕言出遊衍冀以滌心胷復值烟雨散清隂帶山濃素沙匝廣岸雄虹冠尖峯岀風舞森桂落日曖圓松還結生不念楚客獨無容秋至擣羅紈淚滿未能開風光肅入户月華為誰來結眉向珠網瀝思視青苔鬢局將成葆帶減不須摧我心若涵烟葐蒀滿中懐忩塵嵗時阻閨蕪日夜深流黄夕不織寧聞梭杼音涼靄漂虚座清音盪空琴蜻引知寂寥蛾飛測幽隂乃抱生死悼豈伊離别心顥顥氣薄暮蓛䔩清衾單階前水光裂樹上雪花團庭鶴哀以立雲雞肅且寒方冬有苦淚承夜非膏蘭從此永黯削萱葉焉能寛抒悲情雖滯送往意所知空座幾時設虚帷無久埀暮氣亦何勁嚴風照天涯夢寐無端際惝恍有分離意念每失乖徒見四時虧神女色姱麗乃出巫山湄逶迤羅袂下鄣日望所思佳人獨不然户牖絶錦綦感此増嬋娟屑屑涕自滋清光澹且減低意守空帷二妃麗瀟湘一有乍一無佳人承雲氣無下此幽都當追帝女迹出入泛靈輿掩映金淵側遊豫碧山隅曖然時將罷臨風還故居漢魏六朝百三家集巻八十六
