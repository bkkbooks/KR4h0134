body:
  text: 漢魏六朝百三家集卷二漢司馬相如集題詞梁昭明太子文選登采絶嚴獨於司馬長卿取其三賦四文其生平壯篇略具殆心篤好之沉湎終日而不能舍也太史公曰長卿賦多虛辭濫說要歸節儉與詩諷諫何異余讀之良然子虛上林非徒極博實發於天材楊子雲鋭精揣鍊僅能合轍然疏密大致猶漢書於史記也美人賦風詩之尤上掩宋玉蓋長卿風流誕放深於論色即其所自叙傳琴心善感好女夜亡史遷形狀安能及此他人之賦賦才也長卿賦心也得之於內不可以傳彼曾與盛長通言之歌合組賦列錦均未喻耳獵獸獻書長揚志直馳檄發難巴蜀竦聽慕藺生之澠池跨唐䝉於絶域赤車駟馬足名丈夫抑其文皆賦流也生賦長門沒留封禪英主怨后思眷不忘豈偶然乎目録賦子虛賦上林賦大人賦長門賦美人賦哀二世賦書諫獵書報卓文君書檄論巴蜀檄難難蜀父老文符命封禪文傳自叙傳歌琴歌二首漢魏六朝百三家集卷二目録欽定四庫全書漢魏六朝百三家集卷二明張溥輯漢司馬相如集賦子虛賦楚使子虛使於齊齊王悉發境內之士備車騎之衆與使者出畋畋罷子虛過詫烏有先生而亡是公存焉坐定烏有先生問曰今日畋樂乎子虛曰樂獲多乎曰少然則何樂對曰僕樂齊王之欲誇僕以車騎之衆而僕對以雲夢之事也曰可得聞乎子虛曰可王駕車千乘選徒萬騎畋於海濱列卒滿澤罘網彌山掩兔轔鹿射麋腳麟騖於鹽浦割鮮染輪射中獲多矜而自功顧謂僕曰楚亦有平原廣澤遊獵之地饒樂若此者乎楚王之之獵孰與寡人乎僕下車對曰臣楚國之鄙人也幸得宿衛十有餘年時從出遊遊於後園覽於有無然猶未能遍覩也又焉足以言其外澤者乎齊王曰雖然略以子之所聞見而言之僕對曰唯唯臣聞楚有七澤嘗見其一未覩其餘也臣之所見蓋特其小小者耳名曰雲夢雲夢者方九百里其中有山焉其山則盤紆岪鬱隆崇􅟭崒岑崟參差日月蔽虧交錯糾紛上干青雲罷池陂陀下屬江河其土則丹青赭堊雌黃白附錫碧金銀衆色炫耀照爛龍鱗其石則赤玉玫瑰琳瑉昆吾瑊玏𤣥厲碝石碔砆其東則有蕙圃蘅蘭茞若射干芎藭菖蒲江蘺蘪蕪諸柘巴苴其南則有平原廣澤登降陀靡案衍壇曼緣以大江限以巫山其髙燥則生葴菥苞荔薜莎青薠其埤濕則生藏莨蒹葭東蘠雕胡蓮藕觚蘆菴䕡軒于衆物居之不可勝圗其西則有湧泉清池激水推移外發芙蓉菱華內隱巨石白沙其中則有神龜蛟鼉玳瑁鱉黿其北則有陰林其樹楩柟豫樟桂椒木蘭蘗離朱楊樝梨梬栗橘柚芬芳其上則有赤猿玃猱鵷雛孔鸞騰逺射干其下則有白虎𤣥豹蟃蜓貙犴於是乎乃使專諸之倫手格此獸楚王乃駕馴駮之駟乘雕玉之輿靡魚鬚之橈旃曵明月之珠旗建干將之雄㦸左烏號之雕弓右夏服之徑箭陽子驂乘纎阿為御案節未舒即凌狡獸蹴蛩蛩轔距虛軼野馬􅗗騊駼乘遺風射游騏倐眒倩浰雷動猋至星流霆擊弓不虛發中必決眥洞胸逹掖絶乎心繫獲若雨獸掩草蔽地於是楚王乃弭節徘徊翺翔容與覽乎陰林觀壯士之暴怒與猛獸之恐懼徼受誳殫覩衆物之變態於是鄭女曼姬被阿緆揄紵縞雜纎羅垂霧縠襞襀褰皺紆徐委曲鬱橈溪谷紛紛霏霏揚袘戍削飛􅗒垂髾扶輿倚靡翕呷萃蔡下摩蘭蕙上拂羽蓋錯翡翠之葳蕤繆繞玉綏眇眇忽忽若神仙之髣佛於是乃相與獠於蘭圃媻姗㪍窣而上乎金隄掩翡翠射鵔鸃微矰出纎繳施弋白鵠連鴐鵝雙鶬下𤣥鶴加怠而後發游於清池浮文鷁揚旌栧張翠帷建羽蓋網玳瑁釣紫貝摐金鼓吹鳴籟榜人歌聲流喝水蟲駭波鴻沸涌泉起奔楊會磊石相擊硠硠􅐀􅐀若雷霆之聲聞乎數百里之外將息獠者擊靈鼓起烽燧車案行騎就隊纚乎淫淫般乎裔裔於是楚王乃登雲陽之臺泊乎無為淡乎自持勺藥之和具而後御之不若大王終日馳騁曾不下輿脟割輪焠自以為娛臣竊觀之齊殆不如於是齊王無以應僕也烏有先生曰是何言之過也足下不逺千里來貺吾國王悉發境內之士備車騎之衆與使者出畋乃欲戮力致獲以娛左右何名為夸哉問楚地之有無者願聞大國之風烈先生之餘論今足下不稱楚王之德厚而盛推雲夢以為髙奢言淫樂而顯侈靡竊為足下不取也必若所言固非楚國之美也有而言之是彰君之惡無而言之是害足下之信彰君之惡而傷私義二者無一可也而先生行之必且輕於齊而纍於楚矣且齊東渚巨海南有琅邪觀乎成山射乎之罘浮渤澥遊孟諸邪與肅慎為鄰右以湯谷為界秋田乎青丘倣徨乎海外吞若雲夢者八九於其胸中曾不蒂芥若乃俶儻瑰瑋異方殊類珍怪鳥獸萬端鱗萃充牣其中者不可勝記禹不能名卨不能計然在諸侯之位不敢言游戲之樂苑囿之大先生又見客是以王辭而不復何為無以應哉上林賦亡是公聽然而笑曰楚則失矣而齊亦未為得也夫使諸侯納貢者非為財帛所以述職也封疆畫界者非為守禦所以禁淫也今齊列為東藩而外私肅慎捐國踰限越海而田其於義固未可也且夫二君之論不務明君臣之義正諸侯之禮徒事爭遊戲之樂苑囿之大欲以奢侈相勝荒淫相越此不可以揚名發譽而適足以君自損也且夫齊楚之事又烏足道乎君未覩大巨麗也獨不聞天子之上林乎左蒼梧右西極丹水更其南紫淵徑其北終始灞滻出入涇渭酆鎬潦潏紆餘逶迆經營乎其內蕩蕩乎八川分流相背而異態東西南北馳騖往來出乎椒丘之闕行乎洲淤之浦經乎桂林之中過乎泱􅐯之野泪乎混流順阿而下赴隘狹之口觸穹石激堆崎沸乎暴怒洶涌滂湃滭沸宓汨逼側泌瀄橫流逆折轉騰潎洌滂濞沆溉穹隆雲橈宛灘膠戾踰波趨浥蒞蒞下瀨批巖衝擁奔揚滯沛臨坻注壑瀺灂霣墜沈沈隱隱砰磅訇􅐀潏潏淈淈湁潗鼎沸馳波跳沫汨濦漂疾悠逺長懷寂漻無聲肆乎永歸然後灝溔潢漾安翔徐回蒿乎滈滈東注太湖衍溢陂池於是乎蛟龍赤螭䱎䲛漸離鰅鰫鰬魠禺禺魼鰨揵鰭掉尾振鱗奮翼濳處乎深巖魚鱉歡聲萬物衆夥明月珠子的皪江靡蜀石黃碝水玉磊砢磷磷爛爛采色澔汗叢積于其中鴻鷫鵠鴇駕鵝屬玉交精旋目煩鶩庸渠針疵鵁盧羣浮乎其上泛淫泛濫隨風淡淡與波搖蕩掩薄水渚唼喋菁藻咀嚼菱藕於是乎崇山矗矗巃嵸崔嵬深林巨木嶄巖嵾嵳九嵕嶻嶭南山峩峩巖陀甗錡嶊崣崛﨑振溪通谷蹇産溝瀆谽呀豁閕阜陵别塢崴嵬嵔廆丘虛堀礨隱轔鬱㠥登降陀靡陂池貏豸沇溶淫鬻散渙夷陸亭臯千里靡不被築掩以緑蕙被以江蘺糅以蘼蕪雜以蒥夷布結縷櫕戾莎揭車蘅蘭槀本射千茈薑蘘荷葴橙若蓀鮮支黃礫蔣苧青薠布濩閎澤延蔓太原麗靡廣衍應風披靡吐芳揚烈郁郁菲菲衆香發越肸蠁布寫暗薆咇茀於是乎周覽泛觀縝紛軋笏芒芒恍忽視之無端察之無涯日出東沼入乎西陂其南則隆冬生長涌水躍波其獸則㺎旄貘犛沈牛麈麋赤首圜題窮竒象犀其北則盛夏含凍裂地涉冰揭河其獸則麒麟角端騊駼橐駝蛩蛩驒騱駃騠驢騾於是乎離宮别館彌山跨谷髙廊四注重坐曲閣華榱壁璫輦道纚屬步櫩周流長途中宿夷嵕築堂壘臺增成巖窔洞房俯查眇而無見仰攀而捫天奔星更於閨闥宛虹拖於楯軒青龍蚴蟉於東廂象輿婉僤於西清靈圄燕於閒館偓佺之倫暴於南榮醴泉涌於清室通川過於中庭盤石振崖嶔巖倚傾嵯峨㠎嶫刻削崢嶸玫瑰碧琳珊瑚叢生瑉玉旁唐玢豳文鱗赤瑕駮犖雜插其間鼂采琬琰和氏出焉於是乎盧橘夏熟黃甘橙楱枇杷橪柿楟奈厚朴梬棗楊梅櫻桃蒲萄隱夫薁棣答遝離支羅乎後宮列乎北園䝯丘陵下平原揚翠葉抗紫莖發紅華埀朱榮煌煌扈扈照曜巨野沙棠櫟櫧華楓枰櫨留落胥邪仁頻并閭欃檀木蘭豫章女貞長千仭大連抱夸條直暢實葉葰楙攢立業倚連卷欐佹崔錯癹骫坑衡閜砢垂條扶疏落英幡纚紛溶簫蔘猗柅從風瀏蒞卉歙蓋象金石之聲管籥之音偨池茈虒旋還乎後宫雜襲纍集被山緣谷循坂下隰視之無端究之無窮於是𤣥猿素雌蜼玃飛蠝蛭蜩蠼猱獑胡豰蛫棲息乎其間長嘯哀鳴翩幡互經夭蟜枝格偃蹇杪顛踰絶梁騰殊榛捷垂條踔希間牢落陸離爛漫逺遷若此輩者數百千處娛遊往來宮宿館舍庖厨不徙後宮不移百官備具於是乎背秋涉冬天子校獵乘鏤象六玉虬拖霓旌靡雲旗前皮軒後道遊孫叔奉轡衛公參乘扈從橫行出乎四校之中鼓嚴簿縱獵者江河為阹秦山為櫓車騎雷起殷天動地先後陸離離散别追淫淫裔裔緣陵流澤雲布雨施生貔豹搏豺狼手熊羆足野羊䝉鶡蘇褲白虎被斑文跨野馬凌三嵕之危下磧厯之坻徑峻赴險越壑厲水椎飛亷弄獬豸格蝦蛤鋋猛氏羂騕裊射封豕箭不茍害解脰陷腦弓不虛發應聲而倒於是乎乘輿弭節徘徊翺翔往來睨部曲之進退覽將帥之變態然後侵淫促節倐敻逺去流離輕禽蹴履狡獸􅗗白鹿捷狡兔軼赤電遺光耀追怪物出宇宙彎蕃弱滿白羽射遊梟櫟蜚遽擇肉而後發先中而命處弦矢分藝殪仆然後揚節而上浮凌驚風厯駭猋乘虛無與神俱􅏳𤣥鶴亂昆雞遒孔鸞促鵕䴊拂翳鳥捎鳯皇捷鵷雛掩焦明道盡塗殫迥回車而還招搖乎襄羊降集乎北紘率乎直指暗乎反鄉蹶石關厯封巒過鳷鵲望露寒下棠梨息冝春西馳宣曲濯鷁牛首登龍臺掩細柳觀士大夫之勤略鈞獵者之所得獲觀徒車之所轥轢步騎之所蹂蹃人民之所蹈藉與其窮極踡􅓈驚憚讋伏不被創創怖而死者他他藉藉填坑滿谷掩乎彌澤於是乎游戲懈怠置酒乎皓天之臺張樂乎膠葛之㝢撞千石之鐘立萬石之虡建翠華之旗樹靈鼉之鼓奏陶唐氏之舞聽葛天氏之歌千人唱萬人和山陵為之震動川谷為之蕩波巴俞宋蔡淮南干遮文成顛歌族居遞奏金鼓迭起鏗鎗闛鞈洞心駭耳荆吳鄭衛之聲韶濩武象之樂陰淫案衍之音鄢郢繽紛激楚結風俳優侏儒狄鞮之唱所以娛耳目樂心意者麗靡爛漫於前靡曼美色於後若夫青琴宓妃之徒絶殊離俗妖冶間都靚莊刻飾便嬛綽約柔橈嫚嫚嫵媚纎弱曵獨繭之䄖䄁眇閻易以戍削便姍嫳屑與世殊服芬芳漚鬱酷烈淑郁皓齒粲爛冝笑的皪長眉連姢微睇綿藐色授魂與心愈於側於是酒中樂酣天子芒然而思似若有亡曰嗟乎此太奢侈朕以覽聽餘閒無事棄日順天道以殺伐時休息於此恐後世靡麗遂往而不返非所以為繼嗣創業垂統也於是乎乃解酒罷獵而命有司曰地可墾闢悉為農郊以贍氓𨽻隤墻填塹使山澤之人得至焉實陂池而勿禁虛宮館而勿仭發倉廪以救貧窮補不足恤鰥寡存孤獨出德號省刑罰改制度易服色革正朔與天下為始於是厯吉日以齊戒襲朝服乘法駕建華旗鳴玉鸞游乎六藝之囿馳騖乎仁義之塗覽觀春秋之林射貍首兼騶虞弋𤣥鶴舞干戚載雲罕掩羣雅悲伐檀樂樂胥修容乎禮園翺翔乎書圃述易道於怪獸登眀堂坐清廟次羣臣奏得失四海之內靡不受獲於斯之時天下大說向風而聽隨流而化卉然興道而遷義刑錯而不用德隆於三皇而功羡於五帝若此故獵乃可喜也若夫終日馳騁勞神苦形疲車馬之用抏士卒之精費府庫之財而無德厚之恩務在獨樂不顧衆庶忘國家之政貪雉兔之獲則仁者不由也從此觀之齊楚之事豈不哀哉地方不過千里而囿居九百是草木不得墾闢而民無所食也夫以諸侯之細而樂萬乘之所侈僕恐百姓被其尤也於是二子愀然改容逡巡避席曰鄙人固陋不知忌諱乃今日見教謹受命矣大人賦世有大人兮在於中州宅彌萬里兮曾不足以少留悲世俗之迫隘兮朅輕舉而逺遊乘綘幡之素霓兮載雲氣而上浮建格澤之長竿兮總光耀之采旄埀旬始以為幓兮抴慧星而為髾掉指橋以偃蹇兮又旖旎以招搖攬欃槍以為旌兮靡屈虹而為綢紅杳渺以眩湣兮焱風涌而雲浮駕應龍象輿之蠖略逶麗兮驂赤螭青蚪之蚴蟉蜿蜒低卬夭蟜据以驕驁兮詘折隆窮蠼以連卷沛艾赳螑仡以佁擬兮放散畔岸驤以孱顔跮踱輵轄容以委麗兮綢繆偃蹇怵􅎢以梁倚紏蓼呌奡踏以艐路兮蔑䝉踊躍騰而狂趡蒞颯卉翕熛至電過兮煥然霧除霍然雲消邪絶少陽而登太陰兮與真人乎相求互折窈窕以右轉兮橫厲飛泉以正東悉徵靈圉而選之兮部乘衆神於瑶光使五帝先導兮反太一而從陵陽左𤣥冥而右黔靁兮前陸離而後潏湟厮征伯僑而役羡門兮屬岐伯使尚方祝融驚而蹕御兮清氛氣而後行屯余車其萬乘兮綷雲蓋而樹華旗使勾芒其將行兮吾欲往乎南娭厯唐堯於崇山兮過虞舜於九疑紛湛湛其差錯兮雜遝膠葛以方馳騷擾衝蓯其相紛拿兮滂濞泱軋灑以林離鑽羅列聚叢以蘢茸兮衍曼流爛痑以陸離徑入靁室之砰磷鬱律兮洞出鬼谷之崫礨嵬䃶遍覽八紘而觀四荒兮朅渡九江而越五河經營炎火而浮弱水兮杭絶浮渚而涉流沙奄息總極泛濫水嬉兮使靈媧鼓瑟而舞馮夷時若薆薆將混濁兮召屏翳誅風伯而刑雨師西望崑崙之軋沕洸忽兮直徑馳乎三危排閶闔而入帝宮兮載玉女而與之歸舒閬風而搖集兮亢烏騰而一止低徊陰山翔以紆曲兮吾乃今目睹西王母皬然白首戴勝而穴處兮亦幸有三足烏為之使必長生若此而不死兮雖濟萬世不足以喜回車朅來兮絶道不周㑹食幽都呼吸沆瀣飱朝霞兮噍咀芝英兮嘰瓊華嬐侵潯而髙縱兮紛鴻涌而上厲貫列缺之倒景兮涉豐隆之滂沛馳遊道而修降兮騖遺霧而逺逝迫區中之隘陜兮舒節出乎北垠遺屯騎於𤣥闕兮軼先驅於寒門下崢嶸而無地兮上寥廓而無天視眩眠而無見兮聽恍恍而無聞乘虛無而上假兮超無友而獨存長門賦孝武皇帝陳皇后時得幸頗妬别在長門宫愁悶悲思聞蜀郡成都司馬相如天下工為文奉黃金百斤為相如文君取酒因于解悲愁之辭而相如為文以悟主上陳皇后復得親幸其辭曰夫何一佳人兮步逍遙以自虞魂踰佚而不反兮形枯槁而獨居言我朝往而暮來兮飲食樂而忘人心熑移而不省故兮交得意而相親伊豫志之慢愚兮懷真慤之歡心願賜問而自進兮得尚君之玉音奉虛言而望誠兮期城南之離宫修薄具而自設兮君曾不肻乎幸臨廓獨潜而専精兮天飄飄而疾風登蘭臺而遙望兮神恍恍而外淫浮雲鬱而四塞兮天窈窈而晝陰雷殷殷而響起兮聲象君之車音飄風回而赴閨兮舉帷幄之䄡䄡桂樹交而相紛兮芳酷烈之誾誾孔雀集而相存兮𤣥猿嘯而長吟翡翠脅翼而來萃兮鸞鳯翔而北南心憑噫而不舒兮邪氣壯而攻中下蘭臺而周覽兮步從容於深宫正殿塊以造天兮鬱並起而穹崇間徙倚於東廂兮觀夫靡靡而無窮擠玉户以撼金鋪兮聲噌吰而似鐘音刻木蘭以為榱兮飾文杏以為梁羅丰茸之游樹兮離樓梧而相撑施瑰木之欂櫨兮委參差以槺梁時倣佛以物類兮象積石之將將五色炫以相曜兮爛耀耀而成光緻錯石之瓴甓兮象玳瑁之文章張羅綺之幔帷兮埀楚組之連綱撫柱楣以從容兮覽曲臺之央央白鶴噭以哀號兮孤雌跱於枯楊日黃昏而望絶兮悵獨託於空堂懸明月以自照兮徂清夜於洞房援雅琴以變調兮奏愁思之不可長按流徵以却轉兮聲幼妙而復揚貫厯覽其中操兮意慷慨而自卭左右悲而垂淚兮涕流離而從橫舒息悒而增欷兮屣履起而倣徨揄長𬒮以自翳兮數昔日之愆殃無面目之可顯兮遂頽思而就牀摶芬若以為枕兮席荃蘭而茞香忽寢寐而夢想兮魂若君之在旁惕寤覺而無見兮魂迋迋若有亡衆雞鳴而愁豫兮起視月之精光觀衆星之行列兮畢昴出於東方望中庭之藹藹兮若季秋之降霜夜曼曼其若歲兮懷鬱鬱其不可再更淡偃蹇而待曙兮荒亭亭而復明妾人竊自悲兮䆒年歲而不敢忘美人賦司馬相如美麗間都遊於梁王梁王說之鄒陽譛之於王曰相如美則美矣然服色容冶妖麗不忠將欲媚辭取悅遊王後宮王不察之乎王問相如曰子好色乎相如曰臣不好色也王曰子不好色何若孔墨乎相如曰古之避色孔墨之徒聞齊饋女而遐逝望朝歌而回車譬猶防水火中避溺山隅此乃未見其可欲何以明不好色乎若臣者少長西土鰥處獨居室宇遼廓莫與為娛臣之東鄰有一女子雲髮豐艷蛾眉皓齒顔盛色茂景曜光起恆翹翹而西顧欲留臣而共止登垣而望臣三年於茲矣臣棄而不許竊慕大王之髙義命駕東來途出鄭衛道由桑中朝發溱洧暮宿上宫上宮間館寂寞雲虛門閣晝掩曖若神居臣排其户而造其堂芳香芬烈黼帳髙張有女獨處婉然在牀竒葩逸麗淑質艷光覩臣遷延微笑而言曰上客何國之公子所從來無乃逺乎遂設旨酒進鳴琴臣遂撫琴為幽蘭白雪之曲女歌曰曰獨處室兮廓無依思佳人兮情傷悲有美人兮來何遲日既暮兮華色衰敢託身兮長自私玉叉挂臣冠羅䄂拂臣衣時日西夕𤣥陰晦冥流風慘冽素雪飄零閒房寂謐不聞人聲於是寢具既設服玩珍竒金鉔薰香黼帳低埀䄄褥重陳角枕橫施女乃弛其上服表其衣皓體呈露弱骨豐肌時來親臣柔滑如脂臣乃脉定於內心正於懷信誓旦旦秉志不回翻然髙舉與彼長辭哀二世賦登陂陀之長阪兮坌入曾宮之嵯峨臨曲江之隑州兮望南山之參差巖巖深山之谾谾兮通谷􅣲乎􅢋谺汨淢吸習以永逝兮注平臯之廣衍觀衆樹之蓊薆兮覽竹林之榛榛東馳土山兮北揭石瀨弭節容與兮厯弔二世持身不謹兮亡國失藝信讒不寤兮宗廟滅絶嗚呼哀哉操行之不得兮墓蕪穢而不修兮魂亡歸而不食敻邈絶而不齊兮彌久逺而愈佅精罔閬而飛揚兮拾九天而永逝嗚呼哀哉書諫獵書臣聞物有同類而殊能者故力稱烏獲捷言慶忌勇期賁育臣之愚竊以為人誠有之獸亦宜然今陛下好陵阻險射猛獸卒然遇軼材之獸駭不存之地犯屬車之清塵輿不及還轅人不暇施巧雖有烏獲逢䝉之伎力不得用枯木朽株盡為害矣是胡越起於轂下而羌夷接軫也豈不殆哉雖萬全無患然本非天子之所宜近也且夫清道而後行中路而後馳猶時有銜橛之變而况陟乎蓬蒿馳乎丘墳前有利獸之樂而內無存變之意其為禍也不亦難矣夫輕萬乘之重不以為安而樂出於萬有一危之塗以為娛臣竊為陛下不取也蓋明者逺見於未萌而智者避危於未形禍固多藏於隱微而發於人之所忽者也故鄙諺曰家纍千金坐不垂堂此言雖小可以喻大臣願陛下之留意幸察報卓文君書五味雖甘寧先稻黍五色有燦而不掩韋布惟此緑衣將執子之釜錦水有鴛漢宫有木誦子嘉吟而回豫故步當不令負丹青感白頭也檄諭巴蜀父老檄告巴蜀太守蠻夷自擅不討之日久矣時侵犯邉境勞士大夫陛下即位存撫天下輯安中國然後興師出兵北征胸奴單于怖駭交臂受事屈膝請和康居西域重譯納貢稽首來享移師東指閩越相誅右弔畨禺太子入朝南夷之君西僰之長常效貢職不敢怠惰延頸舉踵喁喁然皆鄉風慕義欲為臣妾道里遼逺山川阻深不能自致夫不善者已誅而為善者未賞故遣中即將往賔之發巴蜀之士各五百人以奉幣衛使者不然靡有兵革之事戰鬬之患今聞其乃發軍興制驚懼子弟憂患長老郡又擅為轉粟運輸皆非陛下之意也當行者或亡逃自賊殺亦非人臣之節也夫邉郡之士聞熢舉燧燔皆攝弓而馳荷兵而走流汗相屬惟恐居後觸白創冒流矢議不反顧訃不旋踵人懷怒心如報私讐彼豈樂死惡生非編列之民而與巴蜀異主哉計深慮逺急國家之難而樂盡人臣之道也故有剖符之封析圭而爵位為通侯居列東第終則遺顯號於後世傳土地於子孫行事甚忠敬居位甚安佚名聲施於無窮功烈著而不滅是以賢人君子肝腦塗中原膏液潤野草而不辭也今奉幣役至夷夷即自賊殺或亡逃抵誅身死無名諡為至愚恥及父母為天下笑人之度量相越豈不逺哉然此非獨行者之事也父兄之教不先子弟之率不謹也寡亷鮮恥而俗不長厚也其被刑戮不亦宜乎陛下患使者有司之若彼悼不肖愚民之如此故遣信使曉諭百家以發卒之事因數之以不忠死亡之罪讓三老孝弟以不教誨之過方今田時重煩百姓巳親見近縣恐逺所溪谷山澤之民不遍聞檄到亟下縣道使咸知陛下之意唯母忽也難難蜀父老文漢興七十有八載德茂存乎六世威武紛紜湛恩汪濊羣生澍濡洋溢乎方外於是乃命使西征隨流而攘風之所被罔不披靡因朝冉從駹定筰存卭略斯榆舉苞蒲結軌還轅東鄉將報至於蜀都耆老大夫縉紳先生之徒二十有七人儼然造焉辭畢進曰蓋聞天子之於夷狄也其義羈縻勿絶而已今罷三郡之士通夜郎之塗三年於茲而功不竟士卒勞倦萬民不贍今又接之以西夷百姓力屈恐不能卒業此亦使者之纍也竊為左右患之且夫卭筰西僰之與中國並也厯年滋多不可記已仁者不以德來强者不以力并意者其殆不可乎今割齊民以附夷狄弊所恃以事無用鄙人固陋不識所謂使者曰烏謂此乎必若所云則是蜀不變服而巴不化俗也僕尚惡聞若說然斯事體大固非觀者之所覯也余之行急其詳不可得聞巳請為大夫粗陳其略蓋世必有非常之人然後有非常之事有非常之事然後有非常之功非常者固常人之所異也故曰非常之原黎民懼焉及臻厥成天下晏如也昔者洪水沸出泛濫衍溢民人升降移徙﨑嶇而不安夏后氏戚之乃堙洪塞源決江疏河灑沉淡菑東歸之於海而天下永寧當斯之勤豈惟民哉心煩於慮而身親其勞躬傶骿胝無胈膚不生毛故休烈顯乎無窮聲稱浹乎于茲且夫賢君之踐位也豈特委瑣喔􅐅拘文牽俗循誦習傳當世取說云爾哉必將崇論閎議創業垂統為萬世規故馳騖乎兼容并包而勤思乎參天二地且詩不云乎普天之下莫非王土率土之濵莫非王臣是以六合之內八方之外浸潯衍溢懷生之物有不浸潤於澤者賢君恥之今封疆之內冠帶之倫咸獲嘉祉靡有闕遺矣而夷狄殊俗之國遼絶異黨之域舟車不通人跡罕至政教未加流風猶微內之則犯義侵禮於邉境外之則邪行橫作放殺其上君臣易位尊畢失序父兄不辜幼孤為奴虜係縲號泣內鄉而怨曰蓋聞中國有至仁焉德洋恩普物靡不得其所今獨曷為遺已舉踵思慕若枯旱之望雨盩夫為之垂涕況乎上聖又烏能已故北出師以討強胡南馳使以誚徑越四面風德二方之君鱗集仰流願得受號者以億計故乃關沫若徼牂牱鏤靈山梁孫原創道德之塗埀仁義之統將博恩廣施逺撫長駕使疏逖不閉曶爽暗昧得耀乎光明以偃甲兵於此而息討伐於彼遐邇一體中外禔福不亦康乎夫拯民於沉溺奉至尊之休德反衰世之陵夷繼周氏之絶業天子之急務也百姓雖勞又烏可以巳哉且夫王者固未有不始於憂勤而終於佚樂者也然則受命之符合在於此方將增太山之封加梁父之事鳴和鸞揚樂頌上咸五下登三觀者未覩指聽者未聞音猶鷦鵬已翔乎寥廓而羅者猶視乎藪澤悲夫於是諸大夫茫然喪其所懷來而失厥所以進喟然並稱曰允哉漢德此鄙人所願聞也百姓雖勞請以身先之敞罔靡徙遷延而辭退符命封禪文伊上古之初肇自昊穹兮生民歷撰列辟以迄於秦率邇者踵武逖聽者風聲紛綸葳蕤堙滅而不稱者不可勝數也續昭夏崇號諡略可道者七十有二君罔若淑而不昌疇逆失而能存軒轅之前遐哉邈乎其詳不可得聞巳五三六經載籍之傳維見可觀也書曰元首明哉股肱良哉因斯以談君莫盛於唐堯臣莫賢於后稷后稷創業於唐公劉發迹於西戎文王改制爰周郅隆大行越成而後陵夷衰微千載無聲豈不善始善終哉然無異端慎所由於前謹遺教於後耳故軌迹夷易易遵也湛恩濛涌易豐也憲度著明易則也垂統理順易繼也是以業隆於繦褓而崇冠於二后揆厥所元終都攸卒未有殊尤絶迹可考於今者也然猶躡梁父登泰山建顯號施尊名大漢之德㷭涌原泉沕潏漫衍旁魄四塞雲専霧散上暢九垓下泝八埏懷生之類霑濡浸潤協氣橫流武節飄逝邇狹游原逈濶泳沫首惡湮沒暗昧昭晢昆蟲凱澤回首靣內然後囿騶虞之珍羣徼麋鹿之怪獸䆃一莖六穗於庖犧雙觡共抵之獸獲周餘放龜於岐招翠黃乘龍於沼鬼神接靈圉賓於間館竒物譎詭俶儻窮變欽哉符瑞臻至猶以為德薄不敢道封禪蓋周躍魚隕航休之以燎微夫斯之為符也以登介丘不亦恧乎進讓之道其何爽與於是大司馬進曰陛下仁育羣生義征不憓諸夏樂貢百蠻執贄德侔往初功無與二休烈浹洽符瑞衆變期應紹至不待創見意者泰山梁父設壇場望幸蓋號以況榮上帝垂恩儲社將以薦成陛下謙讓而弗發也挈三神之歡缺王道之儀羣生恧焉或謂且天為質暗示珍符固不可辭若然辭之是泰山靡記而梁父靡幾也亦各並時而榮咸濟厥世而屈說者尚何稱於後而云七十二君乎夫修德以錫符奉符以行事不為進越故聖王勿替而修禮地祗謁欵天神勒功中嶽以彰至尊舒盛德發榮號受厚福以浸黎民也皇皇哉斯事天下之壯觀王者之丕業不可貶也願陛下全之而後因雜薦紳先生之略術使獲耀日月之末光絶炎以展采錯事猶兼正列其義祓飭厥文作春秋一藝將襲舊六為七攄之無窮俾萬世得激清流揚微波蜚英聲騰茂實前聖之所以永保鴻名而常為稱首者用此宜命掌故悉奏其義而覽焉於是天子沛然改容曰愈乎朕其試哉乃遷思回慮總公卿之義詢封禪之事詩大澤之博廣符瑞之富乃作頌曰自我天覆雲之油油井露時雨厥壤可遊滋液滲漉何生不育嘉榖六穗我穯曷蓄非唯雨之又潤澤之非唯濡之汜專濩之萬物熙熙懷而慕思名山顯位望君之來君乎君乎侯不邁哉般般之獸樂我君囿白質黑章其儀可嘉旻旻睦睦君子之能蓋聞其聲今觀其來厥塗靡蹤天瑞之徴兹亦於舜虞氏以興濯濯之麟遊彼靈畤孟冬十月君徂郊祀馳我君輿帝以享祉三代之前蓋未嘗有宛宛黃龍興德而升采色炫耀熿炳輝煌正陽顯見覺寤黎蒸於傳載之云受命所乘厥之有章不必諄諄依類託寓諭以封巒披藝觀之天人之際已交上下相發允答聖王之德兢兢翼翼也故曰興必慮衰安必思危是以湯武至尊嚴不失肅祗舜在假典顧省厥遺此之謂也傳自叙傳司馬相如者蜀郡成都人也字長卿少時好讀書學擊劔故其親名之曰犬子相如既學慕藺相如之為人更名相如以資為郎事孝景帝為武騎常侍非其好也㑹景帝不好辭賦是時梁孝王來朝從遊說之士齊人鄒陽淮陰枚乘吳莊忌夫子之徒相如見而說之因病免客遊梁梁孝王令與諸生同舍相如得與諸生逰士居數歲乃著子虛之賦㑹梁孝王卒相如歸而家貧無以自業素與臨卭令王吉相善吉曰長卿久宦遊不遂而來過我於是相如往舍都亭臨卭令繆為恭敬日往朝相如相如初尚見之後稱病使從者謝吉吉愈益謹肅臨卭中多富人而卓王孫家僮八百人程鄭亦數百人二人乃相謂曰令有貴客為具召之并召令令既至卓氏客以百數至日中謁司馬長卿長卿謝病不能往臨卭令不敢嘗食自往迎相如相如不得已疆往一坐盡傾酒酣臨卭令前奏琴曰竊聞長卿好之願以自娛相如辭謝為鼓一再行是時卓王孫有女文君新寡好音故相如繆與令相重而以琴心挑之相如之臨卭從車騎雍容閒雅甚都及飲卓氏㺯琴文君竊從户窺之心說而好之恐不得當也既罷相如乃使人重賜文君侍者通殷勤文君夜亡奔相如相如乃與馳歸家居徒四壁立卓王孫大怒曰女至不材我不忍殺不分一錢也人或謂王孫王孫終不聽文君久之不樂曰長卿第俱如臨卭從昆弟假貸猶足為生何至自苦如此相如與俱之臨卭盡賣其車騎買一酒舍酤酒而令文君當爐相如身自著犢鼻禈與保庸雜作滌器於市中卓王孫聞而恥之為杜門不出昆弟諸公更謂王孫曰有一男兩女所不足者非財也今文君已失身於司馬長卿長卿故倦遊雖貧其人材足依也且又令客獨奈何相辱如此卓王孫不得已分與文君僮百人錢百萬及其嫁時衣被財物文君乃與相如歸成都買田宅為富人居久之蜀人楊得意為狗監侍上上讀子虛賦而善之曰朕獨不得與此人同時哉得意曰臣邑人司馬相如自言為此賦上驚乃召問相如相如曰有是然此乃諸侯之事未足觀也請為天子遊獵賦賦成奏之上許令尚書給筆札相如以子虛賦虛言也為楚稱烏有先生者烏有此事也為齊難無是公者無是人也明天子之義故空藉此三人為辭以推天子諸侯之苑囿其卒章歸之於節儉因以風諌奏之天子天子大說賦奏天子以為郎無是公言天子上林廣大山谷水泉萬物及子虛言楚雲夢所有甚衆侈靡過其實且非義理所尚故刪取其要歸正道而論之相如為郎數歲㑹唐䝉使略通夜郎西僰中發巴蜀吏卒千人郡又多為發轉漕萬餘人用軍興法誅其渠帥巴蜀民大驚恐上聞之乃使相如責唐䝉因喻告巴蜀民以非上意相如還報唐䝉巳略通夜郎因通西南夷道發巴蜀廣漢卒作者數萬人治道二歲道不成士卒多物故費以巨萬計蜀民及漢用事者多言其不便是時卭筰之君長聞南夷與漢通得賞賜多多欲願為內臣妾請吏比南夷天子問相如相如曰卭筰冉駹者近蜀道亦易通秦時嘗通為郡縣至漢興而罷今誠復通為置郡縣愈於南夷天子以為然乃拜相如為中郎將建節往使副使王然于壺充國吕越人馳四乘之傳因巴蜀吏幣物以賂西夷至蜀蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵於是卓王孫臨卭諸公皆因門下獻牛酒以交歡卓王孫喟然而歎自以得使女尚司馬長卿晚而厚分與其女財與男等同司馬長卿便略定西夷卭筰冉駹斯榆之君皆請為內臣除邉關關益斥西至沫若水南至牂牱為徼通零關道橋孫水以通卭都還報天子天子大說相如使時蜀長老多言通西南夷不為用唯大臣亦以為然相如欲諫業已建之不敢乃著書籍以蜀父老為辭而已詰難之以風天子且因宣其使指令百姓知天子之意其後人有上書言相如使時受金失官居歲餘復召為郎相如口吃而善著書常有消渴疾與卓氏婚饒於財其進仕宦未嘗肻與公卿國家之事稱病閒居不慕官爵嘗從上至長楊獵是時天子方好自擊熊彘馳逐野獸相如上疏以諫上善之還過宜春宫相如奏賦以哀二世行失也拜為孝文園令天子既美子虛之事相如見上好仙道因曰上林之事未足美也尚有靡者臣嘗為大人賦未就請具而奏之相如以為列仙之傳居山澤間形容甚臞此非帝王之仙意也乃遂就大人賦天子大說飄飄有凌雲之氣似遊天地之間意相如既病免家居茂陵劉子𤣥史通云馬卿為自傳具在其集中子長録為列傳班氏仍舊曾無改尋固於馬揚傳末皆云遷雄自叙至相如篇下獨無此言蓋止憑太史之書未見文園之集耳余謂此傳果馬鄉自作安得有相如已死天子遣所忠索書又安知沒後數歲上始祭后上及禮中嶽事乎然則自叙傳應至相如既病免家居茂陵為止此後别有結束惜今不傳而天子曰以下還是太史公補足之近世學士謂相如集中傳乃校集者取子長所作附之非其自筆然史通序傳一章詳言作者自叙基于騷經降及相如始以自叙為傳史通之意直以後人序傳皆作祖于相如斷非影響而俗儒多以亡奔滌器等事胡不少諱以此為非馬鄉筆不知馬鄉正自述慢世一段光景委曲周至他人不能代之寫照阿堵中也又按南史云古之名人相如孟堅子長皆自叙風流傳芳末世則言此文之出相如手非一人矣歌琴歌二首鳯兮鳯兮歸故鄉遨遊四海求其凰時未遇兮無所將何悟今夕兮升斯堂有灔淑女在閨房室邇人遐毒我腸何緣交頸為鴛鴦胡頡頏兮共翺翔又鳯兮鳯兮從我棲得託孳尾永為妃交情通體心和諧中夜相從知者誰雙翼俱起翻髙飛無感我思使余悲漢魏六朝百三家集卷二
