body:
  text: 漢魏六朝百三家集卷一百八魏溫子升集題詞史言溫鵬舉外靜內險好預事故終致禍敗今據史魏莊帝殺爾朱榮元瑾等背齊文襄作亂鵬舉皆預謀此二事者柔順文明志存討賊設令功成無患不庶幾其先大將軍之誅王敦乎魏書目為深險佛助何無識也鵬舉初困馬坊常公拂拭始稱才士縛于葛榮和督脫之逃死入京貧薄狼顧時恐不及上黨善怒幾遭鞭撻後復賞愛捐其前忿徐紇小人亦畏才藻不輕下筆溫生雖窮天下豈少知已哉元皓之變䇿復京師計之上也上黨即不能為桓文鵬舉之言管狐許之矣北人不稱其多知而徒矜斬將搴旗于文墨之間猶皮相也吐谷小國畜牀頭梁武知文嘆窮百六濟隂寒士何以得此表碑具在頗少絶作陵顔轢謝含任吐沈亦磽確自雄北方語耳桐華引􅋖露槐影麗卿煙鵬舉逸句尚佳世以其詩少即云不長于詩寒山片石當不其然目録詔為魏莊帝閶闔門赦詔為莊帝生皇太子赦詔為魏帝遷都拜廟鄴宫赦詔敕天平元年被命作答齊神武敕表魏帝納后羣臣上禮文表西河王謝太尉表為司徒髙敖曹謝表為臨淮王謝開封府尚書令表為南陽王讓尚書表為上黨王穆讓太宰表為廣陵王讓吏部尚書表為安豐王延明讓國子祭酒表為廣陽王北征請大將表上書為廣陽王淵上書為廣陽王淵上書靈太后銘鐘銘碑舜廟碑寒陵山寺碑大覺寺碑印山寺碑定國寺碑常山公主碑墓志銘司徒元樹墓志銘司徒祖塋墓志文閶闔門上梁祝文樂府白鼻騧結襪子安定侯曲燉煌樂涼州樂歌二首搗衣詩從駕幸金墉城春日臨池詠花蝶相國清河王挽歌漢魏六朝百三家集卷一百八目録欽定四庫全書漢魏六朝百三家集卷一百八明張溥輯魏溫子升集詔為魏莊帝閶闔門赦詔蓋天道忌盈人倫嫉惡疏而不漏刑之無捨是以吕霍之門禍譴所伏梁董之家咎徴斯在頃孝昌之未天步孔艱女主亂政監國無主爾朱榮爰自晉陽同憂王室義旗之建大會孟津與世樂推共成鴻業論其始圖非無勞效但致逺恐泥終之實難曾未崇朝豺聲已露河隂之役安忍無親王公卿士一朝塗地宗戚靡遺內外俱盡假弄天威殆危神器時事倉卒未遑問罪尋以葛賊橫行馬首南向捨過責成用平醜虜及元皓問鼎大駕北巡復致勤王展力行所以此論功且可補過既位極宰衡地踰齊魯容養之至豈復是過但心如猛火山林無以供其暴意等漏巵江河無以充其溢既見金革稍寧方隅漸泰不推天功専為已力與奪任情臧否肆意無君之迹日月以甚拔髮數罪蓋不足稱斬竹書愆豈云能盡方復託名朝宗隂圖釁逆睥睨天居窺覦聖歷乃有裂冠毁冕之心將為拔本塞源之事天既厭亂人亦悔禍同惡之臣密來投告將而必誅罪無容捨又玄天穆宗室末屬名望素微遭逢際會頗參義舉不能竭其忠誠以奉家國乃復棄本逐末背同即異為之謀主成彼禍心是而可忍孰不可恕並以伏辜自貽伊戚元惡既除人神慶泰便可大赦天下為莊帝生皇太子赦詔有國三善事屬元良本枝百世義鍾繼體朕應天纂命握圖受籙景祚維新十年以永今月吉辰皇子誕育彩雲映日神光照殿方開將望將起龍樓逺近同歡人神共悅便可大赦天下為魏帝遷都拜廟鄴宫赦詔建國所先理屬於宗廟立事為大禮歸於禋祀大丞相渤海王神武命世重匡頽歷導塞源於將竭扶神器於已傾立天地之大功成人臣之重義朕以沖昧猥當樂推關路多虞襟帶難固瞻言往事取則前修乃襲去鄷用追遷亳定鼎鄴都卜世惟永民用子來功成不日今清廟初興閟宫始就靈祗萃止祖考來格神光夜照香氣朝聞今月吉辰躬展誠敬時和氣婉景麗雲業四表來庭萬國在位哀樂相交感慶兼集固宜觀象雷雨布寬大之恩取類澤風申肆眚之令可大赦天下敕天平元年被命作答齊神武敕髙歡擁立魏孝武於洛陽自歸鄴都已斛斯椿搆帝漸與歡隙封隆之孫騰亡奔歡泄其謀帝規欲討歡假稱將伐句吳且備宇文賀拔歡亦表稱勒兵四道伏聽處分仍申信誓云為嬖幸所間一旦賜疑若負陛下身受天殃子孫殄絶一二佞臣願斟量廢出帝命舍人溫子升草敕答之子升逡巡未敢作帝據胡床拔劒作色乃遣筆前持心血逺以示王深冀彼此共相體悉而不良之徒坐生間二近孫騰倉卒向彼致使間者疑有異謀故遣御史中尉綦雋且申朕懷今得王啓言誓懇惻反覆思之猶所未解以朕眇身遇王武略不勞尺刃坐為天子所謂生我者父母貴我者髙王今若無事背王規相攻討則使身及子孫還如王誓皇天后土實聞此言近慮宇文為亂賀拔勝應之故纂嚴欲與王俱為聲援宇文今日使者相望觀其所為更無異迹賀拔在南開拓邊境為國立功念無可責君若欲分謗何以為辭東南不賓為日已久先朝以來置之度外今天下户口減半未宜窮兵極武朕既暗昧不知佞人是誰可列其姓名令朕知也如聞庫狄干語王云本欲取懦弱者為主王無事立此長君使其不可駕御今但作十五日行自可廢之更立餘者如此議論自是王間勳人豈出佞臣之口去嵗封隆之背叛今年孫騰之逃走不罪不送誰不怪王騰既為禍始曽無愧懼王若事君盡誠何不斬送二首王雖啓圖西去而四道俱進或欲南渡洛陽或欲東臨江左言之者猶應自怪聞之者寧能不疑王若守誠不二晏然居北在此雖有百萬之衆終無圖彼之心王脫信邪棄義舉旗南指縱無匹馬隻輪猶欲奮空弮而爭死朕本寡德王已立之百姓無知或謂實可若為他所圖則彰朕之惡假令還為王殺幽辱韲粉了無遺恨何者王既以德見推以義見舉一朝背德舍義便是過有所歸本望君臣一體若合符契不圖今日分疏到此古語云越人射我笑而道之吾兄射我泣而道之朕既親王情如兄弟所以投筆拊膺不覺歔欷表魏帝納后羣臣上禮文表臣聞軒轅正位西陵以之作合夏后至聖塗山于是來嬪伏惟陛下龍飛纘歷大明理運長秋既建隂教有主景命無窮靈基長世普天之下莫不欣躍西河王謝太尉表臣聞拂羽決起力謝摩天䇿蹇載馳功微送日將短翮難以陵髙駑乘無由致逺雖復建旟出郡未追楚趙之風捧壺入侍徒踵金張之迹及天祚明德運啓興王六遂始遷九鼎初定於焉承乏有用當官草靡從風未遑克讓常恐執轡傾輪操刀傷錦為司徒髙敖曹謝表委水橫流羣龍交戰徒悲道喪空懷主辱雖復見義援戈臨危奮劒顧慙後衄終謝先鞭事等泣河無救三川之竭有類憂天豈支四極之壞為臨淮王謝封開府尚書令表臣道愧山東氣慙隴右激水弗堪摶風無力但以平原帶地資緒極天發趾自髙理翮以逺出臨侯服既乏刺舉之能入踐帝閽又無應對之美空復受戈清廟推轂朱門效闕淚河功慚汗海大寶逺降橫草未樹顧以有涯願言知止為南陽王讓尚書表臣聞立而託乘乃成致逺之功坐以運舟遂有利涉之用若以輕任重課憑虛責實雖欲自勤終焉靡效為上黨王穆讓太宰表臣聞䇿蹇長途終慚一日之致懸縷層臺詎任千鈞之重固知才弱不可自強力微難以企及智小謀大恐貽折足之憂才輕任重愳有絶臏之悔既慮鑠金固陳匪石為廣陵王讓吏部尚書表假勢風雲非由羽翮徒得推遷就列僶俯當官曽無辟雍議禮之名詎有銅雀獻賦之敏而政本實繁司會尤切抑揚智地用舍時流實當年之凖的乃一世之權衡得其人則分職之任隆非其才則曠官之失起為安豐王延明讓國子祭酒表臣聞寶劒未砥猶乏切玉之功美箭闕羽尚無衡石之勢况才非會稽之竹質謝昆吾之金至於敷教東序流訓上庠置樽候酌懸鐘待叩必須藴朱藍以成彩立規矩以為式垂三行於貴遊揚六藝於胄子而臣學愧聚沙問慙攻木雖歷文史不治章句於兹曠官青襟何仰為廣陽王北征請大將表今四郊多壘三軍申發率土之濱莫敢寧晏况忝末屬復董元戎臣不盡心誰將竭力豈容飾讓茍違戎重但以軍旅之事實所未學求保重將隨方指麾臣請先驅被堅督戰若使旗鼓相望埃塵相接決機兩陳之間不辭萬死之地脫獨委臣専總戎旅兵術靡常軍機屢變以臣當之必所未達雖奉廟算有均膠柱上書為廣陽王淵上書淵為北道大都督受尚書令李崇節度時東道都督崔暹敗於白道淵上書邊豎構逆以成紛梗其所由來非一朝也昔皇始以移防為重盛簡親賢擁麾作鎮配以髙門子弟以死防遏不但不廢仕宦至乃偏得復除當時人物欣慕為之及太和在歷僕射李沖當官任事涼州土人悉免厮役豐沛舊門仍防邊戍自非得罪當世莫肯與之為伍征鎮驅使但為虞候白直一生推遷不過軍主然其往世房分留居京者得上品通官在鎮者便為清途所隔或投彼有北以御魑魅多復逃胡鄉乃峻邊兵之格鎮人浮遊在外皆聽流兵捉之於是少年不得從師長者不得遊宦獨為匪人言者流涕自定鼎伊洛邊任益輕唯底滯凡才出為鎮將轉相模習専事聚斂或有諸方姦吏犯罪配邊為之指蹤過弄官府政以賄立莫能自改咸言姦吏為此無不切齒憎怒及阿那瓌背恩縱掠竊奔命師追之十五萬衆度沙漠不日而還邊人見此援師便自意輕中國尚書令臣崇時即申聞求改鎮為州將允其願抑亦先覺朝廷未許而髙闕戍主率下失和拔陵殺之為逆命攻城掠地所見必誅王師屢北賊黨日盛此段之舉指望銷平其崔暹隻輪不反臣崇與臣逡巡復路今者相與還次雲中馬首是瞻未便西邁將士之情莫不解體今日所慮非止西北將恐諸鎮尋亦如此天下之事何易可量為廣陽王淵上書往者元義執權移天徙日而徽託附無翼而飛今大明反政任寄唯重以徽遍心銜臣切骨臣以疏滯逺離京輦被其構阻無所不為然臣昔不在其後自此以來翻成陵谷徽遂一嵗八遷位居宰相臣乃積年淹滯有功不録自徽執政以來非但抑臣而已北征之勳皆被擁塞將士告捷終無片賞雖為表請多不蒙遂前留元摽據於盛樂後被重圍析骸易子倒懸一隅嬰城二載賊散之後依階乞官徽乃盤退不允所請而徐州下邳戍主賈勳法僧叛後暫被圍逼固守之勳比之未重乃立得州即授開國天下之事其流一也功同賞異不平謂何又驃騎李崇北征之日啓募八州之人聽用關西之格及臣在後依此科賞復言北道征者不得同於關西定襄陵廟之至重平城守國之要鎮若計北而論功亦何負於秦楚但以嫉臣之故便欲望風排抑然其當途以來何直退勳而已但是隨臣征者即便為所嫉統軍袁叔和曽經省訴徽初言有理又聞北征𨽻臣為統應時變色復令臣兄子仲顯異端訟臣緝緝翩翩謀相誹謗言臣惡者接以恩顔稱臣善者即被嫌責甄琛曽理臣屈乃視之若仇讐徐紇頗言臣短即待之如親戚又驃騎長史祖瑩昔在軍中妄增首級矯亂戎行蠧害軍府獲罪有司避命山澤直以謗臣之故徽乃還雪其罪臣府司馬劉敬比送降人既到定州翻然背叛賊如決河豈其能擁且以臣府參寮不免身首異處徽既怒遷捨其元惡及胥徒從臣行者莫不悚懼頃恆州之人乞臣為刺史徽乃斐然言不可測及降户結謀臣頻表啓徽乃因藝言此事及向定州逺彼姦惡又復論臣將有異志翻覆如此欲相陷沒致令國朝遽賜遷代賊起之由誰使然也徽既優幸任隆一世慕勢之徒於臣何有是故餘人攝選車馬填門及臣居邊賓遊罕至臣近北切慮其為梗是以孜孜乞赴京闕屬流人舉斧元戎垂翅復從後命自安無所僶俯先聽不敢辭事及臣出都行塵未滅已聞在後復生異議言臣將兒自隨證為可疑之兆忽稱此以構亂悠悠之人復傳音響言左軍臣融右軍臣衍皆受密敕伺察臣事徽既用心如此臣將何以自安竊以天步未夷國艱猶梗方伯之任於斯為急徽昔臨蕃乃有人譽及居端右蔑爾無聞今求出之為州使得申其利用徽若外從所長臣無內慮之切脫蒙闕公私幸甚銘鐘銘宫商遞變律宫相生立號則起從革以從調之必應擊而不橫銅盤韻響火鳥和聲出入成則明宵有數碑舜廟碑懷山不已龍門未闢大道御世天下為公感夢長人明揚仄陋釐降二女結友九男執耜歷山耕夫所以讓畔施罟雷澤漁父於是讓川亦既登庸以之納録九官咸事百揆時敘有大功於當世集歷數而在躬受文祖之命致昭華之玉班五瑞於羣后禋六宗於上玄舞干戚而逺夷賓棄金璧而幽靈應青雲浮洛榮光塞河符瑞必臻休祥咸萃以君人之大德為帝王之稱首陟方之駕遂往蒼梧之窆不歸爰自先民實存舊廟既緝藥房遂鎮瑤席龍駕帝服蓋依俙於慕舜交鼓絙瑟實髣佛於聞韶其辭曰虹氣降靈姚墟誕聖樹隂未徙帝圖已定乃賓四門以齊七政天眷功髙民歸德盛治既蕩蕩化亦巍巍南風在詠西環有歸嶷山永逝湘水長違靈宫肅肅神館微微寒陵山寺碑昔晉文尊周績宣於踐土齊桓霸世威著於召陵並道冠諸侯勳髙天下衣裳會同之所兵車交合之處寂寞消沈荒涼磨滅言談者空知其名遙遇者不識其地然則樹銅表迹刋石記功有道存焉可不尚與永安之季數鍾百六天災流行人倫交喪爾朱氏既絶彼天綱斷兹地紐祿去王室政出私門銅馬競馳金虎亂噬九嬰暴起十日並出破璧毁圭人物既盡頭會箕斂杼軸其空大丞相渤海王命世作宰惟機成務標格千仞崖岸萬里運鼎阿于襟抱納山嶽於胸懷擁玄雲以上騰負青天而髙引鐘鼓嘈囋上聞於天旌旗繽紛下盤於地壯士凛以爭先義夫憤而競起兵接刃於斯場車錯轂於此地轟轟隱隱若轉石之墜髙崖硠硠磕礚如激水之投深谷俄而霧捲雲除氷離葉散靡旗蔽日亂轍滿野楚師之敗於柏舉新兵之退自昆陽以此方之未可同日既考兹沃壤建此精廬砥石礪金瑩珠琢玉經始等於佛功制作同於造化息心是歸淨行攸處神異畢臻靈仙總萃鳴玉鸞以來遊帶霓裳而至止翔鳯紛以相嚾飛龍蜿而俱躍雖復髙天銷於猛炭大地淪於積水固以傳之不朽終亦記此無忘大覺寺碑維天地開闢隂陽轉運明則有日月幽則有鬼神初地遼逺未路悠長自始及終從凡至聖積骨成山祇劫莫數垂衣拂石恆河難計及冠日示夢蒙羅見謁應世降神感物開化顔如滿月心若盈泉體道獨悟含靈自曉居三殿以長想出四門而永慮聲色莫之留榮位不能屈道成樹下光燭天上變化靡躬神通無及置須彌於葶藶納世界於微塵闢慈悲之門開仁壽之路拯煩惱於三塗濟苦難於五濁非但化及天龍教被人鬼固亦福霑行鴈道洽遊魚但羣生無感獨尊罷應雜色照爛諸山搖動布金沙而弗受建寶蓋而未留遂上微妙之臺永升智慧之殿而天人慕德象法興靈圖影西山承光東壁主上乃據地圖攬天鏡乘六龍朝萬國牢籠宇宙襟帶江山道濟橫流德昌頽歷四門穆穆百僚師師乘法船以徑度駕天輪而髙舉神功寶業既被無邊鴻名懋實方在不朽抵掌措言雖不盡意執筆書事其能已乎印山寺碑自結繩運往觀象代興禮樂相因詩書間出喻是非於一指論道德於二篇九流之義遂開百家之言並作皆以賦命有遭隨攝養致天壽愛惠起於吉凶情偽動於利害雖改張羅之呪未易釁鐘之牲因果之業未申感應之途猶蔽是以修短有命子夏論之而未詳報施在天史遷言之而未悟大丞相渤海王膺嶽瀆之靈感辰象之氣直置與蘭桂齊芳自然共圭璋比潔加以體備百行智周萬象道兼語默思極天人固以兆云非虎自懷公輔之德世稱卧龍實任王佐之器道足以濟天下行足以通神明表立人之上才含廣途之大量永安之末時多異謀蜂蠆有毒豺狼反噬彀弩臨城抽戈犯蹕世道交喪海水羣飛既而蒼龍入隱白虎出見命世有期匡時作宰拯沉溺以援手涉波瀾而濡足懸皎日於胸懷起大風於襟袖動之以仁義行之以忠貞附之者影從應之者響起定國寺碑蓋兩儀交運萬物並生始自苦空終於常樂而緣障未開業塵猶擁漂淪欲海顛墜邪山雖復光華並於日月術數窮於天地有扶危定傾之力為濟世夷難之功登途山而未歸遊建水而不反並馳於苦樂之境皆入於生死之門幽隱長夜未覩山北之燭沈迷逺路詎見司南之機昔日先民雖云善誘尚習蓋纒未能解脫見如八卦成象示之以吉凶百藥為醫道之以利害衣食有業民免飢寒之憂水土既平人無墊溺之患斯誠事周於世用功濟於生民不論過去之因緣詎辨未來之果報惟無上大覺均悟玄機應現託生方便開教聖靈之至無復等級威神之力不可思議動三乘之駕泛八解之流引諸子之火宅渡羣生於海岸自一音輟響雙樹潛神智慧雖徂象法猶在光照金盤言留石室遍諸世界咸用歸仰常山公主碑啓泰微之層構闢閶闔之重扉據天下以為家苞率土而光宅然則昆山西峙爰有夜光漢水東流是生明月公主稟靈宸極資和天地芬芳有性溫潤成質自然祕逺若上元之隔絳河直置清髙類姮娥之依桂樹令淑之至比光明於宵燭幽間之盛匹穠華於桃李託體宫闈而執心撝順婉然左辟率禮如賓舉華燭以宵征動鳴佩而晨去致肅雍于車乘成好合於琴瑟立行潔於清氷抗志髙於黃鵠停輪表信闔門示禮終能成其子姓貽厥孫謀而鐘漏相催日夜不息川有急流風無靜樹奄辭身世從宓妃於伊洛遽捐館舍追帝子於瀟湘銘曰龍轡莫援日車遂往奄離形神忽歸丘壤祖歌薤露出奏巫山永厝中野終掩窮泉蕭瑟神道荒涼墓田松檟徒列琬琰空傳墓志銘司徒元樹墓志銘昔樞電降祥姬水成業握八符以馭世膺五命以會昌欽明格於上下光澤被於宇宙卜年永久歷世遐長有文王之孫子啓周公之苖裔積善所及踵武稱賢每以辛李為言恆持韓白自許殫百慮之一致盡能事於生民蒼蒼在上義歸無厚徒有東平避世之意空懷北海自晦之情疾非逢霧終異啓手銘曰明允篤誠發於岐嶷未鏤已雕不扶而直修禮以耕強學為殖孔既歎魯莊亦吟越况以度思有懷明發翻然髙舉歸於魏闕長路未窮朝光已沒司徒祖瑩墓志自天命生商王居徙亳源源毖逺枝葉繁華祖德潤於身聲髙邦國父行成於已名重京師公鍾美多福資神積善器局間靈志識開悟口含碧雞之辨手握雕龍之文門有善業家傳慶靈礪金成器相遺滿籝琢玉為寶待價聨城匪直也人實惟有道言析秋毫辭連春藻文閶闔門上梁祝文維王建國配彼太微大君有命髙門啓扉良辰是簡穆卜無違雕梁乃架綺翼斯飛八龍杳杳九重巍巍居宸納祐就日垂衣一人有慶四海攸歸樂府白鼻騧少年多好事攬轡向西都相逢狹斜路駐馬詣當壚結襪子誰能訪故劒會自逐前魚裁紈終委篋織素空有餘安定侯曲封疆在上地鐘鼓自相和美人當忩舞妖姬掩扇歌燉煌樂客從逺方來相隨歌且笑自有燉煌樂不減安陵調涼州樂歌二首逺遊武威郡遙望姑臧城車馬相交錯歌吹日縱橫路出玉門關城接龍城坂但事絃歌樂誰道山川逺搗衣長安城中秋夜長佳人錦石搗流黃香杵紋砧知近逺傳聲遞響何凄涼七夕長河爛中秋明月光蠮螉塞邊絶候鴈鴛鴦樓上望天狼詩從駕幸金墉城兹城實佳麗飛甍自相並膠葛擁行風岩嶤閟流景御溝屬清洛馳道通丹屏湛淡水成文參差樹交影長門久已閉離宫一何靜細草緣玉階髙枝蔭桐井微微夕渚暗肅肅暮風冷神行楊翠旗天臨肅清警伊臣從下列逢恩信多幸康衢雖已泰弱力將安騁春日臨池光風動春樹丹霞起暮隂嵳峩映連璧飄颻下散金徒自臨濠渚空復撫鳴琴莫知流水曲誰辨遊魚心詠花蝶素蝶向林飛紅花逐風散花蝶俱不息紅素還相亂芬芳共襲手葳蕤從可玩不慰行客心遽動離居歎相國清河王挽歌髙門詎改轍曲沼尚餘波何言吹樓下翻成薤露歌漢魏六朝百三家集卷一百八
