body:
  text: 漢魏六朝百三家集巻一百二陳後主集題詞世言陳後主輕薄最甚者莫如黄鸝留玉樹後庭花金釵兩鬢垂等曲今曲不盡傳惟見玉樹一篇寥落寡致不堪男女唱和即歌之亦未極哀也史稱後主標徳儲宫繼業允望遵故典𢎞六藝金馬石渠稽古雲集梯山航海朝貢嵗至辭雖誇詡審其平日固與鬱林東昏殊趨矣臨春三閣徧居麗人竒樹天花往來相望學士狎客主盟文壇新詩方奏千女學歌辭采風流官家未有梁朝羊祖忻豪侈善音姬妾數百窮玅歌舞終日賓㳺同其醉醒初不聞以此貶徳使後主生當太平次為諸王歩竟陵之文藻賤臨川之黷貨開館讀書不失令譽即假列通侯世閥魚𢎞羊侃數輩亦掃門不及乃繫以大寶困之萬幾豈所堪乎鶴不能亡國而國君不可好鶴後主葢與衛懿公同類而悲矣漢武李夫人歌與落葉哀蟬曲憂傷過於後代而四夷服威陳主詞非絶淫亡且忽焉哀而不起者在聲音之間乎非獨篇章己也詔命書銘秋冬氣多即作者亦不自知日暮矣目録賦夜亭渡雁賦棗賦詔即位詔諮詢詔舉賢詔求言詔柔逺詔勸農詔恤民詔禁奢詔訊獄詔赦詔又又宣聖禮典詔答姚察詔追贈徐陵詔追封吴明徹詔追贈程文季詔追贈司馬申詔葬伯固以庶人禮詔原伯固諸子詔勑答江總等勑報謝貞勑制討叔陵制䇿授江總尚書令䇿書與詹事江總書銘䕶軍孫暘銘樂府採桑日出東南隅行三婦艷詞十一首飛來雙白鶴採蓮曲昭君怨朱鷺巫山髙有所思三首雉子班臨髙臺隴頭隴頭水二首折楊栁二首闗山月二首洛陽道五首長安道梅花落二首紫騮馬二首雨雪曲劉生飲馬長城窟行楊叛兒曲舞媚娘三首估客樂三洲歌前有一樽酒行自君之出矣六首玉樹後庭花烏棲曲三首東飛伯勞歌長相思二首古曲獨酌謡四首有序詩同江僕射逰攝山棲霞寺同平南弟元日思歸立春日泛舟𤣥圃各賦一字六韻成篇獻嵗立春風光具美汎舟𤣥圃各賦六韻上已宴麗暉殿各賦一字十韻上已𤣥圃宣猷堂褉飲同共八韻春色褉辰盡當曲宴各賦十韻祓褉汎舟春日𤣥圃各賦七韻上已𤣥圃宣猷褉酌各賦七夕宴宣猷堂各賦一韻詠五物用得帳屏風案唾壺履七夕宴重詠牛女各為五韻同管記陸琛七夕五韻七夕宴樂修殿各賦六韻七夕宴𤣥圃各賦五韻同管記陸瑜九日觀馬射畵堂良夜履長在節歌管賦詩列筵命酒十韻成篇同管記陸瑜七夕四韻初伏七夕己覺㣲凉既引應徐且命燕趙清風朗月以望七襄之駕置酒陳樂各賦四韻之篇晩宴文思殿宴光璧殿詠遥山燈三善殿夕望山燈入隋侍宴應詔幸𤣥武湖餞吴興太守任惠宴詹事陸繕省聴箏戲贈沈后隋渠詩小牕詩寄碧玉詩漢魏六朝百三家集巻一百二目録欽定四庫全書漢魏六朝百三家集巻一百二明張溥輯陳後主集賦夜亭度鴈賦春望上楹日煖苔生雲隨竹動月共水明暫逍遥於夕逕聴霜鴻之度聲度聲已悽切猶含闗塞鳴從風兮前侣駛帶暗兮後羣驚帛久兮書字滅蘆束兮斷銜輕行雜響時亂響雜行時散已定空閨愁還長倡樓歎空閨倡樓本寂寂况此寒夜褰珠幔心悲調管曲未成手撫絃聊一彈一彈管且陳歌翻使怨情多棗賦芳園列幹森梢繁羅蘂餘莖少葉暗枝多復有竒樹風間臨摩良夜影來未若丹心美實絳質嘉枝重針共暗枝瓠同瑰羞金盤于氷水薦玉案于深杯此歡心之未已方夢腸而屢迴詔即位詔上天降禍大行皇帝奄棄萬國攀號擗踊無所迨及朕以哀煢嗣膺寶厯若渉巨川罔知攸濟方賴羣公用匡寡薄思播遺徳覃被億兆凡厥遐邇咸與惟新可大赦天下在位文武及孝悌力田為父後者並賜爵一級孤老鰥寡不能自存者賜榖人五斛帛二匹諮詢詔堯施諫鼓禹拜昌言求之異等久著前徽舉以淹滯復聞昔典斯乃治道之深規帝王之切務朕以寡昧丕承鴻緒未明虛已日旰興懐萬機多紊四聰弗達思聞謇諤採其謀計王公己下各薦所知㫄詢管庫爰及輿皂一介有能片言可用朕親加聴覽佇於啓沃舉賢詔夫體國經野長世字氓雖因革儻殊弛張或異至於㫄求俊乂爰逮側微用道和羮是隆大厦上智中主咸由此術朕以寡薄嗣膺景祚雖哀疚在躬情慮惛舛而宗社任重黎庶務殷無由自安拱黙敢忘康濟思所以登顯髦彦式備周行但空勞宵夢屢勤史卜五就莫来五能不至是用甲旦凝慮丙夜損懐豈以食玉炊桂無因自達將懐寶迷邦咸思獨善應内外衆官九品已上可各薦一人以㑹彚征之㫖且取備實難舉長或易小大之用明言所施勿得南箕北斗名而非實其有負能仗氣擯壓當時著賔戲以自憐草客嘲以慰志人生一世逢遇誠難亦宜去此幽谷翔兹天路趨銅駞以觀國望金馬而来庭便當隨彼方圓飭之矩矱求言詔昔睿后宰民哲王御㝢雖徳稱汪滅明能普燭猶復紆已乞言降情訪道髙咨岳牧下聴輿臺故能政若神明事無悔吝朕纂承丕緒思隆大業常懼九重己䆳四聰未廣欲聴昌言不疲痺足若逢廷折無憚批鱗而口柔之辭儻聞於在位腹誹之意或隠於具僚非所以𢎞理至公緝熈帝載者也内外卿士文武衆司若有智周政術心練治體救民俗之疾苦辨禁網之疎宻者各進忠讜無所隠諱朕將虚已聴受擇善而行庻深鑒物情匡我王度柔逺詔中嵗克定淮泗爰渉青徐彼土首豪並輸罄誠欵分遣親戚以為質任今舊土淪陷復成異域南北阻逺未得㑹同念其分乖殊有愛戀夷狄吾民斯事一也何獨譏禁使彼離析外可即檢任子館及東館并帶保任在外者並賜衣糧頒之酒食遂其鄉路所之阻逺便發遣船仗衛送必令安達若已預仕宦及别有事義不欲去者亦隨其意勸農詔躬推為勸義顯前經力農見賞事昭往誥斯乃國儲是資民命攸屬豐儉隆替靡不由之夫入賦自古輸藁惟舊沃饒貴于十金磽确至於三易腴既異盈縮不同詐偽日興簿書嵗改稻田使者著自西京不實峻刑聞諸東漢老農懼於祗應俗吏因而侮文輟耒成羣㳺手為伍永言妨蠧良可太息今陽和在節膏澤潤下宜展春耨以望秋坻其有新闢塍畎進墾蒿莱廣袤勿得度量征租悉皆停免私業久廢咸許占作公田荒縱亦隨肆勤儻良守教耕淳民載酒有兹督課議以賞擢外可為格班下稱朕意焉恤民詔耕鑿自足乃曰淳風貢賦之興其来尚矣葢由庚亟務不獲己而行焉但法令滋章奸盜多有俗尚澆詐政鮮惟良朕日旰夜分矜一物之失所泣辜罪已愧三千之未措望訂初下使疆䕃兼出如聞貧冨均起單弱重弊斯豈振窮扇暍之意歟是乃下吏箕斂之苛也故曰百姓不足君孰與足自太建十四年望訂租調逋未入者並悉原除在事百僚辯斷庶務必去取平允無得便公害民為己聲績妨紊政道禁奢詔朕臨御區宇撫育黔黎方欲康濟澆薄蠲省繁費奢僭乖衷實宜防斷應鏤金銀薄及庶物化生土木人綵花之屬及布帛幅尺短狭輕疎者並傷財廢業尤成蠧患又僧尼道士挟邪左道不依經律民間淫祀袄書諸珍怪事詳為條制並皆禁絶訊獄詔夫議獄緩刑皇王之所垂範勝殘去殺仁人之所用心自畫冠既息刻吏斯起法令滋章手足無措朕君臨區宇屬當澆末輕重之典在政未康小大之情興言多愧眷兹狴犴有軫哀矜可克日於大政殿訊獄赦詔朕以寡薄嗣守鴻基哀惸切慮疹恙纒織訓俗少方臨下靡筭懼甚踐氷慄同馭朽而四氣易流三光遄至纓紱列陛玉帛充庭具物匪新節序疑舊緬思前徳永慕昔辰對軒闥而哽心顧扆筵而慄氣思所以仰遵遺構俯勵薄躬陶鑄九流休息百姓用𢎞寛簡取叶陽和可大赦天下又赦詔惟刑止暴惟徳成物三才是資百王不改而世無抵角時鮮犯鱗渭橋驚馬弗聞廷爭桃林逸牛未見其㫖雖剽悍輕侮理從鉗鈫蠢愚杜黙宜肆矜𢎞政乏良哉明慙則哲求諸刑措安可得乎是用屬寤寐以軫懐負黼扆而於邑復兹合璧輪缺連珠緯舛黄鍾獻吕和氣始萌𤣥英告終履長在御因時宥過抑乃斯得可大赦天下又赦詔柏皇大庭鼓淳和於曩日姬王嬴后被澆風於末載刑書已鑄善化匪融禮義既乖奸宄斯作何其淳朴不反浮華競扇者歟朕居中御物納隍在睠頻恢天網屢絶三邊元元黔庶終罹五辟葢乃康哉寡薄抑焉法令滋章是用當宁弗怡矜此向隅之意今三元具序萬國朝辰靈芝獻於始陽膏露凝於聿嵗從春施令仰乾布徳思與九有惟新七政可大赦天下宣聖禮典詔宣聖誕膺上哲體資至聖祖述憲章之典並天地而合徳樂正雅頌之奥與日月而偕明垂後昆之訓範開生民之耳目梁季湮微靈寢忘處鞠為茂草三十餘年敬仰如在永惟愾息今雅道雍熈由庚得所斷琴故履零落不追閲笥開書無因循復外可詳之禮典改築舊廟蕙房桂棟咸使惟新芳蘩潔潦以時饗奠答姚察詔察居父憂以忠毅將軍起秉東宫通事舍人頻有陳讓不許詔答之俄勑知著作郎事省表具懐卿行業淳深聲譽素顯理徇情禮未膺刀筆但參務承華良所期寄允兹抑奪不得致辭也追贈徐陵詔慎終有典抑乃舊章令徳可甄諒宜追逺侍中安右將軍左光禄大夫太子少傳南徐州大中正建昌縣開國侯陵弱齡學尚登朝秀穎業髙名輩文曰詞宗朕近嵗承華特相引狎雖多卧疾方期克壯奄然殞逝震悼于懐可贈鎮右將軍特進其侍中左光禄鼓吹侯如故并出舉哀喪事所須量加資給謚曰章追封吴明徹詔李陵矢竭不免請降于禁水漲猶且生獲固知用兵上術世罕其人故侍中司空南平郡公明徹爰初躡足迄届元戎百戰百勝之竒决機决死之勇斯亦侔於古焉及招定淮淝長驅彭汴覆勍冦如舉毛掃鋭師同沃雪風威慴於異俗功效著於同文方欲息駕隂山解鞍瀚海既而師出已老數亦終竒不就結纓之功無辭入褚之屈望封崤之為易冀平翟之非難雖志在屈伸而奄中霜露埋恨絶域甚可嗟傷斯事已往累逢肆赦凡厥罪戾皆䝉灑濯獨此孤魂未霑寛惠遂使爵土湮没饗醊無主棄瑕録用宜在兹辰可追封邵陵縣開國侯食邑一千户以其息惠覺為嗣追贈程文季詔故散騎常侍前重安縣開國公文季纂承門緒克荷家聲早嵗出軍雖非元帥啓行為最致果有聞而覆喪車徒允從黜削但靈洗之立功扞禦久而見思文季之埋䰟異域有足可憫言念勞舊傷兹廢絶宜存廟食無使餒而可降封重安縣侯邑一千户以子饗襲封追贈司馬申詔慎終追逺欽若舊則闔棺定諡抑乃前典故散騎常侍右衛將軍文始縣開國伯申忠肅在公清正立已治繁處約投軀殉義朕任寄情深方康庶績奄然化往傷惻于懐可贈侍中䕶軍將軍進爵為侯增邑為五百户諡曰中給朝服一具衣一襲尅日舉哀喪事所須隨由資給葬伯固以庶人禮詔伯固同兹悖逆殞身途路今依外議意猶弗忍可特許以庶人禮葬原伯固諸子詔伯固隨同巨逆自絶於天俾無遺育抑有恒典但童孑焉正靡識兼預葭莩寘之甸人良以惻憫及伯固所生王氏可並特宥為庶人勑答江總等勑吏部尚書蔡徴移中書令後主方擇其人總等咸共薦察勑答之姚察非惟學蓺優博亦是操行清修典選難才今得之矣報謝貞勑貞為南平王友掌記室事以母憂去職頃之勑起還府貞累啓固辭勑報之貞竟以毁卒省啓具懐雖知哀焭在疚而官俟得才禮有權奪可便力疾還府也策授江總尚書令策於戲夫文昌政本司㑹治經韋彪謂之樞機李固方之斗極况其五曹斯綜百揆是諧同冢宰之司專臺閣之任惟爾道業標峻㝢量𢎞深勝範清規風流以為凖的辭宗學府衣冠以為領袖故能師長六官具瞻允塞明府八座儀形載逺其端朝握揆朕所望焉往欽㢤懋建爾徽猷亮采我邦國可不慎歟制討叔陵制凶逆梟獍反噬宫闈賴宗廟之靈時從釋滅撫情語事酸憤兼懐朝議有章宜從所奏也書與詹事江總書管記陸瑜奄然殂化悲傷悼惜此情何己吾生平愛好卿等所悉自以學渉儒雅不逮古人欽賢慕士是情尤篤梁室亂離天下靡沸書史殘缺禮樂崩淪晚生後學匪無墻面卓爾出羣斯人而己吾識覽雖局未曾以言議假人至於片善小才特用嗟賞况復洪識竒士此故忘言之地論其博綜子史諳究儒墨經耳無遺觸目成誦一褒一貶一激一揚語𤣥析理披文摘句未嘗不聞者心伏聴者解頥㑹意相得自以為布衣之賞吾監撫之暇事隙之辰頗用譚笑娱情琴樽間作雅篇艶什迭互鋒起每清風朗月美景良辰對羣山之參差望巨波之滉瀁或翫新花時觀落葉既聴春鳥又聆秋雁未嘗不促膝舉觴連情發藻且代琢磨間以嘲謔俱怡耳目並留情致自謂百年為速朝露可傷豈謂玉折蘭摧遽從短運為悲為恨常復何言遺跡餘文觸目增泫絶絃投筆恒有酸恨以卿同志聊復敘懐涕之無從言不冩意銘䕶軍孫瑒銘瑒卒江總為其誌銘後主又題銘後四十字遣蔡徵宣勑就宅鐫之秋風動竹煙水驚波幾人樵徑何處山阿今時日月宿昔綺羅天長路逺地久雲多功臣未勒此意如何樂府採桑春樓髻梳罷南陌競相隨去後花叢散風來香處移廣袖承朝日長鬟碍聚枝柯新攀易斷葉嫩摘前萎採蘩鈎手弱微汗雜粧垂不應歸獨早堪為使君知日出東南隅行重輪上瑞暉西北照南威南威年二八開牗敞重闈當壚送客去上苑逐春歸髩下珠勝月牕前雲帶衣紅裙結未解緑綺自難徽三婦艶詞十一首大婦避秋風中婦夜牀空小婦初兩髻含嬌新臉紅得意非霰日可憐那可同大婦西北樓中婦南陌頭小婦初粧㸃回眉對月鈎可憐還自覺人看反更羞大婦主一作弄縑機中婦裁春衣小婦新粧冶拂匣動琴徽長夜理新曲餘嬌且未歸大婦妬蛾眉中婦逐春時小婦最年少相望捲羅幃羅幃夜寒巻相望人來遲大婦上髙樓中婦蕩蓮舟小婦獨無事撥帳掩嬌羞丈夫應自解更㴱難道留大婦初調箏中婦飲歌聲小婦春粧罷弄月當宵楹季子時將意相看不用爭大婦愛恒偏中婦意常堅小婦獨嬌笑新來華燭前新來誠可惑為許得新憐大婦酌金杯中婦照粧臺小婦偏妖冶下砌折新梅衆中何假問人今最後來大婦怨空閨中婦夜偷啼小婦獨含笑正柱作鳥棲河低帳未掩夜夜畵眉齊大婦正當壚中婦裁羅襦小婦獨無事淇上待吴姝烏歸花復落欲去却踟蹰大婦年十五中婦當春户小婦正横陳含嬌情未吐所愁曉漏促不恨燈銷炷飛來雙白鶴朔吹已蕭瑟愁雲屢合開𤣥冬辛苦地白鶴從風催音響已清切毛羽復殘催飛來進宇下但為失雙回儻逄噲參徳當共銜珠來採蓮曲相催暗中起妝前日已光隨宜巧注口薄落㸃花黄風住疑衫宻舩小畏裾長波文散動檝茭花拂度航低何亂翠影采袖新蓮香歸時㑹被喚且試入蘭房昭君怨圖形漢宫裡遥聘單于庭狼山聚雲暗龍沙飛雪輕笳吟度隴咽笛轉出闗鳴啼粧寒葉下愁眉塞月生只餘馬上曲猶作别時聲朱鷺參差蒲未齊沈漾若浮緑朱鷺戲蘋藻裵徊流澗曲澗曲多巖樹逶迤復斷續振振雖以明湯湯今又矚巫山髙巫山巫峽㴱峭壁聳春林風巖朝蕋落霧嶺晚猨吟雲來足薦枕雨過非感琴仙姬將夜月度影自浮沈有所思三首蕩子好蘭期留人獨自思落花同淚臉初月似愁眉階前看草蔓牕中對網絲不言千里别一作望復是三春時杳杳與人期遥遥有所思山川千里間風月兩邊時相對春那劇相望景偏遲當由分别久夢來還自疑佳人在北燕相望渭橋邊團團落日樹耿耿曙河天愁多明月下淚盡鴈行前别心不可寄惟餘琴上絃雉子班四野秋原暗十歩啄方前雊聲風處逺翅影雲間連箭射妖姬笑裘值盛明然己足南皮賞復㑹北宫篇臨髙臺晩景登髙臺迴望春光來霧濃山後暗日落雲傍開煙裏看鴻小風來望葉回臨窻己響吹極眺且傾杯隴頭隴頭征戍客寒多不識春驚風起嘶馬苦霧雜飛塵投錢積石水斂轡交河津四面夕冰合萬里望佳人隴頭水二首塞外飛蓬征隴頭流水鳴漠處揚沙暗波中燥葉輕地風冰易厚寒㴱溜轉清登山一回顧幽咽動邊情髙隴多悲風寒聲起夜叢禽飛暗識路鳥轉逐征蓬落葉時驚沬移沙屢擁空回頭不見望流水玉門東折楊栁二首楊栁動春情倡園妾屢驚入樓含粉色依風雜管聲武昌識新種官渡有殘生還將出塞曲仍共胡笳鳴長條黄復緑垂絲宻且繁花落幽人徑步隠將軍屯谷暗宵鉦響風髙夜笛喧聊特暫攀折空足憶中園闗山月二首秋月上中天逈一作迴照闗城前暈缺隨灰減光滿應珠圓帶樹還添桂銜峯乍似弦復教征戌客長怨久連翩戍邊嵗月乆恒悲望舒耀城遥接暈髙澗風連影揺寒光帶岫徙冷色含山峭看時使人憶為似嬌娥照洛陽道五首諠譁照邑里遨遊出洛京霜枝嫩栁發水塹薄苔生停鞭回去影駐軸敞前甍臺上經相識城下屢逢迎踟蹰還借問只重未知名日光朝杲杲照耀東京道霧帶城樓開啼侵曙色早佳麗嬌南陌香氣含風好自憐釵上纓不歎河邊草建都開洛汭中地乃城陽縱横肆八達左右闢康莊銅溝飛栁絮金谷落花光忘情伊水側税駕河橋傍百尺瞰金埒九衢通玉堂栁花塵裏暗槐色露中光游俠幽并客當壚京兆粧向夕風煙晚金羈滿洛陽青槐夾馳道御水映銅溝逺望凌霄闕遥看井幹樓黄金彈俠少朱輪盛徹侯桃花雜渡馬紛披聚陌頭長安道建章通未央長樂屬明光大道移甲第甲第玉為堂逰蕩新豐裏戲馬渭橋傍當壚晩留客夜夜苦紅粧梅花落二首春砌落芳梅飄零上鳳臺拂粧疑粉散逐溜似萍開映日花光動迎風香氣來佳人早挿髻試立且裵徊楊栁春樓邊車馬飛風煙連娉烏孫伎屬客單于氊鴈聲不見書蠶絲欲斷弦欲持塞上蕋試立將軍前紫騮馬二首嫖姚紫塞歸蹀躞紅塵飛玉珂鳴廣路金絡耀晨輝葢轉時移