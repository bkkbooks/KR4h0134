案藴仙此還異掌漏翻非役侍臣乃執捧良賓乃投擲唾壺賢舍觀穴踵𤓰田覩躡迹矩步今有儀用此前嘉客履七夕宴重詠牛女各為五韻明月照髙臺仙駕忽裵徊雷徙聞車度霞上見粧開房移看動馬斗轉望斟杯靨色隨星去髻影襍雲來更覺今宵短只遽日輪催同管記陸琛七夕五韻亭亭秋月明團團夕露輕鳳駕今時度霓騎此宵迎疏上綵霞動粉外白雲生故嬌隔分别新歡起舊情含笑不終夜香風空自停七夕宴樂修殿各賦六韻秋初芰荷殿寶帳芙蓉開玉笛隨弦上金鈿逐照迴釵光揺玳瑁柱色輕玫瑰笑靨人前斂衣香動處來非同七襄駕詎隔一春梅神仙定不及寜用流霞杯七夕宴𤣥圃各賦六韻殿深炎氣少日落夜風清月小看針暗雲開見縷明絲調聴魚出吹響間蟬聲度更銀燭盡陶暑玉巵盈星津雖可望詎得似人情同管記陸瑜九日觀馬射晴朝麗早霜秋景照堂皇幹慘風威切荷彫池望荒樓髙看雁下葉散覺山凉歇霧含空翠新花濕露黄飛禽接斾影度日轉鈹光連翻北幽騎馳射西園傍勒移碼碯色鞭起珊瑚揚己同過隙逺更異良弓蔵且觀千里汗仍瞻百歩揚非為從逸賞方追塞外羌畵堂良夜履長在節歌管賦詩列筵命酒十韻成篇季冬初陽始寒氣尚蕭颯原葉成委低岫雲時吐欱雕樹乍疎逈逺峯自重㳫雲興四山霾風動萬籟答肅肅凝霜下峩峩層冰合複殿可以娱於兹多延納迢迢百尺觀杳杳三休閤前後訓導屏左右文衛匝進退簪纓移縱横壯思襍幸矣天地泰當無范雎拉同管記陸瑜七夕四韻河漢言清淺相望限煙霄雲生劍氣没槎還客宿遥月上仍為鏡星連可作橋唯當有今夕一夜不迢迢初伏七夕己覺微凉既引應徐且命燕趙清風朗月以望七襄之駕置酒陳樂各賦四韻之篇廣席多才俊重合引珠妍管絃檐外響羅綺樹中鮮舉針還向月上儛復依筵度河將闕殿相看併是􅋖晩宴文思殿晩日落餘暉宵園翠葢飛荷影侵池浪雲色入山扉螢光息復起暗鳥去翻歸樂極未言醉杯深猶恨稀宴光璧殿詠遥山燈照耀浮輝明飄颻落燼輕枝多含樹影煙上帶珮生雜桂還如月依栁更疑星園中鶴未麗池上鳬飛驚三善殿夕望山燈重岫多風煙華燈此岫邊涸浦如珠露彫樹似花鈿依樓雜度月帶石影開蓮既有常滿照羞與曉星連入隋侍宴應詔日月光天徳山河壯帝居太平無以報願上東封一作萬年書幸𤣥武湖餞吴興太守任恵寒雲輕重色秋水去來波待我戎衣定然送大風歌宴詹事陸繕省禁闥九重中宴賞三春日雲收上樹隠葉長宫槐宻水緑己浮苔花舒正含實闕聴箏雜言文牕玳瑁影嬋娟香帷翡翠出神仙促柱㸃唇鶯欲語調絃繫爪鴈相連秦聲本自楊家解吴歙那知謝傳憐秪愁芳夜促蘭膏無那煎戲贈沈后留人不留人不留人也去此處不留人自有留人處隋渠詩隋焬帝夕泛舟北海忽見水上有小舟至乃陳後主也帝起迎之後主曰聞陛下開隋渠引洪河之水東逰維揚因作詩以奏隋室開兹水初心謀大賖一千里力役百萬民吁嗟水殿不復返龍舟成小瑕溢流隨陡岸濁浪噴黄沙兩人迎客至三月栁飛花日脚沈雲外榆梢噪暝鴉如今逰子俗異日便天家且樂人間景休尋海上槎人喧舟艤岸風細錦帆斜莫言無後利千古壯京華小牕詩煬帝昏酒嘗逰吴公宅雞臺忽與陳後主相遇後主復書數十篇帝止記小牕及寄侍兒碧玉詩午醉醒來晩無人夢自驚夕陽如有意偏傍小牕明寄碧玉詩離别腸應斷相思骨合銷愁魂若飛散慿仗一相招漢魏六朝百三家集巻一百二
