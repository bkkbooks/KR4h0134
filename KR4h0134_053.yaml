body:
  text: 漢魏六朝百三家集卷五十三晉張載張協集題詞晉代文人有二陸三張之稱三張者孟陽載景陽協季陽亢也季陽才藻不逮二昆文不甚顯孟陽濛汜司𨽻延譽景陽七命舉世稱工安平棣華名豈虛得然揆其旨趣語亦猶人不能不遠慚枚叔近愧平原也劒閣一銘文章典則礲石蜀山古今榮遇景陽文稍讓兄而詩獨徑出蓋二張齊驅詩文之間互有長短若論才家庭則伯難為兄仲難為弟矣二子守道嫉衆貪位高尚之懷每形詩詠時或疵其玄之尚白及觀二鳳齊傾金谷並隕華亭上蔡嗟呼歎晚然後知達人蚤識長謡二疏高歌招隱所以能自脫于巫山之火也目録賦濛汜池賦敘行賦酃酒賦扇賦安石榴賦論𣙜論頌平吳頌銘劒閣銘洪池陂銘七首銘詩登成都白莵樓贈虞顯度招隱詩七哀詩其一其二霖雨擬四愁詩其一其二其三其四述懷詩失題又又漢魏六朝百三家集卷五十三目録欽定四庫全書漢魏六朝百三家集卷五十三明張溥輯晉張載集賦濛汜池賦麗華池之湛淡開重壤以停源激通渠於千金承纒洛之長川挹洪流之汪濊包素瀨之寒泉既乃北通醴泉東入紫宫左面九市右帶閬風周墉建乎其表洋波迥回乎其中幽瀆傍集潛流獨注仰承河漢吐納雲霧緣以采石葅以嘉樹水禽育而萬品珍魚産而無數蒼苔泛濫條修無幹緑葉覆水元隂夾岸紅蓮煒而秀出繁葩赩以煥爛遊龍曜翼而上征翔鳳因儀而下觀想白日之納光覩洪暉之皓旰於是天子乘玉輦時遨遊排金門出千秋造緑池鏡淸流翳華蓋以逍遙攬魚釣之所收纎緒挂而鱣鮪來芳餌沉而鰋鯉浮豐夥踰於巨壑信可樂以忘憂敘行賦歲大荒之孟夏余將往乎蜀都脂輕車而秣馬循路軌以西徂朝發軔於京宇兮夕豫宿於穀洛踐有周之舊墟陟邱荒以寥廓讃王孫於北門問九鼎於東郭實公目之所卜曷斯水之濆薄入函谷而長驅歷新安之西阜行逶迤以登降涉二崤之重阻經嶔岑之險巇想姬文之避雨出潼關以迥回逝仰華嶽之崔嵬動大禹之疏導豁龍門之洞開舍豫車以步趾玩卉木之璀錯翳靑青之長松蔭肅肅之高柞緣阻岑之絶崖蹈偏梁之懸閣石壁立以切天岌􅐑瑰其欲落超陽平而越白水稍幽薆以迥回深乘重巒之百層轉木末於九岑浮雲起於轂下零雨集於麓林上昭昧以青陽下杳冥而晝陰聞山鳥之晨鳴聽元猿之夜吟雖處者之所樂嗟寂寞而愁豫心造劔閣之崇關路盤曲以暗藹山崢嶸以峻狹仰青天其如帶兼習坎之重固形束隘以要害豈乾坤之分域將隔絶乎內外酃酒賦惟賢聖之興作貴垂功而不泯加康狄之先識亦應天而順人擬酒旗於玄象造甘醴以頥神雖賢愚之同好似大化之齊均物無往而不變獨居舊而彌新經盛衰而無廢歷百代而作珍若乃中山冬啓醇酎秋發長安春御洛浪夏設漂蟻萍布分香酷烈播殊美於聖載信人神之所悅末聞珍酒出於湘東既丕顯於皇都乃潛淪於吳邦往逢天地之否運今遭六合之開通播殊美于聖代宣至味而大同匪徒法用之窮理信泉壤之所鍾故其為酒也殊功絶倫三事既節五齊必均造釀在秋告成在春備味滋和體色淳淸宣御神志導氣養形遣憂消患適性順情言之者嘉其旨美味之者棄事忘榮於是糾合同好以遨以遊嘉賓雲會矩坐四周設金樽於南楹酌浮觴以施流備鮮肴以綺進錯時膳之珍羞禮義攸序是獻是酬赬顔既發溢思凱休德音晏晏宏此徽猷咸德至以自足願棲遲於一邱於是歡樂既洽日薄西隅主稱湛露賓歌驪駒僕夫整馬言旋其居乃馮軾以回軌騁輕駟於通衢反衡門以隱迹覽前聖之典謨感夏禹之防微悟儀氏之見疏鑒往事而作戒罔非酒而惟愆哀秦穆之既醉纎良人而棄賢嘉衛武之能悔著屢舞於初筵察成敗於往古垂將來於兹篇扇賦有翔雲之素鳥體自然之至潔飄縞羽於淸霄擬妙姿於白雪俯濯素於河漢仰晞光於日月雙趾蹶而騰虛六翮揮而風厲於是傲世公子俶儻踔躒遺物獨出樂此天爵飛蒲氏之修蟠縈子余之纎繳弋翔冥之鵾雞連王子之白鶴裁輕翼以為扇發淸風於徑翮若乃搜竒選妙絶色寡雙鵠質皎鮮元的點鋒修短雖異而光彩齊同故易稱可以為儀詩美肅肅之容是以停之如栖鵠揮之如驚鴻飄纓蕤於軒幌發暉曜於羣龍夫裂素製圓剖竹為方五明起於名都九華興於上京安石榴賦有石榴之竒樹肇結根於西海仰靑春以啓萌晞希夏以發采輝光垂緑擢幹曜鮮熻若羣翡俱栖爛若百枝並然煥乎郁郁焜乎煌煌仰映淸霄俯燭蘭堂似西極之若木譬東谷之扶桑於是天迥回節移龍火西夕流風晨激行露朝白紫房既熟赬膚自坼剖之則珠散含之則氷釋論𣙜論夫賢人君子將立天下之功成天下之名非遇其時曷由致之哉故嘗試論之殷湯無鳴條之事則伊尹有莘之匹夫也周武無牧野之陳則呂牙渭濱之釣翁也若兹之類不可勝紀蓋聲發響應形動影從時平則才伏世亂則奇用豈不信歟設使秦莽修三王之法時致隆平則漢祖泗上之健吏光武舂陵之俠客耳况乎附麗者哉故當其有事也則足非千里不入於輿創非斬鴻不韜於鞘是以駑蹇望風而退頑鈍未試而廢及其無事也則牛驥共牢利鈍齊列而無長塗犀革以決之此離朱與瞽者同眂之説也處守平之世而欲建殊常之勳居太平之際而吐違俗之謀此欲却步而登山鬻章甫於越也漢文帝見李廣而歎曰惜子不遇當高祖時萬户侯豈足道哉故智無所運其籌勇無所奮其氣則勇怯一也才無所騁其能辨無所展其説則頑慧均也是以吳榜越船不能無水而浮青虬赤螭不能無雲而飛故和璧之在荆山隋珠之潛重川非遇其人焉有連城之價照車之名乎靑骹繁霜縶於籠中何以效其撮東郭於鞲下也白猿元豹藏於靈檻何以知其接垂條於千仞也孱夫與烏獲訟力非龍文赤鼎無以明之蓋聶政與荆卿爭勇非強秦之威孰能辨之故餓夫庸𨽻抱關屠釣之倫一旦而都卿相之位建金石之號者或有懷顔孟之術抱伊管之略沒世而不齒者此言有事之世易為功無為之時難為名也若斯湮滅而不稱曾不足以多説况夫庸庸之徒少有不得意者則自以為枉伏莫不飾小辨立小善以偶時結朋黨聚虛譽以驅俗進之無補於時退之無損於化而世主相與雷同齊口吹而喣之豈不哀哉今士循常習故規行矩步積階級纍閥閲碌碌然以取世資若夫魁梧俊傑卓躒俶儻之徒直將伏死嶔岑之下安能與步驟共爭道里乎至如軒冕黻班之士苟不能匡化輔政佐時益世而徒俯仰取容要榮求利厚自封之資豐私家之積此沐猴而冠耳尚焉足道哉頌平吳頌并序聞之前志堯有丹水之陳舜有三苖之誅此聖帝明王平暴靜亂未有不用兵而制之也夫太上成功非頌不顯情動於中非言不彰獫狁既攘出車以興淮夷既平江漢用作斯故先典之明志不刋之美事烏可闕歟遂作頌曰上哉仁聖曰惟皇晉光澤四表繼天垂胤帝道煥於唐堯義聲邈乎虞舜蠢爾鯨吳慿山阻水肆虐播毒而作豺虺菁茅闕而不貢越裳替其白雉正九伐之明典申號令之舊章布亘地之長羅振天網之修綱制征期於一朝並箕驅而幕張爾乃援丹陽之峻壁屠西陵之高墉日不移晷羣醜率從望會稽而振鐸臨吳地而奮旅衆軍競趣烽颷具舉挫其輕鋭走其守禦銘劒閣銘巖巖梁山積石峨峨遠屬荆衡近綴岷嶓南通卭僰北達褎斜狹過彭碣高踰嵩華惟蜀之門作固作鎮是曰劒閣壁立千仞窮地之險極路之峻世濁則逆道淸斯順閉由往漢開自有晉秦得百二并吞諸侯齊得十二田生獻籌矧兹狹隘土之外區一人荷戟萬夫趦趄形勝之地非親勿居昔在武侯中流而喜山河之固見屈吳起興實在德險亦難恃洞庭孟門二國不祀自古迄今天命匪易慿阻作昏鮮不敗績公孫既滅劉氏銜璧覆車之軌無或重迹勒銘山阿敢告梁益洪池陂銘開源東注出自城池魚鱉熾殖水鳥盈涯菱藕狎獦粳稻連畦漸臺中起列館參差惟水泱泱厥大難訾匕首銘先民造制戒豫惟詳匕首之設應速用近既不忽備亦無輕忿利以形彰功以道隱詩登成都白莵樓重城結曲阿飛宇起層樓一作區纍棟出雲表嶢􅀢臨太虛高軒啓朱扉迥回望暢八隅西瞻岷山嶺嵯峨似荆巫蹲鴟蔽地生原隰殖嘉蔬雖遇堯湯世民食恆有餘鬱鬱少城中岌岌百族居街術紛綺錯高甍夾長衢借問楊子宅想見長卿廬程卓纍千金驕侈擬五侯門有連騎客翠帶腰吳鉤鼎食隨時進百和妙且殊披林採秋橘臨江釣春魚黑子過龍醢果饌踰蟹蝑芳茶冠六淸溢味播九區人生茍安樂兹土聊可娛贈虞顯度疇昔協蘭芳繾綣在華年嘉好結平素分著寮友前謂得終遐日綢繆永周旋吾子遭不造遘閔丁憂艱俾我失良朋誰與吐話言一日為三秋歲况乃三年離居一何濶結思如迥回川招隱詩出處雖殊塗居然有輕易山林無悔吝人間實多纍鵷雛翔窮冥蒲且不能視鸛鷺遵皋渚數為矰所繫隱顯雖在心彼我共一地不見巫山火芝艾豈相離去來捐時俗超然辭世偽得意在邱中安事愚與智七哀詩二首北芒一作邙何壘壘高陵有四五借問誰家墳皆云漢世主恭文遙相望原陵鬱膴膴季世一作葉喪亂起賊盜如豺虎毁壤過一壞便房啓幽戶珠柙一作匣離玉體珍寶見剽虜園寢化為墟周墉無遺堵蒙蘢荆棘生蹊徑登童𥪡狐兔窟其中蕪穢不復掃頽隴並墾發萌𨽻營農圃昔為萬乘君今為邱中土感彼雍門言悽愴哀今一作往古其二秋風吐商氣蕭瑟掃前林陽鳥一作烏收和響寒蟬無餘音白露中一作朝夜結木落柯條森朱光馳北陸浮景忽西沉顧望無所見唯覩松柏陰肅肅高桐枝翩翩棲孤禽仰聽離鴻鳴俯聞蜻蛚吟哀人易感傷觸物增悲心邱隴日已遠纒綿彌思深憂來令髮白誰云愁可任裴徊向長風淚下沾衣襟霖雨霖雨餘旬朔濛昧日夜墜何以解愁懷置酒招親類啾啾絲竹作伶人奏奇祕悲歌結流風逸響迥回秋氣擬四愁詩四首我所思兮在南巢欲往從之巫山高登崖遠望涕泗交我之懷矣心傷勞佳人遺我笥中布何以贈之流黃素願因飄風超遠路終然莫致增永慕其二我所思兮在朔湄欲往從之白雪飛登崖遠望涕泗頽一作垂我之懷矣心傷悲佳人遺我雲中翮何以報之連城璧願因歸鴻超遐翮終然莫致增永積其三我所思兮在隴原欲往從之隔太山登崖遠望涕泗漣我之懷矣心傷煩佳人遺我雙角端何以贈之雕玉環願因行雲超重巒終然莫致增永嘆其四我所思兮在營州欲往從之路阻修登崖遠望涕泗流我之懷矣心傷憂佳人遺我緑綺琴何以贈之雙南金願因流波超重深終然莫致增永吟述懷詩跋踄山川千里告辭楊子哭岐墨氏感絲雲乖雨絶心乎愴而失題江南都蔗釀液豐沛三巴黃甘瓜州素奈凡此素品殊美絶快渴者所思銘之常帶同前白日隨天迥回暾暾圓如規踊躍湯谷中上登扶桑枝同前氣力漸哀損鬢髮終以皓昔為春月華今為秋日草漢魏六朝百三家集卷五十三
