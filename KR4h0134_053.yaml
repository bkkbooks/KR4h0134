body:
  text: 漢魏六朝百三家集巻五十三晉張載張協集題詞晉代文人有二陸三張之稱三張者孟陽載景陽協季陽亢也季陽才藻不逮二昆文不甚顯孟陽濛汜司𨽻延譽景陽七命舉世稱工安平棣華名豈虚得然揆其㫖趣語亦猶人不能不遠慚枚叔近媿平原也劒閣一銘文章典則礲石蜀山古今榮遇景陽文稍讓兄而詩獨勁出葢二張齊驅詩文之間互有長短若論才家庭則伯難為兄仲難為弟矣二子守道嫉衆貪位高尚之懷每形詩詠時或疵其𤣥之尚白及觀二鳳齊傾金谷並隕華亭上蔡嗟呼歎晚然後知達人蚤識長謡二疏高歌招隱所以能自脱于巫山之火也目錄賦濛汜池賦敘行賦酃酒賦扇賦安石榴賦論𣙜論頌平吳頌銘劒閣銘洪池陂銘七首銘詩登成都白莵樓贈虞顯度招隱詩七哀詩其一其二霖雨擬四愁詩其一其二其三其四述懷詩失題又又漢魏六朝百三家集巻五十三目録欽定四庫全書漢魏六朝百三家集巻五十三明張溥輯晉張載集賦濛汜池賦麗華池之湛澹開重壌以停源激通渠於千金承纒洛之長川挹洪流之汪濊包素瀨之寒泉旣乃北通醴泉東入紫宫左面九市右帶閬風周墉建乎其表洋波㢠廻乎其中幽瀆傍集潜流獨注仰承河漢吐納雲霧緣以采石葅以嘉樹水禽育而萬品珍魚産而無數蒼苔汎濫條修無榦綠葉覆水元隂夾㟁紅蓮煒而秀出繁葩赩以煥爛遊龍曜翼而上征翔鳳因儀而下觀想白日之納光覩洪暉之皓旰於是天子乗玉輦時遨遊排金門出千秋造綠池鏡淸流翳華葢以逍遥攬魚釣之所收纎緒挂而鱣鮪來芳餌沉而鰋鯉浮豐夥踰於巨壑信可樂以忘憂敘行賦歲大荒之孟夏余將往乎蜀都脂輕車而秣馬循路軌以西徂朝發軔於京㝢兮夕予宿於糓洛踐有周之舊墟陟邱荒以寥廓讃王孫於北門問九鼎於東郭寔公目之所卜曷斯水之濆薄入函谷而長驅歴新安之西阜行逶迤以登降渉二崤之重阻經嶔岑之險巇想姬文之避雨出潼關以㢠廻逝仰華岳之崔嵬動大禹之疏導豁龍門之洞開舍予車以歩趾玩卉木之璀錯翳靑青之長松䕃肅肅之高柞緣阻岑之絶崖蹈偏梁之懸閣石壁立以切天岌􅐑瑰其欲落超陽平而越白水稍幽薆以㢠廻深乗重巒之百層轉木末於九岑浮雲起於轂下零雨集於麓林上昭昧以青陽下杳㝠而晝陰聞山鳥之晨鳴聽元猿之夜唫雖處者之所樂嗟寂寞而愁予心造劔閣之崇關路盤曲以晻藹山崢嶸以峻狹仰青天其如帶兼習坎之重固形束隘以要害豈乾坤之分域將隔絶乎内外酃酒賦惟賢聖之興作貴垂功而不泯加康狄之先識亦應天而順人擬酒旂於𤣥象造甘醴以頥神雖賢愚之同好似大化之齊均物無往而不變獨居舊而彌新經盛衰而無廢歴百代而作珍若乃中山冬啓醇酎秋發長安春御洛浪夏設漂蟻萍布分香酷烈播殊美於聖載信人神之所悅末聞珍酒出於湘東既丕顯於皇都乃潜淪於吳邦往逢天地之否運今遭六合之開通播殊美于聖代宣至味而大同匪徒法用之窮理信泉壤之所鍾故其為酒也殊功絶倫三事既節五齊必均造釀在秋告成在春備味滋和體色淳淸宣御神志導氣養形遣憂消患適性順情言之者嘉其㫖美味之者棄事忘榮於是糾合同好以遨以遊嘉賓雲會矩坐四周設金樽於南楹酌浮觴以施流備鮮肴以綺進錯時膳之珍羞禮義攸序是獻是酬赬顔既發溢思凱休德音晏晏宏此徽猷咸德至以自足願棲遲於一邱於是懽樂既洽日薄西隅主稱湛露賓歌驪駒僕夫整馬言旋其居乃馮軾以廻軌騁輕駟於通衢反衡門以隱跡覧前聖之典謨感夏禹之防㣲悟儀氏之見疏鍳往事而作戒罔非酒而惟愆哀秦穆之既醉纎良人而棄賢嘉衛武之能悔著屢舞於初筵察成敗於往古垂將來於兹篇扇賦有翔雲之素鳥體自然之至潔飄縞羽於淸霄擬妙姿於白雪俯濯素於河漢仰晞光於日月雙趾蹶而騰虚六翮揮而風厲於是傲世公子俶儻踔躒遺物獨出樂此天爵飛蒲氏之修蟠縈子余之纎繳弋翔㝠之鵾雞連王子之白鶴裁輕翼以為扇發淸風於勁翮若乃捜竒選妙絶色寡雙鵠質皦鮮元的點鋒修短雖異而光彩齊同故易稱可以為儀詩美肅肅之容是以停之如栖鵠揮之如驚鴻飄纓蕤於軒幌發暉曜於羣龍夫裂素製圓剖竹為方五明起於名都九華興於上京安石榴賦有石榴之竒樹肇結根於西海仰靑春以啓萌晞希夏以發采輝光垂緑擢幹曜鮮熻若羣翡俱栖爛若百枝並然煥乎郁郁焜乎煌煌仰映淸霄俯燭蘭堂似西極之若木譬東谷之扶桑於是天㢠廻節移龍火西夕流風晨激行露朝白紫房既熟赬膚自坼剖之則珠散含之則氷釋論𣙜論夫賢人君子將立天下之功成天下之名非遇其時曷由致之哉故嘗試論之殷湯無鳴條之事則伊尹有莘之匹夫也周武無牧野之陣則呂牙渭濱之釣翁也若兹之類不可勝紀葢聲發響應形動影從時平則才伏世亂則奇用豈不信歟設使秦莽脩三王之法時致隆平則漢祖泗上之徤吏光武舂陵之俠客耳况乎附麗者哉故當其有事也則足非千里不入於輿刅非斬鴻不韜於鞘是以駑蹇望風而退頑鈍未試而廢及其無事也則牛驥共牢利鈍齊列而無長塗犀革以决之此離朱與瞽者同眂之説也處守平之世而欲建殊常之勳居太平之際而吐違俗之謀此欲却步而登山鬻章甫於越也漢文帝見李廣而歎曰惜子不遇當高祖時萬户侯豈足道哉故智無所運其籌勇無所奮其氣則勇怯一也才無所騁其能辨無所展其説則頑慧均也是以吳榜越船不能無水而浮青虬赤螭不能無雲而飛故和璧之在荆山隋珠之潜重川非遇其人焉有連城之價照車之名乎靑骹繁霜縶於籠中何以效其撮東郭於鞲下也白猨元豹藏於靈檻何以知其接垂條於千仞也孱夫與烏獲訟力非龍文赤鼎無以明之葢聶政與荆卿争勇非强秦之威孰能辨之故餓夫庸𨽻抱關屠釣之倫一旦而都卿相之位建金石之號者或有懷顔孟之術抱伊管之略没世而不齒者此言有事之世易為功無為之時難為名也若斯湮滅而不稱曾不足以多説况夫庸庸之徒少有不得意者則自以為枉伏莫不飾小辨立小善以偶時結朋黨聚虚譽以驅俗進之無補於時退之無損於化而世主相與雷同齊口吹而喣之豈不哀哉今士循常習故規行矩步積階級累閥閲碌碌然以取世資若夫魁梧儁傑卓躒俶儻之徒直將伏死嶔岑之下安能與歩驟共争道里乎至如軒冕黻班之士苟不能匡化輔政佐時益世而徒俯仰取容要榮求利厚自封之資豐私家之積此沐猴而冠耳尚焉足道哉頌平吳頌并序聞之前志堯有丹水之陣舜有三苖之誅此聖帝明王平暴静亂未有不用兵而制之也夫太上成功非頌不顯情動於中非言不彰獫狁旣攘出車以興淮夷既平江漢用作斯故先典之明志不刋之美事烏可闕歟遂作頌曰上哉仁聖曰惟皇晉光澤四表繼天垂𦙍帝道煥於唐堯義聲邈乎虞舜蠢爾鯨吳慿山阻水肆虐播毒而作豺虺菁茅闕而不貢越裳替其白雉正九伐之明典申號令之舊章布亘地之長羅振天網之修綱制征期於一朝並箕驅而幕張爾乃援丹陽之峻壁屠西陵之高墉日不移晷羣醜率從望會稽而振鐸臨吳地而奮旅衆軍競趣烽颷具舉挫其輕鋭走其守禦銘劒閣銘巖巖梁山積石峨峨遠屬荆衡近綴岷嶓南通卭僰北達褎斜狹過彭碣高踰嵩華惟蜀之門作固作鎭是曰劒閣壁立千仞窮地之險極路之峻世濁則逆道淸斯順閉由往漢開自有晉秦得百二并吞諸侯齊得十二田生獻籌矧兹狹隘土之外區一人荷㦸萬夫趦趄形勝之地非親勿居昔在武侯中流而喜山河之固見屈呉起興實在德險亦難恃洞庭孟門二國不祀自古迄今天命匪易慿阻作昏鮮不敗績公孫旣滅劉氏衘璧覆車之軌無或重跡勒銘山阿敢告梁益洪池陂銘開源東注出自城池魚鱉熾殖水鳥盈涯菱藕狎獦秔稻連畦漸臺中起列館參差惟水泱泱厥大難訾匕首銘先民造制戒豫惟詳匕首之設應速用近既不忽備亦無輕忿利以形彰功以道隱詩登成都白莵樓重城結曲阿飛宇起層樓一作區累棟出雲表嶢􅀢臨太虛高軒啓朱扉㢠廻望暢八隅西瞻岷山嶺嵯峨似荆巫蹲鴟蔽地生原隰殖嘉蔬雖遇堯湯世民食恆有餘鬰鬰少城中岌岌百族居街術紛綺錯高甍夾長衢借問楊子宅想見長卿廬程卓累千金驕侈擬五侯門有連騎客翠帶腰吳鉤鼎食隨時進百和妙且殊披林採秋橘臨江釣春魚黑子過龍醢果饌踰蟹蝑芳茶冠六淸溢味播九區人生茍安樂兹土聊可娛贈虞顯度疇昔協蘭芳繾綣在華年嘉好結平素分著寮友前謂得終遐日綢繆永周旋吾子遭不造遘閔丁憂艱俾我失良朋誰與吐話言一日為三秋歲况乃三年離居一何濶結思如㢠廻川招隱詩出處雖殊塗居然有輕易山林無悔恡人閒實多累鵷雛翔窮㝠蒲且不能視鸛鷺遵皋渚數為矰所繫隱顯雖在心彼我共一地不見巫山火芝艾豈相離去來捐時俗超然辭世偽得意在邱中安事愚與智七哀詩二首北芒一作邙何壘壘高陵有四五借問誰家墳皆云漢世主恭文遙相望原陵鬰膴膴季世一作葉喪亂起賊盗如豺虎毁壤過一坏便房啓幽戶珠柙一作匣離玉體珍寳見剽虜園寢化為墟周墉無遺堵蒙蘢荆棘生蹊逕登童𥪡狐兎窟其中蕪穢不復埽頽隴並墾發萌𨽻營農圃昔為萬乘君今為邱中土感彼雍門言悽愴哀今一作往古其二秋風吐商氣蕭瑟掃前林陽鳥一作烏收和響寒蟬無餘音白露中一作朝夜結木落柯條森朱光馳北陸浮景忽西沉顧望無所見唯覩松栢陰肅肅高桐枝翩翩棲孤禽仰聽離鴻鳴俯聞蜻蛚吟哀人易感傷觸物增悲心邱隴日已遠纒綿彌思深憂來令髪白誰云愁可任裴徊向長風淚下沾衣襟霖雨霖雨餘旬朔濛昧日夜墜何以解愁懷置酒招親類啾啾絲竹作伶人奏奇秘悲歌結流風逸響㢠廻秋氣擬四愁詩四首我所思兮在南巢欲往從之巫山高登崖遠望涕泗交我之懷矣心傷勞佳人遺我笥中布何以贈之流黄素願因飄風超遠路終然莫致增永慕其二我所思兮在朔湄欲往從之白雪飛登崖遠望涕泗頽一作垂我之懷矣心傷悲佳人遺我雲中翮何以報之連城璧願因歸鴻超遐翮終然莫致增永積其三我所思兮在隴原欲往從之隔太山登崖遠望涕泗漣我之懷矣心傷煩佳人遺我雙角端何以贈之雕玉環願因行雲超重巒終然莫致增永嘆其四我所思兮在營州欲往從之路阻修登崖遠望涕泗流我之懐矣心傷憂佳人遺我綠綺琴何以贈之雙南金願因流波超重深終然莫致增永吟述懷詩跋踄山川千里告辭楊子哭岐墨氏感絲雲乖雨絶心乎愴而失題江南都蔗醸液豐沛三巴黄甘𤓰州素柰凡此素品殊美絶快渇者所思銘之常帶同前白日隨天㢠廻暾暾圓如規踊躍湯谷中上登扶桑枝同前氣力漸哀損髩髪終以皓昔為春月華今為秋日艸漢魏六朝百三家集巻五十三
