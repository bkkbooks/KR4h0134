body:
  text: 漢魏六朝百三家集魏武帝集題詞孟德瑞應黃星志窺漢鼎世遂謂梁沛真人天下莫敵究其初一名孝亷也曹嵩為長秋養子生出莫審官登太尉經董卓之亂避難琅琊陶徐州戮之直撲殺常侍兒耳孟德奮跳當塗大振易漢而魏雖附㑹曹參難洗宗恥間讀本集苦寒猛虎短歌對酒樂府稱絶又助以子桓子建帝王之家文章瑰瑋前有曹魏後有蕭梁然曹氏居最矣孟德御軍三十餘年手不捨書兼草書亞崔張音樂比桓蔡圍棋埓王郭復好養性解方藥周公所謂多才多藝孟德誠有之使彼不稱王謀篡獲與周旋晝講武策夜論經傳或登高賦詩被之管絃又觀其射飛鳥擒猛獸殆可終身忘老乃竟甘心作賊者謂時不我容耳漢末名人文有孔融武有吕布孟德實兼其長此兩人不死殺孟德有餘述志一令似乎欺人未嘗不抽序心腹慨當以慷也目録令春祠令述志令軍譙令嚴敗軍令重功德令建學令求賢令舉士令選舉令選令又求逸才令求直言令封功臣令分給諸將令掾屬進得失令效力令讓禮令抑兼并令禁比周令存恤令給貸令慎刑令禁絶火令禁鮮飾令百辟刀令修盧植墳墓令褒泰山太守吕䖍令表封田疇令下田疇讓封令與張範令徐晃假節令勞徐晃令下州郡美杜畿令賜杜畿令與辛毗令與邴原令辟王必令拜高柔為理曹掾令下諸侯長吏令諸兒令列孔融罪狀令丁幼陽令表青州刺史劉琮令夀陵令遺令蠲河北租賦令更始令讓九錫令遣使令褒賞令軍䇿令又又鼓吹令論將令設官令賜夏侯惇伎樂名倡令褒夏侯淵令論功行封二荀令稱荀攸令又請鍾繇參軍令誅崔琰令省西曹令徐奕為中尉手令諸子選官屬令蔣濟為揚州别駕令蔣濟為丞相西曹屬令棗祗子處中封爵令褒杜畿令原劉廙令議復肉刑令禁用誹謗令報和洽論毛玠令杜襲為留府長史令內誡令又臨淄侯曹植犯禁令遺命諸子令與衛臻令請鍾繇參軍令教議田疇讓封教授崔琰東曹掾教征吳教復教與張遼等教賜袁渙家榖教表上言破袁表讓費亭侯表又讓封表讓增封武平侯表讓增封表讓還司空印綬表讓九錫表謝襲費亭侯表領兖州牧表陳損益表拜九錫謝表請封荀彧為萬嵗亭侯表請增封荀彧表請封田疇表請恤郭嘉表獲宋金生表請封荀攸表請增封郭嘉表麋竺領嬴郡太守表上獻帝器物表奏事破袁尚上事上九醖酒法奏上雜物疏䇿立卞王后䇿書與少府孔融書與太尉楊文先書與王修書與荀彧書報荀彧書與荀彧悼郭嘉書二首與鍾繇書與荀攸書與閻行書報蒯越書答朱靈書報楊阜書報劉廙書答袁紹書答吕布書遺孫權書二首與王芬書為兖州牧上書尺牘報荀彧與荀彧又又又與諸葛亮序孫子兵法序祭文祀橋太尉文樂府氣出唱三首精列度關山薤露蒿里行對酒陌上桑短歌行二首苦寒行秋胡行二首善哉行二首郤東西門行一作步出東西門行碣石篇四首觀滄海冬十月土不同龜雖夀謡俗詞董卓歌詞漢魏六朝百三家集卷二十三目録欽定四庫全書漢魏六朝百三家集卷二十三明張溥輯魏武帝集令春祠令議者以為祠廟上殿當解履吾受賜命帶劒不解履上殿今有事於廟而解履是尊先公而替王命敬父祖而簡君主故吾不敢解履上殿也又臨祭就洗以手擬水而不盥夫盥以潔為敬未聞擬向不盥之禮且祭神如神在故吾親受水而盥也又降神禮訖下階就幕而立須奏樂畢竟似若不愆烈祖遲祭不速訖也故吾坐俟樂闋送神乃起也受胙納神以授侍中此為敬恭不終實也古者親執祭事故吾親納於神終抱而歸也仲尼曰雖違衆吾從下誠哉斯言也述志令孤始舉孝亷年少自以本非巖穴知名之士恐為海內人之所見凡愚欲為一郡守好作政教以建立名譽使世士明知之故在濟南始除殘去穢平心選舉違忤諸常侍以為彊豪所忿恐致家禍故以病還去官之後年紀尚少顧視同嵗中年有五十未名為老內自圖之從此却去二十年待天下清乃與同嵗中始舉者等耳故以四時歸鄉里於譙東五十里築精舍欲秋夏讀書冬春射獵求低下之地欲以泥水自蔽絶賓客往來之望然不能得如意後徴為都尉遷典軍校尉意遂更欲為國家討賊立功欲望封侯作征西將軍然後題墓道言漢故征西將軍曹侯之墓此其志也而遭值董卓之難興舉義兵是時合兵能多得耳然常自損不欲多之所以然者多兵意盛與彊敵爭倘更為禍始故汴水之戰數千後還到揚州更募亦復不過三千人此其本志有限也後領兖州破降黃巾三十萬衆又袁術僭號於九江下皆稱臣名門曰建號門衣被皆為天子之制兩婦預爭為皇后志計己定人有勸術使遂即帝位露布天下答言曹公尚在未可也後孤討禽其四將獲其人衆遂使術窮亡解沮發病而己及至袁紹據河北兵勢彊盛孤自度勢實不敵之但計投死為國以義滅身足垂於後幸而破紹梟其二子又劉表自以為宗室包藏奸心乍前乍却以觀世事據有當州孤復定之遂平天下身為宰相人臣之貴已極意望己過矣今孤言此若為自大欲人言盡故無諱耳設使國家無有孤不知當幾人稱帝幾人稱王或者人見孤彊盛又性不信天命之事恐私心相評言有不遜之志妄相忖度每用耿耿齊桓晉文所以垂稱至今日者以其兵勢廣大猶能奉事周室也論語云三分天下有其二以服事殷周之德可謂至德矣夫能以大事小也昔樂毅走趙趙王欲與之圖燕樂毅伏而垂泣對曰臣事昭王猶事大王臣若獲戾放在他國沒世然後已不忍謀趙之徒𨽻况燕後嗣乎胡亥之殺䝉恬也恬曰自吾先人及至子孫積信於秦三世矣今臣將兵三十餘萬其勢足以背叛然自知必死而守義者不敢辱先人之教以忘先王也孤每讀此二人書未嘗不愴然流涕也孤祖父以至孤身皆當親重之任可謂見信者矣以及子桓兄弟過於三世矣孤非徒對諸君說此也常以語妻妾皆令深知此意孤謂之言顧我萬年之後汝曹皆當出嫁欲令傳道吾心使他人皆知之孤此言皆肝鬲之要也所以勤勤懇懇叙心腹者見周公有金縢之書以自明恐人不信之故然欲孤便爾委捐所典兵衆以還執事歸就武平侯國實不可也何者誠恐已離兵為人所禍也既為子孫計又已敗則國家傾危是以不得慕虛名而處實禍此所不得為也前朝恩封三子為侯固辭不受今更欲受之非欲復以為榮欲以為外援為萬安計孤聞介推之避晉封申胥之逃楚賞未嘗不舍書而歎有以自省也奉國威靈仗鉞征伐推弱以克彊處小而禽大意之所圖動無違事心之所慮何向不濟遂蕩平天下不辱主命可謂天助漢室非人力也然封兼四縣食户三萬何德堪之江湖未靜不可讓位至於邑土可得而辭今上還陽夏柘苦三縣户二萬但食武平萬户且以分損謗議少減孤之責也軍譙令吾起義兵為天下除暴亂舊土人民死喪略盡國中終日行不見所識使吾悽愴傷懷其舉義兵已來將士絶無後者求其親戚以後之授土田官給耕牛置學師以教之為存者立廟使視其先人魂而有靈吾百年之後何恨哉嚴敗軍令司馬法將軍死綏故趙括之母乞不坐括是古之將者軍破於外而家受罪於內也自命將征行但賞功而不罰罪非國典也其令諸將出征敗軍者抵罪失利者免官爵重功德令議者或以軍吏雖有功能德行不足堪任郡國之選所謂可與適道未可與權管仲曰使賢者食於能則上尊鬬士食於功則卒輕於死二者設於國則天下治未聞無能之人不鬬之士並受祿賞而可以立功興國者也故明君不官無功之臣不賞不戰之士治平尚德行有事賞功能論者之言一似管窺虎歟建學令喪亂已來十有五年後生者不見仁義禮讓之風吾甚傷之其令郡國各修文學縣滿五百户置校官選其鄉之俊造而教學之庶幾先王之道不廢而有以益於天下求賢令自古受命及中興之君曷嘗不得賢人君子與之共治天下者乎及其得賢也曾不出閭巷豈幸相遇哉上之人不求之耳今天下尚未定此特求賢之急時也孟公綽為趙魏老則優不可以為滕薛大夫若必亷士而後可用則齊桓其何以霸世今天下得無有被褐懷玉而釣於渭濱者乎又得無盜姨受金而未遇無知者乎二三子其佐我明揚仄陋唯才是舉吾得而用之舉士令夫有行之士未必能進取進取之士未必能有行也陳平豈篤行蘇秦豈守信邪而陳平定漢業蘇秦濟弱燕由此言之士有偏短庸可廢乎有司明思此義則士無遺滯官無廢業矣選舉令國家舊法選尚書郎取年未五十者使文筆真草有才能謹慎典曹治事起草立義文以草呈示令僕訖乃付令史書之耳書訖共省讀內之事本來臺郎統之令史不行知也書之不好令史坐之至於謬誤讀省者之責若郎不能為文書當御令史是為牽牛不可以服箱而當取辨於繭角也選令諺曰失晨之雞思補更名昔季闡在白馬有受金取婢之罪棄而弗問後以為濟北相以其能故選令今詔書省𨽻宫鍾校尉司材智决洞通敏先覺可上請參軍事以輔暗政求逸才令昔伊摯傅說出於賤人管仲桓公賊也皆用之以興蕭何曹參縣吏也韓信陳平負汗辱之名有見笑之恥卒能成就王業聲著千載吳起貪將殺妻自信散金求官母死不歸然在魏秦人不敢東向在楚則三晉不敢南謀今天下得無有至德之人放在民間及果勇不顧臨敵力戰若文俗之吏高才異質或堪為將守負汙辱之名見笑之行或不仁不孝而有治國用兵之術其各舉所知勿有所遺求直言令夫治世御衆建立輔弼誡在面從詩稱聽用我謀庶無大悔斯實君臣懇懇之求也吾充重任每懼失中頻年以來不聞嘉謀豈吾開延不勤之咎邪自今以後諸掾屬治中别駕常以月旦各名其失吾將覽焉封功臣令吾起義兵誅暴亂於今十九年所征必克豈吾功哉乃賢士大夫之力也天下雖未悉定吾當要與賢士大夫共定之而専饗其勞吾何以安焉其促定功行封於是大封功臣二十餘人皆為列侯其餘各以次受封反復死復之孤輕重各有差分給諸將令昔趙奢竇嬰之為將也受賜千金一朝散之故能濟成大功永世流聲吾讀其文未嘗不慕其為人也與諸將士大夫共從戎事幸賴賢人不愛其謀羣士不遺其力是以夷險平亂而吾得竊大賞户邑三萬追思竇嬰散金之義今分所受租與諸將掾屬及故戍於陳蔡者庶以疇答衆勞不擅大惠也宜差死事之孤以租榖及之若年殷用足租奉畢入將大與衆人悉共饗之掾屬進得失令自今諸掾屬侍中别駕常以月朔各進得失紙書函封主者朝常給紙函各一效力令今清時但當盡忠於國效力王事雖私結好於他人用千匹絹萬石榖猶無所益讓禮令里諺曰讓禮一寸得禮一尺斯合經之要矣抑兼并令有國有家者不患寡而患不均不患貧而患不安袁氏之治也使豪彊擅恣親戚兼并下民貧弱代出租賦衒鬻家財不足應命審配宗族至乃藏匿罪人為逋逃主欲望百姓親附甲兵彊盛豈可得邪其收田租畝四升户出絹二匹綿二斤而已他不得擅興發郡國守相明檢察之無令彊民有所隱藏而弱民兼賦也禁比周令阿黨比周先聖所疾也聞冀州俗父子異部更相毁譽昔直不疑無兄世人謂之盜嫂第五伯魚三娶孤女謂之撾婦翁王鳯擅權谷永比之申伯王商忠議張匡謂之左道此皆以白為黑欺天罔君者也吾欲整齊風俗四者不除吾以為羞存恤令自頃已來軍數征行或遇疫氣吏士死亡不歸家室怨曠百姓流離而仁者豈樂之哉不得已也其令死者家無家業不能自存者縣官勿絶廩長吏存恤撫循以稱吾意給貸令去冬天降疫癘民有凋傷軍興於外墾田損少吾甚憂之其令吏民男女女年七十已上無夫子若年十二已下無父母兄弟及目無所見手不能作足不能行而無妻子父兄産業者廩食終身幼者至十二止窮窮不能贍者隨口給貸老耄須待養者年九十己上復不事家一人慎刑令夫刑百姓之命也而軍中典獄者或非其人而仕以三軍死生之事吾甚懼之其選明達法理者使持典刑禁絶火令聞太原上黨四河鴈門冬至後百五日皆絶火寒食云為介子推且北方沍寒之地老少羸弱將有不堪之患令到人不得寒食若犯者家長半嵗刑主吏百日刑令長奪一月俸禁鮮飾令孤不好鮮飾嚴具用新皮葦笥以黃葦緑中遇亂世無葦笥乃更作方竹嚴具以皂韋衣之比孤平常之用者也內中婦曾置嚴具於時為之摧壞令方竹嚴具緑漆甚華好百辟刀令百鍊利器以辟不祥攝服姦宄者也往嵗作百辟刀五枚適成先以一與五官將其餘四吾諸子中有不好武而好文學者將以此與之修盧植墳墓令故北中郎將盧植名著海內學為儒宗士之楷模乃國之楨幹也昔武王入殷式商容之閭鄭喪子産而仲尼隕涕孤到此州嘉其餘風春秋之義賢者之後有異於人敬遣丞掾修墳墓并致薄醊以彰厥德褒泰山太守吕䖍令夫有其志以成其事蓋烈士之所徇也卿在郡以來禽姦討暴百姓獲安躬蹈矢石所征輒克昔寇恂立名於汝潁耿弇建策於青兖古今一也表封田疇令蓚令田疇至節高尚遭值州里戎夏交亂引身深山研精味道百姓從之以成都邑袁賊之盛命召不屈慷慨守志以徼真主及孤奉詔征定河北遂服幽都將定胡寇時加禮命疇即受署陳建攻胡蹊路所由率齊山民一時向化開塞導送供承使役路近而便令敵不意斬踏頓於白狼遂長驅於栁城疇有力焉及軍入塞將圖其功表封亭侯食邑五百而疇懇惻前後辭賞出入三載厯年未賜此為成一人之高甚違王典失之多矣宜從表封無久留吾過下田疇讓封令昔伯成棄國夏后不奪將欲使高尚之士優賢之主不止於一世也其聽疇所執與張範令邴原名高德大清規邈世魁然而峙不為孤用聞張子頗欲學之吾恐造之者富隨之者貧也徐晃假令節晃拒劉備於陽平備遣陳式等絶馬鳴閣道晃别破之太祖喜假晃節令曰此閣道漢中之險要咽喉也劉備欲斷絶外內以取漢中將軍一舉克奪賊計善之美者也勞徐晃令晃振旅還太祖迎晃七里置酒大㑹舉酒勸晃曰全樊襄將軍之功也賊圍塹鹿角十重將軍致戰全勝遂陷賊圍多斬首虜吾用兵三十餘年及所聞古之善用兵者未有長驅徑入敵國者也且焚襄陽之在圍過於莒即墨將軍之功踰孫武穰苴下州郡美杜畿令昔仲尼之於顔子每言不能不歎既情愛發中又宜率馬以驥今吾亦冀衆人仰高山慕景行也賜杜畿令昔蕭何定關中寇恂平河內卿有其功間將授卿以納言之職顧念河東吾股肱郡充實之所足以制天下故且煩卿臥鎮之與辛毗令太祖攻鄴克之表毗為議郎久之遣都護曹洪平下辨使毗與曹休參之令曰昔高祖貪財好色而良平匡其過失今佐治文烈憂不輕矣與邴原令文帝為五官中郎將太祖轉原五官長史令曰子弱不才懼其難正貪欲相屈以匡勵之雖云利賢能不恧恧辟王必令領長史王必是吾披荆棘時吏也忠能勤事心如鐵石國之良吏也蹉跌久未辟之捨騏驥而弗乘焉遑遑而更求哉故教辟之己署所宜便以領長史統事如故拜高柔為理曹掾令夫治定之化以禮為首撥亂之政以刑為先是以舜流四凶族臯陶作士漢祖除秦苛法蕭何定律掾清識平當明於憲典勉恤之哉下諸侯長史令諸侯長史及帳下吏知吾出輒將諸侯行意否從子建私開司馬門來吾都不復信諸侯也恐吾適出便復私出故攝將行不可恆使吾爾誰為心腹也諸兒令今夀春漢中長安先欲使一兒各往督領之欲擇慈孝不違吾令兒亦未知用誰也雖兒小時見愛而長大能善必用之吾非有二言也不但不私臣吏兒子亦不欲有所私列孔融罪狀令大中大夫孔融既伏其罪矣然世人多採其虛名少於核實見融浮豔好作變異眩其誑詐不復察其亂俗也此州人說平原禰衡受傳融論以為父母與人無親譬若缶器寄盛其中又言若遭饑饉而父不肖寧贍活餘人融違天反道敗倫亂理雖肆市朝猶恨其晚更以此事列上宣示諸軍將校掾屬皆使聞見丁幼陽令昔吾同縣有丁幼陽者其人衣冠良士又學問材器吾愛之後以憂恚得狂疾即差與往來故當共宿止吾常遣謂之曰昔狂病儻發作持兵刃我畏汝俱共大笑輒遣不與共宿表青州刺史劉琮令楚有江漢山川之險後服先彊與秦爭衡荆州則其故地劉鎮南久用其民矣身沒之後諸子鼎峙雖終難全猶可引曰青州刺史琮心高志潔智深慮廣輕榮重義薄利厚德蔑萬里之業忽三軍之衆篤中正之體敦令名之譽上耀先君之遺塵下圖不朽之餘祚鮑永之棄并州竇融之離五郡未足以喻也雖封列侯一州之位猶恨此寵未副其人而比有箋求還州監史雖尊秩祿未優今聽所執表琮為諫議大夫參同軍事夀陵令古之葬者必居瘠薄之地其規西門豹祠西原上為夀陵因高為基不封不樹周禮冡人掌公墓之地凡諸侯居左右以前卿大夫居後漢制亦謂之陪陵其公卿大臣列將有功者宜陪夀陵其廣為兆域使足相容遺令天下尚未安定未得遵古也葬畢皆除服其將兵屯戍者皆不得離屯部有司各率乃職斂以時服無藏金玉珍寶蠲河北租賦令下并九年河北罹袁氏之難其令無出今年租賦更始令下并十年其與袁氏同惡者與之更始讓九錫令建安十八年夏五月獻帝使御史大夫郗慮策命大祖為魏公加九錫公下令前後三讓乃受命夫受九錫廣開土宇周公其人也漢之異姓八王者與高祖俱起布衣創定王業其功至大吾何可比之遣使令夫遣人使於四方古人所慎擇也故仲尼曰使乎使乎言其難也褒賞令别部司馬請立齊桓公神堂使記室阮瑀議之軍䇿令夏侯淵今月賊燒却鹿角鹿角去本營十五里淵將四百兵行鹿角因使士補之賊山上望見從谷中卒出淵使兵與鬬賊遂繞出其後兵退而淵未至甚可傷淵本非能用兵也軍中呼為白地將軍為督帥尚不當親戰况補鹿角乎又孤先在襄邑有起兵意與工師共作卑手刀時北海孫賓碩來候孤譏孤曰當慕其大者乃與工師共作刀耶孤答曰能小復能大何害又袁本初鎧萬領吾大鎧二十領本初馬鎧三百具吾不能有十具見其少遂不施也吾遂出竒破之是時士卒練不與今時等也鼓吹令書鈔令云孫子用兵常以少敵衆孤所以能常以少兵敵衆者常念增戰士忽餘事是以往者有鼓吹而使步行為戰士愛馬也不多樂署吏為戰士愛糧也論將令趙奢竇嬰之為將也受賜千金一朝散之故能濟大功永代流聲吾讀其文未嘗不慕其為人也設官令魏諸官印各以官為名印如漢法斷二千石者章賜夏侯惇伎樂名倡令惇從征孫權還使都督二十六軍留居巢魏絳以和戎之功猶受金石之樂况將軍乎褒夏侯淵令枹罕宋建自號河首平漢王淵討建斬之隴右平太祖下令宋建造為亂逆三十餘年淵一舉滅之虎步關右所向無前仲尼有言吾與爾不如也論功行封二荀令忠正密謀撫寧內外文若是也公達其次也稱荀攸令魏氏春秋孤與荀公達周遊二十餘年無毫毛可非者又令荀公達真賢人也所謂溫良恭儉讓以得之孔子稱晏平仲善與人交久而敬之公達即其人也誅崔琰令詳在崔琰與楊訓書琰雖見刑而通賓客門若市人對賓客虬鬚直視若有所瞋省西曹令毛玠為東曹掾請託不行時人憚之後議所并省咸欲省東曹太祖知其情令曰日出於東月盛於東凡人言方亦復先東何以省東曹徐奕為中尉手令魏國建奕遷尚書令太祖征漢中魏諷反中尉楊俊左遷乃以奕為中尉手令昔楚有子玉文公為之側席而坐汲黯在朝淮南為之折謀詩稱邦之司直君之謂與諸子選官屬令遂以邢顒為平原侯家丞侯家吏宜得淵深法度如邢顒輩蔣濟為揚州别駕令溫恢為揚州刺史濟為别駕令曰季子為臣吳宜有君今君還州吾無憂矣蔣濟為丞相西曹屬令舜舉臯陶不仁者逺臧否得中望於賢屬矣棗祗子處中封爵令魏武故事故陳留太守棗祗天性忠能始共舉義兵周旋征討後袁紹在冀州亦貪祗欲得之祗深附託於孤使領東阿令吕布之亂兖州皆叛惟范東阿完在由祗以兵據城之力也後大軍糧乏得東阿以繼祗之功也及破黃巾定許得賊資業當興立屯田時議者皆言當計牛輸穀佃科以定施行後祗白以為僦牛輸穀大收不增穀有水旱災除大不便反覆來說孤猶以為當如故大收不可復易祗猶執之孤不知所從使與荀令君議之時故軍祭酒侯聲云科取官牛為官田計如祗議於官便於客不便聲懷此云云以疑令君祗猶自信據計畫還白執分田之術孤乃然之使為屯田都尉施設田業其時嵗則大收後遂因此大田豐足軍用摧滅羣逆克定天下以隆王室祗與其功不幸早沒追贈以郡猶未副之今重思之祗宜受封稽留至今孤之過也祗子處中宜加封爵以祀祗為不朽之事褒杜畿令河東太守杜畿孔子所謂禹吾無間然矣原劉廙令魏諷反廙弟偉為諷所引當相坐誅令特原不問叔向不坐弟虎古之制也議復肉刑令陳羣安得通理君子達於古今者使平斯事乎昔陳鴻臚以為死刑有可加於仁恩者正謂此也御史中丞能申其父之論乎禁用誹謗令魏氏春秋云陳矯本劉氏子出嗣舅氏而㛰于本族徐宣每非之太祖惜矯才下令喪亂已來風教凋薄謗議之言難用褒貶自建安五年己前一切勿論其以斷前誹議者以其罪罪之報和洽論毛玠令玠為尚書僕射以崔琰誅死內頗不悅後坐議黥面刑太祖怒收付獄和洽救玠遂免廢于家今言事者白玠不但謗吾也乃復為崔琰觖望此損君臣恩義妄為死友怨歎殆不可忍也昔蕭曹與高祖並起微賤致功立勳高祖每在屈笮二相恭順臣道益彰所以祚及後世也和侍中比求實之所以不聽欲重參之耳杜襲為留府長史令主者所選多不當太祖令釋騏驥而不乘焉皇皇而更索內誡令孤有逆氣病常儲水臥頭以銅器盛臭惡前以銀作小方器人不解謂孤善銀物令以木作又吏民多製文繡之服履絲不得過隆紫金黃絲織履前於江陵得雜綵絲履以與家約當著盡此履不得效作也又令云吾被皆十嵗也嵗嵗解浣補納之又令孤本欲自立精舍今遂為討賊又令房户不潔聽燒楓膏及蕙草臨淄侯曹植犯禁令由是垂諸侯科禁而植寵日衰始者謂子建兒中最可定大事自植私出開司馬門至金門令吾異目視此兒矣遺命諸子吾死之後葬於鄴之西岡上與西門豹祠相近無藏金玉珠寶餘香可分諸夫人不命祭吾妾與伎人皆著銅雀臺臺上施六尺牀下繐帳朝晡上酒脯粻糒之屬每月朝十五輒向帳前作伎汝等時登臺望吾西陵墓田與衛臻令臻為黃門侍郎東郡朱越謀反引臻大祖令孤與卿君同共舉事加欽令問始聞越言固自不信及得荀令君書具亮忠誠請鍾繇參軍令今詔書省司𨽻官鍾校尉材智決洞通敏先覺可上請參軍事以輔暗政教議田疇讓封教昔夷齊棄爵而譏武王可謂愚暗孔子猶以為求仁得仁疇之所守雖不合道但欲清高耳使天下悉如疇志即墨翟兼愛尚同之事而老𣆀使民結繩之道也外議雖善為復使令司𨽻以决之授崔琰東曹掾教君有伯夷之風史魚之直貪夫慕名而清壯士尚稱而厲斯可以率時者已故授東曹往踐厥職征吳教魏略賈逵為丞相主簿太祖欲征吳大霖雨軍不願行恐有諫者下教逵與同僚共作諫草入白太祖怒收送獄既而復教原之今孤戒嚴未知所之有諫者死復教逵無惡意原復其職與張遼等教操征張魯漢中使張遼李典守合肥教與遼及吳主孫權率衆圍合肥乃共發教大勝之若權至者張李將軍出戰樂將軍守護軍勿得與戰賜袁渙家榖教渙為魏國郎中令卒太祖一教以太倉榖千斛賜郎中令之家一教以垣下榖千斛與曜卿家外不解其意教曰以太倉榖者官法也以垣下榖者親舊也表上言破袁表大將軍鄴侯袁紹前與冀州牧韓馥立故大司馬劉虞刻作金璽遣故任長畢瑜詣虞為說命録之數又紹與臣書云可都甄城當有所立擅鑄金銀印孝亷計吏皆往詣紹從弟濟隂太守叙與紹書云今海內喪敗天意實在我家神應有徴當在尊兄南兄臣下欲使即位南兄言以年則北兄長以位則北兄重便欲送璽㑹曹操斷道紹宗族纍世受國重恩而凶逆無道乃至於此輒勒兵馬與戰官渡乘聖朝之威得斬紹大將淳于瓊等八人首遂大破潰紹與子談輕身迸走凡斬首七萬餘級輜重財物巨億讓費亭侯表臣伏讀前後策命既録臣庸才微功乃復追述先臣幽讃顯揚見得思義屏營怖懼未知首領所當所授故古人忠臣或有連城而不辭或有一邑而違命所以然者欲必正其名也又禮制諸侯國土以絶子孫有功者當更受封不得增襲其有所增者謂國未絶也或有所襲者謂先祖功大也數末極無故斷絶故追紹之也臣自三省先臣雖有扶輦微勞不應受爵豈逮臣三葉若録臣關東微功皆祖宗之靈祐陛下之聖德豈臣愚陋何能克堪又讓封表一作上讓封書臣誅除暴逆克定二州四方來貢以為臣之功蕭相國以關中之勞一門受封鄧禹以河北之勤連城食邑考功效實非臣之勳臣祖父中常侍侯時但從輦扶翼左右既非首謀又不奮㦸並受爵封暨臣三葉臣聞易豫卦曰利建侯行師有功乃當進立以為諸侯也又訟卦六三曰食舊德或從王事謂先祖有大德若從王事有功者子孫乃得食其祿也伏惟陛下垂乾坤之仁降雲雨之潤逺録先臣扶腋之節採臣在戎犬馬之用優䇿褒崇光曜顯量非臣尫頑所能克堪讓贈封武平侯表伏自三省姿質頑素材志鄙下進無匡輔之功退無拾遺之美雖有犬馬微勞非獨志力皆繇部曲將校之助陛下前追念先臣微功使臣續襲爵土祖考蒙光照之榮臣受不資之分未有絲髮以自報效昔齊侯欲更晏嬰之宅嬰曰臣之先容焉臣不足以繼之卒違公命以成私志臣自顧省不克負荷食舊為幸雖上德在𢎞下有因割臣三葉纍寵皆統極位義在殞越豈敢飾辭讓增封表無非常之功而受非常之福是用憂結比章歸聞天慈無己未即聽許臣雖不敏猶知讓不過三所以仍布腹心至於四五上欲陛下爵不失實下為臣身免於茍取讓還司空印綬表臣文非師尹之佐武非折衝之任遭天之幸奈竊重授內踵伯禽司空之職外承吕尚鷹揚之事斗筲處之民其瞻觀水土不安姦宄未靜臣常愧辱憂為國纍臣無智勇以助萬一夙夜慙懼若集水火未知何地可以隕越讓九錫表臣功小德薄忝寵已過進爵益土非臣所宜九錫大禮臣所不稱惶悸怔營心如炎灼歸情寫實冀䝉聽省不悟陛下復詔褒誘喻以伊周未見哀許臣聞事君之道犯而勿欺量能處位計功受爵茍所不堪有殞無從加臣待罪上相民所具瞻而自過謬其謂臣何謝襲費亭侯表不悟陛下乃尋臣祖父厠豫功臣克定寇逆援立孝順皇帝謂操不忘獲封茅土聖恩明發逺念桑梓日以臣為忠孝之苖不復量臣才之豐否既勉襲爵邑忝厥祖考復寵上將鈇鉞之任兼領大州萬里之憲內比鼎臣外參二伯身荷兼紱之榮本枝賴無窮之祚也昔大彭輔殷昆吾翼夏功成事就乃備爵錫臣束修無稱統御無績比荷殊寵䇿命褒績未盈一時三命交至雙金重紫顯以方任雖不識義庶知所尤領兖州牧表入司兵校出總符任臣以纍葉受恩膺荷洪施不敢顧命是以將戈帥甲順天行誅雖戮夷覆亡不暇臣愧以興隆之秩功無所執以僞假實條不勝華竊感譏誚益以維谷陳損益表陛下即祚復蒙試用遂受上將之任統領二州內參機事實所不堪昔韓非閔韓之削弱不務富國強兵用賢任能臣以區區之質而當鍾鼎之任以暗鈍之才而奉明明之政顧恩念責亦臣竭節授命之秋也謹條遵奉舊訓權時之宜十四事奏如左庶以蒸螢增明太陽言不足採表九錫謝表一作謝策命魏公書臣䝉先帝厚恩致位郎署受性疲怠意望畢足非敢希望高位庶幾顯達㑹董卓作亂義當死難故敢奮身出命摧鋒率衆遂值千載之運奉役目下當二袁炎沸侵侮之際陛下與臣寒心同憂顧瞻京師進受猛敵常恐君臣俱陷虎口誠不自意能全首領賴祖宗靈祐醜類夷滅得使微臣竊名其間陛下加恩授以上相封爵寵祿豐大𢎞厚生平之願實不望也口與心計幸且待罪保持列侯遺付子孫自託聖世永無憂責不意陛下乃發盛意開國備錫以貺愚臣地比齊魯禮同藩王非臣無功所宜膺據歸情上聞不蒙聽許嚴詔切至誠使臣心俯仰逼迫伏自惟省列在大臣命制王室身非已有豈敢自私遂其愚意亦將黜退令就初服今奉疆土備數藩翰非敢逺期慮有後世至於父子相誓終身灰軀盡命報塞厚恩天威在顔悚懼受詔請封荀彧為萬嵗亭侯表臣聞慮為功首謀為賞本野績不越廟堂戰多不踰國勳是故曲阜之錫不後營丘蕭何之土先於平陽珍䇿重計古今所尚侍中守尚書令彧積德纍行少長無悔遭世紛擾懷忠念治臣自始舉義兵周游征伐與彧戮力同心左右王略發言授䇿無施不效彧之功業臣繇以濟用披浮雲顯光日月陛下幸許彧左右機近忠恪祗順如履薄氷研精極鋭以撫庶事天下之定彧之功也宜享高爵以彰元勳請贈封荀彧表昔袁紹侵入郊甸戰於官渡時兵少糧盡圖欲還許書與彧議彧不聽臣建宜住之便進討之規更起臣心易其愚慮遂摧大逆覆取其衆此彧覩勝敗之機略不世出也及紹破敗臣糧亦盡以為河北欲南討劉表彧復止臣陳其得失臣用反斾遂吞凶族克平四州向使臣退於官渡紹必鼓行而前有傾覆之形無克捷之勢後若南征委棄兖豫利既難要將夫本據彧之二䇿以亡為存以禍致福謀殊功異臣所不及也是以先帝貴指蹤之功薄搏獲之賞古人尚帷幄之規下攻拔之捷前所賞録未副彧巍巍之勳乞重平議疇其户邑請封田疇表文雅優備忠武又著和於撫下慎於事上量時度理進退合義幽州始擾胡漢交萃蕩柝離居靡所依懷疇率宗人避難於無終山北拒盧龍南守要害清靜隱約耕而後食人民化從咸共資奉及袁紹父子威力加於朔野逺結烏丸與為首尾前後召疇終不陷撓後臣奉命軍次易縣疇長驅自到陳討胡之勢猶廣武之建燕䇿薛公之度淮南又使部曲持臣露布出誘胡衆漢民或因亡來烏丸聞之震蕩王旅出塞塗由山中九百餘里疇帥兵五百啓導山谷遂滅烏丸蕩平塞表疇文武有效節義可嘉誠應寵賞以旌其美請恤郭嘉表臣聞褒忠示寵未必當身念功惟績恩隆後嗣是以楚宗孫叔敖顯封厥子岑彭既沒爵及支庶誠賢君殷勤於清良聖祖惇篤於明勳也故軍祭酒洧陽亭侯潁川郭嘉立身著行稱茂鄉邦與臣參事盡節為國忠良淵淑體通性達每有大議發言盈庭執中處理動無遺䇿自在軍旅十有餘年行同騎乘坐共幄席東擒吕布西取眭固斬袁談之首平朔土之衆踰越險塞蕩定烏丸震威遼東以梟袁尚雖假天威易為指麾至於臨敵發揚誓命凶逆克殄勳實繇嘉方將表顯使賞足以報效薄命夭殞不終美志上為陛下悼惜良臣下自毒恨喪失竒佐昔霍去病蚤死孝武為之咨嗟祭遵不究功業世祖望柩悲慟仁恩降下念發五內今嘉隕命誠足憐傷宜追贈嘉封并前千户褒亡為存厚往勸來也藝文無宜追贈等句獲宋金生表臣前遣討河內獲嘉之屯獲生口辭云河內有一神人宋金生令諸屯皆云鹿角不須守吾使狗為汝守不從其言者即夜聞有軍兵聲明日視屯下但見虎跡臣輒部武猛都尉吕納將兵掩捉得生輒行軍法請封荀攸表於是封陵樹亭侯軍師荀攸自初佐臣無征不從前後克敵皆攸之謀也請增封郭嘉表軍祭酒郭嘉自從征伐十有一年每有大議臨敵制變臣䇿未决嘉輒成之平定天下謀功為高不幸短命事業未終追思嘉勳實不可忘可增邑八百户并前千户麋竺領嬴郡太守表竺字子仲東海朐人與弟芳皆去官從先主入蜀為安漢將軍泰山郡界曠逺舊多輕悍權時之宜可分五縣為嬴郡揀選清亷以為守將偏將軍麋竺素履忠貞文武昭烈請以竺領嬴郡太守撫慰吏民上獻帝器物表臣祖騰有順帝賜器今上四石銅鋗四枚五石銅鋗一枚御物有純銀粉銚一枚又制度奏云三公列侯門施內外孰方三十畝奏事破袁尚上事臣前上言逆賊袁尚還即厲精鋭討之今尚人徒震蕩部曲喪守引兵遁亡陳軍被堅執鋭朱旗震耀虎士雷譟望旗眩精聞聲喪氣投戈解甲翕然沮壞尚單騎遁走捐弃僞節鋭鈇大將軍邧鄉侯印各一枚兜鍪萬九千六百二十枚其矛楯弓㦸不可勝數上九醖酒法奏臣縣故令南陽郭芝有九醖春酒法用麴三十斤流水五石臘月二日清麴正月凍解用好稻米漉去麴滓便釀法飲曰譬諸蟲雖久多完三日一釀滿九石米止臣得法釀之常善其上清滓亦可飲若以九醖苦難飲增為十釀差甘易飲不病今謹上獻上雜物疏御物三十種有純銀參帶臺硯一枚御物有漆畫韋枕二枚貴人公主有黑漆韋枕三十枚御物三十種有純金香爐一枚下盤自副貴人公主有純銀香爐四枚皇太子有純銀香爐四枚西園貴人銅香爐三十枚御雜物用有純金唾壺一枚貴人有純銀參帶唾壺三十枚御雜有漆園油唾壺四枚御雜物有純銀盤又有容五石銅澡盤御物有純銀鏤帶漆畫書案一枚御物三十種有上車漆畫重几大小各一枚御雜物用有純銀澡豆奩純銀括鏤奩御物有銀鏤漆匣四枚油漆畫嚴器一純金參帶畫方嚴器一策立卞王后策夫人卞氏撫養諸子有母儀之德今進位王后太子諸侯陪位羣卿上夀減國內死罪一等書與少府孔融書獻帝嘗見郗慮及孔融問慮何所優長融曰可與適道未可與權慮曰融昔宰北海政散人流其權安在遂與融互相長短操以書解之蓋聞唐虞之朝有克讓之臣故麟鳯來而頌聲作也後世德薄猶有殺身為君破家為國及至其敝睚眦之怨必讐一餐之惠必報故鼂錯念國遘禍於袁盎屈平悼楚受譖於椒蘭彭寵傾亂起自朱浮鄧禹威損失於宗馮繇此言之喜怒怨愛禍福所因可不慎與昔亷藺小國之臣猶能相下冦賈倉卒武夫屈節崇好光武不問伯升之怨齊侯不疑射鈎之虜夫立大操者豈纍細故哉往聞二君有執法之平以為小介當收舊好而怨毒漸積志相危害聞之憮然中夜而起昔國家東遷文舉盛歎鴻豫名實相副綜達經學出於鄭𤣥又明司馬法鴻豫亦稱文舉竒逸博聞誠怪今者與始相違孤與文舉既非舊好又於鴻豫亦無恩紀然願人之相美不樂人之相傷是以區區思協歡好又知二君羣小所構孤為人臣進不能風化海內退不能建德和人然撫養戰士殺身為國破浮華交㑹之徒計有餘矣選注云路粹代與太尉楊文先書彪子修總知內外事皆稱意臨菑侯植以才捷愛幸修為之羽翼幾為太子後植見疏太祖既慮終始之變以修頗有才䇿又袁氏之甥以罪誅之操與彪書操自與足下同海內大義足下不遺以賢子見輔比中國雖靖方外未夷今軍征事大百姓騷擾吾制鐘鼓之音主簿宜守而足下賢子恃豪父之勢每不與我同懷即欲直繩顧頗恨謂其能改遂轉寬舒復即宥貸將延足下尊門大纍便令刑之念卿父息之情同此悼楚亦未必非幸也謹贈足下錦裘二領八節角桃杖一枝官絹五百匹錢六十萬四望通幰七香車一乘青㹀牛二頭八百里驊騮馬一匹赤戎金裝鞍轡十副鈴苞一具驅使二人并遺足下貴室錯綵羅縠裘一領織成鞾一量有心青衣二人長奉左右所奉雖薄以表吾意足下便當慨然承納不致往返與王修書修為司金中郎將陳黃白異議因奏記太祖甚然之乃與修書君澡身浴德流聲本州忠能成績為世美談名實相副過人甚逺孤以心知君至深至熟非徒耳目而已也察觀先賢之論多以鹽鐵之利足贍軍國之用昔孤初立司金之官念非屈君餘無可者故與君教曰昔遏父陶正民賴其器用及子媯滿建侯于陳近桑𢎞羊位至三公此君元龜之兆先告者也是孤用君之本意也或恐衆人未曉此意自是以來在朝之士每得一顯選常舉君為首及聞袁軍師衆賢之議以為不宜越君然孤執心將有所底以軍師之職間於司金至於建功重於軍師孤之精誠足以達君之察孤足以不疑但恐傍人淺見以蠡測海為蛇畫足將言前後百選輒不用之而使此君沈滯冶官張甲李乙尚猶先之此主人意待之不優之效也孤懼有此空聲冒實淫蛙亂耳假有斯事亦庶鍾期不失聽也若其無也過備何害昔宣帝察少府蕭望之才任宰相故復出之令為馮翊從正卿往似於左遷上使侍中宣意曰君守平原日淺故復試君三輔非有所間也孤揆先主中宗之意誠備此事既君崇勳業以副孤意公叔文子與臣俱升獨何人哉與荀彧書太祖録彧前後功表封彧萬嵗亭侯彧固辭無野戰之勞太祖與彧書彧乃受與君共事已來立朝廷君之相為匡弼君之相為舉人君之相為建計君之相為密謀亦以多矣夫功未必皆野戰也願君勿讓報荀彧書初太祖與袁紹相拒兵少糧盡圖欲還許及紹破敗以河北未易圖欲南征劉表彧並諫止因表上二䇿復增彧邑千户彧深辭讓太祖以書報之君之䇿謀非但所表二事而己前後謙冲欲慕魯連先生乎此聖人達節者所不貴也昔介子推有言竊人之財猶謂之盜况君密謀安衆光顯於孤者以百數乎以二事相還而復辭之何取謙亮之多耶與荀彧悼郭嘉書郭奉孝年不滿四十相與周旋十一年阻險艱難皆共罹之又以其通達見世事無所疑滯欲以後事屬之何意卒爾失之悲痛傷心今表增其子滿千户然何益亡者追念之感深且奉孝乃知孤者也天下人相知者少又以此痛惜奈何奈何又與荀彧悼郭嘉書追惜奉孝不能去心其人見時事兵事過絶於人又以多病畏南方有疫常言吾往南方則不生還然與共論計云當先定荆此為不但見計之忠厚必欲立功分棄命定事人心乃爾何得使人忘之與鍾繇書得所送馬甚應其急關右平定朝廷無西顧之憂足下之勳也昔蕭何慎守關中足食成軍亦適當爾與荀攸書方今天下大亂智士勞心之時也而顧觀變蜀漢不己久乎與閻行書行始隨韓約使詣太祖太祖表拜犍為太守行請令其父入宿衛西還見約謂約宜遣一子㑹約遣張猛留行守營馬超反謀舉約為都督行不欲令與超合及超破走行還金城太祖聞行前意但誅約子孫在京師者手書與行觀文約所為使人笑來吾前後與之書無所不說如此何可復忍卿父諫議自平安也雖然牢獄之中非養親之處且又官家亦不能久為人養老也報蒯越書越臨終與太祖書托以門户太祖報之死者反生生者不愧孤少所舉行之多矣魂而有靈亦將聞孤此言也答朱靈書太祖平冀州遣靈守許南戒之曰冀州新兵意尚怏怏卿名先有威嚴須以道寬之不然即有變靈至陽翟程昂等果反即斬昂以狀聞太祖手書答之兵中所以為危險者外對敵國內有姦謀不測之變昔鄧禹中分光武軍西行而有宗歆馮愔之難後將二十四騎還洛陽禹豈以是減損哉來書懇惻多引咎過未必如所云也報楊阜書阜為涼州别駕馬超攻冀害刺史韋康阜有報超之志未得其便阜外兄姜叙屯厯城阜因過厯候叙母說康被害叙母慨然敕從阜討超超襲厯城得叙母母罵而死超南奔張魯隴右平太祖封阜關內侯君與羣賢共建大功西土之人以為美談子貢辭賞仲尼謂之止善君其剖心以順國命姜叙之母勸叙早發明智乃爾雖楊敞之妻蓋不過此賢哉賢哉良史紀録必不墜於地矣報劉廙書非但君當知臣臣亦當知君今欲使吾坐行西伯之德恐非其人也答袁紹書董卓之罪暴於四海吾等合大衆興義兵而逺近莫不響應此以義動故也今幼主微弱制於奸臣未有昌邑亡國之釁而一旦改易天下其孰安之諸君北面我自西向答吕布書山陽屯送將軍所失大封國家無好金孤自取家好金更相為作印國家無紫綬自取所帶紫綬以籍心將軍所使不良袁術稱天子將軍止之而使不通章朝廷信將軍使復重上以相明忠誠遺孫權書近者奉辭伐罪旌麾南指劉琮束手今治水軍八十萬衆方與將軍㑹獵於吳又遺孫權書赤壁之役值有疾病孤燒船自退橫使周瑜虛獲此名與王芬書冀州刺史王芬連結豪傑謀廢靈帝立合肥侯以告太祖太祖拒之夫廢立之事天下之至不祥也古人有權成敗計輕重而行之者伊尹霍光是也伊尹懷至忠之誠據宰臣之勢處官司之上故進退廢置計從事立及至霍光受託國之任藉宗臣之位內因太后秉政之重外有羣卿同欲之勢昌邑即位日淺未有貴寵朝乏讜臣議出密近故計行如轉圜事成如摧朽今諸君徒見曩者之易未覩當今之難諸君自度結衆連黨何若七國合肥之貴孰若吳楚而造作非常欲望必克不亦危乎為兖州牧上書山陽郡有美梨謹獻甘梨三箱尺牘報荀彧太祖拔鄴自領冀州牧有說其宜復置九州者以為冀部所統既廣天下易服太祖將從之彧言曰今若依古制是為冀州所統悉有河東馮翊扶風西河幽并之地也公前屠鄴城海內震駭今若一處被侵必謂以次見奪人心易動若一旦生變天下未可圖也願公先定河北然後修復舊京南臨楚郢責王貢之不入天下咸知公意則人人自安須海內大定乃議古制此社稷長久之利也因報彧微足下之相難所失多矣又潁川戲志才籌畫士也太祖甚器之早卒太祖與彧書彧薦郭嘉自志才亡後莫可與計事者汝潁固多竒士誰可以繼之又太祖圍張繡於穰劉表遣兵救繡以絶軍後太祖將引還繡兵來太祖軍不得進連營稍前與彧書賊來追吾雖日行數里吾䇿之到安衆破繡必矣又湍水東南流涅水注之涅水又東南徑安衆縣堨而為陂謂之安衆港太祖破張繡於是處與彧書蓋於二水之間以為㳂涉之艱阻也繡遏吾歸師迫我死地又蒯越字異度深中足智仕劉表為章陵太守荆州平太祖與彧書以為光祿勳不喜得荆州喜得蒯異度耳與諸葛亮書今奉雞舌香五斤以表微意序孫子兵法序操聞上古有弧矢之利論語曰足食足兵尚書八政曰師易曰師貞丈人吉詩云王赫斯怒爰整其旅黃帝湯武咸用干戈以濟世也司馬法曰人故殺人殺之可也用武者滅用文者亡夫差偃王是也聖賢之用兵也戢而時動不得已而用之吾觀兵書戰䇿多矣孫武所著深矣審計重舉明畫深圖不可相誣而但世人未之深亮訓說况文煩富行於世者失其㫖要故撰為略解焉祭文祀橋太尉文故太尉橋公誕敷明德泛愛博容國念明訓士思令謨靈幽體翳邈哉晞矣吾以幼年逮升堂室特以頑鄙之姿為大君子所納增榮益觀皆由奬助猶仲尼稱不如顔淵李生之厚歎賈復士死知己懷此無忘又承從容約誓之言殂逝之後路有經由不以斗酒雙雞過相沃酹車過三步腹痛勿怪雖臨時戲笑之言非至親之篤好胡肯為此辭乎匪謂靈忿能貽己疾懷舊惟顧念之悽愴奉命東征屯次鄉里北望歸土乃心陵墓裁致薄奠公其尚饗樂府詩品云曹公古直甚有悲凉之句睿不如丕亦稱三祖庚溪詩話云魏武魏文父子橫槊賦詩雖遒壯抑揚而乏帝王之度升菴詩話云曹孟德樂府如苦寒行猛虎行短歌行膾炙人口久矣其希僻罕傳者若不戚年往憂世不治存亡有命慮之為蚩又云壯盛智慧殊不再來愛時進趣將以惠誰不惟句法高邁識趣近於有道氣出唱三首駕六龍乘風而行行四海外路下之八邦厯登高山臨溪谷乘雲而行行四海外東到泰山仙人玉女下來遨遊驂駕六龍飲玉漿河水盡不東流解愁腹飲玉漿奉持行東到蓬萊山上至天之門玉關下引見得入赤松相對四而顧望視正惶惶開王心正興其氣百道至傳告無窮閉其口但當愛氣夀萬年東到海與天連神仙之道出窈入冥常當専之心恬淡無所愒欲閉門坐自守天與期氣願得神之人乘駕雲車驂駕白鹿上到天之門來賜神之藥跪受之敬神齊當如此道自來惶惶一作焜惶其二華隂山自以為大高百丈浮雲為之蓋仙人欲來出隨風列之雨吹我洞簫鼓瑟琴何誾誾酒與歌戲今日相樂誠為樂玉女起起舞移數時鼓吹一何嘈嘈從西北來時仙道多駕烟乘雲駕龍鬱何蓩蓩遨遊八極乃到崑崙之山西王母側神仙金止玉亭來者為誰赤松王喬乃德旋之門樂共飲食到黃昏多駕合坐萬嵗長宜子孫其三遊君山甚為真崔䃬砟硌爾自為神乃到王母臺金階玉為堂芝草生殿傍東西廂客滿堂主人當行觴坐者長夀遽何央長樂甫始宜孫子常願主人增年與相守精列厥初生造化之陶物莫不有終期莫不有終期聖賢不能免何為懷此憂願螭龍之駕思想崑崙居見欺於迂怪志意在蓬萊志意在蓬萊周孔聖徂落㑹稽以墳丘㑹稽以墳丘陶陶誰能度君子以弗憂年之暮奈何時過時來微度關山天地間人為貴立君牧民為之軌則車轍馬跡經緯四極黜陟幽明黎庶繁息於鑠賢聖總統邦域封建五爵井田刑獄有燔丹書無普赦贖臯陶甫侯何有失職嗟哉後世改制易律勞民為君役賦其力舜漆食器畔者十國不及唐堯采椽不斫世歎伯夷欲以厲俗侈惡之大儉為共德許由推讓豈有訟曲兼愛尚同疏者為戚薤露惟漢二十世所任誠不良沐猴而冠帶知小而謀疆猶豫不敢斷因狩執君王白虹為貫日已亦先受殃賊臣執國柄殺主滅宇京蕩覆帝基業宗廟以燔喪播越西遷移號泣而且行瞻彼洛城郭微子為哀傷蒿里行關東有義士興兵討羣凶初期㑹盟津乃心在咸陽軍合力不齊躊躇而鴈行勢利使人爭嗣還自相戕淮南弟稱號刻璽於北方鎧甲生蟣虱萬姓以死亡白骨露於野千里無雞鳴生民百遺一念之斷人腸對酒對酒歌太平時吏不呼門王者賢且明宰相股肱皆忠良咸禮讓民無所爭訟三年耕有九年儲倉榖滿盈班白不負戴雨澤如此百榖用成却走馬以糞其土田爵公侯伯子男咸愛其民以黜陟幽明子養有若父與兄犯禮法輕重隨其刑路無拾遺之私囹圄空虛冬節不斷人耄耋皆得以夀終恩澤廣及草木昆蟲陌上桑駕虹霓乘赤雲登彼九嶷厯玉門濟天漢至崑崙見西王母謁東君交赤松及羡門受要祕道愛精神食芝英飲醴泉挂杖桂枝佩秋蘭絶人事遊渾元若疾風遊歘飄翩景未移行數千夀如南山不忘愆翩一作飄短歌行對酒當歌人生幾何譬如朝露去日苦多慨當以慷憂思難忘何以解憂唯有杜康青青子襟悠悠我心但為君故沉吟至今􅊯呦鹿鳴食野之蘋我有嘉賓鼓瑟吹笙明明如月何時可掇憂從中來不可斷絶越陌度阡枉用相存契闊談宴心念舊恩月明星稀烏鵲南飛繞樹三匝何枝可依山不厭高水不厭深周公吐哺天下歸心同前周西伯昌懷此聖德三分天下而有其二修奉貢獻臣節不墜崇侯讒之是以拘繫一解後見赦原賜之斧鉞得使征伐為仲尼所稱建及德行猶奉事殷論叔其美二解齊桓之功為霸之首九合諸侯一匡天下不以兵車正而不譎其德傳稱三解孔子所歎並稱夷吾民受其恩賜與廟胙命無下拜小白不敢爾天威在顔咫尺四解晉文亦霸躬奉天王受賜圭瓚秬鬯彤弓盧弓矢千虎賁三百人五解威服諸侯師之者尊八方聞之名亞齊桓河陽之㑹詐稱周王是以其名紛葩六解苦寒行北上太行山艱哉何巍巍羊腸坂詰屈車輪為之摧樹木何蕭瑟北風聲正悲熊羆對我蹲虎豹夾路啼溪谷少人民雪落何霏霏延頸長歎息逺行多所懷我心何怫鬱思欲一東歸水深橋梁絶中路正徘徊迷惑失故路薄舂無宿棲行行日已逺人馬同時飢擔囊行取薪斧冰持作麋悲彼東山詩悠悠使我哀北上太行山艱哉何巍巍太行山艱哉何巍巍羊腸坂詰屈車輪為之摧一解樹木何蕭瑟北風聲正悲何蕭瑟北風聲正悲熊羆對我蹲虎豹夾道啼二解溪谷少人民雪落何霏霏延頸長歎息逺行多所懷三解我心何怫鬱思欲一東歸何怫鬱思欲一東歸水深橋梁絶中路正徘徊四解迷惑失徑路瞑無所宿棲失徑路瞑無所宿棲行行日以逺人馬同時飢五解擔囊行取薪斧冰持作麋擔囊行取薪斧冰持作麋悲彼東山詩悠悠使我哀六解秋胡行二首晨上散關山此道當何難晨上散關山此道當何難牛頓不起車墮谷間坐盤石之上彈五弦之琴作為清角韻意中迷煩歌以言志晨上散關山一解有何三老公卒來在我傍有何三老公卒來在我傍負掩被表似非恆人謂卿云何困苦以自怨徨徨所欲來到此間歌以言志有何三老公二解我居崑崙山所謂者真人我居崑崙山所謂者真人道深有十得名山厯觀遨遊八極枕石漱流飲泉沉吟不决遂上升天歌以言志我居崑崙山三解去去不可追長恨相牽攀去去不可追長恨相牽攀夜夜安得寐惆悵以自憐正而不譎乃賦依因經傳所過西來所傳歌以言志去去不可追四解辭乃一作其二願登泰華山神人共逺遊願登泰華山神人共逺遊經厯崑崙山到蓬萊飄颻八極與神人俱思得神藥萬嵗為期歌以言志願登泰華山一解天地何長久人道居之短天地何長久人道居之短世言伯陽殊不知老赤松王喬亦云得道得之未聞庶以夀考歌以言志天地何長久二解明明日月光何所不光昭明明日月光何所不光昭二儀合聖化貴者獨人不萬國率土莫非王臣仁義為名禮樂為榮歌以言志明明日月光三解四時更逝去晝夜以成嵗四時更逝去晝夜以成嵗大人先天而天弗違不戚年往憂世不治存亡有命慮之為蚩歌以言志四時更逝去四解戚戚欲何念歡笑意所之戚戚欲何念歡笑意所之壯盛智慧殊不再來愛時進趣將以惠誰泛泛放逸亦同何為歌以言志戚戚欲何念五解善哉行古公亶父積德垂仁思𢎞一道哲王於豳一解太伯仲雍王德之仁行施百世斷髮文身二解伯夷叔齊古之遺賢讓國不用餓殂首山三解智哉山甫相彼宣王何用杜伯纍我聖賢四解齊桓之霸賴得仲父後任竪刁蟲流出户五解晏子平仲積德兼仁與世沈德未必思命六解仲尼之世王國為君隨制飲酒揚波使官七解其二自惜身薄祜夙賤罹孤苦既無三徒教不聞過庭語一解其窮如抽裂自以思所怙雖懷一介志是時其能與二解守窮者貧賤惋歎淚如雨泣涕於悲夫乞活要能覩三解我願於天窮琅邪傾側左雖欲竭忠誠欣公歸其楚四解快人由為歎抱情不得叙顯行天教人誰知莫不緒五解我願何時隨此歎亦難處今我將何照於光曜釋銜不如雨六解郤東西門行鴻鴈出塞北乃在無人鄉舉翅萬里餘行止自成行冬節食南稻春日復北翔田中有轉蓬隨風逺飄揚長與故根絶萬嵗不相當奈何此征夫安得去四方戎馬不解鞍鎧甲不離傍冉冉老將至何時反故鄉神龍藏深泉猛獸步高岡狐死歸首丘故鄉安可忘碣石篇雲行雨步超越九江之臯臨觀異同心意懷遊豫不知當復何從經過至我碣石心惆悵我東海雲行至此為豔東臨碣石以觀滄海水何淡淡山島竦峙樹木叢生百草豐茂秋風蕭瑟洪波湧起日月之行若出其中星漢燦爛若出其裏幸甚至哉歌以詠志一解觀波一作濤右滄海其二孟冬十月北風徘徊天氣肅清繁霜霏霏鵾雞晨鳴鴻鴈南飛鷙鳥濳藏熊羆窟棲錢鏄停置農收積場逆旅整設以通商賈幸甚至哉歌以詠志二解月右冬十其三鄉土不同河朔隆寒流澌浮漂舟船行難錐不入地蘴籟深奧水竭不流氷堅可蹈士隱者貧勇俠輕非心常歎怨戚戚多悲幸甚至哉歌以詠志三解同右土不其四神龜雖夀猶有竟時騰蛇乘霧終為土灰老驥伏櫪志在千里烈士暮年壯心不已盈縮之期不但在天養恬之福可得永年幸甚至哉歌以詠志怡一作姑右龜雖夀謡俗詞甕中無斗儲發篋無尺繒友來從我貸不知所以應董卓歌詞德行不虧缺變故自難常鄭康成行酒伏地氣絶郭景圖命盡於園桑漢魏六朝百三家集卷二十三
