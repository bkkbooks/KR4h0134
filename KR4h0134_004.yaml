body:
  text: 漢魏六朝百三家集卷四漢東方朔集題詞東方曼倩求大官不得始設客難揚子雲草太玄乃作解嘲學者爭慕效之假主客遣抑鬱者篇章疊見無當玉巵世亦頗厭觀之其體不尊同于遊戲然二文初立詞鋒競起以蘇張為輸攻以荀鄒為墨守作者之心實命奇偉隨者自貧彼不任咎未可薄連珠而笑士衡鄙七體而譏枚叔也曼倩別傳多神怪不足盡信即史書所記拔劒割肉醉遺殿上射覆隱語榜楚舍人侏儒徘優其迹相近及諫起上林面責董偃正言嶽嶽汲長孺猶病不如何況公孫丞相以下誡子一詩義包道德兩篇其藏身之智具焉而世皆不知漢武歎其嵗星劉向次於列仙事或有之非此浮沉莫行直諌事雄主其誠難哉目録騷七諫初放沈江怨世怨思自悲哀命謬諫疏諌起上林苑疏應詔上書書與公孫𢎞書從公孫𢎞借車馬書與友人書序十洲記序論非有先生論設難答客難答驃騎難頌旱頌銘寶甕銘詩據地歌誡子詩嗟伯夷漢魏六朝百三家集卷四目録欽定四庫全書漢魏六朝百三家集卷四明張溥輯漢東方朔集騷七諫王逸注平生於國兮平屈原名也長於原壄高平曰原坰外曰野言屈原少生於楚國與君同朝長大見逺棄於山野傷有始而無終也言語訥譅兮譅音澀出口為言相答曰語訥者鈍也譅者難也又無強輔言己質性忠信不能巧利辭令言語訥鈍復無強犮黨輔以保逹已志也強一作強淺智𥚹能兮聞見又寡𥚹狹也寡少也屈原多才有智博聞逺見而言淺狹者是其謙也數言便事兮見怨門下門下喻親近之人也言己數進忠言陳便宜之事以助治而見怨恨於左右欲害巳也一作數陳便事王不察其長利兮卒見棄乎原壄言懷王不察己忠謀可以安國利民反信讒言終棄我於原壄而不還也伏念思過兮無可改者言己伏自思念行無過失可改易也羣衆成朋兮上浸以惑上謂君也浸稍也言佞人相與羣聚朋黨成衆君稍以惑亂而不自知也巧佞在前兮賢者滅息滅消也言佞臣巧好其言順意承旨旦夕在於君前而使忠賢之士心懷恐懼吞聲小語消滅謇謇之氣以避禍患也堯舜聖已沒兮孰為忠直言堯舜聖明今已沒矣誰為盡忠直也高山崔巍兮崔巍高貌水流湯湯湯時章切湯湯流貌言己仰視高山其形崔巍而不知頽弛俯視水流湯湯流行而不知竭自傷不如山水之性身將顚沛也死日將至兮與麋鹿同坑坑音岡陂池曰坑言己年嵗衰老死日將至不得處國朝輔政治而與麋鹿同坑烏獸同伍將墜陷坑穽不復久矣塊鞠兮塊獨處貌匍匐為鞠當道宿夜止曰宿言己孤獨無耦塊然獨處鞠然匍匐當道而躓臥無所棲宿也舉世皆然兮余將誰告告古六切舉與也言舉當世之人皆行佞偽當何所告我忠信之情斥逐鴻鵠兮鴻鵠大鳥近習鴟梟鴟梟惡鳥斬伐橘柚兮柚音又橘柚美木列樹苦桃苦桃惡木言君親近貪賊姦惡之臣而逺仁賢之臣也便娟之修竹兮寄生乎江潭便平聲便娟好貌屈原以竹自喻言有便娟長好之竹生於江水之潭被蒙潤澤而茂盛自恨放流而獨不蒙君之惠也上葳蕤而防露兮葳蕤盛貌防蔽也下泠泠而來風泠泠清涼貌言竹被潤澤上則葳蕤而防蔽霧露言上能有所覆也下則泠泠清涼可休庇也以言己德上能覆蓋於君下能庇廕於民孰知其不合兮若竹柏之異心竹心空屈原自喻志通達也柏心實以喻君暗閉塞也言己性逹道德而君閉塞其志不合若竹柏之異心也往者不可及兮謂聖明之王堯舜禹湯文武也來者不可待欲須賢君年齒已老命不可待也悠悠蒼天兮莫我振理悠悠憂貌振救也言己憂愁思想則呼蒼天言已懷忠正而君不知羣下無有救理我之侵寃者竊怨君之不寤兮吾獨死而後已言己私怨懷王用心暗惑終不覺寤令我獨抱忠信死於山野之中而已初放惟往古之得失兮言己思念古者人君得道則安失道則危禹湯以王桀紂以亡覽私微之所傷傷害也言己又觀人君私愛佞讒受其微言傷害賢臣者國以危殆也楚之無極吳之宰嚭是也堯舜聖而慈仁兮後世稱而弗忘言堯舜所以有聖明之德者以任賢能慈愛百姓故民至今稱之也齊桓失於專任兮夷吾忠而名彰夷吾管仲名也管仲將死戒桓公曰豎刁自割易牙烹子此二臣者不愛其身不慈其子不可任也桓公不從使専國政桓公卒二子各欲立其所傅公子諸公子並爭國亂無主而桓公尸不棺積六十日蟲流出戶故曰失於專任夷吾忠而名著也晉獻惑於驪姬兮申生孝而被殃巳解於九章篇中偃王行其仁義兮荆文寤而徐亡荆楚也徐偃王國名也周宣王之舅申伯所封也詩曰申伯畨畨既入于徐周衰其後僭號稱王也偃諡也言徐偃王修行仁義諸侯朝之三十餘國而無武備楚文王見諸侯朝徐者衆心中覺悟恐為所並因興兵擊之而滅徐也故司馬法曰國雖強大忘戰必危蓋謂此也紂暴虐以失位兮周得佐乎吕望卒怒曰暴賊善曰虐言殷紂暴虐以失其位周得吕望而有天下也修往古以行恩兮封比干之丘壠小曰丘大曰壠言武王修先古之法敬愛賢能克紂封比干之墓以彰其德宣示四方也賢俊慕而自附兮日浸淫而合同才敵千人為俊淫多貌也言天下賢英俊慕周之德也日來親附浸淫盛多四海並合皆同志也明法令而修理兮蘭芷幽而有芳言周家選賢任士官得其人法令修理故幽隱之士皆有嘉名也苦衆人之妬豫兮言己患苦楚國衆人妬我忠直欲害己也箕子寤而佯狂箕子紂之庶兄見比干諫而被誅則被髮佯狂以脫其難也不顧地以貪名兮心怫鬱而內傷言巳欲效箕子佯狂而去不顧楚國之地貪忠直之名念君暗昧心為傷痛怫鬱而傷病也聯蕙芷以為佩兮過鮑肆而失香言仁人聨結蕙芷芬芳之草服之終身過鮑魚之肆則失其性而不芬香也以言己積絫忠信為讒人所毁失其忠名也正臣端其操行兮反離謗而見攘謗訕也攘排也言正直之臣端其心志欲以輔君反為讒人所謗訕身見排逐而逺放也世俗更而變化兮而一作以伯夷餓於首陽言當世俗人皆改其清潔化為貪邪當若伯夷餓於首陽而身垂功名也獨亷潔而不容兮叔齊久而逾明叔齊伯夷弟也言己獨行亷潔不容於世雖飢餓而死幸若叔齊久而有榮名也浮雲陳而蔽晦兮使日月乎無光言讒佞陳列在側則使君不聰明也忠臣貞而欲諫兮讒諛毁而在旁言忠臣正其心欲諫其君讒毁在旁而不敢言也秋草榮其將實兮其一作而微霜下而夜降微霜殺物以喻讒諛言秋時百草將實微霜夜下而殺之使不得成熟也以言讒人晨夜毁己亦將害已身使其忠名不得成也商風肅而害生兮商風西風肅急貌一作肅肅百草育而不長言秋氣起則西風急疾而害生物使百草不得盛長以言君令急促剗傷百姓使不得保其性命也衆並諧以妬賢兮孤聖特而易傷言衆佞相與並同以妬賢者雖有聖明之智孤特無助易傷害也易去聲懷計謀而不見用兮巖穴處而隱藏士曰隱寶曰藏言已懷忠信之計不得列見獨處巖穴之中隱藏而已成功隳而不卒兮隳壞也子胥死而不葬言子胥為吳伐楚破郢謀行功成後用讒言賜劒棄死故言死而不葬也世從俗而變化兮隨風靡而成行言當世之人見子胥被害則變心從俗以承上意若風靡草羣聚成行而羅列信直退而毁敗兮虛偽進而得當言信直之臣被蒙諡毁而身敗棄虛偽之人進用在位而當顯職也追悔過之無及兮之一作而無一作不豈盡忠而有功言君進用虛偽之臣則國傾危追而自悔亦無所及也己欲盡忠直之節終不能成其功也豈一作覬廢制度而不用兮務行私而去公言在位之臣廢先王之制度務從私邪背去公正爭欲求利也終不變而死節兮惜年齒之未央言己執守清白而死忠直終不變節惜年齒尚少壽命未盡而將夭折也將方舟而下流兮冀幸君之發矇大夫方舟士特舟矇僮矇也言我將方舟隨江而浮冀幸懷王開其矇惑之心而還已也痛忠言之逆耳兮恨申子之沈江申子伍子胥也吳封之於申故號為申子也哀痛忠直之言忤逆君耳使之志怒若申胥諫吳王殺而沈之江流也願悉心之所聞兮心一作余遭值君之不聰悉盡也聽逺曰聰言已欲盡忠竭其所聞陳列政事遭值懷王暗不聰明而不見納也不開寤而難道兮道一作導不別橫之與縱緯曰橫經曰縱言君心常惑而不可開寤語以政道尚不別繒布經緯橫縱不能知賢愚亦明矣聽姦臣之浮説兮絶國家之久長言君好聽邪説之臣虛言浮説以自誤亂將絶國家纍世久長之祿也滅規矩而不用兮背繩墨之正方言君為政滅先聖之法度而不施用背棄忠直之臣以自傾危離憂患而乃寤兮離一作罹若縱火於秋蓬蓬蒿也秋時枯稿言君信任佞諛不慮艱難卒遭憂患然後乃覺若放火於秋蒿不可救制也業失之而不救兮尚何論乎禍凶言君施行業以失道身將危殆尚復論國之禍凶豈不晚哉彼離畔而朋黨兮獨行之士其何望言彼讒佞相與朋黨並食重祿獨行忠直之士當復何望宜窮困也日漸染而不知兮稍積為漸汙變為染秋毫微哉而變容鋭毛為毫夏落秋生言君用讒邪日以漸染隨之變化而不自知若秋毫更生其容微眇而日長大也衆輕積而折軸兮原咎雜而纍重咎過也言車載衆輕之物以折其軸而不可乘其過咎由重絫雜載衆多之故也以言國君聽用羣小之言則壞敗法度而自傾危也赴湘沅之流澌兮恐逐波而復東言己心清潔不能久居濁世故赴湘沅之水與流澌俱浮恐遂乘波而東入大海也懷沙礫而自沈兮不忍見君之蔽壅礫小石也言已所以懷沙負石甘樂死亡自沈於水者不忍久見懷王壅蔽於讒佞也沈江世沈淖而難論兮沈沒也淖溺也俗岒峨而嵾嵯岒與岑同岒峨嵾嵯不齊貌言時世之人沈沒財利用心淖溺不論是非不別忠佞風俗毁譽高下嵾嵯賢愚合同上不任賢化使然也清泠泠而殱滅兮殱音尖清泠泠以喻潔白殱盡也滅消也一云而日殱兮溷湛湛而日多湛讀作沈溷湛湛喻貪濁也言泠泠清淸之士盡棄銷滅不見論用貪濁之人進在顯位日以盛多梟梟既以成羣兮玄鶴弭翼而屏移言貪狼之人並進成羣亷潔之士斂節而退也蓬艾親入御於牀第兮第音姊第牀簀也以喻親密馬蘭踸踔而日加踸音趂踔音卓馬蘭惡草也踸踔暴長貌也加盛也言蓬蒿蕭艾入御房中則馬蘭之草踸踔暴長而茂盛也以言佞諂見親近則邪偽之徒踴躍而欣喜也棄捐藥芷與杜蘅兮余奈世之不知芳何言棄捐芳草忠正之士當奈世人不知賢何一云余奈夫世不知芳何一云余奈夫不知芳何何周道之平易兮然蕪穢而險戲險戲猶言傾危也言周家建立德化其道平直公方所履無失而言蕪穢傾危者心惑意異也以平直為傾危則以忠正為邪枉也詩曰周道如砥其直如矢髙陽無故而委塵兮髙陽帝顓頊也委塵坌塵也言帝顓頊聖明克讓然無故被塵翳言與帝共工爭天下也唐虞點灼而毁議點汙也灼炙也猶身有病人點炙之言堯舜至聖道德擴被尚點炙謗毁言有不慈之過卑父之纍也誰使正其真是兮言佞人妄論以善為惡乃非訕聖王當誰使正其真偽乎已以忠被罪固其宜也雖有八師而不可為八師謂禹稷卨臯陶伯夷倕益夔也言堯舜有聖賢之臣八人以為師傅不能除去虛偽之謗平疾讒之辭也皇天保其高兮后土持其久言皇天保其高明之姿不可踰越也后土持其久長不可掘發也賢人守其志分亦不可傾奪也一云不可輕脫服清白以逍遙兮偏與乎玄英異色玄英純黑也以喻貪濁言已被服芬香履修清白偏與貪濁者異行不可同趣也西施媞媞而不得見兮媞音提西施美女也媞媞好貌也詩曰好人媞媞也􅙵母勃屑而日侍􅙵母醜女也勃屑猶媻姍膝行貌言西施媞媞儀容姣好屏不得見嫫母醜惡反得媻姍而侍左右也以言親近小人斥逐君子也桂蠧不知所淹留兮桂蠧以喻食祿之臣也言桂蠧食芬香居髙顯不知留止妄欲移徙則失甘美之木亡其處也以言衆臣食君之祿不建忠信妄行佞諂亦將失其位喪其所也蓼蟲不知徙乎葵菜言蓼蟲處辛烈食苦惡不能知徙於葵菜食甘美終以困苦而癯瘦也以喻己修潔白不能變志易行以求祿位亦將終身貧賤而困窮也處湣湣之濁世兮今安所達乎吾志湣音泯言已居濁溷之世無有逹我清白之志也一云今安逹乎吾志意有所載而逺逝兮固非衆人之所識識知也言已心載忠正之志欲逺去以求賢人君子固非衆人所能知也驥躊躇於弊輂兮輂音踘躊躇不行貌遇孫陽而得代孫陽伯樂姓名也言衆人不識騏驥以駕敗車則不肻進遇伯樂知其有力以車代之則至千里流名德也以言俗人不識己志亦將遇明君建道流化垂功業也吕望窮困而不聊生兮遭周文而舒志寧戚飯牛而商歌兮桓公聞而弗置皆解於離騷經路室女之方桑兮路室客舍也孔子過之以自侍言孔子出遊過於客舍其女方采桑一心不視喜其貞信故以自侍吾獨乖剌而無當兮乖差也剌邪也心悼怵而耄思耄亂也九十曰耄言古賢俊皆有遭遇我獨乖差與時邪剌故心中自傷怵惕而思志為耄亂思比干之恲恲兮恲恲忠直之貌恲音平哀子胥之慎事子胥臨死曰抉吾兩目置吳東門以觀越兵之入也死不忘國故言慎事也悲楚人之和氏兮獻寶玉以為石遇厲武之不察兮羌兩足以畢斫斫音析斫斷也昔卞和得寶玉之璞而獻之楚厲王或毁之以為石王怒斷其左足武王即位和復獻之武王不察視又斷其右足和乃抱寶泣於荆山之下悲極血出於是暨成王乃使工人攻之果得美玉世所謂和氏之璧也或曰兩足畢索索盡也以言玉石易別於忠佞尚不能知己之獲罪是其常也小人之居勢兮志狹智少為小人也視忠正之何若言小人智少慮狹茍欲承順求媚以居位勢視忠正之人當何如乎甚於草芥也改前聖之法度兮前一作先喜囁嚅而妄作囁嚅小語謀私貌也言小人在位以其愚心改更先聖法度背違仁義相與耳語謀利而妄造虛偽以譖毁賢人也親讒諛而疏賢聖兮訟謂閭娵為醜惡歡譁為訟閭娵好女也言君親信讒諛之臣斥逐忠正背先聖法度衆人歡譁之訟以好為惡心迷意惑不自知也愈近習而蔽逺兮孰知察其黑白言君近諂諛習而信之蔽逺賢者言不見用誰當知己之清白彼之貪濁也卒不得效其心容兮卒一作來安眇眇而無所歸薄薄附也言己放流不得內竭忠誠外盡形體東西眇眇無所歸附也專精爽以自明兮晦冥冥而壅蔽言已專一忠情竭盡耳目之精明欲以助君而為佞人之所壅蔽不得進也年既己過太半兮然轁軻而留滯轁音坎軻音柯轁軻不遇也言己年已過五十而轁軻沈滯卒無所逢偶也欲高飛而逺集兮恐離罔而滅敗罔以喻法言己欲高飛逺止他方恐遭罪法以滅敗忠厚之志也獨寃抑而無極兮傷精神而壽夭壽命夭也皇天既不純命兮余生終無所依依保也願自沈於江流兮絶橫流而徑逝徑一作逺寧為江海之泥塗兮安能久見此濁世言已思委命於江流沈為泥塗不忍久見貪濁之俗也怨世賢士窮而隱處兮士一作者亷方正而不容言時貪亂者衆賢者隱蔽亷正之士不得容於世也子胥諫而靡軀兮比干忠而剖心子推自剖而飼君兮德日忘而怨深飼音飼已解於九章中一云推自割而飼君兮行明白而曰黑兮荆棘聚而成林荆棘多刺以喻讒賊言己修行清白皎然日明而讒人聚而蔽之謂之暗昧使不得通也江離棄於窮巷兮蒺藜蔓乎東廂牆序之東為東廂以言賢者棄捐閭巷小人親近左右也藜一作梨賢者蔽而不見兮讒諛進而相朋相朋一作在位朋一作明梟梟並進而俱鳴兮鳳皇飛而高翔言小人相舉而論議賢智隱而深藏也願一往而徑逝兮一或作一道壅絶而不通言己思一見君盡忠言而遂徑去障蔽於讒佞而不得志也怨思居愁勤其誰告兮獨永思而憂悲言己放在山澤心中愁苦無所告訴長憂悲而已內自省而不慙兮操愈堅而不衰言己自念懷抱忠誠履行清白內不慙於身外不愧於人志愈堅固不衰懈也隱三年而無決兮嵗忽忽其若頽言己放在山野滿三年矣嵗月迫促去若頽下年且老也古者人臣三諫不從待放三年君命還則復無則遂行也憐余身不足以卒意兮憐一作憐冀一見而復歸言巳自憐身老不足以終志意幸復一見君陳忠言還鄉邑也哀人事之不幸兮屬天命而委之咸池咸池天神也言己自哀不能修人事以見愛於君屬祿命於天委之神明而已身被疾而不間兮間差也心沸熱其若湯言己修行仁義身反被病而不間差憂道不立心中怛然而氣熱若湯之沸也氷炭不可以相並兮並併也吾固知乎命之不長言氷見炭則消炭得氷則滅以喻忠佞不可並處則相傷害固知我命之不得長久將消滅也一云固知余命之不長一云吾乎固知命之不長哀獨苦死之無樂兮惜豫年之未央自哀惜死年尚少也悲不反余之所居兮一本不下有得字恨離豫之故鄉不得歸郢見故居也鳥獸驚而失羣兮飛者為鳥走者為獸猶髙飛而哀鳴言鳥獸失其羣偶尚哀鳴相求以刺同位之人曽無相念之意也狐死必首丘兮夫人孰能不反其真情真情本心也言狐狸之死猶嚮丘穴人年老將死誰有不思故鄉乎言己尤甚也故人疏而日忘兮新人近而俞好言舊故忠臣日以疏逺讒諛新人日近而見親也一云新人愈近而日好莫能行於杳冥兮孰能施於無報言衆人誰能有執心正行於杳冥之中施於無報之人乎言皆茍且而行以求利也若衆人之皆然兮乘回風而逺遊言已患苦衆人皆行茍且故乘風而逺去也凌恆山其若陋兮凌乘也恆山北嶽也陋小也聊偷娛以忘憂言己乘騰髙山以為庳小陟險猶易聊且愈樂以忘悲憂也愈一作偷悲虛言之無實兮讒言無誠君不察也苦衆口之鑠金已解於九章中過故鄉而一顧兮泣歔欷而霑襟言已逺行猶思楚而悲泣也厭白玉以為面兮厭著也懷琬琰以為心言己施行清白心面若玉內外相副邪氣入而感內兮施玉色而外淫淫潤也言讒邪之言雖自內感己志而猶不變玉色外潤而內愈明也何青雲之流瀾兮瀾一作爛微霜降之蒙蒙蒙蒙盛貌詩云零雨其蒙言遭佞人羣聚造作虛辭君政用急天旱下霜則害草木傷其貞節也徐風至而徘徊兮而一作之疾風過之湯湯風為號令言君命寬則風舒風舒則己徘徊而有還志也令急風疾則已惶遽欲急去也一云疾風舒之蕩蕩聞南藩樂而欲往兮藩蔽也南國諸侯為天子藩蔽故稱藩也一本無樂而二字至會稽而且止會稽山名也言已聞南國饒樂而欲往至會稽山且休息也見韓衆而宿之兮問天道之所在韓衆仙人也天道長生之道也借浮雲以送豫兮載雌霓而為旌旌旗也有鈴為旌也一云載虹霓而為旍駕青龍以馳騖兮班衍衍之冥冥言極疾也忽容容其安之兮超慌忽其焉如不知所之也苦衆人之難信兮願離羣而逺舉舉去也言苦見俗人多言無信不可據任故願離衆而逺去也登巒山而逺望兮巒小山也一云登巒無山字好桂樹之冬榮南方有不死之草北方有不釋之氷也一云好桂茂而冬榮觀天火之炎煬音陽兮聽大壑之波聲大壑海水也言己仰觀天火下覩海水心愁思也引八維以自道兮天有八維以為綱紀也含沆瀣以長生言己乃攬持八維以自導引含沆瀣之氣以不死也居不樂以時思兮以一作而一云思時食草木之秋實秋實謂棗栗之屬也飲菌若之朝露兮構桂木而為室言飲食潔清所處芬香也雜橘柚以為囿兮囿一作圃列辛夷與椒楨雜聚衆善以自修飾也鵾鶴孤而夜號兮哀居者之誠貞言鵾雞鶬鶴大鳥猶知賢良哀惜己之履行正直而不施用也自悲哀時命之不合兮傷楚國之多憂言已自哀生時祿命好行公正不與君合憐傷楚國無有忠臣國家多憂也內懷情之潔白兮潔一作質遭亂世而離尤言己懷潔白之志以得罪過於衆人也惡耿介之直行兮世溷濁而不知言衆人惡明正之直士以君暗昧不知用之故也何君臣之相失兮上沅湘而分離言讒佞害己使明君放逐忠臣上下分離失其所也測汨羅之湘水兮汨水在長沙羅縣下注湘水中知時固而不反言己沈身汨水終不還楚國也傷離散之交亂兮遂側身而既逺遂去而流遷也處玄舍之幽門兮穴巖石而窟伏巖穴也言己修德不用欲伏巖穴之中以自隱藏也從水蛟而為徒兮與神龍乎休息自喻德如蛟龍而潛匿也何山石之嶄巖兮靈魂屈而偃蹇言山石髙巖非已所居靈魂偃蹇難上欲去之也含素水而蒙深兮日耿耿而既逺素水白水也言雖逺行不失清白之節也哀形體之離解兮解一作懈神罔兩而無舍罔兩無所據依貌也舍止也自哀身體陸離逺行解倦精神罔兩無所據依而舍止也惟椒蘭之不反兮椒子椒也蘭子蘭也魂迷惑而不知路言子椒子蘭不肻反己魂魄迷惑不知道路當如何也願無過之設行兮雖滅沒之自樂言願設陳己行終無過惡雖身沒名滅猶自樂不改易也痛楚國之流亡兮哀靈修之過到言懷王之過已至於惡楚國將危亡失賢之故也固時俗之溷濁兮志瞀迷而不知路瞀悶也迷惑也言己遭遇亂世心中煩惑不知所行也念私門之正匠兮匠教也遙涉江而逺去言已念衆臣皆營其私相教以利乃以其邪心欲正國家之事故已逺去也念女嬃之嬋娟兮涕泣流乎於悒於悒增歎貌也已解見離騷經我決死而不生兮雖重追吾何及言亦無所復還也一云吾其何及戲疾瀨之素水兮望髙山之蹇産言己履清白其志如水雖遇棄放猶志仰髙逺而不懈也哀高丘之赤岸兮遂沒身而不反言己哀楚有高丘之山其岸峻險赤而有光明傷無賢君將以阽危故沈身於湘流而不還也哀命怨靈修之浩蕩兮己解於離騷經夫何執操之不固操志也固堅也言已念懷王信用讒佞志數變移而不堅固也悲太山之為隍兮隍城下池也易曰城復于隍也孰江河之可涸涸塞也言太山將頽為池以喻君且失其位用心迷惑過惡己成若江河之決不可涸塞也願承間而效志兮恐犯忌而干諱所畏為忌所隱為諱干觸也言己願承君間暇之日時竭效忠言恐犯上忌觸衆人諱而見刑誅也卒撫情以寂寞兮然怊悵而自悲怊悵恨貌也言己終撫我情寂寞不言然怊悵自恨心悲毒也玉與石而同匱兮匱匣也貫魚眼與珠璣圓澤為珠粗瑀為璣以言君不知賢愚忠佞之士猶雜魚眼與珠璣同貫而不別也駑駿雜而不分兮駑鈍馬也良馬為駿也服罷牛而驂驥左轅為服外騑為驂言君選士用人雜用駑駿不異賢愚若駕罷牛驂以騏驥才力殊也罷音皮年滔滔而日逺兮滔滔行貌壽冉冉而俞衰自傷不遇年衰老也心悇憛而煩寃兮悇音凃憛音覃悇憛憂愁貌也蹇超搖而無冀蹇辭也超搖不安也言已自念年老心中悇憛超搖不安終無所冀望也固時俗之工巧兮滅規矩而改錯却騏驥而不乘兮䇿駑駘而取路當世豈無騏驥兮誠無王良之善馭見執轡者非其人兮故駒跳而逺去皆己解在九辨不量鑿而正枘兮恐矩矱之不同已解於離騷經也不論世而髙舉兮恐操行之不調調和也言人不論世之貪濁而高舉清白之行恐不知於俗而見憎於衆也弧弓弛而不張兮弛解孰云知其所至言弧弓雖強弛而不張誰知其力之所至乎以言賢者不在職位亦不知其才德也無傾危之患難兮焉知賢士之所死言國無傾危之難則不知賢士之伏節死義也俗推佞而進富兮節行張而不著賢良蔽而不羣兮朋曹比而黨譽邪枉説飾而多曲兮正法弧而不公弧戾也言世俗之人推佞以為賢進富以為能故君之正法膠戾不用衆皆背公而嚮私也直士隱而辟匿兮讒諛登乎明堂明堂布政之宫也言忠直之士隱身辟匿讒諛之人反登明堂而為政也棄彭咸之娛樂兮言棄彭咸清潔之行娛樂之風俗則為貪佞也滅巧倕之繩墨言工滅巧倕之繩墨則枉直失其制也言君背先王之法則自亂惑也菎蕗雜於叢蒸兮枲翮曰叢煏竹曰蒸言持菎蕗香直之草雜於黀蒸燒而燃之則不識於物也以言取忠直棄之林野亦不知賢也一云菎蔬雜於黀蒸機蓬矢以射革矢箭也言張強弩之機以蓬蒿之箭以射犀革之盾必摧折而無所能入也言使愚巧任政必致荒亂無所能成也駕蹇驢而無䇿兮蹇跛也䇿箠也又何路之能極極竟也言君任駑頓之臣使在顯職如駕跛蹇之驢又無鞭箠終不竟道將傾覆也以直針而為釣兮釣一作鈎又何魚之能得言君不能以禮敬聘請賢者猶以直針釣魚無所能得也伯牙之絶弦兮伯牙工鼓琴也無鍾子期而聽之鍾子期識音者也言鍾子期死伯牙破琴絶絃不肯復鼓以世無知音也言己不遇明君識忠直者亦宜鉗口而不語言也和抱璞而泣血兮一云和氏安得良工而剖之和卞和也剖猶治也已解於上篇同音者相和兮謂清濁也同類者相似謂好惡也以言君清明則潔白之士進君暗昧則貪濁之人用易曰方以類聚物以羣分飛鳥號其羣兮鹿鳴求其友同志為友言飛鳥登髙木志意喜樂則和鳴求其羣而呼其耦鹿得美草口甘其味則求其友而號其侣也以言在位之臣不思賢念舊曽不若鳥獸也詩曰嚶其鳴矣求其友聲又曰呦呦鹿鳴食野之蘋故叩宫而宫應兮彈角而角動叩擊也彈楔也宫角五音也言叩擊五音各以其聲感而相應也以言君求仁則仁至修正則下直也一云叩宫而商應彈角而徴動虎嘯而谷風至兮虎陽物也谷風陽氣也言虎悲嘯而吟則谷風至而應其類也以言君修德行政則百姓隨而化也龍舉而景雲往龍介蟲隂物也景雲大雲而有光者雲亦隂也言神龍將舉升天則景雲覆而扶之輔其類也言君好賢士則英俊往而並集也音聲之相和兮言物類之相感也言鳥獸相呼雲龍相感無不應其類而從其耦也傷君獨無精誠之心以動賢也一云音繫而相和兮一無言及也字夫方圜之異形兮一云若夫圜一作圓勢不可以相錯言君性所為不與己合若方與圓不可錯雜勢不相安也列子隱身而窮處兮列子古賢士也世莫可以寄託言列子所以隱佚不仕而窮處者以世多詐偽無可以寄命託身也以一作與衆鳥皆有行列兮鳳獨翺翔而無所薄已解於九也經濁世而不得志兮願側身巖穴而自託言己厯貪濁之世終不得展其志意但甘處巖穴之中而隱伏也欲闔口而無言兮嘗被君之厚德闔閉也言己欲閉口結舌而不復言以嘗被君之厚祿故不能默也獨便悁而懷毒兮愁鬱鬱之焉極言憂愁之無窮也念三年之積思兮願一見而陳詞思一見君而陳忠言也不及君而騁説兮騁馳也世孰可為明之言己不及賢君而騁極忠説則時世暗蔽無可為明真偽也身寢疾而日愁兮寢卧也情沈抑而不揚言己身被疾病卧而愁思自傷忠誠沈抑而不得揚逹也衆人莫可與論道兮悲精神之不通言當世之人無可與議事君之道者哀我精神所志而不得通於君也謬諌亂曰鸞皇孔鳳日以逺兮孔孔雀也一云鸞孔鳯皇畜鳧駕鵝一云畜梟駕鵝雞鶩滿堂壇兮高殿敞揚為堂平場廣坦為壇蛙黽遊乎華池蛙蝦蟇也華池芳華之池也言君推逺孔鳯斥逐賢智畜養鵝鶩親近小人滿於堂庭蛙黽喻讒諛弄口得志也要裊奔亡兮騰駕槖駝要音腰一作騕鉛刀進御兮遙棄太阿要裊駿馬太阿利劒也言君放逺要裊英俊之士而駕橐駝任使罷駑頓朽之人而棄明智之士也拔搴玄芝兮玄芝神草也列樹芋荷橘柚萎枯兮橘柚美木也苦李旖旎旖旎盛貌也言君乃拔去芝草賤棄橘柚種植芋荷養育苦李愛重小人斥逐君子也甂甌登於明堂兮甂甌瓦器名也周鼎潛乎深淵周鼎夏禹所作鼎也左氏傳曰昔夏禹之有德逺方圖物貢金九牧鑄鼎象物桀有昏德鼎遷于商商紂暴虐鼎遷于周是為周鼎言甂甌之器登明堂周鼎反藏于深淵之水言小人任政賢者隱匿也自古而固然兮吾又何怨乎今之人言往古嫉妬忠直而不肻進用我何為獨怨今世之人乎自慰之詞疏諫起上林苑疏臣聞謙遜靜慤天表之應應之以福驕溢靡麗天表之應應之以異今陛下纍郎臺恐其不髙也弋獵之處恐其不廣也如天不為變則三輔之地盡可以為苑何必盩厔鄠杜乎奢侈越制天為之變上林雖小臣尚以為大也夫南山天下之阻也南有江淮北有河渭其地從汧隴以東商雒以西厥壤肥饒漢興去三河之地止霸産以西都涇渭之南此所謂天下陸海之地秦之所以虜西戎兼山東者也其山出玉石金銀銅鐵豫章檀柘異類之物不可勝原此百工所取給萬民所卬足也又有粳稻梨栗桑麻竹箭之饒土宜薑芋水多蛙魚貧者得以人給家足無飢寒之憂故酆鎬之間號為土膏其賈畝一金今規以為苑絶陂池水澤之利而取民膏腴之地上乏國家之用下奪農桑之業棄成功就敗事損耗五穀是其不可一也且盛荆棘之林而長養麋鹿廣狐兔之苑大虎狼之墟又壞人冢墓發人室廬令幼弱懷土而思耆老泣涕而悲是其不可二也斥而營之垣而囿之騎馳東西車騖南北又有深溝大渠夫一日之樂不足以危無隄之輿是其不可三也故務苑囿之大不恤農時非所以強國富人也夫殷作九市之宫而諸侯畔靈王起章華之臺而楚民散秦興阿房之殿而天下亂糞土愚臣忘生觸死逆盛意犯隆指罪當萬死不勝大願願陳泰階六符以觀天變不可不省應詔上書臣朔少失父母長養兄嫂年十二學書三冬文史足用十五學擊劒十六學詩書誦二十二萬言十九學孫吳兵法戰陳之具鉦鼓之教亦誦二十二萬言凡臣朔固已誦四十四萬言又常服子路之言臣朔年二十二長九尺三寸目若懸珠齒若編貝勇若孟賁捷若慶忌亷若鮑叔信若尾生若此可以為天子大臣矣臣朔昧死再拜以聞書與公孫𢎞書蓋聞爵祿不相責以禮同類之遊不以逺近為初是故東門先生居蓬戶空穴之中而魏公子一朝以百騎馳造之吕望未嘗與文王同席而坐一朝讓以天下半大丈夫相知何必以撫塵而遊垂髮齊年偃伏以日數哉從公孫𢎞借車馬書朔當從甘泉願借外廄之後乘木槿夕死而朝榮者士亦不必長貧也公孫𢎞答東方朔書附譬猶龍之未升與魚龍為伍及其升天鱗不可覩與友人書不可使塵網名韁拘鎖怡然長笑脫去十洲三島相期拾瑤草吞日月之光華共輕舉耳序十洲記序臣學仙者耳非得道之人以國家盛美特招延儒墨於文網之內抑絶俗之道擯虛詭之迹臣故韜隱逸而赴玉庭藏養生而侍朱闕矣亦由尊上好道且復欲徜徉威儀也曽隨師之主履行北至朱陵扶桑之闕溽海冥夜之丘純陽之陵始青之下月宫之間內遊七丘中旋十洲踐赤縣而遨五嶽行陂澤而息名山臣自少及今周流六天涉厯八極於是矣未若陵虛之子飛真之官上下九天洞視百方北極鉤陳而並華蓋南翔太丹而栖大夏東之通陽之霞西薄寒穴之野日月所不逮星漢所不與其上無復物其下無復底臣之所識始愧不足以酬廣訪矣論非有先生論非有先生仕於吳進不稱往古以勵主意退不能揚君美以顯其功默默無言者三年矣吳王怪而問之曰寡人獲先人之功寄於衆賢之上夙興夜寐未嘗敢怠也今先生率然髙舉逺集吳地將以輔治寡人誠竊嘉之體不安席食不甘味目不視靡曼之色耳不聽鐘鼓之音虛心定志欲聞流議者三年于兹矣今先生進無以輔治退不揚主譽竊不為先生取之也蓋懷能而不見是不忠也見而不行主不明也意者寡人殆不明乎非有先生伏而唯唯吳王曰可以談矣寡人將竦意而覽焉先生曰於戲可乎哉可乎哉談何容易夫談有悖於目拂於耳謬於心而便於身者或有説於目順於耳快於心而毁於行者非有明王聖主孰能聽之吳王曰何為其然也中人己上可以語上也先生試言寡人將聽焉先生對曰昔者關龍逄深諫於桀而王子比干直言於紂此二臣者皆極慮盡忠閔王澤不下流而萬民騷動故直言其失切諫其邪者將以為君之榮除主之禍也今則不然反以為誹謗君之行無人臣之禮果紛然傷於身蒙不辜之名戮及先人為天下笑故曰談何容易是以輔弼之臣瓦解而邪諂之人並進遂及蜚亷惡來革等二人皆詐偽巧言利口以進其身隂奉雕瑑刻鏤之好以納其心務快耳目之欲以茍容為度遂往不戒身沒被戮宗廟崩阤國家為虛放戮賢聖親近讒夫詩不云乎讒人罔極交亂四國此之謂也故卑身賤體説色微辭愈愈詬詬終無益於主上之治則志士仁人不忍為也將儼然作矜嚴之色深言直諫上以拂人主之邪下以損百姓之害則忤於邪主之心厯於衰世之法故養壽命之士莫肻進也遂居深山之間積土為室編蓬為戶彈琴其中以咏先王之風亦可以樂而忘死矣是以伯夷叔齊避周餓於首陽之下後世稱其仁如是邪主之行固足畏也故曰談何容易於是吳王懼然易容損薦去几危坐而聽先生曰接輿避世箕子被髮陽狂此二人者皆避濁世以全其身者也使遇明王聖主得清燕之間寬和之色發憤畢誠圖畫安危揆度得失上以安主體下以便萬民則五帝三王之道可幾而見也故伊尹蒙恥辱負鼎俎和五味以干湯太公釣於渭之陽以見文王心合意同謀無不成計無不從誠得其君也深念逺慮引義以正其身推恩以廣其下本仁祖義褒有德祿賢能誅惡亂總逺方一統類美風俗此帝王所由昌也上不變天性下不奪人倫則天地和洽逺方懷之故號聖王臣子之職既加矣於是裂地定封爵為公侯傳國子孫名顯後世民到于今稱之以遇湯與文王也太公伊尹以如此龍逢比干獨如彼豈不哀哉故曰談何容易於是吳王穆然俯而深唯仰而泣下交頤曰嗟乎余國之不亡也綿綿連連殆哉世之不絶也於是正明堂之朝齊君臣之位舉賢材布德惠施仁義賞有功躬節儉減後宫之費損車馬之用放鄭聲逺佞人省庖厨去侈靡卑宫館壞苑囿填池塹以豫貧民無産業者開內藏振貧窮存耆老恤孤獨薄賦斂省刑辟行此三年海內晏然天下大治隂陽和調萬物咸得其宜國無災害之變民無飢寒之色家給人足畜積有餘囹圄空虛鳳凰來集麒麟在郊甘露既降朱草萌芽逺方異俗之人鄉風慕義各奉其職而來朝賀故治亂之道存亡之端若此易見而君人者莫肻為也臣愚竊以為過故詩云王國克生惟周之楨濟濟多士文王以寧此之謂也設難答客難客難東方朔曰蘇秦張儀一當萬乘之主而都卿相之位澤及後世今子大夫修先王之術慕聖人之義諷誦詩書百家之言不可勝數著於竹帛唇腐齒落服膺而不釋好學樂道之效明白甚矣自以智能海內無雙則可謂博聞辨智矣然悉力盡忠以事聖帝曠日持久官不過侍郎位不過執戟意者尚有遺行邪同胞之徒無所容居其故何也東方先生喟然長息仰而應之曰是故非子之所能備也彼一時也此一時也豈可同哉夫蘇秦張儀之時周室大壞諸侯不朝力政爭權相禽以兵並為十二國未有雌雄得士者強失士者亡故談説行焉身處尊位珍寶充內外有廩倉澤及後世子孫長享今則不然聖帝流德天下震懾諸侯賓服威震四夷連四海之外以為帶安於覆盂天下平均合為一家動發舉事猶運之掌賢不肖何以異哉遵天之道順地之理物無不得其所故綏之則安動之則苦尊之則為將卑之則為虜抗之則在青雲之上抑之則在深泉之下用之則為虎不用則為鼠雖欲盡節效情安知前後夫天地之大士民之衆竭精談説並進輻輳者不可勝數悉力慕之困於衣食或失門戶使蘇秦張儀與僕並生於今之世曽不得掌故安敢望侍郎乎傳曰天下無害災雖有聖人無所施才上下和同雖有賢者無所立功故曰時異事異雖然安可以不務修身乎哉詩云鼓鐘于宫聲聞于外鶴鳴于九臯聲聞于天茍能修身何患不榮太公體行仁義七十有二乃設用於文武得信厥説封於齊七百嵗而不絶此士所以日夜孳孳敏行而不敢怠也辟若鶺鴒飛且鳴矣傳曰天不為人之惡寒而輟其冬地不為人之惡險而輟其廣君子不為小人之胸胸而易其行天有常度地有常形君子有常行君子道其常小人計其功詩云禮義之不愆何恤人之言故曰水至清則無魚人至察則無徒冕而前旒所以蔽明黈纊充耳所以塞聰明有所不見聰有所不聞舉大德赦小過無求備於一人之義也枉而直之使自得之優而柔之使自求之揆而度之使自索之蓋聖人之教化如此欲其自得之自得之則敏且廣矣今世之處士時雖不用魁然無徒廓然獨居上觀許由下察接輿計同范蠡忠合子胥天下和平與義相扶寡耦少徒固其宜也子何疑於我哉若夫燕之用樂毅秦之任李斯酈食其之下齊説行如流曲從如環所欲必得功若丘山海內定國家安是遇其時也子又何怪之邪語曰以管窺天以蠡測海以莛撞鐘豈能通其條貫考其文理發其音聲哉繇是觀之譬猶鼱鼩之襲狗孤豚之咋虎至則靡耳何功之有今以下愚而非處士雖欲勿困固不得己此適足以明其不知權變而終惑於大道也答驃騎難干將莫耶天下之利劒也水斷鵠雁陸斷馬牛將以補履曽不如一錢之錐騏驥緑耳蜚鴻驊騮天下良馬也將以捕鼠於深宫之中曽不如跛貓頌旱頌維昊天之大旱失精和之正理遙望白雲之酆淳滃瞳瞳而亡止陽風吸習而熇熇羣生閔悶而愁憒隴畝枯稿而允布壤石相聚而為害農夫垂拱而無為釋其耰鉏而下涕悲壇畔之遭禍痛皇天之靡濟銘寶甕銘當黃帝時瑪瑙甕至堯時猶存甘露不竭謂之寶露舜遷寶甕於衡山故山有寶露壇下起月館以望夕月又遷寶甕於零陵之上舜崩甕淪地下至秦始皇通汨羅之流為小溪徑從長沙至零陵掘地得赤玉甕可容八斗在舜廟之堂前不知年月至漢東方朔識之朔乃作寶甕銘寶雲生於露壇祥風起於月館望三壺如盈尺視八鴻如縈帶詩據地歌陸沈於俗避世金馬門宫殿中可以避世全身何必深山之中蒿廬之下誡子詩明者處世莫尚於中優哉遊哉於道相從首陽為拙栁惠為工飽食安步以仕代農依隱玩世詭時不逢才盡身危好名得華有羣纍生孤貴失和遺餘不匱自盡無多聖人之道一龍一蛇形見神藏與物變化隨時之宜無有常家嗟伯夷窮隱處兮窟穴自藏與其隨佞而得志不若從孤竹於首陽漢魏六朝百三家集卷四
