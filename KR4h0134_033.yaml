body:
  text: 漢魏六朝百三家集巻三十三魏應璩集目録牋與武帝薦賁琳牋薦和模牋與曹公牋與曹昭伯牋與劉靖牋書與滿炳書與侍郎曹長思書與廣川長岑文瑜書與西陽令孔德琰書與從弟君苖君胄書與劉公幹書與韋仲將書與董仲連書與尚書諸郎書又與尚書諸郎書答韓文憲書與許子俊書又與許子俊書報東海相梁季然書與陰夏書與陰中夏書與程文信書與梁州刺史劉文爽書與劉文逹書與夏侯孝智書與洛陽令杜偉忠書與王子雍書與母丘仲恭書與龎惠恭書報燕中尉樊彦皇書報平陸長賁偉伯書與崔瑗書與人書與趙叔濳書書與王將軍書與劉孔才書書海録碎事詩百一詩三首雜詩三首三叟又百一詩一名新名又又又又遺句漢魏六朝百三家集巻三十三目録欽定四庫全書漢魏六朝百三家集巻三十三明張漙輯魏應璩集牋與武帝薦賁琳牋璩聞景雲浮則應㡣翔治道明則儶義臻是故良哉之歌興於唐堯之世多士之頌形於周文之朝竊見太子舎人賁琳字瑋伯禀性純和體素清闕宜授以千里之塗任以列曹之職薦和模牋璩聞唐堯因羣士以興治齊桓假衆能以定業是故八元進則太平之化成六賢用則九合之功立竊見同郡和模字慮則質性純粹體度貞正履仁蹈義動循軌禮方今海内企踵欣慕捉髪之徳山林投褐思望旌弓之招實英竒叙用之時賢達進致之良秋也今夜光之璧顯價於和氏之肆千里之足定功於伯樂之庭庻有以宣明大道光益時化與曹公牋昔漢光武與戴子髙有撫塵之好與曹昭伯牋曹爽空城寥廓所聞者悲風所見者鳥雀昔陳司空為邑宰所在幽閒獨坐愁思幸頼游蟻以娯其意以今况之知不虗矣損書及逺若從雲墜與劉靖牋靖沛國相人歷大司農衛尉靖靖馥子御覧云馥字子靖璩書與子靖悮時由尚書出為河南尹璩為散騎常侍與靖書入作納言出臨京任富民之術日引月長藩落髙峻絶穿窬之心五種别出逺水火之災農器必具無失時之闕蠶麥有苫備之用無雨濕之虞封符指期無流連之吏鰥寡孤獨䝉廪振之實加之以明擿幽㣲重之以秉憲不撓有司供承王命百里垂拱仰辨雖昔趙張三王之治未足以方也書與滿炳書炳字公琰為别部司馬見賈弼之山公注使炳前曰曽過璩至明日欲遣書謝値炳又人來召璩璩别事不得徃故為報炳父寵為太尉璩嘗事之故呼曰郎君昨者不遺猥見照臨雖昔侯生納顧於夷門毛公受眷於逆旅無以過也外嘉郎君謙下之徳内幸頑才見誠知巳歡欣踴躍情有無量是以奔騁御僕宣命周求陽晝喻於詹何揚倩說於范武故使鮮魚出於一作自濳淵芳㫖發自幽巷繁爼綺錯羽爵蜚騰牙曠髙徽義渠哀激當此之時仲孺不辭同産之服孟公不顧尚書之期徒恨宴樂始酣白日傾夕驪駒就駕意不宣展追惟耿介迄於明發適欲遣書㑹承來命知諸君子復有漳渠之㑹夫漳渠西有伯陽之館北有曠野之望髙樹翳朝雲文禽蔽緑水沙場夷敞清風肅穆是京臺之樂也得無流而不反乎適有事務須自經營不獲侍坐良増邑邑因白不悉璩白與侍郎曹長思書選注云長思書傳所不載璩白足下去後甚相思想叔田有無人之歌闉闍有匪存之思風人之作豈虗也哉王肅以宿徳顯授何曽以後進見㧞皆鷹揚虎眎有萬里之望薄援助者不能追叅於髙妙復歛翼於故枝塊然獨處有離羣之志汲黯樂在郎署何武耻為宰相千載揆之知其有由也徳非陳平門無結駟之跡學非揚雄堂無好事之客才劣仲舒無下帷之思家貧孟公無置酒之樂悲風起於閨闈一作紅塵蔽於几榻幸有袁生時歩玉趾樵蘇不㸑清談而已有似周黨之過閔子夫皮朽者毛落川涸者魚逝春生者繁華秋榮者零悴自然之數豈有恨哉聊與大弟陳其苦懐耳想還在近故不益言璩白與廣川長岑文瑜書文瑜因時旱祈雨不能得璩書戲之璩白頃者炎旱日更増甚沙礫銷鑠草木焦巻處凉臺而有鬱蒸之煩浴寒氷而有灼爛之慘宇宙雖廣無陰以憇雲漢之詩何以過此土龍矯首於𤣥寺泥人鶴立於闕里修之歷旬靜無徴效明勸敎之術非致雨之備也知恤下民躬自暴露拜起靈壇勤亦至矣昔夏禹之解陽旴一作盱殷湯之禱桑林言未發而水旋流辭未卒而澤滂沛今者雲重一作既積而復散雨垂落而復收得無聖賢殊品優劣異姿割鬚宜及膚翦爪宜侵肌乎周征殷而年豐衛伐邢而致雨善否之應甚於影響未可以為不然也想雅思所未及謹書起予應璩白與西陽令孔徳琰書嘉麥禎祥惟日未久不圖飛蝗一旦至止知恤蒸庶念存良苗親發赫斯爰整其旅鮐背之叟皓首之嫠莫不負戈奔走於道路旌表曜於白日黿鼉震於雷動以此掃敵必將席巻况於㣲蟲能無驚駭卓茂治宻恭在中牟時雖有災未若斯勤亦猶子賤鳴琴巫馬出入勞逸有殊立功惟一重雲北興不䧏靈雨麗此二災憂心忡惙逐蝗之道謹聞敎矣不審致禳將以何物文王修徳以厭地震湯禱桑林致克豐雨宜修善政以慰民望與從弟君苖君胄書璩欲歸田故報二從弟璩報間者北游喜歡無量登芒濟河曠若發䝉風伯埽涂雨師灑道按轡清路周望山野亦既至止酌彼春酒接武茅茨凉過大夏扶一作膚寸肴脩味踰方丈逍遥陂塘之上吟詠菀柳之下結春芳以崇佩折若華以翳日弋下髙雲之鳥餌出深淵之魚蒲且讚善便嬛稱妙何其樂哉雖仲尼忘味於虞韶楚人流遁於京臺無以過也班嗣之書信不虗矣來還京都塊然獨處營宅濵洛困於囂塵思樂汶上毎發於寤寐昔伊尹輟耕郅惲投竿思致君於有虞濟蒸人於塗炭而吾方欲秉耒耜於山陽沈鉤一作釣緡於丹水知其不如古人逺矣然山父不貪天下一作地之樂曽參不慕晉楚之富亦其志也前者邑人念弟無巳欲令州郡崇禮官師一作師官授邑誠美意也歴觀前後來入軍府至有皓首猶未遇也徒有飢寒駿奔之勞俟河之清人壽幾何且宦無金張之援游無子孟之資而圖富貴之榮望殊意之寵是隴西之游越人之射耳幸頼先君之靈免負擔之勤追蹤丈人畜鷄種黍濳精墳籍立身揚名斯為可矣無惑一作或游言以増邑邑郊牧之田宜以為意廣開土宇吾將老焉劉杜二生想數徃來朱明之期巳復至矣相見在近不復為言一作書愼夏疑作盛夏自愛璩報一作白與劉公幹書鶉鷃棲翔鳯之條黿鼉游昇龍之淵識真者所為憤結也與韋仲將書韋誕夫以原憲懸磬之居而値皇天無已之雨室宇漸而作漏堂館洽而為泥薪蒭既盡舊榖亦傾一作穀亦傾匱屠蘓發撤機㯓見謀進無顔子不改之志退無揚雄晏然之情是以懐慼良不可堪人非神仙須仰衣食方今體寒心飢憂在旦夕而欲東希許昌治生之物西望陵縣厨食之禄誠恐將為牛蹄中魚卒鮑氏之肆矣與董仲連書魏尚書榖糴驚踴告求周怜一作鄰日獲一作給數升一作斗猶復無薪可以熟之雖孟軻困於梁宋宣尼飢一作困於陳蔡無以過此夫挾管晏之智者不有厮役之勞懐陶朱之慮者不居貧賤之地出䝉譏於恤䕶入見謫於嬪息忽便邑憤不知處世之為樂也與尚書諸郎書夫秋節凉和霽雨清閒正髙㑹之盛時飲宴之良日也而陋巷之居無髙宻之宇壁立之室無旬朔之資流潦浸於北堂隟漏霑於衣服藁蒸單竭儋石傾罄中饋告乏役者莫興飯玉炊桂猶尚優㤗雖欣皇天之降潤亮水車之思雨私懐慼額良不可言想諸夫子亦斯困也夫否㤗潜升葢由昏明二三執事以龍虎之姿遭風雲之㑹方將飛騰閶闔振翼紫微運籌帷幄顯揚豐積豈久沈滯於下職契濶於貧悴哉又檀氏園葵菜繁茂藷蔗瓜芋亦離離尚萌未知三生復何種植荅韓文憲書昔公孫𢎞皓首入學顔涿鄹十五始涉師門朝聞夕殞聖人所貴足下之年甫在不惑加以學藝何晩之有若能上迨南榮忘食之樂下踵寜子黒夜之勤窮文盡義無㣲不綜規富貴之榮取金紫之爵是夏侯勝拾芥之謂也與許子俊書足下以方剛之盛年應不覊之勁勇將發虓虎之威致霜雪之誅擒呉梟蜀定功萬里而劉備不下山孫權不出水武力不奮猛氣畜勇其毒如何又前别倉卒情意不悉追懐萬恨報東海相梁季然書足下頓彌天之綱收萬仭之魚罣之以谿谷數之以陔兆何其壯乎觀夫任公子之所釣此為鰌蝦未足為君一作吾子道之與陰夏書從田來見南野之中有徒歩之士怪而問之乃知郎君頓有㣲疴告祠社神將以祈福聞之悵然以増歎息虗社髙樹能有靈應哉與陰中夏書此與前疑一人體正者則檢於人質弱者則陋於衆與程文信書是以忽此蘇子帶郭之業求彼孫叔寢丘之地故求逺田在關之西南臨洛水北據邙山託崇岫以為宅因茂林以為蔭謝靈運山居賦注璩靈運山居賦云昔仲長願言流水髙山應作書邙阜洛川今宋書謝賦注無是以二句與梁州刺史劉文爽書足下内挹叔夷之清節外播二南之惠政徳敎加於百姓要道過於侏國之卿也北堂書鈔末句有誤一作劉文爽與應璩書與劉文達書僕頃倦遊談之事欲修無為之術不能與足下齊鑣騁轡爭千里之表也與夏侯孝智書遭値有道之世免致貧賤之患援鍳自照髩巳半白殊可懼也與洛陽令杜偉忠書羊寄虎穴鵲托鷹巢心懐怵愓豈其任哉與王子雍書卿校之從有職之事足下著書不起草占授數萬言言不改定事合古典莫不歎息之矣與母丘仲恭書客館不留賔官曹無停事與龎惠恭書頃見所上利民之術植濟南之榆栽漢中之漆報燕中尉樊彦皇書􅒆祛登輿北踐燕路當方化銀龜以為黄變青組以為紫報平陸長賁瑋伯書從此辭矣何敢復飛蟬於惠文鳴玉於縞組哉與崔援書今木作盧璩與崔元書誤豈有亂首抗巾以入都城衣不在體而以適人乎昔戴叔鸞箕坐見邊文禮此皆衰世之慢行也與人書知楊生翻然遂登納言雖有所越亦其宜也傳說棄版築而為殷相吕望投竿而為周師卓茂起閭里而為漢宰若此翁者乃竒才耳瑣瑣尚書執憲之吏曷以為異哉與趙叔潜書入侍華幄出典禁闈書左執屋盧之勁矛右秉干將之雄㦸髙冠拂雲長劍耿介簫管振音厥聲載路馮軾虎視清風震叠可謂堂堂乎難與竝為仁也太平御覽未否為書與王將軍書闕文附録雀䑕雖微猶知徽烈與劉孔才書聴廣陵之清散海録碎事引璩書清猿與壺人爭旦詩百一詩三首野客叢書云石林詩話梁鍾嶸論淵明出於應璩應璩詩不多見惟文選載其百一詩一篇所謂下流不可處君子愼厥初與陶詩不類五臣注引文章録云曺爽多違法應璩作詩以刺在位若百分有補於一者雜體詩集百一詩凡五首不止一篇所謂百一云者又不止文章録一説凡有數説張方賢楚國先賢傳云應休璉作百一詩譏切時事徧以示在位者咸皆怪愕以為應焚弃之何晏獨無怪也李充翰林論曰應休璉作五言詩百數十篇有詩人之㫖孫盛晉陽秋云應璩作詩百三十篇言時事頗有補益七志云應璩謂之新詩以百言為一篇謂之百一詩樂府廣題云百者數之終一者數之始士有百行終始如一故云百一應璩為曹爽大將軍長史前後為詩百餘篇以諷爽揉以習俗之言傅㑹其意名曰百一爽卒不悟以及於禍百一詩序云時謂曹爽曰公今聞周公巍巍之稱安知百慮有一失乎文章録云曺爽多違法璩為是詩以諷焉意者以為百分有一補於時政唐藝文志應璩有百一詩八巻丹陽集云應璩作百一詩譏切時事徧以示任事者皆恠愕以為應焚弃之及觀文選所載百一篇畧不及時事何耶又觀郭茂倩載百一詩五篇首篇言馬子侯解音律而以陌上桑為鳯將雛二篇傷翳桑二老無以𦵏妻子而巳無宣孟之徳可以賙其急三篇言老人自知桑榆之景斗酒自勞不肯為子孫積財末篇即文選所載第四篇似風諌所為苟欲娯耳目快心樂腹腸我躬不悅歡安能慮死亡此豈非所謂應焚弃之詩乎後何遜亦有擬百一體所謂靈輒困桑下於陵拾李螬其詩一百十字恐出於或者之説然璩詩每篇字數各不同第不過四十字爾下流不可處君子愼厥初名髙不宿著易用受侵誣前者隳官去有人適我閭田家無所有酌醴焚枯魚問我何功徳三入承明廬所占於此土是謂仁智居文章不經國筐篋無尺書用等稱才學徃徃見歎譽避席􅷷自陳賤子實空虗宋人遇周客慙媿靡所如其二室廣以下疑别一首年命在桑榆東嶽與我期長短有常㑹遅速不得辭斗酒多為樂無為待來茲室廣致凝陰臺髙來積陽奈何季世人侈靡在宫牆飾巧無窮極土木被朱光徴求傾四海雅意猶未康其三子弟可不愼愼在選師友師友必長徳中才可進誘雜詩三首廣文選作應瑒今依藝文作應璩細微可不愼隄潰自蟻穴腠理早從事安復勞鍼石哲人覩未形愚夫闇明白曲突不見賔燋爛為上客思願獻良規江海倘不逆狂言猶寡善猶有如雞跖雞跖食不已齊王為肥澤穴一作隟跖一作肋其二散騎常師友朋夕進規獻侍中主喉舌萬機無不亂尚書統庻事官人乘法憲彤管弭納言貂璫表武弁出入承明廬車服一何煥三寺齊榮秩百僚所瞻願其三少壯面目澤長老顔色麤麤醜人所惡㧞白自洗蘇三叟古有行道人陌上見三叟年各百餘歳相與鋤禾莠住車問三叟何以得此壽上叟前致辭内中嫗貌醜中叟前致辭量腹節所受下叟前致辭夜臥不覆首要哉三叟言所以能長久古一作昔内中一作室内百一詩一名新漢末桓帝時郎有馬子侯自謂識音律請客鳴笙竽為作陌上桑反言鳯將雛左右偽稱善亦復自揺頭馬子侯為人頗癡自謂曉音律黄門樂人更徃嗤誚子侯不知名陌上桑反言鳯將雛輒揺頭欣喜多賜左右錢帛無復慙色又郡國募將士馳騁習弓㦸雖妙未更事難用應卒迫又人材不能備各有偏短長稱可小入中便辟必知芒又秋日苦作短遥夜邈綿綿貧士感此時慷慨不能眠又茍欲娯耳目快心樂腹腸我躬不悦歡安能慮死亡遺句貞偽各有分駑驥不齊鑣竈下炊牛矢甑中裝豆飱醉酒巾幘落頂秃赤如狐革帶繩為績履舄穿無底嵐山寒折骨面目盡生瘡豐隆窮美味獨食有何甘有酒流如川有肴積如岑此二句亦作應瑗侍公晏詩漢魏六朝百三家集巻三十三
