body:
  text: 漢魏六朝百三家集卷九十六梁劉孝綽集題詞王元禮七葉之中爵位文才蟬聫不絶劉孝綽一家子姓能文者七十人門世之盛足使安平無崔汝南無應當日昭明太子愛重文學元禮孝綽同被賔遇執袖撫肩方之浮丘洪崖兩賢何相若也元禮通顯竟至白首遭亂墮井非云不夀孝綽一官屢蹶少妹貽糾束絹開訟祕書長逝不滿六十原其著作齊騁祿位中隔一者性多可一者性多怪也孝綽文集數十萬言存者無幾零落之歎無異元禮書啓表序文采較優詩乃兄弟爾元帝為孝綽墓銘云鶴開阮瑀鵬翥楊修身兹惟屈扶搖未申夫祕書摧輪未若阮楊而當時見屈者亦悲其樂賢圖像絶域聞名有公輔之資而抱箕斗之怨到洽凶終劉覽內噬朋友兄弟寧無一可乎而偏扼其吭則胡為也孝綽以詩失黃門復以詩得黃門風開風落應遇皆然知無恤於人之多言矣目録表為鄱陽嗣王初讓雍州表啓謝髙祖啓與東宫啓謝為東宫奉經啓謝給藥啓謝越布啓送瑞鼎詣相國梁公啓求豫北伐啓謝晉安餉米等啓謝安成王賚祭孤石廟胙肉啓書答湘東王書答雲法師書與弟書序昭明太子集序碑司空安成王碑栖隱寺碑樂府釣竿篇夜聽妓賦得鳥夜啼銅雀妓班媫妤怨三婦豔棹歌行詩詠風侍宴又三日侍華光殿曲水宴三日侍安成王曲水宴春日從駕新亭應制侍宴集賢堂應令侍宴餞庾於陵應詔侍宴餞張惠紹應詔餞張惠紹應令侍宴離亭應令奉和昭明太子鍾山解講和湘東王理訟陪徐僕射晚宴上虞鄉亭觀濤津渚學潘安仁河陽縣詩太子洑落日望水登陽雲樓夕逗繁昌浦櫟口守風還渡浙江江津寄劉之遴發建興渚示到陸二黃門酬陸長史倕答何記室答張左西歸沐呈任中丞昉憶虞弟淇上戲蕩子婦愛姬贈主人為人贈美人遙見鄰舟主人投一物衆姬爭之有客請余為詠古意報王永興觀田詠有人乞牛舌乳不付因餉檳榔詩夜不得眠望月有所思校書祕書省對雪詠懷詠百舌侍宴擬劉公幹應令賦詠百論捨罪福詩賦得照棊燭詩刻五分成同武陵王看妓賦得遺所思林下映月詠素蝶於座應令詠梨花秋雨卧疾奉和湘東王應令二首春霄冬曉月半夜泊鵲尾和詠歌人偏得日照詩詠姬人未肯出遙見美人採荷詠小兒採菱詠眼詠日應令望月秋夜詠琴賦得始歸鴈元廣州景仲座見故姬一首擬古聫句漢魏六朝百三家集卷九十六目録欽定四庫全書漢魏六朝百三家集卷九十六明張溥輯梁劉孝綽集表為鄱陽嗣王初讓雍州表臣聞大邦維屏既慙宗子之詩思樂泮宫有缺僖公之頌特以周興九伯錫壤參虛漢啓二河分圭舊楚身私家慶總集微躬雍部襟帶跨制數州西拒嶢關北跨鄧塞雖復呼韓來朝稿街納質二虜尋戈四郊無警猶當王戎雅識羊祜尚義臣退求諸已無或宴安進思盡忠幾乎私竭啓謝高祖啓臣不能銜珠避顛傾柯衛足以兹疏悻與物多忤兼逢匿怨之友遂居司𨽻之官交構是非用成萋斐日月昭回俯明枉直獄書每御輒鑒蔣濟之寃炙髮見明非關陳正之辨遂漏斯密網免彼嚴棘得使還同士伍比屋唐民生死肉骨豈侔其施臣誠無識孰不戴天疏逺畝隴絶望高闕而降其接引優以旨喻於臣微物足為榮隕况剛條落葉忽沾雲露周行所置復齒盛流但雕杇糞徒成延奬捕影繫風終無效答與東宫啓臣聞之先聖以衆惡之必監焉衆好之必監焉豈非孤特則積毁所歸比周則積譽斯信知好惡之間必待明鑒故晏嬰再為阿宰而前毁後譽後譽出於阿意前毁由於直道是以一犬所噬旨酒貿其甘酸一手所搖嘉樹變其生死又鄒陽有言士無賢愚入朝見嫉至若臧文之下展季靳尚之放靈均絳侯之排賈生平津之陷主父自兹厥後其徒實繁曲筆短辭不暇殫述寸管所窺常由切齒殿下誨道觀書俯同好學前載枉直備該神覽臣昔因立侍親承緒言飄風貝錦譬彼讒慝聖旨殷勤深以為歎臣資愚履直不能杜漸防微曾未幾何逢訧罹難雖吹毛洗垢在朝而同嗟而嚴文峻法肆姦其必奏不顧賣友志欲要君自非上帝運超已之光昭陵陽之虐舞文虛謗不取信於宸明在縲嬰纆幸得蠲於庸暗裁下免黜之書仍頒朝會之旨小人未識通方縶馬懸車息絶朝覲方願滅影銷聲遂移林谷不悟天聽罔已造次必彰不以距違見疵復使引籍雲陛降寬和之色垂布帛之言形之千載所蒙已厚况乃恩等特召榮同起家望古自惟彌覺多忝但未渝丹石永藏輪軌相彼工言搆兹媒諓且款冬而生已凋柯葉空延德澤無謝陽春謝為東宫奉經啓皇太子四術夙知三善非學猶復旁求儒雅應物稽疑業光夏校德茂周庠諸侯宋魯於焉觀則參陪盛禮莫非國華臣雖職典經圖而同官不一推擇而舉尚多髦俊寵光曲被獨在選中他日朝聞猶甘夕死况兹恩重彌見生輕謝給藥啓一物之微遂留停育名醫上藥爰自城府雖巫咸視診岐伯下針松子玉漿衛卿雲液比妙衆珍實云多愧謝越布啓比納方綃既輕且麗珍邁龍水妙越鳥夷送瑞鼎詣相國梁公啓生木遊火之禽夾階紀朔之華白環銀甕之迹素雉金船之瑞自天有祚不為定於郟鄏虛其所止非獨在於汾陰求豫北伐啓或以臣素無飛將之目未從嫖姚之伍言易行難收功理絶然桓沖稱謝安無將略文靖公遂破苻堅山濤諳羊祐不強建成侯卒平孫皓微臣之譬兩賢誠無等級小虜之方二寇勢踰枯朽謝晉安餉米等啓傳詔李孟孫宣教旨垂賜米酒瓜筍葅脯鮓茗八種氣苾新城味芳雲杜江潭抽節邁昌荇之珍壃場擢翹越葺精之美羞非純束野麏裛似雪之驢鮓異陶瓶河鯉操如瓊之粲茗同食缺酢類望甘免千里宿舂省三月糧聚小人懷惠大懿難忘謝安成王賚祭孤石廟胙肉啓味過瀹鳯珍越屠龍故使屏翳收風馮夷淨浪神居鷁首獨泛安流民幸同附得徵遘忤復等受釐預頒純嘏恩靈所降信次委積報生以死竊聞斯義書答湘東王書伏承自辭皇邑爰至荆臺未勞刺舉且摛高麗近雖預觀尺錦而不睹金玉昔臨淄詞賦悉與楊修未殫寶笥顧慙先哲渚宫舊俗朝衣多故李固之薦二邦徐珍之奏七邑威懷之道兼而有之當欲使金石流功恥用翰墨垂迹雖乖知二偶達聖心爰自退居素里却掃窮閈比楊倫之不出譬張摰之杜門昔趙卿窮愁肆言得失漢臣鬱志廣敘盛衰彼此一時擬非其匹竊以文豹何辜以文為罪繇此而談又何容易故韜翰吮墨多歷寒暑既闕子幼南山之歌又微敬通渭水之賦無以自同獻笑少酬褒誘且才乖體物不擬作於玄根事殊宿諾寧貽愳於朱亥顧己反躬載懷纍息但瞻言漢廣邈若天涯區區一念分宵九逝殿下降情白屋存問相尋食椹懷音矧伊人矣答雲法師書孝綽和南辱誨垂示勑旨所答劉太僕思效啓義窮深逺語兼巧便伏聞希有身心踴躍昔戈盾夾車備不虞於周后兵旗引駕防未然於漢君斯皆執心黃屋瑞無紺馬事極寰宇之中理隔天人之外皇上自兹善覺降迹閻浮以住地之心行則天之化故能慈導三有仁濟萬物猶以法藥未周寶船不倦解劒却蓋躬詣道場瑞花承足人觀雕輦之盛金輪啓路物覩重英之飾顯實開權事均祗鷲本無四畏寧慮五怨思效遂虜引梁丘隨劍之説日殫觸瑟之辭何異回龍象於兔徑注江海於牛迹聖旨殷勤曲根誘喻豈直淨一人之垢衣將以破羣生之暗室弟子世傳正見幼覩真言但惑網所縈塵勞自結微因宿植仰逢法教親陪寶座預餐香鉢復得俱聽一音共聞八解庶因小葉受潤大雲猥蒙開示深自慶幸不勝歡喜略附陳誠劉孝綽和南與弟書方𢎞遊典墳寤歌林澗覽興衰於千載觀榮落於四時序昭明太子集序臣竊觀大易重明之象著焉抑又聞之匕鬯之義存焉故書有孟侯之名記表元良之德歷選前古以泊夏周可得而稱啓誦而已雖徹聖挺賢光乎二代高文精義閴爾無聞漢之顯宗晉之肅祖昔自春宫益好儒術或專經止於區易或持論窮於貞假子桓雖摛藻銅省集講肅成事在藩儲理非皇二未有正位少陽多才多藝者也粵我大梁之二十一載盛德備乎東朝若乃有縱自天惟睿作聖顯仁立孝行於四海如圭如璋不因琢磨之義為臣為子寧待觀喻之言惟性道難聞而文章可見故俯同志學用晦生知以弦誦之餘辰總鄒魯之儒墨遍綈緗於七閣彈竹素於九流地居上嗣實副元首皇帝垂拱巗廊委咸庶績時非從守事或監撫雖一日二日攝覽萬幾猶臨書幌而不休對欹案而忘怠况復延納侍講討論經紀去聖滋逺愈生穿鑿枝分葉散殊路偆馳靈臺辟雍之疑禋宗祭社之繆明章申老之議通顏理王之説量核然否剖析同異察言抗論窮理盡微於時淹中稷下之生金華石渠之士莫不過衢樽而挹多少見斗極而曉西東與夫盡春卿之道贊仲尼之宅非賈誼於蘇林問蕭佇於棗據區區前史不亦恧歟加以學貫總持辨同無硋五時密教見猶鏡象一乘妙旨觀若掌珠及在布金之園處如龍之衆開示有空顯揚權實是以遍動六地普雨四化豈直得解攖須提舍鉢瓶沙騰曇言德梵志依風而已哉若夫天文以爛然為美人文以煥乎為貴是以隆儒雅之大成遊雕蟲之小道握牘持筆思若有神曾不斯須風飛雷起至於宴遊西園祖道清洛三百載賦該極連篇七言致擬見諸文學博逸興詠並命從遊書令視草銘非潤色七窮煒燁之説表極逺大之才皆喻不備體詞不掩義因宜適變曲盡文情竊以屬文之體鮮能周備長卿徒善既纍為遲少孺雖疾俳優而已子淵淫靡若女工之蠧子雲侈靡異詩人之則孔璋詞賦曹祖勸其修今伯喈笑贈摯虞知其頗古孟堅之頌尚有似贊之譏士衡之碑猶聞類賦之貶深乎文者兼而善之能使典而不野逺而不放麗而不淫約而不儉獨擅衆美斯文在斯假使王朗報箋卞蘭獻頌猶不足以揄揚著述稱贊才章况在庸才曾何倣佛然承華肇建濫齒時髦居陪出從逝將二紀譬彼登山徒仰峻極同夫觀海莫澄波瀾但職官書記預聞盛藻歌詠不足敢忘編次謹為一帙十卷第目如左日升松茂與天地而偕長壯思英詞隨歲月而增廣如其後録以俟賢臣碑司空安成王碑昔者重華文命並胄高陽之苗豐邑舂陵俱纂帝堯之緒而虞夏革運姚姒之姓已分高光再興大漢之名無改如我皇家梁齊代建異文叔之紹開起自王族非伯禹之更姓公則本枝别幹誕自河嶽五百之期實膺命世卜商有問是謂色難承志望顔在公斯易至如文琰之對食餘幼權之言爵里衛子之朗月映山杜生之凝脂點漆惟公具美歷駕前修峨峨焉非嶽陵之所至浩浩焉總江漢而為長故能擊水三千摶風九萬排天關而俯視掩浮雲而上征皇帝甄名挺聖河洛有徵握衡含樞奄一時夏利建藩屏固葉深根郕霍酆郇方周啓祚封公為安成王食邑二千户允同衛叔賜寶器於商郊殊異唐侯戲桐圭於汾水乃拜公為平西將軍荆州刺史楚之對齊屈完引城池之固荆之比宋墨翟陳輦路之殊品金作貢不異淮海珠璣犀象又無求於晉國况以雲夢九百之宏侈章華三休之巨麗公禦煩以寡居高而降執沖虛之道無矜滿之情其為政也莊敬足以範物慈惠足以庇民剛毅足以威暴清貞足以勵俗天監十七年薨春秋四十有五凡我庶民竊親髙義况復祇承帝命來仕王家兔園晚春叨從者之賜高唐暮天奉作賦之私常愳慶雲之惠不酬而搖落奄至豈謂輕塵之效莫展而峻極先頺思所以立言貞石貽厥長世銘曰昔在文韶五賢二聖漢藩魏屏微風不競於赫我梁德符姬姓康王康叔異時同盛爰自妙年令問不已一孝一悌實光行始義府文場詞人髦士波瀾莫際牆仞難窺用兹先覺導此後知德大心小居高志卑再握不倦三吐忘疲飛龍在天肇基宛瀆地猶小胏民同世復皇情眷正屬難推轂允矣宗英移藩改牧誰謂路永江漢已浮彼蒼不惠遽反成周川回泝舳塗引歸旒栖隱寺碑開方便門示真實相置甘露室遵甘露津苦語軟言隨方𢎞訓俯心降迹逐物重輕中枝小葉各隨業根愍其四流五結有來而不散八慢九邪一淪而莫曉如彼醫王等之藥樹去聖兹逺思聖兹深誠敬所先是歸龕廟自妙法東注寶化西漸公卿貴仕賢哲偉人莫不嚴事招提師仰慧覺欲使法燈永傳勝因長久銘曰給孤焚蕩善勝崩淪堂堂宗匠克紹慧因地雖舊域其宇維新召棠且思羊碑猶泣況我仁祠義踰生立遺愛伊何形於南邑亦有庶民經始攸急珠殿連雲金層輝景衢交達巷門臨樹屏五居推妙三空愧靜銘施柱側記法窟前孰云千載餘迹方傳敢宣重説敬勒雕鐫芬域未滅斯文在旃樂府釣竿篇釣舟畫彩鷁漁子服冰紈金轄茱茰網銀鈎翡翠竿斂橈隨水脈急漿渡江湍湍長自不辭前浦有佳期船交橈影合浦深魚出遲荷根時觸餌菱芒乍罥絲蓮度江南手衣渝京兆眉垂竿自有樂誰能為太師夜聽妓賦得烏夜啼鵾絃且輟弄鶴操暫停徽别有啼烏曲東西相背飛倡人怨獨守蕩子殊未歸忽聞生離唱長夜泣羅衣銅雀妓雀臺三五日弦吹似佳期况復西陵晚松風吹繐帷危絃斷復續妾心傷此時誰言留客袂遂一作翻掩望陵悲班媫妤怨應門寂已閉非復後庭時況在青春日萋萋緑草滋妾身似秋扇君恩絶履綦詎憶遊輕輦從今一作徒令賤妾辭三婦豔大婦縫羅裙中婦料繡文唯餘最小婦窈窕舞昭君丈人慎勿去聽我駐浮雲棹歌行日暮楚江上江深風復生所思竟何在相望徒盈盈舟子行催棹無所喝流聲詩詠風四言嫋嫋秋聲習習春吹鳴兹玉樹渙此銅池羅幃自舉襟袖乃披慙非楚侍濫賦雄雌侍宴外編作任昉者非以下五言清宴延多士鴻漸濫微薄臨炎出蕙樓望辰躋菌閣上征切雲漢俯眺周京洛城寺鬱參差街衢紛漠漠禁林寒氣晚方秋未搖落皇心重發志賦詩追並作自昔承天寵於兹被人爵選言非綺綃可以儷金艧又兹堂乃峭嶠伏檻臨曲池樹中望流水竹裏見攢枝欄高景難蔽岫隱雲易垂邂逅逢休幸朱蹕曳青規丘山不可答葵藿空自知三日侍華光殿曲水宴薰袚三陽暮濯褉元已初皇心眷樂飲帳殿臨春渠豫遊高夏諺凱樂盛周居復以焚林日丰葺花樹舒羽觴環階轉清瀾傍席疏妍歌已嘹亮妙舞復紆餘九成變絲竹百戲起龍魚三日侍安成王曲水宴匯澤良孔殷分區屏中縣躡跨兼流來襟喉邇封甸吾王奄鄷畢析圭承羽傳不資魯俗移何待齊風變東山富遊士北土無遺彥一言白璧輕片善黃金賤餘辰屬上一作元巳清袚追前諺持此陽瀨遊復展城隅宴芳洲亘千里逺近風光扇方歡厚德重誰言薄遊倦春日從駕新亭應制旭日輿輪動言追河曲遊紆餘出紫陌迤邐度青樓前驅掩蘭徑後乘歷芳洲春色江中滿日華巖上留江風傳葆吹巖華映采斿臨渦起睿作駟馬暫停輈侍從榮前阮雍容慙昔劉空然等彈翰非徒嗟未遒侍宴集賢堂應令北閣時既啓西園又已闢宫屬引鴻鷺朝行命金碧伊臣獨何取隆恩徒自昔布武登玉墀委坐陪瑶席綢繆參宴笑淹留奉觴醳壺人告漏晚煙霞起將夕反景入池林餘光映泉石侍宴餞庾於陵應詔皇心眷將逺帳餞靈芝側是日青春獻林塘多秀色芳卉疑綸組嘉樹似雕飾遊絲綴鶯領光風送綺翼下輦朝既盈留宴景將昃高辨競談端竒文爭筆力伊臣獨無伎何用奉吹息侍宴餞張惠紹應詔滄池誠自廣蓬山一何峻麗景花上鮮油雲葉裏潤風度餘芳滿鳥集新條振餞言班俊造光私奬輶吝徒然謬反隅何以窺重仞餞張惠紹應令鮮雲積上月凍雨晦初陽回風飄淑氣落景煥新光竹萌始防露桂挺已含芳瑶階變杜若玉沼發攢蔣聖襟惜岐路曲宴闢蘭堂侍宴離亭應令轘轅東北望江漢西南永羽旗映日移鐃吹臨風警令王愍追送纚舟宴俄頃掩袂眺征雲銜杯惜餘景首燕徒有心局步何由騁奉和昭明太子鍾山解講御鶴翔伊水策馬出王田我后遊祗鷲比事實光前翠蓋承朝景朱旗曳曉煙樓帳縈巖谷緹組曜林阡况在登臨地復及秋風年喬柯變夏葉幽澗潔涼泉停鑾對寶座辨論悅人天淹塵資海滴昭暗仰燈然法朋一已散笳劍儼將旋邂逅逢優渥託乘侣才賢摛辭雖並命遺恨獨終篇和湘東王理訟馮翊亂京兆廣漢欲兼治豈若兼邦牧朱輪褰素帷淮海封畿地雜俗良在兹禁姦擲銖兩馭黠震豺狸陪徐僕射晚宴夫君追宴喜十日遞來過築室華池上開軒臨芰荷方塘交密篠對霤接繁柯景移林改色風去水餘波洛城雖半掩愛客待驪歌上虞鄉亭觀濤津渚學潘安仁河陽縣詩昔余筮賓始衣冠仕洛陽無資徒有任一命忝為郎再踐神仙側三入崇賢旁東朝禮髦俊虛薄厠才良遊談侍名理搦管創文章引籍陪下膳橫經參上庠誰能服事淺契濶變炎涼一朝謬為吏結綬去承光烹鮮徒可習治民終未長化雞仰季智馴雉推仲康此城鄰夏穴橚矗茂筠篁孝碑黃絹語神濤白鷺翔遨遊佳可望釋事上川梁秋江凍雨絶反景照移塘纎羅殊未動駭水忽如湯乍出連山合時如高蓋張漂沙黃沫聚礐石素波揚榜人不敢唱舟子豈能航離家復臨水眷然思故鄉中來不可絶奕奕苦人腸泝洄若無阻謝病返清漳太子洑落日望水川平落日迥落照滿川漲復此一作在淪波地𣲖别引沮漳耿耿流長脈熠熠動微光寒烏逐查漾飢鵜拂浪翔臨泛一作流自多美況乃一作此還故鄉榜人夜理楫棹女暗成粧欲待春江曙爭塗向洛陽登陽雲樓吾登陽臺上非夢高唐客回首望長安千里懷三益顧帷慙入楚降私等申白西沮水潦收昭一作瑕丘霜露積龍門不可見空慕凌寒柏夕逗繁昌浦日入江風靜安波似未流岸回知舳轉解纜覺船浮暮煙生逺渚夕鳥赴前洲隔山聞戍鼓傍浦喧棹謳疑是辰陽宿於此逗孤舟櫟口守風春心已應豫歸路復當歡如何此日風霾曀駭波瀾倐見搖心慘俄瞻鄉路難賴有同舟客移宴息層巒華茵藉初卉芳樽散緒寒謔浪誰云善江流苦未安何由入故園詎即紉新蘭寄謝浮丘子暫欲假飛鸞還渡浙江季秋弦望後輕寒朝夕殊商人泣紈扇客子夢羅襦憂來自難遣況復阻川隅日暮愁陰合繞樹噪寒烏濛漠江煙上蒼茫沙嶼蕪解纜辭東越接軸騖西徂懸帆似馳驥飛棹若驚鳬言歸遊俠窟方從冠蓋衢江津寄劉之遴與子如黃鵠將别復徘徊經過一柱觀出入三休臺共摛雲氣藻同舉霞紋杯佳人每曉遊禁門恆晚開欲寄一言别高駕何由來發建興渚示到陸二黃門外編作吳均題云酬别非扁舟去平樂還顧極川梁猶聞棗下吹尚識杏間堂洛橋分曲渚官寺隱回塘客行裁跬步即事已多傷况復千餘里悲心未遽央酬陸長史倕王粲始一别猶且歎風雲況余屢之逺與子亟離羣如何持此念復為今日分分悲宛一作悵如昨弦望殊揮霍行舟雖不見行程猶可度度君路應逺期寄新詩返相望且相思勞朝復勞晚薄暮閽人進果得承芳信殷勤覽妙書留連披雅韻冽洲一作州財賦總慈山行旅鎮已切臨眺情遽動思歸引歸與不可即前途方未極覽諷欲諼誚研尋還慨息來喻朂雕金比質非所任虛薄無時用徘徊守故林屏居青門外結宇灞城陰竹庭已南映池牖復東臨喬柯貫簷上垂條拂户陰條開風暫入葉合影還沉帷屏溽早露階霤擾昏禽衡門謝車馬賓席簡衣簮雖愧陽陵一作春曲寧無流水琴蕭條聊屬和寂寞少知音平生竟何託懷抱共君深一朝四美廢方見百憂侵曰余濫官守因之泝廬久一作九水接淺原陰山帶荆門右從容少職事疲病疏僚友命駕獨尋幽淹留宿廬阜廬阜擅高名岧岧凌太清舒雲類紫府標霞同赤城北上輪難進東封馬易驚未若兹山險車騎息逢迎山橫路似絶徑側樹如傾蒙籠乍一啓磊硊無暫平倚巖忽回望援蘿遂上征乍觀秦帝石復憩周王城交峰隱玉霤對澗距金楹風傳鳯臺琯雲渡洛賓笙紫書時不至丹爐且未成無因追羽翮及爾宴蓬瀛蓬瀛不可託悵然返城郭時過馬鳴院偶憩鹿園閣既異人世勞聊比化城樂影塔圖花樹經臺總香藥月殿曜朱幡風輪和寶鐸園楥一作垣即重嶺階基仍巨壑朝猿一作湲響甍棟夜水聲帷薄餘景騖登臨方宵盡談謔談謔有名僧慧義似傳燈逺師教逾闡生公道復𢎞小乘非汲引法善招報能積迷頓已悟為歡得未曾為歡誠已往坐臥猶懷想況復心所積一作親兹地多諧賞惜哉無輕軸更泛輪湖上可思不可見離念空盈蕩賈生傳南國平子相東阿優遊匡贊罷縱橫辭賦多方才幸同貫無令絶詠歌幽谷雖云阻煩君計吏過答何記室遊子倦飄蓬瞻途杳未窮晨征凌迸水暮宿犯頺風出洲分去燕向浦逐歸鴻蘭芽隱陳葉荻苖抽故叢忽憶園間栁猶傷江際楓吾生棄武騎高視獨辭一作餘一雄既殫孝王産兼傾卓氏僮罷籍睢陽囿陪謁建章宫紛余似鑿枘方圓殊未工黑貂久自弊黃金屢已空去辭追楚穆還耕耦漢馮巧拙良為異出處嗟莫同若厭蘭臺右見訪灞陵東答張左西相思如三月相望非兩宫持此連枝樹暫作背飛鴻若人惠思我摛藻蔚雕蟲仙掌方晞露靈烏正轉風方假排虛翮相與北山叢歸沐呈任中丞昉南史云孝綽天監初為著作郎為歸沐詩以贈任昉即此步出金華省還望承明廬壯哉宛洛地佳麗實皇居虹霓拖飛閣蘭芷覆清渠圓淵倒荷芰方鏡寫簮裾白雲夏峰盡青槐秋葉疏自我從人爵蟾兔屢盈虛殺青徒已汗司舉未云書文昌愧通籍臨卭幸第如夫君多敬愛蟠木濫吹噓時時釋簿領騶駕入吾廬自唾誠䃤砆無以儷璠璵但願長間暇酌醴薦焚魚憶虞弟下邑非上郡徒然想二馮余慙野王德爾朂聖鄉風望望餘塗盡悽悽良宴終朝蔬一不共夜被何由同淇上戲蕩子婦桑中始奕奕淇上未湯湯美人要雜佩上客誘明璫日暗人聲靜微步出蘭房露葵不待勸鳴琴無暇張翠叉挂已落羅衣拂更香如何嫁蕩子春夜守空牀不見青絲騎徒勞紅粉粧愛姬贈主人卧久疑粧脫鏡中私自看薄黛銷將盡凝朱半有殘垂叉繞落鬢微汗染輕紈同羞不相難對笑更成歡妾心君自解挂玉且留冠為人贈美人巫山薦枕日洛浦獻珠時一遇便如此寧關先有期幸非使君問莫作羅敷辭夜長眠復坐誰知暗斂眉欲寄同花燭為照遙相思遙見鄰舟主人投一物衆姬爭之有客請余為詠河流既浼浼河鳥復關關落花浮浦出飛雉度洲還此日倡家女競嬌桃李顔良人惜美珥欲以代芳菅新縑疑故素盛趙蔑衰班曳綃爭掩縠搖佩奮一作奪鳴環客心空振蕩喬枝不可攀古意燕趙多佳麗白日照紅粧蕩子十年别羅衣雙帶長春樓怨難守玉階空自傷復一作對此歸飛燕銜泥繞曲房差池入綺幕上下傍雕梁故居猶可念故人安可忘相思昏望絶宿昔夢容光魂交忽在御轉側定他鄉徒然顧枕席誰與同衣裳空使蘭膏夜炯炯對繁霜報王永興觀田重門寂已暮案牘罷囂塵輕涼生筍席微風起扇輪浮瓜聊可貴溢酒亦成珍復有寒泉井兼以瑩心神眷彼忘言客間居伊洛濱顧已慙困地徒知薑桂辛但願崇明德無謂德無鄰詠有人乞牛舌乳不付因餉檳榔詩陳乳何足貴爛石不成珍空持渝皓齒非但汙丹唇别有無枝實曾要湛上人羞比朱櫻熟詎易紫梨津莫言蒂中久當看心裏新微芳雖不足含咀願相親夜不得眠夜久愁反覆懷抱不能裁披衣坐惆悵當户立徘徊風音觸樹起月色度雲來夏葉依忩落秋花當户開光陰已如此復持憂自催望月有所思秋月始纖纖微光垂步簷朣朧入牀簞髣佛鑒窗簾簾螢隱光息簾蟲映光織玉羊東北上金虎西南昃長門隔清夜高堂夢容色如何當此時懷情滿胸臆校書祕書省對雪詠懷桂華殊皎皎柳絮亦霏霏詎比咸池曲飄颻千里飛恥均班女扇羞儷曹人衣浮光亂粉壁積照朗彤闈鶺鴒搖羽至鵯鶋拂翅歸相彼猶自得嗟余獨有違終朝守玉署方夜勞石扇未能奏緗綺何由辨國圍坐銷風露質遊聯珠璧暉偶懷笨車是良知高蓋非既言謝端木無為陳巧機詠百舌山人惜春暮旭旦坐花林復值懷春鳥枝間弄好音遷喬聲迥出赴谷響幽深下聽長而短時聞絶復尋孤鳴若無對百囀似羣吟昔聞屢歡昔今聽忽悲今聽聞非殊異遲暮獨傷心侍宴擬劉公幹應令副君西園宴陳王謁帝歸列位華池側文雅縱橫飛小臣輕蟬翼黽勉謬相追置酒陪朝日淹留望夕霏賦詠百論捨罪福詩尋因途乃異及捨趣猶并苦極降歸樂樂極苦還生豈非輪轉愛皆緣封著情一知心相濁樂染法流清賦得照棊燭詩刻五分成南皮絃吹罷終奕且留賓日下房櫳暗玉臺作閉華燭命佳人側光全照局回花半隱身不辭纖手倦羞令夜向晨同武陵王看妓燕姬奏妙舞鄭女發清歌回羞出曼臉送態表嚬蛾寧殊遇行雨詎減見凌波想君愁日落應羡魯陽戈賦得遺所思遺簪雕玳瑁贈綺織鴛鴦未若華滋樹交枝蕩子房别前秋已落别後春更芳所思不可寄唯憐盈袖香林下映月明明三五月垂影堂高樹攢柯半玉蟾裛葉彰金兒兹林有夜坐嘯歌無與晤側光聊可書含毫且成賦詠素蝶隨蜂繞緑蕙避雀隱青薇映日忽爭起因風乍共歸出沒花中見參差葉際飛芳華幸勿謝嘉樹欲相依於座應令詠梨花玉壘稱津潤金谷詠芳菲詎匹龍樓下素蕊映華一作朱扉雜雨疑霰落因風似蝶飛豈不憐飄墜願入九重闈秋雨臥疾賈君徭役少潘生民務稀及此同多暇高臥掩重闈寂寂桑榆晚滂沱曀不晞電隙時光帳風簾乍扣扉奉和湘東王應令二首春宵春宵猶自長春心非一傷月帶圓樓影風飄花樹香誰能對雙燕暝暝守空牀冬曉冬曉風正寒偏念客衣單臨粧罷鉛黛含淚剪綾紈寄語龍城下詎知書信難月半夜泊鵲尾客行三五夜息棹隱中洲月光隨浪動山影逐波流和詠歌人偏得日照詩獨明花裏翠偏光粉上津屢將歌罷扇回拂影中塵詠姬人未肯出帷開見叉影簾動聞釧聲徘徊定不出常羞華燭明遙見美人採荷菱莖時繞釧棹水或沾粧不辭紅袖濕唯憐緑葉香詠小兒採菱採菱非採菉日暮且盈舠踟蹰未敢進畏欲比殘桃詠眼含嬌􅝇已合離怨動方開欲知密中意浮光逐笑回詠日應令弭節馳暘谷照檻出扶桑園葵亦可幸傾葉奉離光望月輪光缺不半扇影出將圓流光照漭漾波動映淪漣秋夜詠琴上宫秋露結上客夜琴鳴幽蘭暫罷曲積雪更傳聲賦得始歸鴈洞庭春水緑衡陽旅鴈歸差池高復下欲向龍門飛元廣州景仲座見故姬一首雜言留故夫不踟蹰别待春山上相看採蘼蕪擬古聯句少知雅琴曲好聽雅琴聲雅琴不可聽一聽一沾纓漢魏六朝百三家集卷九十六
