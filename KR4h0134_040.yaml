body:
  text: 漢魏六朝百三家集卷四十晉張華集題詞張壯武博物君子晉室老臣彌縫暗主虐后之間足稱補衮竟以猶豫族誅橫尸前殿悲哉壯武初未知名作鷦鷯賦以寄意感其不才善全有莊周木鴈之思既賦相風朽社亦躊躇於在高戒險盛衰交心及陟台司不祥數見中台星坼少子韙勸其遜位猶戀弗忍決漢王京兆不念牛衣遂沉牢獄然死以直諌誠重泰山壯武豈忘牧羊時乎名位已極篤於守經徒為賈氏而死適資人口耳朝氏書目云張司空集有詩一百二十哀詞册文二十一賦三今余所綴輯賦數過之文不及全詩歌八十餘中間拂舞白紵舞杯槃舞諸篇晉代無名氏之作藏書家本亦有繫之張司空集者然觀其壯健頓挫類非司空溫麗之素餘詩平雅近代詩家深貶其博學為纍豈所謂聽古樂而卧乎壯武文章賦最蒼深文次之詩又次之大抵去漢不逺猶存張蔡之遺詩藪論詩晉以下若茂先勵志廣微補亡季倫吟歎等曲尚有前代典刑余於司空諸文亦云目録賦鷦鷯賦有序歸田賦相風賦有序永懷賦感婚賦有序朽社賦瓌材枕賦豆羮賦表上壽食舉歌詩表薦成公綏表議封禪議晉文王諡議廢黜武悼楊太后議哀䇿武帝哀䇿文武元楊皇后䇿文誄章懷皇后誄魏劉驃騎誄列文先生鮑𤣥泰誄針女史針大司農針尚書令針瓌材枕針銘倚几銘杖銘書與禇陶書報雷煥書暫西帖問甲乙問序博物志序贊博物志地理略贊樂歌晉四廂樂歌王公上壽詩食舉東西廂樂詩其二其三其四其五其六其七其八其九其十其十一正旦大㑹行禮詩其二其三其四晉冬至初嵗小㑹歌晉宴㑹歌晉中宫所歌晉宗親㑹歌晉正德大豫舞歌正德舞歌大豫舞歌晉凱歌命將出征歌勞還師歌晉白紵舞歌詩其二其三晉杯槃舞歌詩拂舞歌三首白鳩篇獨漉篇濟濟篇詩遊獵篇遊俠篇博陵王宫俠曲其二門有車馬客行輕薄篇壯士篇蕭史曲祖道征西應詔詩祖道趙王應詔詩太康六年三月三日後園㑹詩其二其三其四上已篇勵志詩其二其三其四其五其六其七其八其九答何劭其二其三情詩其二其三其四其五感婚詩雜詩其二其三擬古遊仙詩其二其三贈摯仲洽詩招隱其二荷詩橘詩漢魏六朝百三家集卷四十目録欽定四庫全書漢魏六朝百三家集卷四十明張溥輯晉張華集賦鷦鷯賦有序鷦鷯小鳥也生於蒿萊之間長於藩籬之下翔集尋常之內而生生之理足矣色淺體陋不為人用形微處卑物莫之害繁滋族類乘居匹遊翩翩然有以自樂也彼鷲鶚鵾鴻孔雀翡翠或陵赤霄之際或託絶垠之外翰舉足以冲天觜距足以自衛然皆負矰嬰繳羽毛入貢何者有用於人也夫言有淺而可以託深類有微而可以喻大故賦之云爾何造化之多端兮播羣形於萬類惟鷦鷯之微禽兮亦攝生而受氣育翩翾之陋體兮無𤣥黃以自貴毛弗施於器用兮肉不登乎俎味鷹鸇過猶俄翼兮尚何懼於罿罻翳薈䝉蘢是焉遊集飛不飄揚翔不翕習其居易容其求易給巢林不過一枝每食不過數粒棲無所滯遊無所盤匪陋荆棘匪榮茝蘭動翼而逸投足而安委命順理與物無患伊兹禽之無知兮何處身之似智不懷寶以賈害兮不飾表以招纍靜守約而不矜動因循以簡易任自然以為資無誘慕於世僞鵰鶡介其觜距鵠鷺軼於雲際鵾雞竄於幽險孔翠生於遐裔彼晨鳬與歸鴈又矯翼而增逝咸美羽而豐肌故無罪而皆斃徒銜蘆以避繳終為戮於此世蒼鷹鷙而受紲鸚鵡慧而入籠屈猛志以服養塊幽縶於九重變音聲以順㫖思摧翮而為庸戀鍾岱之林野慕壠坻之高松雖蒙幸於今日未若疇昔之從容海鳥爰居避風而至條枝巨雀踰嶺自致提挈萬里飄颻逼畏夫唯體大妨物而形瓌足瑋也隂陽陶蒸萬品一區巨細舛錯種繁類殊鷦螟巢於蚊睫大鵬彌乎天隅將以上方不足下比有餘普天壤而遐觀吾又安知其大小之所如歸田賦隨隂陽之開闔從時宜以卷舒冬奧處以城邑春遊放於田廬歸郟鄏之舊里託言靜以閒居育草木之藹蔚因地勢之丘墟豐蔬果之林錯茂桑麻之紛敷用天道以取資行藥物以為娛時逍遙於洛濱聊相羊以縱意目白沙與積礫玩衆卉之同異揚素波以濯足泝清瀾以蕩思低徊往留棲遲菴藹存神忽微遊精域外藉纎草以為茵援垂陰以為蓋瞻高鳥之陵風臨鯈魚於清瀨眇萬物而逺觀修自然之通㑹以退足於一壑故處否而忘泰相風賦有序大史候部有相風在西城上而作者弗為豈以其託處幽閒違衆特立無羽毛之飾而丹漆不為之容乎蓋在先聖衜濟生人擬論天地錯綜明神在璿璣以齊七政象渾儀於陶鈞考古旁於六氣仰貞觀於三辰爰在保章世序其職辨風候方必立唯極循物致用器不假飾眇修幹之迢迢淩高墉而莖植𤣥烏偏其增翥睎雲霄而矯翼嘉創制之窮理諒器淺而事深步元氣於尋木寄先識於兹禽既在高而思危又戒險而自針雖回易之無常終守正而不淫永格立以彌世志淹滯而愈新超無返而特存差偶景而為鄰永懷賦美淑人之妖豔因盼睞而傾城揚綽約之麗姿懷婉娩之柔情超六列於往古邁來今之清英既惠余以至歡又結我以同心交恩好之欵固接情愛之分深誓中誠於皎日要執契以斷金嗟夫天衜幽昧差錯繆於參差怨祿運之不遭雖義結而絶離執纒綿之篤趣守德音以終始邀幸㑹於有期冀容華之我俟儻皇靈之垂仁長收歡於永已感婚賦有序方今嵗在已巳將次四仲婚姻者競赴良時粲麗之觀相繼於路嫁娶之㑹不乏乎目乃作感婚賦曰彼婚姻之俗忌兮惡當梁之在斯逼來年之將至兮逮星紀之未移窈窕初茂玉質始盛容華外豐心神內正接軫連騎隱隱習習充街塞里暉曜城邑相麗姿之綽約兮遙髣佛以感心怨佳人之幽翳兮恨檢防之高深一本無彼婚姻四句朽社賦有序高柏橋南大道傍有古槐樹蓋數百年木也余少居近之後去行路遇之則已朽意有緬然輒為之賦因以言衰盛之理云爾伊兹槐之挺植於京路之東隅得託尊於田主據爽塏以高居垂重隂於道周臨大路之通衢饗春秋之所報應豐胙於無射歷漢京之康樂踰喪亂之橫逆朱夏當陽蓊藹蕭森征夫雲㑹行旅歸心輶軒停蓋輕輿託陰吉人向風而祛袂王孫清嘯而啓襟睎甘棠之廣覆褊喬木之無陰瓌材枕賦一作張紘有卓爾之殊瓌超詭異之邈絶且其材色也如藝之黃其為香也如蘭之芳其文彩也如霜地而金莖紫葉而紅榮有若蒲桃之蔓延或如兔絲之煩縈有若嘉禾之垂穎又似靈芝之吐英其似木者有類桂枝之䦨干或象灌木之叢生其似鳥者或似驚鶴之徑逝或類鴻鶤之上征有若孤雌之無咮或效鴛鴦之交頸紛雲興而氣蒸般星羅而流精何衆文之炯朗灼倏爚而發明曲有所方事有所成每則異姿動各殊名衆夥不可殫形制為方枕四角正端㑹緻密固絶際無間形妍體法既麗且閒高卑得適辟堅每安不屑朱碧之飾助不煩錐鋒之鐫鏤無丹漆之彤朱罔觹象之佐副較程形而靈露衆妙該而悉備圭璋特逹璵璠富也美梓逡巡不敢與竝相思庶幾睎風於末列神龍之姿衆鱗相絶昔詩人稱角枕之粲季世加以錦繡之飾皆比集異物費日勞力傷財害民有損於德豈如兹瓌既剖既斫斯須速成一材而莫與混并纎微無加而美曄春榮豆羮賦一作張翰乃有孟秋嘉菽垂枝挺莢是刈是穫充簞盈篋香鑠和調周疾赴急時御一杯下咽三嘆時在下邑頗多艱難空匱之厄固不綴歡追念昔日啜菽永安表上壽食舉歌詩表太始五年尚書奏使太僕傅𤣥中書監荀朂黃門侍郎張華各造正旦行禮及王公上壽酒食舉樂歌詩華上表朂以魏氏歌詩二三四五言與古詩不類以問司律中郎將陳頎曰被之金石未必皆當故朂造晉歌皆為四言唯王公上壽酒一篇為三言五言此則華朂所明異㫖也案魏上壽食舉詩及漢氏所施用其文句長短不齊未皆合古蓋以依詠弦節本有因循而識樂知音足以制聲度曲法用率非凡近所能改二代三京襲而不變雖詩章詞異興廢隨時至其韻逗曲折皆繫於舊有繇然也是以一皆因就不敢有所改易薦成公綏表竊見處士東郡成公綏年二十五字子安體圭璋之資秉不器之量知深慮明足以妙見研思篤好則仲舒之精引之闕世貞幹足以敦風篤俗淵才逹學足以𢎞導世教固逸倫之殊俊搢紳之檢式也議封禪議海內歸心符瑞之應備物之盛未有若今之盛者正宜禮中嶽封太山禪梁父發德號明至尊厚福慶篤黎民闕肇自生人則有后辟載化之數莫之能紀大德齊代揮揚仁風晉文王諡議殊位盛禮實隆明德班爵崇寵亦光茂勳至於表名贈號世考洪烈冠聲無窮者莫尚于號諡也論功高于禹稷比德邁於伊周廢黜武悼楊太后議賈后既誅后父楊駿因宣言太后同逆諷羣公有司奏太后亦宜廢黜惠帝詔曰此大事更詳之華為中書監議稱武帝皇后不從遂廢為庶人弒之夫婦之道父不能得之於子子不能得之於父皇太后非得罪於先帝者也今黨其所寵為不母於聖世宜依漢廢趙太后為孝成后故事貶太后之號還稱武皇后居異宫以全貴終之恩黨其所寵后傳作黨惡所親異宫作離宫哀䇿武帝哀策文感大饗之無虧哀樽俎之虛設叩龍輴以長呌痛靈暉之潜逝其辭曰欽惟皇考體道之真德侔乾坤齊曜三辰應期登禪協於天人上䖍郊祀下惠兆民憲章唐虞允得其津搜揚仄陋故老是賓百揆時序盛業日新恩從雲翔威猶霆震江海靜波岷嶽無塵四夷率服莫不來臣肅慎奉貢越裳效珍化此弊俗歸之至淳昔在上聖咸享百年哀哀皇考用不是臻遘厲彌侵景命殞顛舍此昭晰即彼幽𤣥仰瞻靡怙廓若無天終制尚儉率由典度華幕弗陳器必陶素不封不樹所在惟固貽法來世是則是慕大隧既啓吉日將征鐘鼓雷震白虎抗旌龍螭驤首良駟悲鳴倡者振鐸挽夫齊聲背此崇殿將適下庭𤣥宫窈窕修夜冥冥光燈永戢幽闥長扄仰訴皇穹零淚屏營云誰能忍寄之我情結心墳隴永憑聖靈武元楊皇后哀䇿文天地配序化成兩儀王假有家道在伉儷姜嫄佐嚳二妃興媯仰希古昔冀亦同規今胡不然景命夙虧嗚呼哀哉我應圖籙臨統萬方正位於內實在嬪嬙天作之合駿發其祥河嶽降靈啓祚華陽奕世豐衍朱紼斯煌纘女惟行受命溥將來翼家邦憲度是常緝熙隂教德聲顯揚昔我先妣暉曜休光后承前訓奉述遺芳宜嗣徽音繼序無荒如何不弔背世隕喪瑶齊無主長去蒸嘗追懷永悼率土摧傷鳴呼哀哉陵兆既窆將遷幽都宵陳夙駕元妃其徂宫闈遏密階庭空虛設祖布紼告駕啓途服翬䄖狄寄象容車金輅暗藹裳帳不舒千乘動軫六驥踟蹰銘旌樹表翣柳雲敷祁祁同軌岌岌蒸徒孰云不懷哀感萬夫寧神虞卜安體𤣥廬土房陶簋齊制遂初依行紀諡聲被八區雖背明光亦歸皇姑沒而不朽世德作謨鳴呼哀哉誄章懷皇后誄自天陶靈必有徴祥誕在初載亦曜神光顯應天祿聿嬪聖皇受氣自然實聽清和內含茂質外發英華身處宸極敬恭惟夙窈窕淑媚柔順婉穆宣慈內政流化太微六宫變雅清我壼闈經綸庶屬積思萬幾既臻緝熙𤣥澤流衍將翼我后登封降禪氛祲告妖沉結彌留奄忽升遐棄世高遊聖上哀懷感切悼心率土高素遏密八音眇眇遊靈將焉所之容光幽邁豈有反期杳杳新宫下絶三泉茫茫陵域合體中原委棄暉章即安太清魏劉驃騎誄昔在殷周惟伊惟吕穆穆公侯紹兹勳緒如何上天殱我鼎輔金剛玉潤水潔冰清郁郁文彩煥若朝榮功遂身退致仕懸輿志邈留侯心邁二疏風凛凛以翼衡雲霏霏以承蓋旐聨翩以飄颻旌繽紛以奄薄列文先生鮑𤣥泰誄於鑠列文續蕤皇祚夏后基命靈根巳固杞鄫既微枝離葉布爰暨叔牙世贊齊風翼桓濟管遂登霸功越在漢隆三司竝蹤烈考中丞妙世顯名峩峩先生誕資英俊淑質清淳蘭芳玉潤抗行崇邈遊心大順允文允明聰昭秀哲啓冥演幽守文命世抱道冲虛執義貞厲棲遲無悶不營不忮擬志雲霄致命窮逹行為範軌言成隱括宜登遐年𢎞此徽猷濟濟縉紳永挹清流取識遺音日想表儀孰云𤣥泰曽不我知感傷慷慨揮涕滲澌已矣鮑子寧爾𤣥隂振聲竹帛永播徽音針女史針惠帝時華懼后族之盛作女史針以諷茫茫造化兩儀始分散氣流形既陶既甄在帝庖犧肇經天人爰始夫婦以及君臣家道以正而王猷有倫婦德尚柔含章貞吉婉娩淑慎正位居室樊姫感莊不食鮮禽衛女矯桓耳忘和音志厲義高而二主易心𤣥熊攀檻馮媛趨進夫豈無畏知死不吝班妾有辭割歡同輦夫豈不懷防微慮逺道罔隆而不殺物無盛而不衰日中則昃月滿則微崇猶塵積替若駭機人咸知飾其容而莫知飾其性性之不飾或愆禮正斧之藻之克念作聖出其言善千里應之茍違斯義同衾以疑出言如微而榮辱由兹勿謂幽昧靈鑒無象勿謂𤣥漠神聽無響無矜爾榮天道惡盈無恃爾貴隆隆者墜鑒於小星戒彼攸遂比心螽斯則繁爾類歡不可以瀆寵不可以專專實生慢愛極則遷致盈必損理有固然美者自美翩以取尤冶容求好君子所仇結恩而絶職此之由故曰翼翼矜矜福所以興靖恭自思榮顯所期女史司針敢告庶姬造化一作元化大司農針家有廬井王有廪籍阜茂豐物和鈞關石在周之室不䖍政首棄稷弗修不籍千畝匱神乏祀敗於戎醜穡臣司農敢告左右一本無家有廬井四句尚書令針一刻摰虞明明先王開國承家作制垂憲仰觀列曜俯令百官政用罔愆昔舜納大麓七政以齊內成外平而風雨不迷仲山翼周靡剛靡柔補我衮闕闡我王猷王猷允塞而四海咸休雖曰聖明必資良材無曰我智官不任能發言如絲其出成綸千里之應樞機在身世季道缺天綱縱替既無老成改舊法制法制不修不長厥裔尚臣司臺敢告侍衛瓌材枕針彧彧其文馥馥其芬出自幽阻升于氈茵允瓌允麗惟淑惟珍安安文枕二彼辨冠冠御于晝枕式于昏代作充用榮已寧身興寢有節適性和神銘倚几銘倚几之設設而不倚作器於此成禮於彼杖銘不正陷墜不安傾危書與禇陶書陶字季雅吳郡錢塘人清淡閒默以墳典自娛吳平武帝補臺郎建中校尉華為司空與陶書二陸龍躍於江漢彥先鳯鳴於朝陽自此以來常恐南金巳盡而復得之於吾子故知延州之德不孤淵岱之寶不匱世說云張華見禇陶語陸平原曰君兄弟龍躍雲津顧彥先鳯鳴朝陽謂東南之寶已盡不意復見禇生陸曰公未覩不鳴不躍者耳華曰故知延州之德不孤川嶽之寶不匱矣不云是書報雷煥書所致詳觀劒文真干將也莫邪何復不至雖然天生神物終當合耳真晉書作乃何復不至尺牘作可復至否暫西帖得書為慰僕諸惛疾巳甚暫西卧歸還乃悉比將念反不具張華呈問甲乙問安豐太守程諒先已有妻後又娶遂立二嫡前妻亡後妻子勳疑所服中書令張華造甲乙之問甲娶乙為妻後又娶景匿不說有乙居家如二嫡無有貴賤之差乙亡景之子當何服本實並列嫡庶不殊雖二嫡非正此失在先人人子何得専制折其親也若為庶母服又不成為庶進退不知所從序博物志序余視山海經及禹貢爾雅說文地志雖曰悉備各有所不載者作略說出所不見粗言逺方陳山川位象吉凶有徴諸國境界犬牙相入春秋之後竝相侵伐其土地不可具詳其山川地澤略而言之正國十二博物之士覽而鑒焉贊博物志地理略贊地理廣大四海八方遐逺别域略以難詳侯王設險守國保疆逺遮川塞近備城隍司察姦非禁禦不良勿恃危厄恣其淫荒無德則敗有德則昌安居猶懼乃可不亡進用忠良社稷永康教民以孝舜化以彰樂歌晉四廂樂歌王公上壽詩稱元慶奉聖觴后皇延遐祚安樂撫萬方食舉東西廂樂詩明明在上丕顯厥繇翼翼三壽蕃后惟休羣生漸德六合承流三正元辰朝慶鱗萃華夏奉職貢八荒覲殊類黻冕充廣庭鳴玉盈朝位其二濟濟朝位言觀其光儀序既以時禮文煥以彰思皇享多祐嘉樂永無央其三九賓在庭臚讃既通升瑞奠贄乃侯乃公穆穆天尊隆禮動容履端承元吉介福御萬邦其四朝享上下咸雍崇多儀繁禮容舞盛德歌九功揚芳烈播休蹤其五皇化洽洞幽明懷柔百神輯祥禎潜龍躍雕虎仁儀鳯鳥届游麟枯蠧榮竭泉流菌芝茂枳棘柔和氣應休徴滋協靈符彰帝期綏宇宙萬國和昊天成命賚皇家賚皇家其六世資聖哲三后在天啓鴻烈啓鴻烈隆王基率土謳吟欣戴於時恆文示象代氣著期其七泰始開元龍升在位四隩同風燮寧殊類五韙來備嘉生以遂凝庶績臻大康申繁祉𦙍無疆本枝百世繼緒不忘休有烈光永言配命惟晉之祥其八聖明統世篤皇仁廣大配天地順動若陶鈞𤣥化參自然至德通神明清風暢八極流澤被無垠其九於皇時晉奕世齊聖惟天降嘏神祇保定𢎞濟區夏允集大命有命既集光帝猷大明重曜鑒六幽聲教洋溢惠滂流惠滂流移風俗多士盈朝賢俊比屋敦世心斫雕反素朴反素朴懷庶方干戚舞階庭疏狄悅遐荒扶南假重譯肅慎襲衣裳雲覆雨施德洽無疆旁作穆穆仁化祥其十朝元日賓王庭承宸極當盛明衍和樂竭祗誠仰嘉惠懷德馨遊淳風泳淑清協億兆同歡榮建皇極統天位運隂陽御六氣殷羣生成性類王道浹治功成人倫序俗化清䖍明祀祗三靈崇禮樂式儀刑其十一慶元吉宴三朝播金石詠泠簫奏九夏舞雲韶邁德音流英聲八紘一六合寧六合寧承聖明王澤洽道登隆綏函夏總華戎齊德教混殊風混殊風康萬國崇夷簡尚敦德𢎞王度逺遐則正旦大㑹行禮詩於赫皇祖迪哲齊聖經緯大業基天之命克開洪緒誕篤天慶旁濟彛倫仰齊七政其二烈烈景皇克明克聰靜封略定勳功成民立政儀刑萬邦式固崇軌光紹前蹤其三允文烈考濬哲應期參德天地比功四時大亨以正庶績咸熙肇啓晉宇遂登皇基其四明明我后𤣥德通神受終正位協應天人容民厚下育物流仁躋我王道輝光日新晉冬至初嵗小㑹歌日月不留四氣回周節慶代序萬國同一作咸休庶尹羣后奉壽一作爵升朝我有嘉禮式宴百僚繁肴綺錯㫖酒泉渟笙鏞和奏磬管流聲上隆其愛下盡其心宣其壅滯訓一作詠之德音乃宣乃訓配享交泰永戴仁風長撫無外晉宴㑹歌亹亹我皇配天垂光留精日昃經覽無方聽朝有暇延命衆臣冠蓋雲集樽俎星陳肴蒸多品八珍代變羽爵無算究樂極宴歌者流聲舞者投袂動容有節絲竹竝設宣暢四體繁手趣摯歡足發和酣不忘禮好樂無荒翼翼濟濟晉中宫所歌先王統大業𤣥化漸八維儀刑孚萬邦內訓隆壼闈皇英垂帝典大雅詠三妃執德宣隆教正位理厥機一作司含章體柔順率禮蹈謙祗螽斯𢎞慈惠樛木逮幽微徽音穆清風高義邈不追遺榮參日月百世仰餘暉晉宗親㑹歌族燕明禮順餟食序親親骨肉散不殊昆弟豈他人本枝篤同慶棠棣著先民於皇聖明后天覆𢎞且仁降禮崇親戚旁施協族姻式宴盡酣娛飲御備羞珍和樂既宣洽上下同歡欣德教加四海敦睦被無垠晉正德大豫舞歌正德舞歌曰皇上天𤣥鑒惟光神器周回五德代章祚命于晉世有哲王𢎞濟區夏陶甄萬方大明垂耀旁燭無疆蚩蚩庶類風德永康皇道惟清禮樂斯經金石在縣萬舞在庭象容表慶協律被聲軼武超濩取節六英同進退讓化漸無形太和宣洽通于幽冥大豫舞歌維天之命符運有歸赫赫大晉三后重暉繼明紹世光撫九圍我皇紹期遂在璇璣羣生屬命奄有庶邦慎徽五典𤣥教遐通萬方同軌率土咸雍爰制大豫宣德舞功醇化既穆王道協隆仁及草木惠加昆蟲億兆夷人悅仰皇風丕顯大業永世彌崇晉凱歌命將出征歌重華隆帝道戎蠻或不賓徐夷興有周鬼方亦違殷今在聖明世冦虐動四垠豺狼染牙爪羣生號穹旻元帥統方夏出車撫凉秦衆貞必以律臧否實在人威信加殊類疏逖思自親單醪豈有一作無味挾纊感至仁武功尚止戈七德美安民逺跡由斯舉永世無風塵勞還師歌玁狁背天德搆亂擾邦畿戎車震朔野羣帥贊皇威將士齊心旅感義忘其私勢積如鞹弩赴節如發機囂聲動山谷金光曜素暉揮㦸晉書作戈陵徑敵武步蹈橫尸鯨鯢皆授首北土永清夷昔往冒隆暑今來白雪霏征夫信勤瘁自古詠采薇收榮於舍爵燕喜在凱歸晉白紵舞歌詩輕軀徐起何洋洋高舉兩手白鵠翔宛若龍轉乍低昂凝停善睞容儀光如推若引留且行隨世而變誠無方舞以盡神安可忘晉世方昌樂未央質如輕雲色如銀愛之遺誰贈佳人制以為袍餘作巾袍以光軀巾拂塵麗服在御㑹佳賓醪醴盈樽美且淳清歌徐舞降祗神四座歡樂胡可陳其二雙袂齊舉鸞鳯翔羅裙飄颻昭儀光趨步生姿進流芳鳴弦清歌及三陽人生世間如電過樂時每少苦日多幸及良辰耀春華齊倡獻舞趙女歌羲和馳景逝不停春露未晞嚴霜零百草凋索花落英蟋蟀吟牖寒蟬鳴百年之命忽若傾早知迅速秉燭行東造扶桑遊紫庭西至崑崙戲曾城其三陽春白日風花香趨步明玉舞瑶璫聲發金石媚笙簧羅袿徐轉紅袖揚清歌流響繞鳯梁如矜若思凝且翔轉眄遺精豔輝光將流將引雙鴈行歡來何晚意何長明君御世永歌昌晉杯槃舞歌詩晉世寧四海平普天安樂永大寧四海安天下歡樂治興隆舞杯槃舞杯槃何翩翩舉坐翻覆壽萬年天與日終與一左回右轉不相失筝笛悲酒舞疲心中慷慨可健兒樽酒甘絲竹清願令諸君醉復醒醉復醒時合同四座歡樂皆言工絲竹音可不聽亦舞此槃左右輕自相當合坐歡樂人命長人命長當結友千秋萬嵗皆老壽拂舞歌三首白鳩篇翩翩白鳩載飛載鳴懷我君德來集君庭白雀呈瑞素羽明鮮翔庭舞翼以應仁乾交交晉書作皎皎鳴鳩或丹或黃樂我君惠振羽來翔東壁餘光魚在江湖惠而不費敬我微軀策我良駟習我驅馳與君周旋樂道亡餘晉書作忘饑我心虛靜我志霑濡彈琴鼓瑟聊以自娛凌雲登臺浮游太清扳龍附鳯目晉書作自宋書作目望身輕獨漉篇獨漉獨漉晉書作獨獨祿祿水深泥濁泥濁尚可水深殺我雍雍雙鴈遊戲田畔我欲射鴈念子孤散翩翩浮萍得風搖宋書作遙輕我心何合與之同并空牀低帷誰知無人夜衣錦繡誰别僞真刀鳴簫中倚牀無施父寃不報欲活何為猛虎斑斑遊戲山間虎欲齧人不避豪賢濟濟篇暢飛暢舞晉書作暢暢飛舞氣流芳追念三五大綺黃去失有時可行去來同時晉作去來時同此未央時冉冉近桑榆但當飲酒為歡娛衰老逝有何期晉作何有期多憂耿耿內懷思淵池廣晉作曠魚獨希願得黃浦衆所依恩感人世無比悲歌且舞無極已詩遊獵篇嵗暮凝霜結堅冰沍幽泉厲風蕩原隰浮雲蔽昊天𤣥雲暗合素雪紛連翩鷹隼始擊鷙虞人獻時鮮嚴駕鳴儔侣攬轡過中田戎車方四牡文軒馭紫燕輿􅑫既整飭容服麗且妍武騎列重圍前驅抗修㫋倐忽似回飈絡繹若浮烟鼓噪山淵動衝塵雲霧連輕矰拂素電纎網䕃長川游魚未暇竄歸鴈不得還一作旋由基控繁弱公差操黃間機發應弦倒一縱連雙肩僵禽正狼藉落羽何翻翻積獲被山阜流血丹中原馳騁未及倦曜靈俄移晷結罝彌藪澤囂聲振四鄙鳥驚觸白創獸駭掛流矢仰手按遊鴻舉足蹴犀兕茹黃批狡兔青骹撮飛雉鵠鷺不盡收鳬鷖安足視日冥徒御勞賞勤課能否野饗㑹衆賓𤣥酒甘且㫖燔炙播遺芳金觴浮素蟻珍羞墜歸雲纎肴出淥水四氣運不停年時何亹亹人生忽如寄居世遽能幾至人同禍福逹士等生死榮辱渾一門安知惡與美遊放使心狂覆車難再履伯陽為我誡檢跡投清軌遊俠篇翩翩四公子濁世稱賢名龍虎相交爭七國並抗衡食客三千餘門下多豪英遊說朝夕至辨士自縱橫孟嘗東出關濟身由雞鳴信陵西反魏秦人不窺兵藝文類聚作開濟疆趙勝南詛楚乃與毛遂行黃歇北適秦太子還入荆美哉遊俠士何以尚四卿我則異於是好古師老彭博陵王宫俠曲俠客樂幽險築室窮山隂燎獵野獸稀施網川無禽嵗暮飢寒至慷慨頓足吟窮令壯士激安能懷苦心干將坐自闕繁弱控餘音耕佃窮淵陂種粟著劒鐔收秋狹路間一擊重千金棲遲熊羆穴容與虎豹林身在法令外縱逸常不禁其二雄兒任氣俠聲蓋少年場借友行報怨殺人租市旁吳刀鳴手中利劒嚴秋霜腰間義素㦸手持白頭鑲騰超如激電回旋如流光奮擊當手決交尸自縱橫寧為殤鬼雄義不入圜墻生從命子遊死聞俠骨香身沒心不懲勇氣加四方門有車馬客行門有車馬客問君何鄉士捷步往相訊果是舊鄰里語昔有故悲論今無新喜清晨相訪慰日暮不能巳詞端競未究忽唱分途始前悲尚未弭後憂方復起輕薄篇末世多輕薄驕代一作或好浮華志意既一作能放逸資財亦豐奢被服極纎麗肴膳盡柔嘉童僕餘粱肉婢妾蹈綾羅文軒樹羽蓋乘馬鳴玉珂橫簮刻玳瑁長鞭錯象牙足下金鑮履手中雙莫耶賓從煥絡繹侍御何芬葩朝與金張期暮宿許史家甲第面長街朱門赫嵳峩蒼梧竹葉清宜城九醖醝浮醪隨觴轉素蟻自跳波美女興齊趙妍唱出西巴一顧城國傾千金寧樂府作不足多北里獻竒舞大陵奏名歌新聲踰激楚妙伎絶陽阿元鶴降浮雲鱏魚躍中河墨翟且停車展季猶咨嗟淳于前行酒雍門坐相和孟公結重關賓客不得蹉三雅來何遲耳熱眼中花盤案互交錯坐席咸喧譁簮珥咸墮落冠冕皆傾邪酣飲終日夜明燈繼朝霞絶纓尚不尤安能復顧他留連彌信宿此歡難可過人生若浮寄年時忽蹉跎促促朝露期榮樂遽幾何念此腸中悲涕下自滂沱但畏執法吏禮防且切磋壯士篇天地相震蕩回薄不知一作可窮人物禀常格有始必有終年時俯仰過功名宜速崇壯士懷憤激安能守虛沖乘我大宛馬撫我繁弱弓長劒橫九野高冠拂𤣥穹慷慨成素霓嘯吒起清風震響駭八荒奮威耀四戎濯鱗滄海畔馳騁大漠中獨步聖明世四海稱英雄蕭史曲蕭史愛長一作少年嬴女吝童顔火粒願排棄霞霧好登攀龍飛逸一作竟天路鳯起出秦關身去長不返簫聲時往還祖道征西應詔詩赫赫大晉奄有萬方陶以仁化曜以天光二跡陜西實在我王內飪玉鉉外惟鷹揚四牡揚鑣𤣥輅振綏庶寮羣后餞飲洛湄感離歎悽慕德遲遲祖道趙王應詔詩崇選穆穆利建明德一作明明於顯穆親時惟我王禀姿自然金質玉相光宅舊趙作鎮冀方休寵曲錫備物煥彰發軔上京出自天邑百寮餞行縉紳具集軒冕峩峩冠蓋習習戀德惟懷永歎弗及太康六年三月三日後園㑹詩暮春元日陽氣清明祁祁甘雨膏澤流盈習習祥風啓滯導生禽鳥翔逸一作逸豫卉木一作桑麻滋榮纎條被緑翠華含英其二於皇我后欽若昊乾順時省物言觀中園宴及羣辟乃命乃延一作初筵合樂華池祓濯清川泛彼一作泛泛龍舟泝游洪源藝文作泝渚游源其三朱幕雲覆列坐文茵羽觴波騰品物備珍管絃繁㑹變用奏新穆穆我皇臨下渥仁訓以慈惠詢納廣神好樂無荒化逹無垠其四咨豫微臣荷寵明時忝恩於外攸攸三期犬馬惟慕天實為之靈啓其願邀願在兹於以表情爰著斯詩上巳篇仁風導和氣句芒御昊春姑洗應時月元已啓良辰密雲䕃朝日零雨灑微塵飛軒遊九野置酒㑹衆賓臨川懸廣幕夾水布長茵徘徊存往古慷慨慕先真朋從自逺至童冠八九人追好舞雩庭擬跡洙泗濱伶人理新樂膳夫然時珍八音硼磕奏肴俎從橫陳妙舞起齊趙悲歌出三秦春醴踰九醖冬清過十旬盛時不努力嵗暮將何因勉哉衆君子茂德景日新高飛舞鳯翼輕舉攀龍鱗勵志詩大儀斡鳥括反運天回地游四氣鱗次寒暑環周星火既夕忽焉素秋涼風振落熠耀宵流其二吉士思秋實感物化日與月與平聲荏苒代謝逝者如斯曽無日夜嗟爾庶士胡寧自舍其三仁道不遐德輶如羽求焉斯至衆鮮克舉大猷𤣥漠將抽厥緒先民有作貽我高矩其四雖有淑姿放心縱逸出般於游居多暇日如彼梓材弗勤丹漆雖勞朴斫終負素質其五養由矯矢獸號於林蒲盧縈繳神感飛禽末伎之妙動物應心研精耽道安有幽深其六安心恬蕩棲志浮雲體之以質彪之以文如彼南畝力耒既勤藨蔉致功必有豐殷其七水積成川載瀾載清土積成山歊蒸鬱冥山不讓塵川不辭盈勉爾一作志含𢎞以隆德聲其八高以下基洪由纎起川廣自源成人在始纍微以著乃物之理纆牽之長實纍千里其九復禮終朝天下歸仁若金受礪若泥在鈞進德修業輝光日新隰朋仰慕豫亦何人答何劭吏道何其迫窘然坐自拘纓緌為徽纆文憲焉可踰恬曠苦不足煩促每有餘良朋貽新詩示我以游娛穆如灑清風煥若春華敷自昔同寮寀於今比園廬衰疾近辱殆庶幾並懸輿散髮重隂下抱杖臨清渠屬耳聽鶯鳴流目玩鯈魚從容養餘日取樂於桑榆其二洪鈞陶萬類大塊稟羣生明暗信異姿靜躁亦殊形自豫及有識志不在功名虛恬竊所好文學少所經忝荷既過任白日巳西傾道長苦智短責重困才輕周任有遺規其言明且清負乘為我戒夕惕坐自驚是用感嘉貺寫心出中誠發篇雖溫麗無乃違其情其三駕言歸外庭放志永棲遲相伴步園疇春草鬱鬱滋榮觀雖盈目親友莫與偕悟物增隆思結戀慕同儕援翰屬新詩永歎有餘懷情詩清風動簾帷晨月照五臣作燭幽房佳人處遐逺蘭室無容光襟懷擁虛景輕衾覆空牀居歡惜夜促在戚怨宵長拊五臣作撫枕獨嘯歎感慨心內傷其二游目四野外逍遙獨延佇蘭蕙緣清渠繁華䕃緑渚佳人不在兹取此欲誰與巢居知風寒穴處識隂雨不曽逺别離安知慕儔侣其三北方有佳人端坐鼓鳴琴終晨撫管絃日夕不成音憂來結不解我思存所欽君子尋時役幽妾懷苦心初為三載别於今久滯淫昔耶生戶牖庭內自成隂翔鳥鳴翠偶草蟲相和吟心悲易感激俯仰淚流襟願託晨風翼束帶侍衣衾其四明月曜清景曨光照𤣥墀幽人守靜夜回身入空帷束帶俟將朝廓落晨星稀寐假交情爽覿我佳人姿巧笑媚歡一作歡靨聨娟眸與眉寤言增長歎悽然心獨悲其五君居北海陽妾在江南隂懸邈極修途一作修途逺山川阻且深承歡注隆愛結分投所欽銜恩一作思篤守義萬里託微心感婚詩駕言遊東邑東邑紛穰穰婚姻及良時嫁娶避當梁窈窕出閨女嬿婉姬與姜素顔發紅華美目流清揚韡煒衆親盛於我猶若常譬彼暮春草榮華不再陽雜詩晷度隨天運四時互相承東壁正昏中涸隂寒節升繁霜降當夕悲風中夜興朱火青無光蘭膏坐自凝重衾無暖氣挾纊如懷冰伏枕終遙夕寤言莫豫應永思慮崇替慨然獨拊膺其二逍遙游春空一作宫容與渌池阿白蘋開素葉朱草茂丹華微風搖茝若增波動芰荷榮彩曜中林流馨入綺羅王孫遊不歸修路邈以遐誰與玩遺芳佇立獨咨嗟其三荏苒日月運寒暑忽流易同好逝不存迢迢逺離析房櫳自來風户庭無行迹蒹葭生牀下蛛蝥網四壁懷思豈不隆感物重鬱積遊鴈比翼翔歸鴻知接翮來哉彼君子無愁徒自隔擬古松生壠坂上百尺下無枝東南望河尾西北隱崑崖剛風振山籟朋鳥夜驚離悲涼貫年節葱翠恆若斯安得草木心不怨寒暑移遊仙詩雲霓垂藻旒羽袿揚輕裾飄登青雲間論道神皇廬蕭史登鳯音王后吹鳴竽守精味𤣥妙逍遙無為墟其二玉佩連浮星輕冠結朝霞列坐王母堂艷體餐瑶華湘妃詠涉江漢女奏陽阿其三乘雲去中夏隨風濟江湘亹亹陟高陵遂升玉巒陽雲娥薦瓊石神妃侍衣裳贈摯仲洽詩君子有逸志棲遲於一丘仰䕃高林茂俯臨渌水流恬淡養𤣥虛沈精研聖猷招隱隱士託山林遁世以保真連惠亮未遇雄才屈不伸其二棲遲四野外陸沈背當時循名掩不著藏器待無期羲和䇿六龍弭節越崦嵫盛年俯仰過忽若振輕絲荷詩荷生緑泉中碧葉齊如規回蕩流霧珠映水逐條垂照灼此金塘藻曜君王池不愁世嘗絶但畏盛明移橘詩橘生湘水側菲陋人莫傳逢君金華宴得在玉几前漢魏六朝百三家集卷四十
