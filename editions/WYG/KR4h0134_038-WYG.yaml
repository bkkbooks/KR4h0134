body:
  text: 漢魏六朝百三家集巻三十八荀朂集題詞茍成侯學古而佞者也史責其援朱均以貳極煽褒閻而偶震至於斗粟興謡踰里成詠階禍已甚誠無辭焉朂博聞明識牛鐸諧樂勞薪炊飯咸能辨之茂先倫匹也顧其文采則謝弗如泰始中與傅張同造歌詩荀尤少味始歎班固明堂寳鼎不可復作獨其條問列和表正笛聲樂家之論盡稱為優其他簡牘亦云清令蓋晉初之文羮𤣥尚存雕幾未極名人吐辭簡直近理江左文士盛談茂先散珠太冲横錦若二荀者流忽而不言不幾乘大輅笑椎輪乎無惑乎六朝體製追時為工登髙望之旗靡轍亂也東漢荀氏後多顯人景倩既讓文若公曾尢媿慈明何其子孫位通而徳儉也以是名克家然乎目録賦蒲萄賦奏條牒問列和諸律意狀奏表辭尚書令表讓豫州大中正表讓樂事表答問三公表薦三公保傅表對議遣王公之國對議増置文法對議省吏議甲乙議書為文王與孫皓書答王琛書序穆天子傳序樂歌晉四廂歌正旦大㑹行禮歌於皇明明邦國祖宗王公上夀歌踐元辰食舉樂東西廂歌煌煌賓之初筵三后赫矣烈文猗歟隆化振鷺翼翼既宴時雍嘉㑹晉正徳大豫舞歌正徳舞歌大豫舞歌詩從武帝華林園宴二首漢魏六朝百三家集巻三十八目録欽定四庫全書漢魏六朝百三家集巻三十八明張溥輯荀朂集賦蒲萄賦靈運宣流休祥允淑懿彼秋方乾元是畜有蒲萄之珍竒應淳和而延育奏條牒問列和諸律意狀奏泰始十年中書監荀朂中書令張華出御府銅竹律二十五具部太樂郎劉秀等校試其三具與杜䕫及左延年律法同其二十二具視其銘題尺寸是笛律也問協律中郎將列和辭昔魏明帝時令和承受一笛聲以作此律欲使學者别居一坊歌詠講習依此律調至于都合樂時但識其尺寸之名則絲竹歌詠皆得均合歌聲濁者用長笛長律歌聲清者用短笛短律凡絃歌調張清濁之制不依笛尺寸名之則不可知也朂等奏奏可昔先王之作樂也以振風蕩俗饗神祐賢必協律吕之和以節八音之中是故郊祀朝宴用之有制歌奏分敘清濁有宜故曰五聲十二律還相為宫此經傳記籍可得而知者也如和對辭笛之長短無所象則率意而作不由曲度考以正律皆不相應吹其聲均多不諧合又辭先師傳笛别其清濁直以長短工人裁制舊不依律是為作笛無法而和寫笛造律又令琴瑟歌詠從之為正非所以稽古先哲垂顯于後者也謹條牒諸律問和意狀如左及依典制用十二律造笛象十二牧聲均調和器用便利講肄彈擊必合律吕况乎宴饗萬國奏之廟堂者哉雖伶䕫曠逺至音難精猶宜儀形古者以求厥衷合乎經理於制為詳若可施行請更部笛工選竹造作下太樂樂府施行平議諸杜䕫左延年律可皆留其御府笛正聲下徵各一具皆銘題作者姓名其餘無所施用還付御府毁祐宋書作左中作用朂又問和作笛為可依十二律作十二笛令一孔依一律然後乃以為樂不和辭太樂東廂長笛正聲已長四尺二寸今當復取其下徵之聲於法聲濁者笛當長計其尺寸乃五尺有餘知昔日作之不可吹也又笛諸孔雖不校試意謂不能得一孔輒應一律也按太樂四尺二寸笛正聲均應㽔賓以十二律還相為宫推法下徵之孔當應律大吕大吕笛長二尺六寸有竒不得長五尺餘輒令太樂郎劉秀鄧昊等依律作大吕笛以示和又吹七律一孔一校聲皆相應然後令郝生鼓筝宋同吹笛以為襍引相和諸曲和乃辭曰自和父祖漢世以來笛家相傳不知此法而令調均與律相應實非所及也郝生魯基种整朱夏皆與和同又問和笛有六孔及其體中之空為七和為能盡名其宫商角徵羽孔調與不調以何檢知和辭先師相傳吹笛但以作曲相語為某曲當舉某指初不知七孔盡應何聲也若當作笛其仰尚方笛工依按舊像訖但吹取鳴者初不復校其諸孔調與不調也按周禮調樂金石有一定之聲是故造鐘磬者先依律調之然後施於廂懸作樂之時諸音皆受鐘磬之均即為悉應律也至於饗宴殿堂之上無廂懸鐘磬以笛有一定調故諸絃歌皆從笛為正是為笛猶鐘磬宜必合於律吕如和所對直以意造率短一寸七孔聲均不知其皆應何律調與不調無以檢正惟取竹之鳴者為無法制輒令部郎劉秀鄧昊王艷魏邵等與笛工參共作笛工人造其形律者定其聲然後器象有制音均和協又問和若不知律吕之義作樂音均髙下清濁之調當以何名之和辭每合樂時隨歌者聲之清濁用笛有長短假令聲濁者用三尺二笛因名曰此三尺二調也聲清者用二尺九笛因名曰此二尺九調也漢魏相傳施行皆然按周禮奏六樂乃奏黄鐘歌大吕乃奏太簇歌應鐘皆以律吕之義紀歌奏清濁而和所稱以二尺三尺為名雖漢魏用之俗而不典部郎劉秀鄧昊等以律作笛三尺二寸者應無射之律若宜用長笛執樂者曰請奏無射周語曰無射所以宣布哲人之令徳示民軌儀也二尺八寸四分四釐應黄鐘之律若宜用短笛執樂者曰請奏黄鍾周語曰黄鍾所以宣養六氣九徳也是則歌奏之義當合經禮考之古典於制為雅表辭尚書令表昔六官所掌冢宰為首秦公卿贊以丞相御史為冠今者尚書令總此三者非臣駑闇所宜忝竊讓豫州大中正表被勅以臣為豫州大中正臣與州閭鄉黨初不相接臣本州十郡方與他州人數倍多品薻人物以正一州請論此乃臧否之本風俗所重讓樂事表臣掌著作又知秘書今覆校錯誤十萬餘卷書不可倉卒復兼他職必有廢頓答問三公表咸寜四年司徒王曽遷太宰詔問朂司徒處當得人副逺近之望并治事見才誰可也朂表三公具瞻之望誠不可用非其人昔魏文帝用賈詡為公孫權笑之尚書令李𦙍忠亮高㓗堪處台輔薦三公保傳表三公保傅宜得其人若使楊珧㕘輔東宫必當仰稱聖意尚書令衛瓘吏部尚書山濤皆可為司徒如以瓘新為令未出者濤即其人對議遣王公之國對如詔凖古方伯選才使軍國各隨方面為都督誠如明㫖至於割正封疆使親疎不同誠為佳矣然分裂舊土猶懼多所揺動必使人心忽擾思惟竊宜如前若於事不得不時有所轉封而不至分割土域有所損奪者可隨宜節度其五等體國經逺實不成制度然但虛名其於實事畧與舊郡縣鄉亭無異若造次改奪恐不能不以為恨今方了其大者以為五等可須後裁度凡事雖有久而益善者若臨時或有不解亦不可忽議増制文法對門下啟通事令史伊羡趙咸為舍人對掌文法詔以問朂朂對今天下幸賴陛下聖徳六合為一望道化隆洽垂之將來而門下上稱程咸張惲下稱此等欲以文法為政皆愚臣所未達者昔張釋之諫漢文謂獸圏嗇夫不宜見用邴吉住車明調和陰陽之本此二人豈不知小吏之惠誠重惜大化也昔魏武帝使中軍司荀攸典刑獄明帝時猶以付内常侍以臣所聞明帝時唯有通事劉泰等官不過與殿中同號耳又頃言論者皆云省官減事而求益吏者相尋矣多云尚書郎大令史不親文書乃委付書令史及幹誠吏多則相倚也増置文法之職適恐更耗擾臺閣臣竊謂不可議省吏議時議省州郡縣半吏以赴農功朂議云省吏不如省官省官不如省事省事不如清心昔蕭曹相漢載其清靜致畫一之歌此清心之本也漢文垂拱幾致刑措此省事也光武併合吏員縣官國邑裁置十一此省官也魏大和中遣王人四出減天下吏員正始中亦倂合郡縣此省吏也今必欲求之於本則宜以省事為先凡居位者使務思蕭曹之心以翼佐大化篤義行崇敦睦使昧寵忘本者不得容而偽行自息浮華者懼矣重敬讓尚止足令賤不妨貴少不陵長逺不間親新不間舊小不加大淫不破義則上下相安逺近相信矣位不可以進趣得譽不可以朋黨求則是非不妄而明官人不惑於聽矣去竒技抑異説好變舊以徼非常之利者必加其誅則官業有常人心不遷矣事留則政稽政稽則功廢處位者而孜孜不怠奉職司者而夙夜不懈則雖在挈瓶而守不假器矣使信若金石小失不害大政忍忿悁以容之簡文案畧細苛令之所施必使人易視聽願之如陽春畏之如雷震勿使㣲文煩撓為百吏所黷二三之命為百姓所饜則吏竭其誠下悦上命矣設官分職委事責成君子心競而不力爭量能受任思不出位則官無異業政典不奸矣凡此皆愚所謂省事之本也茍無此愆雖不省吏天下必謂之省矣若欲省官私謂九寺可并於尚書蘭臺宜省付三府然施行歴代世之所習是以久抱愚懷而不敢言至於省事實以為善若直作大例皆減其半恐文武衆官郡國職業及事之興廢不得皆同凡發號施令典而當則安倘有駁者或致壅否凡職所臨履先精其得失使忠信之官明察之長各裁其中先條上言之然後混齊大體詳宜所省則令下必行不可揺動如其不爾恐適惑人聽比前行所省皆須臾輒復或激而滋繁亦不可不重甲乙議昔鄉里鄭子羣娶陳司空從妹後隔吕布之亂不復相知存亡更娶鄉里蔡氏女徐州平定陳氏得還遂二妃竝存蔡氏之子字元釁為陳氏服嫡母之服事陳公以從舅之禮族兄宗伯曽責元釁謂抑其親鄉里先達以元釁為合宜不審此事粗相似否又王昌前母服議畧同書為文王與孫皓書時遣吳壽春降將徐紹孫彧衘命齎書皓遣使報書方發使聘呉並令當時文士作書昭用朂所作皓既報命和親昭謂朂曰君前作書使呉思順勝十萬之衆也孫楚為石苞與皓書亦此時徐紹孫彧與符邵孫郁參誤聖人稱有君臣然後有上下禮義是故大必字小小必事大然後上下安服羣生獲所逮至末塗純徳既毁𠞰民之命以爭彊於天下違禮順之至理則仁者弗由也方今主上聖明覆幬無外僕備位宰輔屬當國重惟華夏乖殊方隅圮裂六十餘載金革亟動無年不戰暴骸喪元困悴罔定每用悼心坐以待旦將欲止戈興仁為百姓請命故分命偏師平定蜀漢役未經年全軍獨克于時猛將謀夫朝臣庶士咸以奉天時之宜就既征之軍藉呑敵之勢宜遂回旗東指以臨呉境舟師泛江順流而下陸軍南轅取徑四郡兼成都之械漕巴漢之粟然後以中軍整旅二方雲㑹未及浹辰可使江表底平南夏順軌然國朝深惟伐蜀之舉雖有靜難之功亦悼蜀民獨罹其害戰於緜竹者自元帥以下並受斬戮伏屍蔽地血流丹野一之於前猶追恨不忍况重之於後乎是故旋師按甲思與南邦共全百姓之命夫料力忖勢度資量險逺攷古昔廢興之理近鑒西蜀安危之效隆徳保祚去危即順屈已以寧四海者仁哲之髙致也履危偷安隕徳覆祚而不稱於後世者非智者之所居也今朝廷遣徐紹孫彧獻書喻懷若書御於前必少留意回慮革算結歡弭兵共為一家惠矜呉㑹施及中土豈不泰哉此昭心之大願也敢不承受若不獲命則普天率土期於大同雖重干戈固不獲已也太平御覽載荀朂為文王與孫皓書餉雜色綾十端又餉縠三端又餉細縑十疋答王琛書王陶丘州人闕廟盜鮮卑金頭寳帶十二枚序穆天子傳序朂領秘書監時得汲郡冢中古文竹書詔朂撰次以為中經列在秘書序古文穆天子傳者太康二年汲縣民不准盜發古塜所得書也皆竹簡素絲編以臣朂前所攷定古尺度其簡長二尺四寸以墨書一簡四十字汲者戰國時魏地也按所得紀年蓋魏惠成王子今王之塜也於世本蓋襄王也按史記六國年表自今王二十一年至秦始皇三十四年燔書之嵗八十六年及至太康二年初得此書凡五百七十九年其書言周穆王游行之事春秋左氏傳曰穆王欲肆其心周行于天下將皆使有車轍馬迹焉此書所載則其事也王好廵守得盜驪騄耳之乘造父為御以觀四荒北絶流沙西登崑崙見西王母與太史公記同汲郡收書不謹多毁落殘缺雖其言不典皆是古書頗可觀覽謹以二尺黄紙寫上請事平以本簡書及所新冩並付秘書繕冩藏之中經副在三閣謹序樂歌晉四廂樂歌晉書樂志曰魏杜䕫傳舊雅樂四曲一曰鹿鳴二曰騶虞三曰伐檀四曰文王皆古聲辭及太和中左延年改䕫騶虞伐檀文王三曲更自作聲節其名雖同而聲實異唯因䕫鹿鳴全不改易正旦大㑹太尉奉璧羣后行禮東廂雅樂郎作者是也後又改三篇第一曰於赫篇詠武帝聲節與古鹿鳴同第二曰巍巍篇詠文帝用延年所改騶虞聲第三曰洋洋篇詠明帝用延年所改文王聲第四曰日復用鹿鳴鹿鳴之聲重用而除古伐檀古今樂録曰漢故事上壽用四㑹曲魏明帝青龍二年以長笛食舉第十一古大置酒曲代四㑹又易古詩名曰羽觴行用為上壽曲施用最在前鹿鳴以下十二曲名食舉樂而四㑹之曲遂廢造晉書樂志曰泰始中使傅𤣥荀朂張華各正旦大㑹行禮及王公上壽酒食舉樂歌詩朂乃更作行禮詩四篇又為正旦大㑹王公上壽歌詩并食舉樂歌詩合十三篇又以魏氏歌詩或二言或三言或四言或五言與古詩不類以問司律中郎將陳頎頎曰被之金石未必皆當故朂造晉歌皆為四言唯王公上壽酒一篇為三言五言焉正旦大㑹行禮歌於皇采書樂志曰晉荀朂造正旦大㑹行禮歌四篇一曰於皇當魏於赫於皇元首羣生資始履端大享敬御繁祉肆覲羣后爰及卿士欽順則元允也天子明明當魏巍巍明明天子臨下有赫四表宅心惠浹荒貊柔逺能邇孔淑不逆來格祁祁邦家是若邦國當魏洋洋光光邦國天篤其祜丕顯哲命顧柔三祖世徳作求奄有九土思我皇度彞倫攸序祖宗當魏鹿鳴惟祖惟宗髙朗緝熙對越在天駿惠在兹聿求厥成我皇崇之式固其猶徃敬用治王公上壽酒歌踐元辰當魏羽觴行踐元辰延顯融獻羽觴祈令終我皇壽而隆我皇茂而嵩本支奮百世休祚鍾聖躬食舉樂東西廂歌煌煌當鹿鳴煌煌七曜重明交暢我有嘉賓是應是貺邦政既圖接以大饗人之好我式遵徳讓賓之初筵當於穆賓之初筵藹藹濟濟既朝乃宴以洽百禮頒以位敘或廷或陛登儐台叟亦有兄弟胥子陪寮憲兹度楷觀頤養正降福孔偕三后當昭昭昔我三后大業是維今我聖皇焜燿前暉奕世重規明照九畿思輯用光時罔有違陟禹之跡莫不來威天被顯禄福履是綏赫矣當華華赫矣太祖克廣明徳廓開宇宙正世立則變化不經民無瑕慝創業垂綂兆我晉國烈文當朝宴烈文伯考時惟帝景夷險平亂威而不猛御衡不迷皇塗煥炳七徳咸宣其寧惟永猗歟當盛徳猗歟盛歟先皇聖文則天作孚大哉為君慎徽五典帝載是勤文武發揮茂建嘉勲修已濟治民用寧􅇻懷逺燭幽𤣥敎氛氲善世不伐服事三分徳博化隆道冒無垠隆化當綏萬邦隆化洋洋帝命溥將登我晉道越惟聖皇㡣飛革運臨燾八荒叡哲欽明配蹤虞唐封建厥福駿發其祥三朝習吉終然允臧其臧惟何總彼萬方元侯列辟四嶽蕃王時見世享率兹有常旅揖在庭嘉客在堂宋衛既臻陳留山陽我有賓使觀國之光貢賢納計獻璧奉璋保佑命之申錫無疆振鷺當朝朝振鷺于飛鴻漸其翼京邑穆穆四方是式無競惟人王綱允敕君子來朝言觀其極翼翼當順天翼翼大君民之攸塈信理天工惠康不匱將逺不仁訓以純粹幽明有倫俊乂在位九族既睦庶邦順比開元布憲四海鱗萃協時正綂殊塗同致厚徳載物靈心隆貴敷奏讜言納以無諱樹之典象誨之義類上敎如風下應如卉一人有慶羣萌以遂我后宴喜令問不墜既宴當陟天庭既宴既喜翕是萬邦禮儀卒度物有其容晰晰庭燎喤喤鼔鐘笙磬詠徳萬舞象功八音克諧俗易化從其和如樂庶品時邕時雍當參兩儀時邕斌斌宋書作份份六合同塵往我祖宣威靜殊隣首定荆楚遂平燕秦亹亹文皇邁徳流仁爰造艸昧應乾順民靈瑞告符休徵響震天地弗違以和神人既戡庸蜀呉㑹是賓肅慎率職楛矢來陳韓濊進樂均晉書作宫協清鈞西旅獻􅋙扶南效珍蠻裔重譯𤣥齒文身我皇撫之景命惟新嘉㑹愔愔嘉㑹有聞無聲清酤既奠籩豆既馨晉書作升禮􅂶樂備簫韶九成愷樂飲酒酣而不盈率土歡豫邦國以寧王猷允塞萬載無傾晉正徳大豫舞歌正徳舞歌人文垂則盛徳有容聲以依詠舞以象功干戚發揮節以笙鏞羽籥雲㑹翊宣令蹤敷美盡善允協時邕煥炳其章光乎萬邦萬邦洋洋承我晉道配天作享元命有造上化如風民應如草穆穆斌斌形于綴兆文武旁作慶流四表無競維烈永世是紹大豫舞歌豫順以動大哉惟時時邁其仁世載邕熙兆我區夏宣文是基大業惟新我皇隆之重光累曜欽明文思迄用有成惟晉之祺穆穆聖皇受命既固品物咸寧芳烈雲布文敎旁通篤以淳素𤣥化洽暢被之暇豫作樂崇徳同美韶濩濬邈幽遐式遵王度詩從武帝華林園宴二章初學記作荀朂從武帝華林園萟文類聚逸朂名後人遂以為武帝詩誤也習習春陽帝出乎震叶平聲天施地生以應仲春思文聖皇順時秉仁欽若靈則飲御嘉賓洪恩普暢慶乃衆臣其慶維何錫以帝祉肆覲羣后有客戾止外納要荒内延卿士簫管詠徳八音咸理凱樂飲酒莫不宴喜漢魏六朝百三家集巻三十八
