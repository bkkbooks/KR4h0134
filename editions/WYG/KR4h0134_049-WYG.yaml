思非爾焉在昔並垂髪今也将老銜哀茹慼契濶充飽嗟我人斯胡䘏之早天步多艱性命難誓常懼隕斃孤魂殊裔存不阜物没不増壤生若朝風死猶絶景視我浮遊方之僑客眷此黄廬譬之斃宅匪身是􅈔亮㑹伊惜其惜伊何言紆其思其思伊何悲彼曠載出車戒塗言告言歸蓐食驚駕夙興宵馳濛雨之隂照月之輝陸陵峻岅川越洪漪爰届爰止步彼髙堂失爾羽邁良願中荒我心永懐匪悦匪康昔我斯逝兄弟孔仁今我來思或彫或疚昔我斯逝族有餘榮今我來思堂有哀聲我行其道鞠為茂草我履其房物存人亡拊膺涕泣血淚彷徨企佇朔路言送爾歸心存言宴日想容輝廹彼窀穸載驅東路繼其桑梓肆力丘墓婉兮孌兮興懐罔極眷言顧之使我心惻贈潘尼水㑹于海雲翔于天道之所混孰後孰先及子雖殊同升太𤣥舍彼𤣥冕襲此雲冠遺情市朝永志丘園靜猶幽谷動若揮蘭答潘尼於穆同心如瓊如林我東日徂來餞其琛彼美潘生實綜我心探我玉懐疇爾惠音贈馮文羆以下五言昔與二三子游息承華南拊翼同枝條翻飛各異尋茍無凌風翮徘徊守故林慷慨誰為感願言懷所欽發軫清洛汭驅馬大河隂佇立望朔塗悠悠迥且深分索古所悲志士多苦心悲情臨川結苦言隨風吟愧無雜佩贈良訊代兼金夫子茂逺猷欵誠寄惠音於承明作與弟士龍牽世嬰時網駕言逺徂征飲餞豈異族親戚弟與兄婉孌居人思紆鬰遊子情明發遺安寐晤言涕交纓分途長林側揮袂萬始亭佇眄要遐景傾耳玩餘聲南歸憇永安北邁頓承明永安有昨軌承明子棄予俯仰悲林薄慷慨含辛楚懐往歡絶端悼來憂成緒感别慘舒翮思歸樂遵渚贈弟士龍行矣怨路長惄焉傷别促指途悲有餘臨觴歡不足我若西流水子為東峙岳慷慨逝言感徘徊居情育安得攜手俱契濶成騑服贈尚書郎顧彦先二首大火貞朱光積陽熈自南望舒離金虎屏翳吐重隂凄風迕時序苦雨遂成霖朝游忘輕羽夕息憶重衾感物百憂生纒綿自相尋與子隔蕭牆蕭牆阻且深形影曠不接所託聲與音音聲日夜濶何用慰吾心朝遊遊層城夕息旋直廬迅雷中宵激驚電光夜舒𤣥雲拖朱閣振風薄綺疏豐注溢修霤潢潦􅒓階除停陰結不解通衢化為渠沈稼湮梁潁流民泝荆徐眷言懷桑梓無乃將為魚贈顧交趾公真顧侯體明德清風肅已邁發迹翼藩后改授撫南裔伐鼓五嶺表揚旌萬里外逺績不辭小立德不在大高山安足凌巨海猶縈帶惆悵瞻飛駕引領望歸斾答張士然潔身躋秘閣秘閣峻且𤣥終朝理文案薄暮不遑眠善作暝駕言巡明祀致敬在祈年逍遙春王圃五臣作囿躑躅千畝田迴渠繞曲陌通波扶直阡嘉榖垂重穎芳樹發華顛余固水鄉士總轡臨清淵戚戚多逺念行行遂成篇贈從兄車騎孤獸思故藪離鳥悲舊林翩翩游宦子辛苦誰為心髣髴谷水陽婉孌崑山隂營魄懷兹土精爽若飛沈寤寐靡安豫願言思所欽感彼歸途艱使我怨慕深安得忘憂草言樹背與襟斯言豈虚作思鳥有悲音為顧彦先贈婦二首辭家逺行游悠悠三千里京洛多風塵素衣化為緇修身悼憂苦感念同懷子隆思亂心曲沈歡滯不起歡沈難克興心亂誰為理願假歸鴻翼飜飛游江汜東南有思婦長歎充幽闥借問歎何為佳人眇天末游宦久不歸山川脩且濶形影參商乖音息曠不達離合非有常譬彼絃與筈願保金石軀慰妾長飢渇為陸思逺婦作二合兆嘉偶女子禮有行潔已入德門終逺母與兄如何躭時寵游宦忘歸寧雖為三載婦顧景媿虚名嵗暮饒悲風洞房涼且清拊枕循薄質非君誰見榮離君多悲心寤寐勞人情敢忘桃李陋側想瑤與瓊為周夫人贈車騎碎碎織細練為君作􅀈繻君行豈有顧憶君是妾夫昔者得君書聞君在髙平今時得君書聞君在京城京城華麗所璀璨多異人男兒多逺志豈知妾念君昔者與君别嵗律薄將暮日月一何速素秋墜湛露湛露何冉冉思君嵗隨晚對食不能飡臨觴不能飯祖道畢雍孫劉邊仲潘正叔皇儲延髦俊多士出幽遐適值一作遂時來運與子游承華執笏崇賢内振纓層城阿畢劉賛文武潘生莅邦家感别懷逺人願言歎以嗟赴洛二首希世無高符營道無烈心靖端肅有命假檝越江潭親友贈予邁揮涙廣川隂撫膺解攜手永歎結遺音無迹有所匿寂寞聲必沈肆目眇不及緬然若雙潛南望泣𤣥渚北邁渉長林谷風拂脩薄油雲翳高岑亹亹孤獸騁嚶嚶思鳥吟感物戀堂室離思一何深佇立愾我歎寤寐涕盈衿惜無懷歸志辛苦誰為心羇旅逺遊宦託身永華側撫劍遵銅輦振纓盡祗肅嵗月一何易寒暑忽已革載離多悲心感物情悽惻慷慨遺安豫五臣作愈永歎廢餐食思樂樂誰誘曰歸歸未克憂苦欲何為纒綿胸與臆仰瞻凌霄鳥羨爾歸飛翼赴洛道中作二首總轡登長路嗚咽辭密親借問子何之世網嬰我身永歎遵北渚遺思結南津行行遂已逺野途曠無人山澤紛紆餘林薄杳阡眠虎嘯深谷底鷄鳴高樹巔哀風中夜流孤獸更我前悲情觸物感沈思鬰纒綿佇立望故鄉顧影悽自憐逺遊越山川山川脩且廣振策陟崇丘安轡遵平莽夕息抱影寐朝征銜思往頓轡倚嵩巖側聼悲風響清露墜素輝明月一何朗撫几不能寐振衣獨長想吳王郎中時從梁陳作在昔䝉嘉運矯迹入崇賢假翼鳴鳯條濯足升龍淵𤣥冕無醜士冶服使我妍輕劍拂鞶厲五臣作礪長纓麗且鮮誰謂伏事淺契濶踰三年薄言肅後命改服就藩臣夙駕尋清軌逺遊越梁陳感物多逺念慷慨懷古人擬行行重行行悠悠行邁逺戚戚憂思深此思亦何思思君徽與音音徽日夜離緬邈若飛沈王鮪懐河岫晨風思北林遊子眇天末還期不可尋驚飈褰反信歸雲難寄音佇立想萬里沈憂萃我心攬衣有餘帶循形不盈衿去去遺情累安處撫清琴擬今日良宴㑹閑夜命懽友置酒迎風館齊僮梁甫吟秦娥張女彈哀音繞棟宇遺響入雲漢四座咸同志羽觴不可筭高談一何綺蔚若朝霞爛人生無幾何為樂常苦晏譬彼伺晨鳥揚聲當及旦曷為恒憂苦守此貧與賤擬迢迢牽牛星昭昭清漢輝粲粲光天歩牽牛西北迴織女東南顧華容一何冶揮手如振素怨彼河無梁悲此年嵗暮跂彼無良縁睆焉不得度引領望大川雙涕如霑露擬渉江采芙蓉上山采瓊蘂窮谷饒芳蘭采采不盈掬悠悠懷所歡故鄉一何曠山川阻且難沈思鍾萬里躑躅獨吟歎擬青青河畔草靡靡江蘺草熠燿生河側皎皎彼姝女阿那當軒織粲粲妖容姿灼灼美顔色良人遊不歸偏棲獨隻翼空房來悲風中夜起歎息擬明月何皎皎安寢北堂上明月入我牗照之有餘輝攬之不盈手涼風繞曲房寒蟬鳴高柳踟蹰感節物我行永已久游宦㑹無成離思難常守擬蘭若生朝陽嘉樹生朝陽凝霜封其條執心守時信嵗寒終不彫美人何其曠灼灼在雲霄隆想彌年月長嘯入飛飈引領望天末譬彼向陽翹擬青青陵上柏冉冉高陵蘋習習隨風翰人生當幾時譬彼濁水瀾戚戚多滯念置酒宴所歡方駕振飛轡逺遊入長安名都一何綺城闕鬰盤桓飛閣纓虹帶層臺冒雲冠高門羅北闕甲第椒與蘭俠客控絶景都人驂玉軒遨遊放情願慷慨為誰歎擬東城一何高西山何其峻層曲鬰崔嵬零露彌天墜蕙葉慿林衰寒暑相因襲時逝忽如頽三閭結飛轡大耋嗟落暉曷為牽世務中心若有違京洛多妖麗玉顔侔瓊㽔閒夜撫鳴琴惠音清且悲長歌赴促節哀響逐高徽一唱萬夫歎再唱梁塵飛思為河曲鳥雙游灃水湄擬西北有高樓高樓一何峻迢迢善作苕苕峻而安綺窓出塵㝠飛陛躡雲端佳人撫琴瑟纎手清且閒芳氣隨風結哀響馥若蘭玉容誰能五臣作得顧傾城在一彈佇立望日昃躑躅再三歎不怨佇立久但願歌者歡思駕歸鴻羽比翼雙飛翰擬庭中有竒樹歡友蘭時往迢迢匿音徽虞淵引絶景四節逝若飛芳草久已茂佳人竟不歸躑躅遵林渚惠風入我懷感物戀所歡采此欲貽誰擬明月皎夜光嵗暮涼風發昊天肅明明招搖西北指天漢東南傾朗月照閒房蟋蟀吟户庭翻翻歸鴈集嘒嘒寒蟬鳴疇昔同宴友翰飛戻高㝠服美改聲聽居愉遺舊情織女無機杼大梁不架楹招隱詩明發心不夷振衣聊躑躅躑躅欲安之幽人在浚谷朝采南澗藻夕息西山足輕條象雲搆宻葉承翠幄激楚佇蘭林回芳薄秀木山溜何泠泠飛泉潄鳴玉哀音附靈波頽響赴曾曲至樂非有假安事澆淳樸富貴茍難圖税駕從所欲遨遊出西城遨遊出西城按轡循都邑逝物隨節改時風肅且熠遷化有常然盛衰自相襲靡靡年時改冉冉老已及行矣勉良圖使爾脩名立園葵詩二首種葵北園中葵生鬰萋萋朝榮東北傾夕穎西南晞零露垂鮮澤朗月耀其輝時逝柔風戢嵗暮商猋飛曽雲無溫液嚴霜有凝威幸䝉高墉德𤣥景䕃素蕤豐條並春盛落葉後秋衰慶彼晩彫福忘此孤生悲翩翩晩彫葵孤生寄北藩被䝉覆露惠㣲軀後時殘庇足周一智生理各萬端不若聞道易但傷知命難贈波丘令馮文羆夙駕出東城送子臨江曲宻席接同志羽觴飛酃淥登樓望峻陂時逝一何速贈顧彦先清夜不能寐悲風入我軒立影對孤軀哀聲應苦言贈紀士瓊瓌俟豐價窈窕不自鬻有美蛾眉子惠音清且淑脩姱協姝麗華顔婉如玉贈潘正叔過䝉時來運與爾遊承華執笏崇資内振纓曽城阿招隱二首駕言尋飛遯山路鬰盤桓芳蘭振蕙葉玉泉涌㣲瀾嘉卉獻時服靈术進朝飡尋山求逸民穹谷幽且遐清泉盪玉渚文魚曜中波尸鄉亭東遊觀鞏洛逍遙丘墓間秋草漫長柯寒水入雲煙發軫有夙宴息駕無愚賢三月三日遲遲暮春日天氣柔且佳元吉隆初已濯穢遊黄河春詠節運同可悲莫若春氣甚和風未及燠遺凉清且凛詠老軟顔收紅蘂𤣥鬢吐素華冉冉逝將老咄咄柰老何講漢書詩稅駕金華講學袐館有集惟髦芳風雅宴秋詠肅肅素秋節湛湛濃露凝太陽夙夜降少隂忽已升失題二首太素卜令宅希㣲啓奥基𤣥沖纂懿文虚無承先師澄神𤣥漠流棲心太素域弭節欣高視俟我大夢覺漢魏六朝百三家集巻四十九
