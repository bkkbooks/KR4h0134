body:
  text: 漢魏六朝百三家集巻四十九陸機集目録樂府短歌行秋胡行隴西行日出東南隅行挽歌三首長歌行君子行從軍行苦寒行豫章行長安有狹邪行塘上行折楊柳行飲馬長城窟行門有車馬客行櫂歌行太山吟梁甫吟東武吟行班媫妤駕言出北闕行君子有所思行悲哉行齊謳行吳趨行前緩聲歌吳趨行飲酒樂董桃行上留田行飲酒樂燕歌行猛虎行鞠歌行順東西門行日重光行月重輪行百年歌十首詩皇太子宴𤣥圃宣猷堂有令賦詩皇太子賜讌詩贈馮文熊遷斥丘令八章答賈謐十一章有序贈弟士龍十章有序贈潘尼贈潘尼贈馮文羆於承明作與弟士龍贈弟士龍贈尚書郎顧彦先二首贈顧交趾公貞答張士然贈從兄車騎為顧彦先贈婦二首為陸思逺婦作為周夫人贈車騎祖道畢雍孫劉邊仲潘正叔赴洛二首赴洛道中作二首吳王郎中時從梁陳作擬行行重行行擬今日良宴㑹擬迢迢牽牛星擬渉江采芙蓉擬青青河畔草擬明月何皎皎擬蘭若生朝陽擬靑靑陵上栢擬東城一何高擬西北有高樓擬庭中有竒樹擬明月皎夜光招隱詩遨遊出西城園葵詩二首贈波丘令馮文羆贈顧彦先贈紀士贈潘正叔招隱二首尸鄉亭三月三日春詠詠老講漢書詩秋詠失題二首漢魏六朝百三家集巻四十九目録欽定四庫全書漢魏六朝百三家集巻四十九陸機集樂府短歌行以下四言置酒高堂悲歌臨觴人夀幾何逝如朝霜時無重至華不再揚蘋以春暉蘭以秋芳來日苦短去日苦長今我不樂蟋蟀在房樂以㑹興悲以别章豈曰無感憂為子忘我酒旣㫖我肴既臧短歌有詠長夜無荒秋胡行道雖一致塗有萬端吉凶紛藹休咎之源人鮮知命命未易觀生亦何惜功名所歎隴西行我靜如鏡民動如煙事以形兆應以象懸豈曰無才世鮮興賢日出東南隅行或曰羅敷艷歌以下五言扶桑升朝暉照此高臺端高臺多妖麗濬房出清顔淑貎耀皎日惠心清且閑美目揚玉澤蛾眉象翠翰鮮膚一何潤秀色若可餐窈窕多容儀婉媚巧笑言暮春春服成粲粲綺與紈金雀垂藻翹玉佩結瑶璠方駕揚清塵濯足洛水瀾藹藹風雲㑹佳人一何繁南崖充羅幕北渚盈軿軒清川含藻景高岸被華丹馥馥芳袖揮泠泠纎指彈悲歌吐清響雅舞播幽蘭丹唇含九秋妍迹陵七盤赴曲迅驚鴻蹈節如集鸞綺態隨顔變沈姿無定一作乏源俯仰紛阿那顧步咸可懽遺芳結飛飈浮景映清湍冶容不足詠春遊良可歎挽歌三首􅁲擇考休貞嘉命咸在兹夙駕警徒御結轡頓重基龍㡛被廣柳前驅矯輕旗殯宫何嘈嘈哀響沸中闈中闈且勿喧聽我薤露詩死生各異倫祖載當有時舍爵兩楹位啓殯進靈轜飲餞觴莫舉出宿歸無期帷衽曠遺影棟宇與子辭周親咸犇凑友朋自逺來翼翼飛輕軒駸駸䇿素騏案轡遵長薄送子長夜臺呼子子不聞泣子子不知歎息重櫬側念我疇昔時三秋猶足收萬世安可思殉没身易亡殺子非所能含言言哽咽揮涕涕流離流離親友思惆悵神不泰素驂佇轜軒𤣥駟騖飛葢哀鳴興殯宫迴遲悲野外魂輿寂無響但見冠與帶備物象平生長旌誰為斾悲風徽行軌傾雲結流靄振策指靈丘駕言從此逝重阜何崔嵬𤣥廬竄其間磅礴立四極穹隆放蒼天側聽隂溝涌臥觀天井懸壙五臣作廣宵何寥廓大暮安可晨人往有返嵗我行無歸年昔居四民宅今託萬鬼隣昔為七尺軀今成灰與塵金玉素所佩鴻毛今不振豐肌饗螻蟻妍姿永夷泯壽堂延魑魅虚無自相賔螻蟻爾何怨魑魅我何親拊心痛荼毒永歎莫為陳長歌行逝矣經天日悲哉帶地川寸隂無停晷尺波豈徒旋年往信勁矢時來亮急弦逺期鮮克及盈數固希全容華夙夜零體澤坐自捐兹物茍難停吾壽安得延俛仰逝將過倐忽幾何間慷慨亦焉訴天道良自然但恨功名薄竹帛無所宣迨及嵗未暮長歌乘我閑君子行天道夷且簡人道險而難休咎相乘躡翻覆若波瀾去疾苦不逺疑似實生患近火固宜熱履氷豈惡寒掇蜂滅天道拾塵惑孔顔逐臣尚何有棄友焉足歎福鍾恒有兆禍集非無端天損未易辭人益猶可歡朗鑒豈逺假取之在傾冠近情苦自信君子防未然從軍行苦哉逺征人飄飄五臣作颻窮四遐南陟五嶺巔北戍長城阿深五臣作谿谷邈五臣作深無底崇山鬱嵳峩奮臂攀喬木振迹渉流沙隆暑固已慘凉風嚴且苛夏條焦鮮藻寒氷結衝波胡馬如雲屯越旗亦星羅飛鋒無絶影鳴鏑自相和朝飡不免胄夕息常荷戈苦哉逺征人撫心悲如何苦寒行北遊幽朔城涼野多險難五臣作艱俯入窮谷底仰陟高山盤凝氷結重磵積雪被長巒陰雲興巖側悲風鳴樹端不覩白日景但聞寒鳥喧猛虎慿林嘯𤣥猿臨岸歎夕宿喬木下慘愴恒鮮歡渇飲堅氷漿飢待零露餐離思固已久寤寐莫與言劇哉行役人慊慊恒苦寒豫章行汎舟清川渚遥望高山陰川陸殊塗軌懿親將逺尋三荆歡同株四鳥悲異林樂㑹良自古悼别豈獨今寄世將幾何日昃無停陰前路旣已多後塗隨年侵促促薄暮景亹亹鮮克禁曷為復以兹曾是懷苦心逺節嬰物淺近情能不湥行矣保嘉福景絶繼以音長安有狹邪行伊洛有岐路岐路交朱輪輕葢承華景騰歩躡飛塵鳴玉豈樸儒慿軾皆俊民烈心厲勁秋麗服鮮芳春余本倦游客豪彦多舊親傾葢承芳訊欲鳴當及晨守一不足矜岐路良可遵規行無曠迹矩歩豈逮人投足緒已爾四時不必循將遂殊塗軌要子同歸津塘上行江蘺生幽渚㣲芳不足宣被䝉風雲㑹移居華池邊發藻玉臺下垂影滄浪泉霑潤既已渥結根奥且堅四節逝不處繁華難久鮮淑氣與時殞餘芳隨風捐天道有遷易人理無常全男懽智傾愚女愛衰避妍不惜微軀􅅲恒懼蒼蠅前願君廣末光照妾薄暮年折楊柳邈矣垂天景壯哉奮地雷豐隆豈久響華光但西隤日落似有竟時逝恒若催仰悲朗月運坐觀旋葢迴盛門無再入衰房莫苦開人生固已短出處鮮為諧慷慨惟昔人興此千載懷升龍悲絶處葛藟變條枚寤寐豈虚歎曾是感與摧弭意無足歡願言有餘哀飲馬長城窟行驅馬陟陰山山高馬不前往問陰山候勁虜在燕然戎車無停軌旌斾屢徂遷仰慿積雪巖俯渉堅冰川冬來秋未反去家邈以緜獫狁亮未夷征人豈徒旋末徳爭先鳴凶器無兩全師克薄賞行軍没㣲軀捐將遵甘陳迹收功單于旃振旅勞歸士受爵藳街傳門有車馬客行門有車馬客駕言發故鄉念君久不歸濡跡渉江湘投袂赴門塗攬衣不及裳拊膺攜客泣掩淚叙溫涼借問邦族間惻愴論存亡親友多零落舊齒皆彫喪市朝互遷易城闕或丘荒墳壟日月多松栢鬱芒芒天道信崇替人生安得長慷慨惟平生俛仰獨悲傷櫂歌行遲遲暮春日天氣柔且嘉元吉隆初已濯穢遊黄河龍舟浮鷁首羽旗垂藻葩乗風宣飛景逍遥戲中波名謳激清唱榜人縱棹歌投綸沈洪川飛繳入紫霞太山吟太山一何高迢迢造天庭峻極周已逺曽雲鬱㝠㝠梁甫亦有館蒿里亦有亭幽塗延萬鬼神房集百靈長吟太山側慷慨激楚聲梁甫吟玉衡旣已驂羲和若飛凌四運循環轉寒暑自相承冉冉年時暮迢迢天路徴招搖東北指大火西南昇悲風無絶響𤣥雲互相仍豐冰慿川結零一作寒露彌天凝年命時相逝慶雲鮮克乗履信多愆期思順焉足慿愾愾臨川響非此孰為興哀吟梁甫巔慷慨獨拊膺東武吟行投跡短世間高歩長生闈濯髮冒雲冠浣身被羽衣飢從韓衆餐寒就佚女棲媫妤怨媫妤去辭寵淹留終不見寄情在玉階託意惟團扇春苔暗階除秋草蕪高殿黄昏一作昏黄履綦絶愁來空雨面駕言出北闕行駕言出北闕躑躅遵山陵長松何鬱鬱丘墓互相承念昔徂殁子悠悠不可勝安寢重㝠廬天壌莫能興人生何所促忽如朝露凝辛苦百年間戚戚如履冰仁智亦何補遷化有明徴求仙鮮克仙太虚不可凌良㑹罄美服對酒宴同聲君子有所思行命駕登北山延佇望城郭㕓里一何盛街巷紛漠漠甲第崇高闥洞房結阿閣曲池何湛湛清川帶華薄邃宇列綺窓蘭室接羅幕淑貌色斯升哀音承顔作人生誠行邁容華隨年落善哉膏粱士營生奥且博宴安消靈根鴆毒不可恪無以肉食資取笑葵與藿悲哉行游客芳春林春芳傷客心和風飛清響鮮雲垂薄隂蕙草饒淑氣時鳥多好音翩翩鳴鳩羽喈喈倉庚音五臣作吟幽蘭盈通谷長秀被高岑女蘿亦有託蔓葛亦有尋傷哉客遊士憂思一何深目感隨氣草耳悲詠時禽寤寐多逺念緬然若飛沈願託歸風響寄言遺所欽齊謳行營丘負海曲沃野爽且平洪川控河濟崇山入高㝠東被姑尤側南界聊攝城海物錯萬類陸産尚千名孟諸吞楚夢百二侔秦京惟師恢東表桓后定周傾天道有迭代人道無久盈鄙哉牛山歎未及至人情爽鳩茍已徂吾子安得停行行將復去長存非所營吳趨行楚妃且勿歎齊娥且勿謳四坐並清聽聽我歌吳趨吳趨自有始請從閶門起閶門何峩峩飛閣跨通波重欒承游極囘軒啟曲阿藹藹慶雲被泠泠祥風過山澤多藏育土風清且嘉泰伯導仁風仲雍揚其波穆穆延陵子灼灼光諸華王迹隤陽九帝功興四遐大皇自富春矯手頓世羅邦彦應運興粲若春林葩屬城咸有士吳邑最為多八族未足侈四姓實名家文德熈淳懿武功侔山河禮讓何濟濟流化自滂沱淑美難窮紀商㩁為此歌前緩聲歌游仙聚靈族高㑹層城阿長風萬里舉慶雲鬱嵯峨宓妃興洛浦王韓起太華北徴瑤臺女南要湘川娥肅肅宵駕動翩翩翠葢羅羽旗棲瓊鸞玉衡吐鳴和太容揮髙絃洪崖發清歌獻酬既已周輕舉乗紫霞總轡扶桑枝濯足暘谷波清輝溢天門垂慶惠皇家吳趨行蠒滿葢重簾唯有逺相思藕葉清朝釧何見早還時飲酒樂飲酒須飲多人生能幾何百年須受樂莫厭管絃歌董桃行以下六言和風習習薄林柔條布葉垂陰鳴鳩拂羽相尋倉庚喈喈弄音感時悼逝傷心日月相追周旋萬里倐忽幾年人皆冉冉西遷盛時一往不還慷慨乖念悽然昔為少年無憂常恡秉燭夜遊翩翩宵征何求于今知此有繇但為老去年遒盛固有衰不疑長夜㝠㝠無期何不驅馳及時聊樂永日自怡齎此遺情何之人生居世為安豈若及時為歡世道多故萬端憂慮紛錯交顔老行及之長歎上畱田行嗟行人之藹藹駿馬陟原風馳輕舟泛川雷邁寒往暑來相尋零雪霏霏集宇悲風徘徊入襟嵗華冉冉方除我思纒綿未紓感時悼逝悽如飲酒樂樂府作還臺樂謂陳陸瓊詩誤蒲萄四時芳醇瑠璃千鍾舊賔夜飲舞遟銷燭朝醒絃促催人春風秋月恒好驩醉日月言新燕歌行七言四時代序逝不追寒風習習落葉飛蟋蟀在堂露盈墀念君客遊常苦悲君何緬然久不歸賤妾悠悠心無違白日既没明燈輝夜一作寒禽赴林匹鳥棲雙鳩關關宿河湄憂來感物涕不晞非君之念思為誰别日何早㑹何遲猛虎行以下雜言渇不飲盜泉水熱不息惡木陰惡木豈無枝志士多苦心整駕肅時命杖䇿將逺尋飢食猛虎窟寒棲野雀林日歸功未建時往嵗載陰崇雲臨岸駭鳴條隨風吟靜言幽谷底長嘯高山岑急絃無懦響亮節難為音人生誠未易曷云開此衿眷我耿介懷俯仰愧古今鞠歌行序曰按漢宫閤有含章鞠室靈芝鞠室後漢馬防第宅􅁲臨道連閣通池鞠城彌於街路鞠歌將謂此也又東阿王詩連騎擊壤或謂蹙鞠乎三言七言雖奇寶名器不遇知已終不見重願逢知已以託意焉朝雲升應龍攀乗風逺遊騰雲端鼓鐘歇豈自歡急絃高張思和彈時希值年夙愆循已雖易人知難王陽登貢公歡罕生既没國子歎嗟千載豈虚言邈矣逺念情愾然順東西門行岀西門望天庭陽谷旣虚崦嵫盈感朝露悲人生逝者若斯安得停桑樞戒蟋蟀鳴我今不樂嵗聿征迨未暮及時平置酒高堂宴友生激朗笛彈哀筝取樂今日盡歡情日重光行日重光奈