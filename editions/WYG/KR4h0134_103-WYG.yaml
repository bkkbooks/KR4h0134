body:
  text: 漢魏六朝百三家集巻一百三上徐陵集題詞陳世祖時安成王任威福徐孝穆為御史中丞彈之下殿高宗議北伐孝穆舉吳明徹大將裴忌副之克淮南數十州地周昌强諌張華知人殆有兼稱非徒以太史之辭干將之筆豪詡東海也評徐詩者云如魚油龍罽列堞明霞比擬文字形象亦然迺余讀其勸進元帝表與代貞陽侯數書感慨興亡聲淚並發至羈旅篇牘親朋報章蘇李悲歌猶見遺則代馬越鳥能不悽然夫三代以前文無聲偶八音自諧司馬子長所謂鏗鏘鼓舞也浸淫六季制句切響千英萬傑莫能跳脱所可自異者死生氣别耳厯觀駢體前有江任後有徐庾皆以生氣見髙遂稱俊物他家學歩夀陵菁華先竭猶責細腰以善舞余竊憂其餞死也玉臺一序與九錫並美天上石麟青睛慧相亦何所不可㢤目録賦鴛鴦賦詔陳武帝即位詔梁禪陳詔陳公九錫詔進武帝為長城公詔乂帝登祚尊皇太后詔封始興王詔䇿文梁禪陳䇿文陳公九錫䇿文璽書武帝下州郡璽書梁禪陳璽書表勸進梁元帝表讓五兵尚書表讓散騎常侍表讓左僕射初表讓右僕射初表為王儀同致仕表為始興王讓瑯琊二郡太守表移文為䕶軍長史王質移文移齊文檄檄周文啓安成王讓録尚書表後啟謝敕賚燭盤賞答齊國移文啟謝敕賜祀三皇五帝餘饌啟謝兒報坐事付治中啟謝賚麕啟謝東宫賚蛤蜊啓謝賚蛤啟書為貞陽侯與太尉王僧辨書為貞陽侯答王太尉書為貞陽侯重與王太尉書為貞陽侯答王太尉書為貞陽侯重答王太尉書又為貞陽侯答王太尉書為貞陽侯與陳司空書為貞陽侯重與裴之横書為貞陽侯與北齊荀昻兄弟書在北齊與楊僕射書在北齊與宗室書在北齊與梁王太尉書與王吳郡僧智書答李顒之書為陳武帝作相時與北齊廣陵城主書為陳武皇作相時與嶺南酋豪書為陳武帝與周宰相書為陳主與周冢宰宇文䕶論邊境事書為陳主答周主論和親書在吏部尚書答諸求官人書同前答周處士書與章司空昭達書重答朝臣書漢魏六朝百三家集巻一百三上目録欽定四庫全書漢魏六朝百三家集巻一百三上明張溥輯徐陵集賦鴛鴦賦飛飛兮海賓去去兮迎春炎皇之季女織素之佳人未若宋玉之小史含情而死憶少婦之生離恨新婚之無子既交頸於千年亦相隨於萬里山雞映水那自得孤鸞照鏡不成雙天下真成長合㑹無勝比翼兩鴛鴦觀其哢吭浮沈輕軀瀺灂拂荇戲而波散排荷飜而水落特訝鴛鴦鳥長情真可念許處勝人多何時肯相厭聞道鴛鴦一鳥名教人如有逐春情不見臨卭卓家女秪為琴中作許聲詔陳武帝即位詔五徳更運帝王所以御天三正相因夏殷所以宰世雖色分辭翰時異文質揖讓征代迄用參差而育徳振民義歸一揆朕以寡昩時屬艱危國歩屢屯天維三絶肆勤先后拯厥横流藉將帥之功兼猛士之力一匡天下再造黔黎梁氏以天禄永終厯數攸在遵與能之典集大命於朕躬顧惟菲徳辭不獲亮式從天睠俯協民心受終文祖升禋上帝繼迹百王君臨萬宇若渉川水罔知攸濟寶業初建皇祚維新思俾恵澤覃被億兆可大赦天下改梁太平二年為永定元年賜民爵二級文武二等鰥寡孤獨不能自存者人榖五斛逋租宿倩皆勿復收其有犯鄉里清議贓汙淫盗者皆洗除先注與之更始長徒勅繫特皆原之亡官失爵禁錮奪勞一依舊典梁禪陳詔五運更始三正迭代司牧黎庶是屬聖賢用能經緯乾坤彌綸區宇大庇黔首闡揚鴻烈革晦以明積代同軌百王踵武咸由此則梁徳湮㣲禍亂荐發太清云始見困長蛇承聖之季又罹封豕爰至天成重竊神器三光亟沈七廟乏祀含生已冺鼎命斯墜我武元之祚有如綴旒靜惟屯剥夕惕載懐相國陳王有命自天降神惟嶽天地合徳晷曜齊明拯社稷之横流提億兆之塗炭東誅逆叛北殱獯醜威加四海仁漸萬國復張崩樂重興絶禮儒館聿修戎亭虛候大功在舜盛績惟禹巍巍蕩蕩無得而稱來獻白環豈直皇虞之世入貢素雉非止隆周之日固以效珍川陸表瑞煙雲甘露醴泉旦夕凝涌嘉禾朱草孶植郊甸道昭於悠代勲格於皇穹明明上天光華日月革故著於𤣥象代徳彰於圖䜟獄訟有歸謳謌爰適天之厯數實有攸在朕雖庸藐闇於古昔永稽崇替為日已久敢忘列代之遺典人祇之至願乎今便遜位别宫敬禪於陳一依唐虞宋齊故事陳公九錫詔肇昔元胎剖判太素氤氲崇建人皇必憑洪宰故賢哲之后牧伯征於四方神武之君大監治乎萬國又有一匡九合渠門之賜以隆戮帶圍温行宫之寵斯茂時危所以貞固運泰所以光熈斯乃千載同風百王不刋之道也太傅義興公允文允武迺聖迺神固天生徳康濟黔首昔在休期早隆朝寄逺踰滄海大拯交越皇運不造書契未聞中國其亡兵凶總至哀哀噍類譬彼窮牢悠悠上天莫云斯極否終則泰元輔應期救此將崩援兹己溺乗舟履輂架險浮深經略中途畢殱羣醜洎乎石頭姑孰流髓履腸一朝指撝六合清晏是用光昭下武翼亮中都雪三后之勍讐夷三靈之巨慝堯台禹佐未始能階殷相周師固非云擬重之以屯剥餘象荆楚大崩天地無心乗輿委御五湖薦食競謀諸夏八方棊跱莫有匡救彊臣放命黜我冲人顧影於荼孺之魂甘心於寗卿之辱却按下髻求哀之路莫從竊鈇逃責容身之地無所公神兵奄至不日清澄惟是孱䝉再膺天禄斯又巍巍蕩蕩無得而稱焉加以仗兹忠義屠彼袄逆震部夷氛稽山罷祲番禺蠡澤北鄙西郊殱厥凶徒罄無遺種斯則兆民之命修短所縣率土之基興亡是賴於是刑禮兼訓㳂草有章中外咸平遐邇寜一用能使陽光合魄曜象呈暉棲閣逰庭抱仁含信宏勲該於厚地大道格於𤣥天羲農炎昊以來巻領垂衣之世聖人濟物未有如斯者也夫偹物典䇿桓文是膺助理隂陽蕭曹不讓未有功髙於㝢縣而賞薄於伊周凡厥人祇固懐延停實由公謙撝自牧降損為懐嘉數遲回永言增歎豈可申茲雅尚久廢朝猷宜戒司勲敬升鴻典且重華大聖媯汭惟賢盛徳之祀無忘公侯之門必復是以殷嘉亶甫繼后稷之官堯命羲和纂重黎之位况其本枝攸建宜誓山河者乎其進公位相國總百揆封十郡為陳公偹九錫之禮加璽紱逺逰冠緑綟綬位在諸侯王上其鎮衛大將軍揚州牧如故進武帝為長城公詔徳懋懋官功懋懋賞皇王盛則所謂元龜司空公南徐州刺史長城縣開國矦諱志華夤亮風度𢎞逺體文經武明允篤誠曩者率五領之彊兵誅四海之讐敵固以勒功彞鼎書勲太常克定京師勤勞自重自鎮撫扮榆永寜豐沛東凉既息北蔡無歸代馬燕犀氣雄天下裹糧坐甲固敵是求方欲大討於秦崤敦修於輿睦叶謀上相爰納朕躬思所以敬答忠勲用申朝典可進爵為長城縣公文帝登祚尊皇太后詔朕以虛薄才非𢎞濟竊守藩維常懼盈滿豈圖蒼昊不吊國歩艱難皇嗣元良藐在崤渭二臣奉迎川塗靡從六傅還朝淹留永日今國圖無主家業事隆上奉父母之嚴規下逼羣公之廷諍遂以庸質升纂帝基對揚大化彌增號懼今宜式遵舊則奉上皇后尊號為皇太后御慈訓宫一依前典若中流靜晏皇嗣歸來輒當解紱於箕山之陽歸老於瑯琊之國復子明辟還承寶圖若問與夷無媿園寢封始興王詔漢祖天倫伯叔追封晉元世系瑯琊傳國仰惟二后重光率由前典朕昔因蕃次䝉繼本宗分在要荒久離寒燠天嘉紹祚别命皇枝歸自崤函禮隔登獻每至霜庭可履曯垣寢而懐悲風樹鳴條望章陵而增感今嗣王乖徳獲罪慈訓永言主奠宜自朕躬但國歩時艱皇基務切復奉家業升纂帝圖重違情禮言深哽慟可以第二皇子升陵為始興王䇿文梁禪陳䇿文咨爾陳王惟昔上古厥初生民驪連栗陸之前容成大庭之代並結繩寫鳥杳㝠慌忽故靡得而詳焉自羲農軒昊之君陶唐有虞之主或垂衣而御四海或無為而子萬姓居之如馭朽索去之如脱敝屣裁遇許由便能捨帝暫逄善巻即以讓王故知𤣥扈璇璣非闗尊貴金根玉輅示表君臨及南觀河渚東沈刻璧精華既竭耄勤已倦則抗首而笑唯賢是與䜎然作歌簡能斯授遺風餘烈昭晰圖書漢魏因循是為故實宋齊授受又𢎞斯義我髙祖應期撫運握樞御宇三后重光祖宗齊聖及時屬陽九封豕薦食西都失馭夷狄交侵乃臮天成輕弄龜鼎惵惵黔首若崩厥角㣲㣲皇極将甚綴旒惟王乃聖乃神欽明文思二儀竝運四時合序天錫智勇人挺雄傑珠庭日角龍行虎歩爰初投袂日迺勤王電掃畨禺雲撤彭蠡揃其元惡定我京畿及王賀帝𢎞貿茲冠履既行伊霍用保沖人震澤稽隂並懐叛逆獯厥醜虜三亂皇都裁命偏師二邦自殄薄伐獫狁六戎盡殪嶺南叛涣湘郢結連賊帥既擒兇渠傳首用能百揆時序四門允穆無思不服無逺不届上逹穹昊下漏深泉蛟魚並見謳歌攸屬况乎長彗横天已徵布新之兆璧日斯既實表更姓之符是以始創義師紫雲曜彩肇惟尊主黄龍負舟楛矢素翬梯山以至白環玉玦慕徳而臻若夫安國字萌本因萬物之志時乗御宇良㑹樂推之心七百無常期皇王非一族昔木徳既季而傳祚於我有梁天之厯數允集明哲式遵前典廣詢羣議王公卿尹莫不攸屬敬從人祇之願授帝位於爾躬四海困窮天禄永終王其允執厥中軌儀前式以副漙天之望禋祀上帝時膺大禮永固洪業豈不盛歟陳公九錫文大哉乾元資日月以貞觀至㢤坤元慿山川以載物故惟天為大陟配者欽明惟王建國翼輔者齊聖是以文武之佐磻溪藴其玉璜堯舜之臣濙河鏤其金版况乎體得一之鴻姿寜陽九之危厄拯横流於碣石撲燎火於崑岑驅馭於韋彭跨蹍於齊晉神功行而靡用聖道運而無名者乎今將授公典䇿其敬聴朕命日者昊天不弔鍾亂於我國家網漏吞舟彊胡内贔茫茫宇宙惵惵黎元方足圓顱萬不遺一太清否亢橋山之痛已深大寶屯如平陽之禍相繼上宰膺運康救兆民鞠旅於滇池之南揚旌於桂嶺之北懸三光於己墜謐四海於羣飛屠猰窳於中原斮鯨鯢於濛汜蕩寜上國光啟中興此則公之大造於皇家者也既而天未悔禍夷醜荐臻南夏崩騰西京蕩覆羣胡孔熾藉亂乗間推納藩枝盜假神器冢司昏撓旁引冦讐既見貶於桐宫方謀危於漢閣皇運已殆何殊贅旒中國揺然非徒如綫公赫然投袂匡救本朝復莒齊都平戎王室朕所以還膺寶厯重履宸居挹建武之風猷謌宣王之雅頌此又公之再造於皇家者也公應務之初登庸惟始三川五嶺莫不窺臨銀洞珠宫所在寜謐孫盧肇釁越貃為災番部阽危勢將淪殄公赤旗所指祅壘洞開白羽纔撝兇徒紛潰非其神武久喪南藩此又公之功也大同之末邊政不修李賁狂迷竊我交愛敢稱大號驕恣甚於尉陀據有連州雄豪熾於梁碩公英謩雄算電掃風行馳御樓船直跨滄海新昌典徹偹履艱難蘇厯嘉寜盡為京觀三山獠洞八角蠻陬逖矣水寓之鄉悠㢤火山之國馬援之所不届陶璜之所未開莫不懼我王靈爭朝邊候歸賝天府獻狀鴻臚此又公之功也自冦虜陵江宫闈幽辱公枕戈嘗膽提劒撫心氣涌青霄神飛紫闥而番禺連率本自諸夷言得其朋是懐同惡公仗此忠誠乗機勦定執沛令而釁鼓平新野而據鞍此又公之功也世道初艱方隅多難勲門桀黠作亂衡嶷兵切池隍衆兼夷獠公以國盜邊警知無不為䘏是同盟誅其醜類莫不魚驚鳥㪚面縛頭懸南土黔黎重保蘇息此又公之功也長驅嶺嶠夢想京畿縁道酋豪逓為榛梗路養渠率全據大都蓄聚逋逃方謀阻亂百樓不戰雲梯之所未窺萬弩齊張髙綳之所非敵公龍驤虎歩嘯吒風雲山靡堅城野無强陣清祅氛於灨石滅沴氣於雩都此又公之功也遷仕凶匿屯據大臯乞活類馬騰之軍流民多杜弢之衆推鋒轉鬬自北狙南頻嵗稽誅實惟勍虜公坐揮三略遥制六竒義勇同心貔貅騁力雷奔電擊谷靜山空列郡無犬吠之驚叢祠罷狐鳴之盜此人公之功也王師討虜次届淪波兵乏兼儲士有饑色公回麾蠡澤積榖巴丘億庾之詠斯豐壺漿之迎是衆軍民轉漕曾無砥柱之難艫舳相望如運敖倉之府犀渠貝胄顧蔑雷霆髙艦層樓仰捫霄漢故使三軍勇鋭百戰無前承此兵糧遂殄兇逆此又公之功也若夫英圖邁俗義旅如雲湓壘猜攜用掩戎略公志唯同奨師克在和鵠塞非虞鴻門是㑹若晉矦之誓白水如蕭王之推赤心屈禮交盟人祇感咽故能使舟師並路逺邇朋心此又公之功也姑孰襟要崤函阻憑冦虜據其闗梁大盜負其扄鐍公一校裁撝三雄並奮左賢右角沙潰土崩木甲殪於中原氊裘赴於江水他他藉藉萬計千羣鄂坂之隘斯開夷庚之道無塞此又公之功也義軍大衆俱集帝京逆豎兇徒猶屯皇邑若夫表裏山河金湯嶮固疏龍首以抗殿揃華嶽以為城雜虜憑焉彊兵自若公回茲地軸抗此天羅曾不崇朝俾無遺噍軍容甚穆國政方修物重覩於衣冠民還瞻於禮樂楚人滿道爭覩於葉公漢老銜悲俱觀於司𨽻此又公之功也内難初靜諸侯出闗外郡傳烽鮮卑犯塞莫非沮渠當户中貴名王冀馬列於淮南胡笳動於徐北公舟師歩甲亘野横江殱厥羣羝遂殫封狶莫不絓木而止戎車靡遺遇濘而旋歸驂盡殪此又公之功也公克黜禍難劬勞皇室而孫寗之黨飜啓狄心伊洛之間咸為虜戍雖金陵佳氣石壘天嚴朝闇戎塵夜喧胡皷公三籌既畫八陣斯張裁舉靈鉟亦抽金僕咸俘醜類悉反髙墉異李廣之皆誅同龎元之盡赦此又公之功也任約叛渙梟聲不悛戎羯貪婪狼心無改穹廬氊幕抵北闕而為營烏孫天馬指東都而成陣公左甄右落箕張翼舒掃是欃槍驅其獫狁長狄之種埋於國門推髻之酋烹於軍市投秦坑而盡沸噎濉水而不流此又公之功也一相居中自折彞鼎五湖小守妄懐同惡公夙駕兼道秉羽杖戈玉斧將揮金鉦且戒祅酋震懾遽請灰釘爇櫬以表其含𢎞焚書以安其反側此又公之功也賊龕兇横陵虐具區阻兵安忍憑災怙亂自古蟲言鳥跡渾沌洪荒凡或䖍劉未此殘酷公雖宗居汝潁世寓東南育聖誕賢之鄉含章挺生之地眷言桑梓公私憤切卓爾英狀承規奉算戮此大憝如烹小鮮此又公之功也亂離永久羣盜孔多浙左兇渠連兵搆逆豈止千兵五校白雀黄龍而已哉公以中軍無率選是親賢姧宼途窮漼然冰泮刑溏之所文命動其大威雷門之間勾踐行其嚴戮英規聖迹異代同風此又公之功也同姓有扈頑兇不賓憑藉宗盟圖危社稷觀兵滙澤勢震京師驅率南蠻己為東帝公論兵於廟堂之上決勝於罇俎之間冦賈樊滕浮江下瀨一朝揃撲無待甸師萬里澄清非勞新息此又公之功也豫章祅冦依憑山澤繕甲完聚名厯嵗時結從連横爰洎交廣吕嘉既獲吳濞已摐命我還師征其不恪連營盡㧞偽黨斯擒曜聖武於匡山回神旌於蠡浱此又公之功也自八紘九野𤓰剖豆分竊帝偷王連州比縣公武靈己暢文徳又宣折簡馳書風猷斯逺至於蒼蒼浴日杳杳無雷北洎丈夫之鄉南踰女子之國莫不屈膝膜拜求吏欵闗此又公之功也京師禍亂亟積寒暄雙闕低昻九門寥豁寜秦宫之可顧豈魯殿之猶存五都簮弁百僚卿士胡服縵纓咸為戎俗髙冠厚履希復華風宋㣲子麥穟之歌周大夫黍離之歎方之於斯未足為悲矣公求衣昧旦昃食髙舂興搆宫闈具瞻遐邇郊庠宗稷之典六符十等之章還聞太始之風流重覩永平之遺事此又公之功也公有濟天下之勲重之以明徳凝神體道合徳符天用百姓以為心隨萬機而成務恥一物非唐虞之民歸含靈於仁夀之域上徳不徳無為以為夏長春生顯仁蔵用忠信為寶風雨弗􅄽仁恵為基牛羊勿踐功成治定樂奏咸雲安上治民禮兼文質物色丘園衣裾里巷朝多君子野無遺賢菽粟同水火之饒工商富猗頓之旅是以天無藴寶地有呈祥潏露卿雲朝團曉映山車澤馬服馭登閑既景煥於圖書方葳㽔於史牒髙勲踰於象緯積徳冠於嵩華固無徳而稱者矣朕又聞之前王宰世茂賞尊賢式樹蕃長總征羣伯二南崇絶四履遐曠泱泱表海祚土維齊巖巖泰山俾侯於魯抑又勤王反鄭夾輔遷周召伯之命斯隆河陽之禮咸備况復經營宇宙寜唯斷鰲足之功𢎞濟蒼生非直鑿龍門之嶮而疇庸報徳寂爾無聞朕所以垂拱當宁載懐慙悸者也今授公相國以南豫州之陳留南丹陽宣城揚州之吳興東陽新安新寜南徐州之義興江州之鄱陽臨川十郡封公為陳公錫茲青土苴以白茅爰定爾邦用建冢社㫺旦奭分陜俱為保師晉鄭諸侯咸作卿士兼其内外禮實攸宜今命使持節兼太尉王通授相國印綬陳公璽紱使持節兼司空王㻛授陳公茅土金獸符第一至第五左竹使符第一至第十相國秩踰三鉉任總百司位絶朝班禮由事革其以相國總百揆除録尚書之號上所假節侍中貂蟬中書監印章中外都督太傳印綬義興公印䇿其鎮衛大将軍揚州牧如故又加公九錫其敬聽後命以公禮為楨幹律等銜策四維皆舉八柄有章是用錫公大輅戎輅各一𤣥牡二駟以公賤寶崇榖疏爵待農室富京坻民知榮辱是用錫公衮冕之服赤舄副焉以公調理隂陽燮諧風雅三靈允降萬國同和是用錫公軒縣之樂六佾之舞以公宣導王猷𢎞闡風教光景所照鞮象必通是用錫公朱户以居以公抑揚清濁褒徳進賢髦士盈朝幽人虛谷是用錫命納陛以登以公嶷然廊廟為世鎔範折衝四表臨御八荒是用錫公虎賁之士三百人以公執茲明罰期在刑措象恭無赦干紀必誅是用錫公斧鉞各一以公英猷逺量跨厲嵩溟抱一車書括囊寰宇是用錫公彤弓一彤矢百旅弓十旅矢千以公天經地義貫徹幽明春露秋霜允恭粢盛是用錫公秬鬯一卣圭瓉副焉陳國置丞相以下一遵舊式往欽哉其恭循朕命克相皇天𢎞建邦家允興洪業以光我髙祖之休命璽書陳武帝下州郡璽書夫四王草代商周所以應天五勝相推軒羲所以當運梁徳不造喪亂積年東夏奔騰西都蕩覆蕭勃干紀非唯趙倫侯景滔天踰於劉曜貞陽反簒賊約連兵江左累屬於鮮卑金陵久非於梁國自有氤氲混沌之世龍圖鳳紀之前東漢興平之初西朝永嘉之亂天下分崩未有若於梁朝者也朕以虛薄屬當興運自昔登庸首清諸越徐門浪泊靡不征行浮海乗山所在戡定冒愬風塵騁馳師旅六延梁祀十剪强寇豈曰人謀皆由天啓梁氏以天禄斯改期運永終欽若唐虞推其鼎玉朕東西退讓拜手陳辭避舜子於箕山之陽求支伯於滄洲之野而公卿敦逼率土翹惶天命難稽遂享嘉祚今月乙亥升禮太壇言念遷桐但有慙徳自梁氏將末頻月亢陽火運斯終秋霖奄降翌日成禮圓丘宿設埃雲晩霽星象夜張朝景重輪泫三危之膏露晨光合璧帶五色之卿雲顧惟寡薄彌慙休祉昧旦丕顯方思致治卿等擁旄方岳相任股肱剖符名宇方寄恤隠王厯惟新念有欣慶想深求民瘼務在廉平愛恵以撫孤貧威刑以禦彊猾若有雈蒲之盜或犯戎商山谷之酋擅彊幽險皆從肆赦咸使知聞如或迷途俾在無貸今遣使人具宣往㫖念思善政副此虛懐梁禪陳璽書君子者自昭明徳達人者先天弗違故能進退咸亨動靜元吉朕雖䝉寡庶乎景行何則三才剖判九有區分情性相乖亂離云起是以建彼司牧推乎聖賢授受者任其時來皇王者本非一族人謀是與屈已從萬物之心天意斯歸鞠躬奉百靈之命謳謌所往則攘袂以膺之菁華已竭乃褰裳而去之昔在唐虞鑒於天道舉其黎獻授彼明哲雖復質文殊軌沿革不同厯代因循斯風靡替我大梁所以考庸太室接禮貳宫月正元日受終文祖但運不常夷道無恒泰山嶽傾偃河海沸騰電目雷聲之禽鉤爪鋸牙之獸咀齧含生不知紀極二后英聖相仍在天六夷貪狡爭侵中國縣王都帝人懐干紀一民尺土皆非梁地朕以不造㓜罹閔凶仰憑衡佐亟移年序周成漢恵邈矣無階惟是童䝉必貽顛蹷若使時無聖哲世靡艱難猶當髙蹈於滄洲自求於支伯者矣惟王應期誕秀開籙握圖性道故其難聞嘉庸已其被物乾行同其燾覆日御比其貞明登承聖於復禹之功樹鞠子於興周之業滅陸渾於伊洛殱驪戎於鎬京大小二震之驍徒東南兩越之勍冦遽行天討無遺神䇿於是祖述堯舜憲章文武大樂與天地同和大禮與天地同節鼓之以雷霆潤之以風雨仁霑葭葦信及豚魚殷牖斯空夏臺虛設民惟大畜野有同人升平頌平無偏無黨固以雲飛紫盖水躍黄龍東伐西征晻映川陸榮光曖曖已冒郊廛甘露瀼瀼亟流庭苑車轍馬跡誰不率從蟠水流沙誰不懐徳祥圖逺至非唯赤伏之符靈命昭然何止黄星之氣海口河目賢聖之表既彰握旄執鉞君人之狀斯偉且自攝提無紀孟陬殄滅枉矢宵飛天弧曉映久矣夷羊之在牧時哉蛟龍之出泉革運之兆咸徵惟新之符並集朕以欽若勛華屢回星琯昔者木運斯盡予髙祖受焉今厯去炎精神歸樞紐敬以火徳傳於爾陳逺鑒前王近謀羣辟明靈有悦率土同心今遣使持節兼太保侍中尚書左僕射平樂亭侯王通兼太尉司徒左長史王瑒奉皇帝璽綬受終之禮一依唐虞故事王其時陟元后寜育兆民光闡洪猷以承昊天之休命表勸進梁元帝表臣聞封唐有聖還承帝嚳之家居代惟賢終纂髙皇之祚無為稱於革舄至治表於垂衣而撥亂反正非間前古至如金行重作源出東筦炎運猶昌枝分南頓豈得掩顯姓於軒轅非才子於顓頊莫不因時多難俱繼神宗者也伏惟陛下出震等於勛華鳴謙同於旦奭握圖乗鉞将在御天玉縢珠衡先彰元后神祗所命非惟太室之祥圖畫斯歸何止堯門之瑞若夫大孝聖人之心中庸君子之徳固以作訓生民貽風多士一日二日研覽萬機允文允武包羅羣藝擬茲三大賓是四門厯試諸難咸熈庶績斯無間而稱也自無妄為象鍾禍上京梟獍䖍劉宗社蕩墜銅頭鐵額興㬥皇年封豨修蛇行災中國靈星所宅下武其興望紫極而行號瞻丹陵而殞慟家寃将報天賜黄鳥之旗國害宜誅神奉𤣥狐之籙尅李軼於河津征陶謙於海岱滕公擁樹雄氣方嚴張繡交兵風神彌勇忠誠貫於日月孝義感於氷霜如雷如霆非貔非虎前驅効命元惡斯殱既挂膽於西州方燃臍於東市蚩尤三塚寜謂嚴誅王莽千剸非云明罰青羌赤狄同畀豺狼胡服夷言咸為京觀邦畿濟濟還見隆平宗祀愔愔方承多福自氤氲渾沌之世驪連栗陸之君卦起龍圖文因鳥跡雲師火帝非無戰陣之風堯誓湯征咸用干戈之道星躔東井時破淆潼雷震南陽初平尋邑未有援三靈之已墜救四海之羣飛赫赫明明躬行天罰如當今之盛者也於是卿雲似盖晨映姚鄉甘露如珠朝垂原寢芝房感徳咸出銅池蓂莢伺辰無勞銀箭重以東漸𤣥莵西踰白狼髙栁生風扶桑銜日莫不編名屬國歸質鴻臚荒服來賓遐邇同慶其文昭武穆跗萼也如彼天平地成功業也如此久應旁求掌故諮詢天官斟酌繁昌經營髙邑宗王啓霸非勞武徳之侯清蹕無虞何事長安之邸揚龍旂以饗帝御鳳扆以承天厯數在躬疇與為讓去月二十日兼散騎常侍栁暉等至鄴伏承聖㫖謙冲為而不宰或云洛陽未復函谷無泥旋駕金陵方膺天睠愚謂大庭少昊非有定居漢祖殷宗皆無恒宅登封岱嶽且署明堂廵狩章陵時行司𨽻何必西瞻虎踞乃建王宫南望牛頭方稱天闕抑又聞之𤣥珪既錫蒼玉無陳乃棫樸之愆期非包茅之不貢雲和之瑟久廢甘泉孤竹之管無聞方澤豈不懼歟伏願陛下因百姓之心振萬邦之命豈可逡巡固讓方求石户之農髙謝君臨徒引箕山之客未知上徳之不徳惟見聖人之不仁率土翹瞻蒼生何望昔蘇季張儀違鄉負俗尚復招三方以事趙請六國以尊秦况臣等顯奉皇華親承朝命珪璋特達通聘河陽貂珥雍容尋盟漳水加牢貶館隨世汙隆瞻望鄉闗誠均休戚但輕生不造命與時乖忝一介之行人同三危之逺擯承閒内殿事絶耿弇之恩封奏邊城私等劉琨之哭不勝區區之至謹拜表以聞讓五兵尚書表臣聞仲尼大聖猶云書不盡言士衡髙才常稱文不逮意臣比衰痾日積思緒茫然頻託朋逰為裁章表雖復陳琳健筆未盡愚懐孫恵辭人頗加煩飾所以髙天緬邈弗降昭回瞻拜絲綸更增憂憊臣雖不敏弱冠登朝伊昔承華豫逰多士晩逢興運爰濫寵私爾時四郊多壘七雄分爭國家制度日不暇給趙宫論受命之宜隨邑奏升壇之禮而㕘聞秘計弗解單于之兵飛箭馳書未動聊城之將不期枚乗老叟忽降時恩馮唐暮年見申明主擢宰京邑朝坐棘林遂致洛陽無雨非比長安多盜其宜屏錮用寘嚴科猶處名僚乆為叨竊但著書天禄雖如劉向朔望登朝轉同王隠於其朽劣尚可從容司㑹文昌邈然非據讓散騎常侍表臣聞五十知命宗師之格言六百辭滿通賢之髙槩昔墨子諸生褰裳捄楚魯連隠士髙論却秦况乎謬䝉知己寜無感激洪私過誤寘以通班司憲文昌遂諧常伯今者昆吾小器諦視不見𤣥黄鈞天並奏靜聴能聞鐘鼓雖神農分藥岐伯提針㝠衆因縁難可匡救陛下嗣臨寶厯光闡大猷屬意銓衡留情槱棫燕臺装玉儻不精真齊客吹竽諒宜澄簡南郊奉乗當求鄭黙之才西省文辭應用羅含之學讓左僕射初表臣聞七十之嵗揚雄擬經六十之年平津對䇿若斯强壯無歎耆老臣勵則胄華軒冕才允卿相出納流譽朝野具瞻臣𢎞正國老儒宗情尚虚簡𤣥風勝業獨王當年臣種氣懐沈密文史優裕東南貴秀朝廷親賢並見壯猷皆宜左執若漢武好少則微臣已老若周文愛老則有此羣才伏願天明更謀梓匠求其妙選稱是能官讓右僕射初表加以言尋盟好仍屬亂離先零盜其牛馬烏孫竊其印綬子卿茹雪叔向為凶雖復東歸備罹此厄昔李廣遺恨不值漢初寗戚自悲不逢堯禪臣隨望聖運實在權輿時參決勝之籌頗奏發兵之䜟當塗錫舍非無董昭之誠典午禪文不降張華之實為王儀同致仕表尺波歸海恒歎不居爝火為薪猶悲假續况復星迴日薄通人有乞告之言鐘鳴漏盡前史有夜行之誡五陵鼎族家傳軒冕四姓卿侯榮由恩澤虚名靡實世官非才年力方强不能辭退今三元肇慶六吕司春得奉萬夀之盃豫參百辟之禮便釋朝衣謹遵初服同孔光之杖載逰户庭廣徳之車方懸私館為始興王讓瑯琊二郡太守表甫離懐袖裁脱綺紈適荷隆私使膺珪組執玉不起摳衣未勝自甘泉通火細栁屯兵旁帶戎臣頗同疆埸言瞻漢草迺曰中州遥望胡桑已成邊郡誠復居藩體國應思馬駿之功論地惟親宜慕曹彰之勇移文為䕶軍長史王質移文比金風已勁玉露方團宜及窮秋幸踰髙塞當使孤旌不反隻騎無還非止湯羅豈知堯徳其承比年民墊仍嵗藴隆粒粟貴於隨珠分糜乏於齊鼎且氐羌旅拒己跨伊瀍胡羯憑陵方踰汾潞刺虎之勢時期卞生拾蜯之機彌驗蘇子但國家體茲明信有同皎日豈惟風雨之旦猶救匹夫宵夢之言無欺幽壤賊華皎近以臨蕃有譴作牧無章既懼檻車之徵便憂齊斧之戮遂乃治兵楚夢竊載干戈傍引西戎共謀東夏偽周遣其衛國公宇文直等總統獯獫為其羽翼醜徒濟岸來攻郢城逆豎浮舟同趣夏浦王師艤棹素在中流羣帥爭驅應時殱蕩羌胡寶馬縱横七澤之中荆楚樓船彌滿三江之上俘禽所獲水陸無遺華皎擢自蒭微叨居藩翰情慙犬馬罔顧恩靈翻執干戈自圖家國聞諸間諜具彼鄰謀乃授冬官即為鄉導雖傷仁義之俗非敢有私期和與之情猶冀無失移齊文獲去月二十日移承羯冦平殄同懐慶悦眷言隣穆深副情佇夫天綱之大固無微而不擒神武之師本無征而不克至如戎王傾其部落逆豎道其鄉闗非厥英圖殆難戡戮况復洞庭遐曠兵食殷阜西窮版屋北罄氊廬聲冠苻姚勢兼聰勒庸蜀寶馬彌山不窮巴漢樓船凌波無際我之元戎上將協力同心承禀朝謩致行明罰為風為火殪彼䝉衝如霆如雷擊其舟艦羌兵楚賊赴水沈沙棄甲則兩岸同奔横尸則千里相枕江川盡滿譬睢水之無流原隰窮胡等隂山之長哭於是黑山叛邑諸城洞開白虜連羣投戈請命長沙鵩鳥靡復為妖湘川石燕自然還儛克翦無算縲禽不貲欲計軍俘終難巧厯所獲龍駒驥子百千其羣更開苜蓿之園方廣騊駼之廐於是衛霍甘陳虬髭瞋目心馳隴路志飲河源乗勝長驅未知所限豈如桓温不武棄彼闗中殷浩無能長兹羌賊方且西踰酒郡抵我境而置邊亭東略咸池為齊朝而反侵地此政亦剪妖氛未窮巢窟便聞慶褆愧佩良深檄檄周文主上恭膺寶厯嗣奉瑶圖既禀聖人之材兼富神武之略乂安兆庶共靖戎華用戢干戈永銷鋒鏑况復追惟在楚無忘玉帛之言軫念過曹猶惑盤餐之恵年馳玉節之使嵗降銀車之恩庶使懐音微悟知感而反其蔵匿招我叛臣翊從瀟湘空竭闗壟荆梁左右漢沔東西籲地呼天望停哀救夫一人掩泣猶愴滿堂百姓為心彌切宸扆大都督吳明徹台司上將徳茂勲髙威著荆湘化聞庸蜀叱咤而平宿豫吹噓而定夀陽席巻江淮無淹弦望啓安成王讓録尚書表後啓臣聞間平就國乃盛漢之常儀郕霍無官實宗周之明典何則皇季之重非待厯階王爵之隆自髙羣辟况臣戢翼要荒亟離寒暑進慙趙勝能定楚從退匪齊文馳免秦厄固以内切皇心外貽家恥甘輸重餌降禮單于迾城十五如請和璧市鄉三十聊同寶劍武夫力而獲諸原微臣還而反諸敵瞻言馬駿著隴右之功追念曹彰克烏丸之虜前王子弟若此勲庸偏其反而豈可勝愧謝勅賚燭盤賞答齊國移文啓昔班彪草移阮瑀裁書馳譽當年遂無加賞非常大賚始自今恩雖賈逵之頌神雀竇攸之對鼮䑕漢臣射覆之言魏士投壺之賦方其寵錫獨有光前官燭斯燃更慙良吏宵光可學乃㑹耆年臣職居南史身典東觀謹述私榮傳之方䇿謝勅賜祀三皇五帝餘饌啓竊以甘泉之殿舊禮羲軒長樂之宫本圖堯舜自東京晩世曠代無聞西漢盛儀復覩今日金壺流十旬之氣玉案備千品之羞昔絳羅為薦既延王母紫盖為壇允招太一同斯爽號理致衆星臣以餘年豫聞清祀如陪瑶席遂飲瓊漿謝兒報坐事付治中啓夫拾金樵路髙士所羞整冠李下君子斯慎兒報不能謹潔敢觸嚴網右趾鐵繫事允法科左校論輸實繇恩宥老臣過庭之訓多謝古賢折笄之杖有愧前達謝賚麕啓臣昨既陪羽獵仍宴上林固謝長卿之文彌慙子雲之賦預割鮮禽已同監浦頻䝉大臠更異梁王詰旦歸來猶為飽飫虞衡所獻復降命恩賜細君以為歡非屠門而大嚼謝東宫賚蛤蜊啓船俗嚴戈漁人資設于彼海童冐兹水豹望樓闕之氣得波潮之下謝賚蛤啓鴻化闕雀入猶新纔變秋成己聞冬獻書為貞陽侯與太尉王僧辯書昔自天狼炳曜非無戰陣之風參虎揚芒便有干戈之務至於夏鍾夷羿周厄犬戎漢委珠囊秦亡寶鏡彰於史籍可得而聞未有國家殱危遂若當今者也我大梁膺龍圖而受命御鳳邸以承天軒頊比於諸侯湯武方於兒戲三光有乂四海無波靈貺咸臻表裏禔福非日非月蒼生仰其照臨如雲如雨天下䝉其恩䕃而屯亨有數剥極為災梟獍豺狼肆逞兇逆後主誕資上聖光啓中興大剪仇讐方平宗社雖復瀟湘舉斧庸蜀彎弓凡厥兇徒誰不殱撲豈圖天未悔禍喪亂薦臻羌虜無厭乘此多難䖍劉我南國蕩覆我西京奉聞驚號肝膽崩潰雖復金行版蕩火政淪亡緑林青犢之羣黑山白馬之卒八王故事曾未混淆九州春秋誰云禍亂昔隆周徙播皆慿晉鄭之功彊漢阽危終假虚牟之力今者武皇之子無復一人藐是孤孫還同三叛等子頹而為暴同劉芳而入闗乞命諸戎勢何支久孤宗室之長爰自布衣皇運之初彌承天徳何則據鞍輟哭雖紹霸圖獨居掩涕終討家怨孤二三昆季方矢戴天被此恩慈如何酬答所以徐彭之役不􅈔輕軀哀荷之誠久聞朝聽况復邦家不造至此横流宗社無依何所逃責因以提戈負劍卧泣行號言念荆巫志雪讎恥大齊觀書有洛輯瑞榮河功格蒼旻徳滿天地慈孝之道通於百靈仁信之風覃於萬國是以日月所照舟車所通候海水以來賓瞻蒼雲以奉貢昔自軒農炎昊曾無宣國之規虞夏商周非有伐戎之畧豈知華夷仰徳逺近同心榖價無堯湯之憂糧儲同水火之賤精兵利器勢勇靁霆天馬龍媒量比山谷斯固開闢以來未之有也至於親鄰之道夙契逾深無改曩懐增感彌篤以為興亡繼絶事昞前經推擇庸虛命守宗禩方欲仰慿神武清我冦讎㫖喻難違諸懷更恧明公誕膺時運光賛本朝勒瑞姜璜書名何鼎故以通期管樂㝠契風雲戮不世之渠兇殱滔天之巨冦重以三湘放命七國連從征旅東西必翦妖逆雖復棧道木閣田單之奉舊齊綰璽将兵周勃之扶隆漢中宗佐命俱畫丹青光武功臣皆懸星象非貔非虎之封同心同徳之勞校彼功庸曾何髣髴但與存與亡期於體國喪君有君寜容無主夙承所立猶則孱䝉天步方難寜可𢎞濟自淹留大國志荷恩私朝夕宫闈預奉顔色黄河白日亟亶誠言分災卹患事非虚㫖但善相小國終資大賢定我邦家繄公是賴淮流不竭豈獨瑯琊望能喻此衷懐思之無忽近陸居士有啓陳其禍亂朝㫖即命河東王岳等勤率羆熊便相抵赴道阻且長雖無之及所聞西浮夏首便當險隘之衝南捍巴陵方拒窺窬之冦上黨王皇齊寵弟是號宗英親御戎軒逺于將送裵侍中英起淮南貴族兼事戎行躍冀馬者千羣披燕犀者萬隊來自河陽曾不旬日持節徐武潼三州諸軍事散騎常侍明逺將軍東徐州刺史始興縣開國侯湛海珍等並前朝舊將夙著勲庸推轂海邊屬是喪亂雖復拔身有道志雪朝怨咸預戎行共指鄉國江淮舊𨽻悉已招攜方禀英謨共翦讎難去月將晦便届夀春已具舟師將臨江浦使人入境行陳所懐撥日覘光遲在還牘當使宗祊有主余同小白之勲家國無虞公保阿衡之貴何其美也豈不休哉言念此私但以號咽為貞陽侯答王太尉書姜常侍暠至復枉去月三十日告具公所懐良以慨息孤雖庸薄不及通賢猶曰生民寜無心識自皇家禍亂亟積寒暄九州萬國之人蟠木流沙之地莫不行號卧泣想望休平何况于孤預在宗室家荷報雪之恩身䝉鞠養之愛者先皇之慈也蒸嘗不絶於私廟子弟得嗣於南藩者後主之恵也朱方之地建業之都誰家丘陵誰家宫廟豈有為人臣子荷此恩靈親執干戈自殉家國公之忠孝信感人神公之盟誓事同懸象雖復宗盟不造骨肉為讎安可相期盡如蕭詧耶古者天子六軍是為萬乗今日凶荒致闕斯禮偏禆將校尚握精兵州郡官曹各有武吏未有居稱扆座行曰乗輿遂無五尺之童髙謝千人之長於公明允意復云何國家凋荒既乏屯衞皇齊與睦幸恵優矜何乃自起趦趄茍違鄰徳克勘禍亂欲立功名咸自軍師豈在芻𨽻湛海珍等前朝舊將差匪齊人分給羸兵即是梁甲非云背信豈曰渝盟朝野羣雄何所攜貳且公天資命世再造皇家梁代之桓文蕭宗之伊管誰其逺近不禀英謨如有姦回正速齊斧尚何憂於共工何畏於有苗哉所覽來書既為疑難上黨王恭承朝㫖不敢相同方篤鄰和不容全異如須減損更遲行人張廷尉種等所具此無多及為貞陽侯重與王太尉書席威卿等還枉此月十四日告披覽未周良深慨息昔長平建䇿猶聞蝕昴之徵疎勒効忠時致飛泉之感豈在余凉徳書不盡言遂使吾賢猶迷所執斯故銜哀掩淚仍復披陳者也孤以庸薄寜有霸圖侯服于周常懼盈滿豈望身居黄屋手御青綸揖讓而對三靈端委而朝百辟詢諸圉牧莫不皆知援誓神明固自無爽但大齊仁信之道闗於至誠睦鄰之懐由於孝徳遂䝉殊奨歸嗣本朝拜首陳辭敦誘彌廣既而仇讐未殄方慿大國之威宗祏阽危尤仰親仁之徳僶俛恩寄號靦惟深而勑諭分明信誓殊重乃云邦家有乂社稷無虞凡廣陵厯陽皆許見還白水黄河屢奉然諾至於夏藩衝要控遏上流且命强兵為我臨據若其自有精甲能捍醜徒並用還梁皆如前㫖以孤頻經忝竊屢守淮淝門生故吏遍於江右凡諸部曲竝使招攜投赴戎行前後雲集霜戈雪㦸無非武庫之兵龍甲犀渠皆是雲臺之仗文物以紀之聲名以發之斯實不世之隆恩寜曰循常之恒禮則公固天所授𢎞濟本朝曲阜同功營丘等烈若夫伊尹庖厨賤宰霍光階闥小臣諸葛亮無應變之才管夷吾非王者之相論其世業較彼勤勞書契己來罕有明徳且程嬰之義自古為難荀息之忠良以喜慰但先朝乘玉鏡之符御金輪之寶菩薩之化行於十方仁夀之功沾於萬國兇人侯景遂殄邦家何况於今亦有吳㑹江東如掌差匪虚言淮揚在面方此非局不稼不穯多厯嵗時大東小東全無機杼闗中醜虜寜非冒頓之鋒齊國强兵便是軒轅之陣西南當扼喉之勢東北承撫背之機首尾交侵華夷俱騁而沖人數嵗復子方賖徳未感于黎蒸威不加于將帥斯等怏怏非少主臣安有碌碌因人成事公之才具雖復明允勢何如于天監時何若于大同乘與國之隆恩當滔天之猛㓂匡救之徳翻未有從忠許之謀誰其相曉卧薪待火方此弗危繫草從風儔之非切若能思其上䇿審此英圖見引軨獵之車還向長安之邸一則二則惟在大賢外相内相終當相屈正當攜諸舊𨽻率我賓逰朝服簮纓直拜園寢梁人望國俱登赤馬之舟齊師臨江仍轉蒼鷹之斾分袖南浦揚鞭北風民不疲勞軍無怨讟如其執事尚秉前言將恐戎麾便濟江表何則西浮夏首己據咽喉東進彭波次指心腹廣陵京口烽煙相望魯柝聞邾方之尚逺胡桑對薊匹此為遥水陸爭前龍虎交至則揚都蕩定功自齊師江左臣民非闗梁國豈不追慙後主崇寄之恩還負齊朝親鄰之意東門黄犬固以長悲南陽白衣何可復得立兹㓜弱非曰大勲滅我宗祊何所迯舋今復遣前吉州刺史馬嵩仁至彼更具徃懐想不逺而復無貽祗悔也若英謨有在方興祀夏之功明監如違便等過殷之歎存亡社稷一在于公臨紙崩號不復多及為貞陽侯答王太尉書姜暠至枉示具公忠義之懐家國喪亂于今積年三后䝉塵四海騰沸天命元輔匡救本朝𢎞濟艱難建我宗祏至於丘園板築尚想來儀公室皇枝豈不虛遲聞孤還國理㑹髙懐但近再命行人或不宣具公既詢謀卿士訪逮藩維㳂泝徃來理淹旬月使乎届止殊副所期便是再立我蕭宗重興我梁國億兆黎庶咸䝉此恩社稷宗祧曾不相愧近軍次東闗頻遣信裵之横處示其可否答對驕凶殊駭聞矚上黨王陳兵見衛欲叙安危無識之徒忽然逆戰前旌未舉即自披猖驚悼之情彌以傷惻上黨王深自矜嗟不傳首級更䝉封樹飾棺厚殯務從優禮齊朝大徳信感神民方仰藉皇威敬慿元宰討逆賊於咸陽誅叛子於雲夢同心協力克定邦家覽所示權景宣書上流諸将本有忠略棄親向讐庶當不爾防奸定亂終在於公今且頓東闗更待來信未知水陸何處見迎夫建國立君布在方䇿入盟出質有自來矣若公之忠節上感蒼旻羣帥同謀必匪攜貳則齊師反斾義不陵江如致爽言誓以無克韜旗側席遲復行人曹沖奉表齊都即押送也渭橋之下惟遲叙言氾水之陽預有號懼為貞陽侯重答王太尉書王尚書通至復枉示知欲遣賢弟世珍以表誠質具悉憂國之懐復以庭中玉樹掌内明珠無累胷懐志在匡救豈非劬勞我社稷𢎞濟我邦家慙歎之懐用忘興寢晉安王東京貽厥之重西都繼體之賢嗣守皇家寜非民望但世道喪亂宜立長君以其䝉孽難可成業成昭之徳自古希儔冲質之危何代無此孤身當否運志不圖生忽荷不世之恩仍致非常之舉自惟虛薄兢懼己深若建承華本歸皇胄心口相誓惟擬晉安如或虛言神明所殛覽今所示深遂本懐戢慰之情無寄言象但公憂勞之重既稟齊恩忠義之情復及梁貳華夷兆庻豈不懐風宗廟明靈豈不相感正爾回斾仍向厯陽所期質累便望來彼衆軍不渡已著盟書斯則大齊聖主之恩規上黨英王之然諾得原失信終不為也惟遲相見使在不賖鄉國非遥觸目號咽又為貞陽侯答王太尉書周尚書𢎞正張廷尉種姜常侍暠等至枉此月二十六日告并遣賢弟子世珍賢子顯等具忠欵之至公養孤之恩愛甚鄧侯少子之懐情深張禹豈非憂勞社稷用忍肌膚天下含靈誰無悲愧余遭家不造敬累吾賢言念忠誠益以號咽但皇齊大徳過見憂矜微借輕兵以垂將送意謂江東凋弊累積寒暄供膳資儲理當多闕輒白上黨王止請三千人二百疋而己凱衆人殊尚有疑難將恐諸士未喻雅懐今復命周尚書及姜常侍還彼具陳一二夫以受為冦非有晉邦不送為譏終無楚國五千歩卒既謝李陵三千羸兵亦等無忌公之明義理不為嫌行人失辭尚停然諾臨江總轡企望音郵惟遲來書此不多具為貞陽侯與陳司空書軒轅既作遇蚩尤之兵顓頊為君阻共工之亂雖復揺山蕩谷驅電乘雷殘厥兇渠曾靡遺孽未有時當至治世在欽明元惡滔天遂陷邦家者也我大梁開金繩之寶牒紐玉鏡之珍符功烈與造化相侔徳施與風雲俱逺戴日戴斗何向不賓太平之基無思無届逆賊侯景殱亂本朝釁重聰彌凶逾羿浞後主天經地緯義冠人靈驅馭熊羆遂剪勍盜少康祀夏何可對揚太戊興殷彌無等級不圖天未悔禍喪亂薦臻羌賊慿陵侵蕩荆漢乘輿幽辱既陷兇徒黎獻崩騰莫不淪没故以哀窮兆庶痛極蒼旻者也夫諸侯釋位寜非亂禍之朝宗子維城本濟殷憂之日武皇遺胄皆陷虜庭乞命偷生何能支久孤宗室之長爰自布衣辛癸之朝容身靡託追惟先業大庇生民既雪伯升之怨仍紹桓王之霸孤二三昆季情禮獲申等預藩枝偏承皇徳近嵗彭都之役得備戎昭鞍甲之勞庶訓天寵况復邦家不造至此横流凶狡猶存何所迯責固以提戈負劍卧泣行號言念荆巫志雪讐恥大齊徳竝天地明符日月隆禮詔俗張樂被民義感華夷仁侔造化玉羊銀甕嘉瑞必彰澤馬山車禎符總集若夫中原猛士本自無窮沙塞精兵斯何有量是以家國之富文景所未儔兵馬之强秦漢所未敵但親鄰之道既篤夙私明發之懐彌孰先好以為興亡繼絶聖典通規爰命無庸嗣守社稷既方慿大國庻討仇讐恩喻難違諸懐慙哽公體兹懋徳毗奉中興歸自番禺志在討亂至於雲行電邁谷靜山空扼鵲尾而定王畿登牛頭而掃天闕漸臺偽帥將傳首於帝京郿塢元兇皆横屍於軍市髙庸茂烈振古希儔承此欣然深所嘉歎今者殷憂未己禍難相尋宗社無依奥主宜立夙承所眷尚在冲年王室猶難何以康濟董侯㓜弱終覆漢朝馬業童䝉仍傾晉室所謂前事之不忘後事之龜兆也孤過荷恩靈預奉帷幄黄河白日亟降誠言分災䘏患事非虛㫖但當小國之禮無失敬恭闔境人民俱勞寤寐方窮人爵之重以報非常之功恵覽今書希能留意也上黨王文髙劉徳武冠曹彰爰降宗英逺于將送裴侍中英起賛奉師徳俱事戎間月壘連營雲旗蔽野同集江淮翼我歸斾湛海珍等竝前朝舊將夙著勲庸江左氛妖投身齊國今者皆䝉恩奨竝在戎行歸附明公共剪讐難去月將晦便留夀春己具舟艫將臨巢浦若公為内主方同國子之勲余以定家得免臧孫之歎豈不功名富貴共保無疆前望鄉闗惟增號哭為貞陽侯重與裴之横書張佛奴昨還得去月二十九日書覽以增慨昔桓公始反管仲親射其車重耳初還吕郤終焚其室頃家國多患頻遘閔凶前事不忘便為龜兆所以皇齊大徳禮秩兼常威武紛紜洪恩汪濊况復旌旗照日鼓吹從風文物俱華羽衛相鬱書契己來斯未有也卿天監之始門宦有成承聖之初身名俱泰正應勤王効命酬二后之恩憂國如家報三靈之寵何有方規異志茍樹童䝉阻地險於長川忘天討之應及孤昔忝藩維非無游士平原之館乃乏如錐田文之家差有彈鋏雖李廣麾下莫不封侯衛青故人多懐彼此豈可文辭簡畧禮等平交披封伸紙益多歎異相䑕無儀表詩人之作茅鴟刺傲彰魯史之文宿昔相期不應如此衆軍即便頓江闗相見在近不復多及為貞陽侯與北齊荀昻兄弟書張佛奴至未枉還告但以勞悒夫興亡繼絶徃帝之通規分災恤患聖王之恒典自敦龎既散詐偽萌生時託親鄰信有澆慝大齊道冠三皇風髙九代仁信之本闗於至誠言與之恩由於孝徳孤謬䝉殊奨還嗣本朝勑諭分明言誓殊重若使邦家克定境内無虞凡廣陵歴陽皆許見還白水黄河屢奉然諾彞章禮數莫不優華斯乃不世之殊恩寜是悠常之恒事王太尉勲踰吕望徳冠伊衡凡厥英謀筭靡遺策豈容當滔天之巨冦違大國之隆恩計彼賢明必當不爾卿維兄及弟莫非雄才江外風塵不染兇寇賈氏三虎豈獨貴於前修荀家八龍信服在於今日近者州司不道或致流言朝聴矜明己如前及想謀元宰善保良圖南道主人以相付也見所答東海徐湛書粗具來意昔桓慿莒衆文用秦攻是假鄰國之威以備非常之變若使江東宰匠具領齊恩時命封疆逺相迎接故當攜諸舊𨽻率我賓㳺朝服簮纓直拜園寢梁人望國自合水而浮舟齊師言歸指滄江而迴斾如其彼相未悟良機將恐戎麾遂踐京邑若其求成取敗豈謂和風龍馬雲旗差不相涉一二復令張佛奴口具相見在近此不多及在北齊與楊僕射書陵叩頭叩頭夫一言所感凝暉照于魯陽一志㝠通飛泉涌于疏勒况復元首康哉股肱良㢤隣國相聞風教相期者也天道窮剥鍾亂本朝情計馳惶公私哽懼而骸骨之請徒淹嵗寒顛沛之祈空盈巻軸是所不圖也非所仰望也執事不聞之乎昔分鼇命鳸之世觀河拜洛之年則有日烏流災風禽騁暴天傾西北地缺東南盛旱坼三川長波含五嶽我大梁應金圖而有亢纂玉鏡而猶屯何則聖人不能為時斯固窮通之恒理也至如荆州刺史湘東王機神之本無寄名言陶鑄之餘猶為堯舜雖復六代之舞陳于總章九州之歌登于司樂虞䕫拊石晉曠調鐘未足頌此英聲無以宣其盛徳者也若使郊禋楚翼寜非祀夏之君戡定艱難便是匡周之霸豈徒豳王徙雍朞月為都姚帝遷河周年成邑方今越裳藐藐馴雉北飛肅眘茫茫風牛南偃吾君之子含識知歸而答㫖云何所投身斯其未喻一也又晉熈等郡皆入貴朝去我潯陽經塗何幾至於鐺鐺曉漏的的宵烽隔溆浦而相聞臨髙臺而可望泉流寶盌遥憶湓城峰號香罏依然廬嶽日者鄱陽嗣王治兵匯𣲖屯戍淪波朝夕牋書春秋方物吾無從以躡屩彼何路而齊鑣豈其然乎斯不然矣又近者卲陵王通和此國郢中上客雲聚魏都鄴下名卿風馳江浦豈盧龍之徑于彼新開銅駝之街于我長閉何彼途甚易非勞于五丁我路為難如登于九折地不私載何其爽歟而答㫖云還路無從斯所未喻二也晉熈廬江義陽安陸皆云欵附非復危邦計彼中途便當靜晏自斯以北桴鼓不鳴自此以南封疆未壹如其境外脱殞輕軀幸非邊吏之羞何在匹夫之命又此賓逰通無貨殖忝非韓起聘鄭私買玉環吴札過徐躬要寶劍由來宴錫凡厥囊装行役淹留皆己虚罄散有限之微財供無期之久客斯可知矣且據圖刎首愚者不為運斧全身庸流所鑒何則生輕一髮自重千鈞不以賈盜明矣骨肉不任充鼎俎皮毛不足入貨財盜有道焉吾無憂矣又公家遣使脱有資須本朝非隆平之時逰客豈皇華之勢輕装獨宿非勞聚􅈀之儀微騎閒行寜望輶軒之禮歸人將從私具驢騾縁道亭郵唯希蔬粟若曰留之無煩於執事遣之有費於官司或以顛沛為言或云資装可懼固非通諭皆是外篇斯所未喻三也又若以吾徒應還侯景侯景兇逆殱我國家天下含靈人懐憤厲既不獲投身社稷衛難乘輿四冡磔蚩尤千刀剸王莽安所謂俛首頓膝歸奉寇讐佩弭腰鞬為其皂𨽻日者通和方敦曩睦凶人狙詐遂駭狼心頗疑宋萬之誅彌懼荀罃之請所以奔蹄勁角專恣慿陵凡我行人偏膺讐憾政復葅筋􅊽骨抽舌探肝於彼凶情猶當未雪海内之所知也君侯之所具焉又聞本朝公主都人士女風行雨散東播西流京邑丘墟葌蓬蕭瑟偃師還望咸為草萊霸陵回首俱沾霜露此又君之所知也彼以何義爭免寇讐我以何親爭歸委質昔鉅平貴將懸重于陸公叔向名流深知于鬷篾吾雖不敏常慕前修不圖明庶有懐翻其以此量物昔魏氏將亡羣凶挺爭諸賢戮力想得其朋為葛榮之黨邪為邢杲之徒邪如曰不然斯所未喻四也假使吾徒還為兇黨侯景生於趙代家自幽恒居則台司行為連率山川形勢軍國彞章不勞請箸為籌便當屈指能算重以逋逃小醜羊豕同羣身寓江臯家留河朔春春井井如鬼如神其不然乎抑又君之所知也且夫宫闈秘事竝若雲霄英俊訏謨寜非帷幄或陽驚以定䇿或焚藳而奏書朝廷之士猶難參預羈旅之人何階耳目至於禮樂㳂革刑政寛猛則謳歌己逺萬舞成風不知手之舞之足之蹈之也安在揺其牙齒為其間諜者哉若謂復命西朝終奔東虜雖齊梁有隔尉侯奚殊豈以河曲之難浮而曰江闗之可濟河橋馬度寜非宋典之姦闗路雞鳴皆曰田文之客何其通蔽乃爾相妨斯所未喻五也又兵交使在雖著前經儻同徇僕之尤追肆寒山之怒則凡諸元帥竝釋縲囚爰及偏禆同無翦馘乃至鍾儀見赦朋笑遵途襄老䝉歸虞歌引路吾等張􅎶拭玉修好尋盟涉泗之與浮河郊勞至於贈賄公恩既被賓敬無違今者何􅄽翻䝉貶責若以此為言斯所未喻六也若曰祅氛永久喪亂悠然哀我奔波存其形魄固己銘兹厚徳戴此洪恩譬渤澥而俱深方嵩華而猶重但山梁飲啄非有意于籠樊江海飛浮本無情于鐘鼓况吾等營魂己謝餘息空留悲黙為生何能支久是則雖䝉養䕶更夭天年若以此為言斯所未喻七也若云逆豎殱夷當聴反命髙軒繼路飛盖相隨未解其言何能善謔夫屯亨治亂豈有意於前期謝常侍今年五十有一吾今年四十有四介己知命賓又杖鄉計彼后生肩隨而己豈銀臺之要彼未從師金竈之方吾知其訣政恐南陽菊水竟不延齡東海桑田無由佇望若以此為言斯所未喻八也足下清襟勝託書囿文林凡自洪荒終乎幽厲如吾今日寜有其人爰至春秋微宜商畧夫宗姬殄墜覇道昏凶或執政之多門或陪臣之凉徳故臧孫有禮翻囚與國之賓周伯無空怒天王之使遷箕卿于兩館縶驥子於三年斯匪貪亂之風邪寜當今之髙例也至於雙崤且帝四海爭雄或搆趙而侵燕或連韓而謀魏身求盟於楚殿躬奪璧于秦庭輸寶鼎以託齊王馳安車而誘梁客其外膏脣販舌分路揚鑣無罪無辜如兄如弟逮乎中陽受命天下同規巡省諸華無聞幽辱及三方之霸也孫甘言以娬媚曹屈詐以羈縻旍軫嵗到於句吳冠盖年馳於庸蜀則客嘲殊險賓戲己深共盡逰談誰云猜忤若使搜求故實脱有前蹤恐是叔世之姦謀而非為邦之勝畧也抑又聞之雲師火帝澆淳乃異其風龍躍麟驚王霸雖殊其道莫不崇君親以詔物敦敬養以治民預有邦司曾無隆替吾奉違温凊仍屬亂離冠虜猖狂公私播越蕭軒靡御王舫誰持瞻望鄉闗何心天地自非生慿廩竹源出空桑行路含情猶其相愍常謂擇官而仕非曰孝家擇事而趨非云忠國况乎欽承有道驂駕前王郎吏明經鴟鳶知禮巡方省化咸問髙年東序西膠皆尊耆耋吾以圭璋玉帛通聘來朝屬世道之屯期鍾生民之否運兼年累載無申元直之祈銜泣吞聲長對公閭之怒情禮之訴將同逆鱗忠孝之言皆應齚舌是所不圖也非所仰望也且天倫之愛何得忘懐妻子之情誰能無累夫以清河公主之貴餘姚書佐之家莫限髙卑皆被驅畧自東南醜虜抄販饑民臺署郎官俱餒墻壁况吾生離死別多厯暄寒孀室嬰兒何可言念如得身還鄉土躬自推求猶冀提攜俱免凶虐夫四聰不達華陽君所謂亂臣百姓無寃孫叔敖稱為良相足下髙才重譽參賛經綸非豹非貔聞詩聞禮而中朝大議曾未矜論清禁嘉謀安能相及諤諤非周舍容容類胡廣何其無諍臣哉嵗月如流半生何幾晨看旅雁心赴江淮昏望牽牛情馳揚越朝千悲而淹泣夜萬緒而回腸不自知其為生不自知其為死也足下素挺詞鋒兼長理窟匡丞相解頥之説樂令君清耳之談向所諮疑誰能曉諭若鄙言為謬來㫖必通分請灰釘甘從斧鑊何但規規黙黙齰舌低頭而己哉若一理存焉猶希矜眷何必期令我等必死齊都足趙魏之黄塵加幽并之片骨遂使東平拱樹長懐向漢之悲西洛孤墳恒表思鄉之夢千祈以屢哽慟増深徐陵叩頭再拜在北齊與宗室書陵白臨淮負海是謂徐州顓頊髙陽世有明徳自興王啓霸無勞委劍之鋒開國承家實饗彤弓之賜其後金柯玉葉霞振雲從耆舊通人茂才多士或以天下之貴負石自沈王命之尊拂衣髙蹈或熊衣雉製青組朱旗儒盛江東文髙河北或復分齊處魯移魏居燕𤓰瓞雖遥芳枝無逺昔有王如王莽無闗控鵠之宗劉曜劉淵彌非偃龍之族又有朱家别録邾子之苗何氏殊源韓侯之𦙍三烏五鹿時事無恒東郭西門遷訛非一吾宗雖廣未有駢枝咸自駒王同分才子正以金衡委御玉斗宵亡胡賊慿陵中原傾覆我則供犧牷於東國載主祏於南都二百餘年家于揚越此則盧諶不去裴寜仍留髙宦燕秦遲迴鄉壤山河有隔叙覯無縁望冀馬而增勞瞻賓鴻而永歎昔竇公累世光武稱其外家許都遥逺靈王思其舊宅其言雖大可以喻小况在宗親寜無停眷比月應雩龍星移殷鳥天明和煦體中何如願百年之老興居多福萬石之君寒暑清豫其外族忠孝比屋連甍信義勇於干戈詩書甘於酒醴或有漁獵三史紛綸五經都講開黌詩生負帙邦君佇徳寜無掛榻之思州將欽風應有題車之命南陽坐嘯寄以共治東海行歌資其主弼梁竦不好徒為大言鄧禹平生惟望如此若棲遲偃仰因事丘中桃果三名粟園千樹持竿而釣徵聘不來負耒而耕公侯靡屈何其髙也盖復休哉如脱推延或遲竝問吾階縁人乏叨簉皇華王事無淹公禮將畢既而揚都蕩覆方離獫狁之災越界風塵復蹈輶軒之禮屏居空館多厯歲時舋犯靈祗招延禍罰號慕無窮肝膽屠殞煩寃胸臆不自堪居無心奈何無狀奈何自徘徊河朔亟積寒暄風患彌留半體枯廢折臂為公雖非羊祜跛足而使無慙郤克固以形如槁木心若死灰匍匐苫廬纔有魂氣夫迷山之客遲遥響於巖崖窮海之賓望孤煙於洲嶼况乃宗均魯衛地匪燕吳車騎相望舟艫朝夕三條不逺五達非難信乃闊然遂不䝉問昔桃花之峽長避秦嬴芝草之山遥然滄海猶復漁船可入何况平途不兼旬月勞懐既積輒命行人弦望之間遲枉歸翰儻二三兄弟能敦昭穆之詩求我漳濱幸開劉楨之疾陽春改節竝念將宜扶力為書多不詮次陵白在北齊與梁太尉王僧辯書太清六年六月五日孤子徐陵頓首昔者雲師火帝非無戰陣之風堯誓湯征咸用干戈之道至於揺山蕩海驅電乘雷殱厥兇渠無虧皇極若夏鍾夷羿周厄犬戎漢委珠囊秦亡寶鏡然則皆聞之矣未有膺龍圖以建國御鳳邸以承家二后欽明三靈交泰而天崩地坼妖冦横行者也自古銅頭鐵額興㬥皇年檮杌窮竒流災中國王彌石勒吞噬闗河緑林青犢之羣黑山白馬之衆校彼兵荒無聞前史八王故事曾未混淆九州春秋非云禍亂我皇受命中興光宅天下泰寜𤨏𤨏安敢執鞭建武栖栖何期扶轂抑又聞之陶唐既作天歸鳥喙之臣豐畢將興特挺鷹揚之佐明公量苞金鉉神表玉璜儷衮欽才平階佇徳固以留連管樂惆悵風雲濡足維時投竿斯在去嵗兇徒不騁言次巴丘鼓聲聞一柱之臺烽火照三休之殿公則懸麾羽扇猶對投壺戎羯咸奔鯨鯢俱剪樓船萬軸還繫昆明胡馬千羣皆輸長樂於是乎夏首西浮雲行電邁彭波東匯谷靜山空扼鵲尾而據王畿登牛頭而掃天闕漸臺偽帥仍傳首於帝京郿塢元兇咸刳腸於軍市青羌赤狄同畀豺狼胡服夷言咸為京觀公園陵盡拜忠貫長沙神主咸安勲踰髙宻重以秦宫既獲魯殿猶存闢緑草於應門開青槐於武庫長安五陵之族鄠杜六遷之民襁負而歸都壥斯滿鬻脂蔵脯逰騎擊鍾故市新城飛甍華屋東莞舊宅人識桑榆南頓荒田家分禾黍豈以鄉名榖熟邑號禾興而己哉若夫卦起龍文書因鳥跡劬勞王室大拯生民自開闢以來未之有也雖十六才子明允篤誠八百諸侯専心同徳中宗佐命俱畫丹青光武功臣皆懸星象棧道木閣田单之奉霸齊綰璽将兵周勃之扶彊漢壤蟲之比黄鵠轍鮒之仰河宗未足云也孤子階縁多幸叨簉皇華鄉國屯危公私憔迫邳彤之切長亂心胸徐庶之祈終無開允既而屏居空館多厯嵗時釁犯幽祗躬當勦滅何圖釁咎災極蒼旻號慕煩寃肝腸屠殞酷痛奈何無狀奈何惟桑與梓飜若天涯杖栢栽松悠然長絶明明日月號呌無聞􅃼􅃼宇宙容身何所窮劇奈何自忝膺嘉聘仍屬亂離上下年尊偏嬰此酷昔人迎門請盜恒懐廢寢之憂當輓輿櫬猶有危途之懼况乎逆冦崩騰京師播越興居動止長隔山河朝夕饘􅓞誰經心眼程糜不繼原粟何資瞻望風雲朝夕嗚咽固乃遊魂已謝非復全生餘息空留非為全死同氷魚之不絶似蟄蟲之猶蘇良可哀也良可哀也自東都紹漢南亳興殷修好徴兵彌留星琯韓宣范武方駕連鑣蘇秦張儀朱輪華轂而孤子三危是擯四罪同科聴别馬而長號杖歸旍而永慟王稽反命既無託乘之恩椒舉相逢誰為班荆之位昔人違齊處魯時降徵求亡晉奔秦猶䝉招請問管寜于遼左追王朗于浙東竝物譽時賢卿門公族懸須應務深挾情祈斯豈庸賤之儔耶非餘生之敢望也但預在輶軒誠為過誤珪璋特達通聘河陽貂珥雍容尋盟漳水差有黄門啓封非無青紙詔書郡將州司郊迎負弩鄉亭里候飾館陳兵豈是復介而奔齊寜當竊妻而迯晉己焉哉羌難得其言也漢之谷吉捐軀者幾人楚之申胥埋魂者何極孤子何所歎焉但頓伏苫廬徒延光咎夫以啁噍鷰雀躑躅鳴號含識懐靈未有其痛且夫曾耕雨雪猶尚悲歌蘇使幽囚無馳哽噎公履忠𢎞孝冠冕縉紳化感煙雲量標海岳行縻仲月王政無塞分榖髙年仁風斯逺固以衣纓仰訓黎庶投懐今日憔惶彌布洪澤雖復孤骸不返方為漠北之塵營魄知歸終結江南之草孤子徐陵頓首與王吳郡僧智書孤子徐陵頓首昔林宗道主時人多慕徳之賓無忌雄豪天下盡希風之客况復王家沈黙謝氏混𤣥名貴公門譽華卿子而秦峰阻夐浙水悠長諮訴無因但用窮結比青葽己戒白露方溥體中何如願聞康勝鄧仲華服衮之年荀令則擁旄之日徒云早逹未可同功今日相方豈不髙視竊承富春頃嵗多難薦臻邑閈皆空黔黎將盡御史舊榻零落不存太傅齊室荒茫無處自神麾所届襁負斯歸新屋方華故田斯墾府吏閒坐長使誦經督郵無事惟慮吹笛東苞海水俱承幕府之威西洎江沱同仰惟良之化政差邊張何其神也孤子無心靦冒茍㕁光隂風疾彌留示有餘息恩將公聘窮擯虜庭博望侯極跡於黄河栘中監流滯於滄海自斯以後惟有庸賤本應埋魂趙魏析骨幽并豈意餘年復反鄉國仰屬伊公在亳渭老師周旌賁丘園採拾衡巷遂以哀駘不棄甕盎無遺還顧庸虛未應偕此竊承君侯過被以光輝屢有吹嘘之言頻䝉薦延之澤故得周行紫閣升降丹墀㸃汙清朝豈不荒愧雖復華隂砥柱帶地窮深嵩髙維岳極天為重未可以方斯盛典譬此洪恩年迫桑榆豈期酬報政以川波非逺對奉無因夜夢子長之逰朝覽希道之疏浮雲西北徒懐魏帝之文行雨東南思假飛山之便窮誠己結荒係逾深方事祈寒願加珍納謹扶力白書迷乏不次孤子徐陵頓首答李顒之書近謬枉清音無申窮眷忽辱来告文製兼美君山西盛族素挺風流河北辭林本所嗟賞子桓虚坐寜不敬期伯喈倒屣固以相屬一日復其草土思􅗓衣裾披素清顔但覺形穢公輔之量不負髙名王佐之才信表天骨孺子之榻雖其可懸仲康之車彌軫恒眷孤子昔縁素乏叨簉皇華今日形容無闗天壤殘光炯炯慮在昏明餘息綿綿待盡鐘漏安可以樹揚名士㳺處盛賓來喻泰髙如為善謔文艶質寡何似上林華而不實將同桂樹但忘年之欵昔有張裵鄰國之交非無嬰札儻哀駘可悦甕盎非疑方願投衿庶比傾蓋頃陳湯之疾嵗月增深羊祜之疴秋冬彌劇且年光遒盡觸目崩心扶力含毫諸不申具孤子徐陵頓首為陳武帝作相時與北齊廣陵城主書籍甚英風常懐眷屬封疆有限寤寐增勞辱此月九日告深慰情佇方秋尚熱體中何如戎帳艱辛無乃為弊吾以庸薄謬膺台鉉既荷先帝㧞擢之恩兼䝉今主責成之寄政以皇齊大徳世紹和風方藉威靈庶平讐恥提攜小國願預藩臣還詔哀矜許乖容納奉勑須質便遣入朝部下諸將哀吾誠節一兒一弟無所遺恡立志立義無負上天但故丞相諸子及湛海珍等竝依勑㫖馳遣渡江主上又遣吏部尚書王通鴻臚卿謝岐等至和州與司馬行臺共為盟誓而蕭軌等决信叛亡茍相陵易鬱從東道馳至北郊既通宫闈無容靜黙兩兩相對俱有損傷彼聞人馬因此奔散且置兵之地溝澗且多􅅲兵之時投赴相積近遣張都來此具是行人所見但廣陵建業纔隔一江戰場去岸不盈五里軍人􅅲散理反家鄉縁岸村人復有舟檝且蘆牌荻筏竟浦浮江千百為羣前後相繼吾又勒兵按甲不聴討捕若無恐懼竝應安逺假使在此不可更生至彼而殂差非吾過如其枉理必是興軍見伐於有道之人加兵於無罪之國若彼王師如此又是違盟后土皇天山川社稷察其怨語寜容相祐辱告承上黨殿下及匹婁領軍應來江右師出無名此是何義小之事大差無違禮彼之陵我自是乖言𤣥天所伐匹馬無違翻見怨尤一何非理若彼鬼神有知寜可斯背鬼神無知何用盟歃去嵗抑達摩等石頭天井連月亢陽三子纔降連冬大雪黄袍盡没白帳皆浮既因之以泥塗兼加之以疾疫蕭裴既􅅲雪霧便除從爾以來稍成災旱定知衣冠之國禮樂相承天道不言不容都滅長江𣺌𣺌巨浪湯湯如鬬艦舟師詎有深利近梁山之戰即是前車蕪湖之役可為明鏡昔晉侯不能乘鄭馬趙將不能用楚兵一非水土難為騁力揚州卑濕厥土塗泥如遇秋霖杳同江漢假令蚩尤重出白起還生控代馬而陵波躡胡靴而湔水終難逞効詎有成功六州勇士雖有百萬十姓豪傑徒勞千億不能為患斷可知矣昔我平世天下乂安人不識於干戈時無聞於桴鼓故得兇人侯景濟我横江天歩中危實由忘戰自亂離己久人解用兵女子無愧於韓彭童兒不殊於衛霍吴鉤甚利蜀甲殊輕槊動風霜弩穿金石髙樓大艦槩日凌雲叱咤而起風雷吹噓如倒山嶽侯車騎國家重將分陕上流近隔以邊塵時虧表疏王途既泰貢賦相望尋令子弟侍奉京邑蕭太保龍驤於賁海王儀同虎視於洞庭若望髙峰便當投袂何則凡諸將帥各䕶家鄉非直吾人獨憂宗社日者頻辱司馬行臺及諸公有告裴行臺當今方卲此諸賢莫非英傑其餘軍士悉是驍雄庸蜀氐羌之兵烏丸白虜之騎以此衆戰誰能禦之何為比吾陪薄相懸何惡諸君身名俱滅來告以細桺之軍踰於灞上吾恐今之趙括不及廉頗也近張舍人至始奉嚴勑朝廷遣劉叔經仍往啓聞願達丹誠用停王赫伏計天慈理當懸照此身日月所鑒天地所明豈敢虛言欺妄宸極足下既未知始末容有疑恠大軍多士希恵矜𢎞量非此失時騰表疏幸停師旅己存盟信庶其小國永申藩禮天心無爽邇遐一同投筆悚慨不復多白為陳武皇作相時與嶺南酋豪書夫否終斯泰屯極則亨若日月之迴環猶隂陽之報復近者數鍾九厄王室中微聖主欽明還承寶運即是髙祖武皇帝之孫世祖元皇帝之子重光累聖𦙍國承家天下生民孰不歸徳賊勃不涯疎戚希纂帝圖信是奸兇階兹禍亂自王宫再淪於醜逆虜馬四飲於江沲社稷阽危鑾輿幽辱勃身居列岳自御彊兵髙視趦趄坐觀成敗既而天維重綴國步還康翻畫凶圖更謀神鼎且其兵馬之任資於長昆方牧之權由於承聖操兄戈而斬姪藉國寵而弑君不忠不義莫斯為甚比春初便遣大都督歐陽頠墌城主傳泰等兇徒數十遂到臨川吾奉承朝算指畫戎略樊滕耿賈戮力爭驅天地靈祇水陸開道獲傳泰不勞於一箭擒歐陽無待於尺兵偽黨皆俘連城盡㧞所收軍資不可稱算去月十六日徳州刺史陳法武等願憤迴戈仍梟兇豎一夫挺劍傳首上京萬里澄清人神慶躍彼豪門著姓典牧方州拘隔天朝亟離寒暑公私憤歎豈可為懐今王道平夷理增懽忭朱明戒節比復何如軍士平安境内清謐吾以庸薄叨秉國鈞恒務牽纒諸有勞弊自天數云否朝禍薦臻東夏崩騰西京蕩覆身惟許國任在勤王宣力皇家靡有寜嵗一還京師保持鴻業四驅夷狄奪得江左始則杜龕元惡張彪不恭據有泰稽連蹤巨震隨機討掩觸向平夷叛臣任約徐嗣徽等屢引齊虜前年末既踐京師江畔邊城皆為戎戍賴貔貅騁力衛霍同心殱厥胡夷不日清殄去年將夏傾國大來鐵騎八千許匹巾士二十餘萬胡塵飛於北闕虜鼓震於南宫躬率偏禆􅊃與挑戰虜便土崩瓦解投險赴坑大小皆擒鯨鯢盡戮三江之上塞水無流千里之間伏屍相枕生獲大都督蕭軌裴英起東方老李希光王敬寶等虜中驍將惟此數人屢破闗西之兵頻取淮右之地一朝俘斬無復孑遺逺邇敬欣華夷怖慴如聞彼虜稍是危亡尋命熊羆欲就征討方可以雷行趙魏電掃幽并混一車書勢在朝暮而侯瑱䟦扈江川公私阻絶即平北賊仍事南征肉袒面縛歸首闕庭即為申聞優其禮秩臺儀不貶位遇兼常今所擒歐陽頠傳泰等莫不𢎞宥政爾授其兵馬處以榮禄垣然㳺狎無介懐抱年號武平國即清晏君之聞此寧不欣躍但昔縁王事㳺踐貴鄉日想山川依然舊識吾既忝荷朝私位逾台衮身持帝王之柄手握天下之圖故鄉如此誠為衣繡故人不見還同宵錦天涯藐藐地角悠悠言面無由但以情企今者王猷帝載化被無垠浮海窮山罔不咸格投竿負鼎馳步蒼龍崖穴丘園爭趨金馬君之才具信美登朝如戀本鄉不能㳺宦門中子弟望遣來儀當為申聞各處榮禄深加將保念嗣音郵今遣某甲等使彼指此不多為陳武帝與周宰相書昔有天地便立帝王革昊惟農遷虞斯夏莫不三靈所祐五運相推梁徳不造固天攸棄雖復東漢之末區宇沸騰西晉之亡生民蕩覆未足以方其禍亂譬彼䖍劉者也吾謬以庸薄屬當興運自昔登庸清諸百越徐聞浪泊靡不征行銀洞珠宫所在清乂自還麾南極伐逆東都宣力驅馳亟淹寒暑六延梁社十剪彊㓂黄帝與蚩尤七十戰魏祖在軍中三十年方厥劬勞未為勤苦加以百神所感明靈應期萬里徂征虬龍表瑞於是中軍勇鋭上將横行承此休符遂興王業梁氏以天禄斯改期運永終欽若唐風推其鼎命吾驚惶三讓拜手陳辭盈廷公卿稽顙敦偪眷言潁水徒抱素心尚想汾陽無因髙蹈猥以庸薄遂膺天寵去月乙亥昇禮大壇言念遷徊但有慙愧昔賓門之始境外無交雖遣行人未申嘉好今上天有命光膺寶厯永興周室方同斷金我運惟新宜修朝聘今遣侍中都官尚書周𢎞正銜使長安故指有白為陳主與周冢宰宇文䕶論邊境事書國有三慶民有四安所謂通和是由鄰睦况周陳欵好一紀于兹懐抱相期百世方逺灌瓜之美久勑邊吏拾橡之尤想應無忽梁氏以漸水東為安湘小郡宜立巴州多厯年所此於荆部本包分界近得刺史符元舉啓稱蕭巋忽遣杜元茂神僧訓等將率人馬踰潰涉澌便置城隍謀為侵軼適荷隣徳合州見還不容今眷仍縱蕭氏元舉累移論及翻相河漢更往研問便騁鋒鏑彼軍人恃勇遂致俘擒聞此紛紜甚以驚歎其商奄餘孽才力甚微為㬥邊城良憑大國但情均忌器不可加兵便勑軍司以禮相放且前嵗所立疆城本以南平等五郡輸薦貴朝至如安湘既屬巴郡幸承鄰恵無候涉言故下漸東惟如澧北政是標其大桶屬荆州之界耳彼此方申分好義絶規圖所貴惟和所重惟信夫以南平等郡地曠民豐雲夢之田楚王為寶吳當勁蜀晉拒彊秦資彼山川竝為州鎮朕若棄其仁義務廣封域寧容延嵗竝貢周朝今者和親己固山岳而方謀尺寸之土用益蒹葭之地哉幸非竊疾相見鑿容江陵小寇既爾䖍劉前至之言或相誣罔一二因使人宇文平口具其懐耿耿故此相白為陳主答周主論和親書使人使持節車騎大將軍儀同三司大都督治司城使主杜子暉中軍山遂伯使副鮑宏等至省告具懐夫聖君明辟司御兆民則天象地佇育黔首故張旜以往拭玉而來同在蒼生恢宏文武雖毁戈鑄㦸末擬上皇散馬休牛載懐偃伯非期與睦忽爽和風奚用殱師信由天討追尋曩好歎想兼懐言覿今書甫承家難知以冢宰執政擅同淵藪令尹當朝妄専征伐無君之讁俾墜其師無將之誅己從司宼刑名既肅國歩還康希篤親隣敬開衷欵若二境交歡俱饗多福八荒期乂良副所懐今遣具位某甲等使不復多述在吏部尚書答諸求官人書自古有吏部尚書者品藻人倫簡其才能尋其門胄逐其少多量其官爵但古來數千年非無明時也非無明主也自有才用雖美階級不通門户雖髙官資殊屈若斯人者其例甚多請問諸君此是何義夫一千錢一斛米之多少猶闗相禄况復皇朝官爵理係𤣥天内典謂之為業外書稱之為命五行有驛馬之言六甲有官鬼之説必令驛馬時發官鬼尅身所望偕榮便當果遂如其不爾决是難諧豈可改尚書作官鬼驅老僕為驛馬耶若見問尚書何不分判用與不用許與不許僕答云君非屈滯豈可相期决言應果若今驛馬差爽便是乖信此闗君命僕何以相答耶若朝散之流行止之屬門户相似人才不殊選家斟酌無能為爾若陟大位清官悉由𤣥命夫人君賓用竝是前縁故宋文帝云人豈無運命毎有好官缺輒憶羊𤣥保梁武帝云世聞人言有目色我特不目色范悌自此而論豈非前業且世諺云圖官在亂世覔富在荒年梁孝元帝承侯景之凶荒王太尉接荆州之禍敗爾時喪亂無復典章故使官方窮此紛雜自紹泰太平及永定中聖朝草創爾時州州自帝郡郡稱王天下干戈尚無條序兼以府庫空虚賞賜懸乏白銀之寶難得黄紙之板易營假以官榮代於錢絹義在撫綏無計多少又有非舊非勲非地非才託節將而求官因時人以買位賣官既賤皆為清顯故員外常侍路上比肩諮議參軍市中無數四軍五校車載斗量豈是朝章應其如此今衣冠禮樂日富年華主上體成王之風太傳𢎞周公之徳西羌北狄畏我王威時既清矣時既平矣何可猶作亂世意而覔非分之官耶凡人所以稱屈滯者身己不無寸能官又不及父祖既是明時可以於邑所見諸君多踰本分猶言太屈未喻髙懐若問梁朝朱領軍等竝為卿相此不踰其本分耶此天子所用非闗選序舊章秦有車府令趙髙直為丞相漢有髙廟令田千秋亦為丞相此復可為例耶僕七十之嵗朝思夕計竝願與諸賢為真善知識曾無嫌隙差可周旋非欲令君作此怨訴但既忝衡流應須粉墨庶其允當無負朝寄耳去年疾患亦餘氣息不能相答通作此書所望諸賢深明鄙意徐君白同前自古吏部尚書者品藻人倫簡其才能尋其門胄逐其大小量其官爵梁元帝承侯景之凶荒王太尉接荆州之禍敗爾時喪亂無復典章故使官方窮此紛雜永定之時聖朝草創干戈未息亦無條序府庫空虛賞賜懸乏白銀難得黄札易營權以官階代於錢絹義存撫接無計多少致令員外常侍路上比肩諮議參軍市中無數豈是朝章應其如此今衣冠禮樂日富年華何可猶作舊意非理望也所見諸君多踰本分猶言大屈未喻髙懐若問梁朝朱領軍异亦為卿相此不踰其本分邪此是天子所㧞非闗選序梁武帝云世間人言有目色我持不目色范悌宋文帝亦云人世豈無運命每有好官缺輒憶羊𤣥保此則清階顯職不由選也秦有車府令趙髙直至丞相漢有髙廟令田千秋亦為丞相此復可為例耶既忝衡流應須粉墨所望諸賢深明鄙意答周處士書辱去年三月二十七日告仰披華翰甚慰翹結承歸來天目得肆閒居差有㺯玉之俱仙非無孟光之同隠優㳺俯仰極素女之經文升降盈虚盡軒皇之圖藝雖復考槃在阿不為獨宿詎勞金液唯飲玉泉比夫煑石紛紜終年不爛燒丹辛苦至老方成及其得道冥真何勞逸之相懸也又承有方生亦在天目理當仰禀明師總斯秘要豈如張陵弟子自墜髙巖孫泰門人競投滄海何其樂乎聖朝虛心版築尚想丘園若彼能赴嘉招便當謹申髙命但其人往嵗亦望至京師觀此風神確乎難㧞故以忘懐爵禄詎持犧牲之談髙視公卿獨騁蜡蛵之訓所恐有道三辟公車十徴若斯者終當不屈此既然矣請復詳言昔楚國兩龔同時紆組漢隂二老相攜抱甕兄之幽貞若其鑿坯負石方同形影結綬彈冠無容越楚况乎糞土䕫龍羶臊名器己所不欲非應及人忽承來音良以多惑何則潁陽巢父不曾令薦許由商洛園公未聞求徵綺季斯所未喻髙懐而躊躇於矛楯也唯遲山阿近信更恵芳音如或誠言謹便聞奏第夙勞比劇不復多呈徐君白與章司空昭達書君白日聖朝受命天下廓清所餘殘兇惟有歐紇南通交管北據衡疑兄弟叔姪盤阻川洞百越之賮不供王府萬里之民不由國家明公受脤嚴冬持兵杪嵗開冰踐露􅌊火宵行便届舍淮乃其神速未騁三略非勞六竒薄交旗鼓仍平醜類自太清之末永定以來所闢疆界不過郡邑今兹赴㨗二十餘州若較此功庸方兹英力漠之馬援不能為擬吳之歩隲故是相懸况孫處宗之叛徒正槌盪主耳公私慶快豈可而言且僕一子屯窮妖徒所制五嶺遐夐存亡不測懸懐飲淚破膽復全䝉荷英恩保其身命餘年仰戴何力能勝今遣主師某馳往稱慶徐君呈重答朝臣書老病屬纊不能多説古人爭議多成怨府傳𤣥見尤於晉代王商取陷於漢朝謹自三緘敬同髙命若萬一不死猶得展言庶與羣賢更申揚㩁漢魏六朝百三家集巻一百三上欽定四庫全書漢魏六朝百三家集巻一百三下徐陵集目錄書薦陸瓊書報尹義尚書與李那書與顧記室書答族人梁東海太守長孺書諫仁山深法師罷道書與智書書又又五願上智者禪師書序玉臺新詠序碑司空徐州刺史侯安都徳政碑廣州刺史歐陽頠徳政碑晉寧太守王勵徳政碑丹陽上庸駱碑孝義寺碑齊國宋司徒寺碑長干寺衆食碑東陽雙林寺傳大士碑天台山徐則法師碑頌皇太子臨辟雍頌有序銘太極殿銘有序報徳寺刹下銘有序後堂望美人山銘麈尾銘哀策文陳文帝哀策文墓誌司空裴昭逺墓誌河東康簡王墓誌裴使君墓誌文為武帝即位告天文樂府驄馬驅中婦織流黄出自薊北門行隴頭水折楊栁闗山月二首洛陽道二首長安道梅花落紫騮馬劉生烏棲曲二首雜曲長相思二首詩同江詹事登城南樓走筆戲書應令春情奉和詠舞和簡文帝賽漢髙帝廟山齋詠柑侍宴奉和山池山池應令别毛永嘉秋日别庾正員新亭送别應令和王舍人送客未還閨中有望為羊兖州家人答餉鏡詠織婦内園納凉鬬雞詠日華詠雪春日奉和簡文帝山齋漢魂六朝百三家集巻一百三下目録欽定四庫全書漢魏六朝百三家集巻一百三下明張溥輯徐陵集薦陸瓊書新安王文學陸瓊見識優敏文史足用進居郎署嵗月過淹左西掾缺允膺兹選階次小踰其屈滯己積報尹義尚書別離二國雲雨十年心想河陽言銅爵而無逺神游漳水與金鳳而俱蜚北使還辱去冬十月十一日告忽同言叙循環巧制欣慰良深河朔年芳雖當淹晩白溝浼浼春流己清紫陌依依長楊稍合體中何如豈無鄉思弟三秦世胄六輔良家文武兼能志懐開逺谷永之筆無慙古人盖延之功髙視前彦而淹留趙魏亟厯寒暄企望鄉闗理多悲切聖朝欽明纂厯大拯生民戮巨海之奔鯨殱中原之封豕晉君之説長安逺於日邊揚雄有言交州在於天際則輸賝王府屈膝閶門川洞酋豪彊梁溟海神兵一指率土咸康方當偃伯於靈臺韜戈於武庫變大風於五禮驅蒸民於昌辰物色英聲搜揚俊傑投竿負鼎馳歩蒼龍巖穴丘園爭趨金馬而弟留河北義等周卲懐此殊才實可傷嗟吾崦嵫既暮容鬢皤然風氣彌留砭藥無補追惟疇昔共備行人室家安危賓禮升降懸壺代哭俱厯春冬移館於箕同茲辛苦鳴蜩抱樹亟見蔵氷歸鴈銜蘆多經寒食靖言念此如何可忘握翫來書彌其承臉夫以擁腫之木得免因於不才觳觫之牛自保由其無用以余鄙陋未友龔生惟歎吾賢不同蘧瑗耳若推溝拯溺每切皇衷逸翮飄鱗見優機檻所以降尺一之書馳輶軒之使心期與國必遂還途寧謂親隣更成難請言尋雅告所及縲囚便訪鴻臚幸無淹使聞諸司宼或有邊俘前嵗中流是維同惡燕禽望闕冀馬臨江裁頓雲羅自投天網京觀之塜宜彰武功周醜之門方申明罰而聖朝好生惡殺收雷寢電兵車所獲雖同長萬之來恩澤從容無異荀罃之禮方之於弟況擬非倫伊昔梁朝共奉嘉聘張兹大帛處彼髙閎庭奏歌鐘座延僑肸賓客之叙方於阼階田獵之禽同於君膳正以鄉闗阻亂致爾拘留家國隆平義應旋反況復韓宣屢至宰孔頻還翻爾遲迴豈云隣睦弟遂鍾儀之操對此皇華髙厚之詩一何非類闗徐廉樂之況三戰七擒之言此日借子之矛攻子之室彼之使客猶尚不還此於齊都豪門貴戚周行匪例事義相懸豈與大弟同年而語吾本自凡流以復衰老稍近東岱不奢擊壤之年惟欣堯俗若耶之復長保安卧時思之若耶至此闕誤不棄忝亞宗卿非得侵官天扆但當今芃芃在詠濟濟盈朝才冠卿雲智同荀郭文辭富於江海髙論泊於雲霄趨走丹墀之門侍奉清規之内弟來欵言至欲附所聞聯類非宜更其多惑若使良有闕二字猶希贈鯉之書郵驛方通復行蜚鶬之信執筆􅏰然不知何向與李那書籍甚清徽常懐虚眷山川緬邈河渭像於經星顧望風流長安逺於朝日青葽戒節白露為霜君子惟宜福履多豫雍容廊廟獻納便蕃留使催書駐馬成檄車騎將軍賓客盈座丞相長史瞻對有勞脱恵箋繒慰其翹想吾栖遲茂陵之下卧病漳水之濱迫以崦嵫難為砭藥平生壯意竊愛篇章忽覿髙文載懐勞佇此後殷儀同至止王人授館用阻班荆常在公筵敬析名作獲殷公所借陪駕終南入重陽閣詩及荆州大乘寺宜陽石像碑四首鏗鏘並奏能驚趙鞅之魂輝煥相華時瞬安豐之眼山澤晻靄松竹參差若見三峻之峰依然四皓之廟甘泉鹵簿盡在清文扶風輦路悉陳華簡昔魏武虛帳韓王故臺自古文人皆為詞賦未有登兹舊閣歎此幽宫標句清新發言哀斷豈止悲聞帝瑟泣望羊碑一詠歌梁之言便掩盈懐之淚至如披文相質意致縱横才壯風雲義深淵海方今二乘斯悟同免化城六道知歸皆踰火宅宜陽之作特㑹幽衿所覩黄絹之詞彌懐白雲之頌但恨耆闍逺嶽檀特髙峰開士羅浮康公懸溜不獲銘兹雅頌耀彼幽巖循環省覽用忘饑渴握之不置恒如趙璧翫之不足同於玉枕京師長者好事才人爭造蓬門請觀髙製軒車滿路如看太學之碑街巷相填無異華隂之市但豐城兩劍尚不俱來韓子雙環必希皆見莫以好龍無别木鴈可嗤載望瓊瑶因乏行李金風己勁玉質宜調書不盡言但聞爻繫徐陵頓首與顧記室書吾伏事天朝本非舊𨽻殿下殊恩逺垂薦拔故常戰戰慄慄甘心痛謹庶其愚老無負明據近者既居臺轄唯務奉公去年正月十五日尚書官大朝元凱既集丞郎肅然忽有陳慶之兒陳暄者㡌簮釘額絛布裹頭虜袍通踝胡靴至膝直來郎座遍相排抱或坐或立且歌且詠吾即呼舍吏責列不答而走反為憾恚妄相陷辱至六月初遂作盲書便見誣謗聖朝明鑒悉知虚罔唯云吾取徐樞為臺郎南司檢問了不窮推承訓劾為信言致成隳免此事寃枉天下所無吾市徐樞宅為錢四萬任人市估文劵厯然不䝉申理見枉虚巧二者樞是故少府卿鱗之子鱗殞身侯景之役又為西臺所贈兖州左衛官位甚髙未知其子何忝郎署魏晉之前如為乆逺宋齊以降其例甚多如徐愛阮佃夫之子可不得郎官耶紀文卿公向璡皆為列棘豈冗雜曹郎乎三者樞入身梁朝解褐岳陽王小府墨曹承聖時為故敬帝晉安王諷席文墨具存陜西官爵乃多浮濫更補臺郎不為勝擢未知何忽推宅貨官四者徐領軍節度自啓樞為郎勅付選序吾既不啓據又不為選職所可相闗止是得中侯相聞為呈啓而己以此見罪一何寃濫吾昔在承華是弟所悉行年六十無復儕儔非意餘生忽此誣謗堯有驚於䜛説孔將惑於拾塵雖復聖主機明不能悉照殿下徳髙兩獻風美二南億兆歸心衣冠有托久願通啓披訴聖明伏見軍戎多務所以不敢祈冒弟與吾逰眷亟迴星紀故人如此寧不矜歎耶侍言有便云何且為啓聞一䝉神鑒照其枉直方殁幽泉無恨灰壤伏覲謁帝承明緒言多次服矜遺老曲賜湔濯則殿下前時妄澤匪復偏私遂吴良延薦之恩無王丹所舉之謬吾得方辭武騎永附梁賓雖媿家丞庶呈秋實縁弟深眷故此敬慿干謁非宜益懐悚慨徐陵白答族人梁東海太守長孺書其人梁末入北齊恩報近嵗奉使來歸辱彼河清年中告行并恵以明鏡亟離寒暑雖復時陳梁鶴日照孫鸞言慰相思反增離眷劉傅三常侍還又承書札銀鈎甚麗玉疏依然開封伸紙破愁為笑素秋方屇溽暑稍闌體中何如善保元吉藂臺之璧少海之珠何必鄉里所在為貴卿託身大國既己積年彼朝英彦理相欽挹方當交辟三命清宦兩宫何乃闊然遲有問也吾七十之嵗崦嵫己迫朽老之疾隨年而甚徒懐北邙之切未遂東都之期牽役承閒但有衰頓賢從君政佐佑興基中舍諶殿中並休宜自别有書問來告訪吾文章吾自歸來鄉國亟徙炎涼牽課疲朽不無辭製而應物隨時未曾編録既承今告輒復搜檢行人相繼别簡知音但既乏新聲全同古樂正恐多慙於協律致睡於文侯耳燕南趙北地角天涯言接末由但以潛欷善敬徳中郎並比境之良選皇華之上求若可輶軒别當委白君問諫仁山深法師罷道書竊聞出家閒曠猶若虚空在俗籠樊比於牢獄非但經有明文亦自世間共見瞥聞法師覆彼舟航趣返緇衣之務此為目下之英竒非久長之深計何以知然從苦入樂未知樂中之樂從樂入苦方知苦中之苦弟子素與法師雖無曩舊相知己來亦復不疎夫良藥必自無甘忠諌者決乎逆耳倚見其僻是以不忍不言且三十年中造莫大之業如何一旦拾己成之功深為可惜敬度髙懐未解深意將非帷帳之䇿欲集劉侯形類卧龍擬求葛氏黄石兵法寧可再逢三併茅廬無由兩遇封爵五等惟見不逢中閤外門難朱易白嗚笳鳳管非有或聞儛女歌姬空勞反翫覓之者等若牛毛得之者譬猶牛角以此之外何所窺窬法師今若􅅲轉未必有一稱心交失現前十種大利何者佛法不簡細流入者則尊歸依則貴上不朝天子下不讓諸侯獨翫世間無為自在其利一也身無執作之勞口餐香積之飯心不妻妾之務身飾芻摩之衣朝無踐境之憂夕不千里之苦俯仰優游寧不樂哉其利二也躬無任重居必方域白璧朱門理然致敬夜琴晝瑟是自娱懐曉筆暮詩論情頓足其利三也假使棘生王路橋化長溝巷吏門兒何因仰喚才絹不輸官庫升米不進公倉庫部倉司豈須求及其利四也門前擾擾我且安眠巷裏云云余無驚色家休小大之調門停强弱之丁入出隨心徃還自在其利五也出家無當之僧猶勝在俗之士假使心存殺戮手無斷命之愆密裹通情決勝灼然矯俗如斯煩垢萬倍勝於白衣一入愛河永沈無出其利六也聼鐘聲而致敬尋香馥以生心朝覩尊儀暮披寶軸刹那之善逐此而生水滴微功漸盈大器未知因縁果報善惡皎然就此而言其利難陳矣假使達相白衣猶有埃塵之務縱令遥寄彈指逺近低頭形去心留身移意往閒有者得如此貧苦者永無因近在目前不言可見其利七也山間樹下故自難期枕石漱流實為希有猶斯之類不可思議如此者難逢一心人悕遇法師未能不學交習聴勝之因一旦􅅲心於理邀矣其利八也開織成之帙見過去之因摛琉璃之巻驗當來之果識因識果不以為愆知福知報何由作罪上無舟檝交見没溺之悲下失浮囊則有沈身之患其利九也曠濟羣品為天人之師水陸空行皆所尊貴言必闍黎和尚書輒致敬和尚逺近嗟咏貴賤顒仰法師今必退轉立成可驗纔脱袈裟逢人輒稱汝我始解偏袒姓名便亦可呼平交者故自不論下劣者亦恐不讓薄言稱己榻席懸異從來小得自在便以君為題封若不屈膝斂手自達無因俯仰承迎未閑合度如此専専何由可與其利十也略言十事空失此機其間深道寜容具述仰度仁者心居魔境為魔所迷意附邪途受邪易性假使眉如細栁何足關懐頰似紅桃詎能長久同衾分枕猶有長信之悲坐卧忘時不免秋胡之怨洛川神女尚復不惑東阿世上班姬何闗君事夫心者面焉若論繾綣則共氣共心一遇纒綿則連宵厭起法師未通返照安悟賣花未得他心那知彼意嗚呼桂樹遂為豆火所焚可惜明珠乃受淤泥埋没弟子今日横諮必為法師所哂世上白衣何訾何限且一人退道而不安危推此而言實成難解譬如瓦礫盈路人所不驚片子黄金萬夫息歩正言法師入道之功己備染俗之法未加何異金搏赤銅銀換鉛錫可悲可惜猶可優量能忍難忍方知其最願棄俗事務息塵勞正念相應行志兩全薄加詳慮更可思惟悔之在前無勞後恨如弟子算逺即十數年中決知惻惻近即三五嵗内空唱如何萬恨萬悲寧知逺及自誤自錯永棄一生乃知斷絃可續情去難留或若火裏生花可稱希有迷人知返去道不遙幸速推排急登正路法師非是無智遂為愚者所迷類似阿難更為魔之所嬈猶須承三寶之力制彼羣凶豎般若之幢天魔自欵若此言㫖當即便冀棄芻蕘若不㑹髙懐幸停深怪耳與智顗書陵和南昨預沈儀同法席餐奉甘露無畏之吼衆咸歸伏然正法炬朗諸未悟自慶餘年得逢妙説尋事諮展此不申心謹和南又陵和南注仰之心難可敷具拔公至䝉三月二十日㫖用慰積嵗傾心麥泠體中何如願一日康勝山中春夏無餘障惱耳遲復存㫖弟子二三年來溘然老至眼耳聾闇心氣昏塞故非復在人兼去嵗第六兒夭喪痛苦成疾由未除愈適今月中又有哀故頻嵗如此窮慮轉深自念餘生無復能幾無由禮接係仰何言敬重璪公今還白書不次弟子徐陵和南又陵和南放生星聞公家極相隨喜事是拔公口具謹不多諮惟遲拔公廷出數百里水全其命根如此功徳算數無盡隨喜無量此不委諮弟子徐陵和南五願上智者禪師書陵和南弟子思出樊籠無由羽化旣善根㣲弱冀願力莊嚴一願臨終正念成就二願不更地獄三途三願即還人中不髙不下處託生四願童真出家如法奉戒五願不墮流俗之僧慿此誓心以策西暮今書丹欵仰乞證眀陵和南序玉臺新詠序凌雲㮣日由余之所未窺千門萬户張衡之所曾賦周王璧臺之上漢帝金屋之中玉樹以珊瑚作枝珠簾以玳瑁為柙其中有麗人焉其人也五陵豪族充選掖庭四姓良家馳名永巷亦有潁川新市河間觀津本號嬌娥曾名巧笑楚王宫内無不推其細腰魏國佳人俱言訝其纎手閲詩敦禮非直東隣之自媒婉約風流無異西施之被教弟兄協律自小學歌少長河陽由來能舞琵琶新曲無待石崇箜篌雜引非因曹植傳鼓瑟於楊家得吹簫於秦女至若寵聞長樂陳后知而不平畫出天仙閼氏覽而遥妬且如東隣巧笑來侍寢於更衣西子微顰將横陳於甲帳陪㳺馺娑騁纎腰於結風長樂鴛鴦奏新聲於度曲粧鳴蟬之薄鬢照墮馬之垂鬟反挿金鈿横抽寶樹南都石黛最發雙蛾北地燕脂偏開兩靨亦有嶺上仙童分丸魏帝腰中寶鳳授厯軒轅金星與婺女爭華麝月共嫦娥競爽驚鸞冶袖時飄韓掾之香飛燕長裾宜結陳王之佩雖非圖畫入甘泉而不分言異神仙戲陽臺而無别真可謂傾國傾城無對無雙者也加以天情開朗逸思彫華妙解文章尤工詩賦琉璃硯匣終日隨身翡翠筆牀無時離手清文滿箧非惟芍藥之花新製連篇寧止蒲萄之樹九日登髙時有縁情之作萬年公主非無累徳之辭其佳麗也如彼其才情也如此既而椒房宛轉柘館隂岑絳鶴晨嚴銅蠡晝靜三星未夕不事懐衾五日猶餘誰能理曲優㳺少託寂寞多閒厭長樂之疎鐘勞中宫之緩箭輕身無力怯南陽之擣衣生長深宫笑扶風之織錦雖復投壺玉女為歡盡於百驍爭博齊姬心賞窮於六著無怡神於暇景惟屬意於新詩可得代彼萱蘇微蠲愁疾但徃世名篇當今巧製分諸麟閣散在鴻都不藉篇章無由披覽於是燃脂暝寫弄墨晨書撰録艷歌凡為十巻曾無參於雅頌亦靡濫於風人涇渭之間若斯而己於是麗以金箱装之寳軸三臺妙迹龍伸蠖屈之書五色花牋河北膠東之紙髙樓紅粉仍定魯魚之文辟惡生香聊防羽陵之蠧雲飛六甲髙擅玉函鴻烈仙方長推丹枕至如青牛帳裏餘曲既終朱鳥牕前新粧己竟方當開兹縹帙散此縚繩永對玩於書帷長循環於纎手豈如鄧學春秋儒者之功難習竇傳黄老金丹之術不成固勝西蜀豪家託情窮於魯殿東臺甲館流詠止於洞簫孌彼諸姬聊同棄日猗與彤管麗矣香奩碑司空徐州刺史侯安都徳政碑巖巖天柱大矣周山之峰枑枑地軸壯哉崑崙之阜三光懸而不墜九土鎮以無疆承乾合徳之君則天體元之后所以並咨四鎮咸建五臣業配蒼祇功成㝢縣至於流名雅頌著美風詩年代悠然寂寥無紀其能繼兹歌詠者司空侯使君乎自文昭武穆祚土開家濮水盛其衣簮榮波分其緒秩仁義之道夷門美於大梁儒雅之風司徒重於强漢自通人許劭託命於江湖髙士袁忠寄身於交越俱違建安之難獨處衡山之陽祖天資秀傑世載雄豪卓富擬於公侯班伯必於旌鼔父光禄大夫邑里開通徳之門州鄉無抗禮之客自茫茫禹迹赫赫宗周家滅驪戎國亡夷羿我髙祖武皇帝迎河圖於浪泊括地象於炎洲南興涿鹿之師北問共工之罪天生宰輔堯年致白虎之祥神賜英賢殷帝感蒼龍之傑公亦觀時佇聖嘯咤風雲跪開黄石之書髙詠𤣥池之野沈吟梁甫自比管仲之才惆悵莘郊乆負伊生之歎自羯虜侵華羣蠻縱軼後臯桂部之地四戰五達之郊郡境賢豪將謀禦難長者僉論推公主盟義士雄民星羅霧集公既膺五聘方啓六韜率是驍徒仍開嶺嶠自大討瀟湘同兹樊酈下軍違命上策不宣敗我王師受拘勍盜大陳格於文祖咸秩具神率土依風羣靈稟朔公亦忠為令徳天纂之謀吳帳斯開衛門無擁雖復季孫還魯隨武濟河國慶民歡相儔匪若即授使持節開府儀同三司丹陽尹昔光武不尤於馮異穆公深禮於孟明終報王官之師遂舉咸陽之地斯乃聖主之宏略而名臣之逺圖者焉皇帝以陶唐啓國致玉版於河宗顓頊承家佐金天於江水經綸草昧定鼎之業居多締構權輿斷鼇之功相半固以英聲馳於海外信義感於寰中主器攸歸當璧斯在公於是抗表長信清宫未央從億兆以同心引公卿而定策馳輕軒於軨轕奉侍駕於中都七廟之基於焉永固萬邦之本由此克寧乃復進司空公南徐州刺史於是鎮之以清靜安之以恵和望杏敦耕瞻蒲勸穡室歌千耦家喜萬鍾陌上成隂桑中可詠春鶊始囀必具籠筐秋蟀載吟競鳴機杼或肅拜靈祀躬瞻舞雩去駕擁於風塵還旌阻於飄沐京坻嵗積非勞楚堰之泉倉廩年豐無用秦渠之水雖復東過小縣夏雨逐其輕輪南渡滄江秋濤弭其張蓋固不得同年而語矣若夫聴採民訟昏曉必通召引軒櫺躬親辨决立受符於前案無留詣於後曹接務髙城之中非異甘棠之下欣欣美俗濟濟都塵以賈琮郭賀之風行建武永平之化於是州民散騎常侍王㻛等拜表宫闕請揚兹美化樹彼髙碑民欲天從允影絲誥銘曰鬱鬱三象茫茫九州綿天滲沴浹地䖍劉赫矣髙祖爰清國讐元勲佐命力牧風侯亦即旋歸拜家有暉宫亭蠡浦舊趐髙飛電巻勍寇風行國威文身被髮作貢來綏我皇纂武攀號東序竭渭同周迎門惟吕流矢為暴欃槍斯舉喋喋蒼黎危危刀俎自我徂征妖氛克平爰驅犬彘實剪長鯨北震巢浦南俘灌城青羌巻介赤狄迴兵蹈舞難踰歌謡靡宣曰我黎庶俱祈上𤣥山移兩越海變三田公為上相復倍斯年廣州刺史歐陽頠徳政碑弱水導其洪源軒臺表其增殖懿哉少府師儲皇於二京盛矣司徒傳儒宗於九世廣陵邕邕族擅江右渤海赫赫名重洛陽若夫岳鎮龍蟠星懸鶉火衡山誕其髙徳湘水降其清輝千仭孤標萬頃無度年當小學志冠成童因孝為心欲仁成體屯騎府君早棄榮禄易簀之日㡬將毁終不杖之言深非通制遺貲巨萬富擬猗頓裁變槐榆並賑宗戚南茨大麓北眺清湘得性於橘洲之間披書於杏壇之上三冬文史五經縱横頻致嘉招確乎難拔既而帝啓黄樞神亡赤伏天地崩霣川冡沸騰羣悍酋豪更為禍亂朝披羽檄夜炤爟烽浴鐵蔽於山原摐金駭於樓堞公疲兵屢出獨據胡牀勍賊重圍尚凭書几揚灰既散駕棒將揮咸剋凶梁以保衡服常以二主䝉塵三光掩曜出入逾於嘗膽殷憂獨其撫心不治第宅深符去病志梟羣醜彌同越石自禹珪既錫堯玉己傳物變謳謡風移笙管商周之際孤竹尚其哀歌曹劉之間蘇子猶其狂哭况番禺連帥寔謂宗枝迷我天機自窺梁鼎以公威名本重逼綂前軍乾數難違剥象終悔髙祖永言惟舊彌念竒功即訓皇家深𢎞朝紀檻車才至輿櫬己焚祝史袄於夷吾壇壝延於井伯綢繆安樂造次訐謀爰珥豐貂允光金蟪但八桂之上蠻夷不賓九疑之陽兵凶嵗積以公昔在衡臯深留夙愛仁恩可以懐猛獸威名可以懼啼兒乃授持節散騎常侍衡州刺史我皇帝從唐侯以𦙍國屈啓筮而登家一恭寶祚開定江沔三改琁衡苞羅湘峡昔中宗屈申於處仲髙祖遺恨於平城漢武承基方通沙塞晉明紹運裁平姑孰方其盛業綽有光前踐祚之初進公位征南將軍廣州刺史又都督東衡州二十州諸軍事宜公乃務是民天敦其分地火耕水耨彌亘原野賊盜皆􅅯工賈競臻鬻米商鹽盈衢滿肆新垣既築外户無扄脂脯豪家鐘鼎為樂揚袪洒汗振雨流風市有千金之租田多萬箱之詠僧釋慧羨等來朝絳闕備啓丹誠乞於大路康莊式刋豐琰庶樊卿寶鼎復述台司之功羊叟髙碑更紀征南之徳於是跪開黄素爰登紫泥鑒此誠祈皆如所奏乃詔庸臣為其銘曰赫赫宗陳桓桓鼎臣千乘建學五典攸因盛徳斯逺公門日新崇髙惟岳貺甫生申去衡移廣遷征自鎮攸攸銅界藐藐金鄰莫逺非督無思不賓三江靡浪五嶺奚塵式歌式舞仁哉至仁公其饗福於萬斯春晉陵太守王勵徳政碑若夫睢陵世傳己祥載徳之華徐州先賢亦著清風之美偉哉文獻光啓中興郭莖表其深源何籌慙其逺慶豈惟桓氏之鳴玉張家之珥貂袁姓之朱衣楊宗之華轂又有佽飛遮列班弓夾門濯龍俯望緹騎盈道奕世如此何其盛哉君以藍田美玉大海明珠灼灼美其聲芳英英照其符彩丰神雅淡識量寛和既有崔琰之鬚眉非無鄭𤣥之腰帶爛爛如髙巖下電騷騷若長松裹風勢利無擾於胸襟行蔵不槩於懐抱家門雍睦孝友為風上友不諂下交不瀆脱貂救厄情靡矜􅈔釋馬窮途唯濟危殆至於網羅圖籍脂粉藝文學侣挹其精㣲詞宗稱其妙絶出為仁武將軍晉陵太守五雞三彘勤卹有方問羊知馬鉤鉅兼設濟北移樹累政之所未治汝南爭水連年之所無斷一朝明決曾不留滯四民商販咸用殷阜銘曰康哉寶運美矣良臣渭自灃水源於洛濱公侯世及宰輔相因曰我民秀山川降神風情穆穆孝友恂恂學則經笥文為世珍髙風逺矣曠代難倫鼎鉉虚職台階未臻安知霜霰遽天松椿碣石斯表民情既陳徒然下拜何報陽春丹陽上庸路碑在天成象咸池屬於五潢在地成形滄海環於四瀆國險者固其金湯儲蓄者因於轉漕貨財為禮專俟㑹通厥田為上皆資滲漉大矣哉坎徳之為用也是以握圖之主財以利民御斗之君因之顯教上哉少昊初命水官逖矣髙陽爰重冥職舜為太尉於是九澤載疏禹作司空然後百川咸導開華山於髙掌鑿靈沼於周源莫匪神功皆由聖徳我大梁之受天明命勞己濟民有道稱皇無為曰帝若夫雲雷草創翦商黜夏之勲鑄寶鼎於昆吾安能紀勒陳鴻鐘於豐岳豈易揄揚斯固名言之所絶也及乎膺斯寶運大拯横流屈至道於汾陽勞凝神於藐射聖人作樂簫韶備以九成喆王盡禮春官總於三代豈止金門桴竹玉尺調鐘公帶獻明堂之圖匡衡建后土之議若斯而已乎天降丹鳥既序孝經河出應龍乃私周易若夫固天將聖垂意藝文五色相宣八音繁㑹不移漏刻纔命口占御紙風飛天章海溢皆紫庭黄竹之詞晨露卿雲之藻漢之兩帝徒有詠歌魏之三祖空云詩賦以為彭老之教終没愛河儒墨之宗方難火宅豈如五詩八㑹之殊文天上人中之妙典雪山羅漢爭造論門鷲嶺名僧俱傳經蔵香象之力持所未勝秋兎之毫書而莫盡忠信為寶禳祈免於白駒明徳惟馨山川舍於騂犢至如月離金虎泥染石牛薈蔚朝興滂沲晚注而清蹕纔動織羅不揺髙閈將臨油雲自闢陽烏馭日寧懼虎賁之弓飛雨彌天無待期門之盖震維舉徳非曰尚年若發居酆猶莊在漢濤如白馬既礙廣陵之江山曰金牛孰辨梅湖之路専州興郡青鳬赤馬之舡皇子天孫鳴鳳飛龍之乘莫不欣斯利渉玩此修渠乍擁節而長歌乃樅金而鳴籟斯實曠世之竒功無疆之鴻烈者也銘曰后王降徳於衆兆民髙文象緯妙義幾神業冠遷夏功踰八秦時惟大畜象及同人慧雨方霤禪枝獨春帝徳惟厚皇恩甚深觀乎禹迹見我堯心孝義寺碑臣聞道階八地猶見后妃願生千佛無匪賢聖汲引之義雖同隨幾之感非一至如媯汭有禮皇源所以前興周女斯歸陳宗所以流慶大矣神基帝系淑聖重光者也慈訓太后徳佐初九道暉上六居天上天中之極處太任太姒之尊蘋藻之化斯深葛覃之風彌逺皇帝膺兹上聖契彼援神愛敬在乎一人徳教刑乎四海是以明星皎皎流半月之光甘露團團灑如餳之味嘉禾自秀浪井恒清天降徴祥日聞書府自大明紹運神武應期至道旁通無思不格戊己校尉西闗玉門伏波將軍南表銅柱方使三千世界百億須彌同望飛輪共稟𤣥徳元嘉三年正月二十一日詔㫖仰惟聖徳方被兆民乃勅有司改東成里為孝義里昔岱山徙號重華著其受終徳水移名秦人表其嘉運豈若盡在輿地書兹里門仰述天經光臨父母臣陵稽首乃作銘曰願此良因宜資貴親三乘竝策四梵為賓紺殿安坐蓮花養神燈前禮佛地後邊身竝濟含識咸歸至真國家隆盛同享遐慶謹勒豐碑陳其舞詠齊國宋司徒寺碑無色之外方為化城非想之中猶稱火宅若夫衆生無盡世界無窮芬若披蓮逺如散墨善才童子南行未窺目連沙門北逰不見一一刹土皆由業縁萬萬僧祗終非常樂天宫蹇産猶傾四大之風魔殿崔嵬終懼三災之火朱樓寶塔輝煥爭華既義暢中土道流遐域顯默同歸華夷俱慕自枕石漱流始終一槩悟智交養三十餘年春秋八十三古人云道存人亡法師之謂凡我門徒感風徽之緬邈傷諮悟之永滅敢以淺見揚徳金石銘曰九流依真三乘歸佛道住絶跡慈還接物孰是發䝉昭我慧日攝亂以定闢邪以律秦皇雄感蔽理通情王孫徧解逺死滯生夫子之悟萬刼獨明寒暑遞易悲欣臯壤秋蓬四轉春鴻五響孤松獨秀徳音長往節有推遷情無遺想長干寺衆食碑昔炎皇肇訓稷正修官信矣民天之言誠哉國寶之義自非道登正覺安住於大般湼槃行在真空深入於無為般若則菩薩應化咸同色身諸佛淨土皆為摶食證常住者爰訖乳糜補尊位者猶假香飯亦有三心未滅七反餘生應㑹天宫就齎龍海況復居地轉咸憩珠庭固以皆種仙禾竝資靈粟者矣法師常願以智慧火燒煩惱薪普施衆生同飡甘露况復安居自恣願學髙年或次第於王城猶棲遑於貧里迦留乞麵若用神通須提請飯致遺豪貴於是思營衆業願造坊厨庶使應供之僧皆同自然之食升堂濟濟無勞四輩之頻髙廩峩峩恒有千食之備其外鐵市銅街青樓紫陌辛家黑白之里甲第王侯之門莫不供施相髙資儲轉衆法師善巧方便漚和舍羅教授滋生隨年增長假使桑林不雨瓠水揚波猶厭稻梁永無饑乏加以五鹽具足七菜芳軟麰類天㕑果同香樹羹鼎之大殷王未逢糜鑊之深齊都非擬昆吾在次皆鳴鷲嶺之鐘𤾉谷初升同洗龍池之鉢東陽雙林寺傅大士碑夫至人無己屈體申教聖人無名顯用蔵跡故維摩詰降同長者之儀文殊師利或現儒生之像提河獻供之旅王城迾衆之端抑號居士時為善宿大經所説當轉法輪大品之言皆紹尊位斯則神通應化不可思議者乎東陽郡烏傷縣雙林寺傳大士者即其縣人也昔巖谿藴徳渭浦呈祥天賜殷宗誕興元相景侯佐命樊滕是埒介子揚名甘陳為伍東京世載西晉重光惟是良家降神攸託若如本生本行或示縁起子長子雲自叙元系則云補處菩薩仰嗣釋迦法王真子是號彌勒雖三㑹濟濟華林之道未孚千尺巖巖穰佉之化猶逺但分身世界濟度羣生機有殊源應無恒質自叙因縁大宗如此按停水經云觀世音菩薩有五百身在此閻浮提地示同凡品教化衆生彌勒菩薩亦有五百身在閻浮提種種示現利益衆生故其本迹難得而詳言者也爾其蒸蒸大孝肅肅惟恭厥行以禮教為宗其言以忠信為本加以風神爽朗氣調清髙流化親朋善和紛諍豈惟更盈毁壁宜僚下丸而已哉至於王戎吏部鄧禹司徒同此時年有懐棲遁仍隠居松山雙林寺棄捨恩愛非梁鴻之竝逰拜辭親老如蘇躭之永別自修禪逺壑絶粒長齋非服流霞若餐朝沆太守王烋言其詭詐乃使邦佐幽諸後曹迄至兼旬曾無假食於是州鄉媿伏逺邇歸依逃迹山林肆行蘭若又自叙云七佛如來十方竝現釋尊摩頂願受深法每至楗槌應叩法鼓裁鳴空界神仙共来行道其外人所見者拳握之内或吐異香胸臆之間乍表金色時有信安縣比丘僧朔與其同類逺來觀化未及祗肅忽見大士身長丈餘朔等驚慚相趨禮拜䖍恭既畢更覩常形又有比丘智勰優婆夷錢滿願等伏膺累載頻覩異儀或見脚長二尺指長五寸餘兩眼光明雙瞳照耀皆為金色竝若金錢譬李老而相侔同周文而等狀姜嫄所履天歩可以為儔河流大戾神足宜其相比支郎之彦既恥黄精瞿曇之師有慚青目既而四空妙定薰修巳成八解明心莊嚴斯滿時還鄉黨化度鄉親俱識還源竝知迴向或立捨鬚髮如聞善來大傾財寳同修淨福大士薰禪所憩獨在高巖爰梃嘉木是名檮樹擢本相對似雙槐於俠門合幹成隂類雙桐於空井厥體貞勁無爽大年置霜停雪寒暑䓗翠信可以方諸堅固譬彼娑羅既見守於神龍將為疑於變鶴乃於山根嶺下創造伽藍因此高柯故名雙林寺矣大士亦還其里舍貨貿妻兒營締支提繕冩尊法嘗以聚沙畫地皆成圖果芥子菴羅無疑褊陋乃起九層塼塔形相巋然六時䖍拜巡繞斯託又以大乘方等靈藥寶珠眷言山谷希得傳冩龍鄉思其曉照象駕乏其流通復造五時經典千有餘巻與夫鬻子而葬同其至誠嫁妻而隠無殊髙節若寄搏麨如因賣花共指菩提方成親眷至如一相無相之懐虚己虚心之徳化雞在臂方推理於自然毒蛇傷體終無擾於深定門徒肅肅學侣詵詵通被慈悲義無偏黨大通元年縣中長宿傅普通等一百人詣縣令范胥連名薦述又以中大通四年縣中豪傑傅徳宣等道俗三百人詣縣令蕭詡具陳徳業夫以連城之寶照廡之珍野老怪而相捐工人迷而不識胥等體有流俗才無鑒真亟欲騰開終成虧怠梁髙祖武皇帝紹隆三寶𢎞濟四生迹冠優填神髙仙豫夫以陳蕃靜室猶懐天下之心伊尹躬耕思𢎞聖王之道况我有慧日明炬如風寶車濟是沈舟能升彼岸固宜光宣正法影響人王者乎於是以中大通六年正月二十八日遣弟子傅􅀈出都致書髙祖其辭曰雙林樹下當來解脱善慧大士白國主救世菩薩今條上中下善希能受持其上善以虛懐為本不着為宗妄想為因湼槃為果其中善以治身為本治國為宗天上人間果報安樂其下善以䕶養衆生勝殘去殺普令百姓俱禀六齋夫以四海之君萬邦之主預居王土莫不祗肅爾時國師智者法師與名徳諸衆僧等言辭謹敬多乖釋迦之書文牒畢恭飜豫山公之啓大士年非長老位匪沙門通疏乘輿過無䖍恪京都道俗莫不嗟疑􅀈至都投太樂令何昌并有𢎞誓誓在御路燒其左手以此因縁希當聞達昌以此書呈同泰寺僧皓法師師衆所知識名稱普聞見書隨喜勸以呈奏皇心懽悦遽遣招迎來謁宸闈亟論經典同泰寺前臨北闕密邇南宫仍請安居備諸資給後徙居鍾山之下定林寺逰巖倚樹宴坐經行京洛名僧學徒雲聚莫不提函負袠問慧諮禪居䕃髙松卧依盤石於是四徹之中恒泫甘露六旬之内常雨天酒豈非神僊影響示現禎祥者乎帝於華林園重雲殿自開講三慧般若經窮須真之所問御法勝之高堂百千龍像圍繞餐聴黑貂朱紱王侯滿筵國華民秀公卿連席乃令大士獨榻對揚天扆并遣傳詔及宣傳左右四人接受言論爾時納揆之於臺内司𨽻之在殿中杜預還朝馬防親貴舊儀懸席皆等庶僚以大士絶世通人故加其殊禮矣及玉輦升殿雲蹕在堦晏然箕坐曾不山立憲司譏問愈見疑跱但答云法地若動則一切法不安應對言語皆為爽異昔漢皇受道樂大不臣魏祖優賢楊夐如客河上之老輕舉臨於孝文嚴子之高閒卧加於光武方其古烈信可為儔帝又於夀光殿獨延大士講論𤣥賾言無重頌句備伽陀音㑹宫商義兼華藻豈惟寶積獻盖文成七言釋子彈琴歌為千偈而己固非論經於白虎之殿應詔於金馬之門説義雲臺受釐宣室可同年而語㢤自火運將終民無先覺雖復五湖内贔蒼鵞之兆未萌四海横流夷羊之柭匪現大士天眼所照預覩未來摩掌之明夙鑒時禍哀羣生之版蕩泣世道之崩淪救苦為懐大悲為病誓欲虚中閉氣識食為齋非服名香但資禪悦方乃燒其苦器製造華燈願以此一光明遍照十方佛土勸請調御常住世間救現在之兵災除當來之苦集於是學衆悲號山門踊呌弟子居士徐普㧞潘普成等九人求輸己命願代宗師其中或馘耳而刋鼻或焚臂而燒手善財童子重覩知識忍辱僊人是馮相輩大士乃延其教化更住閻浮𢎞訓門人備行衆善於是弟子居士范難陀弟子比丘法曠弟子優婆夷嚴比丘各在山林燒身現滅次有比丘寶月等二人窮身繫索挂錠為燈次有比丘慧海菩提等八人燒指供養次有比丘尼曇展慧光法􅊏等四十九人行不食齋法次有比丘僧㧞慧品等六十二人割耳出血用和名香奉依師教竝載在碑隂書其名品夫二儀大徳所貴曰生六趣含靈所重唯命雖復夢幻影響同歸摩滅愛使迷情唯貪長久自非善巧方便漚和舍羅照以慈燈沾其妙藥豈或捨不貲之軀而能行希有之事若令割身奉鬼聞半偈於湼槃賣髓祠天能供養於般若理當刳心靡吝擢骨無疑者乎大士小學之年不逰黌舍大成之徳自通墳典安禪合掌説偈論經滳海未盡其書懸河不窮其義前後講維摩思益經等比丘智瓚傳習受持所應度者化縁既畢以大建元年朱明始獻奄然右卧將歸大空二旬初滿三心是滅爾時隆暑便己赫曦屈伸如常温暖無異洗浴䆒竟扶坐着衣色貌敷渝光彩鮮潔爰經信次宛若平生烏傷縣令陳鍾耆即往臨赴猶復反手傳香皆如疇昔若此神變無聞前古雖復青牛道士白馬先生便遁形骸本慚希企若其滅定無想彈指而石壁己開法王在殯申足而金棺猶啓非斯矣莫與為儔遺誠於雙林山頂如法燒身一分舍利起塔於冡一分舍利起塔在山又造彌勒像二軀置此雙塔莫移我眠牀當取法猛上人織成彌勒像永安牀上寄此尊儀以標形相也於是門徒巨痛遂爽遺言用震旦之常儀乖闍維之舊法四部皆集悲同白車七衆攀號哀踰青樹弟子比丘法璿菩提智瓚等以為伯陽之徳貞枑紀於賴鄉仲尼之道高碑書於魯縣亦有揚雄弟子鄭𤣥門人俱述清猷載刋𤣥石於是祈聞兩觀冒涉三江爰降絲綸􅂶成豐琰陵雖不敏夙仰高風輕課庸音乃為銘曰大矣權迹勞哉赴時或現商主聊為國師卑同巧匠屈示良醫猗歟開士類此難思當來解脱克紹迦維妙道猶秘機縁未適弗降雞頭寜開狼迹北地爰徙東山攸宅族貴泥陽宗分蘭石莫測其本徒觀其迹邈有蒲塞心㝠世雄明宣苦苦妙鑒空空汲引三界行蔵六通爰初隠逸宴處林叢食等餐露齋疑服風敬禮珎塔歸依靈像未若天尊躬臨方丈慧炬常照慈燈斯朗釋梵天仙晨昏來徃濟濟行法洗洗談講徳秀丈風髙廣成來儀上國抗禮承明妙辯無相深言不生撞鐘比説擊鼓慚英樂論天口誰其與京乍現僊掌爰摽神足色艷沈檀香踰薝蔔我有邊際隨機延促誓毁身城當開心獄忽示泡影俄如風燭噭噭門人承師若親寧焚軟疊弗燎香薪合窟為􅉎方墳以堙須彌巨海變灰揚塵淨土無壤靈儀自真何時湧塔復覩全身天台山徐則法師碑夫海水揚塵幾千年而可見天衣拂石幾萬嵗而應平至人者譬彼晨昏方乎晷刻固非俗士之所能言寰中之所能量者也至如不死之草猶稱南裔長生之樹尚挺西崑百紀逰龜皆登蓮葉千齡夀鶴或舞松枝假矣生民何其天脆譬彼風電同諸泡沫琢火之歎聞諸往賢逝水之悲嗟乎前聖樵人看博信未始乎淹留仙客彈琴固不移於俄頃然而子孫皆其數世鄉黨咸為草萊是以志士名賢飄然長騖臊羶榮利懕穢風塵服冕乘軒其猶桎梏朱庭紫閣事甚籠樊隠淪巖洞飡餌芝髓忽矣身輕俄然羽化金繩玉版受謁帝之符龍駕霓裳處仙宫之籙法師蕭然道氣卓矣仙才千􅌇孤標萬頃無度所以伊川控鶴葉縣乘鳬靈化無方去還斯在銘曰來去三鳥賓逰二童然香雨上擊磬雲中玉粒雖軟金膏未鎔方流道業濟彼昏䝉頌皇太子臨辟雍頌有序臣聞天大王大詳於道徳之言天文人文顯於爻象之説是以大君革命黔首所以庇焉聖人創物文籍所以生焉咸由此道制為民極莫不對越上靈裁成庶類濟世育徳昭彼昆蟲皇帝世膺下武體資上徳握天鏡而授河圖執玉衡而運乾象皇太子耀彼重離光兹匕鬯儀天以行三善儷極以照四方惟忠惟孝自家刑國乃武乃文化成天下侍中國子祭酒新安王宗室羽儀衣冠凖的惟善為樂造次必儒粤以十一年三月二十一日受詔𢎞宣發論語題攝齊升堂摳衣即席對揚天人開闢大訓清言既吐精義入神副徳爰動音辭鋒起問難泉涌辨紛綸之異定倫理之疑玉振鏘鏘雲浮雨布介王奉繫聖蹤馳辨秀出信令張禹慚其師法何晏忸其訓詁穆穆焉洋洋焉此實虞朝之盛徳生民之壯觀者也臣抑又聞之魯頌聿興史克宣其懿晉雍大啓王廙逞其詞所以述休平之風揚君上之徳輕以下才敢為頌曰皇運勃啓膺圖受命紫盖東臨黄旗南映積仁累徳重明疊聖四海無浪三階己平儲駕戾止和鸞有聲𢎞風講肆崇儒肅成丹書貴道黄金賤籯洙泗興業闕里增榮銘太極殿銘有序夫紫盖黄旗揚都之王氣長久虎踞龍蟠金陵之地體貞固天居爽嵦大寢尊嚴髙應端門仰模營室歸於有徳譬彼河圖傅我休明義同商鼎太極殿者法互象冗王者之位以尊左平右墄天子之堂為貴往朝煨燼多歴年所世道隆平宜其休復監軍鄒子度啟稱即日忽有一大梓柱從流來泊在後渚岸嵯峨容與若漢水之僊槎揺漾波濤似新亭之龍刹孤拔靈山允彰天貺昔梁氏承聖將圖繕修東虜窺江西胡犯畢定之方中亟興師旅揆之以日輒有災故是知秦人所止實漢祖而為宫吳都佳氣乃元皇而斯宅千櫨赫奕萬栱崚層植緑芰而動㣲風舒丹蓮而制流火甘泉逺望觀正殿之崢嶸函谷遥看美皇居之佳麗信可以齊三光而示宇宙㑹萬國而朝諸侯爰命㣲臣乃為銘曰雍畤相望參差未央偃師迴顧崔嵬徳陽髙捫太乙正睹瑶光峨峨靈柱赫赫流樟美矣宫室嘉哉令日御扆垂旒當朝靖蹕樂備韶夏禮兼丈質帝旅無諠王旗斯謐肅肅卿士邕邕承弼漢座雕屏周人檻櫺城隅有勒殿省皆銘況復皇寢宜昭國經方流典訓永樹天廷報徳寺刹下銘有序昔者明王大孝感動神祗助月致景星之祥非煙流慶雲之色然而嚴敬之道惟事盡於配天明發之懐誠不過於饗帝豈如以梵宫之樂資乎廟堂淨土之因歸於園寢雖復青雲譙郡之境碧泉春陵之鄉上㓜懐凝重未曾逰陟年將志學即事登庸宣力淮潯屬有嘉夣其夢也畢陌𢎞敞橋山屈盤氣象靈長風煙騰薄使隊雙表其高百尋左則青龍蟠蜿右則白虎蹲踞軒轅之駕譬婉婉而多慙呉王之墳狀耽耽而非擬有人指其地云此是國陵自爾迄永定初其間二十有餘年至嵗紀頻移崇塋乃作觀其山川形勢王相徴圖瞻拜高巒宛如前夢大矣哉孝悌之至通於神明者與銘曰壯矣金表傍依壖垣髙連綵霓極睇翔鶤梵偈宵唱雲花晝翻三心斷縳六道除怨趙夢天樂秦逰帝閽王靈在上巨勝奚論福彼羣品俱排大昏皇家七百於萬維孫後堂望美人山銘一作庾信今兩存之髙堂凝雨洛浦無洲何處相望山邊一樓峰因五婦石是三侯險逾地肺危鄰天柱禁苑斜通春人恒聚樹裏聞歌枝中見舞恰對粧臺諸牕併開遥看巳識試喚便迴豈如織女非秋不來麈尾銘爰有妙物窮兹巧制員上天形平下地勢靡靡絲垂綿綿縷細入貢宜吳出先陪楚壁懸石拜帳中玉舉既落天花亦通神語用動捨黙出處隨時揚斯雅論釋此繁疑拂靜塵暑引飾妙詞誰云質賤左右宜之哀䇿文陳文帝哀䇿文維太康元年太嵗丙戌四月丁未朔二十七日癸酉大行皇帝崩於有覺殿殯於太極之西階粤六月丙寅將遷於永寧陵禮也容車晚駕幄殿晨張旌帷具列綍翿成行哀子嗣皇帝諱擗蜃輅於丹陛攀龍帷於紫庭趨過窮於屏闈拜慟感於明靈東京飛其瑞露北陸霣其祥星乃詔雲臺之史稽採咸池之曲叶大雅於鳴金同蔵書於羣玉其辭曰若水傳帝薰風御民重光所集世載於陳赫矣髙祖悠哉上旻蟬聯寶胄暉煥郊禋我皇誕聖膺此家慶道主衢罇神凝懸鏡洛書天表河紀靈命納揆馳芳賓門流詠稽隂克伐震野勤王亳道增搆豳風㑹昌言瞻少昊實仗高陽駕彼軫轕清宫未央歡覃兆庶徳洎遐荒穆齊髙寢上膳長樂肅肅承顔哀哀薦酌悼園恭儉章陵謙約大寶崇名無間改作纂武升厯遺愛實繁三湘九派沴氣雲昏力折天柱才傾地門甘泉夜照細栁朝屯谷魅山鬼横流塞源赫赫英謩赳赳雄斷遍行天討無遺神算鬱掃江淮長驅巴漢九夷百越雷隨風渙北俘昆耶西戡伊靬荷負皇極劬勞庶幾勤民聴政旰食宵衣服貴綈皁風移閫闈唐山罷奏濮水韜徽訪採狂狷搜剔仄微世感中孚民維大畜外户無閉髙垣奚築降情儒雅凝懐庠塾御廡為歡臨雍彌肅禮兼三代樂備九成天資武徳地照文明墨履斯在幪巾自清連珠合璧曜爽流精獸舞時豫禽歌頌平帝載維逺王靈維大候雨占風荒中海外憬彼鞮譯咸承冠帶是曰君臨斯為交泰白環己賮𤣥珪克禎東河佇揖北狄思征鉞斧将戒􅋛珩未鳴星淫去楚日沴悲荆億兆何釁穹旻遽傾大禹胼胝重華腒腊仰惟勞務同斯違懌發夢無徴昭祈奚益聴茂陵之鐘鼓抱喬陽之劔舄詎髣髴於宸儀終纒綿於號擗嗚呼哀㢤三占以吉四海同奔列賵天宇崩號帝閽千門啓於閶闔萬乗警於靈輼槐風悲於輦道松雨思於郊原鑾旂動而虚蹕宿衛靜而空尊嗚呼哀哉卑陌平夷流山蟠固紀無遷市唐有通樹經白社之修塗迴青門之廣路思沛邑以東臨懐周京以西顧嗚呼哀哉機神不測性道難稱充窮靡寄孺慕奚馮惟封云之與禪肅遺玉牒之與金繩揚英聲而永久共日月而俱升嗚呼哀哉墓誌司空章昭逺墓誌周原膴膴佳氣葱葱王業攸興帝圖斯盛在昔光武佐命鄰縣者鄧侯髙祖元臣同郡者蕭相公台輔之量便著綺紈瑚璉之姿無待雕琢起家為東宮直前所奉之君則梁簡文皇帝既而黑山巨盜憑陵上國白水强胡䖍劉中夏公傾其産業募是驍雄思報皇儲累殱鯨冦屬豳風有象代邸方隆捜荆楚之英才資班輸之妙略百樓忽起登雲霄而俯臨萬弩俱張隨雷霆而竝震揚兵於九天之上决勝於千里之中殪彼羣兇皆無旋踵陳寳應志懐反叛客引周迪資其食力更事窺窬公奉詔崇朝飲冰將力前茅後勁歩驟奔馳仍同甌閩殄其巢窟若夫鳴虵之洞深谷隠於蒼天飛猨之嶺喬樹㕘於雲日宜越艇而登嶠䝉燕犀而涉江威武紛紛震山風海於是咸俘偽帥悉據髙墉爰洎滄溟莫不懲艾既而齊人無信將謀郢藩鬬艦戈船窺江淹漢公纔聞羽檄遽稟師期馳襲荆鄖應時燒蕩方欲宣威隴汧大討梁華屬上將之韜光遲中台之掩曜大建三年薨於軍幕爾乃青鳥相墓白鵲標墳林有逃車樹同華蓋前旍熊軾後乗龍轜介士發三河之民哀鐃同駟馬之曲長安傳坐恩禮盛於西京襄陽墮淚悲慟喧於南北河東康簡王墓誌夫聖人至徳天道福謙大哉堯舜貽慶長逺明兩之盛中陽纂於豢龍百世之祀皇家兆於鳴鳳違青丘於海北應紫盖於江南帝系王基重光累葉高祖之建天柱列聖之補地維蕩蕩乎民無得而名焉者也王資神昴緯託曜房靈體斯孝烈不由師保月生之對何用於擬議日近之言無階於等級封河東王加侍中淑貌與金燧相宜清顔與玉壺同照授使持節南徐州刺史武羌旅拒亭障遷移漠草非長廣之東湖萊近荆門之北王常譏庾翼使白面之非才深慕曹彰歎黄鬚之為可火精不退奚應善言水蛭難消徒持隂徳薨於沙鎮時年一十有七追贈司空加鼓吹班劍諡曰康簡王洛北占墳河南除道葭悲煙殿之聲劍動豐城之氣豈惟晉皇寵悼重琅邪之贈官魏后髙文制蒼舒之哀誄裴使君墓誌君五音之候兼其方牧八陣之圖窮其巧變用能戰必勝攻必取督稱無難兵號解煩朝飛火箭夜聳雲梯燧象從奔聯狼己合於是厥顔不撓極咍諸戎龎徳髙聲肆言羣逆胡夷總至猶持子路之纓綘刃相交終荷温生之節毎以財輕篻籜義重嵩衡割宅字貧友之孤開門延故人之殯篤好朋逰居常滿席每至鮮雲藹藹披王安之衣明月團團似班姬之扇日帶花以如笑風鳴條而若歌傍列絲桐對揚文酒一石之後逾能斷獄五斗之量猶未解酲嗟乎潘岳之詩致哀周密莊公之誄用愍相遺文為陳武帝即位告天文皇帝臣諱敢用𤣥牡昭告於皇皇后帝梁氏以圮剥薦臻厯運有極欽若天應以命於諱夫肇有烝民乃樹司牧選賢與能未常厥姓放勛重華之世咸無意於受終當塗典午之君雖有心於揖讓皆以英才處萬乘髙勲御四海故能大庇黔首光宅區縣有梁末運仍葉遘屯獯醜慿陵久移神器承聖在外非能祀夏天未悔禍復罹㓂逆嫡嗣廢黜宗枝僭詐天地蕩覆紀綱冺絶諱爰初投袂大拯横流重舉義兵實戡多難廢王立帝實有厥功安國定社用盡其力是謂小康方期大道既而煙雲表色日月呈瑞緯聚東井龍見譙邦除舊布新既彰𤣥象遷虞事夏且協謳訟九域八荒同布衷欵百神羣祀皆有誠願梁帝高謝萬邦授以大寶諱自惟菲薄譲徳不嗣至於再三辭勿獲許僉以百姓須主萬機難曠皇靈眷命非可謙拒畏天之威用膺嘉祚永言夙志能無慙徳敬簡元辰升壇受禪告類上帝用答民心永保於我有陳惟明靈是饗樂府驄馬驅以下五言白馬號龍駒彫鞍名鏤渠一作衢諸兄二千石小婦字羅敷倚端輕掃史一作吏召募擊休屠塞外多風雪城中絶詔書空憶長楸下連蹀復連􅘠中婦織流黄落花還一作飛井上春機當户前帶衫行幛口覔釧枕檀一作入壇邊數鑷經無亂新漿緯易牽蜘蛛夜伴織百舌曉驚眠封用黎陽土書因計吏船欲知夫壻處今督水衡錢出自薊北門行薊北聊長望黄昏心獨愁燕山對古刹代郡隠一作倚城樓屢戰橋恒斷長氷塹不流天雲如地陣漢月帶胡秋漬土泥函谷挼繩縳凉州平生燕頷相㑹自得封侯隴頭水别塗聳千仭離川懸百丈攅荆夏不通積雪冬難上枝交隴底暗石礙波前響迴首咸陽中唯言夢時往折楊栁嫋嫋河堤樹依依魏主營江陵有舊曲洛下作新聲妾對長楊苑君登髙栁城春還應共見蕩子太無情闗山月二首闗山三五月客子憶秦川思婦髙樓上當牕應未眠星旗映疎勒雲陣上祁連戰氣今如此從軍復幾年月出栁城東㣲雲掩復通蒼茫縈白暈蕭瑟帶長風羌兵燒上郡胡騎獵雲中將軍擁節起戰士夜鳴弓洛陽道二首緑栁三春暗紅塵百戲多東門向金馬南陌接銅駝華軒翼葆吹飛盖響鳴珂潘郎車欲滿無奈擲花何洛陽馳道上春日起塵埃濯龍望如霧河橋渡似雷聞珂知馬蹀傍􅎻見甍開相看不得語宻意眼中來長安道輦道乗雙闕豪雄被五都横橋象天漢法駕應坤圖韓康賣良藥董􅅯鬻明珠喧喧擁車騎非但執金吾梅花落對户一株梅新花落故栽燕拾還蓮井風吹上鏡臺娼家怨一作愁思妾樓上獨裴徊啼看竹葉錦簮一作篸罷未能裁紫騮馬玉鐙繡纒鬃金鞍錦覆幪風驚塵未起草淺埒猶空角弓連一作穿兩兎珠彈落雙鴻日斜馳逐罷連翩還上東劉生劉生殊倜儻任俠遍京華戚里驚鳴筑平陽吹怨笳俗儒排左氏新室忌漢家高才被擯壓自古共憐嗟烏棲曲二首七言卓女紅妝期此夜胡姬沽酒誰論價風流荀令好兒郎偏能傅粉復薰香繡帳羅帷隠燈燭一夜千年猶不足唯憎無賴汝南鷄天河未落猶爭啼雜曲傾城得意己無儔洞房連閣未消愁宫中本造鴛鴦殿為誰新起鳳凰樓緑黛紅顔兩相發千嬌百念情無歇舞衫迴䄂勝春風歌扇當牕似秋月碧玉宫妓自翩妍絳樹新聲最可憐張星舊在天河上從來張姓本連天二八年時不憂度旁邊得寵誰相妬立春厯日自當新正月春幡底須故流蘇錦帳挂香囊織成羅幌隠燈光只應私將琥珀枕暝暝來上珊瑚牀長相思二首長相思望歸難傳聞奉詔戍臯蘭龍城逺鴈門寒愁來瘦轉劇衣帶自然寛念君今不見誰為抱腰看長相思好春節夢裏恒啼悲不洩帳中起牕前髻栁絮飛還聚逰絲斷復結欲見洛陽花如君隴頭雪詩同江詹事登宫城南樓以下五言元良屬上徳率土被中孚漢幄朝無怠周門夕復趨桓經既受業賀拜且尊儒壯志諧風雅髙文㑹斗樞鏗鏘叶舞蹈炤爛等琨瑜溝水慙雄伯漳川仰大巫鮑魚寧入俎釣鱉匪充厨叔譽恒詞屈防年豈濫誅走筆戲書應令此日乍殷勤相嫌不如春今宵花燭淚非是夜迎人舞席秋來巻歌筵無數塵曾經新代故那惡故迎新片月窺花簟輕寒入錦巾秋來應瘦盡偏自著腰身春情風光今旦動雪色故年殘薄夜迎新節當罏却晩寒竒一作故香分細霧一作篆石炭擣輕紈竹葉裁衣帶梅花奠酒盤年芳袖裏出春色黛中安欲知迷下蔡先將過上蘭奉和詠舞十五屬平陽因來入建章主家能教舞城中巧畫粧低鬟向綺席舉袖拂花黄燭送空迴一作牕邊影衫傳箧裏香當繇好留客故作舞衣長和簡文帝賽漢高帝廟聲偶作徐摛詩彚作庾肩吾並誤山宫類牛首漢寢若龍川玉盌無秋酎金燈滅夜煙丹帷迫靈嶽紺席下羣僊堂虚沛筑響釵低戚舞妍何殊后廟裏子建作華篇山齋桃源驚往客鶴嶠斷來賓復有風雲處蕭條無俗人山寒微有雪石路本無塵竹徑䝉籠巧茅齋結構新燒香披道記懸鏡厭山神砌水何年溜簷桐幾度春雲霞一已絶寧辨漢將秦詠柑藝文初學並作徐陵乃劉孝綽舊集載此或誤收也朱實挺江南苞品擅珍淑上林雜嘉樹江潭間修竹萬室擬封侯千株挺荆國緑葉萋以布素榮芬且郁得陳終宴歡良垂雲雨育侍宴園林才有熱夏淺更勝春嫩竹猶含粉初荷未聚塵承恩預下席應阮獨何人奉和山池羅浮無定所鬱島屢遷移不覺因風雨何時入後池樓臺非一勢臨翫自多竒雲生對户石猨挂入欄枝山池應令盡舸圖僊獸飛艎挂采斿榜人事金漿釣女飾銀鈎細萍時帶檝低荷乍入舟猿啼知谷晩蟬咽覺山秋别毛永嘉英華作别毛尚書願子厲風規歸來振羽儀嗟余今老病此别空長離白馬君來哭黄泉我詎知徒勞脱寶劍空掛隴頭枝秋日别庾正員藝文作張正見征途愁轉斾連騎慘停鑣朔氣凌疎木江風送上潮青雀離㠶逺朱鳶别路遥唯有當秋月夜夜上河橋新亭送别應令鳳吹臨伊水時駕出河梁野燎村田黑江秋岸荻黄隔城聞上鼓迴舟隠去檣神襟愛一作憂逺别流睇極清漳和王舍人送客未還閨中有望倡人歌吹罷對鏡覧紅顔拭粉留花稱除釵作小鬟綺燈停不滅髙扉掩未闗良人在何處光唯見月還為羊兖州家人答餉鏡信來贈寶鏡亭亭似團月鏡久自踰明人久情愈歇取鏡掛空臺于今莫復開不見孤鸞鳥香魂何處來詠織婦纎纎運玉指脉脉正蛾眉振躡開交縷停梭續斷絲簷前初月照洞户朱帷垂一作未垂帷㺯機行掩淚彌令織素遲内園納凉昔有北山北今余一作來東海東納凉高樹下直坐落花中狹徑長無跡茅齋本自空提琴就竹篠酌酒勸梧桐鬭鷄季子聊為戲陳王欲騁才花冠己衝力芥爪復驚媒鬭鳳羞衣錦雙鸞恥鏡臺陳倉若有信為覔寶雞來詠日華朝暉爛曲池夕照滿西陂復有當晝景江上鑠光儀時從高浪歇乍逐細波移一在雕梁上詎比扶桑枝詠雪瓊林𤣥圃葉桂樹日南華豈若天庭瑞輕雲帶風斜三農喜盈尺六出儛崇花明朝闕門外應見海神車春日岸煙起暮色岸水帶斜暉逕狹横枝度簾揺驚燕飛落花承歩履流澗冩行衣何殊九枝葢薄暮洞庭歸春和簡文帝山齋架嶺承金闕飛橋對石梁竹宻山齋冷荷開水殿香山花臨舞席氷影照歌牀闕漢魏六朝百三家巻一百三下
