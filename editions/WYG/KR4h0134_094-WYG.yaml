body:
  text: 漢魏六朝百三家集巻九十四梁劉峻集題詞劉孝標見任彦升諸子流離行路舊交莫恤則著廣絶交論與中山劉明信友善書命往反明信没復為報章追答之念其慇勤死友寄懷寂寞一篇之中郈成季札遺風在焉孝標淄右名種期月孤露魏師南侵䧟身奴虜既知書學播遷緇素韓非入秦李陵去漢豈若是困厄哉多聞不達逃還江南亦爰適樂土不欲累北人豢養也魏佛助作魏書好詆南士妄謂孝標兄弟疎薄遭棄殆越人之笑章甫乎棲學東陽享年六十𤣥靖先生寧云夭折獨其一世書淫南北並躓上有好文之君朝多同學之彦而引見無階山棲竟老徳祖見忌於曹操敬通觖望於光武豈非命邪辯論六蔽善言天人自序三同四異悲憤交集遇主若此而又重以悍室司晨若敖將餒詩窮而工其然乎目錄啓送橘啓書與宋玉山元思書與舉法師書答劉之遴借類苑書追答劉沼書答郭峙書稱族子訏歊書序相經序自序志東陽金華山栖志論辨命論有序廣絶交論詩登郁洲山望海自江州還入石頭詩始營山居出塞漢魏六朝百三家集巻九十四目録欽定四庫全書漢魏六朝百三家集卷九十四明張溥輯梁劉峻集啓送橘啓南中橙甘青鳥所食始霜之旦採之風味照座劈之香霧噀人皮薄而味珍胍不粘膚食不留滓甘踰萍實冷亞氷壺可以熏神可以芼鮮可以漬蜜氊鄉之果寧有此邪書與宋玉山元思書驅馬金張之館飛蓋許史之廬習匡鼎之説詩騁谷雲之雕篆賓徒波湧輿輪靡息當是時也樂可言哉然靜思夫君愀焉軫歎何則方鑿圓柄鉏鋙難從翔鳥游奐蹉跎不狎是以賈生懷琬琰而挫翮馮子握璵璠而鎩羽天誕英逸獨擅民秀心貞筠箭徳潤珪璋信人之水鏡一性之鎔範而荆南雄曲高音鮮和河西名驥滅没誰賞故若先生者進有三難退有三樂竊觀先生未能鴻翔鸞起騰霞躋漢將由囿空桑麻田無負郭俛眉翕肩以斯故耳今賢弟賓從抗鱗奮翼或衣繡江塘或鳴騶洛渚連騎方驅擊鐘乃食蕚跗若是吾子復何憂哉惟當纂兩仲之微迹襲二疎之風流生與漁父同嬉死葬要離墓側金石可碎聲華無寂斯道坦坦先生幸其朂與與舉法師書聞諸行李高談徽徳逖聽風聲心飛魂竦無異蘄仙之望石髓太陰之思龍燭蒼星昏昃涼雲送秋道勝則肥固應頥攝衣裳虹蜆帷幕霄露鉺黄菊之落蘂酌清澗之毖流旦候歸鴈晨鳬暮聽羈雌獨鶴神彯彯爾蓋象蕭史之騎鳴鳯列子之御長風雖荆卿旁若無人孝然堅卧氷雪沈沈隱隱何以尚之哉至於馳騖經囿翺翔書圃極龍宫之妙典殫石室之鴻記道生伏其天真曼倩謝其辨物若乃習是童子措志雕蟲藻思内流英華外發葳蕤秋竹照曜春松爵頌息明珠之譽長門濫黄金之賞盛矣美矣煥其麗乎昔旅浙河嘗觀組繢不覺紙爇筆焚魂魄斯盡自兹厥後兩絶珪璧意睠睠於菁華腸廻廻於九逝夫日御停照不踰隙穴海若濆湧莫限隈嵎以玉抵鵲昔傳餘寶冀閲清徽用瘳眩疾然越民非鬻冠之所齊國豈奏韶之地望與其進無貽責焉答劉之遴借類苑書九冬有隟三餘暇時多游書圃代樹萱蘇若夫采亹亹於緗紈閲微言於殘竹嗢飫膏液咀嚼英華不知地之為輿天之為葢靡測廻塘莫辨輿馬烏足以言乎是用周流墳素詳觀圖諜搦管聯冊纂兹英奇蛩蛩之謀止於善草周周之計利在銜翼故鳩集斯文蓋自綴其漏耳豈冀藏山之名播於士大夫哉追答劉沼書劉侯既重有斯難值予有天倫之慼竟未之致也尋而此君長逝化為異物緒言餘論蘊而莫傳或有自其家得而示余者余悲其音徽未沬而其人已亡青簡尚新而宿草將列泫然不知涕之無從也雖隙駟不留尺波電謝而秋菊春蘭英華靡絶故存其梗槩更酬其㫖若使墨翟之言無爽宣室之談有徵冀東平之樹望咸陽而西靡葢山之泉聞弦歌而赴節但懸劍空壠有恨如何答郭峙書聞君子舊矣但人非豕鹿轉加遲滯波駁雨滯動間山川故無由交羽觴薦雜佩睨浮雲以搔首臨清風而浩歌變燧廻星亦云勞止稱族子訏歊書劉訏字彦度兄歊字士光並履高操共卜築鍾山宋熈寺東澗有終焉之志族祖孝標與書稱之訏超超越俗如半天朱霞歊矯矯出塵如雲中白鶴皆儉歳之梁稷寒年之纎纊序相經序夫命之與相猶聾之與響聲動乎幾響窮乎應雖夀夭參差賢愚不一其間大較可得聞矣若乃生而神睿弱而能言八彩光眉四瞳麗目斯實天姿之特達聖人之符表洎乎日角月偃之竒龍棲虎踞之美地靜鎮於城纒天關運於掌䇿金槌玉枕磊落相望代犀起葢隱轔交映井宅既兼食匱已實抑亦帝王卿相之明効也及其深目長頸頽顔慼齃虵行鷙立猳喙鳥咮筋不束體血不華色手無春夷之柔髪有寒蓬之悴或先吉而後凶或少長乎窮乏不其悲歟至如姬公凝負圖之容孔父𦕈棲遑之迹豐本知其有後黄中明其可貴其間或躍馬膳珍或飛而食肉或皂𨽻晩侯初形未正銅巖無以飽生玉饌終乎餓死因斯以觀何事非命自序峻字孝標平原人也生於秣陵縣朞月歸故鄉八歳遇桑梓顛覆身充僕圉齊永明四年二月逃還京師後為崔豫州刑獄參軍梁天監中詔峻東掌石渠閣以病乞骸骨隱東陽金華山余嘗自比馮敬通而有同之者三異之者四何則敬通雄才冠世志剛金石余雖不及之而節亮慷慨此一同也敬通值中興明君而終不試用余逢命世英主亦擯斥當年此二同也敬通有忌妻至於身操井臼余有悍室亦令家道轗軻此三同也敬通當更始之世手握兵符躍馬食肉余自少迄長戚戚無歡此一異也敬通有子仲文官成名立余禍同伯道永無血􅉙此二異也敬通膂力剛强老而益壯余有犬馬之疾溘死無時此三異也敬通雖芝殘蕙焚終填溝壑而為名賢所慕其風流郁烈芬芳久而彌盛余聲塵寂寞世不吾知魂魄一去將同秋草此四異也所以力自為序遺之好事云志東陽金華山棲志夫鳥居山上層巢木末魚濳淵下窟穴泥沙豈好異哉葢性自然也故有忽白璧而樂垂綸負玉鼎而要卿相行藏紛紏顯晦踳駁無異火炎水流圓動方息斯則廟堂之與江海蓬户之與金閨並然其所然悦其所悦烏足毛羽瘡痏在其間哉予生自原野善畏難狎心駭雲臺朱屋望絶高葢青組且霑濡霧露彌願閒逸每思濯清瀬息椒丘寤寐永懷其來尚矣蚓專噬壤民欲從天爰洎二毛得居巖穴所居東陽郡金華山東陽實㑹稽西部是生竹箭山川秀麗臯澤坱鬰若其郡峰疊起則接漢連霞喬林布濩則春青冬綠廻溪映流則十仞洞底膚寸雲合必千里雨㪚信卓犖爽塏神居奥宅是以帝鴻遊斯鑄鼎雨師寄此乘烟故澗勒赤松之名山貽縉雲之號近代江治中奮迅泥滓王徵士高㧞風塵龍盤鳯棲咸萃兹地良由碧湍素石可致幽人者哉金華山古馬鞍山也蘊靈藏聖列名仙諜左元放稱此山云可免洪水五兵可合神丹九轉金華之有紫巖山山色紅紫因此為稱靡迤坡陀下屬深渚㠝岏嶾嶙上虧日月登自山􅅢漸高漸峻壟路廹隘魚貫而升路側有絶澗閘閜庨豁俯窺木杪焦原石邑匪獨危懸至山將半便有廣澤大川臯陸隱賑予之葺宇實在斯焉所居三面皆廻山周繞有象郛郭前則平野蕭條目極通望東西帶二澗四時飛流泉清瀾微霔滴瀝生響白波跳沬汹湧成音並漕瀆通引交渠綺錯懸溜㵼於軒甍激湍廻於階砌供帳無綆汲盥潄息瓶盆楓櫨椅櫪之樹梓柏桂樟之木分形異色千族萬種結朱實包綠果杌白蔕抽紫莖橚矗苯尊捎清風鳴籟垂條櫩户布葉房櫳中谷澗濱華蘂攅列至於青春緩謝萍生泉動則有都梁含馥懷香送芬長樂負霜宜男泫露芙蕖紅華照水臯蘇縹葉從風慿軒永眺蠲憂亡疾丘阿陵曲衆藥灌叢地髓抗莖山筋抽節金鹽重於素璧玉豉貴於明珠可以養性消痾還年駐色不藉崔文黄㪚勿用負局紫丸翺翺羣鳯風胎雨鷇綠翼紅毛素纓翠鬛肅肅毛羽關關好音皆馴狎園池旅食鷄鶩若乃䲰日伺辰響類鍾鼓鳴蚿候曙聲像琴瑟𤣥猨薄霧清囀飛㹳乘煙吟咏嘈囋嘹亮悦心娛耳諒所以跨躡管籥韜軼笙簧宅東起招提寺背巖面壑層軒引景邃宇臨崖博敞閒虛納祥生白左瞻右睇仁智所居故碩德名僧振錫雲萃調心七覺詆訶五塵郁列戒香浴滋定水至於熏鑪夜爇法鼓旦聞予則跕躔摳衣躬行頂禮詢道哲人欽和至教每聞此河紛梗彼岸永寂熈熈然若登春臺而出宇宙唯善是樂豈伊徒言寺東南有道觀亭亭崖側下望雲雨蕙樓􅌲榭隱映林篁飛觀列軒玲瓏煙霧日止却粒之氓歳集神仙之客餌星髓吸流霞將乃雲衣霓裳乘龍馭鶴觀下有石井聳峙中測雕琢刻削頗類人工躍流瀉渀湧泱咽電擊雷吼駭目驚魂寺觀之前皆植修竹擅欒蕭瑟被陵縁阜竹外則有良田區畛通接山泉膏液鬱潤肥腴鄭白決漳莫之能擬致紅粟流溢鳬鴈充厭春鱉㫖膳碧鷄冬蕈味珍霜鵽縠巾取於丘嶺短褐出自中園蔣逼側於池湖菅蒯駢填於原隰養給之資生生所用無不阜實藩籬充牣崖巘歳始年季農隙時閒濁醪初䍤醥清新熟則田家野老提壺共至班荆林下陳鐏置酌酒酣耳熱屢舞諠呶盛論箱庾高談縠稼嗢噱謳歌舉盃相抗人生樂耳此歡豈訾若夫蠶而衣耕而食日出而作日入而息晚食當肉無事為貴不求於世不忤於物莫辨榮辱匪知毁譽浩蕩天地之間心無怵惕之警豈與稽生齒劒楊子墜閣較其優劣者哉論辯命論有序主上嘗與諸名賢言及管輅歎其有竒才而位不達時有在赤墀之下預聞斯議歸以告余余謂士之窮通無非命也故謹述天㫖因言其致云爾臣觀管輅天才英偉珪璋特秀實海内之名傑豈日者卜祝之流乎而官止少府丞年終四十八天之報施何其寡歟然則高才而無貴仕饕餮而居大位自古所歎焉獨公明而已哉故性命之道窮通之數夭閼紛綸莫知其辯仲任蔽其源子長闡其惑至於鶡冠甕牖必以懸天有期鼎貴高門則曰唯人所召譊譊讙咋異端斯起蕭逺論其本而不暢其流子𤣥語其流而未詳其本嘗試言之曰夫道生萬物則謂之道生而無主謂之自然自然者物見其然不知所以然同焉皆得不知所以得鼓動陶鑄而不為功庻類混成而非其力生之無亭毒之心死之豈䖍劉之志墜之淵泉非其怒昇之霄漢非其悦蕩乎大乎萬寳以之化確乎純乎一化而不易化而不易則謂之命命也者自天之命也定於㝠兆終然不變鬼神莫能預聖哲不能謀觸山之力無以抗倒日之誠弗能感短則不可緩之於寸陰長則不可急之於箭漏至徳未能上智所不免是以當放勲之世浩浩襄陵天乙之時焦金流石文公㚄其尾宣尼絶其糧顏囘敗其叢蘭冉耕歌其芣苢夷叔斃淑媛之言子輿困臧倉之訴聖賢且猶若此而况庸庸者乎至乃伍員浮屍於江流三閭沉骸於湘渚賈大夫沮志於長沙馮都尉皓髪於郎署君山鴻漸鎩羽儀於高雲敬通鳯起摧迅翮於風穴此豈才不足而行有遺哉近世有沛國劉瓛瓛弟璡並一時秀士也瓛則關西孔子通渉六經循循善誘服膺儒行璡則志烈秋霜心貞崑玉亭亭高竦不雜風塵皆毓徳於衡門並馳聲於天地而官有微於侍郎位不登於執㦸相次殂落宗祀無饗因斯兩賢以言古則昔之玉質金相英髦秀達皆擯斥於當年韞竒才而莫用候草木以共彫與麋鹿而同死膏塗平原骨填川谷堙滅而無聞者豈可勝道哉此則宰衡之與皂𨽻容彭之與殤子猗頓之與黔婁陽文之與敦洽咸得之於自然不假道於才智故曰死生有命富貴在天其斯之謂矣然命體周流變化非一或先號後笑或始吉終凶或不召自來或因人以濟交錯紏紛廻環倚伏非可以一理徵非可以一途驗而其道宻微寂寥忽恍無形可以見無聲可以聞必御物以效靈亦慿人而成象譬天王之冕旒任百官以司職而或者覩湯武之龍躍謂戡亂在神功聞孔墨之挺生謂英睿擅竒響視韓彭之豹變謂鷙猛致人爵見張桓之朱紱謂明經拾青紫豈知有力者運之而趨乎故言而非命有六蔽焉余請陳其梗槩夫靡顔膩理哆顣頞形之異也朝秀晨終龜鵠千歳年之殊也聞言如響智昏菽麥神之辯也固知三者定乎造化榮辱之境獨曰由人是知二五而未識於十其蔽一也龍犀日角帝王之表河目龜文公侯之相撫鏡知其將刑壓紐顯其膺錄星虹樞電昭聖徳之符夜哭聚雲鬰興王之瑞皆兆發於前期渙汗於後葉若謂驅貔虎奮尺劍入紫薇升帝道則未達窅㝠之情未測神明之數其蔽二也空桑之里變成洪川歴陽之都化為魚鱉楚師屠漢卒睢河鯁其流秦人坑趙士沸聲若雷震火炎崑岳礫石與琬琰俱焚嚴霜夜零蕭艾與芝蘭共盡雖游夏之英才伊顏之殆庶焉能抗之哉其蔽三也或曰明月之珠不能無纇夏后之璜不能無考故亭伯死於縣長相如卒於園令才非不傑主非不明也而碎結綠之鴻輝殘懸黎之夜色抑尺之量有短哉若然者主父偃公孫𢎞對䇿不升第歴説而不入牧豕淄原見棄州部設令忽如過隙溘死霜露其為詬恥豈崔馬之流乎及至開東閤列五鼎電照風行聲馳海外寧前愚而後智先非而終是將榮悴有定數天命有至極而謬生姸蚩其蔽四也夫虎嘯風馳龍興雲屬故重華立而元凱升辛受生而飛廉進然則天下善人少惡人多闇主衆明君寡而薰蕕不同器梟鸞不接翼是使渾敦檮杌踵武於雲臺之上仲容廷堅耕耘於巖石之下横謂廢興在我無繫於天其蔽五也彼戎狄者人面獸心宴安鴆毒以誅殺為道徳以蒸報為仁義雖大風立於青丘鑿齒奮於華野比於狼戾曽何足喻自金行不競天地版蕩左帶沸脣乘間電發遂覆瀍洛傾五都居先王之桑梓竊名號於中縣與三皇競其萌黎五帝角其區宇種落繁熾充牣神州嗚呼福善禍淫徒虛言耳豈非否㤗相傾盈縮逓運而汨之以人其蔽六也然所謂命者死生焉貴賤焉貧富焉治亂焉禍福焉此十者天之所賦也愚智善惡此四者人之所行也夫神非舜禹心異朱均才絓中庸在於所習是以素絲無恒𤣥黄代起鮑魚芳蘭入而自變故季路學於仲尼厲風霜之節楚穆謀於潘崇成悖逆之禍而商臣之惡盛業光於後嗣仲由之善不能息其結纓斯邪正由於人吉凶在乎命也或以鬼神害盈皇天輔徳故宋公一言法星三徙殷帝自翦千里來雲若使善惡無徵未洽斯義且于公高門以待封嚴母掃墓以望喪此君子所以自强不息也如使仁而無報奚為修善立名乎斯徑廷之辭也夫聖人之言顯而晦微而婉幽逺而難聞河漢而不測或立教以進庸怠或言命以窮性靈積善餘慶立教也鳯鳥不至言命也今以其片言辨其要趣何異乎夕死之類而論春秋之變哉且荆昭徳音丹雲不巻周宣祈雨珪璧斯罄于叟種徳不逮勛華之高延年殘獷未甚東陵之酷為善一為惡均而禍福異其流廢興殊其迹蕩蕩上帝豈如是乎詩云風雨如晦鷄鳴不已故善人為善焉有息哉夫食稻梁進芻豢衣狐貉襲氷紈觀窈𦕈之竒儛聽雲和之琴瑟此生人之所急非有求而為也修道德習仁義敦孝弟立忠貞漸禮樂之腴潤蹈先王之盛則此君子之所急非有求而為也然則君子居正體道樂天知命明其無可奈何識其不由智力逝而不召來而不距生而不喜死而不慼瑶臺夏屋不能悦其神土室編蓬未足憂其慮不充詘於富貴不遑遑於所欲豈有史公董相不遇之文乎廣絶交論客問主人曰朱公叔絶交論為是乎為非乎主人曰客奚此之問客曰夫草蟲嗚則阜螽躍雕虎嘯而清風起故絪縕相感霧涌雲蒸嚶鳴相召星流電激是以王陽登則貢公喜罕生逝而國子悲且心同琴瑟言鬰郁於蘭茝道恊膠漆志婉孌於塤篪聖賢以此鏤金版而鑴盤盂書玉牒而刻鍾鼎若乃匠人輟威風之妙巧伯子息流波之雅引范張欵欵於下泉尹班陶陶於永夕絡繹縱横烟霏雨㪚巧厯所不知心計莫能測而朱益州汨彜敘越謨訓捶直切絶交遊比黔首以鷹鸇嫓人靈於豺虎蒙有猜焉請辨其惑主人听然而笑曰客所謂撫絃徽音未達燥濕變響張羅沮澤不覩鴻雁雲飛葢聖人握金鏡闡風烈龍驤蠖屈從道汙隆日月聯璧贊亹亹之𢎞致雲飛電薄顯棣華之微㫖若五音之變化濟九成之妙曲此朱生得𤣥珠於赤水謨神睿而為言至夫組織仁義琢磨道徳歡其愉樂恤其陵夷寄通靈臺之下遺跡江湖之上風雨急而不輟其音霜雪零而不渝其色斯賢達之素交歴萬古而一遇逮叔世民訛徂詐颷起谿谷不能踰其險鬼神無以䆒其變競毛羽之輕趨錐刀之末於是素交盡利交興天下蚩蚩鳥驚雷駭然利交同源派流則異較言其略有五術焉若其寵鈞董石權壓梁竇雕刻百工鑪錘萬物吐漱興雲雨呼噏下霜露九域聳其風塵四海疊其燻灼靡不望影星奢藉響川騖雞人始唱鶴蓋成陰高門旦開流水接軫皆願摩頂至踵隳膽抽腸約同要離焚妻子誓徇荆卿湛七族是曰勢交其流一也富埒陶白貲巨程羅山擅銅陵家藏金穴出平原而聯騎居里閈而鳴鐘則有窮巷之賓䋲樞之子冀宵燭之末光邀潤屋之微澤魚貫鳬躍䬃沓鱗萃分雁鶩之稻梁霑玉斚之餘瀝衘恩遇進欵誠援青松以示心指白水而旌信是曰賄交其流二也陸大夫讌喜西都郭有道人倫東國公卿貴其籍甚搢紳羡其登僊加以顩頥䠞頞涕唾流沬騁黃馬之劇談縱碧鷄之雄辯敘温燠則寒谷成暄論嚴苦則春叢零葉飛沈出其顧指榮辱定其一言於是有弱冠王孫綺紈公子道不挂於通人聲未遒於雲閣攀其鱗翼丐其餘論附騏驥之旄端軼歸鴻於碣石是曰談交其流三也陽舒陰慘生民大情憂合歡離品物恒性故魚以泉涸而煦沬鳥因將死而哀鳴同病相憐綴河上之悲曲恐懼寘懷昭谷風之盛典斯則斷金由於湫隘刎頸起於苫葢是以伍員濯溉於宰嚭張王撫翼於陳相是曰窮交其流四也馳騖之倫澆薄之俗無不操權衡秉纎纊衡所以揣其輕重纊所以屬其鼻息若衡不能舉纊不能飛雖顔冉龍翰鳯雛曽史蘭薰雪白舒向金玉淵海卿雲黼黻河漢視若游塵遇同土梗莫肯費其半菽罕有落其一毛若衡重錙銖纊微彯撇雖共工之蒐慝驩兠之掩義南荆之䟦扈東陵之巨猾皆為匍匐逶迤折枝䑛痔金膏翠羽將其意脂韋便辟導其誠故輪葢所遊必非夷惠之室苞苴所入實行張霍之家謀而後動毫芒寡忒是曰量交其流五也凡斯五交義同賈鬻桓譚譬之於闤闠林囘諭之於甘醴夫寒暑遞進盛衰相襲或前榮而後悴或始富而終窮或初存而末亡或古約而今㤗循環翻覆迅若波瀾此則徇利之情未嘗異變化之道不得一由是觀之張陳所以凶終蕭朱所以隙末斷焉可知矣而翟公方規規然勒門以箴客何所見之晩乎因此五交是生三釁敗徳殄義禽獸相若一釁也難固易攜讐訟所聚二釁也名䧟饕餮貞介所羞三釁也古人知三釁之為梗懼五交之速尢故王丹威子以檟楚朱穆昌言而示絶有㫖哉近世有樂安任昉海内髦傑早綰銀黃夙昭民譽遒文麗藻方駕曹王英特俊邁聯横許郭類田文之愛客同鄭莊之好賢見一善則盱衡扼腕遇一才則揚眉抵掌雌黄出其脣吻朱紫由其月旦於是冠葢輻輳衣裳雲合輜輧擊轊坐客恒滿蹈其閫閾若升闕里之堂入其奥隅謂登龍門之阪至於顧盼増其倍價翦拂使其長鳴彯組雲臺者摩肩趨走丹墀者疊跡莫不締恩狎結綢繆想莊惠之清塵庶羊左之徽烈及瞑目東粤歸骸洛浦繐帳猶懸門罕漬酒之彦墳未宿草野絶動輪之賓藐爾諸孤朝不謀夕流離大海之南寄命瘴癘之地自昔把臂之英金蘭之友曽無羊舌下泣之仁寧慕郈成分宅之徳嗚呼世路嶮巇一至於此太行孟門豈曰嶄絶是以耿介之士疾其若斯裂裳裹足棄之長騖獨立高山之頂歡與麋鹿同群皎皎然絶其雰濁誠恥之也誠畏之也詩登郁洲山望海滄潦聯霄岫層嶺鬱㠝崱下盤鹽海底上轉靈鳥翼滇㴐非可辨鴻溶信難測輕塵久弭飛驚浪終不息雲錦曜石嶼羅綾文水色自江州還入石頭詩藝文作劉峻英華次元帝後而逸其名或以為元帝詩非也鼓枻浮大川延睇洛城觀洛城何鬱鬱杳與雲霄半前望蒼龍門斜瞻白鶴舘槐垂御溝道桞綴金堤岸迅馬晨風趨輕輿流水㪚高歌一作唱梁塵下絙瑟荆禽亂我思江海遊曾無朝市玩忽寄靈臺宿空軫及關歎仲子入南楚伯鸞出東漢何能栖樹枝取斃王孫彈始營山居自惜厭諠囂執志好栖息嘯歌棄城市歸來事耕織鑿户闚嶕嶢開軒望嶃崱激水簷前溜修竹堂陰植香風鳴紫鸎高梧巢綠翼泉胍洞杳杳流一作沈波下不極髣髴玉山隈想像瑶池側夜誦神仙記旦吸雲霞色將馭六龍輿行從三鳥食誰與金門士撫心論胷臆出塞薊門秋氣清飛將出長城絶漠衝風急交河夜月明䧟敵摐金鼓催鋒揚斾旌去去無終極日暮動邉聲漢魏六朝百三家集巻九十四
