body:
  text: 漢魏六朝百三家集巻三十六目録魏鍾㑹集題詞鍾士季弱冠與王輔嗣並知名其論易無互體才性異同厥㫖不殊然山陽易註光列學宮而潁川𤣥辨寂爾不顯豈才地經營方期功業無暇立言或者身族糜覆䇿書烟銷微言玅義莫得而聞也志云道論二十篇係士季文筆今不獲見其他亡軼可以類推命婦傳善言母徳宗述教訓在齊女傅母魯季敬姜之間乃鳴鶴白茅樞機慎密母誨至勤胡為破蜀以後頓忘執手之戒自取滅門夫司馬專國䀝睨魏鼎奄有西土勢必自帝魏亡于司馬與亡于士季等亡爾使反謀果成步騎並發縛文王父子告廟釁鼓奠安大魏功豈在閎散以下即不然同為簒臣割地而守未知誰雌雄也時違其才傾跌須臾亂兵登城英雄駢死天相司馬非盡士季之失抑覽其遺篇彬彬儒雅則猶魏文七子餘澤矣目録賦孔雀賦菊花賦又蒲萄賦檄移蜀檄奏平蜀奏書與姜維書與蔣斌書與吳主書記髙貴鄉公少康髙祖優劣論記傳生母張夫人傳論蒭蕘論漢魏六朝百三家集巻三十六目録欽定四庫全書漢魏六朝百三家集巻三十六明張溥輯魏鍾㑹集賦孔雀賦有炎方之偉鳥感靈和而來儀禀麗精以挺質生丹穴之南垂戴翠毛以表弁垂緑㽔之森纚裁脩尾之翹翹若順風而揚麾五色㸃注華羽參差鱗交綺錯文藻陸離丹口金輔𤣥目素規或舒翼軒峙奮迅洪姿或蹀足踟蹰鳴嘯郁咿菊花賦何秋菊之可竒兮獨華茂乎凝霜提威蕤於蒼春兮表壯觀乎金商延蔓蓊鬱縁阪被岡縹幹緑葉青柯紅芒芳寔離離暉藻煌煌微風扇動照曜垂光於是季秋九月九日數并置酒華堂髙㑹娯情百卉雕瘁芳菊始榮紛葩韡􅁮或黃或青乃有毛嬙西施荆姬秦嬴妍姿妖艷一顧傾城擢纎纎之素手雪皓腕而露形仰撫雲髻俯弄芳榮又夫菊有五美焉黄花髙懸凖天極也純黄不雜后土色也早植晚登君子徳也冒霜吐穎象勁直也流中輕體神仙食也蒲萄賦有序余植蒲萄於堂前嘉而賦之命荀朂並作美乾衜之廣覆兮佳陽澤之至淳覽遐方之殊偉兮無斯果之獨珍託靈根之𤣥圃植崑山之髙垠緑葉蓊鬱曖若重隂翳羲和秀房陸離混若紫英乘素波仰承甘液之靈露下歙豐潤於醴泉總衆和之淑美體至氣於自然珍味允備與物無儔清濁外暢甘㫖内遒滋澤膏潤入口散流檄移蜀檄往者漢祚衰微率土分崩生民之命幾於冺滅太祖武皇帝神武聖哲撥亂反正拯其將墜造我區夏髙祖文皇帝應天順民受命踐阼烈祖明皇帝奕世重光恢拓洪業然江山之外異政殊俗率土齊民未䝉王化此三祖所以顧懷遺恨也今主上聖徳欽明紹隆前緒宰甫輔忠肅明允劬勞王室布政垂惠而萬邦協和施徳百蠻而肅慎致貢悼彼巴蜀獨為匪民愍此百姓勞役未已是以命授六師龔行天罰征西雍州鎮西諸軍五道竝進古之行軍以仁為本以義治之王者之師有征無戰故虞舜舞干戚而服有苖周武有散財發廪表閭之義今鎮西奉辭銜命攝統戎重庶𢎞文告之訓以濟元元之命非欲窮武極戰以快一朝之政故略陳安危之要其敬聽話言益州先主以命世英才興兵朔野困躓冀徐之郊制命紹布之手太祖拯而濟之與隆大好中更背違棄同即異諸葛孔明仍規秦川姜伯約屢出隴右勞動我邊境侵擾我氐姜方國家多故未遑修九伐之征也今邉境乂清方内無事畜力待時并兵一向而巴蜀一州之衆分張守備難以禦天下之師叚谷侯和沮傷之氣難以敵堂堂之陣比年以來曾無寧嵗征夫勤瘁難以當子來之民此皆諸賢所親見也蜀相壯見禽於秦公孫述授首於漢九州之險是非一姓此皆諸賢所備聞也明者見危於無形智者窺禍於未萌是以微子去商長為周賓陳平背項立功於漢豈晏安酖毒懷禄而不變哉今國朝隆天覆之恩宰輔𢎞寛恕之徳先惠後誅好生惡殺往者呉將孫壹舉衆内附位為上司寵秩殊異文欽唐咨為國大害叛主讐賊還為戎首咨困逼禽獲欽二子還降皆將軍封侯咨與聞國事壹等窮蹙歸命猶加盛寵况巴蜀賢知見機而作者哉誠能深鑒成敗邈然髙蹈投跡微子之蹤措身陳平之軌則福同古人慶流來裔百姓士民安堵舊業農不易畝市不回肆去累卵之危就永安之福豈不美歟若偷安旦夕迷而不反大兵一發玉石皆碎雖欲悔之亦無及已其詳擇利害自求多福各具宣布咸使聞知奏平蜀奏賊姜維張翼廖化董厥等逃死遁走欲趣成都臣趣遣司馬夏侯咸護軍胡烈等徑從劒閣出新都大渡截其前叅軍爰􅒷將軍句安等躡其後參軍皇甫闓將軍王買等從涪南出衝其腹臣據涪縣為東西勢援維等所統步騎四五萬人擐甲厲兵塞川填谷數百里中首尾相繼憑恃其衆方軌而西臣勅咸闓等令分兵據勢廣張羅罔南杜走呉之道西塞成都之路北絶越逸之徑四面雲集首尾竝進蹊路斷絶走伏無地臣又手書申喻開示生路羣冦困逼知命窮數盡解甲投戈面縛委質印綬萬數資器山積昔舜舞干戚有苖自服牧野之師商旅倒戈有征無戰帝王之盛業全國為上破國次之全軍為上破軍次之用兵之令典陛下聖徳侔蹤前代翼輔忠明齊軌公旦仁育羣生義征不譓殊俗向化無思不服師不踰時兵無血刄萬里同風九州共貫臣輒奉宣詔命導揚恩化復其社稷安其閭伍舍其賦調弛其征役訓之徳禮以移其風示之軌儀以易其俗百姓欣欣人懷逸豫后來其蘇義無以過書與姜維書公侯以文武之徳懷邁世之略功濟巴漢聲揚華夏逺近莫不歸名毎惟疇昔嘗同大化呉札鄭僑能喻斯好與蔣斌書巴蜀賢智文武之士多矣至於足下諸葛思逺譬諸草木吾氣類也桑梓之敬古今所敦西到欲奉瞻尊大君公侯墓當灑掃墳塋奉祠致敬願告其所在與呉主書執笏之心載在名策記髙貴鄉公少康髙祖優劣論記二月丙辰帝宴羣臣于太極東堂與侍中荀顗尚書崔賛袁亮鍾毓給事中中書令虞松等並講述禮典遂言帝王優劣之差帝慕少康因問顗等曰有夏既衰后相殆滅少康收集夏衆復禹之績髙祖㧞起隴畝驅帥豪儁芟夷秦項包舉㝢内斯二主可謂殊才異畧命世大賢者也考其功徳誰宜為先顗等對曰夫天下重器王者天授聖徳應期然後能受命創業至于階緣前緒興復舊績造之與因難易不同少康功徳雖美猶為中興之君與世祖同流可也至如髙祖臣等以為優帝曰自古帝王功徳言行互有髙下未必創業者皆優紹繼者咸劣也湯武髙祖雖俱受命賢聖之分所覺縣殊少康殷宗中興之美夏啟周成守文之盛論徳較實方諸漢祖吾見其優未聞其劣顧所遇之時殊故所名之功異耳少康生於滅亡之後降為諸侯之𨽻﨑嶇逃難僅以身免能布其徳而兆其謀卒滅過戈克復禹績祀夏配天不失舊物非至徳𢎞仁豈濟斯勲漢祖因土崩之勢仗一時之權専任智力以成功業行事動静多違聖檢為人子則數危其親為人君則囚繫賢相為人父則不能衛子身没之後社稷幾傾若與少康易時而處或未能復大禹之績也推此言之宜髙夏康而下漢祖矣諸卿具論詳之翌日丁巳講業既畢顗亮等議曰三代建國列土而治當其衰弊無土崩之勢可懷以徳難屈以力逮至戰國强弱相兼去道徳而任智力故秦之弊可以力争少康布徳仁者之英也髙祖任力智者之儁也仁智不同二帝殊矣詩書述殷中宗髙宗皆列大雅少康功美過於二宗其為大雅明矣少康為優宜如詔㫖賛毓松等議曰少康雖積徳累仁然上承大禹遺澤餘慶内有虞仍之援外有靡艾之助寒浞讒慝不徳于民澆􅜦無親外内棄之以此有國蓋有所因至於漢祖起自布衣率烏合之士以成帝者之業論徳則少康優課功則髙祖多語資則少康易較時則髙祖難帝曰諸卿論少康因資髙祖創造誠有之矣然未知三代之世任徳濟勲如彼之難秦項之際任力成功如此之易且太上立徳其次立功漢祖功髙未若少康盛徳之茂也且夫仁者必有勇誅暴必用武少康武烈之威豈必降於漢祖哉但夏書淪亡舊文殘闕故勲美闕而罔載唯有伍員粗述大略其言復禹之績不失舊物祖述聖業舊章不愆自非大雅兼才孰能與於此向令墳典具存行事詳備亦豈有異同之論哉於是羣臣咸悦服中書令松進曰少康之事去世久逺其文昧如是以自古及今議論之士莫有言者徳美隱而不宣陛下既垂心逺鑒考詳古昔又發徳音賛明少康之美使顯於千載之上宜録以成篇永垂於後帝曰吾學不博所聞淺狹懼於所論未獲其宜縱有可采億則屢中又不足貴無乃致笑後賢彰吾闇昧乎於是侍郎鍾㑹退論次焉傳生母張夫人傳夫人張氏字菖蒲太原兹氏人太傅定陵成侯之命婦也世長吏二千石夫人少喪父母充成侯家修身正行非禮不動為上下所稱述貴妾孫氏攝嫡専家心害其賢數讒毁無所不至孫氏辨博有知巧言足以飾非成過然竟不能傷也及姙娠愈更嫉妬乃置藥食中夫人中食覺而吐之瞑眩者數日或曰何不向公言之答曰嫡庶相害破家危國古今以為鑒誡假如公信我衆誰能明其事彼以心度我謂我必言固將先我事繇彼發顧不快邪遂稱疾不見孫氏果謂成侯曰妾欲其得男故飲以得男之藥反謂毒之成侯曰得男藥佳事闇於食中與人非人情也遂訊侍者具服孫氏繇是得罪出成侯問夫人何能不言夫人言其故成侯大驚益以此賢之黄初六年生㑹恩寵愈隆成侯既出孫氏更納正嫡賈氏夫人性矜嚴明於教訓㑹雖童稚勤見規誨年四歲授孝經七歲誦論語八歲誦詩十歲誦尚書十一誦易十二誦春秋左氏傳國語十三誦周禮禮記十四誦成侯易記十五使入太學問四方竒文異訓謂㑹曰學猥則倦倦則意怠吾懼汝之意怠故以漸訓汝今可以獨學矣雅好書籍涉厯衆書特好易老子每讀易孔子説鳴鶴在隂勞謙君子藉用白茅不出户庭之義每使㑹反覆讀之曰易三百餘爻仲尼特説此者以謙恭慎密樞機之發行已至要榮身所繇故也順斯術以往足為君子矣正始八年㑹為尚書郎夫人執㑹手而誨之曰汝弱冠見叙人情不能不自足則損在其中矣勉思其戒是時大將軍曹爽專朝政日縱酒沉醉㑹兄侍中毓宴還言其事夫人曰樂則樂矣然難乆也居上不驕制節謹度然後乃無危溢之患今奢僭若此非長守富貴之道嘉平元年車駕朝髙平陵㑹為中書郎從行相國宣文候始舉兵衆人恐懼而夫人自若中書令劉表侍郎衞瓘夏侯和等家皆怪問夫人一子在危難之中何能無憂答曰大將軍奢僣無度吾常疑其不安太傅義不危國必為大將軍舉耳吾兒在帝側何憂聞且出兵無他重器其勢必不久戰果如其言一時稱明㑹厯機密十餘年頗豫政謀夫人謂曰昔范氏少子為趙簡子設伐邾之計事從民悦可謂功矣然其母以為乘偽作詐末業鄙事必不能久其識本深逺非近人所言吾常樂其為人汝居心正吾知勉矣但當修所志以輔益時化不忝先人耳常言人誰能皆體自然但力行不倦抑亦其次雖接鄙賤必以言信取與之間界畫分明或問此無乃小乎答曰君子之行皆積小以致髙大若以小善為無益而弗為此乃小人之事耳希通慕大者吾所不好㑹自幼少衣不過青紺親營家事自知恭儉然見得思義臨財必讓㑹前後賜錢帛數百萬計悉送供公家之用一無所取年五十有九甘露二年二月暴疾薨比葬天子有手詔命大將軍髙都侯厚加賵贈喪事無巨細一皆供給議者以為公侯有夫人有世婦有妻有妾所謂外命婦也依春秋成風定姒之義宜崇典禮不得總稱妾名於是稱成侯命婦殯葬之事有取於古制禮也芻蕘論國之稱富者在乎豐民非獨謂府庫盈倉廪實也且府庫盈倉廩實非上天所降皆取之於民民困國虛矣漢魏六朝百三家集巻三十六
