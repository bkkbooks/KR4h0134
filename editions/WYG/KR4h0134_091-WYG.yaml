body:
  text: 漢魏六朝百三家集巻九十一梁任昉集題詞王僧孺之傳任敬子也曰少孺速而未工長卿工而未速孟堅辭不逮理平子意不及文孔璋傷於健仲宣病於弱集論尚書窮文質之敏駐馬停信極亹亹之功莫尚斯焉異哉貶前修而昻任君其東海之溢美乎江南文勝古學日微方軌詞苑代有名人大抵采死翟之毛抉焚象之齒生意盡矣居今之世為今之言違時抗往則聲華不立投時取妍則爾雅中絶求其儷體行文無傷逸氣者江文通任彦升庶㡬近之然後知僧孺所稱非盡謬也彦升在齊朝紆意梅蟲兒捷入中書既委誠梁武專典禪讓文誥諤諤之節豈彼任哉然服官清儉兒妾食麥卒於新安浣衣斂體有足多者齊臺初建褚彦囘王仲寶稱首翊運身没皆無餘財論人當日其大者死生去就爾廉名非所難也昭明文選載彦升令表序狀彈文生平筆長可悉推見輜軿擊轊坐客恒滿有以夫目録賦答陸倕知已賦静思堂秋竹賦賦體詔為武帝初封功臣詔求薦士詔為武帝追封丞相長沙王詔為武帝追封永陽王詔追封衡陽王桂陽王詔封臨川安興建安三王詔為齊帝禪位梁王詔璽書禪梁璽書冊禪梁册令為齊宣徳皇后答梁王令宣徳皇后再敦勸梁王令為宣徳皇后重敦勸梁王令教為齊竟陵王世子臨㑹稽郡教表為齊明帝讓宣城郡公表為范尚書讓吏部封侯表為褚諮議蓁讓代兄襲封表一為褚諮議蓁讓代兄襲封表二為褚諮議蓁讓代兄襲封表為王思逺讓侍中表為皇太子求一日一入朝表請祀郊廟備六代樂表為范始興求為太宰立碑表為梁公請刋改律令表為蕭揚州作薦士表為蕭侍中拜襲封表為吏部謝表彈文奏彈曹景宗奏彈劉整奏彈范縝奏彈蕭頴達啓上蕭太傅固辭奪禮啓求為劉瓛立館啓奉勅示七夕詩啓為王金紫謝齊武帝示太子律序啓為卞彬謝修卞忠貞墓啓牋到大司馬記室牋梁國府僚勸進牋府僚重請牋書為庾杲之與劉居士虯書答何𦙍書與江革書與沈約書弔樂永世書䇿文天監三年䇿秀才文三首序王文憲集序文章緣起序議齊明帝諡議哀䇿文王貴嬪哀策文碑丞相長沙宣武王碑桓宣城碑墓銘撫軍桂陽王墓銘劉先生夫人墓銘行狀齊竟陵文宣王行狀齊司空曲江公行狀弔文弔劉文範文詩為王嫡子侍皇太子釋奠宴贈王僧孺答劉居士九日侍宴樂遊苑奉和登景陽山泛長溪落日泛舟東溪濟浙江贈郭桐廬出谿口見候余既未至郭仍進村維舟乆之郭生方至答何徴君贈徐徴君答劉孝綽答到建安餉杖寄到溉别蕭諮議厲吏人講學苦熱同謝朏花雪出郡傳舍哭范僕射三首嚴陵瀨詠池邊桃聨句清暑殿聨句栢梁體漢魏六朝百三家集巻九十一目録欽定四庫全書漢魏六朝百三家集巻九十一明張溥輯梁任昉集賦答陸倕知巳賦原知已之時義故相知之信然乃貪亷之異貫奈勇怯之相懸貪在物而成累怯在我而可甄既自得於為御復甘心於執鞭矧相知其如此獨攬涕而潺湲雖有望於已知更非謂其知巳信偉人之世篤本侯服於陸鄉緬風流於道素襲衮衣與繡裳逮伊人而世載並三駿而龍光過龍津而一息望鳯條而載翔彼白玉之雖潔此幽蘭之信芳思在物之取譬非升斛而能量匹聳峙於東嶽比凝厲於秋霜不一飯以忘過每三錢以投渭匪䝉袂之敢嗟豈溝壑之能衣既藴藉其有餘又澹然而無味得意同乎巻懐違方似乎仗氣類平叔而靡雕似子雲之不朴冠衆善而貽操綜羣言而名學折髙戴於后臺異鄒顔乎董幄探三詩於河間訪九師於淮曲術兼口傳之書藝廣鏗鏘之樂時坐睡而懸梁裁據梧而錐幄既文過而意深又理勝而辭縟咨余生之荏苒追嵗暮而傷情測徂隂於堂下聽鳴鐘於洛城惟忘年之陸子定一遇於班荆余獲田蘇之價爾得海上之名信落魄而無産終長勤於短生饑虚表於徐步逃責顯於疾行子比我於叔則又方余於耀卿心照情交流言靡惑萬類闇求千里懸渴言象可廢筌蹄自黙居非連棟行則同車冬夜不長夏日靡餘肴核非餌絲竹豈娯我未捨駕子已廻輿中飲相顧悵然動色邦壤雖殊離㑹難測存異山陽之居没非要離之側以膠投漆中離婁豈能識静思堂秋竹賦静思堂連洞房臨曲沼夾脩篁竹宫豐麗於甘泉之右竹殿𢎞敞於神嘉之傍緑條發丹檻翠葉映雕梁入房掃文石傍簷拂象牀常生偶蘭桂結實值鴛凰逢性與之至道偶斯文之在兹歡柏梁之有賦恨相如之異時賦體俶征侣兮艤行舟奉君命兮不俟駕屬軒軌之易循值堯民之可化慙孺雉之聲朝惡細魚之在夜奉玉檢之陸離待金罍之云舍詔為武帝初封功臣詔草昧權輿事深締搆康俗成務義在庇民自非羣才並軌文武宣翼将何以啟兹景祚𢎞此帝圖或運籌帷帳經啟王業或攻城略埜殉義忘生或腹心爪牙折衝禦侮忠勤茂徳夷險一致並宜建國開宇蕃屏王室山河之誓永永無窮求薦士詔夫進賢茂賞蔽善明罰前王盛則咸必由之朕纂綂鴻業寅畏大寳思求俊異協賛雍熈歴聽九功物色輿皂而白駒盈谷萇楚未刈是以臨朝永歎日昃伊佇便可博詢卿士各舉所知将量才授能擢以不次庶同則哲之明稱朕急賢之㫖為武帝追封丞相長沙王詔夫褒崇名器率由舊章光昭徳祀永世作則亡兄道被如仁功深㣲管懸諸日月乆而彌新故能拯龜玉於已毁導涸源於将塞今理運維新賢戚並建感惟永逺觸目崩心可追封長沙郡王為武帝追封永陽王詔亡兄徳履冲粹識業深通徽聲善譽風流藉甚道長世短清塵緬邈感惟既徃永慕慟心可追封永陽郡王追封汝陽王桂陽王詔亡弟暢風標秀物器體淹𢎞朱方之役盡勤王事䇿出無方物惟不賞亡弟融業行清簡風度閒綽蚤優名軰夙廣令聞朕應天紹命君臨萬㝢祚啟郇滕感興魯衛事徃運來永懐傷切暢可追封衡陽郡王融可桂陽郡王封臨川安興建安三王詔神州帝城冠冕列岳渚宫樊鄧形勝是歸居中作衛翼宣戎重隆兹寵號實允舊章並非親勿居惟賢斯授宏朕之介弟早富徳譽董一蕃政緝是嘉庸國禮家情瞻寄隆重季風頴儁邁誠業標簡任居蕃翰政以化成偉體韻淹穆神㝢凝正經綸夷險参賛王業為齊帝禪位梁王詔夫五徳更始三正迭興馭物資賢登庸啟聖故帝跡所以代昌王度所以改耀革晦以明由來尚矣齊徳淪㣲危亡薦襲隆昌凶虐實違天地永元昬暴取紊人神三光再沈七廟如綴鼎業幾移含識知冺我髙明之祚眇焉将墜永惟屯難氷谷載懐相國梁王天誕睿哲神縱靈武徳格𤣥祗功均造物止宗社之横流反生民之塗炭扶傾頹構之下拯溺逝川之中九區重緝四維更紐絶禮還紀崩樂復張文館盈紳戎亭息警浹海㝢以馳風罄輪裳而禀朔八表呈祥五靈效祉豈止鱗羽禎竒雲星瑞色而巳哉勲茂於百王道昭乎萬代固以明配上天光華日月者也河嶽表革命之符圖䜟紀代終之運樂推之心幽顯共積謳頌之誠華裔同著昔水政既微木徳升緒天之厯數實有所歸握鏡琁樞允集明哲朕雖庸蔽闇於大道永鑒崇替為日巳乆敢忘列代之髙義神祗之至願乎今便敬禪於梁即安姑孰依唐虞晉宋故事璽書禪梁璽書夫生者天地之大徳人者含生之通稱並首同本未知所以異也而禀靈造化賢愚之情不一託性五常强柔之分或舛羣后靡一争犯交興是故建君立長用相司牧非謂尊驕在上以天下為私者也兼以三正迭改五運相遷緑文赤字徴河表洛在昔勛華深逹兹義眷求明哲授以蒸人遷虞事夏本因心於百姓殷化為周實受命於蒼昊爰自漢魏罔不率由降及晉宋亦遵斯典我髙皇所以格文祖而撫歸運畏上天而恭寳歴者也至於季世禍亂薦臻王度紛糾姦囘熾積億兆夷人刀爼為命已然之逼若綫之危跼天蹐地逃形無所羣凶挾煽志逞殘戮将欲先殄衣冠次移龜鼎衡保周召並列宵人巢幕累卵方此非切自非英聖逺圖仁為巳任則鴟梟厲吻翦焉巳及惟王崇髙則天博厚儀地鎔鑄六合陶甄萬有烽驛交馳振靈武以遐畧雲雷方扇鞠義旅以勤王揚旍斾於逺路戮姦宄於魏闕徳冠徃初功無與二𢎞濟艱難緝熈王道懐柔萬姓經營四方舉直錯枉較如畫一待旦同乎殷后日昃過於周文風化肅穆禮樂交暢加以赦過宥罪神武不殺盛徳昭於景緯至義感於鬼神若夫納彼大麓膺此歸運烈風不迷樂推攸在治五韙於已亂重九鼎於既輕自聲教所及車書所至革面回首謳吟徳澤九山滅祲四瀆安流祥風扇起淫雨静息𤣥甲遊於芳荃素文馴於郊苑躍九川於清漢鳴六象於髙岡靈瑞雜沓𤣥符昭著至於星孛紫宫水效孟月飛鴻滿埜長彗横天取新之應既昭革故之徴必顯加以天表秀特軒状堯姿君臨之符諒非一揆書云天監厥徳用集大命詩云文王在上於昭于天所以二儀乃眷幽明允叶豈惟宅是萬邦緝兹謳訟而已哉朕是用擁琁沈首屬懐聖哲昔水行告厭我太祖既受命代終在日天禄云謝亦以木徳而傳於梁逺尋前典降惟近代百辟遐邇莫違朕心今遣使持節兼太保侍中中書監兼尚書令汝南縣開國侯亮兼太尉散騎常侍中書令新呉縣開國侯志奉皇帝璽紱受終之禮一依唐虞故事王其陟兹元后君臨萬方式傳𢎞烈以答上天之休命册禪梁冊咨爾梁王惟昔邃古之載肇有生人皇雄大庭之辟赫胥尊盧之后斯並龍圖鳥跡以前慌忽杳㝠之世固無得而詳焉洎乎農軒炎皥之代放勲重華之主莫不以大道君萬姓公器御八紘居之如執朽索去之若捐重負一駕汾陽便有窅然之志蹔適箕嶺即動讓王之心故知戴黄屋服玉璽非所以示貴稱尊乗大輅建斾旌葢欲令歸趣有地是故忘已而字兆人狥物而君四海及於精華内竭畚橇外勞則撫兹歸運惟能是與况兼乎笙管革文威圖啟瑞攝提夜朗榮光晝發者哉四百告終有漢所以髙揖黄徳既謝魏氏所以樂推爰及晉宋亦𢎞斯典我太祖握河受歴應符起運二葉重光三聖係軌嗣君䘮徳昬棄紀度毁紊天綱凋絶地紐茫茫九域翦為仇讐溥天相顧命懸晷刻斮涉刳孕於事已輕求雞徴杖曾何足譬是以谷滿川枯山飛鬼哭七廟已危人神無主惟王體兹上哲明聖在躬禀靈五緯明並日月彛倫攸序則端冕而協邕熈時難孔棘則摧鋒而拯塗炭功踰造物徳濟蒼生澤無不漸仁無不被上逹蒼昊下及川泉文教與鵬翼齊舉武功與日車並運固以幽顯宅心謳訟斯屬豈徒桴鼓播地卿雲叢天而已哉至如晝覩争明夜飛枉矢土淪彗刺日既星亡除舊之徴必顯更姓之符允集是以義師初踐芳露凝甘仁風既被素文自擾北闕藁街之使風車火徼之民膜拜稽首願為臣妾鍾石畢變事表於遷虞蛟魚並出義彰於事夏若夫長人御衆為之司牧本同已於萬物乃因心於百姓寳命無常主帝王非一族今仰祗乾象俯藉人願敬禪神噐授帝位於爾躬大祚告窮天禄永終於戲王允執其中式遵前典以副昊天之望禋上帝而臨億兆格文祖而膺大業以傳無疆之祚豈不盛歟令為齊宣徳皇后答梁王令承固兹謙挹未膺大典敬復雅㫖良有憮然夫至寂難原言象所絶教思有律感通斯在所以異人者神明同人者用舍王誕兹上睿對越天行徳冠二儀化周羣動生民以來一人而巳但逹節𢎞道每濡跡於中庸神照惟幾不抑心於鑽仰范宣既讓其下取則况聖圖睿範歌思是歸亷約雖𢎞慶賞遂替誠賢者悦義長難進之風不肖者矜功阻竭力之效勸阻之間所差巳逺王何得不暫紆雅尚允答天人使朕夜艾以安早朝有豫今遣率兹百辟申薦誠欵萬致一塗煩言可畧宣徳太后再敦勸梁王令宣徳皇后敬問具位夫功在不賞故庸勲之典葢闕施侔造物則謝徳之途已寡要不得不強為之名使荃宰有寄公實天生徳齊聖廣淵不改参辰而九星仰止不易日月而二儀貞觀在昔晦明隠鱗戢翼博通羣籍而讓齒乎一巻之師劍氣凌雲而屈迹於萬夫之下辯折天口而似不能言文擅雕龍而成輙削槀爰在弱冠首應弓旌客游梁朝則聲華籍甚薦名宰府則延譽自髙隆昌季年勤王始著建武維新締構斯在功隆賞薄嘉庸莫疇一馬之田介山之志愈厲六百之秩大樹之號斯存及擁旄司部代馬不敢南牧推轂樊鄧胡塵罕嘗夕起惟彼狡童窮凶極虐衣冠泯絶禮樂崩䘮既而鞠旅誓衆言謀王室白羽一麾黄鳥底定甲既鱗下車亦瓦裂致天之屆拱揖羣后豐功厚利無得而稱是以祥光總至休氣四塞五老游河飛星入昴元功茂勲若斯之盛而地狹乎四履勢卑乎九伯帝有恧焉輶軒萃止今遣某位某甲等率兹百辟人致其誠庶匪席之㫖不逺而復為宣徳太后重敦勸梁王令朕聞匹夫好仁義在磨踵君子行道逹斯兼濟未有盡器窮神藴徽章乎天植髙奠中樽覩傾罍而弗拯惟王徳冠徃初功無與二四時等契兩曜齊明擬度天行取則乾健而運距艱季道極百王援義而起一戎大定羅山革草㒺不率從用使商庭産􅀢周闕樹梓傾宫既散鹿臺靡蓄盛徳大業巍巍若此日者事岐之號爰發帝言殊物備禮率由寡昧雖復雲䍐載路清蹕啟行昭徳報功未臻其極而髙揖天休逺存克讓俾予未忘興慙日昃今遣率兹百辟人致誠情庶有感睿心霈然降志教為齊竟陵王世子臨㑹稽郡教富人兼并前史共蠧大姓侵威徃哲攸嫉而權豪之族擅割林池勢富之家專利山海至乃水稱峻巖嚴我君后崇墉增仞内通神明出符大順火炎崑崗神嶽崩潰蘭艾同燼玉石俱碎哲人遭命哀有餘慨表為齊明帝讓宣城郡公表明帝作相令昉革讓封表沿故事也昉濡寫懇廹情事太露故帝愠之臣鸞言被臺司召以臣為侍中中書監驃騎大将軍開府儀同三司揚州刺史録尚書事封宣城郡開國公食邑三千户加兵五千人臣本庸才智力淺短太祖髙皇帝篤猶子之愛降家人之慈世祖武皇帝情等布衣寄深同氣武皇大漸實奉話言雖自見之明庸近所蔽愚夫一至偶識量已實不忍自固於綴衣之末拒違於玉几之側遂荷顧託導揚末命雖嗣君棄常獲罪宣徳王室不造職臣之由何者親則東牟任惟博陸徒懐子孟社稷之對何救昌邑争臣之譏四海之議於何逃責陵土未乾訓誓在耳家國之事一至於斯非臣之尤誰任其咎将何以肅拜髙寝䖍奉武園悼心失圖泣血待旦寧容復徼榮於家耻宴安於國危驃騎上将之元勲神州儀刑之列岳尚書古稱司㑹中書實管王言且虚飾寵章委成禦侮臣知不愜物誰謂宜但命輕鴻毛責重山嶽存没同歸毁譽一貫辭一官不減身累增一職已黷朝經便當自同體國不為飾讓至於功均一匡賞同千室光宅近甸奄有全邦殞越為期不敢聞命亦願曲留降鑒即垂聽許鉅平之懇誠必固永昌之丹慊獲申乃知君臣之道綽有餘裕茍曰易照敢守難奪故可庶心𢎞議酌巳親物者矣不勝荷懼屏營之誠謹附某官某甲奉表以聞為范尚書讓吏部封侯表臣雲言被尚書召以臣為散騎常侍吏部尚書封霄城縣開國侯食邑千户奉命震驚心顔無措臣雲頓首頓首死罪死罪臣素門凡流輪翮無取進謝中庸退慙狂狷固嘗鑽厲求學而一經不治篆刻為文而三冬靡就負書燕魏空殫菽粟躡屩齊楚徒知貧賤既而分虎出守以囊被見嗤持斧作牧以薏苡興謗赭衣為虜見獄吏之尊除名為民知井臼之逸百年上壽既曰徒然如其誠説亦以過半亂離斯瘼欲以安歸閉門荒郊再離寒暑兼以東臯數畆控帶朝夕闗外一區悵望鍾阜雖室無趙女而門多好事禄微賜金而歡同娯老折芰燔枯此焉自足陛下應期萬世接綂千祀三千景附八百不謀臣釁等離心功慙同徳泥首在顔輿棺未毁締搆草昧敢叨天功獄訟謳歌示同民志而隆器大名一朝總集顧巳反躬何以臻此政當以接閈白水列宅舊豐忘捨講之尤存諸公之費俯拾青紫豈待明經臣雲頓首頓首死罪死罪夫銓衡之重闗諸隆替逺惟則哲在帝猶難漢魏以降逹識繼軌雅俗所歸唯稱許郭㧞十得五尚曰比肩其餘得失未聞偶察童幼天機暫發顧無足算在魏則毛玠公方居晉則山濤識量以臣况之一何遼落齊季陵遲官方淆亂鴻都不綱西園成市金章有盈笥之談華貂深不足之嘆草創惟始義存改作恭已南面責成斯在豈宜妄加寵私以乏王事附蟬之飾空成寵章求之公私授受交失近世侯者功緒参差或足食闗中或成軍河内或制勝帷幄或門人加親或與時抑揚或隠若敵國或䇿定禁中或功成埜戰或盛徳如卓茂或師道如桓榮或四姓侍祀已無足紀五侯外戚且非舊章而臣之所附唯在恩澤既義異疇庸實榮乖儒者雖小人貪幸豈獨無心臣本自諸生家承素業門無富貴易農而仕乃祖𤣥平道風秀世爰在中興儀刑多士位裁元凱任止牧伯髙祖少連夙秉髙尚所富者義所乏者時薄宦東朝謝病下邑先志不忘愚臣是庶且去嵗冬初國學之老博士耳今兹首夏将亞冢司雖千秋之一月九遷荀爽之十旬逺至方之微臣未為速逹臣雖無識唯利是視至於虧名損實為國為身知其不可不敢妄冒陛下不棄菅蒯愛同絲麻儻平生之言猶在聽覽宿心素志無復貳辭矜臣所乞特迴寵命則彛章載穆微物知免臣今在假不容詣省不任荷懼之至謹奉表以聞為褚諮議蓁讓代兄襲封表一臣昨被司徒符印稱詔㫖許臣兄賁所請以臣紹封南康郡公臣世屬啟聖運偶時來尚徳疇庸先錫土宇臣賁載世承家允居長徳而量巳夙退内事園蔬以臣行逹幽明早酷荼苦賁天倫㝠至友愛淳深非直引瘠推温故能逃迹讓位鞠育提養以及人次事死讓生尚均脱屣取信十室本若錙銖乃逺謬推恩近霑庸薄能以國讓𢎞義有歸匹夫難奪守以弗二昔武始廹家臣之䇿陵陽感鮑子之言張以誠請丁為理屈且大宗絶緒命臣出纘傍綂禀承在昔理絶終天永懐情事觸感崩裂伏惟陛下俯權孤門哀榮之重爰奪臣賁一至之輕察其丹欵特賜停絶至公允穆微臣克幸為褚諮議蓁讓代兄襲封表二近冒披欵庶䝉哀亮奉被還詔未垂矜允伏讀周遑㒺寘心誠臣本凡劣身名不限標一善不足以驗風流存小讓不足以𢎞進止若乃富埒千駟貴有邦家二者之來不期而止中人猶其趦趄凡近固宜勉朂直以門緒有歸長徳無二若使賁髙延陵之風臣忘子臧之節是廢徳舉豈曰能賢陛下留心孤門特深追逺故臣窮必呼天憑威咫尺賁嬰疾沉固公私廢禮逢不世之恩遂良已之志確然難奪有理存焉臣既承先㫖出纘傍綂受命有資反身何奉叙心感悼義迫窮誠賁息霽年将志學禮及趨拜且私門世適二三攸序若天眷無已必降殊私乞臣霽奉膺珪社伏願陛下聖慈曲垂矜慎如䝉哀允施重含育為褚諮議蓁讓代兄襲封表臣蓁言昨被司徒符仰稱詔㫖許臣兄賁所請以臣襲封南康郡公臣門籍勲䕃光錫土宇臣賁世載承家允膺長徳而深鑒止足脱屣千乗遂乃逺謬推恩近萃庸薄能以國讓𢎞義有歸匹夫難奪守以勿貳昔武始迫家臣之䇿陵陽感鮑生之言張以誠請丁為理屈且先臣以大宗絶緒命臣出纂傍綂禀承在昔理絶終天永惟情事觸目崩隕若使賁髙延陵之風臣忘子臧之節是廢徳舉豈曰能賢陛下察其丹欵特賜停絶不然投身草澤茍遂愚誠耳不任丹慊之至謹詣闕拜表以聞臣誠惶誠恐此篇出文選與藝文所載二表中有異同恐是後人裒合為一今並載之為王思逺讓侍中表行則六尺之内陪接天光語則親璽申命誠信區宇獻可替否出納惟幾敷奏於聲華之上進讓於玉堂之下金遷七貴之茂王粲二公之孫雖復仲尉孤緒元卿末裔未有不階民譽妄承典私者也為皇太子求一日一入朝表臣聞内豎告安姬昌怡色鳴雞戒旦周發冠履或以涼燠之候晨昏異宜膳羞之和鼎飪殊節一辰三朝稱情猶簡終日承顔在理斯愜且長壽之對撫循無巳馳道未窮顧懐不輟豈直下動天性固亦上結慈衷自頃半旬乃朝遂為通制事諭信次義乖晨省一日萬機不敢三塵御省每旦改宿特乞一至寝門請祀郊廟備六代樂表據魏王肅議周禮賔客皆作備樂况天地宗廟事之大者周官以下六律六吕五聲八音六舞大合樂致鬼神以和邦國請依王肅祀祭郊廟備六代樂為范始興求為太宰立碑表臣雲言原夫存樹風猷沒著徽烈既絶故老之口必資不刋之書而藏諸名山則陵谷遷貿府之延閣則青編落簡然則配天之迹存乎泗水之上素王之道紀於沂川之側由是崇師之義擬迹於西河尊主之情致之於堯禹故精廬妄啟必窮鐫勒之盛君長一城亦盡刋刻之美况乎甄陶周召孕育伊顔故太宰竟陵文宣王臣某與存與亡則義形社稷嚴天配帝則周公其人體國端朝出藩入守進思必告之道退無茍利之專五教以倫百揆時序若夫一言一行盛徳之風琴書藝業述作之茂道非兼濟事止樂善亦無得而稱焉人之云亡忽移嵗序鴟鴞東徙松檟成行六府臣僚三藩士女人蓄油素家懐鉛筆瞻彼景山徒然望慕昔晉氏初禁立碑魏舒之亡亦從班列而阮畧既冺故首冒嚴科為之者竟免刑戮置之者反䝉嘉歎至於道被如仁功参微管本宜在常均之外故太宰淵丞相嶷親賢並軌即為成規乞依二公前例賜許刋立寧容使長想九原樵蘇㒺識其禁駐蹕長陵輶軒不知所適臣里閭孤賤才無可甄值齊網之𢎞弛賔客之禁䇿名委質忽焉二紀慮先犬馬厚恩不答而弊帷毁葢未蓐螻蟻珠襦玉匣遽飾幽泉陛下𢎞奬名教不隔微物使臣得駿奔南浦長號北陵既曲逢前施實仰覬後澤儻驗杜預山頂之言庶存馬駿必拜之感臨表悲愳言不自宣為梁公請刋改律令表臣聞淳源既逺天討是因畫衣象服以致刑厝草纓艾韠民不能犯及淳徳下衰運距澆季湯刑禹政不足禁姦九法三章無以息訟所以赭衣塞路圄犴成市凝脂已疎秋荼未苦姦吏為市生殺並用可為慟哭豈徒一緒夫肖貎天地稟靈川岳受體愛敬髪膚為重流矢影風顧有憂色而當妄加刳斮金衣為伍且夫刻木不對畫地不入畏避若是而動貽非命王道為虧良在於此法開二門為政之蠧生殺多緒誰其適從為蕭揚州作薦士表臣王言臣聞求賢暫勞垂拱永逸方之疏壤取類導川伏惟陛下道隠旒纊信􅂶符璽六飛同塵五讓髙世白駒空谷振鷺在庭猶愳隠鱗卜祝藏器屠保物色闗下委裘河上非取製於一狐諒求味於兼采而五聲倦響九工是詢寝議廟堂借聽輿皂臣位任隆重義兼家邦實欲使名實不違徼倖路絶勢門上品猶當格以清譚英俊下僚不可限以位貎竊見秘書丞瑯琊王暕年二十一字思晦七葉重光海内冠冕神清氣茂允廸中和叔寳理遣之譚彦輔名教之樂故以暉映先逹領袖後進居無塵雜家有賜書辭賦清新屬言𤣥逺室邇人曠物疎道親養素丘園台階虚位庠序公朝萬夫傾望豈徒荀令可想李公不亡而巳哉前晉安郡候官令東海王僧孺年三十五理尚棲約思致恬敏既筆耕為養亦傭書成學至乃集螢映雪編蒲緝栁先言徃行人物雅俗甘泉遺儀南宫故事畫地成圖抵掌可述豈直鼮䑕有必對之辯竹書無落簡之謬暕坐鎮雅俗𢎞益已多僧孺訪對不休質疑斯在並東序之秘寳瑚璉之茂器誠言以人廢而才實世資臨表悚戰猶愳未允不任下情為蕭侍中拜襲封表詔書拜臣襲封竟陵郡王臣以凡庸素乏才植皇朝尚徳詔爵惟賢遂復出脩職貢入頒卿士但有道之守海外重扄藩籬近甸無勞擊柝仰閲舊章俯增私感報國承家豈云萬一為吏部謝表郎官之重千金非譬爰在前世實光選造清通為首終遂弗居深識為度累薦無獲承乏攝官顧知其望方今皇明御宇昇長咸亨涇渭縉紳無謬衡石抑揚庶品亦候能官顧巳循涯孰用祗荷惟知死所未識所報彈文奏彈曹景宗御史中丞臣任昉稽首言臣聞將軍死綏咫步無却顧望避敵逗撓有刑至乃趙母深識乞不為坐魏王著令抵罪巳輕是知敗軍之將身死家戮爰自古昔明罰斯在臣昉頓首頓首死罪死罪竊尋獯獫侵軼蹔擾疆陲王師薄伐所向風靡是以淮徐獻㨗河兖凱歸東闗無一戰之勞塗中罕千金之費而司部懸隔斜臨㓂境故使狡虜憑陵淹移嵗月故司州刺史蔡道恭率勵義勇奮不顧命全城守死自冬徂秋猶轉戰無窮亟摧醜虜方之居延則陵降而恭守比之疎勒則耿存而蔡亡若使郢部救兵微接聲援則單于之首乆懸北闕豈直受降可築涉安啟土而巳哉實由郢州刺史臣景宗受命致討不時言邁故使蝟結蟻聚水草有依方復按甲盤桓緩救資敵遂令孤城獨守力屈凶威雖然猶應固守三闗更謀進取而退師延頸自貽虧衂疆場侵駭職是之由不有嚴刑誅賞安寘景宗即主臣謹案使持節都督郢司二州諸軍事左将軍郢州刺史湘西縣開國侯臣景宗擢自行間遘兹多幸指縱非擬獲獸何勤賞茂通侯榮髙列将負擔裁弛鐘鼎遽列和戎莫效二八巳陳自頂至踵功歸造化潤草塗源豈獲自已且道恭云逝城守累旬景宗之存一朝棄甲生曹死蔡優劣若是惟此人斯有靦面目昔漢光命将坐知千里魏武置法案以從事故能出必以律錙銖無爽伏惟聖武英挺畧不世出料敵制變萬里無差奉而行之實𢎞廟算惟此庸固理絶言提自逆冦縱逸乆患諸夏聖朝乃顧將一車書愍彼司氓致辱非所早朝永歎載懐矜惻致兹虧䘮何所逃罪宜正刑書肅明典憲臣謹以劾請以見事免景宗所居官下太常削爵土收付廷尉法獄治罪其軍佐職僚偏裨将帥絓諸應及咎者别攝治書侍御史隨違續奏臣謹奉白簡以聞臣昉誠惶誠恐頓首頓首死罪死罪奏彈劉整御史中丞臣任昉稽首言臣聞馬援奉嫂不冠不入氾毓字孤家無常子義士節夫聞之有立千載美談斯為稱首臣昉頓首頓首死罪死罪謹案齊故西陽内史劉寅妻范詣臺訴列稱出適劉氏二十許年劉氏䘮亡撫養孤弱叔郎整恒欲傷害侵奪分前奴教子當百並已入衆又以錢婢姊妹弟温仍留奴自使又奪寅息逡婢緑草私貨得錢並不分逡寅第二庶息師利去嵗十月徃整田上經十二日整便責范米六斗哺食米未展送忽至户前隔箔攘拳大罵突進房中屏風上取車帷准米去二月九日夜婢采音偷車欄夾杖龍牽范問失物之意整便打息逡整及母并奴婢等六人來共至范屋中髙聲大罵婢采音舉手查范臂求攝檢如訴状輙攝整父舊使奴海蛤到臺辯問列稱整亡父興道先為零陵郡得奴婢四人分財以奴教子乞大息寅寅亡後第二弟整仍奪教子云應入衆整便留自使婢姊及弟各准錢五千文不分逡其奴當百先是衆奴整兄弟未分財之前整兄寅以當百貼錢七千共衆作田寅罷西陽郡還雖未别火食寅以私錢七千贖當百仍使上廣州去後寅䘮亡整兄弟後分奴婢惟餘婢緑草入衆整復云寅未分財贖當百又應屬衆整意貪得當百推緑草與逡整規當百行還擬欲自取當百遂經七年不返整擬已死亡不迥更奪取婢緑草貨得錢七千整兄弟及姊共分此錢又不分逡寅妻范云當百是亡夫私贖應屬息逡當百天監二年六月從廣州還至整復奪取云應􅂶衆准雇借上廣州四年夫直今在整處使進責整婢采音劉整兄寅第二息師利去年十月十二日忽徃整墅停住十二日整就兄妻范求米六斗哺食范未得還整怒仍自進范所住屏風上取車帷為質范送米六斗整則納受范今年二月九日夜云失車欄子夾杖龍牽等范及息逡道是采音所偷整聞聲仍打逡范喚問何意打我兒整母子爾時便同出中庭隔箔與范相罵婢采音及奴教子楚玉法志等四人於時在整母子左右整語采音其道汝偷車校具汝何不進裏罵之既進争口舉手誤查范臂車欄夾杖龍牽實非采音所偷進責寅妻范奴茍奴列稱娘去二月九日夜失車欄夾杖龍牽疑是整婢采音所偷茍奴與郎逡徃津陽門糴米遇見采音在津陽門賣車欄龍牽茍奴登時欲捉取逡語茍奴已爾不湏復取茍奴隠避少時伺視人買龍牽售五千錢茍奴仍隨逡歸宅不見度錢並如采音茍奴等列状粗與范訴相應重覈當百教子列稱被奪今在整處使悉與海蛤列不異以事訴法令史潘僧尚議整若輙畧兄子逡分前婢貨賣及奴教子等私使若無官令輙收付近獄測治諸所連逮繼應洗之原委之獄官悉以法制從事如法所稱整即主臣謹案新除中軍参軍臣劉整閭閻闒茸名教所絶直以前代外戚仕因紈袴惡積釁稔親舊側目理絶通問而妄肆醜辭終夕不寐而謬加大杖薛包分財取其老弱髙鳯自穢争訟寡嫂未見孟嘗之深心唯傚文通之偽迹昔人睦親衣無常主整之撫姪食有故人何其不能折契鍾庾而襜帷交質人之無情一何至此實教義所不容紳冕所共棄臣等參議請以見事免整所除官輙勒外付廷尉法獄治罪諸所連逮應洗之源委之獄官悉以法制從事婢采音不欵偷車欄龍牽請付獄測實宗長及地界職司初無糾舉及諸連逮請不足申盡臣昉誠惶誠恐頓首頓首死罪死罪稽首以聞奏彈范縝臣聞息夫歴詆漢有正刑白褒一奏晉以明罰况乎附下訕上毁譽自口者哉風聞尚書左丞臣范縝自晉安還語人云我不詣餘人惟詣王亮不餉餘人惟餉王亮輙收縝白從左右萬休到臺辯問與風聞符同又今月十日御餞梁州刺史臣珍國宴私既洽羣臣並已謁退時詔留侍中臣昻等十人訪以政道縝不答所問而横議沸騰遂貶裁司徒臣朏褒舉庶人王亮臣於時預奉恩留肩隨並立耳目所接差非風聞竊尋王有遊豫親御軒陛義深推轂情均湛露酒䦨宴罷當扆正立記事在前記言在後軫早朝之念深求瘼之情而縝言不遜妄陳褒貶傷濟濟之風缺側席之望不有嚴裁憲准将頺縝即主臣謹案尚書左丞臣范縝衣冠緒餘言行舛駮誇諧里落喧詬周行曲學謏聞未知去代弄口鳴舌祗足飾非乃者義師近次縝丁罹艱棘曾不呼門墨讓景附頗同先覺實奉龍顔而今黨協釁餘飜為矛楯人而無恒成兹姦詖日者飲至策勲功微賞厚出守名邦入司管轄苞篚㒺遺而假稱折轅衣裙所弊䜛激失所許與疵廢廷辱民宗自居樞憲糾奏寂寞顧望縱容無至公之議惡直醜正有私訐之談宜寘之徽纆肅正國典臣等參議請以見事免縝所居官輙勒外收付廷尉法獄治辠應諸連逮委之獄官以法制從事縝位應黄紙臣輙奉白簡以聞奏彈蕭穎逹臣聞貧觀所取窮視不為在於布衣窮居介然之行尚可以激貪厲俗淳此薄夫况乎伐氷之家争雞豚之利衣繡之士受賈人之服風聞征虜將軍臣蕭穎逹啟乞魚軍税輙攝穎逹宅督彭難當到臺辯問列稱尋生魚典税先本是鄧僧琰啟乞限訖今年五月十四日主人穎逹於時謂非新立仍啟乞接代僧琰即䝉降許登税與史法論一年收直五十萬知其列狀則與風聞符同穎逹即主臣謹按征虜将軍太子左衛率作唐縣開國侯臣穎逹備位大臣預聞執憲私謁亟陳至公寂寞屠門之志異乎鮑肆之求魚餐之資不俟潛有之數遂復申兹文二追彼十一風體若兹凖繩斯在陛下𢎞惜勲良每為曲法臣當官執憲敢不直繩臣等參議請以見事免穎逹所居官以侯還第啟上蕭太傅固辭奪禮啟昉啟近啟歸訴庶諒窮欵奉被還㫖未垂哀察悼心失圖泣血待旦君於品庶示均鎔造干禄祈榮更為自㧞虧教廢禮豈闗視聽所不忍言具陳兹啟昉往從末宦禄不代耕饑寒無甘㫖之資限役廢晨昏之半膝下之歡已同過隙几筵之慕幾何可憑且奠酹不親如在安寄晨暮寂寥閴若無主所守既無别理窮咽豈及多喻明公功格區宇感通有塗若霈然降臨賜寝嚴命是知孝治所被爰至無心錫類所及匪徒教義不任崩迫之情謹以啟事陳聞謹啟求為劉瓛立館啟昔在魏中爰及晉始書貴虚𤣥人悦陶縱瑚璉廢泗上之容樽俎恣林下之適春干秋羽委曠而弗陳西序東膠寂寥而誰仰所以金雞忘曉玉羊失馭神器毁於獯戎寳厯遷於干越豈不悲歟劉瓛澡身浴徳脩行明經賤珪璧於光隂竟松筠於嵗晩貧不隕穫其心窮不二三其操而困無居止浮寓親游垣棟傾替窐衢墊側有朋自逺無用栖憑皆負笈擔簦櫛風沐露瓛之器學無謝前脩輙欲與之周旋開館招屈臣第西偏官有閒地北拒晉山南望通邑雖曰人境實少浮喧廣輪裁盈數畆布以施立黌塾薄藝桑麻粗創茨宇奉勅示七夕詩啟臣昉啟奉勅并賜示七夕五韻竊惟帝迹多緒俯同不一託情風什希世罕工雖漢在四世魏稱三祖寧足以繼想南風克諧調露性與天道事絶稱言豈其多幸親逢旦暮臣早奉龍潛與賈馬而入室晩屬天飛比嚴徐而待詔惟君知臣見於納言之㫖取求不疵表於辯才之戲謹輙牽率庸陋式酬天奨拙速雖效蚩鄙已彰臨啟慚恧㒺識所寘謹啟為王金紫謝齊武帝示太子律序啟臣聞化澄上業草纓垂典教清中世艾服懲刑自禮失宗周俗反炎漢張馮導其迹賈杜浚其流仲舒之得情孔子之博約故以義該徃哲盡美前王而年世浸逺篇牘訛誤朽編落簡見誣前淑侮文擅議取弊後昆立不倚衡遂均鴻毛之殞傷足居憂忘貽髪膚之痛豈所以臨河永歎含育最靈者也伏惟陛下施博天地澤深禹湯温舒之策優游虚授衛展之議寧失弗經削秋荼之法解凝脂之網為卞彬謝修卞忠貞墓啟臣彬啟伏見詔書并鄭義泰宣勅當賜修理臣亡髙祖晉故驃騎大将軍建興忠貞公壼墳塋臣門緒不昌天道所昧忠構身危孝積家禍名教同悲隠淪惆悵而年世貿遷孤裔淪塞遂使碑表蕪滅丘樹荒毁狐兎成穴童牧哀歌感慨自哀日月纒迫陛下𢎞宣教義非求效於方今壼餘烈不泯固陳力於異世但加等之渥近闕於晉典樵蘇之刑逺流於皇代臣亦何人敢謝斯幸不任悲荷之至謹奉啟以聞謹啟牋到大司馬記室牋記室參軍事任昉死罪死罪伏承以今月令辰肅膺典冊徳顯功髙光副四海含生之倫庇身有地况昉受教君子将二十年咳唾為恩眄睞成飾小人懐惠顧知死所昔承嘉宴屬有緒言提挈之㫖形乎善謔豈謂多幸斯言不渝雖情謬先覺而迹淪驕餌湯沐具而非弔大厦構而相賀明公道冠二儀勲超䆳古将使伊周奉轡桓文扶轂神功無紀作物何稱府朝初建俊賢翹首維此魚目唐突璠璵顧巳循涯實知塵忝千載一逢再造難答雖則隕越且知非報不勝荷戴屏營之至謹詣㕔奉白牋謝聞昉死罪死罪梁國府僚勸進牋伏承嘉命顯至佇策明公逡廵盛禮斯實謙尊之㫖未窮逺大之致何者嗣君棄常自絶宗社國命民生翦為仇讐折棟崩榱壓焉自及卿士懐脯斮之痛黔首懼比屋之誅明公亮格天之功拯水火之切再躔日月重綴參辰反龜玉於塗泥濟斯民於阬㟁使夫匹婦童叟羞言伊吕鄉校里塾恥談五霸而位卑乎阿衡地狹於曲阜慶賞之道尚其未洽夫大寳公器非要非距至公至平當仁推讓明公宜祇奉天人允膺大禮無使後予之歌同彼胥怨兼濟之仁飜為獨善府僚重請牋近以朝命藴策冒奏丹誠奉被還令未䝉虚受搢紳顒顒深所未逹葢聞受金於府通人之𢎞致髙蹈海隅匹夫之小節是以履乗石而周公不以為疑贈玉璜而太公不以為讓况世哲繼軌先徳在民經綸草昧歎深微管加以朱方之役荆河是依班師振旅大造王室雖復累繭救宋重胝存楚居今觀古曾何足云而惑甚盗鐘功疑不賞皇天后土不勝其酷是以玉馬駿奔表微子之去金版出地告龍逢之怨明公據鞍輟哭厲三軍之志獨居掩涕激義士之心故能使海若登祗罄圖效祉山戎孤竹束馬景從伐罪弔民匡時靖亂匪叨天功實勤濡足且明公本自諸生取樂名教道風素論坐鎮雅俗不習孫呉遘兹神武驅盡誅之民濟必封之俗龜玉不毁誰之功與獨為君子将使伊周何地某等不逹通變實有愚誠不任悾欵悉心重謁伏願特膺典策式副民望書為庾杲之與劉居士虯書自别荆南迄将二紀杲之牽滯形有推遷物役丈人沒志外身超然獨善雖心懸咫尺而事阻山河悠悠白雲依然有道金涼佇運想恒納宜沖明在襟履候無爽體道為用蹈理則和杲之牽綴疲朽愧心已多訪徳則山林窅然觀道則風雲自逺嵗暮之期指塗衡岳神虚氣惄無待怡和江湖相望安事行李司徒竟陵王懋於神者言象所絶接乎事者遐邇所宗鍾石非禮樂之本纓褐豈朝埜之謂想闇投之懐不以形骸為阻一日通籍梁邸親奉話言夢想清塵為嵗巳積以丈人非羔鴈所榮故息蒲帛之典勝寄㝠通諒有風期之遲君王卜居郊郭榮帶川阜顯不狥功晦不標迹從容乎人野之間以窮二者之致且𢎞䕶為心廣孚真俗思聞繫表共剖衆妙比日式筵山阿虚館川涘實望賁然少詶側遲昔東平樂善旌君大於東閣今王愛素致吾子於西山豈不盛歟百齡飄驟凝滯自物千載一期為仁由巳且零雪戒塗非滅迹之郊鴻鐘在御豈銷聲之道巳標異人之迹故有同物之勞夫山水無情應之以㑹愛閒在我觸目蕭條衡岳何親鍾嶺何薄想𢎞思有在不俟繁言答何𦙍書得書知便逺追疎董超然髙蹈雖朝㫖殷勤而輕棹已逺供餞莫申瞻言增慨善保嘉猷比致音息懐人望古􅏰悵乆之與江革書建安王為雍州刺史革為記室參軍與弟觀少長共居苦求同行乃以觀行參軍兼記室時沈約任昉並相賞重昉與革書此段雍府妙選英才文房之職總卿昆季可謂馭二龍於長途騁騏驥於千里與沈約書范僕射遂不救疾范侯淳孝睦友在家必聞直道正色立朝斯著一金之俸必徧親倫鍾庾之秩散之故舊佐命興王心力俱盡謀猷忠允諒誠匪躬破産而字死友之孤開門而延故人之殯則惟其常無得而稱矣器用車馬無改平生之素憑論欵對不易布素之交若斯人者豈云易遇昉将蒞此邦務在遄邁雖解駕流連再貽欵顧将乖之際不忍告别無益離悲祗增今恨永念平生忽焉疇曩追尋笑緒皆成悲端弔樂永世書永世孝友之至發自天真皎㓗之操曾非矯飾意有所固白刃不移理有所托淄澠自辨餘息雖存視隂無幾終始之托方寄祁侯豈謂樂生反先朝露以理遣滯鄙識未曉以事尋悲哀楚交至松檟可拱悲緒無窮策文天監三年策秀才文三首問秀才朕長驅樊鄧直指商郊因藉時來乗此厯運當扆永念猶懐慙徳何者百王之敝齊季斯盛衣冠禮樂掃地無餘斵雕刓方經綸草昧採三王之禮冠履粗分因六代之樂宫判始辨而百度草創倉廩未實若終畆不税則國用靡資百姓不足則惻隠深慮每時入芻槀嵗課田租愀然疚懐如憐赤子今欲使朕無滿堂之念民有家給之饒漸登九年之蓄稍去闗市之賦子大夫當此三道利用賔王斯理何從佇聞良説問朕本自諸生弱齡有志閉户自精開巻獨得九流七畧頗嘗觀覽六藝百家庶非牆面雖一日萬幾早朝宴罷聽覽之暇三餘靡失上之化下草偃風從惟此虚寡弗能動俗昔紫衣賤服猶化齊風長纓鄙好且變鄒俗雖徳慙徃賢業優前事且夫搢紳道行禄利然也朕傾心駿骨非愳真龍輜軿青紫如拾地芥而惰游廢業十室而九鳴鳥蔑聞子衿不作𢎞奨之路斯既然矣猶其寂寞應有良規問朕立諫鼔設謗木於兹三年矣比雖輻湊闕下多非政要日伏青蒲罕能切直将齊季多諱風流遂徃将謂朕空然慕古虚受弗𢎞然自君臨萬㝢介在民上何嘗以一言失㫖轉徙朔方睚眦有違論輸左校而使直臣杜口忠讜路絶将恐𢎞長之道别有未周悉意以陳極言無隠序王文憲集序公諱儉字仲寳琅琊臨沂人也其先自秦至宋國史家牒詳焉晉中興以來六世名徳為海内冠冕古語云仁人之利天道運行故吕䖍歸其佩刀郭璞筮以淮水若離翦之止殺吉駿之誠感葢有助焉公之生也誕受命世體三才之茂典踐得二之庶幾信乃昴宿垂芒徳精降祉有一於此蔚為帝師况乃淵角殊祥山庭異表望衢罕窺其術觀海莫際其瀾宏覽載籍博遊才義若乃金版玉匱之書海上名山之㫖沉鬰澹雅之思離堅合異之談莫不總制清衷遞為心極斯固通人之所包非虚明之絶境不可窮者其惟神用者乎然檢鏡所歸人倫以表雲屋天構匠者何工自函洛不守憲章中輟賀生逹禮之宗蔡公儒林之亞闕典未補大備兹日至若齒危髪秀之老含經味道之生莫不北面人宗相同資敬性託夷逺少屏塵雜自非可以𢎞奨風流增益標勝未嘗留心也期嵗而孤叔父司空簡穆公早所器異年始志學家門禮訓折衷於公孝友之性豈伊橋梓夷雅之體無待韋弦汝郁之幼挺淳至黄琬之早標聰察曾何足尚年六嵗襲封豫寧侯拜日家人以公尚幼弗之先告既襲珪組對揚王命因便感咽若不自勝初宋明帝居藩與公母武康公主素不協及即位有詔毁發舊塋投棄棺柩公以死固請誓不遵奉表啟酸切義感人神太宗聞而悲之遂無以奪也初拜秘書郎遷太子舍人以選尚公主拜駙馬都尉元徽初遷秘書丞於是采公曾之中經刋𢎞度之四部依劉歆七畧更撰七志葢嘗賦詩云稷契匡虞夏伊吕翼商周自是始有應務之迹生民屬心矣時司徒袁粲有髙世之度脱落塵俗見公弱齡便望風推服歎曰衣冠禮樂盡在是矣時粲位亞台司公年始弱冠年勢不侔公與之抗禮因贈粲詩要以嵗暮之期申以止足之戒粲答詩云老夫亦何寄之子照清襟服闋拜司徒右長史出為義興太守風化之美奏課為最還除給事黄門侍郎旬日遷尚書吏部郎參選昔毛玠之公清李重之識㑹兼之者公也俄遷侍中以愍侯始終之職固辭不拜補太尉右長史時聖武定業肇基王命寤寐風雲實資人傑是以宸居膺列宿之表圖緯著王佐之符俄遷左長史齊臺既建以公為尚書右僕射領吏部時年二十八宋末艱虞百王澆季禮紊舊宗樂傾恒軌自朝章國紀典彛備物奏議符策文辭表記素意所不蓄前古所未行皆取定俄頃神無滯用太祖受命以佐命之功封南昌縣開國公食邑二千户建元二年遷尚書左僕射領選如故自營郃分司盧欽兼掌譽望所歸允集兹日尋表解選詔加侍中又授太子詹事侍中僕射如故固辭侍中改授散騎常侍餘如故太祖崩遺詔以公為侍中尚書令鎮國将軍永明元年進號衛将軍二年以本官領丹陽尹六輔殊風五方異俗公不謀聲訓而楚夏移情故能使解劍拜仇歸田息訟前郡尹温太真劉真長或功銘鼎彛或徳標素尚臭味風雲千載無爽親加弔祭表薦孤遺逺協神期用彰世祀時簡穆公薨以撫養之恩特深恒慕表求解職有詔不許國學初興華夷慕義經師人表允資望實復以本官領國子祭酒三年解丹陽尹領太子少傅餘悉如故挂服捐駒前良取則卧轍棄子後予胥怨皇太子不矜天姿俯同人範師友之義穆若金蘭又領本州大中正頃之解職四年以本號開府儀同三司餘悉如故謙光愈逺大典未申六年又申前命七年固辭選任帝所重違詔加中書監猶參掌選事長輿追專車之恨公曾甘鳯池之失夫奔競之途有自來矣以難知之性協易失之情必使無訟事深𢎞誘公提衡惟允一紀於兹㧞竒取異興微繼絶望側階而容賢候景風而式典春秋三十有八七年五月三日薨於建康官舍皇朝軫慟儲鉉傷情有識銜悲行路掩泣豈直舂者不相工女寢機而巳哉故痛深衣冠悲纒教義豈非功深砥礪道邁舟航沒世遺愛古之益友追贈太尉侍中中書監如故給節加羽葆鼓吹增班劍六十人諡曰文憲禮也公在物斯厚居身以約玩好絶於耳目布素表於造次室無姬姜門多長者立言必雅未嘗顯其所長持論從容未嘗言人所短𢎞長風流許與氣類雖單門後進必加善誘朂以丹霄之價𢎞以青㝠之期公銓品人倫各盡其用居厚者不矜其多處薄者不怨其少窮涯而反盈量知歸皇朝以治定制禮功成作樂思我民譽緝熈帝圖雖張曹争論於漢朝荀摯競爽於晉世無以仰模淵㫖取則後昆每荒服請罪逺夷慕義宣威授㫖實寄𢎞畧理積則神無忤徃事感則悦情斯來無是已之心事隔於容謟罕愛憎之情理絶於毁譽造理常若可干臨事每不可奪約巳不以亷物𢎞量不以容非攻乎異端歸之正義公生自華宗世務簡隔至於軍國逺圖刑政大典既道在廊廟則理擅民宗若乃明練庶務鑒逹治體懸然天得不謀成心求之載籍翰牘所未紀訊之遺老耳目所不接至若文案自環主者百數皆深文為吏積習成奸畜筆削之刑懐輕重之意公乗理照物動必研幾當時嗟服若有神道豈非希世之儁民瑚璉之宏器昉行無異操才無異能得奉名節迄将一紀一言之譽東陵侔於西山一盼之榮鄭璞踰於周寳士感知巳懐此何極出入禮闈朝夕舊館瞻棟宇而興慕撫身名而悼恩公自幼及長述作不倦固以理窮言行事該軍國豈直雕章縟采而已哉若乃綂體必善綴賞無地雖楚趙羣才漢魏衆作曾何足云昉嘗以筆札見知思以薄技效徳是用綴緝遺文永貽世範為如干巻所撰古今集記今書七志為一家之言不列於集集録如左文章縁起序六經素有歌詩書誄箴銘之類尚書帝庸作歌毛詩三百篇左傳叔向貽子産書魯哀公孔子誄孔悝鼎銘虞人箴此等自秦漢以來聖君賢士㳂著為文章名之始故因暇録之凡八十四題抑以新好事者之目云爾議齊明帝諡議以為窮神之迹無繼於成名教思所宗言歸於有稱是以則天為大義盡於翼善武功受命理貫於斯文伏惟功髙五讓道冠三極愛敬始於揚名孝饗終乎嚴配寥廓大度誕君人之符閨庭小節應軌物之訓歴試允諧納揆時序貽厥之寄義均負圖榱棟惟新壓焉将及於是承制宣徳定策公卿登嗣后於西鍾反獨夫於侯服既而主幼時艱仍離屯蹇應當璧之祥注息肩之願立徳以長紹開中興擬度天行取則乾健日昃罷朝幽枉必逹官曹寂寞圄犴空虚虎門肆義大足協律巖廊有縉紳之談鄉塾無横議之士既富而教𢎞此孝治遂使家無蕩子埜有栖畆置天下於掌握覽八荒於户牖寵㣲金穴之家恩絶椒風之館天應民和祥符總暨故能上變雲物下漏深泉若乃清丘丹陵之國黄銀紫玉之瑞幽符逺萃詢徳報功方将馳道日觀清宫鳴澤為而不恃髙揖成功百川所以朝宗參辰於焉取正豈所謂中衢均奠懸衡共軌者歟哀策文王貴嬪哀策文游衣戒節轜車命服永去椒華長辭嘉福笥緘遺組筵委塵鞠将命啟期實惟嘉數珮空響其何節姆下當其誰傅殯宫既毁祖饋斯撤爰命史臣宣美來裔坤載既厚内徳云助軒五有𢎞姬十斯豫誕兹邦淑選自良家爰登六列象服委虵青絇丹繶辰衣素紗肅雍婦職僉曰俞佳贊景望舒方娠明兩心前軌慶軒中增朗與括不愆朏魄無爽式陪璽觀有事蠶宫降輿訪道基我王風宣禮撤豆緝樂房中居貴能降在盈思沖仁者必壽彼蒼者穹如何不淑萬化齊終薦車告途殯穸既辦黼翣璀以陸離帷幌紛其舒巻出桂宫而北行經未央以西轉池紼顧而徐前服馬嘶而不踐霜霏微而初被埜空籠而始雕促虞泉於薤露撫悲翁於短簫母以子貴義𢎞前哲申襄齊削以從疑革麻縓之輕殺逹副君之天至賦白華之無缺庶清廟之微微非壽原之未翳碑丞相長沙宣武王碑玉映藍田金鉉之望已集木秀鄧林輪轅之用先表值戎㓂貪惏覊縻失道慿陵雉堞逼迫濠湟都䕶之威既弛副尉之策巳謝斧松晨析易子朝餐乞師援絶飛書路阻公内定不戰之竒外騁必勝之畧神功倐忽有同拾遺南下牧馬既寝折膠之術北遯燕然将空漠南之地加以廣平簡惠信賞必罰增貲就賦夷歌成章桓宣城碑君器量髙濬神氣披朗商畧雅俗隱括真偽擢竒取異不軌常流固以凖的當時擬議郭許矣處身立朝不峻功名俯仰顯黙之際優游可否之間迹卑而道不汙身屈而志不屑矣銘曰於穆我后稟兹純爽虚豁髙暢蕭條邁上風任外舒卓鑒内朗神棲沖慎形同俯仰将登槐棘宏振綱網令儀早徂徳音永響墓銘撫軍桂陽王墓銘於昭帝緒擅美前王緑圖丹紀金簡玉筐世載台鼎地居魯衛沛易前傳楚詩将説桐圭誰戲甘棠何憩劉先生夫人墓銘既稱萊婦亦曰鴻妻復有令徳一與之齊實佐君子簮蒿杖藜欣欣負戴在冀之畦居室有行亟聞義讓稟訓丹陽𢎞風丞相藉甚二門風流逺尚肇允才淑閫徳斯諒蕪没鄭鄉寂寥揚冢參差孔樹毫末成拱暫起荒埏長扄幽隴夫貴妻尊匪爵而重行状齊竟陵文宣王行状公道亞生知照隣幾庶孝始人倫忠為令徳公實體之非毁譽所至天才博贍學綜該明至若曲臺之禮九師之易樂分龍趙詩析齊韓陳農所未究河間所未輯有一於此㒺不兼綜者歟昔沛獻訪對於雲臺東平齊聲於揚史淮南取貴於食時陳思見稱於七步方斯蔑如也初沈攸之䟦扈上流稱亂陜服宋鎮西晉熈王南中郎邵陵王並鎮盆口世祖毗贊兩藩而任總西伐公時從在軍鎮西府版寧朔将軍軍主南中郎版補行參軍署法曹於時景燭雲火風馳羽檄謀出股肱任切書記遷左軍邵陵王主簿記室參軍既允焚林之求實兼儀刑之寄刀筆不足宣功風體所以𢎞益除邵陵王友又為安南邵陵王長史東夏形勝闗河重複選衆而舉敦悦斯在除使持節都督㑹稽東陽臨海永嘉新安五郡諸軍事輔國将軍㑹稽太守太祖受命廣樹藩屏公以髙昭武穆惟戚惟賢封聞喜縣開國公食邑千户又以奏課連最進號冠軍將軍越人之巫覩正風而化俗篁竹之酋感義讓而失險邪叟忘其西昃龍丘狹其東臯㑹武穆皇后崩公星言奔波泣血千里水漿不入於口者至自禹穴逮衣裳外除心哀内疚禮屈於厭降事迫於權奪而茹慼肌膚沉痛創鉅故知鐘鼔非樂云之本縗麄非隆殺之要改授征虜將軍丹陽尹良家入徙戚里内屬政非一軌俗備五方公内樹寛明外施簡惠神臯載穆轂下以清武帝嗣位進封竟陵郡王食邑如千户復授使持節都督南徐兖二州諸軍事鎮北将軍南徐州刺史遷使持節侍中都督南兖徐北兖青冀五州諸軍事征北将軍南兖州刺史兖徐接壤素漸河潤未及下車仁聲先洽玉闗靖柝北門寝扄朝㫖以董司岳牧敷興邦教方任雖重比此為輕徴䕶軍将軍兼司徒侍中如故又授車騎将軍兼司徒侍中如故即授司徒侍中又如故上穆三能下敷五典闢𤣥闈以闡化寝鳴鐘以體國翼亮孝治緝熈中教奪金恥訟蹊田自嘿不雕其朴用晦其明聲化之有倫繄公是賴庠序肇興儀刑國胄師氏之選允歸人範以本官領國子祭酒固辭不拜八座初啟以公補尚書令式是敷奏百揆時序夫國家之道互為公私君親之義遞為隱犯公二極一致愛敬同歸亮誠盡規謀猷𢎞逺矣又授使持節都督揚州諸軍事揚州刺史本官悉如故舊惟淮海今則神牧編户殷阜氓俗滋繁不言之化若門到户説矣頃之解尚書令改授中書監餘悉如故獻納樞機絲綸允緝武皇晏駕寄深負圖公仰惟國典俛遵遺託俯擗天倫踊絶於地居處之節復如居武穆之憂聖主嗣興地居旦奭有詔策授太傅領司徒餘悉如故坐而論道動以觀徳地尊禮絶親賢莫二又詔加公入朝不趨讚拜不名劍履上殿蕭傅之賢曹馬之親兼之者公也復以申威重道增崇徳綂進督南徐州諸軍事餘悉如故並表疏累上身沒讓存天不憖遺梁岳頽峻某年某月日薨春秋三十有五詔給温明秘噐歛以衮章備九命之禮遣大鴻臚監䕶䘮事朝夕奠祭大官供給禮也故以慟極津門感􅂶長樂豈徒舂人不相傾㕓罷肆而巳哉乃下詔曰褒崇庸徳前王之令典追逺尊戚㳂情之所隆故使持節都督揚州諸軍事中書監太傅領司徒揚州刺史竟陵王新除進督南徐州體睿履正神監淵邈道冠民宗具瞻惟允肇自弱齡孝友光備爰及贊契協升景業爕和台曜五教克宣敷奏朝端百揆惟穆寄重先顧任均負圖諒以齊徽二南同規徃哲方憑保佑永翼雍熈天不憖遺奄見薨落哀慕抽割震動於厥心今先逺戒期龜謀襲吉茂崇嘉制式𢎞風猷可追崇假黄鉞侍中都督中外諸軍事太宰領大将軍揚州牧緑綟綬具九錫服命之禮使持節中書監王如故給九旒鑾輅黄屋左纛輼輬車前後部羽葆鼓吹挽歌二部虎賁班劍百人葬禮一依晉安平獻王孚故事公道識虚逺表裏融通淵然萬頃直上千仞僕妾不覩其喜愠近侍莫見其傾弛他人之善若巳有之民之不臧公實貽恥誘接恂恂降以顔色方於事上好下規巳而亷於殖財施人不倦帝子儲季令行禁止國網天憲寘諸掌握未嘗鞠人於輕刑錮人於重議人有不及内恕諸巳非意相干每為理屈任天下之重體生民之俊華衮與緼􅀈同歸山藻與蓬茨俱逸良田廣宅符仲長之言邙山洛水協應叟之志丘園東國錙銖軒冕乃依林搆宇傍巗拓架清猨與壺人争旦緹幙與素瀬交輝置之虚室人埜何辨髙人何㸃躡蹻於鍾阿徴士劉虯獻書於衡岳贈以古人之服𢎞以度外之禮屈以好士之風申其趨王之意乃知大春屈巳於五王君大降節於憲后致之有由也其卉木之竒泉石之美公所製山居四時序言之巳詳文皇帝養徳東朝同符作者爰造九言實該百行遵衿褵於未萌申炯戒於兹日非直旦暮千載故乃萬世一時也命公註解衛将軍王儉綴而序之山宇初搆超然獨徃顧而言曰死者可歸誰與入室尚想前良俾若神對乃命畫工圖之軒牖既而緬屬英賢傍思才淑匹婦之操亦有取焉有客游梁朝者從容而進曰未見好徳愚竊惑焉即命刋削投杖不暇公以為出言自口驥騄不追聽受一謬差以千里所造箴銘積成巻軸門階户席寓物垂訓先是震於外寢匠者以為不祥将加治葺公曰此天譴也無所改脩以記吾過且令戒愳不怠從諫如順流虚已若不足至於言窮藥石若味滋㫖信必由中貌無外悦貴而好禮怡寄典墳雖牽以物役孜孜無怠乃撰四部要畧浄住子並勒成一家懸諸日月𢎞洙泗之風闡迦維之化大漸彌留話言盈耳黜殯之請至誠懇惻豈古人所謂立言於世沒而不朽者歟易名之典請遵前烈謹状齊司空曲江公行状公稟靈景宿擅氣中和一匱初登東嶽之功可監埏埴在器瑚璉之姿先表豈惟荆南有聖童之目襄城著孔甫之稱而已哉故以羽儀宗家冠葢後進路叔之一日千里北海之稱美共治方斯蔑如也志學之年徧治經記登隆十載網羅百氏藻斵贍逸蔚為詞宗延賈誼而升堂携相如而入室加以翰牘精辯發言有章持論從容辭無矜尚自河洛丘墟歴載二百俾我逢掖遂淪左袵晉宋所以遺恨宗祖是用顧懐公自荷方任志在尅復将欲使功遂之日身退有所爰乃卜居金陵縈帶林壑用辭聊城之賞以為疏韓之館人謝運徃遂輟逺圖弔文弔劉文範文余與先生雖年世相接而荆呉數千未嘗膝行下風稟承餘論豈值發憤當年固亦恨深終古然叔夜之叙黔婁韓卓之慕巨伸未必接光塵承風彩正復希向逺理長想千載然其人自髙假使横經擁箒日夜掃門㑹不暏千仞之一咫萬頃之涓澮終於對面萬古莫能及門故以此弭千載之恨詩為王嫡子侍皇太子釋奠宴以下四言在昔歸運阻亂𢎞多夷山製宇盪海為家風雲改族日月增華欽聖兹逺懐道兹沖踐言動俗果行移風進徃一簣啟惑三䝉氷實因水金亦在鎔惟神知化在物立言樂正雅頌咸被後昆告奠明祀觀道聖門日月不息師表常尊贈王僧孺王僧孺由治書侍御史出為唐令初僧孺與昉文學友㑹及是将之縣昉贈詩惟子見知惟余知子觀行視言要終猶始敬之重之如蘭如芷形應影隨曩行今止百行之首立人斯著子之有之誰毁誰譽脩名既立老至何遽誰其執鞭吾為子御劉畧班藝虞志荀録伊昔有懐交相欣朂下帷無倦升髙有屬嘉爾晨燈惜余夜燭答劉居士君子之道亦有其四髙行絶俗盛徳出類才同文錦學非書肆望之可階即之難至輟精天理躔象少微人與俗異道與人違庭飛熠燿室滿伊威行無轍跡理絶心機九日侍宴樂遊苑以下五言帝徳峻韶夏王功書頌平共貫㳂五勝獨道邁三英我皇撫歸運時乗信告成一唱華鍾石再撫被絲笙黄草歸雒木梯山薦玉榮時來濁河變瑞起温洛清物色動宸眷民豫降皇情奉和登景陽山物色感神遊升髙悵有閲南望銅駞街北走長楸埒别澗宛滄溟疏山駕瀛碣奔鯨吐華浪司南動輕枻日下重門照雲開九華澈觀閣隆舊恩奉圖愧前哲泛長溪狥禄聚歸糧依隱謝覊勒絶物甘離羣長懐思去國長溪永東舍震區窮水域道遇垂綸叟聊訪問津惑弭檝申九言無為累牽纆長泛滄浪水平明至曛黒落日泛舟東溪黝黝桑柘繁芃芃麻麥盛交柯溪易隂反景澄餘映吾生雖有待樂天庶知命不學梁甫吟惟識滄浪詠田荒我有役秩滿余謝病濟浙江昧旦乗輕風江湖忽來徃或與歸波送乍逐翻流上近岸無暇目逺峯更興想緑樹懸宿根丹崖頽乆壤贈郭桐廬出谿口見候余既未至郭仍進村維舟乆之郭生方至朝發富春渚蓄意忍相思涿令行春返冠葢溢川坻望乆方來萃悲懽不自持滄江路窮此湍險方自兹疊嶂易成響重以夜猿悲客心幸自弭中道遇心期親好自斯絶孤遊從此辭答何徴君散誕羈鞿一作靮外拘束名教裏得性千乗同山林亦朝市勿以耕蠶貴空笑易農士宿昔仰髙山超然絶塵軌傾壺巳等樂命管亦齊喜無為嘆獨遊若終一作路方同止贈徐徴君外編作呉均者非促生悲永路早交傷晩别自我隔容徽於焉徂嵗月情非山河阻意似江湖悦東臯有儒素杳與榮名絶曾是違賞心曷用箴余缺𦕈焉追平生塵書廢不閲信此伊能巳懐抱豈暫輟何以表相思貞松擅嚴節答劉孝綽孝綽繪之子年十四父黨沈約任昉等聞其名命駕造焉昉尤相賞愛天監初孝綽起家著作佐郎為歸沐詩贈昉昉報曰閲水既成瀾藏舟遂移壑彼美洛陽子投我懐秋作乆敬類誠言吹嘘似嘲謔兼稱夏雲盡復陳秋樹索詎慰耋嗟人徒深老夫託一作徒然老夫諾直史兼褒貶轄司專疾惡九折多美疢匪報庶良藥子其崇鋒頴春耕勵秋穫答到建安餉杖故人有所贈稱以冐霜筠定是湘妃淚潛灑遂璘彬扶危復防噎事歸薄暮人勞君尚齒意矜此杖鄉辰復資後坐一作生彦候余方欠伸獻君千里笑紓我百憂嚬坐適雖有噐卧遊苦無津何由乗此竹直見平生親寄到溉到溉為建安太守昉寄詩求二彩段鐵錢兩當一百易代名實為惠當及時無待涼秋日别蕭諮議離燭有窮輝别念無終緒岐言未及申離目已先舉揆景巫衡阿臨風長楸浦浮雲難嗣音徘徊悵誰與儻有闗外驛聊訪狎鷗渚厲吏人講學暮燭迫西榆将落誡南畆曰余本疎惰頹暮積榆栁踐境渴師臣臨政欽益友旰食願横經終朝思擁帚雖欣辨蘭艾何用闢蒿莠苦熱旭日烟雲巻烈景入東軒傾光望轉蕙斜日照西垣既巻蕉梧葉復傾葵藿根重簟無冷氣挾石似懐温霡霂類珠綴喘嚇状雷奔同謝朏詠雪土膏候年動積雪表晨暮散葩似浮玉飛英若總素東序皆白珩西雝盡翔鷺山經陋宻榮騷人貶瓊樹出郡傳舍哭范僕射三首平生禮數絶式瞻在國楨一朝萬化盡猶我故人情待時屬興運王佐俟民英結懽三十載生死一交情携手遁衰孽接景事休明運阻衡言革時㤗玉階平濬沖得茂彦夫子值狂生伊人有涇渭非余揚濁清将乖不忍别欲以遣離情不忍一辰意千齡萬恨生已矣平生事詠歌盈篋笥兼復相嘲謔常與虚舟值何時見范侯還叙平生意與子别幾辰經塗不盈旬弗覩朱顔改徒想平生人寧知安歌日非君撤瑟辰巳矣余何歎輟舂哀國均嚴陵瀬羣峯此峻極參差百重嶂清淺既漣漪激石復奔壮神物徒有造終然莫能状詠池邊桃已謝西王苑復揖綏山枝聊逢賞者愛棲趾傍蓮池開紅春灼灼結實夏離離聨句清暑殿聨句栢梁體居中負扆寄纓紱梁武帝言慙輻輳政無術新安太守任昉至徳無垠愧違弼侍中徐勉燮贊京河豈微物丹陽丞劉汎竊侍兩宫慙樞密黄門侍郎栁憕清通簡要臣豈汩吏部郎中謝覽出入帷扆濫榮秩侍中張巻複道龍樓歌楙實太子中庶子王峻空班獨坐慙羊質御史中丞陸杲嗣以書記臣敢匹右軍主簿陸倕謬參和鼎講畫一司徒主簿劉治鼎味參和臣多匱司徒左西屬江曹漢魏六朝百三家集巻九十一
