body:
  text: 漢魏六朝百三家集巻一百四陳沈烱集題詞文人顚沛若沈初明者其眞窮乎年齒知命位僅邑長遭亂執節瀕死幸生梁元進討賊景東奔可冀茍安猶不免殺妻子屠昆季非張儉之亡命類李陵之無家悲哉一身不復望振播竄西魏再入新朝高文寵貴寄以干城遲鈍五十而收榮晩路窮而變變而通即功名猶然哉勸進三表長聲慷慨絶近劉越石陳情辛宛又有李令伯風至為陳太傳譲表義正辭壯即阮嗣宗上晉王箋曷加焉恭子雋才雅慕忠孝冐危履險情深指哀過殷墟而箕子涕睹風木而吾丘泣所處然也行經通天臺上表漢武亦雀臺雍丘慿弔常事何至發夢帝宫還身故壤鄧晨有云忠信感靈其事異其志悲矣存詩頗少詠十二神尤驚創體亦戲謔類耳江南文體入陳更衰非徐僕射沈侍中代無作者乃故﨑嶇其遇俾光詞苑斯文之際天豈無意乎目録賦歸魂賦有引幽庭賦表為王僧辯勸進梁元帝初表勸進梁元帝第二表勸進梁元帝第三表為百官勸進陳武帝表為陳太傅譲表經通天臺奏漢武帝表陳情表為周𢎞正譲太常表為周儀同失律後復官表啟為王僧辯答貞陽侯啟為王僧辯重答貞陽侯啟為王僧辯奉貞陽侯啟為王儈辯重奉貞陽侯啟書答張種書銘太極殿銘有序碑林屋館碑太尉始興昭烈王碑哀策文陳武帝哀策文祭文祭梁呉郡袁府君文文為陳霸先與王僧辯盟文樂府長安少年行獨酌謠詩從駕送軍望郢州城長安還至方山愴然自傷離合詩贈江藻建除詩六府詩八音詩六甲詩十二屬詩從遊天中寺應令同庾中庶肩吾周處士𢎞譲遊明慶寺各都一何綺為我彈鳴琴賦得邊馬有歸心詠老馬和蔡黄門口字詠絶句漢魏六朝百三家集巻一百四目録欽定四庫全書漢魏六朝百三家集巻一百四明張溥輯陳沈烱集賦歸魂賦有引古語稱遊魂升極周易有歸魂卦屈原著招魂篇故知魂之可歸其日已久余自長安反乃作歸魂賦其辭曰伊吾人之陋宗資𤣥理而云始肇邰閟之靈源分昌發之世祀實聞之乎家記又孚之於惇史亢宗貴而博古四史成乎一身怪日月之遼逺而承襲之相因豈少賤之能察非末學之知津也若夫風流退讓在秦作相越江以東惟戎及酆出忠出孝且卿且公世歷十五爰逮余躬値天地之幅裂遭日月之雰虹去父母之邦國埋形影於胡戎絕君臣而辭骨肉蹐厚地而跼蒼穹抱北嘶之胡馬望南飛之夕鴻泣霑襟而雜露悲微吟而帶風昔休明之云始余播棄於天地自太學而遊承明出書生而從下吏身豫封禪之官名入南宫之記登玉墀之深𣺌出金門之崇邃受北狄之奉書禮東夷之獻使闕實不嘗至屈膝遜言以殊方䧏意嗟五十之踰年忽流離於㓙忒値中軍之失權而大盜之移國何赤沴之四起豈黄霧之云塞祈瘦弟於赤睂乞老親於劇賊免伏鑕以解衣遂窘身而就勒既而天道禍淫否終斯泰靈聖奮發風雲響㑹掃欃槍之星斬蚩尤之斾余攀逆而効從遂妻誅而子害雖分珪而胙土迄長河之如帶肌膚之痛何泯濳翳之悲無狀我國家之沸騰我天下之匡復我何辜於上𤣥我何負於鄰睦背盟書而我欺圖信神而我戮彼孟冬之云季總官司而就紲託馬首之西暮隨檻車而迴轍履峨峨之層氷面飅飅之巖雪去莫敖之所縊過臨江之軌折矧今古之悲凉竝攅心而霑袂渡狹石之欹危跨清津之幽咽鳥虚弓而自隕猿號子而腹裂歴沔漠之逶迤及楚郡之參差望隆中之大宅映峴首之沉碑既縲然而就鞅非造次之能窺至若髙祖武皇帝之基天下也岐周景亳之地龜圖雀書之秘醒醉之歌味絶讓畔之田鱗次余既長於克民覺何從而掩泗洧水兮深且清宛水兮澄復明昔南陽之穰縣今百雉之都城我太宗之威武遏宛洧而陳兵百萬之寇俄成魚鼈千仭之阜倐似滄瀛雖徳刑成於赦服故蠻狄震乎雄名乃尋浙而歴商遂經秦而至洛覺髙蹈之清逺具風雲之倐爍其山也則嶔岑㠑嵬巖㟬婆陀或孤峰而秀聚或逸出而横羅千歳之木坐嶺表百丈之石枕谿阿其水則砰訇瀄汨或寛或疾擊萬瀬而相奔聚千流而同出何武關之狹隘而漢祖之英雄山萬里而仰雲霧水百仭而寫蜿虹若一夫而守隘豈萬衆之能攻去青泥而踰白鹿越渥水而到青門長卿之賦可想邵平之迹不存咄嗟驪山之阜惆悵㶚陵之園文恭儉而無隟嬴發掘其何言訪軹道之長組拾藍田之璵璠無故老之可訊竝膴膴之空原登未央之北闕望長樂之基趾伊太后之所居築旗亭而成市槐路鬱以三條方塗坦而九軌觀阡陌之遺蹤實不乖乎前史傍直城而北轉臨横門而左趨南則董卓之塢北則苻堅所居即二賊之墟壘為彼主之庭除終南巃嵸太一嵯峨九嵏掘起八壘連河汨涇泥之混濁灌渭渚之清波指咸陽而長望何趙李而經過息甘泉而避暑猶爽塏而清和爾乃背長夏渉素秋卧寒野坐林陬霜微凝而侵骨樹裁動而風遒思我親戚之顔貌寄夢寐而魂求察故鄉之安否但望斗而觀牛稚子夭於鄭谷勉勵愧乎延州聞愛妾之長呌引寒風而入楸何精靈以堪此乃縱酒以陶憂至誠可以感鬼秉信可以祈天何精隕而魄散忽魂歸而氣旋解龍驂而見送走郵驛於亭傳出向來之大道反初入之山川受繞朝之贈䇿報李陵之别篇涙未悲而自墮語未咽而無宣於時和風四起具物初榮草極野而舒翠花分叢而落英魚則潜波渙濯鳥則應嶺俱鳴隨六合之開朗與風雲而自輕其所渉也州則二雍三荆昌歡江并唐安淛洛巴郢雲平其水則淮江漢洧隨浩汗灃潦滻潏河涇渭相亂或浮深而揭淺或凌波而沿岸每日夕而靡依常一步而三歎蠻蜑之與荆呉𤣥狄之與羌胡言語之所不通嗜欲之所不同莫不疊足斂手低睂曲躬豈論生平與意氣止望首丘於南風悲城邑之毁撤憙風水之𣺌揚既畫地而謁帝乃懐而升堂何神僊之足學此即雲衣而虹裳也幽庭賦矧幽庭之閒趣具春物之芳華轉洞房而引景偃飛閣而藏霞築山川於户牖帶林苑於東家草纎纎而垂綠樹騷騷而落花於是秦人清歌趙女鼓筑嗟光景之遲暮詠羣飛之棲宿顧留情於君子豈含姿於嬌淑於是起而長謡曰故年花落今復新新年一故成故人那得長繩繫落日年年月月但如春表為王僧辯勸進梁元帝初表衆軍薄伐塗次九水即日獲臨城縣使人報稱侯景弑逆皇帝賊害太子宗室在宼庭者竝罹禍酷六軍慟哭三辰改曜哀我皇極四海崩心我大梁纂堯構緒基啇啟祚太祖文皇帝狥齊作聖肇有六州高祖武皇帝聰明神武奄龕天下依日月而和四時履至尊而制六合麗正居貞大横固祉四葉相係三聖同基蠢爾凶渠遂馮天邑閶闔受白登之辱象魏致堯城之疑雲扆成華一朝俱酷金楨玉幹莫不同寃悠悠彼蒼何其罔極臣聞䘮君有君春秋之茂典以徳以長先王之通訓少康則牧衆撫職祀夏所以配天平王則居正東遷宗周所以卜世漢光以能捕不道故景歴重昌中宗以不違羣議故江東可立儔今考古更無二謀伏惟陛下至孝通幽英武靈斷當七九之厄而應千載之期啟殷憂之明而居百王之㑹取威定霸嶮阻艱難建社治兵載循古道家國之事一至於斯天祚大梁必將有主軒轅得姓存者二人髙祖五王代實居長乘屈完而陳諸侯拜子武而服大輅功齊九有道濟生民非奉聖明誰嗣下武臣聞日月貞明太陽不可以闕照天地貞觀乾道不可以久愓黄屋左纛本為億兆而尊鸞輅龍章蓋以郊禋而貴寳器存乎至重介石愼於易差黔首豈可少選無君宗祏豈可一日無主伏願陛下掃地升中柴天改物事迫凶危運鐘擾攘蓋不勞宗正奉詔博士擇時南面即可居尊西向無所讓徳四方既知有奉八百始可同期殘宼潜居器藏社處乾象既傾坤儀已覆斬莽輗車燒卓照市廓清函夏正為塋陵開雪宫闈庻存鐘鼎彼黍離離伊何可言陛下繼明闡祚即宫舊楚左廟右社之制可以權宜五禮六樂之容歳時取備金芝九莖瓊茅三脊要衛率職尉候相望坐廟堂以朝四夷登靈臺而望雲物禪梁甫而封泰山臨東濵而禮日觀然後與三事大夫更謀都鄙左􅈆右澗夾雒可以為居抗殿疏龍惟王可以在鎬何必勤勤建業也哉臣等不勝控欵之至謹拜表以聞勸進梁元帝第二表紫宸曠位赤縣無主百靈聳動萬國囘皇雖醉醒相扶同歸景亳式歌且誦總赴唐郊猶懼陛下俛首􅏰然讓徳不嗣傳車在道方愼宋昌之謀法駕巳陳尚杜耿純之勸岳牧翹首天民累息臣聞星囘日薄擊雷鞭電者之謂天岳立川流吐霧蒸雲者之謂地包天地之混成洞陰陽之不測而以財成萬物者其在聖人乎故云天地之大徳曰生聖人之大寳曰位黄屋廟堂之下本非獲已而居明鏡四衢之鐏蓋由應物取訓伏惟陛下稽古文思英雄特達比以周旦則文王之子方之放勛則帝摯之季十年旦暮可不在斯庭闕湮亡鐘鼎淪覆嗣膺景歴非陛下而誰豈可使赤睂更立盆子隗囂託置髙廟陛下方復從容髙讓用執謙光展其矯行偽書誣罔正朔見機而作斷可識矣匪疑何卜無待蓍龜日者公卿失馭禍纒霄極獯羯憑陵姦臣互起率戎伐頴無處不然勸明誅晉側足皆爾刁斗夜鳴烽火相照中朝人士相顧銜悲凉州義徒東望殞涕惵惵黔首將欲安歸陛下英略緯天沉明内斷横劍泣血枕戈嘗膽農山圮下之策金匱玉鼎之謀莫不定算扆帷决勝千里擊靈鼉之鼓而建翠華之旗驅六州之兵而總九伯之伐四方雖虞一戰以霸斬其鯨鯢既章大戮何校烕耳莫匪姦囘史不絶書府無虚月自洞庭安波彭蠡底定文昭武穆芳若椒蘭敵國䧏城和如親戚九服同謀百道俱進國耻家怨計期就雪社稷不墜繄在聖明今也何時而申帝啟之避凶危若此方陳泰伯之辭國有具臣誰敢奉詔天下者髙祖之天下陛下者萬國之歡心萬國豈可無君髙祖豈可廢祀即日五星夜聚八風通吹雲煙紛郁日月光華百官象物而動軍政不戒而備飛艫巨艦竟水浮川鐡馬銀鞍陵山跨谷英傑接踵忠勇相顧湛宗族以酬恩焚妻子以報主莫不覆楯銜威提斧擊衆風飛電耀志滅凶醜所待陛下昭告后土䖍奉上帝廣發明詔師出以名五行夕返六軍曉進便當盡司宼之威窮蚩尤之伐執石趙而求璽斬姚秦而取鐘脩掃塋陵奉近宗廟陛下豈得不仰存國計俯從民請漢宣嗣位之後即遣蒲類之軍光武登極既竟始有長安之㨗由此言之不無前准臣等或世受朝恩或身荷重遇同休等戚自國刑家茍有腹心敢以死奪不任慺慺之至謹重奉表以聞勸進梁元帝第三表衆軍以今月戊子總集建康賊景鳥伏獸窮頻擊頻挫姦竭詐盡深溝自固臣等分勒武旅百道同趨突騎短兵犀函鐵楯結隊千羣持㦸百萬止紂七歩圍項三重轟然大潰羣凶四滅京師少長俱稱萬歳長安酒食於此價髙九縣雲開六合清朗矧伊黔首誰不載躍伏惟陛下咀痛茹哀嬰憤忍酷自紫庭綘闕胡塵四起壖垣好畤冀馬雲屯泣血臨兵嘗膽誓衆而呉楚一家方與七國俱反管蔡流言又以三監作亂西凉義衆阻秦塞而不通并州遺民跨飛狐而見絶豺狼當路非止一人鯨鯢不梟倐焉五載英武克振怨耻竝雪永尋霜露伊何可勝臣等輙依故實奉修社廟使者持節分告園陵嗣后升遐龍輴未殯承華掩曜梓宫莫測竝即隨由備辦禮具凶荒四海同哀六軍袒哭聖情孝友理當感慟日者百司岳牧仰祈宸鑒以鍚珪之功既歸有道當壁之禮允屬聖明而優詔謙冲窅然凝邈飛龍可躋而乾爻在四帝閽云呌而閶闔未開謳歌載馳是用翹首所以越人固執熏丹穴以求君周民樂推踰岐山而事主漢王不即位無以貴功臣光武止蕭王豈謂紹宗廟黄帝迷於襄城尚訪御人之道放勛入於姑射猶使罇爼有歸伊此儻來豈聖人所欲帝王所應不獲巳而然伏讀璽書尋諷制㫖領懐物外未奉慈衷陛下日角龍顔之姿表於狥齊之日彤雲素靈之瑞基於應物之初博學則大哉無所與名深言則曄乎文章之觀忠為令徳孝實動天加以英威茂略雄圖武算指麾則丹浦不戰顧眄則阪泉自蕩地維絶而重紐天柱傾而更植鑿河津於孟門百川復啟補穹儀以五石萬物再生縱陛下拂袗衣而遊廣成登弇山而去東土羣臣安得仰訴兆庶何所歸仁况郊祀配天罍篚禮曠齊宫清廟匏竹不陳仰望鸞輿匪朝伊夕瞻言法駕載渴且饑豈可久稽衆議有曠彛則舊邦凱復函洛已平髙奴櫟陽宫館雖毁濁河清渭佳氣猶存臯門有亢甘泉四敞土圭測景仙人承露斯蓋九州之赤縣六合之樞機博士捧圖書而稍還太常定禮儀其已列豈得不揚清警而赴名都具玉鑾而旋正寢昔東周既遷鎬京遂其不復長安一亂郟洛永以為居夏后以萬國朝諸侯文王以六州匡天下方之迹基百里劒杖三尺以殘楚之地抗拒六戎一旅之卒翦夷三叛坦然大定御辯東歸解五牛於冀州秼六馬於譙郡緬求前古其可得歟對揚天命無所譲徳有理存焉敢重祈奏為百官勸進陳武帝表臣聞春榮秋落四時所以迭代金行水流五徳所以互序昔陶唐告終有虞氏作漢魏禪譲晉宋以之登庸夫有非常之功有非常之賞能利天下者受天下之利陛下造化之功日月之徳褰裳去之物誰仰訴頃五星夜聚八風通吹豐露呈甘卿雲舒簇白狼逺至素雉朝飛天意顯然靈貺可覩為陳太傅譲表奏六代之舞不能祚天具百神之歌無以動聖延首當閽轉増危慄百川沸騰百室如燬釋位同謀諸侯總至盟書㑹府餘臣一人若使幅巾衡巷口絶平呉朝遊赤松暮過濟北出就侯服入褫龍章則四郊有壘誰守社稷如其雄㦸在前强弩自衛負孺子之圖飾縁鶺之鼎軍威重於䕶將國禮貴於寒門則臣道尚卑孰云非逼臣所以出謝公卿入訓妻子拜長陵之園謁太祖之廟不以九族違恩義不以百姓負國家所期陛下與北極同壽朝廷與南山同固經通天臺奏漢武帝表臣聞橋山雖掩鼎湖之竈可嗣有魯遂荒大庭之跡無泯伏惟陛下降徳猗蘭纂靈豐谷漢道既登神僊可望射之罘於海浦禮日觀而稱功横中流於汾河指栢梁而髙宴何其樂也豈不然歟既而運屬上僊道窮晏駕甲帳珠簾一朝零落茂陵玉盌宛出人間陵雲故基共原田而膴膴别風餘趾帶陵阜而茫茫羈旅縲臣能不落淚昔承明既厭嚴助東歸駟馬可乘長卿西反㳟聞故實竊有愚心黍稷非馨敢望徼福但雀臺之弔空愴魏君雍丘之祠未光夏后瞻仰煙霞伏増悽戀藝文竈作靈甲帳作翠幕宛出作遂出别風作扶風既厭作見罷煙霞作猷陳情表臣嬰生不幸弱冠而孤母子零丁兄弟相長謹身為養仕不擇官宦成梁朝命存亂世冐危履險自死輕生妻息誅夷昆季屠滅餘臣母子得逢興運臣母妾劉今年八十有一臣叔母妾丘七十有五私門弟侄故自無人妾丘兒孫又久亡泯兩家侍養餘臣一人前帝知臣之孤㷀眷臣以州里不欲使頓居草萊又復矜臣溫凊所以一年之内再三休沐臣之屢披丹欵頻冐宸鑒非欲茍違朝廷逺離畿輦一者以年將六十湯火居心每跪讀家書前懼後喜溫枕扇席無復成童二者職居彛憲邦之司直若自虧身禮何問國章前徳綢繆始許哀放内侍近臣多悉此㫖正以選賢與能廣求明哲趦趄荏苒未始取才而上𤣥降戾奄至今日徳音在耳墳土遽乾悠悠昊天哀此罔極兼臣私心煎切彌廹近時慺慺之祈轉忘塵觸伏惟陛下睿哲聰明嗣興下武刑於四海𢎞此孝治寸管求天仰歸帷扆有感必應實望聖明特乞霈然申其私禮則王者之徳覃及無方矧彼翔沈孰非涵養為周𢎞正讓太常表臣聞玉舄雕楹不取材於蟠木丹朱繡黼豈襲冕於薜蘿何則適用各有所宜朝野不可一㫖叔孫之分定禮儀倍資典實刁恊之躬為唱引豈易其儀賓主闕對封禪失儀責以司存云誰之咎況南史執簡轉見違才君舉必書尤難妄冐為周儀同失律後復官表日者驂驚鄭馬害在晉軍獄囚悲其夜數縲人切其曉奏危光似燭察命如絲云誰之尤自貽其咎假令誅以妻子戮及墳墓漢非負徳陵實孤恩況伏鑕俛睂遂受淮陰之間吞聲飲恨不與臧洪共死陛下憐而宥之伊臣豈不獨愧喪其子弟六謝父兄百萬之師千夫有長問臣安在誰曰董司魂遊奉髙不知何對啟為王僧辯答貞陽侯啟席威卿反命具有奉答馬嵩仁至又奉去月二十八日誨增用傾悚秦為不道西都失守率土臣妾莫不驚惶喪君有君實為典禮繼世嗣厯明於通誥所以百辟羣司四方岳牧共立大計僉議所歸故紹晉安殿下用傳寳祚樹立之宜無由逺謀鄰國足下宗枝蕃戚徳譽早隆既身限北庭事隔匡贊今者借助齊主揚斾南轅但嗣守洪基即既其主若阿衡帝載誠所推揖𢎞佐中興誰曰不可所望齊朝永存信誓謹當命北舟人奉迎麾駕無容進枉齊兵逺於江表仰冀弼諧時政用極奮庸但江東之地數千餘里民附國險水陸衿帶若舊京從命揚徐承㫖又恐西南之地二十餘州不即威懐容為齊國之患而糧裹之宜更遲動靜祇展之日冀在一二謹因馬嵩仁并遣貞威將軍通直郎散騎常侍馬瑱口宣諮述為王僧辯重答貞陽侯啟席威卿至奉今月五日誨披函伸紙號耻交哀天未悔禍地維重絶九縣沸騰四海悲憤嗣主欽明濬哲齊聖廣淵體自宸極受命文祖主梁祀者非此而誰且年倍漢昭弗明上官之詐徳踰姬誦彌昭周旦之誠今海内衣冠中朝卿士或南陽舊𨽻官成天監之初代邸故臣榮光承聖之始莫不人竭其力爭求效命輸心嗣主以報先帝之恩今荆陜淪覆正是江北數縣即東南藩翰萬里而遙主甲治兵舳艫相接長波天限方漢城池修徳綏民中興可待孤子本以庸懦加復窮喘且平生素蓄志不在位世蒙朝寵身實許國武皇擢之千里先主申其三顧因此踰濫遂居端右屬天歩艱難寄深憂積方欲詢於髦傑採之輿皂同康時務共贊皇猷一彼車書刷兹讐耻然後守其侯服歸老赤松至於今日使須白事披奉來誨承彼送還今璇枝令戚播越秦虜明公儻能入朝同奬王室伊呂之任僉曰仰歸寧不副兹仄席濟扶匡救若斯言不渝更聽後㫖便遣鷁舟虹舸奉迎麾斾但閱來朝意在主盟今江東所奉彼屬披圖未䝉朝意鄭拒子忽左史是之漢背劉襄班書稱允况屬疎於昔彌不敢聞命謀期通識賜亮此誠為王僧辯奉貞陽侯啟自秦兵㓂陜臣便營赴援纔及下船荆城䧟没即遣劉周入國具表丹誠左右勲豪初竝同􅆻周既多時不還人情疑阻比冊降中使復遣諸處詢謀物論參差未甚決定始得侯瑱信示西宼權景宣書令以眞跡上呈觀視將帥咨欲同泰若一朝仰違大國臣不辭灰粉悲梁祚永絶中興伏願陛下便事濟江仰藉皇齊之威憑陛下至聖之略樹君以長雪報可期社稷再輝死且非􅈔請押别使曹冲馳表齊都續啟事以聞伏遲拜奉在促為王僧辯重奉貞陽侯啟員外常侍姜暠還奉勑伏具動止大齊仁義之風曲被鄰國䘏災救難申此大猷皇家枝戚莫不榮荷江東冠冕俱知憑賴今歃不忘信信實由衷謹遣臣第七息顯顯所生劉并弟子世珍往彼充質仍遣左民尚書周𢎞正至厯陽奉迎艫舳浮江俟一龍之渡清宫丹陛候六傳之入萬國傾心同榮晉文之反三善克宣方流宋昌之議國祚既隆社稷有奉則羣臣竭節報厚施於大齊戮力展愚效忠誠於陛下今遣吏部尚書王通奉啟以聞書答張種書若乃三江五湖洞庭巨麗寫長洲之茂苑登九曲之層臺山髙水深雲蒸霧吐其中之秀異者實虎丘之靈阜焉冬桂夏栢長蘿脩竹靈源祕洞轉側超絶逺澗深崕交羅户穴銘太極殿銘有序臣聞在天成象紫宫所以昭著在地成形赤縣居其區宇太極殿者資兩儀之意焉大壯顯其全模土圭測其正影周曰路寢漢稱前殿雖名號參差其實一也主上未明求衣日旰忘食隳樂壊禮造次畱神漢陛秦除莫不葺復而此殿興造累歳未成外遘戎機内憂民力劬勞深慮荏苒移時至陳永定六合既清五禮稍備雕楹玉舄華榱璧璫揆之有日而猶一柱楩楠豫章地淪外寇楚材晉用非復我求既而新亭前江有流查甚壯盤根措節枝葉葱蒨津人以聞正堪時用於是將作受詔冬官奉職百工竝作屢降乘輿匠石磨礱必經天㫖儉而不固泰而不奢億兆塡塡而樂成也曾未數旬煥然雲搆昔晉朝繕造文杏有闕梅梁瑞至畫以標花自是迄今又獲神物即樟樹焉殿之某間即某柱是也銘曰軒轅狹堂夏后卑宫文來質往蹇産彌崇體制八都開玆萬户灼爍雄梁徘徊大廡璧月宵懸卿雲晝聚豈伊闓陽飛來應柱嘉辰令月新寢告成青槐赤棘郎將司兵翠被負扆百辟公卿鐘鼓八佾簫韶九成庸臣再拜天子萬齡碑林屋館碑夫𤣥之又𤣥處衆妙之極可乎不可成道行之致斯蓋寂寞窅𡨕希微恍惚故非淮南八僊之圖瀨鄉九井之記至若崑山平圃銀牓相暉蓬閬僊宫金臺崛起南瞰晉臺傍連飛閣桂柱星羅瓊軒雲構銘曰大道既隱衆聖無門悠悠太極誰見𤣥根祈年立秦望仙表漢髣髴神靈依稀宫觀峨峨林屋輪奐徘徊庭羅花鳥室靜塵埃太尉始興昭烈王碑古者帝王之興莫不崇建親屏泰伯讓而退封武哀終而受號則有之矣至若勒功鼎鼐銘徳太常清廟尊乎國家揚名顯乎子弟在昭烈王見之焉若夫媯水遙源石砮遐集五絲作而詠南風八世興而和鳴鳯籍帝王之基居正卿之族有由來矣孔融汝頴之論許其少多傅暢諸公之書頗有賢哲自漢至魏渉江而東緜邈蟬聨言之耆舊皇上革命應運大啟邦國麟趾磐石之宗永固金楨玉幹之戚畢封文叔掩被之悲無冺仲謀援鞍之慟逾切乃封始興郡王永定元年下詔曰天倫所感義本因心名器追崇則惟恒典亡兄梁故南兖州刺史長城縣公徳範沈䆳風度寛厚性與天通深乎靡測昔彈冠入仕譽重城華宣力艱難遂顧洪業雖時非季漢勢異桓王海内挹其風流生民懐其大徳者矣朕受天明命爰膺寳厯言尋永徃興慕增懐可奉贈太尉公昔之宻戚近親宗英令徳若河間之不羣沛獻之受象東平之樂善陳思之藻麗實聞之也未有身死忠貞名存前代若王之義烈者銘曰稽古帝舜重瞳有裔曰陳祚土纂虞之系騰波汝頴承流媯汭四嶽有後六竒獻計惟實惟忠卿長羣公浮舟震澤佳氣葱葱岐周七十商亳百里婉婉中陽帝出攸止太常景皇季孫讓子天下不踐間之惇史入孝出忠清輝何已苞指周藏風流懿徳言為世範行成士則名山可鐫豐碑易勒惜哉徃矣殞身凶慝鼎命既遷山河是始光啟代郡徳表永祀周以别功魯侯戾止禮茂廟堂恩加松杞哀策文陳武帝哀策文望三靈而摽目蹐九地而崩心哭仍几之將撤慟祖鬯之虗斟黄屋梫而白日掩紫極涵而浮雲陰其辭曰悠悠媯水鬱鬱姚墟惟帝之系在唐作虞正卿之後握此靈符雕雲布族祥星結樞負兹大鏡未拾遺珠爰初發跡斬虵鞠旅大定番禺載戡海渚承釁而運席巻中流王室如燬乃合諸侯負鐵誓衆釋位同謀俱登涿鹿實斷蚩尤道濟一匡功歸四履爰總百官訓於天子儻來有運事非獲巳翠龜負字赤雀衘書謳謌適夏禮樂遷虞負戻正位升壇受圖二儀恊序五緯同符門歌麟趾室詠騶虞奉常定日太卜蠲時升中備物方告雍熈天甘玉露地秀金芝休禎未答靈貺徒欺吏求穆卜詔絶良毉羲躔失御天街褫蹕夏采升榮宫車宴出洞閨移凶充庭罷吉閒窅窅之窮燈去昭昭之遊日歸大暮之不𤾉降幽宫而長畢巫咸筮告容成戒期文衛如在葆鐸相悲去畢陌而東顧望橋山而路遲臣攀龍而尚在魂過沛而何之侍低昻之靈纛奉寂寞之空帷銅雀没於脩松平陵隱於深栢節鼖鼓之哀音燎爟火於通夕薤露落而暮日寒𤣥霜凝而壟草白銘功徳於旂常被徽音於鐘石迴天儀於清廟祔祖考而來格播茂實與英聲鬱氛氲於宗祏祭文祭梁呉郡袁府君文夫宫鳴徴應響韻相趨桂馥蘭芬期臭在斯道合一朝豈忘千載日者明徳世彦振纓王室坐嘯大邦顯治巨麗竊以不敏出宰勾呉上郡下邑都城接雉雖王事靡盬無失豫遊窺洞庭於五湖登姑蘓於九曲身後之事一至於斯今者長樂未央已夾樗里之墓公宫魯庫非復少昊之墟成土一棺未知何託解劒絮漿轉增欷歔文為陳霸先與王僧辯盟文賊臣侯景凶羯小胡逆天無狀構造姦惡違背我恩義破掠我國家毒害我生民移毁我社廟我髙祖武皇帝靈聖聰明光宅天下劬勞兆庶亭育萬民如我考妣五十餘載哀景以窮見歸全景將戮之首置景要害之地崇景非次之榮我高祖於景何薄我百姓於景何怨而景長㦸彊弩陵䠞朝廷鋸牙郊甸殘食含靈刳肝斮趾不懕其快曝骨焚尸不謂為酷髙祖菲食卑宫春秋九十屈志凝威憤終賊手大行皇帝溫嚴恭默丕守鴻名於景何有復加忍毒皇枝繦抱已上緦功以還窮刀極爼既屠且劊豈有率土之濵謂為王臣食人之禾飲人之水忍聞此痛而不悼心況臣僧辯臣霸先等荷稱國藩湘東王臣諱泣血衘哀之寄摩頂至足之恩世受先朝之徳身當將相之任而不能瀝膽抽膓共誅姦逆雪天地之痛報君父之讐則不可以禀靈含識戴天履地今日相國至孝𤣥感靈武斯發已破賊徒獲其元帥止餘景身尚在京邑臣僧辯與臣霸先恊和將帥同心共契必誅凶竪尊奉相國嗣膺鴻業以主郊祭前途若有一功獲一賞臣僧辯等不推已譲物先身帥衆則天地宗廟百神之靈共誅共責臣僧辯臣霸先同心共事不相欺負若有違戾明神殛之樂府長安少年行長安好少年驄馬鐵連錢陳王裝腦勒晉后鑄金鞭歩揺如飛燕寳劒一作劒鍔似舒蓮去來新市側遨遊大道邊道邊一老翁顔鬂如衰蓬自言居一作生漢世少小見豪雄五侯俱拜爵七貴各論功建章通北闕複道度南宫太后居長樂天子出囘中玉輦迎飛燕金山賞鄧通一朝復一日忽見朝市空扶桑無復海崑山倒向東少年何假問頽齡値福終子孫𡨕滅盡鄉閭復不同淚盡眼方暗髀傷耳自聾杖筞尋遺老歌嘯詠悲翁遭隨各有遇非敢訪童䝉獨酌謡獨酌謡獨酌獨長謡智者不我顧愚夫余未要不愚復不智誰當余見招所以成獨酌一酌傾一瓢生涯本漫漫神理暫超超再酌矜許史三酌傲松喬頻煩四五酌不覺凌丹霄倐爾厭五鼎俄然賤九韶彭殤無異塟夷跖可同朝龍蠖非不屈鵬鷃但逍遥寄語號呶侣無乃太塵囂詩從駕送軍惟堯稱乃武軒后號神兵弔民資智勇治亂屬師貞我君膺寳業歷駕視前英蒲海方無浪夷山未有平星光下結斾劒氣上舒精雲開萬里徹日麗百川明撫鼓山靈應詔蹕水祗驚望郢州城魂兮何處返非死復非僊坐柯如昨日石合一作合石未淹年歷陽頓成浦東海果為田空憶扶風詠誰一作惟見峴山傳世變才良改時移民物遷悲哉孫驃騎悠悠哭彼天長安還至方山愴然自傷秦軍坑趙卒遂有一人生雖還舊鄉里危心曽未平淮源比桐栢方山似削成猶疑屯敵騎尚畏値胡兵空村餘拱木廢邑有頽城舊識既已盡新知皆異名百年三萬日處處此傷情離合詩贈江藻開門枕芳野井上發紅桃林中藤蔦秀木末風雲髙屋室何寥廓至士隱蓬蒿故知人外賞文酒易陶陶友朋足諧晤又此盛詩騒朗月同携手良景共含毫欒巴有妙術言是神僊曹百年肆偃仰一理俱相勞閒居有樂建除詩建章連鳯闕藹藹入雲煙除庭發槐栁冠劒似神僊滿衢飛玉軑夾道躍金鞭平明塵霧合薄暮風雲鶱定交太學裏射筞雲臺邊執事一朝謬朝市忽崩遷破家徒狥國力弱不扶顚危機空履虎擊惡豈如鸇成師鑿門去敗績裹尸旋收魂不入斗抱景問穹𤣥開顔何所說空憶平生前閉門窮巷里靜掃詠歸田六府詩水廣南山暗杖筞出蓬門火炬村前發林煙樹下昬金花散黄蕋蕙草雜芳蓀木蘭露漸落山芝風屢翻土髙行已冐抱甕憶中園榖城定若近當終黄石言八音詩金屋貯阿嬌樓閣起迢迢石頭足年少大道跨河橋絲桐無緩節羅綺自飄飄竹煙生薄晩花色亂春朝匏𤓰詎無匹神女嫁蘓韶土地多妍冶鄉里足塵囂革年未相識聲論動風颷木桃堪底用寄以答瓊瑶六甲詩甲拆開衆果萬物具敷榮乙飛上危幕雀乳出空城丙魏舊勲業申韓事刑名丁翼陳詩罷公綏作賦成戊巢花已秀滿塘草自生已乃忘懐客榮樂尚關情庚庚聞鳥囀肅肅望鳬征辛酸多憫惻寂寞少逢迎壬蒸懐太古覆妙佇無名癸已空施位詎以召幽貞十二屬詩䑕迹生塵案牛羊暮下來虎嘯生當作坐空谷兎月向牕開龍隰逺青翠蛇柳近裴徊馬蘭方逺摘羊負始春裁猴栗羞芳果雞跖引清杯狗其懐物外猪蠡窅悠哉從遊天中寺應令福界新開草名僧共下筵楊枝生拱樹錫杖咒飛泉石座應朝講山龕擬夜禪當非舎衛國賣地取金錢同庾中庻肩吾周處士𢎞讓遊明慶寺鷲嶺三層塔菴國一講堂馴烏逐飯磬狎獸繞禪牀擿菊山無酒燃松夜有香幸得同髙勝於此􅉷心王名都一何綺陸士衡擬古詩云名都一何綺城闕鬱盤桓名都一何綺春日吐光輝髙樓雲母扇複殿琉璃扉昭儀同輦出髙安連騎歸欲知天子貴千門應紫微為我彈鳴琴為我彈鳴玉臺作清琴琴鳴傷我襟半死無人見入竈始知音空為貞女引誰達楚妃心雍門何假說落涙自淫淫賦得邊馬有歸心王瓉詩朔風動秋草邊馬有歸心窮秋邊馬肥向塞甚思歸連鑣渡蒲海束舌下金微已郤魚䴡陣將摧鶴翼圍彌憶長楸道金鞭一作鞍背落暉詠老馬昔日從戎陣流汗幾東西一日馳千里三丈㧞深泥渡水頻傷骨翻霜屢損蹄勿言年齒暮尋途尚不迷和蔡黄門口字詠絶句囂囂宫閣路靈靈谷口閭誰知名器品語嘿各﨑嶇漢魏六朝百三家集巻一百四
