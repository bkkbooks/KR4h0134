body:
  text: 漢魏六朝百三家集巻四十二晉摰虞集題詞摰仲洽為𤣥晏高弟知名當世遭亂餒死傷哉貧也張茂先聚書三十乘仲洽撰定官書皆資以取正茂先寃死仲洽致箋齊王事漸表白可云不負知已集詩甚少賦亦逺遜茂先議禮諸文最稱宏辨與杜元凱束廣微並生一時勢猶鼎足二荀弗如也東堂䇿對其生平致身之文中少壯氣沿為卑響靡靡之句效者益貧當日作者得無自恨其率爾乎茂先博極羣書能辨鳬毛龍肉而不知察變桑栢仲洽善觀𤣥象知凉州可以避難而流離京雒竟同餓𨽻予輙怪儒者有博物之長無謀身之斷此趙壹所以悲窮鳥也流别曠論窮神盡理劉勰雕龍鍾嶸詩品縁此起義評論日多矣目録賦思游賦有序鵁鶄賦觀魚賦槐賦疾愈賦䇿贒良對䇿表普増位一等表討論新禮表奏明堂議奏二社奏祀六宗奏議祀皋陶議廟設次殿議皇太孫薨服議國喪佩劒綬議國喪服制議吉駕導喪議輓歌議寄公齊衰服議諸侯公孤絶朞議師服議廵狩建旗議皇太子稱臣議夫人答拜羣妾議新禮議駁宜用古尺駁五禮冠服駁書答杜預論皇太子除服書駁河内宜立學書牋致齊王冏牋頌太康頌釋奠頌連理槐頌箴尚書令箴新婚箴贊庖犧贊神農贊黄帝贊唐尭贊夏禹贊殷湯贊周文王贊周武王贊周宣王贊漢高祖贊漢文帝贊孔子贊顔子贊左丘明贊銘武庫銘門銘竈屋銘誥遷宅誥論文章流别論頌詩七賦箴銘誄哀辭文圖䜟碑銘又對三日曲水對詩答杜育詩雍州詩騷愍騷漢魏六朝百三家集巻四十二目録欽定四庫全書漢魏六朝百三家集巻四十二明張溥輯晉摯虞集賦思遊賦有序虞嘗以死生有命富貴在天天之所祐者義也人之所助者信也履信思順所以延福違此而行所以速禍然道長世短禍福舛錯怵迫之徒不知所守蕩而積憤或迷或放故借之以身假之以事先陳處世不遇之難遂棄彞倫輕舉逺游以極常人罔惑之情而後引之以正反之以義推神明之應於視聴之表崇否泰之運於智力之外以明天任命之不可違故作思遊賦其辭曰有軒轅之遐胄兮氏仲壬之洪裔敷華穎于末葉兮晞靈根于上世凖乾坤以斡度兮儀隂陽以定制匪時運其焉行兮乗太虚而遥曵戴朗月之髙冠兮綴太白之明璜製文霓以為衣兮襲采雲以為裳要華電之煜爚兮珮玉衡之琳琅明景日以鑒形兮信煥燿而重光至羙詭好于凡觀兮修稀合而靡呈燕石緹襲以華國兮和璞遥棄于南荆夏像韜塵于市北兮瓶罍抗方于兩楹鸞皇耿介而偏棲兮蘭桂背時而獨榮闗寒暑以練真兮豈改容而爽情感昆吾之易越兮懷暉光之速暮羡一稔而三春兮尚含英以容豫悼曜靈之靡暇兮限天晷之有度聆鳴蜩之號節兮恐隕葉于凝露希前軌而増騖兮眷後塵而旋顧徃者倐忽而不逮兮来者㝠昧而未著二儀泊焉其無央兮四節環轉而靡窮星鳥逝而時反兮夕景潜而且融景三后之在天兮歎聖哲之永終諒道修而命微兮孰舎盈而戢冲握隋珠與蕙若兮時莫悦而未遑彼未遑其何恤兮懼獨羙之有傷蹇委深而投奥兮庶芬藻之不彰芳處幽而彌馨兮寳在夜而愈光逼區内之迫脅兮思攄翼乎八荒望雲階之崇壯兮願輕舉而髙翔造庖犧以問象兮辨吉繇于姬文將逺遊于太初兮鑒形魄之未分四靈儼而為衛兮六氣紛以成羣驂白獸于商風兮御蒼龍于景雲簡厮徒于靈圉兮從馮夷而問津召陵陽于游谿兮旌王子于柏人前祝融以掌燧兮殿𤣥𡨕以掩塵形彯彯而遂遐兮氣亹亹而愈新挹玉膏于萊嵎兮掇芝英于瀛濱揖太昊以假憇兮聴賦政于三春洪範翕而復張兮百卉隕而更震睇玉女之紛影兮執懿筐于扶木覽𤣥象之韡曄兮仍騰躍乎陽谷吸朝霞以療飢兮降廩泉而濯足將縱轡以逍遥兮限東極之路促詔纎阿而右迴兮覿朱明之赫曦莅羣神于夏庭兮迴蒼梧而結知纚焦明以承旂兮駔天馬而髙馳讒羲和于丹丘兮誚倒景之亂儀尋凱風而南暨兮謝太陽于炎離戚溽暑之陶鬱兮余安能乎留斯聞碧雞之長晨兮吾將徃乎西游粤浮鷁于弱水兮泊舳艫于中流茍精粹之攸存兮誠沈羽以汎舟軼望舒以陵厲兮羌神漂而氣浮訊碩老于金室兮采舊聞于前修譏淪隂于危山兮問王母于椒丘觀𤣥鳥之參趾兮㑹根壹之神籌擾毚兎于月窟兮詰姮娥于蓐收爰攬轡而旋驅兮訪北叟之倚伏乗増冰而遂濟兮淩固隂之所滀探龜虵于幽穴兮瞰罔養之潛育哂倐忽之躁狂兮喪中黄于耳目偭燭龍而游衍兮窮大明于北陸攀招揺而上躋兮忽蹈廓而凌虚登閭闔而遺眷兮頫𤣥黄于地輿召黔雷以先導兮覲天帝於清都觀渾儀以寓目兮拊造化之大罏爰辨惑於上皇兮稽吉凶之元符唐則天而民咨兮癸亂常而感虞孔揮涕于西狩兮臧考祥于婁句跖肆暴而保乂兮顔履仁而夙殂何否泰之靡所兮眩榮辱之不圗運可期兮不可思道可知兮不可為求之者勞兮欲之者惑信天任命兮理乃自得且以四位為匠乾巛為均散而為物結而為人陽降隂升一替一興流而為川滯而為陵禍不可禳福不可徵其否兮有豫其泰兮有數成形兮未察靈像兮已固承明訓以發䝉兮審性命之靡求將澄神而守一兮奚飄飄而遐遊斐陳辭以告退兮主悖惘而永歎惟升降之不仍兮詠别易而㑹難願大饗以致好兮盍息駕于一餐㑹司儀于有始兮延嘉賓于九乾陳鈞天之廣樂兮展萬舞之至歡枉矢鑠其在手兮狼弧􅪨其斯彎睨翟犬于帝側兮殪熊羆于靈軒爾乃清道夙蹕載輪修祖班命受號轙輈整旅兆司鬱以届路兮萬靈森而陳庭豐隆軒其警衆兮鉤陳帥以屬兵堪輿竦而進時兮文昌肅以司行抗蚩尤之脩旃兮建雄虹之采旌乗雲車電鞭之扶輿委移兮駕應㡣青虬之容裔陸離俯游光逸景倐爍徽霍兮仰流旌垂旄焱攸纎纚前湛湛而攝進兮後僸僸而方馳且啓行于重陽兮奄税駕乎少儀跨列􅆙兮闚乾巛揮玉闗兮出天門涉漢津兮望崐崘經赤霄兮臨𤣥根觀品物兮終復魂形已消兮氣猶存眺懸舟之離離兮懐舊都之藹藹仍繁榮而督引兮將遄降而速邁華雲依霏而翼衡兮日月炫晃而暎葢蹈烟煴兮辭天衢心闣􅛑兮識故居路遂遒兮情欣欣奄忽歸兮反常閭修中和兮崇彞倫大道繇兮味琴書樂自然兮識窮逹澹無思兮心恒娛鵁鶄賦有南州之竒鳥諒殊美而可嘉生九皋之曠澤游江淮之洪波既剪翼以就養遂婉孌乎邦家鵁鶄呈儀若刻若畫鸞頸龜背戴𤣥珥白斑毛頳膺駮羽朱掖青不專紺纁不擅赤因宛㸃注希稠有適其在水也則巧態多姿調節柔骨一低一仰乍浮乍没或遊或舞繽翻倐忽若乃陽故多隂殊方相求見水則喜睹火而憂觀魚賦觀鱗族於滮池兮睨羽羣於瀨涯乃有洧泉之鯉濯陂之鰋瀺灂涌躍没浪赴逺集於曲涯之隈逐乎澹淡之深攅聚輻蹙或濯或沉倏爍攸驛眩目驚心徒極觀而無獲兮羡鮮肴之柔嘉於是六柱俱起參搆横羅編莞為筏撼木激波奔突轉薄流不及瀾魚未驚而失行忽浪逹於急湍諒形勝之得勢實有􅉨而無反炰鱨膾鯉亦有庻羞肴核並陳既㫖且柔沉溢爵於通溝因素波以獻酬騁微巧於浮觴競機捷於迅流既歡豫而不倦願窮晝而兼夜獨臨川而慷慨感逝者之不舍惟修名之求立戀景曜之西謝懼留連之敗徳遂收歡而命駕是時也含懐湛遁需於酒食盤衍宴安歡情未極選興之言矯枉以直悅而不懌莫不歎息槐賦覽坤元之産殖莫兹槐之為貴爰表庭而樹門膺論道而正位爾乃觀其誕狀察其攸居豐融湛䨴蓊欝扶疎上拂華宇下臨脩渠湊以夷逕帶以通衢鼓柯命風振葉致凉開明過於八闥兮重陰踰乎九房疾愈賦余體氣不龢飲食漸損旬有餘日衆疾並除饋食纎纎而日尠體貌廉廉而轉損校朝夕其未殊驗朔望而减本形容消而憔悴體質憊而狼狽内憂深而慮逺乃量餐而度帶講和緩之餘論尋越人之遺方考異同以求中稽衆術而簡良㑹異端於妙門乃歸竒於渉㕓惟兹藥之攸造寶明中之皆堅九以三七為劑服以四獻為程勢終朝而始發景未昃而身輕食信宿而異量體渉旬而告平䇿贒良對䇿時詔諸賢良方正㑹東堂䇿問虞對擢為太子舎人臣聞古之聖明原始以要終體本以正末故憂法度之不當而不憂人物之失所憂人物之失所而不憂災害之流行誠以法得於此則物理於彼人和於下則災消於上其有日月之𤯝水旱之災則反聽内視求其所由逺考諸物近驗諸身耳目聽察豈或有蔽其聰明者乎動心出令豈或有傾其常正者乎大官大職豈或有授非其人者乎賞罸黜陟豈或有不得其所者乎河濱山巖豈或有懐道釣築而未感於夢兆者乎方外遐裔豈或有命世傑岀而未蒙膏澤者乎推此類也以求其故詢事考言以盡其實則天人之情可得而見咎徴之至可得而救也若推之於物則無忤求之於身則無尤萬物理順内外咸宜祝史正辭言不負誠而日月失行天癘不戒此則陰陽之事非吉凶所在也期運度數自然之分固非人事所能供御其亦振廩散滯貶食省用而已矣是故誠遇期運則雖陶唐殷湯有所不變茍非期運則宋衛之君諸侯之相猶能有感唯陛下審其所由以盡其理則天下幸甚臣生長篳門不見異物雖有賢才所未接識不敢瞽言妄舉無以疇答聖問表普増位一等表時太廟初建詔普増位一等後以主者承詔失㫖改除之虞上表詔從焉臣聞昔之聖明不愛千乘之國而惜桐葉之信所以重至尊之命而逹於萬國之誠也前乙已赦書逺稱先帝遺惠餘澤普増位一等以酬四海欣戴之心驛書班下被於逺近莫不鳥騰魚躍喜䝉徳澤今一旦更以主者思文不審收既往之詔奪已澍之施臣之愚心竊以為不可討論新禮表晉國建文帝命荀顗撰為新禮太康初付尚書郎摯虞討論虞表所宜損増本傳元康中遷吳王友討論新禮臣典校故太尉顗所撰五禮臣以為夫革命以垂綂帝王之美事也隆禮以率教邦國之大務也是以臣前表禮事稽留求速訖施行又以䘮服最多疑闕宜見補定又以今禮篇巻煩重宜隨類通合事乆不岀懼見寢嘿葢冠婚祭㑹諸吉禮其制少變至於䘮服世之要用而特易失㫖故子張疑高宗諒陰三年子思不聽其子服岀母子游謂異父昆弟大功而子夏謂之齊衰及孔子殁而門人疑於所服此等皆明逹習禮仰讀周典俯師仲尼漸漬聖訓講肄積年及遇䘮事猶尚若此明䘮禮易惑不可不詳也况自此已來篇章焚散去聖彌逺䘮制詭謬固其宜矣是以䘮服一巻卷不盈握而争説紛然三年之䘮鄭云二十七月王云二十五月改塟之服鄭云服緦三月王云塟訖而除繼母岀嫁鄭云皆服王云從乎繼寄育乃為之服無服之殤鄭云子生一月哭之一日王云以哭之日易服之月如此者甚衆䘮服本文省略必待注解事義乃彰其傳説差詳世稱子夏所作鄭王祖經宗傳而各有異同天下並疑莫知所定而顗直書古經文而已盡除子夏傳及先儒注說其事不可得行及其行事故當還頒異説一彼一此非所以定制也臣以為今宜叅采禮記略取傳説補其未備一其殊義可依凖王景侯所撰䘮服變除使類綂明正以斷疑争然後制無二門咸同所由又有此禮當班於天下不宜繁多顗為百六十五篇篇為一巻合十五餘萬言臣猶謂巻多文煩類皆重岀按尚書尭典祀山川之禮惟於東嶽備補牲幣之數陳所用之儀其餘則但曰如初周禮配天地五常享先王其事同者皆曰亦如之文約而義舉今禮儀事同而名異者輙别為篇巻煩而不典皆宜省文通事隨類合之事有不同乃列其異如此所減三分之一奏明堂議奏晉初明堂以文帝配後復以宣帝尋復還以文帝配其餘無所變革至是虞議云云詔從之漢魏故事明堂祀五帝之神新禮五帝即上帝即天帝也明堂除五帝之位惟祭上帝按仲尼稱郊祀后稷以配天宗祀文王於明堂以配上帝周禮祀天旅上帝祀地旅四望望非地則上帝非天斷可識矣郊丘之祀掃地而祭牲用繭栗器用陶匏事反其始故配以逺祖明堂之祭備物以薦三牲並陳籩豆成列禮同人理故配以近考郊堂兆位居然異體牲牢品物質文殊趣且祖考同配非謂尊嚴之美三日再祀非謂不黷之義其非一神亦足明矣昔在上古生為明王没則配五行故太昊配木神農配火少昊配金顓頊配水黄帝配土此五帝者配天之神同兆之於四郊報之於明堂祀天大裘而冕五帝亦如之或以為五精之帝佐天育物者也前代相因莫之或廢晉初始從異議庚午詔書明堂及南郊除五帝之位惟祀天神新禮奉而用之前太醫令韓楊上書宜如舊祀五帝太康十年詔已施用宜定新禮明堂及郊祀五帝如舊議二社奏奏上詔從之臣按祭法王為羣姓立社曰太社王自為立社曰王社周禮大司徒設其社稷之壝又曰以血祭社稷則太社也又曰封人掌設王之社壝又有軍旅宜乎社則王社也太社為羣姓祈報祈報有時主不可廢故凡袚社釁鼓主奉以從是也此皆二社之明文前代之所尊以尚書召誥社于新邑三牲各文詩稱乃立冡土無兩社之文故廢帝社惟立太社詩書所稱各指一事又皆在公旦制作之前未可以易周禮之明典祭法之正義前改建廟社營一社之處朝議斐然執古匡今世祖武皇帝躬發明詔定二社之義以為永制宜定新禮從二社祀六宗奏晉受命司馬彪等表六宗之祀不應特立新禮于是遂罷其祀其後摯虞奏之詔從焉按舜受終類于上帝禋于六宗望于山川則六宗非上帝之神又非山川之靈也周禮肆師職曰用牲于社宗黨正職曰春秋祭禜亦如之肆師之宗與社並列則班與社同也黨正之宗文不繫社則神與社異也周之命祀莫重郊社宗同于社則貴神明矣又月令孟冬祈于天宗則周禮祭禜月令天宗六宗之神也漢光武即位高邑依虞書禋于六宗安帝元初中立祀乾位禮同太社魏氏因之至景初二年大議其神朝士紛紛各有所執惟散騎常侍劉邵以為萬物負陰而抱陽冲氣以為和六宗者太極冲和之氣為六氣之宗者也虞書謂之六宗周書謂之天宗是時考論異同而從其議漢魏相仍著為貴祀凡崇祀百神放而不致有其興之則莫敢廢之宜定新禮祀六宗如舊議祀皋陶議故事祀皋陶于廷尉寺新禮移祀于律署以同祭先聖于太學也故事祀以社日新禮改以孟秋之月以應秋政故虞云然詔可按虞書皋陶作士師惟明克允國重其功人思其當是以獄官禮其神繫者致其祭功在斷獄之成不在律令之始也太學之設義重太常故祭于太學是崇聖而從重也律署之置卑於廷尉移祀於署是去重而就輕也律非正署廢興無常宜如舊祀於廷尉又祭用仲春義取重生改用孟秋以應刑殺理未足以相易宜定新禮皆如舊制廟設次殿議魏故事天子為次殿於廟殿之北東天子入自北門新禮設次殿于南門中門外之右天子入自南門虞議從之次殿所以為解息之處凡適尊以不顯為恭以由隱為順而設之於上位入自南門非謙厭之義宜定新禮皆如舊説皇太孫薨服議惠帝太安元年三月皇太孫尚薨有司奏御服齊衰朞詔下通議太子初生舉以成人之禮則殤理除矣太孫亦體君傳重由位成而服全非以年也天子無服殤之義絶朞故也國䘮佩劒綬議魏氏故事國有大䘮羣臣凶服以帛為綬囊以布為劍衣新禮以傳去䘮無所不佩明在䘮則無佩也更制齊斬之䘮不佩劍綬虞議詔從之周禮武賁氏士大夫之職也皆以兵守王宫國有䘮故則衰葛執戈楯守門塟則從車而哭又成王崩太保命諸大夫以干戈内外警設明䘮故之際葢重宿衛之防去䘮無所不佩謂服飾之事不謂防禦之用宜定新禮布衣劒如舊其餘如新制國䘮服制議古者無事故䘮三年非訖塟除心䘮也後代一日萬機故魏權制晉氏加以心服非三年也吉駕導䘮議漢魏故事將塟設吉凶鹵簿皆有鼔吹新禮以禮無吉駕導從之文臣子不宜釋其衰麻以服𤣥黄除吉駕鹵簿又凶事無樂遏宻八音除凶服之鼔吹虞議詔從之塟有祥車曠左則今之容車也既塟日中反虞逆神而還春秋傳鄭大夫公孫蠆卒天子追賜大路使以行士䘮禮塟有稾乘車以載生之服此皆不惟載柩兼有吉駕之明文也既設吉駕則宜有導從以象平生之容明不致死之義臣子衰麻不得為身而釋以為君父則無不可顧命之篇足以明之宜定新禮設吉服導從如舊其凶服鼓吹宜除輓歌議漢魏故事大䘮及大臣之䘮執紼者輓歌新禮以為輓歌岀于漢武帝役人之勞歌聲哀切遂以為送終之禮雖音曲摧愴非經典所制違禮設衘枚之義方在號慕不宜以歌為名除不輓歌虞議詔從之輓歌因倡和而為摧愴之聲衘枚所以全哀此亦以感衆雖非經典所載是歴代故事詩稱君子作歌惟以告哀以歌為名亦無所嫌宜定新禮如舊寄公齊衰服議䘮服記公為所寓齊衰三月新禮以今無此事除此一章虞議詔從之周禮作樂於刑厝之時而著荒政十二禮􅊀制待物不以時衰而除盛典世隆而闕衰教也曩者王司徒失守播越自稱寄公是時天下又多此比皆禮之所及宜定新禮自如舊經諸侯公孤絶朞議新禮王公五等諸侯成國置卿者及朝廷公孤之爵皆傍親絶朞而傍親為之服斬衰卿挍位從大夫者皆絶緦虞議從之古者諸侯君臨其國臣諸父兄今之諸侯未同于古未同于古則其尊未全不宜便從絶朞之制而令傍親服斬衰之重也諸侯既然則公孤之爵亦宜如舊昔魏武帝建安中已曽表上漢朝依古為制事與古異皆不施行施行者著魏科大晉采以著令宜定新禮皆如舊師服議䘮服無弟子為師服之制新禮弟子為師齊衰三月虞議詔從之自古無師服之制故仲尼之䘮門人疑於所服子貢曰昔夫子之䘮顔回若䘮子而無服請䘮夫子若䘮父而無服遂心䘮三年此則懐三年之哀而無齊衰之制也羣居入則絰岀則否所謂弔服加麻也先聖為禮必易從而可傳師徒義誠重而服制不著歴代相襲不以為缺且尋師者以彌高為得故屢遷而不嫌修業者以日新為益故舎舊而不疑仲尼稱三人行必有我師焉子貢云夫何常師之有淺學之師暫學之師不可皆為之服義有輕重服有廢興則臧否由之而起是非因之而争愛惡相攻悔吝生焉宜定新禮無服如舊巡狩建旗議魏氏無巡狩故事新禮則巡狩方岳柴望告至設壝宫如禮諸侯之覲者擯及執贄皆如朝儀而不建其旗臣虞案覲禮諸侯覲天子各建其旗旗章所以殊爵命示等威詩稱君子至止言觀其旂宜定新禮建旗如舊禮皇太子稱臣議漢魏故事皇太子稱臣新禮以太子既以子為名而又稱臣臣子兼稱于義不通除太子稱臣之制虞議詔從之孝經資于事父以事君義兼臣子則不嫌稱臣宜定新禮皇太子稱臣如舊夫人答拜羣妾議漢魏故事王公羣妾見於夫人夫人不答拜新禮以為禮無不答更制妃公侯夫人答妾拜虞議詔可其議禮妾事女君如婦之事姑妾服女君朞女君不報則敬與婦同而又加賤也名位不同本無酬報禮無不答義不謂此先聖殊嫡庻之别以絶陵替之漸峻明其防猶有僣違宜定新禮自如其舊新禮議漢魏故事遣將岀征符節郎授鉞於朝堂新禮遣將御臨軒尚書授節鉞依古兵書跪而推轂之義也駁宜用古尺駁陳勰掘地得古尺尚書奏今尺長于古尺宜以古為正潘岳以為習用已乆不宜復改虞駁之昔聖人有以見天下之􅄨而擬其形容象物制器以存時用故參天兩地以正筭數之紀依律計分以定長短之度其作之也有則故用之也有徴考步兩儀則天地無所隱其情凖正三辰則懸象無所容其謬施之金石則音韻和諧措之規矩則器用合宜一本不差而萬物皆正及其差也事皆反是今尺長於古尺幾於半寸樂府用之律吕不合史官用之歴象失占醫署用之孔穴乖錯此三者度量之所由生得失之所取徴皆絓閡而不得通故宜改今而從古也唐虞之制同律度量衡仲尼之訓謹權審度今兩尺並用不可謂之同知失而行不可謂之謹不同不謹是謂謬法非所以軌物垂則示人之極凡物有多而易改亦有少而難變亦有改而致煩有變而之簡度量是人所常用而長短非人所戀惜是多而易改者也正失於得反邪於正一時之變永世無二是變而之簡者也憲章成式不失舊物季末茍合之制異端雜亂之用當以時釐改貞夫一者也臣以為宜如所奏五禮冠議駁天子即位之日即為成君冕服以備不宜有加諸侯即位為成豈不定諸侯成君不拘盛典而可以冠天子成君獨有火龍黼衣便不可乎意為宜冠有加書答杜預論皇太子除服書泰始十年楊皇后崩博士張靖等議以皇太子宜從制釋服衆議不同虞為吳王友答預書從之於時内外卒聞預議或謂違禮預使段暢撰探典籍以為定證僕以為除服誠合事宜附古則意有未安五服之制成於周室周室以前仰迄上古雖有在䘮之哀未有行䘮之制故尭稱遏宻殷曰諒闇各舉其事而言非未塟降除之名也禮有定制孝景之即吉方進之從時皆未足為凖葢聖人之於禮譏其失而通其變今皇太子未就東宫猶在殿省之内故不得伸其哀情以宜奪制何必附之於古欽以舊義哉又唐稱遏宻殷云諒闇各舉事以為名非既塟有殊降周室以來謂之䘮服䘮服者以服表䘮今帝者一日萬機太子監撫之重以宜奪禮塟訖除服變制通理垂典將來何必附之於古使老儒致争哉駁河内宜立學書河内太守魯䕫使民二百家共立一學未成而司隸奏以違法尚書郎中騎都尉臣摯虞駁䕫為近畿大都朝所委任親臨民物足識事宜累表仍上求二百家立一學是其留心學校必欲有成也牋致齊王冏牋武帝問華誰可託後事者對曰明徳至親莫如齊王攸微為忤㫖後華誅攸子冏輔政虞致箋于冏冏表求通議間於張華沒後入中書省得華先帝時答詔本草先帝問華可以輔政持重付以後事者華答明徳至親莫如先王宜留以為社稷之鎮其忠良之謀欵誠之言信於幽㝠没而後彰與茍且隨時者不可同世而論也議者有責華以愍懐太子之事不抗節廷争當此之時諫者必得違命之死先聖之教死而無益者不以責人故晏嬰齊之正卿不死崔杼之難季札吳之宗臣不争順逆之理理之盡而無所施者固聖教之所不責也頌太康頌虞擢太子舎人除聞喜令時天子留心正道吳宼初平上太康頌以美晉徳於休上古人之資始四隩咸宅萬國同軌有漢不競䘮亂靡紀畿服外叛侯衛内圮天難既降時惟鞠凶龍戰虎争分裂遐邦備僣岷蜀度逆海東權乃縁間割據三江明明上帝臨下有赫乃宣皇威致天之辟奮武遼隧罪人斯獲撫定朝鮮奄征韓貊文既應期席巻梁益元憝委命九夷重譯卭冉哀牢是焉底績我皇之登二國既平靡適不懐以育羣生吳乃負固放命南㝠聲教未暨弗及王靈皇震其威赫如雷霆截彼江沔荆舒以清邈矣聖皇叅乾兩離陶化以正取亂以竒耀武六旬輿徒不疲飲至數實干旄無虧洋洋四海率禮和樂穆穆宫廟歌雍詠鑠光天之下莫匪帝略窮髪反景承正受朔龍馬騤騤風于華陽弓矢櫜服干戈戢藏嚴嚴南金業業餘皇雄劒班朝造舟為梁聖明有造寔代天工天地不違黎元時邕三務斯恊用底厥庸既逺其迹將明其蹤喬山惟嶽望帝之封猗歟聖帝胡不封哉釋奠頌如彼泉流不盈不運講業既終禮師釋奠升觴樽俎上下惟讌邕邕其來肅肅其見連理槐頌東宫正徳之内承華之外槐樹二枝連理而生二幹一心以蕃本根箴尚書令箴明明先王開國承家作制垂憲仰觀列曜俯令百官政用㒺僣昔舜納大麓七政以齊内成外平而風雨不迷山甫翼周靡剛靡柔補我衮闕闡我王猷王猷允塞而四海咸休雖聖雖明必資良材無曰我智官不任能發言如絲其岀成綸千里之應樞機在身三季道􅆙天綱縱替既無老成改舊法制法制不修不長厥裔尚臣司臺取告侍衛山甫一作仲山闕作職雖聖句作雖曰聖明資作賴修作循告作言新婚箴今在哲人室家不造結髪之麗不同偕老既納新配内芬外藻厚味腊毒大命將夭色不可躭命不可輕君子是憚敢告後生贊庖犧贊昔在上古惟徳居位庖犧作王世尚醇懿設卦分象開物紀類施罟設網人用不匱神農贊神農居世通變該極民衆獸尠乃教稼穡聚貨交市草木播植務濟其本不通其飾黄帝贊黄帝在位實號軒轅車以行陸舟以濟川弧矢之利彌難消息垂衣而治萬國乂安唐尭贊唐帝放勲欽明文思惟天為大惟尭則之巍巍蕩蕩萬邦雍熈夏禹贊決隄疏河刋山敷土四隩既宅彞倫攸敘卑宫菲食以寧區宇殷湯贊睿也惟商實惟成湯三五迭興舎帝稱王周文王贊周文翼翼儀刑體教上帝是臨神明是勞東鄰之昏西鄰之曜九有既集以聖易暴周武王贊於皇武王天命是鍾七徳既曜莫不率從奄清宇宙盪商之蹤周宣王贊宣王承衰邦家多阻懲難思理官人以叙山甫補闕方叔禦侮是用中興恢復周宇漢高祖贊漢祖明逹兼資權武總御羣雄剪翕强楚奄正華夏經略區宇遂登天位纉尭之緒漢文帝贊漢之光大實惟孝文體仁尚儉克已為君按轡細栁抑尊成軍營兆南原陵不崇墳孔子贊仲尼大聖遭時昏荒河圖沈翳鳯鳥幽藏爰整禮樂以綜三綱因史立法是謂素王顔子贊顔子亹亹仁心不違行無貳過知章知微左丘明贊丘明作史時惟衰周錯綜墳籍思𢎞徽猷闡明正典光演春秋誕宣聖㫖曠代彌休銘武庫銘有財無義惟家之殃無愛糞土以毁五常門銘祿無常家福無定門人謀鬼謀道在則尊竈屋銘大孝養志厥此養形事親以敬美過三牲誥遷宅誥惟㤗始三年九月上旬涉自洛川周于原阿乃卜昌水東黄水西背山面隰故此稱良論文章流别論頌文章者所以宣上下之象明人倫之叙窮理盡性以究萬物之宜者也王澤流而詩作成功臻而頌興徳勲立而銘著嘉美終而誄集祝史陳辭官箴王闕周禮太師掌教六詩曰風曰賦曰比曰興曰雅曰頌言一國之事繫一人之本謂之風言天下之事形四方之風謂之雅頌者美盛徳之形容賦者敷陳之稱也比者喻類之言也興者有感之辭也後世之為詩者多矣其功徳者謂之頌其餘則總謂之詩頌詩之美者也古者聖帝明王功成治定而頌聲興於是史録其篇工歌其章以奏於宗廟告於鬼神故頌之所美者聖王之徳也則以為律吕或以頌形或以頌聲其細也甚非古頌之意昔班固為安豐戴侯頌史岑為岀師頌和熹鄧后頌與魯頌體意相類而文辭之異古今之變也揚雄趙充國頌頌而似雅傳毅顯宗頌文與周頌相似而雜以風雅之意若馬融廣成上林之屬純為今賦之體而謂之頌失之逺矣詩書云詩言志歌永言言其志謂之詩古有採詩之官王者以知得失古之詩有三言四言五言六言七言九言古詩卒以四言為體而時有一句二句雜在四言之間後世演之遂以為篇古詩之三言者振振鷺鷺于飛之屬是也漢郊廟歌多用之五言者誰謂雀無角何以穿我屋之屬是也于俳諧倡樂多用之六言者我姑酌彼金罍之屬是也樂府亦用之七言者交交黄鳥止于桑之屬是也於俳諧倡樂世用之古詩之九言者泂酌彼行潦挹彼注兹之屬是也不入歌謡之章故世希為之夫詩雖以情志為本而以成聲為節然則雅音之韵四言為正其餘雖備曲折之體而非音之正也七七發造於枚乘借吳楚以為客主先言出輿入輦蹷痿之損深宫洞房寒暑之疾靡曼美色宴安之毒厚味煖服淫曜之害宜聽世之君子要言妙道以疏神導體蠲淹滯之累既設此辭以顯明去就之路而後説以聲色逸游之樂其説不入乃陳聖人辨士講論之娛而霍然疾瘳此因膏粱之常疾以為匡勸雖有甚㤗之辭而不没其諷諭之義也其流遂廣其義遂變率有辭人滛麗之尤矣崔駰既作七依而假非有先生之言曰嗚呼揚雄有言童子雕蟲篆刻俄而曰壯夫不為也孔子疾小言破道斯文之族豈不謂義不足而辨有餘者乎賦者將以諷吾恐其不免於勸也賦賦者敷陳之稱古詩之流也古之作詩者發乎情止乎禮義情之發因辭以形之禮義之指須事以明之故有賦焉所以假象盡辭敷陳其志前世為賦者有孫卿屈原尚頗有古詩之義至宋玉則多滛浮之病矣楚辭之賦賦之善者也故楊子稱賦莫深於離騷賈誼之作則屈原儔也古詩之賦以情義為主以事類為佐今之賦以事形為本以義正為助情義為主則言省而文有例矣事形為本則言當而辭無常矣文之煩省辭之險易葢由於此夫假象過大則與類相逺逸辭過壯則與事相違辯言過理則與義相失麗靡過美則與情相悖此四過者所以背大體而害政教是以司馬遷割相如之浮説揚雄疾辭人之賦麗以淫也箴揚雄依虞箴作十二州十二官箴而傳于世不具九官崔氏累世彌縫其闕胡公又以次其首目而為之解署曰百官箴銘夫古之銘至約今之銘至煩亦有由也質文時異則既論之矣且上古之銘銘於宗廟之碑蔡邕為楊公作碑其文典正末世之美者也後世以來器銘之佳者有王莽鼎銘嘉量諸侯大夫銘太常勒鍾鼎之義所言雖殊而令徳一也李尤為銘自山河都邑至于刀筆笇契無不有銘而文多穢病討論而潤色亦可采録誄詩頌箴銘之篇皆有往古成文可放依而作惟誄無定制故作者多異焉見於典籍者左傳有魯哀公為孔子誄哀辭哀辭者誄之流也崔瑗蘇順馬融等為之率以施於童殤夭折不以壽終者建安中文帝與臨淄侯各失稚子命徐幹劉禎等為之哀辭哀辭之體以哀痛為主縁以歎息之辭文若解嘲之𢎞緩優大應賓之淵懿温雅連㫖之壯厲忼慷應間之綢繆契濶郁郁彬彬靡有不長焉矣圖䜟圖䜟之屬雖非正文之制然以取其縱横有義反覆成章碑銘古有宗廟之碑後世立碑于墓顯之衢路其所載者銘辭也又以上散見藝文類聚北堂書鈔太平御覧諸書此復見廣文選似合二首為一井載之文章者所以宣上下之像明人倫之叙窮理盡性以究萬物之宜者也王澤流而詩作成功臻而頌興徳勲立而銘著嘉美終而誄集祝史陳辭官箴王闕周禮太師掌教六詩曰風曰賦曰比曰興曰雅曰頌言一國之事繫一人之本謂之風言天下之事形四方之風謂之雅頌者美盛徳之形容賦者敷陳之稱也比者喻類之言也興者有感之辭也後世之為詩者多矣其功徳者謂之頌其餘則總謂之詩頌詩之美者也古者聖帝明王功成治定而頌聲興於是奏于宗廟告於鬼神故頌之所美者聖王之徳也古之作詩者發乎情止乎禮義情之發因辭以形之禮義之指須事以明之故有賦焉所以假象盡辭敷陳其志古詩之賦以情義為主以事類為佐今之賦以事形為本以義正為助情意為主則言省而文有例矣事形為本則言當而辭無常文之煩省辭之險易葢由于此夫假象過大則與類相逺逸辭過壯則與事相違辯言過理則與義相失麗靡通美則與情相悖此四過者所以背大體而害政教是以司馬遷割相如之浮説揚雄疾辭人之賦麗以淫詩之流也有三言四言五言六言七言九言古詩率以四言為體而時有一句二句雜在四言之間後世演之遂以為篇古詩之三言者振振鷺鷺于飛之屬是也五言者誰謂鼠無角何以穿我屋之屬是也六言者我姑酌彼金罍之屬是也七言者交交黄鳥止于桑之屬是也九言者泂酌彼行潦挹彼注兹之屬是也夫詩雖以情志為本而以成聲為節然則雅音之韻四言為正其餘雖偹曲折之體而非詩之正也對三日曲水對漢章帝時平原徐肇以三月初生三女至三日俱亡村人以為怪乃招擕之水濱洗袚遂因水以汎觴其義起此詩答杜育詩越有杜生既文且哲龍躍潁豫有聲彰澈賴兹三益如琢如切好以義結友以文㑹豈伊在高分定傾葢其人如玉美彼生芻鐘鼓匪樂安用百壺老夫灌灌離羣索居懐戀結好心焉悵如雍州詩於皇先王經啓九有有州維雍居京之右土載奥區山包神藪嘉生惟繁庻類伊阜悠悠州域有華有戎外接皮服内含岐豐周餘既没夷徳未終莫不慕義易俗移風包一作苞騷愍騷葢明哲之處身固度時以進退㤗則攄志於宇宙否則澄神於幽昩摛之莫究其外函之㒺識其内順陰陽以潛躍豈凝滯乎一槩漢魏六朝百三家集巻四十二
