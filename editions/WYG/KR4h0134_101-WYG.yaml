body:
  text: 漢魏六朝百三家集巻一百一吴均集題詞文中子云吳均孔珪古之狂者也其文怪以怒今叔庠集文鮮絶竒者獨餅説責璧二文頗詭博不經似得之枚叔七發行以排調與朱元思書盛稱富陽桐廬山水微矜摹擬則士龍鄮縣明逺大雷波瀾尚存謂之怪怒殆以此哉蕭梁之世史學蔚興隠侯既撰宋書叔庠追轡綜成齊代志慕甚廣乃借書不得私撰被訶雖幸免伯深之誅已書焚身廢本願乖塞史又云叔庠與何仲言同事梁武賦詩失指詔曰吳均不均何遜不遜遂永疎隔文人一身吐詞輒病仰觀長卿凌雲何獨無天子縁也詩什纍纍樂府尤髙續齊諧西京記則洞㝠述異之流無問真偽矣目録賦吳城賦八公山賦碎珠賦橘賦筆格賦表為建安讓加司徒表書與顧章書與朱元思書與施從事書檄檄江神責周穆王璧文食移説餅説連珠連珠二首樂府戰城南又又雉子班入關梅花落城上烏從軍行胡無人行雉朝飛操渡易水歌結客少年場妾安所居送歸曲夾樹城上麻擬古四首陌上桑秦王巻衣采蓮曲攜手曲采蓮曲三婦豔詩大垂手小垂手有所思雍臺楚妃曲白浮鳩陽春歌别鶴渌水曲緑竹行路難五首詩王侍中夜集登鍾山燕集望西靜壇與柳惲相贈答六首贈柳真陽贈任黄門二首酬蕭新浦王洗馬二首答蕭新浦酬周參軍贈杜容成贈朱從事贈姚郎贈王桂陽别三首酬别江主簿屯騎酬别贈别新林發湘州贈親故别三首同柳吳興烏亭集送柳舍人同柳吳興何山集送劉餘杭送柳吳興竹亭集初至壽春作登壽陽八公山壽陽還與親故别邊城將四首秋念春怨采藥大布山贈周散騎興嗣二首贈周興嗣四首入蘭室贈王治書僧孺江上酬鮑幾贈柳秘書詣周承不值因贈此詩遥贈周承周承未還重贈贈王桂陽酬郭臨丞憶費㫤酬聞人侍郎别三首贈鮑舂陵别别王謙奉使廬陵迎柳吳興道中至湘洲望南嶽登二妃廟詠懷二首古意七首閨怨二首去妾贈前夫詠少年詠雪雪春詠共賦韻詠庭中桐詠柳主人池前鶴寳劍詠燈别夏侯故章以服散鎗贈殷鈞梅花征客雜句四首山中雜詩三首詠雲二首詠慈姥磯石上松送吕外兵傷友漢魏六朝百三家集巻一百一目録欽定四庫全書漢魏六朝百三家集巻一百一明張溥輯吴均集賦吳城賦古樹荒煙幾千百年云是吳王所築越王所遷東有鑄劍殘水西有舞鶴故壥縈具區之廣澤帶姑蘇之逺山僕本蓄怨千悲億恨况復荆棘蕭森叢蘿彌蔓亭梧百尺皆歴地而生枝階筠萬丈或至杪而無葉不見春荷夏槿唯聞秋蟬冬蝶木魅晨走山鬼夜驚不知九州四海乃復有此吳城八公山賦峻極之山蓄聖表僊南參差而望越北邐迤而懷燕爾其盤桓基固含陽藏霧絶壁嶮􅇖層巖迴互桂皎月而常團雲望空而自布袖以華閬帶以潛淮文星亂石藻日流堦若夫神基巨鎮而卓犖荆河箕風畢雨育嶺生峩髙岑直兮蔽景修坂出兮架天以迎雲而就日若從漢而迴山露泫葉而原淨花照磯而岫鮮促嶂萬尋平崖億絶上被紫而烟生傍帶花而來雪維英王兮好僊㑹八公兮小山駕飛龍兮翩翩髙馳翔兮冲天碎珠賦寳月生焉越浦隋川標魏之美擅楚之賢既登席而趨麗亦綴履而升妍豈銜恩以赴時獨佩皎而騰天瀛淮激電甘海震雷明珠碎矣于川之隈視員流而失轉見折水之亡迴謝驪宫之瑞飾粉靈蚌之神胎若有人兮聲芒昧芳徽斷兮明珠碎明珠碎兮愴何宜珠之形兮不復全撫陸離之瓊珮吊幽翳之金筵豈照車與璿燭但黄塵及寒烟聊歌曰玉山之津兮已濡幽蘭之草兮亦舒又聞珩璧之獨照不見掌上之明珠已矣哉若使青雲之可尚當與碎珠之同棲橘賦増枝之木既稱英於緑地金衣之果亦委體於玉盤見雲夢之千樹笑江陵之十蘭葉葉之雲共琉璃而並碧枝枝之日與金輪而共丹若乃秋夜初露長郊欲素風齎寒而北來鴈銜霜而南渡方散藻於年深遂凝貞於冬暮筆格賦幽山之桂樹恒縈風而抱霧葉委鬱而陸離根縱横而盤互爾其負霜舍液枝翠心赤翦其匡條為此筆格趺闕則巖巖方爽似華山之孤生上管則員員峻逸若九疑之爭出長對坐而銜烟永臨牕而儲筆表為建安讓加司徒表臣聞𤣥黄之馬事絶於銜鑣蟠朽之材飾乖於丹漆何則千里之志已窮萬乘之器無取逺物近身於焉在譬書與顧章書僕去月謝病還覔薜蘿梅溪之西有石門山者森壁爭霞孤峰限日幽岫含雲深谿蓄翠蟬吟鶴唳水響猿啼英英相雜綿綿成韻既素重幽居遂葺宇其上幸富菊花偏饒竹實山谷所資於斯已辦仁智所樂豈徒語哉與朱元思書風煙俱淨天山共色從流飄蕩任意東西自富陽至桐廬一百許里竒山異水天下獨絶水皆縹碧千丈見底游魚細石直視無礙急湍甚箭猛浪若奔夾峰髙山皆生寒樹負勢競上互相軒邈爭髙直指千百成峰泉水激石泠泠作響好鳥相鳴嚶嚶成韻蟬則千轉不窮猨則百叫無絶鳶飛唳天者望峰息心經綸世務者窺谷忘反横柯上蔽在晝猶昏疎條交映有時見日與施從事書故鄣縣東三十五里有青山絶壁干天孤峰入漢緑嶂百重清川萬轉歸飛之烏千翼競來企水之猨百臂相接秋露為霜春蘿被逕風雨如晦鷄鳴不已信足蕩累頤物悟衷散賞檄檄江神責周穆王璧文昔穆王南巡自郢徂閩遺我文璧僉曰此津貫緯百紀薦歴千春念兹文璧故問水濵江漢朂之自求多益反我名瑞躍此華壁則富有漢川世為江伯如有負穢心迷懷釁情戚藏玉泥中匿珪魚腹使公孫躡波而長吁子羽濟川而怒目佽飛舞劒而東臨菑丘躍馬而南逐打素蛤而為粉碎紫貝其如粥又有川人勇俊處乎閩􅗛水居百里泥行萬宿右睨而河傾左咤而海覆乃把昆吾之銅純鉤之鐡被魚鱗之衣赴螺蚌之穴引㴻東隅移燋北島使蓬萊之根鬱而生塵瀛洲之足淨而可掃按驪龍取其頷下之珠搦鯨魚㧞其眼中之寳皇恩所被繁枯潤涸威之所加窮河絶漠願子三思反此明玉食移月光離畢風氣入箕細雨如網細柳如絲離隔東西之怨眺望山川之阻企龍門而不見覽桂枝而延佇此乃方寸之恒情羌難得而覼縷也亦有鮑叔分財華歆讓位乃相知於平生實忘懷於寤寐雞有呼羣之徳鹿有食草之美在㣲物其尚然况仁義之君子哉今足下居則廣夏髙堂連間洞房綺牕半巻屏風角張指天地如一指安知故人之可傷一死一生乃知交情一貴一賤交情乃見謂古今之恒談在今日而方見嗚呼如何忘我實多輙欲彈琴縱酒於首陽之阿君有厨中腐肉而僕不厭糟糠君有鴈鶩之食而余不得一嘗願以小人之腹為君子之腸何如哉今欲君之餘江臯緑葹之筍洞庭紫鬛之魚昆山龍胎之脯𤣥圃鳯足之葅千里蓴羮萬丈名膾氣馨若蘭色美如艾扶南甘蔗一丈三節白日炙之便銷清風吹之即折安定之梨皮薄味厚一嵗三花一枚二斗几厥上味惟君能施君若不施成君深累於神為不祥於人為僽義説餅説宋公至長安得姚泓時故大官丞程季者了了人也公曰今日之食何者最先季曰仲秋禦景離蟬欲靜燮燮曉風淒淒夜泠臣當此景唯能説餅公曰善季乃稱曰安定噎鳩之麥洛陽董徳之磨河東長若之葱隴西䑛背之犢枹罕赤髓之羊張掖比門之豉然以銀屑煎以金銚洞庭負霜之橘仇池連蔕之椒調以濟比之鹽剉以新豐之鷄細如華山之玉屑白如梁甫之銀泥既聞香而口悶亦見色而心迷公曰善連珠連珠二首蓋聞豔麗居身而以蛾眉入妬貞華炤物而以絶等見猜是以班姬辭寵非無妖冶之色揚子寂寞豈乏炫曜之才蓋聞義夫投節未必識君烈士赴危非期要利是以墨子縈帶不䝉肉食之謀申胥泣血非有執圭之位樂府戰城南蹀躞青驪馬徃戰城南畿五歴魚麗陣三入九重圍名慴武安將血汙秦王衣為君意氣重無功終不歸又此與下篇藝文失題列戰城南後英華遂以為題當再考前有濁樽酒一作酒尊憂思亂紛紛小來一作少年重意氣學劍不學文忽值胡關靜匈奴遂兩分天山已半出龍城無片雲漢世平如此何用李將軍又陌上何諠諠匈奴圍塞垣黑雲藏趙樹黄塵埋隴垠天子羽書勞將軍在玉門闕雉子班可憐雉子班羣飛集野甸文章始陸離意氣已驚狷幽并遊俠子直心亦如箭生死報君恩誰能孤恩眄入關羽檄起邊庭烽火亂如螢是時張博望夜赴交河城馬頭要落日劍尾掣流星君恩未得報何論身命傾梅花落終冬十二月寒風西北吹獨有梅花落飄蕩不依枝流連逐霜彩散漫下冰澌何當與春日共映芙蓉池城上烏嗚嗚城上烏翩翩尾畢逋凡生八九子夜夜啼相呼質微知慮少體賤毛衣麄陛下三萬嵗臣至執金吾從軍行男兒亦可憐立功在北邊陣頭横却月馬腹帶連錢懷戈發隴坻乘凍至遼川微誠君不愛終自直如弦胡無人行劍頭利如芒怕持照眼光鐡騎追驍虜金羈討黠羌髙秋八九月胡地早風霜男兒不惜死破膽與君嘗雉朝飛操二月雉朝飛横行傍壠歸斜看水外翟側聽嶺南翬躞蹀恒欲戰耿耿恃彊威當令君見賞何辭碎錦衣渡易水歌襍虜客來齊時余在角觝揚鞭渡易水直至龍城西日昬笳亂動天曙馬爭嘶不能通瀚海無面見三齊結客少年塲結客少年歸翩翩駿馬肥報恩殺人竟賢君賜錦衣握蘭登建禮拖玉入含暉顧看草𤣥者功名終自微妾安所居賤妾先有寵蛾眉進不遲一從西北麗無復城南期何因一作用暫豔逸豈為乏妍姿徒有黄昏望寧遇青樓時惟惜應門掩方餘永巷悲匡牀終不共何由横自私送歸曲送子獨南歸攬衣空憫黙關山晝欲暗河冰夜向塞燕至他人鄉鴈去還誰國寄子兩行書分明達濟北夾樹桂樹夾長陂復值清風吹氛氲揉芳葉連綿交密枝能迎春露㸃不逐秋風移願君長惠愛當使嵗寒知城上麻麻生滿城頭麻葉落城溝麻莖左右披溝水東西流少年感恩命奉劍事西周但令直心盡何用返封侯擬古四首陌上桑嫋嫋陌上桑蔭陌復垂塘長條映白日細葉隱鸝黄蠶飢妾復思拭淚且提筐故人寧知此離恨煎人腸秦王巻衣咸陽春草芳秦帝巻衣裳玉檢茱萸匣金泥蘇合香初芳薰複帳餘輝耀玉牀當須晏朝罷持此贈華陽一作龍陽采蓮曲錦帶襍花鈿羅衣垂緑川問子今何去出采江南蓮遼西三千里欲寄無因縁願君早旋返及此荷花鮮攜手曲豔裔陽之春攜手清洛濵雞鳴上林苑薄暮小平津長裾藻白日廣袖帶芳塵故交一如此新知詎憶人采蓮曲江風當夏一作夜清桂檝一作權逐流縈初疑京兆劍復似漢冠名荷香帶風逺蓮影向根生葉巻珠難溜花舒紅易傾日暮鳬舟滿歸來度錦城三婦豔詩大婦弦初切中婦管方吹少婦多姿態含笑逼清巵佳人勿餘及殷勤妾自知大垂手垂手忽迢迢飛燕掌中嬌羅衫恣風引輕帶任情揺詎似長沙地促舞不回腰小垂手舞女出西秦躡影舞陽春且復小垂手廣袖拂紅塵折腰應兩笛頓足轉雙巾蛾眉與曼臉見此空愁人有所思薄暮有所思終持淚煎骨春風驚我心秋露傷君髮雍臺雍臺十二樓樓樓鬱相望隴西飛狐口白日盡無光楚妃曲春妝約春黛如月復如蛾玉釵照繡領金薄側紅羅白浮鳩瑯琊白浮鳩紫翳飄陌頭食飲東莞野棲宿越王樓陽春歌紫苔初泛水連綿浮且没若欲歌陽春先歌青樓月别鶴别鶴尋故侣聨翩遼海間單棲孟津水驚唳隴頭山渌水曲香曖金堤滿湛淡春塘溢已送行臺花復倒髙樓日緑竹嬋娟鄣綺殿繞弱拂春漪何當逢採拾為君笙與篪行路難五首洞庭水上一株桐經霜觸浪困嚴風昔時抽心耀白日今旦卧死黄沙中洛陽名工見咨嗟一剪一刻作琵琶白璧規心學明月珊瑚映面作風花帝王見賞不見忘提擕把握登建章掩抑摧藏張女彈殷勤促柱楚明光年年月月對君子遥遥夜夜宿未央未央綵女棄鳴篪爭先拂拭生光儀茱萸錦衣玉作匣安念昔日枯樹枝不學衡山南嶺桂至今千載猶未知青𤨏門外安石榴連枝接葉夾御溝金墉城西合歡樹垂條照彩拂鳯樓遊俠少年游上路傾心傾倒想戀慕摩頂至足買片言開胷瀝膽取一顧自言家在趙邯鄲翩翩舌杪復劍端青驪白駮的盧馬金羈緑輕紫絲鞶躞蹀横行不肯進夜夜汗血至長安長安城中諸貴臣爭貴儒者席上珍復聞梁王好學問輕棄劍客如埃塵吾丘壽王始得意司馬相如適被申大才大辯尚如此何况我輩輕薄人君不見西陵田從横十字成陌阡君不見東郊道荒涼蕪没起寒烟盡是昔日帝王處歌姬舞女達天曙今日翩妍少年子不知華盛落前去吐心吐氣許他人今旦迴惑生猶豫山中桂樹自有枝心中方寸自相知何言嵗月忽若馳君之情意與我離還君玳瑁金雀釵不忍見此使心危君不見長安客舍門倡家少女名桃根貧窮夜紡無燈燭何言一朝奉至尊至尊離宫百餘處千門萬户不知曙唯聞啞啞城上烏玉欄金井牽轆轤丹梁翠柱飛流蘇香薪桂火炊雕胡一作彫菰當年翻覆無常定薄命為女何必麤君不見上林苑中客冰羅霧縠象牙席盡是得意忘言者探腸見膽無所惜白酒甜鹽甘如乳縁觴皎鏡華如碧少年持名不肯嘗安知白駒應過隙博山鑪中百和香鬱金蘇合及都梁逶迤好氣佳容貌經過青𤨏歴紫房已入中山馮玉臺作陰后帳復上皇帝班姬牀班姬失寵顔不開奉帚供養長信臺日暮耿耿不能寐秋風切切四面來玉階行路生細草金鑪香炭變成灰得意失意須臾頃一作間非君方寸逆所裁詩王侍中夜集抽蘭開石路剪竹製山扉文淪見渌水參差隱翠微西山採藥至東都謝病歸紡毛織野服縫芰作山衣欲知三青鳥簷上素雲飛登鍾山燕集望西靜壇客思何以緩春郊滿初律髙車陸離至駿騎差池出寳椀汎蓮花珍杯食竹實才勝商山四文髙竹林七復望子喬壇金繩藴緑帙風雲生屋宇芝映被仙室方隨鳯凰去悠然駕白日與柳惲相贈答六首黄驪飛上苑渌芷出汀洲日映昆明水春生鳷鵲樓飄颺白花舞爛漫紫萍流書織迴文錦無因寄隴頭思君甚瓊樹不見方離憂鳴鞭適大阿聨翩渡漳河燕姬及趙女挾瑟夜經過纎腰曳廣袖半額畫長蛾客本倦遊者箕帚在江沱故人不可棄新知空復何離居苦無樂回慕心悽悽要途訪趙使聞君仕執珪杜蘅色已發菖蒲葉未齊羃䍥蠶餌蠒差池燕吐泥願逐東風去飄蕩至遼西白日隱城樓勁風掃寒木離㭊隔東西執手異凉燠相思咽不言洞房清且肅嵗去甚流烟年來如轉軸别鶴千里飛孤雌夜未宿閒房肅已靜落月有餘輝寒蟲隱壁思秋蛾繞燭飛絶雲斷更合離禽去復歸佳人今何在迢逓江之沂一為别鶴㺯千里涙沾衣秋雲靜晩天寒夜方綿綿聞君吹急管相思雜采蓮别離未幾日髙月三成弦蹀疊黄河浪嘶唱隴頭絃寄君蘼蕪葉揷著叢臺邊贈柳真陽王孫清且貴築室芙蓉池羅生君子樹襍種女貞枝南牕帖雲母北户映琉璃銜書轆轤鳯坐水玉盤螭朝衣茱萸錦夜覆葡萄巵聨翩驂赤兎窈窕駕青驪龍泉甚鳴利如何獨不知贈任黄門二首相如體英彦左右生容輝已紆漢帝組復解梁王衣經過雲母扇出入千門扉連洲茂芳杜長山鬱翠微欲言終未敢徒然獨依依紛吾少馳騁自來乏名徳白玉鏤衢鞍黄金瑪瑙勒射鵰靈丘下驅馬鴈門北殷勤盡日華留連窮景黑嵗暮竟無成憂來坐黙黙酬蕭新浦王洸馬二首始可結交者文酒滿金壺圍碁帝臺局繫馬秦王蒲長劍皆玉具短笛悉銀塗送歸日愁滿留客袂紛吾今成桓山上秋風星散烏思君出江湄慷慨臨長薄獨對東風酒誰舉指南酌崇蘭白帶飛青鵁紫纓絡一年流淚同萬里相思各胡為舍旃去故人在宛洛答蕭新浦僕本二陵徒英豪多久要角觝良家兒期門惡年少身一作腰紆丈二組手擎尺一詔問子行何去髙帆􅋈江干今夜杯酒别明朝江水邊莓莓看細雨漠漠視濃烟颯灑八銅剪低昻五㑹船欲知故人者江南共采蓮悒然心不樂跨馬出城壕觀濤看白鷺望草見青袍青袍行中把蔽草覆平野公子不垂堂紛紛故交者肘懸辟邪印屋曜鴛鴦瓦翩翩流水車蕭蕭曳練馬是時君别我青莎没馬蹄連連文蠶蠒鷖鷖伺朝鷄今日余懷友積恨一作雪滿東西酬周參軍日暮憂人起倚户悵無懽水傳洞庭逺風送鴈門寒江南霜雪重相如衣服單沈雲隱喬樹細雨滅層巒且當對樽酒朱絃永夜彈贈杜容成一燕海上來一燕髙堂息一朝相逢遇依然舊相識問余來何遲山川幾紆直答言海路長風駛飛無力昔别縫羅衣春風初入帷今來夏欲晩桑扈一作桑蛾薄樹飛贈朱從事我行欲何之千里尋膠漆長葭歴渚生疎蒲縁岸出裊裊能隨風離離堪度日客思已飄蕩相思復非一未得幸殷勤先作數行泣贈姚郎星漢正參差佳人不在斯宿昔暫乖阻何異逺分離露染蘼蕪葉日照芃蘭枝風光已飄薄雲采復逶迤勞夢無人覺黙黙心自知贈王桂陽别三首昔聞楊伯起拖玉振清風髙華積海外名實滿山東自有五都相非無四世公臨牕驚白日倚匣曳輕虹願持鷦鷯羽嵗暮依梧桐客子慘無歡送别江之干白雲方𣺌𣺌黄鳥尚關關糾紛巫山石合㳫洞庭瀾行衣侵曉露征舠犯夜湍無因停合浦見此去一作𤣥珠還樹響浹山來猿一作溪聲繞岫急旅帆風飄揚行巾露沾濕深浪闇蒹葭濃雲没城邑不見别離人獨有相思泣酬别江主簿屯騎有客告將離贈言重蘭蕙泛舟當泛濟結交當結桂濟水有清源桂樹多芳根毛公與朱亥俱在信陵門趙瑟鳯凰柱吳醥金罍樽我有北山志留連為報恩夫君皆逸翮摶景復凌鶱白雲閒海樹秋日暗平原寒蟲鳴趯趯落葉飛翻翻何用贈分首自有北堂萱酬别故人杯酒别天清明月亮露下寒葭中風起秋江上衣染潺湲淚棹犯參差浪匕首直千金七寳雕華􅋔側亮反生離何用表賴此持相餉贈别新林一作江潭怨僕本幽并兒抱劍事邊陲風亂青絲絡霧染黄金羈天子既無賞公卿竟不知去去歸去來還傾鸚鵡杯氣為故交絶心為新知開但令寸心是何須銅雀臺發湘州贈親故别三首相送出江潯淚下沾衣襟何用叙離别臨岐贈好音敬通才如此君山學復深明哲遂無賞文華空見沈古來非一日無事更勞心雲生曉靄靄花落夜霏霏問金何意别答言倦遊歸徒勞易水布空負洛陽衣懐金無人别抱玉遂成非安得久留滯商山饒白薇君留朱門裏我至廣江濆城髙望猶見風多聽不聞流蘋方繞繞落葉向一作尚紛紛無由得共賞山川間白雲同柳吳興烏亭集送柳舍人河陽一悵望南浦送將歸雲山離晻曖花霧共依霏流連百舌哢下上陽禽飛桂舟無淹枻玉軫有離徽願君嗣蘭杜時采東臯薇同柳吳興何山集送劉餘杭王孫重離别置酒峯之畿逶迤川上草參差澗裏薇輕雲紉逺岫細雨沐單衣簷端水禽息牕上野螢飛君隨緑波逺我逐清風歸送柳吳興竹亭集平原不可望波瀾千里直夕魚汀下戯暮雨簷中息白雲時去來青峯復負側躑躅牛羊下晦昧崦嵫色王孫猶未歸且聽西光匿初至壽春作桓譚不賣交馮子任紆直浮溺逐波影飄揚恣風力北州少知舊南陽寡相識中駕每傾輪當鶱復摧翼望美無津梁私自憐何極登壽陽八公山逺澗自傾曲石溆復戔戔含珠岸恒翠懷玉浪多圓疎峯時吐月密樹下開天瑶繩盡𤣥秘金檢上竒篇是有琴髙者陵波去水仙壽陽還與親故别故人來送别帳酒臨行阡露繁秋色慢氣愴蟪聲煎鴈渡章華國葉亂洞庭天復有向隅淚中腸皆涕漣但願千丈松結景雲之峯山髙日華早枝多風彩重我還愛芳杜君住揖驪龍邊城將四首塞外何紛紛胡騎欲成羣爾時始應募來投霍冠軍刀含四尺影劍抱七星文袖間血灑地車中旌拂雲輕軀如未殯終當厚報君僕本邊城將馳射靈關下箭銜鴈門石氣振武安瓦勲輕賞廢丘名髙拜横野留書應鑿楹傳功須勒社徒傾七尺命酬恩終自寡聞君報一餐逺送出平野玉標丹霞劍金絡豔光馬髙旗入漢飛長鞭歴地寫曙星海中出曉月山頭下嵗晏坐論功自有思臣者臨淄重蹴踘曲城好擊刺不要身後名專騁眼前智君看班定逺立功不負義掣拽二丈旗躑躅雙鳬騎但問相知否死生無險易秋念團團珠暉轉昭昭漢陰移箕風入桂露璧月滿瑶池樹青草未落蟬涼葉已危還深長夜想顧憶臨卭巵芳杜果蕪没纓帶欲何為春怨四時如湍水飛奔兢迴復夜鳥響嚶嚶朝花照煜煜厭見花成子多看筍成一作為竹萬里斷音書十載異棲宿積愁落芳鬢長啼壞美目君去徃榆關妾留住函谷唯對昔邪房如愧蜘蛛屋獨喚響相酬還持影自逐象牀易氊簟羅衣變單複幾過度風霜猶能保㷀獨采藥大布山我本北山北縁澗采山麻九莖日反一作間照三葉長生花可用蠲憂疾聊持駐景斜景斜不可駐年來果如驅安得崑崙山偃蹇三珠樹三珠始結荄絳葉凌朱臺玉壺白鳯肺金鼎青龍胎韓衆及王子何世無仙才安期儻欲顧相見在蓬萊贈周散騎興嗣二首子雲好飲酒家在成都縣製賦已百篇彈琴復千轉敬通不富豪相如本貧賤共作失職人包山一相見昔一作吾賢當路者聲名振華夏朱輪玳瑁車紫鞚連錢馬朝花舞風中夜月窺牕下想君貴易朋居然應見舍贈周興嗣四首孺子賤而貧且非席上珍唯安萊蕪甑兼慕林宗巾百年逢繾綣千里遇殷勤願持江南蕙以贈生芻人思君欲何言中心亂如霧淚下非一端愁來誰有數子為馮敬通不減汲長孺千里無關梁安得王喬屨與君初相知不言異一宿意欲褰衣裳陰雲亂人目之子伏髙卧伊予空杼軸無因渡淇水見此猗猗竹可怨思公子終自不敢言青松蔽南隴白雲生北園沈憂無人語黙念空慿軒安得湛盧劍以報相知恩入蘭臺贈王治書僧孺故人揚子雲挍書麟閣下寂寞少交遊紛綸富文雅予為隴西使寓居洛陽社相思非不深行行避驄馬江上酬鮑幾振棹出江湄依依望九疑欲謁蒼梧帝過問沅湘姬折荷縫作蓋落羽紡成絲吾行别有意不為君道之贈柳秘書蘼蕪與丹桂竒心復竒骨已蔽蒼龍門又影鳯皇闕紫雲依夜來清風扶晩發鴛鷺若上天寄聲謝明月詣周承不值因贈此詩竹枝任風轉蘭心逐風巻青雲葉上團白露花中泫聞君入騎踈聊寄錦中書一隨平原客寧憶豫章徐遥贈周承巨石亂天涯雜樹鬱參差伯魚留蜀郡長房還葛陂練練波中月亭亭雲上枝髙岑蔽人者無處得相知周承未還重贈石渠闃無人子雲今何在顧望獨懐憂衘杯竟誰待散雪逐吹寒蓬姿浮霜采甘泉無竹花鵷雛欲還海贈王桂陽松生數寸時遂為草所没未見籠雲心誰知負霜骨弱幹可摧殘纎莖易凌忽何當數千尺為君覆明月酬郭臨丞聞君立名義我亦倦晨征馬在城上蹀劍自腰中鳴白日遼川暗黄塵隴坻驚願君但衘酒深知有素誠憶費㫤皎皎日將上獵獵起微風山没清波内帆在浮雲中直趣珠星北斜開碧海東故人若思我當念離根蓬酬聞人侍郎别三首悵然心不樂萬里向悠悠凌朝憇枉渚薄暮遵江洲君住青門上我發霸陵頭相思自有處春風明月樓整棹北川湄迴首望城邑林踈風至少山髙雲度急共懷萬里心各作千行泣欲見終無縁思君空佇立舉首川之折當作沂離鴻四向飛子憐三湘薛我憶五陵薇但使同嘉遁何必共輕肥思君美如玉不覺涙沾衣贈鮑舂陵别落葉思紛紛蟬聲猶可聞水中千丈月山上萬重雲海鴻來倐去林花合復分所憂别離意白露下霑裙别王謙嚴光不逐世流轉任飛蓬欲還天台嶺不狎甘泉宫離歌玉絃絶别酒金巵空倘遺故人念僕在東山東奉使廬陵悵然不自怡端憂坐漠漠風急鴈毛斷冰堅馬蹄落客子飢寒多江上衣􅏻薄何當報恩罷驅車還北郭迎柳吳興道中團團日西靡客念已蹉跎長風倒危葉輕練網寒波白雲光彩麗青松意氣多所言飽恩徳忘我北山蘿至湘洲望南嶽重波淪且直連山糾復紛鳥飛不復見風聲猶可聞朧朧樹裏月飄飄水上雲長安逺如此無縁得報君登二妃廟朝雲亂人目帝女湘川宿折菡巫山下采荇洞庭腹故以輕薄好千里命艫舳何事非相思江上葳蕤竹永懷二首僕本報恩人􅋅馬救東秦黄龍暗迢遞青泥寒苦辛野戰劍鋒盡攻城才智貧唯餘一死在留持贈主人元叔勢位卑長卿宦情寡二頃且營田三錢聊飲馬懸風白雲上挂月青山下心中欲有言未得忘言者古意七首雜虜冦銅鍉征役去三齊扶山剪疏勒傍海掃沈黎劍光夜揮電馬汗晝成泥何當見天子畫地取關西匈奴數欲盡僕在玉門關蓮花穿劍鍔秋月掩刀環春機思窈窕夏烏鳴綿蠻中人坐相望狂夫終未還西都盛冠蓋九逵塵霧塞中有惡少年伎能專自得玉鞭蓮花劍金苣流星勒聊為路傍人寫鞚長楸北賤妾思不堪採桑渭城南帶減連枝繡髪亂鳯皇篸一作簪花舞依長薄蛾一作鵝飛愛緑潭無由報君信流涕向春蠶妾本倡家女出入魏王宫既得承琱輦亦在更衣中蓮花衘青雀寳粟鈿金蟲猶言不得意流涕憶遼東何處報君書隴右五岐路泪研兎枝墨筆染鵝毛素碧浮孟渚水香下洞庭露應歸遂不歸芳春空擲度妾家横塘北發豔小長干花釵玉宛轉珠繩金絡紈一作九羃䍥懸丹一作青鳯逶迤揺白團誰能分見此含恨不能言閨怨二首胡笳屢悽斷征蓬未肻還妾坐江之介君戌小長安相去三千里參商書信難四時無人見誰復重羅紈春草可攬結妾心正斷絶緑鬢愁中改紅顔啼裏滅非獨淚成珠亦見珠成血願為飛鵲一作雙鵠鏡翩翩照離别玉臺作古意去妾贈前夫去妾在河橋相思復相遼鳯皇簮落髪蓮花帶緩腰腸從别處斷貌在淚中消願君憶疇昔片言時見饒詠少年董生唯巧笑子都信美目百萬市一言千金買相逐不道參差菜誰論窈窕淑願言捧繡被來就越人宿詠雪微風揺庭樹細雪下簾隙縈空如霧轉凝階似花積不見楊柳春徒看桂枝白零淚無人道相思空何益雪雪逐春風來過集巫山野爛漫雖可愛悠一作翻揚詎堪把問君何所思昔日同心者坐須風雪霽相期洛城下春詠春從何處來拂水復驚梅雲障青𤨏闥風吹承露臺美人隔千里羅幃閉不開無由得共語空對相思杯共賦韻詠庭中桐龍門有竒價自言梧桐枝華暉實掩映細葉能披離不降周王子空待嵗時移嚴風忽交勁遂使無人知詠柳細柳生堂北長風發鴈門秋霜常振葉春露詎濡根朝作離蟬宇暮成宿鳥園不為君所愛摧折當何言主人池前鶴本自乘軒者為君階下禽推藏多好貌清唳有竒音稻梁惠既重華池遇亦深懷恩未忍去非無江海心寳劍我有一寳劍出自昆吾溪照人如照水切玉如切泥鍔邊霜凛凛匣上風凄凄寄語張公子何當來見擕詠燈昔在鳯皇闕七采蓮花莖陸離看寳帳爛漫照文屏檐豔烟光轉氛氲霧裏輕能方三五夜桂樹月中生别夏侯故章白馬黄金羈青驪紫絲鞚新知關山别故人河梁送置此一函書為余逹雲夢以服散鎗贈殷鈞玉鉉布交文金丹煥仙説九沸翻成緩七轉良為切執以代疏麻長貽故人别梅花梅性本輕蕩世人相陵賤故作負霜集作雪花欲使綺羅見但願深相知千當作早摧非所戀征客公卿來帳别葭聲在狹斜玉樽浮雲蓋朱輪流水車鞚中懸明月劍杪照蓮花雜句四首晝蟬已傷念夜露復沾衣昔别曽何道今夕螢光飛錦腰連枝滴一作理繡領合歡斜夢中誰不見終成亂眼花蜘蛛簷下挂絡緯井邊啼何曽得見子照鏡牕東西泣聽離夕歌悲銜别時酒自從今日去當復相思否山中雜詩三首山際見來烟竹中窺落日鳥向簷上飛雲從牕裏出緑竹可充食女蘿可代裙山中自有宅桂樹籠青雲具區窮地險嵇山萬里餘奈何梁隠士一去無還書詠雲二首飄飄上碧虚藹藹隱青林氛氲如有意縈鬱詎無心白雲蒼梧來過拂章華臺逢河散復巻經風合且開詠慈姥磯石上松根為石所蟠枝為風所碎賴我有貞心終凌細草輩送吕外兵白雲浮海際明月落河濵送君長太息徒使淚沾巾傷友可憐桂樹枝懷芳君不知摧折寒山裏遂死無人窺漢魏六朝百三家集巻一百一
