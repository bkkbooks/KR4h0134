body:
  text: 漢魏六朝百三家集巻五十六晉郭璞集題詞神僊傳言郭河東得兵解之道今為水僊伯其然與否吾不敢知亦足見烈士殉義雖死可生亂臣賊子不能殺也景純才學見重明帝埓於温嶠庾亮余謂其抗節王敦贊成大事匡國之志嶠可庶幾亮安敢班哉雙栢鵲巢越城伍伯絶命之期先知之矣猶然解髪銜刀祈祥幽穢非茍求活欲觀須㬰得一當以報國家耳陳迹蚤亡呼之為福景純亦縱酒色自滅精神李陵惜死若所恥也負豫讓之忠蹈嵇生之禍豈非天乎阮嗣宗厭苦司馬以狂自晦彼亦無可如何不得已而逃為酒人景純則非無術以處敦者也令桓彝不窺裸袒生命不盡日中勤王之師義當先驅其取敦也猶廬江主人家婢爾南岡斷頭遺文彌烈今讀其集直臣諫諍神靈博物無不有也如斯人而不謂之仙乎不可得已目録賦南郊賦江賦巫咸山賦登百尺樓賦鹽池賦井賦流寓賦蜜蜂賦又蚍蜉賦疏省刑疏日有黒氣疏皇孫生請布澤疏平刑疏彈任谷疏禁荻疏表辭尚書表序山海經序爾雅序方言序設難客傲哀䇿文晉元帝哀䇿文漢魏六朝百三家集巻五十六目録欽定四庫全書漢魏六朝百三家集卷五十六明張溥輯晉郭璞集賦南郊賦於是時惟青陽日在方旭我后將受命靈壇乃改歩而鳴玉升金軒撫太僕揚六轡齊八騄列五幡於一元兮靡日月乎黄屋矯陵烏以偵候兮整豹尾於後屬武騎仡以清道被練煥以波燭爾乃造曠場戾壇庭百寮山立萬乘雲縈延祝史肆玉牲登圓丘揖太清禮羣望告皇靈天澄其氣日朗其精飛亷鼓舞於八維兮豐隆擊節於九㝠祝融穆以肅侍兮陽侯澹以中停於是司烜戒燧火烈具炳宗皇祖而配祀増孝思之惟永郊寰之内區域之外雕題卉服被髪左帶駿奔在壇不期而㑹峩峩羣辟蚩蚩黎庶翹懐聖猷思我王度事崇其簡服尚其素化無不融萬物自鼓振西北之絶維隆東南之撓柱廓清紫衢電掃神宇風馬桂林抗旌琳圃五岳不足以顯其勳九韶不足以贊其舞饗駭鬼方聲振丘隴倒影望風龍漢企踵爛若列星之環辰咸雲騰而海涌此蓋和氣旁通𤣥羅濳總自然之感鼓而遂動江賦咨五才之並用寔水德之靈長惟岷山之導江初發源乎濫觴聿經始於洛沫攏萬川乎巴梁衝巫峽以迅激躋江津而起漲極泓量而海運狀滔天以淼茫總括漢泗兼包淮湘并吞沅澧汲引沮漳源二分於崌崍流九派乎潯陽鼓洪濤於赤㟁淪餘波乎柴桑綱絡羣流商㩁涓澮表神委於江都混流宗而東㑹注五湖以漫漭灌三江而漰沛滈汗六州之域經營炎景之外所以作限於華夷壯天地之嶮介呼吸萬里吐納靈潮自然往復或夕或朝激逸勢以前驅乃鼓怒而作濤峨嵋為泉陽之掲玉壘作東别之標衡霍磊落以連鎮巫廬嵬崫而比嶠協靈通氣濆薄相陶流風蒸雷騰虹揚霄出信陽而長邁淙大壑與沃焦若乃巴東之峽夏后䟽鑿絶岸萬丈壁立赮駮虎牙嵥􅆆以屹崒荆門闕竦而磐礴圓淵九迴以懸騰湓流雷呴而電激駭浪暴灑驚波飛薄迅澓増澆湧湍疊躍砯巖鼓作漰湱灂㵗㶔􅀈􅲜潰濩泧漷潏湟淴泱㶖㴸㶒㵸漩澴滎瀯渨㵽濆瀑溭淢濜溳龍鱗結絡碧沙瀢􅘍而往來巨石硉矹以前却濳演之所汨淈奔溜之所磢錯厓隒為之泐嵃碕嶺為之嵒崿幽澗積岨礐硞䃕礭若乃曽潭之府靈湖之淵澄澹汪洸瀇滉囦泫泓汯泂澋涒鄰㘤潾混瀚灦渙流映揚焆溟漭𣺌湎汗汗沺沺察之無象尋之無邊氣滃浡以霧杳時鬱律其如烟類肧渾之未凝象太極之構天長波浹渫峻湍崔嵬盤渦谷轉凌濤山頽陽侯砐硪以岸起洪瀾涴演而雲迴峾淪溛瀤乍浥乍堆豃如地裂豁若天開觸曲厓以縈繞駭崩浪而相礧鼓㕉窟以漰渤乃湓湧而駕隈魚則江豚海狶叔鮪王鱣䱻鰊􅧺鮋鯪鰩鯩鰱或鹿觡象鼻或虎狀龍顔鱗甲鏙錯煥爛錦斑揚鬐掉尾噴浪飛唌排流呼哈隨波遊延或爆采以晃淵或嚇鰓乎巖間介鯨乘濤以出入鯼鮆順時而往還爾其水物怪錯則有濳鵠魚牛虎蛟鉤虵蜦􅡯鱟蝞鱝􅦄􅡷􅠦王珧海月土肉石華三蝬􅗶江鸚螺蜁蝸璅蛣腹蟹水母目蝦紫蚢如渠洪蚶專車瓊蚌晞曜以瑩珠石􅎕應節而揚葩蜛蠩森衰以垂翹𤣥蠣磈磥而碨䃁或泛瀲於潮波或混淪乎泥沙若乃龍鯉一角竒鶬九頭有鼈三足有龜六眸赬蟞胏躍而吐璣文􅚝磬鳴以孕璆䖺䗤拂翼而掣耀神蜧蝹蜦以沈遊􅖃馬騰波以嘘蹀水兕雷咆乎陽侯淵客築室於巖底鮫人構館於懸流雹布餘糧星離沙鏡青綸競紏縟組爭映紫菜熒􅁮以叢被緑苔鬖髿乎研上石㠶䝉蘢以蓋嶼萍實時出而漂泳其下則有金礦丹礫雲精爥銀珕珋璿瑰水碧濳瑉鳴石列於陽渚浮磬肆乎隂濱或熲彩輕漣或焆曜崖鄰林無不溽岸無不津其羽族也則有晨鵠天雞鴢鷔鷗􅠯陽鳥爰翔于以𤣥月千類萬聲自相喧聒濯翮䟽風鼓翅􅞡翽揮弄灑珠拊拂瀑沫集若霞布散如雲豁産毻積羽往來勃碣橉把稹薄於潯涘栛槤森嶺而羅峯桃枝篔簹實繁有叢葭蒲雲蔓䙬以蘭紅揚皜毦擢紫茸蔭潭隩被長江繁蔚芳蘺隱藹水松涯灌芊萰濳薈葱蘢鯪鯥跼於垠隒獱獺睒瞲乎厱空迅蜼臨虚以騁巧孤􅙱登危而雍容䕫㸸翹踛於夕陽鴛雛弄翮乎山東因岐成渚觸澗開渠潄壑生浦區别作湖磴之以瀿瀷渫之以尾閭標之以翠翳泛之以遊菰播匪蓺之芒種挺自然之嘉蔬鱗被菱荷攢布水蓏翹莖瀵蘂濯穎散裹隨風猗萎與波潭沲流光濳映景炎霞火其旁則有雲夢雷池彭蠡青草具區洮滆朱滻丹漅極望數百沆瀁皛溔爰有包山洞庭巴陵地道濳逵旁通幽岫窈窕金精玉英瑱其裏瑤珠怪石綷其表驪虯摎其址梢雲冠其㟽海童之所巡遊琴高之所靈矯氷夷倚浪以傲睨江妃含嚬而􅗻眇撫凌波而鳬躍吸翠霞而夭矯若乃宇宙澄寂八風不翔舟子於是搦棹涉人於是檥榜漂飛雲運艅艎舳艫相屬萬里連檣泝洄沿流或漁或商赴交益投幽浪竭南極窮東荒爾乃雰䘲於清旭覘五兩之動静長風颹以増扇廣莫䬅而氣整徐而不䬐疾而不猛鼓㠶迅越䞟漲截泂凌波縱柂電往杳溟䨴如晨霞孤征眇若雲翼絶嶺倐忽數百千里俄頃飛亷無以睎其蹤渠黄不能企其景於是蘆人漁子擯落江山衣則羽褐食惟蔬鱻栫澱為涔夾潨羅筌筩灑連鋒罾䍣比船或揮輪於懸碕或中瀨而横旋忽忘夕而宵歸詠採菱以叩舷傲自足於一嘔尋風波以窮年爾乃域之以盤巖豁之以洞壑䟽之以沲汜鼓之以朝夕川流之所歸湊雲霧之所蒸液珍怪之所化産傀竒之所窟宅納隱淪之列真挺異人乎精魄播靈潤於千里越岱宗之觸石及其譎變儵怳符祥非一動應無方感事而出經紀天地錯綜人術妙不可盡之於言事不可窮之於筆若乃岷精垂曜於東井陽侯遯形乎大波竒相得道而宅神乃協靈爽於湘娥駭黄龍之負舟識伯禹之仰嗟壯荆飛之擒蛟終成氣乎太阿悍要離之圖慶在中流而推戈悲靈均之任石歎漁父之櫂歌想周穆之濟師驅八駿於黿鼉感交甫之喪珮慜神使之嬰羅煥大塊之流形混萬盡於一科保不虧而永固稟元氣於靈和考川瀆之妙觀實莫著於江河巫咸山賦有序蓋巫咸者寔以鴻術為帝堯醫生為上公死為貴神豈封斯山而因以名之乎伊巫咸之名山崛孤停而嵥峙體岑峭以隆頽冠崇嶺以峻起配華霍以助鎮致靈潤乎百里爾乃寒泉懸涌浚湍流帶林薄叢籠幽蔚隠藹八風之所歸起遊鳥之所喧㑹濳瑕迴揚蘭茝迴翔鵷集凌鷮鷦翳禽鳥栖陽以晨鳴熊虎窟陰而夕㘁登百尺樓賦在青陽之季月登百尺以高觀嘉斯遊之可娯乃老氏之所嘆撫凌檻以遙想乃目極而肆運情眇然以思逺悵自失而濳愠瞻禹臺之隆崫竒巫咸之孤峙美鹽池之滉汙蒸紫雰而霞起異傅巖之幽人神介山之伯子揖首陽之二老招鬼谷之隱士嗟王室之蠢蠢方構怨而極武哀神器之遷浪指綴旒以譬主雄㦸列於廊板戎馬鳴乎講柱寤苕華而増恠歎飛駟之過户陟茲樓以曠眺情慨爾而懐古鹽池賦水潤下以作鹹莫斯鹽之最靈傍峻岳以發源池茫爾而海渟嗟𤣥液之濳洞羌莫知其所生狀委虵其若漢流漫漫以漭漭吁鑿鑿以粲粲色皜然而雪朗揚赤波之煥爛光旴旴以晃晃隆陽映而不焦洪涔沃而不長磊崔􅨻碓鍔剡棊方玉潤膏津雪白凌岡粲如散璽煥若布璋爛然漢明晃爾霞赤望之絳承即之雪積翠塗内映赬液外羃動而愈生損而滋益若乃煎海鑠泉或凍或漉所贍不過一鄉所營不過鍾斛飴戎見珍於西鄰火井擅竒乎巴濮豈若兹池之所産帶神邑之名嶽吸靈潤於河汾總膏液乎澮涑井賦益作井龍登天鑿后土洞黄泉濳源洊臻潏潏涓涓幽溟圓渟濙洞深𤣥爾乃冠玉檻甃鱗錯鼓轆轤揮勁索飛輕裾之繽紛手爭騖而互搦長縲委虵以曽縈兮瑤甕龍騰而灑激乃回澄以静映狀冏然而鏡灼挹之不損停之不溢莫察其源動而愈出信潤下而德施壯邑移以不改獨星陳於丘墟兮越百代而猶在守虛静以𤣥澹兮不東流而注海氣霧集以杳㝠兮聲雷駭而漰灂流寓賦戒雞晨而星發至猗氏而方曉觀屋落之隳殘顧但見乎丘棗嗟城池之不固何人物之希少越南山之高嶺修焦丘之微路駭斯徑之峻絶感王陽而增懼詰朝發於解池辰中暨乎河北思此縣之舊名蓋曩日之魏國詠詩人之流歌信風土之儉刻背茲邑之迥逝何險難之多厯望陜城於南涯存虢氏之疆埸實我姓之攸出邈有懐乎乃迹陟函谷之高關壯斯勢之險固過王成之丘墉想穀洛之合鬬惡王靈之壅流竒子喬之輕舉遊華輦而永懐乃凭軾以寓目思文公之所營蓋成周之墟域蜜蜂賦嗟品物之蠢蠢惟貞蟲之明族有叢瑣之細蜂亦䇿名於羽屬近浮遊於園薈逺翺翔乎林谷爰翔爰集蓬轉颷迴紛紜雪亂混池雲頽景翳曜靈響迅風雷爾乃眩援之雀下林天井青松冠谷赤蘿繡嶺無花不纒無陳不省吮瓊液於懸峰吸赮津乎晨景於是迴騖林篁經營堂窟繁布金房疊搆玉室咀嚼華滋釀以為蜜自然靈化莫識其術散似甘露凝如割肪冰鮮玉潤髓滑蘭香百藥須之以諧龢扁鵲得之而術良爾乃察其所安視其所託恒據中而虞難營翠微而結落徽號明於羽族閽衞固乎管籥誅戮峻於鈇鉞招徴速乎羽檄集不謀而同期動不安而齊約又窮味之美極甜之長百果須以諧和靈娥御以艶顔蚍蜉賦惟洪陶之萬殊賦羣形而遍灑物莫微於昆蟲屬莫賤乎螻蟻淫淫奕奕交錯往來行無遺迹騖不動埃迅雷震而不駭激風發而不動虎賁比而不懾龍劍揮而不恐乃吞舟而是制無小大與輕重因無心以致力果有象乎大勇出竒膠於九真流赬液其如血飾人士之喪具在四隅而交結濟齊國之窮師由山東之高垤感萌陽以濳出將知水而封穴伊斯蟲之愚昧乃先識而似悊䟽省刑䟽臣聞春秋之義貴元慎始故分至啟閉以觀雲物所以顯天人之綂存休咎之徵臣不揆淺見輒依歲首粗有所占卦得解之既濟按爻論思方渉春木王龍德之時而為廢水之氣來見乘加升陽未布隆陰仍積坎為法象刑獄所麗變坎加離厥象不燭以義推之皆為刑獄殷繁理者有壅濫又去年十二月二十九日太白蝕月月者屬坎羣陰之府所以照察幽情以佐太陽精者也太白金行之星而來犯之天意若曰形理失中自壊其所以為法者也臣術學庸近不練内事卦理所及敢不盡言又去秋以來沉雨跨年雖無金家渉火之祥然亦是刑獄充溢怨歎之氣所致往建興四年十二月中行丞相令史淳于伯刑於市而血逆流長標伯者小人雖罪在未允何足感動靈變致若斯之恠邪明皇天所以保祐金家子愛陛下屢見災異殷勤無已陛下宜側身思懼以應靈譴皇極之讁事不虚降不然恐將來必有愆陽苦雨之災崩震薄蝕之變狂狡蠢戾之妖以益陛下旰食之勞也臣謹尋按舊經尚書有五事供禦之術京房易傳有消復之救所以緣咎而致慶因異而邁政故木不生庭太戊無以隆雉不鳴鼎武丁不為宗夫寅畏者所以饗福怠慠者所以招患此自然之符應不可不察也按解卦繇云君子以赦過宥罪既濟云思患而豫防之臣愚以為宜發哀矜之詔引在予之責蕩除瑕釁贊陽布惠使幽斃之人應蒼生以悦育否滯之氣隨谷風而紓散此亦寄時事以制用藉開塞而曲成者也臣竊觀陛下貞明仁恕體之自然天假其祚奄有區夏啟重光於已昧廓四祖之遐武祥靈表瑞人鬼獻謀應天順時殆不尚此然陛下即位以來中興之化未闡雖躬綜萬幾勞逾日昃𤣥澤未加於羣生聲教未被乎宇宙臣主未寧於上黔細未輯於下鴻鴈之詠不興康衢之歌不作者何也仗道之情未著而任刑之風先彰經國之畧未震而軌物之迹屢遷夫法令不一則人情惑職次數改則覬覦生官方不審則粃政作懲勸不明則善惡渾此有國者之所慎也臣竊為陛下惜之夫以區區之曹參猶能遵蓋公之一言倚清靜以鎮俗寄市獄以容非德音不忘流詠于今漢之中宗聰悟獨斷可謂令主然厲意刑名用虧純德老子以禮為忠信之薄况刑又是禮之糟粕者乎夫無為而為之不宰以宰之固陛下之所體者也恥其君不為堯舜者亦豈惟古人是以敢肆狂瞽不隠其懐若臣言可採或所以為塵露之益若不足採所以廣聽納之門願陛下少留神鑒賜察臣言日有黒氣䟽臣以頑昧近者冒陳所見陛下不遺狂言事䝉御省伏讀聖詔歡懼交戰臣前云升陽未布隆陰仍積坎為法象刑獄所麗變坎加離厥象不燭疑將來必有薄蝕之變也此月四日日出山六七丈精光濳暗而色都赤中有異物大如雞子又有青黒之氣共相搏擊良乆方解按時在歲首純陽之日月在癸亥全陰之位而有此異殆元首供禦之義不顯消復之理不著之所致也計去微臣所陳未及一月而便有此變益明皇天留情陛下懇懇之致也往年歲末太白蝕月今在歲始日有咎讁曾未數旬大眚再見日月告釁見懼詩人無曰天高其鑒不逺故宋景言善熒惑退次光武寧亂嘑沲結冰此明天人之懸符有若形影之相應應之以德則休祥臻酬之以怠則咎徵作陛下宜恭承靈譴敬天之怒施沛然之恩諧𤣥同之化上所以允塞天意下所以弭息羣謗臣聞人之多幸國之不幸赦不宜數實如聖㫖臣愚以為子産知鑄刑書非政事之善然不得不作者須以救弊故也今之宜赦理亦如之隨時之宜亦聖人所善者此國家大信之要誠非微臣所得干豫今聖朝明哲思𢎞謀猷方闢四門以亮采訪輿誦於羣小㣲臣蒙珥筆朝末而可不竭誠盡規哉皇孫生請布澤䟽有道之君未嘗不以危自持亂世之主未嘗不以安自居故存而不忘亡者三代之所以興也亡而自以為存者三季之所以廢也是以古之令主開納忠讜以弼其違標顯功直用攻其失至乃聞一善則拜見規誠則懼何者蓋不私其身處天下以至公也臣竊惟陛下符運至著勳業至大而中興之祚不隆聖敬之風未躋者殆由法令太明刑教太峻故水至清則無魚政至察則衆乖此自然之勢也臣去春啟事以囹圄充斥陰陽不和推之卦理宜因郊祀作赦以蕩滌瑕穢不然將來必有愆陽苦雨之災崩震薄蝕之變狂狡蠢戾之妖其後月餘日果薄鬭去秋以來諸郡並有暴雨水皆洪潦歲用無年適聞呉興復欲有搆妄者咎徴漸成臣甚惡之頃者以來役賦轉重獄犴日結百姓困擾甘亂者多小人愚嶮共相扇惑雖勢無所至然不可不慮微洪範傳君道虧則日蝕人憤怨則水涌溢陰氣積則下代上此微理濳應巳著實於事者也假令臣遂不幸謬中必貽陛下側席之憂今皇孫載育天固靈基黔首顒顒實望惠潤又歳涉午位金家所忌宜於此時崇恩布澤則火氣濳消災譴不生矣陛下上承天意下順物情可因皇孫之慶大赦天下然後明罰勑法以肅理官克厭天心慰塞人事兆庶幸甚禎祥必臻矣臣今所陳蹔而省之或未允聖㫖久而尋之終亮臣誠若所啟上合願陛下勿以臣身廢臣之言臣言無隱而陛下納之適所以顯君明臣直之義耳平刑䟽臣聞上古象刑而民不犯中古明刑以致刑措故立刑以禁刑立殺以去殺重之以死所以求其生峻之以刑所以輕其死死由於法輕生存乎法重此立防之成標也然則刑無輕重用之唯平非平法之為難思在斷之為難是以子臯行戮刖者忘痛釋之典刑民無怨色何者積之於誠也按癸酉詔書之㫖專為邊城實之裔土濟當時一切之用非為經逺之法亦是中夏全平之時威御足指控制故可得行之矣欲役無頼子弟驅不逞之人聚之於空荒四維之地將以扞固牧圉未見其利也且濱接鯨猾宻邇姦藪退未絶其丘窟之顧進無以塞其逋逃之門五流三居誠古之犯刑論之於今事實難行且律令以跨三代歴載所遵未易輕改者也是以刑法不專則名幸者興政令驟變則人志無繫子産患其如此故矯先王議事之制而立刑書之辟皆所以弼民心而正羣惑者也彈任谷䟽任谷所為妖異無有因由陛下𤣥鑒廣覽欲知其情狀引之禁内供給安處臣聞為國以禮正不聞以竒邪所聽惟人故神降之吉陛下簡黙居正動遵典刑按周禮竒服怪人不入宫况谷妖詭怪人之甚者而登講肄之堂宻邇殿省之側塵㸃日月穢亂天聼臣之私情竊所以不取也陛下若以谷信為神靈所憑者則應敬而逺之夫神聰明正直接以人事若以谷為妖蠱詐妄者則當投畀裔土不宜令䙝近紫闈若以谷或是神祗告譴為國作眚者則當克已修禮以弭其妖不宜令谷安然自容肆其邪變也臣愚以為陰陽陶蒸變化萬端亦是狐狸魍魎慿陵作慝願陛下採臣愚懐特遣谷出臣以人乏忝荷史任敢忘直筆惟義是規禁荻䟽不宜禁荻地禮云名山大澤不封葢欲以民通財共利不獨專之也表辭尚書表今當以劣弱之質充督責之官以無用之才管繁劇之任序山海經序世之覽山海經者皆以其閎誕迂誇多竒怪俶儻之言莫不疑馬嘗試論之曰莊生有云人之所知莫若其所不知吾於山海經見之矣夫以宇宙之寥廓羣生之紛紜陰陽之煦蒸萬殊之區分精氣渾淆自相濆薄遊魂靈恠觸象而構流形於山川麗狀於木石者惡可勝言乎然則總其所以乖鼓之於一響成其所以變混之於一象世之所謂異未知其所以異世之所謂不異未知其所以不異何者物不自異待我而後異異果在我非物異也故胡人見布而疑黂越人見􅄢而駭毳夫􅥬所習見而竒所希聞此人情之常蔽也今略舉可以明之者陽火出於冰水陰鼠生於炎山而俗之論者莫之或恠及談山海經所載而咸恠之是不恠所可恠而恠所不可恠也不恠所可恠則幾於無恠矣恠所不可恠則未始有可恠也夫能然所不可不可所不可然則理無不然矣案汲郡竹書及穆天子傳穆王西征見西王母執璧帛之好獻錦組之屬穆王享王母於瑤池之上賦詩往來辭義可觀遂襲崑崙之丘遊軒轅之宫眺鍾山之嶺玩帝者之寳勒石王母之山紀迹𤣥圃之上乃取其嘉木豔草竒鳥恠獸玉石珍瑰之器金膏燭銀之寳歸而殖養之於中國穆王駕八駿之乘右服盗驪左驂騄耳造父為御犇戎為右萬里長騖以周歴四荒名山大川靡不登濟東升大人之堂西燕王母之廬南轢黿鼉之梁北躡積羽之衢窮歡極娯然後旋歸案史記説穆王得盗驪騄耳驊騮之驥使造父御之以西巡守見西王母樂而忘歸亦與竹書同左傳曰穆王欲肆其心使天下皆有車轍馬跡焉竹書所載則是其事也而譙周之徒足為通識瑰儒而雅不平此驗之史考以著其妄司馬遷叙大宛傳亦云自張騫使大夏之後窮河源惡覩所謂崑崙者乎至禹本紀山海經所有怪物余不敢言也不亦悲乎若竹書不濳出於千載以作徵於今日者則山海之言其幾乎廢矣若乃東方生曉畢方之名劉子政辨盗械之尸王頎訪兩面之客海民獲長臂之衣精驗濳効絶代懸符於戱羣惑者亦可以少寤乎是故聖皇原化以極變象物以應恠鑒無滯賾曲盡幽情神焉廋哉神焉廋哉葢此書跨世七代歴載三千雖暫顯於漢而尋亦寢廢其山川名號所在多有舛謬與今不同師訓莫傳遂將湮泯道之所存俗之所喪悲夫余有懼焉故為之創傳疏其壅閡闢其茀蕪領其𤣥致標其洞渉庶幾令逸文不墜於世竒言不絶於今夏后之迹靡刋於將來八荒之事有聞於後裔不亦可乎夫蘙薈之翔叵以論垂天之凌蹄涔之遊無以知絳虬之騰鈞天之庭豈伶人之所躡無航之津豈蒼兕之所渉非天下之至通難與言山海之義矣嗚呼達觀博物之客其鑒之哉爾雅序夫爾雅者所以通詁訓之指歸叙詩人之興詠總絶代之離詞辨同實而殊號者也誠九流之津渉六藝之鈐鍵學覽者之潭奥摛翰者之華苑也若乃可以博物不惑多識於鳥獸草木之名者莫近於爾雅爾雅者葢興於中古隆於漢氏豹鼠既辨其業亦顯英儒贍聞之士洪筆麗藻之客靡不欽玩耽味為之義訓璞不揆檮昧少而習焉沈研鑽極二九載矣雖註者十餘然猶未詳備並多紛謬有所漏略是以復綴集異聞㑹稡舊説考方國之語采謡俗之志錯綜樊孫博關羣言剟其瑕礫搴其蕭稂事有隱滯援據徵之其所易了闕而不論别為音圖用袪未寤輒復擁篲清道企望塵躅者以將來君子為亦有渉乎此也方言序葢聞方言之作出乎輶軒之使所以巡遊萬國采覽異言車軌之所交人迹之所蹈靡不畢載以為奏籍周秦之季其業隳廢莫有存者曁乎揚生沉淡其志歴載構綴乃就斯文是以三五之篇著而獨鑒之功顯故可不出戸庭而坐照四表不勞疇咨而物來能名考九服之逸言標六代之絶語類摛詞之指韻明乖途而同致辨章風謡而區分曲通萬殊而不雜真洽見之竒書不刋之碩記也余少玩雅訓旁味方言復為之解觸事廣之演其未及摘其謬漏庶以燕石之瑜補琬琰之瑕俾後之瞻渉者可以廣寤多聞爾設難客傲客傲郭生曰玉以兼城為寳士以知名為賢明月不妄映蘭葩豈虚鮮今足下既以拔文秀於叢薈䕃弱根於慶雲陵扶揺而竦翮揮清瀾以濯鱗而響不徹於九臯價不登乎千金傲岸榮悴之際頡頏龍魚之間進不為諧隠退不為放言無沈㝠之韻而希風乎嚴光徒費思於鑽咏摹洞林乎連山尚何名乎夫攀驪龍之髯撫翠禽之毛者而不得絶霞肆跨天津者未之前聞也郭生粲然而笑曰鷦鷯不可與論雲翼井蛙難與量海鼇雖然將祛子之惑訊以未悟其可乎乃者地維中絶乾光墜采皇運暫回廓祚淮海龍德時乘羣才雲駭藹若鄧林之㑹逸翰爛若溟海之納奔濤不煩咨嗟之訪不假蒲帛之招羈九有之竒駿咸總之於一朝豈惟豐沛之英南陽之豪昆吾挺鋒驌驦軒髦把梓競敷蘭荑爭翹嚶聲冠於伐木援類繁乎㧞茅是以水無浪士巖無幽人刈蘭不暇㸑桂不給安事錯薪乎且夫窟泉之濳不思雲翬熈氷之采不羡旭晞混光曜於埃藹者亦曷願滄浪之深秋陽之映乎登降紛於九五淪湧懸乎龍津蚓蛾以不才陸稿蟒虵以騰騖暴鱗連城之寳藏於褐裏三秀雖豔糜於麗采香惡乎芬賈惡乎在是以不塵不㝠不驪不騂支離其神蕭悴其形形廢則神王迹麄而名生體全者為犧至獨者不孤傲俗者不得以自得黙覺者不足以渉無故不恢心而形遺不外累而智喪無巖穴而㝠寂無江湖而放浪𤣥悟不以應機洞鑒不以昭曠不物物我我不是是非非忘意非我意得意非我懐寄羣籟乎無象域萬殊於一歸不壽殤子不夭彭涓不壯秋毫不小太山蚊䖟與天地齊流蜉蝣與大椿齒年然一闔一開兩儀之迹一冲一溢懸象之節渙沍期於寒暑凋蔚耍乎春秋青陽之翠秀龍豹之委頴駿狼之長暉𤣥陸之短景故臯壤為悲欣之府蝴蝶為物化之器矣夫欣黎黄之音者不顰蟪蛄之吟豁雲臺之觀者必閟帶索之歡縱蹈而詠採薺擁璧而歎抱關戰機心以外物不能得意於一弦悟往復於嗟歎安可與言樂天者乎若乃莊周偃蹇於漆園老萊婆娑於林窟嚴平澄漠於塵肆梅真隱淪乎市卒梁生吟嘯而矯迹焦先混沌而槁杌阮公昏酣而賣傲翟叟遯形以倐忽吾不幾韻於數賢故寂然玩此員䇿與智骨哀䇿文晉元帝哀䇿文永惟殿宇之廓寂悲彛奠之莫歆感鸞輅之晏駕哀衮裘之委衿痛聖躬之遐往長淪景於太陰乃作䇿曰王之不極百六作艱鴞集瓊林鯨躍神淵懐愍失據海覆岳顛蠢蠢六合罔不倒懸靈慶有底見龍在田誰其極哉我后先天大人承運重明繼作撫征淮海駿命再廓仁風旁靡神化濳鑠處沖思挹居簡行約聖敬日邁𤣥心逾漠用物與能總攬羣略林無滯才山無遺錯恩靡不懐化靡不被茫茫海域欵塞慕義萬里同塵罔匪王隸熈熈遺黎莫知其寄括終宇宙混同天地曰功永年曰德慶隆奈何氛厲奄集聖躬大業未恢皇齡未中天憯其景崑頽其崇㷀㷀小子藐藐孤沖靡天何戴靡地何憑恍惚極慕若存若終蔑焉無聞廓焉長寂聆音靡睎瞻顔失覿窮號曷訴叩心誰告何悲之哀何痛之酷嗚呼我皇逢天之戚嗚呼哀哉眇然升遐即安𤣥室煌煌火龍赫赫朱韠終焉永濳曷其有出明訓長絶小子何述望阜增歔臨崩慟慄哀兼陟方痛過遏宻靈爽安之反真復質永合元漠終始得一漢魏六朝百三家集卷五十六
