body:
  text: 漢魏六朝百三家集巻二十二漢諸葛亮集題詞諸葛梁甫吟古今諷誦然遙望蕩陰懐齊三士此不過好勇輕死者流何闗管樂神明悲吟不止或云梁甫泰山下小山也人君有徳則封東嶽諸葛王佐才思封禪而不得見躬耕隴畝歌謠託志田疆之倫豈所慕哉出師二表逺匹伊訓正議兩篇亦湯誓大誥之遺餘則赫蹏數字能使憾夫解讎壯士刎頸開誠布公集思廣益一生靖獻之本施於僚佐賢愚悉心所自然耳戒子書云學以廣才靜以成學周孔之教也晉世有寫其辭徧朂諸子者其理學始基乎後主暗弱黄皓陰狡武鄉復親督師旅不居宻勿而君臣魚水常如先帝時東山金縢似反遜之志則同也郭塢星隕魚復遺恨國勢三分臣心無二討賊而死始答顧命豈自違隆中之言哉陳夀立評未極能事崔浩致詰無當論功唐裴晉公葢非之矣目録詔為後主伐魏詔表羣下上漢帝請先主為漢中王表請宣大行遺詔表前出師表後出師表薦吕凱表彈李平表彈廖立表又臨終遺表舉蔣琬宻表奏上言追尊甘夫人為昭烈皇后疏街亭自貶疏上事疏公文公文上尚書教與羣下教又答蔣琬教作斧教黜來敏教與張裔教稱姚伷教又與㕘軍掾屬教教又書與闗雲長書與杜微書答杜微書答李嚴書又與張裔書與張裔蔣琬書又又與蔣琬董允書與孟達論李嚴書與李豐書與劉巴書與孟達書與陸遜書與步隲書與兄瑾書又又又又又又又又誡子書又誡外生又與劉巴論張飛書書與吳王書上先主書牋牋又逺涉帖議正議絶盟好議法作木牛流馬法論交論記黄陵廟記碑司馬季主墓碑南中紀功碑陰銘令軍令又又軍令兵軍要誡詩梁甫吟漢魏六朝百三家集巻二十二目録欽定四庫全書漢魏六朝百三家集巻二十二明張溥輯漢諸葛亮集詔為後主伐魏詔朕聞天地之道福仁而禍淫善積者昌惡積者喪古今常數也是以湯武修徳而王桀紂極暴而亡曩者漢祚中微網漏凶慝董卓造難震蕩京畿曹操階禍竊執天衡殘剥海内懐無君之心子丕孤豎敢尋亂階盜據神器更姓改物世濟其凶當此之時皇極幽昧天下無主則我帝命隕越于下昭烈皇帝體明叡之徳光演文武應乾坤之運出身平難經營四方人鬼同謀百姓與能兆民欣戴奉順符䜟建位易號丕承天緒補弊興衰存復祖業膺誕皇綱不墜於地萬國未静早世遐殂朕以幼冲繼綂鴻基未習保傅之訓而膺祖宗之重六合壅否社稷不建永惟所以念在匡救光載前緒未有攸濟朕甚懼焉是以夙興夜寐不敢自逸每從菲薄以益國用勸分務穡以阜民財授才任能以參其聴斷私降意以養將士欲奮劍長驅指討凶逆朱旗未舉而丕復隕喪斯所謂不然我薪而自焚也殘類餘醜又支天禍恣睢河洛阻兵未弭諸葛丞相𢎞毅忠壯忘身憂國先帝托以天下以朂朕躬今授之以旄鉞之重付之以専命之權統領步騎二十萬衆董督元戎龔行天伐除患寧亂克復舊都在此行也昔項籍總一疆衆跨州兼土所務者大然卒敗垓下死於東城宗族如焚為笑千載皆不以義陵上虐下故也今賊效尤天人所怨奉時宜速庶憑炎精祖宗威靈相助之福所向必克吳王孫權同恤災患濳軍合謀掎角其後涼州諸國王各遣月支康居胡侯支富康植等二十餘人詣受節度大軍北出便欲率將兵馬奮戈先驅天命既集人事又至師貞勢并必無敵矣夫王者之兵有征無戰尊而且義莫敢抗也故鳴條之役軍不血刃牧野之師商人倒戈今旍麾首路其所經至亦不欲窮兵極武有能棄邪從正簞食壺漿以迎王師者國有常典封寵大小各有品限及魏之宗族支葉中外有能規利害審逆順之數來詣降者皆原除之昔輔果絶親于智氏而䝉全宗之福微子去殷項伯歸漢皆受茅土之慶此前世之明驗也若其迷沈不反將助亂人不式王命戮及妻孥罔有攸赦廣宣恩威貸其元帥弔其殘民他如詔書律令丞相其露布天下俾稱朕意焉表羣下上漢帝請先主為漢中王表昔唐堯至聖而四凶在朝周成仁賢而四國作難髙后稱制而諸吕竊命孝昭幼冲而上官逆謀皆馮世寵藉履國權窮凶極亂社稷㡬危非大舜周公朱虚博陸則不能流放禽討安危定傾伏惟陛下誕姿聖徳統理萬邦而遭厄運不造之艱董卓首難蕩覆京畿曹操階禍竊執天衡皇后太子鴆殺見害剥亂天下殘毁民物久令陛下蒙塵憂厄幽處虚邑人神無主遏絶王命厭昧皇極欲盜神器左將軍領司𨽻校尉豫荆益三州牧宜城亭侯備受朝爵秩念在輸力以殉國難覩其機兆赫然憤發與車騎將軍董承同謀誅操將安國家克寧舊都㑹承機事不宻令操游䰟得遂長惡殘泯海内臣等每懼王室大有閻樂之禍小有安定之變夙夜惴惴戰慄累息昔在虞書敦序九族周監二代封建同姓詩著其義歴載長久漢興之初割裂疆土尊王子弟是以卒折諸吕之難而成太宗之基臣等以備肺腑枝葉宗子藩翰心存國家念在弭亂自操破於漢中海内英雄望風蟻附而爵號不顯九錫未加非所以鎮衛社稷光昭萬世也奉辭在外禮命斷絶昔河西太守梁統等值漢中興限於山河位同權均不能相率咸推竇融以為元帥卒立效績摧破隗囂今社稷之難急於隴蜀操外吞天下内殘羣寮朝廷有蕭牆之危而禦侮未建可為寒心臣等輒依舊典封備漢中王拜大司馬董齊六軍糾合同盟掃滅凶逆以漢中巴蜀廣漢犍為為國所署置依漢初諸侯王故典夫權宜之制茍利社稷専之可也然後功成事立臣等退伏矯罪雖死無恨請宣大行遺詔表伏惟大行皇帝邁仁樹徳覆燾無疆昊天不弔寢疾彌留今月二十四日奄忽升遐臣妾號咷若喪考妣乃顧遺詔事惟太宗動容損益百寮發哀滿三日除服到𦵏期後如禮其郡國太守相都尉縣令長三日便除服臣亮親受勅戒震畏神靈不敢有違臣請宣下奉行前出師表臣亮言先帝創業未半而中道崩殂今天下三分益州疲敝此誠危急存亡之秋也然侍衛之臣不懈於内忠志之士忘身於外者葢追先帝之殊遇欲報之於陛下也誠宜開張聖聴以光先帝遺徳恢𢎞志士之氣不宜妄自菲薄引喻失義以塞忠諫之路也宫中府中俱為一體陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平明之治不宜偏私使内外異法也侍中侍郎郭攸之費禕董允等此皆良實志慮忠純是以先帝簡拔以遺陛下愚以為宫中之事事無大小悉以咨之然後施行必能裨補闕漏有所廣益也將軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以衆議舉寵以為督愚以為營中之事事無大小悉以諮之必能使行陣和穆優劣得所也親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頽也先帝在時每與臣論此事未嘗不歎息痛恨於桓靈也侍中尚書長史㕘軍此悉貞亮死節之臣也願陛下親之信之則漢室之隆可指日而待也臣本布衣躬耕南陽茍全性命於亂世不求聞達於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中諮臣以當世之事由是感激遂許先帝以驅馳後值傾覆受任於敗軍之際奉命於危難之間爾來二十有一年矣先帝知臣謹慎故臨崩寄臣以大事也受命以來夙夜憂勤恐付託不效以傷先帝之明故五月渡瀘深入不毛今南方已定甲兵已足當奬率三軍北定中原庶竭駑鈍攘除姦凶興復漢室還於舊都此臣所以報先帝而忠陛下之職分也至於斟酌損益進盡忠言則攸之禕允之任也願陛下託臣以討賊興復之效不效則治臣之罪以告先帝之靈若無興徳之言則戮允等以章其慢陛下亦宜自謀以諮諏善道察納雅言深追先帝遺詔臣不勝受恩感激今當逺離臨表涕泣不知所云後出師表先帝慮漢賊不兩立王業不偏安故託臣以討賊也以先帝之明量臣之才故知臣伐賊才弱敵强也然不伐賊王業亦亡惟坐而待亡孰與伐之是故託臣而弗疑也臣受命之日寢不安席食不甘味思惟北征宜先入南故五月渡瀘深入不毛并日而食臣非不自惜也顧王業不可得偏全於蜀都故冒危難以奉先帝之遺意也而議者謂為非計今賊適疲於西又務於東兵法乘勞此進趨之時也謹陳其事如左髙帝明並日月謀臣淵深然涉險被創危然後安今陛下未及髙帝謀臣不如良平而欲以長計取勝坐定天下此臣之未解一也劉繇王朗各據州郡論安言計舉引聖人羣疑滿腹衆難塞胸今歳不戰明年不征使孫策坐大遂并江東此臣之未解二也曹操智計殊絶於人其用兵也髣髴孫吳然困於南陽險於烏巢危於祁連偪於黎陽㡬敗北山殆死潼關然後偽定一時耳况臣才弱而欲以不危而定之此臣之未解三也曹操五攻昌霸不下四越巢湖不成任用李服而李服圖之委夏侯而夏侯敗亡先帝每稱操為能猶有此失况臣駑下何能必勝此臣之未解四也自臣到漢中中間朞年耳然喪趙雲陽羣馬玉閻芝丁立白夀劉郃鄧銅等及曲長屯將七十餘人突將無前賨叟青羌散騎武騎一千餘人此皆數十年之内所糾合四方之精鋭非一州之所有若復數年則損三分之二也當何以圖敵此臣之未解五也今民窮兵疲而事不可息事不可息則住與行勞費正等而不及虚圖之欲以一州之地與賊持久此臣之未解六也夫難平者事也昔先帝敗軍於楚當此時曹操拊手謂天下已定然後先帝東連吳越西取巴蜀舉兵北征夏侯授首此操之失計而漢事將成也然後吳更違盟關羽毁敗秭歸蹉跌曹丕稱帝凡事如是難可逆見臣鞠躬盡力死而後已至於成敗利鈍非臣之明所能逆覩也此表亮集所無出張儼黙記薦吕凱表吕凱為永昌郡吏雍闓降吳吳署闓為永昌太守凱與府丞王伉帥厲吏民閉境拒闓亮南征上表㑹凱為叛夷所殺以其子祥嗣侯永昌郡吏吕凱府丞王伉等執忠絶域十有餘年雍闓髙定偪其東北而凱等守義不與交通臣不意永昌風俗敦直乃爾以凱為雲南太守封陽遷亭侯彈李平表自先帝崩後平所在治家尚為小恵安身求名無憂國之事臣當北出欲得平兵以鎮漢中平窮難縱横無有來意而求以五郡為巴州刺史去年臣欲西征欲令平主督漢中平説司馬懿等開府辟召臣知平鄙情欲因行之際偪臣取利也是以表平子豐督主江州隆崇其遇以取一時之務平至之日都委諸事羣臣上下皆怪臣待平之厚也正以大事未定漢室傾危伐平之短莫若褒之然謂平情在於榮利而已不意平心顛倒乃爾若事稽留將致禍敗是臣不敏言多增咎彈廖立表長水校尉廖立生自貴大臧否羣士公言國家不任賢達而任俗吏又言萬人率者皆小子也誹謗先帝疵毁衆臣人有言國家兵衆簡練部伍分明者立舉頭視屋憤咤作色曰何足言凡如是者不可勝數羊之亂羣猶能為害况立託在大位中人以下識真偽邪又立奉先帝無忠孝之心守長沙則開門就敵領巴郡則有闇昧闟茸其事隨大將軍則誹謗譏訶侍梓宫則挾刃斷人頭於梓宫之側陛下即位之後普增職號立随比為将軍面語臣曰我何宜在諸將軍中不表我為卿上當在五校臣答將軍者隨大比耳至於卿者正方亦未為卿也且宜在五校自是之後怏怏懐恨臨終遺表伏念臣賦性拙直遭時艱難興師北伐未獲全功何期病在膏肓命垂旦夕伏願陛下清心寡慾約已愛民達孝道於先君布仁心於寰宇提㧞逸隠以進賢良屛黜奸讒以厚風俗臣家成都有桑八百株薄田十五頃子孫衣食自有餘饒臣身在外别無調度隨時衣食悉仰於官不别治生以長尺寸臣死之日不使内有餘帛外有盈財以負陛下也舉蔣琬宻表臣若不幸後事宜以付琬奏上言追尊甘夫人為昭烈皇后廿后先主章武二年追謚皇思夫人先主薨亮上言追尊為后皇思夫人履行修仁淑慎其身大行皇帝昔在上將嬪配作合載育聖躬大命不融大行皇帝存時篤義垂恩念皇思夫人神柩在逺飄颻特遣使者奉迎㑹大行皇帝崩今皇思夫人神柩已到又梓宮在道園陵將成安厝有期臣輒與太常臣賴恭等議禮記曰立愛自親始教民孝也立敬自長始教民順也不忘其親所繇生也春秋之義母以子貴昔髙皇帝追尊太上昭靈夫人為昭靈皇后孝和皇帝改𦵏其母梁貴人尊號曰恭懐皇后孝愍皇帝亦改𦵏其母王夫人尊號曰靈懐皇后今皇思夫人宜有尊號以慰寒泉之思輒與恭等案諡法宜曰昭烈皇后詩曰穀則異室死則同穴故昭烈皇后宜與大行皇帝合𦵏臣請太尉告宗廟布露天下具禮儀别奏疏街亭自貶疏臣以弱才叨竊非據親秉旄鉞以厲三軍不能訓章明法臨事而懼至有街亭違命之闕箕谷不戒之失咎皆在臣授任無方臣明不知人料事多闇春秋責帥臣職是當請自貶三等以督厥咎上事疏臣先遣孟琰據武功水東司馬懿因渭水漲以二十日出騎萬人來攻琰營臣作車橋越水射之賊見橋垂成便引兵退公文公文上尚書平為大臣受恩過量不思忠報横造無端危恥不辦迷罔上下論獄棄科導人為姦挾情志狂若無天地自度姦露嫌心遂生聞軍臨至西嚮託疾還沮漳軍臨至沮復還江陽平㕘軍胡忠勤諌乃止今簒賊未滅社稷多難國事惟和可以克捷不可苞含以危大業輒與行中軍師車騎將軍都鄉侯臣劉琰使持節前軍師征西大將軍領涼州刺史南鄭侯臣魏延前將軍都亭侯臣袁綝左將軍領荆州刺史高陽鄉侯臣吳壹督前部右將軍𤣥鄉侯臣髙翔督後部後將軍安樂亭侯臣吳班領長史綏軍將軍臣楊儀督左部行中監軍揚武將軍臣鄧芝行前監軍征南將軍臣劉巴行中䕶軍偏將軍臣費禕行前䕶軍偏將軍漢成亭侯臣許允行左䕶軍篤信中郎將臣丁咸行右䕶軍偏將軍臣劉敏行䕶軍征南將軍當陽亭侯臣姜維行中典軍討虜將軍臣上官雝行中㕘軍昭武中郎將臣胡濟行㕘軍建義將軍臣閻晏行㕘軍偏將軍臣爨習行㕘軍裨將軍臣杜義行㕘軍武畧中郎將臣杜祺行㕘軍綏戎都尉臣盛勃領從事中郎武畧中郎將臣樊岐等議輒解平任免官禄節傳印綬符策削其爵土教與羣下教夫參署者集衆思廣忠益也若逺小嫌難相違覆曠闕損矣違覆而得中猶棄弊蹻而獲珠玉然人心苦不能盡惟徐元直處兹不惑又董幼宰參署七年事有不至至于十反來相啓告茍能慕元直之十一幼宰之殷勤有忠於國則亮可少過矣又昔初交州平屢聞得失後交元直勤見啓誨前㕘軍於幼宰每言則盡後從事於偉度數有諫止雖姿性鄙暗不能悉納然與此四子終始好合亦足以明其不疑於直言也答蔣琬教亮開府辟琬為東曹􅁺舉茂才琬固讓亮答之思惟背親捨徳以殄百姓衆人既不隠於心實又使逺近不解其義是以君宜顯其功舉以明此選之清重也作斧教前後所作斧都不可用前到武都鹿角壊刀斧千餘枚賴賊已走間自令作部刀斧百枚用之百餘日初無壊者爾乃知彼主者無意宜收治之非小事也若臨敵敗人軍事矣黜來敏教將軍來敏對上官顯言新人有何功徳而奪我榮資與之邪諸人共憎我何故如是敏年老狂悖生此怨言昔成都初定議者以為來敏亂羣先帝以新定之際故遂含容無所禮用後劉子初選以為太子家令先帝不悦而不忍拒也今上即位吾闇於知人遂復擢為將軍祭酒違議者之審見背先帝所疎外自謂能以敦厲薄俗帥之以義今既不能表退職使閉門思愆與張裔教去婦不顧門萎韮不入園以婦人之性草莱之情猶有所恥想忠壯者意何所之稱姚伷忠益者莫大于進人進人者各務其所尚今姚掾並存剛柔以廣文武之用可謂博雅矣願諸掾各希此事以屬其望教昔孫叔敖乘馬三年不知牝牡稱其賢也又若賊騎左右來至徒行以戰者陟嶺不便宜以車䝉陣而待之地狹者以鋸齒而待之與㕘軍掾屬教任重才輕故多闕漏前㕘軍董幼宰毎言輒盡數有諌止雖性鄙薄不能悉納幼宰叅署七年事有不至至于十反闕有忠于國如亮可以少其過也教作部作匕首五百枚以給騎士又勅作部皆作五折剛鎧十折矛以給之書答關雲長書孟起兼資文武雄烈過人一世之傑黥彭之徒當與益徳並驅爭先猶未及髯之絶倫逸羣也與杜微書微先為劉璋從事以疾去官先主定蜀微稱聾閉門不出亮領益州牧選迎皆妙簡舊徳以微為主簿微固辭轝而致之亮以微不聞人語于坐上與書服聞徳行飢渴歴時清濁異流無縁咨覯王元泰李伯仁王文儀楊季休丁君幹李永南兄弟文仲寳等每歎髙志未見如舊猥以空虚統領貴州徳薄任重慘慘憂慮朝廷主公今年始十八天姿仁敏愛徳下士天下之人思慕漢室欲與君因天順民輔此明主以隆季興之功著勲於竹帛也以謂賢愚不相為謀故自割絶守勞而已不圖自屈也答杜微書微自乞老病求歸亮又與書答之拜諫議大夫以從其志曹丕簒弑自立為帝是猶土龍芻狗之有名也欲與羣賢因其邪偽以正道滅之怪君未有相誨便欲求還於山野丕又大興勞役以向吳楚今因丕多務且以閉境勤農育養民物並治甲兵以待其挫然後伐之可使兵不戰民不勞而天下定也君但當以徳輔時耳不責君軍事何為汲汲欲求去乎答李嚴書嚴與亮書勸亮宜受九錫進爵稱王亮答之吾與足下相知久矣可不復相解足下方誨以光國戒之以勿拘之道是以未得黙已吾本東方下士誤用於先帝位極人臣禄賜百億今討賊未效知已未答而方寵齊晉坐自貴大非其義也若滅魏斬叡帝還故居與諸子並升雖十命可受况於九邪又吾受賜八十斛今蓄財無餘妾無副服與張裔書亮北住漢中欲用裔為留府長史問楊洪對曰裔天姿明察性不公平恐不可専任不如畱向朗初裔子為洪吏微過受罰裔以為恨時或疑洪自欲作長史或知裔自嫌不願裔處要職後裔與司鹽校尉岑述不和至于忿恨亮與裔書論者由是明洪無私君昔在陌下營壊吾之用心食不知味後流迸南海相為悲歎寢不安席及其來還委付大任同奬王室自以為與君古之石交也石交之道舉讐以相益割骨肉以相明猶不相謝也况吾但委噫於元儉而君不能忍邪與張裔蔣琬書亮辟姜維為倉曹掾加奉義將軍與畱府長史張裔㕘軍蔣琬書姜伯約忠勤時事思慮精宻考其所有永南季常諸人不如也其人涼州上士也又須先教中虎步兵五六千人姜伯約甚敏於軍事既有膽義深解兵意此人心存漢室而才兼於人畢教軍事當遣詣宫覲見主上又令史失賴厷掾屬喪楊顒為朝中損益多矣與蔣琬董允書李平坐誣罔廢亮與長史蔣琬侍中董允書孝起前臨至吳為吾説正方腹中有鱗甲鄉黨以為不可近吾以為鱗甲但不當犯之耳不圖復有蘇張之事出於不意可使孝起知之與孟達論李嚴書部分如流趣捨罔滯正方性也與李豐書初亮以李嚴子豐為江州都督命嚴以中都䕶署府事嚴改名平亮軍祁山平催督運事值天霖雨運糧不繼呼亮來還軍退乃更陽驚軍糧饒足何以便歸又表後主説軍詐退欲以誘賊亮出其前後書疏表廢為民又教與平子豐後聞亮卒發病死平常冀亮當自補復䇿後人不能故以激憤也吾與君父子戮力以奬漢室此神明所聞非但人知之也表都䕶典漢中委君於東關者不與人議也謂至心感動終始可保何圖中乖乎昔楚卿屢詘亦乃克復思道則福應自然之數也願寛慰都䕶勤追前闕今雖解任形業失故奴婢賔客百數十人君以中郎㕘軍居府方之氣類猶為上家若都䕶思負一意君與公琰推心從事者否可復通逝可復還也詳思斯戒明吾用心臨書長歎涕泣而已與劉巴書劉公雄才葢世據有荆土莫不歸徳天人去就已可知矣足下欲何之與孟達書達與劉封不和叛歸魏為新城太守亮南行歸至漢陽縣降人李鴻詣亮言孟達適許見王冲從南來言往者達之去就明公切齒欲誅達妻子賴先主不聴耳達盡不信冲言委仰明公無復已已亮將北伐欲誘達為外援乃與達書達得書數相交通欲叛魏魏遣司馬懿征之即斬達往年南征嵗未及還適與李鴻㑹於漢陽承知消息慨然永歎以存足下平素之志豈徒空託名榮貴為乖離乎嗚呼孟子斯實劉封侵陵足下以傷先主待士之義又鴻道王冲造作虚語云足下量度吾心不受冲説尋表明之言追平生之好依依東望故遣有書與陸遜書恪為亮兄瑾之子孫權置節度官典掌軍糧將用恪亮與遜書遜以白權即轉恪領兵家兄年老而恪性疎今使㸃主糧穀糧穀軍之要最僕雖在逺竊用不安足下特為啟至尊轉之與步隲書僕前軍在五丈原原在武功西十里馬塚在武功東十餘里有髙勢攻之不便是以畱耳與兄瑾書兄嫌白帝兵非精練到所督則先主帳下白眊西方上兵也嫌其少也當復部分江州兵以廣益之又蜀志趙雲本傳云亮駐漢中出軍揚聲由斜谷道令趙雲與鄧芝往拒曹真而身攻祁山雲芝兵敗敵强失利於箕谷又趙雲别傳云雲敗退有軍資餘絹亮使分賜將士雲曰軍士無利何為有賜其物請悉入赤岸府庫須十月為冬賜按與瑾此二書似即其事也前趙子龍退軍燒壊赤岸以北閣道縁谷一百餘里其閣梁一頭入山腹其一頭立柱於水中今水大而急不得安柱此其窮極不可彊也又頃大水暴出赤岸以南橋閣悉壊時趙子龍與鄧伯苖一戍赤岸屯田一戍赤岸口但得縁岸與伯苗相聞而已又渭水又東與陽溪合上承斜水水自斜谷分注綏陽溪北届陳倉入故亮與兄瑾書有綏陽小谷雖山崖絶重谿水縱横難用行軍者邏候往来要道通人今使前軍斫治此道以向陳倉足以扳連賊勢使不得分兵東行者也又震為䘙尉入吴賀孫權踐祚亮與瑾書孝超忠純之性老而益篤及其贊述東西歡樂和合有可貴者又孫松字子喬權弟子為射聲校尉卒亮與瑾書既受東朝厚遇依依於子弟又子喬良器為之惻愴見其所與亮器物感用流涕又殷禮字往嗣吴郡雲陽人通占候張温以入蜀亮見歎曰東吳菰蘆中乃有竒偉如此人與瑾書殷往嗣秀才今之僑肸者也又喬字伯松亮兄瑾之子亮先未有子求喬為嗣拜駙馬都尉喬本當還成都今諸将子弟皆得傳運思惟宜同榮辱今使喬督五六百兵與諸子弟傳於谷中又亮子瞻字思逺建興中亮出武功與瑾書瞻後為衞将軍赴鄧艾戰死瞻今已八嵗聰慧可愛嫌其早成恐不為重器耳誡子書夫君子之行静以修身儉以養徳非澹薄無以明志非寧静無以致逺夫學欲静也才欲學也非學無以廣才非静無以成學慆慢則不能研精險躁則不能理性年與時馳意與日去遂成枯落多不接世悲守窮廬将復何及又夫酒之設合禮致情適體歸性禮終而退此和之至也主意未殫賔有餘倦可以至醉無致於亂誡外生夫志當存高逺慕先賢絶情欲棄凝滯使庶幾之志掲然有所存惻然有所感忍屈伸去細碎廣咨問除嫌吝雖有淹留何損於美趣何患於不濟若志不彊毅意不慷慨徒碌碌滯於俗黙黙束於情承竄伏於凡庸不免於下流矣又與劉巴論張飛書張飛雖實武人敬慕足下主公方今收合文武以定大事足下雖天素高亮宜少降意也書吾心如秤不能為人作輕重與呉王書所送白眊薄少重見辭謝益以増慙上先主書先主自涪攻雒城亮遣馬良上先主書已而軍師龎統中流矢死亮筭太乙數今年嵗次癸已罡星在西方又觀乾象太白臨於雒城之分主於将帥多凶少吉太乙飛鈐牋牋朝發南鄭暮宿黒水四五十里又漢嘉金朱提銀採之不足以自食逺涉帖師徒逺涉道路甚艱自及褒斜幸皆無恙使還馳此不復具議正議昔在項羽起不由徳雖處華夏秉帝者之勢卒就湯鑊為後永戒魏不審鑒今次之矣免身為幸刑在子孫而二三子各以耆艾之齒承偽指而進書有若崇竦稱莽之功亦将逼於元禍茍免者邪昔世祖之創迹舊基奮羸卒數千摧莽彊旅四十餘萬於昆陽之郊夫據道討滛不在衆寡及至孟徳以其譎勝之力舉數十萬之師救張郃於陽平勢窮慮悔僅能自脱辱其鋒鋭之衆遂喪漢中之地深知神器不可妄獲旋還未至感毒而死子桓滛逸繼之以簒縱使二三子多逞蘇張詭靡之説奉進驩兠滔天之辭欲以誣毁唐帝諷解禹稷所謂徒喪文藻煩勞翰墨者矣夫大人君子之所不為也又軍誡曰萬人必死横行天下昔軒轅氏整卒數萬制四方定海内况以數十萬之衆據正道而臨有罪有得而礙者哉絶盟好議權有僭逆之心乆矣國家所以畧其釁情者求犄角之援也今若加顯絶讐我必深便當移兵東戍與之角力須并其土乃議中原彼賢才尚多将相輯穆未可一朝定也頓兵相持坐而須老使北賊得計非策之上者昔孝文卑辭匈奴先帝優與呉盟皆應權通變𢎞思逺益非匹夫之為分者也今議者咸以權利在鼎足不能并力且志望已滿無上岸之情推此皆似是而非也何者其智力不侔故限江自保權之不能越江猶魏賊之不能渡漢非力有餘而利不取也若大軍致討彼土當分裂其地以為後規下當畧民廣境示武於内非端坐者也若就其不動而睦於我我之北伐無東顧之憂河南之衆不得盡西此之為利亦已深矣權僭之罪未易明也法作木牛流馬法木牛者方腹曲頭一脚四足頭入領中舌著于腹載多而行少宜可大用不可小使特行者數十里羣行者二十里也曲者為牛頭雙者為牛脚横者為牛領轉者為牛足覆者為牛背方者為牛腹垂者為牛舌曲者為牛肋刻者為牛齒立者為牛角細者為牛鞅攝者為牛鞦軸牛仰雙轅人行六尺牛行四歩載一嵗糧日行二十里而人不大勞流馬尺寸之數肋長三尺五寸廣三寸厚二寸二分左右同前軸孔分墨去頭四寸徑中二寸前脚孔分墨二寸去前軸孔四寸五分廣一寸前杠孔去前脚孔分墨二寸七分孔長二寸廣一寸後軸孔去前杠分墨一尺五分大小與前同後脚孔分墨去後軸孔三寸五分大小與前同後杠孔去後脚孔分墨二寸七分後載剋去後杠孔分墨四寸五分前杠長一尺八寸廣二寸厚一寸五分後杠與等板方囊二枚厚八分長二尺七寸高一尺六寸五分廣一尺六寸每枚受米二斛三斗從上杠孔去肋下七寸前後同上杠孔去下杠孔分墨一尺三寸孔長一寸五分廣七分八孔同前後四脚廣二寸厚一寸五分形制如象靬長四寸徑面四寸三分孔徑中三脚杠長二尺一寸廣一寸五分厚一寸四分同杠耳論交論勢力之交難以經逺士之相知温不増華寒不改葉能貫四時而不衰歴夷險而益固記黄陵廟記僕躬耕南陽之畆遂䝉劉氏顧草廬勢不可郤計事善之於是情好日密相拉總師趨蜀道履黃牛因覩江山之勝亂石排空驚濤拍岸斂巨石於江中崔嵬巑岏列作三峯平治洚水順遵其道非神扶助於禹人力豈能致此耶僕縱步環覽乃見江左大山壁立林麓峯巒如畫熟視於大江重復石壁間有神像影現焉􅁂髪鬚眉冠裳宛然如彩畫者前竪一旌旗右駐一黄犢猶如董工開導之勢古傳所載黄龍助禹開江治水九載而功成信不誣也惜乎廟貌廢去使人太息神有功助禹開江不事鑿斧順濟舟航當廟食兹土僕復而興之再建其廟號目之曰黄牛廟以顯神功碑司馬季主墓碑𤣥漠太寂混合隂陽天地交泮萬品滋彰先生理著分别柔剛鬼神以觀六度顯明南中紀功碑隂銘萬嵗後勝我者過此令軍令敵以来進持鹿角兵悉却在連衝後敵已附鹿角裏兵但得進踞以矛㦸刺之不得此住起住妨弩壊又連衡陣狭而厚也又荆非少人也而著籍者寡平居發調即人心不悦凡有游户皆使自實因録以一衆可也軍令始出營豎矛㦸舒旛旗鳴鼔角三里辟矛㦸結旛旗鳴鼓角未至營三里復豎矛㦸舒旛旗鳴鼓角復結旛旗鳴鼔角違令者髠兵軍要誡枝葉彊大比居同勢各結朋黨競進憸人有此不去是謂敗徴詩梁甫吟晏子云公孫㨗田開疆古冶子事景公勇而無禮晏子言於公餽之二桃曰三子計功而食桃公孫㨗曰吾再拜隠虎功可以食田曰吾杖兵而御三軍者再功可以食古冶子曰君當濟河黿銜左驂冶潛行水底逆流百步從流九里得黿頸功可以食二子曰吾勇不若子功不違子取桃不讓是貪也然而不死無勇也刎頸而死冶曰二子死之冶獨不逮又刎頸而死步出齊城門遥望蕩隂里里中有三墳纍纍正相似問是誰家墓田疆古冶子力能排南山又能絶地紀一朝被讒言二桃殺三士誰能為此謀國相齊晏子滄浪詩評云孔明梁甫吟步出齊東門遥望蕩隂里樂府解題作追望隂陽里青州有隂陽里田疆古冶子解題作田强固野子西溪叢語云李善陸詩註蔡邕琴頌云梁父悲吟不知名為梁父吟何義張衡四愁詩云欲往從之梁父艱注云泰山東嶽也君有徳則封此山願輔佐君王致於有徳而為小人讒邪之所阻梁父泰山下小山名諸葛亮好為梁父吟恐取此意漢魏六朝百三家集巻二十二
