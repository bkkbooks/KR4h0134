body:
  text: 漢魏六朝百三家集巻三十一魏劉楨集題詞魯國孔文舉廣陵陳孔璋山陽王仲宣北海徐偉長陳留阮元瑜汝南應徳璉東平劉公幹魏文所稱文人七子也文帝云劉楨章表書記壯而不密又稱其五言詩妙絶當時今公幹書記傳者甚少知其物化以後遺失多矣集詩大悉五言詩品亦云其源出古詩思王而下楨稱獨歩豈縁本魏文為之申譽乎近日詩選痛貶建安亦度已迹削他人足耳未若南皮觴酌公讌贈答當時得失相知者深也劉公幹贈五官中郎将詩有云昔我從元后整駕至南鄉過彼豐沛都與君共翺翔王仲宣從軍詩亦云籌䇿運帷幄一由我聖君嚴滄浪黜之謂元后聖君並指曹操心敢無漢大義批引二子固當叩頭伏罪然詩頌鋪張詞每過實文人之言豈必盡由中情哉公幹平視甄夫人操收治罪文帝獨不見怒死後致思悲傷絶絃中心好之弗聞其過也其知公幹誠猶鍾期伯牙云目録賦魯都賦大暑賦遂志賦黎陽山賦𤓰賦冇序清慮賦書諫平原侯植書又答太子書又碑處士國文甫碑詩公讌詩贈五官中郎将其一其二其三其四贈徐幹贈從弟其一其二其三襍詩鬬雞射鳶失題其一其二漢魏六朝百三家集巻三十一目録欽定四庫全書漢魏六朝百三家集巻三十一明張溥輯魏劉楨集賦魯都賦昔大廷氏肇建厥居少昊受命亦都兹焉山則連岡屬嶺曀峡北紫金揚暉於鴻崖水精潛光乎雲穴岱宗邈其層秀于氣霧以髙越其木則赤桋青松文莖蕙棠洪幹百圍髙徑穹皇竹則填彼山陔根彌阪域蒙雪含霜不渝其色夏簜攅包勁篠並殖翠實離離鳳皇攸食水産衆夥各有彛倫頒首華尾豐顱重斷戴兵挟刅盤甲曲鱗且觀其時謝節移和族綏宗招歡合好肅戒友朋蛾眉清眸顔若雪霜挿曜日之珍笄珥明月之珠璫舞人就列整飾容華和顔揚眸眄風長歌飄乎猋發身如轉波尋虚騁迹顧與節和縦修袖以終曲若奔星之赴河及其素秋二七天漢指隅民胥祓禊國於水遊緹帷彌津丹帳覆洲葢如飛鶴馬如遊魚應門巖巖朱扉含光路殿巋其隆崇文陛巘其髙驤聴迅雷於長除若有聞而復亡其園囿苑沼駢田接連渌池分浪以帶石垠文隅瓊岸華玉依津邦乃大狩振揚炎威教民即戎講習興師絡幕包括連結營圍毛羣隕殪羽族殱剥填﨑塞畎不可勝録大暑賦其為暑也羲和總駕發扶木太陽為輿達炎燭靈威參垂歩朱轂赫赫炎炎烈烈暉暉若熾燎之附體又温泉而沈肌獸喘氣於𤣥景鳥戢翼於髙危農畯捉鎛而去疇織女釋杼而下機温風至而増熱歊悒慴而無依披衿領而長嘯冀微風之來思遂志賦幸遇明后因志東傾披此豐草乃命小生生之小矣何兹云當牧馬於路役車低昻愴悢惻切我獨西行去峻溪之鴻洞觀日景於朝陽釋叢棘之餘刺踐檟林之柔芳皦玉粲以曜目榮日華以舒光信此山之多靈何神分之煌煌聊且逰觀周歴髙岑仰攀髙枝側身遺隂磷磷䃹䃹以廣其心伊天皇之樹葉必結根於仁方捎吴夷於東隅掣畔臣乎南荆戢干戈於内庫我馬縶而不行揚洪恩於無涯聴頌聲之洋洋四㝢漠以無為𤣥道穆以普将翼儁乂於上列退仄陋於下場襲初服之蕪薉託蓬蘆以逰翔豈放言而云爾乃旦夕之可忘黎陽山賦自魏都而南邁迄洪川以朅休想王旅之旌旄望南路之遐修御輕駕而西徂過舊塢之髙區爾乃踰峻嶺超連岡一登九息遂臻其陽南䕃黄河左覆金城青壇承祀髙碑頌靈珍木駢羅奮華揚榮雲興風起蕭瑟清泠延首南望顧瞻舊鄉桑梓增敬慘切懐傷河源汨其東逝陽烏飄而南翔覩衆物之集華􅅲欣欣而樂康𤓰賦有序在曹植坐㕑人進𤓰植命為賦促立成其辭曰布象牙之席薰玳瑁之筵憑彤玉之几酌縹碧之樽三星在隅温風節暮枕翹於藤流美逺布黄花炳曄潜實獨著豐細異形圓方殊務揚暉發藻九采襍糅厥初作苦終然允甘應時湫熟含蘭吐芳藍皮宻理素肌丹瓤乃命圃師貢其最良投諸清流一浮一蔵析以金刀四剖三離承之以雕盤羃之以纎絺甘逾蜜房冷亞氷圭清慮賦結東阿之扶桑接西雷乎燭龍上青雘之山蹈琳珉之塗玉樹翠葉上栖金烏書諫平原侯植書家丞邢顒北土之彦少秉髙節𤣥靜澹泊言少理多真雅士也楨誠不足同貫斯人並列左右而楨禮遇殊特顒反疏簡私懼觀者将謂君侯習近不肖禮賢不足採庶子之春華忘家丞之秋實為上招謗其罪不小以此反側又明使君始垂哀憐意眷日崇譬之疾病乃使炎農分藥岐伯下鍼疾雖未除就没無恨何者以其夭毉至神而榮魄自盡也答太子書太子初賜楨廓落帶其後師死欲借取以為像因書啁楨楨答之楨辭指巧妙皆如是楨聞荆山之璞曜元后之寶隋侯之珠燭衆士之好南垠之金登窈窕之首鼲貂之尾綴侍臣之幘此四寶者伏朽石之下潛汚泥之中而揚光千載之上發彩疇昔之外亦皆未能初自接於至尊也夫尊者所服卑者所修也貴者所御賤者所先也故夏屋初成而大匠先立其下嘉禾始熟而農夫先嘗其粒恨楨所帶無他妙飾若實殊異尚可納也衆士一作衆女又肅以素秋則落碑處士國文甫碑先生執乾靈之貞潔禀神祗之正性咳笑則孝弟之端著匍匐則清節之兆見齠齓以及成人體無懈容口無愆辭兢兢業業小人畏忌勤讓同儔敬事長老雖周之樂正子春漢之江都董相其飭躬力行無以尚之是以長安師其仁朋友欽其義閨門稱其慈宗屬懐其惠既乃潛心窮巖㳺心載籍薄世名也初海内之亂不視膳羞十有餘年憂心泣血不勝其哀形銷氣竭以建安十七年四月卒于時龍徳逸民黄髮實叟綴文通儒有方彦士莫不拊心長號如喪同生咸以為誄所以昭行也銘所以旌徳也古之君子既没而令問不忘者由斯二者也銘曰懿矣先生天授徳度外清内白如玉之素逍遥九皋方回是慕不計治萃名與殊路知我者希韞櫝未酤喪過乎哀遘疾不悟早世永頽違此榮祚咨爾末徒聿修歡故詩公讌詩永日行遊戲歡樂猶未央遺思在𤣥夜相與復翺翔輦車飛素葢從者盈路傍月出照園中珍木鬰蒼蒼清川過石渠流波為魚防芙蓉散其華菡萏溢金塘靈鳥宿水裔仁獸逰飛梁華館寄流波豁達來風凉生平未始聞歌之安能詳投翰長嘆息綺麗不可忘贈五官中郎将其一昔我從元后整駕出南鄉過彼豐沛都與君共翺翔四節相推斥季冬風且凉衆賔㑹廣坐明鐙熺炎光清歌製妙聲萬舞在中堂金罍含甘醴羽觴行無方長夜忘歸來聊且為太康四牡向路馳歡悦誠未央其二余嬰沈痼疾竄身清漳濵自夏渉𤣥冬彌曠十餘旬常恐㳺岱宗不復見古人所親一何篤歩趾慰我身清談同日夕情盼敘憂勤便復為别辭㳺車歸西隣素葉隨風起廣路揚埃塵逝者如流水哀此遂離分追問何時㑹要我以陽春望慕結不解貽爾新詩文勉哉修令徳北面自寵珍其三秋日多悲懐感慨以長嘆終夜不遑寐敘意於濡翰明燈曜閨中清風凄已寒白露塗前庭應門重其闗四節相推斥嵗月忽欲殫壯士逺出征戎事将獨難涕泣灑衣裳能不懐所歡其四凉風吹沙礫霜氣何皚皚明月照緹幕華燈散炎輝賦詩連篇章極夜不知歸君侯多壮思文雅縱横飛小臣信頑鹵僶俛安能追贈徐幹是時徐在西掖劉在禁省故有此詩誰謂相去逺隔此西掖垣拘限清切禁中情無由宣思子沈心曲長嘆不能言起坐失次第一日三四遷歩出北寺門遥望西苑園細栁夾道生方塘含清源輕葉隨風轉飛鳥何翻翻乖人易感動涕下與衿連仰視白日光皦皦髙且懸兼燭八紘内物類無頗偏我獨抱深感不得與比焉贈從弟三首其一汎汎東流水磷磷水中石蘋藻生其涯華葉紛擾溺采之薦宗廟可以羞嘉客豈無園中葵懿此出深澤其二亭亭山上松瑟瑟谷中風風聲一何盛松枝一何勁冰霜正慘悽終嵗常端正豈不罹凝寒松柏有本性其三鳳皇集南岳徘徊孤竹根於心有不厭奮翅凌紫氛豈不常勤苦羞與黄雀羣何時當來儀将須聖明君雜詩職事相一作煩填委文墨紛消散馳翰未暇食日昃不知晏沈迷簿領書回回自昏亂釋此出西城登髙且㳺觀方塘含白水中有鳬與雁安得肅肅羽從爾浮波瀾鬭雞丹雞被華采雙距如鋒芒願一揚炎威㑹戰此中唐利爪探玉除瞋目含火光長翹驚風起勁翮正敷張輕舉奮勾喙電擊復還翔射鳶鳴鳶㺯雙翼飄飄薄青雲我后横怒起意氣凌神仙發機如驚猋三發兩鳶連流血灑墻屋飛毛從風旋庶士同聲賛君射一何妍失題其一昔君錯畦畤東土有素木條柯不盈尋一尺再三曲隠生寘翳林倥偬自迫束得託芳蘭苑列植髙山足後闕其二青青女蘿草上依髙松枝幸䝉庇養恩分惠不可貲風雨雖急疾根株不傾移後闕漢魏六朝百三家集巻三十一
