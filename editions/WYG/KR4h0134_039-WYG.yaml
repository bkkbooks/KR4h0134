body:
  text: 漢魏六朝百三家集巻三十九目録傅𤣥集題詞晉代郊祀宗廟樂歌多推傅休奕顧其文采與荀張等耳苦相篇與襍詩二首頗有四愁定情之風歴九秋篇讀者疑為漢古辭非相如枚乘不能作其言文聲永誠詩家六言之祖也休奕天性峻急正色白簡臺閣生風獨為詩篇辛婉温麗善言兒女强直之士懷情正深賦好色者何必宋玉哉後人致疑廣平抑固哉髙叟也晉武受禪廣納直言休奕時務便宜諸疏劘切中理至云魏武好法術天下貴刑名魏文慕通逺天下賤守節請退虚鄙如逐鳥雀晉衰薄俗先有隱憂干令升論曰覽傅𤣥劉毅之言而得百官之邪核傅咸之奏錢神之論而覩寵賂之彰悼禍亂而美知幾清泉藥石可世守也爭言罵座兩遭免官褊心有誚亦汲長孺之微戅乎目録賦朝㑹賦正都賦又又又辟雍鄉飲酒賦陽春賦述夏賦大寒賦喜霽賦弔秦始皇賦有序筆賦硯賦琵琶賦冇序又又箏賦圓扇賦相風賦酒賦又又桃賦李賦𤣥棗賦石榴賦𤓰賦桑椹賦柳賦蓍賦鬱金賦紫花賦有序宜男花賦菊賦有序雉賦山雞賦鷹賦又鸚鵡賦鬬雞賦蟬賦乘輿馬賦良馬賦又又又馳射馬賦又又又􅋅狗賦猨猴賦鷹兎賦箏賦序乘輿馬賦序琴賦序彈碁賦序蜀葵賦序芸香賦序矯情賦序墓誌銘江夏太守任君墓誌銘疏陳時務疏水旱上便宜五事疏舉清逺疏表賀老人星表又奏諸官病奏議正朔議五祀議序贈扶風馬鈞序連珠序華嶽銘序七謨序論茍何論又又贊漢髙祖畫贊漢明帝畫贊班媫妤畫贊明徳馬皇后贊古今畫贊信陵又孫武太常趙咨畫贊楊阜贊序箴吏部尚書箴太子少傅箴銘印銘劍銘棟銘筆銘鏡銘杖銘澡盤銘燈銘龜滴銘席銘被銘衣銘裳銘冠銘履銘𤣥龍銘靈蛇銘擬金人銘作口銘誡口誡頌魏徳頌設難客難誄太僕龎侯誄祝文祝祖文服魏武帝擬古皮弁裁縑帛為白帢以易舊服魏尚書何晏好服婦人之服樂府晉郊祀歌三首夕牲歌迎送神歌饗神歌三章晉天地郊明堂歌六首夕牲歌降神歌天郊饗神歌地郊饗神歌又明堂饗神歌晉宗廟歌十一首夕牲歌迎送神歌征西將軍登歌豫章府君登歌潁川府君登歌京兆府君登歌宣皇帝登歌景皇帝登歌文皇帝登歌饗神歌二章晉四廂樂歌三首正旦大㑹行禮歌四章上壽酒歌食舉東西廂歌十三章晉鼓吹曲二十二首靈之祥宣受命征遼東宣輔政時運多難景龍飛平玉衡文皇統百揆因時運惟庸蜀天序大晉承運期金靈運於穆我皇仲春振旅夏苗田仲秋獮田順天道唐堯𤣥雲伯益釣竿晉正徳大豫舞歌二首正徳舞歌大豫舞歌晉宣武舞歌四首惟聖皇篇矛俞第一短兵篇劍俞第二軍鎮篇弩俞第三窮武篇安臺行亂第四晉宣文舞歌二首羽籥舞歌羽鐸舞歌晉鼙舞歌五首洪業篇天命篇景皇篇大晉篇明君篇晉鐸舞歌雲門篇短歌行秋胡行惟漢行豔歌行長歌行豫章行苦相篇和秋胡行飲馬長城窟行放歌行豔歌行有女篇墻上難為趨怨歌行朝時篇秋蘭篇明月篇前有一罇酒行何當行却東西門行美女篇飛塵篇董逃行歴九秋篇十二首吳楚歌鴻鴈生塞北行白楊行秦女休行雲中白子髙行西長安行車遥遥篇昔思君詩答程曉詩宴㑹詩芙蕖雜詩三首又答程曉宴詩天行篇日昇歌三光篇衆星詩苦雨苦熱古詩擬四愁詩四首并序兩儀詩天行歌雜言驚雷歌雜言一作雷雲歌蓮歌啄木雜歌九曲歌歌詞失題五首見藝文日部二初學江部三藝文矟部四藝文庭燎部五藝文松部漢魏六朝百三家集巻三十九目録欽定四庫全書漢魏六朝百三家集巻三十九明張溥撰傅𤣥集賦朝㑹賦仰二皇之文象詠帝徳乎上系考夏后之遺訓綜殷周之典制采秦漢之舊儀肇元正之嘉㑹於是先期戒事衆官允勅萬國咸亨各以其職翼翼京邑巍巍紫極前三朝之夜半庭燎晃以舒光華燈若乎火樹熾百枝之煌煌俯而察之如亢燭龍而昭𤣥方仰而觀焉若披丹霞而鑒九陽閶闔闢天門開坐太極之正殿嚴嵳峩以崔嵬嘉廣庭之敞麗美升雲之玉階相者從容俟次而入濟濟洋洋肅肅習習就位重列面席而立臚人齊列賔禮九重羣后徳讓海外來同束帛戔戔羔鴈邕邕獻䞇奉璋人肅其容是時天子盛服晨興坐武帳慿玉几正南面而聽朝慿權衡乎砥矢羣司百辟進阼納觴皇恩下降休氣上翔禮畢饗讌進止有章六樂遞奏磬管鏗鏘淵淵鼓鐘嘒嘒笙簧搏拊琴瑟以詠先皇雅歌内協頌聲外揚正都賦撫琴瑟陳鐘簴吹鳯簫擊鼉鼓奏新聲理秘舞乃有材童妙妓都盧迅足縁修竿而上下形既變而景屬忽跟桂而倒絶若將墜而復續虬縈龍蛇委隨紓曲杪竿首而腹旋承嚴節之繁促於是神嶽雙立岡巖崟崟靈草蔽崖嘉木成林東父翳青蓋而遐望西母使三足之靈禽列仙逸唱熊虎聽音丹蛟吹笙文豹鼓琴素女撫瑟而安歌聲可意而入心偓佺企而鶴立和清響而哀吟又五采文身質美光炫激衝風於秦鑪飛光天之烈燄又苖山之鋌鑄以為劍其利也陸斷犀兕水截輕鴻灑奔駟於中衢斬雙蛟於大江將以威天下而禦羣凶又手戲絶倒凌虚寄身跳丸擲掘飛劍舞輪辟雍鄉飲酒賦時皇帝親枉萬乘之尊號以幸乎辟雍鹵簿齊列官正其容乃延卿士乃命王公定小㑹之常儀兮饗殊俗而見逺邦揖讓而升有主有賔禮雖舊制其敎惟新若其俎豆有數威儀翼翼賔主百拜貴賤修勅酒清而不飲肴乾而不食及至嘒嘒笙磬喤喤鐘鼓琴瑟安歌徳音有叙樂而不淫好樸尚古四坐先迷而後悟然後知禮敎之𢎞普也陽春賦虚心定乎昏中龍星正乎春辰嘉句芒之統時宣太皥之威神素冰解而泰液洽𤣥獺祭而鴈北征乾坤絪緼冲氣穆清幽蟄蠢動萬物樂生依依楊柳翩翩浮萍桃之夭夭灼灼其榮繁華􅂱而燿野煒芬葩而揚英鵲營巢於髙樹燕銜泥於廣庭覩戴勝之止桑兮聆布榖之晨鳴樂仁化之普宴兮異鷹隼之變形習習谷風洋洋緑泉丹霞横景文虹竟天述夏賦四月惟夏運臻正陽和氣穆而扇物麥含露而飛芒清徵泛於琴瑟朱鳥感於炎荒鹿解角於中野草木蔚其條長大寒賦五行倐而競騖兮四節奔而電逝諒暑徃寒來十二月而成嵗日月㑹于析木兮重陰凄而増肅彩虹藏於虛廓兮鱗介潛而長伏若乃天地凛冽庶極氣否嚴霜夜結悲風晝起飛雪山積蕭條萬里百川明而不流兮冰凍合於四海扶木憔悴於湯谷若華零落於濛汜喜霽賦喜陰霖之既霽嘉良辰之肇晴悦氛電之潛匿兮樂天鑒之孔明行潦歸於百川兮七氣徹於云庭東風穆而扇路重陽昇其舒靈去湮没之憂患即通塗之敞平釋昏塾之䝉昧覩日月之光榮若幽龍之出泉兮超飛躍乎太清昔唐帝之欽明兮遘洪水之巨害在殷湯之盛時兮亢炎旱以歴嵗伊我后之神聖兮敷皇道以居帝雖風雨之失度兮且嘉榖之無敗咸調暢以滋茂兮天人穆其交泰命怡樂之吐和兮播仁風於無外弔秦始皇賦有序余治獄至長安觀乎阿房而弔始皇曰傷秦政之為暴棄仁義以自亡搦紙申辭以弔始皇有姬失統命不於常六國既平奄有萬方政虐刑酷如火之揚致周章之百萬取發掘於項王疲斯民乎宫墓甚癸辛於夏商未旋踵而為墟屯麞麋乎廟堂國既顛而莫扶孰阻兵之為强筆賦簡修毫之竒兎選珍皮之上翰濯之以清水芬之以幽蘭嘉竹翠色彤管含丹於是班匠竭巧名工逞術纒以素枲納以𤣥漆豐約得中不文不質爾乃染芳松之淳寫文象於紈素動應手而從心煥光流而星布硯賦採陰山之潛璞簡衆材之攸宜節方圓以定形鍛金鐡而為池設上下之剖判配法象乎二儀木貴其能軟石美其潤堅加采漆之膠固含冲徳之清𤣥琵琶賦有序世本不載作者聞之故老云漢遣烏孫公主嫁昆彌念其行道思慕使工人知音者載琴箏筑箜篌之屬作馬上之樂觀其器中虚外實天地象也盤員柄直陰陽叙也柱有十二配律吕也四弦法四時也以方語目之故云琵琶取易傳於外國也杜摰以為嬴秦之末蓋苦長城之役百姓弦鼗而鼓之二者各有所據以意斷之烏孫近焉素手紛其若飄兮逸響薄於高梁弱腕忽以競騁兮象驚電之絶光飛纎指以促柱兮創發越以哀傷時旃搦以刼蹇兮聲皦耀以激揚啟飛龍之祕引逞竒妙於清商聲哀内結沈氣外澈舒誕沈浮徊翔曲折又然後衆弄雜㑹六引遞奏纎絃振舞迅手繁騖又控修柄以布柱轉四時而發機箏賦陰沈陽升柔屈剛興𤣥黄之分推故引新迭為主賓四時之陳追赴促彈急擊扣危洪纎雜沓或合或離清濁代興有始有終哀起清羽樂混大宫圓扇賦何皎月之纎素擬皓日而軟貞晞箑莆之芳烈隨變體而殊名勁節剛以立質象日月之定形北堂書抄載傅𤣥紈扇賦曰隆暑翕以鬱蒸炎氣燎于幽房相風賦有序昔之造相風者其知自然之極乎其逹變通之理乎上稽天道陰陽之運表以靈烏物象其類下慿地體安貞之德鎮以金虎𤣥成其氣風雲之應龍虎是從觀妙之徵神明所通夫能立成器以占吉凶之先見者莫精乎此乃構相風因象設形蜿盤獸以為趾建修竿之亭亭體正直而無撓度徑挺而不傾棲神烏以竿首俟祥風之來征酒賦課長興與中山北蒼梧與宜城造藥限以原缺味密甜而膽苦又飲者杯無算甌醴成川渠又應酒旗之明象赴酒泉之佳名桃賦有東園之珍果兮承陰陽之靈和結柔根以列樹兮豔長畝而駢羅夏日先熟初進廟堂辛氏踐秋厥味益長花落實結與時剛柔既甘且脆入口消流亦有冬桃冷侔冰霜和神適意恣口所嘗華升御於内庭兮飾佳人之令顔實充虚而療饑兮信功烈之難原嘉放牛於斯林兮悦萬國之乂安望海島而慷慨兮懐度索之靈山何兹樹之獨茂兮條枝紛而麗閑根龍虬而雲結兮彌萬里而屈盤禦百鬼之妖慝兮列神荼以司奸辟凶邪而濟正兮豈唯榮美之足言李賦植中州之名果兮結修根於芳園嘉列樹之蔚蔚兮美弱枝之爰爰既乃長條四布密葉重陰夕景廻光傍陰蘭林於是肅肅晨風飄飄落英潛實内結豐彩外盈翠質未變形隨運成清角奏而微酸起大宫動而和甘生既變洽熟五色有章種别類分或朱或黄甘酸得適美逾密房浮彩㸃駁赤者如丹入口流濺逸味難原見之則心悦含之則神安乃有河沂黄建房陵縹青一樹三色異味殊名乃上代之所不覩兮咸升御乎紫房周萬國之口實兮充薦饗於神靈昔怪古人之感貺乃答之以寳瓊翫斯味之竒瑋兮然後知報之為輕𤣥棗賦有蓬萊之嘉樹植神州之膏壤擢剛莖以排虚誕幽根以滋長北陰塞門南臨三江或布燕趙或廣河東既乃繁枝四合豐茂蓊鬱斐斐素華離離朱實脆若離雪甘如含蜜脆者宜新當夏之珍堅者宜乾薦羞天人有棗若𤓰出自海濱全生益氣服之如神石榴賦鳥宿中而纎條結龍辰升而丹華繁其在晨也灼若旭日棲扶桑其在昏也奭若燭龍吐潛光苞𤣥黄之列輝縁煒曄而焜煌發朱榮於緑葉時從風而飃揚𤓰賦調土下種播之有經應運候時負甲徐生遂日就而月將既成母而盤縈次落莫之密葉兮交逶迤之修莖敷碧緑之純采金華炳其朗明育之以人功養之以六氣黄逾金緗青侔含翠雖貍首之甘美兮未若東門之竒偉舊有蜜筩及青括蔞嘉味溢口鮮類寡儔一齧之頃至三揺頭選美芳園重簡其珍披以吳刀承以朱盤中割而破雖分若完質見五味氣美芳蘭愈得冷而益甘兮怡神爽而解煩細肌密理多瓤少瓣豐㫖絶異食之不䬼桑椹賦繁實離離含甘吐液翠朱三變或𤣥或白嘉味殊滋食之無斁柳賦美允靈之鑠氣兮嘉木徳之在春何兹柳之珍樹兮禀二儀之清純受大角之禎祥兮生濛汜之遐濱參剛柔而定體兮應中和以屈伸長莖舒而增茂兮密葉布而重陰夾通塗與廣庭兮環清沼而成林於是𤣥雲被岳素景含暉泰液渥流朝露未晞是精靈之所鍾兮蔚鬱鬱以依依居者觀而弭思兮行者樂而忘歸夫其結根建本則固於泰山兼覆廣施則均於昊天雖尺斷而逾滋兮配生生於自然無邦壤而不植兮象乾道之屢遷紛猗靡以從風兮若將徃而復旋若乃豐葩茂樹長枝夭夭阿那四垂凱風振條同志來遊攜手逍遥蓍賦春邁衡徳於青陽混百卉而萌生逮朱夏而修茂暨商秋而堅貞雖離霜而未彫與潛龜乎通靈於是原極以道握形以度以類萬物之情以通天下之故豈唯終始於事業乃參天而倚數棄原野之蕭條升雲階而内御運兹莖於掌握爻象形而星布信鉤深而致逺實開物而成務鬱金賦葉萋萋兮翠青英藴藴而金黄樹奄藹以成陰氣芬馥而含芳凌蘇合之殊珍豈艾納之足方榮曜帝㝢香播紫宫吐芬揚烈萬里望風紫花賦有序紫華一名長樂華舊生於蜀其東界特饒中國竒而種之余嘉其華純耐久可歴冬而服故與友生各為之賦有遐方之竒草禀二氣之純精仰紫微之景曜因令色以定名剛莖勁立纎條繁列從回風以揺動紛蘭暢而蕙潔蔚青葱以増茂並含華而未發於是散緑葉秀紫榮藴若芝草之始敷灼若百枝之在庭獨參差以照耀何光麗之雜形渙渙昱昱而奪人目精下無物以借喻上取象於朝霞妙萬物而比豔莫兹草之可嘉太平御覽傅𤣥紫華賦尚有葩豔挺生碧枝兮煥若珊瑚之翠英宜男花賦猗猗令草生於中方花曰宜男號應禎祥逺而望之煥若三辰之麗矢近而察之明若芙蓉之鑒泉於是狡童媛女以時來征結九秋之永思含春風以娯情菊賦有序詩人覩王睢而咏后妃之徳屈平見朱橘而申忠臣之志布濩河洛縱横齊秦掇以纎手承以輕巾揉以玉英納以朱脣服之者長壽食之者通神雉賦禀炎離之正氣應朱火之禎祥播五彩之繁縟被華文而成章冠列角之盛儀翹從風而飄揚履嚴距之武節超鸞跱而鳯翔感天和而貽瑞進據鼎而祚商樂周道之方隆敷皓質於越裳山雞賦惟南州之令鳥兼坤離而體珍被黄中之正色敷文象以飾身翳景山之竹林超遊集乎水濵鑒中流以顧影晞雲表之清塵鷹賦含炎離之猛氣兮受金剛之純精獨飛跱於林野兮復迴翔於天庭左看若側右視如傾勁翮二六機連體輕鈎爪懸芒足如枯荆嘴利吳㦸目熲星明雄姿邈世逸氣横生又奮翅不得起撫翼無所翔飾五采之華絆結璇璣之金鐶雖逍遥於廣厦思擊厲於中原鸚鵡賦竒毛曜體緑采含英鳯翔鸞踦孔質翠榮發言輒應若響追聲懸赬分於丹足婉朱咮之熒熒鬬雞賦𤣥羽黝而含曜兮素毛頴而揚精紅縹厠於微黄兮翠彩蔚而流青五色錯而成文兮質光麗而豐盈前看如倒傍視如傾目象規作嘴似削成髙膺峭跱雙翅齊平躍身竦體怒勢横生爪似鍊鋼目如奔星揚翹因風撫翮長鳴猛志横逸勢凌天廷或躑躅踟蹰或囁容與或爬地俯仰或舞翼未舉或狼顧鴟視或鸞翔鵠舞或佯背而引敵或畢命於强禦於是紛紜翕赫雷合電擊爭奮身而相㦸兮競隼鷙而鵰睨得勢者凌九天失據者淪九地徒觀其戰也則距不虛挂翮不徒拊意如饑鷹勢如逸虎蟬賦美兹蟬之純潔兮禀陰陽之微靈含精粹之貞氣兮體自然之妙形潛𤣥昭於后土兮雖在穢而愈馨經青春而未育兮當隆夏而化生忽神蜕而靈變兮奮輕翼之浮征翳密葉之重蔭兮噪閒樹之肅清縁長枝而仰觀兮吸渥露之朝零洎無為而自得兮聆商風而和鳴聲嘒嘒以清和兮遥自託乎蘭林嗟羣吟以近唱兮似簫管之餘音清激暢於遐邇兮時感君之丹心乘輿馬賦目若曜星符采横發髙顛懸日雙璧象月頭似削成鬛如鬂髪延首髙驤擢足軒跱氣蓋青雲勢凌萬里九方不能測其天機秦公不能究其妙理良馬賦金覊在首發以明珂鏤鞍采䩸織勒含華又飾以金覊甲以玉纓結以輕軒節以和鈴又鞭不得揺手不及動忽然増逝力飛骨踴又奮舋沛艾虎據麟跱望雲睇景乘虚四起縱銜斯逝攬鞚則止馳射馬賦何逸羣之竒駿生濛汜之遐濵附南方以定位表天駟於三辰儀乾行之剛健慿坤厚以託身豈驥徳之足慕晞萬里之清塵又百鳥齊興六驥孔閑金銜玉覊文勒鏤鞍明珂景朗華䩸采鮮又佷如革戾如膠鞭裁向腹奮尾跳尻人耳小易使鼻大勢怒徃來若鷹鷂超騰如逸虎走狗賦蓋輕迅者莫如鷹猛㨗者莫如虎惟良犬之稟性兼二儁之勁武應天人之景暉順儀象而近處慿水木之和氣鍊金精以自輔統黔喙於秋方居太素之内㝢諒韓盧其不抗豈晉􅋙之能禦既乃濟盧泉涉流沙踰三光跨大河希代來貢作珍皇家骨相多竒儀表可嘉足懸鉤爪口含素牙首䫫驤螭尾如騰蛇修頸濶腋廣前捎後豐顱促耳長义緩口舒節急筋豹耳龍形蹄如結鈴五魚體成勢若凌青雲目若泉中星轉視流光朱曜赤精震茹黄而慴宋鵲兮越妙古而揚名於是尋漏跡躡遺蹤形疾騰波勢如駭龍邈朝烏之輕機兮絶猛獸之逸軌漂星流而景屬兮逾窈㝠而騰起陵岡越壑横山超谷原無遁兎林無隱鹿顧芷隰以嬉遊兮步蘭臯而騁足然後娛志苑囿逍遥中路屬精萊以待蹤逐東郭之狡兎既洋洋以衍衍逞妙觀於永路既迅㨗其無前又閒暇而有度樂極情遺逸足未殫抑武烈而就羅兮順指麾而言旋歸功美於執絏兮其槃瓠之不虞感恩養而懐徳兮願致用於後田聆輶車之鸞鑣兮逸猲獢而盤桓猨猴賦余酒酣耳熱懽顔未伸遂戲猴而縱猿何瓌畸之驚人戴以赤幘襪以朱巾先裝其面又丹其脣揚眉蹙額若愁若瞋或長眡而抱勒或嚄咋而􅰺齗或顒卬而踟蹰或悲嘯而唫呻既似老公又類胡女或低昡而擇蝨或抵掌而胡舞鷹兎賦鷹謂兎曰汝害于物有益于世華髦被札彤管以制箏賦序箏以為䝉恬所造今觀其器上圓似天下平似地中空准六合絃柱十二擬十二月設之則四象存鼓之則五音發體合法度節究哀樂斯乃仁智之器也豈亡國之臣所能開思運巧哉或以為䝉恬所造非也乘輿馬賦序往日劉備之初降也太祖賜之駿馬使自至廐選之歴名馬以百數莫可意者次之下廐有的顱馬委棄莫視疲瘁骨立劉備撫而取之衆莫不笑之馬超破蘇氏塢塢中有駿馬百餘匹自超以下俱爭取肥好者而將軍龎恩獨取一騧馬形觀既醜衆亦笑之其後劉備奔於荆州馬超戰於渭南逸足電發追不可逮衆乃服焉琴賦序神農氏造琴所以協和天下人性為至和之主齊桓有鳴琴曰號鍾楚王有琴曰繞梁司馬相如有緑綺蔡邕有焦尾皆名器也彈碁賦序漢武帝好蹴鞠劉向以為蹴鞠勞人體竭人力非至尊所宜御乃因其體而作彈碁以解之今觀其道蹴鞠道也蜀葵賦序蜀葵其苗似𤓰瓠嘗種之一年引苗而生華經二年春乃發既大而結鮮紫色曜日芸香賦序始以微香進入終於損棄黄壤吁可閔也遂詠而賦之矯情賦序我太宗文皇帝命臣作西征賦又命陳徐諸臣作箴皆含玉吐金爛然成章墓誌銘江夏太守任君墓誌銘君承洪苖之髙胄禀岐嶷之上姿質美珪璋志邈雲霄景行足以作儀範柱石足以慮安危弱冠而英名播乎遐邇拜江夏太守内平五敎外運六竒邦國乂安飄塵不作銘曰峩峩任君應和秀生如山之峙如海之渟才行闡茂文武是經羣后利徳泊然弗營宜享景福光輔上京如何夙逝不延百齡疏陳時務疏臣聞舜舉五臣無為而化用人得其要也天下羣司猥多不可不審得其人也不得其人一日則損不貲况積日乎典謨曰無曠庶官言職之不可乆廢也諸有疾病滿百日不差宜令去職優其體秩而寵存之既差而後更用臣不廢職於朝國無曠官之累此王政之急也臣聞先王分士農工商以經國制事各一其業而殊其務自士已上子弟為之立太學以敎之選明師以訓之各隨其才優劣而授用之農以豐其食工以足其器商賈以通其貨故雖天下之大兆庶之衆無有一人游手分數之法周備如此漢魏不定其分百官子弟不修經藝而務交遊未知莅事而坐享天禄農工之業多廢或逐淫利而離其事徒繫名於太學然不聞先王之風今聖明之政資治而漢魏之失未改散官衆而學校未設游手多而親農者少工器不盡其宜臣以為亟定其制而通計天下若干人為士足以副在官之吏若干人為農三年足有一年之儲若干人為工足其器用若干人為商賈足以通貨而已尊儒尚學貴農賤商此皆事業之要務也前皇甫陶上事欲令賜拜散官皆課使親耕天下享足食之利禹稷躬稼祚流後世是以明堂月令著帝籍之制伊尹古之名臣耕於有莘晏嬰齊之大夫避莊公之難亦耕於海濵昔者聖帝明王賢佐俊士皆嘗從事於農矣王人賜官冗散無事者不督使學則當使耕無縁放之使坐食百姓也今文武之官既衆而拜賜不在職者又多加以服役為兵不得耕稼當農者之半南面食禄者㕘倍於前使冗散之官農而收其租税家得其實而天下之穀可以無乏矣夫家足食為子則孝為父則慈為兄則友為弟則悌天下足食則仁義之敎可不令而行也為政之要計人而置官分人而授事士農工商之分不可斯須廢也若果能精其防制計天下文武之官足為副貳者使學其餘皆歸之於農若百工商賈有長者亦皆歸之於農務農若此何有不贍乎虞書曰三載考績三考黜陟幽明是為九年之後乃有遷敘也故居官乆則念立慎終之化居不見乆則競為一切之政六年之限日月淺近不周黜陟陶之所上義合古制夫儒學者王敎之首也尊其道貴其業重其選猶恐化之不崇忽而不以為急臣懼日有陵遲而不覺也仲尼有言人能𢎞道非道𢎞人然則尊其道者非惟尊其書而已尊其人之謂也貴其業者不妄敎非其人也重其選者不妄用非其人也若此而學校之綱舉矣水旱上便宜五事臣聞聖帝明王受命天時未必無災是以堯有九年之水湯有七年之旱惟能濟之以人事耳故洪水滔天而免沈溺野無生草而不困匱伏惟陛下聖徳欽明時小水旱人未大饑下祗畏之詔求極意之言同禹湯之罪已侔周文之夕愓臣伏懽喜上便宜五事其一曰耕夫務多種而耕暵不熟徒喪功力而無收又舊兵持官牛者官得六分士得四分自持私牛者與官中分施行來乆衆心安之今一朝減持官牛者官得八分士得二分持私牛及無牛者官得七分士得三分人失其所必不懽樂臣愚以為宜佃兵持官牛者與四分持私牛與官中分則天下兵作懽然悦樂愛惜成榖無有損棄之憂其二曰以二千石雖奉務農之詔猶不勤心以盡地利昔漢氏以墾田不實徵殺二千石以十數臣愚以為宜申漢氏舊典以警戒天下郡縣皆以死刑督之其三曰以魏初未留意於水事先帝統百揆分河堤為四部并本凡五謁者以水功至大與農事並興非一人所周故也今謁者一人之力行天下諸水無時得徧伏見河堤謁者車誼不知水勢轉為他職更選知水者代之可分為五部使各精其方宜其四曰古以步百為畝今以二百四十步為一畝所覺過倍近魏初課田不務多其頃畝但務修其功力故白田收至十餘斛水田收數十斛自頃以來日増田頃畝之課而田兵益甚功不能修理至畝數斛已還或不足以償種非與曩時異天地横遇災害也其病正在於務多頃畝而功不修耳竊見河堤謁者石恢甚精練水事及田事知其利害乞中書召恢委曲問其得失必有所補益其五曰臣以為胡夷獸心不與華同鮮卑最甚本鄧艾茍欲取一時之利不慮後患使鮮卑數萬散居人間此必為害之勢也秦州刺史胡烈素有恩信於西方今令烈徃諸胡雖已無惡必且消弭然獸心難保不必其可乆安也若後有動釁烈計能制之惟恐胡虜適困於討擊便能東入安定西赴武威外名為降可動復動此二郡非烈所制則惡胡東西有窟穴浮游之地故復為患無以禁之也宜更置一郡於髙平川因安定西州都尉募樂徙民重其復除以充之以通北道漸以實邊計議此二郡及新置郡皆使并屬秦州令烈得專御邊之宜舉清逺疏臣聞先王之臨天下也明其大敎長其義節道化隆於上清議行於下上下相奉人懷義心亡秦蕩滅先王之制以法術相御而義心亡矣近者魏武好法術而天下貴刑名魏文慕通逺而天下賤守節其後綱維不攝而虚無放誕之論盈於朝野使天下無復清議而亡秦之病復發於今陛下聖徳龍興受禪𢎞堯舜之化開正直之路體夏禹之至儉綜殷周之典文臣詠歎而已將又奚言惟未舉清逺有禮之臣以敦風節未退虛鄙以懲不恪臣是以猶敢有言武帝詔報舉清逺有禮之臣者此尤今之要也表賀老人星表老人星見體色光明嘉占元吉𢎞無量之祐隆克昌之祚普天同慶率土㑹歡又老人星見暉景光明聖主壽延享祚元吉自天之祐莫不抃舞奏諸官病奏諸官有病滿百日不差宜令去職優其禮秩既差而復用議正朔議帝王受命應厯禪代則不改正朔遭變征伐則改之舜正月上日受終於文祖無改正之文唐虞正朔皆同明矣夏殷周革命乃改魏受漢禪亦已不改至于服色皆從其本唯節幡用黄大晉以金徳王天下順五行三統之序矣五祀議禮大記云室中央中霤謂四霤之中也祭于漏井蓋失之矣七祀之文皆云祀行而無井祭竈而不祭井於事則闕夫設祀者非唯報功而已亦神道設敎使民慎之幽明也臣以為帝之都城宜祭一門正宫一門正室一户井竈中霤亦各擇其一正者祭之序贈扶風馬鈞序馬先生天下之名巧也少而游豫不自知其為巧也當此之時言不及巧焉可以言知乎為博士居貧乃思綾機之變不言而世人知其巧矣舊綾機五十綜者五十躡六十綜者六十躡先生患其喪功費日乃皆易以十二躡其竒文異變因感而作者猶自然之成形陰陽之無窮此輪扁之對不可以言言者又焉可以言校也先生為給事中與常侍髙堂隆驍騎將軍秦朗爭論於朝言及指南車二子謂古無指南車記言之虛也先生曰古有之未之思耳夫何逺之有二子哂之曰先生名鈞字徳衡鈞者器之模而衡者所以定物之輕重輕重無凖而莫不模哉先生曰虛爭空言不如試之易效也於是二子遂以白明帝詔先生作之而指南車成此一異也又不可以言者也從是天下服其巧矣居京都城内有地可以為園患無水以灌之乃作飜車令童兒轉之而灌水自覆更入更出其巧百倍於常此二異也其後人有上百戲者能設而不能動也帝以問先生可動否對曰可動帝曰其巧可益否對曰可益受詔作之以大木彫構使其形若輪平地施之潛以水發焉設為女樂舞象至令木人擊鼔吹簫作山岳使木人跳丸擲劔縁絙倒立出入自在百官行署舂磨鬬雞變巧百端此三異也先生見諸葛亮連弩曰巧則巧矣未盡善也言作之可令加五倍又患發石車敵人之於樓邊縣濕牛皮中之則墮石不能連屬而至欲作一輪縣大石數十以機鼓輪為常則以斷縣石飛擊敵城使首尾電至嘗試以車輪懸瓴甓數十飛之數百步矣有裴子者上國之士也精通見理聞而哂之乃難先生先生口屈不對裴子自以為難得其要言之不已傅子謂裴子曰子所長者言也所短者巧也馬氏所長者巧也所短者言也以子所長擊彼所短則不得不屈以子所短難彼所長則必有所不解者夫巧天下之微事也有所不解而難之不已其相擊刺必已逺矣心乖於内口屈於外此馬氏所以不對也傅子見安卿侯言及裴子之論安卿侯又與裴子同傅子曰聖人具體備物取人不以一揆也有以神取之者有以言取之者有以事取之者有以神取之者不言而誠心先達徳行顔淵之倫是也以言取之者以變辯是非言語宰我子貢是也以事取之者若政事冉有季路文學子游子夏雖聖人之明盡物如有所用必有所試然則試冉季以政試游夏以學矣游夏猶然况自此而降者乎何者懸言物理不可以言盡也施之於事言之難盡而試之易知也今若馬氏所欲作者國之精器軍之要用也費十尋之木勞二人之力不經時而是非定難試易驗之事而輕以言抑人異能此猶以已智任天下之事不易其道以御難盡之物此所以多廢也馬氏所作因變而得是則初所言者不皆是矣其不皆是因不用之是不世之巧無由出也夫同情者相妬同事者相害中人所不能免也故君子不以人害人必以考試為衡石廢衡石而不用此美玉所以見誣為石荆和所以抱璞而哭之也於是安卿侯悟遂言之武安侯武安侯忽之不果試也此既易試之事又馬氏巧名已定猶忽而不察况幽深之才無名之璞乎後之君子其鑒之哉馬先生之巧雖古公輸般墨翟王爾近漢世張平子不能過也公輸般墨翟皆見用於時乃有益於世平子雖為侍中馬先生雖給事省中俱不典工官巧無益於世用人不當其才聞賢不試以事良可恨也裴子者裴秀安卿侯者曹羲也武安侯者曹爽也連珠序所謂連珠者興於漢章帝之世班固賈逵傅毅三才子受詔作之而蔡邕張華之徒又廣焉其文體辭麗而言約不指説事情必假喻以逹其㫖而賢者微悟合於古詩勸興之義欲使歴歴如貫珠易覩而可悦故謂之連珠也班固喻美辭壯文章𢎞麗最得其體蔡邕似論言質而辭碎然㫖篤矣賈逵儒而不艷傅毅有文而不典華嶽銘序易稱法象莫大乎天地天以髙明崇顯而嶽配焉地以廣厚為基而嶽體焉若夫太華之為鎮也五嶽列位而存其首三條分方而處其中故能參兩儀以比徳協和氣之絪緼故雲行與雨施興靁風以動物是以古先歴代聖帝明王莫不燔柴加牲尊而祀焉於虞書則西廵狩至于西嶽而親祭焉於禮則大司馬掌其分域而大宗伯典其禮祀也七謨序昔枚乘作七發而屬文之士若傅毅劉廣世崔駰李尤桓麟崔琦劉梁之徙承其流而作之者紛焉七激七興七依七欵七説七蠲七舉之篇於時通儒大才馬季長張平子亦引其源而廣之馬作七厲張造七辨或以恢大道而導幽滯或以黜瑰奓而託諷詠揚暉播烈垂於後世者凡十有餘篇自大魏英賢迭作有陳王七啟王氏七釋楊氏七訓劉氏七華從父侍中七誨並陵前而邈後揚清風於儒林亦數篇焉世之賢明多稱七激為工餘以為未盡善也七辨似也非張氏至思比之七激未為劣也七釋僉曰妙哉吾無間矣若七依之卓轢一致七辨之纒綿精巧七啟之奔逸壯麗七釋之精密閑理亦近代之所希也論茍何論以文王之道事其親者其潁昌何侯乎其荀侯乎古稱曽閔今日曽何内盡其心以事其親外崇禮讓以接天下孝子百世之宗仁人天下之命有能行孝之道君子之儀表也詩云髙山仰止景行行止令徳不遵二夫子之景行者非樂中正之道也又潁昌侯之事親其盡孝子之道乎存盡其和事盡其敬亡盡其哀予於潁昌侯見之矣又見其親之黨如見其親六十而孺慕予於潁昌侯見之矣贊漢髙祖畫贊赫赫漢祖受命龍興五星協象神母告徵討秦滅項如日之升超從側陋光據萬乘漢明帝畫贊肅矣孝明仗法任刑勤綜萬機察下以情未𢎞道治用致太平專信俗儒非禮之經班媫妤畫贊斌斌媫妤履正修文進辭同輦以禮匡君納侍顯徳讜對解紛退身避害志邈浮雲明徳馬皇后贊明徳馬后執履貞素光崇六行動遵禮度作后作母帝諮厥謀國賴内訓家應顯祚古今畫贊信陵信陵魏雄虎視龍驤謀嬴奮駭雷動北彊又孫武孫武論兵實妙於神竒正迭用變化無形太常趙咨畫贊天下信之如日月仰之如雲雨仁風翔於路衢禮讓行于士女時亮天工四門順軌楊阜贊序君構潛謀以龍變應事機而虎發山西數郡獲安者君克敵之勲也箴吏部尚書箴明明王軌制為九秩君執常道臣有定職各有攸司乂用不慝貴無常尊賤不恒卑不明厥徳國用顛危昔舜舉禹咎繇而俊乂在官湯舉阿衡而不仁流屏且表正而象平日夕而景側處喉舌者患銓衡之無常不患於不明故曰無謂隱微廢公任私無好自專違衆取怨是以古之君子無親無疎縱心大倫修已以道𢎞道以身易貴好爵書慎官人官不可妄授職不可闇受能者養之致福不能者弊之招咎衡臣司書敢告左右太子少傅箴夫金木無常方圓應形亦有隱括習以性成故近朱者赤近墨者黒聲和則響清形正則影直正人在側徳義盈堂鮑肆先入蘭蕙不芳傅臣司訓敢告君王銘印銘徃昔先王配天垂則乃設印章作信萬國取象晷度是銘是刻文明慎密直方其徳本立道生歸乎𤣥黙太上結繩下無荒慝劍銘道徳不修雖有千金之劍何所用之先王觀變而服劍所以立武象也太上有象而已其次則親用之銘曰光文耀武以衛乃國棟銘國有維輔屋有棟梁室之傾尚可柱也心之傾不可輔也筆銘韚韚彤管冉冉輕翰正色𤣥墨銘心冩言鏡銘人徒鑒于鏡止于見形鑒人可以見情杖銘杖正心安厥身以隨不安則傾不貞則危澡盤銘與其澡於水寧澡於徳水之清猶可穢也徳之修不可塵也燈銘晃晃華燈含滋炳靈素膏流液𤣥炷亭亭丹水陽輝飛景蘭亭龜滴銘鑄兹靈龜體象自然含出源水有似清泉潤彼𤣥墨染此弱翰申情冩素經緯羣言席銘閒居勿極其歡左端寢處母忘其患右端居其安無忘其危左後惑生於邪色禍成於多言右後被銘被雖温無忘人之寒無厚於已無薄於人衣銘衣服從其儀君子徳也衣以飾外徳以備内内修外飾禮有制也裳銘上衣下裳天地則也服從其宜君子徳也冠銘居髙無忘危在上無忘敬懼則安敬則正履銘戒之哉念履正無履邪正者吉之路邪者凶之徵𤣥龍銘麗哉神龍誕應陽精潛景九淵飛躍天庭屈伸從時變化無形偃伏汙泥上凌太清靈蛇銘嘉兹靈蛇斷而能續飛不須翼行不假足上騰雲霄下遊山嶽進此明珠預身龍族擬金人銘作口銘神以感通心繇口宣福生有兆禍來有端情莫多妄口莫多言蟻孔潰河溜穴傾山病從口入禍從口出存亡之機開闔之術口與心謀安危之源樞機之發榮辱存焉誡口誡勿謂何有積怨致咎勿曰不傳伏流成川蟻孔潰河流穴傾山頌魏徳頌朱旗翳天𤣥甲炤路戎車萬駟逸驥千羣設難客難振筆若天文運思若迴雲誄太僕龎侯誄烝烝孝敬行著閨庭如蘭之芳如金之貞在亂不回處暗斯明仁象春日威配秋霜慈恩雨施惠化風揚嘉善獻親疾惡若讐品定人倫清濁異流將繼四祖世據削定天假其年主優其禄等勲伊吕比壽東嶽祝文祝祖文祖君自東百靈齊行翠蓋翩翩象輿琱箱王予進駕驂服調良服魏武帝擬古皮弁裁縑帛為白帢以易舊服白乃軍容非國容也魏尚書何晏好服婦人之服此服妖也夫衣裳之制所以定上下殊内外也大雅云𤣥衮赤舄鉤膺鏤錫敬其文也小雅云有嚴有翼共武之服詠其武也若内外不殊王制失敘服妖既作身隨之亡妹喜冠男子之冠桀亡天下何晏服婦人之服亦亡其家其咎均也吳婦人之修容者急束其髪而劘角過于耳蓋其俗自操束大急而亷隅失中之謂也故吳之風俗相驅以急言論彈射以刻薄相尚居三年之喪者徃徃有致毁以死諸葛患之著正交論雖不可以經訓整亂蓋救時之作也樂府晉郊祀歌三首晉書樂志曰武帝受命㤗始二年詔郊祀明堂禮樂權用魏儀遵周室肇稱殷禮之義但改樂章使傳𤣥為之辭凡十九篇夕牲歌天命有晉穆穆明明我其夙夜祗事上靈常于時假迄用其一作冇成於薦𤣥牡進夕其牲崇徳作樂神祗是聽迎送神歌宣文蒸哉日靖四方永言保之夙夜匪康光天之命上帝是皇嘉樂殷薦靈祚景祥神祗降假享福無疆饗神歌三章天祚有晉其命惟新受終于魏奄有兆晉書作黎民燕及皇天懷柔百神丕顯遺烈之徳之純享其𤣥牡式用肇禋神祗來格福禄是臻時邁其猶昊天子之祐享有晉兆民戴之畏天之威敬授人時丕顯丕承於猶繹思皇極斯建庶績咸熙庶幾夙夜惟晉之祺宣文惟后克配彼天撫寧四海保有康年於乎緝熙肆用靖民爰立典制爰修禮紀作民之極莫非資始克昌厥後永言保之晉天地郊明堂歌六首夕牲歌天地郊明堂同皇矣有晉時邁其徳受終于天光濟萬國萬國既光神定厥祥䖍于郊祀祗事上皇祗事上皇百福是臻巍巍祖考克配彼天嘉牲匪歆徳馨惟饗受天之祐神化四方宋書作神和四暢降神歌於赫大晉膺晉書作應天景祥二帝邁徳宣兹重光我皇受命奄有萬方郊祀配享禮樂孔章神祗嘉饗祖考是皇克昌厥後保祚無疆天郊饗神歌整泰壇祀晉書作禮皇神精氣感百靈賔藴朱火燎芳薪紫烟遊一作起冠青雲神之體靡象形曠無方幽以清神之來光景照聽無聞視無兆神之至舉歆歆靈爽協動余心神之坐同歡娛澤雲翔化風舒嘉樂奏文中聲八音諧神是聽咸潔齊竝芬芳烹牷牲享玉觴神悦饗歆禋祀祐大晉降繁祉祚京邑行晉書作廣四海保天年晉書作命窮地紀地郊饗神歌整泰折竢皇祗衆神感羣靈儀陰祀設吉禮施夜將極時未移祗之體無形象潛泰幽洞忽荒祗之出薆若有靈無逺天下母祗之來遺光景昭若存終㝠㝠祗之至舉欣欣舞象徳歌成文祗之坐同歡豫澤雨施化雲布樂八變聲敎敷物咸亨祗是娛齊既潔侍者肅玉觴進咸穆穆饗嘉豢歆徳馨祚有晉暨羣生溢九壤格天庭保萬壽延億齡又初學記載結方丘祗國琛樽既享俎既歆歛檢玉具鏖金楙百福底自古協萬壽迄在今明堂饗神歌經始明堂享配匪解於皇烈考光配上帝赫赫上帝既髙既崇聖考是配明徳樂府作堂顯融率土敬職萬方來祭常于世假保祚永世晉宗廟歌十一首南齊書樂志曰晉泰始中傅𤣥造祠廟夕牲昭夏歌一篇迎送神肆夏歌一篇登歌七廟七篇饗神歌二篇𤣥云登歌歌盛徳之功烈故廟異其文饗神猶周頌之有瞽及雍但説祭饗神明禮樂之盛七廟饗神皆用之夕牲歌我夕我牲猗歟敬止嘉豢孔時供兹享祀神鑒厥誠博碩斯歆祖考降饗以虞孝孫之心迎送神歌嗚呼悠哉日鑒在兹以時享祀神明降之神明斯降既祐饗之祚我無疆受天之祜赫赫太上巍巍聖祖明明烈考丕承繼序征西將軍登歌經始宗廟神明戾止申錫無疆祗承享祀假哉皇祖綏予孫子燕及後昆錫兹繁祉豫章府君登歌嘉樂肆庭薦祀在堂皇皇宗廟乃祖先皇濟濟辟公相予蒸嘗享祀不忒降福穰穰潁川府君登歌於邈先后實司于天顯矣皇祖帝祉肇臻本支克昌資始開元惠我無疆享祀晉書作祚永年京兆府君登歌於惟曾皇顯顯令徳髙明清亮匪兢柔克保乂命祐基命惟則篤生聖祖光濟四國宣皇帝登歌於鑠皇祖聖徳欽明勤施四方夙夜敬止載敷文敎載揚武烈匡定社稷恭行天罰經始大業造創帝基畏天之命于時保之景皇帝登歌執競景皇克明克哲旁作穆穆惟祗惟畏纂宣之緒耆定厥功登此俊乂糾彼羣凶業業在位帝既勤止維天之命於穆不已文皇帝登歌於皇時晉允文文皇聰明睿智聖敬神武萬幾莫綜皇斯清之虎兕晉書作虵豕放命皇斯平之柔逺能邇簡授英賢創業垂統勲格皇天饗神歌二章曰晉是帝饗祀時序宗廟致敬禮樂具舉惟其來祭普天率土犧樽既奠清酤既載亦有和羮薦羞斯備蒸蒸永慕感時興思登歌奏舞神樂其和祖考來格祐我邦家敷天之下罔不休嘉肅肅在位濟濟臣工四海來格禮儀有容鐘鼓振管弦理舞開元歌永始神胥樂兮肅肅在位臣工濟濟小大咸敬上下有禮理管絃振鼔鐘舞象徳歌咏功神胥樂兮肅肅在位有來雍雍穆穆天子相維辟公禮有儀樂有則舞象功歌詠徳神胥樂兮晉四廂樂歌三首晉書樂志曰晉初食舉亦用鹿鳴至武帝泰始五年使傅𤣥荀朂張華各造正旦行禮及王公上壽酒食舉樂歌詩後又詔成公綏亦作焉傅𤣥造三篇一曰天鑒二曰於赫三曰天命正旦大㑹行禮歌四章天鑒有晉世祚聖皇時齊七政朝此萬方鐘鼓斯震九賔備禮正位在朝穆穆濟濟煌煌三辰實麗于天君后是象威儀孔䖍率禮無愆莫非邁徳儀刑聖皇萬邦惟則上壽酒歌於赫明明聖徳龍興三朝獻酒萬壽是膺敷佑四方如日之升自天降祚元吉有徵食舉東西廂歌十三章天命大晉載育羣生於穆上徳隨時化成自祖配命皇皇后辟繼天創業宣文之績丕顯宣文先知稼穡克恭克儉足敎足食既敎食之𢎞濟艱難上帝是祐下民所安天祐聖皇萬邦來賀雖安勿安乾乾匪暇乃正丘郊乃定冡社廙廙作宗光宅天下惟敬朝饗爰奏食舉盡禮供御嘉樂有序樹羽設業笙鏞以間琴瑟齊列亦有篪塤喤喤鼓鐘鎗鎗磬管八音克諧載夷載簡既夷既簡其大不禦風化潛興如雲如雨如雲之覆如雨之潤聲敎所暨無思不順敎以化之樂以和之和而養之時惟邕熙禮慎其儀樂節其聲於鑠皇繇既和且平晉鼓吹曲二十二首晉書樂志曰武帝令傅𤣥製鼓吹曲二十二篇以代魏曲靈之祥古朱鷺行古今樂録曰靈之祥言宣皇帝之佐魏猶虞舜之事堯也既有石瑞之徵又能用武以誅孟度之逆命也靈之祥石瑞章旌金徳出西方天降命授宣皇應期運時龍驤繼大舜佐陶唐讚武文建帝綱孟氏叛據南疆追有扈亂五常吳宼勁蜀虜彊交誓盟連遐荒宣赫怒奮鷹揚震乾威曜電光陵九天陷石城梟逆命拯有生萬國安四海寧宣受命古思悲翁行古今樂録曰宣受命言宣帝禦諸葛亮養威重運神兵宣受命應天機風雲時動神龍飛禦諸葛鎮雍梁邊境安夷夏康務節事勤定傾攬英雄保持盈淵穆穆赫明明沖而泰天之經養威重運神兵亮乃震斃天下晉書有安字寧征遼東古艾而張行古今樂録曰征遼東言宣帝討滅公孫淵而梟其首也征遼東敵失據威靈邁日域公孫既授首羣逆破膽咸震怖朔北響應海表景附武功赫赫徳雲布宣輔政古上之回行古今樂録曰言宣帝聖道深逺撥亂反正網羅文武之才以定二儀之序也宣皇輔政聖烈深撥亂反正從天心網羅文武才慎厥所生所生賢遺敎施安上治民化風移肇創一作造帝基洪業垂於鑠明明時赫戲功濟萬世定二儀定二儀雲行樂府作澤雨施海外風馳時運多難古擁離行古今樂録曰時運多難言宣帝致討吳方有征無戰也時運多難道敎痡天地變化有盈虛蠢爾吳蠻虎視江湖我皇赫斯致天誅有征無戰弭其圖天威横被廓東隅景龍飛古戰城南行古今樂録曰景龍飛言景帝克明威敎祚隆無疆崇此洪基也景龍飛御天威聰鑒𤣥察動與神明協機從之者顯逆之者滅夷文敎敷武功巍普被四海萬邦望風莫不來綏聖徳潛斷先天弗違弗違祥享世永長猛以致寛道化光赫明明祚隆無疆帝績惟期有命既集崇此洪基平玉衡古巫山髙行古今樂録曰平玉衡言景帝一萬國之殊風齊四海之乖心禮賢養士而纂洪業也平玉衡糺姦回萬國殊風四海乖禮賢養士羈御英雄思心齊纂戎洪業崇皇階品物咸亨聖敬日躋聰鑒盡下情明明綜天機文皇統百揆古上陵行古今樂録曰文皇統百揆言文帝始統百揆以敷太平之化也文皇統百揆繼天理萬方武將鎮四隅英佐盈朝堂謀言協秋蘭清風發其芳洪澤所漸潤礫石為珪璋大道侔五帝盛徳踰三王咸光大上參天與地至化無内外無内外六合竝康乂竝康乂遘兹嘉㑹在昔羲與農大晉徳斯邁鎮征及諸州為蕃衛𤣥功濟四海洪烈流萬世因時運古將進酒行古今樂録曰因時運言文帝因時運變聖謀潛施解長蛇之交離羣桀之黨以武濟文審其大計以邁其徳也因時運聖策施長虵交解羣桀離勢窮奔吳虎騎厲惟武進審大計時邁其徳清一世惟庸蜀古有所思行古今樂録曰惟庸蜀言文帝平蜀封建萬國復五等之爵也惟庸蜀潛號天一隅劉僃逆帝命禪亮承其餘擁衆數十萬闚隙乘我虛驛騎進羽檄天下不遑居姜維屢寇邊隴上為荒蕪文皇愍斯民歴世受罪辜外謨藩屏臣内謨衆士夫爪牙應指授腹心獻一作同良圖良圖協成文大一作乃興百萬軍雷鼓震地起猛勢陵浮雲逋虜畏天誅面縛造壘門萬里同風教逆命稱妾臣光建五等紀綱天人天序古芳樹行古今樂録曰天序言聖皇應厯受禪𢎞濟大化用人各盡其才也天序厯應受禪承靈祜御羣龍勒螭虎𢎞濟大化英雋作輔明明統萬機赫赫鎮四方咎繇稷契之疇協蘭芳禮王臣覆兆民化之如天與地誰敢愛其身大晉承運期古上邪行古今樂録曰大晉承運期言聖皇應籙受圗化象神明也大晉承運期徳隆聖皇時清晏白日垂光應籙圖陟帝位繼天正玉衡化行象神明至哉道隆虞與唐元首敷洪化百寮股肱竝忠良民大康隆隆赫赫福祚盈無疆金靈運古君馬黄行古今樂録曰金靈運言聖皇踐祚致敬宗廟而孝道行於天下也金靈運天符發聖徵見參日月惟我皇體神聖受魏禪應天命皇之興靈有徵登大麓御萬乘皇之輔若闞虎爪牙奮莫之禦皇之佐讚清化百事理萬邦賀神祗應嘉瑞章恭享禮薦先皇樂時奏磬管鏘鼓淵淵鐘鍠鍠奠樽俎實玉觴神歆饗咸悦康宴孫子祐無疆大孝烝烝徳教被萬方於穆我皇古雉子行古今樂録曰於穆我皇言聖皇受命德合神明也於穆我皇盛徳聖且明受禪君世光濟羣生普天率土莫不來庭顒顒六合内望風仰泰清萬國雍雍興頌聲大化洽地平而天成七政齊玉衡惟平峨峨佐命濟濟羣英夙夜乾乾萬機是經雖治興匪荒寧謙道光沖不盈天地合徳日月同榮赫赫煌煌曜幽㝠三光克從於顯天垂景星龍鳯臻甘露宵零肅神祗祗上靈萬物欣戴自天效其成仲春振旅古聖人出行古今樂録曰仲春振旅言大晉申文武之敎畋獵以時也仲春振旅大致民武敎於時日新師執提工執鼓坐作從晉書作起節有序盛矣允文允武蒐田表禡申法誓遂圍禁獻社祭允以時明國制文武竝用禮之經列車如戰大教明古今誰能去兵大晉繼天濟羣生夏苗田古臨髙臺行古今樂録曰夏苗田言大晉畋狩順時為苗除害也夏苗田運將徂軍國異容文武殊乃命羣吏選車徒辨其號名讚契書王軍啟八門行同上帝居時路建大麾雲旗翳紫虛百官象其事疾則疾徐則徐回衡旋軫罷陳斃車獻禽享祠烝烝配有虞惟大晉徳參兩儀化雲敷仲秋獮田古遠期行古今樂録曰仲秋獮田言大晉雖有文徳不廢武事順時以殺伐也仲秋獮田金徳常剛涼風清且厲凝露結為霜白藏司辰蒼隼時鷹揚鷹揚猶尚父順天以殺伐春秋時序雷霆振威曜進退由鉦鼓致禽祀祊羽毛之用充軍府赫赫大晉徳芬烈陵三五敷化以文雖治晉書作安不廢武光宅四海永享天之祜順天道古石留行古今樂録曰順天道言仲冬大閱用武修文大晉之徳配天也順天道握神契三時示講武事冬大閲鳴鐲振鼓鐸旌旗象虹霓文制其中武不窮武動軍誓衆禮成而義舉三驅以崇仁進止不失其序兵卒練將如闞虎惟闞虎氣陵青雲解圍三面殺不殄羣偃旌麾班六軍獻享蒸修典文嘉大晉徳配天禄報功爵俟賢饗燕樂受兹百禄嘉晉書作壽萬年唐堯古務成行古曲亡古今樂録曰唐堯言聖皇陟帝位徳化光四表也唐堯諮務成謙謙徳所興積漸終光大履霜致堅冰神明道自然晉書作成河海猶可凝舜禹統百揆元凱以次升禪讓應天厯睿聖世相承我皇陟帝位平衡正凖繩徳化飛四表祥氣見其徵興王坐俟旦亡主一作國恬自矜致逺由近始覆簣成山陵披圖按先籍有其證靈液𤣥雲古𤣥雲行古曲亡古今樂録曰𤣥雲言聖皇用人各盡其才也𤣥雲起丘山祥氣萬里㑹龍飛何蜿蜿鳯翔何翽翽昔在唐虞朝時見青雲際今親遊萬一作方國流光溢天外鶴鳴在後園清音隨風邁成湯隆顯命伊摰來如飛周文獵渭濵遂載吕望歸符合如影響先天天弗違輟耕綜時晉書作地網解褐衿天維元功配二王芬馨世所稀我皇叙羣才洪烈何巍巍桓桓征四表濟濟理萬機神化感無方髦才盈帝畿丕顯惟昧旦日新孔所咨茂哉明聖徳日月同光輝伯益古黄爵行古今樂録曰伯益言赤鳥銜書冇周以興今聖皇受命神雀來也伯益佐舜禹職掌山與川徳侔十六相思心入無間樂府作閒智理周萬物下知衆鳥言黄雀應清化翔集何翩翩和鳴棲庭樹徘徊雲日間夏桀為無道密網施山河酷祝振纎網當奈黄雀何殷湯崇天徳去其三面羅逍遥羣飛來鳴聲乃復和朱雀作南宿鳯凰統羽羣赤烏衘書至天命瑞周文神雀今來遊為我受命君嘉祥致天和膏澤隆一作降青雲蘭風發芳氣闔世同其芬釣竿古釣竿行漢鐃歌二十二曲無釣竿古今樂録曰釣竿言聖皇徳配堯舜又有吕望之佐以濟天功致太平也釣竿何冉冉甘餌芳且鮮臨川運思心微綸沈九淵太公寳此術乃在靈秘篇機變隨物移精妙貫未然游魚驚著釣潛龍飛戻天戻天安所至撫翼翔太清太清一何異兩儀出渾成玉衡正三辰造化賦羣形退願輔聖君與神合其靈我君𢎞逺略天人不足并天人初并時昧昧何芒芒日月有徵兆文象興三皇蚩尤亂生靈黄帝用兵征萬方逮夏禹而徳衰三代不及虞與唐我皇聖徳配堯舜受禪即祚享天祥率土䝉祐靡不肅庶事康庶事康穆穆明明荷百禄保無極永泰平晉正徳大豫舞歌二首宋書樂志曰晉荀朂典知樂事造正徳大豫之舞朂及傅𤣥張華又各造舞歌正徳舞歌天命有晉光濟萬國穆穆聖皇文武惟則在天斯正在地成徳載韜政刑載崇禮教我敷𤣥化臻於中道大豫舞歌於鑠皇晉配天受命煕帝之光世徳惟聖嘉樂大豫保祐萬姓淵兮不竭冲而用之先帝弗違䖍奉天時晉宣武舞歌四首晉書樂志曰魏黄初改漢巴渝舞曰昭武舞景初又作武始咸熙章斌三舞皆執羽籥及晉改昭武舞曰宣武舞羽籥舞曰宣文舞惟聖皇篇矛俞第一惟聖皇徳巍巍光四海禮樂猶形影文武為表裏乃作巴渝肆舞士劍弩齊列戈矛為之始進退疾鷹鷂龍戰而豹起如亂不可亂動作順其理離合有綂紀短兵篇劍俞第二劍為短兵其勢險危疾踰飛電回旋應規武節齊聲或合或離電發星騖若景若差兵法攸象軍容是儀軍鎮篇弩俞第三弩為逺兵軍之鎮其發有機體難動徃必速重而不遲鋭精分鏄射逺中微弩俞之樂一何竒變多姿退若激進若飛五聲協八音諧宣武象讚天威窮武篇安臺行亂第四窮武者喪何但敗北柔弱亡戰國家亦廢秦始徐偃既已作戒前世先王鑒其機修文整武藝文武足相濟然後徳光大亂曰髙則亢滿則盈亢必危盈必傾去危傾守以平沖則久濁能清混文武順天經晉宣文舞歌二首羽籥舞歌羲皇之初天地開元罔罟禽獸羣黎以安神農教耕創業誠難民得粒食澹然無所患黄帝始征伐萬品造其端軍駕無常居是曰軒轅軒轅既勤止堯舜匪荒寧夏禹治水湯武又用兵孰能保安逸坐致太平聖皇邁乾乾天下興頌聲穆穆且明明惟聖皇道化彰澂四海清三光萬機理庶事康潛龍升儀鳯翔風雨時物繁昌却􅋅馬降瑞祥揚側陋簡忠良百禄是荷眉壽無疆羽鐸舞歌昔在渾成時兩儀尚未分陽升垂清景陰降興浮雲中和合氛氲萬物各異羣人倫得其序衆生樂聖君三統繼五行然後有質文皇王殊運代治亂亦繽紛伊大晉徳兼徃古越犧農邈舜禹參天地陵三五禮唐周樂韶武豈惟簫韶六代具舉澤霑地境化充天㝢聖明臨朝元凱作輔普天同樂胥浩浩元氣遐哉太清五行流邁日月代征隨時變化庶物乃成聖皇繼天光濟羣生化之以道萬國咸寧受兹介福延于億齡晉鼙舞歌五首古今樂録曰晉鼙舞歌五篇一曰洪業篇當魏曲明明魏皇帝古曲關東有賢女二曰天命篇當魏曲大和有聖帝古曲章和二年中三曰景皇篇當魏曲魏厯長古曲樂久長四曰大晉篇當魏曲天生烝民古曲四方皇五曰明君篇當魏曲為君既不易古曲殿前生桂樹洪業篇宣文創洪業盛徳在泰始聖皇應靈符受命君四海萬國何所樂上有明天子唐堯禪帝位虞舜惟恭已恭已正南面道化與時移大赦盪萌漸文教被黄支象天則地體無為聰明配日月神聖參兩儀雖有三凶類靜言無所施象天則地體無為稷契竝佐命伊吕升王臣蘭芷登朝肆下無失宿民聲發響自應表立景來附虓虎從羈制潛龍升一作飛天路備物立成器變通極其數百事以時叙萬機有常度訓之以克讓納之以忠恕羣下仰清風海外同懽慕象天則地化雲布昔日貴雕飾今尚儉與素昔日多纎介今去情與故象天則地化雲布濟濟大朝士夙夜綜萬機萬機無廢理明明降疇咨臣譬列星景君配朝日暉事業竝通濟功烈何巍巍五帝繼三皇三王世所歸聖徳應期運天地不能違仰之彌已髙猶天不可階將復御龍氏鳯凰在庭棲天命篇聖祖受天命應期輔魏皇入則綜萬機出則征四方朝廷無遺理方表寧且康道隆舜臣堯積徳踰太王孟度阻窮險造亂天一隅神兵出不意奉命致天誅赦善戮有罪元惡宗為虚威風振勁蜀武烈慴彊吳諸葛不知命肆逆亂天常擁徒十餘萬數來寇邊疆我皇邁神武秉鉞鎮雍凉亮乃畏天威未戰先仆僵盈虚自然運時變固多艱東征陵海表萬里梟賊淵受遺齊七政曹爽又滔天羣凶受誅殛百禄咸來臻黄華應福始王凌為禍先景皇篇景皇帝聰明命世生盛徳參天地帝王道大創基既己難繼世亦未易外則夏侯𤣥内則張與李三凶稱晉書作構逆亂帝紀順天行誅窮其姦宄遏晉書作邊將禦其漸潛謀不得起罪人咸伏辜威風振萬里平衡綜萬機萬機無不理召陵恒不君内外何紛紛衆小便成羣䝉昧恣心治亂不分叡聖獨斷濟武常以文順天惟廢立掃霓披浮雲雲霓既已闢清和未幾閒羽檄首尾至變起東南蕃儉欽為長蛇外則慿吳蠻萬國紛騷擾戚戚天下懼不安神武御六軍我皇秉鉞征儉欽起壽春前鋒據項城出其不意竝縱竒兵竒兵誠難御廟勝實難支兩軍不期遇敵退計無施虎騎惟武進大戰沙陽陂欽乃亡魂􅋅奔虜若雲披天恩赦有罪東土放鯨鯢大晉篇赫赫大晉於穆文皇蕩蕩巍巍道邁陶唐世稱三皇五帝及今重其光九徳克明文既顯武又章恩洪六合兼濟萬方内舉元凱朝政以綱外簡虎臣時惟鷹揚靡順不懷逆命斯亡仁配春日威踰秋霜濟濟多士同兹蘭芳唐虞至治四凶滔天致討儉欽罔不肅䖍化感海外海外來賔獻其聲樂竝稱妾臣西蜀猾夏僭號方域命將致討委國稽服呉人放命慿海阻江飛書告諭響應來同先王建萬國九服為藩衛亡秦壞諸侯享祚不二世歴代不能復忽踰五百嵗我皇邁聖徳應期創典制分土五等藩國正封界莘莘文武佐千秋遘嘉㑹洪業溢區内仁風翔海外明君篇明君御四海聽鑒盡物情顧望有譴罰竭忠身必榮蘭􅊉出荒野萬里升紫庭茨草穢堂階掃截不得生能否莫相䝉百官正其名恭已慎有為有為無不成闇君不自信羣下執異端正直罹浸潤姦臣奪其權雖欲盡忠誠結舌不敢言結舌亦何憚盡忠為身患清流豈不潔飛塵濁其源岐路令人迷未逺勝不還忠臣立君朝正色不顧身邪正不竝存譬若胡與秦胡秦有合時邪正各異津忠臣遇明君乾乾惟日新羣目統在綱衆星拱北辰設令遭闇主斥退為凡民雖薄共晉書作供時用白茅猶可珍冰霜晝夜結蘭桂摧為薪邪臣多端變用心何委曲便僻順情指動隨君所欲偷安樂目前不問清與濁積偽罔時主養交以持禄言行恒相違難饜甚谿谷昧死射乾沒覺露則滅族晉鐸舞歌雲門篇當魏太和時黄雲門唐咸池虞韶舞夏夏殷濩列代有五振鐸鳴金延大武清歌發唱形為主聲和八音協律吕身不虚動手不徒舉應節合度周其敘時奏宫角襍之以徵羽下饜衆目上從鐘鼓樂以移風與徳禮相輔安有失其所短歌行長安髙城層樓亭亭干雲四起上貫天庭蜉蝣何整行如軍征蟋蟀何感中夜哀鳴蚍蜉愉樂粲粲其榮寤寐念之誰知我情昔君視我如掌中珠何意一朝棄我溝渠昔君與我如影如形何意一去心如流星昔君與我兩心相結何意今日忽然兩絶秋胡行秋胡子娶婦三日㑹行仕宦既享顯爵保兹徳音以禄頤親韞此黄金覩一好婦採桑路傍遂下黄金誘以逢卿玉磨逾潔蘭動彌馨源流潔清水無濁波奈何秋胡中道懷邪美此節婦髙行巍峩哀哉可愍自投長河惟漢行危哉鴻門㑹沛公幾不還輕裝入人軍投身湯火間兩雄不俱立亞父見此權項莊奮劍起白刅何翩翩伯身雖為蔽事促不及旋張良慴坐側髙祖變龍顔賴得樊將軍虎叱項王前嗔目駭三軍磨牙咀豚肩空巵讓霸王臨急吐竒言威凌萬乘主指顧回泰山神龍困鼎鑊非噲豈得全狗屠登上將功業信不原健兒實可慕腐儒安足歎豔歌行日出東南隅照我秦氏樓秦氏有好女自字為羅敷首戴金翠飾耳綴明月珠白素為下裾丹霞為上襦一顧傾朝市再顧國為虛問女居安在堂在城南居青樓臨大巷幽門結重樞使君自南來駟馬立踟蹰遣吏謝賢女豈可同行車斯女長跪對使君言何殊使君自有婦賤妾有鄙夫天地正厥位願君改其圖長歌行利害同根源賞下有甘鈎義門近中塘獸口出通侯撫劍安所趨蠻方未順流蜀賊阻石城吳寇馮龍舟二軍多壯士聞賊如見讐投身効知己徒生心所羞鷹隼厲天翼恥與燕雀遊成敗在縱者無令鷙鳥憂豫章行苦相篇苦相身為女卑陋難再陳男兒當門户墮地自生神雄心志四海萬里望風塵女育無欣愛不為家所珍長大逃深室藏頭羞見人垂淚適他鄉忽如雨絶雲低頭和顔色素齒結朱唇跪拜無復數婢妾如嚴賓情合同雲漢葵藿仰陽春心乖甚水火百惡集其身玉顔隨年變丈夫多好新昔為形與影今為胡與秦胡秦時相見一絶踰參辰和秋胡行一云和班氏詩秋胡納令室三日宦他鄉皎皎潔婦姿冷冷守空房燕婉不終夕别如參與商憂來猶四海易感難可防人言生日短愁者苦夜長百草揚春華攘腕採柔桑素手尋繁枝落葉不盈筐羅衣翳玉體回目流采章君子倦仕歸車馬如龍驤精誠馳萬里既至兩相忘行人悦令顔借息此樹傍誘以逢卿喻遂下黄金裝烈烈貞女忿言辭厲秋霜長驅及居室奉金升北堂母立呼婦來歡情樂未央秋胡見此婦愓然懷探湯負心豈不慙永誓非所望清濁必異源鳬鳯不竝翔引身赴長流果哉潔婦腸彼夫既不淑此婦亦太剛飲馬長城窟行青青河邊草悠悠萬里道草生在春時逺道還有期春至草不生期一作泣盡歎無聲感物懷思心夢想發中情夢君如鴛鴦比翼雲間翔既覺寂無見曠如參與商夢君結同心比翼遊北林既覺寂無見曠如商與參河洛自用固不如中岳安回流不及返浮雲往自還悲風動思心悠悠誰知者懸景無停居忽如馳駟馬傾耳懐音響轉目涙雙墮生存無㑹期要君黄泉下放歌行靈龜有枯甲神龍有腐鱗人無千嵗壽存質空相因朝露尚移景促哉水上塵丘塜如履綦不識故與新髙樹來悲風松栢垂威神曠野何蕭條顧望無生人但見狐狸迹虎豹自成羣孤雛攀樹鳴離鳥何繽紛愁子多哀心塞耳不忍聞長嘯涙雨下太息氣成雲豔歌行有女篇有女懷芬芳媞媞步東廂蛾眉分翠羽明目一作眸發清揚丹唇翳皓齒秀色若珪璋巧笑露歡靨衆媚不可詳令儀希世出無乃古毛嬙頭安金步揺耳繫明月璫珠環約素腕翠羽垂鮮光文袍綴藻黼玉體映羅裳容華既已豔志節擬秋霜徽音冠青雲聲響流四方妙哉美媛徳宜配侯與王靈應萬世合日月時相望媒氏陳束帛羔鴈鳴前堂百兩盈中路起若鸞鳯翔凡夫徒踴躍望絶殊參商墻上難為趨王僧虔技録云墻上難為趨行荀録所載門有車馬客驂服若騰飛華組結玉佩蘩藻紛葳蕤馮軾垂長纓顧盼有餘輝貧主屣弊履整此藍縷衣客曰嘉病乎正色意無疑吐言若覆水揺舌不可追渭濱漁釣翁乃為周所諮顔回處陋巷大聖稱庶幾茍富不知度千駟賤采薇季孫由儉顯管仲病三歸夫差耽淫侈終為越所圍遺身外榮利然後享巍巍迷者一何衆孔難知徳希甚美致憔悴不如豚豕肥楊朱泣路岐失道令人悲子貢欲自矜原憲知其非屈伸各異勢窮達不同資夫惟體中庸先天天不違怨歌行朝時篇昭昭朝時日皎皎晨明月十五入君門一别終華髪同心忽異離曠如胡與越胡越有㑹時參辰遼且濶形影雖髣髴音聲寂無達纎絃感促柱觸之哀聲發情思如循環憂來不可遏塗山有餘恨詩人詠采葛蜻蛚吟牀下回風起幽闥春榮隨路落芙蓉生木末自傷命不遇良辰永乖别已爾可奈何譬如紈素裂孤雌翔故巢星流光景絶魂神馳萬里甘心要同穴秋蘭篇秋蘭蔭玉池池水清且芳芙蓉隨風發中有雙鴛鴦雙魚自踴躍兩鳥時迴翔君其歴九秋與妾同衣裳明月篇藝文作怨詩皎皎明月光灼灼朝日暉昔為春蠶絲今為秋女衣丹唇列素齒翠彩發蛾眉嬌子多好言歡合易為姿玉顔盛有時秀色隨年衰常恐新間舊變故興細微浮萍本無根非水將何依憂喜更相接樂極還自悲前有一樽酒行置酒結此㑹主人起行觴玉罇兩楹間絲理東西廂舞袖一何妙變化窮萬方賓主齊徳量欣欣樂未央同享千年壽朋來㑹此堂何當行同聲自相應同心自相知外合不由中雖固終必離管鮑不世出結交安可為却東西門行和樂惟有舞運體不失機退似潛龍婉進如翔鸞飛回目流神光傾亞有餘姿美女篇美女一何麗顔若芙蓉花一顧亂人國再顧亂人家未亂猶可奈何闕飛塵篇飛塵穢清流朝雲蔽日光秋蘭豈不芬鮑肆亂其芳河決潰金堤一手不能障董逃行歴九秋篇十二首歴九秋兮三春遺貴客兮逺賓顧多君心所親乃命妙妓才人炳若日月星辰序金罍兮玉觴賓主遞起鴈行杯若飛電絶光交觴接巵結裳慷慨歡笑萬方奏新詩兮夫君爛然虎變龍文渾如天地未分齊謳楚舞紛紛歌聲上激青雲窮八音兮異倫竒聲靡靡每新微披素齒丹唇逸響飛薄梁塵精爽眇眇入神坐咸醉兮沾歡引樽促席臨軒進爵獻壽翻翻千秋要君一言願愛不移若山君恩愛兮不竭譬若朝日夕月此景萬里不絶長保初醮髪結何憂坐成胡越攜弱手兮金環上遊飛閣雲間穆若鴛鳯雙鸞還幸蘭芳自安娛心樂意難原樂既極兮多懷盛時忽逝若頽寒暑革御景迴榮華隨風飄摧感物動心増哀妾受命兮孤虛男兒墮地稱珠女弱雖存若無骨肉至親更疏奉事他人託軀君如影兮隨形賤妾如水浮萍明月不能常盈誰能無根保榮良時冉冉代征顧繡領兮含暉皎日迴光則微朱華忽爾漸衰影欲舍形髙飛誰言往思可追薺與麥兮夏零蘭桂踐霜逾馨禄命懸天難明妾心結意丹青何憂君心中傾選詩拾遺曰此篇惜不知何人之詞非相如枚乘其誰能為之按此詞本題曰董逃行歴九秋篇董逃行起於漢末不得謂相如枚乘為之也觀其辭體不類二京當以樂録傅𤣥為正吳楚歌七言燕人美兮趙女佳其室則邇兮限層崖雲為車兮風為馬玉在山兮蘭在野雲無期兮風有止思多端兮誰能理鴻鴈生塞北行魏武帝却東西門行曰鴻鴈生塞北乃在無人鄉鳯凰逺生海西及時崑山岡五徳存羽儀和鳴定宫商百鳥竝侍左右鼓翼騰華光上熙遊雲日間千嵗時來翔孰若彼龍與龜曳尾泥中藏非雲雨則不升冬伏春迺驤退哀此秋蘭草根絶隨化揚靈氣一何憂美萬里馳芬芳常恐物微易歇一朝見棄忘白楊行古今樂録曰王僧䖍技録有白楊行今不歌青雲固非青當雲奈白雲驥從西北馳來吾何憶驥來對我悲鳴舉頭氣凌青雲當柰此驥正龍形踠足蹉跎長坡下蹇驢慷愾敢與我爭馳躑躅鹽車之中流汗兩耳盡下垂雖懷千里之逸志當時一得施白雲彯彯舍我髙翔青雲徘徊戢我愁啼上眄增崖下臨清池日欲西移既來歸君君不一顧仰天太息當用生為青雲乎飛時悲當奈何耶青雲飛乎秦女休行龎一作秦氏有烈婦義聲馳雍涼父母家有重怨仇人暴且彊雖有男兄弟志弱不能當烈女念此痛丹心為寸傷外若無意者内潛思無方白日入都市怨家如平常匿劍藏白刅一奮尋身僵身首為之異處仗尸列肆旁肉與土合成泥灑血濺飛梁猛氣上干雲霓仇黨失守為披攘一市稱烈義觀者收涙竝慨忼百男何當益不如一女良烈女直造縣門云父不幸遭禍殃今仇身以分裂雖死情益揚殺人當伏法義不茍活隳舊章縣令解印綬令我傷心不忍聽刑部垂頭塞耳令我吏舉不能成烈著希代之績義立無窮之名夫家同受其祚子子孫孫咸享其榮今我作歌詠髙風激揚壯發悲且清雲中白子髙行陵陽子來明意欲作天與仙人遊超登元氣攀日月遂造天門將上謁閶闔闢見紫微絳闕紫宫崔嵬髙殿嵳峩雙闕萬丈玉樹羅童女掣電策童男挽雷車雲漢隨天流浩浩如江河因王長公謁上皇鈞天樂作不可詳龍仙神仙敎我靈秘八風子儀與遊我祥我心何戚戚思故鄉俯看故鄉二儀設張樂哉二儀日月運移地東南傾天西北馳鶴五氣所補鼇四足所支齊駕飛龍驂赤螭逍遥五岳間東西馳長一作期與天地竝復何為復何為西長安行所思兮何在乃在西長安何用存問妾香橙雙珠環何用重存問羽爵翠琅玕今我兮問君更有兮異心香亦不可燒環亦不可沈香燒日有歇環沈日自深車遥遥篇車遥遥兮馬洋洋追思君兮不可忘君安遊兮西入秦願為影兮隨君身君在陰兮影不見君依光兮妾所願昔思君昔君與我兮形影潛結今君與我兮雲飛雨絶昔君與我兮音響相和今君與我兮落葉去柯昔君與我兮金石無虧今君與我兮星滅光離詩答程曉詩四言奕奕兩儀昭昭太陽四氣代升三朝受祥濟濟羣后峩峩聖皇元服肇御配天垂光伊周作弼王室惟康顒顒兆民蠢蠢戎羶率土充庭萬國奉蕃皇澤雲行神化風宣六合咸熙遐邇同歡赫赫明明天人合和下罔遺滯焦朽斯華矧我良朋如玉之嘉穆穆雝雝興頌作歌宴㑹詩日之既逝情亦既渥賓委餘歡主容不足樂飲今夕温其如玉芙蕖煌煌芙蕖從風芬葩照以皎日灌以清波陰結其實陽發其華金房緑葉素株翠柯雜詩三首以下五言志士惜日短愁人知夜長攝衣步前庭仰觀南鴈翔𤣥景隨形運流響歸空房清風何飄颻微月出西方繁星衣一作依青天列宿自成行蟬鳴髙樹間野鳥號東廂纎雲時髣髴渥露沾我裳良時無停景北斗忽低昂常恐寒節至凝氣結為霜落葉隨風摧一絶如流光閒夜微風起明月照髙臺清響呼不應𤣥景招不來厨人進藿茹有酒不盈杯安貧福所與富貴為禍媒金玉雖髙堂於我賤蒿萊鵲巢丘城側雀乳空井中居不附龍鳯常畏蛇與蟲依賢義不恐近暴自當窮又答程曉羲和運玉衡招揺賦朔旬嘉慶形三朝美徳揚初春聖主加元服萬國望威神伊周敷𤣥化竝世霑天人洪崖歌山岫許由嗟水濱宴詩鸞鳥睎鳯凰望舒繼白日千秋遘嘉㑹來升君子室華樽享清酤珍肴自盈溢天行篇天行一何健日月無停蹤百川皆赴海藝文作赴暘谷三辰回泰䝉日昇歌東光昇朝陽羲和初攬轡六龍竝騰驤逸景何晃晃旭日照萬方皇徳配天地神明鑒幽荒三光篇三光垂象表天地有晷度聲和音響應形立影自附素日抱𤣥烏明月懐靈兎衆星詩朗月共衆星日出擅其明冬寒地為裂春和草木榮陽徳雖普濟非陰亦不成苦雨徂暑未一旬重陽翳朝霞厥初月離畢積日遂滂沱屯雲結不解長溜周四阿霖雨如倒井黄潦起洪波湍深激墻隅門庭若決河炊爨不復舉竈中生蛙蝦苦熱朱明運將極溽暑晝夜興裁動四支廢舉身若山陵珠汗洽玉體呼吸氣鬱蒸塵垢自成泥素粉隨手凝古詩東方大明星光景照千里少年舍家遊思心晝夜起擬四愁詩四首并序七言張平子作四愁詩體小而俗七言類也聊擬而作之名曰擬四愁詩我所思兮在瀛洲願為雙鵠戲中流牽牛織女期在秋山髙水深路無由愍余不遘嬰殷憂佳人貽我明月珠何以要之比目魚海廣無舟悵勞劬寄言飛龍天馬駒風氣雲披飛龍逝驚波滔天馬不厲何為多念心憂泄我所思兮在珠崖願為比翼浮清池剛柔合徳配二儀形影一絶長别離愍余不遘情如攜佳人貽我蘭蕙草何以要之同心鳥火熱水深憂盈抱申以琬琰夜光寳卞和既沒玉不察存若流光忽電滅何為多念獨鬱結我所思兮在崑山願為鹿􅀢一作蛩闚虞淵日月迴曜照景天參辰曠隔㑹無縁愍余不遘罹百艱佳人貽我蘇合香何以要之翠鴛鴦懸度弱水川無梁申以錦衣文繡裳三光騁邁景不留鮮似民生忽如浮何為多念秪自愁我所思兮在朔方願為飛燕俱南翔煥乎人道著三光胡越殊心生異鄉愍余不遘罹百殃佳人遺我葆羽纓何以要之影與形永増憂結繁華零申以日月指明星星辰有翳日月移駑馬哀鳴慙不馳何為多念徒自虧兩儀詩兩儀始分元氣上清列宿垂象六位時成日月西邁流景東征悠悠萬物殊品齊名聖人憂世實念羣生天行歌雜言天時泰兮昭以陽清風起兮景雲翔仰觀兮辰象日月兮運周俯視兮河海百川兮東流驚雷歌驚雷奮兮震萬里威陵宇宙兮動四海六合不維兮誰能理雜言一作雷雷隱隱感妾心傾耳清聽非車音雲歌白雲翩翩翔天庭流景髣髴非君形白雲飄飄捨我髙翔青雲徘徊為我愁腸蓮歌渡江南採蓮花芙蓉増敷曄若星羅緑葉映長波迴風容與動纎柯啄木啄木髙翔鳴喈喈飄揺林薄著桑槐便縁樹間喙如錐嚶喔嚶喔聲正悲專為萬物作倡俳當此之時樂不可迴雜歌鳯有翼龍有鱗君不獨興必須良臣九曲歌嵗莫景邁羣光絶安得長繩繫白日歌詞雷師鳴鐘鼓風伯吹笙簧西母出穴聽王父吟東廂失題五首見藝文日部暘谷發清曜九日棲髙枝願得竝天御六龍齊玉羈二初學江部有女殊代生涉江采菱花上翳青雲景下鑿渌水波三藝文矟部彎我繁弱弓弄我丈八矟一舉覆三軍再舉殄戎貊四藝文庭燎部元正始朝享萬國執珪璋枝燈若火樹庭燎繼天光五藝文松部飛蓬隨飄起芳草摧山澤世有千年松人生詎能百漢魏六朝百三家集巻三十九
