body:
  text: 漢魏六朝百三家集巻六十二陶淵明集題詞古來詠陶之作惟顔清臣稱最相知謂其公相子孫北牕高臥永初以後題詩甲子志猶張良思報韓龔勝恥事新也思深哉非清臣孰能為此言乎吳幼清亦云元亮述酒荆軻等作欲為漢相孔明而無其資嗚呼此亦知陶者其遭時何相似也君臣大義䝉難愈明仕則為清臣不仕則為元亮舍此則華歆傅亮攘袂勸進三尺童子咸羞稱之此昔人所以高楊鐵崖而卑許平仲也感士類子長之倜儻閑情同宋玉之好色告子似康成之誡書自祭若右軍之誓墓孝賛補經傳記近史陶文雅兼衆體豈獨以詩絶哉真西山云淵明之作宜自為一編附三百篇楚辭之後為詩根本凖則是最得之莫謂宋人無知詩者也陶刻頗多而學者多善焦太史所訂宋本故仍其篇目錄賦感士不遇賦有序閑情賦有序辭歸去來辭有序疏與子儼等疏記桃花源記賛扇上畫賛傳賛天子孝傳賛諸侯孝傳賛卿大夫孝傳賛士孝傳賛庶人孝傳賛傳晉故征西大將軍長史孟府君傳五桞先生傳述讀史述九章有序夷齊箕子管鮑程杵七十二弟子屈賈韓非魯二儒張長公祭文祭程氏妹文祭從弟敬遠文自祭文詩停雲有序四章時運有序四章榮木有序贈長沙公族祖有序四章酬丁柴桑二章荅龎參軍有序六章勸農六章命子十章歸鳥四章形影神三首并序形贈影影荅形神釋九日閒居并序歸園田居五首問來使遊斜川并序示周續之祖企謝景夷三郎乞食諸人共遊周家墓栢下怨詩楚調示龎主簿鄧治中荅龎參軍有序五月旦作和戴主簿連雨獨飲移居二首和劉柴桑酬劉柴桑和郭主簿二首於王撫軍座送客與殷晉安别冇序贈羊長史有序歲暮和張常侍和胡西曹示顧賊曹悲從弟仲徳一首始作鎮軍參軍經曲阿庚子歲五月中從都還阻風於規林二首辛丑歲七月赴假還江陵夜行塗中癸卯歲始春懷古田舍二首癸卯歲十二月中作與從弟敬遠乙巳歲三月為建威參軍使都經錢溪還舊居戊申嵗六月中遇火己酉嵗九月九日庚戌嵗九月中於西田獲早稻丙辰嵗八月中於下潠田舎穫責子有㑹而作并序蜡日四時飲酒二十首有序止酒述酒擬古九首雜詩十二首詠貧士七首詠二疏詠三良詠荆軻讀山海經十三首擬挽歌辭三首桃花源詩聯句漢魏六朝百三家集巻六十二目録欽定四庫全書漢魏六朝百三家集巻六十二明張溥輯陶淵明集賦感士不遇賦有序昔董仲舒作士不遇賦司馬子長又為之余嘗以三餘之日講習之暇讀其文慨然惆悵夫履信思順生人之善行抱朴守靜君子之篤素一作素業自真風告逝大偽斯興閭閻懈亷退之節市朝驅易進之心懷正志道之士或潛玉於當年潔已清操之人或没世以徒勤故夷皓有安歸之歎三閭發已矣之哀悲夫寓形百年而瞬息已盡立行之難而一城莫賞此古人所以染翰慷慨屢伸而不能巳者也夫導逹意氣其惟文乎撫巻躊躇遂感而賦之咨大愧之受氣何斯人之獨靈稟神智以藏照秉三五而垂名或擊壤以自歡或大濟於蒼生靡潛躍之非分常傲然以稱情世流浪而遂徂物羣分以相形密網裁而魚駭宏羅制而鳥驚彼逹人之善覺乃逃禄而歸耕山嶷嶷而懷影川汪汪而藏聲望軒唐而永歎甘貧賤以辭榮淳源汨一作恒以長分美惡作以一作紛其異途原百行之攸貴莫為善之可娛奉上天之成命師聖人之遺書發忠孝於君親生信義於鄉閭推誠心而獲顯不矯然而祈譽嗟乎雷同毁異物惡其上妙算者為迷直道者云妄坦至公而無猜卒䝉恥以受謗雖懷瓊而握蘭徒芳潔而誰亮哀哉士之不遇巳不在炎帝帝魁之世獨祗修以自勤豈三省之或廢庶進徳以及時時既至而不惠無爰生之晤言念張季之終蔽愍馮叟於郎署賴魏守以納計雖僅然於必知亦苦心而曠歲矧夫市之無虎眩三夫之獻說悼賈傅之秀朗紆遠轡於促界悲董相之淵致屢乗危而幸濟感哲人之無偶淚淋浪以灑袂承前王之清誨曰天道之無親澄得一以作鑒恒輔善而佐仁夷投老以長饑囘早夭而又貧傷請車以備槨悲茹􅅔而殞身雖好學與行義何死生之苦辛疑報徳之若茲懼斯言之虛陳何曠世之無才罕無路之不澀伊古人之慷慨病一作痛竒名之不立廣結髮以從政不愧賞於萬邑屈雄志於戚䜿竟尺土之莫及畱誠信於身後動衆人之悲泣商盡規以拯弊言始順而患入奚良辰之易傾胡害勝其乃急蒼旻遐緬人事無已有感有昧疇測其理寧固窮以濟意不委曲而累已既軒冕之非榮豈緼袍之為恥誠謬㑹以取拙且欣然而歸止擁孤襟以畢歲謝良價於朝市閑情賦有序初張衡作定情賦蔡邕作靜情賦檢逸辭而宗澹泊始則蕩以思慮而終歸閑正將以抑流宕之邪心諒有助於諷諫綴文之士奕代繼作並同觸類廣其辭義余園閭多暇復染翰為之雖文玅不足庶不謬作者之意乎夫何瓌逸之令姿獨曠世以秀羣表傾城之豔色期有徳於傳聞佩鳴玉以比潔齊幽蘭以爭芬淡柔情於俗内負雅志於高雲悲晨曦之易夕感人生之長勤同一盡於百年何歡寡而愁殷褰朱幃而正坐汎清瑟以自欣送纎指之餘好攘皓袖之繽紛瞬美目以流眄含言笑而不分曲調將半景落西軒悲商叩林白雲依山仰睇天路俯促鳴絃神儀嫵媚舉止詳妍激清音以感余願接膝以交言欲自往以結誓懼冒禮之為愆待鳯鳥以辭恐他人之我先意惶惑而靡寧魂須臾而九遷願在衣而為領承華首之餘芳悲羅襟之宵離怨秋夜之未央願在裳而為帶束窈窕之纎身嗟温涼之異氣或脫故而服新願在髮而為澤刷𤣥鬢於頹肩悲佳人之屢沐從白水以枯煎願在眉而為黛隨曕視以閒揚悲脂粉之尚鮮或取毁于華粧願在莞而為席安弱體於三秋悲文茵之代御方經年而見求願在絲而為履附素足以周旋悲行止之有節空委棄於牀前願在晝而為影常依形而西東悲高樹之多䕃慨有時而不同願在夜而為燭照玉容於兩楹悲扶桑之舒光奄滅景而藏明願在竹而為扇含凄飈於柔握悲白露之晨零顧襟䄂以緬邈願在木而為桐作膝上之鳴琴悲樂極以哀來終推我而輟音考所願而必違徒契濶以苦心擁勞情而罔訴步容與於南林棲木蘭之遺露翳青松之餘隂儻行行之有覿交欣懼於中襟竟寂寞而無見獨悁想以空尋斂輕裾以復路瞻夕陽而流歎步徙倚以忘趣色慘悽而矜顔葉變變以去條氣凄凄而就寒日負影以偕没月媚景於雲端鳥悽聲以孤歸獸索偶而不還悼當年之晩暮恨茲嵗之欲殫思宵夣以從之神飄颻而不安若馮舟之失棹譬縁崖而無攀於時畢昴盈軒北風凄凄㤯㤯不􅄰衆念徘徊起攝帶以伺晨䌓霜粲於素階雞斂翅而未鳴笛流遠以清哀始妙密以閒和終寥亮而藏摧意夫人之在茲託行雲以送懐行雲逝而無語時奄冉而就過徒勤思以自悲終阻山而帶河迎清風以祛累寄弱志於歸波尤蔓草之為㑹誦邵南之餘歌坦萬慮以存誠憇遙情於八遐辭歸去來辭有序余家貧耕植不足以自給幼稚盈室缾無儲粟生生所資未見其術親故多勸余為長吏脫然有懐求之靡途㑹有四方之事諸侯以惠愛為徳家叔以余貧苦遂見用於小邑于時風波未靜心憚遠役彭澤去家百里公田之利足以為酒故便求之及少日眷然有歸歟之情何則質性自然非矯厲所得饑凍雖切違已交病嘗從人事皆口腹自役於是悵然慷慨深媿平生之志猶望一稔當斂裳宵逝尋程氏妹喪於武昌情在駿奔自免去職仲秋至冬在官八十餘日因事順心命篇曰歸去來兮乙已嵗十一月也歸去來兮田園將蕪胡不歸既自以心為形役奚惆悵而獨悲悟已往之不諫知來者之可追實迷途其未遠覺今是而昨非舟遙遙以輕颺風飄飄而吹衣問征夫以前路恨晨光之熹㣲乃瞻衡宇載欣載奔僮僕歡迎稚子候門三逕就荒松菊猶存攜幼入室有酒盈罇引壺觴以自酌盼庭柯以怡顔倚南窻以寄傲審容膝之易安園日涉以成趣門雖設而常闗策扶老以流憩時矯首而遐觀雲無心以出岫鳥倦飛而知還景翳翳以將入撫孤松而盤桓歸去來兮請息交以絶游世與我而相違復駕言兮焉求悅親戚之情話樂琴書以消憂農人告余以春及將有事於西疇或命巾車或棹孤舟既窈窕以尋壑亦﨑嶇而經丘木欣欣以向榮泉涓涓而始流善萬物之得時感吾生之行休已矣乎寓形宇内復幾時曷不委心任去留胡為遑遑欲何之富貴非吾願帝鄉不可期懐良辰以孤往或植杖而耘耔登東皋以舒嘯臨清流而賦詩聊乘化以歸盡樂夫天命復奚疑疏與子儼等疏告儼俟份佚佟天地賦命生必有死自古賢聖誰能獨免子夏有言死生有命富貴在天四友之人親受音㫖發斯談者將非窮逹不可妄求壽夭永無外請故耶吾年過五十少而窮苦每以家弊東西游走性剛才拙與物多忤自量為已必貽俗患僶俛辭世使汝等幼而饑寒余嘗感孺仲賢妻之言敗絮自擁何慙兒子此既一事矣但恨隣靡二仲室無萊婦抱茲苦心良獨内愧少學琴書偶愛閒靜開巻有得便欣然忘食見樹木交䕃時鳥變聲亦復歡然有喜常言五六月中北窻下卧遇涼風暫至自謂是羲皇上人意淺識罕謂斯言可保日月遂往機巧好疎緬求在昔眇然如何病患以來漸就衰損親舊不遺每以藥石見救自恐大分將有限也汝輩稚小家貧每役柴水之勞何時可免念之在心若何可言然汝等雖不同生當思四海皆兄弟之義鮑叔管仲分財無猜歸生伍舉班荆道舊遂能以敗為成因喪立功他人尚爾况同父之人哉潁川韓元長漢末名士身處卿佐八十而終兄弟同居至於没齒濟北汜稚春晉時操行人也七世同財家人無怨色詩曰高山仰止景行行止雖不能爾至心尚之汝其慎哉吾復何言記桃花源記晉太元中武陵人捕魚為業緣溪行忘路之遠近忽逢桃花林夾岸數百步中無雜樹芳草一作華非鮮美落英繽紛漁人甚異之復前行欲窮其林林盡水源便得一山山有小口髣髴若有光便捨船從口入初極狹纔通人復行數十步豁然開朗土地平曠屋舍儼然有良田美池桑竹之屬阡陌交通雞犬相聞其中往來種作男女衣著悉如外人黄髮垂髫並怡然自樂見漁人乃大驚問所從來具答之便要還家設酒殺雞作食村中聞有此人咸來聞訊自云先世避秦時亂率妻子邑人來此絶境不復出焉遂與外人間隔問今是何世乃不知有漢無論魏晉此人一一為具言所聞皆歎惋餘人各復延至其家皆出酒食停數日辭去此中人語云不足為外人道也既出得其船便扶一作於向路處處誌之及郡下詣太守劉歆也說如此太守即遣人隨其往尋向所誌遂迷不復得路南陽劉子驥高尚士也聞之欣然規一作親非往未果尋病終後遂無問津者贊扇上畫贊荷篠丈人於陵仲子長沮桀溺張長公邴曼容薛孟嘗鄭次都周陽珪三五道邈淳風日盡九流參差互相推隕形逐物遷心無常凖是以逹人有時而隱四體不勤五榖不分超超丈人日夕在耘遼遼沮溺耦耕自欣入鳥不駭雜獸斯羣至矣於陵養氣浩然蔑彼結駟甘此灌園張生一仕曾以仕還顧我不能高謝人間岧岧邴公望崖輙歸匪驕匪􅈔前路威夷鄭叟不合垂釣川湄交酌林下清言究㣲孟嘗遊學天網時踈眷言哲犮振褐偕徂美哉周子稱疾閒居寄心清尚悠然自娯翳翳衡門洋洋泌流曰琴曰書顧盼有儔飲河既足自外皆休緬懐千載託契孤遊傳贊天子孝傳贊虞舜宗殷高夏禹王周文虞舜父頑母嚚事之於畎畝之間以孝烝烝是以堯聞而授之富有天下貴為天子以為不順於父母若窮而無歸惟悅親可以得意茍違朝夕若嬰兒之思戀故稱舜五十而慕書曰戞擊鳴球搏拊琴瑟以詠祖考來格言思其來而訓之愛敬盡於事親是以徳敎加於百姓刑於四海夏禹有天下以奉宗廟然躬自菲薄以厚其孝孔子曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕禹之徳於是稱聞聖人之徳無以加於孝敬孝敬之道美莫大焉殷高宗諒隂三年不言百官總已而聽於冢宰三年而後言天下咸歡徳教大行殷道以興詩曰一人有慶兆民賴之其此之謂乎周文王之為世子也朝於王季日三鷄鳴至於寢門問於内竪内竪曰安文王乃喜不安則色憂行不能正履日中暮亦如之食上必視寒温之節食下必問所膳而後退文王孝道光大其化自近至遠刑於寡妻以御於家邦故得萬國之歡心以事其先王矣贊曰至哉后徳聖敬自天陶漁致養菲薄饗先親瘠色憂諒隂寢言一人有慶千載賴􅏧諸侯孝傳贊周公旦公河間惠魯孝公周公旦武王之弟成王㓜少周公攝政制禮作樂郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之内各以其職來祭詩曰於穆清廟肅雍顯相言諸侯樂其位而敬其事也仲尼曰孝莫大於嚴父嚴父莫大於配天則周公其人也貴而不驕位高彌謙自承文武之休烈孝道通於神明光被四海武王封之於魯備其禮樂以奉宗廟焉魯孝公之為公子周宣王問公子能道訓諸侯者立之樊穆仲稱其孝曰肅恭明神而敬事耆老賦事行刑必問於遺訓咨於故實不干所問不犯所咨王曰然則能訓理其民矣乃命之於夷宫是為孝公夫宗廟致敬不忘親也有國不亦宜乎漢河間惠王獻王之曾孫也西京藩臣多驕放之失其名徳者唯獻王而惠王繼之漢書稱其能修獻王之行母薨服喪盡禮哀帝下詔書褒揚以為宗室儀表增封萬户禮古之人皆然至於末俗衰薄固巳賢矣貴而率禮又難其見褒賞不亦宜乎贊曰貴驕殊途不期而㑹周公勞謙乃成光大二侯承魯遵儉去泰河間率禮漢宗是賴卿大夫孝傳贊孔子叔潁考孟莊子孔子魯人也入則事父兄出則事公卿喪事不敢不勉故稱曰孝乎惟孝友於兄弟是亦為政也君賜腥必熟而薦之雖蔬食而齊祭如在鄉人儺朝服立於阼階孝之至也至徳要道莫大於孝是以曾參受而書之游夏之徒常咨禀焉許止不嘗藥書以殺父宰我暫言减喪責以不仁言合訓典行合世範徳義可尊作事可法遺文不朽揚名千載孟莊子魯人也孔子稱其孝其他可能也其不改父之政與父之臣是難能也夫孝子之事親也事亡如事存故當不義則爭之存所不爭則亡亦不敢改父之道猶謂之孝况終身乎潁考叔鄭人也莊公以叔叚之故與母誓曰不及黄泉無相見也既而悔之考叔為封人聞之有獻於公公賜之食而舍肉公問之對曰小人有母未嘗君之羹請以遺之公曰汝有母遺繄我獨無考叔曰何謂也公語之故且告之悔考叔曰若掘地及泉隧而相見其誰曰不然公從之遂為母子如初君子曰潁考叔純孝也愛其母而施及莊公詩云孝子不匱永錫爾類其是之謂乎贊曰仁惟本悌聖亦基孝恂恂尼父固天攸造二子承親式禮遵誥永錫純懿無改遺操士孝傳贊高柴孔奮樂正子春黄香高柴衞人也喪親泣血三年未嘗見齒所謂哭不偯言不文也為武城宰而化行民有不服其親者改之行喪如禮君子之徳風也以身先之而民不遺其親樂正子春魯人也下堂傷足既瘳數月不出猶有憂色曰吾聞之曾子父母全而生之巳全而歸之可謂孝乎故君子一舉足一出言不敢忘父母不敢毁傷孝之始也夫能敬慎若斯而災患及者未之有也孔奮扶風人也少以孝行著名州里供養至謹在官唯母極甘美妻息菜食歴位以清夫人情莫不欲厚其親然亦有分焉奢則難繼能致儉以全養者鮮矣黄香江夏人也九歳失母思慕骨立事父竭力以致養冬無被袴而盡滋味暑則扇牀枕寒則以身温席漢和帝嘉之特加異賜歴位恭勤寵禄榮親可謂夙興夜寐無忝爾所生者也贊曰顯允羣士行殊名鈞咸能夙夜以義榮親率彼城邑用化厥民忠以悟主其孝乃純庶人孝傳贊江革汝郁亷範殷陶江革齊人也漢章帝時避賊負母而逃賊賢之不害而告其生路竭力傭賃以致甘暖和顔悅色以盡歡心欲親之安自挽車以行鄉人歸之號曰江巨孝位至五官中郎將天子嘉焉寵遇甚厚告歸詔書褒美就家禮其終身以顯異行亷範京兆人也少孤十五入蜀迎父喪遇石船覆範抱棺而没船人救之僅免於死遂以喪歸及仕郡拯太守於危難送故盡節章帝時為郡守百姓歌詠之夫孝者人之本教之所由生也是以範之臨危也勇宰民也惠能以義顯也汝郁陳郡人也五嵗母病不食郁亦不食母憐之强食郁能察色知病輒復不食族人號曰異童年十五著於鄉里父母終思慕致毁推財與兄弟隱於草澤君子以為難况童齓孝於自然可謂天性也殷陶汝南人也年十二以孝稱遭父憂率情合禮有長蛇帶其門舉家奔走陶以喪柩在焉獨居廬不動親戚扶持曉喻莫能移之啼號益盛由是顯名屢辭辟命夫智者不惑勇者不懼陶孝於其親而智勇並彰乎弱齡斯又難矣贊曰事親盡歡其難在色彼養以禄我養以力義在愛敬榮不假飾嗟爾衆庶鑒茲前式傳晉故征西大將軍長史孟府君傳君諱嘉字萬年江夏鄂人也曾祖父宗以孝行稱仕吳司空宋本作空一作馬非祖父揖元康中為廬陵太守宗塟武昌新陽縣子孫家焉遂為縣人也君少失父奉母二弟居娶大司馬長沙桓公陶侃第十女閨門孝友人無能間鄉閭稱之沖黙有遠量弱冠儔類咸敬之同郡郭遜以清操知名時在君右常歎君温雅平曠自以為不及遜從弟立亦有才志與君同時齊譽每推服焉由是名冠州里聲流京邑太尉潁川庾亮以帝舅民望受分陜之重鎮武昌并領江州辟君部廬陵從事下郡還亮引見問風俗得失對曰嘉不知還傳當問從吏亮以塵尾掩口而笑諸從事既去喚弟翼語之曰孟嘉故是盛徳人也君既辭出外自除吏名便歩歸家母在堂兄弟共相歡樂怡怡如也旬有餘日更版為勸學從事時亮崇修學校高選儒官以君望實故應尚徳之舉太傅河南禇裒簡穆有器識時為豫章太守出朝宗亮正旦大㑹州府人士率多時彦君在坐次甚遠裒問亮江州有孟嘉其人何在亮云在坐卿但自覔裒歴觀遂指君謂亮曰將無是邪亮欣然而笑喜裒之得君竒君為裒之所得乃益器焉舉秀才又為安西將軍庾翼府功曹再為江州别駕巴丘令征西大將軍譙國桓温參軍君色和而正温甚重之九月九日温游龍山參佐畢集四弟二甥咸在坐時佐吏並著戎服有風吹君㡌墮落温目左右及賔客勿言以觀其舉止君初不自覺良久如厠温命取以還之廷尉太原孫綽為諮議參軍時在坐温命紙筆令嘲之文成示温温以著坐處君歸見嘲笑而請筆作答了不容思文辭超卓四座歎之奉使京師除尚書删定郎不拜孝宗穆皇帝聞其名賜見東堂君辭以脚疾不任拜起詔使人扶入君嘗為刺史謝永别駕永㑹稽人喪亡君求赴義路由永興高陽許詢有雋才辭榮不仕每縱心獨往客居縣界嘗乗船近行適逢君過歎曰都邑美士吾盡識之獨不識此人唯聞中州有孟嘉者將非是乎然亦何由來此使問君之從者君謂其使曰本心相過今先赴義尋還就君及歸遂止信宿雅相知得有若舊交還至轉從事中郎俄遷長史在朝隤然仗正順而已門無雜賔嘗㑹神情獨得便超然命駕逕之龍山顧景酣宴造夕乃歸温從容謂君曰人不可無勢我乃能駕御卿後以疾終於家年五十一始自總髮至于知命行不茍合言無夸矜未嘗有喜愠之容好酣飲逾多不亂至於任懐得意融然遠寄傍若無人温嘗問君酒有何好而卿嗜之君笑而答曰明公但不得酒中趣爾又問聽妓絲不如竹竹不如肉答曰漸近自然中散大夫桂陽羅含賦之曰孟生善酣不愆其意光祿大夫南陽劉躭昔與君同在温府淵明從父太常䕫嘗問躭君若在當已作公否荅云此本是三司人為時所重如此淵明先親君之第四女也凱風寒泉之思實鍾厥心謹按採行事撰為此傳懼或乖謬有虧大雅君子之徳所以戰戰兢兢若履深薄云爾贊曰孔子稱進徳修業以及時也君清蹈衡門則令聞孔昭振纓公朝則徳音允集道悠運促不終遠業惜哉仁者必壽豈斯言之謬乎五桞先生傳先生不知何許人也亦不詳其姓字宅邉有五桞樹因以為號焉閒静少言不慕榮利好讀書不求甚解每有㑹意便欣然忘食性嗜酒家貧不能常得親舊知其如此或置酒而招之造飲輒盡期在必醉既醉而退曾不􅈔情去畱環堵蕭然不蔽風日短褐穿結簞瓢屢空晏如也常著文章自娛頗示已志忘懐得失以此自終贊曰黔婁有言不戚戚於貧賤不汲汲於富貴極其言茲若人之儔乎銜觴賦詩以樂其志無懐氏之民歟葛天氏之民歟述讀史述九章有序余讀史記有所感而述之夷齊二子讓國相隨海隅天人革命絶景窮居采􅅔高歌慨想黄虞貞風凌俗爰感懦夫箕子去鄉之感猶有遲遲矧伊代謝觸物皆非哀哀箕子云胡能夷狡童之歌悽矣其悲管鮑知人未易相知實難淡美初交利乖歳寒管生稱心鮑叔必安竒情雙亮令名俱完程杵遺生良難士為知巳望義如歸允伊二子程生揮劍懼茲餘恥令徳永聞百代見紀七十二弟子恂恂舞雩莫曰匪賢俱映日月共飧至言慟由才難感為情牽回也早夭賜獨長年屈賈進徳修業將以及時如彼稷契孰不願之嗟乎二賢逢世多疑候詹寫志感鵩獻辭韓非豐狐隱穴以文自殘君子失時白首抱闗巧行居灾枝一作忮辯召患哀矣韓生竟死説難魯二儒易代隨時迷變則愚介介若人特為貞夫徳不百年汙我詩書逝然不顧被褐幽居張長公遠哉長公蕭然何事世路皆同而我獨異斂轡朅來獨養其志􅃦跡窮年誰知斯意祭文祭程氏妹文維晉義熈三年五月甲辰程氏妹服制再周淵明以少牢之奠俛而酬之鳴呼哀哉寒往暑來日月寖疎梁塵委積庭草荒蕪寥寥空室哀哀遺孤殽觴虛奠人逝焉如誰無兄弟人亦同生嗟我與爾特百常情慈妣早世時尚孺嬰我年二六爾纔九齡爰從靡識撫髫相成咨爾令妹有徳有操靖恭鮮言聞善則樂能正能和惟友惟孝行止中閨可象可傚我聞為善慶自已蹈彼蒼何偏而不斯報昔在江陵重惟天罰兄弟索居乖隔楚越伊我與爾百哀是切黯黯高雲蕭蕭冬月白雲掩晨長風悲節感惟崩號興言泣血尋念平昔觸事未逺書疏猶存遺孤滿眼如何一往終天不返寂寂高堂何時復踐藐藐孤女曷依曷恃㷀㷀遊魂誰主誰祀奈何程妹於此永巳死如有知相見蒿里嗚呼哀哉祭從弟敬遠文歲在辛亥月惟仲秋旬有九日從弟敬遠卜辰云􅉎永寧后土感平生之遊處悲一往之不返情惻惻以摧心淚愍愍而盈眼乃以園果時醪祖其將行嗚呼哀哉於鑠吾弟有操有槩孝發㓜齡友自天愛少思寡欲靡執靡介後巳先人臨財思惠心遺得失情不依世其色能温其言則厲樂勝朋高好是文藝遥遙帝鄉爰感竒心絶粒委務考槃山隂淙淙懸溜曖曖荒林晨採上藥夕閑素琴曰仁者壽竊獨信之如何斯言徒能見欺年甫過立庵與世辭長歸蒿里邈無還期惟我與爾匪但親友父則同生母則從母相及齠齒並罹偏咎斯情實深斯愛實厚念疇昔日同房之歡冬無緼褐夏渇瓢簞相將以道相開以顔豈不多乏忽忘饑寒余嘗學仕纒綿人事流浪無成懼負素志斂策歸來爾知我意嘗願攜手寘彼衆議每憶有秋我將其刈與汝偕行舫舟同濟三宿水濵樂飲川界靜月澄高温風始逝撫杯而言物久人脆奈何吾弟先我離世事不可尋思亦何極日徂月流寒暑代息死生異方存亡有域侯晨永歸指塗載陟呱呱遺稚未能正言哀哀嫠人禮儀孔閑庭樹如故齋宇廓然孰云敬遠何時復還余惟人斯昧茲近情蓍龜有吉制我祖行望旐翩翩執筆涕盈神其有知昭余中誠嗚呼哀哉自祭文歳惟丁卯律中無射天寒夜長風氣一作凉風蕭索鴻鴈于征草木黄落陶子將辭逆旅之館永歸於本宅故人悽其相悲同祖行於今夕差以嘉蔬薦以清酌候顔巳㝠聆音愈漠嗚呼哀哉茫茫大塊悠悠高旻是生萬物余得為人自余為人逢運之貧簞瓢屢罄絺綌冬陳含歡谷汲行歌負薪翳翳柴門事我宵晨春秋代謝有務中園載耘載耔迺育迺繁欣以素牘和以七絃冬曝其日夏濯其泉勤靡餘勞心有常閒樂天委分以至百年惟此百年夫人愛之懼彼無成愒日惜時存為世珍沒亦見思嗟我獨邁曾是異茲寵非巳榮湼豈吾緇捽兀窮廬酣飲賦詩識運知命疇能罔眷余今斯化可以無恨壽涉百齡身慕肥遁從老得終奚所復戀寒暑逾邁亡既異存外姻晨來良友宵奔塟之中野以安其魂窅窅我行蕭蕭墓門奢恥宋臣儉笑王孫廓兮巳滅慨焉巳遐不封不樹日月遂過匪貴前譽孰重後歌人生實難死如之何嗚呼哀哉詩停雲有序四章停雲思親友也罇湛新醪園列初榮願言不從歎息爾襟靄靄停雲濛濛時雨八表同昏平路伊阻靜寄東軒春醪獨撫良朋悠邈搔首延佇停雲靄靄時雨濛濛八表同昏平陸成江有酒有酒閒飲東窻願言懐人舟車靡從東園之樹枝條再榮競朋親好一作競用新好非以怡一作招非余情人亦有言日月于征安得促席說彼平生翩翩飛鳥息我庭柯斂翮閒止好聲相和豈無他人念子實多願言不獲抱恨如何時運有序四章時運游暮春也春服既成景物斯和偶影獨游欣慨交心邁邁時運穆穆良朝襲我春服薄言東郊山滌餘靄餘靄微消一作宇瞹微霄非有風自南翼彼新苗洋洋平津乃漱乃濯邈邈遐景載欣載矚人亦有言稱心易足一作稱心而言人亦易足非揮茲一觴陶然自樂延目中流悠悠一作悠想清沂童冠齊業閒詠以歸我愛其靜寤寐交揮但恨殊世邈不可追斯晨斯夕言息其廬花藥分列林竹翳如清琴横牀濁酒半壺黄唐莫逮慨獨在余榮木有序四章榮木念將老也日月推遷巳復有夏總角聞道白首無成采采榮木結根于茲晨耀其華夕巳喪之人生若寄顦顇有時靜言孔念中心悵而采采榮木于茲托根䌓華朝起慨暮不存貞脆由人禍福無門匪道曷依匪善奚敦嗟余小子禀茲固陋徂年既流業不增舊志彼不舍安此日富我之懐矣怛然内疚先師遺訓余豈云墜四十無聞斯不足畏脂我名一作行非車䇿我名驥千里雖遥孰敢不至贈長沙公族祖有序四章長沙公於余為族祖同出大司馬昭穆既逺巳為路人經過潯陽臨别贈此同源分流人易世疎慨然寤歎念茲厥初禮服遂悠歳往月徂感彼行路眷然躊躇於穆令族允構斯一作新非堂諧氣冬暄一作輝非映懐圭璋爰采春花載警秋霜我曰欽哉實宗之光伊余云遘在長忘同笑言未久逝焉西東遥遥三湘㴞㴞九江山川阻逺行李時通何以寫心貽此話言進簣雖微終焉為山敬哉離人臨路悽然欵襟或遼音問其先酬丁柴桑二章有客有客爰來爰止秉直司聰于惠百里飡勝如歸矜善若始矜善一作聆音匪惟也諧屢有良游一作由非載言載聎以寫我憂放歡一遇既醉還休實欣心期方從我遊答龎㕘軍有序六章龎為衛軍㕘軍從江陵使上都過潯陽見贈衡門之下有琴有書載彈載詠爰得我娛豈無他好樂是幽居朝為灌園夕偃蓬廬人之所寳尚或未珍不有同好云胡以親我求良友實覯懐人懽心孔洽棟宇惟一作為非鄰伊余懐人欣徳孜孜我有㫖酒與汝樂之乃陳好言乃著新詩一日不見如何不思嘉遊未斁誓將離分送爾于路銜觴無欣依依舊楚邈邈西雲之子之逺良話曷聞昔我云别倉庚載鳴今也遇之霰雪飄零大藩有命作使上京豈忘宴安王事靡寧惨惨寒日肅肅其風翩彼方舟容裔江中朂哉征人在始思終敬茲良辰以保爾躬勸農六章悠悠上古厥初生人傲然自足抱朴含真智巧既萌資待靡因誰其贍之實賴哲人哲人伊何時為后稷贍之伊何實曰播殖舜既躬耕禹亦稼穡逺若周典八政始食熙熙令音猗猗原陸卉木䌓榮和風清穆紛紛士女趨時競逐桑婦宵征農夫野宿氣節易過和澤難久冀缺攜儷沮溺結耦相彼賢逹猶勤壟畝矧伊衆庶曳裾拱手民生在勤勤則不匱宴安自逸嵗莫奚冀儋石不儲饑寒交至顧爾儔列能不懐愧孔耽道徳樊須是鄙董樂琴書田園不履若能超然投迹高軌敢不斂袵敬讚徳美命子十章悠悠我祖爰自陶唐邈為虞賔厯世垂光御龍勤夏豕韋翼商穆穆司徒厥族以昌紛紛戰國漠漠衰周鳯隱於林幽人在丘逸虬遶雲奔鯨駭流天集有漢眷余愍侯於赫愍侯運當攀龍撫劒夙一作風邁顯茲武功書誓山河啓土開封亹亹丞相允迪前蹤渾渾長源蔚蔚洪柯羣川載導衆條載羅時有語黙運因隆窊在我中晉業融長沙桓桓長沙伊勲伊徳天子疇我專征南國功遂辭歸臨寵不忒孰謂斯心而可近得肅矣我祖慎終如始直方二臺惠和千里於皇仁考澹焉虚止寄迹風雲㝠一作寘非茲慍喜嗟余寡陋瞻望弗及顧慚華鬢負影隻立三千之罪無後為急一作復其急非我誠念哉呱聞爾泣卜云嘉日占亦良時名汝曰儼字汝求思温恭朝夕念茲在茲尚想孔伋庶其企而厲夜生子遽而永火凡百有心奚特於我既見其生實欲其可人亦有言斯情無假日居月諸漸免于孩福不虛至禍亦易來夙興夜寐願爾斯才爾之不才亦巳焉哉歸鳥四章翼翼歸鳥晨去于林逺之八表近憩雲岑和風不洽翻翮求心顧儔相鳴景庇清隂翼翼歸鳥載翔載飛雖不懐游見林情依遇雲頡頏相鳴而歸遐路誠悠性愛無遺翼翼歸鳥馴林徘徊豈思天路欣反舊棲雖無昔侣衆聲毎諧日夕氣清悠然其懐翼翼歸鳥戢羽寒條游不曠林宿則森標晨風清興好音時交矰繳奚施已倦安勞形影神三首并序貴賤賢愚莫不營營以惜生斯甚惑焉故極陳形影之苦言神辨自然以釋之好事君子共取其心焉形贈影天地長不没山川無改時草木得常理霜露榮一作惟非悴之謂人最靈智獨復不如茲適見在世中奄去靡歸期奚覺無一人親識豈相思但餘平生物舉目情悽洏我無騰化術必爾不復疑願君取吾言得酒莫茍辭影荅形存生不可言衞生每苦拙誠願游崑華邈然茲道絶與子相遇來未嘗異悲悦憩䕃若暫乖止日終不别此同既難常黯爾俱時滅身没名亦盡念之五情熱立善有遺愛胡為不自竭酒云能消憂方此詎不劣神釋大鈞無私力萬理自森著人為三才中豈不以我故與君雖異物生而相依附結託善惡同安得不相語三皇大聖人今復在何處彭祖愛一作壽非永年欲留不得住老少同一死賢愚無復數日醉或能忘將非促齡具立善常所欣誰當為汝譽甚念傷吾生正宜委運去縱浪大化中不喜亦不懼應盡便須盡無復獨多慮九日閒居一首并序余閒居愛重九之名秋菊盈園而持醪靡由空服九華寄懐於言世短意常多斯人樂久生日月依辰至舉俗愛其名露凄暄風息氣澈天象明往燕無遺影來鴈有餘聲酒能祛百慮菊解一作為非制頽齡如何蓬廬士空視時運傾塵爵恥虚罍寒華徒自榮斂襟獨閒謠緬焉起深情棲遲固多娛淹留豈無成歸園田居五首少無適俗韻性本愛丘山誤落塵網中一去三十年羈鳥戀舊林池魚思故淵開荒南野一作畝非際守拙歸園田方宅十餘畝草屋八九間榆栁䕃後簷一作園非桃李羅堂前曖曖逺人村依依墟里烟狗吠深巷中鷄鳴桑樹顛户庭無塵雜虚室有餘閒久在樊籠裏復得返自然野外罕人事窮巷寡輪鞅白日掩荆扉虚室一作對酒絶塵想時復墟曲中一作里人披草一作披衣共來往相見無雜言但道桑麻長桑麻日已長我土日已廣常恐霜霰至零落同草莽種豆南山下草盛豆苗稀晨興理荒穢帶月荷鋤歸道狹草木長夕露霑我衣衣霑不足惜但使願無違久去山澤游浪莽林野娯試攜子姪輩披榛歩荒墟徘徊丘壠間依依昔人居井竈有遺處桑竹殘朽株一作樹木殘根株非借問採薪者此人皆焉如薪者向我言死後無復餘一世異朝市此語真不虚人生似幻化終當歸空一作虚非無悵恨獨䇿還﨑嶇厯榛曲山澗清且淺可一作遇非以濯吾足漉我新熟酒隻鷄招近屬一作􅈰非日入室中闇荆薪代明燭歡來苦夕短已復至天旭問來使一首爾從山中來早晩發天目我屋南窻下今生幾叢菊薔薇葉已抽秋蘭氣當馥歸去來山中山中酒應熟遊斜川一首并序辛丑正月五日天氣澄和風物閒美與二三鄰曲同遊斜川臨長流望層城魴鯉躍鱗於將夕水鷗乘和以翻飛彼南阜者名實舊矣不復乃為嗟歎若夫層城傍無依接獨秀中臯遥想靈山有愛嘉名欣對不足率爾賦詩悲日月之遂往悼吾年之不留各疏年紀鄉里以記其時日開歳倏五十一作日非吾生行歸休念之動中懐及辰為茲游氣和天惟澄班坐依逺流弱湍馳文魴閒谷矯鳴鷗逈澤散游目緬然睇層丘雖微九重秀顧瞻無匹儔提壺接賔侣引滿更獻酬未知從今去當復如此否中腸一作觴非縱遥情忘彼千載憂且極今朝樂明日非所求示周續之祖企謝景夷三郎一首負痾頽簷下終日無一欣藥石有時閒念我意中人相去不尋常道路邈何一作無非因周生述孔業祖謝響然臻道喪向千載今朝復斯聞馬隊非講肆校書亦已勤老夫有所愛思與爾為鄰願言誨諸子從我潁水濵乞食一首飢來驅我去不知竟何之行行至斯里叩門拙言辭主人解余意遺贈豈虛來談諧終日夕觴至輒傾杯情欣新知歡興言遂賦詩感子漂母惠愧我非韓才衘戢知何謝㝠報以相貽諸人共遊周家墓栢下今日天氣佳清吹與鳴彈感彼栢下人安得不為歡清歌散新聲緑酒開芳顔未知明日事余襟良已殫怨詩楚調示龎主簿鄧治中天道幽且逺鬼神茫昧然結髮念善事僶俛六九年弱冠逢世阻始室喪其偏炎火屢焚如螟蜮恣中田風雨縱横至收斂不盈㕓夏日抱長一作長抱饑寒夜無被眠造夕思鷄鳴及晨願烏遷在巳何怨天離憂悽目前吁嗟身後名於我若浮烟慷慨獨悲歌鍾期信為賢答龎參軍有序三復來貺欲罷不能自爾鄰曲冬春再交欵然良對忽成舊遊俗諺云數面成親况情過此者乎人事好乖便當語離楊公所歎豈惟長悲吾抱疾多年不復為文本既不豐復老病繼之輒依周孔往復之義且為别後相思之資相知何必舊傾葢定前言有客賞我趣每每顧林園談諧無俗調所說聖人篇或有數㪷酒閒飲自歡然我實幽居士無復東西縁物新人惟舊弱毫多所宣情懐萬里外形跡滯江山君其愛體素來㑹在何年五月旦作和戴主簿虚舟縱逸棹回復遂無窮發嵗始俛仰星紀奄將中明兩萃時物一作南牕罕悴物非北林榮且豐神淵寫時雨晨色奏景風既來孰不去人理固有終居常待其盡曲肱豈傷沖遷化或夷險肆志無窊隆即事如巳高何必升華嵩連雨獨飲運生㑹歸盡終古謂之然世間有松喬於今定何間故老贈余酒乃言飲得仙試酌百情逺重觴忽忘天天豈去此哉任真無所先雲鶴有竒翼八表須臾還自我抱兹獨僶俛四十年形骸久已化心在復何言移居二首昔欲居南村非為卜其宅聞多素心人樂與數晨夕懐此頗有年今日從兹役弊廬何必廣取足蔽牀席鄰曲時時來抗言談在昔竒文共欣賞疑義相與析春秋多佳日登高賦新詩過門更相呼有酒斟酌之農務各自歸閒暇輒相思相思則披衣言笑無厭時此理將不勝無為忽去兹衣食當須幾一作紀非力耕吾不欺和劉柴桑山澤久見招胡事乃躊躇直為親舊故未忍言索居良辰入竒懐挈杖還西廬荒塗無歸人時時見廢墟茅茨已就治新疇復應畬谷風轉凄薄春醪解饑劬弱女雖非男慰情良勝無棲棲世中事嵗月共相疎耕織稱其用過此奚所須去去百年外身名同翳如酬劉柴桑窮居寡人用時忘四運周空一作櫚非庭多落葉慨然知已秋新葵鬱北牖嘉穟眷一作飬非南疇今我不為樂知有來嵗不命室攜童弱良日登逺游和郭主薄二首靄靄堂前林中夏貯清隂凱風因時來回飈開我襟息交逝開臥坐起弄書琴一作息交遊閒業臥起弄書琴非園蔬有餘滋舊榖猶儲今營巳良有極過足非所欽春秫作美酒酒熟吾自斟弱子戲我側學語未成音此事真復樂聊用忘華簮遥遥望白雲懐古一何深和澤周三春清凉素一作華非秋節露凝無游氛天髙風景澈陵岑聳逸峯遥瞻皆竒絶芳菊開林耀青松冠巖列懐此貞秀姿卓為霜下傑銜觴念幽人千載撫爾訣檢素不獲展厭厭竟良月於王撫軍座送客秋日凄且厲百卉具巳腓爰以履霜節登高餞將歸寒氣冒山澤游雲倐無依洲渚思緬邈風水互乖違瞻夕欣良讌離言聿云悲晨鳥暮來還懸崖斂餘輝逝一作遊非止判殊路旋駕悵遲遲目送回舟逺情隨萬化遺與殷晉安别有序殷先作晉安南府長史掾因居潯陽後作太尉參軍移家東下作此以贈遊好非久長一遇盡殷勤信宿酬清話益復知為親去嵗家南里薄作少時鄰負杖肆游從淹畱忘宵晨語黙自殊勢亦知當乖分未謂事巳及興言在兹春飄飄西來風悠悠東去雲山川千里外言笑難為因良才不隱世江湖多賤貧脫有經過便念來存故人贈羊長史有序左軍羊長史銜使秦川作此與之愚生三季後慨然念黄虞得知千載外正賴古人書賢聖留餘跡事事在中都豈忘游心目闗河不可踰九域甫巳一逝將理舟輿聞君當先邁負痾不獲俱路若經商山為我少躊躇多謝綺與角精爽今何如紫芝誰復採深谷久應蕪駟馬無貰患貧賤有交娯清謡結心曲人乖運見疎擁懐累代下言盡意不舒嵗暮和張常侍市朝悽舊人驟驥感悲泉明旦非今日嵗暮余何言素顔斂光潤白髮一巳䌓濶哉秦穆談旅力豈未愆向夕長風起寒雲沒西山冽冽氣遂嚴紛紛飛鳥還民生鮮常在矧伊愁苦纒屢闕清酤至無以樂當年窮通靡攸慮顦顇由化遷撫已有深懐履運増慨然和胡西曹示顧賊曹㽔賔五月中清朝起南颸不駛亦不遲飄飄吹我衣重雲蔽白日閒雨紛微微流目視西園􅁮􅁮榮紫葵於今甚可愛奈何當復衰一作當樂行復衰非感物願及時每恨靡所揮悠悠待秋稼寥落將賖遲逸想不可淹猖狂獨長悲悲從弟仲徳一首銜哀過舊宅悲淚應心零借問為誰悲懐人在九㝠禮服名羣從恩愛若同生門前執手時何意爾先傾在數竟未免為山不及成慈母沈哀疚二𦙍纔數齡雙位委空館朝夕無哭聲流塵集虚坐宿草旅前庭階除曠遊迹園林獨餘情翳然乗化去終天不復形遲遲將囘步惻惻悲襟一作衿涕盈始作鎮軍參軍經曲阿弱齡寄事外委懐在琴書被褐欣自得屢空常晏如時來茍㝠㑹婉孌一作踠轡憇通衢投策命晨裝暫與田園疎眇眇孤舟逝緜緜歸思紆我行豈不遥登陟千里餘目倦川塗異心念山澤居望雲慙高鳥臨水愧游魚真想初在襟誰謂形蹟拘聊且慿化遷終返班生廬庚子嵗五月中從都還阻風於規林二首行行循歸路計日望蒨居一欣侍温顔再喜見友于鼔棹路﨑曲指景限西隅江山豈不險歸子念前塗凱風負我心戢枻守窮湖高莽眇無界夏木獨森疎誰言客舟逺近瞻百里餘延目識南嶺空難將焉如自古歎行役我今始知之山川一何曠巽坎難與期崩浪䀨天響長風無息時久游戀所生如何淹在兹靜念園林好人間良可辭當年詎有幾縱心復何疑辛丑嵗七月赴假還江陵夜行塗中閒居三十載遂與塵事㝠詩書孰宿好林園無俗情如何捨此去遥遥至南荆叩枻新秋月臨流别友生凉風起將夕夜景湛虚明昭昭天宇濶皛皛川上平懐役不遑寐中宵尚孤征商歌非吾事依依在耦耕投冠旋舊墟不為好爵縈養真衡茅下庶以善自名癸卯嵗始春懐古田舍二首在昔聞南畝當年竟未踐屢空既有人春興豈自免夙晨裝吾駕啓塗情巳緬鳥弄歡新節冷風送餘善一作鳥弄新節冷風送餘寒善寒竹一作草非被荒蹊地為罕一作幽非人逺是以植杖翁悠然不復返即理愧通識所保詎乃淺先師有遺訓憂道不憂貧瞻望邈難逮轉欲患一作志非長勤秉耒歡時務解顔勸農人平疇交逺風良苗亦懐新雖未量嵗功即事多所欣耕種有時息行者無問津日入相與歸壺漿勞近鄰長吟掩柴門聊為隴畝民癸卯嵗十二月中作與從弟敬逺寢迹衡門下邈與世相絶顧盼莫誰知荆扉晝常閉必結切淒淒嵗暮風翳翳經夕一作日非雪傾耳無希聲在目皓巳潔勁氣侵襟袖簞瓢謝屢設蕭索空宇中了無一可悅厯覽千載書時時見遺烈高操非所攀謬一作深非得固窮節平津茍不由棲遲詎為拙寄意一言外兹契誰能别乙巳嵗三月為建威參軍使都經錢溪我不踐斯境嵗月好巳積晨夕看山川事事悉如昔微雨洗高林清飈矯雲翮眷彼品物存義風都未隔伊余何為者勉勵從兹役一形似有制素襟不可易園田日夣想安得久離析終懐在歸一作壑非舟諒哉宜一作負非霜栢還舊居疇昔家上京六一作十非載去還歸今日始復來惻愴多所悲阡陌不移舊邑屋或時非履歴周故居隣老罕復遺步步尋往迹有處特依依流幻百年中寒暑日相推常恐大化盡氣力不及衰撥置且莫念一觴聊可揮戊申嵗六月中遇火草廬寄窮巷甘以辭華軒正夏長風急林室頓燒燔一宅無遺宇舫舟䕃門前迢迢新秋夕亭亭月將圓果菜始復生驚鳥尚未還中宵竚遥念一盼周九天總髮抱孤介一作念非奄出四十年形迹慿化往靈府長獨閒貞剛自有質玉石乃非堅仰想東户時餘糧宿中田鼔腹無所思朝起暮歸眠既巳不遇兹且遂灌我園已酉嵗九月九日靡靡秋巳夕淒淒風露交蔓草不復榮園木空自凋清氣澄餘滓杳然天界高哀蟬無留一作歸非響叢一作燕非鴈鳴雲霄萬物相尋繹人生豈不勞從古皆有役念之中心焦何以稱我情濁酒且自陶千載非所知聊以永今朝庚戌嵗九月中於西田穫早稻人生歸有道衣食固其端孰是都不營而以求自安開春理常業嵗功聊可觀晨出肆微勤日入負耒一作未非還山中饒霜露風氣亦先寒田家豈不苦弗獲辭此難四體誠巳疲庶無異患干盥濯息簷下斗酒散襟一作劬非顔遥遥沮溺心千載乃相闗但願長如此躬耕非所歎丙辰嵗八月中於下潠田舍穫貧居依一作事非稼穡戮力東林隈不言春作苦常恐負所懐司田眷有秋寄聲與我諧饑者歡初飽束帶候鳴鷄楊檝越平湖汎隨清壑迴鬱鬱荒山裏猿聲閒且哀悲風愛靜夜一作夜靜非林鳥喜晨開曰余作此來三四星火頽姿年逰巳老其事未云乖遥謝荷蓧翁聊得從君棲責子白髮被兩鬢肌膚不復實雖有五男兒總不好紙筆阿舒巳二八懶惰故無匹阿宣行志學而不愛文術雍端年十三不識六與七通子垂九齡但覓梨與栗天運茍如此且進杯中物有㑹而作并序舊榖既沒新榖未登頗為老農而值年灾日月尚悠為患未巳登歲之功既不可希朝夕所資烟火裁通旬日巳來始念饑乏嵗云夕矣慨然永懐今我不述後生何聞哉弱年逢家乏老至更長饑菽麥實所羡孰敢慕甘肥惄如亞九飯當暑厭寒衣嵗月將欲暮如何辛苦悲常善粥者心深恨䝉袂非嗟來何足吝徒沒空自遺斯濫豈彼志固窮夙所歸餒也已矣夫在昔余多師蜡日風雪送餘運無妨時巳和梅柳夾門植一條有佳花我唱爾言得酒中適何多未能明多少章山有竒歌四時春水滿四澤夏雲多竒峯秋月揚明暉冬嶺秀孤松飲酒二十首有序余閒居寡歡兼此夜巳長偶有名酒無夕不飲顧影獨盡忽焉復醉既醉之後輒題數句自娛紙墨遂多辭無詮次聊命故人書之以為歡笑爾衰榮無定在彼此更共之邵生𤓰田中寧似東陵時寒暑有代謝人道每如兹逹人解其㑹一作趣非逝將不復疑忽與一觴酒日夕歡相持積善云有報夷叔在一作饑非西山善惡茍不應何事空立言九十行帶索饑寒况當年不賴固窮節百世當誰傳道喪向千載人人惜其情有酒不肯飲但顧世間名所以貴我身豈不在一生一生復能幾倐如流電驚鼎鼎百年内持此欲何成棲棲失羣鳥日暮猶獨飛徘徊無定止夜夜聲轉悲厲響思清晨逺去何所依一作厲響思清逺去來何依依非因值孤生松斂翮遥來歸勁風無榮木此䕃獨不衰託身巳得所千載不相違結廬在人境而無車馬喧問君何能爾心逺地自偏採菊東籬下悠然見南山山氣日夕佳飛鳥相與還此中有真意欲辯巳忘言行止千萬端誰知非與是是非茍相形雷同共譽毁三季多此事逹士似不爾咄咄俗中愚一作惡非且當從黄綺秋菊有佳色裛露掇其英汎此忘憂物逺我遺世情一觴雖一作聊非獨進杯盡壺自傾日入羣動息歸鳥趣林鳴嘯傲東軒下聊復得此生青松在東園衆草沒其姿疑霜殄異類卓然見高枝連林人不覺獨樹衆乃竒提壺挂寒柯逺望時復為吾生夣幻間何事紲塵羈清晨聞叩門倒裳往自開問子為誰歟田父有好懐壺漿逺見候疑我與時乖繿縷茆簷下未足為高棲一世皆尚同願君汨其泥深感父老言稟氣寡所諧紆轡誠可學違巳詎非迷且共歡此飲吾駕不可囘在昔曾逺逰直去東海隅道路迴且長風波阻一作起非中塗此行誰使然似為饑所驅傾身營一飽少許便有餘恐此非名計息駕歸閒居顔生稱為仁榮公言有道屢空不獲年長饑至于老雖留身後名一生亦枯槁死去何所知稱心固為好客一作各非養千金軀臨化消其寳裸𦵏何必惡人當解意表長公曾一仕壯節忽失時杜門不復出終身與世辭仲理歸大澤高風始在一作如兹一往便當已何為復狐疑去去當奚道世俗久相欺擺落悠悠談請從余所之有客常同止取捨邈異境一士長獨醉一夫終年醒醒醉還相笑發言各不領規規一何愚兀傲差若頴寄言酣中客日沒獨何炳一作燭當秉非故人賞我趣挈壺相與至班荆坐松下數酌巳復醉父老雜亂言觴酌失行次不覺知有我安知物為貴悠悠迷所畱酒中有深味貧居乏人工灌木荒余宅班班有翔鳥寂寂無行跡宇宙何悠悠一作一何悠非人生少至百嵗月相從過一作催逼非髩邊早已白若不委窮逹素抱深可惜少年罕人事游好在六經行行向不惑淹留遂一作非無成竟抱窮苦節饑寒飽所更敝廬交悲風荒草沒前庭披褐守長夜晨雞不肯鳴孟公不在兹終以翳吾情幽蘭生前庭舍薫待清風脱然至見别蕭艾中行行失故路任道或能通覺悟當念還鳥盡廢良弓子雲性嗜酒家貧無由得時賴好事人載醪祛所惑觴來為之盡是諮無不塞有時不肯言豈不在伐國仁者用其心何嘗失顯黙疇昔苦長饑投耒去學仕將養不得節凍餒固纒巳是時向立年志意多所恥遂盡介然分拂衣一作終死非歸田里冉冉星氣流亭亭復一紀世路廓悠悠楊朱一作生非所以止雖無揮金事濁酒聊可恃羲農去我久舉世少復真汲汲魯中叟彌縫使其淳鳯鳥雖不至禮樂暫得新洙泗輟微響漂流逮狂秦詩書復何罪一朝成灰塵區區諸老翁為事誠殷勤如何絶世下六籍無一親終日馳車走不見所問津若復不快飲空負頭上巾但恨多謬誤君當恕醉人止酒居止次城邑逍遥自閑止坐止高䕃下步止蓽門裏好味止園葵大懽止稚子平生不止酒止酒情無喜暮止不安寢晨止不能起日日欲止之營衛止不理徒知止不樂未信一作知非止利巳始覺止為善今朝真止矣從此一止去將止扶桑涘清顔止宿容奚止千萬祀述酒重離照南陸鳴鳥聲相聞秋草雖未黃融風久巳分素礫皛修渚南嶽無餘雲豫章抗高門重華固靈墳流淚抱中歎傾耳聼司晨神州獻佳粟西靈為我馴諸梁董師旅羊勝喪其身山陽歸下國成名猶不勤卜生善斯牧安樂不為君平生去舊京峽中納遺薰雙陵甫云育三趾顯竒文王子愛清吹日中翔河汾朱公練九齒閒居離世紛峩峩西嶺内偃息常所親天容自永固彭殤非等倫擬古九首榮榮窻下蘭密密堂前栁初與君别時不謂行當久出門萬里客中道逢嘉友未言心相醉不在接杯酒蘭枯栁亦衰遂令此言負一作時沒身還朽非多謝諸少年相知不忠一作相非厚意氣傾人命離隔復何有辭家夙嚴駕當往志無終問君今何行非商復非戎聞有田子春節義為士雄斯人久巳死鄉里習其風生有高世名既沒傳無窮不學狂一作驅非馳子直在百年中仲春遘時雨始雷發東隅衆蟄各潛駭草木從横一作此非舒翩翩新來燕雙雙入我廬先巢故尚在相將還舊居自從分别來門庭日荒蕪我心固匪石君情定何如迢迢百尺樓分明望四荒暮作歸雲宅朝為飛鳥堂山河滿目中平原轉茫茫古時功名士慷慨爭此場一旦百嵗後相與還北邙松栢為人伐高墳互低昻頽基無遺主遊魂在何方榮華誠足貴亦復可憐傷東方有一士被服常不完三旬九遇食十年著一冠辛苦無此比常有好容顔我欲觀其人晨去越河闗青松夾路生白雲宿簷端知我故來意取琴為我彈上絃驚别鶴下絃操孤鸞願畱就君住從今至嵗寒蒼蒼谷中樹冬夏常如兹年年見霜雪誰謂不知時厭聞世上語結友到臨淄稷下多談士指彼决吾疑裝束既有日巳與家人辭行行停出門還坐更自思不怨道里長但畏人我欺萬一不合意永為世笑嗤一作之非伊懐難具道為君作此詩日暮天無雲春風扇微和佳人美清夜逹曙酣且歌歌竟長歎息持此感人多皎皎雲間月灼灼葉中華豈無一時好不久當如何少時壯且厲撫劒獨行游誰言行游近張掖至幽州饑食首陽薇渇飲易水流不見相知人惟見古時丘路邊兩高墳伯牙與莊周此士難再得吾行欲何求種桑長江邊三年望當採枝條始欲茂忽值山河改柯葉自摧折根株浮滄海春蠶既無食寒衣欲誰待本不植高原今日復何悔雜詩十二首人生無根蔕飄如陌上塵分散逐風轉此巳非常身落地為一作流落成非兄弟何必骨肉親得歡當作樂斗酒聚比鄰盛年不重來一日難再晨及時當勉勵嵗月不待人白日淪西河素月出東嶺遥遥萬里輝蕩蕩空中景風來入房户夜中枕席冷氣變悟時易不眠知夕永欲言無予和揮杯歡孤影日月擲人去有志不獲騁念此懐悲悽終曉不能靜榮華雖久居盛衰不可量昔為三春蕖今作秋蓮房嚴霜結野草枯悴未遽央日月還復周一作有環周非我去不再陽眷眷往昔時憶此斷人腸丈夫志四海我願不知老親戚共一處子孫還相保觴絃肆朝日罇中酒不燥緩帶盡歡娛起晚眠常早孰若當世士氷炭滿懐抱百年歸一作埽非丘壟用此空名道憶我少壯時無樂自欣豫猛志逸四海騫翮思逺翥荏苒歲月頽此心稍巳去值歡無復娛每每多憂慮氣力漸衰損轉覺日不如壑舟無須臾引我不得住前塗當幾許未知止泊處古人惜寸隂念此使人懼昔聞長者言掩耳每不喜奈何五十年忽巳親此事求我盛年歡一毫無復意去去轉欲逺此生難一作豈非再值傾家持一作時非作樂竟此嵗月駛有子不留金何用身後置日月不肯遲四時相催迫寒風拂枯條落葉掩長陌弱質與一作興非運頽𤣥鬢早巳白素標挿人頭前塗漸就窄家為逆旅舍我如當去客去去欲何之南山有舊宅代耕本非望所業在田桑躬親未曾替寒餒常糟糠豈期過滿腹但願飽粳糧御冬足大布麤絺以應陽政爾不能得哀哉亦可傷人皆盡獲宜拙生失其方理也可奈何且為陶一觴遥遥從羈役一心處兩端掩淚汎東逝順流追時遷日沒星與昴勢翳西山巔蕭條隔天涯惆悵念常飡慷慨思南歸路遐無由縁闗染難虧替絶音寄斯篇閒居執蕩志時駛不可稽驅役無停息軒裳逝東崖沈隂擬薫麝寒氣激我懐嵗月有常御我來淹巳彌慷慨憶綢繆此情久巳離荏苒經十載暫為人所羈庭宇翳餘木倐忽日月虧我行未云逺回顧慘風涼春燕應節起高飛拂塵梁邉鴈悲無所代謝歸北鄉離鵾鳴清池涉暑經秋霜愁人難為辭遥遥春夜長嫋嫋松標崖婉孌柔童子年始三五間喬柯何可倚一作柯條何滓滓又作華柯真可寄養色含津氣粲然有心理詠貧士七首萬族各有託孤雲獨無依曖曖空中滅何時見餘暉朝霞開宿霧衆鳥相與飛遲遲出林翮未夕復來歸一作巳復歸非量力守故轍豈不寒與饑知音茍不存巳矣何所悲淒厲嵗云暮擁一作短非褐曝前軒南圃無遺秀枯條盈北園傾壺絶餘瀝闚竈不見烟詩書塞座外日昃不遑研間居非陳厄竊有慍見言何巳慰吾懐賴古多此賢以榮叟老帶索欣然方彈琴原生納决履清歌暢商一作高非音重華去我久貧士世相尋敝襟不掩肘藜羮常乏斟豈忘襲輕裘茍得非所欽賜也徒能辯乃不見吾心安貧守賤者自古有黔婁好爵吾不縈厚饋吾不酬一旦壽命盡敝服仍一作蔽覆乃非不周豈不知其極非道故無憂從來將千載未復見斯儔朝與仁義生夕死復何求袁安困積雪邈然不可干阮公見錢入即日棄其官芻藁有常温採莒足朝飡豈不實辛苦所懼非饑寒貧富常交戰道勝無戚一作厚非顔至徳冠邦閭清節映西闗仲蔚愛窮居遶宅生蒿蓬翳然絶交游賦詩頗能工舉世無知者一作音非止有一劉龔此士胡獨然實由罕所同介焉安其業所樂非窮通人事固以拙聊得長相從昔在黄子㢘彈冠佐名州一朝辭吏歸清貧畧難儔年饑感仁妻泣涕向我流丈夫雖有志固為兒女憂惠孫一晤歎腆贈竟莫酬誰云固窮難邈哉此前修詠二疏大象轉四時功成者自去借問衰周來幾人得其趣游目漢庭中二疏復此舉高嘯返舊居長揖儲君傅錢送傾皇朝華軒盈道路離别情所悲餘榮何足顧事勝感行人賢哉豈常譽厭厭閭里歡所營非近務促席延故老揮觴道平素問金終寄心清言曉未悟放意樂餘年遑恤身後慮誰云其人亡久而道彌著詠三良彈冠乗通津但懼時我遺服勤盡嵗月常恐功愈微忠情謬獲露遂為君所私出則陪文輿八必侍舟帷箴規向巳從訃議初無虧一朝長逝後願言同此歸厚恩固難忘君命安可違臨穴罔遲疑投義志攸希荆棘籠高墳黄鳥聲正悲良人不可贖泫然霑我衣詠荆軻燕丹善養士志在報强嬴招集百夫良嵗暮得荆卿君子死知巳提劒出燕京素驥鳴廣陌慷慨送我行雄髪指危冠猛氣衝長纓飲餞易水上四坐列羣英漸離擊悲筑宋意唱高聲蕭蕭哀風逝淡淡寒波生商音更流涕羽奏壯士驚心知去不歸且有後世名登車何時顧飛葢入秦庭凌厲越萬里逶迤過千城圖窮事自至豪主正怔營惜哉劍術疎竒功遂不成其人雖巳沒千載有餘情一作斯人久巳沒千載有深情讀山海經十三首孟夏草木長遶屋樹扶疎衆鳥欣有託吾亦愛吾廬既耕亦巳種時還讀我書窮巷隔深轍頗迴故人車歡言一作然酌春酒摘我園中蔬微雨從東來好風與之俱汎覽周王傳流觀山海圖俯仰終宇宙不樂復何如玉臺一作堂非凌霞秀王母怡妙顔天地共俱生不知幾何年靈化無窮巳館宇非一山高酣發新謠寧效俗中言迢遞槐江嶺是謂𤣥圃丘西南望崑墟一作崙非光氣難與儔亭亭明玕照落落清瑶流恨不及周穆託乗一來游舟木生何許迺在峚山陽黄花復朱實食之夀命長白玉凝素液瑾瑜發竒光豈伊君子寳見重我軒黄翩翩三青鳥毛色竒可憐朝為王母使暮歸三危山我欲因此鳥具向王母言在世無所須惟酒與長年逍遥蕪皋上杳然望扶木洪柯百萬尋森散覆暘谷靈人侍丹池朝朝為日浴神景一登天何幽不見燭粲粲三珠樹寄生赤水隂亭亭凌風桂八榦共成林靈鳯撫雲舞神鸞調玉音雖非世上寳爰得王母心自古皆有沒何人得靈長不死復不老萬嵗如平常赤泉給我飲員丘足我糧方與三辰游夀考豈渠央夸父誕宏志乃與日競走俱至虞淵下似若無勝負神力既殊妙傾河焉足有餘迹寄鄧林功竟在身後精衛銜微木將以填槍海刑天舞干戚猛志故常在同物既無慮化去不復悔徒設在昔心良晨詎可待巨猾肆威暴欽䲹違帝㫖窫窳强能變祖江遂獨死明明上天鑒為惡不可履長枯固巳劇鵕鶚豈足恃鵃鵝當作䲭鴸見城邑其國有放士念彼懐王世當時數來止青丘有竒鳥自言獨見爾本為迷者生不以喻君子巖巖顯朝市帝者慎用才何以廢共鯀重華為之來仲父獻誠言姜公乃見猜臨没告饑渇當復何及哉擬挽歌辭三首有生必有死早終非命促昨暮同為人今旦在鬼録魂氣散何之枯形寄空木嬌兒索父啼良友撫我哭得失不復知是非安能覺千秋萬嵗後誰知榮與辱但恨在世時飲酒不得足在昔無酒飲今旦一作但湛空觴春醪生浮蟻何時更能嘗殽案盈我前親舊哭我傍欲語口無音欲視眼無光昔在高堂寢今宿荒草鄉一朝出門去歸來夜未央荒草何茫茫白楊亦蕭蕭嚴霜九月中送我出逺郊四面無人居高墳正嶣嶤馬為仰天鳴風為自蕭條一作鳥為動哀鳴林為結風飈幽室一巳閉千年不復朝千年不復朝賢逹無奈何向來相送人各自還其家親戚或餘悲他人亦巳歌死去何所道託體同山阿桃花源詩嬴氏亂天紀賢者避其世黄綺之商山伊人亦云逝在迹浸復湮來逕遂蕪廢相命肄農耕日入從所憩桑竹垂餘䕃菽稷隨時藝春蠺收長絲秋熟靡王稅荒路曖交通雞犬互鳴吠俎豆猶古法衣裳無新製童孺縱行歌斑白歡游詣草榮識節和木衰知風厲雖無紀厯誌四時自成嵗怡然有餘樂於何勞智慧竒縱隱五百一朝敞神界淳薄既異源旋復還幽蔽借問游方士焉測塵囂外願言躡輕風高舉尋吾契聨句鳴鴈乗風飛去去當何極念彼窮居士如何不歎息淵明雖欲騰九萬扶揺竟何力逺招王子喬雲駕庶可􅅚愔之顧侣正徘徊離離翔天側霜落不切肌徒愛雙飛翼循之高柯擢條榦逺眺同天色思絶慶未看徒使生迷惑淵明漢魏六朝百三家集巻六十二
