body:
  text: 漢魏六朝百三家集巻一百十四隋煬帝集題詞隋煬帝志慕秦皇漢武而内行則劉聰石虎雖有文不善也迷樓鳯䑵歌聲兆亡其亦漢成時燕燕諸謡乎隋書文苑傳稱帝意在驕淫詞無浮蕩綴文之士得依取正余疑其諛比觀全集多莊言簡戲謔似史評非誣也帝在藩時謀奪儲位朽絃老婢矯飾悦親文辭矜束尚其餘智及突厥既來江都往幸飛帛戲題持檝成咏則樠木心蕩沙丘命盡之日矣帝朝京師還作歸藩賦命栁􅙒序之今集無有知傳者多缺他文自詔書外雅深佞佛毘曇學聖黎耶悟真自謂顔淵値宣尼尹喜逢老氏也身受法戒而烝弑無慚開士之談豈足信哉陳隋文衰帝王有作與衆同波抑煬帝云多彈曲者如人多讀書讀書多則能撰書彈曲多即能造曲以論文學殆庶乎而目録詔營東京詔立七廟詔修高廟樂詔為先代立後詔為孔子立後詔為前代帝王守陵墓詔為昔賢立祠詔功臣襲封詔勲官不得回授職事詔舉賢詔勵經術詔巡省風俗詔尚齒詔緝民詔教義詔安集詔恤行役詔達幽枉詔寛連坐詔改博陵為髙陽郡詔埋祭死亡軍士詔親征髙麗詔再伐髙麗詔勞楊素手詔為楊素立碑詔手詔史祥褒樊子葢詔詔樊子葢又加蘇威開府儀同三司詔以衞𤣥為光禄大夫詔贈劉方上柱國盧國公詔贈豆盧毓大將軍詔改封豆盧毓雍丘侯詔追贈獨孤陁詔又責蘇威詔徙衞王集滕王綸詔優突厥詔答議突厥改服詔賜啟民位侯王上詔與髙昌國王詔􅃯答齊王􅃯與栁謇之勅勅度四十九人法名行道度人天下勅璽書降來䕶兒璽書答突厥啟民璽書檄遺陳尚書江總檄令與天台山衆令重令書遺史祥書遣延智顗書治禪衆寺答智顗書法諱奉智者書㕘智者書請留智者書重留智者書許智者行書謝法門書遣使往匡山㕘書重遣匡山㕘書答智顗述匡山寺書與匡山三寺書與峯頂寺書與禪閣寺書入朝遣使㕘書又又又又又遣使荆州迎書遣使潭州迎書在京遣書在京重遣書從駕東岱於路遣書於路次書還藩遣迎書謝天冠幷請淨名義書重與智者請義書謝義疏書論荆州諸寺書重答智者書與荆州總管達奚儒書迎智者入城礙雨移日書次迎入城書答智顗蔣州事書遣使入天台㕘書遣使入天台迎書遣使叅病書答智顗遺㫖書智顗終後弔山衆書遣使入天台設周忌書賜釋慧覺書請釋灌頂書召徐則書徐則没後下書文寶臺經藏願文誄秦孝王誄疏受菩薩戒疏天台建功德發願疏敬靈龕疏設齋願疏樂府飲馬長城窟行示從征羣臣白馬篇步虚詞二首春江花月夜二首錦石擣流黄二首喜春遊歌二首江都宫樂歌泛龍舟四時白紵歌二首東宫春江都夏紀遼東二首詩冬至乾陽殿受朝雪中受突厥主朝宴席賦宴東堂賜史祥賜牛𢎞賜諸葛穎早渡淮臨渭源還京師捨舟登陸示慧日道場玉清𤣥壇德衆謁方山靈巖寺月夜觀星季秋觀海望海詠鷹獻嵗宫臣正月十五日于通衢建燈夜升南樓晩春悲秋冬夜夏日臨江北鄉古松樹賜守宫女持檝篇賜吳絳仙贈張麗華憶韓俊娥二首幸江都作嘲羅羅鳯䑵歌迷樓歌效劉孝綽襍憶詩二首望江南八闋漢魏六朝百三家集巻一百十四目録欽定四庫全書漢魏六朝百三家集巻一百十四明張溥輯隋煬帝集詔營東京詔乾道變化隂陽所以消息沿創不同生靈所以順叙若使天意不變施化何以成四時人事不易為政何以釐萬姓易不云乎通其變使民不倦變則通通則久有德則可久有功則可大朕又聞之安安而能遷民用丕變是故姬邑兩周如武王之意殷人五徙成湯后之業若不因人順天功業見乎變愛人治國者可不謂歟然洛邑自古之都王畿之内天地之所合隂陽之所和控以三河固以四塞水陸通貢賦等故漢祖曰吾行天下多矣唯見洛陽自古皇王何嘗不留意所不都者蓋有由焉或以九州未一或以困其府庫作洛之制所以未暇也我有隋之始便欲創玆懷雒日復一日越暨于今念玆在玆興言感哽朕肅膺寳厯纂臨萬邦遵而不失心奉先志今者漢王諒悖逆毒被山東遂使州縣或淪非所此由闗河懸逺兵不赴急加以幷州移户復在河南周遷殷人意在於此況復南服遐逺東夏殷大因機順動今也其時羣司百辟僉諧厥議但成周墟塉弗堪葺宇今可於伊洛營建東京便即設官分職以為民極也夫宫室之制本以便生上棟下宇足避風露髙臺廣厦豈曰適形故傳云儉德之共侈惡之大宣尼有云與其不遜也寧儉豈謂瑤臺瓊室方為宫殿者乎土堦采椽而非帝王者乎是知非天下以奉一人乃一人以主天下也民惟國本本固邦寧百姓足孰與不足今所營構務從節儉無令雕牆峻宇復起於當今欲使卑宫菲食將貽於後世有司明為條格稱朕意焉立七廟詔聿追孝饗德莫至焉崇建寢廟禮之大者然則質文異代損益殊時學滅坑焚經典散逸憲章湮墜廟堂制度師説不同所以世數多少莫能是正連室異宫亦無準定朕獲奉祖宗欽承景業永惟嚴配思隆大典於是詢謀在位博訪儒術咸以為髙祖文皇帝受天明命奄有區夏拯羣飛於四海革凋敝於百王恤獄緩刑生靈皆遂其性輕徭薄賦比屋各安其業恢夷宇宙混一車書東漸西被無思不服南征北怨俱荷來蘇駕毳乘風歴代所弗至辮髮左衽聲教所罕及莫不厥角闗塞頓顙闕庭譯靡絶時書無虚月韜戈偃武天下晏如嘉瑞休徴表裏禔福猗歟偉歟無得而名者也朕又聞之德厚者流光治辨者禮縟是以周之文武漢之髙光其典章特立諡號斯重豈非縁情稱術即崇顯之義乎髙祖文皇帝宜別建廟宇以彰巍巍之德仍遵月祭用表蒸蒸之懷有司以時創造務合典制又名位既殊禮亦異等天子七廟事著前經諸侯二昭義有差降故其以多為貴王者之禮今可依用貽厥後昆修髙廟樂詔古先哲王經國成務莫不因人心而制禮則天明而作樂昔漢氏諸廟別所樂亦不同至於光武之後始立共堂之制魏文承運初營廟寢太祖一室獨為別宫自玆之後兵車交爭制作規模日不暇給伏惟髙祖文皇帝功侔造物道濟生靈享薦宜殊樂舞須別今若月祭時饗既與諸祖共庭至於舞功獨於一室交違禮意未合人情其詳議以聞為先代立後詔昔周王下車首封唐虞之𦙍漢帝承厯亦命殷周之後皆所以褒立先代憲章在昔朕嗣膺景業傍求雅訓有一𢎞益欽若令典以為周兼夏殷文質大備漢有天下車書混一魏晉沿襲風流未逺竝宜立後以存繼絶之義有司可求其胄緒列聞為孔子立後詔先師尼父聖德在躬誕發天縱之資憲章文武之道命世膺期藴玆素王而頹山之歎忽踰於千祀盛德之美不存於百代永惟懿範宜有優崇可立孔子後為紹聖侯有司求其苗裔録以申上為前代帝王守陵墓詔前代帝王因時創業君民建國禮尊南面而厯運推移年世永久丘壟殘毁樵牧相趨塋兆堙蕪封樹莫辨興言淪滅有愴於懷自古已來帝王陵墓可給隨近十戸蠲其雜役以供守視為昔賢立祠詔旌表先哲式存饗祀所以優禮賢能顯彰遺愛朕永鑒前修尚想名德何嘗不興歎九原屬懷千載其自古已來賢人君子有能樹聲立德佐世匡時博利殊功有益於人者竝宜營立祠宇以時致祭墳壟之處不得侵踐有司量為條式稱朕意焉功臣襲封詔夫帝圖草創王業艱難咸仗股肱叶同心德用能拯厥頽運克膺大寶然後疇庸茂實開國承家誓以山河傳之不朽近代喪亂四海未一茅土妄假名實相乖厯玆永久莫能懲革皇運之初百度伊始猶循舊貫未暇改作今天下交泰文軌攸同宜率遵先典永垂大訓自今已後唯有功勲乃得賜封仍令子孫承襲勲官不得回授職事詔軍國異容文武殊用匡危拯難則霸德攸興化人成俗則王道斯貴時方撥亂屠販可以登朝世屬隆平經術然後升士豐都爰肇儒服無預于周行建武之朝功臣不參於吏職自三方未一四海交爭不遑文教唯尚武功設官分職罕以才授班朝治人乃由勲叙莫非拔足行陣出自勇夫斆學之道既所不習政事之方故亦無取是非暗於在已威福專於下吏貪冒貨賄不知紀極蠧政害民實由於此自今已後諸授勲官者竝不得回授文武職事庶遵彼更張取類於調瑟求諸名製不傷於美錦若吏部輒擬用者御史即宜糾彈舉賢詔天下之重非獨治所安帝王之功豈一士之畧自古明君哲后立政經邦何嘗不選賢與能收採幽滯周稱多士漢號得人常想前風載懷欽佇朕負扆夙興冕旒待旦引領巖谷寘以周行冀與羣才共康庶績而彚茅寂寞投竿罕至豈美璞韜采未値良工將介石在懷確乎難拔永鑒前哲憮然興歎凡厥在位譬諸股肱若濟巨川義同舟檝豈得保兹寵禄晦爾所知優游卒嵗甚非謂也祈大夫之舉善良史以為至公臧文仲之蔽賢尼父譏其竊位求諸往古非無褒貶宜思進善用匡寡薄夫孝弟有聞人倫之本德行敦厚立身之要或節義可稱或操履清潔所以激貪厲俗有裨風化强毅正直執憲不撓學業優敏文才美秀竝為廊廟之用實乃瑚璉之資才堪將畧則拔之以禦侮膂力驍壯則任之以爪牙爰及一藝可取亦宜採録衆善畢舉與時無棄以此求治庶幾非逺文武有職事者五品已上宜依令十科舉人有一於此不必求備朕當待以不次隨才升擢其見任九品已上官者不在舉送之限勵經術詔君民建國教學為先移風易俗必自兹始而言絶義乖多厯年代進德修業其道寖微漢採坑焚之餘不絶如線晉承板蕩之運掃地將盡自時厥後軍國多虞雖復黌宇時建示同愛禮函丈或陳殆為虚器遂使紆青拖紫非以學優製錦操刀類多牆面上陵下替綱維靡立雅缺道消實由於此朕纂承洪緒思𢎞大訓將欲尊師重道用闡厥繇講信修睦敦奬名教方今宇宙平一文軌攸同十步之内必有芳草四海之中豈無奇秀諸在家及見入學者若有篤志好古耽悦典墳學行優敏堪膺時務所在採訪具以名聞即當隨其器能擢以不次若研精經術未願進仕者可依其藝業深淺門䕃髙卑雖未升朝竝量準給禄庶夫恂恂善誘不日成器濟濟盈朝何逺之有其國子等學亦宜申明舊制教習生徒具為課試之法以盡砥礪之道巡省風俗詔昔者哲王之治天下也其在愛民乎既富而教家給人足故能風淳俗厚逺至邇安治定功成率由斯道朕嗣膺寶厯撫育黎獻夙夜戰兢若臨川谷雖則聿遵先緒弗敢失墜永言政術多有缺然況以四海之逺兆民之衆未獲親臨問其疾苦每慮幽仄莫舉寃屈不申一物失所乃傷和氣萬方有罪責在朕躬所以寤寐増歎而夕愓載懷者也今既布政惟始宜存寛大可分遣使人巡省方俗宣揚風化薦拔幽滯申達幽枉孝悌力田給以優復鰥寡孤獨不能自存者量加賑濟義夫節婦旌表門閭髙年之老加其版授竝依別條賜以粟帛篤疾之徒給侍丁者雖有侍養之名曽無賙贍之實明加檢校使得存養若有名行顯著操履修潔及學業才能一藝可取咸宜訪採將身入朝所在州縣以禮發遣其有蠧政害人不便於時者使還之日具録奏聞尚齒詔優德尚齒載之典訓尊事乞言義彰膠序鬻熊為師取非筋力方叔元老克壯其猷朕永言稽古用求至治是以厖睂黄髮更令收叙務簡秩優無虧藥膳庶等卧治佇其𢎞益今嵗耆老赴集者可於近郡處置年七十以上疾患沈滯不堪居職即給賜帛送還本郡其官至七品已上者量給廩以終厥身緝民詔設險守國著自前經重門禦暴事彰往䇿所以宅土寧邦禁邪固本而近代戰爭居人散逸田疇無伍郛郭不修遂使遊惰實繁冦􅜙未息今天下平一海内晏如宜令人悉城居田隨近給使强弱相容力役兼濟穿窬無所厝其姦宄萑蒲不得聚其逋逃有司具為事條務令得所教義詔武有七德先之以安民政有六本興之以教義髙麗髙元虧失藩禮將欲問罪遼左恢宣勝畧雖懷伐國仍事省方今往涿郡巡撫民俗其河北諸郡及山西山東年九十已上者版授太守八十者授縣令安集詔古者帝王觀風問俗皆所以憂勤兆庶安集遐荒自蕃夷内附未遑親撫山東經亂須加存䘏今欲安集河北巡省趙魏所司依式恤行役詔朕觀風燕裔問罪遼濱文武叶力爪牙思奮莫不執鋭勤王捨家從役罕蓄倉廩之資兼損播殖之務朕所以夕惕愀然慮其匱乏雖復素飽之衆情在忘私悦使之人宜從其厚諸行從一品以下佽飛募人以上家口郡縣宜數存問若有糧食乏少皆宜賑給或雖有田疇貧弱不能自耕種可於多丁富室勸課相助使夫居者有斂積之豐行役無顧後之慮達幽枉詔聽採輿頌謀及庶民故能審政刑之得失是知昧旦思治欲使幽枉必達彞倫有章而牧宰任稱朝委茍為徼幸以求考課虚立殿最不存治實綱紀於是弗理寃屈所以莫申闗河重阻無由自達朕故建立東京躬親存問今將巡歴淮海觀省風俗眷求讜言徒繁詞翰而鄉校之内闕爾無聞恇然夕惕用忘興寢其民下有知州縣官人政治苛刻侵害百姓背公徇私不便於民者宜聽詣朝堂封奏庶乎四聰以達天下無寃寛連坐詔罪不及嗣既𢎞至孝之道恩由義斷以勸事君之節故羊鮒從戮彌見叔向之誠季布立勲無預丁公之禍用能樹聲往代貽範將來朕虚已為政思遵舊典推心待物毎從寛政六位成象美厥含𢎞一𤯝掩德甚非謂也諸犯罪被戮之門朞已下親仍令合仕聽預宿衞近侍之官改博陵為髙陽郡詔博陵昔為定州地居衝要先皇歴試所基王化斯逺故以道冠豳風義髙姚邑朕巡撫氓庶爰届兹邦瞻望郊㕓緬懷敬止思所以宣播德澤覃被下人崇紀顯號式光令緒可改博陵為高陽郡赦境内死罪已下給復一年埋祭死亡軍士詔竭力王役致身戎事咸由徇義莫匪勤誠委命草澤棄骸原野興言念之每懷愍惻往年出車問罪將屆遼濵廟算勝畧具有進止而諒惛凶罔識成敗髙熲愎狠本無智謀臨三軍猶兒戲視人命如草芥不遵成規坐貽撓退遂令死亡者衆不及埋藏今宜遣使人分道收葬設祭於遼西郡立道場一所恩加泉壤庶彌窮魂之寃澤及枯骨用𢎞仁者之惠親征髙麗詔天地大德降繁霜於秋令聖哲至仁著甲兵於刑典故知造化之有肅殺義在無私帝王之用干戈蓋非獲已版泉丹浦莫匪龔行取亂覆昬咸由順動況乎甘野誓師夏開成大禹之業商郊問罪周發成文王之志永監前載屬當朕躬粤我有隋誕膺靈命兼三才而建極一六合而為家提封所漸細栁盤桃之外聲教爰暨紫舌黄枝之域逺至邇安㒺不和㑹功成治定於是乎在而髙麗小醜迷昬不恭崇聚勃碣之間薦食遼􅐮之境雖復漢魏誅戮巢窟暫傾亂離多阻種落還集萃川藪於往代播實繁以迄今􅔔彼華壤翦為夷類歴年永久惡稔既盈天道禍淫亡徴已兆亂常敗德非可勝圖掩慝懷姦惟日不足移告之嚴未嘗面受朝覲之禮莫肯躬親誘納亡叛不知紀極充斥邊陲亟勞烽候闗柝以之不靜生人為之廢業在昔薄伐已漏天網既緩前禽之戮未即後服之誅曽不懷恩飜為長惡乃兼契丹之黨䖍劉海戍習韎􅞘之服侵軼遼西又青丘之表咸修職貢碧海之濵同稟正朔遂復􅐁攘琛賮遏絶往來虐及弗辜誠而遇禍輶軒奉使爰暨海東旌節所次途經藩境而擁塞道路拒絶王人無事君之心豈為臣之禮此而可忍孰不可容且法令苛酷賦斂煩重强臣豪族咸執國鈞朋黨比周以之成俗賄貨如市寃枉莫申重以仍嵗災凶比屋饑饉兵戈不息徭役無期力竭轉輸身填溝壑百姓愁苦爰誰適從境内哀惶不勝其弊迴首面内各懷性命之圖黄髮稚齒咸興酷毒之歎省俗觀風爰屇幽朔弔人問罪無俟再駕於是親總六師用申九伐拯厥阽危協從天意殄兹逋穢克嗣先謨今宜授律啓行分麾屇路掩渤澥而雷震歴夫餘以電掃比戈按甲誓旅而後行三令五申必勝而後戰左第一軍可鏤方道第二軍可長岑道第三軍可海㝠道第四軍可蓋馬道第五軍可建安道第六軍可南蘇道第七軍可遼東道第八軍可𤣥菟道第九軍可扶餘道第十軍可朝鮮道第十一軍可沃沮道第十二軍可樂浪道右第一軍可黏蟬道第二軍可含資道第三軍可渾彌道第四軍可臨屯道第五軍可候城道第六軍可提奚道第七軍可踏頓道第八軍可肅慎道第九軍可碣石道第十軍可東暆道第十一軍可帶方道第十二軍可襄平道凡此衆軍先奉廟畧絡繹引途總集平壤莫非如豺如貔之勇百戰百勝之雄顧盼則山岳傾頹叱吒則風雲騰鬱心德攸同爪牙斯在朕躬馭元戎為其節度涉遼而東循海之右解倒懸於遐裔問疾苦於遺黎其外輕齎遊闕隨機赴響巻甲銜枚出其不意又滄海道軍舟艫千里髙颿電逝巨艦雲飛横斷沮江逕造平壤島嶼之望斯絶坎井之路已窮其餘被髮左衽之人控弦待發微盧彭濮之旅不謀同辭杖順臨逆人百其勇以此衆戰勢等摧枯然則王者之師義存止殺聖人之教必也勝殘天罰有罪本在元惡人之多僻脇從罔治若髙元泥首轅門自歸司冦即宜解縛焚櫬𢎞之以恩其餘臣人歸朝奉順咸加慰撫各安生業隨才任用無隔夷夏營壘所次務在整肅芻蕘有禁秋毫勿犯布以恩宥喻以禍福若其同惡相濟抗拒官軍國有常刑俾無遺類明加曉示稱朕意焉再伐髙麗詔黄帝五十二戰成湯二十七征方乃德施諸侯令行天下盧芳小盜漢祖尚且親征隗囂餘燼光武猶自登隴豈不欲除暴止戈勞而後逸者哉朕纂成寶業君臨天下日月所照風雨所沾孰非我臣獨隔聲教蕞爾髙麗僻居荒表鴟張狼噬侮慢不恭抄竊我邊陲侵軼我城鎮是以去嵗出軍問罪遼碣殪長蛇於𤣥菟戮封豕於襄平扶餘衆軍風馳電逝追奔逐北徑踰沮水滄海舟檝衝賊腹心焚其城郭汙其宫室髙元伏鑕泥首送款軍門尋請入朝歸罪司冦朕以許其改過乃詔班師而長惡不悛宴安鴆毒此而可忍孰不可容便可分命六師百道俱進朕當親執武節臨御諸軍秼馬丸都觀兵遼水順天誅於海外救窮民於倒懸征伐以正之明德以誅之止除元惡餘無所問若有識存亡之分悟安危之機翻然北首自求多福必其同惡相濟抗拒王師若火燎原刑兹無赦有司便宜宣布咸使聞知勞楊素手詔我有隋之御天下也于今二十有四年雖復外夷侵叛而内難不作修文偃武四海晏然朕以不天銜恤在疚號天叩地無所逮及朕本以藩王謬膺儲兩復以庸虚纂承洪業天下者先皇之天下也所以戰戰兢兢弗敢失墜況復神器之重生民之大哉賊諒苞藏禍心自幼而長羊質獸心假託名譽不奉國諱先圖叛逆違君父之命成莫大之罪誑惑良善委任奸回稱兵内侮毒流百姓私假署置擅用謀戮小加大少陵長民怨神怒衆叛親離為惡不同同歸於亂朕寡兄弟猶未忍及言是故開闗門而待冦戢干戈而不發朕聞之天生蒸民為之置君仰惟先㫖每以子民為念朕豈得枕伏苫廬顛而不救也大義滅親春秋髙義周旦乃誅二叔漢啟乃戮七藩義在兹乎事不獲已是以授公戎律問罪太原且逆子賊臣何代不有豈意今者近出家國所歎荼毒甫爾便及此事由朕不能和兄弟不能安蒼生德澤未𢎞兵戈先動賊亂者止一人塗炭者乃衆庶非惟寅畏天威亦乃孤負付囑薄德厚恥愧乎天下公乃先朝功臣勳庸克茂至如皇基草創百物惟便始匹馬歸朝誠識兼至汴部鄭州風巻秋籜荆南塞北若火燎原早建殊勳夙著誠節及獻替朝端具瞻惟允爰弼朕躬以濟時難昔周勃霍光無以加也賊乃竊據蒲州闗梁斷絶公以少擊衆指期平殄髙壁據􅕑抗拒官軍公以深謀出其不意霧廓雲除氷消瓦解長驅北邁直趣巢窟晉陽之南蟻徒數萬諒不量力欲猶舉斧公以稜威外討發憤於内忘身殉義親當矢石兵刃蹔交魚潰鳥散僵屍蔽野積甲若山諒遂守窮城以拒鈇鉞公董率驍勇四面攻圍使其欲戰不敢求走無路智力俱盡面縛軍門斬將搴旗伐叛柔服元惡既除東夏清晏嘉庸茂績於是乎在昔武安平趙淮隂定齊豈若公逺而不勞速而克捷者也朕殷憂諒闇不得親御六軍未能問道於上庠遂使劬勞於行陣言念於此無忘寢食公乃建異世之元勳執一心之確志古人有言曰疾風知勁草世亂有誠臣公得之矣方乃銘之常鼎豈止書勳竹帛哉功績克諧哽歎無已稍冷公如宜軍旅務殷殊當勞慮故遣公弟指宣往懷迷塞不次為楊素立碑詔夫銘功􅂜器紀德豐碑所以垂名迹於不朽樹風聲於沒世故楚景武公素茂績元勳劬勞王室竭盡誠節叶贊朕躬故以道邁三傑功參十亂未臻遐壽遽戢清徽春秋遞代方綿嵗祀式播雕篆用圖勳德可立碑宰隧以彰盛美手詔史祥昔嵗勞公問罪河朔賊爾日塞兩闗之路據倉阻河百姓脇從人亦衆矣公竭誠奮勇一舉尅定詩不云乎喪亂既平既安且寧非英才大畧其孰能與於此邪故聊示所懷亦何謝也褒樊子蓋詔子蓋為武威太守以善政聞大業三年入朝帝引之内殿特䝉褒美乃下詔設官之道必在用賢安人之術莫如善政龔汲振德化於前張杜垂清風於後共治天下實資良守子蓋幹局通敏操履清潔自剖符四服愛惠為先撫道有方寛猛得所處腴膏不潤其質酌貪泉豈渝其性故能治績克彰課最之首凡厥在位莫匪王臣若能人思奉職各展其効朕將冕旒垂拱何憂不治哉詔樊子蓋卿夙懷恭順深執誠心聞朕西巡欣然望幸丹款之至甚有可嘉宜保此純誠克終其美又褒樊子蓋詔車駕西巡子蓋獻青木香以禦霧露及帝還謂之曰人道公清定如此不子蓋謝曰臣安敢言清止是小心不敢納賄耳賜口味百餘斛又下詔導德齊禮寔惟共治懲惡勸善用明黜陟朕親巡河右觀省人風所歴郡縣訪採治績罕遵法度多蹈刑網而金紫光禄大夫武威太守樊子蓋執操清潔處涅不渝立身雅正臨人以簡威惠兼舉寛猛相資故能畏而望之不嚴斯治實字人之盛績有國之良臣宜加褒顯以𢎞奬勵可右光禄大夫太守如故賜縑千疋粟麥二千斛加蘇威開府儀同三司詔玉以潔潤丹紫莫能渝其質松表嵗寒霜雪莫能凋其采可謂温仁勁直性之然乎房公威器懷温裕識量𢎞雅早居端揆備悉國章先皇舊臣朝之宿齒棟梁社稷弼諧朕躬守文奉法卑身率禮昔漢之三桀輔惠帝者蕭何周之十亂佐成王者邵奭國之寶器其在得賢參燮台階具瞻斯允雖復事藉論道終期獻替銓衡時務朝寄為重可開府儀同三司餘竝如故以衞𤣥為光禄大夫詔近者妖氛充斥擾動闗河文昇率勵義勇應機響赴表裏奮擊摧破兇醜宐升榮命式𢎞賞典可右光禄大夫贈劉方上柱國盧國公詔方肅承廟畧恭行天討飲氷遄邁視險若夷摧鋒直指出其不意鯨鯢盡殪巢穴咸傾役不再勞肅清海外致身王事誠績可嘉可贈上柱國盧國公贈豆盧毓大將軍詔褒顯名節有國通規加等飾終抑推令典毓深識大義不顧姻親出於萬死首建奇䇿去逆歸順殉義亡身追加榮命宜優恒禮可贈大將軍封正義縣公賜帛二千疋諡曰愍改封豆盧毓雍丘侯詔故大將軍正義愍公毓臨節能固捐生殉國成為令典沒世不忘象賢無墜德隆必祀改封雍丘愍侯復以願師承襲追贈獨孤陁詔外氏衰禍獨孤陁不幸早世遷卜有期言念渭陽之情追懷傷切宜加禮命允備哀榮可贈正議大夫又舅氏之尊戚屬斯重而降年弗永凋落相繼緬惟先往宜崇徽秩復贈銀青光禄大夫責蘇威詔威立性朋黨好為異端懷挾詭道徼幸名利詆訶律令謗訕臺省昔嵗薄伐奉述先志凡預切問各盡胸臆而威不以開懷遂無對命啟沃之道其若是乎資敬之義何其甚薄徙衞王集滕王綸詔綸集以附萼之華猶子之重縻之好爵匪由德進正應與國升降休戚是同乃包藏妖禍誕縱邪僻在三之義愛敬俱淪急難之情孔懷頓滅公卿議既如此覽以澘然雖復王法無私恩從義斷但法隠公族禮有親親致之極辟情所未忍可除名為民逺徙邊郡優突厥詔突厥意利珍豆啟民可汗率領部落保附闗塞遵奉朝化思改戎俗頻入謁覲屢有陳請以氈牆毳幕事窮荒陋上棟下宇願同比屋誠心懇切朕之所重宜於萬壽戍置城造屋其帷帳牀褥已上隨事量給務從優厚稱朕意焉答議突厥改服詔突厥啟民表請乞依華夏服飾公卿請依所表帝以為不可乃下詔先王建國夷夏殊風君子教民不求變俗斷髪文身咸安其性旃裘卉服各尚所宜因而利之其道𢎞矣何必化諸削袵縻以長纓豈遂性之至理非包含之逺度衣服不同既辨要荒之叙庶類區別彌見天地之情賜啟民位侯王上詔德合天地覆載所以弗遺功格區㝢聲教所以咸洎至於梯山航海請受正朔襲冠解辮同彼臣民是故王㑹納貢義彰前冊呼韓入臣待以殊禮突厥意利珍寶啟民可汗志懷沈毅世修藩職往者挻身違難投足歸仁先朝嘉此款誠授以徽號資其甲兵之衆收其破滅之餘復祀於既亡之國繼絶於不存之地斯固施均亭育澤漸要荒者矣朕以薄德祗奉靈命思播逺猷光融令緒是以親巡朔野撫寧藩服啟民深委誠心入奉朝覲率其種落拜首軒墀言念丹款良足嘉尚宜隆榮數式優恒典可賜路車乘馬鼓吹幡旗贊拜不名位在諸侯王上與髙昌國王詔彰德嘉善聖哲所隆顯誠遂良典謨貽則光禄大夫弁國公高昌王伯雅識量經逺器懷温裕丹款夙著亮節遐宣本自諸華厯祚西壞昔因多難淪迫獯戎數窮毁冕翦為胡服自我皇隋平一宇宙化偃九圍德加四表伯雅踰沙忘阻奉賮來庭觀禮容于舊章慕威儀之盛典於是襲纓解辮削衽曳裾變夷從夏義光前載可賜衣冠之具仍班製造之式幷遣使人部領將送被以采章復見車服之美棄彼氈毳還為冠帶之國勅宣齊王勅帝拜栁謇之為齊王長史帝法服臨軒命齊王立朝堂之前遣牛𢎞等引謇之詣齊王所西面立宣勅謂王我昔階縁恩寵啟封晉陽出藩之初時年十二先帝立我於西朝堂乃令髙熲虞慶則元旻等從内送王子相於我于時誡我曰以汝幼冲未更世事今令子相作輔於汝事無大小皆可委之無得近昵小人疎逺子相若從我言者有益於社稷成立汝名行如有不用此言唯國及身敗無日矣吾受勅之後奉以周旋不敢失墜微子相之力吾無今日矣若與謇之從事一如子相也與栁謇之勅今以卿作輔於齊善思匡救之理副朕所望若齊王德業修備富貴自當鍾卿一門若有不善罪亦相及勅度四十九人法名皇帝勅皇帝敬問括州國清寺沙門智越法師等僧使智璪至得書具至懷天台福地實為勝境所以敬為智者建立伽藍法縁既深尊師義重欲使宗匠遺範奉而弗墜菩薩淨業久而彌親然則去聖久逺學徒陵替規求利養不斷俗縁滋味甘腴違犯戒律此乃増長罪垢豈謂福田師等離有為法求無上道棄俗諸漏鑑在雅懷由須奬訓末學𢎞修淨行俾夫法門等侣咸歸和合諸佛禁戒畢竟遵行又此寺嘉應事表先覺既理由㝠感即號國清寺幷有施物用申隨喜冬序甚寒道體清豫朕巡省風俗爰屆江都瞻望山川載深勞想故遣兼通事舍人盧政力往指此不多行道度人天下勅大業三年正月二十八日菩薩戒弟子皇帝總持稽首和南十方一切諸佛十方一切尊法十方一切賢聖僧竊以妙靈不測感報之理遂通因果相資機應之徒無爽是以初心爰發震動波旬之宫一念所臻咫尺道場之地雖則聚沙葢鮮實覆簣於耆山水滴已微乃濫觴於法海弟子階縁宿植嗣膺寶命臨御區宇寧濟蒼生而德化弗𢎞刑罰未止萬方有罪寔當憂責百姓不足用増塵累夙夜戰兢如臨淵谷是以歸心種覺必冀慈愍謹於率土之内建立勝縁州別請僧七日行道仍總度一千人出家以此功德竝為一切上及有頂下至無間蜎飛蠕動預稟識性無始惡業今生罪垢藉此善縁皆得清淨三塗黎獻六趣怨親同至菩提一時作佛璽書降來䕶兒璽書公旋師之時是朕勅公之日君臣意合逺同符契梟此元惡期在不遙勒名太常非公而誰也答突厥啟民璽書磧北未靜猶須征戰但使好心孝順何必改變衣服也檄遺陳尚書江總檄南北雖殊風雲在望載懷虚遲寤寐為勞獻嵗猶寒比當清豫匡贊乎國良亦慇勤寡人忝膺朝寄董律專征跋涉山川今次江際公等文儒目立器用適時冠蓋二世齒德兼重孔老殊教名墨異家金匱珠韜銀編玉策莫不騰於舌杪散在筆端邃古成敗之機近代安危之跡照同懸鏡明若觀火無待指南自應神悟猶恐思之未審差以毫釐聊煩翰墨畧申梗槩自穹昊生民樹之司牧羲軒以降書契可紀咸一姓承立四海無兩帝漢道云季三方鼎立時惟版蕩世匪休明當塗起而蜀亡典午興而吳滅永嘉喪亂紫宸曠主劉石苻姚之儔偽夏僭燕之醜妄塵大寶事乖圖籙魏室乘時兆基朔野經始嵩洛未暇江湖有周受命敵非齊氏務在兼幷不遑外畧蕞爾吳越自相君長竊擬王者之儀妄談天子之氣偷安假息緜歴世祀我大隋之肇開寶祚光有神州皇帝感曜魄之靈應太微之座千年啟聖萬代一時深仁至德寧濟羣品越海窮河東漸西被旄頭之屬歴代之霸作我臣民匍匐服裳惟彼江表獨隔皇風夫物極則反否終斯泰郭璞有云年經三百天下大同兹實𤣥運已定於前聖主膺期而出欲以區區之陳國違上天之㝠數其不可存者一也大必包小天地之常規明能通暗日月之常理論道德以唐陶而征有苗語衆寡舉海内而當羣小在長江舟檝之用矜其積習而山川共有我據上游鼓棹之能吳楚不異髙艫巨舫東西萬里扼喉撫背水陸千途彼之兵士不過十萬首尾分布所在危急加以屯戍邊方淹積嵗序風雨以為櫛沭蟣虱生於甲胄望我寛仁思倒戈㦸通在戎行更成敵國守以時月則魚爛土崩接以鋒刃則烏驚鹿走理在必然不假枚卜此不可存者二也豐侯好酒實喪厥邦梁伯役民潰其宗社彼之偽主覆車是襲日夜沈湎曽無節度繕造宫室莫知窮已竭四民之産荒縱其心斂百姓之哀以為已樂寶衣玉食填積後宫短褐麤饘不充編户一芥之善蔑爾無聞五子之歌宛然悉備雖欲勿喪其可得乎此不可存者三也偽主忌能䕶短酷法淫刑骨鯁之臣盡見疎斥諫諍之士皆被屠害遐邇結舌衣冠解體人妖鬼怪觸類呈災稚齒耆年咸知殘滅此不可存者四也以此小邦攝於大國邊烽夜動照彼都城戍鼓晨嚴震其宫殿累棊十二方此未危懸縷千鈞比斯非切而莫知憂恐更自驕矜曽無事大之心專行犯上之志侵軼我邊鄙招納我叛亡國家爰自受命每從含養敦以隣睦申其聘好冀能守彼宗祊靜其疆域而長惡益甚縱毒彌深吳㑹雄俊之人湘郢耿介之士乞師請命盈庭滿闕帝乃憫然矜彼黎獻授鉞推轂弔民伐罪已有別詔惟廢偽主之身自餘士庶普從肆𤯝向所陳説咸是格言非曰游談共相欺誤且劉叔納譙周之計而獲存孫皓用薛瑩之詞而致福此二子者終有良臣之譽皆無陷君之譏何則所恥者小所存者大若憲章往彦聿遵前軌則偽主享封侯之業祖禰延血食之期江東士民實受其賜公等身保榮貴名垂竹帛豈不美歟若膠柱不移守迷莫變率其蟻衆敢拒王師軍有常刑悔無及矣禍成俄頃宜早圖之使人今還遲有委曲言不盡意豈復多云楊廣白令與天台山衆令仁壽元年正月永嘉僧法曉生聞智者勝德特至龕所旋繞千拜一夕龕戸自開光照林木衆共瞻禮又張造者年邁足蹷登龕拜祝願得度脱忽聞龕中應聲及以彈指灌頂等啟聞皇太子與書僧使灌頂智璪至覽十一月三日書幷陳靈龕應迹顯形放光彈指流音應念傳響斯實不思議力變化多方感悟有縁示希有事慎終追逺感歎相深在昔雙林示滅非滅多寶獨塔俟時涌現爰在狼迹迦葉分身乃至鷲山迦文留影睂毫散彩指端震室豈非像教能度無邊是大因縁聞善知識永惟宿昔獲承師範德音盈耳神光在目方憑靈瑞係踵菩提肅承靈誥宣慰南服山衆法徒同志為友曽成等侣方共舟航嵗暮凝寒念皆道勝天台名嶽海岸所推修建大林多慙重閣三時設供四事不周想甘禪悦以同法喜其間敬德信次相聞今遣員外散騎侍郎張乾威送僧使還山于舊所設供庶同甘露能變麄澁亦憑香積證道融銷書不盡言反此無悉楊廣和南僧使灌頂等所領今施物目仁壽元年十二月十七日白石香爐一具幷香合一枚大銅鐘一口鵄納袈裟一領鵄納褊袒二領四十九尺幡七口黄裬裙一腰氈二百領絲布祗支二領小幡一百口和香二合胡桃一籠衣物三百段奈麨一合石鹽一合酥六鉼書遺史祥書煬帝初為晉王祥從擊突厥於靈武破之遷右衞將軍屯𢎞化備胡時帝在東宫遺祥書將軍總戎塞表胡虜清塵秣馬休兵猶事校獵足使李廣慙勇魏尚媿能冠彼二賢獨在吾子昔余濫舉推轂治兵振皇靈於塞外驅犬羊乎大漠于時同行軍旅契濶戎旃望龍城而衝冠盼狼居而發憤將軍英圖不世猛氣無前但物不遂心僶俛從事每一思此我勞如何將軍宿心素志早同膠漆久而敬之方成魚水近者陪隨鑾駕言旋上京本即述職南蕃宣條下國不悟皇鑒曲發備位少陽戰戰兢兢如臨氷谷至如建節邊境征伐四方褰帷作牧綏撫百姓上稟成規下盡臣節是所願也是所甘心仰慕前修庶得自效謬其入守神器元良萬國身輕負重何以克堪所望故人匡其不逮比監國多暇養疾閑宫厭北閤之端居罷南皮之馳射博望之苑既乏名賢飛蓋之園理乖終寔親朋逺矣琴書寂然想望吾賢疢如疾首遣延智顗書帝晉王時為揚州總管遣使奉迎師曰我與晉王深有緣契即束衣順流不日而至王請受菩薩戒顗謂王曰大王紆遵聖禁可名總持王贊顗曰大師傳佛法燈宜稱智者自後王諸書往來皆稱弟子總持稱師為智者金風御節玉露調時道體休和安樂行不法師抗志名山棲心慧定法門靜悦戒行熏修籍甚徽猷久承音德欽風已積味道為勞冀託舟航用披雲霧故遣使人往彼延屈希能輕舉以沃虚襟佇望來儀不乖眷意也弟子楊廣和南治禪衆寺答智顗書顗受戒既畢出居城外禪衆寺開皇十二年復還廬山深具謙挹之㫖但髙人游處觸地是安然法宇僧坊須盡嚴正經云四事供養一不可虧已勅有司修葺願忘懷受施也弟子楊廣和南法諱奉智者書弟子總持和南栁顧言還奉㫖垂示六種捨施及留受用弟子一日恭嚫猶以陋薄不稱宿心來㫖既以轉施功德彌為増上悲敬福田深是平等固非蔽識所能周見事事仰依其所留者既以不多願恒留受用故遣報諮謹和南參智者書弟子總持和南履長戒辰在俗咸慶伏惟吐納禪慧與時休和弟子稟受以來粗堪靜攝謹遣參承謹和南請留智者書開皇十一年十一月受晉王戒畢出居禪衆寺即欲西上王遣栁顧言致書請留待來年二月約至棲霞送别又宣口勅云智者為當長去更有還期弟子意不欲相去遼逺脱能旋迴不敢留停鎮下近山隨樂住止又欲奉留待二月十八日同度延陵鎮仍共至棲霞履行於彼送別十二年三月顗將啟行王復致書請就攝山安居度夏顗不許王命有司具裝發遣顗遂至止廬山弟子總持和南爰逮來誨須往荆楚辭致首尾仰具髙懷但祗稟淨戒事成甫爾宿昔凝滯匪遑諮決闍棃和尚經稱勝田種子雖投嘉苗木植方用心形永伸供養庶憑善誘日灑塵勞凡厥共縁依止有地斯亦舟航兼運利益𢎞多如來化導何必止還天竺菩薩應變本無定方深願坦然以虚受物遲延展禮面當諮遜謹和南重留智者書弟子總持和南逮㫖須取明二日垂別修復未周便深傾欷弟子前昨晝夜熟更惟忖智者至止以來未經一夏兼荆潭路逺安居將促江波浩蕩行程難期既去此處又不至前所半途結夏投止亦難又按經律一夏供養安居僧福田無量況乎師道及大衆力凡夫淺薄本資勝縁菩薩大慈須受應供暮春行謝首夏向臻九旬忽違四事虚棄修心與理於情匪安今欲仰留度夏發遣冀不半途飄落脱疑邑下喧湫須依林壑安居攝山亦當為便若法嵗將滿預勒蔣州裝船南出石頭西游彌易既乘爽節因得順風去留之宜事理咸㑹此間彼處仰聽擇一意不可盡辭豈多宣謹和南三月一日許智者行書弟子總持和南復逮今㫖欲遂前心功德因縁豈敢違忤謹遵宿願即命所司發遣發日離晨仰聽詳擇庶解夏非逺秋水乘流賜答來期必當無爽用兹歡喜蠲悲欷謹和南謝法門書弟子總持和南奉㫖今日齋竟即事登舟暌阻方遥彌以傾欷垂示法相雖文㫖淵蹟源本難尋而教門方便開悟易益恭承善誘永以受持庶藉津梁得無退轉自服膺至道每沾𢎞䕶將事遵途復降良藥沐浴慈被伏用悽荷謹和南遣使往匡山㕘書開皇十二年七月王遣書廬山參省八月顗往衡山營建功德十一月王遣書潭州奉迎十二月至荆州創立玉泉寺弟子總持和南親信傅仲詵還逮去月朔告用慰延結熱猶熾願道體休和仰承經過攝山鍾岫寺塔安善徒衆和肅仍留二十僧權停開善進至匡嶽結夏安居東林禪閣還為一寺峰頂精舍復皆隨喜敬縁勸發獲此熏修用耨身田方流法雨金光明福喜荷彌深弟子去月十四日始度朱方風土異宜流金在節攝衞多不調適每有劣然二十九日來石頭稍已平復自江浦違心馳情彭蠡以日為嵗無時暫忘願未解夏前預整裝束法嵗若滿即事西浮彼間酬願務令在促非但弟子蔽識希䕶周爰深恐禪慧學徒咸思鑽仰宣尼在陳致嘆自衞便歸屈道紆情事非為已今遣主簿王灌指往祗承幷貢別牒用忘存省敢畧繁辭謹和南七月一日鹽法衣六件一百斛米一百斛重遣匡山㕘書弟子總持和南東林山寺使至逮八月八日誨用慰馳結仰承已往衡山至當稍久法縁若竟願即沿流冀在歳隂必期展覲弟子渡江還去月初移新住多有造次未善安立來㫖勗以法事實用慙悚始於所居外援建立慧日道場安置照禪師以下江陵論法師亦已逺至於内援建立法雲道場安置潭州覺禪師以下即建深善輒以諮知仰承相次為營功德深荷扶助難用逺陳而發此至江州遂下請僧料云何能得相資前施鹽米其米迴入東林鹽以上路盈長之外乃可別營功德今山僧返路行用仰酬尋別遣使迎延願預整歸計江山遼夐豈盡誠曲謹和南十月十日答智顗述匡山寺書弟子總持和南垂誨述江州潯陽廬山東林寺峯頂寺須令弟子立為檀越主山嶺盤秀下屬江湖香爐層峰上虧雲日仙人之所戾止隠淪於焉不歸況乎慧逺法師勝依結構謝客梁元穿池重閣景師息心神應峰頂智者憩歴踵武前賢師嚴道尊實深隨喜所恨寡薄無益將來庶藉熏修方證常樂兼陳二寺偏近驛道行人往來頗成混雜須勅彼州令去公私使命不得停止即付所司依事頒下謹和南三月一日與匡山三寺書極暄法師道體何如衆内咸宜也雁門逺法師四依菩薩飜飛朔野棲息南山自斯以後名德相繼智者見令為寺檀越顧修寡薄非敢克當奬導既引良深隨喜敬德指此承問楊廣和南三月二十一日與峰頂寺書暮春暄和寺衆清勝禪悦法喜致足恬懷罏峰香氣烟霞共逺智者經託勝地為在總内令為檀越誠深隨喜更追厚愧善當敬勗楊廣和南三月二十一日與禪閣寺書春序將謝道體何如僧衆清善匡山佛事興自慧逺法師法師師於彌天道安安師於佛圖澄妙德相承莫之為最江東龍藏悉本雁門雁門上人創迹廬阜自梁及晉止有東林陳晩澆漓別生禪閣僧徒好異豈稱至和智者爰居還須合一想均願海更無異味行人將送過指此相聞楊廣和南三月二十一日入朝遣使㕘書弟子總持和南仰違移嵗馳誠載勞兼事入朝彌増延屬武闗雖阻荆近於吳是以暫停陜州遣使承接行人返命具奉覼縷非惟年尊疾動又以結夏安居理事相推固須停止弟子還鎮非久便願沿流仰㑹江都庶應旦夕將聖德果亦復差機因縁多端請不勞慮謹和南九月十日又弟子總持和南僧使智邃來奉五月二日誨用慰馳結仰承衡嶽功德圓滿便致荆巫履涉虧和深以傾悚弟子於江都入朝至陜闗眩瞀停岐陽腹内又不調適去月末還京輦如欲相承猶自羸薾未即祗覲望雲延願珍納行人今返辭豈宣具謹和南又顗遣智邃奉書上玉泉伽藍圖幷求南衡禪師碑因獻萬春樹皮袈裟王答書弟子總持和南奉㫖於荆州當陽縣境玉泉山陲為建造伽藍招提行道圖冩地形具以賜示伏以布金徧地買園建立奉置三尊永流萬代唱誦所不能讚算數所不能量孰意輕微頓䝉創造循復來㫖爽然失厝既事出神心理生望表無容違拒茍作形迹即具聞奏嘉號乃覃名符天冠道場聲滿恒沙世界福報仰歸遜辭難涉謹和南又弟子總持和南垂㫖令撰衡嶽禪師碑文郭有道之無愧辭髙德逾此陸士衡之披文相質弟子多慙既䝉奬成不無尅勵邯鄲絶妙深恐難工還鎮病瘳庶或勉强循覽行狀用難思議佛澄道安寧復過是謹和南又弟子總持和南垂賜萬春樹皮袈裟一縁述是梁武帝時外國惟獻四領今餘一而是建初烏瓊法師所披謹尋菩薩戒稱所著袈裟皆染使壞色況復自然嘉樹妙彩天成相應之言無勞外假萬春表長生之稱二翼合善譬之辭永服周旋恒充布薩常事半月豈惟元日著如來衣深荷慈奬謹和南又弟子總持和南率施別牒五彩旛錦香爐檀等十種示表微誠薄申法貺尠陋追悚謹和南五色四寸九尺旛二張五色斑羅經巾二枚絹五十疋錦香爐檀十張熏陸香二觔剃刀十口鵄納袈裟一領油鐵鉢十口雄黄七觔青須彌氈五領牒右遣使荆州迎書開皇十三年二月王入朝行次陜州遣書荆州迎顗弟子總持和南暄和道體勝愈仰揆衡嶽法事久當圓滿江陵功德復應成就隨喜之至難用勝言弟子今入朝覲行次陜州馳仰之誠與時而積故遣使人迎候希便進道來月下旬惟遲祗接路首悤促豈復委宣謹和南二月二十二日遣使潭州迎書弟子總持和南嵗聿云暮寒氣殊重禪悦經行願常安樂弟子頃來毎多勞疾但暌覲稍久惟用傾結仰度所營功德已當究竟今遣左親使伏達奉迎願便事沿流延遲諮具謹和南十二月初五日在京遣書弟子總持和南仰違已久馳係實深獻嵗非遥傾遲䖍禮暮春屆節當遣奉候謹和南九月二十四日在京重遣書弟子總持和南適逮近㫖用慰馳情春暄願道體康勝玉泉創立道場嚴整禪衆歸集靜慧日新隨喜之深難以辭諭弟子始服三石散竟調息勞心秋仲歸蕃請夏訖沿下在干拜覲差當匪奢其間珍德今遣統軍魯子譽往祗承謹和南從駕東岱於路遣書弟子總持和南仲秋轉冷仰惟道體康愈弟子即日粗可行未由䖍禮但増延結願珍德謹遣修承謹和南於路次書弟子總持和南寒氣漸嚴仰惟康愈動寂怡神興居安悦弟子陪奉鑾駕旅次長奉逺憑勝力行往安隠瞻言祇覲庶或匪遥願珍重此不宣具謹和南十月十九日還藩遣迎書開皇十五年春晉王久留京師將還鎮遣使奉迎顗乘流東下止揚州禪衆寺王奉書求學禪慧顗書答之後三日王復重請乃以所著淨名義疏初巻奉王弟子總持和南獻嵗春明仰惟道體勝豫禪悦法喜衆咸集業功歸有在悉由明導敬憶江東暫欲西上先到衡嶽用賽師恩次往渚宫以報生處䖍承此㫖衞送大江揚子臨流具申來請即䝉開許還至觀濤年來嵗往寒暑屢變恭聞功德圓滿逺難讚述弟子多幸生在佛家過庭所聞匪直詩禮轉輪斯奉實惟旦暮今者陪扈鑾駕􅋴發自京師言停洛陽又止歴下柴望之禮本自虞書巡㑹之聲盛於姬典至尊憲章先古允叶人神相風指南奉朝東岱以今月十一日吉辰宗事云畢於時天地載廓日月増華休氣神光燭近被逺靈芝競吐山谷連木竝秀宫壇瘖聾朦蹩之徒無毉而自愈扶老攜幼之侣不謀而同到臣子殫見事非虚飾一物得所萬里斯應師資至重敢不稍聞第率從便蕃即辭行所夾鐘將末必屆揚州今遣奉迎便願沿下餘春未盡必希拜覲其間珍德續復祗承謹和南正月二十日謝天冠仍請淨名義書總持和南前揆菩薩天冠率爾式之様深嫌不工即用呈簡爰逮今製思出神衿圖比目連妙逾郢匠開士五明此居其一金剛種智兹焉標萬是知因地化物不可思議接引隨方多能盡達冠尊于身端嚴稱首跪承頂戴覽鏡裵徊有飾陋容増華改觀弟子多幸謬稟師資無量刼來悉憑開悟色心無作觸仰勝縁度脱舟航何慮不果但戒為基趾信實行先保解毗尼昔年䖍受身雖疎漏心䕶明珠而定品禪枝屏散歸靜猥以凡薄荷國鎮蕃為子為臣難虧難怠豈藉四縁能入三昧此非臆㫁實荷誠説經稱非禪不智非智不禪定解相資能證無漏又電光㫁結其例甚多慧解脱人厥朋不少即日欲服膺智㫁率先名教永汎法流兼同治國未知底滯可開化不師嚴道尊可降意不宿世根淺可發萌不菩薩應機可逗時不若未堪敷化且暫息縁如可津梁便開祕藏書云民生在三事之如一況覃釋典而不從師今之慊言備瀝素款成就事重請棄飾辭謹和南六月二十一日重與智者請義書弟子總持和南仰逮還㫖猶秉謙尊循復久之怳如自失切以學貴承師事推物論厯求法縁厝心有在若習毗曇則滯有情著若修三論又入空過甚成實雖復兼舉猶帶小乘釋論地持但通一經之㫖如使次第徧修僧家尚難盡備況居俗而欲兼善當今數論法師無過此地但恨不因禪發多起闕心達者無違求那明偈仰惟厚習善根非一生得初乃由學俄逢聖境南嶽禪師親所記莂説法第一無以仰過照禪師來具述此事于時心喜已域寸誠智者昔入陳朝彼國明式瓦官大集衆論鋒起榮公强口先被折角兩瓊繼軌裁獲交綏忍師讚歎惟唱希有弟子仰延之始便事勝集屈登無畏釋難如流親所聽聞衆咸瞻仰適承前往荆楚講法華經舊學名僧莫不歸服故知非禪不智驗乎金口比聞名僧所説智者融㑹盡有階差譬若羣流歸乎大海此之包舉始得佛意弟子即日而不依請譬彼彌勒今當問誰惟願未得令得未度令度樂説無窮法施無盡復使顧言稽首䖍拜謹和南六月二十五日謝義疏書弟子總持和南逮㫖送初巻義疏跪承法寶粗覽綱宗悉檀内外耳未曾聞故知龍樹代佛不可思議今所著述肉眼未覩明闇謹復研尋遲比覲接謹和南論荆州諸寺書顗以荆州立玉泉及所修十住寺請王為檀越王即移書達荆州總管嘗令檢校復致書勸留顗後答書弟子總持和南荆州玉泉十住兩寺近既賜令檢校令須書及江陵總管當勒所由終聽僧使奢促弟子仰䝉淨戒宿世因縁稍希義理智波羅密爰降開許始制義疏方憑沃啓向入慧門昔年仰請棲霞時往觀行政為密邇朝發暮到應可諮決不異邑居行道本貴安心寧勞過逺天台之路幸願輟情屈已為人菩薩有賜于專契弗敢違前都不知淨人善心已墮僧數濟度無隔惟用隨喜謹和南七月二十七日復答智者書總持和南復垂誨㫖益具仁慈開士虚懷隨感必應本誓願力何患不果政言服道日淺未堪違逺深憑䕶念開示悟入玉泉十住天台本居仰由勝功能得建立方須影響永至金剛江陵書及㑹稽教下竝勅所司以時發遣謹和南七月二十九日與荆州總管達奚儒書智者禪師德尊望重近年紆道爰授淨戒今修治彼州十住寺造立西徂玉泉寺竝見請為檀越復聞公等多結勝縁大乘運通良深隨喜師今遣僧使志果法才二人還就玉泉寺法燦道慧法師十住寺道臻法師經理想加心影響奬成妙業公𢎞覃福幽顯同賴法事逺白不復暄涼也楊廣白八月二日迎智者入城礙雨移日書總持和南方要仰延雨乃暫阻明間若晴別當遣信謹和南七月二十六日次迎入城書總持和南霜寒道體康勝弟子還來甫爾未暇迎延馳誠已深今遣候接冀近祗覲謹和南九月十六日答智顗蔣州事書弟子總持和南爰逮髙㫖騰蔣州僧所及竊以僧居望刹食惟分衞所立精舍本依聚落近年奉詔專征弔民伐罪江東混一海内乂寧塔安其堵市不易業斯亦智者備所明見而亡殷頑民不慙懷土有苗恃險敢恣螳螂横使寺塔焚燒如比屋流散鐘梵輟響雞犬不聞廢寺同於火宅持鉢畧成空返僧衆無依實可傷歎彼地福盡方成丘墟所餘堂塔本不壊毁其有現僧亦許房住惟虚廊檐宇㑹當倒壓所以移來還充寺館其外椽版權借築城若空寺步廊有完全者亦貸為府廨須一二年間民力展息即於上江結筏以新酬故本勅所司具條孔目無慮零漏恐逺僧未能曲見頓用仰誣必願言提㝠諸其掌猥延滿軋戀側良深謹和南遣使入天台㕘書總持和南麥序氣清道體和適福慧莊嚴與時髙勝弟子至來未久麤復可行近頻降兩書爰垂示功德𤣥義刪削文句入初其舊維新從麄至妙㑹須披接方豁煙雲春律已謝夏坐方結敢違經教涉暑出迎白露宵團秋風葉下必預舟檝迎覲江陽然仰勞著述已涉數載般若多障近願成功日就月將庶方啓沃率貢別牒示表䖍誠在敬無文仰揆𢎞亮其間珍德續事音語謹和南納袈裟十領龍鬚席二闕須彌氊二領猫牛酥三缻熏陸香一合遣使入天台迎書總持和南霜氣已𦂳蚊熱久祛方恐洞􅀈預取調適今遣奉迎祗禮非奢謹和南九月二十二日遣使㕘病書開皇十七年王使入山迎顗行次石城乃稱有疾遣醫往治或請進藥及齋竝不聽總持和南仰承出天台已次到剡石城寺感患未歇菩薩示疾在疾亦愈但於翹誠交用悚灼今遣醫李膺往處治少得康損願徐進路遲禮覲無逺謹和南答智顗遺㫖書菩薩戒弟子總持稽首和南先師天台智者内弟子灌頂普明至奉去十七年十一月二十一日遺書七紙手迹四十六字幷淨名義疏三十一巻犀角如意蓮華香爐等跪對修讀摧振干心舍利儼然德音具在迦葉狼迹身證遥追曇光天台安禪近躡誠復如來雙林四部號慟而涅槃遺教法更殷重況乎五百嵗後四依拯溺深順佛㫖居世同凡將欲泥洹現希有事五品十信已自皎然彌陁觀音親來接引去德兹永乃増悲戀追悟今生還慶夙稟所恨淨名經疏不重親承由冀尋研用補咎悔追惟障惱現機未發逖聽前聞亦有成就非徒悟有淺深抑又時或早晚佛滅度後得聖巨多道躍他方㝠來曉示在思即世忽奉大師良由宿縁積曽親近愛覃來命必垂影響不捨本誓筆迹具存是用歸誠憑靈戒懇跪受經疏如意香爐䖍禮西方心口相誓手探巻軸最後殷勤即于今月十八日仍感瑞夢是知濟度已降舟航惟願即日在寶池遥開蓮華今居淨域近溉濁心世世生生師資不闕革凡登聖給侍無虧但義府鈎深遺文淵博雖加䇿駘終畏面牆特希溉以醍醐如出香乳照以暗井即顯真金然後仰藉神通俯勵精力別詢名僧奉揚法味普共含生作大利益斯則弗違提奬同登彼岸最勝最上就此為尊灌頂所送最後淨名義疏三十一巻至佛道品謹即裝治善書習讀逮㫖爾前𤣥義及入文解釋付弟子焚之即付還使遣對燒蕩犀角如意蓮華香爐逺以垂別輒當服之無斁永充法事今奉施甆瓦香爐供養龕室遺㫖以天台山下遇得一處非常之好垂為造寺始得開翦林木位置基階今遣司馬王𢎞創建伽藍一遵指畫寺須公額幷立嘉名亦不違㫖佛隴頭陁竝各仍舊使移荆州玉泉十僧守天台者今山内現前之衆多是渚宫之人已皆約勒不使張散豈直十僧而已所求廢寺水田以充基業亦勅王𢎞施肥田良地深䝉擁䕶當年別資給行送經一藏依法為先師別供養具鐘􅜖香等又施錢直且充日費鄮境靈塔吳内石像􅗄縣彌勒尊儀卧疾之處竝使裝飾亦不仰異荆州玉泉寺既是為造理當異餘道場其潭州大明寺荆州十住上明寺等先以敬許為檀越無容復乖今誨使製南嶽師碑即命開府學士栁顧言為序自撰銘頌所囑僧有罪治無罪平等切以湼槃羯磨經有誡文正論治國金光明品住持三寶弗敢墜失又令加修慈心撫育民庶犬馬識養人豈忘恩蓋聞外書為教仁尚恕物内典居宗大慈為首在文雖異諸理實同不有君子其能為國不有菩薩豈濟含生又以僧未貫籍許其出首適奉詔書㝠符來及見機而作所謂後天而奉天時糧運轉輸深闗軍國前已表聞所司未報終當方便必期諧果及承寄囑斯復能照他心前來仰答無違意㫖庶藉熏修福祐國家灌頂普明面引詢訪具述遺形宴坐宛若平生轉恨失時不重餐義味仰揆定力如須彌峙法臘云竟切願輿迎一到江陽還入禪衆道俗接足人神頂禮即當奉送復彼山龕庶藉瞻仰能開心目深願道力不孤所請雖厚恩申報具在願文而實宜加䕶實須酬仰二僧今反輕奉報書逺拜靈儀心載嗚咽謹和南開皇十八年正月廿二日智顗終後弔山衆書正月二十九日總持和南白諸行無常是生滅法諸佛及縁覺尚捨無常身大師智者移應遷神哀摧抽惱不能自勝念當戀慕追慟難忍永矣奈何當復奈何侍者灌頂普明二人賫送別書觀心論淨名疏犀角如意蓮華香爐幷智越法師一衆啓見對増哽德音若存即遣條流移神靈迹祥瑞炳著自述分明舍利全身于今安坐非證聲聞小果定入菩薩大位素聞得法華三昧方驗不退法輪面覩彌陁觀音大勢至以宿命智反照斯土四部弟子豈不努力自揆寡薄無以申報唯當敬依付囑不敢弭忘應建伽藍指畫區域須達引繩天宫即應至金剛際既有要道當建繕造一遵本意昔宣尼亡沒弟子守墓三年子貢之徒乃至六載況乎方置精舍永樹福基彼現前僧慎勿張散但使謀道何患無食期取來生西方非逺必若懈退寶池極遥今遣使人于佛隴峯頂䖍誠懴禮修福建齋具如願文畧伸鄙意二僧今返特此慰書楊廣白十一月五日遣使入天台設周忌書王遣典籖吳景賢入山以諱日設五百衆齋嵗序推移日月如逝智者遷化已將一周追深悲痛情不能已念慕感慟何堪自居今遣典籖吳景賢往彼設齋奉為亡日追福遲知一二楊廣和南開皇十八年賜釋慧覺書法師安善凉暑惟宜承栖遲龜山之域闡揚龍樹之㫖其義端雄辯獨演暢於稽隂談柄微言偏引汲於鏡水弟子欽風籍甚味道尤深今於城内建慧日道場延屈龍象大𢎞佛事盛轉法輪上人名稱普聞衆所知識今遣迎候遲能光拂也請釋灌頂書夏序炎赫道體休宜禪悦資神故多佳致近令慧自道場莊論二師講淨名經全用智者義疏判釋經文禪師既是大師髙足法門委寄今遣延屈必希霈然幷法華經疏隨使入京也佇遲來儀書不盡意召徐則書則東海剡人陳時隠天台山絶榖養性惟資松朮初在縉雲山太極真人徐君降之曰汝年出八十當為王者師然後得道也晉王廣鎮揚州知其名手書召之則謂門人曰吾今年八十一王來召我徐君之㫖信而有徴遂詣揚州夫道得衆玅法體自然包涵二儀混成萬物人能𢎞道道不虚行先生履德養空宗𤣥齊物深明義味曉達法門悦性冲𤣥怡神虚白餐松餌朮栖息煙霞望赤城而待風雲游玉堂而駕龍鳯雖復藏名台嶽猶且騰實江淮籍甚嘉猷有勞寤寐欽承素道久積虚襟側席幽人夢想巖穴霜風已冷海氣將寒偃息茂林道體休悆昔商山四皓輕舉漢庭淮南八公來儀藩邸古今雖異山谷不殊市朝之隠前賢已説導凡述聖非先生而誰故遣使人往彼延請想無勞束帛賁然來思不待蒲輪去彼空谷希能屈已佇望披雲徐則沒後下書徐則詣揚州晉王請受道法辭以時日不便其後夕中命侍者取香火如平常朝禮之儀至五更死支體柔弱如生停留數旬顔色不變王下書送還天台定葬時在道多見則徒步云得放還比至舊居取經書道法分遺弟子跨石梁去不知所之須臾柩至方知其靈化天台真隠東海徐先生虚確居宗冲𤣥成德齊物處外檢行安身草褐蒲衣餐松餌朮棲隠靈岳五十餘年卓矣仙才飄然勝氣千尋萬頃莫測其涯寡人欽承道風久餐德素頻遣使乎逺此延屈冀得䖍受上法式建良縁至止甫爾未淹旬日厭塵羽化反真靈府身體柔軟顔色不變經方所謂屍解地仙者哉誠復師禮未申而心許有在雖忘怛化猶愴于懷喪事所資隨須供給霓裳羽蓋既且騰雲空椁餘衣詎藉墳壟但杖舄猶存示同俗法宜遣使人送還天台定葬文寶臺經藏願文菩薩戒弟子楊廣和南仰惟如來應世聲教被物慇懃微密結集法藏帝釋輪王既被付囑菩薩聲聞得揚大化度脱無量以迄于今至尊拯溺百王混一四海平陳之日道俗無虧而東南愚民餘熸相煽爰受廟畧重清海濵役不勞師以時寧復深慮靈像尊經多同煨燼結鬘繩墨湮滅溝渠是以逺命衆軍隨方收聚未及朞月輕舟總至乃命學司依名次録幷延道場義府覃思澄明所由用意推比多得本類莊嚴修葺其舊惟新寳臺四藏將十萬軸因發𢎞誓永事流通仍書願文悉連巻後頻屬朝覲著功始畢今止寶臺正藏親躬受持其次藏已下則慧日法靈道場日嚴𢎞善靈刹此外京都寺塔諸方精舍而梵宫互有小大僧徒亦各衆寡竝隨經部多少斟酌分付授者既其懇至受者亦宜殷重長存法本逺布達磨必欲傳文來入寺冩勿使零落兩失無作前佛後佛諒同金口即教當教寧殊玉牒須彌山上衆聖共持金剛海底天龍盡䕶散在閻浮亦復如是追念繕冩之者厥誠至隆心手勤到何量功德捨撤淨財豈可稱計所資甘雨用沃焦芽能生是佛本是般若人能𢎞法非道𢎞人恕已深恩即是自為今陳此意乃似執著若不開警則不深固自行化他備在經律顧循菲識誠媿通方因果相推何殊眼見豈不知獨善且最勝無為第一樂内典法奧自闗衆僧何事區區横相負荷但慶憑宿植生長王宫謁陛趨庭朂存逺大出受藩寄每用祗兢非惟禮樂政刑一遵成㫖而舟航運出彌奉弗墜無容棄稷卨而同園綺變菩薩而作聲聞越用乖方既其不可篤信受付竊敢當仁然五種法師俱得六根清淨而如説修行涅槃最近徒守經律不依佛戒口便説空心滯於有無上醫王隨病逗藥開乳舍酥為方既異甜冷苦熱取療亦殊譬前後教門別赴機性根莖枝葉受潤終齊總㑹津梁無不入道猶如問孝問仁孔酬難別治身治國老意無乖殊途同歸一致百慮内外相融義同泯合何處有學毘曇而不成聖執黎耶即能悟真師子嚴鎧反貽毁於蠃目象足至底翻取誚於蜂房心同劒㦸諍踰水火經意論意都不如斯通經通論何因若此恐施甘露更成毒藥儻均味海則致醍醐聖御紺寶天飛金輪雲動納萬善於仁壽總一乘於普㑹開發含識濟度羣生今所傳經遍于宇内衆聖潛力必運他方共登菩提早證常樂則是弟子之伸順𢎞誓於無窮平等坦然通遣唱白達識體之念隨喜也誄泰孝王誄維開皇二十年六月二十日丁丑上柱國秦孝王薨于仁壽宫嗚呼哀哉八元八凱濟濟虞則周南召南赫赫周國於穆孝王紹彼明德天實喪予殱我剛克嗚呼哀哉如何上靈降此災否國喪宗臣家亡千里嗚呼哀哉爰初不豫冕旒視疾及至大漸停鑾駐驆親臨屬纊俯觀徹瑟哀動皇情痛深慈膝一辭明世千秋長幕如何綿綿終古仲秋卜宅將歸泉戸梁山之陽永寧后土嗚呼哀哉余寡兄弟愛篤彌深奄然零落痛體傷心嗚呼哀哉追悼無及永分古今神雖虚翳一作神靈雖翳徽聲靡替誄王德音貽千百世乃作誄曰皇隋啓運應天順民保兹七百靜彼四隣利建宗子藩屏懿親孝王惟允俾侯于秦爰自聖章天性誠愿色養烝烝孝立名建恭近於禮恥辱斯逺嘉之弗忘懼而無怨孝弟之至通於神明温温居德肅肅勵精恭敬表志退讓為情韡此棠棣敦斯鶺鴒仲稱令弟叔曰仁兄猗歟我弟好學無替九流日修三餘卒嵗琴臺夜開書帷晝閉聰敏若神雄辯無滯妙矣聲律明哉龜筮𤣥象風角於焉及睿允文允武多才多藝惟善惟樂為仁為惠天挺出羣英圖命世欽若孝王容止堂堂振鷺將集鳯雛斯翔人之領袖國之輝光輝光伊何肅肅翼翼義以處身仁以經國明燭縶符財成淵塞靖恭爾位好是正直令聞令望無反無側皇枝良幹日富英聲宣風作伯盤石維城東京舊都河南殷博惟我哲王行臺惟寞飛轡崤函褰帳伊洛德被汝墳仁行鞏亳西秦右地實賴英雄寔惟王化一作匪他乃即龜䝉惠和布澤易俗移風亹亹孝王仁而能㫁德敷大國有符公旦移鎮樊征述職江漢地接冦讐稜威靖難文德招逺懷勞伐叛蹔輟外藩入侍天軒典兹戎衞仍居納言寶劒横曜豐貂尤温周衞清切敷奏便繁獻替惟允禁旅斯敦偽陳不恭軼我炎鄙王赫斯振將清江涘圖斯元帥難全其備唯我孝王膺兹無愧恭行天討受脤建旗申威鄂渚鞠旅江湄軍容﨣﨣逋醜禗禗一作纍纍雲陳不布髙城靡持泥首銜璧請命于台兵不血刃野無横屍善戰不陣我弟于兹金陵戡定飲至京師廣陵淮海一都之㑹牧彼頑民作相于外時雨隨車棠隂逐蓋惟晉太原寄隆望大表裏山河要衝襟帶東自楊越迴旌轉斾善政亷平於斯為最胡虜畏威氓黎荷賴烽火戎馬俱清邊界寒暑失御榮衞弗開言旋京邸去彼叢臺扈駕仁壽撫席巖隈連綿藥餌嵗去年來秀而不實禍極生災天胡不弔木壞山頽嗚呼哀哉至尊廢朝而悼傷皇后輟膳而摧痛甚秦國之永辭劇梁武之長送昆弟哀哀而日嗟僚友嗷嗷而悲慟嗚呼哀哉歎日月之不居何卜逺之詎促旌旐飄颻而從風笳管酸嘶而響谷服馬顧而不能行挽夫悲而不成曲霜霰落兮山谷寒木葉下兮丘壟殘風颼飀而吟樹泉幽咽而悲湍離羣之獸絶跡孤飛之鳥悲酸背離宫而東轉厯山邸而北度去甲第之樓臺即荒田之丘墓昔時鳴鑾而戒途今日靈輀而啓路臨朝謁之平衢永絶兹之一步儻若神而有靈幾悲傷而留顧嗚呼哀哉去永日之昭昭襲長夜之悠悠苦𤣥扄而無曉悲黄泉而永幽湮盛年於萬古徂壯志於千秋嗚呼哀哉慟反哭於秋季悲復歸於故地伊形遊而不遷何魂焭之空志嗚呼哀哉酒罇浮塵兮獨滿琴絃含風兮自斷㝠夜久其何期焉知嵗月之長短孝王與我體密情親孔懷之篤有踰常倫昊天何酷哀哉哲人奈何吾弟先我長淪煩寃痛毒悲恨何陳嗚呼哀哉痛母弟之同胞棄共被之寒郊豈止三荆之變色非惟四鳥之分巢遽一朝而云逝曷何去而何止形未捨目言猶在耳彼蒼者天子何甚矣嬛嬛一作惸惸友于哀哀吾子痛當奈何痛當何已想髣髴而不見猶盤桓而佇立空撫膺而莫追抑飲淚而何及嗚呼哀哉嗟地久而天長終淪彼乎幽方徒春華而秋落不復見我弟兮孝王何謝安之蔬食豈子路之喪亡獨端憂而誰告徒哽塞而追傷悲莫悲兮長别痛莫痛兮終絶因悽愴以寫情慟人琴而永訣嗚呼哀哉疏受菩薩戒疏使持節上柱國太尉揚州總管諸軍事揚州刺史晉王弟子楊廣稽首奉請十方三世諸佛本師釋迦如來當降此土補處彌勒一切尊經無量法寶初心以上金剛以降諸尊大權摩訶薩埵辟支縁覺獨脱明悟二十七賢聖他心道眼乃至三有最頂十八梵王六欲天子帝釋天主四天大王天仙龍神蜚騰隠顯任持世界作大利益守塔衞法防身䕶命䕶淨戒無量善神咸願一念之頃承佛神力俱㑹道場證明弟子誓願攝受弟子功德竊以識暗萌興即如來性無明俯墜本有未彰理數斯歸物極則反欲顯當果必積于因是調御世雄備厯生死草木為籌不可勝計恒沙集起固難思議深染塵勞方能厭離法王啟運本化菩薩譬如日出先照髙山隨逗根宜權為方便如彼衆流咸宗大海弟子基承積善生在皇家庭訓早趨貽教夙漸福理攸鍾妙機須悟恥崎嶇於小逕希優游於大乘笑止息於化城誓舟航於彼岸但開士萬行戒善為先菩薩十受專持最上喻造宫室必因基址徒架虚空終不成立弗揆庸懜抑又聞之孔老釋門咸資鎔鑄不有軌儀吾將安仰誠復釋迦能仁本為和尚文殊師利㝠作闍黎而必藉人師顯傳聖授自近之逺感而遂通薩陁波崘罄髓於無竭善財童子忘身於法界經有明文敢為臆説深信佛語聿遵明導天台智顗禪師佛法龍象童真出家戒珠圓淨年將耳順定水淵澄因靜發慧安無礙辨先物後已謙挹盛風名稱普聞衆所知識弟子所以䖍誠遥注命檝逺延每畏縁差値諸留難亦既至止心路豁然及披雲霧即銷煩惱謹以今開皇十一年十一月二十三日總管金城設千僧蔬飯敬屈禪師受菩薩戒戒名為孝亦名制止方便智度歸親奉極以此勝福奉資至尊皇后作大莊嚴同如來慈普諸佛愛等視四生猶如一子弟子即日種羅瞻業生生世世還生佛家如日月燈明之八王子如大通智勝十六沙彌眷屬因縁法成等侣俱出有流到無為地平均六度恬和四等衆生無盡度脱不窮結僧那於始心終大悲以赴難博逺如法界究竟若虚空具足成就皆滿願海楊廣和南天台建功德發願疏菩薩戒弟子總持和南十方三世諸佛一切尊法三乘聖衆上界天僊龍神他心道眼䕶持應硯畟塞虚空無量幽顯切聞諸佛菩薩不捨本誓為天人師拔濟含識次令和南闍黎代作宗範引接後來與佛無異資敬之重具在經律不有明導豈濟苦海匪報厚德豈收福田遺行可追謹依佛語菩薩戒先師天台智者來踰剡嶺遷化石城初開訊至哀情摧勔敬惟勝行逾滿熙連佛許臨終自説所得今開侍者所書巨有異相稱吾位居五品弟子事在法華十住信心文具瓔珞於是空聲異響徧滿山房索披大衣云觀音來至驗知入決定聚面覩彌陀靜攝遷神安坐身證久移晦朔容相儼然斯蓋無量刦來檀慧具足深䕶佛法發起羣生非無顯晦出沒其孰能於此歟有始有終者其惟聖人乎設以辯才千萬偈讚師福慧終不能盡夏初遣信到山期法嵗竟迎接僧臘既滿尚疑谿谷毒厲意取氣交霜雪杯度鏡水及届剡下便承卧疴豈言信次騰神淨域遂不獲重音容再諮法味維摩義疏藴而莫宣良由宿障根深致違心契已悔於前須補於後近於此州禪衆舊居雖仰為設㑹幷就天台指畫之地則造寺塔而於彼山頭陀之處未獲重修今夤覽別書囑寄佛法不思議事感歎銘衿無已之誠今遣往於佛隴峯頂集衆結齋願承三寶之力速達西方智者證知淨土記莂生生世世長為大師弟子未得佛前早相度脱不棄縁感𢎞到菩提幷乞衆力為弟子懴悔自從無明住地以來至于今日恒沙惑障煩惱迷昏五蓋十纒輪迥界内八萬四千塵勞増長願憑積慶及兹功德衆罪霜露慧日消除衆善普㑹法雨洋溢神通道力照藹皇家寶祚靈長覃被億兆開皇十八年正月二十九日敬靈龕疏維隋仁壽元年嵗次辛酉十二月十七日庚寅菩薩戒弟子皇太子總持和南敬告天台山寺先師智者全身舍利靈龕之座粵竊聞民生在三事之如一皆資聖範能遂賢功顔回不値宣尼豈隣殆庶尹喜不逢老氏安致長齡況乎乘般若之舟望菩提之岸弗有明導豈至寶所復因信俱次法城所謂自利利他人我兼利師及弟子智斷具足抑又聞曰疎傳告老太子贈以黄金桓師退辭家庭陳於喪服斯竝有為方内少用報恩豈臻無際空表盡酬師力弟子宿植德本早承道教身戒心慧䝉瑩明珠旱穗寒茭盡沾甘露雖復時流嵗永生滅不追行住坐卧服膺如在爰以景昧謬齒元良守器非才昇離多懼復奉明詔曩經作伯暫輟監撫還省宸方瞻望天台有如地踊僧使續來龕瑞重疊多寶妙塔如意分身玉毫金光分宵破暗應念彈指自室空聲有一於此已稱靈顯四者難幷豈非希有自曇光坐滅之後道猷身證以來興公飛錫所不能稱靈運山居未有斯事盛矣哉是我大師證道之基趾也至矣哉是我良田之報嵗也詩云無言不酬無德不報經稱知恩報恩諸佛皆爾近嵗雖遵誡約修搆祗洹多慚布金止因山宇庶同心淨域勝土莊嚴幸僧衆無虧熏修不缺㝠力深扶人功多愧今遣員外散騎侍郎兼通事舍人張乾威送僧使灌頂等還山於寺設㑹稽首接足十方三世一切三寶無量幽顯現前大衆以此功德仰資先師智者早證正覺具如臨終證現以生安養頃來留瑞久現彌陀踵武觀音連衡大勢回眸東視不捨娑婆轉睇南閻彌憐震旦滄溟巨海尚不讓於涓流嵩華峻極安荀排於微􅅽敢陳薄供願垂攝受當使無邊法身盡承甘露無量化影咸進醍醐涅盤餐之不可窮般若味之不可竭盡我念力遵我師道消我煩惱滿我誓願現在未來長慧提拔家國眷屬俱入大乘密往潛來恒垂影響塵勞障累消除隠塞究竟等虚空圓滿如法界斯則大師勝力諸佛荷擔弟子含慈出如來藏無離文字以求解脱文字之性即解脱也不着世間如蓮華常善入於空寂行達諸法相無罣礙稽首如空不可依設齋願疏菩薩戒弟子皇太子總持和南十方三世法佛報佛應佛法身應身化身諸佛所師所謂法也以法常故諸佛亦常佛常法常比丘僧常世間皆空而實不空諸佛妙有而實不有不有而有不空而空至寂恬然始名至樂凡情弊報皆生極苦迷之者則生盲皓首得之者則罔象𤣥珠弟子幸憑勝縁微因宿種方便智度生在佛家至尊皇后慈仁胎教有八王子日月燈明之恩十六沙彌大通智勝之勗加以昔莅淮海欽尚釋門先師天台智者顗禪師膺請江都授菩薩戒由是開悟歸憑有在而夢楹託諷梁木先頽合掌安禪端坐示滅于今數載儼然若思適現儀形續放光燄彈指之聲震于龕室僧使報述遐邇聳踊皆由佛法僧力感應相闗汲引含靈故現斯瑞肅奉明詔暫輟監國巡慰淮揚銜龥毗黎思報佛恩少酬師道以今大隋仁壽元年嵗次辛酉十二月十七日謹遣員外散騎侍郎通事舍人張乾威到天台山寺敬設蔬飯雖調八水多漸百味庶同純陀之末供有如淨名之遥請色香細軟偏滿十方歡喜甘餐寧唯百億天僊龍神竝希雲布任持世界盡望星羅以智者之分身納師資之攝受經稱信為能入智為能度願消甘露咸濟苦海應變穢土通同淨國天覆地載長轉金輪七廟六宗永安玉座本支百世紹隆萬紀男女緇素皆染大乘水陸空行咸知佛性須彌入於芥子未足成難食頃猶如巨刦曷以為怪井蛙不識江海蚊睫安知鵬翼以我今懴竝乞氷消以我今誠皆入願海發菩提心徧在諸物菩提心者即是佛心下度衆生上求佛果不可以身得不可以心得以無所得即菩提心無所得即是得無所得稽首歸命十方三寶樂府飲馬長城窟行示從征羣臣以下五言肅肅秋風起悠悠行萬里萬里何所行横漠築長城豈台小子智先聖之所營樹兹萬世䇿安此億兆生詎敢憚焦思髙枕於上京兩河秉武節千里捲戎旌山川互出沒原野窮超忽摐金止行陣鳴鼓興士卒千乘萬騎動飲馬長城窟秋昏塞外雲霧暗闗山月縁巖驛馬上乘空烟火發借問長城候單于入朝謁濁氣靜天山晨光照髙闕釋兵仍振旅要荒事方舉飲至告言旋功歸清廟前白馬篇文苑英華作煬帝樂府作孔稚圭案詩中多叙征遼之事當以英華為正稚圭別有二篇白馬金貝裝横行遼水傍問是誰家子宿衞羽林郎文犀六屬鎧寶劒七星光山虚弓響徹地迥角聲長宛河推勇氣隴蜀擅威强輪臺受降虜髙闕剪名王射熊入飛觀校獵下長楊英名欺衞霍智䇿蔑平良島夷時失禮卉服犯邊疆徴兵集薊北輕騎出漁陽進軍隨日暈挑戰逐星芒陣移龍勢動營開虎翼張衝冠入死地攘臂越金湯塵飛戰鼓急風交征斾揚轉鬭平華地追奔掃鬼方本持身許國況復武功彰㑹令千載後流譽滿旂常步虚詞二首洞府凝𤣥液靈山體自然俯臨滄海島回出大羅天八行分寳樹十文散芳蓮懸居燭日月天步役風烟躡記書金簡乘空誦玉篇冠法二儀立珮帶五星連瓊軒觶甘露瑜井挹膏泉南巢息雲馬東海戲桑田回旗遊八極飛輪入九𤣥髙蹈虚無外天地乃齊年總轡行無極相推凌太虚翠霞承鳯輦碧霧翼龍輿輕舉金臺上髙㑹玉林墟朝遊度圓海夕宴下方諸春江花月夜二首晉書樂志曰春江花月夜玉樹後庭花幷陳後主所作後主常與宫中女學士及朝臣相和為詩太常令何胥又善文詠採其尤艶麗者以為此曲暮江平不動春花滿正開流波將月去潮水帶玉臺作共星來夜露含花氣春潭瀁月暉漢水逢遊女湘川値兩妃錦石擣流黄二首漢使出燕然愁閨夜不眠易製殘燈下鳴砧秋月前今夜長城下雲昏月應暗誰見倡樓前心悲不成􅋵喜春遊歌二首禁苑百花新佳期遊上春輕身趙皇后歌曲李夫人步緩知無力臉曼動餘嬌錦袖淮南舞寶袜楚宫腰江都宫樂歌以下七言揚州舊處可淹留臺榭髙明復好遊風亭芳樹迎早夏長臯麥隴送餘秋渌潭桂檝浮青雀果下金鞍躍紫騮緑觴素蟻流霞飲長袖清歌樂戲泛龍舟唐書樂志曰泛龍舟隋煬帝江都宫作舳驢千里泛歸舟言旋舊鎮下揚州借問揚州在何處淮南江北海西頭六轡聊停御百丈暫罷開山歌棹謳詎似江東掌間地獨自稱言鑑裏遊四時白紵歌二首東宫春洛陽城邊朝日暉天淵池前春燕歸含露桃花開未飛臨風楊栁自依依小苑花紅洛水緑清歌宛轉繁絃促長袖逶迤動珠玉千年萬嵗陽春曲江都夏黄梅雨細麥秋輕楓樹蕭蕭江水平飛樓綺觀軒若驚花簟羅幃當夜清菱潭落日雙鳧舫緑水紅妝兩搖􅃞還似扶桑碧海上誰一作詎肯空歌採蓮唱紀遼東二首襍言隋書曰大業八年煬帝伐高麗度遼水大戰於東岸擊賊破之進圍遼東遼東海北剪長鯨風雲萬里清方當銷鋒散馬牛旋師宴鎬京前歌後舞振軍威飲至解戎衣判不徒行萬里去空道五原歸秉旄仗節定遼東俘馘變夷風清歌凱捷九都水歸宴雒陽宫策功行賞不淹留全軍藉智謀詎似南宫複道上先封雍齒侯詩冬至乾陽殿受朝北陸𤣥冬盛南至晷漏長端拱朝萬國守文繼百王至德慙日用治道愧時康新邑建嵩岳雙闕臨洛陽圭景正八表道路均四方碧空霜華淨朱庭皎日光纓珮既濟濟鐘鼓何鍠鍠文㦸翊髙殿采眊分修廊元首乏明哲股肱貴惟良舟檝行有寄庶此王化昌雲中受突厥主朝宴席賦鹿塞鴻旗駐龍庭翠輦回氊帷望風舉穹廬向日開呼韓頓顙至屠耆接踵來索辮擎羶肉韋韝獻酒杯如何漢天子空上單于臺宴東堂雨罷春光潤日落暝霞暉海榴舒欲盡山櫻開未飛清音出歌扇浮香飄一作颺舞衣翠帳全臨戸金屏半隠扉風花意無極芳樹曉禽歸賜史祥北史曰煬帝即位漢王作亂遣其將綦母良自釜口徇黎陽塞自馬津余公理自太行下河内帝以祥為行軍總管軍于河隂公理屯兵河陽城内以備祥祥簡精鋭于下流潜度擊公理大破之東趣黎陽綦毋良棄軍走其衆大潰進位上大將軍轉太僕卿帝賜祥詩伯煚朝繼重夏侯親遇深貴耳唯聞古賤目詎知今早􅀈勁草質久有背淮心掃逆黎山外振旅河之隂功已書王府留情太僕箴賜牛𢎞北史曰煬帝在東宫數有詩書遺𢎞𢎞亦有答及嗣位賜𢎞詩云云其同被賜詩者至于文辭贊揚無如𢎞美晉家山吏部魏代盧尚書莫言先哲異奇才並佐予學行敦時俗道素乃冲虚納言雲閣上禮儀皇運初彞倫欣有序垂拱事端居賜諸葛穎隋書本傳曰煬帝即位遷穎著作郎甚見親侍帝嘗賜穎詩其卒章曰參翰長洲苑侍講肅成門名理窮研覈英華恣討論實録資平允傳芳導後昆早渡淮平淮既淼淼曉霧復霏霏淮甸未分色泱漭共晨暉晴霞轉孤嶼錦帆出長圻潮魚時躍浪沙禽鳴欲飛會待髙秋晚愁因逝水歸臨渭源西征乃屆此山路亦悠悠地幹紀靈異同穴吐洪流濫觴何足擬浮槎難可儔驚波鳴澗石澄岸㵼巖樓滔滔下狄縣淼淼肆神州長林嘯白獸雲徑想青牛風歸花葉散日舉烟霧收直為求人隠非窮轍迹遊還京師東都禮儀舉西京冠葢歸是月春之季花栁相依依雲蹕清馳道雕輦御晨暉嘹亮鐃笳奏葳蕤旌斾飛後乘趨文雅前驅厲武威捨舟登陸示慧日道場玉清𤣥壇德衆天淨宿雲巻日舉長川旦䬃灑林花落逶迤風栁散孤鶴近追羣啼鶯逺相喚蓮舟水處盡畫輪途始半江滻各自遥東西竝興歎已熏禪慧力復藉金丹捍有異三川遊曽非四門觀於焉履玅道超然登彼岸謁方山靈巖寺梵宫既隠隠靈岫亦沈沈平郊送晚日髙峰落逺隂迴旛飛曙嶺疎鐘響晝林蟬鳴秋氣近泉吐石溪深抗迹禪枝地發念菩提心月夜觀星團團素月凈翛翛夕景清谷泉驚暗石松風動夜聲披衣出荆戸躡履步山楹欣覩明堂亮喜見泰階平觜參猶可識牛女尚分明更移斗柄轉夜久天河横徘徊不能寐參差幾種情季秋觀海孟軻叙遊聖枚乘説瘉疾逖聽乃前聞臨深驗兹日浮天迥無岸含靈固非一委輸百谷歸朝宗萬川溢分城一作空碧霧晴連洲彩雲密欣同夫子觀深愧𤣥虚筆望海碧海雖欣矚金臺空有聞逺水翻如岸遥山倒似雲斷濤還共合連浪或時分馴鷗舊可狎卉木足為羣方知小姑射誰復語臨汾詠鷹遷朔欲之衡忽投罻羅裏既以羈華絆仍持獻君子青骹固絶儔素羽誠難擬深目表兹稱闊臆斯為美驚獸不及奔猜禽無暇起雖䝉韝上榮無復凌雲志獻嵗讌宫臣三元建上京六佾宴吳城朱庭容衞肅青天春氣明朝光動劒綵長階分珮聲酒䦨鐘磬息欣觀禮樂成正月十五日于通衢建燈夜升南樓法輪天上轉梵語天上來燈樹千光照花燄七枝開月影凝流水春風含夜梅旛動黄金地鐘發琉璃臺晚春洛陽春稍晚四望滿春暉楊葉行將暗桃花落未稀窺簷燕爭入穿林鳥亂飛唯當闗塞者溽露方霑衣悲秋故年秋始去今年秋復來露濃山氣冷風急蟬聲哀鳥擊初移樹魚寒欲隠苔斷霧時通日殘雲尚作雷冬夜不覺嵗將盡已復入長安月影含氷凍風聲凄夜寒江海波濤壯崤潼坂險難無因寄飛翼徒欲動和鑾夏日臨江夏潭䕃修竹髙岸坐長楓日落滄江靜雲散逺山空鷺飛林外白蓮開水上紅逍遥有餘興悵望情不終北鄉古松樹古松惟一樹森竦詎成林獨留麈尾影猶横偃葢隂雲來聚雲色風度雜風音孤生小庭裏尚表嵗寒心賜守宫女隋遺録曰帝將幸江都東都宫女半不隨駕泣留帝言遼東小國不足煩大駕願擇將征之帝意不回因戲飛帛題二十字賜守宫女我夢江都好征遼亦偶然但存顔色在離別只今拾遺作經年持檝篇賜吳絳仙帝幸江都至汴帝御龍舟蕭妃乘鳯舸毎舟擇妙麗女子千人執雕板鏤金檝號殿脚女中吳絳仙者柔麗不與羣輩齒因有寵於帝帝每倚簾視絳仙移時不去因吟持檝篇賜之舊曲歌桃葉新妝艶落梅將身倚輕檝知是渡江來贈張麗華帝昏湎往往為妖祟所惑嘗遊吳公宅雞臺與陳後主相遇後主侍女數十許中一人迥美帝屢目之後主云此即麗華也帝與後主復詩十數篇麗華求帝一章帝操觚麗華捧侍頳然不懌見面無多事聞名爾許時坐來生百媚實個好相知此或偽筆憶韓俊娥二首帝在廣陵侍兒韓俊娥尤得帝意蕭妃誣罪去之帝不能止暇日登迷樓憶之題東南二柱黯黯愁侵骨綿綿病欲成須知潘岳髩强半為多情不信長相憶絲從鬢裏生閒來倚樓立相望幾含情幸江都作隋書五行志曰煬帝自京師如東都至長樂宫飲酒大醉因賦五言詩其卒章曰徒有歸飛心無復因風力令美人再三吟咏帝泣下霑襟侍御者莫不欷歔帝因幸江都復作五言詩云云帝以三月被弑即遭春之應也是年盗賊蜂起道路隔絶帝遂無還心復夢二豎子歌曰去亦死住亦死未若乘船渡江水由是築宫丹陽將居焉功未就而被弑求歸不得去真成遭個春鳥聲爭勸酒梅花笑殺人嘲羅羅以下七言帝常醉遊諸宫偶戯宫婢羅羅者羅羅畏蕭妃不敢迎帝帝嘲之個人無賴是横波黛染隆顱簇小蛾幸好留儂伴成夢不留儂住意如何鳯䑵歌廣五行志曰隋煬帝三月三日江上作鳯䑵歌乃唐興之兆三月三日向江頭正見鯉魚波上游意欲垂鈎往撩取恐是蛟龍還復休迷樓歌帝再幸江都有迷樓宫人夜歌帝披衣起聽召問之云孰使汝歌也女自為之邪宫女曰臣有弟在民間曰道途兒童多唱此帝黙然久之曰天啟之也因索酒自歌宫木隂濃燕子飛興衰自古漫成悲他日迷樓更好景宫中吐艶變紅輝效劉孝綽憶詩二首以下雜言憶睡時待來剛不來卸妝仍索伴解珮更相催博山思結夢沈水未成灰憶起時投籖初報曉被匿香黛殘枕隠金釵裊笑動上林中除却司晨鳥望江南八闋海山記曰煬帝闢地周二百里為西苑内為十六院聚巧石為山鑿池為湖海又鑿北海周迴四十里中有三山效蓬萊方丈瀛洲上皆臺榭迴廊水深數丈開溝通五湖北海盡通行龍鳯舸帝多泛東湖固製湖上曲望江南八闋云湖上月偏照列仙家水浸寒光鋪枕簟浪攪晴影走金蛇偏稱泛靈槎光景好輕彩望中斜清露冷侵銀兔影西風吹落桂枝花開宴思無涯湖上栁烟裏不勝垂宿霧洗開明媚眼東風揺弄好腰肢烟雨更相宜環曲岸隂覆畫橋低線拂行人春晚後絮飛晴雪暖風時幽意更依依湖上雪風急墮還多輕片有時敲竹戸素華無韻入澄波望外玉相磨湖水逺天地色同和仰面莫思梁苑賦朝來且聽玉人歌不醉擬如何湖上草碧翠浪通津脩帶不為歌舞緩濃鋪堪作醉人茵無意襯香衾晴霽後顔色一般新遊子不歸生滿地佳人逺意寄青春留詠卒難伸湖上花天水浸靈芽淺蕋水邊匀玉粉濃苞天外剪明霞只在列仙家開爛熳插鬢若相遮水殿春寒幽冷艶玉軒晴照暖添華清賞思何賖湖上女精選正輕盈猶恨乍離金殿侣相將盡是采蓮人清唱謾頻頻軒内好嬉戲下龍津玉管朱絃聞盡夜踏青鬭草事青春玉輦從羣真湖上酒終日助清歡檀板輕聲銀甲緩醅浮香米玉蛆寒醉眼暗相㸔春殿晩仙艶奉杯盤湖上風光真可愛醉鄉天地就中寛帝主正清安湖上水流遶禁園中映日暖揺清翠動落花香暖衆紋紅蘋末起清風閒縱目魚躍小蓮東泛泛輕揺蘭棹穏沈沈寒影上仙宫逺意更重重漢魏六朝百三家集卷一百十四
