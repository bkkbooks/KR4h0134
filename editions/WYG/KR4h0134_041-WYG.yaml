body:
  text: 漢魏六朝百三家集巻四十一晉孫楚集題詞子荆零雨正長朔風稱於詩家今亦未見其絶倫也除婦服詩王武子嘆為情文相生然以方嵇君道伉儷詩兄弟間耳江東未順司馬文王發使遣書子荆與荀公曽各奮筆札孫最傑出而荀獨見用謂勝十萬師文章有神不在遇合朝廟之上賞音尤難必欲如元瑜孔璋見知孟徳豈易言哉石驃騎府主也郭奕其同里也睥睨忿争遂致沉廢子荆平日素有傲名鄉曲缺譽此亦其見短之一事乎然同閈相知有一武子生死願足靈牀驢聲何必非叔夜之琴也笑賦調謔自得反金人銘蚩薄箝口似狂非狂言各有寄若夫長虞勁直箋頌夜光威輦被髪遺書勸仕知人實長未聞玩物太原名士磊落英多其為品狀寜讓汝潁哉目録賦笑賦登樓賦同前韓王臺賦有序又井賦雪賦笳賦有序相風賦菊花賦蓮花賦杕杜賦有序茱茰賦鷹賦有序鴈賦雉賦蟬賦論屈建論頌尼父頌梁令孫侯頌贊莊周贊榮啓期贊原壤贊顔回贊管仲贊季子贊白起贊樂毅贊韓信贊銘反金人銘石人銘碑故太傅羊祜碑鴈門太守牽府君碑疏龍見上疏九品疏取士疏牋薦傅長虞牋謝賜鄣日牋書為石苞與孫皓書與董京書哀文和氏外孫道生哀文和氏外孫小同哀文詩答𢎞農故吏民除婦服詩征西官屬送於陟陽候作詩太僕座上詩祖道詩之馮翊祖道詩漢魏六朝百三家集巻四十一目録欽定四庫全書漢魏六朝百三家集巻四十一明張溥輯晉孫楚集賦笑賦有度俗之公子總萬物之細故心髣髴乎巢由以得意為至樂不拘戀乎凡流㑹親戚於高宇結宗盟於綢繆所以交頸偃仰椎胷指掌亢洪聲於通谷順長風以流響氣參譚以相屬若將頹而復往或嚬䠞俛首狀似悲愁怫鬱唯轉呻吟郁伊或擕手悲嘯噓天長呌遲重則如陸沈輕疾則如水漂徐疾任其口頰圓合得乎機要或中路背叛更相毁賤傾倚叵我彫聲迄乎日晏信天下之笑林調謔之巨觀也登樓賦有都城之百雉加層樓之五尋從明王以登極聊暇日以娛心涇渭汨以阻邁卉木鬱而成林晞朝陽之素暉羡綠竹之茂陰望秦墳於驪山覩八陵於北岑營巷基峙列宅萬區黎民布野商旅充衢杞柳綢繆芙蓉吐芳俯依清川仰翳朱陽體象濛汜幽若扶桑白日為之晝昏鳥禽為之頡頏同前有都城之百雉加層樓之五尋從明王之登遊聊暇日以娛心鳴鳩拂羽於桑榆游鳬濯翅於素波牧豎吟嘯於行陌舟人鼓枻而揚歌百僚雲集促坐華臺嘉肴滿俎㫖酒盈杯談三墳而詠五典釋聖哲之所裁具載藝文首同四句而末互異姑兩存之韓王臺賦有序酸棗寺門外夾道左右有兩故臺訪諸故老云韓王聽訟觀也望韓王之故臺尋往代之所營雙闕碣以峻峙貫雲氣而上征歴千載而特立顯妙觀於太清薄邯鄲之叢臺陋楚國之章華邈岧嶤以亢極豈岑樓之能加至乃宫觀𢎞敞層臺隱天伐文梓於萬仞發玉石於三泉優倡角烏烏之聲蛾眉戲白雲之舞紛滛衍以低卬翳脩䄂而容與又薎丘陵之邐迤亞五嶽之嵳峩井賦倚崇丘以鑿井兮臨斥澤之淫洿若行潦之滓濁兮靡清流以自娛乃喟爾而有感兮率鄰左之數夫脉厥土以興泉兮登甘醴於𤣥虚體象圓川下貫五仞幽泉勝涌津澤傍潤抱甕而汲不設機引絶彼淫飾安此樸慎俗尚其華我篤其信既處湼而不緇又磨之而不磷雖矢志而無妄實游心於大順渇人來翔行旅是賴輟耕息肩不期而㑹沈黄李浮朱柰雜狸首之斑如飛清塵以洮汰枕𤣥石以盥漱喜遨怡以緩帶雪賦尭九載以山栖兮湯請禱於桑林罔二聖以濟世兮孰繁衍以迄今嗟亢陽之踰時兮情反側以寢興豐隆灑雪交錯翻紛膏澤偃液普潤中田肅肅三麥實獲豐年笳賦有序頃還北館遇華髪人於潤水之濱向春風而吹長笳音聲寥亮有感余情爰作斯賦銜長葭以泛吹噭啾啾之哀聲奏胡馬之悲思詠北狄之遐征順谷風以撫節飄逸響乎天庭爾乃調脣吻整容止揚清矑隱皓齒徐疾從宜音引代起叩角動商鳴羽發徴若夫廣陵散唫三節白紵太山長曲哀及梁父似鴻雁之將雛乃羣翔於河渚相風賦伊聖皇之高烈美治道之穆清兼乾坤之普覆齊三光之朗明猶恭已以勞謙迄日昃而不寧慮聽政之有闕誡禍福於無形建殊才於辰極樹相風於紫庭爾乃神獸盤其根靈烏據其顛羽族翩飄羅其側翔風蕭聊出其間菊花賦彼芳菊之為草兮禀自然之醇精當青春而濳翳兮迄素秋而敷榮於是和樂公子雍容無為翺翺華林駿足交馳薄言采之手折纎枝飛金英以浮㫖酒拂翠葉以振羽儀偉兹物之珍麗兮超庻類而神竒蓮花賦有自然之麗草育靈沼之清瀬結根係於重壤森蔓延以騰邁爾乃紅花電發暉光􅂱􅂱仰曜朝霞俯照緑水濳緗房之奥密兮含珍藕之甘腴攅聚星列纎離相扶微若𤣥黎披幽夜粲若鄧林飛鵷雛杕杜賦有序家弟以虞氏梨賦見示余謂豈以梨有用之為貴杜無用之為賤故無用獲全所以為貴有用獲殘所以為賤故賦云爾惟有杕之為杜齊萬物而並生其質菲薄既不施於器用華葉疎悴靡休隂之茂榮昔在邵伯聽訟述職甘棠作頌垂之罔極茱茰賦有茱茰之嘉木植茅茨之前庭歴漢女而始育閱百載而長生森蔓延以盛興布緑葉於紫莖鶉火西徂白藏授節零露既凝鷹隼飄厲攀紫房於纎柯綴朱實之酷烈應神農之本草療生民之疹疾鷹賦有序郭延考與余厚其從者韝二鷹以侍側郭邊人也好弋獵顧盼心欲自娛樂請余為賦曰有金剛之俊鳥生井陘之巖阻超萬仞之崇嶺䕃青松以静處體勁悍之自然振肅肅之輕羽擒狡兎於平原截鴻鴈於河渚且其為相也疏尾濶臆高鬐秃顱深目蛾眉狀似愁胡曲觜短頸足若雙枯麾則應機招則易呼背碣石以西遊經馬嶺而南徂于時商秋既邁嵗在𤣥㝠風霜激厲羽毛振驚爾乃䇿良驥服羔裘鞲青骹戲田疇縈深谷繞山丘定心意審精眸獸馳厥足鳥矯其翼下赴幽谿上翔辰極随指授以騰踴因升降以畢力紛連薄以攖􅇡遂䧟首以摧臆鴈賦有逸豫之雋禽禀和氣之清沖候天時以動静隨寒暑而汚隆䬃同集于曠野紛羣翔於雲中翳朝陽之景曜角聲勢於晨風族類阜繁數則千億迎素秋而南遊背青春而北息泝長川以鳴號淩洪波以鼔翼任自然而相羊窮天壤於八極雉賦體冲和之淑質飾羽儀於茂林斑五色之文章揚皦皦之清音設宻網於巖阿飛輕繳之雲浮上無逃而弗獲下無隱而不捜遂戢翼以就養隨籠棲而言歸恒逍遥於階庭廕朝陽之盛暉蟬賦惟大化之廣御何品數之多名當仲夏之始出據長條而悲鳴翼如羅纒形如枯槁終日不銜一粒激哀響之煩擾論屈建論加籩之品菱芰存焉楚多陂塘菱芰所生父自嗜之而抑按宰祝既毁就養無方之禮又失奉死如生之義奪平素欲建何忍焉頌尼父頌皇矣尼父聖哲之傑徳比天地明齊日月周室陵遲大道蕪穢禮樂崩阻姦雄罔世乃養門徒廣延俊乂垂訓列國頌聲魯衛威震夾谷義厭陳蔡徳之休明幽而彌㤗超美三代風馳雲邁梁令孫侯頌於穆君侯英才宣朗神鑒將來思通既往受佐陜西臨我邦壤聲之所振下應如響明斷決疑易於指掌野有㓂盗惟侯屏之我有田疇惟侯闢之古人慎獄惟侯平之凡此三惠如何勿思贊莊周贊莊周曠蕩高才英儁本道根貞歸於大順妻亡不哭亦何所懽慢弔鼔缶放此誕言始矯其情近失自然榮啟期贊榮公温雅既怡既懌濁以徐清寂然澹泊援琴自娛詠此三樂眉壽無疆惟徳之宅原壤贊壤之輈張絶滅禮教實交仲尼同機合奥聖以之藏俗以之笑獨恊區外孰知其妙顔回贊束身勵行宗事聖道鑽仰孜孜視予猶考管仲贊管生彎弓與桓是讐駿奔從紏塊為纍囚沐浴西郊鸞飛詹丘季子贊季子聰哲思心精微𤣥覽幽寤觸類應機白起贊烈烈桓桓時唯武安神機電斷氣濟師然南折勁楚走魏禽韓北摧馬服凌川成丹應侯無良蘇子入關噭噭讒口火燎于原遂焚杜郵與蕭俱燔惟其殁矣古今所歎樂毅賛樂生誕節實立𢎞度丹旄電麾秦韓景附威震濟西齊愍失據惠之不敏翻然高翥棲遲一丘以保皓素韓信賛淮隂屈節盤於幽賤秦失其鹿英雄交戰踐楚知亡撫戈從漢遂寤明主超然虎奮威震趙魏擒項平難割據山川稱孤南靣惜哉遘疑一朝書叛銘反金人銘晉太廟有石人焉大張其口而書其胷曰我古之多言人也無少言無少事少言少事則後生何述焉夫唯立言名乃長乆胡為塊然生鉗其口凡夫貪財烈士殉名盗跖為濁夷柳為清鮑肆為臭蘭圃為馨莫貴澄清莫賤滓穢二者言異歸於一㑹尭懸諫鼓舜立謗木聽采風謡惟日不足道潤羣生化隆比屋末葉陵遲禮教彌衰承㫖則順忤意則違時好細腰宫中皆飢時悦廣額下作細眉逆龍之鱗必䧟斯機括囊無咎乃免誅夷顛覆厥徳可為傷悲期可用戒無妄之時假説周廟於言為蚩是以君子追而改之石人銘大象無形元氣為母杳兮㝠兮陶冶衆有碑故太傅羊祜碑禀二儀之純靈膺造化之沖氣文為辭宗行作世表遷黄門侍郎受祕書監公筭滅吳之略以為孟獻營虎牢而鄭人懼晏弱城東陽而萊子服乃進據險處開建五城收膏腴之地奪敵人之資於是江浦馳義襁負而至雖研精軍政用思滅敵然兼立學校闡揚典訓是以縉紳之士鱗集仰化雲翔衡門雖泮宫之詠魯侯菁莪之美育才無以過也銘曰金徳發曜惟公作輔肇造嘉謨建我明主不憗遺公俾屏聖皇哲人其徂孰不増傷鴈門太守牽府君碑君體徳允直才量高潔明鑒逹於世變𢎞毅足以致逺聿振鴻翼於衮塵之表卓爾先覺於擬議之前君與劉備少長河朔英雄同契為刎頸之交俄而委質於太祖備遂鼎足於蜀漢所交非常為時所忌毎自酌損在乎季孟之間遷鴈門太守教民耕戰聽斷以情信賞必罰下服其命是以夷狄窘迫罔知所安譬秋枯之隕晨風激雷之不及掩耳也伐叛柔服威震沙漠遺種逺迹萬里無煙烈烈君侯文武允崇少兼七徳翰飛撫戎名揚河朔威鎮漢中臨危運竒在難匪從迴旌東麾撫司徐青截彼降賊海岱以平剖符千里為國干城疏龍見上疏頃聞武庫井中有二龍羣臣或有謂之禎祥而稱賀者或有謂之非祥無所賀者可謂楚既失之而齊亦未為得也夫龍或俯鱗潜于重泉或仰攀雲漢游乎蒼昊而今蟠于坎井同於蛙蝦者豈獨管庫之士或有隱伏厮役之賢没於行伍故龍見光景有所感悟願陛下赦小過舉賢才垂夢於傅巖望想於渭濱修學官起淹滯申命公卿舉獨行君子可惇風厲俗者又舉亮拔秀異之才可以撥煩理難矯世抗言者無繫世族必先逸賤夫戰勝攻取之勢并兼混一之威五伯之事韓白之功耳至於制禮作樂闡揚道化甫是士人出筋力之秋也伏願陛下擇狂夫之言九品疏九品漢氏本無班固著漢書序先往代賢智以九條此盖記鬼録次第耳而陳羣依之以品生人又魏武拔竒決於胸臆收人才不問階次豈頼九品而後得人今可令長守為小大中正各自品其編戸也取士疏當今士子繁多畧以萬計當患官少才多無地以處秀才自别是一種仕官非若漢代取人之例也假若秀才對五問可稱孝廉答一策能通此乃雕蟲小道何關理功得人以此求才徒虚語爾牋薦傅長虞牋楚聞騏驥不遺能於伯樂良寶不藏輝於卞和是以輝光夜射價連秦趙飛駟絶影終朝千里物尚有之士亦宜然謝賜鄣日牋大恩賜鄣日其器雖小而禮遇甚𢎞昔衛綰錫六劍珍而不用楚雖不敏且受而藏之書為石苞與孫皓書葢聞見機而作周易所貴小不事大春秋所誅此乃吉凶之萌兆榮辱之所由生也是故許鄭以銜璧全國曹譚以無禮取滅載籍既記其成敗古今又著其愚智矣不復廣引譬類崇飾浮辭茍以夸大為名更䘮忠告之實今粗論事勢以相覺悟昔炎精幽昧歴數將終桓靈失徳災釁並興豺狼抗爪牙之毒生人䧟塗炭之艱於是九州絶貫皇綱解紐四海蕭條非復漢有太祖承運神武應期征討暴亂克寜區夏協建靈符天命既集遂廓洪基奄有魏域土則神州中嶽器則九鼎猶存世載淑美重光相襲固知四隩之攸同帝者之壯觀也公孫淵承藉父兄世居東裔擁帶燕胡憑陵險逺講武盤桓不供職貢内傲帝命外通南國乘桴滄海交酬貨賄葛越布於朔土貂馬延乎吳會自以為控弦十萬奔走足用信能右折燕齊左振扶桑陵轢沙漠南面稱王也宣王薄伐猛鋭長驅師次遼陽而城池不守桴鼓一震而元兇折首然後逺跡疆埸列郡大荒收離聚散咸安其居民庻悅服殊俗款附自兹以降九野清泰東夷獻其樂器肅慎貢其楛矢曠世不羈應化而至巍巍蕩蕩想所具聞吳之先祖起自荆州遭時擾攘潜播江表劉備震懼亦逃巴岷遂依丘陵積石之固三江五湖浩汗無涯假氣游魂迄于四紀二邦合從東西唱和互相扇動距捍中國自謂三分鼎足之勢可與泰山共相終始相國晉王輔相帝室文武桓桓志厲秋霜廟勝之算應變無窮獨見之鑒與衆絶慮主上欽明委以萬機長轡逺御妙略潜授偏師同心上下用力陵威奮伐罙入其阻并敵一向奪其膽氣小戰江介則成都自潰曜兵劍閣而姜維靣縛開地五千列郡三十師不踰時梁益肅清使竊號之雄稽顙絳闕球琳重錦充於府庫夫韓并魏徙虢滅虞亡此皆前鑒之驗後事之師也又南中吕興深覩天命蟬蛻内向願為臣妾外失輔車唇齒之援内有毛羽零落之漸而裵回危國冀延日月此猶魏武侯却指河山以自彊大殊不知物有興亡則所美非其地也方今百僚濟濟雋又盈朝虎臣武將折衝萬里國富兵彊六軍精練思復翰蜚飲馬南海自頃國家整修器械興造舟楫簡習水戰伐樹北山則太行木盡濬決河洛則百川通流樓船萬艘千里相望自刳木以來舟車之用未有如今之盛者也驍勇百萬畜力待時役不再舉今日之謂也然主上眷眷未便電發者以為愛民治國道家所尚崇城遂卑文王退舎故先開示大信喻以存亡殷勤之㫖往使所究若能審識安危自求多福蹶然改容祗承往錫追慕南越嬰齊入侍北面稱臣伏聽告策則世祚江表永為藩輔豐報顯賞隆於今日矣若有侮慢不式王命然後謀力雲合指麾風從雍益二州順流而東青徐戰士列江而西荆揚兗豫争馳八衝征東甲卒虎步秣陵爾乃皇輿整駕六師徐征羽校燭日旌旗流星游龍曜路歌吹盈耳士卒奔邁其㑹如林煙塵俱起震天駭地渇賞之士鋒鏑争先忽然一旦身首横分宗祀屠覆取誡萬世引領南望良以寒心夫治膏肓者必進苦口之藥決狐疑者必告逆耳之言如其迷謬未知所投恐俞跗見其已困扁鵲知其無功也勉思良圖惟所去就與董京書京與隴西計吏俱至洛陽被髪而行逍遥吟咏嘗宿白社中時乞於市孫楚數就社中與京語載以俱歸京不肯至楚貽之書京答以詩今尭舜之世胡為懐道迷邦哀文和氏外孫道生哀文嗟爾道生和氏之寶玉顔豐下曜於懐抱暮春而育孟冬而夭二十三旬竒于五日方之期頥百分之一命之脩短始則有終誰能長乆與天無窮籛翁近千殤子幼沖俱反無形㝠昩之中造化多少豈獨爾躬和氏外孫小同哀文曄曄蕣華朝生夕落爾命方之猶為淺薄暫有㝠質尋反㝠漠譬彼蜉蝣不識晦朔死尚未知生亦焉知爾雖旬月我未之視萬物混焉天地一指杪末嬰孩安足稱誄大人逹觀同之一揆詩答𢎞農故吏民昔我先侯邁徳垂化康哉之詠實由良佐惟余忝辱弗克負荷每歴貴邦仰瞻泰華追慕先軌感想哀嗟詵詵臣故爰及羣士皓首老成率彼邑里闡崇高義長幼以齒除婦服詩婦胡母氏也時邁不停日月電流神爽登遐忽已一周禮制有叙告除靈丘臨祠感痛中心若抽征西官屬送於陟陽候作詩晨風飄岐路零雨被秋草傾城逺追送餞我千里道三命皆有極咄嗟安可保莫大於殤子彭聃猶為夭吉凶如紏纆憂喜相紛繞五臣作擾天地為我罏萬物一何小逹人垂大觀誡此苦不早乖離即長衢惆悵盈懐抱孰能察其心鑒之以蒼昊齊契在今朝守之與偕老太僕座上詩以下闕文朝欽厥庸出尹京畿迴授太僕四牡騑騑緑耳盈箱翠華葳蕤勲齊庭實増國之輝祖道詩仰天惟龍御地以驥利有攸往不期而至之馮翊祖道詩舉翮撫三秦抗我千里目念當隔山河執觴懐慘毒漢魏六朝百三家集巻四十一
