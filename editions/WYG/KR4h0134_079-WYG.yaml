body:
  text: 漢魏六朝百三家集巻七十九齊孔稚珪集題詞孔靈産立舘禹井山事道精篤而齊高輔政竟以術數登榮位來羽扇素几之贈子珪宅營山水草萊不翦而彈文表奏盛行朝廷父子出處間何相似也汝南周顒結舎鍾嶺後出為山陰令秩滿入京復經此山珪代山移文絶之昭明取入選中比攷孔周二傳俱不載此事豈調笑之言無關紀錄如嵇康於山濤徒有其書交未嘗絶也末世網密刑罰無章再三申論求定一律魏虜連侵國疲征討表請通和孔公之言無非近仁者大致捄民息物而巳周妻何肉精進未逮豈僅譏草堂之衣裳傲僕射之鼓吹自命清踈哉張融令終凌雲一笑孔珪卧疾不免舉牀瞑含之際遇或嗛嗛其為無累則同也目錄表上新定法律表陳通和之䇿表讓詹事表為王敬則讓司空表薦杜京產表奏奏王奐罪奏王融罪啓謝賜生荔枝啓書答蕭司徒書又又碑𤣥館碑褚先生伯玉碑移文北山移文祭文祭外兄張長史文詩白馬篇二首旦發靑林遊太平山漢魏六朝百三家集巻七十九目録欽定四庫全書漢魏六朝百三家集巻七十九明張溥輯齊孔稚珪集表上新定法律表臣聞匠萬物者以繩墨為正馭大國者以法理為本是以古之聖王臨朝思理逺防邪萌深杜姦漸莫不資法理以成化明刑賞以樹功者也伏惟陛下躡厯登皇乗圖踐帝天地更築日月再張五體裂而復縫六樂頽而爰緝乃發德音下明詔䧏恤刑之文申慎罰之典􅎁臣與公卿八坐共刪注律謹奉聖㫖諮審司徒臣子良稟受成規創立條緒使兼􅁥臣宋躬兼平臣王植等鈔撰同異定其去取詳議八座裁正大司馬臣嶷其中洪疑大議衆論相背者聖照𤣥覧斷自天筆始就成立律文二十巻錄敘一巻凡二十一巻以今奏聞請付外施用宣下四海臣又聞老子仲尼曰古之聽獄者求所以生之今之聽獄者求所以殺之與其殺不辜寧失有罪是則斷獄之職自古所難矣今律文雖定必須用之用失其平不異無律律書精細文約例廣疑似相傾故誤相亂一乖其綱枉濫橫起法吏無解既多謬僻􅁥司不習無以相斷則法書徒明於帙裏寃魂猶結於獄中今府州郡縣千有餘獄如令一獄歳枉一人則一年之中枉死千餘人寃毒之死上干和氣聖明所急不可不防致此之繇又非但律吏之咎列邑之宰亦亂其經或以軍勲餘力或以勞吏暮齒獷情濁氣忍并生靈昏心狠態呑剝氓物虐理殘其命曲文被其罪寃積之興復緣斯發獄吏雖良不能為用使于公哭於邊城孝婦寃於遐外陛下雖欲宥之其巳血濺九泉矣尋古之名流多有法學故釋之定國聲光漢臺元常文惠績映魏閣今之士子莫肻為業縱有習者世議所輕良繇空勤永歳不逢一朝之賞積學當年終為閭伍所蚩將恐此書永墜下走之手矣今若𢎞其爵賞開其勸慕課業宦流班習冑子拔其精究使處内局簡其才良以居外仕方岳咸選其能邑長竝擢其術則臯繇之謀指掌可致杜鄭之業鬱焉何逺然後姦邪無所逃其刑惡吏不能藏其詐如身手之相驅若絃栝之相接矣臣以疎短謬司大理陛下發自聖衷憂矜刑網御延奉訓逺照民瘼臣謹仰述天官伏奏雲陛所奏繆允者宜寫律上國學置律助敎依五經例國子生有欲讀者策試上過高第即便擢用使處法職以勸士流陳通和之策表匈奴為患自古為然雖三代智勇兩漢權竒筭略之要二塗而巳一則鐵馬風馳奮威沙漠二則輕車出使通驛虜庭㩁而言之優劣可覩今之議者咸以丈夫之氣耻居物下况我天威寧可先屈吳楚勁猛帶甲百萬截彼鯨鯢何往不碎請和示弱非國計也臣以為戎狄獸性本非人倫鴟鳴狼踞不足喜怒蜂目蠆尾何關美惡唯宜勝之以深權制之以逺笇𢎞之以大度處之以蟊賊豈足肆天下之忿損蒼生之命發雷電之怒争蟲鳥之氣百戰百勝不足稱雄橫尸千里無益上國而蟻聚蠭攢窮誅不盡馬足毛羣難與競逐漢高橫威海表窘廹長圍孝文國富刑清事屈陵辱宣帝撫納安靜朔馬不驚光武卑辭厚禮寒山無靄兩京四主英濟中區輸寶貨以結和遣宗女以通好長轡逺馭子孫是賴豈不欲戰惜民命也唯漢武藉五世之資承六合之富驕心奢志大事匈奴遂連兵積歳轉戰千里長驅瀚海飲馬龍城雖斬獲名王屠走凶羯而漢之棄甲十亡其九故衞霍出關千隊不反貳師入漢百旅頓降李廣敗於前鋒李陵沒於後陣其餘奔北不可勝數遂使國儲空懸户口減半好戰之功其利安在戰不及和相去何若自西朝不綱東晉遷鼎羣胡沸亂羌狄交橫荆棘攢於陵廟豺虎咆於宮闈山淵反覆黔首塗地逼廹崩騰開闢未有是時得失略不稍陳近至元嘉多年無事末路不量復挑疆敵遂乃連城覆徙虜馬飲江青徐州之際草木為人耳建元之初胡塵犯塞永明之始復結通好十餘年間邊候且息陛下張天造厯駕日登皇聲雷宇宙勢壓河岳而封豕殘魂未屠劍首長蛇餘喘偷窺外甸烽亭不静五載於斯昔歳蟻壊瘻食樊漢今兹蟲毒浸淫未巳興師十萬日費千金五歳之費寧可貲計陛下何惜匹馬之驛百金之賂數行之詔誘此凶頑使河塞息肩關境全命蓄甲飬民以觀彼弊我策若行則為不世之福若不從命不過如戰失一隊耳或云遣使不受則為辱命夫以天下為量者不計細耻以四海為任者寧顧小節一城之沒尚不足惜一使不反曾何取慚且我以權取貴得我略行何嫌其耻所謂尺蠖之屈以求伸也臣不言遣使必得和自有可和之理猶如欲戰不必勝而有可勝之機耳今宜早發大軍廣張兵勢徵犀甲於岷峨命樓船於浦海使自青徂豫候騎星羅沿江入漢雲陣萬里據險要以奪其魄斷糧道以折其膽多設疑兵使精鋭而計亂固列金湯使神茹而慮屈然後發衷詔馳輕驛辯辭重幣陳列吉凶虜頑而愛竒貪而好古畏我之威喜君之賂畏威喜賂請和必矣陛下用臣之啟行臣之計何憂玉門之下而無欵塞之和哉彼之言戰既憂勤臣之言和亦慊闊伏願察兩塗之利害撿二事之多少聖照𤣥省灼然可斷所表謬奏希下之朝省使同博議臣謬荷殊恩奉佐侯岳敢肆瞽直伏奏千里讓詹事表太子霞騫青殿日光春宮駕紫谷之英振洛笙之響自非器上白雲韻同明月何以延芳芝苑挿羽瓊條竇嬰戚貴於西京陸曄風素於東國伊人之美方曰可舉臣亦何斯而敢參冐也為王敬則讓司空表故李通豪贍以親寵登司王基才勇與聲華入選先帝擢臣以榮華陛下伸臣以富貴遂行北帶五州東跨六郡内亞三鼎外齊四嶽蟬佩之暎則左右交暉龜組之華則縱橫吐耀輕輪徐動則劒㦸如雲飛葢暫停則歌鐘成列摐金龍吹鬱其前鳴笳鳳管疊其後鄧禹若不遭漢光則南陽之掾吏微臣若不逢明聖則孤城之戍客豈可加以正台之席登以論道之寄啟黃扉而爕五緯躡青帷而調四序薦杜京産表永明十年稚珪及光禄大夫陸澄祠部尚書虞悰太子右率沈約司徒右長史張融表薦京産不報竊見吳郡杜京産潔靜為心謙虚成性通和發于天挺敏達表於自然學遍𤣥儒博通史子流連文藝沈吟道奥泰始之朝挂冠辭世遁舎家業隠於太平葺宇窮巗採芝幽澗耦耕自得薪歌有餘確爾不羣淡然寡慾蔴衣藿食二十餘載雖古之志士何以加之謂宜釋巾幽谷結組登朝則嵒谷含懽薜蘿起忭矣奏奏王奐罪奐輙殺寧蠻長史劉興祖世祖大怒使御史中丞孔稚珪奏其事遂殺之雍州刺史王奐啟錄小府長史劉興祖虚稱興祖扇動山蠻規生逆謀誑言誹謗言辭不遜􅎁使送興祖下都奐慮所啟欺妄於獄打殺興祖詐啟稱自經死止今體傷楗蒼􅗼事暴聞聽攝興祖門生劉倪到臺辨問列興祖與兵共事不能相和自去年朱公恩領軍征蠻失利興祖啟聞以啟呈奐奐因此便相嫌恨若云興祖有罪便應事在民間民間恬然都無事迹至十年九月十八日奐使伏身三十人來稱􅎁錄興祖付獄安定郡蠻先在郡贓私興祖既知其取與即牒啟奐不問興祖後執錄奐仍令蠻領仗身於獄守視興祖未死之前於獄以物畫漆柈子中出密報家道無罪今啟乞出都一辨萬死無恨又云奐駐興祖嚴禁信使欲作方便殺以除口舌又云奐意乃可奐第三息彪隨奐在州凡事是非皆干豫扇構密除興祖又云興祖家餉糜中下藥食兩口便覺囘乞獄子食者皆大利興祖大叫道糜中有藥近獄之家無人不聞又云奐治著興祖日急判無濟理十一月二十一日奐使獄吏來報興祖家道興祖於獄自經死尸出家人共洗浴之見興祖頸下有傷肩胛烏􅗼陰下破碎實非興祖自經死家人及門義共見非是一人重攝撿雍州都留田文喜列與倪符同狀興祖在獄嗛苦望下既䝉䧏㫖欣願始遂豈容於此方復自經􅎁以十九日至二十一日死推理撿迹灼然矯假尋􅎁使送下奐輙拒詔所謗諸條悉出奐意毁故丞相若陳顯達誹訕朝事莫此之深彪私隨父之鎮敢亂王法罪並合窮戮奏王融罪鬱林深忿疾融即位十餘日收下廷尉獄然後使中丞孔稚珪倚為奏融姿性剛險立身浮競動迹驚羣抗言異類近塞外微塵苦求將領遂招納不逞扇誘荒傖狡弄聲勢專行權利反覆脣齒之間傾動頰舌之内威福自已無所忌憚誹謗朝政厯毁王公謂巳才流無所推下事曝逺近使融依源據答啟謝賜生茘枝啟綠葉雲舒朱實星映離離昔聞􅁮􅁮今覩信西岷之佳珍諒東鄙之未識藝文類聚火藝文此下云角昴興而靈華敷大中而朱實繁灼灼丹華吐日離離繁星著天七命析龍眼之房也之按王逸茘枝賦曰乃觀茘枝之樹其形色煖若朝雲興森如横天之篲角亢興而靈華敷大火中而朱實繁灼灼若朝霞之吐日離離如繁星之著天張景陽七命析龍眼之房剖椰子之殻稚珪啟正用逸賦中語七命則景陽七命也藝文於其上既脱寫王逸賦又以七命誤連為一耳尺牘用逸賦四語為稚珪啟而前啟乃反不載葢繇襲藝文之誤遂不加考書答蕭司徒書稚珪啟民蚤奉明公提拂之仁深䝉大慈𢎞引之訓恩奬所驅性命必盡敢瀝肝髓乞照神襟民積世門業依奉李老以沖盡為心以素退成行迹蹈善萬之淵神期至順之宅民仰攀先軌自絶秋塵而宗心所向猶未敢墜至於大覺明敎般若正源民生平所崇初不違背常推之於至理理至則歸一置之於極宗宗極不容二自仰禀明公之訓慿接明公之風導之以正乗引之以通戒使民六滯頓袪五情方旭廻心頂禮合掌願持民齊敬歸依蚤自浄信重律輕條素巳半合所以未變衣鉢眷黃老者實以門業有本不忍一日頓棄心世有源不欲終朝悔遁既以二道大同本不敢惜心廻向實顧言稱先業直不忍棄門志耳豈不思樂方廣勤志一乗况仰資明公齊禮道德加須奉誦明公清信至制浄住子序萬門朗奥億品宣𤣥言雖願違心不覺醉更未測明公善誘之妙一至如此博約紛綸精暉照出欲罷尚其不能欲背何以免向而昔而前民固不敏而今而後斯語請事民之愚心正執門範情於釋老非敢異同始私追尋民門昔嘗明一同之義經以此訓張融融乃著通源之論其名少子少子所明㑹同道佛融之此悟出於民家民家既爾民復何礙始乃遲遲執迹今輙兼敬以心一不空棄黃老二則歸依正覺不期一朝霍然大悟悟之所導舉自明公不勝踴躍之至謹啟又事以聞復竊研道之異佛止在論極極未盡耳道以論極極在諸天佛乃鄙此不出三界斯則精粗逺近實有慙於大方矣然尋道家此教指設機權其猶仲尼外典極惟天地葢起百姓所見二儀而巳敎本因心取㑹萬物用其所見順而尊之當其尊地俱窮妙物故老子之槖籥維摩之無我合德天地易家有太極所以因物之崇天仍崇之以極妙而至極終有地固淵于於天表老子亦云有物混成先天地生已是道在天外稍不以天為道也何異佛家羅漢亦指極四果方至勝鬘自知有餘地道之崇天極猶佛有羅漢果佛竟不止於羅漢道亦於天不息甫信道之所道定與佛道通源矣民今心之所歸輙歸明公所一向道家戒善故與佛家同耳兩同之處民不苟捨道法道之所異輙婉輙入公大乗請於今日不敢復位異同矣服膺之至謹啟下誠伏願採其末悔亮其始位退自悔始自恭自懼謹啟又十一月二十九日州民御史中丞孔稚珪啟得示具懐甚有欣然理本無二取舎多途諍論云云常所慨也但在始通道則宜然斆而學者則未可君但廣尋諸經不患淪滯其迹也比面别一二碑𤣥館碑夫朋白􅊵而侶青鳥啟銀函而講金字者有道存焉故能大叩𤣥宗鬱為物範則天地正六合照日月而導蒼生神道無門陰陽不測是故赤松家石室之下神農行弟子之敬廣成在崆峒之上軒轅禀順風之禮洛浦笙飛之秀關山駕鳳之英凡此之儔希世間出皆雍容以沐咸池或瀟灑而開閶闔褚先生伯玉碑夫河洛摛寶神道之功既傳岱華吐秘仙靈之迹可覩葢事詳於玉牒理煥於金符雖㝠黙殊源顯晦異軌測心觀古可得而言焉是以子晉笙歌馭鳳於天海王喬雲舉控鶴於𤣥都有羽化蟬蜕觸影遯形神翥帝宮迹留劍杖遊瑶池而不返宴𤣥圃而忘歸永嘉惡道者窮地之險也欹竇遏日折石橫波飛浪突雲奔湍急箭先生攀途躋阻宿泄渉折而衡飈夜鼓山洪暴激忽乃崩舟墜壑一倒千仞飄地淪高飜透無底徒侶判其冰碎舟子悲其雹散危魂中夜赴阻相尋方見先生恬然安席銘曰關西升妙洛右飛英鳳吹金闕簫鼓玉京絶封萬古乃既先生先生浩浩唯神其道泉石依情烟霞入抱秘影窮岫孤栖幽草心圖上𤣥志通大造移文北山移文鍾山之英草堂之靈馳煙驛路勒移山庭夫以耿介拔俗之標蕭灑出塵之想度白雪以方絜干青雲而直上吾方知之矣若其亭亭物表皎皎霞外芥千金而不盼屣萬乗其如脱聞鳳吹於洛浦值新歌於延瀨固亦有焉豈其終始參差蒼黃翻覆淚翟子之悲慟朱公之哭乍廻跡以心染或先貞而後黷何其謬哉嗚呼尚生不存仲氏既往山阿寂寥千載誰賞世有周子儁俗之士既文既博亦𤣥亦史然而學道東魯習隠南郭竊吹草堂濫巾北岳誘我松桂欺我雲壑雖假容於江臯乃纓情於好爵其始至也將欲排巢父拉許繇傲百氏蔑王侯風情張日霜氣橫秋或歎幽人長往或怨王孫不游談空空於釋部覈𤣥𤣥於道流務光何足比涓子不能儔及其鳴騶入谷鶴書赴隴形馳魄散志變神動爾乃睂軒席次袂聳筵上焚芰製而裂荷衣抗塵容而走俗狀風雲悽其帶憤石泉咽而下愴望林巒而有失顧草木而如䘮至其紐金章綰墨綬跨屬城之雄冠百里之首張英風於海甸馳妙譽於浙右道帙長擯法筵久埋敲扑諠囂犯其慮牒訴倥偬裝其懐琴歌既斷酒賦無續常綢繆於結課每紛綸於折獄籠張趙於往圖架卓魯於前錄希蹤三輔豪馳聲九州牧使我高霞孤映明月獨舉青松落蔭白雲誰侶澗户摧絶無與歸石逕荒凉徒延佇至於還飈入幕寫霧出楹蕙帳空兮夜鶴怨山人去兮曉猿驚昔聞投簪逸海岸今見解蘭縛塵纓於是南岳獻嘲北隴騰笑列壑争譏攢峰竦誚慨游子之我欺悲無人以赴弔故其林慙無盡澗愧不歇秋桂遣風春蘿罷月騁西山之逸議馳東臯之素謁今又捉裝下邑浪拽上京雖情投於魏闕或假歩於山扄豈可使芳杜厚顔薜茘無耻碧嶺再辱丹崖重滓塵游躅於蕙路汙淥池以洗耳宜扄岫幌掩雲闗斂輕霧藏鳴湍截來轅於谷口杜妄轡於郊端於是叢條瞋膽壘頴怒魄或飛柯以折輪乍低枝而掃跡請廻俗士駕為君謝逋客祭文祭外兄張長史文惟君之德高明秀挺浩汗深度昂藏風領學不師古因心則睿筌蹄象繇糠粃莊惠吾與夫子分協芳金慿風共酒藉月同吟詩白馬篇二首驥子跼且鳴鐵陣與雲平漢家嫖姚將馳突匈奴庭少年鬬猛氣怒髪為君征雄㦸摩白日長劍斷流星早出飛狐塞晚泊樓煩城虜騎四山合胡塵千里驚嘶笳振地響吹角沸天聲左碎呼韓陣右破休屠兵橫行絶漠表飲馬瀚海清隴樹枯無色沙草不嘗青勒石燕然道凱歸長安亭縣官知我健四海誰不傾但使强胡滅何湏甲第成當今丈夫志獨為上古英白馬金具裝橫行遼水傍問是誰家子宿衛羽林郎文犀六屬鎧寶劍七星光山虚弓響徹地逈角聲長宛河推勇氣隴蜀擅威强輪臺受降虜高闕翦名王射熊入飛觀挍獵下長楊英名欺衛霍智䇿蔑平良島夷時失禮卉服犯邊疆徵兵離薊北輕騎出漁陽集軍隨日暈挑戰逐星芒陣移龍勢動營開虎翼張衝冠入死地攘臂越金湯塵飛戰鼓急風交征斾揚轉鬭平華地追奔掃鬼方本持身許國况復武功彰㑹令千載後流譽滿旂常旦發青林孤征越清江遊子悲路長二旬倐已滿三千眇未央草雜今古色巖留冬夏霜寄懐中山舊舉酒莫相忘遊太平山石險天貌分林交日容缺陰澗落春榮寒巖留夏雪漢魏六朝百三家集巻七十九
