body:
  text: 漢魏六朝百三家集巻四十三晉束晢集題詞晉世笑束先生勸農及䴵諸賦文辭鄙俗今雜置賦苑反覺其質致近古由彼雕繢少也廣微沈退作𤣥居釋以擬客難張茂先見而竒之顧其文曼倩醨也此粕也獨痛言周漢衰時禍福無轍朝卿相夕鼎烹功名之士可為嚙指出血當途典午牝鳴狼噬衣冠逹人誅無遺種中散幽憤之詩逸民崇有之論俱無救於溘死始知太虚𤣥罏嚴叟鄭老投足天地不如一巻豈虚談乎集中數議爾雅之文不愧典册補亡詩志高而辭淺欲以續經罷不勝任也三百風微古詩終絶韋孟諷諫傅毅迪志俱非昔響降而西晉誰為朱絃哉汲墓竹簡嵩高科斗自博學者觀之直其户牖書也曲水之對見榮人主何異東方名藻神中壘辨貳負乎目録賦貧家賦餅賦勸農賦近遊賦讀書賦論春夏封諸侯論議廣農議高禖壇石議婚姻以時議風伯雨師不得避諱議又議對三日曲水對奏薦王璞奏缺書荅汲冢竹書難釋書缺牋謝公曹牋缺文弔蕭孟恩文弔衛巨山文雜文𤣥居釋集語詩補亡詩六首有序南陔白華華黍由庚崇丘由儀漢魏六朝百三家集巻四十三目録欽定四庫全書漢魏六朝百三家集巻四十三明張溥輯晉束晢集賦貧家賦載藝文余遭家之轗軻嬰六極之困屯恒懃身以勞思丁飢寒之苦辛無原憲之厚徳有民斯之下貧有漏狹之草屋無蔽覆之受塵唯四壁之常在時弛落而壓鎮食草葉而不飽常嗛嗛於膳珍渉孟夏之季月迄仲冬之堅冰稍煎蹙而窮迫無衣褐以蔽身還趨牀而無被手狂攘而妄牽何長夜之難曉心咨嗟以怨天債家至而相敦乃取東而償西行乞貸而無處退顧影以自憐􅃷賣業而難售遂前至於饑年煮黄當之草萊作汪洋之羮饘釡遲鈍而難沸薪鬰絀而不然至日中而不熟心苦苦而飢懸丈夫慨於堂上妻妾歎於竈間悲風噭於左側小兒啼於右邊餅賦載藝文立冬猛寒清晨之㑹涕凍鼻中霜凝口外充盈解戰湯餅為最弱似春緜白若秋練氣勃鬰以揚布香飛散而逺遍行人失延於下風童僕空噍而斜眄擎器者䑛脣立侍者乾咽勸農賦載藝文惟百里之置吏各區别而異曹考治民之賤職美莫當乎勸農專一里之權擅百家之勢及至青幡禁乎游隋田賦度乎頃畝與奪在已良薄瞻口受饒在於肥脯得力在於美酒若場功畢租輸至録社長召閭師條牒所領注列名諱則豚鷄争下壺榼横至遂乃定一以為十拘五以為二葢由熱啖紆其腹而杜康咥其胃近遊賦載藝文世有逸民在乎田疇宅彌五畝志狹九州安窮賤於下里寞𤣥澹而無求乗篳輅之􅅯蹇駕蘭單之疲牛連搥索以為鞅結斷楩而作鞦攀蓽門而高蹈朅徘徊而近遊井則兩家共一園必去舎百步貫鷄㲉於嵗首收鷄於牣互其男女服飾衣裳之制名號詭異隨迭設繫襦以御冬脅汗衫以當熱帽引四角之縫裙為素條之殺書兒啼於客堂設杜門以避吏媍皆卿夫子呼父字及至三農閒隙遘結婚姻老公戴合歡之㡌少年著蕞角之巾讀書賦載藝文耽道先生澹泊閒居澡練精神呼吸清虛抗志雲表戢形陋廬垂帷帳以隱几被紈素而讀書抑揚嘈囋或疾或徐優游藴藉亦巻亦舒頌巻耳則忠臣喜詠蓼莪則孝子悲稱碩䑕則貪民去唱白駒而賢士歸是故重華詠詩以終已仲尼讀易於終身原憲潜唫而忘賤顔回精勤以輕貧倪寛口誦而芸耨買臣行唫而負薪賢聖其猶孳孳况中才與小人論春夏封諸侯論月令所紀非一王之制凡稱古者無逺今之限未知夏封諸侯何代之典秋祭田邑夏乎殷乎而王據月令以非祭統鄭宗祭統而疑月令無乃俱未通哉莫若通以三代說兩氏而不俱一也議廣農議伏見詔書以倉廩不實關右饑窮欲大興田農以蕃嘉榖此誠有虞戒大禹盡力之謂然農穰可致所繇者三一曰天時不諐二曰地理無失三曰人力咸用若必春無霡霂之潤秋繁滂沲之患水旱失中雩禳有請雖使羲和平秩后稷親農理疆甽於原隰勤藨蔉於中田猶不足以致倉庾盈億之積也然地理可以計生人力可以課致詔書之㫖亦欲將盡此理乎今天下千城人多遊食廢業占空無田課之實較計九州數過萬計可申嚴此防令監司精察一人失課負及郡縣此人力之可致也又州司十郡土狹人繁三魏尤甚而猪牛馬牧布其境内宜悉破廢以供無業業少之人雖頗割徙在者猶多田諸菀牧不樂曠野貪在人間故謂北土不宜畜牧此誠不然案古今之語以為馬之所生實在冀北大賈䍧羊取之清渤放豕之歌起於鉅鹿是其效也可悉徙諸牧以充其地使馬牛猪羊齕草於空虚之田游食之人受業於賦給之賜此地利之可致者也昔騅駓在坰史克所以頌魯僖却馬務田老氏所以稱有道豈利之所以㑹哉又如汲郡之吳澤良田數千頃泞水停洿人不墾植聞其國人皆謂通泄之功不足為難舄鹵成原其利甚重而豪强大族惜其魚蒲之饒構説官長終於不破此亦谷口之謡載在史篇謂宜復下郡縣以詳當今之計荆揚兖豫汙泥之土渠塢之宜必多此類最是不待天時而豐年可獲者也以其雲雨生於畚臿多稌生於决泄不必望朝隮而黄潦臻禜山川而霖雨息是故兩周争東西之流史起惜漳渠之浸明地利之重也宜詔四州刺史使謹按以聞又昔魏氏徙三郡人在陽平頓丘界今者䌓盛合五六千家二郡田地逼狹謂可徙遷西州以充邊土賜其十年之復以慰重遷之情一舉兩得外實内寛増廣窮人之業以闢西郊之田此又農事之大益也高禖壇石議元康六年高禖壇上石破為二段詔書問置此石來幾時出何經典今應復否博士議祀無高禖置石之文未知設造所由既已毀破無可改造説高辛氏有簡狄吞卵之祥今此石有吞卵之象葢俗説所為而史籍無記可但收聚復于舊處而已太常以為吞卵之言葢是逸俗之失義因令毀破便宜廢除下四府博士議賊曹屬束晳議後得高堂隆故事詔更置石如舊夫未詳其置之故而欲必其可除之理不可然按郊祀志秦漢不祀高禖漢武帝五子傳武帝晩得太子始為立禖其事未之能審許慎五經異說云山陽民祭皆以石為主然則石之為主繇來尚矣祭禮龜䇿祭器弊則埋之而改置新石今破則宜埋而更造不宜遂廢收集破石積之故處於禮無依於事不肅愚所未安也婚姻以時議春秋二百四十年魯女出嫁夫人來歸大夫迎女天王娶后自正月至十二月悉不以得時失時為貶褒何限於仲春季秋以相非哉夫春秋舉秋毫之善貶纎介之惡故春狩於郎書時禮也夏城中丘書不時也此人間小事猶書得時失時况婚姻人倫端始禮之大者不訊得時失時不善者耶若婚姻季秋期盡仲春則隱二年冬十月夏之八月未及季秋伯姬歸于紀周之季春夏之正月也桓九年春季姜歸于京師莊二十五年六月夏之四月也已過仲春伯姬歸于紀或出盛時之前或在期盡之後而經無貶文三傳不譏何哉凡詩人之興取義䌓廣或舉譬類或稱所見不必皆可以定候也又按桃夭篇叙美婚姻以時葢謂盛壯之時而非日月之時故灼灼其華喻以盛壯非為嫁娶當用桃夭之月其次章云其葉蓁蓁有蕡其實子之于歸此豈在仲春之月乎又摽梅三章注曰夏之向晩迨氷未泮正月以前草蟲喓喓末秋之時或言嫁娶或美男女及時然詠各異矣周禮以仲春㑹男女之無夫家者葢一切相配合之時而非常人之節曲禮曰男女非有行媒不相知名故日月以告君齋戒以告鬼神若萬人必在仲春則其日月有常不得前却何復日月以告君乎夫冠婚笄嫁男女之節冠以二十為限而無春秋之期笄以嫁而設不以日月為斷何獨嫁娶當繫於時月乎風伯雨師不得避諱議元康七年詔書稱咸寧元年詔下尊諱風伯雨師皆為詁訓又公官文書吏人上事稱引經書者復多迴避使大義不明諸經傳咸言天神星宿帝王稱號皆不得變易本文但省事言語臨時訓避而已又議太常博士華簡言按周禮大宗伯職云猶燎祀司中司命風師雨師此禮文正稱應如丙辰詔書不改其名事下五府博議賊曹屬束晢議按風伯之名所由來逺其在漢魏固巳有之非晉氏避諱始造此號也若以異於周禮宜當變改則今國家行事神物稱號多因近代不皆率古葢亦簡易而從仍舊随時之制不足悉變唯雨師之名實繇避諱宜如舊稱對三日曲水對昔周公城洛邑因流水以汎酒故逸詩云羽觴隨波又秦昭王以三日置酒河曲見金人奉水心之劍曰令君制有西夏乃覇諸侯因此立為曲水二漢相縁皆為盛集文弔蕭孟恩文東海蕭惠孟恩者父昔為御史與晳先君同僚孟恩及晢日夕同遊分義早著孟恩夫婦皆亡門無血𦙍時有伯母從兄之憂未得自往致文一篇以弔其魂并修薄奠其文曰舊友人陽平束晳謹請同業生李察奉脯修一束麥糒一器以致祠於處士蕭生之墓曰鳴呼哀哉精爽遐登形骸幽匿有邪亡邪莫之能測敬薦薄饋魂兮來食孟恩孟恩豈猶我識弔衛巨山文元康元年楚王瑋矯詔舉兵害太保衛公及公四子三孫公世子黄門郎巨山與晳有好交時自本郡來赴其䘮作弔文一篇以告其柩曰同志舊友陽平束晳頃聞飛虎肆暴竊矯皇制禍集于子宗祊幾滅越自冀方來赴來闕遥望子第銘旌藂立既闚子庭其殯盈十徘徊感動載號載泣斂袂升階子不我揖引􅃑受祛子不我執魂兮魂兮于焉栖集雜文𤣥居釋束晳閒居門人竝侍方下帷深譚隱机而咍含毫散藻考撰同異在側者進而問之曰葢聞道向變通逹者無窮世亂則救其紛時㤗則扶其隆振天維以贊百務熈帝載而鼓皇風生則率土樂其存死則宇内哀其終是以君子屈已伸道不恥干時上國有不索何獲之言周易著躍以求進之辭莘老負金鉉以陳烹割之説齊客當康衢而咏白水之詩今先生耽道修藝嶷然山峙濳朗通微洽覽深識夜兼忘寐之勤晝騁鑽𤣥之思曠年累稔不墮其志鱗翼成而愈伏術業優而不試乃欲闔匵辭價泥蟠深處永戢琳琅之耀匿首窮魚之渚當唐年而慕長沮邦有道而反寗武識彼迷此愚竊不取若乃士以援登進必待求附藝之黨横擢則林藪之彦不抽丹墀步紈袴之童東野遺白顛之叟盍亦因子都而事博陸慿鷁首以渉洪流蹈翠雲以駭逸龍振光耀以驚沈鰌徒屈蟠於塪井眄天路而不游學既種而身困夫何為乎秘丘且嵗不我與時若奔駟有來無反難得易失先生不知盱豫之䜟悔遲而忘夫朋盍之義務疾亦豈能登海湄而抑東流之水臨虞泉而招西歸之日徒以曲畏為梏儒學自桎囚大道于環堵苦形骸于蓬室豈若託身權戚憑勢假力擇棲芳林飛不待翼夕宿七娥之房朝享五鼎之食匡三正則太階平贊五教而玉䋲直孰若茹藿餐蔬終身以匿哉束子曰居吾將導爾以君子之道諭爾以出處之事爾其明受余訊謹聽余志昔元一既啓兩儀肇立離光夜隱望舒晝戢羽族翔林蟩蛁赴濕物從性之所安士樂志之所執或背豐榮以巖棲或排蘭闥而求入在野者龍逸在朝者鳯集雖其軌迹不同而道無貴賤必安其業交不相羡稷契奮庸以宣道巢由洗耳以避禪同垂不朽之稱俱入賢者之流叅名比譽誰劣誰優何必貪與二八為羣而恥為七人之疇乎且道暌而通士不同趣吾竊綴處者之末行未敢聞子之高喻將忽蒲輪而不眄夫何權戚之云附哉昔周漢中衰時難自託福兆既開患端亦作朝遊巍峩之宫夕墜崢嶸之壑晝笑夜歎晨華暮落忠不足以衛已禍不可以預度是士諱登朝而競赴林薄或毁名自汙或不食其祿比從政於匣笥之龜譬官者於郊廟之犢公孫泣涕而辭相揚雄抗論於赤族今大晉熈隆六合寧静蜂蠆止毒熊羆輟猛五刑勿用八紘備整主無驕肆之怒臣無㲠纓之請上下相安率禮從道朝養觸邪之獸庭有指倿之草禍戮可以忠逃寵祿可以順保且夫進無險懼而惟寂之務者率其性也兩可俱是而舎彼趣此者從其志也葢無為可以解天下之紛澹泊可以救國家之急當位者事有所窮陳䇿者言有不入翟璜不能迴西鄰之寇平勃不能正如意之立干木臥而秦師退四皓起而戚姬泣夫如是何舎何執何去何就謂山岑之林為芳谷底之莾為臭守分任性唯天所授鳥不假甲于龜魚不假足于獸何必笑孤竹之貧而羡齊景之富恥布衣以肆志寜文裘而拖繡且能約其躬則儋石之稸以豐茍肆其欲則海陵之積不足存道徳者則匹夫之身可榮忘大倫者則萬乘之主猶辱將研六籍以訓世守寂泊以鎮俗偶鄭老於海隅匹嚴叟於僻蜀且世以太虚為輿𤣥罏為肆神游莫競之林心存無營之室榮利不擾其覺殷憂不干其寐捐夸者之所貪收躁務之所棄薙聖籍之荒蕪總羣言之一至全素履於丘園背纓緌而長逸請子課吾業於千載無聽吾言於今日也集語薄氷凝池非登廟之寶霖露垂林非綴冕之飾必將採素璧於層山探圓珠於重泉也詩補亡詩六首有序精詩家直說云束晳補亡詩對偶切辭語流麗不脱六朝氣習序曰晳與同業疇人肄修鄉飲之禮然所詠之詩或有義無辭音樂取節闕而不備于是遥想既往思存在昔補著其文以綴舊制南陔孝子相戒以養也循彼南陔言采其蘭眷戀庭闈心不遑安彼居之子罔或游盤馨爾夕膳潔爾晨餐循彼南陔厥草油油彼居之子色思其柔眷戀庭闈心不遑留馨爾夕膳潔爾晨羞有獺有獺在河之涘淩波赴汨噬鰟捕鯉嗷嗷林烏受哺于子養隆敬薄惟禽之似朂増爾䖍以介丕祉白華孝子之潔白也白華朱蕚被於幽薄粲粲門子如磨如錯終晨三省匪惰其恪白華綘趺在陵之陬蒨蒨士子湼而不渝竭誠盡敬亹亹忘劬白華𤣥足在丘之曲堂堂處子無營無欲鮮侔晨葩莫之㸃辱華黍時和嵗豐宜黍稷也黮黮重雲習習和風黍華陵巔麥秀丘中靡田不播九榖斯豐奕奕𤣥霄濛濛甘霤黍發稠華禾挺其秀靡田不殖九榖斯茂無高不播無下不植芒芒其稼參參其穡稸我王委充我民食玉燭陽明顯猷翼翼由庚萬物得由其道也蕩蕩夷庚物則由之蠢蠢庻類王亦柔之道之既由化之既柔木以秋零草以春抽獸在于草魚躍順流四時逓謝八風代扇纎阿案晷星變其躔五緯不愆六氣無易愔愔我王紹文之跡崇丘萬物得極其高大也瞻彼崇丘其林藹藹值物斯高動類斯大周風既洽王猷允㤗漫漫方輿迴迴洪覆何類不繁何生不茂物極其性人永其壽恢恢大圓茫茫九壌資生仰化于何不養人無道天物極則長由儀萬物之生各得其儀也肅肅君子由儀率性明明后辟仁以為政魚游清沼鳥萃平林濯鱗鼔翼振振其音賓寫爾誠主竭其心時之和矣何思何修文化内輯武功外悠漢魏六朝百三家集巻四十三
