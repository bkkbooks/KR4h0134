body:
  text: 漢魏六朝百三家集巻六十四宋傅亮集題詞晉宋禪受成於傅季友表䇿文誥誦言滿堂潘元茂冊魏公不如其多也武帝不豫升牀受詔營陽廬陵忽焉翦没奉迎文帝入繼大統徐謝羣公慶同絳侯季友憂色里克是懼善讀書者尚少知禍福耶演慎著論竊慕括囊感物作賦起於夜蛾道路詠詩撫躬三省彼方欲為長風之鳥而不免見笑于雕陵之鵲人也非天也王師出征宣明抗表言及虛館三月恪遵下武臣雖不順辭則可悲季友博經史長文筆倉皇廣莫門上竟不得慷慨一言畢命殿陛九錫諸篇固傅氏之丹書帶礪也無能救死何哉廟墓二教竝録文選懷舊崇德意近甘棠入洛陽謁五陵宋公百世一日也表文無痛哭之談識者先知其非心王室矣目録賦喜雨賦登陵囂館賦登龍岡賦芙蓉賦征思賦感物賦有序宋國封建禪代詔䇿文晉安帝進劉裕侍中車騎將軍詔封豫章郡公加號詔封宋公詔進宋公為宋王詔晉恭帝禪宋詔宋公九錫䇿文禪䇿璽書教為宋公修張良廟教為宋公修楚元王墓教修復前漢諸陵教表為宋公至洛陽謁五陵表為宋公求加贈劉前軍表為劉毅軍敗自解表讓尚書僕射表奏尚書八座封諸皇弟皇子奏碑銘司徒劉穆之碑侍中王公碑故安成太守傅府君銘論演慎論書與沈林子書與謝晦書與蔡廓書讚文殊師利菩薩讚彌勒菩薩讚詩從武帝平閩中從征奉迎大駕道路賦詩冬至漢魏六朝百三家集巻六十四目録欽定四庫全書漢魏六朝百三家集巻六十四明張溥輯宋傅亮集賦喜雨賦唯二儀之順動數有積而時偏墊襄陵於唐籍慼雲漢於周篇匪叔葉之或遘在盛王其固然伊元嘉之初載肇休明於此年懿玉燭之方熈愠積陽之獨愆涸源泉於井谷委嘉穎於中田嗟我皇之翼翼悵臨朝而輟娛踵冲謙於禹湯協至誠於在余且東作之未晏庶雨露之夙濡遵懸子之徙㕓尤魯侯之㷊巫祗桑林之六禱修季宰之再雩誠在幽其必貫感何逺而不孚聆晨鸛於高垤候宵畢於天隅發層雲於觸石晦重陽於八區春霆殷以逺響興雨霈而載塗灑豐浸於中疇覃餘潤於嘉蔬殷嗇人於菑畝衍將繁於中衢嗣良頌於多稔兆嘉夢於樵漁矧其臣之逢運又均休而等虞陶曲成於暮稔念歸駕於董疎登陵囂館賦歲九旻之暮月肅晨駕而北逝度迴壑以停轅凌孤館而逺憩何物慘而節哀又雲悠而風厲悴緑蘩於寒渚隕豐灌於荒澨玩中原之芬菊惜蘭圃之彫蕙旌竹栢之勁心謝梧楸之零脆爾乃流盼平隰落日還皋干感具盈在物同騷聆離鵾之悽響聽鳴林之瀏飈彼遊子之苦傷毎寤歎於我勞矧集悲而鍾苦疚寸心其如忉眇天末以遥瞪怨故鄉之阻遼登龍岡賦靜潛處以永念聊駕言以寫憂䝉旭露而夙軫税余轡於龍丘南臨平隰西際荒疇比㝢連甍幽榛四周眺江􅚾之廣澨究川陸之迴修羨翔羽之嬉林樂綠蘋之在流椉清漪以汎濫翳稠枚而命仇信遂生之有所何怵迫於人尤芙蓉賦考庶本之珍麗寔惣美於芙蕖潛幽泉以育藕披翠蓮而挺敷汎輕荷以冒沼列紅葩而曜除徼旭露以滋采靡朝風而肆芳表麗觀於中沚播郁烈於蘭堂在龍見而萌秀於火中而結房豈呈芬於芷蕙將越味於沙棠詠三閭之披服美蘭佩而荷裳伊𤣥匠之有瞻悦嘉卉於中渠既暉映於丹墀亦納芳於綺疏征思賦逄休明之餘祐託菲薄於末暉既致戎於皇幄亦彼已於宰闈傷鵜梁以載揚詠伐檀而屢思龢風翕以􅈡節零雨鬱而四漾津雲曖以合體墳衍杳其無封羨歸飛之能矯樂湍流之自東想和鑾之北徂企雲旂之􅒾舉灑三川之積塵廓二崤之重阻覿高掌於華陽聆鳴鳯於洛浦感物賦有序余以暮秋之月述職内禁夜清務隙遊目藝苑於時風霜初戒蟄類尚繁飛蛾翔羽翩翾滿室赴軒幌集明燭者必以燋滅為度雖則微物矜褱者久之退感莊生異鵲之事與彼同迷而忘反鑒之衟此先師所以鄙智及齊客所以難日論也悵然有褱感物興思遂賦之云爾在􅒾成之暮晷肅皇命於禁中聆蜻蛚於前廡鑒朗月於房櫳風蕭瑟以陵幌霜皚皚而被墉憐鳴蜩之應節惜落景之褱東嗟勞人之萃感何夕永而慮充眇今古以遐念若循環之無終詠倚相之遺矩希董生之方融鑽光燈而散袠温聖喆之遺蹤墳素杳以難暨九流紛其異封領三百於無邪貫五千於有宗考舊聞於前史訪心跡於汙隆豈夷阻之在運將全喪之繇躬遊翰林之彪炳嘉美手於良工辭存麗而去穢㫖既雅而能通雖源流之深浩且揚㩁而發䝉習習飛蚋飄飄纎蠅緣幌求隙望爓思陵糜蘭膏而無悔赴朗燭而未懲瞻前軌之既覆忘改轍於後乘匪微物之足悼悵永念而拊膺彼人衟之為貴參二儀而比靈禀清曠以授氣修緣督而為經照安危於心術鏡纎兆於未形有徇末而捨本或躭欲而忘生碎隋侯於微爵捐所重而要輕矧昆蟲之所昧在智士其猶嬰悟雕陵於莊氏幾鑒濁而迷清仰前修之懿軌知吾跡之未幷雖宋元之外占曷在予之克明豈知反之徒爾喟投翰以増情宋國封建禪代詔䇿文附為晉安帝進劉裕侍中車騎將軍詔安帝義熈元年正月江陵平天子反正二月詔加鎮軍將軍劉裕為侍中車騎將軍都督中外諸軍事固讓不受傅亮傳云髙祖登庸之始文筆皆是記室參軍滕演北征廣固悉委長史王誕自此後至於受命表䇿文誥皆亮辭也古稱大者天地其次君臣所以列貫三辰神人代序諒理本於造昧而運周於萬葉故盈否時襲四靈通其變王道或昧貞賢拯其危天命所以永固人心所以攸穆雖夏周中傾賴靡申之績恭倫載竊寔二代是維或乘資藉號或業隆異世猶詩書以之休詠記䇿用為美談未有因心撫民而誠發理應援神器於已淪若在今之盛者也朕以寡昧遭家不造越自遘閔屬當屯極逆臣桓𤣥乘釁縱慝窮凶恣虐滔天猾夏遂誣㒺人神肆其簒亂祖宗之基既湮七廟之饗胥殄若墮淵谷未足斯譬皇度有晉天縱英哲使持節都督揚徐兗豫青冀幽幷江九州諸軍事鎮軍將軍徐青二州刺史忠誠天亮神武命世用能貞明協契義夫響臻故順聲一唱二溟巻波英風振路宸居清翳暨冠軍將軍毅輔國將軍無忌振武將軍道規舟旗遄邁而元凶傳首回戈疊揮則荆漢霧廓俾宣元之祚永固於嵩岱傾基重造再集於朕躬宗廟歆七百之祐皇基融載新之命維功維徳永言銘懷固已道冠開闢獨絶終古書契以來未之前聞矣雖則功高靡尚理至難文而崇庸命德哲王攸先者將以𢎞道制治深闗盛衰故伊望膺殊命之錫桓文饗備物之禮況宏徴不世顧邈百代者宜極名器之隆以光大國之盛而領軍謙虛自衷誠㫖屢顯朕重逆仲父乃所以愈彰德美也鎮軍可進位侍中車騎將軍都督中外諸軍事使持節徐青二州刺史如故顯祚大邦啓兹疆宇封豫章郡公加號詔義熈二年十月論匡復功封唱義謀主鎮軍將軍劉裕為豫章郡公天子重申前令加侍中進號車騎將軍固讓三年二月天子遣兼太常葛籍授公䇿有扈滔天夷羿乘釁亂節干紀實撓皇極賊臣桓𤣥怙寵肆逆乃摧傾華霍倒拔嵩岱五嶽既夷六地易所公命世英縱藏器待時因心資敬誓雪國恥慨憤陵夷誠發宵寐既而歲月屢遷神器己逺忠孝幽寄實貫三靈爾乃介石勝機宣契畢舉訴蒼天以為正揮義旅而一驅奔鋒數百勢烈激電百萬不能抗限制路日直植城遂使衝鯨潰流暴鱗奔漢廟勝逺加重氛載滌二儀廓清三光返照事遂永代功髙開闢理微稱謂義感朕心若夫道為身濟猶縻厥爵況乃誠德俱深勲貫天人者乎是用建兹邦國永祚山河言念載懷匪云足報往欽哉俾屏余一人長弼皇晉流風垂祚暉烈無窮其降承嘉䇿對敭朕命封劉裕為宋公詔義熈十二年十月夫嵩岱配極則乾道増輝藩岳作屏則帝王成務是以夏殷資昆彭之伯有周倚齊晉之輔鑒諸前典儀刑萬代翼治扶危靡不繇此大尉公命世天縱齊聖廣淵明燭四方道光宇宙爰自闕二字初迪則投懃王國妖蝥孔熾則功存社稷固以四維是荷萬邦攸賴者矣暨桓𤣥僣逆傾蕩四海公深秉大節靈武霆震𢎞濟朕躬再造王室每惟勲德銘於厥心遂北清海岱南夷百越荆雍稽服庸岷順軌剋黜方難式遏寇虐及阿衡王猷班序内外仰興絶風傍嗣逸業秉禮以整俗遵王以垂訓聲教逺被無思不洽爰暨木居海處之酋被髪雕題之長莫不㤀其陋險九譯來庭此盖播諸徽䇿靡究其詳者也曩者永嘉不綱諸夏幅裂終古帝居淪胥戎虜永言園陵率土同慕公明發遐慨撫機電征親董侯伯稜威致討旗旝首塗則八表響震偏師先路則多壘雲徹舊都載清五陵復禮百城屈膝千落影從自篇籍所載生民以來勲德懋功未有若此之盛者也昔周吕佐叡聖之主因三分之形把旄仗鉞一時指麾皆大啓壃宇跨州兼國其在桓文方兹九儉然亦顯被寵章光錫殊品況乃獨絶百代顧邈前烈者哉朕每𢎞鑒古訓思遵令圖以公深秉沖挹用闕大禮天人引領於兹六載況今禹迹齊軌九隩同文司勲抗䇿普天増佇遂公髙挹大愆國章三靈眷屬朕實祗懼便宜顯答羣望允崇盛典其進位相國總百揆揚州牧封十郡為宋公備九錫之禮加璽綬逺遊冠位在諸侯王上加相國綠綟綬宋公九錫䇿文朕以寡昧仰纘洪基夷羿乘舋蕩覆王室越在南鄙遷於九江宗祀絶饗人神無位提挈羣凶寄命江滸則我祖宗之業奄墜於地七百之祚翦焉既傾若陟淵海罔知攸濟天未絶晉誕育英輔振厥弛維再造區㝢興亡繼絶俾昏作明元勲至德朕實賴焉今將授公典䇿其敬聽朕命乃者桓𤣥肆僣滔天冺夏拔本塞源傾倒六位庶僚俛首四方莫䘏公精貫朝日氣凌霄漢奮其靈武大殱羣慝剋復皇邑奉帝歆神此公之節始於勤王者也授律羣后泝流長騖薄伐崢嶸獻捷南郢大憝折首羣逆畢夷三光旋采舊物反正此又公之功也出藩入輔𢎞兹保弼阜財利用繁殖生民編戸歲滋壃宇日啓導德明刑四境有截此又公之功也鮮卑負衆僣盜三齊狼噬冀青䖍劉沂岱介恃遐阻仍為邊毒公蒐乘秣駟夐入逺壃衝櫓四臨萬雉俱潰竊號之虜顯戮司寇拓土三千申威龍漠此又公之功也盧循妖凶伺隙五嶺乘虚肆逆侵覆江豫旍拂寰内矢及王城朝野喪沮莫有固志家獻徙卜之計國議遷都之規公乘轅南濟義形於色嶷然内湛視險若夷攄畧運奇英謨不世狡寇窮衂喪旗宵遁俾我畿甸拯於將墜此又公之功也追奔逐北揚旍江濆偏旅浮海指日遄至番禺之功俘級萬數左里之捷魚潰鳥散元凶逺迸傳首萬里海南肅清荒服來欵此又公之功也劉毅叛渙負舋西夏陵上罔主志肆姦暴附麗協黨扇蕩王畿公御軌以刑消之不日蒼兕電泝神兵風掃罪人斯得荆衡清晏此又公之功也譙縱怙亂寇竊一隅王化阻閡三巴淪溺公指命偏師授以良圖凌波浮湍致屆并絡僣䜿伏鑕梁岷革偃此又公之功也馬休魯宗阻兵内侮驅率二方連旗稱亂公投袂星言斫其上畧江津之師勢踰風電迴斾沔川寔繁震懾二叛奔迸荆雍來蘇𤣥澤浸育温風潛被此又公之功也永嘉不競四夷擅華五都幅裂山陵幽辱祖宗懷沒世之憤遺氓有匪風之思公逺齊伊宰納隍之仁近同小白滅亡之恥鞠旅陳師赫然大號分命羣帥北徇司兗許鄭風靡鞏洛載清偽牧逆藩交臂請罪百年榛穢一朝掃濟此又公之功也公有康宇内之勲重之以明德爰初發迹則奇謨冠古電擊彊妖則鋒無前對聿寧東畿大造黔首若乃草昧經綸化融於歲計扶危靜亂道固於苞桑辯方正位納之軌度蠲削煩苛較若畫一淳風美化盈塞宇宙是以絶域獻琛遐夷納貢王畧所宣九服率從雖文命之東漸西被咎繇之邁於種德何以尚兹朕聞先王之宰世也庸勲尊賢建侯胙土褒以寵章崇其徽物所以協輔皇家永隆藩屏故曲阜光啟遂荒徐宅營丘表海四履有聞其在襄王亦賴匡霸又命晉文備物光錫惟公道冠前烈勲髙振古而殊典未加朕甚懵焉今進授相國以徐州之彭城沛蘭陵下邳淮陽山陽廣陵兖州之髙平魯泰山十郡封公為宋公錫兹𤣥土苴以白茅爰定爾居用建冢社昔晉鄭啟藩入作卿士周邵保傳出總二南内外之重公實兼之命使持節太尉尚書左僕射晉寜縣五等男湛授相國印綬宋公璽紱使持節兼司空散騎常侍尚書陽遂鄉侯泰授宋公茅土金虎符第一至第十左竹使符第一至第十左相國位無不摠禮絶朝班居常之名宜與事革其相國摠百揆去録尚書之號上送所假節侍中中外都督太傅太尉印綬豫章公印策進揚州牧領征西將軍司豫北徐雍四州刺史如故公紀綱禮度萬國是式乘介蹈方罔有遷志是以錫公大輅戎輅各一𤣥牡二駟公抑末敦本務農重積采蘩寔殷稼穡惟阜是用錫公袞冕之服赤舄副焉公閑邪納正移風改俗陶鈞品物如樂之和是用錫公軒懸之樂六佾之舞公宣美王化導揚休風華夷企踵逺人胥粹是用錫公朱戸以居公官方任能網羅幽滯九臯辭野髦士盈朝是用錫公納陛以登公當軸處中率下以義式遏寇讐清除苛慝是用錫公虎賁之士三百人公明罰恤刑庶獄詳允放命干紀罔有攸縱是用錫公鈇鉞各一公龍驤鳯矯咫尺八紘括囊四海折衝無外是用錫公彤弓一彤矢百盧弓十盧矢千公温恭孝思致䖍禋祀忠肅之志儀刑萬方是用錫公秬鬯一卣珪瓚副焉宋國置丞相以下一遵舊儀欽哉其祗服往命茂對天休簡恤庶邦敬敷顯德以終我髙祖之嘉命南史霄漢作虹蜺奉帝歆神作奉歆神祗生民作黎元無狼噬冀青䖍劉沂岱二句毒作害駟作馬俱潰下又無竊號之虜二句王城下無朝野喪沮二句不日下無蒼兕電沂二句清晏作寜晏來蘇下無𤣥澤浸育二句進宋公為宋王詔朕聞先王之蒞天下也王則大寶以尊德下則建侯以褒功是以成勲告就文命有𤣥圭之錫四海來王姬旦饗龜䝉之封夫翼聖宣績輔德𢎞猷禮窮元賞寵章希世況明保沖昧獨運陶鈞者哉朕以不德遭家多難雲雷作屯夷羿竊命失位京邑遂播蠻荆艱難卑約制命凶醜相國宋公天縱睿聖命世應期誠貫三靈大節宏發拯朕躬於巢幕迴靈命於已崩固已道窮北面暉格八表者矣及外積全國之勲内累戡黎之伐芟夷彊妖之始藴崇姦猾之源顯仁藏用之道六府孔修之績莫不雲行雨施能事畢舉諒已方軌於三五不容於典䇿者焉自永嘉喪師綿踰十紀五都分崩然正朔時暨唯三秦懸隔未之暫賓至令𦍑虜襲亂淫虐三世資百二之易守恃函谷之可闗廟筭韜畧不謀之日久矣公命世撫運闡曜威靈内硏諸侯之慮外致上天之罰故能倉兕甫訓則許鄭風偃鉦鉞未指則瀍洛霧披俾舊闕元陽復集萬國之軫東京父老重睹司𨽻之章俾朕負扆髙拱而保大洪烈是用逺鑒前典延即羣謀敬授殊錫光啓壃宇乘馬之制有陋舊章徽稱之美未窮上爵豈足以顯報懋功允塞民望藩輔王畿長轡六合者乎寔以公毎秉謙德卑不可踰難進之道以寵為戚是故降損盛制且有後命也自兹迄今洪勲彌邵稜威九河魏趙底服迴轅崤潼連城冰泮遂長驅灞滻懸旍龍門逆虜姚泓係頸就擒百稔梗穢滌於崇朝祖宗遺憤雪於一旦涉禹之迹方行天下至於海外罔有不服功固萬世其寜惟永豈金石雅頌所能讚揚寔可以告於神明勒銘嵩岱者已朕又聞之周道方逺則鸑鷟鳴岐二南播德則麟騶呈瑞自公大號初發爰暨告成靈祥炳煥不可勝紀豈伊素雉逺至嘉禾近歸而已哉朕每仰鑒𤣥應俯察人謀進惟道勲退惟國典豈得遂公沖挹而久藴盛䇿便宜敬行大禮允副幽顯之望其進宋公爵為王以徐州之海陵東安北琅邪北東莞北東海北譙北梁豫州之汝南北潁川北南頓凡十郡益宋國其相國揚州牧領征西將軍司豫北徐雍四州刺史如故晉恭帝禪宋詔恭帝元熈二年六月𫝊亮承高祖密㫖諷帝禪位草詔請書帝欣然操筆曰桓𤣥之時重為劉公所延今日之事本所甘心乃書赤紙為詔夫天造草昧樹之司牧所以陶鈞三極統天施化故大道之行選賢與能隆替無常期禪代非一族貫之百王繇來尚矣晉道陵遲仍世多故爰暨元興禍難既積至三光貿位冠履易所安皇播越宗祀墮冺則我宣元之祚永墮於地顧瞻區域翦焉已傾相國宋王天縱聖德靈武秀世一匡頽運再造區夏固以興滅繼絶舟航淪溺矣若夫仰在璿璣旁穆七政薄伐不庭開復壃宇遂乃三俘偽主開滌五都雕顔卉服之鄉龍荒朔漠之長莫不迴首朝陽沐浴𤣥澤故四靈效瑞川岳啟圖嘉祥雜遝休應炳著𤣥象表革命之期華裔注樂推之願代德之符著乎幽顯瞻烏爰止允集明哲夫豈延康有歸咸熈告謝而已哉昔火德既微魏祖底績黄運不競三后肆勤故天之厯數寔有攸在朕雖庸闇昧於大道永鑒廢興為日已久念四代之高義稽天人之至望予其遜位別宫歸禪於宋一依唐虞漢魏故事禪策咨爾宋王夫𤣥古權輿悠哉邈矣其詳靡得而聞爰自書契降逮三五莫不以上聖君四海止戈定大業然則帝王者宰物之通器君道者天下之至公也昔在上葉深鑒兹道是以天禄既終唐虞弗得傳其嗣符命來格舜禹不獲全其謙所以經緯三才澄斥彞化作範振古垂風萬葉莫尚於兹自是厥後歴代彌邵漢既嗣德於放勛魏亦方軌於重華諒已協謀乎人鬼而以百姓為心者也昔我祖宗欽明辰居其極而明晦代序盈虧有期翦商兆禍非唯一世曽是弗尅矧伊在今天之所廢有自來矣惟王體上聖之姿苞二儀之德明齊日月道合四時乃者社稷傾覆王拯而存之中原蕪梗又濟而復之自負固不賓干紀放命肆逆滔天竊據萬里靡不潤之以風雨震之以雷霆九伐之道既敷八法之化自理豈伊薄施於民濟斯黔庶固以義洽四海道威八荒者矣至於上天垂象四靈效徴圖䜟之文既明人神之望已改百工歌於朝庶民頌於野億兆抃踊傾佇惟新自非百姓樂推天命攸集豈伊在予所得獨專是用仰祗皇靈俯順羣議敬禪神器授帝位於爾躬大祚告窮天禄永終於戲王其允執其中敬遵典訓副率土之嘉願恢洪業於無窮時膺休祐以答三靈之眷望禪宋璽書葢聞天生蒸民樹之以君帝皇寄世實公四海崇替係於勲德升降存乎其人故有國必亡卜年著其數代謝無常聖哲握其符昔在上世三聖係軌疇咨四嶽以𢎞揖讓惟先王之有作永垂範於無窮及劉氏致禪寔堯是法有魏告終亦憲兹典我世祖所以撫歸運而順人事乘利見而定天保者也而道不常泰戎夷亂華喪我洛食蹙國江表仍遘否運淪没相因逮於元興遂傾宗祀幸賴神武光天大節宏發匡復我社稷重造我國家惟王聖德欽明則天光大應期誕載明保王室内紓國難外播宏畧誅大憝於漢陽逋僭盜於沂渚澄氛西岷肅清南越再清江湘拓定樊沔若乃永懷區宇思一聲教王師首路則伊洛澄流稜威崤潼則華嶽褰靄偽酋銜璧咸陽即序雖彞器所銘詩書所詠庸勲之盛莫之與二也遂偃武修文誕敷德政八統以馭萬民九職以刑邦國思兼三王以施四事故能信著幽顯義感殊方自歴世所賓舟車所暨靡不謳歌仁德抃舞來庭朕每敬惟道勲永察符運天之厯數實在爾躬是以五緯升度屢示除舊之迹三光協數必昭布新之祥圖䜟禎瑞皎然斯在加以龍顔英特天授殊姿君人之表煥如日月傳稱惟天為大惟堯則之詩云有命自天命此文王夫或躍在淵者終饗九五之位勲格天地者必膺大寶之業昔土德告沴傳胙於我有晉今厯運改卜永終於兹亦以金德而傳於宋仰四代之休義鑒明昬之定期詢於羣公爰逮庶尹咸曰休哉罔違朕志今遣使持節兼太保散騎常侍光禄大夫瞻兼太尉尚書宣範奉皇帝璽綬受終之禮一如唐虞漢魏故事王其允答人神君臨萬國時膺靈祉酬於上天之眷命教為宋公修張良廟教義熈十二年高祖北討軍次留城經張良廟下令文選傅亮撰夫盛德不冺義存祀典微管之歎撫事彌深張子房道亞黄中照隣殆庶風雲𤣥感蔚為帝師夷項定漢大拯横流固已參軌伊望冠德如仁若乃神交圮上道契商洛顯默之際窅然難究淵流浩瀁莫測其端矣塗次舊沛佇駕留城靈廟荒頓遺像陳昧撫跡懷人永歎寔深過大梁者或佇想於夷門游九原者亦流連於隨㑹擬之若人亦足以云可改構棟宇修飾丹青蘋蘩行􅕙以時致薦抒懷古之情存不刋之烈主者施行文選作在宋書存𤣥作言淵流浩瀁作源流淵浩頓作殘夷項二句書上下異永歎宴深作慨然永歎棟宇作榱桷為宋公修楚元王墓教夫褒賢崇德千載彌光尊本敬始義隆自逺楚元王積仁基德啟蕃斯境素風道業作範後昆本支之祚實隆鄙宗遺芳餘烈奮乎百世而丘封翳然墳塋莫翦感逺存往慨然永懷夫愛人懷樹甘棠且猶勿翦追甄墟墓信陵尚或不冺況𤓰瓞所興開源自本者乎可蠲復近墓五家長給灑掃便可施行冺宋書作絶修復前漢諸陵教夫信陵之墳守衞無曠展季之壟樵蘇有刑彼匹夫懷道列國陪𨽻猶見禮異世取貴隣邦漢高撥亂反正大造區宇道拯横流功高百代盛德之烈義在不泯表為宋公至洛陽謁五陵表五陵晉文帝崇陽陵武帝峻陽陵宣帝高原陵景帝峻平陵及惠帝陵也臣裕言近振旅河湄揚旍西邁將屆舊京威懷司雍河流遄疾道阻且長加以伊洛榛蕪津塗久廢伐木通徑淹引時月始以今月十二日次故洛水浮橋山川無改城闕為墟宫廟隳頓鐘虡空列觀宇之餘鞠為禾黍㕓里蕭條鷄犬罕音感舊永懷痛心在目以其月十五日奉謁五陵墳塋幽淪百年荒翳天衢開泰情禮獲申故老掩涕三軍悽感瞻拜之日憤慨交集行河南太守毛修之等既開剪荆棘繕修毁垣職司既備蕃衞如舊伏惟聖懷逺慕兼􅇺不勝下情謹遣傳詔殿中中郎臣某奉表以聞為宋公求加贈劉前軍表臣聞崇賢旌善王化所先念功簡勞義深追逺故司勲秉策在勤必記德之休明没而彌著故尚書左僕射前軍將軍臣劉穆之爰自布衣協佐義始内竭謀猷外勤庶政密勿軍國心力俱盡及登庸朝右尹司京畿敷讚百揆翼新大猷頃戎車逺役居中作捍撫寜之勲實洽朝野識量局致棟幹之器也方宣讚盛化緝隆聖世志績未究逺邇悼心皇恩褒述班同三事榮哀既備寵靈已泰臣伏思尋自義熈草創艱患未弭外虞既殷内難亦薦時屯世故靡有寧嵗臣以寡劣負荷國重實賴穆之匡翼之勲豈唯讜言嘉謀溢於民聽若乃忠規密謨潛慮帷幕造膝詭辭莫見其際事隔於皇朝功隠於視聽者不可勝紀所以陳力一紀遂克有成出征入輔幸不辱命微夫人之左右未有寧濟其事者履謙居寡守之彌固每議及封爵輒深自抑絶所以勲高當年而茅土弗及撫事永念胡寧可昧謂宜加贈正司追甄土宇俾忠貞之烈不泯於身後大賚所及永秩於善人臣契濶屯夷旋觀終始金蘭之分義深情感是以獻其乃懷布之朝聽所啟上合請付外詳議竭書作端大猷作王化寧作寄既作兼泰作厚荐作結勝作稱茅土作茅社傷作念夷作泰忠規逺畫􅉃慮密謨造膝詭詞為劉毅軍敗自解表遂令犬羊内侮兵纒紫極聖朝肝膽社稷幾殆稽之典刑罪不容宥賴天祚有底冢宰靈武長虵翦毒醜類宵遯今畿甸告寧四封有截臣元釁大責既積朝野桑榆之效又無與立而聖恩含宥弛其徽墨偏私之譏既彰民聽況可重荷岳牧之任復當推轂之重讓尚書僕射表自皇基肇創豫班策勲纎善微績未聞朝野百揆治樞摠貳殷要誠非庸臣所宜叨擬臣聞權衡既懸錙銖靡遁厲駑習驥終莫之近敗駕傷錦備之前誥必將上増國垢下招私黷奏尚書八座封諸皇弟皇子奏臣聞懿親廣樹聖王所先明德竝建古之休典所以維城皇代盤石帝基内衞畿服外綏四海者也第某皇弟皇子等神姿穎哲大成俱茂地均魯衞德兼庸賢顯進徽號啓建疆宇𢎞道作屏光翰邦家竝可封郡王碑銘司徒劉穆之碑公諱穆之字道和彭城人也公膺陶鈞之秀範該生民之上操三變肇於弱容九德充於初迪文明在中柔順暢於事業敬以直内義讓洽於州黨時元凶竄遁擁據荆沔乘輿播幸越蹈九江公率先羣后電發川湄奬懷本之衆勵思奮之士桓謙藉累葉之資徐覆忸驟勝之鋒習亂之徒若蝟毛而起内懷根本之虞外通首尾之勢公靈武獨運奇謨内湛鞠旅陳衆視險若夷飛雲西泝則水截鯨鯢乘轅東指則陸殪長􅉬迴累棊之危成維山之固豐功茂勲大造於王室淳風懿化永結於荆南銘曰二儀發揮川嶽協靈外恢温雅内鏡文明懷仁履順藴義居貞煌煌袞衣禮亦隆止翼翼素心亮終如始夷情升降一色愠喜訓儉於物復禮克已侍中王公碑體亞黄中道及微管元勲盛德光于晉載于時運距无妄陵夷有漸至于兵纒象魏壘結四郊公以民望晉朝居疑間之際懷方履順處艱以貞顛沛不能迴其操彊禦無以蕩其守鑠矣公侯乘和挺生識深冬潭文艶春榮爰初素履好是沖黙亦既端委振風育德故安成太守傅府君銘爰自漢季以及晉朝高名逺德係軌於時貞風亮節流聲累葉君承世德之芳流蕩二象之淑靈含章藴粹佩蘭藉蕙韋帶飯蔬朝不及夕不以棲遲改其閒不以隠約迴其操楊生所為久幽而不改隋和之德者其斯之謂歟棲心古烈擬踵前修淹流孔老宛然内求于言中倫庸行歸周神之聽之匪明匪幽論演慎論亮初見世路屯險著論名曰演慎大道有言慎終如始則無敗事矣易曰括囊无咎慎不害也又曰藉之用茅何咎之有慎之至也文王小心大雅詠其多福仲由好勇馮河貽其苦箴虞書著慎身之譽周廟銘陛坐之側因斯以談所以保身全德其莫尚於慎乎夫四道好謙三材忌滿祥萃虚室鬼瞰高屋豐室有蔀家之災鼎食無百年之貴然而徇欲厚生者忽而不戒知進忘退者曽莫之懲前車已摧後鑾不息乘危以庶安行險而徼倖於是有顛墜覆亡之禍殘生夭命之釁其故何哉流溺忘反而以身輕於物也故昔之君子同名爵於香餌故傾危不及思憂患而豫防則針石無用洪流壅於涓涓合拱挫於纎蘖介焉是式色斯而舉悟高鳥之風逝鑑醴酒而投紱夫豈敝著而後謀通患結而後思復云爾而己哉故詩曰慎爾侯度用戒不虞言防萌也夫單以營内喪表張以治外失中齊秦有守一之敗偏恃無兼濟之功氷炭滌於胷心巖牆絕於四體夫然故形神偕全表裏寧一營魄内澄百骸外固邪氣不能襲憂患不能及然可以語至而言極矣夫以嵇子之抗心希古絶羈獨放五難之根既拔立生之道無累人患殆乎盡矣徒以忽防於鍾吕肆言於禹湯禍機發於豪端逸翮鎩於舉觀夫貽書良友則匹厚味於甘酖闕八字其憂患也若無轡而乘奔其慎禍也猶履氷而臨谷或振褐高樓掲竿獨往或保約違豐安於卑位故漆園外楚忌在龜犧啇洛遐遯畏此駟馬平仲辭邑殷鑒於崔慶張臨挹滿灼戒乎桑霍若君子覽兹二塗則賢鄙之分既明全喪之實又顯非知之難慎之惟艱慎也者言行之樞管乎夫據圖揮刃愚夫弗為臨淵登峭莫不惴慄何則害交故慮篤患切而懼深故詩曰不敢暴虎不敢馮河慎微之謂也故庖子涉族怵然為戒差之一毫弊猶如此況乎觸害犯機自投死地禍福之具内充外斥陵九折於卭僰泛衝波於吕梁傾側成於俄頃性命哀而莫救嗚呼嗚呼故語有之曰誠能慎之福之根也曰是何傷禍之門爾言慎而已矣書與沈林子書高祖踐阼封林子漢壽縣伯食邑六百戸固辭不許亮與林子書班爵疇勲歴代常典封賞之發簡自帝心主上委寄之懷實參休否誠心所期同國榮戚政復是卿諸人共𢎞建内外耳足下雖存挹退豈得獨為君子耶與謝晦書晦初與亮徐羨之等廢少帝為營陽王尋弑之而迎立太祖及出為荆州刺史上欲誅羨之等并討晦聲言北伐拜景陵治裝舟艦亮與晦書又言朝士多諌北伐上當遣外監萬幼宗往相諮訪晦以示諮議參軍何承天曰計幼宗一二日必至傅公慮我好事故先遣此書使承天豫為答詔啟草伐虜宜須明年尋起兵東下戰敗伏誅薄伐河朔事猶未巳朝野之慮憂懼者多與蔡廓書廓博涉羣書言行以禮補御史中丞多所糾奏時亮為中書令學冠當時朝廷儀典皆取定于亮毎諮廓然後施行時疑揚州刺史廬陵王義真朝堂班次亮與廓書廓答揚州自應著刺史服耳然謂坐起班次應在朝堂諸官上不應依官次坐下足下試更尋之詩序云王姬下嫁於諸侯衣服禮秩不係其夫下王后一等推王姬下王后一等則王子居然在王公之上陸士衡起居注式乾殿集諸皇子悉在三司上今鈔疏如別又海西即位赦文太宰武陵王第一撫軍將軍㑹稽王第二大司馬第三大司馬位既最高又都督中外而次在二王之下豈非下皇子耶此文今具在也永和中蔡公為司徒司馬簡文為撫軍開府對録朝政蔡為正司不應反在儀同之下而於時位次相王在前蔡公次之耳諸例甚多不能復具疏揚州反乃居卿君之下恐此失禮宜改之耶蔡廓答傅亮書揚州位居卿君之下常亦惟疑然朝廷以位相次不以本封復無明文云皇子加殊禮齊獻王為驃騎孫秀來降武帝欲優異之以秀為驃騎轉齊王為鎮軍在驃騎上若如足下言皇子使在公右則齊王本次自尊何改鎮軍令在驃騎上明知故以見位為次也又齊王為司空賈充為太尉俱録尚書署事常在充持節都督下足下復思之讚文殊師利菩薩讚在昔龍種今也童真業化游方罔識厥津高㑹維那研微盡神發揮幽賾導達天人彌勒菩薩讚時無竝后道不二司龍潛兜率按轡候時翳翳長夜懷而慕思思樂朗旦屬想靈期詩詩品曰季友文余常忽而不察今沈特進撰詩載其數首亦復平美從武帝平閩中鞠旅揚城大蒐徐方斾旌首路元戎啟行弭一作擊楫洪河總轡崇岡從征息徒西楚佇楫舊鄉止猶嶽立動則雲翔烈烈羣師星言辟行泛舟掩河秣馬登芒奉迎大駕道路賦詩夙櫂發皇邑有人祖我舟餞􅄐不以幣贈言重琳球知止道攸貴懷禄義所尤四牡倦長路君轡可以收張邴結晨軌疎董頓夕輈東隅誠已謝西景逝不留性命安可圖懷此作前修敷袵銘篤誨引帶佩嘉謀迷寵非予志厚德良未酬撫躬愧疲朽三省慙爵浮重明照蓬艾萬品同率繇忠誥豈假知式微發直謳冬至星昴殷仲冬短晷窮南陸柔荔迎時萋芳芸應節馥漢魏六朝百三家集巻六十四
