body:
  text: 漢魏六朝百三家集巻八十九陶𢎞景集題詞陶通明幼時戲弄即好筆硯既讀書萬餘卷一事不知深以為恥隠侯博聞其朋輩也家貧求仕忽脱朝服立館華陽吹笙聽松天下豈真有神僊乎秦皇漢武窮山討海耄期不遇通眀何人遂能飛舉然鼎丹七營登晨尚隔咸陽剡白未易言也世疑隠居棄劒人外悠邈不宜獻誠革命遥㕘國典抑知少君堪羞子房可慕山中宰相大度素存或者藥物取資人帝圖録當顯興朝清都前覺無貴巻舌耶真誥以外遺墨不少論書五啟鍾王若生本草諸序彭扁未死邵陵表碑推兼數賢令君撰序云備六藝良有由乎魏晉以來置君如奕志士高尚流涕無從不得不託致僊靈遺世獨妙中散之於孫登猶是也而婚宦累形蟬蜕寡術通明乃後出而居上矣目録賦水仙賦雲上之仙風賦表解官表啟與武帝論書啟一與武帝啓二與武帝啓三與武帝啓四與武帝啓五進周氏㝠通記啓書答朝士訪仙佛兩法體相書答虞中書書答謝中書書答趙英才書與親友書與從兄書答釋曇鸞書序登真隠訣序真靈位業圗序本草序肘後百一方序藥總訣序相經序論難鎮軍沈約均聖論誌尋山誌頌華陽頌十五首樞域質象形位標貫區别迹號類附物軌遊集才英學稟業運挺契機萌誠期銘瘞鶴銘碑許長史舊館壇碑吳太極左仙公葛公之碑茅山長沙館碑太平山日門館碑茅山曲林館碑銘文授陸敬游十賚文請雨詞詩寒夜怨胡笳曲詔問山中何所有賦詩以答題所居壁和約法師臨友人告逝篇漢魏六朝百三家集巻八十九目録欽定四庫全書漢魏六朝百三家集巻八十九明張溥輯陶𢎞景集賦水仙賦淼漫八海汯汨九河中天起浪分地瀉波東巻長桑日窟西幹龍築月阿乃者潼關不壅石門巳開導江出漢浮濟逹淮障渠水府包山洞臺娥英之所游往琴馮是焉去來或窮髪送鵬咸池浴日隨雲濯金漿之汧追霞採建木之實弄珠於淵客之庭巻綃乎鮫人之室此真夐矣至於碧巖無霧緑水不風飛軒引鳳游軿駕鴻上朝紫殿還覲青宫進麾八老顧拂四童拊洞隂之磬張𤣥圃之璈酌丹穴之酹薦麟州之餚安期奉棗王毋送桃錦旌麗日羽衣拂霄又其英矣及秋水方至層濤架山各巡封隩來賚王言選竒於河侯之府出寳於驪龍之川夜光燭月洪貝充轅亦其瓌矣若夫層城瑶館縉雲瓊閣黄帝所以觴百神也塗山石帳天后翠幙夏禹所以集羣臣也岷嶓交錯上貫井絡窮漢硱磳横帯玉繩浸湯泉於桂渚涌沸壑於金陵崩沙轉石驚湍走沬絶壁飛流萬丈懸瀨奔激芒碭之間馳騖壺口之外逮乎璇綱運極九六數翻用謀西漢受事龍門小周姒後初㑹媯前平隂鉅鹿再化為淵淸河渤海三成桑田撫二儀以惻愴眺萬兆以流連僉自安於蝣晷編無羨於鵠年皆松下之一物又奚足以語仙嗟乎循有生之造物固莫靈於在人寧不踵武於象帝入妙門而自賓苟淪形而無曉與螻蟻而為塵亦有先覺之秀獨往之英窺若士於蒙谷求吕梁於石城從務光於砥柱索龍威於洞庭迎九𤣥於金闕謁三素於玉清更天地之彌固終逍遥以長生雲上之仙風賦縹緲遥裔亘碧海而颺朝霞凌青煙而漙天際出龍門而激水度葱關以飛雪於是漢區動御月軌驚文浮虚入景登空汎雲一舉萬里曾不浹辰此列子有待之風也若乃綿括宇宙包絡天維周流八極迴還四時氣值節而動律位渉巽而離箕徒見去來之緒莫測終始之期此太虚無為之風也表解官表臣聞堯風沖天潁陽振飲河之談漢徳括地商隂峻餐芝之氣臣棲遲早日簮帯久年仕豈留滎學非待禄恒思懸纓象闕孤耕壟下席月澗門横琴雲際始奉中恩得遂丘壑今便滅影桂庭神交松㕛一出東關故鄉就望睠言興念臨波㵼淚臣舟棹已遄無緣躬詣不任攀戀之誠謹奉表以聞啟與武帝論書啟一奉㫖左右中書復稍有能者惟周喜贊夫以含心之荄實俟夾鍾吐氣今既自上體妙為下理用成工每惟申鍾王論於天下進藝方興所恨微臣沈朽不能鑚仰髙深自懐歎慕前奉神筆三紙并今為五非但字字注目乃畫畫抽心日覺勁媚轉不可説以讐昔歲不復相類正此即為楷式何復多尋鍾王臣心本自敬重今者彌增愛服俯仰悦豫不能自已啟勁媚舊集作遒媚不能自已啟作不能以不啟又舊集接前為書今從要録適復蒙給二巻伏覧標帖皆如聖㫖既不顯垂允少留不敢久停已就摹素者一段未畢不赴今信紙巻先巳經有兼多他雜無所復取亦請俟俱了日奉送兼此諸書是篇章體臣今不辨復得修習惟願細書如樂毅論太師箴例依倣以寫經傳永存㝠顯中精要而巳與武帝啟二樂毅論愚心近甚疑是摹而不敢輕言今㫖以為非真竊自信頗涉有悟箴咏吟贊過為淪弱許靖素段遂蒙永給仰銘矜奬益無喻心此書雖不在法例而致用理均背間細楷兼復兩翫先於都下偶得飛白一巻云是逸少好蹟臣不嘗别見無以能辨惟覺勢力驚絶謹以上呈於臣非用脱可充閣願仍以奉上臣昔於馬澄處見逸少正書目録一巻澄云右軍勸進洛神賦諸書十餘首皆作今體惟急就章二篇古法𦂳細近脱憶此語當是零落已不復存澄又云帖注出裝者皆擬賚諸王及朝士臣近見三巻首帖亦謂久已分本不敢議此正復希於三巻中一兩條更得預出裝之例耳天㫖遂復頓給先巻下情益深悚息近初見巻題云第二十三四已欣其多今者賜書巻第遂至二百七十惋訝無巳天府如海非一缾所汲良用息心前後都巳蒙見大小五巻於野拙之分實已過幸若非殊恩豈可􅔵望愚固本博涉而不能精昔患無書可看乃願作主書令史晩愛𨽻法又羨典掌之人常言人生數紀之内識解不能周流天壤區區惟充恣五慾實可恥愧毎以為得作才鬼亦當勝於頑仙至今猶然始欲翻然之自無射以後國政方殷山心歉黙不敢復以閒虚塵觸謹於此題事故遂成煩黷伏願聖慈照録誠慊與武帝啟三二卷中有雜迹謹疏注如别恐未允衷并竊所摹者亦以上呈近十餘日情慮悚悸無寜涉事遂至淹㬱不宜復待填畢餘條並非用惟叔夜威輦二篇是經書體式追以單郭為恨伏按巻上第數甚為不少前㫖惟有四卷此書似是宋元嘉中撰集當由自後多致散失逸少有名之迹不過數首黄庭勸進像讃洛神此等不審猶得存不第二十三卷今見有十二條在别紙按此卷是右軍書者惟有八條前樂毅論書乃極勁利而非甚用意故頗有壊字太師箴大雅吟用意甚至而更成小拘束乃是書扇題屏風好體其餘五片無的可稱臣濤言一紙此書乃不惡而非右軍父子不識誰人迹又似是摹給事黄門一紙治亷瀝一紙凡二篇并是謝安衞軍參軍任靖書後又治亷瀝狸骨方一紙是子敬書亦似摹迹伏恐未垂許以區别今謹上許先生書任靖書如别比方即可知王珉張澄謝安張翼書公家應有與武帝啟四啟伏覧前書用意雖止二六而規矩必周後字不出二百亦褒貶大備一言以蔽便書情頓極使元常老骨更蒙榮造子敬懦肌不沈泉夜逸少得進退其間則玉科顯然可觀若非聖證品折恐愛附近習之風永遂淪迷矣伯英既稱草聖元常寔自𨽻絶論㫖所謂殆同璿璣神寳曠世以來莫繼斯理既眀諸畫虎之徒當日就輟筆反古歸真方𢎞盛世愚管預聞喜佩無届比世皆髙尚子敬子敬元常繼以齊代名實脱略海内非惟不復知有元常於逸少亦然非排棄所可黜湼而不淄不過數族今奉此論自舞自蹈未足逞泄冒願以所摹竊示洪逺思曠此二人皆是均思者必當贊仰踴躍有盈半之益臣與洪逺雖不相識從子詡以學業往來故因之有㑹但既在閣恐或已應聞知摹者所採字大小不甚均調熟看乃尚可恐筆意大殊此篇方傳千載故宜令迹随名偕老益增美晩所奉三㫖伏循字跡大覺勁宻竊恐既以言發意意則應言而手隨意運筆與手㑹故益得諧稱下情歡仰寳奉愈至世論咸云江東無復鍾跡常以歎息比日竚望中原廓清太丘之碑可就摹採今論㫖云真跡雖少可得而推是猶有存者不審可復㡬字既無出見理冐願得工人摹填數行脱蒙見賜實為過幸又逸少學鍾勢巧形宻勝於自運不審此例復有幾紙來㫖以黄庭像讃等諸文可更有出給理自運之跡今不復希請學鍾妙仰惟殊恩與武帝啟五逸少自吳興以前諸書猶為未稱凡厥好迹皆是向在㑹稽時永和十許年中者從失郡告靈不仕以後略不復自書皆使此一人世中不能别也見其緩異呼為末年書逸少亡後子敬年十七八全放此人書故遂成與之相似今聖㫖標題足使衆識頓悟於逸少無復末年之譏阮研間近有一人學研書遂不復可别臣比郭摹所得雖粗寫字形而無復其用筆跡勢不審前後諸巻一兩條謹宻者可得在出􅑽之例復蒙垂給至年末間不此澤自天直以啟審非敢必覬進周氏㝠通記啟周子良隠居髙第天監中白日尸解隠居檢平日真降事跡為四巻進之臣𢎞景啟去十月將末忽有周氏事既在齋禁無由即得啟聞今謹撰事蹟凡四巻如别上呈但某覆鄣疑網不早信悟追自咎悼分貽刻責淵文口具陳述伏願宥以闇惰謹啟書答朝士訪仙佛兩法體相書至哉嘉訊豈蒙生所辨雖然試言之若直推竹柏之匹桐栁者此本性有殊非今日所論若引庖刀湯稼從養溉之功者此乂止其所從終無永固之期夫得仙者並有異乎此但斯族復有數種今且談其正體凡質象所結不過形神形神合時則是人是物形神若離則是靈是鬼其非離非合佛法所攝亦離亦合仙道所依今問以何能而致此仙是鑄煉之事極感變之理通也當埏埴以為器之時是土而異於土雖燥未燒遇濕猶壊燒而未熟不久尚毀火力既足表裏堅固河山可盡此形無滅假令為仙者以藥石煉其形以精靈瑩其神以和氣濯其質以善徳解其纒衆法共通無礙無滯欲合則乘雲駕龍欲離則尸解化質不離不合則或存或亡於是各隨所業修道進學漸階無窮教功令滿亦畢竟寂滅矣答虞中書書栖六翮於荆枝望綺雲於青漢者有日於兹矣而春華來被早石開鮮辭動情端志交衿曲信知鄰徳之談無虚往牘夫子雖迹纒朱閤而心期岱領豈但散髪乎髙岫似將飛霜於絶谷良為欽哉野人幸得託形崇阜息影長林每對月流歎臨風軫慨徒事累可豁而髪容難待自非齊生死於一致孰不心熱者乎舉世悠悠孰云同此儻遇知已相與共憂朅來虞公兹焉可邁何為栖栖空勞鼓缶迨及暇日有事還童不亦皎潔當年而無忸前修也答謝中書書山川之美古來共談髙峰入雲清流見底兩岸石壁五色交輝青林翠竹四時俱備曉霧將歇猿鳥亂鳴夕日欲頹沈鱗競曜實是欲界之仙都自康樂以來未復有能與其竒者答趙英才書子架學區中飛才甸外不肯掃門覔仕復懶彈鋏求通故偃蹇園巷從容郊邑昔所謂慠賓者此其是乎巖下鄙人守一介之志非敢蔑榮蚩俗自致雲霞任性靈而直往保無用以得閒壠薪井汲樂有餘歡切松煮术此外何務然亦以天地棟宇萬物同於一化死生善惡未之能聞與親友書疇昔之意不願處人間年登四十畢志山藪今已三十六矣時不我借知㡬其神乎毋為自苦也與從兄書仕宦期四十左右作尚書郎即抽簪髙邁今三十六方作奉朝請頭顱可知不如早去答釋曇鸞書去月耳聞音聲兹辰眼受文字將由頂禮歲積故使真應來儀正爾整拂藤蒲具陳花水端襟斂思竚聆警錫也序登真隠訣序昔在人間已鈔撰真經修字兩巻于時亦粗謂委密頃嚴居務靜頗得恭潔試就遵用猶多闕略今更反覆研精表裏洞洽預是真學之理使了然無滯一字一包皆有字㫖或論有以入無或據顯而知隠或推機而得宗或引彼以明此自非閑練經書精渉道教者率然覧之猶觀海爾必須詳究委曲乃當曉其所以故道備七篇義同髙品嘗聞古言非知之難其在行之意非學之難觧學難也屢見有人得兩三巻書五六條事謂理盡紙便入山修用動積嵗月愈久昏迷是未造門牆何由盼其帷席試略問麤處已自茫然皆答言經説止如此但謹依存行耳乃頗復開動端萌序導津流若直智尚許人脱能欣爾感悟詢訪是非至於愚迷矜固者便徑道君何以穿鑿異同評論聖文或有自執已見或云承師舊法永無啟發對揚之懐此例不少可為痛心夫經之為言徑也經者常也通也謂常通而無滯亦猶布帛之有經矣必須銓綜緯緒僅乃成功若機關疏越杼軸乖謬安能斐然成文真人立象垂訓本不為朦狡設言故毎標通衢而恒略曲徑知可教之士自當觀其隅轍凡五經子史爰及賦頌尚歴代注釋猶不能辨况𤣥妙之秘途絶領之竒篇而可不探括沖隠窮思寂昧者乎既撰此真訣乃輟書而歎曰若使顧𤣥子在此乃當知我心理所得幾於天人之際往矣如何孰與言哉方將之於𤣥㑹耳真靈位業圖序夫仰鏡𤣥精覩景耀之巨細俯盼平區見巖海之崇深捜訪人綱究朝班之品序研綜天經測真靈之階業但名爵隠顯學號進退四宫之内疑似相參今正當比類經正讐校儀服埓其髙卑區其宫域又有指目單位略説姓名或任同秩異業均迹别者如希林真人為太㣲右公而領九宫上相未委為北宴上清當下親相職耶諸如此類難可必證謂其並繼所領而從髙域粗事事條辨略宣後章輒以淺識下生輕品上聖升降失序梯級乖本懼貽謫𤣥府絡咎㝠司今所詮貫者實禀注之奥㫖存向之要趣祈視跪請宜委位序之尊卑對真接異必究所遇之輕重雖同號真人真品乃有數俱目仙人仙亦有等級千億若不精委條領略識宗源者猶如野夫出朝廷見朱衣必令史句驪入中國呼一切為參軍豈解士庶之貴賤辨爵號之異同乎本草序隠居先生在於茅山巖嶺之上以吐納餘暇頗遊意方技覧本草藥性以為盡聖人之心故撰而論之舊説皆稱神農本經余以為信然昔神農氏之王天下也畫八卦以通鬼神之情造耕種以省殺生之弊宣藥療疾以拯天傷之命此三道者歴衆聖而彌彰文王孔子彖象繫辭幽贊人天后稷伊尹播厥百榖恵被羣生岐黄彭扁振揚輔導恩流含氣並嵗喻三千民到于今賴之但軒轅以前文字未傳如六爻指垂畫象稼穡即事成迹至於藥性所主當以識識相因不爾何由得聞至於桐雷乃著在於編簡此書應與素問同類但後多更修飾之爾秦皇所焚醫方卜術不預故猶得全録而遭漢獻遷徙晉懐奔迸文籍焚靡千不遺一今之所存有此四巻是其本經所出郡縣乃後漢時制疑仲景元化等所記乂云有桐君採藥錄説其花葉形色藥對四巻論其佐使相須魏晉以來呉普李當之等更復損益或五百九十五或四百四十一或三百一十九或三品混糅冷熱舛錯草石不分蟲獸無辨且所主治互有得失醫家不能備見則識智有淺深今輒苞綜諸經研括煩省以神農本經三品合三百六十五為主又進名醫副品亦三百六十五合七百三十種精麄皆取無復遺落分别科條區畛物類兼注名時用土地所出及仙經道術所須并此序録合為七巻雖未足追踵前良盖亦一家撰製吾去世之後可貽諸知音爾肘後百一方序太嵗庚辰隠居曰余宅身幽嶺迄將十載雖每植徳施工多止一時之設可以傳芳逺裔者莫過於撰述見葛氏肘後救卒方殊足申一隅之思夫生民之所為大患莫急於疾􅐄疾去而弗治猶救火不以水也今輦掖左右藥師易尋郊郭之外已自難值况窮村迥陌遥山絶浦其間枉夭安可勝言方術之書巻帙徒煩拯濟殊寡欲就披覧囘惑多端抱朴此製實為深益然尚有闕漏未盡其善輒更採集補闕凡一百一首以朱書甄别為肘後百一方採於雜病單治畧為周遍矣昔應璩為百一詩以箴規心行今予撰此盖欲衞輔我躬且佛經云人用四大成身一大轍有一百一病是故身宜自想上自通人下逮衆庶莫不各加繕寫而究括之途又别撰效驗方五巻具論諸病證候因藥變通而病是大治非窮居所資若華軒鼎室亦宜修省耳葛氏序云可以施於貧家野居然亦不止如是今縉紳君子若常處閒佚乃可披覧方書脱從禄外邑將命遐征或祗直禁闈晨宵閉隔或羈束戎陣城柵嚴阻忽驚急倉卒唯拱手相㸔曷若探之枕笥則可庸豎成醫故備論節度使曉然不滯一披條領無使過差也藥總訣序上古神農作為本草凡著三百六十五種以配一嵗嵗有三百六十五日日生一草草治一病上應天文中應人道下法地理調和五味製成醪醴以備四氣為弗服欲其本立道生者也當生之時人心素朴嗜欲寡少設有微疾服之萬全自此之後世偽情澆智慮日生馳求無厭憂患不息故邪氣數侵病轉深痼雖服良藥不愈其後雷公桐君更增演本草二家藥對廣其主治繁其類族既世改情移生病日深或未有此病而遂設彼藥或一藥以治衆疾或百藥共愈一病欲以排邪還正為之原防故也而三家所列疾病互有盈縮或物異而名同或物同而名異或冷熱乖違丼苦背越採取殊法出處異所若此之流殆難按據尋其大歸神農之時未有文字至於黄帝書記乃興於是神農本草别為四經三家之説遞有損益豈非隨時適變殊途同歸者乎但本草之書歴代久逺既靡師受又無注訓傳寫之人遺誤相繼字義殘闕莫之是正方用有驗布舒合和相經序相者盖性命之著乎形骨吉㓙之表乎氣貌亦猶事先謀而後動心先動而後應表裏相感莫知所以然且富貴夀夭各值其數董賢甫在弱冠便位過三公貲半於國而裁出三十身摧家破馮唐袴穿郎署揚雄壁立髙閣而並至白首或垂老玉食而官不過尉史或穎慧若神僅至齠齔或不辨菽麥更保黄耉此又眀其偏有得也論難鎮軍沈約均聖論山民陶隠居仰諮論云前佛後佛其道不異周室受命象寄狄鞮隨方受職西國密塗厥路非逺唐虞三代不容未有事獨西限道未東流非為姬公所遺盖由斯法宜隠燧人火粒變生為熟盖佛教之萌兆周孔二聖宗條稍廣見生不忍其死聞聲不食其肉草木斬伐有時麛卵不得妄犯又戒有五支四者犯人人為含靈之首一者害獸獸為生品之末内聖外聖義均理一咨曰謹按佛經一佛之興動踰累劫未審前佛後佛相去宜㡬釋迦之現近在莊王唐虞夏殷何必已有周公不言恐由未出非關宜隠育王造塔始敬王之世既閻浮有四則東國不容都寡夫子以華禮興教何宜乃説夷法故歎中國失禮求之四夷亦良有别意且四夷之樂裁出要荒之際投諸四裔亦宻邇危羽之野禹跡所至不及河源越裳白雉尚稱重譯則天竺罽賓久與上國殊絶衰周以後時或有聞故鄒子以為赤縣於宇内止是九州中之一耳漢初長安乃有浮屠而經像眇昧張騫雖將命大夏甘英逺届安息猶不能宣譯風教闡揚斯法必其發夢帝庭乃稍就興顯此則似如時致通閡非關運有起伏也若必以緣應有㑹則昔之淳厚羣生何辜今之澆薄羣生何幸假使斯法本以救濟者夫為罪莫過於殺肉食之時殺孰甚焉而方俟火粒甫為教萌於大慈神力不有所躓乎若粳糧未播殺事難以息未審前時過去諸佛復以何法為教此教之萌起在何佛兼四戒犯人為報乍輕一殺害獸受對更重首輕末重亦為未達夫立人之道曰仁與義周孔所云聞聲不食斬伐有時者盖大眀仁義之道於鳥獸草木尚曰其然况在人乎而可悖虐非謂内惕寡方意在緣報覩迹或似論情顧乖不審於内外兩聖其事可得是均已不此中參差難用頓悟謹備以諮洗願具啓諸蔽誌尋山誌倦世情之易撓乃杖策而尋山既沿幽以逹峻實窮阻而備艱𣺌㳺心其未已方際夕乎雲根欣夫得志者忘形遺形者神存於是散髪解帯盤旋巖上心容曠朗氣宇調暢𤣥雖逺其必存累無大而不忘害馬之弊既去解牛之刀乃王物我之情雖均因以濟吾之所尚也若夫飛聲西岳邀利東陵楚湘之潔吳江之矜輕死重氣名貴於身迷真晦道余所弗承襲衣縫掖端委章甫徘徊廊廟趨翔庭宇傳氏百王流芳世緒負徳叨榮吾未敢許爾乃荆門晝掩蓬户夜開室迷夏草徑惑春苔庭虚月映琴響風哀夕鳥依簷暮獸爭來時復歴近壟尋逺巒坐磐石望平原日負嶂以共隠月披雲而出山風下松而含曲泉瀠石而生文草􅓂􅓂以拂露鹿颷颷而來羣捫虚蘿以入谷傍洪潭而比清照石壁以端色攀桂枝而齊貞亟扈蘭而佩蕙及春鴂之未鳴且含懐以屏氣待蕙風而舒情乃乘興而遂往遵巖路以逺游竚天維而摽思􅞕怳忽而莫求眺囘江之淼漫眩疊障之相稠日斜雲而色黛風過水而安流觸嶔岑而起巘值濶達而成洲石孤聳而獨絶岸懸天而似浮緣磴道其過半魂𣺌𣺌而無憂悟伯昏之倜宕躡千仞而神休遂乃凌巖峭至松門背通林面長源右聫山而無際左慿海而齊天竹泫泫以垂露栁依依而迎蟬鷗雙雙而赴水鷺軒軒而歸田赴水兮汎濫歸田兮翺翔此漭濫之足樂意斯齡之不長悼菌蟪之危促羡靈椿兮未央雖鵬鷃之異類託逍遥乎一方願敷衽以逺訴思扣朝而陳辭至赤城兮一憩遇王子而宿之仰彭涓兮弗逺必長年兮可期及榆光之未暮將尋山而採芝去採芝兮入深磵深磵幽兮路窈窕窈窕路兮終無曙深磵深兮未曾曉髙松上兮亟停雲低蘿下兮屢迷鳥鳥迷蘿兮繽繽雲停松兮紛紛停雲㳺兮安泊離鳥棲兮索羣嗟羣泊其無所思參差而誰聞既窮目以無閡缺六字問漁人以前路指示余以蓬萊曰果爾以尋山之志館爾以招仙之臺缺六字就瀛水以通懐謂萬感其已㑹亦千念而必諧竟莫知其所躋缺六字反無形於寂寞長超忽乎塵埃頌華陽頌十五首樞域河篇徴往册孔記昭昔名三宿麗天序兩金標地英質象宅無乃生有在有則還空靈構不待匠虚影自成功形位總神列三府分除交五便隂暉迎夜晢晨精望曉懸標貫南峰秀𤣥鼎北嶺横秦壁表裏玉沙津周迴隠輪跡區别左帯栁汧水右浚陽谷川土懐北邙色井冽鳳門泉迹號郭干峙畱岸姜巴亘逺蹤鶴廟或聞響别宅乃恒恭類附吳居非知地越家詎隠遷樹盖徒低䕃石竈未嘗煙物軌果林鬱餘柰蔬圃蔓遺辛熒芝可燭夜田泉常澣塵遊集降轡龜山客解駕青華童寢宴含真館髙㑹蕭閒宫才英清歌翔羽集長嘯歸雲飜子絃有逸調空談無與言學稟標舍雷平下立静連石隂上道已冲念飛華當軫心業運濟神既有在去留從所宜心迹何用顯㝠途自相知挺契方隅遊瓊刃蕐陽棲隠居重離儻或似七元乃扶胥機萌號期行當滿亥數未終丁迨及府承世將賓來聖庭誠期刋石𤣥忩上顯誠曲階門動静顧矜録不負保舉恩瘞鶴銘鶴夀不知其紀壬辰嵗得於華亭甲午嵗化於朱方天其未遂吾翔寥廓也耶奚奪余仙鶴之遽也乃裹以𤣥黄之幣藏之茲山之下故立石旌事篆銘不朽詞曰相此胎禽仙家之真山隂降迹華表留名真惟彷彿事亦微㝠西竹法里宰耳嵗辰鳴語解化浮丘去辛左取曹國右割荆門後蕩洪流前固重扄我欲無言爾也何眀爰集真侣瘞爾作銘宜直示之惟將進寧丹陽僊尉江隂真宰立石碑許長史舊館壇碑悠哉曠矣宇宙之靈也固非言象所傳文迹可記然則後之人奚閭乎含吐萬有化育羣生本其所由義歸㝠昧至於形域區分性用殊品事限觀聽理窮數識者儻或可論山之髙海之廣夫何故以其有容焉大天之内復有小天三十六所竝拓㝢地空亘涂水脈闢闈風岫通氣雲巘此山本號句曲其下是第八洞宫名曰金壇蕐陽之天周囘一百五十里分置三府前漢元帝世有咸陽三茅君得道來掌此任故稱茅山具詳傳記至晉太和元年句容許長史在斯營宅厥迹猶存宋初長沙景王就其地之東起道士精舍梁天監十三年勅貿此精舍立為朱陽館將逺符先徴定祥火厯於館西更築隠居住止十四年别創鬱岡齋室迫𤣥洲之蹤十七年乃繕勒碑壇仰述真軌真人姓許諱穆世名謐字思𤣥本汝南平輿人後漢靈帝中平二年六世祖光字少張避許相䛕俠乃來過江居丹陽句容都鄉之吉陽里後仕吳為光禄勲識宇亮㧞奕葉才眀祖尚字元甫有文章機見吳中書郎父副孛仲先器度淹通風格清簡晉剡令寧朔將軍下邳太守西城侯長史副第五子也正生少知名簡文在藩為世表之交起家太學博士朝綱禮肆儒論所宗出為餘姚令懃恤民隠惠被鄰邑徴入凱闈納言帝側昇平末除䕶軍長史本郡中正外督戎章内詮茂序選邦肅律鄉采砥行太和中遷給事中散騎常侍蟬冕輝華事歸尚徳簡文踐極方優國老儵值晏駕於焉告退専静山廬以修上道君雖搢紱朝班諷議庠塾而心標象外志結霞門弟兄逺遊永和四年嘉遁不返君尚想幽竒嵗月彌軫恒與掦君深神明之契興寧中衆真降掦備令宣諭龍書雲篆僉然徧該靈模奥㫖於茲必究年渉懸車遵行愈篤太元元年解駕違世春秋七十有二子姪禮窆虚柩於縣西大墓京陵之蹤未逺飛劒之槨在焉謹按真誥君挺命所基緣業巳久周武王世九官上相長里薛公之弟也兼許肇遺功復應垂祉後𦙍故乗運托生因資成道玉札所授為上清真人爵登侯伯位編卿司理仙撫治佐聖牧民矣真傳未顯於世莫能具述長史第三子諱玉斧世名翽字道翔正生母陶威女先亡已得在洞府易遷官中君清頴􅉷潔特絶世倫郡舉上計掾不赴粃糠塵務研精上業即𢎞景𤣥中之真師也恒居此宅繕修經法掦君數相從就函通真感太和五年於茲告逝時年三十真誥云後十六年當度東華為上相清童君之侍帝晨受書為上清仙官與谷希子並職帝晨之任比世侍中君長兄揆世名甽次兄虎牙世名聨並亦得道揆今有𤣥孫靈真在山勅立嗣真館以褒逺祖之徳皇上乘𢎞誓本力來君此土燾育蒼祇範鑄羣品導法開俗隨緣啓教以隠居積藴三真經誥久栖華陽宜還舊宅供養修理乃勅工匠建茲堂搆即仰祗帝則兼闡大猷東位青壇西表素塔壇塔之間通是基趾埋瓴揜瓦投鍤便值紫煙白霧纒為䕃盖宅南一井即長史所穿井南大塘乃郭朝遺製源出田公之泉路通姜巴之軌傍枕雷平前瞰下泊東際連岡北横長嶺栁汧陽谷俱㑹西垂四域之内皆謂之金陵地肺者也長史所居尤為標勝方將駟雲虬而髙騁駈奔鶴以追風望洪濤之浩汗睠故都以浸逺古人有言匪作奚傳敢刋石頌永屬來賢頌曰渾樞騖氣方祇吐靈依性分境傳識賦形化通八㝢功浹四溟巡跡電滅測體淵停旋區岳立亘海雲舒摶風泳水蹠實慿虚亦有幽匠開石架廬情髙身逺天府地居縈巒巴曲畫壤胇浮五闈面啟九涂環周長隰旁嶺交汧比流乃稱龍伏寔謂金丘昔在西漢三茅來賓爰暨東晉二許懐真裁基浚井栖道接神允膺輔聖錫兹侍宸參差年代絪緼名氏書誥具宣精華未弭甀甃將淪沈階巳毀拱樹霜摧修庭草委肇館華陽嵗躔二紀永觀前猷聿遵洪軌帝曰懋哉爾焉斯止經之營之輪乎奐矣勝殿密響瀉瓶揚芬瑶宫碧簡絢采垂文璚函玉檢綺幕綉巾蘭缸迾耀金爐颺熏桐柏雙教方諸兼學並證心清俱漏身濁離有離無且華且朴結號虚皇筌法正覺藥徴質瑩禪感慧通飛行欻怳捫景帯虹振苦排鄣還眀返聰物言是力我見無功紛紜今古汗漫兩儀三相幻惑舟壑自移緣來則應不慮不為式題龜錄人天鍳知呉太極左仙公葛公之碑道冠兩儀之先名絶萬世之始者固言語所不得辨稱謂所莫能筌焉云何以文字述今云何以金石傳古其遂休也則日月空照遂嘿也則生人長昏是故出關導以兩巻將升摛其五文令懐靈抱識之士知杳㝠之有精焉自時厥後奕代間出雲篆龍章之牒炳發於林岫環辭麗氣之㫖藻蔚於庭筵其可以垂軌範著謡誦者迄于茲辰昔在中葉甘左見駭於魏王象奉擅竒於呉主至如葛仙公之才英俊邁盖其尤彰彰者矣公于時雖歴游名岳多居此嶺此嶺乃非洞府而跨據中川東視則連峰入海南眺則重嶂切雲西臨江滸北旁郊邑斯潛顯之奥區出處之關津半尋石井日汲莫測其源三足白麂百齡不異其質精靈之所弗渝神祇之所司衛麻衣史宗之儔相繼棲託後有孫慰祖亦嗣居彌嵗山隂潘洪字文盛少秉道性志力剛眀前住餘姚四眀隩國為立觀直上百里榛途險絶既術識有用為物情所懐天監七年郡邑豪舊遂相率輿出制不由巳以此山在五縣衝要舍而留止于兹十有五載將欲移憩壇上先有一空碑久巳摧倒洪意以為䕃其樹者尚愛其枝况仙公真聖之遺蹤而可遂淪乎乃復建新碑於其所願勒名迹以永傳隐居不逺千里寓斯石而鐫之仙公姓葛諱𤣥字孝先丹陽句容都鄉吉陽里人也本屬瑯耶後漢驃騎僮侯廬讓國於弟來居此土七代祖艾即驃騎之弟襲封僮侯祖矩安平太守黄門郎從祖彌豫章等五郡太守父焉字徳儒州主簿山隂令散騎常侍大尚書代載英哲族冠吳史公㓜負奇操超絶倫黨神挺標峻精輝卓逸墳典不學而知道術纔聞已了非復軌儀所範思識所該特以域之情理之外置之言象之表而已呉初左元放自洛而來授公白虎七變爐火九丹於是五通具足化遁無方孫權雖愛賞仙異而内懐猜害翻琰之徒皆被挫斥敬憚仙公動相諮禀公馳涉川岳龍虎衛從長山盖竹九多去來天台蘭風是焉逰憇特還京邑視人如戲詭譎倜儻縱倒山河雖投鳬履墜叱羊石起蔑以加焉於時有人漂海隨風𦕈渀無垠忽值神島見人授書一函題曰寄葛公令歸呉達之由是舉代翕然號為仙公故抱朴著書亦云余從祖仙公乃抱朴三代從祖也俗中經傳所談云巳被太極銓授居左仙公之位如真誥并葛氏舊譜則事有未符恐教迹參差適時立説猶如執㦸侍陛豈謂三摘靈桃徒見接神投鬼安知止在散職一以權道推之無所復論其異同矣仙公赤烏七年太歲甲子八月十五日平旦升仙長往不返恒與郭聲子等相隨久當授任𤣥都祗秩天爵佐命四輔理察人祗瞻望舊鄉能無纍纍之歎顧盼後學庶垂汲引之慈敢藉邦族永班仰述真仙遺則云爾九垓夐絶七度虚懸分空置境聚氣搆天物滋數後化超象前命隨形轉神寄業傳霜野於襄竹柏翠微泉墟共往彭羡獨歸生因事攝年以學仙如金在冶如布在機仙公珪警臨齠發穎襄童比跡項孺聨影濯質綺闈凝心黛嶺虎變巳攄龍輈遂騁朅來台霍偃蹇蘭穹碧壇自肅玉水不窮巡芳沐道懐古測衷表茲峻碣永扇髙風蘭風寓憇已勒豐碑此土舊居未鐫貞琰今之逺裔仰慕清塵敬思刋樹傳芳來葉茅山長沙館碑夫萬象森羅不離兩儀所育百法紛湊無越三教之境縉紱之士飾禮容於闈閣耿介之夫敭旌麾於山裔銘曰大哉乾元萬物資始皇王受命三才乃理惟聖感神惟神降祉徳被歌鍾名昭圖史友于兄弟敬惟西宣言追茂寔用表遺先敢循舊制有革雜章刋石弗朽奕代流芳太平山日門館碑日門館者東霞啓暉開巖引燭以為名也先是呉郡杜徴君聲髙兩代徳冠四區教義宣流播乎數郡拓宇太平之東結架菁山之北爰以此處幽奇别就基搆栖集有道多歴世年茅山曲林館銘層嶺外峙䆳宫内映仄穴旁通縈泉逺鏡尚徳依仁祈生翊命且天且地若凡若聖連甍比棟各謂知道参差經術跌宕辭藻熟如曲林獨為勁好掩迹韜功守兹偕老文授陸敬游十賚文隠居先生遺總事弟子載烜秉策執簡膝授前學弟子呉郡陸敬游建連石之邑為栖静處士策文曰咨爾敬游昔我紆紱帝闈侍笏梁席雖迹混教途而心標逸境芝田之想無忘曉夜濠潁之志歳月已深至徳有鄰風雲相㑹爾之來也爰移兩春於是禠帯青墀掛冠朱闕攜手東驅創居兹嶺脈潤通水徙石開基登崖斵幹越壟負卉筋力盡於登築氣血疲乎趨走肌色憔悴不以暴露為苦心魂空慊寧顧饑寒之弊棟宇既立載罹霜暑於時七稔經始甫訖今日之安爾有勤焉君子不獨居其榮仁人必與物同泰是用邑爾長阿北阪積金山連石之鄉方七十歩澗水屬焉茂爾嘉業永為華陽上賓爾其莅之其一爾以誠慤為性恬澹為情質直居本沈重樹志不邀世才髙謝時俗權謀詭譎非意所欲今故賚爾為栖靜處士可謂因徳立號克終斯美其二爾基架館境營劃援域堂壇宏敞樓路通嚴官私行止並有栖憇繕築之勞莫匪爾力今故賚爾四霤飛軒廂廊側屋可以安身静卧顯祗遐福其三爾奉上惟勤接下以惠稼穡艱難備嘗勞苦貨殖之宜允贍糧服手足胼胝未獲告休櫛風沐雨於焉尤切今故賚爾蒼頭一人厥名多益可以傳代薪水省息劬劇其四爾族惟舊緒身乃邦聞道雖一貫事望宜分今故賚爾鋼鐵如意可以揮對賓僚即名立事其五爾崇教惟善法無偏執器服表用爰寄玩習今故賚爾笻竹錫杖可以振動三界精祗憚響其六爾期誠𤣥契遐想靈風至懐所詣因心則通今故賚爾香爐一枚熏陸副之可以騰煙紫閣昭感上司其七爾澡形潔藏肴糧既去宣導松术實資芳醑今故賚爾杯盤一具可以夕挹桂漿朝承菊露其八爾敬事經誥遵尚楷模翰墨之用於是乎在今故賚爾大硯一面紙筆副之可以臨文寫字對真受言其九爾真心内固清行外彰滌蕩紛穢表裏雪霜今故賚爾鍮石澡罐手巾為副可以登齋朝拜出入盥潄其十今賚爾十事事凖前史可對揚嘉策循言求理無或驕惰以騫斯㫖援筆申懐敢告處士詞請雨詞乙未夏六月旱不雨積旬隠居與周共作辭朱書青紙於静中奏之周夜夢一人稱趙丞使下官相聞前辭言語乃好但請雨應墨書請晴應朱書願更墨書周乃作墨辭於庭壇自奏明旦周向家云今日中當雨爾旦天清赤熱了無雨意至禺中周來入嶺至上便見風雲卒起未達隠居間於路便雨得好溜唯在一山周迴左右耳華陽隠居陶𢎞景道士周子良詞竊尋下民之命粒食為本農工所資在於潤澤頃亢旱積旬苗稼焦涸逺近嗷嗷瞻天雀息百姓祈請永無感降伏聞雨水之任有所司存願哀憫黔首霈垂霑渥呵風召雲膚寸而合使洪潦溢川水陸咸濟則白鵠之詠復興於今共伸至誠稽顙詞情謹詞詩寒夜怨夜雲生夜鴻驚悽切嘹唳傷夜情空山霜滿髙煙平鉛華沈照帳孤眀寒月微寒風𦂳愁心絶愁淚盡情人不勝怨思來誰能忍胡笳曲自戾飛天歴與奪徒紛紜百年三五代終是甲辰君舊集作負扆非天歴詔問山中何所有賦詩以答山中何所有嶺上多白雲只可自怡悦不堪持寄君題所居壁夷甫任散誕平叔坐談空不意昭陽殿化作單于宫和約法師臨友人我有數行淚不落十餘年今日為君盡併灑秋風前告逝篇性靈昔既肇緣業久相因即化非㝠滅在理澹悲欣冠劒空衣影鑣轡乃仙身去此昭軒侣結彼瀛臺賓儻或踵留轍為子道𤣥津漢魏六朝百三家集巻八十九
