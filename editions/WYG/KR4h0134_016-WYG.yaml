body:
  text: 漢魏六朝百三家集巻十六漢馬融集題詞漢世通儒並推季長盧涿郡鄭北海咸出其門家世貴戚居養豐澤即坐高堂施絳帳著書授生徒以老亦足以傳何汲汲榮仕也廣成一頌雕鏤萬物名雖諷諌鄧氏意在炫才感衆寧知適逢彼怒乎東巡頌質古簡言似季長韜光之作安帝見而竒之召拜郎中文之遇不遇豈人意所及哉西羌反叛馬賢胡疇畱兵不進季長懐河上之憂上書求効又陳星孛參畢戎狄將起觀其撫時奮發誠恥儒冠同腐草木乃心懲鄧氏恐怖梁冀既頌將軍西第又誣奏李太尉於死代人匠斵㸃染名賢斯文墜地百身莫贖矣季長注孝經云忠猶有闕述仲尼之説而作忠經其文常人耳及讀本傳並未云季長作忠經然則忠經果馬氏之書歟予不敢信也范史譏融慮深垂堂不及胥靡予亦哀其儒者風流自隕漢陽之節重負南山摰季直矣目録賦長笛賦圍棋賦摴蒱賦琴賦疏上安帝請龎參等書上論日蝕疏上順帝乞自効疏頌廣成頌東巡頌書為梁冀誣奏太尉李固書與謝伯世書與竇伯向書序忠經序著述忠經漢魏六朝百三家集巻十六目錄欽定四庫全書漢魏六朝百三家集巻十六明張溥輯漢馬融集賦長笛賦有序融既博覽典雅精覈數術又性好音律能鼓琴吹笛而為督郵無留事獨臥郿縣平陽塢中有雒客舎逆旅吹笛為氣出精列相龢融去京師踰年蹔聞甚悲而樂之追慕王子淵枚乘劉伯康傅武仲等簫琴笙頌唯笛獨無故聊復備數作長笛賦其辭曰惟籦籠之奇生兮於終南之陰崖託九成之孤岑兮臨萬仞之石磎特箭槀而莖立兮獨聆風於極危秋潦潄其下趾兮冬雪椯封乎其枝巔根跱之槷刖兮感迴颷而將頽夫其面旁則重巘増石簡積頵砡兀㟺􅀈􅤹傾昃倚伏庨窌巧老港洞坑谷嶰壑澮㟋􅥥窞巖􅠈運裛窏洝岡連嶺屬林簫蔓荆森槮柞樸於是山水猥至渟涔障潰顄淡滂流碓投瀺穴爭湍苹縈汨活澎濞波瀾鱗淪窊隆詭戾􅘝瀑噴沫犇遯碭突搖演其山動杌其根者嵗五六而至焉是以間介無蹊人迹罕到猨蜼晝吟鼯䑕夜呌寒熊振頷特麚昏髟山雞晨羣野雉朝雊求偶鳴子悲號長嘯由衍識道噍噍讙譟經涉其左右哤聒其前後者無晝夜而息焉夫固危殆險巇之所迫也衆哀集悲之所積也故其應清風也纎末奮􅀢錚鐄謍嗃若絙瑟促柱號鍾髙調於是放臣逐子棄妻離友彭胥伯竒哀姜孝已攅乎下風收精注耳靁歎頽息搯膺擗摽泣血泫流交横而下通旦忘寐不能自禦於是乃使魯般宋翟搆雲梯抗浮柱蹉纎根䟦篾縷膺峭阤腹陘阻逮乎其上匍匐伐取挑截本末規摹彠矩䕫襄比律子野協呂十二畢具黄鍾為主矯揉斤械剸剡度擬鏓硐隤墜程表朱裏定名曰笛以觀賢士陳於東階八音俱起食舉雍徹勸侑君子然後退理乎黄門之髙廊重丘宋灌名師郭張工人巧士肄業修聲於是游閒公子暇豫王孫心樂五聲之龢耳比八音之調乃相與集乎其庭詳觀夫曲𦙍之繁㑹叢雜何其富也紛葩爛漫誠可喜也波散廣衍實可異也牚距劫遌又足怪也啾咋嘈啐似華羽兮絞灼激以轉切震鬱怫以馮怒兮耾碭駭以奮肆氣噴勃以布覆兮乍跱蹠以狼戾靁叩鍛之岌峇兮正瀏漂以風冽薄湊㑹而凌節兮馳趣期而赴躓爾迺聽聲類形狀似流水又象飛鴻氾濫溥漠浩浩洋洋長矕逺引旋復迴皇充屈鬱律瞋菌碨柍酆琅磊落駢田磅唐取予時適去就有方洪殺衰序希數必當微風纎妙若存若亡藎滯抗絶中息􅀢裝奄忽滅没曄然復揚或乃聊慮固護専美擅工漂凌絲簧覆冒鼓鐘或乃植持縼纒佁儗寛容簫管備舉金石竝隆無相奪倫以宣八風律呂既龢哀聲五降曲終闋盡餘絃更興繁手累發宻櫛疊重踾踧攅仄蜂聚蟻同衆音猥積以送厥終然後少息暫怠雜弄間奏易聽駭耳有所搖演安翔駘蕩從容闡緩惆悵怨懟窳圔窴􅎼聿皇求索乍近乍逺臨危自放若頽復反蚡緼蟠紆緸寃蜿蟺笢笏抑隱行入諸變絞槩汨湟五音代轉挼拏捘臧遞相乗邅反商下徴每各異善故聆曲引者觀法於節奏察度於句投以知禮制之不可踰越焉聽簉㺯者遥思於古昔虞志於怛惕以知長戚之不能閒居焉故論記其義協比其象彷徨縱肆曠瀁敞罔老荘之概也温直優毅孔孟之方也激朗清厲隨光之介也牢刺拂戾諸賁之氣也節解句斷管商之制也條決繽紛申韓之察也繁縟絡繹范蔡之説也剺櫟銚㦎晢龍之惠也上擬法於韶箾南籥中取度於白雪渌水下采制於延露巴人是以尊卑都鄙賢愚勇懼魚鼈禽獸聞之者莫不張耳鹿駭熊經鳥伸鴟視狼顧拊譟踊躍各得其齊人盈所欲皆反中和以美風俗屈平適樂國介推還受禄澹臺載尸歸臯魚節其哭長萬輟逆謀渠彌不復惡蒯瞶能退敵不占成節鄂王公保其位隱處安林薄宦夫樂其業士子世其宅鱏魚喁於水裔仰駟馬而舞𤣥鶴於斯時也綿駒吞聲伯牙毁絃瓠巴聑柱磬襄弛懸留眎瞠眙累稱屢讚失容墜席搏拊雷抃焦眇睢維涕洟流漫是故可以通靈感物寫神喻意致誠效志率作興事溉盥汙穢澡雪垢滓矣昔庖羲作琴神農造瑟女媧制簧暴辛為塤倕之和鐘叔之離磬或鑠金礱石華睆切錯丸梴彫琢刻鏤鑚笮窮妙極巧曠以日月然後成器其音如彼唯笛因其天姿不變其材伐而吹之其聲如此葢亦簡易之義賢人之業也若然六器者猶以二皇聖哲黈益况笛生乎大漢而學者不識其可以禆助盛美忽而不讚悲夫有庶士丘仲言其所由出而不知其𢎞妙其辭曰近世雙笛從羌起羌人伐竹未及已龍吟水中不見已截竹吹之聲相似剡其上孔通洞之裁以當簻便易持易京君明識音律故本四孔加以一君明所加孔後出是謂商聲五音畢督郵官名主諸縣罰負殿糾攝之也鄔里名又營居曰鄔氣出精列古曲名劉𤣥字伯康作簧賦籦籠竹名九成九重也箭幹謂之槀椯與團古字通聚也巔根根生於巔也􅈏刖危貌感觸也頽墜也面旁正面側旁也山之下小上濶者曰巘簡大也頵砡石齊頭貌兀㟺狋􅤹峻險貌庨窌巧老深空貌港洞相通也小山别大山曰嶰澮㟋嶰壑深平貌􅥥即坎也窞坎中小坎也􅠈窟也良注曰嶰壑澮㟋寛大而相連也􅥥巖􅠈山下深闇窟穴也運裛迴旋相纒也窏洝卑下也向注運裛隂陽運氣裛之也窏洝氣之潤濕也林簫小竹蔓荆柞樸皆木名森槮長貌竹與諸物雜生也此言笛所産之地也猥衆也渟涔池也障隄也潰壊也顄淡滂流水搖蕩廣大貌碓舂也瀺穴水注成穴也言水似舂之投瀺穴也爭湍急水苹縈迴旋也汨活疾貌澎濞波聲鱗淪相次貌窊隆高下貌詭戾猶竒異也􅘝瀑沸涌也蜼似獼猴鼯䑕一名夷􅀈一名飛生聲如人呼頷頥也昏視也髟鬛也迴視而起鬐鬛也由衍行貌哤亂聲􅀢與稍同動也錚鐄大聲謍小聲嗃大呼也絙急絃也號鐘琴名言風動竹聲如急絃促柱鳴琴髙調也彭彭咸諫紂不從而奔胥伍子胥伯竒尹吉甫之子聽後妻言逐之自傷無罪投河而死哀姜魯文公夫人子不得立而被殺歸齊過市而哭孝已殷中宗子事親一夜五起聽後妻言逐之搯膺叩心也擗摽拊心貌言竹未成笛時水盪其根風動其梢而有此感人也陁落也岸峭者必陁言險也陘斷山也以膺服於峭阤而腹突於陘阻也彠飾也䕫后䕫襄師襄子野師曠字十二六律六吕也黄鍾宫聲也宫為君故以為主矯揉者以火矯之斤械者以斧理之剸裁也剡鋭也鍃大鑿中木也謂以木通節中也硐磨也隤墜竹節之屑墜落也翰注云硐以刀通節中也程示也程表外不加飾也朱裏以朱塗其内也以其滌穢故可觀士黄門署名習樂之處重丘地名宋灌郭張四姓漢時善樂者重丘所出也𦙍善注曰曲也濟注曰曲長曰𦙍也紛葩爛熳聲散而多波散廣衍聲散而逺牚柱也逆觸也啾咋聲衆而大也嘈啐聲貌鶡冠子曰南方萬物華羽焉故調以羽謂南方火其聲烈也絞灼激聲相繞激也憑怒大怒也耾聲貌碭突也氣噴勃氣結笛中聲不散也布覆氣通而四覆也跱蹠其聲跱立如有所蹠履也鍛椎也岌峇叩椎之聲瀏漂風冽聲随風而清寒也薄凑㑹聲相集凑而㑹合也節曲之節其聲溢出故曰凌節馳疾也期亦節也躓下也疾趣則其聲散而赴于下也琴道曰伯夷操似鴻雁之音故云象飛鴻矕善注視也翰注被也言似流水飛鴻相被逺引不絶也旋復迴皇去住不定髙下不常貌充屈二句善注衆聲鬱積競出貌濟注鬱結不散貌酆琅二句衆聲宏大四布貌衰序差其次序也藎與燼同餘也抗極也裝束也更裝者謂中道息聲更調理而次之也抗絶則奄忽而滅更裝則又復揚也聊慮精心也固䕶堅志也漂凌謂過之覆冒謂掩之也縼繩也植立而相引持似縼纒也佁儗寛閒貌八風八方之風降罷退也言聲成五降而息也餘絃笛聲似擊絃之餘響也宻櫛宻如櫛也踾踧迫蹙也攅仄攅聚也踾踧二句正衆音猥積之狀曲將終衆音畢出而送之也揺演心神清貌安翔駘蕩從容闡緩皆聲初發或起或伏寛容閑緩也窳圔聲下貌窴􅎼聲緩也聿皇疾貌求索相合擊也蚡蝹蟠紆聲相糺紛也緸寃蜿蟺盤屈搖動貌笢笏抑隱手尋笛孔也絞槩汨湟聲相切磨也挼拏捘臧謂索持而推抑之也邅邅迴也反商下徵變調也引亦曲也投與逗古通猶章句也簉弄小曲也翰云簉雜也長戚長憂也間居獨處也節奏句逗之中有禮制此正聲也簉弄則繁雜小聲矣故逺想古人心虞怛惕也曠瀁敞罔寛大間幽也牢刺牢落乖刺也繽亂也紛五臣作理亂而能理也􅋇櫟銚㦎分别節制之貌晢龍鄧晢公孫龍皆辯士也南籥以籥舞也文王之樂白雪渌水古曲名延露巴人小曲也鹿性多驚故云駭熊經如熊之攀樹而引氣也鳥伸引頸也鴟視舉首而視狼顧反顧也各得其齊言得其分齊不相踰也屈平以下言各反其常性也左傳曰介之推從晉文公出亡後賞從亡者推不言禄隱而死博物志曰澹臺子溺於江弟子欲收之曰螻蟻何親魚鱉何仇弟子曰何夫子之不慈乎曰生為吾子死非吾鬼遂不收𦵏詩傳曰孔子出遊聞哭聲甚悲則臯魚也問其故曰吾少好學周流天下吾親死一失也髙尚其志不事庸君而晚仕無成二失也少擇交遊寡親友老無所託三失也樹欲靜而風不寜子欲養而親不待立哭而死左傳曰南宫長萬弑宋閔公又曰鄭伯將以髙渠彌為卿昭公惡之固諌不聽昭公立弑之又曰蒯瞶衛太子登鐵丘望鄭師衆自投車下詩傳曰陳不占齊人崔杼弑莊公不占將徃赴之食則失哺上車失軾其僕曰敵在數百里外而懼怖如此雖徃其益乎不占曰死君之難義也無勇私也至公門外聞鐘鼓聲駭而死喁魚口上見也魚喁水裔即伯牙鼓琴魚出聽也仰秣即瓠巴鼓瑟駟馬仰秣也尚書大傳曰虞舜歌樂曰和伯之樂舞𤣥鶴聑安也瞠直視也眙驚貌搏拊舉手也雷抃同拊手也焦眇睢維目開合之貌暴辛周時諸侯塤土樂燒土為之大如鷄卵三孔倕舜時人丘仲漢武時人不見已不見其身也聲相似與龍吟相似也剡削也簻馬策也易京京房也字君明武帝時人修易故曰易京尤好音律知五聲笛本四孔少商聲房加孔于下為商也椯團槷臬飇標頵氲砡玉㟺簍狋宜􅤹凝庨囂窌砲㟋兌􅥥坎窞淡􅠈伏窏汙洝遏槮參柞乍顄憾􅘝學碭唐蜼位頷憾麚加髟標噍啾謍榮絙亘阤褫彠畫鏓悤硐同遌迕耾宏峇渴矕蠻縼愁戀切佁翅儗毅窳窊圔盍􅎼赧緸因蟺善笢泯挼嗺簉初救切剺棃㦎獲鱏尋聑跕眙翅睆患梴抽延切笮鑿黈偷上聲簻撾圍棋賦略觀圍棋兮法於用兵三尺之局兮為戰鬬場陳聚士卒兮兩敵相當拙者無功兮弱者先亡自有中和兮請説其方先據四衜兮保角依旁緣邉遮列兮往往相望離離馬首兮連連雁行踔度閒置兮裵徊中央違閣奮翼兮左右翺翔道狭敵衆兮情無逺行棋多無笧兮如聚羣羊駱驛自保兮先後來迎攻寛擊虚兮蹌跭内房利則為時兮便則為强厭于食兮壞決垣墻堤潰不塞兮泛濫逺長横行陣亂兮敵心駭惶迫兼棋雞兮頗棄其裝巳下險口兮鑿置清坑窮其中罫兮如䑕入囊收死卒兮無使相迎當食不食兮反受其殃勝負之策兮于言如髪乍緩乍急兮上且未别白黑分亂兮于約如葛雜亂交錯兮更相度越守規不固兮為所唐突深入貪地兮殺亡士卒狂攘相救兮先後并没上下離遮兮四面隔閉圍合罕散兮所對哽咽韓信將兵兮難通易絶自陷死地兮設見權譎誘敵先行兮往往一窒損褰委食兮三將七卒馳逐爽問兮轉相周宻商度地道兮期相盤結蔓延連閣兮如火不滅扶疎布散兮左右流溢浸淫不振兮敵人愳慄迫役踧踖兮惆悵自失計功相除兮以時早訖事留變生兮收拾欲疾營惑窘乏兮無令詐出深念逺慮兮勝乃可必摴蒱賦昔𤣥通先生遊於京都衜悳既備好此摴蒱伯陽入戎以斯消憂枰則素旃紫罽出乎西鄰縁以繢繡紩以綺文桮則揺木之幹出自崑山矢則藍田之石卞和所攻含精玉潤不細不洪馬則𤣥犀象牙是磋是礲桮為上將木為君副齒為號令馬為翼距籌為策動天法卒數於是芬葩貴戚公侯之儔坐華榱之髙殿臨激水之清流排五木散九齒勒良馬取衜里是以戰無常勝時有逼逐臨敵攘圍事在將帥見利電發紛綸滂沸精誠一呌十盧九雉磊落踸踔并來猥至先名所射應聲紛潰勝貴歡悅負者沈悴琴賦惟梧桐之所生在衡山之峻陂於是遨閒公子中道失志孤煢特行褱閔抱思昔師曠三奏而神物下降𤣥鶴二八軒舞於庭何琴徳之深哉疏上安帝請龎參等書元初中參為護羌校尉擊先零羌為其所敗乃稱病引兵還坐詐徵下獄校書郎中馬融上書請之書奏赦參等伏見西戎反叛冦鈔五州陛下愍百姓之傷痍哀黎元之失業單竭府庫以奉軍師昔周宣獫狁侵鎬及方孝文匈奴亦略上郡而宣王立中興之功文帝建太宗之號非惟兩主有明叡之資抑亦扞城有虓虎之助是以南仲赫赫列在周詩亞夫赳赳載于漢策竊見前護羌校尉龎參文武昭備智略𢎞逺既有義勇果毅之節兼以博雅深謀之姿又度遼將軍梁慬前統西域勤苦數年逺留三輔功効克立間在北邊單于降服今皆幽囚陷于法網昔荀林父敗績于邲晉侯使復其位孟明視喪師於崤秦伯不替其官故晉景并赤狄之土秦穆遂覇西戎宜逺覽二君使參慬得在寛宥之科誠有益于折衝毗佐于聖化上論日蝕疏延光四年三月戊午朔日有蝕之在胃十二度隴西酒泉朔方各以狀上史官不覺是時融為許令上書伏讀詔書陛下深惟禹湯罪已之義歸咎自責寅畏天戒詳延百僚博問公卿知變所自審得厥故修復往術以答天命臣子逺近莫不延頸企踵茍有隙空一介之知事願自效貢納聖聽臣伏見日蝕之占自昔典籍十月之交春秋傳記漢注所載史官占候羣臣宻對陛下所觀覽左右所諷誦可謂詳悉備矣雖復廣問陷在前志無以復加乃者茀氣於參臣前得敦朴之人後三年二月對䇿北宫端門以為參者西方之位其於分野并州是也殆謂西戎北狄其後種羌叛戾烏桓犯上郡并涼動兵驗略效矣今復見大異申誡重譴於此二城海内莫見三月一日合辰在婁婁又西方之宿衆占顯明者羌及烏桓有悔過之辭將吏策勲之名臣恐受任典牧者茍脫目前皆粗圗身一時之權不顧為國百世之利論者美近功忽其逺則各相不大疢病伏惟天象不虚老子曰圗難於其易也為大於其細也消災復異宜在於今詩曰日月告凶不用其行四國無政不用其良傳曰國無政不用善則自取謫于日月之災故政不可不慎也務三而巳一曰擇人二曰安民三曰從時臣融伏惟方今有道之世漢典設張侯甸采衛司民之吏案繩循墨雖有殿最所差無㡬其陷罪辟身自取禍百姓未被其大傷至邊郡牧御失和吉之與凶敗之與成優劣相懸不誡不可審擇其人上以應天變下以安民𨽻竊見列將子孫生長京師食仰租奉不知稼穡之艱又希遭阨困故能果毅輕財施與孤弱以獲死生之用此其所長也不拘法禁奢泰無度功勞足以宣威踰濫足以傷化此其所短也州郡之士出自貧苦長於檢柙難専賞罰不敢越溢此其所長也拘文守法遭遇非常狐疑無斷畏首畏尾威恩纎薄外内離心士卒不附此其所短也必得將兼有二長之材無二短之累參以吏事任以兵法有此數姿然後能折衝厭難致其功實轉災為福孔子曰十室之邑必有忠信如丘者焉以天下之大四海之衆云無若人臣以為誣矣宜特選詳譽審得其真鎮守二方以應用良擇人之義以塞大異也上順帝乞自効疏融陽嘉中大將軍梁商表為從事中郎轉武都太守時西羌反叛征西將軍馬賢與護羌校尉胡疇征之稽遲不進融知其將敗上疏乞自効朝廷不能用今雜種諸羌轉相鈔盜宜及其未并亟遣深入破其支黨而馬賢等處處留滯羌胡百里望塵千里聽聲今逃匿避囘漏出其後則必侵冦三輔為民大害臣願請賢所不可用闗東兵五千裁假部隊之號盡力率厲埋根行道以先軍士三旬之中必克破之臣少習學蓺不更武職猥陳此言必受誣罔之辜昔毛遂厮養為衆所蚩終以一言克定從要臣懼賢等專守一城言攻於西而羌出於東且其將士必有高克潰叛之變頌廣成頌融拜校書郎中詣東觀典校秘書是時鄧太后臨朝騭兄弟輔政謂文徳可興武功宜廢遂寢蒐狩之禮息戰陳之法故猾賊從横乘此無備融乃感激以為文武之道聖賢不墜五才之用無或可廢元初二年上廣成頌以諷諫頌奏忤鄧氏滯於東觀十年不調臣聞孔子曰奢則不遜儉則固奢儉之中以禮為界是以蟋蟀山樞之人並刺國君諷以太康馳驅之節夫樂而不荒憂而不困先王所以平和府藏頥養精神致之無疆故戛擊鳴球載於虞謨吉日車攻序於周詩聖主賢君以增盛美豈徒為奢淫而巳哉伏見元年以來遭值戹運陛下戒懼災異躬自菲薄荒棄禁苑廢弛樂懸勤憂潛思十有餘年以過禮數重以皇太后體唐堯親九族篤睦之徳陛下履有虞烝烝之孝外舍諸家每有憂疾聖恩普勞遣使交錯稀有曠絶時時寜息又無以自娛樂殆非所以逢迎太和裨助萬福也臣愚以為雖尚頗有蝗蟲今年五月以來雨露時澍祥應將至方涉冬節農事間隙宜幸廣成覽原隰觀宿麥勸收藏因講武校獵使寮庶百姓復覩羽旄之美聞鐘鼓之音歡欣喜樂鼓舞疆畔以迎和氣招致休慶小臣螻蟻不勝區區職在書籍謹依舊文重述蒐狩之義作頌一篇并封上淺陋鄙薄不足觀省臣聞昔命師於鞬櫜偃伯于靈臺或人嘉而稱焉彼固未識夫雷霆之為天常金革之作昬明也自黄炎之前傳道罔記三五以來越可略聞且區區之酆郊猶廓七十里之囿盛春夏之苗詩詠圃草樂奏騶虞是以大漢之初基也宅兹天邑總風雨之㑹交隂陽之和揆厥靈囿營于南郊徒觀其坰場區宇恢􅇇曠蕩藐夐勿罔寥豁鬱泱騁望千里天與地莽於是周阹環瀆右矕三塗左概嵩嶽面據衡隂箕背王屋浸以波溠夤以滎洛金山石林􅇻起乎其中峨峨磑磑鏘鏘􅞐􅞐隆穹槃囘嵎峗錯崔神泉側出丹水涅池怪石浮磬燿焜于其陂其土毛則㩁牧薦草芳茹甘荼茈萁芸蒩昌本深蒲芝荋堇荁蘘荷芋蕖桂荏鳬葵格韮菹于其植物則𤣥林包竹藩陵蔽京珍林嘉樹建木叢生椿梧栝柏柜栁楓楊豐彤對蔚崟頟槮爽翕習春風含津吐榮鋪于布濩蓶扈蘣熒惡可殫形至于陽月陰慝害作百草畢落林衡戒田焚萊柞木然後舉天網頓八紘揫斂九藪之動物繯槖四野之飛征鳩之乎兹囿之中山敦雲移羣鳴膠膠鄙騃譟讙子野聽聳離朱目眩𨽻首策亂陳子籌昏於時營圍恢廓充斥川谷罦罝羅羉彌綸阬澤臯牢陵山校隊案部前後有屯甲乙相伍戊巳為堅乘輿乃以吉月之陽朔登於疏鏤之金路六驌騻之𤣥龍建雄虹之旌夏揭鳴鳶之修橦曳長庚之飛髾載日月之太常棲招搖與𤣥弋注枉矢於天狼羽毛紛其髟鼬揚金㚇而拖玉瓖屯田車于平原播同徒于髙岡旃旝摻其如林錯五色以摛光清氛埃掃野場誓六師搜雋良司徒勒卒司馬平行車攻馬同教達戒通伐鼛鼓撞華鐘獵徒縱赴榛叢徽嫿霍奕别騖分奔騷擾聿皇往來交舛紛紛囘囘南北東西風行雲轉匈􅐀隱訇黄塵勃滃闇若霧昬日月為之籠光列宿為之翳昧僄狡課才勁勇程氣狗馬角逐鷹鸇競鷙驍騎旁佐輕車横厲相與陸梁聿皇於中原絹猑蹏鏦特肩脰完羝撝介鮮散毛族梏羽羣然後飛鋋電激流矢雨墜各指所質不期俱殪竄伏扔輪發作梧轊祋殳狂擊頭陷顱碎獸不得猭禽不得瞥或夷繇未殊顛狽頓躓蝡蝡蟫蟫充衢塞隧葩華蓱布不可勝計若夫鷙獸毅蟲倨牙黔口大匈哨後緼巡歐紆負隅依阻莫敢嬰禦乃使鄭叔晉婦之徒暌孤刲刺裸裎袒裼冒􅞢柘搓棘枳窮浚谷底幽嶰暴斥虎搏狂兕獄􅀢熊抾封狶或輕訬趬悍廋疏㟺領犯歴嵩巒陵喬松履修樠踔攳枝杪標端尾蒼蜼掎元猨木産盡寓屬單罕罔合部罾弋同曲類行竝驅星布麗屬曹伍相保各有分局矰碆飛流纖羅絡縸遊雉羣驚晨鳬輩作翬然雲起霅爾雹落爾乃􅀢觀髙蹈改乘囘轅泝恢方撫馮夷策句芒超荒忽出重陽厲雲漢横天潢導鬼區徑神場詔靈保召方相驅厲疫走蜮祥捎罔兩拂游光枷天狗緤墳羊然後緩節舒容裴囘安步降集波籞川衡澤虞矢魚陳罟兹飛宿沙田開古蠱翬終葵揚闗斧刋重氷撥蟄户測潛鱗踵介旅逆獵湍瀨渀薄汾撓淪滅潭淵左挈䕫龍右提蛟鼉春獻王鮪夏薦鼈黿於是流覽徧照殫變極態上下究竟山谷蕭條原野嵺愀上無飛鳥下無走獸虞人植旍獵者效具車弊田罷旋入禁囿棲遲乎昭明之觀休息乎高光之榭以臨乎宏池鎮以瑤臺純以金堤樹以蒲柳被以緑莎瀇漾沆漭錯紾槃委天地虹洞固無端涯大明生東月朔西陂乃命壺涿驅水蠱逐罔螭滅短狐簎鯨鯢然後方餘皇連舼舟張雲㠶施蜺幬靡颸風陵迅流發棹歌縱水謳淫魚出􅆱蔡浮湘靈下漢女游水禽鴻鵠鴛鴦鷗鷖鶬鴰鸕鷁鷺鴈鷿鷉乃安斯寢戢翮其涯魴鱮鱏鯿鰋鯉鱨鯋樂我純徳騰踊相隨雖靈沼之白鳥孟津之躍魚方斯蔑矣然猶詠歌於伶蕭載陳於方䇿豈不哀哉於是宗廟既享庖廚既充車徒既簡器械既攻然後擺牲班禽淤賜犒功羣師疊伍伯校千重山罍常滿房俎無空酒正案隊膳夫巡行清醪車湊燔炙騎將鼔駭舉爵鐘鳴既觴若乃陽阿衰斐之晉制闡鼃華羽之南音所以洞蕩匈臆發明耳目疏越藴慉駭恫底伏鍠鍠鎗鎗奏於農郊大路之衢與百姓樂之是以明徳耀乎中夏威靈暢乎四荒東隣浮巨海而入享西旅越蔥嶺而來王南徼因九譯而致貢朔狄屬象胥而來同葢安不忘危治不忘亂道在乎兹斯固帝王之所以曜神武而折遐衝者也方今大漢收功于道徳之林致平於仁義之淵忽蒐狩之禮闕槃虞之佃闇昧不覩日月之光聾昬不聞雷霆之震於今十二年為日久矣亦方將刋禁臺之秘藏發天府之官常繇質要之故業率典刑之舊章采清原嘉岐陽登俊傑命賢良舉淹滯㧞幽荒察淫侈之華譽顧介特之實功聘畎畝之羣雅宗重淵之潛龍乃儲精山藪歴思河澤目矖鼎俎耳聽康衢營傅說於胥靡求伊尹於庖廚索膠鬲於魚鹽聽寗戚於大車俾之昌言而宏議軼越三家馳騁五帝悉覽休祥總括羣瑞遂棲鳳皇於髙梧宿麒麟於西園納僬僥之珍羽受王母之白環永逍遥於宇内與二儀乎無疆貳造化於后土參神施於昊乾超特達而無儔煥巍巍而無原豐千億之子孫歴萬載而永延禮樂既闋北轅反斾至自新城背伊闕反洛京東巡頌安帝親政召融還郎署復在講部出為河間王廐長時車駕東巡岱宗融上東巡頌帝竒其文召拜郎中允廸在昔紹烈陶唐􅇻天衷克搖光若時則運瓊衡敷六典經八成肆類乎上帝實柴乎三辰禋祀乎六宗祗燎乎羣神遂發號羣司申戒百工卜筮稱吉􅆱龜襲從南征有時馮相告祥清夷道而後行曜四國而揚光展聖義於巡狩喜圻畤而咏八荒指宗嶽以為期固岱神之所望散齋既畢越翼良辰棫槱増搆烈火燔燃暉光四煬炎爛薄天蕭香肆升青煙冒雲珪璋峩峩犠牲潔純鬱鬯宗彜明氷𤣥樽空桑孤竹咸池雲門六八匝變神祗竝存太平御覽經八成下有變和萬殊總領神明二句書為梁冀誣奏太尉李固書質帝初立梁太后委任宰輔固多所匡正冀每相忌疾遂誣奏固時融在座為冀章草冀長史吳祐面責融曰李公之罪成于卿手冀怒起入祐亦竟去書奏太后不聽臣聞君不稽古無以承天臣不述舊無以奉君昔堯殂之後舜仰慕三年坐則見堯于墻食則覩堯於羮斯所謂聿追來孝不失臣子之節者太尉李固因公假私依正行邪離間近戚自隆支黨至於表舉薦達例皆門徒及所辟召靡非先舊或富室財賂子壻婚屬其列在官牒者凡四十九人又廣選賈䜿以補令史募求好馬臨窻呈試出入踰侈輜軿曜日大行在殯路人掩涕固獨胡粉飾貌搔頭㺯姿槃旋偃仰從容冶步曾無慘怛傷悴之心山陵未成違矯舊制善則歸已過則歸君斥逐近臣不得侍送作威作福莫固之甚臣聞台輔之位實和隂陽璇璣不平冦賊姦軌則責在太尉固受任之後東南䟦扈兩州數郡千里蕭條兆人傷損大化陵遲而詆疵先主茍肆狂狷存無廷爭之忠没有誹謗之説夫子罪莫大於累父臣惡莫深於毁君固之過釁事合誅辟與謝伯世書頃憒憒愁思猶不解懷思在竹間放狗逐麋晚秋涉冬大倉出籠黄棘下莵芼以乾葵以送餘日兹樂而已蓺文類聚以憒憒尺牘作憤憤誤送一作自送與竇伯向書章字伯向好學有文與馬融崔瑗同好更相推薦融與章書孟陵奴來賜書見手迹歡喜何量次於面也書雖兩紙八行行七字七八五十六字百一十二言耳馬融集注後漢志馬融對䇿曰大中之道在天為北辰在地為人君序忠經序忠經者葢出於孝經也仲尼説孝者所以事君之義則知孝者俟忠而成之所以答君親之恩明臣子之分忠不可廢于國孝不可弛于家孝既有經忠則猶闕故述仲尼之説作忠經焉今皇上含庖軒之姿韞勛華之徳弼賢俾能無逺不舉忠之與孝天下攸同臣融巖野之臣性則愚朴沐浴徳澤其可默乎作為此經庻少禆補雖則辭理薄陋不足以稱焉忠之所存存於勸善勸善之大何以加於忠孝者哉夫定高卑以章目引詩書以明綱吾師於古曷敢徒然其或異同者變易之宜也或對之以象其意或遷之以就其類或損之以簡其文或益之以備其事以忠應孝亦著為十有八章所以洪其至公勉其至誠信本為政之大體陳事君之要道始於立徳終於成功此忠經之義也謹序忠經天地神明章第一昔在至理上下一徳以徴天休忠之道也天之所覆地之所載人之所履莫大乎忠忠者中也至公無私天無私四時行地無私萬物生人無私大亨貞忠也者一其心之謂矣為國之本何莫繇忠忠能固君臣安社稷感天地動神明而况于人乎夫忠興于身著于家成于國其行一焉是故一于其身忠之始也一于其家忠之中也一於其國忠之終也身一則百禄至家一則六親和國一則萬人理書云惟精惟一允執厥中聖君章第二聖君以聖徳監於萬邦自下至上各有尊也故王者上事於天下事於地中事於宗廟以臨於人則人化之天下盡忠以奉上也是以兢兢戒慎日增其明禄賢官能式敷大化惠澤長久黎民咸懷故得皇猷丕顯行於四方揚於後代以保社稷以光祖考葢聖君之忠也詩云昭事上帝聿懷多福冢臣章第三為臣事君忠之本也本立而後化成冢臣於君可謂一體下行而上信故能成其忠夫忠者豈惟奉君忘身狥國忘家正色直辭臨難死節已矣在乎沈謀潛運正國安人任賢以為理端委而自化尊其君有天地之大日月之明陰陽之和四時之信聖徳洋溢頌聲作焉書云元首明哉股肱良哉庶事康哉百工章第四有國之建百工惟才守位謹常非忠之道故君子之事上也入則獻其謀出則行其政居則思其道動則有儀秉職不囘言事無憚茍利社稷則不顧其身上下用成故昭君徳葢百工之忠也詩云靖共爾位好是正直守宰章第五在官惟明莅事惟平立身惟清清則無欲平則不曲明能正俗三者備矣然後可以理人君子盡其忠能以行其政令而不理者未之聞也夫人莫不欲安君子順而安之莫不欲富君子教而富之篤之以仁義以固其心導之以禮樂以和其氣宣君徳以𢎞大其化明國法以至於無刑視君之人如觀乎子則人愛之如愛其親葢守宰之忠也詩云豈弟君子民之父母兆人章第六天地泰寧君之徳也君徳昭明則隂陽風雨以和人賴之而生也是故祇承君之法度行孝悌於其家服勤稼穡以供王賦此兆人之忠也書云一人元良萬邦以貞政理章第七夫化之以徳理之上也則人日遷善而不知施之以政理之中也則人不得不為善懲之以刑理之下也則人畏而不敢為非也刑則在省而中政則在簡而能徳則在博而久徳者為理之本也任政非徳則薄任刑非徳則殘故君子務於徳修於政謹於刑固其忠以明其信行之匪懈何不理之人乎詩云敷政優優百禄是遒武備章第八王者立武以威四方安萬人也淳徳布洽戎夷禀命統軍之帥仁以懷之義以厲之禮以訓之信以行之賞以勸之刑以嚴之行此六者謂之有利故得師盡其心竭其力致其命是以攻之則克守之則固武備之道也詩云赳赳武夫公侯干城觀風章第九惟臣以天子之命出于四方以觀風聽不可以不聰視不可以不明聰則審于事明則辨於理理辨則忠事審則公君子去其私正其色不害理以傷物不憚勢以舉任惟善是與惟惡是除以之而陟則有成以之而出則無怨夫如是則天下敬職萬邦以寧詩云載馳載驅周爰諮諏保孝行章第十夫惟孝者必貴于忠忠茍不行所率猶非其道是以忠不及之而失其守匪惟危身辱及親也故君子行其孝必先以忠竭其忠則福禄至矣故得盡愛敬之心以養其親施及于人此之謂保孝行也詩云孝子不匱永錫爾類廣爲章第十一明主之為國也任於正去於邪邪則不忠忠則必正有正然後用其能是故師保道徳股肱賢良内睦以文外威以武被服禮樂隄防政刑故得大化興行蠻夷率服人臣和悅邦國平康此君能任臣下忠上信之所致也詩云濟濟多士文王以寧廣至理章第十二古者聖人以天下之耳目為視聽天下之心為心端旒而自化居成而不有斯可謂至理也已矣王者思於至理其逺乎哉無為而天下自清不疑而天下自信不私而天下自公賤珍則人去貪徹侈則人從儉用實則人不偽崇讓則人不爭故得人心和平天下淳質樂其生保其夀優游聖徳以為自然之至也詩云不識不知順帝之則揚聖章第十三君徳聖明忠臣以榮君徳不足忠臣以辱不足則補之聖明則揚之古之道也是以虞有徳咎繇歌之文王之道周公頌之宣王中興吉甫詠之故君子臣於盛明之時必揚之盛徳流滿天下傳于後代其忠矣夫辨忠章第十四大哉忠之為用也施之於邇則可以保家邦施之於逺則可以極天地故明王為國必先辨忠君子之言忠而不佞小人之言佞而似忠而其聞之者鮮不惑矣夫忠而能仁則國徳彰忠而能知則國政舉忠而能勇則國難清故雖有其能必由忠而成也仁而不忠則私其恩知而不忠則文其詐勇而不忠則易其亂是雖有其能以不忠而敗也此三者不可不辨也書云旌别淑忒其是謂乎忠諫章第十五忠臣之事君也莫先于諫下能言之上能聴之則王道光矣諫於未形者上也諫於已彰者次也諫於既行者下也違而不諫則非忠臣夫諫始於順辭中於抗議終於死節以成君休以寧社稷書云木從繩則正后從諫則聖證應章第十六惟天監人善惡必應善莫大於作忠惡莫大於不忠忠則福禄至焉不忠則刑罰加焉君子守道所以長守其休小人不常所以自陷其咎休咎之徵也不亦明哉書云作善降之百祥作不善降之百殃報國章第十七為人臣者官於君先後光慶皆君之徳不思報國豈忠也哉君子有無禄而益君無有禄而已者也報國之道有四一曰貢賢二曰獻猷三曰立功四曰興利賢者國之幹猷者國之規功者國之將利者國之用是皆報國之道惟其能而行之詩云無言不酬無徳不報况忠臣之於國乎盡忠章第十八天下盡忠淳化行也君子盡忠則盡其心小人盡忠則盡其力盡力者則止其身盡心者則洪於逺故明王之理也務在任賢賢臣盡忠則君徳廣矣政教以之而美禮樂以之而興刑罰以之而清仁恵以之而布四海之内有太平音嘉祥既成告于上下是故播於雅頌傳於無窮漢魏六朝百三家集巻十六
