body:
  text: 漢魏六朝百三家集巻一漢賈誼集題詞屈原為楚懐王左徒入議國事出對諸侯深見親任賈生年二十餘呉廷尉言于漢文帝一歳中超遷至大中大夫此兩人者始何常不遇哉讒積忌行欲生無所比古之懐才老死終身不得見人主者悲傷更甚即漢大臣若絳灌東陽數短賈生亦武夫天性不便文學未必讒人罔極如上官子蘭也太史公傳而同之悼彼短命無異沉江漢廷公卿莫能材賈生而用也蔽于不知猶楚譛人耳賈生治安䇿其大者無過減封爵重本業教太子禮大臣數者于天子甚忠敬于功臣宿將無不利也怒之深而逺之疾何為乎史記不載疏䇿班固始條列之世謂于賈生有功然身既疎退哭泣而死焉用文為太史公闕而不録其哀生者深也時政諸疏雜見新書顧倫理博通不如本疏揣摹家庭登獻華屋草創潤色意者亦有殊途乎騷賦辭清而理哀其宋玉景差之徒歟西漢文章莫大乎是非賈生其誰目録賦弔屈原賦旱雲賦虡賦同前服賦騷惜誓疏論時政疏論積貯疏上都輸疏諫鑄錢疏請封建子弟疏諫立淮南諸子疏論過秦論上過秦論中過秦論下漢魏六朝百三家集巻一目録欽定四庫全書漢魏六朝百三家集巻一明張溥輯漢賈誼集賦弔屈原賦恭承嘉惠兮竢罪長沙仄聞屈原兮自湛汨羅造託湘流兮敬弔先生遭世罔極兮迺隕厥身烏虖哀哉兮逢時不祥鸞鳯伏􅇡兮鴟鴞翺翔闒茸尊顯兮讒諛得志賢聖逆曳兮方正倒植謂隨夷溷兮謂跖蹻亷莫邪為鈍兮鉛刀為銛于嗟黙黙生之亡故兮斡棄周鼎寳康瓠兮騰駕罷牛驂蹇驢兮驥垂兩耳服鹽車兮章父薦屨漸不可久兮嗟苦先生獨離此咎兮誶曰巳矣國其莫吾知兮子獨壹鬰其誰語鳯縹縹其髙逝兮夫固自引而逺去襲九淵之神龍兮沕淵濳以自珍偭蟂獺以隠處兮夫豈從蝦與蛭螾所貴聖之神徳兮逺濁世而自臧使麒麟可係而羈兮豈云異夫犬羊般紛紛其離此郵兮亦夫子之故也厯九州而相其君兮何必懐此都也鳯皇翔于千仞兮覽徳輝而下之見細徳之險微兮遥增擊而去之彼尋常之汙瀆兮豈容吞舟之魚横江湖之鱣鯨兮固將制于螻螘旱雲賦惟昊天之大旱兮失精和之正理遥望白雲之蓬勃兮滃滃澹澹而妄止運清濁之澒洞兮正重沓而並起嵬隆崇以崔巍兮時彷彿而有似屈巻輪而中天兮象虎驚與龍駭相搏據而俱興兮妄儷倚而時有遂積聚而合沓兮相紛薄而慷慨若飛翔之從横兮揚波怒而澎濞正雲布而雷動兮相擊衝而破碎或窕電而四塞兮誠若雨而不墜陰陽分而不相得兮更惟貪婪而狼戾終風解而霧散兮遂陵遲而堵潰或深濳而閉藏兮爭離剌而並逝廓蕩蕩其若條兮日昭昭而蕪穢隆盛暑而無聊兮煎砂石而爛煟陽風吸習而熇熇羣生悶懣而愁憒壠畆枯槁而失澤兮壤石相聚而為害農夫埀拱而無事兮釋其耰鉏而下涕悲疆畔之遭禍痛皇天之靡惠惜稚稼之早夭兮離天災而不遂懐怨心而不能已兮竊託咎於在位獨不聞唐虞之積烈兮與三代之風氣時俗殊而不還兮恐功久而壞敗何操行之不得兮政治失中而違節陰氣辟而留滯兮厭暴戾而沈沒嗟乎作孽大劇何辜于天恩澤弗宣嗇夫寡徳羣生不福來何暴也去何躁也孶孶望之其可悼也憭兮慓兮以鬰怫兮念思白雲腸如結兮終怨不雨甚不仁兮布而不下甚不信兮白雲何懟奈何人兮虡賦攷太平以深志象巨獸之屈竒妙彫文以刻鏤舒循尾之采垂舉其鋸牙以左右相指負大鍾而欲飛同前妙彫文以刻鏤兮象巨獸之屈竒兮戴髙角之峩峩負大鍾而顧飛羙哉爛兮亦天地之大式服賦單閼之歳四月孟夏庚子日斜服集余舍止於坐隅貎甚閒暇異物來崪私怪其故發書占之䜟言其度曰野鳥入室主人將去問於子服余何去之􅁻虖告我凶言其災淹速之度語余其期服乃太息舉首奮翼口不能言請對以意萬物變化固亡休息斡流而遷或推而還形氣轉續變化而嬗沕穆亡間胡可勝言禍兮福所倚福兮禍所伏憂喜聚門吉凶同域彼呉彊大夫差以敗越棲㑹稽句踐伯世斯遊遂成卒被五刑傅説胥靡乃相武丁夫禍之與福何異糾纆命不可測孰知其極水激則旱矢激則逺萬物囘薄震蕩相轉雲蒸雨降糾錯相紛大鈞播物坱圠無垠天不可與慮道不可與謀遲速有命烏識其時且夫天地為鑪造化為工陰陽為炭萬物為銅合散消息安有常則千變萬化未始有極忽然為人何足控揣化為異物又何足患小智自私賤彼貴我逹人大觀物亡不可貪夫狥財烈士狥名夸者死權品庻每生怵迫之徒或趨西東大人不曲億變齊同愚士繫俗僒若囚拘至人遺物獨與道俱衆人惑惑好惡積意真人恬漠獨與道息釋智遺形超然自䘮寥廓忽荒與道翺翔乘流則逝得坎則止縱軀委命不私與已其生兮若浮其死兮若休澹虖若深淵之靚氾虖若不繫之舟不以生故自寳養空而游徳人無累知命不憂細故芥蔕何足以疑騷惜誓惜余年老而日衰兮歳忽忽而不反登蒼天而髙舉兮厯衆山而日逺觀江河之紆曲兮臨四海之霑濡攀北極而一息兮吸沆瀣以充虚飛朱鳥使先驅兮駕太一之象輿蒼龍蚴虬於左驂兮白虎騁而為右騑建日月以為葢兮載玉女於後車馳騖於杳㝠之中兮休息虖崑崙之墟樂窮極而不厭兮願從容乎神明渉丹水而駝騁兮右大夏之遺風鴻鵠之一舉兮知山川之紆曲再舉兮睹天地之圜方臨中國之衆人兮託囘飈乎尚羊乃至少原之壄兮赤松王喬皆在旁二子擁瑟而調均兮余因稱乎清商澹然而自樂兮吸衆氣而翺翔念我長生而久僊兮不如反余之故鄉黄鵠後時而寄處兮鴟梟羣而制之神龍失水而陸居兮為螻蟻之所裁夫黄鵠神龍猶如此兮况賢者之逢亂世哉壽冉冉而日衰兮固儃囘而不息俗流從而不止兮衆枉聚而矯直或偷合而茍進兮或隠居而深藏若稱量之不審兮同權槩而就衡或推迻而茍容兮或直言之諤諤傷誠是之不察兮并紉茅絲以為索方世俗之幽昏兮眩白黑之羙惡放山淵之龜玉兮相與貴夫礫石梅伯數諫而至醢兮來革順志而用國悲仁人之盡節兮反為小人之所賊比干忠諌而剖心箕子被髮而佯狂水背流而源竭兮木去根而不長非重軀以慮難兮惜傷身之無功巳矣哉獨不見夫鸞鳯之髙翔兮乃集太皇之壄循四極而囘周兮見盛徳而後下彼聖人之神徳兮逺濁世而自藏使麒麟可得羈而係兮又何以異乎犬羊疏論時政疏臣竊惟事埶可為痛哭者一可為流涕者二可為長太息者六若其它背理而傷道者難徧以䟽舉進言者皆曰天下巳安巳治矣臣獨以為未也曰安且治者非愚則諛皆非事實知治亂之體者也夫抱火厝之積薪之下而寢其上火未及燃因謂之安方今之埶何以異此本末舛逆首尾衡決國制搶攘非甚有紀胡可謂治陛下何不一令臣得熟數之於前因陳治安之䇿試詳擇焉夫射獵之娯與安危之機孰急使為治勞智慮苦身體乏鐘鼔之樂勿為可也樂與今同而加之諸侯軌道兵革不動民保首領匈奴賓服四荒鄉風百姓素朴獄訟衰息大數既得則天下順治海内之氣清和咸理生為明帝沒為明神名譽之美垂於無窮禮祖有功而宗有徳使顧成之廟稱為太宗上配太祖與漢亡極建久安之埶成長治之業以承祖廟以奉六親至孝也以幸天下以育羣生至仁也立經陳紀輕重同得後可以為萬世法程雖有愚幼不肖之嗣猶得䝉業而安至明也以陛下之明逹因使少知治體者得佐下風致此非難也其具可素陳於前願幸無忽臣謹稽之天地騐之往古按之當今之務日夜念此至熟也雖使舜禹復生為陛下計亡以易此夫樹國固必相疑之埶下數被其殃上數爽其憂甚非所以安上而全下也今或親弟謀為東帝親兄之子西鄉而擊今呉又見告矣天子春秋鼎盛行義未過徳澤有加焉猶尚如是况莫大諸侯權力且十此者乎然而天下少安何也大國之王幼弱未壯漢之所置傅相方握其事數年之後諸侯之王大抵皆冠血氣方剛漢之傅相稱病而賜罷彼自丞尉以上徧置私人如此有異淮南濟北之為邪此時而欲為治安雖堯舜不治黄帝曰日中必熭操刀必割今令此道順而全安甚易不肯早為巳迺墮骨肉之屬而抗剄之豈有異秦之季世乎夫以天子之位乘今之時因天之助尚憚以危為安以亂為治假設陛下居齊桓之處將不合諸侯而匡天下乎臣又知陛下有所必不能矣假設天下如曩時淮陰侯尚王楚黥布王淮南彭越王梁韓信王韓張敖王趙貫高為相盧綰王燕陳豨在代令此六七公者皆亡恙當是時而陛下即天子位能自安乎臣有以知陛下之不能也天下殽亂髙皇帝與諸公併起非有仄室之埶以豫席之也諸公幸者迺為中涓其次厪得舍人材之不逮至逺也髙皇帝以明聖威武即天子位割膏腴之地以王諸公多者百餘城少者乃三四十縣徳至渥也然其後十年之間反者九起陛下之與諸公非親角材而臣之也又非身封王之也自髙皇帝不能以是一歳為安故臣知陛下之不能也然尚有可諉者曰疏臣請試言其親者假令悼惠王王齊元王王楚中子王趙幽王王淮陽共王王梁靈王王燕厲王王淮南六七貴人皆亡恙當是時陛下即位能為治乎臣又知陛下之不能也若此諸王雖名為臣實皆有布衣昆弟之心慮亡不帝制而天子自為者擅爵人赦死辠甚者或戴黄屋漢法令非行也雖行不軌如厲王者令之不肯聽召之安可致乎幸而來至法安可得加動一親戚天下圜視而起陛下之臣雖有悍如馮敬者適啟其口七首已䧟其匈矣陛下雖賢誰與領此故疏者必危親者必亂巳然之效也其異姓負彊而動者漢巳幸勝之矣又不易其所以然同姓襲是跡而動既有徵矣其埶盡又復然殃旤之變未知所移明帝處之尚不能以安後世將如之何屠牛坦一朝解十二牛而芒刃不頓者所排擊剝割皆衆理解也至於髖髀之所非斤則斧夫仁義恩厚人主之芒刃也權埶法制人主之斤斧也今諸侯王皆衆髖髀也釋斤斧之用而欲嬰以芒刃臣以為不缺則折胡不用之淮南濟北埶不可也臣竊跡前事大抵彊者先反淮陰王楚最彊則最先反韓信倚胡則乂反貫髙因趙資則又反陳豨兵精則又反彭越用梁則又反黥布用淮南則又反盧綰最弱最後反長沙迺在二萬五千户耳功少而最完埶疏而最忠非獨性異人也亦形埶然也曩令樊酈絳灌據數十城而王今雖以殘亡可也令信越之倫列為徹侯而居雖至今存可也然則天下之大計可知巳欲諸王之皆忠附則莫若令如長沙王欲臣子勿􅉁醢則莫若令如樊酈等欲天下之治安莫若衆建諸侯而少其力力少則易使以義國小則亡邪心令海内之埶如身之使臂臂之使指莫不制從諸侯之君不敢有異心輻輳並進而歸命天子雖在細民且知其安故天下咸知陛下之明割地定制令齊趙楚各為若干國使悼惠王幽王元王之子孫畢以次各受祖之分地地盡而止及燕梁他國皆然其分地衆而子孫少者建以為國空而置之須其子孫生者舉使君之諸侯之地其削頗入漢者為徙其侯國及封其子孫也所以數償之一寸之地一人之衆天子亡所利焉誠以定治而已故天下咸知陛下之亷地制一定宗室子孫莫慮不王下無倍畔之心上無誅伐之志故天下咸知陛下之仁法立而不犯令行而不逆貫髙利㡬之謀不生柴竒開章之計不萌細民鄉善大臣致順故天下咸知陛下之義臥赤子天下之上而安植遺腹朝委裘而天下不亂當時大治後世誦聖一動而五業附陛下誰憚而久不為此天下之埶方病大瘇一脛之大㡬如要一指之大㡬如股平居不可屈信一二指搐身慮亡聊失今不治必為痼疾後雖有扁鵲不能為已病非徒瘇也又苦􅏓盩元王之子帝之從弟也今之王者從弟之子也惠王親兄子也今之王者兄子之子也親者或亡分地以安天下疏者或制大權以偪天子臣故曰非徒病瘇也又苦􅏓盩可為痛哭者此病是也天下之埶方倒縣凡天子者天下之首何也上也蠻夷者天下之足何也下也今匈奴嫚娒侵掠至不敬也為天下患至亡已也而漢歳致金絮采繒以奉之夷狄徴令是主上之操也天子共貢是臣下之禮也足反居上首顧居下倒縣如此莫之能解猶為國有人乎非亶倒縣而已又類辟且病痱夫辟者一靣病痱者一方痛今西邉北邉之郡雖有長爵不輕得復五尺以上不輕得息斥候望烽燧不得卧將吏被介胄而睡臣故曰一方病矣醫能治之而上不使可為流涕者此也陛下何忍以帝王之號而為戎人諸侯埶既卑辱而旤不息長此安窮進謀者率以為是固不可解也亡具甚矣臣竊料匈奴之衆不過漢一大縣以天下之大困於一縣之衆甚為執事者羞之陛下何不試以臣為屬國之官以主匈奴行臣之計請必係單于之頸而制其命伏中行説而笞其背舉匈奴之衆唯上之令今不獵猛敵而獵田彘不搏反冦而搏畜兎翫細娯而不圗大患非所以為安也徳可逺施威可逺加而直數百里外威令不信可為流涕者此也今民賣僮者為之繡衣絲履偏諸縁内之閑中是古天子后服所以廟而不宴者也而庻人得以衣婢妾白縠之表薄紈之裏緁以偏諸羙者黼繡是古天子之服今富人大賈嘉㑹召客者以被牆古者以奉一帝一后而節適今庻人屋壁得為帝服倡優下賤得為后飾然而天下不屈者殆未有也且帝之身自衣皁綈而富民牆屋被文繡天子之后以縁其領庻人㜸妾以縁其履此臣所謂舛也夫百人作之不能衣一人欲天下亡寒胡可得也一人耕之十人聚而食之欲天下亡饑不可得也饑寒切於民之肌膚欲其亡為姦邪不可得也國巳屈矣盜賊直湏時耳然而獻計者曰毋動為大耳夫俗至大不敬也至亡等也至冒上也進計者猶曰毋為可為長太息者此也商君遺禮誼棄仁恩并心於進取行之二歳秦俗日敗故秦人家富子壯則出分家貧子壯則出贅借父耰鉏慮有徳色母取箕箒立而誶語抱哺其子與公併倨婦姑不相説則反脣而相稽其慈子嗜利不同禽獸者亡㡬耳然并心而赴時猶曰蹷六國兼天下功成求得矣終不知反亷愧之節仁義之厚信并兼之法遂進取之業天下大敗衆掩寡智欺愚勇威怯壯陵衰其亂至矣是以大賢起之威震海内徳從天下曩之為秦者今轉而為漢矣然其遺風餘俗猶尚未改今世以侈靡相競而上亡制度棄禮誼捐亷恥日甚可謂月異而歳不同矣逐利不耳慮非顧行也今其甚者殺父兄矣盜者剟寢戸之簾搴兩廟之器白晝大都之中剽吏而奪之金矯偽者出㡬十萬石粟賦六百餘萬錢乘傳而行郡國此其亡行義之尤至者也而大臣特以簿書不報期㑹之間以為大故至於俗流失世壞敗因恬而不知恠慮不動於耳目以為是適然耳夫移風易俗使天下囘心而鄉道類非俗吏之所能為也俗吏之所務在於刀筆筐篋而不知大體陛下又不自憂竊為陛下惜之夫立君臣等上下使父子有禮六親有紀此非天之所為人之所設也夫人之所設不為不立不植則僵不修則壞筦子曰禮義亷恥是謂四維四維不張國乃滅亡使筦子愚人也則可筦子而少知治體則是豈可不為寒心哉秦滅四維而不張故君臣乖亂六親殃戮姦人並起萬民離叛凡十三歳而社稷為墟今四維猶未備也故姦人㡬幸而衆心疑惑豈如今定經制令君君臣臣上下有差父子六親各得其宜姦人亡所㡬幸而羣臣衆信上不疑惑此業一定世世常安而後有所持循矣若夫經制不定是猶渡江河亡維楫中流而遇風波船必覆矣可為長太息者此也夏為天子十有餘世而殷受之殷為天子二十餘世而周受之周為天子三十餘世而秦受之秦為天子二世而亡人性不甚相逺也何三代之君有道之長而秦無道之暴也其故可知也古之王者太子迺生固舉以禮使士負之有司齊肅端冕見之南郊見于天也過闕則下過廟則趨孝子之道也故自為赤子而教固己行矣昔者成王幼在繦抱之中召公為太保周公為太傅太公為太師保保其身體傅傅之徳義師道之教訓此三公之職也於是為置三少皆上大夫也曰少保少傅少師是與太子宴者也故迺孩提有識三公三少固明孝仁禮義以道習之逐去邪人不使見惡行於是皆選天下之端士孝悌博聞有道術者以衛翼之使與太子居處出入故太子迺生而見正事聞正言行正道左右前後皆正人也夫習與正人居之不能毋正猶生長於齊不能不齊言也習與不正人居之不能毋不正猶生長於楚之地不能不楚言也故擇其所嗜必先受業乃得嘗之擇其所樂必先有習迺得為之孔子曰少成若天性習貫如自然及太子少長知妃色則入于學學者所學之官也學禮曰帝入東學上親而貴仁則親疏有序而恩相及矣帝入南學上齒而貴信則長幼有差而民不誣矣帝入西學上賢而貴徳則聖智在位而功不遺矣帝入北學上貴而尊爵則貴賤有等而下不隃矣帝入太學承師問道退習而考於太傅太傅罰其不則而匡其不及則徳智長而治道得矣此五學者既成於上則百姓黎民化輯於下矣及太子既冠成人免於保傅之嚴則有記過之史徹膳之宰進善之旌誹謗之木敢諌之鼔瞽史誦詩工誦箴諫大夫進謀士傳民語習與智長故切而不愧化與心成故中道若性三代之禮春朝朝日秋暮夕月所以明有敬也春秋入學坐國老執醬而親餽之所以明有孝也行以鸞和歩中采齊趣中肆夏所以明有度也其於禽獸見其生不忍其死聞其聲不食其肉故逺庖厨所以長恩且明有仁也夫三代之所以長久者以其輔翼太子有此具也及秦而不然其俗固非貴辭讓也所上者告訐也固非貴禮義也所上者刑罸也使趙髙傳胡亥而教之獄所習者非斬劓人則夷人之三族也故胡亥今日即位而明日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若艾草菅然豈惟胡亥之性惡哉彼其所以道之者非其理故也鄙諺曰不習為吏視己成事又曰前車覆後車誡夫三代之所以長久者其已事可知也然而不能從者是不法聖智也秦世之所以亟絶者其轍跡可見也然而不避是後車又將覆也夫存亡之變安危之機其要在是矣天下之命縣於太子太子之善在於早諭教與選左右夫心未濫而先諭教則化易成也開於道術智誼之指則教之力也若其服習積貫則左右而已夫胡粤之人生而同聲嗜欲不異及其長而成俗累數譯而不能相通行者有雖死而不相為者則教習然也臣故曰選左右早諭教最急夫教得而左右正則太子正矣太子正而天下定矣書曰一人有慶兆民賴之此時務也凡人之智能見巳然不能見將然夫禮者禁於將然之前而法者禁於巳然之後是故法之所用易見而禮之所為難知也若夫慶賞以勸善刑罸以懲惡先王執此之政堅如金石行此之令信如四時據此之公無私如天地耳豈顧不用哉然而曰禮云禮云者貴絶惡於未萌而起教於微𦕈使民日遷善逺辠而不自知也孔子曰聽訟吾猶人也必也使毋訟乎為人主計者莫如先審取舍取舍之極定於内而安危之萌應於外矣安者非一日而安也危者非一日而危也皆以積漸然不可不察也人主之所積在於取舍以禮義治之者積禮義以刑罸治之者積刑罸刑罸積而民怨背禮義積而民和親故世主欲民之善同而所以使民善者或異或道之以徳教或敺之以法令道之以徳教者徳教洽而民氣樂敺之以法令者法令極而民風哀哀樂之感禍福之應也秦王之欲尊宗廟而安子孫與湯武同然而湯武廣大其徳行六七百載而弗失秦王治天下十餘歳則大敗此亡它故矣湯武之定取舍審而秦王之定取舍不審矣夫天下大器也今人之置器置諸安處則安置諸危處則危天下之情與器亡以異在天子之所置之湯武置天下於仁義禮樂而徳澤洽禽獸草木廣裕徳被蠻貊四夷累子孫數十世此天下所共聞也秦王置天下於法令刑罰徳澤亡一有而怨毒盈於世下憎惡之如仇讐旤㡬及身子孫誅絶此天下之所共見也是非其明效大驗邪人之言曰聽言之道必以其事觀之則言者莫敢妄言今或言禮誼之不如法令教化之不如刑罸人主胡不引殷周秦事以觀之也人主之尊譬如堂羣臣如陛衆庻如地故陛九級上亷逺地則堂髙陛亡級亷近地則堂卑髙者難攀卑者易陵理埶然也故古者聖王制為等列内有公卿大夫士外有公侯伯子男然後有官師小吏延及庻人等級分明而天子加焉故其尊不可及也里諺曰欲投鼠而忌器此善諭也鼠近於器尚憚不投恐傷其器况於貴臣之近主乎亷恥節禮以治君子故有賜死而亡戮辱是以黥劓之辠不及大夫以其離主上不逺也禮不敢齒君之路馬蹵其芻者有罸見君之几杖則起遭君之乘車則下入正門則趨君之寵臣雖或有過刑戮之辠不加其身者尊君之故也此所以為主上豫逺不敬也所以體貎大臣而厲其節也今自王侯三公之貴皆天子之所改容而禮之也古天子之所謂伯父伯舅也而令與衆庻同黥劓髠刖笞傌棄市之法然則堂不亡陛乎被戮辱者不泰迫虖亷耻不行大臣無迺握重權大官而有徒𨽻亡恥之心虖夫望夷之事二世見當以重法者投鼠而不忌器之習也臣聞之履雖鮮不加於枕冠雖敝不以苴履夫嘗已在貴寵之位天子改容而體貌之矣吏民嘗俯伏以敬畏之矣今而有過帝令廢之可也退之可也賜之死可也滅之可也若夫束縛之係緤之輸之司冦編之徒官司冦小吏詈罵而搒笞之殆非所以令衆庻見也夫卑賤者習知尊貴者之一旦吾亦迺可以加此也非所以習天下也非尊尊貴貴之化也夫天子之所嘗敬衆庻之所嘗寵死而死耳賤人安宜得如此而頓辱之哉豫讓事中行之君智伯伐而滅之移事智伯及趙滅智伯豫讓釁面吞炭必報襄子五起而不中人問豫子豫子曰中行衆人畜我我故衆人事之智伯國士遇我我故國士報之故此一豫譲也反君事讐行若狗彘已而抗節致忠行出乎列士人主使然也故主上遇其大臣如遇犬馬彼將犬馬自為也如遇官徒彼將官徒自為也頑頓亡恥詬亡節亷恥不立且不自好茍若而可故見利則逝見便則奪主上有敗則因而挻之矣主上有患則吾茍免而已立而觀之耳有便吾身者則欺賣而利之耳人主將何便於此羣下至衆而主上至少也所託財器職業者粹於羣下也俱亡恥俱茍妄則主上最病故古者禮不及庻人刑不至大夫所以厲寵臣之節也古者大臣有坐不亷而廢者不謂不亷曰簠簋不飭坐汚穢滛亂男女無别者不曰汙穢曰帷薄不修坐罷軟不勝任者不謂罷軟曰下官不職故貴大臣定有其罪矣猶未斥然正以謼之也尚遷就而為之諱也故其在大譴大訶之域者聞譴訶則白冠􅈊纓盤水加劔造請室而請辠耳上不執縛係引而行也其有中罪者聞命而自弛上不使人頸盭而加也其有大罪者聞命則北面再拜跪而自裁上不使捽抑而刑之也曰子大夫自有過耳吾遇子有禮矣遇之有禮故羣臣自憙嬰以亷恥故人矜節行上設亷恥禮義以遇其臣而臣不以節行報其上者則非人類也故化成俗定則為人臣者主耳㤀身國耳㤀家公耳㤀私利不茍就害不茍去唯義所在上之化也故父兄之臣誠死宗廟法度之臣誠死社稷輔翼之臣誠死君上守圄扞敵之臣誠死城郭封疆故曰聖人有金城者此物此志也彼且為我死故吾得與之俱生彼且為我亡故吾得與之俱存夫將為我危故吾得與之皆安顧行而㤀利守節而仗義故可以託不御之權可以寄六尺之孤此厲亷恥行禮義之所致也主上何䘮焉此之不為而顧彼之久行故曰可為長太息者此也論積貯疏筦子曰倉廪實而知禮節民不足而可治者自古及今未之嘗聞古之人曰一夫不耕或受之飢一女不織或受之寒生之有時而用之亡度則物力必屈古之治天下至纎至悉故其畜積足恃今背本而趨末食之者甚衆是天下之大殘也滛侈之俗日月以長是天下之大賊也殘賊公行莫之或止大命將泛莫之振救生之者甚少而靡之者甚多天下財産何得不蹷漢之為漢㡬四十年矣公私之積猶可哀痛失時不雨民且狼顧歳惡不入請賣爵子既聞耳矣安有為天下阽危者若是而上不驚者世之有飢穰天之行也禹湯被之矣即不幸有方二三千里之旱國胡以相恤卒然邉境有急數十百萬之衆國胡以餽之兵旱相乘天下大屈有勇力者聚徒而衡擊罷夫羸老易子而齩其骨政治未畢通也逺方之能疑者並舉而争起矣迺駭而圗之豈將有及乎夫積貯者天下之大命也茍粟多而財有餘何為而不成以攻則取以守則固以戰則勝懐敵附逺何招而不至今敺民而歸之農皆著於本使天下各食其力末技游食之民轉而縁南畮則畜積足而人樂其所矣可以為富安天下而直為此廩廩也上都輸疏天子都長安而以淮南東道為奉地鏹道數千不輕致輸郡或乃越諸侯而逺調均發徵至無狀也古者天子之地方千里中之而為都輸將繇使其逺者不在五百里而至公侯地百里中之而為都輸將繇使逺者不在五十里而至輸者不苦其繇繇者不傷其費故遠方人安及秦不能分人寸地欲自有之輸將起海上而來一錢之賦數十錢之費不輕而致也上之所得甚少而人之苦甚多也諫鑄錢疏孝文五年為錢多而輕乃更鑄四銖錢其文為半兩除盜鑄錢令使民放鑄誼諫不聽法使天下公得顧租鑄銅錫為錢敢雜以鉛鐵為它巧者其罪黥然鑄錢之情非殽雜為巧則不可得贏而殽之甚微為利甚厚夫事有召禍而法有起奸今令細民人操造幣之勢各隠屏而鑄作因欲禁其厚利微奸雖黥罪日報其埶不止迺者民人抵罪多者一縣百數及吏之所疑榜笞奔走者甚衆夫縣法以誘民使入䧟阱孰積於此曩禁鑄錢死罪積下今公鑄錢黥罪積下為法若此上何賴焉又民用錢郡縣不同或用輕錢百加若干或用重錢平稱不受法錢不立吏急而壹之虖則大為煩苛而力不能勝縱而弗呵虖則市肆異用錢文大亂茍非其術何鄉而可哉今農事棄捐而采銅者日蕃釋其耒耨冶鎔炊炭奸錢日多五糓不為多善人怵而為奸邪愿民䧟而之刑戮刑戮將甚不詳奈何而忽國知患此吏議必曰禁之禁之不得其術其傷必大令禁鑄錢則錢必重重則其利深盜鑄如雲而起棄市之罪又不足以禁矣奸數不勝而法禁數潰銅使之然也故銅布於天下其為禍博矣今博禍可除而七福可致也何謂七福上收銅勿令布則民不鑄錢黥罪不積一矣偽錢不蕃民不相疑二矣采銅鑄作者反於耕田三矣銅畢歸於上上挾銅積㠯御輕重錢輕則㠯術斂之重則㠯術散之貨物必平四矣㠯作兵器㠯假貴臣多少有制用别貴賤五矣㠯臨萬貨㠯調盈虚㠯収竒羡則官富實而末民困六矣制吾器財㠯與匈奴逐爭其民則敵必懐七矣故善為天下者因禍而為福轉敗而為功今久退七福而行博禍臣誠傷之請封建子弟疏陛下即不定制如今之埶不過一傳再傳諸侯猶且人恣而不制豪植而太强漢法不得行矣陛下所以為蕃扞及皇太子之所恃者唯淮陽代二國耳代北邉匈奴與强敵為鄰能自完則足矣而淮陽之比大諸侯厪如黒子之著面適足以餌大國耳不足以有所禁禦方今制在陛下制國而令子適足以為餌豈可謂工哉人主之行異布衣布衣者飾小行競小亷以自託於鄉黨人主唯天下安社稷固不耳高皇帝𤓰分天下以王功臣反者如蝟毛而起以為不可故蔪去不義諸侯而虚其國擇良日立諸子雒陽上東門之外畢以為王而天下安故大人者不牽小行以成大功今淮南地逺者或數千里越兩諸侯而縣屬於漢其吏民繇役往來長安者自悉而補中道衣敝錢用諸費稱此其苦屬漢而欲得王至甚逋逃而歸諸侯者巳不少矣其埶不可久臣之愚計願舉淮南地以益淮陽而為梁王立後割淮陽北邉二三列城與東郡以益梁不可者可徙代王而都睢陽梁起於新郪以北著之河淮陽包陳以南揵之江則夫諸侯之有異心者破膽而不敢謀梁足以扞齊趙淮陽足以禁呉楚陛下髙枕終亡山東之憂矣此二世之利也當今恬然適遇諸侯之皆少數歳之後陛下且見之矣夫秦日夜苦心勞力以除六國之禍今陛下力制天下頥指如意髙拱以成六國之禍難以言智茍身亡事畜亂宿禍熟視而不定萬年之後傳之老母弱子將使不寜不可謂仁臣聞聖主言問其臣而不自造事故使人臣得畢其愚忠唯陛下裁幸諫立淮南諸子疏竊恐陛下接王淮南諸子曾不與如臣者熟計之也淮南王之悖逆亡道天下孰不知其辠陛下幸而赦遷之自疾而死天下孰以王死之不當今奉尊罪人之子適足以負謗於天下耳此人少壯豈能忘其父哉白公勝所為父報仇者大父與伯父叔父也白公為亂非欲取國代主也發忿快志剡手以衝仇人之匈固為俱靡而巳淮南雖小黥布嘗用之矣漢存特幸耳夫擅仇人足以危漢之資於䇿不便雖割而為四四子一心也予之衆積之財此非有子胥白公報於廣都之中即疑有剸諸荆軻起於兩柱之間所謂假賊兵為虎翼者也願陛下少留計論過秦論上秦孝公據殽函之固擁雍州之地君臣固守以窺周室有席巻天下包舉宇内囊括四海之意并吞八荒之心當是時商君佐之内立法度務耕織修守戰之備外連衡而鬬諸侯於是秦人拱手而取西河之外孝公既沒恵文武昭䝉故業因遺䇿南取漢中西舉巴蜀東割膏腴之地収要害之郡諸侯恐懼㑹盟而謀弱秦不愛珍器重寳肥羙之地以致天下之士合從締交相與為一當是時齊有孟嘗趙有平原楚有春申魏有信陵此四君者皆明智而忠信寛厚而愛人尊賢而重士約從離衡并韓魏燕楚齊趙宋衛中山之衆於是六國之士有寗越徐尚蘇秦杜赫之屬為之謀齊明周最陳軫召滑樓緩翟景蘇厲樂毅之徒通其意呉起孫臏帶佗兒良王廖田忌亷頗趙奢之倫制其兵常以十倍之地百萬之衆叩闗而攻秦秦人開闗而延敵九國之師逡巡遁逃而不敢進秦無亡矢遺鏃之費而天下諸侯巳困矣於是從散約解爭割地而賂秦秦有餘力而制其敝追亡逐北伏尸百萬流血漂鹵因利乘便宰割天下分裂河山彊國請服弱國入朝延及孝文王莊襄王享國日淺國家無事及至始皇奮六世之餘烈振長䇿而御宇内吞二周而亡諸侯履至尊而制六合執敲扑以鞭笞天下威振四海南取百越之地以為桂林象郡百越之君俛首係頸委命下吏乃使䝉恬北築長城而守藩籬却匈奴七百餘里胡人不敢南下而牧馬士不敢彎弓而報怨於是廢先王之道焚百家之言以愚黥首墮名城殺豪俊収天下之兵聚之咸陽銷鋒鑄鐻以為金人十二以弱天下之民然後踐華為城因河為池據億丈之城臨不測之谿以為固良將勁弩守要害之處信臣精卒陳利兵而誰何天下已定始皇之心自以為闗中之固金城千里子孫帝王萬世之業也始皇既沒餘威振於殊俗然而陳涉甕牖繩樞之子甿𨽻之人而遷徙之徒才能不及中庸非有仲尼墨翟之賢陶朱猗頓之富躡足行伍之間而倔起阡陌之中率罷散之卒將數百之衆轉而攻秦斬木為兵揭竿為旗天下雲集響應贏糧而景從山東豪俊遂並起而亡秦族矣且夫天下非小弱也雍州之地殽函之固自若也陳涉之位非尊於齊楚燕趙韓魏宋衛中山之君也鉏耰棘矜非銛於鉤㦸長鎩也適戍之衆非抗於九國之師也深謀逺慮行軍用兵之道非及曩時之士也然而成敗異變功業相反試使山東之國與陳渉度長絜大比權量力則不可同年而語矣然秦以區區之地致萬乘之權招八州而朝同列百有餘年矣然後以六合為家殽函為宮一夫作難而七廟堕身死人手為天下笑者何也仁義不施而攻守之勢異也過秦論中秦并海内兼諸侯南面稱帝以養四海天下之士斐然鄉風若是者何也曰近古之無王者久矣周室卑微五覇既沒令不行於天下是以諸侯力勁彊侵弱衆暴寡兵革不休士民罷敝今秦南面而王天下是上有天子也即元元之民冀得安其性命莫不虚心而仰上當此之時守威定功安危之本在於此矣始皇懐貪鄙之心行自奮之智不信功臣不親士民廢王道立私權禁刑書而酷刑法先詐力而後仁義以暴虐為天下始夫并兼者髙詐力安定者貴順權此言取與守不同術也秦離戰國而王天下其道不易其政不改是其所以取之守之者異也孤獨而有之故其亡可立而待借使始皇計上世之事並殷周之迹以制御其政後雖有滛驕之主猶未有傾危之患也故三王之建天下名號顯羙功業長久今秦二世立天下莫不引領而觀其政夫寒者利裋褐而飢者甘糟糠天下之嗸嗸新主之資也此言勞民之易為仁也鄉使二世有庸主之行而任忠賢臣主一心而憂海内之患縞素而正先帝之過裂地分民以封功臣之後建國立君以禮天下虚囹圄而免刑戮除去収帑汙穢之罪使各反其鄉里發倉廩散財幣以振孤獨窮困之士輕賦少事以佐百姓之急約法省刑以持其後使天下之人皆得自新更節脩行各慎其身塞萬民之望而以盛徳與天下天下集矣即四海之内皆讙然各自安樂其處唯恐有變雖有狡猾之民無離上之心則不軌之臣無以飾其智而暴亂之奸止矣二世不行此術而重之以無道壞宗廟與民更始作阿房宮繁刑嚴誅吏治刻深賞罸不當賦斂無度天下多事吏弗能紀百姓困窮而主不收恤然後奸偽並起而上下相遁䝉罪者衆刑戮相望於道而天下苦之自君卿以下至於衆庻人懐自危之心親處窮苦之實咸不安其位故易動也是以陳渉不用湯武之賢不藉公侯之尊奮臂於大澤而天下響應者其民危也故先王見始終之變知存亡之機是以牧民之道務在安之而已天下雖有逆行之臣必無響應之助矣故曰安民可與行義而危民易與為非此之謂也貴為天子富有天下身不免於戮殺者政傾非也是二世之過也過秦論下秦并兼諸侯山東三十餘郡繕津闗據險塞修甲兵而守之然陳渉以戍卒散亂之衆數百奮臂大呼不用弓㦸之兵鉏耰白挺望屋而食横行天下秦人阻險不守闗梁不闔長㦸不刺彊弩不射楚師深入戰於鴻門曾無藩籬之艱於是山東大擾諸侯並起豪俊相立秦使章邯將而東征章邯因以三軍之衆要市於外以謀其上羣臣之不相信可見於此矣子嬰立遂不寤藉使子嬰有庸主之材僅得中佐山東雖亂三秦之地可全而有宗廟之祀未當絶也秦地被山帶河以為固四塞之國也自繆公以來至於始皇二十餘君常為諸侯雄豈世世賢哉其勢居然也且天下嘗同心并力而攻秦矣當此之時賢智並列良將行其師賢相通其謀然困於阻險而不能進秦乃延入戰而為之開闗百萬之徒逃北而遂壞豈勇力智慧不足哉形不利勢不便也秦雖小邑并大城守險塞而軍髙壘毋戰閉闗據阨荷㦸而守之諸侯起於匹夫以利合非有素王之行也其交未親其下未附名為亡秦其實利之也彼見秦阻之難犯也必退師安土息民以待其敝收弱扶罷以令大國之君不患不得意於海内貴為天子富有天下而身為禽者其救敗非也始皇足已不問遂過而不變二世受之因而不改暴虐以重禍子嬰孤立無親危弱無輔三主惑而終身不悟亡不亦宜乎當此時也世非無深慮知化之士也然所以不敢盡忠拂過者秦俗多忌諱之禁忠言未卒於口而身為戮沒矣故使天下之士傾耳而聽重足而立箝口而不言是以三主失道忠臣不敢諫智士不敢謀天下已亂奸不上聞豈不哀哉先王知壅蔽之傷國也故置公卿大夫士以飾法設刑而天下治其彊也禁暴誅亂而天下服其弱也五伯征而諸侯從其削也内守外附而社稷存故秦之盛也繁法嚴刑而天下振及其衰也百姓怨望而海内畔矣故周王序得其道而千餘歳不絶秦本末並失故不長久由此觀之安危之統相去逺矣野諺曰前事之不忘後事之師也是以君子為國觀之上古騐之當世參以人事察盛衰之理審權勢之宜去就有序變化有時故曠日長久而社稷安矣漢魏六朝百三家集巻一
