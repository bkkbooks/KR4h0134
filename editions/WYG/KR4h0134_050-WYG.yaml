body:
  text: 漢魏六朝百三家集巻五十陸雲集題詞士龍與兄書稱論文章頗貴清新妙若文賦尚嫌綺語未盡又云作文尚多譬家猪羊耳其數四推兄或云瑰鑠或云髙逺絶異或云新聲絶曲要所得意惟清新相接士衡文成輒使弟定之不假他人二陸用心先質後文重規㳫矩亦不得巳而後見耳哲昆詩匹人稱如陳思白馬士龍所傳四言偏多有皇思文諸篇誦美祁陽式模大雅類以卑頌尊非朋舊之體餘篇一致間有至極使盡其才即不得為韋侯諷諫仲宣思親顧髙出補亡六首則有餘矣宰治浚儀善察疑獄佐相吳王屢陳讜論神明之長諌諍之臣有兼能焉士衡枉死遂同隕墮聞河橋之鼓聲哀華亭之鶴唳巢覆卵破宜相及也集中大文雖少而江漢同名劉彦和謂其布采鮮淨敏於短篇殆質論歟目録賦南征賦有序登臺賦有序愁霖賦冇序喜霽賦有序嵗暮賦有序逸民賦有序羊腸轉賦寒蟬賦有序騷九愍脩身渉江悲郢行吟紆思考志感逝征啓疏諫吳王起西園第宜遵節儉啓又疏諫吳王起觀疏請吳王引師友文學觀書問道啓又啓請吳王入朝啓請吳王覆校諸官啓請防不法啓書移太常府薦張贍書答車茂安書與載季甫書又又又又又又與張光禄書又又與朱光禄書與嚴宛陵書與楊彦明書又又又又又與陸典書又又又又又又又又又弔陳永長書又又又又弔陳伯華書又春節帖與兄平原書又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又頌登遐頌有序盛徳頌有序祖考頌有序張二侯頌有序贊榮啓期贊有序箴逸民箴有序碑泰伯碑誄吳故丞相陸公誄晉故散騎常侍陸府君誄晉故豫章内史夏府君誄文嘲褚常侍文牛責季友文漢魏六朝百三家集巻五十目録欽定四庫全書漢魏六朝百三家集巻五十明張溥輯陸雲集賦南征賦有序太安二年秋八月奸臣羊𤣥之皇甫商敢行稱亂凌逼乗輿天子䝉塵于外自秋徂冬大將軍敷命羣后同恤社稷乃身統三軍以謀國難自義聲所及四海之内朔漠之表蒸徒贏糧而請奮胡馬欵塞而思征四方之㑹衆以百萬軍旅之盛威靈之著自古已來未之有也粤十月軍次于朝歌講武治戎以觀兵于殷墟於是美義征之舉壯師徒之盛乃作南征賦以揚匡霸之勲云爾有皇晉之覇后資濬哲之叡聖崇文德於緝熈濟武功而保定應天鑒之昭華荷帝祐之休命步玉衡以觀八方在璇璣而齊七政芒芒神道化洽崇深仰戾天飛俯洞淵沈振南箕以鼓物冐慶雲而崇隂恢天維以籠世廓宇宙而宅心濟博施之厚德鏗希聲之大音淵澤囘而竝注豪彦萃而為林九服惟清諸夏謐靜肅慎囘首沙漠引領天和時降地靈夙挺結芳林之竒幹發珍禾之神穎勵修德於億兆端澄形於萬景在中葉之不競遭皇家之毒亂悲國步之未夷仰夙興而昩旦括無方而大誥集率土而貞觀致天屬於王畿肅宵征而省難爾乃建黄鉞之靈威樹戎輅之高蓋伐隠天之雷鼓振凌霄之電斾介夫揮戈而夙興武臣總干而啓邁振靈韶之嘈嘈飛旟旐之藹藹虹旃泝風以委虵霓旄䝉光而容裔公徒十萬其㑹雲興悠悠華戎時罔不承爾乃命屏翳以夕降式飛廉以朝升塗䝉雨而復清景帶天而光澄陪武臣於雕軒列名僚於後乗猛將起而虎嘯商颷肅其來應士慿威而響駭馬歔天而景凌臨川屯於廣陸武騎被乎中陵類禡比京師徒經始桓桓先征在河之涘順彼長道懸旌千里羨王師之遵時茂七德而發止爾乃稅駕殷墟我徒既閑順時講武薄狩于原紛同方而類聚煥副翼而明分祗明刑以誓衆習軍政於舊聞儼山立以崇薈粲烟駭而興紛若溟海之引囘流岱靈之吐行雲于時𤣥冬首時隂風戒煞山澤含哀天地肅乂閒夜冽以澄清中原曠而曖昧戎士肅而咸戒三軍紛而雜遝長角哀呌以命旅金鼓隠訇而啓伐景凌𡨕而四播音乗雲而上逝火烈具舉伐鼓淵淵朱光俛而丹野炎暉仰而絳天曜靈翕赫以増熾憤氣怫悦而凌煙狂颷起而妄駭行雲藹而芊眠旌斾翻其猗靡驚熛因而嬋娟爾乃洪音雷動清聞尅廣凌雲發揮萬里振響聲馮虚而天囘烈駭空而地蕩映皎月而望舒闇照重昏而大夜朗服縣炎揚而晃儵飛烽戢煜而泱漭乃有熊羆之旅虓闞之將雄聲泉涌逸氣風亮超三軍以奔厲賈餘勇而成壯兆洪音於寂漠先無形而髙唱紛若屯雲渙若積波遁隂匿景靜言勿譁絶倡寂其既收萬夫翕而咸和嚴鼓隠而重戒景燧曄而星羅烈䝉隂而仰假曜慿陽而登遐若扶桑之振華葉皓天之散朝霞超燭龍之絶景豈比象於百蕐登臺賦有序永靈中參大府之佐於鄴都以時事巡行鄴宫三臺登髙有感因以言崇替迺作賦云承后皇之嘉惠兮翼聖宰之威靈肅言詞而述業兮乃啓行乎北京巡華室以周流兮登崇臺而上征攀凌坻而遂隮兮迄雲閣而少寧爾乃佇盼瑶軒滿目綺寮中原方華緑葉振翹嘉生民之亹亹兮望天晷之苕苕厯玉階而容與兮憇蘭堂以逍遙䝉紫庭之芳塵兮駭洞房之迴飇頺嚮逝而忤物兮傾冠舉而凌霄曲房縈而窈眇兮長廊邈而蕭條於是逈路逶夷邃宇𤣥芒深堂百室曾臺千房闢南牕而蒙暑兮啓朔牖而履霜逰陽堂而冬溫兮步隂房而夏涼萬禽委虵於潛室兮驚風矯翼而來翔紛譎詭於有象兮邈悠忽而無方于時南正司火朱明鬱遂縣車式徐曜靈西墜暑乗隂而増炎兮景望淵而曖昧玩瓊宇而情廞兮覽八方而思銳陋雨館之常規兮鄙鳴鵠之蔽䒥仰凌眄於天庭兮俛旁觀乎萬類北溟浩以揚波兮青林煥其興蔚扶桑細於毫末兮崑崙卑乎覆簣於是忽焉俛仰天地既翕宇宙同區萬物為一原千變之常鈞兮齊億載於今日彼區中之側陋兮非吾黨之一室本達觀於無形兮今何求而有質於是聊樂近逰薄言徜徉朝登金虎夕步文昌綺疏列於東序朱戸立乎西廂經蕤曄以披藻兮椒塗馥而遺芳感舊物之咸存兮悲昔人之云亡慿虚檻而逺想兮審厯命於斯堂於是精疲逰倦白日藏輝鄙春登之有情兮惡荆臺之忘歸聊弭節而駕言兮悵將逝而徘徊感崇替之靡常兮悟廢興而永懐隆期啓而雲升逝運靡其如頺長發惟祥天鑒在晉肅有命而龍飛兮跚重斯而肇建嘉有魏之欽若兮鑒靈符而告禪清文昌之離宫兮虚紫微而為獻委普天之光宅兮質率土之黎彦欽哉皇之承天兮集北顧於乃眷誕洪祚之逺期兮則斯年於有萬愁霖賦有序永寧三年夏六月鄴都大霖旬有竒日稼穡沈湮生民愁瘁時文雅之士煥然並作同僚見命乃作賦曰在朱明之季月兮反極陽於重隂興介丘之膚寸兮墜崩雲而洪沈谷風扇而攸遂兮苦雨播而成淫天泱漭以懐慘兮民嚬蹙而愁霖於是天地發揮陰陽交烈萬物混而同波兮𤣥黄浩其無質雷慿虚以振庭兮電凌牖而輝室霤鼎沸以駿奔兮潦風驅而競疾豈南山之暴隮兮將𠖇海之蹔溢隠隠填填若降自天髙岸渙其無涯兮平原蕩而為淵遵渚囘於凌河兮黍稷仆於中田匱多稼於億廩兮虚夙敬於祈年外薄郊甸内荒都城隂無晞景霤無輟聲纎波靡於前途兮微津隔於峻庭紛雲擾而霧塞兮漫天頺而地盈於是愁隂比屋歎發屢省陽堂乏暉朗室無景望曾雲之萬仞兮想白日之寸脛感虚無而思深兮對寂寞而言靖毒甚雨之未晞兮悲夏日之方永瞻大辰以頺息兮仰天衢而引領愁情沉疾明發哀吟永言有懐感物傷心結南枝之舊思兮詠莊舄之遺音羨弁彼之歸飛兮寄予思乎江隂𣺌天末以流目兮涕潺湲而沾襟何人生之倐忽痛存亡之無期方千嵗於天壤兮吾固巳陋夫靈龜矧百年之促節兮又莫登乎期頥哀戚容之易感兮悲懽顔之難怡考傷懐於衆苦兮愁豈霖之足悲雲曇曇而疊結兮雨淫淫而未散晞朱陽於崇朝兮悲此日之屢晏劾豐隆於岳陽兮執赤松於神館命雲師以藏用兮紲乗龍於河漢照濛汜之清暉兮炳扶桑之始旦考幽明於人神兮妙萬物以達觀喜霽賦有序余既作愁霖賦雨亦霽昔魏之文士又作喜霽賦聊厠作者之末而作是賦焉毒霖雨之掩時兮情懐憤而無懌肅有禱於人謀兮反極隂于天律靖屏翳之洪隧兮戢太山之觸石凌風絶而謐寧兮歸雲笠而揮霍改望舒之離畢兮曜六龍於紫閣揚天步之剡剡兮播靈輝之赫奕於是朱明自皓凱風來南復火正之舊司兮黜后土於重隂夷中原之多潦兮反髙岸於嵩岑萎禾竦而振穎兮偃木豎而成林嘉大田之未墜兮幸神祗之有歆爾乃俯順習坎仰熾重離兼明暢而天地曄兮羣生悦而萬物齊魚凌淵以増躍兮鳥望林而朝隮戢流波於枉水兮起芳塵於沉泥朱光播於甕牖兮素景衍乎中閨天監作照幽明畢覿普厥有懽覃及四國翕萬情而咸喜兮雖無獲而自得災未及害和斯有祥翼翼黍稷油油稻粱望有年於自古兮晞隆周之萬箱原思悅於蓬户兮孤竹欣於首陽隂陽交泰萬物方遒炎神送暑素靈迎秋四時逝而代謝兮大火忽其西流年冉冉其易頺兮時靡靡而難留嗟沈哀之愁思兮瞻日月而増憂感年華之行暮兮思乗煙而逺逰命海若以量津兮吾欲徃乎瀛洲臨儀天之大川兮凌懐山之洪波瞻増城之峻極兮仰蓬萊之嵬峩望王母於弱水兮詠白雲之清歌雖嘉命之未錫兮將輕舉於流沙振仙車之鳴鸞兮吐玉衡之八和託芝蓋之後乗兮飱瓊林之朝蕐修無窮以容與兮豈萬載之足多歲暮賦有序余祗役京邑載離永久永寧二年春忝寵北郡其夏又轉大將軍右司馬於鄴都自去故鄉荏苒六年惟姑與姊仍見背棄銜痛萬里哀思傷毒而日月逝速嵗聿云暮感萬物之既改瞻天地而傷懐乃作賦以言情焉夫何乾行之變通兮昏明迭而載路羨飛轡之逺御兮騰六龍於天步時赴節而漸流兮氣移數而改度揮促節於短日兮振修䇿於長夜運悠忽其既周兮歲冉冉而告暮變棘心之柔風兮滋豐草之湛露𤣥暉邈以峻服兮黄裳皓而振素於是顓頊御時𤣥𠖇統官天廟既底日月貞觀淪重陽於潛戸兮嚴積隂於司寒日回天以滅景兮飇衝淵而無瀾堅氷涸於川底兮白雪隕於雲端普區宇之瘁景兮頻萬物之衰顔時凛戾其可悲兮氣蕭索而傷心凄風愴其鳴條兮落葉翻而灑林獸藏丘而絶迹兮鳥攀木而栖音山振枯於曾嶺兮民懐慘於重襟寒與暑其代謝兮年冉冉其將老豐顔曄而朝榮兮𤣥髪粲其夕皓感芳蕐之志學兮悲時暮而難考逺圖逝而辭懐兮密思集而盈抱羨厚德之溥載兮嘉豐化之大造恨盛來之苦晏兮悲哀至之常蚤指晞露而怵心兮衍死生於靡草䝉時來之嘉運兮遊上京而凱入委乗輅於紫宫兮剖金虎而底邑慿台光之發暉兮荷寵靈而來集望故疇之逈遼兮泝南風而頺泣長歎息而永懐兮感逝物而傷悲哀年歲之攸徃兮伊行人之思歸結隆思於朝日兮綴永念於汜暉表寸隂而貞吝兮盼盈尺其若遺嗟我行之久永兮何歸途之茫茫遵渚兮盼川攸逝兮江湘處孝敬於神丘兮結祗慕於惟桑瞻山川而物存兮思六親而人亡問仁姑而背世兮及伯姊而淪喪尋餘蹤於空宇兮想絶景於遺堂悲山林之杳藹兮痛華構之丘荒靖深情以遐慕兮思纒綿而懐楚涕垂頥以交頽兮哀凌心而洞駭神尋路而窘逝兮形嚬蹙乎其所心悠悠其若懸兮音既絶而復舉悲人生之有終兮何天造而罔極仰悲谷之方中兮顧懸車而日昃百年迅於分噓兮千嵗疾於一息詠大椿之萬祀兮同蟪蛄於未識歲難停而易逝兮情艱多而泰寡年有來而棄子兮時無算而非我祗生心於日順兮雖呼翕其難假攝㒃生於逆旅兮欲淹留其焉可彼鑒寐之有時兮亦始卒之固然舒逺懐於千載兮悵同感乎中山鑒通人之炯戒兮懼晏平之達言啓貞心以自責兮覽遺籍而問道亮爽鳩之既徂兮故營丘之有紹在吾儕之陋心兮豈取樂於東表茍長生而自得兮將奚待而有夭考大德於天地兮知斯言之益矯逸民賦有序富與貴人之所欲也而古之逸民或輕天下細萬物而欲専一丘之歡擅一壑之美豈不以身勝於宇宙而心恬於紛華者哉故天地不易其樂萬物不干其心然後可以妙有生之極享無疆之休也乃為賦云世有逸民兮栖遲於一丘委天形之外心兮淡浩然其何求陋此世之險隘兮又安足以盤逰杖短䇿而遂徃兮乃枕石而潄流載營抱魄懐元服一傲物思寧妙世自逸靜紛響於永言滅絶景於無質相荒土而卜居度山阿而考室曽丘蓊薈穹谷重深樷木振穎葛藟垂隂潛魚泳沚嚶鳥來吟仍蔬圃於芝薄兮即蘭堂於芳林靡炎飇以赴節兮揮天籟而興音假樂器於神造兮詠幽人於鳴琴挹迴源於别沼兮飡秋菊於高岑䝉玉泉以濯髪兮臨濬谷而投簮寂然尸居儼焉山立遵渚龍見在林鳳戢遁綿野以宅心望空巖而凱入明發寤歌有懐在昔賓濮水之清淵兮儀磻溪之一壑毒萬物之諠譁兮聊漁釣於此澤爾乃薄言容與式宴盤桓朝挹芳露夕玩幽蘭眇區外而放志兮眷天路而怡顔望靈嶽之清景兮想佳人於雲端悲滄浪之濁波兮詠芳池之清瀾鄙終南之辱節兮韙伯陽之考槃眄清霄以寄傲兮泝凌風而頽歎𤣥微載晏何思何欲漂若行雲之浮泊若窮林之木咨有得之必喪兮蓋怙寵之召辱彼貪夫之死權兮固遺生以要祿竦戰兢而履氷兮秪肅懐以臨谷亮據鼎之無慄兮在顛沛其必渥是故形瑰者徴咎體壯者為犧雖明文而龍藻兮終俛首而受羈立修名於禍始兮登全生於戾階資朝華之促節兮抱千載之長懐擠考終於逺期兮顛靈根而自摧殉有喪之假樂兮彼無身其孰哀美達人之𤣥覽兮邈藏器於無為物有自遺道無不可萬殊有同齊物無寡並家於國等朝于野榮在世而貴身兮神居形而忘我欽妙古之達言兮信懐莊而悦賈曽既明於天爵兮何惙悲於人禍陋國風之皇恤同明哲於大雅亂曰乗白駒兮皎皎遊穹谷兮藹藹尋峻路兮崢嶸臨芳水兮悠裔槃丘園兮暇豫翳翠葉兮重蓋瞻洪崖兮清輝紛容與兮雲際欲凌霄兮從之恨穹天兮未泰詠歡友兮清唱和爾音兮此世羊腸轉賦爾乃使熊羆之士虓闞之將雄聲泉湧逸氣風亮超三軍以奔厲賈餘勇以成壯兆洪音於寂寞先元聲而高唱元兵時紛若屯雲煥若積波授教斯謐靜言勿譁嚴鼓隠其雷駭萬夫翕其咸和治安步以止立應金奏而靡戈進總干以乗言退揮旅而星羅及至景凌禮既畢歸旅將振尋縈圓轉因瀨蓋旋若疾流之繞駿沈驚颷之靡狂塵羊腸轉時命屏翳以夕降式飛廉而朝興涂蒙雨而後清景帶天而先澄陪俊臣於彫輅列名僚於後乗猛將起而虎嘯商風肅其來應士慿勢而響駭馬嘘天而景淩舊本混列與兄平原書中今摘出寒蟬賦有序昔人稱雞有五德而作者賦焉至於寒蟬才齊其美獨未之思而莫斯述夫頭上有緌則其文也含氣飲露則其清也黍稷不食則其廉也處不巢居則其儉也應候守節則其信也加以冠冕則其容也君子則其操可以事君可以立身豈非至德之蟲哉且攀木寒鳴負才所歎余昔僑處竊有感焉興賦云爾伊寒蟬之感運近嘉時以遊征含二儀之和氣稟乾元之清靈體真精之淑質吐峥嶸之哀聲希慶雲以優游遁太隂以自寧於是靈岳幽峻長林參差有蟬集止輕羽莎佗清徹微激德音孔嘉承南風而軒景附高松之上華黍稷惟馨而匪享竦身晞陽乎靈和唳乎其音翩乎其翔容麗蜩螗聲美宫商飄如飛鴻之遭驚風𦕈如輕雲之麗太陽華靈鳳之羽儀睹皇都乎上京跨天路於萬里豈蒼蠅之尋常爾乃振修緌以表首舒輕翅而迅翰挹朝蕐之墜露含烟煴以夕飡望北林以鸞飛集樛木以龍蟠彰淵信於嚴時稟清誠乎自然翩𦕈微妙綿蠻其形翔林附木一枝不盈豈黄鳥之敢希唯鴻毛其猶輕慿綠葉之餘光景秋華之方零思鳳居以翹竦仰竚立而哀鳴若夫歲聿云暮上天其涼感運悲聲貧士含傷或歌我行永久或詠之子無裳原思嘆於蓬室孤竹吟於首陽不銜子以穢身不勤身以營巢志髙於鳴鳩節妙乎鴟鴞附枯枝以永處倚瓊林之逈條惟雨雪之霏霏哀北風之飃飃既乃彫以金采圖我嘉容珍景曜爛暐曄華豐竒侔黼黻艶比衮龍清和明潔羣動希蹤爾乃綴以𤣥冕増成首飾纓綏翩紛九旒容翼映華蟲於朱衮表馨香乎明德於是公侯常伯乃紆紫黻執龍淵俯鳴佩玉仰撫貂蟬飾黄廬之多士光帝皇之侍人既騰儀像於雲闥望景曜乎通天邁休聲之五德豈鳴鷄之獨珍聊振思於翰藻闡令聞以長存於是貧居之士喟爾相與而俱嘆曰寒蟬哀鳴其聲也悲四時云暮臨河徘徊感北門之憂殷嘆卒歲之無衣望泰清之巍峩思希光而無階簡嘉蹤於皇心冠神景乎紫微詠清風以慷慨發哀歌以慰懐騷九愍昔屈原放逐而離騷之辭興自今及古文雅之士莫不以其情而玩其辭而表意焉遂厠作者之末而述九愍裔皇聖之豐祜膺萬乗之多福真龍暉以底載啓元辰而誕育考度中以錫命端嘉令而自肅蘭情馥以芬香瓊懐皎其如玉希千載以遙想昶逺思而自怡範方地而式矩儀穹天而承規結丹欵於璇璣協朱誠於四時咨中心之信修佩日月以為旗悲年嵗之晩暮殉修名而競心仰勲華之耿暉詠三辟之遐音握遺芳而自玩挹浩露於蘭林隂雲紛以興靄颷風起而回波黨朋淫以惡美疾傾宫之揚娥樹椒蘭於瑤圃掩夜光於瓊華遘貞心以誰忒毁玉質而蒙瑕甘莠言而棄予忽遐放其若遺瞻前軌而我先顧後乗而駕遲遵荒塗而伏軾撫鳴鸞而稱悲感瞻烏之有集嗟離雁之焉歸靜沈思以自瘁願凌雲而髙飛修身逢天怒而離紛遘時咎於惟塵端周誠以恪居祇後命而自寅悲䜛口之罔極隔離情於參辰豈三錫之又晞乃裔予於遐賓運羽櫂以渉江浮鄂渚而駕言背夏首以窘逝兮泝行川而永歎結風回而薄水兮源波榮而重瀾情懐眷以疊結舟淹流而中盤昶愁心以自邁肅榜人而曾謳詔河馮以清川命湘娥而安流濟南詔以佇望野蕭條而振疇獸悲號以命侣鳥狂顧而鳴仇悲我行之悠悠怨同懐之莫求發辰陽而徃彼緣湘沅而来假亦芳樹於縣車秣粱苗於樊馬山嵩髙以藏景雲掩靄而荒野鳥拊翼於甍巔水回波於宇下指明星以脉路景即隂而無旅随長川以問津響修聲而和予聽歸音以自聞踐無迹以窮處雖遘愍之既多亦顛沛其何侮仰衆芳之遺情希絶風之延佇亂曰有鳥飜飛集江湘兮彼美一人莫予将兮念茲渉江懐故鄉兮生日何短蹙日長兮顧我愁景惟永傷兮渉江闕積沉毒於苦心魂憑虚以飄蕩形息景於重隂虎鳴飈以拂谷螭囬雲而結林操土音以懐郢涕頻代而盈襟辭終古之舊墟託茲邦而遥集望龍門而屢顧攀惟桑而抵泣悲愁心之難状振枯形而獨立撫彫容之日頽怊炯思而弗及聞先黎之逹教固積善於遺慶晞明休而受言想介福之保定靡心貞以祗服泝大順而委命君在初之嘉恵每成言而永日怨谷風之攸歎彌九齡而未徹願自獻於承間悲黨人之造膝舒幽情其曷訴巻永懐而淹恤嗟哲士之足歎傷邦家之殄瘁痛靈修之匪懐頽九成於一簣忘大寳之勿假輕挈瓶之守器仰剪翮於凌霄俯歸飛於矰罻毁方城於秦川投江漢於泥渭悲彼黍之在郢悼宗楚之莫餼撫傷心以告哀将斯情之孰慰悲郢登髙山以遐望念悠處之淹流豈大川之難濟悲利渉之莫由申修誠以砥節反内鑒而自求考余心其焉可往稽度於神謀訪斯言以卜居想貞龜以告猷将矯翼而塗險思振清而世濁羗釋筴而評子諒不疑其何卜朝彈冠以晞髪夕振裳而濯足有懐沙以赴淵無抱素而蒙辱愁纒綿以宅心長歎息而飲淚步江潭以彷徉頻行吟而含悴遇漁父之戾止興讜言而來憇雖懐芳而握瑜懼輕塵之我穢顧虚景而端形矧同波於俱醉迨伊人之逍遙聊仰葉於林側懐達心以逺悟怡哀顔而表色仰班荆之遺情想嘉訊而良食若有言而未吐忽棄予而淩波揮龍榜以鼓汰遺芬響而清歌俟滄浪之濯纓悲余夀之㡬何愧褊心之歎渝恨爾謁之莫和捐江魚之言志營𤣥寢於汨羅茍懐忠而死節豈有生之足嘉行吟悲怨思之多感情惆悵而逺慕世𤣥黄而既渝心居貞而抱素冀斯氣之一清要佳人於天路考年載以遲之悲嵗律之巳暮攬豐草於朝日思先晞於湛露規法圓而天象矩則方於地形祗信順以自範邀式榖於神聽悲登䰟之無抗訊貞夢而通靈悔抱道而懐顧悲實蕃之巳盈頓椒丘而息駕振初服而翺翔結瓊㽔之芳襟襲淩華之藻裳懐瑤林之珍秀握蘭野之芳香命巫咸以啓期訪百神而考祥靖永言以聽命欽靈誶而肅邁振華冕之玉藻樹象軒之髙蓋鸞假翼以鳴和霓揮景而縈斾芳塵穆以烟煴彤雲起而深藹遊八極以大觀解飛轡以長想將結軌而世狹願援楫而川廣雖我服之方壯思振䇿其安徃舒逺懐以弭節褰世羅於天網亂曰猗猗芳草殖山阿兮朝日來照發豐華兮秋風蕭瑟凝霜加兮傾葉懐春猶俟河兮紆思徧周流而無過悲窮思之永久聽幽荒而罔詔眷寥廓而無友沈流液於䋲樞逝回颷於甕牖呼寂寞而靡應攬虚無其何有神悠悠而永念憂綢繆而盈室哀惻心而響起時棄予而景逸招逝運其難徴儀遺範而無律雖芳林之將焚豈蘭響之可謐晞馥風於曠野思同芬而靡質命險太其靡常道離隆而匪易紆幽情而思古援在昔而立辟俟重華以同遊悲瑤圃之難適舟登陸其焉濟輪涉淵而無迹悲荒塗之既舛臨遵渚而投䇿欲隨波以周流恨匪石之難頽將從風而巻舒悲直矢之辭懐貞朗志而玉折厲勁心而蘭摧喟我懐以寤歎闡前鑒而自融忠與邪其莫可豈余命之所窮俯投迹而世洿仰晞志而道隆恥蒙垢於同塵思振袂於别風明爽心以畢志考吾道以自終考志天機偏其挺蓋玉衡運而囘襄景彌修而日短時愈促而夜長和音變而改律乗風革而為商感秋林之夙暮悲芳草之中霜存倐忽而風邁逝揮霍而雲散方輕焱而炯遲比收電而景宴將愉樂以夙興迢良日於昧旦痛予生之不辰逢此世之多難將藹藹而未颺世渾渾其難澄風頹山以離谷波平淵而為陵道曠世而朴散化固滯而物凝恨輶徳以莫舉悲民鮮之孰勝景照明以妙見音振響而攄聞金淬堅以示㫁苞靡質而效芬罄貞規以殉節反䝉謫於朋羣咨小心以惴惴悲江草之芸芸亂曰浮雲晻藹天明息兮矰羅重設鳳矯翼兮梧桐逝矣樹榛棘兮思我芳林喟歎息兮感逝哀時命之險薄懐斯類以結憂手拊膺而永歎形顧景而長愁生遺年而有盡居靜言其何須將輕舉以逺覽眇天路而髙遊結垂雲之翠虬駕琬琰之玉輿揮采旄以煙指靡華旌而電舒命日月以清天吾將遊乎九閡命屏翳以夕降式飛廉以朝興塗蒙雨而後清景貞暉而先登陪湘妃於雕輅列漢女以後乗瓊娥起而清嘯神風穆其來應騑慿雲而響駭驂嘘天而景淩望紫微以振䇿躡太階而遂升飛芝蓋之翼翼囘雲車之轔轔朝總轡於扶桑夕飲馬於天津伐河鼓以解徴迄崑崙而凱振軌淩虚而遺迹塵䝉飇而絶輪豈逺遊之無樂懐故都而傷情靡龍首以還顧轉瑤衡而囘縈泝凱風以流盻悲舊邦之穢傾眷南雲以興悲䝉東雨而涕零淩百川而絶蹈仰濯髪於峥嶸豈沈瘁之足弭將蟬蜕於長生征痛世路之隘狹詠邃古而長悲鏡端形於三接照直影於太㣲祗中懐以眷慕豈鑒寐而忘歸悼天朝之遂晦構貝錦於繁文侈南箕以鼓物藹青陽而播芬迹同塵而壤絶景和光而天分俯隕息於縈波仰頽歎而崩雲折若華以翳日時靡靡而難停飡秋菊以却老年冉冉其既盈欲假翼以天飛怨曽飈之我經思戢鱗以遁沼悲沈網之在淵有河清而志得挫千載之長年擠哀響於頽風寓悲音於絶絃嗟有生之必死固逸我以自休彼達人之遺物甘褰裳而赴流矧余情之沈毒資有生以速憂悼居世其何蹙固形存其為尤想百年之促期悲樂少而難多修與短其足􅈔曷久沈於汨羅投瀾漪而負石涉清湘以懐沙臨恒流而自墜䝉濬壑之隆波接申胥於南江闕於闕鼓層雲以攜手仰接景而登遐啓䟽諌吳王起西園第宜遵節儉啓郎中令臣雲言伏見西園大營第室雖未審節度豐儉之制然用工甚嚴竊懼事不得濟愚臣管見輒敢瞽言臣竊見世祖武皇帝臨朝淵黙訓世以儉即位二十有六載宫室臺榭無所新營屢發明詔厚戒豐奢國家纂承務在遵奉而世俗陵遲家競盈溢漸漬波蕩遂巳成風雖嚴詔屢宣而侈俗滋廣毎觀詔書衆庶嘆息清河王昔起墓宅未及極偉時手詔追述先帝節儉之教懇切之㫖形于四海清河王毁壊城宅以奉詔命海内聽望咸用欣然臣慮以先帝遺教日以淩替聖上憂勤猶未之振今與國家協崇大化追闡前蹤者實在殿下先敦素朴而後可以訓正四方示民知禁竊謂第室之設可使儉而不陋凡在崇麗一宜節之以制然後上厭帝心下允民望且自聞制國之用事從節省而方於此時大造第宅又非聖意從簡之㫖臣以凡才殿下不以其駑闇特䝉㧞濯將以臣能有狂夫之言可以補禆聖徳臣自奉職巳來亦思竭忠効節以報所受之施是以不慮犯迕敢陳所懐如愚臣言有可採乞垂三省又疏臣雲言間一日敢獻瞽言以干聞聽天恩未加咎責猥發明令臣伏誦聖㫖奉用歎息臣聞有國者不患宫室之不崇患在令名之不立是以賢人之在富貴莫不卑身節欲損巳挹情能保其國家令聞百世歴觀古今以約失之者實寡以奢失之者蓋衆非天下之至徳孰能居豐行儉在富能貧清儉節素自殿下家道此所以懐集四方而使兆民服者也世祖武皇帝富有四海貴為天子居無離宫之館身御家人之服先帝豈欲以此道止於治身而巳者哉固將必欲遺訓百世貽燕子孫此固殿下所宜祗奉也昔淮南太妃當安厝臣兄比下墨機時為郎中令從行太妃令追稱先帝養生送終事從節儉今宜奉用遺制不事豐厚令㫖懇切言歸于約清河昔起墓宅發手詔又還毁朝野之論于今未巳竊以西園第宅用功方嚴雖知聖徳節儉有素猶復思關愚言以補萬一亦臣繾綣微忠昊天罔極之誠也至被明令聖㫖炳然嘉承至道奉以稱慶不勝下情謹䟽以聞諫吳王起觀疏郎中令臣雲言前啓西園第宅宜遵先帝節儉之制不宜使至豐麗被命優隆言歸謙素臣奉以欣憙而聞屋宇之制既自崇侈竊聞當復起觀六間既非前令之㫖且臣亦竊用不安臣聞詩云昊天有成命二后受之成王不敢康今四祖創基既垂成命哲王繼體世祖恭儉殿下承之固宜奉不寧而自昔造第過度民歎其勞瘁士譏其過尤謗言未弭而又加以崇侈此誠不可不惜先帝背世曽未十年而儉徳之亡國為其首此又所以慷慨酸心而不敢不盡狂夫之諫者也按晉魏以來諸侯奢靡第室滋廣未有如國今日之甚者也古人之戒猶云無為福始況今猶崇豐侈作為禍先此又臣所以寤寐憂歎忘寝與食者也殿下誕膺運期首建大國固将憲章令典貽範百世始基之制不可不慎今設為豐奢以示將來子孫象之又何以能國且先帝勤家如彼其素殿下承之若此其泰進傷奉國之典退虧隆家之業用之當身損盛徳之譽垂之後嗣非興邦之制一舉而失四徳此古人之所以長太息者也且第宅之過朝野所譏而監司結舌莫敢明言者實以殿下國之昵親朝所欽重故隠司過之鋒結執憲之䋲耳後世直臣必將信威明法考制度禮愚以此觀有必毁之理茍此物不可終然誠不如不為使其無毁也今空設過制之物而終為直士之資臣又未見其可也惟殿下思愚臣之言時命有司必省此舉舉手懽遌伏用流汗請吳王引師友文學觀書問道啓郎中令臣雲言聞古之君子既盛徳在身又外求諸物是以廣納俊士博觀載籍朝夕師傅夙夜勤禮賓友嘉客講義於前徃古來今日聞于耳故知積徳廣而流芳罔極伏惟殿下天資聰叡應期挺秀聖敬敷聞輝光日新即位巳來仍遭不造大禮雖闋哀故滋有賓客無接覲之宴師友闕講誦之禮愚臣所以寤寐永歎而私懐慷慨者也愚以宜發通客之令使朝士有接見之緣又可時與師友文學披觀文籍坐而論道非學無以聞義非士無以行禮禮義既舉羣望允塞此臣下所以拭目思徳音之發者也臣區區所懐敢以聞又啓臣雲言臣前啓可與師友文學觀書論道今又天時清適正是講誦之日臣聞崇山之髙不厭其峻滄海之量無限於廣是以周公一日萬事猶復旁觀百篇孔子假期玩年至於韋編三絶由是言之雖聖之𢎞亦不能不求之於學也伏惟殿下明徳光劭天資秀朗方當光演文武允迪皇猷如復垂精古今之奥仰覽千載之籍則神道叡知無物不照且師友文學朝選於衆以徳來教雖豐祿崇禮巳隆其人而先王之道未簡聖聽在位累載官廢其職毎聽其言亦懐慷慨臣以可於良日就講經學先闡大道永播芳風愚臣區區敢獻瞽言請吳王入朝啓郎中令臣雲言殿下自即第日來既仍多哀故聖體亦恒不安和自不朝見二宫巳經年載前既比造趙軹近又自表出城至五日問訊輒以疾聞臣切所未安愚以此五日輿駕宜入朝臣聞事君之道茍在盡規知無不為是以愚臣敢獻瞽言請吳王覆校諸官啓郎中令臣雲言伏見令書以部曲將李咸馮南司馬吳定給事徐泰等覆校諸官市買錢帛簿率日决咸南等治書以下無所復司而察錢帛重寳奸吏多情出入之用誠宜使虚實當法以防檢巧偽然臣愚以聖徳龍興光有大國選衆官材庶工肄業臣以虚薄忝竊朝右雖質弱任重無益補察至於奉巳思勤昊天㒺極中尉該大農誕皆清徳淑慎恪居所司其下衆官悉州閭一介疏闇之咎雖可日聞至於處義用情庶無大戾今咸南軍旅小人定泰士卒厮賤非有清慎素著忠公足稱今猥使此等任以覆校大臣所關猶謂未詳咸等督察然後得信既非開國勿用之義又傷殿下推誠納下曠蕩之量雖使咸等能盡節益國而功利百倍至於光輔國美猶未若開懐信士之無失況咸等所益不過姑息之利而名使小人用事大道淩替此臣所以慷慨也亂之所興在於小人得親治之所廢在於君子自替廢興治亂由此而巳臣備位大臣職在獻可茍有管見敢不盡規愚以宜發明令必罷此等覆察衆士一付治書則無外之度闕光照逺大信臨下人思盡節矣謹隨啓以聞請防不法啓郎中令臣雲言國人兵放横多行非法至使暴及市道聲聞京邑親信兵乃罵詈洛陽市丞逺近囂然聲論日廣而主者前後所報毎䝉寛宥故羣小敢肆其暴虐前輿駕當東時臣具以奏聞上立節度亦備嚴上下司察念在奉宣而親信卒泰矯稱突關强市民物至使行道哀窮路人歎惋臣下祗命幸使罪人時獲僉以泰宜加重戮以戒肅方來軍都督李嬰行實奸穢然身備王人雖不致法猶加捶楚主者奏泰依嬰決罰事寢不出而特令原泰泰之凶狡罰至大辟至於今日不䝉薄罰臣竊以自今羣醜虎視競為暴虐矣小人得志則下淩上替前卿顯言事大農文㫖倨傲反成却安功名之士議在不辱而顯等恃恩敢行侮慢臣時列啓并呈顯言事寢不省是以自來拱嘿未敢多言切見國法日侈而恩宥無巳誠懼威禁遂頽醜聲滋聞愚謂自今宜齊之以法使下知禁有司所執猶宜時聽不然以徃則監司之吏鋒鉅靡加而準䋲替矣臣忝竊非據與聞國事服事以來荏苒三年朝憲多違威御無列好問不登而流聲播越皆由執政之臣官非其人常思收迹自替以避賢路退惟受遇㣲報未効是以忍垢素餐敢用文諫惟殿下哀明愚臣繾綣愚臣不以前後干迕多見罪責臨紙慷慨言不自盡書移太常府薦張贍書蓋聞在昔聖王承天御世􅇻薦明徳思和人神莫不崇典謨以教思興禮樂以陶逺是以帝堯昭煥而道協人天西伯質文而周隆二代大晉建皇業配天地區夏既混禮樂將庸君侯應厯運之㑹贊天人之期博延俊茂熙隆載典伏見衛將軍舎人同郡張贍茂徳清粹器慮深通初慕聖門棲心重仞啓塗及階遂升樞奥抽靈匱於秘宫披金縢於𤣥夏思樂百氏博採其珍辭邁翰林言敷其藻探微集逸思心洞神論道屬書篇章光覿含竒宰府婆娑公門棲靜隠寳淪虚蔵器褧裳襲錦褐衣被玉曾泉改路懸車將邁考槃下位嵗聿屢遷縉紳之士具懐㑶恨方今太清闢宇四門啓籥𤣥綱括地天網廣羅慶雲興以招龍和風起而儀鳳誠巖穴耀穎之秋河津託乗之日也而瞻沈淪下位羣望悼心若得端委太學錯綜先典垂纓玉階論道紫宫誠帝室之瑰寳清廟之偉器廣樂九奏必登昊天之庭韶夏六變必饗上帝之祀矣答車茂安書雲白前書未報重得來況知賢甥石季甫當屈鄮令尊堂憂灼賢姉涕泣上下愁勞舉家慘戚何可爾耶輒為足下具說鄮縣土地之快非徒浮言華豔而巳皆有實徴也縣去郡治不出三日直東而出水陸並通西有大湖廣縱千頃北有名山南有林澤東臨巨海徃徃無涯汜船長驅一舉千里北接青徐東洞交廣海物惟錯不可稱名遏長川以為陂燔茂草以為田火耕水種不煩人力決泄任意高下在心舉鈒成雲下鈒成雨既浸既潤隨時代序也官無逋滯之糓民無飢乏之慮衣食常充倉庫恒實榮辱既明禮節甚備為君甚簡為民亦易季冬之月牧事既畢嚴霜隕而蒹葭萎林鳥祭而罻羅設因民所欲順時游獵結罝繞堽宻罔彌山放鷹走犬弓弩亂發鳥不得飛獸不得逸真光赫之觀盤戲之至樂也若乃㫁遏海浦隔截曲隈隨潮進退采蜯捕魚鱣鮪赤尾䱟齒比目不可紀名鱠鰡鰒炙䱥鯸烝石首臛􅀢􅛈真東海之俊味肴膳之至妙也及其蜯蛤之屬目所希見耳所不聞品類數百難可盡言也昔秦始皇至尊至貴前臨終南退燕阿房離宫别館隨意所居沈綸涇渭飲馬昆明四方竒麗天下珍玩無所不有猶以不如吳㑹也鄉東觀滄海遂御六軍南廵狩登稽嶽刻文石身在鄮縣三十餘日夫以帝王之尊不憚爾行季甫年少受命牧民武城之歌足以興化桑弧蓬矢丈夫之志經營四方古人所歎何足憂乎且彼吏民恭謹篤慎敬愛官長鞭朴不施聲教風靡漢吳以來臨此縣者無不遷變尊大人賢姉上下當為喜慶歌舞相送勿為慮也足下急啓喻寛慰具説此意吾不虚言也停及不一一陸雲白與戴季甫書雲頓首頓首惟夏始暑願府館萬福疾病處逺人信希少情問闕替申間曠年瞻慕敬想興言反側隆敦比辱慰誨銜抱豐眷以増愚迹不勝勤企謹及君之書不以備隆敦上有脱誤又陸雲頓首頓首曠逺以來忽踰年載宗想輝䕃引領惟慕東歸之後疾患増瘵且道路悠逺不值信便久念自修而經年不果雖在伏枕至於結心注望實係光塵累䝉誨命舊眷惟新執對之日如或面展長塗自替聼誨末由瞻企勤戀守以委重表不具今更繼情又季鸞公世相係徂落俊徳茂業邦家之彦一朝並逝永爾淪沒哀痛切裂不能自勝奈何奈何江南初平人物失叙當賴俊彦彌縫其闕加在二賢楚國之良沈寳積實未重大朝重惟痛恨言増哀咽誠念仁風篤烈如在疇昔意愛所隆嗟悼之心誠不可言備䝉其分情兼切傷加承仁誨益以惻愴又武陵於荆州云多人士聞周孟子伍令明潘世長諸人竝為美徳心常依依今日遭遇良驥展才之秋也不審達者凡有㡬人無因聼承誨語咨禀未聞毎懐勤企表不盡言又長游前下停此十餘日想徳欣喜無以為喻分别恨恨于今戀之當暑逺涉益追心懸清粹沈茂思敏通微居徳履道秉心真實貴一時良彦君之别久見之懽察風姿美令心神烈暢已成美器欽愛之情欵然至實近聞若思未有通塗毎用於邑又周安東昔奄薨徂追慕切剝不能自勝勲業弗究早爾背世遺惠鄙州民物同哀備記名義情兼切裂在此㑹同毎言髙重武陵至心款列誠念篤終必垂悽愴王季楊孝友行素既簡清塵在此接近備其所顧居心秉尚用志不茍公私操實足為美器今為土㫁品還此郡前羣小虚妄遂下其編牒為之憤歎人物逺士彛倫多失願垂末光益有以潤區區至心謹復言意戴彦逺永昌猶為逺小想其必有惠政耳又郭敬言蒸陽良才逺負為之邑歎以其姿望足以致髙思不久爾耳石行文在無錫大有清績一州之髙功長吏此家行素道實州閭所稱疇昔接事既盡其才願重榮益以成其實凡在羽族思附鳳翼風塵所集無不拭目與張光禄書長幼之序人倫大司季世多難失敬在昔敢希令典求思自邁謹奏下敬以藉䖍款又顧令文彦先毎宣隆眷彌泰之惠懐徳惟慙守以反側既晞仁風委心自昵加與沛君分同骨肉慿藉之懐凝心如結又加䝉顧遇重以傾倒惟亮歸誠石行文敦素篤邃道實茂淑器敏既美思學又快南州良徳今者東行望風自託其意繾綣願厚接納副其乃心與朱光禄書少長之禮教化所崇中葉陵遲舊章廢替追維前訓思遵在昔敢慕髙義謹奏下敬與嚴宛陵書少長之序禮之大司晩節凌替舊章殘棄瞻言令典既慕欽承仰慿髙風實副邦民謹奏下敬以藉䖍款思復未逺庶免悔吝與楊彦明書雲白欽明去書不悉彦先來得書以為慰時去苒荏嵗行復半悲此推移終然何及漸巳欲熱想自如常悠悠守限良談未日眇然東望思以叙至及反憒罔不多行矣愛徳徃來相聞又雲白省示累紙重存徃㑹益以増歎年時可喜何速之甚昔年少時見五十公去此甚逺今日冉冉巳近之巳耳順之年行復為憂歎也柯生而多悅樂春未厭秋風行戒巳悲落葉矣人道多故懽樂恒乏遨遊此世當復㡬時各爾永鬲良㑹毎䦨懐想親愛寤寐無忘書無所悉彦先來相欣喜便復分别恨恨不可言階塗尚否通路今塞令人惘然名論允進逺而有光者度此顯期不淹民望耳廟堂之士比迹山棲者悲歎豈惟一人少明湘公亦不成遷名公之舉且可以為資然今恨恨當行行復有宜耳又彦先相說疾患漸欲増廢深為怛然行向衰篤疾來應百年之望雖未必此為疑然親親所以相䘏之一感耳想勤服藥行復向佳耳吾既當羸間來體中亦恒少賴日爾匆匆則堪自力未速侍罪㑹期難尅情之戀想何勞之多好自愛屢相聞又行言竟行令人恨之巳當至未耶能少留不世明篤行至性如前後所論語其偶爾旋冀能悟耳而聞其遂逺遡真使愕然寧以所不可虧一國之清格乎輒便絶意彦先所一二又戴㑹稽如是便發分别悢然一時名士惟當有此君耳失分重勞令人歎息善得日夕真家人若思望之清才俊類一時之彦善竝得接九月中可得達東禮衡陽長沙甚快東人近未復有見叙者公進屈久恒為邑罔黨方有清塗薄國譲在内中大有好稱此家一時美徳也在事又佳甚快甚快又永耀巳葬𠖇𠖇逺矣存想其人痛切肝懐奈何奈何聞伯華善佳深慰存亡人生有終誰得免此且使繼嗣克勝堂構有紹亦存亡之願也朋類喪索同好日盡如此生輩那可復多耶臨書酸心與陸典書書雲再拜自曠但爾巳復經時限制長路惟親未期唫近晨風傾匡結言來誨綢繆篤眷彌隆誦玩千周以當侍㑹靜言莫瞻翹翹仰慕大人汜愛在我尤𢎞毎銜思戀何時去心限此省省願言用替遙瞻靈丘感時情傷徃來信理自更繼情如有信唯不玉音又雲再拜侍郎比侍數㑹同邪常憶戀此君不慙有殞此君公私竝懀年長而志新齒邁而曽勤家宗美者也常感其篤分封之始年相見重達其至心又雲再拜日月運邁一何流速銜哀經變繫思愈深亡靈處彼黄塘幽曠在逺之憶心常愴裂含痛靡及悠悠奈何想時時復一省視思至心破無所屬情叔父一兄故尚未達想不乆至耳深憂徙際公私哀罔曠離山墓永適異國四時靈寂桑梓靡循且念親各爾分析情感復結悲歎而巳知大人毎垂䘏逮也臨表悲猥絶筆餘哀不知所次雲再拜又毎念彦先情兼剥裂年盛志美令姿可借舉言及此不知心傷也又雲再拜國士之邦實鍾俊哲太伯清風遯世立徳龍蜿東嶽三讓天下垂化邁迹百代所晞髙蹤越於先民盛徳稱乎在昔續及延陵繼響馳聲沈淪漂流優遊上國聆音察微智越衆俊通幽暢遐明同聖哲言偃昭烈於孔堂員武邁功於諸侯自秀偉相承明德繼踵亦為不少吳國初祚雄俊尤盛今日雖衰未皆下華夏也來誨所及遐邇同懐重及二聖下逮衆子或生羌狄或在邊域勲美之隆實如嘉誨愚以東國之士進無所立退無所守明裂眥苦皆未如意雲之鄙姿志歸丘壟蓽門閨窬之人敢晞天望之冀至於紹季札之遐蹤結鬲肝於中夏光東州之幽昧流榮勲於朝野所謂窺管以瞻天縁木而求魚也重申不􅍌雲再拜又雲再拜毎惟大人挺自然之妙質禀淵姿之𢎞毅克壮其烈兼詠之道希文尚武潛居以娛其志靜處以育其神遊步八素之林逍遙徳化之囿豈如某者牽曵璅璅世道通明俊乂在官焉使晞世之寳久隠岑唫之山逸景之迹永縶幽㝠之坂方将車乗囘綸束帛戔戔排金風於太微跨天路以妙觀恢皇綱之大烈垂榮祚乎祖宗此乃大人之所宜循非允夫之可企望也無因親展書以言心心之所積萬不叙一雲再拜又雲再拜巨卿前行陵有小事惟以具聞事巳大了猶以為願行欲取歸念别方至豫以愍然毎相見未嘗不以大人為言想令仁士光令逺公然兄弟屢數常存思想想令逺分好巳為綢固彦恩復䝉誘掖耳無因覲對言不盡心屢垂誨以慰逺思雲再拜又雲再拜巨卿在臺髙譽洋溢洛邑之内無不欽敬東南之貴寳真不但㑹稽之篠簜也毎㑹常共歌詠信無一面不歎吟也想方周旋攜手散今日之思耳雲再拜又雲再拜輒宣來意仲應此家大自欽重大人儻巳見其意耳又雲再拜不知從事今在州得假歸耳想今來得行有縁侍面耳毎得令逺書感賴豐化言言歸欵來誨恤及亦為無已情深欣如云在身年嵗及人名聞難集非賴師友何以自濟願敦惠助為之光輔巨仁在此華亭之望以大人為宗主宜令小大得分亦崇洪業也雲再拜弔陳永長書雲頓首頓首哀懐切怛賢弟永曜早喪俊徳酷痛甚痛奈何陸士龍頓首頓首又雲頓首頓首天災横流禍害無常何圖永曜奄忽遇此凶問卒至痛心摧剝奈何奈何想念篤性哀悼切裂當何堪言無因展告望企哽􅍋財遣表唁悲猥不次雲頓首又永曜茂徳逺量一時秀生竒蹤瑋寳灼爾凌羣光國隆家人士之望冀其永年遂播盛業攜手退遊假樂此世奈何一朝獨先彫落奄聞凶諱禍出不意拊心痛楚肝懐如割奈何奈何豈況至性何可為心臨書鯁塞投筆傷情又與永曜相得便結願好契濶分爱恩同至親慿烈三益終始所願中間離别但爾累年結想之懐夢寐㑂佛何圖忽爾便成永隔哀心慟楚不能自勝痛當奈何奈何義在奔馳牽役萬里至心不叙東望貴舎雨淚霑襟今遣吏并進薄祭不得臨哀追増切裂幸損至念書重不知所言又永曜素自彊徤了不知有此患險戲之災遂不可救豈惟貴門獨喪重寳此賢之殞邦家以瘁情分異他痛心殊深巳矣逺矣可復奈何追想遺規不去心目悠悠無期哀至悲裂不知何言可以言知酷楚而巳弔陳伯華書大君逺資髙數世之瑰瑋當光裕大業茂垂勲名奈何日朝早爾喪墜自聞凶諱痛心割裂追惟哀摧肝心破剝痛當奈何奈何相念夙年奄嬰哀艱扳慕不及當何為心牽役逺路無因奔馳東望靈宇五情哽咽割切哀慕書重感猥不次又昔與大君分義欵篤彌隆之愛恩加兄弟慿此烈好要以始卒何圖大君獨先早世逺聞訃問若喪四體拊心慟楚肝心如割奈何奈何豈況至性當何可言今遣吏恭集薄祭不得臨喪以叙悲苦計往人到貴舎之日揮涕而巳投筆歔欷春節帖三月十六日雲白春節餘不適得示知足下平安為思面未知何由如何信數之及卿既清邃可之經髙言人歎之當令征南取之也書與兄平原書一日案行并視曹公器物牀薦席具寒夏被七枚介幘如吳幘平天冠逺遊冠具在嚴器方七八寸髙四寸餘中無鬲如吳小人嚴具狀刷膩處尚可識疏枇剔齒纎綖皆在拭目黄絮二在垢垢黒目淚所沾洿手衣卧籠挽蒲棋局書箱亦在奏案大小五枚書車又作岐案以卧視書扇如吳扇要扇亦在書箱想兄識彦髙書箱甚似之筆亦如吳筆硯亦爾書刀五枚琉璃筆一枚所希聞景初三年七月劉媫妤折之見此期復使人悵然有感處器物皆素今送鄴宫大尺間數前巳白其繐帳及望墓田處是清河時臺上諸竒變無方常欲問曹公使賊得上臺而公但以變譎因旋避之若焚臺當云何此公似亦不能止文昌殿北有閣道去殿文内中在東殿東便屬陳留王内不可得見也案魏武帝於漢為相不得有媫妤又景初是魏明帝年如此則文帝物也與曹公器玩同處故致舛雜矣又一日上三臺曹公蔵石墨數十萬片云燒此消復可用然烟中人不知兄頗見之不今送二螺又此書舊誤接前二螺下作一篇今正之省曹公遺事天下多意長才乃當爾作弊屋向百年于今正平夷塘乃不可得壊便以斧斫之耳爾定以知吏稱其職民安其業也又近日復案行曹公器物取其剔齒纎一箇今以送兄又兄于道有古方泉其銘如此不審兄頗曽見此書種稷不近因魯引以問祕書中謹啓舊接今送一篇疑兄上有脱誤又雲再拜前省皇甫士安髙士傳復作逸民賦今復送之如欲報稱久不作文多不悦澤兄為小潤色之可成佳物願必留意四言五言非所長頗能作賦為欲作十篇許小者以為一分生於愁思遂復文誨欲得雲論間在在郡紛紛有所鈎定言語流行㫁絶欲更定之而了不可以思慮今自好醜不可視想冬下體中佳能定之耳兄文章巳自行天下多少無所在且用思困人亦不事復及以此自勞役間居恐復不能不願當自消息謹啓又雲再拜祠堂頌巳得省兄文不復稍論常佳然了不見出語意謂非兄文之休者前後讀兄文一再過便上口語省此文雖未大精然了無所識然此文甚自難事同又相似益不古皆新綺用此巳自為洋洋耳答少明詩亦未為妙省之如不悲苦無惻然傷心言今重復精之一日見正叔與兄讀古五言詩此生歎息欲得之謹啓又雲再拜二祖頌甚為髙偉雲作雖時有一佳語見兄作又欲成貧儉家無緣當致兄此謙辭又雲亦復不以茍自退耳然意故復謂之微多民不輟歎一句謂可省武烈未得有吳説桓王之事而云建其孤恐太祖不得為桓王之孫雲前作此頌及信以白兄作游仙詩故自能劉氏頌極佳但無出言耳二頌不减復過所望如此巳欲觧此公之半歲暮賦甚欲成之而不可自用得此百數十字今送不知於諸賦者不罷少不想少佳成當送到洛陳琳大荒甚極自雲作必過之想終能自果耳謹啓二陸集並不見二祖頌劉氏頌游僊詩惟嵗暮賦耳所失多矣又雲再拜兵真凶事生來初不見習頃觀之正自使人意惡羊腸轉時極佳問人皆不解何以作此轉雖云欲相泄恐此正自取好耳説之不能工願兄試一説之張義元答員淵之囘流崑崙吐河不體正自似急水中山石間是人謂囘轉者但言之辭不工耳不知此中語於諸賦中何如又頃日極匆匆病一十當出畧通日在馬上此不可諧又恐信不及兄今以因休祖致又力作無錫書極無賴甚不備具如是更白問于中又雲再拜省諸賦皆有髙言絶典不可復言頃有事復不大快凡得再三視耳其未精倉卒未能為之次第省述思賦深情至言實為清妙恐故復未得為兄賦之最兄文自為雄非累日精㧞卒不可得言文賦甚有辭綺語頗多文適多體便欲不清不審兄呼爾不詠徳頌甚復盡美省之惻然扇賦腹中愈首尾發頭一而不快言烏云龍見如有不體感逝賦愈前恐故當小不然一至不復减漏賦可謂清工兄頓作爾多文而新竒乃爾真令人怖不當復道作文謹啓又雲再拜祠堂贊甚巳盡美不與昔同既此不容多説又皆一事非兄亦不可得見弔少明殊復勝前弔蔡君清妙不可言漢功臣頌甚美恐弔蔡君故當為最使雲作文好惡為當又可成耳至於定兄文惟兄亦恕其無遺情而不自盡耳丞相贊云披結散紛辭中原不清利兄巳自作銘此但頌實事耳亦謂可如兄意直說事而巳右當復屬文於引便當書前銘耳謹啓又雲再拜誨欲定吳書雲昔嘗巳商之兄此真不朽事恐不與十分好書同是出千載事兄作必自與昔人相去辯亡則巳是過秦對事求當可得耳陳夀吳書有魏賜九錫文及分天下文吳書不載又有嚴陸諸君傳今當寫送兄體中佳者可並思諸應作傳及作引甚單常欲引之未得兄所作引甚好雲方欲更作引述思賦儻自竭厲然雲意皆巳盡不知本復何言方當積思思有利鈍如兄所賦恐不可須願兄且以示伯聲兄弟又舊與前書合為一篇語意不貫今拆為二前日觀習先欲作講武賦因欲逺言大體欲獻之大將軍才不便作大文得少許家語不知此可出不故鈔以白兄若兄意謂此可成者欲試成之大文難作庶可以為關雎之見微謹啓又雲再拜徃日論文先辭而後情尚潔而不取悦澤嘗憶兄道張公父子論文實欲自得今日便欲宗其言兄文章之髙逺絶異不可復稱言然猶皆欲微多但清新相接不以此為病耳若復令小省恐其妙欲不見可復稱極不審兄猶以為爾不茂曹碑皆自是蔡氏碑之上者比視蔡氏數十碑殊多不及言亦自清美愚以無疑不存三祖贊不可聞武帝贊如欲管管流澤有以常相稱美如不史願更視之小跛㡬而悦奕為盡理雲今意視文乃好清省欲無以尚意之至此乃出自然張公在者必罷必復以此見調不知九愍不多不當小减九悲九愁連日鈔除所去甚多才本不精正自極此願兄小為之定一字兩字出之便欲得遲望不言謹啓又雲再拜仲宣文如兄言實得張公力如子桓書亦自不乃重之兄詩多勝其思親耳登樓賦無乃煩感丘其弔夷齊辭不為偉兄二弔自美之但其呵二子小工正當以此言為髙文耳文中有於是爾乃於轉句誠佳然得不用之益快有故不如無又於文句中自可不用之便少亦常云四言轉句以四句為佳徃曽以兄七羨回煩手而沈哀結上兩句為孤今更視定自有不應用時期當爾復以為不快故前多有所去喜霽俯煩習均弔誠重離此下重得如此語為佳思不得其韻願兄為益之謹啓又雲再拜嘗聞湯仲歎九歌昔讀楚辭意不大愛之頃日視之實自清絶滔滔故自是識者古今來為如此種文此為宗矣視九章時有善語大類是穢文不難舉意視九歌便自歸謝絶思兄常欲其作詩文獨未作此曹語若消息小佳願兄可試作之兄復不作者恐此文獨單行千載間嘗謂此曹語不好視九歌正自可歎息王褒作九懐亦極佳恐猶自繼真𤣥盛稱九辯意甚不愛又雲再拜頃得張公封禪事平平耳不及李氏其文無比恐非其所作欲見此公劉氏世頌有信願付雲頃又為輔吳奮威作頌欲愈前頌然意並不以快遣信當送九愍三賦脱然謂可舉意假彼頌便有怯處想無又間便可耳大類不便作四言五言謹啓又雲再拜誨二賦佳久不復作文又不復視文章都自無次第文章既自可羨且解愁忘憂但作之不工煩勞而棄力故久絶意耳在此悲思視書不能解前作二篇後為復欲有所作以慰小思慮便大頓極不知何以乃爾前登城門意有懐作登臺賦極未能成而崔君苗作之聊復成前意不能令佳而羸瘁累日猶云愈前二賦不審兄平之云何願小有損益一字兩字不敢望多音楚願兄便定之兄音與獻彦之屬皆願仲宣須賦獻與服繁張公語雲云兄文故自楚須作文為思昔所識文乃視兄作誄又令結使說音耳兄所撰願且可付之此有書者更校善書送信還望之謹啓又雲再拜疏成髙作未得去省登遐傳因作登遐頌須臾便成視之復謂可行今並送之尚未定刋及比信今更有何所損益後八人了無事合㑹之才得二篇耳索度是淫鬼無緣在此中故不可作頌愁邑忽欲復作文臨時輒自云佳小久報不能視為此故息意文欲定前於用功夫大小文隨了為以解愁作爾今視所作不謂乃極更不自信恐年時間復捐棄之徒自困苦爾兄小加潤色便欲可出極不苦作文但無新竒而體力甚困瘁耳謹索幼安在此令之草今住一𢎞不呼作工謹啓又雲再拜誨頌兄乃以為佳甚以自慰文章當貴經緯如謂後頌語如漂漂故謂如小勝耳九愍如兄所誨亦殊過望雲意自謂當不如三賦情難非體中所長欲徧周流雲意亦謂為佳耳然不云其愈於與漁父吾今多少有所定及所欲去留粗爾今送本徃不審能勝故不意亦殊未以為了南去轉逺洛中匆匆少暇願兄勑所遣留為當爾可須來不佳思慮益處未能補所欲去徹與察皆不與日韻思惟不能得願賜此一字雲作文如兄所論巳過所望況乃敢當今兄有張蔡之懐得此乃懐怖也謹啓又雲再拜誨嵗暮如兄所誨雲意亦如前啓情言深至述思自難希毎憶常侍自論文為當復自力耳雲意呼發頭但當小不如復耳兄乃不好者試當更思之所誨雲文所比愁霖喜霽之徒實有可爾者登樓名髙恐未可越爾楊四公黄胡頌恐此不得見比聞兄此誨若有喜懼交集祖徳頌無大諫語耳然靡靡清工用辭緯澤亦未易恐兄末熟視之耳兄文方當日多但文實無貴於為多多而如兄文者人不厭其多也屢視諸故時文皆有恨文體成爾然新聲故自難復過九悲多好語可耽詠但小不韻耳皆巳行天下天下人歸髙如此亦可不復更耳兄作大賦必好意精時故願兄作數大文近日視子安賦亦對之歎息絶工矣兄誨又爾故自是髙手謹啓又雲再拜蔡氏所長惟銘頌耳銘之善者亦復數篇其餘平平耳兄詩賦自與絶域不當稍與比校張公昔亦云兄新聲多之不同也典當故為未及彦藏亦云爾又古今兄文所未得與校者亦惟兄所道數都賦耳其餘雖有小勝負大都自皆為雄耳張公父子亦語雲兄文過子安子安諸賦兄復不皆過其便可可不與供論雲謂兄作二京必傳無疑久勸兄為耳又思三都世人巳作是語觸類長之能事可見幽通賓戲之徒自難作賓戲客語可為耳答之甚未易東方士所不得全其髙名頗有答極謹啓又雲再拜誨九愍如所勑此自未定然雲意自謂故當是近所作上近者意又謂其與漁父相見以下盡篇為佳謂兄必許此條而淵弦意呼作脱可行耳至兄惟以此為快不知雲論文何以當與兄意作如此異此是情文但本少情而頗能作汜説耳又見作九者多不祖宗原意而自作一家説惟兄説與漁父相見又不大委曲盡其意雲以原流放惟見此一人當為致其義深自謂佳願兄可試更視與漁父相見時語亦無他異附情而言恐此故勝淵弦兄意所謂不善願疏勑其處緒亦欲成之令出意莫更感如惡所在以兄文雲猶時有所能得言雲前後所作謹啓又雲再拜誨前二賦佳視之行巳復不如初昔文自無可成蔵之甚宻而為復漏顯世欲為益者豈有謂之不善而不為懐此不成意想兄巳得懐之耳有作文惟尚多而家多猪羊之徒作蟬賦二千餘言隠士賦三千餘言既無藻偉體都自不似事文章實自不當多古今之能為新聲絶曲者無又過兄兄徃日文雖多瑰鑠至於文體實不如今日間在洛有所視巳當報而比更隆以今意觀文見此真更以為不盡善文羆云故日向人歎兄文人終來同殆以此為病張公文無他異正自清省無煩長作文正爾自復佳兄文章巳顯一世亦不足復多自困苦適欲白兄可因今清靜盡定昔日文但當鈎除差易為功力誨巳定敬長誄意當闇與兄合雲久絶意於文章由前日見敦之後而作文解愁聊復作數篇為復欲有所為以忘憂貧家佳物便欲盡但有錢榖復羞出之而體中殊不可以思慮腹立滿背便熱亦誠可悲間視大荒傳欲作大荒賦既自難工又是大賦恐交自困絶異徃經比干墓悵然欲弔之無又即意又事業闕又雲再拜張公箴誄自過五言詩耳但雲自不便五言詩由巳而言耳𤣥泰誄自不及士祚誄兄丞相箴小多不如女史清約耳恐兄無緣思於此意猶云何而兄乃有髙論更復無意雲故日不作文而常少張公文今所作兄輒復云過之得作此公輩便可斐然有所謝故自為不及諸碑箴輩甚極不足與校歌亦平平彼見人讚叙者當與令伯論吳百官次第公卿名伯畧盡識少交當具頃作頌及吳事有愴然且公傳未成諸人所作多不盡理兄作之公私並叙且又非常業從雲兄來作之今畧巳成甚復可惜事少功夫亦易耳猶可得五十巻謹啓梅禹金云彼見以下疑别一篇又義髙家事正當付令文耳弟彦長昔作吳事云三十巻可令欽求謹啓又雲再拜吳書是大業既可垂不朽且非兄述此一國事遂亦失兄諸列人皆是名士不知姚公足為作傳不可著儒林中耳不大識唐子正事愚謂常侍便可連於尚書傳下書定自難雲少作書至今不能令成日見其不易前數巻為時有佳語近來意亦殊巳莫莫猶當一定之恐不全此七巻無意復望増欲作文章六七紙巻十分可令皆如今所作輩為復差徒爾文章誠不用多茍巻必佳便謂此為足今見已向四巻比五十可得成但恐胸中成􅠰爾恐兄胷疾必述作人故計兄凡著此之自損胷中無緣不病作書猶差易讚叙亦復無㡬年嵗限之猶當小復謹啓又雲再拜一日㑹公大欽欣命坐者皆賦諸詩了不作備此日又病極得思惟立草復不為乃倉卒退還猶復多少有所定猶不副意與頌雖同體然佳不如頌不解此意可以不𢎞逺去當祖道似當復作詩搆作此一篇至積思復欲不如前倉卒時不知為可存錄不諸詩未出别寫送𢎞逺詩極佳中靜作亦佳張魏郡作急就詩公甚笑燕王亦似不復祖道𢎞逺巳作為存耳兄園葵詩清工然猶復非兄詩妙者雲詩亦惟為彼一語如佳先巳先得便自委頓欲更作之昔如巳身先此篇詩了不復㑂彿識有此語此語於常言為佳謹啓又雲再拜久不復作文了無復次第真𤣥昔屢聞周侯至論前比霖雨此下人亦作愁霖賦好醜見敦又因人見督自愁慘又了無復意此家勤勤難違之亦復毒此雨憂邑聊作之因以言哀思又作喜霽今送雲作為易得耳窮不好故都絶意此間人呼作者皆休故不得有所送不審此何成巳出之故為存不棄耳謹啓又雲再拜一日視伯喈祖徳頌亦以述作宜褒揚祖考為先聊復作此頌今送之願兄為損益之欲令省而正自輒多欲無可如省碑文通大悦愉有似賦愚謂小復質之為佳前作此頌書之行欲遣信以白兄昨聞有賊消息愁憒無賴既冀又然又巳成書聊以付信耳尋得李寵勸封禪草信自有才頗多煩長耳令送間人又有張公所作巳令寫别送臨紙罔罔不知所言謹啓又近得洛消息滕永適去二十日書彦先訪為驃騎司馬又云似未成巳訪難解耳敬屬司馬㕘軍此間復夫之恨不得與周旋戴允治見訪大司馬謹啓又雲再拜君苗文天才中亦少爾然自復能作文雲惟見其登臺賦及詩頌作愁霖賦極佳頗倣雲雲所如多恐故當在二人後然未究見其文見兄文輒云欲燒筆硯以為此故不喜出之曹志苗之婦公其婦及兒皆能作文頃借其釋詢二十七巻當欲百餘紙寫之不知兄盡有不李氏云雪與列韻曹便復不用人亦復云曹不可用者音自難得正謹啓又雲再拜令送君苗登臺賦為佳手筆云復更定復勝此不知能愈之不其人推能兄文不可言作文百餘巻不肯出之視仲宣賦集初述征登樓前耶甚佳其餘平平不得言情處此賢文正自欲不茂不審兄呼爾不真𤣥亦云兄文當作宣輩宣得此巍巍耳愁霖喜霽殊自委頓恐此都自易勝謹啓又雲再拜誨頌兄意乃以為佳甚以自慰今易上韻不知差前不不佳者願兄小為損益令定下云靈斾電揮因兄見許意遂不恪不知可作蔡氏祖徳頌比不景猷有蔡氏文四十餘卷小者六七紙大者數十紙文章亦足為多然其可貴者故復是常所文耳雲頃不佳思慮胸腹如鼔夜不便眠了不可又以有意兄不佳文章巳足垂不朽不足又多謹啓又雲再拜稽邵周弼並處事不值免詔甚切甚念之悚息胡光禄亡宿士可痛含邠還云滔中書散騎並缺是其才不知何以乃古之謹啓又雲再拜頃哀思更力成嵗暮賦適且畢猶未大定自呼前後所未有是雲文之絶無又憶兄常云文後成者恒謂之佳貞小爾恐數自後轉不如今且欲寄之既未大定又恐此信至兄巳發當因著洛謹啓又雲再拜兄前表甚有深情逺㫖可耽味髙文也兄文雖復自相為作多少然無不為髙體中不快不足復以自勞役耳前集兄文為二十巻適訖一十當黄之書不工紙又惡恨不精謹啓頌登遐頌夫死生存亡二理之巳然者也而世有神仙登遐之言千嵗不死之夀其詳固難得而精矣列仙之道作者既集而登遐未有焉荘周有言我試妄言之子試妄聽之彼之有無蓋難以理求我之妄聽顧可以言寄之遂為頌云爾郊間人孔仲尼王子喬人九疑仙𤣥洛山上女大勝李少君左元放梅福劉根張招嚴黄伯費長房塵鮮卑務何女子韓衆焦生子夷門林陽子鬼谷子任作子淵哉郊間懐寳採薪媚兹伯陽常道是夤俯翼遊周攜手入秦遺物執一妙世頥神思我𤣥流浩若無津王喬淵嘿遂志潛輝遺形靈嶽顧景忘歸孌彼有傳與爾翻飛承雲鯈忽飄颻紫微𤣥洛妙識飢餌神頴在隂鯈逝即陽無景逍遙北嶽凌霄引領揮霧昊天合神自靖孔丘大聖配天𢎞道風扇𤣥流思探神寳明發懐周興言謨老靈魄有行言觀蒼昊清歌先試丹書有造茫茫九疑登暉太素有漢登聞神具爾顧發彼靈丘聿來載步貽我則歌永揚遐祚大勝之娥厥猶翼翼降宫有和納符帝側揮杖指辰絶音頽息苕苕𤣥右在彼峻極少君善祠怡爾豐顔俯視劉漢仰接姜桓式宴安期巨棗為餐神光攸徃後來其嘆在漢之衰頽火炎精梅公指景有皇遺形逝彼文辭胥此洞庭神輝絶景豈外北㝠張招澄精妙思𤣥芒則是神物錯綜徽章乃幽乃顯若存若亡因形則變倐忽無方生在清純放情𤣥昧在物淵沈沂虚攸遂清酒一壺百朋具醉有命集止乗龍來萃載見君子言觀其蔚劉根登嵩遺世盤桓形委服容口厭瓊蘭挹彼呼翕為爾朝餐景絶巖穴光茂雲端伯嚴志道飜飛自南北食中嶽練形嵩岑奔星凌顔朱光垂隂雲精九闕握耀盈襟長房有懐承師問道䝉險洪海晞心𤣥浩将登蓬萊祚爾難老嘉命既錫如何勿考逝矣何女芳靈既彫安寝曽丘逝魂清霄喪魄載營大墓崇朝玉趾再步於焉逍遙焦生卜居在河之東皓襟解帶嘉卉結容頥神太素淑思𤣥冲在彼黄堂明道固窮北狄務塵在彼沙漠含神自頥靜居有恪自彼王庭聿來伊洛天子命之載見紫閣衛矣終化靈毛揚葩慎爾貞心神祉來荷靡靡夷門體道含真飡茹靈卉凌雲頥神林陽餌車明視聰耳壮子既飡步晞千里任化凱入輕雲揮止移形善變載坐載起悠悠鬼谷永言潛止要終有集資生無始綢繆方平在彼二子芬響蘭揮有來盈耳盛徳頌余行經泗水髙帝昔為亭長於此瞻望山川意有慨然遂奏章以通情焉并為之頌云爾晉太子舎人糞土臣雲稽首再拜上書皇帝陛下臣雲頓首死罪伏惟陛下紹軒轅之叡哲越三代之髙蹤膺有聖之𤣥景藴生民之上畧秦政肆虐漸舋生民在昔上帝乃眷多方肅雍寳命鑒民顧天思文叡聖以宅神器六合焱駕八荒星錯企皇居於阿房犄逸鹿於九野謀猷回遹天人匪祚乃薾斯國授漢于西京是以先紹五緯章太素神母哀號底命丹野九垓闢授命之符鈞天清建皇之鑒陛下螭蟠泗水龍躍下亭慶雲徘徊紫塵熠爍皇威肇於㫁蛇神武基於豐沛掩四緱以蓋天廓𤣥謨以闢宇華宫山蔵玉堂海紬雲蓋景隂金門林蔚拔足崇長揖之賓吐飱納獻規之客𤣥猷上通徳輝下濟仰翰雲禽俯躍魚魴是以四海之内莫不企景嶽以接羣望廣川而鱗集乗山涉水視險若夷奔波闕廷思効死節乃鳴鸞在衡奔驥服輅良平鳳棲信布虎據豪雄凌暴於外竒謨補闕乎内威謀兼陳智勇畢効乃凌河海河海無梁乃仆髙山嶽華不重三秦席巻項籍灰分逋虜霧散遺寇雲徹泛時雨以清天灑狂塵以肅地闕轡於舟輿竦峻蓋於蒼昊功濟宇宙徳被羣生天人允嘉民神協愛厯數在身有命将集而陛下猶復允執髙讓成功靡有普天歸徳羣后固請然後謁天皇於圜丘巡萬乗於帝室率土離暴秦之亂臣妾䝉有道之惠戎羌蠻夷之墟雕趾肅慎之國莫非帝臣巍巍蕩蕩蓋天臨地自啓闢以來有皇之美未有若聖功之著盛者也臣雲頓首頓首死罪死罪臣以鄙倍文武無施忝寵本朝承乏下位而臣遘愍自西徂東行邁攸止路經泗水伏見史臣班固撰録聖功竊承陛下扶桑始照天暉未融之日嘗臨御此川於是即命舟人弭檝水沚瞻仰山川舊物不替永惟聖輝罔識所慿逺眺邇企感物興哀終懐靡及拊心遐慕臣命違千載之運身生四百之外恨不得役力聖明之鑒寓目風塵之㑹揮戈前隊待罪下軍抽鋒咸陽之關提鉞項籍之領痛心自悼不知所裁行役之臣牽制朝憲雖懐彷徨王事靡盬肅将言邁實衘罔極臣聞遊魂變化神道無方雖聖靈登遐降陟在天連光五精流輝太一或冀神輿降觀薄狩五服時邁玉輅言巡兹邑是以下臣仰瞻紫宫俯要恍惚愚情振蕩靡審所如不勝延頸紫微結心閶闔之情謹住水濱拜章陳愚臣雲誠惶誠恐頓首頓首死罪死罪稽首以聞臣雲言臣聞歌詠所以宣成功之烈詩頌所以美盛徳之容是以聞其聲則重華之道彌新存其操則文王之容可覩永惟陛下聖徳豐化比隆前代元勲茂功超蹤在昔故詩歌之所依詠金石之所揄揚者也臣謹上盛徳頌一篇雖不足以仰度天髙伏測地厚實獻狂夫區區之情臣雲云云晉太子舎人臣陸雲上於皇漢祖纂胄有唐平章在昔文思百王丹輝棲列火精幽光爰兹聖緒頽維弛綱靈曜熠爍隮景扶桑則天未墜重規旻蒼其規伊何横乾作峻厥徳不回矩地能順慿河拓景襄嶽殷韻龍章炯偉虎質碩變有秦不競罔極黔首震驚予師思䖍神主上帝曰咨天鑒有赫乃眷伊漢此惟予宅明明聖皇既受帝祉雲騰下邑風駭泗水仰鏡天文五緯同晷俯察雲符神母爰止思文聖王克廣克遐威靈羣桀徳潤諸華爰祀天人天人攸嘉爰輯蒸徒蒸徒旣和旣和旣順乃矢徳音豐沛之旅其㑹如林朱旗虹超彤斾電㝷推師蕭曹撫劍高吟元戎薄伐時罔不龕凌波川潰肆野陸沈咸陽克殄既係秦后峩峩阿房乃清帝宇穆穆聖皇天保攸定有項畔換不式王命王命既愆黜我西土於鑠王師遵時匪怒爰赫乗舋席巻三夏嘽嘽戎軒矯矯乗馬燮伐强楚至于垓下天誅薄曜暴籍授首區夏既混宇宙䝉乂肅肅帝居巍巍神器有皇于登是臨天位繡文于裳組華于黻明明天子有穆其容至止鏘鏘相維辟公宣聲路寝發號紫宫頒此愷悌以畜萬邦思樂皇慶協于時雍琴瑟在御大予舞功越裳委贄肅慎來王明明聖皇開國乗制分圭祚勞河山命誓禮律克彰典文垂藝有漢恢恢疏罔不替聖功克明九方孔安良宰内幹武臣外閑漸澤冀域沾被戎蠻連光太素萬載不刋祖考頌雲之世族承黄虞之苗緒裔靈根之遺芳用能枝播千條頴振萬葉繁衍固於三代饗祀存乎百世豈非皇慶之積祐神明之殷祥者哉在周之衰有媯之後将育于姜而貞龜發鳴鳳之兆周史表觀國之繇故能光宇營丘奄有東海支庶蕃廡而𦙍祚昌大矣遭世多難子孫蕩析逐于南土烈祖丞相卲侯顯考大司馬武侯明徳叡哲沈雄特秀固上天所以繼迹前期惠成顧者也是以有吳雲興而卲侯龍見遂風騰海堣電㫁荆楚運籌制勝底定經畧文徳光宣武功四克乃作台衡以御于王政天綱與先代比隆義問與前修接響固所謂汪洋浩浩不世出者哉武侯以光逺之度襲重規之範宣朗之明照曽暉之景故寅亮樞極則萬物淳曜緝熙有邦而宇内恪居及至中葉亂曰虎臣綏援既集而大難時弭德濟封域之内威揚函夏之表遂仍世作宰焜耀祖業車實襲軌裘不改帶元勲昺於光國洪烈著於隆家考徳計功比之前代未有茂於此者也是以小子敢慕徽猷欽述芳烈雖不足以當朱絃之一唱發清廟之三歎蓋爾臣子之遺恩罔極之所處也乃作頌曰悠悠聖緒上帝是臨世篤其猷于顯徽音神風徃播福禄來尋靈根既茂萬葉垂林繁盛海嵎頴寧漢隂既曰寧止芳祐允淑乃步斯淳降神有陸赫矣二公應期載育明明邵侯允哲允謀叡心昭徳淑問宣猷如日之升如川之至炎精既頽黄輝昺煥光宅海邦大造江漢王于出征二公斯難長驅致届九有有判咸黜㓙醜區域寧晏天禄未終大命有集卜食東夏元龜既襲聿來故宫作蕃舊邑公徒斯振帝旅凱入於變時雍神道經始肅肅九命永言徽止公拜稽首對􅏡天子猗歟盛歟邵侯有作我考纂戎爰究爰度逺除尋軌崇基式廓昭明有家祖廟奕奕中葉虎臣稱亂西秦靈斾電揮伐鼓霆震㑹朝哀舉征不浹辰遐風逺掃萬里無塵有族斯祐念功在兹衮衣之宜遂作上司台光増朗方險載夷穆矣暉章有吳之旗我祖我考受言藏之曄曄藻裳再命同服騑騑四牡二世方轂分珪比瑞天秩底祿公堂峻趾華構重屋昔在二伊于殷有聲在漢之興亦曰韋平惟祖惟考履貞大亨邈彼披陽追蹤阿衡駿惠雨施景潤雲行洋洋𤣥化功濟其民風馳海表光被嶽濱二后重規世有哲人肅雍碩響萬載是振張二侯頌有序張氏之先蓋少昊氏之苗裔也其在春秋晉徳方休而張老延譽爰暨有漢文成佐命於初基司空揚聲於末葉流長祚逺世不乏侯輔吳将軍文侯遭季末雲擾遂避難于東有吳之興實為謀主桓王即世援建太祖知命審於将萌先識鏡於未兆遂作上将輔成王業立朝無不易之方正色有犯顔之亮固所謂蹇蹇王臣古之遺直者也奮威将軍定侯明徳光逺軌量𢎞濟文敏足以華國威畧足以振衆重規繼體而大業暉崇故休祚頻繁寵靈仍世天秩之體彌彰而毁盈之心兹沖用能保寵固世考終碩問蓋竹帛之所光宣詠歌之所揄揚也乃作頌曰烈文逺祖肇自上皇金天淳曜遂濟窮桑真人有作飛龍在天留侯載見階雲自淵即謀神造啓運妙𤣥有漢再命度邑于東其在中葉誕育司空邈矣唐陵有恭斯庸寧行盈止世篤天禄神之聽思俾我戩榖繁過芳祐底之洪族洪族既昌再惠音徽於穆二侯仍世雙飛堂堂輔吳仰抑奮威如龍之躍如鳳之輝薄言戾止在彼紫微金卯紛若四海畔換文侯乃顧妙世達觀逝彼塗方度兹江漢鳴飛遵海聿來有亂遭家不造殱我明聖桓后肇揚侯承末命皇大烝哉天保末定匪侯䘏度宗緒孰正帝整我旅外薄四荒命作惟師時惟鷹揚遂登上将亮彼大皇底邑胙土命珪有璋蹇蹇我侯明發宿夜襲彼遺直興言有謩聿懷來忠王室之故猗歟定侯祇服清曜奕奕瓊範玉潤淑貌淵􅠛徃蔵朗思來照曽是徽章再世被荷庸勲開國明道隆家苾苾其芬淑問揚和有蔚其文如林之華皇矣帝祚受言既崇女有行作合儲宫條延延紫極頴衍皇靈舋舋定侯在盈思沖祇寵戒益永懐慎終重光並曜播我芳風贊榮啓期贊榮啓期者周時人也值衰世之季末當王道頹凌遂隠居窮處遺物求巳泝懐𤣥妙之門求意希微之域天子不得而臣諸侯不得而友行年九十被裘鼓琴而歌孔子過之問曰先生何樂答曰吾樂甚多天生萬物惟人為貴吾得為人矣是一樂也以男為貴吾又得為男是二樂也或皆不免於襁褓而吾行年九十是三樂也夫貧者士之常也死固命之終也居常待終當何憂乎孔子聼其音為之三日悲常被裘帯索行吟於路曰吾著裘者何求帶索者何索遂放志一丘滅景榛藪居真思樂之林利涉忘憂之沼以卒其天年榮華溢世不足以盈其心萬物兼陳不足以易其樂絶景雲霄之表濯志北溟之津豈非天真至素體正含和者哉友人有圖其象者命為之贊其辭曰芒芒至道天啓德心自昔逸民遁志山林邈矣先生如龍之潛夷明收察滅迹在隂傲世求已遺物自欽景遯瓊煇響和絶音戀彼丘園研道之微思樂寒泉薄採春蕤鳴絃清泛撫節髙徽有聖戾止永言傷悲天造草昧負道實嘉於鑠先生既體斯和熊羆作祥黄髪皤皤耽此三樂遺彼世華翼翼彼路行吟以遊的的黻冕陋我輕裘永脱亂世受言一丘媚兹常道聊以忘憂箴逸民箴余昔為逸民賦大将軍掾何道彦大府之俊才也作反逸民賦盛稱官人以美寵禄之華靡偉名位之大寳斐然其可觀也夫名者實之賓位者物之寄窮髙有必顛之郄溢美有大惡之尤可不慎哉故為逸民箴以戒反正焉浩浩太素制為兩儀經始君臣朝有俊弼野有逸民各有攸届而後品物有倫在昔后帝齊物達觀賞不假爵敎不示勸號諡莫設而生黎淳晏降迄中古黄象可觀而唐文有煥乃雕乃藻太樸既散樸之既散萬百熈心形為寵放神為利淫有翹者車命彼在林是故懐玉喪寳而被褐解襟恬亡智生與世或競匪智無鑒匪心伊鏡芒芒禹迹鞠為塗徑惟是毎懐偏陂反正正反於寵既尸干禄相協厥居而豐其屋禄之既尸刑為爾司屋之既豐喪家于宫故非據之災戒之在㓙人皆知存之為存而莫知得之為喪榮猶振頴墜若頽荒咎自専寵福在循墻是故保其安者常危而忘其存者不亡無休爾榮身寔親名無謂爾崇神期好沖戒彼覆餗冐此棟隆慎微如顯乃保身以終自古在昔逸民有作相彼宇宙方之委舄夫豈無不休而好是沖漠是故名利之災至人攸恪謂予未信無寧監于桑霍天明既畏神道無親善在求巳慶由積仁無念爾本聿修厥淳執盈如虚乃反天真逸民司正敢告官人碑泰伯碑夫至仁至徳垂風垂化内修訓範外陶氓俗百年之教淳道載凝而百年既終遺愛斯軫莫不肅䖍寢廟著名金石遺其後昆聿遵前典是以禹堂既毁増飾丹青堯碑載焚重覩刋勒泰伯膺慶二儀協靈七曜志輕天下慈深萬物脱屣岐周克讓之風斯舉端委揚越衣冠之俗載成重以仲雍揚波延陵蹈節民習敦厚俗懐忠信憂深思逺千載遺風美哉洋洋致足觀也昔滄洲遁迹箕山辭位志守幽優不越樽俎猶以稱首髙節標名徃代豈若吾君之子義結民心獄訟載歸謳歌屢請能舎玉輿之貴永襲皮冠之迹悠然獨徃信無徳而稱焉吳啓金車晉遷紫蓋寔號帝郷爰是天邑若乃忠人入國悽愴生悲殉義希風懦夫立志誄吳故丞相陸公誄惟赤烏八年二月粤乙卯吳故使持節郢州牧左都䕶丞相江陵郡侯陸公薨嗚呼哀哉皇朝迭紹成命昊天聖王作矣世有哲臣觀監在吳乃降斯神思皇我后應運對揚頴秀若華景逸扶桑龍輝紫極鳳鳴玉堂舉旗清阻奮鉞夷荒悠結沈維峻極公綱将撫逺績括地九圍皇淳爽泰昊旻疾威生民如何哲人其頽登靈在天遺音播徽敢揚元勲表之素旂乃作誄曰濬哲我祖時文峻徳𤣥粹納真清休載式本承慶輝駿惠罔極申錫多祜本支千億芳條達䕃靈根茂植根條伊何苗黄裔舜長發有祥貽我祚晉神明之緒實蕃瑰雋和音嗣世不替碩彦明鑒在下降命上𤣥我公初載天嘏之純重光納照璇璣授銓仰儀喬嶽俯濯洪川清輝秀穎雲翹映晨肇彼岐嶷允迪天真先心則智率意斯仁秉彛清昧體靈協神神休載鑠九徳兼和挹暉茂朴豐淳鎮華景峻凌髙𤣥源湧波造辰竦隆彌海廓遐光備既淳逸軌爰超閎網包荒景靈渥耀山林嶽秀天光乃照窮化機神探賾衆妙駭塵氛埃澄響清肖恢淵博量騰嶮峻邵振綱宇表登軌絶蹈厥初蔵器棲蟠海嶽披藻崑崙濯秀暘谷沈輝熈茂清塵熠鑠含章在淵發揮龍躍時伏陽九承乾之衰有皇于井玉軒徘徊爰兹赫奕需期雲飛天步皇輿載見太微華堂誕基委虵自階鼎輝既隮嘉命乃集和美未飪宰物下邑康年屢登惠風時協在㫁無頗于教斯輯金虎覿精戎車孔肆神器播越天人釋位有命在兹帝思元帥委弁總干振翼虎噬威靈既授六軍有序乃誓我衆乃整我旅神干山立雄旗電舉懸旌汜陽即戎江滸我后日敬上帝臨予靖端夙夜匪寧匪處經始綿綿滂沱惟海乃幹中軍入作内輔公侯陟降在帝左右闗羽滔天作霾西土帝曰将軍整爾熊虎赫赫明明皇輿出祖龍舟照淵旟旐映野鋪敦江濆仍執醜虜荆南既集方嶮未夷天子命我撫之西垂公侯戾止威神緝熙䖍劉作虐思輯子來妖旍北靡搴爾雄旗獷彼羣蠻祁祁遺黎柔逺能和薄言綏之方隅肅清烈文雋武舎爵明堂册勲天府天子曰咨我圖乃功錫爾青土建侯于東開國名墟光宅海邦分圭作寳軒輅以庸既受帝祐公用加大駟鐵孔阜元戎杳藹淑旂飛藻綏章承蓋振我輝靈四方于邁劉王負險寇我西隣公侯赫怒干戈啓陳金鉞鏡日雲旗絳天凌岡襄嶽沈維括淵元王隕難鯨鯢墜鱗戎漠時殪方域清塵曹休東踰我疆斯越帝簡厥佐将命其傑乃俾我公啓行警伐江漢之滸天子授鉞揖帝整旅隠爾霆發桓桓神誅震驚魏方我公矯矯虎視元戎截彼醜旅效此武功武功既彰天威薄曜靈武震華邊垂清暴振旅凱入王假有廟假廟伊何本膺寵祚土田陪敦四牡載路出餞于郊此惟予顧禮嘉嵩髙樂和湛露改容肅至傾蓋寵步鞶帶翩紛珍裘阿那區宇惟寧繁遏帝祉於穆疇咨敷奏多士将庸元輔相維天子僉曰公侯宜有爰止繡裳縟藻衮帶重紫遂虚上司命公登宰帝曰丞相朕嘉君徳以兹軒冕徃踐乃職宣爾叡心維皇協極邦國若否四方爾式公拜稽首欽翼明聖乃御璣衡仰徽七政祇恪丕顯無易惟命巍巍天邑惟清四門公侯作弼煥炳星文重輝熾景協風烟煴百神秩祀兆獻思淳克諧庶尹遂成帝勲時雍既濟王途克廣儀刑我度軌物垂象後遐施歸崇䕃惠仰茂徳棲音廣問沈響洪範逺迪𤣥猷洞深靈澤崇藪天險垂隂翰飛樂嶮淵蟠泳沈澤豐泉丘潤博雲林遭世大過彛倫靡肅亹亹公侯思維雅俗發憤戎衣永言禮樂被分敦化荷戈思學體仁長物御禮熙國叡鑒擢微𤣥輝鏡璞戒危膏粱收俊白屋五品時訓民神攸鑠我有煥文如曜如辰何以崇之匪闡伊人我有烈武如震如霆何以将之保大豐年思𢎞景業熙世登民克壮碩老秉鉞河津祉祚勿引早世幽神仰慕遺徽寤辟憂殷嗚呼哀哉永惟我公克明徳心紛藹芳和被之惠林公侯沒矣孰嗣徽音名存體逝徳懋形潛民之秉思好是謳吟嗚呼哀哉惟帝念功寵命光大考諡典謨崇榮協泰安宫載考我公于邁轜軒啓塗先驅警斾哀風結輿遺思馮蓋舎此休明即彼重藹攀慕靡及永戀光愛嗚呼哀哉晉故散騎常侍陸府君誄惟太康五年夏四月丙申晉故散騎常侍吳郡陸君卒嗚呼哀哉天降純嘏誕育俊乂才雄九奥徳鍾三懿應運繼期顯微闡昧特恢大猷雍化熙世昊天不弔奄忽零墜嗚呼哀哉朝隕棠榦邦喪國輝帝欽遺烈士詠清機思經皇心痛浹民懐揮淚充邑惜慟盈畿敢述洪迹于兹素旂其辭曰於穆皇源時惟誕𢎞權輿有媯爰帝暨王徽音接響丕祚克昌乾鑒南眷誕降我祖顯考尚書納言帝宇正命惟允銓衡攸序篤生常侍固天所隆祚以靈粹陶以惠風道協體稟徳與性鍾叡心逺暢淵思遐通瞻言潛覽克哲克聰躭精遐奥肆志篇章仰咨遺訓思齊曩蹤摛光啓晦微言是綱錯綜羣藝精微毫芒顯允閑姿既明且偉敦叙汜愛經徳紀義契濶邦族是綜是緯博約以禮陳錫載施雍雍閨闈克諧由仁率禮崇化色養寜親九族和睦徳被宗姻猗猗髦俊祁祁縉紳鑚仰明範挹道希塵愷悌𢎞裕惠化是振潛機宻暢靡幽不甄濯以清波權以明鈴旌善板築刋穢紫辰邦無媮幸靈不牟真沐浴𤣥源風移俗純儀徳鄒甸比化泗濱耀畧初輝既升末融爰莅揚邑作尹名邦密邇帝畿大東小東宣敷五教敞化以崇徴無墜命興無廢功帝欽良政民懐穆風粤稽舊章率由典刑考績三載絀幽陟明超踐皇闥紆組垂纓奕世納言帝衡以平本崇曩烈堂構克榮征鼙屢振干戈未戢乃秉雄㦸徴戎東邑四牡徂征威徳以立爰守㑹稽青紱既襲帝曰欽哉疇咨羣后改授顯服屯騎是撫雍容皇甸綜文經武時值大過士爽其徳䖍惟常侍髙明柔直履氷察霜淪心逺測春存三季形志于色頻顣厄運載離咎慝靖亨思順曹氏匪革投弁釋紱浩思東嶽遁世無悶清源是濯馥風彌馨明徽載鑠皇途既闢天罔誕張運在九五違嶮即康猗歟髙懿避風逺臧帝降大命丘園是揚裨将天邑舒藻舊京僉曰休哉昭徳塞違乃升常伯補闕拾遺振纓紫極攄光太微奕奕𤣥冕熠熠貂璫仰耀皇維俯映明堂輿振鳴鸞體佩琮璜居徳彌冲雖休匪康既跚君宿未跱鼎辰将陟太階𢎞載育民皇靈靡顧大命奄臻厲㓙彌留儵忽頽湮嗚呼哀哉黄河難澄梁木易荒聖賢絶景希世齊光豈曰徒生實維天綱於鑠常侍本徳昭仁俯鏗瑤響仰綴玉振其在克壮自蹇乗屯鳳翳靈條龍竄祕泉收逋匿耀洪畧陶緼雖躡嘉運託景風雲瑰光既耀靈寳未闡弗慮皇圖銜恨徂遷嗚呼哀哉江河慕海丘陵樂山於惟君徳齊聖廣淵羣彦景附漸化濯真蓋以崇嚴函以裕淵西徂華源負澤慕塵幽萌潛暢滯思賴振六言六行匪君不肅五有三無匪君不極衡准失平匪君不直方榮遐邈匪君不式君其永沒民其焉則結思遺愛惟哀允惻嗚呼哀哉仲尼喪魯孺慕失聲國僑殞鄭邦無竽笙實惟常侍徽懿克明恩懐士心信結民情聞者巷泣赴者風征八音輟響獻酢弗營羽檝翳川輕駕盈庭揮袂雲藹殞淚雨零嗚呼哀哉伊惟平生襲寵荷輝愷樂承明桑梓猶哀聿懐震丘言告言歸明徳逺燭慮㓙以吉雖則榮泰存亡是䘏爰築新邑經始匪日眷懐不虞寧襯斯室王事靡盬皇畿是旋鳴和吉徃曽未浹辰震斾凶歸輝景長泯痛感皇祗哀普四民嗚呼哀哉穆穆天子昭明有融乃命王人禮憲是崇賜以歸賻榮以贈終冠蓋南徂映族輝邦日薄南陸辰次天漢龜筴協貞靈域載判明器既庇神道巳羨縣象未登明星有爛軒車微動執紼同贊永棄髙厦黄廬是館寧彼昏昧荒此輝粲幽房長鍵修夜靡旦翼翼輕蓋翩翩丹旂龍章舒藻旟旐有輝轜輪轇結𤣥駟徘徊人誰弗思靡思匪哀援扎心楚投翰餘悲嗚呼哀哉晉故豫章内史夏府君誄惟永寧元年五月二十五日晉故豫章内史夏府君卒嗚呼哀哉乾鑒育俊崇兹大猷景靈垂祐黄精協符濯蹤浩素闡志𤣥流熙光聖代邁勲九區哀彼造化殂命不均既褒斯美􅈔兹遐年祁祁縉紳泣涕流連故作斯誄著之不泯其辭曰於穆府君逺祖彌光功濟黎獻澤洽八荒披圖承禪襲化軒唐洪風既振遐曜休煌越殷自周紹膺遺祉亮節三恪侯服千祀悠悠訖兹徽烈不巳奕世本𢎞厥美是紀惟神隆慶篤生府君𤣥祐秀朗暉景烟煴誕載豐美俊頴夙繁性與體和孝友穆融䖍兹君親姻族睦崇情廣褒誘品物虚躬安仁履素接舊以冲澄鑒博映哲思惟文淪心衆妙洞志靈源探幽判疑沈欲焱分甄滯羣秘義猶一貫崇規邈世體道而盤瞻言先機蔚藻騰翰處約由厚交順于顔文武未墜君惟克修百行殊揆君望斯周棲義初九戢冀洪條瓊輝四灼景問綢繆在昔我國元首載哲假寐俟旦思庸俊逸旃檢髙麾體亦秩秩儀刑栁惠庶績惟穆既穆其績英風彌邵天子有命曽是在朝頻繁幃幄祗承皇曜神以測幽明以逺照目難識夷觀嶮改蹈譬彼清鑒莫塵其操五紀迭御載隆載傾南嶽頺鎮䕃輝素靈瑾瑜遷寳投跡上京兆萌未緝皇聖攸嗟韋臨猗氏接被郇瑕道之以禮育之以和齊俗拯弊民靡不嘉振我翰音洋鑠諸華明明皇儲叡哲時招奮厥河滸矯足雲霄俄軒𤣥闕徽英揚飈光灼東朝髦士攸希媚兹一人亦既翰飛委蛇華閣陟降太微訥言賛事淵裕徘徊習習和風惟穆惟宣亦曰武昌厥俗允新我后有命爰授俊臣君子云顧義在安親秉文共武言撫舊京仰肅慈顔俯熙典刑移彼滯汙泮宫時榮衆否斯濟飛鴞革聲春翹晞景振鷺在庭髙墉未奮遭兹閔㓙頻顣泣血三載以終哀響未歇臺命朝隆厥命伊何俾守南裔匪曰是屯託身虚槩巾車既脂駕言将逝彛倫惟清路逼其序君之于逺乃恢斯緒思彼衆逸言尋厥楚暮瞻豐林晨看淵水濯奇以翹披途導軌彼湘之東地嶮俗危明徳審罰替幽崇儀嚴不式刑仁扶物施威和咸振澤被遐畿皇道御世與民靡偏敷彼惠政濟此未均思一黔首濯溉義淵揖望皇命修翮徊翔循彼江濆乃眷豫章觀風樹政徳音允張洪化既攄禮樂克昌閑非秋厲惠淑春陽廣命俊乂惟弓與旃丘園靡滯鸞驥慿軒豈方伊類捉髮躬勤震我聲教邁嚮惟殷君化大揚自北而南君澤本沃河漢載咸慶輝雲廕埿潤川漸将配皇宿登景具瞻昊天不弔乃降兹厲髙禄未融㓙焱中燧寝疾彌留大命隕墜邦家不紀沈哀結世嗚呼哀哉式玩遺美君實克明懐光暢幽晞髮結清體徳秉真審行居貞屈曵蹈機與世靡矜天命棐諶唯仁則延任道委分亮曰斯然孰云府君不聞其言永懐載念憂心孔艱曰兄曰弟篤愛纒綿晞光繼軌參融鴻振今君何之背世遐湮同生拊膺號哀瘁身眇眇孤微過庭曷遵天何忍斯于何之臻自君初邁既夷且榮今君反矣素旂垂銘雖光百辟託晷𤣥靈民慟于顯神旅于㝠物從人感轅馬失征飄風悼響潛魚仰驚豐霄䠞䕃衆羽徊鳴嗚呼哀哉瞻彼日月嵗聿云夕寒暑窮化四辰交錯日考三從案轡長薄藹矣轜軒脫駕窀穸背榮孤世寧神大漠丘陵竦䕃閤闥寥窙寤摽惟哀心摧涕潵嗚呼哀哉咨予與君恩親之微蒙恤于昔投纓瀾猗思周弱志永庇惠輝如何府君昭景長違願言永眷載傷載悲昔我經年逝彼川路進闕趨奔退違陵墓仰瞻靈丘俯増永慕惻剝肝懐哀其曷厝嗚呼哀哉文嘲禇常侍文六年正月以臨川府丞禇為常侍君子謂吳於是乎能官人官人國之所廢興也古之興王唯賢是與吕望漁釣而周王枉駕寗戚扣角而齊王忘寐委斯徒而縻好爵釋短褐而服龍章姬姜之族非無人也親昵之愛非無懐也取彼庸賤之徒登之佐臣之列故九賢翼世而有命既集五子佐時匡霸以濟夫唯能官人之所由也禇氏大夫之常佐逺邦之賤司才則邵矣官實陋矣而拔出羣萃超昇階闥雖文王登師桓公取佐亦何以加之詩曰濟濟多士文王以寧言官人得才也禇常侍聞之喜曰君子之言豈虚也哉吾得此足矣君子謂禇常侍於是乎不謙謙也者致敬以存其位者也謙之不存徳無柄矣世之治也君子自以為不足故撙節以求役于禮敬讓以求安于仁世之亂也在位者自以為有餘故爵豐而求更厚位隆而欲復廣世之治亂恒由此作今禇侯蟬蜕槁木鵠鳴玉堂不庶㡬夙夜允集衆譽而意充於一善心盈於自足足則無求盈則無戒不求則善逺之無戒則惡來之亦何以為君子哉詩云戰戰兢兢如臨深淵慎之至也禇常侍聞是言也懼謂之昌言也而拜之君子曰禇侯其幾矣聞善而喜過又應之懼嘉服義之賢而拜讜言之辱規同禹迹義均罪巳君子哉吳無君子斯焉取斯牛責季友文天造草昧萬物化淳類族殊品莫同乎人令子履方象以矩地戴圓規以儀天該芳靈之款素挺協氣於皓𤣥故神窮來哲思洞無間踊翰則憤凌洪波吐辭則辨解連環子何不絶淵而躍照日之光使穎秀暘谷景溢扶桑俯經見龍之輝仰集天人之堂維子之服既𤣥而素今子之滯年時云暮而冕不易物車不改度子何不使𤣥貂左餌華蟬右顧令牛朝服青軒夕駕軺輅望紫微而風行踐蘭塗而安步而﨑嶇隴坂息駕郊牧玉容含楚孤牛在疾何子崇道與徳而遺貴與冨之甚哉日月逝矣嵗聿其暮嗟乎季友盛時可惜迨良期於風柔競悲飈於葉落陳讜言於洪範圖遺形於霄閣使景絶而音流芬身荐而榮赫奕子如不能建功以及時予請迹於桃林之薄漢魏六朝百三家集巻五十
