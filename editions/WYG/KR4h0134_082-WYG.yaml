body:
  text: 漢魏六朝百三家集巻八十二上梁簡文帝集題詞史言梁簡文帝文集一百巻雜著六百餘巻自古皇家撰論未有若是其多者葢朱邸日久㑹逢清晏兼以昭明為兄湘東為弟文辭競美増榮棠棣儲極既正宫體盛行但務綺博不避輕華人挾曹丕之資而風非黄初之舊亦時世使然乎賊景犯闕强登帝座吞土不祥終於協夢至今讀其題壁序自云蘭陵正士弗欺暗屋輒為泣數行下武帝開門揖盜自戕血𦙍簡文立顛沛之中罹懐愍之酷跋胡㚄尾孽非已作後代諱其閔凶并其文字指為無福不得擬秋風步短歌亦足悲也帝答湘東書頗厭時人效謝康樂裴鴻臚余謂帝詩文適在謝後裴前耳昭明稱帝佳作止云首尾裁浄一字之評從來論六朝者所未逮帝誡當陽書立身須謹重文章須放蕩是則其生平所處也目録賦悔賦有序阻歸賦述羈賦序愁賦𤣥虚公子賦舌賦晩春賦大壑賦圍城賦舞賦筝賦金錞賦有序對燭賦燈賦又眼明囊賦有序梅花賦採蓮賦脩竹賦鴛鴦賦鵁鶄賦詔改元詔即位赦詔營莊陵詔令與劉孝儀令與湘東王論王規令䘏孔休源手令與衡山矦恭手令臨城公夫人停省太子妃令教移市教復臨丹陽教臨雍州原減民間資教臨雍州革貪惰教圗雍州賢能刺史教罷雍州恩教與僧正教資遣孔燾二女教甄異張景願復讐教移文答穰城求和移文表謝立為皇太子表拜皇太子臨軒竟謝表謝賜新厯表又上昭明太子集别傳表上大法頌表上南郊頌表上白兎表請朱异奉述制㫖易義表請賀琛奉述毛詩義表為寧國臨城二公請入學表讓鼓吹表讓驃騎揚州刺史表在州羸疾自解表為武陵王讓揚州表為長子大器讓宣城王表為子大心讓當陽公表為子大款讓石城公表疏愍囚徒疏章為南平王拜大司馬章為王規拜吳郡太守章啓賀洛陽平啓上武帝菩提樹頌啓上皇太子𤣥圃園講頌啓上東宫叙南康王薨啓謝勅賚中庸講疏啓謝勅示苦旱詩啓謝賚扇啓謝賚碧慮棊子屏風啓謝勅賜玉佩啓謝勅賚魏國獻錦等啓謝勅賚善勝威勝刀啓謝勅賚方諸劒等啓謝勅賚貂坐褥席啟謝勅賚織竹火籠啓謝勅賚廣州塸啓謝勅賚大菘啓謝勅賚長生米啓謝勅賚城邊橘啓謝勅賚益州天門冬啓謝勅賚河南菜啓謝東宫賜裘啓謝東宫賜柿啓答安吉公主餉胡子一頭啓謝邵陵王禁錮啓請武帝御講啓重請御講啓又請御講啓奉請上開講啓謝上降為開講啓重謝上降為開講啓謝開講般若經啓答同泰寺立刹啓謝勅使監善覺寺起刹啓謝御幸善覺寺看刹啓謝勅賚銅供造善覺寺塔露盤啓謝勅賚栢刹柱并銅萬斤啓謝勅賚錢并白檀香充法㑹啓謝勅賚苦行像并佛跡啓奉阿育王寺錢啓謝勅賜解講錢啓謝賜錢啓謝勅賚納袈裟啓又又又謝勅聴從舎利入殿禮拜啓謝勅使入光嚴殿禮拜啓謝勅為建湼槃懺啓謝勅㕘迎佛啓書答湘東王和受試詩書答湘東王書又答湘東王書答湘東王上王羲之書書答湘東王慶州牧書答南平嗣王餉舞簟書答定襄侯餉卧簟書與廣信侯述聴講事書與廣信侯重述内典書答新渝侯和詩書誡當陽公大心書答張纉謝示集書與蕭臨川書與劉孝綽書答蕭子雲上飛白書屏風書答徐摛書與魏南荆州刺史李志書與智琰法師書又弔道澄法師亡書序莊嚴旻法師成實論義疏序昭明太子集序臨安公主集序馬槊譜序三日曲水詩序八闗齋制序自序漢魏六朝百三家集巻八十二目録上欽定四庫全書漢魏六朝百三家集巻八十二上明張溥輯梁簡文帝集賦悔賦有序夫機難預知知機者上智智以運巳迷巳者庸夫故易曰吉凶悔吝生乎動者也又曰悔吝者憂虞之象也傳云九徳不諐作事無悔是以鄭國盜多太叔之恨表衛風義失宣公之刺彰無將詠興壟事書作季文再思而未可南容三復而不暇余以固陋之資慎履氷之誡竊服楚王之對每徵后稷之詩觸類而長乃為賦曰黙黙不怡恍若有遺四壁無寓三階寡趣月露澄曉風栁悲暮庭鶴雙舞檐烏獨赴岸林宗之巾慿南郭之几𤣥徳之眊聊縈子安之嘯時起静思悔吝鋪究前史弔古傷今驚憂嘆圯成敗之蹤得失之理莫不闗此令終繇乎謀始棄夸言於頓丘重前非於蘧子蹟夫覆車之戒豈止一途而已至如秦兼四海之尊握天下之富混一車書鞭笞宇宙胡亥之寄已危萬代之祀難搆阿衡失責成之所趙髙秉棟梁之授拒諫逞刑戮宰誅守矜上林之戲馬嘉長楊之射獸囁呫禁中之言欺侮山東之寇及其祠祟涇水作覺夷宫徒希與妻子伍下願與黔首同信殪絶於凶醜何前謀之不工至如下相項籍才氣過人拔山靡類扛鼎絶倫聲駕盛漢勢壓餘秦鉅鹿有動天之卒轅門有屈膝之賓既刓有功之印亦疑奇計之臣唱鷄鳴於垓下泣悲歌於美人抱烏江之獨愧分漢騎之餘身郭君失位徒馭而亡尚悲殘糗獨飲餘漿枕畚空卧伏軾懐傷魂飄原野骨餌豺狼楚王刻鶴播徙南地鐃管徒鳴才人空置豈輜車之足榮匪射獵之娛意幽泉斯即白日何冀甯喜納君恃功肆寵衛侯厭黷忠臣憤勇昏迷靡悟敗不旋踵商君被執李斯赴収身居闕下命厄秦囚追傷用法之弊還思不諫之尤亦何解於今酷終無追於昔謀伯卓跋扈豺目為輔弑君鴆子誅李害杜鬻恩販寵怨庶虐人蔽朝政之聰察害上書之烈臣榮暱子於阿尹肆貪濁之淫威樹姦黨於宫禁察人主之纎微卒其膏鈇潤鉞寘纆逢徽壯武英逸才為時出陸離儒雅照爛文筆江東啓吞併之籌幽州著懐逺之術運鍾毁冕時屬傾顛鏑鳴水濶日黒山遷劉卞之謀不决忠良之戮已纒台曜之災雖啓鷦鷯之賦徒然士衡文傑綽有餘裕氣含珠璧情藴雲霧志闕沈隠心躭進趣握兹猛衆臨此勁兵抗言孟玖肆此孤貞牋辭已切墨幔徒縈形殞河上心憶華亭若夫楊惲狂言灌夫失志卒其殞命埋軀傷形屬吏周君飲後裴子酣狂靳固紀瞻之妾眠卧季倫之房亦足以魂驚神爽悔結嫌彰已矣哉波瀾動兮昧前期庸夫蔽兮多自欺不逺而復幸無嗤建功立徳有常基胸馳臆斷多失之前言徃行可為師阻歸賦觀建國之皇王選能官於前古元帝慈而布教豈齊聖而作輔伊吾人之固陋宅璇漢而自通躡九枝而耀景總六翮而搏風屬𤣥玦之啓異逢玉弩之相驚頓天羅於八表騰雲驅於四溟發伏鼈之雄氣耀策馬之髙星地邇朔場疆隣北極壠樹饒風胡天少色上月斜臨寒松遥直雲向山而欲斂鴈疲飛而不息何愁緒之交加豈樹萱與折麻聞繁鉦之韻冰聴流風之入笳終知客遊之阻無解鄉路之賖述覊賦奉明后之霑渥將逺述於衡楚歎雲霞之窅漫對江山之遥阻是時孟夏首節雄風吹甸晩解纜乎鄉津涕淫淫其若霰舟飄飄而轉逺顧帝都而裁見逺山碧暮水紅日既宴誰與同雲嵳峩而出岫江揺様而生風奉璽言而遄邁改余玉於江隈遵陽塗而中正軫悲心其若頽引領京邑瞻望弗逺戀逐雲飛思随蓬卷觀江水之寂寥願從流而東反序愁賦情無所治志無所求不懐傷而忽恨無驚猜而自愁玩飛花之入戸看斜暉之度寮雖復玉觴浮椀趙瑟含嬌未足以祛斯耿耿息此長謡𤣥虚公子賦有𤣥虚之公子輕滅喧俗保此大愚居榮利而不染豈聲色而能拘迴還四始出入三墳心溶溶於𤣥境意飄飄於白雲追寂圃而逍遥任文林而佚宕忘情於物我之表縱志於有無之上不為山而自髙不為海而彌廣舌賦奚兹先生問於何斯逸士曰夫三端所貴三寸著名故微言傳乎徃記妙說表乎丹青魯談笑而軍却王言詠而瑞隆陸有千金之富周為一説之功復有構扇之端讒䛕之迹艷紫凌朱飛黄妬白吾將欲廢便辟之交逺巧佞之友殄張儀之餘殱蘇秦之後粉虞卿之白璧碎漢王之玉斗然後浮偽可息淳風不朽晚春賦待餘春於北閤藉髙讌於南陂水篩空而照底風入樹而香枝嗟時序之迴幹歎物候之推移望初篁之傍嶺愛新荷之發池石憑波而倒植林隠日而横垂見遊魚之戲藻聴驚鳥之鳴雌樹臨流而影動巖薄暮而雲披既浪擊而沙游亦苔生而徑危大壑賦渤海之東不知㡬億大壑在焉其深無極悠悠既湊滔滔不息觀其浸受壯其吞匿歴詳衆水異導殊名江出濯錦漢吐珠瑛海逢時而不波河遇聖而知清嗟乎使夫懐山之水積天漢之流駛彭潛與渭濕俱臻四瀆與九河同至余乃知巨壑之難滿尾閭之為異圍城賦彼髙冠及厚履並鼎食而乗肥升紫霄之丹地排玉殿之金扉陳謀謨之啓沃宣政刑之福威四郊以之多壘萬邦以之未綏問豺狼其何者訪虺蜴之為誰舞賦酌蒲桃坐柘觀命妙舞徵清彈丱髪初笄參差俱集信身輕而釵重亦腰羸而帯急響玉砌而遲前度金扉而斜入似斷霞之照彩若飛鸞之相及既相看而緜眎亦含姿而俱立於是徐鳴嬌節薄動輕金奏巴渝之麗曲唱碣石之清音扇纔移而動步鞞輕宣而逐唫爾乃優游容豫顧盼徘徊强紆顔而失笑乍襍怨而成猜或低昂而失侣乃歸飛而相附或前異而始同乍初離而後赴不遲不疾若輕若重盼鼓微唫廻巾自擁髪亂難持簮低易捧牽情恃恩懐嬌妬寵筝賦江南之竹弄玉有鳴鳯之簫焉洞隂之石范女有游仙之磬焉若夫排雲入漢之美含商觸徵之竒罷雍祠之麗響絶漢殿之容儀别有泗濱之梓聳幹孤峙負隂拂日停雪栖霜嶔崟岞崿𤣥嶺相望寄丹崖而茂采依青壁而懐芳奔電碣突而彌固嚴風掎㧞而無傷途畏峰澁人羣罕至乃命夔班剪而成器隆殺得宜修短合思矩制端平雕鎪綺媚既而春桑已舒暄風晻曖丹荑成葉翠隂如黛佳人採掇動容生態值使君而有辭逢秋胡而不對里閭既返伏食蠶饑五色之縿雖亂八熟之緒方治異東垂之野繭非山經之漚絲於是制絃擬月設柱方時若夫鏗鏘奏曲温潤初鳴或徘徊而藴藉或慷慨而逢迎若將連而類絶乍欲緩而頻驚陸離抑按磊落縱横竒調間發美態孤生若將徃而自返似欲息而復征聲習習而流韻時怦怦而不竑如浮波之逺驚若麗樹之爭榮譬雲龍之無蔕如笙鳯之有情學離鵾之弄響擬翔鴛之玅聲朱絃在手擊重還輕爾其曲也雅俗兼施諧雲門與四變雜六列與咸池王讃既工阮賦亦竒曹后聴之而懽讌謝相聞之而涕垂至若登山望别之心臨流送歸之目隴葉夜黄闗雲曉伏覩獨鴈之寒飛望交河之水縮聴鳴箏之弄響聞兹絃之一彈足使遊客戀國壯士衝冠若夫楚王怡蕩楊生娛志小國寡民督郵無事乃有燕餘麗妾方桃譬李本住南城經移東里納千金之重聘擅專房之宴私方美珥而不減擬甘橘而無嗤聞削成於斜嶺照玉緻於鉛脂度玲瓏之曲閣出翡翠之香帷腕凝紗薄珮重行遲爾乃促筵命妓衘觴置酒耳熱眼花之娛千金萬年之夀白日蹉跎時淹樂久玩飛花之度窓看春風之入栁命麗人於玉席陳寳器於紈羅撫鳴筝而動曲譬輕薄之經過黛眉如掃􅝇睇成波情長響怨意滿聲多奏相思而不見吟夜月而怨歌笑素彈之未工疑秦宫之詎和若夫釣竿復發蛺蝶初揮動玉匣之餘怨鳴陽鳥之始飛逐東趨於鄭女和西舞於荆妃足使長廊之瓦虚墜梁上之塵染衣鱏魚遊而不沒白鶴至而忘歸於是乎餘音未盡新弄縈纒參差容與顧慕流連落横釵於袖下斂垂衫於膝前乍含猜而移柱或斜倚而續絃照瓊環而俯捻度玉爪而徐牽見微嚬之有趣看巧笑之多妍抗長吟之靡曼雜新歌之可憐歌曰年年花色好足侍愛君傍影入着衣鏡裙含辟惡香鴛鴦七十二亂舞未成行故乃宋偉綠珠之好聲文君慎女之清角尚掩面而不前言韜輝而恥學實獨立之麗人乃入神之佳樂金錞賦有序舎弟西中郎致金錞一枚周禮云皷人掌六皷四金以節聲樂以和軍旅以金錞和皷金鐲節皷注曰錞錞于也圜如椎頭大上小下樂作鳴之與皷相和淮南云兩軍相當皷錞相望若古之禮器飾軍和樂者矣吾竒而賦之其詞曰有錞于之麗器實軍樂之兼珍伊前古以為美成名都之匠人採赤鋈於蜀壘求銅精於灌濱若夫皷以陽鑪營之隂炭是鐫是刻載輝載煥笑烏獲之奮槌踰嵇生之善鍛實規形之可悦以玅聲之逺聞譬洪鐘之虎鈕學章鼎之龍文至於簨􅙇先列金石俱諧八能效技六變程才觀雲龍之鬱郁望威鳯之徘徊沛縣留三日之飲平樂有十千之杯揮秦筝之慷慨伐晉鼔之嘽啍皆能協宫和徵節徃通来宣奏有序度曲可觀鄙金鋪之非徳嗤商鼗之易彈應南斗之鳴瑟雜西漢之金丸若夫伏波出討貳師逺征蒲昌對戰孤竹臨兵映似月之遥羽飛如鳬之去旌軍魚麗而齊上陣龍膝而俱行望鳥雲之臨敵聞條風之入營壯士被犀良馬絡鐵野曠塵昏星流電掣日侵山而欲隠霧陵空而不滅望水色其如花覩奔沙之似雪咸聴響而先登並聞鳴而為節當此時也畫角恥吟胡笳不吹刁斗暫捐金鉦虚置何資和之不營而吐聲之雄異制六師之進旅警三軍之武志嗟吾弟之博物實愛竒之已深識且鑒於鳴石貺有踰於兼金如陳器於栢寢似出鼎於汾隂豈寳玦之為貴非瑚璉之可欽昔武都之一扇乃銘功以述心矧元常之五熟又刻篆以書音况兹贈之為美而古迹之可尋聊染翰而操筆終有愧於璆琳對燭賦雲母窓中合花氊茱茰幔裏鋪錦筵照夜明珠且莫取金羊燈火不須然下弦三更未有月中夜繁星徒依天於是挂同心之明燭施雕金之麗盤眠龍旁繞倒鳯雙安轉辟邪而取正推櫺牕而畏寛綠炬懷翠朱燭含丹豹脂宜火牛膫耐寒銅芝抱帶復纒柯金藕相縈共吐荷視横芒之昭曜見密淚之蹉跎漸覺流珠走熟視絳花多宵深色麗焰動風過夜久惟煩鋏天寒不畏蛾菖蒲傳酒座欲䦨碧玉舞罷羅衣單影度臨長枕烟生向果盤迴照金屏裏脈脈兩相看燈賦何解凍之嘉月值蓂莢之盛開草含春而色動雲飛綵以輕来南油俱滿西漆争燃蘇徵安息蠟出龍川斜暉交映倒影澄鮮又九微間吐百枝交布聚類炎洲疏同火樹競紅蘂之晨舒蔑丹螢之昏騖蘭膏馥氣芬炷擎心寒生色淺露染光沈眼明嚢賦有序俗之婦人八月旦多以錦翠珠寳為眼明囊因競凌晨取露以拭目聊為此賦爾乃裁兹金縷製此妖飾緝濯錦之龍光剪輕羇之蟬翼雜花勝而成疏依步揺而相逼明金亂雜細寳交陳義同厭勝欣此節新擬椒花於嵗首學夭桃於暮春梅花賦層城之宫靈苑之中竒木萬品庶草千叢光分影雜條繁幹通寒圭變節冬灰徙筩並皆枯悴色落揺風年㱕氣新揺芸動塵梅花特早偏能識春或承陽而發金乍雜雪而披銀吐艷四照之林舒榮五衢之路既玉綴而珠離且冰懸而雹布葉嫩出而未成枝抽心而挿故標半落而飛空香随風而逺度挂靡靡之遊絲雜霏霏之晨霧争樓上之落粉奪機中之織素乍開華而傍巘或含影而臨池向玉階而結采拂網戸而低枝于是重閨佳麗貌婉心嫺憐早花之驚節訝春光之遣寒裌衣始薄羅袖初單折此芳花舉兹輕袖或挿鬢而問人或殘枝而相授恨鬟前之大空嫌金鈿之轉舊顧影丹墀弄此嬌姿洞開春牖四巻羅帷春風吹梅畏落盡賤妾為此斂蛾眉花色持相比恒愁恐失時採蓮賦望江南兮清且空對荷花兮丹復紅卧蓮葉而覆水亂髙房而出叢楚王暇日之歡麗人妖艷之質且棄垂釣之魚未論芳萍之實唯欲廻渡輕船共採新蓮傍斜山而屢轉乗横流而不前於是素腕舉紅袖長迴巧笑墮明璫荷稠刺密亟牽衣而綰裳人喧水濺惜虧朱而壊籹物色雖晩徘徊未返畏風多而榜危驚舟移而花逺謌曰嘗聞蕖可愛採擷欲為裙葉滑不留綖心忙無假薫千春誰與樂唯有妾隨君修竹賦有㛹娟之茂篠寄江上而叢生玉潤桃枝之麗魚腸雲母之名日映花靡風動枝輕陳王歡舊小堂佇軸今餞故人亦賦修竹伊嘉賓之獨劭顧余躬而自恧鴛鴦賦朝飛緑岸夕歸丹嶼顧落日而俱唫追清風而雙舉時排荇蔕乍拂菱華始臨涯而作影遂蹙水而生花亦有佳麗自如神宜羞宜笑復宜嚬既是金閨新入寵復是蘭房得意人見兹禽之棲宿想君意之相親鵁鶄賦飲三芝之淳露食六草之英芳似金沙之符采同錦質之報章紅毛覆臆翠鬛垂心浴波泳渚浮廣戲深臨髙舞翮映淺弄音逐餘暉而顧景乗清吹而微唫詔改元詔葢天下者至公之神器在昔三五不獲已而臨莅之故帝王之功聖人之餘事軒冕之華儻来之一物太祖文皇帝含光大之量啓西伯之基髙祖武皇帝道洽二儀智周萬物屬齊季薦瘥􅂜倫剝喪同氣離入苑之禍元首懐無厭之欲乃當樂推之運因億兆之心承彼掎角雪兹讐恥事非為已義實從民故功成弗居卑宫菲食大慈之業普薫汾陽之詔屢下于兹四紀無得而稱朕以寡昧哀㷀孔棘生靈已盡志不圗全僶俛視隂企承鴻緒懸旌履薄未足云喻痛甚愈遲諒闇彌切方當𤣥黙在躬栖心事外即王道未直天步猶艱式慿宰輔以𢎞庶政履端建號仰惟舊章可大赦天下改太清四年為大寳元年即位赦詔朕以不造夙丁閔凶大行皇帝奄棄萬國攀慕號躃厝身靡所猥以寡徳越居民上㷀㷀在疚罔知所托方賴藩輔社稷用安謹遵先㫖顧命遺澤宜加億兆可大赦天下營莊陵詔簡皇后窀穸有期昔西京霸陵因山為蔵東漢夀陵流水而巳朕屬值時艱嵗饑民弊方欲以身率下永示敦朴今所營莊陵務存約儉令與劉孝儀令劉遵為晉安王宣惠雲麾二府記室轉南徐州治中後為雍州復引為安北諮議參軍及王立為皇太子仍除中庶子大同元年卒太子深悼惜之與遵從兄孝儀令賢從中庶奄至殞逝痛可言乎其孝友淳深立身貞固内含玉潤外表瀾清美譽嘉聲流於士友言行相符始終如一文史該富琬琰為心辭章博贍𤣥黄成采既以鳴謙表性又以難進自居未嘗造請公卿締交榮利是以新沓莫之舉杜武弗之知自阮放之官野王之職栖遲門下已踰五載同僚已陟後進多升而怡然清静不以少多為念確爾之志亦何易得西河觀寳東江獨步書籍所載必不是過吾昔在漢南連翩書記及忝朱方從容坐首良辰羙景清風月夜鷁舟乍動朱鷺徐鳴未嘗一日而不追隨一時而不㑹遇酒䦨耳熱言志賦詩校覆忠賢𣙜揚文史益者三友此實其人及𢎞道下邑未申善政而能使民結去思野多馴雉此亦威鳯一羽足以驗其五徳比在春坊載獲申晤博望無通賓之務司成多節文之科所賴故人時相嫓偶而此子溘然實可嗟痛惟與善人此為虚説天之報施豈若此乎想卿痛悼之誠亦當何已往矣奈何投筆惻愴吾昨欲為誌銘并為撰集吾之劣薄其生也不能揄揚吹噓使得騁其才用今者為銘為集何益既往故為痛惜之情不能已已耳與湘東王論王䂓令王䂓字威明為太子中庶子大同二年卒太子出臨與湘東王令威明昨宵奄復殂化甚可痛傷其風韻遒正神峰標映千里絶迹百尺無枝文辯縱横才學優贍跌宕之情彌逺濠梁之氣特多斯實俊民也一爾過隟永歸長夜金刀掩芒長淮絶涸去嵗冬中已傷劉子今兹寒孟復悼王生俱往之傷信非虚説䘏孔休源手令金紫光祿大夫孔休源立身中正行已清恪昔嵗西浮渚宫東泊枌壤毗佐蕃政實盡厥誠安國之詳審公儀之㢘白無以過之奄至殞喪情用惻怛今須舉哀外可備禮與衡山侯恭手令雍州蠻弓魏冦詔恭赴援除雍州刺史太宗少與恭㳺特被賞狎至是手令彼士流骯髒有闗輔餘風黔首扞格但知重劔輕死降胡惟尚貪惏邉蠻不知敬讓懐抱不可皁白法律無所用施願充實邉戍無數遷徙諜候惟逺箱庾惟積長以控短静以制躁早䝉愛念敢布腹心臨城公夫人停省太子妃令纁鴈之儀既稱合於二姓酒食之㑹亦有因不失親若使榛栗腵修贄饋必舉副笄編珈盛飾斯備不應婦見之禮獨以親闕頃者敬進酏醴已傳婦事之則而奉盤沃盥不行侯服之家是知繁省不同質文異世臨城公夫人於妃既是姑姪宜停省教移市教臨淮作守白鹿随而忘返蕭令解綬黄雀從而不歸况復衛卒遮車追民擁榜瞻言前古眇愧𢎞多吾旅泊冬川阻兹涸水日中總㑹交貿遷移雖樊無外取要得所求而旗亭舊體自有常處不容近違孔奮逺逐曹參正恐舊肆盈虚或成凋廢復臨丹陽教昔越張修猛用𢎞美績邉延善政實著民謡吾沖弱寡能未明理道猥以庸薄作守京河將恐五袴無謡兩岐難頌思立恩惠微宣風範臨雍州原減民間資教誠欲投軀决堤曝身求雨九伐方𢎞三驅未息役爨之憂兵家斯急師興之費日用彌廣今春流既長艫舳争前轉漕相追饋糧不闕義存矜急無俟多費臨雍州革貪惰教壯夫疲於擐甲匹婦勞於轉輸藜藿難充轉死溝壑春蠶不暖寒肌冬收不周夏飽胡寧斯忍復加裒削傷盜抵罪遂為十一之資金作贖刑翻成澗屋之産圖雍州賢能刺史教冀州表朱穆之象太丘有陳寔之畫或有留愛士民或有傳芳史籍昔越王鎔金尚思范蠡漢軍染畫猶髙賈彪矧彼前賢寧忘景慕可並圖象㕔事以旌厥善罷雍州恩教折以片言事闗往聖寄之勿擾傳彼昔賢故刻木不對畫獄無入吾自之雍矜懐圄犴幸得天無虚旱地歇怪蟲今軸車行塗舟艎且戒植栁官渡尚或依然寄飯曹僖猶思恩宥况義化君民節離寒暑憫兹岐路宣留惠澤與僧正教此州伽藍支提基列雖多設莊嚴盛修供具觀其外迹必備華侈在乎意地實有未𢎞何者凡鑄金刻木鏤漆圖瓦葢所以仰傳應身逺注靈覺羨龍瓶之始晨迫鵠林之餘慕故祭神如在敬神之道既極去聖兹逺懐聖之理必深此土諸寺止乎應生之日則蹔列形像自斯巳後封以篋笥乃至棄服離身尋炎去頂或十尊五聖共處一厨或大士如来俱蔵一櫃信可謂心與事背貌是情非増上意多精進心少昔塔裏紅函止傳舎利象頭白繖非謂全身夫以畫像追陳尚使吏民識敬鎔金圗範終令越主懐思匹以龍阿尚能躍鞘方之虎兕猶稱出柙况復最大圓慈無上善聚聞名去煩見形入道而可慢此雕香藴斯木櫁緘匿玉毫封印金掌既殊羅閲久入四天又異祗洹掩戸三月寳殿空臨瓊階虚敞密帷不開非仲舒之曲學紅壁長掩似邠卿之避讐且廣厦雲垂崇甍鳥跂若施之玉座飾以金鈿必不塵靄日姿虧㸃月面琉璃密窓自可輕風難入龍鬚細網足使飛燕不過兼得䖍敬之理必崇接足之心彌重可即宣勒永使准行資遣孔燾二女教夫思人生至輕事惟悼往表閭式墓義匪字孤至如游殷之息見撫張既橋𤣥之子受託魏王斯故美在令終愛兼身後故無錫令孔燾經術𢎞長志履貞槩遊處積年一朝長往聞其在室二女並未有行可廣訪姻家務求偶對甄異張景願復讐教夫理感禽魚道均荆棘亦有鄉因行改江以孝移張景願自縛到郡稱其父為韋法所殺今于公田渚斬法級祭墓訖束身歸官昔沂澤撫劔河南執㦸逺符古義寔足可嘉防廣刃讐赦其桎梏之罪丁蘭雪恥擢以大夫之位移文答穰城求和移文屬彼數及侮亡運逢瓦解石言水鬬實騐地凶飛絮雨粟還符天怪故淪俗駿奔遺黎南請所以皇略北征事同拯溺愍百姓之未安傷一物之失所故餘民襁負掃地来王而向化之黨忽覧今移咸以陶兹禮樂重覩衣冠已變伊川之髪兼削呼韓之袵寧當生入玉闗死歸建業民情若此匪我求䝉行人逺届實亦勞止想近察時機逺詳圖緯早去中原遽反枽梓旋地脈而北移越天渠而南指然後三姓二賢可存十半如其遂固守株不達𤣥象將恐衛將之師復有狼居之戰應侯之討更覩隂山之哭表謝立為皇太子表伏見詔書以臣為皇太子有命自天實驚物聴鴻名盛典爰萃庸薄勢舉千鈞方兹未重髙摶九萬比此非遥臣本凡質賓實無取特以毓慶雲霄慿暉璿極鳴玉内侍指麾外藩猶懼不任尚疑廢職况復監撫守從道著前經恭敬温文義彰昔記震維禮絶離景事尊養徳北宫贊業東序魏平非擬漢莊靡繼臣牧拙樊漢始獲言歸遂以下才屬當上嗣事異定陶之舉有類膠東之冊將何以著三善之徳延四皓之遊屈叔譽之辭繹卞蘭之頌拜皇太子臨軒竟謝表臣聞團暉麗天洊雷居震必資令徳實建賢明臣本空薄器業無取已慙好儒之志且乏豐下之姿叨逢慈奬事出希世方將問安寢門視膳天幄察陳奏之章示嚴警之書出龍樓而祗召息車馳道待鑾輿而巡幸説經孔庭足踐閶闔風雲之勢斯近飛陵倒景神仙之舉超然何以允副元良和兹守器逢師曠之襃值史丹之述謝賜新厯表五司告肇萬夀載光琯叶璧輪慶休寳厯班和布政懸闕狥道式𢎞敬授之典載闡浹辰之教又璿籥環璣鳯司肇律觀斗辨氣玉琯移春萬福維新尅固天保上昭明太子集别傳表臣聞無懷有巢之前書契未作尊盧赫胥之氏墳典不傳若夫正少陽之位主承祧之則口實為美唯稱啓誦自兹厥後罕或聞焉昭明太子稟仁聖之姿縱生知之量孝敬兼極温恭在躬明月西流幼有文章之敏羽籥東序長備元良之徳藴兹三善𢎞此四聰非假二疏寧勞四皓虎賁恧其經學智囊慙其調䕶豈止博望延賓夀春能賦問疑棗據書戒慿陵而已哉玉折何追星頽靡續地尊虢嗣外陽之術無徵位比周儲緱山之駕不反臣以不肖妄作明離出入銅龍瞻仰故實思所以揄揚盛軌宣記徳音謹撰昭明太子别傳文集請備之延閣蔵諸廣内永彰茂實式表洪徽上大法頌表臣綱言臣聞至理隆而徳音闡成功臻而頌聲作在乎奚斯吉甫神雀嘉樹或止事乎區中慶昭乎一物猶且手舞足蹈傳式方来况廼道出百王義髙三代而可閣筆韜詞詠歌不作者也伏惟陛下天上天下玅覺之理獨圓三千大千無縁之慈普被慧舟匪隔法力無垠躬紆尊極降宣至理澤雨無偏心田受潤是以九圍共溺並識歸涯萬國均夢一日俱曉佛法之勝事國家之至美稽之上古未有斯盛雅頌之作不可闕也謹上大法頌一首曹丕從征之賦劉坦遊侍之談曽無連類伏兼悚恧不勝喜悦之誠謹遣狀詔鍾超寳奉表獻頌以聞上南郊頌表雖周郊南甸宗伯之官徒設漢興北畤寅恪之道未隆而體元含極先後弗違典盛望禋理通孝敬潔静之禮載光禘郊之風斯洽昔東平琅琊著藻炎徳臨淄中山摛文魏美上白兎表瑞表丹陵祥因舊沛四靈可邁既騐玉衡之精千嵗變采有符明月之狀豈殊丹岫之羽来止帝梧庶比素質之禽得遊君囿請朱异奉述制㫖易義表臣聞仰觀俯察定八卦之宗河圗洛書符三易之教譬彼影圭居四方之中極猶彼黄鍾總六律之殊氣疑闗永闢踰𢎞農之洞啓辭河既吐邁龍門之已鑿臣以庸蔽竊尚名理鑚仰幾深伏惟舞蹈冒欲請侍中右衛將軍臣异於𤣥圃宣猷堂奉述制㫖易義𢎞闡聖作垂裕䝉求謹以表聞伏願垂允請賀琛奉述毛詩義表臣聞樂由陽来性情之本詩以言志政教之基故能使天地咸亨人倫敦序故東魯夢周窮兹刪採西河紹魏著彼纉述叶星辰而建詩觀斗儀而命禮以為陳徐雅頌膏肓匪一燕韓篇什痼疾多端北海鄭君徒逢箋釋南郡太守空為異序庶令中和永播碩學知宗大胥負師國子咸紹孝敬之徳化洽天下多識之風道行比屋為寧國臨城二公請入學表臣聞瞻彼緝弧既須良冶相諸筍玉猶藉他山故沮渙之水可居鄒魯之鄉為貴下帷投斧昔人以為精力棄竿委麥先哲以為美談伏惟陛下𢎞至徳之微言闡無為之玅説話郊講道不勞賈生之議就陽啓位無待公玉之圖願得齒年國胄随肩選造讓鼓吹表寛博為善不飾被于聲明縁寵成功未増榮於鐃管豈宜響芳樹于西河鳴朝飛於黑水彼巳之譏何懼尸素之誡知慙讓驃騎揚州刺史表常願親侯就列希同特進之班角巾還第不競龍驤之賞而天澤無涯名器總集竊以驃騎之官既為上將神州之重實號中土故以彈壓六戎冠冕九牧豈止司隸絳節金吾緹騎况復任總皇畿位重連率驃騎之號歴選為重元狩之中始自去病永平之建特受劉蒼齊憲為公主所申吳漢因羣臣之舉在州羸疾自解表昔違紫複曽不弱冠今夢青蒲逝將巳立願歸之謁不逮宸矜民請之書遽降天允屬上黨之雄山西宣將五較失道八尉驕貪一箭而解重圍更成戎阻九戰而絶甬道翻就喪師雖王郭不追朱買難嗣實以褰襜明目日夜厲精地雜黠羌民多獷俗人非公孝欲使任類汝南勲異伯宗必須榮踰戊巳州牧良才實屬多士無令菲薄徒積妨賢為武陵王讓揚州表臣延首青𡨕傾心紫府言非東里誠譬北辰而滔滔雲漢不被霈然之澤鬱鬱仙居方隔下臣之奏周任量力固請所陳明主理奪伏冀照許臣聞繫風捕影涉求之路靡階玉馬金舟過逺之資無託為長子大器讓宣城王表襄野之辯尚對軒君𢎞羊之計猶干漢主徒以結慶璿源乗䕃霄極一日千里因騏驥之馳髙隂百尺藉雲崖之逺熈祖流聰慧之稱方建臨淮之國元仲表岐疑之姿乃啓平原之封南郡奥部春榖名區民化仲翔之俗山峻陵陽之嶺而綠車赤綬交映相暉金璽銀劵炤灼光彩為子大心讓當陽公表日蝕之餘無黄童之對荷㦸入榛異子烏之辯遂復早建茅社夙聞井賦爵列五等綬參四色為子大款讓石城公表詭對鶴書俯羞鴉翼臣生處深宫未覿焦原之險不出戸庭豈觀砥柱之峻臣聞㘭塘汎水豈議大瀆之流覆簣為峰終乖小魯之説疏愍囚徒疏伏以明慎三典寛簡八刑宸鍳每以垂心國誥是焉攸切臣以此時奉勑權視京師雜事切見南北郊壇材官車府太官下省左裝等處上啓並請四五嵗以下輕囚助充使役自有刑均罪等􅄽目不異而甲付錢署乙配郊壇錢署三所於辛為劇郊壇六處在役則優今聴獄官詳其可否舞文之路自此而生公平難遇其人流泉易啓其齒將恐玉科重輕全闗墨綬金書去取更繇丹筆愚謂宜詳立條制以為永准章為南平王拜大司馬章臣度連宸蕚地實璿跗王業權輿夙奉締構爰頒盧綰同賛密謀豫均鄧禹俱奉明詔故摶飛九萬實假扶揺之力沖天百尺無俟剞劂之勞為王䂓拜吳郡太守章臣今願斂袵後思循墻所忝示山河而形勝顧浮橋而不見蒼鷹一遊望仙掌而逮然方當駕吉祥之車入勾吳之地驅緹扇之馬撫奉徳之鄉製錦何階棼絲方始啓賀洛陽平啓自函洛榛曠獯獫薦食久絶正朔之風不覩輶軒之使乗此戰心負斯戎足每興燔燧之警常勞守障之民自非聖畧𢎞宣天綱遐頓豈能使漢地盡收名王争入方今九服大同萬邦齊軌亭塞寢兵闗候罷柝臣誠兼家國倍深歡慶上武帝菩提樹頌啓臣聞擊轅小唱有慕風雅巴人淺曲實仰陽春是以葑葵細葉有傾朝景爝火微光不能自息伏惟陛下至徳欽明𤣥猷廣運乃神乃聖道跨軒媯正覺正真功符圓極常住為樂法喜為甘慈雨被於無垠睿化覃於幽顯故八風調四氣正天下定海外安𢎞龍窟之威紹鷲山之法無為不住實愍蒼生無相乃宣引歸真域製兹道樹顯此金容使誓願者結因頂禮者増福㑹途巳一古今誰二伏以器表承露東阿薦銘瑞啓黄龍中山興頌臣雖不敏實有愚心謹上菩提樹頌一首學謝稽古思非沈鬱不足以光揚盛徳髣髴一隅顧恧芻言伏紙慙震謹啓上皇太子𤣥圃園講頌啓竊以舜韶始唱靈儀自舞陳律纔暄風心競蕚輕禽短葉尚識音光沐善歡心寧忘撫抃伏惟殿下體髙𤣥賾養道春禁牢籠文圃漁獵義河注意龍宫研心寳印雲聚生什之材並命應王之疋探機析理怡然不倦朱華景月詎此忘罷屬素蔵晩節𤣥英初氣霜竹浮隂風梧散葉從容雅論實㑹神衷綱經生多幸屬此休世躊躇奉渥得備磐藩而黏蠅未拔迷象不羈寳沒醉衣珠沈勇額得聞勝善寧忘歌詠謹上𤣥圃園講頌一首文慙綺發思闕彫英徒懷舞蹈之心終愧清風之藻冒昧呈聞追深赧汗謹啓上東宫叙南康王薨啓方當逸足長衢克固蕃屏而峰摧璧毁一朝云及綱兄弟各從王役東守西撫常願陪承甲館同奉畫堂預得西苑賦文北場旅食豈謂不幸獨隔昭世異林有悲飛鳴斯切伏惟殿下愛睦恩深常棣天篤北海云亡騎傳餘藳東平告盡驛問留書鳴呼此恨復在兹日謝勅賚中庸講疏啓若覩𤣥圭如觀金版洽日九披流光照灼慶雲五色垂采氤氲天經地義之宗出忠入孝之道實立教之闗鍵徳行之指歸自非千年有聖得奉皇門無以識九經之倫稟二門之致竊以周發上聖問五行於箕子宣尼照極訪六儛於萇𢎞未有懸鏡獨曉仰均神鍳方知始畫八卦風羲有慙正名百物軒轅為陋謝勅示苦旱詩啓伏以九年之水不傷堯政七載之旱無累湯朝嵗𢎞則公田已修農勤則我庾惟億今者亢陽以来為日未久將恐督郵不黜失在汝南之守曝胔未收無傷河南之尹而載勞興居仰發歌詠無愛珪璧有事山川菲飲食矣加之以撤膳焉中夜不寐加之以申旦焉此唐虞之所闕如軒頊之所不逮謝賚扇啓臣綱啓傳詔饒僧明奉宣勅㫖垂賚細綾大文畫栁蟬山扇二柄文均析縷香發海檀肅肅清風即令象簟非貴依依散彩便覺夏室含霜飲露青蜩應三伏之修景羣飛黄雀送五月之南風蔽日垂隂薫澤慙采浮涼滌暑蘋末愧吹聖人造物之巧俯萃庸薄王府好玩之恩於兹下被頂戴曲私伏増欣躍謹奉啓事謝聞謝賚碧慮棊子屏風啓臣綱啓宣詔王佛慧奉宣勅㫖垂賚碧慮棊子屏風二十牒極班馬之巧兼曹史之慮均天台之翠壁雜水華之嘉名使雲母之窓慙其麗色琉璃之扇愧其含影仰降聖慈曲垂霑逮喜逐恩来驩同鳯舞言因謝盡更類三緘不任銘荷之誠謹奉啓謝以聞謝勅賜玉佩啓臣綱言主衣裘智瑋奏宣勅㫖垂賚臣玉佩一具藍田麗彩槐水鏤文飾以金闕之珠製以魯班之巧故以裾端照色影外生光恩發内府猥垂霑賜臣方温謝徳比振慙聲沐浴深慈欣荷交至謝勅賚魏國獻錦等啓山羊之毳東燕之席尚傳登髙之文北鄴之錦猶見胡綾織大秦之草戎布紡𤣥莬之花謝勅賚善勝威勝刀啓冰鍔含采彫琰表飾名均素質神號脱光五寳初成曹丕先荷其一二勝今造愚臣總被其恩錫韓非之書未足為比給博山之筆方此更輕謝勅賚方諸劍等啓纔發玉雨彫竒溢目始開牙檢麗飾交陳已匹丹霞之暉乍比青雲之制身文自貴器用惟宜寒暑兼華左右相照謝勅賚貂坐褥席啓東瀛美毳不著馬彪之儀北朔文茵豈間張敞所記隂炭既重寒井猶冰特降殊私温華曲被雖狐白千金織成千種李頒漢被楊降曹氈不足以髣髴洪慈連類聖澤謝勅賚織竹火籠啓池水始浮庭雪向飛慈澤無涯時錫香被製此簡枝彫斯早節文華九折用美十罏謝勅賚廣州塸啓淮南承月之杯豈均符彩西國浮雲之椀非謂瓌竒臣南珍靡究未讀奏曹之表方物罕逢不識議郎之畫謝勅賚大菘啓吳愧千里之蓴蜀慙七菜之賦是知泮官採茒空入魯詩流火烹葵徒傳豳曲謝勅賚長生米啓堯禾五尺未足稱珍漢苗九穗方斯非擬如随瑞鹿若降神烏暮律向游獻春方始食乃民天之貴粒有延齡之名藉此資身因斯養性謝勅賚城邉橘啓結根壟首垂隂陽壍甘踰石蜜味重金衣暉章縹李豈止稱於晉世上林芙棗非獨髙於漢日謝勅賚益州天門冬啓逮自星橋見珍玉壘本草稱其輕身延夀實為上藥姬晉之重丹桂曹丕之愛落英一䝉恩錫竊幸往代謝勅賚河南菜啓海水無波来因九譯周原澤洽味備百羞堯韭未儔姬歜非喻謝東宫賜裘啓綱啓䝉賚豹裘一領降斯止謗垂兹信服物華雉毳名髙鷰羽綱才慙齊相受白狐之飾徳謝漢蕃均黒貂之賜地捲朔風庭流花雪故以裾生惠氣袖起陽春荷澤知慙瞻恩興戀不任下情謹啓事謝聞謝東宫賜柿啓懸霜照采凌冬挺潤甘清玉露味重金液雖復安邑秋獻靈闗晚實無以匹此嘉名方兹擅美答安吉公主餉胡子一頭啓方言異俗極有可觀山髙水逺宛在其貌不使去来執轡嫓彼青衣正當出入燒香還依丹轂豈直王濟女奴獨有羅袴方使樂府行胡羞論歌舞垂賚新竒伏増荷忭謝邵陵王禁錮啓臣綸習近宵人不能改過屢犯明憲三入刑科昔繆肜掩扉曹儀著論布衣兄弟且相誡朂以臣居長終慚勸勵仰負慈嚴心顔戰讋請武帝御講啓此重雲之講臣綱臣綸臣紀言臣聞紫官麗天著明𤣥象軒臺在嶽逖聴良書是以道彌隆而禮愈縟徳彌溥而事愈泰此葢彰至治之尊牧生民之本也伏以大光嚴殿侔神垂則沖天開宇功深大壯事協文明儀辰建極切靈啓構照燭三光含超百堵咸謂心華所表復非良匠之力神通所現不藉子来而成實惟净國固絶董落之禮髙邁釋宫理無鹿鳴之宴竊惟妙勝之堂本師於兹佛吼摩尼之殿如来亦闡法音伏希躬降睟容施灑甘露油然慧雲霈然慈雨光斯盛業導彼蒼生履天居而説無相同真也建佛事而被率土化俗也同真化俗至矣哉一舉而三美顯豈不大乎與彼陘山之上僊巖之下西都鳯皇負陽鸑鷟安足同日而語哉敢露丹愚伏待矜遂輕干聴覽流汗戰懾謹啓重請御講啓臣綱臣綸臣紀言一日輕最上聞願垂法雨天鍳凝逺未䝉降遂預均藥木誠同器水徒美春華還憐秋藿伏惟陛下徳冠受圗道隆言契四三六五不能喻十堯九舜無以方而秋風動條尚興未息之念一物失所猶起納隍之仁方留衢室之情未議石渠之講竊以神通所現一念萬機大權所行應時三密猶處禪寂影現十方一起道場已為入㑹豈與吹律之后均熊湘之勞鑄鼎之君切風雨之務伏願以平等慧行如来慈為度蒼生降希有事使朝滿一乗情皆十善智珠法炬人人並持四忍五明家家可望謹冒天威重以聞啓翹誠注仰伏希允遂使北冀無山豈自髙於曩日南陽迴景不獨隔於當今謹啓又請御講啓臣綱臣綸臣紀言敢藉寵靈頻干聴覽再降神㫖未垂臨燭伏以皇政廣覃天覆悠逺海河夷晏日月貞明洛水有稱蕃之胡藁街有歸命之虜春戈巳戢秋塵不飛槐棘均多士之詩貂璫有得賢之頌聖徳沖謙劬勞日昃猶以時多禹歎物未堯心百辟慙惶羣司聳蕩臣等或三善靡聞或一官不効嗜鮑逢宰相之請學儉得參軍之譏而自以結根天苑竊髙前載是以匪懼塵黷復敢上聞伏願樂説大慈特垂矜許放光動地不以法妨俗隨機逗藥不以人廢言俾兹含生凡厥率土心花成樹共轉六塵鏡裏得珠俱開三障於其誠願孰不幸甚累冒宸嚴倍増戰息謹啓奉請上開講啓此同泰之講臣綱言竊以真如無説非筌不悟極果不應注仰斯通故器有水縁方見圓曦之影藥含長性得墜慧雲之慈伏惟陛下玉鏡宸居金輪馭世應跡有為俯存利物不違本誓開導愚䝉驅十方於大乗運萬國於仁夀豈止冶斤田粟功侔造化疏江決河削成天下智髙九舜明出十堯頻徙鑾蹕降甘露雨天人舞蹈含生利益是以背流知反迷岸識歸臣自叨預趨聞渇仰無厭一日冒陳丹欵伏希復轉法輪未迴聴卑之恩尚絶愚臣之願慺慺寸志重敢披祈伏願將降一音曲矜三請被微言於王舎集妙義於寳坊聖心等視蒼生猶如一子遂臣之請即是普被無邉如䝉允許衆望亦足兩肩負荷豈敢為喻不任下願謹啓事以聞謝上降為開講啓臣綱啓舎人徐儼奉宣勅㫖無礙大慈不違本誓来嵗正月開説三慧經伏奉中詔身心喜躍饑䝉玉膳比此未踰貧獲寳珠方斯非譬伏以元正慶流大裘禮畢慧雲續潤法雨仍垂出世洪恩與陽春而布澤俾兹含生隨藥木而増長懽同萬國福浹九圍豈直愚臣得未曽有謹宣今勅馳報綸紀具爾相趣無辭上謝謹啓重謝上降為開講啓臣綱啓丹願懇誠屢冒宸扆實希降甘露雨普被三千天聴孔邈未垂鍳遂旱苖傾潤豈比自憐暍鳥思林寧方渇仰近因大僧正慧令伏敢重祈降逮勅㫖垂許来嵗二月開金字波若經題殊特之恩曲應愚請稽拜恭聞不勝喜躍身心悦樂如觸慈光手足蹈舞義非餘習伏以香城妙説實仰神文潤方雲雨明踰日月能使迷途識正大夢均朝梵志懼来天魔遥禮提桓所聴而今得聞波崙所求希世復出其為利益深廣無邉九圍獲悟十方䝉曉雖復識起初流心窮後念方當共捐五葢俱照一空巍巍蕩蕩難得為喻臣仍屈慧令續宣此典大乗普導寔繇聖慈伏筆罄言寧宣戴荷不任下情謹啓事謝聞謝開講般若經啓臣綱言伏承輿駕臨同泰寺開金字般若波羅密經題照迷生之慧日導出世之長源百華同隂萬流歸海幽顯讃揚率土含潤臣身礙已来望舒盈闕甘露普被人天俱萃波若魔事獨在微躬馳係法輪私深尅責不任下情謹奉啓奉承答同泰寺立刹啓竊以寳塔天飛神龕地踊豈惟昔代復見兹辰嘉彼百靈欣斯十善雖復紫煙旦聚比此未儔朱光夜上方今知陋謝勅使監善覺寺起刹啓臣綱啓伏見勅㫖使監作舍人王曇明材官將軍沈微御仗吳景等監看善覺寺起刹事爰奉聖恩曲降神力命斯執事修兹長表寳塔雲構無待喜園水精特進非差龍海大龜持泥未足為盛鶖鷺引繩方斯取埒仰瞻慈渥喜戴不勝俯循宿願私増涕噎不任銘荷謹奉啓謝聞謝御幸善覺寺看刹啓臣綱言即日輿駕幸善覺寺威神所被金表建立槩泰清而特起接庫樓而上征既等湛然長均浄土方為佛事永利天人頂荷之誠臣百恒品不任下情謹奉啓事謝聞謝勅賚銅供造善覺寺塔露盤啓臣綱啓主書陳僧聰奉宣勅㫖垂賚銅一萬三千斤供造善覺寺塔露盤是稱那陽之珍實亦昆吾之珤燥濕無變九布見竒寒暑得宜六律成用况復神龍負子光斯妙塔金鳥銜帶飾兹髙表函谷恥其詠歌臨淄恧其祥應陽燧含景還譬日輪甘露入盤足稱天酒辭林本闕心辯又慙徒戴重恩終難陳謝不任銘荷之誠謹奉啓聞謝勅賚柏刹柱并銅萬斤啓臣綱啓傳詔吕文强奉宣勅㫖賚臣栢刹柱一口銅一萬斤供起天中天寺九牧貢金千尋挺樹永曜梵輪方興寳塔夏差神鼎晉恧相風使福被域中功禔無外臣以庸愚稟承勝善樂受遍心恩光動色銘荷之誠無詞啓謝不任頂戴謹奉啓謝聞謝勅賚錢并白檀香充法㑹啓臣綱啓傳詔奉宣勅㫖以臣明法㑹垂賚錢二十萬白檀薫􅀢􅀢香各十斤黄紙詔書先開泉府青雲好氣次集桂宫貨重文龜芳踰麗草散金廡下止及軍吏積榖充家纔班親族未若資此良田方開五葢入兹法度長出四流假詞敬祖尚慙難述借辯君卿猶知非謝不任荷戴謹啓事以聞謝勅賚苦行像并佛跡啓臣綱啓舍人顧􅛨奉宣勅㫖以金銅苦行佛并佛跡供養具等賚使供養伏以六年道樹超出四魔千輻足輪徳圓萬善故能聞見悟解逢遇祛塵天聴恩隆曲垂奬被謹修飾櫩宇齋潔身心翹仰慈光黙待昭降千唱四辯尚不宣心輕毫弱簡豈能陳謝不任下情謹啓事謝聞奉阿育王寺錢啓臣綱言臣聞八國同祈事髙於法本七區皆藴理備於湧泉故牙牀白繖無因不覩金瓶寳函有縁斯出伏惟陛下懸天鏡於域中運大權於宇内三有均夢則臨之以慧日百藥同枯則潤之以慈雨動寂非巳行住因物無能名矣臣何得而稱焉故以照光赤書則前史之為瑞珥芝景玉嗤徃代之為珍難遇者乃如来真形舍利照景蜜瓶浮光徳水如觀鈎鎖似見龍珠自非聖徳威神無以值斯希有天人頂戴遐邇歸心伏聞阿育王寺方須莊嚴施用萬金檀豐十蔵寳陳河府泉出水衡比丘持土大厦方搆羅漢引繩髙塔將表不勝喜抃謹上錢一百萬雖誠等散華心荷不盡而微均滳瀝陋甚隣空輕以塵聞伏啓悚汗謹啓謝勅賜解講錢啓無勞磁石之火金貨猥臻非遊玉壘之川銅山可見舒王濟之埒猶覺有餘假劉寔之繩穿而不盡慧輪究竟爰降曲私福田成滿仰繇慈被榮光獨照自均若木負恩知重竊譬蓬莱謝賜錢啓殊澤隆厚造次被䝉重彼八珠珍斯九法赤仄成采出自水衡之蔵紺文委貫忽積銅扇之裏謹長充放生用濟含識發𢎞誓願等供無邉效彼薄拘均兹流水方使怖鴿獲安窮魚永樂謝賚納袈裟啓四首臣綱啓殿師吳苗奉宣勅㫖垂賚鬱泥細納袈裟一縁分同妙葉界寫長塍拂石慙華裁金非重是曰新染厥惟田服方使幽貞芳杜恥緝芙蓉仙客排雲羞裳飛羽穢食凢軀無明暗識叨恩毎重荷澤難勝不任銘戴之至謹奉啓事謝聞又臣綱啓䝉賚鬱泥納袈裟一緣荀鍼秦縷因製緝而成文魯縞齊紈藉馨漿而受彩初開篋笥便覩舎衛田疇不出戸庭坐視南山塍陌竊以三銖輕㬉稱羙服於浄居千金日麗得受用於迦葉而湛恩特被萃此愚躬霜降授衣曲澤便及喜溢心崖如從空中所墜忽不自知更謂寳支所出采襮四色事非離世鈎蘭兩葉殊澤實隆不任荷戴之至謹啓事謝聞又臣綱啓宣傳左右俞景茂奉宣勅旨垂賚鬱泥真納九條袈裟一緣精同織縷巧均結毳邁彼良疇成斯妙服雖復貴比千金輕踰二兩無以匹此洪恩方斯殊賚臣卧疾累旬未堪行踐不獲即被新染陪侍寳坊塵緣穢體愧荷相集不任慙悚之至謹啓事謝聞又䝉賚鬱金泥細納袈裟一緣忍辱之鎧安施九種功徳之衣慚愧八法謝勅聴從舎利入殿禮拜啓臣綱啓舎人王景曜至奉宣勅㫖曲垂逮間并聴臣随從舎利入殿禮拜謹奉秋色照澄預表光瑞臣比身心得無障惱明陪扈寳函謹鞠躬恭到但不生羽翼無假神通身升浄土髙排閶闔足踐蓮華方兹非喻行躡寳梯比斯未重誘導殊恩實迴始望顧兹塵縳喜戴不勝謹啓謝勅使入光嚴殿禮拜啓臣綱啓舎人王景曜奉宣勅㫖曲垂勞問并使明入光嚴殿禮拜法身謹奉臣粗䝉恩造明守開恭到遂以勞屢升浄土風積水厚不足為喻微心悚躍上謝無辭不任下情謹啓事謝聞謝勅為建湼槃懴啓臣綱啓伏聞勅㫖垂為臣於同㤗寺瑞應殿建湼槃懴臣障雜多災身穢饒疾鍼艾湯液每黷天覽重䝉曲慈降斯大福冀慧雨微垂即滅身火梵風纔起私得清涼無事非恩伏枕何答不任下情謹奉啓謝聞謝勅㕘迎佛啓臣綱啓主書周昂奉宣勅㫖曲賚恩㕘臣即爾到建元寺奉候法身金山戾止王人勞問榮恩頻疊啓謝無辭不任下情謹啓事謝聞書答湘東王和受試詩書吾輩亦無所遊賞止事披閲性既好文時復短詠雖是庸音不能閣筆有慙伎癢更同故態此見京師文體懦鈍殊常競學浮疎争為闡緩𤣥冬修夜思所不得既殊比興正背風騷若夫六典三禮所施則有地吉凶嘉賓用之則有所未聞吟詠情性反擬内則之篇操筆寫志更摹酒誥之作遲遲春日翻學歸蔵湛湛江水遂同大傳吾既拙於為文不敢輕有掎摭但以當世之作歴方古之才人逺則揚馬曹王近則潘陸顔謝而觀其遣辭用心了不相似若以今文為是則古文為非若昔賢可稱則今體宜棄俱為盍各則未之敢許又時有效謝康樂裴鴻臚文者亦頗有惑焉何者謝客吐言天拔出於自然時有不拘是其糟粕裴氏乃是良史之才了無篇什之美是為學謝則不届其精華但得其冗長師裴則蔑絶其所長惟得其所短謝故巧不可階裴亦質不宜慕故胸馳臆斷之侣好名忘實之類方分肉於仁獸逞郤克於邯鄲入鮑忘臭效尤致禍決羽謝生豈三千之可及伏膺裴氏懼兩唐之不傳故玉徽金銑反為拙目所嗤巴人下里更合郢中之聴陽春髙而不和妙聲絶而不尋竟不精討錙銖覈量文質有異巧心終愧妍手是以握瑜懐玉之士瞻鄭邦而知退章甫翠履之人望閩鄉而歎息詩既若此筆又如之徒以烟墨不言受其驅染紙札無情任其揺襞甚矣哉文之横流一至於此至如近世謝朓沈約之詩任昉陸倕之筆斯實文章之冠冕述作之楷模張士簡之賦周升逸之辯亦成佳手難可復遇文章未墜必有英絶領袖之者非弟而誰毎欲論之無可與語吾子建一共商㩁辯兹清濁使如涇渭論兹月旦類彼汝南朱丹既定雌黄有别使夫懐䑕知慙濫竽自恥譬斯袁紹畏見子將同彼盜牛遥羞王烈相思不見我勞如何答湘東王書暮春美景風雲韶麗蘭葉堪把沂川可浴弟召南寡訟時綴甘棠之隂冀州為政暫止褰襜之務唐景薦大言之賦安汰述連環之辯盡遊翫之美致足樂耶吾春初卧疾極成委弊雖西山白鹿懼不能瘉子預赤丸尚憂未振髙卧六安毎思扁鵲之問静然四屋念絶修都之香豈望文殊之来獨思吳客之辨屬以皇上慈被率土甘露聿宣鳴銀鼓於寳坊轉金輪於香地法雷驚夢慧日暉朝道俗輻湊逺邇畢集聴衆白黒日可兩三萬獨以疾障致隔聞道豈止楊僕有闗外之傷周南起留滯之恨第十三日始侍法筵所以君長近還未堪執筆敬祖前邁裁欲勝衣毎自念此愍然失慮江之逺矣寤寐相思毎得弟書輕疴遺疾尋别有信此無所伸又答湘東王書十八日晩於華林閣外省中得弟九月一日書甚慰懸想秋節淒清比如常也州事多少無足疲勞濠梁之氣不異恒日差盡怡悦時有樂事游士文賓比得談賞終宴追隨何如近日注漢功夫轉有次第想見此書有甚饑惄吾䝉受菩薩禁戒簉預大士此十二日便於東城私懴十七日旦早入寳雲壁門照日銅龍吐霧紅泉含影青蓮吐芳法侣成羣金山滿座身心快樂得未曽有昨旦平等寺法㑹中後無礙受持天儀臨席睟容親證拜伏雖多疲勞頓遣剃頂之時此心特至心口自謀併欲剪落無疑馬援遣蝨之談不辭應氏赤壺之諷僧璡典議不異昔日竟日問璡殊均子路探鉤取名名曰因理皇情印可今便奉行昨晡後方還所住徐摛庾吾羌恒日夕鏡逺在直時来左右但不得倜儻殊異盤下之時稍習節文欲避酒泉之職尹王相去既爾伸欵對臨汝侯比多屬疾来宫小稀其間信使差得其簡曄兼詹事暕為洗馬時伸話言數語論辯句之矦東撫復成離濶衡山九嶷尋應引邁臨岐有歎望水興嗟但吾自至都已来意志忽怳雖開口而笑不得真樂不復飲酒垂二十旬次公醒狂自成無理知耆艾數信述吾經過適憶途遵江夏路出西浮日月易来巳涉秋暮而韋述有長沮之弊必笑之災術異葛仙形均荀序弟復資其糧餼特為經營轉禍為福事均北叟分别已来毎増慨憶歎因月積想逐時旋毎有西郵事同撫䏶相見之期未知何日瞻言玉嶺静對金闗懐勞之深未常弭歇善自保惜及此不多綱疏答湘東王上王羲之書試筆成文臨池染墨疏密俱巧真草皆得似望城扉如瞻星石不營雲飛之散何待曲辱之丹方當奉彼筐中置之帳裏乍楷桐鈎時懸欹案戢意之深良不能已答湘東王慶州牧書雖心慕子文申威涿郡意存士雅慷慨臨江而不能遂封狼居之山永空幕南之地逐北聊城追奔瀚海必欲巻綬避賢辭病收迹答南平嗣王餉舞簟書濯龍之木文罽飾壇淮南之臺紫羅為薦未若五離九折出桃枝之翠筍綺爛霞舒製雲母之修竹南湘㸃淚喻也未竒東宫赤花擬之非玅答定襄侯餉卧簟書筠篁多品篠簜雜名較色比竒獨此為貴自含蒼紫似久暴於柯亭乍舒黝素若屢霑於湖水三伏餘炎九折成用便可旅食南館髙卧北窓與廣信侯述聴講事書王白仰承比徃開善聴講湼槃縱賞山中游心人外青松白露處處可悦竒峰怪石極目忘歸加以法水晨流天華夜露徃而忘反有㑹昔言王牽物從務無繇獨徃仰此髙蹤寸心如結謹白與廣信侯重述内典書王白濶絶音㫖每用延結風嚴寒勁願比怡和伏承浄名法席親承金口辭珍鹿苑理愜鷲山微密秘蔵於斯既隆莊嚴道場自兹彌闡豈止心燈夜炳亦乃意蕊晨飛況兄慧思𢎞明本長内教今陪十善之車開八正之路流般若之水洗意識之塵以此春翹方為秋實王每憶華林勝集亦叨末位終朝竟夜沐浴妙言至於席罷日餘退休傍省攜手登臨兼展談笑仰望九層俯窺百尺金池動月玉樹含風當於此時足稱法樂今巻帷之部乗傳一隅聞慧雨滂流喜躍充遍徒挹懸河無伸承稟空無所有不瑩情靈緣癡有愛自嗟難抜兼下車已来義言葢少舊憶已盡新解未餐既慙口誦復非心辨永謝瀉瓶終慙染㲲是則慈雲既擁智海亦深影末波餘希時灑拂但暌違轉積興言盈臉願加敬納言不宣意謹白答新渝侯和詩書垂示三首風雲吐於行間珠玉生於字裏跨躡曹左含超潘陸雙鬢向光風流巳絶九梁挿花步揺為古髙樓懷怨結眉表色長門下泣破粉成痕復有影裏細腰令與真類鏡中好面還將畫等此皆性情卓絶新致英竒故知吹簫入秦方識来鳯之巧鳴瑟向趙始覩駐雲之曲手持口誦喜荷交并也誡當陽公大心書汝年時尚幼所闕者學可久可大其惟學歟所以孔丘言吾嘗終日不食終夜不寢以思無益不如學也若使墻面而立沐猴而冠吾所不取立身之道與文章異立身先須謹重文章且須放蕩答張纘謝示集書綱好文章於今二十五載矣竊嘗論之日月參辰火龍黼黻尚且著於𤣥象章乎人事而况文辭可止詠歌可輟乎不為壯夫揚雄實小言破道非謂君子曹植亦小辨破言論之科刑罪在不赦至如春庭樂景轉蕙承風秋雨且晴檐梧初下浮雲生野明月入樓時命親賓乍動嚴駕車渠屢酌鸚鵡驟傾伊昔三邉久留四戰胡霧連天征旗拂日時聞塢笛遥聴塞笳或鄉思悽然或雄心憤薄是以沈吟短翰補綴庸音寓目寫心因事而作與蕭臨川書零雨送秋輕寒迎節江楓曉落林葉初黄登舟已積殊足勞止解維金闕定在何日八區内侍厭直御史之廬九棘外府且息官曹之務應分竹南川剖符千里但黑水初旋未申十千之飲桂宫既啓復乖雙闕之宴文雅縱横即事分阻清夜西園眇然未尅想征艫而結歎望桂席而霑衿若使𢎞農書疏脫還鄴下河南口占儻歸鄉里必遲青泥之封且覯朱明之詩白雲在天蒼波無極瞻之岐路眷慨良深愛䕶波潮敬朂光彩與劉孝綽書執别灞滻嗣音阻濶合璧不停旋灰屢徙玉霜夜下旅鴈晨飛想涼燠得宜時候無爽既官寺務煩簿領殷凑等張釋之條理同于公之明察雕龍之才本傳靈虵之譽自髙頗得暇逸於篇章從容於文諷頃擁旄西邁載離寒暑曉河未落拂桂棹而先征夕烏歸林懸孤㠶而未息足使邉心憤薄鄉思邅迴但離濶巳久載勞寤寐行聞還驛以慰相思答蕭子雲上飛白書屏風書得所送飛白書縑屏風十牒冠六書而獨美超二篆而擅竒乍寫星區時圗鳥翅非觀觸石已覺雲飛豈特金璫便覩蟬翼聞諸衣帛前哲未巧懸彼帳中昔賢掩色答徐摛書山濤有言東宫養徳而巳但今與古殊時有監撫之務竟不能黜邪進善少助國章獻可替否仰禆聖政以此慙惶無忘夕惕驅馳五嶺在戎十年險阻艱難備更之矣觀夫全軀具臣刀筆小吏未嘗識山川之形勢介冑之勤勞細民之疾苦風俗之嗜好髙閣之閒可来髙門之地徒重玉饌羅前黄金在握浞訾栗斯容與自憙亦復言羲軒以来一人而已使人見此良足長嘆與魏南荆州刺史李志書卿門世奕葉中州舊族自金天失馭帝鼎南遷衣冠播越不及俱邁豈可屈志羶戎久淪胡壤今皇師外掃天鉞四臨海蕩電飛雲蒸雨合所摧所尅是卿之具聞也且偽國沸騰四方幅裂主虐臣姦牝鷄亂政若能早識事機翻歸有道豈直圗形長樂刻像鐘鼎時事易差相思勉厲但明月暗投昔人為誡鄰藩贈藥有可虚懐密驛輕郵側望歸簡與智琰法師書五翳消空韶光表節百華異色結綵成春道體何如恒清宜也對玩清虚既在風雨之表游心入理差多定慧之樂弟子俗務紛糺勞倦特深睠然北嶺欽賢巳積㑹遇之期庶必可僝有緣之儔事等饑渇佇望来儀一日三嵗想思𢎞利益理當無爽指遺此信無述寸衿綱和南又旦来雨氣殊有初寒攝衛巳久轉得其力雖他方法界略息化緣祈洹之裏恒有晤對眷佇之深無時不積久因倩師頻述方寸不知巧笑之僧頗為津及不耳前昨已来徵事義聚龍象畢同應供皆集慧炬聞心甘露入頂聞之善謔持盡歡怡想味之懐轉復無極昔幼年經聞制㫖受道日淺北面未深雖異禪那事同華水今叚西下特蓄本心訪理質疑屬在明徳不謂般若留難現疾未瘳問津無地歎恨何巳伏承輿駕尋幸伽藍冀於此時得一覯止辯論青豆之房遣惑赤花之舎追徃年之宿眷述即日之寸心此事必期冀非爽指遺兹承問佇有還書綱和南弔道澄法師亡書省啓承尊師昨夜湼槃甚深悲怛法師志業淹明道風淳素戒珠瑩浄福翼該圓加以識見㝠通心解逺察記落雨而必然稱黒牛而匪謬服膺者無逺近䝉益者兼道俗弟子自言旋京輦便伸結緣豈謂一息不追奄至乎此然勝業本深智刀久利必應遊神實地騰跡浄天但語其乳池啓殯香棺入室不入空心于何不慟但如来降生之迹因此而入泥洹正當其生住滅靡有定相先聖後賢何其形響推校因緣未始有例上人等並在三嵗積始終稟道宜應共相䇿勉𢎞遵舊業使道場無斷利益不墜所襚物輒如法供養奈何奈何序莊嚴旻法師成實論義疏序夫事秉文辭理通氣象涉之者尚述求之者或躓是以問𤣥經於揚子且云不習奏古樂於文侯猶稱則睡厯校清臺夀王之課不密氣現斗牛南昌之地或爽况乎慧門深邃入之者固希法海波瀾汎之者未易自使河濟混淆魔塵紛糾皎皎毒霜童童苦樹善田之苗不吐意華之彩詎發無常之樓互起暗室之火無暉是以餐蜜挫糟俱珍異論持牛卧棘競起邪宗自佛日團空正流蕩垢手擎四鉢始乎鹿園之教身卧雙林終於象喻之説含生弗等開塞之義因機感受不同淺深之言或異處處散説本應根緣有不次第各随羣品金棺巳掩旃檀之炭無追乳池且涸白㲲之灰斯盡迦葉入定歡喜智滅末地之報已終優波之身且謝於是五部横流八乾起執尋源既舛取著尤别四相乃無常之刀三聚為苦家之質習續不斷稱為集諦無為有體介然可求等智能斷羅漢猶退豈啻千里之舛義起毫釐三豕之書謬符晉史北轅趨郢木末搴蕖譬乎服子論丘利害不識膠柱鳴瑟燥濕無變自佛滅之後八百餘年中天竺國婆羅門子名訶梨跋摩梁云師子鎧四種圍陀在家必習三品慧蔵入道彌通師事達磨沙門事均反啓於是歎微言之已紀傷頹風之不振抗言動論以朱紫為先發意吐詞必涇渭繇巳於是標撮領㑹商㩁異端刪夷浮詭搜聚貞實造百有二品以為斯論成則據文實則明理舉成對壊稱實形虚欲令毘曇外道二途皆廢如来論主兩理兼興若夫龍樹馬鳴止筌大教旃延法勝縈縛小乗兼而總之無踰此説故華氏之王於兹頂戴樓佉外道結舌無辭百流異出同歸一海萬義區分總乎成實豈止鼓腹湼槃旗靡轍亂雞鳴真諦喪精掩色多歴年所復寡英才粤我大梁炎圗啓運皇帝含天包地之徳春生夏長之仁以本誓願率化斯土梵輪常轉三寳現前甘露聿宣四部無厭有莊嚴旻法師羽儀鸞鳯負掲光景深以通志神以知来其跡同凡其源莫測故以心包四忍行合三空慧比文殊𤣥如善吉總持均阿難之徳樂説有富樓之功思媚我皇起予正法宣𢎞此論大盛乎京師負笈争趨懐鉛来逺無勞冠軍之勢自傾衛客固有華隂之徳人歸成市擬議舎衛超邁泗洙西闗自恥南宫不競湘官寺智蒨筆札之功不殊法汰之報安石清辯之玅何止道林之折子猷凡如干巻勒成一部法師大漸深相什嘱豈直田生之亡獨卧施讐之手馬公之學方由鄭氏而陳其義云昭明太子集序竊以文之為義大哉逺矣故孔稱性道堯曰欽明武有来商之功虞有格苗之徳故易曰觀乎天文以察時變觀乎人文以化成天下是以含精吐景六衛九光之度方珠喻龍南樞北陵之采此之謂天文文籍生書契作詠歌起賦頌興成孝敬於人倫移風俗于王政道綿乎八極理浹乎九垓贊動神明雍熈鐘石此之謂人文若夫體天經而總文緯掲日月而諧律吕者其在兹乎昭明太子懸明離之極照履得一之休徵曰孝與仁窮神盡聖豐下表異垂髪應期若夫嵩霍之峻無以方其髙滄溟之深不能比其大二曜朓蝕而凝明弗虧四氣猶爽而履信或一言出知乎微行立彰乎逺湛然𤣥黙巍乎莊敬居身以約在滿必沖九徳之保無以喻其審諭六行之傳豈可語其拾遺叔譽知窮師曠心服行一物而三善固無得稱焉至如翠幃晨興斑輪曉騖胡香翼葢葆吹從風問安寢門之外視膳東廂之側三朝有則一日弗虧恭承宸扆陪贊顔色化闕梓於商庭既欣拜夢望直城而結軌有悦皇心此一徳也地徳褰帷天雞掩色搆傾椒殿沴結堯門水漿不入圭溢罕進喪過乎哀毁㡬乎滅池綍既啓探擗摽之慟陵園斯踐震中路之號率由至要之道以為生民之則固已事彰朱草理感圗雲此二徳也垂慈豈弟篤此棠棣善誘無倦誨人弗窮躬履禮教俯示楷模羣藩戾止流連於終讌下國逺征殷勤於翰墨降明兩之尊匹姜肱之同被紆作貳之重𢎞臨菑而共館此三徳也好賢愛善甄徳與能曲閣命賓雙闕延士剖羙玉於荆山求明珠於枯岸賞無繆實舉不失才巖穴知歸屠釣棄業左右正人巨僚端士丹轂交景長在鶴闗之内花綬成行恒陪畫堂之裏雍容河曲並當今之領袖侍從北場信一時之俊傑豈假問謝鯤於温嶠謀黄綺於張良此四徳也皇上垂拱巖廊積成庶務式總萬㡬副是監撫山依揺彩地立少陽物無隠情人服睿聖此五徳也罰慎其濫書有作則勝殘去殺孔著明文任刑逞威伋疵淳化終食不違理符道徳故假約法於闗中秦民胥悦感嚴刑於闗下漢后流名是以逺鍳前史垂恩獄犴仁同泣罪幽比推溝玉科歸理遣之恩金條垂好生之徳黔首齊民亭育含養咸欣然不知所以然此六徳也梧丘之首魂沈而靡託射聲之鬼曝骨而無歸起掩骼之慈被錫櫘之澤若使驄馬知歸感埋金於地下書生雖殞尚飛被於天上恩均西伯仁同姬祖此七徳也𤣥𡨕戒節沍隂在嵗雪號千里氷重三尺炎罏吐色豐貂在御留上人之重愍終窶之氓發於篇藻形乎造次輟宴心歡矜容動色嘆陋巷之無褐嗟負薪之屢亡發私蔵之銅鳬散垣下之玉粒施周澤洽無幽不普銜命之人不告而足受惠之家飡恩之士咸謂櫟陽之金自空而墮南陽之粟自野而生此八徳也陽河淥水竒音玅曲遏雲繁手仰秣来風靡悦于胸襟非闗於懐抱事等棄琴理均放鄭豈同魏兩作歌於長笛終噪漢貳託賦於洞簫此九徳也怪寳竒琛不留於器服仙珠玉玦無取於浮玩土木無祶宫殿靡磨礱此十徳也承華廣濶肅成且啓秋光洞入春花洒樹名僧結侣長裾總集吐納名理從容持論五稱既辯九言斯洽如觀巨海如見游龍令羅折談名儒稱痰無勞擁經八巻豈假羊車詣門此十一徳也研精博學手不釋巻含芳膄於襟抱揚華綺於心極韋編三絶豈直爻象起先五鼓非直甲夜而欹案無休書幌密倦此十二徳也群玉名記洛陽素簡西周東觀之遺文刑名墨儒之㫖要莫不殫兹聞見竭彼綈緗總括竒異徵求遺逸命謁者之使置籝金之賞惠子五車方兹無以比文終所收形此不能匹此十三徳也借書治本逺紀齊攸一見自書聞之闞澤事唯列國義止通人未有降貴紆尊躬刋手掇髙明斯辨已亥無違有識可風長正魚魯此十四徳也至於登髙體物展詩言志金銑玉徽霞章霧密致深黄竹文冠綠槐控引解騷包羅比興銘及盤盂賛通圗象七髙愈疾之㫖表有殊健之則碑窮典正每由則車馬盈衢議無失體纔成則列藩擊缶境逐情深言隨手變麗而不淫臨安公主集序四徳之美戚里仰以為風七行之竒濯龍規以為則若夫託勾陳之貴出玉臺之尊風儀閒潤神姿照朗愛敬之道夙彰柔􅈺之才必備鳯桐遐逺清管遼亮湘川寂寞淚篠葳蕤北渚之句尚傳仙靈之典不冺况復文同積玉韻比風飛謹求散逸貽厥於後馬槊譜序馬槊為用雖非逺法近代相傳稍已成藝鄧蔍縈魏后之廷武而猶質種馬入丹陽之寺雄而未巧聊以餘暇復撰斯法搜採抑揚斟酌煩簡至春亭落景秋皋晚静嚴霜盡降密雲初晴纎驪沃若天馬半漢盼金精而轉態交流汗血愛連錢而息影不畏衣香雕衢與白刅同暉翠眊與紅塵俱動足使武夫憤氣觀者衝冠巴童留玩不待輕舟之楫越女踟蹰無假如皋之箭三日曲水詩序竊以周成洛邑自流水以禊除晉集華林同文軌而髙宴莫不禮具義舉㳫矩重䂓昭動神明雍熈鍾石者也皇太子生知上徳英明在躬智湛靈珠辨均河注騰茂實於三善振嘉聲於八區是節也上已屬辰餘萌達壤倉庚應律女夷司候爾乃分階樹羽疏泉汎爵蘭觴沿泝蕙肴来徃賓儀式序盛徳有容吹發孫枝聲流嶰谷舞艷七盤歌新六變遊雲駐綵仙鶴来儀都人野老雲集霧㑹結軫方衢飛軒照日八闗齋制序夫五宅易昏四流不汨業動心風情漂愛燄自非識達真空照靈珠於難曉神緣妙境蓄慈根於未化無以却此四魔登兹十善今列筵肅静髙宇閒邃香吐六銖烟浮五色目對金容耳餐玉韻無容使情緣異染形不肅恭類倚於鴛宫同力於羊角宜制此心虵祛斯醉象立制如左咸勉聴思謹條八闗齋制如左睡眠籌至不覺罰禮二十拜擎香鑪聴經三契一出不請刺罰禮十拜二出過三契經不還罰禮十拜三鄰座睡眠維那至而不語者罰禮十拜四鄰座睡眠私相容隠不語維那者罰禮十拜五維那不勤聴察有犯制者不即糺舉為衆座所發覺者維那罰禮二十拜擎香鑪聴經三契六白黒維那更相糺察若有阿隠罰禮二十拜七聴經契終有不唱讃者罰禮十拜八請刺無次第罰禮十拜九請刺白黒刺有誤者罰禮十拜十自序有梁正士蘭陵蕭世纉立身行已終始如一風雨如晦雞鳴不已弗欺暗室豈沈三光數至於此命也如何漢魏六朝百三家集巻八十二上欽定四庫全書漢魏六朝百三家集巻八十二下梁簡文帝集目錄論勸醫論彈棊論七七勵頌大法頌有序𤣥圃園講頌有序南郊頌有序菩提樹頌并序馬寳頌有序銘大愛敬寺刹下銘有序行雨山銘明月山銘釋迦文佛像銘彌陁佛像銘維衛佛像銘式佛像銘迦葉佛像銘梁安寺釋迦文佛像銘杖錫銘書案銘鏡銘碑吳郡石像碑招真館碑善覺寺碑慈覺寺碑相宫寺碑神山寺碑吳興楚王神廟碑長沙宣武王北涼州廟碑連珠被幽連珠三首墓誌銘華陽陶先生墓誌銘徵君何子晢先生墓誌銘庶子王規墓誌銘戎昭將軍劉顯墓銘長沙宣武王碑銘安成蕃王墓銘中書令臨汝靈侯墓銘儀同徐勉墓銘太子舎人蕭特墓銘湘宫寺智蒨法師墓銘同泰寺故功德正智寂師墓銘宋姬寺慧念法師墓銘甘露鼓寺敬脱法師墓銘浄居寺法昻墓銘誄司徒始興忠武王誄哀辭大同哀辭文悔髙慢文六根懴文唱導文四月八日度人出家願文千佛願文祭文祭灰人文祭戰亡者文疏為諸寺檀越願疏為人造丈八夾紵金薄像疏為人作造寺疏漢魏六朝百三家集巻八十二目録下欽定四庫全書漢魏六朝百三家集巻八十二下明張溥輯梁簡文帝集論勸醫論勸醫曰天地之中惟人最靈人之所重莫過於命雖修短有分夭壽懸天然而寒暑反常嗜欲乖節故瘧寒痟暑致斃不同伐性爛腸摧年匪一拯斯之要實在良方故祗域醫王明於釋典如大師乃以醫王為號以如來能煩惱病祗能治四大乖為故亦有騷人之詠彭城秦國之稱和緩季梁之遇盧氏虢子之值越人爰至久視飛仙長生妙道猶變六一於金液改三七於銀丸蓄玉匣之秘研紫書之奥桃膠何是北斗靡遯其形金漿非逺明珠還恥其價能使業門之下鼓響獨傳雍祀之傍簫聲猶在周禮疾醫掌萬民之疾凡民之有病者分而治之歲終則各書其所治而入於醫師知其愈與不愈以為後法之戒也正如研精𤣥理考覈儒宗盡日清談終夜講習始學則負墟尚諛積功則為師乃著日就月將方稱碩學專經之後猶須劇談網羅愈廣鈎深理見厭飫不寤惟日不足又若為詩則多須見意或古或今或雅或俗皆須寓目詳其去取然後麗辭方吐逸韻乃生豈有秉筆不訊而能善詩塞兑不談而能善義揚子雲言讀賦千首則能為賦況醫之為道九部之􅐷甚精百藥之品難究察色辨聲其功甚秘秋辛夏苦幾微難識而比之術者未嘗稽合曾無討論多以少壯之時涉獵方疏畧知甘草為甜桂心為辣便是宴馭自足經方冺棄同庾敳之讀莊子異孔丘之好周易然而疾者求我又不能盡意攻治假使不能為地自可即為已益所以然者若無隔貴賤精加消息以前驗後自可解之日知所亡坐成妙術而又告以不能也治疾者衆必以孟浪酬塞悞人者多愛人者鮮是則日處百方月為千軸未嘗不輕其藥性任其死生浮華之功於何而得及其愛深親屬情切支肌患起膏肓痾興府俞雖欲盡其治功思無所出何以故然本不素習卒難改變故也胡麻鹿藿纔救頭痛之痾麥麴芎藭反止河魚之疾思不出位事局轅下欲求反死者於𤣥都揚已名於緑帙其可得乎術道困窮於斯實至誠當善思此意更興其美非直傳名於後亦是功徳甚深比夫脱一鴿於權衡活萬魚於池水不可同日而論焉彈棊論序觀夫模穹蒼而挺質寫博厚而成形峙五岳而摽竒停四海而為量協日月之數應律吕之期總𤣥黄之武畧校孫吳之應變語其用心壯哉之戲也爾乃觀壯士之出師望兵戎之式道上昇則摶翼穹天赴下則建瓴髙屋乘危則棧山航海歴險則束馬懸車完五憶霸國之勲全六想陳平之智八反均髙陽之數四角思漢后之歌飛瓦同晉侯之琴徘徊異鄴中之輦牽牛覺乘槎之來織女擬雲軿之去故古人或言之禮樂或比之仁讓或喻以修身或齊諸道徳良有以也七七勵藏名外臣體道好異遁跡埋影剗心人事任性於蓼水之側放心於自得之場情苞六合德貫九方巖栖谷餘絶際濠梁於是寂鏡公子聞而往説乃飛車翠葢翔駕絳螭丹旌風轉碧幔雪移映玉􅋴之綺靡照銀車之陸離經九嶠之夐阻歴五曲之巑危路入閬風道經通谷橋塗泱漭路林蕭肅石磴穹窿松關重複羊腸望斷邃路迂餘攀林税駕乃遇藏名之所居其居則蘚苔没砌幄葉斜林千峯沓頂萬仭懸深南危碧流北障芳林左縈重陸右背高岑烟霞罩日石澗籠隂聲諧百籟響弄千禽寂鏡公子曰葢聞智者不懷道没志遺俗埋名迷邦碎寳却粒辭榮今欲説子以黙語之術寧欲聞乎藏名曰僕雖幽栖逺紆名德寧忘潔已以受至言公子曰夫怡情託體實寄閒宫跨危樓於插漢挂日景於迎風玩靈華於仙掌度窈窕於飛虹金枝照曜玉壁玲瓏文忩洞右飛閣陵東桂柱通光雄梁亘日璧鏡鈕懸抽荷并出中宿綿延長廊周密青錢碧影金墀玉律冬閨温煦夏室含霜圖以珍怪畫以禎祥瓊茅秋蘤緑蕙春香植宜男於粉閣樹君子於椒房迴風烟於璇題垂珠璣於玉箱文魚水宿錦鳥雲翔乃登陟遊踐望逺通疎擢素藕於石鏡搴蔓草於康衢若荆山之琢玉似隨水之弄珠若斯宮之閒麗子能與我而共居外臣曰僕遊心蓬葦未暇斯處公子曰夫靚籹嚴服託體必嘉五絲擅美獨蠒稱華組帷粲綵緹服含葩丹墀聚葉縷檻飛花至如稷下縫掖泗上章甫雉緝霜鮮秦絲園縷鳳色龍分鴛文鵠聚琱紛瑤席綺飾瓊珮齊都滑石南海瑇瑁散似綴珠離如並繢蜘蛛弄巧越女調樞夏則桃笙竹席冬則青筦金鬚温麗瓊臺密華承寢當戸之縠大文之錦華葡萄之綺衾麗芬若之丹枕金蘇翠幄玉案象牀子能從我樂此芬芳外臣曰帶索披裘自得山性雕章麗服未敢攸同公子曰五餁調神三芝輔性用康仁壽以𢎞貞正乃使有伊之徒調嘗鼎味九州珍雜八方豐貴名廉天地之聲殽竭山海之味蟬鳴秋稻燕頷玉精離紅之膾勺藥之羮蒙山擅重灌水傳聲桂蠧石瓊龍胎鳳肺四膳八珍五肉七菜纍似穀雜切均鮮繪色若紫蘭紛如紅綷若乃越梅變實楚醴方添陳晨鳬之美味薦雋鷰之肥甜洗以三危之露水調以大夏之香鹽霜薤沸烈露葵繁舒芳菰之菜白霜之茹澄瓊漿之素色雜金筍之甘葅素醥浮氣酃醪凝清獻三爵之踰雅等千日之芳醴酌玉斗之英麗照銀杯之輕蟻此亦天下之美味子能從我而享之乎外臣曰藜藿可膳薇蕨湛飱五味口爽寧假玉盤公子曰若夫釣臺之樂葛天之歌飛七盤之玅節動六變之清和緑綺麗琴丹山寳瑟鏤器倕雕孤枝伶律奏白雪之楚緩陳亭蓆之吳疾躍鳥追飛潛魚伴出將使漸離擊筑雍門鼓琴鳴繞梁之妙響發愁睂之清音至如五陵金穴六郡豪家表流歌於東夏出秘舞於京華金鈿設翠步搖藏花遥同暮雨逼似朝霞髮鬢如㸃纎腰成削玉齒笑容紅妝綽約疾趨巧步霧袖芬披舒蛾眉之窈窕委弱骨之逶迤載金翠之婉嬋珥瑤璫之陸離芬芳於梧春之苑灼爍於長州之中于時斜光西委薄霧舒紅隋珠照影羅衣從風觀者方堤覩者盈淇令二燕之綴翼使八鶴之増悲明君為之斂泣西施為之解眉於是蘭閨寂晩曲韻相和對輕風之落景望明月以清歌歌曰酣醑半兮樂既陳長歌促節綺羅人拂鏡弄影情未極迴簪轉笑思自親此亦聲音之盡妙子能從我而聽之乎外臣曰淫聲亂耳未足入聽方追山壑永弄林泉公子曰夫心遊百氏理奥六經樞機性道隂陽窅㝠昭玉牒於年史覽石記而照情若夫鄒枚上客揚馬俊人揮金入趙易服歸秦賣舌彈劍買義追仁商𣙜萬古弋釣陶甄池中水黑席上稱珍判二氣之氛氲辨六爻之終始鳥變龍工鳳書雲紀辭𢎞八索辨崇三耳至如范雎折脇豫讓拉齒禮竭中心報深國士碎玉爭城藏圖解劒見碣石之金堤望楚都之揚塹美陳平之反間揖子房之智謀想秦君之傳器仁漢后之解裘此亦天下之奥籍得性之林圃子能同覽悦目以齊此心外臣於是色動清顏頓解髙意曰僕雖野陋頗悦帶經但負薪多疾未甘斯説公子曰夫氛氲構象純雜不同共工折柱雖播英風自古而然曾何足道但吹沙役寇抑自羲年吐霧藏妖聞之堯日至於今者昌運天啓握厯寳年風猷駕層漢道德漏重泉至如𤣥蹄外境紫舌頑人悖而無禮不沬皇仁於是騰三泉之窅漫載五旗之飄揚引玉車於西隴鳴金鼓於北邙拭龍泉之雄劍瑩魏國之寳刀銛踰巨闕利擬豪曹至如牽鈎壯氣斗膽豪心縁腰白玉帶珮黄金酬恩報死尅逺長岑騕褭白鷰耀躍青離五玉察善十相無遺連腰錦帶半足塵飛標威於鴈門之境振旅於龍突之鄉若乃驚沙絶岸苦霧綿長秋河曉碧落蕙山黄紅顔素改𤣥鬢斑霜征夫抵掌而飲膳壯士憤氣而沸腸迴雲鳥之密陣背却月而相望旗纔轉而漂杵鋒未至而驂傷前鋒紛其易幟後騎決其沙囊何湯雪之能比豈拾塵之可方於是呼韓頓顙龜兹銜璧羊牽既袒熊山已積九截同文八極齊軌帝曰念功班茅賜履青紫如拾賞歸詔美此亦天下之壯績子能從我而效之乎外臣曰葛伯不祀雖聞湯誥野叟力弱未敢振衣公子曰堯舜垂拱煥彼前聞今惟聖厯萬代一君壁儀照氣玉井珠分德合天地道方華勲滄海碧徹黄河一作流黛文愛人育徳澤等春雲一作工宣尼茂典周姬禮容黄裳進士清襟俊童邦知改俗國化移風賣藥無藏名之老河泗無洗耳之翁徳星夜映慶雲晝色異草雙條靈禽比翼狐尾既九茅脊復三金船漾寳銀甕呈甘康歌壤笑悦禮樞談隆周謝徳盛漢知慙慈照無礙化湛靈覺散漓𢎞淳拯澆敦朴國被仁壽家欣教學三明鑒道六度𢎞風出塵照苦入㝠觀空善識無盡因性必通天不愛寳地無隠瑞百神受職三苗奉義石策紫泥繩金玉刺或託諷梁甫權卧徳而龍盤或織箔渭濱恥藏名而鳳跂於是露㸃飴蜜溜泓澄於玉掌雲垂五采覆旖旎於仙樓漾醴泉於浪井拂垂楊於御溝或聨七葉一姓五侯外臣於是觀色内動神貌外移忽正山巾而言曰葢聞幽居獨善見譏往聖儻不遺矇叟亦願順來命頌大法頌有序皇帝以湛然法身不捨本誓神力示現降應兹上龍顔日角參漏重瞳衡表連珠文為玉斗自納麓開基天地之徳已布封唐啓跡日月之照先明百揆之序方舜九河之導均禹尚𢎞事殷之禮且屈在田之則自五昴朝飛告赤文之瑞其雨七日受緑色之符神器有歸鼎運斯集焦門厭棄徳之君鮪水發白旄之陣然後受皇天之睠命當四海之樂推豈假祀蚩尤於沛庭託河冰於王霸於時鳳鳳裂序蒼蒼舛度乃選五石以補之坤軸傾斜積氷發坼乃緯九藪而正之陰兔兩重陽烏三足乃定王業以暉之攝提乖方孟陬失紀乃置清臺而辨之維冠冕於已頽綴珩珮於既毁自憑玉几握天鏡履璿璣而端拱居巖廊而淵黙於今三十有二載也是以天徳一於上地數二於下復朗參辰不易日月兩曜如合璧五精如連珠禋宗類昊䖍丘禮澤敬行五祀功被百神川嶽呈祥風烟効祉青雲干吕黄氣出翼聽隃山之威鳳製大夏之貞筠陽管叶春雌鍾應律上林之課匪疎相府之占無謬奏六英於若水張咸池於洞庭秉翟動和天之樂建華宣易俗之奏協律有渢渢之序典樂致雍雍之節詩書乃陳緗縹斯備蒲輪受伏生之誦科斗薦魯宅之文蒸栗殺青玉牒石記填委廣内暉煥麒麟置台命衮法河依嶽建職樹司區雲祥火髙山容與赤黻邐迤色麗文翬章研織鳥諫鼓髙懸芻言不棄肺石通惋書謗橋板草名指佞便辟去朝獸稱觸罪姦回放黜是以龍翔鳳集河溓海夷露下若飴泉浮如醴桂薪不斧而丹甑自熟玉臯詎率而銀甕斯滿河光似羃樹彩成車氛氲四照暉麗五色神明磊硌徵祥布濩金鱗鐵面貢碧砮之賝航海梯山奉白環之使戴日戴斗靡不來王太平太蒙無思不服方叔召虎之臣均鼙應鼓之將秉龍虎之秘韜握朱𤣥之異畧受賑於廟堂之上揚威於關塞之下出玉門而直指度金城而奏策蕩雜種之殘妖匡中原之塗炭北臨地脈西出天渠昆夷罷患夙沙自服擭犬戎之鹿懸密須之鼓藁街有受纓之虜詔水觀受降之首四表無塵六合共貫皇徳隆矣太平之風浹乎無外矣天子内韜無生之至慧外應體乾之𢎞跡將欲改權教示實道遣方便之説導化城之迷乃端扆神居吁而言曰若夫𦕈夢華胥怡然姑射服齊宫於𤣥扈想至治於汾陽輕九鼎於褰裳視萬乘如脱屣斯葢示至公之要道未臻於出世也至於藏金玉於川岫棄琴瑟乎大壑卑宫菲食茨堂土階彤車非巧鹿裘靡飾斯葢示物以儉亦未階於出世也解網放禽穿泉掩胔起泣辜之澤行扇暍之慈推溝之念有如不足納隍之心無忘宿寤葢所以示物以為仁亦未階乎出世也紫府青丘陘山漳水敦河上之道文悦岐伯之章句甘泉啓太乙之壇嵩山置奉高之邑碣石刻羨門之誓不期作交門之歌斯葢止愛久齡事在諸已篤而為論彌有未𢎞雖獲巃嵸之禪終墮長生之難徒階三清之樂不袪八倒之境豈若燃智慧之炬照生死之闇出五隂之聚升六度之舟浮衆徳之海踐不生之岸於是莊嚴國界建立道場廣行利益開闡佛事驅彼衆生同濟仁壽引兹具縛俱入大乘九有傾心十方草靡如慿津濟咸賴歸依曄乎若朝日之聞衆華霈乎若農夫之遇膏雨功徳之翼已圓智慧之門必備以為般若經者方等大法峻極靡際深邃無底籠萬善乎無相兆九垓而無邊譬猶枝川𣲖别入大海而同味衆芳雜彩到須彌而一色空空不著如如俱㑹不合不散無去無來種覺可生允兹佛母羣典弗逮是號經王乃欲震一音雨法雨示五眼引重昬昭𤾉紀歲𤣥枵次星夾鍾應乎仲春甲申在乎吉日將幸同泰大轉法輪兹寺者我皇之所建立改大理之署成伽藍之所化鐵繩為金沼變鐵網為香城照神光於熱沙起清涼於炎火千櫨嶻櫱百栱穹窿紅壁𤣥梁華榱玉砌三階齊列四注周流上玉翼而捫天飛銀楹而蔽景虹拖蜿垂承甍繞􅀈蓮抽井倒冒宇臨忩彤彤寳墖既等法華之座峩峩長表更同意樂之國下鑿白銀之塹傍暉金薄之甎髙門洞啓不因銅馬之飾寳殿霞開無假鳳皇之瑞金輪燭日妙臨淄之地下層臺累駕邁宛委之空飛夏宇凝霜温室含暖雕樓之内滴動而響生洞扉之裏鷦歸而氣激幢號摩尼旛懸金縷盤徑十丈鈴圍四斛舒七寳之交枝流八功之淨水地芝候月天華逆風法鼓夜鳴聲中聞法瓊枝旦動葉裏成音妙徳陽之宫麗未央之閫故銅櫩三丈追嗤井幹玉樓十二遥恥神仙譬彼清涼之臺同符蘭臺之寺忉利照園之東帝釋天城之北故以辛壬癸甲綿蠻霮䨴吁哉其不可狀鏘鏘旰旰瓌譎雜錯邈乎其不可名於是璧日揚精景雲麗色薰風徐動淵露微垂後距屯威前茆警列武較星連鴻鐘吐響運天官之法駕啓天路之威神百靈扶持千乘雷動六虬齊軫七斗垂暉雲罕乘空勾陳翼駕超光躡景日被天迴金葢玉轝豹服鼉鼓纎驪沃若天馬半漢緑弓黄弩象飾魚文佽飛案節不勞斬蛟之劍虎賁弢羽豈假鳴烏之射湛湛奕奕轔轔赫赫出乎大通之門天子降雕輦之貴行接足之禮頂拜金山歸依月面如聞萬歲之聲若觀六變之動於是乃披如來之衣登獅子之座均百慮之紛總愍三請之慇懃啓真慧之深宗明度彼之𢎞教二諦現空有之津二智包權實之底大乘豁其靡礙道心究其歸涯因果之攝不運而行真俗莫求弗動斯到不以二法㑹乎中道盡佛淵海入佛法藏極修妒之妙典研龍宫之秘法宣娑婆之奥㫖闡衆聖之微言正水既沾邪難自息慧日普照毒霜並消除黑闇於四生遣無明於三界巍巍乎若彌樓之在巨海穆穆乎譬衆星之繞圓月於時天龍八部側塞空界積衣成座散華至膝三千化穢土之質火宅有離苦之期惡道蒙休泥犂普息詵詵學侣濟濟名僧皆樂説如辯才智慧如身子踰乎青目黑齒髙彼廣膝赤髭咸符瀉瓶之思竝沾染氎之施如金復冶似玉更雕聞所未聞得未曾得鬱搖動色請益無倦百司俱列簪履相趨豐豹焜煌華綬苒蒻謂舍衛之集大林之講無以過也將令一一佛性逢了因而俱出一一佛土咸遣二而除三比夫歌南風尚黄老臨辟雍講孔宅么麽安足而語哉距於三月甲辰法席圓滿如來放大光明現希有事雄雄吐色珠火非儔曈曈上映丹紫競發榮河恥其祥潤汾隂陋其暉影掩入殿之紫雲奪鴻門之妙氣昔法華初唱毫照普林般若聿宣通身盡笑王城之瑞千載更逢豈非聖主同諸佛身降兹妙相等諸佛力若符契焉猶秉淵黙之謙虚𢎞懔焉之至誡為而不宰推而勿居以百姓之心為心非關諸已荷負無倦攝受四生皇太子臣綱視膳東廂親承大法以為西巡東狩讚頌以興柴山望祀詠歌斯作況頂開而受露鞠躬而聞道敢述盛徳之形容以為頌曰玉牒悠夐青史綿長道沿五勝風殊百王商丘命瑱姬水開璜河澄待聖海謐期皇方天譬地功歸有梁垂拱南面克已巖廊權輿教義製造衣裳九韶革響六樂改張儀鳳婉婉擊石鏘鏘廣修璧水洞啓膠庠輕軺徵聘旌帛搜揚蘭臺且富廣内斯藏芸香馥蘭緑字摛章文功既被武跡斯彰題雕臆鏤舌紫支黄南街請質北闕來王飛旌集翰勒跡書狼銀車引附黑節招荒文同海截化普龍鄉西踰月窟東漸扶桑卑宫類禹解網如湯衢室納異明臺引良善旌弗巻諫鼓其鏜萬符集祉百神啓祥黑丹吐潤朱草舒芳珠懷鏡像星含喜光液池下鶴髙梧集凰赤熊旦繞素雉朝翔觀玉伯友訪道西王遊經建木巡指盛唐終非運出豈曰津梁我有無礙共向圓常玉鑾徐動金輪曉莊紫虬翼􅋴緑驥騰驤虎文駐蹕龍驂啓行闌干玉馬照曜天狼𤣥旄映日翠鳳晞暘前飛格澤後擁陸梁風移霆掃參差焜煌峩峩寳座郁郁名香法徒學侣塵沙堵牆慈雲吐澤法雨垂涼三密不限四辯難量猶兹海寳譬彼山王慧流總被藥木開芒佛日出世同遣惑霜帝釋歌詠幽祗讚揚空華競下天琴自張山含影色地入毫光非烟繞氣陸藕開房澤普三界恩均八方巍巍堂堂為舟為航伊臣稽首萬壽無疆𤣥圃園講頌并序竊以寳山峻極駘足未窺慧海遥波輕舟詎泛故以探沙亂妙類杵迷形百代同昏千年誰啓皇上託應金輪均符玉鏡低矜苦習續照慈燈鶴樹還春龍泉更曉𤣥水三祥丹陵瀉電功韜火宅徳覆雲衢智慧之光猶初日照忍辱之力如明月珠天成地平遐肅邇睦澤漏無底化行靡外滄河鏡渌碧海調風停瑞氣於三辰汎祥煙於五節鱗羽被解羅之澤黎元沐仁壽之慈於是正化潛通法輪常轉類空境之傳虚猶懸河之瀉潤儲君徳彰妙象體睿春瓊視膳閒晨遊心法犍溺管摛章既㛹娟錦縟清談論辯亦參差玉照夏啓恧徳周頌慙風乃於𤣥圃園栖聚息心之英並命陳徐之士摳談永日講道終朝賓從無聲芳香動氣七辯懸流雙因俱啓情遊彼岸理愜祗園靈塔將涌天花乍落于時藏秋仲節麗景妍晨氣冷金扉霜浮玉管兹園邃密獨華勝地畫堂玉砌碧水銀沙鳥頡頏於瓊音樹葳蕤於妙葉液水穿流蓬山寫狀風生月殿日照槐煙綱叨藉殊寵陪奉塵末預入寳樓竊窺妙簡鳧興藻抃獨瑩心靈敢作頌曰皇儀就日帝道昌雲化隆垂拱徳曼鴻芬機乘八解道照三墳巍巍蕩蕩萬代一君其一重離照景玉潤舒華七淨標美三善稱嘉降兹法雨普洽生芽漣漪義水照曜文華其二芳園靉靆天宫類寳析論㝠空𤣥機入道密宇浮清重閣相藻日暎金雲風摇銀草其三肩隨接武握寳靈珠皆抽四照並掞九衢顧惟多缺徒奉瑛瑜終如燕石更似齊竽其四南郊頌有序臣聞惟天為大聖人敬其徳知幾其神聖人契其道故龍官弱言之后合揆於蒼昊鳥紀垂衣之君昭格於上帝莫不巍巍乎穆穆乎渙汗於緑篇氛氲於丹册者矣我梁皇帝之御天下也乘熛祗之盛曜即璧月之遐照等乾覆之燾養合坤載之靈長四三六五之意十堯九舜之明名與功偕業將時並自撥亂反正伐罪弔民馮玉几握金鏡君臨萬國於今二十有二載也緯天維理地軸移澆風於末俗反淳正於區中化不言而先顯教不嚴而已肅流樂復雅遠符雲韶之世墜禮還章非因忠信之薄九垓同軌四海無波儲明變照儀天作兩三衮成作叶化台光麴糵王風鹽梅帝載塵清世宴蒼兕無用其武功運謐時平鵷鷺咸修其文徳桃林散甲華山弢刃玉門罷候紫塞沈鋒屠羊釣壑之士厭洗耳而襲簪佩版築藏巖之逸去燥穀而紆珩組異人俊乂既間出而在官世鏡河仙亦雝容而廊廟蹇蹇同於多士諤諤比乎得人五典三墨既葳蕤於璧水九流八索亦繽紛於石渠畫一之政萬代表於時和三章之律百姓沐於仁壽於是龍光之地日浴之鄉紫舌黄支頭飛鼻飲自西自南無思不服欵關質子稱臣内向珠樹素禽越火枝之地銀甕邛杖踰沈羽之涘出赤野而連翩度𤣥沙之泱漭於是嘉祥被衆瑞登金人澤馬丹甑玉雞三角九尾四睂六足抽鋪地之九莖發端門之連理參差於郊藪布濩於宫闕府無虚月史弗能記周稱黄鳥之旗夏有𤣥珪之錫無以踰此嘉祥方兹㹅萃道洽世昌國殷民阜鄉知舜讓邑比堯封委粟西畝神絲被澤可謂我化若風民應如草我靜如鏡物動猶烟天子猶未明求衣日昃不勌撤膳匪躬詢輿訪道鑾旗徐動棄千里而弗乘寳瑟無虞捐百金而不服廣行四等被慈雨於枯根大闡三明驚法雷於羣夢曲成萬物去殺愛生幽弊之民與蒼雷而共悦否滯之義同谷風而開杼昆蟲得性跂蠢欣生三驅有緩前之禽九門無餒獸之藥至徳之事如此太平之風如彼乃以恭肅神祗理通孝敬江左以來爽塏未闢爰命將作揆日載營三靈叶響百工咸事宛如神造儼類仙居沖秘隠嶙跨千畝於晉日閒曠麗逺吞七里於漢年五達四通廓郊彌野南瞻重嶽北眺芒嶺東臨灞滻西望舊豐紆餘委蛇丘陵起伏澎湃嶤􅙣山川異態飛梁邃宇洞爥穴懸紫殿仙宫霞騫鳥翥霧映倒梁日光疎鈑玉桃巻葉銀樹抽芳百果千株三珠八柱朝葉與蜜露共鮮晩花與薰風俱落露禽乍聚望比翼之翺翔歸飛時宿聞同心之夜響故以熊熊灼灼炫兩明而仰七曜紛紛沐沐承五烟而帶三靈圓丘閒靜紫壇肅設五精之場千神之位八階𢎞麗四維博敞宛若千仭狀懸流之仙館煥如五彩同瑶山之帝壇石牒神昌之瑞方臻金縷飛光之徵永固是雕是琢鄙茅茨之為儉非珠非玉嗤甘泉之巳奢望昔方今獨髙千古沿襲異等質文斯中於是歲在單閼星次訾陬律中太簇日惟辛夘特有事於南郊甸師清野封人壝宫朱幕夕峙帷宫宿設曉漢斜隂挈壺升漏天子御玉輅動金根八驥揚衡雙龍翼葢雲䍐徐迴鳴鐃韻響風承豹尾日映鶡冠萬騎天行千乘雷動石鎧犀衣之士連七萃而雲屯珠旗日羽之兵立五營而星列鬱鬱阡阡震震填填充溢乎國都瀰漫於􅆵邑者也若乃迴輿降蹕薦禮帝儀揖太清秩羣望被大裘服山冕恭蒼璧之明祀穆靈壇之禋敬黍稷非馨明徳惟馨日曜彤精天澄翠色百僚師師九官濟濟千神叶福萬億均慶六典斯備三禮必該焚柴告成罔不欽若翠烟升籙同河濱之瑞雲丹燎燭天若帝鄉之美氣雲門麗舞咸池廣樂已叶九韶之曲復諧六列之奏金匏既動望蜿蟬之遊龍玉磬徐鳴觀參差之舞鳳袿轊駕肩士女填噎接袂為幃連裾猶堵鼓腹擊轅行歌舞忭然後紆玉輦而謝書生登靈臺而望雲物欽明美化跨萬古於兹日廣運愉樂表千載於當今方當巡云云之禮啓亭亭之業封天荅睠禮地徵靈南山之壽無極七百之基長固豈不懋哉豈不盛哉匪薄微臣謬與藩服馳心休禮秣馬之願無由徒罄褊辭清風之藻多愧敢敷庸理獻頌十章其辭曰元始道一渾徳氛氲遥哉邃古夐矣初分磅礴地載清朗天文大人覩物生民樹君其一蛇軀隆凖作樂垂衣皇圖炤灼帝篆葳蕤廓寥中代合聖與誰於爍我后命世天飛其二𤣥黙馭辯寂照秉真就雲握厯望日臨民謙光履徳義禮稱珍車書同軌天下歸仁其三期章孔備盛化𢎞道酌衢敬賓欽賢愛老變正是珍燭車非寳如海之深如日之杲其四肅恭明神逖聽前踵配天道尊迎陽義重𤣥酒陶匏燔柴雲聳跨舜論韶籠堯稱拱其五赫矣郊宫載惟靜謐肅肅禁闈隂隂仙室六戎列野八鸞照日架殿星羅重宫霧出其六蒲萄金橘靈壽木難素奈開暑貞檜陵寒山池壯麗階閤彤丹葉垂疉雨花落重巒其七康哉盛徳美矣世豐三辰炳燿七政永隆五方來洎四隩兹通懸繩度笮駕鹿追風其八既敷懋化復覩瑞滋金車出野玉露霑墀紫槩神草華平瑞芝長愉汪濊永固雍熈其九照天漏涘遠肅邇睦惠靡齊民恩彌比屋式光惇史踰斯郁郁皇哉康哉同兹景福其十菩提樹頌并序竊以因縁假有衆生之滯根法本不然至人之妙理是以三界六趣遶業障而自迷八解十智導歸宗而虚豁是以能仁大師隨縁布道愍燄宅之既焚傷欲流之永騖託白淨之宫照黄金之色居兹三惑示畫篋之非真出彼四門驚浮雲之易滅於是佛日啓法雷震設漸教降權迹三寳現世一道知歸大接羣蒼救兹未度法雨法水之潤等世界於無邊智燈智炬之光同虚空於莫限物因難量化縁將息林開白樹日映青枝悲哉六識沈淪八苦不有大聖誰拯慧橋皇帝體乾元之叡徳合天地之純誠照玉鏡之神握太平之運吞虞孕夏罩漢籠周御六氣而子蒼生扇二儀而布亭毒緯樂經禮偃武修文秋荼不設廢九律之嚴科春雨愛生解三驅之密網固以咸池之靈自失汾水之徳知慙少陽懋善於元真蕃臣燮和於槐衮八凱三座九棘四科之士内宣王事運策横行專城推轂之將外守封疆一同文軌萬方共貫穿胸鏤臆之酋短身長臂之師南越鑠石北極天沙東邁日枝西踰月紀莫不梯峰挂逈越繩度之山航海跨深汎浮毛之浪奉方入貢進忠請職獻同心之鳥貢比肩之獸爾乃嘉祥競發寳瑞咸委靈芝潏露月萃郊園義鳳仁虎日聞郡國如珠如璧既照燭於中畿若雲非雲亦徘徊於宫雉於是驅黎民於仁壽濟動植於幽隍歲樂民殷家給户足斑白不提挈童稚有謳歌從善如流應風猶草開農務本鑄刃銷鋒紅粒盈箱青蚨委貫上照天下漏泉天既成矣地既平矣天子乃均一子愍四先示正行之因標出要之路廣設道場大𢎞妙法湼槃寳棹接惑衆於背流慈悲光明照羣迷於未曉法輪遍乎大千清涼被於小葉故天人舞鳳去照園而讚善菩薩飛象越香土而來儀五百寳葢騰光自合十千纓絡縣空下墜龕室莊嚴國界殊特製三時之殿聳四柱之臺雖漢后望神之宫軒轅待仙之觀曽何足擬髣髴寳雲儀形等覺於是想成道之初建菩提之樹四海呈珍百工薦巧雕金鏤碧綴鏡懸珠製似雪山形同飛葢四布垂隂五面益物名髙滿月徳踰普覆並豔千光之樹連英五色之華璧日垂彩玉蔕生烟微風徐動寳枝成樂儼然妙色䕃此曲枝顯若金山尊如聚月信女百味之初諸天四鉢之狀散漫祥草連翩青雀伏吐電之魔却擔山之鬼竒姿瓌質不可勝言此實生善之妙縁進行之深福當今盛美曩代未聞方應照徳不窮懸諸日月巍巍永樂萬萬斯年敢作頌曰綿史載觀靈篇眇鏡寳册葳㽔帝圖掩映鳥紀稱祥龍書表慶九州布徳五絃作詠蒸哉至矣有梁啓聖功覆終古業髙受命金輪降道玉衡齊政無思不服有徳斯盛一乘運出五眼清淨禀識康歌昆蟲得性舜厨靈蓮堯庭神莢豈如道樹覆潤𢎞浹靡密垂光芬芳委疊時動百華乍開千葉現彼法身圖兹瑞牒海度六舟城安四攝惠澤既播淳風普叶休明智鏡清朗法泉百神嗟仰千佛稱傳榮光動照玉燭調年菩提永立波若長宣穆穆明后萬壽如天馬寳頌有序武帝幸同泰寺捨身公卿奉贖還宫幸德陽堂宴羣臣設絲竹樂是月神馬出太子獻頌按轉輪王時自然生馬寳王騎出宫門飛行遶四海即日還宫頌稱馬寳指此也皇帝應百姓之心副四海之願復履玉衡還臨億兆天地交泰日月貞明至理維新隆平方始遐邇壹體中外禔福含生欣欣若耘耰之逢夏雨懷情坎坎譬草木之值春風帝王之道超邁開闢睿聖之功殫歴邃古軒羲不足鑿枘堯舜不足憲章至哉大哉無得而稱也五月丁酉朔絲竹㑹于徳陽之堂于時日進内宫星次鶉首仲夏之晷稍極陽城之圭蕤賓之鐘初應潁川之律縉雲旦巻南風晩扇惠氣入帷清隂周宇玉輿雲罕照日充庭羽林中權分階列校簪笏成行貂纓在席昭天之樂金石鏗鏘報地之禮威儀肅省詔以馬寳示羣臣大僕効官趣馬掌贊三令五申丞聨事舉八麗四圍給役相趨暉煜金鑣陸離寶勒天地無疆之德永星致逺之功鸞眄善鳴龍儀美稱沸毅權竒之威趨攄抑揚之態足轉驚電眼流含燭霧噴紛霏流沫飄灑數千為壽豈待原蠶之禁萬里一息不藉杜衡之草王良不能控其衡策伯樂不能辨其文機方知總轡崑岑周非吾馭張樂大野夏有慙徳豈止沈河用璧獨有緑文之稱盛徳在木偏受蒼龍之名至於干將寳劍遙服晉鄭之軍蓮花烏玉騰威大海之際況乎馬寶義實踰之方當夙沙自歸滑橋屈膝欵關入塞偃武修文去病無出師之勞充國罷議邊之畧五律成珍九河如鏡臣謹按瑞應經彌勒成佛經中阿含經覽愚經並稱第三之馬者三千歲華子云堯漢皆得馬者堯漢皆火徳正斗南方乘徳而至也豈非聖徳汪濊皇風洋溢研機洞元備禮達義是以天不愛道白馬嘶風王澤効祥朱鬛降祉比夫圓蹄方足躑躅在郊風嘯電奔聲遨處囿五彩依樹三雀登巢安髣髴於當今弗擬議於休應百辟卿士咸稱萬歲伊臣不佞結慶雲霄親承詔㫖預觀寶瑞手舞足蹈贊揚不足宴禮斯畢退而作頌其辭曰帝廣運徳欽明儀郊升道形聲徳為軌仁作經璇璣正太階平割五禮和六英開四攝行八政轉輪皇飛行聖愍含識資惠命引蒼生歸法性菩提真般若淨七寳均萬邦寜逖惇史觀陳詩域中大惟聖期聞𤣥妙復孝慈解流澤隨因時刑已措績咸熈三農盛九穀滋萬祗悦八神怡律有節厯得天景星曜慶雲連珠為月醴為泉民何幸值皇年乾道應坤馬來度玉關升玉臺鏤錫煥鸞鑣迴槃雲轉堞塵開千天駟百龍媒永伏皁掃騊駼秣瑤粟委芳芻九夷欵四表清甿胥樂輿頌興銘大愛敬寺刹下銘有序夫波若真空導羣生於假域湼槃有岸引未度於無邊應此十千現兹權實隨方攝受孰能𢎞濟皇帝照盡神原心凝寂境深慈降跡下荅蚳蝝握鏡斷鼇經綸世阻故能天地貞觀日月重光業曠四𢎞功侔十力慧雲旦聚浸澤灑於遐外法炬夜明揚光燭於梵頂因心孝愛道契神明昭事誠享曰隆哀敬金車答瑞追徳慶於虞年甘露登祀比嘉祥於漢日既而理局遙圖事稽終典思所以功超域外道邁寰中廣樹大縁增隆勝善事等淨名齊方便於圓極跡均妙掌襲兩寶於㝠因乃于鍾山竹澗奉為皇考太祖文皇帝造大愛敬寺焉惟兹神岳勢負龍形均太華之四成狀彭門之雙起曲澗推移激水精之浪清風窈蕩散雲母之竹顯帶皇邑標地徳之慶雲彌望帝躔矚神居之敞麗昔鴈泉之願真如所隲鷲形之嶽大聖攸居創此伽藍同符往跡以普通三年歲次壬寅二月癸亥朔八月庚午建七層靈塔百旬既聳千龕乃設漸山啓基踰於禁􅀢國士金刹長表邁於意樂世界珠幡轉曜寳鈴韻響聞聲者入道見形者除累仙衣梵帶去雁塔而來遊天香風笙辭鶴城而下集靈祗叶贊有識歸依四將五龍翹勤翼衛八臂三目頂帶䕶持雖復劫盡恒沙衣消巨石儼如常住妙相長存作銘曰朕哉睿聖至矣炎精功昭鳳紀徳契雲名㝠符七覺爰極四生儀形懋典道駿有聲皇心閔睇理篤天誠八萬神搆二四雲并懸梁浮柱沓起飛楹日輪下葢承露上擎玉函藴色珠髮韜明花窟炎聚石影光輕天下欽仰幽顯贊成法舟斯濟惠海方清淨界無毁金地永貞行雨山銘巖畔途遠阿曲路深猶云息馭尚且抽琴兹峯獨擅嶔﨑千變却繞畫房前臨寶殿玉岫開華紫水迴斜溪間聚葉澗裏縈沙月映成水人來當花藤結如帷磧起成基芸香馥徑石鏡臨墀明月山銘迢遞峰長威紆嶽聚既正雲門兼同天柱非競小山寜論大庾豈學土龍詎須石鼓緅色斜臨霞文横豎釋迦文佛像銘至矣調御行備智周滿月為面青蓮在眸彌陁佛像銘玉蓮水開銀花樹落惟聖降神拯彼沈漠維衛佛像銘灼灼金容巍巍滿月永被人天常留花窟式佛像銘影生千葉花成四柱塔象單留龕童雙舞迦葉佛像銘慧雨自垂仁風永扇照曜白毫半容月面惡因有滅善燈無變心珠可瑩智流方普永變身田長無沙鹵梁安寺釋迦文佛像銘帝為知仰皆規面象敬模螺髮式圖輪掌信根有五覺枝云七仰福靈祗上生兜率杖錫銘妙節嘉光遊聖振灼排空霧轉騰雲鳳躍永異玉神長踰金錯書案銘刻香鏤彩纎銀巻足照色黄金迴花青玉漆華映紫畫製舒緑性廣知平交雕非曲厠質錦帷承芳綺縟敬客禮賢恭思儼束披古通今察姦理俗仁義可安忠貞自燭鑒矣勒銘知微敬朂鏡銘金精玉英氷輝沼清髙堂懸影仁壽摛聲雲開月見水淨珠明紗扇銘𤼵曜光風空霜照月碑吳郡石像碑葢聞軒后之圖載浮河洛秦王之璧更涌滄溟昭覃之洲乘清源而西泛蓬萊之岫原缺流而南徙況夫道由慈善應起靈覺是以無方之迹隨機示現無縁之力因物成感晉建興元年癸酉之嵗吳郡婁縣界淞江之下號曰滬瀆此處有居人以漁者為業掛此詹綸無甄小魪布斯九罭常待六鼇遥望海中若二人像朝視沈浮疑諸蜃氣夕復顯晦乍若潛火於是謂為海神即與巫祝同往祈候七盤圓鼓先奏盛唐之歌百味椒漿屢上東皇之曲遂乃風波駭吐光景晦明咸起渡河之悲竊有覆舟之懼相顧失色於斯而返又有受持黄老好尚神僊職在三洞身帶八景更竭丹欵復共奉迎尊像沈軀没而不見經歴旬日遐邇普聞吳縣華里朱膺清信士也獨謂大覺大慈將宏化迹乃沐浴清齋要請同志與東靈寺帛尼及胡伎數十人乘船至滬瀆口頂禮歸依歌唄贊徳于時微風送棹淑景浮波雲舒葢而未移浪開花而不噴雖舟子招招弗能逺騖而靈相峩峩漸來就浦仰覩神像嶷然雙泛非因鷁首詎假龍橋豈藉銀連寜須玉軸背各有題一名維衛一名迦葉於是時衆踊躍得未曽有復懼金僊之姿非凡所徙試就提捧豁爾勝舟指燕宫而西歸望葑門而一息道俗側塞人祗協慶膺家住近通𤣥寺迺孫權為乳母陳氏之所立也亦一邦之勝地胥山之神墖乃遷像於此寺武夫數百咸不能勝共怪曰朱膺帛尼二人之力而能捧持不覺為異今人工甚盛確乎不移此必精誠弗能致也乃復竭心同時稽顙然後乃動至自舟中故知據井夜飛實無以異石不能重有覺慿焉後有外國沙門釋法開來稱彼國衆聖所記云東方有二石像及阿育王塔若能恭往禮覲滅無量罪免離三塗禮已而去中大通四年嵗在壬子臨汝靈侯奉勑更造銅光二枚其一髙九尺其一高八尺五寸銅邁丹陽恥論劉向之術區選攻金無俟嵇康之鍛既鐫既鎪是磨是銑曄如光定湛似日輪亦當逺照三千普瞻色像遙覩十方俱聞説法豈止惜命小鳥欣入影中重罪衆生還逢愛日而已哉吳郡僧正慧法師深修五定淨持七支於三寶中盡力宏䕶立摩尼之勝殿製飛行之寶塔至於莊嚴妙色實有厥徵夫魯聖云亡尚追儀於有若楚臣殞世亦託似於優孟放勲之后更圖長樂之畫文命之君不闕稽命之禩或傳諸往牘或布在前司或贊述盈耳或壽宫虚置況逺追應身近規靈迹不銘不勒何以稱揚乃為銘曰巍巍天像堂堂最勝慧日獨圓無生永證愍此魚鈎傷兹螺孕乍動慈舟時延寶乘留住待縁獨有傳應傳應伊何寶兹靈像履氷晨遊凌濤夜上七衆有慿九垓咸仰照此真容開斯俗網千輪足起萬字胸書身横五分衣刻三銖嗟爾末俗心王所驅顙浮水沫命役馳駒宜宏希嚮必盡勤劬覩相塵滅聞聲惑祛湛然神跡長處全吳招真館碑夫東瀛淥水三變成田西嶽靈桃千年未子尚以星起牽牛部首迢遞律生甲子氣數杳㝠況復上遊玉清損之又損髙排金闕𤣥之又𤣥豈言象之能詮非時節之所辨海虞縣者則虞農都尉太康置其宰境有虞山越絶書云巫咸之所出也高巖鬱起帶青雲而作峯瀑水懸流雜天河而俱灑雖日門採藥之地楚望懷椒之歌湯反流沙之魂錦飾汾隂之鼎無以喻焉其峰則有石城石門虚峗自然不度句吳之馬神功挺起豈似岡陵之畫魏后氷城夜陣權息長安慈石浴鐵暫流較跡比期優劣斯逺道士沛郡張君諱道裕字𢎞真即漢朝天師陵十二代孫天監二年來至此岫栖遁十有餘載夜忽夢見聖祖云峰下之地面勢閒寂宜立館宇可以卜居裕師潘洪隠始寜四明山無何有人耳長髮短云從虞山招真治來言訖忽然不見潘馳信報君君因辭山舊居而以夢中所指峰下之地即以為治故號招真髙臺迥立有類玉臺之山長廊宛轉還如步廊之岫柱削芳桂豈俟開陽木飛材選海檀無勞豫章神拔黄庭司命之府有類玲瓏米陵赤石之觀同符𢎞敞逺望仲雍而髙墳蕭瑟旁臨齊女則衰壠蒼茫蘚尋千仞之木氣叶星晷華飛五香之草形圖宫室帷葉綵花巻舒蹊徑陽桃侯棗榮落巖崖樹息金烏簷依銀鳥鳳將九子應吹能歌鶴生七歲逐節成舞旭日晨臨同迎若華之色夕陽斜影俱成拂鏡之暉玉礎㣲潤應山雲於髙牗鳴籟徐響引和風於空谷方當專氣致柔入無為之境周行不殆窮混成之致茅子算歸輟轡無已魏姬宴罷留駕不還何止持節變淮南之金傳符蒔北鐘之稻明月蛟龍之騎驅之使鬬四銖七子之鏡引以成刀散季齋之羽起雄鳴之霧而已哉乃為銘曰玉龜二始金書八㑹道浹地心功浮天外故帝可小唯真能大徳起同塵善生塞兑物寳自然人符交泰掩暎緑蘿穹隆紫葢仙治之美此焉為最雄柱千步陽臺百丈水均下矚山踰髙掌野寂雲興禽繁山響升虹夕栖豐雷朝上元陽作石竹龍成杖書藏玉匣藥藴銀筒燒鉛雜鯉折桂和葱羽衣可服雲軿易通斧柯雖朽碑石無窮此篇載姑蘇志題曰招真治記治者本道書言太上下二十四治付張道陵布法於後嗣後盡立治於𤣥郡故稱治也按陳馬樞道覺論張裕起招真館梁簡文為製碑故今亦沿之曰招真館碑藝文類聚截其銘中數語稱梁簡文招真館銘其為簡文筆無疑姑蘇志訛為昭明今正之善覺寺碑葢聞在天成象倬彼雲漢在地成形嵩高惟嶽蒼蒼斡運靈槎猶且去來巖巖峻極巫咸可以升降穆貴嬪宿植達因已於恒沙佛所經受記莂有縁娑婆降跡斯土行邁英皇徳降華咐河南望浮雲之瑞新野表升天之祥光前絶後建兹福地乃於建康之太清里建善覺寺焉大通元年龍集已酉有令使立碑文未獲構譔居諸不息寒暑推移軒曜夙傾前星次掩歲在諏訾始得補綴何言之陋何事之隆竊等仲由空悲負粟之哽復異桓良終無維山之日永言纒纂獨咽丹心銘曰效彼毗城建斯福舍四柱浮懸九城靈架重欒交峙迴廊遙迓掩映花臺崔嵬蘭榭陽燧暉朝青蓮開夜慈覺寺碑竊以易表含貞記稱厚載龍星啓曜璧月儀暉是以河外黄雲沙傍崩鹿故能發緯伊緒重闡劉系亦有觀津美於西漢扶風盛彼東京未若樊川之邦宛葉之境休祥茂祉獨繁前跡莊姬流譽之所烈后興業之地南陽稱其何氏新野猶曰鄧家逖彼遐蹤復履今慶貴嬪金聲早振淑範増徽才實母師行為女楷窮兹四徳洞彼六經温明内湛慈慧天發綱綴慶璇枝聨休紫漢幸得諐無負斧仕重束薪實以契濶言提綢繆善誘事具徙居義深則盼而叨恩作牧釁結幽祗一訣椒慈長違寳幄風枝弗靜陟屺何期秪奉儲訓謬兹刋撰道長業大遺範事隆嗟油素之可捐懼故老之難述相宫寺碑真人西滅羅漢東遊五明盛士並宣北門之教四姓小臣稍罷南宫之學超洙泗之濟濟比舍衛之洋洋是以髙簷三丈乃為祠神之舍連閣四周並非中官之宅雪山忍辱之草天宫陁樹之花四照芬吐五衢異色能令扶解説法果出妙衣鹿苑豈殊祗林何逺皇太子蕭統自昔蕃邸便結善縁雖銀藏葢寡金地多闕有慙四事久立五根泗川出鼎尚刻之罘之石岷峨作鎮猶銘劍壁之山矧伊福泉寜無鐫刻銘曰洛陽白馬帝釋天冠開基紫陌峻極雲端實惟爽塏栖心之地譬若淨土長為佛事銀鋪矅色玉礎金光塔如仙掌樓疑鳳皇珠生月魄鍾應秋霜鳥依交露幡承杏梁牕舒意蘂室度心香天琴夜下紺馬朝翔生滅可度離苦獲常相續有盡歸乎道場神山寺碑天地始終愆長不極劫數沙塵寂寥誰辯雖鐵界銅圍如影如約補石擎金隨生焰滅獨有鷲嶽靈境淨土不燒螺髻金質聲聞難覩故髮塔喜園流名天上耆山鵠苑布跡人中自非莊嚴妙土吉祥福地何以標兹淨域置此伽藍皇太子殿下幾圓上聖智周物外澄明離日照影春星長歌安勝表察書之獨見馳道迴車騖班輪而不絶銘曰關號天井山稱地雌碧雞金馬越瀆梁池懷靈藴徳孕寶含竒此亦僊岫英名逺摛昔有鷲窟不燒淨土邁彼髙蹤搆兹法宇引葉成帷即樹為柱石砌危横崖階斜豎吳興楚王神廟碑昔者武王詢於太公五神之禮正伊陟贊於巫咸三篇之義作抑又𤣥矩司於坎宫漢興北畤黄蛇感於通夢秦作西郊幽則鬼神其來巳尚楚王既𢎞兹釋教止獻車牛既舍黄駒安俟騂角掌擊無左滌之勞牧人止楅衡之務周房殷俎惟有𤣥澗芳芝玉斚瑤樽止陳丹柱清酌漸符不殺之教方行大士之心比夫黄樹赤光紫衣朱髮茂矣哉王制云山川神祗有不舉者為不敬太守元景仲稽諸古典於兹往烈永傳不朽式樹髙碑翠石勒文事偕神掌靈龜負字還擬洛書長沙宣武王北涼州廟碑黄曲之祀九井尚慙洙水之堂七壁猶在豈非徳含體氣禮降空桑蒸民仰其立功太上懷其貴徳公諱某蘭陵人皇帝之長兄也命世降靈峻極開著宗百川而成海倍萬俊而為英為南梁北秦二州刺史陽陵黑水改號難堪加以岳牧遷迴軍民徙散同髙闕以為塞象玉門而置關三尉寢謀六屯罷業功同疎勒之守備甚即墨之堅圍公臨危制變殷如敵國是以六角摧鋒兩賢釁鼓指撝則破勍敵叱咤而靜邊塵公徳應大賢照惟殆庶如鐘資叩似鐸發聲含朝陽於千仞散風行於萬頃神武所固士卒忘水火之難簞醪所驅小大一死生之志微管之風餘芳無絶人畏其神徳音不泯梁秦二州刺史宜封侯條刺舉漢陽親覩遺愛有表請立碑置廟天子許焉反宇飛風伏檻含日參差丹桂周流紫房躨跜刻獸下臨綱户菡萏荷華傍連屈屋庶使邊韶所立之石豈稱髙於陳郡袁逢所勒之字非獨擅於華陽乃為贊曰帝圖開道皇源配天功書緑字事燭青編天漢之陽黑水惟梁如仁永播流詠寜忘扶風髙碣召伯甘棠餘芳無泯望古可方構斯象室循兹洞房琉璃照户璧玉開堂秋條下葉春卉含芳九微夜火百味朝漿連珠被幽連珠三首吾聞道行則五福俱奏運閉則六極所鍾是以麟出而悲豈唯孔子途窮則慟寧比嗣宗吾聞言可覆也仁能育物是以欲輕其死有徳必昌兵踐於義無思不服吾聞有古富而今貧可稱多而賑寡是以度索樹下獨有衰神松柏橋南空餘白社墓誌銘華陽陶先生墓誌銘維大同二年龍集丙辰克明三月壬寅朔十二日癸丑巳時華陽洞陶先生蟬蜕于茅山朱陽館先生諱𢎞景字通明春秋八十有一屈伸如恒顔色不變有制贈以中散大夫諡曰貞白先生遣舍人主書監䕶喪事十四日已時窆于雷平之山若夫真以歸空為美道以無形為貴不知悦生大徳所以為生不知惡死谷神所以不死妙矣哉隠顯變化物莫能測既而岫開折石天墜玉棺銀書息簡流珠罷竈九節麗於空中千和焚于地下仙官有得朋之喜受學振臨谷之悲余昔在枌壤早逢圮上之術今簉元艮屢稟浮丘之教握留符而惻愴思化杖而酸辛乃為銘曰無名曰道不死為仙亦有元放兼稱稚川遁形解化自昔同然猗歟夫子受籙歸𤣥梨傳苑吏書因賈船虎車照景蜺拂凌煙餘花灼爍春澗潺湲鬱鬱茅嶺悠悠洞天三仙白鶴何時復旋徵君何子晢先生墓誌銘先生履玉燭之禎氣應大賢之一期實生而知機撫塵斯庶敬非習起孝乃因心聚徒教習學侣成羣與沛國劉瓛汝南周顒為友陸璉賀㻛之徒更道北面永明中王文憲儉受詔撰禮未竟而卒屬在司徒文宣王王以讓先生因廣加刋緝故以含文燕居説六典五恩之義或齊侯所不鎮孟嘉所未知皆折兹大物成此良教小人道長每諷考槃之詩君子道消便執天山之筮乃毁車挂冠拂衣東嶺始居若耶來從秦望今上經綸天地權輿鼎業始徵為軍謀祭酒實允文若之舉且光彥先之選又徵特進右光禄大夫髙尚其事確乎不拔𤣥纁徒往束帛虚歸而給白衣尚書禄固辭不受卒窆乎其山正衾在殯嗤鏤器與玉衣堯典入棺恥密章及書綬知與不知並懷惋愴咸以人亡素楷禮墜文章洙泗頹經扶風罷學關西疑聖之徳自此長淪髙松引風之氣於兹永息余昔在朱方亟枉翰跡欽風味道迄淹歲時既而位阻桂宫塗乖咫尺不獲擁經步至問春卿之痾徐輪三反入杜夷之舍痛祥雲之滅采悲列曜之晞暉追勒髙卿乃為銘曰文範髙世𤣥晏絶倫復有令徳逺之與均誰與均此嗚呼哲人第五肥遁餘軌尚遵司空開學其風不泯傳兹孝敬曰悌且仁氣髙瓊嶽心虚谷神括羽儒囿舟輿席珍既遊慧水兼引法輪談扇猶在鳴琴尚陳如何不愸徳素長淪寂寥巖穴荒凉渭濱橋曰隻雞徐稱酧素金欽夫子風期夙著蓄思含毫傳芳寫譽沈礎雖貞𤣥泉無曙庶子王規墓誌銘玉挺藍田珠潤隋水價重連城聲同垂棘偶應龍之籥影等威鳳之羽儀名理超於荀王博洽侔於終賈稍遷侍中佩玉璽於文昌珥金貂於武帳文雅與綺縠相宣逸氣並雲霞俱遠副君取敬杜夷時迴晉儲之駕追嗟徐幹亦降魏兩之書爰發睿辭為銘云爾七畧百家三藏九部成誦其心談天其口勝氣無儔高塵誰偶榮珪掩采靈劍摧鋒宋郊淪鼎洛水沈鐘𤣥扉不晝幽夜恒冬戎昭將軍劉顯墓銘繁弱挺質空桑吐聲分器見重播樂傳名誰其均之美有髦士禮著幼年業明壯齒厭飫典墳研精名理一見弗忘過目則記若訪賈逵如問伯始穎脱斯出學優而仕議獄既佐芸蘭乃握搏鳳池水推羊太學内參禁中外相藩岳斜光已迫殞彼西浮百川到海還逐東流營營返魄汎汎虚舟白馬向郊丹旐背鞏野埃興伏山雲輕重吕掩書墳揚歸𤣥冢爾其戒行途窮士壟弱葛方施叢柯日拱􅎬栁荑春禽寒斂氄長空常暗隂泉獨湧祔彼故塋流芬相踵長沙宣武王碑銘金表龍符緑地龜圖且稱瑞漢實曰開虞於昭帝緒蟬聨厥初有微𤣥水亦作司徒重擔偃蹇曲注逶迤重攄鳳翥桂揀蓮披文檀晚麗采節晨輝春藤絡户寒菊臨池惟馨惟徳無絶於斯安成蕃王墓銘許氏猶龍荀家鳴鶴豈如宗子分聨華萼對策雲臺觀書麟閣官美登朝文髙入洛得意琴書忘言丘壑中書令臨汝靈侯墓銘昔太祖時其惟宣武講道開天儀嵩作輔是曰邦茅籍規承矩如康嗣衛似禽居魯息轡巖隈塗窮夜臺靈檐永閴松路方開草茂故轍松挿新枚月明泉暗暑往寒來儀同徐勉墓銘朱弓表瑞寳劍攸歸長瀾斯注𤓰瓞含輝舉直斥偽校名責實朝有進賢野無遺逸違天即地歸幽去明空谷傳鼓哀風送鈴太子舍人蕭特墓銘威鳳五色朝陽千仞孫枝發響將雛流韻馥哉若蘭頌矣懷熊瑾既誕子恒乃歡𦙍銀鈎之巧重世遹雋況此臨池蟬輕露潤丹旐輕飛哀歌徐引壠水春帷山雲晩陣湘宫寺智蒨法師墓銘嗟爾名徳超然有暉五塵夙離三修允依戒珠靡缺忍鎧無違智燈含影慧駕馳騑若韜山金如苞海寶徳邁西河聲踰東道伊時傾葢于彼朱方不期而遇襄水之陽掩此方墳悠哉泉下鬱鬱翠微遼遼平野薪盡火滅歸真息假同泰寺故功徳正智寂師墓銘峰頹木朽波逝江潭山川若此人何以堪亦生亦滅如壑如舟千齡俱盡萬古誰留惟兹大士才敏學優幼捐蹈火早去吞鈎法雷能響懸河必詶辨才可匹妙徳難儔宋姬寺慧念法師墓銘電逝生危舟沈道滅石坼亡儒星開殞哲是曰人龍亦號僧象慧氣素昭英賢夙上善渡愛河能褰欲網如彼髙山法徒斯仰如彼澄波不測深廣甘露鼔寺敬脱法師墓銘岌岌縁假昬昬大夢六塵逺飛四流長控猗嗟大士慧舟法棟早擅人龍夙標威鳳善堂間構燈王布席辯河流水辭峰積石寂寥兩樹悠漫三泉神明何託暗石空傳淨居寺法昂墓銘篠簜含聳蘭蓀表質甘露已凝智泉斯溢頓轡中衢息棹修渚隟陋白駒藤縁黑鼠同志酸傷交朋哀楚誄司徒始興忠武王誄皇源地闡帝業天維於穆忠武光國之基爰自弱齡英明播越玉潤氷鮮山靜雲發帝曰爾諧僉議彼屬推轂兩江建旗三蜀將旋上國戀結四民三鱣表服二鹿隨輪方變正衮永範時規天弗報善哲人其萎響哀輓於北邙去承明而不入望參差之流影聽潺湲之雨泣哀辭大同哀辭大同字仁洽予之第十九子也生於仲秋殞於冬末悲夫潛慟結於心愁眉慘於外夕坐於是申旦當食以之不甘客有謂予曰死生常也夭壽命也陳蕃所憩之家久傳紀録之歲華歆所聞之語已定北陵之期上聖所以忘情賢者所以達節將何戚焉予對之曰觀其明眸豐下玉色和聲豈不登髫歲而擬觸藩及紈袴而知折李靈心摧於毫末慧識挫於趾步庶方悟於來途遂窮魂於短日豈不傷哉乃為辭曰含精鬱抑歎嗟何極云誰之悲悲予弱息實天道之偏頗觀賦命之殊舛彼神祭之靈長獲萬春之悠緬有舜華之照灼寄一朝之浮命始夢熊而非吉遂設弧而表慶驗天蘭之所受知地井之可映愛萱草之有徵欣赤茀之在詠信歡慰之未幾悼夭零之云及乃變樂而為悲遂改笑而成泣昔珠褓之交舒又金香之相襲藉綺茵於弱肌隠孩笑於羅幃今獨親於𤣥壤亦何痛其如之憶餘態而心楚想媚質而迴膓藥尚殘而染地衣猶襞而在牀巻金屏之四葉開銀圅之九羊忽徘徊而想像曾何時而不傷於是風景暮鍾氣嚴晩候葉蔌蔌而走階水戔戔而鳴漏月半鏡而開河雲羅柱而下岫燈發焰而吐花火含光而成就金鹿之恨涕沾衣金瓠之哀還掩扉猶兹紫山明玉碎譬彼西都芳草腓終無逐浪鳧船反何時復聞龍種歸文悔髙慢文弟子蕭綱又重至心歸依三寳竊聞禮稱弗傲表洙泗之遺文經云不慢驗踰闍之妙典故一遇恒神陵伽尚生餘習上賓天帝淮南猶有誤辭亦有才曰隠淪調惟髙俗猶足座痺晉君立前齊主況復道隆三學法兼五衆如過前殿似出北門而不密室致恭遺弓接足敢藉勝縁願起𢎞誓從今日始乃至菩提於諸出家悉表䖍敬方欲削除七慢折制六根賓頭下步庶無厥咎耆達棄車方思景慕幽顯大衆咸為證明六根懴文今日此衆誠心懴悔六根障業眼識無明易傾朱紫一隨浮染則千紀莫歸雖復天肉異根法慧殊美故因見前境隨事起惡今願捨此肉眸俱瞬佛眼如抉目王見淨名方丈之室多寳踴塔之瑞牟尼鷲嶽之光彌勒龍華之始常遊淨土永步天宫耳根闇鈍多種衆惡悦染絲歌聞勝法善音昏然欲睡聽鄭衛淫靡聳身側耳知勝善之事樂之者希淫靡之聲欣之者衆願捨此穢耳得彼天聰聞開塔關鑰之聲彈指謦咳之響諸佛所説悉皆總持香風淨土之聲寳樹鏗鏘之響於一念中怳然入悟鼻根過患彌復頑嚚耽染六蘭流連百和鬱金易著薝蔔難排雖復一薰一蕕叶性難遺空中海上彌不自覺至如雕鑪在彼翠霧霏烟識染相牽彌生織累所以蝍蛆甘帶自謂馨香烏鵶嗜䑕不疑穢惡今願捨此鼻根得彼天受振裳躧步跨旃檀之迥林提囊拭鉢捧香積之寳飯長離穢濁永保清升舌根障重染惡尤深毒刺爭興惡蛇競起既貪五黄六禽之㫖又甘九鼎八珍之味所以焚山破卵涸水枯鱗黿臛不斟有染指之過羊羮不及致入陣之苦雖復􅬪䐿鹿胃猶不稱甘鳳肺龍胎更云不美雖羅鼎俎未必皆甞在彼衆生於命已酷或復間朋亂友破俗傷真變紫奪朱反白為黑所以讒言三至曾母投杼端木一説越霸吳亡故知三寸之舌未易可掉駟馬既出於事難追願斷煩惑入清淨境既同阿難乞乳之譏又等淨名寂黙之致餐禪悦之六味服法喜之三徳形恭心到永趣菩提身根頑觸唯貪細軟質體塵礙不重戈矛莫不愛我輕他陵人傲物縱此裸蟲不羈醉象六塵四倒自此而生五葢十纒因斯而致所以象簟清潤遨遊於夏室重衾狐白温煦於冬房結駟廣厦動靜必安鷁首翠樓去來有託所以三業之過出自機關四大假成豈有真我願捨此畫瓶得彼金色淨寳珠之法飾煦瑠璃之慧體長歸五分永等十身意識攀縁其罪山積險同夢幻譬若猴猨懸鏡髙堂一念難淨走丸索上百慮先馳至如二十五有紛繞不息九十八使驚騖無已所以灰心滅智行拔于三乘風禪露飲道髙於六度今願斷此意根祛累斯盡心當恬泊洞照無生一切衆罪悉滅俗門三界異途歸之真域懴悔已竟誠心作禮唱導文夫十惡縁巨易惑心塗萬善力微難感靈性是以摩鉗赴火立志道場薩埵投身必之妙覺衆生積染流浪不歸苦海易沈慈波空蕩渇愛與生死共門無朋與結網同路各趣百非纒兹四苦人思戮力昭彼三明是以如來因機致化如大醫王隨病施藥當今皇化之基格天網地扇仁風於萬古改世季於百王覆載蒼生慈育黎首天涯海外奉道餐風抱嗉吹脣含仁飲徳民無賢不肖愛均一子衆等宜各克已丹誠澄心慊到奉為至尊敬禮娑婆世界釋迦文佛歡喜世界栴檀德尊水精刹土月電如來寶明世界山海慧佛奉願聖御與天地比隆慈明與日月齊照九有被康哉之澤八方延仁壽之恩玉燭之美日著遐方擊壤之歌遍聞天下敬由心起五體所以外恭情發於中六識所以單到故一善染心萬劫不朽百燈曠照千里通明憑法致安積善延慶今日幸遇兹訓誘豈得不罄竭心途奉為皇太子敬禮東方寶海南方燈明西方無量壽北方相徳奉願離明内映合璧外和玉振雲浮金聲海鏡日朝顔色四善流風既擅温文之徳實著監國之重蒼生飲徳有識餐仁燮和内化事炳周經讚徳含章訓髙惇史故以配正奉天表七教於仁徳宣風緝惠闡六服於温慈各宜攝心奉為貴嬪歸命敬禮五十三佛三十五尊當來賢劫千劫在百七十奉願月相與萬善同休金聲與四時並祐興七覺以炳照冏十智於當樂閨守奉仁宫儲欽徳暉同疊璧煥若崑瓊葢聞嵩高惟嶽作屏皇家宗子維城克固磐石所以戚均魯衛任等蕭曹三台正席坐而論道九棘勤王恪居連事宜各運心奉為臨川安成建安鄱陽始興豫章及南康廬陵湘東武陵諸王家國戚屬六司鼎貴歸命敬禮舍利形像菩提妙塔多寳踊現釋迦碎身奉願心鏡凝深身清岳峙克隆帝祉永茂皇枝衆各一心歸命三寳三界異術五道分逕天人植業各歸一果鬼神牽報事炳㝠途上善華果既乖正力五濁煩心彌多惱累雖復聰明正直三牲之祀未虧隂陽不測六根之滯猶染衆等宜各露誠逮為天龍八部䕶塔善王乃至修羅八臂摩醯三目盡為敬禮尊經正典清淨波若究竟湼槃法華㑹一之文淨名不二之説願一切善神永斷無明長遵正本臥處寳宫坐甘香積帝釋淵廣泛般若之舟淨居深沈駕牛車之美澤及三界明照四天大悲拔苦事炳前經𢎞慈與樂義髙名訓是以靈權降迹出没不同菩薩位懷顯晦多術無邊劇惱扇八苦於修途有縛纒情繞六趣於危道金鎖玉牀猶念解脱雕珠飾綺不及塗中至如飄颻熱風滄浪氷水暗室千重黒城百仭鐵輪碎骨銅柱焦腸傷出刀鋒横抽劍鍔如斯衆苦尤為險脆一息不追則萬劫永别刹那暫斷則千代長離相與共託閻浮泡生幻處危脆之質有險蜉蝣風電之馳誠難可駐況復三相併蹙二鼠攢危毒箭惡虵尤為可畏庶慿正法拔兹累染長享百福永斷六塵對至無彊唯佛可恃今為六道四生三途八難慈悲懇倒一心徧禮十住菩薩三行聲聞禮救世觀音獻葢寶積西方大勢東國妙音四辯淨名二土螺髻珠頂善宿彌勒文殊金剛藏解脱月棄陰葢常舉手十大弟子五百羅漢願囹圄空虚疾惱消息城中百縣方外千城凡在幽執一同寛蕩人協覆蛇俗化匡蟻類服鴆之不死同拔劍之無傷含生不縷轉死自温渭橋日飽翳桑無餓打塞三塗填碎地獄破魔兵衆壤生死軍閻羅發十善之心牛傍啓五戒之業如魚少水若鴈窮林一聽法音即捨穢質人運五體歸命三寳四月八日度人出家願文弟子蕭綱以今日建齋設㑹功德因縁歸依十方盡虚空界一切諸佛歸依十方盡虚空界一切尊法歸依十方盡虚空界一切聖僧竊聞湼槃經言身如畫水隨畫隨合是身不淨九孔常流凡夫愚人常行味著愚癡羅刹止住其中又如瑞應經言沙門之為道也捨家妻子捐棄愛欲斷絶六情守戒無為其清淨得一心者則萬邪滅矣一心之道謂之羅漢聲色不能染榮位不能屈難動如地以免憂苦故知出恩愛獄薄俗為難善來比丘其福深重弟子以此因縁今日度人出家願一切六道四生常離愛欲永拔無明根削遣闇惑心修習般若慧足踐輕輪之光口説懸珠之辯披忍辱鎧秉智慧刀乘菩薩車坐如來座結纒披解頂相光明戒因清白後報尊重所有果業皆悉勝出受持法藏為佛真子一切道行皆悉能行一切大誓不休不息仰願十方盡虚空界一切諸佛仰願十方盡虚空界一切尊法仰願十方盡虚空界一切聖僧咸加證明又仰願十方盡虚空界一切諸天仰願十方盡虚空界一切諸仙仰願十方盡虚空界一切聰明正直守䕶一切善神又願今日見前幽顯大衆咸加證明今日誓願使弟子蕭綱得如所願滿菩提願一切衆生皆悉隨從得如所願千佛願文葢聞九土區分四民殊俗昏波易染慧業難基故法身寂鏡有照斯感滌無明於欲海度蒼生於寶船或輕慈導捨薄笑牽悲曲豔口宣斜光頂入自鹿樹表光金河匿曜故像法衆生希向有形雖千聖異跡一智同塗弟子某甲久没迷波長流苦沭不生意樹未啓心燈而葢生一念敬造千佛雖復無上無為極相難辨非空非有妙智難觀而紺髮日光蓮眸月面庶可長表誠敬永寄心期祭文祭灰人文積注奄旬祭在灰人消兹獸炭焚此桂薪積如玉屑聚若遊塵庶人之風不拂獄吏之慢寧陳當令金光小史侍使玉童奏雲師於執法力水伯於天宫鑕星誅於電女貫索囚於雷公廓重氛於八極靜連絲於四空既曈曈於車葢又赫赫於飛盤且疑威於趙盾實望近於長安祭戰亡者文降夫既旋功臣又賞班荷元勲蘇逢漏網校尉霑榮屬國蒙奬獨念斷魂長畢灰壤膏原染刃委骨埋泉徒聞身没詎辨名傳疏為諸寺檀越願疏菩薩戒弟子蕭綱歸依十方盡虚空界一切諸佛歸依十方盡虚空界一切尊法歸依十方盡虚空界一切聖僧積習長夜輪轉覆灰末劫易危煩流難拯不樹兩門豈修二翼常恐虚蕉染惑永結駚河愛藤懸網長垂苦岸敢承三寳覺悟之力於幽顯前發𢎞誓願今願為武當山大平寺并此鎮望楚白塔同安習善延明頭陀上鳳林下鳳林廣嚴等寺皆盡形壽永為檀越雖七寳四事多謝往賢一念片言庶符般若方類不滅之燈終非起烟之蜜以此功徳仰福皇帝春宫家國内外咸同此善乃至天龍八部六道四生普皆蒙福為人造丈八夾紵金薄像疏竊以慧日潛影慈輪罷應業逐惱飄愛隨情熾徒愍衣珠抱名珍而弗悟𦕈歎葉金惑空言而啼止自非表兹勝業樹彼妙縁何以去此心堂移兹身窟故水精龍塔永愴恨於遺髦明鏡石龕獨徘徊於留影某甲久發誓願徧為六道四生造夾紵丈八佛像一軀年月已流因縁易奪常恐暫有之身忽隨畫水還無之報飈爾電光今便建立誠心遂兹本誓使聚月見容金山表跡見形善發聞名惡捨拔六根之痛惱去五燒之焚灼但四寳屢空七財多匱仰雙蓮而獨慨覩萬字而無由儻能薄離五家微捐四事結此㝠慈共成因果則素㲲之功非唯昔世散華之報方驗來縁語善無奢在言多恧謹疏為人作造寺疏竊以布金須達表精舍於給園影石仙人造伽藍於離越莫不事表區中心慿真外但四纒惑惱去善源而無滌五濁重蠒非慧刃而安揮故以愍彼濕薪傷兹滴器今於郢州某山為十方僧建立招提寺縈負郊原面帶城雉枕倚巖壑吐納煙雲重門洞啓未創飛行之殿步櫩中霤猶寡密石之功巖飾之理難階瓶鉢之資已罄道俗儻能微留善念薄奬勝縁則事等觀香義同錫乘昔人修檀手雨七寶前賢薄施掌出雙金福有㝠移言無多遜謹疏漢魏六朝百三家集巻八十二下
