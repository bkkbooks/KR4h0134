body:
  text: 漢魏六朝百三家集巻一百十八薛道衡集題詞張曲江登薛公逍遥堂感歎言詩懷湘浦弔賦漢川沈碑此豈無意其人哉𤣥卿才名蚤盛官于齊周不免仕隋無特爾之操然時主遷易年更代促南北俯仰士人盡然不足云怪髙祖革命久典文書儲君國相爭交引重乃嶺表配防襄州出鎮謝山濤之啓事嗟汲黯之淮陽仕路風雲豈能盡如人意煬帝宿卻成于江陵年老入内夜行宜止而文皇一頌致殞厥軀今觀其文鋪叙前徽頌禱為忠何故召怒盖事非其主言違其時對子諛父猶有罪焉伐陳四克籌略分明奚啻子房前箸獨江淮祭文才思少進無論逺不逮古即比杜弼檄梁曾幾何時風已下矣詩篇英麗名下無虚然得之蹋壁失之馬足遺亡如國僑贊辭盤石諸制者又不知幾何也目録賦宴喜賦表奉使表書弔延法師書碑老氏碑頌隋髙祖頌有序祭文祭江文祭淮文樂府出塞二首和楊處道昭君辭昔昔鹽豫章行詩從駕幸晉陽奉和月夜聽軍樂應詔奉和臨渭源應詔秋日遊昆明池敬酬楊僕射山齋獨坐重酬楊僕射山亭入郴江渡北河和許給事善心戲場轉韻展敬上鳳林寺從駕天池應詔梅夏應教人日思歸夏晩嵗窮應教詠苔紙漢魏六朝百三家集巻一百十八目録欽定四庫全書漢魏六朝百三家集巻一百十八明張溥輯薛道衡集賦宴喜賦梁孝王帝子帝孫藉寵承恩名髙西漢禮盛東蕃引雍容文雅之客坐檀欒修竹之園水逶迤而繞砌風清泠而入軒直凝神而迴矚乃惆悵而興言顧謂枚乗曰予聞氣序環周人生䓑浮補天立地之聖不能止日光西落疏山奠川之力不能停河水東流韓王酸棗之觀荒疎蕪漫楚國陽雲之臺空見塵埃固可以縱志縱心以遊以逸窮宴樂于長夜混是非而為一于時霜重庭蘭秋深氣寒横長河之耿耿挂孤月之團團乃有丹墀縹碧柘館椒宫徘徊宛轉掩映玲瓏妖姬淑媛玉貌花叢織女下而星落姮娥来而月空澄粧影于歌扇散衣香于舞風圖雲刻雷之樽潰桂釀花之酒拭珠瀝于羅袂傳金杯於素手表奉使表江東蕞爾一隅僭擅遂久實由永嘉己後華夏分崩劉石苻姚慕容赫連之輩妄竊名號尋亦滅亡魏氏自北徂南未遑逺畧周齊兩立務在兼併所以江表逋誅積有年祀陛下聖德天挺光膺寶祚比隆三代平一九州豈容使區區之陳久在天網之外臣今奉使請責以稱藩書弔延法師書八月二十三日薛道衡和南俗界無常延法師遷化情深悲怛不能已已惟哀慕摧割當不可任法師弱齡捨俗髙蹈塵表志度恢宏理識精悟靈臺神宇可仰而不可窺智海法源可涉而不可測同夫明鏡屢照不疲譬彼洪鐘有来斯應往逢道喪𤣥維落紐栖志幽巖確乎不拔髙位厚禮不能迴其慮嚴威峻法未足懼其心經行宴坐夷險莫二戒德律儀始終如一聖皇啓運像法重興卓爾緇林鬱為稱首屈宸極之重伸師資之義三寶由其𢎞護二諦藉以宣揚信足以追蹤澄什超邁安逺而法柱忽傾仁舟遽沒匪直悲纒四部固亦酸感一人師等杖錫挈瓶夙承訓導升堂入室具體而㣲在三之情理百恒慟徃矣奈何無常奈何疾礙不獲展慰但深悲結謹白書慘愴不次弟子薛道衡和南碑老氏碑自太極權輿上元開闢舉天維而懸日月横地角而載山河一消一息之精靈上生下生之氣候固以財成庶類亭毒羣品有人民焉有君長焉至若上皇䆳古夏巢冬穴靜神息智鶉居鷇飲大禮與天地同節非析疑于俎豆大樂與天地同和豈考擊于鐘鼓逮乎失道後德失德後仁皇王有步驟之殊民俗有淳漓之變于是儒墨爭鶩名法並馳禮經三百不能檢其情性刑典三千未足息其奸宄故知潔其流者澄其源直其末者正其本源源本本其唯大道乎老君感星載誕莫測受氣之由指樹為姓未詳吹律之本含靈在孕七十餘年生而白首因以老子為號其狀也三門雙柱表耳鼻之竒蹈五把十影手足之異爰自伏羲至于周氏綿祀歴代見質變名在文王武王之時居藏史柱史之職市朝屢易容貌不改宣尼一覩嘆龍德之難知關尹四望識真人之將隱乃發揮衆妙著書二篇率性歸道以無為用其辭簡而要其㫖深而逺飛龍成卦未足比其精㣲獲麟筆削不能方其顯晦用之治身則神清志靜用之治國則反朴還淳旣而鍊形物表巻迹方外蜺裳鶴駕往来紫府金漿玉酒讌衍清都參日月之光華與天地而終始涉其流者則擯落囂塵得其門者則騰驤雲霧大椿凋茂非蜉蝣之所知溟渤淺深豈馮夷之能測盛矣哉固無德而稱也莊周云老􅅨死秦佚弔之三號而出是謂遁天之形雖復傲吏之寓言抑亦蟬蜕之㣲㫖皇帝誕靈縱叡接統膺期照舂陵之赤光發芒山之紫氣珠衡月角天表冠于百王明鏡衢罇聖德㑹於千祀周道云季多難在時九鼎共海水同飛兩日與洛川俱鬬天齊地軸之所蛇食鯨吞銅陵玉壘之區狼顧䲭跱黄延奸宄鄭阻兵禍大縱毒螫將遍函夏神謀内斷靈武外馳應欃槍而掃除仗旄鉞而斬伐共工旣翦重立乾坤蚩尤就戮更調風雨宰制同造化之功生靈荷魂魄之賜萬方欣戴九服謳歌乃允答天人祗膺揖讓升泰壇而禮上帝坐明堂而朝羣后昔軒轅顓頊建國不同大昊少昊邦畿各異舜改堯都夏遷虞邑歴選前辟義存創造惜十家之産愛兆民之力經始帝君不移天府規摹紫極仍據皇圖下宇上棟務存卑儉右平左墄聿遵制度朝夕正殿不别起於鴛鸞升降靈臺豈更營于鳷鵲憂勞庶績矜育蒼生念兹在兹發于寤寐棘林肺石特降皇情祝網泣辜深存寛簡草纓知恥畫服興慙天無入牢之星地絶城牛之氣延閣廣内考集羣典石渠璧水闡揚儒業綴五禮于將壊正六樂于己崩總章溺志之音太師咸功之頌承華養德作貳東朝外正萬邦内𢎞三善兩離炳曜重日垂明永固洪基克隆鼎祚重以維城磐石多蓺多才良佐寶臣允文允武為王室之藩屏成神化之丹青致世俗于潤塗納烝民于壽域旄頭垂象窮變成形獯獫作患其来久矣無上算以制之用下策而難服自我開運耀德戢兵感義懷仁稱藩請朔稽顙欵塞匍匐投掌䍧牱夜郎之所靡漢桑乾之地咸被聲教並入提封閩越勾吳不愆貢職夫餘肅慎無絶夷邸遐邇禔福文軌大同自三代之餘六雄競逐秦居閏位漢雜霸道魏氏則虐深華夏有晉則化成戎狄降斯以後稡駁不分帝迹皇風寂寥千載天命聖德㑹昌神道變億兆之視聽復三五之規模固以幽明贊協符瑞彪炳千年靈蔡著天性以効徵三足神烏感陽精而表質春泉如醴出自京師秋露凝甘遍于竹葦星光若月雲氣飛烟三農應銅爵之鳴五緯叶珠囊之度信可以揚鑾動蹕肆覲東后玉檢金繩登封岱岳而謙以自牧為而不宰尚寢馬卿之書未允梁松之奏在青蒲之上常若乗奔處黄屋之下無忘夕惕雖蒼璧黄琮事天事地南正火正屬神之禔猶恐祀典未𢎞秩宗廢禮永言仁里尚想𤣥極壽宮靈座麋鹿徙倚華盖􅄢壇風霜凋弊乃詔上開府儀同三司亳州刺史武陵公元胄考其故迹營建祠堂皇上往因歴試總斯藩部猶漢光司𨽻之所魏武兖州之地對苦相之兩城繞渦穀之三水芝田柳路北走梁園沃野平臯東連譙國望水置􅈏揆景瞻星擬𤣥圃以疏基横玉京而建宇雕楹畫栱磊砢相扶方井員淵參差交映尊容肅穆僊衛儼而無聲神館虚閒滴瀝降而成響清心潔行之事存𤣥守一之儔四方輻凑千里波屬知如在之敬申醮祀之禮顯仁助于王者㝠福資于黎獻允所謂天大道大難幾者矣若夫名言頓絶幽泉之路莫開形器不陳妙物之功難著騰茂實飛英聲圖丹書鏤金石不可以己而在兹乎嵗次敦牂律中姑洗大隋馭天下之六載也乃詔下臣建碑作頌其詞曰悠哉振古邈矣帝先四紀維地八柱承天業生類聚廣谷大川至道靈運神功自然五精應感三㣲相繼樹以司牧執其象契帝迹慙皇王猷謝帝上德逾逺淳風漸替時乖澹泊俗異冲和尚賢飾智懸法張羅内修樽俎外事干戈魚驚網宻鳥亂弓多真人出世星精下斗龍德在躬鶴髮垂首解紛挫鋭去薄歸厚日角月角天長地久小兹五嶽隘此九州逝將髙蹈超然逺遊青牛已駕紫氣光浮𤣥門洞啓神化潛流賴鄉舊里渦川遺迹古徃今来時移世易靈廟凋毁祠壇虚寂九井生祠雙碑碎石惟皇受命乃神乃聖響發地鐘光垂天鏡宇宙開朗妖氛蕩定曜魄同尊參神取正流沙蟠木鳳穴龜林異類歸欵萬方宅心鴻臚納賮王㑹書琛青雲干呂薰風闕琴化致鼎平家興禮讓永言柱下猶慙太上乃建清祠式圖靈狀原隰爽塏亭臯彌望梅梁桂棟曲檻叢楹烟霞舒巻風霧凄清僊官就位羽客来庭穰穰簡簡降福明靈至神不測理存繫象大音希聲時振髙響遐邇讃頌幽明資仰敬刋金石永播天壤頌隋髙祖頌有序太始太素荒茫造化之初天皇地皇杳冥書契之外其道絶其迹逺言談所不詣耳目所不追至于入穴登巢鶉居鷇飲不殊于羽族取類于毛羣亦何貴于人靈何用于心識羲軒已降爰曁唐虞則乾象而施法度觀人文而化天下然後帝王之位可重聖哲之道為尊夏后殷周之國禹湯文武之主功濟生民聲流雅頌然陵替於三五慙德於干戈秦居閏位任刑名為政本漢執靈圖雜霸道而為業當塗興而三分峙典午末而四海亂九州封域窟穴鯨鯢之羣五都遺黎蹴踏戎馬之足雖𤣥行定嵩洛水運據崤函未正滄海之流詎息崑山之燎叶千齡之旦暮當萬葉之一朝者其在大隋乎粤若髙祖文皇帝誕聖降靈則赤光照室韜神晦迹則紫氣騰天龍顔日角之竒玉理珠衡之異著在圖籙彰乎儀表而帝系靈長神基崇峻類邠岐之累德異豐沛之勃起俯膺歴試納揆賓門位長六卿望髙百辟猶重華之為太尉若文命之任司空蒼厯將盡率土麋沸玉弩驚天金鋩照野奸雄挺禍據河朔而連海岱猾長縱惡杜白馬而塞成臯庸蜀逆命慿銅梁之險鄖黄背誕引金陵之寇三川已震九鼎將飛髙祖龍躍鳳翔濡足授手應赤伏之符受𤣥狐之籙命百下百勝之將動九天九地之師平共工而殄蚩尤翦猰窳而戮鑿齒不煩二十八将無假五十二征曽未踰時妖逆咸殄廓氛霧于區宇出黎元于塗炭天柱傾而還正地維絶而更紐殊方稽顙識牛馬之内向樂師伏地懼鐘石之變聲萬姓所以樂推三靈于是改卜壇場已備猶𢎞五讓之心億兆難違方從四海之請光臨寶祚展禮郊丘舞六代而降天神陳四圭而饗上帝乾坤交泰品物咸亨酌前王之令典改易徽號因庶萌之子来移創都邑天文上當朱鳥地理下據黑龍正位辨方揆景于日月内宮外座取法于辰象懸政教于魏闕朝羣后于明堂除舊布新移風易俗天街之表地脉之外獯獫孔熾其来自久横行十萬樊噲于是失辭提步五千李陵所以陷沒周齊兩盛競結旄頭娉狄后于漠北未足息其侵擾傾珍藏于山東不能止其貪暴炎靈啓祚聖皇馭㝢運天策于帷扆播神威于沙朔柳室氊裘之長皆為臣𨽻瀚海蹛林之地盡充池苑三吳百越九江五湖地分南北天隔内外談黄旗紫盖之氣恃龍蟠獸據之嶮恒有僭偽之君妄竊帝王之號時經五代年移三百爰降皇情永懐大道愍彼黎獻獨為匪人今上利建在唐則哲居代地慿宸極天縱神武受脤出車一舉平定于是八荒無外九服大同四海為家萬里為宅乃休牛散馬偃武修文自華夏亂離緜積年代人造戰爭之具家習澆偽之風聖人之遺訓莫存先王之舊典咸墜爰命秩宗刋定五禮申􅃯太史改正六樂玉帛樽俎之儀節文乃備金石匏革之奏雅俗始分而留心政術垂神聽覽早朝晏罷廢寢忘食憂百姓之未安懼一物之失所行先王之道夜思待旦革百王之弊朝不及夕見一善事喜彰于容㫖聞一愆犯歎深于在予薄賦輕徭務農重穀倉廩有紅腐之積黎萌無阻飢之慮天性𢎞慈聖心惻隱恩加禽獸胎卵于是獲全仁霑草木牛羊所以勿踐至于憲章重典刑名大辟申法而屈情决斷于俄傾故能彞倫攸叙上下齊肅左右絶諂䛕之路縉紳無勢力之門小心翼翼敬事于天地終日乾乾誡慎于亢極陶黎萌于德化致風俗于太康公卿庶尹遐邇岳牧僉以天平地成千載之嘉㑹登封降禪百王之盛典宜其金泥玉檢展禮介丘飛聲騰實常為稱首天子為而不恃成而不居冲㫖凝邈固辭弗許而雖休勿休上德不德更乃潔誠岱岳遜謝愆咎方知六十四卦謙撝之道為尊七十二君告成之義為小巍巍蕩蕩無得以稱焉而深誠至德感達于穹壤和氣薫風充溢于宇宙二儀降福百靈薦祉日月星象風雲屮樹之祥山川玉石鱗介羽毛之瑞嵗見月彰不可勝紀至于振古所未有圖籍所不載目所不見耳所未聞古語稱聖人作萬物覩神靈滋百寶用此其效矣旣而遊心姑射脱屣之志已深鑄鼎荆山升天之駕遂逺凡在黎獻共惟帝臣慕深考妣哀纒弓劍塗山幽峻無復玉帛之禮長陵寂寞空見衣冠之遊若乃降精熛怒飛名帝籙開運握圖創業垂統聖德也揆亂反正濟國寜人六合八紘同文共軌神功也𤣥酒陶匏雲和孤竹禋祀上帝尊極配天大孝也偃伯戢戈正禮裁樂納民壽域驅俗福林至政也張四維而臨萬㝢侔三皇而竝五帝豈直錙銖周漢么麽魏晉而己雖五行之舞每陳于清廟九德之歌無絶于樂府而𤣥功暢洽不局于形器懿業逺大豈盡于揄揚臣經生多幸命偶興運趨事紫宸驅馳丹陛一辭天闕奄隔鼎湖空有攀龍之心徒懐蓐蟻之意庶慿毫翰敢希賛述昔堙海之禽不增于大地泣河之士非益于洪流盡其心之所存忘其力之所及輒緣斯義不覺斐然乃作頌曰悠哉䆳古邈矣季世四海九州萬王千帝三代之後其道逾替爰逮金行不勝其弊戎狄猾夏羣凶縱慝竊號淫名十有餘國怙威逞暴悖禮亂德五嶽塵飛三象霧塞𤣥精啓厯發迹幽方并呑寇偽獨擅雄强載祀二百比祚前王江湖尚阻區域未康勾吳閩越河朔渭涘九縣𤓰分三方鼎跱狙詐不息干戈競起東夏雖平亂離瘼矣五運叶期千年肇旦赫矣髙祖人靈攸賛聖德迥生神謀獨斷癉惡彰善夷凶靖難宗伯撰儀太史練日孤竹之管雲和之瑟展禮上𤣥飛煙太一珪璧朝㑹山川望秩占揆星景移建邦畿下慿赤壤上叶紫㣲布政衢室懸法象魏帝宅天府固本崇威匈河瀚海龍荒狼望種落陸梁時犯亭障皇威逺懾帝德遐暢稽顙歸誠稱臣内向吳越提封斗牛星象積有年代自稱君長大風未繳長鯨漏網授鉞天人豁然清蕩戴日戴斗太平大䝉禮教周被書軌大同復禹之迹成舜之功禮以安上樂以移風憂勞庶績矜宥黔首三面解羅萬方引咎納民軌物驅時仁壽神化隆平生靈熙阜䖍心恭己奉天祀地協氣横流休徵紹至壇場望幸云亭虚位推而不居聖道彌粹齊跡姬文登發嗣聖道類漢光傳莊寶命知来藏往𤣥覽幽境鼎業靈長洪基隆盛崆峒問道汾射窅然御駢遐逝乗雲上仙哀纒率土痛感穹𤣥流澤萬葉用教百年尚想叡圖永惟聖則道洽幽顯仁霑動植爻象不陳乾坤將息㣲臣作頌用申罔極祭文祭江文維開皇元年行軍元帥晉王謹以太牢之奠敬祭南瀆大江之神仰惟靈性包平智德擅靈長上膺東井下紀南國引雙流而分九派長四瀆而納百川自晉永嘉乾靈落綱蕞爾吳越僭偽相承陳賊叔寶世濟其凶士庶為其塗炭人神所以怨憤忝司九伐清彼一方分命將士乗流南渡仰慿靈佑咸蒙利涉今申命蒼兕躬總精鋭直趨金陵行登石首庶蛟螭竄于洲渚帷盖靜於波濤江表克平海内清泰謹申禮薦惟神尚享祭淮文元帥晉王謹以清滌制幣太牢之奠敬祭于東瀆大淮之靈盖聖德應期神功宰物上齊七政下括四海自晉人喪道􅂜倫攸斁天隔内外地毁東南三吳成危亂之邦百越為逋逃之藪皇帝肇開鼎業光有神器圖出龜龍鏡懸金玉憂勞庶績無忘寤寐言念蒼生情深矜養河源海外莫不来庭冐頓呼韓嵗時拜誦偽陳蕞爾尚阻聲教妖賊叔寶僭竊遺緒毒流江左寃結人神上軫皇情義申弔代猥䝉朝寄撫寜淮甸仰惟導源桐柏長邁蓬莱標四瀆而引百川擅五材而含七德庶慿流惡之靈克成除暴之舉使水陸旌旗所向無前吳㑹君長束手歸服謹申薦醴惟神尚饗樂府出塞二首和楊處道以下五言髙秋白露團上將出長安塵沙塞下暗風月隴頭寒轉蓬隨馬足飛霜落劍端凝雲迷代郡流水凍桑乾烽㣲桔橰逺橋峻轆轤難從軍多惡少召募盡才官伏堤時臥鼓疑兵乍解鞍柳一作龍城擒冒頓長坂納呼韓受降今更築燕然已重刋還嗤傅介子辛苦刺樓蘭邊庭烽火驚挿羽夜徵兵少昊騰金氣文昌動將星長驅鞮汗北直指夫人城絶漠三秋暮窮隂萬里生寒夜哀笛曲霜天斷鴈聲連旗下鹿塞疊鼓向龍庭妖雲墜虜陣暈月繞胡營左賢皆頓顙單于己繫纓絏馬登𤣥闕釣鯤臨北溟當知霍驃騎髙第起西京昭君辭我本良家子充選入椒庭不䝉女史進更失畫師情蛾眉非本質蟬鬢改真形專由妾命薄誤使君恩輕啼霑渭橋路歎别長安城夜依寒草宿朝逐轉蓬征却望關山迥前瞻沙漠平胡風帶秋月嘶馬雜笳聲毛裘易羅綺氊帳代金屏自知蓮臉歇羞看菱鏡明釵落終應棄髻解不須縈何用單于重詎假閼氏名駃騠聊彊食筒一作桐酒未能傾心隨故鄉斷愁逐塞雲生漢宮如有意為視旄頭星昔昔鹽垂柳覆金堤蘼蕪葉復齊水溢芙蓉沼花飛桃李蹊採桑秦氏女織錦竇家妻關山别蕩子風月守空閨恒斂千金笑長垂雙玉啼盤龍隨鏡隱彩鳳逐帷低飛魂同夜鵲倦寢憶晨雞暗牖懸蛛網空梁落燕泥前年過代北今嵗徃遼西一去無消息那能惜馬啼豫章行七言江南地逺接閩甌山東英妙屢經遊前瞻疊障千重阻却帶驚湍萬里流楓葉朝飛向京落文魚夜過歴吳洲君行逺度茱茰嶺妾住長依明月樓樓中愁思不開嚬始復臨窻望早春鴛鴦水上萍初合鳴鶴園中花併新空憶常時角枕處無復前日畫眉人照骨金環誰用許見膽明鏡自生塵蕩子從来好留滯況復關山逺迢逓當學織女嫁牽牛莫作姮娥叛夫壻偏訝思君無限極欲罷欲忘還復憶願作王母三青鳥飛去飛来傳消息豐城雙劍昔曾離經年累月復相隨不畏將軍成久别只恐封侯心更移詩從駕幸晉陽省方遵徃册遊豫叶前經金吾朝戒道校尉晚巡營重巒下飛騎絶浦渡連旌澗水寒逾咽松風逺更清方觀翠華反簪筆上云亭奉和月夜聽軍樂應詔旌門臨古堞徼道度深隍月泠疑秋夜山寒落夏霜遥空澄暮色清景散餘光笳聲喧隴水鼓曲噪漁陽沈鬱興神思晀聽發天章嵩岱終難學丘陵徒自强奉和臨渭源應詔𤣥功復禹迹至德去湯羅玉關亭障逺金方水石多八川兹一態萬里導長波驚流注陸海激浪象天河鸞旗歴巖谷龍穴暫經過西老陪遊宴南風起詠歌庶品䝉仁澤生靈穆太和㣲臣惜暮景願駐魯陽戈秋日遊昆明池灞陵因靜退靈沼暫徘徊新船木蘭檝舊宇豫章材荷心宜露泫竹徑重風来魚潛疑刻石沙暗似沈灰琴逢鶴欲舞酒遇菊花開羈心與秋興陶然寄一杯敬酬楊僕射山齋獨坐相望山河近相思朝夕勞龍門竹箭急華岳蓮花髙岳髙嶂重疊鳥道風烟接遥原樹若薺逺水舟如葉葉舟旦旦浮驚波夜夜流露寒洲渚白月冷函關秋秋夜清風發彈琴即鑑月雖非莊舄歌吟詠常思越重酬楊僕射山亭寂寂無與晤朝端去總戎空庭聊步月閒坐獨臨風臨風時太息步月山泉側朝朝散霞彩暮暮澄秋色秋色遍臯蘭霞彩落雲端吹旌朔氣冷照劍日光寒光寒塞草平氣泠咽笳聲將軍獻凱入靄靄風雲生入郴江仗節遵嚴㑹揚舲泝急流征塗非白馬水勢類黄牛跳波鳴石磧濺沬擁沙洲岸迴槎倒轉灘長船却浮縁崖頻斷挽挂壁屢移鈎還憶青絲騎東方来上頭渡北河連旌映溆浦疊鼔拂沙一作河洲桃花長新浪竹箭下奔流塞雲臨逺艦胡風入陣樓劍拔蛟將出驂驚黿欲浮鴈書終立效燕相果封侯勿恨關河逺且寛邊地愁和許給事善心戲場轉韻京洛重新年復屬月輪圓雲間璧獨轉空裏鏡孤懸萬方皆集㑹百戲盡来前臨衢車不絶夾道閣相連驚鴻出洛水翔鶴下伊川艷質迴風雪笙歌韻管絃佳麗儼成行相攜入􅃧場衣類何平叔人同張子房髙髙城裏髻峩峩樓上妝羅裙飛孔雀綺帶垂鴛鴦月映班姬扇風飄韓壽香竟夕魚負燈徹夜龍銜燭歡笑無窮已歌詠一作吹還相續羌笛隴頭吟胡舞龜兹曲假面飾金銀盛服揺珠玉宵深戲未闌競為人所難臥驅飛玉勒立騎轉銀鞍縱横旣躍劍揮霍復跳丸抑揚百獸舞盤跚五禽戲狻猊㺯斑足巨象垂長鼻青羊跪複跳白馬迴旋騎一作駛忽覩羅浮起俄看鬱昌至峯嶺旣崔嵬林叢亦青翠麋鹿一作麏䴥下騰倚猴猿或蹲跂金徒列舊刻玉律動新灰甲荑垂陌柳殘花散苑梅繁星漸寥落斜月尚徘徊王孫猶勞戲公子未歸来共酌瓊酥酒同傾鸚鵡杯普天逢聖日兆庶喜康哉展敬上鳳林寺淨土連幽谷寶塔對危峯林棲丹穴鳳地邇白沙龍獨巖樓迥出複道閣相重洞開朝霧斂石濕曉雲濃髙篠低雲盖風枝響和鐘簷隂翻細柳澗影落長松珠桂浮明月蓮座吐芙蓉隱淪徒有意心迹未相從從駕天池應詔上聖家寰宇威畧振邊陲八維窮眺覽千里曳旌旗駕黿臨碧海控驥踐瑶池曲浦騰烟霧深浪駭鯨螭梅夏應教長廊連紫殿細雨應黄梅浮雲半空上清吹隔池来集鳳桐花散勝龜蓮葉開幸逢為善樂頻降濟時才人日思歸入春纔七日離家已二年人歸落鴈後思發在花前夏晩流火稍西傾夕影遍曾城髙天澄逺色秋氣入蟬聲嵗窮應教故年隨夜盡初春逐曉生方驗從軍樂飲至入西京詠苔紙昔時應春色引淥泛清流今来承玉管布字改銀鈎漢魏六朝百三家集巻一百十八
