body:
  text: 漢魏六朝百三家集巻七十八齊張融集題詞吳郡張氏之盛前有敷演鏡暢後有充融巻稷融字思光孔德璋所謂外兄張長史也張氏世理音辭修儀範思光獨詭越驚人似一狂士然孝親敬嫂感德重義人倫之際何亹亹也自序文章云不阡不陌非途非路後有狀者不如其善自狀也海賦文辭詭激欲前無木華雖體致未諧藩籬巳判傳詩絶少落落如之白雲清風孤臺明月想見其人通源定本直謂百聖同投本末無異周子長辨倒兵乃巳彼生平談論總無師法白日發歌鴻飛起悟孤神獨逸窺其意好似慕北海與之同名然謂天下有兩融又掉頭不受也獠賊厲刅高詠洛生浮海大風乾魚寄傲天子賜衣尚書趨拜曽何足慕具此天性固思光文字所由出乎目錄賦海賦箋與豫章王嶷箋書與從叔永書與王僧䖍書與從弟瓌書答周顒書與周顒論釋法寵書論門論序問律自序誡臨卒戒子詩白日歌蕭史曲憂且吟别詩漢魏六朝百三家集巻七十八目録欽定四庫全書漢魏六朝百三家集巻七十八明張溥輯齊張融集賦海賦葢言之用也情矣形乎使天形寅内敷情敷外寅者言之業也吾逺職荒官將海得地行關入浪宿渚經波傳懐樹觀長滿朝夕東西無里南北如天反覆懸烏表裏菟色壯哉水之竒也竒哉水之壯也故古人以之頌其所見吾問翰而賦之焉當其濟興絶感豈覺人在我外木生之作君自君矣分渾始地判氣初天作成萬物為山為川總川振㑹導海飛門爾其海之狀也之相也則窮區沒渚萬里藏岸控㑹河濟朝總江漢囘混浩潰顛倒發濤浮天振逺灌日飛高摐麤江撞則八紘摧隤鼓怒則九紐折裂於活長風以舉波漷音郭天地而為勢音􅉦澤于及涾音沓洽音合來往相竓麤合汨子突湥音突於渤渤紆狀石成窟西衝虞淵之曲東振湯谷之阿若木於是乎倒覆折扶桑而為渣在牙濩􅖐音藥􅯛音門渾涫於官􅵞於和碨於磊雍渤非勃淬音卒淪音崙澊音尊灡淺壠嵸子湍轉則日月似驚浪動而星河如覆既烈太山與崑崙相壓而共潰又盛雷車震漢破天以折轂淃於貟漣涴於卯瀨於嬾輾轉縱橫揚珠起玉流鏡飛明是其囘堆曲浦幽關弱渚之形勢也沙嶼相接洲島相連東西蕩潏如滿于天梁禽楚獸胡木漢草之所生焉長風動路深雲暗道之所經焉苕苕蔕蔕窅窅翳翳晨烏宿音秀於東隅落河浪其西界茫沆于剛汴河汨于突磈于磊漫無官桓旁踞委岳橫竦危巒重彰岌岌攢嶺聚立嵂呂兀􅹲音窟􅼎呂今嶔欽架石相陰蔭徒罪陁陁橫出旁入嵬嵬支罪磊磊若相追而下及峰勢縱橫岫形參錯或如前而未進乍非遷而巳却天抗暉於東曲日倒麗於西阿嶺集雪以懐鏡巖昭春而自華江浲許江􅮞􅮞許伯漈子曷巖拍芬百嶺觸山䃶石汙􅺆于各􅱑音寒況于朗碨於磊泱於朗􅻻􅻼音阿流柴磹五感反屼五窟頓浪低皮􅻹苦降䂭苦交硄苦江折嶺挫峰窂浪硠音郎掊朋山相苦合萬里藹藹極路天外電戰雷奔倒地相礚獸門象逸魚路鯨奔水遽龍魄陸振虎魂却瞻無後向望行前長尋高眺唯水與天若乃山橫蹴浪風倒摧波磊若驚山竭嶺以竦石鬱若飛煙奔雲以振霞連瑶光而交綵接玉繩以通華爾乎夜滿深霧晝密長雲高河滅景萬里無文山門幽暖岫户葐蒀九天相掩王地交氛汪汪橫橫音皇沆沆于剛浩浩音害淬麤潰潰大人之表泱於朗蕩君子之外風沫相排日閉雲開浪散波合岳起山隤若乃漉沙構白熬波出素積雪中春飛霜暑路爾其竒名出錄詭物無書高岸乳鳥橫門產魚則何㦬音羅鱅音容鮨音詣􅭡音非魜音人􅱇音果䱻音滑哄日吐霞呑河潄月氣開地震聲動天發噴灑噦於月噫於戒流雨而揚雲喬髗壯脊架岳而飛墳音挺動崩五山之勢瞷矣簡睔矣煥七曜之文蟕蠵瑁蛑綺貝繡螺𤣥朱互綵綠紫相華遊風秋瀨泳景登春伏鱗漬綵昇魵洗文若乃春代秋緒歳去冬歸柔風麗景晴雲積暉起龍塗於靈歩翔螭道之神飛浮微雲之如瞢落輕雨之依依觸巧塗而䃭去紺逺抵欒木以激揚浪相礴傍各而起千狀波獨湧乎一萬容蘋藻留映荷芰提陰扶容曼綵秀逺之深明藕移玉清蓮代金眄芬芳於遥渚汎灼爍於長潯浮艫雜軸遊舶交艘帷軒帳席方逺連高入驚波而箭絶振排天之雄飆越湯谷以逐景渡虞淵以追月徧萬里而無時浹天地於揮忽雕隼飛而未半鯤龍趠貪教而不逮舟人未及復其喘巳周流宇宙之外矣陰鳥陽禽春毛秋羽逺翅風遊高翮雲舉翔歸棲去連陰日路瀾漲波渚陶𤣥浴素長紘四斷平表九絶雉翥成霞鴻飛起雪合聲鳴侶竝翰翻羣飛關溢繡流浦照文爾夫人微亮氣小白如淋凉空澄逺増漢無陰照天容於鮷渚鏡河色於魦潯括蓋餘以進廣浸夏洲以洞深形每驚而義維静跡有事而道無心於是乎山海藏陰雲塵入岫天英徧華日色盈秀則若士神中琴高道外袖輕羽以衣風逸𤣥裾於雲帶筵秋月於源潮帳春霞於秀瀨曬蓬萊之靈岫望方壺之妙闕樹遏日以飛柯嶺囘峰以蹴月空居無俗素館何塵谷門風道林路雲真若乃幽崖於夾倉夾隈隩之窮駿波虎浪之氣激勢之所不攻有卉有木為灌為叢路糅網雜結葉相籠通雲交拂連韻共風蕩洲礉去角岸而千里若崩衝崖沃島其萬國如戰振駿氣以擺雷飛雄光以倒電若夫增雲不氣流風斂聲瀾文復動波色還驚明月何逺沙裏分星至其積珍全逺架寶諭深瓊池玉壑珠岫㻁岑合日開夜舒月解陰珊瑚開繢瑠璃竦華丹文鏡色雜照冰霞洪洪潰潰浴干日月淹漢星墟滲河天界風何本而自本雲無從而空滅籠麗色以拂烟鏡懸暉以照雪爾乃方貟去我混然落情氣暄而濁化静自清心無終故不滯志不敗而無成既覆舟而載舟固以死而以生𢎞芻狗於人獸導至本以充形雖萬物之日用諒何緯其何經道湛天初機茂形外亡有所以而有非膠有於生末亡無所以而無信無心以入太不動動是使山岳相崩不聲聲故能天地交泰行藏虚於用舎應感亮於圓㑹仁者見之謂之仁逹者見之謂之逹咶者㡬於上善吾信哉其為大矣箋與豫章王嶷箋朱謙之吳郡錢塘人父昭之假𦵏田側為族人幼方所焚謙之雖小便哀戚如執䘮事長不婚娶永明中手刅殺幼方詣獄自繫時嶷為郡刺史别駕孔稚珪兼記室劉司徒左西掾張融牋上嶷嶷言之世祖嘉其義乃遣謙之隨曹虎西行將發幼方子惲於津陽門伺殺謙之謙之之兄選之又刺殺惲世祖曰此皆義事不可問悉赦之禮開報仇之典以申孝弟之情法斷相殺之一以表權時之制謙之揮刅軒冕既申私禮繫以就死又明公法今仍殺之則成當世罪人宥而治之即為盛朝孝子殺一罪人未足𢎞憲活一孝子實廣風德張緒陸澄是其鄉舊應具來繇融等與謙之竝不相識區區短見深有恨然書與從叔永書融昔稱幼學早訓家風雖則不敏率以成性布衣葦席弱年所安簞食瓢飲不覺不樂但世業清貧民生多待榛栗棗脩女贄既長束帛禽鳥男禮巳偹勉身就官十年七仕不欲代耕何至此事昔者三吳一丞雖屢舛錯今聞南康缺守願得為之融不知階級階級亦可不知融政以求丞不得所以求郡求郡不得亦可復求丞與王僧䖍書融天地之逸民也進不辨貴退不知賤兀然造化忽如草木實以家貧累積孤寡傷心八姪俱孤二弟頗弱撫之而感古人以悲豈能山海陋祿申融情累阮籍愛東平土風融亦欣晉平閑外與從弟瓌書昇明元年劉彦節有異圖弟遐為吳郡潛相影響齊高帝密令瓌取遐諸張世有豪氣瓌率兵入郡斬之高帝即授瓌吳郡太守融與瓌書吳郡何晚何須王反聞之嗟驚乃是阿兄答周顒書并答所問張融白吾未能忘身故有情身分外既化極魂首復為子弟留地不欲使方寸舊都日夜荒沒平生所困橫馗而草所以製是門律以律其門非佛與道門將何律故告氣緩命慿魄申陰數感十應通源定本實欲足下發予竒意果能翔牘起情妙見正析既赴所志今為子言周之問曰論云致本則同請問何義是其所謂本乎答彼周曰夫性靈之為性能知者也道德之為道可知者也能知而不知所可知非能知之義可知而不為能知所知非夫可知矣故知能知必赴於道可知必知所赴而下士雷情波照鼔欲噪神精明驅動識用沈藹所以倒心下灌昭隔於道至若伯陽專氣致柔停虚任魄載營抱壹居凝通静静唯通也則照無所沒魄緒停虚故融然自道足下欲使伯陽不静寧可而得乎使静而不怕道亦于何而可得今既静而兩神神静而道二吾未之前聞也故逗極所以一為性遊簡且韻猖狂曠不能復行次戰思定霸宇内但敷生靈以竦志庻足下㒺象以捫珠是以則帝屬五而神常一皇有三而道無二鳬乙之交定者鴻乎吾所以直其繩矣周之問曰言道家者豈不以二篇為主言佛敎者亦應以般若為宗二篇所貴義極虚無般若所觀照窮法性虚無法性其寂雖同住寂之方其㫖則别答彼周曰法性雖以即色圖空虚無誠乃有外張義然環㑹其所中足下當加以半思也至夫遊無蕩思心塵自拂思以無蕩一舉形上是雖忘有老如騫釋然而有忘釋不伐老當其神地悠悠精和坐廢寂然以湛其神遂通以冲其用登其此地吾不見釋家之與老氏陟其此意吾孰識老氏之與釋家逗極之所以無二親情故妙得其一矣直以物感既分應物難合令萬象與視聽交錯視聽與萬象相橫著之既巳深却之必方淺所以苦下之翁且藏即色順其所有不震其情尊其所無慚情其順及物有潛去人時欲無既可西風晝舉而致南精夕夢漢魂中寐不其可乎若卿謂老氏不盡乎無則非期於得意若卿謂盡無而不盡有得意復爽吾所期卿若疑老氏盡有而不亮以敎則釋家有盡何以峻迹斯時卿若以釋家時宜迹峻其猶老氏時峻此迹逗極之同兹焉余意周之問曰論云時殊故不同其風是佛敎之異於道也世異故不一其義是道言之乖於佛也道佛兩殊非鳬則乙答彼周曰非鳬則乙迹固然矣迹固其然吾不復答但得其世異時殊不宜異其所以之異周之問曰未知高鑒緣何識本答彼周曰綜識施本巳吐前牘吾與老釋相識正如此正復是目擊道斯存卿欲必曲鞠其辭吾不知更所以自訟周之問曰若猶取二敎以位其本恐戰獄方興未能聽訟也答彼問曰得意有本何至取敎周之問曰若雖因二敎同測敎源者則此敎之源每沿敎而見矣答彼周曰誠哉有是言吾所以見道未壹於佛但吾之即此言别有竒即耳周之問曰自應鹿巾環杖悠然自擊儒墨誾誾從來何諍答彼周曰虞芮二國之鬬田非文王所知也碎白玉以泯鬬其别有尊者乎況夜戰一鴻妄巾鳧乙斯自鹿巾之空負頭上環杖之自誣掌中吾安得了之哉周之問曰苟合源共是分迹雙非則二跡之用宜均去取奚為翔集所向勤務唯佛專氣抱一無謹於道乎答彼周曰應感多端神情數廣吾不翔融於四果卿尚無疑其集佛吾不翔翮於五通而於集道復何晦且寶聖宜本迹匪情急矧吾巳有所集方復移其翔者邪卿得其無二於兩楹故不峻督其去取周之問曰吾則心持釋訓業愛儒言未知足下雅意佛儒安在為當本一末殊為本末俱異邪答彼周曰吾乃自元混百聖同投一極而近論通源儒不在議足下今極其儒當欲列儒圍道故無屬垣耳隙思濳師夜以遂圖掩天城恐難升之險非子所躋則吾見師之出不見其入也吾巳謂百聖同所投何容本末俱其異更以瀝勢倒兵恣卿智勇吾之勇智自縱橫湊出周顒重答張長史書并重問周顒頓首夫可以運寄情抱非理何師中外聲訓登塗所奉而使此中介分然去留無薄是則怏怏失路在我奚難足下善欲言之吾亦言之未巳也輙復往研遲承來析通源曰法性雖以即色圖空虚無乃有外張義所以以苦下之翁且藏即色順其所有不震其情尊其所無漸情其順周之問曰苦下之藏即色信矣斯言也更恐有不及於即色容自託以能藏則能藏者廣或不獨出於厲鄉耳夫有之為有物知其有無之為無人識其無老氏之署有題無無出斯域是吾三宗鄙論所謂取捨驅馳夫有能越其度者也佛敎所以義奪情靈言詭聲律葢謂即色非有故擅絶於羣家耳此塗未明在老何續但紛紛橫沸皆由著有之家因俗兹焉是患既患由有滯而有性未明矯有之家因崇無術有性不明雖則巨蔽然違誰尚静渉累實微是道家之所以有埤𢎞敎前白所謂黃老實雄者也正何舊説皆云老不及聖若如斯論不得影響於釋宗矣吾之位老不至乃然大夫士應世其體無方或為儒林之宗或為國師道士斯經敎之成説也乃至宰官長者咸託身相何為老生獨非一跡但未知渉觀淺深品位高下耳此皆大明未啟權接一方日月出矣爝火宜廢無餘既説衆權自寢足下猶欲抗遺燎於日月之下明此火與日月通源既情崇於日月又無侮於火本末知此火本者將為名乎將或實哉名而已邪道本安在若言欲實之日月為實矣斯則事盡於一佛不知其道也通源之旨源與誰通通源曰當其神地悠悠精和坐廢登其此地吾不見釋家之與老氏陟其此意吾孰釋老氏之與釋家又曰今既静而兩神神静而道二吾未之前聞也又曰伯陽專氣致柔停虚任魄魄緒停虚故融然自道也又曰心塵自拂一擧形上周之問曰足下法性雖以即色圖空虚無誠乃有外張義竊謂老釋重出對分區野其所境域無過斯言然則老氏之神地悠悠自悠悠於有外釋家之精和坐廢每坐廢於色空登老氏之地則老異於釋渉釋氏之意則釋氏殊於老神既静而不兩静既兩而道二足下未之前聞吾則前聞之矣苟然則魄緒停虚是自虚其所謂虚融然自道亦非吾所聞道若夫心塵自拂一擧形上皆或未渉於大方不敢以通源相和也通源曰足下欲使伯陽不静寧可而得乎使静而不怕道亦于何而不得周之問曰甚如來言吾亦慮其未極也此所謂得在於神静失在於物虚若謂静於其静非曰窮静魄於其魄不云盡魄吾所許也無所間然通源曰若卿謂老氏不盡乎無則非想期於得意若卿謂盡無而不盡有得意復爽吾所期周之問曰盡有盡無非極莫備知無知有吾許其道家唯非有非無之一地道言不及耳非有非無三宗所藴倘贍餘慮惟足下其眄之念不使得意之相爽夫於有歸耳通源曰非鳧則乙蹟固然矣蹟固其然吾不復答又曰吾與老釋相識正如此正復是目擊道斯存又曰得意有本何至取敎又曰誠哉有是言吾所以見道來一於佛周之問曰足下之所目擊道存得意有本想法性之真義是其此地乎佛敎有之足下所取非所以何至取敎也目擊之本即在敎跡謂之鳧乙則其鴻安漸哉諸法真性老無其㫖目擊高情無存老蹟㫖蹟兩亡索宗無所論所謂無侮於道本當無侮於何地哉若謂探道家之跡見其來一於佛者則是真諦實義㳂文可見矣將㳂於道章而得之乎為㳂於德篇而遇之也若兩無所㳂而𤣥德於方寸者此自足下懐抱與老釋而為三耳或可獨樹一家非老情之所敢逮也通源曰虞芮二國之鬬田非文王所知也斯自鹿巾之空負頭上環杖之自誣掌中吾安能了之哉周之問曰足下謂苦下之且藏即色則空虚有闕矣足下謂法性以即色圖空則法性為僃矣今有人於此操環杖而言法性鹿巾之士執虚無而來誚曰爾不同我吾與爾闕足下從容倚棘聽斷於其間曰皆不可也謂其鹿巾空負於頭上環杖自誣於掌中以足下精明特逹而判訟若斯良虞芮之所以於邑也通源曰吾不翔翮於四果卿尚無疑其集佛吾融不翔於五通而於集道復何晦周之問曰足下不翔翮於四果猶勤集於佛敎翮不翔於五通何獨棄於道跡乎理例不通方為彼訴通源曰當欲列儒圍道故先屬垣隙周之問曰足下通源惟道源不及儒吾因疑其闕是以相訪但未知融然自道唯道能融將道之融然修儒可㑹邪雖非義本縱言宜及想釋本多暇幸惠餘音𢎞明集余釋僧祐云尋周張難問雖往復積巻然兩家立意理在初番故略其後文㫖存義本與周顒論釋法寵書法寵姓馮南陽冠軍人寓海鹽納妻半年捨家住興皇寺從道猛曇學成實論融與顒書濟之古人遺族故留兒女法寵法師絶塵如棄唾若斯之志大矣逺矣論門論吾門世􅉆佛舅氏奉道道也與佛逗極無二寂然不動致本則同感而遂通達迹成異其猶樂之不沿不隔五帝之秘禮之不襲三皇之聖豈三與此皆殊時故不同其風異世故不一其義安可輙駕庸愚誣誷神極吾見道士與道人戰儒墨道人與道士獄是非昔有鴻飛天道積逺難亮越人以為鳧楚人以為乙人自楚越耳鴻常一鴻乎夫澄本雖一吾自俱宗其本鴻迹既分吾巳翔其所集汝可專遵於佛迹而無侮於道本書於二何兩孔周剡山茨少子致書諸遊生者曰張融白鳥哀鳴於將死人善言於就暮頃既病盛生衰此亦魂留㡬氣況驚舟失柂於空壑山足無絆於澤中故視陰之間雖寸每遽不縫不徙也欲使魄後餘意繩墨弟姪故為門律數感其一章通源二道今奏諸賢以為何若周顒難張長史門論書并問精顒於鍾山立山茨舎與張融遇輙以𤣥言相滯彌日不解周剡山茨歸書少子曰周顒頓首懋製來班承復峻其門則參子無踞誠不待奬敬尋同本有測高心雖神道所歸吾知其主然自釋之外儒綱為𢎞過此而能與仲尼相若者黃老實雄也其敎流漸非無邪弊素樸之本義有可崇吾取捨舊懐粗有涇渭與奪之際不至朱紫但蓄積懐抱未及厝言耳途軌乖順不可謬同異之聞文宜有歸辨來㫖謂致本則同似非吾所謂同時殊風異又非吾所謂異也久欲此中微舉條裁幸因雅趣試共極言且略如左遲聞深況通源曰道也與佛逗極無二寂然不動致本則同感而遂通達迹誠異周之問曰論云致本則同請問何義是其所謂本乎言道家者豈不以二篇為主言佛敎者亦應以般若為宗二篇所貴義極虚無般若所觀照窮法性虚無法性其寂雖同住寂之方其㫖則别論所謂逗極無二者為逗極極於虚無當無二於法性邪將二塗之外更有異本儻虚無法性其趣不殊乎若有異本思告異本之情如其不殊願聞不殊之説通源曰殊時故不同其風異世故不一其義吾見道士與道人戰儒墨道人與道士獄是非昔有鴻飛天道積逺難亮越人以為鳧楚人以為乙人自楚越耳鴻常一鴻乎夫澄本雖一吾自俱宗其本鴻跡既分吾巳翔其所集周之問曰論云時殊故不同其風是佛敎之異於道也世異故不一其義是道言之乖於佛也道佛兩殊非鳧則乙唯足下所宗之本一物為鴻耳驅馳佛道無免二乖未知高鑒縁何識本輕而宗之其有㫖乎若猶取二敎以位其本恐戰獄方興未能聽訟也若雖因二敎同測敎源者則此敎之源每㳂敎而見矣自應鹿巾環杖悠然目擊儒墨誾誾從來何諍苟合源共是分跡雙非則二跡之用宜均去取奚為翔集所向勤務唯佛專氣抱一無謹於道乎言精㫖逺企聞後要通源曰汝可專遵於佛跡而無侮於道本周之問曰足下專遵佛跡無侮道本吾則心持釋訓業愛儒言未知足下雅意佛儒安在為當本一末殊為本末俱異邪既欲精探彼我方相究渉理類所關不得無請序問律自序吾文章之體多為世人所驚汝可師耳以心不可使耳為心師也夫文豈有常體但以有體為常政當使常有其體丈夫當刪詩書制禮樂何至因循寄人籬下且中代之文道體闕變尺寸相資彌縫舊物吾之文章體亦何異何嘗顛温涼而錯寒暑綜哀樂而橫歌哭哉政以屬辭多出比事不羈不阡不陌非途非路耳然其傳音振逸鳴節竦韻或當未極亦巳極其所矣汝若復别得體者吾不拘也吾義亦如文造次乗我顛沛非物吾無師無友不文不句頗有孤神獨逸耳義之為用將使性入清波塵洗猶沐無得釣聲同利舉價如高俾是道場險成軍路吾昔嗜僧言多肆法辯此盡遊乎言笑而汝等無幸又云人生之口正可論道説義惟飲與食此外如樹網焉吾每以不爾為恨爾曹當振綱也誡臨卒誡子手澤存焉父書不讀况文音情婉在其韻吾意不然别遺爾音吾文體英絶變而屢竒既不能逺至漢魏故無取嗟晉宋豈吾天挺葢不隤家聲汝若不看父祖之意欲汝見也可號哭而看之詩白日歌序曰懸象著明莫大于日月而彼日月不能不謝固知無凖衰為盛之終盛為衰之始故為白日歌白日白日舒天昭暉數窮則盡盛滿則衰蕭史曲引響猶天外吟聲似地中戴勝噪落景龍歕清霄風憂且吟鳴琴當春夜春夜當鳴琴羈人不及樂何似千里心别詩白雲山上盡清風松下歇欲識離人悲孤臺見明月漢魏六朝百三家集巻七十八
