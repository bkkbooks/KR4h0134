body:
  text: 漢魏六朝百三家集巻八十七梁沈約集題詞梁武簒齊决策於沈休文范彦龍時休文年已六十餘矣抵掌革運鼓舞作賊惟恐人非金玉時失河清舉手之間大事已定竟忘身為齊文惠家令也佛前懴悔省訟小過戒及綺語獨諱言佐命不敢播騰及齊和入夢赤章奏天中使譴責趣其病殞囘思妓師識面君臣罷酒又成往事然攀附功烈於生前龍鳳猜積於身後易名一字猶遭奪改若重泉有知能無抱恨於夀光閤外哉休文大手史書居長傳者獨宋文集百巻亦僅存十三取其得意之篇比諸傳論膏沐餘潤光輝蔽體馬書班賦别集偏行適助南董之美觀耳四聲譜自謂入神後代遵奉而不獲邀賞於武帝聲病牽拘固非英雄所喜也禪筆紛作於樹園玅吼諦乘正説逺遜乃公意者逢時之意多則覺性之辭少矣目録賦郊居賦愍塗賦憫國賦麗人賦傷美人賦擬風賦桐賦髙松賦愍衰草賦天淵水鳥賦反舌鳥賦詔改天監元年恩詔南郊恩詔又又立太子恩詔又立内職詔使四方士民陳刑政詔勸農訪民所疾苦詔搜隱逸詔酬荆雍議士詔赦詔又立左降詔降死罪詔沈文季加侍中詔崔慧景加侍中詔授蕭惠休右僕射詔授王亮左僕射詔王亮王瑩加授詔臨川王子晉南康侯子恪遷授詔王茂加侍中詔資給何㸃詔封授臨川等五王詔劉領軍封侯詔王亮等封侯詔常僧景等封侯詔封三舎人詔封申希祖詔封李居壬等詔封徐世檦詔封左興盛等詔勑梁武帝踐祚與州郡勑與謝朏勑與何𦙍勑制授蔡法度廷尉制授王繢蔡約王師制疏修定樂書疏論譜籍疏議乗輿升殿疏論選舉疏缺表上宋書表上注制㫖連珠表為栁世隆上銅表上建闕表為栁兖州世隆上舊宫表舉胡元秀表薦劉粲表與沈淵薦沈驎士表為栁世隆讓封公表為褚炫讓吏部尚書表為南郡王讓中軍表為始興王讓儀同表讓僕射表讓五兵尚書表為皇太子謝表為長城公主謝表謝封建昌侯表謝母封建昌國太夫人表到著作省謝表拜尚書令到都謝表謝立皇太子賜絹表謝賜新厯表致仕表臨終遺表章為安陸王謝荆州章為晉安王謝南兗州章為六宫拜章彈文奏彈王源奏彈孔稚珪違制啟假事奉彈奉朝請王希􅆅違假奏彈御史孔橐題省壁悖慢事奏彈秘書郎蕭遥昌奏彈王僧佑修竹彈甘蕉文啟賀齊明帝登祚啟上錢隨喜光宅寺啟送育王像并上錢燭等啟謝賜甘露啟謝勑賜氷啟謝賜紾綢絹等啟謝勑賜絹葛啟謝齊竟陵王教撰髙士傳啟謝齊竟陵王示華嚴瓔珞啟謝齊竟陵王示永明樂歌啟謝齊竟陵王賚母赫國雲氣黄綾裙襦啟謝女出門宫賜絹綺燭啟謝司徒賜北蘇啟為栁世隆謝賜樂游苑胡桃啟為東宫謝勑賜孟嘗君劒啟為皇太子謝賜御所射雉啟荅釋法雲啟謝陶隱居术煎啟缺上陶隱居啟二首缺書與徐勉書答陸厥問聲韻書答樂藹書答沈驎士書與范述曾論齊竟陵王賦書與陶𢎞景書報王筠書報博士劉杳書與約法師書序梁武帝集序内典序佛記序棊品序論七賢論辨聖論均聖論答陶華陽究竟慈悲論形神論神不滅論難范縝神滅論述僧設㑹論述僧中食論羲佛知不異衆生知義六道相續作佛羲因緣羲頌千佛頌齊朝丹徒故宮頌贊髙士贊有序繡像題贊有序彌勒贊銷聲贊雪贊銘瑞石像銘有序光宅寺刹下銘有序彌勒佛銘釋迦文佛像銘栖禪精舎銘有序連珠連珠二首記枳園寺刹下石記齊竟陵王題佛光記碑桐栢山金庭館碑法王寺碑善館碑齊故安陸昭王碑豫章文憲王碑太尉王儉碑比邱尼僧敬法師碑哀䇿文齊明帝哀䇿文諡議齊武帝諡議齊明帝諡議梁德皇后諡議墓誌銘齊太尉文憲王公墓銘齊太尉徐公墓誌丞相長沙宣武王墓銘司徒謝朏墓銘尚書右僕射范雲墓銘太常卿任昉墓銘行狀齊司空栁世隆行狀齊臨川王行狀齊禪林寺尼淨秀行狀文懴悔文千僧㑹願文賽蔣山廟文冠子祝文齊竟陵王題佛光文缺疏為文惠太子禮佛願疏為文惠太子解講疏為齊竟陵王發講疏為齊竟陵王解講疏又為南郡王捨身疏捨身願疏漢魏六朝百三家集巻八十七目錄欽定四庫全書漢魏六朝百三家集巻八十七明張溥輯梁沈約集賦郊居賦惟至人之非已固物我而兼忘自中智以下洎咸得性以為場獸因窟而獲騁鳥先巢而後翔陳巷窮而業泰嬰居湫而惪昌僑棲仁於東里鳳晦迹於西堂伊吾人之褊志無經世之大方思依林而羽戢願託水而鱗藏固無情於輪奐非有欲於康莊披東郊之寥廓入蓬藋之荒茫既從竪而横搆亦風除而雨攘昔西漢之標季余播遷之云始違利建於海昏創惟桒於江汜同河濟之重世踰班生之十紀或辭祿而反畊或彈冠而來仕逮有晉之隆安集艱虞於天步世交爭而波流民失峕而狼顧延亂麻於井邑曝如莽於衢路大地曠而靡容昊天逺而誰訴伊皇祖之弱辰逢時艱之孔棘違危邦而窘驚訪安土而移即肇胥宇於朱方掩閒庭而宴息值龍顔之鬱起乃憑風而矯翼指皇邑而南轅駕修衢以騁力遷華扉而來啟張髙衡而徙植傍逸陌之修平靣淮流之清直芳塵浸而悠逺世道忽其窊隆綿四代於兹日盈百祀於微躬嗟弊廬之難保若霣籜之従風或誅茅而剪棘或既西而復東乍容身於白社亦寄孥於伯通迹平生之耿介寔有心於獨往思幽人而軫念望東臯而長想本忘情於狥物徒羈紲於天壤應屢嘆於牽絲陸興言於世網事滔滔而未合志悁悁而無爽路將殫而彌峭情薄暮而踰廣抱寸心其如蘭何斯願之浩蕩詠歸歟而躑躅眷巖阿而抵掌逢時君之喪惪何㓙昏之孔熾乃戰牧所未陳寔升陑所不記彼黎元之喋喋將垂獸而為餌瞻窮昊而無歸雖非牢而被胾始歎絲而未覩終逌組而後值尋貽愛乎上天固非民其莫甚授𠖇符於井翼寔靈命之所禀當降監之初辰值積惡之云稔寧方割於下墊廓重氛於上墋躬靡暇於朝食常求衣於夜枕即牢籠於媯夏又馳驅于軒頊惪無逺而不被明無㣲而不燭鼓𤣥澤於大荒播仁風於遐俗闢終古而遐念信王猷其如玉值銜圖之盛世遇興聖之嘉期謝中涓於初日叨光佐於此時闕投石之猛志無飛矢之麗辭排陽烏而命邑方河山而啟基翼儲光於三善長王職於百司兢鄙夫之易失懼寵祿之難持伊前世之貴仕罕紆情於邱窟譬叢華於楚趙每驕奢以相越築甲館於銅駞並髙門於北闕闢重扄於華閫豈蓬蒿所能沒教傳嗣於墝壤何安身於窮地味先喆而為言固余心之所嗜不慕權於城市豈邀名於屠肆詠希微以考室幸風霜之可庇爾乃傍窮埜抵荒郊編霜菼葺寒茅搆棲噪之所集築町疃之所交因犯檐而刋樹由妨基而剪巢決渟洿之汀濙塞井甃之淪坳萟芳枳於北渠樹修楊於南浦遷甕牖於蘭室同肩墻於華堵織宿楚以成門藉外扉而為戸既取隂於庭樾又因籬於芳杜開閣室以逺臨闢髙軒而旁覩漸沼沚於霤垂周塍陌於堂下其水草則蘋萍芡芰菁藻蒹菰石衣海髪黄荇緑蒲動紅荷於輕浪覆碧葉於澄湖飡嘉實而却老振羽服於清都其陸卉則紫鼈緑葹天著山韭鴈齒糜舌牛唇彘首布濩南池之陽爛漫北樓之後或羃渚而芘地或縈窻而窺牖若乃園宅殊製田圃異區李衡則橘林千樹石崇則襍果萬株並豪情之所侈非儉志之所娱欲令紛披蓊鬱吐緑攅朱羅窓映戸接霤承隅開丹房以四照舒翠葉而九衢抽紅英於紫蔕銜素蘂於青跗其林鳥則翻泊頡頏遺音下上楚雀多名流嚶襍響或斑尾而綺翼或緑衿而絳顙好葉隠而枝藏乍間闗而来往其水禽則大鴻小鴈天狗澤虞秋鷖冬䳵修鷁短鳬曵参差之弱藻戱瀺灂之輕軀翅抨流而起沫翼鼓浪而成珠其魚則赤鯉青魴纎鯈鉅鱯碧鱗朱尾修顱偃頟小則戯渚成文大則噴流揚白不興羡於江海聊相㤀於余宅其竹則東南獨秀九府擅竒不遷植於淇水豈分根於樂池秋蜩唫葉寒雀噪枝來風南軒之下負雪北堂之垂訪往塗之軫跡觀先識之情偽每誅空而索有皆指難而為易不自已而求足並尤物以興累亦昔士之所迷而今余之所避也原農皇之攸始討厥播之云初肇變腥以粒食乃人命之所儲尋井田之往記考阡陌於前書顔簞食而樂在鄭髙廪而空虚頃四百而不足畝五十而有餘撫幽衷而跼念幸取給於庭廬緯東菑之故耜浸北畆之新渠無褰㸑於曉蓐不抱惄於朝蔬排外物以齊遣獨為累之在余安事千斯之積不羡汶陽之墟臨巽維而聘目即堆冢而流眄雖兹山之培塿乃文靖之所宴驅四牡之低昻響繁笳之清囀羅方員而綺錯窮海陸而兼薦奚一權之足偉委千金其如線試撫臆而為言豈斯風之可扇将通人之逺㫖非庸情之所見聊遷情而徙睇識方阜於歸津帯修汀於桂渚肇舉鍤於彊秦路縈吳而欵越塗被海而通閩懐三島以長念伊故鄉之可珍寔褰期於晚歲非失步於方春何東川之濔濔獨流涕於吾人謬參賢於昔代亟徒游於兹所侍綵旄而齊轡陪龍舟而遵渚或列席而賦詩或班觴而宴語繐帷一朝㝠漠西陵忽其葱楚望商颷而永歎毎樂愷於斯觀始則鐘石鏘鋐終以魚龍瀾漫或升降有序或浮白無算貴則丙魏蕭曹親則梁武周旦莫不共霜霧而歇滅與風雲而消散眺孫后之墓田尋雄霸之遺武寔接漢之後王信開吳之英主指衡岳而作鎮苞江漢而為宇徒徴言於石槨遂延災於金縷忽蕪穢而不修同原陵之膴膴寧知螻蟻之與狐兎無論樵芻之與牧豎睇東巘以流目心悽愴而不怡葢昔儲之舊苑寔博望之餘基修林則表以桂樹列草則冠以芳芝風臺累翼月榭重栭千櫨崨嶫百栱相持皁園林駕蘭枻水嬉踰三齡而事往忽二紀以厯兹咸夷漫以蕩滌非古今之異峕囘余眸於艮域覿髙舘於兹嶺雖混成以無跡寔遺訓之可秉始飡霞而吐霧終陵虚而倒景駕雌蜺之連卷泛天江之悠永指咸池而一息望瑶臺而髙騁匪爽言以自姱冀神方之可請惟鍾巖之隱鬱表皇都而作峻盖望秩之所宗含風雲而吐潤其為狀也則巍峩崇崒喬枝拂日嶤嶷岧嵉墜石堆星岑崟􅟭屼或坳或平盤堅枕卧詭狀殊形孤嶝横挿洞穴斜經千丈萬仞三襲九成亘繞州邑欵跨郊坰素煙晚帯白霧晨縈近循則一巖異色逺望則百嶺俱青觀二代之塋兆覩摧殘之餘隧成顛沛於虐豎康歛衿於虚器穆恭已於巖廊簡逰情於𤣥肆烈窮飲以致災安忘懐而受祟何宗祖之竒傑威横天而陵地惟聖文之纘武殆隆平之可至余世惪之所君仰遺封而掩淚神寢匪一靈館相距席布騂駒堂流桂醑降紫皇於天闕延二妃於湘渚浮蘭煙於桂棟召巫陽於南楚揚玉桴握椒糈怳臨風以浩唱折瓊茅而延佇敬惟空路邈逺神蹤遐濶念甚驚颷生猶聚沫歸妙軫於一乘啟𤣥扉於三達欲息心以遺累必違人而後豁或結橑於巖根或開櫺於木末室闇蘿蔦檐梢松栝既得理於兼謝固忘懐於饑渴或攀枝獨逺或凌雲髙蹈因葺茨以結名猶觀空以表號得忘已於兹日豈期心於来報天假余以大德荷兹賜之無疆受老夫之嘉稱班燕禮於上庠無希驥之秀質乏如珪之令望邀昔恩於舊主重匪服於今皇仰休老之盛則請㣲軀於夕陽勞蒙司而獲謝猶奉職於春坊峕言歸於陋宇聊暇日以翺翔棲余志於淨國歸余心於道場獸依墀而莫駭魚牣沼而不綱旋迷塗於去轍篤後念於徂光晚樹開花初英落蘂或異林而分丹青乍因風而襍紅紫紫蓮夜發紅荷曉舒輕風㣲動其芳襲余風騷屑於園樹月籠連於池竹蔓長柯於簷柱發黄華於庭菊氷懸塪而帯坻雪縈松而被埜鴨屯飛而不散鴈髙翔而欲下並時物之可懐雖外来而非假寔情性之所留滯亦志之而不能捨也傷余情之頽暮罹憂患其相溢悲異軫而同歸懽殊方而並失峕復託情魚鳥歸閑蓬蓽旁闕吳娃前無趙瑟以斯終老於焉消日惟以天地之恩不報書事之官靡述徒重於髙門之地不載於良史之筆長太息其何言羞愧心之非一愍塗賦結榜窮渚思臨長嶼情依舊越身經故楚彼長路之多端伊客心之無緒懽因循而易失悲由心而難拒此北海之信遼知余思之方阻日掩長浦風掃聯葭疉雲凝憤廣水騰華聼奔沸於洲嶼望掩曖乎煙沙依雲邊以知國極鳥道以瞻家免悽愴於羈離亦殷勤於行路歎余塗之屢蹇奚前芳之可慕憫國賦余生平之無立徒跅弛以自閒處圍城之惵惵得無用於行間對僚友而不怡咸悄顔而相顧畏髙衝之北擬壯激矢之南度駭潜師之夜過驚躍馬之晨呼矛森森而密竪旗落落而踈布時難紛其未已歲功迫其將徂育素蟣於𤣥胄垂葆髪於縵胡麗人賦有客弱冠未仕締交戚里馳騖王室遨遊許史歸而稱曰狹斜才女銅街麗人亭亭似月嬿婉如春凝情待價思尚衣巾芳踰散麝色茂開蓮陸離羽珮雜錯花鈿響羅幃而不進隱明燈而未前中步襜而一息順長廊而逈歸池飜荷而納影風動竹而吹衣薄暮延佇宵分乃至出闇入光含羞隱媚垂羅曵錦鳴瑶動翠來脱薄粧去留餘膩沾粧委露理鬢清渠落花入領㣲風動裾傷美人賦信美顔其如玉咀清哇而度曲思佳人而未來望餘光而躑躅拂螭雲之髙帳陳九枝之華燭虚翡翠之珠被空合歡之芳褥言歡愛之可永庶羅袂之空裁曽未申其巧笑忽淪軀於夜臺伊芳春之仲節夜猶長而未遽悵徙倚而不眠往徘徊於故處擬風賦若夫揺玉樹響金扉拂九層之羽盖轉八鳳之珠旂時巻瑶臺翠帳乍動佚女輕衣此盖羽客之仙風也桐賦龍門之桐逺望青葱專巖擅嶺或孤或叢枝封暮雲葉映晝虹抗蘭橑以棲龍拂雕窻而團露喧密葉於鳳晨宿髙枝於鸞暮合影陽崖標峯東陸俯結𤣥隂仰成翠幄乍髣髴於行雨峕徘徊於丹轂遶齊綵於碧林豈慚光於若木髙松賦鬱彼髙松栖根得地託北園於上邸依平臺而養翠若夫蟠株聳榦之懿含星漏月之竒經千霜而得拱仰百仞而方枝朝吐輕煙薄霧夜宿迷鳥羈雌露雖滋而不潤風未動而先知既捎雲於清漢亦倒景於華池輕隂蒙密喬柯布濩葉斷禽蹤枝通猿路聼騷騷於既曉望隱隱於將暮曖平湖而漾青綠拂繒綺而籠丹素於時風急壟首寒浮塞天流蓬不息明月孤懸檀欒之行可詠鄒枚之客存焉清都之念方逺姑射之想悠然擢柔情於蕙圃涌寳思於珠泉豈徒為善之小樂離繳之短篇若此而已乎愍衰草賦愍衰草衰草無容色憔悴荒徑中寒荄不可識昔時兮春日昔日兮春風銜花兮佩實垂綠兮散紅巖陬兮海岸氷多兮霰積布綿密於寒臯吐纖疏於危石彫芳卉之九衢霣靈茅之三脊風急崤道難秋至客衣單既傷簷下菊復悲池上蘭飄落逐風盡方知歲早寒流螢暗明燭鴈聲㫁裁續霜奪莖上紫風銷葉中緑秋鴻兮疏引寒烏兮聚飛徑荒寒草合草長荒徑㣲園庭漸蕪沒霜露日霑衣天淵水鳥應詔賦天淵池鳥集水漣漪單泛姿容與羣飛時合離將鶱復歛翮迴首望驚雌飄泊出孤嶼未曽宿蘭渚飛飛忽云倦相鳴集池籞可憐九層樓光影水上浮本來暫止息遇此遂淹留若夫旅浴清深朋翻迴曠翠鬛紫纓之飾丹冕綠襟之狀過波兮湛澹隨風兮迴漾竦臆兮開萍蹙水兮興浪反舌鳥賦咨𤣥造之大德播含靈於無小有反舌之微禽亦班名於庶鳥乏佳容之可翫因繁聲以自表其聲也驚詭噂囋縈紆離亂駢浮迴合嵒危𤨏散或發曲無漸或收音去半既含意於將曉亦流妍於始旦雜沓逶迤噭跳參差攅嬌動葉促囀縈枝分宫析徴萬矩千規因風起哢曳響生竒對芳辰於此月屬今余之遵暮倦城守之諠疲愛田郊之閒素眷春物而懷之聞好音於庭樹詔改天監元年恩詔門下五精逓襲皇王所以受命四海樂推殷周所以改物雖禪代相舛遭㑹異峕而微明迭用其流逺矣莫不振民育德光被黎元朕以寡闇命不先後寧濟之功屬當期運乗此時來同心萬物遂振厥弛維大造區夏永言前蹤義均慙惪齊氏以代終有徴厯數云改欽若前載集大命於朕躬顧惟菲德辭不獲命寅畏上靈用膺景業執禋柴之禮當與能之祚繼述百王君臨四海若涉大川罔知攸濟洪基初兆萬品權輿思俾慶澤覃被率土可大赦天下改齊中興二年為天監元年賜民爵二級文武加位二等鰥寡孤獨不能自存者人穀五斛逋布口錢宿債勿復收其有犯鄉論清議贓汙淫盜一皆蕩滌洗除前注與之更始長從敕繫之身特皆原遣亡官失爵禁錮奪勞一依舊典南郊恩詔門下卜日禋饗政道莫先厚下布澤哲王是務朕仰祗靈眷俯臨億兆歲象迴環恭事亡及牲玉必薦感敬偹申升煙燎於穹昊致精誠於太一思霑颽潤惠兹窮生應天監三年内犯奪勞及左降可悉原降繼市職不充人身及家口質繫悉散還私家督偹前歲三五犯譴因及隨曹景宗授司州委叛應謫役者並量所蠲降尚書所檢巧陳淫辭普更開恩百日各聼自首不問往罪京師三縣尤窮之民詳加賑恤主者速條格施行又門下朕肅膺乾貺君臨率土雖日晏劬勞而仁恕未洽星琯驟迴履端告始禋饗云偹誠敬兼申宣和布澤情深待旦凡内外文武可各賜勞一年叛亡未擒若百日内自首還役不問往罪女子質繫悉且散遣文書輕重坐罪並皆從原主者詳為條格疾速施行又朕昧爽夙興念兹理道而明不燭逺𢎞之未易仰尋先烈思致升平自頃多故戎車代有軍政國容事緒非一刑體叅用未臻和簡向隅之情永言増歎今郊禋載洽幽明允從思崇嘉祉被之兆庶可大赦天下主者施行立太子恩詔朕屬當期運係迹前王思所以長世流祚垂之萬葉百辟咸以元良之寄有國莫先自昔哲后降及近代莫不立儲樹嫡守器承祧乃旁挹羣議逺惟七百建兹䝉稚仰副宗祊承華肇開崇基克永無疆之慶非獨在余思霑渥澤被之遐邇可賜天下為父後者爵一級王侯以下量錫幣帛又門下朕夙纉璿祚君臨四方夕惕寅畏若寘淵谷思所以光闡洪基克隆鼎命王公卿士咸以為樹元立嫡有邦所先守器傳統於斯為重是用俾兹幼䝉體乾作貳永固宗祀以貞萬國元良之寄非獨在余宜令嘉慶被之億兆可大赦天下賜民為父後者爵一級主者速施行立内職詔刑于垂訓周文所以表德壼闈失序漢氏所以喪邦並被諸方冊式昭戒勸魏晉以來雖云簡簿而内職名號叅差不同在宋太始位置繁冗遂設九品且擬外朝填委椒掖徴費無已自此相承踵以成舊昭陽九華千門萬戸朕受命自天始基七百思所以立防自邇貽厥將來前代職品所宜因革外可詳議務令該允使四方士民陳刑政詔徑寸之寳或隠泥沙以人廢言君子斯戒朕聼朝晏罷思闡政術雖百辟卿士有懐必聞而蓄響邊遐未臻魏闕或屈以貧陋或間以山川頓足延首無因奏逹豈所謂沈浮靡漏逺邇兼得者哉四方士民若有欲陳言刑政益國利民淪礙幽逺不能自通者各詮條布所懐於刺史二千石有可申採大小以聞勸農訪民所疾苦詔為齊帝作門下執耜蹔蹇則如懸比室秉機或惰則無褐終年非怠非荒雖由王道不稂不莠實賴民和頃歲多稼無爽遺秉如積而三登之美未臻萬斯之基尚逺且風土異宜百民殊務刑章治緒未必同源妨本害政事非一揆冕旒屬念無忘夙興可嚴下州郡務滋耕殖相畆闢疇廣開地利深樹國本克阜民天又詢訪獄市博聼謡俗傷風損化各以條聞無使瘥瘼之苦載興比屋主者詳為科格稱朕意焉捜隠逸詔髙尚其志義煥通爻山林不出訓光惇史朕聼朝晏罷尚想幽人蒲玉之禮佇聞峻節可班下州郡博訊逺近若有道映邱園事孚髙尚可以弭競遷澆還風拯俗皆以名聞靡或遺漏朕將闢衢室而寘几杖開東序而授衮職庶令江海無遺異人必至酬荆雍義士詔昔義舉之初人懐自竭輸賦罄産同致厥誠言念一槩思有所酬其雍荆郢三州有獻物助軍國者外可詳加蠲報赦詔為齊帝作門下朕肅纂乾統思𢎞祖業方欲克廣法猷寧濟遐邇實頼羣才共康世務至於股肱宗戚情委特隆垂拱責成緝熙是寄而各包藏禍心規縱醜逆朕每存容隠冀或能悛而靡懲前慝彌結後釁七百業艱宗廟事重不不得不垂涕行戮以義斷恩或藩屬皇宗或睦因近戚夫豈不懐社稷故也雖四門已穆羣㓙靡餘而泣辜之歎義兼自昔方勵精思治登賢任官隆平之化庶從兹始宜播嘉惠咸與維新可大赦天下自今月二十日昧爽已前謀反大逆手殺人以下皆赦除之頃歲軍旅繁興叛征者衆其質繫家屬及同伍代役三署見徒詳所由原遣主者施行又門下王室多難祲沴相仍昔歲紛阻鋒交九逵今兹狂煽兵連萬雉時亊屯厄罕有斯逆故今迷疑互起向背者多元惡既懸猜懼彌廣奔亡草澤自反莫因近雖曲赦與之更始而愚昧之徒猶多竄伏且遏冦未夷役連遐邇刑政弛張陷罪非一思所以曠敷嘉恵被之億兆可大赦天下凡與崔慧景協契同謀首為奸逆爰及降叛輸力盡勤良由世道交喪流源浸逺風槩靡立以至如斯悉加蕩滌一無所問凡諸反側咸與維新並加宣慰還復民伍國信之明皎如日月榜勒畿要咸使聞知惟崔慧景諸子不在赦例主者施行立左降詔刑乖政失其源巳久罰罪之奏日聞於蚤朝弊獄之書亟勞於晏寢免黜相係補代紛紜一離諐囚乃永歲月非所以棄瑕録用隨分盡才者也是故減秩居官前代通則貶職左遷往朝繼軌自今内外羣司有事者可開左降之科降死罪詔朕樹洪業光宅區宇而本枝之慶未廣椒掖滕衞之地猶闕藩屏言念弓韣不能忘懐策三子始有磐石之資於焉彌固慶雖自已恩加覃及凡死罪可降一等五歲刑降二等三歲刑以下並悉原放沈文季加侍中詔為齊帝作門下散騎常侍尚書左僕射西豐縣開國侯新除鎮軍將軍沈文季業宇流正鑑識超凢秉兹恭恪誠著匪躬難起非慮宻邇墉圻罄力盡勤萬雉増固寵服攸加實為朝典可侍中僕射新除侯如故主者速施行崔慧景加侍中詔為齊帝作門下䕶軍將軍樂安縣開國子慧景志氣淹通識履詳正誠烈欵盡義簡朕心加榮近侍抑惟朝序可加侍中子如故主者速施行授蕭恵休右僕射詔為齊帝作僕文苑英華云左射誤門下尚書萬事之本隆替是寄總司頓闕宜速有人征虜將軍吳興太守建安縣開國子蕭惠休才學淹通識裁詳允内著嘉庸外敷美政入副朝端僉議斯任可守尚書右僕射餘如故主者施行授王亮左僕射詔為齊帝作門下朝端任重刑政斯出自非民望時宗莫諧兹舉通直散騎常侍吏部尚書領太子左衞率王亮器識夷逺風鑒清奥賛務釐朝庶績惟允宜崇名器以副具瞻可尚書左僕射主者速施行王亮王瑩加授詔為齊帝作門下京輔蕐貫端副要重政首民經任切朝寄尚書左僕射亮濬哲淵深道風清邈時棟民譽僉望所歸中領軍南徐州大中正南鄉侯瑩徳宇夷曠鑑識凝逺闕協隆内外允諧逆徒從慝躬衛時難氛祲既澄並宜光賛緝熙穆兹景化亮可侍中丹陽尹瑩可侍中尚書左僕射本官中正侯並如故主者施行臨川王子晉南康侯子恪遷授詔為齊帝作門下侍中臨川王子晉志業清敏器尚夷通秘書監右領軍南康縣開國侯子恪理識閑悟思懐韻警宜出聞朝政入侍帷幄子晉可左民尚書子恪可侍中王侯並如故主者速施行王茂加侍中詔門下居中作衛號望清重任總儲宫朝難其選望蔡縣開國公新除尚書右僕射茂器度淹𢎞志局詳穏契濶艱夷情深恒寄顯命載加允副僉屬可侍中衛将軍領太子詹事開國公如故給鼓吹一部主者施行資給何㸃詔逺趣髙情前王所貴義兼昔欵倍用興懐徵士何㸃居貞物表縦心塵外夷坦之風率由自逺往因素志頗申宴言眷彼子陵情兼惟舊昔仲虞邁俗受俸漢朝安道逸志不辭晉禄此盖前代盛軌往賢所同可詳加資給並出在所日費所資須太官别給既人髙曜卿故事同垣下封授臨川等五王詔門下神州帝城冠冕列岳渚宫樊鄧形勝是歸居中作衛翌宣戎重隆名寵號寔允舊章並非親勿居惟賢斯授西中郎将䕶軍宏朕之介弟早富徳譽董一藩政緝是嘉庸國禮家情瞻寄隆重使持節督南徐兖二州諸軍輔國将軍南徐州刺史秀風頴雋邁識業標簡任居藩翰政以化成使持節都督雍梁南北秦四州諸軍事冠軍将軍寧蠻校尉雍州刺史偉體韻淹穆神㝢凝正經綸夷險叅贊王業冠軍右衛将軍恢神檢外洽淵量内湛奉職鈎陳周衛以穆使持節督荆湘益寧南北秦七州諸軍事安西将軍荆州刺史憺秀識冲情允文允武經啓王業寔有厥勤並契濶綢繆分形並氣處家盡其匪躬朕承運迭興光宅四海藩維廣樹經朔攸屬出納之宜望實惟允宏可使持節散騎常侍都督揚南徐州諸軍事後将軍揚州刺史封臨川郡王秀可進號征虜将軍餘官如故封安成郡王偉可使持節散騎常侍都督雍梁荆寧南北秦六州郢州之竟陵司馬之隨郡諸軍事寧蠻校尉雍州刺史将軍如故封建安郡王恢可侍中前将軍領石頭戍事領兵景佐封鄱陽郡王憺可使持節都督荆湘益寧四州諸軍事平西将軍荆州刺史封始興郡王食邑各二千戸劉領軍封侯詔為齊帝作門下南國是式事昺興周原鹿啓土義昭洪漢領軍舅親德之重朝野式瞻在昔中興任推心膂哀疚眇然未堪多難允賴徽猷嗣隆寳業及釁起不虞咫尺宫禁内叅嘉謨外宣戎畧宻勿劬勞誠力備盡宗社克固寔倚髙謨無言不讐無德不報况忠勲至戚義兼於此者乎宜錫圭裂壤允副僉屬可封開國縣侯食邑二千尸主者施行王亮等封侯詔為齊帝作門下尚書左僕射亮中領軍南鄉侯南徐州大中正瑩守吏部尚書志並時宗民秀徽望允集協贊朝機彛倫是寄秉文經武任惟腹心方賴嘉謨克弭時難宜疏爵建社與國同休亮瑩可各封一千五百戸開國縣侯本官中正如故志封千尸開國縣侯本官如故主者速施行常僧景等封侯詔為齊帝作門下廬陵王中兵叅軍事宣閣将軍軍主新除右軍常僧景車騎江夏王叅軍事宣閣将軍新除右軍中郎将薛元嗣安東廬陵王叅軍事振武将軍徐元稱假寧朔将軍廬陵王國侍郎延明主帥殷係宗前軍将軍宣閤格虎隊主馬廣或氣畧强果或志識貞濟或忘家奉國誠著夷險方寄戎昭克清時難宜命爵啟土以奨厥勞可封一千戸開國縣侯本官新除驅使悉如故主者施行封三舎人詔為齊帝作門下輔國将軍驍騎將軍南髙平太守兼中書通事舎人沈徽孚給事中驍騎將軍臨淮太守兼中書通事舎人王咺之寧朔将軍南濮陽太守兼中書通事舎人裴長穆並以素胄清才服勤禁省契濶劬勞自頃多難軍國務殷内叅帷幄外濟師旅忠䂓欵志義感朕心宜錫茅社同莅賞冊可封三百戸開國縣伯本官郡驅使並如故主者速施行封申希祖詔為齊帝作門下持節督司州諸軍事冠軍將軍司州刺史申希祖志氣沈隠才畧開濟在昔多難任叅心膂爰及中興忠欵彌著契濶艱虞盡其心力逮獯獫侵斥武節颷騰殘冦外殄危城獨困休庸茂績朕有嘉焉宜錫茅土以酬勤烈可封開國伯食邑五百戸本官如故主者施行封李居壬等詔為齊帝作門下新除太子左衛率軍貞主李居壬志識開敏器懐貞濟盡力禁門誠著夷險新除太子右衛率軍主潮陽縣開國男胡松性業詳固才用果烈新除都督青冀二州諸軍亊寧朔將軍青冀二州刺史栢和剛正欵率屢著勤効新除左中將軍主鴻選氣質强果秉心壯宣並反斾南轅以赴危難身先士卒剪此鯨鯢功勤碩茂宜隆賞典居壬可封一千戸開國縣侯松可増封為七百戸和可封五百戸門國縣伯選可封三百戸開國縣男新除持節刺史將軍主男並如故主者施行封徐世檦詔為齊帝作門下驍騎將軍彭城令徐世檦才畧貞濟志懐義烈忠節内欵勲勤外著禦侮折衝任惟心膂頃姦慝潜煽危機驟發夷㓙弭難實有力焉宜命賞疇庸錫之土宇可封開國縣子食邑三百戸封左興盛等詔為齊帝作門下逆豎王敬則縦兵内侮陵斥畿甸輔國將軍前軍將軍事左興盛直閤將軍劉山陽受律前驅焱勇爭路或衡至首斾或陷懸中麾元惡梟至氛梗載廓賞不踰時義𢎞前典可封開國男食邑二百戸并進位一階主者速施行勑梁武帝踐祚與州郡勑欽惟邃古爰及近代雖禪代異時而成功一揆豈惟静民寧亂實由符運總集故能啟業垂統光宅區夏齊氏遘兹昏詖斯亡奄及民命蠢蠢倒懸非喻朕大懼四海舟覆二象雲傾億兆與崑崗並燎縉紳與蘊崇共日永言悽悼發憤經營推鋒投袂電擊風埽藉上天之靈因熊羆之用德未半古功侔前烈齊氏既欽若虞夏髙揖萬邦兼以㝠符先著樂推攸在幽顯宅心辭不獲命猥以虚寡君臨萬國川壑之懐寤寐盈慮方欲昧旦丕顯日昃忘勞思與賢能康濟世道卿擁旄萬里共治是寄當求民瘼留念獄市威斷以御强猾仁惠以撫貧孤使逺近幽深咸得其所方虚位欽能懸爵佇効勿令漢代璽書獨行於自古晉世班條靡用於兹日想加克勉副其側席與謝朏勑吾以菲德屬當期運鑒與吾言思隆治道而明不逺燭所蔽者多實寄賢能匡其寡闇嘗謂山林之志上所宜𢎞激貪厲薄義等為政自居元首臨對百司雖復執文經武各修厥職羣才競爽以致和美而鎮風静俗變教論道自非箕潁髙人莫膺兹寄是用虚心側席屬想清塵不得不屈兹獨往同此濡足便望釋蘿襲衮出野登朝必不以湯有慙德武未盡善不降其身不屈其志使璧帛虚往蒲輪空歸傾首東路望兼立表羲軒邈矣古今殊事不獲總駕崆峒依風問道今方復引領雲臺虚已宣室紆賢之愧載結寢興與何𦙍勑吾猥當期運膺此樂推而顧已多蔽昧於治道雖復劬勞日昃思致隆平而先王遺範尚藴方䇿息舉之用存乎其人兼以世道澆暮爭詐繁起政俗遷風良有未易自非以儒雅𢎞朝髙尚軌物則泪流所至莫知其限治人之與治身獨善之與兼濟得失去取為用孰多吾雖不學頗好博古尚想髙塵毎懐擊節今世務紛糺憂責是當不得不屈道巖阿共成世美必望深達往懐不􅈔濡足制授蔡法度廷尉制門下民命所懸繫乎三尺止殺除殘實由乎此是以臯陶作士五刑惟明于張蒞官世無寃獄且漢代律書出乎小杜吳雄以三世法家繼為理職郭恭以律學通明仍業司士爰及晉氏此風未泯叔則元凱並各名家自兹厥後斯尚漸薄迄至於今損棄頓盡衣冠士子恥復用心州郡姦吏恣其取捨舞文弄法非止一塗朕膺天受命為兆民主每一念此忘寝與食尚書刪定左曺郎中蔡法度少好律書明曉法令世之所廢篤志不怠至於章句踳滯名程乖礙莫不斟酌厥衷允得其門方欲寄以國刑開示後學㧞才取士豈有定方自世道澆流浮偽雲起量計多少辯校錐刀若遵往従舊守而勿失豈所以軌儀上世垂風于後宜加褒擢弗繫常階可守廷尉卿主者施行授王繢蔡約王師制為齊帝作門下冠軍將軍司徒左長史始平縣五等男繢華宗冠胄器質詳和都官尚書約清源素範體業倫正訓兹蕃國僉議攸在繢可隨郡王師加散騎常侍男如故約可零陵王師加給事中主者速施行疏修定樂書疏竊以秦代滅學樂經殘亡至於漢武帝時河間獻王與毛生等共採周官及諸子言樂事者以作樂記其内史丞王定傳授常山王禹劉向校書得樂記二十三篇與禹不同向别錄有樂歌詩四篇趙氏雅琴七篇師氏雅琴八篇龍氏雅琴百六篇唯此而已晉中經簿無復樂書别錄所載已復亡逸按漢初典章滅絶諸儒捃拾溝渠牆壁之間浮片簡遺文與禮事相闗者即編次以為禮記非皆聖人之言月令取吕氏春秋中庸表記緇衣皆取子思子樂記取公孫尼子檀弓殘雜又非方幅典誥之書也禮記是行已經邦之功故前儒不得不補綴以備事用樂書事大而用緩自非逢欽明之主制作之君不見詳議漢氏以来主非欽明樂既非人臣急事故言之者寡陛下以至聖之德應樂推之符實宜作樂崇德殷薦上帝而樂書淪亡尋案無所宜選諸生分令尋討經史百家凡樂事無大小皆别纂錄仍委一舊學撰為樂書以起千載絶文定大梁之樂使五英懐慚六莖興愧論譜籍疏晉咸和初蘇峻作亂文籍無遺後起咸和二年以至於宋所書並皆詳實並在下省左戸曹前廂謂之晉籍有東西二庫此籍既並精詳寔可寳惜位宦髙卑皆可依案宋元嘉二十七年始以七條徴發既立此科人姦互起偽狀巧籍歲月滋廣以至于齊患其不實於是東堂校籍置郎令史以掌之競行姦貨以新換故昨日卑細今日便成士流凡此姦巧並出愚下不辨年號不識官階或注隆安在元興之後或以義熙在寧康之前此時無此府此時無此國元興唯有三年而猥稱四五詔書甲子不與長歴相應校籍諸郎亦所不覺不才令史固自忘言臣謂宋齊二代士庶不分雜役減闕職由於此竊以晉籍所餘宜加寳愛議乗輿升殿疏正㑹儀注御出乗輿至太極殿前納舄升階尋路寢之設本是人君居處不容自敬宫室按漢氏則乗小車升殿請自今元正及大公事御宜乗小輿至太極階仍乗版輿升殿表上宋書表臣約言臣聞大禹刋木事炳虞書西伯勘黎功煥商典伏惟皇基積峻帝烈𢎞深樹徳往朝立勲前代若不觀風唐世無以見帝媯之美自非覩亂秦餘何用知漢祖之業是以掌言未記爰動天情曲詔史官追述大典臣實庸妄文史多闕以兹不才對揚盛㫖是用夕惕載懐㤀其寝食者也臣約頓首死罪竊惟宋氏南面承歴統天雖世窮八主年減百載而兵車亟動國道屢屯垂文簡牘事數繁廣若夫英主啟基名臣建績拯世夷難之功配天光宅之運亦足以勒銘鐘鼎昭被方策及虐后暴朝前王罕二國釁家禍曠古未書又可以式規萬葉作鍳于後宋故著作郎何承天始撰宋書草立紀傳止於武帝功臣篇牘未廣其所撰志唯天文律厯自此外悉委奉朝請山謙之謙之孝建初又被詔撰述尋值病亡仍使南臺侍御史蘇寳生續造諸傳元嘉名臣皆其所撰寳生被誅大明中又命著作郎徐爰踵成前作爰因何蘇所述勒為一史起自義熙之初訖於大明之末至於臧質魯爽王僧逹諸傳又皆孝武所造自永光以來至於禪讓十餘年内闕而不續一代典文始末未舉且事屬當時多非實錄又立傳之方取捨乖衷進由時㫖退傍世情垂之方来難以取信臣今謹更創立製成新史始自義熙肇號終於昇明三年桓𤣥譙縦盧循馬魯之徒身為晉賊非闗後代吳隠謝混郗僧施義止前朝不宜濫入宋典劉毅何無忌魏詠之檀憑之孟昶諸葛長民志在興復情非造宋今並刋除歸之晉籍臣逺愧南董近謝遷固以閭閻小才述一代盛典屬辭比事望古慙良鞠躬跼蹐靦汗亡厝本紀列傳繕寫已畢合志表七十巻臣今謹奏呈所撰諸志湏成續上謹條目錄詣省拜表奉書以聞臣約誠惶誠恐頓首頓首死罪死罪上注制㫖連珠表竊尋連珠之作始自子雲放易象論動模經誥班固謂之命世桓伊以為絶倫連珠者盖謂辭句連續互相發明若珠之結排也雖復金鑣互騁玉􅋴並馳妍媸優劣參差相間翔禽伏獸易以心威守株膠瑟難與適變水鏡芝蘭隨其所遇明珠燕石貴賤相懸為栁世隆上銅表夫幣以周務貨以賑民阜國康治莫尚乎此周氏致平始於圜法漢世㡬措資於貫朽名罏化金良工盡藝方將盈金中藏收功上苑南楚陋其方府西京鄙其部内上建闕表恭惟哲后舊章必修眇矚前王復古為貴伏惟陛下欣咨故實率由令典昔在有晉經創江左邦訓莫釐逺圖多缺萬雉之外兩觀弗興空指南峰懸法無所世厯三代年將二百非所以經世成務垂業後昆天德圓應憲章自逺宜詔匠人建兹象闕俯藉愛禮之心以申子來之願式表端闈儀刑萬國使觀風而至復聞正歲之典遐想之士少寄懐古之目為栁兖州世隆上舊宫表舊宫蘊靈千古合祥百代萬祗相祉八神警室事超齊甸義邁譙宫故能屬輦道於天階命帝闕於霄路實宜樹闕疏壤寫極上穹克播徽塵永光盛烈舉胡元秀表竊惟經邦御逺雖待大賢摧鋒犯鏑亦資小用伏見錢塘新城主胡元秀早歲驅馳意幹强果矛盾之用氣凌百夫若置之六師之間處之一旅之上必能前奮獷敵却沮强胡臣實弱懦不窺武節昧妄輕言伏懐悚懼薦劉粲表陛下則天開業冠帯要荒輶軒韋轂交軫於遐路捨築投竿相望於魏闕或以開坼未採管庫遺賢執㦸忘疲倚輈不息與沈淵薦沈驎士表吳興沈驎士英風夙挺峻節早樹貞粹禀於天然綜博生乎篤習家世孤貧藜藿不給懐書而耕白首無倦挟琴採薪行歌不輟長兄早卒孤姪數四攝尫鞠稚吞苦推甘年踰七十業行無改元嘉以来聘召仍疊玉質踰潔霜操日嚴若使聞政王庭服道槐掖必能孚朝規於邊鄙播聖澤於荒垂為栁世隆讓封公表臣聞懸旌玉塞貳師尚黜其功伐鼓炎州伏波猶懼其賞徒以兼委之施或難固辭抽心之情必無雙奪是故俛容青閣願還慈於裂壤竊步丹墀希收寵於開賦昔竄命窮雉難迫勢孤沈板未難負戸非切及顧溫清之館懼結尊慈之懐累葉喁喁舉門惴惴臣事逼君親理非外奨實賴朝謨謹肅宰畧遐震奔鯨外剿臣何力焉幸得扶老携弱重出幽堵還軸歸驂再踐鄉路豈可資國𤯝以邀其功因衆功而饗其報遂使甘霜受電之心有同扵餙請皎日大河之志匪殊於貌謁為褚炫讓吏部尚書表惟𤣥素未辨必謬朱紫之察規矩或昧理喪方圓之功東西兩漢左雄孤絶於前南北二晉山濤莫嗣於後良由性藏於貌才隠乎心楚越無以况其逈殊山川未足方其險阻雖復拂暗為明勉愚生智亦何以登竒援異離渭分涇為南郡王讓中軍表臣聞建侯茂則非賢罔樹分器鴻典惟懿實先而臣挹道未𢎞踐義多缺徒升國彛空襲宸寵光珪華組晻藹于闗垂令采徽猷寂寥於甸表晨伸委帯夕軫臨顔皇衢肇啟鼎運始資魯衛兼啟義邈周年齊楚並建禮髙漢日臣以末第聨輝上序祐履荆阿懐璽夣曲拊志惟熏佩握如𢷬為始興王讓儀同表徒塵翠幄方䧏紫泥以兹上令用隔下情况髙擬萬石爰均八命室等天潢服加黼黻出則髙陪千乗入則仰司百揆陛下道苞九舜明出十堯萬徽必理一物興念有紆𤣥鏡暫垂止水讓僕射表臣聞役壯休老上典所優晨行暮息事身恒分若夫𤣥黄未已非秋駕之衛筋力為用豈强飯之時飬老杖鄉抑推前典服戎告謝親學匪任宿肉極其虚憊歲制防其不辜寔所以蠲假衰疾收屏淪暮讓五兵尚書表臣聞百舎之趙非宿舂所資千里之越豈一葦能泝何者装輕適於路逺舟弱疲於濟深醜貌悴容不藉鍳於淄水駑足蹇步終取躓于鹽車為皇太子謝表臣實䝉稚溫文以闕不閑三善之訓未習四學之儀雖問安内豎因心自發而視膳寝門未任再至乃降皇慈夙膺盛典貳體宸極守器宗祧顧循幼志如臨氷壑為長城公主謝表奉策書封妾為長城縣公主徽命䧏臨慙腆妄寘妾膺靈禀氣育景璇閨弱志易淪柔德難樹雖復式修姆保莫敢或遑而肅雍不著穠華盖闕不悟宸暉曲漸彛章夙賁籍此恩加遽延典策湯沐光啟珩緄昭被謝封建昌侯表陛下投袂萬里拯厥塗炭臣雖心不吠堯而迹淪桀犬此則王業始基臣所不與徒荷日月之私竟無蒸燭之用天命𤣥鳥非止今日受命作周其來久矣雖復備數樂推與同謳頌而誠㣲弱草效闕纎塵遂班山河之誓叨佐命之賞亦何以慰悦帷帳酬報爪牙謝毋封建昌國太夫人表伏見詔書以臣毋封為建昌國太夫人慶溢蓬門榮流素族恭荷屏營罔識攸寘臣禀訓私閨志塗靡立勉以為義誠有由然輸力致身曽無萬一天慈罔已至徳彌光探其私志䧏此洪澤榮親之至始自㣲臣率斯道也方流萬物草卉輕命固莫云酬到著作省謝表臣約言即日被召以本官兼今職臣藝不博古學謝專家乏懐鉛之志慙夢腸之術聨事乖善握蘭慚良謬勒斷蛇之符預刋氷河之業路遥難騁才弱未勝而神工曲造雕絢彌疊珥筆史觀記言文府趨奉載揚腆懵交顔拜尚書令到都謝表竊位之譏允當斯責王命私請有事相傾油雲湛露徒降旻昊之德弱縞輕蟬不載山嶽之重登階望席恍焉失步謝立皇太子賜絹表臣聞重離在天八紘之所共仰明兩作貳萬國所以咸寧太子體岐弱載表睿沖茂典冊既升休祚方逺率土合歡遐邇均忭天情載洽慶賜必周幣帛嘉貺猥班庸劣謝賜新厯表竊惟觀斗辨日馭生為本審時分地稼政莫先何則勝殺無斘拘忌之理難忽珠璧有徵禮節之原攸序致仕表徒以桑榆無㡬時制行及不朝之禮忽在今辰使反身敝廬待終窮巷臣又聞之懸車􅄆髪其来舊矣昔廣德請骸義在量力二疎知止懼貽後悔數年已來稍就盡竭氣力衰耗不自支持若蒙天地大㤙造物洪施拯其隆滿之切救其害盈之災譬彼日昃假榮終朝踟蹰夕景少觀盛化宅壤歸泉自無云㡬祈仁仰澤事止寸隂臨終遺表臣約言臣抱疾彌留迄今即化形神欲離月已十數窮椘極毒無言以喻平日健時不言若此舉刀坐劍比此為輕仰惟深入法門厲兹苦節内矜外恕實本人情伏願聖心重加推厲㣲臣臨途無復遺恨雖慚也善庶等鳴哀章為安陸王謝荆州章臣托景宸區早延休寵身班帝穆爵首藩圭好禮慚河敦詩愧楚懸斾出闗徒違綘闕摐金入濟識謝戎麾而照臨彌廣復叨匪服紀南形勝任總上游西緯岷卭北維崤陜六轡在手猶或稱難羣牧禀威兹道孰易是以攄情陛曲布欵幄垂霄途嚴逺事隔披照腆冐斯顔膺此謬荷祗奉兢據㒺知攸記為晉安王謝南兖州章臣以萊孱幼無秀業依天宅照藉海憑瀾王爵早加藩麾宿樹進不能閑詩西椘好禮北河退無以振采六條宣風萬里懐慙起懼載溢心顔而皇明輝燭照被彌逺遂乃徙斾淮區遷金濟服朱驂出邸青組臨方瞻惟徵寵俯仰亡厝為六宫拜章蓬閨菲質嘉淑無算越自幽衡登軀宸漢奉日月之華侍巾屣之末何以厠鴛鸞之盛序奉屬車之清塵彈文奏彈王源給事黄門侍郎兼御史中丞吳興邑中正臣沈約稽首言臣聞齊大非偶著乎前誥辭霍不婚垂稱往烈若乃交二族之和辨伉合之義升䧏窊隆誠非一揆固宜本其門素不相奪倫使秦晉有匹涇渭無舛自宋氏失御禮教彫衰衣冠之族日失其序姻婭淪雜罔計厮庶販鬻祖曽以為賈道眀目腆顔曽無愧畏若夫盛德之𦙍世業可懐欒郤之家前徽未逺既壯而室竊貲莫非皂𨽻結褵以行箕帚咸失其所志士聞而傷心舊老為之歎息自宸厯御㝢𢎞革典憲雖除舊布新而斯風未殄陛下所以負扆興言思清敝俗者也臣實懦品謬掌天憲雖埋輪之志無屈權右而狐鼠微物亦蠧大猷風聞東海王源嫁女與富陽滿氏源雖人品庸陋胄實參華曽祖雅位登八命祖少卿内侍帷幄父璿升采儲闈亦居清顯源頻叨諸府戎禁預班通徹而託姻好唯利是求玷辱流輩莫斯為甚源人身在逺輒攝媒人劉嗣之到臺辨問嗣之列稱吳郡滿璋之相承云是髙平舊族寵奮𦙍胄家計溫足見託為息鸞覔婚王源見告窮盡即索璋之簿閥見璋之任王國侍郎鸞又為王慈吳郡正閣主簿源父子因共詳議判與婚璋之下錢五萬以為聘禮源先喪婦又以所聘餘直納妾如其所列則與風聞符同竊尋璋之姓族士庶莫辨滿奮身殞西朝𦙍嗣殄滅武秋之後無聞東晉其為虚託不言自顯王滿連姻實駭物聼潘楊之睦有異於此且買妾納媵因聘為資施衿之費化充牀第鄙情贅行造次以之糾慝繩違允兹簡裁源即罪主臣謹案南郡丞王源忝籍世資得參纓冕同人者貌異人者心以彼行媒同之抱布且非我族類往哲格言薫蕕不雜聞之前典豈有六卿之胄納女於管庫之人宋子河魴同穴於輿臺之鬼髙門䧏衡雖自已作蔑祖辱親於事為甚此風弗翦其源遂開㸃世塵家將被比屋宜寘以明科黜之流伍使巳汚之族永愧於昔辰方媾之黨革心於来日臣等參議請以見事免源所居官禁錮終身輒下禁止視事如故源官品應黄紙臣輙奉白簡以聞奏彈孔稚珪違制啟假事臣聞禁憲有章士子攸慎守官有典觸網斯及葢所以崇威闡法下肅上尊謹按廷尉㑹稽邑中正臣稚珪厯奉朝班頻登要近九棘之任理無休謁冐制干聞實虧恒典恩許雖降所制不闗違犯之條猶合約黜且稚珪俯自内轄作士下闈通制明文日陳几案自踰規矩莫斯為甚臣等參議請以見事免稚珪所居官除中正官名輙下禁止奏彈奉朝請王希􅆅違假謹按奉朝請臣王希聃幸齒朝班私敬蓋闕休請有期曽無遄及違弛之諐允膺裁糾臣等參議請以見事免所居官輙下禁止奏彈御史孔橐題省壁悖慢事謹按奉朝請臺侍御史臣孔橐淺劣無聞謬列華省假攝去来仕子常務况東臯賤品非藉豐資旬日暫勞豈云卑辱而肆此醜言題勒禁省比物連類非所宜稱黜之流伍寔允朝憲臣等參議請以見事免橐所居官輙下禁止奏彈秘書郎蕭遥昌謹按兼秘書郎臣蕭遥昌盛戚茂年升華秘館淑慎之迹未彰違惰之容已及宜寘徽網以肅朝風請以見事免遥昌所居官奏彈王僧佑僧佑為太子中舎人在直屬疾不待對入輙去中丞沈約彈之肆情運氣不顧朝典揚眉濶步直轡髙驅修竹彈甘蕉文渭川長兼淇園貞幹臣脩竹稽首臣聞芟荑蘊崇農夫之善法無使滋蔓翦惡之良圖未有蠧苗害稼不加窮伐者也切尋蘇臺前甘蕉一叢宿漸雲露荏苒歲月擢本盈尋垂䕃含丈階縁寵渥銓衡百卉而予奪乖爽髙下在心每叨天功以為已力風聞籍聼非復一塗猶謂愛憎異説所以挂乎嚴網今月某日有臺西階澤蘭萱草到園同訴自稱雖慚杞梓頗異蒿蓬陽景所臨由來無隔今月某日巫岫歛雲秦樓開照乾光𢎞普罔幽不矚而甘蕉攅莖布影獨見鄣蔽雖處臺隅遂同幽谷臣謂偏辭難信敢察以情登攝甘蕉左近杜若江蘺依源辨覆兩草各處異列同欵既有證據羌非風聞切尋甘蕉出自藥草本無芬馥之香柯條之任非有松栢後彫之心盖闕葵藿傾陽之識馮藉慶㑹稽絶倫等而得人之譽靡即稱平之聲寂寞遂使言樹之草忘憂之用莫施無絶之芳當門之弊斯在妨賢敗政孰過於此而不除戮憲章安用請以見事徙根翦葉斥出臺外庶懲彼将来謝此衆屈啟賀齊明帝登祚啟竊惟皇源浚逺帝寳連暉基深慶厚道貫萬葉而鬱林凶德早樹行悖人經逖聼之所未書宗廟之殆如綴百靈聳動九服迴遑結后来之望思庇民之主日月以冀遐邇翹心伏惟陛下大聖在躬君德夙表龍章日綵煥若麗天納麓賔門道風遐被睿化神行無思不洽獄訟允歸天人戴仰屈飛龍之𦕈轡紆汾陽之逺情運堯心以臨億兆敷舜烈以膺寳命雖中宗之興殷道宣后之隆漢德異世同符千載一揆刑措之業方逺隆平之基在焉率土含欣懐生戴賴况臣早䝉覆潤夙荷恩靈踴躍外畿心不勝慶謹縃民和式流皇澤塗歌里抃載懐鳬藻上錢隨喜光宅寺啟伏惟中陽故里舂陵舊居夷漫滌蕩曽無遺築若使大教早流法遵二代開塔白水樹刹枌榆可以傳美垂跡迄今不朽送育王像并上錢燭等啟竊以無名無色理絶應感不身即身猶觀願力惟願燈明道成長為八喜之侣菩提無上永厠千子之蹤謝賜甘露啟約言左右徐儼宣勑垂賜法音寺松葉上甘露臣往年經見不過霑條而已時或凝結纔若輕霧未有玉聚珠聨光粲若是實由積仁上通𠖇德下䧏故能委華霄極雰被後彫慈㫖曲洽頒此祥賚不任欣荷謹以啟事謝以聞謝勑賜氷啟竊惟司寒輟響𦕈自前代凌室曠官厯兹永久聖功闡物逸典備甄窮深既採園池靡用有籍羔秬無災霜雹約又有謝賜交州㯽榔啟云龍編嘉實厥包遐逺謝賜軫綢絹等啟霜紈雪委霧縠氷鮮昔劉氏歸國未聞漢儲之禮曹植還蕃非䧏魏兩之賜恩逾枉道賁深束帛謝勑賜絹葛啟素采氷華絺文霜潔變溽暑於閨閤起凉風於襟袖謝齊竟陵王教撰髙士傳啟竊聞髙尚其事義光爻象賢者避世聲煥典墳豈徒激貪勉競澡身浴德而已爾乃大𢎞義訓百代通風是以梁鴻蘇伯記逺迹於前叔夜士安書髙塵於後雖去取異情羣畧殊軫而獨行必彰片言罔極貞操與日月俱懸孤芳隨山壑共逺明公得一含道體二居宗迹屈巖廊之下神逰江海之上愛竒商洛訪美東都盖欲隠顯齊功出處同致巢由與伊旦並流三辟與四門共軌肅奉明視思自罄勗謝齊竟陵王示華嚴瓔珞啟竊以六時雨散百氏雲興或事止褒刺或義單小辯莫不雕風煙之氣状流日月之英華明公該𤣥體玅凝神宙表廕法雲於六合揚慧日於九天因果悟其初心菩提證其後業陟無生之逺岸汎正水之安流受三逺十號之尊崇建四辨八聲之妙極法身與金剛齊固常住與至理俱存謝齊竟陵王示永明樂歌啟鳳綵鸞章霞鮮錦縟覿寳河宗未必比麗觀樂帝所逺有慚德雖日月在天理絶稱詠而徘徊光景不能自息謝竟陵王賚母赫國雲氣黄綾裙襦啟竊以積絲成綵散繭騰花巧擅易水之間價貴藂臺之下民受禄為飬霑荷彌深聖恩曲漸自葉流根複袖縕裾豈伊恒餙榮新之寵固難輕報謝女出門宫賜絹綺燭啟桓室金縷本非所議孟姬作具獨若未周慈澤曲臨珍華兼重製為美服隻綺易儔舉而不息三夜有待謝司徒賜北蘇啟曠阻隂山之外𦕈絶蒲海之東自非神力所引莫或輕至聖慈普洽遂遍芻薇停鑣懼喘既𢎞道於世務方駕四衢又興言於俗表為栁世隆謝賜樂游胡桃啟挺自禁園味逾井絡動物迴祗在㣲必應此乃胡羯奔逃吉之先見者也為東宮謝勑賜孟嘗君劍啟田文重氣狥名四豪莫及寳劍雄身故能威陵秦楚人髙事逺遺物足竒謹加玩服以深存古之懐為皇太子謝賜御所射雉啓輕鑾微動密翳徐張黃閒所彀矢無虚發南皮之獲未足稱工臣任惟守器事隔陪奉天慈曲降賜物頒禽荅釋法雲啓神本不滅久所服膺神滅之談良用駭惕近約法師殿内出亦䝉勑荅臣下一本懽受頂戴尋覽忘疲豈徒伏斯外道可以永摧魔衆孔釋兼𢎞於是乎在實不刋之妙㫖萬代之舟航弟子亦即彼論㣲厝疑覈比展具以呈也沈約呈書與徐勉書吾弱年孤苦傍無朞屬往者将墜於地契濶迍邅困於朝夕﨑嶇薄宦事非為已望得小禄傍此東歸歲逾十稔方沗襄陽縣公私情計非所了具以身資物不得不任人事永明末出守東陽意在止足而建武肇運人世膠加一去不還行之未易及昏猜之始王政多門因此謀退庶㡬可果託卿布懐於徐令想記未㤀聖道聿興謬逢嘉運往志宿心復成乖爽今歲開元禮年云至懸車之請事由㤙奪誠不能𢎞宣風政光闡朝猷尚欲討尋文簿時議同異而開年以来病増慮切當由生靈有限勞役過差總此凋竭歸之暮年牽策行止努力祗事外觀傍覽尚似全人而形骸力用不相綜攝常須過自束持方可僶俛解衣一卧支體不復相闗上熱下冷月増日篤取煖則煩加寒必利後差不及前差後劇必甚前劇百日數旬革帯常應移孔以手握臂率計月小半分以此推算豈能支久若此不休日復一日将貽聖主不追之恨冐欲表聞乞歸老之秩若天假其年還得平健才力所堪惟思是䇿答陸厥問聲韻書宫商之聲有五文字之别累萬以累萬之繁配五聲之約髙下低昻非思力所舉又非止若斯而巳也十字之文顛倒相配字不過十巧厯已不能盡何况復過於此者乎靈均以来未經用之於懐抱固無従得其髣髴矣若斯之妙而聖人不尚何邪此葢曲折聲韻之巧無當於訓義非聖哲立言之所急也是以子雲譬之雕蟲篆刻云壯夫不為自古辭人豈不知宫羽之殊商徴之别雖知五音之異而其中参差變動所昩實多故鄙意所謂此秘未覩者也以此而推則知前世文士便未悟此處若以文章之音韻同絃管之聲曲則美惡妍蚩不得頓相乖反譬猶子野操曲安得忽有嘽緩失調之聲以洛神比陳思他賦有似異手之作故天機啟則律呂自調六情滯則音律頓舛也士衡雖云炳若縟錦寧有濯色江波其中復有一片是衛文之服此則陸生之言即復不盡者矣韻與不韻復有精麤輪扁不能言之老夫亦不盡辨此答樂藹書丞相風道𢎞曠獨秀生民凝猷盛烈方軌伊旦憗遺之感朝野同悲永當刋石紀功傳華千載宜須盛述實允来談郭有道漢末之匹夫非蔡伯喈不足以偶三絶謝安石素族之台輔時無麗藻迄乃有碑無文况文獻王冠冕彛倫儀刑㝢内自非一世辭宗難或與此約閭閈鄙人名不入第歘酬令旨便是以禮許人聞命慙顔已不覺汗之沾背也答沈驎士書獨往之業雖聞前載髙塵逸軌罕或共時未嘗不拊袠興懐望古遐矚尊賢㧞俗遥然沉𠖇自逺幽貞之操義髙篆策雖蔣詡不窺城市鄭真名動京師何逺之有名山既鄉内所豐清川又坐卧可對不出戸庭而與禽尚齊美哉約少不自涯早愛蟲鳥逐食推遷未諧夙願冀幽期可托克全素履弋釣泉臯以慰閒暮則生平之心於此遂矣與范述曽論齊竟陵王賦書夫𦕈汎滄流則不識涯涘雜陳鐘石則莫辨宫商雖復吟誦環迴編離字滅終無所辨仰酬睿㫖微表寸長與陶𢎞景書先生糠粃流俗超然獨逺列霓羽帯總轡雲霞方當名書絳簡身逰𤣥闕憑星夕卧望日朝飡而至理深㣲曖焉難暏雖欲下風問道未知厥路若夫栖遲閒逺咀嚥瓊芝出入清都師友靈聖循崖反跡無缺惟心報王筠書覽所示詩實為麗則聲和被紙光影盈字夔牙接響顧有餘慚孔翠羣翔豈不多愧下情拙目毎佇新竒爛然總至懽興已盡㑹昌昭發蘭揮玉振克諧之義寧比笙簧思力所該一至乎此歎服吟研周流戀念昔時幼壯頗愛斯文含咀之間倐焉疲暮不及後進誠非一人擅美推能實歸吾子遲比閒日清覯乃申報博士劉香書生平愛嗜不在人中林壑之懽多與時奪日暮塗殫此心往矣猶復少存閒逺徴懐清曠結宇東郊匪云止息政復頗寄夙心時得休偃仲長游居之地休璉所述之美望慕空深何可髣髴君愛素情多惠以二賛辭采研富事義畢舉句韻之間光影相照便覺此地自然十倍故知麗辭之益其事𢎞多輙當置之閣上坐卧嗟覽别巻諸篇並為名製又山寺既為警策諸賢従時復髙竒解頤愈疾義兼乎此遲比叙㑹更共申析與約法師書周中書風趣髙竒志託夷逺真情素韻水桂齊質自接彩同栖年逾一紀朝夕聨事靡日暫違每受沐言休逍遥寡務何嘗不北茨㳺覽南居宴宿春朝聼鳥秋夜臨風匪設空言皆為實事音容滿目言笑在耳宿草既陳楸檟將合眷往懐人情不勝慟此生篤信精深甘此藿食至于歲時包篚每見請求凢厥菜品必令以薦弟子輙靳而後與用為歡謔其事未逺其人已謝昔之諧調倐成悲緒去冬今歲人鬼見分石耳紫菜愴焉興想淚下不禁指遣恭送以充蔬僧一飯法師與周情期契濶非止恒交覽物存舊彌當楚切痛矣如何往矣柰何弟子沈約和南序梁武帝集序文思安安欽明所以光宅日月光華南風所以興詠日角之主出自諸生鋭頂之君少明古學漢髙宋武雖闕章句歌大風以還沛好清談於暮年夫成天地之大功膺樂推之寳運未或不文武兼資能事斯畢者也我皇誕縦自天生知在御清明内發疏通外典爰始貴逰篤志經術究淹中之雅㫖盡曲臺之奧義莫不因流極源披條振藻若前疑往滯舊學罕通而超然直詣妙拔終古善發談端精於持論置壘難踰摧鋒莫擬有同成誦無假含毫興絶節於髙唱振清辭於蘭畹至於春風秋月送别望歸皇王髙宴心期促賞莫不超挺睿興濬發神衷及登庸厯試辭翰繁蔚牋記風動表議雲飛雕蟲小藝無累大道懐君人之大德有事君之小心為下奉上形於辭㫖雖宻奏忠䂓遺稾必削而國謨藩政存者猶多逮乎俯應歸運仰修乾錄載筆握簡各有司存如綸之㫖時或染翰暨於設虡靈囿愷樂在鎬鹿鳴四牡皇華棠棣之歌伐木採薇出車杕杜之讌皆詠志摛藻廣命羣臣上與日月爭光下與鍾石比韻事同觀海義等窺天觀之而不測逰之而不知者矣竊惟左史記言右史記事君舉必書無論大小况乎感而後思思而後積積而後滿滿而後言若斯而已哉謹因事立名隨源編次内典序尚矣哉羣生之始也義隠三藏之外事非二乗所窺自並識同奔隨縁受業人天異軌翾動殊貫苦樂翻回愚智相襲莫不宅火輪騖擬燄颷遷以寸隂之短晷馳永劫之遥路精靈起㐲萬緒千名如来發源恒品葢亦含生之一至於並首争馳斯固未或異也至於覆簣無始之初成功斷籌之末塗遥業逺妙軫遐長累明積慧靈覺獨曉巨相四八照曜於大千尊法二九包籠乎無外六度之業既深十方之功自逺濟物以權降魔匪力妙法輪轉甘露啟霏舟輿六趣津梁五道登四衢之長陌逰一乗之廣路斯既已事盈方等義滿神宣逮於大權協化對揚宗極狥物兆於慈悲亡身著乎非已行符四等道昇十地若乃靈性特逹得自懐抱神功妙力無待學成孤䇿獨騖莫知所限結習紛綸一隨理悟又有捐情屏慮身心靡欲厭生死之長勤眷寂滅而投軫遥然自得漏累煙銷且津心適道功非一業雖㑹理共源而萌情或異是故髙心邈行分路同趨忘懐屏欲殊塗一致或草礫身體投骸林澤内亡形相外馴兕虎或坐卧行立迹不違衆禪業定門造次無爽安忍與金石同固戒行與寳珠等色雖秋禽年至春鮪時登而耿介長蔬忡怛在念妙迹匪遐神塗宻邇有悟必通由之斯至故能藉智探虚乗心照理區區懐抱融然靡執俱處三界獨與神逰包括四天巻舒萬劫聞片議而陟道塲受一言而升彼岸長夜未開心闗自曉淹迴聖迹寢息神光既負橐以從師亦棲林以綜業足蹈慧門學通龍藏妙吼遐徹鸞音自逺若夫义跪運心期誠匪迹而導逹神功照啓未悟唱説之美義兼在斯暨九土殊風八方舛俗逰化所包事出𢎞奬皆足以遷光淨域登儀寳地並黜華剪飾破愛辭親鼓枻無生之流方軌俗表之路固已千佛摩頂七住齊功至夫清信士女植縁曠劫雖復容服未改而戒德内𢎞瞻毗耶而聳轡望波斯而迴軫駕四禪之𦕈𦕈汎八解之悠悠若乃十號尊崇三達靡礙雖法身非有而常住在躬能仁權迹四門既非悟道之始假滅雙樹寧有薪盡之窮而天人瞻慕髣髴興情雕金範玉圖容寫狀靈儀炫日寳刹臨雲或役鬼神之功或資髓腦之力製非人匠寳以合成莫不龍章八彩瓊華九色至乃齒髪傳靈衣履遺證聖迹彪炳日煥於閻浮神光陸離星繁於淨刹若乃乗此直心推誠闇往則半息可追一念斯至感降參差雲霏霧委此又昭被象譯輝映縑圖夫秉牘書事其流已逺葢所以彪著往迹煥述遐聲雖篆籀異文胡華舛則至于叶暢心靈抑揚訓義固亦内外同規人神一揆墳典丘索域中之史策本起下生方外之紀傳統而為言未始或異也而經記繁廣條流舛􅄆一事始末袠理巻分或詞義離斷或文字互出甫涉後條巳昩前覽尋源討流未知攸適雖精理瑩心止乎句偈而初悟始學致惑者多且中外羣聖咸載訓典雖教有殊門而理無異趣故真俗兩書逓相扶奬孔發其端釋窮其致撤網去綱仁惠斯在變民遷俗宜以漸至精粗抑引各有由然是故曲辨精靈棲心妙典伏膺空有之説博綜兼忘之書該括羣流集成兹典事以例分義隨理合功約悟廣莫尚於斯可以理求證成玅果若乃載司南之車猶稱靡惑服四照之草得用不迷况乎六馬同鑣萬流共貫日月經天方斯未已河海帯地夫豈足云葢人道之筌蹄羣生有悟於此也佛記序含靈萬品既非記牒所窮物物禀生豈伊積塵能計莫不起乎無理而至乎無生者也雖要終有地而原始莫聞自非靈照特逹宗極斯在則理閉機初鑚叩事絶非唯四果不議固亦十地罔窺邈乎悠夐有之而莫知所從者也如来覆簣爰始言登永路起滅迴還馳驟不息去来五道大千比之毫端往復三界祗劫未足稱逺積明累照念念不休離此生滅證成妙果固已空有兼謝豈徒齊遷魯變而已哉旻昊區區猶秉何言之稱至人無已寧以詞義為珍葢由萬感相扇昧明代起業假緣開事湏曉逹一音所吐無思不服義在狥物動非為已法吼震灑於無外甘露炳煥於龍宮開宗闡教致之有漸標四諦於鹿園辨百非於雙樹廓不二之法門廣一乗之長陌行迷復路弱喪知歸而因應回舛厥塗不一白毫所照遍刹土於恒沙七步降踐壅龍堆而攸被推極神道原本心靈感之所召跨無邉而咫尺縁之所乖面法城而不覩及像教云末經紀東流熱坂艱長寒山峻阻横書左字累萬方通剪葉成文重譯未曉自此迄今千祀過半靈迹稍啟名僧間出律藏方等行来漸至蘊乎西國未至者多雖法身常住之奥逺二諦三假之淵曠悟道求宗於斯可足而能仁體兹大聖實為本師悠悠羣品精靈所係迄于前因往業多所昧畧然神化應感參差互見又世胄名氏本國俗緣􅄆析衆部卒難討究神功妙力同出異名降胎求道寧止一相託生迦維本由權迹出自北門非悟法之始遍照東方豈通化之極適道巳来四十九載妙應事多宜加總緝共成區畛至於經像舊錄境刹遺記開勸之功於斯自逺大權𢎞曠亡身以濟物應真耿介標心非為已分蹤或異適未必同神塗詭互難以臆辨靈怪倜儻言語斯絶圖澄之龍見趙魏羅什之鳳集闗輔犍陀近逰京洛單開逺適羅浮雖迹與俗同而意無可察塗出玉門法座不逺七處九㑹峨然在目靈應肸蠁徧富延澤以西光景葳㽔多見天山之表有志竒僧每經逰厯神迹昭然咸有文注繁蕪舛雜實須裁整分五道扵人天設重牢於厚地各隨業力的焉不差此皆巻舒真俗終始名相其𤣥塗幽逺大則直至道場其徴證切近小則開勸晚學斯寔兼濟之方舟大悲之廣路雖復智昏視肉形窮尺棰緣動必應又况進于此者乎是以至聖慇懃每存汲引垂文見意貽厥將來皇帝行成無始道承曠劫十號在躬三逹靡礙屈兹妙有同此轉輪傷昏愍惑久迷正路悱發之徒空懐鑚仰條流緬曠事難總一志淺業勞迄用無就非所以闢彼四衢出之火宅者也乃詔中書侍郎虞闡太子洗馬劉溉後軍記室周捨博尋經藏捜採註説條别流分各以類附日少功多可用譬此名曰佛記凡三十篇其有感應之流事類相似止取其一餘悉不書或後死而更生陳説經見事涉杳㝠取驗無所亦皆靡載同之闕疑或憑人以言託想成夢尤難信曉一無所録若夫欲遐邇者必逺記所從欲悟道者必妙識所宗然後能允得其門親承音㫖未有不知厥路莫辨伊人膠目闇踐自與理合所以引彼衆流歸之一源可令莘莘含識望塗知往案砥矢而言歸不迴遑於岐路俾厥清信之士亦有取於此云約進啟云佛記序今謹以上呈詞義無取伏懐自恧謹啟碁品序奕之時義大矣哉體希微之趣含竒正之情靜則合道動必適變若夫入神造極之靈經武緯文之德故可與和樂等妙上藝齊工支公以為手談王生謂之坐隠是以漢魏名賢髙品間出晉宋盛士逸思爭流雖復理生於數研求之所不能涉義出乎㡬爻象未之或盡聖上聼朝之餘因日之暇迴景紆情降臨小道以為凝神之性難限入𤣥之致不窮今撰録名氏隨品詳書俾粹理深情永垂芳於来葉論七賢論嵇生是上智之人值無妄之日神才髙傑故為世道所莫容風邈挺特䕃映于天下言理吐論一時所莫能參屬馬氏執國欲以智計傾皇祚誅鉏勝已靡或有遺𤣥伯太初之徒並出嵇生之流咸已就戮嵇審於此時非自免之運若登朝進仕映邁當時則受禍之速過扵旋踵自非霓裳羽帯無用自全故始以餌术黄精終于假塗託化阮公才器宏廣亦非衰世所容但容貌風神不及叔夜求免世難如為有塗若率其恒儀同物俯仰邁羣獨秀亦不為二馬所安故毁行廢禮以穢其德﨑嶇人世僅然後全仲容年齒不懸風力麤可慕李文風尚景而行之彼嵇阮二生志存保已既託其迹宜慢其形慢形之具非酒莫可故引滿終日陶瓦盡年酒之為用非可獨酌宜須用侣然後成歡劉伶酒性既深子期又是飲客山王二公恱風而至相與莫逆把臂髙林徒得其逰放於野澤銜杯舉樽之致寰中妙趣固㝠然不覩矣自嵇阮之外山向五人止是風流器度不為世匠所駭且人本含情情性宜有所託慰悦當年蕭􅄆懐抱非五人之與其誰與哉辯聖論聖人葢人中之含明德盡照精粹凝𤣥者或三聖並時或千載寂蔑聖人遺情忘已常以兼濟為念若不登九五之位則其道不行非以黄屋玉璽為尊貴也文王造周而未集武王集之而未成周公雖無王録而父兄二聖之烈不可以不終若非表以聖功制禮作樂則太平之基不著二聖之美不彰孔子當無錄之運值自晦之時而云河不出圖洛不出書吾已矣夫欲以聖德示天下垂來世當仲尼在世之時世人不言為聖人也伐樹削迹于七十君而不一值或以為東家丘或以為喪家犬若不髙歎鳳鳥稱夢周公樂正雅頌各得其所則當世安知其聖人乎均聖論自天地權輿民生攸始遐哉𦕈邈無得而言焉無得而言因有可言之象至於太虚之空曠無始之杳茫豈唯言象莫窺良以心慮事絶及天地蕞爾來宅其中毫端之泛巨海方斯非譬然則有此天地已來猶一念也我之所久莫過軒羲而天地之在彼太虚猶軒犧之在彼天地齷齪之徒唯謂赫胥為逺何其𤨏𤨏為念之局邪世之有佛莫知其始前佛後佛其道不異法身湛然各有應感感之所召跨大千而咫尺縁茍未應雖踐跡而弗覩娑婆南界是曰閻浮葱嶺以西經塗宻邇縁運未開自與理隔何以言之夏殷已前書傳簡寡周室受命經典備存象寄狄鞮隨方受職重譯入貢總括要荒而八蠻五狄莫不愚鄙文字靡識訓義不通咸納贄王府登樂清廟西國宻塗厥路非逺雖葉書横字華梵不同而深義妙理於焉自出唐虞三代不容未有事獨西限道未東流豈非區區中國縁應未啟求其會歸尋其指要寧與四夷之樂同日而語乎非為姬公所遺盖由斯法宜隠故也炎昊之世未火未粒肉食皮衣仁惻之事弗萌懐抱非肉非皮死亡立至雖復大聖殷勤思存救免而身命是資理難頓奪寔宜導之以漸稍啟其源故燧人火化變腥為熟腥熟既變葢佛教之萌兆也何者變腥為熟其事漸難積此漸難可以成著迄乎神農復垂汲引嘉糓肇播民用粒食歉腹充虚非肉可飽則全命減殺於事彌多自此已降矜䕶日廣春蒐免其懐孕夏苗取其害穀秋獮冬狩所害誠多頓去之難已備前説周孔二聖宗條稍廣見其生不忍其死聞其聲不食其肉草木斬伐有時麛卵不得妄犯漁不竭澤畋不燎原釣而不綱弋不射宿肉食蠶衣皆須耆齒牛羊犬豕無故不殺此則戒有五支又開其一也逮于酣醟于酒淫迷乎色詭妄於人攘濫自巳外典所禁無待釋教四者犯人人為含靈之首一者害獸獸為生品之末上聖開宗宜有次第亦由佛戒殺人為業最重也内聖外聖義均理一而蔽理之徒封著外教以為烹羊豢豕理固宜然惑者又云若如釋氏之書咸有縁報之業則禹湯文武並受刲刳周公孔子俱入鼎鑊是何迷于見道若斯之篤耶試尋斯證可以有悟矣答陶華陽難云釋迦之現近在莊王唐虞夏殷何必已有周公不言恐由未出非關宜隠育王造塔始敬王之世閻浮有四則東國不容都無答曰釋迦出世年月不可得知佛經既無年厯注記此法又未東流何以得知是周莊之時不過以春秋魯莊七年四月辛卯恒星不見為據三代年既不同不知外國用何厯法何因知魯莊之四月是外國之四月乎若外國用周正邪則四月辛卯長厯推是五日了非八日若用殷正邪周之四月殷之三月用夏正邪周之四月夏之二月都不與佛家四月八日同也若以魯之四月為證則日月參差不可為定若不以此為證則佛生年月無證可尋且釋迦初誕唯空中自明不云星辰不見也瑞相又有日月星辰停住不行又云明星出時墮地行七步初無星辰不現之語與春秋恒星不現意趣永乖若育王造塔是敬王之世閻浮有四此道已流東國者敬王已來至於六國記注繁宻曽無一槩育王立塔非敬王之時又分明也以此而推則釋迦之興不容在近周世公旦之情何得未有難云夫子自以華禮興教何宜乃説夷法故歎中國失禮求之四夷亦良有别意答曰𢎞教次第前論已詳不復重辨難云四夷之樂裁出要荒之際投諸四裔亦宻邇危羽之野禹跡所至不及河源越裳白雉尚稱重譯則天竺罽賔久與上國殊絶衰周已後時或有聞故鄒子以為赤縣於宇内止是九州中之一耳漢初長安乃有浮圖而經像𦕈昧張騫雖將命大夏甘英逺届安息猶弗能宣譯風教必其發夢帝庭乃稍興顯此則似時有通礙非闗運有起伏也答曰本以西域路近而大法不被此葢由縁應未發非謂其途為逺也其路既近而此法永不東流若非縁應未至何以致此及後東被皆由縁應宜發通礙各有其時前論已盡也難曰若必以縁應有㑹則昔之淳厚羣生何辜今之澆薄羣生何幸假使斯法本以救澆者夫為罪莫過扵殺肉食之時殺孰甚焉而方俟火粒甫為教萌於大慈神力不有所躓乎若秔糧未播殺事難息未審前時過去諸佛復以何法為教此教之萌起在何佛兼四戒犯人為報乍輕一殺禽獸受對更重首輕末重亦為未逹夫立人之道曰仁與義周孔所云聞聲不食斬伐以時者葢欲大明仁義之道于鳥獸草木尚曰其然况在乎人而可悖虐非謂内􅅥寡方意在縁報覩迹或似論情顧乖不審於内外兩聖其事可得是均以不此中參差難用頓悟謹備以諮洗願具啟諸蔽答曰民資肉食而火粒未啟便令不肉教豈得行前論言之巳具不復重釋衆生縁果所遭各有期㑹當昔佛教未被是其惡業盛時後之聞法是其善業萌時善惡各有其時何闗淳厚之與澆薄五支之戒各有輕重非殺戒偏重四支並輕且五業雖異而互相發起犯人之戒人重故先出犯獸之戒獸輕故後被訓戒之道次第宜然周公孔子漸𢎞仁惻前論已詳請息重辨若必以釋教乖方域之理外此自一家之學所不敢言究竟慈悲論釋氏之教義本慈悲慈悲之要全生為重恕已因心以身觀物欲使抱識懐知之類愛生忌死之羣各遂厥宜得無遺失而俗迷日久淪惑難變革之一朝則疑怪莫啟設教立方毎由漸致又以情嗜所深甘腴為甚嗜深于情尤難頓革是故開設三淨用伸權道及湼槃後説立言將謝則大明隠惻貽厥將來夫肉食蠶衣為方未異害命夭生事均理一㵸繭爛蛾非可忍之痛懸庖登爼豈偏重之業而去取異情開抑殊典尋波討源良有未逹漁人獻鮪肉食同有其縁枲妾登絲蠶衣共頒其分假手之義未殊通閉之詳莫辯訪理求宗未知所適外典云五畆之宅樹之以桑則六十者可以衣帛矣雞豚犬彘勿失其時則七十者可以食肉矣然則五十九年已前所衣宜布矣六十九年已前所食宜蔬矣輕煖於身事既難遣甘滋於口又非易忘對而為言非有優劣宜枲麻果菜事等義同攘寒實腹曽無一異偏通繒纊當有别途請試言之夫聖道隆深非思不洽仁被羣生理無偏漏拯麤去甚教義斯急繒衣肉食非巳則通及晚説大典𢎞宣妙訓禁肉之㫖載現于言黜繒之義斷可知矣而禁淨之始猶通蠶革葢是敷説之儀各有次第亦猶闡提二義俱在一經兩説參差各隨教立若執前迷後則闡提無入善之途禁淨通蠺則含生無頓免之望難者又以闡提入道聞之後説蠺革宜禁曾無槩理大聖𢎞㫖義豈徒然夫常往宻奧傳譯遐阻泥洹始度咸謂已窮中出河西方知未盡闗中晚説厥義彌暢仰尋條流理非􅊀足又按湼槃初説阿闍世王大迦葉阿難三部徒衆獨不来至既而二人並來唯無迦葉迦葉佛大弟子不容不至而經無至文理非備盡昔湼槃未啟十數年間廬阜名僧已有蔬食者矣豈非乗心闇踐自與理合者哉且一朝裂帛可以終年烹牢待膳亘時引日然則一歲八蠺已驚其驟終朝未肉盡室驚嗟拯危濟苦先其所急敷説次序義實在斯外聖又云一人不耕必有受其饑者故一人躬稼亦有受其飽焉桑野漁川事雖非已炮肉裂繒咸受其分自湼槃東度三肉罷縁服膺至訓操槩彌逺促命有殫長蔬靡惓秋禽夏卵比之如浮雲山毛海錯事同於腐鼠而繭衣纊服曽不懐疑此盖慮窮於文字思迷於𢎞㫖通方深信之客庶有鑒於斯理斯理一悟行迷克反斷蠺肉之因固蔬枲之業然則含生之類㡬於免矣形神論凡人一念之時七尺不復闗所念之地凡人一念聖人則無念不盡聖人無已七尺本自若空以若空之七尺總無不盡之萬念故能與凡夫異也凡人一念忘彼七尺之時則目廢於視足廢於踐當其忘目忘足與夫無目無足亦何異哉凡人之暫無本實有無未轉瞬有已隨之念與形乖則暫忘念與心謝則復合念在七尺之一處則他處與異人同則與非我不異但凡人之暫無其無其無甚促聖人長無其無其無甚逺凡之與聖其路本同一念而暫忘則是凡品萬念而都忘則是大聖以此為言則形神㡬乎惑人疑因果相主毫分不爽美惡之來皆有定業而六度所修咸資力致若修此力致復有前因因熟果成自相感召則力致之功不復得立六度所修㡬于廢矣釋迦邁九劫勇猛所成勇猛之因定於無始本不資九安得稱劫余以為因果情照本是二物先有情照却有因果情照既動而因果隨之未有情照因果何託因識二塗用合本異其本既異厥體不同情照别起於理非礙六度九劫差不足疑也神不滅論含生之類識鍳相懸等級參差千累萬沓昆蟲則不逮飛禽飛禽則不逮犬馬昺明昭著不得謂之不然人品以上賢愚殊性不相窺涉不相曉解燕北越南未足云疋其愚者則不辨菽麥悖者則不知愛敬自斯已上性識漸𢎞班固九品曽未槩其萬一何者賢之與愚葢由知與不知也愚者所知則少賢者所知則多而萬物交加羣方緬曠情性曉昩理趣深𤣥由其塗求其理既有曉昧之異遂成髙下之差自此相傾品級彌峻窮其原本盡其宗極互相推仰應有所窮其路既窮無微不盡又不得謂不然也且五情各有分域耳目各有司存心運則形忘目用則耳廢何則情靈淺弱心慮雜擾一念而兼無由可至既不能兼紛糾逓襲一念未成他端互起互起衆端復同前矣不相兼之由由於淺惑惑淺為病病于滯有不淺不惑出于兼忘以此兼忘得此兼照始自凡夫至於正覺始惑於不惑不兼至能兼又謂不然也又昆蟲天促含靈靡二或朝生夕殞或不識春秋自斯而進修短不一既有其短豈得無長虚用損年善攝増夀善而又善焉得無之又不得謂之不然也生既可天則夀可無天既無矣則生不可極形神之别斯既然矣形既可養神寧獨異神妙形麤較然有辨養形可至不别養神安得有窮養神不窮不生不滅始末相較豈無其人自凡及聖含靈義等但事有精麤故人有凡聖聖既長存在凡獨滅本同末異義不經通大聖貽訓豈欺我哉難范縝神滅論來論云形即是神神即是形又云人體是一故神不得二若如雅論此二物不得相離則七竅百體無處非神矣七竅之用既異百體所營不一神亦隨事而應則其名亦應隨事而改神者對形之名而形中之形各有其用則應神中之神亦應各有其名矣今舉形則有四肢百體之異屈伸聼受之别各有其名各有其用言神唯有一名而用分百體此深所未了也若形與神對片不可差何則形之名多神之名寡也若如來論七尺之神神則無處非形形則無處非神矣刀則唯刅猶利非刅則不受利名故刀是舉體之稱利是一處之目刀之與利既不同矣形之與神豈可妄合邪又昔日之刀今鑄為劔劍利即是刀利而刀形非劒形扵利之用弗改而質之形已移與夫前生為甲後生為丙天人之道或異往識之神猶傳與夫劍之為刀刀之為劍有何異哉又一刀之質分為二刀形已分矣而各有其利今取一牛之身而剖之為兩則飲齕之生即謝任重之用不分又何得以刀之為利譬形之與神邪來論謂刀之與利即形之有神刀則舉體是一利形則舉體是一神神用於體則有耳目手足之别手之用不為足用耳之用不為眼用而利之為用無所不可亦可斷蛟蛇亦可截鴻鴈非一處偏可割東陵之𤓰一處偏可割南山之竹若謂利之為用亦可得分則足可以執物眼可以聼聲矣若謂刀背亦有利兩邉亦有利但未鍜而銛之耳利若遍施四方則利體無處復立形方形直並不得施利利之為用正存一邊毫毛處耳神之與形舉體若合又安得同乎刀若舉體是利神用隨體則分若使刀之與利其理若一則胛下亦可安眼背上亦可施鼻可乎不可也若以此譬為盡邪則不盡若謂本不盡邪則不可以為譬也若形即是神神即是形二者相資理無偏謝則神亡之日形亦應消而今有知之神亡無知之形在此則神本非形形本非神又不可得强令如一也若謂總百體之質謂之形總百體之用謂之神今百體各有其分則眼是眼形耳是耳形眼形非耳形耳形非眼形則神亦隨百體而分則眼有眼神耳有耳神耳神非眼神眼神非耳神也而偏枯之體其半已謝已謝之半事同木石譬彼僵尸永年不朽此半同滅半神既滅半體猶存形神俱謝彌所駭惕若夫貳負之尸經億載而不毁單開之體尚餘質於羅浮神形若合則此二士不應神滅而形存也來論又云歘而生者歘而滅者漸而生者漸而滅者請借子之衝以攻子之城漸而滅謂死者之形骸始乎無知而至于朽爛也若然則形之與神本為一物形既病矣神亦告病形既謝矣神亦云謝漸之為用應與形俱形以始亡末朽為漸神獨不得以始末為漸邪來論又云生者之形骸變為死者之骨骼按如來論生之神明生之形骸既化為骨骼矣則生之神明獨不隨形而化乎若附形而化則應與形同體若形骸即是骨骼則死之神明不得異生之神明矣向所謂死定自未死也若形骸非骨骼則生神化為死神生神化為死神即是三世安謂其不滅哉神若隨形形既無知矣形既無知神本無質無知便是神亡神亡而形在又不經通若形雖無知神尚有知形神既不得異則向之死形翻復非枯木矣述僧設㑹論夫修營法事必有其理今世召請衆僧止設一㑹當由佛在世時常受人請以此擬像故也而佛昔在世佛與衆僧僧伽藍内本不自營其食具也至時持鉢往福衆生今之僧衆非唯持中者少乃有腆恣甘腴厨膳豐豪者今有加請召並不得已而後來以滋腴之口進蔬䔩之具延頸蹙頞固不能甘既非樂受不容設福非若在昔不得自營非資四輩身口無託者也此以求福不其反乎篤而論之其義不爾何者出家之人本資行乞戒律昺然無許自立厨帳并畜淨人者也今既取足寺内行乞事斷或有持鉢到門便呼為僧徒鄙事下劣既是衆所鄙恥莫復行乞悠悠後進求理者寡便謂乞食之業不可復行白淨王子轉輪之貴持鉢行詣以福施者豈不及千載之外凡庸沙門躬命僕豎自營口腹者乎今之請僧一㑹既可髣像行乞行乞受請二事不殊若以今不復行乞又不請召則行乞求法于此永𠖇此法既𠖇則僧非佛種佛種既離則三寳墜于地矣今之為㑹者宜追想在昔四十九年佛率比丘入城乞食威儀舉止動目應心以此求道道其焉適若以此運心則為㑹可矣述僧中食論人所以不得道者由於心神昏惑心神所以昏惑由于外物擾之擾之大者其事有三一則勢利榮名二則妖妍靡曼三則甘㫖肥濃榮名雖日用於心要無晷刻之累妖妍靡曼方之已深甘㫖肥濃為累甚切萬事云云皆三者之枝葉耳聖人知不斷此三事求道無從可得不得不為之立法使簡而易從也若直云三事惑本並宜禁絶而此三事是人情所甚惑念慮所難遣雖有禁約之㫖事難卒從譬於方舟濟河豈不欲直至彼岸河流既急㑹無直濟之理不得不從流邪靡久而獲至非不願速事難故也禁此三事宜有其端何則食之於人不可頓息其於情性所累莫甚故推此晚食併置中前自中之後清虚無事因此無事念慮得簡在始未專在久自習扵是束以八支紆以禁戒靡曼之欲無由得前榮名衆累稍隨事遣故云往古諸佛過中不餐此葢是遣累之筌蹄適道之㨗徑而或咸謂止於不食此乃迷于向方不知厥路者也義佛知不異衆生知義佛者覺也覺者知也凡夫之與佛地立善知惡未始不同也但佛地所知者得善之正路凡夫所知者失善之邪路凡夫得正善之知與佛之知不異也正謂以所善非善故失正路耳故知凡夫之知與佛之知不異由於所知之事異知不異也凡夫之所知不謂所知非善在于求善而至於不善若積此求善之心㑹得歸善之路或得路則至于佛也此衆生之為佛性寔在其知性常傳也六道相續作佛義一切種智與五道六趣衆生共有受知之分無分異也問曰受知非知耶荅曰非也問此以何為體荅曰相續不滅是也相續不滅所以能受知若今生陶練之功漸積則來果所識之理轉精轉精之知來應以至於佛而不斷不絶也若今生無明則來果所識轉闇轉闇之知亦来應以至於六趣也受知之具隨縁受知知之美惡不闗此受知之具也問曰知非知既聞命矣受知受知自是相續不滅知自然因縁中來與此受知之具從理而相闗荅曰有此相續不滅自然因果中來有因有果何得無美無惡乎因縁義凡含靈之性莫不樂生求生之路參差不一一爾流遷塗徑各異一念之間衆縁互起一因一果内有差忒好生之性萬品斯同自然所禀非由縁立固知樂生非因縁因縁非樂生也雖然復俱宅形骸而各是一物一念既召衆縁衆縁各隨念起善惡二念誠有不同俱資外助事由一揆譬諸非水非土穀芽不生因縁性識其本既異因果不惑雖則必然善惡獨起亦有受礙雖云獨起起便成因内因外縁實由乎此也頌千佛頌道有偕適理無二歸照寂同是形相俱非千覺俯應逓叩㝠機七尊緬矣感謝先違既過已滅未來無像一刹靡停三念齊往不常不住非今非曩賢劫雖遼倐焉如響栖林藉樹背室違家前佛後佛迹罔隆窊或逰堅固或䕃龍華能逹斯㫖可類恒沙甡甡羣有均此妙極先晚參差各願隨力宻迹𢎞道數終乃陟誓覩来運永傳今識齊朝丹徒故宮頌聖祖神傑堯蹤漢烈岳峻雄圖天張武節墜命既升覇畧将騁清渭走烽濁河獻警恃峭劍闗凴深桂嶺彛章委闕禮樂沈河拯壓傾構引溺危波盡物稱瑞窮靈委和𤣥精翼日丹羽巢阿贊髙士賛有序余之所謂髙士者悠悠皆是請試言之聖人蒞天下則賢人賛務卨益臯陶是也自中智以下莫不有學以從政佐國安民者也易曰聖人之大寳曰位非學則不得也學所以行其志孝弟慈仁信義是也雖誦先王之典謨而不行其志聖人之大寶亦不可得也要須學行兼有然後取之悠悠之徒莫不攘袂而議進取怒目而爭權利悦愚謟闇茍得忘㢘若斯人者豈入國士之塗動衣冠之眄藉此而登髙位未或有也賛曰亦有哲人獨執髙志避世避言不友不事耻従汙祿靡惑守餌心安藜藿口絶炮胾取足落毛寧懐組織如金在沙顯然自異猶玉在泥湼而不緇身標遠跡名重前記有美髙尚處知若無劣哉羣品事靜心驅茍能立志爭此匹夫進忘隕穫退守恬愉曰仁與義其徑不迂為之則至非物所拘宦成名立陟彼髙衢繡像題賛有序維齊永明四年歲次丙寅秋八月已未朔二日庚申第三皇孫所生陳夫人含微宅理炳慧臨空結言寶位騰心淨覺敬因樂林寺主比丘尼釋寶願造繡無量夀尊像一軀乃為讃曰表相異儀傳形匪壹鏤玉圖光雕金寫質亦有淑人含芳上律絢發綺情幽摛寶術縟文内炳靈姿外溢水耀金沙樹羅瓊實現符淨果來膺妙秩毓藻震閨騰華梵室有億斯年於萬兹日彌勒賛乗教本一法門不二業基累明功由積地𦕈𦕈長津遥遥遐轡道有常尊神無恒器脱屣王家来承寶位慧日晨開香雨宵墜藉感必從凴縁斯至曰我聖儲儀天作貳尚想龍柯瞻言思媚鐫石圖徽雕金寫秘望極齊工舉光等邃超矣福臻融然理備敬勒𤣥蹤式傳遐懿銷聲賛寂矣栖魂非海非樊若人焉往其理空存天標已曖絶羽孤騫堯逢豈讓札值奚言雪賛火競乃上炎隂矯亦下潤獨有凝雨姿貞晼而無殉排雲寧自髙晞光本非恡委谷不辭深因巖豈知峻潔貌雖同賞英心共誰振銘瑞石像銘并序夫靈應㣲逺無跡可追心路照通有感斯順我皇體神御極挹睿臨乾幽顯成袠無思不服若夫二儀叶德五精翼化下洞淵泉上逹蒼昊天無息瑞地不䧏祥十住髣髴於林衡應真肸蠁於清夜素毫月舉騰光於梵室妙趾神行布武於椒殿至於事符緗牒既表禎圖無不雲霏霧委盈簡被䇿莫黒三距𦕈千齡而再現暠露淳腴望鳳葢而沾陛此皆舜日未書堯年罕䧏豈直朱烏動色𤣥秬相趣而已哉嘉玉逺自北戎梁弱水而委質潤徹環竒曠世之所不覩白金近發東山剖幽巖而啟瑞傍被崖巘鴻靈之所未刋雖復素環之絶貺燭銀之瑤寶方斯蔑如也若夫金石具剛非游泳之質自非霈德潜衍感極迴靈豈變堅沈之體顯輕浮之相維永眀七年某月爰有祥石𦕈發天津浮海因潮翻流迴至表異浙河獻竒禁圃瓊瑜等潤精金比色帝上眷幽闗之易啟咨𤣥應之無方雖拊事寂寥而因心咫尺愛其貞恒之性嘉其可久之姿莫若圖玅像於檀香寫遺影於祇樹乃詔名工是鐫是琢靈相瑞華煥同神造至扵雕削之餘遺刋委斵方圓小大觸水斯沈駐罕停蹕親加臨試良由法身是託不溺沈弱之淵剖析既離方湏浮金之水至矣哉禎符若斯之妙也敢銘寶貺永福天人其詞曰遙哉上覺曠矣神功四禪無像三逹皆空表靈䧏世演露開蒙惟聖仁宇寶化潜融道非迹應事以感通沈精浮質逺自河葱悠悠亘水𦕈𦕈因風泛彼遼碣瑞我國東有符皇德乃眷宸衷永言鷙室栖誠梵宫載雕載範寫好摘工藉兹妙力祚闡業隆冕旒南面比夀華嵩光宅寺刹下銘并序光宅寺盖上帝之故居行宫之舊兆揚州丹陽郡秣陵縣某鄉某里之地自去兹邠亳來儀京輔拓宇東第咫武城闉聖心留愛閑素遷負南郭義等去酆事均徙鎬及尅濟横流膺斯寶運命帝閽以廣闢即太㣲而為宇既等漢髙流連於豐沛亦同光武眷戀於南陽思所以永流聖迹垂之不朽令事與須彌等固理與天地無窮莫若光建寶塔式傳於後乃以大梁之天監六年歲次星紀月旅黄鍾閏十月二十三日戊寅仲冬之節也乃樹刹𤣥壤表峻蒼雲下洞淵泉仰迫星漢方當銷巨石於賢劫拯未來於忍土若夫朱光所耀彤雲所臨非止天眷兼因地德皇帝乃啟扉閶闔造舟淮涘接神颷而動驂越浮梁而逕度芝葢容與翠華葳蕤下輦停蹕躬展誠敬廣集四部揆景同蔬𢎞此廣因被之無外同由厥路俱至道場乃作銘曰八維悠濶九服荒茫靈聖底止咸表厥祥夀丘靉靉電繞樞光周原膴膴五緯入房自兹遐夐在處弗亡安知若水寧辨窮桑自天攸縦於惟我皇即基昔兆為世舟航重檐累構迥刹髙驤土為淨國地即金剛因斯太極漙被翺翔豈徒三界寧止十方濡足萬古援手百王一念斯荅萬夀無疆如日之久如天之長彌勒佛銘法身無象常住非形理空反應智滅為靈窮寂震響大夜開㝠𦕈哉遐夀非歲非齡物愛彫彩人榮寶餙事儉欲興情充累息至矣淵聖流仁動惻順彼世心成兹願力於惟淨土既麗且莊琪路異色林沼焜煌靡胎靡娠化自餘方託生在焉紫帯青房眷言安養興言遐適報路雖長由心咫尺幽誠曷寄刋靈表跡髣髴尊儀圖金寫石瀢沱玉沙乍來乍徃玲瓏寶樹因風韻響願逰彼國晨翹暮想七珍非羡三逹斯仰釋迦文佛像銘積智成朗積因成業能仁爽感將吼妙法駐景上天降生右脇始出四門終超九劫𦕈求靈性曠追𤣥軫道雖有門跡無可朕物我兼謝心行同泯一去後心百非寧盡感資理悟悟以言陳言不自布出之者身有來必應如泥在鈞形酬響答且物且人應我以形而余矇瞽守兹大夜焉㧞斯苦仰尋靈相法言攸吐不有尊儀薆焉誰覩栖禪精舎銘有序此寺征西蔡公所立昔厠番麾預班經創之始今重逰踐鑒舊興懐故為此銘以傳芳迹巖靈旅逸地逺栖禪蘭房葺蕙嶠甍架煙南瞻巫野北望淮天遥哉林澤曠矣江田空心觀寂慧相淳筌眷惟斯踐愴屬遐年㳺仁厠逺宅賞憑旃頒創神苑陪構靈椽瞻禁拓圃望鷲疏山製石調響栖理凝𤣥曠移羽斾𦕈别松泉委組東國化景西蓮巒隰夷改蓬籜粗遷重依漢逺復逐旌懸往辭妙幄今承梵筵八翻海鶴九噪巖蟬珮華長掩懋迹空傳式籍雲拱敢告祥縁連珠連珠二首臣聞烈風雖震不斷蔓草之根朽壤誠㣲遂霣崇山之峭是以一夫不加威於赫怒千乗必致亡於巧笑臣聞鳴籟受響非有志於要風涓流長邁寧厝心於歸海是以萬竅怒號不叩而咸應百川是納用卑而為宰記枳園寺刹下石記佛教東流適末尤著始自洛京盛於江左晉故車騎將軍瑯琊王邵𤣥悟獨曉信解淵㣲於太祖文獻公清廟之北造枳園精舎其始則芳枳樹籬故名因事立雖房殿嚴整而瓊刹未樹邵𤣥孫尚書僕射南徐州大中正奐深逹法相洞了宗極勤誠外著仁隠内宏食不過中者一十一載雖翼務朝端而事隣柰圃日者作翰湘州樹麾蠡服位與年升秩隨歲厚顧惟恩隆主盻寵結皇情任處東方寄深外屏徒欲盡能竭慮知無不為下被民和上宣聖澤而自以力弱途逺終慚短効且義止今生報褰来果非所以酬鴻貺於𠖇津暢丹誠於遐劫自乗傳衡臯辭簮􅉽渚誓於舊寺光樹五層捐割藩俸十遺其一凡厥所收三十有六萬齊之永明六年六月三日蓋木運将啟之令辰上帝步天之嘉日乃抗崇表於蒼雲植重扄於𤣥壤仰願宸居納祐福履攸歸八神擎室萬祗翼體寶祚隆邈比固須彌靈算遐永齊軌常住諸聖延祥挹天和於少極藩王實茂播宗英於梁楚羣后流克讓之風庶民垂可封之德含生愷樂物不夭性嘉榖年登餘糧栖畆夷荒内附邊城解柝家備十善人懐六度魔衆稽顙外道屈膝抽薪止火折劔摧鋒拯幽酸於無擇陟神化於有頂三界五道咸同斯願刋石重壤式昭厥心齊竟陵王題佛光記夫理貫空寂雖鎔範不能傳業動因應非形相無以感是故日華月彩炤曜天外方區散景咫尺塵方太祖皇帝濯襟慧水凝神淨域厭世珍陛遷靈寳地竟陵王諱泣明臺之下臨慟髙山之方逺慕迸玉鑾情殷雙樹永惟可以炳發神功崇髙妙業莫若式金寫好資巧匠傳儀以皇齊之四年日子敬制釋迦像一軀尊麗自天工非世造色符留影妙越檀香俾榖林之思永旌於萬劫用刋徽迹式垂不朽云爾碑桐栢山金庭館碑夫生靈為貴有識斯同道天云及終天莫反故仙學之秘上聖攸尊啟玉笈之幽文貽金壇之玅訣駐景濛谷還光上枝吐吸煙霞變煉丹液出沒無方升降自己下栖洞室上賔羣帝覩靈岳之驟啟見蒼波之屢竭望元洲而駿驅指蓬山而永騖芝蓋三重駕螭龍之蜿蜒雲車萬乗載旗斾之逶迤此盖栖靈五嶽未暨夫三清者也若夫上𤣥奥逺言象斯絶金簡玉字之書𤣥霜綘雪之寶俗士所不能窺學徒不敢輕慕且禁誓嚴重志業艱劬自非天稟上才未易可擬自惟凡劣識鑒鮮方徒抱出俗之願而無致逺之力早尚幽栖屏棄情累留愛巖壑託分魚鳥塗愈逺而靡倦年既老而不衰髙宗明皇帝以上聖之德結宗𤣥之念忘其菲薄曲賜提引末自夏汭固乞還山權憇汝南懸境固非息心之地聖主纉歴復䝉縶維永泰元年方遂初願遂逺出天台定居茲嶺所憇之山實惟桐栢靈聖之下都五縣之餘地仰出星河上參倒景髙崖萬沓邃澗千迴因髙建壇凴巖考室餙降神之宇置朝禮之地桐栢所在厥號金庭事昺靈圖因以名館聖上曲降幽情留信彌宻置道士十人用祈嘉祉約以不才首膺斯任永棄人羣竄景窮麓結懇志於𤣥都望霄容於雲路仰宣國靈介兹景福延吉祥於清廟納萬夀於神躬又願道無不懐澤無不至幽荒屈膝戎貊稽顙息鼓輟烽守在海外因此自勉兼遂㣲誠日久勤劬自强不已翹心屬念晚卧晨興飡正陽於停午念孔神於中夜将三芝而延佇飛九丹而宴息乗鳬輕舉留舄忘歸以兹丹欵表之𤣥極無曰在上日鑒非逺銘石靈館以旌厥心其辭曰道無不在若存若亡於惟上學理妙羣方用之日損言則非常儵焉靈化羽衣霓裳九重嶢屼三山璀璨日為車馬芝成宫觀虹旌拂月龍輈漸漢萬春方華千齡始旦伊余菲薄竊慕隐淪尋師講道結友問津東採震澤西逰漢濵依稀靈眷髣髴幽人帝明紹厯惟皇纂位屬心鼎湖脱屣神器降命凡底仰祈靈秘瞻彼髙山興言覆簣啟基桐柏厥號金庭喬峰迥峭擘漢分星臨雲置墠駕岳開櫺􅤝塗蹇産林麓葱青誰謂應逺神道㣲宻慶集宫闈祥流䍐畢其久如地其恒如日夀同南山與天無卒更生變煉外示無功少君飛轉宻與神通因資假力輕舉騰空庶凴嘉誘永濟㣲躬法王寺碑昔周師集於孟津漢兵至於垓下翦商肇乎茲地殪楚由乎斯域慧雲匪由觸石法雨起乎悲心驅之仁夀度之彼岸濟方割於有頃撲既燎於無邊陸旗風靡水陣雲披縈山為堞失其九天之險負壑為隍曽無一葦之閡昏師反接偽牧泥首掬指則河舟尚虚委甲則熊嶺非峻乃按兵江漢誓衆商郊因斯而運斗樞自兹而廓天步業隆放夏功髙代殷濟横流而臣九服握乾綱而子萬姓眷言四海莫不來王此惟余宅寧止西顧臨朝夕之濬池帯長洲之茂苑藉離宫於漢舊因林光於秦餘迴廊敞匝複殿重起連房極睇周堵如雲銘曰往劫將謝災難孔多炎炎烈火淼淼洪波聚為丘岳散成江河俗縁浮詭真諦遐長匪因希尚曷寄舟梁標功顯德事歸道場祁祁法衆同兹無我振錫經行祗林宴坐或期寂滅或念薪火惆悵三明徘徊四果善館碑至道𤣥妙無跡可尋寄言立稱已乖宗極神宇靈房於義非取九僊緬邈等級參差或藏形洞府或栖志靈岳達人獨往之事志非易立餐松飲澗之情理難輕樹止欲漸去喧囂稍離塵雜於是既加整葺營建堂宇北負崇岳南枕修衢迥託人表雞犬相絶庭流松響戸接雲根指瓊樹而朝餐就瑶臺而夜息霓裳不反鳬舄忘歸朝九星謁羣帝悠哉邈乎與天地相畢矣齊故安陸昭王碑公諱緬字景業南蘭陵人也稷契身佐唐虞有大功於天地商武姬文所以膺圖受籙蕭曹扶翼漢祖滅秦項以寧亂魏氏時乗於前皇齊握符於後靈源與積石爭流神基與極天比峻祖宣皇帝雄材盛烈名葢當時考景皇帝含道居貞巻懐前代公含辰象之秀德體河岳之上靈氣蘊風雲身負日月立行可模置言成範英華外發清明内照天經地義之德因心必盡簡久逺大之方率由斯至挹其源者游泳而莫測懐其道者日用而不知昭昭若三辰之麗于天滔滔猶四瀆之紀于地六幽允洽一德無爽萬物仰之而彌髙千里不言而斯應若夫彈冠出仕之日登庸蒞事之年軍麾命服之序監督方部之數斯固國史之所詳今可得畧也水德方衰天命未改太祖龍躍俟時作鎮淮泗如仁夕惕之志中夜九迴龕世拯亂之情獨用懐抱深圖密慮衆莫能窺公陪奉朝夕從容左右盖同王子洛濵之歲實惟辟疆内侍之年起予聖懐發言中㫖始以文學逰梁俄而入掌綸誥蘭桂有芬清暉自逺帝出乎震日衣青光方軌茅社俾侯安陸受瑞析珪遂荒雲野式掌儲命帝難其人公以宗室羽儀允膺嘉選協隆三善仰敷四德博望之苑載暉龍樓之門以峻獻替帷扆實掌喉脣奉待漏之書銜如絲之㫖前暉後光非止恒授公以宻戚上賢俄而奉職出納惟允劍璽増華伊昔帝唐九官咸事熊豹臨戭納言是司自此迄今其任無爽爰自近侍式賛權衡而皇情眷眷慮深求瘼姑蘓奧壤任切闗河都㑹殷負提封百萬全趙之袨服叢臺方此為劣臨淄之揮汗成雨曽何足稱乃鴻騫舊吴作守東楚宏義讓以勗君子振平惠以字小人撫同上德綏用中典疑獄得情而弗喜宿訟兩讓而同歸雖春申之大啟封疆鄧攸之緝熈氓庶不能尚也夏首藩要任重推轂衿帯中流地殷江漢南按衡巫風雲之路千里西通鄾鄧水陸之塗三七是惟形勝閫外莫先建麾作牧明德攸在乃暴以秋陽威以夏日澤無不漸螻蟻之穴靡遺明無不察容光之㣲必照由近而被逺自已而及物惠與八風俱翔德與五材並運逺無不懐邇無不肅邑居不聞夜吠之犬牧人不覩晨飲之羊譽表六條功最萬里還居近侍兼饗戎秩候府寄隆儲端任顯東西兩晉兹選特難羊琇願言而匪獲謝琰功髙而後至升䧏二宫令績斯俟禁旅尊嚴主器彌固禹穴神臯地埓分陜江左以來常逓斯任東渚鉅海南望秦稽淵藪胥萃雚蒲攸在貨殖之民千金比屋郛壥之内雲幄萬家刑政繁舛舊難詳一南山羣盜未足云多渤海亂繩方斯易理公下車敷化風動神行誠恕既孚鈎距靡用不待赭汙之權而奸渠必翦無假里端之籍而惡子咸誅被以哀矜孚以信順南陽葦杖未足比其仁潁川時雨無以豐其澤公攬轡升車牧州典郡感達民祗非待期月老安少懐塗歌里詠莫不歡若親戚芬若椒蘭麾斾毎反行悲道泣攀車卧轍之戀爭塗忘逺去思一借之情愈久彌結方城漢池南顧莫重北指崤潼平塗不過七百西接嶢武闗路曽不盈千蠻陬夷徼重山萬里小則俘民畧畜大則攻城剽邑晉宋迄今有切民患烽鼓相望歲時不息椎埋穿掘之黨阡陌成羣慠法侮吏之人曽莫禁禦累藩咸受其弊厯政所不能裁加以戎羯窺窬伺我邉隙北風未起馬首便以南向塞草未衰嚴城於焉早閉永明八載疆埸大駭天子乃心北眷聼朝不怡揚斾漢南非公莫可於是驅馬原隰巻甲遄征威令首塗仁風載路軌躅清晏車徒不擾牛酒日至壺漿塞陌失義犬羊其來久矣徴賦嚴切唯利是求首鼠疆界災蠧彌廣公扇以亷風孚以誠德盡任棠置水之情宏郭伋待期之信金如粟而弗覩馬如羊而靡入鄒雉必懐豚魚不爽由是傾巢舉落望德如歸椎髻髽首日拜門闕卉服滿塗夷歌成韻禮義既敷威刑具舉彊民獷俗反志遷情風塵不起囹圄寂寞富商野次宿秉停菑蝝蝗弗起豺虎逺跡北狄懼威闗塞謐靜偵諜不敢東窺駝馬不敢南牧方欲振䇿燕趙席巻秦代陪龍駕於伊洛侍紫盖於咸陽而遘疾彌留歘焉大漸耕夫釋耒桑婦下機參請門衢並走羣望維永明九年夏五月三十日辛酉薨春秋三十有七城府颯然庶寮如霣男女老幼大臨街衢接響傳聲不踰時而達於四境夷羣戎落幽逺必至望城拊膺震動郛邑並求入奉靈櫬藩司抑而弗許雖鄧訓致劈靣之哀羊公深罷市之慕對而為言逺有慚德神駕東還號送踰境奉觴奠以望靈仰蒼天而自訴震響成雷盈塗咽水公臨危審正載貽話言楚囊之情惟㡬而彌固衞魚之心身亡而意結二宫軫慟遐邇同哀追贈侍中領衞將軍給鼓吹一部謚曰昭侯時皇上納麓在辰登庸伊始允副朝端兼掌屯衞聞凶哀震感絶移時因遘沈痾綿留氣序世祖日夜憂懐備盡寛譬勉膳禁哭中使相望上雖外順皇㫖内殷私痛獨居不御酒肉坐卧泣涕霑衣若此移年癯瘠改貌天倫之愛振古莫儔及俯膺天眷入纂絶業分命懿親台牧並建對繁弱以流涕望曲阜而含悲改贈司徒因謚為郡王禮也惟公少而英眀長而𢎞潤風標秀舉清暉映世學徧書部特善𤣥言鞶帨之麗篆籀之則窮六義於懐抱究八體於毫端奕思之㣲秋儲無以競巧取暌之妙流睇未足稱竒至公以奉上鳴謙以接下撫僚庶盡盛德之容交士林忘公侯之貴虚懐博納幽闗洞開宴語談笑情瀾不竭譽滿天下德冠生民盖百代之儀表千年之領袖曽不憖留梁摧奄及豈唯僑終蹇謝興謡輟相而已哉凡我僚舊均哀共戚怨天德之無厚痛棠隂之不留思所以克播遺塵敝之穹壤乃刻石圖徽寄情銘頌其辭曰天命𤣥鳥䧏而生商是開金運祚始玉筐三仁去國五曜入房亦白其馬侯服周王本枝派别因菜命氏涉徐而東義均梁徙自茲以降懐青拖紫崇基巖巖長瀾瀰瀰惟聖造物龍飛天步載鼎載革有除有布髙皇赫矣仰膺乾顧景皇蒸哉實啟洪祚喬嶽峻峙命世興賢應期誕德絶後光前㡬以成務覺在民先位非大寳爵乃上天爰始濯纓清猷濬發升降文陛逶迤魏闕惠露霑吴仁風扇越涉夏踰漢政成期月用簡必從日新為盛在上哀矜臨下莊敬草木不天昆蟲得性我有芳蘭民胥攸詠羣夷蠢蠢巖别嶂分傾山盡落其從如雲挈妻荷子負戴成羣迴首請吏曽何足云昔聞天道仁罔不遂彼蒼如何興山止簣四牡方馳六龍頓轡斯民曷仰邦國殄瘁齊隕晏平行哭致禮趙殂昌國列邦揮涕况我君斯皇之介弟哀感徒庶慟興雲陛階毁留攅川汎歸軸競羞野奠爭攀去轂遵渚號追臨渡望哭無絶終古惟蘭與菊塗由帝渚朱軒靡駕東首塋園即宫長夜逝川無待黄金難化鐘石徒刋芳猷永謝豫章文憲王碑世載冠冕之暉家開配天之業洪源邁於委水雲峰冠於削成公自天攸縦非待河岳道亞生知德備藏往摩赤霄而理翰望閶闔以上馳迴風颷於襟袖宅山川於懐抱爰初弱冠藏器俟時康莊廣闢餙禮賢之館杞梓備收罄滋蘭之畹既駕朱驂又敷衮職升降軒陛率由孝敬謙以備物貴以在身再握勵已三吐忘倦公德惟民望位冠朝首儀表瑰雄風神秀傑每至三元首旦華裔在庭執玉端闈冠冕百辟外夷震聳猶單于之懼王商羣后瞻慕若衆星之俯日月雖復以周公之親居周公之任道格皇天光被四海而小善靡失輶德必從譬由畎澮匪讓所以森致江河土壤同歸故能鬱成嵩岱保翼三善𢎞正九代銘彼太常懸諸日月銘曰大德風邁具美雲從事貴愈貶禮峻彌恭且有厚命車服以庸羽儀列辟冠冕羣龍周實多祜漢有餘慶奕奕皇族於斯為盛公之綏之終和且敬是惟宗國庶邦作詠太尉王儉碑瞻旦奭而齊軫軼夔龍而長騖百辟翹首譬列宿之仰望舒千里結轍若派流之宗江漢及宋道盛運鼎命將改而瞻烏所集未知適歸公髙卧閑宇獨咤虚室眷龍顔以託夢詠日角以興言停傅巖之下懐滋水之上慨深板蕩念在濡足霸君亦慮屬一匡情䧏三顧卜匪熊羆唯人是與公深覩興廢妙識人英察榮光於河渚攀龍翼於雲漢傾方寸以奉國忘七尺以事君殊文共㑹異軫同歸堆案盈几充庭滿室隨方引應斷決如流辭不輟響紙無停筆精明外朗神彩傍映曬矚接其光景風雲溢乎帷席囂喧總至大薄相填齊鑣共軫並而不雜銘曰悵公赫矣世載經綸四彼三傑六兹五臣德參世命道亞如仁屣步金門濯纓蘭疇激水上征培風鬱起比丘尼僧敬法師碑立言道往標情妙覺置想依空練心成學緼日悠長䟽年緬邈風遷電改斯理莫違神有殊適形無異歸臨泉結慟有愴徂暉松颷轉盖山雨披衣載刋貞軌永播餘徽哀策文齊明帝哀策文龍菆既撤備物已陳殯宫無夜夕燎終晨號環輬幄攀摽應路容衛弗改軒檻如故望東川而不追仰昊天而自訴列聖同軌諡法樹聲爰詔掌牘式播遺英其辭曰五曜在天逓作民主赫矣帝髙蒸哉嗣武多難固業殷憂啟聖時惟我皇功符受命爰始濡足坐運機深鵬逝風舉龍動雲隂之郢南泝即豫西臨體兹大德懐此小心賓于四門四門穆穆納于百揆百揆肅肅德浸堇荼仁被比屋何逺何邇無思不服嗣君喪道不式典謨神器業業事等瞻烏民懐真主后來其蘇皇天眷命授以籙圖臨朝凝睟昧旦丕顯斟酌前王擇其令典不言斯應不行斯踐路臺靡營離宫弗宴眷言膠塾𢎞啟上庠軌儀四代祖述三王德暉内動英華外揚禮行罇爼義及幽荒仰庶天德䧏年永久北極齊光南山獻夀滄溟奄竭嵩岱皆朽沴非昊穹惟余之咎攀龍詎㡬大隧𤣥𤣥厭世崇陛即宫下泉殯階已遽素幕髙褰端闈洞啟蜃紼徐前背朱闕以南轉乗翠龍而東度經原野之荒涼屬西成之云暮伐金鼔以清道揚悲笳而啟路極厚地而不追終蒼天而永慕蒼梧晦逺眘徽不泯紀事寂寞龜書可循哲王違世克播遺塵猗與萬古暉光日新諡議齊武帝謚議臣聞天德平分而四時之名或異聖功一揆而皇王之稱不同葢跡因事隨名由義立堯臣禹佐咸率兹典伏惟盡寂窮㣲含神獨照德茂始裳之主道冠初耜之君含精靈於五緯駕貞明於三象初九勿用英氣凌雲負掲日月仰揚霄漢龍姿鳳采煥若麗天登庸在試盛績雲舉雖屈景潢汙降情尺木而拯世濟民浚發懐抱昔成湯百家仁被比屋文王十里化先寡妻前聖後賢重規沓矩震雄圖於九江播靈威於夏汭旌斾未麾鯨鯢自殞弗勞羌僰之長無待六事之人義等伐謀功髙善陣建有國之符成定謀之業㑹朝清明事資於牧野受命作周非止於西伯視膳寢門孝徳光被守器宗祧元良載逺嗣大寶以君百辟敷景化以致隆平守在四夷威行海内囹圄寂寞禮讓交興八柄馭下九官咸事臨朝凝黙尊嚴若神風行日烜無思不暢至仁與造化爭流靈威與雷霆齊軌上貫蒼昊下洞深泉春無凄風夏無苦雨時若罔愆多稔如積三革不累五刅不砥庠塾大啟儒雅雲集訓閲得宜蒐狩有序丹徼青丘之野跂踵反舌之民浮深駕阻迴首革靣北夷畏力獻琛内欵不藉終軍之使無假絶漠之威嘉祥霧合秘瑞泉涌史不輟文簡無虚日方當垂七曜之旗駕八龍之乗望禮中嶽肆覲羣后造化不仁穆卜愆應慕切遺弓哀同遏宻晦朔不居殯宫將啟勒兹大名宜盡徽極齊眀帝謚議臣聞君德靡二辟王之名不一聖功無爽堯禹之稱或殊兼以拯世寧亂致平未必同道崇墠増祧嘉號不可相襲伏惟自天誕睿英聖在躬皇矣之符夙著蒸哉之謡早集賔門納揆天平地成自南自北無思不韙在屬負圖道揚末命值嗣主狂凶人倫道盡宗社阽危瞻烏靡託國難立長亂極治刑四海樂推三靈以眷東向而讓天下功髙代入流涕而膺寳位如就重負日昃劬勞躬親庶事撫辜納隍之念義同於罪已振民厚下之情無廢於終食聰明神武逖聼邇聞萬目備張紘綱靡漏御轡不迷寧藉聼於襄野大川可濟不待備於舟檝崢嶸之下澤靡不懐寥廓之上明無不燭包以宇宙潤以風雨霜露所交人跡所至百姓仰之而不知其始萬物用之而罔識其終上庠廢業忽焉已久三載弗為淪弛將及臨朝引領思隆雅訓貴逰胥萃俊造成羣方將驅丗反本既仁且夀告成東嶽髙宴汾陽造化不仁厭世云及放勛之慕不追負鄉之思空逺殯宫將撤輴軫難留英聲茂實於是乎在梁德皇后謚議表號垂名義昭不朽先皇后應祥月德比載坤靈柔範隂化儀形自逺俔天作合義先造舟而神猷夙掩所隔升運宜式遵景行用昭大典謹按謚法忠和純備曰德貴而好禮曰德宜崇曰德皇后墓誌銘齊太尉文憲王公墓銘德被九官功苞十亂帝圖必舉皇猷偕煥斯謂國楨是惟民幹翺翔禮園優游文館秘義煙涵瓌辭雨􅄆逵路揚輝台庭改觀方翊隆平燮茲天網福履每愆䧏年多爽㣲言永謝庶僚誰長鐃吹罷音松風代響齊太尉徐公墓誌公美風儀善言笑愛重琴碁流連泉石拓宇東郊曖然閑素榮貴之來無槩懐抱任居端揆萬務同歸簿領盈前囂塵滿席直舉枉錯虚來實反天道不仁與善愆應丞相長沙宣武王墓銘山岳鎮地日月麗天鄰㡬者庶亞極稱賢峩峩哲人實惟天縦德基内美功成日用亦既東轅實拯朝難迅鋒雷駭霜戈電斷震主必危功髙不賞哀動上霄痛銘𤣥壤聖武爰發後恥申寃大禮空備幽駕莫援司徒謝朏墓銘嶽神昔降和氣今鍾以彼天爵鬱為人龍崇基往峻世德今重漢車作傳靈位攸待我君應符非公莫宰華衮既襲輕蘿自改形雖廟堂心猶江海經邦已備皇情迴屬素騑輟御𤣥雲罷曲尚書右僕射范雲墓銘合契興王匪勞物色乗風鬱起化成龍翼乃作喉脣帝猷必舉乃作銓衡彛倫有序北京岨峻東川迴薄蘊吾名臣終天靡作太常卿任昉墓銘天才俊逸文雅𢎞備心為學府辭同錦肆含華振藻鬱焉髙致川谿望歸巖阿待闕幽光忽斷窮燈黯滅爾有令問蘭薰無絶行狀齊司空栁世隆行狀公稟靈華嶽幼挺珪璋清襟素履發乎齠丱及長風質洞逺儀止祥華動容合矩吐言被律時沈攸之狼據陜西氣陵物上而太祖登庸作宰天厯在躬攸之播封豕之情總全荆之力兕甲十萬鐵馬千羣水陸長騖志窺皇邑公抗威川涘勇畧紛紜顯晦有方出沒無緒攸之乃反斾亘圍親受矢石増櫓乗埤嚴衝駕雉雲輣俯闕地穴斜通半藏晚飡負戸晨汲公乃綏衆以武應敵以竒靈鋒電曜威策雲舉事切三版之危氣損九天之就殘宼外老逆黨内摧焚舟委甲掬指宵遯公風標秀徹器範𢎞潤茂乎辭彩雅善鼔琴摛純蔡之髙芬纂鍾嵇之妙曲雖嬰拂世務而素業無改臨姑蘇而想八桂登衡山而望九疑七紆邦組三臨蕩甸五職瑞扇一司百揆固可以齊衡八凱方駕五臣齊臨川王行狀公遵𤣥源於陵壑稟黄中之正氣其性逸其神凝端華表美弱齒𢎞貴著乎將立雲虚景暖岳秀川渟蘭桂不踰其質珪璋未究其美幼而恱學業茂従師洽貫書場該綜文圃清暉秘譽燭野光朝齊禪林寺尼浄秀行狀比丘尼釋淨秀本姓梁氏安定烏氏人也其先出自少昊至伯翳佐禹治水賜姓嬴氏周孝王時封其十六世孫非子於秦其曾孫秦仲為宣王侯伯平王東遷封秦仲少子於梁是為梁伯漢景帝世梁林為太原太守徙居北地烏氏遂為郡人焉自時厥後昌𦙍阜世名德交暉蟬冕疉映漢元嘉元年梁景為尚書令少習韓詩為世通儒魏時梁爽為司徒左長史秘書監博極羣書善談𤣥理晉太始中梁闡為凉雍二州刺史即尼之廼祖也闡孫撝晉范陽王虓驃騎參軍事漁陽太守遭永嘉蕩析淪於偽趙為秘書監征南長史後得還晉為散騎侍郎子疇字道度征虜司馬子粲之仕宋征虜府參軍事封龍川縣都亭侯尼即都亭侯之第四女也挺慧悟於曠劫體妙解於當年而性調和綽不與凡孩孺同數弱齡便神情峻徹非常童稚之伍行仁尚道洗志法門至年十歲慈念彌篤絶粉黛之容棄錦綺之翫誦經行道長齋蔬食年十二便求出家家人苦相禁抑皆莫之許於是心祈𠖇感専精一念乃屢獲昭祥亟降瑞相第四叔超獨為先覺開譬内外故雅操獲遂上天性聰叡幼而超羣年至七歲自然持齋家中請僧行道聞讀大湼槃經不聼食肉於是即長蔬不噉二親覺知若得魚肉輙便棄去昔有外國普練道人出於京師往來梁舍便受五戒勤翹奉持未嘗違犯日夜恒以禮拜讀誦為業更無餘務及手能書常自寫經所有財物唯充功德之用不營俗好少欲入道父母為障遂推流歲月至年二十九方獲所志落髪青園服膺寺主上事師䖍孝先意承㫖盡身竭力猶懼弗及躬修三業夙夜匪懈僧使衆役毎居其首精進劬勤觸事闗涉有開士馬先生者於青園見上即便記云此尼當生兠率天也又親於佛殿内坐禪同集三人忽聞空中有聲狀如牛吼二尼驚怖迷悶戰慄上惔然自若徐起下牀歸房執燭檢聲所在旋至构欄二尼便聞殿上有人相語云各自避路某甲師還後又於禪房中坐伴類數人一尼鼾眠此尼於睡中見有一人頭届於屋語云勿驚某甲師也此尼於是不敢復坐又以一時坐禪同伴一尼有小縁事暫欲下牀見有一人抵掌止之曰莫撓某甲師於是閉氣徐出歎未曽有如此之事比類甚繁既不即記悉多漏忘不得具載性愛戒律進止俯仰必欲遵承於是現請曜律師講内自思惟但有值一干心中憂慮事不辦夜即夢見鵶鵲鴝鵒雀子各乗車車並安軒車之大小還稱可鳥言同聲唱言我助某甲尼講去既寤歡喜知事當成及至就講乃得七十檀越設供果食皆精後復又請頴律師開律即發講日清淨甖水自然香如水園香氣深以為欣既而坐禪得定至夜中方起更無餘伴便自念言將不犯獨即諮律師律師荅云無所犯也意中猶豫恐違失且見諸寺尼僧多有不如法乃喟然嘆曰嗚呼鴻徽未逺靈緒稍隤自非引咎責躬豈能導物即自懴悔行摩那睡於是京師二部莫不咨嗟云如斯之人律行明白規矩應法尚爾思愆何况我等動靜多過而不慚愧者哉遂相率普懴無有孑遺又於南園就頴律師受戒即受戒日淨甖水香還復如前青園諸尼及以餘寺無不更受戒者律師於是亦次第詣寺敷𢎞戒品闡揚大教故憲軌遐流迄届於今頴律師又令上約語諸寺尼有髙牀俗服者一切改易上奉㫖制勒無不祗承律藏之興自兹更始後又就三藏法師受戒清淨水香復如前不異青園徒衆既廣所見不同師已遷背更無覲侍於是思别立住處可得外嚴聖則内窮宴黙者以宋大明七年八月故黄脩儀及南昌公主深崇三寳敬仰徳行初置精舍上麻衣弗溫藿食忘饑躬執泥瓦盡勤夙夜以宋泰始三年明帝賜號曰禪林盖性好閒静𠖇感有徴矣而制龕造像無不畢備又寫集衆經皆令具足裝潢染成悉自然有娑羅伽龍王兄弟二人現迹彌日不滅知識往來並親瞻覩招納同住十有餘人訓化奨率皆令禪誦毎至奉請聖僧菓食之上必有異迹又於一時䖍請聖衆七日供養禮懴始訖攝心運想即見兩外國道人舉手共語一云呿羅一云毗呿羅所著袈娑色如桑葚之熟因即取泥以壊衣色如所見倣於是逺近尼僧並相倣斆改服間色故得絶於五大之過道俗有分者也此後又請阿耨達池五百羅漢日日凡聖無遮大㑹已近二旬供設既豐復更請罽賓國五百羅漢足上為千及請凡僧還如前法始過一日見有一外國道人衆僧悉皆不識於是試相借問自云從罽賓國來又問來此㡬時答云來此一年也衆借覺異令人守門觀其動靜而食畢乃於宋林門出使人逐視見從宋林門去行十餘步奄便失之又嘗請聖僧浴器盛香湯及以雜物因而禮拜内外寂黙即聞器桸杓作聲如用水法意謂或是有人出便共往者但見水杓自然揺動故知神異又曽夜中忽見滿屋光眀正言巳曉自起開戸見外猶闇即便閉戸還牀復寢久久方乃眀也又經違和極篤忽自見大光眀遍於世界山河樹木浩然無礙欣爾獨笑傍人怪問具陳所見即能起行禮拜讀誦如常無異又於一時復違和亦甚危困忽擧兩手狀如捧物語傍人不解問言為何所捧答云見寳塔從地出意欲接之旛花伎樂無非所有於是疾恙豁然而除都無復患又復違和數日中亦殊綿惙恒多東向視合掌向空於一時中急索香火移時合掌即自說云見彌勒佛及與舎利弗目連等諸聖人亦自見諸弟子數甚無量滿虚空中須㬰彌勒下生翅頭末城云有人持旛華伎樂及三臺来迎於此上旛華伎樂非世間比半天而住一臺已在半路一臺未至半路一臺未見但聞有而已爾時已作兩臺為此兆故即更作一臺也又云有兩樹寳華在邉人來近牀語莫壊我華自此之後病即除損前後遇疾恒有瑞相或得凉風或得妙藥或聞異香病便即愈疾瘥之為理都以漸豁然而去如此其數不能備記又天監三年一夏違和於晝日眠中見虚空藏菩薩即自圍繞誦唄唄聲徹外眠覺所患即除又白日卧開眼見佛入房旛盖滿屋語傍人令燒香了自不見上以天監五年六月十七日得病苦心悶不下飲彭城寺令法師以六月十九日夜得夢見一處謂是兠率天上住止嚴麗非世間比言此是上住處即見上在中於是法師有語上上得生好處當見將接上是法師小品檀越勿見遺棄上即答云法師丈夫又宏通經教自應居勝地某甲是女人何能益法師又云不如此也雖為丈夫不能精進持戒不及上時體已轉惡與令法師素踈不堪相見病既稍増飲粥日少為治無益漸就綿惙至七月十二日爾時天雨清凉悶勢如小退自云夣見迎來至佛殿西頭人人捉旛竿猶車在地旛之為理不異世間隊擔鼓旗旛也至二十日便絶不復進飲粥至二十二日令請相識衆僧設㑹意似分别至二十五日云見十方諸佛遍滿空中至二十七日中後泯然而卧作兩炊久方復動轉自云上兠率天見彌勒及諸菩薩皆黄金色上手中自有一琉璃清淨甖可髙三尺許以上彌勒即放光明照于上身至兠率天亦不見飲食自然飽滿故不復須人間食也但聞人間食皆臭是以不肯食於彼天上得波利䴵將還意欲與令法師有人問何意將䴵去答云欲與令法師是人言令法師是人中果報那得食天上食不聼將去既而欲見令法師閒居上為迎法師來相見語法師可作好菜食以餉山中坐禪道人若修三業方得生兠率天耳法師不坐禪所以令作食餉山上道人者欲使與坐禪人作因縁也自入八月體中亦轉惡不復説餘事但云有三十二童子一名功德天二名善女天是迦毗羅所領恒來在左右與我驅使或言得人餉飲食令衆中行之復云空中晝夜作伎樂閙人耳也文懴悔文弟子沈約稽首上白諸佛衆聖約自今生已前至於無始罪業參差固非詞象所筭識昧往縁莫由證舉爰始成童有心嗜慾不識慈悲莫辨罪報以為毛羣魪品事允庖厨無對之縁非惻隠所及晨剉暮爚亘月隨年嗛腹填虚非斯莫可兼曩昔蒙稚精靈靡達遨戲之間恣行天暴蠢動飛沈罔非登俎儻想逢值横加剿撲却數追念種彚實蕃逺憶想間難或詳盡又暑月寢卧蚊䖟噆膚忿之于心應之于手歲所殱殞略盈萬計手因怒運命因手傾為殺之道事無不足迄至於今猶未頓免又嘗竭水而漁躬事網罟牽驅士卒懽娛賞㑹若斯等軰衆夥非一黨𨽻賔逰愆𤯝交互或盜人園實或偷人芻豢弱性蒙心隨喜讃悦受分吞贓皎然不昧性愛墳典茍得忘廉取非其有卷將二百又綺語者衆源條繁廣假妄之愆雖免大過㣲觸細犯亦難􅊀陳又追尋少年血氣方壯習累所纒事難排豁淇水上宮誠無云㡬分桃斷袖亦足穪多此實生死牢穽未易洗㧞灌志惨舒性所同禀遷怒過嗔有時或然厲色嚴聲無日可免又言謔行止曽不尋研觸過斯發動淪無紀終朝紛擾薄暮不休來果昬頑將由此作前念甫謝後念復興尺波不息寸隂驟往愧悔攅心罔知云厝今於十方三世諸佛前見在衆僧大衆前誓心尅已追自悔責收遜前愆洗濯今慮校身諸失歸命天尊又尋七尺所本八㣲是構折而離之莫知其主雖造業者身身隨念滅而念念相生離續無已往所行惡造既由心行惡之時其心既染既染之心雖與念滅往之所染即成後縁若不本諸真諦以空滅有則染心之累不卒可磨今者興此愧悔磨昔所染所染得除即空成性其性既空庶罪無所託布髪頂禮幽顯證成此念一成相續不斷日磨歲瑩生生不休迄至道塲無復退轉又彼惡加我皆由我昔加人若不滅此重縁則來惡彌遘當今斷絶永息来縁道無不在有求斯應庶達今誠要之咸達千僧㑹願文弟子沈約上白十方諸佛十方諸大聖今日見前衆僧三界非有五隂皆無四倒十纒共相和合一切如電揮萬劫於俄頃丘井易淪終漂沈於苦岸迷塗邃逺弱喪忘歸區區七尺莫知其假耳目之外謂為空談靡依靡歸不信不受生靈一謝再得無期約所以撫心自惻臨踐非譬者也至聖凝寂無迹可尋縁應所感事惟拯物持鉢安行出彼祗樹不逾停午以福衆生芳塵餘法峩然未改約以往夏遘罹痾疾帝上哀矜深垂愍慮以月次徂暑日在丙寅仰㑹千僧於其私宅隆兹重施弗知所限既已奉祗洪德又思自罄家財一舉盈千力難私辦稍而後滿事或易充草堂約法師於所住山寺為營八集其一仰凴上定林寺祐法主今月二十九日第十㑹集百僧於所創田廬福不唐捐聞之經訓心路皎然又過於此凡有涓毫應證来業無巨無細咸歸聖主仰願十方共明此誓豈足少酬天眷盖以㣲寄誠心云爾賽蔣山廟文我皇體天御宇望日表尊備樂變乎笙鏞鬱禮華於爼豆邇無不懐逺無不肅鳥革𤣥素之容草移丹緑之狀泉露改味日月重光仰惟大王年踰二百世兼四代揚玉桴布瑶席秦梁楚趙之巫把瓊茅而延佇燕衛宋鄭之音結流風而成曲九嶷之乗蔽日三山之駕若雲冠子祝文蠲兹令日元服肇加成徳既舉童心自化行之則至無謂道賖敦以秋實食以春華無恥下問乃致髙車子孫千億廣樹厥家疏為文惠太子禮佛願疏維年月朔日皇太子某稽首和南十方諸佛一切賢聖夫至理可祈必凴誠于正覺極妙有感乃歸仰於真如然後取證現前獲驗兹日去歲皇帝暫虧御膳小廢乾行四海震惶百司戰悚某歴劫多幸夙世善縁沗生王家叨守儲嗣臣子心地倍用焦迫禁門旦啟欣問竪之安寢扉早闢訪饍夫之宰祇樹獨園伏膺下拜伽藍精舍繞足頂禮百神警衛萬福具臻曾不信宿聖躬和愈豈非三寳之𢎞慈十號之法力既而天從心欲誠願克果今于崇正殿奉還法㑹千僧仍留百僧八闗行道又度二士同日出家惟願藉此功德奉資皇帝陛下壽與南山共久年將北極俱長道懋農軒德髙堯舜上界八萬之劫可期下方七百之祚未擬元良之位長守膝下之懽上嗣之所永保懐袖之愛以兹法田奉中宮皇后殿下福履攸善無思不届天母之德厚載不能加任姒之盛坤儀寧足匹末及諸王妃主宫掖嬪房未來因縁過去眷屬並同兹辰預此慈善又普為積苦餓鬼受􅖄畜生三途八難六道十惡水陸蠢動山藪翾飛濕生化生有想無想皆藉今日慈悲咸簉浣濯人天攝受幽顯證明庶凴衆力共相津濟謹疏為文惠太子解講疏皇太子以建元四年四月十五日集大乗望僧於𤣥圃園安居寳地禁苑皆充供具珍臺綺榭施佛及僧震𤣥音於六宵暢㣲言於永劫三達宣其妙果十住讃其祥縁踐二氣而業升離九旬而功就暨七月既望乃敬捨寳軀爰及輿冕自纓已降凡九十九物願以此力普被幽明帝室有嵩華之固蒼黔饗仁夀之福若有淪形苦海得隨理悟墜體翺塗不逺斯復十方三世咸證伊言兹誓或騫無取正覺為齊竟陵王發講疏并頌大矣哉妙覺之為妙也無相非色空不可極而立言垂訓以汲引為方慈波慧水雖可溉而莫知其源者也靈篇寳籍逺探龍藏盖無得而言焉至於義指天山之表文隠交河之外又非斷籌所能算也逮于祗樹菴園之妙吼四諦一乗之正説重譯而通中土莫不恒沙之一焉而詞源海廣理塗靈奥雖字流附響萬軫同起分條􅄆葉離文析句未或暨其萬一也竟陵王殿下神超上地道冠生知樹寳業於𠖇津凝正解於冲念若夫方等之靈邃甘露之深𤣥莫有不逰其塗而啟其室也秘藏之被東國者靡不畢集皆繕以寳縑文以麗篆凝光瓊笥炫彩瑶縢思欲敷震微言昭感未悟乃以永明元年二月八日置講席於上邸集名僧於帝畿皆深辨真俗洞測名相分㣲靡滯臨欵若曉同集於邸内之法雲精廬演𤣥音于六宵啟法門于千載濟濟乎實曠代之盛事也自法王已降暨於聼僧條載如左以記其事焉乃作頌曰十號神寂三達空𤣥迹由聖隠教以慈宣氤氳緒法昭晰遺筌摽聲妙住騰華寳蓮文摛龍藏義溢中天惟王禀照道冠増璿星羅寳幄雲開梵筵思馳春馬理析秋蟬靈場絢彩正水興蓮乗兹上果永導芳縁為齊竟陵王解講疏夫凴形輝化必由委氣之途因方導理必同肖天之質是以表靈邃瑞誕聖王宫駐彩辰緯停華日月故能積慈成聖累妙成空坦照路于道場㧞迷根于苦岸弟子蕭子良滌盥煩襟栖情正業肅萃僧英敬敷慧典宻藏奥文雲開雨散今魄首丹逵日弦上朔止步凝想空明屬念雖神迹稍緬而遺塵在兹乃餙筵藻殿張帷盛邸潔誠祗事建斯寳集蘭泉波涌芳藹雲迴秘理探㣲𤣥况悠邈宗條既舉窮功允就論堂巻座義鼓停音乗此芳縁將升上住十方三世有證無爽又夫玅極衆象湛思必通理冠羣方有感斯應自鸞音輟唱圓光寢輝委華之相不傳踊地之符已逺行言入道事難於造次一悟偕空効隔於俄頃若非積毫成仞累爝為明無以方軌慧門維舟法岸弟子是用夕惕載懐惟日不足者也故敬集名僧演敷奥籍震㣲起滯輪動雲迴月殿含呂魄弦上日甘露既窮輟言寳座巻文罷席衣屣相趨仰惟先后禀靈娥德叶景軒度道載華嶽化洽汾隂早棄蘭宫夙違椒掖千乗不追萬鍾靡及終天之慕不續於短年欷報之誠思隆于永劫敬捨軀服以充供施藉此幽通控情妙覺仰願聖靈速登寳位越四天之表記十號之尊惟兹三世咸證于此敢誓丹衷庶符皎日為南郡王捨身疏弟子蕭王上白諸佛世尊道德僧衆夫色固無象觸必歸空三世若假八㣲終散雖復迴天震地之威窮於寂滅齊冠楚組之麗靡救埃壤而嗜慾易繁毎疚心術捨施難𢎞用迷假照弟子樹因曠劫嚮報兹生託景中璇聯華日彩玉組夙紆蕃麾早建蘭池紫燕之乗擾於外閑黼帳翠帷之餙光於中寢徒以心源尚滯情路未昭識謝兼忘理慚獨悟不能叶調五氣綏御六神霜暑或愆風露時舛是以敷襟上實栖誠玅覺敬捨肌膚之外凡百一十八種當令經衞夙理府絡時順萬祉雲翔百妖窮滌望北極而有恒瞻南山而同永又願宸居納祐則天均慶少陽介福儷日承休儲妃闡膺祥之符皇枝廣惟祺之祚敬餙崇甍嚴置寳幄仰延息心旁旅清信朂兹𢎞誓證其幽疑庶可以感降禎和招對靈應𤣥塗匪昧要之無爽捨身願疏優婆塞沈君敬白十方三世諸佛本師釋迦如来安養阿彌陀世尊云云一切衆聖今日道俗諸大賢徳夫形非定質衆縁所聚四㣲不同風火亦異析而離之本非一物燕肝越膽未足為譬静念求我無時可得而積此淪昏生生不已一念儻值曾未移時障習相蕩旋迷厥路横指空呼名之為有豐已傷物日夜靡休蓄身外之財以充其慾攘非已之分用成其侈豈直溫肌㗖腹若此而已哉至於積箧盈藏未嘗登體溢爼充庖既飫斯棄曽不知粟帛所從事非因已悠悠黔首同有其分離多共寡猶或未均我若有餘物何由足仁者之懐不應若此侵地之財世稱為盜盜之甚者孰過於斯幽顯推求無一或可君仰藉時來久乗休運玉粒晨炊華燭夜炳自此迄今歴年三十遂乃服冕榮國裂土承家潤盈身已慶流僕妾室非懸磬俸有兼金救寒止於重裘而笥委餘襲冬夜既䝉累蠒而櫝有贏衾自斯已上侈長非一雖等彼豪家其陋已甚方諸窶室所邁寔多悟此非常事由諸佛有懐捨散宜光道場饑寒困苦為患乃切布滿州縣難悉經縁其當稱力因事一旦隨年頭目髓腦誠難輕慕虧已贍物未易頓行誓欲廣念深恩積㣲成著施路檀門冀或能踐以大梁天監之八年年次𤣥枵日殷鳥度夾鍾紀月十八在於新所創蔣陵皇宅請佛及僧髣髴祗樹息心上士凡一百人雖果謝菴園飰非香國而野粒山蔬可同屬饜兼捨身資服用百有一十七種㣲自損撤以奉現前衆僧夫室家患苦刀爼非切制除蕭􅄆形質超然蠢彼羣生咸有佛性不因翦削此路莫由縁業舛互世諦煩記變形改餙即事為難故闗以八支𨗳彼清信一日一夜同佛出家本𢎞外教事非僧法而世情乖舛同迷斯路招屈名僧寘之虚室主人髙卧取逸閒堂呼為八闗去之實逺雖有供施之縁而非斷漏之業約今謹自即朝至于明旦排遣俗累一同善來分留上德勗成微志藉此輕因庶證來果功德之言非所敢及漢魏六朝百三家集巻八十七
