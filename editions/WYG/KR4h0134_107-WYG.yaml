body:
  text: 漢魏六朝百三家集巻一百七魏髙允集題詞游廣平論髙伯恭寛中似卓公洪量似文饒風節似汲長孺予心韙之國史刋石司徒獄興劒芒在前龍蛇莫避惟有悟主以誠勿欺可免伯恭引罪在身殆得樽酒納約之義加以儲宫請命嚴君改顔應對獲全非無故也崔公注詩論語尚書易閔湛郄檦稱其精微過于馬鄭王賈伯恭有左氏公羊釋毛詩拾遺論雜解議何鄭膏肓事百餘篇今俱不傳崔族銷滅言論宜廢髙令公寵周五帝年享百齡而談經之書不與墓石同永子孫典守聿修安在徴士頌感逝懐人三十有四紵縞弦韋紛集於懐答宗著作詩表丹嵗寒能言其志觀彼生平求友分深愛敬終始不獨於君臣有情也集中文字如上書東宫諌起宫室矯頽俗五異及樂平王蓍論皆耿介有聲餘亦整而不汚漢初張丞相耆夀吉祥事畧彷彿惜年代久逺筆札絶少有愧伯恭試列之北朝文苑雖遜歩崔公而開疆邢魏固當日之先正也目録賦鹿苑賦表進天文要畧表郡國建學表疏矯頹俗疏諌起宫室疏上書諌東宫上書書答宗欽書頌北伐頌徴士頌有序論蓍論訓酒訓有序祭文祭岱宗文詩羅敷行王子喬答宗欽十三章詠貞婦彭城劉氏八章漢魏六朝百三家集巻一百七目録欽定四庫全書漢魏六朝百三家集巻一百七明張溥輯魏髙允集賦鹿苑賦啓重基於朔土系軒轅之洪裔武承天以作主熈大明以御世灑靈液以滂沱扇仁風以遐被踵姬文而築苑包山澤以開制植羣物以充務蠲四民之常税暨我皇之繼統誕天縱之明叡追鹿埜之在昔興三轉之髙義振幽宗於已永曠千載而可寄於是命匠選工刋兹西嶺注誠端思仰模神影庶真容之髣髴燿金暉之煥炳即靈崕以構宇竦百尋而直正絙飛梁於浮柱列荷華於綺井圖之以萬形綴之以清永若祗洹之瞪對孰道塲之塗逈嗟神功之所建超終古而秀出實靈祇之協贊故存貞而保吉鑿仙窟以居禪闢重階以通術澄清氣於髙軒佇流芳於王室茂花樹以芬敷涌醴泉之洋溢祈龍宫以降雨侔膏液於星畢若乃研道之倫行業貞簡慕徳懐風杖䇿來踐守應貞之重禁味三蔵之淵典或步林以經行或寂坐而端宴㑹衆善以並臻排五難而俱遣道欲隠而彌彰名欲晦而逾顯伊皇輿之所幸每垂心於華囿樂在兹之閒敞作離宫以營築固爽塏以崇居枕平原之髙陸恬仁智之所懐眷山水以肆目玩藻林以遊思絶鷹犬之馳逐眷耆年以廣徳縱生生以延福慧愛内隆金聲外發功濟普天善不自伐尚諮賢以問道詢芻蕘以補闕盡敬恭於靈寺遵晦望而致謁奉請戒以畢日兼六時而宵月何精誠之至到良九劫之可越資聖王之逺圖豈循常以明教希縉雲之上升羡頂生之髙蹈思離塵以邁俗涉𤣥門之幽奥禪儲宫以正位受太上之尊號既存無而御有亦執靜以鎮躁覩天規於今日尋光哲之遺誥悟二乾之重䕃審明離之並照下寧濟於兆民上尅光於七廟一萬國以從風總羣生而為導正南面以無為永措心於冲妙夫道化之難期幸微躬之遭遇逢扶桑之初開遘長夜之始曙顧衰年以懐傷惟負忝以危懼敢布心以陳誠效鄙言以自著表進天文要畧表往年被勅令臣集天文災異使事類相從約而可觀臣聞箕子陳謨而洪範作宣尼述史而春秋著皆所以章名列辟景測皇天者也故先其善惡而驗以災異隨其失得而效以禍福天人誠逺而報速如響甚可懼也自古帝王莫不尊崇其道而稽其法數以自修飭厥後史官並載其事以為鍳誡漢成時光禄大夫劉向見漢祚將危權歸外戚屢陳妖眚而不見納遂因洪範春秋災異報應者而為其傳覬以感悟人主而終不聽察卒以危亡豈不哀哉伏惟陛下神武則天叡自逺欽若稽古率由舊章前言往行靡不究鍳前皇所不逮也臣學不洽聞識見寡薄懼無以禆廣聖聽仰酬明㫖今謹依洪範傳天文志撮其事要畧其文辭凡為八篇郡國建學表臣聞經綸大業必以教養為先咸秩九疇亦由文徳成務故辟雍光於周詩泮宫顯於魯頌自永嘉以來舊章殄滅經閭蕪沒雅頌之聲京邑杜絶釋奠之禮道業陵夷百五十載仰惟先朝每欲憲章昔典經闡素風方事尚殷弗遑克復陛下欽明文思纂成洪烈萬國咸寧百揆時叙申祖宗之遺志興周禮之絶業爰發徳音惟新文教搢紳黎獻莫不幸甚臣承㫖勅並集二省披覽史籍備究典紀靡不敦儒以勸其業貴學以篤其道伏思明詔𤣥同古義宜如聖㫖崇建學校以厲風俗使先王之道光演於明時郁郁之音流聞於四海請制大郡立博士二人助教四人學生一百人次郡立博士二人助教二人學生六十人下郡立博士一人助教一人學生四十人其博士取博觀經典世履忠清堪為人師者年限四十以上助教亦與博士同年限三十以上若道業夙成才任教授不拘年齒學生取郡中清望人行修謹堪循名教者先盡髙門次及中第疏矯頽俗疏前朝之世屢發明詔禁諸婚娶不得作樂及葬送之日歌謡鼓舞殺牲燒葬一切禁斷雖條㫖久頒而俗不革變將由居上者未能悛改為下者習以成俗教化陵遲一至於斯昔周文以百里之地修徳布政先于寡妻及於兄弟以至家邦三分天下而有其二明為政者先自近始詩云爾之教矣民胥效矣人君舉動不可不慎禮云嫁女之家三日不息燭娶婦之家三日不舉樂今諸王納室皆樂部給伎以為嬉戲而獨禁細民不得作樂此一異也古之婚者皆㨂擇徳義之門妙選貞閑之女先之以媒娉繼之以禮物集寮友以重其别親御輪以崇其敬婚姻之際如此之難今諸王十五便賜妻别居然所配者或長少差舛或罪入掖庭而作合宗王妃嬪藩懿失禮之甚無復此過往年及今頻有檢劾誠是諸王過酒致責跡其元起亦由色衰相棄致此紛紜今皇子娶妻多出宫掖令天下小民必依禮限此二異也萬物之生靡不有死古先哲王作為禮制所以養生送死折諸人情若毁生以奉死則聖人所禁也然葬者蔵也死者不可再見故深蔵之昔堯葬榖林農不易畆舜葬蒼梧市不改肆秦始皇作為地市下錮三泉金玉寶貨不可計數死不旋踵尸焚墓掘由此推之堯舜之儉始皇之奢是非可見今國家營塟費捐巨億一旦焚之以為灰燼茍靡費有益於亡者古之人奚獨不然今上為之不輟而禁下民之必止此三異也古者祭必立尸序其昭穆使亡者有慿致食饗之禮今已塟之䰟人直求貌類者事之如父母燕好如夫妻損敗風化凟亂情禮莫此之甚上未禁之下不改絶此四異也夫饗者所以定禮儀訓萬國故聖王重之至乃爵盈而不飲肴乾而不食樂非雅聲則不奏物非正色則不列今之大㑹内外相混酒醉喧譊㒺有儀式又俳優鄙藝汚辱視聽朝廷積習以為美而責風俗之清純此五異也今陛下當百王之末踵晉亂之弊而不矯然釐改以厲頽俗臣恐天下蒼生永不聞見禮教矣諫起宫室疏臣聞太祖道武皇帝既定天下始建都邑其所營立非因農隙不有所興今建國已久宫室已備永安前殿足以朝㑹萬國西堂温室足以安御聖躬紫樓臨望可以觀望逺近若廣修壯麗為異觀者宜漸致之不可倉卒計斫材運土及諸雜役須二萬人丁夫充作老小供餉合四萬人半年可訖古人有言一夫不耕或受其饑一婦不織或受其寒况數萬之衆其所損廢亦以多矣推之於古驗之於今必然之效也誠聖主所宜思量上書諫東宮上書天地無私故能覆載王者無私故能包養昔之明王以至公宰物故藏金於山蔵珠於淵示天下以無私訓天下以至儉故美聲盈溢千載不衰今殿下國之儲貳四海屬心言行舉動萬方所則而營立私田畜養雞犬乃至販酤市􅆵與民爭利議聲流布不可追掩夫天下者殿下之天下富有四海何求而不獲何欲而弗從而與販夫販婦競此尺寸昔虢之將亡神乃下降賜之土田卒䘮其國漢之靈帝不修人君之重好與宫人列肆販賣私立府蔵以營小利卒有顛覆傾亂之禍前鑒若此甚可畏懼夫為人君者必審於擇人故稱知人則哲惟帝難之商書云無邇小人孔父有云小人近之則不遜逺之則怨矣武王愛周召齊畢所以王天下殷紂愛飛亷惡來所以䘮其國歴觀古今存亡之際莫不由之今東宫誠曰乏人雋乂不少頃來侍御左右者恐非在朝之選故願陛下少察愚言斥出佞邪親近忠良所在田園分給貧下畜産販賣以時收散如此則休聲日至謗議可除書答宗欽書頃因行李承足下髙問延佇之勞為日久矣王途一啓得叙其懐欣於相遇情無有已足下兼愛為心每能存顧養之以風味惠之以徳音執翫反覆銘於心抱吾少乏尋常之操長無老成之致慿賴賢聖以自充勉而來喻褒飾有過其分既承雅贈即應有答但唱髙則難和理深則難訓所以留連日月以至於今今往詩一篇誠不足標明來㫖且表以心幸恕其鄙滯領其至意頌北伐頌皇矣上天降鑒惟徳眷命有魏照臨萬國禮化丕融王猷允塞静亂以威穆民以則北冦舊𨽻禀政在蕃往因時艱逃命北轅世襲凶軌背忠食言招亡聚盗醜類實繁敢率其衆圖縱猖蹶乃詔訓師興戈北伐躍馬裹糧星馳電發撲討䖍劉肆陳斧鉞斧鉞暫陳馘翦厥旅積骸填谷流血成浦元兇狐奔假息窮墅爪牙既摧腹心亦阻周之忠厚存及行葦翼翼聖明有兼斯美澤被京觀垂此仁㫖封尸埜擭惠加生死生死䝉惠人欣覆育理貫幽㝠澤漸殊域物歸其誠神獻其福遐邇斯懐無思不服古稱善兵厯時始㨗今也用師辰不及浹六軍充合萬邦以協義著春秋功銘玉牒載興頌聲播之來葉徴士頌有序昔嵗同徴零落將盡感逝懐人作徴士頌葢止於應命者其有命而不至則闕焉羣賢之行舉其梗槩矣今著之於左夫百王之御士也莫不資仗羣才以隆治道故周文以多士克寧漢武以得賢為盛此載籍之所記由來之常義魏自神䴥以後宇内平定誅赫連積世之僣掃窮髪不羇之寇南摧江楚西盪凉域殊方之外慕義而至於是偃兵息甲修立文學登延儁造酬諮政事夢想賢哲思遇其人訪諸有司以求名士咸稱范陽盧𤣥等四十二人皆冠冕之胄著問州邦有羽儀之用親發明詔以徴𤣥等乃曠官以待之懸爵以縻之其就命三十五人自餘依例州郡所遣者不可稱記爾乃髦士盈朝而濟濟之美興焉昔與之俱䝉斯舉或從容廊廟或游集私門上談公務下盡忻娛以為千載一時始於此矣日月推移吉凶代謝同徴之人凋殱殆盡在者數子然復分張往昔之忻變為悲慼張仲業東臨營州遲其還返一叙于懐齊矜於垂殁之年寫情於桑榆之末其人不幸復至殞殁在朝者皆後進之士居里者非疇昔之人進涉無寄心之所出入無解顔之地顧省形骸所以永歎而不已夫頌者美盛徳之形容亦可以長言寄意不為文二十年矣然事切於心豈可黙乎遂為之頌詞曰紫氣干霄羣雄亂夏王龔徂征戎車屢駕掃盪遊氛克剪妖霸四海從風八垠漸化政教無外既寧且一偃武櫜兵唯文是恤帝乃旁求捜賢舉逸巖隱投竿異人並出亹亹盧生量逺思純鑽道據徳遊藝依仁旌弓既招釋褐投巾攝齊升堂嘉謀日陳自東徂南躍馬馳輪僣慿影附劉以和親茂祖焭單夙罹不造克已勉躬聿隆家道敦心六經遊思文藻終辭寵命以之自保燕常篤信百行靡遺位不茍進任理栖遲居冲守約好讓善推思賢樂古如渇如饑子翼致逺道賜悟深相期以義相和若琴並參幕府俱發徳音優游卒嵗聊以寄心祖根運㑹克光厥猷仰縁朝恩俯因徳友功雖後建禄實先受班同舊臣位並羣后士衡孤立内省靡疚言不崇華交不遺舊以産則貧論道則富所謂伊人實邦之秀卓矣友規秉兹淑量存彼大方擯此細讓神與理㝠形隨流浪雖屈王侯莫廢其尚趙實名區世多竒士山嶽所鍾挺生三李矯矯清風抑抑容止初九而潛望雲而起詵尹西都靈惟作傅垂訓皇宫載理雲霧熈雖中天迹階郎署餘塵可挹終亦顯著仲業淵長雅性清到憲章古式綢繆典誥時值險難常一其操納衆以仁訓下以孝化被龍川民歸其教邁則英賢侃亦稱選聞達邦家名行素顯志在兼濟豈伊獨善繩匠弗顧功不獲展劉許履忠竭力致躬出能騁説入獻其功輶軒一舉撓燕下崇名彰魏世亨業亦隆道茂夙成弱冠播名與朋以信行物以誠怡怡昆弟穆穆家庭發響九臯翰飛紫㝠頻在省闥亦司於京刑以之中政以之平猗歟彦鑒思參文雅率性任真器成非假靡矜于髙莫恥于下乃謝朱門歸迹林埜宗敬延譽號為四儁華藻雲飛金聲夙振中遇沈疴賦詩以訊忠顯於辭理出於韻髙滄朗達黙識淵通領新悟異發自心胸質侔和璧文炳雕龍燿姿天邑衣錦舊邦士元先覺介焉不惑振袂來庭始賓王國蹈方履正好是繩墨淑人君子其儀不忒孔稱游夏漢美淵雲越哉伯度出類踰羣司言祕閣作牧河汾移風易俗理亂解紛融彼滯義渙此潛文儒道以析九流以分崔宋二賢誕性英偉擢頴閭閻聞名象魏謇謇儀形邈邈風氣達而不矜素而能賁潘符標尚杜熈好和清不潔流渾不同波絶希龍津止分常科幽而逾顯損而逾多張綱柔謙叔術正直道雅洽聞弼為兼識㧞萃衡門俱漸鴻翼發憤忘餐豈要斗食率禮從仁罔愆于式失不繫心得不形色郎苖始舉用均已試智足周身言足為治性協於時情敏於事與今而同與古曷異物以利移人以酒昬侯生潔已唯義是敦日縱醇醪逾敬逾温其在私室如涉公門季才之性柔而執競届彼南秦申威致命誘之以權矯之以正帝道用光邊土納慶羣賢遭世顯名有代志竭其忠才盡其槩體襲朱裳腰紐雙佩榮曜當時風髙千載君臣相遇理實難偕昔因朝命與之克諧披衿散想解帶舒懐此昕如昨存亡奄乖靜言思之中心九摧揮毫頌徳潛爾増哀論蓍論劉潔常謂私人曰若車駕不還吾當立樂平王及潔誅王以憂死日者董道秀亦誅允著蓍論昔明元未起白臺其髙二十餘丈樂平王嘗夢登其上四望無所見王以問日者董道秀筮之曰大吉王黙而有喜色後事發王遂憂死而道秀棄市道秀若推六爻以對王曰易稱亢龍有悔窮髙曰亢髙而無民不為善也夫如是則上寧於王下保於已福禄方至豈有禍哉今舍於本而從其末咎釁之至不亦宜乎訓酒訓臣被勅論集往世酒之敗徳以為酒訓臣以朽邁遭人倫所棄而殊恩過隆録臣於將殁之年朂臣於已墜之地奉命驚惶喜懼兼甚不知何事可以上答伏惟陛下以叡哲之姿撫臨萬國太皇太后以聖徳之廣濟育羣生普天之下罔不稱頼然日昃憂勤虚求不已思監往事以為警戒此之至誠悟通百靈而况於百官士民不勝踴躍謹竭其所見作酒訓一篇但臣愚短加以荒廢辭義鄙拙不足觀採伏願聖慈體臣悾悾之情恕臣狂瞽之意其詞曰自古聖王其為饗也𤣥酒在室而澄酒在下所以崇本重原降於滋味雖汎爵旅行不及於亂故能禮章而敬不虧事畢而儀不忒非由斯致是失其道將何以範時軌物垂之於世歴觀往代成敗之效吉凶由人不在數也商辛耽酒殷道以之亡公旦陳誥周徳以之昌子反昬酣而致斃穆生不飲而身光或長世而為戒或百代而流芳酒之為狀變惑情性雖曰哲人孰能自競在官者殆於政也為下者慢於令也聰達之士荒於聽也柔順之倫興於諍也久而不悛致於病也豈止於病乃損其命諺亦有云其益如毫其損如刀言所益者止於一味之益不亦寡乎言所損者夭年亂志夭亂之損不亦夥乎無以酒荒而䧟其身無以酒狂而䘮其倫迷邦失道流浪漂津不師不遵反將何因詩不言乎如切如磋如琢如磨朋友之義也作官以箴之申謨以禁之君臣之道也其言也善則三覆而佩之言之不善則哀矜而貸之此實先王納規之意往者有晉士多失度肆散誕以為不羈縱長酣以為髙逹調酒之頌以相眩曜稱堯舜有千鐘百觚之飲著非法之言引大聖為譬以則天之明豈其然乎且子思有云夫子之飲不能一升以此推之千鐘百觚皆為妄也今大魏應圖重明御世化之所暨無思不服仁風敦洽於四海太皇太后以至徳之隆誨而不倦憂勤備於皇情誥訓行於無外故能道協兩儀功同覆載仁恩下逮罔有不遵普天率土靡不䝉頼在朝之士有志之人宜克已從善履正存貞節酒以為度順徳以為經悟昏飲之美疾審敬慎之彌榮遵孝道以致養顯父母而揚名蹈閔曽之前軌遺仁風於後生仰以答所授俯以保其成可不勉歟可不勉歟祭文祭岱宗文維皇興二年敢昭告於岱宗之靈正趾坤元作鎮東夏齊二儀以永固崇至徳以配天故能資元氣以造物協隂陽而變化若其嵓嶺峭峙川谷幽深神怪譎詭倐忽百靈吐納風雲育成萬品攝生之所歸焉禎祚之所萃焉是以歴代帝王之崇封禪銘功以告其成七十二君咸在兹焉自非功侔造化應同自然孰能若此者哉自我國家肅恭禋祀懐柔百神邦域之内罔不咸秩往以天路未夷雖望祭有在今大化既同奄有淮岱謹薦於嶽宗之靈尚饗詩羅敷邑中有好女姓秦字羅敷巧笑美囬盼鬢髪復凝膚脚著花文履耳穿明月珠頭作墮馬髻倒枕象牙梳姌姌善趨步䄡䄡曵長裾王侯為之顧駟馬自踟蹰王子喬王少卿王少卿超升飛龍翔天庭遺儀景雲漢酬光騖電逝忽若浮騎日月從列星跨騰八廓踰杳㝠尋元氣出天門窮覽有無究道根答宗欽十三首湯湯流漢藹藹南都載稱多士載耀靈珠邈矣髙族世記丹圖啓基郢城振彩凉區吾生朗到誕發英風紹熈前緒奕世克隆方圓備體淑徳斯融望傾羣雋響駭革戎響駭伊何金聲允著匡贊西藩拯厥時務肅志琴書恬心初素潛思淵渟秀藻雲布上天降命祚鍾有代協燿紫宸興乾作配仁邁春陽功隆覆載招延隐叟永貽大賚伊余櫟散才至庸微遭縁幸㑹忝與樞機竊名華省厠足丹墀愧無螢燭少益天暉明外非諭信漸難兼體卑處下豈曰能謙進不𢎞道退失淵潛既慚朱闕亦愧閭閻史班稱達楊蔡致深負荷典䇿載蹈於心四轍同軌覆車相尋敬承嘉誨永佩明箴逺思古賢内尋諸已仰謝丘明長揖南史遐武雖存髙蹤難擬夙興夕惕豈獲恬止世之圮矣靈運未通風馬殊隔區域異封有懐西望路險莫從王澤逺灑九服來同在昔平吳二陸稱寶今也尅凉吾生獨矯道映儒林義為羣表我思與之均於紵縞仁乏田蘇量非叔度韓生屬降林宗仍顧千載曠遊遘兹一遇藻詠風流鄙心已悟年時迅邁物我俱逝任之斯通擁之則滯結駟貽塵屢空亦敝兩間可守安有囬賜詩以言志志以表丹慨哉刎頸義以中殘雖曰不敏請事金蘭爾其勵之無忘嵗寒詠貞婦彭城劉氏八章兩儀正位人倫肇甄爰制夫婦統業承先雖曰異族氣猶自然生則同室終契黄泉封生令達卓為時彦内協黄中外兼三變誰能作配克應其選實有華宗挺生淑媛京野勢殊山川乖互乃奉王命載馳在路公務既𢎞私義獲著因媒致幣遘止一暮率我初冠眷彼弱笄形由禮比情以趣諧忻願難常影跡易􅆾悠悠言邁戚戚長懐時值險屯横離塵網伏鑕就刑身分土壤千里雖遐應如影響良嬪洞感發於夢想仰惟親命俯尋嘉好誰謂㑹淺義深情到畢志守窮誓不二醮何以驗之殞身是效人之處世孰不厚生心存於義所重則輕結憤鍾心甘就幽𠖇永捐堂宇長辭母兄茫茫中野翳翳孤丘葛虆𠖇䝉荆棘四周理茍不昧神必俱游異哉貞婦曠世靡儔渤海封卓妻劉氏彭城人成婚一夕卓官於京師以事見法劉氏在家忽形夢想知卓已死哀泣不止經旬凶問果至遂憤歎而終時人比之奏嘉妻云髙允念其義髙而名不著乃為之詩漢魏六朝百三家集巻一百七
