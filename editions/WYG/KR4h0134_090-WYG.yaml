body:
  text: 漢魏六朝百三家集巻九十丘遲集題詞南史文學傳首呉興丘氏靈鞠在宋孝武時獻殷貴妃挽歌特䝉嗟賞希範於梁王踐祚之日勸進殊禮専典文字父子曲筆非東南之蹇蹇者也然靈鞠面折褚彦囘語頗强切東觀祭酒自謂終身不恨仕宦情淺蓬髪遲鈍無媿名士希範少挫抑即獻責躬詩志在求進出守永嘉負乘騰刺令非武帝憐才為寢白簡維鵜濡翼能長有鞶帯乎革命諸文連珠唱和世不多見其最有聲者與陳將軍伯之一書耳隗囂反背安豐責讓楊廣附逆伏波曉勸咸出腹心之言示涕泣之意不能發其順心使之囘首獨希範片紙强將投戈松柏墳墓池臺愛妾彼雖有情不可謂文章無與其英靈也鍾仲偉詩評云希範取賤文通秀於敬子余未唯唯或其時尚循沈詩任筆之稱遂輕髙下耳目録賦還林賦有序思賢賦表為王博士謝表為范尚書拜表為范衛軍讓梁臺侍中表為何尚書重讓侍中領驍騎表為栁僕射讓光禄表啓答舉秀才啓為范雲謝示毛龜啓教永嘉郡敎書與陳伯之書銘硯銘誄侍中吏部尚書何府君誄詩九日侍宴樂遊苑侍宴樂遊苑送張徐州應詔詩旦發漁浦潭夜發宻巖口敬酬栁僕射征怨答徐侍中為人贈婦贈何郎題琴朴一作材奉栁呉興芳樹望雪玉堦春草漢魏六朝百三家集巻九十目録欽定四庫全書漢魏六朝百三家集巻九十眀張溥輯丘遲集賦還林賦有序爰自京師言歸舊嶺今風古轍毎動寸衷因事而書不覺成巻非謂為文聊記行途所經云爾太皥弭節祝融聳駕炎鍾汎响青籥静吹丘子税轅畿路總舳川湄禠魂故嶺結夢舊墀揆身世而載懐鏡古今而興辭驗難停於楊轍昭易改于墨絲匪追舉而辯命豈適尹而問蓍擔簦無白璧之想負書靡黒貂之悲䌫解山潮首顧京澨仰絳堞之紛迴與素津之容裔荃橈往來芰盖經過依俙子陵之釣髣髴滄浪之謌出入風霞游息雲露階迥禽飛忩髙月度踟蹰七教徘徊五禮永翦帯於關上長緝巾乎林底思賢賦豈顧問哉相然信死斯則結深念於撫翼跂雄飛而但起知我於財利之間何足多于鮑子目擊而道存至味其如水未見其人吾聞其理矣夫子長之託意甘執鞭於異世在慈眀之慕義聊慙馭而追税况至徳之可師無兼裘以共弊有樂安之任子偉羣才而稱傑備百行之髙致該九流之洪藝諒可雜而非染迹毎同而常别墻易入而難窺關無鍵而有閉思若神而泉湧翰如雲而積袂沈潛於懐抱之間蕭散於天人之際日下愧其未雙關西慙於上喆紛吾既有此固陋荷君子之渥恵塵非府而分深葉未移而好結尋宿草之宴處歴三紀於兹日性有同於杞梓心獲變於丹漆文何屬而不辯理何疑而匪質問不休而鐘扣答無窮而座謐表為王博士謝表臣聞撫臆可以言心量能則知所止是故矯親魯門簡業事亡雜吹齊雅分聲遽逝臣才行過汚文質無亷疏達謝於谷杜浹洽乖夫劉楊非除部養之勤豈通掌故之業為范尚書拜表昔滕公移晷於泗亭陳遂留權於博進禄止一守官窮九列臣獲照秋陽取沃淮海發蒙去􅈔巳若松喬匪富伊榮須㬰至此賞參十亂窮越五水歴覧前載孰與為匹為范衛軍讓梁臺侍中表是以懐鉛蚤歲不以隕穫累心躡履晩坐豈以充詘在念易農伊泰仕焉已幸遂復分竹九嶷擁旄百越值天地中開神武再廓麻絲是蓄菅蒯靡遺今霸運肇基四海眀目樞􅀈規獻實在得人况處庸微何用膺荷為何尚書重讓侍中領驍騎表臣擢自散輩之中寘彼周行之上既慙伯蒙使天下慎選又乖平叔令内外得人且玉壺獨掌見榮昌期當天可參必簡英俊為栁僕射讓光禄表竊聞敬孫以規獻為職彞品常貴飛翠鳴玉升降禁眀臣以痁疾豈伊或忝匪稱其服終朝三褫近取諸身皎日非喻臣之庸薄久塵物論假以克壯報効無階而嬰離沈痼日月滋甚聖朝留簪履之舊愍降帷葢之餘矜榮不徒行事存寵渥啓答舉秀才啓方今八友盈庭五承在幄七教畢修九功具舉猶乃物色關屠夢想巖釣故巳天不愛寳野無遺賢輒仰宣皇猷俯罄愚蔽覘察衡閻詢事茅草如有片言入善一介可題謹聞絳闕恭奏青蒲為范雲謝示毛龜啓𤣥甲應於姬渚青髯符於夏室翺翔巻耳之隂浮游蓮葉之上藏采千載獻狀一朝斯誠陛下至徳動天窮神為化寳瑞開圗珍祥映諜懐星抱月負字銜書間出蕃畿繼踵郊甸教永嘉郡教貴郡控帯山海利兼水陸實東南之沃壤一都之巨㑹而曝背拘牛屢空於􅅵畝績麻治絲無聞於窐巷其有耕灌不修桑榆靡樹遨遊􅆵里酣酺卒嵗越伍乖鄰流宕忘返才異相如而四壁獨立髙慚仲蔚而三徑没人雖謝文翁之正俗庶幾龔遂之移風書與陳伯之書遲頓首陳將軍足下無恙幸甚幸甚將軍勇冠三軍才為世出棄燕雀之小志慕鴻鵠以髙翔昔因機變化遭遇時主立功立事開國稱孤朱輪華轂擁旄萬里何其壯也如何一旦為奔亡之虜聞鳴鏑而股戰對穹廬以屈膝又何劣邪尋君去就之際非有他故直以不能内審諸巳外受流言沈迷猖獗以至於此聖朝赦罪責功棄瑕録用推赤心於天下安反側於萬物此將軍之所知非假僕一二談也朱鮪渉血於友于張繡剚刃於愛子漢主不以為疑魏君待之若舊况將軍無昔人之罪而勲重於當代夫迷途知反往哲是與不逺而復先典攸高主上屈法申恩吞舟是漏將軍松柏不剪親戚安居髙臺未傾愛妾尚在悠悠爾心亦何可言今功臣名將雁行有序佩紫懐黄讃帷幄之謀乘軺建節奉疆場之任竝刑馬作誓傳之子孫將軍獨靦顔借命馳驅氈裘之長寜不哀哉夫以慕容超之强身送東市姚泓之盛面縳西都故知霜露所均不育異類姬漢舊邦無取雜種北虜僭盜中原多歴年所惡積禍盈理至燋爛况偽孽昏狡自相夷戮部落攜離酋豪猜貳方當繫頸蠻邸懸首藁街而將軍魚游於沸鼎之中燕巢於飛幕之上不亦惑乎暮春三月江南草長雜花生樹羣鶯亂飛見故國之旗鼓感生平於疇日撫弦登陴豈不愴恨所以亷公之思趙將吳子之泣西河人之情也將軍獨無情哉想早勵良規自求多福當今皇帝盛眀天下安樂白環西獻楛矢東來夜郎滇池解辮請職朝鮮昌海蹶角受化惟北狄野心崛强沙塞之間欲延嵗月之命耳中軍臨川殿下眀德茂親摠茲戎重方弔民洛汭伐罪秦中若遂不改方思僕言聊布往懐君其詳之丘遲頓首銘硯銘誄侍中吏部尚書何府君誄逺量夷雅淹姿英茂進德方新循名以舊分鑣先達爭驅俊秀匪直羽儀實惟領袖知人斯哲在帝之難僉謂往諧是則能官園阿望幣釣嶼投竿金張之貴允茲七侍有美一人柔貂三珥服冕乘軒鳴玉飛翠不貪為寶貴而能貧唯静是悦惟寂是珍履信茲從積善方慶如何斯德曾是知命彼髙者天與人焉咏𦕈望周行式瞻林壑灑沃紛埃擯揚流俗言必𤣥逺神唯珠玉色恬喜愠心豈榮辱詩九日侍宴樂遊苑朱眀已謝蓐収司禮爰理秋祓備揚旌棨奉璋峩峩金貂濟濟上林宏敞離宫非一綵殿迴風丹樓映日隨珠甲悵屯衛周悉晬容徐動天儀澄謐雲物游颺光景髙麗枯葉未落寒花委砌絲桐激舞楚雅閒慧參差繁響殷勤流詣侍宴樂遊苑送張徐州應詔詩詰旦閶闔開馳道聞鳯吹輕荑承玉輦細草藉龍騎風遲山尚響雨息雲猶積巢空初鳥飛荇亂新魚戲實為北門重匪親孰為寄參差别念舉肅穆恩波被小臣信多幸投生豈酬義旦發漁浦潭漁潭霧未開赤亭風已颺櫂歌發中流鳴鞞響沓障一作嶂村童忽相聚野老時一望詭怪石異象嶄絶峰殊狀森森荒樹齊析析寒沙漲藤垂島易陟崖傾嶼難傍信是永幽棲豈徒暫清曠坐嘯昔有委卧治今可尚夜發宻巖口弭棹纔假寐擊汰已爭先敞朗朝霞澈驚明曉魄懸萬尋仰危石百丈窺重泉叢枝上㸃㸃崩溜下填填敬酬柳僕射征怨清歌自信妍雅舞空僊僊耳中解眀月頭上落金鈿雀飛且近逺暮入綺忩前魚戲雖南北終還荷葉邉惟見君行久新年非故年答徐侍中為人贈婦丈夫吐然諾受命本遺家糟糠且棄置蓬首亂如麻側聞洛陽客金葢翼高車謁帝時來下光景不可奢幽房一洞啓二八盡芳華羅裙有長短翠鬢無低斜長眉横玉臉皓腕巻輕紗俱看依井蝶共取落簷花何言征戍苦抱膝空咨嗟贈何郎向夕秋風起野馬雜塵埃憂至猶如繞詎是故人來檐際落黄葉堦前網緑苔遥情不入酒望美信難哉題琴朴一作材奉栁呉興邊山此嘉樹揺影出雲垂清心有素體直幹無曲枝凡耳非所别君子特見知不辭去根本造膝仰光儀芳樹芳葉已漠漠嘉賓復離離發景傍雲屋凝暉覆華池輕蜂掇浮頴弱鳥隠深枝一朝容色茂千春長不移望雪氛氲發紫漢雜沓被朱城倐忽銀臺搆俄頃玉樹生綿綿九軌合昭昭四區眀玉堦春草發溜始參差扶堦方沃若雜葉半藏蜻叢花未隠雀葳蕤亂碧紫蒼黄間濃薄漢魏六朝百三家集巻九十
