body:
  text: 漢魏六朝百三家集巻五十二晉成公綏集題詞東郡成公子安賦心不若左太沖史才不若袁彦伯其在晉文苑與庾仲初曹輔佐兄弟也嘯賦見貴於時梁昭明登之文選激揚嘽緩彷彿有聲然列於馬融長笛嵇康琴賦亦彈而不成矣賦少深致而序各有思讀諸賦不如讀其序也樂歌施於廊廟揆之雅頌不知其中何篇也晉世郊廟燕射鼓吹舞曲皆有詞其篇章見名者傅𤣥張華荀朂成公綏曹毗王珣耳辭毎雷同傅稍出羣子安得與茂先接塵其人幸甚欲如漢郊祀歌之練時日鼓吹鐃歌之朱鷺則真曠代矣𨽻勢善於説字若有宫商綦組亦陸機文賦之流乎目錄賦天地賦有序木蘭賦有序雲賦柳賦琵琶賦大河賦琴賦時雨賦棄故筆賦有序芸香賦烏賦有序隂霖賦延賔賦嘯賦蜘蛛賦螳蜋賦洛褉賦鴻雁賦有序鸚鵡賦序日及賦序頌賢明頌菊頌銘椒華銘蔽髻銘菊銘箴市長箴誄魏相國舞陽宣文侯司馬公誄七七唱雜文𨽻書體戒火文樂歌晉四廂樂歌王公上壽酒歌正旦大㑹行禮歌十五章詩中宫詩二首其一其二行詩遊仙詩漢魏六朝百三家集巻五十二目録欽定四庫全書漢魏六朝百三家集巻五十二明張溥輯晉成公綏集賦天地賦有序賦者貴能分賦物理敷演無方天地之盛可以致思矣歴觀古人未之有賦豈獨以至麗無文難以辭贊不然何其闕哉遂為天地賦惟自然之初載兮衜虚無而𤣥清太素紛以溷淆兮始有物而混成何一元之芒昩兮廓開闢而著形爾乃清濁剖分𤣥黄判離太極既殊是生兩儀星辰煥列日月重規天動以尊地静以卑昏明迭炤或盈或虧隂陽協氣而代謝寒暑随時而推移三才殊性五行異位千變萬化繁育庶類授之以形稟之以氣色表文采聲有音律覆載無方流形品物鼓以雷霆潤以慶雲八風翺翔六氣氤氲蚑行蠕動方聚類分鱗殊族别羽毛以羣各含精而容冶咸受範於陶鈞何滋育之罔極兮偉造化之至神若夫懸象成文列宿有章三辰燭曜五緯重光河漢委虵而帶天虹霓偃蹇於昊蒼望舒弭節於九道羲和正轡於中黄衆星回而環極招搖運而指方白虎峙據於參昴青龍垂尾於氐房𤣥龜匿首於女虚朱鳥奮翼於星張帝皇正坐於紫宫輔臣列位於文昌垣屏絡繹而珠連三台差池而雁行軒轅華布而曲列攝提鼎峙而相望若乃徴瑞表祥災變呈異交㑹薄蝕抱暈帶珥流逆犯厯譴悟象事蓬容著而妖害生老人形而主受喜天矢黄而國吉祥彗孛發而世所忌爾乃旁觀四極俯察地理川瀆浩汗而分流山嶽磊落而羅峙滄海沆漭而四周懸圃隆崇而特起昆吾嘉於南極燭龍曜於北阯扶桑髙於萬仞尋木長於千里崑崙鎮於隂隅赤縣據於辰已於是八十一域區分方别風乖俗異險㫁阻絶萬國羅布九州並列青冀白壤荆衡塗泥海岱赤埴華梁青黎兖帶河洛揚有江淮辨方正土經略建邦王圻九服列國一同連城比邑深池髙墉康衢交路四達五通東至暘谷西極泰濛南暨丹穴北盡空桐遐方外區絶域殊鄰人首蛇軀鳥翼龍身衣毛被羽或介或鱗棲林浮水若獸若人居乎大荒之外處於巨海之濵於是六合混一而同宅㝢宙結體而括囊元運渾流而無窮隂陽循度而率常回動糾紛而乾乾天衜不息而自彊統羣生而載育人託命於所繋尊太一於上皇奉萬神於五帝故萬物之所宗必敬天而事地若乃共工赫怒天柱摧折東南俄其既傾西北豁而中裂㫁鼇足而續毁鍊玉石而補缺豈斯事之有徴将言者之虚設何隂陽之難測偉二儀之奓濶坤厚德以載物乾資始而至大俯盡鑒於有形仰蔽視於所蓋游萬物而極思故一言於天外木蘭賦有序許昌西園中木蘭樹余徃觀之遂為賦曰覽衆樹之列植嘉木蘭之殊觀至於𤣥冥授節猛寒嚴烈峩峩堅氷霏霏白雪木應霜而枯零草隨風而摧折顧青翠之茂葉繁旖旎之弱條諒抗節而矯時獨滋茂而不彫雲賦於是𤣥氣仰散歸雲四旋氷消瓦離奕奕翩翩去則滅軌以無迹來則幽闇以杳冥舒則彌綸覆四海巻則消液入無形或狎獵鱗次參差交錯上㨗業以梁倚下壘硊而相薄状崴嵬其不安吁可畏而欲落或粲爛綺藻若畫若規繁縟成文一續一離或繡文錦章依微要妙緜邈凌虚輕翔浮漂柳賦宅京宇之西偏濱犢鼻之清渠啓横門於大路臨九達之通衢愍行旅之靡休樹雙栁於衜隅彌年載而成隂紛嬋媛而扶疎琵琶賦八音之用誦於典藝簫韶九奏物有容制惟此琵琶興自末世爾乃託巧班輸妙意横施因形造美洪殺得宜柄如翠虬之仰首盤似靈龜之觜觿臨樂則齊州之丹桂拊柱則梁山之象犀􅔊以玳瑁格以瑤枝若夫盤圗合靈太極形也三材片合兩儀生也分柱列位嵗數成也回忩華表日月星也大河賦覽百川之𢎞壮兮莫尚美於黄河潛崑崙之峻極兮出積石之嵳峩登龍門而南遊兮拂華隂與曲阿淩砥柱而激湍兮踰汭洛而揚波體委虵於后土兮配雲漢於穹蒼貫中夏之畿甸兮經朔秋之遐荒厯二周之北境兮流三晉之南鄉秦自西而啓壤兮齊據東而畫疆殷徒涉而永固衛遷濟而遂强趙決流而却魏嬴引溝而滅梁思先喆之攸歎何水悳之難量琴賦伯牙彈而駟馬仰秣子埜揮而𤣥鶴齊鳴清角發而陽氣亢白雲奏而風雨零時雨賦兩儀協合二氣烟煴洪川起波名山興雲棄故筆賦有序治世之功莫尚於筆能舉萬物之形序自然之情即聖人之志非筆不能宣實天地之偉器也有倉頡之竒生列四目而兼明慕羲氏之畫卦載萬物於五行乃發慮於書契採秋毫之穎芒如膠漆之綢繆結三束而五重建犀角之𤣥管屬象齒於纎鋒染青松之微煙著不泯之永蹤則象神仙人皇九頭式範羣生異體怪軀注王度於七經訓河洛之䜟緯書日月之所躔别列宿之舎次乃皆是筆之勛人日用而不寤仡盡力於萬機卒見棄於行路芸香賦美芸香之修絜稟隂陽之淑精去原埜之蕪穢植廣厦之前庭莖類秋竹葉象春檉烏賦有序有孝烏集余之廬乃喟爾而歎曰余無仁惠之徳祥禽曷為而至哉夫烏之為瑞久矣以其反哺識養故為吉鳥是以周書神其流變詩人尋其所集望富者瞻其爰止愛屋者及其増歎兹蓋古人所以為稱若乃三足徳靈國有道則見國無道則隠斯乃鳳鳥之惪何以加焉鵩惡鳥而賈生懼之烏善禽而吾嘉焉懼惡而作歌嘉善而賦之不亦可乎惟𤣥烏之令鳥兮性自然之有識應炎陽之純精兮體乾剛之至色望仁里以迴翔兮翩羣鳴以拊翼差自託於君子兮心雖邇而不逼起彼髙林集此叢灌棲息重隂列巢布翰繽紛霧㑹徊徨塵亂來若雨集去如雲散哀鳴日夕鼓翼昩旦噫啞相和音聲可玩嗟斯烏之克孝兮心識養而知慕同蓼莪之報惪兮褱凱風之至素雛既壮而能飛兮乃銜食而反哺遊朝霞而凌厲兮飄輕翥於𤣥冥有崑山之竒類兮體殊形而玉趾淩西極以翺翔兮為王母之所使時應徳而來儀兮介帝王之繁祉入中州而武興兮集林木而軍起能休祥於有周兮矧貞明於吉士嘉兹烏之淑良兮永歡樂而靡巳隂霖賦百川汎濫潢潦横流沈竈生鼃中庭運舟延賓賦延賔命客集我友生髙談清晏講道研精誾誾侃侃娛心肆情嘯賦逸羣公子體竒好異傲世忘榮絶棄人事睎髙慕古長想逺思将登箕山以抗節浮滄海以游志於是延友生集同好精性命之至機研衜惪之𤣥奥愍流俗之未悟獨超然而先覺狹世路之阨僻仰天衢而髙蹈邈跨俗而遺身乃慷慨而長嘯於是曜靈俄景流光濛汜逍遙攜手踟蹰步趾發妙聲於丹脣激哀音於皓齒響抑揚而潛轉氣衝鬱而熛起協黄宫於清角雜商羽於流徴飄游雲於泰清集長風乎萬里曲既終而響絶遺餘玩而未巳良自然之至音非絲竹之所擬是故聲不假器用不借物近取諸身役心御氣動脣有曲發口成音觸類感物因歌隨唫大而不洿細而不沈清激切於竽笙優潤和於瑟琴𤣥妙足以通神悟靈精微足以窮幽測深收激楚之哀荒節北里之奢淫濟洪災於炎旱反亢陽於重隂唱引萬變曲用無方和樂怡懌悲傷摧藏時幽散而将絶中矯厲而慨慷徐婉約而優游紛繁騖而激揚情既思而能反心雖哀而不傷總八音之至和固極樂而無荒若乃登髙臺以臨逺披文軒而騁望喟仰抃而抗首嘈長引而憀亮或舒肆而自反或徘徊而復放或冉弱而柔撓或澎濞而奔壮横鬱鳴而滔涸洌繚聎而清昶逸氣奮湧繽紛交錯列列飈揚啾啾響作奏胡馬之長嘶迴寒風乎北朔又似鴻雁之将雛羣鳴號乎沙漠故能因形創聲隨事造曲應物無窮機發響速怫鬱衝流參譚雲屬若離若合将絶復續飛廉鼔於幽隧猛虎應於中谷南箕動於穹蒼清飈振乎喬木散滯積而播揚蕩埃靄之溷濁變隂陽之至和移淫風之穢俗若乃游崇岡陵景山臨巖側望流川坐磐石潄清泉藉奉蘭之猗靡䕃修竹之嬋娟乃唫咏而發散聲絡繹而響連舒蓄思之悱憤奮乆結之纒緜心滌蕩而無累志離俗而飄然若夫假象金革擬則陶匏衆聲繁奏若笳若簫磞硠震隠訇磕􅀈嘈發徴則隆冬熈蒸騁羽則嚴霜夏凋動商則秋霖春降奏角則谷風鳴條音均不恒曲無定制行而不流止而不滯隨口吻而發揚假芳氣而逺逝音要妙而流響聲激嚁而清厲信自然之極麗羗殊尤而絶世越韶夏與咸池何徒取異乎鄭衛於是緜駒結舌而喪精王豹杜口而失色虞公輟聲而止歌寗子斂手而歎息鍾期棄琴而改聽尼父忘味而不食百獸率舞而抃足鳳皇來儀而拊翼乃知長嘯之竒妙蓋亦音聲之至極蜘蛛賦獨星懸於浮處遂設網於四隅南連大廡北接華堂左馮廣厦右依髙廊吐絲屬絡布網引綱纎羅絡幕綺錯交張於是蒼蚊夕起青蠅昏歸營營羣衆甍甍亂飛罣翼繞足罥絲罹圍衝突必獲犯者無遺螳蜋賦仰及茂隂俯緣條枝冠角峩峩足翅跂跂尋喬木而上綴從蔓草而下垂戢翼鷹峙延頸鵠望推翳徐翹舉斧髙抗鳥伏虵騰鶴撃隼放俯飛蟬而奮猛臨蟪蛄而逞壮距車輪而軒翥固齊侯之所尚乃有翩翩黄雀舉翮髙揮連翔枝幹或鳴或飛覩兹螳蜋将以療飢厲觜脅翼其徃如歸洛褉賦考吉日簡良辰祓除觧褉同㑹洛濵妖童媛女嬉遊河曲或振纎手或濯素足臨清流坐沙場列罍罇飛羽觴鴻雁賦余嘗遊乎河澤之間是時鴻雁應節而羣至望川以奔集夫鴻漸著羽儀之歎小雅作於飛之歌斯乃古人所以假象興物有取其美也余又竒其應氣而知時故作斯賦辰火西流秋風屬起軒翥鼓翼抗志萬里過雲夢以娯遊投淮湘而中憩晝顧眺以候逺夜警循而相衛鸚鵡賦序鸚鵡小禽也以其能言解意故為人所愛玩育之以金籠升之以堂殿可謂珍之矣未得鳥之性也日及賦序日及者華甚鮮茂榮於仲夏訖於孟秋頌賢明頌於鑠姜后光配周宣非義不動非禮不言晏起早朝永巷告愆王用勤政萬國以䖍菊頌先民有作詠兹秋菊綠樹黄花菲菲彧彧芳踰蘭蕙茂過松栢其莖可玩其葩可服味之不巳松喬等福銘椒華銘嘉哉芳椒載繁其實厥味惟珍蠲除百疾肇惟嵗始月正元日永介眉夀以祈初吉蔽髻銘或造兹髻南金翠翼明珠星列繁華致飾菊銘數在三九時惟斯生箴市長箴貿遷有無市朝有處人以攸貿貨以攸叙交易而退各得其所曹參相齊清浄以義奸不可擾顧託有寄市臣掌肆收告執事誄魏相國武陽宣文侯司馬公誄應期降命篤生我公九徳聿修百行兼通文皇踐位龍飛天衢協贊大命啓迪靈符光我聖主齊徳有虞受兹介祉封國建畿入總納言敷化衡機出登上将奮武明威皇輿省方作鎮于許旌旗既反撫戎荆楚巴蜀作寇侵我邊疆乃眷西顧董統雍京丹麾所指莫之敢抗仁濟宇内威懾外荒流惠零雨齊美甘棠加命九錫尊位相國比王齊魯以崇碩徳七七唱奮長袖以飈迴擢纎腰以烟起鎮抗首而委蛇䬃頓足而立峙紛龍轉而鳯翔忽若倒而中止雜文𨽻書體御覧作𨽻勢皇頡作文因物搆思觀彼鳥跡遂成文字燦矣成章閱之後嗣存載道徳紀綱萬事俗所傳述實繇書記時變巧易古今各異蟲篆既繁草藁近偽適之中庸莫尚于𨽻規矩有則用之簡易隨便適宜亦有弛張操筆假墨抵押毫芒彪煥磥落形體抑揚芬葩連屬分間羅行爛若天文之布耀蔚若錦繡之有章或輕拂徐振緩按急挑挽横引縱左牽右繞長波鬱拂微勢縹緲工巧難傳善之者少應心得手必繇意曉爾乃動纎指舉弱腕握素紈染𤣥翰彤管電流雨下雹散㸃􅚍折拔􅠖挫安按繽紛絡繹華藻粲爛絪緼卓犖一何壮觀繁縟成文又何可玩章周道之郁郁表唐虞之輝煥若乃八分璽法殊好異制分白賦黑棊布星列翹首舉尾直刺邪􅠖繾綣結體劖彩奪節或若虬龍盤游蜿蟬軒翥鸞鳳翺翔矯翼欲去或若鷙鳥将擊并體抑怒良馬騰驤奔放向路仰而望之鬱若􅀢霧朝升遊烟連雲俯而察之凛若清風厲水漪瀾成文垂象表式有模有楷形功難詳聊舉大體彤管二句一作寳翰電流彤管雲散戒火文余家遭火屋宇焚盡器用廓然乃造于四鄰以為戒火文曰經籍為灰篇章為炭樂歌晉四廂樂歌王公上夀酒歌上夀酒樂未央大晉應天慶皇帝永無疆正旦大㑹行禮歌十五章穆穆天子光臨萬國多士盈朝莫非俊徳流化罔極王猷允塞嘉㑹置酒嘉賔充庭羽旄曜辰極鐘鼓振太清百辟朝三朝彧彧明儀刑濟濟鏘鏘金聲玉振禮樂具宴嘉賔眉夀祚聖皇景福惟日新羣后戾止有來雍雍獻酬納䞇崇此禮容豐肴萬俎㫖酒千鍾嘉賔盡宴樂福祿咸攸同樂哉天下安寧道化行風俗清簫韶作詠九成年豐穰世泰平至治哉樂無窮元首聰明股肱忠澍豐澤揚清風嘉瑞出靈應彰麒麟見鳯凰翔醴泉湧流中唐嘉禾生穗盈箱降繁祉祚聖皇承天位統萬國受命應期授聖徳四世重光宣開洪業景克昌文欽明徳彌彰肇啓晉邦流祚無疆泰始建元鳯皇龍興龍興伊何享祚萬乘奄有八荒化育黎烝圖書煥炳晉書作既煥金石有徴徳光大道熈隆被四表格皇穹奕奕萬嗣明明顯融髙朗令終保兹永祚與天比崇聖皇君四海順人應天期三葉合重光泰始開洪基明曜參日月功化侔四時宇宙清且泰黎庶咸雍熈善哉雍熈惟天降命翼仁祐聖於穆三皇載徳彌盛總齊璇璣光統七政百揆時序化若神聖四海同風興至仁濟民育物擬陶鈞擬陶鈞垂惠潤皇皇羣賢峩峩英俊徳化宣芬芳播來𦙍播來𦙍垂後昆清廟何穆穆皇極闢四門皇極闢四門萬機無不綜亹亹翼翼樂不及荒飢不遑食大禮既行樂無極登崑崙上層城乗飛龍升泰清冠日月佩五星揚虹蜺建彗旌披慶雲䕃繁榮覽八極遊天庭順天地和隂陽序四時曜三光張帝網正皇綱播仁風流惠康邁洪化振靈威懐萬方納九夷朝閶闔宴紫微建五旗羅鐘虡列四縣奏韶武鏗金石揚旌羽縱八佾巴渝舞詠雅頌和律吕于胥樂樂聖主化蕩蕩清風泄總英雄御俊傑開宇宙掃四裔光緝熈美聖哲超百代揚休烈流景祚顯萬世皇皇顯祖翼世佐時寧濟六合受命應期神武鷹揚大化咸熈廓開皇衢用成帝基光光景皇無競惟烈匡時拯俗休功蓋世宇宙既康九域有截天命降鑒啓祚明哲穆穆烈考克明克雋實天生徳誕膺靈運肇建帝業開國有晉載徳奕世垂慶洪𦙍明明聖帝龍飛在天與靈合契通徳幽𤣥仰化青雲俯育重淵受靈之祐於萬斯年詩中宫詩二首按樂府載張華晉中宫所歌一首體與此同其一殷湯令妃有莘之女仁教内修度義以處清謐後宫九嬪有序尹為媵臣遂作元輔其二天地不獨立造化由隂陽乾坤垂覆載日月曜重光治國先家道立教起閨房二妃濟有虞三母隆周王塗山興大禹有莘佐成湯齊晉霸諸侯皆賴姬與姜闗雎思賢妃此言安可忘行詩一云塗中作洋洋熊耳流巍巍伊闕山髙岡碣崔嵬雙阜夾長川素石何磷磷水禽何翩翩逺涉許潁路顧思邈綿綿鬱陶懐所親引領情惘然遊仙詩盛年無幾時奄忽行欲老那得赤松子從學度世道西入華隂山求得神芝草珠玉猶戴土何惜千金寳但願垂無窮與君長相保漢魏六朝百三家集巻五十二
