body:
  text: 漢魏六朝百三家集卷十五漢李尤集題詞後漢書文苑二十人李伯仁與其選亦蘭臺文章之傑也傳云著詩賦銘誄頌七歎哀典凡二十八篇今誄頌哀典俱不見七歎無傳惟有七欵豈歎字之訛耶其文寂寥非枚叔比也詩有九曲歌間屬闕文賦五首微質雅擬之上林長楊則泰山丘垤也當時薦者稱其文有相如揚雄風何哉銘八十餘多體要之作及所匠意于子雲百官箴得其深矣摰仲治譏以穢病屈諸王莽鼎銘之下抑文家以少言為貴而多者難于見工也目録賦函谷闗賦平樂觀賦東觀賦徳陽殿賦辟雍賦七七欵銘函谷關銘孟津銘河銘洛銘鴻池陂銘井銘明堂銘太學銘辟雍銘永安宫銘徳陽殿銘闕銘雲臺銘京師城門銘正陽城門銘高安館銘平樂館銘東觀銘堂銘門銘中東門銘上西門銘上東門銘關陽城門銘津城門銘旄城門銘廣陽門銘雍城門銘夏城門銘穀城門銘室銘楹銘牖銘琴銘鐘簴銘漏刻銘鼎銘古鼎銘屏風銘舟楫銘寳劒銘笛銘車銘天軿車銘經橈銘讀書枕銘筆銘墨硯銘冠幘銘文履銘錯佩刀銘金馬書刀銘弧矢銘弩銘彈銘盾銘鉦銘書案銘牀几銘鎧銘良弓銘轡銘鞍銘馬箠銘卧牀銘麈尾銘薰罏銘安哉銘羮魁銘豐侯銘箕銘權衡銘匱匣銘武庫銘圍棋銘盤銘樽銘杯銘印銘鏡銘靈夀杖銘金羊燈銘竈銘席銘鞠城銘序几銘序詩九曲歌漢魏六朝百三家集巻十五目録欽定四庫全書漢魏六朝百三家集巻十五明張溥輯漢李尤集賦函谷闗賦惟皇漢之休烈兮包八極以據中混無外之盪盪兮惟唐典之極崇萬國喜而洞洽兮何天衢以流通襟要約之險固兮制闗鍵以擒并其南則有蒼梧荔浦離水謝沐涯浦零中以窮海陸於北則有蕭居天井壺口石經貫越伐朔以臨胡庭縁邊邪指陽㑹玉門凌測龍堆或置於西則有隨龍武夷白水江零沔漢阻曲路繇山泉舊水遼濫沐落是經迺周覽以汎觀兮歴衆闗以遊目惟夸濶之宏麗兮羌莫盛於函谷施雕礱以作好建峻敞之堅重殊中外以隔别翼巍巍之髙崇命尉臣以執鑰統羣類之所從嚴固守之猛厲操戈鉞而普聰蕃鎮造而惕息侯伯過而震惶惟函谷之初設險前有姬之苗流嘉尹喜之望氣知真人之西遊爰物色以遮道為著書而肯畱自周轍之東遷秦虎眎乎中州文馳齊而懼追譎雞鳴於狗偷睢背魏而西逝託衾衣以免捜大漢承弊以建徳革厥舊而運修准令宜以就制因兹勢以立基葢可以詰非司邪括執喉咽季末荒戌墮闕有年天閔羣黎命我聖君稽符皇乾孔適河文中興再授二祖同勛永平承緒欽明奉循上羅三闗下列九門㑹萬國之玉帛徠百蠻之貢琛冠葢紛其雲合車馬動而雷奔察言服以有譏捐繻傳而勿論於以廓襟度於神聖法易簡於乾坤平樂觀賦乃設平樂之顯觀章秘瑋之竒珍習禁武以講捷厭不羈之遐鄰徒觀平樂之制欝崔嵬以離婁赫巖巖其崟嶺紛電影以盤紆彌平原之博敞處金商之維陬大厦累而鱗次承岧嶤之翠樓過洞房之轉闥歴金環之華鋪南切洛濵北陵蒼山龜池泱漭果林榛榛天馬沛艾鬛尾布分爾乃大和隆平萬國肅清殊方重譯絶域造庭四表交㑹抱珍逺并雜遝歸誼集於春正翫屈竒之神怪顯逸才之捷武百僚于時各命所主方曲既設秘戲連敘逍遙俯仰節以鞀鼓戲車髙橦馳騁百馬連翩九㲽離合上下或以馳騁覆車顛倒烏獲扛鼎千鈞若羽吞刃吐火燕躍鳥跱陵高履索踊躍旋舞飛丸跳劍沸渭回擾色渝隈一踰肩相受有仙駕雀其形蚴虬騎驢馳射狐兔驚走侏儒巨人戲謔為耦禽鹿六駮白舄朱首魚龍㬅延㟪山阜龜螭蟾蜍挈琴鼓缶東觀賦敷華實於雍堂集幹質於東觀東觀之萟孽孽洋洋上承重閣下屬周廊步西蕃以徙倚好緑樹之成行歴東厓之敞坐庇蔽芾之甘棠前望雲臺後匝徳陽道無隠而不顯書無闕而不陳覽三代而采宜包郁郁之周文徳陽殿賦開三階而參㑹錯金銀於兩楹入青陽而窺總章歴户牖之所經連璧組之潤漫雜虬文之蜿蜒爾乃周閣迴匝峻樓臨門朱閣巖巖嵯峨槩雲青瑣禁門廊廡翼翼華蟲詭異宻采珍縟達蘭林以西通中方池而特立果竹鬱茂以蓁蓁鴻雁沛裔而來集徳陽之北斯曰濯龍葡萄安石蔓延䝉籠橘柚含桃甘果成叢文㮰曜水光映煌煌辟雍賦辟雍巖巖規矩圓方階序牖闥雙觀四張流水湯湯造舟為梁神聖班悳由斯以匡王公羣后卿士具集攅羅鱗次差池襍遝延忠信之純徳兮列左右之貂璫三后八蕃師尹羣卿加休慶徳稱夀上觴戴甫垂畢其儀蹌蹌是以乾坤所周八極所要夷狄蠻羌儋耳哀牢重譯響應抱珍來朝南金大璐玉象犀龜七七欵竒宫閒館迴洞庭門井幹廣望重閣柘因夏屋渠渠嵯峨合連前臨都街後據流川梁王一作上青黎一作麗盧橘是生白華緑葉扶疎冬榮與時代序孰不墮零黄景炫炫眩林曜封金衣素裏一作紫班白内􅂶滋味偉異淫樂無窮副以芋柘豐𢎞誕節纎液玉津㫖於飲蜜銘函谷闗銘函谷險要襟帶喉咽尹從李老畱作二篇孟嘗離秦奔騖東征夜造稽疑譎以雞鳴范睢將入自盛以囊元鼎輩移錯之新安舍彼西阻東即高原長墉重闗閒固不踰簡易易從與乾合符孟津銘洋洋河水赴宗于海經自中州龍圖所在黄函白神赤符以信昔有周武集㑹孟津魚入王舟迺往克殷赴水經註作朝河銘洋洋河水赴宗于海經自中州龍圖所在昔周武諸侯㑹于孟津魚入王舟乃往尅殷大漢承緒懐附遐鄰邦事來濟各貢厥珍洛銘洛出熊耳東流㑹集夏禹導疏經于洛邑元龜赤字漢符是立帝都通路建國南鄉萬乘終濟造舟為梁三都五州貢篚萬方廣視逺聴審任賢良元首昭明庶類是康鴻池陂銘水經注鴻澤之陂聖王所規開水東注出自城池井銘井之所尚寒泉冽清法律取象不槩自平多取不損少汲不盈執憲若斯何有邪傾明堂銘布政之室上圓下方體則天地在國正陽窓闥四設流水洋洋順節行化各居其房春恤幼孤夏進賢良秋厲武人冬謹闗梁太學銘漢遵禮典崇興六藝修周之理埽秦之弊褒建儒宫廣置異記開延學者勸以爵位辟雍銘惟王所建方中圓外清流四匝蕩滌濁穢永安宫銘合歡黄堂中和是遵蒨廬懐本前果暢春前一作新候臺集道俾司星辰豐業廣徳以協天人萬福來助嘉娛永欣徳陽殿銘皇穹垂象以示帝王紫微之側𢎞讓一作誕彌一作爾光大漢體天承以徳陽崇𢎞高麗苞一作包受萬方内宗一作綜朝貢外示一作供遐荒闕銘皇上尊嚴萬姓載依國都攸處建設端闈表樹兩觀雙闕巍巍雲臺銘周氏舊居惟漢襲因崇臺嶒峻一作嘈嗷上擬蒼雲垂示億載俾率舊章人修一作循其行而國其昌京師城門銘天險匪登地險丘陵帝王設險乾坤是承正陽城門銘雒陽城十二門平門督司午位處分外臨僚侍内達帝宫正陽南面炎暑赫融後漢書注平城司午厥位處中髙安館銘巍巍高安明聖是修嶕嶢麗館窓闥列周長除臨起櫺檻相承聖朝明察同保休徵平樂館銘乃興平樂𢎞敞麗光層樓通閣禁闥洞房棼梁照曜朱華飾璫騁武舒秘以示幽荒如榮普覆然後來王東觀銘周氏舊區皇漢寔循房闥内布疏綺外陳升降三除貫啓七門是謂東觀書籍林林列侯𢎞雅治掌萟文堂銘因邑致宅爰興殿堂夏屋渠渠高敞清涼家以師禮修奉烝嘗延賓西階主近東廂宴樂嘉客吹笙鼓簧門銘門之設張為宅表㑹納善閉邪擊柝防害中東門銘中東處仲月位當􅄧倉庚有聲隼鷹匿爪除去桎梏訟獄勿考上西門銘上西在季位月惟戌菊黄豹察號令嚴悉上東門銘上東少陽厥位在寅條風動物月值孟春闗陽城門銘闗一作開闗陽在孟位月惟已清門一作明冠節太陽進起津城門銘津名自定位月在未一作名有定位惟月在未温風鬱暑鷹鳥習鷙旄城門銘一作耗誤旄門值季位月在辰順陽布恵貧乏是振廣陽門銘廣陽位孟厥月在申涼風從時白露已紛雍城門銘雍門處中位月在酉盲風寒濁鷰一作雁歸山阜夏城門銘夏門值孟位月在亥陰陽不通蝃蝀匿彩迎冬北壇從陰所在穀城門銘穀門北中位當于丑太陰主刑殺伐為首丑後漢書注作子為一作事首一作子室銘室以安寧寢息幽閒室寒空隟遮遏風寒無曰寂寞屋漏昭然楹銘幹强體正雖重不移上下相安高而不危牖銘天設窓牖開光照陰施于明堂以象八風琴銘琴之在音蕩滌邪心雖有一作存正性其感亦深存雅却鄭浮侈是禁條暢和止一作樂樂而不淫鐘簴銘周因殷禮損益可知漢因於周猶若重規人曰秦器事有可施鴻鐘怒簴物得其宜聲揚逺聞文耀委迤漏刻銘玉海摘昏明數句為晉李􅂶銘注云藝文有後漢李尤銘又有李􅂶銘今攷藝文兩載並作尤昔在先聖配天垂則仰釐七曜俯順神徳力一作乃建日官俾立漏刻昏明既序景曜不忒唐命羲和敬授人時懸象著明序以崇熈季末不䖍徳衰于兹挈壺失職一作節刺流在詩聖哲稽古帝則是欽尺璧非寳重此寸陰昧旦丕顯敬聴漏音思我王度如玉如金鼎銘五鼎大和滋味集具雖快其口損之為務古鼎銘王命尸臣官此拘邑賜爾和鸞黼黻琱弋尸臣拜手曰敢對揚天子丕顯休命屏風銘舍則潛避用則設張立必端直處必亷方雍閼風雅霧露是抗奉上蔽下不失其常舟楫銘舟楫之利譬猶輿馬載一作輦重歴逺以濟天下相風視波窮究川野安審懼慎終無不可寳劒銘五材並用誰能去兵龍淵耀竒太阿飛名陸斷犀兕水截鯢鯨搢紳咸服翼宣儀刑豈徒振武義合金聲笛銘出自卥南流離浩蕩車銘圓葢象天方軫一作輿則地輪法陰陽動不相離合一作軫之嗛虚疏達開通兩輜障邪尊卑是從輗軏之用信義所同天輧車銘御覽作軺車奚氏本造後裔飾雍輪以代步屏以蔽容輪軿并合出入周通追仁赴義惟禮是恭經橈銘瞻之在前忽焉在後進新習故不舍於口子在川上逝者如斯及年廣學無問不知讀書枕銘聴政理事怠則覽書傾倚偃息隨體興居寤心起意由愈宴娛筆銘筆之强志一作忍庶事分别七術雖衆猶可解説投足一作口無擇言駟不及舌筆之過誤愆尤不滅墨硯銘書契既造硯墨乃陳烟石附筆以流以申篇籍永垂紀志功勲冠幘銘冠為元服幘為首服君子敬慎自强不忒文履銘乃製兹履文質武斌允顯明哲卑以牧身步此堤道絶彼埃塵錯佩刀銘佩之有錯抑武揚文豈為麗好將戒其身金馬書刀銘巧冶錬剛金託於刑貢文錯鏤兼勒工名淬以清流礪以越石一本無淬以二句弧矢銘弦木為弧剡木為矢弧矢協并八極同紀一作協并八極四方同紀弩銘放自近古發意所覩前聖制方後世建弩機牙發矢執破醜虜􅂶獲雖屢猶不可常忘戰者危極武者傷彈銘昔之造彈起意弦木以丸為矢合竹為樸漆飾以霑不用筋角丸彈之利以弋鳬鶩晉靈驕悖羣臣是彈樂其如躍趨如避丸盾銘吳旂魯􅀈戎兵特頒進則避刃爰以衛軀鉦銘申嚴號令誓飾師旅以肅紀律萬衆是聴書案銘居則致樂承顔接賓承奉奏記通達詔制尊上答下道合仁義牀几銘虚左致賢設坐來賓筵牀對几盛養已陳殽仁飯義枕典席文道可醉飽何必清醇西伯善養二老來遊鎧銘甲鎧之施扞禦鋒矢尚其堅剛或用犀兕内以存身外不相害有似仁人厥道廣大好徳者寧好戰者危專智恃力君子不為良弓銘弓矢之作爰自曩時鄉射一作材載禮招命在詩玅一作力稱顔高巧一作功發晉師一作由基不爭之美亦以辨儀一作詳疑轡銘轡銜在手急緩必時賞罰在心中和是思馬知良銜進取道理人知善政令行禁止鞍銘駈騖馳逐騰躍覆被雖其捷習亦有顛沛井羸其瓶罔不斯敗馬箠銘御者箠策示有威怒東野之敗督責過度卧牀銘體之所安寢處和歡夕惕敬慎崇徳逺奸麈尾銘撝成徳柄言為訓辭鑒彼逸傲念兹末兹薰罏銘上似蓬萊吐氣委虵芳烟布繞遙冲紫微安哉銘陶器安哉令名甘㫖是盛埏埴之巧甄陶所成食彼美珍思此鹿鳴羮魁銘羊羮不徧駟馬長驅豐矦銘豐侯荒繆醉亂迷逸乃象其形為禮戒式後世傳之固無止説箕銘神農植穀以養蒸民箕主簸揚糠粃及陳權衡銘夫審輕重莫若權衡欲正是非其唯賢明匱匣銘國有都邑家有匣匱貨賄之用我之利器武庫銘搏噬爪牙鋒距之先毒螫芒刺矛矢以存聖人垂象五兵已陳圍棋銘詩人幽憶感物則思志之空閒翫弄遊意局為憲矩棊法陰陽道為經緯方錯列張盤銘或以承觴或以受物既舉清觴又成口實樽銘樽設在堂以俟俊乂三山共承雕琢錯帶杯銘小之為杯大之為閜杯閜之用無施不可以飲以享慎斯得正周公之美驕􅈔為病印銘赤紱在報非印不明棨傳符節非印不行龜紐犢鼻用爾作程鏡銘鑄銅為鑑整飾容顔修爾法服正爾衣冠靈夀杖銘亭亭竒幹寔曰靈夀甘泉潤根清露流莖乃制為杖扶危定傾既憑其實亦貴其名金羊燈銘賢哲勉務惟日不足金羊載耀作明以續竈銘燧人造火竈能以興五行接備陰陽相承席銘施席接賔士無愚賢值時所有何必羊豚鞠城銘圓鞠方牆倣象陰陽法月衡對二六相當建長立平其例有常不以親疎不有阿私端心平意莫怨其非鞠政由然况乎執機序几銘序黄帝軒轅仁智恭恕恐事之有闕作輿几之法詩九曲歌年歳晩暮時已斜安得力士翻日車闕漢魏六朝百三家集巻十五
