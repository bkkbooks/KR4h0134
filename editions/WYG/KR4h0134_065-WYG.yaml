body:
  text: 漢魏六朝百三家集巻六十五宋謝靈運題詞謝瑍不慧乃生客兒車騎先大笑之宋公受命客兒稱臣夫謝氏在晉世居公爵凌忽一代無其等匹何知下伾徒步迺作天子客兒比肩等夷低頭執版形跡外就中情實乖文帝繼緒輕戮大臣與謝侯無夙昔之知綢繆之託重以孟顗扇謗彭城墜淵尋山陟嶺伐木開徑盡録罪狀其自訟表有云未聞俎豆之學欲為逆節山棲之士而搆陵上言最明痛不免棄市蓋酷禍造於虚聲怨毒生於異代以衣冠世臣公侯才子欲倔强新朝送齒丘壑勢誠難之予所惜者涕泣非徐廣隠遯非陶潜而徘徊去就自殘形骸孫登所謂抱歎於嵇生也山居賦序廢張左尋臺皓致在去飾取素宅心若此何異秋水齊物詩冠江左世推富艶以予觀之吐言天拔政繇素心獨絶耳客好佛經其辯宗論曇隆誄又皆祗洹奇趣道門閣筆彼出處語黙無一近人予固知其不殺不止牽犬聽鶴追松鼓棹均無累其本度也目録賦山居賦幷自註撰征賦歸塗賦羅浮山賦嶺表賦怨曉月賦長谿賦江妃賦又入道至人賦逸民賦辭禄賦感時賦孝感賦傷已賦表勸伐河北表謝封康樂侯表詣闕上表牋與廬陵王牋書答范光禄書又答王衞軍問辨宗論書與弟書答弟書答綱琳二法師書志遊名山志論辨宗論問答附頌無量壽佛頌贊王子晉讚巖下見一老翁四五少年讚維摩經十譬贊聚沬泡合燄芭蕉聚幻夢影響合浮雲電侍汎舟贊和范光禄祗洹像讚三首幷序佛讚菩薩讚縁覺聲聞合讚銘佛影銘有序書帙銘七七濟誄宋武帝誄宋廬陵王誄曇隆法師誄廬山慧逺法師誄漢魏六朝百三家集巻六十五目録欽定四庫全書漢魏六朝百三家集巻六十五明張溥輯宋謝靈運集賦山居賦自注古巢居穴處曰巖棲棟宇居山曰山居在林野曰丘園在郊郭曰城傍四者不同可以理推言心也黄屋實不殊於汾陽即事也山居良有異乎市㕓抱疾就閑順從性情敢率所樂而以作賦揚子雲云詩人之賦麗以則文體宜兼以成其美今所賦既非京都宫觀遊獵聲色之盛而敘山野草木水石榖稼之事才乏昔人心放俗外詠於文則可勉而就之求麗邈以逺矣覽者廢張左之艶辭尋臺皓之深意去飾取素儻值其心耳意實言表而書不盡遺迹索意託之有賞其辭曰謝子臥病山頂覽古人遺書與其意合悠然而笑曰夫道可重故物為輕理宜存故事斯忘古今不能革質文咸其常合宫非縉雲之館衢室豈放勛之堂邁深心於鼎湖送高情於汾陽嗟文成之却粒願追松以逺遊嘉陶朱之鼓棹迺語種以免憂判身名之有辨權榮素其無留孰如牽犬之路既寡聽鶴之塗何由哉理以相得為適古人遺書與其意合所以為笑孫權亦謂周瑜公瑾與孤意合夫能重道則輕物存理則忘事古今質文可謂不同而此處不異縉雲放勛不以天居為所樂故合宫衢室皆非淹留鼎湖汾陽乃是所居之文成張良却粒棄人間事從赤松子遊陶朱范蠡臨去之際亦語文種云云謂二賢既權榮素故身名有判也牽犬李斯之歎聽鶴陸機領成都衆大敗後云思聞華亭鶴唳不可復得若夫巢穴以風雨貽患則大壯以棟宇祛弊宫室以瑶璇致美則白賁以丘園殊世惟上託於巖壑幸兼善而罔滯雖非市朝而寒暑均和雖是築構而飭朴兩逝易云上古穴居野處後世聖人易之以宫室上棟下宇以蔽風雨葢取諸大壯璇堂自是素故曰白賁最是上爻也此堂世異矣謂巖壑道深於丘園而不為巢穴斯免得寒暑之適雖是築構無妨非市朝云云昔仲長願言流水高山應璩作書邙阜洛川勢有偏側地闕周員銅陵之奥卓氏充䤨槻之端金谷之麗石子致音徽之觀徒形域之薈蔚惜事異於栖盤至若鳯叢二臺雲夢青丘漳渠淇園橘林長洲雖千乘之珍苑孰嘉遯之所遊且山川之未備亦何議於兼求仲長子云欲使居有良田廣宅在高山流水之畔溝池自環竹木周布場囿在前果園在後應璩與程文信書云故求道田在關之西南臨洛水北據邙山託崇岫以為宅因茂林以為䕃謂二家山居不得周員之美揚雄蜀都賦云銅陵衍卓王孫採山鑄銅故漢書貨殖傳云卓氏之臨卭公擅山川揚雄方言梁益之間裁木為器曰䤨裂帛為衣曰槻金谷石季倫之別廬在河南界有山川林木池沼水碓其鎮下邳時過遊賦詩一代盛集謂二地雖珍麗然制作非栖盤之意也鳯臺秦穆公時秦女所居以致蕭史叢臺趙之崇館張衡謂趙築叢臺於前楚建章華於後楚之雲夢大中居長飲賦楚靈王遊雲夢之中息於荆臺之上前方淮之水左洞庭之波右顧彭蠡之濤南望巫山之阿遂造章華之臺亦見諸史淮南青丘齊之海外皆獵所司馬相如云秋田乎青丘徬徨乎海外漳渠史起為魏文侯所造溉水之所淇園衛之竹園在淇水之澳詩人所載橘林蜀之園林揚子雲蜀都賦亦云橘林左太冲謂戸有橘柚之園長洲吳之苑囿左亦謂之長洲之茂苑因江海洲渚以為苑囿幽人憩止之鄉故山表此園之珍靜千乘讌嬉之所非且川亦不能兼茂隨地勢所遇耳覽明達之撫運乘機緘而理黙指歲暮而歸休詠宏徽於刋勒狹三閭之喪江矜望諸之去國選自然之神麗盡高棲之得意余祖車騎建大功淮肥江左得免横流之禍後及太傅既薨建圖已輟於是便求解駕東歸以避君側之亂廢興隠顯當是賢達之心故選神麗之所以申高棲之志經始山川實基於此仰前哲之遺訓俯性情之所便奉微軀以宴息保自事以乘閑愧班生之夙悟慙尚子之晚研年與疾而偕來志乘拙而俱旋謝平生於知遊棲清曠於山川謂經始此山遺訓於後也性情各有所便山居是其宜也易云向晦入宴息莊周云自事其心此一是其所處班嗣本不染世故曰夙悟尚平未能去累故曰晩研想遲二人更以年表疾至志寡求拙日事并可山居日與知遊別故曰謝平生就山川故曰棲清曠其居也左湖右江往渚還汀面山背阜東徂西傾抱含吸吐款跨紆縈緜聨邪亘側直齊平枚乘曰左江右湖其樂無有此吳客説楚公子之詞當謂江都之野彼雖有江湖而乏山巖此憶江湖左右與之同而山嶽形勢池城所無也往渚還江謂四面有水面山背阜亦謂東西有山便是四水之裏也抱含吸吐謂中央復有川款跨紆縈謂邊背相連帶迂回處謂之邪亘平正處謂之側直近東則上田下湖西谿南谷石堟石滂閔硎黄竹決飛泉於百仞森高薄於千麓寫長源於逺江派深毖於近瀆上田在下湖之水口名為田口下湖在田之下下處竝有名山川西谿南谷分流谷鄣水畎入田口西谿水出寜縣西谷鄣是近出之最高峯者西谿便是在之背入西谿之裏得石堟以石為阻故謂為堟石滂西谿之東從縣南八九里兩面峻峭數十丈水自上飛下北至外谿封墱十數里皆飛流迅激左右巖壁緑竹閔硎在石滂之東谿逶迤下注良田黄竹與其連南界莆中也近南則㑹以雙流縈以三洲表裏回游離合山川崿崩飛於東峭槃傍薄於西阡拂青林而激波揮白沙而生漣雙流謂剡江及小江此二水同㑹於山南便合流注下三洲在二水之口排沙積岸成此洲漲表裡離合是其貌狀也崿者謂回江岑在其山居之南界有石跳出將崩江中行者莫不駭慄槃者是縣故治之所在江之原缺用槃石竟渚竝帶青林而連白沙也近西則楊賓接峯唐皇連縱室壁帶谿曽孤臨江竹縁浦以被緑石照澗而映紅月隠山而成隂木鳴柯以起風楊中元賓竝小江之近處與山相接也唐皇便從北出室石室在小江口南岸壁小江北岸竝在楊中之下壁高四十丈色赤故曰照澗而映紅曽山之西孤山水南王子所經始臨江皆被以緑竹山高月隠便謂為隂鳥集柯鳴便謂為風也近北則二巫結湖兩􅥔通沼横石判盡休周分表引修隄之逶迤吐泉流之浩溔山􅑑下而回澤瀨石上而開道大小巫湖中隔一山外􅥔周回在圻西北邊浦出江竝是美處義熈中王穆之居大巫湖經始處所猶在兩􅥔皆長溪外􅥔出山之後四五里許裏􅥔亦隔一山出新堟横山野舍之北面常石野舍之西北巫湖舊唐故曰修隄長谿甚逺故曰泉流常石磯故曰故曰下􅑑而回澤裏􅥔漫石數里水從上過瀨石上而開道休山東北周里山在休之南竝是北邊遠東則天台桐柏方石太平二韭四明五奥三菁表神異於緯牒驗感應於慶靈凌石橋之莓苔越楢谿之紆縈天台桐栢七縣餘地南帶海二韭四明五奥皆相連接奇地所無高於五嶽便是海中三山之流韭以菜為名四明方石四面自然開窓也五奥者曇濟道人蔡氏郗氏謝氏陳氏各有一奥皆相椅角竝是奇地三菁太平之北太平天台之始方石直上萬丈下有長谿亦是縉雲之流云此諸山竝見圖緯神仙所居往來要徑石橋過楢谿人跡之艱不復過此也遠南則松箴棲雞唐嵫漫石崪嵊對嶺􅀢孟分隔入極浦而邅回迷不知其所適上嶔崎而䝉籠下深沈而澆激棲雞在保口之上別浦入其中周回甚深四山之裏松箴在棲雞之上緣江唐嵫入太平水路上有瀑布數百丈漫石在唐嵫下郗景興經始精舍亦是名山之流崪嵊與分界去山八十里故曰逺南前嶺鳥道正當五十里高左右所無就下地形高乃當不稱逺望􅀢山甚奇謂白爍尖者最高下有良田王敬𢎞經始精舍曇濟道人住孟山名曰孟埭芉薯之疁田清溪秀竹迴開巨石有趣之極此中多諸浦澗傍依茂林迷不知所通嶔崎深沈處處皆然不但一處逺西則原缺逺北則長江永歸巨海延納崑漲緬曠島嶼綢沓山縱横以布䕶水迴沈而縈浥信荒極之綿眇究風波之暌合江從山北流窮上虞界謂之三江口便是大海老子謂海為百谷王以其善處下也海人謂孤山為崑薄洲有山謂之島嶼即洲也漲者沙始起將欲成嶼縱横無常於一處迴沈相縈擾也大荒東極故為荒極風波不恒為暌合也徒觀其南術之原缺生􅑑原缺成衍縁岸測深相渚知淺洪濤滿則曽石沒清瀾減則沈沙顯及風興濤作水勢奔壯於嵗春秋在月朔望湯湯驚波滔滔駭浪電激雷崩飛流灑漾凌絶壁而起岑横中流而連薄始迅轉而騰天終倒底而見壑此楚貳心醉於吳客河靈懷慙於海若南術是其臨江舊宅門前對江三轉曽山路窮四江對岸西面常石此二山之間西南角岸孤山此二山皆是狹處故曰生􅑑勇門以南上便大閬故曰成衍岸高測深渚下知淺也江中有孤石沈沙隨水増減春秋朔望是其盛時故枚乘云楚太子有疾吳客問之舉秋濤之美得以廖病太子國之儲貳故曰楚貳河靈河伯居河所謂河靈慚於海若事見莊周秋水篇爾其舊居曩宅缺今園枌槿尚援基井具存曲術周乎前後直陌矗其東西豈伊臨谿而傍沼迺抱阜而帶山考封域之靈異實兹境之最然葺駢梁於巖麓棲孤棟於江源敞南戸以對逺嶺闢東窓以矚近田田連岡而盈疇嶺枕水而通阡葺室在宅裏山之東麓東窓矚田兼見江山之美三間故謂之駢梁門前一棟枕􅑑上存江之嶺南對江上逺嶺此二館屬望殆無優劣也阡陌縱横塍埓交經導渠引流脈散溝并蔚蔚豐秋苾苾香秔送夏蚤秀迎秋晩成兼有凌陸麻麥粟菽候時占節遞蓺遞熟供粒食與漿飲謝工商與衡牧生何待於多資理取足於滿腹許由云偃䑕飲河不過滿腹謂人生食足則歡有餘何待多須邪工商衡牧似多須者若少私寡欲充命則足但非田無以立耳自園之田自田之湖泛濫川上緬邈水區濬潭澗而窈窕除菰洲之紆餘毖温泉於春流馳寒波而秋徂風生浪於蘭渚日倒影於椒塗飛漸榭於中沚取水月之歡娛旦延隂而物清夕棲芬而氣敷顧情交之永絶覬雲客之暫如此皆湖中之美但患言不盡意萬不寫一耳諸澗出源入湖故曰濬潭澗澗長是以窈窕除菰作洲洲言所以紆餘也水草則萍藻蕰菼雚蒲芹蓀蒹菰蘋蘩蕝荇菱蓮雖備物之偕美獨扶渠之華鮮播緑葉之鬱茂含紅敷之繽翻怨清香之難留矜盛容之易闌必充給而後搴豈蕙草之空殘巻敂弦之逸曲感江南之哀歎秦筝倡而溯游往唐上奏而舊愛還搴出離騷敂弦是采菱歌江南是相和曲云江南采蓮秦筝唱蒹笳篇唐上奏蒲生詩皆感物致賦魚藻蘋蘩荇亦有詩人之詠不復具叙本草所載山澤不一靁桐是別和緩是悉參核六根五華九實二冬竝稱而殊性三建異形而同出水香送秋而擢蒨林蘭近雪而揚猗巻栢萬代而不殞伏苓千嵗而方知映紅葩於緑蔕茂素㽔於紫枝既住年而増靈亦驅妖而斥疵本草所出藥處於今不復依隨土所生耳此境出藥甚多靁公桐君古之采藥醫緩古之良工故曰別悉參核者雙核桃杏仁也六根者茍七根五茄根葛根野葛根連根也五華者堇華芫華檖華菊華旋覆華也九實者前實槐實栢實兔絲實女貞實蛇床實蔓荆實蓼實香實也二冬者天門麥門冬三建者附子天雄烏頭水蘭草林蘭支子巻栢伏苓竝皆仙物凡此衆藥事悉見於神農其竹則二箭殊葉四苦齊味水石別谷巨細各彚既修竦而便娟亦蕭森而蓊蔚露夕沾而悽隂風朝振而清氣互捎雲以拂杪臨碧潭而挺翠蔑上林與淇澳驗東南之所遺企山陽之游踐遲鸞鷖之棲託憶崐園之悲調慨伶倫之哀籥衞女行而思歸詠楚客放而防露作二箭一者苦箭大葉一者笄箭細葉四苦青苦白苦紫苦黄苦水竹依水生甚細密吳中以為宅援石竹本科叢大以充屋榱巨者竿挺之屬細者無箐之流也修竦便娟蕭森蓊蔚皆竹貌也上林闗中之禁苑淇澳衞地之竹園方此皆不如東南㑹稽之竹箭唯此地最富焉山陽竹林之游鸞鷖棲食之所崐山之竹任為笛黄帝時伶倫斬其厚均者吹之為黄鍾之宫衞女思歸作竹竿之詩楚人放逐東方朔感江潭而作七諫其木則松栢檀櫟原缺桐榆􅞢柘榖棟楸梓檉樗剛柔性異貞脆質殊卑高沃塉各隨所如榦合抱以隠岑杪千仞而排虚凌岡上而喬竦䕃澗下而扶疏沿長谷以傾柯攢積石以插衢華映水而增光氣結風而回敷當嚴勁而蔥倩承和煦而芬腴送墜葉於秋晏遲含萼於春初皆木之類選其美者載之山脊曰岡岡上澗下長谷積石各隨其方離騷云青春受謝白日昭只詩云萼不韡韡也植物既載動類亦繁飛泳騁透胡可根源觀貌相音備削山川寒燠順節隨宜匪敦草木竹植物魚鳥獸動物獸有相種有騰者有走者走者騁騰者透謂種類既繁不可根源但觀其貌狀相其音聲則知山川之好興節隨宜自然之數非可敦戒也魚則􅧹鱧鮒鱮鱒鯇鰱鯿魴鮪魦鱖鱨鯉鯔鱣輯采雜色錦爛雲鮮唼藻戲浪汎符流淵或鼓鰓而湍躍或掉尾而波旋鱸鮆乘時以入浦鱤􅨯沿瀨以出泉􅧹音優鱧音禮鮒音附鱮音叙鱒音寸袞反鯢音睨鰱音連編音毖仙反魴音房鮪音宥鯋音沙鱖音居綴反鱨音上羊反鯔音比之反鱣音竹仚反皆説文字林音詩云錦衾有爛故云錦爛鱸鮆乘時魚鱤音感􅨯音迅皆出谿中日上恒以為翫鳥則鵾鴻鶂鵠鶖鷺鴇􅧻鷄鵲繡質鶷鸐綬章晨鳬朝集時鷮山梁海鳥違風朔禽避凉荑生歸北霜降客南接響雲漢侣宿江潭聆清哇以下聽載王子而上參薄回涉以弁翰映明壑而自耽鵾音昆鴻音洪鶂音溢左傳六鶂退飛字如此鵠音下竺反鶖音秋鷺音路鴇音保􅧻音相唐公之馬與此鳥色同故謂為􅧻音相鷄鵲鶷鳥見張茂先博物志鶴音翟亦雉之美者此四鳥竝美采質鳬音符野鴨也常待晨而飛鷮音已消反長尾雉也論語云山梁雌雉時哉時哉海鳥爰居臧文仲不知其鳥以為神也事見左傳朔禽雁也寒月轉往衡陽禮記霜始降雁來賓嵗暮云雁北向政是陽初生時荑生歸北霜降客南山雞映水自翫其羽儀者山上則猨􅏈貍獾犴獌猰􅭬山下則熊羆豺虎羱鹿麕麖擲飛枝於窮崖踔空絶於深硎蹲谷底而長嘯攀木杪而哀鳴猨音袁􅏈音䰟貍音力之反獾音火丸反犴音立懸反獌音曼似獾而長狼之屬一曰貙猰音安黠反􅭬音弋生反貍之黄黒者一曰似􅀈豺音在皆反羱音元野羊大角麕音鬼氓反麖音京能踔擲虎長嘯猨哀鳴鳴聲可翫緡綸不投置羅不披磻弋靡用蹄筌誰施鑑虎狼之有仁傷遂欲之無崖顧弱齡而涉道悟好生之咸宜率所由以及物諒不逺之在斯撫鷗䱔而悦豫杜機心於林池八種皆是魚獵之具自少不殺至乎白首故在山林中而此歡永廢莊周云虎狼仁獸豈不父子相親世云虎狼暴虐者政以其如禽獸而人物不自悟其毒害而言虎狼可疾之甚茍其遂欲豈復崖限自弱齡奉法故得免殺生之事茍此悟萬物好生之理易云不逺復無祗悔庶乘此得以入道莊周云海人有機心鷗鳥舞而不下今無害彼之心各悦豫於林池也敬承聖誥恭窺前經山野昭曠聚落羶腥故大慈之𢎞誓拯羣物之淪傾豈㝢地而空言必有貸以善成欽鹿野之華苑羨靈鷲之名山企堅固之貞林希菴羅之芳園雖粹容之緬邈謂哀音之恒存建招提於幽峯冀振錫之息肩庶鐙王之贈席想香積之惠餐事在微而思通理匪絶而可温賈誼弔屈原云恭承嘉恵敬承亦此之流聚落是墟邑謂歌哭諍訟有諸諠譁不及山野為僧居止也經教欲令在山中皆有成文老子云善貸且善成此道惠物也鹿苑説四真諦處靈鷲山説般若法華處堅固林説泥洹處菴羅園説不思議處今旁林蓻園制􅁐彷彿在昔依然託想雖粹容緬哀昔若存也招提謂僧不能常住者可持作坐處也所謂息肩鐙王香積事出維摩經論語云温故知新理既不絶更宜復温則可待為已之日用也爰初經畧杖策孤征入澗水涉登嶺山行陵頂不息窮泉不停櫛風沐雨犯露乘星研其淺思罄其短規非龜非筮擇良選奇翦榛開逕尋石覔崖四山周回雙流逶迤面南嶺建經臺倚北阜築講堂傍危峯立禪室臨浚流列僧房對百年之高木納萬代之芬芳抱終古之泉源美膏液之清長謝麗塔於郊郭殊世間於城傍欣見素以抱樸果甘露於道場云初經畧躬自履行備諸苦辛也罄其淺短無假於龜筮貧者既不以麗為美所以即安茅茨而巳是以謝郊郭而殊城傍然清虚寂寞實是得道之所也苦節之僧明發懷抱事紹人徒心通世表是遊是憩倚石構草寒暑有移至業莫矯觀三世以其夢撫六度以取道乘恬知以寂泊含和理之窈窕指東山以㝠期實西方之潛兆雖一日以千載猶恨相遇之不早謂曇隆法流二法師也二公辭恩愛棄妻子輕舉入山外縁都絶魚肉不入口糞掃必在體物見之絶歎而法師處之夷然詩人西發不勝造道者其亦如此往石門瀑布中路高棲之游昔告離之始期生東山沒存西方相遇之欣實以一日為千載猶慨恨不早賤物重已棄世希靈駭彼促年愛是長生冀浮丘之誘接望安期之招迎甘松桂之苦味夷皮褐以頽形羨蟬蜕之匪日撫雲蜺其若驚陵名山而屢憩過巖室而披情雖未階於至道且緬絶於世纓指松菌而興言良未齊於殤彭此一章叙仙學者雖未及佛道之高然出於世表矣浮丘公是王子喬師安期先生是馬明生師二事出列仙傳洞真經云今學仙者亦明師以自發悟故不觪苦味頽形也莊周云和以天倪倪者崖也數經歴名山遇余巖室披露其情性且獲長生方之松菌殤彭邈然有間也山作水役不以一牧資待各徒隨節競逐陟嶺刋木除榛伐竹抽笋自篁擿篛于谷楊勝所拮秋冬獲野有蔓草獵涉蘡薁亦醖山清介爾景福苦以木成甘以􅣤熟慕椹高林剥芨巖椒掘蒨陽崖擿隂摽晝見搴茅宵見索綯芟菰翦蒲以薦以茭既坭既埏品收不一其灰其炭咸各有律六月採蜜八月撲栗備物為繁畧載靡悉此一章謂是山作及水役採拾諸事也然漁獵之事皆不載楊楊桃也山間謂之木子音覆字出字林詩人云六月食鬱及薁獵涉字出爾雅木木酒味苦􅣤播酒味甘竝至美兼以療病􅣤治癰核木治痰冷椹音甚味似菰菜而勝刋木而作之謂之慕芨音及採以為紙蒨音倩採以為渫􅀈音尠採以為飲採蜜樸栗各隨其月也若乃南北兩居水通陸阻觀風瞻雲方知厥所兩居謂南北兩處各有居止峯崿阻絶水道通耳觀風瞻雲然後方知其處所南山則夾渠二田周嶺三苑九泉別澗五谷異巘羣峯參差出其間連岫複陸成其坂衆流溉灌以環近諸堤擁抑以接逺逺堤兼陌近流開湍凌阜泛波水往步還還回往匝枉渚員巒呈美表趣胡可勝單抗北頂以葺館殷南峯以啟軒羅曽崖於戸裏列鏡瀾於窓前因丹霞以赬楣附碧雲以翠椽視奔星之俯馳顧原缺之未牽鵾鴻飜翥而莫及何但䴏雀之翩翾氿泉傍出潺湲於東檐桀壁對跱硿礲於西霤修竹葳蕤以翳薈灌木森沈以蒙茂蘿蔓延以攀援花芬薫而媚秀日月投光於柯間風露披清於㟪岫夏凉寒燠隨時取適階基回互橑櫺乘隔此焉卜寢翫水弄石邇即回眺終嵗罔斁傷美物之遂化怨浮齡之如借眇遯逸於人羣長寄心於雲霓南山是開創卜居之處也從江樓步路跨越山嶺綿亘田野或升或降當三里許塗路所經見也則喬木茂竹緣畛彌阜横波疎石側道飛流以為寓目之美觀及至所居之處自西山開道迄于東山二里有餘南悉連嶺疊鄣青翠相接雲煙霄路殆無倪際從逕入谷凡有三口方壁西南石門世南池東南皆別載其事縁路初入行於竹逕半路闊以竹渠澗既入東南傍山渠展轉幽奇異處同美路北東西路因山為鄣正北狹處踐湖為池南山相對皆有崖巖東北枕壑下則清川如鏡傾柯盤石被隩映渚西巖帶林去潭可二十丈許葺基構字在巖林之中水䘙石階開窓對山仰眺曽峯俯鏡濬壑去巖半嶺復有一樓逈望周眺既得逺趣還顧西館望對窓戸縁崖下者密竹䝉逕從北直南悉是竹園東西百丈南北百五十五丈北倚近峯南眺逺嶺四山周回溪澗交過水石林竹之美巖岫㟪曲之好備盡之矣刋翦開築此焉居處細趣密翫非可具記故較言大勢耳越山列其表側傍緬為異觀也因以小湖鄰於其隈衆流所凑萬泉所回汍濫異形首毖終肥別有山水路邈緬歸汎濫肥毖皆是泉名事見於詩云此萬泉所凑各有形勢求歸其路迺界北山棧道傾虧蹬閣連巻復有水逕繚繞回員瀰瀰平湖泓泓澄淵孤岸竦秀長洲芊綿既瞻既眺曠矣悠然及其二川合流異源同口赴隘入險俱㑹山首瀨排沙以積丘峯倚渚以起阜石傾瀾而捎巖木映波而結藪逕南漘以横前轉北崖而掩後隠叢灌故悉晨暮託星宿以知左右往反經過自非巖澗便是水逕洲島相對皆有趣也山川澗石州岸草木既標異於前章亦列同於後牘山匪砠而是岵川有清而無濁石傍林而插巖泉協澗而下谷淵轉渚而散芳岸靡沙而映竹草迎冬而結葩樹凌霜而振緑向陽則在寒而納煦面隂則當暑而含雪連岡則積嶺以隠嶙舉峯則羣竦以截浮泉飛流以寫空沈波潛溢於洞穴凡此皆異所而咸善殊節而俱悦土山載石曰砠山有林曰岵此章謂山川衆美亦不必有故總叙其最居山之後事亦皆有尋求也春秋有待朝夕須資既耕以飯亦桑貿衣藝菜當肴採藥救頽自外何事順性靡違法音晨聽放生夕歸研書賞理敷文奏懷凡厥意謂揚較以揮且列于言誡特此推謂寒待綿纊暑待絺綌朝夕餐飲設此諸業以待之藥以療病又在其外事之相推自不得不然至於聽講放生研書敷文皆其所好韓非有揚較班固亦云揚較古今其義一也左思曰為左右揚較而陳之北山二園南山三苑百果備列乍近乍逺羅行布株迎早候晩猗蔚溪澗森疎崖巘杏壇㮈園橘林栗圃桃李多品梨棗殊所枇杷林檎帶谷映渚椹梅流芬於回巒椑柿被實於長浦莊周云漁父見孔子杏壇之上維摩詰經㮈樹園楊雄蜀都賦云橘林左太冲亦云户有橘柚之園桃李所植甚多􅀥梨事出北河濟之間淮穎諸處故云殊所也畦町所藝含蘂藉芳蓼蕺葼薺葑菲蘇薑緑葵眷節以懷露白薤感時而負霜寒葱摽蒨以陵隂春藿吐苕以近陽葑菲見詩栢舟中管子曰北伐山戎得寒葱庾闡云寒葱挺圍灌溉自供不待外求者也弱質難恒頽齡易喪撫鬢生悲視顔自傷承清府之有術冀在衰之可壯尋名山之奇藥越靈波而憩轅採石上之地黄摘竹下之天門摭曽嶺之細辛拔幽澗之溪蓀訪鍾乳於洞穴訊丹陽於紅泉此皆往年之藥即近山之所出有採拾欲以消病也安居二時冬夏三月逺僧有來近衆無闕法鼓朗響頌偈清發散華霏㽔流香飛越析曠刼之微言説像法之遺㫖乘此心之一豪濟彼生之萬理啟善趣於南倡歸清暢於北機非獨㥦於予情諒僉感於君子山中兮清寂羣紛兮自絶周聽兮匪多得理兮俱悦寒風兮騷屑面陽兮常熱炎光兮隆熾對隂兮霜雪愒曽臺兮陟雲根坐澗下兮越風穴在兹城而諧賞傳古今之不滅衆僧冬夏二時坐謂之安居輒九十日衆逺近聚萃法鼓頌偈華香四種是齋講之事析説是齋講之議乘此之心可濟彼之生南倡者都講北機者法師山中靜寂實是講説之處兼有林木可隨寒暑恒得清和以為適也好生之篤以我而觀懼命之盡吝景之懽分一往之仁心拔萬族之險難招驚魂於殆化收危形於將闌漾水性於江流吸雲物於天端覩騰翰之頑頡視鼓鰓之往還馳騁者儻能狂愈猜害者或可理攀云物皆好生但以我而觀便可知彼之情吝景懼命是好生事也能放生者但有一往之仁心便可拔萬族之險難水性雲物各尋其生老子云馳騁田獵令人心發狂猜害者恒以忍害為心見放生之理或可得悟也哲人不存懷抱誰質糟粕猶在啟縢剖裘見柱下之經二覩濠上之篇七承未散之全樸救已於道術嗟夫六藝以宣聖教九流以判賢徒國史以載前紀家傳以申世模篇章以陳美刺論難以覈有無兵技醫日龜筴筮夢之法風角冢宅算數律厯之書或平生之所流覽竝於今而諸驗前識之喪道抱一德而不渝莊周云輪扁語齊桓公公之所讀書聖人之糟粕縢者金縢之流也柱下老子濠上莊子二七是篇數也云此二書最有理過此以往皆是聖人之教獨狂者所伊昔齠齓實愛斯文援紙握管㑹性通神詩以言志賦以敷陳箴銘誄頌咸各有倫爰暨山棲彌歴年紀幸多暇日自求諸已研精静慮貞觀厥美懷秋成章含笑奏理謂少好文章及山棲以來別縁既䦨尋慮文詠以盡暇日之適便可得通神㑹性以永終朝若迺乘攝持之告評養達之篇畏絶迹之不逺懼行地之多艱均上皇之自昔忌下衰之在旃投吾心於高人落賓名於聖賢廣滅景於崆峒許遁音於箕山愚假駒以表谷涓隠巖以搴芳庚宅礨以葆和輿陟峨而善狂萊庇䝉以織畚徐韜魏而采芋皓棲商而頤志卿寑茂而敷詞鄭別谷而永逝梁去霸而長噫高居唐而胥宇臺依崖而穴墀咸自得以窮年眇貞思於所遺老子云善攝生者莊子云謂之不善持生又云養生有無崖達生者不務生之所無奈何絶迹上皇下衰賓名義亦皆出莊周廣成子在崆峒之上黄帝之師也許由隠於箕山堯以天下讓而不取愚公居于駒阜齊桓公逐鹿入山見之涓子隠於宕山好餌术告伯陽琴心三篇庚桑楚得老子之道居㟪礨之山楚狂接輿楚王聞其賢使使者聘之於是遂遊諸名山在蜀峨眉山上徐無鬼巖棲魏侯勞之問先生苦山林矣乃肻見寡人無鬼問君絀嗜欲屏好惡則耳目察矣常采芋栗老萊子耕於䝉山之陽著書十五篇言道家之事織畚為業四皓避秦亂入商洛深山漢祖召不能出司馬長卿髙才而處世不樂預公卿大事病免家居茂陵鄭子真耕隠谷口大將軍王鳯禮聘不屈遂與弟子別於山阿終身不反梁伯鸞隠霸陵山中耕織以自娛後復入㑹稽山臺孝威居武安山下依崖為土室采藥自給高文通居西唐山從容自娛也暨其窈窕幽深寂寞虚逺事與情乖理與形反既耳目之靡端豈足跡之所踐蕰終古於三季俟通明於五眼權近慮以停筆抑淺知而絶簡謂此既非人跡所求更待三明五通然後可踐履耳故停筆絶簡不復多云冀夫賞音悟夫此㫖也撰征賦葢聞昏明殊位貞晦異道雖景度回革亂多治寡是故升平難於恒運剥喪易以横流皇晉受命河汾來遷吳楚數歴九世年踰十紀西秦無一援之望東周有三辱之憤可為積禍纒釁固以久矣況乃陵塋幽翳情敬莫遂日月推薄帝心彌逺慶靈將升時來不爽相國宋公得一居貞回乾運軸内匡寰表外清遐陬毎以區宇未統側席盈慮值天祚攸興昩弱授機龜筮元謀符瑞景徴於是仰祗俯協順天從兆興止戈之師躬暫勞之討以義熈十有二年五月丁酉敬戒九伐申命六軍治兵于京畿次師于汳上靈檣千艘靁輜萬乘羽騎盈塗飛旍蔽日別命羣帥誨謨惠䇿法奇於三畧義祕於六韜所以鈎棘未曜殞前禽於金墉威弧始彀走鈒隼於滑臺曾不踰月二方獻捷宏功懋德獨絶古今天予感東山之劬勞慶格天之光大明發興於鑒寐使臣遵于原隰余攝官承乏謬充殊役皇華愧於先雅靡盬顇於征人以仲冬就行分春反命塗經九守路踰千里沿江亂淮遡薄泗汳詳觀城邑周覽丘墳眷言古迹其懷巳多昔皇祖作藩受命淮徐道固苞桑勲由仁積年月多歴市朝已改永為洪業纒懷清歴於是采訪故老尋履往迹而逺感深慨痛心殞涕遂寫集聞見作賦撰西征俾事運遷謝託此不朽其詞曰系烈山之洪緒承火正之光明立熈載於唐后申讚事於周王疇庸命而順位錫寶珪以徹疆歴尚代而平顯降中葉以繁昌業服道而德輝風行世而化揚投前蹤以永冀省輶質以逺傷暌謀始于耆蔡違用舎於行藏庇常善之罔棄憑曲成之不遺昭在幽而偕煦賞彌久而愈私顧晚草之薄弱仰青春之葳㽔引蔓穎於松上擢纎枝於蘭逵施隆貸而有渥報涓塵而無期歡太階之休明穆皇道之緝熈惟王建國辨方定隅内外既正華夷有殊惟昔小雅逮于班書戎蠻孔熾是殛是誅所以宣王用棘於獫狁高帝方事於匈奴然侵鎬至涇自塞及平闚郊伺鄙原缺慕攜王之矯䖍階喪亂之未寧竊强秦之三輔陷隆周之兩京雄崤澠以制險據繞霤而作扄家永懷於故壤國願言於先塋俟太平之曠期屬應運之聖明坤寄通於四瀆乾假照於三辰水潤土以顯比火炎天而同人惟上相之叡哲當草昧而經綸總九流以貞觀協五才而平分時來之機悟先於介石納隍之誡一援於生民龜策允臧人鬼同情順天行誅司典詳刑樹牙選徒秉鉞抗旍弧矢罄楚孝之心智戈棘單吳子之精靈迅三翼以魚麗襄兩服以鴈逝陣未列於都甸威已振於秦薊灑嚴霜於渭城被和風於洛汭就終古以比猷考墳冊而莫契昔西怨於東徂今北伐而南悲豈朝野之恒情動萬乘之幽思歌零雨於豳風興採薇於周詩慶金墉之凱定眷戎車之遷時佇千里而感逺涉弦望而懷期詔微臣以勞問奉王命於河湄夕飲餞以俶裝旦出宿而言辭嵗既晏而繁慮日將邁而戀乖闕敬恭於桑梓謝履長於庭階冒沈雲之晻藹迎素雪之紛霏凌結湍而凝清風矜籟以揚哀情在本而易阜物雖未而難懷眷余勤以就路苦憂來其城頽爾乃經雉門啟浮梁眺鍾巖越查塘覽永嘉之紊維尋建武之緝綱于時内慢神器外侮戎狄君子横流庶萌分析主晉有祀福禄來格明兩降覽三七辭厄元誕德以膺緯肇回光於陽宅明思服於下武興繼代以消逆簡文因心以秉道故沖用而刑廢孝武捨已以仗賢亦寧外而治内觀日化而就損庶雍熈之可對閔隆安之致寇傷龜玉之毁碎漏妖凶於滄洲纒釁難而盈紀時焉依於晉鄭國有䠞於百里賴英謨之經營𢎞兼濟以忘己主寰内而緩虞澄海外以漬滓至如昏祲蔽景鼎祚傾基黍離有歎鴻鴈無期瞻天命之貞符秉順動而履機率駿民之思效普邦國而同歸盪積霾之穢氛啟披隂之光暉反平陵之杳藹復七廟之依稀務役簡而農勸每勞賞而忠甄燮時雍於祖宗原缺掃逋醜於漢渚滌僭逆於岷山羈巢處於西木引鼻飲於源淵惠要而思韙援冠弁而來䖍視冶城而北屬懷文獻之收揚匪元首之康哉孰股肱之惟良譬觀曲而識節似綴組以成章業彌纒而彌微事愈有而莫傷次石頭之雙岸究孫氏之初基幸漢庶之漏網憑江介以抗維初鵲起於富春果鯨躍於川湄匝三世而國盛歴五偽而宗夷察成敗之相仍猶唇亡而齒寒載十二而謂紀豈蜀滅而吳安衆咸昧於謀兆羊獨悟於理端請廣武以誨情樹襄陽以作藩拾建業其如遺沿萬里而誰難疾魯荒之詖辭惡京陵之譖言責當朝之憚貶對曩籍而興歎敦怙寵而判違敵既勍而國圮彼問鼎而何階必先賊於君子原性分之異託雖殊塗而歸美或巻舒以愚智或治亂其如矢謝昧迹而託規卒安身以全里周顯節而犯逆抱正情而喪已薄四望而尤眄歎王路之中鯁蠢百越之妖燼敢凌蹈於五嶺崩雙嶽於中流擬凶威於荆郢隠雷霆於帝坐飛芒鏃於宫省于時朝有遷都之議人無守死之志師旅痛於久勤城墉闕於素備安危勢在不侔衆寡形於見事於赫淵謀研其神䇿緩轡待機追奔躡迹遇雷池而振曜次彭蠡而殱滌穆京甸以清晏撤多壘而寧役造白石之祠壇懟二豎之無君踐掖庭以幽辱凌祧社而火焚愍文康之罪已嘉忠武之立勲道有屈於災蝕功無謝於如仁訊落星之饗旅索舊棲於吳餘迹階戺而不見横榛卉以荒除彼生成之樂辰亦猶今之在余慨齊吟於爽鳩悲唐歌於山樞弔偽孫於徐首率君臣以奉疆時運師以伐罪偏投書於武王迄西北之落紐乏東南以振綱誠鉅平之先覺實中興之後祥據左史之攸徴胡影迹之可量過江乘而責始知遇雄之無謀厭紫微之宏凱甘陵波而逺遊越雲夢而南泝臨淅河而東浮彀連弩於川上候蛟龍於中流爰薄方與迺屇歐陽入夫江都之域次乎廣陵之鄉易千里之曼曼泝江流之湯湯洊赤圻以經復越二門而起漲眷北路以興思㸔東山而怡目林叢薄路逶迤石參差山盤曲水激瀨而駿奔日映石而知旭審兼照之無偏怨歸流之難濯羨輕魵之涵泳觀翔鷗之落啄在飛沈其順從顧微躬而緬邈於是抑懷蕩慮揚㩁易難利涉以吉天險以艱于敵伊阻在國斯便勾踐行霸於瑯邪夫差爭長於黄川葛相發歎而思正曹后愧心於千魂登高堞以詳覽知吳濞之衰盛戒東南之逆氣成劉后之駴聖藉鹽鐵之殷阜臨淮楚之剽輕盛几杖而弭心怒抵局而遂爭忿爰盎之扶禍惜徒傷於家令匪條侯之忠毅將七國之陵正襃漢藩之治民竝訪賢以招明侯文辯其誰在曰鄒陽與枚生據忠辭於吳朝執義説於梁庭敷高才於兔園雖正言而免刑闕里既已千載深儒流於末學欽仲舒之晬容遵縫掖於前躅對園囿而不闚下帷幙而論屬相端非之兩驕遭𢎞偃之雙慝恨有道之無時步險塗以側足聞宣武之大閲反師旅於此㕓自皇運之都東始昌業以濟難抗素旄於秦嶺揚朱旗於巴川懼帝系之墜緒故黜昏而崇賢嘉收功以垂世嗟在嗣而覆旃德非陟而繼宰亹踰禹其必顛造步兵而長想欽太傅之遺武思嘉遁之餘風紹素履之落緒民志應而願税國屯難而思撫譬乘舟之待楫象提釣之假縷總出入於和就兼仁用於黙語𢎞九流以􅰐四維復先陵而清舊宇却西州之成功指東山之歸予惜圖南之啟運恨鵬翼之未舉發津潭而逈邁逗白馬以憩舲貫射陽而望䢴溝濟通淮而薄甬城城陂陁兮淮驚波平原逺兮路交過面艽野兮悲橋梓遡急流兮苦磧沙夐千里而無山緬百谷而有居被宿莽以迷徑覩生煙而知墟缺六字謂信美其可娛身少長於樂土實長歎於荒餘原缺具瘁傎嵗寒之窮節視曽雲之崔巍聆悲飈之掩屑彌晝夜以滯滛怨凝隂之方結望新晴於落日起明光於躋月眷轉蓬之辭根悼朔鴈之赴越披微物而疚情此思心其可説問徭役其幾時駭閲景於興没感曰歸於采薇予來思於雨雪豈初征之懼對冀鸛鳴之在垤原缺踰宿騖吾楫於邳鄉奚車正以事夏虺左相以輔湯綿三代而享邑厠踐土之一匡嗟仲幾之寵侮遂捨存以徴亡喜薛宰之善對美士彌之能綱升曲垣之逶迤訪淮隂之所都原入跨之達耻俟遭時以逺圖捨西楚以擇木迨南漢以定謨亂孟津而魏滅攀井徑而趙徂播靈威於齊横振餘猛於龍且觀讓通而告狶曷始智而終愚迄沂上而停枻登高圯而不進石幽期而知賢張揣景而示信本文成之素心要王子於雲仞豈無累於清霄直有槩於貞吝始熈績於武闗卒敷功於皇𦙍處夷險以解挫𢎞憂虞以時順矜若華之翳晷哀飛驂之落駿傷粒食而興念眷逸翮而思振戾臣山而東顧美相公之前代嗟殘虜之將糜熾餘猋於海濟驅鮐稚於淮曲暴鰥孤於泗澨託末命原缺雲冀靈武之北閲惟授首之在晨當盛暑而選徒肅嚴威以振響漸温澤而沾腴既雲撤於朐城遂席巻於齊都曩四闗其奚阻道一變而是孚傷炎季之崩弛長逆布以滔天假父子以至愛借兄弟以偽恩相魏武以譎狂宄謨奮於東藩桴未譟於東郭身已馘於樓門審貢牧於前説證所作於舊徐聆泗川之浮磬翫夷水之蠙珠草漸苞於熾壤桐孤榦於嶧隅慨禹迹於尚世惠遺文於夏書紛征邁之淹留彌懷古於舊章商伯文於故服咸徴名於彭殤眺靈壁之曽峯投吕縣之迅梁想蹈水之行歌雖齊汨其何傷啟仲尼之嘉問告性命以依方豈茍然於迂論聆寓言於達莊於是濫石橋登戲臺䇿馬釣渚息轡城隅永感四山零淚雙渠怨物華之推驛慨舟壑之遞遷謂徂嵗之悠濶結幽思之方根感皇祖之徽德爰識冲而量淵降俊明以鏡鑑迴風猷以昭宣道既底於國難惠有覃於黎元士頌歌於政教民謡詠於渥恩兼采芑之致美協漢廣之發言强虎氐之搏翼灟雲網於所禁驅黔萌以藴崇取園陵而湮沈錫殘落於河西序淪胥於漢隂攻方城而折扄擾譙潁其誰任世闕才而貽亂時得賢而興治救祖考之邦壤在幽人而枉志體飛書之逺情悟犒師之通識迨明達之高覽契古今而同事拔淵謨於潛機騁神鋒於雲斾驅斥澤而風靡䠞坑谷而鳥竄中華免夫左衽江表此焉緩帶既剋黜於肥六又作鎮於彭沛晏皇塗於國内震天威於河外掃東齊而已寧指西崤而將泰值秉均而代謝實大業之興廢心無忝於樂生事有像於燕惠抱明哲之不伐奉宏勲而是税捐七州以爰來歸五湖以投袂屈盛績於平生申逺期於暮嵗訪曩載於宋鄙採陽秋於魯經晉申好於東吳鄭憑威於南荆故反師於曹門將以塞於夷庚納五叛以長寇伐三邑以侵彭美西鉏之忠辭快韓厥之奇兵追項王之故臺迹霸楚之遺端挺宏志於總角奮英勢於弱冠氣葢天而倒日力拔山而傾湍始飈起於勾越中電激於衡闗興偏慮於攸吝忘即易於所難忌陳錦而莫照思反鄉而有歎且夫殺義害嬰而懮豐疑緤賢不䇿失位誰持迨理屈而愈閉方怨天而懷悲對駿騅以發憤傷虞姝於末詞陟亞父之故營諒謀始之非託遭衰嬴之崩綱值威炎之結絡迄皓首於阜陵猶謬覺於然諾視一人於三傑豈在已之庸弱置豐沛而不舉故自同於俎鑊發卞口而游歴迄西山而弭轡觀終古之幽憤懷元王之冲粹丁戰國之權爭方括心於道肆學浮丘以就德友三儒以成類潔流始於初源累仁基於前美撥楚族之休傅芳素於來祀彊見譽於清虚德致稱於千里或避寵以辭姻或遺榮而不仕政直言以安身駿絶才以喪已驅信道之成終表昧世之虧始悟介焉之已差則不俟於終日既防萌於未著雖念德其何益爾乃孟陬發節雷隠蟄驚散葉荑柯芳飾萌麥萋萋於旄丘栁依依於髙城相雎鳩之集河觀鳴鹿之食苹沂泗逺兮清川急秋冬近兮緒風襲風流蕙兮水増瀾愁衿兮鑑戚顔愁盈根而藴際戚發條而成端嗟我行之彌日待征邁而言旋荷慶雲之優渥周雙七於此秊陶逸豫於京甸違險難於行川轉歸弦而眷戀望修檣而流漣願闗鄴之遄清遲華鑾之凱旋穆淳風於六合溥洪澤於八埏頒賢愚於大小順規矩於方圓固四民之獲所宜税稷於萊田苦邯鄲之難步庶行迷之易痊長守朴以終稔亦拙者之政焉歸塗賦昔文章之士多作行旅賦或欣在觀國或怵在斥徙或述職邦邑或羈役戎陳事由于外興不自已雖髙才可推求懷未愜今量分告退反身草澤經塗履運用感其心賦曰承百世之慶靈遇千載之優渥匪康衢之難踐諒跬步之易局踐寒暑以推換眷桑梓以緬邈褫簪帶于窮城反巾褐于空谷果歸期于願言獲素念于思樂于是舟人告辦佇楫在川觀鳥候風望景測圓背海向溪乘潮傍山悽悽送歸悠悠告旋時旻秋之杪節天既高而物衰雲上騰而鴈翔霜下淪而草腓捨隂漠之舊浦去陽景之芳蕤林乘風而飄落水鑒月而含輝發青田之枉渚逗白岸之空亭路威夷而詭狀山側背而異形停余舟而淹留搜縉雲之遺迹漾百里之清潭見千仞之孤石歴古今而長在經盛衰而不易羅浮山賦客夜夢見延陵茅山在京之東南明旦得洞經所載羅浮山事云茅山是洞庭口南通羅浮正與夢中意相㑹遂感而作羅浮山賦曰若迺茅公之説神化是悉數非億度道單悒憰洞四有九此惟其七潛夜隠輝幽境朗日故曰朱明之陽宫耀真之隂室洞穴之寶衢海靈之雲術伊離情之易結諒沉念之羅浮發潛夢於永夜若遡波而乘桴越扶嶼之細漲上増龍之合流鼓蘭枻以水宿杖桂䇿以山遊嶺表賦若乃長山欵跨外内乖隔下無伏流上無夷跡麕鹿望岡而旋歸鴻鴈覩峯而返翮既陟麓而踐坂遂升降于山畔顧後路之傾巘眺前磴之絶岸㸔朝雲之抱岫聽夕流之注澗羅石棊布怪譎横越非山非阜如樓如闕班采類繡明白若月蘿蔓絶攀苔衣流滑怨曉月賦臥洞房兮當何悦滅華燭兮弄曉月昨三五兮既滿今二八兮將缺浮雲褰兮收泛灔明舒照兮殊皎潔墀除兮鏡鑑房櫳兮澄澈長谿賦潭結綠而澄清瀨揚白而載華飛急聲之瑟汨散輕文之漣羅始鏡底以如玉終積岸而成沙江妃賦招魂定情洛神清思覃曩日之敷陳盡古來之妍媚矧今日之逢迎邁前世之靈異姿非定容服無常度兩宜觀嚬俱適華素于時升月隠山落日映嶼收霞歛色迴飈拂渚每馳情于晨暮矧良遇之莫叙投明瑱以申贈覬色授而魂與沈分湘岸延情蒼隂隔山川之表裏判天地之浮沉承嘉約于往昔寧更貳于在今儻借訪于交甫知斯言之可諶蘭音未吐紅顔若暉留眄光溢動袂芳菲散雲轡之絡繹按靈輜而徘徊建羽旌而逶迤奏清管之依微慮一別之長絶眇天末而永違又江妃賦小腰微骨朱衣皓齒綿視騰來靡容膩理嗟佳人之眇邁眺霄際而皓語懼展愛之未期抑傾念而蹔佇天台二娥宫亭雙媛青袿神接紫衣形見或飄翰凌煙或潛泳浮海萬里俄頃寸隂未改事雖假於雲物心常得於無待入道至人賦爰有名外之至人乃入道而館真荒聰明以削智遁支體以逃身於是卜居千仞左右窮懸幽庭虚絶荒帳成煙水縱横以觸石日參差於雲中飛英明於對溜積氤氲而為峯推天地於一物横四海於寸心超埃塵以貞觀何落落此胸襟逸民賦原缺于天唯舍唯用其見也則如游龍其潛也則如隠鳳來無所從去無所至有酒則舞無酒則醒不明不晦不昧不貞蕭條秋首葳㽔春中弄琴明月酌酒和風御清風以逺路拂白雲而峻與指寰中以為期望繫外而延佇辭禄賦荷賞延之渥恩在弱齡而覃惠䝉聖達之眷顧得乘閒以沈泄雖鑣羈之有名恒遊奬而匪滯解龜紐於城邑反褐衣於丘窟頖人事於一朝與世物乎長絶自牽綴於朱絲奄二九於斯年服纓佩於兩官執鞭笏於宰蕃感時賦夫逝物之感有生所同頽年致悲時懼其速豈能忘懷迺作斯賦相物類以迨已閔交臂之匪賒揆大耋之或遄指崦嵫于西河鑒三命于予躬怛行年之蹉跎于鶗鴂之先號挹芬芳而夙過微靈芝之頻秀迫朝露其如何雖發嘆之早晏諒大暮之同科孝感賦舉高檣于楊潭眇投迹于炎州貫廬江之長路出彭蠡而南浮于時月孟節季嵗亦告暨離鄉眷壤改時懷氣戀丘墳而縈心憶桑梓而零淚孟積雪而抽筍王㫁冰以鱠鮮荑柔葉于枯木起春波于寒川顧微心之庸褊謝精靈于昭晰擁永慕而莫從曽遐感而靡徹傷已賦嗟夫卞賞珍于連城孫別駿於千里彼珍駿以貽愛此陋容其敢擬丁曠代之渥惠遭謬眷于君子眺徂嵗之驟經覩芳春之每始始春芳而羨物終嵗徂而感已貌憔悴以衰形意幽翳而苦心出衾裯而載坐闢襜幌以迴臨望步檐而周流眺幽閨之清隂想輕綦之往跡餐和聲之餘音播芬煙而不燻張明鏡而不照歌白華之絶曲奏蒲生之促調表勸伐河北表自中原喪亂百有餘年流離寇戎湮沒殊類先帝聰明神武哀濟羣生將欲盪定趙魏大同文軌使久凋反於正化偏俗歸於華風運謝事乖理違願絶仰德抱悲恨存生盡況陵塋未幾凶虜伺隙預在有識誰不憤歎而景平執事竝非其才且遘紛京師豈慮託付遂使孤城窮陷莫肻極忠烈囚朔漠緜河三千翻為寇有晚遣鎮戌皆先朝之所開拓一旦淪亡此國恥宜雪被於近事者也又北境自染逆虜窮苦備罹徴調賦歛靡有止已所求不獲輙致誅殞身禍家破闔門比屋此亦仁者所為傷心者也咸云西虜舍本逺師隴外東虜乘虚呼可掩襲西軍既反得據闗中長圍咸陽還路已絶雖遣救援停住河東遂乃逺討大城欲為首尾而西寇深山重阻根本自固徒巢窟未足相拯師老於外國虚於内時來之㑹莫復過此觀兵耀威實在兹日若相持未已或生事變忽值新起之衆則異於今茍乖其時難為經畧雖兵食倍多則萬全無必矣又歴觀前代類以兼弱為本古今聖德未之或殊豈不以天時人事理數相得興亡之度定期居然故古人云既見天殃又見人災乃可以謀昔魏氏之强平定荆冀乃乘袁劉之弱晉世之盛拓開吳蜀亦因葛陸之衰此皆前世成事著於史策者也自𦍑平之後天下亦謂虜當俱滅長驅滑臺席巻下城奪氣喪魄指日就盡但長安違律潼闗失守用緩天誅假延嵗月日來至今十有二載是謂一紀曩有前言況五胡代數齊世虜期餘命盡於來年自相攻伐兩取其困卞莊之形驗之今役仰望聖澤有若渴饑注心南雲為日已久來蘇之冀實歸聖明此而弗乘後則未兆即日府藏誠無兼儲然凡造大事待國富兵强不必乘㑹於我為易責在得時器械既充衆力粗足方於前後乃當有優常議損益久證冀州口數百萬有餘田賦之沃著自貢典先才經創基趾猶存澄流引源桑麻蔽野强富之實昭然可知為國長久之計孰若一往之費邪或懲闗西之敗而謂河北難守二境形勢表裏不同闗西雜居種類不一昔在前漢屯軍霸上通火甘泉況乃逺戍之軍值新故交代之際者乎河北悉是舊户差無雜人連嶺判阻三闗作隘若遊騎長驅則沙漠風靡若嚴兵守塞則冀方山固昔隴西傷破鼂錯興言匈奴慢侮賈誼憤歎方於今日皆為賖矣晉武中主耳值孫皓虐亂天祚其德亦由鉅平奉䇿荀賈折謀故能業崇當年區宇一統況今陛下聰明聖哲天下歸仁文德與武功竝震霜威共素風俱舉協以宰輔賢明諸王美令岳牧宣烈虎臣盈朝而天或逺命亦同敵不滅矧伊頑虜假日而已哉伏惟深機志務久定神謨臣卑賤側陋竄景巖穴實仰希大平之道傾覩岱宗之封雖乏相如之筆庶免史談之憤以此謝病京師萬無恨矣久欲上陳懼在觸置䝉賜恩假暫違禁省消渴十年常慮朝露抱此愚志昧死以聞謝封康樂侯表昔强氐暴虐恃僭歴紀既噬五都志吞六合遂陷沒西河傾覆南漢凌藉紀郢跨越淮泗于時䇿畫惟疑地險已謝咸愳君臣同泯有生無餘亡祖奉國威靈董符戎重盡心所事尅黜禍亂功參盤鼎胙土南服逮至臣身值遭泰路日月改暉榮落代運輸税唐化生幸無已不悟天道下濟鴻均曲成迺眷遐績式是興徴分虎紐龜復顯茅土鳴玉拖紱班景元勛澤洽往德恩覃來𦙍永惟先蹤逺感崩結豈臣尫弱所當忝承臣聞至公無私甄善則一皇恩逺被殘代可侔是以信陵之賢簡在髙祖之心望諸之道復獲隆漢之封觀史歎古欽兹盛美豈謂榮渥近霑微躬傾宗殞元心識其㑹酬恩答厚罔知所由詣闕上表臣自抱疾歸山于今三載居非郊郭事乖人間幽棲窮巖外縁兩絶守分養命庶畢餘年忽以去月二十八日得㑹稽太守臣顗二十七日疏云比日異論噂􅊱此雖相了百姓不許寂黙今微為其防披疏駭惋不解所由便星言奔馳歸骨陛下及經山隂防衛彰赫彭排馬槍斷截衢巷偵邏縱横戈甲竟道不知微臣罪為何事及見覬雖曰見亮而裝防如此唯有罔懼臣昔忝近侍豫䝉天恩若其罪迹炳明文字有證非但顯戮司敗以正國典普天之下自無容身之地今虚聲為罪何酷如之夫自古讒謗聖賢不免然致謗之來要有由趣或輕死重氣結黨聚羣或勇冠鄉邦劒客馳逐未聞俎豆之學欲為逆節之罪山棲之士而搆陵上之釁今影迹無端假謗空設終古之酷未之或有匪􅈔其生實悲其痛誠復内省不疚而抱理莫申是以牽曳疾病束骸歸欵仰憑陛下天鑒曲臨則死之日猶生之年也臣憂怖彌日羸疾發動尸存恍惚不知所陳牋與廬陵王牋㑹稽既豐山水是以江左嘉遁竝多居之但季世慕榮幽棲者寡或復才為時求弗獲從志至若王𢎞之拂衣歸耕踰歴三紀孔淳之隠約窮岫自始迄今阮萬齡辭事就閒纂成先業浙河之外棲遲山澤如斯而已既逺同羲唐亦激貪厲競殿下愛素好古常若布衣每憶昔聞虛想巖宂若遣一介有以相存真可謂千載盛美也書答范光禄書辱告慰企晚寒體中勝常靈運脚諸疾比春更甚憂慮故人有情信如來告企詠之結實成饑渴山澗幽阻音塵濶絶忽見諸讚歎慰良多可謂俗外之詠尋覽三復味翫増懷輒奉和如別雖辭不足覩然意寄盡此從弟惠連後進文悟衰宗之美亦有一首并以逺呈又承祗洹法業日茂隨喜何極六梁徽縁竊望不絶即時經始招提在所住山南南檐臨澗北戸背巖以此息心當無所忝邪平生緬然臨紙累歎敬惜為先繼以音告儻値行李輒復承問答王衞軍問辨宗論書靈運白一悟理質以經誥可謂俗文之談然書不盡意亦前世格言幽僻無事聊與同行道人共求其衷猥辱髙難詞徴理析莫不精究尋覽彌日欣若暫對輒復更伸前論雖不辨酧釋來問且以示懷耳海嶠岨迴披示無期臨白増懷眷歎良深與弟書聞惡溪道中九十九里有五十九灘王右軍游此惡道歎其奇絶遂書突星瀨於石答弟書前月十二日至永嘉郡蠣不如鄞縣車螯亦不如北海答綱琳二法師書披覽雙難欣若暫對藻豐論博蔚然滿目可謂勝人之口然未厭於心聊伸前意無由言對執筆長懷志遊名山志夫衣食人生之所資山水性分之所適今滯所資之累擁其所適之性耳俗議多云歡足本在華堂枕嵓漱流者乏於大志故保其枯稿余謂不然君子有愛物之情有救物之能横流之弊非才不治故時有屈已以濟彼豈以名利之場賢於清曠之域耶語萬乘則鼎湖有縱轡論儲貳則嵩山有絶控又陶朱高揖越相留侯願辭漢傳推此而言可以明矣破石溪南二百餘里又有石帆修廣與破石等度質色亦同傳云古有人以破石之半為石帆故名彼為石帆此名破石永寧安固二縣中路東南便是赤石又枕海巫湖三面悉高山枕水渚山溪澗凡有五處南第一谷今在所謂石壁精舍石門澗六處石門遡水上入兩山口兩邊石壁右邊石巖下臨澗水神子溪南山與七里山分流去斤竹澗數里華子岡麻山第三谷故老相傳華子期者祿里先生弟子翔集此頂故華子為稱也桂林頂逺則嵊尖疆中從臨江樓步路南上二里餘左望湖中右傍長江始寧又北轉一汀十里直指舍下園南門樓自南樓百步許對横山論辨宗論問答附同遊諸道人竝業心神道求解言外余枕疾務寡頗多暇日聊申繇來之意庶定求宗之悟釋氏之論聖道雖逺積學能至累盡鑒生不應漸悟孔氏之論聖道既妙雖顔殆庶體無鑒周理歸一極有新論道士以為寂鑒微妙不容階級積學無限何為自絶今去釋氏之漸悟而取其能至去孔氏之殆庶而取其一極一極異漸悟能至非殆庶故理之所去雖合各取然其離孔釋矣余謂二談救物之言道家之唱得意之説敢以折中自許竊謂新論為然聊答下意遲有所悟法朂問敬覽清論明宗極雖微而一悟頓了雖欣新剖竊有所疑夫明達者以體理絶欲悠悠者以迷惑嬰累絶欲本乎見理嬰累繇於乖宗何以言之經云新學者離般若便如失明者無導是為懷理蕩患於兹顯矣若涉求未漸於大宗希仰猶累於塵垢則永劫劬勞期果緬邈既懷猶豫伏遲嘉訓初答道與俗反理不相闗故因權以通之權雖是假㫖在非假智雖是真能為非真非真不傷真本在於濟物非假不遂假濟物則反本如此之劫無空勤期果有如皎日朂再問案論孔釋其道既同救物之假亦不容異而神道之域雖顔也孔子所不誨實相之妙雖愚也釋氏所必教然則二聖建言何乖背之甚哉再答二教不同者隨方應物所化地異也大而挍之華民易於見理難於受教故閉其累學而開其一極夷人易於受教難於見理故閉其頓了而開其漸悟漸悟雖可至昧頓了之實一極雖知寄絶累學之冀良由華人悟理無漸而誣道無學夷人悟理有學而誣道有漸是故權實雖同其用各異昔向子期以儒道為壹應吉甫謂孔老可齊皆欲窺宗而況真實者乎朂三問重尋答以華夷有險易之性故二聖敷異同之教重方附俗可謂美矣然淵極朗鑒作則於上愚民䝉昧伏從於下故作則宜審其政伏從必是其宗令孔廢聖學之路而釋開漸悟之逕筌蹄既已紛錯羣黎何由歸真三答冬夏異性資春秋為始末晝夜殊用縁辰暮以往復況至精之理豈可逕接至粗之人是故傍漸悟者所以密造頓解倚孔教者所以潛成學聖學聖不出六經六經而得頓解不見三藏而以三藏果筌蹄歴然何疑紛錯魚兔既獲羣黎以濟僧維問承新論法師以宗極微妙不容階級使夫學者窮有之極自然之無有若無契何須言無也若資無以盡有者焉得不謂之漸悟耶初答夫累既未盡無不可得盡累之弊始可得無耳累盡則無誠如符契將除其累要須傍教在有之時學而非悟悟在有表託學以至但階級教愚之談一悟得意之論矣維再問論云悟在有表得不以漸使夫涉學希宗當日進其明不若使明不日進與不言同若日進其明者得非漸悟乎再答夫明非漸至信由教發何以言之由教而信則有日進之功非漸所明則無入照之分然向道善心起損累出垢伏伏似無同善似惡乖此所務不俱非心本無累至夫一悟萬滯同盡耳維三問答云由教而信則有日進之功非漸所明則無入照之分夫尊教而推宗者雖不永用當推之時豈可不蹔令無耶若許其蹔合猶自賢於不合非漸如何三答蹔者假也真者常也假知無常常知無假今豈可以假知之蹔而侵常知之真哉今蹔合賢於不合誠如來言竊有微證巫臣諌莊王之言物賖於已故理為情先及納夏姬之時已交於物故情居理上情理雲互物已相傾亦中智之率任也若以諫日為悟豈容納時之惑耶且南為聖也北為愚也背北向南非停北之謂向南背北非至南之稱然向南可以至南背北非是停北非是停北故愚可去矣可以至南故悟可得矣慧驎演僧維問當假知之壹合與真知同異初答與真知異驎再問以何為異再答假知者累伏故理暫為用用暫在理不恒其知真知者照寂故理常為用用常在理故永為真知驎三問累不自除故求理以除累今假知之一合理實在心在心而累不去將何以去之乎三答累起因心心觸成累累􅁪觸者心日昬教為用者心日伏伏累彌久至於滅累然滅之時在累伏之後也伏累滅累貌同實異不可不察滅累之體物我同忘有無壹觀伏累之狀他已異情空實殊見殊實空異已他者入於滯矣壹無有同我物者出於照也驎維問三世長於百年三千廣於赤縣四部多於户口七寶妙於石沙此亦方有小大故化有逺近得不謂之然乎初答事理不同恒成四端自有小大各得其宜亦有賢愚違方而處所謂世同時異物是人非譬割雞之政亦有牛刀佩璽而聽豈皆唐虞今謂言游體盡於武城長世皆覃於天下未之聞也且俱稱妙覺而國土精粗不可以精粗國土而言聖有優劣景迹之應本非所徴矣維再問論曰或道廣而事狹或事是而人非今不可以事之大小而格道之粗妙誠哉斯言但所疑不在此耳設令周孔實未盡極以之應世故自居宗此自是世去聖逺未足明極夫降妙數階以接羣粗則粗者所不測然數階之妙非極妙之謂推此而言撫世者於粗為妙然於妙猶粗矣以妙求粗則無往不盡以粗求妙則莫覩其源無往不盡故謂之窮理莫覩其源故仰之彌高今豈可就顔氏所崇而同之極妙耶再答今不藉顔所推而謂之為極但謂顔為庶幾則孔知幾矣且許禹昌言孔非本談以堯則天體無是同同體至極豈計有之小大耶維三問凡世人所不測而又昌言者皆可以為聖耶三答夫昌言賢者尚許其賢昌言聖者豈得反非聖耶日用不知百姓之迷䝉唯佛究盡實相之崇高今欲以崇高之相而令迷䝉所知未之有也茍所不知焉得不以昌言為信既以釋昌為是何以孔昌為非耶法綱問云敬披高論探研宗極妙判權實存㫖儒道遺教孔釋昌言折中允然新論可謂激流導源瑩拂發揮矣詳復答朂維之問或謂因權以通或學而非悟爾為𤣥句徒設無闗於胸情焉竊所未安何以言之夫道形天隔幾二險絶學不漸宗曽無髣髴馳騁有端思不出位神崖曷由而登機峯何從而超哉若勤務於有而坐體於無者譬猶揮毫鍾張之則功侔羿養之能不然明矣葢同有非甚礙尚不可以翫此而善彼豈況乎有無之至背而反得以相通者耶又云累既未盡無不可得盡累之弊始可得無耳論曰夫膏肓大道摧輈𤣥路莫尚於封有之累也葢有不能祛有祛有者必無未有先盡有累然後得無也就如所言累盡則無爾為累之自去實不無待實不無待則不能不無故無無貴矣如彼重闇自晞無假火日無假火日則不能不設亦明無尚焉落等級而奇頓悟將於是乎躓矣暇任之餘幸思嘉釋來難云同有非甚礙尚不可以翫此而善彼豈況乎有無之至背而反得以相通者耶此是拘於所習以生此疑耳夫專翫筆札者自可不工於弧矢弧矢既工復翫筆札者何為不兼哉若封有而不向宗自是封者之失造無而去滯何為不可得背借不兼之有以詰能兼之無非惟鍾胡愧射於更李羿養慙書於羅趙觸類之躓始充巧歴之歎今請循其本夫憑無以伏有伏久則有忘伏時不能知知則不復辨是以坐忘日損之談近出老莊數縁而滅經有舊説如此豈累之自去實無之所濟且明為晦新功在火日但火日不稱功於幽闇般若不言惠於愚蠢耳推此而往詎俟多云慧琳問云三復精議辨㦎二家斟酌儒道實有懷於論矣至於去釋漸悟遺孔殆庶䝉竊惑焉釋云有漸故是自形者有漸孔之無漸亦是自道者無漸何以知其然耶中人可以語上久習可以移性孔氏之訓也一合於道場非卜地之所階釋家之唱也如此漸絶文論二聖詳言豈獨夷束於教華拘於理將恐斥離之辨辭長於新論乎朂道人難云絶欲由於體理當謂日損者以理自悟也論曰道與俗反本不相闗故因權以通之物濟則反本問曰權之所假習心者亦終以為慮乎為曉悟之日與經之空理都自反耶若其永背空談翻為末説若始終相扶可循教而至不答維驎假知中殊為藻艶但與立論有違假者以旋迷喪理不以鑽火致惑茍南向可以造越背北可以棄燕信燕北越南矣慮空可以洗心捐有可以祛累亦有愚而空聖矣如此但當勤般若以日忘瞻郢路而驟進復何憂於失所乎將恐一悟之唱更躓於南北之譬耶孔雖曰語上而云聖無階級釋雖曰一合而云物有佛性物有佛性其道有歸所疑者漸教聖無階級其理可貴所疑者殆庶豈二聖異塗將地使之然斥離之歎始是有在辭長之論無乃角弓耶難云若其永背空談翻與末説若始終相扶可循教而至可謂公孫之辭辨者之囿矣夫智為權本權為智用今取聖之意則智即經之辭則權傍權以為檢故三乘咸蹄筌既意以歸宗故般若為魚兔良由民多愚也故教迂矣若人皆得意亦何貴於攝悟假知之論㫖明在有者能為達理之諌是為交賖相傾非悟道之謂與其立論有何相違燕北越南有愚空聖其理既當頗獲於心矣若勤者日忘瞻者驟進亦實如來言但勤未是得瞻未是至當其此時可謂向宗既得既至可謂一悟將無同轡來馳而云異轍耶論曰繇教而信有日進之功非漸所明無入照之分問曰繇教而信而無入照之分則是闇信聖人若闇信聖人理不闗心政可無非聖之尤何繇有日進之功以下王衞軍問答答曰顔子體二未及於照則向善巳上莫非闇信但教有可由之理我有求理之志故曰闗心賜以之二回以之十豈直免尤而已實有日進之功論曰暫者假也真者常也假知無常常知無假又曰假知累伏理暫為用用暫在理不恒其知問曰暫知為假知者則非不知矣但見理尚淺未能常用耳雖不得與真知等照然寧無入照之分耶若暫知未是見理豈得云理暫為用又不知以何稱知答曰不知而稱知者正以假知得名耳假者為名非暫知如何不恒其用豈常之謂既非常用所以交賖相傾故諌人則言政理悦已則犯所知若以諫時為照豈有悦時之犯故知言理者浮談犯知者沈惑推此而判自聖已下無淺深之照然中人之性有崇替之心矣論曰教為用者心日伏伏累彌久至於滅累問曰教為用而累伏為云何伏耶若都未見理專心闇信當其專心惟信而已謂此為累伏者此是慮不能竝為此則彼廢耳非為理累相權能使累伏也凡厥心數孰不皆然如此之伏根本未異一倚一伏循環無已雖復彌久累何由滅答曰累伏者屬此則廢彼實如來告凡厥心數孰不皆然亦如來㫖更恨不就學人設言而以恒物為譏耳譬如藥驗者疾易痊理竗者吝可洗洗吝豈復循環疾痊安能起滅則事不侔居然已辨但無漏之功故資世俗之善善心雖在五品之數能出三界之外矣平叔所謂冬日之隂輔嗣亦云逺不必攜聊借此語以況入無果無阻隔頌無量壽佛頌法藏長王宫懷道出國城願言四十八𢎞誓拯羣生淨土一何妙來者皆清英頽年欲安寄乘化好晨征贊王子晉讚淑質非不麗難以之百年儲宫非不貴豈若登雲天王子愛清淨區中寔囂諠冀見浮丘公與爾共繽翻巖下見一老翁四五少年讚盛𢎞之荆州記初有採藥衡山見一老翁四五少年對坐執書衡山採藥人路迷糧亦絶過息巖下坐正見相對説一老四五少仙隠不可別其書非世教其人必賢哲維摩經十譬贊聚沬泡合水性本無泡激流遂聚沬即異成貌狀消散歸虚壑君子識根本安事勞與奪愚俗駭變化横復生欣怛燄性内相表狀非炎安知火新新相推移熒熒非向我如何滯着人終嵗迷因果芭蕉生分本多端芭蕉知不一含萼不結核敷華何由實至人善取譬無宰誰能律莫昵縁合時當視分散日聚幻幻工作同異誰復謂非真一從逝物過既往亦何陳謬者疑久近逺者皆自賓勿起離合情㑹無百代人夣覺謂寢無知寐中非無見意狀盈眼前好惡迭一作迷萬變既悟眇已往惜為浮物戀孰視婆娑盡寧當非赤縣影響合影響順形聲資物故生理一旦揮霍去何因相像似羣有靡不然昧漠呼自已四色尚無本八微欲安恃浮雲泛濫明月隂薈蔚南山雨能為變動用在我竟無取俄已就飛散豈復得攢聚諸法既無我何由有我所電倐爍驚電過可見不可逐恒物生滅後誰復覈遲速慎勿空留念横使神理恧發已道易孚忘情長之福侍汎舟贊汎鷁兮遊蘭池渚相委兮石參差日隠雲兮月照林風遼冷兮水漣漪和范光祿祗洹像讚三首范侯逺送像讚命余同作神道希微願言所屬輒總三首期之道場佛讚惟此大覺因心則靈垢盡智照數極慧明三達非我一援羣生理阻心行道絶形聲菩薩讚若人仰宗發性遺慮以定養慧和理斯附爰初四等終然十住涉求至矣在外皆去縁覺聲聞合讚厭苦情多兼物志少如彼化城權可得寶誘以湼槃救爾生老肇元三車翻乘一道銘佛影銘夫大慈𢎞物因感而接接物之縁端緒不一難以形檢易以理測故已備載經傳具著記論矣雖舟壑緬謝像法猶在感運欽風日月彌深法顯道人至自祗洹具説佛影偏為靈奇幽巖嵌壁若有存形容儀端莊相好具足莫知始終常自湛然廬山法師聞風而悦於是隨喜幽室即考空巖北枕峻嶺南映滮澗摹擬遺量寄託青彩豈唯像形也篤故亦傳心者極矣道秉道人逺宣意㫖命余製銘以充刋刻石銘所始寔由功被未有道宗崇大若此之比豈淺思膚學所能宣述事經徂謝永眷罔已輒罄竭劣薄以諾心許徽猷祕奧萬不寫一庶推誠心頗感羣物飛鴞有革音之期闡提獲自拔之路當相尋於淨土解顔於道場聖不我欺致果必報援筆興言情迫其慨羣生因染六趣牽纒七識迭用九居屢遷劇哉五隂巻矣四縁遍使轉輪苦根迍邅迍邅未已轉輪在已四縁雲薄五隂火起亹亹正覺是極是理動不傷寂行不乖止曉爾長夢貞爾沈詖以我神明成爾靈智我無自我實承其義爾無自爾必袪其偽偽既殊塗義故多端因聲成韵即色開顔望影知易尋響非難形聲之外復有可觀觀逺表相就近曖景匪質匪空莫測莫領倚巖煇林傍潭鑒井借空傳翠激光發冏金好㝠漠白豪幽曖日月居諸胡寧斯慨曽是望僧擁誠俟對承風遺則曠若有槩敬圖遺蹤疏鑿峻峯周流步欄窈窕房櫳激波映墀引月入窓雲往拂山風來過松地勢既美像形亦篤彩淡浮色羣視沈覺若滅若無在摹在學由其潔精能感靈獨誠之云孚惠亦孔續嗟爾懷道慎勿中惕弱喪之推闡提之役反路今覩發䝉兹覿式厲厥心時逝流易敢銘靈宇敬告震錫書帙銘懷幽巻頤戢妙抱密用舍以造舒巻不失亮惟勤玩無或暇逸七七濟朝食既畢摘果堂隂春惟枇杷夏則林檎誄宋武帝誄九有同悲四海等哀矧伊下臣思戀徘徊敢遵前典式述聖徽乃作誄曰舜潛歴巖高晦泗渚龍德而隠風積乃舉皇之遁世屯難方阻眷此區寰閔爾淪胥太元之季權戚攜薄隆安之初主相䝉弱嶽牧糾䖍朝廷紛錯妖横乘隟蛟噴鯨躍既擾奧區遂斥帝㕓亂離斯瘼不後不先實賴明哲授手康旃紀度迴薄餘分成閏舊晉中微偽楚藉釁躡彼潛機整此英陣推亡必朽固存斯振盧循負險肆慝遐嶺殄我江豫迫我臺省民既揺蕩國將遷鼎乘騶歸轅式固皇境𢎞危濟險弭難釋殆虎騎騖隰舟師漲海傾穴尋巢窮幽測昧昔去洛汭息肩江沚世更十君年踰百祀國絶興復家成桑梓荒黙莫恤頽國誰恥夏典載禹九道是行商誥述湯兼攻是并勤彼周流協此經營仗鉞伐鼓赫赫明明乃敕衆師竟執戎昭誨以三畧惠以六韜雲撤周京席巻秦郊復禮前塋雪愧舊朝既清西闗將旋東道中徐豫兼應燕趙業盛曩代惠侔大造澤及四海功格八表悠悠聲教緜緜川陸北獻氊裘南貢金竹髽首冠弁穿胸歛服寒宂欣日巢棲玩屋匪惟遐譚靈物偕就孰是人事自天所佑甘露芝草祥雲瑞宿嘉禾連木素鳥皓獸昔之所感謳頌同音今之所應幽顯一心宋克虞德晉猶唐欽曰總八紘于兹三齡四維開張九流昭明敦儉務素欽賢愛萌制規作訓闡校修經禮樂已甄雲雨未𢎞將陟井陘薄掃白登北朔渇望飛旌衡輣東岱靈遲玉牒金縢天地不仁蒼生寡福已荷一遇棄我何速梁顛太頽甘殞以贖同軌畢至率土咸哀殊方均服欒欒素縗灑淚成雨響呌如雷史臣考卜高山開基貞龜無逺遷靈有期嗣皇擗摽羣后崩悲就云不戚痛百在兹惟祖之夕流火始變秋月未永飛漏急箭鳴簫哀噭金觴虚奠列駕長隧發輦華殿華殿既謝長隧是幸雙葢躊蹰六閑引領攀援容貌眷戀俄頃哀哀百僚長辭含鯁奉教百朝執鞭三始從履五牧年歴十祀天光下濟謬䝉眷齒愧微刀筆頗預遊止垂幕待講接筵餐理修曙朗夕登臺泛沼匪月匪日無晏無早如何一旦緬邈穹昊徽容未逺聖靈超然收淚即路含戚何言風霜蕭瑟山海蒼茫地苦情矜節速心傷孰是幽哀實戀我皇情思如環蘐蘇豈忘宋廬陵王誄事非淮南而痛深於中霧迹非任城而暴甚於仰毒託體皇極銜怨至盡豈惟有識傷慨故亦率土悽心葢出罔已之悲以陳酸切之事云爾誄曰哀哀君王終仁且德在枉無言即辠有黙曽是忍虐古來一酷身微咎累痛踰酖毒何斯禍斯乃怨乃辱命如可延人百其贖矜急景之難留悼驚波之易淪自君王之㝠漠歴彌稔於此春聆鳴禽之響谷視喬木之陵雲咸感節而興悦獨懷悲而莫申候射隼于高墉赫王典以正刑服二辜于北犴致九伐于南荆發酸痛于仁詔令寵贈于哀心布悽楚于帝言攄綢繆于皇音曇隆法師誄夫協理置論百家未見其是因心自了一已不患其躓而終莫相辨我若咸歎翻淪得拔竟知于誰冀行跡立則善惡靡徴欲聲名傳則薰蕕同歇然意非身之所挫期出命之所限者目所親覿見之若人矣慧心朗識發于髫辮生自豪華家贏金帛加以巧乘騎解絲竹秣絶景于康衢弄絃管於華肆者非徒經旬涉朔彌歴年稔而已諒趙李之咸陽程鄭之臨卬矣既而永夜獨悟中飲興歎曰悲夫欣厭迭來終歸憂苦不杜其根於何超絶且三界迴沈諸天倐瞬況齊景牛山趙武企隂催促節物逼迫霜露推此願言伊何能久慨然有擯落榮華兼濟物我之志母氏矜其心姊弟申其操遂相許諾出家求道一身既然闔門離世妻子長絶歡娛永謝豈唯向之靡樂判之盛年終古恩愛於今仳別矣旅舟南遡投景廬嶽一登石門香鑪峯六年不下嶺僧衆不堪其操法師不改其節援物之念不以幽居自抗同學嬰疾振錫萬里相救余時謝病東山承風遥羨豈望人期頗以山招法師至止鄙人榮役前詩叙粗已記之故不重煩及中間反山成説欵盡遂獲接棟重崖俱浥廻澗茹芝术而共餌披法言而同巻者再歴寒暑非直山陽靡喜愠之容令尹一進已之色實明悟幽微祛滌近滯蕩吝澡垢日忘其疾庶白首同居而乖離無象信順莫歸徴集何縁晚節罹舋逺見參尋至止阻濶音塵殆絶值暑遘疾未旬即化誠存亡命也此行頗實有由承凶感痛寔百常情紙墨幾時非以斯名葢欽志節追感平生自不能黙已故投懷援筆其辭曰仰尋形識俯探理類採聲知律拔茅觀彚物以靈異人以智貴即是神明觀鑒意謂爰初在稚慧心夙察吐噏芳華懷抱日月如彼蘭苑風過氣越如彼天倪雲被光發求名約身規操束已儻或遇世曽未近似生以意泰意管生理孰是歡慰程鄭趙李家畜金繒才練藝技驤首揮霍繁絃綺靡酒娛調促意妍服侈朝迫景曛夕忌星徙悠悠白日凄凄良夜年往歡流厭來情舍苦樂環迴終卒代謝棄而更適生速名借誰能易奪何術推移精粗渾淆善惡參差即心有限在理莫規試覈衆肆庶獲所窺道家躓近羣流缺逺假名恒誰傍義豈反獨有兼忘因心則善傷物沈迷羨彼驅遣變服京師振錫廬頂長別榮冀永息幽嶺含華襲素去繁就省人苦其難子取其靜昏之視明即愚成絶智之秉情對理斯湼吝既弗祛滯亦安拔子之矜之為爾苦節節苦在已利貞存彼以明闇逝以慈累徙欲以援物先宜濟此發軫情違終然理是梁鴻攜妻荷蓧見子雞黍接人行歌通已於世曰高於道殊鄙始見法師獨絶神理形壽易盡然諾難判乘心即化棄身靡歎懷道彌厲景命已晏矜物辭山終身旅館嗚呼哀哉魂氣隨之延陵已了鳶螻同施漆園所曉委骸空野豈異豈矯幸有遺餘聊給蟲鳥嗚呼哀哉緬念生平同幽共深相率經始偕是登臨開石通澗剔柯疏林逺眺重疊近矚嶇嶔事寡地閒尋微探賾何句不研奚疑弗折帙舒軸巻藏拔紙襞問來答往俾日餘夕沮溺耦耕夷齊共薇跡同心歡事異意違承疾懷灼聞凶懣悲孰云不痛零淚沾衣嗚呼哀哉行久節移地邊氣改終秋中冬踰桂投海永念伊人思深情倍俯謝常人仰愧無待嗚呼哀哉廬山慧逺法師誄道存一致故異化同暉德合理妙故殊方齊致昔釋安公振𤣥風于闗右法師嗣沬流于江左聞風而悦四海同歸爾乃懷仁山林隠居求志于是衆僧雲集勤修淨行同法餐風棲遲道門可謂五百之季仰紹舍衞之風廬山之㟪俯傳靈鷲之㫖洋洋乎未曽聞也予志學之年希門人之末惜哉誠願弗遂永違此世春秋八十有四義熈十三年秋八月六日薨年踰從心功遂身亡有始斯終千載垂光嗚呼哀哉乃為誄曰於昔安公道風允被大法將盡頽綱是寄體静息動懷貞整偽事師以孝養徒以義仰𢎞如來宣揚法雨俯受法師威儀允舉學不闚牖鑒不出戸粳糧雖御􅍦為萇楚朗朗高堂肅肅法庭既嚴既静愈高愈清從容音㫖優游儀形廣演慈悲饒益衆生堂堂其氣亹亹其資􅙎角味道辭親隨師供奉三寶析微辨疑盛化濟濟仁德怡怡於焉問道四海承風有心載馳戒德鞠躬令聲續振五濁暫隆𢎞道讚揚彌虐彌冲十六王子孺童先覺公之出家年未志學如彼鄧林甘露潤澤如彼瓊瑤既磨既琢大宗戾止座衆龍集聿來胥宇靈寺奚立舊望研幾新學時習公之勗之載和載輯乃修什公宗望交泰乃延禪衆親承三昧衆美合流可上可大穆穆道德超于利害六合俱否山崩海竭日月沈暉三光寢晰衆麓摧柯連波中結鴻化垂緒微風永滅嗚呼哀哉生盡冲素死増傷悽單縶土槨示同歛骸人天感悴帝釋慟懷習習遺風依依餘凄悲夫法師終然是棲室無停響途有廣蹊嗚呼哀哉端木喪尼哀直六年仰慕洙泗俯憚筌今子門徒實同斯囏晨掃虚房夕泣空山嗚呼法師何時復還風嘯竹栢雲靄巖峰川壑如泣山林改容自昔聞風志願歸依山川路邈心往形違始終銜恨宿縁輕微安養有寄閻浮無希嗚呼哀哉漢魏六朝百三家集巻六十五
