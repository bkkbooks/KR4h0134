body:
  text: 漢魏六朝百三家集巻一百十六李德林集題詞北方大臣享重名無特操者余最薄楊遵彦李公輔遵彦世受魏恩僭尚靜后金紫衣帶羞見李庶二王之變命盡捉酒死不足憐公輔在齊結知帝王機宻文雅禮均師友遽臣周室寵絶僚右及宣帝大漸又託身隋公願以死奉嗚呼鄭譯劉昉楊堅私人朝受顧命夕假黄鉞猶未敢訟言也獨公輔先發之策定三方贊成九錫禪代功髙自矜佐命此非周武帝所稱天上人乎反顔事讎恬不知恥楊堅欲族滅宇文公輔深執不可一言忤意終身疎外物論原之然身旣佐簒大業已成僅欲保全陳留山陽少盖操懿之惡吁嗟已晩荀文若飲藥壽春世尚譏其失節况隋初李内史哉公輔髙名少著鄴京南北文士如魏常侍江令君皆稱之河朔英靈史云無二究其羽檄絲綸皆䛕筆耳服官慕孔光之秘温樹修文學潘朂之册魏王雖理覈詞暢亦奚取焉目録詔為周帝加隋公大丞相詔為周帝加隋王九錫詔九錫第二詔為周禪隋詔為周帝赦詔賜姓復舊詔為周帝求才詔隋文帝為太祖武元皇帝行幸四處立寺建碑詔為隋文帝修五禮詔册文隋王九錫册文禪隋册文書復魏收書重答魏收書序霸朝雜集序論天命論詩相逢狹路間從駕巡遊從駕還京夏日入山詠松樹漢魏六朝百三家集巻一百十六目錄欽定四庫全書漢魏六朝百三家集巻一百十六明張溥輯李德林集詔為周帝加隋公大丞相詔假黄鉞使持節左大丞相都督内外諸軍事上柱國大冢宰隋國公堅感山河之靈應星辰之氣道髙雅俗德協幽顯釋巾登仕搢紳傾屬開物成務朝野成風受詔先皇弼諧寡薄合天地而生萬物順隂陽而撫四夷近者内有艱虞外聞妖冦以鷹鸇之志運帷帳之謀行兩觀之誅掃萬里之外遐邇清肅實所賴焉四海之廣百官之富俱稟大訓咸餐至道治定功成棟梁斯託神猷威德莫二于時可授大丞相罷左右丞相之官餘如故為周帝加隋王九錫詔天大地大合其德者聖人一隂一陽調其氣者上宰所以降神載挺陶鑄羣生代蒼蒼之工成巍巍之業假黄鉞使持節大丞相都督内外諸軍事上柱國大冢宰隋國公應百代之期當千齡之運家隆台鼎之盛門有翊贊之勤心同伊尹必致堯舜情類孔丘憲章文武爰初入仕風流映世公卿仰其軌物搢紳謂為師表入處禁闈出居藩政芳猷茂績問望彌逺往平東夏人情未安燕南趙北實為天府擁節杖旄任當連率柔之以德導之以禮畏之若神仰之若日芳風美迹歌頌獨存淮海榛蕪多歴年代作鎮南鄙選衆惟賢威震殊俗化行黔首任掌鉤陳職司邦政國之大事朝寄更深鑾駕巡遊留臺務廣周公陜西之任僅可為倫漢臣關内之重未足相况及天崩地坼先帝升遐朕以眇年奄經荼毒親受顧命保乂皇家姦人乗隙潛圖宗社無君之意已成竊發之期有日英規潛運大畧川迴匡國庇民罪人斯得兩河遘亂三魏稱兵半天之下洶洶鼎沸祖宗之基已危生人之命將殆安陸作釁南通吳越蜂飛蠆聚江漢騷然巴蜀鴟張翻將問鼎秦塗更阻漢門重閉畫籌帷帳建出師車諸將禀其謀壯士感其義不違時日咸得清蕩九功逺被七德允諧百僚師師四門穆穆光景照臨之地風雲去来之所允武允文幽明同德驟山驟水遐邇歸心使朕繼踵上皇無為以治聲髙宇宙道格天壤伊尹輔殷霍光助漢方之蔑如也昔營丘曲阜地多諸國重耳小白錫用殊禮蕭何優贊拜之儀畨君越公侯之爵姬劉以降代有令謨宜崇典禮憲章自昔可授相國總百揆去都督内外諸軍事大冢宰之號進公爵為王以隋州之崇業鄖州之安陸城陽温州之宜人應州之平靖上明順州之淮南士州之永川昌州之廣昌安昌申州之義陽淮安息州之新蔡建安豫州之汝南臨潁廣寧初安蔡州之蔡陽郢州之漢東二十郡為隋國劒履上殿入朝不趨贊拜不名備九錫之禮加璽紱逺遊冠相國印緑綟綬位在諸侯王上隋國置丞相已下一依舊式九錫第二詔伊周作輔不辭殊禮之錫桓文為霸允應異物之典所以表格天之勲彰不代之業相國隋王前加典策式昭大禮固守謙光絲言未綍宜申顯命一如徃㫖王功必先人賞存後已退讓為本誠乖朕意宜命百辟盡詣王宫衆心克感必令允納如有表奏勿復以聞為周禪隋詔元氣肇闢樹之以君有命不恒所輔惟德天心人事選賢與能盡四海而樂推非一人而獨有周德將盡妖孽逓生骨肉多虞藩維搆釁影響同惡過半區宇或小或大圖帝圖王則我祖宗之業不絶如線相國隋王睿聖自天英華獨秀刑法與禮儀同運文德共武功俱逺愛萬物其如已任兆庶以為憂手運機衡躬命將士芟夷姦宄刷蕩氛祲化通冠帶威震幽遐虞舜之大功二十未足相比姬發之合位三五豈可足論况木行已謝火運旣興河洛出革命之符星辰表代終之象烟雲改色笙簧變音獄訟咸歸謳歌盡至且天地合德日月貞明故以稱大為王照臨下土朕雖寡昧未達變通幽顯之情皎然易識今便祗順天命出遜别宮禪位于隋一依唐虞漢魏故事為周帝赦詔朕祗承洪業二載于兹藉祖考之休憑宰輔之力經天緯地四海晏如逆賊尉遲迥才質凡庸志懐姦慝因緣戚屬位冠朝倫屬上天降禍先皇晏駕萬國深鼎湖之痛四海窮遏宻之悲獨幸天灾欣然放命稱兵擁衆便懐問鼎乃詔六師肅兹九伐而凶徒孔熾充原蔽野諸將肆雷霆之威壯士縱貔貅之勢芟夷縈拂所在如莽直指漳濱擒斬元惡羣醜喪魄咸集鼓下順髙秋之氣就上天之誅兩河妖孽一朝清蕩自朝及野喜抃相趨昔上皇之時不言為治聖人宰物有教而已未戢干戈實深慚德思𢎞寛簡之政用副億兆之心可大赦天下賜姓復舊詔詩稱不如同姓傳曰異姓為後盖明辯親疎皎然不雜太祖受命龍德猶潛籙表革代之文星垂除舊之象三分天下志扶魏室多所改作冀允上𤣥文武羣官賜姓者衆本殊國邑實乖胙土不歆非類異骨肉而共烝嘗不愛其親在行路而叙昭穆且神徵革姓本為厯數有歸天命在人推讓終而弗獲故君臨區宇累世于兹不可仍遵謙挹之㫖久行權宜之制諸改姓者悉宜復舊為周帝求才詔帝王設官惟才是務人臣報國薦賢為重去嵗已來屢有妖寇宰臣英算咸得清蕩逆亂之後兵車始朅遐邇勞役生民未康居官之徒致治者寡斯故上失其道以至于兹亦由下有幽人未展其力今四海寧一八表無塵元輔執鈞垂風揚化若使天下英傑盡升于朝銓衡陟降量才而處垂拱無為庶幾可至于是遣戎秩上開府以上職事下大夫以上外官刺史以上各舉清平勤幹者三人被舉之人居官三年有功過者所舉之人隨加賞罰隋文帝為太祖武元皇帝行幸四處立寺建碑詔門下風樹弗靜隙影如流空切欲報之心徒有終身之慕伏惟太祖武元皇帝窮神盡性感穹昊之靈膺籙合圖開炎德之紀魏氏將謝躬事經綸周室勃興同心匡贊間關二代造我帝基猶夏禹之事唐虞晉宣之輔漢魏徃者梁氏將滅親尋搆禍蕭詧稱兵擁衆據有襄陽将入魏朝狐疑未決先帝出師樊鄧飲馬漢濱彼感威懷連城頓顙隋郡安陸未即從風敵人騁輔車之援重城固金湯之守乃復練卒簡徒一舉而尅始于是日遂啓漢東蕭繹往在江陵後梁稱制外通表奏隂有異圖心迹之間未盡臣節王師薄伐帝旅推鋒誅厥方命繼其絶祀有齊未亡凶徒孔熾連山巨防艱危萬重晉水之陽是其心腹于是鳴䕫執鉞假道比鄰皮服欽風烟隨霧集懸兵萬里直指參墟左縈右拂麻積草靡雖事未旣功而英威大振齊人因以挫衂周武賴以成功尚想王業之勤逺惟風化之始率夷狄而制東夏用偏師而取南國豈惟湯征葛伯周伐崇侯而已哉積德累功福流後嗣俾朕虚薄君臨區有追仰神猷事冥真寂降生下土權變不常用輪王之兵伸至人之意百戰百勝為行十善故以干戈之器已類香華𤣥黄之野久同淨國思欲崇樹寶刹經始伽藍增長福因㣲副幽㫖昔夏因導水尚且銘山周曰巡遊有聞勒石帝王紀事由来尚矣其襄陽隋州江陵晉陽並宜立寺一所建碑頌德庶使莊嚴寶坊比虚空而不壞導揚茂實同天地而長久為隋文帝修五禮詔禮之為用時義大矣哉黄琮蒼璧降天地之神粢盛犧牲致宗廟之敬正父子君臣之序明婚姻喪紀之節故道德仁義非禮不成安上化民莫善於禮自區宇亂離綿歴年代王道衰而變風作㣲言絶而大義乖與代推移其弊日甚至於四時郊祀之節文五服麻葛之隆殺是非異説蹐駁殊塗致使聖教彫訛輕重無凖朕祗承天命撫臨生民當洗滌之時属干戈之代克定祸亂先運武功刪正彞典日不暇給今四海乂安五戎勿用理冝𢎞風訓俗導德齊禮綴徃聖之舊章興先王之茂則尚書左僕射越國公楊素尚書右僕射邳國公蘇威吏部尚書竒章公牛𢎞内史侍郎薛道衡秘書丞許善心内史舍人虞世基著作郎王邵或任居端揆博逹古今或器推令望學綜經史委以裁緝實允僉議可並修定五禮冊文隋王九錫冊文咨爾假黄鉞使持節大丞相都督内外諸軍事上柱國大冢宰隋王天覆地載藉人事以財成日往月來由王道而盈昃五氣陶鑄萬物流形誰代上𤣥之工斯則大聖而已曰惟先正翊亮皇朝種德積善載誕上相精采不代風骨異人匡國濟時除凶撥亂百神奉職萬國宅心殷相以先知悟人周輔乃𢎞道于代方斯蔑如也今將授王典禮其敬聽朕命朕以不德早承丕緒上靈降祸夙遭愍凶妖醜覬覦密圖社稷宫省之内疑慮驚心公受命先皇志在匡弼輯諧内外濳運機衡奸人懾憚謀用丕顯俾贅旒之危為太山之固是公重造皇室作霸之基也伊我祖考之代任寄已深入掌禁兵外司藩政文經武略久播朝野戎軒大舉長驅晉魏平陽震熊羆之勢冀部耀貔豹之威初平東夏人情未一叢臺之北易水之南西距井陘東至滄海比數千里舉𬒮如帷委以連城建旌杖節教因其俗刑用輕典如泥從印猶草隨風此又公之功也呉越不賔多歴年代淮海之外時非國有爰整其旅出鎮于亳武以威物文以懷逺羣盗自奔外户不閉人黎慕義襁負而歸自北之風化行南國此又公之功也宣帝御宇任重宗臣入典八屯外司九伐禁衛勤廵警之務治兵得蒐狩之禮此又公之功也鑾駕遊幸頻委留臺文武注意軍國諮稟萬事咸理反顧無憂此又公之功也朕在諒闇公實縂已磐石之宗姦囘者衆招引無頼連結羣小徃者國哀甫爾已創隂謀積惡數旬昆吾方稔泣誅磬甸宗廟以寧此又公之功也尉迥猖狂稱兵鄴邑欲長㦸而指北闕强弩而圍南斗憑陵三魏之間震驚九州之半聚徒百萬悉成蛇豕淇水洹水一飲而竭人之死生飜繫凶豎壽之長短不由司命公乃戒彼鷹掦出車練卒誓蒼兕於河朔建瓴水于東山口授兵書手畫行陣量敵制勝指日尅期諸將遵其成㫖壯士感其大義輕死忘生轉鬬千里旗鼓奮發如火燎毛𤣥黄變漳河之水京觀比爵臺之峻百城氛祲一旦廓清此又公之功也青土連率跨據東秦藉負海之饒倚連山之險望三輔而将逐鹿指六國而願連雞風雨之兵助鬼為虐本根既㧞枝葉自殞屈法伸恩示以大信此又公之功也申部殘賊充斥一隅蝇飛蟻聚攻州略地播以𤣥澤迷更知反服而捨之無費遺鏃此又公之功也宇文胄親則宗枝外藩巖邑影響鄴賊有同就燥迫脅吏人叛換城戍偏師討䠞遂入網羅束之武牢有同囹圄事窮将軍如伏國刑此又公之功也檀讓席毗擁衆河外陳韓梁鄭宋衛鄒魯村落成梟獍之墟民庶為豺狼之餌强以陵弱大則吞小城有晝閉巷無行人授律出師随機掃定譲既授首毗亦梟懸此又公之功也司馬消難與國親姻作鎭安陸性多嗜欲意好貪聚属城子女刼掠靡餘部入貨財多少具罄擅誅刺舉之使專殺儀台之臣懼罪畏威動而内奰蠶食郡縣鴆毒華夷聞有王師自投南裔帝唐崇山之罰僅可方此大漢流禦之刑是亦相匹逋逃入藪荆郢用安此又公之功也王謙在蜀飜為厲階閉劍閣之門塞靈關之宇自謂五丁復起萬夫莫向分閫推轂嘗不踰時風馳席巻一舉大定擒斯兇惡掃地無遺此又公之功也陳頊因循偽業自擅金陵屢遣醜徒趦趄江北公指麾藩鎭無不摧殄方置文淵之柱非止尉佗之拜此又公之功也公有濟天下之勤重之以明德始于辟命屈已登庸素業清徽聲掩廊廟椎規神略氣葢朝野序百揆而穆四門恥一匡之舉九合尊賢崇德尚齒貴功錄舊旌善興亡繼絶寛猛相濟彞倫攸叙敦睦帝親崇奨王室星象不拆隂陽自調𤣥㝠祝融如奉太公之召雨師風伯似應成王之宰祥風嘉氣觸石揺林瑞獸異禽遊園鳴閣至功至德可大可乆盡品物之和䆒杳㝠之極朕又聞之昔者明王設官胙土營丘四履得征五矦參墟寵章異其禮物故藩屏作固埀拱責成沉嘿巖廊不下堂席公道髙徃烈賞薄前王朕以𦕈身託于兆人之上求諸故實甚用懼焉徃加大典憲章在昔謙以自牧未應朝禮日月不居便已隔歲時談物議其謂朕何今進授相國縂百揆以申州之義陽等二十郡為隋國今命使持節太傅上柱國杞國公椿大宗伯大将軍金城公趙煚授相國印綬相國禮絶百辟任縂羣官舊職常典宜與事革昔堯臣太尉舜佐司空姬旦相周霍光輔漢不居藩國唯在天朝其以相國總百揆去衆號焉上所假節大丞相大冢宰印綬又加九錫其敬聽朕後命以公執律修德愼獄恤刑為其訓範人無異志是用錫公大輅戎輅各一𤣥牡二駟公勤心地利所保人天崇本務農公私殷阜是用錫公袞冕之服赤舄副焉公樂以移風雅以變俗遐邇胥悦天地咸和是用錫公軒懸之樂六佾之舞公仁風德教覃及海隅荒忽幽遐囘首内向是用錫公朱户以居公水鏡人倫銓衡庻職能官流詠遺賢必舉是用錫公納陛以登公執鈞於内正性率下犯義無禮罔不屏黜是用錫公虎賁之士三百人公闕是用錫公鉄鉞各一公威嚴夏日精厲秋霜猾夏必誅顧眄天壌掃清姦宄折衝無外是用錫公彤弓一彤矢百盧弓十盧矢千惟公孝通神明肅恭祀典尊嚴如在情切幽明是用錫公秬鬯一卣珪瓉副焉隋國置丞相以下一遵舊式徃欽哉其敬循徃策祗服大典簡恤爾庻功對揚我太祖之休命禪隋册文咨爾相國隋王粤若上古之初爰啓清濁降符授聖為天下君事上帝而理兆人和百靈而利萬物非以區㝢之富未以宸極為尊大庭軒轅以前驪連赫胥之日咸以無為無欲不将不迎遐哉其詳不可聞已厥有載籍遺文可觀聖莫逾于堯美未過於舜堯得太尉已作運衡之篇舜遇司空便叙精華之碣彼褰裳脱屣貳官設饗百辟歸禹若帝之初斯葢上則天時不敢不授下祗天命不可不受湯代於夏武革于殷干戈揖譲雖復異揆應天順人其道靡異自漢迄晉有魏至周天厯逐獄訟之歸神鼎隨謳歌之去道髙者稱帝禄盡者不王與夫文祖神宗無以别也周德將盡禍難頻興宗戚姦囘咸将竊發顧瞻宫闕将圖宗社藩維連率逆亂相尋摇蕩三方不合如礪蛇行鳥攫投足無所王受天明命􅌖德在躬救頺運之艱匡墜地之業拯大川之溺撲燎原之火除羣凶於城社廓妖氛於逺服至德合於造化神用洽於天壤八極九野萬方四裔圓首方足罔不樂推徃歲長星夜掃經天晝見八風比夏后之作五緯同漢帝之聚除舊之徴昭然在上近者赤雀降祉𤣥龜效靈鍾石變音蛟魚岀穴布新之貺煥焉在下九區歸徃百靈協贊人神屬望我不獨知仰祗皇靈俯順人願今敬以帝位禪于爾躬天祚告窮天禄永終於戲王宜允執厥和儀刑典訓升圓丘而敬蒼昊御皇極而撫黔黎副率土之心恢無疆之祚可不盛歟書復魏収書即位之元春秋常義謹按魯君息姑不稱即位亦有元年非獨即位得稱元年也議云受終之元尚書之古典謹按大傳周公攝政一年救亂二年伐殷三年踐奄四年建矦衛五年營成周六年制禮作樂七年致政成王論者或以舜禹受終是為天子然則周公以臣禮而死此亦稱元非獨受終為帝也䝉示議文扶病省覽荒情迷識蹔得發䝉當世君子必無横議惟應閣筆贊成而已輙謂前二條有益於議仰見識中不錄謹以寫呈重荅魏收書攝之與相其義一也故周公攝政孔子曰周公相成王魏武相漢曹植曰如虞翼唐或云髙祖身未居攝灼然非理攝者專賞罸之名古今事殊不可以體為㫁陸機見舜肆類上帝班瑞羣后便云舜有天下湏格于文祖也欲使晉之三主異於舜攝竊以為舜若堯死獄訟不歸便是夏朝之益何得不須格於文祖也若使王者之禮便曰即眞則周公負扆朝諸矦霍光行周公之事皆眞帝乎斯不然矣必知髙祖與舜攝不殊不得從士衡之謬或以為書元年者當時實錄非追書也大齊之興實由武帝謙匿受命豈直史也比觀論者聞追舉受命之元多有河漢但言追數受命之歲情或安之似所怖者元字耳事類朝三是許其一年不許其元年也案易黄裳元吉鄭𤣥注云如舜試天子周公攝政是以試攝不殊大傳雖無元字一之與元無異義矣春秋不言一年一月者欲使人君體元以居正葢史之婉辭非一與元别也漢獻帝死劉備自尊崇陳壽蜀人以魏為漢賊寧肯蜀主未立已云魏武受命乎士衡自尊本國誠如髙議欲使三方鼎峙同為霸名習氏漢晉春秋意在是也正司馬炎兼并許其帝號魏之君臣呉人並以為戮賊亦寧肯當塗之世云晉有受命之徴史者編年也故魯號紀年墨子又云吾見百國春秋史又有無事而書年者是重年驗也若欲髙祖事事謙冲即須號令皆推魏氏便是編魏年紀魏事此即魏末功臣之傳豈復皇朝帝紀者也陸機稱紀元立斷或以正始或以嘉平束晳議云赤雀白魚之事恐晉朝之議是并論受命之元非止受終之斷也公議云陸機不論元者是所未喻願更思之陸機以刋木著於虞書龕黎見於啇典以蔽晉朝正始嘉平之議斯又謬矣惟可二代相渉兩史並書必不得以後朝創業之迹斷入前史若然則世宗髙祖皆天保以前惟入魏氏列傳不作齊朝帝紀可乎此既不可彼復何証序霸朝雜集序竊以陽烏垂曜㣲藿傾心神龍騰舉飛雲觸石聖人在上幽顯㝠符故稱比屋可封萬物斯覩臣皇基草剏便豫驅馳遂得㕘可封之民為萬物之一其為嘉慶固以多也若夫帝臣王佐應運挺生接踵於朝諒有之矣而班爾之妙曲木變容朱藍所染素絲改色二十二臣功成盡美二十八将效力於時種德積善豈皆比於稷契計功稱伐非悉類於耿賈書契已還立言立事質非殆庻何世無之葢上稟睿后旁資羣傑牧啇鄙賤屠釣幽㣲化為矦王皆由此也有教無類童子羞於霸功見德思齊狂夫成於聖業治世多士亦因此焉烟霧可依騰蛇與蛟龍俱逺栖息有所蒼蠅同騏驥之速因人成事其功不難自此而談雖非上智事受命之主委質為臣遇髙世之才連官接席皆可以翊亮天地流名鐘鼎何必蒼頡造書伊尹制命公旦操筆老聃正史方可叙帝王之事談人鬼之謀乎至若臣者本慚賔實非勲非德厠軒冕之流無學無才處藝文之職若不逢休運非遇天恩光大含𢎞博約文禮萬官百辟才悉兼人收拙里閭退仕鄉邑不種東陵之𤓰豈過南陽之掾安得出入閶闔之閫趨走太㣲之庭履天子之階侍聖皇之側樞機帷幄霑及榮寵者也昔歲木行将季諒闇在宸火運肇興羣官總已有周典八柄之所大隋納百揆之日兩朝文翰臣兼掌之時漙天之下三方搆亂軍國多務朝夕塡委簿領紛紜羽書交錯或速均發弩或事大滔天或日有萬幾或幾有萬事皇帝内明外順經營區宇吐無窮之術運不測之神幽贊兩儀財成萬類咨謀臺閣曉諭公卿訓率土之濵責反常之賊三軍奏律戰勝攻取之方萬國承風安上治民之道譲受終之禮報羣臣之令有憲章古昔者矣有隨事作故者矣千變萬化譬彼懸河寸隂尺日不棄光景大則天壌不遺小則毫毛無失逺尋三古未聞者盡聞逖聽百王未見者皆見發言吐論即成文章臣染翰操牘書記而已昔放勲之化老人覩而未知孔丘之言弟子聞而不逹愚情稟聖多必乖舛加以奏閣趨墀盈懐滿䄂手披目閲堆案積几心無别慮筆不蹔停或畢景忘餐或連宵不寐以勤補拙不遑自處其有詞理疎謬遺漏闕疑皆天㫖訓誘神筆改定運籌建䇿通幽逹㝠從命者獲安違命者悉祸懸測萬里指期來事常如目見固乃神知變大亂而致太平易可誅而為淳粹化成道洽其在人文盡出聖懐用成典誥並非臣意所能至此伯禹矢謨成湯陳誓漢光數行之札魏武接要之書濟時拯物無以加也屬神器大寶將遷明德天道人心同謨歸徃周静南面每詔褒揚在位諸公各陳本志璽書表奏羣情賜委臣寰海之内沗曰一民樂趨之誠切於黎獻欣然從命輒不敢辭比夫潘朂之冊魏王阮籍之勸晉后道髙前世才謝徃人内手捫心夙宵慙惕檄書露板及以諸文有臣所作之有臣潤色之惟是愚思所奏定者雖詞乖黼藻而理歸霸德文有可忽事不可遺前奉勅㫖集納麓已還至於受命文筆當時制述條目甚多今日收撰略為五巻云爾論天命論粤若邃古𤣥黄肇闢帝王神器歴數有歸生其德者天應其時者命確乎不變非人力所能為也龍圖鳥篆號謚遺跡疑而難信缺而未詳者靡得而明焉其在典文煥乎緗素欽明至德莫盛於唐虞貽謀長世莫過於文武大隋神功積於文王天命顯於唐叔昔邑姜方娠夢帝謂已余命而子曰虞将與之唐而蕃育其子孫及生有文在其手曰虞遂以命之成王滅唐而封太叔又唐叔之封也箕子曰其後必大易曰崇髙富貴莫大於帝王老子謂域内四大王居一焉此則名虞與唐美兼二聖将令其後必大終致唐虞之美蕃育子孫用享無窮之祚逮皇家建國初號大興箕子必大之言於兹乃驗天之眷命懸屬聖朝重耳區區豈足云也有娀𤣥鳥商以興焉姜嫄巨跡周以興焉邑姜夢帝隋以興焉古今三代靈命如一本枝種德奕葉丕基佐髙帝而滅楚立宣皇以定漢東京太尉關西孔子生感遺鱣之集殁降巨鳥之奇累仁積善大申休命太祖挺生庇民匡主立殊勲於魏室建盛業於周朝啟翼軫之國肇炎精之紀爰受厥命陟配彼天皇帝載誕之初神光滿室流於户外上屬蒼旻其後三日紫氣充庭四隣望之如鬱樓觀人物在内色皆成紫㓜在乳保之懐忽覩為龍懼而失抱帝驚動數旬方始痊復又嘗寝於其室家人開户正見一龍闕太祖神異也世塗不測竅比丘尼智先保養智先禪觀靈雅有𤣥䜟云此子方為普天慈父䕶持正法神佛佑助不湏憂也帝體貎多奇其面有日月河海赤龍自通天角洪大䨇上顴骨彎迴抱目口如四字聲若鐘鼓手内有王文及受九錫王生文加㸃乃為主昊天成命於是乎在顧眄閒雅望之如神氣調精靈括囊宇宙威範闕敬慈愛可親早任公卿聲望自重周齊王憲謂晉蕩公曰觀隋公神彩恐不為人臣晉公徐納其言将加不利頼大將軍矦壽因諌乃止憲及内史烏丸軌各奏周武帝云隋公氣調風流合散敬服竊聞世議慮不在人下武帝云此人頭額但宜為將不湏異意待之相者來和謂帝曰觀公骨法必為王者但願保愛聖躬道士張賔亦言公相是帝王名當圖籙龍飛紫極莫忘臣言帝憂懼謙退深自晦跡鄴城内學人陸撥大象初入長安謂所親曰周德已盡楊氏必興隋公徃自定州南行至鄴當時遥望擬為天子昨在路瞻仰定是不疑但未知如何而得後歲當來觀耳所親曰爾無輕言為貴人患害撥曰天之所命安可害也明年帝作相於内大象二年夏五月帝初拜揚州總管平晝寝息似睡若見數龍繞身其夜又夢一龍來入被内帝又常出長安城東獵馬上思懐在濟生民夜夢一長大人素服冠幘謂帝曰時未至及欲作相夢人云時今至矣天求民主丕顯孶至當晉蕩執國及建德之時君異則天臣非佐命猜嫌䜛慝何日云忘我皇外總方面入司文武具興王之表韞大聖之能或氣或雲䕃映於廊廟如天如日臨照於軒冕内明外順自險獲安豈非萬福扶持百禄攸集有周之末朝野騷然降志執鈞鎭衛宗社明神饗其德上帝付其民誅姦逆於九重行神化於四海於斯時也尉迥據有齊累世之都乘新國易亂之俗驅馳蛇豕連合縱横地乃九州陷三民則十分擁六王謙乘連率之威憑全蜀之險興兵舉象震蕩江山鴆毒巴庸蠶食秦楚此二虜也窮凶極逆非欲割洪溝之地閉劒閣之門皆将長㦸强弩睥睨宸極從漳河而逹負海連岱岳而距華陽迫脅荆蠻吐納江漢佐鬭嫁祸紛若蝟毛曝骨履腸間不容礪爾乃奉殪戎之命運先天之略不出户庭推轂分閫一麾以定三方數旬而清萬國蕩滌天壤之速規摹指畫之神造化以來弗之聞也光熈前緒罔有不服煙雲改色鐘石變音三靈顧望萬物影響木運告盡褰裳克讓天厯在躬推而弗有百辟庻尹四方岳牧稽圖䜟之文順億兆之請披肝瀝膽晝歌夜吟方屈箕潁之高式允幽明之願基命宥密如恒如升推帝居歆剏業垂綂殊徽號改服色建都邑叙彞倫薄賦輕徭愼刑恤獄除煩苛之政興清靜之風去無用之官省相監之職竒才間出盛德無隱星精雲氣共趨歩於堦墀山神海靈咸燮理於臺閣東漸日谷西被月川教曁北溟之表聲加南海之外悠悠沙漠區域萬里蠢蠢百蠻莫之與競五帝所不化三王所未賔屈膝頓顙盡為臣妾殊方異類書契不傳梯山越海貢琛奉贄欣欣如也巢居穴處化以宫室不火不粒訓以庖厨禮樂合天地之同律呂節寒暑之候制作詳垂衣之後淳粹得神農之前遨遊文雅之塲出入杳㝠之極合神謨鬼通幽洞㣲羣物歲成含生日用飲和氣以自得沐𤣥澤而不知也丹雀為使𤣥龜載書甘露自天醴泉出地神禽異獸珍木奇草望雲觀海應化歸風備休祥於圖牒罄幽遐而戻止猶且父天子民兢兢翼翼至矣大矣七十四帝曷可同年而語哉若夫天下之重不可妄據故唐之許由夏之伯益懷道立事人授而弗可也軒初四帝周餘六王藉世因基自取而不得也孟軻稱仲尼之德過於堯舜著述成帝者之事弟子稱王佐之才黒不代蒼泣麟歎鳯栖栖汲汲雖聖達而莫許也蚩尤則黄帝抗衡共工則黒帝勍敵項羽誅秦摧漢宰割神州角逐爭驅盡威力而無就也其餘歘起妖妄曽何足數賊子逆臣所以為亂皆由不識天道不悟人謀牽逐鹿之邪説謂飛鳬而為鼎若使四凶秉八元之誠三監同九臣之志韓信彭越深明帝子之符孫述隗囂妙識眞人之出尉迥同謳歌之類王謙比獄訟之民福禄蟬聮胡可窮也而違天逆物獲罪人神嗚呼此前事之大戒矣誅夷烹醢歷代共尤僭逆凶邪時煩獄吏其可不戒愼哉葢積惡既成心自絶於善道物類同感理必至於誅戮天奪其魄鬼惡其盈故也大帝聰明羣臣正直耳目監於率土賞罰㕘於國朝輔助一人覆育兆庻豈有食人之禄受人之榮包藏禍心而不殱盡者也必當執法未處其罪司命已除其籍自古明哲慮逺防㣲執一心持一德立功坐樹上書削藁位尊而心逾下禄厚而志彌約寵盛思之以懼道髙守之以恭克念於此則姦囘不至事乃畏天豈惟愛禮謙光滿覆義在知幾吉凶由人妖不自作衆星拱極在天成象夙沙則主雖愚蔽民盡知歸有苗則始為䟦扈終而大服漢南諸國見一面以從殷河西將軍率五郡以歸漢故能招信順之助保泰山之安彼陳國者盗竊江外民少一郡地減半州遇受命之主逢太平之日自可獻土銜璧乞同漙天乃復養䘮家之疹遵顚覆之軌趦趄吳越仍為匪民雖時屬大道偃兵舞鏚然國家當混一之運金陵是殄滅之期有命不恒斷可知矣防風之戮元龜匪遙孫皓之矦守株難得迷而未覺諒可愍焉斯故未辯𤣥天之心不聞君子之論也詩相逢狹路間天衢號九經冠葢恒縱横忽逢懷刺客相尋欲逐名我住河陽浦開門望帝城金臺逺猶出玉觀夜恒明筵羞大官膳酒釀歩兵營懸牀接髙士隔帳授諸生流水琴前韻飛塵歌後輕大子難為弟中子難為兄小子輕財利實見陶朱情龍軒照人轉驥馬噓天明入門俱有説至道勝金籯出門㑹親友天官奏德星大婦訓端木中婦訓劉靈小婦南山下擊缶和秦筝羣賔莫有戲燈來告絶纓從駕巡遊詩苑類選作許善心者非大夏堯遺俗汾河漢豫遊今隨龍駕往還屬鴈飛秋天行肅輦路日馭翼華輈朝乘六氣辨夕動七星旒谷静禽多思風髙松易秋逺林才有色遥水漫無流京華佳麗所目極與雲浮但覩凌霄觀詎見望仙樓鏁門皆秀發鴛池盡學優待君草封禪東山觀射牛從駕還京至仁文教逺惟聖武功宣太師觀六義諸侯問百年𤣥覧時乘隙訓旅次山川鎭象屯休氣華葢翼飛煙鼓奏千人響旗動七星連峻嶺戈迴日髙峰馬煦一作照天姑射神遊罷蕭關獵騎旋更待東山上看君巡狩篇夏日夏景多煩蒸山水暫追凉桐枝覆玉檻荷葉滿銀塘輕扇搖明月珍簟拂流黄壺盛仙客酒瓶貯帝臺漿才人下銅雀侍妓出明光歌聲越齊市舞曲冠平陽㣲風動羅帶薄汗染紅粧共欣陪宴賞千秋樂未央入山登嶺望重關腰珮且鳴環天河臨易飲月桂近將攀王母西山至夫人南嶽還何必陽臺下要待夢容顔詠松樹結根生上苑擢秀邇華池歳寒無改色年長有倒枝露自金盤灑風從玉樹吹寄言謝霜雪貞心自不移漢魏六朝百三家集巻一百十六
