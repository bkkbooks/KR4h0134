body:
  text: 漢魏六朝百三家集卷十二漢崔駰集題詞漢肅宗好崔亭伯文章稱於竇憲有真龍之目憲遂揖為上客自古文人遭時遇主未或無因而前趙良嬖人長卿狗監作合之始不辭汙泥亭伯以四頌結知天子躬親薦達貴臣曳履迎門其榮重亦百世一時也竇氏驕恣屢獻規誡忤意見疏樂浪小邑竟長甘肥遁披其文詞十過杜欽之説王鳳矣亭伯少與班傅齊名未遑仕進時或譏其玄靜乃作達旨以匹解嘲立言之致初若符節及其終也子雲抱恨於投閣亭伯成名於遼隂文之為文非言之難行之難也崔氏顯人西漢代有崔發諂事王莽官至司空崔篆羞之閉門滎陽重自傷悼而賦慰志言及建新其耻同於氓詩之垝垣復關也亭伯處士年少針刺貴戚翻然髙蹈無忝先子此之謂乎何必銘昆吾之鼎勒景襄之鐘然後名得意哉目録賦反都賦有序大將軍西征賦有序大將軍臨洛觀賦著述達旨書與竇憲書箋與竇憲箋又又針太尉諸針司徒針大理針虎賁中郎針河南尹針酒針銘仲山父鼎銘車左銘車右銘車後銘樽銘襪銘縫銘刀劎銘又刻漏銘六安枕銘扇銘頌上四巡頌表西巡頌有序南巡頌有序東巡頌北巡頌漢明帝頌北征頌杖頌議章帝諡議論博徒論又七七依雜文婚禮結言詩安封侯詩七言詩漢魏六朝百三家集卷十二目録欽定四庫全書漢魏六朝百三家集卷十二明張溥輯漢崔駰集賦反都賦有序漢厯中絶京師為墟光武受命始遷洛都客有陳西土之富云洛邑𥚹小故略陳禍敗之機不在險也建武龍興奮旅西驅虜赤睂討髙明斬銅馬破骨都收翡翠之駕據天下之圖上帝受命將昭其烈濳龍初九真人乃發上貫紫宫裴徊天闕掘狼狐蹈參伐陶以乾坤始分日月觀三代之餘烈察殷湯之遺風背崤函之固即周雒之中興四郊建三雍禪梁父封岱宗大將軍西征賦有序主簿駰言愚聞昔在上世義兵所克工歌其詩賢陳其頌書之庸器列在明堂所以顯武功也於是襲孟秋而西征跨雍梁而逺蹤陟隴阻之峻坂升天梯以髙翔旗旐翼如遊風羽毛紛其覆雲金光皓以奪目武鼓鏗而雷震大將軍臨洛觀賦濵曲洛而立觀營髙壤而作廬處崇顯以間敞超絶鄰而特居列阿閣以環匝表髙臺而起樓步輦道以周流臨軒楹以觀魚於是迎夏之首末春之垂桃枝夭夭楊栁猗猗既乃日垂卥陽中曜內光弛銜縱策逸如奔揚著述達旨或説已曰易稱備物致用可觀而有所合故能扶陽以出順隂而入春發其華秋收其實有始有極爰登其質今之韞櫝六經服膺道術厯世而遊髙談有日俯鉤深於重淵仰探逺乎九乾窮至賾於幽微測濳隱之無源然下不步卿相之廷上不登王公之門進不黨以讚已退不黷於庸人獨師友道德合符曩真抱景特立與士不羣蓋髙樹靡隂獨木不林隨時之宜道貴從凡於時太上運天德以君世憲王僚而布官臨雍泮以恢儒疏軒冕以崇賢率惇德以厲忠孝揚茂化以砥仁義選利器於良材求鏌鋣於明智不以此時攀台階窺紫闥據髙軒望朱闕夫欲千里而咫尺未發蒙竊惑焉故英人乘斯時也猶逸禽之赴深林虻蚋之趣大沛胡為默默而久沉滯也答曰有是言乎子茍欲勉我以世路不知其跌而失吾之度也古者隂陽始分天地初制皇綱亡緒帝紀乃設傳序厯數三代興滅昔大庭尚矣赫胥罔識淳朴散離人物錯乖髙辛攸降厥趣各違道無常稽與時張弛失仁為非得義為是君子通變各審所履故士或掩目而淵濳或盥耳而山棲或草耕而僅飽或木茹而長飢或重聘而不來或屢黜而不去或冒詢以干進或望色而斯舉或以役夫發夢於王公或以漁父見兆於元龜若夫紛繷塞路凶虐播流人有昏墊之厄主有疇咨之憂條垂藟蔓上下相求於是乎賢人授手援世之災跋涉赴俗急斯時也昔堯含戚而臯陶謨髙祖歎而子房慮禍不散而曹絳奮結不解而陳平權及其策合道從克亂弭衝乃將鏤玄圭册顯功銘昆吾之冶勒景襄之鍾與其有事則褰裳濡足冠挂不顧人溺不拯則非仁也當其無事則躐纓整襟規矩其步德讓不修則非忠也是以險則救俗平則守禮舉以公心不私其體今聖上之育斯人也朴以皇質雕以唐文六合怡怡比屋為仁一天下之衆異齊品類之萬殊參差同量壞冶一陶羣生得理庶績其凝家家有以樂和人人有以自優威械藏而爼豆布六典陳而九刑厝濟兹兆庶出於平易之路雖有力牧之略尚父之厲伊皋不論奚事范蔡夫廣厦成而茂木暢逺求存而良馬縶隂事終而水宿藏場功畢而大火入方斯之際處士山積學者川流衣裳被宇冠蓋雲浮譬猶衡陽之林岱隂之麓伐尋抱不為之稀藝拱把不為之數悠悠罔極亦各有得彼採其華我收其實舍之則藏已所學也故進動以道則不辭執圭而秉柱國復靜以理則甘糟粳而安藜藿夫君子非不欲仕也恥夸毗以求舉非不欲室也惡登牆而摟處呌呼衒鬻縣旌自表非隨和之寶也暴智耀世因以干祿非仲尼之道也遊不倫黨茍以徇已汗血競時利合而友子笑我之沉滯吾亦病子屑屑而不已也先人有則而我弗虧行有枉徑而我非隨臧否在豫唯世所議固將因天質之自然誦上哲之高訓詠太平之清風行天下之至順懼吾躬之穢德勤百畝之不耘縶余馬以安行俟性命之所存昔孔子起威於夾谷晏嬰發勇於崔杼曹劌舉節於柯盟卞嚴克捷於強禦范蠡錯藝於會稽伍員樹功於柏舉魯連辨言以退燕包胥單辭而存楚唐且華顛以悟秦甘羅童牙而報趙原衰見廉於壺食宣孟收德於束脯吳札結信於丘木展季效貞於門女顔回明仁於度轂程嬰顯義於趙武僕誠不能編德於數者竊慕古人之所序華嶠書曰駰譏揚雄以為范蔡鄒衍之徒乘釁相傾誑曜諸侯者也而云彼我異時又曰竊資卓氏割炙細君斯皆士之贅行而云不能與此數公者同以為失類而改之也書與竇憲書駰聞交淺而言深者愚也在賤而望貴者惑也未信而納忠者謗也皆所不宜而或蹈之者思效其區區憤盈而不能已也竊見足下體純淑之姿躬髙明之量意美志厲有上賢之風駰幸得充下館序後陳是以竭其拳拳敢進一言傳曰生而富者驕生而貴者傲生富貴而能不驕傲者未之有也今寵祿初隆百僚觀行當堯舜之盛世處光華之顯時豈可不庶幾夙夜以永衆譽𢎞申伯之美致周召之事乎語曰不患無位患所以立昔馮野王以外戚居位稱為賢臣近隂衛尉克已復禮終受多福郯氏之宗非不尊也陽侯之族非不盛也重侯纍將建天樞執斗柄其所以獲譏於時垂愆於後者何也蓋在滿而不挹位有餘而仁不足也漢興以後迄於哀平外家二十保族全身四人而已書曰鑒于有殷可不慎哉竇氏之興肇自孝文二君淳淑守道成名先日安豐以佐命著德顯自中興內以忠誠自固外以法度自守卒享祚國垂祉於今夫謙德之光周易所美滿溢之位道家所戒故君子福大而愈懼位隆而益恭逺察近覽俯仰有則銘諸几杖刻諸盤杅兢兢業業無殆無荒如此則百福是荷慶流無窮矣箋與竇憲箋主簿崔駰言今旦漢陽太守稜吏卒數十人皆臂鷹牽狗陳於道側云欲上幕府駰聞傳曰禽獸之皮不足以備器用其肉不可以將獻養則公不舉焉禮公侯非麋兕射且以服猛為民除害因以登臨器械也故晉唐叔射兕於徒林以為大甲夫鷹犬所獲不過雉而有厯險阻之難斯乃細人匹夫之事非王侯大人所為要資也駰幸得充下館序在衆賢後乘是以竭其惓惓敢進一言北堂書鈔載箋云主簿職在拾遺夙夜致思智慮淺短何益也文選注載奏記云珥筆持牘拜謁曹下與竇憲箋南單于請兵北伐拜憲車騎將軍金印紫綬官屬依司空君侯以野幕為府前世封青故事也與竇憲箋將軍窮絶天阻萬里長途針太尉諸針天官冡宰庶僚之率師錫有帝命虞作尉爰叶台極妥平國域制軍詰禁王旅惟式九州用綏羣公咸治干戈載戢宿纒其紀上之云據下之云戴茍非其人斁我帝載昔周人思文公而召南詠甘棠昆吾隆夏伊摯盛商季世頗僻禮用不匡無曰我強莫余敢喪無曰我大輕戰好殺紂師百萬卒以不艾宰臣司馬敢告在際司徒針天監在下仁德是興乃立司徒亂兹黎蒸茫茫庶域率土祁祁民具爾瞻四方是維乾乾夕惕靡怠靡違恪恭爾職以勤王機敬敷五教九德咸事嗇人用章黔氓是富無曰余恃忘余爾輔無曰余聖以忽執政匪用其良乃荒厥命庶績不怡疚于爾祿豐其折右而鼎覆其餗書歌股肱詩刺南山尹氏不堪國度斯愆徒臣司衆敢告執藩大理針邈矣皋陶翊唐作士設為犴狴九刑允理如石之平如淵之清三槐九棘以質以聽罪人斯殛凶旅斯并熙乂帝載旁施作明昔在仲尼哀矜聖人子罕禮刑衛人釋艱釋之其忠勳亮孝文于公哀寡定國廣門敻哉邈矣舊訓不遵主慢臣驕虐用其民賞以崇欲刑以肆忿紂作炮烙周人滅殷夏用淫刑湯誓其軍衛鞅酷烈卒殞于秦不疑加害禍不反身嗟茲大理慎于爾官賞不可不思斷不可不虔或有忠能被害或有孝而見殘吳沉伍胥殷割比干莫遂爾情是截是刑無遂爾心以速以殛天鑒在顏無細不録福善災惡其效甚速理臣思律敢告執獄虎賁中郎針赫矣帝臣爰奮厥武桓桓征夫矯矯其旅王師是成戎事是禦惟鳥之鶡惟霆之發出翼王路入司階闥功成間邪憂其萌孽河南尹針御覽作揚雄誤西漢無河南尹茫茫天區畫冀為京商邑翼翼四方是營唐虞商周河洛是居成王郟鄏以處鶉墟諸夏徑強是從是橫徹我牆屋而師尹不匡霸奪其權宗器以分圖籍遷齊九鼎入秦爰作卿士以尹王州風化攸興萬國承流爰作四句太平御覽案入秦下有闕句一作之經酒針豐侯沉酒荷罌負缶自戮於世圖形戒後銘仲山父鼎銘鼎耳革其行塞雉膏不食方雨虧悔終吉有福足勝其任公餗乃珍於髙思危在滿戒溢可以永年天之大律車左銘三銘古文苑作傅毅虞夏作車取象璣衡君子建左法天之陽正位受綏車不內顧塵不出軌鸞以節步彼言不疾彼指不躬玄覽于道永思厥中夏文苑作氏車右銘擇御卜右採德用良詢納耆老于我是匡惟賢是師惟道是式針闕旅賁內顧自敕匪皇其度匪愆其則越戒敦儉禮以華國儉文苑作約車後銘敬其在路體貌思恭望衡顧轂允慎兹容無或好失匪盤于遊顧省厥遺虎尾斯求昭德塞違抑盈以無雖有三晉欿然若虛失音逸樽銘惟嵗之元朝賀奉樽金罍犧象嘉禮具存獻酬交錯萬圀咸歡圀古國字襪銘機衡建子萬物含滋黃鍾育化以養元基長履景福至于億年皇靈既祐祉祿來臻本枝萬世子子孫孫縫銘惟嵗之始承天嘉德皇靈闕願闕國絲綏克贄以闕朝迪刀劎銘歐冶運巧鑄鋒成鍔麟角鳳體玉飾金錯又龍淵太阿干將莫邪帶以自禦燁燁吐花刻漏銘天德順動人以立信乃作斯策以咸渥潤封傳今覽爰暨四極六安枕銘言六面皆安也枕有規矩恭一其德承元寧躬終始不忒扇銘有圓者扇誕此秀儀晞露散霾擬日定規朗姿玉暢惠風時披頌上四巡頌表臣聞陽氣發而鶬鶊鳴秋風厲而蟋蟀吟氣之動也唐虞之世樵夫牧豎擊轅中韶感于和也臣不知手足之動音聲敢獻頌云西巡頌有序惟永平三年八月已丑行幸河東志曰君舉必書是故工歌其詩史立春秋若夫聲管不發雅頌罔記惟秋榖既登上將省斂平秩西成巡畿于西郊因斯萬物凝德緩俗昔既春遊今乃秋稼南巡頌有序建初九年秋榖始登猶斯嘉時舉先王之大禮假于章陵遂南巡楚路臨江川以望衡山顧九嶷嘆虞舜之風是時庶績咸熙罔可黜陟惟休蒸之鴻德允天覆而無遺壯雲行之博惠淑雨施於庶黎東巡頌元和二年章帝東巡狩一作傅毅伊漢中興三葉於皇惟烈允迪厥倫矩坤度以範物規乾則以陶鈞於是考上帝以質中總列宿於北辰開太微敞禁庭延儒林以咨詢岱嶽之事于時典司耆耉載華抱實逌爾而造曰盛哉大漢既重雍而襲熙世增其德唯斯嶽禮久而不修此神人之所慶幸海內之所想思頌有喬山之征典有徂嶽之巡時邁其邦民斯攸勤不亦宜哉乃命太僕訓六騶間路馬戒師徒於是乘輿登天靈之威路駕太一之象車升九龍之華旗建掃霓之旌旄裒胡耉之元老賞孝行之畯農闕三軍霆激羽騎火烈天動雷霆隱隱轔轔登天靈之威輅駕太乙之象車躬東作之上務始八正於南行古文苑厥倫下有纘王命胤漢興句民作人訓作馴騶作轡北巡頌有序元和三年正月上既畢郊祀之事乃東巡出于河內納青兖之郊回冀州禮北嶽聖澤流浹黎元被德嘉瑞並集乃作頌曰禋潔享祈歆嘗百神爰始賦政授務于人雍容清廟謐爾無虞垂拱穆穆神行化馳闕登中山闕天帝觀神農將省陽榖相天功巡東作漢明帝頌帝乃負扆執胄覆圭運斗杓以酬酢酌酒旗之玉巵北征頌人事協兮皇恩得金精揚兮水靈伏順天機兮把刑德戈所指兮罔不剋杖頌爰植根於湘浦承雷夏之洪澤寓浮雲而貽我合天生之質直用以為杖飾以犀角王母扶持永保百祿壽如南極子孫千億議章帝諡議臣聞號者功之表諡者行之迹據德録功各當其實孝經曰天地明察神明章矣論博徒論博徒見農夫戴笠持耨以藝蓼荼面色驪黑手足胼胝膚如桑朴足如熊蹄蒲望壠畝汗出調泥乃謂曰子觸熱耕耘背上生鹽脛如燒椽皮如領革錐不能穿行步狼跋蹄戾脛酸謂子草木支體屈伸謂子禽獸形容似人何受命之薄稟性不純又牛臛羊膾炙鴈煮鳬雞寒狗熱重案滿盈闕適逢長史撫綏于車蒸羔炮鱉飪鵠煎魚但到酒罏不醉無歸七七依客曰乃導玄山之粱不周之稻礱以絺綌砥以柔韋洞庭之鮒灌水之鰩滋以陽朴之薑蔌以壽木之華鹺以大夏之壃酢以越裳之梅反宇垂阿洞門金鋪丹柱雕楹飛閣層樓於是置酒乎宴遊之堂張樂乎長娛之臺酒酣樂中美人進以承晏調歡欣以解容回顧百萬一笑千金振飛縠以長舞袖裊細腰以務抑揚當此之時孔子傾於阿谷栁下忽而更婚老聃遺其虛靜揚雄失其太玄此天下之逸豫宴樂之至盤也公子豈能興乎客曰彭蠡之鳥萬萬而羣荆山之獸億億而屯雲合風散隱隱震震乃命長狄使驅獸夷羿作虞人騰句喙以追飛騁韓盧以逐奔弓彈交錯把弧弦彎繁弱鼓千鈞死獸籍聚如山選取上鮮獻之庖人雜文婚禮結言乾坤其德恆久不已爰定天綱夫婦作始乃降英媛有淑其儀姬薑是侔比則姚媯載納嘉贄申結鞶褵詩安封侯詩戎馬鳴兮金鼓震壯士激兮忘身命被光甲兮跨良馬揮長戟兮彀強弩彀藝文作廓七言詩鸞鳥髙翔時來儀應治歸德合望規啄食竹實飲華池漢魏六朝百三家集卷十二
