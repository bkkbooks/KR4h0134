body:
  text: 漢魏六朝百三家集卷二十四魏文帝集題詞曹子桓生長戎旅之間善騎馬左右射又工擊劔彈碁伎能戲弄不減若父其詩歌文辭倣佛上下即不堪弟畜陳思為孟德大兒固有餘也魏王帝業無足稱惟令宦人為官不得過諸署令詔羣臣家不得奏事大后后族家不得當輔政任石室金策可寶萬世彼親見漢室炎隆女主中人手撲滅之麥秀黍離恫傷心目霸朝初創力更舊轍至待山陽公以不死禮遇漢老臣楊彪不奪其志盛德之事非孟德可及當日符命獻諛璽綬被躬羣衆推奉時與勢迫倘建安君臣有能為武庚比干者或觀望却步竟保常節未可知也典論自序善述生平論文一篇直自言所得與王朗書務立不朽於著述間不肯以七尺一棺畢其生死雅慕漢文沒而得諡良云厚幸占其志趣亦古諸侯之博聞者也甄后塘上陳王豆歌損德非一崇華首陽有餘恨焉目録賦浮淮賦有序滄海賦濟川賦臨渦賦有序述征賦校獵賦又又登臺賦有序登城賦感物賦有序感離賦有序離居賦戒盈賦有序永思賦悼夭賦有序寡婦賦有序出婦賦愁霖賦喜霽賦彈棊賦又瑪瑙勒賦有序車渠碗賦有序迷迭賦有序玉玦賦柳賦有序槐賦有序鶯賦有序迷迭香賦有序蔡伯喈女賦有序賦闕詔定正朔詔追崇孔子詔為漢帝置守冢詔息兵詔災異免策三公詔拜日東郊詔禁母后預政詔改封諸王為縣王詔鵜鶘集靈芝池詔取士不限年詔輕刑詔平準詔禁復讐詔禁淫祀詔罷墓祭詔外國遣使奉獻詔營夀陵詔與羣臣詔四首下潁川詔增封中牟侯彰詔答臨淄侯植詔答北海王衮詔待楊彪客禮詔賜華歆詔論孫權詔以陳羣為鎮軍司馬懿為撫軍詔王朗等三公詔與王朗詔報王朗詔答蔣濟詔與夏侯尚詔報何夔詔與于禁詔于禁復官詔追贈夏侯尚詔封朱靈歈侯詔與張郃詔答孟達詔手報司馬芝詔封張遼李典子為關內侯詔以李通子基為中郎將詔賜張既子翁歸為關內侯詔賜溫恢子生爵關內侯詔以張登為大官令詔制詔三公服色如奏詔改雒為洛詔曹植貶封安鄉侯詔誅鮑勛詔復以蔣濟為東中郎將詔賜桓階詔劉靖遷廬江太守詔張既為涼州詔與張既詔褒田豫詔追諡杜畿詔與羣臣詔又詔司馬懿令向化手令答許芝上代漢圖讖令答辛毗等令答司馬懿等令答劉廙劉曄等令讓禪令讓禪第二令讓禪第三令答劉廙等令答蘇林等令答華歆等令又答相國歆等令薄稅令復樵租稅令以鄭稱為武德傳令廣詢令問雍州刺史張既令拜毛玠等子男為郎中令收斂戰亡士卒令䇿追封鄧公策諡龎德策策孫權九錫文以孫登為東中郎封侯策教答卞蘭教表讓禪表讓禪第二表讓禪第三表書與吳質書又又與鍾繇謝玉玦書與鍾繇五熟釡與鍾繇書答鍾繇書答繁欽書啁劉楨書答友人書與吳監書與羣臣論蜀錦書與羣臣論被服書與朝臣論粳稻書報崔琰書與曹洪書與王朗書五首與劉曄書與諸將書報吳王孫權書四首與孟達書二首答曹洪書戒鄢陵侯彰書答楊修書送劒書説諸物序典論自序繁欽集序陳琳集序建安諸序論典論論文典論論方術周成漢昭論漢文帝論漢武帝論交友論議田疇辭封議連珠連珠三首銘露陌刀銘賜鍾繇五熟釡銘文即位告天文哀策文武帝哀䇿文誄弟蒼舒誄制終制漢魏六朝百三家集卷二十四目録欽定四庫全書漢魏六朝百三家集卷二十四明張溥輯魏文帝集賦浮淮賦有序建安十四年王師自譙東征大興水軍泛舟萬艘時豫從行始入淮口行泊東山覩師徒觀旌帆赫哉盛矣雖孝武盛唐之狩舳艫千里殆不過也乃作斯賦云沂淮水而南邁兮泛洪濤之湟波仰嵓岡之崇阻兮經東山之曲阿浮飛舟之萬艘兮建干將之銛戈揚雲旗之繽紛兮聆榜人之歡譁乃撞金鐘爰伐雷鼓白旄沖天黃鉞扈扈武將奮發驍騎赫怒於是驚風泛涌波駭衆帆張羣棹起爭先逐進莫適相待滄海賦美百川之獨宗壯滄海之威神經扶桑而遐逝跨天涯而託身驚濤暴駭騰聊澎湃鏗訇隱潾涌沸凌邁於是黿鼉漸離泛濫淫遊鴻鸞孔鵠哀鳴相求揚鱗濯翼載沉載浮仰唼芳芝俯潄清流巨魚橫奔厥勢吞舟爾乃釣大貝採明珠搴懸黎收武夫窺大麓之濳林覩瑤木之羅生上蹇産以交錯下來風之泠泠振緑葉以葳㽔吐芬葩而揚榮濟川賦臨濟川之層淮覽洪波之容裔濞騰揚以相薄激長風而亟逝漫浩汗而難測眇不覩其垠際於是龜龍神嬉鴻鸞羣翔鱗介霍驛載止載行俯唼菁藻仰餐若芳永號長吟延首相望美玉昭晰以曜暉明珠灼灼而流光於是遊覽既厭日亦西傾朱旗電曜擊鼓雷鳴長驅風厲悠爾北征思魏都以偃息託華屋而遨遊酌玄清于金罍騰羽觴以獻酬臨渦賦建安八年至譙余兄弟從上拜墳墓遂乘馬遊觀經東園遵渦水相佯乎高樹之下駐馬書鞭作臨渦之賦曰蔭高樹兮臨曲阿微風起兮水增波魚頡頏兮鳥逶迤雌雄鳴兮聲相和䓑藻生兮散莖柯春木繁兮發丹華述征賦建安十三年荆楚傲而弗臣命元司以簡旅豫願奮武乎南鄴伐靈鼓之硼隱兮建長旗之飄颻躍甲卒之皓旰兮馳萬騎之瀏瀏揚凱悌之豐惠兮仰乾威之靈武伊皇衢之遐通兮維天網之畢舉經南野之舊都聊弭節而容與遵往初之舊迹順歸風以長邁鎮江漢之遺民靜南畿之遐裔校獵賦披高門而方軌邁夷途而直駕長鎩糾電飛旗拂天部曲按列什伍相連峙如叢林動若奔山超崇岸之曾崖厲障澨之雙川列翠星陳戎車方轂風回雲轉埃連飈屬雷響震天地譟聲蕩山嶽遂躪封豨籍麈鹿捎飛鳶接鸑鷟聚者成丘陵散者填溪谷流血赫其丹野羽毛紛其翳目考功效績斑賜有敘分授甘炮飛酌清酤割鮮野享舉爵鳴鼓鑾輿促節騁轡回翔望雀臺而增舉涉幽塹之花梁又扽沖天之素旄兮靡格澤之修旃雄戟趪音皇而躍厲兮黃鉞扈而楊鮮又千乘亂擾萬騎奔走經營原隰騰越峻岨彤弓斯彀戈鋋具舉登臺賦建安十七年春遊西園登銅雀臺命余兄弟並作其詞曰登高臺以騁望好靈雀之麗􅈺飛閣崛其特起層樓儼以承天步逍遙以容與聊遊目於西山溪谷紆以交錯草木鬱其相連風飄飄而吹衣鳥飛鳴而過前申躊躇以周覽臨城隅之通川登城賦孟春之月惟歲權輿和風初暢有穆其舒駕言東道陟彼城樓逍遙逺望乃欣以娛平原博敞中田闢除嘉麥被壟緣路帶衢流莖散葉列倚相扶水幡幡其長流魚裔裔而東馳風飄颻而既臻日掩薆而卥移望舊館而言旋永優遊而無為感物賦喪亂以來天下城郭丘墟惟從太僕君宅尚在南征荆州還過鄉里舍焉乃種諸蔗於中庭涉夏厯秋先盛後衰悟興廢之無常慨然永歎乃作斯賦伊陽春之散節悟乾坤之交靈瞻玄雲之蓊鬱仰沉陰之杳冥降甘雨之豐霈垂長溜之泠泠掘中堂而為圃植諸蔗於前庭涉炎夏而既盈迄凛秋而將衰豈在斯之獨然信人物其有之感離賦有序建安十六年上西征余居守老母諸弟皆從不勝思慕乃作賦曰秋風動兮大氣涼居常不快兮中心傷出北園兮倣徨望衆墓兮成行柯條􅉃兮無色緑草變兮萎黃感微霜兮零落隨風雨兮飛揚日薄暮兮無悰思不衰兮愈多招延佇兮良久忽踟蹰兮忘家離居賦惟離居之可悲廓獨處於空牀愁耿耿而不寐厯冬夜之悠長驚風厲於閨闥忽增激於中房動帷裳之暗曖彼明燭之無光戒盈賦有序避暑東閣延賓高會酒酣樂作悵然懷盈滿之戒乃作斯賦惟應龍之將舉飛雲降而下征資物類之相感信貫徹之通靈何今日之延賓君子紛其集庭信臨高而增懼獨處滿而懷愁願羣士之針規博納我以良謀永思賦仰北辰而永思沂悲風以增傷哀遐路之漫漫痛長河之無梁願託乘於浮雲嗟逝速之難當悼夭賦有序族弟文仲亡時年十一母氏傷其夭逝追悼無巳余以宗族之愛乃作斯賦氣紆結以填胸不知涕之縱橫時徘徊於舊處覩靈衣之在床感遺物之如故痛爾身之獨亡愁端坐而無聊心戚戚而不寧步廣厦而踟蹰覽萱草於中庭悲風蕭其夜起秋氣􅉃以厲情仰瞻天而太息聞别鳥之哀鳴寡婦賦有序陳留阮元瑜早亡每感存其遺孤未嘗不愴然傷心故作斯賦惟生民兮艱危於孤寡兮常悲人皆處兮歡樂我獨怨兮無依撫遺孤兮太息俯哀傷兮告誰三辰周兮遞照寒暑運兮代臻厯夏日兮苦長涉秋夜兮漫漫後霜隕兮集庭燕雀飛兮吾前去秋兮就冬改節兮時寒水凝兮成冰雪落兮翻翻傷薄命兮寡獨內惆悵兮自憐出婦賦念在昔之恩好似比翼之相親惟方今之疏絶若驚風之吹塵夫色衰而愛絶信古今其有之傷煢獨之無恃恨後嗣之不滋甘沒身而同穴終百年之常期信無子而應出自典禮之常度悲谷風之不答怨昔人之忽故被入門之初服出登車而就路遵長塗而南邁馬躊躇而回顧野鳥鎩而高飛愴哀鳴而相慕撫騑服而展節即臨沂之舊城踐麋鹿之曲蹊聽百鳥之羣鳴情悵恨而顧望心鬱結其不平愁霖賦脂余車而秣馬將言旋乎鄴都玄雲黯其四塞雨濛濛而襲豫塗漸洳以流滯潦淫衍而橫湍豈在余之憚勞哀行旅之艱難仰皇天而太息悲白日之不暘思若木以照路假龍燭之末光喜霽賦乃命駕而言歸啓吉日而北巡厭羣萌之至願感上下之明神密雲興之坱圠甘雨降以灑塵既灑塵而為塗惟平路之未晞激清風以漂潦發皎日之陽暉振余策而長驅忽臨食而忘飢彈棊賦惟彈棊之嘉巧邈超絶其無儔苞上智之𢎞略允貫微而洞幽局則荆山妙璞發藻揚暉豐腹高隆庳根四頺平如砥礪滑若柔荑棊則玄木北幹素樹西枝洪纖若一修短無差象籌列植一據雙螭滑石霧散雲布四垂然後直扣先縱二八次舉緣邊間造長斜迭取爾乃詳觀夫變化之理屈伸之形聯翩靃繹展轉盤縈或暇豫安存或窮困側傾或接黨連興或孤據偏停于時觀者莫不虛心竦踊咸側席而延佇或雷抃以大喙或戰悸而不能語又文石為局金碧齊精隆中夷外理緻肌平瑪瑙勒賦有序瑪瑙玉屬也出自西域文理交錯有似馬腦故其方人因以名之或以繫頸或以飾勒余有斯勒美而賦之命陳琳王粲並作辭曰有竒章之珍物寄中山之崇岡稟金德之靈施含白虎之華章扇朔方之玄氣喜南離之焱陽歙中區之黃采曜東夏之純蒼苞五色之明麗配皎日之流光命夫良工是剖是鐫追形逐好從宜索便乃加砥礪刻方為圓沈光內灼浮景外鮮繁文縟藻交采接連嘉鏤錫之盛美感戎馬之首飾固兹物之攸宜信君子之所服爾乃藉彼朱罽華勒用成駢居列跱煥若羅星北堂誤截數語蒙作陳琳今合藝文御覽正之車渠碗賦有序車渠玉屬也多纖理縟文生於西國其俗寶之惟二儀之普育何萬物之殊形料珍怪之上美無兹碗之獨靈苞華文之光麗發符采而揚榮理交錯以連屬似將離而復并或若朝雲浮高山忽似飛鳥厲蒼天夫其方者如矩圓者如規稠希不謬洪纖有宜玉玦賦有昆山之妙璞産曾城之峻崕嗽丹水之炎波蔭瑤樹之玄枝包黃中之純氣抱虛靜而無為應九德之淑懿體五材之表儀栁賦有序昔建安五年上與袁紹戰於官渡時余始植斯栁自彼迄今十有五載矣感物傷懷乃作斯賦曰伊中域之偉木兮瑰􅐾妙其可珍稟靈祇之篤施兮與造化乎相因四時邁而代運兮去冬節而涉春彼庶卉之未動兮固肇萌而先辰盛德遷而南移兮星鳥正而司分應隆時而繁育兮揚翠葉之青純修幹偃蹇以虹指兮柔條阿那而蛇伸上扶疏而施散兮下交錯而龍鱗在余年之二七植斯栁乎中庭始圍寸而高尺今連拱而九成嗟日月之逝邁忽亹亹以遄征昔周遊而處此今倐忽而弗形感遺物而懷故俯惆悵以傷情於是曜靈次乎鶉首兮景風扇而增暖豐𢎞陰而博覆兮躬愷悌而弗倦駟馬望而傾蓋兮行旅仰而回眷秉至德而不伐兮豈簡卑而擇賤含精靈而寄生兮保休體之豐衍惟尺斷而能植兮信永貞而可羡槐賦有序文昌殿中槐樹盛暑之時余數遊其下美而賦之王粲直登賢門小閣外亦有槐樹乃就使賦曰有大邦之美樹惟令質之可嘉托靈根於豐壤被日月之光華周長廊而開趾夾通門而駢羅承文昌之邃宇望迎風之曲阿修幹紛其璀錯緑葉萋而重陰上幽藹而雲覆下莖立而擢心伊暮春之既替即首夏之初期鴻鴈遊而送節凱風翔而迎時天清和而溫潤氣恬淡以安治違隆暑而適體誰謂此之不怡鶯賦有序堂前有籠鶯晨夜哀鳴悽若有懷憐而賦之曰怨羅人之我困痛密網而在身顧窮悲而無告知時命之將泯升華堂而進御奉明后之威神唯今日之僥幸得去死而就生託幽籠以栖息厲清風而哀鳴迷迭香賦有序余種迷迭于中庭嘉其揚條吐香馥有令芳乃為之賦曰生中堂以遊觀兮覽芳草之樹庭重妙葉於纖枝兮揚修幹而結莖承靈露以潤根兮嘉日月而敷榮隨回風以搖動兮吐芬氣之穆清薄西夷之穢俗兮越萬里而來征豈衆卉之足方兮信希世而特生蔡伯喈女賦序家公與蔡伯喈有管鮑之好乃命使者周近持玄璧于胸奴贖其女還以妻屯田郡都命使者詔定正朔詔孔子稱行夏之時乘殷之輅服周之冕樂則韶舞此聖人集羣代之美事為後王制法也傳曰夏數為得天朕承唐虞之美至於正朔當依虞夏故事若殊徽號異器械制禮樂易服色用牲幣自當隨上德之數每四時之季月服五十八日臘以丑牲用帛其飾節旄自當赤但節幡黃耳其餘郊祀天地朝會四時之服宜如漢制宗廟所服一如周禮追崇孔子詔昔仲尼資大聖之才懷帝王之器當衰周之末無受命之運在魯衛之朝教化乎洙泗之上悽悽焉遑遑焉欲屈已以存道貶身以救世於時王公終莫能用之乃退考五代之禮修素王之事因魯史而制春秋就太師而正雅頌俾千載之後莫不宗其文以述作仰其聖以成謀咨可謂命世之大聖億載之師表者也遭天下大亂百祀墮壞舊居之廟毁而不修褒成之後絶而莫繼闕里不聞講頌之聲四時不覩蒸嘗之位斯豈所謂崇禮報功盛德百世必祀者哉其以議郎孔羡為宗聖侯邑百户奉孔子祀令魯郡修起舊廟置百户吏卒以守衛之又於其外廣為屋室以居學者為漢帝置守塜詔朕承符運受終革命其敬事山陽公如舜之宗堯有始有卒傳之無窮前羣司奏處正朔欲使一皆從魏制意所不安其令山陽公於其國中正朔服色祭祀禮樂自如漢典又為武昭宣明帝置守塜各三百家息兵詔孫權殘害民物朕以寇不可長故分命猛將三道並征今征東諸軍與權黨呂範等水戰則斬首四萬獲船萬艘大司馬據守濡須其所禽獲亦以萬數中軍征南攻圍江陵左將軍張郃等舳艫直渡擊其南渚賊赴水溺死者數千人又為地道攻城城中外雀鼠不得出入此几上肉耳而賊中癘氣疾病夾江塗地恐相染汚昔周武伐殷旋師孟津漢祖征隗囂還軍高平皆知天時而度賊情也且成湯解三面之網天下歸仁今開江陵之圍以綏成死之禽且休力役罷省繇戍畜養士民咸使安息災異免策三公詔災異之作以譴元首而歸過股肱豈禹湯罪已之義乎其令百官各虔厥職後有天地之眚勿復劾三公拜日東郊詔漢氏不拜日於東郊而旦夕常於殿下東面拜日煩褻似家人之事非事天郊神之道也禁母后預政詔夫婦人與政亂之本也自今以後羣臣不得奏事太后后族之家不得當輔政之任又不得橫受茅土之爵以此詔傳後世若有背違天下共誅之改封諸王為縣王詔先王建國隨時而制漢祖增秦所置郡至光武以天下損耗并省郡縣以今比之益不及焉其改封諸王皆為縣王鵜鶘集靈芝池詔此詩人所謂汙澤也曹詩刺恭公逺君子而近小人今豈有賢智之士處於下位者乎否則斯鳥何為而至其博舉天下雋德茂才獨行君子以答曹人之刺取士不限年詔今之計考古之貢士也十室之邑必有忠信若限年然後取士是吕尚周晉不顯於前世也其令郡國所選勿拘老幼儒通經術吏達文法到皆試用有司糾故不以實者輕刑詔近之不綏何逺之懷今事多而民少上下相弊以文法百姓無所措其手足昔太山之哭者以為苛政甚於猛虎吾備儒者之風服聖人之遺教豈可以目玩其辭行違其誡者哉廣議輕刑以惠百姓平準詔今與孫驃騎和通商旅當日月而至而百賈偷利喜賤其物平價又與其絹故官逆為平準耳宜豈少此物輩耶禁復讎詔喪亂以來兵革縱橫天下之人多相殘害者昔田橫殺酈商之兄張步害伏湛之子漢氏二祖下詔使不得相讎今兵戎始息宇內初定民之存者非流亡之孤則鋒刃之餘當相親愛養老長幼自今以後宿有讎怨者皆不得相讎禁淫祀詔先王制禮所以昭孝事祖大則郊社其次宗廟三辰五行名山大川非此族也不在祀典叔世衰亂崇信巫史至乃宫殿之內户牖之間無不沃酹甚矣其惑也自今其敢設非祀之祭巫祝之言皆以執左道論著於令典罷墓祭詔先帝躬履節儉遺詔省約子以述父為孝臣以繫事為忠古不墓祭皆設於廟高陵上殿屋皆毁壞車馬還廏衣服藏府以從先帝儉德之志外國遣使奉獻詔西戎即敘氐羌來王詩書美之頃者西域並欵塞內附其遣使者撫勞之與羣臣詔南方龍眼荔枝寧比西國蒲萄石蜜乎酢且不如中國凡棗味莫若安邑御棗也又真定郡梨大若拳甘若蜜脆若凌可以解煩釋渴又前于闐王山習所上孔雀尾萬枚文彩五色以為金根車蓋遙望曜人眼又新城孟太守道蜀肫羊雞鶩味皆淡故蜀人作食喜著飴蜜下潁川詔潁川先帝所由起兵征伐也官渡之役四方瓦解逺近顧望而此郡守義丁壯荷戈老弱負糧昔漢祖以秦中為國本光武恃河內為王基今朕復於此登壇受禪天以此郡翼成大魏增封中牟侯彰詔先王之道庸勳親親並建母弟開國承家故能藩屏大宗禦侮厭難彰前受命北伐清定朔土厥功茂焉增邑五千并前萬户答臨淄侯植詔植表欲祭先王操於北河之上博士鹿優韓益等以為禮公子不得稱先君公子之子不得祖諸侯謂不得立廟而祭也禮又曰庶子不得祭宗廟遂詔答之得月二十八日表知侯推情欲祭先王於河上覽省上下悲傷感切將欲遣禮以紆侯敬恭之意會博士鹿優等奏禮如此故寫以示開國承家顧迫禮制惟侯存心與吾同之答北海王衮詔黃初三年黃龍見鄴西漳水衮上書贊誦賜黃金十斤詔答昔唐叔歸禾東平獻頌斯皆骨肉贊美以彰懿親王研精墳典耽味道直文雅煥炳朕甚嘉之王其克慎明德以終令問待楊彪客禮詔夫先王制几杖之賜所以賓禮黃耉褒崇元老也昔孔光卓茂皆以淑德高年受兹嘉賜公故漢宰臣乃祖已來世著名節年過七十行不踰矩可謂老成人矣所宜寵異以章舊德其賜公延年杖及馮几謁請之日便使杖入又可使著鹿皮冠賜華歆詔司徒國之俊老所與和陰陽理庶事也今大官重膳而司徒蔬食甚無謂也特賜御衣及為其妻子男女皆作衣服論孫權詔權前對浩周自陳不敢自逺樂委質長為外臣又前後辭旨頭尾擊地此鼠子自知不能保爾許地也又今與周書請以十二月遣子復欲遣孫長緒張子布隨子俱來彼二人皆權股肱心腹也又欲為子於京師求婦此權無異心之明效也以陳羣為鎮軍司馬懿為撫軍詔昔軒轅建四面之號周武稱豫有亂臣十人斯蓋先聖所以體國君民亮成天工多賢為貴也今內有公卿以鎮京師外設牧伯以監四方至於元戎出征則軍中宜有柱石之賢帥輜重所在又宜有鎮守之重臣然後車駕可以周行天下無內外之慮吾今當征賊欲守之積年其以尚書令潁鄉侯陳羣為鎮軍大將軍尚書僕射西鄉侯司馬懿為撫軍大將軍若吾臨江授諸將方略則撫軍當留許昌督後諸軍録後臺文書事鎮軍隨車駕當董督衆軍録行尚書事皆假節鼓吹給中軍兵騎六百人吾欲去江數里築宫室往來其中見賊可擊之形便出竒兵擊之若或未可則當舒六軍以遊獵饗賜軍士詔王朗等三公孫權欲遣子登入侍不至是時車駕徙許昌大興屯田欲舉軍東征朗上疏諌帝以成軍遂行臨江而還詔王朗等三公三世為將道家所忌窮兵黷武古有成戒況連年水旱士民損耗而功作倍於前勞役兼於昔進不滅賊退不和民夫屋漏在上知之在下然迷而知反失道不逺過而能改謂之不過今將休息棲備高山沈權九淵割除擯棄投之畫外車駕當以今月中旬到譙淮漢衆軍亦各還反不臘西歸矣與王朗詔黃初中詔公卿舉獨行君子朗薦光祿大夫楊彪且稱疾讓位於彪帝乃為彪置吏卒位次三公詔朗朗乃起朕求賢於君而未得君乃翻然稱疾非徒不得賢更開失賢之路增玉鉉之傾無乃居其室出其言不善見違於君子乎君其勿有後辭報王朗詔朗為司空帝頗出遊獵或昏夜還宫朗上疏帝報之覽表雖魏絳稱虞針以諷晉悼相如陳猛獸以戒漢武未足以喻方今二寇未殄將帥逺征故時入原野以習戎備至於夜還之戒已詔有司施行答蔣濟詔文帝即王位轉濟為相國長史及踐阼出為東中朗將濟請留詔曰高祖歌曰安得猛士守四方天下未寧要須良臣以鎮邊境如其無事乃還鳴玉未為後也與夏侯尚詔文帝詔尚尚以示散騎常侍蔣濟濟言於帝曰作威作福書之明誡天子無戲言古人所慎於是追收前詔卿腹心重將特當任使恩施足死惠愛可懷作威作福殺人活人報何夔詔蓋禮賢親舊帝王之常務也以親則君有輔弼之勳焉以賢則君有醇固之茂焉夫有陰德者必有陽報今君疾雖未瘳神明聽之矣君其即安以順朕意與于禁詔昔漢高脫衣以衣韓信光武解綬以帶李忠誠皆人主當時貴敬功勞今以逺遊冠與將軍于禁復官詔昔荀林父敗績於邲孟明喪師於殽秦晉不替使復其位其後晉獲狄土秦霸西戎區區小國猶尚若斯而況萬乘乎樊城之敗水災暴至非戰之咎其復禁等官追贈夏侯尚詔尚自少侍從盡誠竭節雖云異姓其猶骨肉是以入為腹心出當爪牙智略深敏謀謨過人不幸早殞命也奈何贈征南大將軍昌陵侯印綬封朱靈鄃侯詔將軍佐命先帝典兵厯年威過方邵功踰絳灌圖籍所美何以加焉朕受天命帝有海內元功之將社稷之臣皆朕所與同福同慶傳之無窮者也今封鄃侯富貴不歸故鄉如夜行衣繡若平常所志願勿難言與張郃詔郃雖武將而愛樂儒士嘗薦同鄉卑湛明經行修詔以湛為博士昔祭遵為將奏置五經大夫居軍中與諸生雅歌投壺今將軍外勒戎旅內存國朝朕喜將軍之意今擢湛為博士答孟達詔王雄為西部從事與達同僚及為涿郡太守達表薦之詔報達雄後厯幽州刺史昔蕭何薦韓信鄧禹進吳漢惟賢知賢也雄有膽智技能文武之􅐾吾宿知之今便以參散騎之選方使少在吾門下知指歸便大用之矣天下之士欲使皆先厯散騎然後出據州郡是吾本意也手報司馬芝詔芝為河南尹曹洪乳母與臨汾公主侍者共輒祀無澗神繫獄卞太后遣黃門傳令芝不通勑洛陽獄考竟芝上疏謝罪帝報之省表明卿至心欲奉詔書以權行事是也此乃卿奉詔之意何謝之有後黃門復往慎勿通也封張遼李典子為關內侯詔合肥之役遼典以步卒八百破賊十萬自古用兵未之有也使賊至今奪氣可謂國之爪牙矣其分遼典邑各百户賜一子爵關內侯以李通子基為中郎將詔昔袁紹之難自許蔡以南人懷異心通秉義不顧使㩦二率服朕甚嘉之不幸早薨子基雖已襲爵未足酬其庸勳基兄緒前屯樊城又有功世篤其勞其以基為奉義中郎將緒平虜中郎將以寵異焉賜張既子翁歸為關內侯詔昔荀桓子立勳翟土晉侯賞以千室之邑馮異輸力漢朝光武封其二子故涼州刺史張既能容民畜衆使羣羌歸土可謂國之良臣不幸薨隕朕甚愍之其賜小子翁歸爵關內侯賜溫恢子生爵關內侯詔恢有柱石之質服事先帝功勤明著及為朕執事忠於王室故授之以萬里之任任之以一方之事如何不遂吾甚愍之賜恢子生爵關內侯以張登為大官令詔登忠義彰著在職功勤名位既卑直亮宜顯饔膳近在當得此吏今以登為大官令制詔三公下並元年上古之始有君也必崇恩化以美風俗然百姓順教而刑辟厝焉今朕承帝王之緒其以延康元年為黃初元年議改正朔易服色殊徽號同律度量承土行大赦天下自殊死以下諸不當得赦皆赦除之服色如奏詔服色如所奏其餘宜如虞承唐但臘日用丑耳此亦聖人之制也改雒為洛詔火行也火忌水故洛去水而加隹魏於行次為土土水之牡也水得土而乃流土得水而柔故除隹加水變雒為洛曹植貶封安鄉侯詔黃初二年監國謁者灌均希旨奏植醉酒悖慢劫脅使者有司請治罪帝以太后故貶爵安鄉侯植朕之同母弟朕於天下無所不容而況植乎骨肉之親舍而不誅其改封植誅鮑勛詔勛為治書執法帝從夀春還屯陳留郡界太守孫雍邪行不從正道軍營令史劉曜欲推之勛以塹壘未成解止曜有罪勛奏一遣而曜密表勛私解雍事詔曰勛指鹿作馬收付廷尉蔣濟復為東中郎將詔卿兼資文武志節慷愾常有超越江湖吞吳會之志故復授將率之任賜桓階詔桓階别傳階為趙郡太守時俸盡食醬上聞數戲曰卿家作醬頗多成否詔曰昔子文清儉朝不謀夕而有脯糧之秩宣子守約軍食魚飱而有加梁之賜豈況光光大魏富有四海棟宇大臣而有蔬食非吾所以禮賢之意也其賜射鹿師二人并給媒弩宇一作梁劉靖遷廬江太守詔卿父昔為彼州今卿復據此郡可謂克負荷者也張既為涼州詔昔賈復請擊郾賊光武笑曰執金吾擊郾吾復何憂卿謀略過人今則其時以便宜從事勿復先請與張既詔卿踰河厯險以勞擊逸以寡勝衆功過南仲勤踰吉甫此勳非但破胡乃永寧河右使吾長無西顧之念矣褒田豫詔魏略豫為邠州刺史鮮卑素利等感懷密遺金三十斤豫張袖受之及去悉皆付外詔褒之昔魏絳開懷以納戎賂今卿舉袖以受狄金朕甚嘉焉追諡杜畿詔昔冥勤其官而水死稷勤百穀而山死故尚書僕射杜畿於孟津試船遂至覆沒忠之至也朕甚愍焉追贈大僕諡曰戴侯與羣臣新城孟太守道蜀肫羊雞鶩味皆淡故蜀人作食喜著飴蜜又蓋聞千鍾百觚堯舜之飲也惟酒無量仲尼之能也姬旦酒殽不徹故能制禮作樂漢高婆娑巨醉故能斬蛇鞠旅詔司馬懿文帝以懿為撫軍大將軍車駕自廣陵還洛陽詔懿於是帝留鎮許昌吾東撫軍當總西事吾西撫軍當總東事令向化手令蜀將孟達率衆降武都氏王率種人內附王自手筆作令吾前遣使宣國威靈而達即來吾惟春秋褒儀父即封拜達使還領新城太守近復有扶老携幼首向王化者吾聞夙沙之民自縛其君以歸神農豳國之衆襁負其子而入豐鎬斯豈驅略迫脅之所致哉乃風化動其情而仁義感其衷歡心內發使之然也以此而推西南將萬里無外權備將與誰守死乎答許芝上代漢圖讖令昔周文三分天下有其二以服事殷仲尼歎其至德公旦履天子之籍聽天下之斷終然復子明辟書美其人吾雖德不及二聖敢忘高山景行之義哉若夫唐堯舜禹之迹皆以聖質茂德處之故能上和靈祇下寧萬姓流稱今日今吾德至薄也人至鄙也遭遇際會幸承先王餘業恩未被四海澤未及天下雖傾倉竭府以振魏國百姓猶寒者未盡暖飢者未盡飽夙夜憂懼弗敢遑寧庶欲保全髮齒長守今日以沒於地以全魏國下見先王以塞負荷之責望狹志局守此而已雖屢蒙祥瑞當之戰惶五色無主若芝之言豈所聞乎心栗手悼書不成字辭不宣口吾問作詩曰喪亂悠悠過紀白骨縱橫萬里哀哀下民靡恃吾將佐時整理復子明辟致仕庶欲守此辭以自終卒不虛言也宜宣示逺近使昭赤心答辛毗等令下四方以明孤欵心是也至於覽餘辭豈余所謂哉寧所堪哉諸卿指論未若孤自料之審也夫虛談謬稱鄙薄所弗當也且聞比來東征經郡縣厯屯田百姓面有飢色衣或裋褐不完罪皆在孤是以上慙衆瑞下愧士民由斯言之德尚未堪偏王何言帝者也宜止息此議無重吾不德使逝之後不愧後之君子答司馬懿等令世之所不足者道義也所有餘者茍妄也常人之性賤所不足貴所有餘故曰不患無位患所以立孤雖寡德庶自免於常人之貴夫石可破而不可奪堅丹可磨而不可奪赤丹石微物尚保斯質況吾托士人之末列曽受教於君子哉且於陵仲子以仁為富柏成子高以義為貴鮑焦感子貢之言棄其蔬而稿死薪者譏季札失辭皆委重而弗視吾獨何人昔周武大聖也使叔旦盟膠鬲於四內使召公約微子於共頭故伯夷叔齊相與笑之曰昔神農氏之有天下不以人之壞自成不以人之卑自高以為周之伐殷以恭也吾德非周武而義慙夷齊庶欲逺茍妄之失道立丹石之不奪邁於陵之所富蹈相成之所貴執鮑焦之貞至遵薪者之清節故曰三軍可奪帥匹夫不可奪志吾之斯志豈可奪哉答劉廙劉煜等令犂牛之駁似虎莠之幼似禾事有似是而非者今日是已覩斯言事良重吾不德于是尚書僕射宣告官寮咸使聞知讓禪令當奉還璽綬為讓章吾豈奉此詔承此貺邪昔堯讓天下與許由子州支甫舜亦讓于善卷石户之農非人無擇或退而耕潁之陽或辭以幽憂之疾或逺入山林莫知其處或攜子入海終身不反或以為辱自投深淵且顔歜懼太朴之不完守知足之明分王子搜樂丹穴之濳處被重而不出栁下惠不以三公之貴易其介曾參不以晉楚之富易其仁斯九士者咸高節而尚義輕富而賤貴故書名千載於今稱焉求仁得仁仁豈在逺孤獨何為不如哉義有蹈東海而逝不奉漢朝之詔也亟為上章還璽綬宣之天下使咸聞焉讓禪第二令昔柏成子高辭夏禹而匿野顔闔辭魯幣而逺迹夫以王者之重諸侯之貴而二子忽之何則其節高也故列士徇榮名義夫高貞介雖蔬食瓢飲樂在其中是以仲尼師王駘而子産嘉申徒今諸卿皆孤股肱腹心足以明孤而今咸若斯則諸卿遊於形骸之內而孤求為形骸之外其不相知未足多怪亟為上章還璽授勿復紛紛也讓禪第三令夫古聖王之治也至德合乾坤惠澤均造化禮教優乎昆蟲仁恩洽乎草木日月所照戴天履地含氣有生之類靡不被服清風沐浴玄德是以金革不起苛慝不作風雨應節禎祥觸類而見今百姓寒者未暖飢者未飽鰥者未室寡者未嫁權備尚存未可舞以干戚方將整以齊斧戎役未息於外士民未安于內耳未聞康哉之歌目未覩擊壤之戲嬰兒未可托於高巢餘糧未可以宿於田畝人事未備至於此也夜未曜景星治未通真人河未出良馬山未出象車蓂莢未植階庭萐莆未生庖厨王母未獻白環渠搜未見珍裘靈瑞未效又如彼也昔東尸季子容成大庭軒轅赫胥之君咸得以此就功勒名今諸卿獨不可少假孤精心竭慮以和天人以格至理使彼衆事備羣瑞效然後安乃議此乎何遽相愧相迫之如是也連為讓章上還璽綬無重吾不德也答劉廙等令天下重器王者正統以聖德當之猶有懼心吾何人哉且公卿未至乏主斯豈小事且宜以待固讓之後乃當更議其可耳答蘇林等令凡斯皆宜聖德故曰茍非其人道不虛行天瑞雖彰須德而光吾德薄之人胡足以當之今讓冀見聽許外內咸使聞知答華歆等令以德則孤不足以時則戎虜未滅若以羣賢之靈得保首領終君魏國於孤足矣若孤者胡足以辱四海至乎天瑞人事皆先王聖德遺慶孤何有焉是以未敢聞命又答相國歆等令昔者大舜飯糗茹草將終身焉斯則孤之前志也及至承堯禪被珍裘妻二女若固有之斯則順天命也羣公卿士誠以天命不可拒民望不可違孤亦曷以辭焉薄稅令關津所以通商旅池苑所以禦災荒設禁重稅非所以便民其除池籞之禁輕關津之稅皆復什一復樵租稅令先王皆樂其所生禮不忘其本譙霸王之邦真人本出其復譙租稅二年以鄭稱為武德傅令龍淵太阿出昆吾之金和氏之璧由井里之田礱之以砥礪錯之以他山故能致連城之價為命世之寶學亦人之砥礪也稱篤學大儒勉以經學輔侯宜旦夕入侍曜明其志廣詢令軒轅有明臺之議放勛有衢室之問皆所以廣詢於下也百官有司其務以職盡規諫將率陳軍法朝士明制度牧守申政事縉紳考六藝吾將兼覽焉問雍州刺史張既令蘇則為金城太守西平麴演叛則勒兵討之演乞降文帝時襲王位令問既既答之加則護羌校尉賜爵關內侯後演復結旁郡為亂則誘斬之試守金城太守蘇則既有綏民平夷之功聞又出軍西定湟中為河西作聲勢吾甚嘉之則之功效為可加爵邑未邪爵重事故以問卿密白意且勿宣露也拜毛玠等子男為郎中令下並元年故尚書僕射毛玠奉常王修涼茂郎中令袁渙少府謝奐萬潛中尉徐奕國淵等皆忠直在朝履蹈仁義並早即世而子孫陵遲惻然愍之其皆拜子男為郎中收斂戰亡士卒令諸將征伐士卒死亡者或未收斂吾甚哀之其告郡國給槥櫝殯斂送致其家官為設祭策追封鄧公策惟黃初二年八月丙午皇帝曰咨爾鄧哀侯沖昔皇天鍾美於爾躬俾聰哲之才成於弱年當永享顯祚克成厥終如何不祿早世夭昏朕承天序享有四海並建親親以藩王室惟爾不逮斯榮且葬禮未備追悼之懷愴然攸傷今遷葬于高陵使使持節兼謁者僕射郎中陳承追賜號曰鄧公祠以大牢魂而有靈休兹寵榮諡龎德策昔先軫喪元王蠋絶脰隕身徇節前代美之惟侯式昭果毅蹈難成名聲溢當時義高在昔寡人愍焉諡曰壯侯策孫權九錫文蓋聖王之法以德設爵以功制祿勞大者祿厚德盛者禮豐故叔旦有夾輔之勳太公有鷹揚之功並啓土宇并受備物所以表章元功殊異賢哲也近漢高祖受命之初分裂膏腴以王八姓斯則前世之懿事後王之元龜也朕以不德承運革命君臨萬國秉統天機思齊先代坐而待旦惟君天資忠亮命世作佐深覩厯數達見廢興逺遣行人浮於濳漢望風影附抗疏稱藩兼納纖絺南方之貢普遣諸將來還本朝忠肅內發欵誠外昭信著金石義蓋山河朕甚嘉焉今封君為吳王使使持節太常高平侯貞授君璽綬策書金虎符第一至第五左竹使符第一至第十以大將軍使持節督交州領荆州牧事錫君青土苴以白茅對揚朕命以尹東夏其上故驃騎將軍南昌侯印綬符策今又加君九錫其敬聽後命以君綏安東南綱紀江外民夷安業無或擕二是用錫君大輅戎輅各一玄牡二駟君務財勸農倉庫盈積是用錫君衮冕之服赤舄副焉君化民以德禮教興行是用錫君軒縣之樂君宣導休風懷柔百越是用錫君朱户以居君運其才謀官方任賢是用錫君納陛以登君忠勇並奮清除姦慝是用錫君虎賁之士百人君振威陵邁宣力荆南梟滅凶醜罪人斯得是用錫君鈇鉞各一君文和於內武信於外是用錫君彤弓一彤矢百玈弓十玈矢千君以忠肅為基恭勤為德是用錫君秬鬯一卣圭瓚副焉欽哉敬敷訓典以服朕命以朂相我國家永終爾顯烈册孫登為東中郎封侯策蓋河洛寫天意符讖述聖心昭晰著明與天談也故易曰河出圖洛出書聖人則之孫將軍歸心國朝忠亮之節同功佐命而其子當為魏將軍著在圖讖猶漢光武受命李氏為輔王梁孫咸並見符緯也斯乃皇天啓祐大魏永令孫氏仍世為佐其以登為東中郎將封縣侯萬户昔周嘉公旦祚流七胤漢禮蕭何一門十侯今孫將軍亦當如斯若夫長平之榮安豐之寵方斯蔑如教答卞蘭教賦者言事類之因附也頌者美盛德之形容也故作者不虛其辭受者必當其實蘭此賦豈吾實哉昔吾丘壽王一陳寶鼎何武等徒以歌頌猶受金帛之賜蘭事雖不諒義足嘉也今賜牛一頭表讓禪表皇帝陛下奉被今月乙卯璽書伏聽册命五內驚震精爽散越不知所處臣前上還相位退守藩國聖恩聽許臣雖無古人量德度身自定之志保已存性實其私願不寤陛下猥損過謬之命發不世之詔以加無德之臣且聞堯禪重華舉其克諧之德舜授文命采其齊聖之美猶下咨四嶽上觀璿璣今臣德非虞夏行非二君而承厯數之咨應選授之命內自揆撫無德以稱且許由匹夫猶拒帝位善卷布衣而逆虞詔臣雖鄙蔽敢忘守節以當大命不勝至願謹拜章陳情使行相國永壽少府糞土臣毛宗奏并上璽綬讓禪第二表奉今月戊戌璽書重被聖命伏聽册告肝膽戰悸不知所措天下神器禪代重事故堯將禪舜納于大麓舜之命禹玄圭告功烈風不迷九州攸平詢事考言然後乃命而猶執謙讓于德不嗣況臣頑固質非二聖乃應天統受終明詔敢守微節歸志箕山不勝大願謹拜表陳情使并奉上璽綬讓禪第三表臣聞舜有賓於四門之勳乃受禪於陶唐禹有存國七百之功乃承祿於有虞臣以蒙蔽德非二聖猥當天統不敢聞命敢屢抗疏略陳私願庶章通紫庭得全微節情達宸極永守本志而音重復銜命申制詔臣臣實戰惕不發璽書而音迫于嚴詔不敢復命願陛下馳傳騁驛召音還臺不勝至誠書與吳質書質為朝歌長遷元城令太祖西征太子南在孟津小城與質書五月二十八日丕白李重無恙塗路雖局官守有限願言之懷良不可任足下所治僻左書問致簡益用增勞每念昔日南皮之遊誠不可忘既妙思六經逍遙百氏彈棊間設終以六博高談娛心哀箏順耳馳騖北場旅食南館浮甘瓜於清泉沈朱李於寒水白日既匿繼以朗月同乘並載以遊後園輿輪徐動賓從無聲清風夜起悲笳微吟樂往哀來愴然傷懷余顧而言斯樂難常足下之徒咸以為然今果分别各在一方元瑜長逝化為異物每一念至何時可言方今㽔賔紀時景風扇物天意和暖衆果具繁時駕而遊北遵河曲從者鳴笳以啓路文學託乘於後車節同時異物是人非我勞如何今遣騎到鄴故使枉道相過行矣自愛丕白又與吳質書魏志云阮瑀以十七歲卒徐幹陳琳應瑒劉楨以二十二年卒質時為元城令太子與書二月三日丕白歲月易得别來行復四年三年不見東山猶歎其逺况又過之思何可支雖書疏往返未足解其其勞結昔年疾疫親故多離其災徐陳應劉一時俱逝痛可言邪昔日遊處行則連輿止則接席何曾須臾相失每至觴酌流行絲竹並奏酒酣耳熱仰而賦詩當此之時忽然不自知樂也謂百年已分長共相保何圖數年之間零落略盡言之傷心頃撰其遺文都為一集觀其姓名已為鬼録追思昔遊猶在心目而此諸子化為糞壤可復道哉觀古今文人類皆不護細行鮮能以名節自立而偉長獨懷文抱質恬淡寡欲有箕山之志可謂彬彬君子矣著中論二十餘篇成一家之言辭義典雅足傳於後此子為不朽矣德璉常裴然有述作意其才學足以著書美志不遂良可痛息間者厯覽諸子之文對之抆淚既痛逝者行自念也孔璋章表殊健微為繁富公幹有逸氣但未遒耳至其五言詩之善者妙絶時人元瑜書記翩翩致足樂也仲宣獨自善於辭賦惜其體弱不足起其文至於所善古人無以逺過也昔伯牙絶絃於鍾期仲尼覆醢於子路愍知音之難遇傷門人之莫逮也諸子但為未及古人自一時之俊也今之存者已不逮矣後生可畏來者難誣然吾與足下不及見也年行巳長大所懷萬端時有所慮至乃通夕不瞑志意何時復類昔日已成老翁但未白頭耳光武言年已三十餘在軍十歲所更非一吾德雖不及年與之齊以犬羊之質服虎豹之文無衆星之明假日月之光動見瞻觀何時易邪恐永不復得為昔日遊也少壯真當努力年一過往何可攀援古人思秉燭夜遊良有以也頃何以自娛頗復有所造述否東望於邑裁書敘心丕白又與吳質書初曹真曹休與質等俱在渤海遊處及太子即王位休真以宗親並受封爵出為列將而質故為長史王顧質有望故稱二人以慰之南皮之遊存者三人烈祖龍飛或將或侯今惟吾子棲遲下仕從我遊處獨不及門瓶罄罍恥能無懷愧路不云逺今復相聞與鍾繇謝玉玦書太祖征漢中太子在孟津聞繇有玉玦密使臨淄侯因人説之繇遂送焉太子與繇書丕白良玉比德君子圭璋見美詩人晉之垂棘魯之璠璵宋之結緑楚之和璞價越萬金貴重都城有稱疇昔流聲將來是以垂棘出晉虞虢雙禽和璧入秦相如抗節竊見玉書稱美玉白如截肪黑譬純漆赤擬雞冠黃侔蒸栗側聞斯語未覩厥狀雖德非君子義無詩人高山景行私所慕仰然四寶邈焉已逺秦漢未聞有良比也求之曠年不遇厥真私願不果飢渴未副近日南陽宗惠叔稱君侯昔有美玦聞之驚喜笑與抃會當自白書恐傳言未審是以令舍弟子建因荀仲茂時從容喻鄙旨乃不忽遺厚見周稱鄴騎既到寶玦初至捧匣跪發五內震駭繩窮匣開爛然滿目猥以蒙鄙之姿得覩希世之寶不煩一介之使不損連城之價既有秦昭章臺之觀而無藺生詭奪之誑嘉貺益腆敢不欽承謹奉賦一篇以讚揚麗質丕白與鍾繇五熟釡書繇為相國以五熟鼎範因太子鑄之釡成太子與繇書昔有黃三鼎周之九寶咸以一體使調一味豈若斯釡五味時芳蓋鼎之烹飪以饗上帝以養聖賢昭德祈福莫斯之美故非大人莫之能造故非斯器莫宜盛德今之嘉釡有逾兹美夫周之尸臣宋之考父衛之孔悝晉之魏顆彼四臣者並以功德勒名鐘鼎今執事寅亮大魏以隆聖化堂堂之德於斯為盛誠太常之所宜銘彛器之所宜勒故作斯銘勒之釡口庶可贊揚洪美垂之不朽與鍾繇九日送菊書歲往月來忽逢九月九日九為陽數而日月並應俗嘉其名以為宜於長久故以享宴高會是月律中無射言羣木百草無有射地而生惟芳菊紛然獨榮非夫含乾坤之純和體芬芳之淑氣孰能如此故屈平悲冉冉之將老思餐秋菊之落英輔體延年莫斯之貴謹奉一束以助彭祖之術與鍾繇書荀閎字仲茂為太子文學掾時有甲乙疑論閎與錘繇王朗袁渙議各不同文帝與繇書袁王國士更為唇齒荀閎徑悍往來鋭師真君侯之勍敵左右之深憂也答鍾繇書孫權稱臣太子書報繇繇答書太子又答之得報知喜南方至於荀公之清談孫權之嫵媚執書嗢噱不能離手若權復黠當折以汝南許邵月旦之評權優遊二國俯仰荀許亦巳足矣答繁欽書披書歡笑不能自勝竒才妙伎何其善也頃守官王孫世有女曰瑣年始九歲夢與神通寤而悲吟哀聲激切涉厯六載于今十五近者督將具以狀聞是日博延衆賢遂奏名倡曲極數彈歡情未逞乃令從官引內世女須臾而至厥狀甚美素顔玄髮皓齒丹唇詳而問之云善歌舞於是提袂徐進揚蛾微眺芳聲清激逸足橫集然後修容飾粧改曲變度斯可謂聲協鐘石氣應風律今之妙舞莫巧於絳樹清歌莫激於宋臘豈能上亂靈祗下變庶特漂悠風雲橫厲無方若斯也哉固非車子喉囀長吟所能逮也吾鍊色知聲雅應此選謹卜良日納之間房啁劉楨書太子初賜楨廓落帶其後師死欲借取為像因書啁楨楨答之夫物因人為貴故在賤者之子不御至尊之側今雖取之勿嫌其不反也答友人書御覽作答劉先主然意義絶不相貫姑闕姓名獲纍紙之命兼美之貺他既備善雙鈎尤妙前後之惠非賢兄之貢則執事之貽也來若川流聚成山積其充匱笥頓府藏者固已無數矣與吳監書中國珍果甚多且復為説蒲萄當其朱夏涉秋尚有餘暑醉酒宿酲掩露而食甘而不䬼脆而不酸冷而不寒味長汁多除煩解倦又釀以為酒甘於麴糵善醉而易醒道之固以流羡咽嗌況親食之邪南方有橘酢正裂人牙時有甜耳即逺方之果寧有匹者乎與羣臣論蜀錦書前後每得蜀錦殊不相比適可訝而鮮卑尚復不愛也自吾所織如意虎頭連璧錦亦有金薄蜀薄來至洛邑皆下惡是為下工之物皆有虛名與羣臣論被服書三世長者知被服五世長者知飲食此言被服飲食難曉也夫珍玩必中國夏則縑總綃繐其白如雪冬則羅綺縠衣疊鮮文未聞衣布服葛也與朝臣論粳稻書江表惟長沙名有好米何得比新城粳稻邪上風炊之五里聞香報崔琰書昨奉嘉命惠示雅數欲使燔翳捐褶翳已壞矣褶亦去焉後有此比蒙復誨諸與曹洪書今魯罪兼苖桀惡稔厲莽縱使宋翟妙機械之巧田單騁奔牛之誑孫吳勒八陳之變猶無益也與王朗書帝初在東宫疫癘大起時人雕傷帝深感歎與大理王朗書故論撰所著典論詩賦百餘篇集諸儒於肅城門內講論大義侃侃無倦人生有七尺之形死為一棺之土惟立德揚名可以不朽其次莫如著篇籍疫癘數起士人雕落余獨何人能全其壽又宋仲子之子與魏諷謀反伏誅太子答朗書昔石厚與州吁遊父碏知其與亂韓子昵田蘇穆子知其好仁故君子遊必有方居必就士誠有以也嗟乎宋忠無石子先識之明老罹此禍今雖欲願行滅親之誅立純臣之節尚可得邪又孫權重遣使稱臣奉貢明珠百筐黃金千鎰馴象二頭或牝或牡擾禽鸚鵡其他珍玩盈舟溢航千類萬品又丕白不愛江漢之珠而愛巴蜀之鈎此言難得之貴寶不若易有之賤物又蚤虱雖細慮於安寢鼷鼠至微猶毁郊牛也與劉曄書劉生帽裁兩段製微不長有似里父之服今帽所當著與諸將書劉備既孤老智窮勢極正使欲與死爭則諸將軍便當就穴中捋取之爾報吳王孫權書權上書説劉備支黨四萬人馬二三千匹出秭歸請往掃撲以克捷為效帝報之昔隗囂之弊禍發栒邑子陽之禽變起扞關將軍其亢厲威武勉蹈竒功以稱吾意又報孫權書前使于禁郭及夫所道吾纖驪馬本欲使禁自致之念將軍儻欲速得今故以付徐奉往此二馬朕之常所自乘甚調良善走數萬匹之極選者乘之真可樂也中國雖饒馬其知名絶足亦時有之耳又權以使聘魏具上破備獲印綬及首級所得土地并表將吏功勤宜加爵賞文帝報使致鼲子裘明光鎧騑馬又以素書所作典論及詩賦與權詔答之老虜邊窟越險深入曠日持久內迫罷弊外困智力故見身於雞頭分兵擬西陵其計不過謂可轉是前迹以搖動江東根未著地摧折其支雖未刳備五藏使身首分離其所降誅亦足使虜部衆凶懼昔吳漢先燒荆門後發夷陵而子陽無所逃其死來歙始襲略陽文叔喜之而知隗囂無所施其巧今討此虜正似其事將軍勉建方略務全獨克又報孫權書權外託事魏而誠心不欵魏遣侍中辛毗尚書桓階往與盟誓并徴任子登辭讓不受魏乃命曹休等數道攻吳時揚越蠻夷多末必平復內難未弭權卑辭上書求自解厲若不見置當奉還土地寄命交州帝報之君生於擾攘之際本有從橫之志降身奉國以享兹祚自君策名已來貢獻盈路討備之功國朝仰成埋而掘之古人之所恥朕之與君大義已定豈樂勞師逺臨江漢廊廟之議王者所不得專三公上君過失皆有本末朕以不明雖有曽母投杼之疑猶冀言者不信以為國福故先遣使者犒勞又遣尚書侍中踐修前言以定任子君遂設辭不欲使進議者怪之又前都尉浩周勸君遣子乃實朝臣交謀以此卜君君果有辭外引隗囂遣子不終內喻竇融守忠而已世殊時異人各有心浩周之還口陳指麾益令議者發明衆嫌終始之本無所據杖故遂俯仰從羣臣議今省上事款誠深至心用慨然悽愴動容即日下詔勑諸軍但深溝高壘不得妄進若君必效忠節以解疑議登身朝到夕召其還此言之誠有如大江與孟達書延康元年達率部曲四千餘家歸魏時文帝初即王位既宿知有逹聞其來甚恱逆與達書達至拜散騎常侍領新城太守後反誅近日有命未足達旨何者昔伊掣背商而歸周百里去虞而入秦樂毅感鴟夷以蟬蛻王遵識逆順以去就皆審廢興之符效知成敗之必然故丹青畫其形容良史載其功勳聞卿姿度純茂器量優絶當聘能明時收名傳記今者翻然濯鱗清流甚相嘉樂虛心西望依依若舊下筆屬辭歡心從之昔虞卿入趙再見取相陳平就漢一覲參乘孤今於卿情過於往故致所御馬物以昭忠愛又與孟達書今者海內清定萬里一統三垂無邊塵之警中夏無狗吠之虞以是弛罔濶禁與世無疑保官空虛初無資任卿來相就當明孤意慎勿令家人繽紛道路以親駭疏也若卿欲來相見且當先安部曲有所保固然後徐徐輕騎來東報吳王孫權書知已送擇見船最大樟林者六艘受五百石從沔水送付樊口又今因趙咨致文馬一匹白鼲子裘一領送劍書僕有劍一枚明珠標首藍玉飾靶用給左右以除妖氛序典論自序初平之元董卓殺主鴆后蕩覆王室是時四海既困中平之政兼惡卓之凶逆家家思亂人人自危山東牧守咸以春秋之義衛人討州吁于濮言人人皆得討賊於是大興義兵名豪大俠富室強族飄揚雲會萬里相赴兖豫之師戰於滎陽河內之甲軍于孟津卓遂遷大駕西都長安而山東大者連郡國中者嬰城邑小者聚阡陌以還相吞併會黃巾盛於海嶽山寇暴於并冀乘勝轉攻席卷而南鄉邑望煙而奔城郭覩塵而潰百姓死亡暴骨如莾豫時年五歲上以世方擾亂教豫學射六歲而知射又教余騎馬八歲而知騎射矣以時之多故每征余常從建安初上南征荆州至宛張繡降旬日而反亡兄孝亷子修從兄安民遇害時余年十歲乘馬得脫夫文武之道各隨時而用生于中平之季長于戎旅之間是以少好弓馬于今不衰逐禽輒十里馳射常百步日多體健心每不厭建安十年始定冀州濊貊貢良弓燕代獻名馬時歲之暮春勾芒司節和風扇物弓燥手柔草淺獸肥與族兄子丹獵于鄴西終日手獲麞鹿九雉兔三十後軍南征次曲蠡尚書令荀彧奉使犒軍見余談論之末彧言聞君善左右射此實難能余言執事未覩夫項發口縱俯馬蹄而仰月支也彧喜笑曰乃爾余曰埒有常徑的有常所雖每發輒中非至妙也若馳平原赴豐草要狡獸截輕禽使弓不虛彎所中必洞斯則妙矣時軍謀祭酒張京在坐顧彧拊手曰善豫又學擊劒閲師多矣四方之法各異唯京師為善桓靈之間有虎賁王越善斯術稱於京師河南史阿言昔與越遊具得其法余從阿學之精熟嘗與平虜將軍劉勳奮威將軍鄧展等共飲宿聞展善有手臂曉五兵又稱其能空手入白刃余與論劔良久謂言將軍法非也余顧嘗好之又得善術因求與余對時酒酣耳熱方食竿蔗便以為杖下殿數交三中其臂左右大笑展意不平求更為之余言吾法急屬難相中面故齊臂耳展言願復一交余知其欲突以取交中也因偽深進展果尋前余却腳勦正截其顙坐中驚視余還坐笑曰昔陽慶使淳于意去其故方更授以祕術今余亦願鄧將軍捐棄故伎更受要道也一坐盡歡夫事不可自謂已長余少曉持復自謂無對俗名雙戟為坐鐵室鑲楯為蔽木戶後從陳國袁敏學以單攻復每為若神對家不知所出告曰若逢敏於狹路真決耳余於他戲弄之事少所喜唯彈棊略盡其巧少為之賦昔京師先工有馬合鄉侯東方安世張公子常恨不得與彼數子者對上雅好詩書文籍雖在軍旅手不釋卷每每定省從容常言人少好學則思専長則善忘長大而能勤學者唯吾與袁伯業耳余是以少誦詩論及長而備厯五經四部史漢諸子百家之言靡不畢覽繁欽集序上西征余守譙繁欽從時薛訪車子能喉囀與笳同音欽箋還與余盛歎之雖過其實而其文甚麗陳琳集序上平定漢中族父都護還書與余盛稱彼方土地形勢觀其辭如陳琳所敘為也建安諸序維建安二十四年二月丙午魏太子丕造刀三其二曰含章彩似丹霞又曰造百辟寶劒三其二曰流彩虹李尤字伯宗少有文章賈逵薦尤有相如揚雄之風拜蘭臺令史與劉楨等共撰漢記王粲長於詞賦陳琳阮瑀之章表書記今之俊也建安二十四年二月壬午魏太子丕造百辟寶劒長四尺二寸選兹良金令彼國工精而鍊之至於百辟淬以清漳礪以礛諸光似流星名曰飛景余好擊劒命彼國工以為寶器飾以文玉表以通犀余好擊劒善以短乘長精而鍊之其始成也五色駭爐巨槖自鼓雲物髣佛飛鳥翔舞昔周魯寶雍狐之戟屈盧之矛孤父之戈徐氏匕首凡斯皆上世名器君子雖有文事必有武備矣魏太子造百辟匕首三其一理似堅冰名曰清剛其二曜似朝日名曰揚文其三狀似龍文名曰龍鱗昔者周魯寶赤刀孟勞丕造百辟寶刀其一文似靈龜名曰靈寶其二彩似丹霞名曰含章其三鋒似崩霜刀身劒鋏名曰素質又作露陌刀一名龍鱗酒以成禮過則敗德孝靈之末朝政墮廢官司並湎于酒貴戚尤甚流俗沈荒故作酒誨以戒孝靈帝末羣官百司並湎于酒斗酒至千錢論典論論文文人相輕自古而然傅毅之於班固伯仲之間耳而固小之與弟超書曰武仲以能屬文為蘭臺令史下筆不能自休夫人善於自見而文非一體鮮能備善是以各以所長相輕所短里語曰家有敝帚享之千金斯不自見之患也今之文人魯國孔融文舉廣陵陳琳孔璋山陽王粲仲宣北海徐幹偉長陳留阮瑀元瑜汝南應瑒德璉東平劉楨公幹斯七子者於學無所遺於辭無所假咸以自騁驥騄於千里仰齊足而並馳以此相服亦良難矣蓋君子審已以度人故能免於斯絫而作論文王粲長於辭賦徐幹時有齊氣然粲之匹也如粲之初征登樓槐賦征思幹之玄猿漏巵圓扇橘賦雖張蔡不過也然於他文未能稱是琳瑀之章表書記今之俊也應瑒和而不壯劉楨壯而不密孔融體氣高妙有過人者然不能持論理不勝辭至於雜以嘲戲及其所善楊班儔也常人貴逺賤近向聲背實又患暗於自見謂已為賢夫文本同而末異蓋奏議宜雅書論宜理銘誄尚實詩賦欲麗此四科不同故能之者偏也唯通才能備其體文以氣為主氣之清濁有體不可力強而致譬諸音樂曲度雖均節奏同檢至於引氣不齊巧拙有素雖在父兄不能以遺子弟蓋文章經國之大業不朽之盛事年壽有時而盡榮樂止乎其身二者必至之常期未若文章之無窮是以古之作者寄身於翰墨見意於篇籍不假良史之辭不託飛馳之勢而聲名自傳於後故西伯幽而演易周旦顯而制禮不以隱約而不務不以康樂而加思夫然則古人賤尺璧而重寸陰懼乎時之過已而人多不強力貧賤則懾於飢寒富貴流於逸樂遂營目前之務而遺千載之功日月逝於上體貌衰於下忽然與萬物遷化斯亦志士大痛也融等已逝唯幹著論成一家言典論論方術潁川郤儉能辟穀餌伏苓甘陵甘始亦善行氣老有少容廬江左慈知補導之術並為軍吏初儉之至市伏苓價暴數倍議郎安平李覃學其辟穀餐伏苓飲寒水中泄利殆至隕命後始來衆人無不鴟視狼顧呼吸吐納軍謀祭酒𢎞農董芬為之過差氣閉不通良久乃蘇左慈到又競受其補導之術至寺人嚴峻往從問受閹豎真無事於斯術也人之逐聲乃至於是光和中北海王和平亦好道術自以當仙濟南孫雍少事之從至京師會和平病死雍因葬之東陶有書百餘卷藥數囊悉以送之後弟子夏榮言其尸解雍至今恨不取其寶書仙藥劉向惑於鴻寶之説君遊眩於子政之言古今愚謬豈惟一人哉周成漢昭論或方周成王於漢昭帝僉高成而下昭余以為周成王體上聖之休氣稟賢妣之胎誨周召為保傅呂尚為太師口能言則行人稱辭足能履則相者導儀目厭威容之美耳飽仁義之聲所謂沈漬玄流而沐浴清風者矣猶有咎悔聆二叔之謗使周公東遷皇天赫怒顯明厥咎猶啓諸金縢稽諸國史然後乃悟不亮周公之聖德而信金縢之教言豈不暗哉夫孝昭父非武王母非邑薑養惟蓋主相則桀光體不承聖化不胎育保無仁孝之質佐無隆平之治所謂生於深宫之中長於婦人之手然而德與性成行與體并年在二七早智夙達發燕書之詐亮霍光之誠豈將有啓金縢信國史而後乃悟哉使夫昭成均年而立易世而化貿臣而治換樂而歌則漢不獨少周不獨多也漢文帝論昔有苖不賓重華舞以干戚尉他稱帝孝文撫以恩德吳王不朝錫之几杖以撫其意而天下賴安能𢎞三章之教愷悌之化欲使曩時纍息之民得濶步高談無危懼之心若賈誼之才敏籌畫國政特賢臣之器管晏之姿豈若孝文大人之量哉帝集諸儒於肅城門內講論大義嘗嘉漢文寬仁玄默務欲以德化民有賢聖之風時諸儒或以孝文雖賢其通達國體不如賈誼帝由是著太宗論漢武帝論孝武帝承纍世之遺業遇中國之殷阜府庫餘錢帛倉廪畜腐米因此有意平滅胸奴而廓清邊境矣故即位之初從王恢之書設馬邑之謀自元光以迄征和四十五載之間征胸奴四十餘舉踰廣漠絶梓嶺封狼居胥禪姑嶧梁北河觀兵瀚海刈單于之旗勦閼氏之首探符離之窟掃五王之庭納休屠毗耶之附獲祭天金人之寶􅛓名王以十數馘首虜以萬計既窮追其敗亡又摧破其積聚虜不暇於救死扶傷疲於孕重墮殯元封初躬執武節告以天子自將懼以兩越之誅易彼符號可為威震胸奴矣交友論夫陰陽交萬物成君臣交邦國治士庶交德行光同憂樂共富貴而友道備矣易曰上下交而其志同繇此觀之交乃人倫之本務王道之大義非特士友之志也白虎通曰朋友之道有四近則正之逺則稱之樂則思之患則死之揚子法言曰朋而不心面朋也友而不心面友也説苑曰魏文侯歎田子方曰自友方也君臣益親百姓益附吾是以知友士之功焉議田疇辭封議昔薳敖逃祿傳載其美所以激濁世勵貪夫賢於尸祿素餐之人也故可得而小不可得而毁至於田疇方斯近矣免官加刑於法為重連珠連珠三首蓋聞琴瑟高張則哀彈發節士抗行則榮名至是以申胥流音於南極蘇武揚聲於朔裔蓋聞四節異氣以成歲君子殊道以成名故微子奔走而顯比干剖心而榮蓋聞駑蹇服御良樂咨嗟鉛刀剖截歐冶歎息故少師幸而季梁懼宰嚭任而伍員憂銘露陌刀銘於鑠良刀胡煉亶時譬諸麟角靡所任兹不逢不若永世寶持利用衛身以威弗治賜鍾繇五熟釡銘於赫有魏作漢藩輔厥相惟鍾實幹心膂靖恭夙夜匪遑安處百寮師師楷兹度矩文即位告天文皇帝臣丕敢用玄牡昭告於皇皇后帝漢厯世二十有四踐年四百二十有六四海困窮三綱不立五緯錯行靈祥並見推術數者慮之古道咸以為天之歷數運終兹世凡諸嘉祥民神之意比昭有漢數終之極魏家受命之符漢主以神器宜授於臣憲章有虞致位於丕丕震畏天命雖休勿休羣公庶尹六事之人外及將士洎於蠻夷君長僉曰天命不可以辭拒神器不可以久曠羣臣不可以無主萬機不可以無統丕祇承皇象敢不欽承卜之守龜兆有大橫筮之三易兆有革兆謹擇元日與羣寮登壇受帝璽綬告類于爾大神唯爾有神尚饗永吉兆民之望祚于有魏世享哀策文武帝哀策文痛神曜之幽潛哀鼎俎之虛置舒皇德而詠思遂腷臆以涖事矧乃小子夙遭不造煢煢在疚嗚呼皇考産我曷晚棄我曷早羣臣子輔奪我哀願猥抑奔墓俯就權變卜葬既從大隧既通漫漫長夜窈窈玄宫有晦無明曷有所窮鹵簿既整三官駢羅前驅建旗方相執戈棄此宫庭陟彼山阿誄弟蒼舒誄曹沖字蒼舒文帝之弟也少聰察岐嶷有成人之智年十三病卒曹公哀甚為聘甄氏亡女與合葬贈騎都尉印綬惟建安十有五年五月甲戌童子曹蒼舒卒嗚呼哀哉乃作誄曰於惟淑弟懿矣純良誕豐令質荷天之光既哲且仁爰柔克剛彼德之容兹義肇行猗歟公子終然允臧宜逢介祉以永無疆如何昊天雕斯俊英嗚呼哀哉惟人之生忽若朝露役役百年亹亹行暮矧爾夙夭十三而忘何辜於天景命不遂兼悲增傷侘傺失氣永思長懷哀爾罔極貽爾良妃襚爾嘉服越以乙酉宅彼城隅增丘峩峩寢廟渠渠姻媾雲會充路盈衢悠悠羣司岌岌其車傾都蕩邑爰迄爾居魂而有靈庶可以娛嗚呼哀哉制終制禮國君即位為椑存不忘亡也昔堯葬穀林通樹之禹葬會稽農不易畝故葬於山林則合乎山林封樹之制非上古也吾無取焉壽陵因山為體無為封樹無立寢殿造園邑通神道夫葬也者藏也欲人之不得見也骨無痛癢之知冢非棲神之宅禮不墓祭欲存亡之不黷也為棺槨足以朽骨衣衾足以朽肉而已故吾營此丘墟不食之地欲使易代之後不知其處無施葦炭無藏金銀銅鐵一以瓦器合古塗車芻靈之義棺但漆際會三過飯含無以珠玉無施珠襦玉匣諸愚俗所為也季孫以璵璠斂孔子厯級而救之譬之暴骸中原宋公厚葬君子謂華元樂莒不臣以為棄君於惡漢文帝之不發霸陵無求也光武之掘園陵封樹也霸陵之完功在釋之原陵之掘罪在明帝是釋之忠以利君明帝愛以害親也忠臣孝子宜思仲尼丘明釋之言鑒華元樂莒明帝之戒存於所以安君定親使魂靈萬載無危斯則賢聖之忠孝矣自古及今未有不亡之國亦無不掘之墓也喪亂以來漢氏諸陵無不發掘至乃燒取玉匣金鏤骸骨并盡是焚如之刑豈不重痛哉禍由乎厚葬封樹桑霍為我戒不亦明乎其皇后及貴人以下不隨王之國者有終沒皆葬澗西前又以表其處矣蓋舜葬蒼梧二妃不從延陵葬子逺在嬴博魂而有靈無不之也一澗之間不足為逺若違今詔妄有所變改造施吾為戮尸地下戮而重戮死而重死臣子為蔑死君父不忠不孝使死者有知將不福汝其以此詔藏之宗廟副在尚書祕書三府漢魏六朝百三家集卷二十四
