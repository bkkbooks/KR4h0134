里日晚唱歸來車轉承光殿步上通天臺叉臨曲池影扇拂玉堂梅先取中庭入罷逐步廊回下關那早閉人迎已復開龜兆名詩土膏春氣生倡女協春情魚遊連北水鵠作遼東鳴折梅還插鬢蕩柱更移聲銀燭含朱火金罏對寶笙百枝凝夕焰却月隱髙城獸名詩豹韜求祕術虎略選良臣水涉黃牛浦山過白馬津摧鋒上狐塞畫象入麒麟果下新花落桃枝芳樹春王孫及公子熊席復橫陳鳥名詩方舟去鳷鵲鵠引欲相要晨鳬移去舸飛燕動歸橈雞人憐夜刻鳯女念吹簫雀叉照輕幌翠的繞纎腰復聞朱鷺曲鉦管雜回潮樹名詩桃李競追隨輕衫露弱枝杏梁始東照柘火未西馳香因玉釧動佩逐金衣移栁葉生眉上珠璫搖鬢垂逢君桂枝馬車下覔親知草名詩胡王迎娉主塗經蒯北遊金錢買含笑銀缸影梳頭初控遊龍馬仍移卷柏舟中江離思切蓬鬢不堪秋況度菖蒲海落月似懸鈎相名詩仙人賣玉杖乘鹿去山林浮杯度池曲摩鏡往河陰井內書銅板竈裏化黃金妻搖五明扇妾弄一絃琴暫遊忽千里中天那可尋望江中月影文苑英華作簡文帝今從藝文初學作元帝澄江涵皓月水影若浮天風來如可泛流急不成圓秦鈎一作鏡斷復接和璧碎還聯裂紈依岸草斜挂逐行船即此春江上無俟百枝然詠霧三晨生逺霧五里暗城闉從風疑細雨映日似遊塵乍若輕煙散時如佳氣新不妨鳴樹鳥時蔽摘花人春日篇春還春節美春日春風過春色日日異春情處處多處處春芳動日日春禽變春意春已繁春人春不見不見懷春人徒望春光新春愁春自結春結詎能申欲道春園趣復憶春時人春人意何在空爽上春期獨念春花落還似惜春時納涼髙舂斜日下佳氣滿欄楹池紅早花落水緑晚萍生星稀月稍上雲開河尚橫白鳥翻帷暗丹螢入帳明朱綦趨北閣玳瑁徙南榮金鋪掩夕扇玉壺傳夜聲賦得涉江採芙蓉江風當夏清桂楫逐流縈初疑京兆劍復似漢冠名荷香帶風逺蓮影向根生葉卷珠難溜花舒紅易輕日暮鳬舟滿歸來度錦城賦得蘭澤多芳草春蘭本無艷春澤最葳蕤燕姬得夢罷尚書奏事歸臨池影入浪從風香拂衣當門已芬馥入室更芳菲蘭生不澤徑十步豈難稀詠石榴塗林未應發春暮轉相催然燈疑夜火連珠勝早梅西域移根至南方釀酒來葉翠如新剪花紅似故裁還憶河陽縣映水珊瑚開看摘薔薇倡女倦春閨迎風戲玉除近叢看影密隔樹望叉疏橫枝斜綰袖嫩葉下牽裾牆髙舉不及花新摘未舒莫疑插鬢少分人猶有餘賦得竹嶰谷管新抽淇園節復修作龍還葛水為馬向并州柯亭臨絶澗桃枝夾細流冠學芙蓉勢花堪威鳯遊卭王若有獻張騫應拜侯從軍行一作王僧辨從軍寶劍飾龍煙長虹畫彩旃山虛和鐃管水靜瀉樓船連雞隨火度燧象帶烽然洞庭曉風急瀟湘夜月圓荀令多文藻臨戎賦雅篇詠池中燭影魚燈且滅燼鶴焰暫停輝自有銜龍燭青火入朱扉映水疑三燭翻池類九微入林如磷影度渚若螢飛河低扇月落霧上珠星稀章華終宴所飛蓋且相追晚棲烏日暮連翩翼俱向上林棲風多前鳥駚雲暗後羣迷路逺聲難徹飛斜行未齊應從故鄉返幾過入蘭閨借問倡樓妾何如蕩子妻登江州百花亭懷荆楚極目才千里何由望楚津落花灑行路垂楊拂砌塵栁絮飄春雪荷珠漾水銀試酌新豐酒遙勸陽臺人泛蕪湖桂潭連菊岸桃李映成蹊石文如濯錦雲飛似散圭橈度菱根反船來荇葉低帆隨迎雨燕鼓逐伺潮雞早發龍巢征人喜放溜曉發晨陽隈初言前浦合定覺近洲開不疑行舫動唯看逺樹來還瞻起漲岸稍隱陽雲臺夜宿柏齋獨暗行人靜簾開雲影入風細雨聲遲夜短更籌急能下班姬淚復使倡樓泣況此客遊人中宵空佇立落日射羆促宴引枚鄒中園觀獸侯日度堋陰廣風橫旗影浮移竿標入箭疊鼓送爭籌附枝時可息言從清夜遊後園看騎馬良馬出蘭池連翩驅桂枝鳴珂隨局駛輕塵逐影移香來知驟近汗斂覺風吹遙望黃金絡懸識幽并兒春日一作和劉上黃新鶯隱葉囀新燕向窗飛栁絮時依酒梅花任入衣玉珂隨風度金鞍照日暉無令春色晚獨望行人歸任一作乍戲作艷詩入堂值小婦出門逢故夫含辭未及吐絞袖且踟蹰搖兹扇似月掩此淚如珠今懷固無已故情今有餘和林下詠姬應令和昭明日斜下北閣髙宴出南榮歌清隨澗響舞影向池生輕花亂粉色風篠雜絃聲獨念陽臺下願待洛川笙閨怨蕩子從遊宦思妾守房櫳塵鏡朝朝掩寒衾夜夜空若非新有悅何事久西東知人相憶否淚盡夢啼中祀伍相廟石城寧足拒金陳詎能追楚關開六塞吳兵入九圍山水猶縈帶城池失是非空餘夀宫在日暮舞靈衣詠風樓上試朝籹風花下砌傍入鏡先飄粉翻衫好染香度舞飛長袖傳歌共繞梁欲因吹少女還將拂大王詠霧曉霧晦階前垂珠帶葉邊五里浮長隰三辰晦逺天傍通似佳氣却望若飛煙疏簾還復密新棟更疑連還思逢樂廣能令雲霧褰賦得蒲生我池中池中種蒲葉葉影蔭池濵未好宫中薦行堪隱士輪為書聊可截匹栁復宜春瑞葉生符苑鏤碧獻周人詠陽雲樓簷栁楊栁非花樹依樓自覺春枝邊通粉色隙裏映紅巾帶日交簾影因吹掃窗塵拂簷應有意偏宜桃李人五言詩梁詞人麗句云梁世宗作寒浞猶稽命新都久未平留滯淹三楚巑岏保一城終當撫期運伐罪弔蒼生晚景遊後園髙軒聊騁望煥景入川梁波橫山渡影雨罷葉生光日移花色異風散水紋長遊後園暮春多淑氣斜景落髙春日照池光淺雲歸山望濃入林迷曲徑渡渚隔危峰古意妾在成都縣願作髙唐雲樽中石榴酒機上蒲萄紋停梭還斂色何時勸使君雜詠二首秋夜秋夜九重空蕩子怨房櫳燈光入綺帷簾影穿屏風金徽調玉軫兹夜撫離鴻寒閨烏鵲夜南飛良人行未歸池水浮明月寒風送搗衣願織回衣錦因君寄武威和彈筝人橫筝在故帷忽憶上絃時舊柱未移處銀帶手經持悔道啼將别教成今日悲其二瓊柱動金絲秦聲發趙曲流徴含陽春美手過如玉出江陵縣還遊魚迎浪上雊雉向林飛逺村雲裏出遙船天際歸其二朝出屠羊縣夕反仲宣樓水滿還侵岸沙盡稍開流詠歌汗輕紅粉濕坐久翠眉愁傳聲入鐘磬餘轉雜箜篌贈到溉洽梁書曰時以溉洽兄弟比之二陸故世祖贈詩曰魏丗重雙丁晉朝稱二陸何如今兩到復似凌寒竹遺武陵王詩回首望荆門驚浪且雷奔四鳥嗟長别三聲悲夜猿别荆州吏民寄言謝桀黠無乃氣干雲安知灞陵下復有李將軍其二莫言江漢逺煙霞隔數千何必黃丞相重應臨潁川細雨風輕不動葉雨細未霑衣入樓如霧上拂馬似塵飛望春詩葉濃知栁密花盡覺梅疏蘭生未可握蒲小不堪書緑栁長條垂拂地輕花上逐風露霑疑染緑葉小未障空詠梅梅含今春樹還臨先日池人懷前歲意花發故年枝宜男草可愛宜男草垂采映倡家何時如此葉結實復含花細草依階疑緑蘚傍渚若青苔漫生雖欲遍人迹會應開賦得春荻翠菼玉池前遙映江南蓮非秋無有眊未燒不生煙詠螢火著人疑不熱集草訝無煙到來燈下暗翻往雨中然離合泬寥雲物淨水木備春光龕定方無逺合浦不難航後園作回文詩斜峰繞徑曲聳石帶山連花餘拂細鳥樹密隱鳴蟬賦登山馬登山馬徑小徑小馬才通汗赭疑霑勒衣香不逐風何殊隴頭望遙識祁連東古意詠燭花中燭焰焰動簾風不見來人影回光持向空春别應令四首昆明夜月光如練上林朝花色如霰朝花月夜動春心誰忍相思不相見其二試看機上交龍錦還瞻庭裏合歡枝映日通風影珠幔飄花拂葉度金池不聞離人當重合唯悲合罷會成離其三門前楊栁亂如絲直置佳人不自持適言新作裂紈詩誰悟今成織素辭其四日暮徙倚渭橋西正見流月與雲齊若使月光無近逺應照離人今夜啼其五别罷花枝不共攀别後書信不相關欲覔行人寄消息依常潮水暝應還其六三月桃花合靣脂五月新油好煎澤莫復臨時不寄人漫道江中無估客送西歸內人秋氣蒼茫結孟津復送巫山薦枕神昔時慊慊應愁去今日勞勞長别人宴清暑殿作柏梁體玉衡七政轉璇璣帝升降端揆而才非侍中尚書僕射臣裒澄鏡朱紫眇難追吏部尚書臣榖幽逼詩四首南史曰元帝避建鄴而都江陵外迫強敵內失人和魏師至方徵兵四方未至而城見尅在幽逼求酒飲之製詩四絶後為梁王察所害南風且絶唱西陵最可悲今日還蒿里終非封禪時其二人生逢百六天道異貞恆何言異螻蟻一旦損鯤鵬其三松風侵曉哀霜氛當夜來寂寥千載後誰畏軒轅臺其四夜長無嵗月安知秋與春原陵五樹杏空得動耕人漢魏六朝百三家集卷八十四
