body:
  text: 漢魏六朝百三家集卷八十四梁元帝集題詞間讀梁元帝與武陵王書言兄肥弟瘦讓棗推梨上林聞鳥宣室披圖友于之情三復流涕漢明東海詞無以加乃縱兵六門參夷流血同室之鬬甚于寇讎外為可憐之言內無急難之痛狡人好語固難以嘗測也荆南定蹕強虜叩城地非王氣自速其災然召師覆國禍發嶽陽帝好殺家人卒殺之者家人也驪山之火君子緩誅申戎而先咎幽王有以哉帝不好聲色頗有高名獨為詩賦婉麗多情妾怨回文君思出塞非好色者不能言而徐娘角枕垂刺金樓內教之闕不能謂當璧無過也釋典諸文雕鏤匠意威鳯紺馬增其爛熳顧涅槃德宗讓悟父兄道心三降其風薄矣詔令書表咄咄火攻挾陳思之才攘子桓之坐眇僧化身固一神物哉目録賦玄覽賦言志賦春賦秋興賦臨秋賦對燭賦採蓮賦鴛鴦賦蕩婦秋思賦詔即位詔蠲免力田詔次建業詔諡王僉詔詔贈杜崱詔封王僧辨詔裒庾詵與劉之遴令答勸進羣下令復答又答王僧辨等答南平王恪等令解嚴令課耕令下四方令赦餘黨令敕敕報司徒王僧辨别敕王僧辨敕杜龕教召學生教表薦鮑幾表請於州置學挍表薦顧協表上忠臣傳表遷荆州輸江州節表啓東宫薦石門侯啓慶東耕啓慶南郊啓謝東宫賜白牙鏤管筆啓謝敕送齊王瑞像還啓上東官古迹啓謝上畫蒙敕裒賞啓謝東宫賚陸探徴畫啓謝東宫賜彈棊局啓謝敕賜第啓為妾夏玉安豐謝東宫賚錦啓謝東宫賚辟邪子錦白褊等啓謝東宫賚貂蟬啓謝敕賜褥啓謝東宫賚寶枕啓謝東宫賚花叉啓上榖充軍糧啓謝東宫賚瓜啓為妾𢎞夜姝謝東宫賚合心花叉啓謝晉安王賜馬啓謝東宫賚蒸栗牛啓謝賚車螯蛤蜊啓謝東宫賚塵尾錦帔團扇等啓謝賜功德淨饌一頭啓又謝賚功德食一頭啓書與蕭􅖴議等書答廣信侯書答齊國雙馬書又與學生書答晉安王敘南康簡王薨書答劉縮求述制旨義書與蕭挹書與武陵王書又與魏書與劉孝綽書與劉智藏書與武陵王書又與鮑泉與劉璠報顔之儀獻神洲頌遺周𢎞直書與周𢎞正書答王僧辨書下荆州遺王僧辨書與王僧辨帛書檄討侯景檄論全德志論鄭衆論議高祖武皇帝諡議序簡文帝法寶聯璧序內典碑銘集林序職貢圖序忠臣傳序忠臣傳死節篇序孝德傳序全德志序丹陽尹傳序懷舊志序洞林序廬山碑序忠臣傳諫諍篇序揚州梁安寺碑序贈張纘詩存序贊忠臣傳寄託篇贊忠臣傳諫爭篇贊忠臣傳執法篇贊孝德傳皇王篇贊孝德傳天性篇贊職貢圖贊銘漏刻銘東宫後堂仙室山銘香爐銘梁安寺剎下銘碑皇太子講學碑鍾山飛流寺碑曠野寺碑郢川晉安寺碑攝山栖霞寺碑歸來寺碑南嶽衡山九貞館碑青溪山館碑隱居先生陶𢎞景碑荆州長沙寺何育王像碑莊嚴寺僧旻法師碑光宅寺大僧正法師碑玄圃牛渚磯碑善覺寺碑荆州放生亭碑墓志庾先生承先墓志特進蕭琛墓志銘中書令庾肩吾墓志銘侍中新渝侯墓志銘黃門侍郎劉孝綽墓志銘散騎常侍裴子野墓志銘太常卿陸倕墓志銘侍中吳平光侯墓志銘祭文祭東耕文釋奠祭孔子文祭顔子文騷秋風搖落樂府長歌行芳樹巫山高關山月隴頭水折楊柳洛陽道長安道紫騮馬驄馬驅劉生飛來雙白鶴班媫妤半路溪採蓮曲吳趨行燕歌行烏棲曲其二其三其四詩登隄望水赴荆州泊三江口藩難未靜述懷和劉尚書兼明堂齋宫和劉尚書侍五明集和鮑常侍龍川館登顔園故閣代舊姬有怨夕出通波閣下觀妓去丹陽尹尹荆州又示吏民後臨荆州别荆州吏民宫殿名詩縣名詩姓名詩將軍名詩屋名詩車名詩船名詩歌曲名詩藥名詩鐵冗名詩龜兆名詩獸名詩鳥名詩樹名詩草名詩相名詩望江中月影詠霧春日篇納涼賦得涉江採芙蓉賦得蘭澤多芳草詠石榴看摘薔薇賦得竹從軍行一作王僧辨從軍詠池中燭影晚棲烏登江州百花亭懷荆楚泛蕪湖早發龍巢夜宿柏齋落日射熊後園看騎馬春日一作和劉上黃戲作艷詩和林下詠姬應令和昭明閨怨祀伍相廟詠風詠霧賦得蒲生我池中詠雲陽樓簷柳五言詩晚景遊後園逰後園古意雜詠二首秋夜寒閨和彈筝人其二出江陵縣還其二詠歌贈到溉洽遺武陵王詩别荆州吏目其二細雨望春詩緑栁詠梅宜男草細草賦得春荻詠螢火離合後園作回文詩賦登山馬古意詠燭春别應令六首其二其三其四其五其六送西歸內人宴清言殿作柏梁體幽逼詩四首其二其三其四漢魏六朝百三家集卷八十四目録欽定四庫全書漢魏六朝百三家集卷八十四明張溥輯梁元帝集賦玄覽賦歲次旃蒙月建司空變凌陰之吕扇廣莫之風蕭子褰帷九水作牧三宫乃盱衡而言曰惟天為大惟堯則之惟地蓋厚惟王國之粵我皇之握鏡實乃神而乃聖陳六聯於八則𢎞九職於三令運璇樞而御宇執玉衡而齊政大矣廣矣無德而稱俯齱齵於軒羲諒斗筲於子姒包河圖與洛書括龍官乎鳯紀超大德於百王髙鴻名於萬祀惟天縱於副后踰啓誦而惟首既倫儒於肅成復斷獄於長夀豈止丕莊屈膝將令班鄭捧帚譬衢樽而待酌若懸鐘之須扣前踰繫象之外聲髙洙泗之右伊俯已之顓愚謬聯蕚於天衢筮東門而畫野創南國而分墟詔伯宗以為儐誥內史而䇿書用分兹於茅社從侯服而俾豫類金獸以封建非桐圭以錫處爾其湘水之東即我龜蒙魏甘露而分邑吳太平而定中鎮麟山之崔嵬傍龍迹其穹窿金城髙而相屬石燕起而依風豈連鏕於分陜羡追縱於二公彼琅臺之作守有彭泗之嘉名殊並海之分地異魚石之所城經沈子之髙墉蓋水運之堤封謝禮樂之干櫓閲武騎之輣衝軾錦車而前騖驅魚軒而繼蹤無復鸞歌鳯舞唯對緑栁青松留吳宫之宿燕響平陵之夜鐘飛余轡而西征戍太真之舊營鳴節鼓之金鐲屯戎車於石城戮滔天之封豕斬橫海之長鯨每輟書而歎息景樹德之風聲從王役於鏡中浮文鷁而載鴻經謝亭而帳飲想彥伯之髙風度五城而騁望見三冀之無窮故以飛雲蒼隼白鱧青桐金吾舍利鳴鶴紫宫眺方嶽乎雲間望赤坂之朱殷想真長之送别懷思曠之還山此檜楫而方逺彼松舟而未間倦旅泊於新丘同渭水之不流或千人而並唱乍萬人之相鈎毁橋由於瑗度鑿空資于仲謀睇三茅之靈祕懷九轉之仙記紫臺石室之文青首銀函之字獨有披霧之心彌軫凌雲之志捫殷碑之愴望挹延州之髙讓井觱沸而蜿蟺勢崎嶇而低昻見傳巴之度曲開安歌之浩唱想觀樂乎朝陽憶紆衣乎夕張回余舲之美風聳余棹乎雲陽彼桑梓之必敬況枌榆之舊鄉將遊目於五湖乃浩覽於姑蘇臨閶門之跨水聳重闕而開都睇太伯之卜祀爰避國於勾吳去西滸之樂政尊東夷之楷模時渡谷水之陽尚想嘉禾之方壯慶亭於吳后雄檇李於越王觀泉亭之涌波崖巍巍而峩峩張素蓋而縈洲嶼馳白馬而越江沱鼓洪濤於萬里曾未動於纎羅及戾止乎東甌登玉笥與銅牛山東武而遙集雁南海而飛浮巖亭亭其似蓋氣苕苕其若樓登舜橋而延首瞰禹井而淹留御史之狀猶在督護之門不修雖濫同於借寇愧人瘼之何求皇覽揆余之忠誠詔入謁於承明既攝州於淮海且作尹乎中京慕張生之擲伏挹邊延之勵精珥金貂而待問鳴玉佩而趨庭兼三河及三輔惣九緯乎九經揚王庭之俊選聞褎然於前則時濫假於中台掌邦教之觀國乍南宫而薦士且右鄉而表德判辟雍之樂語辨金馬之儒墨驅安居以騁望壯天居之麗極詳夫皇王爰處本無定所堯都平陽舜在冀方玄王居亳成周卜洛故知黃旗紫蓋域中為天地之所合風雨之所會蔭美氣之蔥蔥浮卿雲之靄靄聳梁山而成闕縈長淮而似帶昔者甘泉暉章平樂未央凌霄飛雨麒麟鳯凰九華仁夀百福明光玉階紫闈雕柱錦牆木蘭為棟文杏為梁溫臺冬燠秋忩夏涼甲乙之帳庚辛之枋未有秖園之右齊之仁夀用擬舟航長為稱首日殿月宫金池珠叢七重迢遞千柱玲瓏虹橋左跨雁苑南通紫紺之堂臨水青蓮之臺帶風及夫皎光未旭更籌曙促猶然陽燧之火尚執驪龍之燭或帶桃花之綬乍響玄山之玉爰八命而建旟誠非親而勿居應鳴鞞於龍角覆緹幕於熊車開轅門於淮渚泛艅皇之容與吟紫騮之長歌奏玄雲之疊鼓開右座而納文設左廣而投武既風起而雲飛復摧班而拉虎泛樓船而鬱紆憶霸楚之雄圖悲騅馬之不逝忘逐鹿之長驅豈烏江之天險資赤帝之神符於是途經灌壘水分當利彼吳王之連和延魏后之交質趙將軍之建節辛侍中之奉使亮鼎足其何言限修江而為二泊九井而問津蓋六服之都會方函谷之設險譬魯陽之襟帶觀棄繻之裂帛見髙車之輔軑顧濡須之故巘每當食而忘飯鬭二虎於江干爭兩龍於修坂既凱捷而來旋遂鳴鐃而獨返彼銅山之可傷何驕容之無方已築長洲之苑復實海陵之倉遂稱兵而內侮宜朝起而夕亡原西陵以肇基始衝梯於士治載為前茅之首實表勤王之師同薏苡之興謗成貝錦之深疑良弓藏而髙鳥盡入不謙而出不辭遊雷中而徜徉遇日吉而辰良祀公瑾以桂酒薦忠肅以椒漿實討曹之英䇿蓋謀桓之祕方衣披披而屢舞神欣欣而樂康弔劉安於下雉聊載懷於惇史或䇿杖而龍飛或叱石而羊起將雞鳴於天上遂埋魂於蒿里匪仙道之云偽蓋為仁其由已經釣臺而髙邁過鄂渚而西浮變青門之三襲為黃塵之一丘城逶迤而中斷階坂陀而半留分沙羡而啓鎮即開蕃於夏州星尚連於翼軫舍兼分於斗牛麗滄浪之水清良信美乎濯纓嗟其釣而非釣復何慮而何營羌有願而不獲拂蘭橈而上征冬已謝而春辭聊方舟而水嬉看白沙而似雪望却月而成眉臨石渚其如鏡玩弱栁其猶絲停赤壁而延佇聊愴望而方思吳水鄉之舟楫魏陸産之皋貔本吳長而魏短況地利與天時結憤風而炎上燎原火於驚颸灰霧霏而擊馬箭參差而麗龜成班車之逸氣碎當途於鹿麋分洞庭於吳上限東益於巴丘如淄澠之相别似涇渭之分流雖滔滔而直瀉終耿耿而橫浮想蘭香之薦枕懷娥皇之夜遊若夫子瑜設險之記閻遨遊泳之地既下車而踐境早詢求於方志曉泊鬻拳之津夕瞻荒谷之寺居栁下而布德坐棠陰而髙視班六條於宰邑賢十部於從事每題輿於仲舉豈虛名乎叔治藉務隙於登臨乃紛吾之本志時復設羽蓋揚旌斾乘雕玉從貝帶浮雲起登髙唐泛枉渚望涔陽荆棘生於龍門之下狐兔穴於馬牧之旁臨章華而流盼見舊楚之凄涼試極目乎千里何春心之可傷其舊渚宫也夾江帶阡布護井田通達交道髙門接連人要水心之劍家有給耕之田既追隨而得性實燕處而超然若平臺之中觀閣相通雄梁渡水壯翼臨空金堤之路銅鞮之宫閣寫凌霄樓布麗譙橫走馬而為觀擬牽牛而作橋爾乃樹之榛栗椅桐梓漆三色黃甘千戶朱橘桃蔭井而成蹊萍浮江而泛實蟬鳴枝而候稻范飛冠而吐蜜復有水底石髮山筋地骨書帶新抽屏風互發反魂長生靈夀女貞金鹽玉豉堯韭舜榮交讓之目代謝之名忘憂長樂枇杷鼓筝竹則篔簹緑篆交戰策皮淚沾虞后龍還葛陂便娟防露檀欒夾池聊右書而左琴且繼踵於華陰彼門人之問道各家求而有心先鉛擲於魚魯乃紛定於陶陰識三家之云謬知五門之可尋時仰稟於皇猷計巴濮於禆鯈乃稜威於華墨出車檻之云修觀月窟之入附覩日勒之來遊既虎牙而成號又龍額而為侯仰皇德之洪深疑朱離於侏任見白題之踏鼓看烏孫之學琴獻桂條之良賮奉桃枝之怪琛嗤聚米於馬援哂畫地於臧旻彼蠢爾之為鯁伊慿陵而未靜異黃巾於黑山非緑林於青嶺余喟然以指蹤實濟寬而持猛負步光之文劍驚漢陽之夕景麾靈琚之左轉光玳簮而右篸白雲生而陳合紅塵起而軍暗於是驅驌驦命蹶張回翠蓋之金瓜臨絳宫之玉堂擬都護之戊巳模荆尸之甲裳作齊軍之減竈斆燕師之卧牆觀田畯於虞澤命車右而前驅猶從戎於細栁若驅馬於長榆矜猿鳴之抱木傷兔走之依株每愀然而作色方載馳而轉軾閲放麑而興憫對亂鱗而動惻矧髙宴於城隅駐五馬而踟蹰乃有青琴碧玉絳樹緑珠西河王豹東野綿駒蘭缸夕然合璧斜天照流風之回雪映出水之初蓮非吾心之所悅曾未始而流連濫叨榮於分陜踰一紀之星躔子既生而冠字嗟留滯以回邅罷臨邊之瑞節觀楚黎之卧轍向秋野之蒼茫對寒江之幽咽散歸雲之鬱蓊吐長風之飉聞羌笛之哀怨聽胡笳之悽切慘余袂兮淚成行攀余轅兮不忍别奉信圭而入朝驅駟馬而乘軺既總司於戎旅亦兼飾於豐貂登贙踞而目極忽平原之巳超帶方逵之九軌接馳道之三條彼重門之擊析馮霞起以建標雜丹樓以藻井間青山於綺寮瞰落星之嵸巃覩霩火之迢繞鬱如蓬萊之臨滄海憬如崑崙之出絳霄函夏之所覿江漢之所朝若夫天不愛道地不愛寶賔連紫達華平朱草麒麟五色飛兔雙翼集我君圃之旁遊我帝梧之側于斯時也天子郊禘於員丘髙玉簡於東漢邁金版於西周奏蒼璧而服大裘樂有雲翹之舞牲非繭栗之牛設黃琮而禮地望方澤乎神州節會咸池之琯冕無繁露之旒觀三農乎九榖薦黍稷之穜稑命甸師而清塵詔封人而出宿敬青壇而致虞動翠耜而祈榖時季春之上巳臨祓禊乎沼沚杏花發於露寒棘實浮於濛泛爰長久之御節採日精於山趾天策夜而動星鈎陳朝而按軌豫是時也陪玉軑飾金羈驅騄駬躍翠羆乘倜儻控權奇寶劒昭晰綵陸離乍俯馬足時仰月支見靈烏之占巽觀司南之候離習執鞭而珥筆雖日夕而忘疲奧重明堂地景已乎正陽乃八窗而四達開上圓而下方置陰鑒之明水設圭瓉而盈觴誶天官乎冢宰服端委而辨方虔植物之藴藻鄙將饗之牛羊藉鴻私而置傳復推轂而懷方沂蛟川於匯澤沿鵠塞於潯陽何蠡川之浩浩而匡岫之蒼蒼其匡岫也盤紆崷崒嶾嶙鬱律峻極於天干霄秀出岑嶔崎􅤡烏兔蔽虧㟏岈豁闓背原靣野噴飛流於天末鼓雷霆於巖下聳髙館於雲中聯藂祠於星社雕甍綺閣吁可畏其欲落雲霧杳冥縈萬嶺而俱青照曜山莊岧嶤石梁雁門餘帳隆安故床鏡臨江而分影爐銜光而共香若乃羽族徘徊察風應雷鴛鴦感夢乾鵲知來露華挾雌而肅侣銜環帶壟而含猜孔接影而颻揚鶄交頸而毰毸爾其彭蠡際天用長百川沸渭渝溢瀲淡連延大則浩汗滉漾細則澆灌潺湲遇神颷之沸爽彼所報之無愆且搏搖以九萬乍髙颷而三千其中則有瀺灂嘉魚燕羽龍鬚戴星含石蒲身雉軀乍浮圓鏡時泛明珠報蕩子之長信送仙人之短書恥觀魚而為樂解舒雁於髙繳必冀孔愈之龜當如噲參之鶴愾衝冠而發憤嗟吾人之施薄觀進退於我生每篤靖而居貞羞為金谷之富不矯石閭之清每鞠躬而遵節藉王道之既平貴靜者人所便豫得之於自然非三百之不足惜五十於豐年笑汗斜之行潦喜甘雨於石田飛新梅於倡粉拂輕絮於房綿月芝抽而曉落燈花開而夜燃菊從風而金散荷帶水而珠圓已寤歌於折栁復行吟而採蓮課七分與六日推兩地於參天夕章程而鈎股亦刺注而參連幼墳藉以自娛迄方今而不渝雲氣芝英之簡懸針倒薤之書緘乎蒸栗之帙飾乎酸棗之珠擬河獻之留真希淳儒之席珍笑彭聃之下士聊重義而自欣鑿戶牖而長望混水雁而兼陳嗟今來而古往方絶筆於獲麟言志賦天文既表人文可觀知負扆之未易信握鏡之云難差立極而補天驗璧合而珠連有庖犧之八索稱朱襄之五絃聞夏王之鑄鼎重農皇之播田雖車軌之未同亶彌愧於棟隆戮封豕於海內斬長狄於區中懷宿昔之璵璠並來遊於莵園悲元瑜之已逝歎靈光之獨存想延賔之北閣因置酒於南軒聞鶯鳴而懷友聽長笛其何言夙有尚於清靜叨再人於鄢郢東窺文命之穴南望鴻崖之井遂撫運而登庸謬垂旒而卷領雖有愧於前英每求衣於未明召司烜而照夜觀執圭而滿庭誠雖休以勿休實旨酒之忘憂絶何楊之妙舞廢綿駒之善謳彼知止與知足復何營而何欲柱何用於黃金案寧勞於青玉爾乃髙步北園用蕩囂煩桂偃蹇而臨棟石穹隆而架門對灌木之修聳觀激水之飛奔澗不風而自響天無雲而晝昏聞賔鴻之夜飛想過沛而霑衣況登樓而作賦望淮海而思歸春賦洛陽小苑之西長安大道之東苔染池而盡緑桃含山而併紅露霑枝而重葉網縈花而曵風秋興賦秋何興而不盡興何秋而不傷傷二情之本背更同來而匪方復有登山望别臨水送歸洞庭之葉初下塞外之草前衰攸征人與行子必承臉而霑衣紛吾間居有怡優遊多暇乃息書幌之勞以命北園之駕爾乃從玩池曲遷坐林間淹留而蔭丹岫徘徊而搴木蘭為興未巳升彼懸崖臨風長想馮髙俯窺察遊魚之息澗憐驚禽之换枝聽夜籖之響殿聞懸魚之扣扉將據梧於芳杜欲連留而不歸臨秋賦火歇兮秋氣生風起兮秋潦清覽時興而自得聊飛轡而娛情遵二條之廣路背九仞之髙城爾乃登長坂息余驥攬筆舒情沈吟屬思草色雜而相同樹影齊而花異遙峰迢遞縈沙斷絶雲出山而相似水含天而難别對燭賦月似金波初映空雲如玉葉半從風恨九重兮夕掩怨三秋兮不同爾乃傳芳醁揚清曲長袖留賔待華燭燭燼落燭華明花抽珠漸落珠懸花更生風來香轉散風度焰還輕本知龍燭應無偶復訝魚燈有舊名燭火燈光一雙炷詎照誰人兩處情採蓮賦紫莖兮文波紅蓮兮芰荷緑房兮翠蓋素實兮黃螺於時妖童媛女蕩舟心許鷁首徐回兼傳羽杯棹將移而藻挂船欲動而萍開爾其纎腰束素遷延顧步夏始春餘葉嫩花初恐沾裳而淺笑畏傾船而斂裾故以水濺蘭橈蘆侵羅􅳭菊澤未反梧臺逈見荇濕霑衫菱長繞釧泛柏舟而容與歌採蓮於江渚歌曰碧玉小家女來嫁汝南王蓮花亂臉色荷葉雜衣香因持薦君子願襲芙蓉裳鴛鴦賦青田之鶴晝夜俱飛日南之雁從來共歸雙飛兮不息自憐兮何極一别兮經年相去兮幾千雄飛入玄兔雌去往朱鳶豈如鴛鴦相逐俱棲俱宿勝林鳥之同心邁池魚之比目朝浮兮浪華夜集兮江沙萍隨流而傅岸網因風而綴花見虹梁之春色復相鳴而戢翼蘭渚兮相依同盛兮同衰魂上相思之樹文生新市之機金雞玉鵲不成羣紫鶴紅雉一生分願學鴛鴦鳥連翩恆逐君蕩婦秋思賦蕩子之别十年倡婦之居自憐登樓一望惟見逺樹含煙平原如此不知道路幾千天與水兮相逼山與雲兮共色山則蒼蒼入漢水則涓涓不測誰復堪見鳥飛悲鳴雙翼秋何月而不清月何秋而不明況乃倡樓蕩婦對此傷情於時露萎庭蕙霜封階砌坐視帶長轉看腰細重以秋水文波秋雲似羅日黯黯而將暮風騷騷而渡河妾怨回文之錦君思出塞之歌相思相望路逺如何鬢飄蓬而漸亂心懷愁而轉歎愁縈翠眉斂啼多紅粉漫已矣哉秋風起兮秋葉飛春花落兮春日暉春日遲遲猶可至客子行行終不歸詔即位詔夫樹之以君司牧黔首帝堯之心豈貴黃屋誠弗獲已而臨蒞之朕皇祖太祖文皇帝積德岐梁化行江漢道應在田具瞻斯屬皇考髙祖武皇帝明並日月功格區宇應天從民惟睿作聖太宗簡文皇帝地侔啓誦方符文景羯寇憑凌時難孔棘朕大拯橫流克復宗社羣公卿士百辟庶僚咸以皇靈眷命歸運斯及天命不可以久淹宸極不可以久曠粵若前載憲章令範畏天之威算隆寶厯用集神器於豫一人昔虞夏商周年無嘉號漢魏晉宋因循以久朕雖云撥亂且非創業思得上繫宗祧下惠億兆可改太清六年為承聖元年逋租宿責並許𢎞貸孝子義孫可悉賜爵長徒鎖士特加原宥禁錮奪勞一皆曠蕩蠲免力田詔食乃民天農為治本垂之千載貽諸百王莫不敬授民時躬耕帝籍是以稼穡為寶周頌嘉其樂章禾麥不成魯史書其方册秦人有農力之科漢氏開屯田之利頃歲屯否多難薦臻干戈不戢我則未暇廣田之令無聞於郡國載師之職有陋於官方今元惡殄殲海內方一其大庇黔首庶拯橫流一㕓曠務勞心日灰一夫廢業潟鹵無遺國富刑清家給民足其力田之身在所蠲免外既宣勒稱朕意焉次建業詔夫爰始居亳不廢先王之都受命於周無改舊邦之頌頃戎旃既息關析無警去魯興歎有感宵分過沛殞涕實勞夕寐仍以瀟湘作亂庸蜀阻兵命將受律指期克定今八表乂清四郊無壘宜從青蓋之典言歸白水之鄉江湘委輸方船連舳巴峽舟艦精甲百萬先次建業行實京師然後六軍遄征九旗揚斾拜謁塋陵修復宗社主者詳依舊典以時宣力諡王僉詔賢而不伐曰恭諡恭子詔贈杜崱崱京兆舊姓元凱苗裔家傳學業世載忠貞自驅傳江渚政號廉能推轂淺源實聞清靜奄致殞喪惻愴於懷可贈車騎將軍加鼓吹一部諡曰武詔封王僧辨贊俊遂賢稱於秦典自上安下聞之漢制所以仰協台曜俯佐𢎞圖使持節侍中司徒尚書令都督楊南徐東揚三州諸軍事鎮衛將軍揚州刺史永寧郡開國公僧辨器宇凝深風格詳逺行為士則言表身文學貫九流武該七略頃歲征討自西徂東師不疲勞民無怨讟王業艱難實兼夷險宜其燮此中台膺兹上將寄之經野匡我朝猷加太尉車騎大將軍餘悉如故詔褎庾詵與劉之遴荆南信多君子雖美歸田鳯清屬桓階賞德標奇未過此子令答勸進羣下令大寶二年太宗崩王僧辨纍表勸即尊位世祖答讓孤以不德天降之災枕戈飲膽扣心泣血風樹之酷萬始不追霜露之哀百憂總萃甫聞伯升之禍彌切仲謀之悲若封豕既殱長蛇即戮方欲追延陵之逸軌繼子臧之髙讓豈資秋亭之壇安事繁陽之石侯景項藉也蕭棟殷辛也赤泉未賞劉邦尚曰漢王白旗弗懸周發猶稱太子飛龍之位孰謂可躋附鳯之徒既聞來議羣公卿士其諭孤之志無忽復答省示復具一二孤聞天生蒸民而樹之以君所以對揚天休司牧黔首攝提合雒以前栗陸驪連之外書契不傳無得稱也自阪泉彰其武功丹陵表其文德有人民焉有社稷焉或歌謠所歸或惟天所相孤遭家多難大恥未雪國賊則蚩尤弗剪同姓則有扈不賔卧而思之坐以待旦何以應寶厯何以嗣龍圖庶一戎既定罪人斯得祀夏配天方申來議也又答王僧辨等大寶三年二月王僧辨衆軍發自尋陽世祖馳檄告四方及僧辨等平侯景傳其首於江陵又奉表勸即尊位世祖答之省表復具一二羣公卿士億兆夷人咸以皇天眷命歸運所屬用集寶位於豫一人文叔金吾之官事均往願孟德征西之位且符前説今淮海長鯨雖云授首襄陽短狐未全革靣太平玉燭爾乃議之答南平王恪等令數鍾陽九時惟百六鯨鯢未剪寤寐痛心周粵天官秦稱相國東至於海西至於河南次朱鳶北漸玄塞率兹小宰𢎞斯大德將何用繼蹤曲阜擬迹桓文終建一匡肅其五拜雖義屬隨時事無虛紀傳稱皆讓象著鳴謙瞻言前典再懷哽恧解嚴令軍容不入國國容不入軍雖子産獻捷戎服從事亞夫弗拜義止將兵今凶醜殲夷逆徒殄潰九有既截四海乂安漢官威儀方陳盛禮衛多君子寄是式瞻便可解嚴以時宣勒課耕令軍國多虞戎旃未靜青領雖熾黔首宜安時惟星鳥表年祥於東秩春紀宿龍歌歲取於南畯況三農務業尚看夭桃敷水四人有令猶及落杏飛花化俗移風常在所急勸耕且戰彌須自許豈直燕垂寒谷積黍自溫寧可墮此玄苖坐餐紅粒不植燕空候蟬鳴可悉深耕溉種安堵復業無棄民力並分地利班勒州郡咸使遵承下四方令大壯承乾明夷垂翼璿度亟移玉律屢徙四嶽頻遣勸進九棘比者表聞譙沛未復塋陵永逺于居于處寤寐疚懷何心何顔撫兹歸運自今表奏所由並斷若有啓疏可寫此令施行赦餘黨令君子赦過著在周經聖人解網聞之湯令自獫狁孔熾長蛇薦食赤縣阽危黔黎塗炭終宵不寐志在雪恥元惡稽誅本屬侯景王偉是其心膂周石珍負背恩義今並烹諸鼎鑊肆之市朝但比屯邅冦擾為歲已積衣冠舊貴被逼偷生猛士勳豪和光茍免凡諸惡侣諒非一族今特闡以王澤削以刑書自太清六年五月二十日昧爽以前咸使惟新敕敕報司徒王僧辨僧辨先下辟書引孔奐為左西曹掾除丹陽左丞元帝於荆州即位徴奂及沈炯僧辨纍表請留帝手敕報之孔沈二士今且借公别敕王僧辨承聖三年十月西魏相宇文黑獺遣兵及嶽陽王衆合五萬將襲江陵世祖遣主書李膺徴僧辨於建康為大都督荆州刺史别敕僧辨黑獺背盟忽便舉斧國家猛將多在下流荆陜之衆悉非徑勇公宜率貔虎星夜就路倍道兼行赴倒懸也敕杜龕顔晃字元明琅琊臨沂人承聖初為中書侍郎龕為吳興太守專好勇力其所部多輕險少年世祖患之乃使晃管其書翰仍敕龕卿年時尚少習讀未既顔晃文學之士使相毗佐造次之間必宜咨稟教召學生教閣下昔楚王好詩沛王傳易猶且傳之不朽以為盛事況吾親承天旨聞禮聞詩方欲化行南國被於西楚表薦鮑幾表臣聞思皇多士仄陋所以明揚疇咨熙載髦俊所以並作斯固殷殿初基拾龍淵之寶虞祠始構獻鳯管之玉旌蒲出魯賁帛歸齊頌聲既興盛業斯在伏惟陛下則天緯地乘正馭才沙汰八風澄明六合叶龜登夢之客日賁於丘園韋轂投鈞之臣相望於魏闕故以物無遺寶矣振鷺有充庭之謳白駒罕空谷之詠洋洋濟濟無得而稱者焉臣誠愧知才識職非選舉竊以進賢上賞蔽賢顯戮敢緣斯義用舉所知伏見鮑幾門庭雍睦立身貞退博涉文史頗間刀筆忠公抗直出宰廉平雅志𢎞深安貧專靜解巾入仕三十餘年自遊臣府一紀於兹前宰東邑實有二魯之風近處南臺欲尊兩鮑之則伏揆天嚴已當簡在脫蒙顯居良局登以清貫將齊毛玠古人之服實同吳隱酌水之廉昔丁隈牧州陳顧翟之好禮徐靖為郡薦袁涣之篤學桓範驅傳先舉管寧朱則剖符亦稱董直臣才非往哲識愧前修輕塵聽覽伏待斧鉞請於州置學校表臣聞公宫之南四術四教司樂成均六詩六律韶濩既舞羽籥之道行焉黨孰兹備離經之志辨焉故不升嵩霍豈識乾行之峻不臨溟渤安知地載之厚洎乎秦焚金篆周亡玉鏡羣言爭亂諸子相騰書則夏侯歐陽易則神輸道訓詩乃齊魯毛韓傳稱周左張夾禮有曲臺王史之異樂有龍德趙定之殊伏惟陛下撫五辰而建五長播九德而道九州容成為厯興景雲之瑞伶倫吹律應黃鍾之琯撥亂反正經武也制禮作樂緯文也若非六經庖厨百家異饌三墳為瑚璉五典為笙簧豈能暴以秋暘紆就望之景濯以江漢播垂天之澤薦顧協表臣聞貢玉之士歸之潤山論珠之人出於枯岸是以芻蕘之言擇於廊廟者也臣府兼記室參軍吳郡顧協行稱鄉閭學兼文武服膺道素雅量邃逺安貧專靜奉公抗直傍闕知已志不自營年方六十家無妻子臣欲言於官人申其屈滯協必苦執貞退立志難奪可謂東南之遺寶矣伏惟陛下未明求衣思賢如渴爰發明詔各舉所知臣識非許郭雖無知人之鑒若守固無言懼貽蔽賢之咎昔孔愈表韓纘之才庾亮薦翟湯之德臣雖未齒二臣協實無慙兩士上忠臣傳表資父事君實曰嚴敬求忠出孝義兼臣子是以冬溫夏凊盡事君之節進思將美懷出奉之義羲軒改物殷周受命三能十亂九棘五臣靡不夙夜在公忠為令德若使縉雲得姓之子姬昌魯衛之臣是知理合君親孝忠一體性與率由因心致極臣連華霄漢慿暉日月三握再吐夙奉紫庭之慈春詩秋禮早蒙丹扆之訓宣帝褒德麟閣畫充國之形顯宗念功雲臺圖仲華之像遷荆州輸江州節表周有掌節之職漢有符節之令所以子孫慷慨忠肅勤劬無絶終古有髙前載臣自擁麾鶴塞執兹龍節幸逮銀山自溢玉燭調年雖免茂𢎞之譏竟微辛毗之勇啓東宫薦石門侯啓竊以鳯鳴朝陽必資藍田之寶龍門點額亦俟堂溪之珍是以紫玉見稱黃金為貴文傳夢鳥學重靈蛇點漆凝脂事逾衛玠渾金璞玉才匹山濤昔翟陽隱逸見稱庾亮陳平器局被薦無知以人廢言誠增竦讋進賢上賞伏待慈照慶東耕啓伏惟陛下敬授民時造幄藉圃漢之元鳯未足捧羈晉之太始非堪扶轂但承明侍從即事末由周南留滯伏深戀仰慶南郊啓大裘而冕陶匏以質黃鍾既奏雲門斯舞樂諧六變歌陳九德感天動神式展誠敬謝東宫賜白牙鏤管筆啓春坊漆管曲降深恩北宫象牙猥蒙霑逮雕鐫精巧似遼東之仙物圖寫奇麗笑蜀郡之儒生故知稽賦非工王銘未善昔伯喈致贈才屬友人葛龔所酬止聞通識豈若逺降鴻慈曲覃庸陋方覺琉璃無當隋珠過侈但有羡卜商無因則削徒懷曹植恆願執鞭謝敕送齊王瑞像還啓臣聞非晦非明法身凝寂有感有見渴仰赴幾伏惟陛下百姓為心宜觀種覺十方皆見普照王畿將使化行南國乃眷西顧江水安流大川利涉鮮雲靉靆暫掩晨離甘雨霏微猶藏宿霧髙明可仰與天花而俱落清梵騰空雜塤篪以相韻頂禮最勝敬謁法王瞻彼堵牆不足為喻立處針鋒弗云易擬臣身持淨戒心抃法流接足道周膜拜路左得未曾有喜躍充遍上東宫古迹啓師宜八分之巧元常三體之妙史籕李斯之篆梁鴻曹喜之書莫不總萃桂宫盈滿甲館竊以鸞驚之勢既聞之於索靖鷹跱之巧又顯之於蔡雍是以遊霧重雲傳敬禮之法鳥頡魚頏表楊泉之賦頗好六文多慙三禮尚方大篆既其牢落柱下方書何曾倣佛空慕河間之聚書竟微東平之獻表齊攸尺牘顧已缺然北海楷𨽻終成難擬謝上畫蒙敕褒賞啓臣簿領餘暇竊愛丹青雲臺之像終微髣佛宣室之圖更難擬議成蠅罕術畫馬疏文人非世將恩深晉帝之賞迹愧景山寵踰魏皇之詔謝東宫賚陸探微畫啓工踰畫馬巧邁圖龍試應玉池即看魚動還傍金屏復疑蠅集史遷暫覩懸識留侯之貌漢帝一瞻便見王嬙之像謝東宫賜彈棊局啓繹本慙遊藝彌愧拂巾鳯峙鷹揚信難議擬鳥跂星懸曾何髣佛蓮花未易玉屑不工緣邊之法庶遵細栁之陳徘徊之勢方希明月之樓子桓有錫聞於邃古季緒蒙賜即事可傳謝敇賜第啓竊以漢賜五倫實云清吏魏寵衛臻用旌庸直未如靈光輪奂睢陽爽塏北連城闕有似甄侯之舍東望市鄽榮深豫章之圃昔狼望未平冠軍辭宅馬池猶隔雍丘讓邸臣慙霍曹逺志但識君命無違再思庸陋九殞非答為妾夏玉安豐謝東宫賚錦啓舒將並石堪來暮雨榮持結纜剩可蕩舟秦川書字妙能八體鄴縣登髙真堪九日宋姬贈馬未足為榮馮媛乘車方兹非寵謝東宫賚辟邪子錦白楄等啓江波可濯豈藉成都之水登髙為豔取映鳯凰之文至如鮮潔齊紈聲髙趙縠色方藍浦光譬靈山試以照花含銀燭之狀將持比月亂含璧之暉謝東宫賚貂蟬啓挹婁之毳曲降鴻恩麗水之珍復蒙殊奬東平紫貂之賜非聞暖額中山黃金之錫豈曰附蟬坐變仲尼之容增暉允南之貌謝敕賜褥啓昔漢后錫貂魏君送褥未有玄兔來王黃龍作貢便覺肅眘非遙挹婁無逺謝東宫賚寶枕啓泰山之藥既使延齡長生之枕能令益夀黃金可化豈直劉向之書陽燧含火方得葛洪之説況復重安玳瑁獨勝瑰材方松非匹稱榴未擬謝東宫賚花叉啓茝亂九衢花含四照田文之珥慙於寶葉王粲之詠恧此乘蓮九官之璫豈直黃香之賦三珠之叉敢髙崔瑗之説況以麗玉澄暉逺過玳瑁之飾精金曜首髙踐翡翠之名上榖充軍糧啓臣聞金城千仞必資守粟革車千乘其在饋實願武車綏旌列飛鴻之行陳奉辭受賑掩摯獸於貙虎賈逵渠水雖曰難蹤梁習勸農竊知自勉謝東宫賚瓜啓金榮始薦瓊蘂載珍味奪蔗漿甘踰石蜜為妾𢎞夜姝謝東宫賚合心花叉啓未得投壺先應含笑不因鸞鳯自能歌舞夜姝昔往陽臺雖逢四照曾遊灃浦慣識九衢未有仍伐爵叉還勝翠羽飾以南金裝兹麗玉修靡夫人本分章華之裏中山孺子獨荷春宫之恩有志當熊無期投閣謝晉安王賜馬啓繹武愧仲都遂蒙大驪之錫儒謝春卿空頒名馬之賚故以取方驎友自匹龍媒不待景公婉如齊畫無勞馬援翻等漢銅豈有滅沒黑龍連翩白馬錢文見重津名取貴相彼騏驥猶深戀主矧伊伏櫪彌結懷恩謝東宫賚蒸栗牛啓色似祕府之書毛類陳王之玉騂角未奇瑩蹄非貴謝賚車螯蛤蜊啓車螯味髙食部名陳物志蛤蜊聲重前論見珍若士並東海波臣西王母藥雀文始化羽燕猶在體潤珠胎形隨月減謝東宫賚麈尾錦帔團扇等啓楊雄口訥夲貴談端田蚡貌寢終於麗飾始興之扇方斯非擬鄴中之錦匹此為輕方願𢎞此仁風既動承華之氣服兹懷袖復比文若之香謝賜功德淨饌一頭啓瑶器自滿金鼎流味漿含都蔗味資石蜜又謝賚功德食一頭啓天厨淨饌菴羅法果書與蕭咨議等書蓋聞圓光七尺上映真珠之雲靣門五色傍臨珊瑚之地化為金案奪麗水之珍變同珂雪髙玄霜之彩豈不有機則感感而遂通有神則智智而必斷故碧玉之樓升堂未易紫紺之殿入室為難必須五根之信以信為首六度之擅以檀為上故能捨財從信去有即空率斯而談良可知矣竊以瑞像放光倐將旬日蹈舞之深形於寤寐抃躍之誠結於興寢稍覺十字之蒸嗤何曾之饌五鼎之味笑主偃之辭黿羮麟脯空聞其説羊酪猩脣曷足云也困於酒食未若過中不餐螺蚳登俎豈及春蔬為淨欲吾於三日潔齋自寅至戌一中而已自有米如玉鋭鹽類虎形雲夢之芹遼東之藻十斤之梨千樹之橘青筍紫薑固栗霜棗適口充腸無索弗獲八功德水並入法流四土俱至偕讓𢎞道同志為友豈不盛歟答廣信侯書王白仰承比往開善聽講涅槃縱賞山中遊心人外青松白霧處處可悅奇峰怪石極目忘歸加以法水晨流天華夜落往而忘返有會昔言王率物從務無由獨往仰此髙蹤寸心如結答齊國雙馬書名重桂條形圖栁谷襄陽地穴近求未易滇池水裏逺訪猶難價匹龍媒聲齊驥子河精曜采似伏波之鑄銅震象飛文笑東瀛之刻玉加以控斯銀勒利此金銜鞍揭鏤衢光含兩月纒縈紫縷色麗雙絲方嗤晉后恆乘鄭國之駟更鄙曹君經餉蜀王之馬又答齊國雙馬書於戲馬之為用逺矣大矣斯所以乾為脊馬震為馵足有是哉有是哉何則泮涣而馳可以及日躊躇而蹀可以追風赤兔之騰聲的盧之濟主陳王有照羈之説班生有韁絆之談抑聞斯美逺勞此費懷哉懷哉老生不云乎雖有拱璧以先駟馬良用此道中心藏之何日忘之與學生書吾聞斫玉為器喻乎知道惟山出泉譬乎從學是以執射執御雖聖猶然為弓為箕不無以矣抑又聞曰漢人流麥晉人聚螢安有挾䇿讀書不覺風雨以至朗月章奏不知爝火為微所以然者良有以夫可久可大莫過乎學求之於巳道在則尊答晉安王敘南康簡王薨書南康兄器宇沖貴風神英挺魏之中山徒聞退讓晉之扶風雖號師範用今方昔若吞雲夢及尋陽私疾孝感神明殆不勝喪扶而後起猶冀天道可期豈謂福善虛説且分違易久嘉會難逢綢繆宫閫不過紈綺之事離羣作鎮動回星紀之厯志異雙鸞之集遽切四鳥之悲松茂柏悅夙昔歡忭芝焚蕙歎今用嗚咽答劉縮求述制旨義書學山學海未臻其極為龍為光或從王事所賴昔經陜服頗足良書憑凡據梧靜供遊目枕中之記即用為枕帷前之帙仍可為帷對此自娛敬而待命叩而必應已謝懸鏡汲而無竭復乖井養與蕭挹書濶别清顔忽焉已久未復音信勞望情深暑氣方隆恆保清善握蘭雲閣解紱龍樓允膺妙選良為幸甚想同僚多士方駕連曹雅步南宫容與自玩士衡已後唯在兹日唯昆與季文藻相暉二陸三張豈獨擅美比暇日無事時復含毫頗有賦詩别當相簡但衡巫峻極漢水悠長何時把袂共披心腹與武陵王書蜀中斗絶易動難安弟可鎮之我自當滅賊又地擬孫劉各安境界情深魯衛書信恆通與魏書武陵王紀帥兵東下梁主繹甚懼與魏書宇文泰曰取蜀制梁在兹一舉遣尉遲回自散關伐蜀下之子糾親也請君討之與劉孝綽書孝綽為廷尉正攜妾入府被劾免官時世祖為湘東王出鎮荆州與孝綽書孝綽答之君屏居多暇差得肆意典墳吟詠情性比復希數古人不以委約而能不技癢且虞卿史遷由斯而作想摛屬之興益當不少洛地紙貴京師名動彼此一時何其盛也近在道務間微得點翰雖無紀行之作頗有懷舊之篇至此已來衆諸屑役小生之詆恐取辱於廬江遮道之姦慮興謀於從事方且搴帷自厲求瘼不休筆墨之功曾何暇豫至於心乎愛矣未嘗有歇思樂惠音清風靡聞譬夫夢想溫玉飢渴明珠雖愧卞隨猶為好事新有所製想能示之勿等清慮徒虛其請無由賞悉遣此代懷數路計行遲還芳札與劉智藏書菩薩蕭法車置郵大士劉智藏侍者自林宗遄反玄度言歸以結元禮之心彌益真長之歎故以臨風望美對月懷賢有勞寤寐無忘興寢方今玄冥在節歲聿云遒日似青緹雲浮紅蘂清臺炭重北宫井溢想禪説為娛稍符九次成誦之功轉探三密山間芳杜自有松竹之娛巖穴鳴琴非無薜蘿之致修德之暇差足樂也昔韓梅兩福求羊二仲鄭林騰名於馮翊周黨傳芳於太原或有百鎰可捐千金非貴松子為餐蒲根是服未有髙蹈真儒歸宗法海梵王四鶴集林籞而相鳴帝釋千馬經丘園而局步有一於此猶或稱奇兼而總之何其盛也故知南臨之水已類吕梁之川北眺之山彌同武安之嶺豈復還思溆浦尚想強臺眷彼漢池載懷荒谷以此相求心可知矣僕久厭塵邦本懷人外加以服膺常住諷咏了因彌用思齊每增求友常欲登却月之嶺蔭偃蓋之松挹璇玉之源解蓮華之劔藩維有限脫屣無由每坐向詡之牀恆思管寧之榻夢匡山而太息想桓亭而延佇白雲間之蒼江不極未因扺掌我勞如何想無金玉數在郵示弱水難航猶致書於青鳥流川弗逺佇芳音於赤玉鶴望還信以待萱蘇得志忘言此寧多述法車叩頭叩頭與武陵王書皇帝敬問假黃鉞太尉武陵王自九黎侵軼三苗寇擾天常喪亂獯醜慿陵虔劉象魏黍離王室朕枕戈東下泣血西浮殞愛子於二方無諸侯之八百身被屬甲手貫流矢俄而風樹之酷萬恨始纒霜露之悲百憂繼集扣心飲膽志不圖全直以宗社綴旒鯨鯢未剪嘗膽待旦龔行天討獨運四聰坐揮八柄雖復結壇待將褰帷納士拒赤壁之兵無謀於魯肅燒烏巢之米不訪於荀攸才智將殫金貝殆竭傍無寸助險阻備嘗遂得斬長狄於駒門挫蚩尤於楓木怨恥既雪天下無塵經營四方專資一力方與嶽牧同兹清靜隆暑炎赫弟比如何文武具僚當有勞弊今遣散騎常侍光州刺史鄭安忠指宣往懷又與武陵王書甚苦大智季月煩暑流金鑠石聚蚊成雷封狐千里以兹王體辛苦行陳乃眷西顧我勞如何自獯醜慿陵羯胡叛涣吾年為一日之長屬有平亂之功膺此樂推事歸當璧儻遣使乎良所遲也如曰不然於此投筆友于兄弟分形共氣兄肥弟瘦無復相見之期讓棗推梨永罷歡愈之日上林靜拱聞四鳥之哀鳴宣室披圖嗟萬始之長逝心乎愛矣書不盡言與鮑泉靣如冠玉還疑木偶鬚似蝟毛徒勞繞喙與劉璠鄧禹文學尚或執戈葛洪書生且云破賊前修無逺屬望良深報顔之儀獻神洲頌枚乘二葉俱得遊梁應貞兩世並稱文學我求才子鯁慰良深遺周𢎞直書適有都信賢兄博士平安但京師縉紳無不附逆王克巳為家臣陸緬身充卒伍唯有周生確乎不拔言及西軍潺湲掩淚恆思吾至如望歲焉松柏後凋一人而已與周𢎞正書獯醜逆亂寒暑亟離海內相識零落略盡韓非之智不免秦獄劉歆之學猶弊亡新音塵不嗣每以耿灼常欲訪山東而尋子雲間西關而求伯起遇有今信方附相聞遲比來銜慰其延佇答王僧辨書昔文康獻橘十有二子用今方古彼有慙色今景之凶惡既稔凱歌之聲已及嘉瑞逺臻但增鯁慰下荆州處士河東韓懷明南平韓望南郡庾承先河東郭麻並脫落風塵髙蹈其事兩韓之孝友純深庾郭之形骸枯稿或橡飯菁羮惟日不足或葭牆艾席樂在其中昔伯武貞堅就仕河內史雲孤劭屈志陳留豈曰場苗實惟攻玉可加引辟並遣喻意既同魏侯致禮之請庶無辟疆三緘之歎遺王僧辨書僧辨等討侯景軍至巴陵聞郢州陷因留戍之湘東王繹遺僧辨書賊既乘勝必將西下不勞逺擊但守巴丘以逸待勞無慮不克與王僧辨帛書西魏兵伐江陵于謹令築長圍中外信命殆絶元帝裂帛為書趣王僧辨入援吾忍死待公可以至矣檄討侯景檄夫剝極生災乃及龍戰師貞終吉方制豶豕豈不以侵陽蕩薄源之者亂階定戡艱難成之者忠義故羿澆滅於前莽卓誅於後是故使桓文之勳復興於周代溫陶之績彌盛於金行粵若梁興五十餘載平一宇內德惠悠長仁育蒼生義征不服左伊右瀍咸皆仰化濁涇清渭靡不向風建翠鳯之旗則六龍驤首擊靈鼉之鼓則百神警肅風牧方邵之賢衛霍辛趙之將羽林黃頭之士獸賁緹騎之夫叱吒則風雲興起鼓動則嵩華倒拔自桐柏以北孤竹以南碣石之前流沙之後延頸舉踵交臂屈膝胡人不敢牧馬秦士不敢彎弓協和萬邦平章百姓十堯九舜曷足云也賊臣侯景胸奴叛臣鳴鏑餘噍懸弧空城本非國寶夀春畿要賞不踰月開海陵之倉賑常平之米檄九府之費錫三官之錢冒干貨賄不知紀極敢興逆亂梗我王畿賊臣正德阻兵安忍日者結怨江芉逺適單于簡牘屢彰彭生之魂未弭聚斂無度景卿之誚已及為獸傳翼逺相招致虔劉我生民離散我兄弟我是以董率皋貔躬擐甲胄霜戈照日則晨離奪暉龍騎蔽野則平原掩色信與江水同流氣與寒風俱憤凶醜畏威委命下吏乞活淮肥茍存徐兖渙汗既行絲綸爰被我是以班師凱歸休牛息馬賊猶不悛遂復矢流王屋兵躔象魏總章之觀非復聽訟之堂甘泉之宫永乖避暑之地坐召憲司卧制朝宰矯託天命偽作符書重增賦斂肆意裒剝生者逃竄死者暴尸道路以目庶僚鉗口刑戮失衷爵賞由心老弱波流士女塗炭臧獲之人五宗及賞縉紳之士三族見誅榖粟騰踴自相吞噬惵惵黔首路有銜索之哀蠢蠢黎民家有隕山之泣偃師南望無復儲胥露寒河陽北臨或有穹廬氊帳南山之竹未足言其愆西山之兔不足書其罪外監陳瑩之至伏承先帝登遐宫車宴駕奉諱驚號五內摧裂州寃本毒無地容身景阻飢既甚民且狼顧遂侵軼我彭蠡慿陵我郢邑竊據我江夏掩襲我巴丘我是以義勇爭先忠貞盡力斬馘凶渠不可稱算沙同赤岸水若絳河任約泥首於安南化仁面縛於漢口子仙乞活於鄢郢希榮敗績於柴桑侯景奔竄十鼠爭穴郭默清夷晉熙附義計窮力屈反殺後主畢原酆郇並離禍患凡蔣邢茅皆伏鐡鑕是可忍也孰不可容幕府據有上流實惟分陕投袂荷戈志在畢命昔周依晉鄭漢有虛牟彼惟末屬猶能如此況聯華日月天下不賤為臣為子兼國兼家者哉咸以義旗既建宜須總一共推幕府實用主盟粵以不佞謬董連率逺惟國艱不遑寧處中權後徑龔行天罰提戈蒙險隕越以之天馬千羣長戟百萬驅賁獲之士資智勇之力大楚踰荆山淺源度彭蠡舳艫泛水以犄其南輜軿委輸以衝其北華夷百濮贏糧景從雷震風駭直指建業按劍而叱江水為之倒流抽戈而揮皎日為之退舍方駕長驅百道俱入夷山殄谷充原蔽野挾輈曵牛之侣拔距磔石之夫騎則逐日追風弓則吟猿落雁捧崑崙而壓卵傾渤海而灌螢如駟馬之載鴻毛若奔牛之觸魯縞以此衆戰誰能禦之脫復蜂蠆若毒獸窮則鬬謂山蓋髙則四郊多壘謂地蓋逺則三千弗違如彼怒蛙譬諸鼷鼠豈費萬鈞無勞百鎰加以日臨黃道兵起絳宫三門既啓五將咸發舉整整之旗掃亭亭之氣故以臨機密運非賊所解奉義而誅何罪不服今遣使持節大都督征東將軍開府儀同三司江州刺史尚書令長寧縣開國侯王僧辨率衆十萬直掃金陵鳴鼓聒天摐金振地朱旗夕建如赤城之霞起戈船夜動若滄海之奔流計其同惡不盈一族君子在野小人比周荷挍滅耳匪朝伊夕舂長狄之喉繫郅支之頸今司寇明罰鑕鈇所誅止侯景而已黎元何辜一無所問諸君或世樹忠貞身荷寵爵羽儀鼎族書勳王府俯眉滑豎無由自效豈不下慙泉壤上愧皇天失忠與義難以日立懸誠南風乃眷西顧因變立功轉禍為福有能縛侯景及送首者封萬戶開國公絹布五萬匹有能率動義衆以應官軍保全城邑不為賊用上賞方伯下賞剖符並裂山河以紆青紫昔由余入秦禮同卿佐日磾降漢且珥金貂必有其才何恤無位若執迷不反拒逆王師大軍一臨刑兹罔赦孟諸焚燎芝艾俱盡宣房河決玉石同沈信賞之科有如皎日黜陟之制事均白水檄布逺近咸使知聞論全德志論物我俱忘無貶廊廟之器動寂同遣何纍經綸之才雖坐三槐不妨家有三徑但接五侯不妨門垂五栁使良園廣宅面水帶山饒甘果而足花卉葆筠篁而玩魚鳥九月肅霜時饗田畯三春捧繭乍酬蠶妾酌升酒而歌南山烹羔豚而擊西缶或出或處並以全身為貴優之遊之咸以忘懷自逸若此衆君子可謂得之矣鄭衆論漢世銜命胸奴困而不辱者二人而已子卿手持漢節卧伏冰霜仲師固無下拜隔絶水火況復風生稽落日隱龍堆翰海飛沙皋蘭走雪豈不酸鼻痛心憶雒陽之宫陛屑泣橫悲想長安之城闕直以為臣之道義不為生事君之節生為義盡豈望拔幽泉出重仞經長樂抵未央及還望塞亭來依候火傍觀上郡側眺雲中雖在已之願自隆而於時之報未盡議髙祖武皇帝諡議臣聞翼善傳聖曰堯仁聖盛明曰舜受禪成功曰禹除虐去殘曰湯諡者行之迹號者功之表雖賤不誄貴卑不誄尊而彰乎名者盛德之嘉號也被於物者治定之實録也斯所以聲名煥乎鐘石昭晰備於絃管者焉伏惟天縱欽明惟睿作聖功超三五聲踰七十仰之彌髙就之彌逺載潛載躍乃武乃文先是木運告終羣后改屬乾維罔搆地紐如崩桃紀阽危公卿旰食九牧有淪胥之悲八表興橫流之歎乃凝威黑水表瑞丹陵雲合景從表裏禔福受終文祖允恭克讓知黔首不可以無歸蒼生不可以無主降汾陽之逺志不得已而臨之於是類帝禋宗革命創制禘郊式展殷薦斯潔臨兹大寶化與和氣俱宣扇此王風政與秋霜並肅言懸日月功格區宇不以紫宸為貴不以黃屋為尊政謐刑措民殷國阜虹旌式卷堡燧載清胥象相因環楛無曠天衢亨泰王道升平南海候風東溟奉貢膏露凝枝慶雲觸石山開蒼璧地出玄圭驃騎把鉞則休屠欵塞大尉抗旌則名王蹶角聲教所漸浹靈蛇之都威令所行通燭龍之外開庠建序布濩於成均正俗移風氛氲於司樂虛納十亂引諒直之規廣闢四門𢎞招賢之德青襟知擊壤之性黃髮恣鼓腹之歡加以鑽味微言研精至道文終所牧之典史倚所讀之書無輟萬機日且千遍馳郁郁之聲表乾乾之德允所謂皇哉日用而不知者矣方且告成岱嶽鏤升平之玉簡昭事梁甫祕禮首之金繩而文王明夷事侔往册黃帝橋山痛深前典萬有淪傷三辰掩曜人祇軫慕山海含悲慟切陟方哀深遏密煩􅬁荼毒貫切心髓風樹不靜陟岵何期思所以欽若九功仰稽七德序簡文帝法寶聯璧序竊以觀乎天文日月所以貞麗觀乎人文藻火所以昭發況復玉毫朗照出天人之表金牒空解生文章之外雖境智冥焉言語斯絶詠歌作焉可略談矣粵乃書稱湯誥篇陳夢説昔則王畿居亳今則帝業維揚功施天下我之自出豈與姚墟石紐譙城溫縣御龍居夏唐杜入周而已哉皇帝垂衣負扆辨方正位車書之所會同南暨交趾風雲之所沾被西漸流沙武實止戈秉宜生之劒樂彰治定減庖犧之瑟相兼二八知微知彰將稱四七如貔如虎寧俟容成翠屋之遊廣成石室之會故以宗心者忘相歸慿者常樂昔轉輪獲法南宫有金龍之瑞梵天請道東朝開寶蓋之祥盡善盡美獨髙皇代古者所以出師入保冬羽秋籥實以周頌幼沖用資端士漢盈末學取慿通議大傳之論孟侯小戴之談司業山川珍異俟郊迎而可知帷幄後言藉墾田而求驗以今方昔事則不然我副君業邁宣尼道髙啓筮之作聲超姬發寧假卞蘭之頌譬衡華之峻極如渤澥之波瀾顯忠立孝行修言道博施尚仁動微成務智察舞雞爻分封蟻爰初登仕明試以功德加三輔威行九流董師虎據操鈹蟬冕津鄉沈濟物仰平分之恩沂岱卭岷民思後來之政陳倉留反裘之化淮海髙墨幘之聲威漸黃支化行赤谷南通舜玉北平堯栁朝鮮航海夜郎款塞然後體道方震雨施雲行漢用戊申晉維庚午增暉前曜獨擅元貞恩若春風惠加冬日履道為輿策賢成駟降意韋編留神緗帙許商算術王圍射譜南龜異説東馳雜賦任良奕棊羡門式法針興琴劒銘自盤盂無不若指諸掌尋涇辨渭重以鳯艷風飛鸞文颷豎纎者入無倫大者含元氣韻調律吕藻震玄黃豈俟取讚彥先詢聞雅主至於鹿苑深義龍宫奧説逺命學徒親登講肆詞為憲章言成楷式往復王粲事軼魏儲酬答蔡謨道髙晉兩似懸鐘之應響猶衢尊之待酌率爾者踵武逖聽者風聲是使金堅閉法寶冥夕夢無懷不滅華胥夜感自非建慧橋明智劒薰戒香沐定水何以空積忽微塵賢劫而終現黍纍回幹藴珠藏而方傳加以大秦之籍非符八體康居之篆有異六爻二乘始闢譬馬傳兔一體同歸棄犀崇象潤業滋多見思平積本有凝邈了正相因雖談假績不攝單影即此後心還蹤初焰俱宗出倒蓮華起乎淤泥並會集藏明珠曜於貧女性相常空般若無五時之説不生煩惱涅槃為萬德之宗無不酌其菁華撮其旨要採彼玳鱗拾兹翠羽潤珠隨水抵玉崑山每至鶴關旦啓黃綺之儔朝集魚燈夕爛陳吳之徒晚侍皆仰稟神規躬承睿旨爰錫嘉名謂之聯璧聯含珠而可擬璧與日而俱升以今歲次攝提星在監德百法明門於兹總備千金不刋獨髙斯典合二百二十卷號曰法寶聯璧雖玉杯繁露若傍兼葭金臺鑿楹似吞雲夢繹自伏櫪西河攝官南國十回鳯琯一奉龍光筆削未勤徒榮卜商之序稽古盛則文慙安國之製謹抄纂爵位陳諸左右使持節平西將軍荆州刺史湘東王繹年二十七字世誠侍中國子祭酒南蘭陵蕭子顯年四十八字景暢散騎常侍御史中丞彭城劉溉年五十八字茂灌散騎常侍步兵挍尉東官侍南琅邪王修年四十二字彥逺吳郡太守前中庶子南琅邪王規年四十三字威明都官尚書領右軍將軍彭城劉孺年五十五字孝稚太府卿步兵挍尉河南褚球年六十三字仲寶中軍長史前中庶子陳郡謝僑年四十五字國美中庶子彭城劉遵年四十七字孝陵中庶子南琅邪王稚年四十五字孺通宣城王友前僕射京兆韋稜年五十五字威直前御史中丞河南褚澐年六十字士洋北中郎長史南蘭陵太守陳郡袁君正年四十六字世忠中散大夫金華宫家令吳郡陸襄年五十四字師卿中散大夫琅邪王藉年五十五字文海新安太守前家令東海徐摛年六十四字士繢前尚書左丞沛國劉顯年五十三字嗣芳中書侍郎南蘭陵蕭幾年四十四字德玄雲麾長史尋陽太守前僕射東海徐喈年四十二字彥雍前國子博士范陽張綰年四十三字孝卿輕車長史南蘭陵蕭子範年四十九字景則庶子吳郡陸罩年十八字洞元庶子南蘭陵蕭瑱年四十字文啓祕書丞前中舍人南琅邪王許年二十五字幼仁宣城王文學南琅邪王訓年二十五字懷範洗馬權兼太府卿彭城劉孝儀年四十九字子儀洗馬陳郡謝禧年二十六字休度中軍録事前洗馬彭城劉藴年三十三字懷芬前洗馬吳郡張孝總年四十二字孝總南徐州治中南蘭陵蕭子開年四十四字景發平西中録事參軍典書通事舍人南郡庾肩年四十八字子慎北中記室參軍潁川庾仲容年五十七字仲容宣惠記室參軍南蘭陵蕭滂年三十二字希傳舍人南蘭陵蕭清年二十七字元專宣惠主簿前舍人陳郡謝嘏年二十五字茂範尚書都官郎陳郡殷勸年三十字𢎞善安北兵曹參軍彭城劉孝威年三十九字孝威前尚書殿中郎南蘭陵蕭愷年二十九字元才內典碑銘集林序夫法性空寂心行處斷感而遂通隨力引接故鵲園善誘馬苑𢎞宣白林將謝青樹已列是宣金牒方寄銀身自象教東流化行南國吳主至誠歷七霄而光曜晉王畫像經五帝而彌新次道孝伯嘉賔玄度斯數子者亦一代名人或修理止於伽藍或歸心盡于談論銘頌所稱興公而已夫披文相質博約溫潤吾聞斯語未見其人班固碩學尚云讃頌相似陸機鉤深猶聞碑賦如一唯伯喈作銘林宗無愧德祖能誦元常善書一時之盛莫得係踵況般若玄淵真如妙密觸言成纍係境非真金石何書銘頌誰闡然建塔紀功招提立寺或興造有由或誓願所記故鐫之立石傳諸不朽亦有息心應供是曰桑門或謂智囊或稱印手髙座擅名預伊師之席道林見重陪飛龍之座峩眉廬阜之賢鄴中苑鄧之哲昭哉史册可得而詳故碑文之興斯焉尚矣夫世代亟改論文之理非一時事推移屬詞之體或異但繁則傷弱率則恨省存華則失體從實則無味或引事雖博其意猶同或新意雖奇無所倚約或首尾倫帖事似牽課或闕復博涉體製不工能使艷而不華質而不野博而不繁省而不率文而有質約而能潤事隨意轉理逐言深所謂菁華無以間也豫幼好雕蟲長而彌篤遊心釋典寓目詞林頃常搜聚有懷著述譬諸法海無讓波瀾亦等須彌同歸一色故不擇髙卑唯能是與倘未詳悉隨而足之名為內典碑銘集林合三十卷庶將來君子或禆觀見焉職貢圖序竊聞職方氏掌天下之圖四夷八蠻七閩九貉其所由來久矣漢氏以來南羌旅距西域慿陵創金城開玉關絶夜郎討日逐覩犀甲則建朱崖聞蒲萄則通大宛以德懷逺異乎是哉皇帝君臨天下之四十載垂衣裳而賴兆民坐巖廊而彰萬國梯山航海交臂屈膝占雲望日重譯至焉自塞以西萬八千里路之狹者尺有六寸髙山尋雲深谷絶景雪無冬夏與白雲而共色冰無早晚與素石而俱貞踰空桑而歷昆吾度青丘而跨丹穴炎風弱水不革其心身熱頭痛不改其莭故以明珠翠羽之珍細而弗有龍文汗血之驥郤而不乘尼丘乃聖猶有圖人之法晉帝君臨實聞樂賢之象甘泉寫閼氏之形後宫玩單于之圖臣以不佞推轂上遊夷歌成章胡人遙集欵開蹶角沿泝荆門瞻其容貌欣其風俗如有來朝京輦不涉漢南别加訪採以廣聞見名為貢職圖云爾忠臣傳序夫天地之大德曰生聖人之大寶曰位因生所以盡孝因位所以立忠事君事父資敬之理寧異為臣為子率由之道斯一忠為令德竊所景行且孝子烈女逸民咸有别傳至於忠臣曾無述製今將發篋陳書備加論討忠臣傳死節篇序自非識君臣之大體鑒生死之𢎞分何以能滅七尺之軀殉一顧之感然平路康衢從容之道進危塗險徑忠貞之節興登平路者易為功涉險塗者難為力從容之用世不乏人忠貞之概時難屢有孝德傳序夫天經地義聖人不加原始要終莫踰孝道能使甘泉自滔鄰火不焚地出黃金天降神女感通之至良有可稱全德志序老子言全德歸厚莊周云全德不刑吕覽稱全德之人故以全德創其名也此志隆大夫為首伊人有學有辨不夭不貧寶劍在前鼓琴從後連環灸輠雍容卒歲駟馬髙車優遊宴喜既令公侯踞掌復使要荒蹶角入室生光豈非盛矣若乃河宗九䇿事等神鈎陽雍雙璧理歸玄感南陽樊重髙閣連雲北海公沙門人成市咨此八龍各傳一藝夾河兩郡家有萬石人生行樂止足為先但使樽酒不空坐客恆滿寧與孟嘗問琴承睫淚下中山聽樂悲不自禁同年而語也丹陽尹傳序傳曰大夫受郡漢書曰尹者正也及其用人實難授受廣漢和顔接下子髙自輔經術孫寶行嚴霜之誅袁安留冬日之愛自二京板蕩五馬南渡固乃上燭天文下應地理爾其地勢可得而言東以赤山為成皋南以長淮為伊洛北以鍾山為華阜西以大江為黃河既變淮海為神州亦即丹陽為京尹雖得人之盛頗愧前賢而眄遇之深多用宰輔皇上受圖負扆寶厯惟新制禮以告成功作樂以彰治定豈直四三皇六五帝孕夏陶周而已哉若夫位以德敘德以位成每念忝蒞京河茲焉四載以入安石之門思勤王之政坐真長之室想清談之風求瘼餘晨頗多暇景今綴采英賢為丹陽尹傳懷舊志序吾自北守琅臺東探禹穴觀濤廣陵面金湯之設險方舟宛委眺玉笥之干霄臨水登山命儔嘯侣中年承乏攝牧神州戚里英賢尚冠髦俊蔭真長之弱栁觀茂𢎞之舞鶴清酒繼進甘果徐行長安郡公為其延譽扶風長者刷其羽毛於是駐伏熊回結駟命鄒湛召王祥顧而言曰斯樂難長誠有之矣日月不居零露相半素車白馬往矣不追春華秋實懷哉何已獨軫魂交情深宿草故備書爵里陳懷舊焉洞林序蓋聞玄枵之野鬼方難測朱鳥之舍神道莫知而緹幔曉披既辨黃鍾之氣靈臺夕望便知玉井之色復以談乎天者雖絶名言之外存乎我者還居稱謂之中余幼學星文多歷歲稔海中之書略皆尋究巫咸之説偏得研求雖紫微迢遞如觀掌握青龍顯晦易乎窺覽羡門五將亟經玩習韓終六王常所寶愛至如周王白雉之筮殷人飛燕之卜蓍名聚雪非關地極之山卦有密雲能擁西郊之氣爻通七聖世經三古山陽王氏真解談玄河東郭生才能射覆兼而兩之竊自許矣廬山碑序夫日月麗天皇穹所以貞觀川嶽帶地后土所以維寧廬山者亦南國之德鎮雖林石異勢而雲霞共色長風夜作則萬流俱響晨鼯曉吟則百嶺齊應東瞻洪井識曵白之在兹西望石梁見指寶之可拾誠復慕類易悲山中難久攀蘿結桂多見淹留忠臣傳諌諍篇序富貴寵榮人所不能忘也刑戮流放人所不能甘也而士有冒雷霆犯顔色吐一言終知自投鼎鑊取離刀鋸而曾不避者其故何也蓋傷茫茫禹迹毁於一朝赫赫宗周滅成禾黍何者百世之後王化漸頽欽若之信既盡解網之仁已泯徒以繼體所及守器攸歸出則清警傳路處則慿玉負扆事無暫舛意有必從所謂生於深宫之中長於婦人之手未嘗知憂未嘗知懼況惑褒人之巧笑迷陽阿之妙舞重之以刳斫用之以逋逃亦有傾天滅地汗宫瀦社之罪拔本塞源裂冠毁冕之釁於是䇿名委質守死不二之臣以剛腸疾惡之心確乎貞一之性不忍見霜露麋鹿棲於宫寢麥穗黍離被於宗廟故瀝血抽誠披胸見欵赴焦爛於危年甘滅亡於昔日冀桐宫有返道之明望夷無不言之恨而九重懸逺百雉嚴絶丹心莫亮白刃先指見之者掩目聞之者傷心然後鳴條有不收之魂商郊至白旗之戮揚州梁安寺碑序竊以陽之有宗者莫擬於靈鳥夜之有光者孰踰於陰兔故以日門見羲和之色月殿望奔娥之象而合璧迢遞丈尺猶且莫量朗鏡悠逺積空之所不算復有紫鳯青龍之水却月朝霞之山白圭玄璧餞瑶池之上銀闕金宫出瀛州之下空臺四柱隨仙衣而俱揚寶塹三重映瑞園而涵影旃檀散馥無復圓覺之風地涌神龕皆成多寶之塔與張纘詩序簡憲之為人也不事王侯負才任氣見余則申旦達夕不能已巳懷夫人之德何日忘之贊忠臣傳寄託篇贊太真英挺投袂勤王伯猷蹈節身殞名揚嶷嶷景倩主亡與亡嗟乎尚矣惟國之良忠臣傳諌諍篇贊子政鏗鏗誠存社稷朱雲折檻遂其婞直忠臣傳執法篇贊設官分職咸曰師師彼已之子邦之直司豺狼當路安問狐狸昏明有世直道無時孝德傳皇王篇贊天子之孝曰聖與仁重瞳表德參漏通神皇矣髙祖連鑣舜禹天經地義重規沓矩道踰七十聲超三五孝德傳天性篇贊生之育之長之畜之顧我復我答施何時欲報之德不可方思涓塵之孝河海之慈廢書歎息泣下漣洏職貢圖贊北通玄兔南漸朱鳶交河悠逺合浦回邅兹海無際陰山接天遐哉鳥穴永矣雞田銘漏刻銘玉衡稱物金壺博施司南司火未符兹義帝曰欽哉納隍斯譬實惟簡在窮神體智宫槐晚合月桂宵暉清臺莫爽解谷胥依七分六日五祀三微事齊幽贊乃會通幾碧海有乾絳川猶竭飛流五色涓涓靡絶龍首旁注仙衣俯裂箭不停晷聲無暫輟用天之貞分地之平如弦斯直如渭斯清東宫後堂仙室山銘太華削成本擅奇聲峰如雪委嶺若蓮生雲除紫蓋霞通赤城金壇是籙玉記題名鳯依桐樹鶴聽琴聲殿接南箕橋連北斗秋河從帶春禽銜綬朱鳥安窗青龍作牖香爐銘蘇合氤氲非煙若雲時穠更薄乍聚還分火微難盡風長易聞孰云道力慈悲所薰梁安寺剎下銘阿閣峞􅳽洞房䆗窕似靈光之金扇類景福之銀鋪垂琬琰之文璫飾琅玕之仙寶神童戾止亟連翩於威鳯薩埵來遊屢徘徊於紺馬有識之所虔仰無著之所招提觀慧樓而下拜望天街而興善辭曰塵沙無始造色無先飛蛾不息縈蠶自纒篋蛇未斷藤鼠方緣苦流長泛愛火仍燃髻珠孰曉懷寶詎宜挺兹靈覺時惟天仙真藉表聖化乳稱權寶剎千道髙翻四懸鳯樓含日龍臺吐煙紫山翠羽紅水青蓮雪宫月殿晨暉夜圓宵長梵響風逺鐘傳仙衣有拂靈剎無邊碑皇太子講學碑皇太子洊雷種德重離作兩業冠孟侯道髙上嗣宫牆纍仞髙山仰止承華之闈更似通德之門博望之園反類華陰之市家丞庶子并入四科洗馬後車俱通六學轉金路而下辟雍晬玉容而經槐市詳其懸鏡髙堂衢樽待酌瞻後忽前博文約禮將使東極長男之宫不獨銘於銀榜南皮太子之序豈徒擅於金碑鍾山飛流寺碑清梵夜聞風傳百常之觀寶鈴朝響聲揚千秋之宫同符上隴望長安之城闕有類偃師瞻洛陽之臺殿瞰連薨而如綺雜卉木而成帷銘曰雲聚峰髙風清鐘徹月如秋扇花疑春雪極目千里平原迢遞曠野寺碑雲楣膠葛桂棟陰崇刻虬龍於洞房倒蓮花於綺井月殿朗而相暉雪宫穆以華壯䡾䡾璇題虹梁生于暮雨嶫嶫銀榜飛觀入乎雲中銘曰圓璫旦輝方諸夜朗金盤曜色寶鈴成響郢川晉安寺碑鳯凰之嶺芊綿映色蓮花之洞照曜增暉山云黃鶴疑鈞天之夜響城稱却月似輕雲之霄蔽銘曰虹梁紫柱螭桷丹牆綺井飛棟華榱璧璫應龍若動威鳯疑翔玉磶霄潤金池夕光朱城却稅紫陌潛通塹栁朝緑江暉暝紅落霞將暮鮮雲夕布峰下陽烏林生陰兔分珮隔浦皇檣隱霧俱聽法鐘同觀寶聚攝山栖霞寺碑金池無底已通寶塹之側玉樹生風傍臨綵船之上七重欄楯七寶蓮花通風承露含香映日銘曰苔依翠屋樹隱丹楹澗浮山影山傳澗聲風來露歇日度霞輕三災不毁得一而貞歸來寺碑幡影揚於絳臺梵聲依於應塔三相不留蕭蠶終壞八苦遐長燈蛾未巳銘曰鈴隨風振盤依露泫丹桂無枝朱楊自剪九苑萌枯三昧葉卷疏樹搖落翻流清淺南嶽衡山九貞館碑簫鼓騰空煙霞相接星辰奪采燈燭非明風牖雲梁千門萬户樓施九柱已同瀨鄉之地山帶五城復類玄州之所玉版之經猶藴金丹之處存焉上月臺而遺愛登景雲而忘老欣欣然不知所以而然日暉石瓦東眺靈夀之峰月蔭玉牀西瞻華蓋之嶺竹類黃金既葳㽔而防露木似紅蓮且芬披而拂日杯傳九醖隱淪之車晨至堂開四扇西楹之鐘夜響青溪山館碑原夫法象莫過於天地著明莫過于日月鼓之以雷電潤之以風雨咸秩無文所以名山致祭峻極於天青溪山者荆南之中嶽也隱隱干霄亭亭無際雲蓋三層如在帝臺之側桂林八樹非異景山之傍輕霞亘起影落照於陽溪清風逺至響猿鳴於巫峽西臨百丈之穴南帶千仞之水洪源湛淡長波縈復隱居先生陶𢎞景碑昔太和中有許逺遊者乃雲霄之勝賔太虛之選客先生規同矩合實踵髙步曩基先搆即駕胥宇千尋危聳慿牖以望奔星百拱髙懸倚櫺而觀朝日飛流界道似天漢之橫波觸石起雲若奇峰之出岫銘曰肇彼𡨕默翻成協贊身託外臣心同有亂重道尊德爰積睿衷顧懷紛射璽問遙通朱楊鬱起華搆方崇靜臺冠月經榭迎風嶕嶢髙棟窅靄修櫳極望山川周觀京陸碧嶂千嶺清流萬谷景落崖重煙生岫復荆州長沙寺阿育王像碑蓋聞璇璣玉衡穹昊所以紀物金版玉文淳精所以播氣何則咸秩社首義盡於寰中鑄鼎馮翊未窮於系表況復道冠萬靈理超千聖智周十地行圓四等變海成蘇移山入芥針鋒廣説藕絲見道惠音八種面門五色組鉢生華入青樓而吐曜金牀照采出紫殿而相輝才度蓮河即處天冠之寺始遊羅衛便居堅固之林斯蓋俯應閻浮未臻常樂降情誘接豈窮妄相若乃鏡無引汲智生淺深明同一體惑起十重七地初刃方稱變易三違後心因窮智種然俱冥四德脫屣雙林示表金棺現焚檀椁浩浩焉不可知巳却望五津距青蓮之洞傍臨三天帶明月之流莊嚴寺僧旻法師碑夫宏才妙物雲液之所降生獨振孤標倫類之所逺絶是故隨光燭魏非折水之恆珍和璧入秦豈潤山之常寶僧旻法師蓋天地之淳精宇宙之瓌器本姓孫氏有吳開國大皇帝其先也法師道藹二儀德充四海含春夏之生長抱日月之貞明辭旨清新置言間逺千門萬户必臻其奧九部五時若指諸掌坦然夷易豁爾洞開故緇素結轍華戎延道晨風之鬱北林龍魚之趣深澤哲人云逝指南誰屬銘曰永離百非聞之寂滅茍云未樹共歸今轍方墳結構伽藍罷設朱火一潛青松長列光宅寺大僧正法師碑昻昻千里孰辨騏驎之蹤汪汪萬頃誰識波瀾之際望之若披雲霧覩之如觀日月至乃耆年宿望蓄思搆疑懸鐘無盡短兵有倦猶若分旦望景履冰待日莫不傾河注燭虛往實歸皇帝革命受圖補天紉地轉金輪于忍土䇿紺馬於閻浮逸翮方超圖南輟軌豈直盡兹相府署彼義年方當髙步仙階永編金牒繁霜凝而旦委松風凄而暮來悲馬鳴之不反望龍樹而心哀銘曰澄月夜虧清氣旦卷層巒逺岸蒼江傍緬玄圃牛渚磯碑竊以增城九重仙林八樹未有船如雁鶴時度宓妃橋似牽牛能分織女丹鳯為羣紫柱成列清風韻響即代仙歌桂影浮池仍為月浦璧月朝暉金樓啓扉畫船向浦錦纜牽磯花飛拂袖荷香入衣山林朝市併覺忘歸善覺寺碑金盤上疏非求承露玉舄前臨寧資潤礎飛軒絳屏若丹氣之為霞綺井緑泉如青雲之入吕寶繩交映無慙紫紺之宫花臺照日有迹白林之地銘曰聿遵勝業代彼天工四園枝翠八水池紅花疑鳯翼殿若龍宫銀城映沼金鈴響風露臺含月珠幡拂空荆州放生亭碑魚從流水本在桃花之源龍處大林恆捻浮雲之路豈謂陵陽垂釣失雲失水莊子懸竿吞鈎吞餌雖復玄龜夜夢終見取於宋王朱鷺晨飛尚張羅於漢后譬如黃雀伺蟬不知隨彈應至青鸇逐兔詎識杠鼎方前北海之餐鸚鵡未始非人西王之使傳信誰云賤鳥故知魚鳥一觀俱在好生欲使金牀之雁更反衡陽之侣雪山之鹿不充食蘋之宴墓志庾先生承先墓志悠哉掌庾興自陶唐伯舅居晉連鑣渭陽爰斯厥後丗挺圭璋乃登靈嶽言遵洞府乃涉石山將從輕舉實惟貞吉實惟退讓皎皎不羣超超髙尚本同夀夭寧論得喪諸方未遊佳城已望蓬生蔣徑釣罷磻溪檟悲新壠桃餘故蹊風翻嶺背月下松西揚名不朽髙蹈夷齊特進蕭琛墓志銘山東流水關西城市義府辭鋒風飛雲起遊楚宦梁桂馥蘭芳蓮花可賦迷迭成章學類五行書倅三篋已研金匱兼探玉牒石詞既擬欒社兹同桃李成徑松柏為叢天地長久永扇髙風中書令庾肩吾墓志銘荆山萬重地産卞和之玉隋流千仞水出靈蛇之珠故能胤兹屈景育斯唐宋掌庾命族丗濟琳琅遂昌開國蟬聯冠冕父易髙尚其道肥遁貞吉關吏早逢夙表真人之氣少微晚映還彰隱士之星肩吾氣識淹通風神間逸鐘鼓辭林笙簧文苑入為度支尚書任同北斗錫韓稜之劍朝入南宫識鄭崇之履余以其為人也瑚璉之器無慚垂棘杞梓之材有均廊廟故贈散騎常侍蓋旌賢也侍中新渝侯墓志銘爰始降神誕兹初載方琮有燭圓珠無纇義若聯環文同藻繪三分竹使再徙建旟朱帷自舉白鹿隨車武實威邊文能懷逺乍歌去速時謠來晚昔我往矣千駟連輈今兹旋斾雙雁隨舟山回素旐水導丹旒寂寥原野搖落徂秋黃門侍郎劉孝綽墓志銘蔡墨攸陳有草有苗梁荆丗匱或魏或秦積善餘慶時推俊民孝乎惟孝其德有鄰曰風曰雅文章動神鶴開阮瑀鵬翥楊循身兹惟屈扶搖未申人罔石火山有楸椿佳城無曙寒野方春散騎常侍裴子野墓志銘幾原博聞裁為典墳比良班馬等麗卿雲薰蕕既别涇渭以分聖皇御極欽賢盱顧儲后特聖降情文苑既匹嚴朱復同徐阮如何不憗卜期不逺太常卿陸倕墓志銘如金有礦如竹有筠體二方擬知十可鄰兩升鳯詔三侍龍樓南皮朝宴西園夜遊詞峰飈竪逸氣雲浮日往月來暑流寒襲東曜方逺北芒已及墜露曉團悲風暮急侍中吳平光侯墓志銘惟嶽降神表山甫之德敬如君所顯成季之徵潔靜精微岐嶷天挺學兼義府談均理窟歷太子洗馬八人掌籍為崇賢之領袖五日來朝冠承華之模楷遷豫章內史法井鸞峰甘露歲下蕭崖鶴嶺連理成陰徵為太子左衛率遘疾薨於道頗類陶基民號燕北取譬羊祜巷哭荆南副軍早垂隆眄憫其石火瞻斯翠蓋忽變丹旒方使桓侯石椁載銘盛夏滕令佳城式鐫韶濩祭文祭東耕文三農九榖為政所先萬箱億庾是曰民天繫稱斫耜書美厥田花開杏樹凍解新泉當使黍稷莫莫民翳胥樂甘雨祈祈遂及我私我私之熟表裏禔福禔福中田歲取十千是藨是蓘登頌有年釋奠祭孔子文粵若宗師猗歟乃聖惟嶽降神惟天所命上善如水至人若鏡祭顔子文欽哉體一亞彼至人乍分介石時知落鱗不先稱寶席上為珍致虛守靜曲巷安貧欽風味道其德有鄰騷秋風搖落秋風起兮寒雁歸寒蟬鳴兮秋草腓萍青兮水徹葉落兮林稀翠為蓋兮玳為席蘭為室兮金作扉水周兮曲堂花交兮洞房樹參差兮密稍紫荷紛披兮疏且黃雙飛兮翡翠並泳兮鴛鴦神女雲兮初度雨班妾扇兮始藏光且淹留兮日云暮對華燭兮歡未央樂府長歌行當壚擅旨酒一巵堪十千無勞蜀山鑄扶授采金錢人生行樂爾何處不留連朝為洛生詠夕作據梧眠忽兹忘物我優遊得自然授一作受芳樹芬芳君子樹交柯御宿園桂影含秋色桃花染春源落英逐風聚輕香帶蘂翻藂枝臨北閣灌木隱南軒交讓良宜重成蹊何用言巫山髙巫山髙不窮逈出荆門中灘聲下濺石猿鳴上逐風樹雜山如畫林暗澗疑空無因謝神女一為出房櫳關山月朝望青波道夜上白登臺月中有桂樹流景自徘徊寒沙逐風起春花向雪開夜長無與晤衣單誰為裁向一作犯隴頭水銜悲别隴頭關路漫悠悠故鄉迷逺近征人分去留沙飛晚成幕海氣夜如樓欲識秦川處隴水向東流折楊栁巫山巫峽長垂栁復垂楊同心且同折故人懷故鄉山似蓮花艷流如明月光寒夜猿聲徹遊子淚沾裳洛陽道洛陽開大道城北達城西青槐隨幔拂緑栁逐風低玉珂鳴戰馬金爪鬭場雞桑萎日行暮多逢秦氏妻長安道西接長楸道南望小平津飛甍臨綺翼輕軒影畫輪雕鞍承赭汗槐路起紅塵燕姬雜趙女淹留重上春紫騮馬長安美少年金絡鐡連錢宛轉青絲鞚照耀珊瑚鞭依槐復依栁躞蹀復隨前方逐幽并去西北共聯翩驄馬驅