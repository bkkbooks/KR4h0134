body:
  text: 漢魏六朝百三家集卷七十四蕭子良集目録序淨住子序淨住子淨行法門三十一條七賔僚七要詩九日侍宴侍皇太子釋奠宴遊後園行宅登山望雷居士精舍同沈右衛過劉先生墓下作漢魏六朝百三家集卷七十四目録欽定四庫全書漢魏六朝百三家集卷七十四明張溥輯蕭子良集序淨住子序遺教經云波羅提木義是汝大師若住於世無異我也又云波羅提木義住則我法住波羅提木義滅則我法滅是故衆僧於望海再説禁戒謂之布薩外國云布薩此云淨住亦名長養亦名增進所謂淨住身口意身潔意如戒而住故曰淨住子者紹繼為義以沙門淨身口七支不起諸惡長養增進菩提善根如是修習成佛無差則能紹續三世佛種是佛之子故云淨住子淨住子淨行法門皇覺辨德門一九十六種道而佛道為最上勝者非無其義夫立名所以表德非德無以顯名有名未必具德有德名非虛唱是知名有真假德有虛實豈可道俗混同竊名假實而不辨析者乎今覩殊教異軌分衢舛迹未嘗不有其名而闕其德不無其稱而求其用是知有名無德者外道也有德無名者佛道也譬若濟海託舟踐途寄足故經云直心是道場無虛假故發行是道場能辨事故如是四𢎞六度俱稱道場藉如此之勝因獲若斯之妙果所以解脫去其纍般若窮其照相好表其容法身顯其德語其至仁則三念齊想言其自在則無畏獨步談其纍功則十力為用仰其妙極則不共之法神通方便無量法門洞達三世了照萬有卓然明顯英聖超羣故號如來十號具足既自覺於生死昏夜又復起於未覺悟者斯可謂有其名德無不包具其美德無不備故知形端則影直聲調則響和未見貌醜鑒鏡有悅目之華體矬照水發溢羣之觀書云不登山無以知天之高不測水無以知地之厚也凡如斯之異學皆漏於佛之大道矣故經云世間亦有常樂我淨出世亦有常樂我淨世間者有名無義出世者有名有義故六師結誓經問佛名德佛答云最正覺自得不染一切法一切智無畏自然無師保至獨無等倫自獲於正道如來天人尊一切智無畏今各既知至德有歸邪正異趣善惡分徑凡聖路隔幸得信因果悟非常順智流入正道諸聖並能悼川上之不追悟交臂之潛往病生滅之無窮慕我淨之恆樂凡我咸已仰風餐化割愛辭榮豈得不懷然增到形命相競者乎故當清和其性哀愍有形等心存濟以法惠施不犯不取有求不逆常志大乘內外相副是名具足清淨度門開物歸信門二如來愍念衆生愛同一子何嘗不以善權方便𢎞濟益之津乎所以垂形丈六表現靈儀隨方應感法身匪一及其金容託體相好莊嚴顯發衆生欣樂瞻覩行則大千震動衆魔懾伏住則洞達諸定外道歸化坐則演示方等釋梵咨仰臥則開一實道三乘稟德言則三塗靜苦笑則四生受樂聞聲者證道見形者解脫當此之時豈不盛哉今者雖稟精靈昏惑障重進不覩分衛國城退不聞八音辨説將由罪業深厚煩惱固牢非唯恐不見前佛後佛來聖近賢深憂惡道無由可絶發如此意實有切情之悲運如是想不覺痛心之苦豈容順默使流晏安苦海沈淪沸火而不自拔者乎當須慷慨凜厲挫情折意生增上心懺悔滅罪去諸塵纍乃可歸信自不堅強其志忘身捨命捍勞忍苦銜悲惻愴者將恐煩惱熾火無由而滅無明重暗開了未期譬如牢獄重囚具嬰衆苦抱長枷牢大械帶金鉗負鐵鎖捶撲其軀癑瘡穢爛周遍形骸臭惡纒匝而欲以此狀求見國主貴臣雖復一心無怠懇誠嘉到恐升高殿踐王筵亦無由而果假令愍念欲覩為難何以故以其具諸罪惡不離苦具故若去枷脫鎖洗垢嚴服王不我礙自然而現今欲歸信亦復如斯將見如來相好光明者先當淨身口意洗除心垢六塵愛染永滅不起十惡重障淨盡無餘業纍既除表裏俱淨方可運明想於迦維標清心於寶剎去諸塵勞入歸信門必然仰覩法身無礙如囚脫枷鎖自然見於王我今除煩惱亦必覩諸佛若不如是雖復殷勤倍切直恐障礙難通豈可不五體投地如太山崩一心歸信無復疑想奉為至尊皇太子七廟聖靈龍神八部一切劇苦衆生敬禮十方一切三世諸佛求哀懴悔既悔之後常行柔軟調和心堪愛心不放逸心寂滅心真正心不雜心無貪吝心勝心大心慈悲安樂心善歡喜心度一切心守護衆生心無我所心如來心發如是等廣勝妙心專求多聞修離欲定奉戒清淨念報恩德常懷悅豫不捨衆生滌除三業門三身口意三禍患之首故經云有身則苦生無身則苦滅既知其患苦則應挫而滅之滅苦之要莫過懴悔懴悔之法先當潔其心淨其慮端其形整其貌恭其身肅其容內懷慚愧鄙恥外發書云禮無不敬敖不可長又曰過而能改是謂無過經云於一切衆生敬之如親想各自省其過然後懴悔衆等從無始世界以來至於此生由於身意造諸苦業並緣愚癡多違至教遂乃憍慢懈怠形用不恭眠坐放逸行動輕傲或入出僧坊登上堂殿禮拜旋繞形不卑恭或於父母師長上中下座善友知識前服用不端動止乖法非禮而觀用違體製或盜三寶財及親屬物一切他有抄掠強奪欺誑增減非分相陵或淫佚恣縱非時非處罔隔禽獸不避親族或造五逆水火焚澆攻略坑陷加毒無罪或剠劓刖刵考掠斫射傷毁斬截殘害剝裂屠割炮燒煮炙燖瀹諸如此罪或為淫欲或為財利或為慳貪或為癡我無慚賢愚不愧聖達今思此過若影隨形怖懼慚愧悲惻懴悔痛苦懴悔已有相加害者從今已去為真善友生生相向以法示誨願十方佛特加攝念悔身業障永更不造次懴口業此是患苦之門禍纍之始書曰一言可以興邦一言可以喪國又曰言行君子之樞機樞機一發榮辱之主經云不得離間惡口妄言綺語諂曲華詞構扇狡亂故知有言之患招報實重廣如自愛經彰斯業相乂如經云失命因緣尚不妄語何况戲笑構扇是非常以直心懴悔口業次懴意業意為身口之本罪禍之門書云檢七情務九思思無邪動必正七情者喜怒憂懼憎愛惡欲者也九思者視思明聽思聰色思溫貌思恭言思忠事思敬疑思問忿思難見得思義此皆所以洗除胸懷去邪務正經云不得貪欲瞋恚愚癡邪見故知萬惡川流事由心造何以知其然若瞥緣心起故口發惡言言由意顯便行重罪今欲緘其言而正其身者未若先挫其心而次折其意故經云制之一處無事不辦既心會於道身過不遏而止意順於理口失不防而滅然身口業粗易可抑絶意造細微難可壑盡廣如諸經説其相狀修理六根門四經云罪無定相隨因緣造既是因緣而生今亦隨因緣而滅前已懴其重惡則三業俱明又欲莊嚴容體則須六根清淨固知心之驅役諸識亦猶君之總策諸臣故書云君人者懍乎如朽索之御六馬言其畏敬御物不及於亡驗之此事曉然俱了但以萬境森然感發內外更相因倚構接心識故經云心王若正則六臣不邪須各慚愧制馭根識如法句經心意品説昔有道人河邊學道但念六塵曽無寧息龜從河出水狗將噉龜龜縮頭尾四腳藏於甲中不能得便狗去復出便得入水道人因悟我不及龜放恣六情不知死至輪轉五道皆由意根故須聰明六根罪業我從無始已來眼根因緣隨逐諸色見勝美之事不能修學見不善之業隨順履行獲此雙眼其淨甚少惟見無慚無恥之色不見賢聖神通方便作用之色雖有雙目與盲不異是大可恥一也我從無始已來耳根因緣隨逐外聲聞説正善信忠勸矣不能修學反生憤結聞邪惡事歡然順行緣此因故唯聞一切不善音聲不聞清淨正法之聲十方諸佛常説妙法我今不聞生聾不異是大可恥二也我從無始已來鼻根因緣若聞正教戒德妙香初不樂聞反生妨礙聞諸惡欲邪媚之香深心耽著由此業故墮大地獄生在邊地不聞賢聖五分之香不聞三乘四攝等香使我輪回常與善隔是大可恥三也我從無始已來舌根因緣造過特多貪著厚味不淨説法致此罪緣常淪生死是大可恥四也我從無始已來身根因緣多造衆罪自重輕他增長癡愛由此業故得下賤報於佛勝緣無由攀附是大可恥五也我從無始已來意根因緣備造衆惡至人經教拔苦出要心不希行更生違拒乃學異論規圖罪種致無正信求名求利增長我見乖僻尤重臨死之時方悔虛過此大可恥六也生老病死門五尋夫逺劫已來三業所纒六根所惑染愛潤業沈沒迄今生老病死實為大苦故經云一身死壞復受一身生死無數盡天下草木斬以為籌計吾故身不能數矣所以達人興厭高升界繫之表愚夫貪生恆淪死生之獄故須識過可得長辭如胞胎經云衆生受胎冥冥漠漠狀若浮塵在胎十月四十二變識微苦毒楚痛難忍臭處迫迮劇於牢獄飢渴寒熱過於餓鬼母飽急塞母飢悶絶食冷如氷食熱如火飲多如漂大海行急如墮險谷坐久如土鎮笮立久如懸厠屋下熏上壓無時大苦及將欲生倍復艱難如赤身受創呌聲震烈雖具此苦復多不全若一日百日一月十月或在胞胎墮落或出生母子喪命當思此生實是大苦次思老苦經云年耆相熟形變色衰坐起苦極餘命無幾涅槃經云譬如燈炷唯賴膏油膏油既盡光炷非久人亦如是唯賴壯膏壯膏既盡衰老之炷何得久住又如折軸無所復用如遭霜花人不欲視又經云是日已過命亦隨減如少水魚斯有何樂當思此老復為大苦次思病苦皆由風寒冷熱食飲不節四時變改則水石乖扶況此假合之體危脆之形望免四大不虧百一無惱豈可得也及至苦患切身心煩愁塞求生不差求死不絶痛楚百端窮憂自結屎尿臭處妻子為之改容形體不攝傍人為之變色況單身寄病誰肯提攜故經云慈父孝子至病死時不能相救此至言也實為大苦次思死苦經云死者盡也氣絶神逝形體蕭索人物一統無生不終又經云去處懸逺而無伴侣無所破壞見者愁毒等經又云獨生獨死身自當之幽冥幽冥會見無期是以聖人以身為患豈復以死更受生乎往來無道勞我精神誓斷貪源絶其生本是故死苦實由此身如來出家立言此意尅責身心門六身為苦本自所造集於生死中復增惡業不能改悔隨順佛語是故特須深自尅責經云見人之過口不得言巳身有惡則應發露書云聞人之過如聞父母之名耳可得聞口不得言又云君子顯其過經云讚人之善不言已美書云君子揚人之美不伐其善書云恕已可為譬勿殺勿行杖書云已所不欲勿施於人今以經書交映內外之教其本均同正是音殊名異若使理乖義越者則不容有此同致所以稱內外者本非行分但以心表為言也經云佛為衆生説法斷除暗惑猶如良醫隨病授藥書云天道無親唯仁是與若出家之人觀空無常厭離生死行出世法是則為內乖此為外在家之人歸崇三寶持戒修善奉行禮義是則為內乖此為外今內外道俗共知內美之稱由心外惡之名在行豈得不捨外惡勤修內善若欲修行先自尅責當知求進是假名退檢是實名欲涉千里者必裹糧衛足而致也欲升彼岸者必聚智糧具戒足而登也所以能果者實由退檢覺察挍試輕重故能却斷無明退截老死愚暗滅則慧光發四相遷則戒德顯故知廉退者進之兆也貪求者退之萌也夫求而獲者虛則實愛情深故有傾危墮墜之苦此外道之法也退而獲者實則意無深戀故得常安涅槃之樂斯佛道之法也今者但應退檢不及以自責躬若志求進必損我傷物退檢失則彼我兼利當知尅責心口是入正之路檢察身行是解脫之蹤是故如上善自尅責則無善而不歸也檢覆三業門七尅責之情猶昧審的之旨未彰故以事檢心挍所修習既知不及彌增悚恧何謂檢挍檢我此身從旦至中從中至暮從暮至夜從夜至曉乃至一時一刻一念一頃有幾心幾行幾善幾惡幾心欲摧滅煩惱幾心欲降伏魔怨幾心念三寶四諦幾心念苦空無常幾心念報父母恩慈幾心願代衆生受苦幾心發念菩薩道業幾心欲布施持戒幾心欲忍辱精進幾心欲禪寂顯慧幾心欲慈濟五道幾心欲勸勵行所難行幾心欲超求辨所難辨幾心欲忍苦建立佛法幾心欲作佛化度羣生上已檢心次復檢口如上時刻從旦巳來已得演説幾句深義已得披讀幾卷經典已得理誦幾許文字已得幾過歎佛功德已得幾過稱菩薩行已得幾過稱讚隨喜已得幾過回向發願次復檢身如上時刻已得幾過屈身禮佛幾拜已得幾過屈身禮法禮僧已得幾過執勞掃塔塗地已得幾過燒香散華然燈已得幾過拂除塵垢正列供具已得幾過懸幡表剎合掌供養已得幾過繞佛恭敬幾十百匝如是檢察會理甚少違道極多白淨之業裁不足言煩惱重障森然滿目暗礙轉積解脫何由如上檢察自救無功何有時間議人善惡故須三業自相訓責知我所作幾善幾惡訶詰四大門八上已檢挍所行多諸廢惰由此四大勿致懈怠是故訶詰令其覺悟夫三界遐曠六道繁滋莫不依因四大相資成體聚則為身散則歸空然風火性殊地水質異各稱其分皆欲求適求適非一所以乖忤易動故一大不調四大俱疾乍增乍損痾疹續生風輕而地重水冷而火熱互相煎惱無時得安經喻四蛇信哉可患又此四大無慚無恥無恩無義我今恐其不安所以資給所須然彼四大初無感愧何以知之至如悲風霜殞嚴冬雪零便須綿纊衣裘臥褥溫室若季夏鬱蒸熇赫炎烈復須輕絺廣室風扇牙簟春秋改節氣候清爽復須輕軟服御乃至食則甘肥珍肴充滿飲則瓜果溫漿冷水隨時資給安苦求樂此皆四大所須而我供贍未曾拒逆而此四大求索無慚不知有無有則充給不厭無則恐迫令得如飢須食不可暫闕脫致乖違內愁外戰增發火大不知我艱辛不恕我空乏唯欲貪求無有休息是名無慚云何無恥汝之所須無窮我隨給汝不少雖然當受初無愧容我既役智盡謀以相資贍而汝初無矜念於我於少日中不須衣食云何無恩今既得我如此供給未嘗為我造作善事獲我衣食飽暖怡懌反更思念作一切惡少時禪誦禮拜即生懈怠云何無義此四大身不可期懷不可委信我今為汝種種供須反復橫起種種愛著驅逼於我行殺盜淫我既愚癡不能制革還相隨順生諸疾病或遭王法牢獄鞭杖為汝所招我既嬰苦汝亦無利猶復不知更求更索從今日去不復隨汝流轉老病生死大海汝當隨我行道作諸善業方可給汝隨病衣食趣得支身以除飢渴汝當善自驅策令我蚤得五分法身常化遊行自在無礙出家順善門九上巳檢挍所行知乖道實逺尅責自咎則進趣有途前雖道俗總論混知其過然在家罪重出家罪輕但出家之人行業階差生熟難辨然阡陌而觀亦粗見其迹今出家者未登聖境而期望之人恆引聖責凡良由大教勝逺尊之者責重法律精微信之者望深何以知然今欲見雅形妙相之體當覩儀容端麗之人欲觀仁義盛德之風當尋有禮有義之行何常見衆多之口競譏棄諸外道正以不足及言所以息議在於衆僧動為論端實由我法清勝嫉之者多我法高逺毁之者衆書云城高則衝生道尊則魔盛今乍聞詰誚之言乃足驚怪就理而尋非無義而發試為檢其所修比其所習福之深濃罪之厚薄可加意察之夫父母是孝戀難遣而能辭親妻子恩染難奪而能割愛勢位物情所競而能棄榮飢苦是人所難忍而能節食滋味是人所貪嗜而甘厭蔬澀翹勤是人所厭怠而能精苦七珍是人所吝惜而能捨離錢帛是人所蓄聚而能棄散奴僮是人所資侍而自給不使五色是人所欣覩而棄之不顧八音是人所競聞而絶之不聽飾玩細滑人所保著而能精粗無礙安身養體人所共同而能忘形捨命眠臥是人所不免而晝夜不寢為業恣口朋遊人所恆習而處靜自檢白衣飲饌不知紀極而進食如毒白衣日夜無所不甘而已限以晷刻虛腹白衣則華屋嫓偶而已塜間離著又行住坐臥如是法禮拜圍繞如是法讀誦講説如是法食飲便利如是法受供行施如是法修道習行如是法略説如上無非有法數則三千威儀廣則説不可盡餘如出家功德經説在家從惡門十俗士每言談之次或問白衣歸向何法無不答云釋氏純臣縱復實心錯背亦羞言其乖各所以爾者實由大法精勝不欲與善相違故也既言其信當事與言同若言事相反者便是矯偽諛諂側佞邪媚天下所驚嗟四海所駭歎若欲真實期於三世者見沙門之過當知凡劣形服雖異喜怒何殊便思其理可崇本不在人何得以鄙吝之行用廢大道乎且其積習勝業巳積熙連沙喻可不深思今諸士女試自檢察實自多過瞋恚不避尊貴惡罵無復高卑貪求不計毁辱慳吝不知禮節淫欲不擇禽獸黜退不避親族加以憍慢放逸貢高懟恨諍訟邪命詐現異相以利求利惡求多求無有恭敬不隨教誨身見有見及以無見未嘗省退以禮自制一何苦哉唯恐我不勝人人莫及我經説起慢此業熾盛燒滅宿世所種善根又云為惡雖少後苦無邊如毒在身終為重患諸俗人等唯欲營生不知顧死然生不可保死必奄至尋此危命非朝則夕俄頃之間凶變無常如佛為愚癡富老公説偈汲汲憂子財非我何所有愚人多預慮莫知當來變廣文如彼何得不思貪求積聚終必散失身死名滅唯業相隨又觀女人所起患毒倍於男子經云女人甚深惡難與為因緣恩愛一縛著牽人入罪門女人有何好但是諸不淨何不審諦觀為此發狂亂郁伽長者經云在家修道當觀女人生厭離想非常久想不淨潔想臭穢惡想羅剎惡鬼恆噉人想貪色難飽無止足想惡知識妨淨行想三惡道增憂苦不斷目面脣口惑人之具人為所惑破家滅國殺親害子衆禍之本皆由女色沈冥地獄門十一萬法雖差功用不一至於明昧相形唯善惡二途而已語善則人天勝果差别於目驗述惡則三途劇苦皎然而非虛而愚惑之夫好起疑異多言人天是妄造地獄非實説以不覩故便不知推因以測果由不了故復不知驗果以尋因既因果未分空扇是非疑途亂起明在何日無論未來其事難了但以即今善惡是驗冥漠非妄夫有形則影見有聲則響應未見形存而影滅聲續而響乖故知善惡相資亦復如是幸各明信無厝疑心何謂地獄經中廣説此洲地下八大地獄最下阿鼻四萬由旬鐵城四周表裏火徹銅狗黑蛇哮吼嚼咋甚可怖畏諸􅘁獄者散在鐵圍山間海渚空野衆處備受寒熱難可具説獄各有主牛頭阿傍其性殘虐無一慈忍見受苦者唯憂不苦唯憂不毒或問獄卒衆生受苦甚可憐愍而汝無慈常懷毒害獄卒答曰諸受苦者由是不孝父母謗佛法僧罵辱親疏毁陷一切破壞和合瞋恚殺害貪淫欺詐邪命邪求及以邪見憍慢懈怠放逸怨恨迷沒聲色耽著酒食犯所受戒不知慚愧具足惡業來此受苦受苦既畢恆加諌喻此是惡處今已得脫勿復重來然此衆生初無改悔今日得出俄頃復來勞我形力如毒於彼今觀此輩既不修善往趣泥洹則是無知不識避苦所以倍痛害之何由得生慈忍又經云有十惡業殺生偷盜能令衆生墮於地獄畜生餓鬼無量劫數乃得為人還受短命貧窮等報又感外報棘刺沙礫水草少味不如意等且身口意此三發業之始自作教人見作隨喜此三成業之由現報生報後報此三感業之所故論云三三合九種從三煩惱生然前九位業通善惡受三塗報唯在三毒是故行人先須觀彼於此人身可有出理出家懷道門十二自大聖已還性體未圓三相所遷四山作固所以如來智周域外尚假苦切之言令諸有生得入律行今居在凡愚善惡雜糅何能免點纍之愆愛染之失若聞所説當深歎悼何時免離若斯之過不得內懷驚疑增其忿憾也然則起忿之來誠由著我如經所説執我見者生死大患第一破戒且舉一我無人不患自非正聚誰不弊之出家本意為滅此惑故諸行者常須遮制積功不巳漸得出有迷此不修還同無始徒在僧倫更招苦業今聞出家之美不得便言無惡又聞俗人之惡不可便言無善故通述之宜各警策夫出家者猶信故入道也當去愛著順佛語則出世之行成也若於行有虧則非謂之信也內既無信則翦落衲衣瓶鉢等於身無用略引數條不得自怠已去憒閙得空間已離俗愛無攀緣已出馳動入寂定已離染著得無礙巳捨苦境得無惱已離妻子無纒縛巳棄飾好厭華侈已絶聲色滅貪求已斷榮辱去我見已向八正趣道門已披𢎞誓忍辱鎧巳服解脫涅槃衣巳望畢竟空寂舍巳登慈悲喜捨堂已見回向之大利已聽多聞自覺音佛見出家之利樂如此所以勸奬誡勵修學故經云蓋聞沙門之為道也捨家妻子捐棄愛欲斷絶六情守戒無為其清淨一心也則萬邪滅矣一心之道者聲色不能汙榮位不能動免離憂苦存亡自在塊然獨立捨五慳除兩穢二堅縛二障法二種垢二雨雹二癰瘡二燒法二種病四破戒者一謂三業不淨二謂聞空怖畏三謂不為泥洹四謂貪著我見又如經説菩薩修行先除四失謂捨欺誑重報恩決嫌疑滅諂心如是備行諸度妙行清淨廣大安住寂靜在家懷善門十三前已聞其惡深自鄙悼今顯其善悅以進道何以知之自非貪欲情厚染愛性深富貴意重勢利心濃者則不容安處纍縛黑暗所纒故知在家者衆患之本矣故使室家妻子宗親眷屬周旋來往朋友遊處奉上接下皆須將意意不獨往其應筐篚筐篚之用非求不至既馳求事廣財念無窮惟念多蓄不顧無常擁積腐壞靡知分散是為欲不慳貪便不能得既不屬纒繞百心不同不加罰則為惡者衆雖曰止惡要由意瞋起是為欲不瞋恚亦不能得為此資生挍計馳求萬方以利縈心不知患害水火盜賊艱苦備經或夭身命殘殺無辜宴集歡樂非此不濟起貪癡心謂我加爾飲噉之後暢快莫思是為欲不起癡而不能得當知白衣與善相違故曰所作之事與地獄對門又曰居處如牢獄妻子如枷鎖財物如重擔親戚如怨家而今在窮苦之地繫縛憂厄艱辛纒纍備諸苦惱不親三寶不近正法窮迷暗障劇苦之內而能一日一夜守持清禁六時行道兼修六齋或持一戒二戒三戒乃至五戒八戒十戒菜蔬節味檢身口意又率妻子內外眷屬回向崇善建菩提因或撒父母之供妻子之分財貨衣服甘珍肴果窮其所有敬供精潔合室營奉晨昏翹注或為疾病患危急縣官牢獄或親族崩亡祈福魂路或生善滅罪始發信心崇仰沙門在聖無别由其隨順佛正教故所以順佛語故出離生死若違佛語必墮惡道是故常應堅發正願願受化生自在飛行一切佛剎隨所感見應接羣生學佛威儀入如來室著如來衣坐如來座巧便大慧開悟解脫於諸法中究竟無障盡處空際大誓莊嚴三界內苦門十四夫三界牢獄四圍輪轉在家出家未斷我倒無得免者既為生死所纒身心勞纍遷變無窮無非是苦故經云三界皆苦何可樂者而衆生常惑謂言世間是常是樂出世樂因無常是苦何其沈迷頓此顚倒才驗刺身即覺苦受何得云樂略引數條證知唯苦若謂飲食為樂者則應多所餐進身和心悅何意小乖分度便成疹患若謂衣服為樂者則應春夏一服愛心無厭何意寒暑異服明不甘樂所以苦本若謂室宇為樂者何意不常一處既致馳動明知避苦若謂妻子眷屬為樂者則應長相歌笑何意俄爾無常悲號哽噎當知眷屬實是苦本若謂妙色以為樂者則應長悅心目永慰形骸何意須臾顔貌變改髮白面黑傷痛少年華美之艷故知此色本自是苦不是外來若謂好聲以為樂者則應絲竹繁會親聽無厭何意小久便致昏倦耳不樂聞當知是苦若謂酣酒以為樂者則應適意遣憂長無惱患何故神昏心悶骨節慘痛或因此事鞭杖鎖繫喪身夭命破家亡國受苦無量若謂朋遊為樂者則應終日遊散不知厭極何意每一登臨少時便倦後更相攜無復行意若謂淫佚為樂者則應血氣剛強眼明神爽少而不老壯而不變何意恣情逞欲輒有疲困抽腦徹髓頭眩眼亂心驚氣迫筋骨緩縱口燥脣焦四肢振掉抽拔五藏由此夭命當知淫佚實是苦本若謂榮位為樂者則應始終不變無恥無辱何意黜陟之間憔悴立至已上諸條大舉而言然此六塵五情遊心之處無非是苦所以大聖覺察三界牢獄知苦不迷解脫生死出三界外樂門十五佛世尊説三界世間總是苦聚非唯一苦而已又是無常無我不淨終歸於空出世之外則有常樂我淨具八自在而衆生長迷妄謂為樂一何可悲且説一苦隨相有八何謂八苦所謂生苦老苦病苦死苦愛别離苦怨憎會苦求不得苦五盛陰苦於一苦中更有諸苦故諸行人策勵行道節身口意翹勤匪懈羣小無知謂之為苦大聖圓照三達洞了知此小苦大樂正因雖有勞頓所期者大非謂為苦故引諸行相用簡有心若捨身命憐愍衆生得佛金色身光明洞徹行住坐臥震動大千相若禮拜父母師長賢聖得佛頂相高明若不誑衆生讚揚其德得佛眉間毫相若行慈愛仁救衆生得佛紺青螺髮相若以光燈供養施人得佛頂出日光相若以慈意視衆生者得佛淨目上下眴相若絶滋味十善化人得佛四十齒齊密相若説慈善志意堅強得佛四牙白淨相若絶口四過得佛方頰車廣長舌相若行施平等得佛果時七處合滿相若忍苦行決定無亂得佛師子臆相若行正淨醫藥救人得佛身方正相若行慈仁不杖衆生得佛修臂指長相若視地行不踐蟲命得佛行不蹈地相若手扶接有苦衆生得佛手內外握相若行四攝攝取衆生得佛手足網相若以淨心供養善人得佛手足輪千輻理相若施衣服隱過蔽惡得佛陰馬藏相若説除患死法得佛鹿腨腸相若善莊嚴不解衆生肢節得佛鉤鎖骨相若柔和順塔右繞從人得佛右旋毛相若平治道去棘刺得佛一孔一毛相若不服華綺沐浴於人得佛皮膚細軟相若掃塔除穢得佛身不受塵相若修萬行常願具足得佛胸卍字相若捨國城妻子得佛淨土眷屬賢聖相若自節食上味施人得佛上味相若常讀誦不惡口加人得佛總持口香氣相若説法引接衆生得佛面無飢渴滿口光辨才相若持戒無缺得佛法身圓備相若在山間頭陀苦行得佛塵纍都盡相若捨華堂幽林禪思衆生謂苦不能行之菩薩志意堅強所期者大不以為苦故得自然宫殿七寶房舍早得成佛衆生猶自流轉生死海中豈非為顛倒惑纒之所致也故當勤加精進修行此行便出三界斷絶疑惑門十六夫因果感應影響相生必然之道理無差舛而衆生業行不純善惡迭用以不純故報有精粗或貴或賤或美或惡其事迹匪一不了本行故致疑惑何者如精進奉戒應得長生子孫熾盛親族榮顯而返見身命夭促門族衰殄屠害之人應嬰促壽眷屬殘滅而反延年壽考宗強援廣清廉之行應招富足而見貧苦貪盜之人應見困窘而覩豐饒此乃緣其福故現世輕受如金剛般若云由持經故為人輕賤是人先世罪業應墮惡道以今輕賤故先世罪滅所以致有此疑者由其無明惑故妄起顚倒不能解了三世業相今略出數條世人惑事用以懲誡庶有識者識以除疑智人以生為苦所以不忍愚夫貪生以生為樂是一惑也智人以不生則不死故云涅槃寂滅之樂而愚夫惡死不知逺死之方是二惑也智人以居家為苦譬之牢獄書云割情在於驕奢而愚夫染著以為榮樂是三惑也智人知妻子之纍故比之枷鎖書云割情在於所愛而愚夫以恩愛為歡欣是四惑也智人以眷屬是繫縛之本放之如讐而愚夫繫戀以為勝適是五惑也智人以榮利是自滅之筌書云割情在於速達而愚夫不訃讒害取貴是六惑也智人以色聲香味為苦本書云割情在於嗜欲而愚夫為之沈溺迷醉且列如前不容致惑是以智人當勤自勉自生老病死不離其身勿生疑惑一生空過今更出之以顯疑相見布施者疾患早亡便起疑心慳吝見持戒人過中不食致患懷疑自養見忍辱人檢心攝形致患懷惱勸令開意見誦經人旦夕緣理致患勸息見菜蔬人致患瘦弱勸噉肥美見坐禪者致患勸臥聞語引進便稱本情懈怠自恣隨順流俗曾不思量朝聞夕死如救頭然何有情賴更習常俗以死自誓方曰有志十種慚愧門十七既巳同知在家男女之惡又見出家僧尼瑕纍又聞疑惑顚倒之門退自思省實可慚愧經云慚愧得具足能滅暗障故又云慚如鐵鉤能制人非法若無慚愧與諸禽獸無相異也涅槃經云有二白法能救衆生一慚二愧慚者自不作惡愧者不教他作慚者內自羞恥愧者發露向人有慚愧故則能恭敬父母師長懷慚愧故罪則除滅顯相如此各須慚愧順清白法事乃無量略舉十條以為綱要第一慚愧諸佛如來往昔欲令我等離苦獲安所以發心行菩提道忍苦受辱令成法身常以正法為我解説而我不能如説修行第二慚愧父母哀哀父母生我劬勞長養教詔常懷憂惕既為人子不順誨約反學凶強陵蔑貴賤既乖諍子上失令名深為可愧第三慚愧諸子然彼實能晨昏定省色養無虧而終貧煎無物賑給故使諸子無由得立又闕教導使子愚昏實為可愧第四慚愧師僧然我父母生育訓誨不能使我出生死海今此師僧教我出家受增上戒懷羅漢胎得羅漢果而我違犯深為可愧第五慚愧弟子既能晨夕依教策修而反固遮有違聖説致使道業寸尺無功一生空過無法制奉顧斯負纍亦可深愧第六慚愧帝王恆以十善化導天下故國土安寧五榖豐熟所以百姓安家復業出家之人泰然安樂任其禪誦而今懈怠深是可愧第七慚愧檀越出家所懷解脫為本形骸資待衣食為先所以諸俗為道興福供給資緣故隆正業而惑不全失於敬重亦可深愧第八慚愧良友知識化導見佛因緣令具梵行大經唱示而我聞諌反以為讐背逆三歸禮向神俗迷著善導故違正誨深可為愧第九慚愧所化諸人由我無德久不種緣致使開悟莫能津濟故令聽者徒枉功夫縱聞雜善不獲純淨內心自疾深可慚愧第十慚愧天龍神鬼護法冥祗我本發心誓度一切故諸天龍擁護無惱而我愆缺情志不恆唯知負恩但增慚愧極大慚愧門十八慚愧之義以不及為本若於正行悉能遵奉則無假慚愧書云內省不疚何憂何懼又曰心茍無瑕何恤無家今既理妙難精觸向乖背一念之間造過無量過無量故慚愧亦應無量前已略舉大致其中枝𣲖不可縷悉更立此門使尋文求旨知理無不攝也夫衆生以我見故不能推美於物引惡在巳而於萬善不能修習見人勝行意欲陵之無慚之甚何得不見今列位顯之庶可斂迹若見直心行慚愧人我不能行願彼不作見行布施持戒人開解脫門願其早止見行忍辱精進人自不能行願早退沒見多聞修定者自不能行不欲使作見行慈悲喜捨者不能讚免欲其不行見菜蔬一食者自不行故勸令退敗見行伏心人應慚愧法乃勸不行乖八正道見學問誦經人自無此行不使彼作見圍繞禮拜者自懶惰故嫉令不行見有唱導梵音者自不及彼願不為之見經行頭陀者既不能行反謗毁滅今據叔世設法開化以此為高義當生信滅罪祈福𢎞道而今登無畏座開廣笑謔之端飾詞自麗之美高言興色誹誚往還儀容傲佷初無謙遜永不退省我解未深唯詰咨者尋經有謬故經云若為利養名譽我心愛黨而説法者是名非説若利於彼增信心故滅煩惱故起淨業故知慚知愧開八正路是名善説如過去世有苦岸比丘説有衆生我人壽命違於佛語命終入阿鼻地獄仰臥伏臥左右脅臥各九百萬億嵗爾後更歷諸餘地獄自外徒黨受苦難言故知不依佛教毁謗正法其罪實重當知法師實亦為難其善則致福無量其惡則獲罪亦重是故法師應須極大慚愧然居在世間養生之急在於衣食由此衣食勞亂極深所須繒纊皮革無不損生殘命著他皮肉還養肉身乃至食噉一粒之食非用功夫無由入口推度前功商量我腹上入下出常流不止而於其中選擇精肥進納軟滑貪嗜美味無羞無恥須臾變改臭不可近將行將坐如厠不殊何有智者於食生貪若生貪者大須慚愧與彼畜獸復何取别善友勸奬門十九夫能了除疑惑內發慚愧勸奬之功善知識也今欲修習萬行非善知識無由進道經云如栴檀葉在伊羅林其葉則臭伊羅臭葉在栴檀林其葉則香書云與善人居如入蘭芷之室久而偕芳與惡人居如在鮑魚之肆與之俱臭又云近墨必緇近朱必赤故知善友能作佛事是大因緣是同梵行善知識者今能將我得升淨土惡知識者今能陷我墜於地獄當知善恩不可酬報夫善惡之理皎然明白但以任情適道則進趣之理遲善友勸奬便勇猛之心疾經有奬課之文書有勸學之説當知要行實由勸成故經云菩薩自身布施亦勸他人令行布施自行持戒忍辱精進一心智慧亦勸他人令行此事然則勝美之事欣樂羡仰物之恆情今若徒有願樂之心不行願樂之事未見其果猶若絶糧思味其於飢渴終無濟益故略引數條盛行要事以相警誡今有財富室溫家給人足不勞營覓自然而至復有貧苦飢弊形骸勞悴終日願於富饒而富饒未嘗暫有以此苦故勸其布施力厲修福若有衣裘服玩鮮華充備又有尺布不全垢膩臭雜是以勸奬令施衣服及以室宇若見百味珍羞連几重案又有藜藿不充困於水菜所以勸奬令施飲食若見榮位通顯乘肥衣輕適意自在復有卑陋猥賤人不齒録塗炭溝渠坐臥糞穢此苦可厭勸令修福除滅憍慢奉行謙敬豈可他人常貴我常在賤若見形貌端正吐言廣利又有面狀矬陋所言險暴此苦可捨勸令忍辱若見意力強幹少病登勞行道無礙有人多患不安所行莫濟見有此苦勸施醫藥令其進趣故法句經云四時行道得度衆苦一者少年有力勢時二者有財物時三者遇三寶福田時四者當計萬物必離散時常行此四必得道迹應自督課不待他勸戒法攝生門二十前已勸奬於他我今自加課勵凡論課勵要必託境行因若心志浮蕩則進趣無寄然託境行因戒為其始可謂入聖之初門出俗之正路如乖此訓永處三塗人天長絶是以經云譬如大地長生萬物戒亦如是能生衆生人天華果故經云若無此戒諸善功德皆不得生良以三塗苦報罪障所纒人天勝果堪為道器欲感勝果非戒不生是以聖人先明此教然三歸五品戒法兩科七衆小學要以三歸為宗一乘大教必崇三聚為本並如經律具顯規猷卓爾憲章行業明逾鑒鏡今粗舉其大致用光恆俗所以發戒之原須依三寶者蓋由佛法僧寶天人所尊歸依生信必能出有若歸邪神反增苦趣故經説云歸佛清信士不歸諸天神故須先定邪正方識逆順經云信為道元功德之母智是解脫出有之因誠至言也若無此信心志浮虛歸戒不得是以發足立信為先何謂三歸謂佛法僧此三可重故名為寶何謂為佛自覺覺彼無師大智五分法身也何謂為法能軌能正滅諦涅槃清淨無相也何謂為僧能和和衆無學功德自他滅處也何謂為歸可憑可向也何謂為寶能招利樂正心依仗近獲人天逺登無學此則三寶區别之門若論極教理唯一統照無不周照周等覺謂之佛寶禮無非法謂之法寶至德常和謂之僧寶此乃體一義三同性三寶衆生解悟信知佛性離此生死招興利樂是故一切無不歸憑第一翻邪三歸第二五戒三歸第三八戒三歸第四十戒第五具戒第六十善戒第七大菩薩戒此之七戒所防過境近約大千世界之內一切六根六大並是戒境廣如常説自慶畢故止新門二十一從前發心已來知至德可歸檢挍尅責滅諸惡門疑惑既遣慚愧續修勸奬兼行戒德又顯得捨如是之罪障餐聽若斯之勝法豈得不踊躍歡喜差抃自慶者乎經云八難難度一地獄難二餓鬼難三畜生難四邊地難五長壽夭難六雖得人身盲聾瘖啞不能聽受難七雖得人身六情完具而世智辨聰信邪倒見不信三寶肆意輕侮此身死已便在三途隨業沈沒久乃得出時在人道還不正信家生第八前後佛間不覩正法徒生一世增長邪見具造衆罪尋爾徒死是故經云徒生徒死甚可憐愍奉法行人先崇此意生死大事不可自寬今略出自慶數條繫在心首佛言地獄難免而今同得免離此苦一自慶也佛言餓鬼難免而今同得逺於此苦二自慶也佛言畜生難捨而今同得不樹此因三自慶也佛言生在邊地不知仁義今在中國修習禮智四自慶也佛言生長壽夭不知植福福盡命終還墮惡道而今不以世樂自娛回以供養五自慶也佛言人身難得一失不返有過盲龜浮水之譬今得人身六自慶也佛言六根難具今無缺損七自慶也佛言丈夫男身難得我已得也佛言女人身者須知佛性則是丈夫我已知也佛言邪辨難捨我今歸正法也佛言佛前佛後是為大難我今相與慷慨立志既見色像又聞正法則同鹿野滅惑不殊也佛言見佛為難我今頂禮佛所記像功用等倫也佛言聞法為難我今備得聞也佛言出家為難我今具隨衆也佛言出家專信倍復為難我今一心無敢二見敬法愛法以法為師經中偈言惟念過去世供養為輕微蒙報歷遐劫餘福值天師淨慧斷生死癡愛銷無遺佛恩流無窮是故重自歸大忍惡對門二十二夫道從苦生不由樂果德憑功建非情所集故經云忍辱第一道於諸衆生心無礙故以其在苦則多礙多惱起不善業今所以得無礙者良由在礙而修無礙故礙而不為礙既於礙而無所礙豈非忍力之所致乎經云娑婆世界五濁之剎五痛五燒具諸惡報是故發大乘者多來此土以救苦為資糧以拔惱為要行此土一日修善勝於他方淨國百千萬劫所以爾者良由極苦之地心不及善而能於劇苦之中卓然發意忍苦受辱豈不奇哉所謂火中生蓮華此實為其有他方淨土無修福地所以不及此土何者淨國七財豐溢不假布施攝貧窮也淨國律儀圓淨不假持戒攝毁禁也淨國則無辱無忍穢土無事非辱在辱能忍勝他方也淨國精進如救頭然不假翹勤攝懈怠也淨國之人入法流水念念修順無出入觀不假寂定攝亂意也淨國智慧明滿不假才巧説攝愚癡也又淨國之人非無𢎞誓但𢎞誓之功不及淨土四攝四等例同無用淨國樂故則救苦之心薄惡土苦故則進善之心猛故經云行於非道通達佛道也夫欲發廣大心行菩薩行自非履危涉險備受艱難蹈熾火歷氷霜嬰苦切甘楚毒於萬苦中而能忍受者則道場可踐若無此惱忍何從生藉此煩惱起我諸善所謂塵勞之儔為如來種當知忍者有力大人功德之本所謂忍痛癢忍思想忍疾病忍飢苦忍疲勞忍寒暑忍憂悲忍熱惱忍惡罵無恥辱忍撾打無恚礙忍貪欲無愛著忍憍慢無背道忍所難忍忍所難行忍所難作忍所難辦能行此者真可謂大忍辱矣緣境無礙門二十三經云在俗則謂之為縳在道則謂之為解解即無礙所致縳即資待所招今若欲有待於無待則有待更煩無待於無待則有待自遣有待既遣則無礙之門可入若志在於資養便覩縳纒更重但衆生凡類觸向多阻不資於物則自濟無方資於物者纍之重也生纍纒繞解脫何由今既深知其纍纍實為苦何以知之今欲陸行非車輿人馬不動一纍礙也今欲水遊非舟航不移二纍礙也今欲養身非衣裘屋宅則無所憑託三纍礙也今欲養命非粳糧黍粟五味柔軟則無所資待四纍礙也今欲修習一慧髣像無向五纍礙也今欲求見一佛及一淨土發奇特心冥漠不見六纍礙也今欲徹視十方障礙滿目七纍礙也今欲求佛聖智以除障惑近是衆生心行而我不覩八纍礙也今欲披文尋義雖課心力近在淺言不逹意旨九纍礙也今欲誦習經典受巳忘漏十纍礙也凡此纍礙其事無量聖人所無礙自在者由何而致實由逺諸塵勞自策為本是所資待莫不勤役自辦不假於他而他為我用所謂讓而得者則其理通求而獲者則其理滯菩薩不求自利但欲利益衆生是以其利在已而得無礙衆生常利我忘彼所以恆縳而無解聖是可求而得非是永隔無津今若欲學聖捨凡者當遵聖人所習雖其途無量然津濟要趣唯一解脫耳故經云若自無縳欲解彼縳斯有是處今欲學菩薩道必須棄凡夫縛凡夫縛者唯願得五欲縱意自在實大縛也菩薩行人棄之不顧經云不得畜養奴婢畜生當自翹勤出離生死若假於他他還縛我無解脫期今云無奴不立無婢不辦此乃氣力強梁之時一旦臥牀百事同棄自救不暇何憂及人宜自勉勵則解脫之門易可登耳一志努力門二十四初從辨德極於無礙善惡二途凡聖苦樂明了審諦斯言備矣唯應努力勤而行之經云感傷世間貪意長流沒於愛欲之海吾獨欲反其源故自勉而特出是以世世勤苦不以為勞經云我與阿難空王佛所共發菩提心我常勤精進所以速成正覺又云得正法智已以無疲厭心為衆生説斯可謂努力矣夫衆生流轉三有觸苦相纒所以情識暗弱慮淺多迷每一修善怯退遑擾念念之間百變乖舛自非勸之以努力奬之以剛幹則勇鋭驍果之心不發經云衆生與無明怨賊鬬戰亦不異世間剠敵相禦世間則須金鉦壯其氣鼓鐘激其忿鬱拂增其怒決列成其力不資此發勇不假此振威何能摧鳴條之戰拉牧野之師乎今與煩惱共戰當集無漏之智命無畏之師控道品之衆禦六度之侣建道場之幡擊甘露之鼓著𢎞誓鎧胄被忍辱袍甲握智慧弓刀執堅固箭盾精進督怠惰翹勤課不及登行登歡喜稅駕頓法雲種智斷其勇方便運其略於是無明老死之賊協附四魔之軍影響波旬因倚天女憑帶鬼神億千萬衆擔山吐火雷電四繞欲入暗惑之旅退金剛之師由乎菩薩忍調無想積德久善魔怨稽伏一念努力豁然大明非法王壞正法王勝此並經中之盛事若不努力何由辦也如人營家晨起夜寐劬勞督課便自室內盈實飢寒不切但能努力無所不濟出世妙行事不殊俗若小努力微復加意三明六通不足為難更運方便重課心形信順之忍漸深自至豈得空捨一生虛過三塗切巳力無所施方復生悔何嗟及矣所以努力一門貫通前後位心極行唯此而已願幽明聖鑒照覽窮途故敢發言託文現意禮舍利寶塔門二十五大聖詮化隨機感發譬若一音説法各得其解是故應以現生蒙利者所以降神母胎誕聖王宫應以出家蒙利者所以捨金輪位剃除鬚髮應以相好蒙利者所以現成正覺坐菩提樹應以實相蒙利者所以三轉法輪十二部經應以滅度蒙利者所以雙樹潛輝現於涅槃良由衆生障業煩多是故聖化隨應不一然則現於涅槃者復是增發悲戀之心以悲慕故善心濃到凡禮拜像塔皆宜感發悲心澘然思慕慘切其情追想正法我不餐仰泣想如來不親音旨如入祖禰之廟覩靈若在歔欷無顔如來殷勤令我等具諸苦行而我違背自墮惡道在於像末未蒙解脫以苦報故憶如來恩是以今各歸心於此像塔嗚咽涕零慚顔哽慟至心奉為至尊皇后皇太子七廟聖靈今日信施龍神八部廣及一切劇苦衆生敬禮十方三世一切諸剎土中所有如來形像靈廟敬禮釋迦如來一切現在靈骨舍利敬禮如來現在頂骨舍利敬禮如來現在鏤蓋舍利敬禮如來現在眼睛舍利敬禮如來現在一切紺髮紅爪舍利敬禮如來現在一切指骨舍利敬禮如來現在一切牙齒舍利敬禮如來現在衣鉢水瓶錫杖衆具敬禮過去四佛生地并行坐遺迹敬禮如來得道樹寶塔敬禮如來轉法輪處寶塔敬禮如來般涅槃處寶塔敬禮如來滅後阿育王造八萬四千塔敬禮阿育王所造無量諸佛像敬禮天上人間海中龍宫一切像塔敬禮此國諸州諸瑞聖像敬禮此國諸寺諸山無量靈像敬禮天上人間海中無量形像願一切衆生不在佛前佛後常見佛生常見佛出家常見佛得道常見佛涅槃能建立是無量像塔盡於來際佛事不絶敬重正法門二十六諸法本空寂滅無説以因緣故現有文字當知文字經典本在破病滅惑為先惑既八萬四千故使教門亦有八萬四千法藏至於病銷惑遣藥亦隨亡如筏喻者可以情悉然羣生沈罔隨言封滯由此見故教藥常陳所以金簡盈於寶殿玉軸煥於神宫辨析空有於假實表發權智於無方故如來一代四十九年隨緣示教種種説法及於涅槃但有聲教計隨言説必致淪亡然以義理談玄正宗無昧言雖得喪金旨難乖故立法依用永刋定天魔外道莫敢侵陵自慧日已沈法雲遐布非夫簡册無由獻功尊大迦葉法門英俊擊鐘聲告召集無學千僧一夏撰結遺言十二義求三藏文攝多羅葉典其量莫思蘊積西夏將及千載時運漸染東翻漢朝沿彼至今年垂六百雜録正經七千餘卷詞義明敏談味無遺近則安國利人逺則超凡證聖備如卷部智者尋之至心奉為至尊皇后皇太子七廟聖靈天龍八部乃至十方一切劇苦衆生敬禮一切真如法藏敬禮十方一切諸所説法藏敬禮過去一切諸佛法藏敬禮賢劫初佛拘樓孫如來天龍宫法藏敬禮拘那含牟尼佛天龍宫中法藏敬禮迦葉佛天龍宫中一切法藏敬禮釋迦如來天龍宫一切法藏敬禮西印度黑峰山寺一切法藏敬禮沮渠國大乘十二部法藏敬禮北印度石壁八字捨身法藏敬禮神州大國一切衆藏經典敬禮易州石經朔州恆安石窟經像敬禮一切受持三藏諸法師等敬禮一切禪師律師讀誦經典諸行人等願一切含靈入如是法門常能總持廣説教化通達無礙奉養僧田門二十七僧稱福田羣道宗尚斯何故耶良由發蒙俗之幽心啓正道之遐趣拯沈淪而將濟於三尼御法網而𢎞護於萬齡由是道被天下德光四俗能生善種號曰福田德響犍槌又稱應供心乖理義行越法科則顯乖剃落之容幽受空樹之譬及與施主為讐隙與骨肉為瘡疣熱血之相可尋石女之倫不逺僧護佛藏明言不迷智論大經清範攸屬固當日須三省事必九思念念策心無時寧舍方可入三乘之一位預三寶之一員盛德可觀六道歸依而出有高行難擬七衆相從為福田豈非形寄域中情超域外者也流俗纒糾封附昏迷處處生著何能逺出是以樹立僧寶為俗良田令興福力得出生死不徒設也然佛超纍表作範區中為物受供而實不受法在除惑清淨非情供養感果自隨生業僧含凡聖形繫往因縱成無學猶嬰善報身謝無餘方出諸有今以形纍有緣多須資待故凡施者教多在僧然供養於僧備有三寶故佛有言隨順我語供養佛也為解脫故供養法也衆僧受用供養僧也有斯理義故名衆僧良福田矣奉為至尊皇后皇太子七廟聖靈天龍八部乃至十方一切劇苦衆生敬禮十方一切僧寶敬禮當來下生佛兜率天彌勒菩薩僧敬禮遊方大士文殊師利菩薩僧敬禮護法大士普賢菩薩僧敬禮十方一切行大道心菩薩僧敬禮十方一切行緣覺心辟支佛僧敬禮十方一切行下乘者諸聲聞僧敬禮賔頭闍住法萬載諸聲聞僧敬禮佛子羅㬋羅住法萬載諸聲僧敬禮剡州山海九億萬住法萬載諸聲聞僧敬禮三千界內見在一切諸凡聖僧願一切含靈常與賢聖同乘正道開智生福不墮惡趣生生遭遇為善知識拔除煩惱得出諸有勸請增進門二十八勸請者殷勤之至意也由發殷勤之意則願善之情深矣是故於一切纎微之善咸須殷勤勸請增進令生慧行不容中廢然勸請有二勸請衆生修行戒善具諸德本勸請諸佛救護衆生説法久住十方四惡趣我今悉勸請修持諸戒行獲得於人身十方一切人我今悉勸請修十善業得生於天上十方諸天人我今悉勸請登立正定聚得離於惡道十方諸學人我今悉勸請覺察諸煩惱速證無學地十方阿羅漢我今悉勸請知非究竟位唯有一佛乘十方辟支佛我今悉勸請成就大悲智教化諸衆生人天二乘衆我今悉勸請體覺如來藏修習菩薩行一切諸菩薩我今悉勸請修行十度行速登於十地兜率天菩薩我今悉勸請常轉不退輪速下度羣生菩薩智未明我今悉勸請金剛滅塵纍顯發真實相十方一切佛初成正覺者我請轉法輪安樂諸衆生十方一切佛若欲捨壽命我今歸命請願久住於世如是佛菩薩我今皆勸請發此殷勤心是故稽首禮隨喜萬善門二十九衆生以愚惑故多懷嫉妬增上之心是以見人行善則興惡想摧毁破壞不令成就然彼前人未必損行而此嫉者妄增惱熱增長惑業生死不絶是以聖人調心制意行此隨喜亦復勸請衆生如説奉行十方一切衆所有微細善仁義及禮智孝養謙恭敬慈和及愛敬廉貞清潔行若有如是善我今悉隨喜離欲在家人奉修如來戒三歸五八戒十善菩薩戒清淨諸律儀離惡名聞者如是諸功德我今悉隨喜飯僧施法衣浴除煩惱垢救攝諸貧窮飢寒窮塞者疾病艱危苦施藥原闕如是諸功德我今悉隨喜曠路作好井橋船度人物原闕果施佛并供僧渴乏除熱惱其福實無量如是等功德我今悉隨喜造經流法教燃燈發慧明習誦及轉讀決子諸義趣若復為人説倍增歡喜心如是諸功德我今悉隨喜建立諸塔廟堂殿及寶剎彩畫及木像金銀銅石等傳寫諸相好顯示於法身如是諸功德我今悉隨喜若有造僧坊牀帳及臥具令彼息心者安意於禪林出入苦空門次第寂滅觀如是諸功德我今悉隨喜如來大慈悲善説諸法門發生隨喜行令我等修學隨喜諸聲聞忍苦度生死隨喜諸菩薩不捨惡道受隨喜十方佛無畏天人尊能於三界獄引出諸衆生願令衆生類悉得於佛道是故我隨喜稽首禮諸佛回向佛道門三十言回向者以不著為義原一切衆生備修萬行捨身命財所以不得解脫生死者皆緣耽著果報不能捨離若能不執其心修行攝度隨有微福回施羣生向於佛道者則於果報不復生著便於生死蕭然解脫故經云如所説修行回向為大利是以一切所作善業皆因回向兼勸衆生不著果報何者即此身形果報之本終日養飼莊嚴雕飾要必當死徒為保著自非愚暗所以貧受此身少有慧明何得無時不厭以是智者撫臆論心不容貪著回流生死十方諸衆生所行微善業仁孝及謙敬慈愛柔和等忠正修禮智矜逮賑孤窮如是世俗善悉回向佛道一切諸外道種種勤苦行五熱炙其身投巖赴水火反縛塗炭等無量諸邪見今皆為回向同歸正覺道一切清信士歸戒行十善乃至諸女人亦能修福德又能善説法開化衆妙福回向施羣生共成無上道一切弟子衆聞聲即解悟善來成比丘乃至四道果方便及初觀苦空非常想亦回施羣生共向無上道十方諸辟支自然成緣覺深悟在别世曉了因緣法隱顯化衆生獨處樂善寂如是兼一切盡回向佛道十方諸菩薩讀誦於經法入禪出禪者勸總行衆善如是等三善一切衆德本亦回施衆生歸向無上道一切諸善本乃至賢聖果解空未能窮有無不雙盡悉令於一切同入真妙境著回有相心皆向解脫道如是諸菩薩我今勸回向發此無著心是故稽首禮發願莊嚴門三十一原衆惡所起皆緣意地貪瞋癡也自害害他勿過於此故經號為根本三毒能煩能惱勞擾身心於緣起惡三三九種然此九種義通善惡三善根生名善業道三不善根生名惡業道是故行人常一其心不令動亂微起相見即自覺察寸護人根不令塵染常發𢎞願以自莊嚴願一切衆生皆從今日乃至菩提眼常不看貪淫邪艷惑人之色不看瞋恚醜狀屠裂愚癡疑暗倨慢邪衆之色願見一切十方常住法身之色菩薩下生八相之色如來相好聖衆和會善集之色願一切衆生耳常不聞悲啼愁嘆聲地獄苦楚聲餓鬼畜生受苦聲八苦交對聲四百四病起發聲八萬四千塵勞聲願耳常聞諸佛説法八音聲八萬四千波羅密聲三乘聖果十地功德如是等聲願一切衆生鼻常不聞殺生滋味飲食之氣三十六物革囊之氣發欲羅綺脂澤之氣五辛能熏九相尸氣願鼻常聞十方世界諸樹草木之香五戒八戒十善六念諸德香學無學人十地五分十力八萬四千諸度無漏之香十方諸佛説法之香願一切衆生舌恆不嘗衆生有命身肉雜味能生煩惱滋味願舌恆嘗甘露不死之味天自然食在其舌根變成上味諸佛所食之味法喜禪悅之味解脫泥洹最上勝味願一切衆生身常不覺邪淫細滑生欲樂觸不覺獲湯寒氷之觸餓鬼畜生諸苦惱觸脫百四病寒熱風霜蚉虻蚤虱飢渴諸苦等觸願身常覺清涼強健心悟安隱證道飛行八自在觸願一切衆生皆從今日乃至菩提意常覺知九十八使八萬四千塵勞之法十惡五逆九十六種邪師之法三塗可厭生死大苦願意常知一切衆生皆有佛性佛為醫王法為良藥僧為看病者為諸衆生治生死患令得解脫心常無礙空有不染七賔僚七要松既煙而接漢竹緣嶺而負筠哀過鴻於月曉悲夜猿於霜旻乃鶴駕之非逺信羽車之可鄰鴻池廣象太液染華勢含五水氣疏九河既百尋而照底亦千丈而分沙故乘流以神王或鼓地而目多豈能從我泛此安波詩九月侍宴月殿風轉層臺氣寒髙雲斂色遙露已團式詔司警言戾秋巒輕觴時薦落英可餐侍皇太子釋奠宴霜輕流日風送夕雲雕簷結綵綺井生文四璉合旨八簋舒芬闕遊後園託性本禽魚棲情間物外蘿徑轉連綿松軒方杳藹丘壑每淹留風雲多賞會闕行宅并序余稟性端疏屬愛間外往嵗羈役浙東備歷江山之美名都勝境極盡登臨山原石道步步新情回池絶澗往往舊識以吟以詠聊用述心訪宇北山阿卜居西野外幼賞悅禽魚早性羡蓬艾闕登山望雷居士精舍同沈右衛過劉先生墓下作并序一作同隨王經劉先生墓下作沛國劉子圭學優未仕迹邇心遐履信體仁古之遺德潛舟迅景滅賞淪輝言念方猷式懷嗟述屬舍弟隨郡有示來篇彌縝久要之情益深宿草之嘆升望西山率爾為答雖因事雷生實申悲劉子云爾劉瓛字子圭沛郡相人南史有傳漢陵淹館蕪晉殄一作爾洙風缺五都聲論空三河文義絶興禮邁前英談玄踰往哲明情日夜深徽音嵗時滅垣井總已平煙雲從容裔爾嘆牛山悲我悼驚川逝漢魏六朝百三家集卷七十四
