body:
  text: 漢魏六朝百三家集巻十三目録張衡集題辭東漢之有班張猶西漢兩司馬也相如無史子長無賦孟堅兼之豈後來者欲居上乎抑其文不能齊也平子官侍中請専史職條録三皇更改僣紀龍門之志也上書不聴典章散畧誰之咎歟渾儀靈憲綱絡天地振龍發機懸驗若神子雲復生未容抗跡二京之賦覃思十年長楊羽獵風猶可續崔子玉作碑稱河間制作譬諸造化想慕若此寧異平子耽好𤣥經嘆為漢四百歳書哉政權下夷圖䜟繁興發憤陳論務矯時枉斯又昔者揚雄所無也同聲麗而不淫四愁逺摹正則蔡邕翠鳥秦嘉述婚俱出其下謂之好色謂之思賢其曰可矣時有遇否性命難求與世汎汎曷若歸而諷河洛六藝八十一篇乎始于應間終於思𤣥固平子之生平也目錄賦西京賦東京賦漢魏六朝百三家集巻十三目録欽定四庫全書漢魏六朝百三家集巻十三明張溥輯張衡集賦西京賦薛綜註有憑虚公子者心奓體忲雅好博古學乎舊史氏慿依託也虚無也言無有此公子也奓忲言公子生于貴戚心志奓溢體安驕泰也泰或謂忲習之忲言習于麗好也公子雅好博知古事故學于舊史舊史太史掌圖典者是以多識前代之載言於安處先生曰公子為先生言也安處猶烏處若言何處亦謂無此先生也鄭𤣥禮記注云先生老人教學者夫人在陽時則舒在隂時則慘此牽乎天者也陽謂春夏陰謂秋冬牽猶繋也處沃土則逸處瘠土則勞此繫乎地者也慘則尠於歡勞則褊於恵能違之者寡矣小必有之大亦宜然違猶易也言人慘戚則不能以驩逸勞苦則不能以施恵少有能易此者小謂庶人大謂王者故帝者因天地以致化兆民承上教以成俗化俗之本有與推移何以覈諸言帝王必欲順時居沃土歡逸其人使下承而化之以成奢泰之俗言化之本還與沃瘠相隨逐推移也秦據雍而强周即豫而弱髙祖都西而泰光武處東而約政之興衰常由此作先生獨不見西京之事歟請為吾子陳之漢氏初都在渭之涘秦里其朔寔為咸陽涘涯也里居也朔北也寔是也秦地居其北是曰咸陽左有崤函重險桃林之塞綴以二華巨靈贔屓髙掌逺蹠以流河曲厥跡猶存崤及函谷關桃林皆在長安東故言左華山名也巨靈河神也巨大也古語云此本一山當河水過之而曲行河之神以手擘開其上足蹋離其下中分為二以通河流手足之跡于今尚在贔屓作力之貌也右有隴坻之隘隔閡華戎岐梁汧雍陳寶鳴鷄在焉説文曰岐山在長安西美陽縣界山有兩岐因以名焉於前則終南太一隆崛崔崒隠轔鬱律連岡乎嶓冡終南太一二山名也隆崛之類皆山形容也抱杜含鄠欱灃吐鎬爰有藍田珍玉是之自出藍田𢎞農縣也爾雅曰爰有寒泉范子計然曰玉英出藍田是之自出謂玉出自藍田之中也於後則髙陵平原據渭踞涇澶漫靡迤作鎮於近澶漫靡迤陵原之形為作近鎮也其逺則有九嵕甘泉涸陰沍寒日北至而含凍此焉清暑九嵕甘泉其處常陰寒日北至謂夏至時猶沍寒而有凍帝或避暑于甘泉宫故云清暑爾乃廣衍沃野厥田上上寔為地之奥區神皋神皋接神之聲昔者大帝悦秦繆公而覲之饗以鈞天廣樂帝有醉焉乃為金䇿錫用此土而翦諸鶉首大帝天也翦盡也是時也竝為彊國者有六韓魏燕趙齊楚然而四海同宅西秦豈不詭哉宅居也詭異也初穆公夢然後六國竟滅秦果并而居之豈不異哉自我髙祖之始入也五緯相汁以旅于東井五緯五星也婁敬委輅幹非其議天啓其心人惎之謀及帝圖時意亦有慮乎神祗宜其可定以為天邑天啓謂五星聚也惎教也謂婁敬之謀言髙帝圖此居之時意亦以慮於天地陰陽而思可宜定以為天邑豈伊不䖍思于天衢豈伊不懐歸于枌榆天命不滔疇敢以渝伊惟也䖍敬也言此時豈惟不敬思居天氣四交之處邪謂東京也懐思也枌榆豐社高祖所起也豈惟不思歸處枌榆社之域都于洛邑也渝易也天使都長安謂五星聚于東井也於是量徑輪考廣袤經城洫營郭郛取殊裁於八都豈稽度於往舊南北為徑東西為廣洫城池也裁制也八都猶八方也啓開也言采取八方異制以為宫室之巧非復遵往日之故法也爾乃覽秦制跨周法狹百堵之側陋增九筵之迫脅跨越也因秦制故曰覽比周勝故曰跨之也詩曰築室百堵今以為陋周禮曰明堂九筵今又增之也正紫宫於未央表嶢闕於閶闔天有紫微宫王者象之紫微宫門名曰閶闔宫門立闕以為表嶢者言髙逺也疏龍首以抗殿狀嵬峩以岌嶫亘雄虹之長梁結棼橑以相接抗舉也亘徑度也虹蝃蝀也謂殿梁皆徑度朱畫五色如蝃蝀蝃蝀有雌雄雄者色鮮好蔕倒茄於藻井披紅葩之狎獵飾華榱與璧璫流景曜之韡煜茄藕莖也以其莖倒殖於藻井其華下向反披狎獵重接貌藻井當棟中交木方為之如井幹也華榱畫其榱也曜光也韡言明盛也彫楹玉磶繡栭雲楣三階重軒鏤檻文㮰栭斗也楣梁也皆雲氣畫如繡也檻闌也皆刻畫又以大板廣四五尺加漆澤焉重置中間䦨上名曰軒右平左墄青𤨏丹墀墄限也謂堦齒也天子殿髙九尺階九齒各為九級其側堦各中分左右左有齒右則滂沲平之令輦車得上刋層平堂設切厓隒刋削也坻崿鱗眴棧齴巉嶮殿基之形勢也襄岸夷塗脩路峻險襄謂髙也夷平也峻升也險危也重門襲固姦究是防仰褔帝居陽曜隂藏姦邪也竊寳曰宄帝居謂太微宫五帝所居福猶同也太微宫陽時則見陰時則藏言今長安宫上與之同法矣洪鐘萬鈞猛虎趪趪負筍業而餘怒乃奮翅而騰驤洪大也猛怒也三十斤曰鈞縣鐘格曰筍植曰虎趪趪張設貌言大鐘乃重三十萬斤虎力猛怒故能勝之焉當筍下為兩飛獸以背負又以板置上名為業騰超也驤馳也言獸負此筍業巳重乃有餘力奮其兩翼如將超馳者朝堂承東温調延北西有玉臺聫以昆徳皆殿與臺名嵯峨崨嶫罔識所則形勢也不能名其所法則若夫長年神仙宣室玉堂麒麟朱鳥龍興含章譬衆星之環極叛赫戲以煇煌極北極也環猶繞也言宫觀臺榭樓閣之周於正殿如衆星之繞北極也叛猶煥也赫戲炎盛也煇煌光耀也正殿路寢用朝羣辟大厦眈眈九户開闢周曰路寢漢曰正殿羣辟謂王侯公卿大夫士也屋之四下者為厦眈眈深䆳之貌嘉木樹庭芳草如積髙門有閌列坐金狄内有常侍謁者奉命當御外有蘭臺金馬遞宿迭居常侍謂閹官竭者寺人也蘭臺臺名也次有天禄石渠校文之處重以虎威章溝嚴更之署徼道外周千廬内附衛尉八屯警夜巡晝虎威章溝未聞其意嚴更督行夜鼔署位也衛尉帥吏士周宫外于四方四角立八屯士士則傳宫外向為廬舍晝則巡行非常夜則警備不虞植鎩懸􅚛用戒不虞植柱也後宫則昭陽飛翔增成合驩蘭林披香鳯皇鴛鸞皆後宫别名羣窈窕之華麗嗟内顧之所觀觀覩也謂内顧所覩皆盛好也故其館室次舍采飾纎縟裛以藻繡文以朱緑采五色也纎細也翡翠火齊絡以美玉流懸黎之夜光綴隨珠以為爥明月大珠夜則有光如燭金戺玉階彤庭煇煇彤赤也煇煇赤色貌珊瑚琳碧瓀珉璘彬珍物羅生煥若崐崘雖厥裁之不廣侈靡踰乎至尊璘彬玉光色雜也珍美之物羅列布見煥焉如崐崘之所生者謂其裁制雖事事狹小於至尊然其靡麗之好乃過之也於是鈎陳之外閣道穹隆屬長樂與明光徑北通於桂宫長樂桂宫皆宫名明光殿名命般爾之巧匠盡變態乎其中般魯般一云公輸之子魯哀公時巧人爾王爾皆古之巧者也變竒也態巧也於是後宫不移樂不徙懸門衛供帳官以物辦恣意所幸下輦成燕窮年忘歸猶弗能徧瑰異日新殫所未見瑰竒也殫盡也言竒異之好日日變易皆所未嘗日見之物也惟帝王之神麗懼尊卑之不殊雖斯宇之既坦心猶憑而未攄坦大也憑滿也攄舒也思比象於紫微恨阿房之不可廬廬居也時阿房已壊故不得居也覛往昔之遺館獲林光於秦餘覛視也處甘泉之爽塏乃隆崇而𢎞敷甘泉山名應劭曰甘泉在馮翊雲陽縣爽明也隆崇髙也𢎞敷猶延蔓也既新作於迎風増露寒與儲胥託喬基於山岡直墆霓以髙居墆霓髙貌也通天訬以竦峙徑百常而莖擢上辬華以交紛下刻陗其若削通天臺名武帝元封二年作漢書舊儀云髙三十丈望見長安城訬高也竦立也峙住也徑度也倍尋曰常莖特也擢獨出貌也辬華敷大也刻陗升高也翔鶤仰而弗逮况青鳥與黄雀伏櫺檻而頫聴聞雷霆之相激鶤大鳥青鳥黄雀皆小鳥翔髙飛也伏猶憑也櫺臺上䦨也頫低頭也蒼頡篇曰霆霹靂也言臺之髙於上低頭聴雷聲乃在下栢梁既灾越巫陳方建章是經用厭火祥營宇之制事兼未央兼猶倍也所以順巫言圜闕竦以造天若雙碣之相望鳯鶱翥於甍標咸遡風而欲翔甍棟也標末也遡向也謂作鐡鳯皇令張兩翼舉頭敷尾以臿屋上當棟中央下有轉樞常向風如將飛者閶闔之内别風嶕嶢何工巧之瑰瑋交綺豁以疏寮瑰瑋竒好也疏刻穿之也干雲霧而上達狀亭亭以岧岧亭亭岧岧髙貌干犯也神明崛其特起井幹疊而百增峙遊極於浮柱結重欒以相承累層構而遂隮望北辰而髙興崛髙貌峙猶置也三輔名梁為極作遊梁置浮柱上欒柱上曲木兩頭受櫨者消雰埃於中宸集重陽之清澂瞰宛虹之長鬐察雲師之所憑上飛闥而仰眺正覩瑤光與玉繩消散也雰埃塵穢也宸天地之交宇也言神明臺高既除去下地之埃穢乃上止于天陽之宇清澂之中也上為陽清又為陽故曰重陽鬐脊也雲師畢星也臺髙悉得視之飛闥突出方木也將乍往而未半怵悼慄而慫兢非都盧之輕趫孰能超而究升怵恐也悼傷也慄憂戚也言恐墜也馺娑駘盪燾奡桔桀枵詣承光睽罛庨豁燾奡桔桀睽罛庨豁皆形貌増桴重棼鍔鍔列列反宇業業飛檐䡾䡾流景内照引曜日月凡屋宇皆垂下向而好大屋飛邊頭瓦皆更微使反上其形業業然檐板承落也䡾䡾髙貌言皆朱畫華采流引日月之光曜於宇内天梁之宫寔開髙闈旗不脱扄結駟方蘄櫟輻輕騖容於一扉天梁宫名宫中之門謂之闈此言特髙大爾雅曰熊虎為旗扄關也謂建旗車上有關制之令不動搖曰扃每門解下之今此門髙不復脱扄結駕駟馬方行而入蘄馬銜也長廊廣廡連閣雲蔓閈庭詭異門千户萬謂閣道如雲氣相延蔓也重閨幽闥轉相逾延望􅌄窱以徑庭眇不知其所返宫中之門小者曰闥互相周通􅌄窱徑庭過度之意言入其中皆迷惑不識還道也既乃珍臺蹇産以極壯墱道邐倚以正東蹇産形貌也墱閣道也邐倚一髙一下一屈一直也乃從建章館踰西城東入于正宫中也似閬風之遐坂横西洫而絶金墉城尉不弛柝而内外潛通閬風崑崙山名也洫城池也墉謂城也絶度也言閣道似此山之長逺横越西池而度金城也西方稱之曰金弛廢也潜嘿也言城門校尉不廢擊柝之備内外己自嘿通也前開唐中彌望廣潒顧臨太液滄池漭沆彌逺也漭沆猶洸潒亦寛大也漸臺立於中央赫昈昈以𢎞敞清淵洋洋神山峩峩列瀛洲與方丈夾蓬萊而駢羅上林岑以􅤢㠑下嶄巖以嵒齬三山形貌也峩峩髙大也長風激于别隯起洪濤而揚波浸石菌于重涯濯靈芝以朱柯水中之洲曰隯音島石菌靈芝皆海中神山所有神草名仙之所食者浸濯也重涯池邊也朱柯芝草莖赤色也海若游于𤣥渚鯨魚失流而蹉跎海若海神鯨大魚於是采少君之端信庶欒大之貞固立修莖之仙掌承雲表之清露屑瓊蘂以朝餐必性命之可度美往昔之松喬要羡門乎天路想升龍于鼎湖豈時俗之足慕若歴世而長存何遽營乎陵墓徒觀其城郭之制則旁開三門參塗夷庭方軌十二街衢相經街大道也經歴也一面三門門三道故云參塗塗容四軌故方十二軌軌車轍也夷平也庭猶正也廛里端直甍宇齊平都邑之空地曰廛甍棟也北闕甲第當道直啓程巧致功期不陁陊木衣綈錦土被朱紫武庫禁兵設在蘭錡第館也甲言第一也言皆程擇好匠令盡致其功夫既牢又固不傾陊也言皆采畫如錦繡之文章也錡架也武庫天子主兵器之官也匪石匪董疇能宅此爾乃廓開九市通闤帶闠旗亭五重俯察百隧周制大胥今也惟尉廓大也闤市營也闠中隔門也崔豹古今注曰市牆曰闤市門曰闠旗亭市樓也隧列肆道也瓌貨方至鳥集鱗萃鬻者兼贏求者不匱瑰竒貨也方四方也竒寳有如鳥之集鱗之萃也鬻賣也兼倍也贏利也匱乏也爾乃商賈百族販夫婦鬻良雜苦蚩眩邊鄙坐者為商行者為賈裨販買賤賣貴以自益良善也先見良物價定而雜與惡物以欺惑下土之人何必昬於作勞邪贏優而足恃昬勉也邪偽也優饒也言何必當勉力作勤勞之事乎欺偽之利自饒足恃也彼肆人之男女麗美奢乎許史言長安市井之人被服皆過此二家若夫翁伯濁質張里之家擊鐘鼎食連騎相過東京公侯壯何能加都邑遊俠張趙之倫齊志無忌擬跡田文輕死重氣結黨連羣寔蕃有徒其從如雲寔實也蕃多也徒衆也茂陵之原陽陵之朱趫悍虓豁如虎如貙睚眦蠆芥屍僵路隅僵仆也丞相欲以贖子罪陽石汚而公孫誅若其五縣遊麗辯論之士街談巷議彈射臧否剖析豪釐擘肌分理所好生毛羽所惡成瘡痏毛羽言飛揚瘡痏謂瘢痕也郊甸之内鄉邑殷賑五都貨殖既遷既引商旅連槅隠隠展展冠帶交錯方轅接軫五十里為近郊百里為甸師殷賑謂富饒也遷易也引致也言賈人多車枙相連屬隠隠展展重車聲也冠帶猶縉紳謂吏人也封畿千里統以京尹郡國宫館百四十五離宫别館在諸郡國者右極盩厔并巻酆鄠左暨河華遂至虢土盩厔山名因名縣暨言及也華隂縣故屬京兆上林禁苑跨谷彌阜東至鼎湖斜界細栁掩長楊而聯五柞繞黄山而款牛首跨越也彌猶掩也大陵曰阜上林苑名禁禁人妄入也鼎湖細栁皆地名也鼎湖在華隂東細栁在長安西北長楊宫在盩厔五柞亦館名云有五株柞樹繞裹也款至也繚垣緜聯四百餘里植物斯生動物斯止繚垣猶繞了也緜聫猶連蔓也四百餘里苑之周圍也植物草木動物禽獸衆鳥翩翻羣獸􅛖騃散似驚波聚似京峙皆鳥獸之形貌也京髙也水中有土曰峙言禽獸散走之時如水驚風而揚波聚時如水中之髙土也伯益不能名𨽻首不能紀林麓之饒于何不有木叢生曰林木則樅栝㯶楠梓棫楩楓樅松葉栢身栝栢葉松身梓如栗而小棫白㽔也楓香木也嘉卉灌叢蔚若鄧林嘉猶美也灌叢蔚若皆盛貌也鬱蓊薆薱橚樉櫹槮吐葩颺榮布葉垂陰皆草木盛貌也葩華也草則葴莎菅蒯薇蕨荔苀王蒭莔臺戎葵懐羊苯䔿蓬茸彌皋被岡彌猶覆也言草木熾盛覆被於髙澤及山岡之上也篠簜敷衍編町成篁山谷原隰泱漭無疆篠竹箭也簜大竹也敷布也衍蔓也編連也町謂畎畝篁竹墟名也泱漭無限域之貌言其多無境限也廼有昆明靈沼黑水𤣥阯周以金堤樹以栁杞小渚曰阯金堤謂以石為邊隒而多種把栁之木豫章珍館揭焉中峙牽牛立其左織女處其右皆豫章木為臺館也日月於是乎出入象扶桑與濛汜其中則有黿鼉巨鼈鱣鯉鱮鮦鮪鯢鱨鯊修額短項大口折鼻詭類殊種自鰭鯊以上皆魚名也修額至折鼻皆魚形也詭類殊種多雜物也鳥則鷫鷞鴰鴇駕鵞鴻鶤上春候來季秋就温南翔衡陽北棲雁門奮隼歸鳧沸卉軿訇衆形殊聲不可勝論隼小鷹也論説也於是孟冬作陰寒風肅殺雨雪飄飄氷霜慘烈百卉具零剛蟲搏摯寒氣急殺於萬物孟冬十月隂氣始盛萬物彫零飄飄雨雪貌慘烈寒也草木零落陰氣盛殺鷹犬之屬可摰擊也爾乃振天維衍地絡蕩川瀆簸林薄維綱也絡網也謂其大如天地也振整理也衍申布也林薄草木叢生也蕩動也簸揚也謂驅獸也鳥畢駭獸咸作草伏木棲寓居穴託起彼集此霍繹紛泊在彼靈囿之中前後無有垠鍔謂禽獸驚走得草則伏遇木則棲非其常處茍寄而居值穴而託為人窮迫之意起彼集此謂為彼人所驚而來集此人之前霍繹紛泊飛走之貌前後無有垠鍔言禽獸之多前却顧視無復齊限也虞人掌焉為之營域焚萊平場柞木翦棘虞人掌禽獸之官結罝百里迒杜蹊塞麀鹿麌麌駢田偪仄罝網也迒道也蹊徑也皆以網杜塞之也鹿牝曰麀麌麌形貌駢田偪仄聚㑹之意天子乃駕彫軫六駿駮戴翠㡌倚金較璿弁玉纓遺光儵爚彫畫也天子駕六馬駮白馬而黑畫為文如虎者翠羽為車葢黄金以飾較也古今注曰車耳重較文官青武官赤或曰車蕃上重起如牛角也弁馬冠也乂髦以璿玉作之纓馬鞭也以玉飾之遺餘也儵爚有餘光也建𤣥弋樹招搖棲鳴鳶曳雲梢弧旌枉矢虹旃蜺旄𤣥弋北斗第八星名為矛頭主胡兵招搖第九星名為盾今鹵簿中畫之於旗建樹之以前驅禮記曰前有塵埃則載鳴鳶棲謂畫其形于旗上雲梢謂旌旗之流飛如雲也弧星名通帛為旃雄曰虹雌曰蜺華葢承辰天畢前驅華葢星覆北斗王者法而作之畢網也象畢星也前驅載之千乘雷動萬騎龍趨屬車之簉載獫猲獢大駕最後一乘懸豹尾以前為省中侍御史載之簉副也匪惟翫好迺有秘書小説九百本自虞初從容之求寔俟寔儲小説醫巫厭祝之術凡有九百四十三篇言九百舉大數也持此秘術儲以自隨待上所求問皆常具也於是蚩尤秉鉞奮鬛被般禁禦不若以知神姦魑魅蝄蜽莫能逢旃陳虎旅於飛亷正壘壁乎上蘭陳列也結部曲整行伍燎京薪駴雷鼓縱獵徒赴長莽積高為京燎謂燒之莽草長謂深且逺也方言曰草南楚間謂之莽迾卒清候武士赫怒緹衣韎韐睢盱拔扈光炎爥天庭囂聲震海浦河渭為之波盪吳嶽為之陁堵燭照也海浦四瀆之口波盪搖動也陁落也百禽㥄遽騤瞿奔觸喪精亡䰟失歸忘趨投輪闗輻不邀自遇㥄猶怖也遽促也騤瞿走貌奔觸唐突也言禽獸亡失精䰟不知所當歸趨也反闗入輪輻之間不須邀逐往自得之趣向也邀遮也飛潚箾流鏑􅚹㩧矢不虚舍鋋不茍躍潚箾形也􅚹㩧中聲也舍放也躍跳也矢鋌跳躍必有獲矣當足見蹍值輪被轢僵禽斃獸爛若磧礫足所蹈為蹍車所加為轢僵仆也石細者曰礫謂所獲禽鳥爛然如聚細石但觀罝羅之所羂結竿殳之所揘畢羂縊也結縛也竿竹也殳杖也八稜長丈二而無刃或以木為之或以竹為之揘畢謂撞㧙也义蔟之所攙捔徒搏之所撞㧙攙捔貫刺之撞㧙猶揘畢也白日未及移晷已獮其十七八晷景也獮殺也言日景未移禽獸什己殺七八矣若夫遊鷮髙翬絶阬踰斥毚兎聯猭陵巒超壑比諸東郭莫之能獲雉之健者為鷮尾長六尺詩云有集唯鷮翬飛也斥澤崖也毚狡兔也聯猭走也巒山也壑阬谷也自游鷮至此皆説禽獸輕狡難得也乃有迅羽輕足尋景追括鳥不暇舉獸不得發青骹摰於韝下韓盧噬於􅔗末迅羽鷹也輕足好犬也括箭括之御弦者舉飛也發駭走也青骹鷹青脛者及其猛毅䯱髵隅目髙眶威懾兕虎莫之敢伉䯱髵作毛鬛也隅目角眼視也髙眶深瞳子也皆謂猛獸作怒可畏者兕水牛類伉當也謂猛獸兕虎且猶畏之人無敢當之者乃使中黄之士育獲之儔朱鬕􅡫髽植髮如竿袒裼㦸手䠑踽盤桓絳帕額露頂髻植髮如竿以擊猛獸能服之也䠑踽開足也盤桓便旋也鼻赤象圏巨狿摣狒猬㧗㺠狻揩枳落突棘藩象鼻赤者怒巨狿􅝤也怒走者為狿謂能戾象鼻又穿􅬨以著圏􅛝獸身人面身有毛被髮迅走食人猬其毛如刺窳窫窳也類貙虎亦食人狻狻猊一曰獅子攎枇皆謂㦸撮之梗林為之靡拉檏叢為之摧殘靡拉摧殘言楷突之皆擗碎毀折也輕鋭僄狡趫捷之徒赴洞穴探封狐陵重巘獵昆駼杪木末擭獑猢超殊榛摕飛鼯輕鋭謂便利捷疾也言如此者多也洞穴深且通也探取也封大也陵猶升也山之上大下小者曰巘昆駼如馬跂蹄善登髙言能升重巘之嶺而獵取昆駼之獸杪猶表也獑猢猨類而白腰以前黑在木表擭謂掘取之也殊猶大也榛木也摕捎取之也是時後宫嬖人昭儀之倫常亞於乘輿慕賈氏之如皋樂北風之同車盤于遊畋其樂只且嬖幸也昭儀後宫官也亞次也乘輿天子所乘車盤樂也於是鳥獸殫目觀窮遷延邪睨集乎長楊之宫殫盡也窮極也所觀畢也遷延退旋也息行夫展車馬收禽舉胔數課衆寡息休也胔死禽獸將腐之名也數計課録校所得多少置互擺牲頒賜獲鹵割鮮野饗犒勤賞功互所以挂肉擺謂破礫懸之頒謂以所鹵獲之禽獸賜士衆也謂饗食士衆於廣野中勞勤苦賞有功五軍六師千列百重酒車酌醴方駕授饔升觴舉燧既釂鳴鐘酒肴皆以車布之燧火也謂行酒舉烽火以告衆也以釂鳴鐘鼔也膳夫馳騎察貳㢘空炙炰夥清酤㩼皇恩溥洪徳施徒御悦士忘罷膳夫宰夫也察㢘皆視也貳為兼重也空滅無也言宰人騎馬行視肴有兼重及滅無者詩有炰龞清酤美酒也巾車命駕迴斾右移相羊乎五柞之館旋憇乎昆明之池巾車主車官也回車右轉將旋也相羊仿羊也池即所謂靈沼登豫章簡矰紅蒲且發弋髙鴻挂白鶴聯飛龍磻不特絓往必加雙豫章池中臺也簡省也繳射矢長八寸其絲名矰挂矢絲挂鳥上也飛龍鳥名也沙石膠絲為磻非徒獲一而巳必雙得之於是命舟牧為水嬉浮鷁首翳雲芝垂翟葆建羽旗舟牧主舟官嬉戲也船頭象鷁鳥厭水神故天子乘之翳覆也為畫芝草及雲氣以為船覆飾也垂翟謂垂羽翟為葆葢飾建隼羽為旌旗齊栧女縱櫂歌發引和校鳴葭奏淮南度陽阿感河馮懐湘娥驚蝄蜽憚蛟蛇發引和言一人唱餘人和也葭更校急之乃鳴和杜摰葭賦曰李伯陽入西戎所造漢書有淮南鼓員四人謂舞人也淮南子曰足蹀陽阿之舞蝄蜽水神蛟龍類驚憚謂皆使駭怖也然後釣魴鱧纚鰋鮋摭紫貝搏耆龜搤水豹馽潛牛澤虞是濫何有春秋纚網如箕形狹後廣前魴鱧鰋鮋皆魚名搏摭皆拾取之名耆老也龜之老者神水豹潛牛皆謂水處也澤虞主水澤官濫施罛罔也言不順時節常設之也擿漻澥捜川瀆布九罭設罜䍡摷鯤鮞殄水族蕖藕拔蜃蛤剥漻澥小水别名擿搜謂一一周索也鯤魚子鮞細魚族類也摷殄言盡取之蕖芙葉蜃蛤蚌也逞欲畋䰻效獲麑䴠摎蓼浶浪乾池滌藪逞極也鹿子曰麑麋子曰䴠所求徧也上無逸飛下無遺走擭胎拾卵蚳蝝盡取取樂今日遑恤我後遑暇也言且快今日之茍樂焉能復顧後日之長久也既定且寧焉知傾陁天下巳定貴在安樂極意恣心何能復顧後日之傾陁也大駕幸乎平樂之館張甲乙而襲翠被平樂館大作樂處也襲服也李尤樂觀賦設平樂之顯觀處金商之維限攅珍寶之玩好紛瑰麗以奓靡臨迥望之廣場程角觝之妙戲攅聚也紛猶雜也瑰竒也麗美也奓靡奢放也程課其技能也烏獲扛鼎都盧尋橦衝狹鷰濯胸突􅀈鋒跳丸劒之揮霍走索上而相逢巻簟席以矛揷其中伎兒以身投從中過鷰濯以盤水置前坐其後踊身張手跳前以足偶節踰水復却坐如鷰之浴也揮霍謂丸劒之形也索上長繩繫兩頭於梁上舉其中央兩人各從一頭上交相度即所謂舞絙者也華嶽峨峨岡巒參差神木靈草朱實離離總㑹仙倡戲豹舞羆白虎鼓瑟蒼龍吹篪華山為西岳峨峨髙大貌參差低仰貌神木松柏靈夀之屬靈草芝英朱赤色離離實垂之貌仙倡偽作假形謂如神也羆豹熊虎皆為假頭也女娥坐而長歌聲清暢而蜲蛇洪涯立而指麾被毛羽之􅗒襹蜲蛇聲餘詰曲也洪涯三皇時伎人娼家託作之衣毛羽之衣􅗒衣毛形也度曲未終雲起雪飛初若飄飄後遂霏霏飄飄霏霏雪下貌皆巧偽作之複陸重閣轉石成雷複陸複道閣也於上轉石以象雷聲礔礰激而增響磅礚象乎天威増響重聲也磅礚雷霆之音如天之威怒巨獸百尋是為蔓延神山崔巍欻從背見熊虎升而挐攫猨狖超而髙援作大獸長八十丈所謂蛇龍蔓延也欻之言忽也偽所作也獸從東來當觀樓前背上忽然出神山崔嵬也皆偽所作也恠獸陸梁大雀踆踆白象行孕垂鼻轔輑海鱗變而成龍狀踠踠以蝹蝹皆偽所作也陸梁東西倡佯也踆踆大雀容也偽作大白象從東來當觀前行且乳鼻正轔囷也海鱗大魚也初作大魚從東方來當觀前而變作龍蜿蜿蝹蝹龍形貌也含利颬颬化為仙車驪駕四鹿芝蓋九葩蟾蜍與龜水人弄蛇含利獸名性吐金故曰含利颬颬容也驪猶羅列駢駕之也以芝為蓋蓋有九葩之采也作千嵗蟾蜍及千嵗龜行舞於前也水人俚兒能禁固弄蛇也竒幻儵忽易貌分形吞刀吐火雲霧杳㝠畫地成川流渭通涇儵忽疾也易貌分形變化異也東海黄公赤刀粤祝冀厭白虎卒不能救挾邪作蠱於是不售東海有能赤刀禹步以越人祝法厭虎者號黄公又于觀前為之蠱惑也售猶行也謂懐挾不正道者於是時不得行也爾乃建戲車樹修旃侲僮程材上下翩翻突倒投而跟絓譬殞絶而復聯樹植也旃謂􅓚也建之於戲車上也侲之言善善僮幼子也程猶見材伎能也翩翻戲橦形也突然倒投身如将墜足跟反絓橦上若己絶而復連百馬同轡騁足竝馳橦末之伎態不可彌於橦末作其形狀彌猶極也言變巧之多不可極也彎弓射乎西羌又顧發乎鮮卑彎挽弓也鮮卑在羌之東皆於橦上作之於是衆變盡心酲醉盤樂極悵懐萃酲飽也萃猶至也於是游戲畢心飽於悦樂悵然思念明當復至也陰戒期門微行要屈降尊就卑懐璽藏紱要或為徼天子印曰璽紱綬也懐藏之自同卑者便旋閭閻周觀郊遂若神龍之變化彰后皇之為貴龍出則昇天潛則泥蟠故云變化彰明也天子稱元后皇漢帝稱也然後歴掖庭適歡館捐衰色從嬿婉掖庭今官主後宫擇所驩者乃幸之嬿婉美好之貌促中堂之陿坐羽觴行而無筭秘舞更奏妙材騁伎妖蠱豔夫夏姬美聲暢於虞氏始徐進而羸形似不任乎羅綺嚼清商而却轉增嬋娟以跐豸紛縱體而迅赴若驚鶴之羣羆中堂中央也秘言希見為竒也更遞也奏進也清商鄭音嬋娟跐豸姿熊妖蠱也縱體舞容也迅疾赴節相赴也相鶴經曰後七年學舞又七年舞應節振朱屣於盤樽奮長袖之颯纚要紹修態麗服颺菁眳藐流眄一顧傾城振猶掉也朱屣赤絲履也舞人特作長袖颯纚長貌也要紹謂嬋娟作姿容也修為也態嬌媚意也菁華英也眳眉睫之間藐好視容也流眄轉眼貌也展季桑門誰能不營列爵十四競媚取榮盛衰無常惟愛所丁後宫官從皇后以下凡十四等競爭邪媚求榮愛也衛后興於鬒髮飛燕寵於體輕爾乃逞志究欲窮身極娛鑒戒唐詩他人是媮逞娛也娛樂也唐詩刺晉僖公不能及時以自娛樂曰子有衣裳弗曳弗婁宛其死矣他人是媮言今日之不極意恣嬌亦如此也自君作故何禮之拘增昭儀於婕妤賢既公而又侯許趙氏之無上思致董於有虞王閎爭於坐側漢載安而不渝渝易也髙祖創業繼體承基暫勞永逸無為而治耽樂是從何慮何思多歴年所二百餘朞朞一匝也徒以地沃野豐百物殷阜巖險周固襟帶易守得之者彊據之者久流長則難竭柢深則難朽故奢泰肆情而馨烈彌茂沃肥也豐饒也殷盛也阜大也謂左崤函右隴坻前終南後髙陵言土地險固故得放心極意而奓泰之馨烈益以茂盛鄙生生乎三百之外傳聞於未聞之者曾髣髴其若夢未一隅之能覩鄙生公子自稱謙辭也三百自髙祖以下至作賦時也此何與於殷人屢遷前八而後五居相圮耿不常厥土盤庚作誥帥人以苦方今聖上同天號於帝皇掩四海而為家富有之業莫我大也天稱皇天帝今漢天子號皇帝兼同之掩覆也三皇以來無大於漢者徒恨不能以靡麗為國華獨儉嗇以齷齪忘蟋蟀之謂何儉嗇節愛也蟋蟀唐詩刺儉也言獨為節愛不念唐詩所刺邪豈欲之而不能將能之而不欲歟䝉竊惑焉願聞所以辯之之説也言我不解何故反去西都從東京置奢逸即儉嗇也説猶分别解説東京賦薛註安處先生於是似不能言者憮然有間有間謂有頃之間也先生聞公子稱西京奢泰之事心恠其所貴者謂違禮失道故愕然有頃乃能言乃莞爾而笑曰若客所謂末學膚受貴耳而賤目者也莞爾舒張面目之貌也末學謂不經根本膚受謂皮膚之不經于心胸貴耳謂東京先生笑公子以西京為貴以東為賤也茍有胸而無心不能節之以禮茍猶誠也言賔誠信胸臆之所聞而心不能以禮節度其可否也宜其陋今而榮古矣言人不能以禮節度其事情者固宜薄陋今日之事而以此所聞古事為榮貴由余以西戎孤臣而悝穆公於宫室如之何其以温故知新研覈是非近於此惑如奈也覈實也研審也先生言由余但西戎孤陋之臣耳尚知非秦宫室之大如何公子雅好博古温故知新之徳當審實事理之是非而反惑于此事論語曰温故而知新可以為師矣王褒責髯奴曰研覈否臧周姬之末不能厥政政用多僻始於宫隣卒於金虎姬周姓也末謂幽厲二主周末世之王多邪僻之政也鄰近也謂幽王近於宫室惑於褒姒卒有禂敗也金虎西方白虎神主金金白也嬴氏摶翼擇肉西邑嬴秦姓也周書曰無為虎摶翼將飛入邑擇人而食也摶翼謂著翼也摶與附同是時也七雄並爭競相髙以奢麗七雄謂韓魏燕趙齊楚秦也爭謂各强盛而競相髙以奢溢將為國好不復顧于禮法楚築章華於前趙建叢臺於後左氏傳曰楚子成章華之臺于乾谿一朝叛之于前在春秋之時史記趙武靈王起叢臺太子圍之三月于後在六國之時秦政利觜長距終得擅場思専其侈以莫巳若也言秦以天下為大場喻七雄為鬬雞利喙長距者終擅一場也史記曰秦始皇秦襄王子名政説文曰擅専也莫無也若如也言始皇所以思専擅其奢侈者以天下之君無如于我也乃構阿房起甘泉三輔故事秦始皇上林苑中作離宫别觀一百四十六所不足以為大㑹羣臣二世胡亥起阿房殿東西三里南北三百步下可建五丈旗在山之阿故號阿房也甘泉山名也戰國策范睢曰秦北有甘泉宫謂其下有甘泉水因以名之結雲閣冠南山結連也雲閣閣名也髙如雲故言雲三輔故事曰秦二世胡亥起雲閣欲與山齊冠覆也南山終南在長安南征税盡人力殫然後收以太半之賦威以參夷之刑言征税之賦盡於奢泰之用天下之力盡於長城與宫室也殫盡也漢書伍被曰秦作阿房宫收太半之賦韋昭曰凡數三分有二為太半言秦造宫室奢麗費用不足乃復收其太半之賦百姓賦税不得者誅其三族漢書曰秦用商鞅之法造參夷之誅參三也謂滅三族其遇民也若薙氏之芟草既藴崇之又行火焉遇逢遇也周禮有薙氏掌山澤芟除草菅毛詩載芟載柞左傳周任有言曰若農夫之務去草芟夷藴崇之杜預曰芟殺藴積也崇聚也言秦始皇酷虐百姓如芟草積而放火惵惵黔首豈徒跼髙天蹐厚地而巳哉乃救死於其頸史記曰秦皇更名民曰黔首謂黑頭無知也跼蹐恐懼之貌毛詩曰謂天葢髙不敢不跼跼傴僂也謂地葢厚不敢不蹐蹐累足也謂此時之民非徒跼髙天蹐厚地而巳乃晝夜畏死其頸敺以就役唯力是視謂不復知民有緩急與飢寒唯趨敺令作力而巳百姓不能忍是用息肩於大漢而欣戴髙祖忍堪也言秦天下之民若擔重物不得休息今來歸漢得息肩膊髙祖膺籙受圖順天行誅杖朱旗而建大號膺籙謂當五勝之籙受圖夘金刀之語順天謂順天命而起又悟神姥之言舉朱旗而大呼天下之英雄與共定事也所推必亡所存必固言髙祖所推擊者使之亡所存者使之堅固掃項軍於垓下紲子嬰於軹塗掃除也項項羽也垓地名漢王圍項羽于垓下羽聞四面有楚歌乃與數百騎走髙祖使濯嬰追之斬羽東城紲猶擊也子嬰秦子嬰也因秦宫室據其府庫作洛之制我則未暇因仍也據就也府庫謂官吏所止為府車馬器械所居曰庫也作洛謂造洛邑也我我髙祖也天下新造草創不暇改作如禮制也是以西匠營宫目翫阿房規摹踰溢不度不臧損之又損然尚過於周堂觀者狹而謂之陋帝已譏其泰而弗康西匠謂秦之舊匠也目視也翫習也阿房宫名漢書曰梧齊侯陽城人名延為少府作長樂未央宫也規圖也踰越也溢過也度法也臧善也謂西匠所圖越過不得禮法皆言不善也損減也言髙祖雖數損減其制度猶過于周家之堂觀視陋小也康安也言觀者習見秦之夸麗睹今日之減小皆以為陋然髙祖猶已譏其泰而不安也謂七年冬上自將擊韓王信蕭丞相留長安營起未央宫立東闕前殿武庫太倉髙祖見其壯麗怒曰何修宫室之過也且髙既受命建家造我區夏矣髙髙祖也區區域也夏華夏也言髙祖受上天之命建立國家制造區夏文又躬自菲薄治致升平之徳文文帝也躬自菲薄謂儉約漢書文帝欲作露臺召匠計直百金曰吾奉先帝宫室常恐太奢何用臺為故文景之際號為升平升平謂國太平也武又大啓土宇紀禪肅然之功武武帝也漢書武紀曰定越地為南海七郡北置朔方等五郡故云大啓土宇啓開也紀記也肅敬也謂登封太山升禪肅然宣重威以撫和戎狄呼韓來享宣宣帝也漢書宣紀曰呼韓邪單于欵五原塞願奉國珍毛詩曰自彼氐羌莫敢不來享享獻也撫安也戎狄呼韓並國名左傳曰子教寡人和戎狄言宣帝能和戎狄咸用紀宗存主饗祀不輟咸皆也紀録也宗太宗文帝廟號也主木主言刻木為人主神置廟中而祭之輟止也凡天子五世則廢今廟不遷毁其主各四時祭祀無止絶時銘勲彛器歴世彌光彛常也宗廟之器稱彛勲功也歴經也彌益也銘勒也勒銘于宗廟之器鐘鼎萬祀彌益光明今捨純懿而論爽徳以春秋所諱而為美談宜無嫌於往初故蔽善而揚惡祗吾子之不知言也爾雅曰純大懿美也爽差也今公子反舍四海純大懿美之徳而専論説爽差之過失者也春秋諱國之惡今公子反以為美談也宜之言義也無猶不也祗是也今公子之義不嫌於蔽國之善揚國之惡是公子之不知言也必以肆奢為賢則是黄帝合宫有虞總期固不如夏癸之瑤臺殷辛之瓊室也湯武誰革而用師哉肆放也賢善也謂黄帝明堂以草葢之名曰合宫舜之明堂以草葢之名曰總章言難公子黄帝等造此是守儉也湯謂殷湯武謂武王革改也言誰遣革改殷紂夏桀而用師哉以其奢侈婬放所以湯武順天命而行罰之此譏西京公子也盍亦覽東京之事以自寤乎盍猶何不也覽祖也自寤自覺寤也言公子何不視東京之行事心自覺寤邪且夫天子有道守在海外淮南子曰若天下無道守在四夷天下有道守在海外言四夷皆為臣僕守位以人不恃隘害人謂衆庶也隘險也言要須擇任賢臣不以隘害為牢固茍民志之不諒何云巖險與襟帶茍誠也諒信也公子稱巖險周固襟帶易守故今答曰誠使人心不信何用周固反易守乎秦負阻於二闗卒開項而受沛負恃也卒終也言負二闗以為牢固終受二人所入也二人謂髙祖從武闗入項羽從函谷闗入彼偏據而規小豈如宅中而圖大彼謂秦也據依也言彼秦偏據闗西所規近在二闗之内故曰小豈如東京居天地之中所圖者四海之外昔先王之經邑也掩觀九隩靡地不營土圭測景不縮不盈總風雨之所交然後以建王城先王謂周成王也邑洛邑也掩猶及也九隩謂九州之内也靡地不營謂徧求之卜瀍澗及黎水皆不吉鄭𤣥曰土度也縮短也盈長也謂圭長一尺五寸夏至之日竪八尺表日中而度之圭影正等天當中也若影長於圭則太近北圭長於影則太近南近北多寒近南多暑近東多風近西多雨總猶括也王城今河南也周禮曰土圭之法測土深正日景以求地中四時之所交風雨之所㑹陰陽之所和乃建王國也審曲面勢審度也謂審察地形曲直之勢而建王都泝洛背河左伊右瀍泝向也洛洛水河黄河伊伊水瀍瀍水西阻九阿東門于旋謂東有旋門在成皋西南十數里阪形周屈故云于旋盟津達其後太谷通其前孟津四瀆之長故武王為諸侯約誓于其上尚書曰東至于盟津盟津地名在洛北都道所湊古今以為津太谷在輔氏北洛陽西也洛陽記曰太谷洛城南五十里舊名通谷迴行道乎伊闕邪徑捷乎轘轅伊闕山名也轘轅阪名也迴曲也捷邪也謂大道迂曲乃當伊闕之外邪徑趣疾當歴轘轅太室作鎮揭以熊耳太室嵩髙别名也揭猶表也言以嵩髙之嶽為國之鎮也復表以熊耳之山底柱輟流鐔以大岯底柱山名也在河東縣東南向居河中猶柱然也輟止也温液湯泉黒丹石緇言泉水如湯浴之可以除病在河南梁縣界中黒丹石緇謂黒石雜色言温液即湯泉之流黑丹石緇之所出王鮪岫居能鼈三趾山有穴曰岫王鮪魚名也居山穴中長老言王鮪之魚由南方來出此穴中入河水見日目眩浮水上流行七八十里釣人見之取之以獻天子用祭其穴在河南小平山虙妃攸館神用挺紀攸所也館舍也傳曰成王遷九鼎於洛邑卜年七百卜世三十後皆如其言故云神所挺紀謂告年紀之處也龍圖授羲龜書畀姒尚書傳曰伏羲氏王天下龍馬出河遂則其文以畫八卦謂之河圖又曰天與禹洛出書謂神龜負文而出列于背召伯相宅卜惟洛食周公初基其繩則直相視也宅居也惟有也食謂吉兆謂初造洛邑召公先相宅卜之吉周公繩度之合于制度萇𢎞魏舒是廓是極萇𢎞周大夫也魏舒晉大夫獻子也廓猶規也極致也謂二人率諸侯曰敬以致功規度王城三旬而立之經途九軌城隅九雉南北為經途道也軌車轍也度堂以筵度室以几堂明堂也筵席也長九尺几俎也長七尺京邑翼翼四方所視京大也大邑謂洛陽也翼翼禮儀盛貌言常為四方觀翼翼然也漢初弗之宅也故宗緒中圮巨猾間舋竊弄神器歴載三六偷安天位于時蒸民罔敢或貳其取威也重矣緒統也圯絶也漢家不居於洛故宗廟之統中途廢絶也巨王莽字巨君也猾狡也間候也舋隙也神器帝位也言王莽因成哀無嗣元后秉政漢祚微弱簒處髙位載年也三六十八年謂王莽簒位一十八年也天位帝位也于於也蒸衆也罔無也言是時衆民無敢有二心于莽者毛詩曰于時言言尚書曰蒸民乃粒威畏也重猶多也謂天下所畏已者多矣我世祖忿之乃龍飛白水鳯翔參墟世祖光武也忿恚疾王莽威重如此也白水謂南陽白水縣世祖所起之處也初為更始大司馬討王郎于河北北為參虚分野龍飛鳯翔以喻聖人之興也授鉞四七共工是除授與也鉞斧鉞也四七二十八將也共工覇天下者以喻王莽也六韜曰凡國有難君召將以授斧鉞漢書曰顓頊有共工之陣以定水灾欃槍旬始羣凶靡餘欃槍星名也謂王莽之在位如妖氣之在天世祖除之凶惡無餘爾雅曰彗星為欃槍旬始妖氣也史記曰旬始狀如雄雞也靡無也今言世祖除凶賊無有遺餘也區宇乂寧思和求中天地之内稱㝢言海内既已乂安思求陰陽之和天地之中而居之睿哲𤣥覽都兹洛宫睿聖也𤣥通也言通見此洛陽宫也曰止曰時昭明有融曰辭也時是也融長也言當止居是洛邑必有昭明之徳長久之道也既光厥武仁洽道豐止戈曰武諡法曰功格天下曰光剋定禍亂曰武洽合也豐盛也世祖既能止戈故諡光武言仁義之道大豐盛也登岱勒封與黄比崇登上也岱泰山也謂王者功成作樂治定制禮故封泰山勒功于石以紀號也黄黄帝也史記曰崇髙也言世祖與黄帝比其尊號逮至顯宗六合殷昌逮及也殷盛也昌熾也顯宗明帝號也六合天地四方也乃新崇徳遂作徳陽崇徳徳陽皆殿名崇徳在東徳陽在西相去五十步啓南端之特闈立應門之將將啓開也端門南方正門應門中門也昭仁恵於崇賢抗義聲於金商崇賢東門名也金商西門名也謂東方為木主仁如春以生萬物昭天子仁恵之徳故立崇賢門于東也西為金主義音為商若秋氣之殺萬物抗天子徳義之聲故立金商門于西飛雲龍于春路屯神虎于秋方徳陽殿東門稱雲龍門徳陽殿西門稱神虎門神虎金獸也秋方西方也飛飛龍也易曰雲從龍為木獸春路東方道也建象魏之兩觀旌六典之舊章象魏闕也一名觀旌表也言所以立兩觀者欲表明六典舊章之法謂懸書于象魏浹日而斂之其内則含徳章臺天禄宣明温飭迎春夀安永寧八殿皆以休令為名美時君之徳在應門之内也飛閣神行莫我能形言閣道相通不在于地故曰飛人不見行徃故曰神形謂天子之形容言我無能説其形狀也濯龍芳林九谷八溪芙蓉覆水秋蘭被涯渚戲躍魚淵游龜蠵洛陽圖經曰濯龍池名故歌曰濯龍望如海河橋渡似雷芳林苑名九谷八溪養魚池芙蓉荷華也秋蘭香草生水邊秋時盛也渚水渚也戲游也躍跳也毛詩曰王在靈沼於牣魚躍􅏲龜類也凡此物謂取有時非時則恣之游戲不驚動也永安離宫脩竹冬青陰池幽流𤣥泉洌清鵯鶋秋棲鶻鵃春鳴鴡鳩麗黄闗闗嚶嚶永安宫名也修長也冬青謂不彫落也水稱陰幽流謂伏溝從地下流通於河也水黑色故曰𤣥泉洌清澄貌爾雅曰鸒斯鵯鶋郭璞曰鵯鶋匹鳥腹下白又曰鶌鳩鶻鵃郭璞曰鶻鵃似山鵲短尾青黒色秋棲春鳴謂各得其性也爾雅曰鴡鳩王鴡也郭璞曰鴡鳩鵰類又曰鶬鶊鵹黄也鸝黄黒也闗闗嚶嚶謂音聲和也鵹麗古字通於南則前殿靈臺龢驩安福前殿露寢也靈臺臺名也龢驩安福二殿名並在徳陽殿之南謻門曲榭邪阻城洫謻門冰室門也臺有木曰榭阻依也洫城下池冰室門及榭皆屈曲邪行依城池為道也竒樹珍果鉤盾所職竒異也珍貴也鉤盾今官主小苑西登少華亭候修勑登升也並有亭有候也修治勑整也謂西園中有少華之山九龍之内寔曰嘉徳西南其户匪雕匪刻我后好約乃宴斯息九龍本周時殿名也門上有三銅柱柱有三龍相糺繞故曰九龍嘉徳殿在九龍門内也詩曰西南其戶不雕不刻尚質也言殿舍之多其户或西或南也我后謂明帝也宴安息止也於東則洪池清籞渌水澹澹内阜川禽外豐葭菼獻鼈蜃與龜魚供蝸蠯與菱芡洪池池名也在洛陽東三十里阜多也豐饒也内多魚鼈外饒蘆薍也蝸螺也菱芰芡鷄頭也其西則有平樂都場示逺之觀平樂觀名也都謂聚㑹也為大場于上以作樂使逺觀之謂之平樂在城西龍雀蟠婉天馬半漢龍雀飛亷也天馬銅馬也蟠蜿半漢皆形容也瑰異譎詭燦爛炳煥瑰竒也譎詭變化也燦爛炳煥潔白鮮明之貌奢未及侈儉而不陋規遵王度動中得趣言皆合於禮故奢不至侈儉不至陋也規摹遵循趣意也度先王之法度舉動合禮之意也家語曰公甫之婦動中得趣於是觀禮禮舉義具具足也言觀王之先明禮義皆備具也經始勿亟成之不日勿猶不也亟急也成之不日言不用一日即成之猶謂為之者勞居之者逸慕唐虞之茅茨思夏后之卑室勞苦也逸樂也乃營三宫布政頒常複廟重屋八達九房規天矩地授時順鄉三宫明堂辟雍靈臺頒布也常舊典也所以行教化布典禮之宫也複廟重覆也重屋重棟也謂明堂廟屋前後異制謂宫室之飾圓者象天方者則地也鄉方也言頒政賦教隨時月而居其方月令曰孟春居蒼龍左个造舟清池惟水泱泱造舟以舟相比次為橋毛詩曰造舟為梁浹泱水流貌左制辟雍右立靈臺因進距衰表賢簡能言徳陽殿東有辟雍於西有靈臺謂於其上班教令者曰明堂大合樂射鄉者曰辟雍司厯紀候節氣者曰靈臺也進善也衰老也言因其進則舉而用之衰减者拒而退之謂擇賢以大射所以表明徳行簡録其能否謂辟雍也馮相觀祲祈禠禳灾於是孟春元日羣后旁戾尚書曰正月元日舜格于文祖孟春正月也元日正日也羣后公卿之徒也旁四方也戾至也言諸侯正月一日從四方而至各來朝享天子也百僚師師于斯胥洎尚書曰百僚師師百僚謂百官也師師謂相師法也胥相泊及也言元日百官於此相連及而來朝賀也藩國奉聘要荒來質謂王侯藩稱國也言要荒之外所奉聘令者盡來朝見具惟帝臣獻琛執贄具之言俱也獻貢也琛寶也執持也贄禮也言蕃國來貢者謂隨土所出寶而貢之也當覲於殿下者葢數萬以二覲見也言於此之時當入見于殿下者可數萬人分于闕下夾道為二部爾乃九賓重臚人列言鴻臚所主𦍑胡之人皆羅列于朝廷也崇牙張鏞鼓設崇牙栒虡上板作劒鎝者横曰栒植曰虡張謂樹之以縣鐘鼓也郎將司階虎㦸交鎩龍輅充庭雲旗拂霓言虎賁中郎將主夾階而立虎賁或執㦸或持鎩而相對也交鎩謂交加而設兵器也馬八尺曰龍輅天子之車也故曰龍輅充滿也庭朝也旗謂熊虎為旗其髙至雲故曰雲旗也楚辭曰載雲旗之逶夷拂至也霓天邊氣也夏正三朝庭燎晢晢夏家建寅之正漢家所用也三朝歳月日朝晢晢光明也撞洪鐘伐靈皷旁震八鄙軯􅐀隠訇若疾霆轉雷而激迅風也撞鏗也伐擊也靈鼓六面鼓也旁四方也震驚也八鄙四方與四角也軯􅐀隠訇鐘鼔之聲也霆霹靂也迅疾也言鐘鼔之聲又若雷霆之相轉急風之迅疾也是時稱警蹕已下彫輦于東廂警謂清道也輦人挽車彫謂有彫飾殿東西次為廂冠通天佩玉璽紆皇組要干將負斧扆次席紛純左右玉几穆穆而南面以聴矣通天冠名也佩帶也璽天子印也蔡邕獨斷曰天子冠通天紆垂也皇大也組綬也干將劒名越絶書曰楚王令歐冶子干將為鐵劒三枚一曰龍淵二曰太阿三曰工市也吳越春秋曰干將者吳人造劒二枚一曰干將二曰莫邪白與黒謂之斧扆屏風樹之坐後也次席竹席也紛純謂以組為縁周禮曰天子左右玉几鄭𤣥曰左右有几優至尊也然後百辟乃入司儀辨等尊卑以班璧羔皮帛之贄既奠百辟諸侯也司主也儀法也辨别也言百官有分别者謂司主之次也班位次也謂尊卑有差等也天子乃以三揖之禮禮之穆穆焉皇皇焉濟濟焉將將焉信天下之壯觀也壯觀言天下之人壯大觀覽也禮記曰天子穆穆諸侯皇皇大夫濟濟士將將鄭𤣥曰威儀容止之貌史記曰天下之壯觀也乃羨公侯卿士登自東除訪萬㡬詢朝政勤恤民𨼆而除其𤯝人或不得其所若巳納之於隍羨延也登進也謂命之上殿也天子從中階諸侯從東西階言機微之事日有萬種詢謀也謂與謀朝政有所先後者也恤憂也𨼆痛也𤯝病也言有𨼆痛不安者今憂恤之也隍城下坑無水者荷天下之重任匪怠皇以寧靜荷負也怠懈也皇暇也言無有懈怠于寧靜者謂常有所憂也發京倉散禁財賚皇僚逮輿臺𤼵開也京大也禁藏也賚賜也皇僚百官也逮及也言天子散發禁庫之財無問貴賤皆賜及之命膳夫以大饗饔餼浹乎家陪周禮曰膳夫主食之官熟曰饔腥曰餼浹徧也家陪謂公卿大夫之家春醴惟醇燔炙芬芬醇厚也燔炙謂炙肉也芬芬香氣盛也君臣歡康具醉薰薰千品萬官已事而踆康樂也具俱也言君臣皆歡樂而和説也已止也踆退也謂品秩官僚等竝止事而退還勤屢省懋乾乾屢數也省察也懋勉也乾乾敬也清風協於𤣥徳淳化通於自然協同也淳厚也𤣥天也自然通神明也言帝如此清恵之風同於天徳淳厚之化通於神明也憲先靈以齊軌必三思以顧愆憲法也先靈先聖之神靈即謂堯舜也愆過也齊同也軌迹也言有事能思信與先聖同軌迹也招有道於側陋開敢諫之直言聘丘園之耿潔旅束帛之戔戔招明也有道言使郡國于側陋之中舉有道之士而用之也直言謂直諫者也耿清也旅陳也謂有清潔者也言丘園中有𨼆士貞潔清白之人聘而用之束帛謂古招士必以束帛加璧于上周易曰六五賁于丘園束帛戔戔王肅曰失位無應𨼆處丘園葢蒙闇之人道徳彌明必有束帛之聘也戔戔委積之貌上下通情式宴且盤上謂君下謂臣式用也盤樂也言君情通于下臣情達于上故能國家安而君臣歡樂也及將祀天郊報地功將欲也白虎通曰祭天必在郊者天體至清故祭必于郊取其清潔也周禮以正月上辛郊祀告于上帝祭天而郊以報去年土地之功京房易占曰立秋報地功祈福乎上𤣥思所以為䖍祈求也𤣥天也𤣥黄天地言天子祭天地之際思念所以盡其忠敬肅肅之儀盡穆穆之禮殫然後以獻精誠奉禋祀曰允矣天子者也殫盡也獻進也允信也天子言是天帝之子也乃整法服正冕帶整理也冕所謂平天冠也言天子素帶朱裏謂三皇已来始冕制有數種鄭𤣥曰長一尺七寸廣八寸前圓後方以珠玉飾之也法服謂衣服並有法度珩紞紘綎玉笄綦㑹火龍黼黻藻繂鞶厲笄簮也謂以玉飾之結飛雲之袷輅樹翠羽之髙葢袷輅次車也次車樹翠羽為葢如雲飛也今世謂之羽葢車建辰旒之太常紛焱悠以容裔辰謂日月星也畫之于旌旗垂十二旒名曰太常上畫二辰以象天明也謂天子十二旒諸侯九旒大夫三旒紛盛也悠從風貌容裔髙低之貌焱火花也言風皷動旌旗紛紜盛亂如火花之飛起六𤣥虯之奕奕齊騰驤而沛艾六六馬也𤣥黑也天子駕六馬騰驤趨走也奕奕光明貌沛艾作姿容貌也龍輈華轙金䥑鏤錫輈車轅轅端上刻作龍頭也華采畫也方釳左纛鉤膺玉瓖方釳謂轅旁以五寸鐵鏤錫中央低兩頭髙如山形而貫中以翟尾結著之轅兩邊恐馬相突也左纛以旄牛尾大如斗置騑馬頭上以亂馬目不令相見也鉤膺當胸也瓖馬帶玦以玉飾鑾聲噦噦和鈴鉠鉠鑾在衡和在軾皆以金為鈴也噦噦和鳴聲鉠鉠小聲重輪貳轄疏轂飛軨蔡邕獨斷曰乘輿重轂外復有一轂副轄其外乃復設轄然重輪即重轂也飛軨以緹紬廣八尺長拄地畫左青龍右白虎繫軸頭取兩邊飾蔡邕月令章句曰疏鏤也羽蓋葳蕤葩瑵曲莖羽蓋以翠羽覆車蓋也葳蕤羽貌葩爪悉以金作華形莖皆曲蔡邕獨㫁曰凡乘輿車皆羽蓋金華爪與瑵同順時服而設副咸龍旂而繁纓五時之服各隨其車車各一色以為副貳副車各一乘今謂之五帝車也龍旂者交龍為旂也鞶今之馬大帶也纓馬鞅也立戈迤戛農輿輅木戈謂木勾矛㦸也戛長矛也矛置車上邪柱之是謂戎輅農輿無蓋所謂耕根車也言耕稼于籍田乘馬無飾故稱木屬車九九乘軒並轂副車曰屬言相連也屬車有藩者曰軒皆在後為三行故曰並轂􅕈弩重旃朱旄青屋通帛曰旃朱旄旄牛尾赤色者也青屋青作蓋裏也奉引既畢先輅乃發奉引謂引道者言道引之次已定前車乃發鸞旗皮軒通帛綪斾鸞旗謂以象鸞鳥也皮軒以虎皮為之雲罕九斿闟㦸轇轕雲罕旌旗之别名也九斿亦旗名也闟鋋也轇轕雜亂貌髶髦被繡虎夫戴鶡髶髦髦頭茸騎也駙承華之蒲梢飛流蘇之騷殺駙副馬也承華廏名也言取華廏之蒲梢以為副馬也漢官儀有承華廏總輕武于後陳奏嚴鼓之嘈囐後陳者謂北軍五營兵在後陳列嘈囐鼓聲也戎士介而揚揮戴金鉦而建黄鉞戎兵也士士卒也介甲也揮為肩上絳幟如燕尾者也金鉦鐲鐃之屬也黄鉞以黄金飾之清道案列天行星陳肅肅習習隠隠轔轔殿未出乎城闕斾已廻乎郊畛清道謂蹕止行者列猶次也言天子行如上天之星行羅列有次肅肅敬貌習習行貌隠隠衆多貌轔轔車聲也殿後軍也斾前軍也郊畛謂郊界也言從之多後猶未出城闕前已迴于郊界也盛夏后之致美爰恭敬於明神盛猶嘉也夏后禹也言今嘉欲行禹之事爰布恭敬于神明也爾乃孤竹之管雲和之瑟孤竹國名出竹雷鼔鼝鼝六變既畢雷鼓八面鼓凡樂六變為一成則更奏畢盡也冠華秉翟列舞八佾冠華以鐡作之上闊下狹以翟雉尾飾之舞人頭戴一行羅列八人八八六十四人謂今麥䇿花也穀梁傳曰舞夏天子八佾元祀惟稱羣望咸秩元大也祀祭也稱舉也謂大祭天地之禮既舉羣岳衆神望以祭祀之皆有秩次颺槱燎之炎煬致髙烟乎太一颺飛颺也槱之言聚也謂聚薪焚之揚其光炎使上達于天也太一天之尊神也曜魄寳也神歆馨而顧徳祚靈主以元吉歆饗也顧眷也祚報也靈明也元大也吉福也言天神覩人主之明肅顧饗其馨香之祭故報之以大福尚書曰明徳惟馨周易曰黄裳元吉然後宗上帝於明堂推光武以作配宗尊也上帝太微中五帝也配對也言尊祭五帝于明堂以光武配之漢書曰明帝宗祀五帝于明堂先武皇帝配之辨方位而正則五精帥而來摧辨别也方位謂四方中央之位也則法也五精五方星也帥循也摧至也言五帝總集至明堂尊赤氏之朱光四靈懋而允懐赤氏謂漢火徳所統赤帝熛怒也河圖曰四靈蒼帝神名靈威仰赤帝神名赤熛怒黄帝神名含樞紐白帝神名白招拒黒帝神名協光紀今止云四靈謂除赤餘有四懋悦也懐安也於是春秋改節四時迭代蒸蒸之心感物增思改易迭更也代謝也言感四時之謝而欲享祀也廣雅曰蒸蒸孝也感物謂感四時之物即春韭卵夏麥魚秋黍肫冬稻鴈孝子感此新物則思祭先祖躬追養於廟祧奉蒸嘗與禴祠言祭皆追感孝養之道故躬自為之躬猶身也物牲辨省設其楅衡物牲謂祭祀之物皆徧省視之也横木於牲角端以備抵觸謂之楅衡毛炰豚胉亦有和羮滌濯靜嘉禮儀孔明滌濯謂洗滌也靜潔也嘉善也孔甚也言禮儀甚鮮明也萬舞奕奕鐘鼓喤喤萬舞干也奕奕舞形也喤喤鼓聲也靈祖皇考來顧來饗神具醉止降福穰穰靈皇神名謂先帝也言先帝之神顧愍子孫享其食也神謂先神也具俱也止已降下也穰穰衆多也及至農祥晨正土膏脉起農祥天駟即房星也晨時正中也謂正月初也乘鑾輅而駕蒼龍介馭間以剡耜天子車帝在左御在中介處右躬三推於天田畝帝籍之千修供禘郊之粢盛必致思乎勤已禘郊謂祭天于南郊也言天子籍田千畆必須親耕者為敬其祖考用充宗廟之粢盛故云勤已兆民勸於疆埸咸懋力以耘耔兆民謂百姓也疆田畔也耘去草耔壅本也春日載陽合射辟雍陽暖也言春三月之時與諸侯合射辟雍行禮教設業設虡宫懸金鏞設施也業栒上板刻為鴈齒捷業然植者為虡横者為栒以施設縣之宫中也鏞大鐘也鼖鼓路鼗樹羽幢幢鼖大鼔也鼗小鼔也幢幢羽貌於是備物物有其容言備具也物禮物也射之禮物並有容飾也伯夷起而相儀后䕫坐而為工伯夷唐虞時明禮儀之官也后䕫舜臣掌樂之官言禮以行施故云起樂以靜陳故云坐張大侯制五正設三乏厞司旌言大射張三侯故設三乏乏以革為之䕶旌者之禦矢也司旌謂執旌司射中當舉之周禮曰服不氏射則以旌居乏而待獲杜子春曰乏音為匱乏之乏爾雅曰厞隠也并夾既設儲乎廣庭并夾鉗矢者周禮曰射則取矢也言侯髙則以并夾取之也儲待也廣大也謂張設於大庭以待天子也於是皇輿夙駕於東階之言却也謂却於東階下天子未乘之時也以須消啓明掃朝霞登天光於扶桑須俟也消不見也掃滅也言晨時啓明先見尚有餘光日出乃不見霞日邊赤氣也謂天子須啓明光消霞滅日上扶桑乃就乘輿也禮天子日出乃視朝天子乃撫玉輅時乘六龍發鯨魚鏗華鐘大丙弭節風后陪乘玉輅謂玉飾之也鄭𤣥禮記注曰撫猶據也東都賔曰登玉輅乘時龍發舉也鏗猶擊也華鐘謂有篆刻文故言華也攝提運衡徐至於射宫攝提有六星玉衡北斗中星主迴轉並飾于車上徐行至于射宫射宫謂辟雍也禮事展樂物具王夏闋騶虞奏展謂舒陳器物也物具謂器物皆具備也王夏樂名也天子初出奏也關終也決拾既次彫弓斯彀決以象骨著右手巨指所以鉤弦也拾韝捍著左臂也雕弓謂有刻畫也彀張也達餘萌于暮春昭誠心以逺喻昭明也誠心謂天子之心也進明徳而崇業滌饕餮之貪欲射義曰射所以觀徳也崇猶興也業射業也滌蕩去也言有貪婪嗜慾者皆滌蕩去之也仁風衍而外流誼方激而遐騖衍布也方道也激感也遐逺也騖馳也日月㑹於龍􅔀恤民事之勞疚􅔀尾也日月㑹於尾謂十月時也疚病也民勞病於歳事到此月乃終也故天子愍恤勞來之因休力以息勤致懽忻於春酒謂田事畢休民力息勤勞也執鑾刀以袒割奉觴豆於國叟言天子親執鑾刀袒右膊而割牲以示敬也降至尊以訓恭送迎拜乎三壽降下也至尊天子也三壽三老也言天子尊而養此三老者以教天下之敬故來拜迎去拜送焉敬慎威儀示民不偷敬宜也儀禮也毛詩曰敬慎威儀視民不佻毛萇曰佻偷也我有嘉賔其樂愉愉嘉賔謂三老五更也愉愉和悦之貌聲教布䕶盈溢天區布䕶猶散被也天區謂四方上下也言天子教愛及之尚書曰聲教訖于四海文徳既昭武節是宣既已也昭明也宣猶發也言文武之教無處不臨三農之隙曜威中原隙閒也曜威謂治兵也歳惟仲冬大閱西園西園上林苑也虞人掌焉先期戒事先期謂期日勑戒羣吏修獵具也悉率百禽鳩諸靈囿悉盡也率斂也鳩聚也囿苑也囿謂集禽獸于靈囿之中獸之所同是謂告備同亦聚也備具也言禽獸皆已合聚田物具備也乃御小戎撫輕軒毛詩曰小戎俴収謂小戎之事輕便宜畋獵鄭𤣥曰輕車驅逆之車中畋四牡既佶且閑中畋馬謂調良馬可用獵者毛詩曰四牡既佶既佶且閑戈矛若林牙旗繽紛迄于上林結徒為營若林言多也繽紛風吹貌兵書曰牙旗者將軍之旌謂古者天子出建大牙旗竿上以象牙飾之故云牙旗迄至也結止也徒衆也營域也上林苑名次和樹表司鐸授鉦次比也和軍之正門為和也表門表也司主也鉦鐸所以為軍節坐作進退節以軍聲言聲中進退取鐘鼓旌之節三令五申示戮斬牲示教也言三令五申示衆人畢有不用命者斬之若牲也陳師鞠旅教達禁成陳師猶列師衆也鞠之言告也教達謂三令五申禁令已行軍法成也火烈具舉武士星敷具俱也敷布也言武士獵徒如星之布也鵞鸛魚麗箕張翼舒鵞鸛魚麗並陣名也謂武士發于此而列行如箕之張如翼之舒軌塵掩迒匪疾匪徐掩覆也迒迹也車軌之塵適自覆跡言得遲疾之中也馭不詭遇射不翦毛升獻六禽時膳四膏升進也馬足未極輿徒不勞成禮三敺解罘放麟極盡也輿衆也勞罷勞也大鹿曰麟解散也罘罔也周易曰王用三敺失前禽也敺與驅同不窮樂以訓儉不殫物以昭仁窮極也訓教也殫盡也物謂禽獸也言殺禽獸不盡即昭明人君行仁之道謂崇儉故也慕天乙之弛罟因教祝以懐民天乙殷湯名也弛廢也儀姬伯之渭陽失熊羆而獲人儀則也姬伯文王為西伯也澤浸昆蟲威振八㝢浸潤也八㝢八方區宇也好樂無荒允文允武允信也無荒言不好荒淫之樂信與文王武王等其功徳也薄狩于敖既瑣瑣焉岐陽之蒐又何足數敖鄭地今之河南滎陽也謂周王狩也璅璅小也言鄙不足説也岐陽岐山之陽謂成王所狩之地亦以小不足可數也爾乃卒嵗大儺敺除羣癘卒終謂一嵗之終儺逐疫鬼方相秉鉞巫覡操茢侲子萬童丹首𤣥製侲子童男童女也朱丹也𤣥製皁衣也桃弧棘矢所發無臬飛礫雨散剛癉必斃桃弧謂弓也棘矢箭也癉雖也言鬼之剛而難者皆盡死也煌火馳而星流逐赤疫於四裔煌火光也馳競也赤疫疫鬼惡者也四裔謂四海也星流謂羣鬼競走煌煌然如火光之與星流也然後淩天池絶飛梁淩升也捎魑魅斮獝狂斬蜲蛇腦方良魑魅山澤之神獝狂惡戾之鬼名捎殺也斮擊也方良草澤之神也腦陷其頭也囚耕父於清泠溺女魃於神潢清泠水名在南陽西鄂山上神潢亦水名未知所在殘䕫魖與罔象殪野仲而殱游光殘猶殺也䕫木石之怪如龍有角鱗甲光如日月見則其邑大旱説文曰魖耗鬼也罔象木石之怪殪殺也殱滅也野仲游光惡鬼也兄弟八人常在人間作恠害八靈為之震慴況鬾􅈮與畢方鬾小兒鬼畢方老父神如烏兩足一翼者常銜火在人家作恠灾度朔作梗守以鬱壘神荼副焉對操索葦東海中度朔山有二神一曰神荼二曰鬱壘領衆鬼之惡害者執以葦索而用食虎目察區陬司執遺鬼察觀也區陬隅隙之間也司主也謂于度朔山主執遺餘之鬼也京室密清罔有不韙密靜也清潔也罔無也韙善也謂無復疫癘皆得安善也於是隂陽交和庶物時育庶衆也漢書曰陰陽和風雨時言疫癘既無陰陽乃和衆物育養也卜征考祥終然允淑征廵行也考問也祥吉也允信也淑善也乘輿巡乎岱嶽勸稼穡於原陸乘輿天子也岱泰山也種曰稼收曰穡謂春勑東方諸侯課民以耕種故尚書云二月東巡狩至于岱宗同衡律而一軌量齊急舒於寒燠衡秤也軌法也寒燠猶苦樂同一齊皆使中不參差也省幽明以黜陟乃反斾而迴復省察也幽暗也黜退也陟升也謂有功者進無功者退尚書曰三載考績黜陟幽明反斾謂迴還也望先帝之舊墟慨長思而懐古俟閶風而西遐致恭祀於髙祖先帝先神也蒨墟長安也慨歎息也古往也謂前漢初也俟待也閶風秋風也祠謂祭祀髙祖廟也遐逝也既春游以發生啓諸蟄於潛户春游謂仲春巡行岱岳是時蟄蟲皆開户帝乃東巡助宣氣也度秋豫以收成觀豐年之多稌秋行曰豫謂秋行禮髙祖廟此時萬物始成嘉田畯之匪懈勤致賚于九扈嘉善也畯主田官也九扈農正知田事扈正也言天子行慶福致賚于九扈使民不淫放左瞰暘谷右睨𤣥圃眇天末以逺期規萬世而大摹暘谷日出之處𤣥圃在崑崙山上瞰望也睨視也眇視也摹法也言帝之巡狩眇然以天末為逺期規欲以為萬代之大法也且歸來以釋勞膺多福以安悆悆寧也歸謂西征旋乃釋吏士之劬勞祭祀受多福以安寧也總集瑞命備致嘉祥總㑹也集聚也祥神也即騶虞澤馬之屬也瑞應也即鸞鳯之屬也圉林氏之騶虞擾澤馬與騰黄圉牢養也林氏山名也騶虞義獸也鳴女牀之鸞鳥舞丹穴之鳯皇女牀山名在華陰西六百里山海經曰女牀之山有鳥焉其状如鶴五色文名曰鸞鳥見即天下安寧又曰丹穴之山有鳥焉其狀如鵠五采名曰鳯皇是鳥也飲食自歌自舞見則天下安寧植華平於春圃豐朱草於中唐植猶種也華平瑞木也天下平其華則平有不平處其華則向其方傾中唐堂塗也恵風廣被澤洎幽荒恵恩也洎及也幽荒九州外謂四夷也北燮丁令南諧越裳燮諧皆和也越裳南蠻今九真是也丁令國名西包大秦東過樂浪重舌之人九譯僉稽首而來王重舌謂曉夷狄語者九譯九度譯言始至中國者也是故論其遷邑易京則同規乎殷盤改奢即儉則合美乎斯干京京師也規法也盤庚殷王之名也斯干謂周宣王儉宫室之詩也今漢光武改西京奢華而就儉約合斯干之美登封降禪則齊徳乎黄軒為無為事無事永有民以孔安遵節儉尚素樸思仲尼之克已履老氏之常足登謂上泰山封土降謂下禪梁父也言光武登上泰山下禪梁父則與黄帝齊其功徳為作也事業也永長也孔甚也以無為為功以無事為業澹然不煩瀆也遵循也樸質也言遵循節儉尚其樸素也孔子曰克已復禮馬融曰克已約身將使心不亂於所在目不見其可欲賤犀象簡珠玉藏金於山抵璧於谷簡猶畧也藏抵皆謂不取之謂儉故也翡翠不裂瑇瑁不蔟翡翠鳥名也瑇瑁珍名不裂不折其羽以為玩飾也不蔟不义蔟取之為器也所貴惟賢所寶惟穀民去末而反本咸懐忠而抱慤詐偽為末忠信為本于斯之時海内同悦曰吁漢帝之徳馨侯其禕而言於此之時皆同歡樂也于於也悦樂也吁驚也禕美也葢蓂莢為難蒔也故曠世而不覿惟我后能殖之以至和平方將數諸朝階覿見也蓂莢瑞應之草王者賢聖太平和氣之所生生于階下始一日生一莢至月半生十五莢十六日落一莢至晦日而盡小月則一莢厭不落王者以證知月之小大堯時夾階生之謂不世見故云難時也后帝也惟我帝有至和之徳故必能植之方當生於朝陛得以數知月之大小謂蓂莢也然則道胡不懐化胡不柔胡何也懐來也柔安也言皆安之也聲與風翔澤從雲遊翔游皆行也風者天之號令雲雨者天之膏潤故聲教與風皆翔恩澤與雲俱行也萬物我賴亦又何求我賴賴我也言萬物皆賴帝之恩恵以得所無復他求也徳㝢天覆輝烈光燭㝢猶蓋也帝之徳蓋如天之覆日月之光輝照於逺近也狹三王之趢趗軼五帝之長驅踵二皇之遐武誰謂駕遲而不能屬狹謂陋也趢趗局小貌也軼過也驅馳也言以三王禮法為局小狹陋過五帝而逺馳則繼三皇之跡也踵繼也二皇伏羲神農也遐逺也武迹也屬逮也誰敢謂今所駕者遲而不能逮言必能逮也東京之懿未罄值余有犬馬之疾不能究其精詳故粗為賔言其梗槩如此懿美也罄盡也先生言東京之美未盡遇我有疾故不能究其美事也粗猶畧也賔西京也梗槩不纎密言粗舉大綱如此之言也若乃流遁忘反放心不覺樂而無節後離其戚言若流情放心不自反寤恣意所為淫樂無禮以為節終後卒當罹其憂禍即秦皇王莽是也一言㡬於喪國我未之學也㡬近也先生責公子云取樂今日皇恤我後言今之非也且夫挈缾之智守不假器況纂帝業而輕天位言挈缾之小智耳尚不妄以假人也纂繼也今如公子言皆淫心放意之事此乃輕居天王之尊位而禪於董賢瞻仰二祖厥庸孔肆常翹翹以危懼若乘奔而無轡庸功也孔甚也肆勤也言瞻望髙祖功庸甚勤苦而得之也言居天子之位常若奔馬而無轡履氷而負重也白龍魚服見困豫且雖萬乘之無懼猶怵惕於一夫終日不離於輜重獨微行其焉如説苑曰吳王欲從民飲伍子胥曰昔白龍下清泠之淵化為魚豫且射中目白龍不化豫且不射君今棄萬乘之位而從於臣恐有豫且之患此言先生責公子陰戒期門微行要屈萬乘天子也即秦始皇髙祖也昔秦始皇東游為張良所擊中其副車漢髙祖於栢人亭殆為貫高所中輜重車也焉言安也如往也公子説微行要屈故先生問之言欲何往夫君人者黈纊塞耳車中不内顧黈纊言以黄綿大如丸懸冠兩邊當耳不欲妄聞不急之言也内顧謂不外視臣下之私也珮以制容鑾以節塗佩為行容鑾為車節行不變玉駕不亂步行合容則玉聲應馬步齊則鑾和饗並謂君之禮法却走馬以糞車何惜騕褭與飛却退也老子曰天下無道戎馬生于郊天下有道却走馬以糞河上公曰糞者糞田也兵甲不用却走馬以務農田然今言糞車者言馬不用而車不敗故曰糞車何惜言不愛之方其用財取物常畏生類之殄也賦政任役常畏人力之盡也取之以道用之以時方將也生類謂天下萬物之類也殄盡也任役謂使人常畏人力盡也論語曰敬事而信節用而愛人使民以時此之謂也山無槎枿畋不䴠胎斜䂨曰槎斬而復生曰枿不䴠胎者言不如公子所道獲胎拾卵校獲麑䴠也漢書昔先王山不槎蘖畋不殺胎草木繁廡鳥獸阜滋繁滋也廡盛也阜大也滋益也民忘其勞樂輸其財民謂百姓也言民不以力役為勞苦不以財賦為捐費故文王有子來之人武帝時卜式入錢以助官也百姓同於饒衍上下共其雍熈言富饒是同上下咸悦故能雍和而廣也論語曰百姓足君孰與不足洪恩素蓄民心固結洪大也蓄積固牢固也謂髙祖已下積恩施恵人心固結故王莽之時皆謳吟而思漢執義顧主夫懐貞節夫猶人人也言執禮義之心顧思漢徳人懐貞正之志分也楚辭曰原生受命于貞節忿姦慝之干命怨皇綂之見替𤣥謀設而陰行合二九而成譎慝惡也綂嗣也替廢也謂忿王莽之逆命怨漢綂之替廢也𤣥神也譎變也謂王莽之志陰行十八年而成變計也登聖皇於天階章漢祚之有秩聖皇光武也章明也秩常也言明漢家之常秩若此故王業可樂焉今公子茍好勦民以媮樂忘民怨之為仇也若如此也言如此即王業之可樂也勦盡也媮猶僥倖也仇讐也今公子所言茍好盡人以僥倖須臾之樂不知人民共怨已當成大讐也好殫物以窮寵忽下叛而生憂也殫盡也寵驕也忽忘也生憂謂生已之憂患也言好盡人之財以寵極驕逸之樂忘人叛已之為大患也漢書谷永曰財竭則下叛下叛則上亡夫水所以載舟亦所以覆舟覆敗也堅氷作於履霜尋木起於蘖栽言事皆從微至著不可不慎之于初所以尋木起于牙蘖洪波出于涓泉昧旦丕顯後世猶怠況初制於甚泰服者焉能改裁昧早也丕大也顯明也怠懈也謂起行大明之道後世子孫猶尚懈怠譬如為人裁衣始制之洪大服者得而衣之何能更小之乎故相如壯上林之觀揚雄聘羽獵之辭雖系以頽牆填壍亂以收罝解罘卒無補於風規袛以昭其愆尤系繼也亂理也相如上林賦曰乃命有司隤牆填壍使山澤之人得至焉揚雄羽獵賦曰放雉兔收罝罘規猶諫也祗適也愆短也尤過也言不能補其愆過臣濟奓以陵君忘經國之長基故函谷擊柝於東西朝顛覆而莫持濟謂度也度於奢侈謂僣也陵踰君法若季氏八佾舞於庭左傅萇𢎞曰毛得以濟侈於王都言尊卑所以為國今反陵之故非所以經國柝守夜所擊木也顛隕也持扶也謂王莽之兵猶擊柝守函谷關而三輔兵已自入長安宫朝廷顛隕無復扶持也東謂函谷在京之東西朝則京師也凡人心是所學體安所習鮑肆不知其臭翫其所以先入所習為心所好愛者即學翫習也先入言久處其俗也咸池不齊度於䵷咬而衆聴者或疑能不惑者其唯子野乎齊同也咸池堯樂也䵷咬淫聲也言咸池之音本不與䵷咬同而衆聴者乃有疑惑子情野師曠字曉音曲者以喻安處先生也言西京奢泰肆不依禮度東京儉約依禮行事衆人觀之謂是其一唯安處先生得知其指客既醉於大道飽於文義客斥公子謂聞東京文義之道若醉飽焉勸徳畏戒喜懼交爭勸徳謂公子見先生説東京禮法自勸勉行其道徳又畏懼先生之戒也罔然若酲朝疲夕倦奪氣禠魄之為者也罔然猶惘惘然也酲病酒也朝罷夕倦夜不卧惘然如神奪其精氣又若魂魄亡離其身今公子亦如之也忘其所以為談失其所以為夸良久乃言曰鄙哉予也予習非而遂迷也幸見指南於吾子公子本以奢侈為美談今見先生述東京之徳所以忘美失夸也良久頃乃復能言也自鄙其迷惑所學者非正也言已之惑不知南北今先生指以示我我則足以三隅反也若僕所聞華而不實先生之言信而有徵鄙夫寡識而今而後乃知大漢之徳馨咸在於此若如也公子言如僕所聞西京之事葢是虚華而無實録先生安處先生也徵驗也言先生之言信有徵驗也公子重自鄙曰如今日後日乃知大漢之徳在於此耳昔常恨三墳五典既泯仰不覩炎帝帝魁之美三墳三皇之書也五典五帝之書也泯滅也覩見也炎帝神農後也帝魁神農名並古之君號也得聞先生之餘論則大庭氏何以尚兹走雖不敏庻斯達矣先生安處先生也大庭古國名也尚髙也走公子自稱走使之人如今言僕矣不敏猶不達也公子言我雖不敏於大道庶㡬先生之説遂達矣漢魏六朝百三家集巻十三
