body:
  text: 漢魏六朝百三家集巻六漢王褒集題詞漢書嚴助朱買臣吾丘壽王主父偃徐樂嚴安終軍王褒賈捐之九人同傳令終者鮮惟子雲棄繻子淵作頌名髙齊蜀而夭病隨之即身非鼎烹能無惑辨命乎聖主賢臣文辭采密其排彭祖厭喬松歸之文王多士以祝壽考意主規諷猶長卿之子虛上林游戲苑囿有戒心焉乃蜻蛉神見持節南崖金馬碧雞光景未來使者先殞彼所刺者神僊而不能抗辭于銜命烏得云善諫哉甘泉洞簫後宫誦讀僮約諧放頗近東方元帝為太子時忽忽不樂惟子淵奇文足起體疾以此賢於博奕信矣九懷之作追愍屈原古今才士其致一也執握金玉委之汚瀆他人有心誰能不怨大氐王生俊才歌詩尤善奏御天子不外中和諸體然辭長于理聲偶漸諧固西京之一變也目録賦洞簫賦騷九懷匡機通路危俊昭世尊嘉蓄英思忠陶壅株昭論四子講德論頌聖主得賢臣頌甘泉宫頌移文移金馬碧雞文約僮約文責髯奴文漢魏六朝百三家集巻六目録欽定四庫全書漢魏六朝百三家集巻六明張溥輯漢王褒集賦洞簫賦原夫簫幹之所生兮于江南之丘墟洞條暢而罕節兮標敷紛以扶疎徒觀其旁山側兮則嶇嶔巋崎倚巇迤㠧誠可悲乎其不安也彌望儻莽聨延曠盪又足樂乎其敞閒也託身軀於后土兮經萬載而不遷吸至精之滋熈兮稟蒼色之潤堅感隂陽之變化兮附性命乎皇天翔風蕭蕭而逕其末兮迴江流川而溉其山揚素波而撣連珠兮聲礚礚而澍淵朝露清泠而隕其側兮玉液浸潤而承其根孤雌寡鶴娛優乎其下兮春禽羣嬉翺翔乎其顚秋蜩不食抱樸而長吟兮𤣥猿悲嘯搜索乎其間處幽隠而奥屏兮密漠泊以􅀈猭惟詳察其素體兮宜清静而弗諠幸得諡為洞簫兮䝉聖主之渥恩可謂惠而不費兮因天性之自然於是般匠施巧夔襄准法帶以象牙掍其㑹合鎪鏤離灑絳脣錯雜鄰菌繚糾羅鱗捷獵膠緻理比挹抐㩎㩶於是乃使夫性昧之宕㝠生不覩天地之體勢闇於白黒之貌形憤伊鬱而酷􅀈愍眸子之喪精寡所舒其思慮兮專發憤乎音聲故吻吮値夫宫商兮和紛離其匹溢形旖旎以順吹兮瞋㖤㗅以紆鬱氣旁迕以飛射兮馳渙散以逫律趣從容其勿述兮騖合遝以詭譎或混沌而潺湲兮獵若枚折或漫衍而絡驛兮沛焉競溢惏慄密率掩以絶滅㘊霵曄踕跳然復出若乃徐聽其曲度兮亷察其賦歌啾咇㘉而將吟兮行鍖銋以和囉風鴻洞而不絶兮優嬈嬈以婆娑翩緜連以牢落兮漂乍棄而為他要復遮其蹊徑兮與謳謠乎相龢故聽其巨音則周流汜濫幷包吐含若慈父之畜子也其妙聲則清靜厭㥷順叙卑迖若孝子之事父也科條譬類誠應義理澎濞慷慨一何壯士優柔温潤又似君子故其武聲則若雷霆輘輷佚豫以沸㥜其仁聲則若颽風紛披容與而施惠或雜遝以聚歛兮或拔摋以奮棄悲愴怳以惻惐兮時恬淡以綏肆被淋灑其靡靡兮時横潰以陽遂哀悁悁之可懷兮良醰醰而有味故貪饕者聽之而亷隅兮狼戾者聞之而不懟剛毅强􅕝反仁恩兮嘽唌逸豫戒其失鍾期牙曠悵然而愕立兮杞梁之妻不能為其氣師襄嚴春不敢竄其巧兮浸淫叔子逺其類嚚頑朱均惕復慧兮桀跖鬻博儡以頓顇吹參差而入道德兮故永御而可貴時奏狡㺯則彷徨翺翔或留而不行或行而不留愺恅瀾漫亡耦失疇薄索合沓罔象相求故知音者樂而悲之不知音者怪而偉之故為悲聲則莫不愴然累欷撆涕抆淚其奏歡娛則莫不憚漫衍凱阿那腲腇者已是以蟋蟀蚸蠖蚑行喘息螻蟻蝘蜒蠅蠅翊翊遷延徙迤魚瞰雞睨垂喙䖤轉瞪瞢忘食況感隂陽之和而化風俗之倫哉亂曰狀若捷武超騰踰曳迅漂巧兮又似流波泡溲汎􅟫趨巇道兮哮呷呟喚躋躓連絶淈殄沌兮攪搜㶅捎逍遥踊躍若壊頽兮優游流離躊躇稽詣亦足耽兮頽唐遂往長辭逺逝漂不還兮賴䝉聖化從容中道樂不淫兮條暢洞達中節操兮終詩卒曲尚餘音兮吟氣遺響聨緜漂撇生微風兮連延絡驛變無窮兮騷九懷王逸註匡機極運兮不中周轉求君道不合也來將屈兮困窮還就農桑修播植也余深愍兮慘怛我内憤傷心切剥也願一列兮無從欲陳忠謨道隔塞也乘日月兮上征想託神明陞天庭也顧遊心兮鄗酆鄗與鎬同酆一作豐回盼周京念先聖也文王都酆武王都鄗二聖有德明於用賢故顧其都冀遭遇也彌覽兮九隅厯觀九州求英俊也彷徨兮蘭宫遊戲道室誦五經也一作仿偟芷閭兮葯房居仁履義守忠貞也奮揺兮衆芳動作應禮行馨香也菌閣兮蕙樓節度彌高德成就也觀道兮從横衆人瞻望聞功名也寶金兮委積志意堅固䇿謀明也美玉兮盈堂懿譽光明滿朝廷也桂水兮潺湲芳流衍溢周四境也揚流兮洋洋潔白之化動百姓也蓍蔡兮踊躍蓍龜喜樂慕清高也蓍筮也蔡大龜也論語曰臧文仲居蔡也孔鶴兮回翔畏怖羅網陞青雲也鶴一作鵠撫檻兮逺望登樓伏楯觀楚郢也念君兮不忘思慕懷王結中情也怫鬱兮莫陳忠言藴積不列聽也永懷兮内傷長思切切中心痛也通路天門兮戸金闈玉闉君之舍也孰由兮賢者誰當涉履英俊路也無正兮溷厠邪佞雜亂來竝居也懷德兮何覩忠信之士不見用也假寐兮愍斯衣冠而寢自憐傷也不脱冠帶而卧曰假寐詩云假寐永歎誰可與兮寤語衆人愚闇誰與謀也痛鳯兮逺逝仁者之士遁世去也畜鴳兮近處鴳音晏畜養佞䛕而親附也鯨鱏兮幽潛鱏七禽切大賢隠匿竄林藪也從鰕兮遊陼小人竝進在朝廷也鯨鱏大魚也鰕小魚也乘虬兮登陽意欲駕龍而陞雲也載象兮上行遂騎神獸用登天也神象白身赤頭有翼能飛也朝發兮葱嶺旦發西極之高山也夕至兮明光暮宿東極之丹巒也北飲兮飛泉吮𠻳天液之浮源也南采兮芝英咀嚼靈草以延年也宣遊兮列宿徧厯六合視衆星也順極兮彷徉周繞北辰觀天庭也紅采兮騂衣五采婆娑芬華英也翠縹兮為裳衣色瓌瑋耀青葱也舒佩兮綝纚綝音申纚音離緩帶徐步五玉鳴也竦余劒兮干將握我寶劒立延頸也騰蛇兮後從神虺侍從慕仁賢也飛駏兮步旁駏驉奮飛承轂輪也微觀兮𤣥圃上晲帝囿見天園也覽察兮瑶光觀視斗杓與玉衡也啓匱兮探筴筴與䇿同發匣引籌考禄相也悲命兮相當不獲富貴値流放也紉蕙兮永辭結草為誓長訣行也將離兮所思背去九族逺懷王也浮雲兮容與天氣滃溶乍東西也道余兮何之道一作導來迎導我難隨從也逺望兮仟眠遙視楚國暗未明也聞雷兮闐闐君好妄怒威武盛也隂憂兮感余内愁鬱伊害我性也惆悵兮自怜悵然失志嗟厥命也怜一作憐危俊林不容兮鳴蜩國不養民賢宜退也余何留兮中州我去諸夏將逺逝也陶嘉月兮總駕嘉及吉時驅乘駟也搴玉英兮自修采取瓊華自修飾也結榮茝兮逶逝束草陳信遂奔邁也將去烝兮逺遊違離於君之四裔也徑岱土兮魏闕行出北荒山高桀也厯九曲兮牽牛過觀列宿九天際也聊假日兮相羊且徐遊戲須年歲也遺光燿兮周流敷揚榮華垂顯烈也望太一兮淹息觀天貴將上沈滯也紆余轡兮自休緩我馬勒留寢寐也睎白日兮皎皎天精光明而照察也彌逺路兮悠悠周望八極究地外也顧列孛兮縹縹孛皮六切邪視彗星光瞥瞥也觀幽雲兮陳浮山氣滃鬱而羅列也鉅寶遷兮砏磤砏孚允切磤音隠太歲轉移聲礚磑也雉咸雊兮相求飛鳥驚鳴雌雄合也泱莽莽兮究志周望率土逺廣大也懼吾心兮懤懤懤音紬惟我憂思意愁毒也步余馬兮飛柱徘徊神山且休息也覽可與兮匹儔厯觀羣英求妃合也卒莫有兮纎芥衆皆邪佞無忠直也永余思兮怞怞怞音抽愁心長慮憂無極也昭世世溷兮㝠昏時君闇蔽臣貪佞也一云世溷濁也違君兮歸真將去懷王就仁賢也一云臣違君兮乘龍兮偃蹇驂駕神獸拏紛紜也高回翔兮上臻行戲遨遊遂至天也襲英衣兮緹䌌䌌音絏重我絳袍采色鮮也披華裳兮芳芬徐曳文衣動馨香也詩曰婆娑其下登羊角兮扶輿陟彼髙山徐顧睨也浮雲漠兮自娛乘雲歌吟而遊戲也握神精兮雍容握持神明動容儀也與神人兮相胥留侍松喬與伴儷也流星墜兮成雨隂精竝降如墜雨也進暽昐兮上丘墟暽音鄰昐音汾天旦欲明至山溪也覽舊邦兮滃鬱下見楚國之危亂也余安能兮久居將背舊鄉之九夷也志懷逝兮心懰慄懰音留心中欲去内傷悲也紆余轡兮躊躇緩我馬勒而低佪也聞素女兮微歌神仙謳吟聲依微也聽王后兮吹竽伏妃作樂百蟲至也魂悽愴兮感哀精神惆悵而思歸也腸回回兮盤紆意中毒悶心紆屈也撫余佩兮繽紛持我玉帶相糾結也髙太息兮自憐長歎傷已逺放棄也使祝融兮先行俾南方神開軌轍也令昭明兮開門炎神前驅闗梁發也馳六蛟兮上征乘龍直驅陞閶闔也竦余駕兮入㝠遂馳我車上寥廓也厯九州兮索合周遍天下求雙匹也誰可與兮終生莫足與友為親密也忽反顧兮西囿見彼隴蜀道阻阨也覩軫丘兮﨑傾山陵嶔岑難涉厯也横垂涕兮泫流悲思念國泣雙下也悲余后兮失靈哀惜我后違天法也尊嘉季春兮陽陽三月温和氣清明也列草兮成行百卉垂條吐榮華也余悲兮蘭生哀彼香草獨隕零也委積兮從横横音黄枝條摧折傷根莖也江離兮遺捐忠正之士棄山林也辛夷兮擠藏擠子里切仁智之士抑沈没也伊思兮往古惟念前世諸賢俊也亦多兮遭殃仁義遇罰禍及身也伍胥兮浮江吳王棄之於江濱也屈子兮沈湘懐沙負石赴汨淵也運余兮念兹轉思念此志煩寃也心内兮懷傷膓中惻痛摧肝肺也望淮兮沛沛臨水恐慄畏禍患也一云淵沛沛濱流兮則逝意欲隨水而隠遁也榜舫兮下流乘舟順水遊海濱也東注兮礚礚濤波踴躍多險難也蛟龍兮導引虬螭水禽馳在前也一云蛟龍沃兮文魚兮上瀨巨鱗扶已渡涌湍也抽蒲兮陳坐拔草為席處薄單也援芙蕖兮為蓋引取荷華以覆身也一云援英兮為蓋一云拔英水躍兮余旌風波動我搖旗旛也繼以兮微蔡續以草芥入已船也雲旗兮電騖遂乘風電驅横奔也儵忽兮容裔往來亟疾若鬼神也河伯兮開門水君竢望開府寺也迎余兮歡欣喜笑迎已愛我善也顧念兮舊都還視楚國思郢城也懷恨兮艱難抱念恚恨常欲還也竊哀兮浮萍自比如蘋生水瀕也汎淫兮無根隨水浮游乍東西也蓄英秋風兮蕭蕭隂氣用事天政急也舒芳兮振條動搖百草使芳熟也微霜兮眇眇霜凝微薄寒深酷也病殀兮鳴蜩飛蟬巻曲而寂黙也𤣥鳥兮辭歸燕將入海化為蛤也飛翔兮靈丘悲鳴神山奮羽翼也望谿兮滃鬱川谷吐氣雲闇昩也熊羆兮呴嘷猛獸應秋將害賊也唐虞兮不存堯舜已過難追逐也何故兮久留宜更求君之他國也臨淵兮汪洋瞻望大川廣無極也顧林兮忽荒回視喬木與山薄也修余兮袿衣整我袗裳自結束也騎霓兮南上託乘赤霄登張翼也椉雲兮回回載氣溶溶意中惡也亹亹兮自强稍稍陞進遂自力也將息兮蘭臯且欲中休止方澤也失志兮悠悠從髙視下目眩惑也蒶藴兮黴黧蒶音紛藴音云黴音梅黧音黎愁思蓄積面垢黒也思君兮無聊聊音留想念懷王忘寢食也身去兮意存體逺情近在胷臆也愴恨兮懷愁心中憂恨内悽惻也思忠登九靈兮遊神想登九天放精神也神一作精靜女歌兮微晨神女夜吟聲激清也悲皇丘兮積葛衆體䥘兮交紛言已見美大之丘葛草緣之而生交錯茂盛人不異而采取則不成絺綌也以言楚國士民衆多君不異而舉用則不知其有德也貞枝抑兮枯槁貞正枉車登兮慶雲慶雲喻尊顯也言葛有正直之枝抑棄枯槁而不見采枉壌惡者滿車陞進反見珍重御尊顯也以言貞正之人棄於山野佞曲之臣陞於顯朝也感余志兮慘慄動踊我心如析割也心愴愴兮自憐意中切傷憂悲楚也一云心悲兮駕𤣥螭兮北征將乘山神而奔走也曏吾路兮葱嶺曏音向欲踰髙山度阻險也連五宿兮建旄係續列星為旗旐也揚氛氣兮為旌舉布霾霧作旗表也厯廣漠兮馳騖徑過長沙馳駟馬也覽中國兮㝠㝠顧視諸夏尚昧晦也𤣥武步兮水母天龜水神侍送余也與吾期兮南榮與已為誓㑹炎野也南方冬温草木常茂故曰南榮登華蓋兮乘陽上攀北斗躡房星也乘一作椉聊逍遙兮播光且徐遊戲布文采也抽庫婁兮酌醴引持二星以斟酒也援瓟𤓰兮接糧瓟音袍啖食神果志厭飽也畢休息兮逺逝周徧留止而復去也發玉軔兮西行引支車木遂馳驅也惟時俗兮疾正弗可久兮此方世憎忠信愛諂諛也寤辟摽兮永思心常長愁捬心踊也辟捬心貌也心怫鬱兮内傷憂思積結肝腑爛也陶壅覽杳杳兮世惟觀楚泥濁俗愚蔽也余惆悵兮何歸惘然失志無依附也傷時俗兮溷亂哀愍當世衆貪暴也將奮翼兮髙飛振趐翺翔絶塵埃也駕八龍兮連蜷乘虬翺翔見容貌也建虹旌兮威夷樹螮蝀旗紛光耀也觀中宇兮浩浩大哉天下難徧照也紛翼翼兮上躋盛氣振迅陞天衢也浮溺水兮舒光遂渡沈流揚精華也淹低佪兮京沚沚讀平聲且留水側息河洲也水中可居為洲小洲為渚小渚為沚京沚者即髙洲也屯余車兮索友住我之駕求松喬也覩皇公兮問師遂見天帝詔祕要也道莫遺兮歸真執守無為修朴素也羨余術兮可夷念已道藝可悅樂也詩云既見君子我心則夷夷喜也吾乃逝兮南娛往之太陽遊九野也道幽路兮九疑疑通作嶷陟厯深山過舜墓也越炎火兮萬里積熱彌天不可處也過萬首兮㠜㠜見海中山數萬頭也海中山名㠜㠜嶽嶽屬交阯也㠜㠜一作旌旌濟江海兮蟬蜕遂渡大水解形體也絶北梁兮永辭超過海津長訣去也浮雲鬱兮晝昏楚國潰亂氣未除也霾土忽兮塺塺風俗塵濁不可居也塺音糜息陽城兮廣夏遂止炎野大屋廬也衰色罔兮中怠叶徒來切志欲懈倦身罷勞也意曉陽兮燎寤心中燎明内自覺也乃息軫兮存兹徐自省視至此處也思堯舜兮襲興喜慕二聖相繼代也幸咎繇兮獲謀叶悲切冀遇虞舜與議道也悲九州兮靡君傷今天下無聖主也撫軾歎兮作詩伏車浩歎作風雅也株昭悲哉于嗟兮愁思憤滿長歎息也心内切嗟意中激感腸病痛也欵冬而生兮物叩盛隂不滋育也凋彼葉柯傷害根莖枝巻曲也瓦礫進寶兮佞偽愚戇侍帷幄也捐棄隋和貞良君子棄山澤也鈆刀厲御兮頑嚚之徒任政職也頓棄太阿明智忠賢放斥逐也驥垂兩耳兮雄俊佯愚閉口目也中坂蹉跎衆無知已不盡力也蹇驢服駕兮駑鈍之徒為輔翼也無用日多僮䝉竝進填滿國也修潔處幽兮執履清白居陋側也貴寵沙劘權右大夫佯不識也劘叶音磨鳯皇不翔兮賢智隠處深藏匿也鶉鴳飛揚小人得志作威福也乘虹驂蜺兮託駕神器而逺征也載雲變化陞髙去俗易形貌也鷦䳟開路兮仁士智鳥導在前也後屬青蛇介蟲之長衛惡姦也步驟桂林兮馳逐正道德香芬也超驤巻阿騰越曲阜過阨難也丘陵翔儛兮山丘踴躍而歡喜也谿谷悲歌川瀆作樂進五音也神章靈篇兮河圖洛書緯䜟文也赴曲相和宫商竝㑹應琴瑟也余私娛兹兮我誠樂此發中心也孰哉復加天下歡悦莫如今也還顧世俗兮回視楚國及衆民也壊敗罔羅廢棄仁義修諂諛也巻佩將逝兮袪衣束帶將横奔也涕流滂沲思君念國泣霑衿也亂曰皇門開兮王門啟闢路四通也一云皇開門兮照下土鏡覽幽㝠見萬方也株穢除兮邪惡已消逺逃亡也蘭芷覩俊乂英雄在朝堂也四佞放兮驩共苗鯀竄四荒也後得禹乃獲文命治江河也聖舜攝兮重華秉政執紀綱也昭堯緒著明唐業致時雍也孰能若兮誰能知人如唐虞也願為輔思竭忠信備股肱也論四子講德論微斯文學問於虛儀夫子曰蓋聞國有道貧且賤焉恥也今夫子閉門距躍專精趨學有日矣幸遭聖主平世而久懷寶是伯牙去鍾期而舜禹遁帝堯也於是欲顯名號建功業不亦難乎夫子曰然有是言也夫蚊蝱終日經營不能越階序附驥尾則涉千里攀鴻翮則翔四海僕雖頑嚚願從足下雖然何由而自達哉文學曰陳懿誠於本朝之上行話談於公卿之門夫子曰無介紹之道安從行乎公卿文學曰何為其然也昔寗戚商歌以干齊桓越石負芻而寤晏嬰非有積素絫舊之歡皆塗覯卒遇而以為親者也故毛嬙西施善毁者不能蔽其好嫫姆倭傀善譽者不能掩其醜茍有至道何必介紹夫子曰咨夫特達而相知者千載之一遇也招賢而處友者衆士之常路也是以空柯無刅公輸不能以斵但懸曼矰蒲苴不能以射故膺騰撇波而濟水不如乘舟之逸也衝䝉涉田而能致逺未若遵塗之疾也才蔽於無人行衰於寡黨此古今之患唯文學慮之文學曰唯唯敬聞命矣於是相與結侣攜手俱游求賢索友厯於西州有二人焉乘輅而歌倚輗而聽之詠歎中雅轉運中律嘽緩舒繹曲折不失節問歌者為誰則所謂浮游先生陳丘子者也於是以士相見之禮友焉禮文既集文學夫子降席而稱曰俚人不識寡見尠聞曩從末路望聽玉音竊動心焉敢問所歌何詩請聞其説浮游先生陳丘子曰所謂中和樂職宣布之詩益州刺史之所作也刺史見太上聖明股肱竭力德澤洪茂黎庶和睦天人竝應屢降瑞福故作三篇之詩以歌詠之也文學曰君子動作有應從容得度南容三復白圭孔子睹其慎戒太子擊誦晨風文侯諭其指意今吾子何樂此詩而詠之也先生曰夫樂者感人密深而風移俗易吾所以詠歌之者美其君術明而臣道得也君者中心臣者外體外體作然後知心之好惡臣下動然後知君之節趨好惡不形則是非不分節趨不立則功名不宣故美玉藴於碔砆凡人視之怢焉良工砥之然後知其和寶也精錬藏於鑛璞庸人視之忽焉巧冶鑄之然後知其幹也況乎聖德巍巍蕩蕩黎氓所不能命哉是以刺史推而詠之揚君美德深乎洋洋罔不覆載紛紜天地寂寥宇宙明君之惠顯忠臣之節究皇唐之世何以加兹是以毎歌之不知老之將至也文學曰書云迪一人使四方若卜筮夫忠賢之臣導主志承君惠攄盛德而化洪天下安瀾比屋可封何必歌詠詩賦可以揚君哉愚竊惑焉浮游先生色勃眥溢曰是何言與昔周公詠文王之德而作清廟建為頌首吉甫歎宣王穆如清風列于大雅夫世衰道微偽臣虛稱者殆也世平道明臣子不宣者鄙也鄙殆之絫傷乎王道故自刺史之來也宣布詔書勞來不怠令百姓徧曉聖德莫不霑濡厖睂耆耉之老咸愛惜朝夕願濟須臾觀大化之淳流於是皇澤豐沛主恩滿溢百姓歡欣中和感發是以作歌而詠之也傳曰詩人感而後思思而後積積而後滿滿而後作言之不足故嗟歎之嗟歎之不足故詠歌之詠歌之不厭不知手之舞之足之蹈之也此臣子於君父之常義古今一也今子執分寸而罔億度處把握而却寥廓乃欲圖大人之樞機道方伯之失得不亦逺乎陳丘子見先生言切恐二客慙膝歩而前曰先生詳之行潦暴集江海不以為多鰌鱓竝逃九罭不以為虛是以許由匿堯而深隠唐氏不以衰夷齊恥周而逺餓文武不以卑夫青蠅不能穢垂棘邪論不能惑孔墨今刺史質敏以流惠舒化以揚名采詩以顯至德歌詠以董其文受命如絲明之如緡甘棠之風可倚而俟也二客雖窒計沮議何傷顧謂文學夫子曰先生微矜於談道又不讓乎當仁亦未巨過也願二子措意焉夫子曰否夫雷霆必發而潛底震動枹鼓鏗鏘而介士奮竦故物不震不發士不激不勇今文學之言欲以議愚感敵舒先生之憤願二生亦勿疑也於是文繹復集乃始講德文學夫子曰昔成康之世君之德歟臣之力也先生曰非有聖智之君惡有甘棠之臣故虎嘯而風寥戾龍起而致雲氣蟋蟀俟秋吟蜉蝣出以隂易曰飛龍在天利見大人鳴聲相應仇偶相從人由意合物以類同是以聖主不徧窺望而視以明不殫傾耳而聽以聰何則淑人君子人就者衆也故千金之裘非一狐之腋大厦之材非一丘之木太平之功非一人之畧蓋君為元首臣為股肱明其一體相待而成有君而無臣春秋刺焉三代以上皆有師傅五伯以下各自取友齊桓有管鮑隰寗九合諸侯一匡天下晉文有舅犯趙衰取威定霸以尊天子秦穆有王由五羖攘却西戎始開帝緒楚莊有孫叔子反兼定江淮威震諸夏勾踐有種蠡泄庸尅滅彊吳雪㑹稽之恥魏文有段干田翟秦人寢兵折衝萬里燕昭有郭隗樂毅夷破彊齊困閔於莒夫以諸侯之細功名猶尚若此而況帝王選於四海羽翼百姓哉故有賢聖之君必有明智之臣欲以積德則天下不足平也欲以立威則百蠻不足攘也今聖主冠道德履純仁被六藝佩禮文屢下明詔舉賢良求術士招異倫拔駿茂是以海内歡慕莫不風馳雨集襲雜竝至填庭溢闕含淳詠德之聲盈耳登降揖讓之禮極目進者樂其條暢怠者欲罷不能偃息匍匐乎詩書之門游觀乎道徳之域咸潔身修德吐情素而披心腹各悉精鋭以貢忠誠允願推主上𢎞風俗而騁太平濟濟乎多士文王所以寧也若乃美政所施洪恩所潤不可究陳舉孝以篤行崇能以招賢去煩蠲苛以綏百姓禄勤増俸以厲貞亷減膳食卑宫觀省田官損諸苑疎繇役振乏困恤民災害不遑游宴閔耄老之逢辜憐縗絰之服事惻隠身死之腐人悽愴子弟之縲匿恩及飛鳥惠加走獸胎卵得以成育草木遂其零茂愷悌君子民之父母豈不然哉先生獨不聞秦之時耶違三王背五帝滅詩書壊禮義信任羣小憎惡仁智詐偽者進達佞諂者容入宰相刻峭大理峻法處位而任政者皆短於仁義長於酷虐狼摯虎攫懷殘秉賊其所臨莅莫不肌慄慴伏吹毛求疵竝施螫毒百姓征彸無所措其手足嗷嗷愁怨遂亡秦族是以養雞者不畜貍牧獸者不育豺樹木者憂其蠧保民者除其賊故大漢之為政也崇簡易尚寛柔進淳仁舉賢才上下無怨民用和睦今海内樂業朝廷淑清天符既章人瑞又明品物咸亨山川降靈神光燿暉洪洞朗天鳯皇來儀翼翼邕邕羣鳥竝從舞德垂容神雀仍集麒麟自至甘露滋液嘉禾櫛比大化隆洽男女條暢家給年豐咸則三壤豈不盛哉昔文王應九尾狐而東夷歸周武王獲白魚而諸侯同辭周公受秬鬯而鬼方臣宣王得白狼而夷狄賓夫名自正而事自定也今南郡獲白虎亦偃武興文之應也獲之者張武武張而猛服也是以北狄賓洽邊不恤冦甲士寢而旌旗仆也文學夫子曰天符既聞命矣敢問人瑞先生曰夫匈奴者百蠻之最彊者也天性驕蹇習俗桀暴賤老貴壯氣力相高業在攻伐事在獵射兒能騎羊走箭飛鏃逐水隨畜都無常處鳥集獸散往來馳騖周流曠野以濟嗜欲其耒耜則弓矢鞍馬播種則扞弦掌拊收秋則奔狐馳兔穫刈則顚倒殪仆追之則奔遁釋之則為冦是以三王不能懷五伯不能綏驚邊杌士屢犯芻蕘詩人所歌自古患之今聖德隆盛威靈外覆日逐舉國而歸德單于稱臣而朝賀乾坤之所開隂陽之所接編結沮顔燋齒梟瞯剪髪黥首文身裸袒之國靡不奔走貢獻懽忻來附婆娑嘔吟鼓腋而笑夫鴻均之世何物不樂飛鳥翕翼淵魚奮躍是以刺史感懣舒音而詠至德鄙人黭淺不能究識敬遵所聞未克殫焉於是二客醉于仁義飽于盛德終日仰歎怡懌而悦服頌聖主得賢臣頌夫荷旃被毳者難與道純緜之麗密羮藜唅糗者不足與論太牢之滋味今臣僻在西蜀生於窮巷之中長於蓬茨之下無有遊觀廣覽之知顧有至愚極陋之累不足以塞厚望應明㫖雖然敢不畧陳愚心而抒情素記曰恭惟春秋法五始之要在乎審已正統而已夫賢者國家之器用也所任賢則趨舍省而功施普器用利則用力少而就效衆故工人之用鈍器也勞筋苦骨終日矻矻及至巧冶鑄干將之樸清水淬其鋒越砥歛其鍔水㫁蛟龍陸剸犀革忽若篲汜畫塗如此則使離婁督繩公輸削墨雖崇臺五層延袤百丈而不溷者工用相得也庸人之御駑馬亦傷吻敝䇿而不進於行胷喘膚汗人極馬倦及至駕齧膝驂乘旦王良執靶韓哀附輿縱馳騁騖忽如景靡過都越國蹶如厯塊追奔電逐遺風周流八極萬里一息何其遼哉人馬相得也故服絺綌之涼者不苦盛暑之鬱燠襲狐貉之煗者不憂至寒之悽愴何則有其具者易其備賢人君子亦聖王之所以易海内也是以嘔喻受之開寛裕之路以延天下之英俊也夫竭知附賢者必建仁䇿索人求士者必樹伯迹昔周公躬吐握之勞故有圄空之隆齊桓設庭燎之禮故有匡合之功由此觀之君人者勤於求賢而逸於得人人臣亦然昔賢者之未遭遇也圖事揆䇿則君不用其謀陳見悃誠則上不然其信進仕不得施效斥逐又非其愆是故伊尹勤於鼎俎太公困於鼓刀百里自鬻寗戚飯牛離此患也及其遇明君遭聖主也運籌合上意諫諍則見聽進退得闗其忠任職得行其術去卑辱奥渫而升本朝離蔬釋蹻而享膏粱剖符錫壤而光祖考傳之子孫以資説士故世必有聖知之君而後有賢明之臣虎嘯而谷風冽龍興而致雲氣蟋蟀竢秋唫蜉蝣出以隂易曰飛龍在天利見大人詩曰思皇多士生此王國故世平主聖俊乂將自至若堯舜禹湯文武之君獲稷契臯陶伊尹吕望之臣明明在朝穆穆布列聚精㑹神相得益章雖伯牙操􅂒鍾逢門子彎烏號猶未足以喻其意也故聖主必待賢臣而𢎞功業俊士亦俟明主以顯其徳上下俱欲歡然交欣千載一㑹論説無疑翼乎如鴻毛遇順風沛乎如巨魚縱大壑其得意若此則胡禁不止曷令不行化溢四表横被無窮遐夷貢獻萬祥畢臻是以聖主不徧窺望而視已明不殫傾耳而聽已聰恩從祥風翺德與和氣游太平之責塞優游之望得遵游自然之勢恬淡無為之場休徴自至壽考無疆雍容垂拱永永萬年何必偃卬詘信若彭祖呴噓呼吸如喬松𦕈然絶俗離世哉詩云濟濟多士文王以寜蓋信乎其以寜也甘泉宫頌甘泉山天下顯敞之名處也前接大荆後臨北極左撫仁鄉右望素域其宫室也仍嶻嶭而為觀攘抗岸以為階壅波瀾而鱗坻馳道列以逶迤覽除閣之麗靡覺堂殿之巍巍徑落莫以差錯編玳瑁之文㮰鏤螭龍以造牖采雲氣以為楣神星羅於題鄂虹蜺往往而繞榱縵倐忽其無垠意能了之者誰竊想聖主之優游時娛神而欵縱坐鳯皇之堂聽和鸞之㺯臨麒麟之域驗符瑞之貢詠中和之歌讀太平之頌移文移金馬碧雞文華陽國志曰蜻蛉縣山有碧雞金馬光影倐忽民多見之有山神漢宣帝遣王褒祭之欲致金馬持節使者敬移南崖金精神馬剽剽碧雞處南之荒深溪回谷非土之鄉歸來歸來漢德無疆廣乎唐虞澤配三皇黄龍見兮白虎仁歸來歸來可以為倫歸兮翔兮何事南荒也約僮約蜀郡王子淵以事到煎上寡婦楊惠舍有一奴名便了倩行酤酒便了提大杖上冢巓曰大夫買便了時只約守冢不約為他家男子酤酒子淵大怒曰奴寜欲賣邪惠曰奴父許人人無欲者子即決賣劵之奴復曰欲使皆上不上劵便了不能為也子淵曰諾劵文曰神爵三年正月十五日資中男子王子淵從成都安志里女子楊惠買夫時戸下髯奴便了決賣萬五千奴從百役使不得有二言晨起灑掃食了洗滌居當穿臼縛帚裁盂鑿井浚渠縳落鉏園研陌杜埤地刻大枷屈竹作杷削治鹿盧出入不得騎馬載車踑坐大呶下床振頭垂釣刈芻結葦臘纑沃不酪住䣯􅮢織履作麄黏雀張烏結網捕魚繳鴈彈鳬登山射鹿入水捕龜後園縱養鴈鶩百餘驅逐鴟鳥持捎牧猪種薑養芋長育豚駒糞除常潔餧食馬牛鼓四起坐夜半益芻二月春分被隄杜疆落桑皮椶種𤓰作瓠別茄披葱焚槎發疇壟集破封日中早熭鷄鳴起舂調治馬驢兼落三重舍中有客提壺行酤汲水作餔滌杯整案園中拔䔉斵蘇切脯築肉臚羊膾魚炰鱉烹茶盡具餔已蓋藏闗門塞竇餧猪縱犬勿與隣里爭鬬奴當飯豆飲水不得嗜酒欲飲美酒唯得染脣漬口不得傾盂覆斗不得辰出夜入交闗伴偶舍後有樹當裁作舩上至江州下到煎主為府掾求用錢推紡惡敗椶索緜亭買席往來都洛當為婦女求脂澤販於小市歸都擔枲轉出旁蹉牽牛販鵝武陽買茶楊氏池中擔荷往來市聚慎䕶姦偷入市不得夷蹲旁卧惡言醜詈多作刀弓持入益州貨易牛羊奴自交精慧不得癡愚持斧入山㫁槧裁轅若殘當作俎机木屐及彘盤焚薪作炭礨石薄岸治舍蓋屋書削代讀日暮以歸當送乾薪兩三束四月當披五月當穫十月收豆多取蒲苧益作繩索雨墮無所為當編蔣織箔植種桃李梨柿柘桑三丈一樹八赤為行果類相從縱横相當果熟收歛不得吮嘗犬吠當起驚告隣里棖門柱戸上樓擊鼓椅盾曳矛還落三周勤心疾作不得遨遊奴老力索種莞織蓆事訖欲休當舂一石夜半無事浣衣當白若有私歛主給賓客奴不得有姦私事事當闗白奴不聽教當笞一百讀劵文徧訖詞窮咋索仡仡扣頭兩手自縛目淚下落鼻涕長一尺當如王大夫言不如早歸黄土陌蚯蚓鑽額早知當爾王大夫酤酒真不敢作惡太平御覽載僮約尚有榆菱窖芋南安拾栗採橘持車載輳等語然則兹篇尚屬節文文責髯奴文古文苑作黄香今從藝文作王褒我觀人鬚長而復黑冉弱而調離離若縁坡之竹鬱鬱若春田之苗因風披拂隨風飄颻爾乃附以豐頤表以蛾睂發以素顔呈以妍姿約之以紲綫潤之以芳脂莘莘翼翼靡靡綏綏振之發曜黝若𤣥珪之垂於是搖鬚奮髭則論説虞唐鼓鬐動鬛則妍覈臧否内育瓌形外闡宫商相如以之閒都顓孫以之堂堂豈若子髯既亂且赭枯槁秃瘁劬勞辛苦汗垢流離汚穢泥土傖囁穰擩與塵為伍無素顔可依無豐頤可怙動則困於忽滅靜則窘於囚虜薄命為髭正著子頤為身不能庇其四體為智不能飾其形骸癩鬚瘦面常如死灰曽不如犬羊之毛尾狐狸之毫氂為子鬚者不亦難乎漢魏六朝百三家集巻六
