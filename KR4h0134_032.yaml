body:
  text: 漢魏六朝百三家集卷三十二魏應瑒應璩集題詞德璉集鮮書記世所傳者止報龎公一牘耳休璉書最多俱秀絶時表列諸辭令之科陳孟公王景興其人也德璉善賦篇目頗多取方弟書文藻不敵詩雖比肩亦覺百一為長休璉火攻良可畏也魏祖二十二年徐陳應劉一時俱逝曹子桓輒申痛惜德璉周旋時主年位較逺規諷曹爽殷勤指諭憂患存焉汝南應氏世濟文雅德璉幸遇子桓時可著書忽化蒿萊美志不遂休璉歷事二主㗋舌可舒而世無賞音義存優孟嗟乎命也機雲著聲入洛載協齊名王府原其風流二應為始低回建章仰送朝鴈豫猶善其足傳爾目録賦慜驥賦迷迭賦靈河賦正情賦征賦馳射賦鸚鵡賦愁霖賦西狩賦車渠碗賦楊柳賦書報龎惠恭書論文質論雜文奕勢檄文詩報趙淑麗公宴侍五官中郎將建章臺集詩别詩其一其二鬪雞漢魏六朝百三家集卷三十二目録欽定四庫全書漢魏六朝百三家集卷三十二明張漙輯魏應瑒集賦慜驥賦慜良驥之不遇兮何屯否之𢎞多抱天飛之神號兮悲當世之莫知赴𤣥谷之漸塗兮陟髙岡之峻崖懼僕夫之嚴䇿兮載悚栗而奔馳懷殊姿而困遇兮願逺跡而自舒思奮行而驤首兮叩韁緤之紛拿牽繁轡而增制兮心慉結而盤紆涉通逵而方舉兮迫輿僕之我拘抱精誠而不暢兮鬱神足而不攄思篩翁於西土兮望伯氏於東隅願浮軒於千里兮曜華軛乎天衢瞻前軌而促節兮顧後乘而踟蹰展心力於知巳兮甘邁逺而亡劬哀二哲之殊世兮時不遘乎良造制銜轡於常御兮安獲騁於遐道迷迭賦列中堂之嚴宇跨階序而駢羅建茂莖以竦立擢修幹而承阿燭白日之炎陰承翠碧之繁柯朝敷條以誕節夕結秀而垂華振纎枝之翠粲動綵葉之莓莓舒芳香之酷烈乘清風以徘徊靈河賦咨靈川之遐源兮于崑崙之神丘凌增城之陰隅兮賴后土之潜流衝種石之重險兮披山麓之溢浮蹶龍門而南邁兮紆鴻體而東流涉津洛之坂泉播九道之中洲紛澒湧而騰騖兮恆亹亹而徂征肇乘髙而迅逝兮陽侯沛而震驚有漢中葉兮金隄隤而瓠子傾興萬乘而親務兮董羣后而來營下淇園之豐篠兮投璧玉而沈星若夫長杉峻檟茂栝芬橿扶疏灌列映水䕃防隆條動而暢清風白日顯而曜殊光正情賦夫何媛女之殊麗兮姿溫惠而明哲應靈和以挺質體蘭茂而瓊潔方往載其鮮雙曜來今而無列發朝陽之鴻暉流精睇而傾泄既榮麗而冠時援申女而比節余心嘉夫淑美願結歡而靡因承窈窕之芳美情踴躍乎若人魂翩翩而夕遊甘同夢而交神晝倣徨於路側宵耿耿而逹晨清風厲於𤣥序凉飈逝於中唐聽雲鴈之翰鳴察列宿之華輝南星晃而電隕偏雄肅而特飛冀騰言以俯音嗟激迅而難追傷佳禽之無偶悼流光之不歸愍伏辰之方逝哀吾願之多違步便旋以永思情憀慓而傷悲還幽室以假寐固展轉而不安神渺渺以潜翔恆存遊乎所觀仰崇夏而長息動哀響而餘歎氣浮踴而雲館腸一夕而九煩征賦奮皇佐之豐烈將親戎乎幽鄰飛龍旗以雲曜披廣路而北巡崇殿鬱其嗟峨華宇爛而舒光摛雲藻之雕飾流輝采之渾黃辭曰烈烈征師尋遐庭兮悠悠萬里臨長城兮周覽郡邑思既盈兮嘉想前哲遺風聲兮馳射賦於是陽春嘉日講肄餘暇將逍遙於郊野聊娛遊於騁射延賓鞠旅星言夙駕樹應鞞於路左建丹旗於表路羣駿籠于衡首咸皆騕裊與飛兔爾乃結翻伍齊倫匹良樂授馬孫臏調駟籌算克明班次均一左攬繁弱右接湛衛控滿流睇應弦飛碎旝動鼓震譟聲雷潰重破纍流景倐忽紛紜絡驛次授二八驊騮激騁神足奔越終節三驅矢不虗發進截飛鳥顧摧月支須紆六鈞口攣七規觀者屏氣而傾竦咸側企而騰移爾乃縈回盤厲按節和旋翩翩神厲體若飛仙奕奕騂牡既佶且間揚驪沛艾蠖略相連鸚鵡賦何翩翩之麗鳥表衆艷之殊色被光耀之鮮羽流𤣥黃之華飾苞明哲之𢎞慮從陰陽之消息秋風厲而潜形蒼神發而動翼愁霖賦聽屯雷之恆音兮聞左右之歎聲情慘憒而含欷兮起披衣而游庭三辰幽而重關蒼曜隱而無形雲曖曖而周馳雨濛濛而霧零排房帳而北入振蓋服之沾衣還空牀而寢息夢白日之餘暉惕中寤而不效兮意悽悷而增悲西狩賦伊炎漢之建安飛龍耀乎天衢皇宰逸而陶運樹匡翼而大摹蕩無妄之氛穢揚威靈乎八區開九土之舊迹暨聲教於海隅時霜凄而淹野寒風肅而川逝草木紛而搖蕩鷙鳥别而髙厲既乃揀吉日練嘉辰清風矢戒屏翳收塵於是魏公乃乘雕輅駟飛黃擁簫鉦建九斿按轡清途颯沓風翔於是圍網周合雷鼓天震千乘長羅萬表星陳雙翼伉旌八挍祖分長燧電舉髙煙蔽雲爾乃徒輿並興方軌連質驚飈四駭衝禽驚溢騁獸塞野飛鳥蔽日爾乃赴𤣥谷陵崇巒俯掣奔猴仰捷飛猿雲幕被於廣野京燎照乎平原醴炮充給洪施普宣車渠碗賦惟茲碗之珍瑋誕靈嶽而竒生扇不周之芳烈浸瓊露以潤形䕃碧條以納曜吸朝霞而發榮紛𤣥黃以彤裔曄豹變而龍華象蛇虹之輔體中含曜乎雲波若其衆色鱗聚卓度詭常絪緼雜錯乍圓乍方蔚術繁興散列成章揚丹流縹碧玉飛黃華氣承朗內外齊光楊柳賦赴陽春之和節植纎柳以承凉攄豐節而廣布紛鬱勃以敷陽三春倐其奄過景日赫其垂光振橫條而逺翳回雲蓋於中唐書報龎惠恭書夫蕭艾之歌發於信宿子襟之思起於一作寧不嗣音况實三載能不有懷雖萱草樹背皋蘇在側悒憤不逞秪以增毒朝隱之官賓不往來喬木之下曠無休息抱勞而已足下剖符南面振威千里行人子羽朝夕相繼曽不枉咫尺之路問蓬室之舊過意賜書辭不半紙慰藉輕於繒縞譏望重於丘山是角弓之詩所以為刺也植鷺羽於宛丘騁駿足於株林發明月之輝光照妖人之窈窕斯亦所以眩耳目之視聽亡聲命於知友者也論文質論蓋皇穹肇載陰陽初分日月運其光列宿耀其文百榖麗於土芳華茂於春是以聖人合德天地禀氣淳靈仰觀象於𤣥表俯察式於羣形窮神知化萬物是經故否泰易趨道無攸一二政代序有文有質若乃陶唐建國成周革命九官咸乂濟濟休令火龍黼黻暐韡於廊廟衮冕旗旒舄奕乎朝廷冠德百王莫參其政是以仲尼嘆煥乎之文從郁郁之盛也夫質者端一𤣥靜儉嗇潜化利用承清泰御平業循軌量守成法至乎應天順民撥亂夷世摛藻奮權赫奕丕烈紀禪協律禮儀煥别覽墳丘於皇代建不刋之洪制顯宣尼之典教探微言之所弊若乃和氏之明璧輕縠之袿裳必將遊玩於左右振飾於宫房豈爭牢僞之勢金布之剛乎且少言辭者孟僖所以答郊勞也寡智見者慶氏所以困相鼠也今子棄五典之文暗禮義之大信管望之小尋老氏之蔽所謂循規常趍未能釋連環之結也且髙帝龍飛豐沛虎據秦楚唯德是建唯賢是與陸酈摛其文辨良平奮其權諝蕭何創其章律叔孫定其庠序周樊展其忠教韓彭列其威武明逹天下者非一士之術營造宫廟者非一匠之矩也逮至髙后亂德損我宗劉朱虗軫其慮辟疆釋其憂曲逆規其模酈友詐其遊襲據北軍實賴其疇冢嗣之不替實四老之由也夫諌則無議以陳問則服汗沾濡豈若陳平敏對叔孫據書言辨國典辭定皇居然後知質者之不足文者之有餘雜文奕勢蓋棊奕之制所由來尚矣有像軍戎戰陳之紀旌旗既列權慮蜂起駱驛雨集魚鱗雁峙奮維闔翼固衛邊鄙或飾遁僞旋卓轢軿列羸師延敵一乘虗絶歸不得合兩見擒滅淮陰之謨拔旗之勢也或匡設無常尋變應危寇動北壘備在南麾中棊既捷四表自虧亞夫之智耿弇之竒也或假道四布周爰繁昌雲合星羅侵逼郊場師弱衆寡臨據孤方披掃强禦廣略土疆昆陽之威官渡之方也挑誘既戰見欺敵對紛拏相救不量進退羣聚俱殞力行唐突瞋目恚憤覆局崩潰項將之咎楚懷之悖也時或失謬取奔攝北還自保固完聚補塞見可而進先負後尅燕昭之賢齊頃之德也長驅馳逐見利忘害輕敵寡備所喪彌大臨疑猶豫算慮不詳茍貪少獲不知所亡當斷不斷還為所謀項羽之失吳王之尤也持棊相守莫敢先動由楚漢之兵相拒索鞏也檄文長㦸百萬胡馬千羣詩報趙淑麗朝雲不歸夕結成陰離羣猶宿永思長吟有鳥孤棲哀鳴北林嗟我懷矣感物傷心公宴巍巍主人德佳㑹被四方開館延羣士置酒于斯堂辨論釋鬱結援茟興文章穆穆衆君子好合同安康促坐褰重帷傳滿騰羽觴侍五官中郎將建章臺集詩公子以下疑别一首朝鴈嗚雲中音響一何哀問子游何鄉戢翼正徘徊言我塞門來將就衡陽棲往來翔北土今冬客南淮逺行蒙霜雪毛羽日摧頽常恐傷肌骨身隕沈黃泥簡珠墮沙石何能中自諧欲因雲雨㑹濯翼陵髙梯良遇不可值伸眉路何階公子敬愛客樂飲不知疲和顔既已暢乃肯顧細微贈詩見存慰小子非所宜且為極歡情不醉其無歸凡百敬爾位以副飢渴懷别詩二首朝雲浮四海日暮歸故山行役懷舊土悲思不能言悠悠涉千里未知何時旋其二浩浩長河水九折東北流晨夜赴滄海海流亦何抽逺適萬里道歸來未有由臨河纍一作竟太息五內懷傷憂鬪雞戚戚懷不樂無以釋勞勤兄弟游戲場命駕迎衆賓二部分曹伍羣雞煥以陳雙距解長綵飛踊超敵倫芥羽張金距連戰何繽紛從朝至日夕勝負尚未分專場驅衆敵剛捷逸等羣四坐同休贊賓主懷悅欣博奕非不樂此戲世所珍漢魏六朝百三家集卷三十二
