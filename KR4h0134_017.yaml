body:
  text: 漢魏六朝百三家集卷十七目録荀悅集題詞西豪荀氏楚蘭陵令後裔也季和八龍名稱極盛諸孫若仲豫文若並為時所知然文若娶婦中官依身逆賊夀春飲藥進退觸藩雖何顒目以王佐曹操詡為子房徒虛聲耳豈及仲豫周旋故君志存獻替哉文若佐操舉事擒吕布破袁紹奉迎車駕徙都許昌咸出其謀以彼英才説詩書論禮樂言論滿堂寧遜北海而掌握從橫疲精軍旅鴻毛一死銅雀先驅萬世而下竟無一卷足傳者仲豫性沈靜好著述隱居託疾不入閹官網羅及事獻帝談論近省憤曺氏之執政哀天子之恭已既作申鑒復撰漢紀余觀立典五志知其永懷西京悁悁不寐也諸論上倣過秦下擬驃騎較班馬挹諱其辭直矣髙陽才子德業世濟能立言者慈明仲豫耳余於此益悲敬侯之無年也目録序漢紀序又後序論贊酈食其謀立六國論家令説太公論貫髙張敖論髙祖贊立張氏為惠帝后論列侯論祿制論災異論髙后贊時務論立制度論除田租馮唐論文帝遺詔短喪論文帝贊景帝賜江都王非天子旌旗論髙帝封王侯約論封胸奴徐盧等論三遊論丞相封侯論神怪論斬任安論昌邑王論王吉請改正尚主之禮論單于朝位論石顯論赦論矯制立功論漢治迹論經籍論王商論立定陶王昕為太子論成帝贊罷司空官論州牧論阿保乳母論原涉論鄭崇論哀帝贊著述申鑒大略又又漢魏六朝百三家集卷十七目録欽定四庫全書漢魏六朝百三家集卷十七明張溥輯荀悅集序漢紀序凡漢紀十二世十一帝通王莽二百二十九年一祖三宗髙祖定天下孝惠髙后值國家無事百姓安集太宗升平世宗建功中宗治平昭景稱治元成哀平歷世陵遲莽遂篡國也凡祥瑞黃龍見鳳凰集麒麟臻神馬出神鳥翔神雀集白虎仁獸獲寶鼎升寶磬神光見山稱萬嵗甘露降芝草生嘉禾茂玄稷降醴泉涌木連理凡災異大者日蝕五十六地震十六天開地裂五星集于東井各一太白再經天星孛二十四山崩三十四隕石十一星隕如雨二星晝見三火災二十四河漢水大泛溢為人害十河泛一冬雷五夏雪三冬無氷二天雨血雨草雨魚死人復生男子化為女子嫁為人婦生子枯木更生大石自立建安元年上巡省幸許昌以鎮萬國外命元輔征討不庭內齊七政允亮聖業綜練典籍博覽傳記其三年詔給事中祕書監荀悅抄撰漢書略舉其要假以不直尚書給紙筆虎賁給書吏悅於是約集舊書撮序表志總為帝紀通比其事例繫年月其祖宗功勳先帝事業國家綱紀天地災異功臣名賢竒策善言殊德異行法式之典凡在漢書者本末體殊大略粗舉其紀傳所遺闕者差少而表志勢有所不能盡繁重之語凡所行之事出入省要刪略其文凡為三十卷數十餘萬言作為帝紀省約易習無妨本書有便於用其旨云爾會悅遷為侍中其五年書成乃奏記云四百有一十六載謂書奏之嵗嵗在庚辰昔晉之乘楚之檮杌魯之春秋虞夏商周之書其揆一也皆古之令典立之則成其法棄之則墜於地瞻之則存忽焉則廢故君子重之漢書紀其義同矣凡漢紀有法式焉有監戒焉有廢亂焉有持平焉有兵略焉有政化焉有休祥焉有災異焉有華夏之事焉有四夷之事焉有常道焉有權變焉有策謀焉有詭説焉有術藝焉有文章焉斯皆明主賢臣命世立業羣后之盛勳髦俊之遺事是故質之事實而不誣通之萬方而不泥可以興可以治可以動可以靜可以言可以行懲惡而勸善奬成而懼敗兹亦有國之常訓典籍之淵林雖云撰之者陋淺而本末存焉爾故君子可觀之矣又序昔在上聖唯建皇極經緯天地觀象立法乃作書契以通宇宙揚于王庭厥用大焉先王以光演大業肆於時夏亦惟翼翼以監厥後永世作典夫立典有五志焉一曰達道義二曰彰法式三曰通古今四曰著功勳五曰表賢能於是天人之際事物之宜粲然顯著罔不能備矣世濟其軌不殞其業損益盈虛與時消息雖臧否不同其揆一也是以聖上穆然惟文之恤瞻前顧後是紹是維臣悅職監祕書攝官承乏秖奉明詔竊惟其宜謹約撰舊書通而敘之總為帝紀列其年月比其時事撮要舉凡存其大體旨少所缺務從省約以副本書以為要紀未克厥中亦各其志如其得失以俟君子焉後序凡漢紀其稱年本紀表志傳者書家本語也其稱論者臣悅所論粗表其大事以參得失以廣視聽也惟漢四百一十有六載皇帝撥亂反正統武興文永惟祖宗之洪業思光啓于萬嗣闡綜大猷命立國典以及羣籍於是乃作考舊通連體要以述漢紀易稱多識前言往行以畜其德詩云古訓是式中興以前一時之事明主賢臣規模法則得失之軌亦足以監矣撰漢書百篇以綜往事庶幾來者亦有監乎此其辭曰茫茫上古結繩而治書契爰作典謨云備明德惟馨光於萬祀其在中葉實有陶唐丕顯伊則配天惟明蕩蕩厥猷有煥其章至于有周對日重光於赫大漢統辟元功穆穆惟秪二祖六宗明明皇帝纂承洪緒遭國閔凶困於荼蓼實天生德應運建主矯矯俊臣惟國作輔綏我思成有德思祜撥亂反正大建惟序武功既列乃替斯文禮惟前軌命我小臣爰著典籍以立舊勳綜往昭來永監後昆侍中悅上論贊酈食其謀立六國論夫立策決勝之術其要有三一曰形二曰勢三曰情形者言其大體得失之數也勢者言其臨時之宜也進退之機也情者言其心志可否之意也故策同事等而功殊者何三術不同也初張耳陳餘説陳涉以復六國自為樹黨酈生亦説漢王所以説者同而得失異者陳涉之起也天下皆欲亡秦而楚漢之分未有所定時天下未必欲亡項也且項羽率從六國攻滅強秦之時勢則不能矣故立六國於陳涉所謂多巳之黨而益秦之敵也且陳涉未能専天下之地也所謂取非其有以與人行虛惠而獲實福也立六國於漢王所謂割已之有以資敵設虛名而受實禍也此同事而異形也及宋義待秦趙之斃與昔卞莊刺虎同説者也施之戰國之時鄰國相攻無臨時之急則可也戰國之立其日久矣一戰勝敗未必以存亡也其勢非能急於亡敵國也進乘利退自保故纍力待時乘敵之斃其勢然也今楚趙所起其與秦勢不並立安危之機呼吸成變進則成功退則受禍此同事而異勢者也伐趙之役韓信軍於泜水之上而趙不能敗彭城之難漢王戰於濉水之上士卒皆赴入濉水而楚兵大勝何則趙兵出國迎戰見可而進知難而退懷內顧之心無必死之計韓信軍孤於水上士卒必死無有二心此信之所以勝也漢王深入敵國飲酒髙會士卒逸豫戰心不固楚以強大之威而喪其國都項羽自外而入士卒皆有憤激之氣救敗赴亡之急以決一旦之命此漢之所以敗也且韓信選精兵以守而趙以內顧之士攻之項羽選精兵以攻而漢以怠惰之卒應之此同事而異情者也故曰權不可預設變不可先圗與時遷移應物變化設策之機也家令説太公論孝經云故雖天子必有尊也言有父也王者必父事三老以示天下所以明有孝也無父猶設三老之禮况其存者乎孝莫大於嚴父故后稷配天尊之至也禹不先鯀湯不先契文王不先不窋古之道子尊不加於父母家令之言於是過矣貫高張敖論貫髙首為亂謀殺主之賊雖能證明其王小亮不塞大逆私行不贖公罪春秋之義大居正罪無赦趙王掩高之逆心失將而必誅之義使髙得行其謀不亦殆乎無藩國之義減死可也侯之過歟高祖讚髙祖起於布衣之中奮劒而取天下不繇唐虞之禪不階湯武之王龍行虎變率從風雲征亂伐暴廓清帝宇八載之間海內克定遂何天之衢登建皇極上古已來書籍所載未嘗有也非雄俊之才寬明之略厯數所授神祗所相安能致功如此夫帝王之作必有神人之助非德無以建業非命無以定衆或以文昭或以武興或以聖立或以人崇焚魚斬蛇異功同符豈非精靈之感哉書曰天工人其代之易曰湯武革命順乎天而應乎人其斯之謂乎故觀秦項之所亡察大漢之所興得失之驗可見於兹矣太史公曰夏政忠政忠之弊野故殷承之以敬以敬之弊鬼故周承之以文以文之弊薄救薄莫若忠三王之道周而復始周秦之間可謂文弊秦不改文酷刑漢承秦弊得天統矣立張氏為惠帝后論夫婦之際人道之大倫也詩稱刑于寡妻至于兄弟以御于家邦易稱正家道家道正而天下大定矣姊子而為后昏於禮而黷於人情非所以示天下作民則也羣臣莫敢諫過哉列侯論諸侯之制所繇來尚矣易曰先王建萬國親諸侯孔子作春秋為後世法譏世卿不改世侯昔者聖王之有天下非所以自為所以為民也不得専其權利與天下同之唯義而已無所私焉封建諸侯各世其位欲使親民如子愛國如家於是為置賢卿大夫考績黜陟使有分土而無分民而王者總其一統以御其政故有暴禮於其國者則民叛於下王誅加於上是以計利慮害勸賞畏威各兢其力而無亂心及至天子失道諸侯正之王室微弱則大國輔之雖無道不得虐於天下賢人君子有所周流上下左右皆相夾輔凡此所以輔相天地之宜以左右民者也故民主兩利上下俱便是則先王之所以能永有其世也然古之建國或小或大監前之弊變而通之夏殷之時蓋不過百里故諸侯微而天子強桀紂得肆其虐紂脯鄂侯而醢九侯以文王之上德不免於羑里周承其弊故大國方五百里所以崇寵諸侯而自抑損也至其末流諸侯強大更相侵伐周室卑微禍亂用作秦承其弊不能正其制以求其中而遂廢諸侯改為郡縣以一威權以専天下其意主以自為非以為民深淺之慮德量之殊豈不逺哉故秦得擅其海內之弊無所拘忌肆行奢淫暴虐天下然十四年而滅亡故人主失道則天下遍被其害百姓一亂則魚爛土崩莫之匡救賢人君子復無息肩衆庶無所遷徙此民主俱害上下兩危漢興承周秦之弊故兼而用之六王七國之難作者誠失之於強大非諸侯治國之咎其後遂皆郡縣治民而絶諸侯之權矣當時之制未必百王之法也祿制論先王之制祿也下足以代耕上足以充祀故食祿之家不與下民爭利所以厲其公義塞其私心其或犯逾之者則繩以政法是以君子勸慕小人無怨若位茍祿薄外而不充憂匱是恤所求不贍則私利之智萌矣放而聽之則貪利之心濫矣以法繩之則下情怨矣故位必稱德祿必稱爵故一物而不稱則亂之本也今漢之賦祿薄而吏非員者衆在位者貪於財産規奪官民之利則殖貨無厭奪民之利不以為恥是以清節毁傷公義損缺富者比公室貧者匱朝夕非所為濟俗也然古今異制爵賦不同祿亦如之雖不及古度時有可嘉也災異論凡三光精氣變異此皆隂陽之精也其本在地而上發於天也政失於此則變見於彼猶影之象形響之應聲是以明王見之而悟勑身正已省其咎謝其過則禍除而福生自然之應也詩云上天之載無聲無臭其詳難得而聞矣豈不然乎災祥之報或應或否故稱洪範咎徴則有堯湯水旱之災稱消災復異則有周宣雲漢寧莫我聽稱易積善有慶則有顔冉夭疾之凶善惡之效事物之類變化萬端不可齊一是以視聽者惑焉若乃稟其自然之數揆性命之理稽之經典挍之古今乘其三勢以通其精撮其兩端以御其中參伍以變錯綜其紀則可以髣佛其略矣夫事物之性有自然而成者有待人事而成者有失人事不成者有雖加人事終身不可成者是謂三勢凡此三勢物無不然以小知大近取諸身譬之疾病不治而以瘳者有治之則瘳者有不治則不瘳者有雖治而終身不可愈者豈非類乎昔虢太子死扁鵲治而生之鵲曰我非能治死為生也能使可生者生耳然太子不遇鵲亦不生矣若夫膏肓之疾雖醫和亦不能治矣故孔子曰死生有節又曰不得其死然又曰幸而免死生有節其正理也不得其死未可以死而死幸而免者可以死而不死凡此皆性命三勢之理推此以及教化則亦如之何哉人有不教而自成者待教而成者無教化則不成者有加教化而終身不可成者故上智下愚不移至於中人可上下者也是以推此以及天道則亦如之災祥之應無所謬矣故堯湯水旱者天數也洪範咎徴人事也魯僖澍雨乃可救之應也周宣旱應難變之勢也顔冉之凶性命之本也猶天回日轉大運推移雖日遇禍福亦在其中矣今人見有不移者因曰人事無所能移見有可移者因曰無天命見天人之殊逺者因曰人事不相干知神氣流通者因曰天人共事而同業此皆守其一端而不究終始易曰有天道焉有地道焉有人道焉言其異也兼三才而兩之言其同也故天人之道有同有異據其所以異而責其所以同則成矣守其所以同而求其所以異則弊矣孔子曰好智不好學其弊也蕩末俗見其紛亂事變乖錯則異心橫出而失其所守于是放蕩反道之論生而誣神非聖之義作夫上智下愚雖不移而教之所以移者多矣大數之極雖不變然人事之變者亦衆矣且夫疾病有治而未瘳瘳而未平平而未復教化之道有教而未行行而未成成而有敗故氣類有動而未應應而未終終而有變遲速深淺變化錯于其中矣是故參差難得而均矣天地人物之理莫不同之凡三勢之數深不可識故君子盡心力焉以任天命易曰窮理盡性以至於命其此之謂乎高后贊本紀稱孝惠高后之時海內得離戰爭之苦君臣俱無為故惠帝拱已髙后女主制政不出房闥而天下宴然刑罰罕用民務稼穡衣食滋殖及福祚諸吕大過漸至縱橫殺戮鴆毒生於豪強賴朱虛周陳惟社稷之重顧山河之誓殱討篡逆匡救漢祚豈非忠哉王陵之徒精潔心過於丹青矣時務論論曰聖王之制務在綱紀明其道義而已矣若夫一切之計必推其公義度其時宜不得已而用之非有大故則不由之立制度論先王立政以制為本三正五行服色厯數承天之制經國序民列官布職疆理品類辨方定物人倫之度自上已下降殺有序上有常制則政不頗下有常制則民不二官無淫度則事不悖民無淫制則業不廢貴不専寵富不獨奢民雖積財無所用之故世俗易足而情不濫姦究不興禍亂不作此先王所以綱紀天下統成大業立德興功為政之德也故曰謹權量審法度修廢官四方之政行矣本傳曰先王之制自天子公侯卿大夫已下至於抱關擊柝者其爵祿奉養死生之制各有差别小不得僭大賤不得逾貴夫然故上下有序而民志悉定于是裂土地之宜教之種殖畜養以時而用之有節草木未落斤斧不入於山林豺獺未祭羅網不布於野澤鷹隼未擊罾弋不施於蹊隧既順時而取物然而山不槎孽田不伐夭豚魚麛卵咸有常禁所以順時宣氣蕃阜庶物畜足功用如此之備然後從四民因其土宜任其智力安其居樂其業甘其食而美其服欲寡而事節財足而不爭及至周室道衰禮法隳壞諸侯刻桷丹楹大夫山節藻梲其流至於士庶莫不離制度稼穡之人少商賈之人多榖不足而貨有餘陵遲至於桓文之後禮義大壞上下相冒國異政家殊俗奢靡不制僭差無極於是商通難得之貨工作無用之器士設反道之行以追時好而取世資偽民倍實而要名姦夫犯難而求利篡殺取國者為王公劫奪成家者為侯伯禮義不足以制君子刑戮不足以威小人富者木土被文繡犬馬餧菽粟貧者短褐不完食疏飲水俱為編户齊民而以財力相窘雖為僕虜猶無愠色故夫飾變詐為姦軌自足乎一世之間守道隨理不免乎飢寒之患其化自上興繇法度之無限也故易曰君以財成輔相天地之宜以左右民備物致用立象成器以為天下利立制度之謂也除田租古者什一而稅以為天下之中正也今漢氏或百一而稅可謂鮮矣然豪強富人占田逾侈輸其賦太半官收百一之稅民收太半之賦官家之惠優於三代豪強之暴酷於亡秦是上惠不通威福分於豪強也今不正其本而務除租稅適足以資富強夫土地者天下之本也春秋之義諸侯不得専封大夫不得専地今豪民占田或至數百千頃富過王侯是自専封也買賣繇巳是自專地也孝武時董仲舒嘗言宜限民占田至哀帝時乃限民占田不得過三十頃雖有其制卒不得施行然三十頃有不平矣且夫井田之制宜於民衆之時地廣民稀勿為可也然欲廢之於寡立之於衆土地既富列在豪強卒而規之並有怨心則生紛亂制度難行繇是觀之若髙帝初定天下及光武中興之後民人稀少立之易矣就未悉備井田之法宜以口數占田為立科限民得耕種不得買賣以贍民弱以防兼并且為制度張本不亦宜乎雖古今異制損益隨時然紀綱大略其致一也馮唐論以孝文之明也本朝之治百寮之賢而賈誼見逐張釋之十年不見省用馮唐白首屈於郎署豈不惜哉夫以綘侯之忠功存社稷而猶見疑不亦痛乎夫知賢之難用人不易忠臣自古之難也雖在明世且猶若兹而况亂君暗主者乎然則屈原赴湘水子胥鴟夷於江安足恨哉周勃質朴忠誠高祖以為安劉氏者必勃也既定漢室建立明主眷眷之心豈有異哉狼狽失據塊然囚執俯首撫襟屈於獄吏豈不愍哉夫忠臣之於其主猶孝子之於其親盡心焉盡力焉進而喜非貪位退而憂非懷寵結志於心慕戀不已進得及時樂行其道故仲尼去魯曰遲遲而行孟軻去齊三宿而後出境彼誠仁聖之心夫賈誼過湘水弔屈原惻愴慟懷豈徒忿怨而已哉與夫茍患失之者異類殊意矣及其傅梁王梁王薨哭泣而從死豈可謂不忠乎然人主不察豈不哀哉及釋之屈而思歸馮唐困而後達有可悼也此忠臣所以泣血賢俊所以傷心也文帝遺詔短喪論論曰書云高宗諒暗三年不言孔子曰古之人皆然三年之喪天下之通喪繇來者尚矣今而廢之以虧大化非禮也雖然以國家之重慎其權柄雖不諒暗存其大體可也文帝贊讚曰本紀稱孝文皇帝宫室苑囿車馬御服無所增益有不便輒弛以利民身衣弋綈慎夫人雖幸衣不曳地幃帳無文繡以示敦朴愛費百金不為露臺及治霸陵皆瓦器不得以金銀銅錫為飾因其山不起墳南越王尉他自立為帝以德懷之胸奴背約令守邊備不發兵深入無動勞百姓吳王詐病不朝賜以几杖羣臣袁盎等諌説雖切常假借之張武等受賂金錢重加賞賜以愧其心專務以德化民是以海內殷富興於禮義斷獄數百幾致刑措登顯洪業為漢太宗甚盛矣哉揚雄有言文帝親屈帝尊以申亞夫之軍令曷為不能用頗牧彼將有所感激云爾景帝賜江都王非天子旌旗論江都王賜天子旌旗過矣夫唯盛德元功有天子之勳乃受異物則周公其人也凡功者有賞而巳孔子曰必也正名乎唯器與名不可以假人人君之所司也夫名設於外實應於內事制於始志成於終故王者慎之髙帝封王侯約論高皇帝刑白馬而盟曰非劉氏不王非有功不侯不如約者當天下共擊之是教下犯上而興兵亂之階也若後人不修是盟約不行也書曰法惟上行不惟下行若以為典未可通也封胸奴徐盧等論論曰春秋之義許夷狄者不一而足也若以利害繇之則以功封其逋逃之臣賞有等差可無列土矣三遊論世有三遊德之賊也一曰遊俠二曰遊説三曰遊行立氣勢作威福結私交以立強於世者謂之遊俠飾辨辭設詐謀馳逐於天下以要時勢者謂之遊説色取仁以合時好連黨類立虛譽以為權利者謂之遊行此三遊者亂之所繇生也傷道害德敗法惑世失先王之所慎也國有四民各修其業不繇四民之業者謂之姦民姦民不生王道乃成凡此三遊之作生於季世周秦之末尤甚焉上不明下不正制度不立綱紀廢弛以毁譽為榮辱不核其真以愛憎為利害不論其實以喜怒為賞罰不察其理上下相冒萬事乖錯是以言論者計薄厚而吐辭選舉者度親疏而舉筆善惡謬於衆聲功罪亂於王法然則利不可以義求害不可以道避也是以君子犯禮小人犯法奔走馳騁越職潛度飾華廢實競趨時利簡父兄之尊而崇賓客之禮薄骨肉之恩而篤朋友之愛忘修身之道而求衆人之譽割衣食之業以供饗宴之好苞苴盈於門庭聘問交於道路書記繁於公文私務衆於官事於是流俗成矣而正道壞矣遊俠之本生於武毅不撓久要不忘平生之言見危授命以救時難而濟同類以正行之者謂之武毅其失之甚者至於為盜賊也遊説之本生於使乎四方不辱君命出境有可以安社稷利國家則専對解結辭之繹矣民之莫矣以正行之者謂之辨智其失之甚者至於為詐紿徒衆矣遊行之本生於道德仁義泛愛容衆以文會友和而不同進德及時樂行其道以立功業於世以正行之者謂之君子其失之甚者至於因事害私為姦軌矣其相去殊逺豈不哀哉故大道之行則三遊廢矣是以聖王在上經國序民正其制度善惡要于公罪而不淫於毁譽聽其言而責其事舉其名而指其實故實不應其聲者謂之虛情不覆其貌者謂之偽毁譽失其真者謂之誣言事失其類者謂之罔虛偽之行不得設誣罔之辭不得行有罪惡者無僥幸無罪過者不憂懼請謁無所行貨賂無所用民志定矣民志既定於是先之以德義示之以好惡奉業勸功以用本務不求無益之物不畜難得之貨絶靡麗之飾遏利欲之巧則淫流之民定矣而貪穢之俗清矣息華文去浮辭禁偽辨絶淫智放百家之紛亂一聖人之至道則虛誕之術絶而道德有所定矣尊天地而不瀆敬鬼神而逺之除小忌去淫祀絶竒怪正人事則妖偽之言塞而性命之理得矣然後百姓上下皆反其本人人親其親尊其尊修其身守其業於是養之以仁惠文之以禮樂則風俗定而大化成矣丞相封侯論丞相始拜而封非典也夫封必以功不聞以位孔子曰如有可譽必有所試矣譽必待試况於賞乎易曰鼎折足覆公餗其刑渥凶若不勝任覆亂鼎實刑將加之况於封乎神怪論易稱有天道焉有地道焉有人道焉各當其理而不相亂也過則有故氣變而然也若夫大石自立僵栁復起此形神之異也男子化為女死人復生此含氣之異也鬼神髣佛在於人間言語音聲此精神之異也夫豈形神之怪異哉各以類感因應而然善則為瑞惡則為異瑞則生吉惡則生禍精氣之際自然之符也故逆天之理則神失其節而妖神妄興逆地之理則形失其節而妖形妄生逆中和之理則含血失其節而妖物妄生此其大旨也若夫神君之類精神之異非求請所能致也又非可以求福而禳災矣且其人不自知其所然而然况其能為神乎凡物之怪亦皆如之春秋傳曰作事不時怨讟起於民則有非言之物而言者當武帝之世賦役煩衆民力凋弊加以好神仙之術迂誕妖怪之人四方並集皆虛而無實故無形而言者至矣於洪範言僭則生時妖此蓋怨讟所生時妖之類也故通於道正身以應萬物則精神形氣各返其本矣斬任安論論曰任安之斬也是開後人遂惡而無變計也易曰不逺復無祇悔元吉昌邑王論昌邑之廢豈不哀哉書曰殷王紂自絶於天易曰斯其所取災言自取之也故曰有六主焉有王主有治主有存主有衰主有危主有亡主體正性仁心明志固動以為人不以為已是謂王主尅已恕躬好問力行動以從義不以縱情是謂治主勤事守業不敢怠荒動以先公不以先私是謂存主悖逆交爭公私並行一得一失不純道度是謂衰主情過於義私多於公制度殊限政令失常是謂危主親用讒邪放逐忠賢縱情遂欲不顧禮度出入遊放不拘儀禁賞賜行私以越公用忿怒施罰以逾法制遂非文過知而不改忠信擁塞直諫誅戮是謂亡主故王主能興平治主能行其政存主能保其國衰主遭無難則庶幾得全有難則殆危主遇無難則幸而免有難則亡亡主必亡而已矣夫亡主為人而後已利焉治主從義而後情得焉存主先公而後私立焉故遵亡主之行而求存主之福行危主之政而求治主之業蹈衰主之迹而求王主之功不可得也夫為善之至易莫易於人主立業之至難莫難於人主至福之所隆莫大於人主至禍之所加莫深於人主夫行至易以立至難便計也興至福而隆至禍厚實也其要不逺在乎所存而已矣雖在下才可以庶幾然迹觀前後中人左右多不免於亂亡何則沈於宴安誘於諂導放於情欲不思之咎也仁逺乎哉存之則至是以昔者明王戰戰兢兢如履虎尾勞謙日昃夙夜不怠誠達於此理也故有六主亦有六臣有王臣有良臣有直臣有具臣有嬖臣有佞臣以道事君匪躬之故達節通方立功興化是謂王臣忠順不失夙夜匪懈順理處和以輔上德是謂良臣犯顔逆意抵失不撓直諫遏非不避犯罪是謂直臣奉法守職無能往來是謂具臣便辟茍容順意從諛是謂嬖臣傾險讒害誣下惑上専權擅寵唯利是務是謂佞臣或有君而無臣或有臣而無君同善則治同惡則亂雜則交爭故明主慎所用也六主之有輕重六臣之有簡易其存亡成敗之機在於是矣可不盡而深覽乎王吉請改正尚主之禮論尚公主之制人道之大倫也昔堯降釐二女於媯汭嬪於虞易曰帝乙歸妹以祉元吉春秋稱王姬歸於齊古之達禮也男替女凌則淫暴之變生矣禮自上降則昏亂於下者衆矣三綱之首可不慎乎夫成大化者必稽古立中務以正其本也凡吉所言古之道也單于朝位論春秋之義王者無外欲一於天下也書曰西戎即序言皆順從其序也道里遼逺人物介絶人事所不至血氣所不沾不告諭以文辭故正朔不及禮義不加非導之也其勢然也王者必則天地天無不覆地無不載故盛德之主則亦如之九州之外謂之藩國蠻夷之君列於五服詩云自彼氐羌莫敢不來王故要荒之地必奉王貢若不供職則有辭讓號令加焉非敵國之謂也故逺不間親狄不亂華輕重有序賞罰有章此先王之大禮故舞四夷之樂於四門之外不備其禮故不見於先祖獻其志意音聲而已望之欲待以不臣之禮加之以王公之上僭度失序以亂天常非禮也若以權時之宜則異論矣時蕭望之議故云石顯論夫佞臣之惑君主也甚矣故孔子曰逺佞人非但不用而巳乃逺而絶之隔塞其源戒之極也察觀其言行未必合於道者必此人也此亦察人情之一端也偽生於多巧邪生於多欲是以君子不尚也禮與其奢也寧儉事與其煩也寧略言與其華也寧質行與其綵也寧朴孔子曰政者正也夫要道之本正已而巳矣平直真實者正之主也故德必核其真然後授其位能必核其真然後授其事功必核其真然後授其賞罪必核其真然後授其刑行必核其真然後貴之言必核其真然後信之物必核其真然後用之事必核其真然後修之一物不稱則榮辱賞罰從而繩之故衆正積於上萬事實於下先王之道如斯而巳矣赦論夫赦者權時之宜非常典也漢興承秦兵革之後大愚之世比屋可刑故設三章之法大赦之令蕩滌穢流與民更始時勢然也後世承業襲而不革失時宜矣若惠文之世無所赦之若孝景之時七國皆亂異心並起姦邪非一及武帝末賦役繁興羣賊並起加太子之事巫蠱之禍天下紛然百姓無聊人不自安及光武之際撥亂之後如此之比宜無赦矣君臣失禮政教陵遲犯法者衆亡命流竄而不擒獲前後相積布滿山野勢窮刑蹙將為羣盜或刑政失中猛暴橫作怨枉繁多天下憂慘羣役姦昏難得而治承此之後宜為赦也或赦大逆或赦輕罪或赦一方或赦天下期於應變濟時也矯制立功論成其功義足封追録前可也春秋之義毁泉臺則惡之舍中軍則善之各繇其宜也夫矯制之事先王之所慎也不得已而行之若矯大而功小者罪之可也矯小而功大者賞之可也功過相敵如斯而已可也權其輕重而為之制宜焉漢治迹論自漢興以來至於兹祖宗之治迹可得而觀也髙祖開建大業統辟元功度量規矩不可尚也時天下初定庶事草創故韶夏之音未有聞焉孝文皇帝克已復禮躬行玄默遂至升平而刑罰幾措時稱古典未能悉備制度玄雅禮樂之風闕焉故太平之功不興孝武皇帝規恢萬世之業安固後嗣之基內修文學外耀武威延天下之士濟濟盈朝興事創制無所不施先王之風燦然復存矣然猶好其文不盡其實發其始不要其終奢侈無限窮兵極武百姓空竭萬民疲弊當此之時天下騷動海內無聊而孝文之業衰矣孝宣皇帝任法審刑綜核名實聽斷精明事業修理下無隱情是以功光前世號為中宗然不甚用儒術孝元皇帝從諌如流下善齋肅賓禮舊老優容寬直其仁心文德足以為賢主矣而佞臣石顯用事隳其大業明不照姦決不斷惡豈不惜哉昔齊桓公任管仲以霸任豎刁以亂一人之身唯所措之夫萬事之情常立於得失之原治亂榮辱之機可不惜哉楊朱哭多岐墨翟悲素絲傷其本同而末殊孔子曰逺佞人詩云取彼讒人投畀豺虎疾之深也若夫石顯可以痛心泣血矣豈不疾之哉初宣帝任刑法元帝諫之勸以用儒術宣帝不聽乃歎曰亂我家者必太子也故凡世之論政治者或稱教化或稱刑法或言先教而後刑或言先刑而後教或言教化宜詳或曰教化宜簡或曰刑法宜略或曰刑法宜重此處有衍文已刪去皆引為政之一方未究治體之終始聖人之大德也聖人之道必則天地制之以五行以通其變是以博而不泥夫德刑並行天地常道也先王之道上教化而下刑法右文德而左武功此其義也或先教化或先刑法所遇然也撥亂抑強則先刑法扶弱綏新則先教化安平之世則刑教並用大亂無教大治無刑亂之無教勢不行也治之無刑時不用也教初必簡刑始必略則其漸也教化之隆莫不興行然後責備刑法之定莫不避罪然後求密未可以備謂之虐教未可以密謂之峻刑虐教傷化峻刑害民君子弗繇也設必違之教不量民力之未能是陷民於惡也故謂之傷化設必犯之法不度民情之不堪是陷民于罪也故謂之害民莫不興行則豪毛之善可得而勸也然後教備莫不避罪則纎芥之惡可得而禁也然後刑密故孔子曰不嚴以蒞之則民不敬也嚴以蒞之動之不以禮未善也是言禮刑之並施也吾末如之何言教之不行也可以勝殘去殺矣言刑之不用也周禮曰治新國用輕典略其初也春秋之義貶纎芥之惡備至密也孔子曰行有餘力則可以學文簡於始也繪事後素成有終也夫通於天人之理達於變化之數故能達於道故聖人則天賢者法地考之天道參之典經然後用於正矣經籍論經稱立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義隂陽之節在於四時五行仁義之大體在於三綱六紀上下咸序五品有章淫則荒越民失其性於是在上者則天之經因地之義立度宣教以制其中施之當時則為道德垂之後世則為典經皆所以總統綱紀崇立王業及至末俗異端並生諸子造誼以亂大倫於是微言絶羣議繆焉故仲尼畏而憂之詠歎斯文是聖人篤文之至也若乃季路之言何必讀書然後為學棘子成曰君子質而巳矣何以文為夫潛地窟者而不覩天明守冬株者而不識夏榮非通照之術也然博覽之家不知其穢兼而善之是大田之莠與苗並興則良農之所悼也質朴之士不擇其美兼而棄之是崑山之玉與石俱捐則卞和之所痛也故孔子曰博學於文約之以禮亦可以弗畔矣夫孝武皇帝時董仲舒推崇孔氏抑絀百家至劉向父子典校經籍而新義分方九流區别典籍益彰矣自非至聖之崇孰能定天下之疑是以後賢異心各有損益中興之後大司農鄭衆侍中賈逵各為春秋左氏傳作解注孝桓帝時故南郡太守馬融著易解頗生異説及臣悅叔父故司徒爽著易傳據爻象承應隂陽變化之義以十篇之文解説經意繇是兖豫之言易者咸傳荀氏學而馬氏亦頗行於世爽又著詩傳皆附正義無他説又去聖久逺道義難明而古之尚書毛詩左氏春秋周官通人學者多尚好之然希各得立於學官也王商論王商言水不至非以見智也非以傷鳳也將欲忠主安民事不得已而鳳以為慨恨馮婕妤之當熊非欲見勇也非欲求媚也非以髙左右也惻怛於心將以救上而傳昭儀以為隙皆至於死真可痛乎夫獨智不容於世獨行不畜於時是以昔人所以自退也雖退猶不得自免是以離世深藏以天之高而不敢舉首以地之厚而不敢投足詩云謂天蓋高不敢不局謂地蓋厚不敢不蹐哀今之人胡為虺蜴本不敢立於人間况敢立於朝乎自守猶不免患况敢守於時乎無過猶見誣枉而况敢有罪乎閉口而獲誹謗况敢直言乎雖隱身深藏猶不得免是以寧武子佯愚接輿為狂困之至也人無狂愚之慮者則不得自安於世是以屈原怨而自沈鮑焦憤而矯死悲之甚也雖死猶懼形骸之不深魂神之不逺故徐衍負石入海申屠狄蹈甕之河痛之極也悲夫以六合之大匹夫之微而一身無所容焉豈不哀哉是以古人畏患茍免以計安身撓直為曲斫方為圎穢素絲之潔摧亮直之心是以羊舌職受盜於王室蘧伯玉可卷而懷之以死易生以存易亡難乎哉立定陶王昕為太子論聖人立制必有所定所以防忿爭一統序也春秋之義立嫡以長立子以貴是以言嫡無二也貴有常也以弟及兄則貴有常矣兄弟之子非一也不可以為典雖立其長猶非正也且兄弟近而親所以繼父也兄弟子疏而卑所以承亡也俱非正統捨親取疏廢父立子非順也以弟繼父近於義矣春秋傳曰太子亡則立母弟無則立長立均以順義均則卜之道也成帝讃讃曰本紀稱孝成帝善修容儀升車正立不內顧不疾言不親指臨朝淵默尊嚴若神可謂穆穆天子之容貌也博覽古今容受直言公卿稱職威儀可述遭世承平上下和睦然沈於酒色趙氏內亂外家擅朝言之可為於邑建始已後王氏始執國命迄於哀平莽遂篡位蓋其威福所繇來漸矣劉向朱雲之忠信明矣若得而用之福祚未已張禹不吐直言佞於垂死亦可痛哉罷司空官論論曰丞相三公之官而數變易非典也初丞相秦之制本次國命卿故置左右丞相無三公之官詩云夙夜匪懈以事一人一人者謂天子也自上已下必參而成位易曰鼎足以喻三公所以參事統職立官定制三公蓋其宜也州牧論州牧數變易非典也古者諸侯之國百里而已故易曰震驚百里以象諸侯之國也夫國小人衆易統也古諸侯皆久其位視民如子愛國如家於是建諸侯之賢者以為牧故以考績黜陟不統其政不御其民惠無所績權無所并故牧伯之位宜合古也惟周制為不然大國不過五百里而公侯伯子男以次小焉今漢廢諸侯之制以郡縣治民者本以強幹弱枝一統于上使權柄不分于下也今之州牧號為萬里總郡國威尊勢重與古之牧伯同號異勢當周之末天下戰國十有餘而周室寥矣今牧伯之制是近於戰國之迹而無治民之實刺史令為監御史出督州郡而還奏事可矣阿保乳母論夫內寵嬖近阿保御豎之為亂自古所患故尋及之李尋上言也孔子曰唯女子與小人為難養性不安於道智不周於物其所以事上也唯欲是從唯利是務飾便假之容供耳目之好以姑息為忠以茍容為智以伎巧為材以佞諛為美而親近於左右玩習於朝夕先意承旨因間隨隙以惑人主之心求贍其私欲慮不逺圖不恤大事人情不能無懈怠或忽然不察其非而從之或知其非不忍割之或以為小事而聽之或心迷而篤信之或眩曜而不疑之其事皆始於纎微終於顯著反亂𢎞大其為害深矣其傷德甚矣是以明主唯大臣是任惟正直是用內寵便辟請求之事無所聽焉事有損之而益益之而損物有善而不居惡而不可避甘醴有鴆毒藥酒有治病是以君子以道折中不肆心焉不縱體焉惟義而後已原涉論天子建國諸侯立家自卿大夫已下至於士庶人為有等差是以民服其上而下無覬覦孔子曰天下有道政不在大夫百官有司奉治令以修所職失職有誅侵官有罪夫然故上下相順庶事治焉周室既衰禮樂征伐自諸侯出桓文之後大夫世權陪臣執國命陵遲以至於戰國合從連衡易政爭強繇此列國公子魏有信陵趙有平原楚有春申齊有孟嘗皆藉王公之勢競為遊俠雞鳴狗盜無不賓禮而趙相虞卿棄國捐君以周窮交拔魏齊之厄信陵無忌竊符矯命殺將專師以赴平原之急皆取重諸侯顯名天下扼腕遊談者以四豪為稱首於是背親死黨之義成守職奉上之道廢矣及漢興禁網疏濶未之匡正是以代相陳豨從車千乘而吳濞淮南皆有賓客以千數外戚魏其武安之徒皆競逐於京師布交遊于天下劇孟郭解之徒皆馳騖於閭閻權行州郡力折公卿衆庶覬其名迹榮而慕之雖陷刑辟自為殺身成名若季路仇牧死而不悔也故曾子曰上失其道民散久矣非明王在上示之以好惡齊之以禮法民何繇知禁而反正乎古之正法五伯三王之罪人也六國五伯之罪人也夫四豪六國之罪人也况郭解之倫以匹夫之細竊生殺之權罪已不容於誅矣然觀其溫良泛愛賙急謙退不伐亦有絶異之資惜乎不入道德茍放縱於末流殺身亡宗非不幸也自魏其武安淮南之徒天子切齒至於衛霍改節然郡國豪傑處處皆有京師親戚冠蓋相望亦古今之常莫足言者唯王氏五侯賓客為盛而樓護為師諸公之間陳遵為雄桀閭里之俠獨涉為魁首鄭崇論夫臣之所以難言者何也其故多矣言出於口則咎悔及身舉過揚非則有干忤之禍勸勵教誨則有刺上之譏下言而當則以為勝已不當賤其鄙愚先已而明則惡其奪已之明後已而明則以為順從違下從上則以為諂諛違上從下則以為雷同與衆共言則以為專美言而淺露則簡而薄之深妙𢎞逺則不知而非之特見獨知則衆以為蓋已雖是而不見稱與衆同之則以為附隨雖得之不以為功據事而盡理則以為専必謙讓不爭則以為易窮言不盡則以為懷隱盡説竭情則為不知量言而不效則受其怨責言而事效則以為固當或利於上不利於下或便於左不便於右或合於前而忤於後或應事當理決疑定功超然獨見值所欲聞不害上下無妨左右言立䇿成終無咎悔若此之事百不一遇其知之所見萬不及一也且犯言致罪下之所難言也怫旨忤情上之所難聞也以難言之臣干難聞之主以萬不及一之時求百不一遇之知此下情所以不上通非但君臣而凡言百姓亦如之是乃仲尼所以憤歎豫欲無言也哀帝讚讚曰本紀稱孝哀自為藩王及太子文辭博敏幼有令聞雅性不好聲色時覽卞射武戲覩孝成之世祿去公室權柄外移是故臨朝務攬主威以則武宣然董賢用事大臣誅傷有覆餗棟撓之凶自初即位有痿痺之疾末年寖劇享國不永亂臣乘間豈不哀哉世主覽此足以見成敗之基收后族之權清儉愛民可垂統也著述申鑒大略夫道之本仁義而已矣五典以經之羣籍以緯之詠之歌之弦之舞之前監既明後復申之故古之聖王其於仁義也申重而已致政之術先屏四患乃崇五政一曰偽二曰私三曰放四曰奢偽亂俗私壞法放越軌奢敗制四者不除則政末繇行矣夫俗亂則道荒雖天地不得保其性矣法壞則世傾雖人主不得守其度矣軌越則禮亡雖聖人不得全其道矣制敗則欲肆雖四表不得充其求矣是謂四患興農桑以養其性審好惡以正其俗宣文教以章其化立武備以秉其威明賞罰以統其法是謂五政人不畏死不可懼以罪人不樂生不可勸以善雖使契布五教皋陶作士政不行焉故在上者先豐人財以定其志帝耕籍田后桑蠶宫國無遊人野無荒業財不賈用力不妄加以周人事是謂養生君子之所以動天地應神明正萬物而成王化者必本乎真定而已故在上者審定好醜焉善惡要乎功罪毁譽效於凖驗聽言責事舉名察實無或詐偽以蕩衆心故事無不核物無不切善無不顯惡無不章俗無姦怪民無淫風百姓上下覩利害之存乎已也故肅恭其心慎修其行內不回惑外無異望則民志平矣是謂正俗君子以情用小人以刑用榮辱者賞罰之精華也故禮教榮辱以加君子化其情也桎梏鞭撲以加小人治其刑也君子不犯辱况於刑乎小人不忌刑况於辱乎若教化之廢推中人而墜於小人之域教化之行引中人而納於君子之塗是謂章化小人之情緩則驕驕則恣恣則怨怨則叛危則謀亂安則思欲非威強無以懲之故在上者必有武備以戒不虞以遏冦虐安居則寄之內政有事則用之軍旅是謂秉威賞罰政之柄也明賞必罰審信慎令賞以勸善罰以懲惡人主不妄賞非徒愛其財也賞妄行則善不勸矣不妄罰非矜其人也罰妄行則惡不懲矣賞不勸謂之止善罰不懲謂之縱惡在上者能不止下為善不縱下為惡則國法立矣是謂統法四患既蠲五政又立行之以誠守之以固簡而不怠疏而不失無為為之使自施之無事事之使自交之不肅而成不嚴而化垂拱揖讓而海內平矣是謂為政之方又尚主之制非古釐降二女陶唐之典歸妹元吉帝乙之訓王姬歸齊宗周之禮以陰乘陽違天以婦陵夫違人違天不祥違人不義又古者天子諸侯有事必告于廟朝有二史左史記言右史書事事為春秋言為尚書君舉必記善惡成敗無不存焉下及士庶茍有茂異咸在載籍或欲顯而不得或欲隱而名章得失一朝而榮辱千載善人勸焉淫人懼焉宜於今者備置史官掌其典文紀其行事每於歲盡舉之尚書以助賞罰以𢎞法教漢魏六朝百三家集卷十七
