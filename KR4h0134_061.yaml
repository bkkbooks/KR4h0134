body:
  text: 漢魏六朝百三家集卷六十一晉孫綽集題詞東晉佛乘文人孫興公最有名然喻道論云佛十二部經其四部專以勸孝道賢論以天竺七僧方竹林七賢指悉近儒非濡首彼法長往不返者也桓大司馬欲移都洛陽衆莫敢諫興公抗表論列文辭甚偉斯時進言固難於婁敬之說漢高也振袖舉笏郟鄏無恙一封事足不朽矣天台賦自命金石抑其佳句不過赤城瀑布耳遂初林阜足薄華幕蓋遠詠老莊蕭條高寄其素志也賦云乎哉表哀詩哀號罔極欲繼蓼莪即若祖除婦服詩未若其關道義繫人倫也碧玉二歌亦胡姬十五桃葉渡江之類未免有情正謂此爾右軍蘭亭雅集興公與兄承公各有詩篇一吟一咏誠非許掾所及褚王郗庾穹碑載文豈好諛墓哉具體先哲或中郎之羽翮也目録賦天台山賦有序望海賦遂初賦序疏諫移都洛陽疏為功曹參軍駁事箋論喻道論序蘭亭集後序碑太尉庾亮碑太傅褚裒碑丞相王導碑太宰郗鑒碑司空庾冰碑潁州府君碑銘太平山銘漏刻銘樽銘頌聘士徐君墓頌有序贊賀司空循像贊孔松楊像贊某太常碑贊老子贊商丘子贊原憲贊道一贊釋道安贊康僧㑹贊誄庾公誄王長史誄詩表哀詩并序三月三日蘭亭集詩二首秋日情人碧玉歌二首漢魏六朝百三家集卷六十一目録欽定四庫全書漢魏六朝百三家集卷六十一明張漙輯晉孫綽集賦天台山賦有序天台山者蓋山嶽之神秀也涉海則有方丈蓬萊登陸則有四明天台皆𤣥聖之所遊化靈仙之所窟宅夫其峻極之狀嘉祥之美窮山海之瓌富盡人神之壯麗矣所以不列於五嶽闕載於常典者豈不以所立冥奧其路幽迥或倒景於重溟或匿峯於千嶺始經魑魅之塗卒踐無人之境舉世罕能登陟王者莫由禋祀故事絶於常篇名標於竒紀然圖像之興豈虛也哉非夫遺世玩道絶粒茹芝者焉能輕舉而宅之非夫逺寄冥搜篤信通神者何肯遙想而存之余所以馳神運思晝詠宵興俯仰之間若已再升者也方解纓絡永託茲嶺不任吟想之至聊奮藻以散懷太虛遼廓而無閡運自然之妙有融而為川瀆結而為山阜嗟台嶽之所竒挺實神明之所扶持䕃牛宿以曜峯託靈越以正基結根彌於華岱直指高於九疑應配天於唐典齊峻極於周詩邈彼絶域幽邃窈窕近智者以守見而不之之者以路絶而莫曉哂夏蟲之疑冰整輕翮而思矯理無隱而不彰啓二竒以示兆赤城霞起而建標瀑布飛流以界道覩靈驗而遂徂忽乎吾之將行仍羽人於丹丘尋不死之福庭茍台嶺之可攀亦何羡於層城釋域中之常戀暢超然之高情被毛褐之森森振金策之鈴鈴披荒榛之䝉蘢陟峭崿之崢嶸濟楢溪而直進落五界而迅征跨穹隆之懸磴臨萬丈之絶冥踐莓苔之滑石摶壁立之翠屏攬樛木之長蘿援葛藟之飛莖雖一冒於垂堂乃永存乎長生必契誠於幽昧履重險而逾平既克隮於九折路威夷而修通恣心目之寥朗任緩步之從容藉萋萋之纎草䕃落落之長松覿翔鸞之裔裔聽鳴鳳之嗈嗈過靈溪而一濯疏煩想於心胸蕩遺塵於旋流發五蓋之遊䝉追羲農之絶軌躡二老之𤣥蹤陟降信宿迄于仙都雙闕雲竦以夾路瓊臺中天而懸居珠閣玲瓏於林間玉堂隂映於高隅彤雲斐亹以翼櫺皎日炯晃於綺疏八桂森挺以凌霜五芝含秀而晨敷惠風佇芳於陽林醴泉涌溜於隂渠建木滅景於千尋琪樹璀璨而垂珠王喬控鶴以沖天應真飛錫以躡虛騁神變之揮霍忽出有而入無於是遊覽既周體靜心閒害馬巳去世事都捐投刃皆虛目牛無全凝思幽巖朗詠長川爾乃羲和亭午遊氣高褰法鼓琅以振響衆音馥以揚煙肆覲天宗爰集通仙挹以𤣥玉之膏潄以華池之泉散以象外之說暢以無生之篇悟遣有之不盡覺涉無之有間泯色空以合跡忽即有而得𤣥釋二名之同出消一無於三幡恣語樂以終日等寂默於不言渾萬象以冥觀兀同體於自然望海賦五湖同浸九江叢溉抱河含濟吞淮納泗南控沅湘西引涇渭洲渚迢遞以疏屬島嶼綿邈以牢羅植崔嵬之碣石搆穹隆之牂牁𤣥奧之府重仞之房鱗彚萬殊甲産無方包隋珠銜夜光玳瑁熠爍以泳游蟕蠵煥爛以映漲虛貝含素而表紫蠳螺絡丹而帶緗青甲芬飈以微扇𤣥木杳渺以舒芳其卉木則淥苔石髮蔓以流綿紫莖菎綜解以被渚華組依波而錦披翠綸扇風而繡舉長鯨嶽立以截浪虭䱜揚鬐以排流巨鼇贔屓以冠山烏鱯呼翕以吞舟鵬為羽傑鯤稱介豪翼遮半天背負重霄舉翰則宇宙生風抗鱗則四瀆起濤考萬川以周覽亮天地之綜緯彌綸八荒亘帶九地昏明注之而不溢尾閭泄之而不匱若乃惟馨陳祈祝不愧言或適於東或適於西商客齊暢潮流往還各資順勢雙帆同懸倐如驌驊背馳拿如交集輕軒遂初賦序余少慕老莊之道仰其風流久矣却感於陵賢妻之言悵然悟之乃經始東山建五畝之宅帶長阜倚茂林孰與坐華幕擊鐘鼓者同年而語其樂哉疏諌移都洛陽疏伏見征西大將軍臣溫表便當躬率三軍討除二寇蕩滌河渭清灑舊京然後神旗電舒朝服濟江反皇居於中土正玉衡於天極斯超世之宏圖千載之盛事然臣之所懷竊有未安以為帝王之興莫不藉地利人和以造功業貴能以義平暴因而撫之懷愍不造淪胥秦京遂令胡戎交侵神州絶綱土崩之釁誠由道喪然中夏蕩蕩一時橫流百郡千城曾無完郛者何哉亦以地不可守投奔有所故也天祚未革中宗龍飛非惟信順協於天人而已實賴萬里長江畫而守之耳易稱王公設險以守其國險之時義大矣哉斯巳然之明效也今作勝談自當任道而遺險校實量分不得不保小以固存自喪亂已來六十餘年蒼生殄滅百不遺一河洛丘墟函夏蕭條井堙木刋阡陌夷滅生理茫茫永無依歸播流江表已經數世存者長子老孫亡者丘隴成行雖北風之思感其素心目前之哀實為交切若遷都旋軫之日中興五陵即復緬成遐域泰山之安既難以理保蒸蒸之思豈不纒於聖心哉溫今此舉誠欲大覽始終為國逺圖向無山陵之急亦未首決大謀獨任天下之至難也今發憤忘食忠慨亮到凡在有心孰不致感而百姓震駭同懷危懼者豈不以反舊之樂賖而趣死之憂促哉何者植根於江外數十年矣一朝拔之頓驅踧於空荒之地提挈萬里踰險浮深離墳墓棄生業富者無三年之糧貧者無一飱之飯田宅不可復售舟車無從而得捨安樂之國適習亂之鄉出必安之地就纍卵之危將頓仆道塗飄溺江川僅有達者夫國以人為本疾寇所以為人衆喪而寇除亦安所取裁此仁者所宜哀矜國家所宜深慮也且古今帝王之都豈有常所時隆則宅中而圖大勢屈則遵養以待㑹使德不可勝家有三年之積然後始可謀太平之事耳今天時人事有未至者矣一朝欲一宇宙無乃頓而難舉乎臣之愚計以為且可更遣一將有威名資實者先鎮洛陽於陵所築二壘以奉衛山陵掃平梁許清一河南運漕之路既通然後盡力於開墾廣田積榖漸為徙者之資如此賊見亡徵勢必遠竄如其迷逆不化復欲送死南北諸軍風馳電赴若身手之救痛癢率然之應首尾山陵既固中夏小康陛下且端委紫極增修德政躬行漢文簡朴之事去小惠節遊費審官人練甲兵以養士滅寇為先十年行之無使隳廢則貧者殖其財怯者充其勇人知天德赴死如歸以此致政猶運諸掌握何故捨百勝之長理舉天下而一擲哉陛下春秋方富溫克壯其猷君臣相與𢎞養德業括囊無咎豈不快乎今溫唱高議聖朝互同臣以輕微獨獻管見出言之難實在今日而臣區區必聞天聽者竊以無諱之朝狂瞽進說芻蕘之謀聖賢所察所以不勝至憂觸冒干陳若陛下垂神溫少留意豈非屈於一人而允億兆之願哉如以干忤罪大欲加顯戮使丹誠上達退受刑誅雖沒泉壤尸且不朽為功曹參軍駁事箋綱紀居管轄之任以糾司外內駁議彈射誠無所拘然亦有所以獻可替否舉直違枉者也論喻道論或有疑至道者喻之曰夫六合遐邈庶類殷充千變萬化渾然無端是以有方之識各期所見鱗介之物不達皋壤之事毛羽之族不識流浪之勢自得於窞井者則怪遊溟之量翻翥於數仞者則疑沖天之力纒束世教之內肆觀周孔之跡謂至德窮於堯舜微言盡乎老易焉復覩夫方外之妙趣寰中之𤣥照乎悲夫章甫之委裸俗韶夏之棄鄙俚至真絶於漫習大道廢於曲士也若窮迷而不遷者非辭喻之所感試明其㫖庶乎有悟於其聞者焉夫佛也者體道者也道也者導物者也應感順通無為而無不為者也無為故虛寂自然無不為故神化萬物萬物之秉卑髙不同故訓教之術或精或粗悟上識則舉其宗本不順者得殃放酒者羅刑淫者必罰盜者扺罪三辟五刑犯則無赦此王者之常制宰牧之所司也若聖王御世百司明達則向之罪人必見窮測無逃刑之地矣使姦惡者不得容其私則國無違民而賢善之流必見旌叙矣且君明臣公世清理治猶能令善惡得所曲直不濫况神明所蒞無逺近幽聰明正直罰惡祐善者哉故毫釐之功錙銖之釁報應之期不可得而差矣厯觀古今禍福之證皆有由緣載籍昭然豈可掩哉何者隂謀之門子孫不昌三世之將道家明忌斯非兵凶戰危積殺之所致邪若夫魏顆從治而致結草之報子都守信而受驄驥之錫齊襄委罪故有墜車之禍晉惠棄禮故有弊韓之困斯皆死者報生之驗也至於宣孟愍翳桑之饑漂母哀淮隂之憊並以一餐拯其懸餒而趙䝉倒戈之祐母荷千金之賞斯一獲萬報不踰世故立德暗昧之中而慶彰萬物之上隂行陽曜自然之勢譬猶灑粒於土壤而納百倍之收地穀無情於人而自然之利至也或難曰報應之事誠皆有徵則周孔之教何不去殺而少正卯刑二叔伏誅邪答曰客可謂達教聲而不體教情者也謂聖人有殺心乎曰無也答曰子誠知其無心於殺殺固百姓之心耳夫時移世異物有薄淳結繩之前陶然太和暨於唐虞禮法始興爰逮三代刑網滋彰刀斧雖嚴而猶不懲至于君臣相滅父子相害吞噬之甚過於豺虎聖人知人情之固於殺不可一朝而息故漸抑以求厥中猶蝮蛇螫足斬之以全身癰疽附體決之以救命亡一以存十亦輕重之所權故刑依秋冬所以順時殺春搜夏苗所簡胎乳三驅之禮禽來則韜弓聞聲睹生肉至則不食釣而不綱弋不射宿其於蜫蟲每加隱惻至於議獄緩死眚災肆赦刑疑從輕寧失有罪流涕授鉞哀矜勿喜生育之恩篤矣仁愛之道盡矣所謂為而不恃長而不宰德被而功不在我日用而萬物不知舉茲以求足以悟其歸矣或難曰周孔適時而教佛欲頓去之將何以懲暴止姦統理羣生者哉答曰不然周孔即佛佛即周孔蓋外內名之耳故在皇為皇在王為王佛者梵語晉訓覺也覺之為義悟物之謂猶孟軻以聖人為先覺其㫖一也應世軌物蓋亦隨時周孔救極弊佛教明其本耳其為首尾其致不殊即如外聖有淺深之跡堯舜世夷故二后高讓湯武時難故兩君揮戈淵默之與赫斯其跡則胡越然其所以跡者何嘗有際哉故逆尋者每見其二順通者無往不一或難曰周孔之教以孝為首孝德之至百行之本本立道生通於神明故子之事親生則致其養沒則奉其祀三千之責莫大無後體受父母不敢夷毁是以樂正傷足終身含愧也而沙門之道委離所生棄親即疏刓剔鬚髮殘其天倪生廢色養終絶血食骨肉之親等之行路背理傷情莫此之甚而云𢎞道敦仁廣濟羣生斯何異斬刈根本而修枝幹而言不隕碩茂未之聞見皮之不存毛將安附此大乖於世教子將何以祛之答曰此誠窮俗之所甚惑倒見之為大謬咨嗟而不能默已者也夫父子一體惟命同之故母囓其指兒心懸駭者同氣之感也其同無間矣故唯得其歡心孝之盡也父隆則子貴子貴則父尊故孝之為貴貴能立身行道永光厥親若匍匐懷袖日御三牲而不能令萬物尊巳舉世我賴以之養親其榮僅矣夫緣督以為經守柔以為常形名兩絶親我交忘養親之道也既巳明其宗且復為客言其次者夫忠孝名不並立潁叔違君書稱純孝石碏戮子大節乃全傳曰子之能仕父教之忠策名委質二乃辟也然則結纓公朝者子道廢矣何見危授命誓不顧親皆名注史筆事標教首記注者豈復以不孝為罪故諺曰求忠臣必於孝子之門明其雖小違於此而大順於彼矣且鯀放遐裔而禹不告退若令委堯命以尋父屈至公於私戚斯一介之小善非大者遠者矣周之泰伯遠棄骨肉託跡殊域祝髮文身存亡不反而論稱至德書著大賢誠以其忽南面之尊保沖虛之貴三讓之功遠而毁傷之過微也故能大革夷俗流風垂訓夷齊同餓首陽之上不恤孤竹之𦙍仲尼目之為仁賢評當者寧復可言悖德乎梁之高行毁容守節宋之伯姬順理忘生並名冠烈婦德範諸姬秉二婦之倫免愚悖之譏耳率此以談在乎所守之輕重可知也昔佛為太子棄國學道欲全形以遁恐不免維縶故釋其鬚髮變其章服既外示不及內修簡易於是捨華殿而即曠林解龍衮以衣鹿裘遂垂條為宇藉草為茵去櫛梳之勞息湯沐之煩頓馳騖之轡塞欲動之門目遏𤣥黃耳絶淫聲口忘甘苦意放休戚心去於纍胸中抱一載平營魄內思安般一數二隨三止四觀五還六淨遊志三四出入十二門禪定拱默山停淵淡神若寒灰形猶枯木端坐六年道成號佛三逹六通正覺無上現身丈六金色焜耀光遏日月聲協八風相三十二好姿八十形偉羣有神足無方於是遊步三界之表恣化無窮之境回天儛地飛山結流存亡倐忽神變綿邈意之所指無往不通大範羣邪遷之正路衆魔小道靡不遵服于斯時也天清地潤品物咸亨蠢蠕之生浸育靈液枯槁之類改悴為榮還照大國廣敷法音父王感悟亦升道場以此榮親何孝如之於是後進篤志之士被服𢎞訓思齊高軌皆由父老不異所尚承歡心而後動耳若有昆弟之列者則服養不廢既得𢎞修大業而恩紀不替且令逝沒者得福報以生天不復顧歆於世祀斯豈非兼善大通之道乎夫東鄰宰牛西鄰禴祀殷美黍稷周尚明德興喪之期於茲著矣佛有十二部經其四部專以勸孝為事殷勤之㫖可謂至矣而俗人不詳其源流未涉其場肆便瞽言妄說輒生攻難以螢燭之見疑三光之盛芒隙之滴怪淵海之量以誣罔為辨以果敢為名可謂狎大人而侮天命者也序蘭亭集後序古人以水喻性有㫖哉非所以澄之則清淆之則濁耶故振轡於朝市則充詘之心生閒步於林野則寥落之意興仰瞻羲唐邈然遠矣近詠臺閣顧探增懷聊於曖昧之中期乎瑩拂之道暮春之始禊于南澗之濵高嶺千尋長湖萬頃乃藉芳草鑑清流覽卉物觀魚鳥具類同榮資生咸暢於是和以醇醪齊以逹觀快然足矣焉復覺鵬鷃之二物哉耀靈縱轡急景西邁樂與時去悲亦系之往復推移新故相換今日之迹明復陳矣原詩人之致興諒歌詠之有由碑太尉庾亮碑次黃中以啓胄鍾遐武於軒轅爰及晉代世號多士公吸峻極之秀氣誕命世之深量微言散於秋毫𤣥風暢乎德音窺門者貴其凝峙入室者議其通𤣥摽形者得之廊廟悟㫖者期諸濠川提挈南翔息肩靈越㑹大君有命納妃德門自求多福辭不獲巳鳯羽籠于華樊麟趾縶于椒房王敦阻兵玩權志窺神器乃轉公左衛將軍秉雄㦸以扶華轂勒武旅以翼豹尾死難之心義形于色親受中詔奔告方伯於是羣后契盟同禀高謀巖栖懷德以嚮赴義拯神器於獸吻扶帝坐於已傾王室之不壞繄伯舅是賴公以為戰伐之謀仁所恥聞况立德𢎞道年幾不惑闔門沈舟將遠迹山海詔纍遣侍中黃門逼以嚴制知不獲免乃固求外任江外無烽燧之警宇內歸穆然之美銘曰金德時昏乾綱絶紀素靈南映中宗蔚起誰其贊之數鍾伊公逹人忘懷形隨運通再潛再躍婉若游龍太傅褚裒碑公資清剛之正氣挺純粹之茂質深量體於自然沖識足乎弱冠含章內映而不運皎察之明𤣥識沈通而不以浮藻曜物穆然忘容塵務不干其度默爾獨得膚見莫測其奧加以溫恭孝友少思寡欲都督兖州刺史將以藩屏畿甸綏撫宇內㑹康皇晏駕太后臨朝總已之重民無異望乃徵將軍中書令録尚書事公要終之識定於介石雖事已當來而情以本應顧以主少國危方難未夷思清函夏以一天宇且帝命所存以社稷為寄謀身雖重方此為輕深為意疾俯首撫順公志在芟夷凶類拯拔晉民繕甲練卒日不暇給者久矣遂見機而作遺其劍履將龍驤河洛電掃幽豫廟算以逆徒尚繁困獸難逼命公還斾以俟齊舉雖元勳未捷義聲亦足以振暴於華夷矣銘曰邈邈遠遊亹亹令圗將激淮海灑滌中區雅業未究哲人其徂敢勒𤣥石敬刋高謨丞相王導碑公胄興姬文氏由王喬𤣥聖陶化以啓源靈仙延祉以分流賢俊相承世冠海岱二儀交泰妙氣發暉醇曜所鍾公實應之𤣥性合乎道㫖沖一體之自然柔暢協乎春風溫暖侔於冬日信人倫之水鏡道德之標凖也惠懷之際運在大過皇德不建神轡再絶獫狁孔熾凶類猋起公見機而作超然𤣥悟遂扶翼王室協蕃東嶽𢎞大順以一羣后之望仗王道以應天人之㑹于時乾維肇振創制理物中宗拱已雅仗賢相尚父之任具瞻在公存烹鮮之義循易簡之政大略宏規卓然可述公雅好談詠循循善誘雖管綜時務一日萬幾夷心以延白屋之士虛已以招巖穴之俊逍遙放意不峻儀軌公執國之鈞三十餘載時難世故備經之矣夷險理亂常保元吉匪躬而身全遺功而勳舉非夫領鑒𤣥逹百鍊不渝孰能莫忤於世而動與理㑹者哉太宰郗鑒碑公蓋黃帝之苗裔氏族所由皆紀於祖御史大夫之碑矣靈和誕授載有公侯至德碩量天實挺之琅琊王應天啓之運闡中興之道思延英賢以匡王業乃假兖州刺史金章仍割𤣥鉞載飾于時羯寇凶熾羣逆猋起公奮其忠勇精貫白日信順為甲胄大節為城池故能摧却凶寇全身濟功惟公德器純固體識深𢎞敦尚衡門則服膺曾閔弼亮皇極則憲章元凱篤誠簡於帝心明允著于蒞政信鍾山之圭璧歲寒之靈木者也摛藻風雲策名帝録肇階方尺遂隆台嶽王室未休吾何以豫興言再慨思康天步將俾皇化歸之太素彼蒼者天曾不遐祚哲人其萎民斯攸慕嗟爾後昆式瞻宏度司空庾冰碑君喻嵩巖之𤣥精挹清瀨之潔流貞質謀於白圭明操勵於南金雖名器未極而任盡臣道正身提衡銓括百揆知無不為謀必鮮過端委待旦則有心宣孟以約訓儉則擬議季文君平衡無私鳴謙寡欲當世之所難於君易之矣於是慨然遠鑒量巳而退高揖帷幕投迹藩屏夫良玉以經焚不渝故其貞可貴竹柏以䝉霜保榮故見殊列樹治而不亂者有矣未有亂而彌治者也考終以證始即事以徵心少長能一其度貴賤不二其道文康之雅量於是乎𢎞著矣銘曰洋洋俊潁巖巖神嵩流滌淳氣頗扇祥風篤生公侯情靈德充臨川擬潔仰華思崇履險思夷處滿思沖方恢遠猷皇極是贊繁霜夏被修梧摧幹人之云徂朝野咸歎儀刑永戢光風長煥潁州府君碑君天縱傑邁竒逸卓犖茂才亮拔雅度恢廓通理遠鑒之識禮樂飾身之具固以足之於天仞冠之於縉紳出匡南位功深於爵金龜三曜沖懷再發道光古賢風改雕僞允可謂明德宏猷贊世之偉器者矣矯矯秀姿卓卓英韻他人之高及肩而已邀命有數託生皇代所忝之至人知其幸况在懷情而無自識但親勤未效違離巳及低佪房禁攀戀罔遺銘太平山銘嵬峩太平峻踰華霍秀嶺樊緼竒峯挺㠋上干翠霞下籠丹壑有士冥遊默往寄託肅形枯林映心幽漠亦既覯止涣焉融滯懸棟翠微飛宇雲際重巒蹇産回溪縈帶被以青松灑以素瀨流風佇芳翔雲停靄漏刻銘二儀貞運聖鑒通𤣥數以器徵理以象宣乃制妙漏挈壺是銓近取諸物遠贊自然纍筒三階積水成淵器滿則盈乘虛赴下靈虬吐注隂蟲承瀉昏明無隱其晷度隂陽是效其屈伸不下堂而天地理得設一器而萬事同倫樽銘大匠體物妙思入神儀彼靈禽制器為人虗以含有文以飾身湛此𤣥醴延我嘉賔興懷寄詠聊以標設詳觀茲器妙巧奇絶酌焉則注受滿則側吐寫適㑹未見其竭與之無吝施而有節𤣥應忘知功存不伐王公擬之德齊上哲頌聘士徐君墓頌有序晉南昌相太原縣君白漢故聘士徐君之靈惟君風軌英邃音徽遠播飱仰芳流宗揖在昔古人有言聞伯夷之風者懦夫有立志仰先生之道豈無青雲之懷哉余以不才忝宰茲邑遐宗有道思揖遠風乃與友人殷浩等束帶靈墳奉瞻祠宇雖玉質幽潛而目想令儀雅音永寂而心存高範徘徊墟壠仰盼松林哀有形之短化悼令德之長泯憮然有感悽然增傷夫諷謠生於情託雅頌興乎所欽匪於詠述孰寄斯懷頌曰巖巖先生邁此英風含真獨暢心夷體沖高蹈域表淑問顯融昂昂五賢赫赫八俊雖曰休明或嬰險吝豈若先生保茲玉潤超世作範流光遐振墳塋磊落松竹蕭森薈叢蔚蔚虗宇愔愔遊獸戲阿嚶鳥鳴林嗟乎徐君不聞其音徘徊丘側悽焉流襟何以舒藴拔翰託心贊賀司空循像贊有序公應天縱之德系命世之期質與荆玉參貞鑒與南金等照若其好學之性不勸而成弱不珍玩雅好博古慨洙泗之邈遠悼禮樂之不舉於是覃思深講鋭精幽贊雖齊侯之歸孟軻漢王之宗仲舒無以加焉贊曰思文公侯誕保休祥素質玉潔華藻金章總角韞德被褐韜光自昔喪亂鉦鼓日震禮樂藏器詩書䝉塵哲人遐慨垂幕澄神仰觀洙泗揚波絶津方曜金鉉協贊衡機昊天不弔㑹不憖遺縉紳頽範皇德莫毗公之云徂華裔同悲孔松楊像贊有序君德既純固基宇高邃荆玉不及喻其溫南金未能方其厲夫其溫恭篤誠善誘勤勸外身崇物菲躬厚人指媯必謙動靜克讓允有古賢之流風乃祖之遺令矣肇階方尺臨政敝邑潔齊冬氷澤侔春露於穆我公含和體純行範乃祖德冠縉紳降迹垂化澤侔三春超然遐舉遺愛在民某太常碑贊海岱協靈育此多士峩峩君侯東國之紀金德發耀英風劭起文齊游夏行儔曾史有邈其升令問不巳人亦有言德崇譽高束帛既賁旌節仍招儀刑朝堂流風丹霄將振華衮永煥皇朝上帝靡盬曾不遐齡衛霍頽鎮哲人其傾邦國殄瘁縉紳喪情仰拜高範永播休聲老子贊李老無為而無不為道一堯孔跡又靈竒塞關內鏡冥神絶涯永合元氣契長兩儀商丘子贊商丘卓犖執策吹竽渴飲寒泉飢食菖蒲所牧何物殆非真豬儻逢風雲為我龍攄原憲贊原憲𤣥默氷清玉粹志逸九霄身安陋術道一贊馳騁遊說言固不虛唯茲一公綽然有餘譬若春圃載芬載敷條柯猗蔚枝幹扶疏釋道安贊物有廣贍人固多宰淵淵釋安專能兼倍飛聲汧隴馳名淮海形雖草花猶若常在康儈㑹贊㑹公蕭瑟實惟令質心無近纍情有餘逸厲此幽夜振彼尤黜超然遠詣卓矣高出誄庾公誄咨豫與公風流同歸擬量託情視公猶師君子之交相與無私虛中納是吐誠誨非雖實不敏敬佩弦韋永戢話言口誦心悲興公作庾公誄文多寄託之辭既成示庾道恩庾見慨然曰先君與君自不至於此王長史誄余與夫子交非勢利心猶澄水同此𤣥味王孝伯見曰亡祖何至與此人周旋詩表哀詩并序天地之德曰生生之所恃者親親存則歡泰情盡親亡則哀悴理極故老萊婆娑於膝下曾閔泣血於終年哀悼之思至矣自然之性篤矣余以薄祜夙遭閔凶越在九齡嚴考即世未及志學過庭無聞天覆既淪俯憑坤厚植根外氏賴以成訓然以不才不能負荷仁妣𢎞母儀之德邁榮寒之操雕琢固頑勉以道義庶幾砥礪犬馬之報豈悟一朝復見孤棄上天極禍怨痛莫訴皆繇惡積咎深不能通感自丁荼毒載離寒暑茵帷塵寂棟宇寥恍仰悲軌迹長自矜悼不勝哀號作詩一首敢冒諒暗之譏以申罔極之痛詩曰茫茫太極賦受理殊咨生不辰仁考宿一作夙徂微微沖弱眇眇偏孤叩心昊蒼痛貫黃壚肅我以義鞠我以仁嚴邁商風恩洽陽春昔聞鄒母勤教善分懿矣慈妣曠世齊運嗟豫小子譬彼土糞俯愧陋質仰忝高訓悠悠𤣥運四氣錯序自我酷痛載離寒暑寥寥空堂寂寂響户塵䝉几筵風生棟宇感昔有恃望晨遲顔婉孌懷袖極願盡歡奈何慈妣歸體幽埏酷矣痛深剖髓摧肝三月三日姑洗斡運首陽穆闡嘉卉萋萋溫風暖暖言滌長瀨聊以游衍縹芹映流緑桞䕃坂羽從風飄鱗隨浪轉蘭亭集詩二首春詠登臺亦有臨流懷彼伐木肅此良儔修竹䕃沼旋瀨縈丘穿池激湍連濫觴舟流風拂枉渚停雲䕃九臯鶯語吟修竹游鱗戲瀾濤攜筆落雲藻微言剖纎毫時珍豈不甘忘味在聞韶秋日蕭瑟仲秋日飈唳風雲高山居感時變遠客興長謡疏林積凉風虛岫結凝霄湛露灑庭林密葉辭榮條撫菌藝文作葉悲先落鬱一作攀松羡後凋垂綸在林野交情遠市朝淡然古懷心濠上豈伊遙情人碧玉歌二首一名千金意樂府詩集云宋汝南王作碧玉小家女不敢攀貴德感郎千金意慙無傾城色碧玉破瓜時郎為情顛倒感君不羞赧回身就郎抱漢魏六朝百三家集卷六十一
