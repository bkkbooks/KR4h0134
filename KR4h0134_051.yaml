body:
  text: 漢魏六朝百三家集巻五十一晉陸雲集目録詩大將軍宴㑹被命作詩六章征西大將軍京陵王公㑹射堂皇太子見命作此詩六章太尉王公以九錫命大將軍讓公將還京邑祖餞贈此詩六章大安二年夏四月大將軍出祖王羊二公於城南堂皇被命作此詩六章從事中郎張彦明為中䕶軍六章贈汲郡太守八章有序贈顧驃騎二首有皇八章有引思文八章有引贈鄱陽府君張仲膺五章贈顧彦先五章答顧秀才五章答大將軍祭酒顧令文五章答吳王上將顧處微九章贈顧尚書答兄平原贈鄭曼季四首谷風五章有序鳴鶴四章有序南衡五章有序高岡四章答孫顯世十章失題八章失題六章失題失題答兄平原答張士然為顧彦先贈婦徃返四首芙蕖漢魏六朝百三家集巻五十一目録欽定四庫全書漢魏六朝百三家集巻五十一明張溥輯晉陸雲集詩大将軍宴㑹被命作詩六章皇皇帝祜誕隆駿命四祖正家天祿保定叡哲惟晉世有明聖如彼日月萬景攸正巍巍明聖道隆自天則明分爽觀象洞𤣥陵風叶紀絶輝照淵肅雍往播福禄來臻在昔奸臣稱亂紫微神風潛駭有赫兹威靈旗樹斾如電斯揮致天之届于河之沂有命再集皇輿凱歸頹綱既振品物咸秩神道見素遺華反質辰晷重光協風應律函夏無塵海外有謐芒芒宇宙天地交泰王在華堂式宴嘉㑹𤣥暉峻朗翠雲崇藹冕弁振纓藻服五臣作火垂帶祁祁臣僚有來雍雍薄言載考承顔下風俯覿嘉客仰瞻玉容施巳唯約于禮斯豐天錫難老如岳之崇征西大将軍京陵王公㑹射堂皇太子見命作此詩六章芒芒太極𤣥化烟煴頽形成器凌象垂文大鈞造物庶類羣分先識經始實綜彛倫惟嶽隆周生甫及申天鑒在晉祚之降神邈矣遐風茂徳有鄰永言配命惟晉之鎮厥鎮伊何實幹心膂文教内輔武功外禦淮方未靖帝曰攸序公于出征奄有南浦南海既賓爰戢干戈桃林釋駕天馬婆娑象齒南金來格皇家絶音協徽宇宙告和𤣥綱峻極天網既紘文武方升允兹兼𢎞我我髙夏有肅其凉公侯戾止騄驥龍驤善問如林在㑹鏘鏘祝融御節火正緝熈凱風徘徊萬物欣時秩秩初筵薄言在兹嘉福介祜萬夀無期太尉王公以九錫命大将軍讓公将還京邑祖餞贈此詩六章烈文辟公時惟哲王闡縱絶期平顯幽光内實慎徽緝熈有藏出糺方慝間督不揚髙山峻極天造芒芒天子念功大典光備肅肅王命宰臣蒞事穆矣淵讓遺功遂志思我逺猷徽音孰嗣后命既靈王人返斾興言出祖飲餞于邁旍旐泱泱軺軒藹藹和風弭塵清暉映蓋思樂中陵言觀其川公王戾止有車轔轔伊誰云饗我有嘉賓羽觴舉醻酢爾征人悠悠征人四牡騑騑發軫北京振䇿紫微昔乃云來春林方輝嵗亦暮止之子言歸道途興戀伏載稱徽聖澤既渥嘉㑹愔愔庭旅鐘鼔堂有瑟琴飛轡清暉扶桑移隂視景祗慕揮袂沾襟孌彼同栖悲爾異林我有旨酒以歌以吟大安二年夏四月大将軍出祖王羊二公於城南堂皇被命作此詩六章時文唯晉天祚有祥聖宰作弼受言既臧有赫斯庸勲格昊蒼景物台暉棟隆玉堂惟帝思庸大興光迪聖敬逺躋神道𤣥邈思媚三靈誕膺天篤嘉命既辱王人言告翼翼王人言告惟慕公輿駕言乃眷斯顧華旂飛藻鳴鸞振路騑騑駟牡嘘天載步我有髙厦如雲斯薈雕軒戾止薄言嘉㑹問誰在宴惟俊惟乂豐俎殷薦獻酬交泰悠悠昊天南正興言朱明有曄萬葉翠繁昌雲垂天凱風熈顔王臣在此貽宴于懽懸象西頽虞淵納景嘉樂未晞嚴駕巳整行矣征人身乖路永飛驂顧懐華蟬引領遺思北京結轡臺省從事中郎張彦明為中䕶軍六章思文有聖叡哲配天功濟生黎道合上𤣥休命發揮有集惟賢哲彼寤宿澄此在淵濟濟多士實播令聞王曰欽哉余嘉乃勲徽音孔碩惠爾風雲穆此芳烈肇揚清芬肅肅庶僚袨服寵暉肇彼桃蟲假翼翻飛出撫邦家入翔紫微有命既集願言永違思樂華堂雲構崇基公王有酒薄言饗之景曜徽芒芳風詠時宴爾賓儐具樂于兹亹亹我王豐恩允臧我客戾止飲酒公堂自彼下僚聿來有光悲矣永言指途逝将形違殿闥景附華房開國承家勿用小人今我聖宰實蕃斯仁凌淵龍躍披林鳳振正直既好嘉禮式陳振我逺徳歸于時民贈汲郡太守八章有序奚世都為汲郡太守客将之官大将軍崇賢之徳既逺而厚下之恩又隆非此離析有感聖皇既䝉引見又宴于後園感鹿鳴之宴樂詠魚藻之凱歌而作是詩於穆皇晉豪俊實蕃天網振維有聖貞觀鳴鳥在林良駿即閑萃彼俊乂時亮庶官抑抑奚生天篤其淳芳頴蘭輝瓊光玉振沈機照物妙思考神思我善問觀徳古人善問伊何惠音孔昭肇允衡門翻飛宰朝肅雍芳林芬響淩霄穆矣和風育爾清休亦既有試出宰邦家之子于行民固謳歌風澄俗儉化静世波芒芒既庶且樂于和我有好爵既成爾服入贊崇華遂登帷幄時文聖宰天祚方榖朔風徽止鴻漸雲嶽悠悠斯民三代直道我求明徳惟奚攸考緝熈暉章天祿來保惠心無競豐化有造樂只君子茂徳攸綏嗟我懐人式是言歸聿言來集如翼斯揮曰予不惠照爾清暉職思既殊亦各有司念我同僚悲爾異事之子之逺悠悠我思雖無贈之歌以言志贈顧驃騎二首有皇八章有引有皇美祁陽也祁陽秉文之士駿發其聲故能明照有吳入顯乎晉國人美之故作是詩焉有皇大晉時文憲章規天有光矩地無疆神篤斯祜本顯克昌載生之雋實惟祁陽哲問宣猷考茂其相於鑠祁陽誕鍾天篤清輝龍見𤣥猷淵嘿沈機響駭幽神廣覿和以同人歸物時育有大惡盈謙以自牧思我懿範萬民來服吳未喪師天秩有庸淵哉若人弱冠休風俯翼黄門以徳來忠端秀蕃后正色儲宫徽音鑠頴邈矣遐蹤粤惟南紀舊邦匪歆委弁釋位如龍之潛考盤窮谷假樂豐林子雖蔵器鐘鼔有音惠風徃敬慶問來尋濟濟元公相惟天子明明辟王思隆多士帝曰欽哉有命集止我咨四方令問在爾以朕大賚乃膺嘉祉聿來胥步觀國之紀惟皇建極緝熈清曜我有俊民明徳來照大觀在上王假有廟顯允顧生金聲玉振之子于升利見大人龍輝絶跡有肅清塵清塵既彰朝虚好爵敬子侯度慎徽百辟予聞有命得禮不易嗟我懐人瞻言永錫豐水東注惟子之績遵汶涉泗言告同征勁風宵烈湛露朝零雲垂藹下泉冽清泠哀哉行人感物傷情從子京邑言觀厥成天保祚徳式榖以寧思文八章有引思文美祁陽也祁陽能明其徳刑于寡妻以至于家邦無思不服亦頼賢妃貞女以成其内教故作是詩焉思文祁陽祁陽克峻天錫純嘏宣兹義問徳音既烈海外有奮既奮斯音祗敬厥徳昭治其家覃及邦國永肇儀刑俾民惟則文王在上太姒思齊魯侯克昌亦頼令妻鑒神有顧蘋蘩在斯祁陽載天作之伉儷在虞之胄實惟有姚頴艶玉秀華茂桃夭居顯祇明在靈格幽清塵熠爍淑心綢繆爰及祁陽惟徳之周其徳伊何和貞履素䖍告師氏言謀慮度鐘鼓思樂靖端夙賦考休攸嬪來嫁于顧羔羊執贄玉帛有輝百兩集止之子于歸宗姻風從娣姪雲回祁陽顧之煥其盈闈既曰歸止式揚好音言觀河洲有集于林思樂葛藟薄采其蕈疲彼攸遂乃孚惠心惠心既孚有恪中饋敦此螽斯永錫嗣類載延窈窕用和寤寐神之聼之𦙍祚來瑞昔周之隆有任有姒内刑聖教外崇多士今我淑人實亮君子亹亹翼翼亦繼斯祉宜爾子孫福禄盈止贈鄱陽府君張仲膺五章神林何有竒華妙實皇朝如何窮文極質斌斌君子升堂入室太上有曜子誕其輝知幾曰難子達其微入輔帷幄出御千里滔滔江漢南國之紀謁帝東堂剖符南征天子命我車服以榮何以潤之徳被蒼生何以濟之威振羣城却愚以化崇賢以仁鳳舒其翮龍濯其鱗憶彼荒藪莫敢不賓雖云舊邦其命維新卞和南金終始一色顯允君子窮達一徳𢎞仁厲道物究其極古賢受爵循墻䖍恭今哲居貴履盈如沖接新以化愛舊以豐隆此嚶鳴惇彼谷風忠至寵加孝至榮集内崇南芬外清名邑煒煒棠棣夐増其華猗猗桑梓厥曜孔多被繡晝行昔人攸美階雲飛藻孰與同粲人道伊何難合易離㑹如升峻别如順淇嗟我懐人曷云其來願言執手涕既隕之贈顧彦先五章𤣥黄挺秀誕受至真行該其髙徳備其新光瑩之偉隋卞同珍騰都之駿龍鳳合塵皇皇明哲應期繼聲華映殊域實鎮天庭入輔出輔乾乾靡寧夏發凉臺我雨我暑冬違邦族風霜是處嗟彼獨宿誰與晤語飄颻艱辛非禹孰舉言念君子悵惟心楚悠悠山川驍驍征遐陟升嶣嶤降涉洪波言無不利乗嶮而嘉人懐思慮我保其和邂逅相遇良願乃從不逢知巳誰濟予躬莫攀莫附媿我髙風時過年邁晻冉桑榆晞光賴潤亦在斯須假我夷塗頓不忘驅汜予津川浮不失桴無愛餘暉遂暗東嵎幽幽東嵎戀彼西歸瞻儀情感聆音心悲之子于邁夙夜京畿王事多難此焉徘徊答顧秀才五章芒芒上𤣥有物有則厥初造命立我藝則爰兹族類有覺先識斯文未喪誕育明徳允矣顧生載靈之和沈根芳沼濯秀蘭波淵翹戢穎景茂淩華惟是徳心是用閑邪徳心伊何行歸于周希髙仰峻企逺懐悠匪願在明靡倦斯幽凡我同朋瞻言清休慎終追逺俾民歸厚言若有行及予攜手何以恤我其仁孔有心之云愛隆敬其乆既邁斯仁亦迪兹文藻不雕樸華不變淳有斐君子如珪如璠仰欽徳類依懐惠詮式揚好問邦家于宣答大将軍祭酒顧令文五章惟林有鸞惟淵有螭顯允明徳實邦之基先后陟恪子配于兹遵彼玉堂受言遘之中原有軌世鮮克蹈先民有懐子探其妙心猶水鑒函景内照名若振炎攄光外燿相彼水鑒民胥攸臨矧曰明徳人誰弗欽寫我朶頥即爾澄心義隆自古好邈在今大人有作興雲自天之子于升亦躍于淵景曳清霄響發鳴弦義問𢎞集淑風載鮮企予朔都非子孰念豈無弱翰才不克贍惠音聿來瓊華玉艶無徳不報念辭惟忝答吳王上将顧處微九章邈矣大昧造化明明物以曲全人以直生類聚百族羣分萬形員淵挺隋方川吐瓊藹藹洪族天祿攸蕃神綏厥本道裕其源條有豐葉波無輟瀾烈風時播芳響世繁曰繁曰賾載徳于兹克文克敏乃惠乃慈遵彼洪流薄言詠之好是神契聊與之期仁勇同宅文武相紛王謂御事誰撫上軍於時翻飛虎嘯江濆式遏不虞俾也無塵三代既逺直道垂音非齒焉尚非徳焉欽鑚仰自古鮮曰在今匪唯形交殷薦其心心以殷薦分以道成祇服惠顧疇此深情亦有芳訊薄載其誠豈無春暉兹焉可榮大道易聞崇軌難襲孰云匪愆咎吝尤集敢謝不佞栖山自戢臨篇焉愧徳輶辭輯翩彼日月逝猶駭電朝華未厭夕風巳扇詩亦有悲無幾相見懐徳歎心于焉東眷平津晚貴貢公後徴陟彼玉階黄髪來升靈卉三秀芳草秋興唯頥清神福祿是膺贈顧尚書五嶽降神四瀆炳靈兩儀鈞陶參和大成兆光人倫誕育至英於顯尚書實惟我兄行成世則才為時生體道既𢎞大徳允明厥𢎞伊何靡曠不遵厥明伊何靡妙不研無索昭灼有求幽𤣥細微不錯毫芒以陳積簣為山納流成淵扶翹布華養物作春所肅以禮所潤以仁宣質拔行曜文入采堅不可鑚清如凝水方迹迎朖蹈齊闕里希聖而微亦顧之子棄彼芝英玩此蘭茝異世同芳其馥不已我蘭既馥我風載清能芬南岳遂芳北征子有其徳人求其馨逝此陋巷薰彼紫庭厥音不已鼔鐘有聲聞天之聰譬之鵠鳴天聰既昭我實惟彰乗風之鳳眷言朝陽披雲藻繡來此舊鄉謙光自抑厥輝愈揚麗容既翕孔好巳張既照平林具我華英華英巳曜餘光難延㑹淺别速哀以紹欣追曠同塗暫和笑言殊音合奏曲異響連絶我懽條統我思根因分來在愛感徃恩我非形景有處有遊載離載㑹且懽且憂感彼逺曠吝此延娛樂奏聲哀言發涕流惟願我子徳與福俱亦天之祐亦我之私答兄平原伊我世族太極降精昔在上代軒虞篤生厥生伊何流祚萬齡南嶽有神乃降厥靈誕鍾祖考徹兹神明運步玉衡仰和太清賔御四門旁穆紫庭紫庭既穆威聲爰振厥振伊何播化殊鄰清風攸被率土歸仁彤弧所彎萬里無塵功昭王府帝庸厥勲黄鉞授征錫命頻繁闞如虓虎肅兹三軍光若辰峙亮彼公門仍世上司芳流慶純雲和所産爰育二昆誕豐岐嶷夙邁令聞令聞伊何休音允臧先公克構乃崇斯堂耀頴上京發迹扶桑戎車山征時惟鷹揚鷹揚既昭勲庸克邁天子命我鎮弼于外在作扞城以表南裔降災匪蠲景命顛沛惟我賢昆天姿秀生含竒播殊明徳惟馨太陽散氣乃禀厥和山川垂度爰則厥遐厥遐伊何惟光惟大惟大伊何如岱如渭恢此廣淵廓彼𢎞懿洪道惇徳淵哉為器統我先基弱冠慷慨将𢎞祖業實崇奕世咨予頑䝉蕞爾弱才沈耀𤣥渚挹庇雲淇陶化靡移固陋于兹瞻仰洪範實忝先基巍巍先基重規累構赫赫重光遐風激鷲昔我先公爰造斯猷今我六蔽匪崇克扶悠悠大道載邈載遐洋洋淵源如海如河昔我先公斯綱斯紀今我末嗣乃傾乃圯世業之頽自予小子仰愧靈丘銜憂没齒憂懐惟何顧景惟塵峩峩髙蹤眇眇貞辰明徳繼體莫非哲人今我頑鄙規範靡遵仍世載徳荒之予身莫峻匪岳有峻斯登莫髙匪雲有髙斯淩矧我成基匪克階升𤣥黄長坂載寐載興豈敢憚行哀此負乘芒芒髙山自予頽之濟濟徳義匪予懐之終銜永負予其媿而昔予言曠汜舟東川銜憂告辭揮淚海濵羲陽趣駕炎華電征自我不見邈哉八齡悠思迥望寤言通靈昔我徃矣辰在東嵎今我于兹日薄桑榆銜艱遘愍困瘁殷憂哀矣我世匪䝉靈休開元迄兹震興迭微弱風隠駭海水羣飛王旅南征闡耀靈威予昆乃播爰集朔土載離永久其毒太苦上帝休命駕言其歸多我遘愍振蕩朔垂羈繋殊俗初願用違嚴駕東征肅邁林野夕秣乗馬朝整僕旅矯矯乗馬載驅載馳漫漫長路或降或階晨風夙零朝不遑飢傾景儵墜夕不存罷雖有豐草匪釋奔駟雖有重隂匪遑假寐㷀㷀僕夫悠悠遄征經彼喬木有鳥嚶鳴徴物識儕矧伊有情樂兹棠棣實歡友生既至既覲滯思曠年曠年殊域覲未浹辰恨其永懐憂心孔艱天地永久命也難長生民忽霍曷云其常我之既存靡績靡紀乾坤難並寂焉其巳生若電激没若川征存愧松柏逝慚生靈匪吝性命實悼徒生茍克析薪豈憚冥冥瞻企皇極徼福上天冀我友生要期永年昔我先公邦國攸興今我家道綿綿莫承昔我昆弟如鸞如龍今我友生凋俊墜雄家哲永徂世業長終華堂傾構廣宅頽墉髙門降衡脩庭樹蓬感物悲懐愴矣其傷惇仁汜愛錫予好音睎光懐寳煥若南金披華玩藻曄若翰林詠彼清聲被之瑟琴味此殊響慰之予心𢎞懿忘鄙命之反覆敢投桃李以報珠玉冀憑光蓋編諸末錄贈鄭曼季四首谷風五章有序谷風懐思也君子在野愛而不見故作是詩言其懐思之也習習谷風扇此暮春𤣥澤墜潤靈爽烟煴髙山熾景喬木繁興蘭波清踴芳滸涼増感物興想念我懐人習習谷風載穆其音流瑩鼓物清塵拂林霖雨嘉播有渰淒隂歸鴻逝矣𤣥鳥來吟嗟我懐人其居樂潛明發有想如結予心習習谷風以溫以涼𤣥黄交泰品物含章潛介淵躍候鳥雲翔嗟我懐人在津之梁明發有思淩波褰裳習習谷風其集惟髙嗟我懐人於焉逍遙鸞栖髙岡耳想雲韶拊翼墜夕和鳴興朝我之思之言懐其休習習谷風其音孔嘉所謂伊人在谷之阿虎質山嘯龍輝淵蟠維南有箕匪休其和有捄斯畢俾爾滂沱懿厥河漢惟彼太華明發有懐我勞如何鳴鶴四章有序鳴鶴美君子也太平之世君子猶有退而窮居者樂天知命無憂無欲懐碩人之考槃傷有徳之遺世故作是詩也鳴鶴在隂戢其左翼肅雍和鳴在川之側假樂君子祚爾明徳思樂唐虞歸于其極嗟我懐人惟馨黍稷鳴鶴在隂其鳴喈喈垂翼蘭沼濯清芳池假樂君子其茂猗猗國之瑋寳有餐瓊瓌乃振褧裳襲爾好衣嗟我懐人啓襟以希鳴鶴在隂其儀藹藹謂天蓋髙和音于邁假樂君子篤膺俊乂穆風潛烈興雲戢薈徳茂當年時衍嘉㑹安得鞶藻改爾縞帶嗟我懐人心焉忼愾鳴鶴在隂載好其聲漸陸儀羽遵渚回涇假樂君子祚之篤生徳耀有穆如瑤如瓊安得風帆深濯爾纓景遺雲雨爾在北溟嗟我懐人惟用傷情南衡五章有序南衡美君子也言君子遯世不悶以徳存身作者思其以徳來仕又願言就之宿感白駒之義而作是詩焉南衡惟嶽峻極昊蒼瞻彼江湘惟水泱泱清和有合俊又以藏天保定爾茂以瓊光景秀濛汜頴逸扶桑我之懐矣休音峻揚穆穆休音有來爾雍沈波涌奥淵芳馥風傃虚養恬照日遺蹤考槃遵渚思樂潛龍我之懐矣寘爾華宫和璧在山荆林玉潤之子于潛清輝逺振克稱輶徳作寳有晉和聲在林羽儀未變我之懐矣有客來信風雲有作應通山淵清琴啓彈宫商乗絃類族知感有命自天夷叔希世猶謂比肩矧我與子姤㑹斯年我之懐矣在彼北林北林何有於煥斯文瓊瑰非寳尺牘成珍豐華非妙得意惟神河魴登俎遺答清川髙岡四章瞻彼髙岡有猗其桐允也君子實寳南江員規啓俗沈矩履方泳此明流清瀾川通陟彼衡林味其回芳馥馥回芳綢繆中原祁祁庶類薄采其芬棲遲泌丘容與衡門聲播東汜響溢南雲穆穆閶闔南端啓籥庶明以庸帝聽式闕有鳳于潛在林棲翮非予之作孰與好爵幽居玩物顧景自頥發憤潛帷㑂彿有思予美忘此終然胥來企予與言惟用作詩答孫顯世十章邈矣上祖垂休萬葉廣問𢎞被崇軌峻躡髙山克荒大川利涉繁藹惟祜風連雲接大人有作二后利見九功敷奏七徳殷薦鼎實重芳勞烈再扇奕世𢎞道天祿來宴道𢎞振古祚未替今如彼在川亦有浮沈大韶既素響非我音豈曰荒止塗弗克尋昌風改物豐水易瀾百川總紀四海合源在彼焉取聿來莫觀曽是褊心敢忘丘園員暉偏照𤣥澤謬盈發彼乗華頓此増城絶景靈雲倦遊紫庭匪曰能知實忝長纓煥矣金虎襲我皇猷孰云匪吝仰媿蒼流徃蹇來反弭迹一丘變彼東朝言即爾謀振振孫子洪族之紀志擬龍潛徳配麟趾引服朗節克明峻軌遵彼中臯於穆不已於穆不已大都是階之子于命民應如隤厚徳時邁協風允諧惠此海湄俾也可懐乃眷丘林樂哉何曲解紱被褐投印懐玉遺情春臺託䕃寒木言念伊人溫其在谷道俟人行辭以義輯和容過表余未云執惠音𢎞播清風駿集懐徳形憮臨篇景立失題八章悠悠縣象昭回太素清濁迭興升降啓度遺和既爽季春告暮朱明來思青陽受煦日征月盈天道變通太初陶物造化為功四月惟夏南征觀方凱風有集飄颻南忩思樂萬物觀異知同有渰萋萋甘雨未播黍稷方華中田多稼庭槐振藻園桃阿那薄言觀物在堂知化蓬户惟清玩物一室明發有懐念昔先哲通夢幽人彷彿遺烈清暉在天孰與永日乃啓遺籍恣予大觀幽居傲物顧景怡顔況惟解舞衡門重闗思媚古人有懐良盤沈曦含輝芳烈如蘭厥初生民有物有類自古有稱大寳以位烝徒式好駿奔攸遂啓予有聞誨爾達貴達貴伊何天爵無榮渾淪大昧混其濁清毁方遯象遺頑履貞道實蔵器景以昭形芒芒陋世奚競奚錯収彼紛華委之沖漠標志垂天矯心馮閣通好莊聃儀刑有作安得達人顧予命薄失題六章思樂芳林言采其菊蘅薄遵塗中原有菽登彼脩巒在林寤宿彷彿佳人清顔如玉予美亡此誰為適道容與俟之𤣥髮方皓躑躅山阿玩此芳草願飡其穎庶以遺老亹亹嘉時飄忽棄予有瞻逝深永歎潛滸登願扶桑仰結飛晷伊人匪存遺芳孰與精氣為物或降或升徂落攸徃神竒有登死生為徒存亡曷勝謂予不信遺籍有徴閒居外物靜言樂幽繩樞増結甕牖綢繆和神當春清節為秋天地則邇户庭已悠嗟彼懐人悠悠其潛念昔先烈有懐所欽駭情玩俗寶允南金瓊輝邈矣誰適為心明發興言忼慨芳林失題美哉良友禀徳坤靈明照逺鑒幽微研精超跡皇英質如瑶瓊贈我翰林示我丹誠道同契合體異心并自頃西徂合于五樓遲想歡憮觀我良疇亦既至止願言莫由室邇人隔中情則憂抱恨來遊神徃形留何以含忍寄之此詩何以寫思記之斯辭我心愛矣歌以贈之無秘爾音不我是貽失題有美一人芳問芬葩嗟我欽羨夢想光華亦既至止上下欣嘉徳馥秋蘭容茂春蘿淑似令娣惟予陋何雖有良友朽木難加愛樂朋規贈以斯歌皆能載之其美孔多嗟痛薄祜並罹哀苦堂構既崩過庭莫覩我悴西鄰子沈東土契濶艱辛誰與晤語身滯情徃神遊景處發夢宵寐以慰延佇答兄平原五言悠悠塗可極别促怨㑹長銜思善作恩戀行邁興言在臨觴南津有絶濟北渚無河梁神徃同逝感形留悲參商衡軌若殊迹牽牛非服箱答張士然行邁越長川飄颻冒風塵通波激枉渚悲風薄丘榛脩路無窮迹井邑自相循百城各異俗千室非良鄰歡舊難假合風土豈虚親感念桑梓域髣髴眼中人靡靡日夜逺眷眷懐苦辛為顧彦先贈婦四首我在三川陽子居五湖隂山海一何曠譬彼飛與沈目想清慧姿耳存淑媚音獨寐多逺念寤言撫空衿彼美同懐子非爾誰為心悠悠君行邁㷀㷀妾獨止山河安可踰永路隔萬里京室多妖冶粲粲都人子雅步擢纎腰巧笑發皓齒佳麗良可美衰賤焉足紀逺䝉眷顧言銜恩非望始翩翩飛蓬征郁郁寒水縈遊止固殊性浮沈豈一情隆愛結在昔信誓貫三靈秉心金石固豈從時俗傾美目逝不顧纎腰徒盈盈何用結中款仰指北辰星浮海難為水遊林難為觀容色貴及時朝華忌日宴皎皎彼姝子灼灼懐春粲西城善雅舞總章饒清彈鳴簧發丹脣朱絃繞素腕輕裾猶電揮雙袂如霧散華容溢藻幄哀響入雲漢知音世所希非君誰能讃棄置北辰星問此𤣥龍煥時暮復何言華落理必賤芙蕖綠房含青實金條懸白璆俯仰随風傾煒燁照清流漢魏六朝百三家集巻五十一
