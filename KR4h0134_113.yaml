body:
  text: 漢魏六朝百三家集巻一百十三王褒集題詞王子淵羈迹宇文寵班朝右及周汝南自陳來聘贈詩致書漢節楚冠凄凉在念又言覽九仙懷五嶽有飄遙遺世之感蓋外縻周爵而情切土風流離寄歎亦徐孝穆之報尹義尚庾子山之哀江南也瑯琊世胄文學名位照耀江左子淵又以蕭祭酒姻戚聲華萼附遂至王女下降國嫡用賓梁元削亂召列台端遭逢人地莫居其前然荆郢定都匡諫不力圍城督戎敗北隨降總文武之任蹈臣虜之譏末流不振賢者猶然昔曾祖仲寶劉宋國戚販附蕭齊士林交貶子淵委蛇乃其門風幸不至賣國耳周朝著作王庾齊稱其麗密相近而子淵微弱平日作燕歌行能盡塞北苦寒梁朝君臣競和其詞竟成符䜟今觀子淵詩文多燕歌類也建章樓閣長安陵樹傷心久矣目録詔赦詔省徴發詔立通道觀詔表百僚請立皇太子表上祥瑞表上新定鐘表啓謝賚馬啟謝賚絹啟書寄梁處士周𢎞讓書序象經序箴皇太子箴銘漏刻銘四瀆祠碑銘碑上庸公陸騰勒功碑靈壇碑二首太子太保中都公陸逞碑京師突厥寺碑善行寺碑温湯碑周太傅燕文公于謹墓碑周太保尉遲綱墓碑故陜州刺史馮章碑祭文為梁元帝祭王僧辯母貞敬太夫人文文周經藏願文幼訓樂府闗山篇從軍行二首長安有狹邪行飲馬長城窟輕舉篇凌雲臺出塞入塞闗山月長安道陌上桑明君詞遊俠篇古曲高句麗燕歌行日出東南隅行牆上難為趨詩九日從駕入朝守門開贈周處士別陸子雲奉和趙王途中五韻和張侍中㸔獵和庾司水修渭橋𤣥圃濬池臨泛奉和和從弟祐山家二首詠鴈送觀寧侯葬送劉中書葬別王都官送別裴儀同渡河北詠月贈人和殷廷尉嵗暮㸔鬭雞彈棊從駕北郊和趙王隠士始發宿亭山池落照詠霧應詔入闗故人別過藏矜道館明慶寺石壁雲居寺高嶺詠定林寺桂樹漢魏六朝百三家集巻一百十三目録欽定四庫全書漢魏六朝百三家集巻一百十三明張溥輯王褒集詔赦詔民生而靜純懿之性本均感物而遷嗜欲之情斯起雖復雲鳥殊世文質異時莫不限以隄防示之禁令朕君臨萬㝢覆養黎元思振頽綱納之軌式比因人有犯與衆棄之所在羣官有愆過者咸聽首露莫不輕重畢陳纎毫無隠斯則風行草偃從化無違導德齊禮庶幾可致但上失其道有自來矣凌夷之弊反本無由宜加蕩滌與民更始可大赦天下省徴發詔民亦勞止則星動于天作事不時則石言于國故知為政欲靜靜在寧民為治欲安安在息役頃興造無度徴發不已加以頻嵗師旅農畝廢業去秋災蝗年穀不登民有散亡家空杼軸朕每旦恭已夕愓兢懷自今正調以外無妄徴發庶時殷俗阜稱朕意焉立通道觀詔至道𢎞深混成無際體包空有理極幽𤣥但岐路既分派源逾逺淳離朴散形氣斯乖遂使三墨八儒朱紫交競九流七畧異説相騰道隠小成其來舊矣不有㑹歸爭驅靡息今可立通道觀聖哲微言先賢典訓金科玉篆祕蹟𤣥文所以濟養黎元扶成教義者竝宜𢎞闡一以貫之俾夫翫培塿者識嵩岱之崇崛守磧礫者悟渤澥之泓澄不亦可乎表百寮請立皇太子表臣聞洊雷居震春方應守器之禮明兩作離少陽纂重暉之業是以三善昭德載祀之祚克隆一人元良貞國之基永固至于軒轅得姓高陽才子上嗣佇賢前星虛位魯國公斌親居元子屬當儲貳具寮仰則列辟式瞻臣等參議請立為皇太子事隆監撫教資審諭問安寢門視膳天幄上祥瑞表明王孝治岳瀆所以效靈至人澤及風雲以之懸感是以若霧非霧天道叶至德之符似煙非煙觸石表嘉祥之氣𤣥黄蕭索之輝丹紫輪囷之狀豈止唐帝沈璧氣合金方姬后望河形如車蓋上新定鐘表萬物生象始乎筭數天道運行基乎步術量有輕重平以權衡音有清濁協乎律吕是以周發聽聲候春冬之生殺師曠吹律知晉楚之衰亡數始黄鍾琯終仲吕還宫變徴參天兩地三分損益累黍相乘四時發斂忽微斯測皇帝治厯明時推元受命八音七始之奏五聲六律之和斟酌繁簡分析節度推之以升斛正之以權衡稽之以古今覈之以經傳啓謝賚馬啟邊城無草來自東南塞外饒沙經從西北漢時樂府偏愛權奇晉世桑門特憐神駿黄金作勒足度西河白玉為鐙方傳南國儻逢漢帝仍駕鼓車若値魏王應驚香氣謝賚絹啟似逐安車之徴如輕殿中之對臣善識山川應圖方丈脱能臨水必不棄書書寄梁處士周𢎞讓書嗣宗窮塗楊朱岐路征蓬長逝流水不歸舒慘殊方炎凉異節木皮春厚桂樹冬榮想攝衞惟宜動靜多豫賢兄入闗敬承欵曲猶依杜陵之水尚保池陽之田鏟跡幽蹊銷聲窮谷何其愉樂幸甚幸甚弟昔因多疾亟覽九仙之方晩涉世途常懷五嶽之舉同夫闗令物色異人譬彼客卿服膺高士上經説道屢聽𤣥牝之談中藥養神每稟丹沙之説頃年事遒盡容髮衰謝芸其黄矣零落無時還念生涯繁憂總集視隂愒日猶趙孟之徂年負杖行吟同劉琨之積慘河陽北臨空思鞏縣霸陵南望還見長安所冀書生之魂來依舊壤射聲之鬼無恨他鄉白雲在天長離別矣㑹見之期邈無日矣援筆攬紙龍鍾横集序象經序一曰天文以觀其象天日月星是也二曰地理以法其形地水火金木土是也三曰隂陽以順其本陽數為先本于天隂數為後本于地是也四曰四時以正其序東方之色青其餘三色例皆如之是也五曰筭數以通其變俯仰則為天地日月星變通則為水火金木土是也六曰律吕以宣其氣在子取未在午取丑是也七曰八卦以定其位至震取兑至離取坎是也八曰忠孝以惇其教出則盡忠入則盡孝是也九曰君臣以事其禮不可以貴凌賤直而為曲不可以卑䙝尊隠而無犯是也十曰文武以成其務武論七德文表四教是也十一曰禮義以制其則居上不驕為下盡敬進退有度可法是也十二曰觀德以考其行定而後求義而後取時而後言樂然後笑是也或升進以報德義取遷善或黜退以貶過事在懲惡或以沈審為貴正其瞻視或以徇齊為功明其糾察得失表于隆替在賤必申怠敬彰于勸沮處尊思屈片言崇于拱璧一德踰于華袞箴皇太子箴有序臣聞教化爰始詠歌不足政俗既移風雅斯變伏惟皇明御宇功均造物改文為質斵雕成素皇太子洊雷居震明兩作離春夏干戈秋冬羽籥叔譽慙五稱之對師曠降四馬之恩竊以太史官箴虞書所誡永樹芳烈丞相所以垂文深覩安危太傅以之陳訓敢自斯義獻箴云爾天生蒸民司牧斯樹咸熈庶績式昭王度惠民垂統元良繼體麗止離暉惟機天啟令問令望聞詩聞禮從曰撫軍守曰監國秋坊通夢春宫養德桓榮獻書荀攸觀則元子為士齒卿命秩朝服寢門迴車作室正陽君位喬枝父道臣子所崇忠孝為寶勿謂居尊禍福無門勿謂親賢王道無偏無為慮始無為事先損之又損全之亦全無往不復無平不陂美疢甘言鮮不為累則哲惟難知人未易居室為善分隂無棄亡保其存危安其位神聽不惑天妭斯忌文昌著于前星秬鬯由于守器庶僚司箴敢告閽寺銘漏刻銘有序竊以混元開闢天迴地旋厯象運行暑來寒往二分同道烏靈正其昏夕兩至相遇表圭測其長短雖則晦朔先後失于公羊之説次舍盈縮惑于丘明之傳至乎出夘入酉黄道青緑季孟相推啟閉從序挈壺掌分數之令太史陳立成之法軍將以之懸井壺郎以之趍奏百王垂訓千祀餘烈者焉銘曰𤣥儀西運逝水東流甘川浴日深壑藏舟測兹祕象是曰神謀正震治厯下武惟周忽微以則積空成數圭表弗差光隂斯赴箭水無絶靈虬長注徑寸日輪四分天度器遵昔典景移新刻荆山既鐫昆吾且勒以福眉壽百王垂則四瀆祠碑銘靈祠嶽立貝闕雲浮寂寥詭怪髣髴神遊姬嬴分國河渭合流桃花春水靈草孤洲潼鄉河曲汾隂雎壤亂流不度龍門難上河魚送迎江妃來往水開通跡山臨髙掌智以藏往神以知來榮光離合雲氣徘徊水仙遺操津吏餘杯波息川后浪靖瞻臺碑上庸公陸騰勒功碑在昔洞庭彭蠡三苗有逺竄之君太室陽城九州無同姓之國是知周衞設險所務非山川河岳作固所寶惟休德至于三峽蹇産九折崢嶸髙峰尋雲深谷無景秦開漢閉雖阻荷㦸之虞魏塞晉通終因束馬之利我大周開闢宇宙混同文軌御六氣于天樞頓八紘于地絡彭濮未恭卭笮不討外憑劍道之難内負銅梁之阨大將軍上庸公仗國威靈奉辭伐罪長㦸萬隊巨艦千舳板楯酋豪斯褕君長厯稔逋冦累代稽誅廓清江源蕩滌巴濮若夫荆門千里蜀置永安之宫巴水三迴吳阻夷陵之縣巫峽使君之灘淪波洽没建平督郵之道棧徑威紆路阻蠻陬途横夷落擅强專險輕法侮史天子爰詔有司公奉天討星言載塗指日遄邁冊授公大將軍信州刺史韓信召拜軍中致設壇之禮衞青出征臨河聞後距之令夫鐘鼎大禮之器昭德必書金石不朽之質庸勲斯樹某等乃建碑于某地敢作頌云遐觀命氏眇求世禄龍圖紀河鴻漸于陸霸楚傳姓命吳啟族君子篤生降靈惟岳朝陽擢彩荆山曜璞巴庸自擅彭濮稱王南泊僰道西通夜郎内憑玉壘外阻銅梁介視荒服斗絶邊疆赫赫南仲堂堂方叔天子命我遐征越逐竇氏車騎去病冠軍封山刋石鐫銘刻勲逺隔年代懸感風雲盛德必祀千載斯文靈壇碑悠悠五緯乃欽若於堯典茫茫九州是致功于禹跡猶以天步懸逺𨽻首筭而弗窮地載遐荒章亥馳而未極浩庭霄度吐納天和崐閬滄溟胞胎元一九靈之府神液所以降祥五英之闕蓂華以之昭應推刼運之短長校河源之廣狹谷永上書譬流風之不繫桓譚作論明弱水之難航豈知迴天金簡惟傳上聖洞神玉䇿尚隔中仙于時金風戒辰三光澄曜香雨乘空天花入室帝乃升法座説𤣥言肴覆洞微闡揚衆玅洪鐘應叩衢樽待酌銘曰鐘鳴上界梵響𤣥宫紫辰濯水青樹揺風八覺修行七教𢎞通神機詣理秋毫坼空函席廣開法輪徐轉入神精義談天勝辨逐境晦明逗機深淺或照盛業方圓雲篆又雲橋啟館景曜開扉明庭朝禮僊館羽衣鷰履霄去鳧舄晨歸鍊石三轉燒丹七飛昆吾陶鑄丹陽鋈銑畫寫龍文圖開雕篆聲隨地氣調均天辯九宫方應萬靈稱善京師突厥寺碑夫六合之内存乎方冊四天之下聞諸象教百億閻浮塵沙筭而不盡三千日月世界數而無邊至於周星夕隕漢宫宵夢身髙梵世力減須彌應現十方分身百佛上極天中下窮地際轉法輪於稔國留玅象於罽賓至於善見神通缻沙瑞相波斯鑄金優填雕木莫不歸依等覺迴向佛乘棄形骸而入道捨國城而離俗突厥大伊尼温水汗夏后餘基惟天所置威加窮髮兵歴無革小大當戸左右賢王麟膠角觸之弓鷲羽射鵰之箭跨䓤嶺之酋豪靡不從化踰天山之君長咸皆賓屬人敦信契國寶親隣太祖文皇帝道被寰中化覃無外提羣品于萬福濟蒼生于六道大冢宰晉國公功髙寅亮位隆光輔命司空而度地監匠人而置臬帶三條之逸陌面九市之通鄽圖木緹錦雕楹礱密香隨微雨自灑風塵幡雜天花常調絲竹四禪大患凈界無毁六珠芬盡法身常住銘曰七華玅覺三空勝境意樹已彫心猿斯靜靈城偃色空衣滅影索隠窮源振衣提領善行寺碑蓋聞在天成象羣星仰于北辰在地成形百川起於東海是知璿璣盈縮竝運天樞江漢所宗爭環地軸塵沙日月同渤澥之輪迴百億鐵圍等閻浮之數量章亥步驟豈盡世界之邊𨽻首忽微寧窮刼海之筭象牛觕力方十行之階梯馬渡河譬三乘之等級定水壊須彌之山智炬然金剛之刹敬表六和現沙門之進止永垂四教示聲聞之律儀至於千疊火然鵠林變色四禪災起鴿影傳輝羽林出使漢開濯龍之祀桒門傳譯晉䖍洛陽之拜温湯碑原夫二儀開闢雷風以之通響五材運行水火因而竝用炎上作苦既麗純陽之德潤下作鹹且協凝隂之度至於遷陵熱谿沈魚涌浪炎洲燒地穴䑕含煙火井飛泉垂天逺扇焦源沸水衝流迸集甘州浴日跳波邁椒丘之野湯谷揚濤激水疾龍門之箭故以地伏流黄神泉愈疾云云其銘曰挺此温谷驪岳之隂白礬上徹丹砂下沈華清駐老飛流瑩心谷神不死川德愈深周太傅燕文公于謹墓碑古者六等官人師傅崇其匡輔一命作牧侯伯揔其專征南仲成薄伐之功吉甫作來歸之頌若乃仰叶宸曜上屬台階錫之以彝器明之以車服隆名盛業太傅燕國公其有焉西曄開其命緒東海傳其世禄父曽致平法之科廷尉稱無寃之頌駟馬方駕髙門繼軌公稟山岳之上靈含風雲之秀氣雕良玉於亷劌錬貞金于鍌鋈于時王業締搆國步權輿太祖地雖二分功猶再駕忠誠簡帝有志興王公運策帷帳參謀幕府封齊定文成之計間楚資曲逆之奇仲華訪輿地之圖林叔參兵車之右魏恭帝元年為大司冦正刑糾慝國無害馬之倫翦暴詰姦民亡飲羊之俗三刺薦無簡之文兩造陳禁邪之憲大周受命寶厯攸歸表髙惠之功臣紀山河之著命封燕公邑萬戸姬氏建國君奭始封昭王禮賢郭隗開館又授太傅本官如先保定五年賜金石樂一部公世為邊將少習兵書當敵制機臨戎應變増壘減竈之圖題樹繫桑之畧軍中罷戰無廢雅歌壯士志驕時觀投石及乎名髙衞霍爵重韓彭錫邑増于鄭僑賜乘同于魏絳丹節比司𨽻之貴緹騎將金吾之寵座闕倡歌之娛堂無鐘鼓之奏辭功坐樹不伐征西之勲還第角巾無競龍驤之賞銘曰惟岳降神膺期命世量苞川藪道𢎞兼濟昴宿協符佐旌㝠契匪躬諒直武節横厲函崤重險鐘鼎淪覆潛龍勿用瞻烏在屋道贊上台功匡下瀆條教斯理彝倫載睦懋官惟德明試以功既移上將實董元戎傳呼甚寵徽草載隆居髙能降處貴思沖寶命惟新王猷允塞爵班異姓禮均同德林胡以南易州之北帝曰爾諧俾侯燕國駸駸過隙滔滔逝川明哲詎寶館舍長捐立言不沒遺愛在旃三河斥土駟馬開泉丹旐毁宗𤣥堂啟殯寵贈虚加鸞和空引晏子悼齊隋武懷晉謂天蓋髙如何不憖周太保尉遲綱墓碑昔者王室藩屏周德謂之宗親列國諸侯異姓稱為伯舅元勲懿德姬崇齊楚之封疏爵疇庸漢重韓吳之秩司勲載其𢎞烈典冊備其徽章山甫式列辟之功紀迹廟器莊叔匡成獻之難昭德彞鼎鴻名盛業公實兼焉公命世挺生應期間出嵩華峻極降維嶽之上靈霜露所均體中和之秀氣危松擢本且觀後彫之質貞桂挺生便體冬華之秀是故以辰昴膺慶風雲𤣥感者焉公柔順内凝英華外發斧藻仁義珪璋令範危勁之節冠四序而踰秀堅貞之操經百錬而不銷加以逵門射法逺中㦸支養由箭神遥穿懸葉巧極將軍之伎精窮校尉之官及年踰艾服任隆台袞甲第當衢傳呼啟路不以寵貴驕人每以卑恭自牧易簀之言無忘寢瘵城郢之志終于瞑目銘曰珠角應期山廷表德出忠入孝自家刑國人物冠冕彞章表則任屬屯警官聨極侍行部六條議班三吏逝水詎停光隂不借遽辭逆旅俄悲怛化旌舒夏練棺陳衞幕北郭人稀西山景落三千不見九原誰作銘兹鼎鼐永傳嵩霍太子太保中都公陸逞碑銘公本居三吳郡三吳縣丞相遜後也宋武匡定鍾鼎底平涵洛公曽祖載實贊軍謀及返斾南轅以司武留守赫連作亂見拘夏州以江右名家為中山太守地既鮮虞途通靈壽呼沲易水仗武乘邊趙北燕南申威河外祖營州使君長於戎馬稱雄朔漠南中都督猶纘奕世之基西校國門無墜承家之業公識度深詳標尚閒逺處衆撝謙居簡行敬風鑒外明潛機内敏建章門戸張華立成原陵松栢虞延盡記昔處文房又居内職或傳氷華時遊甲邸魏祖軍謀還豫南陂之宴梁王師傅猶對宣室之談出内優隆通籍榮寵升降榮步便頌宫禁銘曰淮海惟揚具區之藪水朝江漢星纒牛斗盛德遺風神明厥後龍章八命鸞旂四牡賓階昔遇風月相思卿門今別宿草何悲輪環不已零落無時永矣元伯長從此辭故陜州刺史馮章碑其先陶唐氏之苗裔堯少子生而手有馮字因以為氏俾侯于魯義等房心之地余與之廣事符河汾之邑使君稟靈河嶽比德璁珩閨門和美譽聖開宗握文命氏濁水北流秦闗東徙巖險襟帶山河枕倚陸離組甲從容青紫祭文為梁元帝祭王僧辯母貞敬太夫人文維爾世基武子族懋陽元金相比映玉德齊温既稱女則兼循婦言書圖鏡覽辭章討論教貽爼豆訓及平原楚發將兵孟軻成德盡忠資敬自家刑國顯允其儀惟民之則反命師旅既修我戎補兹袞職奄有龜䝉母由子貴亶爾斯崇嘉命允集寵章既隆居髙能降處貴思冲慶資善始榮兼令終崦嵫既夕蒹葭蚤秋奔駟難返衝濤詎留背龍門而西顧過夏首而東浮越三宫之遐嶽經三江之派流鬱鬱増嶺浮雲蔽虧滔滔江漢逝者如斯銘旌故旐宇毁遺碑即虚舟而談奠想徂魂之有知嗚呼哀哉文周經藏願文蓋聞九河疏迹策藴靈丘四徹中繩書藏羣玉亦有青丘紫府三皇刻石之文緑檢黄繩六甲靈飛之字豈若如來祕藏譬彼明珠諸佛所師同夫淨鏡鹿苑四諦之法尼園八犍之文香山巨力豈云能負以嵗在昭陽龍集天井奉為云云奉造一切經藏始乎生滅之教訖于泥洹之説論議希有短偈長行責首銀函𤣥文玉匣陵陽餌藥止觀仙字闗尹望氣裁受𤣥言未有龍樹利根㸔題不遍斯陀淺行同座未聞盡天竺之音窮貝多之葉灰分八國文徙罽賓石盡六銖書還大海仰願過去神靈乘兹道力得無生忍具足威儀又願國祚遐長臣民休慶四方内附萬福現前六趣怨親同登正覺幼訓陶士行曰昔大禹不吝尺璧而重寸隂文士何不誦書武士何不馬射若乃𤣥冬修夜朱明永日肅其居處崇其牆仞門無糅雜坐闕號呶以之求學則仲尼之門人也以之為文則賈生之升堂也古者盤盂有銘几杖有誡進退循焉俯仰觀焉文王之詩曰靡不有初鮮克有終立身行道終始若一造次必於是君子之言歟儒家則尊卑等差吉凶降殺君南面而臣北面天地義也鼎俎奇而籩豆偶隂陽之義也道家則墮支體黜聰明棄義絶仁離形去智釋氏之義見苦斷習證滅循道明因辨果偶凡成聖斯雖為教等差而義歸汲引吾始乎幼學及于知命既崇周孔之教兼循老釋之談江左以來斯業不墜汝能修之吾之志也樂府闗山篇以下五言從軍出隴阪驅馬度闗山闗山恒掩藹髙峯白雲外遥望秦川水千里長如帶好勇自秦中意氣多豪雄少年便習戰十四已從戎遼水深難渡榆闗斷未通從軍行二首兵書久閑習征戰數曽經講戎平樂觀學戲一作覽劒羽林亭西征度疎勒東驅出井陘牧馬濱長渭營軍毒上涇平雲如陣色半月類城形羽書封信璽詔使動流星對岸流沙白縁河栁色青將幕恒臨斗旌門常背邢勲封瀚海石功勒燕然銘兵勢因麾下軍圖送掖庭誰憐下玉筯向暮掩金屏黄河流水急驄馬逺征人谷望河陽縣橋渡小平津年少多遊俠結客好輕身代風愁櫪馬胡霜宜角筋羽書勞警急邊鞍倦苦辛康居因漢使盧龍稱魏臣荒戍唯㸔栁邊城不識春男兒重意氣無為羞賤貧長安有狹邪行威一作逶紆狹邪道車騎動相喧博徒稱劇孟遊俠號王孫勢傾魏侯府交盡翟公門路邪勞夾轂塗艱倦折轅日斜宣曲觀春還御宿園塗歌楊栁曲巷飲榴花樽獨有遊梁倦一作客還守孝文園飲馬長城窟北走長安道征騎每經過戰垣臨八陣旌門對兩和屯兵戍隴北飲馬傍城阿雪深無復道氷合不生波塵飛連陣聚沙平騎跡多昏昏壠坻月耿耿霧中河羽林猶角觝將軍尚雅歌臨戎常拔劔䝉險屢提戈秋風鳴馬首薄暮欲如何輕舉篇天地能長久神仙壽不窮白玉東華檢方諸西岳童俄瞻少海北暫別扶桑東俯觀雲似蓋低望月如弓㸔棊城邑改辭家墟巷空流珠餘舊竈種杏發新叢酒釀瀛洲玉劔鑄昆吾銅誰能攬六博還當訪井公凌雲臺髙臺懸百尺中夕殊未窮北臨酸棗寺西眺明光宫城傍抵雙府林裏對相風書題鹿盧牓觀寫飛亷銅牕開神女電梁映美人虹虞捐濫天寵鄭瞀特懷忠莊生垂翠釣昭儀拒一作抵鬬熊馳輪有盈缺人道亦汙隆還念西陵舞非復鄴城中出塞一作塞下曲飛蓬似征客千里自長驅塞禽唯有雁闗樹但生榆背山㸔故疊繫馬識餘蒲還因麾下騎來送月支圖入塞戍久風塵色勲多意氣豪建章樓閣迥長安陵樹髙度氷傷馬骨經寒墜節旄行當見天子無假用錢刀闗山月闗山夜月明秋色照孤城影虧一作半形同漢陣輪滿一作全影逐胡兵天寒光轉白風多暈欲生寄言亭上吏遊客解鷄鳴長安道槐衢囘北第馳道度西宫樹隂連袖色塵影雜衣風採桑逢五馬停車對兩童喧喧許史座鐘鳴賓未窮陌上桑人傳陌上桑未曉已含光重重相䕃映軟弱自芬芳秋胡始倚馬羅敷未滿筐春蠶朝已老安得久徬徨明君詞蘭殿辭新寵椒房餘故情鴻飛漸南陸馬首倦西征寄書參漢使銜涕望秦城唯餘馬上曲猶作出闗聲遊俠篇英華作俠客行京洛出名謳豪俠競交遊河南期四姓闗西謁五侯鬭鷄横大道走馬出長楸桑隂徙將夕槐路轉淹留古曲一作雜曲青樓臨大道遊俠盡一作任淹留陳王金被馬秦女桂為鈎馳輪洛城巷鬬鷄南陌頭薄暮風塵起聊為清夜遊髙句麗六言蕭蕭易水生波燕趙佳人自多傾盃覆盌漼漼垂手奮袖婆娑不惜黄金用盡只畏白日蹉跎燕歌行七言初春麗景一作日鶯欲嬌桃花流水沒河橋薔薇花開百重葉楊栁拂地數千條隴西將軍號都䕶樓蘭校尉稱嫖姚自從昔別春燕分經年一去不相聞無復漢地闗山月一作長安月唯有漠北薊城雲淮南桂中明月影流黄機上織成文充國行軍屢築營陽史討虜陷平城城下風多能却陣沙中雪淺詎停兵屬國小婦猶年少羽林輕騎數征行遥聞陌頭採桑曲猶勝邊笳胡笳聲胡笳向暮使人泣長望一作還使閨中空佇立桃花落地杏花舒桐生井底寒葉疎試為來㸔上林雁應有遥寄隴頭書日出東南隅行以下雜言曉星西北沒朝日東南隅陽牕臨玉女蓮帳照金鋪鳯樓稱獨立絶世良所無鏡懸四龍網枕畫七星圖銀鏤明光帶金地織成襦調弦大垂手歌曲鳯將雛採桑三市路賣酒七條衢道逢五馬客夾轂來相趨將軍多事勢夫聓好形模髙箱照雲母壯馬飾當顱單衣火浣布利劔水精珠自知心所愛仕宦執金吾飛甍彫翡翠玉臺作翠羽繡桷畫屠蘇銀燭附彈映鷄羽黄金步揺動襜褕兄弟五日時來歸髙車竟道生光輝名唱兩行堂上起鴛鴦七十階前飛少年任俠輕年月珠丸出彈遂難追牆上難為趨昔稱梁孟子兼聞魯孔丘訪政聊為述問陳豈相詶末代多僥倖卿相盡經由臺郎百金價台司千萬求當朝少直筆趨代皆曲鈎廷尉十年不得調將軍百戰未封侯夜伏擁門作常伯自有蒲萄得涼州白璧求善價明珠難暗投髙牆不可踐井水自難浮風胡有年嵗銛利比吳鈎詩九日從駕以下五言黄山獵地廣青門官路長律改三秋節氣應九鐘霜曙影初分地暗色始成光髙斾長楸坂緹幕杏間堂射馬垂雙帶豐貂佩兩璜苑寒梨樹紫山秋菊葉黄華露霏霏冷輕飈颯颯涼終慙屬車對空假侍中郎入朝守門開梁簡文有守東華門開詩鳯池一作直城通複道嚴駕早凌晨鐵符行警曙銀棨未開闉塹暗城無影晴新路不塵屯兵引畫劍騎吹動班輪徒知仰睿藻抽辭殊未申贈周處士我行無嵗月征馬屢盤桓崤曲三危岨闗重九折難猶持漢使節尚服楚臣冠巢禽疑上幕驚羽畏虚彈飛蓬去不已客思漸無端壯志與時歇生年隨事闌百齡悲促命數刻念餘歡雲生隴坻黑桑疎薊北寒鳥道無蹊徑清漢有波瀾思君化羽翮要我鑄金丹别陸子雲藝文作别陸才子解纜出南浦征棹且凌晨還㸔分手處唯餘送别人中流揺葢影邊江落騎塵平湖開曙日細栁發新春滄波不可望行雲聊共因奉和趙王途中五韻飄飄映車幕出沒望連旗度雲還翊陣迴風即送師峽路沙如月山峯石似眉村桃拂紅粉岸栁被青絲錦城遥可望迴鞍念此時和張侍中看獵上林冬狩返囘中講射歸還登宣曲觀更獵黄山圍嚴冬桑柘慘寒霜馬騎肥緤盧隨兔起髙鷹接雉飛獨嗟來逺客辛苦倦邊衣和庾司水修渭橋東流仰天漢南渡似牽牛長堤通甬道飛梁跨造舟使者開金堰太守擁河流廣陵候濤水荆峽望陽侯波生從故舶沙漲湧新洲天星識辨對撿玉應沈鈎空悦浮雲賦非復採蓮謳𤣥圃濬池臨泛奉和長洲春水滿臨泛廣川中石壁如明鏡飛橋類飲虹垂楊夾浦緑新桃縁徑紅對樓還泊岸迎波蹔守風漁舟釣欲滿蓮房採半空於兹臨北闕非復坐牆東和從弟祐山家二首採藥名山頂時節無春冬散雲非一色連嵓異衆峯合沓似無徑間關定有蹤山牕臨絶頂檐溜俯危松空林鳴暮雨虚谷應朝鐘仙童時可遇羽客屢相逢若値韓衆藥當御長房龍結交非俗士仙侣自招攜少華隠日月太乙尋虹霓衆林積為籟圍竹茂成埤幽谷曙無景荒途晝欲迷滴瀝寒泉澑叫嘯秋猿啼白雲帝鄉起神禽丹穴棲箭篠時通徑桃李復成蹊今身得其所羣物可令齊詠鴈伺潮聞曙響妬壟有春翬豈若雲中鴈秋時塞外歸河長猶可涉海濶故難飛霜多聲轉急風疎行屢稀園池若可至不復怯虞機送觀寧侯葬䝉羽髙峻極淮泗導清源邢茅廣裂地跗萼盛開蕃紛綸彤艧彩從容瓊玉温衝飈揺栢榦烈火壯曽崐疇昔同羈旅辛苦涉涼暄觀風方聽樂垂淚遽傷魂造舟虚客禮髙閈掩賓垣桂樹思公子芳草惜王孫今晨向郊郭猶似背轘轅丹旐書空位素帳設虚樽楚琴南操絶韓詩舊説存西靡傷新樹東陵惜故園自憐悲谷影彌愴一作念玉闗門餘輝盡天末夕霧擁一作起山根平原㸔獨樹臯亭望列村寂寥還葢靜荒茫歸路昬挽鐸已流唱歌童行自喧睠言千載後誰將遊九原送劉中書葬昔別傷南浦今歸去北邙書生空託夢久客每思鄉塞近邊雲黑塵昏野日黄陵谷俄遷變松栢易荒涼題銘無復迹何處驗龜長別王都官連翩憫流客悽愴惜離羣東西御溝水南北㑹稽雲河橋兩堤絶横岐數路分山川遥不見懷袖逺相聞送別裴儀同河橋望行旅長亭送故人沙飛似軍幕蓬捲若車輪邊衣苦霜雪愁一作秋貌損風塵行路皆兄弟千里念相親渡河北苑詩類選作范雲者非秋風吹木葉還似洞庭波常山臨代郡亭障繞黄河心悲異方樂腸斷隴頭歌薄暮臨征馬失道北山阿詠月贈人月色當秋夜斜暉映薄帷上弦如半璧初魄似蛾眉渡雲光忽駛中天影更遲髙陽懷許掾對此益相思和殷廷尉嵗暮嵗晩悲窮律他鄉念索居寂寞灰心盡摧殘生意餘産空交道絶財殫密親疎空悲趙壹賦還著虞卿書㸔鬬鷄躞蹀始横行意氣欲相傾妬敵金芒起猜羣芥粉生入場疑挑戰逐退似追兵誰知函谷下人去獨開城彈棊投壺生電影六博値仙人何如鏡奩上自有拂輕巾隔澗疑將別隴頭如望秦握筆如思賦辭短竟無陳從駕北郊維皇敬明祀望拜出河東地靈開複道營星發紫宫衡街響清蹕偵候起相風森沈羽林騎肅穆虎賁弓和趙王隠士鳧鵠均長短鵬鷃共逍遥清襟藴秀氣虚席滿風飇斷絃唯續葛獨酌止傾瓢菖蒲九重節桑薪七過燒始發宿亭送人亭上別被馬櫪中嘶漠漠村烟起離離嶺樹齊落星侵曉沒殘月半山低闕山池落照竹館掩金扉池光晦晩暉孤舟隠荷出輕棹染苔歸浴禽時侣竄驚羽忽單飛闕詠霧應詔七條開早陌五里闇朝氛帶樓疑海氣含葢似浮雲方從河水上預奉緑圖文入闗故人別百年餘古樹千里闇黄塵闗山行就近相㸔成逺人過藏矜道館松古無年月鵠去復來歸石壁藤為路山牕雲作扉明慶寺石壁夏水懸臺際秋泉帶雨餘石生銘字長山久谷神虚雲居寺高嶺中峯雲已合絶頂日猶晴邑居隨望近風烟對眼生詠定林寺桂樹嵗餘彫晚葉年至長新圍月輪三五映烏生八九飛漢魏六朝百三家集巻一百十三
