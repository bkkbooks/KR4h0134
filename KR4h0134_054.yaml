body:
  text: 漢魏六朝百三家集卷五十四張協集目録賦洛褉賦都蔗賦安石榴賦元武館賦登北邙賦銘泰阿劒銘文身刀銘把刀銘長鋏銘短鋏銘霜陌刀銘手戟銘七七命詩詠史雜詩其二其三其四其五其六其七其八其九其十雜詩逰仙漢魏六朝百三家集卷五十四目録欽定四庫全書漢魏六朝百三家集卷五十四明張溥輯晉張協集賦洛褉賦夫何三春之令月嘉天氣之氤氲和風穆以布暢百卉曄而敷芬川流淸泠以汪濊原隰蔥翠以龍鱗遊魚瀺灂於淥波元鳥鼓翼於高雲美節慶之動物悅羣生之樂欣故新服之既成將褉除於水濱於是搢紳先生嘯儔命友携朋接黨冠童八九主希孔孟賓慕顔柳臨涯詠吟濯足揮手乃至都人士女奕奕祁祁車駕岬嵑充溢中逵粉葩翕習緣阿被湄振袖生風接衽成幃若夫權戚之家豪侈之族采騎齊鑣華輪方轂青蓋雲浮參差相屬集乎長洲之浦曜乎洛川之曲遂乃停輿蕙渚稅駕蘭田朱幔虹舒翠幕霓連羅樽列爵周以長筵於是布椒醑薦柔嘉祈休吉蠲百痾潄淸源以滌穢兮攬緑藻之纎柯浮素粧一作卯以蔽水灑元醪於中河都蔗賦若乃九秋良期一作朝元酎初出黃華浮觴酣飲纍日挫斯蔗而療渴共潄醴而含蜜淸滋津於紫梨流液豐於朱橘擇蘇妙而不逮何况沙棠與椰實安石榴賦考草木於方志覽華實於園疇窮陸産於苞貢嗟英奇於石榴耀靈葩於三春綴霜滋於九秋爾乃飛龍啓節揚飈扇埃含和澤以滋生鬱敷萌以挺栽傾柯遠擢沉根下盤繁莖篠密豐幹林攢揮長枝以揚緑披翠葉以吐丹流暉俯散迥回葩仰照爛若百枝並燃爀如烽燧俱燎皎如朝日晃若籠燭晞絳綵於扶桑接朱光於若木爾乃赬蕚挺蒂金牙承蕤蔭佳人之玄髻發窈窕之素姿遊女一顧傾城無鹽化為南威於是天漢西流辰角南傾芳實壘落月滿虧虛爰採爰收乃剖乃坼內憐幽以含紫外滴瀝以霞赤柔膚氷潔凝光玉瑩漼如氷碎泫若珠迸含淸泠之溫潤信和神以理性玄武館賦爾乃地勢夷敞既膏且腴環以翠林帶以赤渠尋厥先之攸基實張氏之舊墟何魏后之周覽遂築館而起廬既號玄武是曰石樓於是崇墉四匝豐厦詭譎爛若丹霞皎如素雪璀璨皓􅀈華璫四垂接棟連阿崥嵑參差朱户青鋪幽闥祕閨於是高樓特起竦峙岧嶤飛甍四注上槩浮霄直亭亭以孤立迎千里之清飈陽扉南啓隂軒北達春牖左開秋忩右豁仰視雲根俯臨天末木則楸梓夾路翁蔚如林洪幹十圍修之百尋闕登北邙賦陟巒邱之􅀈坻升逶迤之修坂回余車於峻嶺聊送目於四遠靈嶽鬱以造天連岡一作罔巖以蹇産伊洛混而東流帝居赫以崇顯山川汩其常兮萬物化而代轉何天地之難窮悼人生之危淺歎白日之西頽兮哀世路之多蹇於是徘徊絶嶺踟蹰步趾前瞻狼山却窺大坯東眺虎牢西睨熊耳邪亘天際旁極萬里莽眩眼以芒昧諒羣形之難紀臨千仞而俯看似遊身於雲霓撫長風以延佇想凌天而舉翮瞻冠蓋之一作以悠悠覩商旅之接枙爾乃地勢窊隆邱墟陂陀墳隴崴壘棊布星羅松林椮映以攢列玄木搜寥而振柯壯漢氏之所營望五陵之嵬峩喪亂起而啓壤一作敗壞僮豎登而作歌銘泰阿劒銘泰阿之劒世載一作濟其美淬以淸波礪一作斂以越砥如玉斯曜若影在水不運自肅率土從軌文身刀銘寶刀既成窮理盡妙繁文波迥回流光電照把刀銘奕奕名金昆吾遺璞裁為把刀利亞切玉時文斯偃含精內燭威助雖化武不可黷長鋏銘五才並建金作明威長鋏陸離弭凶防違素創霜厲溢景橫飛短鋏銘器用多品詭制殊觀亦有短鋏淸暉截爛昔在先朝戢兵靜亂惟皇寶之優而弗玩露陌刀銘露陌在服威靈遠振遵養時晦曜德崇信手戟銘錟錟雄戟淬金鍊剛名配越戟用過干將嚴鋒徑柲摛鍔耀芒柲御覽作校七七命沖漠公子含華隱耀嘉遁龍蟠文選作盤超文選作玩世高蹈遊心於浩然玩志乎衆妙絶景乎大荒之遐阻吞響乎幽山之窮奧於是徇華大夫聞而造焉乃整善本作勑雲輅驂飛黃越奔沙輾流霜凌扶搖之風躡堅氷之津旌拂霄堮軌出蒼垠天淸泠而無霞野曠朗而無塵臨重岫而攬轡顧石室而迥回輪遂適沖漠公子之所居其居也峥嶸幽藹蕭瑟虛玄溟海渾濩涌其後嶰谷㟹嶆張其前尋竹竦莖蔭其壑百籟羣鳴籠文選作聾其山衝飈發而迥回日飛礫起而麗一作灑非天於是登絶巘遡長風陳辨惑之辭命公子於巖中曰蓋聞聖人不卷道而背時智士不遺身而匿迹生必耀華名於玉牒殁則勒洪伐於金册今公子違世陸沉避地獨竄有生之歡滅資父之義廢愁洽百年苦溢千歲何異促鱗之遊汀濘短羽之棲翳薈今將榮子以天人之大寶悅子以縱性之至娛窮地而遊中天而居傾四海之歡殫九州之腴鑽屈轂之瓠解疏屬之拘子欲之乎公子曰大夫不遺來萃荒外雖在不敏敬聽佳話大夫曰寒山之桐出自太冥含黃鐘以吐幹據蒼岑而孤生既乃瓊巘嶒崚金岸崥崹左當風谷右臨雲溪上無凌虛之巢下無跖實之蹊搖刖峻挺茗邈嶕文選作苕嶢晞三春之溢露遡九秋之鳴飈雲一作氛雪寫其根霏霜一作雲封其條木既繁而後緑草未素而先凋於是構雲梯陟峥嶸翦蕤賓之陽柯剖大吕之隂莖營匠斫其朴伶倫均其聲器舉樂奏促調高張音朗號鐘韻淸繞梁追逸響於八風采奇律於歸昌啓中黃之妙文選作少宫發蓐收之變商若乃龍火西頽暄氣初收飛霜迎節高風送秋羇旅懷土之徒流宕百罹之儔文選作疇撫促柱則酸鼻揮危弦則涕流若乃追淸哇赴嚴節奏緑一作淥水吐白雪激楚迥回流風結悲蓂莢之朝落悼望舒之夕缺煢嫠為之劈摽孀老為之嗚咽王子拂纓而傾耳六馬噓天而仰秣此蓋音曲之至妙子豈能從我而聽之乎公子曰余病未能也大夫曰蘭宫祕宇雕堂綺櫳雲屏爛汗一作旰瓊璧青蔥應門八襲旋臺九重表以百常之闕圜以萬雉之墉爾乃嶢榭迎風秀出中天翠觀岑青彤文選作雕閣霞連長翼臨一作陵非雲飛陛凌山望玉繩而結極承倒景而開軒赬素炳煥枌栱嵯峨隂虯負簷陽馬承阿錯以瑤英鏤以金華方疏含秀圓井吐葩重殿疊起交綺對榥幽堂晝密明室夜朗焦螟飛而生風尺蠖動而成響若乃目厭常玩體倦帷幄携公子而雙遊時娛觀於林麓登翠阜臨丹谷華草錦繁飛采星燭陽葉春靑隂條秋緑華實代新承意恣觀一作歡仰折神虈俯採朝蘭遡惠風於蘅薄眷椒塗於瑤壇爾乃浮三翼戲中沚潛鰓􅀈驚翰起沈絲結飛矰理挂歸翮於赤霄之表出華鱗於紫潭善本作淵之裏然後縱棹五臣作棹隨風弭楫乘波吟孤竹拊雲和淵一作川客唱淮南之曲榜人奏采菱之歌歌曰乘鳬一作鷁舟兮為水嬉臨芳洲兮拔雲芝樂以忘戚遊以卒時窮夜為日畢歲為期此蓋宴居之浩麗子豈能從我而處之乎公子曰余病未能也大夫曰若乃白商素節月既授衣天凝地閉風厲霜飛柔條夕徑密葉晨稀將因氣以效殺臨金郊而講師爾乃列輕武整戎剛建雲髦啓雄芒駕紅陽之飛燕驂唐公之驌驦屯羽隊於外林縱輕翼於中荒爾乃張修罠布飛羉一作羅陵黃岑挂青巒畫長壑以為限帶流溪以為關既乃內無疏蹊外無漏迹叩鉦數一作散校舉麾旌獲彀金機馳鳴鏑翦剛豪落徑翮車一作連非騎競騖駢武齊轍翕忽揮霍雲回風􅍌聲動響飛形移景發舉戈林竦揮鋒電滅仰傾雲巢俯殫地穴乃有圓文之豜善作班題之豵一作􅚧鼓鬛風生怒目電暰口咬霜創足撥飛鋒齀林蹶石扣拔幽叢於是飛黃奮鋭賁育一作石逞技蹙封狶僨一作㩌疑訛馮豕拉甝虪挫獬豸句爪摧鋸牙捭瀾漫狼藉傾榛倒壑殞胔挂山僵踣掩澤藪為毛林隰為丹薄於是撤圍頓罔卷斾收鳶虞人數獸林衡計鮮論最犒勤息馬韜弦肴駟連鑣酒駕方軒千鍾電釂萬燧星繁陵阜霑流膏溪谷厭芳煙歡極樂殫回節而旋此亦畋遊之壯觀子豈能從我而為之乎公子曰余病未能也大夫曰楚之陽劒歐冶所營邪溪之鋌赤山之精銷踰羊頭鏷越煆成乃鍊乃鑠萬辟千灌豐隆奮椎飛廉扇炭神器化成陽文陰縵既乃善本無既乃二字流綺星連浮彩艷發光如散電質如耀雪霜鍔水凝氷創露潔形冠豪曹名珍巨闕指鄭則三軍白首麾晉則千里流血豈徒水截蛟龍一作鴻陸灑奔駟斷浮翮以為工絶重甲而稱利云爾而已哉若其靈寶則舒辟無方奇鋒異模形震薛燭光駭風胡價兼三鄉聲貴二都或馳名傾秦或夜飛去吳是以功冠萬載威曜無窮揮之者無前擁之者身雄可以從服九國橫制八戎爪牙景附函夏承風此蓋希世之神兵子豈能從我而服之乎公子曰余病未能也大夫曰天驥之駿逸態超越稟氣靈淵受精皎月眸瞷黑照元綵紺發沫如揮紅汗如振血秦青不能識其衆尺方堙不能覩其若滅爾乃巾雲軒踐朝霧赴春衢整秋御虯踊螭騰麟超龍翥望山載奔視林載赴氣盛怒發星飛電駭志陵九州勢越四海影不及形塵不暇起浮箭未移再踐千里爾乃踰天垠越地隔過汗漫之所不遊躡章亥之所未迹陽烏為之頓羽夸父為之投策斯蓋天下之俊乘子豈能從我而御之乎公子曰余病未能也大夫曰大梁之黍瓊山之禾唐稷播其根農帝嘗其華爾乃六禽殊珍四膳異肴窮海之錯極陸之毛伊公㸑鼎庖丁一作子揮刀味重九沸和兼勺藥晨鳬露鵠霜鵽黃雀圜按星亂方丈華錯封熊之蹯翰音之跖燕髀猩脣髦殘象白靈淵之龜萊黃之鮐丹穴之鷚元豹之胎燀以秋橙酷以春梅接以商王之箸承以帝辛之杯范公之鱗出自九溪頳尾丹鰓紫翼青鬐爾乃命支離飛雙鍔紅肌綺散素膚雪落婁子之毫文選作豪不能厠其細秋蟬之翼不能擬其薄繁肴既闋亦有嘉一作寒羞商山之果漢皋之楱一作榛析龍眼之房剖椰子之殼芳旨萬選承意代奏乃有荆南烏程豫北竹葉浮蟻星沸飛華蓱接玄石嘗其味儀氏進其法傾罍一朝可以流湎千日單醪投川可使三軍告捷斯人神之所歆羡觀聽之所煒曄也子豈能強起而御之乎公子曰耽爽口之饌甘臘毒之味服腐腸之藥御亡國之器雖子大夫之所榮顧亦吾人之所畏余病未能也大夫曰蓋有晉之融皇風也金華啓徴大人有作繼明代照配天光宅其基德也隆于姬公之處岐其垂仁也富乎有殷之在毫南箕之風不能暢其化離畢之雲無以豐其澤皇道煥炳一作昭煥帝載緝熙導氣以樂宣德以詩文選作語教淸於雲官之世政一作治穆乎鳥紀之時王猷四塞函夏謐寧一作靜丹冥投烽靑徼釋警却馬於糞車之轅銘德於昆吳之鼎羣氓反素時文一作人載郁耕父推畔漁豎讓陸樵夫恥危冠之飾輿臺笑短後之服六合時雍巍巍蕩蕩玄齠巷歌黃髮擊壤解羲皇之繩錯陶唐之象若乃華裔之夷流荒之貊語不傳於輶軒地不被乎正朔莫不駿奔稽顙委質重譯于時昆蚑感惠無思不擾苑戲九尾之禽囿棲三足之烏鳴鳯在林夥於黃帝之園有龍遊淵盈於孔甲之沼萬物煙煴天地交泰義懷靡內化感無外林無被褐山無韋帶皆象刻於百工兆發乎靈蔡縉紳濟濟軒冕藹藹功與造化爭流德與二儀比大言未終公子蹶然而興曰鄙夫固陋守兹文選作此狂狷蓋理有毁之而爭寶之訟解言有怒之而齊王之疾痊向子誘我以聾耳之樂棲我以蔀家之屋田遊馳蕩利創駿足既老氏之攸戒非吾人之所欲故靡得而應子至聞皇風載韙時聖道淳舉實為秋摛藻為春下有可封之人一作民上有大哉之君余雖不敏請尋一作從後塵詩詩品云張協詩其源出於王粲文體華淨少病纍又巧構形似之言雄於潘嶽靡於太沖風流調達實曠代之高手詞采蔥蒨音韻鏗鏘使人味之亹亹不倦詩譜云逐句煆鍊辭工製率詠史昔在西京時朝野多歡娛藹藹東都門羣公祖二疏朱軒曜金城供帳臨長衢達人知止足遺榮忽如無抽簮解朝衣散髮歸海隅行人為隕涕賢哉此大文選作丈夫揮金樂當年歲暮不留儲顧謂四座賔多財為纍愚淸風激萬代名與天壤俱咄此蟬冕客君紳宜見書雜詩秋夜涼風起淸氣蕩暄濁蜻蛚吟階下飛蛾拂明燭君子從遠役佳人守煢獨離居幾何時鑽燧忽改木房櫳無行迹庭草萋以緑靑苔依空牆蜘蛛網四屋感物多所懷沈憂結心曲其二大火流坤維白日馳西陸浮陽映翠林迥回飈扇緑竹飛雨灑朝蘭輕露棲叢菊龍蟄暄氣凝天高萬物肅弱條不重結芳蕤豈再馥人生瀛海內忽如鳥過目川上之歎逝前修以自朂其三金風扇素節丹霞啓隂期騰雲似涌煙密雨如散絲寒花發黃采一作彩秋草含緑滋間居玩萬物離羣戀一作念所思案無蕭氏牘庭無貢公綦高尚遺王侯道積是成基至人不嬰物餘風足染時其四朝霞迎白日丹氣臨暘一作湯谷翳翳結繁雲森森散雨足輕風摧徑草凝霜竦高木密葉日夜疏叢林森如束疇昔嘆時遲晚節悲年促歲暮懷百憂將從季主卜其五昔我資章甫聊以適諸越行行入幽荒歐一作甌駱從祝髮窮年非所用此貨將安設瓴甋夸璵璠魚目笑明月不見郢中歌能否居然别陽春無和者巴人皆下節流俗多昏迷此理誰能察其六朝登魯陽關狹路峭且深流澗萬餘丈圍木數千尋咆虎響窮山鳴鶴聒空林凄風為我嘯百籟坐自吟感物多思情在險易常心朅來戒不虞挺轡越飛岑王陽驅九折周文走岑崟經阻貴勿遲此理著來今其七此鄉非吾地此郭非吾城羇旅無定心翩翩如懸旌出覩軍馬陳入聞鞞鼓聲常懼羽檄飛神武一朝征長鋏鳴鞘中烽火列邊亭舍我衡門衣更被縵胡纓疇昔懷微志帷幕竊所經何必操干戈堂上有奇兵折衝樽爼間制勝在兩楹巧遲不足稱拙速乃垂名其八述職投邊城羇束戎旅間下車如昨日望舒四五圓借問此何時胡蝶飛南園流波戀舊浦行雲思故山閩越衣文蛇胡馬願度燕風土文選作土風安所習由來有固然其九結宇窮岡曲耦耕幽藪陰荒庭寂以間幽一作山岫峭且深凄風起東谷有淹興南岑雖無箕畢期膚寸自成霖澤雉登壟雊寒猿擁條吟溪壑無人迹荒楚鬱蕭森投耒循岸垂時聞樵採音重基可擬志迥回淵可比心養真尚無為道勝貴陸沈遊思竹素園寄辭翰墨林其十墨蜧躍重淵商羊儛野庭飛廉應南箕豐隆迎號屏雲根臨八極雨足灑四溟霖瀝過二旬散漫亞九齡階下伏泉涌堂上水衣生洪潦浩方割人懷昏墊情沈液潄陳根緑葉腐秋莖里無曲突煙路無行輪聲環堵自頽毁垣閭不隱形尺燼重尋桂紅粒貴瑤瓊君子守固窮在約不爽貞雖榮田方贈慙為溝壑名取志於陵子比足一作之黔婁生此首江淹雜擬所為張黃門苦雨者也雜詩太昊啓東節春郊禮靑祗鷹化日夜分雷動寒暑離飛澤洗冬條浮飈解春澌采虹纓高雲文虬鳴隂池沖氣扇九垠蒼生衍四垂時至萬寶成化周天地移遊仙峥嶸元圃深嵯峨天嶺峭亭館籠雲構修梁流三曜蘭葩蓋嶺披淸風緣隟嘯漢魏六朝百三家集卷五十四
