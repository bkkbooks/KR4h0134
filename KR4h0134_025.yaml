body:
  text: 漢魏六朝百三家集卷二十五目録魏文帝集目録樂府卷二臨高臺釣竿十五陌上桑短歌行猛虎行燕歌行二首秋胡行二首善哉行二首同前二首丹霞蔽日行折楊栁行飲馬長城窟行上留田行大牆上蒿行艷歌何嘗行煌煌京洛行月重輪行詩黎陽作二首黎陽作於譙作孟津芙蓉池作於𤣥武陂作至廣陵於馬上作雜詩二首清河作清河見挽船士新婚與妻别作黎陽作寡婦令詩於明津作失題見挽船士兄弟辭别詩補遺夏日詩遊獵詩歌辭董逃行遺句漢魏六朝百三家集卷二十五目録欽定四庫全書漢魏六朝百三家集卷二十五明張溥輯魏文帝集樂府詩品云文帝詩源出於李陵頗有仲宣之體則所計百許篇率皆鄙質如偶語惟西北有浮雲十餘首殊美瞻可玩始見其工矣不然何以銓衡羣彥對揚厥弟者耶詩譜云自然浮俊后山詩話云魏文帝曰文以意為主以氣為輔以詞為衛子桓不足以及此其能有所傳乎藝苑巵言云子桓小藻自是樂府本色臨髙臺詩紀云此曲三假辭不相屬鵠欲南遊以下乃古辭飛鵠行也漢曲大略意同臨臺行髙髙以軒下有水清且寒中有黃鵠往且翻行為臣當盡忠願令皇帝陛下三千歲宜居此宫鵠欲南遊雌不能隨我欲躬銜汝口噤不能開欲負之毛衣摧頽五里一顧六里徘徊釣竿崔豹古今注云釣竿者伯常子避仇河濵為漁者其妻思之而作也每至河側輒歌之後司馬相如作釣竿詩遂傳為樂曲漢辭今亡東越河濟水遙望大海涯釣竿何珊珊魚尾何篩篩行路之好者芳餌欲何為十五古今樂録云十五歌文帝辭後改歌瑟調西山此似未全登山而逺望溪谷多所有楩柟千餘尺衆草芝盛茂華葉耀人目五色難可紀雉雊山雞鳴虎嘯谷風起號羆當我道狂顧動牙齒陌上桑棄故鄉離室宅逺從軍旅萬里客披荆棘求阡陌側足獨窘步路局苲虎豹嘷動雞驚禽失羣鳴相索登南山奈何蹈盤石樹木叢生鬱差錯寢蒿草蔭松柏涕泣雨靣霑枕席伴旅單稍稍日零落惆悵竊自憐相痛惜短歌行古今樂録云王僧䖍技録曰短歌行仰瞻一曲此曲聲製最美辭不可入樂府仰瞻帷幕俯察几筵其物如故其人不存一解神靈倐忽棄我遐遷靡瞻靡恃泣涕連連二解呦呦遊鹿銜草鳴麑翩翩飛鳥挾子巢棲三解我獨孤焭懷此百離憂心孔疚莫我能知四解人亦有言憂令人老嗟我白髮生一何蚤五解長吟永歎懷我聖考曰仁者壽胡不是保六解魏右一曲晉樂所奏筝魏遺令節朔奏樂魏文製此辭自撫和歌歌者云貴官彈筝此也猛虎行與君媾新歡託配於二儀充列於紫微升降焉可知梧桐攀鳯翼雲雨散洪池燕歌行秋風蕭瑟天氣涼草木搖落露為霜一解羣䴏辭歸鴈南翔念君客遊多思腸二解慊慊思歸戀故鄉君何淹留寄他方三解賤妾焭焭守空房憂來思君不敢忘四解不覺淚下霑衣裳援琴鳴絃發清商五解短歌微吟不能長明月皎皎照我牀六解星漢西流夜未央牽牛織女遙相望爾獨何辜限河梁七解右多思腸一作思斷腸一曲晉樂所奏同前别日何易㑹日難山川悠逺路漫漫鬱陶思君未敢言寄聲浮雲往不還涕零雨面毁容顔誰能懷憂獨不歎展詩清歌聊自寬樂往哀來摧肺肝耿耿伏枕不能眠披衣出户步東西悲風清厲秋氣寒羅幃徐動經秦軒仰看星月觀雲閒飛鶬晨鳴聲可憐留連顧懷不能存右一曲夲辭秋胡行堯任舜禹當復何為百獸率舞鳯皇來儀得人則安失人則危唯賢知賢人不易知歌以詠言誠不易移鳴條之役萬舉必全明德通靈降福自天泛泛緑池中有浮萍寄身流波隨風靡傾芙蓉含芳菡蓞垂榮朝采其實夕佩其英采之遺誰所思在庭雙魚比目鴛鴦交頸有美一人婉如清揚知音識曲善為樂方右曲一作浮萍篇有美四句又見善哉行同前朝與佳人期日夕殊不來嘉肴不嘗㫖酒停杯寄言飛鳥告余不能俯折蘭英仰結桂枝佳人不在結之何為從爾何所之乃在大海隅靈若道言貽爾明珠企豫望之步立躊躇佳人不來何得斯須善哉行上山採薇薄暮苦饑溪谷多風霜露沾衣一解野雉羣雊猿猴相追還望故鄉鬱何壘壘二解髙山有崖林木有枝憂來無方人莫之知三解人生如寄多憂何為今我不樂歲月如馳四解湯湯川流中有行舟隨波回轉有似客遊五解䇿我良馬被我輕裘載馳載驅聊以忘憂六解日歲一作如一作其其二有美一人婉如清揚妍姿巧笑和媚心腸知音識曲善為樂方哀絃微妙清氣含芳流徴激楚度宫中商感心動耳綺麗難忘離鳥夕宿在彼中洲延頸鼓翼悲鳴相求眷然顧之使我心愁嗟爾昔人何以忘憂同前初學記載第一解題云於講堂作朝日樂相樂酣飲不知醉悲絃激新聲長笛吐清氣一解絃歌感人腸四坐皆歡悅寥寥髙堂上涼風入我室二解持滿如不盈有德者能卒君子多苦心所愁不但一三解慊慊下白屋吐握不可失衆賔飽滿歸主人苦不悉四解比翼翔雲漢羅者安所羇冲靜得自然榮華何足為五解同前藝文類聚作銅雀園詩朝遊髙臺觀夕宴華池陰大酋奉甘醪狩人獻嘉禽一解齊倡發東舞秦筝奏西音有客從南來為我彈清琴二解五音紛繁㑹撫者激微吟淫魚乘波聽踴躍自浮沈三解飛鳥翻翔舞悲鳴集北林樂極哀情來寥亮摧肝心四解清角豈不妙德薄所不任大哉子野言弭絃且自禁五解晉右二曲魏樂所奏丹霞蔽日行丹霞蔽日采虹垂天谷水潺潺木落翩翩孤禽失羣悲鳴雲間月盈則沖華不再繁古來有之嗟我何言折楊柳行藝文作游仙詩古樂府作長歌行西山一何高高髙殊無極上有兩仙僮不飲亦不食與我一丸藥光耀有五色一解服藥四五日身輕生羽翼輕舉乘浮雲倐忽行萬億流覽觀四海茫茫非所識二解彭祖稱七百悠悠安可原老聃適西戎於今竟不還王喬假虛辭赤松垂空言三解逹人識真僞愚夫好妄傳追念往古事憒憒千萬端百家多迂怪聖道我所觀四解曲右一魏晉樂所奏子古今詩話云相州棲霞谷喬順二服飛龍藥十年不飢飲馬長城窟行此闕未全浮舟橫大江討彼犯荆虜武將齊貫錍征人伐金鼓長㦸十萬隊幽冀百石弩發機若雷電一發連四五上留田行居世一何不同上留田富人食稻與粱上留田貧子食糟與糠上留田貧賤亦何傷上留田祿命懸在蒼天上留田今爾歎息將欲誰怨上留田大牆上蒿行古今樂録云王僧䖍技録有大牆上蒿行今不歌陽春無不長成草木羣類隨大風起零落若何翩翩中心獨立一何焭四時舍我驅馳今我隱約欲何為人生居天壤閒忽如飛鳥棲枯枝我今隱約欲何為適君身體所服何不恣君口腹所嘗冬被貂鼲溫暖夏當服綺羅輕涼行力自苦我將欲何為不及君少壯之時乘堅車䇿肥馬良上有倉浪之天今我難得久來視下有蠕蠕之地今我難得久來履何不恣意遨遊從君所喜帶我寶劒今爾何為自低卬悲麗平壯觀白如積雪利若秋霜駮犀標首玉琢中央帝王所服辟除凶殃御左右奈何致福祥吳之辟閭越之步光楚之龍泉韓有墨陽苖山之鋌羊頭之鋼知名前代咸自謂麗且美曽不知君劍良綺難忘冠青雲之崔嵬纎羅為纓飾以翠翰既美且輕表容儀俯仰垂光榮宋之章甫齊之髙冠亦自謂美蓋何足觀排金鋪坐玉堂風塵不起天氣清涼奏桓瑟舞趙倡女娥長歌聲協宫商感心動耳蕩氣回腸酌桂酒繪鯉魴與佳人期為樂康前奉玉巵為我行觴今日樂不可忘樂未央為樂常苦遲歲月逝忽若飛何為自苦使我心悲豔歌何嘗行宋書作古辭樂府作文帝何嘗快獨無憂但當飲醇酒炙肥牛一解長兄為二千石中兄被貂裘二解小弟雖無官爵鞍馬往來王侯長者遊三解但當在王侯殿上快獨摴蒱六博坐對彈碁四解男兒居世各當努力䠞迫日暮殊不久留五解少小相觸抵寒苦常相隨忿恚安足諍吾中道與卿共别離約身奉事君禮節不可虧上慙倉浪之天下顧黃口小兒奈何復老心皇皇獨悲誰能知少小下為趨曲前為豔煌煌京洛行古今樂録云王僧䖍技録云煌煌京洛行歌文帝園桃一篇樂府解題云晉樂奏文帝夭夭園桃夭夭園桃無子空長虛美難假偏輪不行一解淮陰五刑鳥盡弓藏保身全名獨有子房大憤不收褒衣無帶多言寡誠祇令事敗二解蘇秦之說六國以亡傾側賣主車裂固當賢矣陳軫忠而有謀楚懷不從禍卒不救三解禍夫吳起智小謀大西河何健伏尸何劣四解嗟彼郭生古之雅人智矣燕昭可謂得臣峩峩仲連齊之髙士北辭千金東蹈滄海五解月重輪行三辰垂光照臨四海煥哉何煌煌悠悠與天地久長愚見目前聖覩萬年明暗相絶何可勝言詩黎陽作二首朝發鄴城夕宿韓陵霖雨載塗輿人困窮載馳載驅沐雨櫛風舍我髙殿何為泥中在昔周武爰暨公旦載主而征救民塗炭彼此一時惟天所讚我獨何人能不靖亂其二殷殷其雷濛濛其雨我徒我車涉此艱阻遵彼洹湄言刈其楚班之中路塗潦是御轔轔大車載低載昻嗷嗷僕夫載仆載僵蒙塗冒雨沾衣濡裳黎陽作千騎隨風靡萬騎正龍驤金鼓震上下干戚紛縱橫白旄若素霓丹旗發朱光追思太王德胥宇識足臧經厯萬歲林行行到黎陽於譙作清夜延貴客明燭發髙光豐膳漫星陳㫖酒盈玉觴絃歌奏新曲遊響拂丹梁餘音赴迅節慷慨時激揚獻酬紛交錯雅舞何鏘鏘羅纓從風飛長劒自低昂穆穆衆君子和合同樂康餘一作繫孟津良辰啓初節髙㑹構歡娛通天拂景雲俯臨四達衢羽爵浮象樽珍膳盈豆區清歌發妙曲樂正奏笙竽曜靈忽西邁炎燭繼望舒翊日浮黃河長驅旋鄴都芙蓉池作乘輦夜行遊逍遙步西園雙渠相溉灌嘉木繞通川卑枝拂羽蓋修條摩蒼天驚風扶輪轂飛鳥翔我前丹霞夾明月華星出雲間上天垂光彩五色一何鮮壽命非松喬誰能得神仙遨遊快心意保巳終百年於𤣥武陂作兄弟共行遊驅車出西城野田廣開闢川渠互相經黍稷何鬱鬱流波激悲聲菱茨覆緑水芙蓉發丹榮柳垂重蔭緑向我池邊生乘渚望長洲羣鳥歡譁鳴萍藻泛濫浮淡淡隨風傾忘憂共容與暢此千秋情至廣陵於馬上作外編云廣陵觀兵魏志黃初六年十月行幸廣陵故城臨江觀兵戎卒十餘萬旌旗數百里帝於馬上為詩是歲大寒水舟不得入江乃引還觀兵臨江水水流何湯湯戈矛成山林𤣥甲耀日光猛將懷暴怒膽氣正縱橫誰云江水廣一葦可以航不戰屈敵虜戢兵稱賢良古公宅岐邑實始翦殷商孟獻營虎牢鄭人懼稽顙充國務耕殖先零自破亡興農淮泗間築室都徐方量宜運權略六軍咸恱康豈如東山詩悠悠多憂傷僧晈然云魏文軍至揚子見洪濤浪洶歎曰固天所以隔南北也賦詩而還魏文集無此詩且魏文雄才智略本非庸主如何有此示弱於孫權取笑於劉備陳壽謬矣按夀正史但云引還不言賦詩魏書注載此詩未嘗示弱也豈客子常畏人邪雜詩魏書不載雜詩二首集云枹中作下篇云於黎陽作吕延濟以此詩未即位方為漢征伐李善云當時實至廣陵則此與馬上詩為同時矣今觀棄置詩與天隔南北意合或近是耳漫漫秋夜長烈烈北風涼展轉不能寐披衣起倣徨倣徨忽巳久白露沾我裳俯視清水波仰看明月光天漢回西流三五正縱橫草蟲鳴何悲孤鴈獨南翔鬱鬱多悲思綿綿思故鄉願飛安得翼欲濟河無梁向風長歎息斷絶我中腸其二西北有浮雲亭亭如車蓋惜哉時不遇適與飄風㑹吹我東南行行行至吳㑹吳㑹非我鄉安得久留滯棄置勿復陳客子常畏人藝苑巵言云讀子桓客子常畏人及答吳朝歌鐘大理書似少年美資負才性而好貨好色且當不得恆享者桓靈寶技藝差相埓而氣尚過之子桓乃得七年天子都所不解清河作方舟戲長水湛淡自浮沈絃歌發中流悲響有餘音音聲入君懷悽愴傷人心心傷安所念但願恩情深願為晨風鳥雙飛翔北林湛淡藝文作淡淡悲響有餘音一作悲風漂餘音清河見挽船士新婚與妻作别藝文作徐幹為挽船士與新娶妻别玉臺作文帝今從之與君結新婚宿咱當别離涼風動秋草蟋蟀鳴相隨洌洌寒蟬吟蟬吟抱枯枝枯枝時飛揚身體忽遷移不悲身遷移但惜歲月馳歲月無窮極㑹合安可知願為雙黃鵠此翼戲清池黎陽作奉辭討罪遐征晨過黎山巉峥東濟黃河金營北觀故宅頓傾中有髙樓亭亭荆棘繞蕃叢生南望果園青青霜露慘悽宵零彼桑梓兮傷情寡婦友人阮元瑜早亡傷其妻孤寡為作此詩霜露紛兮交下木葉落兮淒淒侯鴈呌兮雲中歸燕翩兮徘徊妾心感兮惆悵白日急兮西頽守長夜兮思君魂一夕兮九乖悵延佇兮仰視星月隨兮天迥徒引領兮入房竊自憐兮孤悽願從君兮終沒愁何可兮久懷思君一作君思令詩漢獻帝傳云太史丞許芝條上魏王代漢圗䜟王下令辭其詩在令中喪亂悠悠過紀白骨從橫萬里哀哀下民靡恃吾將佐時整理復子明辟致仕於明津作遙遙山上亭皎皎雲間星逺望使心懷遊子戀所生驅車出北門遙望河陽城古辭長歌行與此同後有六句云凱風吹長棘夭夭枝葉傾黃鳥飛相追咬咬㺯音聲竚立望西河泣下沾羅纓失題見藝文麞部巾車出鄴宫挍獵東橋津重置施密網罕畢飄如雲彎弓忽髙馳一發連雙􅍪後闕見挽船士兄弟辭别詩舍我故鄉客將適萬里道妻子牽衣𬒮落淚霑懷抱後闕漢魏六朝百三家集卷二十五
