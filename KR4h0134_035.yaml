body:
  text: 漢魏六朝百三家集卷三十五魏嵇康集題詞嵇辭清峻阮㫖遙深兩家詩文定論也叔夜著文論六七萬言唐志猶有十五卷今存者僅若此殆百一耳然視建安諸子篇章雕落斯又巋然大部矣家誡小心篤誨酒坐語言兢兢集木獨以柳下踞鍛傲睨鍾㑹竟遭譛死東漢馬文淵誡其兄子效龍伯高母效杜季良足稱至慎善保家門而薏苡一車妻孥草索怨謗之來非人所意凡性不近物者勉為抑損終與物乖中散絶交巨源非惡山公於當世人事誠不耐也書中自序蓬首垢面懶癖入真阮嗣宗口不臧否亦心知師之卒不能學人實不宜仕宦强衣被之適速死耳集中大文諸論為高諷養生而達莊老之㫖辨管蔡而知周公之心其時役役司馬門下者非惟不能作亦不能讀也范升繫獄楊政肉袒道旁哀泣請命明主立釋叔夜將刑東市太學生三千人求為師不許抱卧龍之姿攖僣臣之忌其死也正以此耳贈兄詩云雖曰幽深豈無顛沛幽憤詩云縶此幽阻實恥訟寃夫人身隱矣而禍猶隨之禍至而復不欲與直也不死安歸乎廣陵散絶弊在用光鍾士季吕長悌獸睡耳豈能殺叔夜者哉目録賦琴賦有序懷香賦序書與山巨源絶交書與吕長悌絶交書設難卜疑集論釋私論養生論答難養生論聲無哀樂論難宅無吉凶攝生論答釋難宅無吉凶攝生論難自然好學論明膽論管蔡論贊原憲贊襄城童贊司馬相如贊許由贊井丹贊琴贊針太師針誡家誡樂府秋胡行七首詩幽憤詩雜詩贈秀才入軍十九首酒㑹詩七首答二郭三首與阮德如遊仙詩述志詩二首惟上古堯舜唐虞世道治知慧用名與身孰親生生厚昭咎名行顯患滋東方朔至清楚子文善仕老萊妻賢名嗟古賢原憲思親詩琴歌漢魏六朝百三家集卷三十五目録欽定四庫全書漢魏六朝百三家集卷三十五明張溥輯魏嵇康集賦琴賦有序余少好音聲長而玩之以為物有盛衰而此無變滋味有厭而此不倦可以導養神氣宣和情志處窮獨而不悶者莫近於音聲也是故復之而不足則吟咏以肆志吟詠之不足則寄言以廣意然八音之器歌舞之象厯世才士並為之賦頌其體制風流莫不相襲稱其材幹則以危苦為上賦其聲音則以悲哀為主美其感化則以垂涕為貴麗則麗矣然未盡其理也推其所由似元不解聲音覽其㫖趣亦未達禮樂之情也衆器之中琴德最優故綴叙所懷以為之賦其辭曰惟椅梧之所生兮託峻嶽之崇岡披重壤以誕載兮參辰極而高驤含天地之醇和兮吸日月之休光鬱紛紜以獨茂兮飛英㽔於昊蒼夕納景於虞淵兮旦晞幹於九陽經千載以待價兮寂神跱而永康且其山川形勢則盤紆隱深確嵬岑嵒𤣥嶺巉巖岞崿嶇崯丹崖嶮巇青壁萬尋若乃重巘增起偃蹇雲覆邈隆崇以極壯堀巍巍而特秀蒸靈液以播雲據神淵而吐溜爾乃顛波奔突狂赴爭流觸巖抵隈鬱怒彪休洶湧騰薄奮沫揚濤瀄汨澎湃䖤蟺相糾放肆大川濟乎中州安回徐邁寂爾長浮淡乎洋洋縈抱山丘詳觀其區土之所産育奧宇之所寶殖珍怪琅玕瑶瑾翕赩叢集纍積奐衍於其側若乃春蘭被其東沙棠殖其西涓子宅其陽玉醴涌其前𤣥雲䕃其上翔鸞集其巔清露潤其膚惠風流其間竦肅肅以靜謐密微微其清閒夫所以經營其左右者固以自然神麗而足思願愛樂矣於是遁世之士榮期綺季之疇乃相與登飛梁越幽壑援瓊枝陟峻崿以游乎其下周旋永望邈若凌飛邪睨崑崙俯闞海湄指蒼梧之迢遞臨逈江之威夷寤時俗之多纍仰箕山之餘輝羡斯嶽之𢎞厰心慷慨以忘歸情舒放而逺覽接軒轅之遺音慕老童於騩隅欽泰容之高吟顧兹桐而興慮思假物以託心乃斫孫枝凖量所任至人攄思制為雅琴乃使離子督墨匠石奮斤䕫襄薦法班倕騁神鎪㑹裛厠朗密調均華繪雕琢布藻垂文錯以犀象藉以翠緑絃以園客之絲徽以鍾山之玉爰有龍鳯之象古人之形伯牙揮手鍾期聽聲華容灼爍發采揚明何其麗也伶倫比律田連操張進御君子新聲憀亮何其偉也及其初調則角羽俱起宫徴相證參發並趣上下纍應踸踔磊硌美聲將興固以和昶而足耽矣爾乃理正聲奏妙曲揚白雪發清角紛淋浪以流離奐淫衍而優渥粲奕奕而高逝馳岌岌以相屬沛騰遌而競趣翕暐燁而繁縟狀若崇山又象流波浩兮湯湯鬱兮峩峩怫㥜煩寃紆餘婆娑陵縱播逸霍濩紛葩檢容授節應變合度競名擅業安軌徐步洋洋習習聲烈遐布含顯媚以送終飄餘響於泰素若乃高軒飛觀廣厦閒房冬夜肅清朗月垂光新衣翠粲纓徽流芳於是器冷絃調心閒手敏觸􅔊如志惟意所擬初涉渌水中奏清徴雅昶唐堯終詠微子寬明𢎞潤優游躇跱拊絃安歌新聲代起歌曰凌扶搖兮憩瀛洲要列子兮為好仇餐沆瀣兮帶朝霞眇翩翩兮薄天游齊萬物兮超自得委性命兮任去留激清響以赴㑹何絃歌之綢繆於是曲引向䦨衆音將歇改韻易調竒弄乃發揚和顔攘皓腕飛纎指以馳鶩紛㒊譶以流漫或徘徊顧慕擁鬱抑按盤桓育養從容祕玩闥爾奮逸風駭雲亂牢落凌厲布濩半散豐融披離斐韡奐爛英聲發越采采餐餐或間聲錯糅狀若詭赴雙美並進駢馳翼驅初若將乖後卒同趣或曲而不屈或直而不倨或相凌而不亂或相離而不殊或劫掎以慷慨或怨㜘而躊躇忽飄颻以輕邁乍留聨而扶疏或參談繁促復疊攢仄從橫駱驛奔遁相逼拊嗟纍讃間不容息瓌艷竒偉殫不可識若乃閒舒都雅洪纎有宜清和條昶案衍陸離穆溫柔以怡懌婉順叙而委蛇或乘險投㑹邀隙趣危嚶若離鵾鳴清池翼若游鴻翔曾崖紛文斐尾綝縿離纚微風餘音靡靡猗猗或摟􅔊櫟捋縹繚潎冽輕行浮彈明嫿􅕉惠疾而不速留而不滯翩綿飄邈微音迅逝逺而聽之若鸞鳯和鳴戲雲中迫而察之若衆葩敷榮曜春風既豐贍以多姿又善始而令終嗟姣妙以𢎞麗何變態之無窮若夫三春之初麗服以時乃擕友生以遨以嬉涉蘭圃登重基背長林翳華芝臨清流賦新詩嘉魚龍之逸豫樂百卉之榮滋理重華之遺操慨逺慕而長思若乃華堂曲宴密友近賓蘭肴兼御㫖酒清醇進南荆發西秦紹陵陽度巴人變用雜而並起竦衆聽而駭神料殊功而比操豈笙籥之能倫若次其曲引所宜則廣陵止息東武太山飛龍鹿鳴鵾雞游絃更唱迭奏聲若自然流楚窈窕懲躁雪煩下逮謡俗蔡氏五曲王昭楚妃千里别鶴猶有一切承間簉乏亦有可觀者焉然非夫曠逺者不能與之嬉游非夫淵靜者不能與之閒止非放達者不能與之無吝非至精者不能與之析理也若論其體勢詳其風聲器和故響逸張急故聲清閒遼故音痺絃長故徽鳴性潔靜以端理含至德之和平誠可以感蕩心志而發泄幽情矣是故懷戚者聞之莫不憯懍慘悽愀愴傷心含哀懊咿不能自禁其康樂者聞之則欨愈歡釋抃舞踊溢留連瀾漫嗢噱終日若和平者聽之則怡養悅愈淑穆𤣥真恬虛樂古棄事遺身是以伯夷以之亷顔回以之仁比干以之忠尾生以之信惠施以之辨給萬石以之訥慎其餘觸類而長所致非一同歸殊塗或文或質總中和以統物咸日用而不失其感人動物蓋亦𢎞矣于時也金石寢聲匏竹屏氣王豹輟謳狄牙喪味天吳踊躍於重淵王喬披雲而下墜舞鸑鷟於庭階游女飄然而來萃感天地以致和况跂行之衆類嘉斯器之懿茂詠兹文以自慰永服御而不厭信古今之所貴亂曰愔愔琴德不可測兮體清心逺邈難極兮良質美手遇今世兮紛綸翕響冠衆藝兮識音者希誰能珍兮能盡雅琴唯至人兮懷香賦序余以太簇之月登于厯山之陽仰眺崇岡俯察幽坂及覩懷香生蒙楚之間曽見斯草植于廣厦之庭或被帝王之囿怪其遐棄遂遷而樹于中堂華麗則珠采婀娜芳實則可以藏之書又感其棄本高崖委身階庭似傅說顯殷四叟歸漢故因事義賦之書與山巨源絶交書足下昔稱吾於潁川吾常謂之知言然經怪此意尚未熟悉于足下何從便得之也前年從河東還顯宗阿都說足下議以吾自代事雖不行知足下故不知之足下旁通多可而少怪吾直性狹中多所不堪偶與足下相知耳間聞足下遷惕然不喜恐足下羞庖人之獨割引尸祝以自助手薦鸞刀漫之羶腥故具為足下陳其可否吾昔讀書得并介之人或謂無之今乃信其真有耳性有所不堪真不可強今空語同知有達人無所不堪外不殊俗而內不失正與一世同其波流而悔吝不生耳老子莊周吾之師也親居賤職栁下惠東方朔達人也安乎卑位吾豈敢短之哉又仲尼兼愛不羞執鞭子文無欲卿相而三登令尹是乃君子思濟物之意也所謂達能兼善而不渝窮則自得而無悶以此觀之故知堯舜之君世許由之巖棲子房之佐漢接輿之行歌其揆一也仰瞻數君可謂能遂其志者也故君子百行殊塗而同致循性而動各附所安故有處朝廷而不出入山林而不反之論且延陵高子臧之風長卿慕相如之節志氣所託不可奪也吾每讀尚子平臺孝威傳慨然慕之想其為人少加孤露母兄見驕不涉經學性復疏懶筋駑肉緩頭面常一月十五日不洗不大悶癢不能沐也每常小便而忍不起令胞中略轉乃起耳又縱逸來久情意傲散簡與禮相背懶與慢相成而為儕類見寬不攻其過又讀莊老重增其放故使榮進之心日穨任實之情轉篤此由禽鹿少見馴育則服從教制長而見羈則狂顧頓纓赴蹈湯火雖飾以金鑣饗以嘉肴愈思長林而志在豐草也阮嗣宗口不論人過吾每師之而未能及至性過人與物無傷惟飲酒過差耳至為禮法之士所繩疾之如讐幸賴大將軍保持之耳吾不如嗣宗之賢而有慢弛之闕又不識人情暗於機宜無萬石之慎而有好盡之纍久與事接疵釁日興雖欲無患其可得乎又人倫有禮朝廷有法自惟至熟有必不堪者七甚不可者二臥喜晚起而當關呼之不置一不堪也抱琴行吟弋釣草野而吏卒守之不得妄動二不堪也危坐一時痺不得搖性復多蝨爬搔無已而當裹以章服揖拜上官三不堪也素不便書又不喜作書而人間多事堆案盈几不相酬答則犯教傷義欲自勉強則不能久四不堪也不喜弔喪而人道以此為重已為未見恕者所怨至欲見中傷者雖瞿然自責然性不可化欲降心順俗則詭故不情亦終不能獲無咎無譽如此五不堪也不喜俗人而當與之共事或賓客盈坐鳴聲䀨耳囂塵臭處千變百伎在人目前六不堪也心不耐煩而官事鞅掌機務纒其心世故繁其慮七不堪也又每非湯武而薄周孔在人間不止此事㑹顯世教所不容此甚不可一也剛腸疾惡輕肆直言遇事便發此甚不可二也以促中小心之性統此九患不有外難當有內病寧可久處人間邪又聞道士遺言餌术黃精令人久夀意甚信之游山澤觀魚鳥心甚樂之一行作吏此事便廢安能舍其所樂而從其所懼哉夫人之相知貴識其天性因而濟之禹不逼伯成子高全其節也仲尼不假蓋於子夏護其短也近諸葛孔明不迫元直以入蜀華子魚不強幼安以卿相此可謂能相終始真相知者也足下見直木不可以為輪曲者不可以為桷蓋不欲以枉其天才令得其所也故四民有業各以得志為樂惟達者為能通之此足下度內耳不可自見好章甫強越人以文冕也已嗜臭腐養鴛雛以死鼠也吾頃學養生之術方外榮華去滋味游心於寂寞以無為為貴縱無九患尚不顧足下所好者又有心悶疾頃轉增篤私意自試不能堪其所不樂自卜已審若道盡塗窮則已耳足下無事寃之令轉於溝壑也吾新失母兄之歡意常悽切女年十三男年八嵗未及成人况復多病顧此悢悢如何可言今但願守陋巷教養子孫時與親舊叙離濶陳說平生濁酒一杯彈琴一曲志願畢矣足下若嬲之不置不過欲為官得人以益時用耳足下舊知吾潦倒粗疏不切事情自惟亦皆不如今日之賢能也若以俗人皆喜榮華獨能離之以此為怪此最近之可得言耳然使長才廣度無所不淹而能不營乃可貴耳若吾多病困欲離事自全以保餘年此真所乏耳豈可見黃門而稱貞哉若趣欲共登王塗期於相致時為歡益一旦迫之必發其狂疾自非重怨不至於此也野人有快灸背而美芹子者欲獻之至尊雖有區區之意亦已疏矣願足下勿似之其意如此既以解足下并以為别嵇康白與吕長悌絶交書康白昔與足下年時相比以故數面相親足下篤意遂成大好由是許足下以至交雖出處殊途而歡愛不衰也及中間少知阿都志力開悟每喜足下家復有此弟而阿都去年向我有言誠忿足下意欲發舉吾深抑之亦自恃每謂足下不足迫之故從吾言間令足下因其順親蓋惜足下門户欲令彼此無恙也又足下許吾終不擊都以子父六人為誓吾乃慨然感足下重言慰解都都遂釋然不復興意足下隂自阻疑密表繫都先首服誣都此為都故信吾又無言何意足下包藏禍心耶都之含忍足下實由吾言今都獲罪吾為負之吾之負都由足下之負吾也悵然失圖復何言哉若此無心復與足下交矣古之君子絶交不出醜言從此别矣臨别恨恨嵇康白設難卜疑集有宏達先生者恢廓其度寂寥疏濶方而不制亷而不割超世獨步懷玉被褐交不茍合仕不期達常以為忠信篤敬直道而行之可以居九夷遊八蠻浮滄海踐河源甲兵不足忌猛獸不為患是以機心不存泊然純素從容縱肆遺忘好惡以天道為一指不識品物之細故也然而大道既隱智巧滋繁世俗膠加人情萬端利之所在若鳥之追鸞富為積蠧貴為聚怨動者多纍靜者鮮患爾乃思丘中之隱士樂川上之執竿也於是逺念長想超然自失郢人既沒誰為吾質聖人吾不得見冀聞之於數術乃適太史貞父之廬而訪之曰吾有所疑願子卜之貞父乃危坐操蓍拂几陳龜曰君何以命之先生曰吾寧發憤陳誠讜言帝庭不屈王公乎將卑懦委隨承㫖倚靡為面從乎寧愷悌𢎞覆施而不德乎將進趣勢利茍容偷合乎寧隱居行義推至誠乎將崇飾矯誣養虛名乎寧斥逐凶佞守正不傾明否臧乎將傲睨滑稽挾智任術為智囊乎寧與王喬赤松為侣乎將進伊摰而友尚父乎寧隱鱗藏彩若淵中之龍乎將舒翼揚聲若雲間之鴻乎寧外化其形內隱其情屈身隨時陸沉無名雖在人間實處冥冥乎將激昂為清鋭思為精行與世異心與俗并所在必聞恆營營乎寧寥落閒放無所矜尚彼我為一不爭不讓遊心皓素忽然坐忘追羲農而不及行中路而惆悵乎將慷慨以為壯感慨以為亮上千萬乘下凌將相尊嚴其容高自矯抗常如失職懷恨怏怏乎寧聚貨千億擊鐘鼎食枕藉芬芳婉孌美色乎將苦身竭力剪除荆棘山居谷飲倚巖而息乎寧如伯奮仲堪二八為偶排擯共鯀令失所乎將如箕山之夫潁水之父輕賤唐虞而笑大禹乎寧如泰山之隱德潛讓而不揚乎將如季札之顯節義慕為子臧乎寧如老𣆀之清靜微妙守𤣥抱一乎將如莊周之齊物變化洞達而放逸乎寧如夷吾之不吝束縛而終成霸功乎將如魯連之輕世肆志高談從容乎寧如市南子之神勇內固山淵其志乎將如毛公藺生之龍驤虎步慕為壯士乎此誰得誰失何凶何吉時移俗易好貴慕名臧文不讓位於栁季公孫不歸美於董生賈誼一當於明主絳灌作色而揚聲况今千龍並馳萬驥徂征紛紜交競逝若流星敢不惟思謀於老成哉太史貞父曰吾聞至人不相達人不卜若先生者文明在中見素表璞內不愧心外不負俗交不為利仕不謀祿鑒乎古今滌情蕩欲夫如是吕梁可以遊湯谷可以浴方將觀大鵬於南溟又何憂於人間之委曲論釋私論夫稱君子者心無措乎是非而行不違乎道者也何以言之夫氣靜神虛者心不存於矜尚體亮心達者情不繫於所欲矜尚不存乎心故能越名教而任自然情不繫於所欲故能審貴賤而通物情物情順通故大道無違越名任心故是非無措也是故言君子則以無措為衷以通物為美言小人則以匿情為非以違道為闕何者匿情矜吝小人之至惡虛心無措君子之篤行也是以大道言及吾無身吾又何患無以生為貴者是賢於貴生也由斯而言夫至人之用心固不存有措矣是故伊尹不借賢於殷湯故世濟而名顯周旦不顧賢而隱行故假攝而化隆夷吾不匿情於齊桓故國霸而主尊其用心豈為身而繫乎私哉故管子曰君子行道忘其為身斯言是矣君子之行賢也不察於有度而後行也仁心無邪不議於善而後正也顯情無措不論於是而後為也是故傲然忘賢而賢與度㑹忽然任心而心與善遇儻然無措而事與是俱也故論公私者雖云一作終於事與是俱而已志道存善思無凶邪無所懷而不匿者不可謂無私雖欲之伐善情之違道無所抱而不顯者不可謂不公今執必公之理以繩必公之情使夫雖為善者不離於有私雖欲之伐善不陷於不公重其名而貴其心則是非之情不得不顯矣是非必顯有善者無匿情之不是有非者不加不公之大非無不是則善莫不得無大非則莫過其非乃所以救其非也非徒盡善亦所以厲不善也夫善以盡善非以救非而况乎以是非之至者故善之與不善物之至者也若處二物之間所往者必以公成而私敗同用一器而有成有敗夫公私者成敗之塗而吉凶之門乎故物至而不移者寡不至而在用者衆若質乎中人之性運乎在用之質而栖心古烈擬足公塗值心而言則言無不是觸情而行則事無不吉於是乎同之所措者乃非所措也俗之所私者乃非所私也言不計乎得失而遇善行不凖乎是非而遇吉豈公成私敗之數乎夫如是也又何措之有哉故里鳬顯盜晉文愷悌勃鞮號罪忠立身存繆賢吐釁言納名稱漸離告誠一堂流涕然數子皆以投命之禍臨不測之機表露心識獨以安全况乎君子無彼人之罪而有其善乎措善之情其所病也唯病病是以不病病而能療亦賢於療矣然事亦有似非而非非類是而非是者不可不察也故變通之機或有矜以至讓貪以至亷愚以成智忍以濟仁然矜吝之時不可謂無亷情情一作猜忍之形不可謂無仁此似非而非者也或讒言似信不可謂有誠激盜似忠不可謂無私此類是而非是也故乃論其用心定其所趣執其辭而準其禮察其情以尋其變肆乎所始明其所終則夫行私之情不得因乎似非而容其非淑亮之心不得蹈乎似是而負其是故實是以暫非而後顯實非以暫是而後明公私交顯則行私者無所冀而淑亮者無所負矣行私者無所冀則思改其非立功者無所忌則行之無疑此大治之道也故主妾覆醴以罪受戮王陵庭爭而陳平順㫖於是觀之非是非非者乎明君子之篤行顯公私之所在闔堂盈階莫不寓目而曰善人也然背顔退議而含私者不復同耳抱暫而匿情不改者誠神以喪於所惑而體以溺於常名心以制於所懾而情有繫於所欲咸自以為有是而莫賢乎己未有功期之慘駭心之禍遂莫能收情以自反棄名以任實乃心有是焉匿之以私志有善焉措之為惡不措所措而措所不措不求所以不措之理而求所以為措之道故時為措而暗於措是以不措為拙措為工惟懼隱之不微帷患匿之不密故有矜忤之容以觀常人矯飾之言以要俗譽謂永年良規莫盛於兹終日馳思莫窺其外故能成其私之體而喪其自然之質也於是隱匿之情必存乎心僞怠之機必形乎事若是則是非之議既明賞罰之實又篤不知冒廕之可以無景而患景之不匿不知無情之可以無患而患情之不巧豈不哀哉是以申侯茍順取棄楚泰宰嚭耽私卒享其禍由是言之未有抱隱懷姦而身立清世匿非藏情而信著明君者也君子既有其質又覩其鑒貴乎亮達布而存之惡夫矜吝棄而逺之所措一非而內愧乎神賤隱一闕而外慙其形言無茍諱而行無茍隱不以愛之而茍善不以惡之而茍非心無所矜而情無所繫體清神正而是非允當忠感明於天子而信篤乎萬民寄胸懷於八方垂坦蕩以永日斯非賢人君子高行之美異者乎或問曰第五倫有私乎哉曰昔吾兄子有疾吾一夕十往省而反寐自安吾子有疾終朝不往視而通夜不得眠若是可謂私乎非私也答曰是非也非私也夫私以不言為名公以盡言為稱善以無名為體非以有措為負今第五倫顯情是非無私也矜往不眠是有非也無私而有非者無措之志也夫言無措者不齊於必盡也言多吝者不具於不言而已故多吝有非無措有是然無措之所以有是以志無所尚心無所欲達乎大道之情動以自然則無道以至非也抱一而無措則無私無非兼有二義乃為絶美耳若非而能言者是賢於不言之私非無情以非之大者也今第五倫有非而能顯不可謂不公也所顯是非不可謂有措也有非而謂私不可謂不惑公私之理也養生論世或有謂神仙可以學得不死可以力致者或云上夀百二十古今所同過此以往莫非夭妄者此皆兩失其情試粗論之夫神仙雖目不見然記籍所載前史所傳較而論之其有必矣似特受異氣稟之自然非積學所能致也至於導養得理以盡性命上獲千餘嵗下可數百年可有之耳而世皆不精故莫能得之何以言之夫服藥求汗或有弗獲而愧情一集渙然流離終朝末餐則囂然思食而曾子銜哀七日不饑夜分而坐則低迷思寢內懷殷憂則達旦不瞑徑刷理鬢醇醴發顔僅乃得之壯士之怒赫然殊觀植髮衝冠由此言之精神之於形骸猶國之有君也神躁於中而形喪於外猶君昏於上國亂於下也夫為稼於湯世偏有一溉之功者雖終歸於燋爛必一溉者後枯然則一溉之益固不可誣也而世常謂一怒不足以侵性一哀不足以傷身輕而肆之是猶不識一溉之益而望嘉榖於旱苖者也是以君子知形恃神以立神須形以存悟生理之易失知一過之害生故修性以保神安心以全身愛憎不棲於情憂喜不留於意泊然無感而體氣和平又呼吸吐納服食養身使形神相親表裏俱濟也夫田種者一畝十斛謂之良田此天下通稱也不知區種可百餘斛田種一也至於樹養不同則功收相懸謂商無十倍之價農無百斛之望此守常而不變者也且豆令人重榆令人瞑合歡蠲忿萱草忘憂愚智所知也薰辛害目豚魚不養常世所識也蝨處頭而黑麝食柏而香頸處險而癭齒居晉而黃推此而言凡所食之氣蒸性染身莫不相應豈惟蒸之使重而無使輕害之使暗而無使明薰之使黃而無使堅芬之使香而無使延哉故神農曰上藥養命中藥養性者誠知性命之理因輔養以通也而世人不察五榖是見聲色是耽目惑𤣥黃耳務淫哇滋味煎其府藏醴醪煮其腸胃香芳腐其骨髓喜怒悖其正氣思慮消其精神哀樂殃其平粹夫以蕞爾之軀攻之者非一塗易竭之身而外內受敵身非木石其能久乎其自用甚者飲食不節以生百病好色不倦以致乏絶風寒所災百毒所傷中道夭於衆難世皆知笑悼謂之不善持生也至於措身失理亡之於微積微成損積損成衰從衰得白從白得老從老得終悶若無端中智以下謂之自然縱少覺悟咸歎恨於所遇之初而不知慎衆險於未兆是猶桓侯抱將死之疾而怒扁鵲之先見以覺痛之日而為受病之始也害成於微而救之於著故有無功之理馳騁常人之域故有一切之夀仰觀俯察莫不皆然以多自證以同自慰謂天地之理盡此而已矣縱聞養生之事則斷以所見謂之不然其次狐疑雖少庶幾莫知所由其次自力服藥半年一年勞而未驗志以厭衰中路復廢或益之以畎澮而泄之以尾閭而欲坐望顯報者或抑情忍欲割棄榮願而嗜好常在耳目之前所希在數十年之後又恐兩失內懷猶豫心戰於內物誘於外交賖相傾如此復敗者夫至物微妙可以理知難以目識譬猶豫章生七年然後可覺耳今以躁競之心涉希靜之塗意速而事遲望近而應逺故莫能相終夫悠悠者既未效不求而求者以不専喪業偏恃者以不兼無功追術者以小道自溺凡若此類故欲之者萬無一能成也善養生者則不然矣清虛靜泰少私寡欲知名位之傷德故忽而不營非欲而彊禁也識厚味之害性故棄而弗顧非貪而後抑也外物以絫心不存神氣以醇泊獨著曠然無憂患寂然無思慮又守之以一養之以和和理日濟同乎大順然後蒸以靈芝潤以醴泉晞以朝陽綏以五絃無為自得體妙心𤣥忘歡而後樂足遺生而後身存若此以往庶可與羡門比夀王喬爭年何為其無有哉答難養生論答曰所以貴智而尚動者以其能益生而厚身也然欲動則悔吝生智行則前識立前識立則志開而物遂悔吝生則患積而身危二者不藏之於內而接於外祗足以災身非所以厚生也夫嗜欲雖出於人而非道之正猶木之有蝎雖木之所生而非木之宜也故蝎盛則木朽欲勝則身枯然則欲與生不並立名與身不俱存略可知矣而世未之悟以順欲為得生雖有後生之情而不識生生之理故動之死地也是以古之人知酒肉為甘鴆棄之如遺識名位為香餌逝而不顧使動足資生不濫於物知正其身不營於外背其所害向其所利此所以用智遂生之道也故智之為美美其益生而不羡生之為貴貴其樂和而不交豈可疾智而輕身勤欲而賤生哉且聖人寶位以富貴為崇髙者蓋謂人君貴為天子富有四海民不可無主而存主不能無尊而立故為天下而尊君位不為一人而重富貴也又曰富與貴是人之所欲者蓋為季世惡貧賤而好富貴也未能外榮華而安貧賤且抑使由其道而不爭不可令其力爭故許其心競中庸不可得故與其狂狷此俗談耳不言至人常貪富貴也聖人不得巳而臨天下以萬物為心在宥羣生由身以道與天下同於自得穆然以無事為業坦爾以天下為公雖居君位饗萬國恬若素士接賔客也雖建龍旗服華衮忽若布衣之在身故君臣相忘於上蒸民家足於下豈勸百姓之尊已割天下以自私以富貴為嵩髙心欲之而不已哉且子文三顯色不加悅栁惠三黜容不加戚何者令尹之尊不若德義之貴三黜之賤不傷仲粹之美二子嘗得富貴於其身終不以人爵嬰心故視榮辱如一由此言之豈云欲富貴之情哉請問綿衣繡裳不陳於暗室者何必顧衆而動以毁譽為歡戚也夫然則欲之患其得得之懼其失苟患失之無所不至矣在上何得不驕持滿何得不溢求之何得不苟得之何得不失耶且君子出其言善則千里之外應之豈在於多欲以貴得哉奉法循理不絓世網以無罪自尊以不仕為逸遊心乎道義偃息乎卑室恬愈無遌而神氣條達豈須榮華然後乃貴哉耕而為食蠶而為衣衣食周身則餘天下之財猶渴者飲河快然以足不羡洪流豈待積斂然後乃富哉君子之用心若此蓋將以名位為贅瘤資財為塵垢也安用富貴乎故世之難得者非財也非榮也患意之不足耳意足者雖耦耕甽畝被褐啜菽豈不自得不足者雖養以天下委以萬物猶未愜然則足者不須外不足者無外之不須也無不須故無往而不乏無所須故無適而不足不以榮華肆志不以隱約趨俗混乎與萬物並行不可寵辱此真有富貴也故遺貴欲貴者賤及之故忘富欲富者貧得之理之然也今居榮華而憂雖與榮華偕老亦所以終身長愁耳故老子曰樂莫大於無憂富莫大於知足此之謂也難曰感而思室饑而求食自然之理也誠哉是言今不使不室不食但欲令室食得理耳夫不慮而欲性之動也識而後感智之用也性動者遇物而當足則無餘智用者從感而求倦而不已故世之所患禍之所由常在於智用不在於性動今使瞽者遇室則西施與嫫母同情瞶者忘味則糟糠與精稗等甘豈識賢愚好醜以愛憎亂心哉君子識智以無恆傷生欲以逐物害性故智用則收之以恬性動則糾之以和使智上於恬性足於和然後神以默醇體以和成去纍除害與彼更生所謂不見可欲使心不亂者也縱令滋味常染於口聲色已開於心則可以至理遣之多算勝之何以言之也夫欲官不識君位思室不擬親戚何者知其所不得則不當生心也故嗜酒者自抑於鴆醴貪食者忍饑於漏脯知吉凶之理故背之不惑棄之不疑也豈恨向不得酣飲與大嚼哉且逆旅之妾惡者以自惡為貴美者以自美得賤美惡之形在目而貴賤不同是非之情先著故美惡不能移也茍云理足於內乘一以御外何物之能默哉由此言之性氣自和則無所困於防間情志自平則無鬱而不通世之多纍由見之不明耳又常人之情逺雖大莫不忽之近雖小莫不存之夫何故哉誠以交賖相奪識見異情也三年喪不御內禮之禁也莫有犯者酒色乃身之讐也莫能棄之由此言之禮禁雖小不犯身讐雖大不棄然使左手據天下之圖右手旋害其身雖愚夫不為明天下之輕於其身酒色之輕於天下又可知矣而世人以身殉之斃而不悔此以所重而要所輕豈非背賖而趣交耶智者則不然矣審輕重然後動量得失以居身交賖之理同故備逺如近慎微如著獨行衆妙之門終始無虞此與夫耽欲而快意者何殊間哉難曰聖人窮理盡性宜享遐期而堯孔上獲百年下者七十豈復疏於導養乎案論堯孔雖稟命有限故導養以盡其壽此則窮理之致不為不養生得百年也且仲尼窮理盡性以至七十田父以六弊蠢愚有百二十者若以仲尼之至妙資田父之至拙則千嵗之論奚所怪哉且凡聖人有損已為世表行顯功使天下慕之三徙成都者或菲食勤躬經營四方心勞形困趣步失節或竒謀潛稱爰及干戈威武殺伐功利爭奮或修身以明汙顯智以驚愚藉名髙於一世取准的於天下及勤誨善誘聚徒三千口倦談議身疲磬折形若救孺子視若營四海神馳於利害之端心騖於榮辱之塗俯仰之間已再撫宇宙之外者若比之於內視反聽愛氣嗇精明白四達而無執無為遺世坐忘以寶性全真吾所不能同也今不言松柏不殊於榆栁也然則中年枯隕樹之重崖則榮茂日新此亦育形之一觀也竇公無所服御而致百八十豈非鼓琴和其心哉此亦養神之一徵也火蠶十八日寒蠶三十日餘以不得踰時之命而將養有過倍之隆溫肥者早終凉瘦者遲竭斷可識矣圉馬養而不乘用皆六十嵗體疲者速雕形全者難斃又可知矣富貴多殘伐之者衆也野人多壽傷之者寡也亦可見矣今能使目與瞽同功口與瞶者等味遠害生之具御益生之物則始可與言養性命矣難曰神農唱粒食之始鳥獸以之飛走生民以之視息今不言五榖非神農所唱也既言上藥又唱五榖者以上藥希寡艱而難致五穀易殖農而可久所以濟百姓而繼夭閼也並而存之惟賢志其大不肖者志其小耳此同出一人至當歸止痛用之不用耒耜墾辟從之不輟何養命蔑而不議此殆玩所先習怪於所未知且平原則有棗栗之屬池沼則有菱芡之類雖非上藥猶比於黍稷之篤恭也豈云視息之具唯立五榖哉又曰黍稷惟馨實降神祗蘋蘩蕰藻非豐肴之匹潢汙行潦非重酎之對薦之宗廟感靈降祉是知神饗德之與信不以所養為生猶九土述職各貢方物以效誠耳又曰肴糧入體益不踰旬以明宜生之驗此所以困其體也今不言肴糧無充體之益但謂延生非上藥之偶耳請借以為難夫所知麥之善於菽稻之勝於稷由有效而識之假無稻稷之域昧終丁禍害豈明見照察而膽不斷乎故霍光懷沉勇之氣履上將之任戰乎王賀之事延年文生夙無武稱陳義奮辭膽氣凌雲斯其驗歟及於期授首陵母伏劒明果之疇若此萬端欲詳而載之不可勝言也况有覩夷塗而無敢投足階雲路而疑於迄泰清者乎若思弊之倫為能自託幽昧之中棄身陷阱之間如盜跖竄身於虎吻穿窬先首於溝瀆而暴虎馮河果敢之類則能有之是以余謂明無膽無膽能偏守易了之理不在多喻故不逺引繁言若未反三隅猶復有疑思承後誨得一騁辭夫論理性情折引異同固尋所受之終始推氣分之所由順端極末乃不悖耳今子欲棄置渾元捃托所見此為好理綱目而惡持綱領也本論二氣不同明不生膽欲極論之當令一人播無刺諷之膽而有見事之明故當有不果之害非中人血氣無之而復資之以明二氣存一體則明能運膽賈誼是也賈誼明膽自足相經故異也納所食之氣還質易性豈不能哉故赤斧以練丹赬髮涓子以术精久延偓佺以松實方目赤松以水玉乘烟務光以蒲韭長耳卭疏以石髓駐年方回以雲母變化昌容以蓬蔂易顔若此之類不可詳載也孰云五榖為最而上藥無益哉又責千嵗以來目未之見謂無其人即問談者見千嵗人何以别之欲校之以形則與人不異欲驗之以年則朝菌無以知晦朔蜉蝣無以識靈龜然則千嵗雖在市朝固非小年之所辨矣彭祖七百安期千年則狹見者謂書籍妄記劉根霞寢不食或謂偶然忍饑仲都冬倮而體溫夏裘而身凉桓談謂偶耐寒暑李少君識桓公玉碗則阮生謂之逢占而知堯以天下禪許由而揚雄謂好大為之凡若此類上以周孔為闕鍵畢志一誠下以嗜欲為鞭䇿欲罷不能馳驟為世教之內爭巧於榮辱之間以多同自減思不出位使竒事絶於所見妙理斷於常論以言變通達微未之聞也久愠閒居謂之無歡深恨無肴謂之自愁以酒色為供養謂長生為無聊然則子之所以為歡者必結駟連騎食方丈於前也夫俟此而後為足謂之天理自然者皆役身以物喪志於欲原性命之情有纍於所論矣夫渴者惟水之是見酌者惟酒之是求人皆知乎生於有疾也今若以從欲為得性則渴酌者非病淫湎非過桀跖之徒皆得自然非本論所以明至理之意也夫至理誠微善溺於世然或可求諸身而後悟校外物以知之者人從少至長隆殺好惡有盛衰或稚年所樂壯而棄之始之所薄終而重之當其所悅謂不可奪值其所醜謂不可歡然還成易地則情變於初茍嗜欲有變安知今之所耽不為臭腐曩之所賤不為竒美耶假令厮養暴登卿尹則監門之類蔑而遺之由此言之凡所區區一域之情耳豈必不易哉又饑餐者於將獲所欲則悅情注心飽滿之後釋然疏之或有厭惡然則榮華酒色有可疏之時蚺蛇珍於越土中國遇而惡之黼黻貴於華夏裸國得而棄之當其無用皆中國之蚺蛇裸國之黼黻也以大和為至樂則榮華不足顧也以恬淡為至味則酒色不足欽也茍得意有地俗之所樂皆糞土耳何足戀哉今談者不覩至樂之情甘減年殘生以從所願此則李斯背儒以殉一朝之欲主父發憤思調五鼎之味耳且鮑肆自玩而賤蘭茝猶海鳥對太牢而長愁文侯聞雅樂而塞耳故以榮華為生具謂濟萬世不足以喜耳此皆無主於內借外物以樂之外物雖豐哀亦備矣有主於中以內樂外雖無鐘鼓樂已具矣故得志者非軒冕也至樂者非充屈也得失無以纍之耳且父母有疾在困而瘳則憂喜並用矣由此言之不若無喜可知也然則樂豈非至樂耶故順天和以自然以道德為師友玩隂陽之變化得長生之永久任自然以託身並天地而不朽者孰享之哉養生有五難名利不滅此一難也喜怒不除此二難也聲色不去此三難也滋味不絶此四難也神慮轉發此五難也五者必存雖心􅛽難老口誦至言咀嚼英華呼吸太陽不能不回其操不夭其年也五者無於胸中則信順日濟𤣥德日全不祈喜而有福不求夀而自延此養生大理之所效也然或有行踰曾閔服膺仁義動由中和無甚大之纍便謂人理已畢以此自臧而不蕩喜怒平神氣而欲郤老延年者未之聞也或抗志希古不榮名位因自高於馳鶩或運智御世不嬰禍故以此自貴此於用身甫與鄉黨鯢齒耆年同耳以言存生蓋闕如也或棄世不羣志氣和粹不絶榖茹芝無益於短期矣或瓊糇既儲六氣並御而能含光內觀凝神復朴棲心於𤣥冥之崖含氣於莫大之涘者則有老可却有年可延也凡此數者合而為用不可相無猶轅軸輪轄不可一乏於輿也然人皆偏見各備所患單豹以營內致斃張毅以趣外失中齊以誡濟西取敗秦以備戎狄自窮此皆不兼之禍也積善履信世屢聞之慎言語節飲食學者識之過此以往莫之或知請以先覺語將來之覺者聲無哀樂論有秦客問於東野主人曰聞之前論曰治世之音安以樂亡國之音哀以思夫治亂在政而音聲應之故哀思之情表於金石安樂之象形於管絃也又仲尼聞韶識虞舜之德季札聽絃知衆國之風斯已然之事先賢所不疑也今子獨以為聲無哀樂其理何居若有嘉訊今請聞其說主人應之曰斯義久滯莫肯拯救故念或作令厯世濫於名實今䝉啓導將言其一隅焉夫天地合德萬物貴生寒暑代往五行以成故章為五色發為五音音聲之作其猶臭味在於天地之間其善與不善雖遭遇濁亂其體自若而不變也豈以愛憎易操哀樂改度哉及宫商集化聲音克諧此人心至願情欲之所鍾古人知情不可恣欲不可極因其所用每為之節使哀不至傷樂不至淫斯其大較也然樂云樂云鐘鼓云乎哉哀云哀云哭泣云乎哉因兹而言玉帛非禮敬之實歌舞非悲哀之主也何以明之夫殊方異俗歌哭不同使錯而用之或聞哭而歡或聽歌而感然而哀樂之情均也今用均一之情而發萬殊之聲斯非音聲之無常哉然聲音和比感人之最深者也勞者歌其事樂者舞其功夫內有悲痛之心則激切哀言言比成詩聲比成音雜而咏之聚而聽之心動於和聲情感於苦言嗟歎未絶而泣涕流漣矣夫哀心藏於苦心之內遇和聲而後發和聲無象而哀心有主夫以有主之哀心因乎無象之和聲其所覺悟惟哀而己豈復知吹萬不同而使其自已哉風俗之流遂成其政是故國史明政教之得失審國風之盛衰吟咏情性以諷其上故曰亡國之音哀以思也夫喜怒哀樂愛憎慚懼凡此八者生民所以接物傳情區别有屬而不可溢者也夫味以甘苦為稱今以甲賢而心愛以乙愚而情憎則愛憎宜屬我而賢愚宜屬彼也可以我愛而謂之愛人我憎而謂之憎人所喜則謂之喜味所怒則謂之怒味哉由此言之則內外殊用彼我異名聲容自當以善惡為主則無關於哀樂哀樂自當以情感則無係於聲音名實俱去則盡然可見矣且季子在魯採詩觀禮以别風雅豈徒任聲以决臧否哉又仲尼聞韶歎其一致是以咨嗟何必因聲以知虞舜之德然後歎美耶今粗明其一端亦可思過半矣秦客難曰八方異俗歌哭萬殊然其哀樂之情不得不見也夫心動於中而聲出於心雖託之於他音寄之於餘聲善聽察者要自覺之不使得過也昔伯牙理琴而鍾子知其所志𨽻人擊磬而子産識其心哀魯人晨哭而顔淵審其生離夫數子者豈復假智於常音借驗於曲度哉心戚者則形為之動情悲者則聲為之哀此自然相應不可得逃惟神明者能精之耳夫能者不以聲衆為難不能者不以聲寡為易今不可以未遇善聽而謂之聲無可察之理見方俗之多變而謂聲音無哀樂也又云賢不宜言愛愚不宜言憎然則有賢然後愛生有愚然後憎成但不當共其名耳哀樂之作亦有由而然此為聲使我哀音使我樂也茍哀樂合聲更為有實何得名實俱去耶又云季子採詩觀禮以别風雅仲尼歎韶音之一致是以咨嗟是何言歟且師襄奉操而仲尼覩文王之容師涓進曲而子野識亡國之音寧復講詩而後下言習禮然後立評哉斯皆神妙獨見不待留聞積日而已綜其吉凶矣是以前史以為美談今子以區區之近知齊所見而為恨無乃誣前賢之識微負夫子之妙察耶主人答曰難云雖歌哭萬殊善聽察者要自覺之不假智於常音不借驗於曲度鍾子之徒云云是也此為心悲者雖談笑鼓舞情歡者雖拊膺咨嗟猶不能御外形以自匿誑察者於疑似也以為就令聲音之無常猶謂當有哀樂耳又曰季子聽聲以知衆國之風師襄奉操而仲尼覩文王之容案如所云此為文王之功德與風俗之盛衰皆可象之於聲音聲之輕重可移於後世襄涓之巧能得之於將來若然者三皇五帝可不絶於今日何獨數事哉若此果然也則文王之操有常度韶武之音有定數不可雜以他變操以餘聲也則向所謂聲音之無常鍾子之觸類於是乎躓矣若聲音無鍾子觸類其果然耶則仲尼之識微季札之善聽固亦誣矣此皆俗儒妄記欲神其事而追為耳欲令天下惑聲音之道不言理自盡此而惟使神妙難知恨不遇竒聽於當時慕古人而自歎所以大罔後生也夫推類辨物當先求之自然之理理已定然後借古義以明之耳今末得之於心而多恃前言以為談證自此以往恐巧厯不能紀又難云哀樂之作猶愛憎之由賢愚此為聲使我哀而音使我樂茍哀樂由聲更為有實矣夫五色有好醜五聲有善惡此物之自然也至於愛與不愛人情之變統物之理惟止於此然皆無豫於內待物而成耳至夫哀樂自以事㑹先遘於心但因和聲以自顯發故前論已明其無常今復假此談以正名號耳不謂哀樂發於聲音如愛憎之生於賢愚也然和聲之感人心亦猶酒醴之發人情也酒以甘苦為主而醉者以喜怒為用其見歡戚為聲發而謂聲有哀樂不可見喜怒為酒使而謂酒有喜怒之理也秦客難曰夫觀氣採色天下之通用也心變於內而色應於外較然可見故吾子不疑夫聲音氣之激者也心應感而動聲從變而發心有盛衰聲亦隆殺同見役於一身何獨於聲便當疑耶夫喜怒章於色診哀樂亦宜形於聲音聲音自當有哀樂但暗者不能識之至鍾子之徒雖遭無常之聲則頴然獨見矣今矇瞽面牆而不悟離婁照秋毫於百尋以此言之則明暗殊然矣不可守咫尺之度而疑離婁之察執中庸之聽而猜鍾子之聰皆謂古人為妄記也主人答曰難云心應感而動聲從變而發心有盛衰聲亦隆殺哀樂之情必形於聲音鍾子之徒雖遭無常之聲則頴然獨見矣必若所言則濁質之飽首陽之饑卞和之寃伯竒之悲相如之含怒不占之怖秪千變百態使各發一詠之歌同啓數彈之微則鍾子之徒各審其情矣爾為聽聲者不以寡衆易思察情者不以大小為異同出一身者期於識之也設使從下則子野之徒亦當復操律鳴管以考其音知南風之盛衰别雅鄭之淫正也夫食辛之與甚噱薰目之與哀泣同用出淚使狄牙嘗之必不言樂淚甜而哀淚苦斯可知矣何者肌液肉汗踧笮便出無主於哀樂猶篩酒之囊漉雖笮同不同而酒味不變也聲俱一體之所出何獨當含哀樂之理也且夫咸池六莖大章韶夏此先王之正樂所以動天地感鬼神今必云聲音莫不象其體而傳其心此必為至樂不可託之於瞽史必須聖人理其絃管爾乃雅音得全也舜命䕫擊石拊石八音克諧神人以和以此言之至樂雖待聖人而作不必聖人自執也何者音聲有自然之和而無係於人情克諧之音成於金石至和之聲得於管絃也夫纎毫自有形可察故離瞽以明暗異功耳若以水濟水孰異之哉秦客難曰雖衆喻有隱足招攻難然其大理當有所就若葛盧聞牛鳴知其三子為犧師曠吹律知南風不競楚師必敗羊舌母聽聞兒啼而審其喪家凡皆數事皆效於上世是以咸見録載推此而言則盛衰吉凶莫不存乎聲音矣今若復謂之誣罔則前言往記皆為棄物無用之也以言通論未之或安若能明其所以顯其所由設二論俱濟願重聞之主人答曰吾謂能反三隅者得意而忘言是以前論略而未詳今復煩循環之難敢不自一竭耶夫魯牛能知犧厯之喪生哀三子之不存含悲經年訴怨葛盧此為心與人同異於獸形耳此又吾之所疑也且牛非人類無道相通若謂鳥獸皆能有言葛盧受性獨曉之此為稱其語而論其事猶譯傳異言耳不為考聲音而知其情則非所以為難也若謂知者為當觸物而達無所不知今且先議其所易者請問聖人卒入胡域當知其所言否乎難者必曰知之知之之理何以明之願借子之難以立鑒識之域或當與關接識其言耶將吹律鳴管校其音耶觀氣採色知其心耶此為知心自由氣色雖自不言猶將知之知之之道可不待言也若吹律校音以知其心假令心志於馬而誤言鹿察者固當由鹿以𢎞馬也此為心不係於所言言或不足以證心也若當關接而知言此為孺子學言於所師然後知之則何貴於聰明哉夫言非自然一定之物五方殊俗同事異號舉一名以為摽識耳夫聖人窮理謂自然可尋無微不照理蔽則雖近不見故異域之言不得強通推此以往葛盧之不知牛鳴得不信乎又難云師曠吹律知南風不競楚多死聲此又吾之所疑也請問師曠吹律之時楚國之風耶則相去千里聲不足達若正識楚國來入律中耶則楚南有吳越北有梁宋苟不見其原奚以識之哉凡隂陽憤激然後成風氣之相感觸地而發何得發楚庭來入晉乎且又律吕分四時之氣耳時至而氣動律應而灰移皆自然相待不假人以為用也上生下生所以均五聲之和叙剛柔之分也然律有一定之聲雖冬吹中吕其音自滿而無損也今以晉人之氣吹無韻之律楚風安得來入其中與為盈縮耶風無形聲與律不通則校理之地無取於風律不其然乎豈獨師曠多識博物自有以知勝敗之形欲固衆心而託以神微若伯常騫之許景公夀哉又難云羊舌母聽聞兒啼而審其喪家復請問何由知之為神心獨悟暗語而當耶嘗聞兒啼若此其大而惡今之啼聲似昔之啼聲故知其喪家耶若神心獨悟暗語之當非理之所得也雖曰聽啼無取驗於兒聲矣若以嘗聞之聲為惡故知今啼當惡此為以甲聲為度以校乙之啼也夫聲之於音猶形之於心也有形同而情乖貌殊而心均者何以明之聖人齊心等德而形狀不同也茍心同而形異則何言乎觀形而知心哉且口之激氣為聲何異於籟籥納氣而鳴耶啼聲之善惡不由兒口吉凶猶琴瑟之清濁不在操者之工拙也心能辨理善談而不能令籟籥調利猶瞽者能善其曲度而不能令器必清和也器不假妙瞽而良籥不因慧心而調然則心之與聲明為二物二物之誠然則求情者不留觀於形貌揆心者不聽觀於聲音也察者欲因聲以知心不亦外乎今晉母未得之於老成而専信昨日之聲以證今日之啼豈不誤中於前世好竒者從而稱之哉秦客難曰吾聞敗者不羞走所以全也吾心未厭而言難復更從其餘今平和之人聽筝笛琵琶則形躁而志越聞琴瑟之音則聽靜而心閒同一器之中曲用每殊則情隨之變奏秦聲則歎羡而慷慨理齊楚則情一而思専肆姣弄則歡放而欲愜心為聲變若此其衆茍躁靜由聲則何為限其哀樂而但云至和之聲無所不感託大同於聲音歸衆變於人情得無知彼不明此哉主人答曰難云琵琶筝笛令人躁越又云曲用每殊而情隨之變此情所以使人常感也琵琶筝笛間促而聲高變衆而節數以高聲御數節故更形躁而志越猶鈴鐸警耳鐘鼓駭心故聞鼓鞞之音思將帥之臣蓋以聲音有大小故動人有猛靜也琴瑟之體聞遼而音埤變希而聲清以埤音御希變不虛心靜聽則不盡清和之極是以聽靜而心閒也夫曲用不同亦猶殊器之音耳齊楚之曲多重故情一變妙故思専姣弄之音挹衆聲之美㑹五音之和其體贍而用博故心侈於衆理五音㑹故歡放而欲愜然皆以單復高埤善惡為體而人情以躁靜而容端此為聲音之體盡於舒疾情之應聲亦止以躁靜耳犬曲用每殊而情之處變猶滋味異美而口輒識之也五味萬殊而大同於美曲變雖衆亦大同於和美有甘和有樂然隨曲之情盡於和域應美之口絶於甘境安得哀樂於其間哉然人情不同自師所解則發其所懷若言平和安樂正等則無所先發故終得躁靜若有所發則是有主於內不為平和也以此言之躁靜者聲之功也哀樂者情之主也不可見聲有躁靜之應因謂哀樂皆由聲音也且聲音雖有猛靜猛靜各有一和和之所感莫不自發何以明之夫㑹賓盈堂酒酣奏琴或欣然而歡或慘爾而泣非進哀於彼導樂於此也其音無變於昔而歡戚並用斯非吹萬不同耶夫惟無主於喜怒無主於哀樂故歡戚俱見若資偏固之音含一致之聲其所發明各當其分則焉能兼御衆理總發衆情耶由是言之聲音以平和為體而感物無常心志以所俟為主應感而發然則聲之與心殊塗異軌不相經緯焉得染太和於歡戚綴虛名於哀樂哉秦客難曰論云猛靜之音各有一和和之所感莫不自發是以酒酣奏琴而歡戚並用此言偏并之情先積於內故懷歡者值哀音而發內戚者遇樂聲而感也夫音聲自當有一定之哀樂但聲化遲緩不可倉卒不能對易偏重之情觸物而作故令哀樂同時而應耳雖二情俱見則何損於聲音有定理耶主人答曰難云哀樂自有定聲但偏重之情不可卒移故懷戚者遇樂聲而哀耳即如所言聲有定分假使鹿鳴重奏是樂聲也而令戚者遇之雖聲化遲緩但當不能使變令歡耳何得更以哀耶猶一爝之火雖未能溫一室不宜復增其寒矣夫火非隆寒之物樂非增哀之具也理絃高堂而歡戚並用者真主和之發滯導情故令外物所感得自盡耳難云偏重之情觸物而作故令哀樂同時而應耳夫言哀者或見几杖而泣或覩輿服而悲徒以感人亡而物存痛事顯而形潜其所以㑹之皆自有由不為觸地而生哀當席而淚出也今見几杖以致感聽和聲而流涕者斯非和之所感莫不自發也秦客難曰論云酒酣奏琴而歡戚並用欲通此言故答以偏情感物而發耳今且隱心而言明之以成效夫人心不歡則戚不戚則歡此情志之大域也然泣是戚之傷笑是歡之用蓋聞齊楚之曲者惟覩其哀涕之容而未曾見笑噱之貌此必齊楚之曲以哀為體故其所感皆應其度量豈徒以多重而少變則致情一而思専耶若誠能致泣則聲音之有哀樂斷可知矣主人答曰雖人情感於哀樂哀樂各有多人又哀樂之極不必同致也夫小哀容壞甚悲而泣哀之方也小歡顔悅至樂心愈樂之理也何以明之夫至親安豫則恬若自然所自得也及在危急僅然後濟則抃不及儛由此言之儛之不若向之自得豈不然哉至夫笑噱雖出於歡情然自然應聲之具也此為樂之應聲以自得為主哀之應感以垂涕為故垂涕則形動而可覺自得則神合而無憂是以觀其異而不識其同别其外而未察其內耳然笑噱之不顯於聲音豈獨齊楚之曲耶今不求樂於自得之域而以無笑噱謂齊楚體哀豈不知哀而不識樂乎秦客問曰仲尼有言移風易俗莫善於樂即如所論凡百哀樂皆不在聲即移風易俗果以何物耶又古人慎靡靡之風抑慆耳之聲故曰放鄭聲逺佞人然則鄭衛之音擊鳴球以協神人敢問鄭雅之體隆弊所極風俗移易奚由而濟幸重聞之以悟所疑主人應之曰夫言移風易俗者必承哀弊之後也古之王者承天理物必崇簡易之教御無為之治君靜於上臣順於下𤣥化潜通天人交泰枯槁之類浸育靈液六合之內沐浴鴻流蕩滌塵垢羣生安逸自求多福默然從道懷忠抱義而不覺其所以然也和心足於內和氣見於外故歌以叙志儛以宣情然後文之以采章昭之以風雅播之以八音感之以太和導其神氣養而就之迎其性情致而明之使心與理相順和與聲相應合乎㑹通以濟其美故凱樂之情見於金石含𢎞光大顯於音聲也若以往則萬國同風芳榮齊茂馥如秋蘭不期而信不謀而成穆然相愛猶舒錦綵而粲炳可觀也大道之隆莫盛於兹太平之業莫顯於此故曰移風易俗莫善於樂樂之為體以心為主故無聲之樂民之父母也至八音㑹諧人之所悅亦總謂之樂然風俗移易不在此也夫音聲和比人情所不能已者也是以古人知情之不可放故抑其所遁知欲之不可絶故因其所自為可奉之禮制可導之樂口不盡味樂不極音揆終始之宜度賢愚之中為之檢則使逺近同風用而不竭亦所以結忠信著不遷也故鄉校庠孰亦隨之變絲竹與爼豆並存羽毛與揖讓俱用正言與和聲同發使將聽是聲也必聞此言將觀是言也必崇此禮禮猶賓主升降然後酬酢行焉於是言語之節聲音之度揖讓之儀動止之數進退相須共為一體君臣用之於朝庶士用之於家少而習之長而不怠心安志固從善日遷然後臨之以敬持之以久而不變然後化成此又先王用樂之意也故朝宴聘享嘉樂必存是以國史採風俗之盛衰寄之樂工宣之管絃使言之者無罪聞之者足以自誡此又先王用樂之意也若夫鄭聲是音聲之至妙妙音感人猶美色惑志耽槃荒酒易以喪業自非至人孰能禦之先王恐天下流而不反故具其八音不瀆其聲絶其太和不窮其變捐窈窕之聲使樂而不淫猶大羮不和不極勺藥之味也若流俗淺近則聲不足悅又非所歡也若上失其道國喪其紀男女奔隨淫荒無度則風以此變俗以好成尚其所志則羣能肆之樂其所習則何以誅之託於和聲配而長之誠動於言心感於和風俗一成因而名之然所名之聲無甚於淫邪也淫之與正同乎心雅鄭之體亦足以觀矣難宅無吉凶攝生論夫神祗遐逺吉凶難明雖中人自竭莫得其端而易以感道故夫子寢答於來問終慎神怪而不言是以古人顯仁於物藏用於身知其不可衆所共非故隱之彼非所明也吾無意於庶幾而足下師心陋見斷然不疑繫决如此足以獨斷思省來論㫖多不通謹因來言以生此難方推金木未知所在莫有食治世無自理之道法無獨善之術茍非其人道不虛行禮樂政刑經常外事猶有所疏况乎幽微者耶縱欲辨明神微祛惑起滯立端以明所由而斷以檢其要乃為明微若但撮提羣愚缺蠶種忿而棄之因謂無隂陽吉凶之理得無似噎而怨粒稼溺而責舟楫者耶論曰百年之宫不能令殤子夀孤逆魁岡不能令彭祖夭又曰許負之相條侯英布之黥而後王皆性命也應曰此為命有所定夀有所在禍不可以智逃福不可以力致英布畏痛卒罹刀鋸亞夫忌餒終有餓患萬物萬事凡所遭遇無非相命也然唐虞之世命何同延長平之卒命何同短此吾之所疑也即如所論雖慎若曾顔不得免禍惡若桀跖故當昌熾吉凶素定不可推移則古人何言積善之家必有餘慶履信思順自天祐之必積善而後福應信著而後祐來猶罪之招罰功之致賞也茍先積而後受報事理所得不為暗自遇之也若皆謂之是相此為决相命於行事定吉凶於知力恐非本論之意此又吾之所疑也又云多食不消必須黃丸茍命自當生多食何畏而服良藥若謂服藥是相之所一宅豈非是一耶若謂雖命猶當須藥自濟何知相不須宅以自輔乎若謂藥可論而宅不可說恐天下或有說之者矣既曰夀夭不可求甚於貴賤而復曰善求夀強者必先知灾疾之所自求然後可防也然則夀夭果可求耶不可求也既曰彭祖七百殤子之夭皆性命自然而復不知防疾致夀去夭求實於虛故性命不遂此為夀夭之來生於用身性命之遂得於善求然則夭短者何得不謂之愚夀延者何得不謂之智茍夀夭成於愚智則自然之命不可求之論奚所措之凡此數者亦雅論之矛楯矣論曰専氣致柔少私寡欲直行情性之所宜而合養生之正度求之於懷抱之內而得之矣又曰善養生者和為盡矣誠哉斯言匪謂不能但謂全生不盡此耳夫危邦不入所以避亂政之害重門擊柝所以避狂暴之灾居必爽塏所以逺風毒之患凡事之所患能為害者此未足以盡其數也安在守一和而可以為盡乎夫専靜寡欲莫若單豹行年七十而有童孺之色可謂柔和之用矣而一旦為虎所食豈非恃內而忽外耶若謂豹相正當給虎雖智不免則寡欲何益而云養生可得若單豹以未盡善而致灾則輔生之道不止於一和茍合未足保生則外物之為患者吾未知其所齊矣論曰師占成居則有驗使造新則無徴請問占成居而有驗者為但占牆屋耶占居者之吉凶耶若占居者而知盛衰此自占人非占成居也占成居而知吉凶此為宅自有善惡而居者從之則當吉之人受灾於凶宅妖逆無道獲福於吉居爾為吉凶之致惟宅而己更令由人也新便無徴耶若吉凶故當由人則雖成居何得而云有驗耶若此果可占耶不可占耶果有宅耶其無宅也論曰宅猶卜筮可以知吉凶而不能為吉凶也應曰此相似而不同卜者吉凶無豫待物而應將來之地也相宅不問居者之賢愚惟觀已然有傳者己成之形也猶覩龍顔而知當貴見縱理而知餓死然各有由不為暗中也今見其同於得吉凶因謂相宅與卜不異此猶見琴而謂之箜篌非但不知琴也縱如論宅與卜同但能知而不能為則吉凶已成雖知何益卜與不卜了無所在而古人將有為必曰問之龜筮吉以定所由差此豈徒也哉此復吾之所疑也武王營周則云考卜惟王宅是鎬京周公遷邑乃卜澗瀍終惟洛食又曰卜其宅兆而安厝之古人修之於昔如彼足下非之於今如此不知誰定可從論曰為三公宅而愚民必不為三公可知也或曰愚民必不得久居公侯宅然則果無宅也應曰不謂吉宅能獨成福但謂君子既有賢才又卜其居復順積德乃享元吉猶夫良農既懷善藝又擇沃土復加耘耔乃有盈倉之報耳今見愚民不能得福於吉居便謂宅無善惡何異覩種田之無十千而謂田無壤塉耶良田雖美而稼不獨茂卜宅雖吉而功不獨成相須之理誠然則宅之吉凶未可惑也今信徴祥則棄人理之所宜守卜相則絶隂陽之吉凶持知力則忘天道之所存此何異識時雨之生物因垂拱而望嘉榖乎是故疑怪之論生偏是之議興所託不一烏能相通若夫兼而善之者得無半非冢宰耶論曰時日譴祟古盛王無之季王之所好聽此言善矣顧其不盡然湯禱桑林周公秉圭不知是譴祟非也吉日惟戊既伯既禱不知是時日非也此皆足下家事先師所立而一朝背之必若湯周未為盛王幸更詳之又當知二賢何如足下耶論曰賊方至以疾走為務食不消以黃丸為先子徒知此為賢於安須更與求乞胡而不知制賊病於無形事功幽而無跌也夫救火以水雖自多於抱薪而不知曲突之先物矣况乎天下微事言所不能及數所不能分是以古人存而不論神而明之遂知來物故能獨觀於萬物之前收功於大順之後百姓謂之自然而不知所以然若此豈常理之所逮耶今形象著明有數者猶尚滯之天地廣逺品物多方智之所知未若所不知者衆也今執辟榖之術謂養生已備至理已盡馳心極觀齊此而還意所不及皆謂無之欲據所見以定古人之所難言得無似蟪蛄之議氷耶欲以所識而定古人之所棄得無似戎人問布於中國覩麻種而不事耶吾怯於専斷進不敢定禍福於卜相退不敢謂家無吉凶也答釋難宅無吉凶攝生論夫先王垂訓開端中人言之所樹賢愚不違事之所由古今不忒所以致教也若𤣥機神妙不言之化自非至精孰能與之故善求者觀物於微觸類而長不以已為度也按如所論甚有則愚甚無則誕今使小有便得不愚耶了無乃得離之也若小有則不愚吾未知小有其限所止也若了無乃得離之則甚無者無為謂之誕也又曰私神立則公神廢然則惡夫私之害公邪之傷正不為無神也向墨子立公神之情狀不甚有之說使董生託正忌之塗執不甚無之言二賢雅趣可得合而一兩無不失耶今之所辨欲求實有實無以明自然不詭持論有工拙議教有精粗也尋雅論之指謂河洛不誠借助鬼神故為之宗廟以神其本不答子貢以求其然則足下得不為託心無鬼而齊契於董生耶而復顯古人之言懼無鬼之弊貌與情乖立從公廢私之論欲彌縫兩端使不愚不誕兩譏董墨謂其中央可得而居恐辭辨雖巧難可俱通又非所望於核論也故吾謂古人合德天地動應自然經世所立莫不有徴豈匿設宗廟以期後嗣空借鬼神以誷將來耶足下將謂吾與墨不殊今不辭同有鬼但不偏守一區明所當然使人鬼同謀幽明並濟亦所以求衷所以為異耳論曰鈞疾而禱不同故於臣弟則周公請命親其身則尼父不禱所謂禮為情貌者也難曰若於臣子則宜修情貌未聞舜禹有請君父也若於身則否未聞武王閼禱之命也湯禱桑林復為君父耶推此而言宜以禱為益則湯周用之禱無所行則孔子不請此其殊塗同歸隨時之義也又曰時日先王所以誡不怠而勸從事足下前論云時日非盛王所有故吾問惟戊之事今不答惟戊果是非而曰所誡勸此復兩許之言也縱令惟戊盡於誡勸尋論按名當言有日耶無日耶又曰俗之時日順妖忌而逆事理按此言以惡夫妖逆故去之未為盛王了無日也夫時日用於盛世而來代襲以妖惑猶先王制雅樂而季世繼以淫哇也今憤妖忌因欲去日何異惡鄭衛而滅韶武耶不思其本見其所弊輒疾而欲除得不為遇噎溺而遷怒耶足下既已善卜矣乾坤有六子支幹有剛柔統以隂陽錯以五行故吉凶可得而時日是其所由故古人順之焉有善其流而惡其源者吾未知其可也至於河洛宗廟則謂匿而不信類禡祈禱則謂僞而無實時日剛柔則謂假以為勸此聖人専造虛詐以欺天下匹夫之諒且猶耻之今議古人得無不可乃爾也凡此數事猶陷於誣妄冡宅之見伐不亦宜乎前論曰若許負之相條侯英布之黥而後王一欄之羊賓至而有死者性命之自然也今論曰隆凖龍顔公侯之相不可假求此為相命自有一定相所當成人不能壞相所當敗智不能救陷常生於衆險雖可懼而無患抑當貴於厮養雖辱賤而必貴薄姬之困而後昌皆不可為不可求而暗自遇之全相之論必當若此乃一途得通本論不滯耳吾適以信順為難則便曰信順者成命之理必若所言命以信順成亦以不信順敗矣若命之成敗取足於信順故是吾前難夀天成於愚智耳安得有性命自然也若信順果成相命請問亞夫由幾惡而得饑英布修何德以致王生羊積幾善以獲存死者負何罪以逢災耶既持相命復惜信順欲飾二論使得並通恐似矛楯無俱立之勢非辨言所能兩濟也論曰論相命當辨有無無疑衆寡茍一人有命則長平皆一矣又曰知命者不立巖墻之下吾謂知命者當無所不順乃畏巖墻知命有在立之何懼若巖墻果能有害不擇命之長短則知與不知立之有禍避之無患也則何知白起非長平之巖墻而云千萬皆命無疑衆寡耶若謂長平雖同於巖墻故是相命宜值之則命所當至期於必然不立之誡何所施耶若此果有信也此復吾之所疑也又曰長平不得係於命將係宅耶則唐虞之世宅何同吉本疑前論無非相命故借長平之異同以難相命之必然廣求異端以明事理豈必吉宅以質之耶又前論已明吉宅之不獨行今空抑此言欲以誰難又曰長平之卒宅何同凶茍大同足嫌足下愚於吾也適至守相便言千萬皆一校以至理負情之對於是乎見既虛立吉宅求而無獲欲救相命而情以難顯故云如此可謂善戰矣論曰卜之盡蓋理所以成相命者也此復吾所疑矣前論以相命為主而尋益以信順此一離婁也今復以卜成之成命之具三而猶不知相命竟須幾箇為足也若惟信順於理尚少何以謂成命之理耶若是相濟則卜何所補於卜復曰成命耶請問卜之成命使單豹行卜知將有虎災則隱居深宫嚴備自衛若虎猶及之為卜無所益也何云成相耶若謂豹卜而得脫本無厄虎相也卜為妄語矣若謂凡有命皆當由卜乃成則世有終身不卜者皆失相夭命耶若謂卜亦相也然則卜是相中一物也安得云以成相耶若此不知卜筮故當與相命通相成為不當各自行也論曰無故而居可占猶龍顔可相也設為吉宅而後居以幸福報無異假顔凖而望公侯也然則人實徴宅非宅制人也按如所言無故而居可占者必謂當吉人之暝目而前推遇任命以暗營宅自然遇吉也然則豈獨吉人凡有命者皆可以暗動而自得正是前論命自然不可增減者也驟以可為之信順卜筮成不可增減之命矣奚獨禁可為之宅不盡相命惟有暗作乃是真宅耶若瞑目可以得相開目亦無所加也智者愈當職之周公營居何故躊躇於澗瀍問龜筮而食洛耶若龜筮果有助於為宅則知暗作可有不盡善之理矣茍暗作有不盡則不暗豈非求之術耶若必謂龜筮不能盡相於暗往想亦不失相於考卜也則卜與不卜為與不為皆期於自得自得茍全則善占者所遇當識何得無故則能知有故則不知也然貞宅之異假顔貴夫無故識之貞宅之與設為其形不同以功成俱是吉宅也但無故為貞宅授吉於暗遇設為減福於用知爾然則吉凶之形果自有理可以為故而得故前論有占成之驗也然則占成之形何以言之必遂逺近得宜堂簾有制坦然殊觀可得而别利人以福故謂之吉害人以禍故謂之凶但公侯之相暗與吉㑹爾然則宅與性命雖各一物猶農夫良田合而成功也設公侯遷後方樂其吉而往居之吉宅豈選能而後納擇善而後福哉茍宅無情於擇賢不惜吉於設為則屋不辭人田不讓耕其所以為吉凶薄厚何得不均前吉者不求而遇後聞吉而往同於居吉宅而有求與不求矣何言誕而不可為也由是言之非從人而徴宅亦成人明矣若挾顔狀則英布黥相不減其貴隆凖見劓不減公侯之標是知顔凖是公侯之標識非所以為公侯質也故標識者非公侯質也吉名宅宇與吉者宅實也無吉徴而自宅以徴假見難可也若以非質之標識難有徴之吉宅此吾所不敢許也子陽無質而鏤其掌即知當自長耳巨君篡宅而運其魁即偏恃之福非所以為難也至公侯之命稟之自然不可陶易宅是外物方圓由人有可為之理猶西施之潔不可為而西施之服可為也黼黻芳華所以助夫吉宅而家所以成相故世無人方而有卜宅是以知人宅不可相喻也安得以不可作之人絶可作之宅耶至刑德皆同此一家非本論占成居而得吉凶者也且先了此乃議其餘論曰獵夫從林所遇或禽或虎虎凶禽吉卜者筮而知之非能為安知所言地之善惡猶禽吉虎凶獵夫先筮故擇而從禽如擇居故避凶而從吉吉地雖不可為而可擇處猶禽虎雖不可變而可擇從茍卜筮所以成相虎可卜而地可擇何為半信而半不信耶又云地之吉凶有若禽虎不得宫姓則無害商則為災也案此為怪所不解而以為難似未察宫商之理也雖此理之吉而或長於養宫短於育商猶良田雖美而稼有所宜何以言之人姓有五音五行有相生故同姓不昏惡不殖也人誠有之地亦宜然故古人仰凖隂陽俯協剛柔中識性理使三才相善同㑹於大通所以窮理而盡物宜也夫同聲相應同氣相求自然之分也音不和則比絃不動聲同則雖逺相應此事雖著而猶莫或識茍有五音各有宜土氣有相生則人宅猶禽虎之類豈可見宫商之不同而謂之地無吉凶也論曰天下或有能說之者子而不言誰與能之難曰足下前論以云有能占成居者此即能說之矣故吾曰天下當有能者今不求之於前論而復責吾難之於能言亦當知冡宅有吉凶也又曰藥之已病為一也實而宅之吉凶為一也誣既曰成居可占而復曰誣耶藥之已病其驗又見故君子信之宅之吉凶其報賖遙故君子疑之今若以交賖為虛財恐所以求物之地鮮矣吾見溝澮不疑江海之大覩丘陵則知有泰山之高也若守藥則棄宅見交則非賖是海人所以終身無山山客曰無大魚也論曰智之所知未若所不知不可妄論也難曰智所不知相必亦未知也今暗許便多於所知者何耶必生於本謂之無而彊以驗有也彊有之驗將不盈於數矣而并所成驗者謂之多於所知耳茍知然果有未還之理不因見求隱尋論究緒由子辰而得卯未夫尋端之理猶獵師以得禽也縱使尋迹時有無獲然得禽曷嘗不由之哉今吉凶不先定則謂不可求何異鳥獸不期則不敢訊舉氣未足坐守無根也由此而言探頤索隱何謂為妄難自然好學論夫民之性好安而惡危好逸而惡勞故不擾則其願得不逼則其志從洪荒之世大朴未虧君無文於上民無競於下物全理順莫不自得飽則安寢饑則求食怡然鼓腹不知為至德之世也若此則安知仁義之端禮律之文及至人不存大道陵遲乃始作文墨以傳其意區别羣物使有類族造立仁義以嬰其心制其名分以檢其外勸學講文以神其教故六經紛錯百家繁熾開榮利之途故奔騖而不覺是以貪生之禽食園池之梁菽求安之士乃詭志以從俗操筆執瓢足容蘇息積學明經以代稼穡是以困而後學學以致榮計而後習好而習成有似自然故令吾子謂之自然耳推其原也六經以抑引為主人性以從欲為歡抑引則違其願從欲則得自然然則自然之得不由抑引之六經全性之本不須犯情之禮律故仁義務於理僞非養真之要術亷讓生於爭奪非自然之所出也由是言之則鳥不毁以求馴獸不羣而求畜則人之真性無為正當自然耽此禮樂矣論又云嘉肴珍膳雖所未嘗嘗必美之適於口也處在暗室覩蒸燭之光不教而悅得於心况以長夜之冥得照太陽情變鬱陶而發其蒙雖事以末來情以本應則無損於自然好學難曰夫口之於甘苦身之於痛癢感物而動應事而作不須學而後能不待借而後有此必然之理吾所不易也今子以必然之理喻未必然之好學則恐似是而非之議學如一粟之論於是乎在也今子立六經以為凖仰仁義以為主以規矩為軒冕以講論為哺乳由其塗則通乖其路則滯遊心極視不覩其外終年馳騁思不出位聚族獻議唯學為貴孰書摘句俯仰咨嗟使服膺其言以為榮華故吾子謂六經為太陽不學為長夜耳今若以講堂為丙舍以誦諷為鬼語以六經為蕪穢以仁義為臰腐覩文籍則目瞧修揖讓則變傴襲章服則轉筋談禮典則齒齲於是兼而棄之與萬物為更始則吾子雖好學不倦猶將闕焉則向之不學未必為長夜六經未必為太陽也俗語曰乞兒不辱馬醫若遇上有無文之始可不學而獲安不勤而得志則何求於六經何欲於仁義哉以此言之則今之學者豈不先計而後學茍計而後動則非自然之應也子之云云恐故得菖蒲葅耳明膽論有吕子者精義味道研核是非以為人有膽可無明有明便有膽矣嵇先生以為明膽殊用不能相生論曰夫元氣陶鑠衆生稟焉賦受有多少故才性有昏明惟至人特鍾純美兼周外內無不畢備降此已往蓋闕如也或明於見物或勇於决斷人情貪亷各有所止譬諸草木區以别矣兼之者博於物偏受者守其分故吾謂明膽異氣不能相生明以見物膽以决斷専明無膽則雖見不斷専膽無明則違理失機故子家軟弱陷於弒君左師不斷見逼華臣皆智及之而决不行也此理坦然非無疑滯故略舉一隅想不重疑吕子曰敬覽來論可謂海亦不加者矣析理貴約而盡情何尚浮穢而迂誕哉今子之論乃引渾元以為喻何遼遼而坦謾也故直答以人事之切要焉漢之賈生陳切直之䇿奮危言之至行之無疑明所察也忌鵩作賦暗所惑也一人之膽豈有盈縮乎蓋見與不見故行之有果否也子家左師皆愚惑淺弊明不徹達故惑於曖昧終丁禍害豈明見照察而膽不斷乎故霍光懷沉勇之氣履上將之任戰乎王賀之事延年文生夙無武稱陳義奮辭膽氣凌雲斯其驗歟及於期授首陵母伏劒明果之疇若此萬端欲詳而載之不可勝言也况有覩夷塗而無敢投足階雲路而疑於迄泰清者乎若思弊之倫為能自託幽昧之中棄身陷阱之間如盜跖竄身於虎吻穿窬先首於溝瀆而暴虎馮河果敢之類則能有之是以余謂明無膽無膽能偏守易了之理不在多喻故不逺引繁言若未反三隅猶復有疑思承後誨得一騁辭夫論理性情折引異同固尋所受之終始推氣分之所由順端極末乃不悖耳今子欲棄置渾元捃托所見此為好理綱目而惡持綱領也本論二氣不同明不生膽欲極論之當令一人播無刺諷之膽而有見事之明故當有不果之害非中人血氣無之而復資之以明二氣存一體則明能運膽賈誼是也賈誼明膽自足相經故能濟事誰言殊無膽獨任明以行事者乎子獨自作此言以合其論也忌鵩暗惑明所不周何害於膽乎明既以見物膽能行之耳明所不見膽當何斷進退相扶可謂盈縮就如此言賈生陳䇿明所見也忌鵩作賦暗所惑也爾為明徹於前而暗惑於後有盈縮也茍明有進退膽亦何為不可偏乎子然霍光有沉勇而戰於廢王有所撓也而子言一人膽豈有盈縮此則是也賈生暗鵩明有所塞也光懼廢立勇有所撓也夫惟至能無所虧耳茍自非若此誰無弊損乎但當總有無之大略而致論之耳夫物以實見為主延年奮發勇義凌雲此則膽也而云夙無武稱此為信宿稱而疑成事也延年處議明所見也壯氣騰厲勇之决也此足以觀矣子又曰言明無膽無膽能偏守案子之言此則有専膽之人亦為膽特自一氣矣五才存體各有所生明以陽曜膽以隂凝豈可為有陽而生隂可無陽耶雖相須以合德要自異氣也凡餘雜說於期陵母暴虎云云萬言致一欲以何明耶幸更詳思不為辭費而己矣管蔡論或問曰案記管蔡流言叛戾東都周公征討誅以凶逆頑惡顯著流名千里且明父聖兄曾不鑒凶愚於幼稚覺無良之子弟而乃使理亂殷之弊民顯榮爵於藩國使惡積罪成終遇禍害於理不通心無所安願聞其說答曰善哉子之問也昔文武之用管蔡以實周公之誅管蔡以權權事顯實事沇一作沉故令時人全謂管蔡為頑凶方為吾子論之夫管蔡皆服教殉義忠誠自然是以文王列而顯之發旦二聖舉而任之非以情親而相私也乃所以崇德禮賢濟殷弊民綏輔武庚以興頑俗功業有績故曠世不廢名冠當時列為藩臣逮至武卒嗣誦幼冲周公踐政率朝諸侯思光前載以隆王業而管蔡服教不達聖權卒遇大變不能自通忠疑乃心思在王室遂乃抗言率衆欲除國患翼存天子甘心毁旦斯乃愚誠憤發所以徼福也成王大悟周公顯復一化齊俗義以斷恩雖內信如心外體不立稱兵叛亂所惑者廣是以隱忍授刑流涕行誅示以賞罰不避親戚榮爵所顯必鍾盛德戮撻所施必加有罪斯乃為教之正今之朝議管蔡雖懷忠抱誠要為罪誅罪誅己顯不得復理內必幽伏罪惡遂章幽章之路大殊故令奕世未䝉發起然論者誠名信行便以管蔡為惡不知管蔡之惡乃所以令三聖為不明也若三聖未為不明則聖不佑惡而任頑凶不容於時世則管蔡無取私於父兄而見任必以忠良則二叔故為淑善矣今若本三聖之用明思顯授之實理推忠賢之暗權論為國之大紀則二叔之良乃顯三聖之用也以流言之故有緣周公之誅是矣且周公居攝邵公不悅推此言則管蔡懷疑未為不賢而忠賢可不達權三聖未為用惡而周公不得不誅若此三聖所用信良周公之誅得宜管蔡之心見理爾乃大義得通外內兼叙無相伐負者則時論亦得釋然而大解也贊原憲贊原憲味道財寡義豐栖遲蓽門安賤固窮絃歌自樂體逸心冲進應子貢邈有清風襄城童贊水經注云黃帝嘗遇牧童於襄城之野故稽叔夜贊曰竒矣難測襄城小童倦遊六合來憩兹邦司馬相如贊長卿慢世越禮自放犢鼻居市不恥其狀託疾避官蔑此卿相乃賦大人超然莫尚許由贊許由養神宅于箕阿德貞體全擇日登遐井丹贊井丹高潔不慕榮貴抗節五王不交非類顯譏輦車左右失氣披褐長揖義陵羣萃琴贊惟彼雅器載璞靈山體其德真清和自然澡以春雪淡若洞泉溫乎其仁玉潤外鮮針太師針浩浩太素陽曜隂凝二儀陶化人倫肇興厥初冥昧不慮不營欲以物開患以事成犯機觸害智不救生宗長歸仁自然之情故君道自然必託賢明茫茫在昔罔或不寧赫胥既往紹以皇羲默靜無文太朴未虧萬物熙熙不夭不離爰及唐虞猶篤其緒體資易簡應天順矩絺褐其裳土木其宇物或失性懼若在豫疇咨熙載終禪舜禹夫統之者勞仰之者逸至人重身棄而不恤故子州稱疚石户乘桴許由鞠躬辭長九州先王仁愛愍世憂時哀萬物之將頽然後蒞之下逮德衰大道沉淪智惠日用漸私其親懼物乖離參錯擘仁利巧愈競繁禮屢陳刑教爭施夭性喪真季世陵遲繼體承資憑尊恃勢不友不師宰割天下以奉其私故君位益侈臣路生心竭智謀國不吝灰沉賞罰雖存莫勸莫禁若乃驕盈肆志阻兵擅權矜威縱虐禍䝉丘山刑本懲暴今以脅賢昔為天下今為一身下疾其上君猜其臣喪亂𢎞多國乃殞顛故殷辛不道首綴素旗周朝敗度彘人是謀楚靈極暴乾溪潰叛晉厲殘虐欒書作難主父棄禮鷇胎不宰秦皇荼毒禍流四海是以亡國繼踵今古相承醜彼推滅而襲其亡徴初安若山後敗如崩臨刃振鋒悔何所增故居帝王者無曰我尊慢爾德音無曰我彊肆于驕淫棄彼佞幸納此遌顔諛言順耳染德生患悠悠庶類我控我告唯賢是授何必親戚順乃造好民實胥效治亂之原豈無昌教穆穆天子思問其愆虛心導人兄求讜言師臣司訓敢告在前誡家誡人無志非人也但君子用心所欲凖行自當量其善者必擬議而後動若志之所之則口與心誓守死無二耻躬不逮期於必濟若心疲體懈或牽於外物或纍於內欲不堪近患不忍小情則議於去就議於去就則二心交爭二心交爭則向所見役之情勝矣或有中道而廢或有不成一簣而敗之以守則不固以之攻則怯弱與之誓則多違與之謀則善泄臨樂則肆情處逸則極意故雖繁華熠熠無結秀之勳終年之勤無一旦之功斯君子所以歎息也若夫申胥之長吟夷齊之全潔展季之執信蘇武之守節可謂固矣故以無心守之安而體之若自然也乃是守志之盛者可耳所居長吏但宜敬之而己矣不當極親密不宜數往往當有時其衆人又不當宿留所以然者長吏喜問外事或時發舉則怨或者謂人所說無以自免也若行寡言慎備自守則怨責之路解矣其立身當清逺若有煩辱欲人之盡命託人之請求當謙辭謝其素不預此輩事當相諒耳若有怨急心所不忍可外違拒密為濟之所以然者上逺宜適之機中絶常人淫輩之求下全束修無玷之稱此又秉志之一隅也凡行事先自審其可不差於宜宜行此事而人欲易之當說宜易之理若使彼語殊佳者勿羞折遂非也若其理不足而更以情求來守人雖復云云當堅執所守此又秉志之一隅也不須行小小束修之意氣若見窮乏而有可以賑濟者便見義而作若人從我欲有所求先自思省若有所損廢多於今日所濟之義少則當權其輕重而拒之雖復守辱不已猶當絶之然大率人之告求皆彼無我有故來求我此為與之多也自不如此而為輕竭不忍面言彊副小情未為有志也夫言語君子之機機動物應則是非之形著矣故不可不慎若於意不善了而本意欲言則當懼有不了之失且權忍之後視向不言此事無他不可則向言或有不可然則能不言全得其可矣且俗人傳吉遲傳凶疾又好議人之過闕此常人之議也坐言所言自非高議但是動靜消息小小異同但當高視不足和答也非義不言詳靜敬道豈非寡悔之謂人有相與變爭未知得失所在慎勿預也且默以觀之其非行自可見或有小是不足是小非不足非至竟可不言以待之就有人問者猶當辭以不解近論議亦然若㑹酒坐見人爭語其形勢似欲轉盛便當亟舍去之此將鬬之兆也坐視必見曲直黨不能不有言有言必是在一人其不是者方自謂為直則謂曲我者有私於彼便怨惡之情生矣或便獲悖辱之言正坐視之大見是非而爭不了則仁而無武於義無可當逺之也然大都爭訟者小人耳正復有是非共濟汗漫難勝可足稱哉就不得逺取醉為佳若意中偶有所諱而彼必欲知者若守大不已或劫以鄙情不可憚此小輩而為所攙引以盡其言今正堅語不知不識方為有志耳自非知舊鄰比庶幾已下欲請呼者當辭以他故勿往也外榮華則少欲自非至急終無求欲上美也不須作小小卑恭當大謙裕不須作小小亷耻當全大讓若臨朝讓官臨義讓生若孔文舉求代兄死此忠臣烈士之節凡人自有公私慎勿強知人知彼知我知之則有忌於我今知而不言則便是不知矣若見竊語私議便舍起勿使忌人也或時逼迫強與我共說若其言邪險則當正色以道義正之何者君子不容僞薄之言故也一旦事敗便言某甲昔知吾事以宜備之深也凡人私語無所不有宜預以為意見之而走者何哉或偶知其私事與同則可不同則彼恐事泄思害人以滅迹也非意所欽者而來戲調蚩笑人之闕者但莫應從小共轉至於不共而勿大氷矜趨以不言答之勢不得久行自止也自非所監臨相與無他宜適有壺榼之意束修之好此人道所通不須逆也過此以往自非通穆匹帛之饋車服之贈當深絶之何者常人皆薄義而重利今以自竭者必有為而作鬻貨徼歡施而求報其俗人之所甘願而君子之所大惡也闕又憒不須離摟強勸人酒不飲自己若人來勸已輒當為持之勿誚勿逆也見醉薰薰便止慎不當至困醉不能自裁也樂府詩品云頗似魏文過為峻切訐直露才傷淵雅之致然託論清逺良有鑒裁亦未失高流矣詩譜云人品胸次高自然流出藝苑巵言云詩少涉矜持更不如嗣宗秋胡行七首富貴尊榮憂患諒獨多富貴尊榮憂患諒獨多古人所懼豐屋蔀家人害其上獸惡網羅惟有貧賤可以無他歌以言之富貴憂患多其二貧賤易居貴盛難為工貧賤易居貴盛難為工耻佞直言與禍相逢變故萬端俾吉作凶思牽黃犬其計莫從歌以言之貴盛難為工其計莫從樂府作其莫之從其三勞謙寡悔忠信可久安勞謙寡悔忠信可久安天道害盈好勝者殘彊梁致災多事招禍患欲得安樂獨有無愆歌以言之忠信可久安害一作惡一無事字愆集作愆其四役神者弊極欲疾枯役神者弊極欲疾枯顔回短折不及童烏縱體淫恣莫不蚤徂酒色何物今自不辜歌以言之酒色令人枯其五絶智弃學遊心於𤣥默絶智弃學遊心於𤣥默遇過而悔當不自得垂釣一壑所樂一國被髮行歌和者四塞歌以言之遊心於𤣥默其六思與王喬乘雲遊八極思與王喬乘雲遊八極凌厲五嶽忽行萬億授我神藥自生羽翼呼吸太和鍊形易色歌以言之思行遊八極其七徘徊鍾山息駕於層城徘徊鍾山息駕於層城上䕃華蓋下采若英受道王母遂升紫庭逍遙天衢千載長生歌以言之徘徊於層城詩幽憤詩晉書云東平吕安服康高致康友而善之後安為兄所枉訴以事繫獄辭相證引遂復收康康謹言行一旦縲絏乃作幽憤詩按鍾㑹有憾於康時吕安兄巽姦通安妻巽為大將軍長史遂搆誣將害安鍾㑹為大將軍所善因勸大將軍誅康康又有與吕長悌絶交書甚詳其間曰阿都開悟每喜足下有此弟足下許吾不擊都以子父六人為誓吾乃感足下重言慰解都都遂釋然何意足下包藏禍心密表擊都今都獲罪吾為負之吾之負都由足下之負吾也蓋安嘗為安致解於其兄兄紿其和密致其罪康悔因為是書與其兄絶交遂牽連入獄幽憤之詩正志其事所以有內負宿心外恧良朋之語魏氏春秋謂吕巽誣其弟安不孝安引康為證康義不負心保明其事向子期思舊賦序云余少與嵇康吕安居止接近其人並有不羈之才然嵇意逺而疏吕心曠而放其終各以事見法嗟余薄祜少遭不造哀㷀靡識越在繈褓母兄鞠育有慈無威恃愛肆姐不訓不師爰及冠帶憑寵自放抗心希古任其所尚託好老莊賤物貴身志在守朴養素全真曰余不敏好善暗人子玉之敗屢增惟塵大人含𢎞藏垢懷耻民之多僻政不由己惟此褊心顯明臧否感悟思愆怛若創痏欲寡其過謗議沸騰性不傷物頻致怨憎昔慙栁惠今愧孫登內負宿心外恧良朋仰慕嚴鄭樂道閒居與世無營神氣晏如咨豫不淑嬰纍多虞匪降自天實由頑疏理弊患結卒致囹圄對答鄙訊縶此幽阻實耻訟寃時不我與雖曰義直神辱志阻澡身滄浪豈云能補嗈嗈鳴鴈奮翼北遊順時而動得意忘憂嗟我憤歎曾莫能儔事與願違遘兹淹留窮達有命亦又何求古人有言善莫近名奉時恭默咎悔不生萬石周慎安親保榮世務紛紜祗攪豫情安樂必誡乃終利貞煌煌靈芝一年三秀豫獨何為有志不就懲難思復心焉內疚庶勗將來無馨無臭采薇山阿散髮巖岫永嘯長吟頤性養夀寃善作免雜詩微風清扇雲氣四除皎皎亮月麗于高隅興命公子擕手同車龍驥翼翼揚鏕踟蹰肅肅宵征造我友廬光燈吐輝華幔長舒鸞觴酌醴神鼎烹魚絃超子野歎過綿駒流詠太素俯讃𤣥虛孰克英賢與爾剖符贈秀才入軍十九首集云兄秀才公穆入軍贈詩張銑注云叔夜弟鴛鴦于飛肅肅其羽朝遊高原夕宿蘭渚雍雍和鳴顧眄儔侣俯仰慷慨優游容與其二鴛鴦于飛嘯侣命儔朝遊高原夕宿中洲交頸振翼容與清流咀嚼蘭蕙俯仰優游其三泳彼長川言息其滸陟彼高岡言刈其楚嗟我征邁獨行踽踽仰彼凱風涕泣如雨其四泳彼長川言息其止陟彼高岡言刈其杞嗟我獨征靡瞻靡恃仰彼凱風載坐載起其五穆穆惠風塵彼輕塵奕奕素波轉此遊鱗伊我之勞有懷佳人寤言永思實鍾所親其六所親安在舍我逺邁弃此蓀芷襲彼蕭艾雖曰幽深豈無顛沛言念君子不遐有害其七人生夀促天地長久百年之期孰云其夀思欲登仙以濟不朽攬轡踟蹰仰顧我友其八我友焉之隔兹山岡誰謂河廣一葦可航徒恨永離逝彼路長瞻仰弗及徙倚倣徨其九良馬既間麗服有暉左攬繁弱右接忘歸風馳電逝躡景追飛凌厲中原顧盻生姿其十擕我好仇載我載車南凌長阜北厲清渠仰落驚鴻俯引淵魚盤于游田其樂只且其十一凌高逺眄俯仰咨嗟怨彼幽縶邈爾路遐雖有好音誰與清歌雖有姝顔誰與發華仰訊高望俯託輕波乘流逺遁抱恨山阿其十二輕車迅邁息彼長流春木載榮布葉垂隂習習谷風吹我素琴交交黃鳥顧儔弄音感悟馳情思我所欽心之憂矣永嘯長吟悟集作寤其十三浩浩洪流帶我邦畿萋萋緑林奮榮揚暉魚龍瀺灂山鳥羣飛駕言出遊日夕忘歸思我良朋如渴如飢願言不獲愴矣其悲其十四息徒蘭圃秣馬華山流磻平臯垂綸長川目送歸鴻手揮五絃俯仰自得游心太𤣥嘉彼釣叟得魚忘筌郢人逝矣誰與盡言其十五閒夜肅清朗月照軒微風動袿組帳高褰㫖酒盈樽莫與交歡鳴琴在御誰與鼓彈仰慕同趣其馨若蘭佳人不存能不永歎其十六乘風高遊逺登靈丘託好松喬擕手俱遊朝發太華夕留神州彈琴詠詩聊以忘憂其十七琴詩自樂逺遊可珍含道獨往弃智遺身寂乎無纍何求於人長寄靈嶽怡志養神其十八流俗難悟逐物不還至人逺鑒歸之自然萬物為一四海同宅與彼共之豫何所惜生若浮寄暫見忽終世故紛紜弃之無成澤雉雖飢不願園林安能服御勞形苦心身貴名賤榮辱何在貴得肆志縱心無悔其十九雙鸞匿景曜戢翼太山崖抗首漱朝露晞陽振羽儀長鳴戲雲中時下息蘭池自謂絶塵埃終始永不虧何意世多艱虞人來我疑雲網塞四區高羅正參差奮迅勢不便六翮無所施隱姿就長纓卒為時所羈單雄翻孤逝哀吟傷生離徘徊戀儔侣慷慨高山陂鳥盡良弓藏謀極身心危吉凶雖在已世路多嶮巇安得反初服抱玉寶六竒逍遙遊太清擕手長相隨酒㑹詩七首淡淡流水淪胥而逝泛泛柏舟載浮載滯微嘯清風鼓楫容裔放櫂投竿優游卒嵗其二婉彼鴛鴦楫翼而遊俯唼緑藻託身洪流朝翔素瀨夕棲靈洲搖蕩清波與之沈浮其三流詠蘭池和聲激朗操縵清商遊心大象傾昧修身惠音遺響鍾期不存我志誰賞其四斂絃散思遊釣九淵重流千仞或餌者懸猗與莊老棲遲永年實惟龍化蕩志浩然其五肅肅苓風分生江湄却背華林俯泝丹坻含陽吐英履霜不衰嗟我殊觀百卉具腓心之憂矣孰識𤣥機坻一作漪其六猗猗蘭藹殖彼中原緑葉幽茂麗蕊濃繁馥馥惠芳順風而宣將御椒房吐薰龍軒瞻彼秋草悵矣惟騫其七樂哉苑中遊周覽無窮已百卉吐芳華崇基邈高跱林木紛交錯𤣥池戲魴鯉輕丸斃翔禽纎綸出鱣鮪坐中發美讃異氣同音軌臨川獻清酤微歌發皓齒素琴揮雅藻清聲隨風起斯㑹豈不樂恨無東野子酒中念幽人守故彌終始但當體七絃寄心在知己答二郭三首天下悠悠者下京趨上京二郭懷不羣超然來北征樂道託萊廬雅志無所營良時遘其願遂結歡愛情君子義是親恩好篤平生寡志自生災屢使衆釁成豫子匿梁側聶政變其形顧此懷怛惕慮在茍自寧今當寄他域嚴駕不得停本圖終宴婉今更不克并二子贈嘉詩馥如幽蘭馨戀土思所親不知氣憤盈子一作讓其二昔蒙父兄祚少得離負荷因疏遂成懶寢跡北山阿但願養性命終已靡有他良辰不我期當年值紛華坎壈趣世務常恐嬰網羅羲農邈已逺拊膺獨咨嗟朔戒貴尚容漁父好揚波雖逸亦已難非余心所嘉豈若翔區外餐瓊漱朝霞遺物弃鄙纍逍遙遊太和結友集靈嶽彈琴登清歌有能從此者古人豈足多其三詳觀凌世務屯險多憂慮施報更相市大道匿不舒夷路值枳棘安步將焉如權智相傾奪名位不可居鸞鳯避罻羅逺託崑崙墟莊周悼靈龜越穆嗟王輿至人存諸己隱璞樂𤣥虛功名何足殉乃欲列簡書所好亮若兹楊氏歎交衢去去從所志致謝道不俱穆一作稷與阮德如含哀還舊廬感切傷心肝良時遘數子談慰臭如蘭疇昔恨不早既面伴舊歡不悟卒永離念隔增憂歎事故無一有别易㑹良難郢人忽已逝匠石寢不言澤雉窮野草靈龜樂泥蟠榮名穢人身高位多災患未若捐外纍肆志養浩然顔氏希有虞隰子慕黃軒涓彭獨何人唯志在所安漸漬殉近欲一往不可攀生生在豫積勿以怵自寬南土旱不凉襟計宜早完君其愛德素行路慎風寒自力致所懷臨文情辛酸纍拾遺作慮遊仙詩遙望山上松隆谷鬱青蔥自遇一何高獨立迥無雙願想遊其下蹊路絶不通王喬弃我去乘雲駕六龍飄颻戲𤣥圃黃老路相逢授我自然道曠若發童蒙採藥鍾山隅服食改姿容蟬蛻弃穢纍結友家板桐臨觴奏九韶雅歌何雍雍長與俗人别誰能覩其蹤述志詩二首潜龍育神軀濯鱗戲蘭池延頸慕大庭寢足俟皇羲慶雲未垂景盤桓朝陽陂悠悠非吾匹疇肯應俗宜殊類難遍周鄙議紛流離轗軻丁悔吝雅志不得施耕耨感寧越馬席激張儀逝將離羣侣杖䇿追洪崖焦鵬振六翮羅者安所羈浮遊太清中更求新相知比翼翔雲漢飲露餐瓊枝多念世間人夙駕咸驅馳冲靜得自然榮華安足為其二斥鷃擅蒿林仰笑神鳯飛坎井蝤蛭宅神龜安所歸恨自用身拙任意多永思逺實與世殊義譽非所希往事既己謬來者猶可追何為人事間自令心不夷慷慨思古人夢想見容輝願與知己遇舒憤啓其微巖穴多隱逸輕舉求吾師晨登箕山巔日夕不知飢𤣥居養營魄千載長自綏飛一作姿箕拾遺作西惟上古堯舜二人功德齊均不以天下私親高尚簡朴兹順寧濟四海蒸民唐虞世道治萬國穆親無事賢愚各自得志晏然逸豫內忘佳哉爾時可喜知慧用為法滋章冦生紛然相召不停大人𤣥寂無聲鎮之以靜自正名與身孰親哀哉世俗徇榮馳騖竭力喪精得失相紛憂驚自是勤苦不寧生生厚昭咎金玉滿堂莫守古人安此粗醜獨以道德為友故能延期不朽名行顯患滋位高勢重禍基美色伐性不疑厚味臘毒難治如何貪人不思東方朔至清外以貪汙內貞穢身滑稽隱名不為世纍所攖所欲不足無營楚子文善仕三為令尹不喜栁下降身辱耻不以爵祿為已靜恭古惟二子老萊妻賢名不願夫子相荆相將避祿隱耕樂道閒居採萍終厲高節不傾嗟古賢原憲弃背膏梁朱顔樂此屢空饑寒形陋體逸心寬得志一世無患思親詩奈何愁兮愁無聊恆惻惻兮心若抽愁奈何兮悲思多情鬱結兮不可化奄失恃兮孤㷀㷀內自悼兮啼失聲思報德兮邈己絶感鞠育兮情剝裂嗟母兄兮永潜藏想形容兮內摧傷感陽春兮思慈親欲一見兮路無因望南山兮發哀歎感機杖兮涕汍瀾念疇昔兮母兄在心逸豫兮夀四海忽已逝兮不可追心窮約兮但有悲上空堂兮廓無依覩遺物兮心崩摧中夜悲兮當告誰獨收淚兮抱哀戚日逺邁兮思豫心戀所生兮淚不禁慈母沒兮誰與驕顧自憐兮心忉忉訴蒼天兮天不聞淚如雨兮歎青雲欲弃憂兮尋復來痛殷殷兮不可裁琴歌琴賦云拊絃安歌新聲代起歌曰凌扶搖兮憩瀛洲要列子兮為好仇餐沆瀣兮帶朝霞眇翩翩兮薄天遊齊萬物兮超自得委性命兮任去留激清響以赴㑹何絃歌之綢繆漢魏六朝百三家集卷三十五
