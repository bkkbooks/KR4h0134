body:
  text: 漢魏六朝百三家集卷四十六晉傅咸集題詞傅休奕剛峻少容貴顯當世老而不折時晉運方興天子虛已老成喉舌可以無恙若長虞所處國艱甫殷懲楊氏執政之萌規汝南輔相之失劾按驚人榮終司𨽻直道而行若是多福鮑子都諸葛少季無其遇也傅氏諸賦不尚綺麗長虞短篇時見正性治獄明意賦云吏砥身以存公古有死而無柔一生骨鯁風尚顯白厯官威嚴條申職掌御史作針汲生共朂司𨽻布教卧虎立名彼其之子邦之司直斯人有焉休奕四部六録文集百餘湮闕者多長虞著述不富傳文亦與父埒為彪為固不能短長其間七經詩中毛詩一首雖集句託始無關言志與尚書同寮詩則告誡臣僕有孚盈缶韋孟在鄒家風不墜矣目録賦申懷賦有序感别賦有序明意賦冇序小語賦喜雨賦有序患雨賦感凉賦有序神泉賦有序登芒賦有序卞和畫像賦有序玉賦有序鏡賦扇賦羽扇賦有序狗脊扇賦紙賦相風賦有序汙巵賦有序櫛賦冇序燭賦有序桑樹賦有序梧桐賦欵冬花賦有序又舜華賦有序藝香賦有序鳳賦有序鸚鵡賦燕賦有序班鳩賦有序螢火賦有序黏蟬賦有序鳴蜩賦叩頭蟲賦有序青蠅賦蜉蝣賦有序疏應詔陳言疏表駁改社表重論立社表兼司隸表左丞表理李含表又涼州表奏請貶荀愷奏劾夏侯承奏劾夏侯駿事劾王戎奏劾王戎等奏特進執璧奏奏事又上書禁奢上書陳選舉上書明司隸職掌上書箋與汝南王箋教司隸教又又草相諭草書與太傅楊駿書與汝王亮書又諫汝南王書答楊濟書又答楊濟書答李斌書尺牘答曹志頌皇太子釋奠頌針御史中丞針銘犀鈎銘有序杖銘燭銘扇銘碑銘中郎將曹府君碑銘誄襄邑侯誄詩孝經詩二章論語詩二章毛詩詩二章周易詩周官詩二章左傳詩與尚書同僚詩贈褚武良詩贈崔伏二郎詩答潘尼詩并序答欒𢎞詩并序贈建平太守李叔龍贈何劭王濟并序贈太尉司馬虞顯機失題二首漢魏六朝百三家集卷四十六目録欽定四庫全書漢魏六朝百三家集卷四十六明張溥輯晉傅咸集賦申懷賦冇序余自咸寧謬為衆論所許補太子洗馬才不稱職而意常惘然作申懷賦何天施之𢎞普厠瓦礫於瓊瑛備東宫之妙選奉儲君之聖明穆穆清禁濟濟羣英鸞翔鳳集羽儀上京芬芳並發我穢其馨德音光宣我纍厥聲豈伊不愧顧影慙形雖自百於隕越懼恩隆而命輕命既輕而才下諒無補於明時塞賢哲之顯路而塵損之日滋匪耽榮而忘替實結戀之有違忍厚顔於寮類甘獲戾而受譏不悟皇恩之彌崇授大縣乎近畿畿云近而防逺情眷眷而含悲悲惻兼懷憂慮實深雍可南面千載希心微微小子斯之莫任莫斯之任求任在我將反初服畢志訓雅盡烏鳥之至情竭歡敬於膝下進抗疏以歸誠退抽簮而脂車庶所乞之克從永收迹於蓬廬感别賦有序友人魯庶叔雅量𢎞濟思心遼逺余自少與之相長情相親愛有如同生其後選太子洗馬俄而謬䝉朝私猥沗斯職雖懼不稱而喜得與此子同班共事天下之遇未有若此周旋三載魯生遷尚書郎雖别不逺而情甚悵恨退作兹賦云爾嘉天地之交泰美萬物之㑹通悅朋友之攸攝慕管鮑之遐蹤退以文而㑹友欽公子之清塵信同聲之相應意未寫而情親誓稚好之齠齓分綢繆而日新蘭蕙含芬有時而馨龍驥踠足有時而征乾道變化時惟大明峩峩睦友載揚厥聲降聖宰之旌招曜羽儀之上京贊唐虞之嘉運超飛躍乎太清佩銀璜於帝側拖紫艾於天庭瞻宸極之眇眇喜吾子之寵榮無荆玉之夜觀猥齊景於夜光敢有覬於斯舉欣與子而並翔天啓其願自忝蘋蘩幼則同遊長則同班同心厥職其臭如蘭庶績未凝聖朝疇咨顯佐納言先綜萬機出順景而為偶入閴然而無依步虛宇以低回想宴笑之餘暉意纒綿而彌結淚雨面而霑衣明意賦有序侍御史傅咸奉詔治獄作賦用明意云含悾欵以彌載令棲遲以淹留吏砥身以存公古有死而無柔彼背正以從邪我沒世而是尤敷腎腸以為效兮豈文飾之足修感恩輸命心口自滅加我數年竭力效節春秋既不吾與日月忽其不屈周道兮如砥吉人兮是由材曲兮枉橈朽木兮難抽小語賦楚襄王登陽雲之臺景差唐勒宋玉侍王曰能為小語者處上位景差曰么蔑之子形難為象晨登蟻垤薄暮不上朝炊半粒晝復得釀烹一小虱飽於鄉黨唐勒曰攀蚊髯附蚋翼我自謂重彼不極邂逅有急相切逼竄於針孔以自匿宋玉曰折薛足以為櫂舫粒糠而為舟將逺遊以遐覽越蟬溺以橫浮若涉海之無涯懼湮沒於洪流彌數旬而汔濟陟蟣蟻之崇丘未升半而九息何時達乎杪頭喜雨賦有序泰始九年自春不雨以涉夏節草木共燃百姓以堯有九年之水湯有七年之旱恐遭斯運並有懼心聖皇勞慮分使祈禱遍于羣望余以太子洗馬兼司徒請雨百辟蒞事三朝而大雨降退作斯賦祝融熾景羲和警轡亢陽火憤野無生類悠悠億兆同兹慘悴伊我皇之仁德兮配燾育於二儀屢刻躬而勤政分廣請禱於靈祗孰謂天髙其聽不遼孰謂神逺厥應孔昭潔齊致䖍於兹三朝隂鬱怫而騰起陽菴薆而自消飛廉扇谷風之翼翼靈嶽興慶雲之飄颻遂乃重隂四㑹溟邈無垠方中降雨亘夜迄今生我百榖粒我蒸民昔洪水滔天於唐堯之朝亢旱為災於殷湯之世下民其咨莫能俾乂厯稔九七僅免斯害猶以疇咨為美談躬禱為勛伐患雨賦夫何逺寓之多懷患淫雨之有經自流火以迄今厯九旬而無寧庶太清之垂曜覩日月之光明雲乍披而旋合霤暫輟而復零將收雷之要月棄嘉榖於已成前渴焉而不降後患之而弗晴惟二儀之神化奚水旱之有并湯亢陽於七載兮堯洪泛乎九齡天道且猶若兹况人事之不平感凉賦有序盛夏困于炎熱熱甚不過旬日而復自凉以時之凉命親友曲㑹作賦云爾踐朱明之中月暑鬱隆以肇興赫融融以彌熾乃沸海而焦陵獸竄伏於幽林兮鳥垂翼而弗升汗珠隕於玉體兮粉附身而沾凝於是景雲晨敷曜靈濳光隂氣聿升凱風載揚忽輕箑於坐隅兮思暖服於蘭房神泉賦有序余所居庭前有湧泉在夏則冷涉冬而溫溫則水物冬生冷則氷可以過每夏遊之不知嵗之有暑耳惟兹神泉厥理難原在冬則溫既夏則寒混混洋洋載清載瀾遂乃壇以文石樹之栁杞密葉雲覆重䕃蔽沚氣泠泠以含凉風肅肅而恆起于時朱明紀運旭日馳光鬱鬱隆暑赫赫太陽盥玉體於素波身凄焉而自清不知天時之有暑忽謂繁霜之隕庭逮至旻秋既逝司寒騁節六合蕭條嚴霜凛冽河洛輟流太隂凝結彼溰溰而含凍此灼灼而含熱緑竹猗猗荇藻青青是託斯茂是殖斯榮登芒賦有序左光祿大夫濟北侯荀公前喪元妃及失令子葬於西芒有以感懷而作斯賦何天道之難忱信厥命之靡常匪彼生之不辰亦大夫之多殃惟濟北之初載夙遘旻而逢罹興瓜瓞之綿綿飛英聲以風馳庶家道之克昌永保祚於螽斯愠無妄之為災怨上皇之有違在德門之方隆乃降厲於元妃蘭房閴其無主衆孤焭而莫依孔臨川以永歎趙有感於九原覽登芒之哀賦諒聖賢之同情卞和畫像賦有序先畫卞和之像者雖其事在素定見其涕血殘刖之形情以悽然至臧文仲知桞下惠之賢而不與立卞和自刖以相證相去逺矣戲畫其像於卞子之㫄特赤其面以示猶有慙色辭曰惟年命之遒短速流光之有經疾沒世而不稱貴立身而揚名既銘勒於鐘鼎又圖像於丹青覽光烈之攸畫覩卞子之容形泣泉流以雨下灑血面而瀐纓痛兩趾之雙刖心惻悽以傷情雖髮膚之不毁覺害仁以偷生向厥趾之不刖孰夜光之見明人之不同爰自在昔臧知栁而不進和殘軀以證璧玉賦有序易稱乾為玉玉之美與天合德其在玉藻仲尼論之備矣非復鄙文所可稱述萬物資生玉禀其精體乾之剛配天之清故能珍嘉在昔實用罔極夫豈君子之是比蓋乃王度之所式其為美也若此當其濳光荆野抱璞未理衆視之以為石獨見知於卞子曠千載以遐棄倐一旦而見齒為有國之偉寶禮神祗於明祀豈連城之足云嘉遭遇乎知已知已之不可遇譬河清之難俟既巳若此誰亦泣血而刖趾鏡賦順隂位於西裔採秋金之剛精醮祝融以致䖍命歐冶而是營希日月之光烈儀厥象乎曜靈清邈明水景若朝陽不將不迎應物無方不有心於好醜而衆形其必詳同實録於良史隨善惡而是彰猗猗淑媛峩峩后妃眷春榮之零悴懼玉顏之有衰盼清揚而自鏡競崇姱以相暉若乃雲髻亂於首頳黛渝於色設有乏於斯器兮孰厥貌之能飾與喑瞽而同昧兮近有面而不識君子知貌之不可以不飾則內省而自針既見前而慮後則祗畏於幽深察明明之待瑩則以此而洗心暏目觀之有瑕則稽訓於儒紳夫然尚何厥容之有慢而厥思之有淫扇賦天道行而不息四節代以相尋背青春之令月踐朱夏於斯今熱融融以太甚孰赫赫之可任汗珠隕以外流氣鬱結而內沈庶凱風之自南競清嘯而啓襟怨微飇之不興恨喬木之無隂搖輕扇之苒弱手才動而􅖓心心取􅖓於捲握尚何希乎北林下濟億兆上寧侯王是曰安衆清暑作涼䝉貴幸於斯時無日夜而有忘謂洪恩之可固終靡敝於君旁火星忽以西流悲風起乎金商秋日凄凄白露為霜體斂然以思暖御輕裘於溫房猥棄我其若遺去玉手而濳藏君背故而向新非余身之無良哀徒勞而靡報獨懷怨於一方羽扇賦有序吳人截鳥翼而搖風既勝於方圓二扇而中國莫有生意滅吳之後翕然貴之其辭曰鳳凰于飛翽翽其羽况靈體以遐翔匪六翮其焉舉感扇揚之興風宜收之以清暑彼安衆之云妙差剖篾於毫縷體荏苒以輕弱侔縞素於齊魯此因資以為用不假裁於規矩雖靡飾於容好亦差池而有序上比列於南箕下等美於萐莆北堂書鈔傅咸羽扇賦云熾九日之隆赫然髙燎于扶桑熱熙天而灼地沸巨海而成湯狗脊扇賦蓋卑以自居君子之經孤寡不榖王侯修名尚不愧狗脊之為號亦焉顧九華之妙形紙賦蓋世有質文則理有損益故禮隨時變而器與事易既作契以代結繩兮又造紙以當䇿猶純儉之從宜亦唯變而是適夫其為物厥美可珍廉方有則體潔性真含章藴藻實好斯文取彼之淑以為已新攬之則舒舍之則卷可屈可伸能幽能顯若乃六親乖方離羣索居鱗鴻附便援筆飛書寫情於萬里精思於一隅相風賦有序相風之賦蓋以冨矣然辭義大同唯中書張令以太史相風獨無文飾故特賦之太僕寺丞武君賔樹一竹於前庭其上頗有樞機插以雞毛于以占事知來與彼無異斯乃簡易之至有殊太史相風張氏之賦非其至也籊籊竹竿在武之庭厥用自然既修且貞插羽其首丹漆弗營經之營之不日而成汙巵賦有序人有遺余琉璃巵者小兒竊弄墮之不潔意既惜之又感物之汙辱乃喪其所以為寶况君子行身而可以有玷乎有金商之瑋寶禀乾剛之淳精歎春暉之定色越冬氷之至清爰甄陶以成器逞異域之殊形猥陷身於醜穢豈厥美之不惜與觴杓之長辭曾瓦匜之不若櫛賦有序大才治世猶櫛之理髮也理髮不可無櫛治世不可無才賦曰我嘉兹櫛惡亂好理一髮不順實以為恥雖日用而匪懈不告勞而自已茍以理而委任期竭力而沒齒燭賦有序余治獄至長安在逺多懷與同行夜飲以忘愁顧帷燭之自焚以致用亦有殺身以成仁矣賦曰蓋泰清垂象匪日不光向晦入冥匪火不彰故六龍銜燭於北極九日登曜於扶桑日中則昃月虧則望時邁靡停晝不于常背三接之昭昭即旋開之有傷何逺寓之多懷患冬夜之悠長獨耿耿而不寐待雞鳴之未央徒伏枕以展轉起燃燭於間房揚丹輝之煒燁熾朱熖之煌煌俾幽夜而作晝繼列景乎朝陽慨顧景以增歎孰斯愁之可忘嘉湛露之愔愔遂命樽而設觴爾乃延僚屬酌醇清講三墳論五經髙談既倦引滿行盈樂飲今夕實慰我情桑樹賦有序世祖昔為中壘將軍於直廬種桑一株迄今三十餘年其茂盛不衰皇太子入朝以此廬為便坐賦曰伊兹樹之僥幸䝉生生之渥惠降皇躬以斯植遂𢎞茂於聖世厥茂伊何其大連尋修柯逺揚洪條梢槮布繁枝之沃若播密葉以垂隂䕃華㝢而作涼清隆暑之難任以厥樹之巨偉登九日於朝陽且積小以髙大生合抱於毫芒猶帝道之將升亦纍德以彌光湯躬禱於斯林用獲雨而興商惟皇晉之基命爰於斯而發祥從皇儲於斯館物無改於平生心惻切以興思思有感於聖明步倣徨以周覽庶髣佛於儀形梧桐賦美詩人之攸貴兮覽梧桐乎朝陽蔚菶菶以萋萋兮鬱株列而成行夾二門以駢羅作館㝢之表章欵冬花賦有序余曾逐禽登于北山于時仲冬之月也氷凌盈谷積雪被崖顧見欵冬煒然始敷賦曰惟兹竒卉欵冬而生原厥物之載育稟淳粹之至精用能託體固隂利此堅貞惡朱紫之相奪患居衆之易傾在萬物之並作故韜華而弗逞逮皆死以枯槁獨保質而全形又華艷春暉既麗且殊以堅氷為膏壤吸霜雪以自濡非天然之真貴曷能彌寒暑而不渝舜華賦有序嘉其日新之美故種之前庭而為之賦覽中唐之竒樹稟冲粹之至精應青春而敷蘖逮朱夏而誕英布夭夭之纎枝發灼灼之殊榮紅葩紫蒂翠葉素莖含暉吐曜爛若列星朝陽照灼以舒暉逸藻采粲而光明罄天壤而莫儷何菱華之足榮藝香賦有序先君作藝香賦詞美髙麗有覩斯卉蔚茂馨香同遊使余為序攜昵友以逍遙兮覽偉草之敷英慕君子之𢎞覆兮超託軀於朱庭俯引澤于丹壤兮仰汲潤于泰清繁兹緑蕊茂此翠莖葉芟蓰以纎折兮枝婀娜以迥縈象春松之含曜兮鬱蓊蔚以葱青鳳賦有序鷦鷯賦者廣武張侯之所造也以其形微處卑物莫之害也而余以為物生則有害有害而能免所以貴乎才智也夫鷦鷯既無智足貴亦禍害未免免乎禍害者其唯儀鳳也辭曰仰天文以彌觀兮覽神象乎太清伊儀鳳之誕育兮禀朱行之淳清故能體該衆妙德備五靈穢維塵之紛濁兮患俗網之易嬰心眇眇其悠逺兮意飄飄以遐征翔寥廓以輕舉兮淩清霄而絶形若乃龍飛九五時惟大明闡隆正道既和且平感聖化而來儀兮讚簫韶於九成隨時宜以行藏兮諒出處之有經豈以美而賈害兮固以德而見榮曠千載而莫覩兮忽翻爾而來庭應龍至兮庶有感於斯誠而君子之是忽兮賦微物以申情雖綺靡之可玩兮悲志大之所營敢砥鈍於末蹤兮别瓦礫於瑶瓊鸚鵡賦有金商之竒鳥處壠坻之髙松謂崇峻之可固然以慧而入籠披丹脣以授音亦尋響而應聲眄明眸以承顔側聰耳而有聽口才發而輕和密晷景而隨形言無往而不復似探幽而測冥自嘉智於君子足取愛而揚名燕賦有序有言燕今年巢在此明歲故復來者其將逝翦爪識之其後果至焉燕燕于飛差池其羽何詩人之是興信進止之有序秋背隂以龍濳春晞陽而鳳舉隨時宜以行藏似君子之出處惡焚巢之凶醜患林野之多阻諒鳥獸之難羣非斯人而誰與惟里仁之為美託君子之堂㝢逮來春而復旋意眷眷而懷舊一委身乃無餘豈改適而更赴班鳩賦有序庭楸蔚然成林閒居無為有時遊之顧見班鳩音聲可悅於是捕而畜之既以馴擾出之於籠無何失去後時時一來飛翔殆如有戀聊為之賦集茂樹之䕃蔚登弱枝以容與體郁郁以敷文音雍雍而有序情欽樂而是悅遂籠之於前㝢爾乃飲以神泉食之稻粱朝憩椒塗夕宿蘭房時連翩於庭阿見飛燕之頡頏慨感物而哀鳴聲楚切以懷傷仰華林而矯翼紛憎逝而髙翔螢火賦有序余曽獨處夜不能寐顧見螢火遂有感於是執以自照而為之賦其辭曰潛空館之寂寂兮意遙遙而靡寧夜耿耿而不寐兮憂悄悄而傷情哀斯火之湮滅兮近腐草而化生感詩人之悠懷兮覽熠耀于前庭不以姿質之鄙薄兮欲增輝乎太清雖無補於日月兮期自照於陋形當朝陽而戢景兮必宵昧而是征進不競於天光兮退在晦而能明諒有似於賢臣兮於疏外而盡誠蓋物小而喻大兮固作者之所旌假乃光而爾熾兮庶有表乎潔貞黏蟬賦有序櫻桃為樹則多隂為果則先熟故種之於㕔事之前時以盛暑逍遙其下有蟬鳴焉仰而見之聊命黏取以弄小兒退惟當蟬之得意於斯樹不知黏之將至亦猶人之得意於富貴而不虞禍之將來也有嘉果之珍樹蔚𢎞覆於我庭在赫赫之隆暑獨肅肅而自清遂寓目以周覽見鳴蜩於纎枝翳翠葉以長吟信厥樂之在斯茍得意於所歡曽往黏之莫知匪爾命之適薄坐偷安而忘危嗟悠悠之耽寵請兹覽以自規鳴蜩賦有嘒嘒之鳴蜩于台府之髙槐物處隂而自慘奚厥聲之可哀秋日淒淒兮感時逝之若頽曷時逝之是感兮感年歲之我催孰知命之不憂詠梁木之有摧生世忽兮如寓求富貴於不回且明明以在公惟忠讜之是與佚履道之坦坦登髙衢以自棲叩頭蟲賦有序叩頭蟲蟲之微細者然教之輒叩頭人以其叩頭傷不祥故莫之害也蓋齒以剛克而盡舌存以其能柔强梁者不得其死執雌者物莫之讐無咎生於惕厲悔吝來亦有由仲尼唯諾於陽虎所以解紛而免尤韓信非為懦兒出胯下而不羞何兹蟲之多畏人才觸而叩頭犯而不校誰與為讐人不我害我亦無憂彼螳蜋之舉斧豈患禍之能禦此謙卑以自牧乃無害之可賈將斯文之焉貴貴不逺而取譬雖不能觸類是長且書紳以自示㫖一日而三省恆局蹐以祗畏然後可以䝉自天祐之吉無不利青蠅賦幸從容以閒居且遊心於典經覽詩人之有造刺青蠅之營營無纎芥之微用信作害之不輕既反白而為黑恆懷蛆以自盈穢美玉之鮮潔槖嘉肴之芳馨滿堂室之薨薨孰閨宇之得情蜉蝣賦有序讀詩至蜉蝣感其雖朝生暮死而能修其翼可以有興遂賦之有生之薄是曰蜉蝣育微微之陋質羌采采而自修不識晦朔無意春秋取足一日尚又何求戲停淹而委餘何必江湖而是遊疏應詔陳言疏陛下處至尊之位而修布衣之事親覽萬幾勞心日昃在昔帝王躬自菲薄以利天下未有踰陛下也然泰始開元以暨于今十有五年矣而軍國未豐百姓不贍一嵗不登便有菜色者誠由官衆事殷復除猥濫蠶食者多而親農者少也臣以頑疏謬忝近職每見聖詔以百姓饑饉為慮無能云補伏用慙恧敢不自竭以對天問舊都督有四今并監軍乃盈於十夏禹敷土分為九州今之刺史幾向一倍户口比漢十分之一而置郡縣更多空校才門無益宿衛而虛立軍府動有百數五等諸侯復坐置官屬諸所寵給皆生於百姓一夫不農有受其饑今之不農不可勝計縱使五稼普收僅足相接暫有災患便不繼贍以為當今之急先并官省事靜事息役上下用心惟農是務也表駁改社表太康九年改建宗廟而社稷壇與廟俱徙乃詔曰社實一神其并二社之祀祭法二社各有其義天子尊事郊廟故冕而躬耕耕也者所以重孝享之粢盛致殷薦於上帝也榖梁傳曰天子親耕以供粢盛親耕謂自報自為立社者為藉而報也國以人為本人以榖為命故又為百姓立社而祈報焉事異報殊此社之所以有二也王景侯之論王社亦謂春祈藉田秋而報之也其論太社則曰王者布下圻內為百姓立之謂之太社不自立之於京師也景侯此論據祭法大夫以下成羣立社曰置社景侯解曰今之里社是也景侯解祭法則以置社為人間之社矣而别論復以太社為人間之社未曉此㫖也大社天子為人而祀故稱天子社郊特牲曰天子太社必受霜露風雨夫以羣姓之衆王者通為立社故稱太社若夫置社其數不一蓋以里所為名左氏傳盟于清丘之社是也人間之社既已不稱太矣若復不立之京都當安所立乎祭法又曰王為羣姓立七祀自為立七祀言自為者自為而祀也為羣姓者為羣姓而祀也太社與七祀其文正等說者窮此因云墳籍但有五祀無七祀也按祭五祀國之大祀七者小祀周禮所云祭凡小祀則墨冕之屬也景侯解大厲曰如周杜伯鬼有所歸乃不為厲今云無二社者稱景侯祭法不謂無二則曰口傳無其文也夫以景侯之明擬議而後為解而欲以口論除明文如此非但二社當是思惟景侯之後解亦未易除也前被勑尚書召誥社于新邑唯一太牢不二社之明義也按郊特牲曰社稷太牢必援一牢之文以明社之無二則稷無牲矣說者則曰舉社以明稷何獨不可舉一以明二國之大事在祀與戎若有過而除之不若過而存之况存之有義而除之無據乎周禮封人掌設社壝無稷字今帝社無稷蓋出於此然國主社稷故經傳動稱社稷周禮王祭社稷則絺冕此王社有稷之文也封人設壝之無稷字說者以為略文從可知也謂宜仍舊立二社而加立帝社之稷重論立社表時成粲議稱景侯論太社不立京都欲破鄭氏學咸重表如粲之論景侯之解文以此壞大雅云乃立冢土毛公解曰冡土太社也景侯解詩即用此說禹貢惟土五色景侯解曰王者取五色土為太社封四方諸侯各别其方色王者覆四方也如此太社復為立京都也不知此論從何出而與解乖上違經記明文下壞景侯之解臣雖頑蔽少長學問不能默已謹復續上兼司𨽻表臣既駑弱不勝重任加在哀疚假息日闋陛下過意授非所堪披露丹欵歸窮上聞謬詔既往終然無改臣雖不能滅身以全禮教義無靦然虛忝隆寵前受嚴詔視事之日私心自誓隕越為報以貨賂流行所宜深絶切勑都官以此為先而經彌日月未有所得斯由陛下有以奬厲慮於愚戅將必死繫故自掩撿以避其鋒耳在職有日既無赫然之舉又不應弦垂翅人誰復憚故光祿大夫劉毅為司𨽻聲震內外逺近清肅非徒毅有王臣匪躬之節亦由所奏見從威風得伸也左丞表左丞職輕事重以賤制貴所以難居臣以暗劣猥忝斯任愧於不稱懼罪之及夙夜惶恐寢食無寧理李含表臣州秦國郎中令始平李含忠公清正才經世務實有史魚秉直之風雖以此不能協和流俗然其名行峻厲不可得掩二郡並舉孝廉異行尚書郭奕臨州含寒門少年而奕超為别駕大保衛瓘辟含為掾每語臣曰李世容當為晉匪躬之臣秦王之薨悲慟感人百僚㑹喪皆所目見也今以含俯就王制謂之背戚居榮奪其中正天王之朝既葬不除藩國之喪既葬而除藩國欲同不除乃當責引尊凖卑非所宜言耳今天朝吉于上欲令藩國服于下此為藩國之義隆天天朝之禮薄也又云諸王公皆終喪禮寧盡乃叙明以喪制宜隆務在敦重也夫寧盡乃叙明以哀其病耳異於天朝制使終喪未見斯文國制既葬而除既除而祔爰自漢魏迄于聖晉文皇升遐武帝崩殂世祖過哀陛下毁頓銜疚諒暗以終三年率土臣妾豈無攀慕遂服之心實以國制不可而踰故於既葬不敢不除天王之喪釋除於上藩國之臣獨遂于下此不可安復以秦王無後含應為喪主而王喪既除而祔則應吉祭因曰王未有廟主不應除服秦王始封無所連祔靈主所居即便為廟不問國制云何而以無廟為貶以含今日之所行移博士使案禮文必也放勛之殂遏密三載世祖之崩數旬即吉引古繩今闔世有貶何但李含不應除服今也無貶王制故也聖上諒暗哀聲不輟股肱近侍猶宜心喪不宜便行婚娶歡樂之事而莫云者豈不以大制不可而曲邪且前以含有王喪上為差代尚書勑王葬日在近葬訖含應攝職不聽差代葬訖含猶躊躇司徒屢罰訪問趣含攝職而隨擊之此為臺勑府符陷含於惡若謂臺府為傷教義則當據正不正符勑唯含是貶含之困躓尚足惜乎國制不可偏耳又含自以隴西人雖户屬始平非所綜悉自初見使為中正反覆言辭說非始平國人不宜為中正後為郎中令又自以選官引臺府為比以讓常山太守蘇韶辭意懇切形于文墨含之固讓乃在王未薨之前葬後躊躇窮於對罰而攝職耳臣從弟祗為州都督意在欲隆風教議含已過不良之人遂相扇動冀挾名義法外致案足有所邀中正龎騰便削含品臣雖無祁大夫之德見含為騰所侮謹表以聞乞朝廷以時博議無令騰得妄弄刀尺李含為秦國郎中令司徒選含領始平中正秦王東薨含依臺儀葬訖除喪尚書奏含不應除喪咸上表理之又臣以為國之大制不可而偏秦國郎中令李含承尚書之敕奉喪服之命既葬除服而中正龎騰無所據仗貶含品三等謂此未值漢魏以來施行之制具以表聞未審朝廷當云何騰等之論以秦王無後前又有詔以此謂含不應除服愚謂諸侯之制不得異于天朝就秦王有嗣于制亦自應除且秦王無後乃前有詔朝野莫不聞知而尚書下敕葬訖含自應攝職不應差代尋舉為臺郎又司徒摘罰訪問催含攝職如此臺府亦皆謂含既葬應除也相是純臣羣臣之首奏令含釋服亦無餘疑至於含除便獨為罪竊謂有負于情臣之在事小大欲盡使在優崇况國之大制當垂將來心所不安而不敷寫謹重以聞乞中書見詰猶百慮當一得也涼州表涼州民先辦靴從軍之物然後作衣奏請貶荀愷奏死喪之戚兄弟孔懷同堂亡隕方在信宿聖恩矜憫聽使臨喪詔未下而便以行造急諂媚之敬無友于之情宜加顯貶以隆風教劾夏侯承奏少府夏侯承取官田立私屋近小人委以家計令工匠竊盜官物附益于私所營唯利醜問充斥大臣穢濁無以為訓劾夏侯駿事令史張濟案行城東見有新立屋間筣笓障二十丈推問是少府夏侯駿所作請免駿官劾王戎奏書稱三載考績三考黜陟幽明今內外羣官居職未期而戎奏還既未定其優劣且送故迎新相望道路巧詐由生傷農害政戎不仰依堯舜典謨而驅動浮華虧敗風俗非徒無益乃有大損宜免戎官以敦風俗劾王戎等奏戎備位台輔兼掌選舉不能謐靜風俗以凝庶績至令人心傾動開張浮競中郎李重李義不相匡正請免戎等官特進執璧奏公品第一執圭坐侍臣之上特進品第二執皮帛坐侍臣之下以有舊制今啓特進宜執璧繼公奏事尚書舊奏給介士二百人人給大銅口刀各一枚又司𨽻中丞得糾太子而不得糾尚書臣所未譬朝廷無亦易之上書禁奢上書臣以為榖帛難生而用之不節無緣不匱故先王之化天下食肉衣帛皆有其制竊謂奢侈之費甚於天災古者堯有茅茨今之百姓競豐其屋古者臣無玉食今之賈豎皆厭粱肉古者后妃乃有殊飾今之婢妾被服綾羅古者大夫乃不徒行今之賤𨽻乘輕驅肥古者人稠地狹而有儲蓄由於節也今者土廣人稀而患不足由於奢也欲時之儉當詰其奢奢不見詰轉相髙尚昔毛玠為吏部尚書時無敢好衣美食者魏武帝歎曰孤之法不如毛尚書今使諸部用心各如毛玠風俗之移在不難矣陳選舉上書臣咸以為夫興化之要在於官人才非一流職有不同譬諸林木洪纎枉直各有攸施故明揚逮于仄陋疇咨無拘內外之任內外之任出處隨宜中間選用惟內是隆外舉既頽復多節目競內薄外遂成風俗此弊誠宜亟革之當內外通塞無所偏耳既使通塞無偏若選用不平有以深責責之茍深無憂不平也且膠柱不可以調瑟况乎官人而可以限乎伏思所限者以防選用不能出人不能出人當隨事而制無須限法法之有限其於致逺無乃泥乎或謂不制其法以何為責臣聞刑懲小人義責君子君子之責在心不在限也正始中任何晏以選舉內外之衆職各得其才粲然之美於斯可觀如此非徒御之以限法之所致乃委任之由也委任之懼甚於限法是法之失非已之尤尤不在已責之無懼所謂齊之以刑人免而無恥者也茍委任之一則慮罪之及二則懼致怨謗已快則朝野稱詠不善則衆惡是歸此之戰戰孰與倚限法以茍免乎明司𨽻職掌上書按令御史中丞督司百僚皇太子以下其在行馬內有違法憲者彈糾之雖在行馬外而監司不糾亦得奏之如令之文行馬之內有違法憲謂禁防之事耳宫內禁防外司不得而行故專施中丞今道路橋梁不修鬬訟屠沽不絶如此之比中丞推責州坐即令所謂行馬內語施於禁防既云中丞督司百僚矣何復說行馬之內乎既云百僚而不得復說行馬之內者內外衆官謂之百僚則通內外矣司𨽻所以不復說行馬內外者禁防之事已於中丞說之故也中丞司𨽻俱糾皇太子以下則共對司內外矣不為中丞專司內百僚司𨽻專司外百僚自有中丞司𨽻以來更互奏內外衆官惟所糾得無內外之限也而結一旦橫挫臣臣前所以不羅縷者冀因結奏得從私願也今既所願不從而勑云但為過耳非所不及也以此見原臣忝司直之任宜當正已率人若其有過不敢受原是以申陳其愚司𨽻與中丞俱共糾皇太子以下則從皇太子以下無所不糾也得糾皇太子而不得糾尚書臣之暗塞既所未譬皇太子為在行馬之內耶皇太子在行馬之內而得糾之尚書在行馬之內而不以糾無有此理此理灼然而結以此挫臣臣可無恨耳其於觀聽無乃有怪邪臣識石公前在殿上脫衣為司𨽻荀愷所奏先帝不以為非于時莫謂侵官今臣裁糾尚書而當有罪乎箋與汝南王箋衛伯輿貴妃兄子誠有才章應作臺郎然未得東宫官屬東宮官屬前患楊駿親里塞路今有伯輿復越某作郎一犬吠形羣犬吠聲懼於羣吠遂至叵聽教司𨽻教司𨽻校尉舊號臥虎誠以舉綱而萬目理提領而衆毛順又聞南方有蜀嫗作茶粥賣之廉事毁其器具使無為賣餅于市而禁茶粥以困老姥獨何哉又屠牛酤酒鑿錢作錫皆有損害草相諭草黃紙故事鋪不上皆取急與自頃多廢輒皆移病前門自今以後尚書鋪上不扝急扝音烏引也又音枯書與太傅楊駿書咸為尚書左丞惠帝即位駿輔政咸言於駿事與世變禮隨時宜諒暗之不行尚矣由世道彌薄權不可假故雖斬焉在疚而躬覽萬幾也逮至漢文以天下體大服重難久遂制既葬而除世祖武皇帝雖大孝蒸蒸亦從時釋服制心喪三年至於萬幾之事則有不遑今聖上欲委政於公諒暗自居此雖謙讓之心而天下未以為善天下未以為善者以億兆顒顒戴仰宸極聽於冢宰懼天光有蔽人心既已若此而明公處之固未為易也竊謂山陵之事既畢明公當思隆替之宜周公聖人猶不免謗以此推之周公之任既未易而處况聖上春秋非成王之年乎得意忘言言未易盡茍明公有以察其悾欵言豈在多與汝南王亮書亮輔政為大宰欲取悅衆論誅楊駿之功督將侯者千八十一人咸為御史中丞致書咸以為太甲成王年在䝉幼故有伊周之事聖人且猶不免疑况臣既不聖主非孺子而可以行伊周之事乎上在諒暗聽於冢宰而楊駿無狀便作伊周自謂居天下之安所以至死其罪既不可勝亦是殿下所見駿之見討發自天聰孟觀李肇與知密㫖耳至於論功當歸美於上觀等已數千戶縣侯聖上以駿死莫不欣悅故論功寧厚以叙其歡心此羣下所宜以實裁量而遂扇動東安封王孟李郡公餘侯伯子男既妄有加復又三等超遷此之熏赫震動天地自古以來封賞未有若此者也無功而厚賞莫不樂國有禍禍起當復有大功也人而樂禍其可極乎作此者皆由東安公謂殿下至止當有以正之正之以道衆亦何所怒乎衆之所怒在於不平耳而今皆更倍論莫不失望咸之愚冗不惟失望而已竊以為憂又討駿之時殿下在外實所不綜今欲委重故令殿下論功論功之事實未易可處莫若坐觀得失有居正之事宜也殿中郎孟觀李肇構楊太后父駿于賈后廢駿而東安公繇率衆討駿進封東安王又諫汝南王書咸復以亮輔政專權又諫之楊駿有震主之威委任親戚此天下所以喧譁今之處重宜反此失謂宜靜默頥神有大得失乃維持之自非大事一皆抑遣比四造詣及經過尊門冠蓋車馬填塞街衢此之翕習既宜彌息又夏侯長容奉使為先帝請命祈禱無感先帝崩背宜自咎責而自求請命之勞而公以為少府私竊之論云長容則公之姻故至於此一犬吠形羣犬吠聲懼於羣吠遂至叵聽也咸之為人不能面從而有後言嘗觸楊駿幾為身禍况於殿下而當有惜往從駕殿下見語卿不識韓非逆鱗之言耶而歘摩天子逆鱗自知所陳誠額額觸猛獸之鬚耳所以敢言庶殿下當識其不勝區區前摩天子逆鱗欲以盡忠今觸猛獸之鬚非欲為惡必將以此見恕答楊濟書衛公云酒色之殺人此甚於作直坐酒色死人不為悔乃畏以直致禍此由心不直正欲以茍且為明哲耳自古以直致禍者當自矯枉過直或不忠允欲以亢厲為聲故致忿耳安有悾悾為忠益而當見疾乎又答楊濟書違距上命稽停招罰退思此罪在於不測才加貶黜退用戰悸何復以杖重為劇小人不德所好惟酒宜於養瘡可數致也答李斌書吾作左丞未幾而已吾為京兆雖心知此為不合然是家鄉親里自願便從俗耳時足下問吾當去不吾答鸚鵡子言阿安樂今到阿安樂何為不去尺牘答曹志英氣泉涌逸藻波騰頌皇太子釋奠頌蒸蒸皇儲既睿且聰神而明之夫豈發䝉謙以制禮靡事不恭企兹良辰卜近于中乃修嘉薦于國之雍敬享先師以酬聖功亹亹皇儲希心闕里光光輿服穆穆容止秪奉聖靈躬承明祀濟濟儒生侁侁胄子清酒千觴匪宴斯喜欣道之𢎞自今以始針御史中丞針百官之針以針王闕余承先君之蹤竊位憲臺懼有忝纍垂翼之責且造斯針以自朂勵不云自針而云御史中丞針者凡為御史中丞欲通以針之也煌煌天文衆星是環爰立執法其暉有煥執憲之綱秉國之憲鷹揚虎視肅清違慢謇謇匪躬是曰王臣既直其道爰顧其身身之不顧孰有弗震邦國若否山甫是明焉用彼相莫扶其傾淮南構逆實憚汲生赫赫有國可無忠貞憂責有在繩亦必直良農耘穢勿使能植無禮是逐安惜翅翼嗟爾庶寮各敬乃職無為罰先無怙厥力怨及朋友無慙于色得罪天子內省有恧是用作針惟以自勑銘犀鈎銘有序世稱駭雞之犀聞之父常侍曰犀之美者有光雞見影而驚故曰駭雞有以此鈎見遺者乃為之銘獸曰𤣥犀處自林麓食惟棘刺林兼五肉闕或有神表露以角含精吐英望如華燭置之荒野禽獸莫觸杖銘嘉兹竒竹質徑體直立比髙節示世矜式燭銘煌煌丹燭熖熖飛光取則景龍擬象扶桑照彼𤣥夜炳若朝陽焚形監世無隱不彰扇銘武都太守房仲發遺扇無以報為銘以識之云行藏惟時孔顔齊軌碑銘中郎將曹府君碑銘伊公立朝雅然正色既侍皇帷讜言常則誄襄邑侯誄言研其幾文艷春蘭詩孝經詩二章立身行道始於事親上下無怨不惡於人一作不敢惡人孝無終始不離其身三者備矣以臨其民以孝事君不離令名進思盡忠義則不爭匡救其惡災害不生孝悌之至通於神明論語詩二章守死善道磨而不磷直哉史魚可謂大臣見危授命能致其身克已復禮學優則仕富貴在天為仁由已以道事君死而後已毛詩詩二章無將大車維塵冥冥濟濟多士文王以寧顯允君子大猷是經聿修厥德令終有俶勉爾遁思我言維服盜言孔甘其何能淑讒人罔極有靦面目周易詩卑以自牧謙尊而光進德修業既有典常暉光日新照于四方小人勿用君子道長周官詩二章惟王建國一作極設官分職進賢興功取諸初學作時文易直除其不蠲無敢反側以德詔爵允臻其極辨其可任以告于正掌其戒禁治其政令各修乃職以聽王命左傳詩事君之禮敢不盡情敬奉德義樹之風聲昭德塞違不隕其名死而利國以為已榮兹心不爽忠而能力不為利啖古之遺直威黜不端勿使能植與尚書同僚詩非望之寵謬加于已猥授非據奄司萬里煌煌朱軒服驥驂騄曄曄初星肅肅臣僕暉光顯赫衆目所屬斯之弗稱匪榮伊辱質弱尚父受任鷹揚德非樊仲王命是將百城或違無能有匡一州之矜將弛其綱得意忘言言在意後夫惟神交可以長久我心之孚有盈于缶與子偕老豈曰執手出司萬一作百里牧彼朔濵服冕乘軒六轡既均威風先邁百城肅震贈禇武良詩爰暨于禇惟晉之禎肇振鳳翼羽儀上京聿作喉舌納言紫庭光贊帝道敷皇之明方任之重實在江揚乃授旄鉞宣曜威靈悠悠遐邁東夏于征贈崔伏二郎詩英妙之選二生之授顒顒兩城歡德之茂君子所居九夷非陋無狹百里而不垂覆人之好我贈我清詩示我周行心與道期誠發自中義形於辭古人辭讜豈不爾思答潘尼詩并序司州秀才潘正叔識通才髙以文學溫雅為博士余性直而處清論褒貶之任作詩以見規雖褒飾之舉非所敢聞而斐燦之辭良可樂也答之雖不足以相訓報所謂盍各言志也貽我妙文繁春之榮匪榮期尚乃新其聲吉甫作頌有馥其馨實由樊仲其德克明授此瓦礫厠彼瑶瓊貺非其喻聞寵若驚答欒𢎞詩并序安樂令欒𢎞太傅巨平侯羊公辟未就而公薨後應司州之命舉秀才博文通濟之士余失和於府當換為護軍司馬賦詩見贈答之云爾巨平作宰是貴是欽弓旌仍招嘉命胥尋鸞鳳養儀戢翼幽林未附雅調以和韶音巨平遐逝厲志彌深肅肅京司清風裁邁乃延羣彥龍集鳳㑹亦既斯降萬里有賴聲發響應好結傾蓋贈建平太守李叔龍𢎞道興化實在良守悠悠建平皇澤未流朝選於衆乃子之授南荆注望心乎克副贈何劭王濟并序朗陵公何敬祖咸之從內兄國子祭酒王武子咸從姑之外孫也竝以明德見重於世咸親之重之情猶同生義則師友何公既登侍中武子俄而亦作二賢相得甚歡咸亦慶之然自恨暗劣雖願其繾綣而從之末由厯試無效且有家艱心存目替賦詩申懷以貽之云爾日月光太清列宿曜紫微赫赫大晉朝明明闢皇闈吾兄既鳳翔王子亦龍飛雙鸞逰蘭渚二離揚清暉攜手升玉階竝坐侍丹帷金璫綴惠文煌煌發令姿斯榮非攸庶繾綣情所希豈不企髙蹤麟趾邈難追臨川靡芳餌何為守空坻槁葉待風飄逝將與君違違君能無戀尸素當言歸歸身蓬蓽廬樂道以忘飢進則無云補退則恤其私但願隆𢎞美王度日清夷贈太尉司馬虞顯機帝崇元淑妙選其屬命之是佐增衮之縟失題奕奕恆山作鎮冀方伊趙建國在嶽之陽失題見初學露部零露濬江海飛塵崇山嶽過謬佐台輔安能任鼎餗漢魏六朝百三家集卷四十六
