body:
  text: 漢魏六朝百三家集卷二十九魏王粲集題詞袁顯思兄弟爭國王仲宣為劉荆州遺書苦諌今讀其文非獨詞章縱橫其言誠仁人也昔頴考叔一言能感鄭莊使母子如初仲宣二書疾呼泣血無救鬩墻袁氏將喪頑子執兵即蘇張復生何益哉子桓子建交怨若仇仲宣婉孌其間耦俱無猜身沒之後太子臨喪陳思作誄素旗表德頌言不忘彼固善處人骨肉亦繇其天性宿深長於感激不但和光宴詠為兩公子樓護也孟德隂賊喜殺賢士仲宣詠史託諷黃鳥披文下涕幾秦風矣髙平上胄世為漢公遭時流離依徙荆許以七哀之悲為顯廟之頌擇木而窮雅誹見志世謂其詩出李陵今觀書命亦相近也目録賦逰海賦登樓賦浮淮賦初征賦羽獵賦思友賦傷夭賦出婦賦寡婦賦神女賦間邪賦大暑賦酒賦馬瑙勒賦車渠碗賦迷迭賦栁賦槐賦白鶴賦鸚鵡賦鶡賦鶯賦書為劉荆州與袁談書為劉荆州與袁尚書檄為荀彧與孫權檄七七釋記荆州文學記論務本論三輔論難鍾荀太平論儒吏論爵論又安身論務本論略儒吏論略連珠連珠四首贊正考父贊仄金人贊銘刀銘有序硯銘蕤賔鐘銘無射鐘銘鐘簴銘祭文弔夷齊文樂府太廟頌三首俞兒舞歌四首矛俞新福歌弩俞新福歌安臺新福歌行辭新福歌詩贈蔡子篤贈士孫文始贈文叔良思親詩雜詩雜詩四首七哀詩三首詠史詩公宴詩從軍詩五首漢魏六朝百三家集卷二十九目録欽定四庫全書漢魏六朝百三家集卷二十九明張溥輯魏王粲集賦逰海賦乘菌桂之芳舟浮大江而遙逝翼驚風而長驅集會稽而一睨登隂隅以東望覽滄海之體勢吐星出日天與水際其深不測其廣無臬尋之冥地不見涯泄章亥所不極盧敖所不屆懷珍藏寶神隱怪匿或無氣而能行或含血而不食或有葉而無根或能飛而無翼鳥則爰居孔鵠翡翠鷫鸘繽紛往來沈浮翺翔魚則橫尾曲頭方目偃額大者若山陵小者重鈞石乃有賁蛟大貝明月夜光蠵鼊玳瑁金質黑章若夫長洲别島棊布星峙髙或萬尋近或千里桂林藂乎其上珊瑚周乎其趾羣犀代角巨象解齒黃金碧玉名不可紀洪洪洋洋誠不可度也處嵎夷之正位兮同色號於穹蒼包納汚之𢎞量正宗廟之紀綱總衆流而臣下為百谷之君王登樓賦登兹樓以四望兮聊暇日以銷憂覺斯宇之所處兮實顯敞而寡仇挾清漳之通浦兮倚曲沮之長洲背墳衍之廣陸兮臨臯隰之沃流北彌陶牧西接昭丘華實蔽野黍稷盈疇雖信美而非吾土兮曾何足以少留遭紛濁而遷逝兮漫踰紀以迄今情眷眷而懷歸兮孰憂思之可任慿軒檻以遙望兮向北風而開襟平原逺而極目兮蔽荆山之髙岑路逶迤而修逈兮川既漾而濟深悲舊鄉之壅隔兮涕橫墜而弗禁昔尼父之在陳兮有歸歟之歎音鍾儀幽而楚奏兮莊舄顯而越吟人情同於懷土兮豈窮逹而異心惟日月之逾邁兮俟河清其未極冀王道之一平兮假髙衢而騁力懼匏瓜之徒懸兮畏井泄之莫食步棲遲以徙倚兮白日忽其將匿風蕭瑟而並興兮天慘慘而無色獸狂顧以求羣兮鳥相鳴而舉翼原野閴其無人兮征夫行而未息心悽慘以感發兮意忉怛而憯惻循階除而下降兮氣交憤於胸臆夜參半而不寐兮悵盤桓以反側浮淮賦從王師以南征兮浮淮水而遐逝背渦浦之曲流兮望馬丘之髙澨泛洪櫓于中潮兮飛輕舟乎濵濟建衆檣以成林兮譬無山之樹藝於是迅流興潭偎濤波動長瀨鉦鼓若雷旌麾翳日飛雲天回蒼鷹飄逸滂㳍洶溶遞相競軼飛驚波以髙騖馳駭浪而赴質加舟徒之巧極美榜人之間疾白日未移前驅已屆羣師按部左右就隊舳艫千里名卒億計運兹威以赫怒清海隅之蒂芥濟元勳於大舉垂休績乎逺裔初征賦違世難以回析兮超遙集于蠻楚逢屯否而底滯兮忽長幼以羈旅賴皇華之茂功清四海之疆宇超南荆之北境踐周豫之末畿野蕭條而騁望路周達而平夷春風穆其和暢兮庶卉煥以敷蕤行中國之舊壤實吾願之所依當短景之炎陽犯隆暑之赫曦薰風溫溫以增熱體燁燁其若焚羽獵賦濟漳浦而橫陳倚紫陌而並征樹重罝於西址列駿騎乎北坰遵古道以遊豫兮昭勸助乎農圃因時隙之餘日兮陳苗狩而講旅相公乃乘輕軒駕四駱拊流星屬繁弱選徒命士威興竭作旌旗雲擾鋒刃林錯揚輝吐火曜野蔽澤山川於是乎搖蕩草木為之摧落禽獸振駭魂亡氣奪舉首觸絲搖尾遇撻陷心裂胃潰頸破頰鷹犬競逐奕奕霏霏下韝窮緤搏肉噬肌墜者若雨僵者若坻清野滌原莫不殱夷思友賦登城隅之髙觀忽臨下以翺翔行逰目於林中覩舊人之故場身既沒而不見餘迹存而未喪滄浪浩兮回流波水石激兮揚素精夏木兮結莖春鳥兮愁鳴平原兮泱漭緑草兮羅生超長路兮逶迤實舊人兮所經身既逝兮幽翳魂眇眇兮藏形傷夭賦惟皇天之賦命實浩蕩而不均或老終以長世或昏夭而夙泯物雖存而人亡心惆悵而長慕哀皇天之不惠抱此哀而何訴求魂神之形影羌幽冥而弗忤淹徘徊以想像心彌結而紆縈晝忽忽其若昏夜炯炯而至明出婦賦既僥幸兮非望逢君子兮𢎞仁當隆暑兮翕赫猶蒙眷兮見親更盛衰兮成敗思情固兮日新竦余身兮敬事理中饋兮恪勤君不篤兮終始樂枯荑兮一時心搖蕩兮變易忘舊姻兮棄之馬已駕兮在門身當去兮不疑攬衣帶兮出户顧堂室兮長辭寡婦賦闔門兮却掃幽處兮髙堂提孤孩兮出户與之步兮東廂顧左右兮相憐意悽愴兮摧傷觀草木兮敷榮感傾葉兮落時人皆懷兮歡豫我獨感兮不怡日暗曖兮不昏明月皎兮揚暉坐幽室兮無為登空牀兮下幃涕流連兮交頸心憯結兮增悲神女賦惟天地之普化何産氣之淑真陶隂陽之休液育夭麗之神人稟自然以絶俗超希世而無羣體纎約而方足膚柔曼以豐盈髮似玄鑒鬢類刻成質素純皓粉黛不加朱顔熙曜曄若春華脣譬含丹目若瀾波美姿巧笑靨輔竒牙戴金羽之首飾珥照夜之珠璫襲羅綺之黼衣曳縟繡之華裳錯繽紛以雜袿佩熠爚而焜煌退變容而改服冀致態以相移稅衣裳兮免簪筓施華的兮結羽儀揚睋微盼懸眇流離婉約綺媚舉動多宜稱詩表志安氣和聲探懷授心發露幽情彼佳人之難遇真一遇而長别顧大罰之淫愆亦終身而不滅心交戰而貞勝乃回意而自絶間邪賦夫何英媛之麗女貌洵美而艷逸橫四海而無仇超遐世而秀出發棠棣之春華當盛年而處室恨年嵗之方暮哀獨立而無依情紛拏以交橫意慘悽而增悲何性命之竒薄愛兩絶而俱違排空房而就袵將取夢以通靈目炯炯而不寐心忉怛而惕驚大暑賦惟林鍾之季月重陽積而上升喜潤土之溽暑扇溫風而至興或赫熾以瘴炎或鬱律而燠蒸獸狼望以倚喘鳥垂翼而弗翔根生苑而焦炙豈含血而能當逺昆吾之中景天地翕其同光征夫瘁於原野處者困於門堂患衽席之焚灼譬洪燎之在床起屏營而東西欲避之而無方仰庭槐而嘯風風既至而如湯氣呼吸以怯短汗雨下而霑裳就清泉以自沃猶沃涊而不涼體煩如以於悒心情悶而窘惶於是帝后順時幸九嵕之隂岡託甘泉之清野御華殿於林光濳廣室之邃宇激寒流於下堂重屋百層垂蔭千廡九闥洞開周帷髙舉堅氷常奠寒饌代敘酒賦帝女儀狄旨酒是獻苾芬享祀人神式宴辨其五齊節其三事醍沈盎泛清濁各異章文德於廟堂協武義于三軍致子弟之孝養糾骨肉之睦親成朋友之歡好贊交往之主賔既無禮而不入人何事而不因賊功業而敗事毁名行以取誣遺大恥於載籍滿簡帛而見書孰不飲而罹兹罔非酒而惟事昔在公旦極兹話言濡首屢舞談易作難大禹所忌文王是艱投壺賦序附彈碁賦序附夫注心鋭志自求諸身投壺是也因行騁志通權達理六博是也圍碁賦序附清靈體道稽謨玄神圍碁是也馬瑙勒賦逰大國以廣觀覽希世之偉寶總衆材而課美信莫臧於馬瑙被文采之華飾雜朱緑與蒼皂於是乃命工人裁以飾勒因姿象形匪雕匪刻厥容應規厥性順德御世嗣之駿服表騄驥之儀則車渠碗賦侍君子之宴坐覽車渠之妙珍挺英才於山嶽含隂陽之淑貞飛輕縹與浮白若驚風之飄雲光清朗以內曜澤溫潤而外津體貞剛而不撓理條達而有文雜玄黃以為質似乾坤之未分兼五德之上美超衆寶而絶倫迷迭賦惟遐方之珍草兮産崑崙之極幽受中和之正氣兮承隂陽之靈休揚豐馨於西裔兮布和種於中州去原野之側陋兮植髙宇之外庭布萋萋之茂葉兮挺苒苒之柔莖色光潤而采發兮似孔翠之揚精栁賦昔我君之定武致天屆而徂征元子從而撫軍植佳木于兹庭歷春秋以踰紀行復出於斯鄉覽兹樹之豐茂紛旖旎以修長枝扶踈而覃布莖森梢以奮揚人情感於舊物心惆悵以增慮行遊目而廣望觀城壘之故處悟元正之話言信思難而存懼嘉甘棠之不伐畏取纍於此樹茍逺迹而退之豈駕馳而不屢槐賦惟中唐之竒樹稟天然之淑姿超疇畝而登殖作階庭之華暉形褘褘以暢條色采采而鮮明豐茂葉之幽藹履中夏而敷榮既立本於殿省植根柢其𢎞深鳥願栖而投翼人望庇而披襟白鶴賦白翎稟靈龜之修夀資儀鳯之純精接王喬於暘谷駕赤松於扶桑餐靈嶽之瓊蘂吸雲表之露漿鸚鵡賦步籠阿以躑躅叩衆目之希稠登衡幹以上干噭哀鳴而舒憂聲嚶嚶以髙厲又憀憀而不休聽喬木之悲風羡鳴友之相求日暗靄以西邁忽逍遙而既冥就隅角而斂翼倦獨宿而宛頸鶡賦惟兹鶡之為鳥信才勇而徑武服乾剛之正氣被淳駹之質羽訴晨風以羣鳴震聲發乎外宇厲廉風與猛節超羣類而莫與惟膏薰之焚銷固自古之所咨逢虞人而見獲遂囚執乎縹纍賴有司之圖功不開小而漏微令薄軀以免害從孔鶴於園湄鶯賦覽堂隅之籠鳥獨髙懸而背時雖物微而命輕心悽愴而愍之日奄藹以西邁忽逍遙而既冥就隅角而斂翼眷獨宿而宛頸歷長夜以向晨聞倉庚之羣鳴春鳩翔於南甍戴鵀集乎東榮既同時而異憂實感類而傷情書為劉荆州與袁談書天降災害禍難殷流初交殊族卒成同盟使王室震蕩彛倫攸斁是以智逹之士莫不痛心入骨傷時人不能相忍也然孤與太公志同願等雖楚魏絶邈山河逈逺戮力乃心共奬王室使非族不干吾盟異類不絶吾好此孤與太公無二之所致也功績未卒太公殂隕賢胤承統以繼洪業宣奕世之德履丕顯之祚摧嚴敵於鄴都揚休烈於朔土顧定疆宇虎視河外凡我同盟莫不景附何悟青蠅飛於竿旌無忌遊於二壘使股肱分成二體胸膂絶為異身初聞此問尚謂不然定聞信來乃知閼伯實沈之忿已成棄親即讐之計已決旃斾交於中原暴尸纍於城下聞之哽咽若存若亡昔三王五伯下及戰國君臣相弒父子相殺兄弟相殘親戚相滅蓋時有之然或欲以成王業或欲以定霸功皆所謂逆取順守而徼富強于一世也未有棄親即異兀其根本而能全於長世者也昔齊襄公報九世之讐士丐卒荀偃之事是故春秋美其義君子稱其信夫伯遊之恨於齊未若太公之忿於曹也宣子之臣承業未若仁君之繼統也且君子違難不適讐國交絶不出惡聲况忘先人之讐棄親戚之好而為萬世之戒遺同盟之恥哉蠻夷戎狄將有誚讓之言况我族類而不痛心邪夫欲立竹帛於當時全宗祀於一世豈宜同生分謗爭校得失乎若冀州有不弟之慠無慙順之節仁君當降志辱身以濟事為務事定之後使天下平其曲直不亦為髙義邪今仁君見憎於夫人未若鄭莊之於薑氏昆弟之嫌未若重華之於象敖然莊公卒崇大隧之樂象敖終受有鼻之封願捐棄百痾追攝舊義復為母子昆弟如初今整勒士馬瞻望鵠立為劉荆州與袁尚書表頓首頓首將軍麾下勤整六師芟討暴虐戎馬厮養罄無不宜甚善甚善河山阻限狼虎當路雖遣驛使或至或否使引領告而莫達初聞郭公則辛仲治通內外之言造交遘之隙使士民不協姦釁並作聞之愕然為增忿怒校尉劉堅皇河田買等前後到荆得二月六日所起書又得賢兄貴弟顯雍及審別駕書陳敘事變本末之理乃知變起辛郭禍結同生追閼伯實沈之蹤忘棠棣死喪之義親尋干戈僵尸流血聞之哽咽若存若亡乃追案書傳思與古比昔軒轅有涿鹿之戰周公有商奄之軍皆所以剪除災害而定王業者也非強弱之爭喜怒之忿也是故滅親不為尤誅兄不傷義也今二君初承洪業纂繼前軌進有國家傾危之慮退有先公遺恨之責當惟曹氏是務不爭雄雌之勢惟國是康不計曲直之利雖蒙塵垢罪下為𨽻圉析入汙泥猶當降志辱身方以定事為計何者夫金木水火以剛柔相濟然後克得其和能為民用若使金與金相忤火與火相爛則燋然摧折俱不得其所也今青州天性峭急迷於目前曲直是非昭然可見仁君智數𢎞大綽有餘裕當以大包小以優容劣歸是於此乃道教之和義士之行也縱不能爾有難忍之忿且當先除曹操以卒先公之恨事定之後乃議兄弟之怨使記注之士定曲直之評不亦上䇿邪且初天下起兵以尊門為主是以衆寡喁喁莫不樂袁氏之大也今雖分裂有存有亡嚮然景附未有革心若仁君兄弟能悔前之謬克已復禮以從所歡則弱者自以為強危者自以為寧誠欲戮力長驅共奬王室雖亡之日猶存之願則伊周不足參五伯不足六也若使迷而不返遂而不改則戎狄蠻夷將有誚讓之言况我同盟復能戮力為君之役哉則是太公墳壠將有汙池之禍夫人弱小將有滅族之變彼之與此豈可同日而論之哉且行違道以自存猶尚不可况失義以自亡而遺敵之禽哉此韓盧東郭自困於前而遺田父之獲也昔齊公孫竈卒晏子知子期之不免也故曰二惠競爽猶可又弱一箇薑氏危哉表與劉左將軍及北海孫公佑共説此事未嘗不痛心入骨相為悲傷也今整勒士馬憤踊鶴立冀聞和同之聲約一舉之期故復遣信并與青州書若其泰也則袁族其與漢升降乎若其否也則同盟永無望矣臨書愴恨不知所言檄為荀彧與孫權檄昨令將帥戰士就渤海七八百里演習舟楫四年之內無日休解今已擊棹若飛回柁若環七七釋濳虛丈人違世遁俗恬淡清玄渾沌淳朴薄禮愚學無為無欲均同死生混齊榮辱於是大夫聞而歎曰蓋聞君子不以仕易道不以身後時進德修業與世同理今子深藏其身髙棲其志外無所營內無所事邯鄲才女三齊巧士名唱祕舞承間並理七盤陳於廣庭疇人儼其齊俟翩飄微霍亂精蕩神巴渝代起鞞鐸響振農功既登玄隂戒寒乃致衆庶大獵中原植旌拊表班授行曲絙綱連置彌山跨谷弦不虛控矢不徒注僵禽連積隕鳥若雨麗才美色希世特立豐膚曼肌弱骨纎形鬒髮玄鬢修項秀頸紅顔照曜曄若苕榮戴明中之羽雀雜華鑷之葳蕤珥照夜之雙璫煥焴爚以垂暉聖人在位時邁其德先天弗違稽若古則睿哲文明允恭玄塞登俊乂於壠畝舉賢才於仄微置彼周行列於邦畿九德咸事百僚師師於是四海之內咸變時雍普天率土比屋可封是以棲林隱谷之夫逸迹放言之士鑒乎有道貧賤是恥記荆州文學記有漢荆州牧劉君稽古若時將紹厥績乃曰先王之為世也則象天地軌儀憲極設教導化敘經志業用建雍泮焉立師保焉作為禮樂以作其性表陳載籍以持其德上知所以臨下下知所以事上官不失守民聽無悖然後三階平焉夫文學也者人倫之守大教之本也乃命五業從事宋衷所作文學延朋徙焉宣德音以贊之降嘉禮以勸之五載之間道化大行耆德故老綦母闔等負書荷器自逺而至者三百有餘人於是童幼猛進武人革面總角佩觽委介免胄比肩繼踵川逝泉涌亹亹如也兢兢如也遂訓六經講禮物諧八音協律吕修紀厯理刑法六路咸秩百氏備矣天降純嘏有所底授臻於我君受命既茂南牧是建荆衡作守時邁淳德宣其丕繇厥繇伊何四國交阻乃赫斯威爰整其旅虔夷不若屢戡冦侮誕啓洪軌敦崇聖緒典墳既章禮樂咸舉濟濟縉紳盛兹階宇祁祁髦俊亦集爰處和化普暢休徴時敘品物宣育百榖繁廡勳格皇穹聲被四宇論務本論古者之理國也以本為務八政之於民也以食為首是以黎民時雍降福孔嘉也故仰伺星辰以審其時俯耕藉田以率其力封祀農稷以神其事祈縠報年以寵其功設農師以監之置田畯以董之黍稷茂則喜而受賞田不墾則怒而加罰都不得有遊民室不得有懸耜野積踰冬奪者無罪場功過限竊者不刑所以競之於閉藏也先王藉田以力任力以夫議其老幼度其逺近種有常時耘有常節收有常期此賞罰之本種不當時耘不及節收不應期者必加其罰苗實踰等必加其賞也農益地辟則吏受大賞也農損地狹則吏受重罰也夫火之焚人也甚於怠農慎火之力也輕於耘耜通邑大都有嚴令則火稀無嚴令則燒者數非賞罰不能濟也三輔論湘潛先生江濵逸老將集論雲夢玄公豫焉先生稱曰蓋聞戎不可動兵不可揚今劉牧建德垂芳名烈既彰矣曷乃稱兵舉衆殘我生靈逸老曰是何言與天生五材金作明威長沙不軌敢作亂違我牧覩其然乃赫爾發憤且上征下戰去暴舉順州牧之兵建拂天之旌鳴振地之鼓玄胄曜日犀甲如堵以此衆戰孰能嬰御劉牧之懿子又未聞乎履道懷智休迹顯光灑掃羣虜艾撥穢荒走袁術於西境馘射貫乎武當遏孫堅於漢南追楊定於折商難鍾荀太平論聖莫盛於堯而洪水方割丹朱淫虐四族凶佞矣帝舜因之而三苗畔戾矣禹因而防風為戮矣此三聖古之所大稱也繼踵相承且二百年而刑罰未嘗一世而乏也然則此三聖能乎三聖未能則何世能致之乎孔子稱曰唯上智與下愚不移不移者丹朱四凶三苗之謂也當紂之世殷罔不小大好草竊姦宄周公遷殷頑民於洛邑其下愚之人必有之矣周公之於三聖不能踰也三聖有所不化矣有所不移矣周公之不能化殷之頑民所可知也茍不可移必或犯罪罪而弗刑是失所也犯而刑之刑不可錯矣孟軻有言盡信書不如無書有大而言之者刑措之屬也豈億兆之民歷數十年而無一人犯罪一物失所哉謂之無者盡信書之謂也儒吏論士同風於朝農同業於野雖官職務殊地氣異宜然其致功成利未有相害而不通者也至乎末世則不然矣執法之吏不窺先王之典縉紳之儒不通律令之要彼刀筆之吏豈生而察刻哉起於几案之下長於官曹之間無溫裕文雅以自潤雖欲無察刻弗能得矣竹帛之儒豈生而迂緩也起於講堂之上逰於鄉校之中無嚴猛斷割以自裁雖欲不迂緩弗能得矣先王見其如此也是以博陳其教輔和民性達其所壅祛其所蔽吏服雅訓儒通文法故能寬猛相濟剛柔自克也爵論依律有奪爵之法此謂古者爵行之時民賜爵則喜奪爵則懼故可以奪賜而法也今爵事廢矣民不知爵者何也奪之民亦不懼賜之民亦不喜是空設文書而無用也今誠循爵則上下不失實而功勞者勸得古之道合漢之法以貨財為賞者不可供以復除為賞者租稅損減以爵為賞者民勸而費省故古人重爵也又爵自一級轉登十級而為列侯譬猶秩自百石轉遷而至於公也而近世賞人皆不由算級從無爵封為列侯原其所以爵廢古也司馬法曰賞不踰時欲民速觀為善之利也近世爵廢人有小功無以賞也乃積纍焉頒事足乃封侯非所以速為而及時也上觀古比髙祖功臣白起衛鞅皆稍爵為五大夫客卿庶長以至於侯非一頓而封也夫稍稍賜爵與功大小相稱而俱登既得其義且侯次有緒使慕進者逐之不倦矣安身論蓋崇德莫盛乎安身安身莫大乎存政存政莫重乎無私無私莫深乎寡欲是以君子安其身而後動易其心而後語定其交而後行然則動者吉凶之端也語者榮辱之主也求者利病之幾也行者安危之決也故君子不妄動也必適於道不徒語也必經於理不茍求也必造於義不虛行也必由於正夫然用能免或擊之凶厚自天之祐故身不安則殆言不順則悖交不審則惑行不篤則危四者存乎中則患憂接乎外矣憂患之接必生於自私而興於有欲自私者不能成其私有欲者不能濟其欲理之至也又務本論略末世之吏負青幡而布春令有觀農之名無賞罰之實又儒吏論略古者八嵗入小學學六甲五方書計之事十五入大學學君臣朝廷王事之紀則文法典藝具存於此矣連珠連珠四首臣聞明主舉士不待近習聖君用人不拘毁譽故吕尚一見而為師陳平烏集而為輔臣聞記功忘過君臣之道也不念舊惡賢人之業也是以齊用管仲而霸功立秦任孟明而晉恥雪臣聞振鷺雖材非六翮無以翔四海帝王雖賢非良臣無以濟天下臣聞觀於明鏡則疵瑕不滯於軀聽於直言則過行不纍乎身贊正考父贊恂恂正父應德孔盛身為國卿族則公姓年在耆耋三葉聞政誰能不怠申兹約敬饘粥豫口傴僂受命銘書金鼎祚及後聖反金人贊君子亮直行不柔辟友賤不恥誨焉是益我能發蹤彼用逺迹一言之賜過乎璵璧末世不敦義與兹易言而匪忠退有其謫銘刀銘有序侍中關內侯臣粲言奉命作刀銘及示以其敘二報誠必朝氏之刀而張常為工矣輒思作銘謹奉陋不足覽相時隂陽制兹利兵和諸色劑考諸濁清灌襞以數質象有呈附反載穎舒中錯形陸剸犀兕水截鯢鯨君子服之式章威靈無曰不虞戒不在明硯銘昔在皇頡爰初書契以代結繩民察官理庶績誕興在世季末華藻流淫文不為行書不盡心淳朴澆散俗以崩沈墨連翰染榮辱是若念兹在兹惟玄是宅㽔賔鐘銘有魏匡國誕成天功底綏六合纂定庶邦蒸民靡戾休徴惟同皇命孔昭造兹衡鍾紀之以三平之以六度量允嘉氣齊允淑表聲韶和民聽以睦時作㽔賔永享遐福無射鐘銘有魏匡國成功允章格于上下光于四方休徴時序人悅時康造兹衡鐘有命自皇三以紀之六以平之厥量孔嘉厥齊孔時音聲和協人德同熙聽之無斁用以啓期鐘簴銘惟魏四年歲在丙申龍次大火五月丙寅作㽔賔鐘又作無射鐘建安二十三年七月始設鐘簴於文昌殿前歲月并銘各鑄於鐘之角祭文弔夷齊文嵗旻秋之仲月從王師以南征濟河津而長驅踰芒阜之崢嶸覽首陽於東隅見孤竹之遺靈心於悒而感懷意惆悵而不平望壇宇而遙弔抑悲古之幽情知養老之可歸忘除暴之為仁潔已躬以騁志愆聖哲之大倫忘舊惡而希古退採薇以窮居守聖人之清槩要既死而不渝厲清風於貪士立果志於懦夫到于今而見稱為作者之表符雖不同於大道含尼父之所譽樂府魏文帝云仲宣獨自善于辭賦惜其體弱不足起其文至于所善古人無以逺過也詩品云粲詩其源出於李陵發愀愴之辭文秀而質在曹劉間別搆一體方陳思不足比魏文有餘詩譜云真實有餘澄瀘不足竹林詩評云王粲之作如楩柟杞梓輪離竒夫豈細材哉太廟頌建安十八年曹操為魏公加九錫始立宗廟令粲作此頌以享其先始名曰顯廟頌後人更今名思皇烈祖時邁其德肇啓洪源貽燕我則我休厥成聿先厥道丕顯丕欽允時祖考其二綏庶邦和四宇九功備彛樂序建崇牙設璧羽六佾奏八音舉昭大孝衎妣祖念武功收純祜其三於穆清廟翼翼休徴祁祁髦士厥德允升懷想成位咸奔在宫無思不若允觀厥崇俞兒舞歌四首矛俞新福歌漢初建國家匡九州蠻荆震服五創三革休安不忘備武樂修宴我賔師敬用御天永樂無憂子孫受百福常與松喬逰蒸庶德莫不咸歡柔弩俞新福歌材官選士劒弩錯陳應桴蹈節俯仰若神綏我武烈篤我淳仁自東自西莫不來賔安臺新福歌武功既定庶士咸綏樂陳我廣庭式宴賔與師昭文德宣武威平九有撫民黎荷天寵延夀尸千載莫我違行辭新福歌神武用師士素厲仁恩廣覆猛節橫逝自古立功莫我𢎞大桓桓征四國爰及海裔漢國保長慶垂祚延萬世詩贈蔡子篤翼翼飛鸞載飛載東我友云徂言戾舊邦舫舟翩翩以泝大江蔚矣荒塗時行靡通慨我懷慕君子所同悠悠世路亂離多阻濟岱江行邈焉異處風流雲散一别如雨人生實難願其弗與瞻望遐路允企伊佇烈烈冬日肅肅凄風潛鱗在淵歸鴈載軒茍非鴻雕孰能飛翻雖則追慕豫思罔宣瞻望東路慘愴增歎率彼江流爰逝靡期君子信誓不遷于時及子同寮生死同之何以贈行言授斯詩中心孔悼涕淚漣洏嗟爾君子如何勿思追五臣作進贈士孫文始三輔決録云士孫萌字文始少有才學年十五能屬文初董卓之誅也萌父瑞知王允必敗京師不可居乃命萌將家屬至荆州依劉表去無幾果為李傕等所殺及天子都許昌追論誅董卓之功封萌為淡津亭侯與山陽王粲善萌當就國粲作詩以贈萌天降喪亂靡國不夷我暨我友自彼京師宗守蕩失越用遁違遷于荆楚在漳之湄在漳之湄亦克晏處和通箎塤比德車輔既度禮儀卒獲笑語庶兹永日無愆厥緒雖曰無愆時不我已同心離事乃有逝止橫此大江淹彼南泛我思弗及載坐載起惟彼南汜君子居之悠悠我心薄言慕之人亦有言靡哲不思矧伊嬿婉胡不悽而晨風夕逝託與之期瞻仰王室慨其永歎良人在外誰佐天官四國方阻俾爾歸藩爾之歸藩作式下國無曰蠻裔不虔汝德慎爾所主率由嘉則龍雖勿用志亦靡忒悠悠淡澧鬱彼唐林雖則同域邈其逈深白駒逺志古人所針允矣君子不遐厥心既往既來無密爾音哲一作日主一作之贈文叔良翩翩者鴻率彼江濵君子于征爰聘西鄰臨此洪渚伊思梁岷爾行孔邈如何勿勤君子敬始慎爾所主謀言必賢錯説申輔延陵有作僑肸是與先民遺迹來世之矩既慎爾主亦迪知幾探情以華覩著知微視明聽聰靡事不惟董褐荷名胡寧不師衆不可蓋無尚我言梧宫致辨齊楚構患成功有要在衆思歡人之多忌掩之實難瞻彼黑水滔滔其流江漢有卷允來厥休二邦若否職汝之由緬彼行人鮮克弗留尚哉君子異于他仇人誰不勤無厚我憂惟詩作贈敢詠在舟思親詩為潘文則作穆穆顯妣德音徽止思齊先姑志侔薑姒躬此勞瘁鞠豫小子小子之生遭世罔寧烈考勤時從之于征奄遘不造殷憂是嬰咨于靡及退守祧祊五服荒離四國分爭禍難斯逼救死於頸嗟我懷歸弗克弗逞聖善獨勞莫慰其情春秋代逝于兹九齡緬彼行路焉託豫誠豫誠既否委之于天庶我顯妣克保遐年亹亹惟懼心乎如懸如何不弔早世徂顛於存弗養於後弗臨遺愆在體慘痛切心形景尸立魂爽飛沈在昔蓼莪哀有餘音我之此譬憂其獨深胡寧視息以濟于今巖巖叢險則不可摧仰瞻歸雲俯聆飄回飛焉靡翼超焉靡階思若流波情似坻頽詩之作矣情以告哀前顯字初學記作皇後顯字一作剛雜詩日暮逰西園冀寫幽思情曲池揚素波列樹敷丹榮上有特棲鳥懷春向我鳴褰袵欲從之路險不得征徘徊不能去佇立望爾形風飈揚塵起白日忽已冥回身入空房託夢通精誠人欲天不違何懼不合并飈一作飄雜詩吉日簡清時從君出西園方軌䇿良馬並驅厲中原北臨清漳水西看柏楊山回翔逰廣囿逍遙波水間其二列車息衆駕相伴緑水湄幽蘭吐芳烈芙蓉發紅暉百鳥何繽翻振翼羣相追投網引潛魚強弩下髙飛白日已西邁歡樂忽忘歸其三聯翻飛鸞鳥獨逰無所因毛羽照野草哀鳴入層雲我尚假羽翼飛覩爾形身願及春陽會交頸遘殷勤其四鷙鳥化為鳩逺竄江漢邊遭遇風雲會託身鸞鳳間天姿既否戾受性又不間邂逅見逼迫俯仰不得言七哀詩西京亂無象豺虎方遘患復棄中國去委身適荆蠻親戚對我悲朋友相追攀出門無所見白骨蔽平原路有飢婦人抱子棄草間顧聞號泣聲揮涕獨不還未知身死處何能兩相完驅馬棄之去不忍聽此言南登霸陵岸回首望長安悟彼下泉人喟然傷心肝其二荆蠻非我鄉何為久滯淫方舟溯大江日暮愁我心山岡有餘映巖阿增重隂狐狸馳赴穴飛鳥翔故林流波激清響猴猿臨岸吟迅風拂裳袂白露沾衣襟獨夜不能寐攝衣起撫琴絲桐感人情為我發悲音羈旅無終極憂思壯難任其三見古文苑邊城使心悲昔吾親更之氷雪截肌膚風飄無止期百里不見人草木誰當遲登城望亭隧翩翩飛戍旗行者不顧返出門與家辭子弟多俘虜哭泣無己時天下盡樂土何為久留兹蓼蟲不知辛去來勿與咨詠史詩自古無殉死達人所共知秦穆殺三良惜哉空爾為結髮事明君受恩良不訾臨沒要之死焉得不相隨妻子當門泣兄弟哭路陲臨穴呼蒼天涕下如綆縻人生各有志終不為此移同知埋身劇心亦有所施生為百夫雄死為壯士規黃鳥作哀詩至今聲不虧公宴詩昊天降豐澤百卉挺葳蕤涼風撤蒸暑清雲却炎暉高會君子堂並坐蔭華榱嘉肴充圓方旨酒盈金罍管絃發徽音曲度清且悲合坐同所樂但訴杯行遲常聞詩人語不醉且無歸今日不極歡含情欲待誰見眷良不翅守分豈能違古人有遺言君子福所綏願我賢主人與天享巍巍克符周公業奕世不可追從軍詩從軍有苦樂但問所從誰所從神且武焉得久勞師相公征關右赫怒震天威一舉滅獯虜再舉服羌夷西收邊地賊忽若俯拾遺陳賞越丘山酒肉踰川坻軍中多飫饒人馬皆溢肥徒行兼乘還空出有餘資拓地三千里往返速如飛歌舞入鄴城所願獲無違晝日處大朝日暮薄言歸外參時明政內不廢家私禽獸憚為犧良苗實已揮竊慕負鼎翁願厲朽鈍姿不能效沮溺相隨把鋤犂熟覽夫子詩信知所言非其二涼風厲秋節司典告詳刑我君順時發桓桓東南征泛舟蓋長川陳卒被隰坰征夫懷親戚誰能無戀情拊襟倚舟檣眷眷思鄴城哀彼東山人喟然感鸛鳴日月不安處人誰獲恆寧昔人從公旦一徂輒三齡今我神武師暫往必速平棄余親睦恩輸力竭忠貞懼無一夫用報我素餐誠夙夜自恲性思逝若抽縈將秉先登羽豈敢聽金聲恆善本作常其三從軍征遐路討彼東南夷方舟順廣川薄暮未安坻白日半西山桑梓有餘暉蟋蟀夾岸鳴孤鳥翩翩飛征夫心多懷悽愴令吾悲下船登髙防草露霑我衣回身赴牀寢此愁當告誰身服干戈事豈得念所私即戎有授命兹理不可違悽善作惻其四朝發鄴都橋暮濟白馬津逍遙河隄上左右望我軍連舫踰萬艘帶甲千萬人率彼東南路將定一舉勳籌䇿運帷幄一由我聖君恨我無時謀譬諸具官臣鞠躬中堅內微畫無所陳許歷為完士一言猶敗秦我有素餐責誠愧伐檀人雖無鉛刀用庶幾奮薄身猶善本作獨其五悠悠涉荒路靡靡我心愁四望無煙火但見林與丘城郭生榛棘蹊徑無所由萑蒲竟廣澤葭葦夾長流日夕涼風發翩翩漂吾舟寒蟬在樹鳴鸛鵠摩天逰客子多悲傷淚下不可收朝入譙郡界曠然消人憂雞鳴達四境黍稷盈原疇館宅充鄽里士女滿莊馗自非賢聖國誰能享斯休詩人美樂土雖客亦願留漢魏六朝百三家集卷二十九
