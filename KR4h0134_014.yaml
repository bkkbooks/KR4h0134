body:
  text: 漢魏六朝百三家集卷十四漢張衡集目録賦南都賦周天大象賦溫泉賦羽獵賦思玄賦歸田賦定情賦扇賦觀舞賦冢賦髑髏賦誥東巡誥疏大疫上疏陳事疏駁圖讖疏論貢舉疏論舉孝廉疏策水災對策表求合正三史表日蝕上表請専事東觀收檢遺文表書與崔瑗書又與特進書又又又七七辨設難應間應間序議厯議説渾儀靈憲靈應銘綬笥銘有引贊南陽文學儒林書贊誄大司農鮑德誄司徒吕公誄司空陳公誄又樂府怨篇同聲歌詩四愁詩漢魏六朝百三家集卷十四目録欽定四庫全書漢魏六朝百三家集卷十四明張溥輯張衡集賦南都賦南都為光武舊里以置都焉桓帝時欲廢之衡作賦以諷於顯樂都既麗且康陪京之南居漢之陽割周楚之豐壤跨荆豫而為疆體爽塏以間敞紛郁郁其難詳爾其地勢則武闕關其西桐柏揭其東流滄浪而為隍廓方城而為墉湯谷涌其後淯水蕩其胸推淮引湍三方是通其寶利珍怪則金彩玉璞隋珠夜光銅錫鉛鍇赭堊流黃緑碧紫英青艧丹粟太乙餘糧中黃玨玉松子神陂赤靈解角耕父揚光於清泠之淵遊女弄珠於漢皋之曲其山則崆㟅嶱嵑嵣㟐嶚刺岝㟯嶵嵬􅋂巇屹􅝝幽谷嶜岑夏含霜雪或峮嶙而纚聯或豁爾而中絶鞠巍巍其隱天俯而觀乎雲霓若夫天封大狐列仙之陬上平衍而曠蕩下蒙籠而﨑嶇坂坻嶻嶭而成巘溪壑錯繆而盤紆芝房菌蠢生其隈玉膏滵溢流其隅崑崙無以奓閬風不能踰其木則柳松楔㮨槾柏杻橿楓柙櫨櫪帝女之桑楈丫栟櫚柍柘檍檀結根竦本垂條嬋媛布緑葉之萋萋敷華蘂之蓑蓑玄雲合而重陰谷風起而增哀攢立叢駢青冥盰瞑杳藹蓊鬱於谷底森䔿尊而刺天虎豹黃熊遊其下豰玃揉㹶戲其巔鸞鸑鵷雛翔其上騰猿飛􅚦棲其間其竹則籦籠䈽篾篠簳箛箠緣延坻坂澶漫陸離阿那蓊茸風靡雲披爾其川瀆則滍澧􅖐濜發源岩穴潛廅洞出沒滑瀎潏布濩漫汗漭沆洋溢總括趣欱箭馳風疾流湍投濈砏汃輣軋長輸逺逝漻淚淢汨其水蟲則有蠳龜鳴蛇潛龍伏螭鱏鱣鰅鱅黿鼉鮫􅏲巨蚌函珠駮蝦委蛇其陂澤則有鉗盧玉池赭陽東陂貯水渟汙亘望無涯其草則有藨苧薠莞蔣蒲蒹葭藻苑菱芡芙蓉含華從風發榮菲披芬葩其鳥則有鴛鴦鵠鷖鴻鴇鴐鵝􅤛鶂鸊鶙鷫鷞鵾鸕嚶嚶和鳴淡淡隨波其水則開竇灑流浸彼稻田溝澮脈連堤塍相輑朝雲不興而潢潦獨臻決泄則暵為溉為陸冬稌夏穱隨時代熟其原野則有桑漆麻苧菽麥稷黍百穀蕃廡翼翼與與若其園圃則有蓼蕺蘘荷薯蔗薑䪤菥蓂芋瓜乃有櫻梅山柿侯桃梨栗梬棗若榴穰橙鄧橘其香草則有薜荔蕙若薇蕪蓀萇暗曖蓊蔚含芬吐芳若其厨膳則有華薌重秬滍臯香粳歸雁鳴鵽黃稻鮮魚以為芍藥酸甜滋味百種千名春卵夏筍秋韭冬菁蘇蔱紫薑拂徹羶腥酒則九醖甘醴十旬兼清醪敷徑寸浮蟻若蓱其甘不爽醉而不酲及其糾宗綏族禴祠蒸嘗以速逺朋嘉賔是將揖讓而升宴于蘭堂珍羞琅玕充溢圓方琢雕狎獵金銀琳琅侍者蠱媚巾㡚鮮明被服雜錯履躡華英儇才齊敏受爵傳觴獻酬既交率禮無違彈琴擫籥流風徘徊清角發徵聽者增哀客賦醉言歸主稱露未晞接歡宴於日夜終愷樂之令儀於是暮春之禊元已之辰方軌齊軫祓于陽瀕朱帷連綱曜野映雲男女姣服駱驛繽紛致飾程蠱偠紹便娟微眺流睇蛾眉連卷於是齊僮唱兮列趙女坐南歌兮起鄭舞白鶴飛兮繭曳緒修袖繚繞而滿庭羅襪躡蹀而容與翩綿綿其若絶眩將墜而復舉翹遙遷延蹩􅍷蹁躚結九秋之增傷怨西荆之折盤彈箏吹笙更為新聲寡婦悲吟鵾雞哀鳴坐者悽欷蕩魂傷精於是羣士放逐馳乎沙場騄驥齊鑣黃間機張足逸驚颷鏃析毫芒俯貫魴鱮仰落雙鶬魚不及竄鳥不暇翔爾乃撫輕舟兮浮清池亂北渚兮揭南涯汰瀺灂兮船容裔陽侯澆兮掩鳬鷖追水豹兮鞭蝄蜽憚夔龍兮怖蛟螭於是日將逮昏樂者未荒收歡命駕分背回塘車雷震而風厲馬鹿超而龍驤夕暮言歸其樂難忘斯乃遊觀之好耳目之娛未覩其美者焉足稱舉夫南陽者真所謂漢之舊都也逺世則劉后甘厥龍醢視魯縣而來遷奉先帝而追孝立唐祀於堯山固靈根於夏葉終三代而始蕃非純德之宏圖孰能揆而處旃近則考侯思故匪居匪寧穢長沙之無樂歷江湘而北征曜朱光於白水會九世而飛榮察兹邦之神偉啓天心而寤靈於是宫室則有園廬舊宅隆崇崔嵬御房穆以華麗連閣煥其相徽聖皇之所逍遙靈袛之所保綏章陵鬱以菁蔥清廟肅以微微皇祖歆而降福彌萬祀而無衰帝王臧其擅美詠南音以顧懷且其君子𢎞懿明睿允恭溫良容止可則出言有章進退屈伸與時抑揚方今天地之睢刺帝亂其政豺虎肆虐真人革命之秋也爾其則有謀臣武將皆能攫戾執猛破堅摧剛排揵陷扄蹴蹈咸陽髙祖階其塗光武攬其英是以關門反距漢德久長及其去危乘安視人用遷周召之儔據鼎足焉以庀王職縉紳之倫經綸訓典敷納以言是以朝無闕政風烈昭宣也於是乎鯢齒眉夀鮐背之叟皤皤然被黃髮者喟然相與歌曰望翠華兮葳蕤建太常兮裶裶駟飛龍兮騤騤振和鸞兮京師總萬乘兮徘徊按平路兮來歸豈不思天子南巡之辭者哉遂作頌曰皇祖止焉光武起焉據彼河洛統四海焉本支百世位天子焉永世克孝懷桑梓焉真人南巡覩舊里焉周天大象賦垂萬象乎列星仰四覽乎中極一人為主四輔為翼鈎陳分司內座齊飭華蓋於是乎臨映大帝於是乎遊息尚書咨謀以納言柱史記私而奏職女史掌彤管之訓御宫揚翠娥之色陰德周給乎其隅大理詳讞乎其側天柱司晦朔之序六甲候陰陽之域其文煥矣厥功茂哉環藩衛以曲列儼閶闔之洞開北斗標建車之象移節度而齊七政文昌制戴筐之位羅將相而枕三台闢天床於玉闕乃宴休之攸御肅天理於璇璣執威權而是預天槍天棓以相指內厨內階而分據雙三夾斗而燮詣兩乙賓門而佐助爾乃天牢崇圉設禁暴之隄防太尊明位擬聖公之寵章太陽接相以班迹玄戈撥杓而耀芒勢微微而有象輔熠熠而流光薦秋成於八穀務春採於扶筐天厨敞兮供百宰傳舍開兮通四方偉天官之繁縟立疏廟之隆崇何太角之皎皎夾攝提之融融七宿畫野以分區五宫立都而對雄既以歷於中宫乃回眸而顧東觀角亢於黃道包分野於營中開天門之燦耀揖進賢之雍容是推紀於變節是正綱於大同其次則梗河備預招搖候敵泛舟亢池飛觴帝席周鼎育神天田豐籍按三條於平道賓萬國於天門置平星以決獄列騎官而衛閽陽門守於邊險折威防於將奔頡頏司於五聽車騎參於八屯望南門之峻關覿庫樓之城府偃蹇列於四衡的歷分於五柱或藏兵而蓄鋭或重扄而禦侮煥蒼龍之中宿矚氐心以及房聽朝路寢布政明堂爰俾其地于宋之疆粵若大火赫然天王鈎鈐儼於鳯闕積卒穆於龍驤天輻備於舉輦鍵閉守於關梁騎陳啓將軍之位從官主巫醫之職罰作贖刑日為陽德二咸防非而體正七公議賢而紏慝陳車雷擊乎其南天乳露滋乎其北彼貫索之為狀實幽囹之取則歷龍尾以及箕􅀈北燕而在兹配四妃而有序均九子以延慈龜曳尾而波泳魚張鱗而水嬉天江為太陰之主傳説奉中闈之祠粳為簸揚之物杵為舂臼之用天鑰司其啓閉丈人存其播種狗以吠盜姦回靡縱却睇女床前瞻天紀耀棘庭之金印粲椒宫之玉齒中有崇垣厥名天市車肆中衢以連屬市樓臨算而鬱起帝座類候而獨尊侯臣光熙而燮理宗星𣲖踈而逺集宦者刑餘而近侍列肆與屠肆分行宗正與宗人同峙帛度立象以量用斗斛裁形而取擬若乃眺北宫於玄武泊南斗而牽牛賦象通犧廟之類司域應江淮之洲建星含曜於黃道天辨寫映於清流河鼓進軍以嘈囋兩旗夾道以飛浮天淵委輸於南海狗國分疆於北幽雞揚音而顧侣鱉曜影而來遊天田臨於九坎羅堰逼於天桴是司溝洫是制田疇遂聳睇於漢陽乃攸寬於織女引寶育囿搖機㺯杼輦道清塵而俟駕漸臺飛灰而候吕可以嬉遊可以臨處瞻須女之繒室奄開邦於會稽離珠耀珍於藏府匏瓜薦果於宸閨離瑜佩瓊而衒服敗瓜委蔓以分畦其外鄭越開國燕趙鄰境韓魏接連齊秦悠永周楚列曜晉代分冏天津橫漢以摛光奚仲臨津而泛影既編梁以虹搆亦裁輪而電警列虛危於齊濟職悲哀與宗廟墳墓寫狀以孤出哭泣含聲而相召敗臼察災而揚輝天壘守夷而駢照司命與司祿連彩司危與司非疊耀伺禍福之多端總興亡之要妙人掌詔以優遊儼為人之質鈎主震而屈曲宛如鈎之象車府息雷轂之聲造父曳風鑾之響杵軍給以標正臼年豐而示仰土吏設偹以司存斧鉞用誅之所掌虛梁闃寂以幽閟蓋屋喧轟而宴賞天錢納賮以山積天網憩輿而野饗北落置候兵之門八魁建張禽之網瞻廟府於室壁諒有衛之封畿布離宫之皎皎散雲雨之霏霏霹靂交震雷電橫飛壘壁寫陳而齊影羽林分營而析暉土公司築而開務天廏飛御而起機騰蛇宛而成質水蟲總而攸歸動則飛躍於雲外止則盤縈於漢沂迤奎婁之分野辨鄒魯之川陸豢馴獸於囿苑𨽻封豕於溝瀆左更處東而掌虞右更居西以司牧立囷倉之儲聚樹溷屏之重復司空主土以搜祥鈇鑕營芻而薦畜軍南門列轅而逺出天將軍揚旗而示逐伊王良之策馬則車騎之滿野蒙居河而路塞䇿裁鞭而電寫閣道優遊而據中附路偹闕而居下自胃倉而昴畢實趙地之交衢建旄頭而肅引畢罕車而迅驅卷舌則天讒之表附耳屬天髙之隅天髙望氣天讒偹巫卷舌安其寂默附耳矜其諂諛天船泛影乎清瀨貯積水而窺害太陵分光乎耀虛包積尸而如帶礪石資乎鋸刃月宿歸乎太陰天街畫於戎野天阿察於山林天節宣威於邦域天陰進謀於腹心天庾積粟以示稔天廩偹稷以祈歆天園曲列兮儲芳樹天苑圓開兮畜異禽芻藁遵納秸之軌殊國曉重譯之音九斿排鋒以進退軍井依營而淺深天關嚴扄於畢野諸王列藩於漢潯何五車之均明而三柱之照煥納五兵於藏府圖七國之邦貫天潢利涉以淪漣咸池浮中而渺漫闢岷峨之沃壤睎觜參之曜形示斬刈以明罰收褒旅而獲寧參旗懾於邊冦玉井通於水經座旗肅穆以昭禮司怪幽求而發冥屏嫌於客厠咎於圊亦有天屎質黃效靈於是仰東井之輿鬼覽西秦之伯邑質明祀而變生鉞淬水而刑及四瀆斷江淮之候兩河占胡越之域水位㵼流而迅奔天樽奠饌而翕集軍市通貨以圓綴五侯疑議而衡立積水醖燕酬之勞積薪備牲庖之結野雞俟兵而據市天狗吠盜而映漣闕丘擬乎兩觀水府司乎百川狼援戈而野戰弧屬矢而承天老人作主而秋煥丈人通臣而夜懸子扶尊而眇邈孫孕緒而連綿惟天社之赫若實勾龍之神焉爰觀栁以及張知周疆之爰啓儼咮頸以分嗉奉滋嘗而賜醴觀夫軒轅之宫宛若騰蛇之體交雷雨之藹藹列后妃之濟濟酒旗緝宴以承歡內平繩愆而執禮爟含烽而喋冦實防邊之有俟長垣崇司域之偹少微彰處士之懿外厨調列膳之滋天相居大臣之位天紀録禽而獻齒天廣嚴祠而育粹天稷播五稼之勤東甌表三夷之類爰周翊軫厥土惟荆驅風驛之千乘奏雲門之六英長沙明而獻壽車轄朗而陳兵青丘廕於韓貊器府總於琴笙軍門坐甲於軍閫司空掌土於司平矚太微之崢嶸啓端門之赫奕何宫庭之宏敞類乾坤之闔闢五座參一帝之謀九卿踵三公之迹儲以太子參之幸臣從官肅侍謁者通賓郎將司戟於丹陛郎位含香於紫宸乃寄屏以持法控端門之內闉明堂演化靈臺候神虎賁之徵猛士進賢之訪幽人獻淵謀於諸侯儼營衛於常陳胡天漢之昭回自東震而綿絡北貫箕而聯斗南經説而緯籥合乘津而浮瓜分漂杵而泛閣歷玉潢以汪洋淪七星而依泊惟木德之含精為歲星而明麗雖盈縮所察禍福攸繫然而得之者隆失之者替祚明君而耀朗罰昏主之光翳下為社靈上為天貴如夭胎而毁卵具職仁而施惠回騖愆期前馳舛契奮槍棓以示慝峙樓垣而表戾粵若熒惑火帝之精每執法以明罰必伺災而告誠守其邦而歲戰去其野而時清若虧信而廢禮則下乘而上征居惟釁發合與憂并浮天讒而聳劒列蚩尤而耀旌司危見而失國昭明出而起兵伊土宿之播靈為鎮星而耀質尋所履為休慶視所居為貞吉廣邦徼而斯留復軒宫而載出若崇奢而賤義則行虧而度失或含丹而舉兵或噙黑而遘疾旬始發而侯起獄漢明而主黜彼金方之耀色有太白之垂文乃降神於屏翳實建象於將軍如用兵而不察匪先達之攸聞髙出利於深戰順指著乎宏勳茍恩義之不溥則禍福之攸分或飛芒而蝕月或引彗而橫氛六賊陳災而搆禍天狗殺將而破軍咨太陰之稟粹粵星辰之攸揆乘四仲而顯晦歷一周而匝履為用罰之淵謨為出師之令軌若淫刑而縱欲則委孛而流矢白其角而表哀黑其規而應水察函劒之相去候正旗之所指非其出而夏寒錯其宜而將死於是究經緯之終始徵幽微之機符昭晰兮為人主之明鑑杳藹兮實冥祗之密樞固聲聞而響集乃形移而影趨若山石之旌處士谷風之應騶虞者也若夫退寒暑而無舛中昏旦而不越畢露雲油箕躔吹發亦有樞降軒而繞電景瑞堯而麗月雖肸蠁之難窮信靈英之未歇嘉大舜之登禪耀黃星而靡鋒壯髙祖之遇時聚五緯而相從殷堪縱眺識曹公之潛迹李郃流目知漢使之幽蹤荆軻入秦白虹貫日衛生設策長庚食昴悲夫星隕如雨而周衰彗長竟天而秦滅蛇隨楚而九域含嗟狗過梁而千里流血晉君終而婺妖見漢帝圍而參暈結周楚滅而南衝晉齊殃而北裂自大辰以及漢彰宋焚而衛爇或除舊以布新顯陳盛而薑絶諒吉凶之有兆匪災譴之虛設固罔念而作狂在恭已而成哲是以帝王之有天下也莫不分設其官式司其告唐則羲和降察夏則昆吾演奧嘉殷巫之美服登周史之雅號宋述子韋鄭稱裨竈唐昧與尹臯宣範甘德暨石申垂誥故能下守職而恪恭上知變而無傲此希夷之妙象豈蒙昧之私好有少微之養寂無進賢之見譽參器府之樂肆掌貫索之刑書恥附耳之求達方卷舌以幽居且扄扉而絶駟奈臨河而羡魚望天門而屏迹安知公卿之所如溫泉賦陽春之月百草萋萋余在逺行顧望有懷遂適驪山觀溫泉浴神井風中巒壯厥類之獨美思在化之所原感洪澤之普施乃為賦云覽中域之珍怪兮無斯水之神靈控湯谷於瀛洲兮濯日月乎中營蔭髙山之北埏處幽屏以間清於是殊方跋涉駿奔來臻士女曄其鱗萃紛雜遝其如煙亂曰天地之德莫若生兮帝育蒸民懿厥成兮六氣淫錯有疾癘兮溫泉汨焉以流穢兮蠲除苛慝服中正兮熙哉帝載保性命兮羽獵賦皇上感天威之繆烈思太昊之觀虞虞人表林麓而廓萊藪翦荆梓而夷榛株於是鳯皇獻厯太僕駕具蚩尤先驅雨師清路山靈護陳方神蹕御羲和捧轡弭節西征翠蓋葳蕤鸞鳴瓏玲山谷為之淡淡丘陵為之簸傾於是皇輿綢繆遷延容與抗天津於伊洛敻遙集乎南圃大詔獵者竟逐長驅輕車颷厲羽騎電騖霧合雲集波流雨注馬蹂麋鹿輪轔雉兔弓不妄彎弩不虛舉鳥驚絓獸與矢遇思玄賦仰先哲之玄訓兮雖彌髙而弗違匪仁里其焉宅兮匪義迹其焉追潛服膺以永靚兮綿日月而不衰伊中情之信修兮慕古人之貞節竦余身而順止兮遵繩墨而不跌志團團以應懸兮誠心固其如結旌性行以制佩兮佩夜光與瓊枝􅀈幽蘭之秋華兮又綴之以江蘺美襞積以酷烈兮允塵邈而難虧既姱麗而鮮雙兮非是時之攸珍奮余榮而莫見兮播余香而莫聞幽獨守此仄陋兮敢怠皇而舍勤幸二八之遻虞兮喜傳説之生殷尚前良之遺風兮恫後辰而無及何孤行之焭焭兮孑不羣而介立感鸞鷖之特棲兮悲淑人之稀合彼無合其何傷兮患衆偽之冒真旦獲讟于羣弟兮啓金縢而乃信覽蒸民之多僻兮畏立辟以危身增煩毒以迷惑兮羌孰可與言已私湛憂而深懷兮思繽紛而不理願竭力以守義兮雖貧窮而不改執雕虎而試象兮阽焦原而跟趾庶斯奉以周旋兮要既死而後已俗遷渝而事化兮泯規矩之圜方珍蕭艾於重笥兮謂蕙芷之不香斥西施而弗御兮羈腰裊以服箱行陂僻而獲志兮循法度而離殃惟天地之無窮兮何遭遇之無常不抑操而茍容兮譬臨河而無航欲巧笑以干媚兮非余心之所嘗襲溫恭之黻衣兮披禮義之繡裳辮貞亮以為鞶兮雜技藝以為珩昭綵藻與雕琢兮璜聲逺而彌長淹棲遲以恣欲兮曜靈忽其西藏恃已知而華豫兮鶗鴂鳴而不芳冀一年之三秀兮遒白露之為霜時亹亹而代序兮疇可與乎比伉咨妒嫮之難並兮想依韓以流亡恐漸冉而無成兮留則蔽而不彰心猶豫而狐疑兮即岐址而臚情文君為我端蓍兮利肥遁以保名歷衆山以周流兮翼迅風以揚聲二女感於崇嶽兮或氷折而不營天蓋髙而為澤兮誰云路之不平勔自強而不息兮蹈玉階之嶢崢懼筮氏之長短兮鑽東龜以觀禎遇九臯之介鳥兮怨素意之不逞遊塵外而瞥天兮據冥翳而哀鳴雕鶚競於貪婪兮我修潔以益榮子有故於玄鳥兮歸母氏而後寧占既吉而無悔兮簡元辰而俶裝旦余沐於清源兮晞余髮於朝陽漱飛泉之瀝液兮咀石菌之流英翾鳥舉而魚躍兮將往走乎八荒過少皥之窮野兮問三丘于句芒何道真之淳粹兮去穢纍而彯輕登蓬萊而容與兮鼇雖抃而不傾留瀛洲而採芝兮聊且以乎長生憑歸雲而遐逝兮夕余宿乎扶桑吸青岑之玉醴兮餐沆瀣以為糧發夕夢於木禾兮穀崑崙之髙岡朝吾行於暘谷兮從伯禹於稽山集羣臣之執玉兮疾防風之食言指長沙以邪徑兮存重華乎南鄰哀二妃之未從兮翩儐處彼湘瀕流目眺乎衡阿兮睹有黎之圮墳痛火正之無懷兮託山陂以孤魂愁蔚蔚以慕逺兮越卬州而愈敖躋日中于昆吾兮憩炎火之所陶揚芒熛而絳天兮水泫沄而涌濤溫風翕其增熱兮惄鬱邑其難聊顝羈旅而無友兮余安能乎留兹顧金天而歎息兮吾欲往乎西嬉前祝融使舉麾兮纚朱鳥以承旗躔建木於廣都兮跖若華而踟蹰超軒轅於西海兮跨汪氏之龍魚聞此國之千嵗兮曾焉足以娛余思九土之殊風兮從蓐收而遂徂歘神化而蟬蛻兮朋精粹而為徒蹶白門而東馳兮云台行乎中野亂弱水之潺湲兮逗華陰之湍渚號馮夷俾清津兮棹龍舟以濟豫會帝軒之未歸兮悵相佯而延佇呬河林之蓁蓁兮偉關雎之戒女黃靈詹而訪命兮摎天道其焉如曰近信而逺疑兮六籍闕而不書神逵昧其難覆兮疇克謀而從諸牛哀病而成虎兮雖逢昆其必噬鱉令殪而尸亡兮取蜀禪而引世死生錯而不齊兮雖司命其不晢竇號行於代路兮後膺祚而繁廡王肆侈於漢庭兮卒銜恤而絶緒尉尨眉而郎潛兮逮三葉而遘武董弱冠而司衮兮設王隧而弗處夫吉凶之相仍兮恆反側而靡所穆屆天以悅牛兮豎亂叔而幽主文斷祛而忌伯兮閹謁賊而寧后通人暗於好惡兮豈愛惑之能剖嬴擲讖而戒胡兮備諸外而發內或輦賄而違車兮孕行産而為對慎竈顯於言天兮占水火而妄訊梁叟患夫黎丘兮丁厥子而剚刃親所睇而弗識兮矧幽冥之可信母綿攣以涬巳兮思百憂以自疢彼天監之孔明兮用棐忱而佑仁湯蠲體以禱祈兮蒙厖褫以拯人景三慮以營國兮熒惑次於它辰魏顆亮以從治兮鬼亢回以斃秦咎繇邁而種德兮德樹茂乎英六桑末寄夫根生兮卉既雕而已育有無言而不酬兮又何往而不復盍逺迹以飛聲兮孰謂時之可蓄仰矯首以遙望兮魂敞惘而無疇逼區中之隘陋兮將北度而宣遊行積氷之磑磑兮清泉沍而不流寒風淒其永至兮拂穹岫之騷騷玄武縮於彀中兮螣蛇蜿而自糾魚矜鱗而并凌兮鳥登木而失條坐太陰之屏室兮慨含欷而增愁怨髙陽之相遇兮㑋顓頊之宅幽庸織絡於四裔兮斯與彼其何瘳望寒門之絶垠兮縱余緤乎不周迅飈潚其媵我兮騖翩飄而不禁越谽􅧸之洞穴兮標通淵之碄碄經重陰乎寂寞兮愍墳羊之潛深追慌忽於地底兮軼無形而上浮出石密之暗野兮不識蹊之所由速燭龍令執炬兮過鍾山而中休瞰瑤溪之赤岸兮弔祖江之見劉聘王母於銀臺兮羞玉芝以療飢戴勝憗其既歡兮又誚余之行遲載太華之玉女兮召洛浦之宓妃咸姣麗以蠱媚兮增嫮眼而蛾眉舒訬婧之纎腰兮揚雜錯之袿徽離朱脣而微笑兮顔的礫以遺光獻環琨與璵縭兮申厥好以玄黃雖色豔而賂美兮志浩蕩而不嘉雙材悲於不納兮並詠詩而清歌歌曰天地煙煴百卉含花鳴鶴交頸睢鳩相和處子懷春精魂回移如何淑明忘我實多將答賦而不暇兮爰整駕而亟行瞻崑崙之巍巍兮臨縈河之洋洋伏靈龜以負坻兮亘螭龍之飛梁登閬風之層城兮搆不死而為牀屑瑤蘂以為糇兮㪺白水以為漿抨巫咸使占夢兮乃貞吉之元符滋令德於正中兮含嘉秀以為敷既垂穎而顧本兮亦要思乎故居安和靜而隨時兮姑純懿之所廬戒庶寮以夙會兮僉恭職而並迓豐隆軯其震霆兮列缺曅其照夜雲師􅞝以交集兮涷雨沛其灑塗轙雕輿而樹葩兮擾應龍以服輅百神森其備從兮屯騎羅而星布振余袂而就車兮修劒揭以低昂冠嵒嵒其映蓋兮佩綝纚以輝煌僕夫儼其正䇿兮八乘攄而超驤氛旄溶以天旋兮霓旌飄而飛揚撫軨軹而還睨兮心灼􅀈其如湯羡上都之赫戲兮何迷故而不忘左青雕以揵芝兮右素威以司鉦前長離使拂羽兮委水衡乎玄冥屬箕伯以函風兮澄淟涊而為清曳雲旗之離離兮鳴玉鸞之譻譻涉青霄而升遐兮浮蔑蒙而上征紛翼翼以徐戾兮焱回回其揚靈呌帝閽使闢扉兮覿天皇於瓊宫聆廣樂之九奏兮展泄泄以肜肜考理亂于律鈞兮意建始而思終惟盤逸之無斁兮懼樂往而哀來素女撫弦而餘音兮大容吟曰念哉既防溢而靜志兮逮我暇以翺翔出紫宫之肅肅兮集太微之閬閬命王良掌䇿駟兮踰髙閣之鏘鏘建罔車之幕幕兮獵青林之芒芒彎威弧之撥剌兮射嶓冢之封狼觀壁壘于北落兮伐河鼓之磅硠乘天潢之泛泛兮浮雲漢之湯湯倚招搖攝提以低回戮流兮察二紀五緯之綢繆遹皇偃蹇夭矯㛯以連卷兮雜沓叢悴颯以方驤戫汨飂戾沛以罔象兮爛漫麗靡藐以迭逖淩驚雷之砊􅐀兮㺯狂電之淫裔踰厖鴻于宕冥兮貫倒景而高厲廓蕩蕩其無涯兮乃今窮乎天外據開陽而俯盼兮臨舊鄉之暗藹悲離居之勞心兮情悁悁而思歸魂眷眷而屢顧兮馬倚輈而徘徊雖遨遊以偷樂兮豈愁慕之可懷出閶闔兮降天塗乘飈忽兮馳虛無雲霏霏兮繞余輪風眇眇兮震余旟繽聯翩兮紛暗曖倐眩眃兮反常閭收疇昔之逸豫兮卷淫放之遐心修初服之娑娑兮長余珮之參參文章煥以粲爛兮美紛紜以從風御六藝之珍駕兮遊道德之平林結典籍而為罟兮驅儒墨而為禽玩陰陽之變化兮詠雅頌之徽音嘉曾氏之歸耕兮慕歷陵之嶔崟恭夙昔而不二兮固終始之所服也夕惕若厲以省誓兮懼余身之未勑也茍中情之端直兮莫吾知而不恧墨無為以凝志兮與仁義乎消搖不出户而知天下兮何必歷逺以劬勞系曰天長地久歲不留俟河之清袛懷憂願得逺度以自娛上下無常窮四區超踰騰躍絶世俗飄颻神舉逞所欲天不可階仙夫希柏舟悄悄吝不飛松喬高跱孰能離結精逺遊使心攜回志朅來從玄謀獲我所求夫何思歸田賦遊都邑以永久無明略以佐時徒臨川以羡魚俟河清乎未期感蔡子之慷慨從唐生以決疑諒天道之微昧追漁父以同嬉超埃塵以遐逝與世事乎長辭於是仲春令月時和氣清原隰鬱茂百草滋榮王睢鼓翼倉庚哀鳴交頸頡頏關關嚶嚶於焉逍遙聊以娛情爾乃龍吟方澤虎嘯山丘仰飛纎繳俯釣長流觸矢而斃貪餌吞鈎落雲間之逸禽懸淵沈之鯊鰡于時曜靈俄景繼以望舒極盤遊之至樂雖日夕而忘劬感老氏之遺誡將回駕乎蓬廬彈五絃之妙指詠周孔之圖書揮翰墨以奮藻陳三皇之軌模茍縱心於域外安知榮辱之所如定情賦夫何妖女之淑麗光華豔而秀容斷當時而呈美冠明匹而無雙歎曰大火流兮草蟲鳴繁霜降兮草木零秋為期兮時已征思美人兮愁屏營扇賦採兹竹以成扇乃畫象而造儀惟規上而矩下和采爛以雜施觀舞賦客有觀舞於淮南者美而賦之曰音樂陳兮旨酒施擊靈鼓兮吹參差叛淫衍兮漫陸離於是飲者皆醉日亦既昃美人興而將舞乃修容而改服襲羅縠之雜錯申綢繆而自飾拊者啾其聲􅍌盤鼓煥以駢羅抗修褎以翳面展清聲而長歌歌曰驚雄遊兮孤雌翔臨歸風兮思故鄉搦纎腰以玄折嬛傾倚兮低昂增芙蓉之紅華兮光灼爍以發揚騰嫮目以顧盼兮盼爛爛以流光連􅀈絡繹乍續乍絶裾似飛鸞褒如回雪於是粉黛弛兮玉質粲珠簮挻兮緇髮亂然後飾笄整髮被纎垂縈同服駢奏合體齊聲進退無差若影追形冢賦載輿載步地勢是觀降此平土陟彼景山一升一降乃以斯安爾乃隳巍山平險陸刋藂林鑿盤石超峻壟構大槨高岡冠其南平原承其北列石限其壇羅竹藩其域系以修隧洽以溝瀆曲折相連迤靡相屬乃樹靈木靈木戎戎繁霜峨峨匪雕匪琢周旋顧盼亦各有行乃相厥宇乃立厥堂直之以繩正之以日有覺其材以搆玄室奕奕將將崇棟廣宇在冬不涼在夏不暑祭祀是居神明是處修隧之際亦有掖門掖門之西十有餘半下有直渠上有平岸舟車之道交通舊館思淵慮𢎞存不忘亡恢厥廟壇子孫蒸嘗宅兆之形規矩之制晞而望之方以麗踐而行之巧以廣幽墓既美鬼神既寧降之以福如水之平如春之卉如日之升髑髏賦張平子將遊目於九野觀化乎八方星回日運鳯舉龍驤南遊赤野北陟幽鄉卥經昧谷東極扶桑於是季秋之辰微風起涼聊回軒駕左翔右昂步馬於疇阜逍遙乎陵岡顧見髑髏委於路旁下居淤壤上有玄霜平子悵然而問之曰子將并糧推命以夭逝乎本喪此土流遷來乎為是上智為是下愚為是女人為是丈夫於是肅然有靈但聞神響不見其形答曰吾宋人也姓莊名周遊心方外不能自修夀命終極來齒玄丘公子何以問之對曰我欲告之於五嶽禱之於神祗起子素骨反子四肢取耳北坎求目南離使東震獻足西坤授腹五內皆還六神盡復子欲之不乎髑髏曰公子之言殊難也死為休息生為役勞冬水之凝何如春氷之消榮位在身不亦輕於塵毛巢許所恥伯成所逃况我巳化與道逍遙離朱不能見子野不能聽堯舜不能賞桀紂不能刑虎豹不能害戟劒不能傷與陰陽同其流元氣合其朴造化為父母天墜為牀褥雷電為鼓扇日月為燈燭雲漢為川池星宿為珠玉合體自然無情無欲澄之不清渾之不濁不行而至不疾而速於是言卒響絶神光除滅顧盼軫恤乃命僕夫假之以縞巾衾之以玄塵為之傷涕酬於路濱誥東巡誥惟二月初吉帝將狩於岱嶽展義省方觀民設教丙寅朏率羣賔備法駕以祖于東門乙酉觀禮于魯而休齊焉己丑屆于靈宫是日也有鳯雙集於臺壬辰祀上帝於明堂帝曰咨豫不材為天地主懷栗翹光百僚萬幾心之謂矣孰朕之勞上帝有靈不替朕命誕敢不祗承凡庶與祭於壇墠之位者曰懷爾邦君實願先帝載厥大宗以左右朕躬羣臣曰帝道橫被旁行海表一人有韙萬民賴之從巡助祭者兹惟嘉瑞乃歌曰皇皇者鳯通玄知時萃於山趾與帝邀期吉事有祥惟漢之祺帝曰朕不敢當亦不敢蔽天之吉命疏大疫上疏臣竊見京師為害兼所及民多病死死有滅户人人恐懼朝廷燋心以為至憂臣官在於考變禳災思任防救未知所由夙夜征營臣聞國之大事在祀祀莫大於郊天奉祖方今道路流言僉曰孝安皇帝南巡路崩從駕左右行慝之臣欲徵諸國王子故不發喪衣車還宫偽遣大臣並禱請命臣處外治不知其審然尊靈見罔豈能無怨且凡夫私小有不蠲猶為譴謫况以大穢用禮郊廟孔子曰曾謂泰山不如林放乎天地明察降禍見災乃其理也又間者有司正以冬至之後奏開恭陵神道陛下至孝不忍距逆或發冢移尸月令仲冬土事無作慎無發蓋及起大衆以固而閉地氣上泄是謂發天地之房諸蟄則死民必疾疫又隨以喪厲氣未息恐其殆此二年欲使知過改悔五行傳曰六沴作見若時共禦帝用不差神則不怒萬福乃降用章于下臣愚以為可使公卿處議所以陳術改過取媚神祇自求多福也陳事疏伏惟陛下宣哲充明繼體承天中遭傾覆龍德泥蟠今乘雲髙躋盤桓天位誠所謂將隆大位必先倥偬之也親履艱難者知下情備經險易者達物偽故能一貫萬幾靡所疑惑百揆允當庶績咸熙宜獲福祉神祇受譽黎庶而陰陽未和災眚屢見神明幽逺宜鑒在兹福仁禍淫景響而應因德降休乘失致咎天道雖逺吉凶可見近世鄭蔡江樊周廣王聖皆為效矣故恭儉畏忌必蒙祉祚奢淫諂謾鮮不夷戮前事不忘後事之師也夫情勝其性流遁忘反豈惟不肖中才皆然茍非大賢不能見得思義故積惡成釁罪不可解也向使能瞻前顧後援鏡自戒則何陷於凶患乎貴龍之臣衆所屬仰其有愆尤上下知之褒美譏惡有心皆同故怨讟溢乎四海神明降其禍辟也頃年雨常不足思求所失則洪範所謂僭恆暘若者也懼羣臣奢侈多昏踰典式自下逼上用速咎徵又前年京師地震土裂裂者威分震者人擾也君以靜唱臣以動和威自上出不趣於下禮之政也竊惟聖思厭倦制不専已恩不忍割與衆共威威不可分德不可共洪範曰臣有作威作福玉食害于而家凶于而國天鑒孔明雖疏不失災異示人前後數矣而未見所革以復往悔自非聖人不能無過願陛下思惟所以稽古率舊勿令刑德八柄不由天子若恩從上下事依禮制禮制修則奢僭息事合宜則無凶咎然後神望允塞災消不至矣駁圖讖疏臣聞聖人明審律厯以定吉凶重之以卜筮雜之以九宫經天驗道本盡于此或觀星辰逆順寒燠所由或察龜策之占巫覡之言其所因者非一術也立言於前有徵於後故智者貴焉謂之讖書讖書始出蓋知之者寡自漢取秦用兵力戰功成業遂可謂大事當此之時莫或稱讖若夏侯勝眭孟之徒以道術立名其所述著無讖一言劉向父子領校祕書閲定九流亦無讖録成哀之後乃始聞之尚書堯使鯀理洪水九載績用不成鯀則殛死禹乃嗣興而春秋讖云共工理水凡讖皆云黃帝伐蚩尤而詩讖獨以為蚩尤敗然後堯受命春秋元命包中有公輸班與墨翟事見戰國非春秋時也又言别有益州益州之置在於漢世其名三輔諸陵世數可知至於圖中訖於成帝一卷之書互異數事聖人之言藝無若是殆必虛偽之徒以要世取資往者侍中賈逵擲讖互異三十餘事諸言讖者皆不能説至於王莽篡位漢世大禍八十篇何為不戒則知圖讖成於哀平之際也且河洛六藝篇録已定後人皮傳無所容篡永元中清河宋景遂以厯紀推言水災而偽稱洞視玉版或者至於棄家業入山林後皆無效而復采前世成事以為證驗至於永建復統則不能知此皆欺世罔俗以昧藝位情偽較然莫之糾禁且律厯卦候九宫風角數有徵效世莫肯學而競稱不占之書譬猶畫工惡圖犬馬而好作鬼魅誠以實事難形而虛偽不窮也宜收藏圖讖一禁絶之則朱紫無所眩典籍無瑕玷矣論貢舉疏古者以賢取士諸侯嵗貢孝武之代郡舉孝廉又有賢良文學之選於是名臣皆出文武並興漢之得人數路而已夫書畫辭賦才之小者匡國理政未有能焉陛下即位之初先訪經術聽政餘日觀省篇章聊以遊藝當代博奕非以教化取士之本而諸生競利作者鼎沸其高者頗引經訓風喻之言下則連偶俗語有類俳優或竊成文虛冒名氏臣每受詔於盛化門差次録第其未及者亦復隨輩皆見拜擢既加之恩難復收改但守俸祿於義已加不可復使理人及任州郡昔孝宣會諸儒於石渠章帝集學士於白虎通經釋義其事優大文武之道所宜從之乃若小能小善雖有可觀孔子以為致逺則泥君子故當致其大者逺者也論舉孝亷疏汝南謝亷河南趙建年始十二各能通經尚書令左雄並奏拜童子郎自是負書來學雲集京師侍中張衡上疏自初舉孝亷到今二百年必先孝行行有餘力乃草文法耳今詔書一以能誦章句結奏案為限雖有至孝不當其科所謂損本而求末者也自改試以來纍有妖星震裂之災是天意不安於此法故也此順帝時䇿水災對策水者五行之首滯而逆流者人君之恩不能下及而教逆也表求合正三史表臣伏見陛下思光先緒以典籍為本而史書枝别條異不同一貫建武以來新裁未就後漢書注載疏略曰易稱伏羲氏王天下伏羲氏沒神農氏作神農氏沒黃帝堯舜氏作史遷獨載五帝不記三皇今宜并録又一事曰帝系黃帝産青陽昌意周書曰乃命少皥清清即清陽也今宜實定之日蝕上表今年三月朔方覺日蝕此郡懼有兵患臣愚以為可勑北邊須塞郡縣明烽火逺斥候深藏固閉無令穀畜外露請專事東觀收檢遺文表臣仰幹史職敢徼官守竊貪成訓自忘頑愚願得專於東觀畢力於紀記竭思於補闕俾有漢休烈比久長於天地並光明於日月昭示萬嗣永永不朽也書與崔瑗書乃者與朝賀明日披讀太玄經知子雲特極陰陽之數也以其滿泛故故時人不務此非特傳記之屬心與五經擬漢家得二百嵗卒乎所以作興者之數其道必顯一代常然之符也玄四百嵗其興乎竭已精思以揆其義更使人難論陰陽之事足下纍世窮道極微子孫必命世不絶且幅寫一通藏之以待能者又同前吾觀太玄方知子雲妙極道教乃與五經相擬非徒傳記之屬端力精思以揆其義使人難論陰陽之事漢家得天下二百歲之書也復二百歲殆將終乎所以作者之數必顯一世常然之符也漢四百歲玄其興矣與特進書蓬萊太史之祕府道家所貴衡再得當之竊為幸矣又鉛刀強可一割又其言之不慙恃惠子之知我又酸者不能不苦於言七七辨無為先生祖述列仙背世絶俗唯誦道篇形虛年衰志猶不遷於是七辨謀焉曰無為先生淹在幽隅藏身隱景剗迹窮居抑其不韙盍往辨諸乃偕而就之虛然子曰樂國之都設為間館公輸制匠譎詭煥爛重屋百層連閣周漫應門鏘鏘華闕雙建雕蟲彤緑螭虹蜿蜒於是彈比翼落鸝黃加雙鶤經鴛鴦然後擢雲舫觀中流搴芙蓉集芳洲縱文身摶濳鱗探水玉拔瓊根收明月之照曜玩赤瑕之璘豳此宫室之麗也子盍歸而處之乎雕華子曰玄清白醴蒲陶醲􅳔嘉肴雜醢三臡七葅荔支黃甘寒梨乾榛沙餳石蜜逺國儲珍於是乃有芻豢腯牲麋麛豹胎飛鳬棲鷩養之以時審其齊和適其辛酸芳以薑椒拂以桂蘭會稽之菰冀野之梁珍羞雜遝灼爍芳香此滋味之麗也子盍歸而食之安存子曰淮南清歌燕餘材舞列乎前堂遞奏代敘結鄭衛之遺風揚流哇而咏激楚鼙鼓協吹竽籟應律金石合奏妖冶邀會觀者交目衣解忘帶於是樂中日晚移即昏庭美人妖服變曲為清改賦新詞轉歌流聲此音樂之麗也子盍歸而聽諸闕丘子曰西施之徒姿容修嫮弱顔回植妍夸間暇形似削成腰如約素淑性窈窕秀色美艷鬒髮玄髻光可以鑒靨輔巧笑清眸流盼皓齒朱唇的皪粲練於是紅華曼理遺芳酷烈侍夕先生同兹宴假明蘭燈指圖觀列蟬綿宜愧夭紹紆折此女色之麗也子盍歸而從之空桐子曰交址緅絺筒中之紵京城阿縞譬之蟬羽製為時服以適寒暑駟秀騏之駮駿載軨獵之輶車建采虹之長旃系雌霓而為旗逸駭飈於青丘超廣漢而永逝此輿服之麗也子盍歸而乘之依衛子曰若夫赤松王喬羡門安期噓吸沆瀣飲醴茹芝駕應龍戴行雲桴弱水越炎氛覽八極度天垠上遊紫宫下棲崑崙此神仙之麗也子盍行而求之先生乃興而言曰吁美哉吾子之誨穆如清風啓乃嘉猷實慰我心矯然傾首邪睨玄圃軒臂矯翼將飛未舉髣無子曰在我聖皇躬勞至思參天兩地匪怠厥司率由舊章遵彼前謀正邪理謬靡有所疑旁窺八索仰鏡三墳講禮習樂儀則彬彬是以英人底材不賞而勸學而不厭誨而不倦於是二八之儔列乎帝庭揆事施教地平天成然後建明堂而班辟雍和邦國而悅逺人化明如日下應如神漢雖舊邦其政維新而先生乃翻然回面曰君子一言於是觀智先民有言談何容易豫雖蒙蔽不敏指趣敬授教命敢不是務設難應間有序附後有間余者曰蓋聞前哲首務務於下學上達佐國理民有云為也朝有所聞則夕行之立功立事式昭德音是故伊尹思使君為堯舜而民處唐虞彼豈虛言而已哉必旌厥素爾咎單巫咸實守王家申伯樊仲實幹周邦服衮而朝介圭作瑞厥迹不朽垂烈後昆不亦丕歟且學非以要利而富貴萃之貴以行令富以施惠惠施令行故易稱以大業質以文美實由華興器賴雕飾為好人以輿服為榮吾子性德體道篤信安仁約已博藝無堅不鑽以思世路斯何逺矣曩滯日官今又原之雖老氏曲全進道若退然行亦以需必也學非所用術有所仰故臨川將濟而舟楫不存焉徒經思天衢內昭獨智固合理民之式也故嘗見謗於鄙儒深厲淺揭隨時為義曾何貪於支離而習其孤技邪參輪可使自轉木雕猶能獨飛已垂翅而還故棲盍亦調其機而銛諸昔有文王自求多福人生在勤不索何獲曷若卑體屈已美言以相剋鳴于喬木乃金聲而玉振之用後勳雪前吝婞佷不柔以意誰靳也應之曰是何觀同而見異也君子不患位之不尊而患德之不崇不恥祿之不夥而恥智之不博是故藝可學而行可力也天爵高懸得之在命或不速而自懷或羡旃而不臻求之無益故智者偭而不思阽身以徼幸固貪夫之所為未得而豫喪也枉尺直尋議者譏之盈欲虧志孰云非羞於心有猜則簋飱饌餔猶不屑餐旌瞀以之意之無疑則兼金盈百而不嫌辭孟軻以之士或解裋褐而襲黼黻或委臿築而據文軒者度德拜爵量績受祿也輸力致庸受必有階渾元初基靈軌未紀吉凶紛錯人用朣朦黃帝為斯深慘有風后者是焉亮之察三辰於上迹禍福乎下經緯厯數然後天步有常則風后之為也當少昊清陽之末實或亂德人神雜擾不可方物重黎又相顓頊而申理之日月即次則重黎之為也人各有能因藝受任鳥師别名四叔三正官無二業事不並濟晝長則宵短日南則景北天且不堪兼况以人該之夫玄龍迎夏則陵雲而奮鱗樂時也涉冬則淈泥而潛蟠避害也公旦道行故制典禮以尹天下懼教誨之不從有人之不理仲尼不遇故論六經以俟來辟恥一物之不知有事之無範所考不齊如何可一夫戰國交爭戎車競驅君若綴旒人無所麗燭武懸縋而秦伯退師魯連係箭而聊城弛柝從往則合橫來則離安危無常要在説夫咸以得人為梟失士為尤故樊噲披帷入見高祖高祖踞洗以對酈生當此之會乃黿鳴而鱉應也故能同心戮力勤恤人隱奄受區夏遂定帝位皆謀臣之由也故一介之策各有攸建子長諜之爛然有第夫女魃北而應龍翔洪鼎聲而軍容息溽暑至而鶉火棲寒冰沍而黿鼉蟄今也皇澤宣洽海外混同萬方億醜并質共劑若修成之不暇尚何功之可立立事有三言為下列下列且不可庶矣奚冀其二哉于兹縉紳如雲儒士成林及津者風攄失塗者幽僻遭遇難要趨偶為幸世易俗異事藝舛殊不能通其變而一度以揆之斯契船而求劒守株而伺兔也冒愧逞願必無仁以繼之有道者所不履也越王勾踐事此故厥緒不永捷徑邪至我不忍以投步干進茍容我不忍以歙肩雖有犀舟徑楫猶人涉卬否有須者也姑亦奉順敦篤守以忠信得之不休不獲不吝不見是而不惛居下位而不憂允上德之常服焉方將師天老而友地典與之乎高睨而大談孔甲且不足慕焉稱殷彭及周𣆀與世殊技固孤是求子憂朱泙曼之無所用吾恨輪扁之無所教也子覩木雕獨飛愍我垂翅故棲吾感蠧蛙附鴟悲爾先笑而後號也斐豹以斃督燔書禮至以掖國作銘弦高以牛餼退敵墨翟以縈帶全城貫高以端辭顯義蘇武以秃節效貞蒲且以飛矰逞巧詹何以沈鉤致精奕秋以棊局取譽王豹以清謳流聲僕進不能參名於二立退又不能羣彼數子愍三墳之既頽惜八索之不理庶前訓之可鑽聊朝隱乎柱史且韞櫝而待價踵顔氏以行止曾不慊夫晉楚敢告誠于知已應間序間者觀余去史官五載而復還非進取之勢也唯衡內識利鈍操心不改或不我知者以為失志矣用為間余余應之以時有遇否性命難求因兹以露余誠焉名之應間云議厯議延光二年謁者亶誦言當用甲寅元河南梁豐言當復用太初尚書郎張衡周興皆能厯數難誦豐或不對或言失誤衡興參案儀注考往校今以為九道法最密詔下公卿詳議太尉愷等上侍中施延等議太初過天日一度弦望失正月以晦見西方食不與天相應元和改從四分四分雖密於太初皆不可用甲寅元與天相應合圖讖可施行博士黃廣大行令任僉議如九道河南尹祉等議即用甲寅元當除元命苞天地開闢獲麟中百一十四歲推閏月六直其日或朔晦弦望二十四氣宿度不相應者非一用九道為朔月有比三大二小皆疏逺元和變厯以應保乾圖三百嵗斗厯改憲之文四分厯本起圖讖最得其正不宜易愷等議宜從太初尚書令忠上奏諸從太初者徒以世宗攘夷廓境享國久長為辭或云孝章改四分災異率甚未有善應臣伏惟漢祖受命因秦之紀違於帝典太宗遵修三階以平哀平之際同承太初妖孽纍仍疴禍非一議者不以成數相參泛采妄説歸福太初致咎四分漏見曲論未可為是臣輒復重難衡興議云云上然其言遂改厯事五紀論推步行度當時比諸術為近然猶未稽於古及向子歆欲以合春秋橫斷年數損夏益周考之表紀差謬數百兩厯相課六千一百五十六嵗而太初多一日冬至日直斗而云在牽牛迂濶不可復用昭然如此史官所共見非獨衡興前以為九道密近今議者以為有闕及甲寅元復多違失皆未可取正昔仲尼順假馬之名以崇君之義况天之厯數不可任疑從虛以非易是説渾儀赤道橫帶渾天之腹去極九十一度十分之五黃道斜帶其腹出赤道表裏各二十四度故夏至去極六十七度而強冬至去極百一十五度亦強也然則黃道斜截赤道者則春分秋分之去極也今此春分去極九十少秋分去極九十一少者就夏厯景去極之法以為率也上頭橫行第一行者黃道進退之數也本當以銅儀日月度之則可知也以儀一嵗乃竟而中間又有陰雨難卒成也是以作小渾盡赤道黃道乃各調賦三百六十五度四分之一從冬至所在始起令之相當值也取北極及衡各誠椓之為軸取薄竹篾穿其兩端令兩穿中間與渾半等以貫之令察之與渾相切摩也乃從減半起以為八十二度八分之五盡衡減之半焉又中分其篾拗去其半令其半之際正直與兩端減半相直令篾半之際從冬至起一度一移之視篾之半際夕多黃赤道幾也其所多少則進退之數也從北極數之則元極之度也各分赤道黃道為二十四氣一氣相去十五度十六分之七每一氣者黃道進退一度焉所以然者黃道直時去南北極近其處地小而橫行與赤道且等故以篾度之於赤道多也設一氣令十六日皆常率四日差少半也令一氣十五日不能半耳故使中道三日之中若少半也三氣一節故四十六日而差今三度也至於差三之時而五日同率者一其實節之間不能四十六日也今殘日居其策故五日同率也其率雖同先之皆強後之皆弱不可勝計取至於三而復有進退者黃道稍斜於橫行不得度故也春分秋分所以退者黃道始起更斜矣於橫行不得度故也亦每一氣一度焉三氣一節亦差三度也至三氣之後稍逺而直故橫行得度而稍進也立春立秋橫行稍退矣而度猶云進者以其所退減其所進猶有盈餘未盡故也立夏立冬橫行稍進矣而度猶退者以其所進增其所退猶有不足未畢故也以此論之日行非有進退而以赤道重廣黃道使之然也本二十八宿相去度數以赤道為強耳故於黃道亦進退也冬至在斗二十一度少半最逺時也而此厯斗二十度俱百一十五強矣冬至宜與之同率焉夏至在井二十一度半強最近時也而此厯井二十三度俱六十七度強矣夏至宜與之同率焉靈憲昔在先王將步天路用之靈軌尋緒本元先凖之於渾體是為正儀立度而皇極有逌建也樞運有逌稽也乃建乃稽斯經天常聖人無心因兹以生心故靈憲作興曰太素之前幽清玄淨寂寞冥默不可為象厥中惟靈厥外惟無如是者永久焉斯謂溟涬蓋乃道之根也道根既建自無生有太素始萌萌而未兆并氣同色渾沌不分故道志之言云有物渾成先天地生其氣體固未可得而形其遲速固未可得而紀也如是者又永久焉斯謂龎鴻蓋乃道之幹也道幹既育有物成體於是元氣剖判剛柔始分清濁異位天成於外地定於內天體於陽故圓以動地體於陰故平以靜動以行施靜以合化堙鬱搆精時育庶類斯謂太元蓋乃道之實也在天成象在地成形天有九位地有九域天有三辰地有三形有象可效有形可度情性萬殊旁通感薄自然相生莫之能紀於是人之精者作聖實始紀綱而經緯之八極之維徑二億三萬二千三百里南北則短減千里東西則廣增千里自地至天半於八極則地之深亦如之通而度之則是渾已將覆其數用重鉤股懸天之景薄地之義皆移千里而差一寸得之過此而往者未之或知也未之或知者宇宙之謂也宇之表無極宙之端無窮天有兩儀以儛道中其可覩樞星是也謂之北極在南者不著故聖人弗之名焉其世之遂九分而減二陽道左回故天運左行有驗於物則人氣左羸形左繚也天以陽回地以陰淳是故天致其動稟氣舒光地致其靜承施候明天以順動不失其中則四序順至寒暑不減致生有節故品物用生地以靈靜作合承天清化致養四時而後育故品物用成凡至大莫如天至厚莫若地地至質者曰地而已至多莫若水水精為漢漢用於天而無列焉思次質也地有山嶽以宣其氣精種為星星也者體生於地精成於天列居錯跱各有逌屬紫宫為皇極之居太微為五帝之廷明堂之房大角有席天市有坐蒼龍連蜷於左白虎猛據於右朱雀奮翼於前靈龜圈首於後黃神軒轅於中六擾既畜而狼蚖魚鱉罔有不具在野象物在朝象官在人象事於是備矣懸象著明莫大乎日月其徑當天周七百三十六分之一地廣二百四十二分之一日者陽精之宗積而成鳥象烏而有三趾陽之類其數竒月者陰精之宗積而成獸象兔陰之類其數耦其後有慿焉者羿請無死之藥於西王母姮娥竊之以奔月將往枚筮之於有黃有黃筮之曰吉翩翩歸妹獨將西行逢天晦芒毋驚毋恐後且大昌姮娥遂託身於月是為蟾蜍夫日譬猶火月譬猶水火則外光水則含景故月光生於日之所照魄生於日之所蔽當日則光盈就日則光盡也衆星被耀因水轉光當日之衝光常不合者蔽於地也是謂暗虛在星星微月過則食日之薄地其明也繇暗視明明無所屈是以望之若火方於中天天地同明繇明瞻暗暗還自奪故望之若水火當夜而揚光在晝則不明也月之於夜與日同而差微星則不然強弱之差也衆星列布其以神著有五列焉是為三十五名一居中央謂之北斗動變挺占實司主命四布於方為二十八宿日月運行歷示吉凶五緯經次用告禍福則天心於是見矣中外之官常明者百有二十四可名者三百二十為星二千五百而海人之占未存焉微星之數蓋萬一千五百二十庶物蠢蠢咸得繫命不然何以總而理諸夫三光同形有似珠玉神守精存麗其職而宣其明及其衰神歇精斁於是乎有隕星然則奔星之所墜至則石文曜麗乎天其動者七日月五星是也周旋右回天道者貴順也近天則遲逺天則速行則屈屈則留回留回則逆逆則遲迫於天也行遲者覿于東覿于東屬陽行速者覿于西覿于西屬陰日與月此配合也攝提熒惑地侯見晨附于日也太白辰星見昏附于月也二陰三陽參天兩地故男女取焉方星巡鎮必因常度茍或盈縮不逾于次故有列司作使曰老子四星周伯王逢苪各一錯乎五緯之間其見無期其行無度實妖經星之所然後吉凶宣周其祥可盡靈應崑崙東南有赤縣之州風雨有時寒暑有節茍非此州南則多暑北則多寒東則多陽西則多陰故聖王不處焉銘綬笥銘有引南陽太守鮑德有詔所賜先公綬笥傳世用之時德更理笥衡時為德主簿作銘曰懿矣兹笥爰藏寶珍冠纓組履文章日信皇用我賜俾作帝臣服其令服鸞封艾緡天祚明德大賚福仁垂光厥世子孫克神厥器維舊中實維新周公惟事七涓有鄰贊南陽文學儒林書贊南陽太守上黨鮑君愍文學之弛廢懷儒林之陵遲乃命匠修而新之崇肅肅之儀揚濟濟之化誄大司農鮑德誄昔君烈祖平顯奕世敬叔生牙美管交賴至于中葉種德以邁種德伊何去虛適參建旄屯留其茂如林降及我君總角有聲遺蒙萬穀寵祿斯丁守約勤學克勞其形濬哲之資日就月成業業學徒童蒙求我舍厥往著去風即雅濟濟京河實為西魯昔我南都惟帝舊鄉同于郡國殊於表章命親如公辨冕鳴璜若惟允之實耀其光導以仁惠教以義方習射矍相饗老虞庠羌髠作虐艱我西鄰君斯整旅耀武月頻蠢蠢戎虜是懾是震知德者鮮惟君克舉既厭帝心將處台輔命有不永時不我與天實為之孰其能禦股肱或毁何痛如之國喪遺愛如何無思司徒吕公誄昔吕皇祖帝堯之緒伯夷秩唐唐宗允敘四嶽在虞傳士佐禹克厭帝心姓薑氏吕登是南邦以家以處降及于周穆侯作輔親于九族九族用寧登受八命衮職靡傾黃耳金鉉公餗以盈綽兮其寬皎兮其清既明且哲式保令名斿旍從風駟牡超驤去此寧宇歸于幽堂玄室冥冥修夜彌長司空陳公誄敬仲初育發繇卜筮鳯飛觀國流光末裔天祚明德德茂于公入孝出友爰肅爰雍兼學多識窮理知幾德音孔昭翻爾灰飛賦政二城還集皇闈公實省之亹亹庶績公實靜之藹藹百僚公實愍之乃陟司空纂禹之迹導揚徽庸致訓京畿協和萬邦萬邦既協殊服來同眇論前績莫與比蹤又後作鴻臚職掌九賔輯寧侯衛懷柔逺人樂府怨篇文心雕龍云張衡怨篇清曲可誦猗猗秋蘭植彼中阿有馥其芳有黃其葩雖曰幽深厥美彌嘉之子之一作云逺我勞如何同聲歌詩譜云寄興髙逺遣辭自妙邂逅承際會得充君後房情好新交接恐栗若探湯不才勉自竭賤妾職所當綢繆主中饋奉禮助蒸嘗思為莞蒻席在下蔽匡牀願為羅衾幬在上衛風霜灑掃清枕席鞮芬以狄一作秋香重户結金扄高下華燈光衣解巾粉缷列圖陳枕張素女為我師儀態盈萬方衆夫所希見天老教軒皇樂莫斯夜樂沒齒焉可忘西溪叢語云陶淵明間情賦必有自乃出張衡同聲歌詩四愁詩并序竹林詩評云張衡四愁遙衷耿慕猶風騷之遺韻也藝苑巵言云平子四愁千古絶唱傅玄擬之致不足言大是笑資耳張衡不樂久處機密出為河間相能內察屬縣姦猾行巧劫皆密知名下吏收捕盡服擒諸豪俠遊客悉惶懼逃出境郡中大治爭訟息獄無繫囚時天下漸弊鬱鬱不得志為四愁詩效屈原以美人為君子以珍寶為仁義以水深雪氛為小人思以道術為報貽於時君而懼讒邪不得以通其辭曰一思曰我所思兮在太山欲往從之梁父艱側身東望涕沾翰美人贈我金錯刀何以報之英瓊瑤路逺莫致倚逍遙何為懷憂心煩勞二思曰我所思兮在桂林欲往從之湘水深側身南望涕霑襟美人贈我金五臣作琴琅玕何以報之雙玉盤路逺莫致倚惆悵何為懷憂心煩傷三思曰我所思兮在漢陽欲往從之隴阪長側身西望涕霑裳美人贈我貂襜褕何以報之明月珠路逺莫致倚踟蹰何為懷憂心煩紆四思曰我所思兮在雁門欲往從之雪氛氛側身北望涕霑巾美人贈我錦繡段何以報之青玉案路逺莫致倚增歎何為懷憂心煩惋漢魏六朝百三家集卷十四
