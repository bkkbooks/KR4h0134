body:
  text: 漢魏六朝百三家集卷五十九晉王羲之集目録方回帖又又重熙帖又嘉賔帖二郗帖又荀侯帖又謝仁祖帖又又又安和帖萬石帖又又又又又謝光祿帖二謝帖又謝生帖又又又又又謝司馬帖𤣥度帖又又又又又又又又許君帖論諸葛昏帖論葛吝帖𢎞遠帖又又又阮光祿帖又又又又又又又又范公帖范生帖羊參軍帖又又曹參軍帖參軍帖又白牒帖周參軍帖虞休意帖董祥帖馮公帖溫公帖周常侍帖徐舍人帖徐侯帖朱博士帖王㑹稽帖暨主簿帖劉生帖二蔡帖江侯帖江生帖張令帖丘令帖何侯帖太常帖馬司帖又又又又中書帖明府帖長史帖鎮軍帖義興帖又吳興帖又又永興帖臨川帖上虞帖又潁陽帖鄱陽帖東陽帖先生帖又夫人帖又又又又女聟帖司州帖又又又又敬豫帖敬和帖又敬祖帖敬親帖敬倫帖又延期帖又又又又又又又官奴帖又又又又穆松帖又又又又又遮何日西帖又農敬親帖又又告姜帖又阿刁帖迎慶帖和方帖道冲帖豹奴帖野大帖又又道護帖賔諸人帖又又知定帖又又又華直帖華母子帖又念奴帖二奴帖貴奴帖阮兒帖靜婢帖又遠嘉興帖又鶻等帖彥仁帖又修載帖伯熊帖又又長素帖又又子卿帖又道長帖道祖帖陽主帖茂善帖君遠帖祖伯帖郎子帖陽化帖元道帖德孝帖熙孝帖長翔帖長高帖長風帖長平帖君服帖源書帖又又又尚書中郎帖又又又建安帖又省弟帖又又又又又兄子帖又賢姊帖又又又又又又亡㛐帖庾新婦帖郗新婦帖中郎女帖姨母帖又李氏甥帖雜帖又又又又又又又又問慰諸帖上又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又問慰諸帖下又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又又女蔞丸帖吳興鮓帖紫石散帖新栗帖須果帖矇風膠帖噉蚶帖須米帖又麻紙帖噉豆帖鯉魚帖舍子帖擇藥帖卭竹杖帖狼毒帖採菊帖黃甘帖奉橘帖白石枕帖裹鮓帖筆精帖愛鵝帖野鴨帖鄿茶帖鸕鷀帖鷹嘴帖䜴酒帖石脾帖東書堂帖又序蘭亭集序書後題衛夫人筆陳圗後文祭墓文詩蘭亭集詩二首漢魏六朝百三家集卷五十九目録欽定四庫全書漢魏六朝百三家集卷五十九明張溥輯晉王羲之集方回帖郗愔字方回見前方回遂舉為侍中不知卒行不云相意未許爾者為佳比得其書云山海間民逃亡殊異永嘉乃以五百户去深可憂深可憂此間不得至此足下郡內云何糧運日廣遠恐此不弊不已又方回遂舉為侍中都下書云殷生議論殊異處憂之道故思同歲寒盡對此書還又二謝在此近終日不同之此歎恨不得方回知春後問令人怛怛之一作同春施作幸幸重熙帖郗曇字重熙鍳之子羲之妻曇之姊也古之御世者乃志小天下今封域區區一方任耳而恆憂不治為時耻之但令卿重熙之徒必得申其道粗佳又昨得熙二十六日書云患氣懸情二帖所云熙未必為重熙也嘉賓帖郗超字嘉賓數親問叔穆嘉賓竝有問為慰二郗帖想彼人士平安二郗數缺也敬豫諸人近來停數日悉佳安石已南遷其諸兄弟此改殊令蕭索聞君以復入相府何時當應命未得坐處亦當愁罔思得為鄰豈常情恐君方處務此命難期如之何不一一小佳復意問也又姊適復二告安和郗故病篤無復他治為消息耳憂之深今移至田舍就道家也事畢當吾遣信視淑還母子平安為慰至恨不得暫見故未得下船道夷書云已得一宅想今安穩耳不政解此移趨知部兒不快何所在今已佳也耿耿信白荀侯帖荀羡領兖州刺史鎮下邳討慕容蘭斬之即前書所云也遠近清和士人平安荀侯定住下邳復遣軍下城此間民事愚智長歎乃亦無所隱如之何又須求雨以復為災卿彼何似又荀侯佳不未果就卿深企懷耳安好音信明公還得歸洛也計令解有懸休尋明公還劉釋作那可遇好一作西謝仁祖帖謝尚字二祖帖二王作還鎮在我而已誠無所多云與謝豫州共入河不乃煩劇得安萬送書云六日可至諸賢云朝廷失之轉覺闕然與卿書同不有君子其能國乎此言深也但云卿當入何以如夢恐卿表將復經年想仁祖差時還內鎮慰人情耳皆在卿懷矣二王帖首云得安口矣書云云入作人與卿書旁注四字又想官舍佳見護軍近書甚慰仁祖轉嘉然疾根不除尚令人憂復得問未復反書甚慰入月共至窟山看甘橘思君宜深想鐵已還旦夕展也故復㫖示羲之報又忽然夏中感懷冷冷不適足下復何似耿耿吾故不佳得遠近問不虞生何當來遲一集昨見無奕十九日書二十六日西也云仁祖服石一齊不覺佳酷羸至可憂力知問王羲之白又君頃復以何散懷鐵云秋當解褐行復分張想君比爾快為樂彥仁書云仁祖家欲至蕪湖單弱令俜何所成君書得載停郡迎喪甚事宜但異域之乖素已不可言何時可得發安石帖安石定目絶令人悵然一爾恐未卒有散理期諸處分猶未定憂縣益深念君馳情又遣從事發遣君無復坐理交疾患何以堪此何以堪此恐屬無所復厝懷即乖大小不可言且憂君以疾他曵不易萬石帖適萬石去月五日書為慰尋得彭祖送萬九日露版再破賊有所獲想足摧寇越逸之勢耳許司農書來慰吾無人未能得達故向餘杭間又若治風教可𢎞今忠著於上義行於下雖古之逸士亦將眷然况下此者觀頃舉厝君子之道盡矣今得護軍還君屈巳申時𤣥平須命朝有君子曉然復謂有容足地常如前者雖患九天不可階九地無所逃何論於世路萬石僕雖不敏不能期之以道義豈茍且若復以此進退直是利動之徒耳所不忍為豈苟且有二句末云所不以為又昨暮得無奕阿萬此月二日書稔近清和耳羌賊故在許下自當了也桓公未有行日阿萬定缺吳興又産婦兒萬留之月盡遣甚慰心又向亦得萬書委曲備悉使人慨然見足下乃悉知叔虎剋昨發月半略必至未見勞參軍又三月十六日羲之白一昨省不悉雨快君可不萬石轉差也炎得力不不得後問懸悒不知懷君云當有㫖信遲望其至僕劣劣故遣不具還具示王羲之知一作去乙具施作乙謝光祿帖謝光祿亦垂命可憂念念一朝奄忽傷人懷今年雕落可哀歎二謝帖二謝致喪興公近便索然𤣥度來數日有疾患便復來阿萬小差阮公政耿耿懷祖可呼賀祭酒俱又得袁二謝書具為慰袁生暫至都已還未此生至到之懷吾所盡也弟預須遇之大事得其書無已已二謝云秋末必來計日遲望萬羸不知必俱不知弟往别停幾日决其共為樂也尋分旦與江姚女和别殊當不可言也謝生帖得書知足下且欲顧何以不進耶向與謝生書說欲往知登停山停山非所辨故可共集謝生處登山可他日耶王羲之白又謝生多在山下不復見且得書疾惡冷耿耿想數知問雖能還不能數可歎不審比出日集聚不一爾緬然恐東旋未期諸情罔罔又上流近問不竟何日即路知謝定出居內所𢎞故重又王逸少頓首謝七日登秦望可俱行當早也又知欲東先期共至謝奕處云何欲行想忘耳過此如命又謝書云云今送謝司馬帖十一月二十七日羲之報得十四十八日二書知問為慰寒切比各佳不念憂勞久懸情吾食至少劣劣力因謝司馬書不具羲之報𤣥度帖君昨示欲見穆生叙讃今欲默語興廢之格粗當書爾不𤣥度好佳君謂何似又知𤣥度在彼善悉也無繇見之此何可言又見君小大佳不過此乃知熙佳覺少不得同萬恨萬恨云出便當西念遠别何可云遲見𤣥度今或以在道又未得安西問𤣥度忽腫至可憂慮得其昨書云小差然疾候自恐難耶又𤣥度先乃可耳嘗謂有理因祠祀絶多感其夜便至此致之生而速之每尋痛惋不能已已省君書增酸恐大分自不可移時至不可以智力救如此又服食故不可乃將冷藥僕即復是中之者腸胃中一冷不可如何是以要春秋輒大起多腹中不調適君宜深以為意省君書亦比得之物養之妙豈復容言直無其人耳許君見驗何煩多云矣又痛念𤣥度立如志而更速禍可惋可痛省君書亦增酸又得西問無他想彼人甚平安此粗佳𤣥度來數日為慰又不得西問耿耿許君帖知念許君與足下意政同但今非致言地甚勑勑亦不知范生以居職未以卿示輒便及之吾尚不能惜小節目但一開無解已又亦終無能為益適足為煩瀆足下呼爾不許君非必𤣥度也政當作正蓋逸少祖尚書郎名正故正月或作初月或作一月他正字皆以政代之論諸葛昏書二族舊對故欲結援諸葛若以家窮自當供助昏事又云欲速知决黃伯思跋云案晉謝石嘗求昏諸葛恢稚女恢不許及恢亡乃成昏於時王右軍往謝家看新婦猶有恢之遺則威儀端詳容服光整王歎曰我在遣女裁得爾耳始不知此何與逸少事而嗟賞若此及觀此帖乃云云始知右軍為主兹事故觀謝婦發此歎也諸葛吝帖諸葛吝者君識之不才幹好佳往為錢塘著績又入僕府有以盡悉宰民之至也甚欲自托於明德云臨安春當缺爾者君能請不僕必欲言得佳長史亦當是君所須既得里人共事異常故乃爾須還告之吝尺牘作田必欲言作心至欲𢎞遠帖王粹字𢎞遠𢎞農人以貴公子尚主未復𢎞道近書見與𢎞遠書恐卿不得久坐何如休稚𤣥佳不想數得足下㫖令知問又見𢎞遠二書皆以達也動即佳為慰又昨見君歡帖昨見君歡復無喻然未善悉想宿昔可耳脅中云何一善消息值周轉勝也耿耿疾患小差與𢎞遠俱詣遲共寫懷王羲之復劉作後值一作德詣一作臨又作謁又𢎞遠比當造頃遲見此子真以日為歲足下得審問㫖令吾𢎞劉釋作知非頃一作次阮光祿帖阮裕字思曠徵為金紫光祿大夫羲之嘗曰此公近不驚寵辱九月二十八日羲之頓首頓首昨者書想至參軍近有慰阮光祿信在耳許中郎家欲因書比去報知庾君遂不救疾摧切心情痛當奈何深當寬勉以不忘先心臨紙但有酸惻王羲之頓首情下云不得自甚又以下凡云阮者並附阮公故爾可憂時放恕大事今令速言何方守篤大灸不得力而從事以至甚無計自必出惟須小佳鐵石今出求救足下可復助且令得通方一作萬灸黃諫作惡得作將求作取且作旦又范公及阮公既并微㫖足下謂合損益之宜不又知劉公差甚慰甚慰知前乃爾委頓追以怛然今轉平復也阮公近聞不萬轉差也又此鄙問無恙諸從皆佳此諸數耳知劉阮數缺又從事經過崔阮諸人昨旦與書疾故示毒愁當增其疾吾如今尚劣劣又晚熱未有定發日有定示足下興耳近書或欲留吾甚欲與俱而吾疾患遲速無常其竟云何足下今知問又阮生何如此粗平安數問為慰又知阮生轉佳甚慰甚慰㑹稽近患下始差諸謝粗佳又向遣書想夜至得書知足下問當遠行諸懷何可言一十必早發想足下如向期也阮侯止於界上耳向書已具不復一一王羲之白范公帖范公書如此今示君須庾見故當勸果之告㫖語君遲而不可言范生帖大都夏冬自可足麥秋輒有違此亦人之常期等平安善在此羸小差知諸賢佳數見范生亦得𤣥近書為慰又得孔郗王書亦云不能數何爾須江生可耳斷絶也尚未見傳女足下言極是有懷甚佳法書又一帖云大都夏冬自可可春秋輒有患此亦人之常期等平安善此羸小差先生至其歡慰且卿一女而已羊參軍帖羊參軍還朝論長見敦恕其為慶慰無物以喻今又告誠先靈以文示足下感懷慟心此似是右軍欲去㑹稽時帖告誠先靈乃誓墓文也又書雖備至聚宜有以宣事情今遣羊參軍西諸懷所具必欲今觀想可思今得時面克令得還也又羊參軍尋至具一一子期諸人何似耿耿曹參軍帖想曹參軍疾者已往必能同來參軍帖近書至也得十八日書為慰雨蒸比各可不參軍轉差也懸耿吾脾痛劇灸不得力至患之不得書自力數字又月半念足下窮思深至不可居忍雨濕體氣各何如參軍得針灸力不甚懸情當深寬割情通省苦遣不具王羲之白白牒帖五月二十七日州民王羲之死罪死罪此夏復便半缺惟違離衆情兼至時增傷情頃水雨未之有不審尊體如何得疾除也不承近問馳企民自服橡屑下斷體氣便自差強此物益人去陟釐劫樊遠也以為良方謹及因青州白牒不備羲之死罪死罪周參軍帖羲之死罪死罪近因周參軍白牒伏想必達此春以過時速與深兼哀傷摧切割心情奈何奈何須臾寒食節不審尊體何如不承問以復經月馳企民疾根治滯了無差候轉久憂深叔缺遣信自力粗白不宣備羲之死罪死罪虞休意帖卿與虞休意書有所問足下㫖為致誠答令㫖意致來勿忘此意自决今以資嚴知小大疾患念勞心董祥帖問董祥吾亦問之冀必來嶽時得之甚佳頃日憒憒不暇復此省示及乃復憶之耳馮公帖今與馮公論何産足下可思助明清談至是舉今又語真道今宣㫖矣溫公帖溫公在此前東北面還此復初缺散為慰便乞良不可言卿得知之復共一快樂周常侍帖此書因周常侍想必至徐舍人帖適州將十五日告徐一癰方尺許口四寸云數日來小而差然疾源如此憂怛尚深故遣信治徐舍人書以示徐還示足下也不堪縷疑事列上台周青州視事今以當至下耶任是事宜無干身世而任事者疾患如此使人短氣徐侯帖侍中書書徐侯遂危篤恐無復冀深令人反側朱博士帖藥湯諸人佳也今知問朱博士何當還君可致意令速還想無稽留王㑹稽帖今與王㑹稽丘山隂書借人想故當有所得又語丘令臨葬必得耳暨主簿帖十二月六日羲之報一昨因暨主簿不悉昨得去月十五日二十三日二書為慰雨晝夜無懈夜來復雪弟各可也此日中冷患之始小佳力及不一一羲之報劉生帖得都近問清和為慰云劉生近欲舉君為山隂以中當為最君期於未獲供養處相為慨然仕宦殆是想也二蔡帖二蔡過葬來居此親親集事而君復出為因耳江侯帖賢室何如何可為心惟絶難與人理耳諸患猶爾憂勞深似缺江侯缺足下遺臨惙冷冷取書江生帖江生佳須大活以始見之與人上蕭索可歎張令帖知賢室委頓何以使爾甚助耿耿念勞心知得二十四問亦得叔虎二十二日書云新年乃得發安石昨必欲尅潘家欲尅二十五日也足下以語張令未前所經繇足下近如似欲見今送丘令帖丘令送此宅圗云可得卌畝爾者為佳可與水丘共行視佳者决便當取問其賈此帖舊與謝生東旋二帖合為一施釋注云劉釋作近令送此宅圗近字與下文詞意似舛而與水丘之丘字筆法正同當作丘彥遠帖録云今與丘山隂書借人又語丘令臨葬借輕車竊意即此丘令也右軍宅在越之蕺山今為戒珠寺𨽻山隂庸非此宅圖耶佳者劉釋作往告何侯帖去冬臨臨安事近便欲决去而何侯不許事聞以有小寇今未便得果然故有移南意尚未可倉卒復信更具信汝也太常帖太常故患胛灸俞體中可可耳僕射事已行以表讓未知恕不未復司州㫖告懸竦鄱陽歲使應有書而未得竦一作諫誤有書一合作膺司馬帖小大佳不不得司馬問懸情適安以中軍出鎮有避賢意乃云行得言面不知公私此理卒當之耶甚憂真本無集之者想今與君書一一又不得司馬近問懸情近所送書即至也君信明早令得後得鄙書未至即想東不久耳又司馬雖篤疾久頃轉平除無他感動奄忽長逝痛毒之甚驚惋摧慟痛切五內當奈何奈何省書感哽又司馬疾篤不果西憂之深公私無所成又二月二十日羲之白缺不可言得六日告為慰寒想各安善司馬與無還問耿耿僕可耳力不具王羲之白中書帖舍內佳不中書何似家中疾篤恆救旦夕比知覺有省書想至明府帖前從洛至此未及就彼參承願夫子勿悒悒矣當日緣明府共飲遂闕問願足下莫見責羲之頓首黃云自初月二日至前從洛帖如羲之是也願知心素致使如然也願足下莫見責皆俗人僞作長史帖冷過足下夜得眠不祇差也復何治甚耿耿長史復何似故問具示王羲之白鎮軍帖鎮軍昨至尚未見也尋見之悲欣不可言義興帖義興何似懸情慕容遂來據鄴可深憂官復遣軍可以示義興中書又此雨足可耳故當收佳云彼甚快大事吳義興缺是蕩然可歎吳興帖隔以久諸懷既不可言且今多慘戚遲君果前暫得一散懷知以多疾不果乃當秋事省告同此歎恨如何可言葬事不可倉卒當在九月初過此故欲一與吳興集冀無不尅耳然事來萬端不知如人意不非書能悉君數告以慰之耳又六月十六日羲之頓首秋節垂至痛悼傷惻兼情切割奈何奈何此雨過得十日告知君如常吳興轉勝甚慰想得此凉目佳患散乃委煩耿耿且以佳興消息僕故是常耳劣劣解日力不次王羲之頓首又墳墓在臨川行欲改就吳中終是所歸中軍往以還田一頃烏澤田二頃吳興想弟可還以與吾故示想弟居意故如往言思終高也是以思同之永興帖二十二日羲之報近得書即日又得永興書甚慰想在道可耳吾疾故爾沈滯憂悴解日面近不具羲之報臨川帖不得臨川問懸心不可言子嵩之子來數有使冀因得問示之黃云非逸少書庾子嵩非同時人庾敳字子嵩上虞帖足下欲同至上虞一宿還無所廢吾初至便與長史俱行無不可又小大皆佳也度有近問不得上虞甚佳足下當能相就不思面卿前云當來何能果也遲散無喻吾後月當出以省念示潁陽帖行政五十日不復得問懸情皆佳也何貽云得潁陽書平安慰意不得吳諸人問懸遲之鄱陽帖七月十三日告鄱陽兄弟大降制終去悔悼甚永絶悲傷痛懷切割心情也東陽帖近日東陽絶無常憂心何可言想足下當盡能致二王帖云此與敬和隔日不面建中靖國績帖以為賀知章非先生帖先生適書亦小小不能佳大都可耳此書因謝常侍信還令知問可令謝長史且消息又先生頃可耳今日略至遲委垂知樂公可為之慰桃膠易得可以少耶專一物不移乃不忠也充迎不致意知陽意事迎願人之善夫人帖吾去日盡欲留女過吾去自當送之想可埀許一出未知還期是以白意夫人涉道康和足下小大皆佳度十五日必濟江故二日知問須信還知定當近道迎足下也可令時還遲面以日為歲又尊夫人向來復何如為何所患甚懸情念卿纍息具至羲之敬問又夫人遂善平康也足下各可不冀行復面王羲之頓首黃云夫人及蔡家二帖亦後人依倣又旦極寒得示承夫人復小咳不善得眠助反側想小爾復進何藥念足下猶悚息卿可不吾昨暮復大吐小噉物便爾旦來可耳知足下念王羲之頓首又尊夫人不和想小耳今以佳念纍息卿佳不吾故劣劣力知問王羲之敬問米云僞女聟帖取卿女聟為長史休種知何似耿耿顧氏法帖釋文考異云知耳為聟字干祿字書聟聓壻上俗中通下正劉與施誤分聟為知耳兩字種一作稚知何疑作不何司州帖王胡之為司州刺司此卷帖並言及王氏內外子姓亦非與其人也延期官奴之屬晉人小字耳得司州書轉佳此慶慰可言云與君數數或採藥山崖可願樂遙想而已云必欲尅餘杭之遲期此不可言要須君㫖問僕事中久宜暫東復令白便行還便行當至剡槌上二十日後還以示政當與君前期㑹耳遲此情兼二三又知諸賢往數見范生亦得其近書為慰又得孔生書亦云不能數何爾耶江生可耳斷絶冀凉集也得司州十六日書諸疾患至憂之至深矣有斷未想桓公數便亦知謝生大得情和至慰安以當至吳興遲見之也又適大常司州鎮軍諸人二十五六書皆佳司州以為平復此慶慶可言餘親親皆佳大奴以還吳也冀或見之鎮施作領慶法書作之以還一作比還又司州供給寥落去無期也不果者公私之望無理或復是福得大等書慰心今因書也墅數言疏平安定太宰中郎者一作去定作足又得書知問吾夜來腹痛不堪見卿甚恨想行復來修齡來經日今在上慶月末當去重熙旦便西與别不可言不知安所在未審時意云何甚令人耿耿胡之字修齡敬豫帖王恬字敬豫導子羲之從弟上下安也和緒過見之欣然敬豫乃成委頓令人深憂江生亦連病今已差淳化載敬豫十字敬和帖王洽字敬和導子上下無恙從妹佳也得敬和近問不人有至憂其疾者令人深憂隔久何日能來又敬和在彼尚來議還增耿耿敬祖帖王協字敬祖導子比見敬祖小大可耳念孫阮諸人皆何似耿耿敬親帖敬親今在剡其後復亡甚不可言穰鐵不知已得敬倫帖王劭字敬倫導子九月三日羲之報敬倫遮諸人去晦祥禫情以酸割念卿傷切諸人豈可堪處奈何奈何及書不既羲之批又十九日羲之報近書反至也得八日書知吳故羸敬倫動氣發耿耿想得冷此為佳也敬文佳不一一羲之報王薈字敬文導子延期帖汝當須過殯還恆有悲惻王延期省又七日告期痛念𤣥度未能缺心汝臨哭悲慟何可言言及惋塞夜缺市器俱不合用令摧之也吾平平但昨來念𤣥度體中便不堪之耶又十一月十三日告期等得所高餘姚并吳興二十八日二疏知竝平安慰吾平平比服寒食酒如似為佳力因王㑹稽不一一阿耶告知又兄弟上下遠至此慰不可言嫂不和憂懷深期等殊勿勿燋心又期小女四嵗暴疾不救哀愍痛心奈何奈何吾哀老情之所寄惟在此等失此女痛之纒心不能已已可復如何臨紙情酸又期已至遲還具足下問耳當力東論道家無緣省苦怛有悲慨不得東此月問論一作詣苦施作告米云當以下僞又羲之死罪小大悉以來未惶不可懷未復咨誨問懸情計賓命行應至遲卞公還具承問妹極得散力以為至慰期等故爾耳因緣不多白羲之死罪又得書知足下問吾既不佳賢內妹未差延期官奴帖延期官奴小女竝得暴疾遂至不救愍痛心奈何吾以西夕至情所寄惟在此等以禁慰餘年何意旬日之中二孫夭命日夕左右事在心目痛之纒心無復一至於此可復如何臨紙咽塞又延期官奴小女病疾不救痛愍貫心吾以西夕情願所種惟在此等豈圗十日之中二孫夭命惋傷之甚未能喻心可復如何又羲之頓首二孫女夭傷悼痛切心豈意一旬之中二孫至此傷惋之甚不能已已可復如何羲之頓首又官舍佳也節氣不適可憂彼云何昨得羲書比佳甚慰甚慰得官奴晉寧書賓平安念懸心此粗佳一日書此一一又數有想常達還此不快鄙人得夏常爾公為爾差念足下小大佳憂卿可耳想同數得問官奴婦産復委篤憂之深餘粗可耳知足下念差免憂之不具羲之白米云今綘帖亦有一帖語多同而前後參錯穆松帖伏想㛐安和自下悉佳松上下至乖隔十八年復得一集且悲且慰何指喻㛐疾至篤憂懷甚深穆松難為情地自慰猶小差然故忽忽冀得凉漸和耳指一作物慰一作至和一作利又日月如馳㛐棄背再周去月穆松大祥奉瞻廓然永惟悲摧情如切割汝亦增慕省疏酸感又六月二十七日羲之報周嫂棄背再周忌日大服終此晦感摧傷悼兼情切劇不能自勝奈何奈何穆松埀祥除不可居處言以酸切及領軍信書不次羲之報又七月十六日羲之報凶禍纍仍周嫂棄背大賢不救哀痛兼傷切割心情奈何奈何遣書感塞羲之報又君大小佳不松廬善斫也僕信還泰州將去月十二日告甚慰如曹失護語此君甚康壯常是肥渴耳實尋還遲之不可言二妹差佳慰問心期中冷頃時行可畏愁人又上下近問慰馳情不知何似絶不得松問汝得㫖問馳白宜豫知分春事也吾日東可語期令知消息遮何日西帖官舍佳也得諸舍問不不知遮何日西言及辛酸卿不可懷期等故勿憂勿憂深又庾雖篤疾謂必得治力豈圗凶問奄至痛惋情深半年之中禍毒至此尋念相摧不能已已况弟清何可任遮等茶毒備盡當可忍視言之酸心奈何奈何農敬親帖農敬親同日至至數日耳道路平安為慰妹且停為大慶懷元又若來大小祥當復出者殊更良昌若汝不出農當單出汝能遣農速行不諸宜皆當自詳訃審日遲望而更未定殊為悵恨不可言又此乃為汝求宅謂汝來居止理軍務何可久處而情事不得從意可歎可歎終果來居者故當為汝求也以書示農告姜帖六日告姜復雨始晴快情汝母子平安又二十七日告姜汝母子佳不力不一一耶告阿刁帖阿刁近來到卞上下皆佳羲之白迎慶帖上下可耳産行往當迎慶思之不可言和方帖羣從雕落將盡餘年幾何而禍痛至此舉目摧喪不能自喻且和方左右時務公私所賴一旦長逝相為痛惜豈惟骨肉之情言及摧惋永往奈何表妹委篤示致問荒憒不得此熱不能不取給腹中便復惡無賴道冲帖羣從書皆佳道冲書平安汝當改葬不可云勞冲遇此事或復留連豹奴帖羲之頓首昨得書問所疾尚綴綴既不能眠食深憂慮懸吾情至不能不委㛐故不差豹奴晚不歸家隨彼弟向州也前書云至三月間到之何能盡情憂足下所惠極為慰也不謂也建中靖國帖野大帖野大皆當以至不得還問懸心大得善悉也野當不能遏卿竝轉茂清談又想諸舍人小大皆佳弟摧之可為心且得集目下此慰多矣姊纍告安和梅妹大都可行袁妹極得石散力然故不善佳疾久尚憂之想野久恙至善分張諸懷可云不知其期何時可果永嘉競逐者有力恐難冀得大柿當種之又吾惟辨辨便知無復日也諸懷不可言知彼人已還吾此猶有小小往來不欲來者其野近當往就之耳不大思其方不見可久理而任之者悠然此可歎息道護帖六月十一日羲之報道護不救疾惻怛傷懷念弟聞問悲傷不可勝奈何奈何曹妹纍喪兒女不可為心如何得二十三日書為慰及還不次王羲之報賓諸人帖賓諸人佳不皆致心憶之不忘懷又賔如人往不堪致心憶之不忘懷之又想大小皆佳知賔猶伏爾耿耿想得夏節佳也念君勞心賢姊大都轉差然以故有時嘔食不已是老年衰疾更亦非可倉卒大都轉差為慰以大近不復服散當將陟釐也此藥為益如君告淳化云至足言年衰疾久知定帖省書知定疑來汝君長謂所養雖小要為喪主劉夫人靈坐在堂政爾遠來于禮誠不可違所以狼狽遠迎汝情地信難忍交恐有性念慮得來想慰釋奠引是以不復思此耳若汝能割遣無益得過喪制遂來居此乃事宜也若自量不能違哀念須吾等旦夕相喻者當來汝當自若吾意盡此也又適都十五日問清和傳賊問定寂寂當是虛也然始興郡奴屯結不肯出恐成令人邑邑想官吏長制之耳又定聽他母子哀此遂不還可令未也又不審定何日當北遇信復白遲承後問華直帖僕近修小園子殊佳致果雜藥深可致懷也儻因行往希見比二處動靜故之一作故故常患馳情散騎癰轉利慶慰姊故諸惡反側永嘉至奉集欣喜無喻餘可耳得華直疏故爾諸惡不差懸憂順何似未復慶等近消息懸心君竝何為耶此猶未得盡集理行大尅遲此無喻米云僞帖伯思云僕近修小園子殊佳帖米以為子敬書傼謂處動靜以下方是子敬筆前兩行乃唐人書字勢帖語與後逈殊大觀釋注云淳化本作慰大觀本作至未知孰是下有永嘉至字與慶至字寫法一同後又有慶等近消息此帖元章長睿皆謂非右軍帖乃子敬所作元章藏子敬十二月帖勒石寶晉齊亦有慶等字筆法正相類當是人名爾華母子帖知諸患耿耿今差也華母子佳又不得東陽問想卿婦遂平復耳聾佳不謝之幼小頃可行華母子平安知足下故望暫還歲內何理過歲必有理不思存足下復得一叙平生當可言得卿書尋省反復但有悲慨比者且當數致年知缺念奴帖妹轉佳慶不及啼不憶念奴殊不可言凉當迎之二奴帖與安石俱佳還七日增想投命積日不復知問弟佳寧善然復憂之不去懷吾遂沈滯兼下如近數日分無復理昨來增服陟釐丸得下不知遂斷不了無所噉而藥得停不知當復見弟理不獨下便長歎小蘇息更知問二奴庶諸人何以謝之貴奴帖貴奴差不想不成大病傷寒可畏令人憂當盡消息地阮兒帖適阮兒書其氣散暴處便危篤憂之怛怛靜婢帖此上下可耳出外解小分張也須産往迎慶思之不可言知靜婢面猶爾甚懸心又知靜婢猶未佳懸心可小須留爾遠嘉興帖得遠嘉興書計今日必度喜遲可言足下至慰今有書想足下有㫖信别告具之又遠婦疾猶爾其餘可耳今取書付想具鶻等帖鶻等不佳令人弊見此輩吾衰老不復堪此濮州直祕閣李孝廣收右軍十餘帖字老而逸暮年書也略記其數帖彥仁帖服食而在人間此速弊分明且轉衰老政可知乃欲與彥仁集界上甚佳諸如此事皆所欣也平自可耳何所咨人外將何必拘小繩墨且令吳興不出界當可耳便因餘杭而行耶不自此㑹再舉難也君便可以僕書示之但俗多怪且在草澤者為爾扇動縱任恐惡之者衆米芾書史載一帖云欲與彥仁集界上平自可且何所咨人乃王道平平又彥仁數問也修載暫來欣慰修載帖小佳更致問一一適修載書平安伯熊帖伯熊上下安和為慰可令知問叔夷子前恨不令熊知消息又羲之白奉告慰反側伏想比安和伯熊過見之悲酸大都可耳惟埀心羲之平平一日白比具又羲之頓首向又慘慘自舉哀乏氣勿勿知便當西且不相知來想熊能更言問力遣不次王羲之頓首長素帖羲之白霧氣足下各何如長素轉佳甚耿耿又晴快足下各佳不長素轉佳也甚耿耿故知問具示王羲之白又長素差不懸耿小大佳也得敬豫九日問故進退憂之深子卿帖羲之死罪見子卿具一一荒民惠懷最要也甚以欣慰惟願不倦為善承留此生當廣陵任佳此生處事以驗海陵江缺間殊令人有懷也羲之死罪死罪又十一月七日羲之報近因子卿書想行至箱寒弟可不頃日了不得食至為虛劣力及數字羲之報道長帖知道長不孤得散力疾重而邇進退甚令人憂念遲信還知問道祖帖道祖㿃下乃危篤憂怛憂怛陽主帖十五日羲之報近甚倉卒得十三日音知卿佳慰之力及陽主書不一一羲之報茂善帖九月十八日羲之頓首茂善晚生兒不育痛之惻心奈何奈何轉寒足下可不可不不得問多日懸情吾故劣力不具王羲之頓首君遠帖君遠在此乃受恩來今留之明晚共親親集想君未便至餘姚爾祖伯帖知足下數祖伯諸人問助慰絶不得兄子問懸念可言此於南北缺郎子帖信所懷願告其中并爾郎子意同異復云何邈然無咨叙之期每賜翰墨使如暫展羲之死罪陽化帖頃猶小差欲極遊目之娛而吏卒守之可歎耳陽化果似小可何日得卿諸人元道帖想元道𢎞廣平安道充當得還不德孝帖知德孝故平平想當轉得散力每耿耿不忘懷足下小大佳不熙孝帖又不能不痛熙孝亡政爾復何於求之度政當求之內事餘理不絶求之一條當有冀不信罔然前塗願乙乙誨之以悟其心此後有疾不退一假淳化作獻之轉勝帖孝施作存乙乙施作具長翔帖信使甚數而無還者似書疏不可得得問宜示告之知長翔田舍比卿還當知何候須得音副民望甚善長高帖長高當暫還耶長風帖每念長風不可居忍昨得其書既毁頓又復壯溫深可憂長平帖得告承長平未佳善得適適君如常也知有患苦耿耿念勞心食少勞甚頓還白不具王羲之再拜君服帖君服前賢弟逝沒一旦奄至痛當奈何當復奈何臨紙咽塞王羲之頓首頓首源書帖源書以發吾欲路次見之亦不欲停甚又源遂差不云尚未恭命終之何聞真長知吳興想必如意南道差不又足下各可不都五日書今送謝即至想源得免豺狼耳王羲之又源日有書徑此界中而值吾病不得見之萬恨萬恨似從浦不知何日當進足下必得見之也尚書中郎帖知尚書中郎差為慰不得吳興問懸心數吳中聞耳小奴在此忽患瘧比數發今日最為大都輕瘧耳尚小停今在吾厩中念猶懸心小患耳無所埀心須佳乃去又尚書中郎諸人皆佳比面雖近隔殊思卿度還旦夕又小大佳也不得尚書中書問耿耿得業書慰之又亦得業書為慰今付還安方决去不言言即卿書致建安帖四月五日羲之報建安靈柩至慈䕃幽絶埀三十年永惟崩慕痛徹五內永酷奈何無繇言告臨紙摧哽羲之報又兄靈柩埀至永惟崩慕痛貫心膂痛當奈何計慈顔幽翳十三年而吾勿勿不知堪臨始終不發言哽絶當復奈何吾頃至勿勿比加下昨省弟帖前使還有書哀猥不能叙懷情痛兼哀若割當奈何奈何省弟纍紙哀毒之極但報書難為心懷况卿處之何可具忍有始有卒自古而然雖當時不能無情痛理有大斷豈可以之致弊何由寫心絶筆猥咽不知何言也又十一月五日羲之報適為不吾悉不適弟各佳不吾至勿勿力數羲之報又知弟不果行吾不佳面近也又又近因得里人書想至知故面腫耿耿今差不吾比日食意如差而髀中故不差以此為至患至不可勞力數字令弟知聞耳又想弟必有過理得暫寫懷若此不果後期欲難冀臨書多歎吾不復堪事比成此書便大頓兄子帖兄子發尚未有定日當送至瀾遠乖不可復言又三日先疏未得去得四日疏為慰兄書已具不復一一賢姊帖賢姊體中勝常想不憂也白屋之人復得遷轉極佳未委幾人吾齲痛所作讚又恐不任當示殷也又劉氏平安也梅妹可得袁妹腰痛冀當小爾耳汝母故若以不安食疾久憂憒當思平理也神意不同前者也又袁妹當來悲慰不言下家當慰意令知之又武妹小大佳也又得告慰為妹下斷以為至一吾比日至未果殊有邑想王羲之頓首又妹不快憂勞餘平安又家月末當至上虞妹亦俱去亡嫂帖頓首頓首亡嫂居長情所鍾奉始獲奉集冀遂至誠展其情願何圖至此未盈數旬奄見背棄情至乖喪莫此之甚追尋酷恨悲惋深至痛切心肝當奈何奈何兄子茶毒備嬰不可忍見發言痛心奈何奈何王羲之頓首頓首庾新婦帖庾新婦入門未幾豈圗奄至此禍情願不遂緬然永絶痛之深至情不能已况汝豈可勝任奈何奈何無由叙哀悲酸郗新婦帖李母猶小小不和馳情伏想行平康郗新婦大都小差卿大小佳中郎女帖中郎女頗有所向不今時婚對自不可復得僕往意君頗論冷不大都此亦當在君耶姨母帖十一月十三日羲之頓首頓首頃遘姨母哀哀痛摧剝情不自勝奈何奈何因反慘塞不次王羲之頓首頓首又書末云得諸為慰知汝姨欲西情事難處然今時諸不易得東安書甚不欲令汝姨出懇至想自思之李氏甥帖十二日告李氏甥得六日書為吾劣劣力不一一羲之白雜帖汝宜速下不可稽留計日遲望今日亦語劉長史令速又去冬遣使想久至乖離忽四年言之歎慨豈言所喻悠悠數十卒當何期汝等將慎為上知復何云又汝尚小愁思兼至不可居處多疾足下前許歲未今暫還想必可爾故復白又行近遣書想即至此雨汝佳不得懸心吾乏劣力數字又知汝表出便去不得見汝此何可言想秋必還恐此書不復及汝不一一又比奉對對兄以釋豈一又汝不可言未知集聚日但有慨歎各慎護前與㛐試求屏風遂不得答為也又知彼乃爾切切汝乃獨坐但有憂邑懸遠不能得遣人且吾無復久意果去當南視汝等也又兒故未至不知何父知足下念問慰諸帖上趙德麟侯鯖録云閣下法帖淳化中所集其中多弔喪問病比見刋誤乃唐國子祭酒李涪所撰短啓出於晉宋兵革之間時國禁書疏非弔喪問病不得輒行尺牘羲之書首云死罪是違制令故也沈括筆談云晉宋人墨跡多是弔喪問疾書簡唐貞觀中搜求前世墨跡甚嚴非弔喪問病皆入內府士大夫家所存皆當日朝廷所不取者所以流傳至今今右軍諸帖凡為問慰而無名氏可附者合此二卷婦安和婦故羸疾憂之燋心餘亦諸患又卒喜慰氣滿無他治噉數合米來三日又明或就卿圍棊邑散今雨寒未可以治謝江表付還又得書知足下問吾骯骼上下黨反下口亞反腰骨拘缺痛俯仰欲不得此何理耶願輒與相見無盡治宜足下得益使之不疑也但月又未隂沈沈恐不可針不知何以教目前甚憂悴王羲之又比信尋知足下有書可道知足下未能得果望近為然知得家問賢子動疾念甚憂慮懸得後問不分張何可久幼小故疾患無賴又山下多日不得復意問一昨晚還未得遣書得告知中冷不解更壯溫甚耿耿服何藥耶僕此日差勝尋知問王羲之頓首又念足下窮思兼至不可居處雨氣無已卿復何似耿耿善將息吾故劣力知問王羲之又若可得耳要當須吾自南但增感塞又未復知問晴快卿轉勝向平復也猶耿耿想上下無恙力知問不具王羲之敬問又人理不可得都絶每至屬致使人多歎又足下差否甚耿耿喉中不復燥耳故知問具示王羲之白又遂無雨候使人歎得諸孫書高田皆欲了又得書知足下患癤念卿無賴思見足下冀脫果力不一一王羲之白又此賢懷所禮也面一一缺謝二侯又五月十四日羲之近反至也得七日書知足下故爾耿耿善將息吾腫得此霖雨轉劇憂深力不一一羲之又因緣示致問非書能悉想君行有㫖信又又以表書示卿政當亦不又此假不見足下乃甚久遲面明行集冀得見卿得申近不問五字一行謝侯二字一行又十一月十八日羲之頓首頓首從弟子夭沒孫女不育哀痛兼傷不自勝奈何奈何王羲之頓首又十月十一日羲之敬問得旦書知佳為慰吾為轉差力不一一羲之敬問又二十八日羲之白得昨告承飲動懸情想小爾耳還㫖不具王羲之再拜又一日不暫展至恨叱而不已便懷不果東至可恨思叙思閒暇必顧也又適都使還諸書具一一須面具懷又八月二十四日羲之頓首缺竟增哀感奈何奈何爾足下可耳不得問缺日懸心吾故劣劣王羲之頓首又君頃以何永日憶去冬不可得知如何如何又近書及至也瞻望不遠而未期暫面如之行遲得問也謝侯數不在歎闕又前知足下欲居此常喜遲知定不果悵恨未知見卿期當數音問也又見此當何言但恐今婦必門首有出復有將來之弊耳此願盡珍御理又懷足下可謂禮之缺今以志心寄卿想必至到論之救命不暇此事於今為奢遠耳要是事其本心又雨寒卿各佳不諸患無賴力書不一一羲之問又想官舍無恙吾必果二十日後乃往遲喜散恙比爾又羲之白不復面有勞得示足下佳為慰吾却遽又睡甚勿勿力不具王羲之白又六月十九日羲之白使還得八日書知不佳爾何耿耿僕日弊而得此熱勿勿解日耳力遣不具王羲之白又十二月一日羲之白昨得還書知極不加疾人甚憂耿耿消息比佳耳吾至乏劣為爾日日力不一一羲之報又想明日可謝諸子又十四日羲之白近反不悉缺雨足下佳不不得近問問無殊不佳頓劣因不一一羲之白又羲之頓首何貺知意至諸君皆困乏常想無之何緣作此煩損今付還王羲之何荷通用又一日多恨知足下散動耿耿護護吾至不佳劣劣不一一王羲之頓首又初月一日羲之白忽然改年新故之際致歎至深君亦同懷近過得告故云腹痛懸情災雨比復何似氣力能勝不僕為耳力不一一王羲之又旦書至也得示為慰云小大多患念勞心遲見足下未果為結力不一一王羲之白又知書有去縣奔去誠意義官至也有禮制恐不必果耶且君在彼縣常以為得意宜思之耶意至故示又適欲遣書㑹得足下示又二十三日羲之報一日得書皆在計書所不得有反轉熱卿各佳不定何可得來遲面不一一王羲之報計書所一作計所又冀行面遣知問王羲之白又十二月二十四日羲之報歲盡感歎得十二日書為慰大寒比可不吾故羸乏力不一一王羲之報又吾至今目欲不復見字又初月十二日羲之纍書至得去月二十六日書為慰比可不僕下連連不斷無所一欲噉輒不化消諸弊甚不知何以救之罔極然及不一一羲之白又昨近有書至此故不多也遲書不悉耳又此言不可乏得知足下問吾忽忽力數字又足下知消息今故遣問使至具示之力書不一一王羲之白又民以頃情事不可不勤思自補節勤以食噉為意乃勝前者而氣力所堪不如自喪初不哭不能不有時惻愴然便非所堪哀事損人故最深益知不可不豁之又吾涉冬節便覺風動日日增甚至去月十日便至委篤事事如去春但為輕微耳尋得小差固爾不能轉勝沈滯進退體氣肌肉便大損憂懷甚深今尚得坐起神意為復可耳直疾不除晝夜無復聊賴不知當缺得暫有問還得缺其寫不如今忽忽日前耳手亦惡欲不得書示令足下知問又七月十五日羲之白秋日感懷深得五日告甚慰晚熱盛君比可不遲復後問僕平平力及不一一王羲之白又知君患隱何以及爾是為疲之極也一知此事恐不可以不絶骨肉之愛無論人事也乃甚憂君若自量過歎患不以輕心者一事不爾當何理又不得君家書疏多往來皆平安耳今年此夏節氣至惡當令人危幼小疾苦故爾憂勞不可言又七月二十一日羲之白昨十七日告為慰極有秋氣君比可耳力及不一一王羲之頓首又得九日問亦云鄙平平想得凉轉勝以疾乃服法必解此意又來月必欲就到家而得其問云尚多溪毒當復小却耳僕故有至臨川意尚未定自更有果南行者還乃得至夀春耳又得都九日問無他又得反又獲示知足下發動脅腫卿此疾苦甚似期一一想消一當轉佳為何治也吾為亦劣大都復是平平隔耳許日前後有其效何喻冀凉日晚散耳尋復知問王羲之又羲之頓首賢女殯斂永畢情以傷惋不能已已兄足下愍悴深至何可為心奈何奈何不能無時之痛憂卿便深今何如患深逹既往吾志勿勿力知問臨書惻惻王羲之頓首又書想至隂寒想自勝常又足下行穰久人還竟應快不大都當任縣量宜其令缺因便任耳立俟王羲之白又十九日羲之頓首明二旬增感切奈何奈何得十三日書知佳為慰僕左邉大劇且食少至虛乏力不一一王羲之頓首又羲之死罪纍白想至雨快想比安和遲復承問下官劣劣日前可力白不具王羲之死罪又及以令弟食後來想必如期果之小晚恐不展也故復㫖示羲之報又甲夜羲之頓首向遂大醉乃不憶與足下别時向至家乃解尋憶乖離其為歎恨言何能喻聚散人理之常亦復何云惟願足下保愛為上以俟後期故㫖遣此信取足下過江問臨紙情塞王羲之頓首又足下識先日之言信信具又數上下問如常何可得集耶念馳情未異果為結念致問又畢力果思遲言面不可復得此與范期後月五日遂乃尅耳還遣㫖進又鄙疾進退憂之甚深使自表求解職時以許乃當是公私大計然此舉不深又不宜是之於始二三無所成可以示從女其劣欲知消息又此雨過將為受想彼不必同苖稼好也又吾頃胸中惡不欲食積日勿勿五六日來小差尚甚虛劣且風大動舉體急痛何耶賴力及足下家信不能悉王羲之十月五日羲之忽有感情兼深足下得不可至前得足下似行一書為慰故不適足下昨還如常耳雖不得㫖問遠得足下書輒具問為慰吾頃胸中惡不欲食積日勿勿五日來小差七日羲之白又思率府朝得書知問足下差但尚頓極之不一一又初月一日羲之報忽然改年感思兼傷不能自勝奈何奈何異更寒諸疚此復何似不得問多日懸心不可言吾猶小差甚尚劣力遣不知羲之報又卿各何罪似先羸而處至痛憂涕深重得之思寬遣吾並乏劣自力不報息又十月十五日羲之頓首月半哀傷切心奈何奈何不可居忍得十三日書知問此何以恆耿耿吾至勿勿小佳更致問王羲之頓首又羲之白乖違積年每惟乖苦痛切心肝惟同此情當可居處羲之腳不踐地十五年無由奉展此欲奉迎不審能垂降不豫惟哽缺故先承問羲之再拜又再昔來熱如小有覺然晝故難堪知足下患之云故以圍棊是不為患吾其爾無佳自得此熱憔悴終日未果如何王羲之頓首又寒伏想安和小大悉佳奉展乃具又羲之頓首凉君可不女羞不耿耿想比能果力不王羲之頓首頓首又十二月十日羲之白近復追付期想先後皆至昨得二十七日告知君故之劣腹痛甚懸情災雨比日復何似善消息遲後問復平平不一一王羲之白又知尋遣家信遲具問又向遣書想夜至得書知足下問當逺行諸懷何可言十一必早發想至足下如向期也又十二月二十二日羲之白節近感歎情深得去月二十三日書知君故苦日耿耿善護之往不僕得大寒疾不堪甚力還不具王羲之白又適書至也知足下明還行復尅面王羲之白又小大佳也賢兄如猶當小佳然下不斷尚憂之又羲之頓首白雨無已不兒猶小差力不一一王羲之頓首又此公立德由來而嬰斯疾每以惋慨常冀積善之慶當獲濳佑契同昔人尋憶缺事緬然永絶哀惋深至未能喻心省足省書固不可言已矣可復奈何絶筆流涕又足下各可耳復雨可厭若吾所噉日去不復辭此意想足下明必顧之遲散羲之頓首又羲之死罪纍白至也辱十四日告慰情念轉塞想善平和下官至匆匆自力白又羲之死罪諸人何似耿耿又遣令使白恐不時至耳又月十三日羲之頓首追傷切割心不能自勝奈何奈何昨反想至向來快雨想君佳方得此雨為佳深為欣喜信既乏劣又頭痛甚無缺力不具王羲之頓首又羲之頓首想創轉差僕其爾未欲佳憂憒力知問王羲之頓首又三月十三日羲之頓首近反亦至念足下哀悼之至不可勝更寒外足下何如吾劣劣力遣知問王羲之頓首又羲之白一日殊不叙濶懷得書知足下咳劇甚耿耿護之冀以散力不一一王羲之白又書成得十一日疏甚慰三舍動靜馳情先書已具不得一一又諸患者復何如懸心比疏已具不復一一又書勿勿未得遣信又不知足下問吾既不快弱小疾苦甚無賴損尚小停有定去日更與足下相聞還不具王羲之白又適書至也此人須當令埿想足下可為停之故示王羲之頓首又六月三日羲之白徂暑此歲已半載慨深可得二十七日書知足下安頃耿耿愁增患耶善消息吾至勿勿常恐一夏不可過不一一王羲之白又旦奉祠感思悲慟得書知問吾乏劣力不一一王羲之問又王逸少頓首敬謝各可不欲小集想集後能果又足下晚各何似恆灼灼吾坦之欲不復堪事然力不一一王羲之頓首又足下各復何似恆灼灼故問王羲之白又羲之頓首君比各可不僕近下數日勿勿腫劇數爾進退憂之轉深亦不知當復何治下由食榖也自食榖小有肌肉氣力不勝更生餘患去月盡來停榖噉麵復平平耳問慰諸帖下適得書知足下問吾欲中治甚憒憒向宅上靜佳眠都不知足下來一甚無意恨不暫面王羲之黃云自適得書至慰馳竦耳惟穆松秋中二帖差似逸少書餘並僞作又宅上靜眠過此如命等乃今流俗語又差凉君可不今日實顧不遲面力知問王羲之又奄至此禍情願不遂緬然永絶痛之深至情不能已况汝豈可勝任奈何奈何無由叙哀悲酸又此諸賢粗可時見省甚為簡濶遠須異多小患而吾疾篤不得數為歎耳又秋中感懷雨冷冀足下各可耳胛風遂欲成患甚憂之力知問王羲之頓首胛劉誤釋作髀又想小大悉佳蔡家賓至君情感益深惟當撥遣之耳又知足下散勢小差此慰無以為喻云氣力故爾復以悒怛想散患得差餘當以漸消息耳又吾頃無一日佳衰老之弊日至夏不得有所噉而猶有勞務甚劣劣又知足下連不快何爾耿耿善將適吾積羸困而下積日不斷情慮尚深殊乏自力不能悉又月半哀悼兼至奈何奈何得告承復下懸耿至勿勿願不具王羲之再拜又今遣鄉里人往口具也行成旅以從是月也景風司至星火殷宵伯趙鳴而載隂爽鳩習而揚武時可以升高遠望禮可以出宿餞行有詔具寮爰開祖米云僞帖伯思云賈曽送張說赴朔方序中云備官而行成旅比從是云云有詔具僚爰開祖宴且申後命寵以蕃錫此卷有此文自行字上祖字下皆亡之而作草書多不綴屬當是集逸少書作此叙耳先輩以為張說送行至文非也米亦以自是月下為僞殊不知自行成下已僞蓋此失其首尾而米未嘗考賈曽文也又四月二十三日羲之頓首昨書不悉君可不腫劇憂之力遣不具又羲之頓首濶别稍久眷與時長寒嚴足下何如想清豫耳披懷之暇復何致樂諸賢從就理當不疏吾之朽疾日就羸頓加復風勞諸無意賴促膝未近東望慨然所冀日月易得還期非遠耳深敬宜音問在數遇信匆遽萬不一陳黃云字既甚惡而筆語乃爾非逸少書無疑又吾昨得一日一起腹中極調適無所為憂但顧情不可言耳米以為張長史書黃云米多以草字差大者為非二王書理恐未竟又追尋傷悼但有痛心當奈何奈何得告慰之吾昨頻哀感便欲不自勝舉旦復服散行之益頓乏推理皆如足下所誨然吾老矣餘願未盡惟在子輩耳一旦哭之埀盡之年將無復理此當何益冀小却漸消散耳省卿書但有酸塞念故言散所豁多也王羲之頓首頓首米以為大令書黃云字勢圜緊既非獻之體中云吾老矣餘願未盡惟在子輩耳案大令壽四十三初無後嗣法書要録逸少帖內有此又二十日羲之頓首節日感歎深念君增傷災雨君可也又僕可耳力數字王羲之頓首僕米作餘又七月一日羲之白忽然秋月但有感歎信反得去月七日書知足下故羸疾而觸暑遠涉憂卿不可言吾故羸乏力不具王羲之白而劉釋作問又徂暑感懷深得書知足下故頓乏食差不耿耿吾故爾耳未果為結力不具王羲之又初月二日羲之頓首忽然今年感遠兼傷情痛切心奈何奈何念君哀窮不己羲之皇恐皇恐施作呈耳法書要録哀窮下云奄經新故仰慕崩絶豈可堪忍比各何似相憂不忘當深消息以全勉為太僕衰老殆是日不如日力知問王羲之頓首又足下時事少可數來至人相尋下官吏不東西未委若為言叙乖足下不返重遣信往問願知心素至一作主吏大觀作更叙一作欲一作命又吾怪足下參朝少晚不審有何事情致使如然也王羲之再拜又十月七日羲之報前過足下所得其書想殊有勞弊然叔兄子孫有數人足慰目前情至取答委曲故具示可令必達以副此志且山川甚有形勢遠想慨然又出藥精要有驗信次可致當大惠也從弟分别吾深憂慮卿女轗軻想何可處差充喜言不多耳羲之黃云十月七日帖米以為集成豫謂昨見君帖亦然蓋二帖字意皆不相屬而十月帖頗取十七帖中足慰目前可令必達以副此志遠想慨然等帖中語厠其間如云足下尚停數日得告承長平未佳足下小大佳也知比得丹陽書熱日更甚期已至旦反想至七帖皆後人依放中有云不易可得過夏知有患者早乘凉行皆非當時人語承足下還來一帖不論可見其僞荀矦帖云安好音信明公還得歸洛也詞筆皆如初月帖又羲之白君晚可不想比果力不具王羲之白又云足下尚停數日半百餘里瞻望不得一見卿此何可言足下疾苦晴便大熱小船中至不易可得過夏不甚憂卿還具示問小船劉釋作北恆一作所恨又熱日更甚得書知足下不堪之同此無賴早且乘凉行欲往遲散也王羲之且一作宜又作旦又七月六日羲之白多日不知問邑邑得二日書知足下昨問耿耿今已佳也又月末必往遲見君無以為喻又承足下還來已久别欲參慰為染患不能得往問眷仰情深豈此委具一兩日少可尋冀言展若因行李願存故舊今遇賢弟還得數張紙勞動幸不怪耳謹此代不具釋智永米云子敬書大觀第五卷次智果帖下又雪候既不已寒甚盛冬平可苦患足下亦當不堪之轉復知問王羲之又知君當有分住者念處窮毒而復分乖尚可居情想反理斷當又旦反想至所苦晚差不耿耿僕腳中不堪沈隂重痛不可言不知何以治之憂深力不具王羲之頓首又深以自慰理有大斷其思豁之令盡足下勿乃憂之足下殊當憂吾故具示問又晚復毒熱想足下所苦竝以佳猶耿耿吾至頓劣劣冀凉意散力知問王羲之頓首黃云上二帖唐文皇所臨又足下家極知無可將接為雨遂乃不復更諸弟兄問疾深護之不具王羲之白又知彼清晏歲豐又所使有無一鄉故是名處且山川形勢乃爾何可以不游目又八日羲之頓首多日不知君問得一昨書知君安善為慰僕似小差而疲劇昨若耶觀望乃苦輿上隱痛前後未有此也然一日一昔勞復不極以此為慰耳力不具又鄉里人樂著縣户今送其名可為領受君頃就轉佳不僕自秋便不佳今故不善差頃還少噉脯又時噉麵亦不以為佳亦自勞弊散係轉久此亦難以求泰不去人間而欲求分方外此或速弊皆如君言又便大熱足下晚可耳甚患此熱力不具王羲之上又發瘧比日疾患欲無賴未面邑邑反不具王羲之又得書知問腫不差乏氣忽忽面近羲之報又足下各如常昨還殊頓胸中淡悶干嘔轉劇食不可強疾高難下治乃甚憂之力不具王羲之又濶轉久勞想豈舍知足下常得之卒未近緣如何足下數令知問黃云卒未近緣如何非晉土語又十一月四日羲之白冬中感懷深始欲寒足下常疾何如不得近問邑邑吾故苦心痛不得食經日甚為虛頓力及不具王羲之白又不得執手此恨何深足下各自愛數惠告臨書悵然又此蒸濕難為人得示知足下故爾堪行想不成病耳吾至無賴行尅王羲之頓首米云子敬代父書黃云非也結字不同詞亦異體此與阮公故爾家月末三帖絳帖合而一之又羲之白昨故遣書當不相遇知君還喜慰足下時行想今善除猶耿耿僕時行以十一日而不保如比日便成委頓今日猶當小勝不知能轉佳不積不卿至劣劣力還不具王羲之白善除一作善保又月半哀感奈何奈何念邑邑罔極之至不可居處比日何似痺差不悒悒力知問王羲之頓首米云子敬代父書黃云月半帖雖晉語字不合作蓋後人寫二王尺牘中語耳又日五期結極以大先師之言皆著推此言之無驗如此事君當欲知故及宜停宅又適欲遣書云得示知足下得凉以為佳甚慰知多疾患念勞心吾故不欲食幾以為事恐不可久邑邑思面行故果之王羲之幾一作比來邑邑一作區區行疑作拜此又見續帖無後六字米云智永書又初月十三日山隂羲之報近欲遣此書停行無人不辨遣信昨至此且得去月十六日書雖遠為慰過囑卿佳不吾諸患殊劣劣方涉道憂悴力不具羲之報萬歲通天王方慶進帖又隔日不面懸遲何極計足下須人兼具此等事勢速令埀報也又重告慰情吾腹中小佳體痺乏氣便轉差深以為慰慰足下意也王羲之頓首又羲之白不審尊體比復何如遲復奉告羲之中冷無賴尋復白羲之白又羲之頓首快雪時晴佳想安善未果為結力不次王羲之頓首山隂張侯又舊志志道意甚勤至不知為盡心朝夕而已有所希耳一自任之耳當以君書示又九日以當力見又祠物當治護信到便遣來忽忽善錯也又思言叙卒何期但有長歎念告米云獻之送梨帖柳公權記後細題一行曰又一帖十二字連之余辨乃右軍書公權誤為子敬也縫有貞觀半印世南孝先字跋印與跋今皆不存而此帖諸名帖中皆無之猶幸有此耳女蔞丸帖知足下哀感不佳耿耿吾下勢腹痛小差須用女蔞丸得應甚速也吳興鮓帖今付北方脯二夾吳興鮓二器蒜條四千二百又一帖云今付吳興酢二器紫石散帖二十九日羲之報月終哀摧傷切奈何奈何得昨示知弟下不斷昨紫石散未佳卿先羸甚羸甚好消息吾比日極不快不得眠食殊頓勿令合陽冀當佳力不一一王羲之報新栗帖復數橘子即云乃好可噉久得新栗此院冬桃不能得多送觸事何當不存往恆語然獨折須果帖知須果栽便可遣取視君勢陳欲欲無出理朦風膠帖朦風膠今年似晚來年其主不起首者想或可得借乎噉蚶帖蚶二斛蠣二斛前示噉蚶得味今㫖送此想噉之故以為佳比來食日幾許得味不具示須米帖知須米告求常如雲此便大乏勑以米五十斛與卿有無當共何以論借又今有教勑付米可送之麻紙帖下近欲麻紙適成今付三百寫書竟訪得不得其人示之噉豆帖噉豆鼠傷如佳今送能噉不鯉魚帖羲之白送此鯉魚征與敬耶不在不乃邑邑不舍子帖信云舍子别送乃是北方物也何以欲此欲幾許擇藥帖鄉里人擇藥有發簡而得此藥者足下豈識之不乃云服之令人仙不知誰能試者形色故小異莫亦嘗見者謝二侯擇一作採簡作夢亦作與又作可卭竹杖帖周益州送此卭竹杖鄉尊長或須今送鄉二王帖作卿狼毒帖須狼毒市求不可得足下或有者分三兩停須故示採菊帖不審復何以永日多少看未九日當採菊不至日欲共行也但不知當晴不耳倫等還殊慰意增慨知足下疾患小佳當惠緣想示能果遲此善散非直思想而已也尋復有問足下以數示由為諸力不具倫等以下二王帖云當别作一帖由為諸力不具亦别作一帖黃甘帖奉黃甘二百不能佳想故得至耳船信不可得不知前者至不奉橘帖奉橘三百枚霜未降未可多得枚書史作顆米云唐模右軍帖黃云韋應物詩知君臥病思新橘試摘才酸亦未黃書後欲題三百顆洞庭須待滿林霜蓋取諸此也黃一作嘗須一作更白石枕帖白石枕殊佳物深感卿至裹鮓帖裹鮓味佳令致君所須可示勿難當以語虞令米云右軍唐摹四帖一帖有裹鮓字薛道祖所收命為裹鮓帖裏鮓之外則安善道意服食三帖是也筆精帖紙筆精要深念兒至一物而無所出後信酬米云羲之筆精帖集在諸家碑上縫有貞觀半印當時與大令日寒帖同在故相王曾家故蘭亭所刻亦誤以為羊欣今貞觀印已不復存又紙下少一妙字文亦斷闕難解恐至寶永失姑取以存古當有能辨之者愛鵝帖數日雨冷腎氣㾏腰復嗽動靜遇風緊陂湖泛漲船不可渡勿訝謝光祿鵝在山下懸情可愛羲之遣野鴨帖損惠野鴨一雙秋來未得始是嘗新遠能分遣但深佩耶二謝黃云近世僞作殊惡蘄茶帖節日縈牽少睡蘄茶微炙善佳令姊差耶石首鮝食之消瓜成水此魚腦中有石如棊子野鴨亦有云此魚所化乾蝸青黛主風搐搦良鸕鷀帖鸕鷀糞白去䵟􅍍瘢黶令人色態此禽不卵生口吐其雛獨為異耳鷹嘴帖鷹嘴爪炙入麝香煎酥酒一盞服之治痔瘻有驗十七日羲之頓首豉酒帖又缺焦小服豉酒至佳數用有驗直以純酒漬豉令汁濃便有多少任意石脾帖石脾入水即乾出水便濕獨活有風不動無風自搖天下物理豈可以意求惟上聖乃能窮理東書堂帖東書堂永樂中周藩所刻頗多僞雜不足證慿令附此末前六條乃汝帖也荷華雖已殘及字字新竒等語猶惡俗想佳卿以得速還欲令今早去時反也省書增感切及反不具羲之報念足下罔戀之至不可居處白此巳具委也前却食小差數數便得疾政由不消化故二月二十日羲之頓首二旬期等小祥日近傷悼深至切割心情奈何奈何近得告為慰力及數字王羲之羲之白昨得期書知君可耳又治頭缺悶或患癰腫頭不即潰者以此藥帖之皆良缺麻巴豆薰陸石缺芎窮松脂六物合搗如米粒許少加其分頭悶處先其巴豆三分減一松脂剃去髮方寸以帛帖藥當病上帖之周時帖刮上爛皮以主麻油和石缺塗上當有黃水出為佳羲之上荷華想巳殘處此過四夏到彼亦屢而獨不見其盛時是亦可訝豈亦有緣耶弊宇今歲植得千葉者數盆亦便發花相繼不絶今已開二十餘枝矣頗有可觀恨不與長者同賞相望雖不遠披邈未可期伏缺可勝悵惘耶近遣傳散有書想旦夕還近健步還得二十八日書吳興又道此月一日不知何以情恕修歡乃復以示法謝峰事秋便冷要且令必果想清和士人佳也此平安安不過停數日日無為樂益增想想孔長史安善足下令知問纍有書也足下入年哀得俱還不思缺以事為歲州民王羲之死罪賢弟逝沒甚痛奈何白箋不備羲之頓首太尉門左不可言同此酸慨小大何如二妹佳為慰諸舍可何新婦委頓態人期弟各可不想今日能缺書暮必來宿也若宜日缺思夏缺羲之報諸賢子粗足自枝注示吾弱息毁弊大兒恆救命足令人心燋先是之歡於今皆為哀苦自非復衰年所堪豈復以既往纍心率事自難為懷如之何卿女母子粗平安喪際賢女動氣疾當時乃勿勿今以除也他等皆知孝思先日之歡於今皆為哀苦觸事切人處此而能令哀惻不經於心殆空語耳一至於此何所復言此粗平安修載來十餘日諸人近集存想明日當復悉來無由同增慨東比何為慰郎以也謝諸子往矣如何得書知足下問何萬來一昔不得眠便大乏足下念王羲之缺勞人意以書示妹汝母缺不多書尋缺更有信也致履足下各一量缺當嘗缺長久缺此章書嘗多勞缺亦知足下書字字新竒㸃㸃圓轉美不可再書得足下間下比來遲遲終不可也自果云云服足下五色石膏散身輕行動如飛也足下更與下七致之不治多少尋面言之委曲之事實亦缺人尋過江言散舊京先墓毁動奉諱號慟五內若割痛當奈何奈何王羲之頓首頓首頃日親親徑過諸婚經恤體力不復堪之故未復遣信耳二月二日汝婦母一缺夜亡親親傷怛汝不可言問足下㫖為致誠答今㫖意致來勿忘此意自决今以資嚴知不大疾患念勞心序蘭亭集序永和九年歲在癸丑暮春之初㑹于㑹稽山隂之蘭亭修褉事也羣賢畢至少長咸集此地有崇山峻嶺茂林修竹又有清流激湍映帶左右引以為流觴曲水列坐其次雖無絲竹管絃之盛一觴一詠亦足以暢叙幽情是日也天朗氣清惠風和暢仰觀宇宙之大俯察品類之盛所以極目騁懷足以極視聽之娛信可樂也夫人之相與俯仰一世或取諸懷抱晤言一室之內或因寄所託放浪形骸之外雖趨舍萬殊靜躁不同當其欣于所遇暫得于已快然自足不知老之將至及其所之既倦情隨事遷感慨係之矣向之所欣俯仰之間以為陳迹猶不能不以之興懷况修短隨化終期于盡古人云死生亦大矣豈不痛哉每攬昔人興感之由若合一契未嘗不臨文嗟悼不能喻之于懷固知一死生為虛誕齊彭殤為妄作後之視今亦猶今之視昔悲夫故列叙時人録其所述雖世殊事異所以興懷其致一也後之攬者亦將有感于斯文書後題衛夫人筆陳圖後夫紙者陳也筆者刀矟也墨者鍪甲也水硯者城池也心意者將軍也本領者副將也結構者謀略也揚筆者吉凶也出入者號令也屈折者殺戮也夫欲書者先乾研墨凝神靜思預想字形大小偃仰平直振動令筋脉相連意在筆前然後作字若平直相似狀如算子上下方整前後齊平此不是書但得其㸃畫爾昔宋翼常作此書翼是鍾繇弟子繇乃叱之翼三年不敢見繇潛心改迹每畫一波常三過折筆每作一㸃常隱鋒而為之每作一橫畫如列陳之排雲每作一戈如百鈞弩發每作一㸃如高峰墜石屈折如鋼鉤每作一牽如萬歲枯藤每作一放縱如驚蛇之透水一作足行之驟趨翼先來書惡晉太康中有人於許下破鍾繇墓遂得筆勢論翼乃讀之依此法學名遂大振欲真書及行書皆依此法若欲學草書又有别法須緩前急後字體形勢狀等龍蛇相鈎連不斷仍須稜側起復用筆亦不得使齊平小大一等每作字須有㸃處且作餘字總竟然後安㸃其㸃須空中遙擲筆作之其草書亦須象篆勢八分古𨽻相雜亦不得急令墨不入紙若急作意思淺薄筆即直過惟有章草及章程行押等不用此勢但用擊石波而已其擊石波者缺波也又八分更有一波謂之隼尾波其鍾公泰山銘及魏文帝受禪碑中巳有此體夫書先須引八分章草入𨽻字中發人意氣若直取俗字不能先發羲之少學衛夫人書將謂大能及後渡江北遊名山比見李斯曹喜等書又之許見鍾繇梁鵠書又之洛見蔡雍石經書又於從兄洽處見張昶華嶽碑始知學衛夫人書徒費年月爾羲之遂改本師仍於衆碑學習遂成書耳時年五十有三或恐風燭奄及遺教子孫耳可藏石室千金勿傳永和十四年四月十三日書文祭墓文維永和十一年三月癸卯朔九日辛亥小子羲之敢告二尊之靈羲之不天夙遭閔凶不䝉過庭之訓母兄鞠育德漸庶幾遂因人乏䝉國寵榮進無忠孝之節退違推賢之義每仰詠老氏周任之誡常恐斯亡無日憂及宗祀豈在微身而已是用寤寐永歎若墜深谷止足之分定之於今謹以今月吉辰肆筵設席稽顙歸誠告誓先靈自今之後敢渝此心貪冒苟進是有無尊之心而不子也子而不子天地所不覆載名教所不得容信誓之誠有如皎日詩蘭亭集詩二首代謝鱗次忽焉以周欣此暮春和氣載柔詠彼舞雩異世同流乃擕齊契散懷一丘仰視碧天際俯瞰渌水濱寥閴無涯觀寓目理自陳大矣造化工萬殊莫不均羣籟雖參差適我無非親漢魏六朝百三家集卷五十九
