body:
  text: 漢魏六朝百三家集巻二十一漢孔融集題詞魯國男子孔文舉年大於曹操二歳家世聲華曹氏不敵其詩文益非操所敢望也操殺文舉在建安十三年時僣形已彰文舉既不能誅之又不能逺之並立衰朝戲謔笑傲激其忌怒無啻肉餧餒虎此南陽管樂所深悲也曹丕論文首推北海金帛募録比於揚班脂元升往哭文舉官以中散丕好賢知文十倍於操然令文舉不死親見漢帝禪受當塗盜鼎亦必舉族沈焚所恨者其死先操狐䑕晏行攘袂之日天下遂無孔父仇牧耳文舉天性樂善甄臨配食虎賁同坐死不相負何况生存盛憲困於孫權葆首急難禰衡謝該淪落下士抗章推舉今讀其書表如鮑子復生禽息不没彼之大度豈止六國四公子乎而道窮命盡不能庇九歳之男七歳之女天道無親其言不信猶黨錮餘烈哉陳畱路粹中郎弟子也呈身漢賊奏殺賢者與馬融役於梁冀等耳東漢詞章拘密獨少府詩文豪氣直上孟子所謂浩然非耶琴堂衣冠客滿酒盈予尚能想見之目録表疏薦禰衡表崇國防疏上書薦謝該上書上漢帝書奏冝准古王畿制書闕上三府所辟稱故吏事闕奏馬賢事闕對東海王祭禮對闕教告髙宻縣立鄭公鄉教修鄭公宅教告昌安縣教下髙宻恤鄧子然教答王修教又書與曹操論盛孝章書與曹操論酒禁書又啁曹操討烏桓書報曹操書答虞翻書與韋甫休書又與王朗書與張紘書又喻邴原書與邴原書與諸卿書與宗從弟書與許博士書論汝潁優劣論聖人優劣論又周武王漢髙祖論議馬日磾不宜加禮議肉刑議碑衛尉張儉碑詩離合作郡姓名字詩雜詩二首臨終詩六言三首失題漢魏六朝百三家集卷二十一目録欽定四庫全書漢魏六朝百三家集巻二十一明張溥輯漢孔融集表疏薦禰衡表臣聞洪水横流帝思俾乂旁求四方以招賢俊昔世宗繼綂將𢎞祖業疇咨熙載羣士響臻陛下叡聖纂承基緒遭遇厄運勞謙日仄惟嶽降神異人竝出竊見處士平原禰衡年二十四字正平淑質貞亮英才卓躒初涉藝文升堂覩奥目所一見輒誦於口耳所暫聞不忘於心性與道合思若有神𢎞羊濳計安世黙識以衡凖之誠不足怪忠果正直志懐霜雪見善若驚疾惡若讐任座抗行史魚厲節殆無以過也鷙鳥累百不如一鶚使衡立朝必有可觀飛辯騁辭溢氣坌涌解疑釋結臨敵有餘昔賈誼求試屬國詭繫單于終軍欲以長纓牽致勁越弱冠慷慨前世美之近日路粹嚴象亦用異才擢拜臺郎衡宜與比如得龍躍天衢振翼雲漢揚聲紫微垂光虹蜺足以昭近署之多士增四門之穆穆鈞天廣樂必有竒麗之觀帝室皇居必畜非常之寳若衡等輩不可多得激楚陽阿至妙之容賞伎者之所貪飛兔騕褭絶足奔放良樂之所急也臣等區區敢不以聞陛下篤慎取士必須効試乞令衡以褐衣召見必無可觀采臣等受面欺之罪崇國防疏竊聞領荆州牧劉表桀逆放恣所為不軌至乃郊祭天地擬儀社稷雖昬僭惡極罪不容誅至於國體宜且諱之何者萬乘至重天王至尊身為聖躬國為神器陛級縣逺禄位限絶猶天之不可階日月之不可踰也每有一豎臣輒云圖之若形之四方非所以杜塞邪萌愚謂雖有重戾必宜隠忍賈誼所謂擲䑕忌器葢謂此也是以齊兵次楚唯責包茅王師敗績不書晉人前以露袁術之罪今復下劉表之事是使跛牂欲闚髙岸天險可得而登也案表跋扈擅誅列侯遏絶詔命斷盗貢篚招呼元惡以自營衛専為羣逆主萃淵藪郜鼎在廟章孰甚焉桑落瓦解其埶可見臣愚以為宜隠郊祀之事以崇國防上書薦謝該上書臣聞髙祖創業韓彭諸將征討暴亂陸賈叔孫通進説詩書光武中興吳耿佐命范升衛宏修述舊業故能文武竝用成長久之計陛下聖徳欽明同符二祖勞謙戹運三年乃讙今尚父鷹揚方叔翰飛王師電鷙羣凶破殄始有櫜弓臥鼓之次宜得名儒典綜禮紀竊見故公車司馬令謝該體曾史之淑性兼商偃之文學博通羣藝周覽古今物來有應事至不惑清白異行敦悦道訓求之逺近少有疇匹若乃巨骨出吳隼集陳庭黄熊入寢亥有二首非夫洽聞者莫識其端也雋不疑定北闕之前夏侯勝辯常陰之驗然後朝士益重儒術今該實卓然比跡前列間以父母老疾棄官欲歸道路險塞無由自致猥使良才抱璞而逃踰越山河沈淪荆楚所謂往而不反者也後日當更饋樂以釣由余尅像以求傅説豈不煩哉臣愚以為可推録所在召該令還楚人止孫卿之去國漢朝追匡衡於平原尊儒貴學惜失賢也上漢帝書先帝褒厚老臣懼其殞越是故扶接助其氣力三公刺腋近為憂之罪驚戒也云備大臣非其類也教告髙宻縣立鄭公鄉教昔齊置士鄉越有君子軍皆異賢之意也鄭君好學實懐明徳昔太史公廷尉吳公謁者僕射鄧公皆漢之名臣又南山四皓有園公夏黄公潛光隠耀世加其髙皆悉稱公然則公者仁徳之正號不必三事大夫也今鄭君鄉宜曰鄭公鄉昔東海于公僅有一節猶或戒鄉人侈其門閭矧乃鄭公之徳而無駟牡之路可廣開門衢令容髙車號為通徳門修鄭公宅教𤣥在徐州文舉欲其還郡敦請懇惻使人繼蹟又教曰鄭公久遊南夏今艱難稍平儻有歸來之思無寓人於我室毁傷其藩垣林木必繕治牆宇以俟還告昌安縣教邑人髙幼自言辟得井中鼎夫鼎久濳于井徳之休明雖小重也黄耳金鉉利貞之象國遭凶荒彞器出或者明以饗人下高宻恤鄧子然教志士鄧子然告困焉得愛釡庾之間以傷烈士之心與豆三斛後乏復言答王修教修為孔融主簿舉孝亷修讓邴原融不聴原之賢也吾已知之矣昔髙陽氏有才子八人堯不能用舜實舉之原可謂不患無位之士以遺後賢不亦可乎又答修重辭融答掾清身潔已歴試諸難謀而鮮過恵訓不倦余嘉乃勲應乃懿徳用升爾于王庭其可辭乎書與曹操論盛孝章書憲字孝章㑹稽人初為臺郎路逢融時十餘歳載歸與言知其竒尋舉孝亷補尚書郎稍遷吳郡太守以疾去官歸鄉里孫䇿平吳忌憲名囚之融與操書由是徴為騎都尉徵命未至為孫權所害歳月不居時節如流五十之年忽焉已至公為始滿融又過二海内知識零落殆盡惟㑹稽盛孝章尚存其人困於孫氏妻孥湮没單孑獨立孤危愁苦若使憂能傷人此子不得復永年矣春秋傳曰諸侯有相滅亡者桓公不能救則桓公恥之今孝章實丈夫之雄也天下談士依以揚聲而身不免於幽縶命不期於旦夕是吾祖不當復論損益之友而朱穆所以絶交也公誠能馳一介之使加咫尺之書則孝章可致友道可𢎞矣今之少年喜謗前輩或能譏評孝章孝章要為有天下大名九牧之人所共稱歎燕君市駿馬之骨非欲以騁道里乃當以招絶足也維公匡復漢室宗社將絶又能正之正之之術實須得賢珠玉無踁而自至者以人好之也况賢者之有足乎昭王築臺以尊郭隗隗雖小才而逢大遇竟能發明主之至心故樂毅自魏往劇辛自趙往鄒衍自齊往嚮使郭隗倒懸而王不解臨溺而王不拯則士亦將髙翔逺引莫有北首燕路者矣凡所稱引自公所知而復有云者欲公崇篤斯義也因表不悉與曹操論酒禁書公初當來邦人咸抃舞踊躍以望我后亦既至止酒禁施行夫酒之為徳久矣古先哲王類帝禋宗和神定人以齊萬國非酒莫以也故天垂酒星之燿地列酒泉之郡人著㫖酒之徳堯不千鍾無以建太平孔非百觚無以堪上聖樊噲解戹鴻門非豕肩鍾酒無以奮其怒趙之厮養東迎其主非引巵酒無以激其氣髙祖非醉斬白蛇無以暢其靈景帝非醉幸唐姬無以開中興袁盎非醇醪之力無以脱其命定國不酣飲一斛無以決其法故酈生以髙陽酒徒著功於漢屈原不餔醩醊醨取困於楚由是觀之酒何負於政哉又書昨承訓答陳二代之禍及衆人之敗以酒亡者實如來誨雖然徐偃王行仁義而亡今令不絶仁義燕噲以讓失社稷今令不禁謙退魯因儒而損今令不棄文學夏商亦以婦人失天下今令不斷婚姻而將酒獨急者疑但惜穀耳非以亡王為戒也啁曹操討烏桓書大將軍逺征蕭條海外昔肅慎氏不貢楛矢丁零盜蘇武牛羊可并案也報曹操書猥恵書教告所不逮融與鴻豫州里比鄰知之最早雖嘗陳其功美欲以厚於見私信於為國不求其覆過掩惡有罪望不坐也前者黜退歡欣受之昔趙宣子朝登韓厥夕被其戮喜而求賀况無彼人之功而敢枉當官之平哉忠非三閭智非鼂錯竊位為過免罪為幸乃使餘論逺聞所以慙懼也朱彭冦賈為世壯士愛惡相攻能為國憂至於輕弱薄劣猶昆蟲之相嚼適足還害其身誠無所至也晉侯嘉其臣所争者大而師曠以為不如心競性既遲緩與人無傷雖出胯下之負榆次之辱不知貶毁之於已猶蚊䖟之過也子産謂人心不相似或矜埶者欲以取勝為榮不念宋人待四海之客大壚不欲令酒酸也至於屈榖巨瓠堅而無竅當以無用罪之耳他者奉尊嚴教不敢失墜郗為故吏融所推進趙衰之拔郤縠不輕公叔之升臣也知同其愛訓誨發中雖懿伯之忌猶不得念况恃舊交而欲自外於賢吏哉輒布腹心修好如初苦言至意終身誦之答虞翻書示所著易傳自商瞿以來舛錯多矣去聖彌逺衆説騁辭曩聞延陵之理樂今覩吾君之治易知東南之美者非但㑹稽之竹箭焉又觀象雲物察應寒温推本禍福與神合契可謂探賾旁通者已方世清聖上求賢者梁丘以卦筮寧世劉向以洪範昭名想當來翔追蹤前烈相見乃盡不復多陳與韋甫休書使君足下懐逺垂勲西戎即叙前别意恨甚多不悉辛從事至承獲所訊喜而起居不恙而到也云便結駟徑至舊治西土之人宗服令徳解仇崇好以順風化萬里雍穆如樂之和雖為國家威靈感應亦實士縠堪事之效也昔伯安由幽都而登上司子琰以豫州而取宰相近事未逺當勉功業以豐此慶耳間僻疾動不得復與足下岸幘廣坐舉杯相於以為邑邑又前日元將來淵才亮茂雅度𢎞毅偉世之器也昨日仲將又來懿性貞實文敏篤誠保家之主也不意雙珠近出老蚌甚珍貴之與王朗書朗漢末為㑹稽太守孫䇿渡江畧地與策戰敗績乃詣䇿令使詰讓朗對謝服曹操為司空表徵之未至融與之書朗自曲阿展轉江海積年乃至拜諫議大夫㕘司空軍事世路隔塞情問斷絶感懐增思前見章表知尋湯武罪已之迹自投東裔同鯀之罰覽省未周涕隕􅏰然主上寛仁貴徳宥過曹公輔政思賢竝立策書屢下殷勤欵至知櫂舟浮海息駕廣陵不意黄熊突出羽淵也談笑有期勉行自愛與張紘書紘為孫策奉章至許宫留為侍御史融等皆與親善後曹操聞策薨令紘輔權内附出紘為㑹稽東部都尉及權討江夏以東部少事命紘居守遙領所職融遺紘書聞大軍西征足下畱鎮不有居者誰守社稷深固折衝亦大勲也無乃李廣之氣循髮益怒樂一當單于以盡餘憤乎南北竝定世將無事孫叔投戈絳灌俎豆亦在今日但用離析無縁㑹面為愁歎耳道直途清相見豈復難哉又紘既好文學又善楷篆與融書自書融遺紘書美之前勞手筆多篆書每舉篇見字欣然獨笑如復覩其人也喻邴原書原初署北海功曹融為太守以原為計佐是時漢朝陵遲政以賄成原乃將家人入鬱洲山中郡舉有道融以書喻原原遂到遼東修性保真清虚守髙危邦不入久濳樂土王室多難西遷鎬京聖朝勞謙疇咨雋乂我徂求定策命懇惻國之將隕嫠不恤緯家之將亡緹縈跋涉彼匹婦也猶執此義實望根矩仁為已任授手援溺振民於難乃或晏晏居息莫我肯顧謂之君子固如此乎根矩根矩可以來矣與邴原書原自遼東欲歸鄉里止於三山融移書與之原於是復返積十餘年後乃遁還隨㑹在秦賈季在翟諮仰靡所歎息增懐頃知來至近在三山詩不云乎來歸自鎬我行永久今遣五官掾奉問榜人舟楫之勞禍福動靜告慰亂階未已阻兵之雄若棊奕爭梟與諸卿書鄭康成多臆説人見其名學謂有所出也證案大較要在五經四部書如非此文近為妄矣若子所執以為郊天鼓必當麒麟之皮也寫孝經本當曾子家策乎與宗從弟書知晩節豫學既美大弟困而能寤又合先君加我之義豈惟仁弟實専承之凡我宗族猶或賴焉與許博士書許博士為漢樂器融與書今足下逺以彞器金石並志為國家來儀之瑞亦丈夫之大勲論汝潁優劣論融以汝南士勝潁川士陳長文難融答之曰汝南戴子髙親止千乘萬騎與光武皇帝共於道中潁川士雖抗節未有頡頏天子者也汝南許子伯與其友人共説世俗將壊因夜舉聲號哭潁川雖憂時未有能哭世者也汝南府許掾教太守鄧晨圖開稻陂數萬頃累世獲其功夜有火光之瑞韓元長雖好地理未有成功見效如許掾者也汝南張元伯身死之後見夢范巨卿潁川士雖有竒異未有能神而靈者也汝南應世叔讀書五行俱下潁川士雖多聰明未有能離婁竝照者也汝南李洪為太尉掾弟殺人當死洪自劾詣閣乞代弟命便飲酖而死弟用得全潁川士雖尚節義未有能殺身成仁如洪者也汝南翟子威為東郡太守始舉義兵以討王莽潁川士雖疾惡未有能破家為國者也汝南袁公著為甲科郎上書欲治梁冀潁川士雖慕忠讜未有能投命直言者也聖人優劣論荀愔等以為聖人俱受乾坤之醇靈禀造化之和氣該百行之髙善備九徳之淑懿極鴻源之深閭窮品物之情類曠蕩出於無外沈微淪於無内器不足周不充聖極荀以孔子稱大哉堯之為君也唯天為大唯堯則之是爲覆蓋衆聖最優之明文也孔以堯作天子九十餘年政化洽於民心雅頌流於衆聴是以聲徳發聞遂為稱首則易所謂聖人久於其道而天下化成百年然後勝殘去殺必世而後仁者也故曰大哉堯之為君也堯之為聖也明其聖與諸聖同但以大見稱為君爾又馬之駿者名曰騏驥犬之駿者名曰韓盧犬之有韓盧馬之有騏驥人之聖也名號等設騏驥與韓盧竝是寧能頭尾相當八脚如一無有先後之覺矣周武王漢髙祖論周武王從后稷以來至其身相承積五十世俱有魚鳥之瑞至髙祖一身修徳瑞遽有四吕公望形而薦女吕后見雲知其處白蛇分神母哭西入闗五星聚又武王伐紂斬而刺之髙祖入秦赦子嬰而遣之是寛裕又不如髙祖也議馬日磾不宜加禮議日磾以上公之尊秉髦節之使銜命直指寧輯東夏而曲媚姦臣為所牽率章表署用輒使首名附下罔上姦以事君昔國佐當晉軍而不撓宜僚臨白刃而正色王室大臣豈得以見脅為辭又袁術僭逆非一朝一夕日磾隨從周旋歴歳漢律與罪人交闗三日已上皆應知情春秋魯叔孫得臣卒以不發揚襄仲之罪貶不書日鄭人討幽公之亂斵子家之棺聖上哀矜舊臣未忍追案不宜加禮肉刑議古者敦龎善否區别吏端刑清治無過失百姓有罪皆自取之末世凌遲風俗壊亂政撓其俗法害其民故曰上失其道民散久矣而欲繩之以古刑投之以殘棄非所謂與時消息者也紂斮朝涉之脛天下謂為無道夫九牧之地千八百君若各刖一人是天下常有千八百紂也求世休和弗可得已且被刑之人慮不念生志在思死類多趨惡莫復歸正夙沙亂齊伊戾禍宋趙髙英布為世大患不能止人遂為非也適足絶人還為善耳雖忠如鬻拳信如卞和智如孫臏寃如巷伯才如史遷達如子政一罹刀鋸没世不齒是太甲之思庸穆公之霸秦南睢之骨立衛武之初筵陳湯之都賴魏尚之守邊無所復施也漢開改惡之路凡為此也故明徳之君逺度深惟棄短就長不茍革其政者也碑衛尉張儉碑其先張仲實以孝友左右周室晉主夏盟而張老延君譽於四方君禀乾綱之正性蹈髙世之殊軌氷潔淵清介然特立雖史魚之勵操叔向之正色未足比焉中常侍同郡侯覽専權王命豺虎肆虐威震天下君以西都督郵上覽禍亂凶國之罪鞫没贓姦以巨萬計俄而制書案驗部黨君為覽所陷亦章名捕逐當世英雄授命殞身以籍濟君厄者葢數十人故克免斯艱旋宅舊宇衆庶懐其徳王公慕其聲州宰爭命辟大將軍幕府公車特就家拜少府皆不就也復以衛尉徵明詔嚴切勅州郡乃不得已而就之銘曰桓桓我君應天淑靈皓素其質允迪忠貞肆志直道進不為榮赴㦸驕臣發如震霆凌剛摧堅視危如寧詩離合作郡姓名字詩漁父屈節水潛匿方離魚字與峕進止出行施張離日字魚日合成魯吕公磯釣闔口渭傍離口字九域有聖無土不王離或字口或合為國好是正直女回于匡離子字海外有截隼逝鷹揚當離乚字恐古文與今文不同合成孔也六翮將奮羽儀未彰離鬲字虵龍之蟄俾也可忘離虫字合成融玟琁隠曜美玉韜光去玉成文不須合無名無譽放言深藏離與字按轡安行誰謂路長離才字合成舉雜詩二首巖巖鍾山首赫赫炎天路高明曜雲門逺景灼寒素昻昻累世士結根在所固吕望老匹夫茍為因世故管仲小囚臣獨能建功祚人生有何常但患年歳暮幸托不肖軀且當猛虎步安能苦一身與世同舉厝由不慎小節庸夫笑我度吕望尚不希夷齊何足慕逺送新行客歳暮乃來歸入門望愛子妻妾向人悲聞子不可見日已潛光輝孤墳在西北常念君來遲褰裳上墟丘但見蒿與薇白骨歸黄泉肌體乘塵飛生時不識父死後知我誰孤魂遊窮暮飄颻安所依人生圖孠息爾死我念追俛仰内傷心不覺淚沾衣人生自有命但恨生日希臨終詩言多令事敗器漏苦不宻河潰蟻孔端山壊由猿穴涓涓江漢流天窻通㝠室讒邪害公正浮雲翳白日靡辭無忠誠華繁竟不實人有兩三心安能合為一三人成市虎浸漬解膠漆生存多所慮長寢萬事畢六言詩三首漢家中葉道微董卓作亂乘衰借上虐下専威萬官惶怖莫違百姓慘慘心悲郭李分爭為非遷都長安思歸瞻望闗東可哀夢想曹公歸來從洛到許巍巍曹公憂一作輔國無私減去厨膳甘肥羣僚率從祈祈雖得俸禄常飢念我苦寒心悲失題歸家酒債多問客粲㡬一作成行髙談滿四座一日傾千觴漢魏六朝百三家集巻二十一
