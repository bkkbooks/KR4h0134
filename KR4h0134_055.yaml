body:
  text: 漢魏六朝百三家集巻五十五晉劉琨集題詞晉劉司空集十巻在宋時已多缺誤今日欲覩全書未可得也越石兄弟與石崇賈謐友善金谷文詠秘書唱和詩賦豈盡無傳顧廼奔走亂離僅存書表想其當日執槊倚盾筆不得止勁氣直辭㢠廻薄霄漢推此志也屈平沅湘荆卿易水其同聲耶晋元渡江無心北伐越石再三上表辭雖勸進義切復讐讀者茍有胸腹能無慷慨以彼雄才結盟戎狄揚旌幽并身死而復生國危而復安間患差跌不病驅馳及同盟見疑命窮幽縶子諒文懦坐觀其斃為之君者孝非子胥為之友者仁非魯連慇懃贈詩送哀而已夫漢賊不滅諸葛出師二聖未還武穆鞠旅二臣忠貞表懸天壤上下其間中有越石追鞭祖生投書盧子英雄失援西狩興悲予嘗感中夜荒雞月明淸嘯抑覧是集彷彿其如有聞乎目錄表上懷帝請糧表上愍帝謝錄功表上愍帝請北伐表勸進元帝表又又又牋與丞相牋又又又又上太子牋與丞相牋又又答晉王睿牋書答太傅府書又答盧諶書遺石勒書又與親故書與兄子南兖州刺史演書又與兄弟書書與叚匹磾書盟文與叚匹磾盟文誄散騎常侍劉府君誄詩答盧諶八首其一其二其三其四其五其六其七其八重贈盧諶扶風歌胡姬年十五漢魏六朝百三家集巻五十五目録欽定四庫全書漢魏六朝百三家集巻五十五明張溥輯晉劉琨集表上懷帝請糧表臣以頑蔽志望有限因緣際會遂忝過任九月末得發道險山峻胡寇塞路輒以少擊衆冐險而進頓伏艱危辛苦備嘗即日達壺口關臣自涉州疆目覩困乏流移四散十不存二擕老扶弱不絶於路及其在者鬻妻賣子生相捐棄死亡委厄白骨横野哀呼之聲感傷和氣羣胡數萬周匝四山動足遇掠開目覩寇唯有壺關可得告糴而此二道九州之險數人當路則百夫不敢進公私往反沒喪者多嬰守窮城不得薪采耕牛既盡又乏田器以臣愚短當此至難憂如循環不遑寢食臣伏思此州雖云邊朔實邇皇畿南通河内東連司冀北捍殊俗西禦强虜是勁弓良馬勇士精騎之所出也當須委輸乃全其命今上尚書請此州糓五百萬斛絹五百萬匹綿五百萬斤願陛下時出臣表速見聽處上愍帝謝錄功表陛下略臣大愆錄臣小善猥蒙天恩光授殊寵顯以蟬冕之榮崇以上將之位伏省詔書五情飛越臣聞晉文以郤縠為元帥而定覇功高祖以韓信為大將而成王業咸有敦詩閲禮之德戎昭果毅之威故能振豐功於荆南拓洪基於河北况臣凡陋擬蹤前哲俯懼折鼎慮在覆餗昔曹沫三北而收功於柯盟馮異垂翅而奮翼於澠池皆能因敗為成以功補過陛下宥過之恩已隆而臣自新之善不立臣雖不逮預聞前訓恭讓之節臣猶庻幾所以冐承寵命者實欲没身報國輒死自效要以致命冦場盡其臣節至於寵榮之施非言辭所謝又謁者史蘭殿中中郎王春等繼至奉詔臣俯尋聖㫖伏紙飲淚臣聞夷險流行古今代有靈厭皇德曾未悔禍蟻狄縱毒於神州夷裔肆虐於上國七廟闕禋祀之享百官喪彝倫之序梓宫淪辱山陵未兆率土永慕思同考妣陛下龍姿日茂叡質彌光升區宇於既頽崇社稷於已替四海之内肇有上下九服之萌復覩典制伏惟陛下蒙塵于外越在秦郊蒸嘗之敬在心桑梓之心未克臣備位歴年才質駑下邱山之釁已彰毫釐之效未著頃以時宜權假位號竟無殪戎之績而有負乗之累當肆刑書以明黜陟是以臣前表上聞敢緣愚欵乞奉先朝之班苟存偏師之職赦其三敗之愆收其一功之用得騁志虜場快意大逆雖身膏野艸無恨黄壚陛下偏恩過隆曲蒙擢拔遂授上將位兼常伯征討之務得從事宜拜命驚惶五情戰悸懼於隕越以為朝羞昔申胥不徇伯舉而成公壻之勳伍貟不從城父而濟入郢之庸臣雖頑凶無覬古人其於披堅執鋭致身寇讐所謂天地之施羣生莫謝不勝受恩至深謹拜表陳聞上愍帝請北伐表逆胡劉聰敢率犬羊馮陵輦轂人神發憤遐邇奮怒伏省詔書相國南陽王保太尉凉州刺史軌糾合二州同恤王室冠軍將軍允䕶軍將軍綝總齊六軍戮力國難王旅大捷俘馘千計旌旗首於晉路金鼓振於河曲崤函無䖍劉之驚汧隴有安業之慶斯誠宗廟社稷陛下神武之所致含氣之類莫不引領况臣之心能無踴躍臣前表當與鮮卑猗盧尅今年三月都會平陽會匈羯石勒以三月三日徑掩薊城大司馬博陵公浚受其偽和為勒所虜勒勢轉盛欲來襲臣城塢駭懼志在自守又猗盧國内欲生奸謀幸盧警慮尋皆誅滅遂使南北顧慮用愆成舉臣所以泣血宵吟扼腕長歎者也勒據襄國與臣隔山寇騎朝發夕及臣城同惡相求其徒實繁自東北八州勒滅其七先朝所授存者唯臣是以勒朝謀夕慮以圖臣為計闚伺間隙寇抄相尋戎士不得解甲百姓不得在野天網雖張靈澤未及唯臣孑然與冦為伍自守則稽聰之謀進討則勒襲其後進退唯谷首尾狼狽徒懷憤踴力不從願慚怖征營痛心疾首形留所在神馳冦庭秋穀既登胡馬已肥前鋒諸軍並有至者臣當首啓戎行身先士卒臣與二虜勢不並立聰勒不梟臣無歸志庻慿陛下威靈使㣲意展獲然後隕首謝國没而無恨勸進元帝表否㤗之運古今迭有宗子有明德曷常不由多難以隆中興故獫狁殘周以啓宣王巨猾竊漢乃發光武陛下天授至德聰明神武勞謙恭巳卑以自牧體伯禽經營之誠行公旦吐握之事上崇勤王之義下垂庇民之量收羅俊乂任賢以能綏爰陜東化流無外戎狄荒服請事率職重譯納貢不遠萬里功高德邵遐邇歸心况陛下道邁大宗勳莫與二且以親以賢義實兼之是以琨敢緣天文人事徵祥之應昧死上事以奉尊號願陛下無常心以羣心為心忘其身以萬物為公則宗廟蒸嘗不替於今逆虜逋寇一討而滅無負於天下無愧於七后矣又表臣聞台宿在天實承辰極股肱雖卑同體元首臣負乗前朝過充三吏國之崇替有與憂喜臣聞德合兩儀者固以四海為公智周萬物者不以一身為私舜禹揖讓以陟帝位湯武征伐以濟時難彼四王者遘會不同登受有異至夫外已存物憂世遺躬其致一也期於愛民治國應變合道以為天下利而已矣况宗廟是陛下之宗廟百姓是大晉之百姓耶陛下若忽七廟之重拒天人之心絶而不繼困而不拯則宗廟不歆其禋祀羣生無所措其手足矣况臣班具臣之列荷累世之恩上懷國家之綂俯絶烏鳥之情者哉昔伍員發怒手撻平王之墓灌夫慷慨身搴吳濞之旗皆能宣其臣節攄其私忿戮尸斬將存亡罔恨臣誠無若人之才實有此人之憤苟得上慿天威展其㣲効雖隕九泉猶以明白又表陛下之躬執謙光允恭克讓俛從吏議示總萬機而蕩曠之詔開自新之路海隅漸惠朔南暨聲有生之倫咸被嘉慶陛下量包宇宙明侔三辰靈秪稽應華戎同戴加以王室中㣲邦基將絶遺民元元屬命陛下陛下以德則無所與讓言事固所負荷誠宜遺小禮存大務援據圖錄居正宸極上副祖宗之心下一兆庻之望臣聞必也正名前聖大之春秋傳曰名以出信名苟不正則事有不從信苟不立則禮義或愆乃載籍之明誡開塞之所由也又表臣聞天生烝民樹之以君所以對越天地司牧黎元聖帝明王鍳其若此知天地不可以無饗故屈其身以奉之知黎元不可以無主故不得已而臨之社稷時難則戚藩定其傾郊廟或替則宗哲纂其祀所以宏振遐風式固萬世自元康已來艱禍繁興永嘉之際氛厲彌昏宸極失御登遐醜裔國家之危有若綴旒天不悔禍大災薦臻國未忘難寇害尋興逆胡劉曜縱逸西都主上幽劫復沉虜庭神器流離再尋荒逆臣每覧史籍觀之前載厄運之極古今未有在食土之毛含氣之類莫不叩心絶氣行號巷哭况臣荷寵三世位厠鼎司承問震惶精爽飛越臣聞昏明迭用否㤗相濟天命雖改歴數有歸或多難以固邦國或隱憂以啓聖明是以齊有無知之禍而小白為五伯之長晉有驪姬之難而重耳主諸侯之盟陛下元德通於神明聖姿合於兩儀應命世之期紹千載之運符瑞之表天人有徵中興之兆圖䜟垂典自京畿殞䘮九服崩離陛下撫寧江左奄有舊吳柔服以德伐叛以刑抗明威以懾不類仗大順以肅宇内純化既敷則率土宅心義風既暢則遐方企踵昔少康之隆夏訓以為美談宣王之興周詩以為休詠况茂勳格于皇天淸暉光于四海蒼生顒然莫不欣戴聲敎所加願為臣妾者哉且宣皇之𦙍唯有陛下億兆攸歸曾無與二天祚大晉必將有主主晉祀者非陛下而誰是以邇無異言遠無異望謳歌者無不吟咏徽猷獄訟者無不思于聖德天地之際既交華裔之情允洽一角之獸連理之木以為休徵者葢有百數冠帶之倫要荒之衆不謀而同辭者動以萬計是以臣等敢考天地之心因函夏之趣昧死上尊號願陛下存舜禹至公之情狹巢由矯抗之節以社稷為務不以小行為先以黔首為憂不以克讓為事上以慰宗廟乃顧之懷下以釋普天傾首之望臣聞尊位不可久虛萬機不可久曠虛之一日則尊位以殆曠之浹長則萬機以亂陛下雖欲逡廵其若宗廟何其若百姓何牋與丞相牋不得進軍者實困無食殘民鳥散擁髪徒跣錄召之日皆披林而至衣服藍縷木弓一張荆矢十發編草盛糧不盈二日夏則桑椹冬則萱豆視此哀歎使人氣索恐孫呉韓白猶或難之况以琨怯弱凡才而當率此以殄强冦又與丞相牋昔車騎感猗㐌救州之勳表以代郡封㐌為代公見聽時大駕在長安會値戎事道路不通竟未施行盧以封事見託琨實為表上追述車騎前意即蒙聽許遣兼謁者僕射拜盧賜印及符冊浚以此見責戎狄封華郡誠為失禮然葢以救弊耳亦猶浚先以遼西封務勿塵此禮之失浚實啓之浚遂與盧争代郡舉為所破紛錯之由始結於此雁門郡有五縣在陘北盧新并塵官國甚强盛從琨求陘北地以竝遣三萬餘家散在五縣間既非所制又於琨殘弱之計得相聚集未為失宜既徙陘北五縣著陘南盧因移頗侵逼浚西陲圍塞諸軍營浚不復見恕危弱而見罪責又琨碩身竭辭北和猗盧遂引大衆躬啓戎行即具白太傅切陳愚見取賊之計聰宜時討勒不可縱而宰相意異所慮不同更憂苟晞馮嵩之徒而稽二冦之誅遣使節抑挫臣鋭氣臣即解甲遣虜衆歸國又通鑑懷帝永嘉五年七月王浚立皇太子浚設壇塲有所建立稱皇太子又通鑑永嘉五年九月劉粲殺南陽王摸平昌以九月遇禍世子時鎭隴右故得無恙上太子牋太子為秦王鄴即愍帝漢通鑑永嘉六年七月高喬郝聿以晉陽降晉書劉琨傳屬龎醇降于聰雁門烏丸復反琨親出禦之劉粲乗虛襲取晉陽聰以七月十六日復决計送死臣即自東下率中山常山之卒竝合樂平上黨諸軍未旋之間而晉陽傾潰考異云十六國春秋亦云琨收兵常山本傳誤也與丞相牋建興元年琅琊王睿用郄鍳為兖州建興元年十一月壬寅朔與丞相箋焦求雖出塞鄉有文武胆幹茍晞用為陳畱太守獨在河南距當石勒撫綏有方琨以求行貝兖州刺史後聞苟公以李述為兖州以素論門望不可與求同日而論至於胆幹可以處危權一時之用李述亦不能及求而王元年少便欲共討求琨以求已與𤣥搆隙便召還而州界民物甚不安服述二千石及文武大姓連遣信使求刺史是以遣兄子演代求領兖州事往年春正月遣詣鄴至是斬王桑走趙固云云今勒據襄國逼近鄴城故今演轉南演今住在廪邱而李述郄鍳並欲争兗州或云為苟公所用或云為明公所用大冦未殄而自共尋干戈此亦大潰也輒勑演謹自守而已又傳長安消息主上是秦王又致裘一領亦達其情耳答晉王睿牋謹當躬自執佩馘截二虜書答太傅府書懷帝永嘉二年僣遣使驛離間其部落淵遂怖懼一大於南奔蒲子雜虜歸降萬有餘落資治通鑑考異云按時淵彊琨弱豈因畏琨而徙都葢琨為自大之辭史因承以為實耳一大有脱誤又聰彌一上黨龎惇不能禦一上下有脱誤安居走利韓逼授書封田之敗黄肅不還浹辰之間名將仍殄即重遣江陶都尉張倚領上黨太守疾據襄垣續遣鷹揚將軍趙擬梁余都尉李茂與倚并力輕行衣襲賊捐棄輜車宵遁而退追尋討截獲三分之二當聰彌之未走烏丸劉虎搆為變逆西招白部遣使致任稱臣於淵殘州困弱内外受敵輒背聰而討虎自四月八日攻圍答盧諶書琨頓首損書及詩備辛酸之苦言暢經通之遠㫖執玩反覆不能釋手慨然以悲歡然以喜昔在少壯未嘗撿括遠慕老莊之齊物近嘉阮生之放曠怪厚薄何從而生哀樂何繇而至自頃輈張困於逆亂國破家亡親友凋殘塊然獨立則哀憤兩集負杖行吟則百憂俱至時復相與舉觴對膝破涕為笑排終身之積惨求數刻之暫歡譬繇疾疢彌年而欲一丸銷之其可得乎夫才生於世世實須才和氏之璧焉得獨曜於郢握夜光之珠何得專玩於隨掌天下之寳固當與天下共之但分拆之日不能不悵恨耳然後知耼周之為虛誕嗣宗之為妄作也昔騄驥倚輈於吳阪長鳴於良樂知與不知也百里奚愚於虞而智於秦遇與不遇也今君遇之矣朂之而已不復屬意於文二十餘年矣久廢則無次想必欲其一反故稱指送一篇適足以彰來詩之益美耳琨頓首頓首遺石勒書初勒被鬻平原與母王相失及劉聰署勒領并州刺史幽州牧琨遣張儒送王于勒遺勒書勒報書遺琨名馬珍寳厚賓其使謝歸以絶之將軍發跡河南席捲兖豫飲馬江淮折衝漢沔雖自古名將未足為喻所以攻城而不有其人略地而不有其土翕爾雲合忽復星散將軍豈知其然哉存亡决在得主成敗要在所附得主則為義兵附逆則為賊衆義兵雖敗而功業必成賊衆雖尅而終歸殄滅昔赤眉黄巾横逸宇宙所以一旦敗亡者正以兵出無名聚而為亂將軍以天挺之質威振宇内擇有德而推崇隨時望而歸之勳義堂堂長享遐貴背聰則禍除向主則福至採納往誨翻然改圖天下不足定螘寇不足掃今相授侍中持節車騎大將軍領䕶匈奴中郎將襄城郡公摠内外之任兼華夷之號顯封大郡以表殊能將軍其受之副遠近之望也自古以來誠無戎人以為帝王者至於名臣建功業者則有之矣今之遲想葢以天下大亂當須雄才遙聞將軍攻城野戰合於機神雖不視兵書闇與孫吳同契所謂生而知之者上學而知之者次但得精騎五千以將軍之才何向不摧至心實事皆張儒所具同前將軍誕禀雄姿勇略自然大呼於紛擾之中奮臂於駭亂之際發跡河朔席捲兖豫飲馬江沔折衝淮漢自古名將未足為喩所以攻城而不有其民略地而不有其土聚徒百萬而莫為已用翕爾雲合忽復星散周流天下而無容足之地百戰百勝而無尺寸之功將軍豈知然乎存亡决在得主成敗要在所附得主則為義兵附逆則為賊衆義兵雖敗而功業必成賊衆雖尅而終殄滅者也赤眉盛於東海黄巾連帶三州張昌李辰僣逆荆豫或擁衆百萬横逆宇内所以一旦敗亡正以兵出無名聚而為亂劉聰父子戎狄凡十乗釁肆毒冦虐人神煞父害弟偸竊位號自古及今豈有聰比而可以正天下者乎况將軍明鍳灼然所宜懸了者也况附聰之弊漸以彰著資財不為已用名位不可得守有若晨霜秋露雰霧之氣雖朝凝而夕消暫見而尋没也今將軍附賊而望為民主不亦難乎與親故書吾枕戈待旦志梟逆虜常恐祖生先吾著鞭耳與兄子南兖州刺史演書演字始仁琨兄左長史輿之子為都督後將軍被害前得安州乾薑一斤桂一斤黄芩一斤皆所須也吾體中潰悶常仰真茶汝可信信置之又前得安州乾茶二斤薑一斤桂一斤皆所須也吾體中煩悶恆假真茶汝可信信致之與兄弟書單于便欲得碧汝不可不撿送書膽識堅定臨難無苟免之意與叚匹磾書與公同盟志奬王室仰慿威力庻雪國家之恥若兒書宻達亦終不以一子之故負公忘義也盟文與叚匹磾盟文天不静晉難集上邦四方豪傑是焉扇動乃慿陵于諸夏俾天子播越震蕩罔有攸底二虜交侵區夏將泯神人乏主蒼生無歸百罹備臻死䘮相枕肌膚潤于鋒鏑骸骨曝於艸莽千里無烟火之廬列城有兵曠之邑兹所以痛心疾首仰訴皇穹者也臣琨蒙國寵靈叨竊台岳臣磾世效忠節忝荷公輔大懼醜類猾夏王旅殞首䘮元盡其臣禮古先哲王貽厥後訓所以翼戴天子敦序同好者莫不臨之以神明結之以盟誓故齊桓會於邵陵而羣后加恭晉文盟於踐土而諸侯兹順如臣等介在遐鄙而與主相去逈遼是以敢干先典刑牲歃血自今日既盟之後皆盡忠竭節以剪夷二寇有加難於磾琨必救加難於琨磾亦如之繾綣齊契披布胸懷書功金石藏於王府有渝此盟亡其宗族俾墜軍旅無其遺育誄散騎常侍劉府君誄爰自上葉帝堯之𦙍堂堂漢祖豁豁高韻茂載孝景克紹前訓穆矣靖王開國作鎭惟祖惟父乃光有晉積行累仁世篤忠順是用感和誕育奇儁淑質英挺金聲玉振嗟乎君侯仍寢斯疾命不可延中牟殞卒衝颷摧華閬風彫實如可贖兮人百其質存若燭龍衘曜没若庭燎俱滅搢紳頽範於高模邦國彌悴於隕哲詩答盧諶八首其一厄運初遘陽爻在六乾象棟傾坤儀舟覆横厲糾紛羣妖競逐火燎神州洪流華域彼黍離離彼稷育育哀我皇晉痛心在目其二天地無心萬物同塗禍淫莫驗福善則虛逆有全邑義無完都英蘂夏落毒卉冬敷如彼龜玉韞櫝毁諸芻狗之談其最得乎其三咨余軟弱弗克負荷愆釁仍彰榮寵屢加威之不建禍延凶播忠隕于國孝愆于家斯罪之積如彼山河斯釁之深終莫能磨其四郁穆舊姻嬿婉新婚不慮其敗唯義是敦裹糧擕弱匍匐星奔未輟爾駕已隳五臣作墮我門二族偕覆三孽竝根長慚舊孤永負寃魂其五亭亭孤榦獨生無伴綠葉繁縟柔條修罕朝采爾實夕捋爾竿竿翠豐尋逸珠盈椀實消我憂憂急用緩逝將去矣庭虛情滿其六虛滿伊何蘭桂移植茂彼春林瘁此秋棘有鳥翻飛不遑休息匪桐不棲匪竹不食永戢東羽翰撫西翼我之敬之廢歡輟職其七音以賞奏味以殊珍文以明言言以暢神之子之往四美不臻澄醪覆觴絲竹生塵素巻莫啓幄無談賓既孤我德又闕我鄰其八光光叚生出幽遷喬資忠履信武烈文昭旌弓騂騂輿馬翹翹乃奮長縻是轡是鑣何以贈子竭心公朝何以敘懷引領長謠重贈盧諶握中有懸璧本自荆山璆惟彼太公望昔在渭濱叟鄧生何感激千里來相求白登幸曲逆音句遇鴻門賴留侯重耳任五賢小白相射鉤茍能隆二伯安問黨與讐中夜撫枕歎想與數子游吾衰久矣夫何其不夢周誰云聖達節知命故不憂宣尼悲獲麟西狩涕孔邱功業未及建夕陽忽西流時哉不我與去乎若雲浮朱實隕勁風繁英落素秋狹路傾華一作車葢駭駟摧雙輈何意百鍊鋼化為繞指柔扶風歌朝發廣莫門暮宿丹水山左手彎繁弱右手揮龍淵顧瞻望宫闕俯仰御飛軒據鞍長歎息淚下如流泉繫馬長松下發鞍高岳頭烈烈悲風起泠泠澗水流揮手長相謝哽咽不能言浮雲為我結歸五臣作飛鳥為我旋去家日已遠安知存與亡慷慨窮林中抱膝獨摧藏麋鹿遊我前猿猴戲我側資糧既乏盡薇蕨安可食攬轡命徒侣吟嘯絶巖中君子道㣲矣夫子故一作固有窮惟昔李騫期寄在匈奴庭忠信反獲罪漢武不見明我欲竟此曲此曲悲且長棄置勿重陳重陳令心傷胡姬年十五虹梁照曉日淥水泛香蓮如何十五少含笑酒壚前花將面自許人共影相憐囘頭堪百萬價重為時年漢魏六朝百三家集巻五十五
