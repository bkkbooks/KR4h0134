body:
  text: 漢魏六朝百三家集卷七十七齊謝朓集題詞李青蓮論詩目無往古惟於謝𤣥暉三四稱服泛月登樓篇詠數見至欲擕之上華山問青天余讀青蓮五言詩情文駿發亦有似𤣥暉者知其興歎難再誠心儀之非臨風空憶也梁武帝絶重謝詩云三日不讀即覺口臭簡文與湘東書推為文章冠冕述作揩摸劉孝綽日置几案沈休文每稱未有其見貴當時又復如是今反覆誦之益信古人知言雖漸啓唐風微遜康樂要巳高步諸謝矣隋王賞愛晤對不舍長史間之殊痛離割集中文字亦惟文學辭箋西府贈詩兩篇獨絶蓋中情深者為言益工也㑹稽孔顗粗有才筆未立聲名𤣥暉愛其讓表不雞折簡手寫齒牙奬成寧忍重背婦翁生懟寡妻然王公甫誅二江搆害出反之譏頗掛時論嗚呼康樂宣城其死等爾康樂死于玩世憐之者猶比于孔北海嵇中散宣城死于畏禍天下疑其反覆即與呂布許攸同類而共笑也一死輕重尤貴得所哉目録賦酬德賦有序思歸賦有序遊後園賦臨楚江賦七夕賦擬風賦高松賦杜若賦野鶩賦有序表為百官勸進齊明帝表為明帝讓封宣城公表為明帝拜録尚書表章為宣城公拜章箋辭隋王子隆箋啓為王敬則謝㑹稽太守啓謝隨王賜左傳啓謝隨王賜紫梨啓教為録公拜揚州恩教為東海餉諸葛處士教哀䇿文齊敬皇后哀䇿文諡册文齊明皇帝諡册文墓銘臨海公主墓銘新安長公主墓銘海陵王昭文墓銘鬱林王墓銘祭文奈大雷何周二神文為隨王東耕文為諸姊祭阮夫人文樂府齊雩祭歌八首迎神八章世祖武皇帝三章青帝二章赤帝三章黃帝三章白帝三章黑帝三章送神五章隨王鼓吹曲十首元㑹曲郊祀曲鈞天曲入朝曲出藩曲校獵曲從戎曲送逺曲登山曲泛水曲江上曲蒲生行詠邯鄲才人嫁為厮飬卒婦鼓吹曲二首同沈右率諸公賦芳樹臨高臺同賦雜曲名秋竹曲曲池之水銅爵臺同謝咨議賦永明樂十首有所思同王主簿賦銅雀悲玉階怨金谷聚王孫遊詩侍宴華光殿曲水奉勑為皇太子作九章三日侍華光殿曲水宴代人應詔十章三日侍宴曲水代人應詔九章遊山遊敬亭山將遊湘水尋句溪遊東田答王世子答張齊興暫使下都夜發新林至京邑贈西府同僚酬王晉安德元郡內高齊閒望答呂法曹在郡卧病呈沈尚書别王丞僧孺同羇夜集新亭渚别范零陵雲沗役湘州與宣城吏民别懷故人始之宣城郡之宣城郡出新林浦向板橋休沐重還丹陽道中京路夜發晚登三山還望京邑始出尚書省直中書省觀朝雨宣城郡內登望冬日晚郡事隙高齊視事冬緒羈懷示蕭咨議虞田曹劉江二常侍落日悵望賽敬亭山廟喜雨賦貧民田移病還園示親屬治宅秋夜講解春思秋夜和何議曹郊遊二首和劉西曹望海臺和宋記室省中和王著作融八公山和伏武昌登孫權故城夏始和劉潺陵新治北窗和何從事和王主簿季哲怨情和徐都曹出新亭渚和劉中書贈王主簿二首和蕭中庶直石頭奉和竟陵王同沈右率過劉先生墓和王長史臥病和江丞北戍琅邪城和沈祭酒行園奉和隨王殿下十六首和紀參軍服散得益和王中丞聞琴將發石頭上烽火樓望三湖送江水曹還逺館送江兵曹檀主簿朱孝廉還上國臨溪送别後齊回望與江水曹至干濵戲答沈右率諸君餞别離夜同江丞王常侍作祀敬亭山廟出下館落日同何儀曹煦夜聽妓二首詠薔薇詠蒲詠兔絲遊東堂詠桐雜詠三首鏡臺燈燭同詠樂器得琴同詠坐上玩器得烏皮隱几同詠坐上所見一物得席詠竹火籠詠風詠竹詠落梅詠牆北梔子詠鸂鶆聯句阻雪連句遙贈和還塗臨渚紀功曹中園閒坐侍筵西堂落日望鄉往敬亭路中祀敬亭山春雨漢魏六朝百三家集卷七十七目録欽定四庫全書漢魏六朝百三家集卷七十七明張溥輯齊謝朓集賦酬德賦右衛沈侯以冠世偉才眷豫以國士以建武二年豫將南牧見贈五言豫時病既以不堪蒞職又不獲復詩四年豫沗役朱方又致一首迫東偏寇亂良無暇日其夏還京師且事宴言未遑篇章之思沈侯之麗藻天逸固難以報章且欲申之賦頌得盡其體物之㫖詩不云乎無言不酬無德不報言既未敢為酬然所報者寡於德耳故稱之酬德賦其辭曰悲夫四游之代序六龍騖而不息輕蓋靡于駿奔玉衡勞于拊翼嗟歲晏之鮮歡曾陰默以悽惻𤣥武伏於重介宛虹潛以自匿覽斯物之用舍相羣方之動植弔悴軀於華省理衣簪而自敕思披文而信道散忿悶於胸臆嗟民生之知用知莫深於知已彼知已之為深信懷之其何巳牽弱葛之蔓延寄陵風於松杞指曲蓬之直逹固有慿於原枲彼排虛與跖實又相鳴於林沚興伐木於友生詠承筐於君子矧景行之在斯方寄言於同恥求相仁於積習寓神心於名理惟敦牂之旅歲實興齊之二六奉武運之方昌覩休風之未淑龍樓儼而洞開梁邸煥其重復君奉筆於帝儲我曵裾於皇穆藉風雲之化景申遊好於蘭菊結德言而為佩帶芳猷而為服援雅範以自綏懿前修之所朂昔仲宣之發頴實中郎之倒屣及士衡之籍甚托壯武之高義有杞梓之貞心協丹采之輝被伊吾人之陋薄雖黼藻之何置惟風雅之未變知雲網之不廓譬層棟之將傾必華榱之先落翳明離以上賓屬傳體於纎蕚周二輝而分崩擠九鼎於重壑雖魚鳥之欲安駭風川而回薄微天道之布新嗟員首其焉託豫窘迹以多愧塊離尤而獨處君紆組於名邦貽話言於川渚悵分手於東津望徂舟而延佇慮古今之為隔豈山川之云阻賴先德之龍興奉英靈之電舉事紫泥之密勿腰青緺而容與沾後惠以朅來竟卒獲其笑語我艤舟以命徒將洎徂於南夏既朂豫以炯戒又引之以風雅若笙簧之在聽雖舒憂而可假昔痁病於漳濵思繼歌而莫寫恩靈降之未巳奉京枌而作傅臨邦途之永陌懷豫馬於騏馵望平津而出宿登崇岡而興賦顧歸之南回引行鑣而東驅何瓌才之博侈申贈辭於萱樹指伐匠而切偲比治素而引喻方含毫而報章迫紛埃之東騖釋末位以言歸忽乘驛以南赴連篇章之莫酬欲寄言於往句類鎩翮之難矯似洞源之不注意搔搔以杼軸魂營營而馳騖爾腰㦸於戎禁我拂劍於郎闈願同車以日夜城望昏而掩扉時遊盤以未極眷落景之徂輝苦清顔之倐忽吝歡賞之多違排重關而休告知南館之有依驂職門以右轉僕望路其如歸忘清漏之不緩惜曉露之方晞聞夫君之東守地隱蓄而懷仙登金華以問道得石室之名篇悟寰中之迫脅欲輕舉而舍旃離寵辱於毁譽去夭伐於腥膻忽㩦手以上征躋中皇之修逈巾帝車之廣軾棹河舟之輕艇厯星術之熠耀浮天潢之瀴溟機九轉於玉漿練七明於神鼎吹萬化而不喧度千春之可並齊天地於倐忽安事人間之紆婞哉思歸賦有序夫鑒之積也無厚而納窮神之照心之徑也有域而懷重淵之深余少而薄遊身缺防方思俄然萬里晚而自省諒非一塗余菲薄以固陋受靈恩而不訾拖銀黃之沃若剖金符之陸離舟未濟而河廣途方遙而馬疲忽中寢而念厲魂申旦而九移昔受教於君子逢知已之隆盻被名立之羽儀沾宦成之藻絢羌服義而不怠豈臨岐而喻變勢方迅於轉圓理好旋於奔電援弱葛而能升踐重岡而不眩信褆福之非已寧悔禍其如見大明廓以高臨吹萬欣而同悅跨神臯之沃衍奉英藩之睿哲承比屋之隆化踵芳塵之餘烈懷齷齪之褊心無夸毗之誕節竟伊鬱而不怡賴遐討於先哲紛吾生之遊蕩彌一紀而厯兹自下車於江海涉靑春於是時眷崇岡而引領望大厦而長思雖曲街之委陋猶寤寐而見之况神交而通夢眇河漢於佳期爾乃眷言薄暮南眺悠然方整歸轡願受一㕓考華城之直陌相洛浦之回阡連飛甍於故友接閒館以懷仙臨南場以藝藿寄北地而采蓮睇微英之靃靃望水葉之田田乃翦山木不日為功非輪非奐去斫去礱夜索綯而繞繞旦乘屋而芃芃竹櫺﨑嶇而經北繩閈窈窕以臨東布菌蕭於踈橑織菼亂於回櫳于是籬插芳槿門拂長楊園桃春發窗竹夏凉晨露晞而草馥微風起而樹香無芳菲以襲豫空旖旎於都房恆離居以歲月庸銷落而徒傷我聞時命有殖無遷徴事或在求理未甄譬豐草之區别隨霜露而夭延背萱鮮於堂北尚幽幽而未捐苟外物以能感亦在應而無騫况朝霞之采可咽瓊扉之飾方宣飬以虛白之氣悟以無生之篇豈加璧之贈可動執圭之位能纒歸來薄暮聊以永年遊後園賦積芳兮選木幽蘭兮翠竹上蕪蕪兮蔭景下田田兮被谷左蕙畹兮彌望右芝原兮寫目山霞起而削成水積明以經復於是敞風閨之藹藹聳雲館之迢迢周步檐以升降對玉堂之泬寥追夏德之方暮望秋清之始飈藉宴私而遊衍時寤語而逍遙爾乃日棲榆柳霞照夕陽孤蟬巳散去鳥成行惠氣湛兮帷殿肅清陰起兮池館凉陳象設兮以玉瑱紛蘭籍兮咀桂漿仰微塵兮美無度奉英軌兮式如璋藉高文兮清談預含毫兮握芳則觀海兮為富乃游聖兮知方臨楚江賦爰自山南薄暮江潭滔滔積水裊裊霜嵐憂與憂兮竟無際客之行兮歲已嚴爾乃雲沈山岫風動中川馳波鬱素駭浪浮天明沙宿莾石路相懸於是霧隱行鴈霜眇虛林迢迢落景萬里生陰冽攢笳兮極浦弭蘭鷁兮江潯奉玉鐏之未暮餐勝賞之芳音願希光兮秋月庶永照於遺簪七夕賦奉護軍命作金袛司矩火曜方流素鍾登御夷律鳴秋朱光既夕凉雲始浮盈多露之藹藹升明月之悠悠步廣階而延睞屬天媛之淹留嗟斯靈之淑景招好仇於服箱邁姮娥而擢質凌瑶華而擅芳厭白玉以為飾霏丹霞而為裳回龍駕之容裔亂鳳管之凄鏘騰燭光於西極命二妃於瀟湘軾帝車而捐玦凌天津而上翔悵漢渚之夕漲欣河廣之既梁臨瑶席而宴語綿含睇而蛾揚嗟蘭夜之難永泣㑹促而怨長忌纎阿之方駕吝長庚之末光撫鳴琴而修恍浩安歌而自傷歌曰清絃愴兮桂觴酬雲幄靜兮香風浮龍鑣蹀兮玉鑾整眷星河兮不可留分雙袂之一斷何四氣之可周斯乃嚮像恍惚倣佛幽曖耳之無聞目之無繢故鐘鼓聞而延豫隱白日沈而季後對豈形氣之所求亦理將其如昧君王壯思風飛冲情雲上顧楚詩而縱轡瞻蘭書而競爽實研精之多暇聊餘日之駘蕩賦幽靈以去惑排視聽而𤣥往哂陽雲於荆夢賦洛篇於陳想乃澄心而間邪庶綢繆於兹賞擬風賦奉司徒教作起日域而搖落集桂宮而送清開翠帳之影藹響行珮之輕鳴揚淮南之妙舞發齊后之妍聲下鴻池而蓮散上雀臺而雲生至於新虹明歲高月照秋晬儀乃豫冲想雲浮鄒馬之賓咸至申穆之醴巳酬朝役登樓之詠夕引小山之謳厭朱邸之沈邃思輕舉而逺遊驌驦之馬魚躍飄鑒車而水流此乃大王之盛風也若夫子雲寂寞叔夜高張煙霞潤色荃荑結芳出澗幽而泉冽入山户而松凉眇神玉於丘壑獨起逺於孤觴斯則幽人之風也高松賦奉竟陵王教作閲品物於幽記訪叢育於祕經巡泛林之彌望識斯松之最靈提於巖以羣茂臨於水而宗生豈榆柳之比性指冥椿而等齡若夫修幹垂蔭喬柯飛頴望肅肅而既閒即微微而方靜懷風陰而送聲當月露而留影既芊眠於廣隰亦迢遞於孤嶺集九仙之羽儀棲五鳳之光景固總木之為選貫山川而自永爾乃靑春受謝雲物含明江臯緑草曖然巳平紛弱葉而凝照競新藻而抽英陵翠山其如翦施懸蘿而共輕至於星回窮紀沙鴈相飛同雲泱其無色陽光沈而減暉卷風飈之歘吸積霰雪之嚴霏豈雕貞於歲暮不受令於霜威若乃體同器制質兼上才夏書稱其岱畎周篇咏其徂徠乃屈已以𢎞用構大壯於雲臺幸為玩於君子留神心而顧懷君王乃徙宴蘭室解佩明椒搴幽蘭於夕陰詠聳幹於琴朝陵高丘以致思御風景而逍遙夷黻冕之隆貴懷汾陽之寂寥邈道勝於千祀藴神理而自超夫江海之為大實涓澮之所歸瞻衡恆之峻極不讓壤於塵微嗟孤陋之無取幸聞道於清徽理弱羽於九萬愧不能兮奮飛杜若賦奉隋王教於坐獻馮瑶圃而宣游臨水木而延佇柳含色於逺岸泉鏡流於枉渚蔭緑竹以淹留藉幽蘭而容與覽兹榮之悅茂蒶為芳於清籞觀夫結根擢色發曜垂英緣春巒以纎布蔭凉潭而影清景奕奕以四照枝靡靡而葉傾冒霜蹊以獨蒨當春郊而徑平搴汀洲以企豫懷石泉於幽情嗟中巖之纎草厠金芝於芳叢夕舒榮於溽露旦發彩於春風承羲陽之光景庶無悲於轉蓬野鶩賦冇序有門人斃一野鶩因以為獻豫時命以登爼用待賓客客有愛其羽毛請豫為賦其詞曰夫何羅人之伎巧薦江海之逸禽落摩天之迅羽絶歸飛之好音碎文錦之丹臆裂雕綺之翠襟孤雛驚以靡翼饑雌叫而莫尋越滄流以逺致乃交留以兼金因閽寺以傳請排邃户以重深貴敷袵以取愛願登爼以甘心表為百官勸進齊明帝表臣聞時乘在御必待先天之業神化為皇乃叶應期之運况復湯孫有緒纂堯惟德舊邦佇新復禹歸祉大齊之權輿寶厯孕育前古昭假四海克酬三靈而嗣命疾威蕃鄙叛渙委裘御㝢彛鼎如忽陛下文思體道徇齊作聖翦應龍於冀州戮長蛇於沮水榮光之瑞昭回延喜之寶潤色天眷爰發人謀咸贊伏願陛下仰答靈祗𢎞宣景命誕受多方奄宅萬國為明帝讓封宣城公表如其懸旌灞滻刷馬伊穀灑酒望屬車之塵整笏侍升平之禮陛下訏謨𤣥覽欽若宏圖鑒臣匪躬共申彛訓雖量能之請近遂微躬則𢎞長之風足軌來世為明帝拜録尚書表升降王階拜揚休命六轡在手千里何偕司㑹天官之統尚書百僚之本𢎞之則庶績惟凝替之則彛倫斯斁修身踐言本慙五美果行育德未階六正妄屬負圖之寄多謝五仁之績操檜楫於龍津荷梓梁於雲構無以輔位明堂遺像麟閣章為宣城公拜章惟天為大日星度其象謂地益厚河嶽宣其氣斯冕旒所以貞觀衮職所以代終慙下穆而上尊豈南征而北怨何以克詠九歌載宣七德銘彼旗常勒斯鐘鼎箋辭隋王子隆箋故吏文學謝朓死罪死罪即日被尚書召以朓補中軍新安王記室參軍朓聞潢汙之水願朝宗而每竭駑蹇之乘希沃若而中疲何則臯壤搖落對之惆悵岐路東西或以嗚唈况乃服義徒擁歸志莫從邈若墜雨翩似秋蒂朓實庸流行能無算屬天地休明山川受納褎采一介搜揚小善故得捨耒場圃奉筆兔園東亂三江西浮七澤契濶戎旃從容宴語長裾日曵後乘載脂榮立府庭恩加顔色沐髮晞陽未測涯涘撫臆論報早誓肌骨不悟滄溟未運波臣自蕩渤澥方春旅翮先謝清切藩房寂寥舊蓽輕丹反溯弔影獨留白雲在天龍門不見去德滋永思德滋深惟待青江可望候歸艎於春渚朱邸方開效蓬心於秋實如其簪履或存衽席無改雖復身填溝壑猶望妻子知歸攬涕告辭悲來橫集不任犬馬之誠啓為王敬則謝㑹稽太守啓臣本布衣不謀逺大折衝之勤不舉燮理之義何階常恐覆餗是貽咎徵斯應陛下繼厯聖統日月重光得以桓圭衮服拜奉歲時視濯獻牲鞠躬郊廟而鴻恩妄假覆授龜符玉節邁於雙璜表東侔於四履臨邊三事既謝張溫潁川再撫亦慙黃霸謝隨王賜左傳啓昭晰殺靑近發中汗恩勸挾䇿慈朂下帷朓未窺山笥早懵河籍業謝專門說非章句庶得既困而學括羽瑩其䝉心家藏賜書籝金遺其貽厥披覽神勝吟諷知厚謝隨王賜紫梨啓味出靈闕之陰㫖珍玉津之澨豈徒真定歸美大谷慙滋將恐帝臺妙棠安期靈棗不得孤擅玉盤獨甘仙席雖秦君傳器漢后推餐望古可儔於今何答教為録公拜揚州恩教昔召南分陕流甘棠之德平陽好道深獄市之寄吾沗屬負荷任總侯伯受餞元戎作牧中甸此地五都雜㑹四方是則而向隅之矜斯積納隍之歎猶繁興念下車無忘待旦有齊禮導德致之仁壽𢎞漏網之寬申在宥之澤為東海餉諸葛處士教昔長孫東組降龍丘之節文舉北輜髙通德之稱所以激貪立懦式揚風範處士諸葛璩高風所漸結轍前修豈懷珠被褐韜玉待價將幽貞獨往不事王侯者耶聞事親有啜菽之窶就飬寡藜蒸之給豈得獨享萬鍾而忘茲五秉可餉穀百斛哀策文齊敬皇后哀䇿文惟永泰元年秋九月朔日敬皇后梓宮啓自先塋將祔于興安陵其日至尊親奉奠明皇帝乃使兼太尉陳顯逹設祖于行宮禮也翠帟舒阜𤣥堂啓扉爼徹三獻筵卷六衣哀子嗣皇帝懷蜃衛而延首想鷖輅而撫心痛椒塗之先廓哀長信之莫臨身隔兩赴時無二展旋詔左言光敷聖善其辭曰帝唐逺胄御龍遙緒在秦作劉在漢開楚肇惟淑聖克柔克令清漢表靈曾沙膺慶爰定厥祥徽音允穆光華沼沚榮曜中谷敬始紘綖教先穜稑睿問川流神襟蘭郁元德韜光君道方被于佐求賢在謁無詖顧史𢎞式陳詩展義厚下曰仁藏往伊智十亂斯俟四教罔忒思媚諸姑貽我嬪則化自公宮逺被南國軒曜懷光素舒佇德閔豫不祜慈訓早違方年冲藐懷袖靡依家臻寶業身嗣昌暉壽宮寂逺清廟虛歸嗚呼哀哉帝遷明命民神胥悅乾景外臨陰儀內缺空悲故劍徒嗟金穴璋瓉奚獻褘褕罔設嗚呼哀哉馮相告䘲宸駕長往貽厥逺圖末命是奬懷豐沛之綢繆兮背神京之𢎞敞陋蒼梧之不從兮遵鮒隅以同壤嗚呼哀哉陳象設於園寢兮映輿􅛸於松楸望承明而不入兮度清洛而南遊繼池綍於通軌兮接龍帷于造舟回塘寂其巳暮兮東川淡而不流嗚呼哀哉藉閟宮之逺烈兮聞纘女之遐慶始協德於蘋蘩兮終配祀而表命慕方纒於賜衣兮哀日隆於撫鏡思寒泉之罔極兮託彤管於遺詠嗚呼哀哉諡冊文齊明皇帝諡冊文維永泰元年九月朔日哀子嗣皇帝諱仰惟大行皇帝早棄萬邦聖烈方逺式遵一作尊帝世俾鬯鴻猷咸以為無名以化則言繁莫宣其道有求斯應則影響庶圖其功所以永言配命寄心宗極光昭令德允樹風聲伏惟大行皇帝合信四時齊明日月創保大於登庸通神幾於受命因時以暢藉九萬而輕舉天保既定運四海而高臨及乃開物成務重維國綱風行草化心往如神左賢右戚內樂外禮輯五材以教民申三驅而在宥用能盛德殷薦美善斯畢皇矣之業既孚蒸哉之道咸備景化方逺厭世在天龜筮告期逺日無改仰則前王俯詢百辟纍德稱睿允極鴻名謹命某申奉太牢之奠謹上尊諡曰明皇帝廟號高宗天人允協神其尚饗嗚呼哀哉墓銘臨海公主墓銘長發有祥瑶臺乃搆𤣥鳥歸飛北音斯奏聿來徐土禎符爰授帝體靈柯穠華以秀飾館東魯言歸景族有教公宮無繫車服既肅簪珥亦崇湯沐率禮衡門降情雲屋彼月斯望在釣維緡瞻須配景望燭齊神霾華崑岫滅采上春慈纒雲陛悲動外姻鬱彼崇芒眷然城輦輜翟按轡龍旒徐轉新安長公主墓銘氛氲長發時惟睿文誕兹明淑玉振蘭芬譽宣女師德侔高行肅穆嬪風優游閫正撫事成針臨圖作鏡如何冥默方春委盛海陵王昭文墓銘中樞誕聖膺厯受命於穆二祖天臨海鏡顯允世宗溫文著性三善有聲四國無競嗣德方衰時唯介弟景祚云及多難攸啓載驅軨轄高闢代邸庶辟欣欣威儀濟濟亦既負扆言觀帝則正位恭已臨朝淵默䖍思寶締負荷非克敬順天人高遜明德西光巳謝東旭又凉龍纛夕儼葆捝晨鏘風搖草色日照松光春秋非我晚夜何長鬱林王墓銘緑車旖旎翠㽔掩映癸二戲良臨祧弛盛毁德歸桐葉尊居鄭祭文祭大雷何周二神文大過在運小雅盡缺瓊鏡日淪金車未晰周生電斷神謨英冠正因部竒風斂雲散晉德如燬功資叶贊山無猛鷙時曠忠賢流王于彘龜鼎忽焉忠肅布衣君親自然驅狐上國斬鯢中川紛綸凱入氛氲配天為隨王東耕文穀躔星景穡表蠟先八政奚首六府兹宣弊嗟非國登頌有年一夫或怠望歲誰天為諸姊祭阮夫人文婉娩嬪德幽間婦性眄史𢎞針陳詩陳詠嘉言足題清暉可映契闊未幾音塵如昨中景遽傾芳木先落疇昔交觴享也虛薦帶上先結握中遺扇迸淚失聲潺湲如霰樂府齊雩祭歌八首南齊書樂志曰建武二年雩祭明堂謝朓造辭一依謝莊唯世祖四言也迎神八章清明暢禮樂新候龍景練貞辰陽律亢陰晷伏耗下土薦穜稑宸儀警王度乾嗟雲漢望昊天張盛樂奏雲儛集五精延帝祖雩有諷禜有秩膋鬯芬圭瓚瑟靈之來帝閽開車煜耀吹徘徊停龍轙遍觀此凍雨飛祥雲靡壇可臨奠可歆對氓社鑒皇心世祖武皇帝三章濬哲維祖長發其武帝出自震重光御㝢七德攸宣九疇咸敘靜難荆衡凝威蠡浦昧旦丕承夕惕刑政化一車書德馨粢盛昭星夜景非雲曉慶衢室成陰璧水如鏡禮充玉帛樂被匏絃於鑠在詠陟配於天自宮徂兆靡愛牲牷我將我享永祚豐年青帝三章營翼日鳥殷宵凝冰泮𤣥蟄昭景陽陽風習習女夷歌東皇集奠春酒秉青圭命田祖渥羣黎赤帝三章惟此夏德德恢台兩龍在御炎精來火景方中南訛秩靡草云黃含桃實族雲蓊鬱溫風扇興雨祁祁黍苗遍黃帝三章禀火自高明育金挺剛克凉燠資成化羣芳載厚德陽季勾萌逹炎徂溽暑融商暮百工止歲極凌陰冲泉流疏巳清原隰甸巳平咸言祚惟億敦民保齊京白帝三章帝說于兑執矩固司藏百川收潦精景應金方嘉樹離披榆關命賔鳥夜月如霜金風方嫋嫋商陰肅殺萬寶咸巳遒勞哉望歲場功冀可收黑帝三章白日短𤣥夜深招搖轉移太陰霜鐘鳴冥陵起星回天月窮紀聽嚴風來不息望𤣥雲黝無色曽冰烈積羽幽飛雪至天山側關梁閉方不巡合國吹饗蠟賔統微陽䆒終始百禮洽萬祚臻送神五章敬如在禮將周神之駕不少留躍龍鏕轉金蓋紛上馳雲之外警七曜詔八神排閶闔渡天津有淹興膚寸積雨冥冥又終夕俾棲糧維萬箱皇情暢景命昌隋王鼓吹曲十首以下五言齊永明八年謝朓奉鎮西隋王教於荆州道作鈞天以上三曲頌帝功校獵以上三曲頌藩德元㑹曲二儀啓昌厯三陽應慶期圭贄紛成序鞮譯憬來思分階赩組練充庭羅翠旗觴流白日下吹溢景雲滋天儀穆藻殿萬㝢壽皇基郊祀曲六宗禋配嶽五畤奠甘泉整蹕遊九闕清簫開八埏鏘鏘玉鑾動溶溶金障旋郊宮光巳屬升柴禮既䖍福饗靈之集南嶽固斯年鈞天曲高宴皓天臺置酒迎風觀笙鏞禮百神鍾石動雲漢瑶堂琴瑟驚綺席舞衣散威鳳來參差𤣥鶴起凌亂已慶明庭樂詎慙南風彈入朝曲江南佳麗地金陵帝王州逶迤帶緑水迢遞起朱樓飛甍夾馳道垂楊蔭御溝凝笳翼高蓋疉鼓送華輈獻納雲臺表功名良可收出藩曲雲枝紫微內分組承明阿飛艎遡極浦旌節去關河渺渺蒼山色沉沉寒水波鐃音巴渝曲簫鼓盛唐歌夫君邁惟德江漢仰清和校獵曲凝霜冬十月殺盛涼飈哀原澤曠千里騰騎紛往來平罝望煙合烈火從風回殪獸華容浦張樂荆山臺虞人昔有諭明明時戒哉從戎曲選旅辭轘軒弭節赴河源日起霜戈照風回連騎翻紅塵朝夜合黃沙萬里昏寥戾清笳轉蕭條邊馬煩自勉輟耕願征役去何言送逺曲北梁辭歡宴南浦送佳人方衢控龍馬平路騁朱輪瓊筵妙舞絶桂席羽觴陳白雲丘陵逺山川時未因一為清吹激潺湲傷别巾登山曲天明開秀㠋瀾光媚碧堤風蕩飄鶯亂雲行芳樹低暮春春服美遊駕凌丹梯升嶠既小魯登巒且悵齊王孫尚遊衍蕙草正萋萋泛水曲玉露霑翠葉金風鳴素枝罷遊平樂苑泛鷁昆明池旌旗散容裔簫管吹參差日晚厭遵渚採菱贈清漪百年如流水寸心寧共知江上曲易陽春草出踟蹰日已暮蓮葉尚田田淇水不可渡願子淹桂舟時同千里路千里既相許桂舟復容與江上可採菱清歌共南楚蒲生行蒲生廣湖邊託身洪波側春露惠我澤秋霜縟我色根葉從風浪常恐不水植攝生各有命豈云智與力安得逰雲上與爾同羽翼詠邯鄲才人嫁為厮飬卒婦生平宮閣裡出入侍丹墀開笥方羅縠窺鏡比蛾眉初别意未解去久日生悲憔悴不自識嬌羞餘故姿夢中忽倣佛猶言承燕私鼓吹曲二首同沈右率諸公賦芳樹早玩華池陰復影一作鼓滄洲枻椅柅芳若斯葳㽔紛可結霜下桂枝銷怨與飛蓬折不厠玉盤滋誰憐終委絶臨高臺千里常思歸登臺臨綺翼才見孤鳥還未辨連山極四靣動清風朝衣起寒色誰知倦遊者嗟此故鄉憶同賦雜曲名時為宣城守檀秀才諸君同賦秋竹曲㛹娟綺窗北結根未參差從風既裊裊映日頗離離欲求棗下吹别有江南枝但能凌白雪貞心蔭曲池曲池之水緩步遵莓渚披襟待蕙風芙蕖舞輕帶苞筍出芳叢浮雲自西北江海思無窮鳥去能傳響見我緑琴中銅爵臺同謝咨議賦繐帷飄井幹樽酒若平生鬱鬱西陵樹詎聞歌吹聲芳襟染淚迹嬋娟空復情玉座猶寂寞况乃妾身輕永明樂十首南齊書樂志曰永明樂歌者竟陵王子良與諸文士造奏之人為十曲帝圖開九有皇風浮四溟永明一為樂咸池無復靈民和禮樂富世清歌頌徽鴻名軼卷領稱首邁垂衣朱臺鬱相望青槐分馳道秋雲湛甘露春風散芝草龍樓日月照淄館風雲清儲光溫似玉藩度式如瓊化洽鯷海君恩變龍庭長西北騖環裘東南盡龜象出車長洲苑選旅朝夕川絡絡結雲騎奕奕泛戈船燕駟遊京洛趙服麗有輝清歌留上客妙舞送將歸實相薄五禮妙花開六塵明祥已玉燭寶瑞亦金輪生蔑􅀢蘿性身與佳惠隆飛纓入華殿屣步出重宮彩鳳鳴朝陽𤣥鶴舞清商瑞此永明曲千載為金皇有所思同王主簿賦佳期期未歸望望下鳴機徘徊東陌上月出行人稀銅雀悲落日高城上餘光入繐帷寂寂深松晚寧知琴瑟悲玉階怨夕殿下珠簾流螢飛復息長夜縫羅衣思君此何極金谷聚渠碗送佳人玉杯邀玉臺作要上客車馬一東西别後思今夕王孫遊緑草蔓如絲雜樹紅英發無論君不歸君歸芳巳歇詩侍宴華光殿曲水奉勑為皇太子作四言九章旁求邃古逖聽鴻名大寶曰位得一為貞朱祶叶祉緑字摛英升配同貫進讓殊聲大橫將屬㑹昌巳命國步中徂宸居膺慶璽劍先傳龜玉增映宗堯有緒復禹無競禮行郊社人神受職寶效山川鱗羽變色𤣥塞北靡丹徼南極浮毳駕風飛泳登陟能官民秀利建天跗枵鶉列野營綘分區論思帝則獻納宸樞麟趾方定鵜翼誰濡西京藹藹東都濟濟秋祓濯流春禊浮醴初吉云獻上陰方啓昔駕陽潁今帳雲陛嘉樂舊矣芳宴在斯載留神矚有睟天儀龍精巳映威仰未移葉依黃鳥花落春池高殿𢎞敞禁林稠密青磴崛起丹樓間出翠葆隨風金戈動日惆悵清管徘徊輕佾灞滻入筵河淇流阼海若來往觴肴㳂泝歡飫有終清光欲暮輕貂回首華組徐步登賢博望獻賦清漳漢二稱敏魏兩垂芳監撫有則匕鬯無方瞻言守器永愧元良三日侍華光殿曲水宴代人應詔十章羣分未辨類聚兹式天眷休明且求至德御繁實簡制動惟默官府百王衣裳萬國中葉遭閔副內多違悠悠靈貺爰有適歸於昭睿后撫運天飛凝居中縣神動外畿懸象著明離光乃位我有儲德徽猷淵備長壽察書龍樓回轡重道上庠行遵儒肆朝陽有幹布葉萋萋思皇威矣鵷羽高棲出馳先輅入秉介圭瞻秦望井建魯分奎求賢每勞得士方逸有覺斯順無文咸秩萬箱惟重百鍰載恤屈草戒諛階蓂紀日文教巳肅武節既馳榮光可照合璧如規載懷姑射尚想瑶池濯龍乃飾天淵在斯作樂順動實符時義上春初吉亦留淵寄紅樹巖舒青莎水被雕梁虹拖雲甍鳥跂高懸甲帳周褰黼帷長筵列陛激水旋墀浮醪聚蟻靈蔡呈姿河宗躍踢海介䕫跜弱腕纎腰遷延妙舞秦筝趙瑟殷勤促柱降席連緌稱觴接武稽首萬年獻兹多祜天地既成泉流既清薄暮沾幸屬奉文明將標齊配刻掃秦京願馳龍漠飲馬懸旌三日侍宴曲水代人應詔九章神理內寂機象外融遺情汾水垂冕鴻宮樹以司牧匪我求䝉徒勤日用誰契𤣥功往晦必明來碩資蹇於皇克聖時乘御辨寶厯載暉瑶光重踐昭昭舊物熙熙遷善當寧日昃求衣未明抵璧焚翠銷劍隳城九疇式序三辟載清虞針罔闕矇奏傳聲麗景則春儀方在震重聖積厚金式瓊潤天爵必諧王臣咸藎譬諸華霍惟邦之鎮正朔葱瀚冠冕卭越爭長明堂相超魏闕龜䝉南薦環裘西發巢閣易窺馴庭難䎀上巳惟昔于彼禊流祓穢河滸張樂春疇既停龍駕亦泛鳬舟靈宮備矣無待兹遊初鸚命曉朝霞開夜飾陛道源回伊流灞極望天淵曲阻亭榭閒館巖敞長廊水架金觴搖蕩玉爼推移筵浮水豹席擾雲螭寥亮琴瑟嗷咷塤篪歡兹廣宴穆穆天儀周道如砥康衢載直徒愧𤣥黃負恩無力華轓徒駕長纓未飾相彼失晨寧忘鼓翼遊山以下五言託飬因支離乘閒遂疲蹇語默良未尋得喪云誰辨幸蒞山水都復值清冬緬凌崖必千仞尋壑將萬轉堅崿既崚嶒回流復宛澶杳杳雲竇深淵淵石溜淺傍眺鬱篻簩還望森柟楩荒隩被葴莎崩壁帶苔蘚鼯狖呌層嵁鷗鳬戲沙衍觸賞聊自觀即趣咸巳展經目惜所遇前路欣方踐無言蕙草歇留垣芳可搴尚子時未歸邴生思自免永志昔所欽勝迹今能選寄言賞心客得性良為善遊敬亭山兹山亘百里合沓與雲齊隱淪既巳託靈異居然棲上干蔽白日下屬帶回溪交藤荒且蔓樛枝聳復低獨鶴方朝唳飢鼯此夜啼泄雲巳漫漫夕雨亦淒淒我行雖紆組兼得尋幽蹊緣源殊未極歸徑窅如迷要欲追竒趣即此凌丹梯皇恩竟巳矣兹理庶無睽將遊湘水尋句溪既從陵陽釣挂鱗驂赤螭方尋桂水源謁帝蒼山垂辰哉且未㑹乘景弄清漪瑟汨㵼長淀潺湲赴兩岐輕蘋上靡靡雜石下離離寒草分花映獻鮪乘空移興以暮秋月清霜落素枝魚鳥余方玩纓緌君自縻及兹暢懷抱山川長若斯遊東田戚戚苦無悰擕手共行樂尋雲陟纍榭隨山望菌閣逺樹曖阡阡生煙紛漠漠魚