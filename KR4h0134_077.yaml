寞此閒帷琴尊任所對客念坐嬋媛年華稍菴薆夙慕雲澤遊共奉荆臺績一聽春鶯喧再視秋鴻沒疲驂良易返恩波不可越誰慕臨淄鼎常希茂陵渴依隱幸自從求心果蕪昧方軫歸與願故山芝未歇落日悵望昧旦多紛喧日晏未遑舍落日餘清陰高枕東窗下寒槐漸如束秋菊行當把借問此何時凉風懷朔馬已傷慕歸客復思離居者情嗜幸非多案牘偏為寡既乏琅琊政方憩洛陽社賽敬亭山廟喜雨夕悵懷椒糈蠲景潔膋薌登秋雖未獻望歲佇年祥潭淵深可厲狹邪車未方朦朧度絶限出沒見林堂秉玉朝羣帝樽桂迎東皇排雲接虬蓋蔽日下霓裳㑹舞紛瑶席安歌繞鳳梁百味芬綺帳四座沾羽觴福被延民澤樂極思故鄉登山騁歸望原雨晦茫茫胡寧昧千里解珮拂山莊賦貧民田假遇一作佳譽非將迎靖共一作靜拱延殊慶中歲厯三臺旬月典邦政曾是共治情敢忘恤貧病將無富教禮孰有知方性敦本抑工商均業省兼併察壤見泉脉覘星視農正黍稷緣高殖穱稌即卑盛舊埓新塍分青苖白水映遙樹匝清陰連山周逺淨即此風雲佳孤觴聊可命既微三載道庶藉兩岐詠俾爾倉廩實余從谷口鄭移病還園示親屬疲䇿倦人世斂性就幽蓬停琴佇凉月滅燭聽歸鴻凉薰乘暮晰秋華臨夜空葉低知露密崖斷識雲重折荷葺寒袂開鏡眄衰容海暮騰清氣河關袐棲沖煙衡時未歇芝蘭去相從治宅結宇夕陰街荒幽橫九曲迢遞南川陽迤邐西山足闢館臨秋風敞窗望寒旭風碎池中荷霜翦江南菉既無東都金且稅東臯粟秋夜講解四緣去誰肇七識習未央沈沈倒營魄苦蔭蹙愁腸琴瑟徒爛熳姱容空滿堂春顔遽幾日秋壠終茫茫孰云濟沈溺假願託津梁惠唱摛泉湧妙演發金相空有定無執賔實固相忘自來乘首夏及此申暮霜雲物清晨景衣巾引夕凉風振蕉薘裂露下梧楸傷六龍且無借三相寧久長何時接靈應及子同舟航春思茹溪發春水阰山起朝日蘭色望巳同萍際轉如一巢燕聲上下黃鳥弄儔匹邊郊阻遊衍故人盈契濶夢寐借假簧思歸賴倚瑟幽念漸鬱陶山楹永為室秋夜秋夜促織鳴南鄰搗衣急思君隔九重夜夜空佇立北窗輕幔垂西户月光入何知白露下坐視階前濕誰能長分居秋盡冬復及和何議曹郊遊二首春心淡容與挾戈步中林朝光映紅蕚微風吹好音江垂得清賞山際果幽尋未嘗逺離别知此愜歸心流泝終靡已嗟行方至今江臯倦遊客薄暮懷歸者揚舲浮大川惆悵至日下靃靡青莎被潺湲石溜瀉寄語持笙簧舒憂願自假歸途豈難涉翻同江上夏和劉西曹望海臺滄波不可望望極與天平往往孤山映處處春雲生差池逺鴈沒颯沓羣鳬驚囂塵及簿領棄捨出重城臨川徒可羡結網庶時營和宋記室省中落日飛鳥逺憂來不可極竹樹澄逺陰雲霞成異色懷歸欲乘電瞻言思解翼清揚婉禁居祕此文墨職無歎阻琴樽相從伊水側和王著作融八公山二别阻漢坻雙崤望河澳兹嶺復㠝岏分區奠淮服東限琅琊臺西距孟諸陸阡眠起雜樹檀欒蔭修竹日隱澗疑空雲聚岫如復出沒眺樓雉逺近送春目戎州昔亂華素景淪伊榖阽危賴宗衮微管寄明牧長蛇固能翦奔鯨自此曝道峻芳塵流業遙年運倐平生仰令圖吁嗟命不淑浩蕩别親知連翩戒征軸再逺館娃宮兩去河陽谷風煙四時犯霜雨朝夜沐春秀良巳凋秋場庶能築和伏武昌登孫權故城伏曼容為武昌太守炎靈遺劒璽當塗駭龍戰聖期缺中壤霸功興㝢縣鵲起登吳山鳳翔凌楚甸襟帶窮巖險帷帟盡謀選北拒溺驂鑣西龕收組練江海既無波俯仰流英眄裘冕類禋郊卜葵崇離殿釣臺臨講閲樊山開廣宴文物共葳㽔聲明且蔥蒨三光厭分景書軌欲同薦參差世祀忽寂寞市朝變舞館識餘基歌梁想遺囀故林衰木平荒池秋草遍雄圖悵若兹茂宰深遐眷幽客滯江臯從賞乖纓辨清巵阻獻酬良書限聞見幸藉芳音多承風采餘絢于役倘有期鄂渚同遊衍夏始和劉潺陵威仰弛蒼郊龍曜表皇隰春色卷遙甸炎光麗近邑白蘋望巳騁緗荷紛可襲徒願尺波旋終憐寸景戢對窗斜日過洞幌鮮飈入浮雲去欲窮暮鳥飛相及柔翰縝芳塵清源非易揖回江難絶濟云誰暢佇立良宰朂夜漁出入事朝汲積羽余既裳更賦子盈粒椅梧何必零歸來共棲集新治北窗和何從事園小暇日多民淳紛務屏闢牖期清曠開簾候風景泱泱日照溪團團雲去嶺苕蕘蘭橑峻駢闐石路整池北樹如浮竹外山猶影自來彌弦望及君臨箕潁清文蔚且詠微言超巳領不見城濠側思君朝夕頃回舟方在辰何以慰延頸和王主簿季哲怨情掖庭聘絶國長門失歡宴相逢詠蘼蕪辭寵悲團扇花叢數亂蝶風簾入雙燕徒使春帶賖坐惜紅粧變生平一顧重宿昔千金賤故人心尚爾故心人不見和徐都曹出新亭渚宛洛佳遨遊春色滿皇州結軫清郊路回瞰蒼江流日華川上動風光草際浮桃李成蹊徑桑榆蔭道周東都已俶載言歸望緑疇和劉中書昔余侍君子厯此遊荆漢山川隔舊賞朋僚多雨散圖南矯風翮曾非息短翰移疾覯新篇披衣起淵玩惆悵懷昔踐倣佛得殊觀頳紫共彬駮雲錦相凌亂奔星上未窮驚雷下將半回潮漬崩樹輪囷軋傾岸巖篠或傍翻石菌蕪修幹澄澄明浦媚衍衍清風爛江潭良在目懷賢興纍歎歲暮不我期淹留絶巖畔贈王主簿二首日落窗中坐紅粧好顔色舞衣襞未縫流黃覆不織蜻蛉草際飛遊蜂花上食一遇長相思願寄連翮翼清吹要碧玉調絃命緑珠輕歌急綺帶含笑解羅襦餘曲詎幾許高駕且踟蹰徘徊韶景暮一作憐暮景惟有洛城隅和蕭中庶直石頭九河亘積岨三嵕鬱旁眺皇州總地德回江欵巖徼井幹赩蒼林雲甍蔽層嶠川霞旦上薄山光晚餘照翔集亂歸飛虹霓紛引曜君子奉神略瞰逈慿重峭强冠已籍甚升車益英妙功存漢冊書榮並周庭燎汲疾移偃息董園倚談笑麾斾一悠悠謙姿光且劭宴嘉多暇日興文起淵調曰余厠鱗羽滅景從漁釣澤渥資投分逢迎典待詔詠沼邈含毫專城空坐嘯徒慚皇鑒揆終延曲士誚方追隱淪訣偶解金丹要若偶巫咸招帝閽良可叫奉和竟陵王同沈右率過劉先生墓嘉樹因枝條琢玉良可寶若人陵曲臺垂帷茂淵道善誘宗學原鳴鐘霽幽抱仁焉徂宛洛清徽夜何早歲晚結松陰平原亂秋草不有至言揚終滯西山老和王長史臥病崥岫欵崇崖𣲖别朝洪河兔園文雅盛章臺冠蓋多淵襟眷睿嶽燮贊動氓歌顧影慚騑服載筆旅江沱縞衣分可獻琴言曖巳和青臯向還色春潤視生波巖垂變好鳥松上改陳蘿日與歲眇邈歸恨積一作稍蹉跎願緝吳山杜寧袂楚池荷清風豈孤劭功遂懷曾阿勿藥良有暢荏苒芳未過幸留清樽味言藉故田莎和江丞北戍琅邪城春城麗白日阿閣跨層樓蒼江忽渺渺驅馬復悠悠京洛多塵霧淮濟未安流豈不思撫劍惜哉無輕舟夫君良自勉歲暮勿淹留和沈祭酒行園清淮左長薄荒徑隱高蓬回潮旦夕上寒渠左右通霜畦紛綺錯秋町鬱䝉茸環梨懸巳紫珠榴折且紅君有棲心地伊我歡既同何用甘泉側玉樹望青葱奉和隨王殿下十六首高秋夜方靜神居肅且清閒階塗廣露凉宇澄月陰嬋娟影池竹疏蕪散風林淵情協爽節詠言興德音暗道空巳積干直愧蓬心星回夜未艾洞房凝逺情雲陰滿池榭中月懸髙城喬木含風霧行鴈飛且鳴平臺盛文雅西園富羣英芳慶良永矣君王嗣德聲眷此伊洛詠載懷汾水情顧已非麗則恭惠奉仁明觀淄詠巳失憮然愧簪纓神心遺魏闕中想顧汾陽肅景懷辰豫捐玦翦山楊時惟清夏始雲景曖含芳月陰洞野色日華麗池光草含亭臯逺霞生川路長端坐聞鶴引靜瑟愴復傷懷哉泉石思歌詠鬱瓊相春塘多迭駕言從伊與商衮職眷英覽獨善伊何忘願輟東都逺𢎞道侍云梁睿心重離析岐路清江隈四面寒飈舉千里白雲來川長别管思地逈翻旗回還顧昭陽闕超逺章華臺置酒巫山日為君停玉杯桂樓飛絶限超逺向江岐輕寒霽廣甸微風散清漪連連絶鴈舉渺渺青煙移嚴城亂藝草霜塘凋素枝氣爽深遙矚豫永聊停曦即巳終可悅盈尊且若斯念深冲照廣業闡清化𤣥端儀穆金殿敷教藻瓊筵船湛輕帷靄磬轉芳風旋卷轡棲道樹方津棹法舷歸興慿大造昭塗良易筌𤣥冬寂修夜天圍靜且開亭臯霜氣愴松宇清風來高琴時以思幽人多感懷幸藉汾陽想嶺首正徘徊愴愴緒風興祁祁族雲布嚴氣集高軒稠陰結寒樹日月謬論思朝夕承清豫徒藉小山文空揖章臺賦肅景遊清都修簪侍蘭室纍榭疏逺風廣亭麗朝日穆穆神儀靜愔愔道心密一飱繫靈表無吝科年厯清房洞己靜閒風伊夜來雲生樹陰逺軒廣月容開宴私移燭影遊賞藉琴臺風猷冠淄鄴袵舄愧唐枚方池含積水明月流皎鏡規荷承日泫彯鱗與風泳上善叶淵心止川測動性幸是方春來側㸃游濠盛浮雲西北起飛來下高堂合散輕帷表飄舞桂臺陽遙階收委羽平地如夜光眷言金玉照顧慚蘭蕙芳炎光缺風雅宗霸振時淪龍德待雲霧令圖方再晨歲逺荒城思霜華宿草陳英威遽如是徘徊岐路人分悲玉瑟斷别渚金樽傾風入芳帷散缸華蘭殿明想折中園草共知千里情行雲故鄉色贈此一離聲年華豫巳滌夜艾賞方融新萍時合水弱草未勝風閨幽瑟易響臺逈月難中春物廣餘照蘭萱佩未窮連漪映餘雪嚴城限深霧清寒起洞門東風急池樹神居望巳肅徘徊舉冲趣棲歸如遲詠丘山不可屢和紀參軍服散得益金液稱九轉西山歌五色鍊質乃排雲濯景終不測雲英亦可餌且駐羲和力能令長卿卧暫故遇真識和王中丞聞琴凉風吹月露圎景動清陰蕙風入懷抱聞君此夜琴蕭瑟滿林聽輕鳴響澗音無為淡容與蹉跎江海心將發石頭上烽火樓徘徊戀京邑躑躅屣曾阿陵高遲關近眺逈風雲多荆吳阻山岫江海含瀾波歸飛無羽翼其如離别何望三湖積水照頳霞高臺望歸翼平原周逺近連汀見紆直葳㽔向春秀藝黃共秋色薄暮傷哉人嬋媛復何極送江水曹還逺館高館臨荒途清川帶長陌上有流思人懷舊望歸客塘邊草雜紅樹際花猶白日暮有重城何由盡離席送江兵曹檀主簿朱孝廉還上國方舟泛春渚攜手趨上京安知暮歸客詎憶山中情香風蕊上發好鳥葉間鳴揮袂送君巳獨此夜琴聲臨溪送别悵望南浦時徙倚北梁步葉上凉風初日隱輕霞暮荒城逈易陰秋溪廣難渡沫泣豈徒然君子行多露後齊迥望高軒瞰四野臨牖眺襟帶望山白雲裏望水平原外夏木轉成帷秋荷漸如蓋鞏洛常眷然搖心似懸斾與江水曹至干濵戲玉臺云别江水曹山中上芳月故人清樽賞逺山翠百重回流映千丈花枝聚如雪蕪絲散猶網一作垂藤散似網别後能相思何嗟異封壤答沈右率諸君餞别春夜别清樽江潭復為客歎息東流水如何故鄉陌重樹日芬蒕芳洲轉如積望望荆臺下歸夢相思夕離夜同江丞王常侍作玉繩隱高樹斜漢耿層臺離堂華燭盡别幌清琴哀翻潮尚知限客思耿難裁山川不可夢况乃故人杯祀敬亭山廟翦削兼太華峥嶸跨𤣥圃貝闕眂阿宮薜帷陰網户參差時未來徘徊望灃浦椒糈若馨香無絶傳終古出下館麥候始清和凉雨銷炎燠紅蓮搖弱荇丹藤繞新竹物色盈懷抱方駕娛耳目零落既難留何用存華屋落日同何儀曹煦參差復殿影氛氲綺羅雜風入天淵池芰荷搖復合逺聽雀聲聚回望樹陰沓一賞桂尊前寧傷蓬鬢颯夜聽妓二首瓊閨釧響聞瑶席芳塵滿要取洛陽人共命江南管情多舞態遲意傾歌弄緩知君密見親寸心傳玉碗上客光四座佳麗直千金挂叉報纓絶墮珥答琴心蛾眉巳共笑清香復入襟歡樂夜方靜翠帳垂沈沈詠薔薇低枝詎勝葉輕香幸自通發蕚初攢紫餘采尚霏紅新花對白日故蕊逐行風參差不俱曜誰肯盻微叢詠蒲離離水上蒲結水散為珠閒厠秋菡萏出入春鳬雛初萌實雕俎暮蕊雜椒塗所悲塘上曲遂鑠黃金軀詠兔絲輕絲既難理細縷竟無織爛熳巳萬條連綿復一色安根不可知縈心終不測所貴能卷舒伊用蓬生直遊東堂詠桐孤桐北窗外高枝百尺餘葉生既婀娜葉落更扶疏無華復無實何以贈離居裁為圭與瑞足可命參墟雜詠三首鏡臺玲瓏類丹檻苕亭似𤣥闕對鳳懸清冰垂龍挂明月照粉拂紅粧插花理雲髮玉顔徒自見常畏君情歇燈發翠斜漢裏蓄寶宕山峰抽莖類仙掌銜光似燭龍飛蛾再三繞輕花四五重孤對相思夕空照舞衣縫燭杏梁賔未散桂宮明欲沈曖色輕帷裏低光照寶琴徘徊雲髻影的爍綺疏金恨君秋月夜遺我洞房陰同詠樂器得琴洞庭風雨幹龍門生死枝雕刻紛布濩冲響鬱清巵春風搖蕙草秋月滿華池是時操别鶴淫淫客淚垂同詠坐上玩器得烏皮隱几蟠木生附枝刻削豈無施取則龍文鼎二趾獻光儀勿言素韋潔白沙尚推移曲躬奉微用聊承終宴疲同詠坐上所見一物得席本生潮汐池落景照參差汀洲蔽杜若幽渚奪江蘺遇君時采擷玉座奉金巵但願羅衣拂無使素塵彌詠竹火籠庭雪亂如花井氷粲成玉因炎入貂袖懷溫奉芳褥體密用宜通文邪性非曲本自江南墟㛹娟修且緑暫承君玉指請謝陽春旭詠風徘徊發紅蕚葳㽔動緑葹垂楊低復舉新萍合且離步檐行袖靡當户思襟披高響飄歌吹相思子未知時拂孤鸞鏡星鬢視參差詠竹窗前一叢竹青翠獨言竒南條交北葉新筍雜故枝月光疏已密風來起復垂青扈飛不礙黃口得相窺但恨從風籜根株長别離詠落梅新葉初冉冉初蕊新菲菲逢君後園燕相隨巧笑歸親勞君玉指摘以贈南威用持插雲髻翡翠比光輝日暮長零落君恩不可追詠牆北梔子有美當階樹霜露未能移金蕡發朱采映日以離離幸賴夕陽下餘景及西枝還思照緑水君階無曲池餘榮未能巳晚實猶見竒復留傾筐德君恩信未資詠鸂鶒蕙草含初芳瑶池曖晚色得厠鴻鸞影晞光弄羽翼聨句阻雪連句遙贈和積雪皓陰池北風鳴細枝九逵密如繡何異逺别離謝眺風庭舞流霰氷沼結文􅀈飲春雖以燠欽賢紛若馳江秀才革珠霙條間響玉溜檐下垂杯酒不相接寸心良共知王丞融飛雲亂無緒結氷明曲池雖乖促席宴白首信勿虧王蘭陵僧孺飄素瑩檐溜巖結噎通岐樽疉如末浣况乃限音儀謝洗馬吳原隰望徙倚松筠竟不移隱憂恧萱樹忘懷待山巵劉中書繪初昕逸翮舉日昃駑馬疲幽山有桂樹歲暮方參差沈右率約還塗臨渚緑水纈清波青山繡芳質落景皎晚陰殘花綺餘日阿從事白沙淡無際青山眇如一傷此物運移惆悵望還律吳郎白水田外明孤嶺松上出即趣佳可淹淹留非下秩府君遙和紀功曹中園蘭亭仰逺風芳林接雲㠋傾葉順清飈修莖佇高鶴何從事連綿夕雲歸暗曖日將落寸陰不可留蘭墀豈停酌吳郎丹纓猶照樹緑筠方解籜永志能兩忘即賞謝丘壑府君間坐雨洗花葉鮮泉漫芳塘溢藉此閒賦詩聊用蕩羈疾陳郎霡霂微雨散葳㽔蕙草密預藉芳筵賞沾生信昭悉紀功曹晏紫葵窗外舒青荷池上出既闔潁川扉且臥淮南秩府君流風蕩晚陰行雲掩朝日余此蘭蕙客徒有芳菲質何從事侍筵西堂落日望鄉沈病巳綿緒負官别鄉憂高城凄夕吹時見國烟浮曹丞漠漠輕雲晚颯颯高樹秋鄉山不可望蘭巵且獻酬府君旻高識氣逈泉渟知潦收幸遇慶筵渥方且沐恩猷紀功曹晏藝黃先露早騷瑟驚暮秋舊城望巳肅况乃客悠悠何從事往敬亭路中山中芳杜緑江南蓮葉紫芳年不共遊淹留空若是府君緑水豐漣漪青山多繡綺新條日向抽落花紛巳委何從事弱葼既青翠輕莎方靃靡鷖鷗沒而遊麕䴥騰復倚齊舉郎春岸望沈沈清流見瀰瀰幸藉人外遊盤桓未能徙陳郎騖枻把瓊芳隨山訪靈詭榮楯每嶙峋林堂多崎礒府君祀敬亭山春雨水府衆靈出石室寶圖開白雲帝鄉下行雨巫山來府君歌風讃靈德舞蹈起輕埃高軒乍留吹𤣥羽或徘徊何從事福降羣仙下識逸百神該青鳥飛層隙赤鯉泳瀾隈齊舉郎漢魏六朝百三家集卷七十七
