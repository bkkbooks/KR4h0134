謬乎褚先生曰不然詩言契生於卵后稷人迹者欲見其有天命精誠之意耳鬼神不能自成須人而生奈何無父而生乎一言有父一言無父信以傳信疑以傳疑故兩言之堯知契稷皆賢人天之所生故封之契七十里後十餘世至湯王天下堯知后稷子孫之後王也故益封之百里其後世且千歳至文王而有天下詩傳曰湯之先為契無父而生契母與姊妺浴於𤣥丘水有燕銜卵墮之契母得故含之誤吞之即生契契生而賢堯立為司徒姓之曰子氏子者兹兹益大也詩人美而頌之曰殷社芒芒天命𤣥鳥降而生商商者質殷號也文王之先為后稷后稷亦無父而生后稷母為姜嫄出見大人蹟而履踐之知於身則生后稷姜嫄以為無父賤而棄之道中羊牛避不踐也抱之山中山者養之又捐之大澤鳥覆席食之姜嫄怪之於是知其天子乃取長之堯知其賢才立以為大農姓之曰姬氏姬者本也詩人美而頌之曰厥初生民深修益成而道后稷之始也孔子曰昔者堯命契為子氏為有湯也命后稷為姬氏為有文王也大王命季厯明天瑞也太伯之吳遂生源也天命難言非聖人莫能見舜禹契后稷皆黄帝子孫也黄帝䇿天命而治天下德澤深後世故其子孫皆復立為天子是天之報有德也人不知以為汜從布衣匹夫起耳夫布衣匹夫安能無故而起王天下乎其有天命然黄帝後世何王天下之久逺邪曰傳云天下之君王為萬夫之黔首請贖民之命者帝有福萬世黄帝是也五政明則修禮義因天時舉兵征伐而利者王有福千世蜀王黄帝後世也至今在漢西南五千里常來朝降輸獻於漢非以其先之有德澤流後世邪行道德豈可以忽乎哉人君王者舉而觀之漢大將軍霍子孟名光者亦黄帝後世也此可為博聞逺見者言固難為淺聞者説也何以言之古諸侯以國為姓霍者國名也武王封弟叔處於霍後世晉獻公滅霍公後世為庶民往來居平陽平陽在河東河東晉地分為魏國以詩言之亦可為周世周起后稷后稷無父而生以三代世傳言之后稷有父名髙辛髙辛黄帝曽孫黄帝終始傳曰漢興百有餘年有人不短不長出白燕之鄉持天下之政時有嬰兒主郤行車霍將軍者本居平陽白燕臣為郎時與方士考功㑹旗亭下為臣言豈不偉哉建元以來侯年表脩記孝昭以來功臣侯者後進好事儒者褚先生曰太史公記事盡於孝武之事故復脩記孝昭以來功臣侯者編於左方令後好事者得覽觀成敗長短絶世之適得以自戒焉當世之君子行權合變度時施宜希世用事以建功有土封侯立名當世豈不盛哉觀其持滿守成之道皆不謙讓驕蹇爭權喜揚聲譽知進不知退終以殺身滅國以三得之及身失之不能傳功於後世令恩德流子孫豈不悲哉夫龍頟侯曽為前將軍世俗順善厚重謹信不與政事退讓愛人其先起於晉六卿之世有土君國以來為王侯子孫相承不絶厯年經世以至于今凡八百餘歳豈可與功臣及身失之者同日而語之哉悲夫後世其誡之博陸霍光家在平陽以兄驃騎將軍故貴前事武帝覺捕得侍中謀反者馬何羅等功侯三千戸中輔幼主昭帝為大將軍謹信用事擅治尊為大司馬益封邑萬戸後事宣帝厯事三主天下信鄉之益封二萬戸子禹代立謀反族滅國除秺金翁叔名日磾以匈奴休屠王太子從渾邪王將衆五萬降漢歸義侍中事武帝覺捕侍中謀反者馬何羅等功侯二千戸中事昭帝謹厚益封三千戸子𢎞代立為奉車都尉事宣帝安陽上官桀家在隴西以善騎射從軍稍貴事武帝為左將軍覺捕斬侍中謀反者馬何羅弟重合侯通功侯三千戸中事昭帝與大將軍霍光爭權因以謀反族滅國除桑樂上官安以父桀為將軍故貴侍中事昭帝安女為昭帝夫人立為皇后故侯三千戸驕蹇與大將軍霍光爭權因以父子謀反族滅國除富平張安世家在杜陵以故御史大夫張湯子武帝時給事尚書為尚書令事昭帝謹厚習事為光禄勲右將軍輔政十三年無適過侯三千戸及事宣帝代霍光為大司馬用事益封萬六千戸子延壽代立為太僕侍中義陽傅介子家在北地以從軍為郎為平樂監昭帝時刺殺外國王天子下詔書曰平樂監傅介子使外國殺樓蘭王以直報怨不煩師有功其以邑千三百戸封介子為義陽侯子厲代立爭財相告有罪國除商利王山齊人也故為丞相史㑹騎將軍上官安謀反山説安與俱入丞相斬安山以軍功為侯三千戸上書願治民為代太守為人所上書言繫獄當死㑹赦出為庶人國除建平杜延年以故御史大夫杜周子給事大將軍幕府發覺謀反者騎將軍上官安等罪封為侯邑二千七百戸拜為太僕元年出為西河太守五鳯三年入為御史大夫弋陽任宫以故上林尉捕格謀反者左將軍上官桀殺之便門封為侯二千戸後為太常及行衞尉事節儉謹信以壽終傳於子孫宜城燕倉以故大將軍幕府軍吏發謀反者騎將軍上官安有罪功封侯邑二千戸為汝南太守有能名宜春王訢家在齊本小吏佐史稍遷至右輔都尉武帝數幸扶風郡訢共置辦拜為右扶風至孝昭時代桑𢎞羊為御史大夫元鳯三年代田千秋為丞相封二千户立二年為人所上書言暴自殺不殊子代立為屬國都尉安平楊敞家在華隂故給事大將軍幕府稍遷至大司農為御史大夫元鳯六年代王訢為丞相封二千戸立二年病死子賁代立十三年病死子翁君代立為典屬國三歲以季父惲故出惡言繫獄當死得免為庶人國除陽平蔡義家在温故師受韓詩為博士給事大將軍幕府為杜城門候入侍中授昭帝韓詩為御史大夫是時年八十衰老常兩人扶持乃能行然公卿大臣議以為為人主師當以為相以元平元年代楊敞為丞相封二千戸病死絶無後國除扶陽韋賢家在魯通詩禮尚書為博士授魯大儒入侍中為昭帝師遷為光禄大夫大鴻臚長信少府以為人主師本始三年代蔡義為丞相封扶陽侯千八百戸為丞相五歲多恩不習吏事免相就第病死子𤣥成代立為太常坐祠廟騎奪爵為闗内侯平陵范明友家在隴西以家世習外國事使䕶西羌事昭帝拜為度遼將軍擊烏桓功侯二千戸取霍光女為妻地節四年與諸霍子禹等謀反族滅國除營平趙充國以隴西騎士從軍得官侍中事武帝數將兵擊匈奴有功為䕶軍都尉中事昭帝昭帝崩議立宣帝決疑定䇿以安宗廟功侯封二千五百戸陽城田延年以軍吏事昭帝發覺上官桀謀反事後留遲不得封為大司農本造廢昌邑王議立宣帝決疑定䇿以安宗廟功侯二千七百戸逢昭帝崩方上事竝急因以盜都内錢三千萬發覺自殺國除平丘王遷家在衞為尚書郎習刀筆之文侍中事昭帝帝崩立宣帝決疑定䇿以安宗廟功侯二千戸為光禄大夫秩中二千石坐受諸侯王金錢財漏洩中事誅死國除樂成霍山山者大將軍光兄子也光未死時上書曰臣兄驃騎將軍去病從軍有功病死賜諡景桓侯絶無後臣光願以所封東武陽邑三千五百戸分與山天子許之拜山為侯後坐謀反族滅國除冠軍霍雲以大將軍兄驃騎將軍適孫為侯地節三年天子下詔書曰驃騎將軍去病擊匈奴有功封為冠軍侯薨卒子侯代立病死無後春秋之義善善及子孫其以邑三千戸封雲為冠軍侯後坐謀反族滅國除平恩許廣漢家昌邑坐事下蠶室獨有一女嫁之宣帝未立時素與廣漢出入相通卜者言當大貴以故廣漢施恩甚厚地節三年封為侯邑三千戸病死無後國除昌水田廣明故郎為司馬稍遷至南郡都尉淮陽太守鴻臚左馮翊昭帝崩議廢昌邑王立宣帝決疑定䇿以安宗廟本始三年封為侯邑二千三百戸為御史大夫後為祁連將軍擊匈奴軍不至質當死自殺國除高平魏相家在濟隂少學易為府卒史以賢良舉為茂陵令遷河南太守坐賊殺不辜繫獄當死㑹赦免為庶人有詔守茂陵令為揚州刺史入為諫議大夫復為河南太守遷為大司農御史大夫地節三年譛毁韋賢代為丞相封千五百戸病死長子賓代立坐祠廟失侯博望許中翁名舜以平恩侯許廣漢弟封為侯邑二千戸亦故有私恩為長樂衞尉死子延年代立樂平許翁孫以平恩侯許廣漢少弟故為侯封二千戸拜為彊弩將軍擊破西𦍑還更拜為大司馬光禄勲亦故有私恩故得封嗜酒好色以早病死子湯代立將陵史子回名曽以宣帝大母家封為侯二千六百戸與平臺侯昆弟行也子回妻宜君故成王孫嫉妬絞殺侍婢四十餘人盜㫁婦人初産子臂膝以為媚道為人所上書言論棄市子回以外家故不失侯平臺史子叔名𤣥以宣帝大母家封為侯二千五百戸衞太子時史氏内一女於太子嫁一女魯王今見魯王亦史氏外孫也外家有親以故貴數得賞賜樂陵史子長名髙以宣帝大母家貴侍中重厚忠信以發覺霍氏謀反事封三千五百戸博城張章父故潁川人為長安亭長失官之北闕上書寄宿霍氏第舍卧馬櫪間夜聞養馬奴相與語言諸霍氏子孫欲謀反狀因上書告反為侯封三千戸都城金安上先故匈奴以發覺故大將軍霍光子禹等謀反事有功封侯二千八百戸安上者奉車都尉秺侯從羣子行謹善退讓以自持欲傳功德於子孫平通楊惲家在華隂故丞相楊敞少子任為郎好士自喜知人居衆人中常與人顔色以故髙昌侯董忠引與屏語言霍氏謀反狀共發覺告反侯二千戸為光禄勲到五鳯四年作為妖言大逆罪腰斬國除髙昌董忠父故潁川陽翟人以習書詣長安忠有材力能騎射用短兵給事期門與張章相習知章告語忠霍禹謀反狀忠以語常侍騎郎楊惲共發覺告反侯三千戸今為梟騎都尉侍中坐祠宗廟乘小車奪百戸爰戚趙成用發覺楚國事侯二千三百戸地節元年楚王與廣陵王謀反成發覺反狀天子推恩廣德義下詔書曰無治廣陵王廣陵王不變更後復坐祝詛滅國自殺國除今帝復立子為廣陵王酇地節三年天子下詔書曰朕聞漢之興相國蕭何功第一今絶無後朕甚憐之其以邑三千戸封蕭何𤣥孫建世為酇侯平昌王長君名無故家在趙國常山廣望邑人也衞太子時嫁太子家為太子男史皇孫為配生子男絶不聞聲問行且四十餘歳至今元康元年中詔徴立以為侯封五千戸宣帝舅父也樂昌王稚君名武家在趙國常山廣望邑人也以宣帝舅父外家封為侯邑五千戸平昌侯王長君弟也卭成王奉光家在房陵以女立為宣帝皇后故封千五百戸言奉光初生時夜見光其上傳聞者以為當貴云後果以女故為侯安逺鄭吉家在㑹稽以卒伍起從軍為郎使䕶將弛刑士田渠棃㑹匈奴單于死國亂相攻日逐王將衆來降漢先使語吉吉將吏卒數百人往迎之衆頗有欲還者因斬殺其渠率遂與俱入漢以軍功侯二千戸博陽邴吉家在魯本以治獄為御史屬給事大將軍幕府常施舊恩宣帝遷為御史大夫封侯二千戸神爵二年代魏相為丞相立五歲病死子翁孟代立為將軍侍中甘露元年坐祠宗廟不乘大車而騎至廟門有罪奪爵為闗内侯建成黄霸家在陽夏以役使徙雲陽以亷吏為河内守丞遷為廷尉監行丞相長史事坐見知夏侯勝非詔書大不敬罪久繫獄三歲從勝學尚書㑹故以賢良舉為揚州刺史潁川太守善化男女異路耕者讓畔賜黄金百斤秩中二千石居潁川入為太子太傅遷御史大夫五鳯三年代邴吉為丞相封千八百戸西平于定國家在東海本以治獄給事為廷尉史稍遷御史中丞上書諌昌邑王遷為光禄大夫為廷尉乃師受春秋變道行化謹厚愛人遷為御史大夫代黄霸為丞相陽平王稚君名傑表索隠曰漢名禁家在魏郡故丞相史女為太子妃太子立為帝女為皇后故侯千二百戸初元以來方盛貴用事游宦求官於京師者多得其力未聞其有知畧廣宣於國家也漢魏六朝百三家集巻五
