body:
  text: 漢魏六朝百三家集巻五漢褚少孫集題詞張晏云褚先生潁川人仕元成間韋稜云褚顗家傳褚少孫梁相褚大弟之孫宣帝時為博士寓居於沛事大儒王式故號為先生續太史公書而先生自述亦云幸得以經術為郎其記外戚問之鍾離生記梁孝王問之宫殿中老郎吏編列三王封䇿取之長老好故事者慎哉所聞與子長稱董生壺大夫何以異史記中孝武本紀禮樂二書皆傳為褚生所補論者謂武帝好功利多制作史臣備集行事其可觀感必有大於秦皇諸紀者乃僅取封禪書充之闕如自在禮書本荀卿樂書本樂記載太史公語無多本朝有司何遽失傳盡繇褚生才薄折足匪任然讀其所記景帝王后武帝尹邢兩夫人與梁王田仁任安諸逸事及滑稽六章日者龜䇿二傳錯綜爾雅狀形貌綴古語竟有似太史公者設令兩人生同時官同舍子長主書褚生為副繙閱金匱成就必廣又令各譔一史如淮南八公之徒聞見角立相視而笑未必不為莊周之許惠施也予為採列獨出使世知龍門而下扶風而上尚有褚生以當史家小山云目録陳涉世家論外戚世家王太后衞子夫尹婕妤鉤弋夫人梁孝王世家三王世家張丞相列傳韋賢魏相丙吉黄霸韋𤣥成匡衡田叔列傳田仁任安平津侯列傳滑稽列傳東方朔東郭先生王先生西門豹日者列傳龜䇿列傳三代世表答張夫子問建元以來侯年表修記孝昭以來功臣侯者漢魏六朝百三家集巻五目録欽定四庫全書漢魏六朝百三家集巻五明張溥輯漢褚少孫集陳涉世家褚先生曰地形險阻所以為固也兵革刑法所以為治也猶未足恃也夫先王以仁義為本而以固塞文法為枝葉豈不然哉外戚世家褚先生曰臣為郎時問習漢家故事者鍾離生曰王太后在民間時所生子女者父為金王孫王孫已死景帝崩後武帝己立王太后獨在而韓王孫名嫣素得幸武帝承間白言太后有女在長陵也武帝曰何不蚤言乃使使往先視之在其家武帝乃自往迎取之蹕道先驅旄騎出横城門乘輿馳至長陵當小市西入里里門閉暴開門乘輿直入此里通至金氏門外止使武騎圍其宅為其亡走身自往取不得也即使左右羣臣入呼求之家人驚恐女亡匿内中牀下扶持出門令拜謁武帝下車泣曰嚄大姊何藏之深也詔副車載之迴車馳還而直入長樂宫行詔門著引籍通到謁太后太后曰帝倦矣何從來帝曰今者至長陵得臣姊與俱來顧曰謁太后太后曰女某邪曰是也太后為下泣女亦伏地泣武帝奉酒前為壽奉錢千萬奴婢三百人公田百頃甲第以賜姊太后謝曰為帝費焉於是召平陽主南宫主林慮主三人俱來謁見姊因號曰修成君有子男一人女一人男號為修成子仲女為諸侯王王后此二子非劉氏以故太后憐之修成子仲驕恣陵折吏民皆患苦之衞子夫立為皇后后弟衞青字仲卿以大將軍封為長平侯四子長子伉為侯世子侯世子常侍中貴幸其三弟皆封為侯各千三百戸一曰隂安侯二曰發干侯三曰宜春侯貴震天下天下歌之曰生男無喜生女無怒獨不見衞子夫霸天下是時平陽主寡居當用列侯尚主主與左右議長安中列侯可為夫者皆言大將軍可主笑曰此出吾家常使令騎從我出入耳奈何用為夫乎左右侍御者曰今大將軍姊為皇后三子為侯富貴振動天下主何以易之乎於是主乃許之言之皇后令白之武帝乃詔衞將軍尚平陽公主焉褚先生曰丈夫龍變傳曰蛇化為龍不變其文家化為國不變其姓丈夫當時富貴百惡滅除光耀榮華貧賤之時何足累之哉武帝時幸夫人尹婕妤邢夫人號娙娥衆人謂之娙何娙何秩比中二千石容華秩比二千石婕妤秩比列侯常從婕妤遷為皇后尹夫人與邢夫人同時竝幸有詔不得相見尹夫人自請武帝願望見邢夫人帝許之即令他夫人飾從御者數十人為邢夫人來前尹夫人前見之曰此非邢夫人身也帝曰何以言之對曰視其身貌形狀不足以當人主矣於是帝乃詔使邢夫人衣故衣獨身來前尹夫人望見之曰此真是也於是乃低頭俛而泣自痛其不如也諺曰美女入室惡女之仇褚先生曰浴不必江海要之去垢馬不必騏驥要之善走士不必賢世要之知道女不必貴種要之貞好傳曰女無美惡入室見妬士無賢不肖入朝見嫉美女者惡女之仇豈不然哉鈎弋夫人姓趙氏河間人也得幸武帝生子一人昭帝是也武帝年七十乃生昭帝昭帝立時年五嵗耳衞太子廢後未復立太子而燕王旦上書願歸國入宿衞武帝怒立斬其使者於北闕上居甘泉宫召畫工圖畫周公負成王也於是左右羣臣知武帝意欲立少子也後數日帝譴責鈎弋夫人夫人脱簪珥叩頭帝曰引持去送掖庭獄夫人還顧帝曰趣行女不得活夫人死雲陽宫時暴風揚塵百姓感傷使者夜持棺往葬之封識其處其後帝閒居問左右曰人言云何左右對曰人言且立其子何去其母乎帝曰然是非兒曹愚人所知也往古國家所以亂也由主少母壯也女主獨居驕蹇淫亂自恣莫能禁也女不聞吕后耶故諸為武帝生子者無男女其母無不譴死豈可謂非賢聖哉昭然逺見為後世計慮固非淺聞愚儒之所及也諡為武豈虛哉梁孝王世家褚先生曰臣為郎時聞之於宫殿中老郎吏好事者稱道之也竊以為令梁孝王怨望欲為不善者事從中生今太后女主也以愛少子故欲令梁王為太子大臣不時正言其不可狀阿意治小私説意以受賞賜非忠臣也齊如魏其侯竇嬰之正言也何以有後禍景帝與王燕見侍太后飲景帝曰千秋萬嵗之後傳王太后喜説竇嬰在前據地言曰漢法之約傳子適孫今帝何以得傳弟擅亂髙帝約乎於是景帝黙然無聲太后意不説故故成王與小弱弟立樹下取一桐葉以與之曰吾用封汝周公聞之進見曰天王封弟甚善成王曰吾直與戲耳周公曰人主無過舉不當有戲言言之必行之於是乃封小弟以應縣是後成王没齒不敢有戲言言必行之孝經曰非法不言非道不行此聖人之法言也今主上不宜出好言於梁王梁王上有太后之重驕蹇日久數聞景帝好言千秋萬世之後傳王而實不行又諸侯王朝見天子漢法凡當四見耳始到入小見到正月朔旦奉皮薦璧玉賀正月法見後三日為王置酒賜金錢財物後二日復入小見辭去凡留長安不過二十日小見者燕見於禁門内飲於省中非士人所得入也今梁王西朝因留且半嵗入與人主同輦出與同車示風以大言而實不與令出怨言謀畔逆乃隨而憂之不亦逺乎非大賢人不知退讓今漢之儀法朝見賀正月者常一王與四侯俱朝見十餘嵗一至今梁王常比年入朝見久留鄙語曰驕子不孝非惡言也故諸侯王當為置良師傅相忠言之士如汲黯韓長孺等敢直言極諫安得有患害葢聞梁王西入朝謁竇太后燕見與景帝俱侍坐於太后前語言私説太后謂帝曰吾聞殷道親親周道尊尊其義一也安車大駕用梁孝王為寄景帝跪席舉身曰諾罷酒出帝召袁盎諸大臣通經術者曰太后言如是何謂也皆對曰太后意欲立梁王為帝太子帝問其狀袁盎等曰殷道親親者立弟周道尊尊者立子殷道質質者法天親其所親故立弟周道文文者法地尊者敬也敬其本始故立長子周道太子死立適孫殷道太子死立其弟帝曰於公何如皆對曰方今漢家法周周道不得立弟當立子故春秋所以非宋宣公宋宣公死不立子而與弟弟受國死復反之與兄之子弟之子爭之以為我當代父後即刺殺兄子以故國亂禍不絶故春秋曰君子大居正宋之禍宣公為之臣請見太后白之袁盎等入見太后太后言欲立梁王梁王即終欲誰立太后曰吾復立帝子袁盎等以宋宣公不立正生禍禍亂後五世不絶小不忍害大義狀報太后太后乃解説即使梁王歸就國而梁王聞其議出於袁盎諸大臣所怨望使人來殺袁盎袁盎顧之曰我所謂袁將軍者也公得毋誤乎刺者曰是矣刺之置其劒劒著身視其劒新治問長安中削厲工工曰梁郎某子來治此劒以此知而發覺之發使者捕逐之獨梁王所欲殺大臣十餘人文吏窮本之謀反端頗見太后不食日夜泣不止景帝甚憂之問公卿大臣大臣以為遣經術吏往治之乃可解於是遣田叔吕季主往治之此二人皆通經術知大禮來還至霸昌廐取火悉燒梁之反辭但空手來對景帝景帝曰何如對曰言梁王不知也造為之者獨其幸臣羊勝公孫詭之屬為之耳謹以伏誅死梁王無恙也景帝喜説曰急趨謁太后太后聞之立起坐飡氣平復故曰不通經術知古今之大禮不可以為三公及左右近臣少見之人如從管中闚天也三王世家褚先生曰臣幸得以文學為侍郎好覽觀太史公之列傳列傳中稱三王世家文辭可觀求其世家終不能得竊從長老好故事者取其封䇿書編列其事而傳之令後世得觀賢主之指意葢聞孝武帝之時同日而俱拜三子為王封一子於齊一子於廣陵一子於燕各因子才力智能及土地之剛柔人民之輕重為作䇿以申戒之謂王世為漢藩輔保國治民可不敬與王其戒之夫賢主所作固非淺聞者所能知非博聞彊記君子者所不能究竟其意至其次序分絶文字之上下簡之參差長短皆有意人莫之能知謹論次其真草詔書編于左方令覽者自通其意而解説之王夫人者趙人也與衞夫人竝幸武帝而生子閎閎且立為王時其母病武帝自臨問之曰子當為王欲安所置之王夫人曰陛下在妾又何等可言者帝曰雖然意所欲欲於何所王之王夫人曰願置之雒陽武帝曰雒陽有武庫敖倉天下衝阨漢國之大都也先帝以來無子王於雒陽者去雒陽餘盡可王夫人不應武帝曰關東之國無大於齊者齊東負海而城郭大古時獨臨菑中十萬戸天下膏腴地莫盛於齊者矣王夫人以手擊頭謝曰幸甚王夫人死而帝痛之使使者拜之曰皇帝謹使使太中大夫明奉璧一賜夫人為齊王太后子閎王齊年少無有子立不幸早死國絶為郡天下稱齊不宜王云所謂受此土者諸侯王始封者必受土於天子之社歸立之以為國社以嵗時祠之春秋大傳曰天子之國有泰社東方青南方赤西方白北方黑上方黄故將封於東方者取青土封於南方者取赤土封於西方者取白土封於北方者取黑土封於上方者取黄土各取其色物裹以白茅封以為社此始受封於天子者也此之為主土主土者立社而奉之也朕承祖考祖者先也考者父也維稽古維者度也念也稽者當也當順古之道也齊地多變詐不習於禮義故戒之曰恭朕之詔唯命不可為常人之好德能明顯光不圖於義使君子怠慢悉若心信執其中天禄長終有過不善乃凶于而國而害于若身齊王之國左右維持以禮義不幸中年早夭然全身無過如其䇿意傳曰青采出於藍而質青於藍者教使然也逺哉賢主昭然獨見誡齊王以慎内誡燕王以無作怨無俷德誡廣陵王以慎外無作威與福夫廣陵在吳越之地其民精而輕故誡之曰江湖之間其人輕心揚州葆疆三代之時迫要使從中國俗服不大及以政教以意御之而已無侗好佚無邇宵人維法是則無長好佚樂馳騁弋獵淫康而近小人常念法度則無羞辱矣三江五湖有魚鹽之利銅山之富天下所仰故誡之曰臣不作福者勿使行財幣厚賞賜以立聲譽為四方所歸也又曰臣不作威者勿使因輕以倍義也㑹孝武帝崩孝昭帝初立先朝廣陵王胥厚賞賜金錢財幣直三千餘萬益地百里邑萬戸㑹昭帝崩宣帝初立縁恩行義以本始元年中裂漢地盡以封廣陵王胥四子一子為朝陽侯一子為平曲侯一子為南利侯最愛少子𢎞立以為髙密王其後胥果作威福通楚王使者楚王宣言曰我先元王髙帝少弟也封三十二城今地邑益少我欲與廣陵王共發兵云立廣陵王為上我復王楚三十二城如元王時事發覺公卿有司請行罰誅天子以骨肉之故不忍致法於胥下詔書無治廣陵王獨誅首惡楚王傳曰蓬生麻中不扶自直白沙在泥中與之皆黑者土地教化使之然也其後胥復祝詛謀反自殺國除燕土墝埆北迫匈奴其人民勇而少慮故誡之曰葷粥氏無有孝行而禽獸心以竊盗侵犯邊民朕詔將軍往征其罪萬夫長千夫長三十有二君皆來降旗奔師葷粥徙域逺處北州以安矣悉若心無作怨者勿使從俗以怨望也無俷德者勿使上背德也無廢備者無乏武備常備匈奴也非教士不得從徴者言非習禮義不得在於側也㑹武帝年老長而太子不幸薨未有所立而旦使來上書請身入宿衞於長安孝武見其書擊地怒曰生子當置之齊魯禮義之鄉乃置之燕趙果有爭心不讓之端見矣於是使使即斬其使者於闕下㑹武帝崩昭帝初立旦果作怨而望大臣自以長子當立與齊王子劉澤等謀為叛逆出言曰我安得弟在者今立者乃大將軍子也欲發兵事發覺當誅昭帝縁恩寛忍抑案不揚公卿使大臣請遣宗正與太中大夫公戸滿意御史二人偕往使燕風喻之到燕各異日更見責王宗正者主宗室諸劉屬籍先見王為列陳道昭帝實武帝子狀侍御史乃復見王責之以正法問王欲發兵罪名明白當坐之漢家有正法王犯纎介小罪過即行法直斷耳安能寛王驚動以文法王意益下心恐公戸滿意習於經術最後見王稱引古今通義國家大禮文章爾雅謂王曰古者天子必内有異姓大夫所以正骨肉也外有同姓大夫所以正異族也周公輔成王誅其兩弟故治武帝在時尚能寛王今昭帝始立年幼富於春秋未臨政委任大臣古者誅罰不阿親戚故天下治方今大臣輔政奉法直行無敢所阿恐不能寛王王可自謹無自令身死國滅為天下笑於是燕王旦乃恐懼服罪叩頭謝過大臣欲和合骨肉難傷之以法其後旦復與左將軍上官桀等謀反宣言曰我次太子太子不在我當立大臣共抑我云云大將軍光輔政與公卿大臣議曰燕王旦不改過悔正行惡不變於是脩法直㫁行罰誅旦自殺國除如其䇿指有司請誅旦妻子孝昭以骨肉之親不忍致法寛赦旦妻子免為庶人傳曰蘭根與白芷漸之􅎵中君子不近庶人不服者所以漸然也宣帝初立推恩宣德以本始元年中盡復封燕王旦兩子一子為安定侯立燕故太子建為廣陽王以奉燕王祭祀張丞相列傳孝武時丞相多甚不記莫録其行起居狀畧且紀征和以來有車丞相長陵人也卒而有韋丞相代韋丞相賢者魯人也以讀書術為吏至大鴻臚有相工相之當至丞相有男四人使相工相之至第二子其名𤣥成相工曰此子貴當封韋丞相言曰我即為丞相有長子是安從得之後竟為丞相病死而長子有罪論不得嗣而立𤣥成𤣥成時佯狂不肯立竟立之有讓國之名後坐騎至廟不敬有詔奪爵一級為闗内侯失列侯得食其故國邑韋丞相卒有魏丞相代魏丞相相者濟隂人也以文吏至丞相其人好武皆令諸吏帶劒帶劒前奏事或有不帶劒者當入奏事至乃借劒而敢入奏事其時京兆尹趙君丞相奏以免罪使人執魏丞相欲求脱罪而不聽復使人脅恐魏丞相以夫人賊殺侍婢事而私獨奏請驗之發吏卒至丞相舍捕奴婢笞擊問之實不以兵刃殺也而丞相司直繁君奏京兆尹趙君迫脅丞相誣以夫人賊殺婢發吏卒圍捕丞相舍不道又得擅屏騎士事趙京兆坐要斬又有使椽陳平等劾中尚書疑以獨擅刼事而坐之大不敬長史以下皆坐死或下蠶室而魏丞相竟以丞相病死子嗣後坐騎至廟不敬有詔奪爵一級為闗内侯失列侯得食其故國邑魏丞相卒以御史大夫邴吉代邴丞相吉者魯國人也以讀書好法令至御史大夫孝宣帝時以有舊故封為列侯而因為丞相明於事有大智後世稱之以丞相病死子顯嗣後坐騎至廟不敬有詔奪爵一級失列侯得食故國邑顯為吏至太僕坐官耗亂身及子男有姦贓免為庶人邴丞相卒黄丞相代長安中有善相工田文者與韋丞相魏丞相邴丞相微賤時㑹於客家田文言曰今此三君者皆丞相也其後三人竟更相代為丞相何見之明也黄丞相霸者淮陽人也以讀書為吏至潁川太守治潁川以禮義條教喻告化之犯法者風曉令自殺化大行名聲聞孝宣帝下制曰潁川太守霸以宣布詔令治民道不拾遺男女異路獄中無重囚賜爵闗内侯黄金百斤徴為京兆尹而至丞相復以禮義為治以丞相病死子嗣後為列侯黄丞相卒以御史大夫于定國代于丞相已有廷尉傳在張廷尉語中于丞相去御史大夫韋𤣥成代韋丞相𤣥成者即前韋丞相子也代父後失列侯其人少時好讀書明於詩論語為吏至衞尉徙為太子太傅御史大夫薛君免為御史大夫于丞相乞骸骨免而為丞相因封故邑為扶陽侯數年病死孝元帝親臨喪賜賞甚厚子嗣後其治容容隨世俗浮沉而見謂諂巧而相工本謂之當為侯代父而後失之復自游宦而起至丞相父子俱為丞相世間美之豈不命哉相工其先知之韋丞相卒御史大夫匡衡代丞相匡衡者東海人也好讀書從博士受詩家貧衡傭作以給食飲才下數射䇿不中至九乃中丙科其經以不中科故明習補平原文學卒史數年郡不尊敬御史徴之以補百石屬薦為郎而補博士拜為太子少傅而事孝元帝孝元好詩而遷為光禄勳居殿中為師授教左右而縣官坐其旁聽甚善之日以尊貴御史大夫鄭𢎞坐事免而匡君為御史大夫嵗餘韋丞相死匡君代為丞相封樂安侯以十年之間不出長安城門而至丞相豈非遇時而命也哉深惟士之游宦所以至封侯者微甚然多至御史大夫即去者諸為大夫而丞相次也其心冀幸丞相物故也或乃隂私相毁害欲代之然守之日久不得或為之日少而得之至於封侯真命也夫御史大夫鄭君守之數年不得匡君居之未滿嵗而韋丞相死即代之矣豈可以智巧得哉多有賢聖之才困戹不得者衆甚也田叔列傳褚先生曰臣為郎時聞之曰田仁故與任安相善任安滎陽人也少孤貧困為人將車之長安留求事為小吏未有因縁也因占著名數家於武功武功扶風西界小邑也谷口蜀剗道近山安以為武功小邑無豪易髙也安留代人為求盜亭父後為亭長邑中人民俱出獵任安常為人分麋鹿雉兔部署老小當壯劇易處衆人皆喜曰無傷也任少卿分別平有智畧明日復合㑹㑹者數百人任少卿曰某子甲何為不來乎諸人皆怪其見之疾也其後除為三老舉為親民出為三百石長治民坐上行出游共帳不辦斥免乃為衞將軍舍人與田仁㑹俱為舍人居門下同心相愛此二人家貧無錢用以事將軍家監家監使養惡齧馬兩人同牀卧仁竊言曰不知人哉家監也任安曰將軍尚不知人何乃家監也衞將軍從此兩人過平陽主主家令兩人與騎奴同席而食此二子拔刀列斷席別坐主家皆怪而惡之莫敢呵其後有詔募擇衞將軍舍人以為郎將軍取舍人中富給者令具鞍馬綘衣玉貝劒欲入奏之㑹賢大夫少府趙禹來過衞將軍將軍呼所舉舍人以示趙禹趙禹以次問之十餘人無一人習事有智畧者趙禹曰吾聞之將門之下必有將類傳曰不知其君視其所使不知其子視其所友今有詔舉將軍舍人者欲以觀將軍而能得賢者文武之士也今徒取富人子上之又無智畧如木偶人衣之綺繡耳將奈之何於是趙禹悉召衞將軍舍人百餘人以次問之得田仁任安曰獨此兩人可耳餘無可用者衞將軍見此兩人貧意不平趙禹去謂兩人曰各自具鞍馬新絳衣兩人對曰家貧無用具也將軍怒曰今兩君家自為貧何為出此言鞅鞅如有移德於我者何也將軍不得己上籍以聞有詔召見衞將軍舍人此二人前見詔問能畧相推第也田仁對曰提桴鼓立軍門使士大夫樂死戰鬭仁不及任安任安對曰夫決嫌疑定是非辯治官使百姓無怨心安不及仁也武帝大笑曰善使任安䕶北軍使田仁䕶邊田穀於河上此兩人立名天下其後用任安為益州刺史以田仁為丞相長史田仁上書言天下郡太守多為姦利三河尤甚臣請先刺舉三河三河太守皆内倚中貴人與三公有親屬無所畏憚宜先正三河以警天下姦吏是時河南河内太守皆御史大夫杜父兄子弟也河東太守石丞相子孫也是時石氏九人為二千石方盛貴田仁數上書言之杜大夫及石氏使人謝謂田少卿曰吾非敢有語言也願少卿無相誣汙也仁己刺三河三河太守皆下吏誅死仁還奏事武帝説以仁為能不畏彊禦拜仁為丞相司直威振天下其後逢太子有兵事丞相自將兵使司直主城門司直以為太子骨肉之親父子之間不甚欲近去之諸陵過是時武帝在甘泉使御史大夫暴君下責丞相何為縱太子丞相對言使司直部守城門而開太子上書以聞請捕繫司直司直下吏誅死是時任安為北軍使者䕶軍太子立車北軍南門外召任安與節令發兵安拜受節入閉門不出武帝聞之以為任安為佯邪不傅事何也任安笞辱北軍錢官小吏小吏上書言之以為受太子節言幸與我其鮮好者書上聞武帝曰是老吏也見兵事起欲坐觀成敗見勝者欲合從之有兩心安有當死之罪甚衆吾常活之今懷詐有不忠之心下安吏誅死夫月滿則虧物盛則衰天地之常也知進而不知退久乘富貴禍積為祟故范蠡之去越辭不受官位名傳後世萬嵗不忘豈可及哉後進者慎戒之平津侯列傳太皇太后詔大司徒大司空葢聞治國之道富民為始富民之要在於節儉孝經曰安上治民莫善於禮禮與奢也寜儉昔者管仲相齊桓霸諸侯有九合一匡之功而仲尼謂之不知禮以其奢泰侈擬於君故也夏禹卑宫室惡衣服後聖不循由此言之始之盛也德優矣莫高於儉儉化俗民則尊卑之序得而骨肉之恩親爭訟之原息斯乃家給人足刑錯之本也歟可不務哉夫三公者百寮之率萬民之表也未有樹直表而得曲影者也孔子不云乎子率以正孰敢不正舉善而教不能則勸維漢興以來股肱宰臣身行儉約輕財重義較然著明未有若故丞相平津侯公孫𢎞者也位在丞相而為布被脱粟之飯不過一肉故人所善賓客皆分奉禄以給之無有所餘誠内自克約而外從制汲黯詰之乃聞于朝此可謂減於制度而可施行者也德優則行否則止與内奢泰而外為詭服以釣虚譽者殊科以病乞骸骨孝武皇帝即制曰賞有功襃有德善善惡惡君宜知之其省思慮存精神輔以醫藥賜告治病牛酒雜帛居數月有瘳視事至元狩二年竟以善終于相位夫知臣莫若君此其效也𢎞子度嗣爵後為山陽太守坐法失侯夫表德章義所以率俗厲化聖王之制不易之道也其賜𢎞後子孫之次當為後者爵闗内侯食邑三百戸徴詣公車上名尚書朕親臨拜焉滑稽列傳褚先生曰臣幸得以經術為郎而好讀外家傳語竊不遜讓復作故事滑稽之語六章編之於左可以覽觀揚意以示後世好事者讀之以游心駭耳以附益上方太史公之三章武帝時有所幸倡郭舍人者發言陳辭雖不合大道然令人主和説武帝少時東武侯母常養帝案東武縣名侯乳母姓也帝壯時號之曰大乳母率一月再朝朝奏入有詔使幸臣馬游卿以帛五十匹賜乳母又奉飲糒飱養乳母乳母上書曰某所有公田願得假倩之帝曰乳母欲得之乎以賜乳母乳母所言未嘗不聽有詔得令乳母乘車行馳道中當此之時公卿大臣皆敬重乳母乳母家子孫奴從者横暴長安中當道掣頓人車馬奪人衣服聞於中不忍致之法有司請徙乳母家室處之於邊奏可乳母當入至前面見辭乳母先見郭舍人為下泣舍人曰即入見辭去疾步數還顧乳母如其言謝去疾步數還顧郭舍人疾言罵之曰咄老女子何不疾行陛下已壯矣寜尚須汝乳而活邪尚何還顧於是人主憐焉悲之乃下詔止無徙乳母罰謫譖之者武帝時齊人有東方生名朔仲長統云遷為滑稽傳叙優旃事不稱東方朔非也朔之行事豈直旃孟之比哉而桓譚亦以遷内為是又非也以好古傳書愛經術多所博觀外家之語朔初入長安至公車上書凡用三千奏牘公車令兩人共持舉其書僅然能勝之人主從上方讀之止輒乙其處讀之二月乃盡詔拜以為郎常在側侍中數召至前談語人主未嘗不説也時詔賜之食於前飯己盡懷其餘肉持去衣盡汙數賜縑帛擔掲而去徒用所賜錢帛取少婦於長安中好女率取婦一嵗所者即棄去更取婦所賜錢財盡索之於女子人主左右諸郎半呼之狂人人主聞之曰令朔在事無為是行者若等安能及之哉朔任其子為郎又為侍謁者常持節出使朔行殿中郎謂之曰人皆以先生為狂朔曰如朔等所謂避世於朝廷間者也古之人乃避世於深山中時坐席中酒酣據地歌曰陸沈於俗避世金馬門宫殿中可以避世全身何必深山之中蒿廬之下金馬門者宦署門也門傍有銅馬故謂之曰金馬門時㑹聚宫下博士諸先生與論議共難之曰蘇秦張儀一當萬乘之主而都卿相之位澤及後世今子大夫修先王之術慕聖人之義諷誦詩書百家之言不可勝數著於竹帛自以為海内無雙即可謂博聞辯智矣然悉力盡忠以事聖帝曠日持久積數十年官不過侍郎位不過執㦸意者尚有遺行邪其故何也東方生曰是固非子之所能備也彼一時也此一時也豈可同哉夫張儀蘇秦之時周室大壞諸侯不朝力政爭權相禽以兵幷為十二國未有雌雄得士者彊失士者亡故説聽行通身處尊位澤及後世子孫長榮今非然也聖帝在上德流天下諸侯賓服威振四夷連四海之外以為席安於覆盂天下平均合為一家動發舉事猶如運之掌中賢與不肖何以異哉方今以天下之大士民之衆竭精馳説竝進輻湊者不可勝數悉力慕義困於衣食或失門戸使張儀蘇秦與僕竝生於今之世曽不能得掌故安敢望常侍侍郎乎傳曰天下無害菑雖有聖人無所施其才上下和同雖有賢者無所立功故曰時異則事異雖然安可以不務修身乎詩曰鼓鐘于宫聲聞于外鶴鳴九臯聲聞于天茍能修身何患不榮太公躬行仁義七十二年逢文王得行其説封於齊七百嵗而不絶此士之所以日夜孜孜修學行道不敢止也今世之處士時雖不用崛然獨立塊然獨處上觀許由下察接輿䇿同范蠡忠合子胥天下和平與義相扶寡偶少徒固有常也子何疑於余哉於是諸先生默然無以應也建章宫後閤重櫟中有物出焉其狀似麋以聞武帝往臨視之問左右羣臣習事通經術者莫能知詔東方朔視之朔曰臣知之願賜美酒粱飯大飱臣臣乃言詔曰可已飱又曰某所有公田魚池蒲葦數頃陛下以賜臣臣朔乃言詔曰可於是朔乃肯言曰所謂騶牙者也逺方當來歸義而騶牙先見其齒前後若一齊等無牙故謂之騶牙其後一嵗所匈奴混邪王果將十萬衆來降漢乃復賜東方生錢財甚多至老朔且死時諫曰詩云營營青蠅止于蕃愷悌君子無信讒言讒言㒺極交亂四國願陛下逺巧佞退讒言帝曰今顧東方朔多善言怪之居無幾何朔果病死傳曰鳥之將死其鳴也哀人之將死其言也善此之謂也武帝時大將軍衞青者衞后兄也封為長平侯從軍擊匈奴至余吾水上而還斬首捕虜有功來歸詔賜金千斤將軍出宫門齊人東郭先生以方士待詔公車當道遮衞將軍車拜謁曰願白事將軍止車前東郭先生旁車言曰王夫人新得幸於上家貧今將軍得金千斤誠以其半賜王夫人之親人主聞之必喜此所謂奇䇿便計也衞將軍謝之曰先生幸告之以便計請奉教於是衞將軍乃以五百金為王夫人之親壽王夫人以聞武帝帝曰大將軍不知為此問之安所受計䇿對曰受之待詔者東郭先生詔召東郭先生拜以為郡都尉東郭先生久待詔公車貧困饑寒衣敝履不完行雪中履有上無下足盡踐地道中人笑之東郭先生應之曰誰能履行雪中令人視之其上履也其履下處乃似人足者乎及其拜為二千石佩青緺音𤓰一音螺青綬出宫門行謝主人故所以同官待詔者等比祖道於都門外榮華道路立名當世此所謂衣褐懷寶者也當其貧困時人莫省視至其貴也乃爭附之諺曰相馬失之瘦相士失之貧其此之謂邪王夫人病甚人主至自往問之曰子當為王欲安所置之對曰願居洛陽人主曰不可洛陽有武庫敖倉當闗口天下咽喉自先帝以來傳不為置王然闗東國莫大於齊可以為齊王王夫人以手擊頭呼幸甚王夫人死號曰齊王太后薨昔者齊王使淳于髠獻鵠於楚出邑門道飛其鵠徒揭空籠造詐成辭往見楚王曰齊王使臣來獻鵠過於水上不忍鵠之渴出而飲之去我飛亡吾欲刺腹絞頸而死恐人之議吾王以鳥獸之故令士自傷殺也鵠毛物多相類者吾欲買而代之是不信而欺吾王也欲赴佗國奔亡痛吾兩主使不通故來服過叩頭受罪大王楚王曰善齊王有信士若此哉厚賜之財備鵠在也武帝時徴北海太守詣行在所漢書宣帝徵渤海太守龔遂非武帝時此褚先生記謬耳有文學卒史王先生者自請與太守俱吾有益於君君許之諸府掾功曹白云王先生嗜酒多言少實恐不可與俱太守曰先生意欲行不可逆遂與俱行至宫下待詔宫府門王先生徒懷錢沽酒與衞卒僕射飲日醉不視其太守太守入跪拜王先生謂戸郎曰幸為我呼吾君至門内遥語戸郎為呼太守太守來望見王先生王先生曰天子即問君何以治北海令無盜賊君對曰何哉對曰選擇賢材各任之以其能賞異等罰不肖王先生曰對如是是自譽自伐功不可也願君對言非臣之力盡陛下神靈威武所變化也太守曰諾召入至于殿下有詔問之曰何以治北海令盜賊不起叩頭對言非臣之力盡陛下神靈威武之所變化也武帝大笑曰於呼安得長者之語而稱之安所受之對曰受之文學卒史帝曰今安在對曰在宫府門外有詔召拜王先生為水衡丞以北海太守為水衡都尉傳曰美言可以市尊行可以加人君子相送以言小人相送以財魏文侯時西門豹為鄴令豹往到鄴㑹長老問之民所疾苦長老曰苦為河伯娶婦以故貧豹問其故對曰鄴三老廷掾常嵗賦斂百姓收取其錢得數百萬用其二三十萬為河伯娶婦與祝巫共分其餘錢持歸當其時巫行視人家女好者云是當為河伯婦即娉取洗沐之為治新繪綺縠衣閒居齋戒為治齋宫河上張緹綘帷女居其中為具牛酒飯食行十餘日共粉飾之如嫁女床席令女居其上浮之河中始浮行數十里乃没其人家有好女者恐大巫祝為河伯取之以故多持女逺逃亡以故城中益空無人又困貧所從來久逺矣民人俗語曰即不為河伯娶婦水來漂没溺其人民云西門豹曰至為河伯娶婦時願三老巫祝父老送女河上幸來告語之吾亦往送女皆曰諾至其時西門豹往㑹之河上三老官屬豪長者里父老皆㑹以人民往觀之者三二千人其巫老女子也已年七十從弟子女十人所皆衣繒單衣立大巫後西門豹曰呼河伯婦來視其好醜即將女出帷中來至前豹視之顧謂三老巫祝父老曰是女子不好煩大巫嫗為入報河伯得更求好女後日送之即使吏卒共抱大巫嫗投之河中有頃曰巫嫗何久也弟子趣之復以弟子一人投河中有頃曰弟子何久也復使一人趣之復投一弟子河中凡投三弟子西門豹曰巫嫗弟子是女子也不能白事煩三老為入白之復投三老河中西門豹簪筆磬折嚮河立待良久長老吏傍觀者皆驚恐西門豹顧曰巫嫗三老不來還奈之何欲復使廷掾與豪長者一人入趣之皆叩頭叩頭且破額血流地色如死灰西門豹曰諾且留待之須臾須臾豹曰廷掾起矣狀河伯留客之久若皆罷去歸矣鄴吏民大驚恐從是以後不敢復言為河伯娶婦西門豹即發民鑿十二渠引河水灌民田田皆溉當其時民治渠少煩苦不欲也豹曰民可以樂成不可與慮始今父老子弟雖患苦我然百嵗後期令父老子孫思我言至今皆得水利民人以給足富十二渠經絶馳道到漢之立而長吏以為十二渠橋絶馳道相比近不可欲合渠水且至馳道合三渠為一橋鄴民人父老不肯聽長吏以為西門君所為也賢君之法式不可更也長吏終聽置之故西門豹為鄴令名聞天下澤流後世無絶己時幾可謂非賢大夫哉傳曰子産治鄭民不能欺子賤治單父民不忍欺西門豹治鄴民不敢欺三子之才能誰最賢哉辯治者當能別之日者列傳自古受命而王王者之興何嘗不以卜筮決於天命哉其於周尤甚及秦可見代王之入任於卜者太卜之起由漢興而有司馬季主者楚人也卜於長安東市宋忠為中大夫賈誼為博士同日俱出洗沐相從論議誦易先王聖人之道術究徧人情相視而歎賈誼曰吾聞古之聖人不居朝廷必在卜醫之中今吾已見三公九卿朝士大夫皆可知矣試之卜數中以觀采二人即同輿而之市游於卜肆中天新雨道少人司馬季主間坐弟子三四人侍方辯天地之道日月之運隂陽吉凶之本二大夫再拜謁司馬季主視其狀貌如類有知者即禮之使弟子延之坐坐定司馬季主復理前語分別天地之終始日月星辰之紀差次仁義之際列吉凶之符語數千言莫不順理宋忠賈誼瞿然而悟獵纓正襟危坐曰吾望先生之狀聽先生之辭小子竊觀於世未嘗見也今何居之卑何行之汙司馬季主捧腹大笑曰觀大夫類有道術者今何言之陋也何辭之野也今夫子所賢者何也所髙者誰也今何以卑汙長者二君曰尊官厚禄世之所髙也賢才處之今所處非其地故謂之卑言不信行不驗取不當故謂之汙夫卜筮者世俗之所賤簡也世皆言曰夫卜者多言誇嚴以得人情虚髙人禄命以説人志擅言禍災以傷人心矯言鬼神以盡人財厚求拜謝以私於已此吾之所恥故謂之卑汙也司馬季主曰公且安坐公見夫被髪童子乎日月照之則行不照則止問之日月疵瑕吉凶則不能理由是觀之能知別賢與不肖者寡矣賢之行也直道以正諌三諫不聽則退其譽人也不望其報惡人也不顧其怨以便國家利衆為務故官非其任不處也禄非其功不受也見人不正雖貴不敬也見人有汚雖尊不下也得不為喜去不為恨非其罪也雖累辱而不愧也今公所謂賢者皆可為羞矣卑疵而前􅏽趨而言相引以勢相導以利比周賓正以求尊譽以受公奉事私利枉王法獵農民以官為威以法為機求利逆暴譬無異於操白刃劫人者也初試官時倍力為巧詐飾虚功執空文以誷主上用居上為右試官不讓賢陳功見偽増實以無為有以少為多以求便勢尊位食飲驅馳從姬歌兒不顧於親犯法害民虚公家此夫為盜不操矛弧者也攻而不用弦刃者也欺父母未有罪而弑君未伐者也何以為髙賢才乎盜賊發不能禁夷貊不服不能攝姦邪起不能塞官耗亂不能治四時不和不能調嵗榖不熟不能適才賢不為是不忠也不才不賢而託官位利上奉妨賢者是竊位也有人者進有財者禮是偽也子獨不見鴟梟之與鳳皇翔乎蘭芷芎藭棄於廣野蒿蕭成林使君子退而不顯衆公等是也述而不作君子義也今夫卜者必法天地象四時順於仁義分䇿定卦按式正棊然後言天地之利害事之成敗昔先王之定國家必先龜䇿日月而後乃敢代正時日乃後入家産子必先占吉凶後乃有之自伏羲作八卦周文王演三百八十四爻而天下治越王勾踐倣文王八卦以破敵國霸天下由是言之卜筮有何負哉且夫卜筮者掃除設坐正其冠帶然後乃言事此有禮也言而鬼神或以饗忠臣以事其上孝子以養其親慈父以畜其子此有德者也而以義置數十百錢病者或以愈且死或以生患或以免事或以成嫁子娶婦或以養生此之為德豈直數十百錢哉此夫老子所謂上德不德是以有德今夫卜筮者利大而謝少老子之云豈異於是乎莊子曰君子内無饑寒之患外無劫奪之憂居上而敬居下不為害君子之道也今夫卜筮者之為業也積之無委聚藏之不用府庫徙之不用輜車負裝之不重止而用之無盡索之時持不盡索之物游於無窮之世雖莊氏之行未能増於是也子何故而云不可卜哉天不足西北星辰西北移地不足東南以海為池日中必移月滿必虧先王之道乍存乍亡公責卜者言必信不亦惑乎公見夫談士辯人乎慮事定計必是人也然不能以一言説人主意故言必稱先王語必道上古慮事定計飾先王之成功語其敗害以恐喜人主之志以求其欲多言誇嚴莫大於此矣然欲彊國成功盡忠於上非此不立今夫卜者導惑教愚也夫愚惑之人豈能以一言而知之哉言不厭多故騏驥不能與罷驢為駟而鳳皇不與燕雀為羣而賢者亦不與不肖者同列故君子處卑隠以辟衆自匿以辟倫微見德順以除羣害以明天性助上養下多其功利不求尊譽公之等喁喁者也何知長者之道乎宋忠賈誼忽而自失芒乎無色悵然噤口不能言於是攝衣而起再拜而辭行洋洋也出市門僅能自上車伏軾低頭卒不能出氣居三日宋忠見賈誼於殿門外乃相引屏語相謂自歎曰道髙益安勢髙益危居赫赫之勢失身且有日矣夫卜而有不審不見奪糈為人主計而不審身無所處此相去逺矣猶天冠地屨也此老子之所謂無名者萬物之始也天地曠曠物之熈熈或安或危莫知居之我與若何足預彼哉彼久而愈安雖曾氏之義曽一作莊未有以異也久之宋忠使匈奴不至而還抵罪而賈誼為梁懷王傅王墮馬薨誼不食毒恨而死此務華絶根者也太史公曰古者卜人所以不載者多不見于篇及至司馬季主余志而著之褚先生曰臣為郎時游觀長安中見卜筮之賢大夫觀其起居行步坐起自動誓正其衣冠而當鄉人也有君子之風見性好解婦來卜對之顔色嚴振未嘗見齒而笑也從古以來賢者避世有居止舞澤者有居民間閉口不言有隠居卜筮間以全身者夫司馬季主者楚賢大夫游學長安通易經術黄帝老子博聞逺見觀其對二大夫貴人之談言稱引古明王聖人道固非淺聞小數之能及卜筮立名聲千里者各往往而在傳曰富為上貴次之既貴各各學一伎能立其身黄直丈夫也陳君夫婦人也以相馬立名天下齊張仲曲成侯以善擊刺學用劍立名天下留長孺以相彘立名滎陽褚氏以相牛立名能以伎能立名者甚多皆有髙世絶人之風何可勝言故曰非其地樹之不生非其意教之不成夫家之教子孫當視其所以好好含茍生活之道因而成之故曰制宅命子足以觀士子有處所可謂賢人臣為郎時與太卜待詔為郎者同署言曰孝武帝時聚㑹占家問之某日可取婦乎五行家曰可堪輿家曰不可建除家曰不吉叢辰家曰大凶厯家曰小凶天人家曰小吉太一家曰大吉辯訟不決以狀聞制曰避諸死忌以五行為主人取於五行者也龜䇿列傳太史公曰自古聖王將建國受命興動事業何嘗不寶卜筮以助善唐虞以上不可記己自三代之興各據禎祥塗山之兆從而夏啓世飛燕之卜順故殷興百穀之筮吉故周王王者決定諸疑參以卜筮㫁以蓍龜不易之道也蠻夷氐羌雖無君臣之序亦有決疑之卜或以金石或以草木國不同俗然皆可以戰伐攻擊推兵求勝各信其神以知來事略聞夏殷欲卜者乃取蓍龜巳則弃去之以為龜藏則不靈蓍久則不神至周室之卜官常寶藏蓍龜又其大小先後各有所尚要其歸等耳或以為聖王遭事無不定決疑無不見其設稽神求問之道者以為後世衰微愚不師智人各自安化分為百室道散而無垠故推歸之至微要潔於精神也或以為昆蟲之所長聖人不能與爭其處吉凶別然否多中於人至髙祖時因秦太卜官天下始定兵革未息及孝惠享國日少吕后女主孝文孝景因襲掌故未遑講試雖父子疇官世世相傳其精微深妙多所遺失至今上即位博開藝能之路悉延百端之學通一伎之士咸得自効絶倫超竒者為右無所阿私數年之間太卜大集㑹上欲擊匈奴西攘大宛攘一作襄襄除也南收百越卜筮至預見表象先圖其利及猛將推鋒執節獲勝於彼而蓍龜時日亦有力於此上尤加意賞賜至或數千萬如丘子明之屬富溢貴寵傾於朝廷至以卜筮射蠱道巫蠱時或頗中素有眦睚不快因公行誅恣意所傷以破族滅門者不可勝數百僚蕩恐皆曰龜䇿能言後事覺姦窮亦誅三族夫摓䇿定數摓音逢一作達故摓謂兩手執蓍分而扐之云摓䇿灼龜觀兆變化無窮是以擇賢而用占焉可謂聖人重事者乎周公卜三龜而武王有瘳紂為暴虐而元龜不占晉文將定襄王之位卜得黄帝之兆卒受彤弓之命獻公貪驪姬之色卜而兆有口象其禍竟流五世楚靈將背周室卜而龜逆終被乾溪之敗兆應信誠於内而時人明察見之於外可不謂兩合者哉君子謂夫輕卜筮無神明者悖背人道信禎祥者鬼神不得其正故書建稽疑五謀而卜筮居其二五占從其多明有而不專之道也余至江南觀其行事問其長老云龜千嵗乃遊蓮葉之上蓮一作領領與蓮聲相近或假借字也蓍百莖共一根又其所生獸無虎狼草無毒螫江傍家人常畜龜飲食之以為能導引致氣有益於助衰養老豈不信哉褚先生曰臣以通經術受業博士治春秋以髙第為郎幸得宿衞出入宫殿中十有餘年竊好太史公傳太史公之傳曰三王不同龜四夷各異卜然各以決吉凶畧闚其要故作龜䇿列傳臣往來長安中求龜䇿列傳不能得故之太卜官問掌故文學長老習事者寫取龜䇿卜事編于下方聞古五帝三王發動舉事必先決蓍龜傳曰此傳即太卜所得占龜之説也下有伏靈上有兔絲上有擣蓍擣音逐留反擣蓍即藂蓍擣古稠字下有神龜所謂伏靈者在兔絲之下狀似飛鳥之形新雨已天清靜無風以夜捎兔絲去之即以簼燭此地簼籠也葢然火而籠罩其上也音溝陳渉世家曰夜簼火也燭之火滅即記其處以新布四丈環置之明即掘取之入四尺至七尺得矣過七尺不可得伏靈者千嵗松根也食之不死聞蓍生滿百莖者其下必有神龜守之其上常有青雲覆之傳曰天下和平王道得而蓍莖長丈其叢生滿百莖方今世取蓍者不能中古法度不能得滿百莖長丈者取八十莖已上蓍長八尺即難得也人民好用卦者取滿六十莖已上長滿六尺者即可用矣記曰能得名龜者財物歸之家必大富至千萬一曰北斗龜二曰南辰龜三曰五星龜四曰八風龜五曰二十八宿龜六曰日月龜七曰九州龜八曰玉龜凡八名龜龜圖各有文在腹下文云云者此某之龜也畧記其大指不寫其圖取此龜不必滿尺二寸民人得長七八寸可寶矣今夫珠玉寶器雖有所深藏之見其光必出其神明其此之謂乎故玉出於山而水潤淵生珠而岸不枯者一無不字潤澤之所加也明月之珠出於江海藏於蚌中蚗蠪伏之許氏説淮南云蚗蠪龍屬也音決蚗當為蛟蠪音龍注音決誤也王者得之長有天下四夷賓服能得百莖蓍幷得其下龜以卜者百言百當足以決吉凶神龜出於江水中廬江郡常嵗時生龜長尺二寸者二十枚輸太卜官因以吉日剔取其腹下甲龜千嵗乃滿尺二寸王者發軍行將必鑽龜廟堂之上以決吉凶今髙廟中有龜室藏内以為神寶傳曰取前足臑骨穿佩之臑音乃毛反臑臂取龜置室西北隅懸之以入深山大林中不惑臣為郎時見萬畢石朱方傳曰有神龜在江南嘉林中嘉林者獸無虎狼鳥無鴟梟草無毒螫野火不及斧斤不至是為嘉林龜在其中常巢於芳蓮之上左脅書文曰甲子重光子一作于得我者匹夫為人君有土正正長也為有土之官長諸侯得我為帝王求之於白蛇蟠杅林中者齋戒以待譺然按林名白蛇蟠杅林龜藏其中杅音烏謂白蛇嘗蟠杅此林中也譺音嶷言求龜者齋戒以待恒譺然也狀如有人來告之因以醮酒佗髮佗一作被求之三宿而得由是觀之豈不偉哉故龜可不敬歟南方老人用龜支牀足行二十餘嵗老人死移牀龜尚生不死龜能行氣導引問者曰龜至神若此然太卜官得生龜何為輒殺取其甲乎近世江上人有得名龜畜置之家因大富與人議欲遣去人教殺之勿遣遣之破人家龜見夢曰送我水中無殺吾也其家終殺之殺之後身死家不利人民與君王者異道人民得名龜其狀類不宜殺也以往古故事言之古明王聖主皆殺而用之宋元王時得龜亦殺而用之謹連其事於左方令好事者觀擇其中焉宋元王二年江使神龜使於河至於泉陽漁者豫且舉網得而囚之置之籠中夜半龜來見夢於宋元王曰我為江使於河而幕網當吾路泉陽豫且得我我不能去身在患中莫可告語王有德義故來告訴元王惕然而悟乃召博士衞平而問之曰今寡人夢見一丈夫延頸而長頭衣𤣥繡之衣而乘輜車來見夢於寡人曰我為江使於河而幕網當吾路泉陽豫且得我我不能去身在患中莫可告語王有德義故來告訴是何物也衞平乃援式而起仰天而視月之光觀斗所指定日處鄉規矩為輔副以權衡四維已定八卦相望視其吉凶介蟲先見乃對元王曰今昔壬子宿在牽牛河水大㑹鬼神相謀漢正南北江河固期南風新至江使先來白雲壅漢萬物盡留斗柄指日使者當囚𤣥服而乘輜車其名為龜王急使人問而求之王曰善於是王乃使人馳而往問泉陽令曰漁者幾何家名誰為豫且豫且得龜見夢於王王故使我求之泉陽令乃使吏案籍視圖水上漁者五十五家上流之廬名為豫且泉陽令曰諾乃與使者馳而問豫且曰今昔汝漁何得豫且曰夜半時舉網得龜使者曰今龜安在曰在籠中使者曰王知子得龜故使我求之豫且曰諾即系龜而出之籠中獻使者使者載行出於泉陽之門正晝無見風雨晦㝠雲盖其上五采青黄雲雨竝起風將而行入於端門見於東箱身如流水潤澤有光望見元王延頸而前三步而止縮頸而卻復其故處元王見而怪之問衞平曰龜見寡人延頸而前以何望也縮頸而復是何當也衞平對曰龜在患中而終昔囚王有德義使人活之今延頸而前以當謝也縮頸而卻欲亟去也元王曰善哉神至如此乎不可久留趣駕送龜勿令失期衞平對曰龜者是天下之寶也先得此龜者為天子且十言十當十戰十勝生於深淵長於黄土知天之道明於上古游三千嵗不出其域安平靜正動不用力壽蔽天地莫知其極與物變化四時變色居而自匿伏而不食春倉夏黄秋白冬黑明於隂陽審於刑德先知利害察於禍福以言而當以戰而勝王能寶之諸侯盡服王勿遣也以安社稷元王曰龜甚神靈降于上天陷於深淵在患難中以我為賢德厚而忠信故來告寡人寡人若不遣也是漁者也漁者利其肉寡人貪其力下為不仁上為無德君臣無禮何從有福寡人不忍奈何勿遣衞平對曰不然臣聞盛德不報重寄不歸天與不受天奪之寶今龜周流天下還復其所上至蒼天下薄泥塗還徧九州未嘗愧辱無所稽留今至泉陽漁者辱而囚之王雖遣之江河必怒務求報仇自以為侵因神與謀淫雨不霽水不可治若為枯旱風而揚埃蝗蟲暴生百姓失時王行仁義其罰必來此無佗故其祟在龜後雖悔之豈有及哉王勿遣也元王慨然而歎曰夫逆人之使絶人之謀是不暴乎取人之有以自為寶是不彊乎寡人聞之暴得者必暴亡彊取者必後無功桀紂暴彊身死國亡今我聽子是無仁義之名而有暴彊之道江河為湯武我為桀紂未見其利恐離其咎寡人狐疑安事此寶趣駕送龜勿令久留衞平對曰不然王其無患天地之間累石為山髙而不壊地得為安故云物或危而顧安或輕而不可遷人或忠信而不如誕謾或醜惡而宜大官或美好佳麗而為衆人患非神聖人莫能盡言春秋冬夏或暑或寒寒暑不和賊氣相姦同嵗異節其時使然故令春生夏長秋收冬藏或為仁義或為暴彊暴彊有鄉仁義有時萬物盡然不可勝治大王聽臣臣請悉言之天出五色以辨白黑地生五榖以知善惡人民莫知辨也與禽獸相若谷居而穴處不知田作天下禍亂隂陽相錯忽忽疾疾通而不相擇妖㜸數見傳為單薄聖人别其生使無相獲禽獸有牝牡置之山原鳥有雌雄布之林澤有介之蟲置之谿谷故牧人民為之城郭内經閭術外為阡陌夫妻男女賦之田宅列其室屋為之圖籍别其名族立官置吏勸以爵禄衣以桑麻養以五榖耕之耰之鉏之耨之口得所嗜目得所美身受其利以是觀之非彊不至故曰田者不彊囷倉不盈商賈不彊不得其贏婦女不彊布帛不精官御不彊其勢不成大將不彊卒不使令侯王不彊没世無名故云彊者事之始也分之理也物之紀也所求於彊無不有也王以為不然王獨不聞玉櫝隻雉出於昆山明月之珠出於四海鐫石拌蚌傳賣於市聖人得之以為大寶大寶所在乃為天子今王自以為暴不如拌蚌於海也自以為彊不過䥴石於昆山也取者無咎寶者無患今龜使來抵網而遭漁者得之見夢自言是國之寶也王何憂焉元王曰不然寡人聞之諫者福也䛕者賊也人主聽䛕是愚惑也雖然禍不妄至福不徒來天地合氣以生百財隂陽有分不離四時十有二月日至為期聖人徹焉身乃無災明王用之人莫敢欺故云福之至也人自生之禍之至也人自成之禍與福同刑與德雙聖人察之以知吉凶桀紂之時與天爭功擁遏鬼神使不得通是固已無道矣䛕臣有衆桀有䛕臣名曰趙梁教為無道勸以貪狼繫湯夏臺殺闗龍逢左右恐死偷䛕於傍國危於累卵皆曰無傷稱樂萬嵗或曰未央蔽其耳目與之詐狂湯卒伐桀身死國亡聽其䛕臣身獨受殃春秋著之至今不忘紂有䛕臣名為左彊誇而目巧教為象郎將至於天又有玉牀犀玉之器象箸而羮聖人剖其心壯士斬其胻胻音衡脚脛也箕子恐死被髮佯狂殺周太子厯囚文王昌投之石室將以昔至明隂兢活之與之俱亡入於周地得太公望興卒聚兵與紂相攻文王病死載尸以行太子發代將號為武王戰於牧野破之華山之陽紂不勝敗而還走圍之象郎自殺宣室身死不葬頭懸車軫四馬曳行寡人念其如此膓如涫湯是人皆富有天下而貴至天子然而大傲欲無厭時舉事而喜髙貪狼而驕不用忠信聽其䛕臣而為天下笑今寡人之邦居諸侯之間曾不如秋毫舉事不當又安亡逃衞平對曰不然河雖神賢不如崐崘之山江之源理不如四海而人尚奪取其寶諸侯爭之兵革為起小國見亡大國危殆殺人父兄虜人妻子殘國滅廟以爭此寶戰攻分爭是暴彊也故云取之以暴彊而治以文理無逆四時必親賢士與隂陽化鬼神為使通於天地與之為友諸侯賓服民衆殷喜邦家安寜與世更始湯武行之乃取天子春秋著之以為經紀王不自稱湯武而自比桀紂為暴彊也固以為常桀為瓦室紂為象郎徴絲灼之務以費民賦歛無度殺戮無方殺人六畜以韋為囊囊盛其血與人懸而射之與天帝爭彊逆亂四時先百鬼嘗諫者輒死䛕者在傍聖人伏匿百姓莫行天數枯旱國多妖祥螟蟲嵗生五榖不成民不安其處鬼神不享飄風日起正晝晦㝠日月竝蝕滅息無光列星奔亂皆絶紀綱以是觀之安得久長雖無湯武時固當亡故湯伐桀武王剋紂其時使然乃為天子子孫續世終身無咎後世稱之至今不已是皆當時而行見事而彊乃能成其帝王今龜大寶也為聖人使傳之賢士不用手足雷電將之風雨送之流水行之侯王有德乃得當之今王有德而當此寶恐不敢受王若遣之宋必有咎後雖悔之亦無及已元王大悦而喜於是元王向日而謝再拜而受擇日齋戒甲乙最良乃刑白雉及與驪羊以血灌龜於壇中央以刀剝之身全不傷脯酒禮之横其腹腸荆支卜之必制其創理達於理文相錯迎使工占之所言盡當邦福重寶聞于傍鄉殺牛取革被鄭之桐草木畢分化為甲兵戰勝攻取莫如元王元王之時衞平相宋宋國最彊龜之力也故云神至能見夢於元王而不能自出漁者之籠身能十言盡當不能通使於河還報於江賢能令人戰勝攻取不能自解於刀鋒免剝刺之患聖能先知亟見而不能令衞平無言言事百全至身而攣當時不利又焉事賢賢者有恒常士有適然是故明有所不見聽有所不聞人雖賢不能左畫方右畫圓日月之明而時蔽於浮雲羿名善射不如雄渠蠭門楚雄渠子夜行見伏石當道以為虎而射之應弦没羽禹名為辯智而不能勝鬼神地柱折天故毋掾又奈何責人於全孔子聞之曰神龜知吉凶而骨直空枯日為德而君於天下辱於三足之烏月為刑而相佐見食於蝦蟇蝟辱於鵲蝟能制虎騰蛇之神而殆於即且竹外有節理中直空虚松栢為百木長而守門閭日辰不全故有孤虚黄金有疵白玉有瑕事有所疾亦有所徐物有所拘亦有所據罔有所數亦有所疎人有所貴亦有所不如何可而適乎物安可全乎天尚不全故世為屋不成三瓦而陳之以應之天天下有階物不全乃生也褚先生曰漁者舉網而得神龜龜自見夢宋元王元王召博士衞平告以夢龜狀平運式定日月分衡度視吉凶占龜與物色同平諫王留神龜以為國重寶美矣古者筮必稱龜者以其令名所從來久矣余述而為傳三月二月正月正義曰言正月二月三月右轉周環終十二月者日月之龜腹下十二黒㸃為十二月若二十八宿龜也十二月十一月中闗内髙外下正義曰此等下至首俛大者皆卜兆之狀也四月首仰索隠曰音魚兩反謂兆首仰起足開肣開索隠曰音琴肣謂兆足歛也首俛大索隠曰俛音免兆首伏也五月横吉首俛大正義曰俛音免謂兆首伏而大六月七月八月九月十月卜禁日子亥戌不可以卜及殺龜日中如食已卜暮昏龜之徼也徼音叫謂徼繞不明也不可以卜庚辛可以殺及以鑽之常以日旦祓龜祓音廢又音拂拂洗之以水雞卵摩之而呪先以清水澡之以卵祓之以常月朝清水洗之以雞卵摩而祝之乃持龜而遂之若嘗以為祖一作視為祖法也言以常法人若已卜不中皆祓之以卵東向立灼以荆若剛木土一作十一堅按古之灼龜取生荆枝及生木燒之斬㫁以灼龜按土字合依劉氏説當連下句卵指之者三持龜以卵周環之祝曰今日吉謹以梁卵焍黄梁米也祓去玉靈之不祥玉靈必信以誠知萬事之情辯兆皆可占不信不誠則燒玉靈揚其灰以徴後龜其卜必北向龜甲必尺二寸卜先以造音竈也灼鑽造謂燒荆之處物若木也鑽中已又灼龜首各三又復灼所鑽中曰正身灼首曰正足一作止各三即以造三周龜祝曰假之玉靈夫子夫子玉靈荆灼而心令而先知而上行於天下行於淵諸靈數箣音䇿反數音所具箣音近䇿或箣是䇿之別名此卜筮之書其字亦無可覈他皆放此莫如汝信今日良日行一良貞行一作身其欲卜某即得而喜不得而悔即得發鄉我身長大手足收人皆上偶不得發鄉我身挫折中外不相應手足滅去靈龜卜祝曰假之靈龜五筮五靈不知神龜之靈知人死知人生某身良某欲求某物即得也頭見足發内外相應即不得也頭仰足肣内外自隨可得占卜占病者祝曰今某病困死首上開内外交駭身節折不死首仰足肣卜病者祟曰今病有祟無呈無祟有呈兆有中祟有内外祟有外卜繫者出不出不出横吉安若出足開首仰有外卜求財物其所當得得首仰足開内外相應即不得呈兆首仰足肣卜有賣若買臣妾馬牛得之首仰足開内外相應不得首仰足肣呈兆若横吉安卜擊盜聚若干人在某所今某將卒若干人往擊之當勝首仰足開身正内自橋外下不勝足肣首仰身首内下外髙卜求當行不行行首足開不行足肣首仰若横吉安安不行卜往擊盜當見不見見首仰足肣有外不見足開首仰卜往候盜見不見見首仰足肣肣勝有外不見足開首仰卜聞盜來不來來外髙内下足肣首仰不來足開首仰若横吉安期之自次卜遷徙去官不去去足開有肣外首仰不去自去即足肣呈兆若横吉安卜居官尚吉不吉呈兆身正若横吉安不吉身節折首仰足開卜居室家吉不吉吉呈兆身正若横吉安不吉身折節首仰足開卜歲中禾稼孰不孰孰首仰足開内外自橋外自垂不孰足肣首仰有外卜歲中民疫不疫疫首仰足肣身節有彊外不疫身正首仰足開卜歲中有兵無兵無兵呈兆若横吉安有兵首仰足開身作外彊情卜見貴人吉不吉吉足開首仰身正内自橋不吉首仰身節折足肣有外若無漁卜請謁於人得不得得首仰足開内自橋不得首仰足肣有外卜追亡人當得不得得首仰足肣内外相應不得首仰足開若横吉安卜漁獵得不得得首仰足開内外相應不得足肣首仰若横吉安卜行遇盜不遇遇首仰足開身節折外髙内下不遇呈兆卜天雨不雨雨首仰有外外髙内下不雨首仰足開若横吉安卜天雨霽不霽霽呈兆足開首仰不霽横吉命曰横吉安以占病病甚者一日不死不甚者卜曰瘳不死繫者重罪不出輕罪環出過一日不出久母傷也求財物買臣妾馬牛一日環得過一日不得不得行者不行來者環至過食時不至不來擊盜不行行不遇聞盜不來徙官不徙居官家室皆吉歲稼不孰民疾疫無疫歲中無兵見人行不行不喜請謁人不行不得追亡人漁獵不得行不遇盜雨不雨霽不霽命曰呈兆病者不死繫者出行者行來者來市買得追亡人得過一日不得問行者不到命曰柱徹卜病不死繫者出行者行來者來而市買不得憂者母憂追亡人不得命曰首仰足肣有内無外占病病甚不死繫者解求財物買臣妾馬牛不得行者聞言不行來者不來聞盜不來聞言不至徙官聞言不徙居官有憂居家多災歲稼中孰民疾疫多病歲中有兵聞言不開見貴人吉請謁不行行不得善言追亡人不得漁獵不得行不遇盜雨不雨甚霽不霽故其莫字皆為首備問之曰備者仰也故定以為仰此私記也命曰首仰足肣有内無外占病病甚不死繫者不出求財買臣妾不得行者不行來者不來擊盜不見聞盜來内自驚不來徙官不徙居官家室吉歲稼不孰民疾疫有病甚歲中無兵見貴人吉請謁追亡人不得亡財物財物不出得漁獵不得行不遇盜雨不雨霽不霽凶命曰呈兆首仰足肣以占病不死繫者未出求財物買臣妾馬牛不得行不行來不來擊盜不相見聞盜來不來徙官不徙居官久多憂居家室不吉歲稼不孰民病疫歲中母兵見貴人不吉請謁不得漁獵得少行不遇盜雨不雨霽不霽不吉命曰呈兆首仰足開以占病病篤死繫囚出求財物買臣妾馬牛不得行者行來者來擊盜不見盜聞盜來不來徙官徙居官不久居家室不吉歲稼不孰民疾疫有而少歲中無兵見貴人不見吉請謁追亡人漁獵不得行遇盜雨不雨霽小吉命曰首仰足肣以占病不死繫者久母傷也求財物買臣妾馬牛不得行者不行擊盜不行來者來聞盜來徙官聞言不徙居家室不吉歲稼不孰民疾疫少歲中母兵見貴人得見請謁追亡人漁獵不得行遇盜雨不雨霽不霽吉命曰首仰足開有内以占病者死繫者出求財物買臣妾馬牛不得行者行來者來擊盜行不見盜聞盜來不來徙官徙居官不久居家室不吉歲孰民疾疫有而少歲中母兵見貴人不吉請謁追亡人漁獵不得行不遇盜雨霽霽小吉不霽吉命曰横吉内外自橋以占病卜曰母瘳死繫者母罪出求財物買臣妾馬牛得行者行來者來擊盜合交等聞盜來來徙官徙居家室吉歲孰民疫無疾歲中無兵見貴人請謁追亡人漁獵得行遇盜雨霽雨霽大吉命曰横吉内外自吉以占病病者死繫不