body:
  text: 漢魏六朝百三家集卷一百十七牛𢎞集題詞隋楊二帝猜忌好殺勳伐舊臣動遭誅廢獨牛里仁始終恩任悔吝不及賜詩贊揚內帳飲食禮愛尤殊竊怪彼挾持何術能當人主生平文字議禮居優史臣遂謂其損益典章漢叔孫通無以尚然叔孫希世度務委蛇儒宗里仁得無有其遺意邪非獨於明堂郊廟能也南北用兵典籍淪喪里仁詳陳五厄請開購賞篇章稍備具有功藝文豈讓王儉七志阮孝緒七録哉文皇鋭精作樂何栖鳳規時獻議里仁學疏量寬依違其間無所駁正無咎無譽其在坤之四爻乎張蒼壽考公孫晚貴里仁似之此楊素所謂愚不可及也目録表請開獻書表奏定樂奏樂定奏定典禮奏論六十律論議明堂議詳定樂議又樂議同律度量議樂府郊廟歌辭圜丘歌八首昭夏皇夏登歌諴夏文舞需夏武舞昭夏五郊歌五首青帝歌角音赤帝歌徴音黃帝歌宫音白帝歌商音黑帝歌羽音感帝歌諴夏雩祭歌諴夏蠟祭歌諴夏朝日夕月歌二首朝日諴夏夕月諴夏方丘歌四首昭夏登歌諴夏昭夏神州歌諴夏社稷歌四首春祈社諴夏春祈稷諴夏秋報社諴夏秋報稷諴夏先農歌諴夏先聖先師歌諴夏太廟樂歌九首迎神歌登歌俎入歌皇髙祖太原府君神室歌皇曾祖康王神室歌皇祖獻王神室歌皇考太祖武元皇帝神室歌飲福酒歌送神歌燕射歌辭元㑹大饗歌十一首皇夏肆夏食舉歌八曲上壽歌宴羣臣登歌皇后房內歌大射登歌鼓吹曲辭凱樂歌辭三首述帝德述諸軍用命述天下太平舞曲歌辭文武舞歌二首文舞歌武舞歌詩奉賀冬至乾陽殿受朝應詔漢魏六朝百三家集卷一百十七目録欽定四庫全書漢魏六朝百三家集卷一百十七明張溥輯牛𢎞集表請開獻書表經籍所興由來尚矣爻畫肇於庖羲文字生於倉頡聖人所以𢎞宣教導博通古今揚於王庭肆於時夏故堯稱至聖猶考古道而言舜其大智尚觀古人之象周官外史掌三皇五帝之書及四方之志武王問黃帝顓頊之道太公曰在丹書是知握符御厯有國有家者曷嘗不以詩書而為教因禮樂而成功也昔周德既衰舊經紊棄孔子以大聖之才開素王之業憲章祖述制禮刋詩正五始而修春秋闡十易而𢎞易道治國立身作範垂法及秦皇馭㝢吞滅諸侯任用威力事不師古始下焚書之令行偶語之刑先王墳籍掃地皆盡本既先亡從而顛覆臣以圖䜟言之經典盛衰信有徴數此則書之一厄也漢興改秦之弊敦尚儒術建藏書之策置校書之官屋壁山巖往往間出外有太常太史之藏內有延閣祕書之府至孝成之世亡逸尚多遣謁者陳農求遺書於天下詔劉向父子讎校篇籍漢之典文於斯為盛及王莽之末長安兵起宮室圖書並從焚燼此則書之二厄也光武嗣興猶重經誥未及下車先求文雅於是鴻生巨儒繼踵而集懷經負帙不逺斯至肅宗親臨講肄和帝數幸書林其蘭臺石室鴻都東觀祕牒填委更倍於前及孝獻移都吏民擾亂圖書縑帛皆取為帷囊所收而西裁七十餘乘屬西京大亂一時燔蕩此則書之三厄也魏文代漢更集經典皆藏在祕書內外三閣遣祕書郎鄭默删定舊文時之論者美其朱紫有别晉氏承之文籍尤廣晉祕書監荀朂定魏內經更著新簿雖古文舊簡猶云有缺新章後録鳩集已多足得恢𢎞正道訓範當世屬劉石慿陵京華覆滅朝章國典從而失墜此則書之四厄也永嘉之後冦竊競興因河據洛跨秦帶趙論其建國立家雖傳名號憲章禮樂寂滅無聞劉裕平姚收其圖籍五經子史才四千卷皆赤軸青紙文字古拙僭僞之盛莫過二秦以此而論足可明矣故知衣冠軌物圖畫記注播遷之餘皆歸江左晉宋之際學藝為多齊梁之間經史彌盛宋祕書丞王儉依劉氏七略撰為七志梁人阮孝緒亦為七録總其書數三萬餘卷及侯景渡江破滅梁室祕省經籍雖從兵火其文德殿內書史宛然猶存蕭繹據有江陵遣將破平侯景收文德之書及公私典籍重本七萬餘卷悉送荆州故江表圖書因斯盡萃於繹矣及周師入郢繹悉焚之於外城所收十才一二此則書之五厄也後魏爰自幽方遷宅伊洛日不暇給經籍闕如周氏創基關右戎車未息保定之始書止八千後加收集方盈萬卷髙氏據有山東初亦採訪驗其本目殘缺尤多及東夏初平獲其經史四部重雜三萬餘卷所益舊書五千而已今御書單本合一萬五千餘卷部帙之間仍有殘缺比梁之舊目止有其半至於隂陽河洛之篇醫方圖譜之說彌復為少臣以經書自仲尼已後迄于當今年踰千載數遭五厄興集之期屬膺聖世伏惟陛下受天明命君臨區宇功無與二德冠往初自華夏分離彞倫攸斁其間雖霸王遞起而世難未夷欲崇儒業時或未可今土宇邁於三王民黎盛於兩漢有人有時正在今日方當大𢎞文教納俗升平而天下圖書尚有遺逸非所以仰協聖情流訓無窮者也臣史籍是司寢興懷懼昔陸賈奏漢祖云天下不可馬上治之故知經邦立政在於典謨矣為國之本莫此攸先今祕藏見書亦足披覽但一時載籍須令大備不可王府所無私家乃有然士民殷雜求訪難知縱有知者多懷吝惜必須勒之以天威引之以微利若猥發明詔兼開購賞則異典必臻觀閣斯積重道之風超於前世不亦善乎伏願天鑒少垂昭察奏定樂奏臣聞周有六代之樂至韶武而已秦始皇改周舞曰五行漢髙帝改韶武曰文始以示不相襲也又造武德自表其功故髙帝廟奏武德文始五行之舞又作昭容禮容增演其意昭容生于武德蓋猶古之韶也禮容生于文始矯秦之五行也文帝又作四時之舞故孝景帝立追述先功采武德舞作昭德舞被之管絃薦于太宗之廟孝宣采昭德舞為盛德舞更造新歌薦于武帝之廟據此而言遞相因襲縱有改作並宗于韶至明帝時東平獻王采文德舞為大武之舞薦于光武之廟漢末大亂樂章淪缺魏武平荆州獲杜䕫以為軍謀祭酒使創雅樂時散騎侍郎鄧靜善詠雅歌樂師尹胡能習宗祀之曲舞師馮肅曉知先代諸舞總練研精復于古樂自䕫始也文帝黃初改昭容之樂為昭業樂武德之舞為武頌舞文始之舞為大韶舞五行之舞為大武舞明帝初公卿奏上太祖武皇帝樂曰武始之舞髙祖文皇帝樂曰咸熙之舞又製樂舞名曰章斌之舞有事於天地宗廟及臨朝大饗並用之晉武帝泰始二年遣傅𤣥等造行禮及上壽食舉歌詩張華表曰按漢魏所用雖詩章辭異興廢隨時至其韻逗曲折並繫于舊一皆因襲不敢有所改也九年荀朂典樂使郭夏宋識造正德大豫之舞改魏昭武舞曰宣武舞羽籥舞曰宣文舞江左之初典章堙紊賀循為太常卿始有登歌之樂大寧末阮孚等又增益之咸和間鳩集遺逸鄴沒胡後樂人頗復南度東晉因之以具鍾律太元間破苻永固又獲樂工陽蜀等閒練舊樂于是金石始備尋其設懸音調並與江左是同慕容垂破慕容永于長子盡獲苻氏舊樂垂息為魏所敗其鍾律令李佛等將大樂細伎奔慕容德于鄴德遷都廣固子超嗣立其母先沒姚興超以太樂伎一百二十人詣興贖母及宋武帝入關悉收南度永初元年改正德舞曰前舞大武舞曰後舞文帝元嘉九年太樂令鍾宗之更調金石至十四年典書令奚縱復改定之又有凱容宣業之舞齊代因而用之蕭子顯齊書志曰宋孝建初朝議以凱容舞為韶舞宣業舞為武德舞據韶為言宣業即是古之大武非武德也故志有前舞凱容歌辭後舞凱容歌辭者矣至於梁初猶用凱容宣業之舞後改為大壯大觀焉今人猶喚大觀為前舞故知樂名雖隨代而改聲韻曲折理應常同前克荆州得梁家雅曲今平蔣州又得陳氏正樂史傳相承以為合古且觀其曲體用聲有次請修緝之以備雅樂其後魏洛陽之曲據魏史云太武平赫連昌所得更無明證後周所用者皆是新造雜有邊裔之聲戎音亂華皆不可用請悉停之樂定奏臣聞蕢桴土鼓由來斯尚雷出地奮著自易經邃古帝王經邦馭物揖讓而臨天下者禮樂之謂也秦焚經典樂書亡缺爰至漢興始加鳩探祖述增廣緝成朝憲魏晉相承更加論討沿革之宜備于故實永嘉之後九服崩離燕石苻姚遞據華土此其戎乎何必伊川之上吾其左袵無復微管之功前言往式于斯而盡金陵建社朝士南奔帝則皇規粲然更備于內原隔絶三百年于兹矣伏惟明聖膺期㑹昌在運今南征所獲梁陳樂人及晉宋旗章宛然俱至曩代所不服者今悉服之前朝所未得者今悉得之化洽功成于是乎在臣等伏奉明詔詳定雅樂博訪知音旁求儒彥研校是非定其去就取為一代正樂具在本司定典禮奏聖教陵替國章殘缺漢晉為法隨俗因時未足經國庇人𢎞風施化且制禮作樂事歸元首江南王儉偏隅一臣私撰儀注多違古法就廬非東階之位凶門豈設重之禮兩蕭纍代舉國遵行後魏及齊風牛本隔殊不尋究遙相師祖故山東之人浸以成俗西魏己降師旅弗遑賓嘉之禮盡未詳定今休明啓運憲章伊始請據前經革兹俗弊論六十律論案續漢書律厯志元帝遣韋𤣥成問京房于樂府房對受學故小黃令焦延壽六十律相生之法以上生下皆三生二以下生上皆三生四陽下生隂隂上生陽終于中吕而十二律畢矣中吕上生執始執始下生去滅上下相生終于南事六十律畢矣十二律之變至于六十猶八卦之變至于六十四也冬至之聲以黃鍾為宮大蔟為商姑洗為角林鍾為徵南吕為羽應鍾為變宮㽔賓為變徵此聲氣之元五音之正也故各統一日其餘以次運行宫日者各自為宫而商徵以類從焉房又曰竹聲不可以度調故作准以定數准之狀如瑟長一丈而十三絃隱間九尺以應黃鍾之律九寸中央一絃下畫分寸以為六十律清濁之節執始之類皆房自造房云受法于焦延壽未知延壽所承也至元和年待詔候鍾殷彤上言官無曉六十律以准調音者故待詔嚴嵩具以准法教其子宣願召宣補學官主調樂器太史丞𢎞試宣十二律其二中其四不中其六不知何律宣遂罷自此律家莫知為准施絃嘉平年東觀召典律者太子舍人張光問准意光等不知歸閲舊藏乃得其器形制如房書猶不能定其絃緩急故史官能辨清濁者遂絶其可以相傳者唯大𣙜常數及候氣而已據此而論京房之法漢世已不能行沈約宋志曰詳案古典及今音家六十律無施于樂禮云十二管還相為宮不言六十封禪書云大帝使素女鼓五十絃瑟而悲破為二十五絃假令六十律為樂得成亦所不用取大樂必易大禮必簡之意也議明堂議竊謂明堂者所以通神靈感天地出教化崇有德孝經曰宗祀文王于明堂以配上帝祭義云祀于明堂教諸侯孝也黃帝曰合宮堯曰五府舜曰總章布政興治由來尚矣周官考工記曰夏后氏世室堂修二七廣四修一鄭𤣥注云修十四步其廣益以四分修之一則堂廣十七步半也殷人重屋堂修七尋四阿重屋鄭云其修七尋廣九尋也周人明堂度九尺之筵南北七筵五室凡室二筵鄭云此三者或舉宗廟或舉王寢或舉明堂互言之明其同制也馬融王肅干寶所注與鄭亦異今不具出漢司徒馬宮議云夏后氏世室室顯于堂故命以室殷人重屋屋顯于堂故命以屋周人明堂堂大于夏室故命以堂夏后氏益其堂之廣百四十四尺周人明堂以為兩序間大夏后氏七十二尺若據鄭𤣥之說則夏室大于周堂如依馬宮之言則周堂大于夏室後王轉文周大為是但宮之所言未詳其義此皆去聖久逺禮文殘缺先儒解說家異人殊鄭注玉藻亦云宗廟路寢與明堂同制王制曰寢不踰廟明大小是同今依鄭𤣥注每室及堂止有一丈八尺四壁之外四尺有餘若以室廟論之祫享之時周人旅酬六尸并后稷為七先公昭穆二尸先王昭穆一尸合十一尸三十六王及君北面行事于二丈之堂愚不及此若以正寢論之便須朝宴據燕禮諸侯宴則賓及卿大夫脫屨升坐是知天子宴則三公九卿並須升堂燕義又云席小卿次上卿言皆侍席止于二筵之間豈得行禮若以明堂論之總享之時五帝各于其室設青帝之位須于太室之內少北西面太昊從食坐于其西近南北面祖宗配享者又于青帝之南稍退西面丈八之室神位有三加以簠簋籩豆牛羊之俎四海九州美物咸設復須席工升歌出樽反玷揖讓升降亦以隘矣據兹而說近是不然案劉向别録及馬宮蔡雍等所見當時有古文明堂禮王居明堂禮明堂圖明堂大圖明堂隂陽太山通義魏文侯孝經傳等並說古明堂之事其書皆亡莫得而正今明堂月令者鄭𤣥云是吕不韋著春秋十二紀之首章禮家鈔合為記蔡雍王肅云周公所作周書內有月令第五十三即此也各有證明文多不載束晳以為夏時之書劉瓛云不韋鳩集儒者尋于聖王月令之事而記之不韋安能獨為此記今案不得全稱周書亦未可即為秦典其內雜有虞夏殷周之法皆聖王仁恕之政也蔡雍具為章句又論之曰明堂者所以宗祀其祖以配上帝也夏后氏曰世室殷人曰重屋周人曰明堂東曰青陽南曰明堂西曰總章北曰𤣥堂內曰太室聖人南面而聽向明而治人君之位莫不正焉故雖有五名而主以明堂也制度之數各有所依堂方一百四十四尺川之策也屋圓楣徑二百一十六尺乾之策也太廟明堂方六丈通天屋徑九尺隂陽九六之變且圓蓋方覆九六之道也八闥以象卦九室以象州十二宫以應日辰三十六户七十二牖以四户八牖乘九宮之數也户皆外設而不閉示天下以不藏也通天屋髙八十一尺黃鍾九九之實也二十八柱布四方四方七宿之象也堂髙三尺以應三統四向五色各象其行水濶二十四丈象二十四氣于外象四海王者之大禮也觀其模範天地則象隂陽必據古文義不虛出今若直取考工不參月令青陽總章之號不得而稱九月享帝之禮不得而用漢代二京所建與此說悉同建安之後海內大亂京邑焚燒憲章泯絶魏氏三方未平無聞興造晉則侍中裴頠議曰尊祖配天其義明著而廟宇之制理據未分宜可直為一殿以崇嚴父之祀其餘雜碎一皆除之宋齊已還咸率兹禮此乃世乏通儒時無思術前王盛事于是不行後魏代都所造出自李冲三三相重合為九室簷不覆基房間通街穿鑿處多迄無可取及遷宅洛陽更加營構五九紛競遂至不成宗配之事於焉靡託今皇猷遐闡化覃海外方建大禮垂之無窮𢎞等不以庸虛謬當議限今檢明堂必須五室者何尚書帝命驗曰帝者承天立五府赤曰文祖黃曰神升白曰顯紀黑曰𤣥矩蒼曰靈府鄭𤣥注曰五府與周之明堂同矣且三代相沿多有損益至于五室確然不變夫室以祭天天實有五若立九室四無所用布政視朔自依其辰鄭司農云十二月分在青陽等左右之位不云居室鄭𤣥亦言每月于其時之堂而聽政焉禮圖畫個皆在堂偏是以須為五室明堂必須上圓下方者何孝經援神契曰明堂者上圓下方八窗四達布政之宮禮記盛德篇曰明堂四户八牖上圓下方五經異義稱講學大夫淳于登亦云上圓下方鄭𤣥同之是以須為圓方明堂必須重屋者何案考工記夏言九階四旁兩夾窗門堂三之二室三之一殷周不言者明一同夏制殷言四阿重屋周承其後不言屋制亦盡同可知也其殷人重屋之下本無五室之文鄭注云五室者亦據夏以知之明周不云重屋因殷則有灼然可見禮記明堂位曰太廟天子明堂言魯為周公之故得用天子禮樂魯之太廟與周之明堂同又曰復廟重簷刮楹達嚮天子之廟飾鄭注復廟重屋也據廟既重屋明堂亦不疑矣春秋文公十三年太室屋壞五行志曰前堂曰太廟中央曰太室屋其上重者也服䖍亦云太室太廟太室之上屋也周書作洛篇曰乃立太廟宗宫路寢明堂咸有四阿反玷重亢重廊孔朝注曰重亢纍棟重廊纍屋也依黃圖所載漢之宗廟皆為重屋此去古猶近遺法尚在是以須為重屋明堂必須為辟雍者何禮記盛德篇云明堂者明諸侯尊卑也外水曰辟雍明堂隂陽録曰明堂之制周圜行水左旋以象天內有太室以象紫宮此明堂有水之明文也然馬宮王肅以為明堂辟雍太學同處蔡雍盧植亦以為明堂靈臺辟雍太學同實異名雍云明堂者取其宗祀之清貌則謂之清廟取其正室則曰太室取其堂則曰明堂取其四門之學則曰太學取其周水圜如璧則曰璧雍其實一也其言别者五經通義曰靈臺以望氣明堂以布政辟雍以養老教學三者不同袁凖鄭𤣥亦以為别歷代所疑豈能輒定今據郊祀志云欲制明堂未曉其制濟南人公玉帶上黃帝時明堂圖一殿無壁蓋之以茅水圜宫垣天子從之以此而言其來則久漢中元二年起明堂辟雍靈臺于洛陽並别處然明堂亦有璧水李尤明堂銘曰流水洋洋是也以此須有辟雍夫帝王作事必師古昔今造明堂須以禮經為本形制依于周法度數取于月令遺闕之處參以餘書庶使該詳沿革之理其五室九階上圓下方四阿重屋四旁兩門依考工記孝經說堂方一百四十四尺屋圓楣徑二百一十六尺太室方六丈通天屋徑九丈八闥二十八柱堂髙三尺四向五色依周書月令論殿垣方在內水周如外水內徑三百步依太山盛德記覲禮經仰觀俯察皆有則象足以盡誠上帝祗配祖宗𢎞風布教作範于後矣𢎞等學不稽古輒申所見可否之宜伏聽裁擇詳定樂議後周之時以四聲降神雖采周禮而年代深逺其法久絶不可依用謹案司樂凡樂圜鍾為宫黃鍾為角太蔟為徵姑洗為羽舞雲門以祭天函鍾為宮太蔟為角姑洗為徵南宮為羽舞咸池以祭地黃鍾為宮大吕為角太蔟為徵圜鍾為羽舞韶以祀宗廟馬融曰圜鍾應鍾也賈逵鄭𤣥曰圜鍾夾鍾也鄭𤣥又云此樂無商聲祭尚柔剛故不用也干寶云不言商商為臣王者自謂故置其實而去其名若曰有天地人物無德以主之謙以自牧也先儒解釋既莫知適從然此四聲非直無商又律管乖次以其為樂無克諧之理今古事異不可得而行也按東觀書馬防傳太子丞鮑鄴等上作樂事下防防奏言建初二年七月鄴上言天子食飲必順于四時五味而有食舉之樂所以順天地養神明求福應也今官雅樂獨有黃鍾而食舉樂但有太蔟皆不應月律恐傷氣類可作十二月均各應其月氣公卿朝㑹得聞月律乃能感天和氣宜應詔下太常評焉太常上言作樂器直錢百四十六萬奏寖今明詔復下臣防以為可須上天之明時因嵗首之嘉月發太蔟之律奏雅頌之音以迎和氣其條貫甚具遂獨施行起于十月為迎氣之樂矣又順帝紀云陽嘉二年冬十月􅏤午以春秋為辟雍𨽻大學隨月律十月作應鍾三月作姑洗元和以來音戾不調修復黃鍾作樂器如舊典據此而言漢樂宮懸有黃鍾均食舉太蔟均止有二均不旋相為宮亦以明矣計從元和至陽嘉二年才五十嵗用而復止驗黃帝聽鳳以制律吕尚書曰豫欲聞六律五聲周禮有分樂而祭此聖人制作以合天地隂陽之和自然之理乃云音戾不調斯言誣之甚也今梁陳雅曲並用宮聲按禮五聲十二律還相為宫盧植云十二月三管流轉用事當用事者為宮宮君也鄭𤣥曰五聲宫商角徵羽其陽管為律隂管為呂布十二辰更相為宮始自黃鍾終于南呂凡六十也皇侃疏還相為宮者十一月以黃鍾為宮十二月以大吕為宮正月以太蔟為宮餘月倣此凡十二管各備五聲合六十聲五聲成一調故十二調此即釋鄭義之明文無用商角徵羽為别調之法矣樂稽耀嘉曰東方春其聲角樂當宫于夾鍾餘方各以其中律為宫若有商角之理不得云宫于夾鍾也又云五音非宮不調五味非甘不和又動聲儀宫唱而商和是謂善本太平之樂也周禮奏黃鍾歌大呂以祀天神鄭𤣥以黃鍾之鍾大呂之聲為均均調也故崔靈恩云六樂十二調亦不獨論商角徵羽也又云凡六樂者皆文之以五聲播之以八音故知每曲皆須五聲八音錯綜而能成也禦冦子云師文鼓琴命官而總四聲則慶雲浮景風翔唯韓詩云聞其宮聲使人溫厚而寬大聞其商聲使人方廉而好義及古有清角清徵之流此則當聲為曲今以五引為五聲迎氣所用者是也餘曲悉用宮聲不勞商角徵羽何以得知荀朂論三調為均首者得正聲之名明知雅樂悉在宮調已外徵羽角自為謡俗之音耳且西凉龜兹雜伎等曲數既多故得𨽻于衆調調各别曲至如雅樂少須以宮為本歷十二均而作不可分配餘調更成雜亂也又樂議案周官云大司樂掌成均之法鄭衆注云均調也樂師主調其音三禮義宗稱周官奏黃鍾者用黃鍾為調歌大吕者用大吕為調奏者謂堂下四懸歌者謂堂上所歌但一祭之間皆用二調是知據宮稱調其義一也明六律六吕迭相為宮各自為調今見行之樂用黃鍾之宫乃以林鍾為調與古典有違晉內書監荀朂依典記以五聲十二律還相為宮之法制十二笛黃鍾之笛正聲應黃鍾下徵應林鍾以姑洗為清角大呂之笛正聲應大呂下徵應夷則以外諸均例皆如是然今所用林鍾是朂下徵之調不取其正先用其下于理未通故須改之同律度量議竊惟權衡度量經邦懋軌誠須詳求故實考校得衷謹尋今之鐵尺是太祖遣尚書故蘇綽所造當時檢勘用為前周之尺驗其長短與宋尺符同即以調鍾律并用均田度地今以上黨羊頭山黍依漢書律厯志度之若以大者椆纍依數滿尺實于黃鍾之律須撼乃容若以中者纍尺雖復小稀實于黃鍾之律不動而滿計此二事之殊良由消息未善其於鐵尺終有一㑹且上黨之黍有異他鄉其色至烏其形圓重用之為量定不徒然正以時有水旱之差地有肥瘠之異取黍大小未必得中案許慎解秬黍體大本異于常疑今之大者正是其中纍百滿尺即是㑹古實籥之外才剩十餘此恐圍徑或差造律未妙就如撼動取滿論理亦通今勘周漢古錢大小有合宋氏渾儀尺度無舛又依淮南纍粟十二成寸明先王制法索隱鈎深以律計分義無差異漢書食貨志云黃金方寸其重一斤今鑄金校驗鐵尺為近依文據理符㑹處多且平齊之始已用宣布今因而為定彌合時宜至於玉尺纍黍以廣為長纍既有剩實復不滿尋訪古今恐不可用其晉梁尺量過為短小以黍實管彌復不容據律調聲必致髙急且八音克諧明王盛範同律度量哲后通規臣等詳校前經斟量時事謂用鐵尺于理為便樂府郊廟歌辭圜丘歌八首昭夏降神肅祭典協良臣具嘉薦俟皇臻禮方成樂已變感靈心回天眷闢華闕下乾宮乘精氣御祥風望爟火通田燭膺介圭受瑄玉神之臨慶隂隂煙衢洞宸路深善既福德斯輔流鴻祚遍區宇皇夏皇帝升壇於穆我后昭明有融道濟區域功格𤣥穹百神警衛萬國承風仁深德厚信洽義豐明發思政勤憂在躬鴻基惟永福祚長隆登歌德深禮大道髙饗穆就陽斯恭陟配惟肅血膋升氣冕裘標服誠感清𤣥信陳史祝祗承靈貺載膺多福諴夏皇帝初獻肇禋崇祀式奉一作大報尊靈因髙盡一作就敬掃地推誠六宗隨兆五緯陪營雲和發韻孤竹揚聲一作清我粢既潔我酌惟明元神是鑒百祿來成文舞皇帝既獻奏皇矣上帝受命自天睿圖作極文教遐宣四方監觀萬國陶甄有苗斯格無得稱焉天地之經和樂具舉休徵咸萃要荒式序正位履端秋霜春雨需夏皇帝飲福酒禮以恭事薦以饗時載清𤣥酒備潔薌萁回旒分爵思媚軒墀惠均撤俎祥降受釐十倫以具百福斯滋克昌厥德永祚鴻基武舞御厯膺期乘乾表則成功戡亂順時經國兵暢五材武𢎞七德憬彼遐裔化行充塞三道備舉二儀交泰情發自中義均莫大祀敬恭肅鐘鼓繁㑹萬國斯歡兆民斯賴享兹介福康哉元首惠我無疆天長地久昭夏送神享序洽祀禮施神之駕儼將馳奔精驅長離耀牲煙達潔誠照騰日馭鼓電鞭辭下土升上𤣥瞻寥廓杳無際憺羣心留餘惠五郊歌五首青帝歌角音震宮初動木德惟仁龍精戒旦鳥厯司春陽光煦物溫風先導巖處載驚膏田已冒犧牲豐潔金石和聲懷柔備禮明德惟馨赤帝歌徵音長嬴開序炎上為德執禮司萌持衡御國重離得位芒種在時含櫻薦實木槿垂㽔慶賞既行髙明可處順時立祭事昭福舉黃帝歌宮音爰稼作土順位稱坤孕金成德履艮為尊黃本內色宮實聲始萬物資生四時咸紀靈壇汛掃盛樂髙張威儀孔備福履無疆白帝歌商音西成肇節盛德在秋三農稍已九穀行收金氣肅殺商威飂戾嚴風鼓莖繁霜隕蒂厲兵詰暴敇法慎刑明神降嘏國步惟寧黑帝歌羽音𤣥英啓候冥陵初起虹藏于天雉化于水嚴關重閉星回日窮黃鐘動律廣莫生風𤣥尊示本天産惟質恩覃外區福流京室感帝歌諴夏禘祖垂典郊天有章以孟之春于國之陽繭栗惟誠陶匏斯尚人神接禮明幽交暢火靈降祚火厯載隆蒸哉帝道赫矣皇風雩祭歌諴夏朱明啓候時載陽肅若舊典延五方嘉薦以陳盛樂奏氣序和平資靈祐公田既雨私亦濡民殷俗富政化敷蠟祭歌諴夏四方有祀八蠟酬功收藏既畢榛葛送終使之必報祭之斯索三時告勞一日為澤神祗必來鱗羽咸致惟義之盡惟仁之至年成物阜罷役息民皇恩已洽靈慶無垠朝日夕月歌二首朝日諴夏扶木上朝暾嵫山沈暮景寒來遊晷促暑至馳輝永時和合璧耀俗泰重輪明執圭盡昭事服冕罄䖍誠夕月諴夏澄輝燭地域流耀鏡天儀厯草隨弦長珠胎逐望虧成形表蟾兔竊藥資王母西郊禮既成幽壇福惟厚方丘歌四首昭夏柔功暢隂德昭陳瘞典盛𤣥郊筐冪清膋鬯馥皇情䖍具寮肅笙頌合鼓鼗㑹出桂旌屯虬蓋敬如在肅有承神胥樂慶福膺登歌奠玉帛道惟生育器乃包藏報功稱範殷薦有常六瑚已饋五齊流香貴誠尚質敬洽義章神祚惟永帝業增昌諴夏初獻厚載垂德崑丘主神隂壇吉禮北至良辰鑒水呈潔牲栗表純樽壺夕啓幣玉朝陳羣望咸秩精靈畢臻祚流於國祉彼於人昭夏奠既徹獻已周竦靈駕逝逺遊洞四極匝九縣慶方流祉恆遍埋玉氣掩牲芳晰神理顯國文神州歌諴夏四海之內一和之壤地曰神州物賴生長咸池既降泰折斯饗牲牷尚黑圭玉實兩九㝢載寧神功克廣社稷歌四首春祈社諴夏厚地開靈方壇崇祀達以風露樹之松梓勾萌既申芟柞伊始恭祈粢盛載膺休祉春祈稷諴夏粒食興教播厥有先尊神致潔報本惟䖍瞻榆束耒望杏開田方慿戩福佇詠豐年秋報社諴夏北墉申禮單出表誠豐犧入薦華樂在庭原隰既平泉流又清如雲已望髙廪斯盈秋報稷諴夏民天務急農亦勤止或蓘或藨惟􅚂惟芑凉風戒時嵗云秋矣物成則報功施必祀先農歌諴夏農祥晨晰土膏初起春原俶載青壇致祀斂蹕長阡回旌外壝房俎飾薦山罍沈滓親事朱絃躬持黛耜恭神務穡受禧降祉先聖先師歌諴夏經國立訓學重教先三墳肇册五典留篇開鑿理著陶鑄功宣東膠西序春誦夏弦芳塵載仰祀典無騫太廟樂歌九首迎神歌務本興教尊神體國霜露感心享祀陳則官聨式序奔走在庭几筵結慕祼獻惟誠嘉樂載合神其降止永言保之錫以繁祉登歌孝熙嚴祖師象敬宗惟皇肅肅有來雍雍雕梁霞復繡橑雲重觀德自感奉璋伊恭彞斚盡飾羽綴有容升歌發藻景福來從俎入歌郊丘廟社同祭本用初祀由功舉駿奔咸㑹供神有序明酌盈樽豐犧實俎幽金既薦繢錯維旅享由明德香非稷黍載流嘉慶克固鴻緒皇髙祖太原府君神室歌締基發祥肇源興慶乃仁乃哲克明克令庸宣國圖善流人詠開我皇業七百同盛皇曽祖康王神室歌皇條俊茂帝系靈長豐功疊軌厚利重光福由善積代以德彰嚴恭盡禮永錫無疆皇祖獻王神室歌盛才必達丕基增舊涉渭同符遷邠等構𢎞風邁德義髙道富神鑒孔昭王猷克懋皇考太祖武元皇帝神室歌深仁冥著至道濳敷皇矣太祖耀名天衢翦商隆祚奄宅隋區有命既集誕開靈符飲福酒歌郊丘廟社同用神道正直祀事有融肅雍備禮莊敬在躬羞燔已具奠酹將終降祥惟永受福無窮送神歌饗禮具利事成佇旒冕肅簪纓金奏終玉俎徹盡孝敬窮嚴潔人祗分哀樂半降景福慿幽贊燕射歌辭元㑹大饗歌十一首皇夏皇帝出入殿庭奏郊丘廟社並同深哉皇度粹矣天儀司陛整蹕式道先馳八屯霧擁七萃雲披退揚進揖步矩行規勾陳乍轉華蓋徐移羽旗照耀圭組陸離居髙念下處安思危照臨有度紀律無虧肆夏太子出入惟熙帝載式固王猷體乾建本是曰孟侯馳道美漢寢門稱周德心既廣道業惟優傅保斯導賢才與遊瑜玉發響畫輪停輈皇基方峻七鬯恆休食舉歌八曲燔泰設教禮之始五味相資火為紀平心和德在甘㫖牢羞既陳鐘石俟以斯而御揚盛軌養身必敬禮食昭時和嵗阜庶物饒鹽梅既濟鼎鉉調特以膚臘加臐膮威儀濟濟懋皇朝饔人進羞樂侑作川潛之膾雲飛臛甘酸有宜芬芍藥金敦玉豆盛交錯御鼓既聲安以樂玉食惟后膳必珍芳菰既潔重秬新是能安體又調神荆包必至海貢陳用之有節德無垠嘉羞入饋猶化謐沃土名滋帝臺實陽華之菜雕陵栗鼎俎芬芳豆籩溢通幽致逺車書一道髙物備食多方山膚既善水豢良桓蒲在位簨業張加籩折俎爛成行恩風下濟道化光禮以安國仁為政具物必陳饔牢盛罝罘斤斧順時令懷生熙熙皆得性于兹宴喜流嘉慶皇道四達禮樂成臨朝日舉表時平甘芳既飫醑以清揚休玉巵正性情隆我帝載永明明上壽歌俗已乂時又良朝玉帛㑹衣裳基同北辰久壽共南山長黎元鼓腹樂未央宴羣臣登歌皇明馭厯仁深海縣載擇良辰式陳髙宴顒顒卿士昻昻侯甸車旗煜爚衣纓蔥蒨樂正展懸司宮飾殿三揖讓禮九賓為傳圓鼎臨碑方壺在面鹿嗚成曲嘉魚入薦筐篚相輝獻酬交遍飲和飽德恩風長扇皇后房內歌隋書樂志曰髙祖龍潛時頗好音樂嘗倚琵琶作歌二章名曰地厚天髙託言夫婦之儀牛𢎞修皇后房內樂因取之為房內曲命婦入并登歌上壽並用之至順垂典正內𢎞風母儀萬國訓範六宫求賢啓化進善宣功家邦載序道業斯融大射登歌道謐金科照時人玉條明優賢饗禮洽選德射儀成鑾旗鬱雲動寶車犬儼天行巾車整三乏司裘飾五正鳴球響髙殿華鐘震廣庭烏號傳昔美淇衛著前名揖讓皆時傑升降盡朝英附枝觀體定杯水覩心平豐觚既來去燔炙復縱橫欣看禮樂盛喜遇黃河清鼓吹曲辭凱樂歌辭三首述帝德於穆我后睿哲欽明膺天之命載育羣生開元創厯邁德垂聲朝宗萬㝢秪事百靈煥乎皇道昭哉帝側惠政滂流仁風四塞淮海未賓江湖背德運籌必勝濯征斯克八荒霧卷四表雲褰雄圖盛略邁後光前寰區已泰福祚方延長歌凱樂天子萬年述諸軍用命帝德逺覃天維宏布功髙雲天聲隆韶濩惟彼海隅未從王度皇赫斯怒元戎啓路桓桓猛將赳赳英謨攻如燎髮戰似摧枯救兹塗炭克彼妖逋塵清兩越氣靜三吳鯨鯢已夷封疆載闢班馬蕭蕭歸旌奕奕雲臺表郊司勳紀績業並山河道固金石述天下太平阪泉軒德丹浦堯勳始實以武終乃以文嘉樂聖主大哉為君出師命將廓定重氛書軌既并干戈是戢𢎞風設教政成人立禮樂聿興衣裳載緝風雲自美嘉祥爰集皇皇聖政穆穆神猷牢籠虞夏度越姬劉日月比耀天地同休永清四海長帝九州舞曲歌辭文武舞歌二首文舞歌天眷有屬后德惟明君臨萬㝢昭事百靈濯以江漢樹之風聲罄地畢歸窮天皆至六戎仰朔八蠻請吏烟雲獻彩龜龍表異緝和禮樂燮理隂陽功由舞見德以歌彰兩儀同大日月齊光武舞歌惟皇御㝢惟帝乘乾五材並用七德兼宣平暴夷險拯溺救燔九域載安兆庶斯賴續地之厚補天之大聲隆有截化覃無外鼓鐘既奮干戚攸陳功髙德重政謐化淳鴻休永播久而彌新詩奉和冬至乾陽殿受朝應詔恭已臨萬㝢宸居御八埏作貢菁茅集來朝圭黻連司儀三揖盛掌禮九賓䖍重欄映如璧復殿繞非烟漢魏六朝百三家集卷一百十七
